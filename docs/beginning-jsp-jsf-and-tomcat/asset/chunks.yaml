    `String dbUser = application.getInitParameter("dbUser");` `String dbPass = application.getInitParameter("dbPass");`  After
    that, you can replace lines 6 and 7 of the example with:  `Connection conn = DriverManager.getConnection(dbName,
    dbUser, dbPass);`  ### Database Basics    In some cases, a DB might contain a
    small amount of data, have a simple structure, and reside together with the application
    software on a home PC. In other cases, at the higher end of the scale, it might
    hold millions of records, have a data structure of great complexity, and run on
    a cluster of powerful servers (e.g., with MySQL Cluster).    In any case, regardless
    of size, environment, and complexity, the DBMS is organized around the client/server
    architecture. The system on which your DB resides is the *server*, and the system
    from which you need to access your DB is the *client*, even when they’re one and
    the same PC. Therefore, in order to be able to work with data and a data structure,
    you first have to establish a connection from the client to the database on the
    server. To be able to do so, you need the following three pieces of information:    >
    *   The URL of your server > *   A user ID that allows you to access the DB >
    *   The password that goes together with the User ID    Once you establish the
    connection, you can then begin to manipulate the DB structure and its content
    via SQL statements. Be aware that although you need to provide a User ID and password
    when you connect to the server, this doesn’t automatically mean that a user has
    access to all databases on the same server. You can (and, in most cases, should)
    allow access to specific databases to some users and not others. In fact, you
    can define one or more new users for each new database you create and group them
    according to the capabilities they are required to have (i.e., database administrators,
    developers, etc.). This ensures total confidentiality of data when several users
    share a database server. It’s good practice to define different users for different
    applications so that you don’t risk “cross-polluting” data.    In 1986, the American
    National Standards Institute (ANSI) adopted SQL as a standard, and ISO followed
    suit one year later. The current standard is ISO/IEC 9075, but, unfortunately,
    it’s not freely available. If you want to have it, you have to buy it from ANSI
    or ISO. The SQL standard has been widely adopted, and, as a result, most of what
    I’m going to say concerning SQL actually applies to all DBMSs. As you can imagine,
    there are still proprietary additions and variations that, in some cases, make
    SQL less portable than what it could and should be, but it won’t affect us.    The
    SQL standard specifies at least 27 basic statements with numerous variants. They
    are `alter`, `based on`, `begin`, `close`, `commit`, `connect`, `create`, `declare`,
    `delete`, `describe`, `disconnect`, `drop`, `end`, `event`, `execute`, `fetch`,
    `grant`, `insert`, `open`, `prepare`, `revoke`, `rollback`, `select`, `set`, `show`,
    `update`, and `whenever` (see [Appendix B](#AppendixB.html) for the details).
    In total, at the last count, 231 words were reserved by SQL as keywords. Therefore,
    it should be clear that in this chapter, I couldn’t possibly give you more than
    a small introduction to SQL. [Appendix B](#AppendixB.html) provides a more detailed
    SQL reference to help you along. Also, if you search Apress for “SQL”, you will
    get a list of more than a hundred books. “Beginning SQL Queries” ([`www.apress.com/9781590599433`](http://www.apress.com/9781590599433))
    might be a good starting point.    The basic structural elements of a DB are rows,
    columns, tables, and indices. In non SQL terms, rows are data records, columns
    identify the record fields, tables are named collections of records, and indices
    are ordered lists of records.    To design a database for a web application, you
    basically associate a table to each Java class that represents the data you need
    to store permanently. Each attribute of your class then becomes a column of your
    table. In a sense, to express it in OO terminology, each row corresponds to an
    instantiation of your class containing different data. For example, in the E-shop
    application, book categories are modeled to reflect the Java class shown in [Listing
    6-6](#Chapter06.html#list_6_6).    ***Listing 6-6.** Category.java*  `package
    eshop.beans;`  `public class Category {` `  private int id;` `  private String
    name;`  `  public Category(int id, String name) {` `    this.id = id;` `    this.name
    = name;` `    }`  `  public int getId() { return id; }` `  public void setId(int
    id) { this.id = id; }`  `  public String getName() { return name; }` `  public
    void setName(String name) { this.name = name; }` `  }`  Accordingly, to store
    categories in the `shop` database, you can use the following SQL statement to
    create a table named `categories`, extracted from `shop_create.sql` (see [Listing
    6.1](#Chapter06.html#list_6_1)):  `create table shop.categories (` `  category_id
    integer not null auto_increment unique,` `  category_name varchar(70),` `  primary
    key (category_id)` `  );`  Each SQL statement consists of a verb that defines
    the operation to be done (`create table` in this example), the identifier of the
    object operated on (`shop.categories` in this example), and one or more operation
    parameters, often enclosed in parentheses. When more than one object or parameter
    is needed, they’re usually comma-separated. In the example, the first two parameters
    define the DB columns `category_id` and `category_name`. Notice how the attributes
    specified in the SQL statement match those defined in the Java class. When creating
    this table, I also told MySQL to create an index of `category_id` by declaring
    the column to contain unique values and designating it as the primary key of the
    table. The purpose is to speed up DB operations, although in this case, given
    the small size of the table, it obviously won’t make any practical difference.    Use
    this code, which creates three new rows, to store new records in a DB, extracted
    from `shop_populate.sql` (see [Listing 6.2](#Chapter06.html#list_6_2)):  `insert
    into categories (category_id, category_name)` `  values (1,''Web Development''),
    (2,''SF''), (3,''Action Novels'');`  Incidentally, be aware that SQL, contrary
    to Java, is not case-sensitive.    Use the powerful `select` SQL statement to
    read data. It lets you create complex queries that include sorting the data. Here’s
    a simple example:  `select category_id, category_name from categories where category_id
    = ''2'';`  To retrieve all columns of a table, you replace the comma-separated
    list of columns with an asterisk. The `where` clause can consist of several conditions
    composed by means of logical operators.    You use the `update` statement to modify
    row contents:  `update categories set category_name = ''SF'' where category_id
    = ''2'';`  Using `delete` you can remove rows:  `delete from categories where
    category_id > ''3'';`  You can also operate on the data structure. To do so, you
    use the `alter` statement, as in the following example:  `alter table categories
    add` *`new_column_name`**`column-definition`*`;`  This lets you add a column to
    an existing table. If you replace `add` with `modify` or `drop`, the `alter` statement
    will let you redefine a column or remove it.    In general, the SQL statements
    are grouped depending on their purposes. [Table 6-1](#Chapter06.html#tab_6_1)
    gives you a summary of their classification.    ![Image](images/9781430246237_Tab06-01.jpg)    In
    this chapter, I’ll explain how to execute any SQL statement, but we’ll concentrate
    mainly on DML.    ### SQL Scripts    As I have already said, a CLI is useful to
    initialize a database. As a CLI, MySQL makes available the program “MySQL Command
    Line Client,” which starts in a DOS window and attempts at once to establish a
    connection as the default User ID to the default server. If you’ve set up MySQL
    as I suggested at the beginning of this chapter, the default user will be `root`
    and the default host will be `localhost`. After providing the correct password,
    you get a `mysql>` prompt and can start executing SQL statements.    You can play
    around with the commands, but the best way to use the CLI is with SQL scripts.
    These are plain-text files containing the statements you want to execute. At the
    `mysql` prompt, you only need to type backslash-period-space (`\.` ) followed
    by the script file name, and off you go. In fact, you must use scripts if you
    want to ensure that your steps are repeatable and correctable. [Listing 6-7](#Chapter06.html#list_6_7)
    shows the third (and last) SQL script needed to configure the database of the
    E-shop application.    ***Listing 6-7.** shop_orders.sql*  `USE shop;` `create
    table shop.order_details (`  `  id double precision not null auto_increment unique,`
    `  book_id integer,` `  title varchar(70),` `  author varchar(70),`  `  quantity
    integer,` `  price double precision,` `  order_id double precision,` `  primary
    key (id)` `  );` `create table shop.orders (` `  order_id double precision not
    null auto_increment unique,` `  delivery_name varchar(70),` `  delivery_address
    varchar(70),` `  cc_name varchar(70),` `  cc_number varchar(32),` `  cc_expiry
    varchar(20),` `  primary key (order_id)` `  );` `create index order_details_id_key
    on shop.order_details (id);` `alter table shop.order_details add index order_id
    (order_id),` `  add constraint order_id foreign key (order_id)` `  references
    shop.orders (order_id)` `  ;` `create index order_id_key on shop.orders (order_id);`  Notice
    that the primary (i.e., unique) keys of both `order_details` and `orders` are
    automatically generated by MySQL as ever increasing numbers, while the primary
    keys of `books` and `categories` are hard-coded in `shop_create.sql` (see [Listing
    6.1](#Chapter06.html#list_6_1)). As the category and book IDs are not visible
    to the user, I could have let MySQL generate them as well. I didn’t do it because
    the book and category records are created by hand anyway, and to add an ID didn’t
    seem a big deal. Perhaps it is due to my tendency to minimize the use of automatic
    mechanisms when they are not necessary, in order to retain more control. The downside
    of this is of course that manual entries are in general more error prone and require
    more maintenance effort.    To write comments in an SQL script, you enclose them
    between `/*` and `*/`, like Java’s block comments.    ### Java API    You operate
    on databases by executing SQL statements. To do so from within Java/JSP, you need
    an API consisting of several interfaces, classes, and method definitions. The
    API is included in the class libraries `java.sql` and `javax.sql` of JDK version
    7\. Additionally, you also need a driver that implements that API for the specific
    DBMS (i.e., MySQL) in the native code of your system (i.e., an Intel/Windows PC).
    To work with MySQL, you use as driver the MySQL Connector/J version 5, which is
    a type 4 JDBC driver (see sidebar).    **JDBC DRIVERS**    The JDBC API lets you
    access databases from Java. There are four types of JDBC implementations (i.e.,
    drivers).    JDBC drivers of type 1 are actually JDBC-ODBC bridges, because they
    access databases via an Open Database Connectivity (ODBC) driver. At the end of
    this chapter, we’ll show you how to use the bridge included in the Java Virtual
    Machine (JVM).    JDBC drivers of type 2 use vendor-specific, native, client-side
    libraries. In other words, they interface to non-Java functions provided by the
    DBMS vendor, which in turn interfaces to the databases. These drivers are more
    efficient compared to those of type 1, but you can only use them locally.    JDBC
    drivers of type 3 are Java drivers that, instead of communicating directly with
    the databases, rely on a middleware package that sits on an application server.    JDBC
    drivers of type 4 are written entirely in Java and communicate directly with the
    DBMS server. This is the type you want!    #### Connecting to the Database    The
    first step to access a database from Java is to load the driver, without which
    nothing will work. To do so, you execute the method `Class.forName("com.mysql.jdbc.Driver")`.
    In the E-shop application, you do this in the `init` method of the servlet (see
    [Listing 3-9](#Chapter03.html#list_3_9)).    To be able to switch from MySQL to
    other DBMSs without much effort, store the driver name in an `init` parameter
    defined in `WEB-INF\web.xml` as follows:  `<init-param>` `  <param-name>jdbcDriver</param-name>`
    `  <param-value>com.mysql.jdbc.Driver</param-value>` `  </init-param>`  This way,
    you can load it as follows when initializing the servlet:  `java.lang.Class.forName(config.getInitParameter("jdbcDriver"));`  Once
    you load the driver, you also need to connect to the database before you can access
    its content. In the E-shop application, you do this by executing a data manager
    (of type `DataManager`, defined in `WEB-INF\classes\eshop\model\DataManager.java`)
    method, as shown in the following line of code:  `java.sql.Connection connection
    = dataManager.getConnection();`  The data manager’s `getConnection` method, in
    turn, obtains the connection from the JDBC driver, as shown in the fragment in
    [Listing 6-8](#Chapter06.html#list_6_8).    ***Listing 6-8.** The DataManager.getConnection
    Method*  `public Connection getConnection() {` `  Connection conn = null;` `  try
    {` **`    conn = DriverManager.getConnection(getDbURL(), getDbUserName(), getDbPassword());`**
    `    }` `  catch (SQLException e) {` `    System.out.println("Could not connect
    to DB: " + e.getMessage());` `    }` `  return conn;` `  }`  To be able to change
    the database, the user ID, or the password without having to rebuild the application,
    you define them in servlet initialization parameters as you did for the name of
    the JDBC driver and as I showed earlier in this chapter:  `dbURL: jdbc:mysql://localhost:3306/shop`
    `dbUserName: root` `dbPassword:` *`none`*  Port 3306 is the default for MySQL
    and can be configured differently. Obviously, in real life, you would use a different
    user and, most importantly, define a password.    Once you finish working with
    a database, you should always close the connection by executing `connection.close()`.
    E-shop does it via another data manager’s method, as shown in [Listing 6-9](#Chapter06.html#list_6_9).    ***Listing
    6-9.** The DataManager.putConnection Method*  `public void putConnection(Connection
    conn) {` `  if (conn != null) {` **`    try { conn.close(); }`** `    catch (SQLException
    e) { }` `    }` `  }`  Before you can start hacking at your database, you still
    need to create an object of type `java.sql.Statement`, as it is through the methods
    of that object that you execute SQL statements. Use this code to create a statement:  `Statement
    stmt = connection.createStatement();`  Once you’re done with one statement, you
    should release it immediately with `stmt.close()`, because it takes a non-negligible
    amount of space, and you want to be sure that it doesn’t hang around while your
    page does other things.    #### Accessing Data    The `Statement` class has 40
    methods, plus some more inherited ones. Nevertheless, two methods are likely to
    satisfy most of your needs: `executeQuery` and `executeUpdate`.    ##### The executeQuery
    Method    You use this method to execute a `select` SQL statement, like this:  `String
    sql = "select book_id, title, author from books where category_id=1"` `    + "
    order by author, title";` `ResultSet rs = stmt.executeQuery(sql);`  In the example,
    the method returns in the variable `rs` of type `java.sql.ResultSet` all the books
    in category 1, sorted by author name and title. The rows in the result set only
    contain the columns specified in the `select` statement, which in this example
    are `book_id`, `title`, and `author`.    At any given time, you can only access
    the row of the result set pointed to by the so-called *cursor*, and by default
    you can only move the cursor forward. The usual way of accessing the rows of the
    result set is to start from the first one and “go down” in sequence. For example,
    with the `shop` database, the following code:  `while (rs.next()) {` `  out.println(rs.getString(3)
    + ", " + rs.getString(2) + "<br/>");` `  }`  would produce the following output:  `Damon
    Williams, Pro PayPal E-Commerce` `Michael Bowers, Pro CSS and HTML Design Patterns`  The
    `next` method moves the cursor down one row. After the cursor goes past the last
    row, `next()` returns `false`, and the `while` loop terminates. Initially, the
    cursor is positioned *before* the first row. Therefore, you have to execute `next()`
    once in order to access the very first row.    Besides `next()`, there are other
    methods that let you reposition your cursor. Five of them return a `boolean` such
    as `next()`, which returns `true` if the cursor points to a row. They are `absolute(`*`row-position`*`)`,
    `first()`, `last()`, `previous()`, and `relative(`*`number-of-rows`*`)`. The `beforeFirst()`
    and `afterLast()`methods also move the cursor but are of type `void`, because
    they always succeed. The `isBeforeFirst()`, `isFirst()`, `isLast()`, and `isAfterLast()`
    methods check whether the cursor is in the corresponding positions, while `getRow()`
    returns the position of the row currently pointed to by the cursor.    Keep in
    mind that in order to be able to move the cursor around, you have to specify a
    couple of attributes when you create the statement—that is, *before* you actually
    execute the query. This is how you do it:  `Statement stmt = connection.createStatement(`
    `  ResultSet.TYPE_SCROLL_INSENSITIVE,` `  ResultSet.CONCUR_READ_ONLY` `  );`  `ResultSet.TYPE_SCROLL_INSENSITIVE`
    is what allows you to move the cursor forth and back within the result set. This
    parameter can only have one of the following two other values: `ResultSet.TYPE_FORWARD_ONLY`
    (the default) and `ResultSet.TYPE_SCROLL_SENSITIVE`. The difference between `SENSITIVE`
    and `INSENSITIVE` is that with `INSENSITIVE`, you’re not affected by changes made
    to the result set while you’re working with it (more about this in a moment).
    This is probably what you want.    `ResultSet.CONCUR_READ_ONLY` states that you
    don’t want to modify the result set. This is the default, and it makes sense in
    most cases. The alternative is to specify `ResultSet.CONCUR_UPDATABLE`, which
    allows you to insert, delete, and modify result rows. Now you can see why you
    might like to use `ResultSet.TYPE_SCROLL_SENSITIVE` as the first parameter: it
    lets you see the modifications made to the result set after you started working
    with it, rather than showing how it was before those changes. On the other hand,
    in a complex application with several threads operating on the same result set,
    you’ll probably prefer to ignore the changes made in other threads. In such a
    situation, it would have to be 100 percent clear which thread would be allowed
    to modify which rows; otherwise, you’d end up with a mess.    `ResultSet` provides
    several methods for retrieving a column value in different formats, given a column
    position or its label. For example, the following two methods will return the
    same value:  `long bookID = rs.getLong(1);` `long bookID = rs.getLong("book_id");`  The
    column position refers to the columns specified in the `select` statement. Notice
    that the column numbering begins with 1, not with 0 as is customary in Java. The
    types available are `Array`, `BigDecimal`, `Blob`, `boolean`, `byte`, `byte[]`,
    `Clob`, `Date`, `double`, `float`, `InputStream`, `int`, `long`, `NClob`, `Object`,
    `Reader`, `Ref`, `RowId`, `short`, `SQLXML`, `String`, `Time`, `Timestamp`, and
    `URL` (see [Appendix B](#AppendixB.html) for more details). For most of these
    types exists a corresponding update method, which lets you modify a column. For
    example, the following code writes “Joe Bloke” in the `author` column of the current
    row of the result set:  `rs.updateString("author", "Joe Bloke");`  Note that there
    are no update methods for the types `InputStream`, `Reader`, and `URL`. You can
    also set a column to `null` with the methods `updateNull(`*`column-index`*`)`
    and `updateNull(`*`column-label`*`)`.    `ResultSet` provides more than two dozen
    additional methods that let you do things such as transfer changes from an updated
    result set to the actual database or refresh a row that somebody else might have
    modified in the actual database after you performed the query. One method that
    you might find useful returns the column position in your result set given its
    name:  `int findColumn(`*`column-label`*`)`  The result set is automatically disposed
    of when the corresponding statement is closed. Therefore, you don’t really need
    to execute `rs.close()`, as long as you immediately close the statement when you
    no longer need it.    ##### The executeUpdate Method    You can use this method
    to execute the SQL statements `insert`, `update`, and `delete`. For example, if
    you want to add a new book category to the E-shop example, you do something like
    this:  `String sql = "insert into categories (category_id, category_name)"` `    +
    " values (4, ''Comic Books'')";` `stmt.executeUpdate(sql);`  You don’t need to
    define all the columns, because the undefined fields are set automatically to
    their corresponding default values. That said, as I haven’t specified any default
    in the definition of the `categories` table, the following statement would result
    in the field `category_name` being set to `null`:  `stmt.executeUpdate("insert
    into categories (category_id) values (4)");`  To avoid this occurrence, I could
    have defined the `category_name` column with a default:  `category_name varchar(70)
    default ''Miscellanea''`  #### Transactions    In E-shop, I have defined two separate
    tables for data associated with a book order: one for the customer data, and one
    for the individual books ordered (see [Listing 6-7](#Chapter06.html#list_6_7)).
    It would be bad if you completely lost an order, but perhaps it would be even
    worse if you lost some items and only processed a partial order. It would also
    be a problem if you saved the order details in the database but failed to save
    the customer data. That would leave some “orphaned” book items with no information
    concerning the buyer. You don’t need to worry about this if you save the customer
    data first: then, by the time you start saving the order details, the customer
    record is already on disk. But how do you ensure that the database only contains
    complete orders?    Normally, when you execute an SQL `insert`, the data is immediately
    stored into the database. To ensure the completion of orders, you could keep track
    of the updates you’ve already successfully executed and reverse them if you cannot
    complete the whole order. However, this would be very complicated, and there would
    be no guarantee of success. Moreover, in a more complex application, there might
    be several operations proceeding simultaneously and causing the same database
    records to be accessed concurrently. The solution is a built-in, foolproof mechanism
    capable of ensuring that some complex transactions are done “in one shot” or not
    at all.    This mechanism is actually quite simple. It works like this:    > 1.  Immediately
    after connecting to the DB with `conn = DriverManager.getConnection(...)`, execute
    `conn.setAutoCommit(false)`. This tells MySQL not to make permanent changes to
    the database until you confirm them. > 2.  Perform all the updates that form your
    complex transaction. Be sure that you place them inside a `try` block as part
    of a `try`/`catch` construct. > 3.  In the `catch` block, include the statement
    `conn.rollback()`. If one of the updates fails, an `SQLException` will be thrown,
    and when the `catch` block is executed, the `rollback` will cause MySQL to “forget”
    the uncommitted updates. > 4.  When all the updates have completed without being
    interrupted by any exception, execute `conn.commit()` to tell MySQL that it can
    finalize the updates.    ### DB Access in E-shop    As I mentioned in [Chapter
    3](#Chapter03.html), all database operations are concentrated in the data model
    of an MVC architecture. JSP modules interact with the database by executing methods
    of the `DataManager` class, which accept and/or return data in the form of Java
    beans. By mediating DB access via the data manager and Java beans, you ensure
    that the view and the model can be developed independently.    [Figure 6-5](#Chapter06.html#fig_6_5)
    shows the structure of the model.  ![Image](images/9781430246237_Fig06-05.jpg)  ***Figure
    6-5.** The data model structure*    The `DataManager` class sets up and closes
    connections to the database; however, concerning table access, it only acts as
    a clearinghouse. Specific classes perform the actual operations on individual
    tables. In this way, you ensure that changes to individual tables have the minimum
    impact on the application. This is actually an example of the Java EnterPrise
    Edition pattern called Data Access Object (DAO).    For example, the JSP page
    that displays the book details obtains the information concerning the requested
    book by executing the following method of the data manager:  `public Book getBookDetails(int
    bookID) {` `  return BookPeer.getBookById(this, bookID);` `  }`  It is the `getBookByID`
    method in `BookPeer.java` that performs the actual database access, as shown in
    [Listing 6-10](#Chapter06.html#list_6_10).    ***Listing 6-10.** The BookPeer.getBookID
    Method*  `01: public static Book getBookById(DataManager dataManager, int bookID)
    {` `02:   Book book = null;` `03:   Connection connection = dataManager.getConnection();`
    `04:   if (connection != null) {` `05:     try {` `06:       Statement s = connection.createStatement();`
    `07:       String sql = "select book_id, title, author, price from books"` `08:          +
    " where book_id=" + bookID;` `09:       try {` `10:         ResultSet rs = s.executeQuery(sql);`
    `11:         if (rs.next()) {` `12:           book = new Book();` `13:          
    book.setId(rs.getString(1));` `14:           book.setTitle(rs.getString(2));`
    `15:           book.setAuthor(rs.getString(3));` `16:           book.setPrice(rs.getDouble(4));`
    `17:           }` `18:         }` `19:       finally { s.close(); }` `20:      
    }` `21:     catch (SQLException e) {` `22:       System.out.println("Could not
    get book: " + e.getMessage());` `23:       }` `24:     finally {` `25:       dataManager.putConnection(connection);`
    `26:       }` `27:     }  return book;` `28:   }`  In line 3, you open the database
    connection by invoking a method of the data manager that also reports an error
    in case of failure. Then you start a `try` block where you do the actual work.
    In the corresponding `catch` block, you display an error message (line 22), and
    in the `finally` block (line 25), you close the DB connection. Remember that the
    `finally` block is executed whether the `try` succeeds or not. In this way, you
    ensure that the connection is closed in case of failure.    Inside the outermost
    `try` (lines 5–20), you create a statement and set up the query string before
    starting a second `try` block (lines 9–17). Similar to what you did concerning
    the connection, you use the `finally` block to close the statement (line 19).    This
    is a technique of general applicability: every time you do something that needs
    to be undone, take care of it immediately inside a `try` block by placing the
    “undoing” statement in the corresponding `finally`. In this way, you’ll be sure
    not to leave any “ghosts” behind you. It’s true that Java’s garbage-collection
    mechanism should take care of removing unreferenced objects, but it’s good practice
    to clean up behind yourself as you go, especially when you’re dealing with databases
    and potentially large objects, such as statements and result sets. At the very
    least, your application will work more efficiently. And it feels good to write
    “clean” code.    Line 10 is where you actually execute the query. You know that
    you’re not going to get more than one row in the result set, because the `book_id`
    is a unique key of the book table.    You might be thinking, “Why should I go
    through the data manager at all? Couldn’t I simply execute the `BookPeer` method
    from JSP?” Well, you could, but it wouldn’t be clean, and dirtiness sooner or
    later causes problems.    Furthermore, consider the more complex case in which
    you want to save an order. From the JSP point of view, you only want to call a
    method of the data manager that takes care of both the customer’s data and the
    shopping cart. Behind the scenes, though, two different tables need to be updated:
    one for the orders and one for the order details. Therefore, it makes a lot of
    sense to execute the overall transaction in the data manager (see [Listing 6-11](#Chapter06.html#list_6_11))
