    ### XML 语法中的 JSP


    带有脚本元素的 JSP 页面不是 XML 文件。这意味着你在开发 JSP 页面时不能使用 XML 工具。但是，可以以使其成为正确 XML 的方式编写 JSP。诀窍是使用标准
    JSP 动作、带有 EL 的 JSTL，以及可能的非 JSTL 自定义动作。实际上，定义了一些“特殊标准”（双关语！）JSP 动作来支持 XML 语法（`jsp:root`、`jsp:output`
    和 `jsp:directive`）。无论如何，这样的 XML 模块被称为 *JSP 文档*，以区别于以传统的非 XML 兼容方式编写的 *JSP 页面*。


    作为第一个示例，让我们将清单 1-4 中显示的 `hello.jsp` 页面转换为 `hello.jspx` 文档。清单 5-16 显示了一个部分 `hello.jspx`，它只写入
    `"Hello World!"`。我们稍后再转换显示动态信息的脚本小程序。


    ***清单 5-16.** 部分 hello.jspx*


    `01: <?xml version="1.0" encoding="UTF-8"?>` `02: <jsp:root` `03:  ` `04:  ` `05:  `
    `06:   version="2.1"` `07:   >` `08: <jsp:directive.page` `09:   language="java"`
    `10:   contentType="application/xhtml+xml;charset=UTF-8"` `11:   />` `12: <html>`
    `13: <head><title>Hello World in XHTML</title></head>` `14: <body>` `15:   <jsp:text>Hello
    World!</jsp:text>` `15: </body>` `16: </html>` `17: </jsp:root>`


    第 1 行声明该文件符合 XML 规范。第 2–7 行中的 `root` 元素有几个用途。例如，它允许你使用 `jsp` 扩展名而不是推荐的 `jspx`。它也是一个方便的地方，你可以在其中分组命名空间声明（`xmlns`）。JSTL
    核心标签库的命名空间声明是 JSP 页面中 `taglib` 指令的 XML 等价物。你不需要在 JSP 页面中指定 JSP 命名空间，但在 JSP 文档中不能省略它；否则，`jsp:`
    标签将无法被识别。


    第 8–11 行是 JSP 页面中 `page` 指令的 XML 等价物。`include` 指令也有其 XML 等价物，即元素 `<jsp:directive.include
    file="`*`relativeURL`*`"/>`。


    请注意，第 15 行中的字符串 “Hello World!” 被括在 `jsp:text` 元素中。这是必要的，因为在 XML 中你不能有“未标记”的文本。


    为了保持一致并使生成的 HTML 能够进行完整验证，你还应该包含正确的 `DOCTYPE`。最好的方法是使用 `jsp:output` 动作的属性，该动作是专门为此目的设计的。你只需要将第
    12 行中的 `<html>` 标签替换为以下三个元素：


    `<jsp:output omit-xml-declaration="false"/>` `<jsp:output` `  doctype-root-element="html"`
    `  doctype-public="-//W3C//DTD XHTML 1.0 Strict//EN"` `  doctype-system="http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd"`
    `  />` `<html >`


    是的，仅仅为了写 “Hello World!” 就需要做相当多的工作，但是对于任何大小的 JSP 文档，这种开销都是相同的。第一行导致 `<?xml ...
    ?>` 元素被写入生成的 HTML 页面的开头，而第二个元素生成 `DOCTYPE`。


    如果你查看由 `hello.jspx` 的这个初步版本生成的 HTML 页面，你会发现所有 HTML 代码都在一行中。如果你希望在输出中的 HTML 标签之间有换行符，你必须编写它们。实际上，你可以使用
    `jsp:text` 动作来做到这一点。例如，以下代码片段中的所有 `jsp:text` 元素都包含一个换行符（你可以看到），后跟两个空格（你在列表中看不到，但它们存在）：


    `<html ><jsp:text>` `  </jsp:text><head><title>Hello World in XHTML</title></head><jsp:text>`
    `  </jsp:text><body>Hello World!</body><jsp:text>` `  </jsp:text></html>`


    由于 `jsp:text` 内容按原样发送到输出，生成的 HTML 将分布在多行并缩进：


    `<html >` `  <head><title>Hello World in XHTML</title></head>` `  <body>Hello
    World!</body>` `  </html>`


    另一种可能性是使用 `CDATA` 部分来包含整个 HTML：


    `<![CDATA[<html >` `  <head><title>Hello World in XHTML</title></head>` `  <body>Hello
    World!</body>` `  </html>]]>`


    这样，整个块将按原样、未经解释地发送给客户端。然而，发送本可以在源代码处进行 XML 合规性验证的代码，似乎是一种认输。你不觉得吗？


    **IE 和 XHTML**


    微软直到 IE9 才在其 Internet Explorer 中包含对 XHTML 的完全支持。不幸的是，IE9 至少需要 Windows Vista。如果你运行的是
    XP，那你运气不好。


    但即使你运行的是 Vista，为了安装 IE9，你首先需要安装 Service Pack 2，而它*不是*自动更新。此外，虽然所有其他浏览器在识别内容类型为
    `"text/html"` 的页面中的 XHTML 时都没有问题，但 IE 要求你将页面的 MIME 类型指定为 `"application/xhtml+xml"`。


    供你参考，2012 年 4 月，[`http://en.wikipedia.org/wiki/Web_browsers`](http://en.wikipedia.org/wiki/Web_browsers)
    报告称 IE [仍然] 约占全球浏览器使用量的 26%。大约在同一时间，[`http://www.statowl.com`](http://www.statowl.com)
    声称大约 36% 的已安装 IE 是版本 9。这意味着当时几乎 17% 的人无法查看 XHTML 页面。到你阅读本文时，这个百分比将显著下降，不仅因为更多人将升级到最新版本的
    IE，还因为许多人将转而使用 Chrome、Android 或其他浏览器。


