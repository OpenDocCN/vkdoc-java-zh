    #### 电子书城的文件夹结构


    图 3-6 展示了电子书城应用程序的结构。首先，在 `%CATALINA_HOME%\webapps\` 目录下创建应用程序的根文件夹，命名为 `ebookshop`。然后，按照图示创建文件夹层级，并将四个源文件
    `index.jsp`、`Checkout.jsp`、`ShoppingServlet.java` 和 `Book.java` 放入其中。


    ![图片](img/9781430246237_Fig03-06.jpg)


    ***图 3-6.** 电子书城文件夹结构*


    要让应用程序运行起来，你首先需要按照第 1 章的“Java 测试”部分所述，在命令行中使用 `javac` 编译这两个 Java 模块。然后将两个 `.class`
    文件从 `WEB-INF\src\ebookshop\` 复制到 `WEB-INF\classes\ebookshop\`。或者，如果你觉得麻烦（！），可以将清单
    3-6 中的小批处理文件复制到 `WEB-INF` 目录下，然后双击运行。请注意，如果你想从命令行启动它，必须先进入 WEB-INF 目录，否则它找不到 `src`
    文件夹。


    ***清单 3-6.** compile_it.bat*


    `@echo off`

    `set aname=ebookshop`

    `set /P fname=Please enter the java file name without extension:`

    `set fil=%aname%\%fname%`

    `echo *** compile_it.bat: compile src\%fil%.java`

    `javac -verbose -deprecation -Xlint:unchecked -classpath` ![图片](img/U002.jpg)

    `"C:\Program Files\Apache Software Foundation\Tomcat\lib\servlet-api.jar";classes`
    ![图片](img/U002.jpg)

    `  src\%fil%.java`

    `javac -verbose -deprecation -Xlint:unchecked -classpath classes src\%fil%.java`

    `if %errorlevel% GTR 1 goto _PAUSE`

    `echo *** compile_it.bat: move the class to the package directory`

    `move /y src\%fil%.class classes\%fil%.class`

    `:_PAUSE`

    `pause`


    该批处理文件会自动打开一个命令行窗口，并提示你输入 Java 文件的名称（不带扩展名）。然后它会编译该文件，并将生成的 class 文件移动到 `classes\ebookshop\`
    子文件夹中。带有 `javac` 的那一行调用了 Java 编译器，并使用了能够最大化编译器对源代码的检查以及你获得的信息量的开关。


    请注意 `classpath` 开关，它告诉编译器除了 Java 库通常存放的位置之外，还要在本地目录和 Tomcat 的 lib 文件夹中查找类。这是必要的，因为
    `ShoppingServlet.java` 导入了 `javax.servlet` 包和 `Book` 类，如果没有 `classpath` 开关，编译器将不知道在哪里找到它们。这也意味着你必须*先*编译
    `Book.java`，然后再编译 `ShoppingServlet.java`。


    在执行你的应用程序时，Tomcat 会在应用程序根文件夹（即 `bookshop\`）内部的 `WEB INF\classes\` 文件夹中查找类，而该根文件夹又位于
    `webapps` 内部。`WEB INF\classes\` 内部的目录结构必须反映你在 Java 源文件开头 `package` 语句中写的内容，即：


    `package ebookshop;`


    如果你改为这样写：


    `package myLibs.ebookshop;`


    那么你必须在 `classes` 文件夹下、`ebookshop` 文件夹之上插入一个 `myLibs` 文件夹。为避免混淆，请注意包名与应用程序的名称无关。也就是说，你可以将包（以及
    `classes\` 下的文件夹）命名为 `qwertyuiop` 而不是 `ebookshop`。事实上，你完全可以省略 `package` 语句，直接将你的类放在
    `classes` 文件夹内。最后，你也可以创建一个 JAR 文件（即 Java 归档文件），但我们稍后会讨论这一点。


    在准备就绪之前，你还需要编写一个额外的文件，在其中向 Tomcat 描述你的应用程序结构。这个 Web 部署描述符（如清单 3-7 所示）*必须*命名为 `web.xml`，并放置在
    `WEB INF` 目录中。


    ***清单 3-7.** web.xml*


    `<?xml version="1.0" encoding="ISO-8859-1"?>`

    `<web-app`


    `    xsi:schemaLocation=~CCC`

    `"http://java.sun.com/xml/ns/j2ee http://java.sun.com/xml/ns/j2ee/web-app_2_4.xsd"`

    `    version="2.4">`

    `  <display-name>Electronic Bookshop</display-name>`

    `  <description>`

    `    E-bookshop example for`

    `    Beginning JSP, JSF and Tomcat: from Novice to Professional`

    `    </description>`

    `  <servlet>`

    `    <servlet-name>EBookshopServlet</servlet-name>`

    **`    <servlet-class>ebookshop.ShoppingServlet</servlet-class>`**

    `    </servlet>`

    `  <servlet-mapping>`

    `    <servlet-name>EBookshopServlet</servlet-name>`

    **`    <url-pattern>/eshop</url-pattern>`**

    `    </servlet-mapping>`

    `</web-app>`


    以粗体突出显示的两行是关键行。第一行告诉 Tomcat，servlet 位于 `classes\ebookshop\ShoppingServlet.class`。第二行告诉
    Tomcat，请求将引用该 servlet 为 `/eshop`。由于此应用程序的根文件夹（即 `webapps` 内部的文件夹）是 `ebookshop`，因此
    Tomcat 会将所有针对 URL [`http://servername:8080/ebookshop/eshop`](http://servername:8080/ebookshop/eshop)
    的请求路由到此 servlet。


    `<servlet>` 和 `<servlet mapping>` 中的 `<servlet name>` 元素仅用于建立两者之间的连接。在 `web.xml`
    中声明 servlet 的另一种方法是在 `ShoppingServlet.java` 中使用注解。要测试这一点，请从 `web.xml` 中删除 `servlet`
    和 `servlet-mapping` 元素。然后，在 `ShoppingServlet.java` 中插入如下代码片段所示的两行：


    `import ebookshop.Book;`

    **`import javax.servlet.annotation.WebServlet;`**

    **`@WebServlet(value="/eshop")`**

    `public class ShoppingServlet extends HttpServlet {`


    无论你如何声明 servlet，如果你现在打开浏览器并输入 [`http://localhost:8080/ebookshop/`](http://localhost:8080/ebookshop/)，你应该会看到应用程序的主页。


    你可能想知道 `META INF` 文件夹的用途。在该文件夹中放置一个名为 `MANIFEST.MF` 的文件，并包含以下单行内容：


    `Manifest-Version: 1.0`


    将 `webapps\ebookshop` 文件夹移动到桌面，打开它并选中其中的所有四个项目。然后，右键单击它们并选择“`发送到` ![图片](img/U001.jpg)
    `压缩(zipped)文件夹`”。当提示提供文件名时，输入 `ebookshop`。Windows 将创建一个名为 `ebookshop.zip` 的文件。将其扩展名更改为
    `war`（代表 Web 归档文件），并将其移动到 Tomcat 的 `webapps` 文件夹中。稍等片刻，Tomcat 会自动将 WAR 文件解包到一个名为
    `ebookshop` 的文件夹中，该文件夹与你开始时使用的文件夹完全相同。


    清单文件包含有关打包在 JAR 文件中的文件的信息，而 WAR 文件只是一个具有特定功能的 JAR。你可以在 [`http://docs.oracle.com/javase/7/docs/technotes/guides/jar/jar.html#JAR%20Manifest`](http://docs.oracle.com/javase/7/docs/technotes/guides/jar/jar.html#JAR%20Manifest)
    找到清单文件的规范。


    WAR 文件是将应用程序部署到多个服务器的最佳方式：将它们复制到 `webapps` 中，Tomcat 会为你完成其余工作。还有什么比这更简单的呢？

