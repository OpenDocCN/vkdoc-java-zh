    #### x:parse


    通过 `starfleet.jsp`，你刚刚看到了一个如何使用 `x:parse` 和 XPath 将 XML 转换为 HTML 的示例。表 5-5 总结了
    `x:parse` 支持的所有属性。你可以在 [`http://www.ibm.com/developerworks/java/library/j-jstl0520/`](http://www.ibm.com/developerworks/java/library/j-jstl0520/)
    找到关于 `x:parse` 的很好的参考。


    ![Image](img/9781430246237_Tab05-05.jpg)


    除了将 XML 源代码存储在 `doc` 属性中，你还可以使 `x:parse` 成为一个带体的动作，并将源 XML 存储在其体中。


    #### XSLT：从一种 XML 格式到另一种的转换


    在本章开头，我向你展示了文件 `enterprises.xml`（清单 5.1），后来，为了解释 XPath，我将其扩展为 `starfleet.xml`（清单
    5-9）。


    但是 `enterprises.xml` 中包含的信息不仅仅是更大的 `starfleet.xml` 的子集，因为编码方式也不同。特别是，与 `starfleet.xml`
    的不同之处在于：


    > *   存在一个 `title` 元素

    > *   删除了 `class` 元素中的 `commissioned` 属性

    > *   将 `class` 体替换为一个名为 `name` 的属性


    清单 5-11 向你展示了一个 XSL 样式表，它允许你从 `starfleet.xml` 中提取 `enterprises.xml`。


    ***清单 5-11.** enterprises.xsl*


