    `second.jsp`？


    要解决这第二个谜团，你必须查看你在 `WEB-INF` 中找到的另一个文件：`faces-config.xml`（参见清单 7-7）。


    ***清单 7-7.** faces-config.xml*


    `<?xml version="1.0" encoding="UTF-8"?>` `<faces-config`   `    xsi:schemaLocation="http://java.sun.com/xml/ns/javaee
    ~CCC` `http://java.sun.com/xml/ns/javaee/web-facesconfig_2_0.xsd"` `    version="2.0"`
    `    >` `  <managed-bean>` `    <managed-bean-name>aStringBean</managed-bean-name>`
    `    <managed-bean-class>AString</managed-bean-class>` `    <managed-bean-scope>session</managed-bean-scope>`
    `    <managed-property>` `      <property-name>str</property-name>` `      <property-class>java.lang.String</property-class>`
    `      <null-value></null-value>` `      </managed-property>` `    </managed-bean>`
    **`  <navigation-rule>`** **`    <from-view-id>/first.jsp</from-view-id>`** **`    <navigation-case>`**
    **`      <from-outcome>goOn</from-outcome>`** **`      <to-view-id>/second.jsp</to-view-id>`**
    **`      </navigation-case>`** **`    </navigation-rule>`** `  <navigation-rule>`
    `    <from-view-id>/second.jsp</from-view-id>` `    <navigation-case>` `      <from-outcome>goBack</from-outcome>`
    `      <to-view-id>/first.jsp</to-view-id>` `      </navigation-case>` `    </navigation-rule>`
    `  </faces-config>`


    暂时专注于我突出显示的部分。它告诉 JSF，当页面 `first.jsp` 以结果 `goOn` 结束时（即，执行带有动作 `goOn` 的 `h:commandButton`），控制权应转到
    `second.jsp`。在更复杂的应用程序中，`first.jsp` 将包含不同的动作，这些动作对应于不同的 `navigation-case` 元素。然后，JSF
    servlet 将具有类似于 Java switch 语句的功能。


    我们快到了。接下来需要解释的是你在 `faces-config.xml` 中看到的紧接在第一个导航规则上方的 `managed-bean` 元素。它告诉 JSF
    管理一个会话作用域的对象，名为 `aStringBean`，类型为 `AString`，并管理其名为 `str` 的属性，该属性应初始化为 `null`。这也意味着
    JSF servlet 将自动实例化该对象。


    这就是你在 `first.jsp` 和 `second.jsp` 的 EL 表达式中看到的名称 `aStringBean` 的来源。我可以选择任何名称，但以
    `Bean` 结尾命名此类受管 bean 是一种好的做法。


    此外，默认作用域是 `request`。但通过指定 `session`，我确保了 `aStringBean` 在第一个请求之后不会被销毁。在示例中，这意味着
    `first.jsp` 的第二次执行中的输入元素将没有默认值。如果 `first.jsp` 执行的是自身而不是 `second.jsp`，那么 `request`
    作用域就足以“记住”默认值。请注意，你应该注意不要过度在会话中存储信息，因为这可能会影响应用程序的性能。请记住，每个新用户都会导致创建一个新会话。


    完成 JSF 谜题所需的最后一块是类 `AString` 的定义。为此，请参见清单 7-8。


    ***清单 7-8.** AString.java*


    `import java.io.Serializable;` `public class AString implements Serializable {`
    `  String str;` `  public String getStr() { return str; }` `  public void setStr(String
    s) { str = s; }` `  }`


    为了使 `simplef` 工作，`AString.class` 应该位于 `WEB-INF` 的 `classes` 子目录中。


    `AString` 是 JSF 所需的最简单的 bean。实际上，你可以删除 `import` 语句并移除 `Serializable` 的实现。它们的存在是因为它们使
    Tomcat 能够将对象保存到磁盘并从磁盘检索它。服务器可能在重负载或重新启动时使用硬盘来停放会话数据。这是尽可能保持会话大小的又一个原因。请注意，Tomcat
    只能保存它能够转换为数据输出流的对象，这要求对象是可序列化的。


    底线是，为了完全安全，当你的受管 bean 被定义为处于 `session` 作用域时，它们应该是可序列化的。但你不一定需要这样做。这意味着在重负载条件下，某些会话可能会被突然终止。


    ![Image](img/square.jpg) **提示** 你会发现，有时如果你在开发 JSF 应用程序时犯了一个导致其失败的错误，那么当你恢复到犯错之前的版本时，该应用程序将无法再次工作。这与缓存有关。在开发环境中，最简单的解决方法是重新启动浏览器和
    Tomcat。


    #### <managed-bean> 的替代方案


    Java 注解是一种提供关于类或对象信息的方式。你在第 6 章中看到了一个注解示例（参见清单 6.17），其中我使用了 `@SuppressWarnings`
    `("unchecked")` 来告诉 Java 编译器在处理后面的语句时如何表现。


    JSF 支持注解，你可以在 Java bean 中使用它们来替换 `faces-config.xml` 中的 `<managed-bean>` 元素。换句话说，如果你使用如清单
    7-9 所示的 `AString.java` 的注解版本，你可以完全从清单 7-7 所示的 `faces-config.xml` 中移除 `<managed-bean>`
    元素。


    ***清单 7-9.** AString.java（注解版本）*


    `import javax.faces.bean.ManagedBean;` `import javax.faces.bean.SessionScoped;`
    `import javax.faces.bean.ManagedProperty;` `@ManagedBean(name="aStringBean")`
    `@SessionScoped` `public class AString {` `  @ManagedProperty(value="#{AString.str}")`
    `  String str;` `  public String getStr() { return str; }` `  public void setStr(String
    s) { str = s; }` `  }`


    我认为这是不言自明的。如果你删除 `@ManagedBean` 后面的括号赋值，在 JSP 中你必须使用类名作为 bean 对象名称，并将其首字母改为小写。


    为简单起见，我在本章的软件包中包含了一个单独的文件夹，其中包含 `simplef` 的注解版本。你可以在其中找到 WAR 文件，你可以轻松地将其导入 Eclipse
    或放入 Tomcat 的 `webapps` 文件夹，以及一个已展开的文件夹（你也可以将其放入 `webapps`）。


    ### simplefx 和 simpleh 应用程序


    在上一节中，我向你展示了如何使用 JSP 页面构建一个简单的 JSF 应用程序。要使用 JSP 文档（即 XML 格式）使用 JSF，你只需要进行最小的更改。要将
    `first.jsp`（清单 7.1）转换为 `first.jspx`，你只需要进行第 5 章最后一节中描述的标准更改，并将两个 JSF `taglib`
    动作替换为相应的命名空间声明，如清单 7-10 所示。


    ***清单 7-10.** first.jspx*


    `<?xml version="1.0" encoding="UTF-8"?>` `<jsp:root`    `  version="2.1"` `  >`
