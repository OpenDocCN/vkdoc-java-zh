    Windows 中启动 Tomcat 服务。


    像之前在 Eclipse 中启动项目时那样，右键点击 `test` 项目文件夹，但这次选择 `Export` ![Image](img/U001.jpg)
    `WAR File`。


    当 WAR 导出界面出现时，您唯一需要做的就是浏览并选择目标位置，该位置应为 `%CATALINA_HOME%\webapps\test.war`，然后点击
    `Finish`。


    在浏览器中，输入 [`http://localhost:8080/test`](http://localhost:8080/test) 来查看项目的输出。这之所以有效，是因为正如我在上一节末尾向您展示的那样，Tomcat
    会自动展开其在 `webapps` 文件夹中发现的所有 WAR 文件，无需重启。并且因为默认情况下，Tomcat 会查找 `index.html`、`index.htm`
    和 `index.jsp`。如果您愿意，可以通过将以下元素添加到 `web.xml` 的 `web-app` 元素主体中来更改默认设置：


    `<welcome-file-list>`

    `    <welcome-file>whatever.jsp</welcome-file>`

    `</welcome-file-list>`


    #### 导入 WAR 文件


    在下一节中，我将向您介绍 `eshop` 应用程序。您可以在本章的软件中找到该应用程序的 Web 归档文件，处理该应用程序最简单的方法是将其导入 Eclipse。


    第一步是在 `File` 菜单中选择 `Import...` 菜单项。当 `Select` 对话框打开时，向下滚动到名为 `Web` 的文件夹，将其展开，选择
    `WAR file`，然后点击 `Next >`，如图 3-14 所示。


    ![Image](img/9781430246237_Fig03-14.jpg)


    ***图 3-14.** Eclipse – 选择导入 WAR 文件*


    当下一个对话框出现时，浏览并选择 `eshop.war`，然后点击 `Finish`。Eclipse 将为您创建 `eshop` 项目。


    #### Eclipse 的偶发性错误


    Eclipse 是一个由多人并行开发的非常复杂的软件包。因此，偶尔会出现错误。


    在为本书开发应用程序时，就突然出现了一个这样的错误：Eclipse 报告说 JSP 标准标签库的一个函数不存在。


    Eclipse 会验证 JSP 文件，但不会对它们进行任何处理。因此，我忽略了报告的错误，并将应用程序部署到 Tomcat，Tomcat 毫无问题地执行了它。


    我不知道为什么 Eclipse 开始报告那个不存在的错误。如果您搜索互联网，您会发现有几个人遇到过 Eclipse 验证 JSP 的一些问题。


    当此类问题发生时，只要它们不影响您的应用程序，您实际上无需做任何事情。您可以重新安装 Eclipse，但这可能无法解决问题，或者问题可能稍后再次出现。


    ### 更好的在线书店


    您在本章开头看到的在线书店是对 MVC 架构的一个很好的介绍，但为了探索数据库的使用、其他 JSP 特性以及 JSF，我们需要一个内容更丰富的示例。在本节中，我将介绍
    `eshop` 应用程序，它将在本书的其余部分中一直陪伴我们。采用面向对象的方法，我将首先指定应用程序需要处理的对象、这些对象支持的操作，以及执行这些操作的人员的角色。


    每个角色对应一个单独的用户界面，两个主要角色是管理员和客户。管理员管理产品、订单和客户记录，但就我们的目的而言，实现客户从目录中购买的公共界面就足够了。


    #### 对象与操作


    在 `eshop` 中，我们不会跟踪订单和客户。一旦客户进入结账流程，输入信用卡信息并完成结账，我们将保存订单，但不会对其进行任何处理。在现实世界中，我们必须通过从信用卡账户扣款和发货来处理购买。


    事实上，如果您决定“在现实世界中”部署此应用程序来销售书籍或其他物品，那么最好与 PayPal 或其他在线支付服务对接，而不是直接接受信用卡。但此示例的目的是帮助您学习
    JSP 和 JSF，而不会陷入其他服务的细节中。为此，信用卡选项就足够了。显然，在现实世界中，您必须考虑使用安全通信和加密数据，但这超出了本示例的范围。

