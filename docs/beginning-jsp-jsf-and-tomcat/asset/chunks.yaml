    。这将打开一个命令行窗口，你首先必须在此处键入密码才能访问服务器。如果你按照我的建议删除了密码，你只需要按 `Enter`。客户端将通过显示 \"`mysql>`\
    \ \" 提示符来响应。使用文本编辑器打开 `shop_create.sql`，将所有内容复制到剪贴板，然后粘贴到命令行客户端上。[清单 6-2](#Chapter06.html#list_6_2)\
