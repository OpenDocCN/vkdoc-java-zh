    ### 你好，世界！


    一个简单的 JSP 示例将让你更实际地了解 JSP 的工作原理。让我们再次从 HTML 开始。清单 1-2 展示了一个纯 HTML 页面，用于在浏览器窗口中显示“Hello
    World!”。


    ***清单 1-2.** hello.html*


    `<html>`

    `<head><title>Hello World 静态 HTML</title></head>`

    `<body>`

    `Hello World!`

    `</body>`

    `</html>`


    创建文件夹 `%CATALINA_HOME%\webapps\ROOT\tests\`，并将 `hello.html` 存储在其中。然后在浏览器中输入以下
    URL 来查看网页：


    [`http://localhost:8080/tests/hello.html`](http://localhost:8080/tests/hello.html)


    通常，要让浏览器检查页面语法是否符合万维网联盟（W3C）的 XHTML 标准，你需要以以下行开头：


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"`

    `  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">`


    你还需要将


    `<html>`


    替换为


    `<html >`


    然而，对于这个简单的示例，我倾向于只保留必要的代码。图 1-9 展示了此页面在浏览器中的显示效果。


    ![Image](img/9781430246237_Fig01-09.jpg)


    ***图 1-9.** 纯 HTML 中的“Hello World!”*


    如果你让浏览器显示页面源代码，毫不意外，你将看到与清单 1-2 完全一致的内容。要使用 JSP 页面获得相同的结果，你只需在第一行之前插入一个 JSP 指令，如清单
    1-3 所示，并将文件扩展名从 `.html` 改为 `.jsp`。


    ***清单 1-3.** 一个平淡无奇的 JSP 页面中的“Hello World!”*


    `<%@page language="java" contentType="text/html"%>`

    `<html>`

    `<head><title>Hello World 非动态 HTML</title></head>`

    `<body>`

    `Hello World!`

    `</body>`

    `</html>`


    显然，对于这样一个简单的页面，使用 JSP 意义不大。只有当你包含动态内容时，使用 JSP 才值得。请查看清单 1-4 以获取更有趣的内容。


    ***清单 1-4.** hello.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<html>`

    `<head><title>Hello World 动态 HTML</title></head>`

    `<body>`

    `Hello World!`

    `<%`

    `  out.println("<br/>你的 IP 地址是 " + request.getRemoteAddr());`


    `  String userAgent = request.getHeader("user-agent");`

    `  String browser = "unknown";`


    `  out.print("<br/>你的浏览器是 ");`

    `  if (userAgent != null) {`

    `    if (userAgent.indexOf("MSIE") > -1) {`

    `      browser = "MS Internet Explorer";`

    `      }`

    `    else if (userAgent.indexOf("Firefox") > -1) {`

    `      browser = "Mozilla Firefox";`

    `      }`

    `    else if (userAgent.indexOf("Opera") > -1) {`

    `      browser = "Opera";`

    `      }`

    `    else if (userAgent.indexOf("Chrome") > -1) {`

    `      browser = "Google Chrome";`

    `      }`

    `    else if (userAgent.indexOf("Safari") > -1) {`

    `      browser = "Apple Safari";`

    `      }`

    `    }`

    `  out.println(browser);`

    `  %>`

    `</body>`

    `</html>`


    与 `hello.html` 类似，你可以通过将 `hello.jsp` 放置在 Tomcat 的 `ROOT\tests` 文件夹中来查看它。


    `<% ... %>` 对中的代码是用 Java 编写的一个脚本小程序。当 Tomcat 的 JSP 引擎解释此模块时，它会创建一个如清单 1-5 所示的
    Java Servlet（已移除一些缩进和空行）。


    ***清单 1-5.** 来自“Hello World!”JSP 页面的 Java 代码*


    `out.write("\r\n");`

    `out.write("<html>\r\n");`

    `out.write("<head><title>Hello World 动态 HTML</title></head>\r\n");`

    `out.write("<body>\r\n");`

    `out.write("Hello World!\r\n");`

    `out.write(''\r'');`

    `out.write(''\n'');`

    **`out.println("<br/>你的 IP 地址是 " + request.getRemoteAddr());`**

    **`String userAgent = request.getHeader("user-agent");`**

    **`String browser = "unknown";`**

    **`out.print("<br/>你的浏览器是 ");`**

    **`if (userAgent != null) {`**

    **`  if (userAgent.indexOf("MSIE") > -1) {`**

    **`    browser = "MS Internet Explorer";`**

    **`    }`**

    **`  else if (userAgent.indexOf("Firefox") > -1) {`**

    **`    browser = "Mozilla Firefox";`**

    **`    }`**

    **`  else if (userAgent.indexOf("Opera") > -1) {`**

    **`    browser = "Opera";`**

    **`    }`**

    **`  else if (userAgent.indexOf("Chrome") > -1) {`**

    **`    browser = "Google Chrome";`**

    **`    }`**

    **`  else if (userAgent.indexOf("Safari") > -1) {`**

    **`    browser = "Apple Safari";`**

    **`    }`**

    **`  }`**

    **`out.println(browser);`**

    `out.write("\r\n");`

    `out.write("</body>\r\n");`

    `out.write("</html>\r\n");`


    正如我之前所说，每当浏览器向服务器发送请求时，这个 Servlet 都会执行。然而，在清单 1-5 所示的代码执行之前，服务器会将变量 `out` 绑定到一个与
    HTML 响应内容相关联的字符流。因此，写入 `out` 的所有内容最终都会出现在你将在浏览器中看到的 HTML 页面中。如你所见，Tomcat 会将 JSP
    文件中的脚本小程序复制到 Servlet 中，并将脚本小程序之外的所有内容直接发送到输出。这应该能阐明 HTML 和 Java 如何在 JSP 页面中协同工作。


    由于变量 `out` 在每个 Servlet 中都已定义，你可以在任何 JSP 模块中使用它来向响应中插入内容（更多关于变量的内容请参见第 2 章）。


    另一个这样的“全局”JSP 变量是 `request`（类型为 `HttpServletRequest`）。请求包含了发起请求的 IP 地址——即远程计算机（带有浏览器）的地址（请记住，此代码在服务器上运行）。要从请求中提取地址，你只需执行其方法
    `getRemoteAddr()`。请求还包含有关浏览器的信息。当某些浏览器发送请求时，它们会提供一些可能具有误导性的信息，并且格式很复杂。然而，清单 1-4
    中的代码向你展示了如何识别最广泛使用的浏览器。


    如果你在 JSP 中添加以下行


    `out.println("<br/>" + userAgent);`


    你将看到请求中包含的信息。它还会告诉你浏览器是在 Windows 系统还是 Mac 上运行。


    图 1-10 显示了生成的页面在浏览器中的样子。


    ![Image](img/9781430246237_Fig01-10.jpg)


    ***图 1-10.** 使用 Google Chrome 浏览器时的 JSP “Hello World!”*


    请注意，IP 地址 `127.0.0.1` 与主机 `localhost` 是一致的。如果你恰好想确认 HTML 确实是动态的，请查看图 1-11。顺便提一下，你在
    `hello.jsp` 中用于识别 Internet Explorer 的方法是微软提供的官方方法。


    ![Image](img/9781430246237_Fig01-11.jpg)


    ***图 1-11.** 使用 Mozilla Firefox 浏览器时的 JSP “Hello World!”*

