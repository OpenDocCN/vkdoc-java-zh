    `out.write("</html>\r\n");`


    As I said before, this servlet executes every time a browser sends a request to
    the server. However, before the code shown in [Listing 1-5](#Chapter01.html#list_1_5)
    executes, the server binds the variable `out` to a character stream associated
    with the content of the HTML response. As a result, everything written to `out`
    ends up in the HTML page that you’ll see in your browser. As you can see, Tomcat
    copies the scriptlet in your JSP file into the servlet, and sends everything outside
    the scriptlet directly to the output. This should clarify how HTML and Java work
    together in a JSP page.


    As the variable `out` is defined in each servlet, you can use it within any JSP
    module to insert something into the response (more on variables in [Chapter 2](#Chapter02.html)).


    Another such “global” JSP variable is `request` (of type `HttpServletRequest`).
    The request contains the IP address from which the request was originated—that
    is, of the remote computer with the browser (remember that this code runs on the
    server). To extract the address from the request, you only need to execute its
    method `getRemoteAddr()`. The request also contains information about the browser.
    When some browsers send a request, they provide somewhat misleading information,
    and the format is complex. However, the code in [Listing 1-4](#Chapter01.html#list_1_4)
    shows you how to recognize the most widely used browsers.


    If you add to your JSP the line


    `out.println("<br/>" + userAgent);`


    You will see what information is contained in the request. It also tells you whether
    the browser is running on a Windows system or a Mac.


    [Figure 1-10](#Chapter01.html#fig_1_10) shows the generated page as it appears
    in a browser.


    ![Image](images/9781430246237_Fig01-10.jpg)


    ***Figure 1-10.** “Hello World!” in JSP with Google Chrome*


    Notice that the IP address `127.0.0.1` is consistent with the host `localhost`.
    And just in case you want to see that the HTML is indeed dynamic, check out [Figure
    1-11](#Chapter01.html#fig_1_11). Incidentally, the method you use in `hello.jsp`
    to identify Internet Explorer is the official one provided by Microsoft.


    ![Image](images/9781430246237_Fig01-11.jpg)


    ***Figure 1-11.** “Hello World!” in JSP with Mozilla Firefox*'
