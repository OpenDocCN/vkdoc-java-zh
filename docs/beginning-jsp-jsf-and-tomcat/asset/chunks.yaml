    `Sat Jun 23 21:56:27 EST 2012`


    你可能会看到其他时区，但格式将是相同的。检查你所在时区缩写的一个好地方是 [`http://www.timeanddate.com/library/abbreviations/timezones/`](http://www.timeanddate.com/library/abbreviations/timezones/)。


