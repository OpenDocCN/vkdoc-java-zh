    You need to insert the lines shown in [Listing 6-5](#Chapter06.html#list_6_5)
    within the body of the `web-app` element.    ***Listing 6-5.** web.xml Fragment
    to Define Initialization Parameters*  `<context-param>` `  <param-name>dbName</param-name>`
    `  <param-value>my-database-name</param-value>` `  </context-param>` `<context-param>`
