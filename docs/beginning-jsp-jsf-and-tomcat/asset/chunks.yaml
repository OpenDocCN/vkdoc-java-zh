    \ flush=\"true\"/>\n13: <jsp:include page=\"LeftMenu.jsp\" flush=\"true\"/>\n\
    14: <div class=\"content\">\n15:   <h2>Order</h2>\n16:   <jsp:useBean id=\"customer\"\
    \ class=\"eshop.beans.Customer\"/>\n17:   <jsp:setProperty property=\"*\" name=\"\
    customer\"/>\n**18: <%**\n**19:     long orderId = dataManager.insertOrder(**\n\
    **20:                      customer,**\n**21:                      (Hashtable)session.getAttribute(\"\
    shoppingCart\")**\n**22:                      );**\n**23:     if (orderId > 0L)\
