    ***Listing 4-16.** req_params_jstl.jsp*


    `01: <%@page language="java" contentType="text/html"%>`

    `02: <%@taglib prefix="c" uri="http://java.sun.com/jsp/jstl/core"%>`

    `03: <%@taglib prefix="fn" uri="http://java.sun.com/jsp/jstl/functions"%>`

    `04: <html><head><title>Request Parameters with JSTL</title></head><body>`

    `05:   Map size = <c:out value="${fn:length(paramValues)}"/>`

    `06:   <table border="1">`

    `07:     <tr><td>Map element</td><td>Par name</td><td>Par value[s]</td></tr>`

    `08:     <c:set var="k" value="0"/>`

    `09:     <c:forEach var="par" items="${paramValues}"><tr>`

    `10:       <td><c:out value="${k}"/></td>`

    `11:       <td><c:out value="''${par.key}''"/></td>`

    `12:       <td><c:forEach var="val" items="${par.value}">`

    `13:         <c:out value="''${val}''"/>`

    `14:         </c:forEach></td>`

    `15:       <c:set var="k" value="${k+1}"/>`

    `16:       </tr></c:forEach>`

    `17:     </table>`

    `18: </body></html>`


    Notice that, as there are no scripting elements, I have removed the importing
    of Java libraries.


    Lines 2 and 3 show the `taglib` directives for JSTL core and functions. In Line
    5, you can see how to use the `fn:length` function to determine the size of the
    EL implicit object `paramValues` and the `c:out` action to send the value of an
    EL expression to the output. You could have just written the naked EL expression,
    but `c:out` automatically converts characters that have special HTML meaning to
    the corresponding HTTP entities. For example, it writes `&amp;` instead of `&`.
    Therefore, it’s better to use `c:out`.


    `c:set` initializes an index in line 8 and increments it in line 15\. In lines
    9 and 12, `c:forEach` lets you go through the elements of maps and arrays.


    If you type in your browser


    [`http://localhost:8080/tests/req_params_jstl.jsp?a=b&c=d&a=zzz&empty=&empty=&1=22`](http://localhost:8080/tests/req_params_jstl.jsp?a=b&c=d&a=zzz&empty=&empty=&1=22)


    you’ll get the same output shown in [Figure 1-12](#Chapter01.html#fig_1_12) for
    `req_params.jsp` (see [Figure 4-3](#Chapter04.html#fig_4_3)). Although, to be
    completely correct, the format of the HTML will be different.


    ![Image](images/9781430246237_Fig04-03.jpg)


    ***Figure 4-3.** Output of req_params_jstl.jsp*


    In essence, `c:out` is for EL expressions what an expression scripting element
    is for JSP (i.e., Java) expressions. Beside the attribute `value`, it supports
    `default`, to provide a fallback output, and `escapeXml`, that you set to `false`
    to prevent the escaping of XML characters, which are escaped by default.


    With `c:set`, besides defining `var` and `value`, you can also specify the scope
    of the variable with the attribute `scope`. Finally, in alternative to `var`,
    you can use the pair of attributes `property` and `target` to specify which property
    of which object you want to modify.


    In the example, you have seen that `c:forEach` lets you loop over a list of objects
    with the two attributes `var` and `items`. Alternatively, you can go through a
    list by means of the attributes `begin`, where `0` indicates the first element,
    `end`, and `step`. Further, if you define the name of a variable by setting the
    attribute `varStatus`, `c:forEach` will store in it an object of type `javax.servlet.jsp.jstl.core.LoopTagStatus`.


    As these attributes are pretty straightforward, the best way for you to become
    familiar with them is to write a small page and see what happens when you set
    them to different values.


    Before moving on, have a look at [Table 4-9](#Chapter04.html#tab_4_9). It lists
    what types of objects you can assign to the attribute `items` and, correspondingly,
    what type of objects you get in the variable defined through `var`.


    ![Image](images/9781430246237_Tab04-09.jpg)


    ![Image](images/9781430246237_Tab04-09a.jpg)


    ##### c:if, c:choose, c:when, and c:otherwise


    The JSTL versions of Java’s `if` and `switch` are particularly useful tags. For
    example, the body of the following action is executed only if the EL expression
    calculates to `true`:


    `<c:if test="`*`EL-expression`*`"> ... </c:if>`


    Unfortunately, there is no `c:else`, but the JSTL version of `switch` (`c:choose`)
    is much more powerful than its Java counterpart. In fact, it’s more like a chain
    of `if` .. `else`:


    `<c:choose>`

    `  <c:when test="`*`EL-expression-1`*`"> ... </c:when>`

    `  <c:when test="`*`EL-expression-2`*`"> ... </c:when>`

    `  ...`

    `  <c:otherwise> ... </c:otherwise>`

    `  </c:choose>`


    Besides `test`, which lets you define the condition you want to test, `c:if` supports
    the two attributes `var` and `scope`, which `c:if` uses to store the condition’s
    result.


    There is no attribute supported by `c:choose` and `c:otherwise`, and `c:when`
    only supports `test`.


    ##### c:catch, c:remove, and c:url


    With `c:catch` you can catch the exceptions that occur within its body. It accepts
    a `var` attribute, where it stores the result of the exception, of type `java.lang.Throwable`.
    For example, the following two lines will insert into the output the string "`java.lang.ArithmaticException:
    / by zero`".


    `<c:catch var="e"><% int k = 1/0; %></c:catch>`

    `<c:if test="${e != null}"><c:out value="${e}"/></c:if>`


    `c:remove` lets you remove the variable defined in its pair of attributes `var`
    and `scope`.


    `c:url` formats a string into a URL, which it then inserts into the output, like
    in the following example:


    `<a href="<c:url value="/tests/hello.jsp"/>">Hello World</a>`


    Notice the nested double quotes. This is not a problem, because Tomcat processes
    the action on the server and replaces it with a string representing the URL. The
    client doesn’t see the inner double quotes.


    You can also specify a `var`/`scope` pair of attributes to store the generated
    URL into a scoped variable and the attribute `context` to refer to another application.
    If you use the bodied form of `c:url`, you can define with `c:param` additional
    parameters that will be appended to the URL.


    ##### c:import, c:redirect, and c:param


    `c:import` and `c:redirect` are generalized versions of the standard actions `jsp:include`
    and `jsp:forward`. The main difference is that the JSTL actions are not limited
    to the scope of the current application. They let you include or forward to any
    URL via the attribute `url`, which is in both cases the only attribute required.


    The general syntax of c:import is as follows:


    `<c:import url="expr1" context="expr2" charEncoding="expr3" var="name" scope="scope">`

    `  <c:param name="expr4" value="expr5"/>`

    `  ...`

    `  </c:import>`


    By now, everything should be pretty clear to you. The only thing worth mentioning
    is that the default value for `charEncoding` is "`ISO-8859-1`". I prefer to use
    `UTF-8` because it is equally supported by all operating systems. Also, UTF-8
    can handle non-European languages and has become the de-facto standard on the
    Web. In case you are curious, UTF stands for UCS Transformation Format, where
    UCS means Universal Character Set.


    `c:redirect` is equivalent to invoking `javax.servlet.http.HttpServletResponse.sendRedirect`
    and only admits the two attributes `url` and `context`. When designing a web site,
    you might find it useful to remember that `c:redirect` changes the page that the
    user sees, thereby affecting the setting of bookmarks, while with `jsp:forward`,
    the user remains unaware of the page change.


    ##### c:forTokens


    In addition to `c:forEach`, the JSTL provides a form of string tokenizer, which
    lets you easily extract from a string the sub-strings separated by one or more
    delimiters.


    If you have a comma as a single delimiter, you can use `c:forEach`, but if you
    have more than one delimiter, or if the only delimiter is not a comma, `c:forTokens`
    is for you.


    The general syntax of `c:forTokens` is as follows:


    `<c:forTokens var="name" items="expr1" delims="expr2" varStatus="name"`

    `    begin="expr3" end="expr4" step="expr5">`

    `  ...`

    `</c:forTokens>`'
