    ### 总结


    在本章中，我向你介绍了如何使用数据库和 SQL。我解释了如何通过 Java SQL API 从 JSP 访问数据库。特别是，我向你展示了如何建立连接、插入数据和执行查询。为了完成基本数据库操作的总结，我还描述了如何将基本更新分组到事务中。


    为了将所有内容整合在一起，我描述了 E-shop 应用程序中数据库操作的设计，并向你展示了它们使用脚本小程序和 XML 语法的实现。最后，我提到了 MySQL
    的可能替代方案，并描述了如何从 JSP 像访问数据库一样访问电子表格。


    做好准备，因为在下一章中，我终于要讨论 JSF 了！


    ## 第 7 章


    ![Image](img/3square.jpg)


    ## JavaServer Faces 2.2


    在本章中，我将向你介绍 JSF，并向你展示如何使用它为基于 Web 的应用程序创建用户界面。在我于第 3 章中描述的 MVC 应用程序架构（参见图 3-2）中，JSF
    取代了控制器的位置，从而调解 JSP（视图）和封装应用程序数据的模型之间的每一次交互。JSF 通过以下方式使 Web 应用程序的开发更容易：


    > *   允许你从一组连接到服务器端对象的标准 UI 组件创建用户界面

    > *   提供四个自定义标签库来处理这些 UI 组件

    > *   提供一种扩展标准 UI 组件的机制


    JSF 透明地保存 UI 组件的状态信息，并在重新显示时重新填充表单。这是可能的，因为组件的状态存在于 HTTP 请求的生命周期之外。JSF 通过提供一个控制器
    servlet 和一个包含事件处理、服务器端验证、数据转换和组件渲染的组件模型来运行。毫不奇怪，JSF 不会改变你已经从 JSP 了解的基本页面生命周期：客户端发出
    HTTP 请求，服务器用动态生成的 HTML 页面进行响应。


    JSF 应用程序的用户界面，称为*视图*，由基于 `javax.faces.component.UIComponent` 类的 UI 组件对象树组成。有些组件很简单，例如按钮或文本字段。其他的则很复杂，例如表格或树控件元素。


    请注意，JSF 不太容易使用，并且需要付出不小的初始努力才能使其运行起来。然而，一旦你熟悉了 JSF，回报就会到来，然后你可以更快速、更高效地开发用户界面。你可以在
    Oracle JSF 实现的主项目对象模型（POM）文件中找到最新版本的 JSF，网址为 [`http://mvnrepository.com/artifact/org.glassfish/javax.faces/`](http://mvnrepository.com/artifact/org.glassfish/javax.faces/)。该文件包括
    JSF 最新版本的二进制文件、文档和依赖项。要能够使用 JSF，你需要将 `javax.faces-2.1.7.jar`（或更新版本）复制到 Tomcat
    的 `lib` 文件夹并重新启动 Tomcat。


    你可以通过访问 [`http://jcp.org/en/jsr/detail?id=344`](http://jcp.org/en/jsr/detail?id=344)
    并单击 `download page` 链接来下载最新的 JSF 规范（JSR-344 – JSF 2.2）。


    让我们从一个简单的 JSF 应用程序开始，这样你就可以看到 JSF 在实践中是如何工作的。


