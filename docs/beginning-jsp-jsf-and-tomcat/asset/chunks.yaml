- fmt: "#### The `page` Directive\n\nThe `page` directive defines several page-dependent\
    \ properties expressed through attributes. These properties should appear only\
    \ once in a JSP page (unless the multiple instances all have the same value, but\
    \ why should you do that?). You can write more than one `page` directive in a\
    \ JSP page, and they will all apply. Their order or position within the page is\
    \ generally irrelevant.\n\nThis directive is used in all JSP pages. Typically,\
    \ a JSP page starts with a `page` directive to tell Tomcat that the scripting\
    \ language is Java and that the output is to be HTML:\n\n`<%@page language=\"\
    java\" contentType=\"text/html\"%>`\n\nThis is almost always followed by one or\
    \ more further `page` directives to tell Tomcat which external class definitions\
    \ your code needs. For example:\n\n`<%@page import=\"java.util.ArrayList\"%>`\n\
    `<%@page import=\"java.util.Iterator\"%>`\n`<%@page import=\"myBeans.OneOfMyBeans\"\
    %>`\n\nIt is *not* good coding practice to import whole class libraries, as in\n\
    \n`<%@page import=\"java.util.*\"%>`\n\nbecause any relaxation of control, sooner\
    \ or later, creates problems. In any case, as you can see in the following example,\
    \ you don’t need to write a separate directive for each class you need to include:\n\
    \n`<%@page import=\"java.util.ArrayList, java.util.Iterator\"%>`\n\nIn addition\
    \ to `language`, `contentType`, and `import`, the `page` directive also supports\
    \ `autoFlush`, `buffer`, `errorPage`, `extends`, `info`, `isELIgnored`, `isErrorPage`,\
    \ `isScriptingEnabled`, `isThreadSafe`, `pageEncoding`, `session`, and `trimDirectiveWhitespaces`.\n\
    \n[Listing 2-14](#Chapter02.html#list_2_14) shows you a simple program that utilizes\
    \ the `isThreadSafe` attribute to test concurrency.\n\n**Listing 2-14.** `concurrency.jsp`\n\
    \n```\n<%@page language=\"java\" contentType=\"text/html\"%>\n<%@page isThreadSafe=\"\
    false\"%>\n<%! int k = 0;%>\n<html><head><title>Concurrency</title></head><body>\n\
    <%\n  out.print(k);\n  int j = k + 1;\n  Thread.sleep(5000);\n  k = j;\n  out.println(\"\
    \ -> \" + k);\n  %>\n</body></html>\n```\n\nThe program declares the instance\
    \ variable `k`, copies it to the variable `j`, increments `j`, waits for five\
    \ seconds, and copies the incremented `j` back to `k`. It also displays `k` at\
    \ the beginning and at the end.\n\nIf you reload the page several times, you’ll\
    \ see that `k` is increased every time the page refreshes. Now view the page in\
    \ another browser (not just another browser window, because caching plays funny\
    \ tricks); for example, view it in Chrome if you normally use Firefox. If you\
    \ keep reloading the page in the two browsers, you’ll see the `k` keeps increasing\
    \ regardless of which browser you’re looking at. This is because `k` is an instance\
    \ variable.\n\nNow reload the page in the first browser and then immediately in\
    \ the second browser. Do you notice how the second browser takes longer to refresh?\
    \ This is because you’ve set `isThreadSafe=\"false\"`, and Tomcat doesn’t execute\
    \ the servlet code for the two requests at the same time. However, `k` keeps increasing\
    \ across the browsers with each page refresh.\n\nNow remove the `page` directive\
    \ that sets `isThreadSafe` to `false` and repeat the test. When you reload the\
    \ page on both browsers almost simultaneously, they refresh the page at the same\
    \ time but with the same value of `k`! This is because the second execution of\
    \ the servlet starts while the first one is “holding” for five seconds.\n\nI introduced\
    \ the five-second delay to be sure that you would see the problem. Without the\
    \ delay, the time interval between incrementing `j` and saving it back to `k`\
    \ would be vanishingly small. Therefore, you might keep trying for years and never\
    \ see the problem. Nevertheless, to rely on “it will never happen” when developing\
    \ code, especially when concurrency plays a role, is a very bad practice. Other\
    \ factors might influence the timing, and suddenly you might start seeing a problem\
    \ once a day or even more rarely. It could have a damaging effect on how users\
    \ consider your web site.\n\nThe price paid for playing it safe with `isThreadSafe`\
    \ is that it can slow down execution significantly. Fortunately, there’s a better\
    \ way to make the threads safe than relying on Tomcat. Look at [Listing 2-15](#Chapter02.html#list_2_15).\n\
    \n**Listing 2-15.** `concurrency2.jsp`\n\n```\n<%@page language=\"java\" contentType=\"\
    text/html\"%>\n<%!\n  int k = 0;\n  Object syncK = new Object();\n  %>\n<html><head><title>Concurrency</title></head><body>\n\
    <%\n  synchronized(syncK) {\n    out.print(k);\n    int j = k + 1;\n    Thread.sleep(5000);\n\
    \    k = j;\n    out.println(\" -> \" + k);\n    }\n  %>\n</body></html>\n```\n\
    \nYou protect the critical part of the code by enclosing it in a synchronized\
    \ block. The `syncK` variable, being defined in a declaration element, is an instance\
    \ variable shared like `k` among all the requests. I haven’t used `k` because\
    \ `synchronized` requires an object. In this simple case, instead of creating\
    \ a new object specifically to protect the code, I could have used `this`, representing\
    \ the servlet itself. But in general, if there were more than one block of code\
    \ to protect, it wouldn’t be a good idea. The best strategy to maximize efficiency,\
    \ besides staying locked as little as possible, is to use specific locks.\n\n\
    I spent a bit of time on the attribute `isThreadSafe` because concurrency often\
    \ is not well understood or implemented and causes intermittent bugs that are\
    \ devilish to eliminate.\n\nEarlier in this chapter, you have already seen how\
    \ to use `errorPage` and `isErrorPage` (in “The Exception Object”), and `trimDirectiveWhitespaces`,\
    \ `autoFlush`, and `buffer` (in “The Out Object”). Here is a brief description\
    \ of the remaining attributes of the `page` directive:\n\n> * **`extends`** tells\
    \ Tomcat which class the servlet should extend.\n> * **`info`** defines a string\
    \ that the servlet can access with its `getServletInfo()` method.\n> * **`isELIgnored`**\
    \ tells Tomcat whether to ignore EL expressions.\n> * **`isScriptingEnabled`**\
    \ tells Tomcat whether to ignore scripting elements.\n> * **`pageEncoding`** specifies\
    \ the character set used in the JSP page itself.\n> * **`session`** tells Tomcat\
    \ to include or exclude the page from HTTP sessions.\n\nThe bottom line is that,\
    \ in most occasions, you can leave these additional attribute set to their default\
    \ values.\n\n#### The `include` Directive\n\nThe `include` directive lets you\
    \ insert into a JSP page the unprocessed content of another text file. For example,\
    \ the following line of code includes a file named `some_jsp_code` with the extension\
    \ `jspf`:\n\n`<%@include file=\"some_jsp_code.jspf\"%>`\n\nJSPF stands for *JSP\
    \ Fragment*, although more recently, chunks of JSP code have been called *JSP\
    \ Segments*, rather than Fragments. In fact, any text file with any extension\
    \ will do.\n\nAs Tomcat does the merging before any translation, the raw content\
    \ of the included file is pasted into the page without any check. All the HTML\
    \ tags and JSP variables defined before the line containing the directive are\
    \ available to the included code. This directive can be very useful, but use it\
    \ sparingly, because it can easily lead to unmaintainable code, with bits and\
    \ pieces spread all over the place."
  raw: '#### The `page` Directive


    The `page` directive defines several page-dependent properties expressed through
    attributes. These properties should appear only once in a JSP page (unless the
    multiple instances all have the same value, but why should you do that?). You
    can write more than one `page` directive in a JSP page, and they will all apply.
    Their order or position within the page is generally irrelevant.


    This directive is used in all JSP pages. Typically, a JSP page starts with a `page`
    directive to tell Tomcat that the scripting language is Java and that the output
    is to be HTML:


    `<%@page language="java" contentType="text/html"%>`


    This is almost always followed by one or more further `page` directives to tell
    Tomcat which external class definitions your code needs. For example:


    `<%@page import="java.util.ArrayList"%>`

    `<%@page import="java.util.Iterator"%>`

    `<%@page import="myBeans.OneOfMyBeans"%>`


    It is *not* good coding practice to import whole class libraries, as in


    `<%@page import="java.util.*"%>`


    because any relaxation of control, sooner or later, creates problems. In any case,
    as you can see in the following example, you don’t need to write a separate directive
    for each class you need to include:


    `<%@page import="java.util.ArrayList, java.util.Iterator"%>`


    In addition to `language`, `contentType`, and `import`, the `page` directive also
    supports `autoFlush`, `buffer`, `errorPage`, `extends`, `info`, `isELIgnored`,
    `isErrorPage`, `isScriptingEnabled`, `isThreadSafe`, `pageEncoding`, `session`,
    and `trimDirectiveWhitespaces`.


    [Listing 2-14](#Chapter02.html#list_2_14) shows you a simple program that utilizes
    the isThreadSafe attribute to test concurrency.


    ***Listing 2-14.** concurrency.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%@page isThreadSafe="false"%>`

    `<%! int k = 0;%>`

    `<html><head><title>Concurrency</title></head><body>`

    `<%`

    `  out.print(k);`

    `  int j = k + 1;`

    `  Thread.sleep(5000);`

    `  k = j;`

    `  out.println(" -> " + k);`

    `  %>`

    `</body></html>`


    The program declares the instance variable `k`, copies it to the variable `j`,
    increments `j`, waits for five seconds, and copies the incremented `j` back to
    `k`. It also displays `k` at the beginning and at the end.


    If you reload the page several times, you’ll see that `k` is increased every time
    the page refreshes. Now view the page in another browser (not just another browser
    window, because caching plays funny tricks); for example, view it in Chrome if
    you normally use Firefox. If you keep reloading the page in the two browsers,
    you’ll see the `k` keeps increasing regardless of which browser you’re looking
    at. This is because `k` is an instance variable.


    Now reload the page in the first browser and then immediately in the second browser.
    Do you notice how the second browser takes longer to refresh? This is because
    you’ve set `isThreadSafe="false",` and Tomcat doesn’t execute the servlet code
    for the two requests at the same time. However, `k` keeps increasing across the
    browsers with each page refresh.


    Now remove the `page` directive that sets `isThreadSafe` to `false` and repeat
    the test. When you reload the page on both browsers almost simultaneously, they
    refresh the page at the same time but with the same value of `k`! This is because
    the second execution of the servlet starts while the first one is “holding” for
    five seconds.


    I introduced the five-second delay to be sure that you would see the problem.
    Without the delay, the time interval between incrementing `j` and saving it back
    to `k` would be vanishingly small. Therefore, you might keep trying for years
    and never see the problem. Nevertheless, to rely on “it will never happen” when
    developing code, especially when concurrency plays a role, is a very bad practice.
    Other factors might influence the timing, and suddenly you might start seeing
    a problem once a day or even more rarely. It could have a damaging effect on how
    users consider your web site.


    The price paid for playing it safe with `isThreadSafe` is that it can slow down
    execution significantly. Fortunately, there’s a better way to make the threads
    safe than relying on Tomcat. Look at [Listing 2-15](#Chapter02.html#list_2_15).


    ***Listing 2-15.** concurrency2.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%!`

    `  int k = 0;`

    `  Object syncK = new Object();`

    `  %>`

    `<html><head><title>Concurrency</title></head><body>`

    `<%`

    `  synchronized(syncK) {`

    `    out.print(k);`

    `    int j = k + 1;`

    `    Thread.sleep(5000);`

    `    k = j;`

    `    out.println(" -> " + k);`

    `    }`

    `  %>`

    `</body></html>`


    You protect the critical part of the code by enclosing it in a synchronized block.
    The `syncK` variable, being defined in a declaration element, is an instance variable
    shared like `k` among all the requests. I haven’t used `k` because `synchronized`
    requires an object. In this simple case, instead of creating a new object specifically
    to protect the code, I could have used `this`, representing the servlet itself.
    But in general, if there were more than one block of code to protect, it wouldn’t
    be a good idea. The best strategy to maximize efficiency, besides staying locked
    as little as possible, is to use specific locks.


    I spent a bit of time on the attribute `isThreadSafe` because concurrency often
    is not well understood or implemented and causes intermittent bugs that are devilish
    to eliminate.


    Earlier in this chapter, you have already seen how to use `errorPage` and `isErrorPage`
    (in “The Exception Object”), and `trimDirectiveWhitespaces`, `autoFlush`, and
    `buffer` (in “The Out Object”). Here is a brief description of the remaining attributes
    of the `page` directive:


    > *   **`extends`** tells Tomcat which class the servlet should extend.

    > *   **`info`** defines a string that the servlet can access with its `getServletInfo()`
    method.

    > *   **`isELIgnored`** tells Tomcat whether to ignore EL expressions.

    > *   **`isScriptingEnabled`** tells Tomcat whether to ignore scripting elements.

    > *   **`pageEncoding`** specifies the character set used in the JSP page itself.

    > *   **`session`** tells Tomcat to include or exclude the page from HTTP sessions.


    The bottom line is that, in most occasions, you can leave these additional attribute
    set to their default values.


    #### The `include` Directive


    The `include` directive lets you insert into a JSP page the unprocessed content
    of another text file. For example, the following line of code includes a file
    named `some_jsp_code` with the extension `jspf`:


    `<%@include file="some_jsp_code.jspf"%>`


    JSPF stands for *JSP Fragment*, although more recently, chunks of JSP code have
    been called *JSP Segments*, rather than Fragments. In fact, any text file with
    any extension will do.


    As Tomcat does the merging before any translation, the raw content of the included
    file is pasted into the page without any check. All the HTML tags and JSP variables
    defined before the line containing the directive are available to the included
    code. This directive can be very useful, but use it sparingly, because it can
    easily lead to unmaintainable code, with bits and pieces spread all over the place.'
  trans: '

    #### `page` 指令


    `page` 指令通过属性定义了若干与页面相关的特性。这些特性在 JSP 页面中应只出现一次（除非多个实例的值完全相同，但何必如此呢？）。你可以在一个 JSP
    页面中编写多个 `page` 指令，它们都会生效。这些指令在页面中的顺序或位置通常无关紧要。


    该指令用于所有 JSP 页面。通常，JSP 页面以 `page` 指令开头，告知 Tomcat 脚本语言是 Java，并且输出格式为 HTML：


    `<%@page language="java" contentType="text/html"%>`


    紧接着，通常还会有一个或多个 `page` 指令，用于告知 Tomcat 你的代码需要哪些外部类定义。例如：


    `<%@page import="java.util.ArrayList"%>`

    `<%@page import="java.util.Iterator"%>`

    `<%@page import="myBeans.OneOfMyBeans"%>`


    像下面这样导入整个类库*并非*良好的编码实践：


    `<%@page import="java.util.*"%>`


    因为任何对控制的放松，迟早都会引发问题。无论如何，正如你在下面的示例中所见，你无需为每个需要包含的类都编写一个单独的指令：


    `<%@page import="java.util.ArrayList, java.util.Iterator"%>`


    除了 `language`、`contentType` 和 `import` 之外，`page` 指令还支持 `autoFlush`、`buffer`、`errorPage`、`extends`、`info`、`isELIgnored`、`isErrorPage`、`isScriptingEnabled`、`isThreadSafe`、`pageEncoding`、`session`
    和 `trimDirectiveWhitespaces`。


    清单 2-14 展示了一个利用 `isThreadSafe` 属性测试并发性的简单程序。


    ***清单 2-14.** concurrency.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%@page isThreadSafe="false"%>`

    `<%! int k = 0;%>`

    `<html><head><title>Concurrency</title></head><body>`

    `<%`

    `  out.print(k);`

    `  int j = k + 1;`

    `  Thread.sleep(5000);`

    `  k = j;`

    `  out.println(" -> " + k);`

    `  %>`

    `</body></html>`


    该程序声明了实例变量 `k`，将其复制给变量 `j`，递增 `j`，等待五秒钟，然后将递增后的 `j` 复制回 `k`。程序还会在开始和结束时显示 `k`
    的值。


    如果你多次重新加载该页面，你会看到每次页面刷新时 `k` 都会增加。现在，在另一个浏览器中查看该页面（不仅仅是另一个浏览器窗口，因为缓存会搞出一些奇怪的花样）；例如，如果你通常使用
    Firefox，那么可以在 Chrome 中查看。如果你在两个浏览器中持续重新加载页面，你会发现无论你查看哪个浏览器，`k` 都在持续增加。这是因为 `k`
    是一个实例变量。


    现在，在第一个浏览器中重新加载页面，然后立即在第二个浏览器中重新加载。你是否注意到第二个浏览器刷新所需的时间更长？这是因为你设置了 `isThreadSafe="false"`，Tomcat
    不会同时为这两个请求执行 servlet 代码。然而，随着每次页面刷新，`k` 在各个浏览器中仍然持续增加。


    现在，移除将 `isThreadSafe` 设置为 `false` 的 `page` 指令，并重复测试。当你几乎同时在两个浏览器上重新加载页面时，它们会同时刷新页面，但
    `k` 的值却相同！这是因为第二个 servlet 的执行是在第一个 servlet “暂停”五秒钟期间开始的。


    我引入这五秒钟的延迟是为了确保你能看到这个问题。如果没有这个延迟，递增 `j` 并将其保存回 `k` 的时间间隔会非常短。因此，你可能尝试多年也看不到这个问题。然而，在开发代码时，尤其是涉及并发时，依赖“它永远不会发生”是一种非常糟糕的做法。其他因素可能会影响时间，突然之间，你可能每天甚至更罕见地开始看到问题。这可能会对用户如何看待你的网站产生破坏性影响。


    为了安全使用 `isThreadSafe` 所付出的代价是，它可能会显著降低执行速度。幸运的是，有一种比依赖 Tomcat 更好的方法来确保线程安全。请看清单
    2-15。


    ***清单 2-15.** concurrency2.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%!`

    `  int k = 0;`

    `  Object syncK = new Object();`

    `  %>`

    `<html><head><title>Concurrency</title></head><body>`

    `<%`

    `  synchronized(syncK) {`

    `    out.print(k);`

    `    int j = k + 1;`

    `    Thread.sleep(5000);`

    `    k = j;`

    `    out.println(" -> " + k);`

    `    }`

    `  %>`

    `</body></html>`


    你通过将代码的关键部分包裹在 `synchronized` 块中来保护它。`syncK` 变量在声明元素中定义，是一个实例变量，像 `k` 一样在所有请求之间共享。我没有使用
    `k`，因为 `synchronized` 需要一个对象。在这个简单的例子中，我本可以使用 `this`（代表 servlet 本身），而不是专门创建一个新对象来保护代码。但一般来说，如果有多个代码块需要保护，这样做就不是一个好主意。除了尽可能减少锁定时间之外，最大化效率的最佳策略是使用特定的锁。


    我花了一些时间讨论 `isThreadSafe` 属性，因为并发通常没有被很好地理解或实现，并且会导致难以消除的间歇性错误。


    在本章前面，你已经了解了如何使用 `errorPage` 和 `isErrorPage`（在“异常对象”部分），以及 `trimDirectiveWhitespaces`、`autoFlush`
    和 `buffer`（在“Out 对象”部分）。以下是 `page` 指令其余属性的简要说明：


    > *   **`extends`** 告知 Tomcat servlet 应继承哪个类。

    > *   **`info`** 定义一个字符串，servlet 可以通过其 `getServletInfo()` 方法访问该字符串。

    > *   **`isELIgnored`** 告知 Tomcat 是否忽略 EL 表达式。

    > *   **`isScriptingEnabled`** 告知 Tomcat 是否忽略脚本元素。

    > *   **`pageEncoding`** 指定 JSP 页面本身使用的字符集。

    > *   **`session`** 告知 Tomcat 是否将该页面包含在 HTTP 会话中。


    总而言之，在大多数情况下，你可以将这些附加属性保留为其默认值。


    #### `include` 指令


    `include` 指令允许你将另一个文本文件的未处理内容插入到 JSP 页面中。例如，以下代码行包含了一个名为 `some_jsp_code`、扩展名为
    `jspf` 的文件：


    `<%@include file="some_jsp_code.jspf"%>`


    JSPF 代表 *JSP Fragment*（JSP 片段），不过最近，JSP 代码块被称为 *JSP Segments*（JSP 段）而非 Fragments。实际上，任何扩展名的任何文本文件都可以。


    由于 Tomcat 在任何翻译之前进行合并，因此被包含文件的原始内容会未经任何检查就被粘贴到页面中。在包含该指令的行之前定义的所有 HTML 标签和 JSP
    变量，对于被包含的代码都是可用的。这个指令可能非常有用，但请谨慎使用，因为它很容易导致代码难以维护，代码片段散落在各处。

    '
- fmt: '#### `taglib` 指令


    你可以通过指示 Tomcat 使用外部的自包含标签库来扩展可用的 JSP 标签数量。`taglib` 指令用于标识一个标签库，并指定你用来识别其标签的前缀。例如，以下代码：


    `<%@taglib uri="http://mysite.com/mytags" prefix="my"%>`


    使你能够在 JSP 页面中编写如下代码行：


    `<my:oneOfMyTags> ... </my:oneOfMyTags>`


    以下代码包含了核心的 JSP 标准标签库：


    `<%@taglib uri="http://java.sun.com/jsp/jstl/core" prefix="c"%>`


    你将在[第 4 章](#Chapter04.html)中找到关于 JSTL 的描述以及如何使用它。在同一章的“JSP 的标签扩展机制”一节中，我将解释创建你自己的标签库的可能优势以及如何实现。目前，只需记住
    `taglib` 指令告诉 Tomcat 要加载哪些库以及它们的位置。


    ### 总结


    在本章中，你学习了所有 JSP 脚本元素和指令元素。


    我首先解释了脚本片段中使用的 Java 语法以及 Tomcat 定义的隐式对象，并提供了几个示例展示如何使用它们。


    之后，我描述了 JSP 指令。


    在下一章中，你将学习如何构建复杂的 JSP 应用程序。


    ## 第 3 章


    ![Image](images/3square.jpg)


    ## JSP 应用程序架构


    在前两章中，你通过简短的示例学习了 JSP 的大部分组件。在本章中，我将告诉你如何在复杂应用程序中将所有内容整合在一起。


    将 Java 代码插入 HTML 模块开启了构建动态网页的可能性，但这并不意味着你能高效且有效地做到这一点。如果你仅通过脚本元素开始开发复杂应用程序，代码很快就会变得难以维护。像“Hello
    World!”示例那样混合 Java 和 HTML 的关键问题在于，应用程序逻辑与信息在浏览器中的呈现方式被混为一谈。通常，业务应用程序设计者和网页设计者是不同的人，他们拥有互补且仅部分重叠的技能。应用程序设计者是复杂算法和数据库的专家，而网页设计者则专注于页面构图和图形。基于
    JSP 的应用程序架构应反映这种区别。你最不希望看到的就是模糊开发团队中的角色分工，最终导致每个人都在做别人更擅长的事情。即使你独自开发所有内容，通过保持表示层和应用程序逻辑的分离，你也能构建出更稳定、更易于维护的应用程序。


    ### 模型 1 架构


    分离表示层和逻辑的最简单方法是将大部分应用程序逻辑从 JSP 转移到 Java 类（即 Java Bean），然后在 JSP 中使用这些类（参见[图 3-1](#Chapter03.html#fig_3_1)）。这被称为
    JSP 模型 1 架构。


    ![Image](images/9781430246237_Fig03-01.jpg)


    ***图 3-1.** JSP 模型 1 架构*


    尽管模型 1 对于包含几千行代码以内的应用程序是可接受的，但 JSP 页面仍需处理 HTTP 请求，这可能会给页面设计者带来麻烦。


    ### 模型 2 架构


    一个更适合大型应用程序的更好解决方案是进一步拆分功能，并仅使用 JSP 来格式化 HTML 页面。该解决方案以 JSP 模型 2 架构的形式出现，也称为模型-视图-控制器（MVC）设计模式（参见[图
    3-2](#Chapter03.html#fig_3_2)）。


    ![Image](images/9781430246237_Fig03-02.jpg)


    ***图 3-2.** JSP 模型 2 架构*


    在这种模型中，一个 Servlet 处理请求、执行应用程序逻辑并实例化 Java Bean。JSP 从 Bean 中获取数据，并可以在无需了解幕后情况的前提下格式化响应。为了说明这个模型，我将描述一个名为
    *E-bookshop* 的示例应用程序，这是一个用于在线销售图书的小型应用程序。E-bookshop 并非真正功能完备，因为图书列表是在应用程序中硬编码的，而非存储在数据库中。此外，确认订单后也不会发生任何后续操作。然而，这个示例足以展示模型
    2 如何让你完全分离业务逻辑和表示层。在本章后面，我将介绍一个更好的在线书店应用程序版本，它将伴随我们贯穿本书的其余部分。


    [图 3-3](#Chapter03.html#fig_3_3) 显示了 E-bookshop 的主页，当你在浏览器的地址栏中输入 [`http://localhost:8080/ebookshop`](http://localhost:8080/ebookshop)
    时，你会看到该页面。


    ![Image](images/9781430246237_Fig03-03.jpg)


    ***图 3-3.** E-bookshop 主页*


    你可以通过点击下拉列表选择一本书，如图 [3-3](#Chapter03.html#fig_3_3) 所示，输入所需数量，然后点击 `Add to Cart`
    按钮。每次执行此操作时，购物车的内容都会显示在窗口底部，如图 [3-4](#Chapter03.html#fig_3_4) 所示。


    ![Image](images/9781430246237_Fig03-04.jpg)


    ***图 3-4.** 显示购物车的 E-bookshop 主页*


    你可以从购物车中移除商品，或前往结账。如果你向购物车中添加更多数量的同一本书，购物车中的数量会相应增加。


    如果你点击 `Checkout` 按钮，你将看到如图 [3-5](#Chapter03.html#fig_3_5) 所示的页面。


    ![Image](images/9781430246237_Fig03-05.jpg)


    ***图 3-5.** E-bookshop 结账页面*


    如果你点击 `Buy more!` 链接，你将返回一个购物车已清空的主页，准备进行更多购物。'
  raw: '#### The `taglib` Directive


    You can extend the number of available JSP tags by directing Tomcat to use external
    self-contained tag libraries. The `taglib` directory identifies a tag library
    and specifies what prefix you use to identify its tags. For example, this code


    `<%@taglib uri="http://mysite.com/mytags" prefix=”my”%>`


    makes it possible for you to write the following line as part of your JSP page:


    `<my:oneOfMyTags> ... </my:oneOfMyTags>`


    The following code includes the core JSP Standard Tag Library:


    `<%@taglib uri="http://java.sun.com/jsp/jstl/core" prefix="c"%>`


    You will find the description of JSTL and how to use it in [Chapter 4](#Chapter04.html).
    In section “JSP’s Tag Extension Mechanism” of the same chapter, I’ll explain the
    possible advantages of creating your own libraries of tags and how to do it. For
    the time being, simply remember that the `taglib` directive tells Tomcat what
    libraries to load and where they are.


    ### Summary


    In this chapter, you learned all scripting and directive JSP elements.


    I started by explaining the Java syntax used in scriptlets and the implicit objects
    defined by Tomcat, with several examples showing how to use them.


    After that, I described the JSP directives.


    In the next chapter, you will learn how to build complex JSP applications.


    ## C H A P T E R  3


    ![Image](images/3square.jpg)


    ## JSP Application Architectures


    In the first two chapters, you learned a large portion of JSP’s components through
    brief examples. In this chapter, I will tell you how everything fits together
    in complex applications.


    The insertion of Java code into HTML modules opens up the possibility of building
    dynamic web pages, but to say that it is possible doesn’t mean you can do it efficiently
    and effectively. If you start developing complex applications exclusively by means
    of scripting elements, you’ll rapidly reach the point where the code will become
    difficult to maintain. The key problem with mixing Java and HTML, as in “Hello
    World!”, is that the application logic and the way the information is presented
    in the browser are mixed. Often, the business application designers and the web-page
    designers are different people with complementary and only partially overlapping
    skills. While application designers are experts in complex algorithms and databases,
    web designers focus on page composition and graphics. The architecture of your
    JSP based applications should reflect this distinction. The last thing you want
    to do is blur the roles within the development team and end up with everybody
    doing what somebody else is better qualified to do. And even if you develop everything
    yourself, by keeping presentation and application logic separate, you will build
    more stable and more maintainable applications.


    ### The Model 1 Architecture


    The simplest way to separate presentation and logic is to move the bulk of the
    application logic from JSP to Java classes (i.e., Java beans), which can then
    be used within JSP (see [Figure 3-1](#Chapter03.html#fig_3_1)). This is called
    the JSP Model 1 architecture.


    ![Image](images/9781430246237_Fig03-01.jpg)


    ***Figure 3-1.** JSP Model 1 architecture*


    Although Model 1 is acceptable for applications containing up to a few thousand
    lines of code, the JSP pages still have to handle the HTTP requests, and this
    can cause headaches for the page designers.


    ### The Model 2 Architecture


    A better solution, more suitable for larger applications, is to split the functionality
    further and use JSP exclusively to format the HTML pages. This solution comes
    in the form of the JSP Model 2 architecture, also known as the model view controller
    (MVC) design pattern (see [Figure 3-2](#Chapter03.html#fig_3_2)).


    ![Image](images/9781430246237_Fig03-02.jpg)


    ***Figure 3-2.** JSP Model 2 architecture*


    With this model, a servlet processes the request, handles the application logic,
    and instantiates Java beans. JSP obtains data from the beans and can format the
    response without having to know anything about what’s going on behind the scenes.
    To illustrate this model, I will describe a sample application called *E-bookshop*,
    a small application to sell books online. E-bookshop is not really functional,
    because the list of books is hard-coded in the application rather than stored
    in a database. Also, nothing happens once you confirm the order. However, this
    example serves the purpose of showing you how Model 2 lets you completely separate
    business logic and presentation. Later in this chapter, I will introduce a better
    version of an online bookshop application that will accompany us through the rest
    of the book.


    [Figure 3-3](#Chapter03.html#fig_3_3) shows the E-bookshop’s home page, which
    you see when you type [`http://localhost:8080/ebookshop`](http://localhost:8080/ebookshop)
    in your browser’s address field.


    ![Image](images/9781430246237_Fig03-03.jpg)


    ***Figure 3-3.** The E-bookshop home page*


    You can select a book by clicking on the drop-down list, as shown in [Figure 3-3](#Chapter03.html#fig_3_3),
    type in the number of copies you need, and then click the `Add to Cart` button.
    Every time you do so, the content of your shopping cart appears at the bottom
    of the window, as shown in [Figure 3-4](#Chapter03.html#fig_3_4).


    ![Image](images/9781430246237_Fig03-04.jpg)


    ***Figure 3-4.** The E-bookshop home page displaying the shopping cart*


    You can remove an item from the shopping cart or go to the checkout. If you add
    additional copies of a book to the cart, the quantity in the cart increases accordingly.


    If you click on the `Checkout` button, you’ll see the page shown in [Figure 3-5](#Chapter03.html#fig_3_5).


    ![Image](images/9781430246237_Fig03-05.jpg)


    ***Figure 3-5.** The E-bookshop checkout page*


    If you click on the `Buy more!` link, you’ll go back to the home page with an
    empty shopping cart, ready for more shopping.'
