    a JSP programmer is likely to encounter.


    To make XML file contents easier to access, the W3C specified the XML Path Language
    (XPath). The name XPath was chosen to indicate that it identifies paths within
    XML documents (see [`http://www.w3.org/TR/xpath`](http://www.w3.org/TR/xpath)).
    The JSTL-XML actions rely on that language to identify XML components.


    To avoid confusion between EL expressions and XPath expressions, the actions that
    require an XPath expression always use the `select` attribute. In this way, you
    can be sure that all expressions outside `select` are EL expressions. Several
    XML actions are the XPath-counterparts of equivalent core actions, with the attribute
    `select` replacing the attribute `value` (when present). They are: `x:choose`,
    `x:forEach`, `x:if`, `x:out`, `x:otherwise`, `x:set`, and `x:when`.


    The remaining three actions are `x:parse` and the pair `x:transform` and `x:param`.
    But before you can learn about them, we have to talk about the Extensible Stylesheet
    Language (XSL).


    XSL is a language for expressing style sheets that describe how to display and
    transform XML documents. The specification documents are available from [`http://www.w3.org/Style/XSL/`](http://www.w3.org/Style/XSL/).


    While CSS only needs to define how to represent the predefined HTML tags, XSL
    has to cope with the fact that there are no predefined tags in XML! How do you
    know whether a `<table>` element in an XML file represents a table of data as
    you know it from HTML or an object around which you can sit for dinner?


    That’s why XSL is more than a style-sheet language. It actually includes three
    parts:


    > *   **XPath**: The language to navigate in XML documents I already mentioned.

    > *   **XSLT**: A language to transform XML documents that can completely change
    their structure.

    > *   **XSL Formatting Objects (XSL-FO)**: A language for formatting XML documents.


    I will only explain XPath and XSLT, because XSL-FO is concerned with *page formatting*
    (page size, margins, headers, footers, citations, footnotes, and so on), which
    is very different from the screen formatting and hyperlinking you need for web
    pages.


    Just to give you an idea, XSL-FO divides the output into pages, the pages into
    regions (body, header, footer, and left and right sidebars), the regions into
    block areas, the block areas into line areas, and the line areas into inline areas.
    You can define several attributes of these fields and then “flow” your content
    into them. XSL-FO also provides constructs for lists and tables similar to those
    you know from HTML.


    #### XPath


    XPath expressions identify a set of XML nodes through patterns. Extensible Stylesheet
    Language Transformations (XSLT) templates (see later in this chapter for XSLT
    examples) then use those patterns when they apply transformations. Possible XPath
    nodes can be any of the following: document/root, comment, element, attribute,
    text, processing instruction, and namespace.


    ![Image](images/square.jpg) **Note** Processing instructions in an XML document
    provide information for the application that uses the document.


    For example, take a look at the following XML document:


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<whatever >`

    `  <!-- bla bla -->  <?myAppl "xyz"?>`

    `  <item name="anything">`

    `    <subitem>The quick brown fox</subitem>`

    `    </item>`

    `  </whatever>`


    The document (or root) node is `<whatever>`, `<!-- bla bla -->` is a comment node,
    `<subitem>...</subitem>` is an element node, `name="anything"` is an attribute
    node, the string `The quick brown fox` is a text node, `<?myAppl "xyz"?>` is a
    processing-instruction node, and `is a namespace node.`'
