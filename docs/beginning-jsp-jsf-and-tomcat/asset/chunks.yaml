  raw: '### Listing the HTML-Request Parameters


    With JSP you can generate dynamic web pages. That’s settled. But the utility of
    dynamic pages goes well beyond recognizing what browser the viewer is using or
    displaying different information on different days. What really matters is to
    be able to adapt the content of a web page on the basis of who the viewer is and
    what the viewer wants.


    Each HTML request includes a series of parameters, which are usually the results
    of what the viewer enters into a form before hitting the “`Submit`” button. Additional
    parameters can also be part of the URL itself. For example, pages in multilingual
    websites sometimes have URLs ending with “`?lang=en`” to tell the server that
    it should format the requested page in English.


    [Listing 1-6](#Chapter01.html#list_1_6) shows a simple JSP page that lists all
    the HTML-request parameters.  It is a useful little tool you can use to easily
    check what your HTML pages actually send to the server.


    ***Listing 1-6.** req_params.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%@page import="java.util.*, java.io.*"%>`

    `<%`

    **`  Map      map = request.getParameterMap();`**

    `  Object[] keys = map.keySet().toArray();`

    `  %>`

    `<html><head><title>Request Parameters</title></head><body>`

    **`  Map size = <%=map.size()%>`**

    `  <table border="1">`

    `    <tr><td>Map element</td><td>Par name</td><td>Par value[s]</td></tr>`

    `<%`

    `    for (int k = 0; k < keys.length; k++) {`

    **`      String[] pars = request.getParameterValues((String)keys[k]);`**

    `      out.print("<tr><td>" + k + "</td><td>''" + keys[k] + "''</td><td>");`

    `      for (int j = 0; j < pars.length; j++) {`

    `        if (j > 0) out.print(", ");`

    `        out.print("''" + pars[j] + "''");`

    `        }`

    `      out.println("</td></tr>");`

    `      }`

    `  %>`

    `    </table>`

    `</body></html>`


    The interesting bits are in the lines I have highlighted in bold. The first one
    tells you that the parameters are stored in an object of type `Map` and shows
    you how to retrieve the list of the parameter names.


    The second highlighted line shows you how to insert the value of a Java variable
    directly into the output (i.e., into the HTML page), by enclosing it between the
    pair `<%=` and `%>`. This is a different from using a scriptlet—in which you can
    use JSP to build dynamicity into a web page.


    The third highlighted line shows how to request the values of each parameter you
    know the name of. I said “values” instead of “value” because each parameter can
    appear more than once within the same request. For example, if you view the URL


    [`http://localhost:8080/tests/req_params.jsp?a=b&c=d&a=zzz&empty=&empty=&1=22`](http://localhost:8080/tests/req_params.jsp?a=b&c=d&a=zzz&empty=&empty=&1=22)


    you get what you see in [Figure 1-12](#Chapter01.html#fig_1_12).


    You could have used `getParameterNames` instead of `getParameterMap`. To do so,
    you would have replaced


    `Object[] keys = map.keySet().toArray();`


    with


    `Enumeration enumPar = request.getParameterNames();`


    You would have also changed the loop to get through all parameters, from


    `for (int k = 0; k < keys.length; k++)  {`


    to


    `while (enumPar.hasMoreElements()) {`


    And finally, to get the parameter names one by one, you would have used `enumPar.nextElement()`
    instead of `(String)keys[k]`. It wouldn’t have made any difference in the example,
    but with a map, you get the parameter names in alphabetical order, while with
    the other method, you wouldn’t.


    Furthermore, a `Map` object comes with some useful methods. For example, `containsValue`
    lets you check whether the map contains a given value.


    ![Image](images/9781430246237_Fig01-12.jpg)


    ***Figure 1-12.** Output of req_params.jsp*


    Notice that the parameter aptly named `empty` appears twice in the query string,
    which results in two empty strings in the parameter map. Also, looking at the
    parameter `a`, you’ll notice that the values are returned in the same order in
    which they appear in the query string.


    ### Summary


    In this chapter, you learned how to install Java and Tomcat and how to check that
    they work correctly.


    After explaining what happens on the server when you click a link in your browser
    to view a new page, I introduced servlet and JSP technologies and explained what
    role they play in a web server.


    Then, I showed you a simple HTML page and how you can begin to add dynamic content
    to it with JSP.


    Finally, you learned how to use JSP to display the HTTP-request parameters.


    Perhaps this was not the most exciting chapter, but you now have in place a basic
    development and run environment, without which you wouldn’t be able to proceed.
    And you have had your first taste of JSP.


    In the next chapter, you’ll learn more about JavaServer pages and how you can
    best structure web applications.


    ## C H A P T E R  2


    ![Image](images/3square.jpg)


    ## JSP Elements


    A JSP page is made out of a page template, which consists of HTML code and JSP
    elements such as *scripting* elements, *directive* elements, and *action* elements.
    In the previous chapter, after explaining how to install Java and Tomcat, I introduced
    you to JSP and explained JSP’s role within web applications. In this chapter,
    I’ll describe in detail the first two types of JSP elements. For the action elements,
    refer to [Chapter 4](#Chapter04.html).'
