    ### Scripting Elements and Java


    Scripting elements let you embed Java code in an HTML page.^([1](#Chapter02.html#CHP-2-FN-1))
    Every Java executable—whether it’s a free-standing program running directly within
    a runtime environment, an applet executing inside a browser, or a servlet executing
    in a container such as Tomcat—boils down to instantiating classes into objects
    and executing their methods. This might not be so apparent with JSP, since Tomcat
    wraps every JSP page into a class of type `Servlet` behind the scenes, but it
    still applies.


    Java methods consist of a sequence of operations to instantiate objects, allocate
    memory for variables, calculate expressions, perform assignments, or execute other
    methods.


    In this section, I’ll summarize the syntax of Java while keeping JSP in mind.


    #### Scriptlets


    A scriptlet is a block of Java code enclosed between `<%` and `%>`. For example,
    this code includes two scriptlets that let you switch an HTML element on or off
    depending on a condition:


    `<% if (`*`condition`*`) { %>`

    `<p>This is only shown if the condition is satisfied</p>`

    `<%   } %>`


    #### Expressions


    An expression scripting element inserts into the page the result of a Java expression
    enclosed in the pair `<%=` and `%>`. For example, in the following snippet of
    code, the expression scripting element inserts the current date into the generated
    HTML page:


    `<%@page import="java.util.Date"%>`

    `Server date and time: <%=new Date()%>`


    You can use within an expression scripting element any Java expression, provided
    it results in a value. In practice, it means that every Java expression will do,
    except the execution of a method of type `void`.  For example, `<%=(`*`condition`*`)
    ? "yes" : "no"%>` is valid, because it calculates to a string. You would obtain
    the same output with the scriptlet `<%if (`*`condition`*`) out.print("yes") else
    out.print("no");%>`.


    __________


    ¹ Jeff Friesen, *Beginning Java 7* (Berkeley, CA: Apress, 2012) is the definitive
    guide to the Java language.


    Note that an expression is not a Java statement. Accordingly, it has no semicolon
    at the end.


    #### Declarations


    A declaration scripting element is a Java variable declaration enclosed between
    `<%!` and `%>. It results in` an instance variable shared by all requests for
    the same page. See the “Example: Testing Concurrency” section for an example on
    how you can use it.'
  trans: '

    ### 简介


    **脚本**元素由特定字符序列分隔的代码组成。你在第 1 章示例中遇到的、由`<%`和`%>`分隔的脚本片段，是三种脚本元素类型之一。另外两种是声明和表达式。


    所有脚本元素都是 Java 片段，能够操作 Java 对象、调用其方法并捕获 Java 异常。它们可以向输出发送数据，并在页面被请求时执行。


    在第 1 章的`hello.jsp`示例（清单 1-4）中，你看到`request.getHeader("user-agent")`返回了一个描述客户端 Web
    浏览器的字符串，尽管变量`request`并未在任何地方定义。它能正常工作是因为 Tomcat 定义了多个*隐式对象*：`application`、`config`、`exception`、`out`、`pageContext`、`request`、`response`和`session`。


    **指令**元素是发送给 JSP 容器（即 Tomcat）的消息。其目的是提供页面本身翻译所需的信息。由于它们与每个单独的请求无关，指令元素不会向 HTML
    响应输出任何文本。


    `hello.jsp`示例的第一行是一条指令：


    `<%@page language="java" contentType="text/html"%>`


    除了`page`之外，JSP 页面中可用的其他指令还有`include`和`taglib`。


    **动作**元素指定了与脚本元素类似、需要在页面被请求时执行的活动，因为它们的目的是封装 Tomcat 在处理来自客户端的 HTTP 请求时所执行的活动。动作元素可以使用、修改和/或创建对象，并且可能影响数据发送到输出的方式。标准动作有十多种：`attribute`、`body`、`element`、`fallback`、`forward`、`getProperty`、`include`、`param`、`params`、`plugin`、`setProperty`、`text`和`useBean`。例如，以下动作元素将另一个页面的输出包含到
    JSP 页面中：


    `<jsp:include page="another.jsp"/>`


    除了标准动作元素外，JSP 还提供了一种机制，允许你定义自定义动作，其中你可以选择前缀来替换标准动作的前缀`jsp`。*标签扩展机制*允许你创建自定义动作库，然后可以在所有应用程序中使用它们。一些自定义动作在编程社区中变得非常流行，以至于
    Sun Microsystems（现为 Oracle）决定将其标准化。结果就是 JSTL，即 JSP 标准标签库。


    *表达式语言*（EL）是 JSP 的一个附加组件，它提供了对外部对象（即 Java Bean）的便捷访问。EL 是在 JSP 2.0 中作为脚本元素的替代方案引入的，但你也可以同时使用
    EL 和脚本元素。我将在第 4 章中解释动作元素之后，再介绍 EL。


    在接下来的章节中，我将首先介绍脚本元素，因为它们更容易理解，并且你可以用它们将其他部分粘合在一起。然后，我将描述隐式对象和指令。为了帮助你找到本章软件包中的正确示例，我将它们按章节标题和测试的功能分成了文件夹（例如，`request
    object – authentication`）。


    ### 脚本元素与 Java


    脚本元素允许你将 Java 代码嵌入到 HTML 页面中。^(1) 每个 Java 可执行程序——无论是直接在运行时环境中运行的独立程序、在浏览器中执行的小程序，还是在
    Tomcat 等容器中执行的 Servlet——归根结底都是将类实例化为对象并执行其方法。这在 JSP 中可能不那么明显，因为 Tomcat 在后台将每个
    JSP 页面包装成一个`Servlet`类型的类，但原理仍然适用。


    Java 方法由一系列操作组成，用于实例化对象、为变量分配内存、计算表达式、执行赋值或执行其他方法。


    在本节中，我将结合 JSP 总结 Java 的语法。


    #### 脚本片段


    脚本片段是包含在`<%`和`%>`之间的 Java 代码块。例如，以下代码包含两个脚本片段，允许你根据条件打开或关闭一个 HTML 元素：


    `<% if (`*`条件`*`) { %>`

    `<p>仅当条件满足时才会显示此内容</p>`

    `<%   } %>`


    #### 表达式


    表达式脚本元素将包含在`<%=`和`%>`之间的 Java 表达式的结果插入到页面中。例如，在以下代码片段中，表达式脚本元素将当前日期插入到生成的 HTML
    页面中：


    `<%@page import="java.util.Date"%>`

    `服务器日期和时间：<%=new Date()%>`


    你可以在表达式脚本元素中使用任何 Java 表达式，只要它能得出一个值。实际上，这意味着除了执行`void`类型的方法外，所有 Java 表达式都可以。例如，`<%=(`*`条件`*`)
    ? "是" : "否"%>`是有效的，因为它计算出一个字符串。使用脚本片段`<%if (`*`条件`*`) out.print("是") else out.print("否");%>`也能得到相同的输出。


    __________


    ¹ Jeff Friesen 所著《Beginning Java 7》（伯克利，加利福尼亚州：Apress，2012 年）是 Java 语言的权威指南。


    请注意，表达式不是 Java 语句。因此，其末尾没有分号。


    #### 声明


    声明脚本元素是包含在`<%!`和`%>`之间的 Java 变量声明。它会产生一个由同一页面的所有请求共享的实例变量。有关如何使用它的示例，请参阅“示例：测试并发”部分。'
- fmt: '#### Data Types and Variables


    Java makes available primitive data types similar to the basic types of C/C++
    (see [Table 2-1](#Chapter02.html#tab_2_1)). However, there is one important, if
    not so apparent, difference. The precision of the numeric types is implementation-dependent
    in C, but it is guaranteed to be constant across platforms in Java.


    ![Image](images/9781430246237_Tab02-01.jpg)


    The second column of [Table 2-1](#Chapter02.html#tab_2_1) gives you the names
    of the so-called *wrapper classes* that Java makes available for each primitive
    type. These classes provide some useful static methods to manipulate numbers.
    For example, `Integer.parseInt(String s, int radix)` interprets a string as a
    number in the base set by the second argument and returns it as an `int` value
    (e.g., `Integer.parseInt("12", 16)` and `Integer.parseInt("10010", 2)` both return
    18).


    In Java, like in C, you can define octal literals by sticking a zero in front
    of the number, and hexadecimal literals by adding `0x` or `0X`. For example, both
    `0123`, which means 1×64 + 2×8 + 3×1, and `0x53`, which means 5×16 + 3×1, are
    different ways of representing the decimal number 83. With Java 7, you also have
    the suffixes `0b` and `0B` to identify binary literals. This means that you can
    also write decimal 83 as `0b1010011`.


    I will be mentioning new features of Java introduced with Java 7 as they become
    relevant. They are nice, and useful to improve code readability and maintenability,
    but before embracing them, check that all servers to which you will deploy your
    applications have been upgraded to Java 7.


    Programs in Java can be platform-independent because all platform dependencies
    are “hidden” inside libraries. The wrapper classes I just mentioned are in the
    `java.lang` library, together with dozens of other general classes such as `String`
    and `Math`. You can find the full documentation of the Java 7.0 platform at [`http://docs.oracle.com/javase/7/docs/`](http://docs.oracle.com/javase/7/docs/),
    and a description of its classes at [`http://docs.oracle.com/javase/7/docs/api/`](http://docs.oracle.com/javase/7/docs/api/).


    Here are some examples of how you can declare variables and initialize them:


    ```

    String aString = "abcdxyz";

    int k = aString.length();  // k is then set to 7

    char c = aString.charAt(4);  // c is set to ''x''

    static final NAME = "John Doe";

    ```


    The `final` keyword in the last example of declarations makes the variable unchangeable.
    This is how you define constants in Java. The `static` keyword indicates that
    a variable is to be shared by all objects within the same application that are
    instantiated from the class.


    The use of static variables in JSP requires some further comment. In JSP, you
    can declare variables in three ways:


    ```

    <% int k = 0; %>

    <%! int k = 0; %>

    <%! static int k = 0; %>

    ```


    The first declaration means that a new variable is created for each incoming HTTP
    client request; the second one means that a new variable is created for each new
    instance of the servlet; and the third one means that the variable is shared among
    all instances of the servlet.


    Tomcat converts each JSP page into a subclass of the HTTP Servlet class (`javax.servlet.http.HttpServlet`).
    Normally, Tomcat instantiates each one of these classes only once and then creates
    a Java thread for each incoming request. It then executes the same servlet object
    within each thread. If the application runs on a distributed environment or for
    high numbers of requests, Tomcat can instantiate the same servlet more than once.
    Therefore, only the third declaration guarantees that the variable will be shared
    among all requests.


    Tomcat keeps the servlet code buried deep in the folder named `work`. For example,
    the servlet generated from `webapps\ROOT\tests\a.jsp` is in `work\Catalina\localhost\_\org\apache\jsp\tests\`
    and is named `a_jsp.java`.


    You’re free to name your variables as you like, though your case-sensitive string
    of characters must begin with a letter, a dollar, or an underscore, and not contain
    a space. That said, be aware that the following keywords are reserved and will
    cause a compilation error: `abstract`, `assert`, `boolean`, `break`, `byte`, `case`,
    `catch`, `char`, `class`, `const`, `continue`, `default`, `do`, `double`, `else`,
    `enum`, `extends`, `final`, `finally`, `float`, `for`, `goto`, `if`, `implements`,
    `import`, `instanceof`, `int`, `interface`, `long`, `native`, `new`, `package`,
    `private`, `protected`, `public`, `return`, `short`, `static`, `strictfp`, `super`,
    `switch`, `synchronized`, `this`, `throw`, `throws`, `transient`, `try`, `void`,
    `volatile`, and `while`. Whenever possible, use capital letters for constants.
    It is not necessary, but it makes the code more readable and is a well-established
    coding practice.


    To use special characters within a string, you need to escape them with a backslash,
    as shown in [Table 2-2](#Chapter02.html#tab_2_2). With `\u` followed by up to
    four hexadecimal digits, you can specify any Unicode character. For example, you
    can enter the Greek capital letter delta as `\u0394`.


    ![Image](images/9781430246237_Tab02-02.jpg)


    #### Objects and Arrays


    To create an object of a certain type (i.e., to instantiate a class), use the
    keyword `new`, as in the following example:


    ```

    Integer integerVar = new Integer(55);

    ```


    This creates an object of type `Integer` with value `55`.


    You can have arrays of any object type or primitive data type, as in the following
    examples of array declarations:


    ```

    int[] intArray1;

    int[] intArray2 = {10, 100, 1000};

    String[] stringArray = {"a", "bb"};

    ```


    `intArray1` is `null`; `intArray2` is an array of length 3 containing `10`, `100`,
    and `1000`; and `stringArray` is an array of length 2 containing the strings `"a"`
    and `"bb"`. Although arrays look special, they’re actually just objects and treated
    like that. Therefore, you can initialize them with `new`. For example, the following
    line of code declares an integer array with 10 elements, each initialized to zero:


    ```

    int[] array = new int[10];

    ```


    A two-dimensional table is an array in which each element object is itself an
    array. This is *not* like in C, where a single block of memory contains all elements
    of multidimensional tables. For example, this line of code represents a table
    of two rows, but the first row has three elements, while the second one has only
    two:


    ```

    int[][] table1 = {{11, 12, 13}, {21, 22}};

    ```


    If you define something like this:


    ```

    int[][] table = new int[2][3];

    ```


    you have a table with two rows and three columns, with all elements initialized
    to zero.


    When declaring a table, you can leave the last (innermost) dimension empty. For
    example, the following declaration results in a table of two rows, but the rows
    are undefined and remain set to `null`:


    ```

    int[][] table = new int[2][];

    ```


    Before being able to assign values to the individual elements of such partially
    defined table, you will have to declare its rows or assign to them already declared
    monodimensional arrays:


    ```

    table[0] = new int[5];

    int[] anArray = {10, 100};

    table[1] = anArray;

    ```'
  raw: '#### Data Types and Variables


    Java makes available primitive data types similar to the basic types of C/C++
    (see [Table 2-1](#Chapter02.html#tab_2_1)). However, there is one important, if
    not so apparent, difference. The precision of the numeric types is implementation-dependent
    in C, but it is guaranteed to be constant across platforms in Java.


    ![Image](images/9781430246237_Tab02-01.jpg)


    The second column of [Table 2-1](#Chapter02.html#tab_2_1) gives you the names
    of the so-called *wrapper classes* that Java makes available for each primitive
    type. These classes provide some useful static methods to manipulate numbers.
    For example, `Integer.parseInt(String s, int radix)` interprets a string as a
    number in the base set by the second argument and returns it as an `int` value
    (e.g., `Integer.parseInt("12", 16)` and `Integer.parseInt("10010", 2)` both return
    18).


    In Java, like in C, you can define octal literals by sticking a zero in front
    of the number, and hexadecimal literals by adding `0x` or `0X`. For example, both
    0123, which means 1×64 + 2×8 + 3×1, and 0x53, which means 5×16 + 3×1, are different
    ways of representing the decimal number 83\. With Java 7, you also have the suffixes
    0b and 0B to identify binary literals. This means that you can also write decimal
    83 as 0b1010011.


    I will be mentioning new features of Java introduced with Java 7 as they become
    relevant. They are nice, and useful to improve code readability and maintenability,
    but before embracing them, check that all servers to which you will deploy your
    applications have been upgraded to Java 7.


    Programs in Java can be platform-independent because all platform dependencies
    are “hidden” inside libraries. The wrapper classes I just mentioned are in the
    `java.lang` library, together with dozens of other general classes such as `String`
    and `Math`. You can find the full documentation of the Java 7.0 platform at [`http://docs.oracle.com/javase/7/docs/`](http://docs.oracle.com/javase/7/docs/),
    and a description of its classes at [`http://docs.oracle.com/javase/7/docs/api/`](http://docs.oracle.com/javase/7/docs/api/).


    Here are some examples of how you can declare variables and initialize them:


    `String aString = "abcdxyz";`

    `int k = aString.length();  // k is then set to 7`

    `char c = aString.charAt(4);  // c is set to ''x''`

    `static final NAME = "John Doe";`


    The `final` keyword in the last example of declarations makes the variable unchangeable.
    This is how you define constants in Java. The `static` keyword indicates that
    a variable is to be shared by all objects within the same application that are
    instantiated from the class.


    The use of static variables in JSP requires some further comment. In JSP, you
    can declare variables in three ways:


    `<% int k = 0; %>`

    `<%! int k = 0; %>`

    `<%! static int k = 0; %>`


    The first declaration means that a new variable is created for each incoming HTTP
    client request; the second one means that a new variable is created for each new
    instance of the servlet; and the third one means that the variable is shared among
    all instances of the servlet.


    Tomcat converts each JSP page into a subclass of the HTTP Servlet class (`javax.servlet.http.HttpServlet`).
    Normally, Tomcat instantiates each one of these classes only once and then creates
    a Java thread for each incoming request. It then executes the same servlet object
    within each thread. If the application runs on a distributed environment or for
    high numbers of requests, Tomcat can instantiate the same servlet more than once.
    Therefore, only the third declaration guarantees that the variable will be shared
    among all requests.


    Tomcat keeps the servlet code buried deep in the folder named `work`. For example,
    the servlet generated from `webapps\ROOT\tests\a.jsp` is in `work\Catalina\localhost\_\org\apache\jsp\tests\`
    and is named `a_jsp.java`.


    You’re free to name your variables as you like, though your case-sensitive string
    of characters must begin with a letter, a dollar, or an underscore, and not contain
    a space. That said, be aware that the following keywords are reserved and will
    cause a compilation error: `abstract`, `assert`, `boolean`, `break`, `byte`, `case`,
    `catch`, `char`, `class`, `const`, `continue`, `default`, `do`, `double`, `else`,
    `enum`, `extends`, `final`, `finally`, `float`, `for`, `goto`, `if`, `implements`,
    `import`, `instanceof`, `int`, `interface`, `long`, `native`, `new`, `package`,
    `private`, `protected`, `public`, `return`, `short`, `static`, `strictfp`, `super`,
    `switch`, `synchronized`, `this`, `throw`, `throws`, `transient`, `try`, `void`,
    `volatile`, and `while`. Whenever possible, use capital letters for constants.
    It is not necessary, but it makes the code more readable and is a well-established
    coding practice.


    To use special characters within a string, you need to `escape` them with a backslash,
    as shown in [Table 2-2](#Chapter02.html#tab_2_2). With `\u` followed by up to
    four hexadecimal digits, you can specify any Unicode character. For example, you
    can enter the Greek capital letter delta as \u0394.


    ![Image](images/9781430246237_Tab02-02.jpg)


    #### Objects and Arrays


    To create an object of a certain type (i.e., to instantiate a class), use the
    keyword `new`, as in the following example:


    `Integer integerVar = new Integer(55);`


    This creates an object of type `Integer` with value `55`.


    You can have arrays of any object type or primitive data type, as in the following
    examples of array declarations:


    `int[] intArray1;`

    `int[] intArray2 = {10, 100, 1000};`

    `String[] stringArray = {"a", "bb"};`


    `intArray1` is `null`; `intArray2` is an array of length 3 containing `10`, `100`,
    and `1000`; and `stringArray` is an array of length 2 containing the strings `"a"`
    and `"bb"`. Although arrays look special, they’re actually just objects and treated
    like that. Therefore, you can initialize them with `new`. For example, the following
    line of code declares an integer array with 10 elements, each initialized to zero:


    `int[] array = new int[10];`


    A two-dimensional table is an array in which each element object is itself an
    array. This is *not* like in C, where a single block of memory contains all elements
    of multidimensional tables. For example, this line of code represents a table
    of two rows, but the first row has three elements, while the second one has only
    two:


    `int[][] table1 = {{11, 12, 13}, {21, 22}};`


    If you define something like this:


    `int[][] table = new int[2][3];`


    you have a table with two rows and three columns, with all elements initialized
    to zero.


    When declaring a table, you can leave the last (innermost) dimension empty. For
    example, the following declaration results in a table of two rows, but the rows
    are undefined and remain set to `null`:


    `int[][] table = new int[2][];`


    Before being able to assign values to the individual elements of such partially
    defined table, you will have to declare its rows or assign to them already declared
    monodimensional arrays:


    `table[0] = new int[5];`

    `int[] anArray = {10, 100};`

    `table[1] = anArray;`'
