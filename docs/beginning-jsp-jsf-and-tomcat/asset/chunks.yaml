    JSP in XML Syntax    JSP pages with scripting elements aren’t XML files. This
    implies that you cannot use XML tools when developing JSP pages. However, it is
    possible to write JSP in a way to make it correct XML. The trick is to use standard
    JSP actions, JSTL with EL, and possibly non-JSTL custom actions. Actually, there
    are some “special standard” (pun intended!) JSP actions defined to support the
    XML syntax (`jsp:root`, `jsp:output`, and `jsp:directive`). In any case, such
    XML modules are called *JSP documents*, as opposed to the *JSP pages* written
    in the traditional non-XML-compliant way.    As a first example, let’s convert
    the `hello.jsp` page shown in [Listing 1-4](#Chapter01.html#list_1_4) to a `hello.jspx`
    document. [Listing 5-16](#Chapter05.html#list_5_16) shows a partial hello.jspx
    that only writes `"Hello World!"`. We’ll convert the scriptlet that displays the
    dynamic information later.    ***Listing 5-16.** Partial hello.jspx*  `01: <?xml
    version="1.0" encoding="UTF-8"?>` `02: <jsp:root` `03:  ` `04:  ` `05:  ` `06:  
    version="2.1"` `07:   >` `08: <jsp:directive.page` `09:   language="java"` `10:  
    contentType="application/xhtml+xml;charset=UTF-8"` `11:   />` `12: <html>` `13:
    <head><title>Hello World in XHTML</title></head>` `14: <body>` `15:   <jsp:text>Hello
    World!</jsp:text>` `15: </body>` `16: </html>` `17: </jsp:root>`  Line 1 states
    that the file is XML-compliant. The `root` element in lines 2`–`7 has several
    purposes. For example, it lets you use the `jsp` extension instead of the recommended
    `jspx`. It’s also a convenient place where you can group namespace declarations
    (`xmlns`). The namespace declaration for the JSTL core tag library is the XML
    equivalent of the `taglib` directive in JSP pages. You don’t need to specify the
    JSP namespace in JSP pages, but you cannot omit it in a JSP document; otherwise,
    the `jsp:` tags won’t be recognized.    Lines 8`–`11 are the XML equivalent of
    the `page` directive of JSP pages. Also the `include` directive has its XML-equivalent
    with the element `<jsp:directive.include file="`*`relativeURL`*`"/>`.    Notice
    that the string “Hello World!” in Line 15 is enclosed within the `jsp:text` element.
    This is necessary, because in XML you cannot have “untagged” text.    To be consistent
    and make possible the full validation of the generated HTML, you should also include
    the proper `DOCTYPE`. The best way to do this is to use the attributes of the
    `jsp:output` action, which was specifically designed for this purpose. You only
    need to replace the `<html>` tag in line 12 with the following three elements:  `<jsp:output
    omit-xml-declaration="false"/>` `<jsp:output` `  doctype-root-element="html"`
    `  doctype-public="-//W3C//DTD XHTML 1.0 Strict//EN"` `  doctype-system="http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd"`
    `  />` `<html >`  Yes, it’s quite a bit of work just to write “Hello World!”,
    but this overhead is going to stay the same for JSP documents of any size. The
    first line causes the `<?xml ... ?>` elements to be written at the beginning of
    the generated HTML page, while the second element generates the `DOCTYPE`.    If
    you look at the HTML page generated by this preliminary version of `hello.jspx`,
    you’ll see that all the HTML code is in a single line. If you want to have newlines
    between HTML tags in the output, you have to write them. You can actually do this
    with the `jsp:text` action. For example, all the `jsp:text` elements in the following
    code fragment contain a newline (which you can see) followed by two spaces (which
    you cannot see in the listing but are there):  `<html ><jsp:text>` `  </jsp:text><head><title>Hello
    World in XHTML</title></head><jsp:text>` `  </jsp:text><body>Hello World!</body><jsp:text>`
    `  </jsp:text></html>`  As the `jsp:text` content is sent to the output as it
    is, the HTML generated will be written over several lines and indented:  `<html
    >` `  <head><title>Hello World in XHTML</title></head>` `  <body>Hello World!</body>`
    `  </html>`  The other possibility is to use a `CDATA` section to enclose the
    whole HTML:  `<![CDATA[<html >` `  <head><title>Hello World in XHTML</title></head>`
    `  <body>Hello World!</body>` `  </html>]]>`  This way, the whole block will be
    sent to the client as it is, uninterpreted. However, it seems an admission of
    defeat to send off code that could have been validated for XML compliance at the
    source. Don’t you think?    **IE AND XHTML**    Microsoft only managed to include
    in their Internet Explorer full support of XHTML with IE9\. Unfortunately, IE9
    requires at least Windows Vista. If you are running XP, you are not in luck.    But
    also if you are running Vista, in order to install IE9, you first need to install
    Service Pack 2, which is *not* an automatic update. Further, while all other browsers
    have no problems in recognizing XHTML in a page with content type `"text/html"`,
    IE requires that you specify the mime type of the page to be `"application/xhtml+xml"`.    For
    your information, in April 2012, [`http://en.wikipedia.org/wiki/Web_browsers`](http://en.wikipedia.org/wiki/Web_browsers)
    reported that IE [still] counted for approximately 26 percent of worldwide browser
    usage. At about the same time, [`http://www.statowl.com`](http://www.statowl.com)
    claimed that about 36 percent of the IEs installed were version 9\. This means
    that almost 17% of people were then not able to view XHTML pages. By the time
    you are reading this, that percentage will have significantly decreased, not only
    because more people will have upgraded to the last version of IE but also because
    many will have switched to using chrome, android, or other browsers.    Now you’re
    finally ready to tackle the conversion of the scriptlet in `hello.jsp` to XML
    syntax. [Listing 5-17](#Chapter05.html#list_5_17) shows the complete `hello.jspx`.    ***Listing
    5-17.** hello.jspx*  `<?xml version="1.0" encoding="UTF-8"?>` `<jsp:root`    `  version="2.1"`
    `  >` `<jsp:directive.page` `  language="java"` `  contentType="application/xhtml+xml;charset=UTF-8"`
