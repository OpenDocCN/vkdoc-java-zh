    exceptions. > 3.  It opens an input stream to read the XML file and an output
    stream to write the document that will result from the transformation (lines 22
    and 23). > 4.  It finally does the transformation (line 24).    The exception
    reporting is almost a carbon copy of the method I described when talking about
