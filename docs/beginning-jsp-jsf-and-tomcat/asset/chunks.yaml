    `  <h:outputText styleClass="box_p" value="Book Title/Author:"/>` `  <h:inputText
    size="15"` `      styleClass="box_searchTxt"` `      binding="#{shopManager.searchTxt}"`
    `      />` `  <h:commandButton` `      type="submit" value="Search"` `      styleClass="box_searchBtn"`
