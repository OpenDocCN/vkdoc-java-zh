    \ 4-4](#Chapter04.html#list_4_4).\n\n***Listing 4-4.** Customer.java*\n\n```\n\
    package eshop.beans;\n\npublic class Customer {\n  private String contactName\
    \ = \"\";\n  private String deliveryAddress = \"\";\n  private String ccName =\
    \ \"\";\n  private String ccNumber = \"\";\n  private String ccExpiryDate = \"\
    \";\n\n  public String getContactName() {\n    return contactName;\n    }\n  public\
    \ void setContactName(String contactName) {\n    this.contactName = contactName;\n\
    \    }\n\n  public String getDeliveryAddress() {\n    return deliveryAddress;\n\
    \    }\n  public void setDeliveryAddress(String deliveryAddress) {\n    this.deliveryAddress\
    \ = deliveryAddress;\n    }\n\n  public String getCcName() {\n    return ccName;\n\
    \    }\n  public void setCcName(String ccName) {\n    this.ccName = ccName;\n\
    \    }\n\n  public String getCcNumber() {\n    return ccNumber;\n    }\n  public\
    \ void setCcNumber(String ccNumber) {\n    this.ccNumber = ccNumber;\n    }\n\n\
    \  public String getCcExpiryDate() {\n    return ccExpiryDate;\n    }\n  public\
    \ void setCcExpiryDate(String ccExpiryDate) {\n    this.ccExpiryDate = ccExpiryDate;\n\
    \    }\n  }\n```\n\nAs you can see, the `Customer` class defines private attributes\
    \ and then the methods to access them, so that they can be recognized as properties.\n\
    \n![Image](images/square.jpg) **Caution** The use of `property=\"*\"` can have\
    \ confusing outcomes if parameters and attributes are not correctly matched\n\n\
    So far so good. Not so interesting. But what is interesting is that the `setProperty`\
    \ action\n\n```\n<jsp:setProperty property=\"*\" name=\"customer\"/>\n```\n\n\
    is equivalent to the following:\n\n```\ncustomer.setContactName(request.getParameter(\"\
    contactName\");\ncustomer.setDeliveryAddress(request.getParameter(\"deliveryAddress\"\
    );\ncustomer.setCcName(request.getParameter(\"ccName\");\ncustomer.setCcNumber(request.getParameter(\"\
    ccNumber\"));\ncustomer.setCcExpiryDate(request.getParameter(\"ccExpiryDate\"\
    ));\n```\n\nThe implementation with the action is more compact and, most importantly,\
    \ it remains valid regardless of whether you add or remove customer attributes.\
    \ And that’s what makes `setProperty` worthwhile.\n\nAlso `jsp:getProperty` is\
    \ useful, because it sends the value of a property to the output. For example,\
    \ suppose you define `MyClass` as shown in [Listing 4-5](#Chapter04.html#list_4_5).\n\
