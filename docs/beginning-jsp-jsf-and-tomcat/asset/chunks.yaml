    documentation about XSLT at [`http://www.w3.org/TR/xslt`](http://www.w3.org/TR/xslt).    ####
    XSLT: Transformation from XML to HTML    As you have seen, you can use XPath in
    a JSP page to navigate through an XML document and display it in HTML format.
    In this section, I’m going to show you how you can use XSLT to transform the same
    starfleet.xml directly into HTML. The two strategies are subtly different: with
    JSP, you pick up the nodes one by one and display them in HTML; with XSLT, you
    specify how the nodes of the XML files are to be mapped into HTML elements.    Let’s
    cut to the chase and go directly to the XSLT file, shown in [Listing 5-12](#Chapter05.html#list_5_12).    ***Listing
    5-12.** starfleet.xsl*  `<?xml version="1.0" encoding="UTF-8"?>` `<xsl:stylesheet
    version="1.0" >` `<xsl:output method="html" version="4.0" encoding="UTF-8" indent="yes"/>`
    `<xsl:template match="/">` `<html><head>` `  <title>Styling starfleet.xml</title>`
    `  <style>th {text-align:left}</style>` `  </head>` `<body>` `<h2>The Most Famous
    Starships in the Fleet</h2>` `<table border="1">` `  <tr><th>Name</th><th>S/N</th><th>Class</th><th>Commissioned</th><th>Captain</th></tr>`
    `  <xsl:for-each select="starfleet/starship">` `    <xsl:sort select="class/@commissioned"/>`
    `    <tr>` `      <td><xsl:value-of select="@name"/></td>` `      <td><xsl:value-of
    select="@sn"/></td>` `      <td><xsl:value-of select="class"/></td>` `      <td><xsl:value-of
    select="class/@commissioned"/></td>` `      <td><xsl:value-of select="captain"/></td>`
    `      </tr>` `    </xsl:for-each>` `  </table>` `</body>` `</html>` `</xsl:template>`
    `</xsl:stylesheet>`  After the first example ([Listing 5-11](#Chapter05.html#list_5_11)),
    it should be clear how this works. There is just one point I would like to clarify:
    if you wanted to, you could omit the third line because, although the default
    output format is XML, XSL automatically recognizes that you’re generating HTML
    if the first tag it encounters is `<html>`. Nevertheless, I recommend that you
    define the output format explicitly so that you can set HTML version, encoding,
    and indentation.    #### XSL Transformation: Browser Side vs. Server Side    I
    still haven’t told you how to apply an XSL style sheet to an XML file to perform
    the transformation. This is because I first have to clarify the distinction between
    browser-side vs. server-side transformation.    ##### Browser-Side XSL Transformation    All
    browsers can process XML and XSL. For example, let’s say you copy `enterprises_schema.xml`
    from the `xml-validate\xml\` subfolder of the software package for this chapter
    to the `webapps\ROOT\tests\` folder of the Tomcat directory. By typing [`http://localhost:8080/tests/enterprises_schema.xml`](http://localhost:8080/tests/enterprises_schema.xml)
    in most browsers, you see the file with little markers on the left of each element,
    as shown in [Figure 5-4](#Chapter05.html#fig_5_4), where I used Chrome. By clicking
    on the markers, you can collapse or expand the elements as if they were folders.
    Firefox and IE use `-/+` as markers. Opera is the only widely used browser that
    doesn’t support this feature.  ![Image](images/9781430246237_Fig05-04.jpg)  ***Figure
    5-4.** Browsing an XML file without XSL*    The browsers can provide this feature
    because they “know” how to display XML. The message at the top of the page indicates
    that the browser displays the file as a node tree in a generic way because `enterprises_schema.xml`
    doesn’t refer to any XSL style sheet. (Just so you know, Firefox displays the
    same message, IE doesn’t display any message, and Opera simply states `"This document
    had no style information"`.) But all browsers color code the different components.    Making
    the association is simple: copy `starfleet.xsl` from the sub-folder `xml-style\xsl\`
    of the software package for this chapter to the usual `tests` folder and insert
    the following processing instruction immediately below the first line of `enterprises_schema.xml`
    (i.e., the line with `<?xml...?>`):  `<?xml-stylesheet type="text/xsl" href="starfleet.xsl"?>`  Now,
    if you ask the browser to display [`http://localhost:8080/test/enterprises_schema.xml`](http://localhost:8080/test/enterprises_schema.xml),
    it will know what style sheet to use. The `href` attribute expects a URL. Therefore,
    in general, you can also set it to URLs such as `"`[`http://localhost:8080/tests/starfleet.xsl`](http://localhost:8080/tests/starfleet.xsl)`"`
    or `"/tests/starfleet.xsl"`. I chose to write the relative URL, because I am keeping
    both files in the same `test` folder, and it makes our lives easier. In any case,
    [Figure 5-5](#Chapter05.html#fig_5_5) shows the result.  ![Image](images/9781430246237_Fig05-05.jpg)  ***Figure
    5-5.** Browsing an XML file with XSL*    Actually, there is one small advantage
    in keeping XML and XSL files in the same folder: you can view the XML file in
    a browser by just drag-and-dropping it onto the browser window. This doesn’t work
    if you use an absolute URL in the `href`.    But I need to expand on this concerning
    Google Chrome. For the drag-and-drop trick to work, the browser must allow a file
    to access another file. Chrome, for security reasons, doesn’t. You can force it
    to do this operation by starting it with the switch `--allow-file-access-from-files`.
    To do so, right-click Chrome’s icon in the quick-start bar or on the desktop,
    display its properties, and append the switch to the application’s path you see
    in the target field. It’s easy, but I advise you not to weaken the security of
    the browser.    With any browser, if you view the page source, you’ll see the
    XML file, because it is the browser that does the transformation from XML to HTML.
    Therefore, the source file is in fact the XML document.    One thing to keep in
    mind is that the user can also easily obtain your XSL file, because its URL is
    shown in the XML source. For example, if you copy `starfleet.xml` from the `xml-style\xsl\`
    sub-folder of the software package for this chapter to the `tests` folder and
    view it in a browser with the URL [`http://localhost:8080/tests/starfleet.xml`](http://localhost:8080/tests/starfleet.xml),
    you can display its source and discover the relative URL of the style sheet. Then,
    you only need to type [`http://localhost:8080/tests/starfleet.xsl`](http://localhost:8080/tests/starfleet.xsl)
    to see the XSL file.    ##### Server-Side XSL Transformation    You can do the
    transformation on the server and make its output available, rather than making
    the XML and XSL files visible to the user. In that way, you can keep XML and XSL
    in private folders. [Listing 5-13](#Chapter05.html#list_5_13) shows you how to
    do the XSL server-side transformation with a JSP page.    ***Listing 5-13.** enterprises_transform.jsp*  `01:
    <%@page language="java" contentType="text/html"%>` `02: <%@page import="java.io.File"%>`
    `03: <%@page import="java.io.FileOutputStream"%>` `04: <%@page import="javax.xml.transform.TransformerFactory"%>`
    `05: <%@page import="javax.xml.transform.Transformer"%>` `06: <%@page import="javax.xml.transform.Source"%>`
    `07: <%@page import="javax.xml.transform.SourceLocator"%>` `08: <%@page import="javax.xml.transform.TransformerException"%>`
    `09: <%@page import="javax.xml.transform.Result"%>` `10: <%@page import="javax.xml.transform.stream.StreamSource"%>`
    `11: <%@page import="javax.xml.transform.stream.StreamResult"%>` `12: <%@page
    import="myPkg.TransformerExceptionHandler"%>` `13: <%` `14:   File inFile = new
    File("webapps/xml-style/xsl/starfleet.xml");` `15:   File xslFile = new File("webapps/xml-style/xsl/enterprises.xsl");`
    `16:   String outFilename = "webapps/xml-style/out/enterprises_out.xml";` `17:  
    TransformerExceptionHandler handler = new TransformerExceptionHandler();` `18:  
    try {` **`19:     TransformerFactory factory = TransformerFactory.newInstance();`**
    **`20:     Transformer transformer = factory.newTransformer(new StreamSource(xslFile));`**
    **`21:     transformer.setErrorListener(handler);`** **`22:     Source source
    = new StreamSource(inFile);`** **`23:     Result result = new StreamResult(new
    FileOutputStream(outFilename));`** **`24:     transformer.transform(source, result);`**
    `25:     }` `26:   catch (TransformerException e) {` `27:     }` `28:   if (handler.errorLevel
    == null) {` `29:     out.println("Transformation completed.");` `30:     }` `31:  
    else {` `32:     out.println(` `33:         "*** Transformation " + handler.errorLevel
    + ": "` `34:       + handler.transformationException` `35:       );` `36:    
    }` `37:   %>`  It looks more complicated than it actually is. Moreover, I have
    hard-coded the file names for simplicity, but you can add to the JSP page a simple
    input form to set `inFile` and `xslFile`, and you’ll have a small utility you
    can use to transform all XML files. Following the MVC architecture, you should
    place the application logic in a servlet (i.e., the Controller), not in a JSP
    page. But I just wanted to show you in the simplest possible way how this is done
    in JSP/Java.    `enterprises_transform.jsp` performs the XML transformation on
    the server side as follows:    > 1.  It instantiates a generic `TransformerFactory`
    and uses it to create a `Transformer` that implements the XSL (lines 19 and 20).
