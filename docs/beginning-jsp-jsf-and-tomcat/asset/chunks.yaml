  trans: '

    ##### 使用 EL 表达式


    `${expr}`中的`expr`可以包含字面量、运算符以及对对象和方法的引用。表 4-5 展示了一些示例及其结果。


    ![Image](img/9781430246237_Tab04-05.jpg)


    ![Image](img/9781430246237_Tab04-05a.jpg)


    这些运算符的行为通常与 Java 中类似，但有一个重要区别：应用于字符串变量的相等运算符（`==`）比较的是它们的内容，而不是变量是否引用同一个字符串实例。也就是说，它的行为类似于
    Java 的`String.equals()`方法。


    除了与 Java 运算符相同的 EL 运算符外，你还可以使用它们的大多数字面等价形式：`not`对应`!`，`div`对应`/`，`mod`对应`%`，`lt`对应`<`，`gt`对应`>`，`le`对应`<=`，`ge`对应`>=`，`eq`对应`==`，`ne`对应`!=`，`and`对应`&&`，`or`对应`||`。你还可以使用一元运算符`empty`，其用法如表
    4-2 中的一个示例所示。


    EL 运算符`''.''`（即点号）和`[]`（即索引）比对应的 Java 运算符更强大且更宽容。


    当应用于 bean 时，如`${myBean.prop}`，点运算符被解释为应返回属性值的指示，就像你在脚本元素中编写了`myBean.getProp()`一样。因此，例如，代码行


    `${pageContext.servletContext.servletContextName}`


    等价于：


    `<%=pageContext.getServletContext().getServletContextName()%>`


    此外，`${first.second.third}`（等价于`<%=first.getSecond().getThird()%>`）在`first.second`求值为`null`时返回`null`，尽管在表达式中我们试图通过`.third`解引用它。等效的
    JSP 脚本会抛出`NullPointerException`。要使此功能生效，所有类都必须实现格式正确的 Java bean 的 getter 方法。


    数组索引允许你尝试访问不存在的元素，在这种情况下，它只会求值为`null`。例如，如果你有一个包含十个元素的数组，EL 表达式`${myArray[999]}`会返回`null`，而不会像
    Java 那样抛出`ArrayIndexOutOfBoundsException`。这不像在古老的“C”语言中那么糟糕，在 C 语言中，索引越界会返回内存中找到的值。使用
    EL，你可以检查`null`。通常你应该这样做，因为你不能像在 Java 中那样依赖抛出异常。


    你可以使用点运算符和索引运算符来访问映射。例如，以下两个 EL 表达式都返回与键`myKey`关联的值：


    `${myMap.myKey}`

    `${myMap["myKey"]}`


    不过，有一个细微的区别：如果键的名称包含会混淆 EL 的字符，则不能使用点运算符。例如，`${header["user-agent"]}`是可行的，但`${header.user-agent}`不起作用，因为第二个表达式中`user`和`agent`之间的连字符被解释为减号。除非你有一个名为`agent`的变量，否则`header.user`和`agent`都会求值为`null`，并且根据
    EL 规范文档，`${null - null}`求值为零。因此，第二个表达式会返回零。如果你有一个包含点号的映射键，你会遇到一个不同但可能更严重的问题。例如，你可以毫无问题地使用`${param["my.par"]}`，但`${param.my.par}`很可能会产生`null`，或者几乎肯定不是你正在寻找的值。无论如何，这都很糟糕，因为`null`是一个可能的有效结果。我建议你在所有情况下都使用括号形式，并干脆忘记这个问题。


    与 JSP 类似，EL 包含隐式对象，你可以在表 4-6 中找到它们。


    ![Image](img/9781430246237_Tab04-06.jpg)


    ![Image](img/square.jpg) **注意** 你*不能*在 EL 表达式中使用 JSP 脚本变量。


    你可能已经注意到 EL 不包含任何声明变量的方式。在 EL 表达式中，你可以使用通过`c:set` JSTL 核心操作（我将在下一节中描述）设置的变量或作用域属性。例如，以下所有定义都允许你使用
    EL 表达式`${xyz}`：


    `<c:set var="xyz" value="33"/>`

    `<% session.setAttribute("xyz", "44"); %>`

    `<% pageContext.setAttribute("xyz", "22"); %>`


    但是，你必须注意作用域的优先级。使用`c:set`设置的变量和`pageContext`中的属性*是同一个变量*。也就是说，`c:set`在页面上下文中定义了一个属性。`sessionContext`中的属性是一个不同的变量，你不能使用`${xyz}`访问它，因为它被页面上下文中同名的属性“隐藏”了。要访问会话属性，你必须在它的名称前加上`sessionScope`前缀，如`${sessionScope.xyz}`。如果你不指定作用域，EL
    会首先在页面中查找，然后在请求中查找，接着在会话中查找，最后在应用程序作用域中查找。


    ![Image](img/square.jpg) **注意** 你不能嵌套 EL 表达式。像`${expr1[${expr2}]}`这样的表达式是非法的。


    你可以创建由多个 EL 表达式和附加文本组成的复合表达式，如下例所示：


    `<c:set var="varName" value="Welcome ${firstName} ${lastName}!"/>`


    但是，你不能混合使用`${}`和`#{}`形式。


    #### JSP 标准标签库


    JSTL 由五个标签库组成，如表 4-7 所列。如果你想知道，i18n 代表*国际化*，通过将中间的十八个字母替换为数字 18 来缩写。


    ![Image](img/9781430246237_Tab04-07.jpg)


    ![Image](img/9781430246237_Tab04-07a.jpg)


    表 4-8 列出了五个库中定义的所有标签。


    ![Image](img/9781430246237_Tab04-08.jpg)


    正如你在几个示例中已经看到的，要在 JSP 页面中使用 JSTL 库，你必须在`taglib`指令中声明它们，如下所示：


    `<%@taglib prefix="c" uri="http://java.sun.com/jsp/jstl/core"%>`

    `<%@taglib prefix="fmt" uri="http://java.sun.com/jsp/jstl/fmt"%>`

    `<%@taglib prefix="fn" uri="http://java.sun.com/jsp/jstl/functions"%>`

    `<%@taglib prefix="sql" uri="http://java.sun.com/jsp/jstl/sql"%>`

    `<%@taglib prefix="x" uri="http://java.sun.com/jsp/jstl/xml"%>`


    我将在第 5 章中描述 JSTL-XML，届时我将讨论 XML，并在第 6 章中描述 JSTL-SQL，该章专门讨论从 JSP 访问数据库。在本章的以下部分中，我将描述
    JSTL-core 和 JSTL-i18n。我不会讨论函数，因为它们是不言自明的。


    #### 核心库


    为了解释一些最常用的操作，我将回到第 1 章（清单 1-6）中的示例`req_params.jsp`，并将其脚本替换为 JSTL 操作。清单 4-16 向你展示了如何操作。

    '
- fmt: "##### `c:out`, `c:set`, and `c:forEach` (and `fn:length`)\n\n***Listing 4-16.**\
    \ `req_params_jstl.jsp`*\n\n```\n01: <%@page language=\"java\" contentType=\"\
    text/html\"%>\n02: <%@taglib prefix=\"c\" uri=\"http://java.sun.com/jsp/jstl/core\"\
    %>\n03: <%@taglib prefix=\"fn\" uri=\"http://java.sun.com/jsp/jstl/functions\"\
    %>\n04: <html><head><title>Request Parameters with JSTL</title></head><body>\n\
    05:   Map size = <c:out value=\"${fn:length(paramValues)}\"/>\n06:   <table border=\"\
    1\">\n07:     <tr><td>Map element</td><td>Par name</td><td>Par value[s]</td></tr>\n\
    08:     <c:set var=\"k\" value=\"0\"/>\n09:     <c:forEach var=\"par\" items=\"\
    ${paramValues}\"><tr>\n10:       <td><c:out value=\"${k}\"/></td>\n11:       <td><c:out\
    \ value=\"'${par.key}'\"/></td>\n12:       <td><c:forEach var=\"val\" items=\"\
    ${par.value}\">\n13:         <c:out value=\"'${val}'\"/>\n14:         </c:forEach></td>\n\
    15:       <c:set var=\"k\" value=\"${k+1}\"/>\n16:       </tr></c:forEach>\n17:\
    \     </table>\n18: </body></html>\n```\n\nNotice that, as there are no scripting\
    \ elements, I have removed the importing of Java libraries.\n\nLines 2 and 3 show\
    \ the `taglib` directives for JSTL core and functions. In Line 5, you can see\
    \ how to use the `fn:length` function to determine the size of the EL implicit\
    \ object `paramValues` and the `c:out` action to send the value of an EL expression\
    \ to the output. You could have just written the naked EL expression, but `c:out`\
    \ automatically converts characters that have special HTML meaning to the corresponding\
    \ HTTP entities. For example, it writes `&amp;` instead of `&`. Therefore, it’s\
    \ better to use `c:out`.\n\n`c:set` initializes an index in line 8 and increments\
    \ it in line 15. In lines 9 and 12, `c:forEach` lets you go through the elements\
    \ of maps and arrays.\n\nIf you type in your browser\n\n[`http://localhost:8080/tests/req_params_jstl.jsp?a=b&c=d&a=zzz&empty=&empty=&1=22`](http://localhost:8080/tests/req_params_jstl.jsp?a=b&c=d&a=zzz&empty=&empty=&1=22)\n\
    \nyou’ll get the same output shown in [Figure 1-12](#Chapter01.html#fig_1_12)\
    \ for `req_params.jsp` (see [Figure 4-3](#Chapter04.html#fig_4_3)). Although,\
    \ to be completely correct, the format of the HTML will be different.\n\n![Image](images/9781430246237_Fig04-03.jpg)\n\
    \n***Figure 4-3.** Output of `req_params_jstl.jsp`*\n\nIn essence, `c:out` is\
    \ for EL expressions what an expression scripting element is for JSP (i.e., Java)\
    \ expressions. Beside the attribute `value`, it supports `default`, to provide\
    \ a fallback output, and `escapeXml`, that you set to `false` to prevent the escaping\
    \ of XML characters, which are escaped by default.\n\nWith `c:set`, besides defining\
    \ `var` and `value`, you can also specify the scope of the variable with the attribute\
    \ `scope`. Finally, in alternative to `var`, you can use the pair of attributes\
    \ `property` and `target` to specify which property of which object you want to\
    \ modify.\n\nIn the example, you have seen that `c:forEach` lets you loop over\
    \ a list of objects with the two attributes `var` and `items`. Alternatively,\
    \ you can go through a list by means of the attributes `begin`, where `0` indicates\
    \ the first element, `end`, and `step`. Further, if you define the name of a variable\
    \ by setting the attribute `varStatus`, `c:forEach` will store in it an object\
