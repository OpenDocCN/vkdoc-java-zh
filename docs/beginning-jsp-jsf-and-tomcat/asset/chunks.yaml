    ## 关于作者


    ![Image](img/giulio_zambon.jpg) ![Image](img/square.jpg) **朱利奥·赞邦**最初热爱的是物理学，但三十多年前，他决定投身于软件开发：那时计算机仍由晶体管和磁芯存储器构成，程序通过穿孔卡片输入，Fortran
    语言也只有算术 IF 语句。多年来，他学习了十多种计算机语言，并与各种操作系统打交道。他的具体兴趣领域在于电信和实时系统，并成功管理了多个项目。


    2001 年，朱利奥创立了自己的公司，提供计算机电话集成（CTI）服务，并专门使用 JSP 和 Tomcat 来开发服务平台的前端部分。在欧洲生活多年后，他回到了澳大利亚，现在致力于编写软件来生成和解决数字谜题。他的网站
    [`zambon.com.au/`](http://zambon.com.au/) 使用 JSP 编写，运行在他自己的专用服务器上，毫不意外，该服务器运行着
    Tomcat！


