    ### Java API


    你通过执行 SQL 语句来操作数据库。要从 Java/JSP 中执行此操作，你需要一个由多个接口、类和方法定义组成的 API。该 API 包含在 JDK 7
    版本的类库 `java.sql` 和 `javax.sql` 中。此外，你还需要一个驱动程序，该驱动程序为特定的 DBMS（即 MySQL）在你的系统（即
    Intel/Windows PC）的本机代码中实现该 API。要使用 MySQL，你使用 MySQL Connector/J 版本 5 作为驱动程序，它是一个类型
    4 JDBC 驱动程序（参见侧边栏）。


    **JDBC 驱动程序**


    JDBC API 允许你从 Java 访问数据库。有四种类型的 JDBC 实现（即驱动程序）。


    类型 1 的 JDBC 驱动程序实际上是 JDBC-ODBC 桥，因为它们通过开放数据库连接（ODBC）驱动程序访问数据库。在本章末尾，我们将向你展示如何使用
    Java 虚拟机（JVM）中包含的桥。


    类型 2 的 JDBC 驱动程序使用供应商特定的、本机的客户端库。换句话说，它们与 DBMS 供应商提供的非 Java 函数接口，而这些函数又与数据库接口。与类型
    1 的驱动程序相比，这些驱动程序效率更高，但你只能在本地使用它们。


    类型 3 的 JDBC 驱动程序是 Java 驱动程序，它们不直接与数据库通信，而是依赖于位于应用服务器上的中间件包。


    类型 4 的 JDBC 驱动程序完全用 Java 编写，并直接与 DBMS 服务器通信。这就是你想要的类型！


    #### 连接到数据库


    从 Java 访问数据库的第一步是加载驱动程序，没有它，什么都不会工作。为此，你执行方法 `Class.forName("com.mysql.jdbc.Driver")`。在
    E-shop 应用程序中，你在 servlet 的 `init` 方法中执行此操作（参见清单 3-9）。


    为了能够轻松地从 MySQL 切换到其他 DBMS，将驱动程序名称存储在 `WEB-INF\web.xml` 中定义的 `init` 参数中，如下所示：


    `<init-param>` `  <param-name>jdbcDriver</param-name>` `  <param-value>com.mysql.jdbc.Driver</param-value>`
    `  </init-param>`


    这样，你可以在初始化 servlet 时按如下方式加载它：


    `java.lang.Class.forName(config.getInitParameter("jdbcDriver"));`


    加载驱动程序后，你还需要连接到数据库才能访问其内容。在 E-shop 应用程序中，你通过执行数据管理器（类型为 `DataManager`，定义在 `WEB-INF\classes\eshop\model\DataManager.java`
    中）方法来实现，如下代码行所示：


    `java.sql.Connection connection = dataManager.getConnection();`


    反过来，数据管理器的 `getConnection` 方法从 JDBC 驱动程序获取连接，如清单 6-8 中的片段所示。


    ***清单 6-8.** DataManager.getConnection 方法*


    `public Connection getConnection() {` `  Connection conn = null;` `  try {` **`    conn
    = DriverManager.getConnection(getDbURL(), getDbUserName(), getDbPassword());`**
    `    }` `  catch (SQLException e) {` `    System.out.println("Could not connect
    to DB: " + e.getMessage());` `    }` `  return conn;` `  }`


    为了能够在不重建应用程序的情况下更改数据库、用户 ID 或密码，你可以像定义 JDBC 驱动程序的名称以及我在本章前面展示的那样，在 servlet 初始化参数中定义它们：


    `dbURL: jdbc:mysql://localhost:3306/shop` `dbUserName: root` `dbPassword:` *`none`*


    端口 3306 是 MySQL 的默认端口，可以进行不同的配置。显然，在现实生活中，你会使用不同的用户，最重要的是，定义一个密码。


    完成数据库操作后，你应该始终通过执行 `connection.close()` 来关闭连接。E-shop 通过另一个数据管理器方法来实现这一点，如清单 6-9
    所示。


    ***清单 6-9.** DataManager.putConnection 方法*


    `public void putConnection(Connection conn) {` `  if (conn != null) {` **`    try
    { conn.close(); }`** `    catch (SQLException e) { }` `    }` `  }`


    在你开始操作数据库之前，你仍然需要创建一个 `java.sql.Statement` 类型的对象，因为正是通过该对象的方法来执行 SQL 语句。使用以下代码创建语句：


    `Statement stmt = connection.createStatement();`


    一旦你完成了一条语句，你应该立即用 `stmt.close()` 释放它，因为它会占用不可忽略的空间，并且你希望确保在你的页面执行其他操作时它不会一直存在。


    #### 访问数据


    `Statement` 类有 40 个方法，加上一些继承的方法。尽管如此，两个方法很可能满足你的大部分需求：`executeQuery` 和 `executeUpdate`。


    ##### executeQuery 方法


    你使用此方法执行 `select` SQL 语句，如下所示：


    `String sql = "select book_id, title, author from books where category_id=1"`
    `    + " order by author, title";` `ResultSet rs = stmt.executeQuery(sql);`


    在示例中，该方法在类型为 `java.sql.ResultSet` 的变量 `rs` 中返回类别 1 中的所有图书，按作者姓名和标题排序。结果集中的行仅包含
    `select` 语句中指定的列，在本例中为 `book_id`、`title` 和 `author`。


    在任何给定时间，你只能访问由所谓的*游标*指向的结果集行，并且默认情况下，你只能向前移动游标。访问结果集行的常用方法是从第一行开始，然后按顺序“向下”移动。例如，使用
    `shop` 数据库，以下代码：


    `while (rs.next()) {` `  out.println(rs.getString(3) + ", " + rs.getString(2)
    + "<br/>");` `  }`


    将产生以下输出：


    `Damon Williams, Pro PayPal E-Commerce` `Michael Bowers, Pro CSS and HTML Design
    Patterns`


    `next` 方法将游标向下移动一行。在游标越过最后一行后，`next()` 返回 `false`，`while` 循环终止。最初，游标位于第一行*之前*。因此，你必须执行一次
    `next()` 才能访问第一行。


    除了 `next()`，还有其他方法可以让你重新定位游标。其中五个返回一个 `boolean`，例如 `next()`，如果游标指向一行，则返回 `true`。它们是
    `absolute(`*`row-position`*`)`、`first()`、`last()`、`previous()` 和 `relative(`*`number-of-rows`*`)`。`beforeFirst()`
    和 `afterLast()` 方法也会移动游标，但它们是 `void` 类型，因为它们总是成功。`isBeforeFirst()`、`isFirst()`、`isLast()`
    和 `isAfterLast()` 方法检查游标是否在相应的位置，而 `getRow()` 返回当前由游标指向的行位置。


    请记住，为了能够四处移动游标，你必须在创建语句时指定几个属性——也就是说，*在*你实际执行查询*之前*。这是你如何做到的：


    `Statement stmt = connection.createStatement(` `  ResultSet.TYPE_SCROLL_INSENSITIVE,`
    `  ResultSet.CONCUR_READ_ONLY` `  );`


    `ResultSet.TYPE_SCROLL_INSENSITIVE` 允许你在结果集内前后移动游标。此参数只能具有以下两个其他值之一：`ResultSet.TYPE_FORWARD_ONLY`（默认值）和
    `ResultSet.TYPE_SCROLL_SENSITIVE`。`SENSITIVE` 和 `INSENSITIVE` 之间的区别在于，使用 `INSENSITIVE`，你在处理结果集时不会受到对其所做更改的影响（稍后会详细介绍）。这可能是你想要的。


    `ResultSet.CONCUR_READ_ONLY` 声明你不想修改结果集。这是默认值，在大多数情况下是有意义的。另一种选择是指定 `ResultSet.CONCUR_UPDATABLE`，它允许你插入、删除和修改结果行。现在你可以明白为什么你可能喜欢将
    `ResultSet.TYPE_SCROLL_SENSITIVE` 作为第一个参数：它允许你在开始处理结果集后看到对其所做的修改，而不是显示这些更改之前的样子。另一方面，在一个有多个线程操作同一个结果集的复杂应用程序中，你可能更愿意忽略其他线程中所做的更改。在这种情况下，必须
    100% 清楚哪个线程被允许修改哪些行；否则，你会搞得一团糟。


    `ResultSet` 提供了几种方法，用于根据列位置或其标签以不同格式检索列值。例如，以下两个方法将返回相同的值：


    `long bookID = rs.getLong(1);` `long bookID = rs.getLong("book_id");`


    列位置指的是 `select` 语句中指定的列。请注意，列编号从 1 开始，而不是像 Java 中习惯的那样从 0 开始。可用的类型有 `Array`、`BigDecimal`、`Blob`、`boolean`、`byte`、`byte[]`、`Clob`、`Date`、`double`、`float`、`InputStream`、`int`、`long`、`NClob`、`Object`、`Reader`、`Ref`、`RowId`、`short`、`SQLXML`、`String`、`Time`、`Timestamp`
    和 `URL`（更多细节见附录 B）。对于大多数这些类型，存在一个相应的更新方法，允许你修改列。例如，以下代码将 "Joe Bloke" 写入结果集当前行的
    `author` 列：


    `rs.updateString("author", "Joe Bloke");`


    请注意，对于类型 `InputStream`、`Reader` 和 `URL`，没有更新方法。你还可以使用方法 `updateNull(`*`column-index`*`)`
    和 `updateNull(`*`column-label`*`)` 将列设置为 `null`。


    `ResultSet` 提供了超过两打的额外方法，允许你执行诸如将更新后的结果集中的更改传输到实际数据库，或者刷新可能在你执行查询后由其他人修改的实际数据库中的行等操作。一个你可能觉得有用的方法根据列名返回其在结果集中的位置：


    `int findColumn(`*`column-label`*`)`


    当相应的语句关闭时，结果集会自动释放。因此，只要你不再需要该语句时立即关闭它，你就不需要真正执行 `rs.close()`。


    ##### executeUpdate 方法


    你可以使用此方法执行 SQL 语句 `insert`、`update` 和 `delete`。例如，如果你想向 E-shop 示例添加一个新的图书类别，你可以这样做：


    `String sql = "insert into categories (category_id, category_name)"` `    + "
    values (4, ''Comic Books'')";` `stmt.executeUpdate(sql);`


    你不需要定义所有列，因为未定义的字段会自动设置为其相应的默认值。也就是说，由于我没有在 `categories` 表的定义中指定任何默认值，以下语句将导致字段
    `category_name` 被设置为 `null`：


    `stmt.executeUpdate("insert into categories (category_id) values (4)");`


    为了避免这种情况，我本可以用默认值定义 `category_name` 列：


    `category_name varchar(70) default ''Miscellanea''`


    #### 事务


    在 E-shop 中，我为与图书订单相关的数据定义了两个单独的表：一个用于客户数据，一个用于订购的个别图书（参见清单 6-7）。如果你完全丢失了一个订单，那会很糟糕，但如果你丢失了一些项目而只处理了部分订单，那可能会更糟。如果你在数据库中保存了订单详细信息但未能保存客户数据，也会出现问题。这将留下一些“孤儿”图书项目，没有关于买家的信息。如果你先保存客户数据，则无需担心这一点：然后，当你开始保存订单详细信息时，客户记录已经在磁盘上。但是你如何确保数据库只包含完整的订单呢？


    通常，当你执行 SQL `insert` 时，数据会立即存储到数据库中。为了确保订单的完整性，你可以跟踪你已经成功执行的更新，并在你无法完成整个订单时将其反转。然而，这将非常复杂，并且无法保证成功。此外，在更复杂的应用程序中，可能有多个操作同时进行，导致相同的数据库记录被并发访问。解决方案是一个内置的、万无一失的机制，能够确保某些复杂的事务“一次性”完成，或者根本不完成。


    这个机制实际上非常简单。它的工作原理如下：


    > 1.  在连接到 DB 后立即执行 `conn.setAutoCommit(false)`。这告诉 MySQL 在你确认之前不要对数据库进行永久性更改。

    > 2.  执行构成你复杂事务的所有更新。确保将它们放在 `try` 块中，作为 `try`/`catch` 结构的一部分。

    > 3.  在 `catch` 块中，包含语句 `conn.rollback()`。如果其中一个更新失败，将抛出 `SQLException`，当执行 `catch`
    块时，`rollback` 将导致 MySQL “忘记”未提交的更新。

    > 4.  当所有更新都已完成且未被任何异常中断时，执行 `conn.commit()` 告诉 MySQL 它可以最终确定更新。


    ### E-shop 中的数据库访问


    正如我在第 3 章中提到的，所有数据库操作都集中在 MVC 架构的数据模型中。JSP 模块通过执行 `DataManager` 类的方法与数据库交互，这些方法以
    Java bean 的形式接受和/或返回数据。通过数据管理器中介数据库访问，你确保视图和模型可以独立开发。


    图 6-5 显示了模型的结构。


    ![Image](img/9781430246237_Fig06-05.jpg)


    ***图 6-5.** 数据模型结构*


    `DataManager` 类设置和关闭与数据库的连接；然而，关于表访问，它只充当一个交换中心。特定的类对单个表执行实际的操作。这样，你确保对单个表的更改对应用程序的影响最小。这实际上是称为数据访问对象（DAO）的
    Java 企业版模式的一个示例。


    例如，显示图书详细信息的 JSP 页面通过执行数据管理器的以下方法来获取所请求图书的信息：


    `public Book getBookDetails(int bookID) {` `  return BookPeer.getBookById(this,
    bookID);` `  }`


    正是 `BookPeer.java` 中的 `getBookByID` 方法执行实际的数据库访问，如清单 6-10 所示。


