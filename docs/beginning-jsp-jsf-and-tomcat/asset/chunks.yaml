    as was the case in the previous versions. Additionally, JSP 2.0 made it possible
    to create custom tag files, thereby perfecting the extendibility of the language.


    In parallel to the evolution of JSP, several frameworks to develop web applications
    became available. In 2004, one of them, JavaServer Faces (JSF), focused on building
    user interfaces (UIs) and used JSP by default as the underlying scripting language.
    It provided an API, JSP custom tag libraries, and an expression language.


    The Java Community Process (JCP), formed in 1998, released in May 2006 the Java
    Specification Request (JSR) 245 titled *JavaServer Pages 2.1*, which effectively
    aligned JSP and JSF technologies. In particular, JSP 2.1 included a Unified EL
    (UEL) that merged the two versions of EL defined in JSP 2.0 and JSF 1.2 (itself
    specified as JSR 252). Sun Microsystems includes JSP 2.1 in its Java Platform,
    Enterprise Edition 5 (Java EE 5), finalized in May 2006 as JSR 244.


    The latest version of Java is 7 (specified in JSR 342 and released in July 2011).
    It includes JSP 2.2, Servlets 3.1 (JSR 340), EL 3.0 (JSR 341), and JSF 2.2 (JSR
    344). Version 8 is expected in mid-2013\. At the time of this writing, Java 7
    is only available as part of the JSE (Java Standard Edition) platform. The latest
    version of Java released in the JEE (Java Enterprise Edition) platform is 6 (update
    32).


    The latest version of Tomcat (7.0), supports Servlets 3.0 and JSF 2.1.7.


    #### Viewing a JSP Page


    With JSP, the web page doesn’t actually exist on the server. As you can see in
    [Figure 1-8](#Chapter01.html#fig_1_8), the server creates it fresh when responding
    to each request.


    ![Image](images/9781430246237_Fig01-08.jpg)


    ***Figure 1-8.** Viewing a JSP page*


    The following steps explain how the web server creates the web page:


    > 1.  As with a normal page, your browser sends an HTTP request to the web server.
    This doesn’t change with JSP, although the URL probably ends in `.jsp` instead
    of `.html` or `.htm`.

    > 2.  The web server is not a normal server, but rather a Java server, with the
    extensions necessary to identify and handle Java servlets. The web server recognizes
    that the HTTP request is for a JSP page and forwards it to a JSP engine.

    > 3.  The JSP engine loads the JSP page from disk and converts it into a Java
    servlet. From this point on, this servlet is indistinguishable from any other
    servlet developed directly in Java rather than JSP, although the automatically
    generated Java code of a JSP servlet is not always easy to read, and you should
    never modify it by hand.

    > 4.  The JSP engine compiles the servlet into an executable class and forwards
    the original request to another part of the web server called the *servlet engine*.
    Note that the JSP engine only converts the JSP page to Java and recompiles the
    servlet if it finds that the JSP page has changed since the last request. This
    makes the process more efficient than with other scripting languages (such as
    PHP) and therefore faster.

    > 5.  The servlet engine loads the servlet class and executes it. During execution,
    the servlet produces an output in HTML format, which the servlet engine passes
    to the web server inside an HTTP response.

    > 6.  The web server forwards the HTTP response to your browser.

    > 7.  Your web browser handles the dynamically generated HTML page inside the
    HTTP response exactly as if it were a static page. In fact, static and dynamic
    web pages are in the same format.


    You might ask, “Why do you say that with JSP, the page is created fresh for each
    request, if the server only converts and compiles the JSP source if you have updated
    it since the previous request?”


    What reaches your browser is the output generated by the servlet (that is, by
    the converted and compiled JSP page), not the JSP page itself. The same servlet
    produces different outputs depending on the parameters of the HTTP request and
    other factors. For example, suppose you’re browsing the products offered by an
    online shop. When you click on the image of a product, your browser generates
    an HTTP request with the product code as a parameter. As a result, the servlet
    generates an HTML page with the description of that product. The server doesn’t
    need to recompile the servlet for each product code.


    The servlet queries a database containing the details of all the products, obtains
    the description of the product you’re interested in, and formats an HTML page
    with that data. This is what dynamic HTML is all about!


    Plain HTML is not capable of interrogating a database, but Java is, and JSP gives
    you the means of including snippets of Java inside an HTML page.'
