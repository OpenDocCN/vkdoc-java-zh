    \ Picard\"></captain>\n```\n\nperhaps shortened, as in:\n\n```\n<captain name=\"\
    Jean-Luc Picard\"/>\n```\n\n## Defining Your Own XML Documents\n\nThe usefulness\
    \ of being able to use XML tags tailored to your needs is greatly expanded by\
    \ the possibility of formally specifying them in a separate document. This enables\
    \ you to verify the validity of the XML documents and also to communicate their\
    \ structure to others. Without a specification in a standardized format, you would\
    \ have to describe your document structure in plain language or via examples.\
    \ It wouldn’t be the most efficient way, and it certainly wouldn’t be good enough\
    \ for automatic validation. The two most widely used methods to specify document\
    \ structures are XML DTDs and XML schemas. You will see later on in this chapter\
    \ that you can select which method your XML document uses for validation by adding\
    \ an appropriate element to it.\n\n### XML DTDs\n\nDTDs are better known than\
    \ XML schemas, which have been developed more recently. They are also easier to\
    \ understand. DTDs were originally developed for the XML predecessor, Standard\
    \ Generalized Markup Language (SGML), and they have a very compact syntax. [Listing\
