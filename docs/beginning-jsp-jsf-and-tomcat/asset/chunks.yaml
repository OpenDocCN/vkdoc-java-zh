    \ 所示。\n\n![Image](images/9781430246237_Fig06-01.jpg)\n\n***图 6-1.** MySQL Workbench*\n\
    \n如果你已经从命令行创建了 `shop` 数据库，你将在对象浏览器中看到相应的条目。如果你右键单击它，你将能够选择默认数据库，尽管你没有必要这样做。\n\n\
