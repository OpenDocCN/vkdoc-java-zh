- fmt: "### The `response` Object\n\nThe `response` variable gives you access within\
    \ your JSP page to the HTTP response to be sent back to the client. It is an instance\
    \ of the `org.apache.catalina.connector.ResponseFacade` class, which Tomcat defines\
    \ to implement the interfaces `javax.servlet.http.HttpServletResponse` and `javax.servlet.ServletResponse`.\n\
    \nThe `HttpServletResponse` interface includes the definition of 41 status codes\
    \ (of type `public static final int`) to be returned to the client as part of\
    \ the response. The HTTP status codes are all between `100` and `599`. The range\
    \ `100`–`199` is reserved to provide information, `200`–`299` to report successful\
    \ completion of the requested operation, `300`–`399` to report warnings, `400`–`499`\
    \ to report client errors, and `500`–`599` to report server errors. You will find\
    \ the full list of errors at [`http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html).\n\
    \nThe normal status code is `SC_OK (200)`, and the most common error is `SC_NOT_FOUND\
    \ (404)`, which occurs when the client requests a page that doesn’t exist. Working\
    \ with Tomcat, the most common server error is `SC_INTERNAL_SERVER_ERROR (500)`.\
    \ You get it when there is an error in a JSP. You can use these constants as arguments\
    \ of the `sendError` and `setStatus` methods.\n\n### The `session` Object\n\n\
    The term *session* refers to all the interactions a client has with a server from\
    \ the moment the user views the first page of an application to the moment they\
    \ quit the browser (or the session expires because too much time has elapsed since\
    \ the last request).\n\nWhen Tomcat receives an HTTP request from a client, it\
    \ checks whether the request contains a cookie that by default is named `JSESSIONID`.\
    \ If it doesn’t find it, it creates the cookie with a unique value and attaches\
    \ it to the response. This establishes the beginning of a session. If the client’s\
    \ browser accepts cookies, it attaches that cookie to all subsequent requests\
    \ it sends to the same server.\n\nThe `session` variable lets your JSP pages store\
    \ information associated with each individual user. For example, following a user\
    \ login, you can set a session attribute to the access level of that user, so\
    \ that all the pages of your application can check it before performing their\
    \ function. In its simplest form, you could set up such a mechanism like this:\n\
    \n`session.setAttribute(\"MyAppOperator\", \"\");`\n\nThen, you can use the following\
    \ code to check it:\n\n`boolean isOperator = (session.getAttribute(\"MyAppOperator\"\
    ) != null);`\n`if (isOperator) { ...`\n\nYou can save in a session-scoped attribute\
    \ much more than a simple access level. You only need to define a class to hold\
    \ the preferences (e.g., `UserPrefs`), fill in an object of that type (named,\
    \ say, `preferences`) when the user logs in, and save it as a `session`’s attribute,\
    \ like in the following example:\n\n`session.setAttribute(\"upref\", preferences);`\n\
    \nIn all the pages of your application, you can then retrieve that information\
    \ with something like this:\n\n`UserPrefs preferences = (UserPrefs)session.getAttribute(\"\
    upref\");`\n\nBy doing so, as long as the user keeps his or her browser running\
    \ and the session doesn’t timeout, you don’t need to reload the user’s preferences\
    \ from a database.\n\nThe variable `session` is an instance of the `org.apache.catalina.session.StandardSessionFacade`\
    \ class, which Tomcat defines to implement the `javax.servlet.http.HttpSession`\
    \ interface.\n\nThe `session` object supports a dozen methods, including `setMaxInactiveInterval`,\
    \ which lets you specify the timeout in seconds (the default is 1800 s = 30 minutes).\
    \ This didn’t work with older versions of Tomcat, but I tested it with Tomcat\
    \ 7 and it correctly sets the timeout. You can also set the timeout for your application\
    \ to a given number of minutes by inserting a `<session-config>` element in your\
    \ application’s `\\WEB-INF\\web.xml` file. To do so, you need to place the following\
    \ code inside the `<web-app>` element:\n\n```\n<session-config>\n  <session-timeout>write\
    \ here the timeout in minutes</session-timeout>\n</session-config>\n```\n\nAlternatively,\
    \ you can also change Tomcat’s default timeout by insetting the `<session-config>`\
    \ element in the `\\conf\\web-xml` file you find inside the Tomcat home directory.\n\
    \n### Directive Elements\n\nJSP pages use directive elements to pass to Tomcat\
    \ data about themselves. This data influences the translation process from a script\
    \ file to a Java servlet class. As directives only play a role when a JSP page\
    \ is re-compiled after you modify it, they have no specific effect on the individual\
    \ HTML responses.\n\nThere are three directives that you can use in JSP pages:\
    \ `page`, `include`, and `taglib`. Their syntax is as follows:\n\n```\n<%@directive-name\
    \ attr1=\"value1\" [attr2=\"value2\"...] %>\n```"
  raw: '#### The `response` Object


    The `response` variable gives you access within your JSP page to the HTTP response
    to be sent back to the client. It is an instance of the `org.apache.catalina.connector.ResponseFacade`
    class, which Tomcat defines to implement the interfaces `javax.servlet.http.HttpServletResponse`
    and `javax.servlet.ServletResponse`.


    The `HttpServletResponse` interface includes the definition of 41 status codes
    (of type `public static final int`) to be returned to the client as part of the
    response. The HTTP status codes are all between `100` and `599`. The range `100`–`199`
    is reserved to provide information, `200`–`299` to report successful completion
    of the requested operation, `300`–`399` to report warnings, `400`–`499` to report
    client errors, and `500`–`599` to report server errors. You will find the full
    list of errors at [`http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html).


    The normal status code is `SC_OK (200)`, and the most common error is `SC_NOT_FOUND
    (404)`, which occurs when the client requests a page that doesn’t exist. Working
    with Tomcat, the most common server error is `SC_INTERNAL_SERVER_ERROR (500)`.
    You get it when there is an error in a JSP. You can use these constants as arguments
    of the `sendError` and `setStatus` methods.


    #### The `session` Object


    The term *session* refers to all the interactions a client has with a server from
    the moment the user views the first page of an application to the moment they
    quit the browser (or the session expires because too much time has elapsed since
    the last request).


    When Tomcat receives an HTTP request from a client, it checks whether the request
    contains a cookie that by default is named `JSESSIONID`. If it doesn’t find it,
    it creates the cookie with a unique value and attaches it to the response. This
    establishes the beginning of a session. If the client’s browser accepts cookies,
    it attaches that cookie to all subsequent requests it sends to the same server.


    The `session` variable lets your JSP pages store information associated with each
    individual user. For example, following a user login, you can set a session attribute
    to the access level of that user, so that all the pages of your application can
    check it before performing their function. In its simplest form, you could set
    up such a mechanism like this:


    `session.setAttribute("MyAppOperator", "");`


    Then, you can use the following code to check it:


    `boolean isOperator = (session.getAttribute("MyAppOperator")  != null);`

    `if (isOperator) { ...`


    You can save in a session-scoped attribute much more than a simple access level.
    You only need to define a class to hold the preferences (e.g., `UserPrefs`), fill
    in an object of that type (named, say, `preferences`) when the user logs in, and
    save it as a `session`’s attribute, like in the following example:


    `session.setAttribute("upref", preferences);`


    In all the pages of your application, you can then retrieve that information with
    something like this:


    `UserPrefs preferences = (UserPrefs)session.getAttribute("upref");`


    By doing so, as long as the user keeps his or her browser running and the session
    doesn’t timeout, you don’t need to reload the user’s preferences from a database.


    The variable `session` is an instance of the `org.apache.catalina.session.StandardSessionFacade`
    class, which Tomcat defines to implement the `javax.servlet.http.HttpSession`
    interface.


    The `session` object supports a dozen methods, including `setMaxInactiveInterval`,
    which lets you specify the timeout in seconds (the default is 1800 s = 30 minutes).
    This didn’t work with older versions of Tomcat, but I tested it with Tomcat 7
    and it correctly sets the timeout. You can also set the timeout for your application
    to a given number of minutes by inserting a `<session-config>` element in your
    application’s `\WEB-INF\web.xml` file. To do so, you need to place the following
    code inside the `<web-app>` element:


    `<session-config>`

    `  <session-timeout>`*`write here the timeout in minutes`*`</session-timeout>`

    `  </session-config>`


    Alternatively, you can also change Tomcat’s default timeout by insetting the `<session-config>`
    element in the `\conf\web-xml` file you find inside the Tomcat home directory.


    ### Directive Elements


    JSP pages use directive elements to pass to Tomcat data about themselves. This
    data influences the translation process from a script file to a Java servlet class.
    As directives only play a role when a JSP page is re-compiled after you modify
    it, they have no specific effect on the individual HTML responses.


    There are three directives that you can use in JSP pages: `page`, `include`, and
    `taglib`. Their syntax is as follows:


    `<%@directive-name attr1="value1" [attr2="value2"...] %>`'
  trans: '

    #### `response` 对象


    `response` 变量让你能够在 JSP 页面中访问将要发送回客户端的 HTTP 响应。它是 `org.apache.catalina.connector.ResponseFacade`
    类的一个实例，Tomcat 定义该类以实现 `javax.servlet.http.HttpServletResponse` 和 `javax.servlet.ServletResponse`
    接口。


    `HttpServletResponse` 接口定义了 41 个状态码（类型为 `public static final int`），这些状态码将作为响应的一部分返回给客户端。HTTP
    状态码的范围均在 `100` 到 `599` 之间。其中，`100`–`199` 范围保留用于提供信息，`200`–`299` 用于报告请求操作成功完成，`300`–`399`
    用于报告警告，`400`–`499` 用于报告客户端错误，`500`–`599` 用于报告服务器错误。你可以在 [`http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html`](http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html)
    找到完整的错误列表。


    正常的状态码是 `SC_OK (200)`，最常见的错误是 `SC_NOT_FOUND (404)`，当客户端请求一个不存在的页面时会发生此错误。在使用 Tomcat
    时，最常见的服务器错误是 `SC_INTERNAL_SERVER_ERROR (500)`。当 JSP 中出现错误时，你会遇到这个状态码。你可以将这些常量用作
    `sendError` 和 `setStatus` 方法的参数。


    #### `session` 对象


    术语 *会话* 指的是客户端与服务器之间的所有交互，从用户查看应用程序的第一个页面开始，到他们关闭浏览器（或者由于自上次请求以来时间过长导致会话过期）为止。


    当 Tomcat 从客户端收到 HTTP 请求时，它会检查该请求是否包含一个默认名为 `JSESSIONID` 的 cookie。如果没有找到，它会创建一个具有唯一值的
    cookie 并将其附加到响应中。这标志着一个会话的开始。如果客户端的浏览器接受 cookie，它会将该 cookie 附加到随后发送给同一服务器的所有请求中。


    `session` 变量让你的 JSP 页面能够存储与每个单独用户关联的信息。例如，在用户登录后，你可以将会话属性设置为该用户的访问级别，这样应用程序的所有页面在执行其功能之前都可以检查该属性。在其最简单的形式中，你可以像这样设置这样一个机制：


    `session.setAttribute("MyAppOperator", "");`


    然后，你可以使用以下代码来检查它：


    `boolean isOperator = (session.getAttribute("MyAppOperator")  != null);`

    `if (isOperator) { ...`


    你可以在会话作用域属性中保存的远不止简单的访问级别。你只需要定义一个类来保存偏好设置（例如 `UserPrefs`），在用户登录时填充该类型的对象（比如命名为
    `preferences`），并将其保存为 `session` 的一个属性，如下例所示：


    `session.setAttribute("upref", preferences);`


    在应用程序的所有页面中，你可以通过类似下面的方式检索该信息：


    `UserPrefs preferences = (UserPrefs)session.getAttribute("upref");`


    通过这样做，只要用户保持其浏览器运行且会话未超时，你就不需要从数据库重新加载用户的偏好设置。


    变量 `session` 是 `org.apache.catalina.session.StandardSessionFacade` 类的一个实例，Tomcat
    定义该类以实现 `javax.servlet.http.HttpSession` 接口。


    `session` 对象支持十几种方法，包括 `setMaxInactiveInterval`，它允许你以秒为单位指定超时时间（默认值为 1800 秒 =
    30 分钟）。这在旧版本的 Tomcat 中不起作用，但我用 Tomcat 7 测试过，它可以正确设置超时时间。你也可以通过在应用程序的 `\WEB-INF\web.xml`
    文件中插入 `<session-config>` 元素，为你的应用程序设置一个以分钟为单位的超时时间。为此，你需要将以下代码放置在 `<web-app>`
    元素内：


    `<session-config>`

    `  <session-timeout>`*`在此处写入以分钟为单位的超时时间`*`</session-timeout>`

    `  </session-config>`


    或者，你也可以通过在你 Tomcat 主目录下的 `\conf\web-xml` 文件中插入 `<session-config>` 元素来更改 Tomcat
    的默认超时时间。


    ### 指令元素


    JSP 页面使用指令元素向 Tomcat 传递关于页面自身的数据。这些数据会影响从脚本文件到 Java Servlet 类的转换过程。由于指令仅在修改 JSP
    页面后重新编译时起作用，因此它们对单个 HTML 响应没有特定影响。


    在 JSP 页面中，你可以使用三种指令：`page`、`include` 和 `taglib`。它们的语法如下：


    `<%@directive-name attr1="value1" [attr2="value2"...] %>`

