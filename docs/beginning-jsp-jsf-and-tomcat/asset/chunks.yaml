    `Checkout.jsp` 显示购物车以及由 Servlet 预先计算的总计金额，并会使会话失效，这样如果从同一个浏览器窗口重新启动应用程序，就会创建一个新的空购物车。


    请注意，你也可以将结账逻辑包含在 `index.jsp` 中，并使其执行依赖于两个总计金额的存在。但是，我想向你展示一个结构更清晰的应用程序。将不同的功能保留在不同的
    JSP 模块中也是更好的设计。事实上，我本可以将购物车也放在一个单独的 JSP 文件中。在实际开发中，我肯定会这样做。此外，我还会将样式保存在层叠样式表（CSS）文件中，而不是在所有
    JSP 源码中重复它们。最后，这里几乎没有错误检查和报告。你可以很容易地让这个应用程序崩溃。在实际案例中，你会像前一章所述的那样添加一个错误页面。


