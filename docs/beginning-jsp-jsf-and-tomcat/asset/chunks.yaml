    ![Image](img/boris_minkin.jpg) ![Image](img/square.jpg) **鲍里斯·明金**是一家大型金融公司的高级技术架构师。他在信息技术和金融服务领域的多个方面拥有超过
    20 年的工作经验。鲍里斯在新泽西州史蒂文斯理工学院获得了信息系统硕士学位。他的专业兴趣包括互联网技术、面向服务的架构、企业应用架构、多平台分布式应用、云计算、分布式缓存、Java、网格计算和高性能计算。您可以通过
    [`bm@panix.com`](http://bm@panix.com) 联系鲍里斯。


    ![Image](img/manuel_jordan_elera.jpg) ![Image](img/square.jpg) **曼努埃尔·乔丹·埃莱拉**是一位自学成才的开发者和研究员，他喜欢学习新技术用于自己的实验并创建新的集成。曼努埃尔曾获得
