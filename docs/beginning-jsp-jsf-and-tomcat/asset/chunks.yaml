- fmt: '### Bodyless Tag


    [Listing 4-16](#Chapter04.html#list_4_16) shows the tag-file version of the tag
    handler `WeekdayTag.java` that you saw in [Listing 4-11](#Chapter04.html#list_4_11).


    ***Listing 4-16.** weekday.tag*


    ```

    <%@tag import="java.util.Date, java.text.SimpleDateFormat"

           import="java.util.Calendar, java.util.GregorianCalendar"%>

    <%@attribute name="date" required="false"%>

    <%

      final String[] WD = {"","Sun","Mon","Tue","Wed","Thu","Fri","Sat"};

      GregorianCalendar cal = new GregorianCalendar();

      if (date != null && date.length() > 0) {

        SimpleDateFormat fmt = new SimpleDateFormat("yyyy-MM-dd");

        fmt.setLenient(true);

        Date d = fmt.parse(date);

        cal.setTime(d);

        }

      out.print(WD[cal.get(Calendar.DAY_OF_WEEK)]);

      %>

    ```


    The `tag` directive of a tag file replaces the `page` directive of a JSP page,
    and the `attribute` directive lets you define an input parameter. As Tomcat handles
    the tag exceptions for us, I removed the `try`/`catch` constructs, which certainly
    makes the code more readable. Another simplification is in sending the result
    to the output, because in the tag file the implicit variable `out` makes it unnecessary
    to invoke `pageContext.getOut()`.


    [Listing 4-17](#Chapter04.html#list_4_17) shows how you modify `weekday.jsp` of
    [Listing 4-12](#Chapter04.html#list_4_12) to use the tag file.


    ***Listing 4-17.** weekday_t.jsp*


    ```

    <%@page language="java" contentType="text/html"%>

    <%@taglib tagdir="/WEB-INF/tags" prefix="wow"%>

    <% String d = request.getParameter("d"); %>

    <html><head><title>weekday bodyless tag</title></head><body>

    weekday today: <wow:weekday/><br/>

    weekday <%=d%>: <wow:weekday date="<%=d%>"/><br/>

    </body></html>

    ```


    As you can see, the only difference is that the attribute `uri="/WEB-INF/tlds/wow.tld"`
    of the `taglib` directive has become `tagdir="/WEB-INF/tags"`.


    To keep the `uri` attribute, you need to declare the tag file in a TLD, as shown
    in [Listing 4-18](#Chapter04.html#list_4_18).


    ***Listing 4-18.** wow.tld for a Tag File*


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <taglib

        xsi:schemaLocation="http://java.sun.com/xml/ns/javaee ~CCC

    http://java.sun.com/xml/ns/j2ee/web-jsptaglibrary_2_1.xsd"

        version="2.1">

      <description>My library of tag files</description>

      <tlib-version>1.0</tlib-version>

      <short-name>wow</short-name>

      <uri>tagFiles</uri>

      <tag-file>

        <description>Displays the day of the week</description>

        <display-name>weekday</display-name>

        <name>weekday</name>

        <path>/WEB-INF/tags/weekday.tag</path>

        </tag-file>

      </taglib>

    ```


    Then, in the `taglib` directive of `weekday_t.jsp`, you can replace `tagdir="/WEB-INF/tags"`
    with `uri="tagFiles"`.


    As an example of the `variable` directive, replace in `weekday.tag` the line


    `out.print(WD[cal.get(Calendar.DAY_OF_WEEK)]);`


    with the following two:


    ```

    %><%@variable name-given="dayw" scope="AT_END"%><%

    jspContext.setAttribute("dayw", WD[cal.get(Calendar.DAY_OF_WEEK)]);

    ```


    The action will then save the string with the day of the week into the attribute
    `dayw` instead of sending it directly to the output. To display the action’s result
    from within `weekday_t.jsp`, insert the following expression element after executing
    the action:


    `<%=pageContext.getAttribute("dayw")%>`


    As you will see later in this chapter, you can also replace the somewhat cumbersome
    expression element with the more compact EL expression `${dayw}`.


    ### Bodied Tag


    [Listing 4-19](#Chapter04.html#list_4_19) shows the tag file equivalent to the
    tag handler `WeekdayBodyTag.java`, which you saw in [Listing 4-13](#Chapter04.html#list_4_13).
    I wrote it by modifying the tag file `weekday.tag` that implemented the bodyless
    tag as shown in [Listing 4-16](#Chapter04.html#list_4_16). [Listing 4-20](#Chapter04.html#list_4_20)
    is the tag-file equivalent to `weekday_b.jsp` (see [Listing 4-15](#Chapter04.html#list_4_15)),
    which invoked the bodied tag handler. I wrote it by modifying `weekday_t.jsp`
    of [Listing 4-17](#Chapter04.html#list_4_17), which used the bodyless tag file.


    ***Listing 4-19.** weekdayBody.tag*


    ```

    <%@tag import="java.util.Date, java.text.SimpleDateFormat"

           import="java.util.Calendar, java.util.GregorianCalendar"%>

    <jsp:doBody var="dateAttr"/>

    <%

      String date = (String)jspContext.getAttribute("dateAttr");

      final String[] WD = {"","Sun","Mon","Tue","Wed","Thu","Fri","Sat"};

      GregorianCalendar cal = new GregorianCalendar();

      if (date.length() > 0) {

        SimpleDateFormat fmt = new SimpleDateFormat("yyyy-MM-dd");

        fmt.setLenient(true);

        Date d = fmt.parse(date);

        cal.setTime(d);

        }

      out.print(WD[cal.get(Calendar.DAY_OF_WEEK)]);

      %>

    ```


    The standard action element `jsp:doBody` evaluates the body of the `weekdayBody`
    action and stores its output as a string into the page-scoped attribute `dateAttr`.
    The first line of the scriptlet then copies the attribute into the JSP variable
    named `date`. After that, the bodied tag file is identical to the bodyless one.
    This was not really necessary, but the subsequent code accesses the date twice,
    first to check that it isn’t empty and then to parse it. I didn’t like to invoke
    the `getAttribute` method twice. It seemed less tidy.


    If you omit the attribute `var`, `doBody` sends the body’s result to the output;
    if you replace `var` with `varReader`, the result is stored as a `java.io.Reader`
    object instead of a `java.lang.String`; and if you add the attribute `scope`,
    you can specify `var` / `varReader` to be defined as a `request`, `session`, or
    `application` attribute, instead of in the `page` scope.


    You should know that `jsp:invoke` is very similar to `jsp:doBody` but operates
    on a JSP fragment instead of the action body. For example, by writing the following
    two lines in a tag file


    ```

    <%@attribute name="fragName" fragment="true"%>

    <jsp:invoke fragment="fragName"/>

    ```


    you pass to it a JSP fragment. Like `doBody`, `invoke` admits the attributes `var`,
    `varReader`, and `scope`. Both standard actions can only be used within tag files.


    ***Listing 4-20.** weekday_bt.jsp*


    ```

    <%@page language="java" contentType="text/html"%>

    <%@taglib tagdir="/WEB-INF/tags" prefix="wow"%>

    <html><head><title>weekday bodied tag</title></head><body>

    weekdayBody today: <wow:weekdayBody></wow:weekdayBody><br/>

    weekdayBody ${param.d}: <wow:weekdayBody>${param.d}</wow:weekdayBody><br/>

    </body></html>

    ```


    ### The tag Directive


    In the previous section, you encountered the `import` attribute of the `tag` directive.
    [Table 4-2](#Chapter04.html#tab_4_2) lists the other attributes that are available.
    They are all optional.


    ![Image](images/9781430246237_Tab04-02.jpg)


    ### The attribute Directive


    You have already encountered the attributes `name` and `required`. [Table 4-3](#Chapter04.html#tab_4_3)
    briefly describes the remaining ones (all optional).


    ![Image](images/9781430246237_Tab04-03.jpg)


    ![Image](images/9781430246237_Tab04-03a.jpg)


    There are also two mutually exclusive pairs of attributes that are associated
    with JavaServer Faces: `deferredValue` / `deferredValueType` and `deferredMethod`
    / `deferredMethodSignature`. Let’s not put the cart before the oxen.'
