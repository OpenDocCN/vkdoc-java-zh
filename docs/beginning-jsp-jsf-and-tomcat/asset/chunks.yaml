    \ have come and gone by the time you reach the end tag. You first have to overwrite\
    \ `doAfterBody`.\n\nAn additional complication concerns the default date: if you\
    \ write the action with an empty body, as follows:\n\n`<wow:weekdayBody></wow:weekdayBody>`\n\
    \nthe method `doAfterBody` won’t be executed at all. How can you then print out\
    \ the default day?\n\nThe answer is simple: you have to overwrite the `doEndTag`\
    \ method and write the default date from there in case there is no body. [Listing\
    \ 4-13](#Chapter04.html#list_4_13) shows the end result.\n\n**Listing 4-13.**\
    \ `WeekdayBodyTag.java`\n\n```\npackage tags;\n\nimport javax.servlet.jsp.JspException;\n\
    import javax.servlet.jsp.tagext.BodyTagSupport;\nimport java.util.Date;\nimport\
    \ java.text.SimpleDateFormat;\nimport java.util.Calendar;\nimport java.util.GregorianCalendar;\n\
    \npublic class WeekdayBodyTag extends BodyTagSupport {\n  static final long serialVersionUID\
    \ = 1L;\n  static final String[] WD = {\"\",\"Sun\",\"Mon\",\"Tue\",\"Wed\",\"\
    Thu\",\"Fri\",\"Sat\"};\n  private boolean bodyless = true;  /* 1 */\n\n  public\
    \ int doAfterBody() throws JspException {\n    String date = getBodyContent().getString();\
    \  /* 2 */\n    if (date.length() > 0) {\n      GregorianCalendar cal = new GregorianCalendar();\n\
    \      Date d = new Date();\n      SimpleDateFormat fmt = new SimpleDateFormat(\"\
    yyyy-MM-dd\");\n      fmt.setLenient(true);\n      try {\n        d = fmt.parse(date);\n\
    \        }\n      catch (Exception e) {\n        throw new JspException(\"Date\
    \ parsing failed: \" + e.getMessage());\n        }\n      cal.setTime(d);\n  \
    \    try {\n          getPreviousOut().print(WD[cal.get(Calendar.DAY_OF_WEEK)]);\
    \  /* 3 */\n          }\n        catch (Exception e) {\n          throw new JspException(\"\
    Weekday writing failed: \" + e.getMessage());\n          }\n      bodyless = false;\
    \  /* 4 */\n      }\n    return SKIP_BODY;\n    }\n\n  public int doEndTag() throws\
    \ JspException {\n    if (bodyless) {  /* 5 */\n      GregorianCalendar cal =\
    \ new GregorianCalendar();\n      try {\n        pageContext.getOut().print(WD[cal.get(Calendar.DAY_OF_WEEK)]);\n\
    \        }\n      catch (Exception e) {\n        throw new JspException(\"Weekday\
    \ writing failed: \" + e.getMessage());\n        }\n      }\n    return EVAL_PAGE;\n\
    \    }\n  }\n```\n\nLines 1, 4, and 5 implement the mechanism to ensure that you\
    \ write the default date but only when the body is empty. In line 1, you define\
    \ a `boolean` instance variable called `bodyless` and set it to `true`. If there\
    \ is no body to process, `doAfterBody` does not run, and `doEndTag` in line 5\
    \ prints the default day of the week. If, on the other hand, there is a body to\
    \ process, `doAfterBody` in line 4 sets `bodyless` to `false`, and `doEndTag`\
    \ does nothing.\n\nLine 2 shows you how to get the body content, and line 3 how\
    \ to get the method to print the date while processing the body. The method has\
    \ been named `getPreviousOut` to remind you that there can be actions within actions,\
    \ in which case you’ll want to append the output of an inner action to that of\
    \ an outer one.\n\n### Step 2: Define the TLD\n\nTo define the new action, you\
    \ only need to add the `<tag>` shown in [Listing 4-14](#Chapter04.html#list_4_14)\
    \ after the `<tag>` for the bodyless weekday action.\n\n**Listing 4-14.** The\
    \ tag Element for `weekdayBody`\n\n```\n  <tag>\n    <description>Displays the\
    \ day of the week</description>\n    <display-name>weekdayBody</display-name>\n\
    \    <name>weekdayBody</name>\n    <tag-class>tags.WeekdayBodyTag</tag-class>\n\
    \    <body-content>scriptless</body-content>\n    </tag>\n```\n\nNotice that you\
    \ define the `body-content` sub-element as `scriptless` even though it is the\
    \ default. The purpose is to make the code more readable. It’s just a matter of\
    \ taste.\n\n### Step 3: Use the Custom Action\n\n[Listing 4-15](#Chapter04.html#list_4_15)\
    \ shows a modified version of `weekday.jsp` to handle the bodied tag.\n\n**Listing\
    \ 4-15.** `weekday_b.jsp` for the Bodied Action\n\n```\n<%@page language=\"java\"\
    \ contentType=\"text/html\"%>\n<%@taglib uri=\"/WEB-INF/tlds/wow.tld\" prefix=\"\
    wow\"%>\n<html><head><title>weekday bodied tag</title></head><body>\nweekdayBody\
    \ today: <wow:weekdayBody></wow:weekdayBody><br/>\nweekdayBody ${param.d}: <wow:weekdayBody>${param.d}</wow:weekdayBody><br/>\n\
    </body></html>\n```\n\nNotice that I replaced the `request.getParameter(\"d\"\
    )` logic with the simpler and more elegant EL expression `${param.d}`. You have\
    \ to use an EL expression in any case, because scripting elements aren’t allowed\
    \ in the body of an action. Therefore, you couldn’t have used `<%=d%>`. You will\
    \ learn how to use EL in the next section of this chapter.\n\n![Image](images/square.jpg)\
    \ **Tip** Many tag libraries are available on the Internet. JSTL provides many\
    \ actions that you can use and reuse, which I will write about in the next section.\
    \ It certainly pays, in terms of both quality and efficiency, to avoid developing\
    \ actions from scratch unless they give you clear and quantifiable benefits. You\
    \ will find more info on JSTL at [`www.oracle.com/technetwork/java/index-jsp-135995.html`](http://www.oracle.com/technetwork/java/index-jsp-135995.html).\n\
