    automatically generates the little script that sends the Ajax request.    But
    you do need a Java bean like that shown in [Listing 7-19](#Chapter07.html#list_7_19).    ***Listing
    7-19.** ServerTime.java*  `import javax.faces.bean.ManagedBean;` `import javax.faces.bean.SessionScoped;`
    `import javax.faces.bean.ManagedProperty;` `import java.util.GregorianCalendar;`
    `@ManagedBean(name="serverTimeBean")` `@SessionScoped` `public class ServerTime
    {` `  @ManagedProperty(value="#{ServerTime.when}")` `  private String when;` `  public
    ServerTime() { when = new GregorianCalendar().getTime().toString(); }` `  public
    String getWhen() { return new GregorianCalendar().getTime().toString(); }` `  public
    void setWhen(String w) { when = w; }` `  }`  The code is almost identical to that
    of AString.java ([Listing 7-9](#Chapter07.html#list_7_9)), the major differences
    being that it has an initialization method and, obviously, generates a string
    with the current server time. In the software package you will also find the files
    that complete the application, `index.jsp` and `web.xml`, but they are very similar
    to the equivalent files you already encountered with other applications.    You
    will obtain the same result if you replace in `ajaxf.html` the content of the
    `h:body` with the code shown in [Listing 7-20](#Chapter07.html#list_7_20).    ***Listing
    7-20.** Alternate h:body for ajaxf.xhtml*  `<h:form>` `  <f:ajax render="@form"
    event="click"/>` `  <h:outputText value="The time on the server is: "/>` `  <h:outputText
    value="#{serverTimeBean.when} "/>` `  <h:commandButton value="Update"/>` `  </h:form>`  With
    this settings, you ajaxify all components of the form. As a result, when you click
    on the `Update` button, JSF sends an Ajax request, as it did before, and because
    the `render` attribute is set to `@form`, `serverTimeBean.when` is updated, as
    before. Events applicable to whole forms are `click`, `dblclick`, `keydown`, `keypress`,
    `keyup`, `mousedown`, `mousemove`, `mouseout`, `mouseover`, and `mouseup`.    With
    input elements in the form, when the user changes the content in any of them,
    that also triggers an Ajax request. To test it, replace `h:commandButton` with
    an `h:inputText` element as shown in [Listing 7-21](#Chapter07.html#list_7_21).    ***Listing
    7-21.** Yet another h:body for ajaxf.xhtml*  `<h:form>` `  <h:outputText value="The
    time on the server is: "/>` `  <h:outputText id="timeField" value="#{serverTimeBean.when}
    "/>` `  <h:inputText value="#{serverTimeBean.when}" size="30">` `    <f:ajax render="@this
    timeField" event="blur"/>` `    </h:inputText>` `  </h:form>`  The resulting page
    is shown in [Figure 7-7](#Chapter07.html#fig_7_7).  ![Image](images/9781430246237_Fig07-07.jpg)  ***Figure
    7-7.** A modified ajaxf.xhtml*    As long as you remain within the input field,
    nothing happens. When you hit `enter` or click outside it, Ajax sends a request
    to the server to update the property specified in `h:inputText`. In the example,
    it sends a request to set `serverTimeBean.when` to “Sun Jun 24 012”. JSF does
    it in the Update Model Value phase. Then, during Render Response, Tomcat prepares
    the Javax response with two values obtained from `serverTimeBean.when`, one for
    `h:outputText` and one for `h:inputText`. As `ServerTime.java` always produces
    a fresh time string, that’s what is returned to the browser, and what you typed
    in the input field remains unused in the bean’s variable `when`.    Possible events
    for input fields are: `blur`, `change`, `click`, `dblclick`, `focus`, `keydown`,
    `keypress`, `keyup`, `mousedown`, `mousemove`, `mouseout`, `mouseover`, `mouseup`,
    `select`, and `valueChange`. The default is `valueChange`.    The value of the
    `render` attribute can be a single identifier, a space-delimited list of identifiers,
    or one of the special strings `@all`, `@this`, `@form`, and `@none`. One interesting
    thing, which I don’t necessarily recommend, is that you can specify in a single
    `f:ajax` element the identifiers of components in more than one form. For example,  `<f:ajax
    render=":form1:id3 id1 @this"/>`  means that JSF fires a single Ajax request for
    the component `id3` of the form with `id` set to `form1`, the component `id1`
    of the form enclosing the `f:ajax` element, and the component enclosing the `f:javax`
    element.    Before we move on, I would like to show you another example of `f:ajax`.
    Check out [Figure 7-8](#Chapter07.html#fig_7_8).  ![Image](images/9781430246237_Fig07-08.jpg)  ***Figure
    7-8.** The page produced with loginf*    You find the application in the `loginf`
    folder of the software package for this chapter. It is very similar to `ajaxf`.
    [Listing 7-22](#Chapter07.html#list_7_22) shows the managed bean and [Listing
    7-23](#Chapter07.html#list_7_23) shows `loginf.xhtml`.    ***Listing 7-22.** Login.java*  `import
    javax.faces.bean.ManagedBean;` `import javax.faces.bean.SessionScoped;` `@ManagedBean(name="loginBean")`
    `@SessionScoped` `public class Login {` `  private String user = "";` `  public
    String getUser() { return user; }` `  public void setUser(String u) { user = u;
    }`  `  private String pass = "";` `  public String getPass() { return pass; }`
    `  public void setPass(String p) { pass = p; }`  `  public String getMess() {`
    `    String mess = "";` `    if (user.length() * pass.length() > 0) {` `      mess
    = "Welcome " + user + "!";` `      }` `    else if (pass.length() > 0) {` `      if
    (user.length() == 0) mess = "Who the %@$# are you?";` `      }` `    else {` `      if
    (user.length() > 0) mess = "No password " + user + "?";` `      }` `    return
    mess;` `    }` `  }`  Nothing special here: a property to store the user ID, one
    for the password, and a read-only property to provide feedback to the user.    ***Listing
    7-23.** loginf.xhtml*  `<?xml version="1.0" encoding="UTF-8"?>` `<!DOCTYPE html
    PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"` `    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd"`
    `    >` `<html`   `      >` `<h:head><title>Example of login with f:ajax</title></h:head>`
