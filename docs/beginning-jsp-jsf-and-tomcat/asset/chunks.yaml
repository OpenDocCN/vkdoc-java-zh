    \ the little batch file shown in [Listing 3-6](#Chapter03.html#list_3_6) and double-click\
    \ it. Note that if you want to launch it from the command line, you have first\
    \ to attach to `WEB-INF`, otherwise it won’t find the `src` folder.\n\n***Listing\
    \ 3-6.** compile_it.bat*\n\n```\n@echo off\nset aname=ebookshop\nset /P fname=Please\
    \ enter the java file name without extension:\nset fil=%aname%\\%fname%\necho\
    \ *** compile_it.bat: compile src\\%fil%.java\njavac -verbose -deprecation -Xlint:unchecked\
    \ -classpath\n\"C:\\Program Files\\Apache Software Foundation\\Tomcat\\lib\\servlet-api.jar\"\
    ;classes\n  src\\%fil%.java\njavac -verbose -deprecation -Xlint:unchecked -classpath\
    \ classes src\\%fil%.java\nif %errorlevel% GTR 1 goto _PAUSE\necho *** compile_it.bat:\
    \ move the class to the package directory\nmove /y src\\%fil%.class classes\\\
    %fil%.class\n:_PAUSE\npause\n```\n\nThe batch file opens a command-line window\
    \ automatically and asks you to type the name of a Java file (without the extension).\
    \ It then compiles the file and moves the resulting class into the `classes\\\
    ebookshop\\` subfolder. The line with `javac` invokes the Java compiler with the\
    \ switches that maximize both the checks the compiler does on your sources and\
    \ the information you get.\n\nNotice the `classpath` switch, which tells the compiler\
    \ to look for classes in the local directory and in Tomcat’s lib folder in addition\
    \ to the usual places where the Java libraries are kept. This is necessary because\
    \ `ShoppingServlet.java` imports the `javax.servlet` package and the class `Book`\
    \ and, without the `classpath` switch, the compiler wouldn’t know where to find\
    \ them. This also means that you have to compile `Book.java` *before* `ShoppingServlet.java`.\n\
    \nWhen executing your application, Tomcat looks for classes in the `WEB-INF\\\
    classes\\` folder immediately inside the root folder of your application (i.e.,\
    \ `bookshop\\`), which in turn is immediately inside `webapps`. The directory\
    \ structure inside `WEB-INF\\classes\\` must reflect what you write in the `package`\
    \ statement at the beginning of the Java sources, which is:\n\n```\npackage ebookshop;\n\
    ```\n\nIf you had written this instead:\n\n```\npackage myLibs.ebookshop;\n```\n\
    \nyou would have had to insert a `myLibs` folder below `classes` and above `ebookshop`.\
    \ To avoid confusion, note that the package name has nothing to do with the name\
    \ of the application. That is, you could have named the package (and, therefore,\
    \ the folder below `classes\\`) `qwertyuiop` instead of `ebookshop`. In fact,\
    \ you could have dispensed with the `package` statement altogether and placed\
    \ your classes directly inside the `classes` folder. Finally, you could have also\
    \ created a JAR file (i.e., a Java ARchive), but we’ll talk about that later.\n\
    \nBefore you’re ready to go, you still need to write an additional file where\
    \ you describe the structure of your application to Tomcat. This web deployment\
    \ descriptor, shown in [Listing 3-7](#Chapter03.html#list_3_7), *must* be named\
    \ `web.xml` and placed in `WEB-INF`.\n\n***Listing 3-7.** web.xml*\n\n```\n<?xml\
    \ version=\"1.0\" encoding=\"ISO-8859-1\"?>\n<web-app\n    xsi:schemaLocation=~CCC\n\
    \"http://java.sun.com/xml/ns/j2ee http://java.sun.com/xml/ns/j2ee/web-app_2_4.xsd\"\
    \n    version=\"2.4\">\n  <display-name>Electronic Bookshop</display-name>\n \
    \ <description>\n    E-bookshop example for\n    Beginning JSP, JSF and Tomcat:\
    \ from Novice to Professional\n    </description>\n  <servlet>\n    <servlet-name>EBookshopServlet</servlet-name>\n\
    \    <servlet-class>ebookshop.ShoppingServlet</servlet-class>\n    </servlet>\n\
    \  <servlet-mapping>\n    <servlet-name>EBookshopServlet</servlet-name>\n    <url-pattern>/eshop</url-pattern>\n\
    \    </servlet-mapping>\n</web-app>\n```\n\nThe two crucial lines are those highlighted\
    \ in bold. The first one tells Tomcat that the servlet is in `classes\\ebookshop\\\
    ShoppingServlet.class`. The second one tells Tomcat that the requests will refer\
    \ to the servlet as `/eshop`. As the root folder of this application (i.e., the\
    \ folder immediately inside `webapps`) is `ebookshop`, Tomcat will then route\
    \ to this servlet all the requests it will receive for the URL `http://servername:8080/ebookshop/eshop`.\n\
    \nThe element `<servlet-name>` in both `<servlet>` and `<servlet-mapping>` is\
    \ only needed to make the connection between the two. An alternative to declaring\
    \ the servlet in `web.xml` is to use an annotation in `ShoppingServlet.java`.\
    \ To test it out, remove from `web.xml` both the `servlet` and the `servlet-mapping`\
    \ elements. Then, insert into `ShoppingServlet.java` two lines as shown in the\
    \ following code fragment:\n\n```\nimport ebookshop.Book;\nimport javax.servlet.annotation.WebServlet;\n\
    @WebServlet(value=\"/eshop\")\npublic class ShoppingServlet extends HttpServlet\
    \ {\n```\n\nRegardless of how you declare the servlet, if you now open a browser\
    \ and type `http://localhost:8080/ebookshop/`, you should see the application’s\
    \ home page.\n\nYou might be wondering about the purpose of the `META-INF` folder.\
    \ Place inside that folder a file named `MANIFEST.MF` and containing the following\
    \ single line:\n\n```\nManifest-Version: 1.0\n```\n\nMove the `webapps\\ebookshop`\
    \ folder to the Desktop, open it and select all four items in it. Then, right-click\
    \ on them and select “`Send To` ![Image](images/U001.jpg) `Compressed (Zipped)\
    \ Folder`”. When asked to provide a file name, type `ebookshop`. Windows will\
    \ create a file named `ebookshop.zip`. Change its extension to `war` (which stands\
    \ for Web ARchive) and move it to Tomcat’s `webapps` folder. After a short while,\
    \ Tomcat will automatically unpack the WAR file into a folder named `ebookshop`\
    \ identical to the one you started with.\n\nThe manifest file contains information\
    \ about the files packaged in a JAR file, and a WAR file is just a JAR with a\
    \ particular function. You can find a specification for the manifest file at `http://docs.oracle.com/javase/7/docs/technotes/guides/jar/jar.html#JAR%20Manifest`.\n\
    \nWAR files are the best way to deploy your applications to more than one server:\
    \ copy them into `webapps`, and Tomcat will do the rest for you. What could be\
    \ easier than that?"
  raw: '#### E-bookshop’s Folder Structure


    [Figure 3-6](#Chapter03.html#fig_3_6) shows the structure of the E-bookshop application.
    First of all, create the root folder of the application, named `ebookshop`, inside
    `%CATALINA_HOME%\webapps\`. Then, create the folder hierarchy and place in it
    the four source files `index.jsp`, `Checkout.jsp`, `ShoppingServlet.java`, and
    `Book.java` as shown.


    ![Image](images/9781430246237_Fig03-06.jpg)


    ***Figure 3-6.** The E-bookshop folder structure*


    To get the application to work, you first need to compile the two Java modules
    from the command line with `javac`, as explained in the “Java Test” section of
    [Chapter 1](#Chapter01.html). Then copy the two .class files from `WEB-INF\src\ebookshop\`
    to `WEB-INF\classes\ebookshop\`. Alternatively, if you feel lazy (!), you can
    copy to `WEB-INF` the little batch file shown in [Listing 3-6](#Chapter03.html#list_3_6)
    and double-click it. Note that if you want to launch it from the command line,
    you have first to attach to WEB-INF, otherwise it won’t find the `src` folder.


    ***Listing 3-6.** compile_it.bat*


    `@echo off`

    `set aname=ebookshop`

    `set /P fname=Please enter the java file name without extension:`

    `set fil=%aname%\%fname%`

    `echo *** compile_it.bat: compile src\%fil%.java`

    `javac -verbose -deprecation -Xlint:unchecked -classpath` ![Image](images/U002.jpg)

    `"C:\Program Files\Apache Software Foundation\Tomcat\lib\servlet-api.jar";classes`
    ![Image](images/U002.jpg)

    `  src\%fil%.java`

    `javac -verbose -deprecation -Xlint:unchecked -classpath classes src\%fil%.java`

    `if %errorlevel% GTR 1 goto _PAUSE`

    `echo *** compile_it.bat: move the class to the package directory`

    `move /y src\%fil%.class classes\%fil%.class`

    `:_PAUSE`

    `pause`


    The batch file opens a command-line window automatically and asks you to type
    the name of a Java file (without the extension). It then compiles the file and
    moves the resulting class into the `classes\ebookshop\` subfolder. The line with
    `javac` invokes the Java compiler with the switches that maximize both the checks
    the compiler does on your sources and the information you get.


    Notice the `classpath` switch, which tells the compiler to look for classes in
    the local directory and in Tomcat’s lib folder in addition to the usual places
    where the Java libraries are kept. This is necessary because `ShoppingServlet.java`
    imports the `javax.servlet` package and the class `Book` and, without the `classpath`
    switch, the compiler wouldn’t know where to find them. This also means that you
    have to compile `Book.java` *before* `ShoppingServlet.java`.


    When executing your application, Tomcat looks for classes in the `WEB INF\classes\`
    folder immediately inside the root folder of your application (i.e., `bookshop\`),
    which in turn is immediately inside `webapps`. The directory structure inside
    `WEB INF\classes\` must reflect what you write in the `package` statement at the
    beginning of the Java sources, which is:


    `package ebookshop;`


    If you had written this instead:


    `package myLibs.ebookshop;`


    you would have had to insert a `myLibs` folder below classes and above `ebookshop`.
    To avoid confusion, note that the package name has nothing to do with the name
    of the application. That is, you could have named the package (and, therefore,
    the folder below `classes\`) `qwertyuiop` instead of `ebookshop`. In fact, you
    could have dispensed with the package statement altogether and placed your classes
    directly inside the `classes` folder. Finally, you could have also created a JAR
    file (i.e., a Java ARchive), but we’ll talk about that later.


    Before you’re ready to go, you still need to write an additional file where you
    describe the structure of your application to Tomcat. This web deployment descriptor,
    shown in [Listing 3-7](#Chapter03.html#list_3_7), *must* be named `web.xml` and
    placed in `WEB INF`.


    ***Listing 3-7.** web.xml*


    `<?xml version="1.0" encoding="ISO-8859-1"?>`

    `<web-app`


    `    xsi:schemaLocation=~CCC`

    `"http://java.sun.com/xml/ns/j2ee http://java.sun.com/xml/ns/j2ee/web-app_2_4.xsd"`

    `    version="2.4">`

    `  <display-name>Electronic Bookshop</display-name>`

    `  <description>`

    `    E-bookshop example for`

    `    Beginning JSP, JSF and Tomcat: from Novice to Professional`

    `    </description>`

    `  <servlet>`

    `    <servlet-name>EBookshopServlet</servlet-name>`

    **`    <servlet-class>ebookshop.ShoppingServlet</servlet-class>`**

    `    </servlet>`

    `  <servlet-mapping>`

    `    <servlet-name>EBookshopServlet</servlet-name>`

    **`    <url-pattern>/eshop</url-pattern>`**

    `    </servlet-mapping>`

    `</web-app>`


    The two crucial lines are those highlighted in bold. The first one tells Tomcat
    that the servlet is in `classes\ebookshop\ShoppingServlet.class`. The second one
    tells Tomcat that the requests will refer to the servlet as `/eshop`. As the root
    folder of this application (i.e., the folder immediately inside `webapps`) is
    `ebookshop`, Tomcat will then route to this servlet all the requests it will receive
    for the URL [`http://servername:8080/ebookshop/eshop`](http://servername:8080/ebookshop/eshop).


    The element `<servlet name>` in both `<servlet>` and `<servlet mapping>` is only
    needed to make the connection between the two. An alternative to declaring the
    servlet in `web.xml` is to use an annotation in `ShoppingServlet.java`. To test
    it out, remove from `web.xml` both the `servlet` and the `servlet-mapping` elements.
    Then, insert into `ShoppingServlet.java` two lines as shown in the following code
    fragment:


    `import ebookshop.Book;`

    **`import javax.servlet.annotation.WebServlet;`**

    **`@WebServlet(value="/eshop")`**

    `public class ShoppingServlet extends HttpServlet {`


    Regardless of how you declare the servlet, if you now open a browser and type
    [`http://localhost:8080/ebookshop/`](http://localhost:8080/ebookshop/), you should
    see the application’s home page.


    You might be wondering about the purpose of the `META INF` folder. Place inside
    that folder a file named `MANIFEST.MF` and containing the following single line:


    `Manifest-Version: 1.0`


    Move the `webapps\ebookshop` folder to the Desktop, open it and select all four
    items in it. Then, right-click on them and select “`Send To` ![Image](images/U001.jpg)
    `Compressed (Zipped) Folder`”. When asked to provide a file name, type `ebookshop`.
    Windows will create a file named `ebookshop.zip`. Change its extension to `war`
    (which stands for Web ARchive) and move it to Tomcat’s `webapps` folder. After
    a short while, Tomcat will automatically unpack the WAR file into a folder named
    `ebookshop` identical to the one you started with.


    The manifest file contains information about the files packaged in a JAR file,
    and A WAR file is just a JAR with a particular function. You can find a specification
    for the manifest file at [`http://docs.oracle.com/javase/7/docs/technotes/guides/jar/jar.html#JAR%20Manifest`](http://docs.oracle.com/javase/7/docs/technotes/guides/jar/jar.html#JAR%20Manifest).


    WAR files are the best way to deploy your applications to more than one server:
    copy them into `webapps`, and Tomcat will do the rest for you. What could be easier
    than that?'
