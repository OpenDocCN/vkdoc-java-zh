    \ it by writing the four characters `&lt;` instead. To escape larger blocks of\
    \ text, you can use the `CDATA` section, as in the following example:\n\n```\n\
    <![CDATA[<aTag>The tag's body</aTag>]]>\n```\n\nLooking at `enterprises.xml`,\
