    usemap="#mymap" width="300" height="150"` `    style="border-width:1px;border-style:solid;border-color:black;"`
    `    />` `<map id="mymap"><table><tr>` `  <td><a href="black.html" shape="rect"
    coords="0,0,100,150"` `    title="black"/></td>` `  <td><a href="gray.html" shape="circ"
    coords="170,60,50"` `    title="gray"/></td>` `  <td><a href="white.html" shape="rect"
    coords="100,0,300,150"` `    title="white"/></td>` `  </tr></table></map>` `</body>`
    `</html>`  As you can see, you associate a map to the image by setting `img`’s
    `usemap` attribute to the URI of the `map` element. Notice how the `shape` and
    `coords` attributes are set to identify the three clickable areas. The shapes
    are rendered from the bottom up, as it is obvious considering that if that were
    not the case, the white rectangle would hide the gray circle in [Figures A-22](#AppendixA.html#fig_A_22)
    and [A-23](#AppendixA.html#fig_A_23).    The `shape` attribute can have the values
    `rect`, `rectangle`, `circ`, `circle`, `poly`, and `polygon`. The coordinates
    are defined in `coords` as a comma-separated list of numeric values. Obviously,
    you have to match the coordinates you define in `coords` with those of the areas
    of the image you want to make clickable.    [Table A-7](#AppendixA.html#tab_A_7)
    shows the meaning of the numeric values associated with each shape. The x coordinate
    is measured horizontally from left to right, and the y coordinate is measured
    vertically from top to bottom. Therefore, the top-left corner of the map always
    represents the origin of the coordinates, with `x=0`, `y=0`. In the example, the
    bottom-right corner of the map has the coordinates `x=300` and `y=150`.    ![Image](images/9781430246237_Tab0A-07.jpg)    Clearly,
    with enough points, a polygon can approximate the contours of any shape you like,
