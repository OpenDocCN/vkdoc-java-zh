    `  public static final long serialVersionUID = 1L;`

    `  private int i;`

    `  public MyClass() {i = 0;}`

    `  public void setI(int i) {this.i = i;}`

    `  public int getI() {return i;}`

    `  }`


    As you can see, the integer attribute `i` is a property. [Listing 4-6](#Chapter04.html#list_4_6)
    shows a JSP page that uses both `getProperty` and `setProperty`.


    ***Listing 4-6.** myObj.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%@page import="java.util.*, MyClasses.MyClass"%>`

    `<%@page trimDirectiveWhitespaces="true"%>`

    `<html><head><title>myObj</title></head><body>`

    `<jsp:useBean id="obj" class="MyClasses.MyClass" scope="session">`

    `  <jsp:setProperty name="obj" property="i" value="11"/>`

    `  </jsp:useBean>`

    `<jsp:getProperty name="obj" property="i"/>`

    `<jsp:setProperty name="obj" property="i" value="22"/>`

    `<jsp:getProperty name="obj" property="i"/>`

    `</body></html>`


    As you can see, `myObj.jsp` instantiates the bean object with `useBean` and initializes
    its attribute by executing `setProperty` within the body of `useBean`. The advantage
    of doing it that way is that Tomcat only attempts to execute the sub-action `setProperty`
    if the instantiation of the bean succeeds.


    The two executions of `getProperty` send the value of i to the output. As a result,
    `myObj.jsp` generates the following HTML page:


    `<html><head><title>myObj</title></head><body>`

    `1122</body></html>`


    The example also shows that in `setProperty` you can replace the `value` attribute
    with `param`. Then, Tomcat sets the attribute to the value of the identically
    named request parameter. Notice how the `page` directive with `trimDirectiveWhitespaces`
    set to `true` only leaves a single newline, after `<body>`, because it is in the
    HTML template. It results in 11 and 12 being “fused” into 1122. Not necessarily
    what you would like to have.


    #### Action: text


    You can use the `jsp:text` action to write template text. Its syntax is straightforward:


    `<jsp:text>`*`Template data`*`</jsp:text>`


    Its body cannot contain other elements; it can only contain text and EL expressions.


    #### Actions: element, attribute, and body


    With the actions `element`, `attribute`, and `body`, you can define XML elements
    dynamically within a JSP page. One reason why you might like to define XML elements
    dynamically is that your JSP page, instead of generating a web page to be displayed
    in a browser, might need to generate an XML file used to exchange data with other
    modules and applications. The word *dynamically* is important, because it means
    that you can generate the XML elements at request time rather than statically
    at compile time.


    The JSP page shown in [Listing 4-7](#Chapter04.html#list_4_7) generates the HTML
    output shown in [Listing 4-8](#Chapter04.html#list_4_8). It is a meaningless page,
    only designed to show you how to use these actions. Don’t look for a meaning that
    doesn’t exist!


    ***Listing 4-7.** actel_element_attribute.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<html>`

    `<head><title>Action elements: element, attribute</title></head>`

    `<body>`

    **`<jsp:element name="myElem">`**

    **`  <jsp:attribute name="myElemAttr">myElemAttr''s value</jsp:attribute>`**

    **`  <jsp:body>myElem''s body</jsp:body>`**

    **`  </jsp:element>`**

    `<br/>`

    `<jsp:include page="text.txt"/>`

    `<br/>`

    **`<jsp:include>`**

    **`  <jsp:attribute name="page">text.txt</jsp:attribute>`**

    **`  </jsp:include>`**

    `</body>`

    `</html>`


    ***Listing 4-8.** The Output of actel_element_attribute.jsp*


    `<html>`

    `<head><title>Action elements: element, attribute</title></head>`

    `<body>`

    **`<myElem myElemAttr="myElemAttr''s value">myElem''s body</myElem>`**

    `<br/>`

    `This is inside the test file text.txt`

    `<br/>`

    **`This is inside the test file text.txt`**

    `</body>`

    `</html>`


    I have highlighted two parts of the listings. The first highlight shows how to
    use the actions `element`, `attribute`, and `body` to generate an XML element.
    Be aware that if you drop the action `body`, the XML element generated by `element`
    will have an empty body, as in the following example:


    `<myElem myElemAttr="myElemAttr''s value"/>`


    The second highlight shows how you can use `attribute` to move the `page` attribute
    of `include` to be inside the body of the `include` action. The content of the
    file `text.txt` is unimportant. You’ll find a one-line file in the `jsp_element`
    folder of the software package for this chapter.


    #### Actions: plugin, params, and fallback


    These three actions let you embed an object in a web page. For example, [Listing
    4-9](#Chapter04.html#list_4_9) shows you how to embed an applet with `plugin`,
    how to pass to it a line of text with `params`, and how to inform the user with
    `fallback` if the applet fails to start. To test it, copy the file `plugin.jsp`
    from the `jsp_plugin` folder of the software package for this chapter to the usual
    `tests` folder, and then browse `localhost:8080/tests/plugin.jsp`.


    The `plugin` action generates for you the appropriate browser-dependent HTML construct
    to embed the applet.


    ***Listing 4-9.** plugin.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<html><head><title>Action: plugin</title></head><body>`

    `<jsp:plugin type="applet" code="MyApplet.class"`

    `  codebase="/tests" height="100" width="100">`

    `  <jsp:params>`

    `    <jsp:param name="line" value="Well said!"/>`

    `    </jsp:params>`

    `  <jsp:fallback>Unable to start plugin</jsp:fallback>`

    `  </jsp:plugin>`

    `</body></html>`


    If you want to try it yourself, [Listing 4-10](#Chapter04.html#list_4_10) shows
    you the code for a simple applet.


    ***Listing 4-10.** MyApplet.java*


    `import java.awt.*;`

    `import java.applet.*;`

    `public class MyApplet extends Applet {`

    `  String line;`

    `  public void init() {`

    `    line = getParameter("line");`

    `    }`

    `  public void paint(Graphics page) {`

    `    page.setColor(Color.red);`

    `    page.fillRect(0, 0, 50, 50);`

    `    page.setColor(Color.green);`

    `    page.fillRect(50, 0, 50, 50);`

    `    page.setColor(Color.blue);`

    `    page.fillRect(0, 50, 50, 50);`

    `    page.setColor(Color.yellow);`

    `    page.fillRect(50, 50, 50, 50);`

    `    page.setColor(Color.black);`

    `    page.drawString(line, 10, 40);`

    `    }`

    `  }`


    And [Figure 4-2](#Chapter04.html#fig_4_2) shows what you should see in your browser.
    To test it, compile the applet, place both `plugin.jsp` and `MyApplet.class` in
    the folder `%CATALINA_HOME%\webapps\ROOT\tests\`, and type `localhost:8080/tests/plugin.jsp`
    in your browser. Note that Tomcat doesn’t do anything with the applet itself.
    It only sends it to the client when requested to do so. That’s why the applet
    class doesn’t need to be placed in the `WEB-INF` folder like the other classes
    you have encountered so far.


    ![Image](images/9781430246237_Fig04-02.jpg)


    ***Figure 4-2.** The output of plugin.jsp*


    `jsp:plugin` accepts the attributes `type`, `jreversion`, `nspluginurl`, and `iepluginurl`.
    The example used `type` to specify that the plugin was an applet; `jreversion`
    lets you specify the version number of the JRE specification you require (the
    default is 1.2); and `nspluginurl` and `iepluginurl` let you specify where the
    JRE plug-in can be downloaded for Netscape Navigator and Internet Explorer, respectively.
    However, I doubt that you will ever use the last three attributes.'
