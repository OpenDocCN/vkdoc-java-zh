    thisMonth = now.getMonth() + 1;` `        if (year * 12 + month < thisYear * 12
    + thisMonth) {` `          expiryOk = false;` `          alert("The credit card
    has expired");` `          }` `        }` `      }` `    }` `  }`  `function validateForm()
    {` `  if (numberOk != true) {` `    alert("Invalid credit card number");` `    return
    false;                                              //-->` `    }` `  if (expiryOk
    != true) {` `    alert("Invalid credit card expiry date");` `    return false;                                              //-->`
    `    }` `  var f = document.getElementById("frm");` `  var k = -1;` `  for (var
    i = 1; i < f.length && k < 0; i++) {` `    if(f.elements[i].value.length == 0)
    k = i;` `    }` `  if (k >= 0) alert("Field " + f.elements[k].name + " empty");`
    `  return (k < 0);` `  }`  The function `validateForm` is an extension of the
    function with the same name defined in `nonemptyForm.js` ([Listing 10-4](#Chapter10.html#list_10_4)).
    The only difference is that before ensuring all fields contain something, it checks
    whether the two flags `numberOk` and `expiryOk` are true. If not, it reports an
    error and returns `false`, so that the form is not submitted.    The two flags
    are set respectively in the two functions `valNumber` and `valExpiry`. The function
    `valNumber` accepts as valid credit-card numbers all strings that contain either
    15 or 16 numeric digits plus any number of spaces. `valExpiry` only accepts as
    valid expiry dates strings in the format `MM/YY` plus, again, any number of spaces.    To
    try out the validation, replace the version of `Checkout.jsp` originally in the
    `eshop\jsp\` folder with the modified one, and copy `validForm.js` to the same
    `eshop\jsp\` folder. [Figure 10-8](#Chapter10.html#fig_10_8) shows an example
    of an invalid expiry date.  ![Image](images/9781430246237_Fig10-08.jpg)  ***Figure
    10-8.** Individual field validation with JavaScript*    Before we move the validation
    of credit-card number and expiry date to the server, we need to take a few things
    into consideration.    The first ‘A’ of Ajax stands for “Asynchronous.” Although
    you can actually use it in synchronous mode, if you do so, your page might hang
    while waiting for the server to respond. However, if you use it asynchronously,
    it is possible the user could attempt to submit the form before the validation
    responses from the server arrive. This should be avoided because what’s the point
    of asking for validation if you don’t wait for the reply? It would result in the
    server receiving non-validated (and therefore possibly invalid) field values.    The
    simplest way to wait for Ajax to complete its dialogs with the server is to block
    the `submit` button until all validations have been completed and let the user
    know why he or she cannot submit the page. You could also keep the `submit` button
    disabled (i.e., grayed out) until Ajax has done its job. You could also add disabled
    check boxes beside the fields being validated, which your JavaScript code ticks
    when the corresponding validation has been done successfully. I favor the minimalist
    approach: unless you are forced to address the user, you keep quiet. This makes
    for cleaner pages and simpler coding. In most cases, by the time the user clicks
    on the `submit` button, Ajax will have done its job, and the user will remain
    unaware of what has been going on behind the scene.    If you look at `validForm.js`
    ([Listing 10-6](#Chapter10.html#list_10_6)), you will see that we can use for
    this purpose the two variables `numberOk` and `expiryOk`. All we need to do is
    set them to a special value while the client is waiting for the server to respond.
    Then we can extend the check of the two flags in `validateForm`, so that if necessary
    we can ask the user to wait.    To avoid confusion, I made a copy of `validForm.js`,
    which I then renamed `validFormAjax.js`. To use it, after copying it to `eshop\jsp\`,
    you will only need to change in `Checkout.jsp` the `script` element to load `validFormAjax.js`
    instead of `validForm.js`. During my tests, I also changed the title of `Checkout.jsp`,
    from “Check Out (with client validation)” to “Check Out (with server validation),”
    but it is not necessary for you to do so. To have validation with Ajax working,
    you will also need to copy to the `eshop\jsp\` folder the two files `ccNumber.jsp`
    and `ccExpiry.jsp`, which perform the validation on the server. More about that
    later.    [Listing 10-7](#Chapter10.html#list_10_7) shows `validFormAjax.js`.    ***Listing
