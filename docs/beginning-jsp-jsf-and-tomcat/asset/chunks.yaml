    `<?xml version="1.0" encoding="UTF-8"?>` `<starfleet>` `  <starship name="Enterprise"
    sn="NX-01">` `    <class commissioned="2151">NX</class>` `    <captain>Jonathan
    Archer</captain>` `    </starship>` `  <starship name="USS Enterprise" sn="NCC-1701">`
    `    <class commissioned="2245">Constitution</class>` `    <captain>James Tiberius
    Kirk</captain>` `    </starship>` `  <starship name="USS Enterprise" sn="NCC-1701-A">`
    `    <class commissioned="2286">Constitution</class>` `    <captain>James T. Kirk</captain>`
    `    </starship>` `  <starship name="USS Enterprise" sn="NCC-1701-B">` `    <class
    commissioned="2293">Excelsior</class>` `    <captain>John Harriman</captain>`
    `    </starship>` `  <starship name="USS Enterprise" sn="NCC-1701-C">` `    <class
    commissioned="2332">Ambassador</class>` `    <captain>Rachel Garrett</captain>`
    `    </starship>` `  <starship name="USS Enterprise" sn="NCC-1701-D">` `    <class
    commissioned="2363">Galaxy</class>` `    <captain>Jean-Luc Picard</captain>` `    </starship>`
    `  <starship name="USS Enterprise" sn="NCC-1701-E">` `    <class commissioned="2372">Sovereign</class>`
