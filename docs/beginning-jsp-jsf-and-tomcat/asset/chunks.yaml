- fmt: "# Introducing JSP and Tomcat\n\nInteractivity is what makes the Web really\
    \ useful. By interacting with a remote server, you can find the information you\
    \ need, keep in touch with your friends, or purchase something online. And every\
    \ time you type something into a web form, an application “out there” interprets\
    \ your request and prepares a web page to respond.\n\nTo understand JSP, you first\
    \ need to have a clear idea of what happens when you ask your browser to view\
    \ a web page, either by typing a URL into the address field of your browser or\
    \ by clicking on a hyperlink. [Figure 1-1](#Chapter01.html#fig_1_1) shows you\
    \ how it works.\n\n![Image](images/9781430246237_Fig01-01.jpg)\n\n***Figure 1-1.**\
    \ Viewing a plain HTML page*\n\nThe following steps show what happens when you\
    \ request your browser to view a static web page:\n\n> 1. When you type an address\
    \ such as `http://www.website.com/path/whatever.html` into the address field,\
    \ your browser first resolves `www.website.com` (i.e., the name of the web server)\
    \ into the corresponding Internet Protocol (IP) address, usually by asking the\
    \ Domain Name Server provided by your Internet Service Provider (ISP). Then your\
    \ browser sends an HTTP request to the newly found IP address to receive the content\
    \ of the file identified by `/path/whatever.html`.\n> 2. In reply, the web server\
    \ sends an HTTP response containing a plain-text HTML page. Images and other non-textual\
    \ components, such as sound and video clips, only appear in the page as references.\n\
    > 3. Your browser receives the response, interprets the HTML code contained in\
    \ the page, requests the non-textual components from the server, and displays\
    \ the lot.\n\nJavaServer Pages (JSP) is a technology that helps you create such\
    \ dynamically generated pages by converting script files into executable Java\
    \ modules; JavaServer Faces (JSF) is a package that facilitates interactivity\
    \ with the page viewers; and Tomcat is an application that can execute your code\
    \ and act as a web server for your dynamic pages.\n\nEverything you need to develop\
    \ JSP/JSF web applications is available for free download from the Internet; but\
    \ to install all the necessary packages and tools and obtain an integrated development\
    \ environment, you need to proceed with care. There is nothing more annoying than\
    \ having to deal with incorrectly installed software. When something doesn’t work,\
    \ the problem will always be difficult to find.\n\nIn this chapter, I’ll introduce\
    \ you to Java servlets and JSP, and I’ll show you how they work together within\
    \ Tomcat to generate dynamic web pages. But, first of all, I will guide you through\
    \ the installation of Java and Tomcat: there wouldn’t be much point in looking\
    \ at code you can’t execute on your PC, would there?\n\nYou’ll have to install\
    \ more packages as you progress. Do these installations correctly, and you will\
    \ never need to second guess yourself. In total, you will need at least 300MB\
    \ of disk space for Java and Tomcat alone and twice as much space to install the\
    \ Eclipse development environment.\n\nTo run all the examples contained in this\
    \ book, I used a PC with a 2.6GHz AMD Athlon 64x2 (nothing fancy, nowadays) with\
    \ 1GB of memory and running Windows Vista SP2. Before performing any installation,\
    \ I reformatted the hard disk and re-installed the OS from the original DVD. **I\
    \ don’t suggest for a moment that you do the same!** I did it for two opposite\
    \ but equally important reasons: first, I didn’t want existing stuff to interfere\
    \ with the latest packages needed for web development; second, I didn’t want to\
    \ rely on anything already installed. I wanted to be sure to give you the full\
    \ list of what you need.\n\nAt the time of this writing, the latest versions of\
    \ all the packages you will need to install are:\n\n> Java: 1.7.0 update 3 (installation\
    \ explained in this chapter)\n> Tomcat web server: 7.0.26 (installation also explained\
    \ in this chapter)\n> Eclipse development environment: Indigo 3.7.2 (installation\
    \ explained in [Chapter 2](#Chapter02.html))\n> MySQL database: 5.5.21.0 (installation\
    \ explained in [Chapter 6](#Chapter06.html))\n> MySQL Java database connector\
    \ (JDBC): 5.1.18 (installation also explained in [Chapter 6](#Chapter06.html))\n\
    > JavaServer Faces: 2.1.7 (installation explained in [Chapter 7](#Chapter07.html))\n\
    \nI included Eclipse on the list because an integrated development environment\
    \ is extremely useful for developing software. And MySQL is listed because any\
    \ non-trivial web application is likely to need handling data.\n\nOf course, after\
    \ this book is published, there will most likely be newer releases of all the\
    \ aforementioned packages. Nevertheless, you should be able to adapt my instructions\
    \ to install the latest versions without any problem.\n\nOne last recommendation:\
    \ to be sure that everything will work correctly, please follow the installation\
    \ instructions to the letter. It will save you endless headaches.\n\n‘Nuff said.\
    \ Here we go.\n\n## Installing Java\n\nNothing runs without Java, and you need\
    \ two different Java packages: one is the runtime environment (JRE), which lets\
    \ you execute Java, and the other is the Java Development Kit (JDK), which lets\
    \ you compile Java sources into executable classes.\n\nThey are downloadable together\
    \ from Oracle’s web site. Here’s what you need to do:\n\n> 1. Go to the URL `http://www.oracle.com/technetwork/java/javase/downloads/index.html`.\n\
    > 2. Click on the big button marked “`Java Download`” (the latest version at the\
    \ time of writing is `7u3`). This will take you to the page “Java SE Development\
    \ Kit 7 Downloads.”\n> 3. Select “`Accept License Agreement`” and then click on\
    \ the link `jdk-7u3-windows-i586.exe`.\n>    \n>    The actual link might refer\
    \ to a version other than “`7u3`,” but you need to download either “`Windows x86\
    \ (32-bit)`” or “`Windows x64 (64-bit)`,” according to type of processor of your\
    \ PC. Although I am using a 64-bit PC, I have tested all the examples in this\
    \ book with 32-bit packages because I didn’t want to test everything twice.\n\
    >    \n> 4. Execute the file.\n> 5. Accept the license agreement when requested\
    \ and install everything.\n\nAt this point, you should have the folder `C:\\Program\
    \ Files\\Java\\` with two subfolders: `jdk1.7.0_03` and `jre7`, or the equivalent\
    \ folders for the version you have downloaded.\n\nIn order to be able to compile\
    \ Java from the command line, you need to add the JDK path to the `PATH` environment\
    \ variable. From the Windows `Start` menu, select `Settings` ![Image](images/U001.jpg)\
    \ `Control Panel` ![Image](images/U001.jpg) `System`. When the `System Properties`\
    \ dialog opens, click on the “`Advanced system settings`” link that you find on\
    \ the left-hand side and then on the `Advanced` tab. Finally, to reach the dialog\
    \ that lets you modify the `PATH` variable, click on the “`Environment Variables`”\
    \ button. You will see the double dialog window shown in [Figure 1-2](#Chapter01.html#fig_1_2).\n\
    \n![Image](images/9781430246237_Fig01-02.jpg)\n\n***Figure 1-2.** The Environment\
    \ Variables double dialog*\n\nYou might see a `PATH` variable on the top dialog,\
    \ but what you need to do is scroll the bottom dialog by clicking on its sidebar\
    \ until you see a variable named `Path`. Double-click it (or highlight it and\
    \ click the “`Edit...`” button) and insert at the beginning of its value the text\
    \ “`C:\\Program Files\\Java\\jdk1.7.0_03\\bin;`”, as shown in [Figure 1-3](#Chapter01.html#fig_1_3).\n\
    \n![Image](images/9781430246237_Fig01-03.jpg)\n\n***Figure 1-3.** Update the Path\
    \ variable*\n\nThe semicolon at the end of the text is essential because it separates\
    \ the new path from the existing ones. Do not insert additional spaces before\
    \ or after.\n\nClick on the “`OK`” button to save the changes. Then click this\
    \ button another couple of times until the system dialog closes."
