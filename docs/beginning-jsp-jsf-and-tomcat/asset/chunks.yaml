- fmt: "If instead of `class` you specify the `beanName` attribute, Tomcat will behave\
    \ as if you had specified `class`, but only after attempting to find a serialized\
    \ bean of that class. Serializing a bean means that the object’s data is converted\
    \ to a byte stream and saved in a file with the extension `ser`. Tomcat expects\
    \ to find serialized objects in the same folder containing the application classes.\
    \ For example, a serialized bean of the `xxx.yyy.Zzz` class is expected to be\
    \ in the `WEB-INF\\classes\\xxx\\yyy\\Zzz.ser` file. This mechanism lets you save\
    \ an object in a file and then load it into your JSP page. You can actually have\
    \ several serialized beans of the same class (e.g., `Zzz.ser`, `Zzz_test.ser`,\
    \ `Zzz25.ser`, and `Abc.ser`). Fortunately, the designers of JSP have thought\
    \ this issue through and allowed you to set the value of `beanName` at request\
    \ time (the other attributes must be hard-coded), so that you can parameterize\
    \ your page for what concerns loading serialized objects.\n\nFinally, if you specify\
    \ `type` and set it to a fully qualified class name but specify neither `class`\
    \ nor `beanName`, Tomcat won’t instantiate any object and will instead look for\
    \ it in the given scope. If it finds it, Tomcat will make it available as an object\
    \ of the given type rather than of the class from which it was instantiated. If\
    \ what I just explained sounds confusing, you might decide to follow a simple\
    \ rule: forget that `jsp:useBean` supports the attributes `class` and `beanName`.\
    \ Let the servlet do the work. Just pay attention that the servlet creates the\
    \ objects in the correct scope. In the previous chapter, the initialization method\
    \ of the `eshop` servlet (see [Listing 3.9](#Chapter03.html#list_3_9)) first instantiated\
    \ the `dataManager` object and then saved it in the `application` scope.\n\n![Image](images/square.jpg)\
    \ **Caution** Don’t confuse the scope of a bean as specified with the `useBean`\
    \ attribute `scope` with the scope of the scripting variable that Tomcat associates\
    \ to the bean\n\nAs an example of `useBean` scopes, the following code instantiates\
    \ a `MyClass` object that remains available as long as the session remains valid:\n\
    \n```\n<jsp:useBean class=\"myPkg.MyClass\" id=\"myObj\" scope=\"session\"/>\n\
    ```\n\nYou’ll be able to access it via a scripting variable named `myObj` in any\
    \ page within the same session with the following statement:\n\n```\n<jsp:useBean\
    \ id=\"myObj\" type=\"myPkg.MyClass\" scope=\"session\"/>\n```\n\nHowever, the\
    \ scope of the scripting variable `myObj` is determined by where within your page\
    \ you execute `useBean`, as with the declaration of any other scripting variable.\
    \ If you find this confusing, consider this: in the page containing the second\
    \ `useBean`, you don’t have access to the scripting variable `myObj` until you\
    \ execute the `useBean` action. Before that, the scripting variable is undefined,\
    \ although the bean called `myObj` already exists, as it was instantiated by the\
    \ first `useBean` in a previously executed page. This tells you that the scripting\
    \ variable referring to the object and the actual object are two different things\
    \ with two different scopes, even if they share the same name.\n\nIncidentally,\
    \ the first `useBean` (with `class`, `id`, and `scope`) is completely equivalent\
    \ to this:\n\n```\n<%\nMyClass myName = new MyClass();\nsession.setAttribute(\"\
    myObj\", myObj);\n%>\n```\n\nand the second `useBean` (with `id`, `type`, and\
    \ `scope`) is the same as this:\n\n```\n<%\nMyClass myObj = (MyClass)session.getAttribute(\"\
    myObj\");\n%>\n```\n\nThis representation should make completely clear that the\
    \ object and the scripting variable are two different entities. In the second\
    \ scriptlet, you could even decide to call the scripting variable with a different\
    \ name.\n\nBecause of all the options implemented by combining its attributes,\
    \ as I said at the beginning, `useBean` is somewhat tricky to use. But you can\
    \ always come back to this page in case of doubt!\n\n## Actions: setProperty and\
    \ getProperty\n\nA bean property is nothing else than an attribute of a bean’s\
    \ class, but only when you define for that attribute the standard get and put\
    \ methods. To make it completely clear, both `get` and `put` must be there. Otherwise,\
    \ that class attribute is *not* a bean property.\n\nAdditionally, you must name\
    \ the two methods respectively `get` and `put`, followed by the full name of the\
    \ attribute with the first letter capitalized. For example, if you define the\
    \ attribute named `myAttr`, you must name the two attributes `getMyAttr` and `setMyAttr`.\
    \ Otherwise, again, Tomcat will not recognize the attribute as a bean property.\n\
    \nAn example from the `eshop` application will convince you that you are better\
    \ off if Tomcat recognizes an attribute as a property. The JSP page `OrderConfirmation.jsp`\
    \ has the following two elements:\n\n```\n<jsp:useBean id=\"customer\" class=\"\
    eshop.beans.Customer\"/>\n<jsp:setProperty property=\"*\" name=\"customer\"/>\n\
    ```\n\nThe `useBean` action instantiates an object of type `Customer` and assigns\
