    顾名思义，JSF 的 HTML 库收集了与渲染 HTML 组件相关的标签。正如你在示例中已经看到的（例如，使用 `h:inputText`），你通过将引用对象的赋值表达式分配给组件标签的特定属性，将数据模型的对象关联到相应的组件（例如，`<h:inputText
    value="#{aStringBean.str}"/>`）。


    尽管在大多数情况下，标签的名称应该已经告诉你它们的用途，但我已在表 7-1 中总结了标签和 HTML 元素之间的对应关系。


