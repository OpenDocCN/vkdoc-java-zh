    ##### Servlet 初始化


    Tomcat 在实例化 Servlet 后立即执行其 `init` 方法（参见清单 3-9）。你可以在本章的软件包中找到整个项目的代码。要安装它，请打开名为
    `eshop project` 的文件夹，并将 `eshop` 文件夹或 `eshop.war` 文件复制到 Tomcat 的 `webapps` 文件夹中。要启动应用程序，请访问
    URL [`http://localhost:8080/eshop/shop`](http://localhost:8080/eshop/shop)。


    ***清单 3-9.** ShopServlet.java - init 方法*


    `public void init(ServletConfig config) throws ServletException {`

    `  System.out.println("*** initializing controller servlet.");`

    `  super.init(config);`


    `  DataManager dataManager = new DataManager();`

    `  dataManager.setDbUrl(config.getInitParameter("dbUrl"));`

    `  dataManager.setDbUserName(config.getInitParameter("dbUserName"));`

    `  dataManager.setDbPassword(config.getInitParameter("dbPassword"));`


    `  ServletContext context = config.getServletContext();`

    `  context.setAttribute("base", config.getInitParameter("base"));`

    `  context.setAttribute("imageUrl", config.getInitParameter("imageUrl"));`

    `  context.setAttribute("dataManager", dataManager);`


    `  try {  // load the database JDBC driver`

    `    Class.forName(config.getInitParameter("jdbcDriver"));`

    `    }`

    `  catch (ClassNotFoundException e) {`

    `    System.out.println(e.toString());`

    `    }`

    `  }`


    如你所见，初始化包含三个主要活动：实例化并配置数据管理器、保存一些参数供 JSP 页面后续使用（请记住，JSP 可以通过隐式变量 `application`
    访问 Servlet 上下文），以及加载访问数据库所需的驱动程序——JDBC 代表 Java 数据库连接器。


    请注意，所有这些活动都是通过将 Servlet 上下文属性设置为通过以下方法获取的值来完成的：


    `config.getInitParameter("`*`init-parameter-name`*`")`


    这些值存储在 `WEB-INF\web.xml` 文件中，如清单 3-10 所示。


    ***清单 3-10.** 部分 web.xml*


    `<web-app ...>`

    `  ...`

    `  <servlet>`

    `    ...`

    `    <init-param>`

    `      <param-name>dbUrl</param-name>`

    `      <param-value>jdbc:mysql://localhost:3306/shop</param-value>`

    `      </init-param>`

    `    ...`

    `    </servlet>`

    `  ...`

    `  <web-app ...>`


    通过在 `web.xml` 中定义关键的初始化参数，你可以在不修改应用程序代码的情况下更改这些参数。表 3-2 显示了为此应用程序定义的初始化参数。


    ![Image](img/9781430246237_Tab03-02.jpg)


    ![Image](img/9781430246237_Tab03-02a.jpg)


    为了方便使用，我没有为数据库设置密码保护，但这显然是在实际应用中需要做的事情。我将在第 5 章中解释如何安装和使用 MySQL。届时，与数据库相关的初始化参数将变得完全有意义。目前，需要记住的基本要点是如何定义初始化参数。


    从第 2 章可知，Tomcat 通过定义隐式对象 `application` 使 JSP 可以访问 Servlet 上下文。因此，例如，在 `ShopServlet.init()`
    中使用 `context.setAttribute("imageUrl", ...)` 设置的值，在 JSP 中可以作为 `application.getAttribute("imageUrl")`
    的返回值使用。


    ##### 请求处理


    根据用户的操作，浏览器当前显示的页面会向 Servlet 发送一个带有特定 `action` 参数值的请求。然后，Servlet 将每个请求转发到由该值确定的
    JSP 页面。例如，显示购物车的页面还包含一个结账按钮。如果用户点击该按钮，页面将向 Servlet 发送一个 `action` 参数设置为 `"checkOut"`
    的请求。


    #### 视图


    表 3-3 显示了应用程序中所有 JSP 页面的列表。我将在接下来的章节中，随着我们探讨应用程序的不同方面，对这些页面进行解释。


    ![Image](img/9781430246237_Tab03-03.jpg)


    ![Image](img/9781430246237_Tab03-03a.jpg)


    此外，你还有一个名为 `eshop.css` 的样式表文件。


    一个典型的用户会话流程如下：


    > 1.  用户首先访问 [`http://your-web-site/eshop/shop`](http://your-web-site/eshop/shop)，看到欢迎页面，左侧菜单包含一个搜索框和图书类别列表。然后用户可以：

    >     *   在搜索框中输入单词并点击 `Search` 按钮，或选择一个图书类别。

    >     *   通过点击相应的 `Details` 链接选择其中一本书。应用程序随后会将图书列表替换为该书的封面图片以及数据库中关于该书的所有可用信息。

    >     *   将图书添加到购物车。应用程序随后会自动将用户带到购物车页面，在那里可以更新副本数量或删除图书条目。

    >     *   重复上述步骤，直到用户准备提交订单。在购物车页面，用户可以点击 `Check Out` 链接。

    > 2.  结账页面要求用户提供其个人和财务数据。当用户点击 `Confirm Order` 按钮时，页面会通知应用程序记录订单。


    在任何时候，用户都可以通过左侧菜单添加图书，或通过顶部菜单进入购物车修改订单。


    ### 总结


    在本章中，我描述了适用于 Web 应用程序的架构，并提供了示例 E-bookshop 来解释模型-视图-控制器架构的工作原理。


    然后，你学习了如何安装 Eclipse IDE，如何配置它以使用最新版本的 Java 和 Tomcat，以及如何从头开始创建 JSP 应用程序。此时有必要这样做，因为对于
    E-bookshop 来说，我们已经达到了不使用 IDE 也能合理完成的极限。


    最后，我介绍了 E-shop 项目，在后续的不同版本中，我将使用它来完成对 JSP 的描述并解释 JSF。


    在接下来的三章中，我将带你了解 JSP 的其余功能。特别是，下一章将专门介绍动作元素。为此，我将使用简单的专用示例以及 `eshop` 应用程序的相关方面。


    ## 第 4 章


    ![Image](img/3square.jpg)


    ## JSP 动作


    在第 2 章中，你了解到 JSP 元素有三种类型：脚本元素、指令和动作。我已在第 2 章中直接描述了前两种类型，现在是时候来看看 JSP 动作了。动作与脚本小程序一样，在请求页面时被处理。在本章中，你将学习如何使用
    JSP 标准动作，如何创建自己设计的动作，以及如何使用 JSP 标准标签库中包含的一些动作。除了小的具体示例外，你还将学习动作在上一章介绍的 `eshop`
    应用程序中的作用。动作可以完成脚本元素能做的所有事情，正如你将在下一章末尾看到的那样，届时我将告诉你如何编写完全不包含任何脚本元素的 JSP 代码。

    '
- fmt: "### JSP Standard Actions\n\nWhile Tomcat executes directive elements when\
    \ translating a page, it executes action elements when processing a client’s HTTP\
    \ request.\n\nJSP actions specify activities to be performed when a page is requested\
    \ and can therefore operate on objects and affect the response. They normally\
    \ take the following form:\n\n`<jsp:action-name attr1=\"value1\" [attr2=\"value2\"\
    ...]> ... </jsp:action-name>`\n\nHowever, actions can also have a body, like in\
    \ the following example:\n\n`<jsp:action-name attribute-list>`\n`  <jsp:subaction-name\
    \ subaction-attribute-list/>`\n`</jsp:action-name>`\n\nThere are eight JSP standard\
    \ actions (`forward`, `include`, `useBean`, `setProperty`, `getProperty`, `text`,\
    \ `element`, and `plugin`) and five additional actions that can only appear in\
    \ the body of other actions (`param`, `params`, `attribute`, `body`, and `fallback`).\n\
    \nActually, to be precise, there are two additional action elements—`invoke` and\
    \ `doBody`—that you cannot invoke from within JSP pages. More about them later\
    \ in this chapter. There is also a further standard action—`root`—that I will\
    \ explain at the end of the next chapter.\n\n#### Actions: `forward`, `include`,\
    \ and `param`\n\nThe `forward` action lets you abort execution of the current\
    \ page and transfer the request to another page:\n\n`<jsp:forward page=\"myOtherPage.jsp\"\
    >`\n`  <jsp:param name=\"newParName\" value=\"newParValue\"/>`\n`</jsp:forward>`\n\
    \nThe `include` action is similar to `forward`, the main difference being that\
    \ it returns control to the including page after the included page has completed\
    \ execution. The output of the included page is appended to the output generated\
    \ by the including page up to the point where the action is executed.\n\nAs shown\
    \ in the example, `jsp:param` lets you define a new parameter for the invoked\
    \ page, which also has access to the parameters already available to the invoking\
    \ page.\n\nHere is another example of a `forward` action:\n\n`<% String dest =\
    \ \"/myJspPages/\" + someVar; %>`\n`<jsp:forward page=\"<%=dest%>\">`\n`  <jsp:param\
    \ name=\"newParName\" value=\"newParValue\"/>`\n`</jsp:forward>`\n\nThis is 100\
    \ percent equivalent to the following scriptlet:\n\n`<%`\n`  String dest = \"\
    /myJspPages/\" + someVar;`\n`  RequestDispatcher rd = application.getRequestDispatcher(dest\
    \ + \"?newParName=newParValue\");`\n`  rd.forward(request, response);`\n`%>`\n\
    \nTomcat clears the output buffer upon executing the `forward` action. Therefore,\
    \ the HTML code generated up to that point by the current page is lost. But if\
    \ the current page has already filled the response buffer by the time it is aborted\
    \ with `forward`, that part of the response will have already left the server.\
    \ This will probably result in a bad page sent to the client. Therefore, you have\
    \ to be very careful when invoking `forward` from within a page that generates\
    \ a large output.\n\nYou don’t have to worry about such a problem with `include`,\
    \ because Tomcat doesn’t clear the output buffer when it executes that action.\n\
    \nWith both `forward` and `include`, the destination page must be a well-formed\
    \ and complete JSP page. The `forward` action must satisfy the additional requirement\
    \ of generating a complete and valid HTML page, because the output of the destination\
    \ page is what goes back to the client’s browser in the HTML response. The destination\
    \ page of an `include` action might even generate only a single character, although\
    \ in most cases it provides HTML code. For example, the top bar of the `eshop`\
    \ application is generated in the page `TopMenu.jsp` (see [Listing 4-1](#Chapter04.html#list_4_1))\
    \ and included in seven JSP pages with this code:\n\n`<jsp:include page=\"TopMenu.jsp\"\
    \ flush=\"true\"/>`\n\nThe `flush` attribute (default `false`) ensures that the\
    \ HTML generated so far by the including page is sent to the client before executing\
    \ the included page. Note that the included page is not allowed to change the\
    \ response headers or the status code.\n\n**Listing 4-1.** `TopMenu.jsp`\n\n```\n\
    <%@page language=\"java\" contentType=\"text/html\"%>\n<%\n  String base = (String)application.getAttribute(\"\
    base\");\n  String imageUrl = (String)application.getAttribute(\"imageUrl\");\n\
    %>\n<div class=\"header\">\n  <div class=\"logo\">\n    <p>e-Shopping Center</p>\n\
    \  </div>\n  <div class=\"cart\">\n    <a class=\"link2\" href=\"<%=base%>?action=showCart\"\
    >Show Cart\n      <img src=\"<%=imageUrl%>/cart.gif\" border=\"0\"/></a>\n  </div>\n\
    </div>\n```\n\n`TopMenu.jsp` generates the HTML code in [Listing 4-2](#Chapter04.html#list_4_2)\
    \ (shown after I removed the empty lines).\n\n**Listing 4-2.** HTML Generated\
    \ by `TopMenu.jsp`\n\n```\n<div class=\"header\">\n  <div class=\"logo\">\n  \
    \  <p>e-Shopping Center</p>\n  </div>\n  <div class=\"cart\">\n    <a class=\"\
    link2\" href=\"/eshop/shop?action=showCart\">Show Cart\n      <img src=\"/eshop/images//cart.gif\"\
    \ border=\"0\"/></a>\n  </div>\n</div>\n```"
  raw: '### JSP Standard Actions


    While Tomcat executes directive elements when translating a page, it executes
    action elements when processing a client’s HTTP request.


    JSP actions specify activities to be performed when a page is requested and can
    therefore operate on objects and affect the response. They normally take the following
    form:


    `<jsp:action-name attr1="value1" [attr2="value2"...]> ... </jsp:action-name>`


    However, actions can also have a body, like in the following example:


    `<jsp:action-name attribute-list>`

    `  <jsp:subaction-name subaction-attribute-list/>`

    `  </jsp:action-name>`


    There are eight JSP standard actions (`forward`, `include`, `useBean`, `setProperty`,
    `getProperty`, `text`, `element`, and `plugin`) and five additional actions that
    can only appear in the body of other actions (`param`, `params`, `attribute`,
    `body`, and `fallback`).


    Actually, to be precise, there are two additional action elements—`invoke` and
    `doBody`—that you cannot invoke from within JSP pages. More about them later in
    this chapter. There is also a further standard action—`root`—that I will explain
    at the end of the next chapter.


    #### Actions: forward, include, and param


    The `forward` action lets you abort execution of the current page and transfer
    the request to another page:


    `<jsp:forward page="myOtherPage.jsp">`

    `  <jsp:param name="newParName" value="newParValue"/>`

    `  </jsp:forward>`


    The `include` action is similar to `forward`, the main difference being that it
    returns control to the including page after the included page has completed execution.
    The output of the included page is appended to the output generated by the including
    page up to the point where the action is executed.


    `A`s shown in the example, `jsp:param` lets you define a new parameter for the
    invoked page, which also has access to the parameters already available to the
    invoking page.


    Here is another example of a `forward` action:


    `<% String dest = "/myJspPages/" + someVar; %>`

    `<jsp:forward page="<%=dest%>">`

    `  <jsp:param name="newParName" value="newParValue"/>`

    `  </jsp:forward>`


    This is 100 percent equivalent to the following scriptlet:


    `<%`

    `  String dest = "/myJspPages/" + someVar;`

    `  RequestDispatcher rd = application.getRequestDispatcher(dest + "?newParName=newParValue");`

    `  rd.forward(request, response);`

    `  %>`


    Tomcat clears the output buffer upon executing the `forward` action. Therefore,
    the HTML code generated up to that point by the current page is lost. But if the
    current page has already filled the response buffer by the time it is aborted
    with `forward`, that part of the response will have already left the server. This
    will probably result in a bad page sent to the client. Therefore, you have to
    be very careful when invoking `forward` from within a page that generates a large
    output.


    You don’t have to worry about such a problem with `include`, because Tomcat doesn’t
    clear the output buffer when it executes that action.


    With both `forward` and `include`, the destination page must be a well-formed
    and complete JSP page. The `forward` action must satisfy the additional requirement
    of generating a complete and valid HTML page, because the output of the destination
    page is what goes back to the client’s browser in the HTML response. The destination
    page of an `include` action might even generate only a single character, although
    in most cases it provides HTML code. For example, the top bar of the `eshop` application
    is generated in the page `TopMenu.jsp` (see [Listing 4-1](#Chapter04.html#list_4_1))
    and included in seven JSP pages with this code:


    `<jsp:include page="TopMenu.jsp" flush="true"/>`


    The `flush` attribute (default `false`) ensures that the HTML generated so far
    by the including page is sent to the client before executing the included page.
    Note that the included page is not allowed to change the response headers or the
    status code.


    ***Listing 4-1.** TopMenu.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%`

    `  String base = (String)application.getAttribute("base");`

    `  String imageUrl = (String)application.getAttribute("imageUrl");`

    `  %>`

    `<div class="header">`

    `  <div class="logo">`

    `    <p>e-Shopping Center</p>`

    `    </div>`

    `  <div class="cart">`

    `    <a class="link2" href="<%=base%>?action=showCart">Show Cart`

    `      <img src="<%=imageUrl%>/cart.gif" border="0"/></a>`

    `    </div>`

    `  </div>`


    `TopMenu.jsp` generates the HTML code in [Listing 4-2](#Chapter04.html#list_4_2)
    (shown after I removed the empty lines).


    ***Listing 4-2.** HTML Generated by TopMenu.jsp*


    `<div class="header">`

    `  <div class="logo">`

    `    <p>e-Shopping Center</p>`

    `    </div>`

    `  <div class="cart">`

    `    <a class="link2" href="/eshop/shop?action=showCart">Show Cart`

    `      <img src="/eshop/images//cart.gif" border="0"/></a>`

    `    </div>`

    `  </div>`'
  trans: '

    ### JSP 标准动作


    当 Tomcat 在翻译页面时执行指令元素，而在处理客户端的 HTTP 请求时执行动作元素。


    JSP 动作指定了页面被请求时要执行的活动，因此可以操作对象并影响响应。它们通常采用以下形式：


    `<jsp:动作名 属性 1="值 1" [属性 2="值 2"...]> ... </jsp:动作名>`


    然而，动作也可以有主体，如下例所示：


    `<jsp:动作名 属性列表>`

    `  <jsp:子动作名 子动作属性列表/>`

    `  </jsp:动作名>`


    共有八个 JSP 标准动作（`forward`、`include`、`useBean`、`setProperty`、`getProperty`、`text`、`element`
    和 `plugin`），以及五个只能出现在其他动作主体中的附加动作（`param`、`params`、`attribute`、`body` 和 `fallback`）。


    实际上，准确来说，还有两个附加的动作元素——`invoke` 和 `doBody`——你不能从 JSP 页面内部调用它们。本章稍后会详细介绍它们。还有一个额外的标准动作——`root`——我将在下一章末尾解释。


    #### 动作：forward、include 和 param


    `forward` 动作允许你中止当前页面的执行，并将请求转发到另一个页面：


    `<jsp:forward page="myOtherPage.jsp">`

    `  <jsp:param name="newParName" value="newParValue"/>`

    `  </jsp:forward>`


    `include` 动作与 `forward` 类似，主要区别在于，在被包含页面执行完毕后，控制权会返回到包含页面。被包含页面的输出会附加到包含页面在执行该动作之前已生成的输出之后。


    如示例所示，`jsp:param` 允许你为被调用的页面定义一个新参数，该页面也可以访问调用页面已有的参数。


    以下是 `forward` 动作的另一个示例：


    `<% String dest = "/myJspPages/" + someVar; %>`

    `<jsp:forward page="<%=dest%>">`

    `  <jsp:param name="newParName" value="newParValue"/>`

    `  </jsp:forward>`


    这完全等同于以下脚本小程序：


    `<%`

    `  String dest = "/myJspPages/" + someVar;`

    `  RequestDispatcher rd = application.getRequestDispatcher(dest + "?newParName=newParValue");`

    `  rd.forward(request, response);`

    `  %>`


    Tomcat 在执行 `forward` 动作时会清空输出缓冲区。因此，当前页面在此之前生成的 HTML 代码会丢失。但是，如果当前页面在被 `forward`
    中止时已经填满了响应缓冲区，那么这部分响应可能已经离开了服务器。这很可能会导致发送给客户端的页面出现问题。因此，在生成大量输出的页面中调用 `forward`
    时必须非常小心。


    使用 `include` 时则不必担心此类问题，因为 Tomcat 在执行该动作时不会清空输出缓冲区。


    对于 `forward` 和 `include`，目标页面必须是一个格式良好且完整的 JSP 页面。`forward` 动作还必须满足生成完整且有效的 HTML
    页面的额外要求，因为目标页面的输出会作为 HTML 响应返回给客户端的浏览器。`include` 动作的目标页面甚至可能只生成单个字符，尽管在大多数情况下它提供的是
    HTML 代码。例如，`eshop` 应用的顶部栏是在页面 `TopMenu.jsp`（见 清单 4-1）中生成的，并通过以下代码包含在七个 JSP 页面中：


    `<jsp:include page="TopMenu.jsp" flush="true"/>`


    `flush` 属性（默认为 `false`）确保在执行被包含页面之前，包含页面到目前为止生成的 HTML 已发送给客户端。请注意，不允许被包含页面更改响应头或状态码。


    ***清单 4-1.** TopMenu.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%`

    `  String base = (String)application.getAttribute("base");`

    `  String imageUrl = (String)application.getAttribute("imageUrl");`

    `  %>`

    `<div class="header">`

    `  <div class="logo">`

    `    <p>e-Shopping Center</p>`

    `    </div>`

    `  <div class="cart">`

    `    <a class="link2" href="<%=base%>?action=showCart">Show Cart`

    `      <img src="<%=imageUrl%>/cart.gif" border="0"/></a>`

    `    </div>`

    `  </div>`


    `TopMenu.jsp` 生成 清单 4-2 中的 HTML 代码（已移除空行后显示）。


    ***清单 4-2.** TopMenu.jsp 生成的 HTML*


    `<div class="header">`

    `  <div class="logo">`

    `    <p>e-Shopping Center</p>`

    `    </div>`

    `  <div class="cart">`

    `    <a class="link2" href="/eshop/shop?action=showCart">Show Cart`

    `      <img src="/eshop/images//cart.gif" border="0"/></a>`

    `    </div>`

    `  </div>`

