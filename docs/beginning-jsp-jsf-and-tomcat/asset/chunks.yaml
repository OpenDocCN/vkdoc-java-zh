    of one of the element''s attributes, and the value is the attribute value. You
    can define several attributes for the same element by separating them with a semicolon,
    and you can style several elements with a single definition by separating them
    with a comma. To define more than one style for the same element, you can associate
    a class name to each separate style. For example:


    `  <style type="text/css">`

    `    p {font-size: 130%}`

    `    p.bold {font-weight: bold}`

    `    p.italic {font-style: italic}`

    `    </style>`


    Then, you can use the styles as follows:


    `<p>This is a default paragraph, large size</p>`

    `<p class="bold">This is a large and bold paragraph</p>`

    `<p class="bold italic">This is a large, bold, and italic paragraph</p>`

    `<p class="italic" style="font-size: 100%;">This is an italic normal sized paragraph</p>`


    You can place `style` elements inside the `head` or `body` HTML elements of your
    pages, or define styles for individual elements by placing style definitions separated
    by semicolons in their `style` attribute.


    ### The XML Document


    To explain XML, I’ll start by giving you a simple example that will accompany
    us throughout this chapter. For this purpose, I’ll use the file shown in [Listing
    5-1](#Chapter05.html#list_5_1). We will go back to the `eshop` example in the
    next chapter. But, to explain XML, it is better to look at a simple example without
    being distracted by the complexity of the application that has nothing to do with
    the task at hand.


    ***Listing 5-1.** enterprises.xml*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<starfleet>`

    `  <title>The two most famous starships in the fleet</title>`

    `  <starship name="USS Enterprise" sn="NCC-1701">`

    `    <class name="Constitution"/>`

    `    <captain>James Tiberius Kirk</captain>`

    `    </starship>`

    `  <starship name="USS Enterprise" sn="NCC-1701-D">`

    `    <class name="Galaxy"/>`

    `    <captain>Jean-Luc Picard</captain>`

    `    </starship>`

    `  </starfleet>`


    The first line defines the standard and the character set used in the document.
    The tags are always closed, either with an end tag when they have a body (e.g.,
    `<title>...</title>`) or with a slash if they’re empty (e.g., `<class .../>`).
    There can be repeated tags (e.g., `starship`), and the attribute names are not
    unique (e.g., `name`).


    As you can see, the tags reflect the logical structure of the data, although there
    are certainly many ways of structuring the same information. Each tag identifies
    an *element node* labeled with a name (e.g., `starfleet`, `title`, and `class`,
    also called an *element type*), often characterized by *attributes* that consist
    of a *name* and a *value* (e.g., `sn="NCC-1701"`), and possibly containing *child
    nodes* (e.g., `captain` inside `starship`), also called *sub-elements*.


    XML documents can also contain processing instructions for the applications that
    handle them (enclosed between `<?` and `?>`), comments (enclosed between `<!--`
    and `-->`), and document-type declarations (more about that later). Notice that
    `enterprises.xml` doesn’t provide any information concerning how the data it contains
    might be presented.


    XML relies on the less-than sign to identify the tags. Therefore, if you want
    to use it for other purposes, you have to escape it by writing the four characters
    `&lt;` instead. To escape larger blocks of text, you can use the `CDATA` section,
    as in the following example:


    `<![CDATA[<aTag>The tag''s body</aTag>]]>`


    Looking at `enterprises.xml`, you might ask yourself why `sn` is an attribute
    of `starship`, while `captain` is a child element. Couldn’t you make `captain`
    an attribute, as in the following example?


    `<starship name="USS Enterprise" sn="NCC-1701" captain="Jean-Luc Picard">`


    Yes, you could. It all depends on what you think you might like to do with the
    element in the future. With `captain` defined as an element, you can define attributes
    for it, such as its birth date. This wouldn’t be possible if you had defined `captain`
    as an attribute. And the same applies to the `class` element. You could also replace
    the `starship` attributes `name` and `sn` with two children elements, but how
    much sense would it make?


    We have to make one last consideration about empty vs. bodied elements. By defining
    the captain’s name as the body of the element, as in:


    `<captain>Jean-Luc Picard</captain>`


    you make it impossible for it to have children elements. Alternatively, you could
    have defined this:


    `<captain name="Jean-Luc Picard"></captain>`


    perhaps shortened, as in:


    `<captain name="Jean-Luc Picard"/>`


    ### Defining Your Own XML Documents


    The usefulness of being able to use XML tags tailored to your needs is greatly
    expanded by the possibility of formally specifying them in a separate document.
    This enables you to verify the validity of the XML documents and also to communicate
    their structure to others. Without a specification in a standardized format, you
    would have to describe your document structure in plain language or via examples.
    It wouldn’t be the most efficient way, and it certainly wouldn’t be good enough
    for automatic validation. The two most widely used methods to specify document
    structures are XML DTDs and XML schemas. You will see later on in this chapter
    that you can select which method your XML document uses for validation by adding
    an appropriate element to it.


    #### XML DTDs


    DTDs are better known than XML schemas, which have been developed more recently.
    They are also easier to understand. DTDs were originally developed for the XML
    predecessor, Standard Generalized Markup Language (SGML), and they have a very
    compact syntax. [Listing 5-2](#Chapter05.html#list_5_2) shows how a DTD for `enterprises.xml`
    would look.


    ***Listing 5-2.** starfleet.dtd*


    `01: <!ELEMENT starfleet (title,starship*)>`

    `02: <!ELEMENT title (#PCDATA)>`

    `03: <!ELEMENT starship (class,captain)>`

    `04: <!ATTLIST`

    `05:     starship name CDATA #REQUIRED`

    `06:     sn CDATA #REQUIRED>`

    `07: <!ELEMENT class EMPTY>`

    `08: <!ATTLIST class name CDATA #REQUIRED>`

    `09: <!ELEMENT captain (#PCDATA)>`


    Line 1 defines the `starfleet` element as consisting of one `title` element and
    an undefined number of `starship` elements. Replacing the asterisk with a plus
    sign would require `starship` to occur at least once, and a question mark would
    mean zero or one starships. If you replaced `starship` with `(starship|shuttle)`,
    it would mean that you could have a mix of `starship` and `shuttle` elements following
    the `title` (just as an example, because you haven’t defined `shuttle`).


    Line 2 specifies `title` to be a string of characters (the `PC` of `PCDATA` stands
    for *parsed character*). Line 7 shows how to specify that an element not be allowed
    to have a body. To complete the description of how to define elements, I only
    need to add that if you replaced `EMPTY` with `ANY`, it would mean that the element
    could contain any type of data.


    Lines 4–6 specify the attributes for `starship`. The general format of an attribute
    list declaration is as follows:


    `<!ATTLIST` *`elementName`**`attributeName`**`attributeType`**`defaultValue`*`>`


    where *`attributeType`* can have a dozen of possible values, including `CDATA`
    (to indicate character data), an enumeration of all strings allowed (enclosed
    in parentheses and with bars as separators, as in `(left|right|center)`), `ID`
    (to indicate a unique identifier), and `IDREF` (the `ID` of another element).
    The *`defaultValue`* can be a quoted value (e.g., "`0`" or "`a string`"), the
    keyword `#REQUIRED` (to indicate that it’s mandatory), the keyword `#IMPLIED`
    (to indicate that it can be omitted), or the keyword `#FIXED` followed by a value
    (to force the attribute to have that value).'
