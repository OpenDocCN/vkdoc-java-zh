    ## About the Author


    ![Image](images/giulio_zambon.jpg) ![Image](images/square.jpg) **Giulio Zambon’s**
    first love was physics, but he decided to dedicate himself to software development
    more than 30 years ago: back when computers were still made of transistors and
    core memories, programs were punched on cards, and Fortran only had arithmetic
    IFs. Over the years, he learned a dozen computer languages and worked with all
    sorts of operating systems. His specific interests were in telecom and real-time
    systems, and he managed several projects to their successful completion.


    In 2001 Giulio founded his own company offering computer telephony integration
    (CTI) services, and he used JSP and Tomcat exclusively to develop the web side
    of the service platform. Back in Australia after many years in Europe, he now
    dedicates himself to writing software to generate and solve numeric puzzles. His
    web site, [http://zambon.com.au/](http://zambon.com.au/), is written in JSP on
    his dedicated server, which, unsurprisingly, runs Tomcat!


    ## About the Technical Reviewers


    ![Image](images/boris_minkin.jpg) ![Image](images/square.jpg) **Boris Minkin**
    is a senior technical architect at a major financial corporation. He has more
    than 20 years of experience working in various areas of information technology
    and financial services. Boris obtained his master’s degree in information systems
    at Stevens Institute of Technology, New Jersey. His professional interests are
    in Internet technology, service-oriented architecture, enterprise application
    architecture, multi-platform distributed applications, cloud, distributed caching,
    Java, grid, and high performance computing. You can contact Boris at [`bm@panix.com`](http://bm@panix.com).


    ![Image](images/manuel_jordan_elera.jpg) ![Image](images/square.jpg) **Manuel
    Jordan Elera** is an autodidactic developer and researcher who enjoys learning
    new technologies for his own experiments and creating new integrations. Manuel
    won the 2010 Springy Award-Community Champion. In his limited free time, he reads
    the Bible and composes music on his guitar. Manuel is a senior member in the Spring
    Community Forums known as dr_pompeii and a technical reviewer for important books
    about Spring Source projects, all published by Apress. Read more and contact him
    through his blog at [http://manueljordan.wordpress.com](http://manueljordan.wordpress.com)
    and follow him on his Twitter account, @dr_pompei.


