    为了继续解释 JSF 的工作原理，我想让你注意一个事实，即浏览器中显示的 URL 与 JSP 页面的名称不匹配。例如，你通过在浏览器中键入 [`http://localhost:8080/simplef/`](http://localhost:8080/simplef/)
    来启动应用程序。那么是什么技巧将你带到 `first.jsp` 呢？如果你打开在 `simplef` 文件夹中找到的默认 JSP 页面 `index.jsp`，你将看到清单
    7-4 中显示的单行代码。


    ***清单 7-4.** index.jsp*


    `<html><body><jsp:forward page="/first.jsf"/></body></html>`


    但在同一个文件夹中没有名为 `first.jsf` 的文件！要开始理解发生了什么，你必须查看 `web.xml` 文件（参见清单 7.5）。


    ***清单 7-5.** web.xml*


    `<?xml version="1.0" encoding="UTF-8"?>` `<web-app version="2.5"`  `  xsi:schemaLocation="http://java.sun.com/xml/ns/javaee
    http://java.sun.com/xml/ns/javaee/web-` `app_2_5.xsd">` `<servlet>` `  <servlet-name>Faces
    Servlet</servlet-name>` `  <servlet-class>javax.faces.webapp.FacesServlet</servlet-class>`
    `  <load-on-startup>1</load-on-startup>` `  </servlet>` `<servlet-mapping>` `  <servlet-name>Faces
    Servlet</servlet-name>` `  <url-pattern>*.jsf</url-pattern>` `  </servlet-mapping>`
    `</web-app>`


    它定义了一个类型为 `javax.faces.webapp.FacesServlet` 的 servlet。这就是 JSF servlet，我非正式地称之为“JSF”。正是这个
    servlet 为属性分配 ID 并在页面之间传输数据。`web.xml` 还将扩展名 `jsf` 映射到该 servlet，从而强制所有对扩展名为 `jsf`
    的页面的请求都发送给它。


    这揭示了部分谜团：当你在浏览器中键入 [`http://localhost:8080/simplef/`](http://localhost:8080/simplef/)
    时，Tomcat 执行 `index.jsp`，它将请求转发给 `first.jsf`（它实际上并不存在）。但是，由于 `web.xml` 中的 servlet
    映射，Tomcat 将你的请求重定向到 JSF servlet。


    谜团的其余部分很容易解释：JSF 将扩展名 `jsf` 替换为 `jsp`，这意味着请求最终可以到达 `first.jsp`。扩展名 `jsp` 是默认值，但你可以通过在
    `web.xml` 的 `web-app` 元素中插入一个如清单 7-6 所示的元素来替换它。


    ***清单 7-6.** 在 web.xml 中定义 JSF 默认后缀*


    `<context-param>` `  <param-name>javax.faces.DEFAULT_SUFFIX</param-name>` `  <param-value>.jspx</param-value>`
    `  </context-param>`


