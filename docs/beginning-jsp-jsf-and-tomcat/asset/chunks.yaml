    What you should never do is to omit the getter methods, because JSF expects to
    be able to read the properties.    #### The `core` Library    JSF’s `core` library
    gives you access to APIs that are independent of a particular render kit:    >
    *   **Converters**. Converters let you convert between the data types of the components
    and those of your application objects. > *   **Listeners**. Based on the JavaBean
    version 1.0.1 mechanism, you register a listener with a component to handle events
    that the component generates. > *   **Events**. After the listener is registered
    with a component, the `FacesServlet` fires the events by invoking an event notification
    method of the corresponding listener. > *   **Validators**. Validators examine
    the value of a component and ensure that it conforms to a set of predefined rules.    In
    the previous examples, you have already encountered `f:view`, `f:selectItem`,
    and `f:selectItems`. Most of the core tags perform operations on components. [Table
    7-2](#Chapter07.html#tab_7_2) provides the list of all core tags and the corresponding
    operations. In the table, I have highlighted in italics the few operations that
    do not apply to individual components. As for the HTML library, you will find
    more information about the core in [Chapter 9](#Chapter09.html).    ![Image](images/9781430246237_Tab07-02.jpg)    ![Image](images/9781430246237_Tab07-02a.jpg)    I
    expect that you will find many of the tags listed in [Table 7-2](#Chapter07.html#tab_7_2)
    obscure. You will be able to understand most of them after the next sections and
    chapters, but the use of some of them definitely falls outside the scope of this
    book.    If you are curious about what a facet is, I can tell you that it is a
    named sub-component specific to a particular component. For example, `h:gridPanel`
    (which renders an HTML table) supports the two facets `header` and `footer`. If
    you include `<f:facet "header"><h:outputText value="Whatever"/></f:facet>` anywhere
    within the body of `h:gridPanel`, the rendered table will have the header “Whatever”.    I
    will talk about converters and validators in the next chapter, where I will describe
    a JSF version of the `eshopx` project I introduced in [Chapter 6](#Chapter06.html).
    In this chapter, as an interesting example of core tags, I will describe how to
    use `f:ajax`, which was first added to the core library with release 2.0\. In
    order to do that, I will first tell you about Ajax in general, and show you how
    it was used before the introduction of `f:ajax`.    ##### What’s Ajax?    Asynchronous
    JavaScript and XML (Ajax) is a mechanism for letting JavaScript communicate with
    the server *asynchronously*—that is, without reloading the page. This is possible
    by means of the JavaScript built in object `XMLHttpRequest`. For those who are
    not familiar with JavaScript, I have added some notes about it in [Appendix A](#AppendixA.html).    In
    practical terms, it works like this: you create an `XMLHttpRequest` object within
    JavaScript, use it to send a request to the server, get the response, and, presto,
    you have fresh data for your web page without having to reload it. Well, it sounds
    easy, but it’s not obvious how to do it, and it’s even more tricky to maintain.
    To explain how to use Ajax, I’ll show you a simple example of a page that displays
    the server time. First, you need to write a JSP page to return the time (see [Listing
    7-14](#Chapter07.html#list_7_14)).    ***Listing 7-14.** time.jsp*  `<%@page language="java"
    contentType="text/html"` `  %><%@page import="java.util.*"` `  %><% out.print(new
    GregorianCalendar().getTime()); %>`  I’ve removed all the spaces and newlines
    before and after the print statement, including a newline at the end. This ensures
    that only the time is returned. If you type the URL of this script in a browser,
    you’ll get something like this:  `Sat Jun 23 21:56:27 EST 2012`  You’ll perhaps
    see some other time zone, but the format will be identical. A good place to check
    out the abbreviation for your time zone is [`http://www.timeanddate.com/library/abbreviations/timezones/`](http://www.timeanddate.com/library/abbreviations/timezones/).    Now
    that you have a way of getting the server time, you can write the page to display
    it with Ajax, as shown in [Listing 7-15](#Chapter07.html#list_7_15).    ***Listing
    7-15.** ajax.xhtml*  `<?xml version="1.0" encoding="UTF-8"?>` `<!DOCTYPE html
    PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"` `    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd"`
    `    >` `<html >` `<head>` `  <title>Example of Ajax</title>` **`  <script type="text/javascript"
    src="ajax.js"></script>`** `  </head>` `<body>` `  <form name="tForm" action="">`
    `    <span>The time on the server is:</span>` `    <input type="text" name="tElement"
    readonly="readonly" size="30"/>` `    <input type="button" value="Update"` **`        onclick="ajaxFun(''tForm'',
    ''tElement'');"`** `        />` `    </form>` `  </body>` `</html>`  As you can
    see, I’ve highlighted two lines. The first is where you load the file `ajax.js`,
    which contains the JavaScript code to support the Ajax operation. The second line
    is where you execute the `ajaxFun` JavaScript function whenever you click the
