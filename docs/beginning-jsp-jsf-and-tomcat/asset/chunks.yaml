    ### JSTL-XML 和 XSL


    JSTL 中指定的 XML 操作旨在满足 JSP 程序员可能遇到的基本 XML 需求。


    为了使 XML 文件内容更易于访问，W3C 制定了 XML 路径语言（XPath）。选择 XPath 这个名称是为了表明它标识 XML 文档中的路径（参见
    [`http://www.w3.org/TR/xpath`](http://www.w3.org/TR/xpath)）。JSTL-XML 操作依赖该语言来标识
    XML 组件。


    为了避免 EL 表达式和 XPath 表达式之间的混淆，需要 XPath 表达式的操作始终使用 `select` 属性。这样，你可以确保 `select`
    之外的所有表达式都是 EL 表达式。几个 XML 操作是等效核心操作的 XPath 对应版本，其中属性 `select` 替换了属性 `value`（如果存在）。它们是：`x:choose`、`x:forEach`、`x:if`、`x:out`、`x:otherwise`、`x:set`
    和 `x:when`。


    其余三个操作是 `x:parse` 以及 `x:transform` 和 `x:param` 这一对。但在你了解它们之前，我们必须先谈谈可扩展样式表语言（XSL）。


    XSL 是一种用于表达样式表的语言，这些样式表描述了如何显示和转换 XML 文档。规范文档可从 [`http://www.w3.org/Style/XSL/`](http://www.w3.org/Style/XSL/)
    获取。


    虽然 CSS 只需要定义如何表示预定义的 HTML 标签，但 XSL 必须应对 XML 中没有预定义标签这一事实！你如何知道 XML 文件中的 `<table>`
    元素是代表你从 HTML 中了解的数据表，还是一个你可以围坐就餐的物体？


    这就是为什么 XSL 不仅仅是一种样式表语言。它实际上包含三个部分：


    > *   **XPath**：我刚刚提到的在 XML 文档中导航的语言。

    > *   **XSLT**：一种转换 XML 文档的语言，可以完全改变其结构。

    > *   **XSL 格式化对象（XSL-FO）**：一种用于格式化 XML 文档的语言。


    我只会解释 XPath 和 XSLT，因为 XSL-FO 关注的是*页面格式化*（页面大小、页边距、页眉、页脚、引用、脚注等），这与网页所需的屏幕格式化和超链接非常不同。


    仅给你一个概念，XSL-FO 将输出划分为页面，页面划分为区域（正文、页眉、页脚、左右边栏），区域划分为块区域，块区域划分为行区域，行区域划分为内联区域。你可以定义这些字段的多个属性，然后将内容“流入”其中。XSL-FO
    还提供了类似于 HTML 中列表和表格的结构。


    #### XPath


    XPath 表达式通过模式标识一组 XML 节点。可扩展样式表语言转换（XSLT）模板（有关 XSLT 示例，请参见本章后面部分）随后在应用转换时使用这些模式。可能的
    XPath 节点可以是以下任何一种：文档/根节点、注释节点、元素节点、属性节点、文本节点、处理指令节点和命名空间节点。


    ![Image](img/square.jpg) **注意** XML 文档中的处理指令为使用该文档的应用程序提供信息。


    例如，请看以下 XML 文档：


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<whatever >`

    `  <!-- bla bla -->  <?myAppl "xyz"?>`

    `  <item name="anything">`

    `    <subitem>The quick brown fox</subitem>`

    `    </item>`

    `  </whatever>`


    文档（或根）节点是 `<whatever>`，`<!-- bla bla -->` 是一个注释节点，`<subitem>...</subitem>` 是一个元素节点，`name="anything"`
    是一个属性节点，字符串 `The quick brown fox` 是一个文本节点，`<?myAppl "xyz"?>` 是一个处理指令节点，而 `` 是一个命名空间节点。

