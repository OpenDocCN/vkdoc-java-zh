    two lines. The first line, which contains the `form` element, shows that the `action`
    attribute is set to the empty string. The `action` attribute defines the URL of
    the page that must handle the request form. An empty string means that the same
    page displaying the form will also handle it. The second highlighted line shows
    how you can use the `input` element to set parameters without the user being aware
    of it (unless he or she peeks at the source, that is).    If you fill in the form
    as shown in [Figure A-14](#AppendixA.html#fig_A_14) and click on the `Submit`
    button (or hit the `Enter` key), you’ll see in the address field of your browser
    that the following string appears at the end of the URL (I’ve inserted newlines
    for readability):  `?agent=007` `&t=bla+bla+bla` `&p=a++b++c` `&abc=a` `&abc=c`
    `&yn=n` `&f=just_a_file.txt` `&ta=The+quick+brown+fox+jumps+over+the+lazy+dog`
    `&w=1` `&h=2` `&food=spaghetti`  The browser has translated each `input` element
    into a string *`parameter-name`*`=`*`parameter-value`*. Notice that each space
    in the text fields has been replaced by a plus sign, including the spaces within
    the password. Also notice that the parameter `abc` appears twice, because I checked
    two of the three available check boxes. To avoid seeing all the parameters in
    the browser, add to the `form` element the attribute `method="post"`.    ####
    Buttons and Images    You can define a button in several ways, as shown in [Figure
    A-15](#AppendixA.html#fig_A_15). All allow the `disable` attribute. The document
    to generate [Figure A-15](#AppendixA.html#fig_A_15) is `form_buttons.html` ([Listing
    A-10](#AppendixA.html#list_A_10)), available in the folder `form buttons` of the
    software package for this appendix. To view the page you can just double-click
    the HTML file.  ![Image](images/9781430246237_AppA-15.jpg)  ***Figure A-15.**
    HTML elements to render buttons*    ***Listing A-10.** form_buttons.html*  `<!DOCTYPE
    html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"` `  "http//www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">`
    `<html xmllang="en" lang="en">` `<head><title>Examples of buttons</title></head>`
    `<body>` `<form action="">` `  <table  cellpadding="5" border="1">` `    <tr>`
    `      <td>&lt;button>&lt;img src="linux.jpg"/>&lt;br/>submit!&lt;/button></td>`
    `      <td><button><img src="linux.jpg"/><br/>submit!</button></td>` `      </tr>`
    `    <tr>` `      <td>&lt;input type="image" src="button.jpg"/></td>` `      <td><input
    type="image" src="button.jpg"/></td>` `      </tr>` `    <tr>` `      <td>&lt;input
    type="submit"/></td>` `      <td><input type="submit"/></td>` `      </tr>` `    <tr>`
    `      <td>&lt;input type="reset"/></td>` `      <td><input type="reset"/></td>`
    `      </tr>` `    <tr>` `      <td>&lt;input type="button" value="click me" name="b"/></td>`
    `      <td><input type="button" value="click me" name="b"/></td>` `      </tr>`
    `    </table>` `  </form>` `</body>` `</html>`  Note how I used the HTML entity
    `&lt;` to replace the open angle-bracket. This was necessary to prevent the browser
    from interpreting the code fragments I wanted to display in clear.    Perhaps
    the most obvious way of defining a button is with the `button` element. As you
    can see from [Figure A-15](#AppendixA.html#fig_A_15), you can then use images
    and text to make your button interesting. You can also define the attribute `type`=`"submit"`
    (the default), `type="reset"`, or `type="button"`. A `"reset"` button returns
    all the form’s input fields to the values they had before any user input. You
    can use a button of type `"button"` to execute a JavaScript on the client side,
    and you can assign to it a default value with the `value` attribute. You can also
    use the `name` attribute.    `<input type="submit"/>`, `<input type="reset"/>`,
    and `<input type="button"/>` let you define standard buttons. You can specify
    the text to be displayed inside the button with the `value` attribute. Note that
    the `name` attribute is allowed with `type="button"`, but not with `type="submit"`
    and `type="reset"`.    `<input type="image" src="image-file"/>` is yet another
    way to create submit buttons. However, the behavior is slightly different: when
    you use an image to create a submit button and click on it to submit the form,
    the browser sends to the server two additional parameters named `x` and `y` and
    representing the position of the cursor within the image, with 0,0 indicating
    the top-left corner of the image, `x` increasing from left to right, and `y` increasing
    from the top down. Furthermore, if you add to the element the attribute `name="whatever"`,
    the browser names the parameters `whatever.x` and `whatever.y`, instead of simply
    `x` and `y`.    If you define the `name` attribute and also define the attribute
    `value="val"`, the browser will send the `whatever=val` parameter in addition
    to the coordinates. Finally, with image buttons, you can define the `alt` attribute
    to specify text associated with the image. A nice feature of all major browsers
    is that they display the *hand cursor* on image buttons (while they display the
    *arrow cursor* on the other types of buttons).    With an appropriate server side
    script, you can use the coordinate parameters to create an image map, but then
    the script would have to do all the analysis to determine what region was clicked
    and then forward the request to the appropriate page. You will find a section
    about image maps later on in this appendix.    ### Lists    Together with tables,
    lists are the workhorses of web development. There are three types of lists: definition
    lists, ordered lists, and unordered lists. [Figures A-16](#AppendixA.html#fig_A_16)
    to [A-18](#AppendixA.html#fig_A_18) show the three types of lists. The HTML documents
    that generate the three figures are respectively `list_definition.html`, `list_ordered.html`,
    and `list_unordered.html`.  ![Image](images/9781430246237_AppA-16.jpg)  ***Figure
    A-16.** A definition list*  ![Image](images/9781430246237_AppA-17.jpg)  ***Figure
    A-17.** An ordered list*  ![Image](images/9781430246237_AppA-18.jpg)  ***Figure
    A-18.** An unordered list*    Before the latest HTML releases, it was possible
    to use some attributes to personalize the lists, but they have been deprecated.
    Use styles instead.    ### Image Maps    A useful thing to be able to do when
    developing web sites is to link areas of an image to different URLs. There are
    three ways of doing it, but two of them do not always work. On the Web, you will
    find a lot of discussions about this issue. That’s why it is worthwhile to talk
    about it in a clear and straightforward way. I will start with the easiest method.    ####
    Splitting an Image with a Table    For this example, I will use the well-known
    GNU/Linux image of a penguin[¹](#AppendixA.html#APP-A-FN-1) ([Figure A-19](#AppendixA.html#fig_A_19)).  ![Image](images/9781430246237_AppA-19.jpg)  ***Figure
    A-19.** The GNU/Linux penguin*    Suppose you want to divide the penguin image
    into four separately clickable areas, as shown in [Figure A-20](#AppendixA.html#fig_A_20).    __________    ¹
    Tux, the penguin logo, was created by Larry Ewing ([`lewing@isc.tamu.edu`](http://lewing@isc.tamu.edu))
    using the General Image Manipulation Program ([`http://www.isc.tamu.edu/~lewing/gimp/`](http://www.isc.tamu.edu/~lewing/gimp/))  ![Image](images/9781430246237_AppA-20.jpg)  ***Figure
    A-20.** The GNU/Linux penguin*    The trivial solution is that you split the image
    into four pieces that you can place in a 2x2 table, one piece per cell, as shown
    in [Listing A-11](#AppendixA.html#list_A_11). To try the code, copy the `penguin`
    folder from the software package for this chapter to the usual test folder (i.e.,
    `webapps\ROOT\tests` in the Tomcat folder) and view [`http://localhost:8080/tests/penguin/penguin_tbl.html`](http://localhost:8080/tests/penguin/penguin_tbl.html).
    You can also view it without Tomcat, by double-clicking `penguin_tbl.html`. I
    haven’t included any of the four pages the image is linked to, but you don’t need
    them to see how the mechanism works.    ***Listing A-11.** penguin_tbl.html*  `<?xml
    version=''1.0'' encoding=''utf-8''?>` `<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML
    1.1//EN"` `    "http://www.w3.org/TR/xhtml11/DTD/xhtml11.dtd">` `<html >` `<head>`
    `  <title>Penguin</title>` `  <style type="text/css">img {border-width: 0px}</style>`
    `  </head>` `<body>` `<table border="1" rules="none" cellpadding="0" cellspacing="0">`
    `  <tr>` `    <td><a href="top_left.html"><img src="penguin_tl.gif"/></a></td>`
    `    <td><a href="top_right.html"><img src="penguin_tr.gif"/></a></td>` `    </tr>`
    `  <tr>` `    <td><a href="bottom_left.html"><img src="penguin_bl.gif"/></a></td>`
    `    <td><a href="bottom_right.html"><img src="penguin_br.gif"/></a></td>` `    </tr>`
    `  </table>` `</body>` `</html>`  As you can see, this code defines a table with
    two rows and two columns, where each cell contains a hyperlinked image. I’ve styled
    the images to be rendered without borders, and I’ve defined the table to show
    no cell padding or spacing. The intention is to have the browser compose a large
    image by placing the four partial images adjacent to each other. Unfortunately,
    it doesn’t work, as shown in [Figure A-21](#AppendixA.html#fig_A_21).  ![Image](images/9781430246237_AppA-21.jpg)  ***Figure
    A-21.** The GNU/Linux penguin sawed in half*    Notice that the name of the link
    correctly matches the position of the cursor.    The same problem is shown consistently
