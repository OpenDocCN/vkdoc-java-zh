    image to the `span` element.    In conclusion, as you have just seen, CSS is a
    powerful tool that can do much more than just set a font size or a background
    color.    ### JavaScript    JavaScript is the most widely used client-side scripting
    language on the Web. By adding it to your web pages, you can make your pages *do
    things*, such as prevalidate forms or immediately react to a user’s actions. As
    you have seen in [Chapter 7](#Chapter07.html), JavaScript is also the basis for
    Ajax.    The syntax of JavaScript was modeled on that of Java. Therefore, if you
    know Java, you should find JavaScript easy to learn. One noteworthy difference
    from Java is that you can omit variable declarations in the top level code. Moreover,
    JavaScript lacks Java’s static typing and strong type checking. This gives you
    more freedom, but it comes with the risk of messing things up in a big way. JavaScript
    relies on built in objects, but it doesn’t support classes or inheritance. It’s
    an interpreted language, and object binding is done at runtime.    At the end
    of 1995, Netscape introduced JavaScript in its Netscape Navigator web browser.
    Microsoft reverse engineered JavaScript, added its own extensions (as Microsoft
    always does), and renamed it JScript. Some years later, Ecma International merged
    the two languages into the standard ECMA-262 ([`http://www.ecma-international.org/publications/standards/Ecma-262.htm`](http://www.ecma-international.org/publications/standards/Ecma-262.htm))
    and named the scripting language ECMAScript. Today, all major browsers conform
    to the ECMA 262 standard, which has been adopted as the ISO/IEC standard 16262\.
    If you go to the ISO/IEC web site, you will see that you need to pay 238 Swiss
    Francs if you want to download the standard in PDF format. I can’t imagine why
    anyone would pay for it when the same standard is free to download from the ECMA
    web site. In any case, as everybody keeps referring to JavaScript (although they
    should really be saying “ECMAScript”), I will use JavaScript as well.    ####
    Placing JavaScript Inside a Web Page    Before showing an example of what you
    can do with JavaScript, let’s see how you can include it in your web pages. You
    have two possibilities: you can either keep the script inside your HTML document:  `<script
    type="text/javascript">` `  /* Place your script here */` `  </script>.`  or save
    it in a separate file and include it with a `script` element:  `<script type="text/javascript"
    src="myScript.js"></script>`  ![Image](images/square.jpg) **Caution**  In both
    cases, you have to keep the end tag `</script>`, because the form `<script ...
    />` is invalid.    In either case, you can decide to place your script in the
    `head` element or within the `body` element. If you want the script to execute
    in response to some event (e.g., when you pass your cursor over a button), place
    it in `head`. If you place it in `body`, the browser will execute it upon loading
    the page.    #### Responding to Events    You can place the `onload` and `onunload`
    events, which are associated with the whole window, in the `body` element (or
    in `frameset`, but I recommend that you forget that one). For example, you can
    execute a JavaScript function when your page is loaded as follows:  `<body onload="functionName()">`  You
    can include in most tags a series of events, which are generated directly by a
    keyboard or a mouse. They are `onclick`, `ondblclick`, `onkeydown`, `onkeypress`,
    `onkeyup`, `onmousedown`, `onmousemove`, `onmouseout`, `onmouseover`, and `onmouseup`.
    In particular, `onmouseover` allows you to change the appearance of an element
    when you pass the cursor over it without clicking. There are tags like `head`,
    `html`, `script`, `style`, and others that are excluded, because it doesn''t make
    any sense to associate events to those elements.    Finally, some events are associated
    with the status of form-related elements and are therefore only valid within forms.
    These events are `onblur`, `onchange`, `onfocus`, `onreset`, `onselect`, and `onsubmit`.
    The events `onsubmit` and `onreset` refer to the whole form, while the others
    refer to individual elements. In particular, `onfocus` is triggered when an element
    is clicked on or tabbed to and therefore becomes ready to accept input, while
    `onblur` is triggered when an element loses focus. You can check the form input
    by using either `onchange` to trigger a testing function specifically designed
    for an element or `onsubmit` to perform several checks bundled inside a single
    function. You should ensure that input errors are detected as soon as possible.
    You don’t want your user to keep typing only to be told upon submitting the form
    that he or she did something wrong at the very beginning. In general, a combination
    of checks on individual elements plus a consistency check when the form is submitted
    is a good way to go.    #### Checking and Correcting Dates    As I already said,
    checking user inputs with JavaScript before the data leaves the browser makes
    for a quicker response, but it doesn’t necessarily reduce the checks you have
    to do on the server side, because you cannot entirely depend on what happens on
    the client side. The user might have disabled JavaScript or maliciously altered
    your page to bypass the checks.    Nevertheless, security issues aside, client-side
    checks make for a better user experience. In this section, I’ll give you an example
    of how to prevent a user from entering incorrectly formatted dates and how to
    work with dates. I’ll use JSP instead of straight HTML, because it’s much easier
    to use a JSP loop to prepare a `select` on days and months, rather than type them
    all by hand in plain HTML. [Figure A-28](#AppendixA.html#fig_A_28) shows you what
    you want to achieve. To view it, copy the folder `dates` from the software package
    for this appendix to the usual test folder and type [`http://localhost:8080/tests/dates/dates.jsp`](http://localhost:8080/tests/dates/dates.jsp).  ![Image](images/9781430246237_AppA-28.jpg)  ***Figure
    A-28.** Setting and copying dates*    You want to be able to set any valid date
    within a certain number of years, set a date to today, or copy a date at the press
    of a button. In particular, you need to ensure that when you select a month, the
    number of days changes automatically. [Listing A-18](#AppendixA.html#list_A_18)
    shows the JSP page, where I’ve highlighted the JavaScript code in bold. Study
