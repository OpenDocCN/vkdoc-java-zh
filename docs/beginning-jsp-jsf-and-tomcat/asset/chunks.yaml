    Summary    In this chapter, I introduced you to working with databases and SQL.
    I explained how to access databases from JSP via the Java SQL API. In particular,
    I showed you how to establish a connection, insert data, and perform queries.
    To complete the summary of essential DB operations, I also described how to group
    elementary updates into transactions.    To bring it all together, I described
    the design of database operations in the E-shop application and showed you their
    implementation both with scriptlets and with the XML syntax. Finally, I mentioned
    possible alternatives to MySQL and described how you can access a spreadsheet
    from JSP as if it were a database.    Brace yourself, because in the next chapter
    I will finally talk about JSF!    ## C H A P T E R  7    ![Image](images/3square.jpg)    ##
    JavaServer Faces 2.2    In this chapter, I’ll introduce you to JSF and show you
    how to use it to create user interfaces for web-based applications. Within the
    MVC application architecture I described in [Chapter 3](#Chapter03.html) (refer
    to [Figure 3-2](#Chapter03.html#fig_3_2)), JSF takes the place of the controller,
    thereby mediating every interaction between JSP (the View) and the Model, which
    encapsulates the application data. JSF makes the development of web applications
    easier by:    > *   Letting you create user interfaces from a set of standard
    UI components wired to server side objects > *   Making available four custom
    tag libraries to handle those UI components > *   Providing a mechanism for extending
    the standard UI components    JSF transparently saves state information of the
    UI components and repopulates forms when they redisplay. This is possible because
    the states of the components live beyond the lifespan of HTTP requests. JSF operates
    by providing a controller servlet and a component model that includes event handling,
    server-side validation, data conversion, and component rendering. Not surprisingly,
    JSF doesn’t change the basic page life cycle that you already know from JSP: the
    client makes an HTTP request, and the server replies with a dynamically generated
    HTML page.    The user interface of a JSF application, called a *view*, consists
    of a tree of UI component objects of types based on the `javax.faces.component.UIComponent`
    class. Some components are simple, such as a button or a text field. Others are
    complex, such as a table or a tree control element.    Be warned that JSF isn’t
    very easy to use, and it requires a non-negligible initial effort to get it going.
    However, the reward comes once you’ve familiarized yourself with JSF and can then
    develop user interfaces more quickly and efficiently. You will find the latest
    version of JSF in the master Project Object Model (POM) file for Oracle''s JSF
    Implementation, at [`http://mvnrepository.com/artifact/org.glassfish/javax.faces/`](http://mvnrepository.com/artifact/org.glassfish/javax.faces/).
    The file includes binaries, documentation, and dependencies of JSF’s recent releases.
    To be able to use JSF, you will need to copy `javax.faces-2.1.7.jar` (or a newer
    version) to Tomcat’s `lib` folder and restart Tomcat.    You can download the
    latest JSF specification (JSR-344 – JSF 2.2) by going to [`http://jcp.org/en/jsr/detail?id=344`](http://jcp.org/en/jsr/detail?id=344)
    and clicking on the `download page` link.    Let’s begin with a simple JSF application,
    so that you can see how JSF works in practice.    ### The simplef Application    You
    should start by copying into Tomcat’s `webapps` the folder named `simplef` you
    will find in the software package for this chapter. You can try it out by typing
    [`http://localhost:8080/simplef/`](http://localhost:8080/simplef/) in your web
    browser. [Figure 7-1](#Chapter07.html#fig_7_1) is an example of what you’ll see.  ![Image](images/9781430246237_Fig07-01.jpg)  ***Figure
    7-1.** The first page of simplef*    As you can see, there isn’t much to it. If
    you type, say, “qwerty,” and click `Submit`, you will see the page shown in [Figure
    7-2](#Chapter07.html#fig_7_2).  ![Image](images/9781430246237_Fig07-02.jpg)  ***Figure
    7-2.** The second page of simplef*    Apart from the URL, which is not what you
    might expect, everything is pretty boring. If you click on `Another`, you go back
    to the first page, as shown in [Figure 7-3](#Chapter07.html#fig_7_3).  ![Image](images/9781430246237_Fig07-03.jpg)  ***Figure
    7-3.** Back to the first page of simplef*    Again, nothing to get excited about.
    But notice that the string you typed in the first page appeared in the second
    one and again in the first one as the default for the input field. What is exciting
    in this example is how easily this was accomplished with JSF. [Listings 7-1](#Chapter07.html#list_7_1)
    and [7-2](#Chapter07.html#list_7_2) show the two JSP pages of the example.    ***Listing
    7-1.** first.jsp*  `<%@taglib uri="http://java.sun.com/jsf/html" prefix="h"%>`
    `<%@taglib uri="http://java.sun.com/jsf/core" prefix="f"%>` `<html><head><title>First
    Page</title></head><body>` `<f:view>` `  <h:form>` `    <h:outputText value="Type
    something here: "/>` `    <h:inputText value="#{aStringBean.str}" />` `    <h:commandButton
    action="goOn" value="Submit" />` `    </h:form>` `  </f:view>` `</body></html>`  ***Listing
    7-2.** second.jsp*  `<%@taglib uri="http://java.sun.com/jsf/html" prefix="h"%>`
    `<%@taglib uri="http://java.sun.com/jsf/core" prefix="f"%>` `<html><head><title>Second
    page</title></head><body>` `<f:view>` `  <h:form>` `    <h:outputText value="&quot;#{aStringBean.str}&quot;
    "/>` `    <h:commandButton action="goBack" value="Another" />` `    </h:form>`
    `</f:view>` `</body></html>`  The first two lines of both JSP pages load two of
    the JSF libraries I mentioned at the beginning of the chapter. The two libraries,
    `core` and `html`, contain all custom-tag definitions that implement JSF.    The
    first JSF element you encounter in both pages is `f:view`, which is a container
    for all JSF actions. The next one is `h:form`, the JSF element that generates
    the pair `<form>`..`</form>` of HTML tags. The three JSF elements `h:outputText`,
    `h:inputText`, and `h:commandButton` generate respectively the three HTML elements
    `<span>`..`</span>`, `<input type="text"`..`/>`, and `<input type="submit"`..`/>`.
    If you had used `h:commandLink` instead of `h:commandButton`, JSF would have generated
    a hyperlink with the HTML-tag `a` and the attribute `href` instead of a `submit`
    button.    Notice that the `value` attributes of `h:inputText` in `first.jsp`
    and `h:outputText` in `second.jsp` contain the EL expression `#{aStringBean.str}`.
    This is the first time you encounter a practical example of an EL expression representing
    an lvalue (see the Expression Language section in [Chapter 4](#Chapter04.html)).    The
    expression `${aStringBean.str}` (for the record: illegal in this case) would have
    been evaluated by Tomcat immediately. Tomcat would have replaced it with the value
    obtained by executing the method `aStringBean.getStr()`.    But, with the `#`
    replacing the `$`, the only thing that happens is that JSF assigns an identifier
    to the attribute `str` of the object `aStringBean`.    [Listing 7-3](#Chapter07.html#list_7_3)
    shows the HTML page that `first.jsp` generates (reformatted by me for easy reading).    ***Listing
    7-3.** HTML generated by first.jsp*  `<html><head><title>First Page</title></head><body>`
    `<form id="id_1" name="id_1" method="post"` `    action="/simplef/first.jsf;jsessionid=E48B69EEB4C81EB74C85C1ABCFBB8AE0"`
    `    enctype="application/x-www-form-urlencoded"` `    >` `<input type="hidden"
    name="id_1" value="id_1"/>` **`Type something here: <input type="text" name="id_1:id_3"/>`**
    **`<input type="submit" name="id_1:id_4" value="Submit"/>`** `<input type="hidden"
    name="javax.faces.ViewState" id="javax.faces.ViewState"` `    value="5073854143807380359:-1196606070653851981"
    autocomplete="off"` `    />` `</form>` `</body></html>`  Whenever you see `id`,
    the generated code actually contained `j_id_jsp_58993504`, but I did a global
    replace with `id` because I found the long automatically generated strings somewhat
    distracting.    The two lines in bold are the result of the three JSF elements
    `h:outputText`, `h:inputText`, and `h:commandButton`.    JSF assigned to `#{aStringBean.str}`
    the identifier `j_id_jsp_58993504_1:j_id_jsp_58993504_3`. When processing on the
    server the request your browser sends when you click on `Submit`, JSF will assign
    the value you have typed (e.g., the string `"qwerty"`) to the `str` attribute
    of the object `aStringBean`. This is the delayed evaluation I mentioned in [Chapter
    4](#Chapter04.html). By saving the string in this way, JSF will have it available
    for the `value` of `h:outputText` in `second.jsp` and as the default value for
    `h:inputText` in `first.jsp` when it will need to render that page again.    To
    continue the explanation of how JSF works, I would like to direct your attention
    to the fact that the URLs that appear in the browser do not match the names of
    the JSP pages. For example, you start the application by typing in your browser
    [`http://localhost:8080/simplef/`](http://localhost:8080/simplef/). What trick
    then takes you to `first.jsp`? If you open the default JSP page `index.jsp` that
    you find inside the `simplef` folder, you will see the one-liner shown in [Listing
    7-4](#Chapter07.html#list_7_4).    ***Listing 7-4.** index.jsp*  `<html><body><jsp:forward
    page="/first.jsf"/></body></html>`  But in the same folder there is no file named
    `first.jsf`! To begin understanding what happens, you have to look at the `web.xml`
    file (see [Listing 7.5](#Chapter07.html#list_7_5)).    ***Listing 7-5.** web.xml*  `<?xml
    version="1.0" encoding="UTF-8"?>` `<web-app version="2.5"`  `  xsi:schemaLocation="http://java.sun.com/xml/ns/javaee
    http://java.sun.com/xml/ns/javaee/web-` `app_2_5.xsd">` `<servlet>` `  <servlet-name>Faces
    Servlet</servlet-name>` `  <servlet-class>javax.faces.webapp.FacesServlet</servlet-class>`
    `  <load-on-startup>1</load-on-startup>` `  </servlet>` `<servlet-mapping>` `  <servlet-name>Faces
    Servlet</servlet-name>` `  <url-pattern>*.jsf</url-pattern>` `  </servlet-mapping>`
    `</web-app>`  It defines a servlet of type `javax.faces.webapp.FacesServlet`.
    It is the JSF servlet, which I have informally called “JSF”. It is that servlet
    that assigns IDs to attributes and transfers data between pages. `web.xml` also
    maps the extension `jsf` to the servlet, thereby forcing all requests for pages
    with extension `jsf` to be sent to it.    This reveals part of the mystery: when
    you type [`http://localhost:8080/simplef/`](http://localhost:8080/simplef/) in
    your browser, Tomcat executes `index.jsp`, which forwards the request to `first.jsf`
    (which actually doesn’t exist). But, because of the servlet mapping in `web.xml`,
    Tomcat diverts your request to the JSF servlet.    The rest of the mystery is
    easily explained: JSF replaces the extension `jsf` with `jsp`, which means that
    the request can finally reach `first.jsp`. The extension `jsp` is the default,
    but you can replace it by inserting in the `web-app` element of `web.xml` an element
    like that shown in [Listing 7-6](#Chapter07.html#list_7_6).    ***Listing 7-6.**
    Defining the JSF default suffix in web.xml*  `<context-param>` `  <param-name>javax.faces.DEFAULT_SUFFIX</param-name>`
    `  <param-value>.jspx</param-value>` `  </context-param>`  The next mystery that
    we have to solve is how the request generated by the form in `first.jsp` reaches
    `second.jsp`. In other words, how does the action `"goOn"` cause a request to
    reach `second.jsp`?    To solve this second mystery, you have to look at another
    file you find in `WEB-INF`: `faces-config.xml` (see [Listing 7-7](#Chapter07.html#list_7_7)).    ***Listing
    7-7.** faces-config.xml*  `<?xml version="1.0" encoding="UTF-8"?>` `<faces-config`   `    xsi:schemaLocation="http://java.sun.com/xml/ns/javaee
    ~CCC` `http://java.sun.com/xml/ns/javaee/web-facesconfig_2_0.xsd"` `    version="2.0"`
    `    >` `  <managed-bean>` `    <managed-bean-name>aStringBean</managed-bean-name>`
    `    <managed-bean-class>AString</managed-bean-class>` `    <managed-bean-scope>session</managed-bean-scope>`
    `    <managed-property>` `      <property-name>str</property-name>` `      <property-class>java.lang.String</property-class>`
    `      <null-value></null-value>` `      </managed-property>` `    </managed-bean>`
    **`  <navigation-rule>`** **`    <from-view-id>/first.jsp</from-view-id>`** **`    <navigation-case>`**
    **`      <from-outcome>goOn</from-outcome>`** **`      <to-view-id>/second.jsp</to-view-id>`**
    **`      </navigation-case>`** **`    </navigation-rule>`** `  <navigation-rule>`
    `    <from-view-id>/second.jsp</from-view-id>` `    <navigation-case>` `      <from-outcome>goBack</from-outcome>`
    `      <to-view-id>/first.jsp</to-view-id>` `      </navigation-case>` `    </navigation-rule>`
    `  </faces-config>`  Concentrate for the time being on the part I have highlighted.
    It tells JSF that, when the page `first.jsp` ends with outcome `goOn` (i.e., executes
    `h:commandButton` with action `goOn`), control should go to `second.jsp`. In a
    more complex application, `first.jsp` would include different actions, which would
    correspond to different `navigation-case` elements. Then, the JSF servlet would
    have a function analogous to that of a Java switch statement.    We are almost
    there. The next thing that needs some explanation is the `managed-bean` element
    that you see in `faces-config.xml` immediately above the first navigation rule.
    It tells JSF to manage a session-scoped object named `aStringBean` of type `AString`,
    and to manage its attribute named `str`, which should be initialized to `null`.
    This also means that the JSF servlet will instantiate the object automatically.    This
    is where the name `aStringBean` you saw in the EL expressions of both `first.jsp`
    and `second.jsp` comes from. I could have chosen any name, but it is good practice
    to end the names of such managed beans with `Bean`.    Also, the default scope
    is `request`. But by specifying `session`, I ensured that the `aStringBean` is
    not destroyed after the first request. In the example, it would have meant that
    the input element in the second execution of `first.jsp` would have been without
    default. The `request` scope would have been sufficient to “remember” the default
    if `first.jsp` had executed itself instead of `second.jsp`. Note that you should
    be careful not to go overboard with storing information in the session, because
    you could affect the performance of your application. Remember that every new
    user causes a new session to be created.    The last piece that you need in order
    to complete the resolution of the JSF puzzle is the definition of the class `AString`.
    For this see [Listing 7-8](#Chapter07.html#list_7_8).    ***Listing 7-8.** AString.java*  `import
    java.io.Serializable;` `public class AString implements Serializable {` `  String
    str;` `  public String getStr() { return str; }` `  public void setStr(String
    s) { str = s; }` `  }`  For `simplef` to work, `AString.class` should be in the
    `classes` sub-directory of `WEB-INF`.    `AString` is the simplest possible bean
    that you need for JSF. Actually, you could drop the `import` statement and remove
    the implementation of `Serializable`. They are there because it makes possible
    for Tomcat to save the object to disk and to retrieve it from disk. The server
    possibly uses a hard disk to park session data when it is under a heavy load or
    when it is restarted. This is one more reason for keeping the session’s size as
    contained as possible. Note that Tomcat can only save objects that it is able
    to convert to output streams of data, and that requires the objects to be serializable.    The
    bottom line is that, to be completely safe, your managed beans should be serializable
    when defined to be in the `session` scope. But you don’t absolutely need to do
    it. It means that under heavy load conditions, some sessions might be abruptly
    terminated.    ![Image](images/square.jpg) **Tip** You will find that sometimes,
    if you make a mistake when developing a JSF application that causes it to fail,
    the application will not work again when you revert back to the version you had
    before making a mistake. It has to do with caching. In a development environment,
    the simplest way to fix it is to restart your browser and Tomcat.    #### An Alternative
    to <managed-bean>    Java annotations are a way of providing information about
    classes or objects. You saw an example of an annotation in [Chapter 6](#Chapter06.html)
    (see [Listing 6.17](#Chapter06.html#list_6_17)), where I used `@SuppressWarnings`
    `("unchecked")` to tell the Java compiler how to behave when processing the statement
    that followed.    JSF supports annotations that you can use in a Java bean to
    replace the `<managed-bean>` element of `faces-config.xml`. In other words, if
    you use an annotated version of `AString.java` as shown in [Listing 7-9](#Chapter07.html#list_7_9),
    you can completely remove the `<managed-bean>` element from the `faces-config.xml`
    shown in [Listing 7-7](#Chapter07.html#list_7_7).    ***Listing 7-9.** AString.java
    (annotated)*  `import javax.faces.bean.ManagedBean;` `import javax.faces.bean.SessionScoped;`
    `import javax.faces.bean.ManagedProperty;` `@ManagedBean(name="aStringBean")`
    `@SessionScoped` `public class AString {` `  @ManagedProperty(value="#{AString.str}")`
    `  String str;` `  public String getStr() { return str; }` `  public void setStr(String
    s) { str = s; }` `  }`  I think it is pretty self-explanatory. If you remove the
    parenthesized assignment following `@ManagedBean`, in JSP you have to use as bean-object
    name the class name with its first letter changed from uppercase to lowercase.    For
    simplicity, I have included in the software package for this chapter a separate
    folder with the annotated version of `simplef`. You will find in there the WAR
    file, which you can easily import into Eclipse or drop into Tomcat’s `webapps`
    folder, and an already expanded folder (which you can also drop into `webapps`).    ###
    The simplefx and simpleh Applications    In the previous section, I showed you
    how to build a simple JSF application with JSP pages. To use JSF with JSP documents
    (i.e., in XML format), you only have to make minimal changes. To convert `first.jsp`
    ([Listing 7.1](#Chapter07.html#list_7_1)) to `first.jspx`, you only need to make
    the standard changes described in the last section of [Chapter 5](#Chapter05.html)
    and replace the two JSF `taglib` actions with the corresponding namespace declarations,
    as shown in [Listing 7-10](#Chapter07.html#list_7_10).    ***Listing 7-10.** first.jspx*  `<?xml
    version="1.0" encoding="UTF-8"?>` `<jsp:root`    `  version="2.1"` `  >` `<jsp:directive.page`
    `  language="java"` `  contentType="application/xhtml+xml;charset=UTF-8"` `  />`
    `<jsp:output omit-xml-declaration="false"/>` `<jsp:output` `  doctype-root-element="html"`
    `  doctype-public="-//W3C//DTD XHTML 1.0 Strict//EN"` `  doctype-system="http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd"`
    `  />` `<html >` `<head><title>First Page</title></head>` `<body>` `<f:view>`
    `  <h:form>` `    <h:outputText value="Type something here: "/>` `    <h:inputText
    value="#{aStringBean.str}"/>` `    <h:commandButton action="goOn" value="Submit"/>`
    `    </h:form>` `  </f:view>` `</body>` `</html>` `</jsp:root>`  After converting
    `second.jsp` to `second.jspx` in the same way, you also need to insert into `web.xml`
    the `context-param` element shown in [Listing 7-6](#Chapter07.html#list_7_6),
    otherwise JSF will keep looking for files with extension `jsp`. Finally, to complete
    the conversion to XML you will need to make a global replace from `jsp` to `jspx`
    in `faces-config.xml`, so that the navigation rules will keep working. You will
    find all the updated sources in the folder `simplefx` as part of the software
    package for this chapter.    Notice that we didn’t need to do any conversion inside
    the `body` elements of the JSP pages. This is because there were no scripting
    elements to convert. With JSTL, JSF, and other custom actions that you acquire
    or develop yourself, you can write JSP in XML format without much effort.    There
    is another reason for switching from JSP pages to JSP documents: it will unlock
    for you pieces of JSF 2.0 functionality that otherwise you wouldn’t be able to
    use. One example is *implicit navigation*.    You saw that in `faces-config.xml`
    you need to specify to which document you want the control to move when you request
    a particular action from within a particular document. The navigation elements
    for the `simplexf` applications are those shown in [Listing 7-11](#Chapter07.html#list_7_11).    ***Listing
    7-11.** Navigation Rules for simplexf*  `<navigation-rule>` `  <from-view-id>/first.jspx</from-view-id>`
    `  <navigation-case>` `    <from-outcome>goOn</from-outcome>` `    <to-view-id>/second.jspx</to-view-id>`
    `    </navigation-case>` `  </navigation-rule>` `  <navigation-rule>` `  <from-view-id>/second.jspx</from-view-id>`
    `  <navigation-case>` `    <from-outcome>goBack</from-outcome>` `    <to-view-id>/first.jspx</to-view-id>`
    `    </navigation-case>` `  </navigation-rule>`  In particular, the first navigation
    rule tells JSF that when it executes the element `<h:commandButton action="goOn"
    value="Submit"/>` in `first.jspx`, it should transfer control to `second.jspx`
    (which JSF renames `second.jsf` so that a subsequent request from the user goes
    back to the JSF servlet).    From release 2.0 of 2009, JSF lets you navigate without
    defining navigation rules in `faces-config.xml`, provided that:    > *   the action’s
    value (i.e., what you write in the `from-outcome` element of `faces-config.xml`)
    is identical to the name of the destination document (without its extension and
    the dot), and > *   the extension of the destination document is `xhtml`.    Pity
    that the JSF Expert Group didn’t provide the choice of other extensions. Isn’t
    it? But you don’t need to worry, because JSP documents don’t need the extension
    `jspx`!    In the software package for this chapter, you will find yet another
    version of what originally was the `simplef` application. I named it `simpleh`.
    The only differences from the previous version (`simplefx`) are:    > *   `first.jspx`
    has become `first.xhtml` > *   `second.jspx` has become `second.xhtml` > *   In
    first.xhtml, the action `"goOn"` has become `"second"` > *   In second.xhtml,
    the action `"goBack"` has become `"first"` > *   In `web.xml`, the element `context-param`
    is no longer there, because the extensions `jspx` have gone > *   The file `faces-config.xml`
    has disappeared, because it no longer serves any purpose.    XHTML pages used
    to develop JSF applications are called *facelets*. Giving the `xhtml` extension
    to JSP documents is only a way of generating the XHTML pages with JSP rather than
    coding them by hand.    ![Image](images/square.jpg) **Note** If somebody tells
    you that JSP is out and facelets are in, tell them that things are not as black-and-white
    as they think! But please be careful when mixing JSF and JSP/JSTL, because it
    can be confusing. Also, before implementing complex pieces of code with JSP, you
    might like to investigate whether you can do it more simply with JSF.    ### The
    JSF Life Cycle    Now that you have seen an example of JSF, let’s have a closer
    look at how JSF does its job. For that, refer to [Figure 7-4](#Chapter07.html#fig_7_4).
    Note that the figure only shows what JSF does when the user types valid values
    into the input fields of the page that sends the request. Read on for more details.  ![Image](images/9781430246237_Fig07-04.jpg)  ***Figure
    7-4.** The JSF life cycle*    > 1.  **Restore View**: The JSF servlet builds the
    view of the requested page as a component tree that contains the information associated
    with all components of the page. If the page is requested for the first time,
    JSF creates an empty view, wires event handlers and validators (if any) to its
    components, and saves it in a `FacesContext` object, before jumping directly to
    Render Response. By saving the view, JSF makes it possible to repopulate the page
    if necessary—for example, when the user doesn’t fill out a form as required. If
    the same page was displayed before and component states were saved, JSF uses that
    information to restore the page to its current state. > 2.  **Apply Request Values**:
    JSF goes through the component tree and executes each component’s `decode` method,
    which extracts values from the request parameters, or possibly from cookies or
    headers. It also automatically converts the parameters that are associated with
    object properties of nonstring types. Conversion errors cause error messages to
    be queued to the `FacesContext` object. In some cases, typically when the user
    clicks on controls, the servlet also generates request events and queues them
    to `FacesContext`. For components that have the `immediate` event-handling property
    set to `true`, JSF also validates them and saves them in their component instances
    within `FacesContext`. > 3.  **Process Validation**: The servlet invokes the `validate`
    methods for all components of the validators that had been registered during Restore
    View. The validation rules are those you define or, by default, those predefined
    by JSF. For each `validate` method that returns `false`, the servlet marks the
    component as invalid and queues an error message to the `FacesContext`. At the
    end of this phase, if there are validation errors, JSF jumps directly to Render
    Response, so that error messages can be displayed to the user. > 4.  **Update
    Model Values**: During this phase, the values of the components are copied to
    the corresponding properties of the managed beans that are wired to them. JSF
    does it by executing the component method `updateModel`, which also performs type
    conversions when necessary. Conversion errors cause error messages to be queued
    to `FacesContext`. > 5.  **Invoke Application**: During this phase, the servlet
    processes the application-level events by executing the corresponding handlers.
    When the user submits a form or clicks on a link of a JSF application, the JSF
    servlet generates a corresponding application-level event. One of the tasks you
    have to do when developing a JSF application is to assign a handler to each one
    of the possible application events. This is where you also specify what should
    happen next, by returning outcomes that you have linked to possible next pages,
    either with a navigation case or implicitly, as I showed you in the previous section.
    > 6.  **Render Response**: The servlet creates a response component tree and delegates
    the rendering of the page to Tomcat. Each component renders itself as Tomcat goes
    through the corresponding JSF tags. At the end of this phase, the state of the
    response is saved so that the servlet can access it during the Restore View phase
    of subsequent requests to the same page.    #### Event Handling    Before looking
    at an application, I need to spend a few words on the JSF mechanism to handle
    events, because you cannot really understand how JSF works unless you know a thing
    or two about event handling.    As an example, let’s see what role the event handling
    plays when a user clicks on a `Submit` button. The JSF UI components used to represent
    button HTML elements are objects of type `javax.faces.component.html.HtmlCommandButton`,
    which is a class extending the more general `javax.faces.component.UICommand`.
    As with any other HTML page, by clicking on the `Submit` button in a JSF application,
    the user triggers the sending to the server of an HTTP request that contains the
    ID of the button as a parameter name.    As I’ve already mentioned, during the
    Apply Request Values phase, JSF executes the `decode` method of each component
    of the page. First, the `decode` method scans the parameter names to see whether
    one matches the ID of the component the method belongs to. In our example, the
    `decode` method of the `UICommand` object associated with the button clicked by
    the user finds the component ID among the request parameters, precisely because
    the user clicked the button. As a result of finding its own ID, the component
    instantiates an event object of type `javax.faces.event.ActionEvent` and queues
    it up.    At this point, you have to distinguish between situations in which all
    the input fields of a form need to be validated and those in which only a partial
    validation is appropriate. For example, in an online shop such as the `eshop`
    application, the shopper must be able to add further books to the shopping cart
    even after reaching the checkout page, where the shopper is asked to provide payment
    information. To make that possible, you must ensure that the validation of the
    payment data is skipped if the user selects a book category or searches for new
    titles. If you allowed the validation of empty or partially filled payment fields
    to proceed, the application would report one or more errors and prevent the shopper
    from going back to look for new books.    You solve this issue by specifying that
    the handling of both the book search and the category selection be done during
    Apply Request Values, while leaving the handling of the payment data to follow
    the normal life cycle. If it turns out that the user wants to shop for new books
    rather than complete the checkout, control then jumps directly to the Render Response
    phase, thereby skipping the intermediate phases where payment data would have
    been validated and processed.    In the next chapter, you will see in detail how
    this is done in the JSF version of `eshop`.    ### The JSF Tag Libraries    The
    first two sections of this chapter showed you examples of simple JSF applications
    that used a handful of elements: `f:view`, `h:form`, `h:outputText`, `h:inputText`,
    and `h:commandButton`. You will recall that the prefix `h` was associated with
    the HTML component library, and the prefix `f` with the JSF core library. Besides
    those two libraries, JSF 2 consists of two additional custom-tag libraries: `facelets`,
    normally associated with the prefix `ui`, and `composite`, with prefix `composite`.    In
    the rest of this chapter, I will briefly describe the four libraries and show
    you more examples. In the next chapter, I will describe how to use more of the
    tags by referring to a JSF-version of the `eshop` application.    You can find
    a complete list of tags with associated documentation at [`http://java.sun.com/javaee/javaserverfaces/reference/api/`](http://java.sun.com/javaee/javaserverfaces/reference/api/).    ####
    The `html` Library    As its name suggests, JSF’s HTML library collects the tags
    associated with rendering HTML components. As you have already seen in the examples
    (e.g., with `h:inputText`), you associate objects of your data model to the corresponding
    components by assigning value expressions that refer to the objects to specific
    attributes of the component tags (e.g., `<h:inputText value="#{aStringBean.str}"/>`).    Although
    in most cases the names of the tags should already tell you their purpose, I have
    summarized the correspondence between tags and HTML elements in [Table 7-1](#Chapter07.html#tab_7_1).    ![Image](images/9781430246237_Tab07-01.jpg)    ![Image](images/9781430246237_Tab07-01a.jpg)    ![Image](images/square.jpg)
