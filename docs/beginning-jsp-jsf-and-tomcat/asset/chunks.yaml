- fmt: "Notice that `TopMenu.jsp` uses styles (such as `class=\"header\"`) that aren’t\
    \ loaded or defined within the same file. If you’re wondering how that’s possible,\
    \ you probably don’t clearly understand the distinction between source JSP and\
    \ output HTML. The JSP code in `TopMenu.jsp` is executed on the server, and it\
    \ produces HTML code, which is then appended to the output buffer. JSP *doesn’t\
    \ need* style sheets. It is the generated HTML that needs them when it’s interpreted\
    \ by the client’s browser.\n\nYou might think that `<jsp:include page=\"...\"\
    />` is the same as `<%@include file=\"...\"%>`, but this is definitely not the\
    \ case. The most important difference is that while the `include` directive includes\
    \ the content of a file without any processing, the `include` action includes\
    \ the *output* of the included resource. If the resource is a JSP page, this makes\
    \ a big difference. In practical terms, this also explains why JSP pages to be\
    \ included with `jsp:include` must be well-formed and complete pages rather than\
    \ simply JSP fragments.\n\nTo illustrate a subtle consequence of the different\
    \ mechanisms of inclusion, I have prepared a small test page (see [Listing 4-3](#Chapter04.html#list_4_3)).\
    \ To try it out, copy to the usual test folder (`webapps\\ROOT\\tests\\`) the\
    \ folder named `jsp_includes` that you will find in the software package for this\
    \ chapter, and then type `localhost:8080/tests/jsp_includes/includes.jsp` in a\
    \ web browser.\n\n***Listing 4-3.** includes.jsp*\n\n```\n<%@page language=\"\
    java\" contentType=\"text/html\"%>\n<html><head><title>A</title></head><body>\n\
    <table border=\"1\">\n  <tr><th>incl B</th><th>incl C</th><th>C contains</th></tr>\n\
    \  <tr><td>jsp:include</td><td>jsp:include</td><td><jsp:include page=\"d/b_act.jsp\"\
    /></td></tr>\n  <tr><td>jsp:include</td><td>@include</td><td><jsp:include page=\"\
    d/b_dir.jsp\"/></td></tr>\n  <tr><td>@include</td><td>jsp:include</td><td><%@include\
    \ file=\"d/b_act.jsp\"%></td></tr>\n  <tr><td>@include</td><td>@include</td><td><%@include\
    \ file=\"d/b_dir.jsp\"%></td></tr>\n  </table>\n</body></html>\n```\n\nAs you\
    \ can see, I first included the `d/b_act.jsp` and `d/b_dir.jsp` files with an\
    \ `include` action and then with an `include` directive. The two files contain\
    \ these lines, respectively:\n\n```\n<%@page language=\"java\" contentType=\"\
    text/html\"%><jsp:include page=\"c.txt\"/>\n<%@page language=\"java\" contentType=\"\
    text/html\"%><%@include file=\"c.txt\"%>\n```\n\nI placed a `c.txt` file (only\
    \ containing the letter A) in the directory of `includes.jsp` and a second `c.txt`\
    \ file (only containing the letter B) in the `d` directory. [Figure 4-1](#Chapter04.html#fig_4_1)\
    \ shows the result of running `includes.jsp`.\n\n![Image](images/9781430246237_Fig04-01.jpg)\n\
    \n***Figure 4-1.** The output of includes.jsp*\n\nAs you can see, `includes.jsp`\
    \ displays the letter B in all cases except when you implement the outer inclusion\
    \ with the directive and the inner inclusion with the action. This means that\
    \ only with that particular combination of file inclusions, `includes.jsp` accesses\
    \ the `c.txt` file that is in the same directory. In the other three cases, `includes.jsp`\
    \ accesses the `c.txt` file that is in the `d` directory, together with `b_act.jsp`\
    \ and `b_dir.jsp`. To understand these results, you have to know that when Tomcat\
    \ translates a JSP page into a Java class, it replaces `<jsp:include page=\"fname\"\
    />` with an execution of the method `org.apache.jasper.runtime.JspRuntimeLibrary.include(request,\
    \ response, \"fname\", out, false)`, while `<%@include file=\"fname\"%>` results\
    \ in the copying of the *content* of the `fname` file. Therefore, in the third\
    \ case of the example, the `<jsp:include page=\"c.txt\"/>` inside `b_act.jsp`\
    \ is replaced with an `include(request, response, \"c.txt\", out, false)`, and\
    \ then the whole `b_act.jsp` is copied into `includes.jsp`. That’s why the servlet\
    \ picks up the file in the directory of `includes.jsp`. The fact that `b_act.jsp`\
    \ was in a different directory was lost when its `include` directive was replaced\
    \ by the file content.\n\nI decided to spend a bit of time on this issue because\
    \ the inclusion mechanism is often misunderstood and causes many people to knock\
    \ their heads against the wall when files seem to disappear.\n\n### Action: useBean\n\
    \nThe `useBean` action declares a new JSP scripting variable and associates a\
    \ Java object to it. For example, the following code declares the variable `dataManager`\
    \ of type `eshop.model.DataManager`:\n\n```\n<jsp:useBean id=\"dataManager\" scope=\"\
    application\" class=\"eshop.model.DataManager\"/>\n```\n\nThis is the same data\
    \ manager instantiated and configured in `ShopServlet.java` as you saw in [Chapter\
    \ 3](#Chapter03.html) ([Listing 3-9](#Chapter03.html#list_3_9)). JSP uses this\
    \ variable to access the data without having to worry about its location and implementation.\
    \ Within `eshop`, this is the only way for JSP (the View) to interact with the\
    \ data manager (the Model). For example, when a user selects a book and clicks\
    \ on the link to add it to the shopping cart, the controller servlet executes\
    \ `ShoppingCart.jsp` with an argument set to the book identifier. Then, `ShoppingCart.jsp`\
    \ executes a method of the data manager (`see` [Table 3-1](#Chapter03.html#tab_3_1))\
    \ to obtain the book details, which are actually stored in a MySQL database:\n\
    \n```\nBook book = dataManager.getBookDetails(bookId);\n```\n\nThe result is stored\
    \ in an object of type `book`, from which JSP can obtain individual book attributes\
    \ by executing simple `get` methods such as `book.getTitle()` and `book.getAuthor()`.\n\
    \n`jsp:useBean` accepts the attributes `beanName`, `class`, `id`, `scope`, and\
    \ `type`, of which only `id` is mandatory.\n\nIf you type `<jsp:useBean id=\"\
    objName\"/>`, Tomcat will check whether an object named `objName` exists in `pageContext`.\
    \ If it exists, Tomcat will create a variable named `objName` of the same type\
    \ as the object, so that you can access the object in subsequent JSP scripting\
    \ elements. If the object doesn’t exist, Tomcat will throw a `java.lang.InstantiationException`.\n\
    \nIf you type `<jsp:useBean id=\"objName\" scope=\"`*`aScope`*`\"/>` with *`aScope`*\
    \ set to one of the words `page`, `request`, `session`, or `application`, Tomcat\
    \ will behave as described in the previous paragraph, but it will look for the\
    \ `objName` object in the given scope rather than in the page context. In other\
    \ words, `page` is the default scope.\n\nAlso `jsp:useBean` can create new objects.\
    \ Whether `useBean` does it and what type of variable it makes available for JSP\
    \ scripting depends on the three remaining attributes: `class`, `type`, and `beanName`.\n\
    \n![Image](images/square.jpg) **Caution** The use of `jsp:useBean` is not for\
    \ the faint hearted!\n\nIf you specify `class` and set it to a fully qualified\
    \ class name (i.e., with its package, as in `java.lang.String`) but specify neither\
    \ `type` nor `beanName`, Tomcat will instantiate an object of the given class\
    \ in the scope you specify with the attribute `scope` (or in the `page` scope\
    \ by default).\n\nIf together with `class` you also specify `type`, Tomcat will\
    \ set the data type of the new object to the value of the `type` attribute. You\
    \ can set the `type` attribute to the same class as the `class` attribute (which\
    \ is equivalent to omitting `type`), to a superclass of `class`, or to an interface\
    \ implemented by `class`."
  raw: 'Notice that `TopMenu.jsp` uses styles (such as `class="header"`) that aren’t
    loaded or defined within the same file. If you’re wondering how that’s possible,
    you probably don’t clearly understand the distinction between source JSP and output
    HTML. The JSP code in `TopMenu.jsp` is executed on the server, and it produces
    HTML code, which is then appended to the output buffer. JSP *doesn’t need* style
    sheets. It is the generated HTML that needs them when it’s interpreted by the
    client’s browser.


    You might think that `<jsp:include page="..."/>` is the same as `<%@include file="..."%>`,
    but this is definitely not the case. The most important difference is that while
    the `include` directive includes the content of a file without any processing,
    the `include` action includes the *output* of the included resource. If the resource
    is a JSP page, this makes a big difference. In practical terms, this also explains
    why JSP pages to be included with `jsp:include` must be well-formed and complete
    pages rather than simply JSP fragments.


    To illustrate a subtle consequence of the different mechanisms of inclusion, I
    have prepared a small test page (see [Listing 4-3](#Chapter04.html#list_4_3)).
    To try it out, copy to the usual test folder (`webapps\ROOT\tests\`) the folder
    named `jsp_includes` that you will find in the software package for this chapter,
    and then type `localhost:8080/tests/jsp_includes/includes.jsp` in a web browser.


    ***Listing 4-3.** includes.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<html><head><title>A</title></head><body>`

    `<table border="1">`

    `  <tr><th>incl B</th><th>incl C</th><th>C contains</th></tr>`

    `  <tr><td>jsp:include</td><td>jsp:include</td><td><jsp:include page="d/b_act.jsp"/></td></tr>`

    `  <tr><td>jsp:include</td><td>@include</td><td><jsp:include page="d/b_dir.jsp"/></td></tr>`

    `  <tr><td>@include</td><td>jsp:include</td><td><%@include file="d/b_act.jsp"%></td></tr>`

    `  <tr><td>@include</td><td>@include</td><td><%@include file="d/b_dir.jsp"%></td></tr>`

    `  </table>`

    `</body></html>`


    As you can see, I first included the `d/b_act.jsp` and `d/b_dir.jsp` files with
    an `include` action and then with an `include` directive. The two files contain
    these lines, respectively:


    `<%@page language="java" contentType="text/html"%><jsp:include page="c.txt"/>`

    `<%@page language="java" contentType="text/html"%><%@include file="c.txt"%>`


    I placed a `c.txt` file (only containing the letter A) in the directory of `includes.jsp`
    and a second `c.txt` file (only containing the letter B) in the `d` directory.
    [Figure 4-1](#Chapter04.html#fig_4_1) shows the result of running `includes.jsp`.


    ![Image](images/9781430246237_Fig04-01.jpg)


    ***Figure 4-1.** The output of includes.jsp*


    As you can see, `includes.jsp` displays the letter B in all cases except when
    you implement the outer inclusion with the directive and the inner inclusion with
    the action. This means that only with that particular combination of file inclusions,
    `includes.jsp` accesses the `c.txt` file that is in the same directory. In the
    other three cases, `includes.jsp` accesses the `c.txt` file that is in the `d`
    directory, together with `b_act.jsp` and `b_dir.jsp`. To understand these results,
    you have to know that when Tomcat translates a JSP page into a Java class, it
    replaces `<jsp:include page="fname"/>` with an execution of the method `org.apache.jasper.runtime.JspRuntimeLibrary.include(request,
    response, "fname", out, false)`, while `<%@include file="fname"%>` results in
    the copying of the *content* of the `fname` file. Therefore, in the third case
    of the example, the `<jsp:include page="c.txt"/>` inside `b_act.jsp` is replaced
    with an `include(request, response, "c.txt", out, false)`, and then the whole
    `b_act.jsp` is copied into `includes.jsp`. That’s why the servlet picks up the
    file in the directory of `includes.jsp`. The fact that `b_act.jsp` was in a different
    directory was lost when its `include` directive was replaced by the file content.


    I decided to spend a bit of time on this issue because the inclusion mechanism
    is often misunderstood and causes many people to knock their heads against the
    wall when files seem to disappear.


    #### Action: useBean


    The `useBean` action declares a new JSP scripting variable and associates a Java
    object to it. For example, the following code declares the variable `dataManager`
    of type `eshop.model.DataManager`:


    `<jsp:useBean id="dataManager" scope="application" class="eshop.model.DataManager"/>`


    This is the same data manager instantiated and configured in `ShopServlet.java`
    as you saw in [Chapter 3](#Chapter03.html) ([Listing 3-9](#Chapter03.html#list_3_9)).
    JSP uses this variable to access the data without having to worry about its location
    and implementation. Within `eshop`, this is the only way for JSP (the View) to
    interact with the data manager (the Model). For example, when a user selects a
    book and clicks on the link to add it to the shopping cart, the controller servlet
    executes `ShoppingCart.jsp` with an argument set to the book identifier. Then,
    `ShoppingCart.jsp` executes a method of the data manager (`see` [Table 3-1](#Chapter03.html#tab_3_1))
    to obtain the book details, which are actually stored in a MySQL database:


    `Book book = dataManager.getBookDetails(bookId);`


    The result is stored in an object of type `book`, from which JSP can obtain individual
    book attributes by executing simple `get` methods such as `book.getTitle()` and
    `book.getAuthor()`.


    `jsp:useBean` accepts the attributes `beanName`, `class`, `id`, `scope`, and `type`,
    of which only `id` is mandatory.


    If you type `<jsp:useBean id="objName"/>`, Tomcat will check whether an object
    named `objName` exists in `pageContext`. If it exists, Tomcat will create a variable
    named `objName` of the same type as the object, so that you can access the object
    in subsequent JSP scripting elements. If the object doesn’t exist, Tomcat will
    throw a `java.lang.InstantiationException`.


    If you type `<jsp:useBean id="objName" scope="`*`aScope`*`"/>` with *`aScope`*
    set to one of the words `page`, `request`, `session`, or `application`, Tomcat
    will behave as described in the previous paragraph, but it will look for the `objName`
    object in the given scope rather than in the page context. In other words, `page`
    is the default scope.


    `Also jsp:useBean` can create new objects. Whether `useBean` does it and what
    type of variable it makes available for JSP scripting depends on the three remaining
    attributes: `class`, `type`, and `beanName`.


    ![Image](images/square.jpg) **Caution** The use of `jsp:useBean` is not for the
    faint hearted!


    If you specify `class` and set it to a fully qualified class name (i.e., with
    its package, as in `java.lang.String`) but specify neither `type` nor `beanName`,
    Tomcat will instantiate an object of the given class in the scope you specify
    with the attribute `scope` (or in the `page` scope by default).


    If together with `class` you also specify `type`, Tomcat will set the data type
    of the new object to the value of the `type` attribute. You can set the `type`
    attribute to the same class as the `class` attribute (which is equivalent to omitting
    `type`), to a superclass of `class`, or to an interface implemented by `class`.'
  trans: '

    请注意，`TopMenu.jsp` 使用了未在同一文件中加载或定义的样式（例如 `class="header"`）。如果你对此感到疑惑，很可能是因为你尚未清晰理解源
    JSP 与输出 HTML 之间的区别。`TopMenu.jsp` 中的 JSP 代码在服务器端执行，生成 HTML 代码，然后将其追加到输出缓冲区。JSP
    *并不需要*样式表。需要样式表的是客户端浏览器在解释时生成的 HTML。


    你可能会认为 `<jsp:include page="..."/>` 与 `<%@include file="..."%>` 相同，但事实绝非如此。最重要的区别在于：`include`
    指令直接包含文件内容而不做任何处理，而 `include` 动作包含的是被包含资源的*输出*。如果该资源是一个 JSP 页面，这就会产生巨大差异。在实际应用中，这也解释了为什么通过
    `jsp:include` 包含的 JSP 页面必须是格式良好且完整的页面，而不仅仅是 JSP 片段。


    为了说明不同包含机制带来的微妙后果，我准备了一个小型测试页面（参见清单 4-3）。要尝试运行，请将本章软件包中的 `jsp_includes` 文件夹复制到常规测试文件夹（`webapps\ROOT\tests\`）中，然后在浏览器中输入
    `localhost:8080/tests/jsp_includes/includes.jsp`。


    ***清单 4-3.** includes.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<html><head><title>A</title></head><body>`

    `<table border="1">`

    `  <tr><th>包含 B</th><th>包含 C</th><th>C 包含的内容</th></tr>`

    `  <tr><td>jsp:include</td><td>jsp:include</td><td><jsp:include page="d/b_act.jsp"/></td></tr>`

    `  <tr><td>jsp:include</td><td>@include</td><td><jsp:include page="d/b_dir.jsp"/></td></tr>`

    `  <tr><td>@include</td><td>jsp:include</td><td><%@include file="d/b_act.jsp"%></td></tr>`

    `  <tr><td>@include</td><td>@include</td><td><%@include file="d/b_dir.jsp"%></td></tr>`

    `  </table>`

    `</body></html>`


    如你所见，我首先使用 `include` 动作包含了 `d/b_act.jsp` 和 `d/b_dir.jsp` 文件，然后使用 `include` 指令再次包含它们。这两个文件分别包含以下代码行：


    `<%@page language="java" contentType="text/html"%><jsp:include page="c.txt"/>`

    `<%@page language="java" contentType="text/html"%><%@include file="c.txt"%>`


    我在 `includes.jsp` 所在的目录中放置了一个 `c.txt` 文件（仅包含字母 A），并在 `d` 目录中放置了另一个 `c.txt` 文件（仅包含字母
    B）。图 4-1 显示了运行 `includes.jsp` 的结果。


    ![图片](img/9781430246237_Fig04-01.jpg)


    ***图 4-1.** includes.jsp 的输出*


    如你所见，除了使用指令进行外层包含、使用动作进行内层包含的情况外，`includes.jsp` 在其他所有情况下都显示字母 B。这意味着，只有在那种特定的文件包含组合下，`includes.jsp`
    才会访问同一目录下的 `c.txt` 文件。在其他三种情况下，`includes.jsp` 访问的是 `d` 目录中与 `b_act.jsp` 和 `b_dir.jsp`
    在一起的 `c.txt` 文件。要理解这些结果，你需要知道：当 Tomcat 将 JSP 页面翻译成 Java 类时，它会将 `<jsp:include page="fname"/>`
    替换为对方法 `org.apache.jasper.runtime.JspRuntimeLibrary.include(request, response,
    "fname", out, false)` 的执行，而 `<%@include file="fname"%>` 则会导致 `fname` 文件的*内容*被复制进来。因此，在示例的第三种情况中，`b_act.jsp`
    内部的 `<jsp:include page="c.txt"/>` 被替换为 `include(request, response, "c.txt", out,
    false)`，然后整个 `b_act.jsp` 被复制到 `includes.jsp` 中。这就是 Servlet 会选取 `includes.jsp`
    所在目录中文件的原因。当 `b_act.jsp` 的 `include` 指令被文件内容替换时，它原本位于不同目录这一事实就丢失了。


    我决定花点时间讨论这个问题，是因为包含机制经常被误解，导致许多人在文件似乎消失时撞得头破血流。


    #### 动作：useBean


    `useBean` 动作声明一个新的 JSP 脚本变量，并将一个 Java 对象与之关联。例如，以下代码声明了类型为 `eshop.model.DataManager`
    的变量 `dataManager`：


    `<jsp:useBean id="dataManager" scope="application" class="eshop.model.DataManager"/>`


    这与你在第 3 章（清单 3-9）中看到的在 `ShopServlet.java` 中实例化和配置的数据管理器是同一个。JSP 使用此变量来访问数据，而无需关心其位置和实现。在
    `eshop` 中，这是 JSP（视图）与数据管理器（模型）交互的唯一方式。例如，当用户选择一本书并点击链接将其添加到购物车时，控制器 Servlet 会以图书标识符为参数执行
    `ShoppingCart.jsp`。然后，`ShoppingCart.jsp` 执行数据管理器的一个方法（参见表 3-1）来获取实际存储在 MySQL 数据库中的图书详细信息：


    `Book book = dataManager.getBookDetails(bookId);`


    结果存储在一个 `book` 类型的对象中，JSP 可以通过执行简单的 `get` 方法（例如 `book.getTitle()` 和 `book.getAuthor()`）来获取单个图书属性。


    `jsp:useBean` 接受 `beanName`、`class`、`id`、`scope` 和 `type` 属性，其中只有 `id` 是必需的。


    如果你输入 `<jsp:useBean id="objName"/>`，Tomcat 将检查 `pageContext` 中是否存在名为 `objName`
    的对象。如果存在，Tomcat 将创建一个与对象类型相同的名为 `objName` 的变量，以便你可以在后续的 JSP 脚本元素中访问该对象。如果对象不存在，Tomcat
    将抛出 `java.lang.InstantiationException`。


    如果你输入 `<jsp:useBean id="objName" scope="`*`aScope`*`"/>`，并将 *`aScope`* 设置为 `page`、`request`、`session`
    或 `application` 之一，Tomcat 的行为将如前一段所述，但它会在给定的作用域中查找 `objName` 对象，而不是在页面上下文中。换句话说，`page`
    是默认作用域。


    `此外，jsp:useBean` 还可以创建新对象。`useBean` 是否创建对象以及它为 JSP 脚本提供什么类型的变量，取决于其余三个属性：`class`、`type`
    和 `beanName`。


    ![图片](img/square.jpg) **注意** 使用 `jsp:useBean` 并非易事！


    如果你指定了 `class` 并将其设置为一个完全限定的类名（即包含包名，如 `java.lang.String`），但未指定 `type` 和 `beanName`，Tomcat
    将在你通过 `scope` 属性指定的作用域（默认是 `page` 作用域）中实例化一个给定类的对象。


    如果你在指定 `class` 的同时还指定了 `type`，Tomcat 会将新对象的数据类型设置为 `type` 属性的值。你可以将 `type` 属性设置为与
    `class` 属性相同的类（这相当于省略 `type`），设置为 `class` 的超类，或者设置为 `class` 实现的接口。

