    08: <jsp:directive.page\n09:   language=\"java\"\n10:   contentType=\"application/xhtml+xml;charset=UTF-8\"\
    \n11:   />\n12: <jsp:output omit-xml-declaration=\"false\"/>\n13: <jsp:output\n\
    14:   doctype-root-element=\"html\"\n15:   doctype-public=\"-//W3C//DTD XHTML\
    \ 1.0 Strict//EN\"\n16:   doctype-system=\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
    \n17:   />\n18: <c:url var=\"cssUrl\" value=\"/css/eshop.jspx\"/>\n19: <html >\n\
    20: <head>\n21:   <title>Order</title>\n22:   <link rel=\"stylesheet\" href=\"\
    ${cssUrl}\" type=\"text/css\"/>\n23:   </head>\n24: <body>\n25: <jsp:include page=\"\
    TopMenu.jspx\" flush=\"true\"/>\n26: <jsp:include page=\"LeftMenu.jspx\" flush=\"\
    true\"/>\n27: <div class=\"content\">\n28:   <h2>Order</h2>\n29:   <jsp:useBean\
    \ id=\"customer\" class=\"eshop.beans.Customer\"/>\n30:   <jsp:setProperty property=\"\
    *\" name=\"customer\"/>\n**31:   <eshop:insertOrder var=\"orderID\" customer=\"\
    ${customer}\"/>**\n**32:   <c:choose>**\n**33:     <c:when test=\"${orderID >\
    \ 0}\">**\n**34:       <p class=\"info\">**\n**35:         Thank you for your\
    \ purchase.<br/>**\n**36:         Your Order Number is: <c:out value=\"${orderID}\"\
    />**\n**37:         </p>**\n**38:       </c:when>**\n**39:     <c:otherwise>**\n\
    **40:       <p class=\"error\">Unexpected error processing the order!</p>**\n\
    **41:       </c:otherwise>**\n**42:     </c:choose>**\n43:   </div>\n44: </body>\n\
    45: </html>\n46: </jsp:root>\n```\n\n让我们专注于突出显示的代码，其中完成了实际工作。在 JSP 页面（[清单 6-14](#Chapter06.html#list_6_14)）中，你通过执行数据管理器的方法（第\
    \ 19-22 行）将订单信息保存到数据库中，而在 JSP 文档（[清单 6-15](#Chapter06.html#list_6_15)）中，你通过执行自定义动作（第\
    \ 31 行）来完成。同一个自定义动作也使会话失效（这在 JSP 页面的第 24 行完成）。\n\nJSP 页面中第 23、31-32 和 34 行的 `if`/`else`\
    \ Java 结构在 JSP 文档中变成了第 32-33、38-39 和 41-42 行的 JSTL 核心结构 `choose`/`when`/`otherwise`。\n\
    \n通知用户订单接受情况是 HTML 代码，并且基本保持不变（JSP 第 26-29 行变为 JSPX 第 34-37 行）。事实上，你可以将 JSP 页面的脚本表达式替换为\
    \ JSP 文档的 EL 表达式，使代码完全相同。\n\n引入自定义动作 `insertOrder` 是必要的，因为脚本小程序（作为 Java 代码）可以进行赋值和执行方法，而\
    \ EL 表达式不能。因此，当你因为脚本小程序不是有效的 XML 代码而删除它们时，你必须将计算移到 Java bean 或自定义动作中。\n\n在 `OrderConfirmation.jspx`\
    \ 的第 5 行，你声明了 `eshop.tld`，其中包含 `insertOrder` 动作的定义（参见[清单 6-16](#Chapter06.html#list_6_16)）。\n\
    \n***清单 6-16.** eshop.tld 中的 InsertOrderTag 定义*\n\n```\n<tag>\n  <description>Insert\
    \ an order into storage</description>\n  <display-name>insertOrder</display-name>\n\
    \  <name>insertOrder</name>\n  <tag-class>eshop.tags.InsertOrderTag</tag-class>\n\
    \  <body-content>empty</body-content>\n  <attribute>\n    <name>var</name>\n \
    \   <required>true</required>\n    <rtexprvalue>true</rtexprvalue>\n    </attribute>\n\
    \  <attribute>\n    <name>customer</name>\n    <required>true</required>\n   \
    \ <rtexprvalue>true</rtexprvalue>\n    </attribute>\n  </tag>\n```\n\n如你所见，你向自定义动作传递了两个参数：要返回订单\
    \ ID 的变量名称，以及包含客户数据（姓名、地址和信用卡信息）的对象。你并不绝对需要第二个参数，因为动作代码可以按如下方式从页面上下文中检索客户数据：\n\
    \n```\n(Customer)pageContext.getAttribute(\"customer\")\n```\n\n另一方面，你也可以向动作传递第三个参数来引用购物车，但我决定让动作按如下方式从会话中检索它：\n\
    \n```\n(Hashtable)pageContext.getSession().getAttribute(\"shoppingCart\")\n```\n\
    \n什么构成更好的设计并不总是显而易见的。我觉得购物车作为一个会话属性，显然是在 JSP 文档之间共享的。因此，动作直接从会话中检索它是可以的。然而，客户数据是一个页面属性，通常不与其它模块共享。将它“在幕后”传递给一个\
    \ Java 类似乎不合适。[清单 6-17](#Chapter06.html#list_6_17) 向你展示了完整的动作代码。\n\n***清单 6-17.**\
    \ InsertOrderTag.java*\n\n```\npackage eshop.tags;\n\nimport java.util.Hashtable;\n\
    import javax.servlet.http.HttpSession;\nimport javax.servlet.jsp.tagext.TagSupport;\n\
    import javax.servlet.ServletContext;\n\nimport eshop.beans.CartItem;\nimport eshop.beans.Customer;\n\
    import eshop.model.DataManager;\n\npublic class InsertOrderTag extends TagSupport\
    \ {\n  static final long serialVersionUID = 1L;\n  private String var;\n  private\
    \ Customer customer;\n\n  public void setVar(String var) {\n    this.var = var;\n\
    \    }\n\n  public void setCustomer(Customer customer) {\n    this.customer =\
    \ customer;\n    }\n\n  public int doEndTag() {\n    ServletContext context =\
    \ pageContext.getServletContext();\n    DataManager dataManager =(DataManager)context.getAttribute(\"\
    dataManager\");\n    HttpSession session = pageContext.getSession();\n**    @SuppressWarnings(\"\
    unchecked\")**\n    Hashtable<String, CartItem> cart =\n        (Hashtable<String,\
    \ CartItem>)session.getAttribute(\"shoppingCart\");\n    long orderID = dataManager.insertOrder(customer,\
    \ cart);\n    if (orderID > 0L) session.invalidate();\n    pageContext.setAttribute(var,\
    \ new Long(orderID).toString());\n    return EVAL_PAGE;\n    }\n  }\n```\n\n请注意你如何从\
    \ `pageContext` 获取 servlet 上下文（对应于 JSP 隐式对象 `application`），并从它获取数据管理器，以便你可以执行你直接从\
    \ JSP 页面内部调用的同一个 `insertOrder` 方法。\n\n突出显示的行显示我抑制了一个警告。我这样做是因为 Eclipse 一直抱怨将泛型\
    \ `Object` 类型转换为 `Hashtable` 类型。通常，警告告诉你可能有问题。使用 `@suppressWarnings` 通常是一种不好的做法，并鼓励草率的编程风格。在这种特殊情况下，我别无选择，因为\
    \ Eclipse 的警告是没有道理的。\n\n### MySQL 的可能替代方案\n\n没有普遍的理由说明你不应该在应用程序中使用 MySQL。尽管如此，你确实有一些值得一提的替代方案。我只用\
    \ MySQL 测试过 E-shop，但我预计它与其他 DBMS 配合使用也会完全相同。\n\n如果你切换 DBMS，很可能你只需要将 `web.xml`\
    \ 中的初始化参数 `jdbcDriver` 和 `dbUrl` 的值从 MySQL 的这些值：\n\n```\ncom.mysql.jdbc.Driver\n\
    jdbc:mysql://localhost:3306/shop\n```\n\n更改为其他 DBMS 的值。\n\n例如，对于 PostgreSQL（[`http://www.postgresql.org/`](http://www.postgresql.org/)），值如下所示：\n\
    \n```\norg.postgresql.Driver\njdbc:postgresql://localhost/shop\n```\n\n对于 Firebird（[`http://www.firebirdsql.org/`](http://www.firebirdsql.org/)），值可能如下所示：\n\
    \n```\norg.firebirdsql.jdbc.FBDriver\njdbc:firebirdsql:localhost/3050:D:\\\\Firebird\
    \ Datafiles\\\\shop.fdb\n```\n\nSun Microsystems 报告存在 221 个不同的 JDBC 驱动程序（参见 [`http://developers.sun.com/product/jdbc/drivers`](http://developers.sun.com/product/jdbc/drivers)）。因此，你应该能够找到连接到任何数据库所需的驱动程序，尽管它可能不是免费提供的。\n\
    \n如果你找不到合适的 JDBC 驱动程序，或者它太贵，你可以使用 JVM 中包含的 JDBC ODBC 桥来连接到任何符合 ODBC 的数据库。ODBC\
    \ 指的是许多数据库供应商在基本上所有操作系统上都支持的 API。使用 JDBC-ODBC 桥，你还可以像访问数据库一样访问 Microsoft Excel\
    \ 文件。例如，假设你有如 [图 6-6](#Chapter06.html#fig_6_6) 所示的电子表格。\n\n![Image](images/9781430246237_Fig06-06.jpg)\n\
    \n***图 6-6.** table.xls*\n\n要能够通过 JDBC-ODBC 桥访问它，你首先需要将该文件与 ODBC 数据源关联起来。为此，请转到\
    \ `Start` ![Image](images/U001.jpg) `Settings` ![Image](images/U001.jpg) `Control\
    \ Panel` ![Image](images/U001.jpg) `Administrative Tools` ![Image](images/U001.jpg)\
    \ `Data Sources (ODBC)`。在那里，单击 `System DSN` 选项卡，然后单击 `Add` 按钮，如 [图 6-7](#Chapter06.html#fig_6_7)\
    \ 所示。\n\n![Image](images/9781430246237_Fig06-07.jpg)\n\n***图 6-7.** ODBC 数据源控制面板*\n\
    \n这将打开 `Create New Data Source` 对话框。滚动可能的数据源列表，直到找到 `Microsoft Excel Driver (*.xls)`。选择它并单击\
    \ `Finish` 按钮。尽管按钮的名称如此，但你还没有完成！一个名为 `ODBC Microsoft Excel Setup` 的新对话框将打开，它允许你选择\
    \ Excel 文件并将其与数据源名称关联起来。参见[图 6-8](#Chapter06.html#fig_6_8)。\n\n![Image](images/9781430246237_Fig06-08.jpg)\n\
    \n***图 6-8.** ODBC Microsoft Excel 设置*\n\n单击 `Select Workbook...` 按钮来选择文件。请注意，我将\
    \ `table.xls` 放在了 `ROOT\\tests\\xls\\` 中，以及用于访问它的 JSP 页面，但它不需要放在那里。另外，我选择了 `tab`\
    \ 作为数据源名称，但你可以自由选择任何名称。\n\n[清单 6-18](#Chapter06.html#list_6_18) 向你展示了一个小的 JSP\
    \ 页面，用于像访问数据库一样访问 `table.xls`。\n\n***清单 6-18.** xls.jsp*\n\n```\n<%@page language=\"\
    java\" contentType=\"text/html\"%>\n<%@page import=\"java.sql.*\"%>\n<html><head><title>XLS\
    \ - ODBC test</title></head><body>\n<%\n  Class.forName(\"sun.jdbc.odbc.JdbcOdbcDriver\"\
    ).newInstance();\n  Connection conn = DriverManager.getConnection (\"jdbc:odbc:tab\"\
    );\n  Statement stmt = conn.createStatement();\n  ResultSet rs = stmt.executeQuery(\"\
    select * from [zzz$]\");\n  %><table border= \"1\"><%\n  ResultSetMetaData resMetaData\
    \ = rs.getMetaData();\n  int nCols = resMetaData.getColumnCount();\n  %><tr><%\n\
    \  for (int kCol = 1; kCol <= nCols; kCol++) {\n    out.print(\"<td><b>\" + resMetaData.getColumnName(kCol)\
    \ + \"</b></td>\");\n    }\n  %></tr><%\n  while (rs.next()) {\n    %><tr><%\n\
    \    for (int kCol = 1; kCol <= nCols; kCol++) {\n      out.print(\"<td>\" + rs.getString(kCol)\
    \ + \"</td>\");\n      }\n    %></tr><%\n    }\n  %></table><%\n  conn.close();\n\
    \  %>\n</body></html>\n```\n\n请注意，在 `select` 语句中，我使用了 `[zzz$]` 作为表名来访问名为 `zzz`\
    \ 的工作表。[图 6-9](#Chapter06.html#fig_6_9) 显示了 `xsl.jsp` 的输出。\n\n![Image](images/9781430246237_Fig06-09.jpg)\n\
    \n***图 6-9.** xls.jsp 的输出*\n\n一句警告：如果你已经在 Excel 中打开了该文件，你将无法建立 Java 连接，因为 Excel\
    \ 会独占打开它。如果你在设置数据源时勾选了 `Read Only` 框，如 [图 6-8](#Chapter06.html#fig_6_8) 所示，则不会失败。\n\
    \n### 总结\n\n在本章中，我向你介绍了使用数据库和 SQL。我解释了如何通过 Java SQL API 从 JSP 访问数据库。特别是，我向你展示了如何建立连接、插入数据和执行查询。为了完成基本数据库操作的总结，我还描述了如何将基本更新分组到事务中。\n\
    \n为了将所有内容整合在一起，我描述了 E-shop 应用程序中数据库操作的设计，并向你展示了它们使用脚本小程序和 XML 语法的实现。最后，我提到了 MySQL\
    \ 的可能替代方案，并描述了如何从 JSP 像访问数据库一样访问电子表格。\n\n做好准备，因为在下一章中，我终于要谈论 JSF 了！\n\n## 第 7\
    \ 章\n\n![Image](images/3square.jpg)\n\n## JavaServer Faces 2.2\n\n在本章中，我将向你介绍\
    \ JSF，并向你展示如何使用它为基于 Web 的应用程序创建用户界面。在我于[第 3 章](#Chapter03.html)中描述的 MVC 应用程序架构（参见[图\
    \ 3-2](#Chapter03.html#fig_3_2)）中，JSF 取代了控制器的位置，从而中介了 JSP（视图）和封装应用程序数据的模型之间的每一次交互。JSF\
    \ 通过以下方式使 Web 应用程序的开发更容易：\n\n> *   允许你从一组连接到服务器端对象的标准 UI 组件创建用户界面\n> *   提供四个自定义标签库来处理这些\
    \ UI 组件\n> *   提供一种扩展标准 UI 组件的机制\n\nJSF 透明地保存 UI 组件的状态信息，并在重新显示时重新填充表单。这是可能的，因为组件的状态存在于\
    \ HTTP 请求的生命周期之外。JSF 通过提供一个控制器 servlet 和一个包含事件处理、服务器端验证、数据转换和组件渲染的组件模型来运作。毫不奇怪，JSF\
    \ 不会改变你已经从 JSP 了解的基本页面生命周期：客户端发出 HTTP 请求，服务器用动态生成的 HTML 页面进行响应。\n\nJSF 应用程序的用户界面，称为*视图*，由基于\
    \ `javax.faces.component.UIComponent` 类的 UI 组件对象树组成。一些组件很简单，例如按钮或文本字段。其他组件很复杂，例如表格或树控件元素。\n\
    \n请注意，JSF 不太容易使用，并且需要付出不小的初始努力才能让它运行起来。然而，一旦你熟悉了 JSF，回报就会到来，然后你可以更快速、更高效地开发用户界面。你可以在\
    \ Oracle 的 JSF 实现的主项目对象模型 (POM) 文件中找到最新版本的 JSF，网址为 [`http://mvnrepository.com/artifact/org.glassfish/javax.faces/`](http://mvnrepository.com/artifact/org.glassfish/javax.faces/)。该文件包括\
    \ JSF 最新版本的二进制文件、文档和依赖项。要能够使用 JSF，你需要将 `javax.faces-2.1.7.jar`（或更新版本）复制到 Tomcat\
    \ 的 `lib` 文件夹并重新启动 Tomcat。\n\n你可以通过访问 [`http://jcp.org/en/jsr/detail?id=344`](http://jcp.org/en/jsr/detail?id=344)\
    \ 并单击 `download page` 链接来下载最新的 JSF 规范 (JSR-344 – JSF 2.2)。\n\n让我们从一个简单的 JSF 应用程序开始，这样你就可以看到\
    \ JSF 在实践中是如何工作的。\n\n### simplef 应用程序\n\n你应该首先将本章软件包中名为 `simplef` 的文件夹复制到 Tomcat\
    \ 的 `webapps` 中。你可以通过在 Web 浏览器中键入 [`http://localhost:8080/simplef/`](http://localhost:8080/simplef/)\
    \ 来尝试它。[图 7-1](#Chapter07.html#fig_7_1) 是你将看到的一个示例。\n\n![Image](images/9781430246237_Fig07-01.jpg)\n\
    \n***图 7-1.** simplef 的第一页*\n\n如你所见，它没什么特别的。如果你键入，例如，“qwerty”，然后单击 `Submit`，你将看到\
    \ [图 7-2](#Chapter07.html#fig_7_2) 中显示的页面。\n\n![Image](images/9781430246237_Fig07-02.jpg)\n\
    \n***图 7-2.** simplef 的第二页*\n\n除了 URL 可能不是你期望的那样，一切都很平淡。如果你单击 `Another`，你将回到第一页，如\
    \ [图 7-3](#Chapter07.html#fig_7_3) 所示。\n\n![Image](images/9781430246237_Fig07-03.jpg)\n\
    \n***图 7-3.** 回到 simplef 的第一页*\n\n同样，没有什么值得兴奋的。但请注意，你在第一页中键入的字符串出现在第二页中，并且再次出现在第一页中作为输入字段的默认值。这个示例中令人兴奋的是，使用\
    \ JSF 实现这一点是多么容易。[清单 7-1](#Chapter07.html#list_7_1) 和 [7-2](#Chapter07.html#list_7_2)\
    \ 显示了该示例的两个 JSP 页面。\n\n***清单 7-1.** first.jsp*\n\n```\n<%@taglib uri=\"http://java.sun.com/jsf/html\"\
    \ prefix=\"h\"%>\n<%@taglib uri=\"http://java.sun.com/jsf/core\" prefix=\"f\"\
    %>\n<html><head><title>First Page</title></head><body>\n<f:view>\n  <h:form>\n\
    \    <h:outputText value=\"Type something here: \"/>\n    <h:inputText value=\"\
    #{aStringBean.str}\" />\n    <h:commandButton action=\"goOn\" value=\"Submit\"\
    \ />\n    </h:form>\n  </f:view>\n</body></html>\n```\n\n***清单 7-2.** second.jsp*\n\
    \n```\n<%@taglib uri=\"http://java.sun.com/jsf/html\" prefix=\"h\"%>\n<%@taglib\
    \ uri=\"http://java.sun.com/jsf/core\" prefix=\"f\"%>\n<html><head><title>Second\
    \ page</title></head><body>\n<f:view>\n  <h:form>\n    <h:outputText value=\"\
    &quot;#{aStringBean.str}&quot; \"/>\n    <h:commandButton action=\"goBack\" value=\"\
    Another\" />\n    </h:form>\n</f:view>\n</body></html>\n```\n\n两个 JSP 页面的前两行加载了我在本章开头提到的两个\
    \ JSF 库。这两个库，`core` 和 `html`，包含了实现 JSF 的所有自定义标签定义。\n\n你在两个页面中遇到的第一个 JSF 元素是 `f:view`，它是所有\
    \ JSF 动作的容器。下一个是 `h:form`，它是生成 HTML 标签对 `<form>`..`</form>` 的 JSF 元素。三个 JSF 元素\
    \ `h:outputText`、`h:inputText` 和 `h:commandButton` 分别生成三个 HTML 元素 `<span>`..`</span>`、`<input\
    \ type=\"text\"`..`/>` 和 `<input type=\"submit\"`..`/>`。如果你使用 `h:commandLink`\
    \ 而不是 `h:commandButton`，JSF 将生成一个带有 HTML 标签 `a` 和属性 `href` 的超链接，而不是 `submit` 按钮。\n\
    \n请注意，`first.jsp` 中 `h:inputText` 和 `second.jsp` 中 `h:outputText` 的 `value` 属性都包含\
    \ EL 表达式 `#{aStringBean.str}`。这是你第一次遇到代表左值的 EL 表达式的实际示例（参见[第 4 章](#Chapter04.html)中的表达式语言部分）。\n\
    \n表达式 `${aStringBean.str}`（记录在案：在这种情况下是非法的）本应由 Tomcat 立即求值。Tomcat 会将其替换为通过执行方法\
    \ `aStringBean.getStr()` 获得的值。\n\n但是，用 `#` 替换 `$` 后，唯一发生的事情是 JSF 为对象 `aStringBean`\
    \ 的属性 `str` 分配了一个标识符。\n\n[清单 7-3](#Chapter07.html#list_7_3) 显示了 `first.jsp` 生成的\
    \ HTML 页面（为了便于阅读，我重新格式化了）。\n\n***清单 7-3.** first.jsp 生成的 HTML*\n\n```\n<html><head><title>First\
    \ Page</title></head><body>\n<form id=\"id_1\" name=\"id_1\" method=\"post\"\n\
    \    action=\"/simplef/first.jsf;jsessionid=E48B69EEB4C81EB74C85C1ABCFBB8AE0\"\
    \n    enctype=\"application/x-www-form-urlencoded\"\n    >\n<input type=\"hidden\"\
    \ name=\"id_1\" value=\"id_1\"/>\n**Type something here: <input type=\"text\"\
    \ name=\"id_1:id_3\"/>**\n**<input type=\"submit\" name=\"id_1:id_4\" value=\"\
    Submit\"/>**\n<input type=\"hidden\" name=\"javax.faces.ViewState\" id=\"javax.faces.ViewState\"\
    \n    value=\"5073854143807380359:-1196606070653851981\" autocomplete=\"off\"\n\
    \    />\n</form>\n</body></html>\n```\n\n每当你看到 `id`，生成的代码实际上包含 `j_id_jsp_58993504`，但我用\
    \ `id` 进行了全局替换，因为我发现自动生成的长字符串有些分散注意力。\n\n以粗体显示的两行是三个 JSF 元素 `h:outputText`、`h:inputText`\
    \ 和 `h:commandButton` 的结果。\n\nJSF 为 `#{aStringBean.str}` 分配了标识符 `j_id_jsp_58993504_1:j_id_jsp_58993504_3`。当在服务器上处理你的浏览器在单击\
    \ `Submit` 时发送的请求时，JSF 会将你键入的值（例如，字符串 `\"qwerty\"`）分配给对象 `aStringBean` 的 `str`\
    \ 属性。这就是我在[第 4 章](#Chapter04.html)中提到的延迟求值。通过以这种方式保存字符串，JSF 将使其可用于 `second.jsp`\
    \ 中 `h:outputText` 的 `value`，并在需要再次渲染该页面时作为 `first.jsp` 中 `h:inputText` 的默认值。\n\
    \n为了继续解释 JSF 的工作原理，我想让你注意一个事实，即浏览器中显示的 URL 与 JSP 页面的名称不匹配。例如，你通过在浏览器中键入 [`http://localhost:8080/simplef/`](http://localhost:8080/simplef/)\
    \ 来启动应用程序。那么是什么技巧将你带到 `first.jsp` 的呢？如果你打开在 `simplef` 文件夹中找到的默认 JSP 页面 `index.jsp`，你将看到\
    \ [清单 7-4](#Chapter07.html#list_7_4) 中显示的单行代码。\n\n***清单 7-4.** index.jsp*\n\n\
    ```\n<html><body><jsp:forward page=\"/first.jsf\"/></body></html>\n```\n\n但是在同一个文件夹中没有名为\
    \ `first.jsf` 的文件！要开始理解发生了什么，你必须查看 `web.xml` 文件（参见[清单 7.5](#Chapter07.html#list_7_5)）。\n\
    \n***清单 7-5.** web.xml*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<web-app\
    \ version=\"2.5\"\n  \n  xsi:schemaLocation=\"http://java.sun.com/xml/ns/javaee\
    \ http://java.sun.com/xml/ns/javaee/web-\napp_2_5.xsd\">\n<servlet>\n  <servlet-name>Faces\
    \ Servlet</servlet-name>\n  <servlet-class>javax.faces.webapp.FacesServlet</servlet-class>\n\
    \  <load-on-startup>1</load-on-startup>\n  </servlet>\n<servlet-mapping>\n  <servlet-name>Faces\
    \ Servlet</servlet-name>\n  <url-pattern>*.jsf</url-pattern>\n  </servlet-mapping>\n\
    </web-app>\n```\n\n它定义了一个类型为 `javax.faces.webapp.FacesServlet` 的 servlet。这就是 JSF\
    \ servlet，我非正式地称之为 “JSF”。正是这个 servlet 为属性分配 ID 并在页面之间传输数据。`web.xml` 还将扩展名 `jsf`\
    \ 映射到该 servlet，从而强制所有对扩展名为 `jsf` 的页面的请求都发送给它。\n\n这揭示了部分谜团：当你在浏览器中键入 [`http://localhost:8080/simplef/`](http://localhost:8080/simplef/)\
    \ 时，Tomcat 执行 `index.jsp`，它将请求转发给 `first.jsf`（它实际上并不存在）。但是，由于 `web.xml` 中的 servlet\
    \ 映射，Tomcat 将你的请求重定向到 JSF servlet。\n\n谜团的其余部分很容易解释：JSF 将扩展名 `jsf` 替换为 `jsp`，这意味着请求最终可以到达\
    \ `first.jsp`。扩展名 `jsp` 是默认值，但你可以通过在 `web.xml` 的 `web-app` 元素中插入一个如 [清单 7-6](#Chapter07.html#list_7_6)\
    \ 所示的元素来替换它。\n\n***清单 7-6.** 在 web.xml 中定义 JSF 默认后缀*\n\n```\n<context-param>\n\
    \  <param-name>javax.faces.DEFAULT_SUFFIX</param-name>\n  <param-value>.jspx</param-value>\n\
    \  </context-param>\n```\n\n下一个我们必须解决的谜团是，由 `first.jsp` 中的表单生成的请求如何到达 `second.jsp`。换句话说，动作\
    \ `\"goOn\"` 如何导致请求到达 `second.jsp`？\n\n要解决这第二个谜团，你必须查看你在 `WEB-INF` 中找到的另一个文件：`faces-config.xml`（参见[清单\
    \ 7-7](#Chapter07.html#list_7_7)）。\n\n***清单 7-7.** faces-config.xml*\n\n```\n\
    <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<faces-config\n  \n    xsi:schemaLocation=\"\
    http://java.sun.com/xml/ns/javaee ~CCC\nhttp://java.sun.com/xml/ns/javaee/web-facesconfig_2_0.xsd\"\
    \n    version=\"2.0\"\n    >\n  <managed-bean>\n    <managed-bean-name>aStringBean</managed-bean-name>\n\
    \    <managed-bean-class>AString</managed-bean-class>\n    <managed-bean-scope>session</managed-bean-scope>\n\
    \    <managed-property>\n      <property-name>str</property-name>\n      <property-class>java.lang.String</property-class>\n\
    \      <null-value></null-value>\n      </managed-property>\n    </managed-bean>\n\
    **  <navigation-rule>**\n**    <from-view-id>/first.jsp</from-view-id>**\n** \
    \   <navigation-case>**\n**      <from-outcome>goOn</from-outcome>**\n**     \
    \ <to-view-id>/second.jsp</to-view-id>**\n**      </navigation-case>**\n**   \
    \ </navigation-rule>**\n  <navigation-rule>\n    <from-view-id>/second.jsp</from-view-id>\n\
    \    <navigation-case>\n      <from-outcome>goBack</from-outcome>\n      <to-view-id>/first.jsp</to-view-id>\n\
    \      </navigation-case>\n    </navigation-rule>\n  </faces-config>\n```\n\n\
    暂时专注于我突出显示的部分。它告诉 JSF，当页面 `first.jsp` 以结果 `goOn` 结束时（即，执行带有动作 `goOn` 的 `h:commandButton`），控制权应转到\
    \ `second.jsp`。在更复杂的应用程序中，`first.jsp` 将包含不同的动作，这些动作对应于不同的 `navigation-case` 元素。然后，JSF\
    \ servlet 将具有类似于 Java switch 语句的功能。\n\n我们快到了。接下来需要一些解释的是你在 `faces-config.xml`\
    \ 中看到的第一个导航规则上方的 `managed-bean` 元素。它告诉 JSF 管理一个名为 `aStringBean` 的会话范围对象，类型为 `AString`，并管理其名为\
    \ `str` 的属性，该属性应初始化为 `null`。这也意味着 JSF servlet 将自动实例化该对象。\n\n这就是你在 `first.jsp`\
    \ 和 `second.jsp` 的 EL 表达式中看到的名称 `aStringBean` 的来源。我可以选择任何名称，但以 `Bean` 结尾命名此类托管\
    \ bean 是一种很好的做法。\n\n此外，默认范围是 `request`。但通过指定 `session`，我确保了 `aStringBean` 在第一个请求之后不会被销毁。在示例中，这意味着\
    \ `first.jsp` 的第二次执行中的输入元素将没有默认值。如果 `first.jsp` 执行的是自身而不是 `second.jsp`，那么 `request`\
    \ 范围就足以“记住”默认值。请注意，你应该注意不要过度在会话中存储信息，因为这可能会影响应用程序的性能。请记住，每个新用户都会导致创建一个新会话。\n\n\
    完成 JSF 谜题解析所需的最后一块是类 `AString` 的定义。参见[清单 7-8](#Chapter07.html#list_7_8)。\n\n***清单\
    \ 7-8.** AString.java*\n\n```\nimport java.io.Serializable;\npublic class AString\
    \ implements Serializable {\n  String str;\n  public String getStr() { return\
    \ str; }\n  public void setStr(String s) { str = s; }\n  }\n```\n\n为了使 `simplef`\
    \ 工作，`AString.class` 应该位于 `WEB-INF` 的 `classes` 子目录中。\n\n`AString` 是 JSF 所需的最简单的\
    \ bean。实际上，你可以删除 `import` 语句并移除 `Serializable` 的实现。它们的存在是为了使 Tomcat 能够将对象保存到磁盘并从磁盘检索它。服务器可能在重负载或重新启动时使用硬盘来停放会话数据。这是尽可能保持会话大小的另一个原因。请注意，Tomcat\
    \ 只能保存它能够转换为数据输出流的对象，这要求对象是可序列化的。\n\n底线是，为了完全安全，当你的托管 bean 被定义为 `session` 范围时，它们应该是可序列化的。但你不一定需要这样做。这意味着在重负载条件下，某些会话可能会被突然终止。\n\
    \n![Image](images/square.jpg) **提示** 你会发现，有时如果你在开发 JSF 应用程序时犯了导致其失败的错误，当你回退到犯错之前的版本时，应用程序将无法再次工作。这与缓存有关。在开发环境中，最简单的解决方法是重新启动你的浏览器和\
    \ Tomcat。\n\n#### <managed-bean> 的替代方案\n\nJava 注解是一种提供关于类或对象信息的方式。你在[第 6 章](#Chapter06.html)中看到了一个注解示例（参见[清单\
    \ 6.17](#Chapter06.html#list_6_17)），其中我使用了 `@SuppressWarnings` `(\"unchecked\"\
    )` 来告诉 Java 编译器在处理后面的语句时如何表现。\n\nJSF 支持注解，你可以在 Java bean 中使用它们来替换 `faces-config.xml`\
    \ 中的 `<managed-bean>` 元素。换句话说，如果你使用如 [清单 7-9](#Chapter07.html#list_7_9) 所示的 `AString.java`\
    \ 的注解版本，你可以完全从 [清单 7-7](#Chapter07.html#list_7_7) 所示的 `faces-config.xml` 中移除 `<managed-bean>`\
    \ 元素。\n\n***清单 7-9.** AString.java (注解版本)*\n\n```\nimport javax.faces.bean.ManagedBean;\n\
    import javax.faces.bean.SessionScoped;\nimport javax.faces.bean.ManagedProperty;\n\
    @ManagedBean(name=\"aStringBean\")\n@SessionScoped\npublic class AString {\n \
    \ @ManagedProperty(value=\"#{AString.str}\")\n  String str;\n  public String getStr()\
    \ { return str; }\n  public void setStr(String s) { str = s; }\n  }\n```\n\n我认为这是不言自明的。如果你删除\
    \ `@ManagedBean` 后面的括号赋值，在 JSP 中你必须使用类名（首字母大写改为小写）作为 bean 对象名称。\n\n为简单起见，我在本章的软件包中包含了一个单独的文件夹，其中包含\
    \ `simplef` 的注解版本。你可以在其中找到 WAR 文件，你可以轻松地将其导入 Eclipse 或放入 Tomcat 的 `webapps` 文件夹，以及一个已展开的文件夹（你也可以将其放入\
    \ `webapps`）。\n\n### simplefx 和 simpleh 应用程序\n\n在上一节中，我向你展示了如何使用 JSP 页面构建一个简单的\
    \ JSF 应用程序。要使用 JSP 文档（即 XML 格式）使用 JSF，你只需要进行最小的更改。要将 `first.jsp`（[清单 7.1](#Chapter07.html#list_7_1)）转换为\
    \ `first.jspx`，你只需要进行[第 5 章](#Chapter05.html)最后一节中描述的标准更改，并将两个 JSF `taglib` 动作替换为相应的命名空间声明，如\
    \ [清单 7-10](#Chapter07.html#list_7_10) 所示。\n\n***清单 7-10.** first.jspx*\n\n```\n\
    <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<jsp:root\n    \n  version=\"2.1\"\
    \n  >\n<jsp:directive.page\n  language=\"java\"\n  contentType=\"application/xhtml+xml;charset=UTF-8\"\
    \n  />\n<jsp:output omit-xml-declaration=\"false\"/>\n<jsp:output\n  doctype-root-element=\"\
    html\"\n  doctype-public=\"-//W3C//DTD XHTML 1.0 Strict//EN\"\n  doctype-system=\"\
    http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\n  />\n<html >\n<head><title>First\
    \ Page</title></head>\n<body>\n<f:view>\n  <h:form>\n    <h:outputText value=\"\
    Type something here: \"/>\n    <h:inputText value=\"#{aStringBean.str}\"/>\n \
    \   <h:commandButton action=\"goOn\" value=\"Submit\"/>\n    </h:form>\n  </f:view>\n\
    </body>\n</html>\n</jsp:root>\n```\n\n以同样的方式将 `second.jsp` 转换为 `second.jspx` 后，你还需要在\
    \ `web.xml` 中插入 [清单 7-6](#Chapter07.html#list_7_6) 中所示的 `context-param` 元素，否则\
    \ JSF 将继续查找扩展名为 `jsp` 的文件。最后，为了完成到 XML 的转换，你需要在 `faces-config.xml` 中进行全局替换，将 `jsp`\
    \ 替换为 `jspx`，以便导航规则继续工作。你将在本章软件包中的 `simplefx` 文件夹中找到所有更新的源代码。\n\n请注意，我们不需要在 JSP\
    \ 页面的 `body` 元素内进行任何转换。这是因为没有需要转换的脚本元素。使用 JSTL、JSF 以及你获取或自行开发的其他自定义动作，你可以毫不费力地以\
    \ XML 格式编写 JSP。\n\n从 JSP 页面切换到 JSP 文档还有另一个原因：它将为你解锁一些 JSF 2.0 功能，否则你将无法使用这些功能。一个例子是*隐式导航*。\n\
    \n你看到在 `faces-config.xml` 中，你需要指定当你从特定文档请求特定动作时，你希望控制权转移到哪个文档。`simplexf` 应用程序的导航元素是\
    \ [清单 7-11](#Chapter07.html#list_7_11) 中显示的那些。\n\n***清单 7-11.** simplexf 的导航规则*\n\
    \n```\n<navigation-rule>\n  <from-view-id>/first.jspx</from-view-id>\n  <navigation-case>\n\
    \    <from-outcome>goOn</from-outcome>\n    <to-view-id>/second.jspx</to-view-id>\n\
    \    </navigation-case>\n  </navigation-rule>\n  <navigation-rule>\n  <from-view-id>/second.jspx</from-view-id>\n\
    \  <navigation-case>\n    <from-outcome>goBack</from-outcome>\n    <to-view-id>/first.jspx</to-view-id>\n\
    \    </navigation-case>\n  </navigation-rule>\n```\n\n特别是，第一个导航规则告诉 JSF，当它在 `first.jspx`\
    \ 中执行元素 `<h:commandButton action=\"goOn\" value=\"Submit\"/>` 时，它应该将控制权转移到 `second.jspx`（JSF\
    \ 将其重命名为 `second.jsf`，以便来自用户的后续请求返回到 JSF servlet）。\n\n从 2009 年的 2.0 版本开始，JSF 允许你在不定义\
    \ `faces-config.xml` 中的导航规则的情况下进行导航，前提是：\n\n> *   动作的值（即你在 `faces-config.xml`\
    \ 的 `from-outcome` 元素中写入的内容）与目标文档的名称（不带扩展名和点）相同，并且\n> *   目标文档的扩展名是 `xhtml`。\n\
    \n遗憾的是 JSF 专家组没有提供其他扩展名的选择。不是吗？但你不必担心，因为 JSP 文档不需要扩展名 `jspx`！\n\n在本章的软件包中，你将找到最初\
    \ `simplef` 应用程序的另一个版本。我将其命名为 `simpleh`。与之前的版本 (`simplefx`) 的唯一区别是：\n\n> *   `first.jspx`\
    \ 已变为 `first.xhtml`\n> *   `second.jspx` 已变为 `second.xhtml`\n> *   在 `first.xhtml`\
    \ 中，动作 `\"goOn\"` 已变为 `\"second\"`\n> *   在 `second.xhtml` 中，动作 `\"goBack\"` 已变为\
    \ `\"first\"`\n> *   在 `web.xml` 中，`context-param` 元素不再存在，因为 `jspx` 扩展名已经消失\n\
    > *   文件 `faces-config.xml` 已经消失，因为它不再有任何用途。\n\n用于开发 JSF 应用程序的 XHTML 页面称为 *facelets*。给\
    \ JSP 文档赋予 `xhtml` 扩展名只是用 JSP 生成 XHTML 页面的一种方式，而不是手动编写它们。\n\n![Image](images/square.jpg)\
    \ **注意** 如果有人告诉你 JSP 已经过时，facelets 才是主流，请告诉他们事情并非像他们想的那样非黑即白！但是，在混合使用 JSF 和 JSP/JSTL\
    \ 时请务必小心，因为这可能会令人困惑。此外，在实现复杂的 JSP 代码片段之前，你可能想研究一下是否可以使用 JSF 更简单地完成。\n\n### JSF\
    \ 生命周期\n\n现在你已经看到了一个 JSF 示例，让我们更仔细地看看 JSF 是如何完成其工作的。为此，请参考[图 7-4](#Chapter07.html#fig_7_4)。请注意，该图仅显示了当用户在发送请求的页面的输入字段中键入有效值时\
    \ JSF 所做的事情。更多细节请继续阅读。\n\n![Image](images/9781430246237_Fig07-04.jpg)\n\n***图\
    \ 7-4.** JSF 生命周期*\n\n> 1.  **恢复视图**：JSF servlet 将请求页面的视图构建为一个组件树，其中包含与页面所有组件关联的信息。如果页面是第一次被请求，JSF\
    \ 会创建一个空视图，将事件处理程序和验证器（如果有）连接到其组件，并将其保存在 `FacesContext` 对象中，然后直接跳转到 Render Response。通过保存视图，JSF\
    \ 使得在必要时可以重新填充页面——例如，当用户没有按要求填写表单时。如果之前显示过同一页面并且组件状态已保存，JSF 将使用该信息将页面恢复到其当前状态。\n\
    > 2.  **应用请求值**：JSF 遍历组件树并执行每个组件的 `decode` 方法，该方法从请求参数中提取值，或者可能从 cookie 或标头中提取值。它还会自动转换与非字符串类型的对象属性关联的参数。转换错误会导致错误消息排队到\
    \ `FacesContext` 对象。在某些情况下，通常是当用户单击控件时，servlet 还会生成请求事件并将其排队到 `FacesContext`。对于将\
    \ `immediate` 事件处理属性设置为 `true` 的组件，JSF 还会验证它们并将它们保存在 `FacesContext` 中的组件实例中。\n\
    > 3.  **处理验证**：servlet 为在恢复视图期间注册的验证器的所有组件调用 `validate` 方法。验证规则是你定义的，或者默认情况下，是\
    \ JSF 预定义的。对于每个返回 `false` 的 `validate` 方法，servlet 将该组件标记为无效，并将错误消息排队到 `FacesContext`。在此阶段结束时，如果存在验证错误，JSF\
    \ 将直接跳转到 Render Response，以便可以向用户显示错误消息。\n> 4.  **更新模型值**：在此阶段，组件的值被复制到与它们连接的托管\
    \ bean 的相应属性中。JSF 通过执行组件方法 `updateModel` 来实现，该方法在必要时也会执行类型转换。转换错误会导致错误消息排队到 `FacesContext`。\n\
    > 5.  **调用应用程序**：在此阶段，servlet 通过执行相应的事件处理程序来处理应用程序级事件。当用户提交表单或单击 JSF 应用程序中的链接时，JSF\
    \ servlet 会生成一个相应的应用程序级事件。开发 JSF 应用程序时你必须完成的任务之一是为每个可能的应用程序事件分配一个处理程序。这也是你指定接下来应该发生什么的地方，通过返回你已经链接到可能的下一个页面的结果，要么使用导航案例，要么像我上一节中展示的那样隐式地完成。\n\
    > 6.  **渲染响应**：servlet 创建一个响应组件树，并将页面的渲染委托给 Tomcat。当 Tomcat 遍历相应的 JSF 标签时，每个组件都会渲染自身。在此阶段结束时，响应的状态被保存，以便\
    \ servlet 在后续对同一页面的请求的恢复视图阶段可以访问它。\n\n#### 事件处理\n\n在查看应用程序之前，我需要花几句话谈谈 JSF 处理事件的机制，因为除非你对事件处理有所了解，否则你无法真正理解\
    \ JSF 的工作原理。\n\n作为一个例子，让我们看看当用户单击 `Submit` 按钮时事件处理扮演什么角色。用于表示按钮 HTML 元素的 JSF UI\
    \ 组件是 `javax.faces.component.html.HtmlCommandButton` 类型的对象，这是一个扩展更通用的 `javax.faces.component.UICommand`\
    \ 的类。与任何其他 HTML 页面一样，在 JSF 应用程序中单击 `Submit` 按钮，用户会触发向服务器发送一个 HTTP 请求，该请求包含按钮的\
    \ ID 作为参数名称。\n\n正如我已经提到的，在应用请求值阶段，JSF 执行页面每个组件的 `decode` 方法。首先，`decode` 方法扫描参数名称，看是否有与该方法所属组件的\
    \ ID 匹配的。在我们的示例中，与用户单击的按钮关联的 `UICommand` 对象的 `decode` 方法在请求参数中找到了组件 ID，正是因为用户单击了该按钮。由于找到了自己的\
    \ ID，该组件实例化了一个类型为 `javax.faces.event.ActionEvent` 的事件对象并将其排队。\n\n此时，你必须区分需要验证表单的所有输入字段的情况和仅需要部分验证的情况。例如，在像\
    \ `eshop` 应用程序这样的在线商店中，购物者即使在到达结帐页面（要求购物者提供付款信息）后，也必须能够将更多书籍添加到购物车。为了实现这一点，你必须确保如果用户选择图书类别或搜索新书名，则跳过对付款数据的验证。如果你允许对空或部分填写的付款字段进行验证，应用程序将报告一个或多个错误，并阻止购物者返回寻找新书。\n\
    \n你通过指定图书搜索和类别选择的处理都在应用请求值期间完成，而将付款数据的处理留给正常的生命周期来解决。如果结果是用户想要购买新书而不是完成结帐，则控制权直接跳转到渲染响应阶段，从而跳过中间本应对付款数据进行验证和处理的阶段。\n\
    \n在下一章中，你将详细了解这在 `eshop` 的 JSF 版本中是如何完成的。\n\n### JSF 标签库\n\n本章的前两节向你展示了使用少量元素的简单\
    \ JSF 应用程序示例：`f:view`、`h:form`、`h:outputText`、`h:inputText` 和 `h:commandButton`。你会记得前缀\
    \ `h` 与 HTML 组件库关联，前缀 `f` 与 JSF 核心库关联。除了这两个库，JSF 2 还包括两个额外的自定义标签库：`facelets`，通常与前缀\
    \ `ui` 关联，以及 `composite`，与前缀 `composite` 关联。\n\n在本章的其余部分，我将简要描述这四个库，并向你展示更多示例。在下一章中，我将通过引用\
    \ `eshop` 应用程序的 JSF 版本来描述如何使用更多标签。\n\n你可以在 [`http://java.sun.com/javaee/javaserverfaces/reference/api/`](http://java.sun.com/javaee/javaserverfaces/reference/api/)\
    \ 找到带有相关文档的完整标签列表。\n\n#### `html` 库\n\n顾名思义，JSF 的 HTML 库收集了与渲染 HTML 组件相关的标签。正如你已经在示例中看到的（例如，使用\
    \ `h:inputText`），你通过将引用数据模型对象的赋值表达式分配给组件标签的特定属性（例如，`<h:inputText value=\"#{aStringBean.str}\"\
    />`）来将数据模型的对象关联到相应的组件。\n\n尽管在大多数情况下，标签的名称应该已经告诉你它们的用途，但我已在[表 7-1](#Chapter07.html#tab_7_1)\
    \ 中总结了标签和 HTML 元素之间的对应关系。\n\n![Image](images/9781430246237_Tab07-01.jpg)\n\n![Image](images/9781430246237_Tab07-01a.jpg)\n\
    \n![Image](images/square.jpg) **注意** 元素 `h:head` 和 `h:body` 仅在扩展名为 `xhtml` 的文档中有效。\n\
    \n##### h:select* 元素\n\n有七个 JSF HTML 标签用于渲染选择项。为了展示它们之间的区别，我在 Eclipse 中创建了一个小项目\
    \ `testf`。你可以在本章软件包的 `testf project` 子文件夹中找到它。如果你将 `testf.war` 复制到 Tomcat 的 `webapps`\
    \ 文件夹，几秒钟后，你将能够通过在 Web 浏览器中键入 [`http://localhost:8080/testf/`](http://localhost:8080/testf/)\
    \ 来尝试它。[图 7-5](#Chapter07.html#fig_7_5) 向你展示了在控件中选择值后（并点击 `Submit` 按钮，尽管没有必要这样做）你在浏览器中看到的内容。\n\
    \n![Image](images/9781430246237_Fig07-05.jpg)\n\n***图 7-5.** testf 的输出*\n\n[清单\
    \ 7-12](#Chapter07.html#list_7_12) 显示了 JSP 文档。\n\n***清单 7-12.** testf 项目的 index.jspx*\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<jsp:root\n    \n  version=\"\
    2.1\"\n  >\n<jsp:directive.page\n  language=\"java\"\n  contentType=\"application/xhtml+xml;charset=UTF-8\"\
    \n  />\n<jsp:output omit-xml-declaration=\"false\"/>\n<jsp:output\n  doctype-root-element=\"\
    html\"\n  doctype-public=\"-//W3C//DTD XHTML 1.0 Strict//EN\"\n  doctype-system=\"\
    http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\n  />\n<html >\n<head><title>Test</title></head>\n\
    <body><f:view><h:form id=\"form\">\n**  <h:panelGrid columns=\"2\" border=\"1\"\
    \ cellpadding=\"5\">**\n\n    <h:outputText value=\"h:selectBooleanCheckbox\"\
    />\n    <h:panelGroup>\n**      <h:selectBooleanCheckbox id=\"checkbox\" value=\"\
    #{myBean.oneValue}\"/>**\n      <h:outputText value=\" just a checkbox\"/>\n \
    \     </h:panelGroup>\n\n    <h:outputText value=\"h:selectManyCheckbox\"/>\n\
    **    <h:selectManyCheckbox id=\"checkboxes\" value=\"#{myBean.choices1}\">**\n\
    **      <f:selectItems value=\"#{myBean.selects}\"/>**\n**      <f:selectItem\
    \ itemLabel=\"everything\" itemValue=\"42\"/>**\n**      </h:selectManyCheckbox>**\n\
    \n    <h:outputText value=\"h:selectManyListbox\"/>\n**    <h:selectManyListbox\
    \ id=\"listboxes\" value=\"#{myBean.choices2}\">**\n**      <f:selectItems value=\"\
    #{myBean.selects}\"/>**\n**      <f:selectItem itemLabel=\"too much\" itemValue=\"\
    999\"/>**\n**      </h:selectManyListbox>**\n\n    <h:outputText value=\"h:selectManyMenu\"\
    />\n**    <h:selectManyMenu id=\"menus\" value=\"#{myBean.choices3}\"**\n**  \
    \      style=\"min-height:48px\">**\n**      <f:selectItems value=\"#{myBean.selects}\"\
    />**\n**      <f:selectItem itemLabel=\"ninenty-nine\" itemValue=\"99\"/>**\n\
    **      </h:selectManyMenu>**\n\n    <h:outputText value=\"h:selectOneListbox\"\
    />\n**    <h:selectOneListbox id=\"listbox\" value=\"#{myBean.choice1}\">**\n\
    **      <f:selectItems value=\"#{myBean.selects}\"/>**\n**      <f:selectItem\
    \ itemLabel=\"nine\" itemValue=\"9\"/>**\n**      </h:selectOneListbox>**\n\n\
    \    <h:outputText value=\"h:selectOneMenu\"/>\n**    <h:selectOneMenu id=\"menu\"\
    \ value=\"#{myBean.choice2}\">**\n**      <f:selectItem itemLabel=\"zero\" itemValue=\"\
    0\"/>**\n**      <f:selectItems value=\"#{myBean.selects}\"/>**\n**      </h:selectOneMenu>**\n\
    \n    <h:outputText value=\"h:selectOneRadio\"/>\n**    <h:selectOneRadio id=\"\
    radio\" value=\"#{myBean.choice3}\">**\n**      <f:selectItem itemLabel=\"nothing\"\
    \ itemValue=\"-1\"/>**\n**      <f:selectItems value=\"#{myBean.selects}\"/>**\n\
    **      </h:selectOneRadio>**\n\n    </h:panelGrid>\n    <h:commandButton value=\"\
    Submit\"/>\n  </h:form></f:view></body>\n</html>\n</jsp:root>\n```\n\n我已将选择组件以粗体突出显示。`h:selectBooleanCheckbox`\
    \ 渲染一个单独的复选框；`h:selectManyCheckbox`、`h:selectManyListbox` 和 `h:selectManyMenu`\
    \ 渲染多项选择；而 `h:selectOneListbox`、`h:selectOneMenu` 和 `h:selectOneRadio` 渲染单项选择。\n\
    \n在所有可以选择一个或多个项目的情况下，除了由托管 bean 通过我选择命名为 `selects` 的属性提供的项目列表之外，我还包含了一个硬编码的项目：\n\
    \n```\n<f:selectItems value=\"#{myBean.selects}\"/>\n```\n\n这些标签将每个 HTML 控件连接到托管\
    \ bean 的不同属性。请注意使用核心 JSF 标签 `f:selectItem` 和 `f:selectItems` 来提供 HTML select 元素选项所需的信息。\n\
    \n从这个例子中，你还可以看到如何使用 `h:panelGrid` 和 `h:panelGroup` 来渲染 HTML `table`。与 HTML 不同，在\
    \ HTML 中你需要使用 `tr` 元素标识行，使用 `td` 元素标识行内的单元格，而使用 `h:panelGrid`，你可以在开始时指定列数，并且其开始和结束标签之间的所有组件从左到右“流入”表格中。如果你需要在同一个单元格中有多个组件，你可以使用\
    \ `h:panelGroup` 将它们分组在一起。\n\n[清单 7-13](#Chapter07.html#list_7_13) 显示了用于保存在浏览器中选择的项目的托管\
    \ bean。\n\n***清单 7-13.** testf 项目的 myPkg.MyBean.java*\n\n```\npackage myPkg;\n\
    import java.util.ArrayList;\nimport javax.faces.model.SelectItem;\n\npublic class\
    \ MyBean {\n  @SuppressWarnings(\"unchecked\")\n  private ArrayList<String>[]\
    \ choices = new ArrayList[3];\n  private String choice1, choice2, choice3;\n \
    \ private Object oneValue;\n  private SelectItem[] selects;\n\n  public MyBean()\
    \  {\n    selects = new SelectItem[3];\n    selects[0] = new SelectItem(\"1\"\
    , \"one\");\n    selects[1] = new SelectItem(\"2\", \"two\");\n    selects[2]\
    \ = new SelectItem(\"3\", \"three\");\n    for (int kC = 0; kC < choices.length;\
    \ kC++) {\n      choices[kC] = new ArrayList<String>();\n      }\n    }\n\n  //\
    \ ---------- Getters\n  public Object[] getChoices1() { return choices[0].toArray();\
    \ }\n  public Object[] getChoices2() { return choices[1].toArray(); }\n  public\
    \ Object[] getChoices3() { return choices[2].toArray(); }\n  public String getChoice1()\
    \ { return choice1; }\n  public String getChoice2() { return choice2; }\n  public\
    \ String getChoice3() { return choice3; }\n  public Object getOneValue() { return\
    \ oneValue; }\n  public SelectItem[] getSelects() { return selects; }  \n\n  //\
    \ ---------- Setters\n  public void setChoices(Object[] cc, int kC) {\n      \
    \      int len=0;\n            if (cc != null) len = cc.length;\n            if\
    \ (len != 0) {\n              choices[kC].clear();\n              choices[kC]\
    \ = new ArrayList<String>(len);\n              for (int k = 0; k < len; k++) {\n\
    \                choices[kC].add((String)cc[k]);\n                }\n        \
    \      }\n            }\n  public void setChoices1(Object[] cc) { setChoices(cc,\
    \ 0); }\n  public void setChoices2(Object[] cc) { setChoices(cc, 1); }\n  public\
    \ void setChoices3(Object[] cc) { setChoices(cc, 2); }\n  public void setChoice1(String\
    \ c) { choice1 = c; }\n  public void setChoice2(String c) { choice2 = c; }\n \
    \ public void setChoice3(String c) { choice3 = c; }\n  public void setOneValue(Object\
    \ v) { oneValue = v; }\n  }\n```\n\n真的没什么好解释的。JSF 负责执行 bean 的初始化方法，该方法初始化三个值以通过\
    \ `select` 属性提供选择，并设置保存用户选择所需的数组。\n\n请注意，我没有为 `select` 编写 setter 方法。这是因为我不需要修改存储在那里的值。你永远不应该做的是省略\
    \ getter 方法，因为 JSF 期望能够读取属性。\n\n#### `core` 库\n\nJSF 的 `core` 库使你可以访问独立于特定渲染工具包的\
    \ API：\n\n> *   **转换器**。转换器允许你在组件的数据类型和应用程序对象的数据类型之间进行转换。\n> *   **监听器**。基于 JavaBean\
    \ 1.0.1 机制，你向组件注册一个监听器来处理该组件生成的事件。\n> *   **事件**。在监听器注册到组件后，`FacesServlet` 通过调用相应监听器的事件通知方法来触发事件。\n\
    > *   **验证器**。验证器检查组件的值，并确保它符合一组预定义的规则。\n\n在前面的示例中，你已经遇到过 `f:view`、`f:selectItem`\
    \ 和 `f:selectItems`。大多数核心标签对组件执行操作。[表 7-2](#Chapter07.html#tab_7_2) 提供了所有核心标签及其相应操作的列表。在表中，我用斜体突出显示了少数不适用于单个组件的操作。至于\
    \ HTML 库，你将在[第 9 章](#Chapter09.html)中找到关于核心的更多信息。\n\n![Image](images/9781430246237_Tab07-02.jpg)\n\
    \n![Image](images/9781430246237_Tab07-02a.jpg)\n\n我预计你会发现[表 7-2](#Chapter07.html#tab_7_2)\
    \ 中列出的许多标签令人费解。在接下来的章节中，你将能够理解其中的大部分，但有些标签的使用肯定超出了本书的范围。\n\n如果你对 facet 是什么感到好奇，我可以告诉你，它是一个特定于特定组件的命名子组件。例如，`h:gridPanel`（它渲染一个\
    \ HTML 表格）支持两个 facet：`header` 和 `footer`。如果你在 `h:gridPanel` 体内的任何位置包含 `<f:facet\
    \ \"header\"><h:outputText value=\"Whatever\"/></f:facet>`，渲染后的表格将有一个标题 “Whatever”。\n\
    \n我将在下一章中讨论转换器和验证器，届时我将描述我在[第 6 章](#Chapter06.html)中介绍的 `eshopx` 项目的 JSF 版本。在本章中，作为核心标签的一个有趣示例，我将描述如何使用\
    \ `f:ajax`，它是在 2.0 版本中首次添加到核心库中的。为了做到这一点，我将首先一般性地介绍 Ajax，并向你展示在引入 `f:ajax` 之前是如何使用它的。\n\
    \n##### 什么是 Ajax？\n\n异步 JavaScript 和 XML (Ajax) 是一种让 JavaScript 与服务器*异步*通信的机制——也就是说，无需重新加载页面。这是通过\
    \ JavaScript 内置对象 `XMLHttpRequest` 实现的。对于那些不熟悉 JavaScript 的人，我在[附录 A](#AppendixA.html)\
    \ 中添加了一些关于它的说明。\n\n实际上，它的工作原理是这样的：你在 JavaScript 中创建一个 `XMLHttpRequest` 对象，使用它向服务器发送请求，获取响应，然后，你就有了网页的新数据，而无需重新加载它。嗯，听起来很容易，但做起来并不简单，维护起来更棘手。为了解释如何使用\
    \ Ajax，我将展示一个显示服务器时间的简单页面示例。首先，你需要编写一个返回时间的 JSP 页面（参见[清单 7-14](#Chapter07.html#list_7_14)）。\n\
    \n***清单 7-14.** time.jsp*\n\n```\n<%@page language=\"java\" contentType=\"text/html\"\
    \n  %><%@page import=\"java.util.*\"\n  %><% out.print(new GregorianCalendar().getTime());\
    \ %>\n```\n\n我删除了 print 语句之前和之后的所有空格和换行符，包括末尾的换行符。这确保只返回时间。如果你在浏览器中键入此脚本的 URL，你将得到如下内容：\n\
    \n```\nSat Jun 23 21:56:27 EST 2012\n```\n\n你可能会看到其他时区，但格式是相同的。检查你所在时区缩写的一个好地方是\
    \ [`http://www.timeanddate.com/library/abbreviations/timezones/`](http://www.timeanddate.com/library/abbreviations/timezones/)。\n\
    \n现在你已经有了获取服务器时间的方法，你可以编写使用 Ajax 显示它的页面，如 [清单 7-15](#Chapter07.html#list_7_15)\
    \ 所示。\n\n***清单 7-15.** ajax.xhtml*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
    ?>\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\n    \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
    \n    >\n<html >\n<head>\n  <title>Example of Ajax</title>\n**  <script type=\"\
    text/javascript\" src=\"ajax.js\"></script>**\n  </head>\n<body>\n  <form name=\"\
    tForm\" action=\"\">\n    <span>The time on the server is:</span>\n    <input\
    \ type=\"text\" name=\"tElement\" readonly=\"readonly\" size=\"30\"/>\n    <input\
    \ type=\"button\" value=\"Update\"\n**        onclick=\"ajaxFun('tForm', 'tElement');\"\
    **\n        />\n    </form>\n  </body>\n</html>\n```\n\n如你所见，我突出显示了两行。第一行是你加载文件\
    \ `ajax.js` 的地方，其中包含支持 Ajax 操作的 JavaScript 代码。第二行是你每当单击 `Update` 按钮时执行 `ajaxFun`\
    \ JavaScript 函数的地方。请注意，你向 `ajaxFun` 传递了表单和要更新的输入元素的名称。你本可以在 JavaScript 中硬编码字符串\
    \ `\"tForm.tElement\"`，但在 `ajax.js` 中使用在其他地方定义的标识符是一种不好的编程实践。全局变量不可避免地会导致代码难以维护，应尽可能避免。\n\
    \n为了完成对 Ajax 的简要介绍，我仍然需要向你展示 JavaScript 代码。但是，在此之前，请查看[图 7-6](#Chapter07.html#fig_7_6)\
    \ 以了解浏览器如何渲染页面。要测试该应用程序，请将本章软件包中的 `ajax` 文件夹复制到 Tomcat 的 `webapps` 文件夹，并在浏览器中键入\
    \ [`http://localhost:8080/ajax/`](http://localhost:8080/ajax/)。\n\n![Image](images/9781430246237_Fig07-06.jpg)\n\
    \n***图 7-6.** 使用 Ajax 的服务器时间*\n\n[清单 7-16](#Chapter07.html#list_7_16) 显示了 JavaScript\
    \ 代码。\n\n***清单 7-16.** ajax.js*\n\n```\nfunction ajaxFun(tf, te){\n  var tElem\
    \ = eval(\"document.\" + tf + \".\" + te)\n  var ajaxReq;\n  try { // Firefox,\
    \ Opera, IE 9, Chrome\n    ajaxReq = new XMLHttpRequest();\n    }\n  catch (e)\
    \ { // older IEs\n    try{\n      ajaxReq = new ActiveXObject(\"Msxml2.XMLHTTP\"\
    );\n      }\n    catch (e) {\n      try{ // still older IEs\n        ajaxReq =\
    \ new ActiveXObject(\"Microsoft.XMLHTTP\");\n        }\n      catch (e) {\n  \
    \      alert(\"Your browser does not support Ajax!\");\n        return false;\n\
    \        }\n      }\n    }\n  ajaxReq.open(\"GET\", \"time.jsp\");\n  ajaxReq.send(null);\n\
    \  ajaxReq.onreadystatechange = function() {\n    if(ajaxReq.readyState == 4)\
    \ {\n      tElem.value = ajaxReq.responseText;\n      }\n    }\n  }\n```\n\n首先，你实例化一个类型为\
    \ `XMLHttpRequest` 的对象。这适用于 Firefox、Chrome、Opera 和 IE 9；我不确定它是否适用于 IE 7 和 8；我知道它不适用于\
    \ IE 6。这就是为什么，为了安全起见，我添加了代码，以便在 `XMLHttpRequest` 实例化失败时实例化正确的 `ActiveXObject`。\n\
    \n无论如何，当 `ajaxReq` “持有”一个正确类型的对象时，你设置 HTML 请求方法（例如，`GET`）和目标 URL（在这种情况下，是 JSP\
    \ 模块 `time.jsp`）。此时，你可以发送请求了。\n\n![Image](images/square.jpg) **提示** IE 的缓存会阻止\
    \ Ajax 在第一次单击 `Update` 按钮后更新日期。为了避免这个问题，你可以单击 IE 9 的齿轮按钮，选择 `Internet Options`，单击\
    \ `Browsing History` 部分的 `Settings` 按钮，然后在 `Check for newer versions of stored\
    \ pages` 下，选择 `every time I visit the web page`。这将禁用浏览器缓存并解决问题。你也可以通过向页面的 `head`\
    \ 添加以下元素之一来禁用特定页面的缓存：\n\n```\n<meta http-equiv=\"Pragma\" content=\"no-cache\"\
    >\n<meta http-equiv=\"Cache-Control\" content=\"no-cache\">\n```\n\n控制权立即返回到 JavaScript（记住，Ajax\
    \ 的第一个字母代表 *asynchronous*）。通常，你不希望浏览器等待响应，并且你希望你的页面能够做其他事情。这种异步性使得 Ajax 比如果其操作必须按顺序完成更有用。当请求的状态发生变化时，浏览器执行函数\
    \ `ajaxReq.onreadystatechange`。在该函数中，你需要检查请求是否已完成：在这种情况下，你可以将响应的内容显示在时间字段中。很酷！如果你好奇可能的状态代码，请查看[表\
    \ 7-3](#Chapter07.html#tab_7_3)。\n\n![Image](images/9781430246237_Tab07-03.jpg)\n\
    \n对于这个例子，我采用了极简主义的方法。想法是让你的服务器发回一个 XML 文档，然后你可以在客户端解析它。你可以在以下 URL 找到 Ajax 标准的最新版本：[`http://www.w3.org/TR/XMLHttpRequest/`](http://www.w3.org/TR/XMLHttpRequest/)。\n\
    \n最后一件事：[清单 7-17](#Chapter07.html#list_7_17) 显示了此应用程序的部署描述符。\n\n***清单 7-17.**\
    \ web.xml*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<web-app\n  \n\
    \    xsi:schemaLocation=\"http://java.sun.com/xml/ns/javaee ~CCC\nhttp://java.sun.com/xml/ns/javaee/web-app_2_5.xsd\"\
    \n    version=\"2.5\">\n  <display-name>Ajax example</display-name>\n  <welcome-file-list>\n\
    \    <welcome-file>index.xhtml</welcome-file>\n    <welcome-file>index.html</welcome-file>\n\
    \    </welcome-file-list>\n</web-app>\n```\n\n如你所见，它几乎是空的。我只添加了几个 welcome-file\
    \ 元素，以便 Tomcat 仅在 `index.xhtml` 不存在时才尝试 `index.html`（这是默认值）。\n\n现在你知道了 Ajax 在没有\
    \ JSF 的情况下是如何工作的，让我们看看如何使用 `f:ajax` 来实现相同的结果。\n\n##### f:ajax\n\n使用 `f:ajax` 而不是我在上一节中描述的机制有几个优点，其中最重要的，在我看来，是你不再需要用\
    \ JavaScript 编写代码，这为混合添加了另一种 Java 风格（而且有些人也会在他们的浏览器上禁用 JavaScript）。此外，`f:ajax`\
    \ 与其他 JSF 库完全集成。\n\n[图 7-4](#Chapter07.html#fig_7_4) 显示了 JSF 生命周期的六个阶段。使用 `f:ajax`，你可以选择性地在服务器上*执行*组件，通过前五个阶段处理它们，或者*渲染*它们，通过最后一个阶段传递它们。你通过将组件包含在\
    \ `f:ajax` 的主体中或将组件 id 传递给 `f:ajax` 来*ajaxify* 一个组件。\n\n要将上一节的 Ajax 示例转换为 JSF\
    \ 的 Ajax，让我们从 `ajaxf.xhtml` 开始，如[清单 7-18](#Chapter07.html#list_7_18) 所示。有趣的部分以粗体突出显示。\n\
    \n要测试该应用程序，请将本章软件包中的 `ajaxf` 文件夹复制到 Tomcat 的 `webapps` 文件夹，并在 Web 浏览器中键入 [`http://localhost:8080/ajaxf`](http://localhost:8080/ajaxf)。\n\
    \n***清单 7-18.** ajaxf.xhtml*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
    ?>\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\n    \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
    \n    >\n<html\n  \n      >\n<h:head><title>Example of Ajax with JSF</title></h:head>\n\
    <h:body>\n  <h:form>\n    <h:outputText value=\"The time on the server is: \"\
    />\n**    <h:outputText id=\"timeField\" value=\"#{serverTimeBean.when}\"/>**\n\
    \    <h:outputText value=\" \"/>\n**    <h:commandButton value=\"Update\">**\n\
    **      <f:ajax render=\"timeField\"/>**\n**      </h:commandButton>**\n    </h:form>\n\
    \  </h:body>\n</html>\n```\n\n第一个突出显示的行简单地显示了托管 bean `serverTimeBean` 的属性 `when`\
    \ 的值。它几乎与你在本章开头遇到的 `second.jsp`（[清单 7-2](#Chapter07.html#list_7_2)）中的行 `<h:outputText\
    \ value=\"&quot;#{aStringBean.str}&quot; \"/>` 相同。\n\n但这一次，我向 `h:outputText` 添加了\
    \ `id` 属性的设置。这是因为我们需要在第二组突出显示的行中将其传递给 `f:ajax`。\n\n`h:commandButton` 元素，与你之前在示例中看到的相反，不会将控制权转移到另一个页面。它的目的只是创建一个触发\
    \ `f:ajax` 的事件。因此，`action` 属性不存在，如果你查看应用程序的 `WEB-INF` 文件夹，你会看到没有 `faces-config.xml`\
    \ 来处理导航。\n\n每次用户单击 `Update` 按钮时，`f:ajax` 都会向服务器发送一个请求以获取 `serverTimeBean.when`\
    \ 的值，然后由带有 `id` `timeField` 的 `h:outputText` 元素显示。你不需要编写 JavaScript，因为 JSF 会自动生成发送\
    \ Ajax 请求的小脚本。\n\n但是你确实需要一个像 [清单 7-19](#Chapter07.html#list_7_19) 中那样的 Java bean。\n\
    \n***清单 7-19.** ServerTime.java*\n\n```\nimport javax.faces.bean.ManagedBean;\n\
    import javax.faces.bean.SessionScoped;\nimport javax.faces.bean.ManagedProperty;\n\
    import java.util.GregorianCalendar;\n@ManagedBean(name=\"serverTimeBean\")\n@SessionScoped\n\
    public class ServerTime {\n  @ManagedProperty(value=\"#{ServerTime.when}\")\n\
    \  private String when;\n  public ServerTime() { when = new GregorianCalendar().getTime().toString();\
    \ }\n  public String getWhen() { return new GregorianCalendar().getTime().toString();\
    \ }\n  public void setWhen(String w) { when = w; }\n  }\n```\n\n代码几乎与 `AString.java`（[清单\
    \ 7-9](#Chapter07.html#list_7_9)）相同，主要区别在于它有一个初始化方法，并且显然生成了一个带有当前服务器时间的字符串。在软件包中，你还会找到完成应用程序的文件\
    \ `index.jsp` 和 `web.xml`，但它们与你已经在其他应用程序中遇到的等效文件非常相似。\n\n如果你将 `ajaxf.html` 中 `h:body`\
    \ 的内容替换为 [清单 7-20](#Chapter07.html#list_7_20) 中显示的代码，你将获得相同的结果。\n\n***清单 7-20.**\
    \ ajaxf.xhtml 的替代 h:body*\n\n```\n<h:form>\n  <f:ajax render=\"@form\" event=\"\
    click\"/>\n  <h:outputText value=\"The time on the server is: \"/>\n  <h:outputText\
    \ value=\"#{serverTimeBean.when} \"/>\n  <h:commandButton value=\"Update\"/>\n\
    \  </h:form>\n```\n\n通过这些设置，你 ajaxify 了表单的所有组件。因此，当你单击 `Update` 按钮时，JSF 会发送一个\
    \ Ajax 请求，就像之前一样，并且因为 `render` 属性设置为 `@form`，`serverTimeBean.when` 也会像之前一样被更新。适用于整个表单的事件有\
    \ `click`、`dblclick`、`keydown`、`keypress`、`keyup`、`mousedown`、`mousemove`、`mouseout`、`mouseover`\
    \ 和 `mouseup`。\n\n对于表单中的输入元素，当用户更改其中任何一个的内容时，也会触发一个 Ajax 请求。要测试它，请将 `h:commandButton`\
    \ 替换为 `h:inputText` 元素，如 [清单 7-21](#Chapter07.html#list_7_21) 所示。\n\n***清单 7-21.**\
    \ ajaxf.xhtml 的另一个 h:body*\n\n```\n<h:form>\n  <h:outputText value=\"The time\
    \ on the server is: \"/>\n  <h:outputText id=\"timeField\" value=\"#{serverTimeBean.when}\
    \ \"/>\n  <h:inputText value=\"#{serverTimeBean.when}\" size=\"30\">\n    <f:ajax\
    \ render=\"@this timeField\" event=\"blur\"/>\n    </h:inputText>\n  </h:form>\n\
    ```\n\n结果页面如 [图 7-7](#Chapter07.html#fig_7_7) 所示。\n\n![Image](images/9781430246237_Fig07-07.jpg)\n\
    \n***图 7-7.** 修改后的 ajaxf.xhtml*\n\n只要你停留在输入字段内，什么也不会发生。当你按 `enter` 或单击外部时，Ajax\
    \ 会向服务器发送一个请求来更新 `h:inputText` 中指定的属性。在示例中，它发送一个请求将 `serverTimeBean.when` 设置为\
    \ “Sun Jun 24 012”。JSF 在更新模型值阶段执行此操作。然后，在渲染响应期间，Tomcat 准备带有两个从 `serverTimeBean.when`\
    \ 获得值的 Javax 响应，一个用于 `h:outputText`，一个用于 `h:inputText`。由于 `ServerTime.java` 总是生成一个新的时间字符串，这就是返回给浏览器的内容，而你在输入字段中键入的内容在\
    \ bean 的变量 `when` 中未被使用。\n\n输入字段可能的事件有：`blur`、`change`、`click`、`dblclick`、`focus`、`keydown`、`keypress`、`keyup`、`mousedown`、`mousemove`、`mouseout`、`mouseover`、`mouseup`、`select`\
    \ 和 `valueChange`。默认值是 `valueChange`。\n\n`render` 属性的值可以是单个标识符、空格分隔的标识符列表，或者是特殊字符串\
    \ `@all`、`@this`、`@form` 和 `@none`。一件有趣的事情（我不一定推荐）是，你可以在单个 `f:ajax` 元素中指定多个表单中的组件标识符。例如，\n\
    \n```\n<f:ajax render=\":form1:id3 id1 @this\"/>\n```\n\n意味着 JSF 为 `id` 设置为 `form1`\
    \ 的表单的组件 `id3`、包含 `f:ajax` 元素的表单的组件 `id1` 以及包含 `f:javax` 元素的组件触发一个单一的 Ajax 请求。\n\
    \n在我们继续之前，我想向你展示另一个 `f:ajax` 的例子。查看[图 7-8](#Chapter07.html#fig_7_8)。\n\n![Image](images/9781430246237_Fig07-08.jpg)\n\
    \n***图 7-8.** 使用 loginf 生成的页面*\n\n你可以在本章软件包的 `loginf` 文件夹中找到该应用程序。它与 `ajaxf` 非常相似。[清单\
    \ 7-22](#Chapter07.html#list_7_22) 显示了托管 bean，[清单 7-23](#Chapter07.html#list_7_23)\
    \ 显示了 `loginf.xhtml`。\n\n***清单 7-22.** Login.java*\n\n```\nimport javax.faces.bean.ManagedBean;\n\
    import javax.faces.bean.SessionScoped;\n@ManagedBean(name=\"loginBean\")\n@SessionScoped\n\
    public class Login {\n  private String user = \"\";\n  public String getUser()\
    \ { return user; }\n  public void setUser(String u) { user = u; }\n\n  private\
    \ String pass = \"\";\n  public String getPass() { return pass; }\n  public void\
    \ setPass(String p) { pass = p; }\n\n  public String getMess() {\n    String mess\
    \ = \"\";\n    if (user.length() * pass.length() > 0) {\n      mess = \"Welcome\
    \ \" + user + \"!\";\n      }\n    else if (pass.length() > 0) {\n      if (user.length()\
    \ == 0) mess = \"Who the %@$# are you?\";\n      }\n    else {\n      if (user.length()\
    \ > 0) mess = \"No password \" + user + \"?\";\n      }\n    return mess;\n  \
    \  }\n  }\n```\n\n这里没什么特别的：一个用于存储用户 ID 的属性，一个用于密码，以及一个只读属性用于向用户提供反馈。\n\n***清单\
    \ 7-23.** loginf.xhtml*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE\
    \ html PUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\n    \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
    \n    >\n<html\n  \n      >\n<h:head><title>Example of login with f:ajax</title></h:head>\n\
    <h:body>\n  <h:form>\n    <h:panelGrid columns=\"2\">\n      <h:outputText value=\"\
    User ID:\"/>\n**      <h:inputText id=\"user\" value=\"#{loginBean.user}\"/>**\n\
    \      <h:outputText value=\"Password:\"/>\n**      <h:inputSecret id=\"pass\"\
    \ value=\"#{loginBean.pass}\"/>**\n      </h:panelGrid>\n    <h:commandButton\
    \ value=\"Submit\">\n**      <f:ajax execute=\"user pass\" render=\"mess\"/>**\n\
    \      </h:commandButton>\n    <br/>\n**    <h:outputText id=\"mess\" value=\"\
    #{loginBean.mess}\"/>**\n    </h:form>\n  </h:body>\n</html>\n```\n\n两个输入组件接受用户的用户\
    \ ID 和密码，最后一个 `h:outputText` 显示反馈。有趣的部分是 `f:ajax` 元素。你已经遇到过 `render` 属性，但 `execute`\
    \ 属性是新的。这就是 `f:ajax` 将要处理的数据发送到服务器的方式。我关于 `render` 解释的大部分内容也适用于 `execute`，包括特殊\
    \ `@` 值的可用性。\n\n不再需要重新加载 `login` 页面。\n\n#### `facelet` 库\n\nFacelets 最初是作为 JSP\
    \ 的替代视图处理技术而开发的。随着 JSF 2.0 的发布，facelets 已成为其默认的视图技术。但这并不意味着，在必要的注意下，你不能将它们与 JSP\
    \ 和 JSTL 一起使用。使 JSF 的 `facelet` 库有趣的是它支持模板化。也就是说，一种允许你在开发具有相同布局或公共内容的页面时最大限度地减少代码重复的机制。\n\
    \n虽然 JSP 使用 `jsp:include` 提供了一种重用内容的简单机制，但它没有提供任何简单的方法来为不同的页面定义相同的布局。你需要自己确保页面在浏览器中查看时看起来相同。\n\
    \nJSF `facelet` 库允许你通过在一个 XHTML 文件中定义布局，然后用一个或多个其他 XHTML 文件中定义的内容填充它来形成一个页面。我将很快向你展示一个示例，但首先，请查看[表\
    \ 7-4](#Chapter07.html#tab_7_4)，其中列出了 `facelet` 库的所有标签。为了帮助你理解这些标签，我标记了那些属于模板化机制的标签。\n\
    \n![Image](images/9781430246237_Tab07-04.jpg)\n\n##### templ 应用程序\n\n在本节中，我将描述\
    \ `templ`，一个使用 facelet 模板化的应用程序。\n\n为了创建它，我从本章前面部分解释的示例 `simplefx` 开始。你会记得它基本上由两个相互调用的\
    \ JSP 文档组成：`first.jspx` 要求你在文本字段中键入一些内容，`second.jspx` 显示你键入的内容。\n\n为了制作一个模板化的示例，我添加了第三个页面，它与第二个页面几乎相同，这样我就可以向你展示如何为它们定义一个模板。首先，让我们看看前两个页面在\
    \ Web 浏览器中的外观（[图 7-9](#Chapter07.html#fig_7_9) 和 [7-10](#Chapter07.html#fig_7_10)）。\n\
    \n![Image](images/9781430246237_Fig07-09.jpg)\n\n***图 7-9.** templ 第一页*\n\n![Image](images/9781430246237_Fig07-10.jpg)\n\
    \n***图 7-10.** templ 第二页*\n\n请注意，第二页的标题是灰色的，而不是黑色的。第三页与第二页相同，但其标题是 “Third page”，按钮前的文本以\
    \ “Page 3” 开头。要尝试它，请将本章软件包中的 `templ` 文件夹复制到 Tomcat 的 `webapps` 文件夹，然后在浏览器中键入 [`http://localhost:8080/templ/`](http://localhost:8080/templ/)。\n\
    \n该应用程序由以下文件夹和文件组成（为便于阅读，文件夹以粗体显示）：\n\n```\n**templ**\n    first.xhtml\n    index.jsp\n\
    \    page2.xhtml\n    page3.xhtml\n**    resources**\n**        css**\n      \
    \      styles.css\n**    templates**\n**        defaults**\n            header.xhtml\n\
    \        layout.xhtml\n**    WEB-INF**\n**        classes**\n            AString.class\n\
    \            AString.java\n        faces-config.xml\n        web.xml\n```\n\n\
    [清单 7-24](#Chapter07.html#list_7_24) 显示了第一页的代码。\n\n***清单 7-24.** first.xhtml*\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<jsp:root\n  \n  version=\"\
    2.1\"\n  >\n<jsp:directive.page\n  language=\"java\"\n  contentType=\"application/xhtml+xml;charset=UTF-8\"\
    \n  />\n<jsp:output omit-xml-declaration=\"false\"/>\n<jsp:output\n  doctype-root-element=\"\
    html\"\n  doctype-public=\"-//W3C//DTD XHTML 1.0 Strict//EN\"\n  doctype-system=\"\
    http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\n  />\n<html\n    \n     \
    \ >\n<h:head><title>First Page</title></h:head>\n<h:body>\n<f:view>\n  <ui:include\
    \ src=\"/templates/defaults/header.xhtml\"/>\n  <h:form>\n    <h:outputText value=\"\
    Type something here: \"/>\n    <h:inputText value=\"#{aStringBean.str}\"/>\n \
    \   <h:commandButton action=\"go2\" value=\"Page 2\"/>\n    <h:commandButton action=\"\
    go3\" value=\"Page 3\"/>\n    </h:form>\n  </f:view>\n</h:body>\n</html>\n</jsp:root>\n\
    ```\n\n首先，请注意我将文件重命名为 `first.xhtml`。这是因为 facelet 元素（即前缀为 `ui` 的元素）只能在 `h:body`\
    \ 内部工作。这意味着你不能再使用 HTML `body` 标签。由于 `h:body` 要求文档的扩展名为 `xhtml`，我不得不放弃扩展名 `jspx`。老莎士比亚通过朱丽叶的嘴唇说过，“名字有什么关系？我们把玫瑰叫做别的名字，它依然芬芳。”\
    \ 同样适用于 `first.xhtml`，尽管名称更改，它仍然是一个有效的 JSP 文档。\n\n与 `first.jspx` 的另一个区别是，我将核心和\
    \ HTML JSF 库的命名空间声明从 `jsp:root` 移到了 `html` 标签，然后为它们添加了 JSF facelet 库的声明。由于在 `html`\
    \ 元素之外没有使用任何 JSF 标签，将它们保留在那里是有意义的，这也是它们在 XHTML 文档中通常的位置。\n\n最后，请注意 `first.xhtml`\
    \ 使用 `ui:include` 包含了一个标准标题。\n\n到目前为止，一切顺利。没什么太令人兴奋的。你也可以使用 `jsp:include` 完成同样的事情，而不需要\
    \ facelets。但现在让我们看看 `page2.xhtml`（[清单 7-25](#Chapter07.html#list_7_25)），特别是它的\
    \ `h:body` 元素。顺便说一下，我没有技术上的理由将 `second.jspx` 重命名为 `page2.xhtml`。我只是觉得 `page2`\
    \ 和 `page3` 比 `second` 和 `third` 更有吸引力。\n\n***清单 7-25.** page2.xhtml*\n\n```\n\
    <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<jsp:root\n  \n  version=\"2.1\"\n\
    \  >\n<jsp:directive.page\n  language=\"java\"\n  contentType=\"application/xhtml+xml;charset=UTF-8\"\
    \n  />\n<jsp:output omit-xml-declaration=\"false\"/>\n<jsp:output\n  doctype-root-element=\"\
    html\"\n  doctype-public=\"-//W3C//DTD XHTML 1.0 Strict//EN\"\n  doctype-system=\"\
    http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\n  />\n<html\n    \n     \
    \ >\n<h:body>\n**  <ui:composition template=\"/templates/layout.xhtml\">**\n**\
    \    <ui:define name=\"title\">Second page</ui:define>**\n**    <ui:define name=\"\
    pageNum\">2</ui:define>**\n**    </ui:composition>**\n</h:body>\n</html>\n</jsp:root>\n\
    ```\n\n请注意，`page2.xhtml` 中没有 `h:head` 元素。这是因为当 JSF 遇到 `ui:composition` 元素时，它会忽略\
    \ `h:body` 内容以外的所有内容。你说得对：JSF 只查看我在[清单 7-25](#Chapter07.html#list_7_25) 中突出显示的行。\n\
    \n但是，你可能会问，我们为什么还要费心处理 `h:body` 标签之前的所有内容呢？原因是该文件必须是一个有效的 XML 文档。但确实，我们可以简化它。这就是为什么我删除了\
    \ `h:head` 元素（JSF 无论如何都会忽略它），没有它，代码仍然是有效的 XML。对于一个在 `h:body` 内部不使用 JSP 标签的页面，你还可以去掉\
    \ JSP 元素。这就是我对 `page3.xhtml` 所做的，你可以在 [清单 7-26](#Chapter07.html#list_7_26) 中看到。\n\
    \n***清单 7-26.** page3.xhtml*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
    ?>\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\n    \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
    \n    >\n<html\n    \n      >\n<h:body>\n**  <ui:composition template=\"/templates/layout.xhtml\"\
    >**\n**    <ui:define name=\"title\">Third page</ui:define>**\n**    <ui:define\
    \ name=\"pageNum\">3</ui:define>**\n**    </ui:composition>**\n</h:body>\n</html>\n\
    ```\n\n显然，当你在 `h:body` 内部使用 JSP 代码时，你不能移除 JSP 头部元素和 `jsp:root`。但是你可以使用 JSTL 和你自己的自定义标签库，而无需声明\
    \ `jsp` 命名空间，只要你在 `html` 标签中声明适当的命名空间即可。在任何情况下，无论是否使用 JSP 声明，你肯定不能使用的是 JSP 脚本和指令元素，因为任何包含在\
    \ `<%` 和 `%>` 之间的内容都不是有效的 XML。\n\n让我们回到描述 JSF 如何处理使用模板的页面。\n\n存在一个带有已定义 `template`\
    \ 属性的 `ui:composition` 元素意味着，生成要发送回用户作为响应的页面的是模板文档，而不是包含 `ui:composition` 元素的页面。\n\
    \n[清单 7-27](#Chapter07.html#list_7_27) 显示了 `page*.xhtml` 的模板。\n\n***清单 7-27.**\
    \ layout.xhtml*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE\
    \ html PUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\n\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
    >\n<html\n    \n      >\n\n<h:head>\n  <title>\n**    <ui:insert name=\"title\"\
    >Default Title</ui:insert>**\n    </title>\n  <h:outputStylesheet name=\"styles.css\"\
    \ library=\"css\"/>\n</h:head>\n\n<h:body>\n<f:view>\n  <ui:insert name=\"header\"\
    >\n    <ui:include src=\"/templates/defaults/header.xhtml\"/>\n    </ui:insert>\n\
    \  <h:form>\n    <h:outputText value=\"Page \"/>\n**    <ui:insert name=\"pageNum\"\
    />**\n    <h:outputText value=\" has received &quot;#{aStringBean.str}&quot; \"\
    />\n    <h:commandButton action=\"goBack\" value=\"Back to first page\"/>\n  \
    \  </h:form>\n</f:view>\n</h:body>\n</html>\n```\n\n两个突出显示的行标识了模板期望“客户端”页面插入内容的两个位置。如果你回到\
    \ `page2.xhtml` 和 `page3.xhtml`（[清单 7-25](#Chapter07.html#list_7_25) 和 [7-26](#Chapter07.html#list_7_26)），你会看到\
    \ `ui:composition` 内部的 `ui:define` 具有与模板的两个 `ui:insert` 相同的 `name` 属性。\n\n当使用\
    \ `layout.xhtml` 生成对发送到 `page2.xhtml` 的请求的响应时，元素 `<ui:insert name=\"title\">Default\
    \ Title</ui:insert>` 被替换为字符串 “Second page”，元素 `<ui:insert name=\"pageNum\"/>`\
    \ 被替换为 “2”。对于 `page3.xhtml`，字符串是 “Third page”，页码是 “3”。请注意，`ui:insert` 的主体是该插入的默认值，当“客户端”页面没有定义任何值时使用。\n\
    \n请注意，`layout.xhtml` 和 `first.xhtml` 都包含一个默认标题（如 [清单 7-28](#Chapter07.html#list_7_28)\
    \ 所示）。\n\n***清单 7-28.** header.xhtml*\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\n\
    \    \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\n    >\n<html\
    \   \n  \n      >\n<h:body>\n  <ui:composition>\n**    <h1>Example of Templating</h1>**\n\
    \    </ui:composition>\n</h:body>\n</html>\n```\n\n在 `header.xhtml` 中，元素 `ui:composition`\
    \ 没有定义 `template` 属性。它的存在确保了当 `header.xhtml` 被 `ui:include` 包含时，页面的其余部分被忽略。实际上，`header.xhtml`\
    \ 中唯一需要的行是我突出显示的那一行。但是拥有一个格式良好的 XHTML 页面的好处是你可以直接在浏览器中查看它。对于更复杂的页面，有时能够这样做是很有用的。\n\
    \n还有一件事我需要澄清。你注意到第一页中显示的标题（参见[图 7-9](#Chapter07.html#fig_7_9)）是黑色的，而第二页的标题（参见[图\
    \ 7-10](#Chapter07.html#fig_7_10)）是灰色的吗？\n\n这是因为模板使用元素 `<h:outputStylesheet name=\"\
    styles.css\" library=\"css\"/>` 加载了一个样式表，该样式表将标题的颜色定义为灰色。\n\n由于 `first.xhtml`\
    \ 不使用模板，标题的颜色保持默认的黑色。显然，没有什么能阻止你在 `first.xhtml` 中使用样式表，只需在其 `h:head` 中放置与模板中使用的相同元素即可。或者，你也可以使用\
    \ HTML 元素 `<link rel=\"stylesheet\" type=\"text/css\" href=\"/templ/resources/css/styles.css\"\
    />`。\n\n仍然关于使用 `h:outputStylesheet` 链接到样式表：请注意，`resources` 文件夹的名称没有出现在任何地方。这意味着它在组件内部是硬编码的，你只能使用它。但是文件夹名称\
    \ `templates` 和 `defaults` 完全是我选择的。因此，你可以选择你喜欢的名称。\n\n为了完成对 `templ` 应用程序的描述，我仍然需要向你展示\
    \ `web.xml`（[清单 7-29](#Chapter07.html#list_7_29)），它非常明显，以及 `faces-config.xml`（[清单\
    \ 7-30](#Chapter07.html#list_7_30)），它也是不言自明的。\n\n***清单 7-29.** web.xml*\n\n```\n\
    <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<web-app version=\"2.5\"\n  \n  xsi:schemaLocation=\"\
    http://java.sun.com/xml/ns/javaee http://java.sun.com/xml/ns/javaee/web-\napp_2_5.xsd\"\
    >\n<servlet>\n  <servlet-name>Faces Servlet</servlet-name>\n  <servlet-class>javax.faces.webapp.FacesServlet</servlet-class>\n\
    \  <load-on-startup>1</load-on-startup>\n  </servlet>\n<servlet-mapping>\n  <servlet-name>Faces\
    \ Servlet</servlet-name>\n  <url-pattern>*.jsf</url-pattern>\n  </servlet-mapping>\n\
    <context-param>\n  <param-name>javax.faces.DEFAULT_SUFFIX</param-name>\n  <param-value>.xhtml</param-value>\n\
    \  </context-param>\n</web-app>\n```\n\n***清单 7-30.** faces-config.xml*\n\n```\n\
    <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<faces-config\n  \n    xsi:schemaLocation=\"\
    http://java.sun.com/xml/ns/javaee\nhttp://java.sun.com/xml/ns/javaee/web-facesconfig_2_0.xsd\"\
    \n    version=\"2.0\"\n    >\n  <navigation-rule>\n    <from-view-id>/first.xhtml</from-view-id>\n\
    \    <navigation-case>\n      <from-outcome>go2</from-outcome>\n      <to-view-id>/page2.xhtml</to-view-id>\n\
    \      </navigation-case>\n    <navigation-case>\n      <from-outcome>go3</from-outcome>\n\
    \      <to-view-id>/page3.xhtml</to-view-id>\n      </navigation-case>\n    </navigation-rule>\n\
    \  <navigation-rule>\n    <from-view-id>/page2.xhtml</from-view-id>\n    <navigation-case>\n\
    \      <from-outcome>goBack</from-outcome>\n      <to-view-id>/first.xhtml</to-view-id>\n\
    \      </navigation-case>\n    </navigation-rule>\n  <navigation-rule>\n    <from-view-id>/page3.xhtml</from-view-id>\n\
    \    <navigation-case>\n      <from-outcome>goBack</from-outcome>\n      <to-view-id>/first.xhtml</to-view-id>\n\
    \      </navigation-case>\n    </navigation-rule>\n  </faces-config>\n```\n\n\
    ##### 动作控制器和动作监听器\n\n到目前为止，你只看到了 `h:commandButton` 的 `action` 属性设置为固定字符串的示例。但你也可以将其设置为\
    \ bean 的方法。如果你这样做，当 JSF 在服务器上处理请求时到达调用应用程序阶段时，它会执行该方法，并使用该方法返回的值来决定接下来显示哪个页面。通过这种方式，动作的目标页面是在执行时定义的。\n\
    \n如果这听起来太复杂，让我们看一个例子是否能澄清问题。我们首先复制 `templ` 应用程序并将其重命名为 `templa`。我现在谈论动作控制器和监听器，是因为我已经向你展示了我们可以使用的\
    \ `templ` 应用程序。\n\n我想将 [图 7-9](#Chapter07.html#fig_7_9) 中显示的两个按钮 `Page 2` 和 `Page\
    \ 3` 替换为一个在两个页面之间交替的按钮。为此，我需要添加 [清单 7-31](#Chapter07.html#list_7_31) 中显示的 Java\
    \ 类。\n\n***清单 7-31.** Action.java*\n\n```\nimport javax.faces.bean.ManagedBean;\n\
    import javax.faces.bean.SessionScoped;\n@ManagedBean(name=\"actionBean\")\n@SessionScoped\n\
    public class Action {\n  int n = 3;\n  public int getN() { return 5 - n; }\n \
    \ public String goThere() {\n    n = 5 - n;\n    return \"go\" + n;\n    }\n \
    \ }\n```\n\n请注意，每次执行 `goThere` 时，`n` 在值 2 和 3 之间变化，因此该方法交替返回 “go2” 和 “go3”。还要注意，当\
    \ `n` 为 3 时，`getN` 返回 2，当 `n` 为 2 时，返回 3。\n\n我对 `templ` 所做的唯一其他更改，以将其变为 `templa`，是替换了\
    \ `first.xhtml`（[清单 7-24](#Chapter07.html#list_7_24)）中的以下两行：\n\n```\n<h:commandButton\
    \ action=\"go2\" value=\"Page 2\"/>\n<h:commandButton action=\"go3\" value=\"\
    Page 3\"/>\n```\n\n替换为：\n\n```\n<h:commandButton action=\"#{actionBean.goThere}\"\
    \ value=\"Page #{actionBean.n}\"/>\n```\n\n如果你认为这是一个愚蠢的应用程序，我完全同意你的看法。但最不想要的就是给你一些例子，其中你应该学习的机制被埋没在现实但不必要的复杂性中。请注意，通过将决定下一页面的决策移到动作控制器\
    \ bean 中，你实际上是在将业务逻辑移出视图，从而获得灵活性和可维护性。\n\n话虽如此，我仍然对这个 `goThere` 方法的工作方式不满意。我遇到的问题是，该方法不仅仅选择下一个页面。它还有修改\
    \ `n` 的副作用。有经验的程序员害怕副作用，因为在复杂的应用程序中，它们可能导致非常难以追踪的错误。你想要编写透明的程序，其中没有任何事情“在你背后”发生。\n\
    \n正确的方法是将现在的副作用移到它自己的方法中。查看[清单 7-32](#Chapter07.html#list_7_32) 以获得 `Action.java`\
    \ 的改进版本。\n\n***清单 7-32.** Action.java (最终版)*\n\n```\nimport javax.faces.bean.ManagedBean;\n\
    import javax.faces.bean.SessionScoped;\nimport javax.faces.event.ActionEvent;\n\
    @ManagedBean(name=\"actionBean\")\n@SessionScoped\npublic class Action {\n  int\
    \ n = 3;\n  public int getN() { return 5 - n; }\n  public String goThere() { return\
    \ \"go\" + n; }\n  public void swapPages(ActionEvent event) { n = 5 - n; }\n \
    \ }\n```\n\n显然，你还必须更新 `first.xhtml`。你需要做的就是按如下方式更新 `h:commandButton` 元素：\n\n```\n\
    <h:commandButton action=\"#{actionBean.goThere}\" value=\"Page #{actionBean.n}\"\
    \n    actionListener=\"#{actionBean.swapPages}\"\n    />\n```\n\n在调用应用程序阶段，JSF\
    \ 首先执行动作监听器，然后执行动作控制器。`n` 的值是在渲染响应阶段从 bean 中获取的。这很有效。不过，有时你可能希望 JSF 在收到请求后尽快执行动作监听器，在其他事情发生之前。在这种情况下，你可以向带有\
    \ `actionListener` 的组件添加属性 `immediate=\"true\"`，这会强制动作监听器已经在应用请求值阶段执行。\n\n在下一章中，你将看到动作控制在\
    \ `eshop` 的 JSF 版本中是如何工作的，这是一个更复杂的应用程序。\n\n#### `composite` 库\n\nJSF 基于用户界面组件，但长期以来，创建新组件或将现有组件组合成一个新组件是很困难的。JSF\
    \ 在 2.0 版本中引入了 `composite` 库，以使这些任务更容易。\n\n[表 7-5](#Chapter07.html#tab_7_5) 列出了\
    \ `composite` 库的所有标签。两个标签 `interface` 和 `implementation` 是特殊的，因为它们是其他标签的容器。\n\n\
    ![Image](images/9781430246237_Tab07-05.jpg)\n\n从概念上讲，要定义一个新组件，你需要经历以下步骤：\n\n>\
    \ *   定义其命名空间（即它所在的位置）。\n> *   指定其功能（即它做什么）。\n> *   定义你如何使用它（即它的接口）。\n> *   设计你如何编码它（即它的实现）。\n\
    \n##### 一些示例\n\n要编写第一个示例，让我们经历我在上一节末尾列出的四个点。\n\n> *   定义一个命名空间。我选择了 `gz`。\n> *\
    \   指定其功能。该组件应该用参数化的收件人组成一条问候消息。\n> *   定义你如何使用它。只需用一个属性来传递收件人即可调用它。\n> *   设计你如何编码它。很简单。一个\
    \ `h:outputText` 就可以了。\n\n新组件的代码如 [清单 7-33](#Chapter07.html#list_7_33) 所示。要测试它，请将本章软件包中的\
    \ `composite` 文件夹复制到 Tomcat 的 `webapps` 文件夹，然后在浏览器中键入 [`http://localhost:8080/composite`](http://localhost:8080/composite)。\n\
    \n***清单 7-33.** hello.xhtml*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
    ?>\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\n    \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
    \n    >\n<html\n  \n      >\n<h:head><title>Example of a composite component</title></h:head>\n\
    <h:body>\n  <composite:interface>\n    <composite:attribute name=\"x\"/>\n   \
    \ </composite:interface>\n  <composite:implementation>\n    <h:outputText value=\"\
    Hello, #{cc.attrs.x}!\"/>\n    </composite:implementation>\n  </h:body>\n</html>\n\
    ```\n\n毫不奇怪，对于这样一个简单的组件，代码也很简单。但它告诉了你很多关于使用 `composite` 库开发组件的信息。\n\n首先，在 `h:body`\
    \ 内部，你找到了两个元素，一个 `composite:interface` 和一个 `composite:implementation`。在前者内部，你定义了名为\
    \ `x` 的属性，在后者内部，你定义了组件的逻辑。\n\n要从实现中访问该属性，你使用表达式 `#{cc.attrs.x)`。\n\n[清单 7-34](#Chapter07.html#list_7_34)\
    \ 向你展示了如何使用新组件，[图 7-11](#Chapter07.html#fig_7_11) 是页面在浏览器中的外观。\n\n***清单 7-34.**\
    \ comp.xhtml*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE html\
    \ PUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\n    \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
    \n    >\n<html\n  \n      >\n<h:head><title>Example of a composite component</title></h:head>\n\
    <h:body>\n**  <gz:hello x=\"wherever you are\"/>**\n  </h:body>\n</html>\n```\n\
    \n![Image](images/9781430246237_Fig07-11.jpg)\n\n***图 7-11.** composite*\n\n你在\
    \ `comp.xhtml` 中注意到什么不寻常的地方了吗？你没有单独声明 JSF composite 库和你自定义组件的命名空间，而是声明了一个单一的命名空间\
    \ `composite/gz`。为此，你需要在应用程序的根目录中创建一个名为 `resources` 的文件夹；在 `resources` 内部创建一个文件夹（在示例中，名为\
    \ `gz`）；并将你的自定义组件放在那里。组件的名称（例如，`hello`）是通过移除其扩展名从组件文件名（例如，`hello.xhtml`）获得的。\n\
    \n使用相同的字符串作为前缀和命名 `resources` 内部的文件夹是一种既定的做法，我建议你遵循它，但这两个字符串可以不同。\n\n请注意，如果你在\
    \ `interface` 主体中放置元素，你需要定义一个相应的 `implementation`。但是你可以在 `implementation` 中使用空的\
    \ `interface` 来编写代码，如下所示：\n\n```\n  <composite:interface/>\n  <composite:implementation>\n\
    \    <h:outputText value=\"Hello, World!\"/>\n    </composite:implementation>\n\
    ```\n\n这仅仅意味着你的新组件将没有任何要设置的属性。\n\n要在复合组件中包含一个输入组件，请像在 `hello.xhtml` 中对输出组件所做的那样做。事实上，如果你将\
    \ `hello.xhtml` 中的行 `<h:outputText value=\"Hello, #{cc.attrs.x}!\"/>` 替换为 `<h:inputText\
    \ value=\"Hello, #{cc.attrs.x}!\"/>`，你将看到 [图 7-12](#Chapter07.html#fig_7_12) 中显示的页面，但请注意，这不是一个工作页面。它只是向你展示如何使用\
    \ `composite:attribute`。\n\n![Image](images/9781430246237_Fig07-12.jpg)\n\n***图\
    \ 7-12.** 带有输入元素的 composite*\n\n你也可以使用 `composite:attribute` 来设置 `h:commandButton`\
    \ 和 `h:commandLink` 的 `action` 属性。例如，如果你想构建一个名为 `flip` 的复合组件，围绕你在几页前在 `templa`\
    \ 中使用的 `h:commandButton`，`flip.xhtml` 的主体将如下所示：\n\n```\n<composite:interface>\n\
    \  <composite:attribute name=\"act\" targets=\"myB\" method-signature=\"java.lang.String\
    \ action()\"/>\n  </composite:interface>\n<composite:implementation>\n  <h:commandButton\
    \ id=\"myB\" action=\"#{cc.attrs.act}\" value=\"Page #{actionBean.n}\"\n     \
    \ actionListener=\"#{actionBean.swapPages}\"\n      />\n  </composite:implementation>\n\
    ```\n\n然后，你将像这样使用新的复合组件：\n\n```\n<gz:flip act=\"#{actionBean.goThere}\"/>\n```\n\
    \n与之前的示例一样，你使用表达式 `#{cc.attrs.act}` 从实现中访问在 `interface` 中声明的 `act` 属性的值。此外，与之前示例中发生的情况不同，你还需要一个从\
    \ `interface` 到 `implementation` 的反向引用。这是因为 JSF 必须能够将在 `gz:flip` 中设置的方法连接到 `h:commandButton`\
    \ 组件，该方法就是为该组件准备的。事实上，如果 `implementation` 中有更多组件，你可以通过用空格分隔它们的标识符来将同一个方法连接到多个组件（这就是为什么该属性的名称是\
    \ `targets`，复数，而不是 `target`）。\n\n`method-signature` 的值指定 `act` 的值必须求值为一个方法，并定义其签名。这意味着\
    \ `<gz:flip act=\"go2\"/>` 将不起作用。你必须将 `method-signature=\"java.lang.String action()\"\
    ` 替换为 `type=\"java.lang.String\"`。这两个属性是互斥的，如果你省略它们，JSF 会假定 `type=\"java.lang.Object\"\
    `。\n\n既然你知道如何使 `h:commandButton` 的 `action` 属性可见，你可能会问自己如何也暴露其 `actionListener`\
    \ 属性。方法如下：\n\n```\n<composite:interface>\n  <composite:attribute name=\"act\"\
    \ targets=\"myB\" method-signature=\"java.lang.String action()\"/>\n  <composite:actionSource\
    \ name=\"myB\"/>\n  </composite:interface>\n<composite:implementation>\n  <h:commandButton\
    \ id=\"myB\" action=\"#{cc.attrs.act}\" value=\"Page #{actionBean.n}\"/>\n  </composite:implementation>\n\
    ```\n\n然后，你将像这样使用新的复合组件：\n\n```\n<gz:flip act=\"#{actionBean.goThere}\">\n  <f:actionListener\
    \ for=\"myB\" binding=\"#{actionBean.swapPages}\"/>\n  </gz:flip>\n```\n\n元素 `composite:actionSource`\
    \ 暴露了 `h:commandButton` 组件，而 `f:actionListener` 将适当的动作监听器连接到它。请注意，`actionListener`\
    \ 属性已从 `h:commandButton` 中消失。\n\n关于 `composite:facet` 和 `composite:renderFacet`\
    \ 的几句话。在关于 `core` 库的部分开始时，我提到 facet 是一种让组件对代码块进行特殊处理的方法。现在，假设你想在你正在开发的复合组件中的多个位置包含一个特殊的单词，并且使用该组件的页面应该能够定义该单词。你可以这样做：\n\
    \n```\n<composite:interface>\n  <composite:facet name=\"aWord\"/>\n  </composite:interface>\n\
    <composite:implementation>\n  <!-- ...some code... -->\n  <composite:renderFacet\
    \ name=\"aWord\"/>   <!-- say it here -->\n  <!-- ...some code... -->\n  <composite:renderFacet\
    \ name=\"aWord\"/>   <!-- and here -->\n  <!-- ...some code... -->\n  <composite:renderFacet\
    \ name=\"aWord\"/>   <!-- and again here -->\n  </composite:implementation>\n\
    ```\n\n这就是你使用该组件的方式：\n\n```\n<gz:myFacetedComponent>\n  <f:facet name=\"aWord\"\
    ><h:outputText value=\"#@%!\"/></f:facet>\n  </gz:myFacetedComponent>\n```\n\n\
    JSF 将获取在使用页面中定义的 `facet` 元素的主体，并将其插入到你调用 `composite:renderFacet` 的地方。如果你喜欢将这些组件*作为\
    \ facet* 插入，你需要改用 `composite:insertFacet`。\n\n通常，JSF 会忽略你的自定义组件主体内部的内容，例如：\n\n\
    ```\n<gz:myComponent>\n  <h:outputText value=\"#@%! \"/>\n  <h:inputText value=\"\
    #{aBean.whatever}\"/>\n  </gz:myComponent>\n```\n\n如果你想将其包含在你的复合组件中，你可以使用 `<composite:insertChildren/>`\
    \ 来实现。\n\n### 总结\n\n在本章中，我们涵盖了很多内容。我通过 `simplef`、`simplefx` 和 `simpleh` 应用程序让你初步了解了\
    \ JSF。然后，在描述了 JSF 生命周期之后，我继续讨论了所有四个 JSF 标签库 `html`、`core`、`facelet` 和 `composite`。\n\
    \n对于每个库，我列出了它们的标签，并通过简单的示例向你展示了如何使用最常见或最重要的标签。\n\n在下一章中，我们将回到 `eshop`，看看如何将其转换为\
    \ JSF 应用程序。\n\n## 第 8 章\n\n![Image](images/3square.jpg)\n\n## JSF 和 eshop\n\n\
    在[第 3 章](#Chapter03.html)中，我介绍了 `eshop` 项目，随后在[第 6 章](#Chapter06.html)中介绍了 `eshopx`，它在功能上与\
    \ `eshop` 相同，只是我将包含脚本元素的 JSP 页面替换为 XML 格式的 JSP 文档。\n\n在本章中，我将描述 `eshopf`，一个基于\
    \ JSF 的 `eshopx` 版本。你将在本章的软件包中找到 WAR 文件和展开的项目。\n\n### eshopf\n\n[图 8-1](#Chapter08.html#fig_8_1)\
    \ 显示了 `eshopf` 的欢迎页面。虽然它与 `eshop` 和 `eshopx` 的欢迎页面相同，但我将其包含在此处，以便你可以参考它，而无需在多个章节之间来回翻阅。我不会评论整个应用程序的清单，而是专注于一些与\
    \ JSF 相关的有趣片段。\n\n![Image](images/9781430246237_Fig08-01.jpg)\n\n***图 8-1.** eshopf\
    \ 的主页*\n\n作为开发 `eshopf` 的基础，我使用了 `eshopx`。如果你查看 `eshopx` 和 `eshopf` 的欢迎页面，都命名为\
    \ `index.jspx`，你会立即看到，为了使用 JSF，我添加了核心和 html JSF 标签库的两个命名空间声明，以及元素 `f:view` 来包含所有\
    \ JSF 动作。\n\n但还有另一个不太明显的更新。查看[清单 8-1](#Chapter08.html#list_8_1)，它显示了 `f:view`\
    \ 元素的主体。\n\n***清单 8-1.** eshopf: index.jspx 中 f:view 的主体*\n\n```\n<h:form>\n \
    \ <jsp:include page=\"TopMenu.jspx\" flush=\"true\"/>\n  <jsp:include page=\"\
    LeftMenu.jspx\" flush=\"true\"/>\n  </h:form>\n<div class=\"content\">\n  <h1>Welcome\
    \ to e-Shop</h1>\n  </div>\n```\n\n在 `eshopx` 的 `index.jspx` 中，两个 `jsp:include`\
    \ 没有被包裹在表单内。这个更改的原因是由于在 `jsp:included` 文档中，正如你将在下面看到的，两个 HTML `a` 元素将被转换为 `h:commandLink`\
    \ 组件，这些组件需要位于 `h:form` 内部。使用一个单一的表单似乎是合理的。\n\n#### 顶部菜单\n\n[清单 8-2](#Chapter08.html#list_8_2)\
    \ 显示了 `TopMenu.jspx` 及其对 `h:panelGroup` 组件的使用。\n\n***清单 8-2.** eshopf: TopMenu.jspx*\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<jsp:root\n    \n  version=\"\
    2.1\"\n  >\n<jsp:directive.page\n  language=\"java\"\n  contentType=\"application/xhtml+xml;charset=UTF-8\"\
    \n  />\n<f:subview id=\"viewcart\">\n  <h:panelGroup styleClass=\"header\">\n\
    \    <h:outputText styleClass=\"logo\" value=\"e-Shopping Center\"/>\n**    <h:commandLink\
    \ action=\"showCart\" immediate=\"true\" styleClass=\"cart link2\">**\n      <h:outputText\
    \ value=\"Show Cart \"/>\n      <h:graphicImage url=\"/images/cart.gif\"/>\n \
    \     </h:commandLink>\n    </h:panelGroup>\n  </f:subview>\n</jsp:root>\n```\n\
    \n`TopMenu.jspx` 的目的是提供对购物车的标准化访问。\n\n请注意，我使用了 `f:subview` 来包含所有动作。还要注意，`f:subview`\
    \ 的存在正是为了在通过 `jsp:include` 或任何自定义动作（如 `c:include`）包含动作时包含它们。它的目的相当于 Java 中的一对大括号：它限制其内容的范围。例如，在一个子视图中定义的组件\
    \ ID 可以与同一页面的其他子视图中定义的组件 ID 相同。\n\n使用 `TopMenu.jspx`，你不一定需要将所有内容都包裹在子视图中，因为该文档的内容与\
    \ `LeftMenu.jspx` 或 `index.jspx` 中的内容没有冲突。尽管如此，避免包含模块可能产生的副作用是一种很好的做法。子视图需要有 ID，这就是为什么我定义了\
    \ `id=\"viewcart\"`，即使我们实际上并不需要它。\n\n属性 `styleClass` 是 HTML 属性 `class` 的 JSF 等价物。请参阅文件\
    \ `/css/eshopf.jspx` 以查看每个类的样式定义。\n\n`h:panelGroup` 的功能是将 UI 组件分组在一起。在这种情况下，它使得将样式类\
    \ `header` 应用于它包含的所有元素成为可能。\n\nHTML 元素 `img` 的 JSF 等价物是 `h:graphicImage`。\n\n\
    请注意，`h:commandLink` 的 `immediate` 属性设置为 `true`。你从上一章中会记得，通过这样做，你可以强制动作监听器已经在应用请求值阶段执行。这保证了，无论用户正在查看什么页面，可能带有部分且不一致填写的表单，控制权都会直接转到购物车页面。\n\
    \n`h:commandLink` 的 `action` 属性将结果设置为 `showCart`。你已经在上一章的多个示例中遇到过这种机制（例如，[清单 7-1](#Chapter07.html#list_7_1)\
    \ 中的值 `goOn`）。\n\n#### 左侧菜单（第 1 部分）\n\n[清单 8-3](#Chapter08.html#list_8_3) 显示了\
    \ `LeftMenu.jspx` 的顶层结构，其中包含 `h:panelGrid` 组件。\n\n***清单 8-3.** eshopf: LeftMenu.jspx\
    \ - 结构*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<jsp:root\n    \n\
    \  version=\"2.1\"\n  >\n<jsp:directive.page\n  language=\"java\"\n  contentType=\"\
    application/xhtml+xml;charset=UTF-8\"\n  />\n<f:subview id=\"leftMenu\">\n  <h:panelGrid\
    \ styleClass=\"menu\">\n*Here goes the Search Box - See Listing 8-4*\n*    Here\
    \ goes the Category Selection Box - See Listing 8-6*\n    </h:panelGrid>  \n \
    \ </f:subview>\n</jsp:root>\n```\n\n正如我在上一章中展示的（参见[清单 7-12](#Chapter07.html#list_7_12)），`h:panelGrid`\
    \ 组件使用 HTML `table` 渲染；它包含的每个组件都渲染为一个 HTML `td` 元素；可选的 `columns` 属性决定了行的长度。\n\n\
    在 `LeftMenu.jspx` 中，你可以编写 `columns=\"1\"`，但我省略了它，因为 `1` 是默认值。这里你需要 `h:panelGrid`\
    \ 而不是 `h:panelGroup`，因为否则搜索和类别选择框将不会一个接一个地渲染。行按照组件在 `h:panelGrid` 内部出现的顺序从上到下从左到右填充。[清单\
    \ 8-4](#Chapter08.html#list_8_4) 中显示的搜索框由一些描述性文本、一个输入文本字段和一个提交搜索的按钮组成。\n\n***清单\
    \ 8-4.** eshopf: LeftMenu.jspx - 搜索框*\n\n```\n<h:panelGroup styleClass=\"box\"\
    >\n  <h:outputText styleClass=\"box_title\" value=\"Quick Search\"/>\n  <h:outputText\
    \ styleClass=\"box_p\" value=\"Book Title/Author:\"/>\n  <h:inputText size=\"\
    15\"\n      styleClass=\"box_searchTxt\"\n      binding=\"#{shopManager.searchTxt}\"\
    \n      />\n  <h:commandButton\n      type=\"submit\" value=\"Search\"\n     \
    \ styleClass=\"box_searchBtn\"\n**      action=\"#{shopManager.searchBooks}\"\
    **\n      immediate=\"true\"\n      />\n  </h:panelGroup>\n```\n\n请注意，`h:commandButton`\
    \ 的 `action` 属性被设置为一个托管 bean 的方法，而不是一个字符串字面量。你在上一章关于动作控制器和动作监听器的部分中遇到过这种机制。\n\n\
    属性 `binding=\"#{shopManager.searchTxt}\"` 展示了如何将输入字段连接到服务器上的数据对象。你可以像我在上一章中解释的那样，使用\
    \ `value` 属性建立类似的链接（例如，参见[清单 7-1](#Chapter07.html#list_7_1)）。\n\n区别在于，使用 `binding`，你建立了一个双向链接，让你的支持\
    \ bean 能够修改字段的值，而使用 `value`，支持 bean 无法修改用户输入的数据。`shopManager` bean 不需要修改在 `LeftMenu.jspx`\
    \ 中输入的搜索字符串，但你仍然使用 `binding`，原因稍后会变得清楚。\n\n与 `TopMenu.jspx` 中的购物车一样，属性 `immediate=\"\
    true\"` 告诉 JSF 该动作应该在应用请求值期间执行，而不是在调用应用程序期间执行，这是所有动作的默认值。通过这种方式，你可以确保用户始终能够从任何页面继续购物，即使该页面包含无效的输入字段（例如，从带有空字段的结帐页面）。\n\
    \n这就是为什么你需要在 `h:inputText` 组件中使用 `binding` 属性。使用 `value` 属性，你可以通过 `getValue` 方法访问搜索字符串，但只能在调用应用程序期间，在处理验证和更新模型值完成之后。这已经太晚了，因为正如我刚刚解释的，搜索动作发生在应用请求值期间。通过使用\
    \ `binding` 属性，你使*整个 h:inputText 组件*对 shop manager 可用。因此，你可以在应用请求值期间调用 `getSubmittedValue`\
    \ 方法（参见[清单 8-5](#Chapter08.html#list_8_5) 的第 120 行），此时搜索动作被执行。\n\n属性 `required=\"\
    true\"` 告诉 JSF 用户将字段留空是无效的（尽管它接受空格），而 `requiredMessage` 定义了相应的错误消息。如果你省略 `requiredMessage`\
    \ 属性，默认的错误消息类似于：\n\n```\nj_id_jsp_548875039_1:address: Validation Error: Value\
    \ is required.\n```\n\n在完成对 `LeftMenu.jspx` 的研究之前，我们应该看看 `ShopManager` Java bean，我已经提到过几次了。\n\
    \n#### Shop Manager\n\nShop manager 是一个在会话范围内定义的托管 bean。\n\n在上一节中，我说过以下两个属性实现了用户输入和服务器实体的链接：\n\
    \n```\nbinding=\"#{shopManager.searchTxt}\"\naction=\"#{shopManager.searchBooks}\"\
    \n```\n\n要准确理解这是如何工作的，让我们浏览一下 `ShopManager.java` 的相关部分，如 [清单 8-5](#Chapter08.html#list_8_5)\
    \ 所示。\n\n***清单 8-5.** eshopf 片段：在 ShopManager.java 中搜索书籍*\n\n```\n014: private\
    \ List<Book>    books;\n...\n023: private HtmlInputText searchTxt = new HtmlInputText();\n\
    ...\n103: public HtmlInputText getSearchTxt() {\n104:   return searchTxt;\n105:\
    \   }\n...\n118: public String searchBooks() {\n119:   categoryName=null;\n120:\
    \   String searchKeyword = (String)searchTxt.getSubmittedValue();\n121:   books\
    \ = dataManager.getSearchResults(searchKeyword);\n122:   return \"listBooks\"\
    ;\n123:   }\n...\n147: public void setSearchTxt(HtmlInputText val) {\n148:   searchTxt\
    \ = val;\n149:   }\n```\n\n完整的 `ShopManager.java` 位于本章软件包的 `eshopf project\\eshopf\\\
    WEB-INF\\classes\\eshop\\beans` 文件夹中。\n\n列出的 `binding` 属性意味着在更新模型值期间，JSF servlet\
    \ 将用户键入的搜索字符串保存在属性 `searchTxt` 中，该属性的类型是 `javax.faces.component.html.HtmlInputText`。它通过使用\
    \ `setSearchTxt` 方法来实现。稍后在生命周期中，在渲染响应期间，它使用 `getSearchText` 方法来获取预填充 HTML 中输入文本字段所需的值。`HtmlInputTxt`\
    \ 类具有一系列属性和方法，使你能够，除其他外，使其成为必需的输入并验证用户键入的值。\n\n`Search` 按钮的 `action` 属性导致 JSF\
    \ servlet 在调用应用程序期间执行 `searchBooks` 方法。如你在 [清单 8-5](#Chapter08.html#list_8_5)\
    \ 中所见，该方法简单地获取搜索字符串的值，执行 `dataManager` 方法以从数据库获取书籍列表，将列表保存在对象 `books` 中，并返回字符串\
    \ `\"listBooks\"`。\n\n如果你现在查看 `faces-config.xml` 的以下片段，你会看到通过返回 `\"listBooks\"\
    `，`searchBooks` 方法强制 JSF 从当前页面切换到 `ListBooks.jspx`：\n\n```\n<navigation-rule>\n\
    \  <navigation-case>\n    <from-outcome>listBooks</from-outcome>\n    <to-view-id>/jsp/ListBooks.jspx</to-view-id>\n\
    \    <redirect/>\n    </navigation-case>\n  </navigation-rule>\n```\n\n`redirect`\
    \ 元素的存在（或不存在）决定了这种切换是如何完成的。如果 `redirect` 存在，就像示例中一样，JSF 将向客户端发送一个重定向响应，这将导致浏览器请求新页面。如果没有\
    \ `redirect` 元素，在渲染响应期间，JSF 将直接使用 `books` 对象的内容来渲染在数据库中找到的书籍列表的 HTML。但在这种情况下，该列表实际上将是用户发起搜索的页面的新渲染。因此，浏览器中显示的\
    \ URL 将保持不变（例如，[`http://localhost:8080/eshopf/`](http://localhost:8080/eshopf/)）。\n\
    \n你也可以在 `navigation-case` 元素中包含以下行，以对页面切换何时发生施加更严格的条件：\n\n```\n<from-action>#{shopManager.searchBooks}</from-action>\n\
    ```\n\n然而，在这种情况下，这显然是不必要的，因为没有其他方法返回 `\"listBooks\"`。\n\n#### 左侧菜单（第 2 部分）\n\n\
    现在你知道了 `eshopf` 如何将用户输入和动作绑定到数据对象和方法，我们可以完成对 `LeftMenu.jspx` 的研究。[清单 8-6](#Chapter08.html#list_8_6)\
    \ 显示了按类别选择书籍的部分。\n\n***清单 8-6.** eshopf: LeftMenu.jspx - 类别选择框*\n\n```\n01: <h:panelGroup\
    \ styleClass=\"box\" id=\"categBox\">\n02:   <h:outputText styleClass=\"box_title\"\
    \ value=\"Categories\"/>\n03:   <h:dataTable value=\"#{shopManager.categories}\"\
    \ var=\"category\">\n04:     <h:column>\n05:       <h:commandLink\n06:       \
    \    action=\"#{shopManager.selectCategory}\"\n07:           value=\"#{category.name}\"\
    \n08:           immediate=\"true\"\n09:           />\n10:       </h:column>\n\
    11:     </h:dataTable>\n12:   </h:panelGroup>\n```\n\nJSF 使用 HTML `table` 元素渲染\
    \ `h:dataTable` 组件（第 3 行），其中每个列由一个 `h:column` 组件标识（第 4 行）。除了你从 HTML 了解的表功能之外，JSF\
    \ 还提供了一种类似于 `c:forEach` 的迭代机制，并链接到数据模型。该机制基于两个属性：`value`，它包含一个返回项目列表的 EL 表达式，以及\
    \ `var`，它包含一个变量的名称，列表中的项目依次分配给该变量。\n\n在这种情况下，EL 表达式 `#{shopManager.categories}`\
    \ 执行 `shopManager` 的以下方法：\n\n```\n068 public ListDataModel<Category> getCategories()\
    \ {\n069   categoriesDataModel.setWrappedData(dataManager.getCategories());\n\
    070   return categoriesDataModel;\n071   }\n```\n\n其中 `categoriesDataModel` 定义如下：\n\
    \n```\n017 private ListDataModel<Category> categoriesDataModel = new ListDataModel<Category>();\n\
    ```\n\n结果是，通过 `dataManager.getCategories` 方法从数据库获得的 `List` 类别被分配给 `h:dataTable`\
    \ 的 `value` 属性。\n\nJSF 实现了一个遍历列表中所有项目的索引，属性 `var=\"category\"` 定义了提供对当前项目访问的变量名称。实际上，这意味着当\
    \ JSF servlet 在渲染响应阶段渲染 `h:dataTable` 组件时，它会为在数据库中找到的每个类别渲染第 5-9 行的 `h:commandLink`。\n\
    \n#### 结帐页面\n\n`eshopf` 应用程序的 `Checkout.jspx` 模块要求用户提供付款数据（姓名、地址和信用卡信息）。[清单 8-7](#Chapter08.html#list_8_7)\
    \ 显示了与其中一个输入项关联的代码。\n\n***清单 8-7.** eshopf: Checkout.jspx—地址输入*\n\n```\n<h:panelGrid\
    \ columns=\"3\" rendered=\"#{!shopManager.shoppingCartEmpty}\"\n    style=\"width:auto\"\
    >\n  ...\n  <h:outputText value=\"Delivery Address\"/>\n  <h:inputText id=\"address\"\
    \ required=\"true\"\n      value=\"#{shopManager.customer.deliveryAddress}\"\n\
    \      requiredMessage=\"Value is required!\"\n      />\n  <h:message for=\"address\"\
    \ styleClass=\"error\"/>\n  ...\n  </h:panelGrid>\n```\n\n`h:inputText` 组件的值与对象\
    \ `customer` 的 `deliveryAddress` 属性关联，该对象是类 `eshop.beans.Customer` 的一个实例。因为 `h:inputText`\
    \ 的 `required` 属性设置为 true，如果用户省略填写该字段，则会显示 `requiredMessage` 属性的值。如果你定义了 JSF 元素\
    \ `h:message`，它在页面中的位置及其样式决定了错误消息的显示位置和方式，如 [图 8-2](#Chapter08.html#fig_8_2) 所示。\n\
    \n![Image](images/9781430246237_Fig08-02.jpg)\n\n***图 8-2.** Checkout.jspx 上的不完整输入*\n\
    \n一个可能有用的标签是 `<f:verbatim>`。它的目的是让你在需要 JSF 组件的地方插入 HTML 标签。这不是我鼓励的做法，但有时它可以让你的生活更轻松。例如，你可以使用\
    \ `<f:verbatim><br/></f:verbatim>` 代替使用 `h:panelGrid` 将组件排列在单列中，将其放置在连续组件之间。\n\
    \n#### web.xml\n\n[清单 8-8](#Chapter08.html#list_8_8) 显示了应用程序 `eshopf` 的文件 `WEB-INF\\\
    web.xml`。\n\n***清单 8-8.** eshopf: web.xml*\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<web-app version=\"2.5\"\n  \n  xsi:schemaLocation=\"http://java.sun.com/xml/ns/javaee\
    \ ~CCC\nhttp://java.sun.com/xml/ns/javaee/web-app_2_5.xsd\">\n  <display-name>eshop</display-name>\n\
    \  <context-param>\n    <param-name>javax.faces.DEFAULT_SUFFIX</param-name>\n\
    \    <param-value>.jspx</param-value>\n    </context-param>\n  <servlet>\n   \
    \ <servlet-name>Faces Servlet</servlet-name>\n    <servlet-class>javax.faces.webapp.FacesServlet</servlet-class>\n\
    \    <load-on-startup>1</load-on-startup>\n    </servlet>\n  <servlet-mapping>\n\
    \    <servlet-name>Faces Servlet</servlet-name>\n    <url-pattern>*.jsf</url-pattern>\n\
    \    </servlet-mapping>\n  <login-config>\n    <auth-method>BASIC</auth-method>\n\
    \    </login-config>\n  <resource-ref>\n    <res-ref-name>jdbc/mysql</res-ref-name>\n\
    \    <res-type>javax.sql.DataSource</res-type>\n    <res-auth>Container</res-auth>\n\
    \    </resource-ref>\n</web-app>\n```\n\n大多数标签应该从之前的示例中熟悉。\n\n`context-parameter`\
    \ 元素将文件扩展名设置为 `jspx`，这是 JSP 文档的扩展名，就像 `eshopf` 的那些一样。如果你省略了这个元素，扩展名将是 `jsp`，这是\
    \ JSP 页面的扩展名。\n\n`servlet` 元素指向标准 JSF servlet 的类。通过将 `servlet-mapping` 元素设置为 `*.jsf`，你指定\
    \ JSP 文档将使用该扩展名而不是其真实扩展名 `jspx` 来访问。例如，当你在 `eshopf` 中选择一个图书类别时，浏览器中显示的 URL 是 [`http://localhost:8080/eshopf/jsp/ListBooks.jsf`](http://localhost:8080/eshopf/jsp/ListBooks.jsf)，而\
    \ JSP 文档实际上被称为 `ListBooks.jspx`。这称为*扩展名映射*。\n\n最后一个元素 `resource-ref` 声明名为 `jdbc/mysql`\
    \ 的资源是 `DataSource` 类型，并且 Tomcat 执行自己的身份验证。Tomcat 为每个应用程序提供一个 Java 命名和目录接口 (JNDI)\
    \ `InitialContext`。这意味着一旦你在 `web.xml` 中注册了一个资源，你就可以在一个单独的上下文文件中提供所有必要的信息，以将其链接到你的服务器环境。对于\
    \ `eshopf`，信息如 [清单 8-9](#Chapter08.html#list_8_9) 所示。\n\n***清单 8-9.** context.xml*\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>  <!-- MySQL database context\
    \ -->\n<!DOCTYPE Context [<!ELEMENT Context ANY> <!ATTLIST Context debug CDATA\
    \ #IMPLIED\n  reloadable CDATA #IMPLIED crossContext CDATA #IMPLIED>]>\n<Context\
    \ debug=\"5\" reloadable=\"true\" crossContext=\"true\">\n  <Resource\n      name=\"\
    jdbc/mysql\"\n      auth=\"Container\"\n      type=\"javax.sql.DataSource\"\n\
    \      username=\"root\"\n      password=\"\"\n      driverClassName=\"com.mysql.jdbc.Driver\"\
    \n      url=\"jdbc:mysql://localhost:3306/shop\"\n      maxActive=\"8\"\n    \
    \  maxIdle=\"4\"\n      />\n  <Valve\n      className=\"org.apache.catalina.valves.AccessLogValve\"\
    \n      directory=\"logs\"\n      prefix=\"eshopf-access.\"\n      suffix=\".log\"\
    \n      pattern=\"common\""
  raw: '``` As with URLs, XPath uses a slash as a separator. Absolute paths start
    with a slash, while all other paths are relative. Similar to file directories,
    a period indicates the current node, while a double period indicates the parent
    node.    Several nodes with the same name are distinguished by indexing them,
    as Java does with array elements. For example, let’s say you have the following
    XML code:  `<a> <b>whatever</b> <b>never</b> </a>` `<c> <non_b>no</non_b> <b>verywell</b>
    </c>` `<a> <b attr="zz">nice</b> <b attr="xxx">ok</b> </a>`  The pattern `/a/b`
    selects the four `<b>` elements, which contain `whatever`, `never`, `nice`, and
    `ok`. The `<b>` element with `verywell` isn’t selected, because it’s inside `<c>`
    instead of `<a>`. The pattern `/a[1]/b[0]` selects the `<b>` element with `nice`.
    Attribute names are prefixed by an `@`. For example, `/a[1]/b[1]/@attr` refers
    to the attribute that has the value `xxx` in the example.    A clever thing in
    XPath: you can use conditions as indices. For example, `/a/b[@attr="zz"]` selects
    the same `<b>` element selected by `/a[1]/b[0]`, while `/a[b]` selects all `<a>`
    elements that have `<b>` as a child (in the example, both), and `/a[b="never"]`
    selects the first `<a>` element. A final example: `/a/b[@attr][0]` selects the
    first `<b>` element that is contained in an `<a>` and has the attribute `attr`
    (i.e., it selects once again the element `/a[1]/b[0]`).    XPath defines several
    operators and functions related to node sets, positions, or namespaces, and it
    defines string, numeric, boolean, and conversion operations.    A *node set* is
    a group of nodes considered collectively. A node set resulting from the execution
    of an XPath expression doesn’t necessarily contain several nodes. It can consist
    of a single node or even none. Keep in mind that the nodes belonging to a node
    set can be organized in a tree, but not necessarily. For example, the expression
    `$myDoc//C` identifies all `C` elements in a document that was parsed into the
    variable `myDoc`. It is unlikely that they form a tree.    Within XPath, you have
    access to the implicit JSP objects you’re familiar with. [Table 5-3](#Chapter05.html#tab_5_3)
    lists the mappings.    ![Image](images/9781430246237_Tab05-03.jpg)    Before we
    look at an XPath example, I would like to give you a more rigorous reference of
    its syntax and explain some terms that you are likely to encounter “out there.”    To
    identify a node or a set of nodes, you need to navigate through the tree structure
    of an XML document from your current position within the tree (the *context node*)
    to the target. The path description consists of a series of steps separated by
    slashes, whereby each step includes the navigation direction (the *axis specifier*),
    an expression identifying the node[s] (the *node test*), and a condition to be
    satisfied (the *predicate*) enclosed between square brackets.    A slash at the
    beginning indicates that the path begins at the root node, while paths relative
    to the context node begin without a slash. Two consecutive colons separate the
    axis specifier and the node test. For example, this code identifies the second
    attribute of all `B` elements immediately below the root element `A`:  `/child::A/child::B/attribute::*[position()=2]`  You
    can express the same path with an abbreviated syntax, as follows:  `/A/B/@*[2]`  where
    `child`, `::`, and `position()=` are simply omitted, and `attribute` is represented
    by `@`.    [Table 5-4](#Chapter05.html#tab_5_4) shows the possible axis specifiers
    and their abbreviated syntax.    ![Image](images/9781430246237_Tab05-04.jpg)    As
    node tests, you can use node names with or without a namespace prefix, or you
    can use an asterisk to indicate all names. With abbreviated syntax, an asterisk
    on its own indicates all element nodes, and `@*` indicates all attributes.    You
    can also use `node()` as a node test to indicate all possible nodes of any type.
    Similarly, `comment()` indicates all comment nodes, `text()` indicates all text
    nodes, and `processing-instruction()` indicates all processing instruction nodes.    For
    example, the following code selects all elements `B` descendant of `A` that have
    the attribute `xx` set to `''z''`:  `A//B[@xx=''z'']`  while to select all elements
    `C` anywhere in the tree that have the attribute `yy` you can do this:  `//C[@yy]`  To
    form expressions, besides the operators you have already seen (i.e., slash, double
    slash, and square brackets), you have available all standard arithmetic and comparison
    operators (i.e., `+`, `-`, `*`, `div`, `mod`, `=`, `!=`, `<`, `<=`, `>`, and `>=`).
    Additionally, you have `and` and `or` for boolean operations, and the union operator
    `|` (i.e., the vertical bar) to merge two node sets.    References to variables
    are indicated by sticking a dollar sign before them, as shown in the following
    example:  `<x:parse doc="${sf}" varDom="dom"/>` `<x:forEach var="tag" select="$dom//starship">`  where
    I parse an XML document into the variable `dom` and then use `$dom` when I refer
    to it in an XPath expression.    #### An XPath Example    So far, everything has
    been pretty dry and abstract. To spice things up a bit, we are going to write
    a JSP page that parses an XML file, selects its elements and attributes, and displays
    them in a HTML table. [Listing 5-9](#Chapter05.html#list_5_9) shows the XML file
    we’ll play with, `starfleet.xml`. It is an expanded version of the file `enterprises.xml`
    ([Listing 5-1](#Chapter05.html#list_5_1)) you have already encountered in the
    validation section of this chapter.    ***Listing 5-9.** starfleet.xml*  `<?xml
