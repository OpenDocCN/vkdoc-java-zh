    how Ajax works without JSF, let’s see how to use `f:ajax` to achieve the same
    result.    ##### f:ajax    Using `f:ajax` instead of the mechanism I described
    in the previous section has several advantages, the most important of which, in
    my opinion, is that you no longer need to write code in JavaScript, which adds
    another flavor of Java to the mix (and some people also disable this on their
    browser). Further, `f:ajax` is fully integrated with the other JSF libraries.    [Figure
    7-4](#Chapter07.html#fig_7_4) showed the six phases of the JSF life cycle. With
    `f:ajax` you can selectively *execute* components on the server by processing
    them through the first five phases, or *render* them, by passing them through
    the last phase. You *ajaxify* a component by enclosing it within the body of `f:ajax`
    or by passing to `f:ajax` the component id.    To convert the Ajax example of
    the previous section to JSF’s Ajax, let’s start from `ajaxf.xhtml`, shown in [listing
    7-18](#Chapter07.html#list_7_18). The interesting bits are those highlighted in
    bold.    To test the application, copy the folder `ajaxf` from the software package
    for this chapter to Tomcat’s `webapps` folder, and type [`http://localhost:8080/ajaxf`](http://localhost:8080/ajaxf)
    in your web browser.    ***Listing 7-18.** ajaxf.xhtml*  `<?xml version="1.0"
    encoding="UTF-8"?>` `<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"`
