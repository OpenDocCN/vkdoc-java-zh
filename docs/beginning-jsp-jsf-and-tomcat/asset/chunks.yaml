    work: first, the database query is performed, and then the result is saved in
    a hash table in which the key is the category ID and the value is the category
    name.    `LeftMenu.jsp` uses the content of the hash table to generate one link
    for each category with the statement:  `out.println("<p><a href=" + base + "?action=selectCatalog&id="`
    `  + categoryId.toString() + ">" + categories.get(categoryId) + "</a></p>"` `  );`  as
    shown in the following example for action novels:  `<p><a href=/eshop/shop?action=selectCatalog&id=3>Action
    Novels</a></p>`  Notice that the `action` parameter is set to `selectCatalog`.
    This is done for all categories and causes `ShopServlet` to forward the request
    to `/jsp/SelectCatalog.jsp` when the user clicks on a category name.    As you
    can see from the code of `CategoryPeer.java`, I took great care to ensure that
    the database connection is closed before the method returns. Also notice that
    I logged a message to the standard output (mapped by Tomcat to the file `stdout_`*`yyyymmdd`*`.log`)
    if the database access fails. In a real-world application, you should throw an
    exception with an error message that you can then display to the user.    ####
    Handling Requests for Book Selection and Book Search    As you saw in the previous
    section, when the user selects a book category or performs a search, the pages
    displayed are `SelectCatalog.jsp` and `SearchOutcome.jsp`, respectively. Both
    pages display a list of books and are similar to each other. Actually, they are
    so alike that I merged them into a single page in the JSF version of the application,
    `eshopf`, as you’ll see later in this chapter. [Figure 10-2](#Chapter10.html#fig_10_2)
    shows the list you will see when you search for the letter `F` (or `f`, as the
    searches are case insensitive), while [Figure 10-3](#Chapter10.html#fig_10_3)
    shows the list of books in the category `Action Novels`.  ![Image](images/9781430246237_Fig10-02.jpg)  ***Figure
    10-2.** Titles and author names containing an F*  ![Image](images/9781430246237_Fig10-03.jpg)  ***Figure
    10-3.** Action Novels*    In `SelectCatalog.jsp`, the requested category is specified
    by the `id` parameter. To obtain the category name, you execute the `DataManager`
    method `getCategoryName`  `public String getCategoryName(String categoryID) {`
    `  Category category = CategoryPeer.getCategoryById(this, categoryID);` `  return
    (category == null) ? null : category.getName();` `  }`  and this loads the category
    record from the database via the corresponding peer method.    In `SearchOutcome.jsp`,
    the search string is in the `keyword` parameter.    To obtain the list of books,
    `SelectCatalog.jsp` executes the following statement in a scriptlet:  `ArrayList
    books = dataManager.getBooksInCategory(categoryId);`  while `SearchOutcome.jsp`
    executes the statement:  `ArrayList books = dataManager.getSearchResults(keyword);`  For
    each book in the list, both pages generate a link such as the following one:  `<a
    class="link1" href="/eshop/shop?action=bookDetails&bookId=3">Details</a>`  With
    the `action` parameter set to `bookDetails`, `ShopServlet` forwards the request
    to `BookDetails.jsp`.    #### Displaying the Book Details    By now, the mechanism
    should be pretty clear: each JSP page passes its key request parameter to a `DataManager`
    method that encapsulates the business logic. This is how the *view* and the *model*
    of the MVC architecture are kept separate, making it possible for the web-page
    designers and the software developers to work independently. One creates visually
    appealing and clear pages, and the other handles the databases. The signatures
    of the data model methods are the only interface needed between page designers
    and software developers.    `BookDetails.jsp` passes the `bookId` request parameter
    to the `DataManager` method `getBookDetails`:  `public Book getBookDetails(String
    bookID) {` `  return BookPeer.getBookById(this, bookID);` `  }`  and the `BookPeer`
    method `getBookById` gets the corresponding book record from the database.    To
    buy the book (see [Figure 10-4](#Chapter10.html#fig_10_4)), the user then clicks
    on a link that looks like this in HTML:  `<a class="link1" ="/eshop/shop?action=addItem&bookId=4">Add
    To Cart</a>`  With the `action` parameter set to `addItem`, `ShopServlet` forwards
    the request to `ShoppingCart.jsp`.  ![Image](images/9781430246237_Fig10-04.jpg)  ***Figure
    10-4.** Buying a book*    #### Managing the Shopping Cart    The application displays
    the shopping cart (see [Figure 10.5](#Chapter10.html#fig_10_5)) not only when
    the user clicks on the `Add to Cart` link while viewing the book details but also
    when the user clicks on the shopping cart link in the header of any page. The
    difference is that in the first case, the `action` parameter passed to `ShoppingCart.jsp`
    has the value `addItem`, while in the second case the value is `showCart`.  ![Image](images/9781430246237_Fig10-05.jpg)  ***Figure
    10-5.** The shopping cart*    The shopping cart itself is an object of type `Hashtable<String,
    String>` stored as a session attribute. Note that the scope of the attribute must
    be session, because the shopping cart must be available across multiple HTTP requests.
    The hashtable key is the book ID, while the value is an object of type `CartItem`.
    The `CartItem` class has no methods except the getters and setters for the `author`,
    `title`, `price`, `bookID`, and `quantity` properties.    It’s appropriate to
    save the book price in the shopping cart, because the user should pay the price
    shown in the book details when he or she clicks on `Add to Cart`, even if the
    book price stored in the database is then changed before the order is completed.    For
    each shopping cart item, `ShoppingCart.jsp` displays the quantity of books in
    an input field and adds the `Update` and `Delete` buttons enclosed in separate
    forms. This makes it possible for the user to modify the number of copies ordered
    or to remove an item altogether. Here’s an example of an update form:  `<form>`
    `    <input type="hidden" name="action" value="updateItem"/>` `    <input type="hidden"
    name="bookId" value="4"/>` `    <input type="text" size="2" name="quantity" value="1"/>`
    `    <input type="submit" value="Update"/>` `    </form>`  and here’s an example
    a delete form:  `<form>` `  <input type="hidden" name="action" value="deleteItem"/>`
    `  <input type="hidden" name="bookId" value="4"/>` `  <input type="submit" value="Delete"/>`
    `  </form>`  When the user clicks on one of the buttons, `ShopServlet` forwards
    the request back to `ShoppingCart.jsp`.    Before displaying the content of the
    cart, `ShoppingCart.jsp` needs to do some work that depends on the value of the
    `action` parameter (see [Table 10-1](#Chapter10.html#tab_10_1)).    ![Image](images/9781430246237_Tab10-01.jpg)    To
    handle `addItem`, `ShoppingCart.jsp` obtains the book details from the data manager
    via the `getBookDetails` method and creates a new `CartItem` object, which it
    then adds to the cart. To handle `updateItem`, `ShoppingCart.jsp` uses the `setQuantity`
    method to update the quantity in the cart item identified by `bookId`. To handle
    `deleteItem`, `ShoppingCart.jsp` simply removes the cart item identified by `bookId`
    from the cart.    After listing the cart content, `ShoppingCart.jsp` displays
    this link:  `<a class="link1" href="<%=base%>?action=checkOut">Check Out</a>`  With
    the `action` parameter set to `checkOut`, `ShopServlet` forwards the request to
    `Checkout.jsp`.    #### Accepting an Order    `Checkout.jsp` asks the user to
    provide his or her personal and financial data (see [Figure 10-6](#Chapter10.html#fig_10_6)).  ![Image](images/9781430246237_Fig10-06.jpg)  ***Figure
    10-6.** Checking out*    When the user clicks on the `Confirm Order` button, the
    hidden `action` parameter is set to `orderConfirmation`, which causes `ShopServlet`
    to forward the request to `OrderConfirmation.jsp`. In real life, you should implement
    validation on as many fields as possible.    To perform validation of the user’s
    inputs, you have to decide what fields to validate, whether the validation should
    take place on the client or on the server (or on both), whether to check the fields
    one by one or all together, and what technique to use.    There are some fields
    that you cannot really validate (e.g., the contact name). Others might not be
    critical enough to warrant the effort you would need to spend in order to implement
    validation. For example, to check the delivery address provided via a simple form
    like that of [Figure 10-6](#Chapter10.html#fig_10_6), you could parse the field,
    extract the country, if present, the ZIP/post code, and check whether they are
    consistent. To minimize the risk of input errors, it would make more sense to
    break down the address into several fields and give a multiple choice of countries
    and, depending on the chosen country, on ZIP codes. This would involve quite a
    bit of work, and the lists would have to be kept up to date, for example, by downloading
    them from an online service. All in all, you might decide to forego such complex
    checks. That said, it is not uncommon for web sites to check that the *format*
    of the ZIP code is consistent with the country.    In general, how far you go
    with validation is something you need to decide on a case-by-case basis.    Concerning
    the question of whether to validate on the server or on the client, my advice
    is to *always* validate on the server. This is mainly because a user could manage
    to work around validation done on the client with unknown consequences. The fact
    that validation on the client provides immediate feedback to the user might encourage
    you to do both types of validation. On the other hand, in order to do so, you
    effectively duplicate the same checks in JavaScript on the client and in your
    application on the server.    Ajax, which you learned in [Chapter 7](#Chapter07.html),
    relies on checks done on the server; but because it relies on transferring a minimum
    amount of data in both directions, Ajax also provides a quick turnaround.    With
    the check-out form of [Figure 10-6](#Chapter10.html#fig_10_6), I would make sure
    the user has typed something in all fields and that the values of the credit-card
    number and expiry date are plausible. The best time to do checks on an individual
    field is when the value of the corresponding HTML element changes: that is, when
    the user modifies the value of a field and then clicks outside it.    As a warm-up
    exercise, let’s see how you can easily check that the user has typed something
    into all fields of the form when he or she clicks on `Confirm Order`. For this
    check, you can use a straight JavaScript function, like that shown in [Listing
    10-4](#Chapter10.html#list_10_4).    ***Listing 10-4.** nonemptyForm.js*  `function
    validateForm() {` `  var f = document.getElementById("frm");` `  var k = -1;`
    `  for (var i = 1; i < f.length && k < 0; i++) {` `    if(f.elements[i].value.length
    == 0) k = i;` `    }` `  if (k >= 0) alert("Field " + f.elements[k].name + " empty");`
    `  return (k < 0);` `  }`  As you can see, it is pretty straightforward: you check
    in a loop all fields of the form named `frm` and display an alert with the name
    of the first element you find to be empty. You will find `nonemptyForm.js` in
    the folder `eshop project` of the software package for this chapter. To use it,
    you need to copy it to the folder `eshop\jsp\` and change the file `eshop\jsp\Checkout.jsp`
    in two places.    The first change is necessary to load the JavaScript file. All
    you need to do is insert the line  `<script type="text/javascript" src="/eshop/jsp/nonemptyForm.js"></script>`  immediately
    before the `form` element.    The second change links the validation function
    to the form’s `submit` button. You do it by adding the two attributes `id` and
    `onsubmit` to the `form` element, as in:  `<form action="" id="frm" onsubmit="return
    validateForm()">`  [Figure 10-7](#Chapter10.html#fig_10_7) shows what happens
    when you leave a field empty and hit the `Confirm Order` button.  ![Image](images/9781430246237_Fig10-07.jpg)  ***Figure
    10-7.** Empty-form check with JavaScript*    To validate all fields individually,
