  raw: '#### The E-bookshop Servlet


    [Listing 3-2](#Chapter03.html#list_3_2) shows the source code of the servlet.
    Later in this chapter, you will find information on the folder structure you need
    and on how to compile the Java modules. In this section and in the following one,
    I will explain how the code works.


    ***Listing 3-2.** ShoppingServlet.java*


    `package ebookshop;`

    `import java.util.Vector;`

    `import java.io.IOException;`

    `import javax.servlet.ServletException;`

    `import javax.servlet.ServletConfig;`

    `import javax.servlet.ServletContext;`

    `import javax.servlet.RequestDispatcher;`

    `import javax.servlet.http.HttpServlet;`

    `import javax.servlet.http.HttpServletRequest;`

    `import javax.servlet.http.HttpSession;`

    `import javax.servlet.http.HttpServletResponse;`

    `import ebookshop.Book;`


    `public class ShoppingServlet extends HttpServlet {`


    `  public void init(ServletConfig conf) throws ServletException  {`

    `    super.init(conf);`

    `    }`


    `  public void doGet (HttpServletRequest req, HttpServletResponse res)`

    `      throws ServletException, IOException {`

    `    doPost(req, res);`

    `    }`


    `  public void doPost (HttpServletRequest req, HttpServletResponse res)`

    `      throws ServletException, IOException {`

    `    HttpSession session = req.getSession(true);`

    **`    @SuppressWarnings("unchecked")`**

    `    Vector<Book> shoplist =`

    `      (Vector<Book>)session.getAttribute("ebookshop.cart");`

    `    String do_this = req.getParameter("do_this");`


    `    // If it is the first time, initialize the list of books, which in`

    `    // real life would be stored in a database on disk`

    `    if (do_this == null) {`

    `      Vector<String> blist = new Vector<String>();`

    `      blist.addElement("Learn HTML5 and JavaScript for iOS. Scott Preston $39.99");`

    `      blist.addElement("Java 7 for Absolute Beginners. Jay Bryant $39.99");`

    `      blist.addElement("Beginning Android 4\. Livingston $39.99");`

    `      blist.addElement("Pro Spatial with SQL Server 2012\. Alastair Aitchison
    $59.99");`

    `      blist.addElement("Beginning Database Design. Clare Churcher $34.99");`

    `      session.setAttribute("ebookshop.list", blist);`

    `      ServletContext    sc = getServletContext();`

    `      RequestDispatcher rd = sc.getRequestDispatcher("/");`

    `      rd.forward(req, res);`

    `      }`

    `    else {`


    `      // If it is not the first request, it can only be a checkout request`

    `      // or a request to manipulate the list of books being ordered`

    `      if (do_this.equals("checkout"))  {`

    `        float dollars = 0;`

    `        int   books = 0;`

    `        for (Book aBook : shoplist) {`

    `          float price = aBook.getPrice();`

    `          int   qty = aBook.getQuantity();`

    `          dollars += price * qty;`

    `          books += qty;`

    `          }`

    `        req.setAttribute("dollars", new Float(dollars).toString());`

    `        req.setAttribute("books", new Integer(books).toString());`

    `        ServletContext    sc = getServletContext();`

    `        RequestDispatcher rd = sc.getRequestDispatcher("/Checkout.jsp");`

    `        rd.forward(req, res);`

    `        } // if (..checkout..`


    `      // Not a checkout request - Manipulate the list of books`

    `      else {`

    `        if (do_this.equals("remove")) {`

    `          String pos = req.getParameter("position");`

    `          shoplist.removeElementAt((new Integer(pos)).intValue());`

    `          }`

    `        else if (do_this.equals("add")) {`

    `          boolean found = false;`

    `          Book aBook = getBook(req);`

    `          if (shoplist == null) {  // the shopping cart is empty`

    `            shoplist = new Vector<Book>();`

    `            shoplist.addElement(aBook);`

    `            }`

    `          else {  // update the #copies if the book is already there`

    `            for (int i = 0; i < shoplist.size() && !found; i++) {`

    `              Book b = (Book)shoplist.elementAt(i);`

    `              if (b.getTitle().equals(aBook.getTitle())) {`

    `                b.setQuantity(b.getQuantity() + aBook.getQuantity());`

    `                shoplist.setElementAt(b, i);`

    `                found = true;`

    `                }`

    `              } // for (i..`

    `            if (!found) {  // if it is a new book => Add it to the shoplist`

    `              shoplist.addElement(aBook);`

    `              }`

    `            } // if (shoplist == null) .. else ..`

    `          } // if (..add..`


    `        // Save the updated list of books and return to the home page`

    `        session.setAttribute("ebookshop.cart", shoplist);`

    `        ServletContext sc = getServletContext();`

    `        RequestDispatcher rd = sc.getRequestDispatcher("/");`

    `        rd.forward(req, res);`

    `        } // if (..checkout..else`

    `      } // if (do_this..`

    `    } // doPost`


    `  private Book getBook(HttpServletRequest req) {`

    `    String myBook = req.getParameter("book");`

    `    int    n = myBook.indexOf(''$'');`

    `    String title = myBook.substring(0, n);`

    `    String price = myBook.substring(n+1);`

    `    String qty = req.getParameter("qty");`

    `    return new Book(title, Float.parseFloat(price), Integer.parseInt(qty));`

    `    } // getBook`

    `  }`


    As you can see, the `init()` method only executes the standard servlet initialization,
    and the `doGet()` method simply executes `doPost()`, where all the work is done.
    If you were to remove the `doGet()` method, you would effectively forbid the direct
    call of the servlet. That is, if you typed [`http://localhost:8080/ebookshop/eshop`](http://localhost:8080/ebookshop/eshop)
    in your browser, you would receive an error message that says the requested resource
    isn’t available. As it is, you can type the URL with or without trailing `eshop`.


    The highlighted line shows that I suppressed a warning. Normally, a warning tells
    you that something might be wrong. Therefore, it is not good to have spurious
    warnings, because they might distract you from noticing warnings you should fix.
    The use of `@suppressWarnings` is in general bad practice and encourages you to
    use a sloppy programming style. In this particular case, the compiler complained
    about the typecasting of a generic `Object` to a `Vector`, but I knew that the
    attribute `ebookshop.cart` was of type `Vector<book>`.


    When you analyze `index.jsp`, you can see that it passes control to the servlet
    on four occasions, as listed here from the point of view of the servlet:


    > 1.  **If no book list exists**: This happens at the beginning, when the buyer
    types [`http://localhost:8080/ebookshop/`](http://localhost:8080/ebookshop/).
    The servlet executes without any parameter, initializes the book list, and passes
    control straight back to `index.jsp`.

    > 2.  **When the buyer clicks on `Add to Cart`**: The servlet executes with `do_this`
    set to `add` and a parameter containing the book description. Normally, this would
    be done more elegantly with a reference to the book rather than the whole description,
    but we want to keep things as simple as possible. The servlet creates a cart if
    necessary and adds to it a new object of type `Book` or, if the same book is already
    in the cart, updates its quantity. After that, it passes the control back to `index.jsp`.

    > 3.  **When the buyer clicks on `Remove from Cart`**: The servlet executes with
    `do_this` set to `remove` and a parameter containing the position of the book
    within the cart. The servlet removes the book in the given position by deleting
    the object of type `Book` from the vector representing the cart. After that, it
    passes the control back to `index.jsp`.

    > 4.  **When the buyer clicks on `Checkout`**: The servlet executes with `do_this`
    set to `checkout`. The servlet calculates the total amount of money and the number
    of books ordered, adds them as attributes to the HTTP request, and passes the
    control to `Checkout.jsp`, which has the task of displaying the bill.'
