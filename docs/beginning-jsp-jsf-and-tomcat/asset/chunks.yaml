    如你所见，`Customer` 类定义了私有属性，然后定义了访问它们的方法，以便它们可以被识别为属性。


    ![Image](img/square.jpg) **注意** 如果参数和属性不匹配，使用 `property="*"` 可能会导致令人困惑的结果。


    到目前为止一切顺利。没什么意思。但有趣的是，`setProperty` 动作


