- fmt: "`package MyClasses;`\n`import java.io.Serializable;`\n`public class MyClass\
    \ implements java.io.Serializable {`\n`  public static final long serialVersionUID\
    \ = 1L;`\n`  private int i;`\n`  public MyClass() {i = 0;}`\n`  public void setI(int\
    \ i) {this.i = i;}`\n`  public int getI() {return i;}`\n`  }`\n\nAs you can see,\
    \ the integer attribute `i` is a property. [Listing 4-6](#Chapter04.html#list_4_6)\
    \ shows a JSP page that uses both `getProperty` and `setProperty`.\n\n**Listing\
    \ 4-6.** `myObj.jsp`\n\n```\n<%@page language=\"java\" contentType=\"text/html\"\
    %>\n<%@page import=\"java.util.*, MyClasses.MyClass\"%>\n<%@page trimDirectiveWhitespaces=\"\
    true\"%>\n<html><head><title>myObj</title></head><body>\n<jsp:useBean id=\"obj\"\
    \ class=\"MyClasses.MyClass\" scope=\"session\">\n  <jsp:setProperty name=\"obj\"\
    \ property=\"i\" value=\"11\"/>\n  </jsp:useBean>\n<jsp:getProperty name=\"obj\"\
    \ property=\"i\"/>\n<jsp:setProperty name=\"obj\" property=\"i\" value=\"22\"\
    />\n<jsp:getProperty name=\"obj\" property=\"i\"/>\n</body></html>\n```\n\nAs\
    \ you can see, `myObj.jsp` instantiates the bean object with `useBean` and initializes\
    \ its attribute by executing `setProperty` within the body of `useBean`. The advantage\
    \ of doing it that way is that Tomcat only attempts to execute the sub-action\
    \ `setProperty` if the instantiation of the bean succeeds.\n\nThe two executions\
    \ of `getProperty` send the value of `i` to the output. As a result, `myObj.jsp`\
    \ generates the following HTML page:\n\n```\n<html><head><title>myObj</title></head><body>\n\
    1122</body></html>\n```\n\nThe example also shows that in `setProperty` you can\
    \ replace the `value` attribute with `param`. Then, Tomcat sets the attribute\
    \ to the value of the identically named request parameter. Notice how the `page`\
    \ directive with `trimDirectiveWhitespaces` set to `true` only leaves a single\
    \ newline, after `<body>`, because it is in the HTML template. It results in 11\
    \ and 12 being “fused” into 1122. Not necessarily what you would like to have.\n\
    \n### Action: `text`\n\nYou can use the `jsp:text` action to write template text.\
    \ Its syntax is straightforward:\n\n```\n<jsp:text>Template data</jsp:text>\n\
    ```\n\nIts body cannot contain other elements; it can only contain text and EL\
    \ expressions.\n\n### Actions: `element`, `attribute`, and `body`\n\nWith the\
    \ actions `element`, `attribute`, and `body`, you can define XML elements dynamically\
    \ within a JSP page. One reason why you might like to define XML elements dynamically\
    \ is that your JSP page, instead of generating a web page to be displayed in a\
    \ browser, might need to generate an XML file used to exchange data with other\
    \ modules and applications. The word *dynamically* is important, because it means\
    \ that you can generate the XML elements at request time rather than statically\
    \ at compile time.\n\nThe JSP page shown in [Listing 4-7](#Chapter04.html#list_4_7)\
    \ generates the HTML output shown in [Listing 4-8](#Chapter04.html#list_4_8).\
    \ It is a meaningless page, only designed to show you how to use these actions.\
    \ Don’t look for a meaning that doesn’t exist!\n\n**Listing 4-7.** `actel_element_attribute.jsp`\n\
    \n```\n<%@page language=\"java\" contentType=\"text/html\"%>\n<html>\n<head><title>Action\
    \ elements: element, attribute</title></head>\n<body>\n<jsp:element name=\"myElem\"\
    >\n  <jsp:attribute name=\"myElemAttr\">myElemAttr's value</jsp:attribute>\n \
    \ <jsp:body>myElem's body</jsp:body>\n  </jsp:element>\n<br/>\n<jsp:include page=\"\
    text.txt\"/>\n<br/>\n<jsp:include>\n  <jsp:attribute name=\"page\">text.txt</jsp:attribute>\n\
    \  </jsp:include>\n</body>\n</html>\n```\n\n**Listing 4-8.** The Output of `actel_element_attribute.jsp`\n\
    \n```\n<html>\n<head><title>Action elements: element, attribute</title></head>\n\
    <body>\n<myElem myElemAttr=\"myElemAttr's value\">myElem's body</myElem>\n<br/>\n\
    This is inside the test file text.txt\n<br/>\nThis is inside the test file text.txt\n\
    </body>\n</html>\n```\n\nI have highlighted two parts of the listings. The first\
    \ highlight shows how to use the actions `element`, `attribute`, and `body` to\
    \ generate an XML element. Be aware that if you drop the action `body`, the XML\
    \ element generated by `element` will have an empty body, as in the following\
    \ example:\n\n```\n<myElem myElemAttr=\"myElemAttr's value\"/>\n```\n\nThe second\
    \ highlight shows how you can use `attribute` to move the `page` attribute of\
    \ `include` to be inside the body of the `include` action. The content of the\
    \ file `text.txt` is unimportant. You’ll find a one-line file in the `jsp_element`\
    \ folder of the software package for this chapter.\n\n### Actions: `plugin`, `params`,\
    \ and `fallback`\n\nThese three actions let you embed an object in a web page.\
    \ For example, [Listing 4-9](#Chapter04.html#list_4_9) shows you how to embed\
    \ an applet with `plugin`, how to pass to it a line of text with `params`, and\
    \ how to inform the user with `fallback` if the applet fails to start. To test\
    \ it, copy the file `plugin.jsp` from the `jsp_plugin` folder of the software\
    \ package for this chapter to the usual `tests` folder, and then browse `localhost:8080/tests/plugin.jsp`.\n\
    \nThe `plugin` action generates for you the appropriate browser-dependent HTML\
    \ construct to embed the applet.\n\n**Listing 4-9.** `plugin.jsp`\n\n```\n<%@page\
    \ language=\"java\" contentType=\"text/html\"%>\n<html><head><title>Action: plugin</title></head><body>\n\
    <jsp:plugin type=\"applet\" code=\"MyApplet.class\"\n  codebase=\"/tests\" height=\"\
    100\" width=\"100\">\n  <jsp:params>\n    <jsp:param name=\"line\" value=\"Well\
    \ said!\"/>\n    </jsp:params>\n  <jsp:fallback>Unable to start plugin</jsp:fallback>\n\
    \  </jsp:plugin>\n</body></html>\n```\n\nIf you want to try it yourself, [Listing\
    \ 4-10](#Chapter04.html#list_4_10) shows you the code for a simple applet.\n\n\
    **Listing 4-10.** `MyApplet.java`\n\n```\nimport java.awt.*;\nimport java.applet.*;\n\
    public class MyApplet extends Applet {\n  String line;\n  public void init() {\n\
    \    line = getParameter(\"line\");\n    }\n  public void paint(Graphics page)\
    \ {\n    page.setColor(Color.red);\n    page.fillRect(0, 0, 50, 50);\n    page.setColor(Color.green);\n\
    \    page.fillRect(50, 0, 50, 50);\n    page.setColor(Color.blue);\n    page.fillRect(0,\
    \ 50, 50, 50);\n    page.setColor(Color.yellow);\n    page.fillRect(50, 50, 50,\
    \ 50);\n    page.setColor(Color.black);\n    page.drawString(line, 10, 40);\n\
    \    }\n  }\n```\n\nAnd [Figure 4-2](#Chapter04.html#fig_4_2) shows what you should\
    \ see in your browser. To test it, compile the applet, place both `plugin.jsp`\
    \ and `MyApplet.class` in the folder `%CATALINA_HOME%\\webapps\\ROOT\\tests\\\
    `, and type `localhost:8080/tests/plugin.jsp` in your browser. Note that Tomcat\
    \ doesn’t do anything with the applet itself. It only sends it to the client when\
    \ requested to do so. That’s why the applet class doesn’t need to be placed in\
    \ the `WEB-INF` folder like the other classes you have encountered so far.\n\n\
    ![Image](images/9781430246237_Fig04-02.jpg)\n\n**Figure 4-2.** The output of `plugin.jsp`\n\
    \n`jsp:plugin` accepts the attributes `type`, `jreversion`, `nspluginurl`, and\
    \ `iepluginurl`. The example used `type` to specify that the plugin was an applet;\
    \ `jreversion` lets you specify the version number of the JRE specification you\
    \ require (the default is 1.2); and `nspluginurl` and `iepluginurl` let you specify\
    \ where the JRE plug-in can be downloaded for Netscape Navigator and Internet\
    \ Explorer, respectively. However, I doubt that you will ever use the last three\
    \ attributes."
