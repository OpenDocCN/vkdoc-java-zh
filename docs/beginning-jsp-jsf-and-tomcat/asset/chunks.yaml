    (IDE). This way, you can concentrate on the more creative part of developing software,
    rather than fix inconsistency and fiddle with folder hierarchies.


    An IDE integrates all the applications that you need to develop software—from
    a source editor and a compiler, to tools to automate the application building
    process and a debugger—into a single application. When developing in Java or in
    another OO language, an IDE also includes tools to visualize class and object
    structure as well as inheritance and containment. Another advantage of using an
    IDE is that it propagates changes you make to individual modules. For example,
    if you rename a class, the IDE can automatically update its occurrences throughout
    your project files.


