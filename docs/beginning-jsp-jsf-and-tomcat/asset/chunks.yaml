    \ in Java. After all, JSP basically *is* Java.\n\nDo you remember when I told\
    \ you in [Chapter 2](#Chapter02.html) that the only available directive elements\
    \ are `page`, `include`, and `taglib`? Well, I lied. There are three more directives:\
    \ `tag`, `attribute`, and `variable`. The reason I didn’t mention them is that\
    \ you can only use them in tag files. Now that you know how to develop custom\
    \ tag libraries with Java, I can tell you how to develop them using the JSP syntax\
    \ and the newly revealed directives. The examples of this section are in the folder\
    \ `tag files` of the software package for this chapter. To install them, follow\
    \ the instructions contained in `README.txt`."
  raw: '##### Step 1: Define the Tag Handler


    Similar to bodyless actions, the tag handlers for bodied actions need to implement
    an interface, only this time it’s `javax.servlet.jsp.tagex.BodyTag` instead of
    `Tag`. Again, similarly to bodyless actions, the API provides a convenient class
    that you can use as a basis: `javax.servlet.jsp.tagext.BodyTagSupport`. However,
    as opposed to what you did in the tag handler for a bodyless action, you cannot
    simply replace the `doEndTag` method, because the action body will have come and
    gone by the time you reach the end tag. You first have to overwrite `doAfterBody`.


    An additional complication concerns the default date: if you write the action
    with an empty body, as follows:


    `<wow:weekdayBody></wow:weekdayBody>`


    the method `doAfterBody` won’t be executed at all. How can you then print out
    the default day?


    The answer is simple: you have to overwrite the `doEndTag` method and write the
    default date from there in case there is no body. [Listing 4-13](#Chapter04.html#list_4_13)
    shows the end result.


    ***Listing 4-13.** WeekdayBodyTag.java*


    `package tags;`


    `import javax.servlet.jsp.JspException;`

    `import javax.servlet.jsp.tagext.BodyTagSupport;`

    `import java.util.Date;`

    `import java.text.SimpleDateFormat;`

    `import java.util.Calendar;`

    `import java.util.GregorianCalendar;`


    `public class WeekdayBodyTag extends BodyTagSupport {`

    `  static final long serialVersionUID = 1L;`

    `  static final String[] WD = {"","Sun","Mon","Tue","Wed","Thu","Fri","Sat"};`

    **`  private boolean bodyless = true;  /* 1 */`**


    `  public int doAfterBody() throws JspException {`

    **`    String date = getBodyContent().getString();  /* 2 */`**

    `    if (date.length() > 0) {`

    `      GregorianCalendar cal = new GregorianCalendar();`

    `      Date d = new Date();`

    `      SimpleDateFormat fmt = new SimpleDateFormat("yyyy-MM-dd");`

    `      fmt.setLenient(true);`

    `      try {`

    `        d = fmt.parse(date);`

    `        }`

    `      catch (Exception e) {`

    `        throw new JspException("Date parsing failed: " + e.getMessage());`

    `        }`

    `      cal.setTime(d);`

    `      try {`

    **`          getPreviousOut().print(WD[cal.get(Calendar.DAY_OF_WEEK)]);  /* 3
    */`**

    `          }`

    `        catch (Exception e) {`

    `          throw new JspException("Weekday writing failed: " + e.getMessage());`

    `          }`

    **`      bodyless = false;  /* 4 */`**

    `      }`

    `    return SKIP_BODY;`

    `    }`


    `  public int doEndTag() throws JspException {`

    **`    if (bodyless) {  /* 5 */`**

    `      GregorianCalendar cal = new GregorianCalendar();`

    `      try {`

    `        pageContext.getOut().print(WD[cal.get(Calendar.DAY_OF_WEEK)]);`

    `        }`

    `      catch (Exception e) {`

    `        throw new JspException("Weekday writing failed: " + e.getMessage());`

    `        }`

    `      }`

    `    return EVAL_PAGE;`

    `    }`

    `  }`


    Lines 1, 4, and 5 implement the mechanism to ensure that you write the default
    date but only when the body is empty. In line 1, you define a `boolean` instance
    variable called `bodyless` and set it to `true`. If there is no body to process,
    `doAfterBody` does not run, and `doEndTag` in line 5 prints the default day of
    the week. If, on the other hand, there is a body to process, `doAfterBody` in
    line 4 sets `bodyless` to `false`, and `doEndTag` does nothing.


    Line 2 shows you how to get the body content, and line 3 how to get the method
    to print the date while processing the body. The method has been named `getPreviousOut`
    to remind you that there can be actions within actions, in which case you’ll want
    to append the output of an inner action to that of an outer one.


    ##### Step 2: Define the TLD


    To define the new action, you only need to add the `<tag>` shown in [Listing 4-14](#Chapter04.html#list_4_14)
    after the `<tag>` for the bodyless weekday action.


    ***Listing 4-14.** The tag Element for weekdayBody*


    `  <tag>`

    `    <description>Displays the day of the week</description>`

    `    <display-name>weekdayBody</display-name>`

    `    <name>weekdayBody</name>`

    `    <tag-class>tags.WeekdayBodyTag</tag-class>`

    `    <body-content>scriptless</body-content>`

    `    </tag>`


    Notice that you define the `body-content` sub-element as `scriptless` even though
    it is the default. The purpose is to make the code more readable. It’s just a
    matter of taste.


    ##### Step 3: Use the Custom Action


    [Listing 4-15](#Chapter04.html#list_4_15) shows a modified version of `weekday.jsp`
    to handle the bodied tag.


    ***Listing 4-15.** weekday_b.jsp for the Bodied Action*


    `<%@page language="java" contentType="text/html"%>`

    `<%@taglib uri="/WEB-INF/tlds/wow.tld" prefix="wow"%>`

    `<html><head><title>weekday bodied tag</title></head><body>`

    `weekdayBody today: <wow:weekdayBody></wow:weekdayBody><br/>`

    `weekdayBody ${param.d}: <wow:weekdayBody>${param.d}</wow:weekdayBody><br/>`

    `</body></html>`


    Notice that I replaced the `request.getParameter("d")` logic with the simpler
    and more elegant EL expression `${param.d}`. You have to use an EL expression
    in any case, because scripting elements aren’t allowed in the body of an action.
    Therefore, you couldn’t have used `<%=d%>`. You will learn how to use EL in the
    next section of this chapter.


    ![Image](images/square.jpg) **Tip** Many tag libraries are available on the Internet.
    JSTL provides many actions that you can use and reuse, which I will write about
    in the next section. It certainly pays, in terms of both quality and efficiency,
    to avoid developing actions from scratch unless they give you clear and quantifiable
    benefits. You will find more info on JSTL at [`www.oracle.com/technetwork/java/index-jsp-135995.html`](http://www.oracle.com/technetwork/java/index-jsp-135995.html).


    #### Tag Files


    Tag files are special JSP files that replace tag handlers written in Java. After
    all, JSP basically *is* Java.


    Do you remember when I told you in [Chapter 2](#Chapter02.html) that the only
    available directive elements are `page`, `include`, and `taglib`? Well, I lied.
    There are three more directives: `tag`, `attribute`, and `variable`. The reason
    I didn’t mention them is that you can only use them in tag files. Now that you
    know how to develop custom tag libraries with Java, I can tell you how to develop
    them using the JSP syntax and the newly revealed directives. The examples of this
    section are in the folder `tag files` of the software package for this chapter.
    To install them, follow the instructions contained in `README.txt`.'
