    \ 6-2](#Chapter06.html#fig_6_2) 显示了执行此操作时发生的情况。\n\n![Image](images/9781430246237_Fig06-02.jpg)\n\
    \n***图 6-2.** 使用 Workbench 创建 shop 数据库*\n\n现在数据库已就位，通过执行 [清单 6-3](#Chapter06.html#list_6_3)\
    \ 中显示的 SQL 脚本来插入图书类别和图书记录。\n\n***清单 6-3.** shop_populate.sql*\n\n```\nUSE shop;\n\
    INSERT INTO categories (\n    category_id\n  , category_name\n  )\n  VALUES\n\
    \    (1,'Web Development')\n  , (2,'SF')\n  , (3,'Action Novels')\n  ;\nINSERT\
    \ INTO books (\n    book_id\n  , title\n  , author\n  , price\n  , category_id\n\
    \  )\n  VALUES\n    (1,'Pro CSS and HTML Design Patterns','Michael Bowers',44.99,1)\n\
    \  , (2,'Pro PayPal E-Commerce','Damon Williams',59.99,1)\n  , (3,'The Complete\
    \ Robot','Isaac Asimov',8.95,2)\n  , (4,'Foundation','Isaac ASimov',8.95,2)\n\
    \  , (5,'Area 7','Matthew Reilly',5.99,3)\n  , (6,'Term Limits','Vince Flynn',6.99,3)\n\
    \  ;\n```\n\n请注意，如果你从命令行执行脚本，则只需要 \"`USE shop;`\" 命令。\n\n填充数据库后，你可以通过在 Workbench\
    \ 的中央窗格（或命令行客户端的 \"`mysql>` \" 提示符处）键入 `SELECT` 命令来查看图书记录。例如，`select * from books;`\
    \ 将列出你插入的所有书籍，如 [图 6-3](#Chapter06.html#fig_6_3) 所示。\n\n![Image](images/9781430246237_Fig06-03.jpg)\n\
    \n***图 6-3.** 所有书籍列表*\n\n#### MySQL/Tomcat 测试\n\n为了确保一切正常，你仍然需要检查是否可以使用 JSP 从\
    \ Tomcat 访问数据库。也就是说，Tomcat 能够使用 JDBC 连接器。为此，你可以使用 [清单 6-4](#Chapter06.html#list_6_4)\
    \ 中显示的 JSP 页面，该页面列出了数据库中的所有书籍。\n\n***清单 6-4.** jdbc.jsp*\n\n```\n01    <%@page\
    \ language=\"java\" contentType=\"text/html\"%>\n02    <%@page import=\"java.sql.*\"\
    %>\n03    <html><head><title>JDBC test</title></head><body>\n04    <%\n05    \
    \  Class.forName(\"com.mysql.jdbc.Driver\");\n06      Connection conn = DriverManager.getConnection(\n\
    07          \"jdbc:mysql://localhost:3306/shop\", \"root\", \"\");\n08      Statement\
    \ stmt = conn.createStatement();\n09      ResultSet rs = stmt.executeQuery(\"\
    select * from books\");\n10      %><table border= \"1\"><%\n11      ResultSetMetaData\
    \ resMetaData = rs.getMetaData();\n12      int nCols = resMetaData.getColumnCount();\n\
    13      %><tr><%\n14      for (int kCol = 1; kCol <= nCols; kCol++) {\n15    \
    \    out.print(\"<td><b>\" + resMetaData.getColumnName(kCol) + \"</b></td>\");\n\
    16        }\n17      %></tr><%\n18      while (rs.next()) {\n19        %><tr><%\n\
    20        for (int kCol = 1; kCol <= nCols; kCol++) {\n21          out.print(\"\
    <td>\" + rs.getString(kCol) + \"</td>\");\n22          }\n23        %></tr><%\n\
    24        }\n25      %></table><%\n26      conn.close();\n27      %>\n28    </body></html>\n\
    ```\n\n以下是 `jdbc.jsp` 如何从数据库获取书籍列表然后显示它们：\n\n> 05:       加载 JDBC 以连接到数据库服务器。\n\
    > 06–07:   连接到数据库。\n> 08:       创建一个空语句来查询数据库。\n> 09:       执行查询以列出所有书籍并将结果集存储到局部变量中。\n\
    > 11:       获取结果集结构的信息。\n> 12:       获取结果集的列数。\n> 13–17:   显示列名。\n> 18–23:   每行列出一本书。\n\
    > 26:       关闭与数据库服务器的连接。\n\n如果事情不完全清楚，请不要担心。在本章后面，我将详细解释如何从 Java 访问数据库。目前，我只想给你一个示例，说明如何使用简单的\
    \ JSP 页面测试数据库连接性。\n\n要执行该页面，请将其放入通常的测试文件夹中。[图 6-4](#Chapter06.html#fig_6_4) 显示了生成的页面在\
    \ Web 浏览器中的外观。\n\n![Image](images/9781430246237_Fig06-04.jpg)\n\n***图 6-4.** jdbc.jsp\
    \ 输出*\n\n在更现实的情况下，你会将类别标识符替换为类别名称，但我想尽可能保持这个第一个示例的简单性。\n\n不过，有一件事值得评论：在页面中硬编码数据库名称、用户\
    \ ID 和访问密码是一种不好的做法。迟早，你可能需要更改其中一个参数，你最不想做的就是遍历所有页面来更改它。初始化参数的存在正是为了避免这种容易出错的过程。\n\
    \n首先，你需要在位于应用程序根目录的 `WEB-INF` 文件夹内的 `web.xml` 文件中包含参数定义。你需要在 `web-app` 元素体内插入\
    \ [清单 6-5](#Chapter06.html#list_6_5) 中显示的行。\n\n***清单 6-5.** 定义初始化参数的 web.xml 片段*\n\
    \n```\n<context-param>\n  <param-name>dbName</param-name>\n  <param-value>my-database-name</param-value>\n\
    \  </context-param>\n<context-param>\n  <param-name>dbUser</param-name>\n  <param-value>my-userID</param-value>\n\
    \  </context-param>\n<context-param>\n  <param-name>dbPass</param-name>\n  <param-value>my-password</param-value>\n\
    \  </context-param>\n```\n\n在示例中，`my-database-name` 将是 `jdbc:mysql://localhost:3306/shop`，`my-userID`\
    \ 将是 `root`，而 `my-password` 将是空字符串（即，什么都没有）。\n\n要从任何 JSP 页面内访问参数，你只需要键入如下内容：\n\
    \n```\nString dbName = application.getInitParameter(\"dbName\");\nString dbUser\
    \ = application.getInitParameter(\"dbUser\");\nString dbPass = application.getInitParameter(\"\
    dbPass\");\n```\n\n之后，你可以将示例的第 6 行和第 7 行替换为：\n\n```\nConnection conn = DriverManager.getConnection(dbName,\
    \ dbUser, dbPass);\n```\n\n### 数据库基础\n\n在某些情况下，数据库可能包含少量数据，结构简单，并与应用程序软件一起驻留在家用\
    \ PC 上。在其他情况下，在高端，它可能包含数百万条记录，具有极其复杂的数据结构，并在强大的服务器集群上运行（例如，使用 MySQL Cluster）。\n\
    \n无论如何，无论大小、环境和复杂性如何，DBMS 都是围绕客户端/服务器架构组织的。你的数据库所在的系统是*服务器*，你需要从中访问数据库的系统是*客户端*，即使它们是同一台\
    \ PC。因此，为了能够处理数据和数据结构，你首先必须建立从客户端到服务器上数据库的连接。为此，你需要以下三条信息：\n\n> *   服务器的 URL\n\
    > *   允许你访问数据库的用户 ID\n> *   与该用户 ID 关联的密码\n\n一旦建立了连接，你就可以通过 SQL 语句开始操作数据库结构及其内容。请注意，虽然你在连接服务器时需要提供用户\
    \ ID 和密码，但这并不自动意味着用户可以访问同一服务器上的所有数据库。你可以（并且在大多数情况下应该）允许某些用户访问特定数据库，而不允许其他用户访问。事实上，你可以为你创建的每个新数据库定义一个或多个新用户，并根据他们需要拥有的能力（例如，数据库管理员、开发人员等）对他们进行分组。这确保了当多个用户共享一个数据库服务器时数据的完全机密性。为不同的应用程序定义不同的用户是一种很好的做法，这样你就不会冒“交叉污染”数据的风险。\n\
    \n1986 年，美国国家标准协会 (ANSI) 采用 SQL 作为标准，ISO 在一年后也紧随其后。当前标准是 ISO/IEC 9075，但不幸的是，它不是免费提供的。如果你想拥有它，你必须从\
    \ ANSI 或 ISO 购买。SQL 标准已被广泛采用，因此，我将要说的关于 SQL 的大部分内容实际上适用于所有 DBMS。可以想象，仍然存在专有的添加和变体，在某些情况下，这使得\
    \ SQL 的可移植性不如它可能和应该达到的程度，但这不会影响我们。\n\nSQL 标准至少指定了 27 条基本语句及其众多变体。它们是 `alter`、`based\
    \ on`、`begin`、`close`、`commit`、`connect`、`create`、`declare`、`delete`、`describe`、`disconnect`、`drop`、`end`、`event`、`execute`、`fetch`、`grant`、`insert`、`open`、`prepare`、`revoke`、`rollback`、`select`、`set`、`show`、`update`\
    \ 和 `whenever`（详见[附录 B](#AppendixB.html)）。总共，根据最新统计，SQL 保留了 231 个单词作为关键字。因此，应该清楚的是，在本章中，我不可能对\
    \ SQL 进行超过一个小型介绍。[附录 B](#AppendixB.html) 提供了一个更详细的 SQL 参考来帮助你。此外，如果你在 Apress 搜索\
    \ “SQL”，你将获得超过一百本书的列表。“Beginning SQL Queries”（[`www.apress.com/9781590599433`](http://www.apress.com/9781590599433)）可能是一个不错的起点。\n\
    \n数据库的基本结构元素是行、列、表和索引。用非 SQL 术语来说，行是数据记录，列标识记录字段，表是命名记录的集合，索引是记录的有序列表。\n\n要为 Web\
    \ 应用程序设计数据库，你基本上将每个 Java 类关联到一个表，该表表示你需要永久存储的数据。然后，你的类的每个属性都成为表的一列。从某种意义上说，用 OO\
    \ 术语来表达，每一行对应于包含不同数据的类的实例化。例如，在 E-shop 应用程序中，图书类别被建模以反映 [清单 6-6](#Chapter06.html#list_6_6)\
    \ 中显示的 Java 类。\n\n***清单 6-6.** Category.java*\n\n```\npackage eshop.beans;\n\n\
    public class Category {\n  private int id;\n  private String name;\n\n  public\
    \ Category(int id, String name) {\n    this.id = id;\n    this.name = name;\n\
    \    }\n\n  public int getId() { return id; }\n  public void setId(int id) { this.id\
    \ = id; }\n\n  public String getName() { return name; }\n  public void setName(String\
    \ name) { this.name = name; }\n  }\n```\n\n因此，要将类别存储在 `shop` 数据库中，你可以使用以下 SQL\
    \ 语句创建一个名为 `categories` 的表，该语句摘自 `shop_create.sql`（参见[清单 6.1](#Chapter06.html#list_6_1)）：\n\
    \n```\ncreate table shop.categories (\n  category_id integer not null auto_increment\
    \ unique,\n  category_name varchar(70),\n  primary key (category_id)\n  );\n```\n\
    \n每条 SQL 语句由一个定义要执行的操作的动词（在此示例中为 `create table`）、被操作对象的标识符（在此示例中为 `shop.categories`）以及一个或多个操作参数（通常用括号括起来）组成。当需要多个对象或参数时，它们通常用逗号分隔。在示例中，前两个参数定义了数据库列\
    \ `category_id` 和 `category_name`。请注意 SQL 语句中指定的属性如何与 Java 类中定义的属性匹配。创建此表时，我还告诉\
    \ MySQL 通过声明该列包含唯一值并将其指定为表的主键来创建 `category_id` 的索引。目的是加快数据库操作，尽管在这种情况下，鉴于表的大小很小，它显然不会产生任何实际差异。\n\
    \n使用以下代码（摘自 `shop_populate.sql`，参见[清单 6.2](#Chapter06.html#list_6_2)）在数据库中存储新记录，该代码创建三个新行：\n\
    \n```\ninsert into categories (category_id, category_name)\n  values (1,'Web Development'),\
    \ (2,'SF'), (3,'Action Novels');\n```\n\n顺便说一下，请注意 SQL 与 Java 相反，不区分大小写。\n\n使用强大的\
    \ `select` SQL 语句来读取数据。它允许你创建包括数据排序在内的复杂查询。这是一个简单的例子：\n\n```\nselect category_id,\
    \ category_name from categories where category_id = '2';\n```\n\n要检索表的所有列，你可以将逗号分隔的列列表替换为星号。`where`\
    \ 子句可以由通过逻辑运算符组成的多个条件组成。\n\n你使用 `update` 语句来修改行内容：\n\n```\nupdate categories set\
    \ category_name = 'SF' where category_id = '2';\n```\n\n使用 `delete` 可以删除行：\n\n\
    ```\ndelete from categories where category_id > '3';\n```\n\n你还可以对数据结构进行操作。为此，你使用\
    \ `alter` 语句，如下例所示：\n\n```\nalter table categories add *new_column_name* *column-definition*;\n\
    ```\n\n这允许你向现有表添加列。如果你将 `add` 替换为 `modify` 或 `drop`，`alter` 语句将允许你重新定义列或删除它。\n\
    \n通常，SQL 语句根据其用途进行分组。[表 6-1](#Chapter06.html#tab_6_1) 给出了它们的分类摘要。\n\n![Image](images/9781430246237_Tab06-01.jpg)\n\
    \n在本章中，我将解释如何执行任何 SQL 语句，但我们将主要关注 DML。\n\n### SQL 脚本\n\n正如我已经说过的，CLI 对于初始化数据库很有用。作为\
    \ CLI，MySQL 提供了程序 “MySQL Command Line Client”，它在一个 DOS 窗口中启动，并立即尝试以默认用户 ID 连接到默认服务器。如果你按照本章开头建议的方式设置了\
    \ MySQL，则默认用户将是 `root`，默认主机将是 `localhost`。提供正确的密码后，你会得到一个 `mysql>` 提示符，并可以开始执行\
    \ SQL 语句。\n\n你可以随意使用命令，但使用 CLI 的最佳方式是使用 SQL 脚本。这些是包含你想要执行的语句的纯文本文件。在 `mysql` 提示符下，你只需要键入反斜杠-句点-空格\
    \ (`\\. `)，后跟脚本文件名，然后就可以开始了。事实上，如果你想确保你的步骤是可重复和可纠正的，你必须使用脚本。[清单 6-7](#Chapter06.html#list_6_7)\
    \ 显示了配置 E-shop 应用程序数据库所需的第三个（也是最后一个）SQL 脚本。\n\n***清单 6-7.** shop_orders.sql*\n\
    \n```\nUSE shop;\ncreate table shop.order_details (\n  id double precision not\
    \ null auto_increment unique,\n  book_id integer,\n  title varchar(70),\n  author\
    \ varchar(70),\n  quantity integer,\n  price double precision,\n  order_id double\
    \ precision,\n  primary key (id)\n  );\ncreate table shop.orders (\n  order_id\
    \ double precision not null auto_increment unique,\n  delivery_name varchar(70),\n\
    \  delivery_address varchar(70),\n  cc_name varchar(70),\n  cc_number varchar(32),\n\
    \  cc_expiry varchar(20),\n  primary key (order_id)\n  );\ncreate index order_details_id_key\
    \ on shop.order_details (id);\nalter table shop.order_details add index order_id\
    \ (order_id),\n  add constraint order_id foreign key (order_id)\n  references\
    \ shop.orders (order_id)\n  ;\ncreate index order_id_key on shop.orders (order_id);\n\
    ```\n\n请注意，`order_details` 和 `orders` 的主键（即唯一键）都是由 MySQL 自动生成为不断递增的数字，而 `books`\
    \ 和 `categories` 的主键是在 `shop_create.sql` 中硬编码的（参见[清单 6.1](#Chapter06.html#list_6_1)）。由于类别和图书\
    \ ID 对用户不可见，我也可以让 MySQL 生成它们。我没有这样做，因为图书和类别记录无论如何都是手动创建的，并且添加 ID 似乎不是什么大问题。也许这是由于我倾向于在必要时尽量减少自动机制的使用，以便保留更多控制权。这样做的缺点当然是手动输入通常更容易出错，并且需要更多的维护工作。\n\
    \n要在 SQL 脚本中编写注释，请将它们括在 `/*` 和 `*/` 之间，就像 Java 的块注释一样。\n\n### Java API\n\n你通过执行\
    \ SQL 语句来操作数据库。要从 Java/JSP 中执行此操作，你需要一个由多个接口、类和方法定义组成的 API。该 API 包含在 JDK 7 的类库\
    \ `java.sql` 和 `javax.sql` 中。此外，你还需要一个驱动程序，该驱动程序为特定的 DBMS（即 MySQL）以你系统的本机代码（即\
    \ Intel/Windows PC）实现该 API。要使用 MySQL，你使用 MySQL Connector/J 版本 5 作为驱动程序，它是一个类型\
    \ 4 JDBC 驱动程序（参见侧边栏）。\n\n**JDBC 驱动程序**\n\nJDBC API 允许你从 Java 访问数据库。有四种类型的 JDBC\
    \ 实现（即驱动程序）。\n\n类型 1 的 JDBC 驱动程序实际上是 JDBC-ODBC 桥，因为它们通过开放数据库连接 (ODBC) 驱动程序访问数据库。在本章末尾，我们将向你展示如何使用\
    \ Java 虚拟机 (JVM) 中包含的桥。\n\n类型 2 的 JDBC 驱动程序使用供应商特定的、本机的客户端库。换句话说，它们与 DBMS 供应商提供的非\
    \ Java 函数接口，而这些函数又与数据库接口。与类型 1 的驱动程序相比，这些驱动程序更高效，但你只能在本地使用它们。\n\n类型 3 的 JDBC 驱动程序是\
    \ Java 驱动程序，它们不直接与数据库通信，而是依赖于位于应用服务器上的中间件包。\n\n类型 4 的 JDBC 驱动程序完全用 Java 编写，并直接与\
    \ DBMS 服务器通信。这就是你想要的类型！\n\n#### 连接到数据库\n\n从 Java 访问数据库的第一步是加载驱动程序，没有它，什么都不会工作。为此，你执行方法\
    \ `Class.forName(\"com.mysql.jdbc.Driver\")`。在 E-shop 应用程序中，你在 servlet 的 `init`\
    \ 方法中执行此操作（参见[清单 3-9](#Chapter03.html#list_3_9)）。\n\n为了能够轻松地从 MySQL 切换到其他 DBMS，将驱动程序名称存储在\
    \ `WEB-INF\\web.xml` 中定义的 `init` 参数中，如下所示：\n\n```\n<init-param>\n  <param-name>jdbcDriver</param-name>\n\
    \  <param-value>com.mysql.jdbc.Driver</param-value>\n  </init-param>\n```\n\n\
    这样，你可以在初始化 servlet 时按如下方式加载它：\n\n```\njava.lang.Class.forName(config.getInitParameter(\"\
    jdbcDriver\"));\n```\n\n加载驱动程序后，你还需要连接到数据库才能访问其内容。在 E-shop 应用程序中，你通过执行数据管理器（类型为\
    \ `DataManager`，定义在 `WEB-INF\\classes\\eshop\\model\\DataManager.java` 中）方法来执行此操作，如下代码行所示：\n\
    \n```\njava.sql.Connection connection = dataManager.getConnection();\n```\n\n\
    反过来，数据管理器的 `getConnection` 方法从 JDBC 驱动程序获取连接，如 [清单 6-8](#Chapter06.html#list_6_8)\
    \ 中的片段所示。\n\n***清单 6-8.** DataManager.getConnection 方法*\n\n```\npublic Connection\
    \ getConnection() {\n  Connection conn = null;\n  try {\n**    conn = DriverManager.getConnection(getDbURL(),\
    \ getDbUserName(), getDbPassword());**\n    }\n  catch (SQLException e) {\n  \
    \  System.out.println(\"Could not connect to DB: \" + e.getMessage());\n    }\n\
    \  return conn;\n  }\n```\n\n为了能够在不重建应用程序的情况下更改数据库、用户 ID 或密码，你可以在 servlet 初始化参数中定义它们，就像你为\
    \ JDBC 驱动程序名称所做的那样，以及我在本章前面展示的那样：\n\n```\ndbURL: jdbc:mysql://localhost:3306/shop\n\
    dbUserName: root\ndbPassword: *none*\n```\n\n端口 3306 是 MySQL 的默认端口，可以进行不同的配置。显然，在实际生活中，你会使用不同的用户，最重要的是，定义一个密码。\n\
    \n完成数据库工作后，你应该始终通过执行 `connection.close()` 来关闭连接。E-shop 通过另一个数据管理器方法来实现这一点，如 [清单\
    \ 6-9](#Chapter06.html#list_6_9) 所示。\n\n***清单 6-9.** DataManager.putConnection\
    \ 方法*\n\n```\npublic void putConnection(Connection conn) {\n  if (conn != null)\
    \ {\n**    try { conn.close(); }**\n    catch (SQLException e) { }\n    }\n  }\n\
    ```\n\n在你开始攻击数据库之前，你仍然需要创建一个类型为 `java.sql.Statement` 的对象，因为通过该对象的方法来执行 SQL 语句。使用以下代码创建语句：\n\
    \n```\nStatement stmt = connection.createStatement();\n```\n\n一旦你完成了一条语句，你应该立即使用\
    \ `stmt.close()` 释放它，因为它会占用不可忽略的空间，并且你希望确保在你的页面做其他事情时它不会挂起。\n\n#### 访问数据\n\n`Statement`\
    \ 类有 40 个方法，加上一些继承的方法。尽管如此，两个方法很可能满足你的大部分需求：`executeQuery` 和 `executeUpdate`。\n\
    \n##### executeQuery 方法\n\n你使用此方法来执行 `select` SQL 语句，如下所示：\n\n```\nString sql\
    \ = \"select book_id, title, author from books where category_id=1\"\n    + \"\
    \ order by author, title\";\nResultSet rs = stmt.executeQuery(sql);\n```\n\n在示例中，该方法在类型为\
    \ `java.sql.ResultSet` 的变量 `rs` 中返回类别 1 中的所有书籍，按作者姓名和标题排序。结果集中的行仅包含 `select` 语句中指定的列，在此示例中为\
    \ `book_id`、`title` 和 `author`。\n\n在任何给定时间，你只能访问由所谓*游标*指向的结果集行，并且默认情况下，你只能向前移动游标。访问结果集行的通常方法是从第一行开始，然后按顺序“向下”移动。例如，使用\
    \ `shop` 数据库，以下代码：\n\n```\nwhile (rs.next()) {\n  out.println(rs.getString(3)\
    \ + \", \" + rs.getString(2) + \"<br/>\");\n  }\n```\n\n将产生以下输出：\n\n```\nDamon\
    \ Williams, Pro PayPal E-Commerce\nMichael Bowers, Pro CSS and HTML Design Patterns\n\
    ```\n\n`next` 方法将游标向下移动一行。在游标越过最后一行后，`next()` 返回 `false`，`while` 循环终止。最初，游标位于第一行*之前*。因此，你必须执行一次\
    \ `next()` 才能访问第一行。\n\n除了 `next()`，还有其他方法可以让你重新定位游标。其中五个返回 `boolean`，例如 `next()`，如果游标指向一行则返回\
    \ `true`。它们是 `absolute(`*`row-position`*`)`、`first()`、`last()`、`previous()` 和\
    \ `relative(`*`number-of-rows`*`)`。`beforeFirst()` 和 `afterLast()` 方法也会移动游标，但它们是\
    \ `void` 类型，因为它们总是成功。`isBeforeFirst()`、`isFirst()`、`isLast()` 和 `isAfterLast()`\
    \ 方法检查游标是否在相应的位置，而 `getRow()` 返回当前由游标指向的行的位置。\n\n请记住，为了能够移动游标，你必须在创建语句时指定几个属性——也就是说，*在*你实际执行查询*之前*。这是你如何做到的：\n\
    \n```\nStatement stmt = connection.createStatement(\n  ResultSet.TYPE_SCROLL_INSENSITIVE,\n\
    \  ResultSet.CONCUR_READ_ONLY\n  );\n```\n\n`ResultSet.TYPE_SCROLL_INSENSITIVE`\
    \ 允许你在结果集中前后移动游标。此参数只能具有以下其他两个值之一：`ResultSet.TYPE_FORWARD_ONLY`（默认值）和 `ResultSet.TYPE_SCROLL_SENSITIVE`。`SENSITIVE`\
    \ 和 `INSENSITIVE` 之间的区别在于，使用 `INSENSITIVE`，你在处理结果集时不会受到对其所做的更改的影响（稍后会详细介绍）。这可能是你想要的。\n\
    \n`ResultSet.CONCUR_READ_ONLY` 声明你不想修改结果集。这是默认值，在大多数情况下是有意义的。另一种选择是指定 `ResultSet.CONCUR_UPDATABLE`，它允许你插入、删除和修改结果行。现在你可以明白为什么你可能喜欢使用\
    \ `ResultSet.TYPE_SCROLL_SENSITIVE` 作为第一个参数：它允许你在开始处理结果集后看到对其所做的修改，而不是显示这些更改之前的样子。另一方面，在具有多个线程操作同一结果集的复杂应用程序中，你可能更愿意忽略在其他线程中所做的更改。在这种情况下，必须\
    \ 100% 清楚哪个线程被允许修改哪些行；否则，你最终会陷入混乱。\n\n`ResultSet` 提供了几种方法，用于根据列位置或其标签以不同格式检索列值。例如，以下两个方法将返回相同的值：\n\
    \n```\nlong bookID = rs.getLong(1);\nlong bookID = rs.getLong(\"book_id\");\n\
    ```\n\n列位置指的是 `select` 语句中指定的列。请注意，列编号从 1 开始，而不是像 Java 中习惯的那样从 0 开始。可用的类型有 `Array`、`BigDecimal`、`Blob`、`boolean`、`byte`、`byte[]`、`Clob`、`Date`、`double`、`float`、`InputStream`、`int`、`long`、`NClob`、`Object`、`Reader`、`Ref`、`RowId`、`short`、`SQLXML`、`String`、`Time`、`Timestamp`\
    \ 和 `URL`（更多细节见[附录 B](#AppendixB.html)）。对于大多数这些类型，存在相应的更新方法，允许你修改列。例如，以下代码将 “Joe\
    \ Bloke” 写入结果集当前行的 `author` 列：\n\n```\nrs.updateString(\"author\", \"Joe Bloke\"\
    );\n```\n\n请注意，对于类型 `InputStream`、`Reader` 和 `URL`，没有更新方法。你还可以使用 `updateNull(`*`column-index`*`)`\
    \ 和 `updateNull(`*`column-label`*`)` 方法将列设置为 `null`。\n\n`ResultSet` 提供了超过两打的额外方法，允许你执行诸如将更新后的结果集中的更改传输到实际数据库，或者在执行查询后刷新可能已被其他人修改的行等操作。一个你可能觉得有用的方法根据名称返回结果集中的列位置：\n\
    \n```\nint findColumn(*column-label*)\n```\n\n当相应的语句关闭时，结果集会自动释放。因此，只要你在不再需要语句时立即关闭它，你就不需要真正执行\
    \ `rs.close()`。\n\n##### executeUpdate 方法\n\n你可以使用此方法来执行 SQL 语句 `insert`、`update`\
    \ 和 `delete`。例如，如果你想向 E-shop 示例添加一个新的图书类别，你可以这样做：\n\n```\nString sql = \"insert\
    \ into categories (category_id, category_name)\"\n    + \" values (4, 'Comic Books')\"\
    ;\nstmt.executeUpdate(sql);\n```\n\n你不需要定义所有列，因为未定义的字段会自动设置为其相应的默认值。也就是说，由于我没有在\
    \ `categories` 表的定义中指定任何默认值，以下语句将导致 `category_name` 字段被设置为 `null`：\n\n```\nstmt.executeUpdate(\"\
    insert into categories (category_id) values (4)\");\n```\n\n为了避免这种情况，我本可以使用默认值定义\
    \ `category_name` 列：\n\n```\ncategory_name varchar(70) default 'Miscellanea'\n\
    ```\n\n#### 事务\n\n在 E-shop 中，我为与图书订单关联的数据定义了两个单独的表：一个用于客户数据，一个用于订购的个别书籍（参见[清单\
    \ 6-7](#Chapter06.html#list_6_7)）。完全丢失订单会很糟糕，但丢失某些项目而只处理部分订单可能更糟。如果你保存了订单详细信息但未能保存客户数据，也会出现问题。这将留下一些“孤儿”图书项目，没有关于买家的信息。如果你先保存客户数据，则无需担心这一点：那么，当你开始保存订单详细信息时，客户记录已经在磁盘上。但是，你如何确保数据库只包含完整的订单？\n\
    \n通常，当你执行 SQL `insert` 时，数据会立即存储到数据库中。为了确保订单的完整性，你可以跟踪你已经成功执行的更新，并在无法完成整个订单时撤消它们。然而，这将非常复杂，并且无法保证成功。此外，在更复杂的应用程序中，可能有多个操作同时进行，导致相同的数据库记录被并发访问。解决方案是一种内置的、万无一失的机制，能够确保某些复杂事务“一次性”完成，或者根本不完成。\n\
    \n这个机制实际上非常简单。它的工作原理如下：\n\n> 1.  在连接到 DB 后立即执行 `conn.setAutoCommit(false)`。这告诉\
    \ MySQL 在你确认之前不要对数据库进行永久更改。\n> 2.  执行构成你复杂事务的所有更新。确保将它们放在 `try` 块中，作为 `try`/`catch`\
    \ 结构的一部分。\n> 3.  在 `catch` 块中，包含语句 `conn.rollback()`。如果其中一个更新失败，将抛出 `SQLException`，当执行\
    \ `catch` 块时，`rollback` 将导致 MySQL “忘记”未提交的更新。\n> 4.  当所有更新都已完成且未被任何异常中断时，执行 `conn.commit()`\
    \ 告诉 MySQL 它可以最终确定更新。\n\n### E-shop 中的数据库访问\n\n正如我在[第 3 章](#Chapter03.html)中提到的，所有数据库操作都集中在\
    \ MVC 架构的数据模型中。JSP 模块通过执行 `DataManager` 类的方法与数据库交互，这些方法以 Java bean 的形式接受和/或返回数据。通过数据管理器和\
    \ Java bean 来中介数据库访问，你确保视图和模型可以独立开发。\n\n[图 6-5](#Chapter06.html#fig_6_5) 显示了模型的结构。\n\
    \n![Image](images/9781430246237_Fig06-05.jpg)\n\n***图 6-5.** 数据模型结构*\n\n`DataManager`\
    \ 类设置和关闭与数据库的连接；然而，关于表访问，它只充当一个交换中心。特定的类对单个表执行实际的操作。通过这种方式，你确保对单个表的更改对应用程序的影响最小。这实际上是称为数据访问对象\
    \ (DAO) 的 Java 企业版模式的一个示例。\n\n例如，显示图书详细信息的 JSP 页面通过执行数据管理器的以下方法来获取所请求图书的信息：\n\n\
    ```\npublic Book getBookDetails(int bookID) {\n  return BookPeer.getBookById(this,\
    \ bookID);\n  }\n```\n\n正是 `BookPeer.java` 中的 `getBookByID` 方法执行实际的数据库访问，如 [清单\
    \ 6-10](#Chapter06.html#list_6_10) 所示。\n\n***清单 6-10.** BookPeer.getBookID 方法*\n\
    \n```\n01: public static Book getBookById(DataManager dataManager, int bookID)\
    \ {\n02:   Book book = null;\n03:   Connection connection = dataManager.getConnection();\n\
    04:   if (connection != null) {\n05:     try {\n06:       Statement s = connection.createStatement();\n\
    07:       String sql = \"select book_id, title, author, price from books\"\n08:\
    \          + \" where book_id=\" + bookID;\n09:       try {\n10:         ResultSet\
    \ rs = s.executeQuery(sql);\n11:         if (rs.next()) {\n12:           book\
    \ = new Book();\n13:           book.setId(rs.getString(1));\n14:           book.setTitle(rs.getString(2));\n\
    15:           book.setAuthor(rs.getString(3));\n16:           book.setPrice(rs.getDouble(4));\n\
    17:           }\n18:         }\n19:       finally { s.close(); }\n20:       }\n\
    21:     catch (SQLException e) {\n22:       System.out.println(\"Could not get\
    \ book: \" + e.getMessage());\n23:       }\n24:     finally {\n25:       dataManager.putConnection(connection);\n\
    26:       }\n27:     }  return book;\n28:   }\n```\n\n在第 3 行，你通过调用数据管理器的一个方法来打开数据库连接，该方法也会在失败时报告错误。然后你开始一个\
    \ `try` 块，在其中执行实际工作。在相应的 `catch` 块中，你显示一条错误消息（第 22 行），在 `finally` 块中（第 25 行），你关闭数据库连接。请记住，无论\
    \ `try` 成功与否，都会执行 `finally` 块。通过这种方式，你确保在失败时关闭连接。\n\n在最外层的 `try` 内部（第 5-20 行），你创建一个语句并设置查询字符串，然后开始第二个\
    \ `try` 块（第 9-17 行）。与你对连接所做的类似，你使用 `finally` 块来关闭语句（第 19 行）。\n\n这是一种普遍适用的技术：每次你做一些需要撤消的事情时，立即在\
    \ `try` 块中处理它，将“撤消”语句放在相应的 `finally` 中。通过这种方式，你将确保不会在你身后留下任何“幽灵”。诚然，Java 的垃圾收集机制应该负责删除未引用的对象，但最好在前进的过程中清理自己，尤其是在处理数据库和潜在的大对象（如语句和结果集）时。至少，你的应用程序将更有效地工作。编写“干净”的代码感觉很好。\n\
    \n第 10 行是你实际执行查询的地方。你知道你不会在结果集中获得多于一行，因为 `book_id` 是图书表的唯一键。\n\n你可能会想，“我为什么要通过数据管理器？难道我不能直接从\
    \ JSP 执行 `BookPeer` 方法吗？” 嗯，你可以，但这不干净，不干净迟早会导致问题。\n\n此外，考虑更复杂的情况，你想保存一个订单。从 JSP\
    \ 的角度来看，你只想调用数据管理器的一个方法，该方法同时处理客户数据和购物车。但在幕后，需要更新两个不同的表：一个用于订单，一个用于订单详细信息。因此，在数据管理器中执行整个事务非常有意义（参见[清单\
    \ 6-11](#Chapter06.html#list_6_11)），同时将对单个表的更新留给 peer 类。\n\n***清单 6-11.** DataManager.insertOrder\
    \ 方法*\n\n```\npublic long insertOrder(Customer customer, Hashtable shoppingCart)\
    \ {\n  long returnValue = 0L;\n  long orderId = System.currentTimeMillis();\n\
    \  Connection connection = getConnection();\n  if (connection != null) {\n   \
    \ Statement stmt = null;\n    try {\n      connection.setAutoCommit(false);\n\
    \      stmt = connection.createStatement();\n      try {\n**        OrderPeer.insertOrder(stmt,\
    \ orderId, customer);**\n**        OrderDetailsPeer.insertOrderDetails(stmt, orderId,\
    \ shoppingCart);**\n        try { stmt.close(); }\n        finally { stmt = null;\
    \ }\n        connection.commit();\n        returnValue = orderId;\n        }\n\
    \      catch (SQLException e) {\n        System.out.println(\"Could not insert\
    \ order: \" + e.getMessage());\n        try { connection.rollback(); }\n     \
    \   catch (SQLException ee) { }\n        }\n      }\n    catch (SQLException e)\
    \ {\n      System.out.println(\"Could not insert order: \" + e.getMessage());\n\
    \      }\n    finally {\n      if (stmt != null) {\n        try { stmt.close();\
    \ }\n        catch (SQLException e) { }\n        }\n      putConnection(connection);\n\
    \      }\n    }\n  return returnValue;\n  }\n```\n\n以粗体显示的两行向你展示了数据管理器如何要求 `orders`\
    \ 和 `order_details` 表的 peer 类执行更新。请注意，你向它们传递相同的语句和订单 ID。[清单 6-12](#Chapter06.html#list_6_12)\
    \ 显示了 `insertOrder`，这是执行更新的两个方法之一。\n\n***清单 6-12.** OrderPeer.insertOrder 方法*\n\
    \n```\npublic static void insertOrder(Statement stmt, long orderId,\n    Customer\
    \ customer) throws SQLException {\n  String sql = \"insert into orders (order_id,\
    \ delivery_name,\"\n      + \" delivery_address, cc_name, cc_number, cc_expiry)\
    \ values ('\"\n      + orderId + \"','\" + customer.getContactName() + \"','\"\
    \n      + customer.getDeliveryAddress() + \"','\"\n      + customer.getCcName()\
    \ + \"','\" + customer.getCcNumber()\n      + \"','\" + customer.getCcExpiryDate()\
    \ + \"')\"\n      ;\n  stmt.executeUpdate(sql);\n  }\n```\n\n[清单 6-13](#Chapter06.html#list_6_13)\
    \ 显示了另一个方法 `insertOrderDetails`。\n\n***清单 6-13.** OrderDetailsPeer.insertOrderDetails\
    \ 方法*\n\n```\npublic static void insertOrderDetails(Statement stmt, long orderId,\n\
    \    Hashtable shoppingCart) throws SQLException {\n  String sql;\n  Enumeration\
    \ enumList = shoppingCart.elements();\n  while (enumList.hasMoreElements()) {\n\
    \    CartItem item = (CartItem)enumList.nextElement();\n    sql = \"insert into\
    \ order_details (order_id, book_id, quantity,\"\n        + \" price, title, author)\
    \ values ('\" + orderId + \"','\"\n        + item.getBookID() + \"','\" + item.getQuantity()\
    \ + \"','\"\n        + item.getPrice() + \"','\" + item.getTitle() + \"','\"\n\
    \        + item.getAuthor() + \"')\"\n        ;\n    stmt.executeUpdate(sql);\n\
    \    }\n  }\n```\n\n这些方法抛出 SQL 异常而不是本地捕获它，以便数据管理器的方法捕获它。\n\n### XML 语法呢？\n\n在上一章中，你了解了编写\
    \ JSP 文档而不是 JSP 页面。这对我就数据库访问所说的内容有什么影响？没有！这是 MVC 模型的结果：JSP 是视图，而只有模型与数据库有关。\n\n\
    然而，从传统语法切换到 XML 语法对你执行数据管理器方法的方式有影响。例如，你可以编写 JSP 页面 `OrderConfirmation.jsp` 来使用几个脚本小程序将订单保存到数据库中，如\
    \ [清单 6-14](#Chapter06.html#list_6_14) 所示。\n\n***清单 6-14.** OrderConfirmation.jsp*\n\
    \n```\n01: <%@page language=\"java\" contentType=\"text/html\"%>\n02: <%@page\
