    \ `Checkout.jsp`, `ShoppingServlet.java`, and `Book.java` as shown.\n\n![Image](images/9781430246237_Fig03-06.jpg)\n\
    \n***Figure 3-6.** The E-bookshop folder structure*\n\nTo get the application\
    \ to work, you first need to compile the two Java modules from the command line\
    \ with `javac`, as explained in the “Java Test” section of [Chapter 1](#Chapter01.html).\
    \ Then copy the two `.class` files from `WEB-INF\\src\\ebookshop\\` to `WEB-INF\\\
