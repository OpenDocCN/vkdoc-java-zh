- fmt: '### Eclipse


    Although it’s possible to build web applications by compiling Java modules from
    the command line, it’s more efficient to use an Integrated Development Environment
    (IDE). This way, you can concentrate on the more creative part of developing software,
    rather than fix inconsistency and fiddle with folder hierarchies.


    An IDE integrates all the applications that you need to develop software—from
    a source editor and a compiler, to tools to automate the application building
    process and a debugger—into a single application. When developing in Java or in
    another OO language, an IDE also includes tools to visualize class and object
    structure as well as inheritance and containment. Another advantage of using an
    IDE is that it propagates changes you make to individual modules. For example,
    if you rename a class, the IDE can automatically update its occurrences throughout
    your project files.


    As the applications you develop become more complex, it makes more and more sense
    to use an IDE. That’s why, before continuing to our next project, I will tell
    you how to install and configure Eclipse.


    Eclipse is an extremely powerful and extensible IDE, well suited for web application
    development. The Eclipse Foundation makes a new release of the Eclipse IDE once
    a year. Each yearly release has a different name. To develop the examples contained
    in this book, I used Indigo 3.7.2 of February 16, 2012.


    Once you’ve installed Eclipse to develop web applications, you can use it for
    any other software development task, including, for example, developing and debugging
    applications written in Java, C++, and even Fortran, which is still widely used
    in the scientific community.


    Furthermore, whatever task related to software development you need to perform,
    it’s likely that somebody has already developed an Eclipse plug-in for it. The
    web site [`http://marketplace.eclipse.org/`](http://marketplace.eclipse.org/)
    lists more than 1,300 plug-ins organized in dozens of categories. In fact, Eclipse
    itself consists of a core platform that executes plug-ins, plus a series of plug-ins
    that implement most of its functionality. Therefore, the standard packages available
    for download from the Eclipse web site already include dozens of plug-ins.


    In this section, I''ll only explain how to install the standard Eclipse configuration
    for Java EE development, which is what you need as you go through the rest of
    this book.


    First of all, you need to download the package. To do so, go to [`http://www.eclipse.org/downloads/`](http://www.eclipse.org/downloads/)
    and click on the `Windows 32 bit` link of `Eclipse IDE for Java EE Developers`,
    as shown in [Figure 3-7](#Chapter03.html#fig_3_7).


    ![Image](images/9781430246237_Fig03-07.jpg)


    ***Figure 3-7.** Downloading Eclipse*


    The web site will suggest a mirror site for the download and provide the MD5 checksum.
    The installation of Eclipse is very easy: expand the downloaded `eclipse-jee-indigo-SR2-win32.zip`
    file and move the `eclipse` folder to a convenient place. For no particular reason,
    I chose to move it to `C:\`. Old habits are difficult to change. You might like
    to move the Eclipse folder to `C:\Program Files\`.


    To execute Eclipse, double-click `eclipse.exe`, which you find immediately inside
    the `eclipse` folder.


    When it starts, Eclipse asks you to select a workspace. The workspace is the folder
    where Eclipse stores your development projects. Therefore, it makes sense to place
    it on a drive or in a directory that you back up regularly. Before clicking on
    the `OK` button, check the box marked "`Use this as the default and do not ask
    again`". It will make your life easier. I chose `C:\Users\Giulio\`, which is my
    user''s home directory.


    The first time it executes, Eclipse displays a Welcome screen. To enter the screen
    where you do development, click on the Workbench icon, as shown in [Figure 3-8](#Chapter03.html#fig_3_8).


    ![Image](images/9781430246237_Fig03-08.jpg)


    ***Figure 3-8.** Eclipse–the Welcome screen*


    Once you see the Workbench screen, select the `Servers` tab and click on the `new
    server wizard` link, as shown in [Figure 3-9](#Chapter03.html#fig_3_9).


    ![Image](images/9781430246237_Fig03-09.jpg)


    ***Figure 3-9.** Eclipse–the Workbench screen*


    The screen that comes up is where you tell Eclipse to use Tomcat 7, as shown in
    [Figure 3-10](#Chapter03.html#fig_3_10).


    ![Image](images/9781430246237_Fig03-10.jpg)


    ***Figure 3-10.** Eclipse–choosing Tomcat 7 as localhost*


    Next (and last), you need to tell Eclipse where to find Tomcat 7 and what version
    of JDK to use, as shown in [Figure 3-11](#Chapter03.html#fig_3_11).


    ![Image](images/9781430246237_Fig03-11.jpg)


    ***Figure 3-11.** Eclipse–completing the Tomcat configuration*


    Now, if you have done everything correctly, Tomcat 7 should appear under the `Servers`
    tab of the Workbench. I have explained this configuration procedure because Eclipse
    is a very complex application, and it is easy to get lost among the many options.


    For the same reason, to be on the safe side, I will also explain how to create
    a new web project. Later, you will learn how to import into Eclipse the example
    projects included in the software package of this book.'
