- fmt: "# The i18n Library: Writing Multi-Lingual Applications\n\nYou can take one\
    \ of two approaches to internationalizing a web application: you can either provide\
    \ a different version of the JSP pages for each locale and select them via a servlet\
    \ when processing each request, or you can save locale-specific data in separate\
    \ resource bundles and access them via `i18n` actions. The JSTL internationalization\
    \ actions support both, but I will concentrate on the second approach, where the\
    \ work of switching between languages is actually done in JSP.\n\n## `fmt:setLocale`,\
    \ `fmt:setBundle`, `fmt:setMessage`, and `fmt:param`\n\nSuppose that you want\
    \ to support English and Italian. The first thing you have to do is identify all\
    \ the strings that are going to be different in the two languages and define two\
    \ bundles, one for each language (see [Listings 4-17](#Chapter04.html#list_4_17)\
    \ and [4-18](#Chapter04.html#list_4_18)).\n\n**Listing 4-17.** `MyBundle_en.java`\n\
    \n```\npackage myPkg.i18n;\nimport java.util.*;\npublic class MyBundle_en extends\
    \ ListResourceBundle {\n  public Object[][] getContents() {return contents;}\n\
    \  static final Object[][] contents = {\n    {\"login.loginmess\",\"Please login\
    \ with ID and password\"},\n    {\"login.submit\",\"Submit\"},\n    {\"login.choose\"\
    ,\"Choose the language\"},\n    {\"login.english\",\"English\"},\n    {\"login.italian\"\
