    The most commonly used implicit objects defined by Tomcat are `out` and `request`,
    followed by `application` and `session`. But I will go through them in alphabetical
    order, for ease of reference.


    Whether you create objects within JSP pages or Tomcat implicitly creates them
    for you, you cannot use them properly unless you know in which scope they are
    available. There are four possible scopes. In order of increasing generality,
    they are: *page*, *request*, *session*, and *application*. You will learn more
    about them in the following pages.


    In general, if you are not sure what class a particular object instantiates, you
    can always display its name with the following expression:


    `<%=the_misterious_object.getClass().getName()%>`


    #### The `application` Object


    The `application` object is an instance of the class `org.apache.catalina.core.ApplicationContextFacade`,
    which Tomcat defines to implement the interface `javax.servlet.ServletContext`.
    It provides access to the resources shared within the web application. For example,
    by adding an attribute (which can be an object of any type) to `application`,
    you can ensure that all JSP files that make up your web application have access
    to it.


    ##### Example: Using an Attribute to Enable and Disable Conditional Code


    One of the advantages of using JSP is that the web server doesn’t need to reinterpret
    the source file of a page every time a client requests that page. The JSP container
    translates each JSP page into a Java file and compiles it into a class, but this
    only happens when you update the JSP source. You might like to be able to switch
    on or off some particular functionality for debugging or other purposes, without
    having to edit one or more file and force Tomcat to recompile them when you flip
    the switch. To achieve this result, you only need to wrap the functionality in
    question inside a conditional statement, as the following one:


    `if (application.getAttribute("do_it") != null) {`

    `  /* ...place your "switchable" functionality here... */`

    `  }`


    You also need to include two small JSP pages in your application. The first one
    to set the attribute `do_it` (see [Listing 2-1](#Chapter02.html#list_2_1)) and
    the second one to remove it (see [Listing 2-2](#Chapter02.html#list_2_2)).


    ***Listing 2-1.** do_it.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<html><head><title>Conditional code ON</title></head>`

    `<body>Conditional code`

    `<%`

    `  application.setAttribute("do_it", "");`

    `  if (application.getAttribute("do_it") == null) out.print("not");`

    `  %>`

    `enabled</body></html>`


    ***Listing 2-2.** do_it_not.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<html><head><title>Conditional code OFF</title></head>`

    `<body>Conditional code`

    `<%`

    `  application.removeAttribute("do_it");`

    `  if (application.getAttribute("do_it") == null) out.print("not");`

    `  %>`

    `enabled</body></html>`


    When you want to enable the conditional code, you just type the URL of `do_it.jsp`
    in your browser. Until you disable it by typing the URL of `do_it_not.jsp` or
    by restarting Tomcat, the conditional code will remain enabled in all pages of
    your application. Notice that in the example `do_it.jsp` only sets the attribute
    `do_it` to an empty string, but you can also define different values to have a
    finer selection of code to be activated.


    Note that you can use the same mechanism to switch on and off HTML code.


    ##### Example: Using an Attribute to Control Logging


    You might find it useful to be able to control the logging of some events to a
    particular file dynamically. To do so, you need to include two JSP files in your
    application (see [Listings 2-3](#Chapter02.html#list_2_3) and [2-4](#Chapter02.html#list_2_4)).


    ***Listing 2-3.** log_on.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%@ page import="MyClasses.*"%>`

    `<html><head><title>Switch the log ON</title></head><body>`

    `<%`

    `  MyLog log = (MyLog)application.getAttribute("logFile");`

    `  if (log == null) {`

    `    try {`

    `      log = new MyLog("logs/mylog.log");`

    `      application.setAttribute("logFile", log);`

    `      log.println("Logging enabled");`

    `      out.println("Logging enabled");`

    `      }`

    `    catch (Exception e) {`

    `      out.println(e.getMessage());`

    `      }`

    `    }`

    `  else {`

    `    log.println("Attempt to enable logging");`

    `    out.println("Logging was already enabled");`

    `    }`

    `  %>`

    `</body></html>`


    ***Listing 2-4.** log_off.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%@ page import="MyClasses.*"%>`

    `<html><head><title>Switch the log OFF</title></head><body>`

    `<%`

    `  MyLog log = (MyLog)application.getAttribute("logFile");`

    `  if (log != null) {`

    `    log.println("Logging disabled");`

    `    log.close();`

    `    application.removeAttribute("logFile");`

    `    }`

    `  %>`

    `Done.`

    `</body></html>`


    After checking that there is no application attribute named `logFile`, `log_on.jsp`
    instantiates the `MyLog` class and saves the object as an application attribute
    named `logFile`. After that, you can easily make an entry in the log file from
    any JSP of the same application, as shown in [Listing 2-5](#Chapter02.html#list_2_5).


    ***Listing 2-5.** check_logging.jsp*


    `<%@ page import="MyClasses.*"%>`

    `<%`

    `  MyLog log = (MyLog)application.getAttribute("logFile");`

    `  if (log != null) log.println("This is my entry in the log");`

    `  %>`


    In `log_off.jsp`, after checking that the `logFile` attribute exists, you close
    the log file and remove the attribute. The logging is then disabled in all JSPs
    of the application, because any attempt to get the `logFile` attribute returns
    a `null`. The only piece of the puzzle that you still need is how to make the
    `MyLog` class.


    This is also simple:


    > *   Open the folder `%CATALINA_HOME%\webapps\ROOT\WEB-INF\`.

    > *   If `WEB-INF` has no subfolder named `classes` (it shouldn’t, if you have
    a fresh installation of Tomcat), create one.

    > *   Inside the newly created folder, create a folder named `MyClasses`, and
    place in it the file `MyLog.java` shown in [Listing 2-6](#Chapter02.html#list_2_6).

    > *   Open a command-line window and compile `MyLog.java` with `javac`, as explained
    in [Chapter 1](#Chapter01.html) for `Exec_http.java`.

    > *   Restart Tomcat.


    ***Listing 2-6.** MyLog.java*


    `/* MyLog.java - Implements a log class */`

    `package MyClasses;`

    `import java.util.Date;`

    `import java.text.SimpleDateFormat;`

    `import java.io.FileWriter;`

    `import java.io.PrintWriter;`

    `import java.io.IOException;`

    `public class MyLog {`

    `  private static final SimpleDateFormat TIME_FMT =`

    `                       new SimpleDateFormat("yyyy-MM-dd HH:mm:ss:SSS");`

    `  private static PrintWriter log = null;`

    `  public MyLog(String logpath) throws IOException {`

    `    log = new PrintWriter(new FileWriter(logpath, true));`

    `    }`

    `  public static synchronized void println(String s) {`

    `    log.println(TIME_FMT.format(new java.util.Date()) + " - " + s);`

    `    log.flush();`

    `    }`

    `  public static synchronized void close() {`

    `    log.close();`

    `    }`

    `  }`'
