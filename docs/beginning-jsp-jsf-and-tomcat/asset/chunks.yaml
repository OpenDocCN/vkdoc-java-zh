    选择器是你想要定义的 HTML 元素，属性是元素某个特性的名称，而值则是该特性的取值。你可以通过分号分隔为同一元素定义多个属性，也可以通过逗号分隔用单个定义来设置多个元素的样式。要为同一元素定义多种样式，可以为每种样式关联一个类名。例如：


    `  <style type="text/css">`

    `    p {font-size: 130%}`

    `    p.bold {font-weight: bold}`

    `    p.italic {font-style: italic}`

    `    </style>`


    然后，你可以按如下方式使用这些样式：


    `<p>This is a default paragraph, large size</p>`

    `<p class="bold">This is a large and bold paragraph</p>`

    `<p class="bold italic">This is a large, bold, and italic paragraph</p>`

    `<p class="italic" style="font-size: 100%;">This is an italic normal sized paragraph</p>`


    你可以将 `style` 元素放置在页面的 `head` 或 `body` HTML 元素中，或者通过在其 `style` 属性中用分号分隔样式定义来为单个元素定义样式。


    ### XML 文档


    为了解释 XML，我先给出一个简单的例子，这个例子将贯穿本章。为此，我将使用清单 5-1 中所示的文件。我们将在下一章回到 `eshop` 示例。但为了解释
    XML，最好先看一个简单的例子，避免被与当前任务无关的应用程序复杂性所干扰。


    ***清单 5-1.** enterprises.xml*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<starfleet>`

    `  <title>The two most famous starships in the fleet</title>`

    `  <starship name="USS Enterprise" sn="NCC-1701">`

    `    <class name="Constitution"/>`

    `    <captain>James Tiberius Kirk</captain>`

    `    </starship>`

    `  <starship name="USS Enterprise" sn="NCC-1701-D">`

    `    <class name="Galaxy"/>`

    `    <captain>Jean-Luc Picard</captain>`

    `    </starship>`

    `  </starfleet>`


    第一行定义了文档使用的标准和字符集。标签总是闭合的，要么通过结束标签（当它们有主体时，例如 `<title>...</title>`），要么通过斜杠（如果它们是空标签，例如
    `<class .../>`）。标签可以重复（例如 `starship`），属性名称也不是唯一的（例如 `name`）。


    如你所见，标签反映了数据的逻辑结构，尽管对同一信息进行结构化肯定有多种方式。每个标签标识一个带有名称的*元素节点*（例如 `starfleet`、`title`
    和 `class`，也称为*元素类型*），通常由包含*名称*和*值*的*属性*（例如 `sn="NCC-1701"`）来表征，并且可能包含*子节点*（例如
    `starship` 内部的 `captain`），也称为*子元素*。


    XML 文档还可以包含供处理它们的应用程序使用的处理指令（包含在 `<?` 和 `?>` 之间）、注释（包含在 `<!--` 和 `-->` 之间）以及文档类型声明（稍后会详细介绍）。请注意，`enterprises.xml`
    没有提供任何关于如何呈现其包含的数据的信息。


    XML 依靠小于号来标识标签。因此，如果你想将其用于其他目的，必须通过写入四个字符 `&lt;` 来对其进行转义。要转义较大的文本块，可以使用 `CDATA`
    部分，如下例所示：


    `<![CDATA[<aTag>The tag''s body</aTag>]]>`


    查看 `enterprises.xml`，你可能会问自己为什么 `sn` 是 `starship` 的属性，而 `captain` 是子元素。难道不能像下面的例子那样将
    `captain` 设为属性吗？


    `<starship name="USS Enterprise" sn="NCC-1701" captain="Jean-Luc Picard">`


    是的，可以。这完全取决于你认为将来可能想对该元素做什么。如果将 `captain` 定义为一个元素，你可以为其定义属性，例如其出生日期。如果你将 `captain`
    定义为属性，则无法做到这一点。`class` 元素也是如此。你也可以将 `starship` 的属性 `name` 和 `sn` 替换为两个子元素，但这有多大意义呢？


    我们还需要最后考虑一下空元素与有主体元素的区别。通过将船长的名字定义为元素的主体，例如：


    `<captain>Jean-Luc Picard</captain>`


    你使得它不可能拥有子元素。或者，你可以这样定义：


    `<captain name="Jean-Luc Picard"></captain>`


    也许可以简写为：


    `<captain name="Jean-Luc Picard"/>`


    ### 定义你自己的 XML 文档


    能够使用根据你需求定制的 XML 标签的实用性，通过可以在单独文档中正式指定它们而大大增强。这使你能够验证 XML 文档的有效性，并且还能向他人传达其结构。如果没有标准化格式的规范，你将不得不使用纯语言或通过示例来描述文档结构。这不会是最高效的方式，而且肯定不足以用于自动验证。两种最广泛使用的指定文档结构的方法是
    XML DTD 和 XML 模式。你将在本章后面看到，你可以通过向 XML 文档添加适当的元素来选择其用于验证的方法。


    #### XML DTD


    DTD 比 XML 模式更为人所知，后者是最近才发展起来的。它们也更容易理解。DTD 最初是为 XML 的前身——标准通用标记语言（SGML）开发的，并且具有非常紧凑的语法。清单
    5-2 展示了 `enterprises.xml` 的 DTD 会是什么样子。


    ***清单 5-2.** starfleet.dtd*


    `01: <!ELEMENT starfleet (title,starship*)>`

    `02: <!ELEMENT title (#PCDATA)>`

    `03: <!ELEMENT starship (class,captain)>`

    `04: <!ATTLIST`

    `05:     starship name CDATA #REQUIRED`

    `06:     sn CDATA #REQUIRED>`

    `07: <!ELEMENT class EMPTY>`

    `08: <!ATTLIST class name CDATA #REQUIRED>`

    `09: <!ELEMENT captain (#PCDATA)>`


    第 1 行将 `starfleet` 元素定义为一个 `title` 元素和不定数量的 `starship` 元素组成。将星号替换为加号将要求 `starship`
    至少出现一次，而问号则表示零个或一个 starship。如果你将 `starship` 替换为 `(starship|shuttle)`，则意味着在 `title`
    之后可以混合出现 `starship` 和 `shuttle` 元素（仅作为示例，因为你尚未定义 `shuttle`）。


    第 2 行将 `title` 指定为一个字符串（`PCDATA` 中的 `PC` 代表*已解析字符*）。第 7 行展示了如何指定一个元素不允许有主体。为了完成如何定义元素的描述，我只需要补充一点：如果你将
    `EMPTY` 替换为 `ANY`，则意味着该元素可以包含任何类型的数据。


    第 4–6 行指定了 `starship` 的属性。属性列表声明的一般格式如下：


    `<!ATTLIST` *`元素名称`**`属性名称`**`属性类型`**`默认值`*`>`


    其中 *`属性类型`* 可以有十几种可能的值，包括 `CDATA`（表示字符数据）、所有允许字符串的枚举（用括号括起来，竖线作为分隔符，例如 `(left|right|center)`）、`ID`（表示唯一标识符）和
    `IDREF`（另一个元素的 `ID`）。*`默认值`* 可以是一个带引号的值（例如 "`0`" 或 "`a string`"）、关键字 `#REQUIRED`（表示它是必需的）、关键字
    `#IMPLIED`（表示它可以省略），或者关键字 `#FIXED` 后跟一个值（用于强制属性具有该值）。

