    `MyLog.java` 以追加模式打开你的日志文件，并在写入文件前将日期和时间添加到条目中。请注意，这些方法都是同步的，因此多个页面可以同时记录日志条目而不会混淆。另一种做法是让
    `MyLog` 成为 `PrintWriter` 的子类。这样你就可以使用 `PrintWriter` 的所有方法，并且无需在 `MyLog` 中定义 `close`
    方法。不过，我希望这些方法是同步的，即使这看起来有些多余。


    如果你将这三个 JSP 文件都放在 `%CATALINA_HOME%\webapps\ROOT\tests\` 目录下，要测试日志记录功能，你只需在 Web
    浏览器中输入 [`http://localhost:8080/tests/log_on.jsp`](http://localhost:8080/tests/log_on.jsp)，然后依次访问
    `check_logging.jsp` 和 `log_off.jsp`。


    在 `%CATALINA_HOME%\logs\` 文件夹中，你会找到 `mylog.log` 文件，其中包含如下三行内容：


    `2012-05-09 16:38:09:000 - Logging enabled`

    `2012-05-09 16:38:12:183 - This is my entry in the log`

    `2012-05-09 16:38:15:583 - Logging disabled`


    将类添加到默认的 Tomcat 应用程序中并非正确的做法。首先，随意重启 Tomcat 会中止所有用户会话。在下一章中，我将解释如何创建独立的、自包含的应用程序。届时，一切都会变得更加清晰。


    #### `config` 对象


    `config` 对象是 `org.apache.catalina.core.StandardWrapperFacade` 类的一个实例，Tomcat 定义该类以实现
    `javax.servlet.ServletConfig` 接口。Tomcat 使用此对象将信息传递给 Servlet。


    以下 `config` 方法可能是你唯一会用到的方法；其用法很简单：


    `config.getServletName()`


    该方法返回 Servlet 名称，即 `WEB-INF\web.xml` 文件中定义的 `<servlet-name>` 元素中包含的字符串。稍后你将了解更多关于此文件的信息。`<servlet-name>`
    的默认值是 `jsp`。


    #### `exception` 对象


    `exception` 对象是 `Throwable` 子类（例如 `java.lang.NullPointerException`）的一个实例，并且仅在错误页面中可用。


    清单 2-7 向你展示了两种将堆栈跟踪发送到输出的方法。第一种方法使用 `getStackTrace`，允许你将每个跟踪元素作为 `java.lang.StackTraceElement`
    类型的对象进行访问，然后你可以使用 `getClassName`、`getFileName`、`getLineNumber` 和 `getMethodName`
    等方法对其进行分析。


    ***清单 2-7.** stack_trace.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%@page import="java.util.*, java.io.*"%>`

    `<%@page isErrorPage="true"%>`

    `<html><head><title>Print stack trace</title></head><body>`

    `From exception.getStackTrace():<br/>`

    `<pre><%`

    `  StackTraceElement[] trace = exception.getStackTrace();`

    `  for (int k = 0; k < trace.length; k++) {`

    `    out.println(trace[k]);`

    `    }`

    `  %></pre>`

    `Printed with exception.printStackTrace(new PrintWriter(out)):`

    `<pre><%`

    `  exception.printStackTrace(new PrintWriter(out));`

    `  %></pre>`

    `</body></html>`


    请注意指令 `<%@page isErrorPage="true"%>`，如果没有它，隐式对象 `exception` 将不会被定义。如果你像普通页面一样执行此页面，将会得到一个
    `NullPointerException`。清单 2-8 展示了一个如何使用错误页面的简单示例。


    ***清单 2-8.** cause_exception.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%@page errorPage="stack_trace.jsp"%>`

    `<html><head><title>Cause null pointer exception</title></head><body>`

    `<%`

    `  String a = request.getParameter("notThere");`

    `  int len = a.length(); // causes a null pointer exception`

    `  %>`

    `</body></html>`


    请注意 `<%@page errorPage="stack_trace.jsp"%>` 指令，它将清单 2-7 中的错误页面与异常的发生关联起来。为了引发
    `NullPointerException`，该页面请求一个不存在的参数，然后访问它。如果你使用 `try`/`catch` 来捕获异常，那么错误页面显然不会被执行。


    要查看这两个页面的实际效果，请将它们放在 `%CATALINA_HOME%\webapps\ROOT\tests\` 文件夹中，并在浏览器中输入 [`http://localhost:8080/tests/cause_exception.jsp`](http://localhost:8080/tests/cause_exception.jsp)。

    '
- fmt: '### `out` 对象


    在 JSP 中，使用 `out` 对象的方式与在 Java 中使用 `System.out` 对象的方式相同：用于写入标准输出。JSP 页面的标准输出是发送回客户端的
    HTML 响应体。因此，脚本段 `<%out.print(`*`expression`*`);%>` 会导致表达式的结果显示在客户端的浏览器中。通过简单地输入
    `<%=`*`expression`*`%>` 也可以达到同样的效果。


    请记住，在 JSP 页面中，写在脚本段和其他 JSP 元素之外的所有内容都会被发送到输出。因此，以下三行代码对响应产生的影响完全相同：


    ```

    <% out.print("abc"); %>

    <%="abc"%>

    abc

    ```


    显然，当需要写入字面值时，使用前两种格式是没有意义的。要决定是使用由 `<%..%>` 分隔的脚本段，还是使用由 `<%=..%>` 分隔的表达式，你应该查看周围的代码，并决定哪种方式能使代码尽可能易于阅读。


    `out` 对象最有用的方法是 `print` 和 `println`。两者唯一的区别是 `println` 会在输出后追加一个换行符。作为参数，这两个方法都接受一个字符串或任何其他原始类型的变量。在下面的示例中，存储在
    `intVar` 中的 `int` 值会被自动转换为字符串：


    ```

    out.print("a string" + intVar + obj.methodReturningString() + ".");

    ```


    顺便提一下，你可以使用以下两种方法之一手动进行转换：


    ```

    String s = Integer.toString(intVar);

    String s = "" + intVar;

    ```


    请注意，如果你试图通过将对象或数组的名称放入 `print` 语句中来打印它，你*不一定*会在输出中看到其内容。如果该对象不支持 `toString()`
    方法，你将看到一个代表该对象引用的神秘字符串。


    正如我所说，JSP 页面中所有位于 JSP 元素之外的内容都会被发送到输出，包括每个元素后面的换行符。这会导致输出中出现大量空行。例如，以下代码会在输出中产生三个空行：


    ```

    <% first element %>here is a newline!

    <% second element %>here is a newline!

    <% third element %>here is a newline!

    ```


    要移除这些空行，你有三种选择。首先，你可以“链接”元素分隔符，这样换行符就*位于*元素内部，而不会出现在输出中：


    ```

    <% first element %><%

    second element %><%

    third element %>here is a newline!

    ```


    其次，你可以将换行符放在 JSP 注释中（尽管这会使你的代码难以阅读）：


    ```

    <% first element %><%--

    --%><% second element %><%--

    --%><% third element %>here is a newline!

    ```


    第三，你可以在页面开头编写以下指令：


    ```

    <%@page trimDirectiveWhitespaces="true"%>

    ```


    这将从输出中移除所有不必要的空格，包括换行符。


    大多数手册指出，`out` 是 `javax.servlet.jsp.JspWriter` 类的一个实例，你可以使用它来写入响应。这并不完全正确，因为 `JspWriter`
    是一个抽象类，因此无法被实例化。实际上，`out` 是非抽象类 `org.apache.jasper.runtime.JspWriterImpl` 的一个实例，该类继承了
    `JspWriter`。Tomcat 定义 `JspWriterImpl` 正是为了实现 `JspWriter` 的方法。出于所有实际目的，这对你来说无关紧要，但你们中一些眼尖的读者可能会认为我在谈论实例化一个抽象类。通常，精确一点是有好处的。


    `JspWriter` 类包含几个字段的定义。你可能用不到它们，但提及它们让我有机会给你一些有用的信息。


    `autoFlush` 字段告诉你，当 `JspWriter` 的缓冲区满时，是自动刷新，还是在溢出时抛出 `IOException`。`out` 的默认值是
    `true`，这意味着如果缓冲区满了，Tomcat 会向客户端发送部分响应。你可以通过指令 `<%@page autoFlush="false"%>` 将其设置为
    `false`，如果你期望客户端是一个应用程序，就应该这样做。当客户端是浏览器时，以“块”的形式发送响应是完全没问题的，但应用程序可能期望响应以单个块的形式发送。如果你期望客户端是一个应用程序并将
    `autoFlush` 设置为 `false`，你还应该使用 `<%@page buffer="size-in-kb"%>`，以确保输出缓冲区足够大，能够存储你最大的响应。`autoFlush`
    字段是受保护的，但你可以通过 `isAutoFlush` 方法获取其值。


    `bufferSize` 字段是输出缓冲区的大小（以字节为单位）。`out` 的默认值是 8,192 字节。它是一个受保护的字段，但你可以通过 `getBufferSize`
    方法获取其值。


    还有三个常量整数字段（`DEFAULT_BUFFER`、`NO_BUFFER` 和 `UNBOUNDED_BUFFER`，类型为 `public static
    final int`），但你可以安全地忽略它们。仅作记录，它们分别用于测试 `JspWriter` 是否被缓冲（并使用默认缓冲区大小）、是否未被缓冲、或者是否使用无界缓冲区进行缓冲。除了你没有变量或属性来对照这些值进行检查之外，`getBufferSize`
    方法在任何情况下都能很好地为你服务（如果输出未被缓冲，该方法返回 `0`）。


    你已经在几个示例中看到，可以使用 `print` 和 `println` 写入输出缓冲区。作为参数，你可以使用 Java 的八种原始数据类型（`boolean`、`char`、`byte`、`short`、`int`、`long`、`float`
    和 `double`）、字符数组（`char[]`）、对象（`java.lang.Object`）或字符串（`java.lang.String`）。在实践中，你通常会使用
    `String` 参数，如下例所示：


    ```

    out.print("fun(" + arg + ") = " + fun(arg));

    ```


    在这里，`fun(arg)` 被执行，并且 `arg` 和 `fun(arg)` 返回的值都会被自动转换为字符串，以便与其余部分连接。


    `write` 方法继承自 `java.io.Writer`，它将字符数组或字符串的一部分发送到输出。例如，如果 `cbuf` 是一个 `char[]` 类型的变量，`out.write(cbuf,
    offs, len)` 将写入 `cbuf` 的一部分，其中 `offs` 是第一个字符的偏移量，`len` 是要复制的字符数。你可以通过以下代码提取数组的一部分，然后使用
    `print` 打印它来达到同样的效果：


    ```

    char[] portion = java.util.Arrays.copyOfRange(cbuf, offs, offs+len-1)

    ```


    然而，这样效率较低，因为你首先要复制原始数组的一部分——这是使用 `write` 时不需要的操作。


    你不太可能使用其他任何方法，并且绝对应该避免使用 `close`，它会关闭输出流。Tomcat 会在安全的时候关闭流，你不需要去干预它。'
  raw: '#### The `out` Object


    You use the `out` object in JSP as you use the `System.out` object in Java: to
    write to the standard output. The standard output for a JSP page is the body of
    the HTML response sent back to the client. Therefore, the scriptlet `<%out.print(`*`expression`*`);%>`
    causes the result of the expression to be displayed in the client’s browser. You
    can achieve the same result by simply typing `<%=`*`expression`*`%>`.


    Keep in mind that whatever you write in a JSP page outside scriptlets and other
    JSP elements is sent to the output anyway. Therefore, the following three lines
    have exactly the same effect on the response:


    `<% out.print("abc"); %>`

    `<%="abc"%>`

    `abc`


    Clearly, it makes no sense to use the first two formats when you need to write
    literal values. To decide whether to use a scriptlet delimited by `<%..%>` or
    an expression delimited by `<%=..%>`, you should look at the surrounding code
    and decide what makes it as easy to read as possible.


    The most useful methods of the object `out` are `print` and `println`. The only
    difference between the two is that `println` appends a newline character to the
    output. As an argument, both methods accept a string or any other primitive type
    variable. In the following example, the `int` value stored in `intVar` is automatically
    converted to a string:


    `out.print("a string" + intVar + obj.methodReturningString() + ".");`


    Incidentally, you could use either of the following two methods to do the conversion
    manually:


    `String s = Integer.toString(intVar);`

    `String s = "" + intVar;`


    Be aware that if you try to print an object or an array by sticking its name into
    a `print` statement, you *won’t* necessarily see its content in the output. If
    the object doesn’t support a `toString()` method, you’ll see a mysterious string
    representing the reference to the object.


    As I already said, everything within a JSP page that’s outside JSP elements is
    sent to the output, including the newline characters that follow each element.
    This causes a proliferation of empty lines in the output. For example, this code
    causes three empty lines in the output:


    `<%` *`first element`* `%>`*`here is a newline!`*

    `<%` *`second element`* `%>`*`here is a newline!`*

    `<%` *`third element`* `%>`*`here is a newline!`*


    To remove the empty lines, you have three options. First, you can “chain” the
    element delimiters, so that the newlines are *inside* the elements and don’t show
    up in the output:


    `<%` *`first element`* `%><%`

    *`second element`* `%>`*`<%`*

    *`third element`* `%>`*`here is a newline!`*


    Second, you can put the newlines inside JSP comments (although it will make your
    code difficult to read):


    `<%` *`first element`* `%><%--`

    `--%><%` *`second element`* `%><%--`

    `--%><%` *`third element`* `%>`*`here is a newline!`*


    Third, you can write the following directive at the beginning of your page:


    `<%@page trimDirectiveWhitespaces="true"%>`


    and this will remove all unnecessary spaces from the output, including the newlines.


    Most manuals state that `out` is an instance of the `javax.servlet.jsp.JspWriter`
    class, which you can use to write into the response. This is not entirely correct,
    because `JspWriter` is an abstract class, and as such, it cannot be instantiated.
    In reality, `out` is an instance of the nonabstract class `org.apache.jasper.runtime.JspWriterImpl`,
    which extends `JspWriter`. Tomcat defines `JspWriterImpl` precisely to implement
    the `JspWriter` methods. For all practical purposes, this is inconsequential to
    you, but some of you sharp-eyed readers might have thought that I was talking
    about instantiating an abstract class. It usually pays to be precise.


    The `JspWriter` class includes the definition of a handful of fields. You won’t
    need them, but mentioning them gives me the opportunity to give you some useful
    information.


    The `autoFlush` field tells you whether the `JspWriter` is flushed automatically
    when its buffer fills up or whether an `IOException` is thrown upon overflow.
    The default for `out` is `true`, which means that Tomcat will send a partial response
    to the client if the buffer fills up. You can set it to `false` with the directive
    `<%@page autoFlush="false"%>`, and you should do so if you expect the client to
    be an application. Sending the response in “chunks” is perfectly OK when the client
    is a browser, but an application will probably expect the response in a single
    block. If you expect the client to be an application and set `autoFlush` to `false`,
    you should also use `<%@page buffer="size-in-kb"%>`, to ensure that the output
    buffer is large enough to store your largest response. The field `autoFlush` is
    protected, but you can obtain its value with the `isAutoFlush` method.


    The `bufferSize` field is the size in bytes of the output buffer. The default
    for `out` is 8,192 bytes. It’s a protected field, but you can obtain its value
    with the `getBufferSize` method.


    There are also three constant integer fields (`DEFAULT_BUFFER`, `NO_BUFFER`, and
    `UNBOUNDED_BUFFER`, of type `public static final int`), but you can safely ignore
    them. Just for the record, they’re respectively used to test whether the `JspWriter`
    is buffered (and uses the default buffer size), isn’t buffered, or is buffered
    with an unbounded buffer. Besides the fact that you have no variable or attribute
    to check against these values, you’re in any case well served by the `getBufferSize`
    method (which returns `0` if the output is not buffered).


    You’ve already seen in several examples that you can use `print` and `println`
    to write to the output buffer. As an argument, you can use any of the eight primitive
    data types of Java (`boolean`, `char`, `byte`, `short`, `int`, `long`, `float`,
    and `double`), an array of characters (`char[]`), an object (`java.lang.Object`),
    or a string (`java.lang.String`). In practice, you’ll usually use a `String` argument,
    as in the following example:


    `out.print("fun(" + arg + ") = " + fun(arg));`


    Here, `fun(arg)` is executed, and both `arg` and the value returned by `fun(arg)`
    are automatically converted to strings to be concatenated with the rest.


    The `write` method, inherited from `java.io.Writer`, sends a portion of an array
    of characters or of a string to the output. For example, if `cbuf` is a variable
    of type `char[]`, `out.write(cbuf, offs, len)` will write a portion of `cbuf`,
    with `offs` being the offset of the first character and `len` being the number
    of characters to be copied. You could achieve the same result by extracting a
    part of the array with the following code and then printing it with `print`:


    `char[] portion = java.util.Arrays.copyOfRange(cbuf, offs, offs+len-1)`


    However, it would be less efficient, because first you would be copying a portion
    of the original array—an operation you don’t need when using `write`.


    You’re not likely to use any of the other methods, and you should definitely avoid
    using `close`, which closes the output stream. Tomcat closes the stream when it
    is safe to do so, and you don’t want to fiddle with it.'
