  trans: "\n## 介绍 JSP 与 Tomcat\n\n交互性正是让 Web 真正有用的关键所在。通过与远程服务器交互，你可以找到所需信息、与朋友保持联系，或在线购物。每当你向网页表单中输入内容时，某个“远端”应用程序便会解读你的请求，并准备一个网页来做出响应。\n\
    \n要理解 JSP，你首先需要清楚当你在浏览器地址栏输入 URL 或点击超链接来查看网页时，究竟发生了什么。图 1-1 展示了其工作原理。\n\n![图片](img/9781430246237_Fig01-01.jpg)\n\
    \n***图 1-1.** 查看纯 HTML 页面*\n\n以下步骤说明了当你请求浏览器查看一个静态网页时发生的过程：\n\n> 1.  当你在地址栏输入诸如\
    \ [`http://www.website.com/path/whatever.html`](http://www.website.com/path/whatever.html)\
    \ 这样的地址时，你的浏览器首先会（通常通过询问你的互联网服务提供商提供的域名服务器）将 [`www.website.com`](http://www.website.com)（即\
    \ Web 服务器的名称）解析为相应的互联网协议（IP）地址。然后，你的浏览器会向新找到的 IP 地址发送一个 HTTP 请求，以获取由 `/path/whatever.html`\
    \ 标识的文件内容。\n> 2.  作为回应，Web 服务器会发送一个包含纯文本 HTML 页面的 HTTP 响应。图片和其他非文本组件（如声音和视频剪辑）仅以引用的形式出现在页面中。\n\
    > 3.  你的浏览器接收响应，解释页面中包含的 HTML 代码，从服务器请求非文本组件，并显示所有内容。\n\nJavaServer Pages (JSP)\
    \ 是一种通过将脚本文件转换为可执行的 Java 模块来帮助你创建此类动态生成页面的技术；JavaServer Faces (JSF) 是一个促进与页面查看者交互的软件包；而\
    \ Tomcat 是一个可以执行你的代码并充当动态页面 Web 服务器的应用程序。\n\n开发 JSP/JSF Web 应用程序所需的一切都可以从互联网上免费下载；但要安装所有必要的软件包和工具并获得一个集成开发环境，你需要谨慎行事。没有什么比处理安装不正确的软件更令人恼火的了。当某些东西无法工作时，问题总是难以找到。\n\
    \n在本章中，我将向你介绍 Java Servlet 和 JSP，并向你展示它们如何在 Tomcat 内部协同工作以生成动态网页。但是，首先，我将指导你完成\
    \ Java 和 Tomcat 的安装：如果无法在你的电脑上执行代码，那么查看代码又有什么意义呢？\n\n随着学习的深入，你还需要安装更多的软件包。正确完成这些安装，你将永远不必怀疑自己。总的来说，仅\
    \ Java 和 Tomcat 就需要至少 300MB 的磁盘空间，而安装 Eclipse 开发环境则需要两倍的空间。\n\n为了运行本书中的所有示例，我使用了一台配备\
    \ 2.6GHz AMD Athlon 64x2 处理器（如今已不算高端）、1GB 内存并运行 Windows Vista SP2 的 PC。在进行任何安装之前，我重新格式化了硬盘并从原始\
    \ DVD 重新安装了操作系统。**我绝不是建议你也这样做！** 我这样做有两个相反但同等重要的原因：首先，我不希望现有的东西干扰 Web 开发所需的最新软件包；其次，我不想依赖任何已安装的东西。我想确保能给你一份所需内容的完整清单。\n\
    \n在撰写本文时，你需要安装的所有软件包的最新版本如下：\n\n> Java：1.7.0 update 3（本章介绍安装方法）\n> Tomcat Web\
    \ 服务器：7.0.26（本章也介绍安装方法）\n> Eclipse 开发环境：Indigo 3.7.2（第 2 章介绍安装方法）\n> MySQL 数据库：5.5.21.0（第\
    \ 6 章介绍安装方法）\n> MySQL Java 数据库连接器 (JDBC)：5.1.18（第 6 章也介绍安装方法）\n> JavaServer Faces：2.1.7（第\
    \ 7 章介绍安装方法）\n\n我将 Eclipse 列入清单，是因为集成开发环境对于开发软件极为有用。而列出 MySQL，则是因为任何重要的 Web 应用程序都可能需要处理数据。\n\
    \n当然，在本书出版后，上述所有软件包很可能都会有更新的版本。尽管如此，你应该能够根据我的说明毫无问题地安装最新版本。\n\n最后一条建议：为确保一切正常工作，请严格遵守安装说明。这将为你省去无尽的麻烦。\n\
    \n话不多说，我们开始吧。\n\n### 安装 Java\n\n没有 Java 什么也运行不了，你需要两个不同的 Java 软件包：一个是运行时环境 (JRE)，它让你能够执行\
    \ Java；另一个是 Java 开发工具包 (JDK)，它让你能够将 Java 源代码编译成可执行的类。\n\n它们可以从 Oracle 的网站一起下载。以下是需要执行的操作：\n\
    \n> 1.  访问网址 [`http://www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)`.`。\n\
    > 2.  点击标有“`Java Download`”的大按钮（撰写本文时最新版本为 `7u3`）。这将带你进入“Java SE Development Kit\
    \ 7 Downloads”页面。\n> 3.  选择“`Accept License Agreement`”，然后点击链接 `jdk-7u3-windows-i586.exe`。\n\
    >     \n>     \n>     \n>     实际链接可能指向“`7u3`”以外的版本，但你需要根据你电脑的处理器类型下载“`Windows\
    \ x86 (32-bit)`”或“`Windows x64 (64-bit)`”。虽然我使用的是 64 位 PC，但我用 32 位软件包测试了本书中的所有示例，因为我不想把所有东西都测试两遍。\n\
    >     \n>     \n> 4.  执行该文件。\n> 5.  在提示时接受许可协议并安装所有内容。\n\n此时，你的电脑上应该会有 `C:\\Program\
    \ Files\\Java\\` 文件夹，其中包含两个子文件夹：`jdk1.7.0_03` 和 `jre7`，或者与你下载版本相对应的文件夹。\n\n为了能够从命令行编译\
    \ Java，你需要将 JDK 路径添加到 `PATH` 环境变量中。从 Windows `开始` 菜单中，选择 `设置` ![图片](img/U001.jpg)\
    \ `控制面板` ![图片](img/U001.jpg) `系统`。当 `系统属性` 对话框打开时，点击左侧的“`高级系统设置`”链接，然后点击 `高级`\
    \ 选项卡。最后，要进入允许你修改 `PATH` 变量的对话框，请点击“`环境变量`”按钮。你将看到如图 1-2 所示的双重对话框窗口。\n\n![图片](img/9781430246237_Fig01-02.jpg)\n\
    \n***图 1-2.** 环境变量双重对话框*\n\n你可能会在上方对话框中看到一个 `PATH` 变量，但你需要做的是点击下方对话框的侧边栏滚动，直到看到一个名为\
    \ `Path` 的变量。双击它（或高亮它并点击“`编辑...`”按钮），并在其值的开头插入文本“`C:\\Program Files\\Java\\jdk1.7.0_03\\\
    bin;`”，如图 1-3 所示。\n\n![图片](img/9781430246237_Fig01-03.jpg)\n\n***图 1-3.** 更新 Path\
    \ 变量*\n\n文本末尾的分号至关重要，因为它将新路径与现有路径分隔开。前后不要插入额外的空格。\n\n点击“`确定`”按钮保存更改。然后再点击此按钮几次，直到系统对话框关闭。\n"
- fmt: "#### Java Test\n\nTo test the Java installation, you can use the little application\
    \ shown in [Listing 1-1](#Chapter01.html#list_1_1).\n\n**Listing 1-1.** `Exec_http.java`\n\
    \n```\n/* Exec_http.java - Launches a web page\n *\n * Usage: Exec_http URL [arg1\
    \ [arg2 [...]]]\n * where URL is without \"http://\"\n *\n */\nimport java.io.*;\n\
    import java.net.*;\nclass Exec_http {\n  public static void main(String[] vargs)\n\
    \      throws java.net.MalformedURLException ,java.io.IOException\n      {\n \
    \   String  dest = \"http://\";\n\n    if (vargs.length <= 0) {\n      System.out.println(\"\
    Usage: Exec_http page [args]\");\n      System.exit(1);\n      }\n    else {\n\
    \      dest += vargs[0];\n      for (int k = 1; k < vargs.length; k++) {\n   \
    \     dest += ((k == 1) ? \"?\" : \"&\") + vargs[k];\n        }\n      }\n   \
    \ System.out.println(dest);\n    URL          url = new URL(dest);\n    Object\
    \       obj = url.getContent();\n    InputStream  resp = (InputStream)obj;\n \
    \   byte[]       b = new byte[256];\n    int          n = resp.read(b);\n    while\
    \ (n != -1) {\n      System.out.print(new String(b, 0, n));\n      n = resp.read(b);\n\
    \      }\n    }\n  }\n```\n\nIt lets you open a web page from the command line.\
    \ Note that all the code described in this book is available for download from\
    \ the Apress web site ([`http://www.apress.com/9781430246237`](http://www.apress.com/9781430246237)).\
    \ You don’t need to retype it. You can find the examples in folders with the same\
    \ names as the corresponding chapters. I will refer to the root directory of the\
    \ software package associated with this book with the string `%SW_HOME%`.\n\n\
    Copy the file `%SW_HOME%\\01 Getting Started\\java\\Exec_http.java` to a work\
    \ directory. For simplicity, I use the desktop: but in my case, this makes sense\
    \ because I use the computer exclusively to develop the examples used in this\
    \ book.\n\nOpen a command-line window by clicking the `Start` button and selecting\
    \ `Programs` ![Image](images/U001.jpg) `Accessories` ![Image](images/U001.jpg)\
    \ `Command Prompt`. Then, after changing to your work directory, type `javac Exec_http.java`\
    \ to compile the application. It should return the prompt without saying anything.\
    \ If this happens, it means that you have correctly updated the `Path` system\
    \ variable. If you want to know more about what the `javac` compiler is doing,\
    \ type `–verbose` between `javac` and the name of the file.\n\nYou will see a\
    \ file named `Exec_http.class` in your work directory.\n\nNow, to run the application,\
    \ type `java Exec_http` followed by the URL of the page you want to display. Any\
    \ URL will do, but remember that the command-line accessory doesn’t understand\
    \ HTML. Therefore, if you display any commercial page, you will see a long stream\
    \ of text filling the window.\n\nTo test the application, I placed on one of my\
    \ web servers a one-line text file. [Figure 1-4](#Chapter01.html#fig_1_4) shows\
    \ what happened.\n\n![Image](images/9781430246237_Fig01-04.jpg)\n\n**Figure 1-4.**\
    \ Testing Java\n\nYou are welcome to use `hello.txt` for your test. Hopefully,\
    \ I will remember to keep it online!\n\n### Installing Tomcat\n\nThis is the Java\
    \ web server, which is the servlet container that allows you to run JSP. If you\
    \ have already installed an older version of Tomcat, you should remove it before\
    \ installing a new version.\n\nTomcat listens to three communication ports of\
    \ your PC (8005, 8009, and 8080). Before you install Tomcat, you should check\
    \ whether some already-installed applications are listening to one or more of\
    \ those ports. To do so, open a DOS window and type the command `netstat /a`.\
    \ It will display a list of active connections in tabular form. The second column\
    \ of the table will look like this:\n\n```\nLocal Address\n0.0.0.0:135\n0.0.0.0:445\n\
    0.0.0.0:3306\n```\n\nThe port numbers are the numbers after the colon. If you\
    \ see one or more of the ports Tomcat uses, after installing Tomcat, you will\
    \ have to change the ports it listens to, as explained in [Chapter 10](#Chapter10.html).\
    \ There, you will also learn the purpose of those three ports.\n\nHere’s how to\
    \ install Tomcat 7 correctly:"
  raw: '#### Java Test


    To test the Java installation, you can use the little application shown in [Listing
    1-1](#Chapter01.html#list_1_1).


    ***Listing 1-1.** Exec_http.java*


    `/* Exec_http.java - Launches a web page`

    ` *`

    ` * Usage: Exec_http URL [arg1 [arg2 [...]]]`

    ` * where URL is without "http://"`

    ` *`

    ` */`

    `import java.io.*;`

    `import java.net.*;`

    `class Exec_http {`

    `  public static void main(String[] vargs)`

    `      throws java.net.MalformedURLException ,java.io.IOException`

    `      {`

    `    String  dest = "http://";`


    `    if (vargs.length <= 0) {`

    `      System.out.println("Usage: Exec_http page [args]");`

    `      System.exit(1);`

    `      }`

    `    else {`

    `      dest += vargs[0];`

    `      for (int k = 1; k < vargs.length; k++) {`

    `        dest += ((k == 1) ? "?" : "&") + vargs[k];`

    `        }`

    `      }`

    `    System.out.println(dest);`

    `    URL          url = new URL(dest);`

    `    Object       obj = url.getContent();`

    `    InputStream  resp = (InputStream)obj;`

    `    byte[]       b = new byte[256];`

    `    int          n = resp.read(b);`

    `    while (n != -1) {`

    `      System.out.print(new String(b, 0, n));`

    `      n = resp.read(b);`

    `      }`

    `    }`

    `  }`


    It lets you open a web page from the command line. Note that all the code described
    in this book is available for download from the Apress web site ([`http://www.apress.com/9781430246237`](http://www.apress.com/9781430246237)`)`.
    You don’t need to retype it. You can find the examples in folders with the same
    names as the corresponding chapters. I will refer to the root directory of the
    software package associated with this book with the string `%SW_HOME%`.


    Copy the file `%SW_HOME%\01 Getting Started\java\Exec_http.java` to a work directory.
    For simplicity, I use the desktop: but in my case, this makes sense because I
    use the computer exclusively to develop the examples used in this book.


    Open a command-line window by clicking the `Start` button and selecting `Programs`
    ![Image](images/U001.jpg) `Accessories` ![Image](images/U001.jpg) `Command Prompt`.
    Then, after changing to your work directory, type “`javac Exec_http.java`” to
    compile the application. It should return the prompt without saying anything.
    If this happens, it means that you have correctly updated the `Path` system variable.
    If you want to know more about what the `javac` compiler is doing, type `–verbose`
    between `javac` and the name of the file.


    You will see a file named `Exec_http.class` in your work directory.


    Now, to run the application, type “`java Exec_http`” followed by the URL of the
    page you want to display. Any URL will do, but remember that the command-line
    accessory doesn’t understand HTML. Therefore, if you display any commercial page,
    you will see a long stream of text filling the window.


    To test the application, I placed on one of my web servers a one-line text file.
    [Figure 1-4](#Chapter01.html#fig_1_4) shows what happened.


    ![Image](images/9781430246237_Fig01-04.jpg)


    ***Figure 1-4.** Testing Java*


    You are welcome to use `hello.txt` for your test. Hopefully, I will remember to
    keep it online!


    ### Installing Tomcat


    This is the Java web server, which is the servlet container that allows you to
    run JSP. If you have already installed an older version of Tomcat, you should
    remove it before installing a new version.


    Tomcat listens to three communication ports of your PC (8005, 8009, and 8080).
    Before you install Tomcat, you should check whether some already-installed applications
    are listening to one or more of those ports. To do so, open a DOS window and type
    the command `netstat /a`. It will display a list of active connections in tabular
    form. The second column of the table will look like this:


    `Local Address`

    `0.0.0.0:135`

    `0.0.0.0:445`

    `0.0.0.0:3306`


    The port numbers are the numbers after the colon. If you see one or more of the
    ports Tomcat uses, after installing Tomcat, you will have to change the ports
    it listens to, as explained in [Chapter 10](#Chapter10.html). There, you will
    also learn the purpose of those three ports.


    Here’s how to install Tomcat 7 correctly:'
