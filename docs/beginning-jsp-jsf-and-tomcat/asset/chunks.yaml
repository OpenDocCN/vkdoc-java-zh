    \ to the `class` element. You could also replace the `starship` attributes `name`\
    \ and `sn` with two children elements, but how much sense would it make?\n\nWe\
    \ have to make one last consideration about empty vs. bodied elements. By defining\
    \ the captain’s name as the body of the element, as in:\n\n```\n<captain>Jean-Luc\
