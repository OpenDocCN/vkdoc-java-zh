    在第 3 行，你通过调用数据管理器的一个方法来打开数据库连接，该方法也会在失败时报告错误。然后你开始一个 `try` 块，在其中进行实际工作。在相应的 `catch`
    块中，你显示一条错误消息（第 22 行），在 `finally` 块中（第 25 行），你关闭数据库连接。请记住，无论 `try` 成功与否，都会执行 `finally`
    块。这样，你确保在失败时关闭连接。


    在最外层的 `try` 内部（第 5–20 行），你创建一个语句并设置查询字符串，然后开始第二个 `try` 块（第 9–17 行）。与你对连接所做的类似，你使用
    `finally` 块来关闭语句（第 19 行）。


    这是一种普遍适用的技术：每次你做一些需要撤销的事情时，立即在 `try` 块中处理它，将“撤销”语句放在相应的 `finally` 中。这样，你将确保不会在你身后留下任何“幽灵”。诚然，Java
    的垃圾收集机制应该负责删除未引用的对象，但边做边清理是一种好的做法，尤其是在处理数据库和潜在的大对象（如语句和结果集）时。至少，你的应用程序将更高效地运行。而且编写“干净”的代码感觉很好。


    第 10 行是你实际执行查询的地方。你知道你不会在结果集中得到多于一行，因为 `book_id` 是图书表的唯一键。


    你可能会想，“为什么我要通过数据管理器呢？难道我不能直接从 JSP 执行 `BookPeer` 方法吗？”嗯，你可以，但这不干净，不干净迟早会导致问题。


