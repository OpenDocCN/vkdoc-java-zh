  raw: 'If instead of `class` you specify the `beanName` attribute, Tomcat will behave
    as if you had specified `class`, but only after attempting to find a serialized
    bean of that class. Serializing a bean means that the object’s data is converted
    to a byte stream and saved in a file with the extension `ser`. Tomcat expects
    to find serialized objects in the same folder containing the application classes.
    For example, a serialized bean of the `xxx.yyy.Zzz` class is expected to be in
    the `WEB-INF\classes\xxx\yyy\Zzz.ser` file. This mechanism lets you save an object
    in a file and then load it into your JSP page. You can actually have several serialized
    beans of the same class (e.g., `Zzz.ser`, `Zzz_test.ser`, `Zzz25.ser`, and `Abc.ser`).
    Fortunately, the designers of JSP have thought this issue through and allowed
    you to set the value of `beanName` at request time (the other attributes must
    be hard-coded), so that you can parameterize your page for what concerns loading
    serialized objects.


    Finally, if you specify `type` and set it to a fully qualified class name but
    specify neither `class` nor `beanName`, Tomcat won’t instantiate any object and
    will instead look for it in the given scope. If it finds it, Tomcat will make
    it available as an object of the given type rather than of the class from which
    it was instantiated. If what I just explained sounds confusing, you might decide
    to follow a simple rule: forget that `jsp:useBean` supports the attributes `class`
    and `beanName`. Let the servlet do the work. Just pay attention that the servlet
    creates the objects in the correct scope. In the previous chapter, the initialization
    method of the `eshop` servlet (see [Listing 3.9](#Chapter03.html#list_3_9)) first
    instantiated the `dataManager` object and then saved it in the `application` scope.


    ![Image](images/square.jpg) **Caution** Don’t confuse the scope of a bean as specified
    with the `useBean` attribute `scope` with the scope of the scripting variable
    that Tomcat associates to the bean


    As an example of `useBean` scopes, the following code instantiates a `MyClass`
    object that remains available as long as the session remains valid:


    `<jsp:useBean class="myPkg.MyClass" id="myObj" scope="session"/>`


    You’ll be able to access it via a scripting variable named `myObj` in any page
    within the same session with the following statement:


    `<jsp:useBean id="myObj" type="myPkg.MyClass" scope="session"/>`


    However, the scope of the scripting variable `myObj` is determined by where within
    your page you execute `useBean`, as with the declaration of any other scripting
    variable. If you find this confusing, consider this: in the page containing the
    second `useBean`, you don’t have access to the scripting variable `myObj` until
    you execute the `useBean` action. Before that, the scripting variable is undefined,
    although the bean called `myObj` already exists, as it was instantiated by the
    first `useBean` in a previously executed page. This tells you that the scripting
    variable referring to the object and the actual object are two different things
    with two different scopes, even if they share the same name.


    Incidentally, the first `useBean` (with `class`, `id`, and `scope`) is completely
    equivalent to this:


    `<%`

    `MyClass myName = new MyClass();`

    `session.setAttribute("myObj", myObj);`

    `%>`


    and the second `useBean` (with `id`, `type`, and `scope`) is the same as this:


    `<%`

    `MyClass myObj = (MyClass)session.getAttribute("myObj");`

    `%>`


    This representation should make completely clear that the object and the scripting
    variable are two different entities. In the second scriptlet, you could even decide
    to call the scripting variable with a different name.


    Because of all the options implemented by combining its attributes, as I said
    at the beginning, `useBean` is somewhat tricky to use. But you can always come
    back to this page in case of doubt!


    #### Actions: setProperty and getProperty


    A bean property is nothing else than an attribute of a bean’s class, but only
    when you define for that attribute the standard get and put methods . To make
    it completely clear, both `get` and `put` must be there. Otherwise, that class
    attribute is *not* a bean property.


    Additionally, you must name the two methods respectively `get` and `put`, followed
    by the full name of the attribute with the first letter capitalized. For example,
    if you define the attribute named `myAttr`, you must name the two attributes `getMyAttr`
    and `setMyAttr`. Otherwise, again, Tomcat will not recognize the attribute as
    a bean property.


    An example from the `eshop` application will convince you that you are better
    off if Tomcat recognizes an attribute as a property. The JSP page `OrderConfirmation.jsp`
    has the following two elements:


    `<jsp:useBean id="customer" class="eshop.beans.Customer"/>`

    `<jsp:setProperty property="*" name="customer"/>`


    The `useBean` action instantiates an object of type `Customer` and assigns it
    to the variable named `customer`. The action is equivalent to:


    `Customer customer = new Customer();`


    By defining `property="*"`, the `setProperty` action tells Tomcat to set all bean
    properties of the newly created object. What `setProperty` does *not* say is to
    what values they should be set. This is because the values come from request parameters
    named *exactly* like the properties. Check out the definition of the `Customer`
    class, shown in [Listing 4-4](#Chapter04.html#list_4_4).


    ***Listing 4-4.** Customer.java*


    `package eshop.beans;`


    `public class Customer {`

    `  private String contactName = "";`

    `  private String deliveryAddress = "";`

    `  private String ccName = "";`

    `  private String ccNumber = "";`

    `  private String ccExpiryDate = "";`


    `  public String getContactName() {`

    `    return contactName;`

    `    }`

    `  public void setContactName(String contactName) {`

    `    this.contactName = contactName;`

    `    }`


    `  public String getDeliveryAddress() {`

    `    return deliveryAddress;`

    `    }`

    `  public void setDeliveryAddress(String deliveryAddress) {`

    `    this.deliveryAddress = deliveryAddress;`

    `    }`


    `  public String getCcName() {`

    `    return ccName;`

    `    }`

    `  public void setCcName(String ccName) {`

    `    this.ccName = ccName;`

    `    }`


    `  public String getCcNumber() {`

    `    return ccNumber;`

    `    }`

    `  public void setCcNumber(String ccNumber) {`

    `    this.ccNumber = ccNumber;`

    `    }`


    `  public String getCcExpiryDate() {`

    `    return ccExpiryDate;`

    `    }`

    `  public void setCcExpiryDate(String ccExpiryDate) {`

    `    this.ccExpiryDate = ccExpiryDate;`

    `    }`

    `  }`


    As you can see, the `Customer` class defines private attributes and then the methods
    to access them, so that they can be recognized as properties.


    ![Image](images/square.jpg) **Caution** The use of `property="*"` can have confusing
    outcomes if parameters and attributes are not correctly matched


    So far so good. Not so interesting. But what is interesting is that the `setProperty`
    action


    `<jsp:setProperty property="*" name="customer"/>`


    is equivalent to the following:


    `customer.setContactName(request.getParameter("contactName");`

    `customer.setDeliveryAddress(request.getParameter("deliveryAddress");`

    `customer.setCcName(request.getParameter("ccName");`

    `customer.setCcNumber(request.getParameter("ccNumber"));`

    `customer.setCcExpiryDate(request.getParameter("ccExpiryDate"));`


    The implementation with the action is more compact and, most importantly, it remains
    valid regardless of whether you add or remove customer attributes. And that’s
    what makes `setProperty` worthwhile.


    `Also jsp:getProperty` is useful, because it sends the value of a property to
    the output. For example, suppose you define MyClass as shown in [Listing 4-5](#Chapter04.html#list_4_5).


