    在第 4 行，你将 XML 文件加载到内存中，在第 5 行，你将其解析为 `org.apache.xerces.dom.DeferredDocumentImpl`
    类型的对象，该对象实现了文档对象模型（DOM）的标准接口 `org.w3c.dom.Document`。在第 13–21 行，你遍历 DOM 中的所有 `starship`
    标签，无论它们在结构中“有多深”。你可以通过双斜杠来实现这一点。在 `x:forEach` 循环内部，变量 `tag` 依次引用每个 `starship`，你可以显示属性和子元素中包含的信息。请注意，循环内部的
    `select` 路径始终以斜杠开头。这是因为每次循环迭代中的根元素是一个 `starship` 标签，而不是文档的根元素 `starfleet`。


