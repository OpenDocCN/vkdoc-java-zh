    `f:ajax`，它是在 2.0 版本中首次添加到核心库中的。为了做到这一点，我将首先一般性地介绍 Ajax，并向你展示在引入 `f:ajax` 之前是如何使用它的。


    ##### 什么是 Ajax？


    异步 JavaScript 和 XML（Ajax）是一种让 JavaScript 与服务器*异步*通信的机制——也就是说，无需重新加载页面。这是通过 JavaScript
    内置对象 `XMLHttpRequest` 实现的。对于那些不熟悉 JavaScript 的人，我在附录 A 中添加了一些关于它的说明。


    实际上，它的工作原理是这样的：你在 JavaScript 中创建一个 `XMLHttpRequest` 对象，使用它向服务器发送请求，获取响应，然后，瞧，你无需重新加载页面就为你的网页获得了新数据。嗯，听起来很容易，但如何做到这一点并不明显，而且维护起来更加棘手。为了解释如何使用
    Ajax，我将展示一个显示服务器时间的简单页面示例。首先，你需要编写一个 JSP 页面来返回时间（参见清单 7-14）。


    ***清单 7-14.** time.jsp*


    `<%@page language="java" contentType="text/html"` `  %><%@page import="java.util.*"`
    `  %><% out.print(new GregorianCalendar().getTime()); %>`


