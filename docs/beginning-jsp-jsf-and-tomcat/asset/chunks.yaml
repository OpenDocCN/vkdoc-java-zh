    \ customer = new Customer();\n```\n\nBy defining `property=\"*\"`, the `setProperty`\
    \ action tells Tomcat to set all bean properties of the newly created object.\
    \ What `setProperty` does *not* say is to what values they should be set. This\
    \ is because the values come from request parameters named *exactly* like the\
