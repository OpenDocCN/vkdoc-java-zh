    \    }**\n**32:     else {**\n**33:       %><p class=\"error\">Unexpected error\
    \ processing the order!</p><%**\n**34:       }**\n**35:   %>**\n36:   </div>\n\
    37: </body>\n38: </html>\n```\n\n或者你可以编写 JSP 文档 `OrderConfirmation.jspx`，如 [清单\
    \ 6-15](#Chapter06.html#list_6_15) 所示。我已将整个 E-shop 项目转换为 XML 格式，包含在本章的软件包中。你可以在名为\
    \ `eshopx` 的文件夹中找到它，既有 WAR 格式，也有已展开的格式。要启动它，类似于 `eshop`，键入 [`http://localhost:8080/eshopx/shop`](http://localhost:8080/eshopx/shop)。\n\
    \n***清单 6-15.** OrderConfirmation.jspx*\n\n```\n01: <?xml version=\"1.0\" encoding=\"\
