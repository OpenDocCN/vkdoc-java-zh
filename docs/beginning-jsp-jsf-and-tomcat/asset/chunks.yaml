- fmt: "## Operators, Assignments, and Comparisons\n\nThere are no surprises with\
    \ the binary operators—that is, the operators that require two operands. They\
    \ include the expected addition, subtraction, multiplication, division, and modulus\
    \ (i.e., the remainder of an integer division) operators. When applied to string,\
    \ the addition operator concatenates them.\n\nBesides the normal assignment operator\
    \ represented by the equal sign, there is also an assignment operator for each\
    \ binary operator. For example, the following line of code means that you take\
    \ the current value of the variable `a`, add to it `b`, and store it back into\
    \ `a`:\n\n`a += b;  // same as a = a + b;`\n\nThe most commonly used unary operators\
    \ (i.e. operators that require a single operand) include the minus sign, which\
    \ changes the sign of what follows, and the increment and decrement operators:\n\
    \n`a = -b;`\n`a++;  // same as a += 1;`\n`a--;  // same as a -= 1;`\n\nYou can\
    \ assign the value of an expression of one type to a variable of another type,\
    \ but with some restrictions. With numeric types, you can only assign values to\
    \ variables that are of the same type or \"larger.\" For example, you can assign\
    \ an `int` value to a variable of type `long`, but to assign a `long` value to\
    \ an `int` variable, you'd have to *typecast* (i.e., downcast) the value, as in\
    \ `int iVar = (int)1234567L;`. Be careful with that, because you might lose precision\
    \ when downcasting floating point numbers!\n\nYou can assign objects to variables\
    \ of other types, but only if the type of the variable is a superclass of the\
    \ class from which you instantiated the object. Similarly to the downcasting of\
    \ numeric types, you can typecast a value of a superclass into a variable of a\
    \ subclass type.\n\nComparison operators are straightforward when applied to primitive\
    \ data types. You have `==` to check for equality, `!=` to check for inequality,\
    \ `>` to check for \"greater than,\" `>=` to check for \"greater than or equal\
    \ to,\" `<` to check for \"less than,\" and `<=` to check for \"less than or equal\
    \ to.\" Nothing surprising there. However, you have to be careful when you make\
    \ comparisons between objects, as the following example illustrates:\n\n```\n\
    String s1 = \"abc\";\nString s2 = \"abc\";\nString s3 = \"abcd\".substring(0,3);\n\
    boolean b1 = (s1 == \"abc\");  // parentheses not needed but nice!\nboolean b2\
    \ = (s1 == s2);\nboolean b3 = (s1 == s3);\n```\n\nAs perhaps you expected, `b1`\
    \ and `b2` turn out to be `true`, but `b3` is `false`, although `s3` was set to\
    \ `\"abc\"`! The problem is that comparison operators don't look inside the objects.\
    \ They only check whether the objects are *the same instance* of a class, not\
    \ whether they hold the same value. Therefore, as long as you shift around the\
    \ `\"abc\"` string, the compiler keeps referring to the same instance of a literal\
    \ string, and everything behaves as expected. However, when you create a different\
    \ instance of `\"abc,\"` the check for equality fails. The lesson to be learned\
    \ is that if you want to compare the content of objects, you have to use the `equals`\
    \ method. In this example, `s1.equals(s3)` would have returned `true`.\n\nFor\
    \ objects, you also have the comparison operator `instanceof`, which isn't available\
    \ for primitive data types like `int`. For example, `(\"abc\" instanceof String)`\
    \ calculates to `true`. Be aware that an object isn't only an instance of the\
    \ class it was instantiated from, but it's also an instance of all its superclasses\
    \ up to and including `Object`, which is the superclass of all classes. It makes\
    \ sense: a `String` is also an `Object`, even if the reverse often is not true.\n\
    \nWith `&&` for *logical and*, `||` for *logical or*, and `!` for *logical not*,\
    \ you can concatenate comparisons to form more complex conditions. For example,\
    \ `((a1 == a2) && !(b1 || b2))` calculates to `true` only if `a1` equals `a2`\
    \ and both `boolean` variables `b1` and `b2` are `false`.\n\n## Selections\n\n\
    The following statement assigns to the string variable `s` a different string\
    \ depending on a condition:\n\n```\nif (a == 1) {\n  s = \"yes\";\n  }\nelse {\n\
    \  s = \"no\";\n  }\n```\n\nYou can omit the `else` part.\n\nYou could have achieved\
    \ an identical result with a conditional expression and a single assignment:\n\
    \n`String s = (a== 1) ? \"yes\" : \"no\";`\n\nYou could also achieve the same\
    \ result with the following code:\n\n```\nswitch(a) {\n  case 1:\n    s = \"yes\"\
    ;\n    break;\n  default:\n    s = \"no\";\n    break;\n  }\n```\n\nObviously,\
    \ the `switch` statement is only useful when there are more than just two alternatives.\
    \ For example, instead of having a chain of `if`/`else` statements, as in the\
    \ following example:\n\n```\nif (expression == 3) {...}\nelse if (expression ==\
    \ 10) {...}\nelse {...}\n```\n\nyou would gain both in clarity and in concisiveness\
    \ with:\n\n```\nswitch (expression) {\n  case (3): ... break;\n  case (10): ...\
    \ break;\n  default: ... break;\n  }\n```\n\nAt the very least, you'll calculate\
    \ the expression only once. Note that if you omit a `break`, execution continues\
    \ to the following `case`.\n\nWith Java 7, the switch variable can be of type\
    \ `String`. Therefore, you can write switches like the following one:\n\n```\n\
    String yn;\n...\nswitch (yn) {\n  case (\"y\"): /* handle the yes case */ break;\n\
    \  case (\"n\"): /* handle the no case */ break;\n  default: /* is something fishy\
    \ going on? */ break;\n  }\n```\n\n## Iterations\n\nThis statement repeatedly\
    \ executes the *statements* with increasing values of `k`, beginning from *init-value*:\n\
    \n`for (int k = init-value; k < limit; k++) { statements; }`\n\nThe general format\
    \ is\n\n`for (initial-assignment; end-condition; iteration-expression) { statements;\
    \ }`\n\nThe *initial-assignment* is executed only once, before entering the loop.\
    \ The *statements* are then repeatedly executed as long as the *end-condition*\
    \ is satisfied. As the *end-condition* is checked before executing the *statements*,\
    \ they are not executed at all if the *end-condition* is false from the beginning.\
    \ The *iteration-expression* is executed at the end of each iteration, before\
    \ the *end-condition* is checked to see whether the loop should be reentered for\
    \ a new iteration.\n\nYou can omit either the *initial-assignment* or the *iteration-expression*.\
    \ If you omit both, you should replace the `for` loop with a `while` loop. The\
    \ following two lines are equivalent:\n\n`while (end-condition) { statements;\
    \ }`\n`for (;end-condition;) { statements; }`\n\nThe `do-while` statement is an\
    \ alternative to the `while` loop:\n\n`do { statements; } while (end-condition);`\n\
    \nThe `do-while` statement checks the *end-condition* at the end of an iteration\
    \ instead of at the beginning, like the `for` and `while` loops do. As a result,\
    \ the statements inside a `do-while` loop are always executed at least once, even\
    \ when the *end-condition* is false from the beginning.\n\nThe iteration statements\
    \ described so far are identical to those of C, but Java also supports a variant\
    \ of the `for` loop tailored to make the handling of collections easier. Suppose\
    \ you need a method that produces a concatenation of a set of strings. It might\
    \ look like this:\n\n```\nString concatenate(Set<String> ss) {\n  String conc\
    \ = \"\";\n  Iterator<String> iter = ss.iterator();\n  while (iter.hasNext())\
    \ {\n    conc += iter.next();\n    }\n  return conc;\n  }\n```\n\nWith the Java\
    \ for-each variant of the `for` loop, you can drop the definition of the iterator\
    \ and write clearer code:\n\n```\nString concatenate(Set<String> ss) {\n  String\
    \ conc = \"\";\n  for (String s : ss) {\n    conc += s;\n    }\n  return conc;\n\
    \  }\n```"
  raw: '#### Operators, Assignments, and Comparisons


    There are no surprises with the binary operators—that is, the operators that require
    two operands. They include the expected addition, subtraction, multiplication,
    division, and modulus (i.e., the remainder of an integer division) operators.
    When applied to string, the addition operator concatenates them.


    Besides the normal assignment operator represented by the equal sign, there is
    also an assignment operator for each binary operator. For example, the following
    line of code means that you take the current value of the variable `a`, add to
    it `b`, and store it back into `a`:


    `a += b;  // same as a = a + b;`


    The most commonly used unary operators (i.e. operators that require a single operand)
    include the minus sign, which changes the sign of what follows, and the increment
    and decrement operators:


    `a = -b;`

    `a++;  // same as a += 1;`

    `a--;  // same as a -= 1;`


    You can assign the value of an expression of one type to a variable of another
    type, but with some restrictions. With numeric types, you can only assign values
    to variables that are of the same type or “larger.” For example, you can assign
    an `int` value to a variable of type `long`, but to assign a `long` value to an
    `int` variable, you’d have to *typecast* (i.e., downcast) the value, as in `int
    iVar = (int)1234567L;`. Be careful with that, because you might lose precision
    when downcasting floating point numbers!


    You can assign objects to variables of other types, but only if the type of the
    variable is a superclass of the class from which you instantiated the object.
    Similarly to the downcasting of numeric types, you can typecast a value of a superclass
    into a variable of a subclass type.


    Comparison operators are straightforward when applied to primitive data types.
    You have `==` to check for equality, `!=` to check for inequality, `>` to check
    for “greater than,” `>=` to check for “greater than or equal to,” `<` to check
    for “less than,” and `<=` to check for “less than or equal to.” Nothing surprising
    there. However, you have to be careful when you make comparisons between objects,
    as the following example illustrates:


    `String s1 = "abc";`

    `String s2 = "abc";`

    `String s3 = "abcd".substring(0,3);`

    `boolean b1 = (s1 == "abc");  // parentheses not needed but nice!`

    `boolean b2 = (s1 == s2);`

    `boolean b3 = (s1 == s3);`


    As perhaps you expected, `b1` and `b2` turn out to be `true`, but `b3` is `false`,
    although `s3` was set to `"abc"`! The problem is that comparison operators don’t
    look inside the objects. They only check whether the objects are *the same instance*
    of a class, not whether they hold the same value. Therefore, as long as you shift
    around the `"abc"` string, the compiler keeps referring to the same instance of
    a literal string, and everything behaves as expected. However, when you create
    a different instance of `"abc,"` the check for equality fails. The lesson to be
    learned is that if you want to compare the content of objects, you have to use
    the `equals` method. In this example, `s1.equals(s3)` would have returned `true`.


    For objects, you also have the comparison operator `instanceof`, which isn’t available
    for primitive data types like `int`. For example, `("abc" instanceof String)`
    calculates to `true`. Be aware that an object isn’t only an instance of the class
    it was instantiated from, but it’s also an instance of all its superclasses up
    to and including `Object`, which is the superclass of all classes. It makes sense:
    a `String` is also an `Object`, even if the reverse often is not true.


    With `&&` for *logical* *and*, `||` for *logical* *or*, and `!` for *logical*
    *not*, you can concatenate comparisons to form more complex conditions. For example,
    `((a1 == a2) && !(b1 || b2))` calculates to `true` only if `a1` equals `a2` and
    both `boolean` variables `b1` and `b2` are `false`.


    #### Selections


    The following statement assigns to the string variable `s` a different string
    depending on a condition:


    `if (a == 1) {`

    `  s = "yes";`

    `  }`

    `else {`

    `  s = "no";`

    `  }`


    You can omit the `else` part.


    You could have achieved an identical result with a conditional expression and
    a single assignment:


    `String s = (a== 1) ? "yes" : "no";`


    You could also achieve the same result with the following code:


    `switch(a) {`

    `  case 1:`

    `    s = "yes";`

    `    break;`

    `  default:`

    `    s = "no";`

    `    break;`

    `  }`


    Obviously, the `switch` statement is only useful when there are more than just
    two alternatives. For example, instead of having a chain of `if`/`else` statements,
    as in the following example:


    `if (`*`expression`* `== 3) {...}`

    `else if (`*`expression`* `== 10) {...}`

    `else {...}`


    you would gain both in clarity and in concisiveness with:


    `switch (`*`expression`*`) {`

    `  case (3): ... break;`

    `  case (10): ... break;`

    `  default: ... break;`

    `  }`


    At the very least, you’ll calculate the expression only once. Note that if you
    omit a `break`, execution continues to the following `case`.


    With Java 7, the switch variable can be of type `String`. Therefore, you can write
    switches like the following one:


    `String yn;`

    `...`

    `switch (`*`yn`*`) {`

    `  case ("y"): /* handle the yes case */ break;`

    `  case ("n"): /* handle the no case */ break;`

    `  default: /* is something fishy going on? */ break;`

    `  }`


    #### Iterations


    This statement repeatedly executes the *statements* with increasing values of
    `k`, beginning from *init-value*:


    `for (int k =` *`init-value`*`; k <` *`limit`*`; k++) {` *`statements`*`; }`


    The general format is


    `for (`*`initial-assignment`*`;` *`end-condition`*`;` *`iteration-expression`*`)
    {` *`statements`*`; }`


    The *initial-assignment* is executed only once, before entering the loop. The
    *statements* are then repeatedly executed as long as the *end-condition* is satisfied.
    As the *end-condition* is checked before executing the *statements*, they are
    not executed at all if the *end-condition* is false from the beginning. The *iteration-expression*
    is executed at the end of each iteration, before the *end-condition* is checked
    to see whether the loop should be reentered for a new iteration.


    You can omit either the *initial-assignment* or the *iteration-expression*. If
    you omit both, you should replace the `for` loop with a `while` loop. The following
    two lines are equivalent:


    `while (`*`end-condition`*`) { statements; }`

    `for (;`*`end-condition`*`;) { statements; }`


    The `do-while` statement is an alternative to the `while` loop:


    `do {` *`statements`*`; } while (`*`end-condition`*`);`


    The `do-while` statement checks the *end-condition* at the end of an iteration
    instead of at the beginning, like the `for` and `while` loops do. As a result,
    the statements inside a `do-while` loop are always executed at least once, even
    when the *end-condition* is false from the beginning.


    The iteration statements described so far are identical to those of C, but Java
    also supports a variant of the `for` loop tailored to make the handling of collections
    easier. Suppose you need a method that produces a concatenation of a set of strings.
    It might look like this:


    `String concatenate(Set<String> ss) {`

    `  String conc = "";`

    **`  Iterator<String> iter = ss.iterator();`**

    **`  while (iter.hasNext()) {`**

    **`    conc += iter.next();`**

    **`    }`**

    `  return conc;`

    `  }`


    With the Java for-each variant of the `for` loop, you can drop the definition
    of the iterator and write clearer code:


    `String concatenate(Set<String> ss) {`

    `  String conc = "";`

    **`  for (String s : ss) {`**

    **`    conc += s;`**

    **`    }`**

    `  return conc;`

    `  }`'
