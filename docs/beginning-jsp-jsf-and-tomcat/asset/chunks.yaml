- fmt: "### Example: User Authentication\n\nThe browsers can display a user/password\
    \ dialog to provide a basic authentication mechanism by limiting access to specific\
    \ folders to particular user *roles*. First, you have to define the users and\
    \ their roles in the `tomcat-users.xml` file that you find in Tomcat’s `conf`\
    \ folder. [Listing 2-10](#Chapter02.html#list_2_10) shows you what you should\
    \ insert into `tomcat-users.xml` to define a couple of new users and the two roles\
    \ `canDoThis` and `canDoThat`.\n\n**Listing 2-10.** `tomcat-users.xml` Fragment\n\
    \n```\n<tomcat-users>\n  <role rolename=\"canDoThis\"/>\n  <role rolename=\"canDoThat\"\
    />\n  <user username=\"aBloke\" password=\"whatever\" roles=\"canDoThis\"/>\n\
    \  <user username=\"bigCheese\" password=\"yes!\" roles=\"canDoThis,canDoThat\"\
    />\n  </tomcat-users>\n```\n\nThe `tomcat-users.xml` file is shared by all applications,\
    \ but this doesn’t prevent you from using the roles only for specific applications.\
    \ To password-protect all the pages inside a particular folder of an application,\
    \ you have to edit the `WEB-INF/web.xml` file in the application’s root directory.\
    \ [Listing 2-11](#Chapter02.html#list_2_11) shows you the code you need to insert\
    \ inside the `<web-app>` element to limit the access of the pages in the folder\
    \ `/tests/auth/this/` to users with the role `canDoThis`, and of the pages in\
    \ the folder `/tests/auth/that/` to users with the role `canDoThat`. I’ve highlighted\
    \ the three main tags.\n\n**Listing 2-11.** `web.xml` Fragment\n\n```\n  <security-role>\n\
    \    <role-name>canDoThis</role-name>\n    <role-name>canDoThat</role-name>\n\
