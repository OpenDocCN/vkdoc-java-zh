    Providing the Payment Details    In this skeleton implementation of `eshop`, `OrderConfirmation.jsp`
    only saves the order in the database. In a real-world situation, it should perform
    a series of checks, including verifying with a bank that the credit card is valid
    and not blocked.    All the work to store the order in the database is done in
    the `DataManager` method `insertOrder`, which I’ve already discussed in [Chapter
    6](#Chapter06.html).    ### The eshopx Application    After completing `eshop`,
    I showed you how to create the `eshopx` application by replacing the JSP pages
    with JSP documents (i.e., modules in XML syntax). This required us to move scriptlet
    code to JSP custom tags.    [Listing 10-10](#Chapter10.html#list_10_10) shows
