    then include the following line in the `<head>`:  `  <link rel="stylesheet" href="${cssUrl}"
    type="text/css"/>`  By doing so, you remove the hard-coded `/eshop` path from
    all JSP modules, which is a good thing to do.    #### web.xml    When moving from
    `eshop` to `eshopx`, I needed to modify in `web.xml` the definitions of two parameters:
    `base` and `imageURL`. The definition of `base` changed from `/eshop/shop` to
    `/shop`, because in `eshop`, I used `base` as follows:  `<a class="link1" href="<%=base%>?action=checkOut">Check
    Out</a>`  while in `eshopx`, I first define the page attribute `myURL` as  `<c:url
    value="${base}" var="myURL">` `  <c:param name="action" value="checkOut"/>` `  </c:url>`  and
    then use the attribute to make the link, as follows:  `<a class="link1" href="${myURL}">Check
    Out</a>`  As I said when talking about the style sheet, `c:url` accepts in the
    `value` attribute URLs relative to the application folder and then completes them
    to make them relative to the server root. Within `eshop`, you had to include the
    application folder in `base`, because you didn’t form the URL with `c:url`.    The
    definition of `imageURL` changed from `/eshop/images/` to `/images/` because I
    used `imageURL` in `eshop` as follows:  `<img src="<%=imageURL%>cart.gif" border="0"/>`  while
    in `eshopx`, I first define the page attribute `imgURL`:  `<c:url value="${imageURL}"
    var="imgURL"/>`  and then use the attribute in the `img` element:  `<img src="${imgURL}cart.gif"
    border="0"/>`  Thanks to these two changes, I could remove all hard-coded references
    to the application directory in `eshopx`.    But these small changes in the handling
    of the images cause a problem in the welcome page of the application.    Perhaps
    you will recall that in [Chapter 4](#Chapter04.html), when talking about `c:url`,
    I mentioned that Tomcat attaches a `jsessionid` string to a URL before sending
    it to the client in the response.    Tomcat does it when it opens a new session,
    to handle clients that don’t accept cookies. When Tomcat receives subsequent requests
    from the same client and they contain the session cookie, it stops appending the
    session ID string to the URLs, because it knows that it is unnecessary.    Now,
    the welcome page (`index.jspx`) includes `TopMenu.jspx`, which contains the two
    lines  `<c:url value="${imageURL}" var="imgURL"/>` `...` `<img src="${imgURL}cart.gif"
    border="0"/>`  to display the image of the shopping cart.    When you view [`http://localhost:8080/eshopx/shop`](http://localhost:8080/eshopx/shop)
    the first time, Tomcat creates a session and then systematically attaches the
    `jsessionid` string to all URLs. This means that the value of the `src` attribute
    of the `img` tag becomes something like this:  `"/eshopx/images/;jsessionid=AC559D1E83F5714252E310897A65A3D3cart.gif"`  As
    a result, when the client browser requests the image of the cart, Tomcat cannot
    find it, and the shopping cart cannot be displayed. At best, with some browsers,
    you get a “broken image” icon. All subsequent pages, including a reloaded welcome
    page, unless you disable the cookies in your browser, are OK.    Fortunately,
    Servlet 3.0 lets you switch off the appending of the session ID. All you need
    to do is add in the body of `web-app` the following element:  `<session-config>`
    `  <tracking-mode>COOKIE</tracking-mode>` `  </session-config>`  It tells Tomcat
    to use the cookie (and nothing else) to track the session. By default, the `session-config`
    element contains both the `COOKIE` and the `URL` tracking modes.    With this
    change, everything works fine, although it makes the acceptance of cookies compulsory
    for the users.    At the time of writing, Eclipse doesn’t recognize the `tracking-mode`
    element and reports an error, as shown in [Figures 10-10](#Chapter10.html#fig_10_10)
    and [10-11](#Chapter10.html#fig_10_11). This doesn’t affect the normal working
    of the application.  ![Image](images/9781430246237_Fig10-10.jpg)  ***Figure 10-10.**
    Eclipse reports an error in web.xml*  ![Image](images/9781430246237_Fig10-11.jpg)  ***Figure
