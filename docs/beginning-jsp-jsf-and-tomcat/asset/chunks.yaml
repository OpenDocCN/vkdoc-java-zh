  raw: '##### Servlet Initialization


    Tomcat executes the servlet method `init` immediately after instantiating the
    servlet (see [Listing 3-9](#Chapter03.html#list_3_9)). You will find the code
    of the whole project in the software package for this chapter. To install it,
    open the folder named `eshop project` and copy either the folder `eshop` or the
    file `eshop.war` to Tomcat’s `webapps` folder. To launch the application, view
    the URL [`http://localhost:8080/eshop/shop`](http://localhost:8080/eshop/shop).


    ***Listing 3-9.** ShopServlet.java - init Method*


    `public void init(ServletConfig config) throws ServletException {`

    `  System.out.println("*** initializing controller servlet.");`

    `  super.init(config);`


    `  DataManager dataManager = new DataManager();`

    `  dataManager.setDbUrl(config.getInitParameter("dbUrl"));`

    `  dataManager.setDbUserName(config.getInitParameter("dbUserName"));`

    `  dataManager.setDbPassword(config.getInitParameter("dbPassword"));`


    `  ServletContext context = config.getServletContext();`

    `  context.setAttribute("base", config.getInitParameter("base"));`

    `  context.setAttribute("imageUrl", config.getInitParameter("imageUrl"));`

    `  context.setAttribute("dataManager", dataManager);`


    `  try {  // load the database JDBC driver`

    `    Class.forName(config.getInitParameter("jdbcDriver"));`

    `    }`

    `  catch (ClassNotFoundException e) {`

    `    System.out.println(e.toString());`

    `    }`

    `  }`


    As you can see, the initialization consists of three main activities: instantiating
    and configuring the data manager, saving some parameters for later use by the
    JSP pages (remember that JSP can access the servlet context via the implicit variable
    `application`), and loading the driver necessary to access the database—JDBC stands
    for Java DataBase Connector.


    Notice that all these activities are done by setting servlet context attributes
    to values obtained through this method:


    `config.getInitParameter("`*`init-parameter-name`*`")`


    These values are stored in the `WEB-INF\web.xml` file, as shown in [Listing 3-10](#Chapter03.html#list_3_10).


    ***Listing 3-10.** Partial web.xml*


    `<web-app ...>`

    `  ...`

    `  <servlet>`

    `    ...`

    `    <init-param>`

    `      <param-name>dbUrl</param-name>`

    `      <param-value>jdbc:mysql://localhost:3306/shop</param-value>`

    `      </init-param>`

    `    ...`

    `    </servlet>`

    `  ...`

    `  <web-app ...>`


    By defining the critical initialization parameters in `web.xml`, you can change
    the parameters without having to modify the application code. [Table 3-2](#Chapter03.html#tab_3_2)
    shows the initialization parameters defined for this application.


    ![Image](images/9781430246237_Tab03-02.jpg)


    ![Image](images/9781430246237_Tab03-02a.jpg)


    For ease of use, I didn’t make the database password-protected, but this is obviously
    something you’d want to do in real life. I will explain how to install and use
    MySQL in [Chapter 5](#Chapter05.html). Then, the initialization parameters associated
    with the database will make complete sense. For the time being, the essential
    thing to keep in mind is how to define the initialization parameters.


    From [Chapter 2](#Chapter02.html), you know that Tomcat makes available to JSP
    the servlet context by defining the implicit object `application`. Therefore,
    for example, the value set in `ShopServlet.init()` with `context.setAttribute("imageUrl",
    ...)`  is available to JSP as the value returned by `application.getAttribute("imageUrl")`.


    ##### Request Handling


    Depending on what the user does, the page currently being displayed in the browser
    sends to the servlet a request with a specific value of the `action` parameter.
    The servlet then forwards each request to a JSP page determined by that value.
    For example, the page that shows the shopping cart also includes a button to check
    out. If the user clicks on it, the page will send to the servlet a request with
    the `action` parameter set to `"checkOut".`


    #### The View


    [Table 3-3](#Chapter03.html#tab_3_3) shows the list of all JSP pages in the application.
    I will explain them in the next chapters, as we look at the different aspects
    of the application.


    ![Image](images/9781430246237_Tab03-03.jpg)


    ![Image](images/9781430246237_Tab03-03a.jpg)


    Additionally, you have a style-sheet file named `eshop.css`.


    A typical user session proceeds as follows:


    > 1.  The user starts by accessing [`http://your-web-site/eshop/shop`](http://your-web-site/eshop/shop)
    and sees the welcome page with a left-side menu containing a search box and a
    list of book categories. The user then can:

    >     *   Type a word in the search box and hit the `Search` button, or select
    a book category.

    >     *   Select one of the books by clicking on the corresponding `Details` link.
    The application then replaces the list of books with an image of the front cover
    of the book and all the information available in the database about that book.

    >     *   Add the book to the shopping cart. The application then automatically
    takes the user to the shopping cart, where it is possible to update the number
    of copies or delete the book entry.

    >     *   Repeat the previous steps until the user is ready to submit the order.
    From the shopping cart page, the user can then click on the `Check Out` link.

    > 2.  The check-out page asks the user to provide his or her personal and financial
    data. When the user clicks on the `Confirm Order` button, the page tells the application
    to memorize the order.


    At any time, the user can add books through the left-side menu or go to the shopping
    cart through the top-side menu to modify the order.


    ### Summary


    In this chapter, I described the application architectures suitable for web applications
    and provided the example E-bookshop to explain how the Model-View-Controller architecture
    works.


    You then learned how to install the Eclipse IDE, how to configure it to use the
    latest versions of Java and Tomcat, and how to create JSP applications from scratch.
    It was necessary at this point because, with E-bookshop, we had reached the limit
    of what was reasonable to do without an IDE.


    Finally, I introduced the E-shop project, which, in different versions, I will
    use to complete the description of JSP and to explain JSF.


    In the next three chapters, I’ll take you through the remaining functionality
    of JSP. In particular, the next chapter will be dedicated to the action elements.
    To do that, I will use simple dedicated examples and the relevant aspects of the
    `eshop` application.


    ## C H A P T E R  4


    ![Image](images/3square.jpg)


    ## JSP in Action


    In [Chapter 2](#Chapter02.html), you learned that there are three types of JSP
    elements: scripting, directives, and actions. I described the first two types
    directly in [Chapter 2](#Chapter02.html), and the time has come to look at JSP
    actions. Actions, like scriptlets, are processed when a page is requested. In
    this chapter, you will learn how to use JSP standard actions, how to create actions
    of your own design, and how to use some of the actions contained in the JSP Standard
    Tag Library. Besides small specific examples, you will also learn the role of
    actions in the `eshop` application that I introduced in the previous chapter.
    Actions can do everything that scripting elements can do, as you will see at the
    end of the next chapter, when I will tell you how to write JSP code without any
    scripting element at all.'
