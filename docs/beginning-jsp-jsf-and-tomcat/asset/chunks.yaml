    define the same parameters (it actually is the same database) in `context.xml`
    and make them accessible to the application by defining a `resource-ref` element
    in `web.xml`.    Accordingly, you have to update the data manager’s method `getConnection`.
    In practical terms, after removing all checks from the actual code for clarity,
    the line  `conn = DriverManager.getConnection(getDbURL(), getDbUserName(), getDbPassword());`  of
    `eshop` and `eshopx` is replaced in `eshopf` by the following four lines  `Context
    ctx = new InitialContext();` `Context envContext  = (Context)ctx.lookup("java:/comp/env");`
    `DataSource ds = (DataSource)envContext.lookup("jdbc/mysql");` `conn = ds.getConnection();`  You
    find `DataManager.java` in the folder `eshopf project\eshopf\WEB-INF\classes\eshop\model`
    of the software package for this chapter.    The mechanism used in `eshop` and
    `eshopx` could not be used in `eshopf` because `ShopServlet` has been replaced
    by the JSF servlet. The mechanism relying on `context.xml` is in fact more flexible
    and elegant than the original one, but I think it was good for you to see both
    mechanisms.    ### Using and Creating Converters    As I said when describing
    the JSF life cycle, the JSF servlet executes the `decode` method of each component
    during Apply Request Values. The method saves the parameter values locally, but
    it first needs to convert the input strings to the corresponding types defined
    in the components, except when the components expect values of type `String`.
    JSF provides standard converters for the `java.lang` types `Boolean`, `Byte`,
    `Character`, `Double`, `Enum`, `Float`, `Integer`, `Long`, and `Short`, and for
    the `java.math` types `BigDecimal` and `BigInteger`.    The standard converters
    perform a series of checks that you can use to validate, at least in part, the
    user''s input. To do so, you have to enable the reporting of converter messages.    For
    example, in the `eshopf` application, the user can update the number of copies
    of a book that is already in the shopping cart. Clearly, it doesn’t make any sense
    to type a fractional number or a string that is not numeric. Therefore, you can
    write the input component in the `ShoppingCart.jspx` document as follows:  `<h:inputText
    id="quantity" value="#{item.quantity}" size="2"` `    required="true"` `    requiredMessage="What?
    Nothing?"` `    converterMessage="An integer, please!"` `    />`  Then, you only
    need to add this line to display the error messages of the standard `Integer`
    converter:  `<h:message for="quantity" styleClass="error"/>`  This is not yet
    a perfect solution, because the application still accepts negative integers. That
    is, you can type in `-1`, and the application will happily display negative prices!
    To see how to solve this problem, you’ll have to wait for the section about validators.    Sometimes
    the standard converters are not sufficient. For example, you might like to save
    in a database a credit-card number without any dashes or spaces. To make a custom
    converter, you need to create an implementation of the `javax.faces.Converter`
    interface that overrides its methods `getAsObject` and `getAsString`. You must
    implement both directions of the converter. During Apply Request Values, JSF uses
    the `getAsObject` method to convert the input string to the data model object.
    During Render Response, JSF uses the `getAsString` method to do the conversion
    in the opposite direction, so that a string can be included in the HTML response.
    Once you complete the converter, you have to register it with the application.    To
    invoke the converter, you need to nest it as a property of `f:converter` or assign
    it to the `converter` attribute of the input component. Let’s go through the three
    steps (i.e., develop, register, and invoke) one at a time. The converter will
    just clean up a credit-card number of any non-numeric character. Notice that it
    is the task of a validator to check that the credit-card number is valid. This
    normally takes place during Process Validation, while the conversions, as I just
    said, take place during phases Apply Request Values and Render Response.    ####
    Writing the Converter in Java    [Listing 8-10](#Chapter08.html#list_8_10) shows
    the full code of the converter used in `eshopf` to convert the credit-card number
    when checking out.    ***Listing 8-10.** CCNumberConverter.java*  `package eshop.converters;`
    `import javax.faces.convert.Converter;` `import javax.faces.context.FacesContext;`
    `import javax.faces.component.UIComponent;` `import javax.faces.convert.ConverterException;`
    `public class CCNumberConverter implements Converter {` `  //` **`  // getAsObject
    extracts from the input string all numeric characters`** `  public Object getAsObject(FacesContext
    ctx, UIComponent cmp,` `      String val) {` `    String convVal = null;` `    if
    ( val != null ) {` `      char[] chars = val.trim().toCharArray();` `      convVal
    = "";` `      for (int k = 0; k < chars.length; k++) {` `        if (chars[k]
    >= ''0'' && chars[k] <= ''9'') {` `          convVal += chars[k];` `          }`
    `        }` `/*` `      System.out.println("CCNumberConverter.getAsObject: ''"`
    `          + val + "'' -> ''" + convVal + "''");` `*/` `      }` `    return convVal;`
    `    }` `  //` **`  // getAsString inserts into the object string spaces to make
    it readable`** **`  // default: nnnn nnnn nnnn nnnn, Amex: nnnn nnnnnn nnnnn`**
    `  public String getAsString(FacesContext ctx, UIComponent cmp, Object val)` `      throws
    ConverterException {` `    String convVal = null;` `    if (val != null) {` `      int[]
    spaces = {3, 7, 11, 99};` `      int[] amex = {3, 9, 99};` `      String sVal
    = null;` `      try {` `        sVal = (String)val; // The val object should be
    a String!` `        }` `      catch (ClassCastException e) {` `        throw new
    ConverterException("CCNumberConverter: Conversion Error");` `        }` `      int
    kSpace = 0;` `      char[] chars = sVal.toCharArray();` `      if (chars.length
    == 15) spaces = amex;` `      convVal = "";` `      for (int k = 0; k < chars.length;
    k++) {` `        convVal += chars[k];` `        if (spaces[kSpace] == k) {` `          convVal
    += '' '';` `          kSpace++;` `          }` `        }` `/*` `      System.out.println("CCNumberConverter.getAsString:
    ''"` `          + sVal + "'' -> ''" + convVal + "''");` `*/` `      }` `    return
    convVal;` `    }` `  }`  The `getAsObject` method simply removes from the input
    string all the characters that are not decimal digits. The `getAsString` method
    inserts spaces to make the credit-card numbers more readable.    For example,
    if you during checkout type something such as `12-34\. 56Abc78;90123--456`, it
    will be reformatted to `1234 5678 9012 3456` as soon as you press the `Check Out`
    button. To verify that the object is correct, you can use the two `println` statements
    that you see commented out in the code. Here are a few examples taken from `stdout_`*`yyyymmdd`*`.log`
    in Tomcat’s `logs` folder:  `CCNumberConverter.getAsObject: ''abc1234 5678 1111x2222''
    -> ''1234567811112222''` `CCNumberConverter.getAsString: ''1234567811112222''
    -> ''1234 5678 1111 2222''` `CCNumberConverter.getAsObject: ''  1  23456789  012345''
    -> ''123456789012345''` `CCNumberConverter.getAsString: ''123456789012345'' ->
    ''1234 567890 12345''`  As you can see, the output of `getAsObject`, which is
    also the input of `getAsString`, is always stripped of non-digit characters, while
    the output of `getAsString` is always formatted with spaces. Once more, the checking
    of correctness is a task for the validator, not for the converter.    #### Registering
    the Converter with the Application    You can register the converter with the
    application by adding the following lines to the `faces-config.xml` file:  `<converter>`
    `  <converter-id>CCNumberConverter</converter-id>` `  <converter-class>eshop.converters.CCNumberConverter</converter-class>`
    `  </converter>`  You can choose any name you like inside the `converter-id` element,
    while the class in the `converter-class` element must match that of the converter
    that I described in the previous section.    #### Using the Converter    Here’s
    how to write the input element for the credit-card number in the `Checkout.jspx`
    module:  `<h:inputText id="ccnumber" required="true"` `    value="#{shopManager.customer.ccNumber}"`
    `    requiredMessage="Value is required!"` `    converter="CCNumberConverter"`
    `    />`  As you can see, you only need to include the `converter` attribute and
    assign to it the `converter-id` you’ve registered in `faces-config.xml`. Alternatively,
    you could have nested an `f:converter` element inside the `h:input` component:  `<f:converter
    converterId="CCNumberConverter"/>`  The result would have been the same. This
    is a permissive converter, because it accepts almost everything without complaining.
    You could ask yourself whether a 30-character-long string that happens to include
    16 digits is a valid credit-card number. I’ll leave that up to you.    ### Using
    and Creating Validators    How do you ensure that the user of the `eshopf` application
    doesn’t succeed in buying a negative number of books? Actually, the application
    should also reject any attempt of buying zero books. And what about checking the
    validity of a credit-card number? These are tasks for validators.    JSF features
    four types of validation mechanisms:    > *   Built-in validation components >
    *   Application-level validation > *   Custom validation components > *   Validation
    methods in backing beans    Let’s go through them one by one.    #### Built-In
    Validators    JSF provides the following validation components:    > *   `f:validateBean`:
    It delegates validation of the bean’s local value to the Bean Validation API.
    You can download the documentation of the validation package from [`http://jcp.org/aboutJava/communityprocess/final/jsr303/`](http://jcp.org/aboutJava/communityprocess/final/jsr303/).
    > *   `f:validateDoubleRange`: It validates that a numeric input is within a given
    range. It is applicable to values that you can convert to a `double`. > *   `f:validateLength`:
    It validates that the length of the input string is within a given range. > *   `f:validateLongRange`:
    It validates that a numeric input is within a given range. It is applicable to
    values that you can convert to a `long`. > *   `f:validateRegex`: It checks whether
    the String value of the component matches a given regular expression. > *   `f:validateRequired`:
    It checks whether a value is present. It is equivalent to setting the `required`
    attribute to `true`.    To use these validation components, you simply nest them
    inside the `h:input` component you need to validate. For example, to check that
    only positive quantities can be entered in the `eshopf` shopping cart, you modify
    the `h:inputText` component in `ShoppingCart.jspx` as follows:  `<h:inputText
    id="quantity" value="#{item.quantity}" size="2"` `    required="true"` `    requiredMessage="What?
    Nothing?"` `    converterMessage="An integer, please!"` `    validatorMessage="At
    least one copy!"` `    >` `  <f:validateLongRange minimum="1"/>` `  </h:inputText>`  All
    three validators also accept the `maximum` attribute to set the upper limit of
    the range. For example, you can force the user to enter the correct number of
    credit-card digits by modifying the corresponding `h:inputText` in `Checkout.jspx`:  `<h:inputText
    id="ccnumber" required="true"` `    value="#{shopManager.customer.ccNumber}"`
    `    converter="CCNumberConverter"` `    requiredMessage="Value is required!"`
    `    validatorMessage="Only 15 or 16 digits accepted!"` `    >` `  <f:validateLength
    minimum="15" maximum="16"/>` `  </h:inputText>`  As the validation takes place
    after the conversion, the limits of 15 (for American Express) and 16 (for all
    other credit cards) are applied to the user’s input after removing all nondigit
    characters.    #### Application-Level Validation    Application-level validation
    consists of performing checks inside the backing beans. This makes sense if you
    need to validate the business logic of your application, as opposed to validating
    formal correctness of individual fields. For example, before accepting an order,
    you might like to check that your bank has not blacklisted the credit-card number.
    Let’s see how it works.    In `eshopf`, when the user clicks on the `Check Out`
    button after entering his or her name and credit-card data, the `checkOut` method
    of `shopManager` is executed, as shown in the following line taken from `Checkout.jspx`:  `<h:commandButton
    value="Check Out" action="#{shopManager.checkOut}"/>`  The method is as follows:  `public
    String checkOut() {` `  orderId = dataManager.insertOrder(customer, shoppingCart);`
    `  if (orderId != 0) {` `    customer = null;` `    shoppingCart.clear();` `    }`
    `  return "orderConfirmation";` `  }`  The `dataManager.insertOrder` method saves
    the order information in the database. If it fails, the `dataManager` will log
    a message to a Tomcat log file (i.e., `logs\stdout_`*`yyyymmdd`*`.log`) and return
    zero. If the database update succeeds, the value returned will be a unique `orderId`.
    In a real world application, rather than `0`, you would return error information
    to be passed on to the user.    The `checkOut` method returns an outcome that
    tells JSF what page should be displayed next.    If you want to do some application-level
    validation, you could insert its logic at the beginning of the `checkOut` method
    and make the database update and the method outcome dependent on the validation
    result. In case of validation failure, you could also send a message to the user,
    as shown in the following few lines:  `FacesContext ctxt = FacesContext.getCurrentInstance();`
    `FacesMessage mess = new FacesMessage();` `mess.setSeverity(FacesMessage.SEVERITY_ERROR);`
    `mess.setSummary("This is the summary text");` `mess.setDetail("This is the detail
    text");` `ctxt.addMessage(null, mess);`  The message created in this way is a
    global message, not bound to any particular component, and you can display it
    with the following JSF component:  `<h:messages globalOnly="true" styleClass="error"/>`  If
    you want to create a message for a particular component, you need to replace the
    `null` argument of `ctxt.addMessage` with the `clientId` of the component. The
    `clientId` is a string containing all the IDs necessary to identify a particular
    component. For example, if you have `<h:inputText id="it"...>` inside `<h:form
    id="fm"...>`, the `clientId` of the input component is `fm:it`. I recommend that
    you don’t use this option, because it forces you to hard-code the `clientId` in
    your Java method.    #### Custom Validators    In the section *Using and Creating
    Converters* of this chapter, I explained how to implement a custom converter.
    To implement a custom validator, you follow an almost identical process:    >
    *   Create an implementation of the `interface javax.faces.validator.Validator`
    that overrides the `validate` method. > *   Register the validator in `faces-config.xml`.
    > *   Within your JSF application, refer to the validator in an attribute or a
    component.    Suppose you want to ensure that the credit-card expiry date provided
    by the user during checkout is in the form MM/YY and that the card has not expired.
    [Listing 8-11](#Chapter08.html#list_8_11) shows the validator code.    ***Listing
    8-11.** CCExpiryValidator.java*  `package eshop.validators;` `import javax.faces.validator.Validator;`
    `import javax.faces.context.FacesContext;` `import javax.faces.component.UIComponent;`
    `import javax.faces.application.FacesMessage;` `import javax.faces.validator.ValidatorException;`
    `import java.util.GregorianCalendar;` `import java.util.Calendar;`  `public class
    CCExpiryValidator implements Validator {` `  public CCExpiryValidator() {` `    }`
    `  public void validate(FacesContext cntx, UIComponent cmp, Object val) {` `    String
    messS = null;` `    String[] fields = ((String)val).split("/", 3);` `    if (fields.length
    != 2) {` `      messS = "Expected MM/YY!";` `      }` `    else {` `      int
    month = 0;` `      int year = 0;` `      try {` `        month = Integer.parseInt(fields[0]);`
    `        year = Integer.parseInt(fields[1]);` `        }` `      catch (NumberFormatException
    e) {` `        }` `      if (month <= 0  ||  month > 12) {` `        messS = "Month
    " + fields[0] + " not valid!";` `        }` `      else if (year < 0  ||  year
    > 99) {` `        messS = "Year " + fields[1] + " not valid!";` `        }` `      else
    {` `        GregorianCalendar cal = new GregorianCalendar();` `        int thisMonth
    = cal.get(Calendar.MONTH) + 1;` `        int thisYear = cal.get(Calendar.YEAR)
    - 2000;` `        if (year < thisYear  ||  year == thisYear && month < thisMonth)
    {` `          messS = "Credit card expired!";` `          }` `        }` `      }`
    `    if (messS != null) {` `      FacesMessage mess = new FacesMessage(FacesMessage.SEVERITY_ERROR,
    messS, messS);` `      throw new ValidatorException(mess);` `      }` `    }`  ` }`  To
    register the validator with the application, you only need to add the following
    lines to `faces-config.xml`—for example, immediately below the registration of
    the converter:  `<validator>` `  <validator-id>CCExpiryValidator</validator-id>`
    `  <validator-class>eshop.validators.CCExpiryValidator</validator-class>` `  </validator>`  Then,
    to validate the credit-card expiry date, you modify the `h:inputText` component
    used in `Checkout.jspx` as follows:  `<h:inputText id="ccexpiry" required="true"`
    `    value="#{shopManager.customer.ccExpiryDate}"` `    requiredMessage="Value
    is required!"` `    >` `  <f:validator validatorId="CCExpiryValidator"/>` `  </h:inputText>`  You’ll
    be rewarded with error messages like those shown in [Figure 8-3](#Chapter08.html#fig_8_3)
    (which I obtained by taking several screenshots and then putting them together
    with a graphics program).  ![Image](images/9781430246237_Fig08-03.jpg)  ***Figure
    8-3.** Expiry-date validation in Checkout.jspx*    #### Validation Methods in
    Backing Beans    Instead of creating a new class as described in the previous
    section, you can add a method to a backing bean. In this case, you could do the
    following:    > *   Copy the `validate` method from `CCExpiryValidator.java` to
    `ShopManager.java`, inside the class `ShopManager`, and rename it `validateCCExpiry`.
    > *   Copy the imports of `FacesContext`, `UIComponent`, `FacesMessage`, `GregorianCalendar`,
    and `Calendar` from `CCExpiryValidator.java` to the beginning of `shopManager.java`.
    > *   Replace in `validateCCExpiry` the line that throws the `ValidatorException`
    with `ctxt.addMessage(cmp.getClientId(ctxt), mess);`.    That’s it! To use this
    validator instead of the previous one, modify the `h:inputText` in `Checkout.jspx`
    as follows:  `<h:inputText id="ccexpiry" required="true"` `    value="#{shopManager.customer.ccExpiryDate}"`
    `    validator="#{shopManager.validateCCExpiry}"` `    requiredMessage="Value
    is required!"` `    />`  The `validator` element in `faces-config.xml`, the element
    `f:validator` in `Checkout.jspx`, and the module `CCExpiryValidator.java` are
    then no longer needed.    ![Image](images/square.jpg) **Tip** To modify the eshop*
    projects, use Eclipse instead of getting bogged down with classpaths when recompiling
    Java modules. Duplicate the project by selecting its icon in Eclipse’s Project
    Explorer bar, and then copy and paste it. Eclipse will ask you to provide a new
    name for the duplicate project. In this way, it will be easier to go back to the
    original should you want to.    ### Creating Custom Components    The functionality
    of a component is centered on converting a user’s inputs (i.e., the HTTP request
    parameters) to component values (via the `decode` method during Apply Request
    Values) and converting component values back to HTML (via the `encode` method
    during Render Response).    In the previous chapter, you saw how to create custom
    components with the facelets and composite JSF tag libraries. In this chapter,
    I want to give you an example of how to create a new JSF component without those
    tags. This will give you a better understanding of how JSF works. I am always
    a great defender of doing things “by hand” at least once!    When you design a
    JSF component, you can choose to move encoding and decoding to a separate renderer
    class. The advantage of this approach is that you can develop more than one renderer
    for the same component, each with a different representation in HTML. You will
    then have the same behavior associated with different ways of reading data from
    the request and writing it to the response.    In general, considering that JSF
    is open source, you might consider modifying an existing component instead of
    developing a new one; or, thanks to the separation of components and renderers,
    perhaps you can modify an existing renderer.    The root class of all JSF components
    is the abstract `javax.faces.component.UIComponent`, and the root class of all
    renderers is `javax.faces.render.Renderer`. To develop a component, though, you’re
    *always* better off extending an existing component or, at the very least, the
    `UIComponentBase` class, which provides default implementations of all abstract
    methods of `UIComponent`. In this way, you only develop code for the methods you
    need to override. The same goes with the renderer.    To complete the picture
    of how to develop your custom component, you also need to create a custom tag
    that’s useable with JSP. The root class of all tag classes is `javax.faces.webapp.UIComponentELTag`.    In
    summary, to develop a custom component, you need to follow these steps:    > 1.  Create
    a component class that subclasses `UIComponent` by extending an existing component.
    > 2.  Register the component in `faces-config.xml`. > 3.  Create a renderer class
    that subclasses `Renderer` and overrides the methods for encoding and decoding.
    > 4.  Register the renderer in `faces-config.xml`. > 5.  Create a custom tag that
    subclasses `UIComponentELTag`. > 6.  Create a TLD for the custom tag.    One last
    word about components and renderers: unless you really think that you’ll reuse
    the same component for different applications, it will be much easier to keep
    the renderer inside the component. I’ll first show you what to do when they’re
    separate, and then I’ll tell you how to keep them together.    I’ll show you how
    to develop a component that combines the functionality of all three standard components
    needed for accepting a user’s input: a label explaining what is expected, the
    text field to accept the input, and a message to report input errors. In other
    words, I’ll show you how to replace the following JSF code:  `<h:outputText value="Contact
    Name"/>` `  <h:inputText id="name" required="true"` `      value="#{shopManager.customer.contactName}"`
    `      requiredMessage="Value is required!"` `      />` `  <h:message for="name"
    styleClass="error"/>`  with this custom component:  `<eshop:inputEntry label="Contact
    Name" required="true"` `    value="#{shopManager.contactName}"` `    errorStyleClass="error"
    requiredMessage="Value is required!"` `    />`  I’ll also show you how this new
    `eshop:inputEntry` component prints an asterisk beside the label if you set `required`
    to `true`.    #### Component    The component is actually the easiest part. Let’s
