    ##### fmt:parseNumber 与 fmt:formatNumber


    `fmt:parseNumber` 和 `fmt:formatNumber` 用于处理数字、百分比和货币。这两个操作都可以通过常见的 `var`/`scope`
    属性对将结果存储到作用域变量中，如果缺少这些属性，则会将结果直接输出到页面。


    请注意，`fmt:formatNumber` 没有标签体，它期望在 `value` 属性中找到要格式化的数字。`fmt:parseNumber` 在其无标签体形式中也支持
    `value` 属性，但如果该属性缺失，它会将标签体的内容作为输入。


    这两个操作都支持一个 `type` 属性，其值可以是 `"number"`、`"currency"` 或 `"percent"`。


    这两个操作还支持一个 `pattern` 属性，允许你详细指定自定义格式。表 4-10 列出了可用的符号。


    ![图片](img/9781430246237_Tab04-10.jpg)


    ![图片](img/9781430246237_Tab04-10a.jpg)


    尝试使用不同的模式来运行 `fmt:formatNumber`，看看会得到什么结果。有些符号的含义显而易见，而另一些则不那么明显。


    此外，`fmt:parseNumber` 支持 `parseLocale`、`integerOnly`（在解析浮点数时必须将其设置为 `false`）和 `timeZone`
    属性。


    另一方面，`fmt:formatNumber` 支持 `currencyCode`（仅在 `type` 设置为 `"currency"` 时使用）、`currencySymbol`（同上）、`groupingUsed`（如果不想在整数部分的每三位数字之间添加分隔符，则设置为
    `false`）、`maxIntegerDigits`、`minIntegerDigits`、`maxFractionDigits` 和 `minFractionDigits`
    属性。最后四个属性分别指定你希望在小数点前后保留的最大和最小数字位数。


    ##### fmt:ParseDate、fmt:formatDate 与 fmt:requestEncoding


    与 `fmt:parseNumber` 和 `fmt:formatNumber` 类似，`fmt:ParseDate` 和 `fmt:formatDate`
    可以将结果存储到作用域变量中，或直接输出到页面。同样，`fmt:formatDate` 没有标签体，而 `fmt:parseDate` 既可以有标签体也可以没有。毫不意外，这两个操作都支持
    `timeZone` 属性，以及格式属性 `dateStyle`（可选值为 `"full"`、`"long"`、`"medium"`、`"short"` 或
    `"default"`）和 `timeStyle`（同上）。日期相关的操作还支持一个 `pattern` 属性。可用符号列表请参见表 4-11。


    ![图片](img/9781430246237_Tab04-11.jpg)


    ![图片](img/9781430246237_Tab04-11a.jpg)


    此外，`fmt:parseDate` 支持 `parseLocale` 属性，而 `fmt:formatDate` 支持 `type` 属性（可选值为 `"date"`、`"time"`
    和 `"both"`）。


    对于剩下的 `i18n` 操作 `fmt:requestEncoding`，你可以指定期望用户在表单中输入的文本所使用的字符编码。例如：


    `<fmt:requestEncoding value="UTF-8"/>`


    这个操作之所以有意义，是因为用户的区域设置可能与页面的区域设置不同。请注意，如果你开发了一个自定义操作，并使用 `ServletResponse.setLocale()`
    方法来设置响应的区域设置，那么该设置将优先于 `fmt:requestEncoding` 中设置的字符编码。


