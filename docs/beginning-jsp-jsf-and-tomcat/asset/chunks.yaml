- fmt: "### Implicit Objects\n\nThe most commonly used implicit objects defined by\
    \ Tomcat are `out` and `request`, followed by `application` and `session`. But\
    \ I will go through them in alphabetical order, for ease of reference.\n\nWhether\
    \ you create objects within JSP pages or Tomcat implicitly creates them for you,\
    \ you cannot use them properly unless you know in which scope they are available.\
    \ There are four possible scopes. In order of increasing generality, they are:\
    \ *page*, *request*, *session*, and *application*. You will learn more about them\
    \ in the following pages.\n\nIn general, if you are not sure what class a particular\
    \ object instantiates, you can always display its name with the following expression:\n\
    \n```\n<%=the_misterious_object.getClass().getName()%>\n```\n\n#### The `application`\
    \ Object\n\nThe `application` object is an instance of the class `org.apache.catalina.core.ApplicationContextFacade`,\
    \ which Tomcat defines to implement the interface `javax.servlet.ServletContext`.\
    \ It provides access to the resources shared within the web application. For example,\
    \ by adding an attribute (which can be an object of any type) to `application`,\
    \ you can ensure that all JSP files that make up your web application have access\
    \ to it.\n\n##### Example: Using an Attribute to Enable and Disable Conditional\
    \ Code\n\nOne of the advantages of using JSP is that the web server doesn’t need\
    \ to reinterpret the source file of a page every time a client requests that page.\
    \ The JSP container translates each JSP page into a Java file and compiles it\
    \ into a class, but this only happens when you update the JSP source. You might\
    \ like to be able to switch on or off some particular functionality for debugging\
    \ or other purposes, without having to edit one or more file and force Tomcat\
    \ to recompile them when you flip the switch. To achieve this result, you only\
    \ need to wrap the functionality in question inside a conditional statement, as\
    \ the following one:\n\n```\nif (application.getAttribute(\"do_it\") != null)\
    \ {\n  /* ...place your \"switchable\" functionality here... */\n  }\n```\n\n\
    You also need to include two small JSP pages in your application. The first one\
    \ to set the attribute `do_it` (see [Listing 2-1](#Chapter02.html#list_2_1)) and\
    \ the second one to remove it (see [Listing 2-2](#Chapter02.html#list_2_2)).\n\
    \n**Listing 2-1.** `do_it.jsp`\n\n```\n<%@page language=\"java\" contentType=\"\
    text/html\"%>\n<html><head><title>Conditional code ON</title></head>\n<body>Conditional\
    \ code\n<%\n  application.setAttribute(\"do_it\", \"\");\n  if (application.getAttribute(\"\
    do_it\") == null) out.print(\"not\");\n  %>\nenabled</body></html>\n```\n\n**Listing\
    \ 2-2.** `do_it_not.jsp`\n\n```\n<%@page language=\"java\" contentType=\"text/html\"\
    %>\n<html><head><title>Conditional code OFF</title></head>\n<body>Conditional\
    \ code\n<%\n  application.removeAttribute(\"do_it\");\n  if (application.getAttribute(\"\
    do_it\") == null) out.print(\"not\");\n  %>\nenabled</body></html>\n```\n\nWhen\
    \ you want to enable the conditional code, you just type the URL of `do_it.jsp`\
    \ in your browser. Until you disable it by typing the URL of `do_it_not.jsp` or\
    \ by restarting Tomcat, the conditional code will remain enabled in all pages\
    \ of your application. Notice that in the example `do_it.jsp` only sets the attribute\
    \ `do_it` to an empty string, but you can also define different values to have\
    \ a finer selection of code to be activated.\n\nNote that you can use the same\
    \ mechanism to switch on and off HTML code.\n\n##### Example: Using an Attribute\
    \ to Control Logging\n\nYou might find it useful to be able to control the logging\
    \ of some events to a particular file dynamically. To do so, you need to include\
    \ two JSP files in your application (see [Listings 2-3](#Chapter02.html#list_2_3)\
    \ and [2-4](#Chapter02.html#list_2_4)).\n\n**Listing 2-3.** `log_on.jsp`\n\n```\n\
    <%@page language=\"java\" contentType=\"text/html\"%>\n<%@ page import=\"MyClasses.*\"\
    %>\n<html><head><title>Switch the log ON</title></head><body>\n<%\n  MyLog log\
    \ = (MyLog)application.getAttribute(\"logFile\");\n  if (log == null) {\n    try\
    \ {\n      log = new MyLog(\"logs/mylog.log\");\n      application.setAttribute(\"\
    logFile\", log);\n      log.println(\"Logging enabled\");\n      out.println(\"\
    Logging enabled\");\n      }\n    catch (Exception e) {\n      out.println(e.getMessage());\n\
    \      }\n    }\n  else {\n    log.println(\"Attempt to enable logging\");\n \
    \   out.println(\"Logging was already enabled\");\n    }\n  %>\n</body></html>\n\
    ```\n\n**Listing 2-4.** `log_off.jsp`\n\n```\n<%@page language=\"java\" contentType=\"\
    text/html\"%>\n<%@ page import=\"MyClasses.*\"%>\n<html><head><title>Switch the\
    \ log OFF</title></head><body>\n<%\n  MyLog log = (MyLog)application.getAttribute(\"\
    logFile\");\n  if (log != null) {\n    log.println(\"Logging disabled\");\n  \
    \  log.close();\n    application.removeAttribute(\"logFile\");\n    }\n  %>\n\
    Done.\n</body></html>\n```\n\nAfter checking that there is no application attribute\
    \ named `logFile`, `log_on.jsp` instantiates the `MyLog` class and saves the object\
    \ as an application attribute named `logFile`. After that, you can easily make\
    \ an entry in the log file from any JSP of the same application, as shown in [Listing\
    \ 2-5](#Chapter02.html#list_2_5).\n\n**Listing 2-5.** `check_logging.jsp`\n\n\
    ```\n<%@ page import=\"MyClasses.*\"%>\n<%\n  MyLog log = (MyLog)application.getAttribute(\"\
    logFile\");\n  if (log != null) log.println(\"This is my entry in the log\");\n\
    \  %>\n```\n\nIn `log_off.jsp`, after checking that the `logFile` attribute exists,\
    \ you close the log file and remove the attribute. The logging is then disabled\
    \ in all JSPs of the application, because any attempt to get the `logFile` attribute\
    \ returns a `null`. The only piece of the puzzle that you still need is how to\
    \ make the `MyLog` class.\n\nThis is also simple:\n\n> *   Open the folder `%CATALINA_HOME%\\\
    webapps\\ROOT\\WEB-INF\\`.\n> *   If `WEB-INF` has no subfolder named `classes`\
    \ (it shouldn’t, if you have a fresh installation of Tomcat), create one.\n> *\
    \   Inside the newly created folder, create a folder named `MyClasses`, and place\
    \ in it the file `MyLog.java` shown in [Listing 2-6](#Chapter02.html#list_2_6).\n\
    > *   Open a command-line window and compile `MyLog.java` with `javac`, as explained\
    \ in [Chapter 1](#Chapter01.html) for `Exec_http.java`.\n> *   Restart Tomcat.\n\
    \n**Listing 2-6.** `MyLog.java`\n\n```\n/* MyLog.java - Implements a log class\
    \ */\npackage MyClasses;\nimport java.util.Date;\nimport java.text.SimpleDateFormat;\n\
    import java.io.FileWriter;\nimport java.io.PrintWriter;\nimport java.io.IOException;\n\
    public class MyLog {\n  private static final SimpleDateFormat TIME_FMT =\n   \
    \                    new SimpleDateFormat(\"yyyy-MM-dd HH:mm:ss:SSS\");\n  private\
    \ static PrintWriter log = null;\n  public MyLog(String logpath) throws IOException\
    \ {\n    log = new PrintWriter(new FileWriter(logpath, true));\n    }\n  public\
    \ static synchronized void println(String s) {\n    log.println(TIME_FMT.format(new\
    \ java.util.Date()) + \" - \" + s);\n    log.flush();\n    }\n  public static\
    \ synchronized void close() {\n    log.close();\n    }\n  }\n```"
