- fmt: '### Product Categories


    It makes sense to group the products into categories, especially if the catalog
    is diversified and substantial. As `eshop` only sells books, its categories refer
    to broad book subjects, such as action novels, science fiction, and web development.


    Each category has a *name* and an *identifier*. The identifier is guaranteed to
    be unique, thereby allowing us to refer to each category without ambiguity. Normally,
    a category would have additional attributes, like description, status, date of
    creation, etc. To implement the customer interface, the only operation you need
    with such a bare-bones category definition is obtaining a category name given
    its ID.


    ### Books


    Each book has a *title*, an *author*, a *price*, a unique *identifier*, a *category
    ID*, and an image of the *front cover*. Customers must be able to select books
    from a category, search for books, display the book details, and put books into
    a shopping cart.


    ### Shopping Cart


    The minimum amount of information stored in a shopping cart is a list of items,
    each consisting of a book identifier and the number of ordered copies. I decided
    to duplicate in the shopping cart title, description, and price of the books instead
    of using their book IDs. Besides simplifying the application, this also protects
    the customer from book updates that might occur while he or she is still shopping.
    In a more sophisticated application, when some book attributes change, you might
    want to inform the customers who’ve placed the book in their cart but haven’t
    yet completed the checkout. You wouldn’t be able to do so without saving the original
    information. Obviously, this only avoids a problem due to concurrent access of
    data (more about that in [Chapter 6](#Chapter06.html)). To protect the information
    from more serious occurrences like server failures, you would have to implement
    more general solutions, like saving session data on non-volatile storage and server
    clustering.


    Customers must be able to change the number of copies of each book in the cart,
    remove a book altogether, and go to the checkout. They should also be able to
    display the shopping cart at any time.


    ### Order


    Although this sample application doesn’t cover orders, it’s useful to specify
    the structure of an order. You need two separate classes: one to represent the
    ordered items, and one with the customer’s data.


    For each ordered item, you need to save the book data obtained from the shopping
    cart. Additionally, for each order, you need to save the customer data and a unique
    order number.


    ## The Customer Interface


    [Figure 3-15](#Chapter03.html#fig_3_15) shows `eshop`’s home page. The top section
    includes a link to the shopping cart, while the sidebar on the left features a
    search box and a list of categories. The other pages only differ in the central
    panel, which in the home page contains a welcoming message.


    ![Image](images/9781430246237_Fig03-15.jpg)


    ***Figure 3-15.** E-shop’s home page*


    [Figure 3-16](#Chapter03.html#fig_3_16) shows the panel containing the list of
    books in a category.


    ![Image](images/9781430246237_Fig03-16.jpg)


    ***Figure 3-16.** A book category on E-shop*


    [Figure 3-17](#Chapter03.html#fig_3_17) shows the details of a book.


    ![Image](images/9781430246237_Fig03-17.jpg)


    ***Figure 3-17.** A book’s details on E-shop*


    [Figure 3-18](#Chapter03.html#fig_3_18) shows the shopping cart with a couple
    of items.


    ![Image](images/9781430246237_Fig03-18.jpg)


    ***Figure 3-18.** E-shop’s shopping cart*


    Pretty straightforward, isn’t it?


    ## The E-shop Architecture


    E-shop is an MVC application. The data and the business logic (the model) reside
    in a database and Java classes; the user interface (the view) is implemented in
    JSP; and the handler of client requests (the controller) is an HTTP Java servlet.


    When the servlet receives a client HTTP request, it instantiates the model’s central
    class and forwards the request to the appropriate JSP page. The JSP page obtains
    data from the model and generates the HTML response. The model isn’t aware of
    what the JSP pages do with the data it provides, and the JSP pages aren’t aware
    of where and how the model keeps the data.


    ### The Model


    The central model class is called `DataManager`. Its purpose is to hide all database
    operations from the JSP pages. `DataManager` supports some methods that have to
    do with initialization and connecting to the database, which we’ll look at in
    later chapters. For the time being, we’re more interested in the methods that
    implement the business logic of the application. [Table 3-1](#Chapter03.html#tab_3_1)
    lists these methods.


    ![Image](images/9781430246237_Tab03-01.jpg)


    Their purpose should be pretty clear. I would just like to make a couple of points
    concerning `insertOrder`. First, the value it returns is the order ID to be given
    back to the client. Second, in a more realistic case, all parameters, with the
    exception of the shopping cart, would be replaced by a customer ID, typically
    the customer’s e-mail address. In this simple application, however, as it doesn’t
    keep track of the customers, there are no permanent customer records and customer
    IDs.


    ### The Controller


    The controller servlet extends `javax.servlet.http.HttpServlet` and is named `ShopServlet`.'
