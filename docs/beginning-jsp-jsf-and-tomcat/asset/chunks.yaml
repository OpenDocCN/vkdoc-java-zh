- fmt: "### Simple Types\n\nIf you need to modify an already defined type without\
    \ adding attributes or other elements, you can define a so-called *simple type*\
    \ instead of recurring to a complex one. For example, the following code defines\
    \ a string that can only contain up to 32 characters:\n\n```\n<xsd:simpleType\
    \ name=\"myString\">\n  <xsd:restriction base=\"xsd:string\">\n    <xsd:maxLength\
    \ value=\"32\"/>\n    </xsd:restriction>\n  </xsd:simpleType>\n```\n\nBesides\
    \ `maxLength`, you can also apply the `length` and `minLength` attributes to listlike\
    \ types. Additionally, you can use the `whiteSpace` and `pattern` attributes.\n\
    \nThe possible values for `whiteSpace` are `preserve` (the default), `replace`,\
    \ and `collapse`. With `replace`, all carriage return, line feed, and tab characters\
    \ are replaced with simple spaces. With `collapse`, leading and trailing spaces\
    \ are removed, and sequences of multiple spaces are collapsed into single spaces.\n\
    \nWith `pattern`, you define a regular expression that must be matched. For example,\
    \ the following code specifies that only strings consisting of at least one letter\
    \ of the alphabet are valid:\n\n```\n<xsd:pattern value=\"[A-Za-z]+\" />\n```\n\
    \nFor non-list types, you can also use the attributes `minExclusive`, `minInclusive`,\
    \ `maxExclusive`, `maxInclusive`, `totalDigits`, `fractionDigits`, and `enumeration`.\
    \ For example, this code defines a number with three decimal figures >= 10 and\
    \ < 20:\n\n```\n<xsd:simpleType name=\"xxyyyType\">\n  <xsd:restriction base=\"\
    xsd:decimal\">\n    <xsd:totalDigits value=\"6\"/>\n    <xsd:fractionDigits value=\"\
    3\"/>\n    <xsd:minInclusive value=\"10.000\"/>\n    <xsd:maxExclusive value=\"\
    20.000\"/>\n    </xsd:restriction>\n  </xsd:simpleType>\n```\n\nAnd here’s an\
    \ example of enumeration:\n\n```\n<xsd:simpleType name=\"directionType\">\n  <xsd:restriction\
    \ base=\"xsd:string\">\n    <xsd:enumeration value=\"left\"/>\n    <xsd:enumeration\
    \ value=\"right\"/>\n    <xsd:enumeration value=\"straight\"/>\n    </xsd:restriction>\n\
    \  </xsd:simpleType>\n```\n\n### Regular Expressions\n\nA regular expression is\
    \ a string that matches a set of strings according to certain rules. Unfortunately,\
    \ there is no standard syntax for regular expressions. They are used with several\
    \ applications, including text editors (e.g., `vi`) and programming languages\
    \ (e.g., `Perl`), and in Unix commands and scripting. W3C defines the syntax for\
    \ regular expressions to be used in XML schemas ([`http://www.w3.org/TR/xmlschema-2/#regexs`](http://www.w3.org/TR/xmlschema-2/#regexs)).\
    \ Here I give you a summary of that definition in plain English.\n\nThe basic\
    \ component of a regular expression is called an *atom*. It consists of a single\
    \ character (specified either individually or as a *class* of characters enclosed\
    \ between square brackets) indicating that any of the characters in the class\
    \ are a match. For example, both `\"a\"` and `\"[a]\"` are regular expressions\
    \ matching the lowercase character ‘a’, while `\"[a-zA-Z]\"` matches all letters\
    \ of the English alphabet.\n\nThings can get complicated, because you can also\
    \ subtract a class from a group or create a *negative group* by sticking a `^`\
    \ character at the beginning of it. For example, `\"[(^abc) - [ABC]]\"` matches\
    \ any character with the exclusion of the characters ‘a’, ‘b’, and ‘c’ in uppercase\
    \ or lowercase. This is because the group `^abc` matches everything with the exclusion\
    \ of the three letters in lowercase, and the subtraction of `[ABC]` removes the\
    \ same three letters in uppercase. Obviously, you could have obtained the same\
    \ effect with the regular expression `\"[^aAbBcC]\"`.\n\nThe characters `\\|.-^?*+{}()[]`\
    \ are special and must be escaped with a backslash. You can also use `\\n` for\
    \ newlines, `\\r` for returns, and `\\t` for tabs.\n\nWith atoms, you can build\
    \ *pieces* by appending to it a *quantifier*. Possible quantifiers are `?` (the\
    \ question mark), `+` (the plus sign), `*` (the asterisk), and `{n,m}`, with `n`\
    \ <= `m` indicating non-negative integers. The question mark indicates that the\
    \ atom can be missing; the plus sign means any concatenation of one or more atoms;\
    \ the asterisk means any concatenation of atoms (including none at all); and `{n,m}`\
    \ means any concatenation of length >= `n` and <= `m` (e.g., `\"[a-z]{2,7}\"`\
    \ means all strings containing between two and seven lowercase alphabetic characters).\
    \ If you omit `m` but leave the comma in place, you leave the upper limit unbounded.\
    \ If, on the other hand, you also omit the comma, you define a string of fixed\
    \ length (e.g., `\"[0-9]{3}\"` means a string of exactly three numeric characters).\
    \ You can concatenate pieces simply by writing them one after the other. For example,\
    \ to define an identifier consisting of alphanumeric characters and underscores\
    \ but beginning with a letter, you could write the expression `\"[a-zA-Z]{1}[a-zA-Z0-9_]*\"\
    `. The general term *branch* is used to indicate a single piece or a concatenation\
    \ of pieces when the distinction is not relevant.\n\nTo specify partial patterns,\
    \ you can insert at the beginning and/or at the end of each atom a sequence formed\
    \ with a period and an asterisk. For example, `\".*ABC.*\"` identifies all strings\
    \ containing in any position the substring `ABC`. Without dot-asterisk wildcarding,\
    \ `\"ABC\"` only matches a string of exactly three characters of length.\n\nSeveral\
    \ branches can be further composed by means of vertical bars to form a more general\
    \ regular expression. For example, `\"[a-zA-Z]* | [0-9]*\"` matches all strings\
    \ composed entirely of letters or of digits but not a mix of the two.\n\nInstead\
    \ of defining a new simple type by imposing a restriction, you can also specify\
    \ that it consists of a list of items of an existing simple type. For example,\
    \ the following code defines a type consisting of a series of directions:\n\n\
    ```\n<xsd:simpleType name=\"pathType\">\n  <xsd:list itemType=\"directionType\"\
    />\n  </xsd:simpleType>\n```\n\nFinally, besides `xsd:restriction` and `xsd:list`,\
    \ you can define a new simple type by means of `xsd:union`, which lets you combine\
    \ two different preexisting types. For example, the following code defines a type\
    \ that can be either a number between `1` and `10` or one of the strings `\"<\
    \ 1\"` and `\"> 10\"`:\n\n```\n<xsd:simpleType name=\"myNumber\">\n  <xsd:union>\n\
    \    <xsd:simpleType>\n      <xsd:restriction base=\"xsd:positiveInteger\">\n\
    \        <xsd:maxInclusive value=\"10\"/>\n        </xsd:restriction>\n      </xsd:simpleType>\n\
    \    <xsd:simpleType>\n      <xsd:restriction base=\"xsd:string\">\n        <xsd:enumeration\
    \ value=\"< 1\"/>\n        <xsd:enumeration value=\"> 10\"/>\n        </xsd:restriction>\n\
    \      </xsd:simpleType>\n    </xsd:union>\n  </xsd:simpleType>\n```"
  raw: '##### Simple Types


    If you need to modify an already defined type without adding attributes or other
    elements, you can define a so-called *simple type* instead of recurring to a complex
    one. For example, the following code defines a string that can only contain up
    to 32 characters:


    `<xsd:simpleType name="myString">`

    `  <xsd:restriction base="xsd:string">`

    `    <xsd:maxLength value="32"/>`

    `    </xsd:restriction>`

    `  </xsdLsimpleType>`


    Besides `maxLength`, you can also apply the `length` and `minLength` attributes
    to listlike types. Additionally, you can use the `whiteSpace` and `pattern` attributes.


    The possible values for `whiteSpace` are `preserve` (the default), `replace`,
    and `collapse`. With `replace`, all carriage return, line feed, and tab characters
    are replaced with simple spaces. With `collapse`, leading and trailing spaces
    are removed, and sequences of multiple spaces are collapsed into single spaces.


    With `pattern`, you define a regular expression that must be matched. For example,
    the following code specifies that only strings consisting of at least one letter
    of the alphabet are valid:


    `<xsd:pattern value="[A-Za-z]+"`


    For non-list types, you can also use the attributes `minExclusive`, `minInclusive`,
    `maxExclusive`, `maxInclusive`, `totalDigits`, `fractionDigits`, and `enumeration`.
    For example, this code defines a number with three decimal figures >= 10 and <
    20:


    `<xsd:simpleType name="xxyyyType">`

    `  <xsd:restriction base="xsd:decimal">`

    `    <xsd:totalDigits value="6"/>`

    `    <xsd:fractionDigits value="3"/>`

    `    <xsd:minInclusive value="10.000"/>`

    `    <xsd:maxExclusive value="20.000"/>`

    `    </xsd:restriction>`

    `  </xsd:simpleType>`


    And here’s an example of enumeration:


    `<xsd:simpleType name="directionType">`

    `  <xsd:restriction base="xsd:string">`

    `    <xsd:enumeration value="left"/>`

    `    <xsd:enumeration value="right"/>`

    `    <xsd:enumeration value="straight"/>`

    `    </xsd:restriction>`

    `  </xsd:simpleType>`


    **REGULAR EXPRESSIONS**


    A regular expression is a string that matches a set of strings according to certain
    rules. Unfortunately, there is no standard syntax for regular expressions. They
    are used with several applications, including text editors (e.g., vi) and programming
    languages (e.g., Perl), and in Unix commands and scripting. W3C defines the syntax
    for regular expressions to be used in XML schemas ([`http://www.w3.org/TR/xmlschema-2/#regexs`](http://www.w3.org/TR/xmlschema-2/#regexs)).
    Here I give you a summary of that definition in plain English.


    The basic component of a regular expression is called an *atom*. It consists of
    a single character (specified either individually or as a *class* of characters
    enclosed between square brackets) indicating that any of the characters in the
    class are a match. For example, both `"a"` and `"[a]"` are regular expressions
    matching the lowercase character ‘a’, while `"[a-zA-Z]"` matches all letters of
    the English alphabet.


    Things can get complicated, because you can also subtract a class from a group
    or create a *negative group* by sticking a `^` character at the beginning of it.
    For example, `"[(^abc) - [ABC]]"` matches any character with the exclusion of
    the characters ‘a’, ‘b’, and ‘c’ in uppercase or lowercase. This is because the
    group `^abc` matches everything with the exclusion of the three letters in lowercase,
    and the subtraction of `[ABC]` removes the same three letters in uppercase. Obviously,
    you could have obtained the same effect with the regular expression `"[^aAbBcC]"`.


    The characters `\|.-^?*+{}()[]` are special and must be escaped with a backslash.
    You can also use `\n` for newlines, `\r` for returns, and `\t` for tabs.


    With atoms, you can build *pieces* by appending to it a *quantifier*. Possible
    quantifiers are `?` (the question mark), `+` (the plus sign), `*` (the asterisk),
    and `{n,m}`, with `n` <= `m` indicating non-negative integers. The question mark
    indicates that the atom can be missing; the plus sign means any concatenation
    of one or more atoms; the asterisk means any concatenation of atoms (including
    none at all); and `{n,m}` means any concatenation of length >= `n` and <= `m`
    (e.g., `"[a-z]{2,7}"` means all strings containing between two and seven lowercase
    alphabetic characters). If you omit `m` but leave the comma in place, you leave
    the upper limit unbounded. If, on the other hand, you also omit the comma, you
    define a string of fixed length (e.g., `"[0-9]{3}"` means a string of exactly
    three numeric characters). You can concatenate pieces simply by writing them one
    after the other. For example, to define an identifier consisting of alphanumeric
    characters and underscores but beginning with a letter, you could write the expression
    `"[a-zA-Z]{1}[a-zA-Z0-9_]*"`. The general term *branch* is used to indicate a
    single piece or a concatenation of pieces when the distinction is not relevant.


    To specify partial patterns, you can insert at the beginning and/or at the end
    of each atom a sequence formed with a period and an asterisk. For example, `".*ABC.*"`
    identifies all strings containing in any position the substring `ABC`. Without
    dot-asterisk wildcarding, `"ABC"` only matches a string of exactly three characters
    of length.


    Several branches can be further composed by means of vertical bars to form a more
    general regular expression. For example, `"[a-zA-Z]* | [0-9]*"` matches all strings
    composed entirely of letters or of digits but not a mix of the two.


    Instead of defining a new simple type by imposing a restriction, you can also
    specify that it consists of a list of items of an existing simple type. For example,
    the following code defines a type consisting of a series of directions:


    `<xsd:simpleType name="pathType">`

    `  <xsd:list itemType="directionType"/>`

    `  </xsd:simpleType>`


    Finally, besides `xsd:restriction` and `xsd:list`, you can define a new simple
    type by means of `xsd:union`, which lets you combine two different preexisting
    types. For example, the following code defines a type that can be either a number
    between `1` and `10` or one of the strings `"< 1"` and `"> 10"`:


    `<xsd:simpleType name="myNumber">`

    `  <xsd:union>`

    `    <xsd:simpleType>`

    `      <xsd:restriction base="xsd:positiveInteger">`

    `        <xsd:maxInclusive value="10"/>`

    `        </xsd:restriction>`

    `      </xsd:simpleType>`

    `    <xsd:simpleType>`

    `      <xsd:restriction base="xsd:string">`

    `        <xsd:enumeration value="< 1"/>`

    `        <xsd:enumeration value="> 10"/>`

    `        </xsd:restriction>`

    `      </xsd:simpleType>`

    `    </xsd:union>`

    `  </xsd:simpleType>`'
  trans: '

    ##### 简单类型


    如果你需要修改一个已定义的类型，但无需添加属性或其他元素，可以定义一个所谓的*简单类型*，而无需使用复杂类型。例如，以下代码定义了一个最多只能包含 32 个字符的字符串：


    `<xsd:simpleType name="myString">`

    `  <xsd:restriction base="xsd:string">`

    `    <xsd:maxLength value="32"/>`

    `    </xsd:restriction>`

    `  </xsdLsimpleType>`


    除了 `maxLength`，你还可以对列表类类型应用 `length` 和 `minLength` 属性。此外，你还可以使用 `whiteSpace` 和
    `pattern` 属性。


    `whiteSpace` 的可能取值包括 `preserve`（默认值）、`replace` 和 `collapse`。使用 `replace` 时，所有回车符、换行符和制表符都会被替换为普通空格。使用
    `collapse` 时，开头和结尾的空格会被移除，多个连续的空格会被压缩为单个空格。


    使用 `pattern` 时，你需要定义一个必须匹配的正则表达式。例如，以下代码指定只有至少包含一个字母的字符串才是有效的：


    `<xsd:pattern value="[A-Za-z]+"`


    对于非列表类型，你还可以使用 `minExclusive`、`minInclusive`、`maxExclusive`、`maxInclusive`、`totalDigits`、`fractionDigits`
    和 `enumeration` 属性。例如，以下代码定义了一个包含三位小数、数值 >= 10 且 < 20 的数字：


    `<xsd:simpleType name="xxyyyType">`

    `  <xsd:restriction base="xsd:decimal">`

    `    <xsd:totalDigits value="6"/>`

    `    <xsd:fractionDigits value="3"/>`

    `    <xsd:minInclusive value="10.000"/>`

    `    <xsd:maxExclusive value="20.000"/>`

    `    </xsd:restriction>`

    `  </xsd:simpleType>`


    下面是一个枚举的例子：


    `<xsd:simpleType name="directionType">`

    `  <xsd:restriction base="xsd:string">`

    `    <xsd:enumeration value="left"/>`

    `    <xsd:enumeration value="right"/>`

    `    <xsd:enumeration value="straight"/>`

    `    </xsd:restriction>`

    `  </xsd:simpleType>`


    **正则表达式**


    正则表达式是一种根据特定规则匹配一组字符串的字符串。遗憾的是，正则表达式并没有标准的语法。它们被用于多种应用程序，包括文本编辑器（例如 vi）和编程语言（例如
    Perl），以及 Unix 命令和脚本中。W3C 定义了用于 XML 模式的正则表达式语法（[`http://www.w3.org/TR/xmlschema-2/#regexs`](http://www.w3.org/TR/xmlschema-2/#regexs)）。这里我用通俗易懂的语言为你总结一下该定义。


    正则表达式的基本组成部分称为*原子*。它由一个单独的字符（可以单独指定，也可以作为方括号内的*字符类*指定）组成，表示该类中的任何字符都算匹配。例如，`"a"`
    和 `"[a]"` 都是匹配小写字母 ''a'' 的正则表达式，而 `"[a-zA-Z]"` 则匹配英文字母表中的所有字母。


    事情可能会变得复杂，因为你还可以从一个组中减去一个类，或者通过在开头添加 `^` 字符来创建一个*否定组*。例如，`"[(^abc) - [ABC]]"`
    匹配任何字符，但不包括大写或小写的 ''a''、''b'' 和 ''c''。这是因为组 `^abc` 匹配除了这三个小写字母之外的所有字符，而减去 `[ABC]`
    则移除了同样这三个大写字母。显然，你也可以使用正则表达式 `"[^aAbBcC]"` 达到同样的效果。


    字符 `\|.-^?*+{}()[]` 是特殊字符，必须使用反斜杠进行转义。你还可以使用 `\n` 表示换行符，`\r` 表示回车符，`\t` 表示制表符。


    使用原子，你可以通过在其后附加一个*量词*来构建*片段*。可能的量词包括 `?`（问号）、`+`（加号）、`*`（星号）以及 `{n,m}`，其中 `n`
    <= `m` 且为非负整数。问号表示该原子可以缺失；加号表示一个或多个原子的任意连接；星号表示任意数量的原子连接（包括零个）；`{n,m}` 表示长度 >=
    `n` 且 <= `m` 的任意连接（例如，`"[a-z]{2,7}"` 表示所有包含两到七个英文小写字母的字符串）。如果你省略了 `m` 但保留了逗号，则上限不受限制。另一方面，如果你也省略了逗号，则定义了一个固定长度的字符串（例如，`"[0-9]{3}"`
    表示一个恰好包含三个数字字符的字符串）。你可以通过简单地将片段一个接一个地写在一起来连接它们。例如，要定义一个由字母数字字符和下划线组成但以字母开头的标识符，你可以编写表达式
    `"[a-zA-Z]{1}[a-zA-Z0-9_]*"`。通用术语*分支*用于指代单个片段或片段的连接，当这种区分不相关时。


    要指定部分模式，你可以在每个原子的开头和/或结尾插入一个由句点和星号组成的序列。例如，`".*ABC.*"` 标识所有在任何位置包含子串 `ABC` 的字符串。如果没有点星通配符，`"ABC"`
    只匹配一个恰好由三个字符组成的字符串。


    多个分支可以通过竖线进一步组合，形成更通用的正则表达式。例如，`"[a-zA-Z]* | [0-9]*"` 匹配所有完全由字母或完全由数字组成的字符串，但不匹配两者混合的字符串。


    除了通过施加限制来定义新的简单类型，你还可以指定它由现有简单类型的项目列表组成。例如，以下代码定义了一个由一系列方向组成的类型：


    `<xsd:simpleType name="pathType">`

    `  <xsd:list itemType="directionType"/>`

    `  </xsd:simpleType>`


    最后，除了 `xsd:restriction` 和 `xsd:list`，你还可以通过 `xsd:union` 定义一个新的简单类型，它允许你组合两个不同的已有类型。例如，以下代码定义了一个类型，它可以是
    `1` 到 `10` 之间的一个数字，也可以是字符串 `"< 1"` 或 `"> 10"` 之一：


    `<xsd:simpleType name="myNumber">`

    `  <xsd:union>`

    `    <xsd:simpleType>`

    `      <xsd:restriction base="xsd:positiveInteger">`

    `        <xsd:maxInclusive value="10"/>`

    `        </xsd:restriction>`

    `      </xsd:simpleType>`

    `    <xsd:simpleType>`

    `      <xsd:restriction base="xsd:string">`

    `        <xsd:enumeration value="< 1"/>`

    `        <xsd:enumeration value="> 10"/>`

    `        </xsd:restriction>`

    `      </xsd:simpleType>`

    `    </xsd:union>`

    `  </xsd:simpleType>`

