    Alternatives to MySQL    There’s no general reason why you shouldn’t use MySQL
    in your applications. Nevertheless, you do have alternatives worth mentioning.
    I have only tested E-shop with MySQL, but I expect it to work exactly the same
    with other DBMSs.    If you switch DBMSs, there’s a good chance that you’ll just
    need to change the values of the init parameters `jdbcDriver` and `dbUrl` in `web.xml`
    from these values for MySQL:  `com.mysql.jdbc.Driver` `jdbc:mysql://localhost:3306/shop`  to
    the values for the other DBMS.    For example, for PostgreSQL ([`http://www.postgresql.org/`](http://www.postgresql.org/)),
    the values would look like this:  `org.postgresql.Driver` `jdbc:postgresql://localhost/shop`  For
    Firebird ([`http://www.firebirdsql.org/`](http://www.firebirdsql.org/)), the values
    could look like this:  `org.firebirdsql.jdbc.FBDriver` `jdbc:firebirdsql:localhost/3050:D:\\Firebird
    Datafiles\\shop.fdb`  Sun Microsystems reports that 221 different JDBC drivers
    exist (see [`http://developers.sun.com/product/jdbc/drivers`](http://developers.sun.com/product/jdbc/drivers)).
    Therefore, you should be able to find the driver you need to connect to any database,
    although it might not be freely available.    If you don’t find the right JDBC
    driver or if it’s too expensive, you might be able to use the JDBC ODBC bridge
    included in the JVM to connect to any ODBC-compliant database. ODBC refers to
    an API supported by many database vendors on basically all operating systems.
    With the JDBC-ODBC bridge, you can also access Microsoft Excel files as if they
    were a database. For example, let’s suppose that you have the spreadsheet shown
    in [Figure 6-6](#Chapter06.html#fig_6_6).  ![Image](images/9781430246237_Fig06-06.jpg)  ***Figure
    6-6.** table.xls*    To be able to access it via the JDBC-ODBC bridge, you first
    need to associate the file with an ODBC data source. To do so, go to `Start` ![Image](images/U001.jpg)
    `Settings` ![Image](images/U001.jpg) `Control Panel` ![Image](images/U001.jpg)
    `Administrative Tools` ![Image](images/U001.jpg) `Data Sources (ODBC)`. There,
    click on the `System DSN` tab and then on the `Add` button, as shown in [Figure
    6-7](#Chapter06.html#fig_6_7).  ![Image](images/9781430246237_Fig06-07.jpg)  ***Figure
    6-7.** ODBC Data Source control panel*    This opens the `Create New Data Source`
