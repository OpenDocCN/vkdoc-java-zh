    as follows:  `017 private ListDataModel<Category> categoriesDataModel = new ListDataModel<Category>();`  The
    result is that the `List` of categories obtained from the database via the `dataManager.getCategories`
    method is assigned to the `value` attribute of `h:dataTable`.    JSF implements
    an index that goes through all the items of the list, and the attribute `var="category"`
    defines the name of the variable that gives access to the current item. In practical
    terms, this means that when the JSF servlet renders the `h:dataTable` component
    during the Render Response phase, it renders the `h:commandLink` of lines 5–9
    for each category found in the database.    #### The Checkout Page    The `Checkout.jspx`
    module of the `eshopf` application asks the user to provide the payment data (name,
    address, and credit-card information). [Listing 8-7](#Chapter08.html#list_8_7)
    shows the code associated with one of the input items.    ***Listing 8-7.** eshopf:
