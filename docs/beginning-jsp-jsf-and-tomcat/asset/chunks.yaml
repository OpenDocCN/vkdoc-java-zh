    #### 运算符、赋值与比较


    二元运算符（即需要两个操作数的运算符）没有什么特别之处。它们包括常见的加法、减法、乘法、除法以及取模（即整数除法的余数）运算符。当应用于字符串时，加法运算符会将其拼接起来。


    除了用等号表示的普通赋值运算符外，每个二元运算符也都有一个对应的赋值运算符。例如，下面这行代码表示：取变量 `a` 的当前值，加上 `b`，然后将结果存回
    `a`：


    `a += b;  // 等同于 a = a + b;`


    最常用的一元运算符（即只需要一个操作数的运算符）包括负号（用于改变其后数值的正负号），以及自增和自减运算符：


    `a = -b;`

    `a++;  // 等同于 a += 1;`

    `a--;  // 等同于 a -= 1;`


    你可以将一种类型的表达式的值赋给另一种类型的变量，但存在一些限制。对于数值类型，你只能将值赋给相同类型或“更大”类型的变量。例如，你可以将 `int` 值赋给
    `long` 类型的变量，但要将 `long` 值赋给 `int` 变量，则必须对值进行*类型转换*（即向下转型），如 `int iVar = (int)1234567L;`。请小心操作，因为在向下转换浮点数时可能会丢失精度！


    你可以将对象赋给其他类型的变量，但前提是该变量的类型是你实例化对象所属类的超类。与数值类型的向下转型类似，你也可以将超类的值类型转换为子类类型的变量。


    比较运算符应用于基本数据类型时非常直观。有 `==` 检查相等，`!=` 检查不等，`>` 检查“大于”，`>=` 检查“大于或等于”，`<` 检查“小于”，`<=`
    检查“小于或等于”。这些都没有什么令人意外的地方。然而，在进行对象之间的比较时，你必须小心，如下例所示：


    `String s1 = "abc";`

    `String s2 = "abc";`

    `String s3 = "abcd".substring(0,3);`

    `boolean b1 = (s1 == "abc");  // 括号非必需，但加上更好`

    `boolean b2 = (s1 == s2);`

    `boolean b3 = (s1 == s3);`


    也许正如你所料，`b1` 和 `b2` 的结果是 `true`，但 `b3` 却是 `false`，尽管 `s3` 被设置为 `"abc"`！问题在于比较运算符不会查看对象内部。它们只检查对象是否是类的*同一个实例*，而不检查它们是否持有相同的值。因此，只要你一直使用
    `"abc"` 这个字符串，编译器就会持续引用同一个字符串字面量实例，一切行为都符合预期。但是，当你创建了一个不同的 `"abc"` 实例时，相等性检查就会失败。这里要吸取的教训是：如果你想比较对象的内容，必须使用
    `equals` 方法。在这个例子中，`s1.equals(s3)` 会返回 `true`。


    对于对象，你还有比较运算符 `instanceof`，它不适用于像 `int` 这样的基本数据类型。例如，`("abc" instanceof String)`
    计算结果为 `true`。请注意，一个对象不仅是其实例化类的实例，也是其所有超类（直至并包括 `Object`，它是所有类的超类）的实例。这很合理：`String`
    也是一个 `Object`，尽管反过来通常不成立。


    使用 `&&` 表示*逻辑与*，`||` 表示*逻辑或*，`!` 表示*逻辑非*，你可以将多个比较连接起来形成更复杂的条件。例如，`((a1 == a2)
    && !(b1 || b2))` 仅在 `a1` 等于 `a2` 且两个 `boolean` 变量 `b1` 和 `b2` 都为 `false` 时计算结果为
    `true`。


    #### 选择结构


    下面的语句根据条件将不同的字符串赋值给字符串变量 `s`：


    `if (a == 1) {`

    `  s = "yes";`

    `  }`

    `else {`

    `  s = "no";`

    `  }`


    你可以省略 `else` 部分。


    你也可以使用条件表达式和单次赋值来达到相同的结果：


    `String s = (a== 1) ? "yes" : "no";`


    你还可以使用以下代码达到相同的结果：


    `switch(a) {`

    `  case 1:`

    `    s = "yes";`

    `    break;`

    `  default:`

    `    s = "no";`

    `    break;`

    `  }`


    显然，`switch` 语句只有在多于两个选择时才有用。例如，与其像下面这样使用一串 `if`/`else` 语句：


    `if (`*`表达式`* `== 3) {...}`

    `else if (`*`表达式`* `== 10) {...}`

    `else {...}`


    不如使用以下方式，既能提高清晰度，又能使代码更简洁：


    `switch (`*`表达式`*`) {`

    `  case (3): ... break;`

    `  case (10): ... break;`

    `  default: ... break;`

    `  }`


    至少，你只需要计算一次表达式。注意，如果你省略了 `break`，执行会继续到下一个 `case`。


    在 Java 7 中，`switch` 变量可以是 `String` 类型。因此，你可以编写如下所示的 `switch` 语句：


    `String yn;`

    `...`

    `switch (`*`yn`*`) {`

    `  case ("y"): /* 处理 yes 的情况 */ break;`

    `  case ("n"): /* 处理 no 的情况 */ break;`

    `  default: /* 有什么不对劲吗？ */ break;`

    `  }`


    #### 迭代


    以下语句会随着 `k` 值的递增（从*初始值*开始）重复执行*语句*：


    `for (int k =` *`初始值`*`; k <` *`限制值`*`; k++) {` *`语句`*`; }`


    其通用格式为：


    `for (`*`初始赋值`*`;` *`结束条件`*`;` *`迭代表达式`*`) {` *`语句`*`; }`


    *初始赋值*仅在进入循环前执行一次。只要*结束条件*满足，*语句*就会被重复执行。由于*结束条件*是在执行*语句*之前检查的，因此如果*结束条件*一开始就为假，则*语句*根本不会执行。*迭代表达式*在每次迭代结束时执行，然后检查*结束条件*以确定是否应重新进入循环进行下一次迭代。


    你可以省略*初始赋值*或*迭代表达式*。如果两者都省略，则应将 `for` 循环替换为 `while` 循环。以下两行是等价的：


    `while (`*`结束条件`*`) { 语句; }`

    `for (;`*`结束条件`*`;) { 语句; }`


    `do-while` 语句是 `while` 循环的一种替代方案：


    `do {` *`语句`*`; } while (`*`结束条件`*`);`


    与 `for` 和 `while` 循环不同，`do-while` 语句在迭代结束时（而非开始时）检查*结束条件*。因此，即使*结束条件*一开始就为假，`do-while`
    循环内的语句也至少会执行一次。


    到目前为止描述的迭代语句与 C 语言中的相同，但 Java 还支持一种 `for` 循环的变体，专门用于简化集合的处理。假设你需要一个方法来拼接一组字符串。它可能看起来像这样：


    `String concatenate(Set<String> ss) {`

    `  String conc = "";`

    **`  Iterator<String> iter = ss.iterator();`**

    **`  while (iter.hasNext()) {`**

    **`    conc += iter.next();`**

    **`    }`**

    `  return conc;`

    `  }`


    使用 Java 的 for-each 变体 `for` 循环，你可以省略迭代器的定义，编写出更清晰的代码：


    `String concatenate(Set<String> ss) {`

    `  String conc = "";`

    **`  for (String s : ss) {`**

    **`    conc += s;`**

    **`    }`**

    `  return conc;`

    `  }`

