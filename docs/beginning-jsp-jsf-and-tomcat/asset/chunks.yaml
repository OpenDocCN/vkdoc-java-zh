    `f:subview` to enclose all actions. Also notice that `f:subview` exists precisely
    to contain actions when they are included via `jsp:include` or any custom actions
    like `c:include`. Its purpose is equivalent to that of a pair of braces in Java:
    it limits the scope of its content. For example, the component IDs defined in
    one subview can be identical to those defined in other subviews of the same page.    With
    `TopMenu.jspx`, you don''t necessarily need to wrap everything inside a subview,
    because the content of that document doesn’t conflict with what is inside `LeftMenu.jspx`
