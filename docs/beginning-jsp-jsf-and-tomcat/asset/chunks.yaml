  trans: '

    ##### variable 指令


    表 4-4 简要描述了所有属性。


    ![图片](img/9781430246237_Tab04-04.jpg)


    `name-given` 提供了 JSP 属性的名称（正如你将在下一节中看到的，它与 EL 变量的名称一致），而 `name-from-attribute`
    则提供了另一个 JSP 属性的名称，该属性包含了你所关注的 JSP 属性的名称。接着，`alias` 提供了标签文件中 Tomcat 与 JSP 属性同步的
    EL 变量的名称。例如，如果你声明：


    `<%@variable alias="ali" name-from-attribute="attrName"%>`


    Tomcat 在继续执行标签文件之前，会使其可以使用名为 `ali` 的页面作用域属性，并将其设置为名为 `attrName` 的属性的值。这种名称重定向使得使用不同命名属性的
    JSP 页面能够使用同一个标签文件。例如，`a.jsp` 可能包含以下代码行：


    `session.setAttribute("greet", "Good morning!");`


    而 `b.jsp` 可能包含：


    `application.setAttribute("novel", "Stranger in a Strange Land");`


    如果 `a.jsp` 包含：


    `pageContext.setAttribute("attrName", "greet");`


    而 `b.jsp` 包含：


    `pageContext.setAttribute("attrName", "novel");`


    那么它们都可以调用包含上述 `variable` 指令的标签文件。该标签文件将拥有一个 `ali` 属性，在第一种情况下其值为 `"Good morning!"`，在第二种情况下其值为
    `"Stranger in a Strange Land"`。


    `scope` 属性指示 Tomcat 何时使用标签文件本地的属性值（或许像 *synchronization* 这样的名称会比 `scope` 更清晰）来创建或更新调用页面中的属性。使用
    `AT_BEGIN` 时，Tomcat 会在标签文件调用某个片段之前或即将退出标签文件时执行此操作；使用 `NESTED` 时，仅在调用某个片段之前执行；使用
    `AT_END` 时，仅在离开标签文件之前执行。此外，使用 `NESTED` 时，Tomcat 会在进入标签文件时保存调用页面属性的值，并在离开时恢复它。但这仅在进入标签文件之前，调用页面中存在具有给定名称的属性时才会发生。


    ### JSTL 与 EL


    许多开发者已经实现了类似的自定义操作，以消除或至少减少对脚本元素的需求。最终，一个名为 JSTL 的新有效标准诞生了。


    然而，如果没有表达式语言（EL），JSTL 几乎没什么用。EL 允许你以紧凑高效的方式访问和操作对象，并且可以在动作体内部使用。我将首先向你介绍 EL，这样你就能更好地理解
    JSTL 的示例。


    但首先，你需要从 [`http://jstl.java.net/download.html`](http://jstl.java.net/download.html)
    下载两个库。如果你点击 "`JSTL API`" 和 "`JSTL Implementation`" 这两个链接，你将进入两个页面，从中可以分别下载 `javax.servlet.jsp.jstl-api-1.2.1.jar`
    和 `javax.servlet.jsp.jstl-1.2.1.jar`（或者与你阅读本书时当前版本对应的等效文件）。


    将它们复制到 `%CATALINA_HOME%\lib\` 目录下，然后重启 Tomcat。


    #### JSP 表达式语言


    EL 是在 JSP 2.0 中引入的，作为脚本元素的替代方案。你可以在模板文本中使用 EL 表达式，也可以在指定为能够接受运行时表达式的动作属性中使用。你可以在
    [`http://java.sun.com/products/jsp/syntax/2.0/syntaxref207.html#1010522`](http://java.sun.com/products/jsp/syntax/2.0/syntaxref207.html#1010522)
    找到一份很好的参考资料。


    ##### EL 表达式


    EL 支持两种表示形式：`${expr}` 和 `#{expr}`。为了解释何时可以使用或应该使用它们，我必须先澄清左值（lvalue）和右值（rvalue）之间的区别。


    *l* 代表 *left*（左），*r* 代表 *right*（右）。这些值指的是，在大多数计算机语言中，被赋值的值位于赋值语句的右侧，而要赋给它的值位于左侧。例如，Java
    语句：


    `ka[k] = j*3;`


    意味着 `j*3` 的计算结果（一个右值）将被赋值给 `ka[k]` 的计算结果（一个左值）。显然，左值必须是对可以赋值的东西（变量或对象的某个属性）的引用，而右值则没有这种限制。


    假设你有一个包含表单的页面。如果你能*直接在表单的输入元素中*指定用户输入应存储到的引用，那岂不是很好？例如，可以指定类似 `<input id="firstName"
    value="`*`variableName`*`">` 这样的内容，其中 *`variableName`* 指定了你希望存储用户输入的位置。然后，当表单提交时，应该有一种机制自动获取用户的输入并将其存储到你指定的位置。也许你还可以为
    `input` 元素定义一个新属性来提供验证方法。这样，在 `input` 元素内部，你就已经拥有了接受用户输入、验证并存储它所需的一切。


    这听起来很棒，但如果你将 `input` 元素的 `value` 属性设置为 `${formBean.firstName}`，这会被计算为一个右值。`formBean`
    的 `firstName` 属性的值被赋给了 `input` 元素的 `value` 属性，仅此而已。你需要一种*延迟*计算 `formBean.firstName`
    的方法，并在真正需要时将其用作*左值*——也就是说，在处理提交的表单时。


    你可以通过将 EL 花括号前的 `$` 替换为 `#` 来实现这一点。`#` 告诉 Tomcat 延迟计算，并根据上下文将其结果用作左值或右值。带有美元符号的
    EL 表达式会像其他所有内容一样被计算。在其他任何方面，这两种表示形式的解析和计算都是相同的。当我们讨论 JSF 时，你将使用 `#` 表示形式。现在，你可以先使用
    `$` 表示形式来学习 EL。

    '
- fmt: '### Using EL Expressions


    The `expr` in `${expr}` can contain literals, operators, and references to objects
    and methods. [Table 4-5](#Chapter04.html#tab_4_5) shows some examples and their
    results.


    ![Image](images/9781430246237_Tab04-05.jpg)

    ![Image](images/9781430246237_Tab04-05a.jpg)


    The operators behave in general like in Java, but with one important difference:
    the equality operator (`==`) applied to string variables compares their contents,
    not whether the variables refer to the same instance of a string. That is, it
    behaves like Java’s `String.equals()` method.


    In addition to EL operators identical to Java operators, you also have most of
    their literal equivalents: `not` for `!`, `div` for `/`, `mod` for `%`, `lt` for
    `<`, `gt` for `>`, `le` for `<=`, `ge` for `>=`, `eq` for `==`, `ne` for `!=`,
    `and` for `&&`, and `or` for `||`. You also have the unary operator `empty`, to
    be used as shown in one of the examples in [Table 4-2](#Chapter04.html#tab_4_2).


    The EL operators `''.''` (i.e., the dot) and `[]` (i.e., indexing) are more powerful
    and forgiving than the corresponding Java operators.


    When applied to a bean, as in `${myBean.prop}`, the dot operator is interpreted
    as an indication that the value of the property should be returned, as if you’d
    written `myBean.getProp()` in a scripting element. As a result, for example, the
    line of code


    ```

    ${pageContext.servletContext.servletContextName}

    ```


    is equivalent to this:


    ```

    <%=pageContext.getServletContext().getServletContextName()%>

    ```


    Furthermore, `${first.second.third}`, equivalent to `<%=first.getSecond().getThird()%>`,
    returns `null` when `first.second` evaluates to `null`, although in the expression,
    we try to dereference it with `.third`. The JSP scripting equivalent would throw
    a `NullPointerException`. For this to work, all classes must implement the getter
    methods of properly formed Java beans.


    Array indexing allows you to try to access an element that doesn’t exist, in which
    case it simply evaluates to `null`. For example, if you have an array of ten elements,
    the EL expression `${myArray[999]}` returns `null` instead of throwing an `ArrayIndexOutOfBoundsException`,
    as Java would have done. It is not as bad as in the plain old “C” language, in
    which an index out of bounds would have returned the value it found in memory.
    With EL, you can check for `null`. And in general you should do so, because you
    cannot rely on an exception being thrown, as it would be in Java.


    You can use both the dot and indexing operator to access maps. For example, the
    following two EL expressions both return the value associated with the key named
    `myKey`:


    ```

    ${myMap.myKey}

    ${myMap["myKey"]}

    ```


    There is a tiny difference, though: you cannot use the dot operator if the name
    of the key contains a character that confuses EL. For example, `${header["user-agent"]}`
    is OK, but `${header.user-agent}` doesn’t work, because the dash between `user`
    and `agent` in the second expression is interpreted as a minus sign. Unless you
    have a variable named `agent`, both `header.user` and `agent` evaluate to `null`
    and, according to the EL specification document, `${null - null}` evaluates to
    zero. Therefore, the second expression would return a zero. You would encounter
    a different, but potentially more serious, problem if you had a map key containing
    a dot. For example, you could use `${param["my.par"]}` without problems, but `${param.my.par}`
    would probably result in a `null` or, almost certainly, in something other than
    what you are looking for. This would be bad in any case, because `null` is a possible
    valid outcome. I suggest you use the bracketed form in all occasions and simply
    forget this issue.


    Similar to JSP, EL contains implicit objects, which you find listed in [Table
    4-6](#Chapter04.html#tab_4_6).


    ![Image](images/9781430246237_Tab04-06.jpg)


    ![Image](images/square.jpg) **Caution** You *cannot* use JSP scripting variables
    within EL expressions.


    You’ve probably noticed that EL doesn’t include any way of declaring variables.
    Within EL expressions, you can use variables set with the `c:set` JSTL core action
    (which I will describe in the next section) or scoped attributes. For example,
    all of the following definitions let you use the EL expression `${xyz}`:


    ```

    <c:set var="xyz" value="33"/>

    <% session.setAttribute("xyz", "44"); %>

    <% pageContext.setAttribute("xyz", "22"); %>

    ```


    However, you have to pay attention to scope precedence. The variable set with
    `c:set` and the attribute in `pageContext` *are the same variable*. That is, `c:set`
    defines an attribute in the page context. The attribute in `sessionContext` is
    a different variable, and you cannot access it with `${xyz}` because it is “hidden”
    behind the attribute with the same name in the page context. To access a session
    attribute, you have to prefix its name with `sessionScope`, as in `${sessionScope.xyz}`.
    If you don’t specify a scope, EL looks first in the page, then in the request,
    then in the session, and finally in the application scope.


    ![Image](images/square.jpg) **Caution** You cannot nest EL expressions. Expressions
    such as `${expr1[${expr2}]}` are illegal.


    You can make composite expressions consisting of several EL expressions and additional
    text, as in the following example:


    ```

    <c:set var="varName" value="Welcome ${firstName} ${lastName}!"/>

    ```


    However, you cannot mix the `${}` and `#{}` forms.


    ### JSP Standard Tag Library


    JSTL consists of five tag libraries, as listed in [Table 4-7](#Chapter04.html#tab_4_7).
    If you are wondering, i18n stands for *internationalization*, abbreviated by replacing
    the eighteen letters in the middle with the number 18.


    ![Image](images/9781430246237_Tab04-07.jpg)

    ![Image](images/9781430246237_Tab04-07a.jpg)


    [Table 4-8](#Chapter04.html#tab_4_8) lists all the tags defined in the five libraries.


    ![Image](images/9781430246237_Tab04-08.jpg)


    As you have already seen in a couple of examples, to use the JSTL libraries in
    JSP pages, you must declare them in `taglib` directives as follows:


    ```

    <%@taglib prefix="c" uri="http://java.sun.com/jsp/jstl/core"%>

    <%@taglib prefix="fmt" uri="http://java.sun.com/jsp/jstl/fmt"%>

    <%@taglib prefix="fn" uri="http://java.sun.com/jsp/jstl/functions"%>

    <%@taglib prefix="sql" uri="http://java.sun.com/jsp/jstl/sql"%>

    <%@taglib prefix="x" uri="http://java.sun.com/jsp/jstl/xml"%>

    ```


    I will describe JSTL-XML in [Chapter 5](#Chapter05.html), where I will talk about
    XML, and JSTL-SQL in [Chapter 6](#Chapter06.html), dedicated to database access
    from JSP. In the following sections of this chapter, I will describe JSTL-core
    and JSTL-i18n. I will not talk about the functions because they are pretty self-explanatory.


    ### The Core Library


    To explain some of the most used actions, I will go back to the example `req_params.jsp`,
    of [Chapter 1](#Chapter01.html) ([Listing 1-6](#Chapter01.html#list_1_6)) and
    replace its scriptlets with JSTL actions. [Listing 4-16](#Chapter04.html#list_4_16)
    shows you how you do it.'
