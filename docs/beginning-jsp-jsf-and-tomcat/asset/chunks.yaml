    ### 什么是 JSP？


    JSP 是一种让你能够为网页添加动态内容的技术。如果没有 JSP，要更新纯静态 HTML 页面的外观或内容，你总是需要手动完成。即使你只是想更改一个日期或一张图片，也必须编辑
    HTML 文件并输入你的修改。没有人会替你完成这些工作，而使用 JSP，你可以让内容依赖于多种因素，包括一天中的时间、用户提供的信息、用户与你的网站交互的历史记录，甚至用户的浏览器类型。这种能力对于提供在线服务至关重要，你可以根据查看者的偏好和需求，为每个提出请求的查看者定制响应。提供有意义的在线服务的一个关键方面是系统能够*记住*与服务及其用户相关的数据。这就是数据库在动态网页中扮演重要角色的原因。但让我们一步一步来。


    **历史**


    Sun Microsystems 于 1999 年推出了 JSP。开发人员很快意识到额外的标签会很有用，于是 JSP 标准标签库（JSTL）应运而生。JSTL
    是一个自定义标签库的集合，它封装了许多 JSP 标准应用程序的功能，从而消除了重复并使应用程序更加紧凑。与 JSTL 一起出现的还有 JSP 表达式语言（EL）。


    2003 年，随着 JSP 2.0 的推出，EL 被纳入 JSP 规范，使其不仅可用于 JSTL（如先前版本那样），还可用于自定义组件和模板文本。此外，JSP
    2.0 使得创建自定义标签文件成为可能，从而完善了该语言的可扩展性。


    在 JSP 发展的同时，多个用于开发 Web 应用程序的框架也相继问世。2004 年，其中一个框架，JavaServer Faces（JSF），专注于构建用户界面（UI），并默认使用
    JSP 作为底层脚本语言。它提供了一个 API、JSP 自定义标签库和一种表达式语言。


    成立于 1998 年的 Java 社区流程（JCP）于 2006 年 5 月发布了名为 *JavaServer Pages 2.1* 的 Java 规范请求（JSR）245，该请求有效地统一了
    JSP 和 JSF 技术。特别是，JSP 2.1 包含了一个统一 EL（UEL），它合并了 JSP 2.0 和 JSF 1.2（其本身由 JSR 252 规定）中定义的
    EL 的两个版本。Sun Microsystems 在其 Java 平台企业版 5（Java EE 5）中包含了 JSP 2.1，该版本于 2006 年 5
    月作为 JSR 244 最终确定。


    Java 的最新版本是 7（在 JSR 342 中规定，于 2011 年 7 月发布）。它包含 JSP 2.2、Servlets 3.1（JSR 340）、EL
    3.0（JSR 341）和 JSF 2.2（JSR 344）。版本 8 预计在 2013 年中发布。在撰写本文时，Java 7 仅作为 JSE（Java 标准版）平台的一部分提供。在
    JEE（Java 企业版）平台上发布的最新 Java 版本是 6（更新 32）。


    Tomcat 的最新版本（7.0）支持 Servlets 3.0 和 JSF 2.1.7。


    #### 查看 JSP 页面


    使用 JSP，网页实际上并不存在于服务器上。正如你在图 1-8 中所见，服务器在响应每个请求时都会重新创建它。


    ![图片](img/9781430246237_Fig01-08.jpg)


    ***图 1-8.** 查看 JSP 页面*


    以下步骤解释了 Web 服务器如何创建网页：


    > 1.  与普通页面一样，你的浏览器向 Web 服务器发送一个 HTTP 请求。这在 JSP 中不会改变，尽管 URL 可能以 `.jsp` 结尾，而不是
    `.html` 或 `.htm`。

    > 2.  Web 服务器不是普通的服务器，而是一个 Java 服务器，具有识别和处理 Java Servlet 所需的扩展。Web 服务器识别出 HTTP
    请求是针对 JSP 页面的，并将其转发给 JSP 引擎。

    > 3.  JSP 引擎从磁盘加载 JSP 页面，并将其转换为一个 Java Servlet。从这一点开始，这个 Servlet 与任何其他直接用 Java（而非
    JSP）开发的 Servlet 没有区别，尽管 JSP Servlet 自动生成的 Java 代码并不总是易于阅读，并且你永远不应该手动修改它。

    > 4.  JSP 引擎将 Servlet 编译成一个可执行的类，并将原始请求转发给 Web 服务器的另一部分，称为 *Servlet 引擎*。请注意，只有当
    JSP 引擎发现 JSP 页面自上次请求以来发生了更改时，它才会将 JSP 页面转换为 Java 并重新编译 Servlet。这使得该过程比其他脚本语言（如
    PHP）更高效，因此也更快。

    > 5.  Servlet 引擎加载 Servlet 类并执行它。在执行过程中，Servlet 以 HTML 格式生成输出，Servlet 引擎将其在 HTTP
    响应中传递给 Web 服务器。

    > 6.  Web 服务器将 HTTP 响应转发给你的浏览器。

    > 7.  你的 Web 浏览器处理 HTTP 响应中动态生成的 HTML 页面，就像处理静态页面一样。实际上，静态和动态网页的格式是相同的。


    你可能会问：“如果服务器只在你自上次请求后更新了 JSP 源文件时才进行转换和编译，那你为什么说使用 JSP，页面是为每个请求重新创建的？”


    到达你浏览器的是 Servlet 生成的输出（即转换和编译后的 JSP 页面），而不是 JSP 页面本身。同一个 Servlet 会根据 HTTP 请求的参数和其他因素产生不同的输出。例如，假设你正在浏览一家在线商店提供的产品。当你点击某个产品的图片时，你的浏览器会生成一个带有产品代码作为参数的
    HTTP 请求。结果，Servlet 会生成一个包含该产品描述的 HTML 页面。服务器不需要为每个产品代码重新编译 Servlet。


    Servlet 查询包含所有产品详细信息的数据库，获取你感兴趣产品的描述，并用这些数据格式化一个 HTML 页面。这就是动态 HTML 的全部意义所在！


    纯 HTML 无法查询数据库，但 Java 可以，而 JSP 为你提供了在 HTML 页面中包含 Java 代码片段的方法。

