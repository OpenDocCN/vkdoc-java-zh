    ##### 动作控制器和动作监听器


    到目前为止，你只看到了 `h:commandButton` 的 `action` 属性被设置为固定字符串的示例。但你也可以将其设置为 bean 的方法。如果你这样做，当
    JSF 在服务器上处理请求时到达调用应用程序阶段时，它会执行该方法，并使用该方法返回的值来决定接下来显示哪个页面。这样，动作的目标页面是在执行时定义的。


    如果这听起来太复杂，让我们看一个例子来澄清一下。我们从复制 `templ` 应用程序并将其重命名为 `templa` 开始。我现在谈论动作控制器和监听器，是因为我已经向你展示了我们可以使用的
    `templ` 应用程序。


    我想将图 7-9 中显示的两个按钮 `Page 2` 和 `Page 3` 替换为一个在页面之间交替的按钮。为此，我需要添加清单 7-31 中显示的 Java
    类。


    ***清单 7-31.** Action.java*


    `import javax.faces.bean.ManagedBean;` `import javax.faces.bean.SessionScoped;`
    `@ManagedBean(name="actionBean")` `@SessionScoped` `public class Action {` `  int
    n = 3;` `  public int getN() { return 5 - n; }` `  public String goThere() {`
    `    n = 5 - n;` `    return "go" + n;` `    }` `  }`


    请注意，每次执行 `goThere` 时，`n` 都会在 2 和 3 之间变化，因此该方法交替返回 "go2" 和 "go3"。还要注意，当 `n` 为 3
    时，`getN` 返回 2，当 `n` 为 2 时，返回 3。


    我对 `templ` 所做的唯一其他更改是将其转换为 `templa`，即将 `first.xhtml`（清单 7-24）的以下两行


    `<h:commandButton action="go2" value="Page 2"/>` `<h:commandButton action="go3"
    value="Page 3"/>`


    替换为


    `<h:commandButton action="#{actionBean.goThere}" value="Page #{actionBean.n}"/>`


    如果你认为这是一个愚蠢的应用程序，我完全同意你的看法。但我最不想做的就是给你一些例子，在这些例子中，你应该学习的机制被埋没在现实但不必要的复杂性中。请注意，通过将决定下一页面的决策权移到动作控制器
    bean，你实际上是将业务逻辑移出了视图，从而获得了灵活性和可维护性。


    话虽如此，我仍然对这个 `goThere` 方法的工作方式不满意。我遇到的问题是，该方法不仅仅选择下一个页面。它还有修改 `n` 的副作用。有经验的程序员都害怕副作用，因为在复杂的应用程序中，它们可能导致非常难以追踪的错误。你想要编写透明的程序，其中没有任何事情“在你背后”发生。


    正确的方法是将现在的副作用移到它自己的方法中。查看清单 7-32 以获得 `Action.java` 的改进版本。


    ***清单 7-32.** Action.java（最终版）*


    `import javax.faces.bean.ManagedBean;` `import javax.faces.bean.SessionScoped;`
    `import javax.faces.event.ActionEvent;` `@ManagedBean(name="actionBean")` `@SessionScoped`
    `public class Action {` `  int n = 3;` `  public int getN() { return 5 - n; }`
    `  public String goThere() { return "go" + n; }` `  public void swapPages(ActionEvent
    event) { n = 5 - n; }` `  }`


    显然，你还必须更新 `first.xhtml`。你需要做的就是将 `h:commandButton` 元素更新如下：


    `<h:commandButton action="#{actionBean.goThere}" value="Page #{actionBean.n}"`
    `    actionListener="#{actionBean.swapPages}"` `    />`


    在调用应用程序阶段，JSF 首先执行动作监听器，然后执行动作控制器。`n` 的值在渲染响应阶段从 bean 中获取。这很有效。不过，有时你可能希望 JSF
    在收到请求后尽快执行动作监听器，在其他事情发生之前。在这种情况下，你可以向带有 `actionListener` 的组件添加属性 `immediate="true"`，这会强制动作监听器已经在应用请求值阶段执行。


    在下一章中，你将看到动作控制在 `eshop` 的 JSF 版本中是如何工作的，这是一个更复杂的应用程序。


    #### `composite` 库


    JSF 基于用户界面组件，但很长一段时间以来，创建新组件或将现有组件组合成一个新组件都很困难。JSF 在 2.0 版本中引入了 `composite` 库，以使这些任务更容易。


    表 7-5 列出了 `composite` 库的所有标签。`interface` 和 `implementation` 这两个标签很特殊，因为它们是其他标签的容器。


    ![Image](img/9781430246237_Tab07-05.jpg)


    从概念上讲，要定义一个新组件，你需要经历以下步骤：


    > *   定义其命名空间（即它所在的位置）。

    > *   指定其功能（即它做什么）。

    > *   定义如何使用它（即其接口）。

    > *   设计如何编码它（即其实现）。


    ##### 一些示例


    要编写第一个示例，让我们按照我在上一节末尾列出的四点进行。


    > *   定义一个命名空间。我选择了 `gz`。

    > *   指定其功能。该组件应该用参数化的收件人组成一条问候消息。

    > *   定义如何使用它。只需调用它并传递一个属性来传递收件人。

    > *   设计如何编码它。很简单。一个 `h:outputText` 就可以了。


    新组件的代码如清单 7-33 所示。要测试它，请将本章软件包中的 `composite` 文件夹复制到 Tomcat 的 `webapps` 文件夹，然后在浏览器中键入
    [`http://localhost:8080/composite`](http://localhost:8080/composite)。


    ***清单 7-33.** hello.xhtml*


    `<?xml version="1.0" encoding="UTF-8"?>` `<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML
    1.0 Transitional//EN"` `    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd"`
    `    >` `<html`   `      >` `<h:head><title>Example of a composite component</title></h:head>`
    `<h:body>` `  <composite:interface>` `    <composite:attribute name="x"/>` `    </composite:interface>`
    `  <composite:implementation>` `    <h:outputText value="Hello, #{cc.attrs.x}!"/>`
    `    </composite:implementation>` `  </h:body>` `</html>`


    毫不奇怪，对于这样一个简单的组件，代码也很简单。但它告诉了你很多关于使用 `composite` 库开发组件的信息。


    首先，在 `h:body` 内部，你找到两个元素，一个 `composite:interface` 和一个 `composite:implementation`。在前者内部，你定义了名为
    `x` 的属性，在后者内部，你定义了组件的逻辑。


    要从实现中访问该属性，你使用表达式 `#{cc.attrs.x)`。


    清单 7-34 向你展示了如何使用新组件，图 7-11 是页面在浏览器中的显示方式。


    ***清单 7-34.** comp.xhtml*


    `<?xml version="1.0" encoding="UTF-8"?>` `<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML
    1.0 Transitional//EN"` `    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd"`
    `    >` `<html`   `      >` `<h:head><title>Example of a composite component</title></h:head>`
    `<h:body>` **`  <gz:hello x="wherever you are"/>`** `  </h:body>` `</html>`


    ![Image](img/9781430246237_Fig07-11.jpg)


    ***图 7-11.** composite*


    你在 `comp.xhtml` 中注意到什么不寻常的地方了吗？你没有单独声明 JSF composite 库和你自定义组件的命名空间，而是声明了一个单一的命名空间
    `composite/gz`。为此，你需要在应用程序的根目录中创建一个名为 `resources` 的文件夹；在 `resources` 内部创建一个文件夹（在示例中，名为
    `gz`）；并将你的自定义组件放在那里。组件的名称（例如，`hello`）是通过移除扩展名从组件文件的名称（例如，`hello.xhtml`）获得的。


    使用相同的字符串作为前缀和命名 `resources` 内部的文件夹是一种既定的做法，我建议你遵循它，但这两个字符串可以不同。


    请注意，如果你在 `interface` 体中放置元素，你需要定义一个相应的 `implementation`。但你可以在 `implementation`
    中使用空的 `interface` 来放置代码，如下所示：


    `  <composite:interface/>` `  <composite:implementation>` `    <h:outputText value="Hello,
    World!"/>` `    </composite:implementation>`


    这仅仅意味着你的新组件将没有任何要设置的属性。


    要在复合组件中包含一个输入组件，请像在 `hello.xhtml` 中对输出组件所做的那样做。事实上，如果你将 hello.xhtml 中的行 `    <h:outputText
    value="Hello, #{cc.attrs.x}!"/>` 替换为 `    <h:inputText value="Hello, #{cc.attrs.x}!"/>`，你将看到图
    7-12 中显示的页面，但请注意，这不是一个工作页面。它只是为了向你展示如何使用 `composite:attribute`。


    ![Image](img/9781430246237_Fig07-12.jpg)


    ***图 7-12.** 带有输入元素的 composite*


    你也可以使用 `composite:attribute` 来设置 `h:commandButton` 和 `h:commandLink` 的 action
    属性。例如，如果你想构建一个名为 `flip` 的复合组件，围绕你在几页前在 `templa` 中使用的 `h:commandButton`，`flip.xhtml`
    的主体将如下所示：


    `<composite:interface>` `  <composite:attribute name="act" targets="myB" method-signature="java.lang.String
    action()"/>` `  </composite:interface>` `<composite:implementation>` `  <h:commandButton
    id="myB" action="#{cc.attrs.act}" value="Page #{actionBean.n}"` `      actionListener="#{actionBean.swapPages}"`
    `      />` `  </composite:implementation>`


    然后，你将像这样使用新的复合组件：


    `<gz:flip act="#{actionBean.goThere}"/>`


    与之前的示例一样，你使用表达式 `#{cc.attrs.act}` 从实现中访问在 `interface` 中声明的 `act` 属性的值。此外，与之前示例中发生的情况不同，你还需要一个从
    `interface` 到 `implementation` 的反向引用。这是因为 JSF 必须能够将在 `gz:flip` 中设置的方法连接到该方法所针对的
    `h:commandButton` 组件。事实上，如果 `implementation` 中有更多组件，你可以通过用空格分隔它们的标识符写在 `targets`
    属性中，将同一个方法连接到多个组件（这就是为什么属性的名称是 `targets`，复数，而不是 target）。


    `method-signature` 的值指定 `act` 的值必须求值为一个方法，并定义其签名。这意味着 `<gz:flip act="go2"/>` 将不起作用。你必须将
    `method-signature="java.lang.String action()"` 替换为 `type="java.lang.String"`。这两个属性是互斥的，如果你省略了它们，JSF
    会假定 `type="java.lang.Object"`。


    既然你知道如何使 `h:commandButton` 的 `action` 属性可见，你可能会问自己如何也暴露其 `actionListener` 属性。如下所示：


    `<composite:interface>` `  <composite:attribute name="act" targets="myB" method-signature="java.lang.String
    action()"/>` `  <composite:actionSource name="myB"/>` `  </composite:interface>`
    `<composite:implementation>` `  <h:commandButton id="myB" action="#{cc.attrs.act}"
    value="Page #{actionBean.n}"/>` `  </composite:implementation>`


    然后，你将像这样使用新的复合组件：


    `<gz:flip act="#{actionBean.goThere}">` `  <f:actionListener for="myB" binding="#{actionBean.swapPages}"/>`
    `  </gz:flip>`


    元素 `composite:actionSource` 暴露了 `h:commandButton` 组件，而 `f:actionListener` 将适当的动作监听器连接到它。请注意，`actionListener`
    属性已从 `h:commandButton` 中消失。


    关于 `composite:facet` 和 `composite:renderFacet` 的几句话。在关于 `core` 库的部分开始时，我提到 facet
    是一种让组件对代码块执行特殊操作的方法。现在，假设你想在你正在开发的复合组件中的多个位置包含一个特殊的单词，并且使用该组件的页面应该能够定义该单词。你可以这样做：


    `<composite:interface>` `  <composite:facet name="aWord"/>` `  </composite:interface>`
    `<composite:implementation>` `  <!-- ...some code... -->` `  <composite:renderFacet
    name="aWord"/>   <!-- say it here -->` `  <!-- ...some code... -->` `  <composite:renderFacet
    name="aWord"/>   <!-- and here -->` `  <!-- ...some code... -->` `  <composite:renderFacet
    name="aWord"/>   <!-- and again here -->` `  </composite:implementation>`


    这是你将如何使用该组件：


    `<gz:myFacetedComponent>` `  <f:facet name="aWord"><h:outputText value="#@%!"/></f:facet>`
    `  </gz:myFacetedComponent>`


    JSF 将获取使用页面中定义的 `facet` 元素的主体，并将其插入到你调用 `composite:renderFacet` 的地方。如果你喜欢将这些组件*作为
    facet* 插入，你需要使用 `composite:insertFacet` 代替。


    通常，JSF 会忽略自定义组件主体内的内容，如下所示：


    `<gz:myComponent>` `  <h:outputText value="#@%! "/>` `  <h:inputText value="#{aBean.whatever}"/>`
    `  </gz:myComponent>`


    如果你想将其包含在你的复合组件中，你可以使用 `composite:insertChildren/>` 来实现。


    ### 总结


    在本章中，我们涵盖了很多内容。我通过 `simplef`、`simplefx` 和 `simpleh` 应用程序让你初步了解了 JSF。然后，在描述了 JSF
    生命周期之后，我继续讨论了所有四个 JSF 标签库：`html`、`core`、`facelet` 和 `composite`。


    对于每个库，我列出了它们的标签，并通过简单的示例向你展示了如何使用最常见或最重要的标签。


    在下一章中，我们将回到 `eshop`，看看如何将其转换为 JSF 应用程序。


