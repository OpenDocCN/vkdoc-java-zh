    #### Java 测试


    要测试 Java 安装是否成功，可以使用清单 1-1 中所示的小型应用程序。


    ***清单 1-1.** Exec_http.java*


    `/* Exec_http.java - 启动一个网页`

    ` *`

    ` * 用法: Exec_http URL [arg1 [arg2 [...]]]`

    ` * 其中 URL 不包含 "http://"`

    ` *`

    ` */`

    `import java.io.*;`

    `import java.net.*;`

    `class Exec_http {`

    `  public static void main(String[] vargs)`

    `      throws java.net.MalformedURLException ,java.io.IOException`

    `      {`

    `    String  dest = "http://";`


    `    if (vargs.length <= 0) {`

    `      System.out.println("Usage: Exec_http page [args]");`

    `      System.exit(1);`

    `      }`

    `    else {`

    `      dest += vargs[0];`

    `      for (int k = 1; k < vargs.length; k++) {`

    `        dest += ((k == 1) ? "?" : "&") + vargs[k];`

    `        }`

    `      }`

    `    System.out.println(dest);`

    `    URL          url = new URL(dest);`

    `    Object       obj = url.getContent();`

    `    InputStream  resp = (InputStream)obj;`

    `    byte[]       b = new byte[256];`

    `    int          n = resp.read(b);`

    `    while (n != -1) {`

    `      System.out.print(new String(b, 0, n));`

    `      n = resp.read(b);`

    `      }`

    `    }`

    `  }`


    该程序允许你从命令行打开一个网页。请注意，本书中描述的所有代码都可以从 Apress 网站 ([`http://www.apress.com/9781430246237`](http://www.apress.com/9781430246237)`)`
    下载。你无需重新输入。你可以在与相应章节同名的文件夹中找到这些示例。我将使用字符串 `%SW_HOME%` 来指代本书配套软件包的根目录。


    将文件 `%SW_HOME%\01 Getting Started\java\Exec_http.java` 复制到一个工作目录中。为简单起见，我使用桌面；但就我而言，这样做是合理的，因为我专门使用这台计算机来开发本书中使用的示例。


    通过单击 `开始` 按钮并选择 `程序` ![Image](img/U001.jpg) `附件` ![Image](img/U001.jpg) `命令提示符`
    来打开一个命令行窗口。然后，切换到你的工作目录后，输入 “`javac Exec_http.java`” 来编译该应用程序。它应该会直接返回提示符，不输出任何信息。如果出现这种情况，说明你已经正确更新了
    `Path` 系统变量。如果你想了解更多关于 `javac` 编译器的行为，请在 `javac` 和文件名之间输入 `–verbose`。


    你会在工作目录中看到一个名为 `Exec_http.class` 的文件。


    现在，要运行该应用程序，请输入 “`java Exec_http`”，后面跟上你想要显示的页面的 URL。任何 URL 都可以，但请记住，命令行附件无法理解
    HTML。因此，如果你显示任何商业页面，你会看到一长串文本填满窗口。


    为了测试该应用程序，我在我的一个 Web 服务器上放置了一个只有一行的文本文件。图 1-4 显示了运行结果。


    ![Image](img/9781430246237_Fig01-04.jpg)


    ***图 1-4.** 测试 Java*


    欢迎你使用 `hello.txt` 进行测试。希望我能记得让它保持在线！


    ### 安装 Tomcat


    这是 Java Web 服务器，它是一个 Servlet 容器，允许你运行 JSP。如果你已经安装了旧版本的 Tomcat，在安装新版本之前，你应该先将其卸载。


    Tomcat 会监听你电脑的三个通信端口（8005、8009 和 8080）。在安装 Tomcat 之前，你应该检查是否已有已安装的应用程序正在监听这些端口中的一个或多个。为此，请打开一个
    DOS 窗口并输入命令 `netstat /a`。它将显示一个活动连接的表格形式列表。表格的第二列看起来像这样：


    `本地地址`

    `0.0.0.0:135`

    `0.0.0.0:445`

    `0.0.0.0:3306`


    端口号是冒号后面的数字。如果你看到 Tomcat 使用的一个或多个端口，那么在安装 Tomcat 后，你将需要更改它监听的端口，如第 10 章所述。在那里，你还会了解到这三个端口的用途。


    以下是正确安装 Tomcat 7 的方法：

    '
- fmt: "> 1.  Go to the URL [`http://tomcat.apache.org/download-70.cgi`](http://tomcat.apache.org/download-70.cgi).\
    \ Immediately below the second heading (“`Quick Navigation`”), you will see four\
    \ links: `KEYS`, `7.0.26`, `Browse`, and `Archives`.\n> 2.  By clicking on `7.0.26`,\
    \ you will be taken toward the bottom of the same page to a heading with the same\
    \ version number. Below the version heading, you will see the subheading “`Core`”.\
    \ Below that, immediately above the next subheading, you will see three links\
    \ arranged as follows: `32-bit/64-bit Windows Service Installer` (`pgp`, `md5`).\n\
    > 3.  Click on `32-bit/64-bit Windows Service Installer` to download the file\
    \ `apache-tomcat-7.0.26.exe` (8.2 MB).\n> 4.  Before launching the installer file,\
    \ you have to check its integrity. To do so, you need a small utility to calculate\
    \ its checksum. There are several freely available on the Internet. I downloaded\
