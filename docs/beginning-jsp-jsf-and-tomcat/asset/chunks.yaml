- fmt: "### Using JSP to Validate XML against a DTD\n\nTo validate an XML file against\
    \ a DTD, you must first associate the XML document with the DTD by adding a `DOCTYPE`\
    \ declaration to the XML file. The declaration, which you should insert immediately\
    \ after the `<?xml...?>` line, is as follows:\n\n`<!DOCTYPE starfleet SYSTEM \"\
    http://localhost:8080/xml-validate/dtd/starfleet.dtd\">`\n\nNotice that the file\
    \ `starfleet.dtd` doesn’t need to be in the `WEB-INF\\dtds\\` folder. We had to\
    \ place the DTDs there because Tomcat expected them there, but if you do the validation\
    \ yourself, Tomcat is out of the loop. You can therefore place your DTDs wherever\
    \ you like.\n\nThe next step is the definition of an exception handler. This is\
    \ a Java object of a class that extends `org.xml.sax.helpers.DefaultHandler` and\
    \ replaces three of its methods: `warning`, `error`, and `fatalError`. Once the\
    \ handler is registered with the parser, the parser executes the appropriate method\
    \ upon encountering a validation problem. The default behavior of `DefaultHandler`\
    \ is to do nothing. Therefore, you need to overwrite the methods in order to report\
    \ the errors. [Listing 5-4](#Chapter05.html#list_5_4) shows you the code of a\
    \ possible handler. It’s really up to you to decide what level of reporting you’d\
    \ like to have, but I have decided to report all validation problems and interrupt\
    \ the parsing.\n\n**Listing 5-4.** `ParsingExceptionHandler.java`\n\n```\npackage\
    \ myPkg;\nimport org.xml.sax.helpers.DefaultHandler;\nimport org.xml.sax.SAXParseException;\n\
    public class ParsingExceptionHandler extends DefaultHandler {\n  public SAXParseException\
    \ parsingException = null;\n  public String errorLevel = null;\n  public void\
    \ warning(SAXParseException e) {\n    errorLevel = \"Warning\";\n    parsingException\
    \ = e;\n    }\n  public void error(SAXParseException e) {\n    errorLevel = \"\
    Error\";\n    parsingException = e;\n    }\n  public void fatalError(SAXParseException\
    \ e) {\n    errorLevel = \"Fatal error\";\n    parsingException = e;\n    }\n\
    \  }\n```\n\nAs you can see, it’s pretty simple. You define two public attributes:\
    \ one to save the exception generated by the parser, and one to save the error\
    \ level. You then update the two attributes in each one of the three methods.\
    \ After each parsing, you can check one of the attributes for `null` in order\
    \ to determine whether the parsing succeeded or not. Compile this module from\
    \ the DOS command line with `javac ParsingExceptionHandler.java` and copy the\
    \ resulting `.class` file into the `WEB-INF\\classes\\myPkg` folder of your application\
    \ directory.\n\nYou are now ready to perform the validation. [Listing 5-5](#Chapter05.html#list_5_5)\
    \ shows you a JSP page that implements a SAX parser.\n\n**Listing 5-5.** `starfleet_validate_sax.jsp`\
    \ (first cut)\n\n```\n<%@page language=\"java\" contentType=\"text/html\"%>\n\
    <%@page import=\"javax.xml.parsers.SAXParserFactory\"%>\n<%@page import=\"javax.xml.parsers.SAXParser\"\
    %>\n<%@page import=\"org.xml.sax.InputSource\"%>\n<%@page import=\"myPkg.ParsingExceptionHandler\"\
    %>\n<html><head><title>Starfleet validation (SAX - DTD)</title></head><body>\n\
    <%\n  SAXParserFactory factory = SAXParserFactory.newInstance();\n  factory.setValidating(true);\n\
    \  SAXParser parser = factory.newSAXParser();\n  InputSource inputSource = new\
    \ InputSource(\"webapps/xml-validate/xml/enterprises.xml\");\n  ParsingExceptionHandler\
    \ handler = new ParsingExceptionHandler();\n  parser.parse(inputSource, handler);\n\
    \  %>\n</body></html>\n```\n\nAfter instantiating the parser factory and setting\
    \ its `validating` property to `true`, you direct the factory to create a SAX\
    \ parser. Then you instantiate the `InputSource` class to access the XML document\
    \ and the exception handler. After that, all you need to do is execute the parser.\n\
    \nThis implementation is not very nice, though, because it causes the dumping\
    \ of a stack trace whenever the validation fails. It is better to wrap the parsing\
    \ inside a `try`/`catch` as shown in [Listing 5-6](#Chapter05.html#list_5_6),\
    \ so that you can display validation errors without stack trace.\n\nNote that\
    \ before you can execute the improved version of `starfleet_validate_sax.jsp`,\
    \ you need to download the `StringEscapeUtils` from Apache Commons. Their purpose\
    \ is to convert special characters to their corresponding HTML entities, so that\
    \ they display correctly in your web page. Go to [`http://commons.apache.org/lang/download_lang.cgi`](http://commons.apache.org/lang/download_lang.cgi)\
    \ and click on the link `commons-lang3-3.1-bin.zip`.\n\nTo install it in Tomcat,\
    \ unzip the file, copy `commons-lang3-3.1.jar` to `%CATALINA_HOME%\\lib\\`, and\
    \ restart Tomcat.\n\n![Image](images/square.jpg) **Tip** In alternative to copying\
    \ libraries to Tomcat’s `lib` folder, you can make them available to a particular\
    \ application by placing them in the `WEB-INF\\lib` folder of the application\
    \ (create it if it’s not yet there). In that way, the library will not be generally\
    \ available, but you will not run the risk of later needing a different version\
    \ of the same library for another application and introducing a conflict when\
    \ both versions are in Tomcat’s `lib` folder.\n\n**Listing 5-6.** `starfleet_validate_sax.jsp`\n\
    \n```\n<%@page language=\"java\" contentType=\"text/html\"%>\n<%@page import=\"\
    javax.xml.parsers.SAXParserFactory\"%>\n<%@page import=\"javax.xml.parsers.SAXParser\"\
    %>\n<%@page import=\"org.xml.sax.InputSource\"%>\n<%@page import=\"org.apache.commons.lang3.StringEscapeUtils\"\
    %>\n<%@page import=\"myPkg.ParsingExceptionHandler\"%>\n<html><head><title>Starfleet\
    \ validation (SAX - DTD)</title></head><body>\n<%\n  SAXParserFactory factory\
    \ = SAXParserFactory.newInstance();\n  factory.setValidating(true);\n  SAXParser\
    \ parser = factory.newSAXParser();\n  InputSource inputSource = new InputSource(\"\
    webapps/xml-validate/xml/enterprises.xml\");\n  ParsingExceptionHandler handler\
    \ = new ParsingExceptionHandler();\n  try { parser.parse(inputSource, handler);\
    \ }\n  catch (Exception e) { }\n  if (handler.errorLevel == null) {\n    out.println(\"\
    The document is valid.\");\n    }\n  else {\n    out.println(\n        \"*** Validation\
    \ \" + handler.errorLevel + \": \"\n      + StringEscapeUtils.escapeHtml4(handler.parsingException.toString())\n\
    \      );\n    }\n  %>\n</body></html>\n```\n\nNow, if you type [`http://localhost:8080/xml-validate/with-dtd/starfleet_validate_sax.jsp`](http://localhost:8080/xml-validate/with-dtd/starfleet_validate_sax.jsp)\
    \ in a browser, you should get a one-liner confirming that `enterprises.xml` is\
    \ correct.\n\nWhen you introduce an error in the XML document, for example by\
    \ mistyping the closing tag as in `<captain>James Tiberius Kirk</catain>`, you\
    \ get the following message:\n\n`*** Validation Fatal error: org.xml.sax.SAXParseException;\
    \ systemId:  `![Image](images/U002.jpg)\n`file:///C:/Program%20Files/Apache%20Software%20Foundation/Tomcat/webapps/xml-`\
    \ ![Image](images/U002.jpg)\n`validate/xml/enterprises.xml; lineNumber: 7; columnNumber:\
    \ 35; The element type  `![Image](images/U002.jpg)\n`\"captain\" must be terminated\
    \ by the matching end-tag \"</captain>\".`\n\nGood, isn’t it? Notice that it is\
    \ a fatal error. Incidentally, the angle brackets around `/captain` is why you\
    \ need to escape the message with `StringEscapeUtils`. If you remove the line\
    \ altogether, you get this message:\n\n`*** Validation Error: org.xml.sax.SAXParseException;\
    \ systemId:  `![Image](images/U002.jpg)\n`file:///C:/Program%20Files/Apache%20Software%20Foundation/Tomcat/webapps/xml-`\
    \ ![Image](images/U002.jpg)\n`validate/xml/enterprises.xml; lineNumber: 7; columnNumber:\
    \ 16; The content of  `![Image](images/U002.jpg)\n`element type \"starship\" is\
    \ incomplete, it must match \"(class,captain)\".`"
  raw: '##### Using JSP to Validate XML against a DTD


    To validate an XML file against a DTD, you must first associate the XML document
    with the DTD by adding a `DOCTYPE` declaration to the XML file. The declaration,
    which you should insert immediately after the `<?xml...?>` line, is as follows:


    `<!DOCTYPE starfleet SYSTEM "http://localhost:8080/xml-validate/dtd/starfleet.dtd">`


    Notice that the file `starfleet.dtd` doesn’t need to be in the WEB-INF\dtds\ folder.
    We had to place the DTDs there because Tomcat expected them there, but if you
    do the validation yourself, Tomcat is out of the loop. You can therefore place
    your DTDs wherever you like.


    The next step is the definition of an exception handler. This is a Java object
    of a class that extends `org.xml.sax.helpers.DefaultHandler` and replaces three
    of its methods: `warning`, `error`, and `fatalError`. Once the handler is registered
    with the parser, the parser executes the appropriate method upon encountering
    a validation problem. The default behavior of `DefaultHandler` is to do nothing.
    Therefore, you need to overwrite the methods in order to report the errors. [Listing
    5-4](#Chapter05.html#list_5_4) shows you the code of a possible handler. It’s
    really up to you to decide what level of reporting you’d like to have, but I have
    decided to report all validation problems and interrupt the parsing.


    ***Listing 5-4.** ParsingExceptionHandler.java*


    `package myPkg;`

    `import org.xml.sax.helpers.DefaultHandler;`

    `import org.xml.sax.SAXParseException;`

    `public class ParsingExceptionHandler extends DefaultHandler {`

    `  public SAXParseException parsingException = null;`

    `  public String errorLevel = null;`

    `  public void warning(SAXParseException e) {`

    `    errorLevel = "Warning";`

    `    parsingException = e;`

    `    }`

    `  public void error(SAXParseException e) {`

    `    errorLevel = "Error";`

    `    parsingException = e;`

    `    }`

    `  public void fatalError(SAXParseException e) {`

    `    errorLevel = "Fatal error";`

    `    parsingException = e;`

    `    }`

    `  }`


    As you can see, it’s pretty simple. You define two public attributes: one to save
    the exception generated by the parser, and one to save the error level. You then
    update the two attributes in each one of the three methods. After each parsing,
    you can check one of the attributes for `null` in order to determine whether the
    parsing succeeded or not. Compile this module from the DOS command line with `javac
    ParsingExceptionHandler.java` and copy the resulting `.class` file into the `WEB-INF\classes\myPkg`
    folder of your application directory.


    You are now ready to perform the validation. [Listing 5-5](#Chapter05.html#list_5_5)
    shows you a JSP page that implements a SAX parser.


    ***Listing 5-5.** starfleet_validate_sax.jsp (first cut)*


    `<%@page language="java" contentType="text/html"%>`

    `<%@page import="javax.xml.parsers.SAXParserFactory"%>`

    `<%@page import="javax.xml.parsers.SAXParser"%>`

    `<%@page import="org.xml.sax.InputSource"%>`

    `<%@page import="myPkg.ParsingExceptionHandler"%>`

    `<html><head><title>Starfleet validation (SAX - DTD)</title></head><body>`

    `<%`

    `  SAXParserFactory factory = SAXParserFactory.newInstance();`

    `  factory.setValidating(true);`

    `  SAXParser parser = factory.newSAXParser();`

    `  InputSource inputSource = new InputSource("webapps/xml-validate/xml/enterprises.xml");`

    `  ParsingExceptionHandler handler = new ParsingExceptionHandler();`

    `  parser.parse(inputSource, handler);`

    `  %>`

    `</body></html>`


    After instantiating the parser factory and setting its `validating` property to
    `true`, you direct the factory to create a SAX parser. Then you instantiate the
    `InputSource` class to access the XML document and the exception handler. After
    that, all you need to do is execute the parser.


    This implementation is not very nice, though, because it causes the dumping of
    a stack trace whenever the validation fails. It is better to wrap the parsing
    inside a `try`/`catch` as shown in [Listing 5-6](#Chapter05.html#list_5_6), so
    that you can display validation errors without stack trace.


    Note that before you can execute the improved version of `starfleet_validate_sax.jsp`,
    you need to download the `StringEscapeUtils` from Apache Commons. Their purpose
    is to convert special characters to their corresponding HTML entities, so that
    they display correctly in your web page. Go to [`http://commons.apache.org/lang/download_lang.cgi`](http://commons.apache.org/lang/download_lang.cgi)
    and click on the link `commons-lang3-3.1-bin.zip`.


    To install it in Tomcat, unzip the file, copy `commons-lang3-3.1.jar` to `%CATALINA_HOME%\lib\`,
    and restart Tomcat.


    ![Image](images/square.jpg) **Tip** In alternative to copying libraries to Tomcat’s
    `lib` folder, you can make them available to a particular application by placing
    them in the `WEB-INF\lib` folder of the application (create it if it’s not yet
    there). In that way, the library will not be generally available, but you will
    not run the risk of later needing a different version of the same library for
    another application and introducing a conflict when both versions are in Tomcat’s
    `lib` folder.


    ***Listing 5-6.** starfleet_validate_sax.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%@page import="javax.xml.parsers.SAXParserFactory"%>`

    `<%@page import="javax.xml.parsers.SAXParser"%>`

    `<%@page import="org.xml.sax.InputSource"%>`

