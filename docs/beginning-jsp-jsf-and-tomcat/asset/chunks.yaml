    #### 顶部菜单


    清单 8-2 显示了 `TopMenu.jspx` 及其对 `h:panelGroup` 组件的使用。


    ***清单 8-2.** eshopf: TopMenu.jspx*


    `<?xml version="1.0" encoding="UTF-8"?>` `<jsp:root`     `  version="2.1"` `  >`
    `<jsp:directive.page` `  language="java"` `  contentType="application/xhtml+xml;charset=UTF-8"`
    `  />` `<f:subview id="viewcart">` `  <h:panelGroup styleClass="header">` `    <h:outputText
    styleClass="logo" value="e-Shopping Center"/>` **`    <h:commandLink action="showCart"
    immediate="true" styleClass="cart link2">`** `      <h:outputText value="Show
    Cart "/>` `      <h:graphicImage url="/images/cart.gif"/>` `      </h:commandLink>`
    `    </h:panelGroup>` `  </f:subview>` `</jsp:root>`


    `TopMenu.jspx` 的目的是提供对购物车的标准化访问。


    请注意，我使用了 `f:subview` 来包含所有动作。还要注意，`f:subview` 的存在正是为了在通过 `jsp:include` 或任何自定义动作（如
    `c:include`）包含动作时包含它们。它的目的相当于 Java 中的一对大括号：它限制其内容的作用域。例如，在一个子视图中定义的组件 ID 可以与同一页面的其他子视图中定义的组件
    ID 相同。


    使用 `TopMenu.jspx`，你不一定需要将所有内容都包裹在子视图中，因为该文档的内容与 `LeftMenu.jspx` 或 `index.jspx`
    中的内容不冲突。尽管如此，避免包含模块可能产生的副作用是一种好的做法。子视图需要有一个 ID，这就是为什么我定义了 `id="viewcart"`，尽管我们实际上并没有使用它。


    属性 `styleClass` 是 HTML 属性 `class` 的 JSF 等价物。请参阅文件 `/css/eshopf.jspx` 以查看每个类的样式定义。


    `h:panelGroup` 的功能是将 UI 组件分组在一起。在这种情况下，它使得将样式类 `header` 应用于它包含的所有元素成为可能。


    HTML 元素 `img` 的 JSF 等价物是 `h:graphicImage`。


    请注意，`h:commandLink` 的 `immediate` 属性设置为 `true`。你从上一章中会记得，通过这样做，你可以强制动作监听器已经在应用请求值阶段执行。这保证了，无论用户正在查看什么页面，可能带有部分且不一致填写的表单，控制权都会直接转到购物车页面。


    `h:commandLink` 的 `action` 属性将结果设置为 `showCart`。你已经在上一章的多个示例中遇到过这种机制（例如，清单 7-1
    中的值 `goOn`）。


