    HTML 4.01 to be transitional. That is not true.    For this example, I will use
    an image as shown in [Figures A-22](#AppendixA.html#fig_A_22) and [A-23](#AppendixA.html#fig_A_23).  ![Image](images/9781430246237_AppA-22.jpg)  ***Figure
    A-22.** Status bar and screen tip pointing to gray in a map test*  ![Image](images/9781430246237_AppA-23.jpg)  ***Figure
    A-23.** Status bar and screen tip pointing to white in a map test*    This method
    doesn’t require you to cut the image into pieces. You only need to define the
