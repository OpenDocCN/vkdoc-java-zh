    \ so that Tomcat knows how to deal with them. [Listing 4-11](#Chapter04.html#list_4_11)\
    \ shows the full TLD for the custom tag library.\n\n**Listing 4-11.** `wow.tld`\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<taglib\n    xsi:schemaLocation=\"\
    http://java.sun.com/xml/ns/javaee ~CCC\nhttp://java.sun.com/xml/ns/j2ee/web-jsptaglibrary_2_1.xsd\"\
    \n    version=\"2.1\">\n  <description>Example of a simple tag library</description>\n\
    \  <tlib-version>1.0</tlib-version>\n  <short-name>wow</short-name>\n  <tag>\n\
    \    <description>Displays the day of the week</description>\n    <display-name>weekday</display-name>\n\
    \    <name>weekday</name>\n    <tag-class>tags.WeekdayTag</tag-class>\n    <body-content>empty</body-content>\n\
    \    <attribute>\n      <name>date</name>\n      <type>java.lang.String</type>\n\
    \      <rtexprvalue>true</rtexprvalue>\n      </attribute>\n    </tag>\n  </taglib>\n\
    ```\n\nAs you can see, the outermost element is `taglib`, which contains a `tag`\
    \ element for each custom action (in this case, only `weekday`). Apart from `tag`,\
    \ all `taglib` sub-elements in the example are for information purposes or to\
    \ be used by tools and can be omitted.\n\nThe `tag` element contains an `attribute`\
    \ sub-element for each action attribute (in this case, only `date`). Of the `tag`\
    \ sub-elements in the example, you can omit `description` and `display name`.\
    \ The sub-element `name` defines the custom action name; `tag class` specifies\
    \ the fully qualified class name of the tag handler; and `body content` specifies\
    \ the action to be bodyless.\n\nThe sub-element `tag class` is what gives you\
    \ the freedom to name your tag handlers anything you like. The sub-element `body\
    \ content` is mandatory and can only have one the following three values: `empty`,\
    \ `scriptless`, or `tagdependent`. The value `scriptless` is the default and means\
    \ that the body cannot contain scripting elements, while EL expressions and JSP\
    \ actions are accepted and processed normally. The value `tagdependent` means\
    \ that the body content is passed to the tag handler as it is, without any processing.\
    \ This is useful if the body contains character sequences, such as `<%`, that\
    \ would confuse Tomcat.\n\nNote that up to JSP 2.0, `body content` was mandatory,\
    \ and `body content=\"JSP\"` was valid. This is no longer the case with JSP 2.1.\n\
    \nThe attribute element in the example has three sub-elements: `name`, which sets\
    \ the action attribute name; `type`, which sets the class name of the attribute\
    \ value; and `rtexprvalue`, which decides whether the attribute accepts values\
    \ at request time.\n\nIf you had used a type other than `String`, the value passed\
    \ to the tag handler would have been of that type. For example, with an attribute\
    \ defined like this:\n\n```xml\n<attribute>\n  <name>num</name>\n  <type>java.lang.Integer</type>\n\
    \  </attribute>\n```\n\nyou would have included the following code in the tag\
    \ handler:\n\n```java\nprivate int num;\npublic void setNum(Integer num) {\n \
    \ this.num = num.intValue();\n  }\n```\n\nWhen processing the start tag of the\
    \ custom action, Tomcat would have parsed the string passed to the action (as\
    \ in `num=\"23\"`) to obtain the `Integer` value for the tag handler.\n\nIf you\
    \ had omitted the `rtexprvalue` sub-element or set it to `false`, you would have\
    \ been forced to pass to the `date` attribute only constant values, such as `\"\
    2007-12-05\"`, instead of runtime values such as `\"<%=aDate%>\"`. (`rtexpr` stands\
    \ for real-time expression).\n\nInside `WEB-INF`, create a folder named `tlds`\
    \ and place `wow.tld` there.\n\n### Step 3: Use the Custom Action\n\n[Listing\
    \ 4-12](#Chapter04.html#list_4_12) shows you a simple JSP page to test the `weekday`\
    \ custom action.\n\n**Listing 4-12.** `weekday.jsp`\n\n```jsp\n1: <%@page language=\"\
    java\" contentType=\"text/html\"%>\n2: <%@taglib uri=\"/WEB-INF/tlds/wow.tld\"\
    \ prefix=\"wow\"%>\n3: <% String d = request.getParameter(\"d\"); %>\n4: <html><head><title>weekday\
    \ bodyless tag</title></head><body>\n5: weekday today: <wow:weekday/><br/>\n6:\
    \ weekday <%=d%>: <wow:weekday date=\"<%=d%>\"/>\n7: </body></html>\n```\n\nLine\
    \ 2 contains the `taglib` directive, line 4 uses `weekday` without the `date`\
    \ attribute, and line 6 passes the request parameter `d` to the action. It’s as\
    \ simple as that.\n\nIf you type in your browser [`http://localhost:8080/tags/weekday.jsp?d=2012-12-25`](http://localhost:8080/tags/weekday.jsp?d=2012-12-25),\
    \ you get two lines, such as `Today: Wed` and `2012-12-25: Tue`. If you type the\
    \ URL without the query, the second line of the output becomes `null: Wed`. On\
    \ the other hand, if you type a query with a bad date, such as `d=2012-1225`,\
    \ Tomcat shows you an error page with a back trace that begins as follows:\n\n\
    ```\norg.apache.jasper.JasperException: javax.servlet.ServletException: ![Image](images/U002.jpg)\n\
    javax.servlet.jsp.JspException: ![Image](images/U002.jpg)\n    Date parsing failed:\
    \ Unparseable date: \"2012-1225\"\n```\n\nTo try out the example, you can simply\
    \ copy the folder named `tags` from the code of [Chapter 4](#Chapter04.html) to\
    \ Tomcat’s `webapps` folder. You can then execute the example by typing in your\
    \ browser `localhost:8080/tags/weekday.jsp`.\n\nNote that if you modify the tag\
    \ handler, you need to recompile it from the command line. To do so, type the\
    \ following two commands:\n\n```\ncd c:\\program files\\apache software foundation\\\
    tomcat\\webapps\\tags\\web-inf\\classes\\tags\njavac -classpath \"C:\\Program\
    \ Files\\Apache Software Foundation\\Tomcat\\lib\\jsp-api.jar\" ![Image](images/U002.jpg)\n\
    \  WeekDayTag.java\n```\n\nYou then also have to restart Tomcat.\n\n### Bodied\
    \ Custom Actions\n\nTo show you the differences from the bodyless action, I will\
    \ implement a version of the `weekday` action that expects the date in its body\
    \ instead of in an attribute:\n\n```\n<wow:weekdayBody>date</wow:weekdayBody>\n\
    ```"
