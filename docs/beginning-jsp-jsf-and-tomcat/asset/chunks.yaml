    of days of the month, and line 71 selects in the destination day the same index
    selected in the source day.    #### Animation: Ticker Tape    In principle, the
    idea is simple: you write a message in a text field, and then, at regular intervals,
    you remove the first character of the message and stick it to the end. The message
    appears to scroll from right to left (see [Figure A-29](#AppendixA.html#fig_A_29)).
    Nevertheless, to do a good ticker tape, there is more than meets the eye.  ![Image](images/9781430246237_AppA-29.jpg)  ***Figure
    A-29.** The simplest possible ticker tape*    [Listing A-20](#AppendixA.html#list_A_20)
    shows you how to create a simple ticker tape.    ***Listing A-20.** ticker0.html*  `<!DOCTYPE
    html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"` `  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">`
    `<html >` `<head>` `  <title>Ticker Tape 0</title>` `  <script type="text/javascript">`
    `    var msg = " This is a ticker tape message!            ";` `    function tick_it()
    {` `      msg = msg.substring(1) + msg.charAt(0);` `      document.f.t.value =
    msg;` `      window.setTimeout("tick_it()", 150);` `      }` `    </script>` `  </head>`
    `<body>` `  <form name="f"><input name="t" size="30" value=""/></form>` `  <script
    type="text/javascript">tick_it();</script>` `  </body>` `</html>`  The function
    `tick_it` calls itself recursively every 150 ms. Every time it executes, it moves
    the first character of `msg` to the end, thereby creating the effect of a message
    scrolling to the left.    `ticker0.html` may look straightforward, but it’s not
    necessarily that simple. Notice that the message I defined in the example, including
    an initial space, is 31 characters long. And yet I’ve still appended a dozen spaces
    to display it in a text element of size 30\. This is because the `size` attribute
    of a text element doesn’t really reflect the correct number of characters it can
    contain. Without the extra spaces, a portion of the text field would have remained
    blank. In other words, the scrolling text would have not scrolled through the
    whole text field. Ugly. You can usually resolve this issue by appending a large
    number of spaces or copies of the message itself to the end of the message. This
    solution is effective, but it would be nice to have a more elegant solution.    The
    crux of the problem lies in the fact that the length of a string depends on its
    font type and size. Developing software for the Macintosh, already decades ago,
    it was easily possible to determine the number of pixels needed to display a string.
    Java lets you do it now with the `Graphics` and `FontMetrics` classes. However,
    in HTML, it is not *officially* possible to know how long a piece of string is
    (pun intended). In other words, the W3C hasn’t standardized a way of obtaining
    the size of an element in pixels. However, Microsoft did it in IE, and then all
    major browsers adopted the Microsoft extension to the standard. As a result, there
    is an *unofficial* way of getting the length of a string in pixels. Have a look
    at [Listing A-21](#AppendixA.html#list_A_21).    ***Listing A-21.** ticker.html*  `01:  <!DOCTYPE
