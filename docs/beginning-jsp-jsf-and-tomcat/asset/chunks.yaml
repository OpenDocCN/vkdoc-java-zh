    首先，`index.jsp`（如脚本片段 1 所示）检查待售图书列表是否可用；如果不可用，则将控制权传递给 servlet，由 servlet 初始化图书列表。在真实的电子书店中，图书列表会非常长，并存储在数据库中。请注意，JSP
    并*不需要知道*列表存储在哪里。这首次暗示了应用逻辑与表示层是分离的。稍后您将看到 servlet 如何填充图书列表并将控制权返回给 `index.jsp`。现在，让我们继续分析主页。


    如果脚本片段 1 发现图书列表存在，它会将列表逐项复制到 `select` 控件中（如脚本片段 2 所示）。请注意 JSP 如何通过写入 `out` 流来简单地创建每个
    `option`。当买家选择书名并可能更改数量后，点击 `加入购物车` 按钮时，主页会向 `eshop` servlet 发送一个请求，其中隐藏参数 `do_this`
    被设置为 `add`。同样，servlet 通过为添加到购物车的每本新书实例化 `Book` 类，负责更新或创建购物车。这是应用逻辑，而非信息展示。


    脚本片段 3 检查购物车是否存在。`index.jsp` 完全由数据驱动，不记忆之前发生的事件，因此每次都会从头开始运行。因此，即使买家是第一次看到图书列表，它也会检查购物车是否存在。


    脚本片段 4 显示购物车中的商品，每个商品都带有自己的表单。如果买家决定删除某个条目，`index.jsp` 会向 servlet 发送一个请求，其中隐藏参数
    `do_this` 被设置为 `remove`。


    最后两个脚本片段的唯一作用是闭合 `if` 和 `for` 的花括号。然而，请注意，只有当购物车不为空时，才会向买家显示请求 servlet 进行结账的表单。之所以能做到这一点，是因为
    Tomcat 在将 JSP 页面转换为 Java servlet 时，会一起处理所有脚本片段，而不要求每个脚本片段单独包含完整的代码块。因此，HTML 元素可以被包含在一个跨越两个脚本片段的
    Java 块语句中。


    如果买家点击 `结账` 按钮，`index.jsp` 会向 servlet 发送一个请求，其中隐藏参数 `do_this` 被设置为 `checkout`。


    最后，请注意表达式元素 `<%=i%>`、`<%=aBook.getTitle()%>`、`<%=aBook.getPrice()%>` 和 `<%=aBook.getQuantity()%>`
    的使用。第一个表达式 `<%=i%>` 是图书在购物车中的位置。另外三个是对 `Book` 类型对象的方法调用，该对象由 servlet 为添加到购物车的每本新书实例化。


    您可能已经注意到，浏览器中显示的地址是 [`http://localhost:8080/ebookshop/eshop`](http://localhost:8080/ebookshop/eshop)。这实际上是控制应用程序的
    Java servlet 的地址。

