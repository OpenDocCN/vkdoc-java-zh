    any scripting element or untagged text.    ### Summary    In this chapter, you
    learned about the structure and the syntax of XML documents, DTDs, and XML schemas.    You
    then saw several ways of how to validate XML documents against DTDs and schemas.    Next,
    I introduced you to XSL and explained examples of XPath use and of transformation
    from XML to XML and from XML to HTML.    To conclude, I showed how you can convert
    JSP pages with directives and scripting elements into JSP documents that are fully
    XML-compliant.    In the next chapter, we’ll talk about databases.    ## C H A
    P T E R  6    ![Image](images/3square.jpg)    ## Databases    In many cases, a
    web application is nothing more than a front end for a database (DB). In fact,
    what makes web pages dynamic is precisely the fact that there is a significant
    amount of data behind them.    A database consists of organized data—that is,
    the data itself and a *schema* that provides data structures. Nowadays, most databases
    are organized in *tables*. You can define the table characteristics independently
    of the actual data you’re going to store into it. This is another instance of
    the separation of formatting and content, which you’ve already encountered in
    [Chapter 3](#Chapter03.html), when we discussed web applications.    A database
    management system (DBMS), such as MySQL or PostgreSQL, is a software package that
    lets you create, retrieve, update, and delete (CRUD) both items of data and elements
    of the schema.    Therefore, when talking about a database, you need to distinguish
    between three aspects:    > *   The data it contains. > *   The structure you
    impose on the data in order to CRUD it efficiently. > *   The software that allows
    you to manipulate both the data itself and the database structure (the DBMS).    Working
    with a database means that you’re interacting with its DBMS. You can do that through
    a command line interface (CLI), through graphical user interfaces (GUIs) provided
    by the DBMS vendor and third parties, or programmatically through an API. In general,
    you use all three methods, each for a different purpose. The CLI is best suited
    for setting up the initial data structure and for testing, the API is for your
    web application to interact with the database to perform its tasks, and the GUI
    is what you use to check individual data items or fix one-off problems.    In
    this chapter’s examples, I’ll use MySQL as the DBMS of choice, because, first,
    it’s available for free, and second, it’s the most widely used of the freely available
    DBMSs. As such, it has been proven to work reliably in all sorts of environments.
    At the end of this chapter, I’ll briefly talk about possible alternatives to MySQL.    ###
    MySQL    In this section, I will explain how to install MySQL. You actually need
    three packages: the MySQL database server, a connector to access MySQL databases
    from Java (a JDBC), and the MySQL Workbench, an application that lets you easily
    inspect and modify databases via a comfortable GUI.    To install MySQL, do the
    following:    > 1.  Go to [`http://dev.mysql.com/downloads/`](http://dev.mysql.com/downloads/)
    and click on the big green button labeled "`Download`". > 2.  Ensure that the
    selected platform is "Microsoft Windows" and click on the "`Download`" button.
    > 3.  Before you can download the package, you will have to login as a user, or
    register to be one. Then, after selecting a mirror site, you will be able to download
    the MSI installer `mysql-installer-5.5.21.0.msi` (or a more recent version of
    it). This package contains all three components of MySQL. Be aware that Workbench
    requires ".NET 4.0" and the "Visual C++ 2010 Redistributable Package". The MySQL
    installer will guide you to download and install them if needed. Alternatively,
    you can go to [`http://dev.mysql.com/resources/wb52_prerequisites.html`](http://dev.mysql.com/resources/wb52_prerequisites.html)
    to make sure you have everything in place beforehand. > 4.  When you execute the
    MySQL installer, choose the "`Full`" installation. > 5.  By default, MySQL keeps
    all databases in "`C:\Program Data\MySQL\MySQL Server 5.5`". I chose to change
    the datapath to "`C:\Program Data\MySQL\data`\", because it was more convenient
    for access and for backup. > 6.  Choose "`Standard Configuration`", and tick both
    option boxes before clicking on "`Next >`". The first option is to run MySQL as
    a service from startup. The second one lets you use MySQL from the command line.
    > 7.  Keep the default configuration: developer machine, enabled TCP/IP, and create
    Windows service MySQL55. > 8.  The version of the installer I had forced me to
    choose a password to access the databases.    If you go to the Services control
    panel as explained for Tomcat, you should see the service MySQL55 running.    For
    the examples of this book, as all databases are accessed locally and don''t contain
    valuable data, I decided I didn’t need a password.    To remove the password I
    had been forced to choose during installation, I opened a command window, attached
    to the directory "`C:\Program Files\MySQL\MySQL Server 5.5\bin\"` and typed the
    command `"mysqladmin -u root -p password`". The program asked me to enter the
    password, which I did, and then asked me twice to enter the new password, to which
    I replied both times by pressing `Enter`.    These MySQL packages that contain
    all components do not necessarily include the latest versions of the connectors
    and of the Workbench. I didn’t particularly care about having the latest Workbench,
    because I intended to use it only to check simple database generated from JSP.
    But I was keen to have the latest Java connector. Therefore, I went to [`http://dev.mysql.com/downloads/connector/j/`](http://dev.mysql.com/downloads/connector/j/)
    and downloaded `mysql-connector-java-5.1.18.zip`.    To install a JDBC, you only
    need to copy its JAR file into `%CATALINA_HOME%\lib\`. The MySQL installer puts
    it into `C:\Program Files\MySQL\MySQL Connector J\`.    For easy access, you should
    create a shortcut pointing to the Workbench application and place it in the `quickstart`
    bar or on the desktop. The application path will look like this:  `C:\Program
    Files\MySQL\MySQL Workbench CE 5.2.37\MySQLWorkbench.exe.`  #### MySQL Test    [Listing
