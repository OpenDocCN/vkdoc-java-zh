    you need to follow the following steps:


    > 1.  Define Java classes that provide the functionality of the new actions, including
    the definition of their attributes (e.g., `myAttributeName`). These classes are
    called *tag handlers*.

    > 2.  Provide a formalized description of your action elements, so that Tomcat
    knows how to handle them. For example, you need to specify which actions can have
    a body and which attributes can be omitted. Such a description is called a tag
    library descriptor (TLD).

    > 3.  In the JSP pages, tell Tomcat that the pages need your *tag library* and
    specify the prefix that you want to identify those custom tags with.


    I will take you through these steps, beginning with bodyless actions, which are
    simpler to implement.


    #### Bodyless Custom Actions


    A bodyless action is an element that, not having an end tag, cannot enclose a
    body between start and end tags. As an example, let’s say you want to develop
    an action that prints the day of the week of any given date:


    `<wow:weekday date="`*`date`*`"/>`


    With the `date` attribute accepting values in the form yyyy-mm-dd and defaulting
    to the current date. All the examples of this section on bodyless actions and
    the following section of bodied actions are in the software package for this chapter.
    To test them, copy the folder `tags` to Tomcat’s `webapps` folder.


    ##### Step 1: Define the Tag Handler


    A tag handler for a bodyless custom tag is a class that implements the interfaces
    `java.io.Serializable` and `javax.servlet.jsp.tagext.Tag`. Remember that to satisfy
    an interface, you have to implement all the methods it defines.


    To satisfy `Serializable`, you only need to define a unique identifier, like this:


    `static final long serialVersionUID = 1L;`


    The value identifies the version of your class and the objects you instantiate
    from it. It is then used when deserializing objects to check that class and object
    match. As long as you don’t have several versions of the class and swap objects
    between JVMs, you don’t really need to worry about it. However, to satisfy the
    `Tag` interface, you have to define the methods listed in [Table 4-1](#Chapter04.html#tab_4_1).


    ![Image](images/9781430246237_Tab04-01.jpg)


    ![Image](images/9781430246237_Tab04-01a.jpg)


    Fortunately, the `javax.servlet.jsp.tagext.TagSupport` class makes life easier
    by implementing the `Tag` interface with default methods and other useful methods.
    Therefore, you only need to extend `TagSupport` and overwrite the methods you
    need for your `weekday` action. You certainly don’t need `getParent`, because
    the action isn’t going to be used in the body of other actions. You don’t need
    `doStartTag` either, because the action is bodyless, and, as a consequence, you
    don’t have separate start and end tags. In conclusion, you only need to overwrite
    `doEndTag` with a method containing all the functionality of the `weekday` tag.


    [Listing 4-11](#Chapter04.html#list_4_11) shows you the code of the whole tag
    handler.


    ***Listing 4-11.** WeekdayTag.java*


    `package tags;`


    `import javax.servlet.jsp.JspException;`

    `import javax.servlet.jsp.tagext.TagSupport;`

    `import java.util.Date;`

    `import java.text.SimpleDateFormat;`

    `import java.util.Calendar;`

    `import java.util.GregorianCalendar;`


    `public class WeekdayTag extends TagSupport {`

    `  static final long serialVersionUID = 1L;`

    `  static final String[] WD = {"","Sun","Mon","Tue","Wed","Thu","Fri","Sat"};`

    `  private String date;`


    `  public void setDate(String date) {`

    `    this.date = date;`

    `    }`


    `  public int doEndTag() throws JspException {`

    `    GregorianCalendar cal = new GregorianCalendar();`

    `    SimpleDateFormat fmt = new SimpleDateFormat("yyyy-MM-dd");`

    `    fmt.setLenient(true);`

    `    if (date != null && date.length() > 0) {`

    `      Date d = new Date();`

    `      try {`

    `        d = fmt.parse(date);`

    `        }`

    `      catch (Exception e) {`

    `        throw new JspException("Date parsing failed: " + e.getMessage());`

    `        }`

    `      cal.setTime(d);`

    `      }`

    `    try {`

    `      pageContext.getOut().print(WD[cal.get(Calendar.DAY_OF_WEEK)]);`

    `      }`

    `    catch (Exception e) {`

    `      throw new JspException("Weekday writing failed: " + e.getMessage());`

    `      }`

    `    return EVAL_PAGE;`

    `    }`

    `  }`


    You need the `setDate` method because Tomcat uses it to pass the value of the
    action’s `date` attribute to the tag handler. The corresponding `getDate` method
    isn’t present, because it is never used and can be omitted. That said, you might
    argue that working with incomplete Java beans, sooner or later, will get you into
    trouble. If the action is executed without the `date` attribute, the `date` variable
    defined in `doEndTag` remains set to `null`, and the calendar `cal`, which is
    used to determine the day of the week, remains set to the current date. On the
    other hand, if a `date` attribute is specified in the action, its value is parsed
    and used to set the calendar.


    Notice that the tag handler is named like the tag but with the first letter capitalized
    and with the `Tag` suffix. This is a good practice to follow, although you can
    name your handlers whatever you like. You’ll see in a moment how to make the association
    between a tag and its handler.


    The return value `EVAL_PAGE` means that execution should continue with the page
    code following the custom action. Use `SKIP_PAGE` to abort the page.


    In any case, you must place your handlers in `WEB-INF\classes\`. For example,
    as `WeekDayTag.java` belongs to the package named `tags`, its compiled class must
    go into the folder `WEB-INF\classes\tags\`.'
