    The `facelet` Library    Facelets were originally developed as a view-handling
    technology in alternative to JSP. With release 2.0 of JSF, facelets have become
    its default view technology. But that doesn’t mean that, with the necessary care,
    you cannot use them together with JSP and JSTL. What makes JSF’s `facelet` library
    interesting is that it supports templating. That is, a mechanism that allows you
    to minimize duplication of code when developing pages with the same layout or
    common content.    While JSP with `jsp:include` provides an easy mechanism to
    re-use content, it doesn’t provide any easy way to define the same layout for
    different pages. It is up to you to ensure that the pages look identical when
    viewed in a browser.    The JSF `facelet` library lets you form a page by defining
    a layout in an XHTML file and then filling it up with content defined in one or
    more other XHTMLs. I will show you an example shortly, but first, have a look
    at [Table 7-4](#Chapter07.html#tab_7_4), which lists all tags of the `facelet`
    library. To help you make sense of the tags, I have flagged those that are part
    of the templating mechanism.    ![Image](images/9781430246237_Tab07-04.jpg)    #####
    The templ Application    In this section, I will describe `templ`, an application
    that uses facelet templating.    To create it, I started from the example `simplefx`
    I explained in a previous section of this chapter. You will recall that it essentially
    consisted of two JSP documents that invoked each other: `first.jspx` asked you
    to type something into a text field, and `second.jspx` displayed what you had
    typed.    To make an example of templating, I added a third page almost identical
    to the second one, so that I could show you how to define a template for them.
    To get started, let’s look at how the first two pages appear in a web browser
    ([Figures 7-9](#Chapter07.html#fig_7_9) and [7-10](#Chapter07.html#fig_7_10)).  ![Image](images/9781430246237_Fig07-09.jpg)  ***Figure
    7-9.** templ first page*  ![Image](images/9781430246237_Fig07-10.jpg)  ***Figure
    7-10.** templ second page*    Notice that the header of the second page is gray
    instead of black. The third page is identical to the second one, but its title
    is “Third page” and the text before the button starts with “Page 3”. To try it
    out, copy the folder `templ` from the software package for this chapter to Tomcat’s
    `webapps` folder, and then type in a browser [`http://localhost:8080/templ/`](http://localhost:8080/templ/).    The
    application consists of the following folders and files (the folders are in bold
    for easy reading):  **`templ`** `    first.xhtml` `    index.jsp` `    page2.xhtml`
    `    page3.xhtml` **`    resources`** **`        css`** `            styles.css`
    **`    templates`** **`        defaults`** `            header.xhtml` `        layout.xhtml`
    **`    WEB-INF`** **`        classes`** `            AString.class` `            AString.java`
    `        faces-config.xml` `        web.xml`  [Listing 7-24](#Chapter07.html#list_7_24)
    shows the code of the first page.    ***Listing 7-24.** first.xhtml*  `<?xml version="1.0"
