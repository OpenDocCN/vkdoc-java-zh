    Action Controllers and Action Listeners    So far, you have only seen examples
    in which the `action` attribute of `h:commandButton` is set to a fixed string.
    But you can also set it to the method of a bean. If you do so, when JSF reaches
    the Invoke Application phase while processing the request on the server, it executes
    that method and uses the value returned by that method to decide what page comes
    next. In this way, the destination page of an action is defined at execution time.    If
    this sounds too complicated, let’s see whether an example clarifies the matter.
    We start by making a copy of the `templ` application and renaming it `templa`.
    I am talking about action controllers and listeners now because I have already
    shown to you the `templ` application we can work with.    I want to replace the
    two buttons `Page 2` and `Page 3` shown in [Figure 7-9](#Chapter07.html#fig_7_9)
    with a single button that alternates between the two pages. To do this, I need
    to add the Java class shown in [Listing 7-31](#Chapter07.html#list_7_31).    ***Listing
    7-31.** Action.java*  `import javax.faces.bean.ManagedBean;` `import javax.faces.bean.SessionScoped;`
    `@ManagedBean(name="actionBean")` `@SessionScoped` `public class Action {` `  int
    n = 3;` `  public int getN() { return 5 - n; }` `  public String goThere() {`
    `    n = 5 - n;` `    return "go" + n;` `    }` `  }`  Notice that every time
    `goThere` is executed, `n` changes between the two values 2 and 3, so that the
    method returns alternatively “go2” and “go3”. Also notice that `getN` returns
    2 when `n` is 3 and 3 when `n` is 2.    The only other update I made to `templ`
    to change it into `templa` was to replace the following two lines of `first.xhtml`
    ([Listing 7-24](#Chapter07.html#list_7_24))  `<h:commandButton action="go2" value="Page
    2"/>` `<h:commandButton action="go3" value="Page 3"/>`  with  `<h:commandButton
    action="#{actionBean.goThere}" value="Page #{actionBean.n}"/>`  If you are thinking
    that this is a silly application, I fully agree with you. But the last thing I
    want is to give you examples in which the mechanism you should learn is buried
    in realistic but unnecessary complexities. Note that by moving the decision of
    what page comes next to the action-controller bean, you are effectively moving
    the business logic out of the View, thereby gaining in flexibility and maintainability.    That
    said, I am not yet happy about how this `goThere` method works. The problem I
    have is that the method does more than simply select the next page. It also has
    the side effect of modifying `n`. Side effects are dreaded by experienced programmers,
    because in a complex application they can cause bugs that are very difficult to
    trace. You want to write transparent programs in which nothing happens “behind
    your back.”    The right way to do it is to move what is now a side effect to
    its own method. Check out [Listing 7-32](#Chapter07.html#list_7_32) for an improved
    version of `Action.java`.    ***Listing 7-32.** Action.java (final)*  `import
    javax.faces.bean.ManagedBean;` `import javax.faces.bean.SessionScoped;` `import
    javax.faces.event.ActionEvent;` `@ManagedBean(name="actionBean")` `@SessionScoped`
    `public class Action {` `  int n = 3;` `  public int getN() { return 5 - n; }`
    `  public String goThere() { return "go" + n; }` `  public void swapPages(ActionEvent
    event) { n = 5 - n; }` `  }`  Obviously, you also have to update `first.xhtml`.
    All you need to do is update the `h:commandButton` element as follows:  `<h:commandButton
    action="#{actionBean.goThere}" value="Page #{actionBean.n}"` `    actionListener="#{actionBean.swapPages}"`
    `    />`  During the Invoke Application phase, JSF executes first the action listener
    and then the action controller. The value of `n` is obtained from the bean during
    the Render Response phase. This works. Sometimes, though, you might like JSF to
    execute the action listener as soon as possible after receiving the request, before
    other things happen. In that case, you can add to the component with `actionListener`
    the attribute `immediate="true"`, which forces the execution of the action listener
    already in the Apply Request Values phase.    In the next chapter, you will see
    how action control works in the JSF version of `eshop`, which is a more complex
    application.    #### The `composite` Library    JSF is based on user-interface
    components, but for a long time, it was difficult to create new components or
    combine existing components into a new one. JSF introduced the `composite` library
    with release 2.0 to make those tasks easier.    [Table 7-5](#Chapter07.html#tab_7_5)
    lists the all the tags of the `composite` library. The two tags `interface` and
    `implementation` are special, in that they are containers for other tags.    ![Image](images/9781430246237_Tab07-05.jpg)    Conceptually,
    to define a new component, you need to go through the following steps:    > *   Define
    its namespace (i.e., where it is). > *   Specify its functionality (i.e., what
    it does). > *   Define how you use it (i.e., its interface). > *   Design how
    you code it (i.e., its implementation).    ##### Some Examples    To write the
    first example, let’s go through the four points I listed at the end of the previous
    section.    > *   Define a namespace. I have chosen `gz`. > *   Specify its functionality.
    The component should compose a greeting message with a parameterized addressee.
    > *   Define how you use it. Just call it with an attribute to pass to it the
    addressee. > *   Design how you code it. Simple. An `h:outputText` will do.    The
    code for the new component is shown in [Listing 7-33](#Chapter07.html#list_7_33).
    To test it, copy the folder `composite` from the software package for this chapter
    to Tomcat’s `webapps` folder, and then type in the browser [`http://localhost:8080/composite`](http://localhost:8080/composite).    ***Listing
    7-33.** hello.xhtml*  `<?xml version="1.0" encoding="UTF-8"?>` `<!DOCTYPE html
    PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"` `    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd"`
    `    >` `<html`   `      >` `<h:head><title>Example of a composite component</title></h:head>`
    `<h:body>` `  <composite:interface>` `    <composite:attribute name="x"/>` `    </composite:interface>`
    `  <composite:implementation>` `    <h:outputText value="Hello, #{cc.attrs.x}!"/>`
    `    </composite:implementation>` `  </h:body>` `</html>`  Not surprisingly, for
    such a trivial component, the code is also trivial. But it tells you a lot about
    developing components with the `composite` library.    First of all, inside `h:body`,
    you find two elements, a `composite:interface` and a `composite:implementation`.
    Inside the former, you define the attribute named `x`, and inside the latter,
    you define the logic of the component.    To access the attribute from within
    the implementation, you use the expression `#{cc.attrs.x)`.    [Listing 7-34](#Chapter07.html#list_7_34)
    shows you how to use the new component, and [Figure 7-11](#Chapter07.html#fig_7_11)
    is how the page appears in a browser.    ***Listing 7-34.** comp.xhtml*  `<?xml
    version="1.0" encoding="UTF-8"?>` `<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0
    Transitional//EN"` `    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd"`
    `    >` `<html`   `      >` `<h:head><title>Example of a composite component</title></h:head>`
    `<h:body>` **`  <gz:hello x="wherever you are"/>`** `  </h:body>` `</html>` ![Image](images/9781430246237_Fig07-11.jpg)  ***Figure
    7-11.** composite*    Have you noticed anything unusual in `comp.xhtml`? Instead
    of separately declaring the namespaces of the JSF composite library and of your
    custom components, you declare a single namespace `composite/gz`. For this to
    work, you need to create in the root of your application a folder named `resources`;
    create a folder (in the example, named `gz`) inside `resources`; and place your
    custom components there. The name of the component (e.g., `hello`) is obtained
    from the name of the component file (e.g., `hello.xhtml`) by removing its extension.    It
    is an established practice to use the same string for the prefix and for naming
    the folder inside `resources`, and I recommend that you follow it, but the two
    strings can be different.    Note that if you place elements in an `interface`
    body, you need to define a corresponding `implementation`. But you can have code
    in `implementation` with an empty `interface`, like in:  `  <composite:interface/>`
    `  <composite:implementation>` `    <h:outputText value="Hello, World!"/>` `    </composite:implementation>`  It
    simply means that your new component will not have any attribute to set.    To
    include in a composite component an input component, do exactly what you did for
    an output component in `hello.xhtml`. In fact, if you replace in hello.xhtml the
    line  `    <h:outputText value="Hello, #{cc.attrs.x}!"/>`  with  `    <h:inputText
    value="Hello, #{cc.attrs.x}!"/>`  you will see the page shown in [Figure 7-12](#Chapter07.html#fig_7_12),
    but be aware that this is not a working page. It’s just to show you how to use
    `composite:attribute`.  ![Image](images/9781430246237_Fig07-12.jpg)  ***Figure
    7-12.** composite with input element*    You can also use `composite:attribute`
    to set the action attribute of `h:commandButton` and `h:commandLink`. For example,
    if you want to build a composite component called, say, `flip` around the `h:commandButton`
    you used in `templa` a couple of pages back, the body of `flip.xhtml` would look
    something like this:  `<composite:interface>` `  <composite:attribute name="act"
    targets="myB" method-signature="java.lang.String action()"/>` `  </composite:interface>`
    `<composite:implementation>` `  <h:commandButton id="myB" action="#{cc.attrs.act}"
    value="Page #{actionBean.n}"` `      actionListener="#{actionBean.swapPages}"`
    `      />` `  </composite:implementation>`  Then, you would use the new composite
    component like this:  `<gz:flip act="#{actionBean.goThere}"/>`  As it was in the
    previous examples, you use the expression `#{cc.attrs.act}` to access from the
    implementation the value of the `act` attribute declared in `interface`. In addition,
    unlike what happened in the previous examples, you also need a reference in the
    opposite direction, from `interface` to `implementation`. This is because JSF
    must be able to wire the method set in `gz:flip` to the `h:commandButton` component
    for which the method is meant. In fact, if there were more components in `implementation`,
    you could wire the same method to several of them by writing their identifiers
    in the `targets` attribute separated by spaces (this is why the name of the attribute
    is `targets`, plural, instead of target).    The value of `method-signature` specifies
    that the value of `act` must evaluate to a method, and defines its signature.
    This means that `<gz:flip act="go2"/>` wouldn’t work. You would have to replace:  `method-signature="java.lang.String
    action()"`  with  `type="java.lang.String"`  The two attributes are mutually exclusive,
    and if you leave out both of them, JSF assumes  `type="java.lang.Object"`  Now
    that you know how to make visible the `action` attribute of `h:commandButton`,
    you will perhaps be asking yourself how you expose its `actionListener` attribute
    as well. Here it is:  `<composite:interface>` `  <composite:attribute name="act"
    targets="myB" method-signature="java.lang.String action()"/>` `  <composite:actionSource
    name="myB"/>` `  </composite:interface>` `<composite:implementation>` `  <h:commandButton
    id="myB" action="#{cc.attrs.act}" value="Page #{actionBean.n}"/>` `  </composite:implementation>`  Then,
    you would use the new composite component like this:  `<gz:flip act="#{actionBean.goThere}">`
    `  <f:actionListener for="myB" binding="#{actionBean.swapPages}"/>` `  </gz:flip>`  The
    element `composite:actionSource` exposes the `h:commandButton` component, and
    `f:actionListener` wires to it the appropriate action listener. Notice that the
    attribute `actionListener` has disappeared from `h:commandButton`.    A few words
    about `composite:facet` and `composite:renderFacet`. Close to the beginning of
    the section about the `core` library, I mentioned that facets are a means to let
    components do something special with a block of code. Now, suppose that you want
    to include a special word in several places within the composite component you
    are developing and that the page that uses the component should be able to define
    that word. You could do it like this:  `<composite:interface>` `  <composite:facet
    name="aWord"/>` `  </composite:interface>` `<composite:implementation>` `  <!--
    ...some code... -->` `  <composite:renderFacet name="aWord"/>   <!-- say it here
    -->` `  <!-- ...some code... -->` `  <composite:renderFacet name="aWord"/>   <!--
    and here -->` `  <!-- ...some code... -->` `  <composite:renderFacet name="aWord"/>  
    <!-- and again here -->` `  </composite:implementation>`  And this is how you
    would use the component:  `<gz:myFacetedComponent>` `  <f:facet name="aWord"><h:outputText
    value="#@%!"/></f:facet>` `  </gz:myFacetedComponent>`  JSF will take the body
    of the `facet` element defined in the using page and insert it where you invoke
    `composite:renderFacet`. If you like to insert those components *as a facet*,
    you need to use `composite:insertFacet` instead.    Normally, JSF ignores what
    is inside the body of your custom component, like in  `<gz:myComponent>` `  <h:outputText
    value="#@%! "/>` `  <h:inputText value="#{aBean.whatever}"/>` `  </gz:myComponent>`  If
    you want to include it in your composite component, you can do it with  `<composite:insertChildren/>`  ###
    Summary    In this chapter, we have covered a lot of ground. I gave you a first
    taste of JSF with the `simplef`, `simplefx`, and `simpleh` applications. Then,
    after describing the JSF life cycle, I went on to talk about all four JSF tag
    libraries `html`, `core`, `facelet`, and `composite`.    For each library, I listed
    their tags and showed you with simple examples how to use the most common or significant
    tags.    In the next chapter, we’ll go back to `eshop` to see how we can convert
    it to a JSF application.    ## C H A P T E R  8    ![Image](images/3square.jpg)    ##
    JSF and eshop    In [Chapter 3](#Chapter03.html), I introduced the `eshop` project,
    followed in [Chapter 6](#Chapter06.html) by `eshopx`, functionally identical to
    `eshop` except that I replaced the JSP pages containing scripting elements with
    JSP documents in XML format.    In this chapter, I am going to describe `eshopf`,
    a version of `eshopx` based on JSF. You will find both the WAR file and the expanded
    project in the software package for this chapter.    ### eshopf    [Figure 8-1](#Chapter08.html#fig_8_1)
    shows the welcome page of `eshopf` . Although it is identical to that of `eshop`
    and `eshopx` , I include it here so that you can refer to it without having to
    flip forth and back across several chapters. Instead of commenting the listings
    of the whole application, I will concentrate on some interesting fragments as
    they relate to JSF.  ![Image](images/9781430246237_Fig08-01.jpg)  ***Figure 8-1.**
    eshopf’s home page*    As a basis for developing `eshopf`, I used `eshopx`. If
    you look at the welcome pages of `eshopx` and `eshopf`, both named `index.jspx`,
    you will see at once that, in order to use JSF, I added the two namespace declarations
    for the core and html JSF tag libraries and the element `f:view` to enclose all
    JSF actions.    But there is another update that is less obvious. Check out [Listing
    8-1](#Chapter08.html#list_8_1), which shows the body of the `f:view` element.    ***Listing
    8-1.** eshopf: Body of f:view in index.jspx*  `<h:form>` `  <jsp:include page="TopMenu.jspx"
    flush="true"/>` `  <jsp:include page="LeftMenu.jspx" flush="true"/>` `  </h:form>`
    `<div class="content">` `  <h1>Welcome to e-Shop</h1>` `  </div>`  In `index.jspx`
