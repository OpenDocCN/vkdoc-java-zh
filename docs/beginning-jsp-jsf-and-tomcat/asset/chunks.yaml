    `08:       <xsl:if test="@sn=''NCC-1701'' or @sn=''NCC-1701-D''">` `09:        
    <xsl:element name="starship">` `10:           <xsl:attribute name="name">` `11:            
    <xsl:value-of select="@name"/>` `12:             </xsl:attribute>` `13:          
    <xsl:attribute name="sn">` `14:             <xsl:value-of select="@sn"/>` `15:            
    </xsl:attribute>` `16:           <xsl:element name="class">` `17:            
    <xsl:attribute name="name">` `18:               <xsl:value-of select="class"/>`
    `19:               </xsl:attribute>` `20:             </xsl:element>` `21:          
    <xsl:copy-of select="captain"/>` `22:           </xsl:element>` `23:       </xsl:if>`
