    ### 数据库基础


    在某些情况下，数据库可能包含少量数据，结构简单，并与应用程序软件一起驻留在家用 PC 上。在其他情况下，在高端场景中，它可能包含数百万条记录，具有极其复杂的数据结构，并运行在强大的服务器集群上（例如，使用
    MySQL Cluster）。


    无论如何，无论大小、环境和复杂性如何，DBMS 都是围绕客户端/服务器架构组织的。你的数据库所在的系统是*服务器*，而你需要访问数据库的系统是*客户端*，即使它们是同一台
    PC。因此，为了能够处理数据和数据结构，你首先必须建立从客户端到服务器上数据库的连接。为此，你需要以下三条信息：


    > *   服务器的 URL

    > *   允许你访问数据库的用户 ID

    > *   与该用户 ID 关联的密码


    一旦建立了连接，你就可以开始通过 SQL 语句操作数据库结构及其内容。请注意，虽然你在连接到服务器时需要提供用户 ID 和密码，但这并不自动意味着用户可以访问同一服务器上的所有数据库。你可以（并且在大多数情况下，应该）允许某些用户访问特定数据库，而不允许其他用户访问。事实上，你可以为你创建的每个新数据库定义一个或多个新用户，并根据他们需要拥有的能力（例如，数据库管理员、开发人员等）对他们进行分组。这确保了当多个用户共享一个数据库服务器时数据的完全机密性。为不同的应用程序定义不同的用户是一种好的做法，这样你就不会冒“交叉污染”数据的风险。


    1986 年，美国国家标准协会（ANSI）采纳 SQL 作为标准，ISO 在一年后也紧随其后。当前的标准是 ISO/IEC 9075，但不幸的是，它不是免费提供的。如果你想要它，你必须从
    ANSI 或 ISO 购买。SQL 标准已被广泛采用，因此，我将要说的关于 SQL 的大部分内容实际上适用于所有 DBMS。可以想象，仍然存在专有的补充和变体，在某些情况下，这使得
    SQL 的可移植性不如它可能和应该达到的程度，但这不会影响我们。


    SQL 标准至少指定了 27 条基本语句及其众多变体。它们是 `alter`、`based on`、`begin`、`close`、`commit`、`connect`、`create`、`declare`、`delete`、`describe`、`disconnect`、`drop`、`end`、`event`、`execute`、`fetch`、`grant`、`insert`、`open`、`prepare`、`revoke`、`rollback`、`select`、`set`、`show`、`update`
    和 `whenever`（详见附录 B）。根据最新统计，SQL 总共保留了 231 个单词作为关键字。因此，应该清楚的是，在本章中，我不可能对 SQL 进行超过一个小型介绍。附录
    B 提供了更详细的 SQL 参考以帮助你。此外，如果你在 Apress 上搜索 "SQL"，你将获得超过一百本书的列表。"Beginning SQL Queries"（[`www.apress.com/9781590599433`](http://www.apress.com/9781590599433)）可能是一个不错的起点。


    数据库的基本结构元素是行、列、表和索引。用非 SQL 术语来说，行是数据记录，列标识记录字段，表是命名的记录集合，索引是记录的有序列表。


    要为 Web 应用程序设计数据库，你基本上将每个 Java 类关联到一个表，该表表示你需要永久存储的数据。然后，你的类的每个属性都成为表的一列。从某种意义上说，用
    OO 术语来表达，每一行对应于包含不同数据的类的实例化。例如，在 E-shop 应用程序中，图书类别被建模以反映清单 6-6 中显示的 Java 类。


    ***清单 6-6.** Category.java*


    `package eshop.beans;`  `public class Category {` `  private int id;` `  private
    String name;`  `  public Category(int id, String name) {` `    this.id = id;`
    `    this.name = name;` `    }`  `  public int getId() { return id; }` `  public
    void setId(int id) { this.id = id; }`  `  public String getName() { return name;
    }` `  public void setName(String name) { this.name = name; }` `  }`


    因此，要将类别存储在 `shop` 数据库中，你可以使用以下 SQL 语句创建一个名为 `categories` 的表，该语句摘自 `shop_create.sql`（参见清单
    6.1）：


    `create table shop.categories (` `  category_id integer not null auto_increment
    unique,` `  category_name varchar(70),` `  primary key (category_id)` `  );`


    每条 SQL 语句由一个定义要执行的操作的动词（本例中为 `create table`）、被操作对象的标识符（本例中为 `shop.categories`）以及一个或多个操作参数（通常用括号括起来）组成。当需要多个对象或参数时，它们通常用逗号分隔。在示例中，前两个参数定义了数据库列
    `category_id` 和 `category_name`。请注意 SQL 语句中指定的属性如何与 Java 类中定义的属性匹配。在创建此表时，我还告诉
    MySQL 通过声明该列包含唯一值并将其指定为表的主键来创建 `category_id` 的索引。目的是加快数据库操作速度，尽管在这种情况下，鉴于表的大小很小，它显然不会产生任何实际差异。


    使用以下代码（摘自 `shop_populate.sql`（参见清单 6.2））创建三个新行，以在数据库中存储新记录：


    `insert into categories (category_id, category_name)` `  values (1,''Web Development''),
    (2,''SF''), (3,''Action Novels'');`


    顺便说一下，请注意 SQL 与 Java 不同，它不区分大小写。


    使用强大的 `select` SQL 语句来读取数据。它允许你创建包括数据排序在内的复杂查询。这是一个简单的例子：


    `select category_id, category_name from categories where category_id = ''2'';`


    要检索表的所有列，你可以用星号替换逗号分隔的列列表。`where` 子句可以由通过逻辑运算符组成的多个条件组成。


    你使用 `update` 语句来修改行内容：


    `update categories set category_name = ''SF'' where category_id = ''2'';`


    使用 `delete` 可以删除行：


    `delete from categories where category_id > ''3'';`


    你也可以对数据结构进行操作。为此，你使用 `alter` 语句，如下例所示：


    `alter table categories add` *`new_column_name`**`column-definition`*`;`


    这允许你向现有表添加列。如果你将 `add` 替换为 `modify` 或 `drop`，`alter` 语句将允许你重新定义列或删除它。


    通常，SQL 语句根据其用途进行分组。表 6-1 总结了它们的分类。


    ![Image](img/9781430246237_Tab06-01.jpg)


    在本章中，我将解释如何执行任何 SQL 语句，但我们将主要关注 DML。


    ### SQL 脚本


    正如我已经说过的，CLI 对于初始化数据库很有用。作为一个 CLI，MySQL 提供了程序 "MySQL Command Line Client"，它在一个
    DOS 窗口中启动，并立即尝试以默认用户 ID 连接到默认服务器。如果你按照本章开头建议的方式设置了 MySQL，则默认用户将是 `root`，默认主机将是
    `localhost`。提供正确的密码后，你会得到一个 `mysql>` 提示符，并可以开始执行 SQL 语句。


    你可以随意使用这些命令，但使用 CLI 的最佳方式是使用 SQL 脚本。这些是包含你想要执行的语句的纯文本文件。在 `mysql` 提示符下，你只需要键入反斜杠-句点-空格（`\.`），后跟脚本文件名，然后就可以了。事实上，如果你想确保你的步骤是可重复和可纠正的，你必须使用脚本。清单
    6-7 显示了配置 E-shop 应用程序数据库所需的第三个（也是最后一个）SQL 脚本。


    ***清单 6-7.** shop_orders.sql*


    `USE shop;` `create table shop.order_details (`  `  id double precision not null
    auto_increment unique,` `  book_id integer,` `  title varchar(70),` `  author
    varchar(70),`  `  quantity integer,` `  price double precision,` `  order_id double
    precision,` `  primary key (id)` `  );` `create table shop.orders (` `  order_id
    double precision not null auto_increment unique,` `  delivery_name varchar(70),`
    `  delivery_address varchar(70),` `  cc_name varchar(70),` `  cc_number varchar(32),`
    `  cc_expiry varchar(20),` `  primary key (order_id)` `  );` `create index order_details_id_key
    on shop.order_details (id);` `alter table shop.order_details add index order_id
    (order_id),` `  add constraint order_id foreign key (order_id)` `  references
    shop.orders (order_id)` `  ;` `create index order_id_key on shop.orders (order_id);`


    请注意，`order_details` 和 `orders` 的主键（即唯一键）都是由 MySQL 自动生成为不断递增的数字，而 `books` 和 `categories`
    的主键是在 `shop_create.sql`（参见清单 6.1）中硬编码的。由于类别和图书 ID 对用户不可见，我本可以让 MySQL 也生成它们。我没有这样做，因为图书和类别记录无论如何都是手动创建的，并且添加一个
    ID 似乎不是什么大问题。也许是因为我倾向于在非必要时尽量减少自动机制的使用，以便保留更多的控制权。这样做的缺点当然是手动输入通常更容易出错，并且需要更多的维护工作。


