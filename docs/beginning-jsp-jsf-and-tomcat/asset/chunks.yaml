    # XML and JSP


    HTML is probably the first markup language most of us came into contact with.
    It’s a great language, but it’s not without its problems.


    For example, HTML mixes content data with the way the information is presented,
    thereby making it difficult to present the same data in different ways and to
    standardize presentations across multiple sets of data. Cascading Style Sheets
    (CSS) significantly reduces this problem but doesn’t completely eliminate it,
    and it also forces you to learn yet another language.


    Another problem, partly due to the way in which HTML is defined, is that the browsers
    are very forgiving about inconsistently written pages. In many cases, they’re
    able to render pages with unquoted attribute values and tags that aren’t closed
    properly. This encourages sloppiness in coding and wastes computer resources.


    XML (whose standard is available at [`http://www.w3.org/TR/xml`](http://www.w3.org/TR/xml))
    lets you organize information into a treelike structure in which each item of
    information represents a leaf. Its power and flexibility lies in the idea of defining
    its syntax and a mechanism for defining tags. This makes it possible for you to
    define your own markup language tailored for the type of information you’re dealing
    with. This also lets you define XHTML, a version of HTML clean of inconsistencies,
    as a well-formatted XML file.


    Also, XML is the perfect vehicle for exchanging structured information. In fact,
    XML’s purpose is precisely to describe information.


    I have introduced XML starting from HTML, because you’re familiar with HTML and
    they’re both markup languages. However, the usefulness of XML goes well beyond
    providing a better syntax for HTML. The great advantage of using XML in preference
    to proprietary formats whenever information needs to be structured is that standardized
    parsers make the manipulation of XML documents easy. In this chapter, you will
    also learn how to parse an XML document in JSP with XML custom tags and XPath.


    Many organizations, both private and public, have turned to XML to standardize
    the representation of information in their respective areas.


    Some initiatives are very ambitious, like for example the development of a Universal
    Business Language (UBL) to generate XML-based standards of business documents
    like purchase orders and invoices (see [`http://ubl.xml.org`](http://ubl.xml.org)).


    Other initiatives, like the Real Estate Transaction Markup Language (RETML) to
    standardize the encoding of real estate transactions, have already gone through
    years of refinements and associated tool development and are being adopted.


    Still other initiatives, like the Mind Reading Markup Language (MRML) might just
    serve the purpose of having fun (see [`http://ifaq.wap.org/computers/mrml.html`](http://ifaq.wap.org/computers/mrml.html)).


    OASIS, a not-for-profit consortium that promotes the establishment of open standards
    for the exchange of information, lists in [`http://xml.coverpages.org/xmlApplications.html`](http://xml.coverpages.org/xmlApplications.html)
    almost 600 XML applications and initiatives.


