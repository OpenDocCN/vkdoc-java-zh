    Method*  `protected void doPost(HttpServletRequest request,` `    HttpServletResponse
    response) throws ServletException, IOException {` `  String base = "/jsp/";` `  String
    url = base + "index.jsp";` `  String action = request.getParameter("action");`
    `  if (action != null) {` `      switch (action) {` `      case "search":` `        url
    = base + "SearchOutcome.jsp";` `        break;` `      case "selectCatalog":`
    `        url = base + "SelectCatalog.jsp";` `        break;` `      case "bookDetails":`
    `        url = base + "BookDetails.jsp";` `        break;` `      case "checkOut":`
    `        url = base + "Checkout.jsp";` `        break;` `      case "orderConfirmation":`
    `        url = base + "OrderConfirmation.jsp";` `        break;` `      default:`
    `        if (action.matches("(showCart|(add|update|delete)Item)"))` `          url
    = base + "ShoppingCart.jsp";` `        break;` `      }` `    }` `  RequestDispatcher
    requestDispatcher =` `    getServletContext().getRequestDispatcher(url);` `  requestDispatcher.forward(request,
    response);` `  }`  As you can see, `doPost` obtains the request parameter named
    `action` and then uses it to form the correct URL of the JSP page. It then uses
    the request dispatcher obtained from the servlet context to forward control to
    the page. If no `action` parameter exists or if it doesn’t match any of the expected
    strings, the servlet will execute the default page (`/jsp/index.jsp`).    To cover
    the `eshop` functionality in detail, I’ll show you what happens in a typical user
    session, as I already did in [Chapter 3](#Chapter03.html). This time, though,
    instead of showing it from the point of view of the user, I’ll look at the behavior
    of the application on the server. The architecture of `eshop` is consistent with
    the general MVC architecture shown in [Figure 3-2](#Chapter03.html#fig_3_2).    ####
    What Happens When the Application Starts    The user starts the application by
    typing [`http://localhost:8080/eshop/shop/`](http://localhost:8080/eshop/shop/)
    in his or her browser. The `doGet` method of ShopServlet is executed, and that
    simply executes `doPost`. The `doPost` method, as I just explained, doesn''t find
    a request parameter named `action`, so it forwards the request to `index.jsp`.    The
    `index.jsp` page, like all other pages of `eshop`, displays a header with a link
    to the shopping cart and a menu on the left-hand side with search and selection
    controls (see [Figure 10-1](#Chapter10.html#fig_10_1)). It does so by including
    two separate modules, as follows:  `<jsp:include page="TopMenu.jsp" flush="true"/>`
    `<jsp:include page="LeftMenu.jsp" flush="true"/>` ![Image](images/9781430246237_Fig10-01.jpg)  ***Figure
    10-1.** E-shop’s home page*    The central area of the page only displays the
    text `welcome to e-Shop`.    The `TopMenu.jsp` module is trivial. Essentially,
    it consists of the following element:  `    <a class="link2" href="<%=base%>?action=showCart">Show
    Cart` `      <img src="<%=imageURL%>/cart.gif" border="0"/></a>`  where the two
    variables are obtained from the application scope  `  String base = (String)application.getAttribute("base");`
    `  String imageURL = (String)application.getAttribute("imageURL");`  The `action`
    parameter set to `showCart` causes `ShopServlet` to forward the request to `/jsp/ShoppingCart.jsp`.    The
    `LeftMenu.jsp` module has to do more. It displays a search field and a list of
    selectable book categories. The code to accept a search request is as follows:  `<p>Book
    Title/Author:</p>` `  <form style="border: 0px solid; padding: 0; margin: 0;">`
    `    <input type="hidden" name="action" value="search"/>` `    <input id="text"
    type="text" name="keyword" size="15"/>` `    <input id="submit" type="submit"
    value="Search"/>` `    </form>`  Notice the presence of the hidden parameter named
    `action` with the value `"search"`, which causes `ShopServlet` to forward the
    request to `/jsp/SearchOutcome.jsp` when the user clicks on the `Search` button
    to perform a book search.    Here’s the code that lists the book categories:  `<%`
    `    Hashtable<String, String> categories = dataManager.getCategories();` `    Enumeration<String>
    categoryIds = categories.keys();` `    while (categoryIds.hasMoreElements()) {`
    `      Object categoryId = categoryIds.nextElement();` `      out.println("<p><a
    href=" + base + "?action=selectCatalog&id="` `        + categoryId.toString()
    + ">" + categories.get(categoryId) + "</a></p>"` `        );` `      }` `  %>`  The
    `DataManager` method `getCategories` only executes another method of the data
    model  `  public Hashtable<String, String> getCategories() {` `    return CategoryPeer.getAllCategories(this);`
    `    }`  that interrogates the database to obtain identifiers and names of the
    available categories (see [Listing 10-3](#Chapter10.html#list_10_3)).    ***Listing
    10-3.** CategoryPeer.java—getAllCategories Method*  `public static Hashtable<String,
    String>` `    getAllCategories(DataManager dataManager) {` `  Hashtable<String,
