    package for this chapter.    The `binding` attribute listed means that during
    Update Model Values, the JSF servlet saves the search string typed by the user
    in the attribute `searchTxt`, which is of type `javax.faces.component.html.HtmlInputText`.
    It does so by using the method `setSearchTxt`. Later in the life cycle, during
    Render Response, it uses the `getSearchText` method to get the value needed to
    prefill the input text field in HTML. The `HtmlInputTxt` class has a series of
    properties and methods that enable you, among other things, to make it a required
    input and to validate the value typed in by the user.    The action attribute
    of the `Search` button causes the JSF servlet to execute the method `searchBooks`
    during Invoke Application. As you can see in [Listing 8-5](#Chapter08.html#list_8_5),
    the method simply obtains the value of the search string, executes the `dataManager`
    method to obtain the list of books from the database, saves the list in the object
    `books`, and returns the string `"listBooks"`.    If you now look at the following
    fragment of `faces-config.xml`, you’ll see that by returning `"listBooks"`, the
    `searchBooks` method forces JSF to switch from the current page to `ListBooks.jspx`:  `<navigation-rule>`
    `  <navigation-case>` `    <from-outcome>listBooks</from-outcome>` `    <to-view-id>/jsp/ListBooks.jspx</to-view-id>`
    `    <redirect/>` `    </navigation-case>` `  </navigation-rule>`  The presence
    (or absence) of the `redirect` element determines how this switch is done. If
    `redirect` is present, as in the example, JSF will send a redirect response to
    the client that will cause the browser to request the new page. Without the `redirect`
    element, during Render Response, JSF will directly use the content of the `books`
    object to render in HTML the list of books found in the database. But in that
    case, the list will effectively be a new rendering of the page that the user launched
    the search from. As a result, the URL shown in the browser will remain unchanged
    (e.g., [`http://localhost:8080/eshopf/`](http://localhost:8080/eshopf/)).    You
    also could have included this line in the `navigation-case` element to impose
    a more restrictive condition on when the page switch should take place:  `<from-action>#{shopManager.searchBooks}</from-action>`  However,
    this is clearly unnecessary in this case, because no other method returns `"listBooks"`.    ####
