    #### i18n 库：编写多语言应用程序


    国际化 Web 应用有两种方法：可以为每种区域设置提供不同版本的 JSP 页面，并在处理每个请求时通过 Servlet 进行选择；或者将特定于区域设置的数据保存在独立的资源包中，并通过
    `i18n` 操作进行访问。JSTL 国际化操作对这两种方法都提供支持，但本文将重点介绍第二种方法，即语言切换的实际工作是在 JSP 中完成的。


    ##### fmt:setLocale、fmt:setBundle、fmt:setMessage 和 fmt:param


    假设您希望支持英语和意大利语。首先要做的是识别出两种语言中所有不同的字符串，并定义两个资源包，每种语言一个（参见清单 4-17 和 4-18）。


    ***清单 4-17.** MyBundle_en.java*


    `package myPkg.i18n;`

    `import java.util.*;`

    `public class MyBundle_en extends ListResourceBundle {`

    `  public Object[][] getContents() {return contents;}`

    `  static final Object[][] contents = {`

    `    {"login.loginmess","Please login with ID and password"},`

    `    {"login.submit","Submit"},`

    `    {"login.choose","Choose the language"},`

    `    {"login.english","English"},`

    `    {"login.italian","Italian"}`

    `    };`

    `  }`


    ***清单 4-18.** MyBundle_it.java*


    `package myPkg.i18n;`

    `import java.util.*;`

    `public class MyBundle_it extends ListResourceBundle {`

    `  public Object[][] getContents() {return contents;}`

    `  static final Object[][] contents = {`

    `    {"login.loginmess","Loggati con ID e parola d''ordine"},`

    `    {"login.submit","Invia"},`

    `    {"login.choose","Scegli la lingua"},`

    `    {"login.english","Inglese"},`

    `    {"login.italian","Italiano"}`

    `    };`

    `  }`


    如您所见，资源包只不过是一个扩展了 `java.util.ListResourceBundle` 类的 Java 类。在这个例子中，您只会看到一个简单的登录页面，但在实际应用中，您需要包含应用程序的所有特定语言消息。我使用了前缀
    `login` 来向您展示可以在资源包内对消息进行分组。您可以从命令行使用 `javac` 编译这些 Java 文件，以获得 `MyBundle_en.class`
    和 `MyBundle_it.class` 两个文件。将这两个文件放在应用程序根目录的 `WEB INF\classes\myPkg\i18n\` 文件夹中，就像处理任何其他自定义类一样。


    清单 4-19 展示了支持两种语言的登录页面。要试用它，请将本章软件包中名为 `international` 的文件夹复制到 `webapps` 目录下。然后在浏览器中输入
    `localhost:8080/international`。


    ***清单 4-19.** 多语言应用的 index.jsp*


    `01: <%@page language="java" contentType="text/html"%>`

    `02: <%@taglib prefix="c" uri="http://java.sun.com/jsp/jstl/core"%>`

    `03: <%@taglib prefix="fmt" uri="http://java.sun.com/jsp/jstl/fmt"%>`

    `04: <c:set var="langExt" value="en"/>`

    `05: <c:if test="${param.lang!=null}">`

    `06:   <c:set var="langExt" value="${param.lang}"/>`

    `07:   </c:if>`

    `08: <fmt:setLocale value="${langExt}"/>`

    `09: <fmt:setBundle basename="myPkg.i18n.MyBundle"`

    `10:   var="lang" scope="session"/>`

    `11: <html><head><title>i18n</title></head><body>`

    `12: <h1><fmt:message key="login.loginmess" bundle="${lang}"/></h1>`

    `13: <form method="post" action="home.jsp">`

    `14:   <input name=id>`

    `15:   <input name=passwd>`

    `16:   <input type="submit"`

    `17:     value="<fmt:message key="login.submit" bundle="${lang}"/>"`

    `18:     >`

    `19: <h2><fmt:message key="login.choose" bundle="${lang}"/></h2>`

    `20: <a href="index.jsp?lang=en">`

    `21:   <fmt:message key="login.english" bundle="${lang}"/>`

    `22:   </a>`

    `23: &nbsp;`

    `24: <a href="index.jsp?lang=it">`

    `25:   <fmt:message key="login.italian" bundle="${lang}"/>`

    `26:   </a>`

    `27: </body></html>`


    第 4-7 行确保页面变量 `langExt` 不为 `null`，方法是在页面首次被请求时将其设置为 `en`。第 8 行将区域设置设置为请求的语言代码。有效的语言代码列表在
    ISO 639 标准中定义。它们是小写的（例如，意大利语为 `it`），因此您不会将它们与 ISO 3166 标准中定义的大写国家代码（例如，意大利为 `IT`）混淆。


    在第 9 行，您设置了资源包。请注意，它看起来像是两个资源包类的完全限定类名，但没有末尾的下划线和语言代码。这正是应该采用的方式。否则，JSTL 将找不到您的消息。执行
    `fmt:setBundle` 后，会话变量 `lang` 指向正确语言的资源包，这要归功于区域设置和 `basename` 属性。


    之后，像下面这样的元素将插入由 `key` 属性值标识的相应语言的消息：


    `<fmt:message key="`*`keyName`*`" bundle="${lang}"/>`


    请注意第 17 行中双引号是如何嵌套而没有引起任何问题的。这是因为操作首先被处理。当 Tomcat 处理 HTML 时，只剩下外层的双引号。


    图 4-4 显示了您首次查看页面时的样子。


    ![图片](img/9781430246237_Fig04-04.jpg)


    ***图 4-4.** 首次查看 index.jsp 时*


    图 4-5 显示了当您通过点击相应的底部链接选择意大利语时页面的样子。


    ![图片](img/9781430246237_Fig04-05.jpg)


    ***图 4-5.** index.jsp 的意大利语版本*


    如果 Tomcat 找不到资源包，它将显示键名，并在其前后各加三个问号，如图 4-6 所示。这表明您在目录名称上一定犯了错误。


    ![图片](img/9781430246237_Fig04-06.jpg)


    ***图 4-6.** index.jsp 找不到消息。*


    除了 `value` 之外，`fmt:setLocale` 还接受两个额外的属性。第一个是 `scope`，它定义了区域设置的作用域。在示例中，使用了默认值（即
    `page`），但 `scope` 允许您，例如，将区域设置保存为会话属性。另一个属性 `variant` 允许您指定非标准化的区域设置。


    `fmt:setMessage` 也支持 `var`/`scope` 属性对，允许您将生成的字符串存储到作用域变量中。您还可以将子操作 `fmt:param`
    放在 `fmt:message` 的主体中，并将其 `value` 属性设置为您想要附加到消息中的字符串。


    ##### fmt:bundle、fmt:setTimeZone 和 fmt:timeZone


    与 `fmt:SetBundle` 类似的是 `fmt:bundle`，但虽然您选择 `basename` 的方式与 `fmt:setBundle` 相同，但您无法将您的选择存储到作用域变量中。相反，您选择的
    basename 适用于 `fmt:bundle` 主体内的所有元素。此外，`fmt:bundle` 还支持 `prefix` 属性，该属性扩展了 `basename`。例如，如果您将清单
    4-19 中的第 9-10 行替换为


    `<fmt:bundle basename="myPkg.i18n.MyBundle" prefix="login.">`


    并在最后一行之前插入 `</fmt:bundle>`，那么您就可以将现有的第 21 行：


    `<fmt:message key="login.english" bundle="${lang}"/>`


    替换为：


    `<fmt:message key="english"/>`


    `fmt:setTimeZone` 将当前时区设置为 `value` 属性中指定的值，例如：


    `<fmt:setTimeZone value="America/Los_Angeles"/>`


    但它也可以将时区存储到由 `var`/`scope` 属性对指定的作用域变量中。


    另一方面，当您使用 `fmt:timeZone` 定义时区时，它仅适用于出现在该操作主体中的元素。

    '
- fmt: '# `fmt:parseNumber` and `fmt:formatNumber`


    `fmt:parseNumber` and `fmt:formatNumber` deal with numbers, percentages, and currencies.
    Both actions can store their result into a scoped variable through the usual `var`/`scope`
    pair of attributes, or send it to the output if those attributes are missing.


    Note that `fmt:formatNumber` is bodyless and expects to find the number to be
    formatted in the `value` attribute. `fmt:parseNumber` also supports `value` in
    its bodyless form, but if the attribute is missing, it takes as input the content
    of its body.


    Both actions support a `type` attribute that can have the values `"number"`, `"currency"`,
    or `"percent"`.


    Both actions also support a `pattern` attribute that lets you specify in detail
    a custom format. [Table 4-10](#Chapter04.html#tab_4_10) lists the available symbols.


    ![Image](images/9781430246237_Tab04-10.jpg)


    ![Image](images/9781430246237_Tab04-10a.jpg)


    Try out `fmt:formatNumber` with different patterns and see what you get. Some
    symbols are obvious, others, less so.


    Additionally, `fmt:parseNumber` supports the attributes `parseLocale`, `integerOnly`
    (that you must set to `false` when parsing a floating-point number), and `timeZone`.


    Yet, on the other hand, `fmt:formatNumber` supports the attributes `currencyCode`
    (only when `type` is set to `"currency"`), `currencySymbol` (ditto), `groupingUsed`
    (set to `false` if you don’t want a separator between triplets of integer digits),
    `maxIntegerDigits`, `minIntegerDigits`, `maxFractionDigits`, and `minFractionDigits`.
    The last four attributes specify the maximum and minimum number of digits you
    want before and after the decimal point.


    # `fmt:ParseDate`, `fmt:formatDate`, and `fmt:requestEncoding`


    Like `fmt:parseNumber` and `fmt:formatNumber`, `fmt:ParseDate` and `fmt:formatDate`
    can store their result into a scoped variable or send it to the output. Also,
    `fmt:formatDate` is bodyless while `fmt:parseDate` can be either bodyless or bodied.
    Not surprisingly, both actions support the `timeZone` attribute, and the format
    attributes `dateStyle` (with possible values `"full"`, `"long"`, `"medium"`, `"short"`,
    or `"default"`), and `timeStyle` (ditto). The Date-actions also support a `pattern`
    attribute. See [Table 4-11](#Chapter04.html#tab_4_11) for a list of available
    symbols.


    ![Image](images/9781430246237_Tab04-11.jpg)


    ![Image](images/9781430246237_Tab04-11a.jpg)


    Additionally, `fmt:parseDate` supports the attributes `parseLocale`, and `fmt:formatDate`
    supports `type` (with possible values `"date"`, `"time"`, and `"both"`).


    With the remaining `i18n` action, `fmt:requestEncoding`, you specify what character
    encoding you expect for the text that the user types in forms. For example:


    ```

    <fmt:requestEncoding value="UTF-8"/>

    ```


    This action makes sense because the locale of the user might be different from
    the locale of the page. Note that if you develop a custom action that uses the
    method `ServletResponse.setLocale()` to set the locale of the response, it will
    take precedence over the character encoding set in `fmt:requestEncoding`.


