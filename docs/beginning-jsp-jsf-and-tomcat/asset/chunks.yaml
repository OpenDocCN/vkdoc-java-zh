    第 3 行指定输出也是一个 XML 文档。XML 是默认的输出格式，但通过显式地写出它，你还可以要求输出进行缩进。否则，默认情况下，生成的代码将被写在一个非常长的单行上。该元素还允许你指定除
    `ISO-8859-1` 之外的编码。


    `xsl:template` 元素将一个模板关联到一个元素，在第 4 行，你编写 `match="/"` 来指定整个源文档。在第 5–6 行和第 25 行，你将
    `enterprise` 和 `title` 元素写入输出。


    第 7 行到第 24 行之间的循环是你扫描所有 `starship` 元素的地方。在循环内部，你立即使用 `xsl:if` 选择你感兴趣的两艘星舰。在 XSL
    中，你也可以使用我在第 4 章描述 JSTL-core 时遇到的 `choose`/`when`/`otherwise` 结构，但在这种情况下，它并不合适，因为你不需要
    `else`。


    实际的工作在第 9–22 行完成。`xsl:element` 和 `xsl:attribute` 元素分别创建一个新元素和一个新属性，而 `xsl:value-of`
    将数据从源 XML 文件复制到输出。请注意，`select` 属性中的 XPath 表达式是相对于由 `xsl:for-each` 选择的当前元素的。另外，请注意，源和输出之间的唯一区别在第
    17–19 行处理，你将原本在元素体中的内容分配给 `class` 元素的 `name` 属性。`class` 属性 `commissioned` 被简单地忽略，因此它不会出现在输出中。


    `xsl:copy-of` 元素将整个元素复制到输出，包括属性和子元素。如果你只想复制元素标签，可以使用 `xsl:copy`。


    XSL 包含 30 多个元素，但我刚刚描述的那十几个涵盖了你在大多数情况下可能需要的绝大部分功能。你可以在 [`http://www.w3.org/TR/xslt`](http://www.w3.org/TR/xslt)
    找到关于 XSLT 的官方文档。


