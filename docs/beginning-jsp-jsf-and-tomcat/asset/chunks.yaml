    versions of IE). Funnily enough, the gaps disappear if you change the document
    type from strict 1.1 to transitional 1.0 (although with Opera you also need to
    set `table`’s `border` attribute to 0).    #### Using an Image Map with a Table
    or a List    I’ll tell you upfront that this method is also unusable, because
    it only works with Firefox and Opera but not with Chrome or IE9\. I describe it
    here because you should be aware of it, and I can also use it to explain some
    things you need to know anyway. Somewhere on the Web you might find people who
