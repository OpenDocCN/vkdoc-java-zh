    `  </h:panelGroup>`  Notice that the `action` attribute of `h:commandButton` is
    set to a method of a managed bean instead of to a string literal. You encountered
    this mechanism in the section of the last chapter about Action Controllers and
    Action Listeners.    The attribute `binding="#{shopManager.searchTxt}"` shows
    how you can wire the input field to a data object on the server. You can establish
    a similar link with the `value` attribute, as I explained in the previous chapter
    (e.g., see [Listing 7-1](#Chapter07.html#list_7_1)).    The difference is that
    with `binding`, you establish a two-way link, which lets your backing bean modify
    the value of the field, while with `value`, the backing bean cannot modify the
    data entered by the user. The `shopManager` bean doesn’t need to modify the search
    string entered in `LeftMenu.jspx`, but you still use `binding` for reasons that
    will become clear in a moment.    As with the shopping cart in `TopMenu.jspx`,
    the attribute `immediate="true"` tells JSF that the action should be executed
    during Apply Request Values, rather than during Invoke Application, which is the
    default for all actions. In this way, you can be sure that the user is always
    able to resume shopping from any page, even if it contains invalid input fields
    (e.g., from the checkout page with empty fields).    This immediate execution
    of the search action is why you need to use the `binding` attribute in the `h:inputText`
    component. With the `value` attribute, you could access the search string with
    the method `getValue`, but only during Invoke Application, after Process Validation
    and Update Model Value have done their job. This would have been too late, because,
    as I’ve just explained, the search action takes place during Apply Request Values.
    By using the `binding` attribute, you make available to the shop manager *the
    whole h:inputText component*. As a result, you can invoke the method `getSubmittedValue`
    (see line 120 of [Listing 8-5](#Chapter08.html#list_8_5)) already during Apply
    Request Value, when the search action is executed.    The attribute `required="true"`
    tells JSF that it is invalid for the user to leave the field empty (although it
    accepts spaces), and `requiredMessage` defines the corresponding error message.
    If you omit the `requiredMessage` attribute, the default error message is something
    like this:  `j_id_jsp_548875039_1:address: Validation Error: Value is required.`  Before
    completing the study of LeftMenu.jspx, we should look at the `ShopManager` Java
    bean, which I have already mentioned a couple of times.    #### The Shop Manager    The
    shop manager is a managed bean defined in the session scope.    In the previous
    section, I said that the following two attributes realize the linking of user
    inputs and server entities:  `binding="#{shopManager.searchTxt}"` `action="#{shopManager.searchBooks}"`  To
    understand exactly how this works, let’s go through the relevant parts of `ShopManager.java`,
    as shown in [Listing 8-5](#Chapter08.html#list_8_5).    ***Listing 8-5.** eshopf
    fragment: Searching for Books in ShopManager.java*  `014: private List<Book>    books;`
    `...` `023: private HtmlInputText searchTxt = new HtmlInputText();` `...` `103:
    public HtmlInputText getSearchTxt() {` `104:   return searchTxt;` `105:   }` `...`
    `118: public String searchBooks() {` `119:   categoryName=null;` `120:   String
    searchKeyword = (String)searchTxt.getSubmittedValue();` `121:   books = dataManager.getSearchResults(searchKeyword);`
