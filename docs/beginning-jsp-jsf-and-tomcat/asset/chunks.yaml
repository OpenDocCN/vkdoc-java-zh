    ![Image](img/9781430246237_Tab07-02a.jpg)


    我预计你会发现表 7-2 中列出的许多标签令人费解。在接下来的章节之后，你将能够理解其中的大部分，但某些标签的使用肯定超出了本书的范围。


    如果你对 facet 是什么感到好奇，我可以告诉你，它是特定于某个特定组件的命名子组件。例如，`h:gridPanel`（它渲染一个 HTML 表格）支持两个
    facet：`header` 和 `footer`。如果你在 `h:gridPanel` 体内的任何位置包含 `<f:facet "header"><h:outputText
    value="Whatever"/></f:facet>`，渲染后的表格将有一个标题 "Whatever"。


