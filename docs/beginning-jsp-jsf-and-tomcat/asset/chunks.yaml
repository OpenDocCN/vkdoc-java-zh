    ##### 无体标签


    清单 4-16 展示了标签处理器 `WeekdayTag.java` 的标签文件版本，该处理器曾在清单 4-11 中出现过。


    ***清单 4-16.** weekday.tag*


    `<%@tag import="java.util.Date, java.text.SimpleDateFormat"`

    `       import="java.util.Calendar, java.util.GregorianCalendar"%>`

    `<%@attribute name="date" required="false"%>`

    `<%`

    `  final String[] WD = {"","Sun","Mon","Tue","Wed","Thu","Fri","Sat"};`

    `  GregorianCalendar cal = new GregorianCalendar();`

    `  if (date != null && date.length() > 0) {`

    `    SimpleDateFormat fmt = new SimpleDateFormat("yyyy-MM-dd");`

    `    fmt.setLenient(true);`

    `    Date d = fmt.parse(date);`

    `    cal.setTime(d);`

    `    }`

    `  out.print(WD[cal.get(Calendar.DAY_OF_WEEK)]);`

    `  %>`


    标签文件中的 `tag` 指令替代了 JSP 页面中的 `page` 指令，而 `attribute` 指令则允许你定义输入参数。由于 Tomcat 会为我们处理标签异常，我移除了
    `try`/`catch` 结构，这无疑使代码更具可读性。另一个简化之处在于将结果发送到输出，因为在标签文件中，隐式变量 `out` 使得无需调用 `pageContext.getOut()`。


    清单 4-17 展示了如何修改清单 4-12 中的 `weekday.jsp` 以使用标签文件。


    ***清单 4-17.** weekday_t.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%@taglib tagdir="/WEB-INF/tags" prefix="wow"%>`

    `<% String d = request.getParameter("d"); %>`

    `<html><head><title>weekday bodyless tag</title></head><body>`

    `weekday today: <wow:weekday/><br/>`

    `weekday <%=d%>: <wow:weekday date="<%=d%>"/><br/>`

    `</body></html>`


    如你所见，唯一的区别在于 `taglib` 指令的属性 `uri="/WEB-INF/tlds/wow.tld"` 已变为 `tagdir="/WEB-INF/tags"`。


    若要保留 `uri` 属性，你需要在 TLD 中声明标签文件，如清单 4-18 所示。


    ***清单 4-18.** 用于标签文件的 wow.tld*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<taglib`


    `    xsi:schemaLocation="http://java.sun.com/xml/ns/javaee ~CCC`

    `http://java.sun.com/xml/ns/j2ee/web-jsptaglibrary_2_1.xsd"`

    `    version="2.1">`

    `  <description>我的标签文件库</description>`

    `  <tlib-version>1.0</tlib-version>`

    `  <short-name>wow</short-name>`

    `  <uri>tagFiles</uri>`

    `  <tag-file>`

    `    <description>显示星期几</description>`

    `    <display-name>weekday</display-name>`

    `    <name>weekday</name>`

    `    <path>/WEB-INF/tags/weekday.tag</path>`

    `    </tag-file>`

    `  </taglib>`


    然后，在 `weekday_t.jsp` 的 `taglib` 指令中，你可以将 `tagdir="/WEB-INF/tags"` 替换为 `uri="tagFiles"`。


    作为 `variable` 指令的一个示例，将 `weekday.tag` 中的这一行


    `out.print(WD[cal.get(Calendar.DAY_OF_WEEK)]);`


    替换为以下两行：


    `%><%@variable name-given="dayw" scope="AT_END"%><%`

    `jspContext.setAttribute("dayw", WD[cal.get(Calendar.DAY_OF_WEEK)]);`


    然后，该操作会将包含星期几的字符串保存到属性 `dayw` 中，而不是直接发送到输出。要在 `weekday_t.jsp` 中显示该操作的结果，请在执行操作后插入以下表达式元素：


    `<%=pageContext.getAttribute("dayw")%>`


    正如你将在本章后面看到的，你也可以用更简洁的 EL 表达式 `${dayw}` 来替代这个略显笨拙的表达式元素。


    ##### 有体标签


    清单 4-19 展示了与标签处理器 `WeekdayBodyTag.java` 等效的标签文件，该处理器曾在清单 4-13 中出现过。我通过修改实现无体标签的标签文件
    `weekday.tag`（如清单 4-16 所示）编写了它。清单 4-20 是与 weekday_b.jsp（参见清单 4-15）等效的标签文件，后者调用了有体标签处理器。我通过修改清单
    4-17 中使用无体标签文件的 `weekday_t.jsp` 编写了它。


    ***清单 4-19.** weekdayBody.tag*


    `<%@tag import="java.util.Date, java.text.SimpleDateFormat"`

    `       import="java.util.Calendar, java.util.GregorianCalendar"%>`

    `<jsp:doBody var="dateAttr"/>`

    `<%`

    `  String date = (String)jspContext.getAttribute("dateAttr");`

    `  final String[] WD = {"","Sun","Mon","Tue","Wed","Thu","Fri","Sat"};`

    `  GregorianCalendar cal = new GregorianCalendar();`

    `  if (date.length() > 0) {`

    `    SimpleDateFormat fmt = new SimpleDateFormat("yyyy-MM-dd");`

    `    fmt.setLenient(true);`

    `    Date d = fmt.parse(date);`

    `    cal.setTime(d);`

    `    }`

    `  out.print(WD[cal.get(Calendar.DAY_OF_WEEK)]);`

    `  %>`


    标准动作元素 `jsp:doBody` 会计算 `weekdayBody` 动作的体，并将其输出作为字符串存储到页面作用域属性 `dateAttr` 中。脚本段的第一行随后将该属性复制到名为
    `date` 的 JSP 变量中。之后，有体标签文件与无体标签文件完全相同。这并非绝对必要，但后续代码会两次访问日期，首先检查它是否为空，然后解析它。我不喜欢两次调用
    getAttribute 方法。这看起来不够整洁。


    如果你省略属性 `var`，`doBody` 会将体的结果发送到输出；如果你将 `var` 替换为 `varReader`，结果将存储为 `java.io.Reader`
    对象，而不是 `java.lang.String`；如果你添加属性 `scope`，你可以指定将 `var` / `varReader` 定义为 `request`、`session`
    或 `application` 属性，而不是在 `page` 作用域中。


    你应该知道 `jsp:invoke` 与 `jsp:doBody` 非常相似，但它操作的是 JSP 片段而不是动作体。例如，通过在标签文件中编写以下两行


    `<%@attribute name="fragName" fragment="true"%>`

    `<jsp:invoke fragment="fragName"/>`


    你可以向它传递一个 JSP 片段。与 doBody 一样，`invoke` 也接受属性 `var`、`varReader` 和 `scope`。这两个标准动作只能在标签文件中使用。


    ***清单 4-20.** weekday_bt.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%@taglib tagdir="/WEB-INF/tags" prefix="wow"%>`

    `<html><head><title>weekday bodied tag</title></head><body>`

    `weekdayBody today: <wow:weekdayBody></wow:weekdayBody><br/>`

    `weekdayBody ${param.d}: <wow:weekdayBody>${param.d}</wow:weekdayBody><br/>`

    `</body></html>`


    ##### tag 指令


    在上一节中，你遇到了 `tag` 指令的 `import` 属性。表 4-2 列出了其他可用的属性。它们都是可选的。


    ![Image](img/9781430246237_Tab04-02.jpg)


    ##### attribute 指令


    你已经遇到了属性 `name` 和 `required`。表 4-3 简要描述了其余属性（均为可选）。


    ![Image](img/9781430246237_Tab04-03.jpg)


    ![Image](img/9781430246237_Tab04-03a.jpg)


    还有两组与 JavaServer Faces 相关的互斥属性对：`deferredValue` / `deferredValueType` 和 `deferredMethod`
    / `deferredMethodSignature`。我们不要本末倒置。

    '
- fmt: '##### The `variable` Directive


    [Table 4-4](#Chapter04.html#tab_4_4) briefly describes all the attributes.


    ![Image](images/9781430246237_Tab04-04.jpg)


    While `name-given` provides the name of a JSP attribute (which, as you will see
    in the next section, coincides with the name of an EL variable), `name-from-attribute`
    provides the name of another JSP attribute containing the name of the JSP attribute
    you are interested in. Then, `alias` provides the name of an EL variable local
    to the tag file that Tomcat synchronizes with the JSP attribute. For example,
    if you declare:


    ```

    <%@variable alias="ali" name-from-attribute="attrName"%>

    ```


    Tomcat, before continuing execution of the tag file, makes available to it the
    page-scoped attribute named `ali` and sets it to the value of the attribute named
    `attrName`. This name redirection makes possible for JSP pages that use differently
    named attributes to use the same tag file. For example, `a.jsp` might include
    the line:


    ```

    session.setAttribute("greet", "Good morning!");

    ```


    and `b.jsp` might have:


    ```

    application.setAttribute("novel", "Stranger in a Strange Land");

    ```


    If `a.jsp` contains:


    ```

    pageContext.setAttribute("attrName", "greet");

    ```


    and `b.jsp`:


    ```

    pageContext.setAttribute("attrName", "novel");

    ```


    they can both invoke the tag file that includes the `variable` directive shown
    above. The tag file will then have an `ali` attribute containing `"Good morning!"`
    in the first case and `"Stranger in a Strange Land"` in the second case.


    The attribute `scope` tells when Tomcat creates or updates the attribute in the
    calling page with the value of the attribute that is local to the tag file (perhaps
    a name like *synchronization* would have been clearer than `scope`). With `AT_BEGIN`,
    Tomcat does it before the tag file invokes a segment or immediately before exiting
    the tag file; with `NESTED`, only before invoking a segment; and with `AT_END`,
    only before leaving the tag file. Additionally, with `NESTED`, Tomcat saves the
    value of the calling-page attribute upon entering the tag file and restores it
    upon leaving it. But this only if an attribute with the given name exists in the
    calling page before entering the tag file.


    ### JSTL and EL


    Many developers have implemented similar custom actions to remove or at least
    reduce the need for scripting elements. Eventually, a new effective standard known
    as JSTL was born.


    However, JSTL is of little use without the Expression Language (EL), which lets
    you access and manipulate objects in a compact and efficient way and can be used
    within the body of actions. I will first introduce you to EL, so that you’ll be
    well prepared to understand the JSTL examples.


    But first of all, you have to download two libraries from [`http://jstl.java.net/download.html`](http://jstl.java.net/download.html).
    If you follow the two links "`JSTL API`" and "`JSTL Implementation`", you will
    reach two pages from which you can download respectively `javax.servlet.jsp.jstl-api-1.2.1.jar`
    and `javax.servlet.jsp.jstl-1.2.1.jar` (or the equivalent files for the version
    that will be current when you will be reading this book).


    Copy them to `%CATALINA_HOME%\lib\` and restart Tomcat.


    #### JSP Expression Language


    EL was introduced in JSP 2.0 as an alternative to the scripting elements. You
    can use EL expressions in template text and also in action attributes specified
    to be capable of accepting runtime expressions. You will find a good reference
    at [`http://java.sun.com/products/jsp/syntax/2.0/syntaxref207.html#1010522`](http://java.sun.com/products/jsp/syntax/2.0/syntaxref207.html#1010522).


    ##### EL Expressions


    EL supports two representations: `${expr}` and `#{expr}`. To explain when you
    can or should use them, I must first clarify the distinction between lvalues and
    rvalues.


    The *l* stands for *left*, and the *r* stands for *right*. These values refer
    to the fact that in most computer languages, the assigned value is on the right-hand
    side of an assignment statement, while the value to be assigned to it is on the
    left-hand side. For example, the Java statement:


    ```

    ka[k] = j*3;

    ```


    means that the result of the evaluation of `j*3` (an rvalue) is to be assigned
    to the value resulting from the evaluation of `ka[k]` (an lvalue). Clearly, an
    lvalue must be a reference to something you can assign values to (a variable or
    some attribute of an object), while there is no such restriction on rvalues.


    Suppose that you have a page with a form. Wouldn’t it be nice if you could specify
    *directly in the input elements of the form* the references to where the user’s
    inputs should be stored? For example, it’d be nice to specify something like `<input
    id="firstName" value="`*`variableName`*`">`, with *`variableName`* specifying
    where you want to store the input typed by the user. Then, when the form is submitted,
    there should be a mechanism to automatically take the user’s input and store it
    where you specified. Perhaps you could also define a new attribute of the `input`
    element to provide a validating method. Inside the `input` element, you would
    then already have everything you need to accept the user’s input, validate it,
    and store it away.


    This sounds great, but if you set the `value` attribute of the `input` element
    to `${formBean.firstName}`, this evaluates to an rvalue. The value of the `firstName`
    attribute of `formBean` is assigned to the `value` attribute of the `input` element,
    and that’s it. You need a way of *deferring* evaluation of `formBean.firstName`
    and use it as an *lvalue* when you really need it—that is, when you handle the
    form that was submitted.


    You achieve that by replacing the `$` before the EL braces with a `#`. The `#`
    tells Tomcat to defer evaluation and use its result as an lvalue or an rvalue,
    depending on the context. EL expressions with the dollar sign are evaluated like
    everything else. In any other aspect, parsing and evaluation of the two representations
    are identical. You will use the `#`-representation when we will talk about JSF.
    For now, you can learn about EL using the `$`-representation.'
