    `name` attribute to the `map` element. It is needed for Chrome. With the three
    other browsers, the `id` attribute is sufficient. [Figure A-24](#AppendixA.html#fig_A_24)
    shows the final result.  ![Image](images/9781430246237_AppA-24.jpg)  ***Figure
    A-24.** Screen tip pointing to a disabled area of an image map*    #### The Bottom
    Line    I have tested all methods described in the previous sections with the
    four most widely used browsers, and validating against XHTML 1.1, XHTML 1.0 strict,
    XHTML transitional, HTML 4.01 strict, and HTML 4.01 transitional. The only method
    that works in all situations is the one based on the `area` element. It is also
    the most flexible method and doesn’t require you to split the image.    For simple
    maps, you can use the simple method of placing rectangular sections of the image
    in the cells of a table, as long as you validate against transitional standards
    of either XHTML 1.0 or HTML 4.01\. But I recommend that you stick to the `area`-based
    method.    ### Cascading Style Sheets    According to Wikipedia, *Cascading Style
    Sheets (CSS) is a [...] language used for describing [...] the look and formatting
    [...] of a document written in a markup language. Its most common application
    is to style web pages written in HTML and XHTML*.    I reproduced the core of
    Wikipedia’s definition because I couldn’t have said it better.    Some time ago,
    I found somewhere on the W3C web site the following description, which is also
    worth reproducing: *CSS2 supports media-specific style sheets so that authors
    may tailor the presentation of their documents to visual browsers, aural devices,
    printers, braille devices, handheld devices, etc. This specification also supports
    content positioning, downloadable fonts, table layout, features for internationalization,
    automatic counters and numbering, and some properties related to user interface*.    The
    CSS standard (see [`http://www.w3.org/Style/CSS/current-work.en.html`](http://www.w3.org/Style/CSS/current-work.en.html)
    for the latest developments) doesn’t have versions, but levels, with each level
    adding features and refining the definition of the previous one. The latest CSS
    specification is CSS2.1 ([`http://www.w3.org/TR/CSS21/`](http://www.w3.org/TR/CSS21/)).    ####
    Style Syntax    Here is a valid CSS style definition (also called a CSS rule):  `h1,
    h2, h3 {` `  font-family: "sans serif";` `  color: red` `  }`  Each rule consists
    of one or more comma-separated selectors (e.g., `h1`) followed by semicolon-separated
    declarations enclosed in braces. Each declaration consists of a property name
    (e.g., `color`) and a property value (e.g., `red`).You can freely insert spaces
    and newlines to make the styles more readable.    [Listing A-15](#AppendixA.html#list_A_15)
    shows how you can define several paragraph styles and use them separately or together.    ***Listing
    A-15.** p_styles.html*  `<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"`
    `  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">` `<html >` `<head>` `  <title>Styled
    paragraphs</title>` `  <style type="text/css">` `    p {font-size: 130%}` `    p.bold
    {font-weight: bold}` `    p.italic {font-style: italic}` `    p.p123 {font-size:
    100%; font-weight: normal; font-style: normal}` `    </style>` `  </head>` `<body>`
    `<p>This is a default paragraph</p>` `<p class="bold">This is a bold paragraph</p>`
    `<p class="bold italic">This is a bold italic paragraph</p>` `<p class="bold p123
    italic">This is a normal paragraph</p>` `</body>` `</html>`  Notice that to assign
    a paragraph (or any element) to more than one style class, you only need to use
    the names of the classes separated by spaces. Also, notice how you can use the
    class `p.p123` to override the font size, weight, and style as defined in the
    preceding styles. The class `p.p123` takes precedence over all others, because
    you defined it last within the `style` element in `head`. The order in which the
    class names appear in the `class` attribute of the paragraphs is irrelevant. [Figure
    A-25](#AppendixA.html#fig_A_25) shows the output of `p_styles.html`.  ![Image](images/9781430246237_AppA-25.jpg)  ***Figure
    A-25.** Styled paragraphs*    If you omit the element name when defining a class,
    the style will apply to all the elements. For example, you can use this class
    with all elements rendering text:  `.bold {font-weight: bold}`  ![Image](images/square.jpg)
    **Caution**  Class names must start with a letter.    The file `eshop project\eshop\css\eshop.css`
    that you find in the software pacakage for [Chapter 3](#Chapter03.html) provides
    several examples of style rules.    Now that you know the syntax of a style rule
    and have seen a couple of examples, you shouldn’t have any problem using other
    properties. They’re clearly described in the standard, and several web sites provide
    extensive descriptions.    #### Placing Styles    You can define styles in three
    places: inline (as attributes within element start tags), internally (in the `style`
    element inside the `head`), and externally (in separate style sheet files). Note
    that inline styles override internal styles, and internal styles override external
    styles.    You can define inline styles in most elements, as the following example
    shows:  `<p style="color: red; font-weight: bold">bold and red</p>`  This is appropriate
    when you want to use a style only once or for testing purposes. It wouldn’t make
    sense to repeat the same style over and over again in several elements.    Styles
    defined in the `head` of an HTML document by means of the `style` element, as
    I showed you in [Listing A-15](#AppendixA.html#list_A_15), apply to the whole
    document. This makes sense for styles that you want to use exclusively in a single
    document. However, if you intend to reuse the styles in more than one document,
    you should define them in a separate file.    By defining styles in a CSS file,
    you maximize maintainability of complex applications. You have seen examples of
    this technique when I described the `eshop`, `eshopx`, and `eshopf` applications.
    You normally include a CSS file in an HTML document by writing in the document’s
    `head` element an element like this:  `<link rel="stylesheet" type="text/css"
    href="filename.css"/>`  Note that the browser loads all style definitions one
    after the other in the order in which it encounters them. Therefore, if you include
    more than one file and/or if you mix in the `head` element file inclusions and
    `style` elements, you can easily end up with conflicting styles rules.    You
    can use the optional attribute `media` of the `style` element to specify the destination
    of the style information. See [Table A-8](#AppendixA.html#tab_A_8) for a list
    of valid media values.    ![Image](images/9781430246237_Tab0A-08.jpg)    ####
    HTML Elements div and span    You can use both `div` and `span` to apply styles
    to groups of elements, as in the following example:  `<div style="color:red">`
    `  <p>a red paragraph</p>` `  <p>a red paragraph <span style="color:green">with
    green</span> in it</p>` `  </div>`  While `div` can contain paragraphs, `<span>`
    cannot. This is because `div` identifies a block and can therefore contain other
    block-level elements (such as `p` and `table`), while `span` can only contain
    inline-level elements (such as `a` and `img`). So far, so good. However, the standards
    don’t clearly distinguish between block level and inline-level elements. Moreover,
    some elements are sometimes considered to be block-level and sometimes inline-level.
    Usually, the browsers display a new line before rendering a block level element,
    but this also is not always true. The elements that are certainly block-level
    (and *cannot* therefore appear inside `span`, are `address`, `blockquote`, `dl`,
    `fieldset`, `form`, `h1` to `h6`, `hr`, `noframes`, `noscript`, `ol`, `p`, `pre`,
    `table`, and `ul`. The elements that are certainly inline-level (and `can` therefore
    appear inside `span)`, are `a`, `abbr`, `acronym`, `b`, `bdo`, `big`, `br`, `cite`,
    `code`, `dfn`, `em`, `i`, `img`, `input`, `kbd`, `label`, `q`, `samp`, `select`,
    `small`, `strong`, `sub`, `sup`, `textarea`, `tt`, and `var`. For all the others,
    I cannot give you a clear indication.    I recommend using `div` when you need
    to apply styles to sections of documents and `span` only to style individual strings.
    To apply styles to a single element (e.g., a `table`), you should define the `style`
    attribute directly in the start tag of the element itself. In fact, if you use
    several styles, defining the corresponding classes in a separate style-sheet file
    would make your code more maintainable.    ![Image](images/square.jpg) **Caution**  To
    use a feature that is not identically rendered by the major browsers, you might
    decide to rely on the `user-agent` information available via JSP to determine
    what browser issued the request, and then adjust your HTML output accordingly.
    But I think you will be happier in the long run if you just forget that particular
    feature.    ### Using a Style Sheet to Implement Tabs    Web sites often use tabs
    like those shown in [Figure A-26](#AppendixA.html#fig_A_26) to let the users select
    different subjects. In this section, I’ll show you how to use style sheets to
    implement such tabs in a simple and elegant way.  ![Image](images/9781430246237_AppA-26.jpg)  ***Figure
    A-26.** Tabs*    [Listing A-16](#AppendixA.html#list_A_16) shows the JSP document
    used to generate [Figure A-26](#AppendixA.html#fig_A_26). To view it, copy the
    folder named `tabs` to the usual test folder `webapps\ROOT\tests\` and type in
    the browser the URL [`http://localhost:8080/tests/tabs/tabs.jsp`](http://localhost:8080/tests/tabs/tabs.jsp).    ***Listing
    A-16.** tabs.jsp*  `<%@page language="java" contentType="text/html"%>` **`<%`**
    **`  final char HOME = ''H'', TEST = ''T'', NUM = ''1'';`** **`  String     s
    = request.getParameter("t");`** **`  char       p = (s != null && s.length() >
    0) ? s.charAt(0) : HOME;`** **`  %>`** `<html>` `<head>` `  <title>Tabs with CSS</title>`
    `  <link rel="stylesheet" type="text/css" href="tabs.css"/>` `  </head>` `<body>`
    `<p>This appears above the tabs</p>` `<div class="tabs">` `  <ul>` `    <li <%
    if (p == HOME) out.print("id=\"on\""); %>>` `      <a href="tabs.jsp?t=<%=HOME%>"><span>Home</span></a>`
    `      </li>` **`    <li <% if (p == TEST) out.print("id=\"on\""); %>>`** **`      <a
    href="tabs.jsp?t=<%=TEST%>"><span>Test</span></a>`** **`      </li>`** `    <li
    <% if (p == NUM) out.print("id=\"on\""); %>>` `      <a href="tabs.jsp?t=<%=NUM%>"><span>123456789
    abcdef</span></a>` `      </li>` `    </ul>` `  </div>` `<p>` `  &nbsp;<br/>`
    `  This appears below the tabs` `  </p>` `</body>` `</html>`  The first section
    in bold is a scriptlet that sets the character variable `p` to the first character
    found in the input parameter `t`. If the input parameter is missing or empty,
    the scriptlet sets `p` to `''H''`.    Each tab is implemented as an item of an
    unnumbered list. I’ve highlighted the item corresponding to the `Test` tab. This
    scriptlet writes `id="on"` to the output when the first character of the input
    parameter matches the character designated to identify the `Test` tab:  `<% if
