    `JspWriter` 类包含一些字段的定义。你不需要它们，但提及它们让我有机会给你一些有用的信息。


    `autoFlush` 字段告诉你，当 `JspWriter` 的缓冲区满时，是自动刷新，还是溢出时抛出 `IOException`。`out` 的默认值是
    `true`，这意味着如果缓冲区满了，Tomcat 会向客户端发送部分响应。你可以使用指令 `<%@page autoFlush="false"%>` 将其设置为
    `false`，如果你期望客户端是一个应用程序，就应该这样做。当客户端是浏览器时，以“块”的形式发送响应是完全没问题的，但应用程序可能期望以单个块的形式接收响应。如果你期望客户端是一个应用程序并将
    `autoFlush` 设置为 `false`，你还应该使用 `<%@page buffer="size-in-kb"%>`，以确保输出缓冲区足够大，能够存储你最大的响应。`autoFlush`
    字段是受保护的，但你可以通过 `isAutoFlush` 方法获取其值。


    `bufferSize` 字段是输出缓冲区的大小（以字节为单位）。`out` 的默认值是 8,192 字节。它是一个受保护的字段，但你可以通过 `getBufferSize`
    方法获取其值。


    还有三个常量整数字段（`DEFAULT_BUFFER`、`NO_BUFFER` 和 `UNBOUNDED_BUFFER`，类型为 `public static
    final int`），但你可以安全地忽略它们。仅作记录，它们分别用于测试 `JspWriter` 是否被缓冲（并使用默认缓冲区大小）、是否未被缓冲、或者是否使用无界缓冲区进行缓冲。除了你没有变量或属性来对照这些值进行检查之外，无论如何，`getBufferSize`
    方法都能很好地为你服务（如果输出未被缓冲，则返回 `0`）。


    你已经在几个示例中看到，你可以使用 `print` 和 `println` 写入输出缓冲区。作为参数，你可以使用 Java 的八种原始数据类型（`boolean`、`char`、`byte`、`short`、`int`、`long`、`float`
    和 `double`）、一个字符数组（`char[]`）、一个对象（`java.lang.Object`）或一个字符串（`java.lang.String`）。在实践中，你通常会使用
    `String` 参数，如下例所示：


    `out.print("fun(" + arg + ") = " + fun(arg));`


    这里，`fun(arg)` 被执行，`arg` 和 `fun(arg)` 返回的值都会被自动转换为字符串，以便与其余部分连接。


    `write` 方法继承自 `java.io.Writer`，它将字符数组或字符串的一部分发送到输出。例如，如果 `cbuf` 是一个 `char[]` 类型的变量，`out.write(cbuf,
    offs, len)` 将写入 `cbuf` 的一部分，其中 `offs` 是第一个字符的偏移量，`len` 是要复制的字符数。你可以通过以下代码提取数组的一部分，然后使用
    `print` 打印它来达到同样的效果：


    `char[] portion = java.util.Arrays.copyOfRange(cbuf, offs, offs+len-1)`


    然而，这样效率较低，因为你首先要复制原始数组的一部分——而使用 `write` 时则不需要这个操作。


    你不太可能使用其他任何方法，并且绝对应该避免使用 `close`，它会关闭输出流。Tomcat 会在安全的时候关闭流，你不需要去干预它。

