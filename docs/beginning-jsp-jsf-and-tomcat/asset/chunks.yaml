    If you type in your browser [`http://localhost:8080/tags/weekday.jsp?d=2012-12-25`](http://localhost:8080/tags/weekday.jsp?d=2012-12-25),
    you get two lines, such as `Today: Wed` and `2012-12-25: Tue`. If you type the
    URL without the query, the second line of the output becomes `null: Wed`. On the
    other hand, if you type a query with a bad date, such as `d=2012-1225`, Tomcat
    shows you an error page with a back trace that begins as follows:


    `org.apache.jasper.JasperException: javax.servlet.ServletException:` ![Image](images/U002.jpg)

    `javax.servlet.jsp.JspException:` ![Image](images/U002.jpg)

    `    Date parsing failed: Unparseable date: "2012-1225"`


    To try out the example, you can simply copy the folder named `tags` from the code
    of [Chapter 4](#Chapter04.html) to Tomcat’s `webapps` folder. You can then execute
    the example by typing in your browser `localhost:8080/tags/weekday.jsp`.


    Note that if you modify the tag handler, you need to recompile it from the command
    line. To do so, type the following two commands:


    `cd c:\program files\apache software foundation\tomcat\webapps\tags\web-inf\classes\tags`

    `javac -classpath "C:\Program Files\Apache Software Foundation\Tomcat\lib\jsp-api.jar"`
    ![Image](images/U002.jpg)

    `  WeekDayTag.java`


    You then also have to restart Tomcat.


    #### Bodied Custom Actions


    To show you the differences from the bodyless action, I will implement a version
    of the `weekday` action that expects the date in its body instead of in an attribute:


    `<wow:weekdayBody>`*`date`*`</wow:weekdayBody>`'
