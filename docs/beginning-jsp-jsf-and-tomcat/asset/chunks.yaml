    ### 隐式对象


    Tomcat 定义的最常用的隐式对象是 `out` 和 `request`，其次是 `application` 和 `session`。但为了便于参考，我将按字母顺序逐一介绍它们。


    无论你是在 JSP 页面中创建对象，还是由 Tomcat 隐式为你创建，如果你不知道它们的作用域，就无法正确使用它们。共有四种可能的作用域。按通用性递增的顺序，它们分别是：*page*、*request*、*session*
    和 *application*。你将在后续页面中了解更多关于它们的信息。


    通常，如果你不确定某个特定对象实例化的是哪个类，你可以始终使用以下表达式来显示其名称：


    `<%=the_misterious_object.getClass().getName()%>`


    #### `application` 对象


    `application` 对象是 `org.apache.catalina.core.ApplicationContextFacade` 类的一个实例，Tomcat
    定义该类以实现 `javax.servlet.ServletContext` 接口。它提供了对 Web 应用程序内共享资源的访问。例如，通过向 `application`
    添加一个属性（可以是任何类型的对象），你可以确保构成 Web 应用程序的所有 JSP 文件都能访问它。


    ##### 示例：使用属性启用和禁用条件代码


    使用 JSP 的一个优点是，Web 服务器无需在每次客户端请求页面时都重新解释该页面的源文件。JSP 容器会将每个 JSP 页面翻译成一个 Java 文件并将其编译成一个类，但这仅在更新
    JSP 源文件时才会发生。你可能希望能够出于调试或其他目的，在不编辑一个或多个文件并强制 Tomcat 在切换开关时重新编译它们的情况下，打开或关闭某些特定功能。要实现此效果，你只需将相关功能包裹在一个条件语句中，如下所示：


    `if (application.getAttribute("do_it") != null) {`

    `  /* ...在此处放置你的“可切换”功能... */`

    `  }`


    你还需要在应用程序中包含两个小的 JSP 页面。第一个用于设置属性 `do_it`（参见清单 2-1），第二个用于移除它（参见清单 2-2）。


    ***清单 2-1.** do_it.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<html><head><title>条件代码 开启</title></head>`

    `<body>条件代码`

    `<%`

    `  application.setAttribute("do_it", "");`

    `  if (application.getAttribute("do_it") == null) out.print("未");`

    `  %>`

    `已启用</body></html>`


    ***清单 2-2.** do_it_not.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<html><head><title>条件代码 关闭</title></head>`

    `<body>条件代码`

    `<%`

    `  application.removeAttribute("do_it");`

    `  if (application.getAttribute("do_it") == null) out.print("未");`

    `  %>`

    `已启用</body></html>`


    当你想要启用条件代码时，只需在浏览器中输入 `do_it.jsp` 的 URL。在你通过输入 `do_it_not.jsp` 的 URL 禁用它或重启 Tomcat
    之前，条件代码将在你应用程序的所有页面中保持启用状态。请注意，在示例中，`do_it.jsp` 仅将属性 `do_it` 设置为一个空字符串，但你也可以定义不同的值，以便更精细地选择要激活的代码。


    请注意，你可以使用相同的机制来开启和关闭 HTML 代码。


    ##### 示例：使用属性控制日志记录


    你可能会发现能够动态控制某些事件记录到特定文件的功能非常有用。为此，你需要在应用程序中包含两个 JSP 文件（参见清单 2-3 和 2-4）。


    ***清单 2-3.** log_on.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%@ page import="MyClasses.*"%>`

    `<html><head><title>开启日志</title></head><body>`

    `<%`

    `  MyLog log = (MyLog)application.getAttribute("logFile");`

    `  if (log == null) {`

    `    try {`

    `      log = new MyLog("logs/mylog.log");`

    `      application.setAttribute("logFile", log);`

    `      log.println("日志记录已启用");`

    `      out.println("日志记录已启用");`

    `      }`

    `    catch (Exception e) {`

    `      out.println(e.getMessage());`

    `      }`

    `    }`

    `  else {`

    `    log.println("尝试启用日志记录");`

    `    out.println("日志记录已处于启用状态");`

    `    }`

    `  %>`

    `</body></html>`


    ***清单 2-4.** log_off.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%@ page import="MyClasses.*"%>`

    `<html><head><title>关闭日志</title></head><body>`

    `<%`

    `  MyLog log = (MyLog)application.getAttribute("logFile");`

    `  if (log != null) {`

    `    log.println("日志记录已禁用");`

    `    log.close();`

    `    application.removeAttribute("logFile");`

    `    }`

    `  %>`

    `完成。`

    `</body></html>`


    在确认没有名为 `logFile` 的应用程序属性后，`log_on.jsp` 实例化 `MyLog` 类并将该对象保存为一个名为 `logFile` 的应用程序属性。之后，你可以轻松地从同一应用程序的任何
    JSP 文件中向日志文件写入条目，如清单 2-5 所示。


    ***清单 2-5.** check_logging.jsp*


    `<%@ page import="MyClasses.*"%>`

    `<%`

    `  MyLog log = (MyLog)application.getAttribute("logFile");`

    `  if (log != null) log.println("这是我的日志条目");`

    `  %>`


    在 `log_off.jsp` 中，确认 `logFile` 属性存在后，你关闭日志文件并移除该属性。随后，该应用程序中所有 JSP 的日志记录功能都将被禁用，因为任何获取
    `logFile` 属性的尝试都将返回 `null`。你仍然需要的最后一块拼图是如何创建 `MyLog` 类。


    这也同样简单：


    > *   打开文件夹 `%CATALINA_HOME%\webapps\ROOT\WEB-INF\`。

    > *   如果 `WEB-INF` 没有名为 `classes` 的子文件夹（如果你安装的是全新的 Tomcat，应该没有），则创建一个。

    > *   在新创建的文件夹内，创建一个名为 `MyClasses` 的文件夹，并将清单 2-6 中所示的 `MyLog.java` 文件放入其中。

    > *   打开一个命令行窗口，使用 `javac` 编译 `MyLog.java`，如第 1 章中编译 `Exec_http.java` 所述。

    > *   重启 Tomcat。


    ***清单 2-6.** MyLog.java*


    `/* MyLog.java - 实现一个日志类 */`

    `package MyClasses;`

    `import java.util.Date;`

    `import java.text.SimpleDateFormat;`

    `import java.io.FileWriter;`

    `import java.io.PrintWriter;`

    `import java.io.IOException;`

    `public class MyLog {`

    `  private static final SimpleDateFormat TIME_FMT =`

    `                       new SimpleDateFormat("yyyy-MM-dd HH:mm:ss:SSS");`

    `  private static PrintWriter log = null;`

    `  public MyLog(String logpath) throws IOException {`

    `    log = new PrintWriter(new FileWriter(logpath, true));`

    `    }`

    `  public static synchronized void println(String s) {`

    `    log.println(TIME_FMT.format(new java.util.Date()) + " - " + s);`

    `    log.flush();`

    `    }`

    `  public static synchronized void close() {`

    `    log.close();`

    `    }`

    `  }`

