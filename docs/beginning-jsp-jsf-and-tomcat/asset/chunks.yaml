  trans: '

    ### Eclipse


    虽然可以通过命令行编译 Java 模块来构建 Web 应用程序，但使用集成开发环境（IDE）效率更高。这样，您就可以专注于软件开发中更具创造性的部分，而不是修复不一致问题和摆弄文件夹层次结构。


    IDE 将开发软件所需的所有应用程序——从源代码编辑器和编译器，到自动化应用程序构建过程的工具和调试器——集成到一个单一的应用程序中。当使用 Java 或其他面向对象语言进行开发时，IDE
    还包含用于可视化类和对象结构以及继承和包含关系的工具。使用 IDE 的另一个优点是，它会传播您对单个模块所做的更改。例如，如果您重命名了一个类，IDE 可以自动更新整个项目文件中所有出现该名称的地方。


    随着您开发的应用程序变得越来越复杂，使用 IDE 的意义也越来越大。这就是为什么在继续下一个项目之前，我将告诉您如何安装和配置 Eclipse。


    Eclipse 是一个极其强大且可扩展的 IDE，非常适合 Web 应用程序开发。Eclipse 基金会每年发布一次 Eclipse IDE 的新版本。每个年度版本都有不同的名称。为了开发本书中包含的示例，我使用了
    2012 年 2 月 16 日的 Indigo 3.7.2 版本。


    一旦您安装了 Eclipse 来开发 Web 应用程序，您也可以将其用于任何其他软件开发任务，例如，开发和调试用 Java、C++ 甚至 Fortran 编写的应用程序，Fortran
    在科学界仍被广泛使用。


    此外，无论您需要执行什么与软件开发相关的任务，很可能已经有人为此开发了 Eclipse 插件。网站 [`http://marketplace.eclipse.org/`](http://marketplace.eclipse.org/)
    列出了超过 1,300 个插件，分为数十个类别。事实上，Eclipse 本身由一个执行插件的核心平台，加上一系列实现其大部分功能的插件组成。因此，可从 Eclipse
    网站下载的标准软件包已经包含了数十个插件。


    在本节中，我将仅解释如何安装用于 Java EE 开发的标准 Eclipse 配置，这是您在阅读本书其余部分时所需要的。


    首先，您需要下载软件包。为此，请访问 [`http://www.eclipse.org/downloads/`](http://www.eclipse.org/downloads/)，然后点击
    `Eclipse IDE for Java EE Developers` 的 `Windows 32 bit` 链接，如 图 3-7 所示。


    ![Image](img/9781430246237_Fig03-07.jpg)


    ***图 3-7.** 下载 Eclipse*


    网站会建议一个用于下载的镜像站点，并提供 MD5 校验和。Eclipse 的安装非常简单：解压下载的 `eclipse-jee-indigo-SR2-win32.zip`
    文件，并将 `eclipse` 文件夹移动到一个方便的位置。出于某种习惯，我选择将其移动到 `C:\`。旧习惯难改。您可能喜欢将 Eclipse 文件夹移动到
    `C:\Program Files\`。


    要运行 Eclipse，请双击 `eclipse` 文件夹中的 `eclipse.exe`。


    启动时，Eclipse 会要求您选择一个工作区。工作区是 Eclipse 存储您开发项目的文件夹。因此，将其放在您定期备份的驱动器或目录中是合理的。在点击
    `OK` 按钮之前，请勾选“`Use this as the default and do not ask again`”复选框。这会让您的生活更轻松。我选择了
    `C:\Users\Giulio\`，这是我的用户主目录。


    首次运行时，Eclipse 会显示一个欢迎屏幕。要进入开发界面，请点击工作台图标，如 图 3-8 所示。


    ![Image](img/9781430246237_Fig03-08.jpg)


    ***图 3-8.** Eclipse – 欢迎屏幕*


    看到工作台屏幕后，选择 `Servers` 选项卡，然后点击 `new server wizard` 链接，如 图 3-9 所示。


    ![Image](img/9781430246237_Fig03-09.jpg)


    ***图 3-9.** Eclipse – 工作台屏幕*


    接下来出现的屏幕是您告诉 Eclipse 使用 Tomcat 7 的地方，如 图 3-10 所示。


    ![Image](img/9781430246237_Fig03-10.jpg)


    ***图 3-10.** Eclipse – 选择 Tomcat 7 作为本地主机*


    接下来（也是最后一步），您需要告诉 Eclipse 在哪里找到 Tomcat 7 以及使用哪个版本的 JDK，如 图 3-11 所示。


    ![Image](img/9781430246237_Fig03-11.jpg)


    ***图 3-11.** Eclipse – 完成 Tomcat 配置*


    现在，如果您一切操作正确，Tomcat 7 应该会出现在工作台的 `Servers` 选项卡下。我解释这个配置过程是因为 Eclipse 是一个非常复杂的应用程序，很容易在众多选项中迷失方向。


    出于同样的原因，为了保险起见，我还将解释如何创建一个新的 Web 项目。稍后，您将学习如何将本书软件包中包含的示例项目导入到 Eclipse 中。

    '
- fmt: "### Creating a New Web Project\n\nIn the menu bar of the Workbench, select\
    \ `File` ![Image](images/U001.jpg) `New` ![Image](images/U001.jpg) `Dynamic Web\
    \ Project`, type a project name (e.g., `test`), and click on the `Next` button.\
    \ In the new screen, named `Java`, click again on the `Next` button. In the new\
    \ screen, named `Web Module`, tick the box `Generate web.xml deployment descriptor`\
    \ (i.e., the `web.xml` file) before clicking on the `Finish` button.\n\nThe new\
    \ project will appear in the `Project Explorer` pane (i.e., on the left hand side)\
    \ of the Workbench. Expand it as shown in [Figure 3-12](#Chapter03.html#fig_3_12),\
    \ right-click on the `Web Content` folder and select \"`New` ![Image](images/U001.jpg)\
    \ `JSP File`\".\n\n![Image](images/9781430246237_Fig03-12.jpg)\n\n***Figure 3-12.**\
    \ Eclipse–the test project*\n\nIn the new `JSP` screen that appears, replace the\
    \ default name `NewFile.jsp` with `index.jsp` and click on the `Finish` button.\n\
    \nEclipse shows the newly created file in the `Project Explorer` pane and opens\
    \ it in the central pane of the Workbench for you to edit. [Listing 3-8](#Chapter03.html#list_3_8)\
    \ shows its content. For me, the newly created file is located in `C:\\Users\\\
    Giulio\\workspace\\test\\WebContent\\`. If, for any reason, you edit the file\
    \ with some other editor, to see the latest version within Eclipse, you need to\
    \ right-click it in Eclipse’s Project Explorer and select `Refresh`. But I suggest\
    \ that you stick to Eclipse with all editing, because it is very easy to make\
    \ a mistake otherwise.\n\n***Listing 3-8.** index.jsp of the Test Project*\n\n\
    ```\n<%@ page language=\"java\" contentType=\"text/html; charset=ISO-8859-1\"\n\
    \    pageEncoding=\"ISO-8859-1\"%>\n<!DOCTYPE html PUBLIC \"-//W3C//DTD HTML 4.01\
    \ Transitional//EN\"\n\"http://www.w3.org/TR/html4/loose.dtd\">\n<html>\n<head>\n\
    <meta http-equiv=\"Content-Type\" content=\"text/html; charset=ISO-8859-1\">\n\
    <title>Insert title here</title>\n</head>\n<body>\n\n</body>\n</html>\n```\n\n\
    Replace \"`Insert title here`\" with \"`My first project`\" (or whatever you like,\
    \ of course), and write \"`Hello from Eclipse!`\" between `<body>` and `</body>`.\
    \ Then save the file.\n\n![Image](images/square.jpg) **Caution** You must stop\
    \ the Tomcat service in Windows before using Tomcat from within Eclipse, and vice-versa.\n\
    \nPosition the cursor on the test project folder shown in the Project Explorer,\
    \ right-click, and select `Run As` ![Image](images/U001.jpg) `Run on Server`.\
    \ When a screen comes up, click on `Finish`. You will be rewarded with what is\
    \ shown in [Figure 3-13](#Chapter03.html#fig_3_13).\n\n![Image](images/9781430246237_Fig03-13.jpg)\n\
    \n***Figure 3-13.** Eclipse–the output of the first project*\n\nIt might seem\
    \ very convenient that Eclipse can launch Tomcat and show the output within the\
    \ Workbench. In practice though, it has a couple of drawbacks. First of all, because\
    \ of the side and bottom panes, the space available in the central pane is limited.\
    \ As a result, most web pages are “too squeezed” to display correctly.\n\nYou\
    \ can maximize the web pane by double-clicking on the title bar, but there is\
    \ also a more important reason: Eclipse doesn't always display everything. It\
    \ should copy all files from the project folder to a Tomcat work directory, but\
    \ it doesn't! It tends to “lose” CSS files and images. This means that, except\
    \ for a quick check of simple features, you might do what I do and use Tomcat\
    \ externally.\n\nTo see the output of the `test` project outside Eclipse, first\
    \ of all, stop the “internal” Tomcat by right-clicking it under the `Servers`\
    \ tab of the Workbench and selecting `Stop`. Then, start the Tomcat service in\
    \ Windows.\n\nRight-click the `test`-project folder as you did to launch it within\
    \ Eclipse, but this time select `Export` ![Image](images/U001.jpg) `WAR File`.\n\
    \nWhen the WAR Export screen appears, the only thing you have to do is browse\
    \ to select the destination, which should be `%CATALINA_HOME%\\webapps\\test.war`,\
    \ and click `Finish`.\n\nIn a browser, type [`http://localhost:8080/test`](http://localhost:8080/test)\
    \ to see the output of the project. This works because, as I showed to you at\
    \ the end of the previous section, Tomcat automatically expands all WAR files\
    \ it discovers in its `webapps` folder, without any need to restart it. And because\
    \ by default Tomcat looks for `index.html`, `index.htm`, and `index.jsp`. If you\
    \ want, you can change the default by adding the following element to the body\
    \ of the `web-app` element of `web.xml`:\n\n```\n<welcome-file-list>\n    <welcome-file>whatever.jsp</welcome-file>\n\
    </welcome-file-list>\n```\n\n### Importing a WAR File\n\nIn the next section,\
    \ I will introduce you to the `eshop` application. You will find the web archive\
    \ for the application in the software for this chapter, and the easiest way to\
    \ work on the application is to import it into Eclipse.\n\nThe first step is to\
    \ select the menu item `Import...` in the `File` menu. When the `Select` dialog\
    \ opens, scroll down to the folder named `Web`, open it, select `WAR file`, and\
    \ click `Next >`, as shown in [Figure 3-14](#Chapter03.html#fig_3_14).\n\n![Image](images/9781430246237_Fig03-14.jpg)\n\
    \n***Figure 3-14.** Eclipse–selecting to import a WAR file*\n\nWhen the next dialog\
    \ comes up, browse to select `eshop.war` and click on `Finish`. Eclipse will create\
    \ the `eshop` project for you.\n\n### Eclipse Occasional Bugs\n\nEclipse is a\
    \ very complex package developed by several people in parallel. As a result, bugs\
    \ occasionally creep in.\n\nWhile developing the applications for this book, one\
    \ such bug suddenly appeared: Eclipse reported that a function of a JSP Standard\
    \ Tag Library didn’t exist.\n\nEclipse validates JSP files but doesn’t do anything\
    \ with them. Therefore, I ignored the reported error and deployed the application\
    \ to Tomcat, which executed it without any problem.\n\nI don’t know why Eclipse\
    \ started reporting that nonexistent error. If you search the Internet, you will\
    \ find that several people have had some problems with Eclipse’s validation of\
    \ JSPs.\n\nWhen problems like that occur, as long as they don’t affect your application,\
    \ you don’t really need to do anything. You could reinstall Eclipse, but that\
    \ might not cure them, or they might reappear later.\n\n## A Better Online Bookshop\n\
    \nThe online bookshop you saw at the beginning of this chapter was a good introduction\
    \ to the MVC architecture, but in order to explore the use of databases, other\
    \ JSP features, and JSF, we need an example with more substance. In this section,\
    \ I will introduce the `eshop` application, which will remain with us through\
    \ the rest of the book. Taking an object-oriented approach, I’ll begin by specifying\
    \ the objects that the application needs to handle, the operations which those\
    \ objects support, and the roles of the people who perform those operations.\n\
    \nEach role corresponds to a separate user interface, and the two main roles are\
    \ the administrator and the customer. The administrators manage products, orders,\
    \ and customer records, but for our purposes, it is sufficient to implement the\
    \ public interface of a customer buying from a catalog.\n\n### Objects and Operations\n\
    \nIn `eshop` we won’t keep track of orders and customers. Once the customer goes\
    \ to the checkout, enters credit-card information, and checks out, we’ll save\
    \ the order, but we won’t do anything with it. In the real world, we’d have to\
    \ process the purchase by charging the credit card account and dispatching the\
    \ order.\n\nIn fact, if you decided to deploy this application “out there” to\
    \ sell books or other items, you would be better off interfacing with PayPal or\
    \ another online payment service, rather than accepting credit cards. But the\
    \ purpose of this example is to help you learn JSP and JSF without getting bogged\
    \ down in details of other services. For that, the credit-card option is fine.\
    \ Obviously, in the real world, you would have to consider using secure communication\
    \ and encrypted data, but that would go beyond the scope of this example."
