  trans: '

    与 URL 类似，XPath 也使用斜杠作为分隔符。绝对路径以斜杠开头，而所有其他路径都是相对路径。与文件目录类似，句点表示当前节点，双句点表示父节点。多个同名节点通过索引来区分，就像
    Java 处理数组元素一样。例如，假设你有以下 XML 代码：


    `<a> <b>whatever</b> <b>never</b> </a>` `<c> <non_b>no</non_b> <b>verywell</b>
    </c>` `<a> <b attr="zz">nice</b> <b attr="xxx">ok</b> </a>`


    模式 `/a/b` 会选择四个 `<b>` 元素，它们分别包含 `whatever`、`never`、`nice` 和 `ok`。包含 `verywell`
    的 `<b>` 元素不会被选中，因为它位于 `<c>` 内部，而不是 `<a>` 内部。模式 `/a[1]/b[0]` 会选择包含 `nice` 的 `<b>`
    元素。属性名称以 `@` 为前缀。例如，`/a[1]/b[1]/@attr` 指向示例中值为 `xxx` 的属性。


    XPath 中有一个巧妙之处：你可以将条件用作索引。例如，`/a/b[@attr="zz"]` 会选择与 `/a[1]/b[0]` 相同的 `<b>` 元素，而
    `/a[b]` 会选择所有将 `<b>` 作为子元素的 `<a>` 元素（在示例中，两者都是），`/a[b="never"]` 会选择第一个 `<a>` 元素。最后一个例子：`/a/b[@attr][0]`
    会选择包含在 `<a>` 中且具有属性 `attr` 的第一个 `<b>` 元素（即，它再次选择了元素 `/a[1]/b[0]`）。


    XPath 定义了几个与节点集、位置或命名空间相关的运算符和函数，并且定义了字符串、数字、布尔值和转换操作。


    *节点集* 是一组被视为整体的节点。执行 XPath 表达式所产生的节点集不一定包含多个节点。它可以只包含一个节点，甚至不包含任何节点。请记住，属于节点集的节点可以组织成树状结构，但并非必须如此。例如，表达式
    `$myDoc//C` 会识别出解析到变量 `myDoc` 的文档中的所有 `C` 元素。它们不太可能形成一棵树。


    在 XPath 中，你可以访问你熟悉的隐式 JSP 对象。表 5-3 列出了这些映射关系。


    ![Image](img/9781430246237_Tab05-03.jpg)


    在我们看一个 XPath 示例之前，我想给你提供一个更严谨的语法参考，并解释一些你在“外面”可能会遇到的术语。


    要识别一个节点或一组节点，你需要从你在树中的当前位置（*上下文节点*）导航到目标节点，遍历 XML 文档的树状结构。路径描述由一系列用斜杠分隔的步骤组成，其中每个步骤包括导航方向（*轴说明符*）、识别节点的表达式（*节点测试*）以及用方括号括起来的要满足的条件（*谓词*）。


    开头的斜杠表示路径从根节点开始，而相对于上下文节点的路径则以非斜杠开头。两个连续的冒号分隔轴说明符和节点测试。例如，以下代码识别根元素 `A` 下所有 `B`
    元素的第二个属性：


    `/child::A/child::B/attribute::*[position()=2]`


    你可以使用简写语法来表达相同的路径，如下所示：


    `/A/B/@*[2]`


    其中，`child`、`::` 和 `position()=` 被简单地省略了，而 `attribute` 由 `@` 表示。


    表 5-4 显示了可能的轴说明符及其简写语法。


    ![Image](img/9781430246237_Tab05-04.jpg)


    作为节点测试，你可以使用带或不带命名空间前缀的节点名称，或者你可以使用星号来表示所有名称。使用简写语法时，单独的星号表示所有元素节点，而 `@*` 表示所有属性。


    你还可以使用 `node()` 作为节点测试，以指示任何类型的所有可能节点。类似地，`comment()` 表示所有注释节点，`text()` 表示所有文本节点，`processing-instruction()`
    表示所有处理指令节点。


    例如，以下代码选择 `A` 的所有后代元素 `B`，这些元素具有设置为 `''z''` 的属性 `xx`：


    `A//B[@xx=''z'']`


    而要选择树中任何位置具有属性 `yy` 的所有元素 `C`，你可以这样做：


    `//C[@yy]`


    要形成表达式，除了你已经见过的运算符（即斜杠、双斜杠和方括号）之外，你还可以使用所有标准的算术和比较运算符（即 `+`、`-`、`*`、`div`、`mod`、`=`、`!=`、`<`、`<=`、`>`
    和 `>=`）。此外，你还可以使用 `and` 和 `or` 进行布尔运算，以及使用联合运算符 `|`（即竖线）来合并两个节点集。


    对变量的引用通过在其前面加上美元符号来表示，如下例所示：


    `<x:parse doc="${sf}" varDom="dom"/>` `<x:forEach var="tag" select="$dom//starship">`


    其中，我将一个 XML 文档解析到变量 `dom` 中，然后在 XPath 表达式中引用它时使用 `$dom`。


    #### 一个 XPath 示例


    到目前为止，所有内容都相当枯燥和抽象。为了增加一点趣味性，我们将编写一个 JSP 页面，该页面解析一个 XML 文件，选择其元素和属性，并将它们显示在一个
    HTML 表格中。清单 5-9 显示了我们将要使用的 XML 文件 `starfleet.xml`。它是你在本章验证部分已经遇到过的 `enterprises.xml`（清单
    5-1）文件的扩展版本。


