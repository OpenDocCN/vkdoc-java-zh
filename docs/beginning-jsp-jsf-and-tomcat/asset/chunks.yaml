- fmt: "### Comments and Escape Characters\n\nThe comment delimiters `<%-- .. --%>`\
    \ have in JSP the same function as `/* .. */` in Java. You can also use them to\
    \ “switch off” JSP elements, as shown here:\n\n`<%-- <jsp:include page=\"whatever.jsp\"\
    /> --%>`\n\nThey can also span over several lines.\n\n![Image](images/square.jpg)\
    \ **Note** Regular HTML comments such as `<!--` ... `-->` won’t work with JSP\n\
    \nJSP comments have the advantage over HTML comments in that they are not sent\
    \ to the client. Their content is therefore invisible to the user.\n\nTo include\
    \ the sequence of characters `<%` and `%>` in template text, you have to “break”\
    \ them with a backslash, like in `<\\%` and `%\\>`, so that the JSP engine doesn't\
    \ interpret them as the beginning and end of scripting elements. Alternatively,\
    \ you can replace the inequality signs with their corresponding HTML entities,\
    \ as in `&lt;%` and `%&gt;`.\n\n### JSP’s Tag Extension Mechanism\n\nYou can define\
    \ your own actions to replace lengthy scriptlets. By “hiding” functions behind\
    \ custom tags, you can increase modularity and maintainability of your pages.\n\
    \nTo write in a JSP page a statement like\n\n`<myPrefix:myActionTag attributeName=\"\
    myAttributeName\"/>`\n\nyou need to follow the following steps:\n\n> 1.  Define\
    \ Java classes that provide the functionality of the new actions, including the\
    \ definition of their attributes (e.g., `myAttributeName`). These classes are\
    \ called *tag handlers*.\n> 2.  Provide a formalized description of your action\
    \ elements, so that Tomcat knows how to handle them. For example, you need to\
    \ specify which actions can have a body and which attributes can be omitted. Such\
    \ a description is called a tag library descriptor (TLD).\n> 3.  In the JSP pages,\
    \ tell Tomcat that the pages need your *tag library* and specify the prefix that\
    \ you want to identify those custom tags with.\n\nI will take you through these\
    \ steps, beginning with bodyless actions, which are simpler to implement.\n\n\
    #### Bodyless Custom Actions\n\nA bodyless action is an element that, not having\
    \ an end tag, cannot enclose a body between start and end tags. As an example,\
    \ let’s say you want to develop an action that prints the day of the week of any\
    \ given date:\n\n`<wow:weekday date=\"`*`date`*`\"/>`\n\nWith the `date` attribute\
    \ accepting values in the form yyyy-mm-dd and defaulting to the current date.\
    \ All the examples of this section on bodyless actions and the following section\
    \ of bodied actions are in the software package for this chapter. To test them,\
    \ copy the folder `tags` to Tomcat’s `webapps` folder.\n\n##### Step 1: Define\
    \ the Tag Handler\n\nA tag handler for a bodyless custom tag is a class that implements\
    \ the interfaces `java.io.Serializable` and `javax.servlet.jsp.tagext.Tag`. Remember\
    \ that to satisfy an interface, you have to implement all the methods it defines.\n\
    \nTo satisfy `Serializable`, you only need to define a unique identifier, like\
    \ this:\n\n`static final long serialVersionUID = 1L;`\n\nThe value identifies\
    \ the version of your class and the objects you instantiate from it. It is then\
    \ used when deserializing objects to check that class and object match. As long\
    \ as you don’t have several versions of the class and swap objects between JVMs,\
    \ you don’t really need to worry about it. However, to satisfy the `Tag` interface,\
    \ you have to define the methods listed in [Table 4-1](#Chapter04.html#tab_4_1).\n\
    \n![Image](images/9781430246237_Tab04-01.jpg)\n\n![Image](images/9781430246237_Tab04-01a.jpg)\n\
    \nFortunately, the `javax.servlet.jsp.tagext.TagSupport` class makes life easier\
    \ by implementing the `Tag` interface with default methods and other useful methods.\
    \ Therefore, you only need to extend `TagSupport` and overwrite the methods you\
    \ need for your `weekday` action. You certainly don’t need `getParent`, because\
    \ the action isn’t going to be used in the body of other actions. You don’t need\
    \ `doStartTag` either, because the action is bodyless, and, as a consequence,\
    \ you don’t have separate start and end tags. In conclusion, you only need to\
    \ overwrite `doEndTag` with a method containing all the functionality of the `weekday`\
    \ tag.\n\n[Listing 4-11](#Chapter04.html#list_4_11) shows you the code of the\
    \ whole tag handler.\n\n***Listing 4-11.** WeekdayTag.java*\n\n```\npackage tags;\n\
    \nimport javax.servlet.jsp.JspException;\nimport javax.servlet.jsp.tagext.TagSupport;\n\
    import java.util.Date;\nimport java.text.SimpleDateFormat;\nimport java.util.Calendar;\n\
    import java.util.GregorianCalendar;\n\npublic class WeekdayTag extends TagSupport\
    \ {\n  static final long serialVersionUID = 1L;\n  static final String[] WD =\
    \ {\"\",\"Sun\",\"Mon\",\"Tue\",\"Wed\",\"Thu\",\"Fri\",\"Sat\"};\n  private String\
    \ date;\n\n  public void setDate(String date) {\n    this.date = date;\n    }\n\
    \n  public int doEndTag() throws JspException {\n    GregorianCalendar cal = new\
    \ GregorianCalendar();\n    SimpleDateFormat fmt = new SimpleDateFormat(\"yyyy-MM-dd\"\
    );\n    fmt.setLenient(true);\n    if (date != null && date.length() > 0) {\n\
    \      Date d = new Date();\n      try {\n        d = fmt.parse(date);\n     \
    \   }\n      catch (Exception e) {\n        throw new JspException(\"Date parsing\
    \ failed: \" + e.getMessage());\n        }\n      cal.setTime(d);\n      }\n \
    \   try {\n      pageContext.getOut().print(WD[cal.get(Calendar.DAY_OF_WEEK)]);\n\
    \      }\n    catch (Exception e) {\n      throw new JspException(\"Weekday writing\
    \ failed: \" + e.getMessage());\n      }\n    return EVAL_PAGE;\n    }\n  }\n\
    ```\n\nYou need the `setDate` method because Tomcat uses it to pass the value\
    \ of the action’s `date` attribute to the tag handler. The corresponding `getDate`\
    \ method isn’t present, because it is never used and can be omitted. That said,\
    \ you might argue that working with incomplete Java beans, sooner or later, will\
    \ get you into trouble. If the action is executed without the `date` attribute,\
    \ the `date` variable defined in `doEndTag` remains set to `null`, and the calendar\
    \ `cal`, which is used to determine the day of the week, remains set to the current\
    \ date. On the other hand, if a `date` attribute is specified in the action, its\
    \ value is parsed and used to set the calendar.\n\nNotice that the tag handler\
    \ is named like the tag but with the first letter capitalized and with the `Tag`\
    \ suffix. This is a good practice to follow, although you can name your handlers\
    \ whatever you like. You’ll see in a moment how to make the association between\
    \ a tag and its handler.\n\nThe return value `EVAL_PAGE` means that execution\
    \ should continue with the page code following the custom action. Use `SKIP_PAGE`\
    \ to abort the page.\n\nIn any case, you must place your handlers in `WEB-INF\\\
    classes\\`. For example, as `WeekDayTag.java` belongs to the package named `tags`,\
    \ its compiled class must go into the folder `WEB-INF\\classes\\tags\\`."
