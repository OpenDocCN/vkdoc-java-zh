- fmt: "### Complex Types\n\nYou’ve already seen some examples of complex types in\
    \ `starfleet.xsd`. There are three models that you can use to group the elements\
    \ contained in a complex type: `sequence` (in which the elements must appear in\
    \ the specified sequence), `all` (in which there can only be up to one element\
    \ each of all those listed, but they can appear in any order), and `choice` (in\
    \ which the contained elements are mutually exclusive). Note that while `all`\
    \ can only contain individual elements, `sequence` and `choice` can contain other\
    \ groups. For example, the fragment:\n\n```\n<xsd:sequence>\n  <xsd:choice>\n\
    \    <xsd:element name=\"no\" ... />\n    <xsd:all>\n      <xsd:element name=\"\
    yes1\" ... />\n      <xsd:element name=\"yes2\" ... />\n      </xsd:all>\n   \
    \ </xsd:choice>\n  <xsd:element name=\"whatever\" ... />\n  </xsd:sequence>\n\
    ```\n\ndefines an element that contains one of the following combinations of elements:\n\
    \n> *   `whatever`\n> *   `no`, `whatever`\n> *   `yes1`, `whatever`\n> *   `yes2`,\
    \ `whatever`\n> *   `yes1`, `yes2`, `whatever`\n> *   `yes2`, `yes1`, `whatever`\n\
    \nComplex type definitions provide many additional options, but are not always\
    \ easy to handle. One might even argue that they’ve been overengineered. Therefore,\
    \ to describe them in detail would exceed the scope of this manual. Nevertheless,\
    \ the information I have provided on primitive and simple types, together with\
    \ the description of the three model groups, is already enough to cover most cases.\n\
    \n### Validation\n\nAn XML document is said to be *valid* if it passes the checks\
    \ done by a validating parser against the document’s DTD or XML schema. For the\
    \ parser to be able to operate, the XML document must be *well formed*, which\
    \ means that all tags are closed, the attributes are quoted, the nesting is done\
    \ correctly, and so on. A validating parser, besides checking for well formedness,\
    \ also checks for validity.\n\nYou actually have to validate two documents: the\
    \ XML file and the DTD or XML Schema. In the example, those are `enterprises.xml`\
    \ and `starfleet.dtd`/`starfleet.xsd`, respectively. The simplest way to do the\
    \ validation is to use a development environment like Eclipse, which validates\
    \ the documents as you type.\n\nAn alternative is to use online services. For\
    \ example, the tool available at [`http://xmlvalidation.com`](http://xmlvalidation.com)\
    \ can check XML files, DTD files, and XML schemas. To validate your schema, you\
    \ can also use the online tool by W3C, which provides an authoritative check.\
    \ Go to [`http://www.w3.org/2001/03/webdata/xsv`](http://www.w3.org/2001/03/webdata/xsv)\
    \ and look at the second section, which should look as shown in [Figure 5-1](#Chapter05.html#fig_5_1).\n\
    \n![Image](images/square.jpg) **Caution** The fact that your XML schema is valid\
    \ doesn’t mean at all that you will not get any error when validating an XML file,\
    \ because inconsistencies can easily creep in.\n\n![Image](images/9781430246237_Fig05-01.jpg)\n\
    \n***Figure 5-1.** Validating the schema with W3C*\n\nClick on the `Browse...`\
    \ button, select `starfleet.xsd` (or the schema you want to get checked), and\
    \ then click on `Upload and Get Results`. You should see a page like that shown\
    \ in [Figure 5-2](#Chapter05.html#fig_5_2).\n\n![Image](images/9781430246237_Fig05-02.jpg)\n\
    \n***Figure 5-2.** Validation results*\n\nIn general, you need to go through three\
    \ steps to validate an XML document:\n\n> 1.  Associate the document to the DTD/schema\
    \ against which it is to be validated.\n> 2.  Define an exception handler to specify\
    \ what happens when a validation error is detected.\n> 3.  Parse the document\
    \ with a validating parser, which validates your XML document against the DTD/schema.\n\
    \n#### Parsers\n\nA parser is a piece of software that breaks down a document\
    \ into *tokens*, analyzes the syntax of the tokens to form valid expressions,\
    \ and finally interprets the expressions and performs corresponding actions.\n\
    \nThe parsing process therefore implies a validation of the document. The DOM\
    \ (standardized by W3C) and Simple API for XML (SAX) define, among other things,\
    \ interfaces to perform XML parsing.\n\nDOM parsers build a tree of nodes after\
    \ loading the whole document in memory. Therefore, they require quite a bit of\
    \ memory. SAX, on the other hand, parses the documents from streams, and therefore\
    \ has a smaller memory footprint. The flexibility of the DOM also costs in terms\
    \ of performance, and DOM implementations tend to be slower than SAX implementations,\
    \ although they might overall be more efficient with small XML files that don’t\
    \ stretch memory usage. The two most widely used packages implementing DOM and\
    \ SAX are Xerces and Java API for XML Processing (JAXP). You can download the\
    \ documentation for JAXP from [`http://java.sun.com/xml/downloads/jaxp.html`](http://java.sun.com/xml/downloads/jaxp.html).\
    \ In case you are interested, Xerces is also available for other languages, such\
    \ as C++.\n\nXerces are the developer of SAX, and the version of SAX included\
    \ in JAXP is not identical to the original one. Several people reported bugs in\
    \ the JAXP version, although I have used it in all the examples of this chapter\
    \ without any problem. You can install the Xerces version downloaded from [`http://xerces.apache.org/`](http://xerces.apache.org/).\
    \ All you need to do is click on `\"Xerces2 Java 2.11.0 - zip\"` under the heading\
    \ `Xerces2` (there might be a newer version when you go there), expand `Xerces-J-bin.2.11.0.zip`,\
    \ and copy `xercesimpl.jar` and `xml-apis.jar` to Tomcat's `lib` folder. `xml-apis.jar`\
    \ contains DOM level 3, SAX 2.0.2, and the JAXP 1.4 APIs; `xercesImpl.jar` contains\
    \ the implementation of these APIs as well as of the XNI API (the Xerces Native\
    \ Interface). I have included `starfleet_validate_sax_schema_xerces.jsp` in the\
    \ software package of this chapter as an example."
  raw: '##### Complex Types


    You’ve already seen some examples of complex types in `starfleet.xsd`. There are
    three models that you can use to group the elements contained in a complex type:
    `sequence` (in which the elements must appear in the specified sequence), `all`
    (in which there can only be up to one element each of all those listed, but they
    can appear in any order), and `choice` (in which the contained elements are mutually
    exclusive). Note that while `all` can only contain individual elements, `sequence`
    and `choice` can contain other groups. For example, the fragment:


    `<xsd:sequence>`

    `  <xsd:choice>`

    `    <xsd:element name="no" ... />`

    `    <xsd:all>`

    `      <xsd:element name="yes1" ... />`

    `      <xsd:element name="yes2" ... />`

    `      </xsd:all>`

    `    </xsd:choice>`

    `  <xsd:element name="whatever" ... />`

    `  </xsd:sequence>`


    defines an element that contains one of the following combinations of elements:


    > *   `whatever`

    > *   `no`, `whatever`

    > *   `yes1`, `whatever`

    > *   `yes2`, `whatever`

    > *   `yes1`, `yes2`, `whatever`

    > *   `yes2`, `yes1`, `whatever`


    Complex type definitions provide many additional options, but are not always easy
    to handle. One might even argue that they’ve been overengineered. Therefore, to
    describe them in detail would exceed the scope of this manual. Nevertheless, the
    information I have provided on primitive and simple types, together with the description
    of the three model groups, is already enough to cover most cases.


    #### Validation


    An XML document is said to be *valid* if it passes the checks done by a validating
    parser against the document’s DTD or XML schema. For the parser to be able to
    operate, the XML document must be *well formed*, which means that all tags are
    closed, the attributes are quoted, the nesting is done correctly, and so on. A
    validating parser, besides checking for well formedness, also checks for validity.


    You actually have to validate two documents: the XML file and the DTD or XML Schema.
    In the example, those are `enterprises.xml` and `starfleet.dtd`/`starfleet.xsd`,
    respectively. The simplest way to do the validation is to use a development environment
    like Eclipse, which validates the documents as you type.


    An alternative is to use online services. For example, the tool available at [`http://xmlvalidation.com`](http://xmlvalidation.com)
    can check XML files, DTD files, and XML schemas. To validate your schema, you
    can also use the online tool by W3C, which provides an authoritative check. Go
    to [`http://www.w3.org/2001/03/webdata/xsv`](http://www.w3.org/2001/03/webdata/xsv)
    and look at the second section, which should look as shown in [Figure 5-1](#Chapter05.html#fig_5_1).


    ![Image](images/square.jpg) **Caution** The fact that your XML schema is valid
    doesn’t mean at all that you will not get any error when validating an XML file,
    because inconsistencies can easily creep in.


    ![Image](images/9781430246237_Fig05-01.jpg)


    ***Figure 5-1.** Validating the schema with W3C*


    Click on the `Browse...` button, select `starfleet.xsd` (or the schema you want
    to get checked), and then click on `Upload and Get Results`. You should see a
    page like that shown in [Figure 5-2](#Chapter05.html#fig_5_2).


    ![Image](images/9781430246237_Fig05-02.jpg)


    ***Figure 5-2.** Validation results*


    In general, you need to go through three steps to validate an XML document:


    > 1.  Associate the document to the DTD/schema against which it is to be validated.

    > 2.  Define an exception handler to specify what happens when a validation error
    is detected.

    > 3.  Parse the document with a validating parser, which validates your XML document
    against the DTD/schema.


    **PARSERS**


    A parser is a piece of software that breaks down a document into *tokens*, analyzes
    the syntax of the tokens to form valid expressions, and finally interprets the
    expressions and performs corresponding actions.


    The parsing process therefore implies a validation of the document. The DOM (standardized
    by W3C) and Simple API for XML (SAX) define, among other things, interfaces to
    perform XML parsing.


    DOM parsers build a tree of nodes after loading the whole document in memory.
    Therefore, they require quite a bit of memory. SAX, on the other hand, parses
    the documents from streams, and therefore has a smaller memory footprint. The
    flexibility of the DOM also costs in terms of performance, and DOM implementations
    tend to be slower than SAX implementations, although they might overall be more
    efficient with small XML files that don’t stretch memory usage. The two most widely
    used packages implementing DOM and SAX are Xerces and Java API for XML Processing
    (JAXP). You can download the documentation for JAXP from [`http://java.sun.com/xml/downloads/jaxp.html`](http://java.sun.com/xml/downloads/jaxp.html).
    In case you are interested, Xerces is also available for other languages, such
    as C++.


    Xerces are the developer of SAX, and the version of SAX included in JAXP is not
    identical to the original one. Several people reported bugs in the JAXP version,
    although I have used it in all the examples of this chapter without any problem.
    You can install the Xerces version downloaded from [`http://xerces.apache.org/`](http://xerces.apache.org/).
    All you need to do is click on `"Xerces2 Java 2.11.0 - zip"` under the heading
    `Xerces2` (there might be a newer version when you go there), expand `Xerces-J-bin.2.11.0.zip`,
    and copy `xercesimpl.jar` and `xml-apis.jar` to Tomcat''s `lib` folder. `xml-apis.jar`
    contains DOM level 3, SAX 2.0.2, and the JAXP 1.4 APIs; `xercesImpl.jar` contains
    the implementation of these APIs as well as of the XNI API (the Xerces Native
    Interface). I have included `starfleet_validate_sax_schema_xerces.jsp` in the
    software package of this chapter as an example.'
  trans: '

    ##### 复杂类型


    在 `starfleet.xsd` 中，你已经看到了一些复杂类型的示例。有三种模型可用于对复杂类型中包含的元素进行分组：`sequence`（元素必须按指定顺序出现）、`all`（所有列出的元素最多只能出现一次，但可以按任意顺序出现）和
    `choice`（包含的元素互斥）。请注意，虽然 `all` 只能包含单个元素，但 `sequence` 和 `choice` 可以包含其他组。例如，以下片段：


    `<xsd:sequence>`

    `  <xsd:choice>`

    `    <xsd:element name="no" ... />`

    `    <xsd:all>`

    `      <xsd:element name="yes1" ... />`

    `      <xsd:element name="yes2" ... />`

    `      </xsd:all>`

    `    </xsd:choice>`

    `  <xsd:element name="whatever" ... />`

    `  </xsd:sequence>`


    定义了一个元素，该元素包含以下元素组合之一：


    > *   `whatever`

    > *   `no`, `whatever`

    > *   `yes1`, `whatever`

    > *   `yes2`, `whatever`

    > *   `yes1`, `yes2`, `whatever`

    > *   `yes2`, `yes1`, `whatever`


    复杂类型定义提供了许多额外的选项，但处理起来并不总是那么容易。甚至有人可能会认为它们被过度设计了。因此，详细描述它们将超出本手册的范围。尽管如此，我提供的关于原始类型和简单类型的信息，以及对三种模型组的描述，已经足以覆盖大多数情况。


    #### 验证


    如果一个 XML 文档通过了验证解析器根据文档的 DTD 或 XML Schema 进行的检查，则该文档被称为*有效*。为了使解析器能够工作，XML 文档必须是*格式良好的*，这意味着所有标签都已闭合，属性已加引号，嵌套正确，等等。验证解析器除了检查格式良好性外，还会检查有效性。


    实际上，你需要验证两个文档：XML 文件和 DTD 或 XML Schema。在示例中，它们分别是 `enterprises.xml` 和 `starfleet.dtd`/`starfleet.xsd`。最简单的验证方法是使用像
    Eclipse 这样的开发环境，它会在你输入时验证文档。


    另一种方法是使用在线服务。例如，[`http://xmlvalidation.com`](http://xmlvalidation.com) 上的工具可以检查
    XML 文件、DTD 文件和 XML Schema。要验证你的 Schema，你也可以使用 W3C 提供的在线工具，它提供权威的检查。访问 [`http://www.w3.org/2001/03/webdata/xsv`](http://www.w3.org/2001/03/webdata/xsv)
    并查看第二部分，它应该如图 5-1 所示。


    ![Image](img/square.jpg) **注意** 你的 XML Schema 有效，绝不意味着在验证 XML 文件时不会出现任何错误，因为不一致性很容易悄然出现。


    ![Image](img/9781430246237_Fig05-01.jpg)


    ***图 5-1.** 使用 W3C 验证 Schema*


    点击 `Browse...` 按钮，选择 `starfleet.xsd`（或你想要检查的 Schema），然后点击 `Upload and Get Results`。你应该会看到如图
    5-2 所示的页面。


    ![Image](img/9781430246237_Fig05-02.jpg)


    ***图 5-2.** 验证结果*


    通常，你需要经过三个步骤来验证一个 XML 文档：


    > 1.  将文档关联到要验证的 DTD/Schema。

    > 2.  定义一个异常处理器，以指定检测到验证错误时发生的情况。

    > 3.  使用验证解析器解析文档，该解析器会根据 DTD/Schema 验证你的 XML 文档。


    **解析器**


    解析器是一种软件，它将文档分解为*标记*，分析标记的语法以形成有效的表达式，最后解释表达式并执行相应的操作。


    因此，解析过程意味着对文档的验证。DOM（由 W3C 标准化）和 Simple API for XML (SAX) 除其他外，定义了执行 XML 解析的接口。


    DOM 解析器在将整个文档加载到内存后构建一个节点树。因此，它们需要相当多的内存。另一方面，SAX 从流中解析文档，因此内存占用较小。DOM 的灵活性也以性能为代价，DOM
    实现通常比 SAX 实现慢，尽管对于不会过度消耗内存的小型 XML 文件，它们总体上可能更高效。实现 DOM 和 SAX 的两个最广泛使用的包是 Xerces
    和 Java API for XML Processing (JAXP)。你可以从 [`http://java.sun.com/xml/downloads/jaxp.html`](http://java.sun.com/xml/downloads/jaxp.html)
    下载 JAXP 文档。如果你感兴趣，Xerces 也适用于其他语言，例如 C++。


    Xerces 是 SAX 的开发者，JAXP 中包含的 SAX 版本与原始版本并不完全相同。有几个人报告了 JAXP 版本中的错误，尽管我在本章的所有示例中都使用了它，没有出现任何问题。你可以安装从
    [`http://xerces.apache.org/`](http://xerces.apache.org/) 下载的 Xerces 版本。你只需点击 `Xerces2`
    标题下的 `"Xerces2 Java 2.11.0 - zip"`（当你访问时可能有更新的版本），解压 `Xerces-J-bin.2.11.0.zip`，然后将
    `xercesimpl.jar` 和 `xml-apis.jar` 复制到 Tomcat 的 `lib` 文件夹。`xml-apis.jar` 包含 DOM
    level 3、SAX 2.0.2 和 JAXP 1.4 API；`xercesImpl.jar` 包含这些 API 以及 XNI API（Xerces 原生接口）的实现。我在本章的软件包中包含了
    `starfleet_validate_sax_schema_xerces.jsp` 作为示例。

