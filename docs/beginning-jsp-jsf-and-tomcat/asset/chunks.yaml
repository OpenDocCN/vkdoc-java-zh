    \ idea of how JSP works. Let’s start once more from HTML. [Listing 1-2](#Chapter01.html#list_1_2)\
    \ shows you a plain HTML page to display “Hello World!” in your browser’s window.\n\
    \n**Listing 1-2.** `hello.html`\n\n```\n<html>\n<head><title>Hello World static\
    \ HTML</title></head>\n<body>\nHello World!\n</body>\n</html>\n```\n\nCreate the\
    \ folder `%CATALINA_HOME%\\webapps\\ROOT\\tests\\` and store in it `hello.html`.\
    \ Then type the following URL in your browser to see the web page:\n\n[`http://localhost:8080/tests/hello.html`](http://localhost:8080/tests/hello.html)\n\
    \nNormally, to ask your browser to check that the syntax of the page conforms\
    \ to the XHTML standard of the World Wide Web Consortium (W3C), you would have\
    \ to start the page with the following lines:\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\"\n  \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
    >\n```\n\nYou’d also have to replace\n\n`<html>`\n\nwith\n\n`<html >`\n\nHowever,\
    \ for this simple example, I prefer to keep the code to what’s essential. [Figure\
    \ 1-9](#Chapter01.html#fig_1_9) shows you how this page will appear in your browser.\n\
    \n![Image](images/9781430246237_Fig01-09.jpg)\n\n**Figure 1-9.** “Hello World!”\
    \ in plain HTML\n\nIf you direct your browser to show the page source, not surprisingly,\
    \ you’ll see exactly what’s shown in [Listing 1-2](#Chapter01.html#list_1_2).\
    \ To obtain the same result with a JSP page, you only need to insert a JSP directive\
    \ before the first line, as shown in [Listing 1-3](#Chapter01.html#list_1_3),\
    \ and change the file extension from `.html` to `.jsp`.\n\n**Listing 1-3.** “Hello\
    \ World!” in a Boring JSP Page\n\n```\n<%@page language=\"java\" contentType=\"\
    text/html\"%>\n<html>\n<head><title>Hello World not-so-dynamic HTML</title></head>\n\
    <body>\nHello World!\n</body>\n</html>\n```\n\nObviously, there isn’t much point\
    \ in using JSP for such a simple page. It only pays to use JSP if you include\
    \ dynamic content. Check out [Listing 1-4](#Chapter01.html#list_1_4) for something\
    \ more juicy.\n\n**Listing 1-4.** `hello.jsp`\n\n```\n<%@page language=\"java\"\
    \ contentType=\"text/html\"%>\n<html>\n<head><title>Hello World dynamic HTML</title></head>\n\
    <body>\nHello World!\n<%\n  out.println(\"<br/>Your IP address is \" + request.getRemoteAddr());\n\
    \n  String userAgent = request.getHeader(\"user-agent\");\n  String browser =\
    \ \"unknown\";\n\n  out.print(\"<br/>and your browser is \");\n  if (userAgent\
    \ != null) {\n    if (userAgent.indexOf(\"MSIE\") > -1) {\n      browser = \"\
    MS Internet Explorer\";\n      }\n    else if (userAgent.indexOf(\"Firefox\")\
    \ > -1) {\n      browser = \"Mozilla Firefox\";\n      }\n    else if (userAgent.indexOf(\"\
    Opera\") > -1) {\n      browser = \"Opera\";\n      }\n    else if (userAgent.indexOf(\"\
    Chrome\") > -1) {\n      browser = \"Google Chrome\";\n      }\n    else if (userAgent.indexOf(\"\
    Safari\") > -1) {\n      browser = \"Apple Safari\";\n      }\n    }\n  out.println(browser);\n\
    \  %>\n</body>\n</html>\n```\n\nAs with `hello.html`, you can view `hello.jsp`\
    \ by placing it in Tomcat’s `ROOT\\tests` folder.\n\nThe code within the `<% ...\
    \ %>` pair is a scriptlet written in Java. When Tomcat’s JSP engine interprets\
    \ this module, it creates a Java servlet like that shown in [Listing 1-5](#Chapter01.html#list_1_5)\
    \ (with some indentation and empty lines removed).\n\n**Listing 1-5.** Java Code\
    \ from the “Hello World!” JSP Page\n\n```\nout.write(\"\\r\\n\");\nout.write(\"\
    <html>\\r\\n\");\nout.write(\"<head><title>Hello World dynamic HTML</title></head>\\\
    r\\n\");\nout.write(\"<body>\\r\\n\");\nout.write(\"Hello World!\\r\\n\");\nout.write('\\\
    r');\nout.write('\\n');\nout.println(\"<br/>Your IP address is \" + request.getRemoteAddr());\n\
    String userAgent = request.getHeader(\"user-agent\");\nString browser = \"unknown\"\
    ;\nout.print(\"<br/>and your browser is \");\nif (userAgent != null) {\n  if (userAgent.indexOf(\"\
    MSIE\") > -1) {\n    browser = \"MS Internet Explorer\";\n    }\n  else if (userAgent.indexOf(\"\
    Firefox\") > -1) {\n    browser = \"Mozilla Firefox\";\n    }\n  else if (userAgent.indexOf(\"\
    Opera\") > -1) {\n    browser = \"Opera\";\n    }\n  else if (userAgent.indexOf(\"\
    Chrome\") > -1) {\n    browser = \"Google Chrome\";\n    }\n  else if (userAgent.indexOf(\"\
    Safari\") > -1) {\n    browser = \"Apple Safari\";\n    }\n  }\nout.println(browser);\n\
    out.write(\"\\r\\n\");\nout.write(\"</body>\\r\\n\");\nout.write(\"</html>\\r\\\
    n\");\n```\n\nAs I said before, this servlet executes every time a browser sends\
    \ a request to the server. However, before the code shown in [Listing 1-5](#Chapter01.html#list_1_5)\
    \ executes, the server binds the variable `out` to a character stream associated\
    \ with the content of the HTML response. As a result, everything written to `out`\
    \ ends up in the HTML page that you’ll see in your browser. As you can see, Tomcat\
    \ copies the scriptlet in your JSP file into the servlet, and sends everything\
    \ outside the scriptlet directly to the output. This should clarify how HTML and\
    \ Java work together in a JSP page.\n\nAs the variable `out` is defined in each\
    \ servlet, you can use it within any JSP module to insert something into the response\
    \ (more on variables in [Chapter 2](#Chapter02.html)).\n\nAnother such “global”\
    \ JSP variable is `request` (of type `HttpServletRequest`). The request contains\
    \ the IP address from which the request was originated—that is, of the remote\
    \ computer with the browser (remember that this code runs on the server). To extract\
    \ the address from the request, you only need to execute its method `getRemoteAddr()`.\
    \ The request also contains information about the browser. When some browsers\
    \ send a request, they provide somewhat misleading information, and the format\
    \ is complex. However, the code in [Listing 1-4](#Chapter01.html#list_1_4) shows\
    \ you how to recognize the most widely used browsers.\n\nIf you add to your JSP\
    \ the line\n\n`out.println(\"<br/>\" + userAgent);`\n\nYou will see what information\
    \ is contained in the request. It also tells you whether the browser is running\
    \ on a Windows system or a Mac.\n\n[Figure 1-10](#Chapter01.html#fig_1_10) shows\
    \ the generated page as it appears in a browser.\n\n![Image](images/9781430246237_Fig01-10.jpg)\n\
    \n**Figure 1-10.** “Hello World!” in JSP with Google Chrome\n\nNotice that the\
    \ IP address `127.0.0.1` is consistent with the host `localhost`. And just in\
    \ case you want to see that the HTML is indeed dynamic, check out [Figure 1-11](#Chapter01.html#fig_1_11).\
    \ Incidentally, the method you use in `hello.jsp` to identify Internet Explorer\
    \ is the official one provided by Microsoft.\n\n![Image](images/9781430246237_Fig01-11.jpg)\n\
    \n**Figure 1-11.** “Hello World!” in JSP with Mozilla Firefox"
