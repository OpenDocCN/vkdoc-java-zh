    ##### 示例：用户认证


    浏览器可以显示用户/密码对话框，通过将特定文件夹的访问权限限制给特定用户*角色*，来提供基本的认证机制。首先，你需要在 Tomcat 的 `conf` 文件夹中找到的
    `tomcat-users.xml` 文件中定义用户及其角色。清单 2-10 展示了你应该在 `tomcat-users.xml` 中插入的内容，以定义几个新用户以及
    `canDoThis` 和 `canDoThat` 这两个角色。


    ***清单 2-10.** tomcat-users.xml 片段*


    `<tomcat-users>`

    `  <role rolename="canDoThis"/>`

    `  <role rolename="canDoThat"/>`

    `  <user username="aBloke" password="whatever" roles="canDoThis"/>`

    `  <user username="bigCheese" password="yes!" roles="canDoThis,canDoThat"/>`

    `  </tomcat-users>`


    `tomcat-users.xml` 文件由所有应用程序共享，但这并不妨碍你仅将角色用于特定的应用程序。要对应用程序中某个特定文件夹内的所有页面进行密码保护，你必须在应用程序根目录下编辑
    `WEB-INF/web.xml` 文件。清单 2-11 展示了你需要插入到 `<web-app>` 元素中的代码，以将 `/tests/auth/this/`
    文件夹中页面的访问权限限制给具有 `canDoThis` 角色的用户，并将 `/tests/auth/that/` 文件夹中页面的访问权限限制给具有 `canDoThat`
    角色的用户。我已将三个主要标签高亮显示。


    ***清单 2-11.** web.xml 片段*


    **`  <security-role>`**

    `    <role-name>canDoThis</role-name>`

    `    <role-name>canDoThat</role-name>`

    `    </security-role>`

    **`  <security-constraint>`**

    `    <web-resource-collection>`

    `      <web-resource-name>This</web-resource-name>`

    `      <url-pattern>/tests/auth/this/*</url-pattern>`

    `      </web-resource-collection>`

    `    <auth-constraint>`

    `      <role-name>canDoThis</role-name>`

    `      </auth-constraint>`

    `    </security-constraint>`

    **`  <security-constraint>`**

    `    <web-resource-collection>`

    `      <web-resource-name>That</web-resource-name>`

    `      <url-pattern>/tests/auth/that/*</url-pattern>`

    `      <http-method>GET</http-method>`

    `      </web-resource-collection>`

    `    <auth-constraint>`

    `      <role-name>canDoThat</role-name>`

    `      </auth-constraint>`

    `    </security-constraint>`

    **`  <login-config>`**

    `    <auth-method>BASIC</auth-method>`

    `    </login-config>`


    如你所见，首先声明在 `tomcat-users.xml` 中定义的安全角色。然后定义两个安全约束。每个安全约束可以包含多个资源和权限约束。`<url-pattern>`
    子元素指明了哪些文件夹或页面需要保护。最后，声明应使用 `BASIC` 认证方法。


    要进行测试，你可以将本章提供的代码中的整个 `auth` 文件夹复制到通常的 `%CATALINA_HOME%\webapps\ROOT\tests\` 文件夹中。它包含两个子文件夹，分别名为
    `this` 和 `that`，每个子文件夹都包含一个简单的 `index.html` 文件，用于显示其所在文件夹的名称，以及一个让你可以在两个子文件夹之间进行选择的
    `index.html` 文件。


    就是这样！重启 Tomcat 后，在浏览器中输入 [`http://localhost:8080/tests/auth`](http://localhost:8080/tests/auth)
    并选择进入 `this` 或 `that`。当你第一次选择时，浏览器会要求你提供用户标识和密码，如图 2-5 所示。


    ![Image](img/9781430246237_Fig02-05.jpg)


    ***图 2-5.** 基本认证*


    如果你尝试访问一个被禁止的目录（例如，以用户 `aBloke` 身份访问 `that` 文件夹），你会收到一条错误消息，如图 2-6 所示。


    ![Image](img/9781430246237_Fig02-06.jpg)


    ***图 2-6.** 认证失败*


    注销的唯一方法是关闭浏览器并重新打开。登录后，`getAuthType` 方法将返回 `"BASIC"` 而不是 `null`，`getRemoteUsers`
    将返回 `"bigCheese"` 而不是 `null`，`isUserInRole("canDoThat")` 将返回 `true`，而 `getUserPrincipal()`
    将返回一个包含名称 `"bigCheese"` 的 `Principal` 类型对象。


    ##### 示例：读取请求体


    你可以使用 `getInputStream` 或 `getReader` 来读取请求内容（但不能对同一个请求同时使用两者）。清单 2-12 展示了一个使用
    `getInputStream` 的示例。


    ***清单 2-12.** req_getInputStream.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%@page import="java.util.*, java.io.*"%>`

    `<%`

    `  int    len = request.getContentLength();`

    `  byte[] buf = null;`

    `  int    n = 0;`

    `  if (len > 0) {`

    `    buf = new byte[len];`

    `    n = request.getInputStream().read(buf);`

    `    }`

    `  %>`

    `<html><head><title>Test request.getInputStream</title></head><body>`

    `  <form action="" method="post" enctype="multipart/form-data">`

    `    <input type="hidden" name="oneTwoThree" value="123"/>`

    `    <input type="file" name="fil"/>`

    `    <input type="submit"/>`

    `    </form>`

    `  <table border="1">`

    `    <tr><td>getContentType()</td><td><%=request.getContentType()%></td></tr>`

    `    <tr><td>getContentLength()</td><td><%=len%></td></tr>`

    `<%`

    `    out.print("<tr><td>getInputStream(): " + n + "</td><td><pre>");`

    `    for (int k = 0; k < n; k++) out.print((char)buf[k]);`

    `    out.println("</pre></td></tr>");`

    `  %>`

    `    </table>`

    `</body></html>`


    清单 2-13 展示了一个使用 `getReader` 的示例。有多种方法可以读取内容，但需要记住的重要一点是，`getInputStream` 以二进制形式返回未缓冲的数据，而
    `getReader` 返回缓冲的字符。


    ***清单 2-13.** req_getReader.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%@page import="java.util.*, java.io.*"%>`

    `<%`

    `  int    len = request.getContentLength();`

    `  String s = "";`

    `  if (len > 0) {`

    `    char[] cbuf = new char[len];`

    `    int    n = request.getReader().read(cbuf, 0, len);`

    `    s = new String(cbuf);`

    `    }`

    `  %>`

    `<html><head><title>Test request.getReader</title></head><body>`

    `  <form action="" method="post">`

    `    <input type="hidden" name="oneTwoThree" value="123"/>`

    `    <input type="hidden" name="fourFiveSix" value="456"/>`

    `    <input type="submit"/>`

    `    </form>`

    `  <table border="1">`

    `    <tr><td>getContentType()</td><td><%=request.getContentType()%></td></tr>`

    `    <tr><td>getContentLength()</td><td><%=len%></td></tr>`

    `    <tr><td>getReader(): <%=s.length()%></td><td><pre><%=s%></pre></td></tr>`

    `    </table>`

    `</body></html>`


    图 2-7 和 2-8 分别展示了 Opera 和 IE 生成的 `req_getInputStream.jsp` 的输出。


    ![Image](img/9781430246237_Fig02-07.jpg)


    ***图 2-7.** 在 Opera 中查看时 req_getInputStream.jsp 的输出*


    ![Image](img/9781430246237_Fig02-08.jpg)


    ***图 2-8.** 在 IE 中查看时 req_getInputStream.jsp 的输出*


