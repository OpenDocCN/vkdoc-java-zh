    #### 电子书商城 Servlet


    清单 3-2 展示了该 Servlet 的源代码。本章稍后部分将介绍所需的文件夹结构以及如何编译 Java 模块。在本节及下一节中，我将解释代码的工作原理。


    ***清单 3-2.** ShoppingServlet.java*


    `package ebookshop;`

    `import java.util.Vector;`

    `import java.io.IOException;`

