    ### 列出 HTML 请求参数


    使用 JSP 可以生成动态网页，这一点毋庸置疑。但动态页面的实用性远不止于识别用户使用的浏览器或在不同日期显示不同信息。真正重要的是能够根据访问者的身份及其需求来调整网页内容。


    每个 HTML 请求都包含一系列参数，这些参数通常是访问者在点击“`Submit`”按钮之前在表单中输入的结果。额外的参数也可以作为 URL 本身的一部分。例如，多语言网站中的页面有时会以“`?lang=en`”结尾的
    URL 来告知服务器应以英文格式呈现所请求的页面。


    清单 1-6 展示了一个简单的 JSP 页面，该页面列出了所有 HTML 请求参数。这是一个实用的小工具，你可以用它轻松检查你的 HTML 页面实际向服务器发送了什么内容。


    ***清单 1-6.** req_params.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%@page import="java.util.*, java.io.*"%>`

    `<%`

    **`  Map      map = request.getParameterMap();`**

    `  Object[] keys = map.keySet().toArray();`

    `  %>`

    `<html><head><title>Request Parameters</title></head><body>`

    **`  Map size = <%=map.size()%>`**

    `  <table border="1">`

    `    <tr><td>Map element</td><td>Par name</td><td>Par value[s]</td></tr>`

    `<%`

    `    for (int k = 0; k < keys.length; k++) {`

    **`      String[] pars = request.getParameterValues((String)keys[k]);`**

    `      out.print("<tr><td>" + k + "</td><td>''" + keys[k] + "''</td><td>");`

    `      for (int j = 0; j < pars.length; j++) {`

    `        if (j > 0) out.print(", ");`

    `        out.print("''" + pars[j] + "''");`

    `        }`

    `      out.println("</td></tr>");`

    `      }`

    `  %>`

    `    </table>`

    `</body></html>`


    有趣的部分在于我用粗体突出显示的行。第一行告诉你参数存储在一个类型为 `Map` 的对象中，并展示了如何检索参数名称列表。


    第二行突出显示的代码展示了如何通过将 Java 变量值包裹在 `<%=` 和 `%>` 之间，将其直接插入到输出（即 HTML 页面）中。这与使用脚本小程序不同——在脚本小程序中，你可以使用
    JSP 为网页构建动态性。


    第三行突出显示的代码展示了如何请求已知名称的每个参数的值。我说的是“值”而不是“值”，因为每个参数可以在同一个请求中出现多次。例如，如果你查看 URL


    [`http://localhost:8080/tests/req_params.jsp?a=b&c=d&a=zzz&empty=&empty=&1=22`](http://localhost:8080/tests/req_params.jsp?a=b&c=d&a=zzz&empty=&empty=&1=22)


    你会得到如图 1-12 所示的结果。


    你也可以使用 `getParameterNames` 代替 `getParameterMap`。为此，你需要将


    `Object[] keys = map.keySet().toArray();`


    替换为


    `Enumeration enumPar = request.getParameterNames();`


    同时，你还需要修改遍历所有参数的循环，从


    `for (int k = 0; k < keys.length; k++)  {`


    改为


    `while (enumPar.hasMoreElements()) {`


    最后，要逐个获取参数名称，你需要使用 `enumPar.nextElement()` 而不是 `(String)keys[k]`。在这个例子中，这不会产生任何区别，但使用
    Map 时，参数名称会按字母顺序返回，而使用另一种方法则不会。


    此外，`Map` 对象还附带一些有用的方法。例如，`containsValue` 允许你检查 Map 是否包含某个特定值。


    ![Image](img/9781430246237_Fig01-12.jpg)


    ***图 1-12.** req_params.jsp 的输出*


    请注意，名为 `empty` 的参数在查询字符串中出现了两次，这导致参数映射中出现两个空字符串。另外，查看参数 `a`，你会注意到这些值按照它们在查询字符串中出现的顺序返回。


    ### 本章小结


    在本章中，你学习了如何安装 Java 和 Tomcat，以及如何检查它们是否正常工作。


    在解释了当你点击浏览器中的链接查看新页面时服务器端发生的事情之后，我介绍了 Servlet 和 JSP 技术，并说明了它们在 Web 服务器中所扮演的角色。


    然后，我向你展示了一个简单的 HTML 页面，以及如何使用 JSP 开始为其添加动态内容。


    最后，你学习了如何使用 JSP 来显示 HTTP 请求参数。


    也许这不是最激动人心的一章，但你现在已经拥有了一个基本的开发和运行环境，没有它你将无法继续学习。并且，你已经初步体验了 JSP。


    在下一章中，你将学习更多关于 JavaServer Pages 的知识，以及如何最好地构建 Web 应用程序。


    ## 第 2 章


    ![Image](img/3square.jpg)


    ## JSP 元素


    一个 JSP 页面由页面模板构成，该模板包含 HTML 代码和 JSP 元素，例如*脚本*元素、*指令*元素和*动作*元素。在上一章中，在解释了如何安装 Java
    和 Tomcat 之后，我向你介绍了 JSP，并解释了 JSP 在 Web 应用程序中的作用。在本章中，我将详细描述前两种类型的 JSP 元素。关于动作元素，请参考第
    4 章。

    '
- fmt: '### Introduction


    **Scripting** elements consist of code delimited by particular sequences of characters.
    The scriptlets, which you encountered in the examples in [Chapter 1](#Chapter01.html)
    and delimited by the pair `<%` and `%>`, are one of the three possible types of
    scripting elements. The other two are declarations and expressions.


    All scripting elements are Java fragments capable of manipulating Java objects,
    invoking their methods and catching Java exceptions. They can send data to the
    output, and they execute when the page is requested.


    In the `hello.jsp` example of [Chapter 1](#Chapter01.html) ([Listing 1-4](#Chapter01.html#list_1_4)),
    you saw that `request.getHeader("user-agent")` returns a string that describes
    the client’s web browser, despite the fact that the variable `request` wasn’t
    defined anywhere. It worked because Tomcat defines several *implicit objects*:
    `application`, `config`, `exception`, `out`, `pageContext`, `request`, `response`,
    and `session`.


    **Directive** elements are messages to the JSP container (i.e., Tomcat). Their
    purpose is to provide information on the page itself necessary for its translation.
    As they have no association with each individual request, directive elements do
    not output any text to the HTML response.


    The first line of the `hello.jsp` example was a directive:


    ```

    <%@page language="java" contentType="text/html"%>

    ```


    Besides `page`, the other directives available in JSP pages are `include` and
    `taglib`.


    **Action** elements specify activities that, like the scripting elements, need
    to be performed when the page is requested, because their purpose is precisely
    to encapsulate activities that Tomcat performs when handling an HTTP request from
    a client. Action elements can use, modify, and/or create objects, and they may
    affect the way data is sent to the output. There are more than a dozen standard
    actions: `attribute`, `body`, `element`, `fallback`, `forward`, `getProperty`,
    `include`, `param`, `params`, `plugin`, `setProperty`, `text`, and `useBean`.
    For example, the following action element includes in a JSP page the output of
    another page:


    ```

    <jsp:include page="another.jsp"/>

    ```


    In addition to the standard action elements, JSP also provides a mechanism that
    lets you define custom actions, in which a prefix of your choice replaces the
    prefix `jsp` of the standard actions. The *tag extension mechanism* lets you create
    libraries of custom actions, which you can then use in all your applications.
    Several custom actions became so popular within the programming community that
    Sun Microsystems (now Oracle) decided to standardize them. The result is JSTL,
    the JSP Standard Tag Library.


    The *Expression Language* (EL) is an additional JSP component that provides easy
    access to external objects (i.e., Java beans). EL was introduced in JSP 2.0 as
    an alternative to the scripting elements, but you can also use EL and scripting
    elements together. I will describe EL in [Chapter 4](#Chapter04.html), after explaining
    the action elements.


    In the next sections, I will first go through the scripting elements, because
    they are easier to understand and you can use them to glue together the rest.
    Then, I will describe the implicit objects and the directives. To help you find
    the correct examples in the software package for this chapter, I divided them
    in folders named according to the section title and the functionality tested (e.g.,
    `request object – authentication`).


    ### Scripting Elements and Java


    Scripting elements let you embed Java code in an HTML page.^([1](#Chapter02.html#CHP-2-FN-1))
    Every Java executable—whether it’s a free-standing program running directly within
    a runtime environment, an applet executing inside a browser, or a servlet executing
    in a container such as Tomcat—boils down to instantiating classes into objects
    and executing their methods. This might not be so apparent with JSP, since Tomcat
    wraps every JSP page into a class of type `Servlet` behind the scenes, but it
    still applies.


    Java methods consist of a sequence of operations to instantiate objects, allocate
    memory for variables, calculate expressions, perform assignments, or execute other
    methods.


    In this section, I’ll summarize the syntax of Java while keeping JSP in mind.


    #### Scriptlets


    A scriptlet is a block of Java code enclosed between `<%` and `%>`. For example,
    this code includes two scriptlets that let you switch an HTML element on or off
    depending on a condition:


    ```

    <% if (condition) { %>

    <p>This is only shown if the condition is satisfied</p>

    <%   } %>

    ```


    #### Expressions


    An expression scripting element inserts into the page the result of a Java expression
    enclosed in the pair `<%=` and `%>`. For example, in the following snippet of
    code, the expression scripting element inserts the current date into the generated
    HTML page:


    ```

    <%@page import="java.util.Date"%>

    Server date and time: <%=new Date()%>

    ```


    You can use within an expression scripting element any Java expression, provided
    it results in a value. In practice, it means that every Java expression will do,
    except the execution of a method of type `void`. For example, `<%=(condition)
    ? "yes" : "no"%>` is valid, because it calculates to a string. You would obtain
    the same output with the scriptlet `<%if (condition) out.print("yes") else out.print("no");%>`.


    __________


    ¹ Jeff Friesen, *Beginning Java 7* (Berkeley, CA: Apress, 2012) is the definitive
    guide to the Java language.


    Note that an expression is not a Java statement. Accordingly, it has no semicolon
    at the end.


    #### Declarations


    A declaration scripting element is a Java variable declaration enclosed between
    `<%!` and `%>`. It results in an instance variable shared by all requests for
    the same page. See the “Example: Testing Concurrency” section for an example on
    how you can use it.'
