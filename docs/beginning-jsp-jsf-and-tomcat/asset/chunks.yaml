    A small example of JSP will give you a more practical idea of how JSP works. Let’s
    start once more from HTML. [Listing 1-2](#Chapter01.html#list_1_2) shows you a
    plain HTML page to display “Hello World!” in your browser’s window.


    ***Listing 1-2.** hello.html*


    `<html>`

    `<head><title>Hello World static HTML</title></head>`

    `<body>`

    `Hello World!`

    `</body>`

    `</html>`


    Create the folder `%CATALINA_HOME%\webapps\ROOT\tests\` and store in it `hello.html`.
    Then type the following URL in your browser to see the web page:


    [`http://localhost:8080/tests/hello.html`](http://localhost:8080/tests/hello.html)


    Normally, to ask your browser to check that the syntax of the page conforms to
    the XHTML standard of the World Wide Web Consortium (W3C), you would have to start
    the page with the following lines:


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"`

    `  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">`


    You’d also have to replace


    `<html>`


    with


    `<html >`


    However, for this simple example, I prefer to keep the code to what’s essential.
    [Figure 1-9](#Chapter01.html#fig_1_9) shows you how this page will appear in your
    browser.


    ![Image](images/9781430246237_Fig01-09.jpg)


    ***Figure 1-9.** “Hello World!” in plain HTML*


    If you direct your browser to show the page source, not surprisingly, you’ll see
    exactly what’s shown in [Listing 1-2](#Chapter01.html#list_1_2). To obtain the
    same result with a JSP page, you only need to insert a JSP directive before the
    first line, as shown in [Listing 1-3](#Chapter01.html#list_1_3), and change the
    file extension from `.html` to `.jsp`.


    ***Listing 1-3.** “Hello World!” in a Boring JSP Page*


    `<%@page language="java" contentType="text/html"%>`

    `<html>`

    `<head><title>Hello World not-so-dynamic HTML</title></head>`

    `<body>`

