    additional information concerning the `eshop` custom tag library.    #### Custom
    Tags and TLD    EL expressions can include bean properties. This means that they
    can invoke “getter” methods. What they cannot do is invoke methods that require
    input parameters. You can work around that difficulty by setting an attribute
    with `c:set` and picking it up in a bean method.    For example, in `SelectCatalog.jspx`,
    the request parameter `id` specifies a book category, and you need to know the
    category name. This operation requires a database search, which you can implement
    with the following custom tag:  `<eshop:categoryName var="cat" catID="${param.id}"/>`  It
    accepts the ID as an input and sets the variable `cat` to the category name. The
    `doEndTag` method of `CategoryNameTag.java` is simple:  `public int doEndTag()
    {` `  ServletContext context = pageContext.getServletContext();` `  DataManager
    dataManager =(DataManager)context.getAttribute("dataManager");` `  pageContext.setAttribute(var,
    dataManager.getCategoryName(catID));` `  return EVAL_PAGE;` `  }`  The `getCategoryName`
    method of the data manager (invoked exclusively by the `doEntTag` method of `CategoryNameTag.java`)
    is even simpler:  `public String getCategoryName(String categoryID) {` `  Category
    category = CategoryPeer.getCategoryById(this, categoryID);` `  return (category
    == null) ? null : category.getName();` `  }`  Instead of defining the custom tag,
    you could add the `categoryID` property to the data manager  `private String categoryID
    = "0";` `public void setCategoryID(String categoryID) {` `  this.categoryID =
    categoryID;` `  }`  and remove its input parameter from the `getCategoryName`
    method.    Then, in `SelectCatalog.jspx`, you could replace the `eshop:categoryName`
    element with `jsp:setProperty` to set the `categoryID` in the data manager and
    `c:setVar` to invoke the `getCategoryName` method:  `<jsp:setProperty name="dataManager"
    property="categoryID"` `    value="${param.id}"/>` `<c:set var="cat" value="${dataManager.categoryName}"/>`  The
    result would be the same. I didn’t do it in that way because it makes the code
    less “transparent,” but it is ultimately a matter of taste. I just want to make
    the point that you can replace the input parameters of bean methods by setting
    bean properties with `jsp:setProperty`. Then, you only need to name the getter
    methods appropriately (e.g., `getWhatever`), and you’ll be able to execute them
    with an expression such as `${myBean.whatever}`.    In any case, I introduced
    a total of ten tags, as listed in [Table 10-2](#Chapter10.html#tab_10_2).    ![Image](images/9781430246237_Tab10-02.jpg)    [Listing
    10-16](#Chapter10.html#list_10_16) shows an example of a TLD tag element.    ***Listing
    10-16.** A TLD Tag element*  `<tag>` `  <description>Insert an order into storage</description>`
    `  <display-name>insertOrder</display-name>` `  <name>insertOrder</name>` `  <tag-class>eshop.tags.InsertOrderTag</tag-class>`
    `  <body-content>empty</body-content>` `  <attribute>` `    <name>var</name>`
    `    <type>java.lang.String</type>` `    <rtexprvalue>true</rtexprvalue>` `    </attribute>`
    `  <attribute>` `    <name>customer</name>` `    <type>eshop.beans.Customer</type>`
    `    <rtexprvalue>true</rtexprvalue>` `    </attribute>` `  </tag>`  ### The eshopf
    Application    Although I used `eshopx` as a basis for the JSF version of the
    application, its architecture is quite different from that of the first two versions.
    This is partly due to the fact that I had to replace `ShopServlet` with the standard
    `FacesServlet` class. In the process, I also removed the custom tags I had introduced
    in `eshopx`. In this section, I’ll refer to the `eshopf` application as described
    in [Chapter 8](#Chapter08.html) after the addition of a custom converter, a custom
    validator, and a custom component with a separate renderer.    [Listing 10-17](#Chapter10.html#list_10_17)
    shows the annotated list of files and folders that constitute `eshopf`. The folders
    marked “= eshopx” have the same content as the corresponding folders of `eshopx`
