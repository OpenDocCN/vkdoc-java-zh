  raw: '##### Example: User Authentication


    The browsers can display a user/password dialog to provide a basic authentication
    mechanism by limiting access to specific folders to particular user *roles*. First,
    you have to define the users and their roles in the `tomcat-users.xml` file that
    you find in Tomcat’s `conf` folder. [Listing 2-10](#Chapter02.html#list_2_10)
    shows you what you should insert into `tomcat-users.xml` to define a couple of
    new users and the two roles `canDoThis` and `canDoThat`.


    ***Listing 2-10.** tomcat-users.xml Fragment*


    `<tomcat-users>`

    `  <role rolename="canDoThis"/>`

    `  <role rolename="canDoThat"/>`

    `  <user username="aBloke" password="whatever" roles="canDoThis"/>`

    `  <user username="bigCheese" password="yes!" roles="canDoThis,canDoThat"/>`

    `  </tomcat-users>`


    The `tomcat-users.xml` file is shared by all applications, but this doesn’t prevent
    you from using the roles only for specific applications. To password-protect all
    the pages inside a particular folder of an application, you have to edit the `WEB-INF/web.xml`
    file in the application’s root directory. [Listing 2-11](#Chapter02.html#list_2_11)
    shows you the code you need to insert inside the `<web-app>` element to limit
    the access of the pages in the folder `/tests/auth/this/` to users with the role
    `canDoThis`, and of the pages in the folder `/tests/auth/that/` to users with
    the role `canDoThat`. I’ve highlighted the three main tags.


    ***Listing 2-11.** web.xml Fragment*


    **`  <security-role>`**

    `    <role-name>canDoThis</role-name>`

    `    <role-name>canDoThat</role-name>`

    `    </security-role>`

    **`  <security-constraint>`**

    `    <web-resource-collection>`

    `      <web-resource-name>This</web-resource-name>`

    `      <url-pattern>/tests/auth/this/*</url-pattern>`

    `      </web-resource-collection>`

    `    <auth-constraint>`

    `      <role-name>canDoThis</role-name>`

    `      </auth-constraint>`

    `    </security-constraint>`

    **`  <security-constraint>`**

    `    <web-resource-collection>`

    `      <web-resource-name>That</web-resource-name>`

    `      <url-pattern>/tests/auth/that/*</url-pattern>`

    `      <http-method>GET</http-method>`

    `      </web-resource-collection>`

    `    <auth-constraint>`

    `      <role-name>canDoThat</role-name>`

    `      </auth-constraint>`

    `    </security-constraint>`

    **`  <login-config>`**

    `    <auth-method>BASIC</auth-method>`

    `    </login-config>`


    As you can see, you first declare the security roles defined in `tomcat-users.xml`.
    Then you define two security constraints. Each security constraint can include
    several resources and authority constraints. The `<url-pattern>` sub-elements
    state which folders or pages require protection. Finally, you state that the `BASIC`
    authentication method should be applied.


    To test it, you can copy to the usual `%CATALINA_HOME%\webapps\ROOT\tests\` folder
    the whole `auth` folder you will find in the code available for this chapter.
    It contains two subfolders named `this` and `that`, each containing a trivial
    `index.html` that displays the name of the enclosing folder, and an `index.html`
    that lets you choose between the two subfolders.


    That’s it! After you have restarted Tomcat, type in a browser [`http://localhost:8080/tests/auth`](http://localhost:8080/tests/auth)
    and choose to enter either `this` or `that`. When you choose the first time, the
    browser will ask you to provide user identification and a password, as shown in
    [Figure 2-5](#Chapter02.html#fig_2_5).


    ![Image](images/9781430246237_Fig02-05.jpg)


    ***Figure 2-5.** Basic authentication*


    If you try to access a forbidden directory (e.g., the `that` folder as user `aBloke`),
    you get an error message like that shown in [Figure 2-6](#Chapter02.html#fig_2_6).


    ![Image](images/9781430246237_Fig02-06.jpg)


    ***Figure 2-6.** Failed authentication*


    The only way of logging out is to close the browser and reopen it. After logging
    in, the `getAuthType` method will return `"BASIC"` instead of `null`, `getRemoteUsers`
    will return `"bigCheese"` instead of `null`, `isUserInRole("canDoThat")` will
    return `true`, and `getUserPrincipal()` will return an object of type `Principal`
    containing the name `"bigCheese"`.


    ##### Example: Reading the Request Body


    You can read the request content with either `getInputStream` or `getReader` (but
    not both for the same request). [Listing 2-12](#Chapter02.html#list_2_12) shows
    you an example with `getInputStream`.


    ***Listing 2-12.** req_getInputStream.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%@page import="java.util.*, java.io.*"%>`

    `<%`

    `  int    len = request.getContentLength();`

    `  byte[] buf = null;`

    `  int    n = 0;`

    `  if (len > 0) {`

    `    buf = new byte[len];`

    `    n = request.getInputStream().read(buf);`

    `    }`

    `  %>`

    `<html><head><title>Test request.getInputStream</title></head><body>`

    `  <form action="" method="post" enctype="multipart/form-data">`

    `    <input type="hidden" name="oneTwoThree" value="123"/>`

    `    <input type="file" name="fil"/>`

    `    <input type="submit"/>`

    `    </form>`

    `  <table border="1">`

    `    <tr><td>getContentType()</td><td><%=request.getContentType()%></td></tr>`

    `    <tr><td>getContentLength()</td><td><%=len%></td></tr>`

    `<%`

    `    out.print("<tr><td>getInputStream(): " + n + "</td><td><pre>");`

    `    for (int k = 0; k < n; k++) out.print((char)buf[k]);`

    `    out.println("</pre></td></tr>");`

    `  %>`

    `    </table>`

    `</body></html>`


    [Listing 2-13](#Chapter02.html#list_2_13) shows you an example with `getReader`.
    There are several methods to read the content, but the important thing to keep
    in mind is that `getInputStream` returns data in binary form and unbuffered, while
    `getReader` returns buffered characters.


    ***Listing 2-13.** req_getReader.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%@page import="java.util.*, java.io.*"%>`

    `<%`

    `  int    len = request.getContentLength();`

    `  String s = "";`

    `  if (len > 0) {`

    `    char[] cbuf = new char[len];`

    `    int    n = request.getReader().read(cbuf, 0, len);`

    `    s = new String(cbuf);`

    `    }`

    `  %>`

    `<html><head><title>Test request.getReader</title></head><body>`

    `  <form action="" method="post">`

    `    <input type="hidden" name="oneTwoThree" value="123"/>`

    `    <input type="hidden" name="fourFiveSix" value="456"/>`

    `    <input type="submit"/>`

    `    </form>`

    `  <table border="1">`

    `    <tr><td>getContentType()</td><td><%=request.getContentType()%></td></tr>`

    `    <tr><td>getContentLength()</td><td><%=len%></td></tr>`

    `    <tr><td>getReader(): <%=s.length()%></td><td><pre><%=s%></pre></td></tr>`

    `    </table>`

    `</body></html>`


    [Figures 2-7](#Chapter02.html#fig_2_7) and [2-8](#Chapter02.html#fig_2_8) show
    the output of `req_getInputStream.jsp` generated by Opera and by IE respectively.


    ![Image](images/9781430246237_Fig02-07.jpg)


    ***Figure 2-7.** Output of req_getInputStream.jsp when viewed with Opera*


    ![Image](images/9781430246237_Fig02-08.jpg)


    ***Figure 2-8.** Output of req_getInputStream.jsp when viewed with IE*


    I’ve uploaded the file named `text.txt`, which only contains the text `This is
    inside the test file text.txt`. In the real world, the file would perhaps contain
    a formatted document, an image, or a video clip. With this example, you can also
    get an idea of the multipart format. As you can see, the content type actually
    contains a definition of the boundary, which is then used inside the request body
    to separate its parts. Each part consists of a header followed by an empty line
    and its content. Notice that the two browsers generate boundaries with different
    formats. I chose the outputs of Opera and IE because they generate the shortest
    and longest requests. This is entirely due to the different number of characters
    used for the boundaries.


    [Figure 2-9](#Chapter02.html#fig_2_9) shows the output of `req_getReader.jsp`.


    ![Image](images/9781430246237_Fig02-09.jpg)


    ***Figure 2-9.** Output of req_getReader.jsp*'
