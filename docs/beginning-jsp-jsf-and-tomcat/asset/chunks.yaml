- fmt: "### The `pageContext` Object\n\nMost manuals state that `pageContext` is an\
    \ instance of the `javax.servlet.jsp.PageContext` class to access all objects\
    \ and attributes of a JSP page. Similar to what I said concerning `JspWriter`,\
    \ this is only partly true, because this class, like `JspWriter`, is also abstract.\
    \ In reality, `pageContext` is an instance of the nonabstract class `org.apache.jasper.runtime.PageContextImpl`,\
    \ which extends `PageContext`.\n\nThe `PageContext` class defines several fields,\
    \ including `PAGE_SCOPE`, `REQUEST_SCOPE`, `SESSION_SCOPE`, and `APPLICATION_SCOPE`,\
    \ which identify the four possible scopes. It also supports more than 40 methods,\
    \ about half of which are inherited from the `javax.servlet.jsp.JspContext` class.\n\
    \nYou have to pay particular attention when using the `removeAttribute` method,\
    \ which accepts either one or two arguments. For example, `pageContext.removeAttribute(\"\
    attrName\")` removes the attribute from *all* scopes, while the following code\
    \ only removes it from the page scope:\n\n`pageContext.removeAttribute(\"attrName\"\
    , PAGE_SCOPE)`\n\n### The `request` Object\n\nThe `request` variable gives you\
    \ access within your JSP page to the HTTP request sent to it by the client. It’s\
    \ an instance of the `org.apache.catalina.connector.RequestFacade` class, which\
    \ Tomcat defines to implement the `javax.servlet.http.HttpServletRequest` and\
    \ `javax.servlet.ServletRequest` interfaces.\n\n#### More on Request Parameters\
    \ and Client Info\n\nIn [Chapter 1](#Chapter01.html), you have already seen how\
    \ to list all the parameters of a request. When accessing individual parameters\
    \ by name, you should use some caution. Typically, you do it with the following\
    \ line of code:\n\n`String myPar = request.getParameter(\"par-name\");`\n\nAnd\
    \ then, you do something with the parameter only if it exists—i.e., if `getParameter`\
    \ returns a non-null value:\n\n`if (par != null) { ...`\n\nNote that in the request\
    \ generated by a URL like this:\n\n[`http://localhost:8080/my_page.jsp?aaa&bbb=&ccc=3`](http://localhost:8080/my_page.jsp?aaa&bbb=&ccc=3)\n\
    \nthe parameters `aaa` and `bbb` exist but are set to the empty string. Therefore,\
    \ `getParameter` does *not* return `null` for them.\n\nAs you already saw in [Chapter\
    \ 1](#Chapter01.html), the request can include more than one value associated\
    \ with the same parameter. For example, the following URL generates a request\
    \ with three values for the parameter `aaa`:\n\n[`http://localhost:8080/my_page.jsp?aaa&aaa=4&aaa=7`](http://localhost:8080/my_page.jsp?aaa&aaa=4&aaa=7)\n\
    \nIf you execute `getParameter`, you only get the first value, which is the empty\
    \ string in the example. If you want to get them all, you have to use a different\
    \ method:\n\n`String[] ppar = request.getParameterValues(\"par-name\");`\n\nand\
    \ this returns an array of strings. To check that the parameter has actually been\
    \ set only once and to something other than the empty string, you might then perform\
    \ the following test:\n\n`if (ppar != null  &&  ppar.length == 1  &&  ppar[0].length()\
    \ > 0) { ...`\n\nIn [Chapter 1](#Chapter01.html), you also saw how to determine\
    \ the type of browser that sent the request. Another useful piece of information\
    \ you can get about the client is its preferred locale. For example, the following\
    \ line of code could set the variable `clientLocale` to the string `\"en_US\"\
    `:\n\n`String clientLocale = request.getLocale().toString();`\n\nBut if the viewer\
    \ were in a country where a language other than English is spoken, you might get\
    \ other locales (e.g., `\"de_DE\"` for German). If you had a multilingual site,\
    \ the locale would tell you the working language of your user. You could check\
    \ whether you support it and, if you do, set it as a default for the response.\n\
    \nThe `getRemoteHost` method, which returns the client’s host name (or that of\
    \ its proxy server), could be useful in a similar way, because you could look\
    \ at the string after the last dot to identify foreign domain names (e.g., `it`\
    \ for Italy). Unfortunately, in many cases, the remote address cannot be resolved\
    \ to a name, and you end up getting only the client’s IP address, exactly as if\
    \ you had called the `getRemoteAddress` method. Services available on the Internet\
    \ let you resolve an IP address to the country where the system resides, but you\
    \ might have to pay for a reliable service.\n\n![Image](images/square.jpg) **Caution**\
    \  You cannot mix methods that handle parameters with methods that handle the\
    \ request content, or methods that access the request content in different ways.\
    \ For example, if you execute any two of the methods `request.getParameter`, `getReader`,\
    \ and `getInputStream` when handling a request, the second one you execute will\
    \ fail.\n\n#### Example: Listing the Headers\n\n[Listing 2-9](#Chapter02.html#list_2_9)\
    \ shows code that displays the request headers.\n\n***Listing 2-9.** req_headers.jsp*\n\
    \n```\n<%@page language=\"java\" contentType=\"text/html\"%>\n<%@page import=\"\
    java.util.*\"%>\n<html><head><title>Request Headers</title></head><body>\n<%\n\
    \  Enumeration headers = request.getHeaderNames();\n  int kh = 0;\n  while (headers.hasMoreElements())\
    \ {\n    String hName = (String)headers.nextElement();\n    out.println(\"-------\
    \ \" + hName);\n    Enumeration hValues = request.getHeaders(hName);\n    while\
    \ (hValues.hasMoreElements()) {\n      out.println(\"<br/>&nbsp;&nbsp;&nbsp;\"\
    \ + hValues.nextElement());\n      }\n    out.println(\"<br/>\");\n    }\n  %>\n\
    </body></html>\n```\n\n[Figures 2-1](#Chapter02.html#fig_2_1), [2-2](#Chapter02.html#fig_2_2),\
    \ [2-3](#Chapter02.html#fig_2_3), and [2-4](#Chapter02.html#fig_2_4) show the\
    \ request headers generated respectively by Chrome, Firefox, IE, and Opera. Interesting,\
    \ aren’t they?\n\n![Image](images/9781430246237_Fig02-01.jpg)\n\n***Figure 2-1.**\
    \ Request headers generated by Google Chrome*\n\n![Image](images/9781430246237_Fig02-02.jpg)\n\
    \n***Figure 2-2.** Request headers generated by Mozilla Firefox*\n\n![Image](images/9781430246237_Fig02-03.jpg)\n\
    \n***Figure 2-3.** Request headers generated by Microsoft Internet Explorer*\n\
    \n![Image](images/9781430246237_Fig02-04.jpg)\n\n***Figure 2-4.** Request headers\
    \ generated by Opera*"
  raw: '#### The `pageContext` Object


    Most manuals state that `pageContext` is an instance of the `javax.servlet.jsp.PageContext`
    class to access all objects and attributes of a JSP page. Similar to what I said
    concerning `JspWriter`, this is only partly true, because this class, like `JspWriter`,
    is also abstract. In reality, `pageContext` is an instance of the nonabstract
    class `org.apache.jasper.runtime.PageContextImpl`, which extends `PageContext`.


    The `PageContext` class defines several fields, including `PAGE_SCOPE`, `REQUEST_SCOPE`,
    `SESSION_SCOPE`, and `APPLICATION_SCOPE`, which identify the four possible scopes.
    It also supports more than 40 methods, about half of which are inherited from
    the `javax.servlet.jsp.JspContext` class.


    You have to pay particular attention when using the `removeAttribute` method,
    which accepts either one or two arguments. For example, `pageContext.removeAttribute("attrName")`
    removes the attribute from *all* scopes, while the following code only removes
    it from the page scope:


    `pageContext.removeAttribute("attrName", PAGE_SCOPE)`


    #### The `request` Object


    The `request` variable gives you access within your JSP page to the HTTP request
    sent to it by the client. It’s an instance of the `org.apache.catalina.connector.RequestFacade`
    class, which Tomcat defines to implement the `javax.servlet.http.HttpServletRequest`
    and `javax.servlet.ServletRequest` interfaces.


    ##### More on Request Parameters and Client Info


    In [Chapter 1](#Chapter01.html), you have already seen how to list all the parameters
    of a request. When accessing individual parameters by name, you should use some
    caution. Typically, you do it with the following line of code:


    `String myPar = request.getParameter("`*`par-name`*`");`


    And then, you do something with the parameter only if it exists—i.e., if `getParameter`
    returns a non-null value:


    `if (par != null) { ...`


    Note that in the request generated by a URL like this:


    [`http://localhost:8080/my_page.jsp?aaa&bbb=&ccc=3`](http://localhost:8080/my_page.jsp?aaa&bbb=&ccc=3)


    the parameters `aaa` and `bbb` exist but are set to the empty string. Therefore,
    `getParameter` does *not* return `null` for them.


    As you already saw in [Chapter 1](#Chapter01.html), the request can include more
    than one value associated with the same parameter. For example, the following
    URL generates a request with three values for the parameter `aaa`:


    [`http://localhost:8080/my_page.jsp?aaa&aaa=4&aaa=7`](http://localhost:8080/my_page.jsp?aaa&aaa=4&aaa=7)


    If you execute `getParameter`, you only get the first value, which is the empty
    string in the example. If you want to get them all, you have to use a different
    method:


    `String[] ppar = request.getParameterValues("`*`par-name`*`");`


    and this returns an array of strings. To check that the parameter has actually
    been set only once and to something other than the empty string, you might then
    perform the following test:


    `if (ppar != null  &&  ppar.length == 1  &&  ppar[0].length() > 0) { ...`


    In [Chapter 1](#Chapter01.html), you also saw how to determine the type of browser
    that sent the request. Another useful piece of information you can get about the
    client is its preferred locale. For example, the following line of code could
    set the variable `clientLocale` to the string `"en_US"`:


    `String clientLocale = request.getLocale().toString();`


    But if the viewer were in a country where a language other than English is spoken,
    you might get other locales (e.g., `"de_DE"` for German). If you had a multilingual
    site, the locale would tell you the working language of your user. You could check
    whether you support it and, if you do, set it as a default for the response.


    The `getRemoteHost` method, which returns the client’s host name (or that of its
    proxy server), could be useful in a similar way, because you could look at the
    string after the last dot to identify foreign domain names (e.g., `it` for Italy).
    Unfortunately, in many cases, the remote address cannot be resolved to a name,
    and you end up getting only the client’s IP address, exactly as if you had called
    the `getRemoteAddress` method. Services available on the Internet let you resolve
    an IP address to the country where the system resides, but you might have to pay
    for a reliable service.


    ![Image](images/square.jpg) **Caution**  You cannot mix methods that handle parameters
    with methods that handle the request content, or methods that access the request
    content in different ways. For example, if you execute any two of the methods
    `request.getParameter`, `getReader`, and `getInputStream` when handling a request,
    the second one you execute will fail.


    ##### Example: Listing the Headers


    [Listing 2-9](#Chapter02.html#list_2_9) shows code that displays the request headers.


    ***Listing 2-9.** req_headers.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%@page import="java.util.*"%>`

    `<html><head><title>Request Headers</title></head><body>`

    `<%`

    `  Enumeration headers = request.getHeaderNames();`

    `  int kh = 0;`

    `  while (headers.hasMoreElements()) {`

    `    String hName = (String)headers.nextElement();`

    `    out.println("------- " + hName);`

    `    Enumeration hValues = request.getHeaders(hName);`

    `    while (hValues.hasMoreElements()) {`

    `      out.println("<br/>&nbsp;&nbsp;&nbsp;" + hValues.nextElement());`

    `      }`

    `    out.println("<br/>");`

    `    }`

    `  %>`

    `</body></html>`


    [Figures 2-1](#Chapter02.html#fig_2_1), [2-2](#Chapter02.html#fig_2_2), [2-3](#Chapter02.html#fig_2_3),
    and [2-4](#Chapter02.html#fig_2_4) show the request headers generated respectively
    by Chrome, Firefox, IE, and Opera. Interesting, aren’t they?


    ![Image](images/9781430246237_Fig02-01.jpg)


    ***Figure 2-1.** Request headers generated by Google Chrome*


    ![Image](images/9781430246237_Fig02-02.jpg)


    ***Figure 2-2.** Request headers generated by Mozilla Firefox*


    ![Image](images/9781430246237_Fig02-03.jpg)


    ***Figure 2-3.** Request headers generated by Microsoft Internet Explorer*


    ![Image](images/9781430246237_Fig02-04.jpg)


    ***Figure 2-4.** Request headers generated by Opera*'
  trans: '

    #### `pageContext` 对象


    大多数手册指出，`pageContext` 是 `javax.servlet.jsp.PageContext` 类的一个实例，用于访问 JSP 页面的所有对象和属性。与我之前关于
    `JspWriter` 的说法类似，这仅部分正确，因为该类与 `JspWriter` 一样，也是抽象的。实际上，`pageContext` 是扩展了 `PageContext`
    的非抽象类 `org.apache.jasper.runtime.PageContextImpl` 的一个实例。


    `PageContext` 类定义了多个字段，包括 `PAGE_SCOPE`、`REQUEST_SCOPE`、`SESSION_SCOPE` 和 `APPLICATION_SCOPE`，它们标识了四种可能的范围。它还支持超过
    40 个方法，其中大约一半继承自 `javax.servlet.jsp.JspContext` 类。


    在使用 `removeAttribute` 方法时需要特别小心，该方法接受一个或两个参数。例如，`pageContext.removeAttribute("attrName")`
    会从*所有*范围中移除该属性，而以下代码仅从页面范围中移除它：


    `pageContext.removeAttribute("attrName", PAGE_SCOPE)`


    #### `request` 对象


    `request` 变量使您能够在 JSP 页面内访问客户端发送给它的 HTTP 请求。它是 `org.apache.catalina.connector.RequestFacade`
    类的一个实例，Tomcat 定义该类以实现 `javax.servlet.http.HttpServletRequest` 和 `javax.servlet.ServletRequest`
    接口。


    ##### 关于请求参数和客户端信息的更多内容


    在第 1 章中，您已经了解了如何列出请求的所有参数。当按名称访问单个参数时，您应该谨慎一些。通常，您会使用以下代码行：


    `String myPar = request.getParameter("`*`par-name`*`");`


    然后，仅当参数存在时（即，如果 `getParameter` 返回非 null 值），您才会对该参数执行某些操作：


    `if (par != null) { ...`


    请注意，在像这样的 URL 生成的请求中：


    [`http://localhost:8080/my_page.jsp?aaa&bbb=&ccc=3`](http://localhost:8080/my_page.jsp?aaa&bbb=&ccc=3)


    参数 `aaa` 和 `bbb` 存在，但被设置为空字符串。因此，`getParameter` 对它们*不会*返回 `null`。


    正如您在第 1 章中已经看到的，请求可以包含与同一参数关联的多个值。例如，以下 URL 为参数 `aaa` 生成了一个包含三个值的请求：


    [`http://localhost:8080/my_page.jsp?aaa&aaa=4&aaa=7`](http://localhost:8080/my_page.jsp?aaa&aaa=4&aaa=7)


    如果您执行 `getParameter`，您只会得到第一个值，在示例中是一个空字符串。如果您想获取所有值，则必须使用不同的方法：


    `String[] ppar = request.getParameterValues("`*`par-name`*`");`


    这将返回一个字符串数组。要检查该参数是否确实只设置了一次并且不是空字符串，您可以执行以下测试：


    `if (ppar != null  &&  ppar.length == 1  &&  ppar[0].length() > 0) { ...`


    在第 1 章中，您还了解了如何确定发送请求的浏览器类型。您可以获取的关于客户端的另一个有用信息是其首选区域设置。例如，以下代码行可以将变量 `clientLocale`
    设置为字符串 `"en_US"`：


    `String clientLocale = request.getLocale().toString();`


    但是，如果查看者所在国家/地区使用非英语语言，您可能会得到其他区域设置（例如，德语为 `"de_DE"`）。如果您有一个多语言网站，区域设置会告诉您用户的工作语言。您可以检查是否支持该语言，如果支持，则将其设置为响应的默认语言。


    `getRemoteHost` 方法返回客户端的主机名（或其代理服务器的主机名），该方法可能以类似的方式有用，因为您可以查看最后一个点之后的字符串来识别外国域名（例如，意大利为
    `it`）。不幸的是，在许多情况下，远程地址无法解析为名称，您最终只能获得客户端的 IP 地址，就像您调用了 `getRemoteAddress` 方法一样。互联网上可用的服务可以让您将
    IP 地址解析到系统所在的国家/地区，但您可能需要为可靠的服务付费。


    ![Image](img/square.jpg) **注意**  您不能混合使用处理参数的方法与处理请求内容的方法，或者以不同方式访问请求内容的方法。例如，如果在处理请求时执行
    `request.getParameter`、`getReader` 和 `getInputStream` 中的任意两个方法，则您执行的第二个方法将会失败。


    ##### 示例：列出标头


    清单 2-9 显示了显示请求标头的代码。


    ***清单 2-9.** req_headers.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%@page import="java.util.*"%>`

    `<html><head><title>请求标头</title></head><body>`

    `<%`

    `  Enumeration headers = request.getHeaderNames();`

    `  int kh = 0;`

    `  while (headers.hasMoreElements()) {`

    `    String hName = (String)headers.nextElement();`

    `    out.println("------- " + hName);`

    `    Enumeration hValues = request.getHeaders(hName);`

    `    while (hValues.hasMoreElements()) {`

    `      out.println("<br/>&nbsp;&nbsp;&nbsp;" + hValues.nextElement());`

    `      }`

    `    out.println("<br/>");`

    `    }`

    `  %>`

    `</body></html>`


    图 2-1、2-2、2-3 和 2-4 分别显示了由 Chrome、Firefox、IE 和 Opera 生成的请求标头。很有趣，不是吗？


    ![Image](img/9781430246237_Fig02-01.jpg)


    ***图 2-1.** 由 Google Chrome 生成的请求标头*


    ![Image](img/9781430246237_Fig02-02.jpg)


    ***图 2-2.** 由 Mozilla Firefox 生成的请求标头*


    ![Image](img/9781430246237_Fig02-03.jpg)


    ***图 2-3.** 由 Microsoft Internet Explorer 生成的请求标头*


    ![Image](img/9781430246237_Fig02-04.jpg)


    ***图 2-4.** 由 Opera 生成的请求标头*

