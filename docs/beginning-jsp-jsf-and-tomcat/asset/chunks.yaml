    of attributes, while `h:inputText` supports 40?” That’s a good point. We could
    have added further attributes, such as the size of the input field, which `h:inputText`
    passes on to HTML transparently, but my purpose was to be able to replace with
    a single component the three fields as they are used in `eshopf`. More attributes
    than strictly necessary would have only used up space without adding anything
    to what you can learn from the example.    #### Inline Renderer    It’s possible
    to include the rendering functionality inside the component class, so that the
    component effectively renders itself. As I mentioned before, unless you plan to
    use more than one renderer with the same component, you might choose not to bother
    with a separate renderer.    To make `eshop:inputEntry` self-rendering, you need
    to do the following:    > 1.  Move the methods of `InputEntryRenderer.java` to
    `InputEntryComponent.java`. You’ll need to make some cosmetic changes that I’ll
    explain in a moment. After you have done the move, you can delete the renderer
    file. > 2.  Add the `encodeEnd` method to `InputEntryComponent.java` (more about
    this in a moment). > 3.  Return `null` in the `getRendererType` method of `InputEntryTag.java`.
    > 4.  Remove the registration of the renderer from `faces-config.xml`.    The
    `UIInput` class, which you extend to make the component, supports the three methods
    `decode`, `encodeBegin`, and `getConvertedValue` that you used in the separate
    renderer, but without the `UIComponent` parameter. It makes sense because the
    component object is directly accessible with the keyword `this`.    When you remove
    the `cmp` parameter from the three methods, you should also remove the line  `InputEntryComponent
    ieCmp = (InputEntryComponent)cmp;`  from `decode` and `encodeBegin`, because it
    has become useless. Then, make a global replace of `ieCmp` with `this` and replace
    the four occurrences of `cmp` in `decode` and `getConvertedValue` with `this`.    You
    need the `encodeEnd` method to override the method in `UIComponentBase`, which
    throws a `NullPointerException`. In fact, you don’t need to do anything in `encodeEnd`;
    you can just write an empty method:  `public void encodeEnd(FacesContext context)
    throws IOException { }`  Note that you only need this method when a component
    renders itself, not when it uses a separate renderer class.    In `InputEntryTag.java`,
    the `getRendererType` method returns `"eshop.inputEntry"`. If the method is to
    use its internal rendering methods, `getRendererType` has to return `null`. Finally,
    remove the seven lines of the `render-kit` element from `faces-config.xml`.    ###
    faces-config.xml    I’ve already explained all the elements of this file when
    I talked about the Shop Manager (`<managed-bean>` and `<navigation-rule>`) and
    when registering a converter (`<converter>`), a validator (`<validator>`), a component
    (`<component>`), and a renderer (`<render-kit>`). In this section, I only want
    to summarize with [Table 8-1](#Chapter08.html#tab_8_1) the navigation rules of
    `eshopf`.    ![Image](images/9781430246237_Tab08-01.jpg)    ### Summary    In
    this chapter, I described how to use JSF to reimplement the user interface of
    `eshopx`, to create the application `eshopf`.    I showed how to work with the
    standard JSF components and then explained how to create your own converters,
    validators, and components. On the way, I also briefly described how to tie together
    the application with `web.xml`, `faces config.xml`, and `context.xml`.    Based
    on the content of this chapter and the previous one, you should now be able to
    write your own application.    In the next chapter, I will talk about Tomcat.    ##
    C H A P T E R  9    ![Image](images/3square.jpg)    ## Tomcat    I’ve been using
    Tomcat in all the previous chapters to show you examples of servlets, JSP pages,
    and documents. Now it’s time to talk about Tomcat itself.    Tomcat, an open-source
    Servlet/JSP server/container from Apache foundation, is essentially three things:    >
    *   A web server > *   An application that executes Java servlets > *   An application
    that converts JSP pages and documents into Java servlets    In this chapter, I’ll
    describe the basics of Tomcat’s architecture and its directory structure. I’ll
    then show you examples of how to do a couple of useful things.    At the moment
    of writing this chapter, the latest release of Tomcat is 7.0.28, which runs on
    Java SE 6 (or later), implements the Servlet 3.0 and JSP 2.2 specifications, and
    supports EL 2.2.    Tomcat is a project of the Apache Software Foundation. Therefore,
    the authoritative source for obtaining further information on Tomcat is [`http://tomcat.apache.org/`](http://tomcat.apache.org/),
    which provides extensive documentation ([`http://tomcat.apache.org/tomcat-7.0-doc/`](http://tomcat.apache.org/tomcat-7.0-doc/)).    ###
    Tomcat’s Architecture and server.xml    Tomcat’s architecture consists of a series
    of functional components that can be combined according to well-defined rules.
    The structure of each server installation is defined in the file `server.xml`,
    which is located in the `conf` subdirectory of Tomcat’s installation folder.    In
    the rest of this section, I’ll go through the components. [Listing 9-1](#Chapter09.html#list_9_1)
    shows the default `server.xml` (after removing the comments). I’ll refer to it
    when describing the various components.    ***Listing 9-1.** Default server.xml*  `01:
