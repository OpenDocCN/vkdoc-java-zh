    #### `taglib` 指令


    你可以通过指示 Tomcat 使用外部的独立标签库来扩展可用的 JSP 标签数量。`taglib` 指令用于标识一个标签库，并指定你用来识别其标签的前缀。例如，以下代码


    `<%@taglib uri="http://mysite.com/mytags" prefix=”my”%>`


    使你能够在 JSP 页面中编写如下代码行：


    `<my:oneOfMyTags> ... </my:oneOfMyTags>`


    以下代码包含了核心的 JSP 标准标签库：


    `<%@taglib uri="http://java.sun.com/jsp/jstl/core" prefix="c"%>`


    你将在第 4 章中找到关于 JSTL 的描述以及如何使用它。在同一章的“JSP 的标签扩展机制”一节中，我将解释创建你自己的标签库可能带来的优势以及如何实现。目前，只需记住
    `taglib` 指令告诉 Tomcat 要加载哪些库以及它们的位置。


    ### 总结


    在本章中，你学习了所有 JSP 脚本元素和指令元素。


    我首先通过几个示例解释了脚本片段中使用的 Java 语法以及 Tomcat 定义的隐式对象，展示了如何使用它们。


    之后，我描述了 JSP 指令。


    在下一章中，你将学习如何构建复杂的 JSP 应用程序。


    ## 第 3 章


    ![图片](img/3square.jpg)


    ## JSP 应用程序架构


    在前两章中，你通过简短的示例学习了 JSP 的大部分组件。在本章中，我将告诉你所有组件如何在复杂应用程序中协同工作。


    将 Java 代码嵌入 HTML 模块为构建动态网页提供了可能性，但说它可行并不意味着你能高效且有效地做到这一点。如果你仅通过脚本元素开始开发复杂的应用程序，代码很快就会变得难以维护。像“Hello
    World!”示例那样混合 Java 和 HTML 的关键问题在于，应用程序逻辑与信息在浏览器中的呈现方式被混为一谈。通常，业务应用程序设计者和网页设计者是不同的人，他们拥有互补且仅部分重叠的技能。应用程序设计者是复杂算法和数据库的专家，而网页设计者则专注于页面构图和图形。基于
    JSP 的应用程序架构应反映这种区别。你最不希望看到的就是模糊开发团队中的角色分工，最终导致每个人都去做别人更擅长的事情。即使你独自开发所有内容，通过将表示层和应用程序逻辑分离，你也能构建出更稳定、更易于维护的应用程序。


    ### 模型 1 架构


    分离表示层和逻辑的最简单方法是将大部分应用程序逻辑从 JSP 转移到 Java 类（即 Java Bean），然后在 JSP 中使用这些类（参见图 3-1）。这被称为
    JSP 模型 1 架构。


    ![图片](img/9781430246237_Fig03-01.jpg)


    ***图 3-1.** JSP 模型 1 架构*


    尽管对于包含几千行代码的应用程序来说，模型 1 是可以接受的，但 JSP 页面仍然需要处理 HTTP 请求，这可能会给页面设计者带来麻烦。


    ### 模型 2 架构


    一个更适合大型应用程序的更好解决方案是进一步拆分功能，并专门使用 JSP 来格式化 HTML 页面。这个解决方案以 JSP 模型 2 架构的形式出现，也称为模型-视图-控制器（MVC）设计模式（参见图
    3-2）。


    ![图片](img/9781430246237_Fig03-02.jpg)


    ***图 3-2.** JSP 模型 2 架构*


    在这种模型中，一个 Servlet 处理请求、执行应用程序逻辑并实例化 Java Bean。JSP 从 Bean 中获取数据，并可以在无需了解后台发生了什么的情况下格式化响应。为了说明这个模型，我将描述一个名为
    *E-bookshop* 的示例应用程序，这是一个用于在线销售图书的小型应用程序。E-bookshop 并非真正功能完备，因为图书列表是硬编码在应用程序中的，而非存储在数据库中。此外，一旦你确认订单，也不会发生任何事情。然而，这个示例旨在向你展示模型
    2 如何让你完全分离业务逻辑和表示层。在本章后面，我将介绍一个更好的在线书店应用程序版本，它将伴随我们贯穿本书的其余部分。


    图 3-3 显示了 E-bookshop 的主页，当你在浏览器的地址栏中输入 [`http://localhost:8080/ebookshop`](http://localhost:8080/ebookshop)
    时就会看到这个页面。


    ![图片](img/9781430246237_Fig03-03.jpg)


    ***图 3-3.** E-bookshop 主页*


    你可以通过点击下拉列表来选择一本书，如图 3-3 所示，输入你需要购买的数量，然后点击 `Add to Cart` 按钮。每次这样做时，你的购物车内容就会出现在窗口底部，如图
    3-4 所示。


    ![图片](img/9781430246237_Fig03-04.jpg)


    ***图 3-4.** 显示购物车的 E-bookshop 主页*


    你可以从购物车中移除商品，或者去结账。如果你向购物车中添加更多数量的同一本书，购物车中的数量会相应增加。


    如果你点击 `Checkout` 按钮，你将看到图 3-5 所示的页面。


    ![图片](img/9781430246237_Fig03-05.jpg)


    ***图 3-5.** E-bookshop 结账页面*


    如果你点击 `Buy more!` 链接，你将带着一个空的购物车返回主页，准备继续购物。

