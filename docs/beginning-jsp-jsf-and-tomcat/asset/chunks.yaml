    pane is limited. As a result, most web pages are “too squeezed” to display correctly.


    You can maximize the web pane by double-clicking on the title bar, but there is
    also a more important reason: Eclipse doesn''t always display everything. It should
    copy all files from the project folder to a Tomcat work directory, but it doesn''t!
    It tends to “lose” CSS files and images. This means that, except for a quick check
    of simple features, you might do what I do and use Tomcat externally.


    To see the output of the `test` project outside Eclipse, first of all, stop the
    “internal” Tomcat by right-clicking it under the `Servers` tab of the Workbench
    and selecting `Stop`. Then, start the Tomcat service in Windows.


    Right-click the `test`-project folder as you did to launch it within Eclipse,
    but this time select `Export` ![Image](images/U001.jpg) `WAR File`.


    When the WAR Export screen appears, the only thing you have to do is browse to
    select the destination, which should be `%CATALINA_HOME%\webapps\test.war`, and
    click `Finish`.


    In a browser, type [`http://localhost:8080/test`](http://localhost:8080/test)
    to see the output of the project. This works because, as I showed to you at the
    end of the previous section, Tomcat automatically expands all WAR files it discovers
    in its `webapps` folder, without any need to restart it. And because by default
    Tomcat looks for `index.html`, `index.htm`, and `index.jsp`. If you want, you
    can change the default by adding the following element to the body of the `web-app`
    element of `web.xml`:


    `<welcome-file-list>`

    `    <welcome-file>whatever.jsp</welcome-file>`

    `</welcome-file-list>`


    #### Importing a WAR file


    In the next section, I will introduce you to the `eshop` application. You will
    find the web archive for the application in the software for this chapter, and
    the easiest way to work on the application is to import it into Eclipse.


    The first step is to select the menu item `Import...` in the `File` menu. When
    the `Select` dialog opens, scroll down to the folder named `Web`, open it, select
    `WAR file`, and click `Next >`, as shown in [Figure 3-14](#Chapter03.html#fig_3_14).


    ![Image](images/9781430246237_Fig03-14.jpg)


    ***Figure 3-14.** Eclipse–selecting to import a WAR file*


    When the next dialog comes up, browse to select `eshop.war` and click on `Finish`.
    Eclipse will create the `eshop` project for you.


    #### Eclipse Occasional Bugs


    Eclipse is a very complex package developed by several people in parallel. As
    a result, bugs occasionally creep in.


    While developing the applications for this book, one such bug suddenly appeared:
    Eclipse reported that a function of a JSP Standard Tag Library didn’t exist.


    Eclipse validates JSP files but doesn’t do anything with them. Therefore, I ignored
    the reported error and deployed the application to Tomcat, which executed it without
    any problem.


    I don’t know why Eclipse started reporting that nonexistent error. If you search
    the Internet, you will find that several people have had some problems with Eclipse’s
    validation of JSPs.


    When problems like that occur, as long as they don’t affect your application,
    you don’t really need to do anything. You could reinstall Eclipse, but that might
    not cure them, or they might reappear later.


    ### A Better Online Bookshop


    The online bookshop you saw at the beginning of this chapter was a good introduction
    to the MVC architecture, but in order to explore the use of databases, other JSP
    features, and JSF, we need an example with more substance. In this section, I
    will introduce the `eshop` application, which will remain with us through the
    rest of the book. Taking an object-oriented approach, I’ll begin by specifying
    the objects that the application needs to handle, the operations which those objects
    support, and the roles of the people who perform those operations.


    Each role corresponds to a separate user interface, and the two main roles are
    the administrator and the customer. The administrators manage products, orders,
    and customer records, but for our purposes, it is sufficient to implement the
    public interface of a customer buying from a catalog.


    #### Objects and Operations


    In `eshop` we won’t keep track of orders and customers. Once the customer goes
    to the checkout, enters credit-card information, and checks out, we’ll save the
    order, but we won’t do anything with it. In the real world, we’d have to process
    the purchase by charging the credit card account and dispatching the order.


    In fact, if you decided to deploy this application “out there” to sell books or
    other items, you would be better off interfacing with PayPal or another online
    payment service, rather than accepting credit cards. But the purpose of this example
    is to help you learn JSP and JSF without getting bogged down in details of other
    services. For that, the credit-card option is fine. Obviously, in the real world,
    you would have to consider using secure communication and encrypted data, but
    that would go beyond the scope of this example.'
