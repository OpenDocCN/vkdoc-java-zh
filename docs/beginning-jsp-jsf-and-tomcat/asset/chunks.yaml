    ##### 产品类别


    将产品分组到不同类别中是合理的，尤其是当产品目录种类繁多且数量庞大时。由于 `eshop` 只销售书籍，其类别指的是广泛的图书主题，例如动作小说、科幻小说和网络开发。


    每个类别都有一个*名称*和一个*标识符*。标识符保证唯一性，从而允许我们无歧义地引用每个类别。通常，一个类别还会有其他属性，比如描述、状态、创建日期等。为了实现客户界面，对于这种极简的类别定义，你唯一需要的操作就是根据给定的
    ID 获取类别名称。


    ##### 书籍


    每本书都有一个*标题*、一个*作者*、一个*价格*、一个唯一的*标识符*、一个*类别 ID* 以及一张*封面*图片。客户必须能够从某个类别中选择书籍、搜索书籍、查看书籍详情，并将书籍放入购物车。


    ##### 购物车


    购物车中存储的最少信息是一个商品列表，每个商品包含一个书籍标识符和订购数量。我决定在购物车中复制书籍的标题、描述和价格，而不是使用它们的书籍 ID。除了简化应用程序之外，这还能保护客户在购物过程中免受书籍信息更新的影响。在更复杂的应用程序中，当某些书籍属性发生变化时，你可能希望通知那些已将书籍放入购物车但尚未完成结账的客户。如果不保存原始信息，你就无法做到这一点。显然，这只能避免因数据并发访问而产生的问题（更多内容请参见第
    6 章）。要保护信息免受更严重事件（如服务器故障）的影响，你必须实施更通用的解决方案，例如将会话数据保存在非易失性存储设备上以及进行服务器集群。


    客户必须能够更改购物车中每本书的副本数量、完全移除一本书，以及进行结账。他们还应该能够随时查看购物车。


    ##### 订单


    虽然这个示例应用程序不涉及订单，但指定订单的结构是有用的。你需要两个独立的类：一个用于表示订购的商品，另一个用于存储客户数据。


    对于每个订购的商品，你需要保存从购物车中获取的书籍数据。此外，对于每个订单，你需要保存客户数据和一个唯一的订单号。


    #### 客户界面


    图 3-15 展示了 `eshop` 的主页。顶部区域包含一个指向购物车的链接，而左侧的侧边栏则有一个搜索框和一个类别列表。其他页面仅在中央面板上有所不同，主页的中央面板包含一条欢迎信息。


    ![图片](img/9781430246237_Fig03-15.jpg)


    ***图 3-15.** 电子商店主页*


    图 3-16 展示了包含某个类别书籍列表的面板。


    ![图片](img/9781430246237_Fig03-16.jpg)


    ***图 3-16.** 电子商店上的一个书籍类别*


    图 3-17 展示了一本书的详细信息。


    ![图片](img/9781430246237_Fig03-17.jpg)


    ***图 3-17.** 电子商店上的书籍详情*


    图 3-18 展示了包含几件商品的购物车。


    ![图片](img/9781430246237_Fig03-18.jpg)


    ***图 3-18.** 电子商店的购物车*


    相当直观，不是吗？


    ### 电子商店架构


    电子商店是一个 MVC 应用程序。数据和业务逻辑（模型）驻留在数据库和 Java 类中；用户界面（视图）由 JSP 实现；而客户端请求的处理程序（控制器）是一个
    HTTP Java Servlet。


    当 Servlet 收到客户端 HTTP 请求时，它会实例化模型的核心类，并将请求转发到相应的 JSP 页面。JSP 页面从模型获取数据并生成 HTML 响应。模型不知道
    JSP 页面如何处理它提供的数据，JSP 页面也不知道模型在何处以及如何存储数据。


    #### 模型


    核心模型类名为 `DataManager`。其目的是向 JSP 页面隐藏所有数据库操作。`DataManager` 支持一些与初始化和连接数据库相关的方法，我们将在后续章节中讨论这些方法。目前，我们更感兴趣的是实现应用程序业务逻辑的方法。表
    3-1 列出了这些方法。


    ![图片](img/9781430246237_Tab03-01.jpg)


    它们的目的应该相当清楚。我只想就 `insertOrder` 提两点。首先，它返回的值是要返回给客户端的订单 ID。其次，在更实际的情况下，除了购物车之外，所有参数都将被客户
    ID（通常是客户的电子邮件地址）所取代。然而，在这个简单的应用程序中，由于它不跟踪客户，因此没有永久的客户记录和客户 ID。


    #### 控制器


    控制器 Servlet 继承自 `javax.servlet.http.HttpServlet`，并被命名为 `ShopServlet`。

