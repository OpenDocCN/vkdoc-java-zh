    #### XSL 转换：浏览器端 vs. 服务器端


    我还没有告诉你如何将 XSL 样式表应用于 XML 文件以执行转换。这是因为我必须首先澄清浏览器端转换与服务器端转换之间的区别。


    ##### 浏览器端 XSL 转换


    所有浏览器都可以处理 XML 和 XSL。例如，假设你将本章软件包中 `xml-validate\xml\` 子文件夹中的 `enterprises_schema.xml`
    复制到 Tomcat 目录的 `webapps\ROOT\tests\` 文件夹中。在大多数浏览器中键入 [`http://localhost:8080/tests/enterprises_schema.xml`](http://localhost:8080/tests/enterprises_schema.xml)，你会看到每个元素左侧带有小标记的文件，如图
    5-4 所示，我使用的是 Chrome。通过单击标记，你可以像折叠文件夹一样折叠或展开元素。Firefox 和 IE 使用 `-/+` 作为标记。Opera
    是唯一不支持此功能的广泛使用的浏览器。


    ![Image](img/9781430246237_Fig05-04.jpg)


    ***图 5-4.** 在没有 XSL 的情况下浏览 XML 文件*


    浏览器可以提供此功能，因为它们“知道”如何显示 XML。页面顶部的消息表明浏览器以通用方式将文件显示为节点树，因为 `enterprises_schema.xml`
    没有引用任何 XSL 样式表。（顺便说一下，Firefox 显示相同的消息，IE 不显示任何消息，而 Opera 简单地声明 `"This document
    had no style information"`。）但是所有浏览器都会对不同组件进行颜色编码。


    建立关联很简单：将本章软件包中 `xml-style\xsl\` 子文件夹中的 `starfleet.xsl` 复制到通常的 `tests` 文件夹，并在
    `enterprises_schema.xml` 的第一行（即带有 `<?xml...?>` 的行）下方立即插入以下处理指令：


    `<?xml-stylesheet type="text/xsl" href="starfleet.xsl"?>`


    现在，如果你让浏览器显示 [`http://localhost:8080/test/enterprises_schema.xml`](http://localhost:8080/test/enterprises_schema.xml)，它将知道使用哪个样式表。`href`
    属性需要一个 URL。因此，通常你也可以将其设置为诸如 `"`[`http://localhost:8080/tests/starfleet.xsl`](http://localhost:8080/tests/starfleet.xsl)`"`
    或 `"/tests/starfleet.xsl"` 之类的 URL。我选择编写相对 URL，因为我将两个文件都保存在同一个 `test` 文件夹中，这使我们的生活更轻松。无论如何，图
    5-5 显示了结果。


    ![Image](img/9781430246237_Fig05-05.jpg)


    ***图 5-5.** 使用 XSL 浏览 XML 文件*


    实际上，将 XML 和 XSL 文件保存在同一个文件夹中有一个小优点：你可以通过将 XML 文件拖放到浏览器窗口中来在浏览器中查看它。如果你在 `href`
    中使用绝对 URL，则此方法不起作用。


    但我需要就 Google Chrome 展开说明。要使拖放技巧生效，浏览器必须允许一个文件访问另一个文件。出于安全原因，Chrome 不允许这样做。你可以通过使用开关
    `--allow-file-access-from-files` 启动它来强制它执行此操作。为此，右键单击快速启动栏或桌面上的 Chrome 图标，显示其属性，并将该开关附加到你在目标字段中看到的应用程序路径。这很容易，但我建议你不要削弱浏览器的安全性。


    使用任何浏览器，如果你查看页面源代码，你将看到 XML 文件，因为是浏览器执行从 XML 到 HTML 的转换。因此，源文件实际上是 XML 文档。


    需要记住的一点是，用户也可以很容易地获取你的 XSL 文件，因为它的 URL 显示在 XML 源代码中。例如，如果你将本章软件包中 `xml-style\xsl\`
    子文件夹中的 `starfleet.xml` 复制到 `tests` 文件夹，并使用 URL [`http://localhost:8080/tests/starfleet.xml`](http://localhost:8080/tests/starfleet.xml)
    在浏览器中查看它，你可以显示其源代码并发现样式表的相对 URL。然后，你只需要键入 [`http://localhost:8080/tests/starfleet.xsl`](http://localhost:8080/tests/starfleet.xsl)
    即可查看 XSL 文件。


