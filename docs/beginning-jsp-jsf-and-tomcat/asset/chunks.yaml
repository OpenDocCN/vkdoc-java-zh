    ##### c:if、c:choose、c:when 和 c:otherwise


    Java 的 `if` 和 `switch` 的 JSTL 版本是非常有用的标签。例如，仅当 EL 表达式计算结果为 `true` 时，才会执行以下动作的主体：


    `<c:if test="`*`EL-表达式`*`"> ... </c:if>`


    遗憾的是，没有 `c:else`，但 `switch` 的 JSTL 版本（`c:choose`）比其 Java 对应版本强大得多。实际上，它更像是一连串的
    `if` .. `else`：


    `<c:choose>`

    `  <c:when test="`*`EL-表达式-1`*`"> ... </c:when>`

    `  <c:when test="`*`EL-表达式-2`*`"> ... </c:when>`

    `  ...`

    `  <c:otherwise> ... </c:otherwise>`

    `  </c:choose>`


    除了用于定义要测试条件的 `test` 属性外，`c:if` 还支持 `var` 和 `scope` 两个属性，`c:if` 使用它们来存储条件的结果。


    `c:choose` 和 `c:otherwise` 不支持任何属性，而 `c:when` 仅支持 `test` 属性。


    ##### c:catch、c:remove 和 c:url


    使用 `c:catch`，你可以捕获其主体内发生的异常。它接受一个 `var` 属性，用于存储异常结果，类型为 `java.lang.Throwable`。例如，以下两行代码会将字符串
    "`java.lang.ArithmaticException: / by zero`" 插入到输出中。


    `<c:catch var="e"><% int k = 1/0; %></c:catch>`

    `<c:if test="${e != null}"><c:out value="${e}"/></c:if>`


    `c:remove` 允许你移除在其 `var` 和 `scope` 属性对中定义的变量。


    `c:url` 将一个字符串格式化为 URL，然后将其插入到输出中，如下例所示：


    `<a href="<c:url value="/tests/hello.jsp"/>">Hello World</a>`


    请注意嵌套的双引号。这不是问题，因为 Tomcat 会在服务器端处理该动作，并将其替换为表示 URL 的字符串。客户端看不到内部的双引号。


    你还可以指定 `var`/`scope` 属性对，将生成的 URL 存储到一个作用域变量中，并使用 `context` 属性来引用另一个应用程序。如果你使用
    `c:url` 的带主体形式，你可以使用 `c:param` 定义将附加到 URL 的额外参数。


    ##### c:import、c:redirect 和 c:param


    `c:import` 和 `c:redirect` 是标准动作 `jsp:include` 和 `jsp:forward` 的通用版本。主要区别在于 JSTL
    动作不限于当前应用程序的范围。它们允许你通过 `url` 属性包含或转发到任何 URL，该属性在这两种情况下都是唯一必需的属性。


    `c:import` 的一般语法如下：


    `<c:import url="expr1" context="expr2" charEncoding="expr3" var="name" scope="scope">`

    `  <c:param name="expr4" value="expr5"/>`

    `  ...`

    `  </c:import>`


    到现在为止，一切对你来说应该都很清楚了。唯一值得一提的是 `charEncoding` 的默认值是 "`ISO-8859-1`"。我更喜欢使用 `UTF-8`，因为它受到所有操作系统的同等支持。此外，UTF-8
    可以处理非欧洲语言，并且已成为 Web 上的事实标准。如果你好奇的话，UTF 代表 UCS 转换格式，其中 UCS 表示通用字符集。


    `c:redirect` 等同于调用 `javax.servlet.http.HttpServletResponse.sendRedirect`，并且只接受
    `url` 和 `context` 这两个属性。在设计网站时，你可能会发现记住这一点很有用：`c:redirect` 会更改用户看到的页面，从而影响书签的设置；而使用
    `jsp:forward` 时，用户不会察觉到页面的更改。


    ##### c:forTokens


    除了 `c:forEach` 之外，JSTL 还提供了一种字符串分词器形式，它允许你轻松地从字符串中提取由一个或多个分隔符分隔的子字符串。


