    #### `facelet` 库


    Facelets 最初是作为 JSP 的替代视图处理技术而开发的。随着 JSF 2.0 的发布，facelets 已成为其默认的视图技术。但这并不意味着，在必要的谨慎下，你不能将它们与
    JSP 和 JSTL 一起使用。使 JSF 的 `facelet` 库有趣的是它支持模板化。也就是说，一种允许你在开发具有相同布局或公共内容的页面时最大限度地减少代码重复的机制。


    虽然 JSP 与 `jsp:include` 提供了一种重用内容的简单机制，但它没有提供任何简单的方法来为不同的页面定义相同的布局。你需要自己确保页面在浏览器中查看时看起来相同。


    JSF `facelet` 库允许你通过在一个 XHTML 文件中定义布局，然后用一个或多个其他 XHTML 文件中定义的内容填充它来形成一个页面。我将很快向你展示一个示例，但首先，请查看表
    7-4，其中列出了 `facelet` 库的所有标签。为了帮助你理解这些标签，我标记了那些属于模板化机制的标签。


    ![Image](img/9781430246237_Tab07-04.jpg)


