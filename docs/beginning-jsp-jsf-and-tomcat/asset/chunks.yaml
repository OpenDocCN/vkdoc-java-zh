    24: </html>\n```\n\n在第 4 行，你将 XML 文件加载到内存中，在第 5 行，你将其解析为类型为 `org.apache.xerces.dom.DeferredDocumentImpl`\
    \ 的对象，该对象实现了文档对象模型 (DOM) 的标准接口 `org.w3c.dom.Document`。在第 13-21 行，你遍历 DOM 中的所有\
    \ `starship` 标签，无论它们在结构中的“深度”如何。你可以通过双斜杠实现这一点。在 `x:forEach` 循环内部，变量 `tag` 依次引用每个\
    \ `starship`，你可以显示属性和子元素中包含的信息。请注意，循环内的 `select` 路径始终以斜杠开头。这是因为每次循环迭代中的根元素是 `starship`\
    \ 标签，而不是文档的根元素 `starfleet`。\n\n![Image](images/9781430246237_Fig05-03.jpg)\n\n\
    ***图 5-3.** Starfleet 信息*\n\n#### x:parse\n\n通过 `starfleet.jsp`，你刚刚看到了一个如何使用 `x:parse`\
    \ 和 XPath 将 XML 转换为 HTML 的示例。[表 5-5](#Chapter05.html#tab_5_5) 总结了 `x:parse` 支持的所有属性。你可以在\
    \ [`http://www.ibm.com/developerworks/java/library/j-jstl0520/`](http://www.ibm.com/developerworks/java/library/j-jstl0520/)\
    \ 找到关于 `x:parse` 的很好的参考。\n\n![Image](images/9781430246237_Tab05-05.jpg)\n\n除了将\
    \ XML 源代码存储在 `doc` 属性中，你还可以使 `x:parse` 成为一个带体的动作，并将源 XML 存储在其体中。\n\n#### XSLT：从一种\
    \ XML 格式转换为另一种\n\n在本章开头，我向你展示了文件 `enterprises.xml`（[清单 5.1](#Chapter05.html#list_5_1)），后来，为了解释\
    \ XPath，我将其扩展为 `starfleet.xml`（[清单 5-9](#Chapter05.html#list_5_9)）。\n\n但是 `enterprises.xml`\
    \ 中包含的信息不仅仅是更大的 `starfleet.xml` 的子集，因为编码方式也不同。特别是，与 `starfleet.xml` 的不同之处在于：\n\
    \n> *   存在一个 `title` 元素\n> *   删除了 `class` 元素中的 `commissioned` 属性\n> *   将 `class`\
    \ 体替换为一个名为 `name` 的属性\n\n[清单 5-11](#Chapter05.html#list_5_11) 向你展示了一个 XSL 样式表，它允许你从\
    \ `starfleet.xml` 中提取 `enterprises.xml`。\n\n***清单 5-11.** enterprises.xsl*\n\n\
    ```\n01: <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n02: <xsl:stylesheet version=\"\
    1.0\" >\n03: <xsl:output method=\"xml\" version=\"1.0\" encoding=\"UTF-8\" indent=\"\
    yes\"/>\n04: <xsl:template match=\"/\">\n05:   <starfleet>\n06:     <title>The\
    \ two most famous starships in the fleet</title>\n07:     <xsl:for-each select=\"\
    starfleet/starship\">\n08:       <xsl:if test=\"@sn='NCC-1701' or @sn='NCC-1701-D'\"\
    >\n09:         <xsl:element name=\"starship\">\n10:           <xsl:attribute name=\"\
    name\">\n11:             <xsl:value-of select=\"@name\"/>\n12:             </xsl:attribute>\n\
    13:           <xsl:attribute name=\"sn\">\n14:             <xsl:value-of select=\"\
    @sn\"/>\n15:             </xsl:attribute>\n16:           <xsl:element name=\"\
    class\">\n17:             <xsl:attribute name=\"name\">\n18:               <xsl:value-of\
    \ select=\"class\"/>\n19:               </xsl:attribute>\n20:             </xsl:element>\n\
    21:           <xsl:copy-of select=\"captain\"/>\n22:           </xsl:element>\n\
    23:       </xsl:if>\n24:     </xsl:for-each>\n25:     </starfleet>\n26:   </xsl:template>\n\
    27: </xsl:stylesheet>\n```\n\n第 1 行和第 2 行声明该文件是 XML 格式并指定其命名空间。在第 2 行，你可以将 `xsl:stylesheet`\
    \ 替换为 `xsl:transform`，因为这两个关键字被视为同义词。\n\n第 3 行指定输出也是一个 XML 文档。XML 是默认的输出格式，但通过显式地写出它，你还可以请求输出进行缩进。否则，默认情况下，生成的代码将被写在一个非常长的单行上。该元素还允许你指定除\
    \ `ISO-8859-1` 之外的编码。\n\n`xsl:template` 元素将一个模板关联到一个元素，在第 4 行，你编写 `match=\"/\"\
    ` 来指定整个源文档。在第 5-6 行和第 25 行，你将 `enterprise` 和 `title` 元素写入输出。\n\n第 7 行到第 24 行之间的循环是你扫描所有\
    \ `starship` 元素的地方。在循环内部，你立即使用 `xsl:if` 选择你感兴趣的两艘星舰。在 XSL 中，你也可以使用我在第 4 章描述 JSTL-core\
    \ 时遇到的 `choose`/`when`/`otherwise` 结构，但在这种情况下，它并不合适，因为你不需要 `else`。\n\n实际的工作在第\
    \ 9-22 行完成。`xsl:element` 和 `xsl:attribute` 元素分别创建一个新元素和一个新属性，而 `xsl:value-of`\
    \ 将数据从源 XML 文件复制到输出。请注意，`select` 属性中的 XPath 表达式是相对于由 `xsl:for-each` 选择的当前元素的。另外，请注意，源和输出之间的唯一区别在第\
    \ 17-19 行处理，你在其中将原本在元素体中的内容分配给 `class` 元素的 `name` 属性。`class` 属性 `commissioned`\
    \ 被简单地忽略，因此它不会出现在输出中。\n\n`xsl:copy-of` 元素将整个元素复制到输出，包括属性和子元素。如果你只想复制元素标签，可以使用\
    \ `xsl:copy`。\n\nXSL 包含 30 多个元素，但我刚刚描述的那十几个元素涵盖了你在大多数情况下可能需要的功能。你可以在 [`http://www.w3.org/TR/xslt`](http://www.w3.org/TR/xslt)\
    \ 找到关于 XSLT 的官方文档。\n\n#### XSLT：从 XML 转换为 HTML\n\n正如你所看到的，你可以在 JSP 页面中使用 XPath\
    \ 来导航 XML 文档并以 HTML 格式显示它。在本节中，我将向你展示如何使用 XSLT 将同一个 `starfleet.xml` 直接转换为 HTML。这两种策略略有不同：使用\
    \ JSP，你逐个拾取节点并以 HTML 显示它们；使用 XSLT，你指定如何将 XML 文件的节点映射到 HTML 元素。\n\n让我们切入正题，直接看\
    \ [清单 5-12](#Chapter05.html#list_5_12) 中显示的 XSLT 文件。\n\n***清单 5-12.** starfleet.xsl*\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<xsl:stylesheet version=\"\
    1.0\" >\n<xsl:output method=\"html\" version=\"4.0\" encoding=\"UTF-8\" indent=\"\
    yes\"/>\n<xsl:template match=\"/\">\n<html><head>\n  <title>Styling starfleet.xml</title>\n\
    \  <style>th {text-align:left}</style>\n  </head>\n<body>\n<h2>The Most Famous\
    \ Starships in the Fleet</h2>\n<table border=\"1\">\n  <tr><th>Name</th><th>S/N</th><th>Class</th><th>Commissioned</th><th>Captain</th></tr>\n\
    \  <xsl:for-each select=\"starfleet/starship\">\n    <xsl:sort select=\"class/@commissioned\"\
    />\n    <tr>\n      <td><xsl:value-of select=\"@name\"/></td>\n      <td><xsl:value-of\
    \ select=\"@sn\"/></td>\n      <td><xsl:value-of select=\"class\"/></td>\n   \
    \   <td><xsl:value-of select=\"class/@commissioned\"/></td>\n      <td><xsl:value-of\
    \ select=\"captain\"/></td>\n      </tr>\n    </xsl:for-each>\n  </table>\n</body>\n\
    </html>\n</xsl:template>\n</xsl:stylesheet>\n```\n\n在第一个示例（[清单 5-11](#Chapter05.html#list_5_11)）之后，这应该很清楚它是如何工作的。我只想澄清一点：如果你愿意，可以省略第三行，因为尽管默认的输出格式是\
    \ XML，但如果它遇到的第一个标签是 `<html>`，XSL 会自动识别出你在生成 HTML。尽管如此，我建议你显式地定义输出格式，以便你可以设置 HTML\
    \ 版本、编码和缩进。\n\n#### XSL 转换：浏览器端 vs. 服务器端\n\n我还没有告诉你如何将 XSL 样式表应用于 XML 文件以执行转换。这是因为我必须首先澄清浏览器端转换与服务器端转换之间的区别。\n\
    \n##### 浏览器端 XSL 转换\n\n所有浏览器都可以处理 XML 和 XSL。例如，假设你将本章软件包 `xml-validate\\xml\\\
    ` 子文件夹中的 `enterprises_schema.xml` 复制到 Tomcat 目录的 `webapps\\ROOT\\tests\\` 文件夹中。在大多数浏览器中键入\
    \ [`http://localhost:8080/tests/enterprises_schema.xml`](http://localhost:8080/tests/enterprises_schema.xml)，你会看到该文件，每个元素的左侧都有小标记，如\
    \ [图 5-4](#Chapter05.html#fig_5_4) 所示，我使用的是 Chrome。通过单击标记，你可以像折叠文件夹一样折叠或展开元素。Firefox\
    \ 和 IE 使用 `-/+` 作为标记。Opera 是唯一不支持此功能的广泛使用的浏览器。\n\n![Image](images/9781430246237_Fig05-04.jpg)\n\
    \n***图 5-4.** 在没有 XSL 的情况下浏览 XML 文件*\n\n浏览器可以提供此功能，因为它们“知道”如何显示 XML。页面顶部的消息表明浏览器以通用方式将文件显示为节点树，因为\
    \ `enterprises_schema.xml` 没有引用任何 XSL 样式表。（顺便说一下，Firefox 显示相同的消息，IE 不显示任何消息，而\
    \ Opera 只是声明 `\"This document had no style information\"`。）但是所有浏览器都会对不同组件进行颜色编码。\n\
    \n建立关联很简单：将本章软件包 `xml-style\\xsl\\` 子文件夹中的 `starfleet.xsl` 复制到通常的 `tests` 文件夹，并在\
    \ `enterprises_schema.xml` 的第一行（即带有 `<?xml...?>` 的行）之后立即插入以下处理指令：\n\n```\n<?xml-stylesheet\
    \ type=\"text/xsl\" href=\"starfleet.xsl\"?>\n```\n\n现在，如果你让浏览器显示 [`http://localhost:8080/test/enterprises_schema.xml`](http://localhost:8080/test/enterprises_schema.xml)，它将知道使用哪个样式表。`href`\
    \ 属性需要一个 URL。因此，通常你也可以将其设置为诸如 `\"`[`http://localhost:8080/tests/starfleet.xsl`](http://localhost:8080/tests/starfleet.xsl)`\"\
    ` 或 `\"/tests/starfleet.xsl\"` 之类的 URL。我选择编写相对 URL，因为我把两个文件都放在同一个 `test` 文件夹中，这使我们的生活更轻松。无论如何，[图\
    \ 5-5](#Chapter05.html#fig_5_5) 显示了结果。\n\n![Image](images/9781430246237_Fig05-05.jpg)\n\
    \n***图 5-5.** 使用 XSL 浏览 XML 文件*\n\n实际上，将 XML 和 XSL 文件放在同一个文件夹中有一个小优点：你可以通过将 XML\
    \ 文件拖放到浏览器窗口中来在浏览器中查看它。如果你在 `href` 中使用绝对 URL，这将不起作用。\n\n但我需要就 Google Chrome 展开说明。要使拖放技巧生效，浏览器必须允许一个文件访问另一个文件。出于安全原因，Chrome\
    \ 不允许这样做。你可以通过使用开关 `--allow-file-access-from-files` 启动它来强制它执行此操作。为此，右键单击快速启动栏或桌面上的\
    \ Chrome 图标，显示其属性，并将该开关附加到你在目标字段中看到的应用程序路径。这很容易，但我建议你不要削弱浏览器的安全性。\n\n在任何浏览器中，如果你查看页面源代码，你将看到\
    \ XML 文件，因为是由浏览器执行从 XML 到 HTML 的转换。因此，源文件实际上是 XML 文档。\n\n需要记住的一点是，用户也可以很容易地获取你的\
    \ XSL 文件，因为它的 URL 显示在 XML 源代码中。例如，如果你将本章软件包 `xml-style\\xsl\\` 子文件夹中的 `starfleet.xml`\
    \ 复制到 `tests` 文件夹，并使用 URL [`http://localhost:8080/tests/starfleet.xml`](http://localhost:8080/tests/starfleet.xml)\
    \ 在浏览器中查看它，你可以显示其源代码并发现样式表的相对 URL。然后，你只需要键入 [`http://localhost:8080/tests/starfleet.xsl`](http://localhost:8080/tests/starfleet.xsl)\
    \ 即可查看 XSL 文件。\n\n##### 服务器端 XSL 转换\n\n你可以在服务器上进行转换并提供其输出，而不是让 XML 和 XSL 文件对用户可见。这样，你可以将\
    \ XML 和 XSL 保存在私有文件夹中。[清单 5-13](#Chapter05.html#list_5_13) 向你展示了如何使用 JSP 页面进行服务器端\
    \ XSL 转换。\n\n***清单 5-13.** enterprises_transform.jsp*\n\n```\n01: <%@page language=\"\
    java\" contentType=\"text/html\"%>\n02: <%@page import=\"java.io.File\"%>\n03:\
    \ <%@page import=\"java.io.FileOutputStream\"%>\n04: <%@page import=\"javax.xml.transform.TransformerFactory\"\
    %>\n05: <%@page import=\"javax.xml.transform.Transformer\"%>\n06: <%@page import=\"\
    javax.xml.transform.Source\"%>\n07: <%@page import=\"javax.xml.transform.SourceLocator\"\
    %>\n08: <%@page import=\"javax.xml.transform.TransformerException\"%>\n09: <%@page\
    \ import=\"javax.xml.transform.Result\"%>\n10: <%@page import=\"javax.xml.transform.stream.StreamSource\"\
    %>\n11: <%@page import=\"javax.xml.transform.stream.StreamResult\"%>\n12: <%@page\
    \ import=\"myPkg.TransformerExceptionHandler\"%>\n13: <%\n14:   File inFile =\
    \ new File(\"webapps/xml-style/xsl/starfleet.xml\");\n15:   File xslFile = new\
    \ File(\"webapps/xml-style/xsl/enterprises.xsl\");\n16:   String outFilename =\
    \ \"webapps/xml-style/out/enterprises_out.xml\";\n17:   TransformerExceptionHandler\
    \ handler = new TransformerExceptionHandler();\n18:   try {\n**19:     TransformerFactory\
    \ factory = TransformerFactory.newInstance();**\n**20:     Transformer transformer\
    \ = factory.newTransformer(new StreamSource(xslFile));**\n**21:     transformer.setErrorListener(handler);**\n\
    **22:     Source source = new StreamSource(inFile);**\n**23:     Result result\
    \ = new StreamResult(new FileOutputStream(outFilename));**\n**24:     transformer.transform(source,\
    \ result);**\n25:     }\n26:   catch (TransformerException e) {\n27:     }\n28:\
    \   if (handler.errorLevel == null) {\n29:     out.println(\"Transformation completed.\"\
    );\n30:     }\n31:   else {\n32:     out.println(\n33:         \"*** Transformation\
    \ \" + handler.errorLevel + \": \"\n34:       + handler.transformationException\n\
    35:       );\n36:     }\n37:   %>\n```\n\n它看起来比实际复杂。此外，为了简单起见，我硬编码了文件名，但你可以向 JSP\
    \ 页面添加一个简单的输入表单来设置 `inFile` 和 `xslFile`，这样你就有了一个可用于转换所有 XML 文件的小工具。遵循 MVC 架构，你应该将应用程序逻辑放在\
    \ servlet（即控制器）中，而不是 JSP 页面中。但我只是想以最简单的方式向你展示如何在 JSP/Java 中完成此操作。\n\n`enterprises_transform.jsp`\
    \ 在服务器端执行 XML 转换，如下所示：\n\n> 1.  它实例化一个通用的 `TransformerFactory` 并使用它来创建一个实现 XSL\
    \ 的 `Transformer`（第 19 和 20 行）。\n> 2.  在第 21 行，它向转换器注册了在第 17 行实例化的异常处理器。这类似于你处理验证异常时所做的事情。\n\
    > 3.  它打开一个输入流来读取 XML 文件，并打开一个输出流来写入将从转换产生的文档（第 22 和 23 行）。\n> 4.  它最终执行转换（第 24\
    \ 行）。\n\n异常报告几乎是我在讨论验证时描述的方法的翻版（[清单 5-5](#Chapter05.html#list_5_5) 到 [5-7](#Chapter05.html#list_5_7)），并且用于转换的异常处理器（[清单\
    \ 5-14](#Chapter05.html#list_5_14)）的编译和使用方式与 [清单 5-4](#Chapter05.html#list_5_4)\
    \ 中显示的用于验证的处理器完全相同。\n\n***清单 5-14.** TransformerExceptionHandler.java*\n\n```\n\
    package myPkg;\nimport javax.xml.transform.TransformerException;\npublic class\
    \ TransformerExceptionHandler\n    implements javax.xml.transform.ErrorListener\
    \ {\n  public TransformerException transformationException = null;\n  public String\
    \ errorLevel = null;\n  public void warning(TransformerException e) {\n    errorLevel\
    \ = \"Warning\";\n    transformationException = e;\n    }\n  public void error(TransformerException\
    \ e) {\n    errorLevel = \"Error\";\n    transformationException = e;\n    }\n\
    \  public void fatalError(TransformerException e) {\n    errorLevel = \"Fatal\
    \ error\";\n    transformationException = e;\n    }\n  }\n```\n\nJSP 页面 `enterprises_transform.jsp`\
    \ 将样式表 `enterprises.xsl` 应用于 `starfleet.xml` 以生成 `enterprises_out.xml`。如果你将第 15-16\
    \ 行中的文件名更改为 `starfleet.xsl` 和 `starfleet_out.html`，则同一页面将生成一个文件，该文件在浏览器中查看时与你在\
    \ [图 5-5](#Chapter05.html#fig_5_5) 中看到的完全相同。\n\n如果你觉得所有这些 XML 文件的变体有些令人困惑，我深表歉意。我的目的是向你展示验证和转换\
    \ XML 文件的大部分可能性。在实际生活中，你将选择最适合你需求的解决方案并坚持下去。无论如何，我还没有说完，因为还有一种实现服务器端转换的方法我想向你展示。\n\
    \n#### x:transform 和 x:param\n\n`x:transform` 将 XSL 样式表应用于 XML 文档。[表 5-6](#Chapter05.html#tab_5_6)\
    \ 总结了其属性。\n\n![Image](images/9781430246237_Tab05-06.jpg)\n\n[清单 5-15](#Chapter05.html#list_5_15)\
    \ 显示了 JSP 页面 `starfleet_tag_transform.jsp`，它在服务器上执行与浏览器显示 [图 5-5](#Chapter05.html#fig_5_5)\
    \ 时相同的转换。\n\n***清单 5-15.** starfleet_tag_transform.jsp*\n\n```\n<%@page language=\"\
    java\" contentType=\"text/html\"%>\n<%@taglib prefix=\"c\" uri=\"http://java.sun.com/jsp/jstl/core\"\
    %>\n<%@taglib prefix=\"x\" uri=\"http://java.sun.com/jsp/jstl/xml\"%>\n<c:import\
    \ url=\"/xsl/starfleet.xml\" var=\"xml\"/>\n<c:import url=\"/xsl/starfleet.xsl\"\
    \ var=\"xsl\"/>\n<x:transform doc=\"${xml}\" xslt=\"${xsl}\"/>\n```\n\n在你的浏览器中键入\
    \ [`http://localhost:8080/xml-style/starfleet_tag_transform.jsp`](http://localhost:8080/xml-style/starfleet_tag_transform.jsp)。你将看到\
    \ [图 5-5](#Chapter05.html#fig_5_5) 中熟悉的表格。\n\n此时你可能会问：当我们可以用六行代码实现等效结果时，我们为什么要经历\
    \ `enterprise_transform.jsp` 和 `TransformerExceptionHandler.java`（[清单 5-13](#Chapter05.html#list_5_13)\
    \ 和 [5-14](#Chapter05.html#list_5_14)）的复杂实现？\n\n有两个原因：第一个是将来你可能会遇到需要以“困难的方式”完成它的情况；第二个原因是我喜欢时不时地“窥探引擎盖下”，我想你可能也喜欢这样做。\n\
    \n### XML 语法中的 JSP\n\n带有脚本元素的 JSP 页面不是 XML 文件。这意味着在开发 JSP 页面时不能使用 XML 工具。但是，可以以使其成为正确\
    \ XML 的方式编写 JSP。诀窍是使用标准 JSP 动作、带有 EL 的 JSTL，以及可能的非 JSTL 自定义动作。实际上，定义了一些“特殊标准”（双关语！）JSP\
    \ 动作来支持 XML 语法（`jsp:root`、`jsp:output` 和 `jsp:directive`）。无论如何，这样的 XML 模块被称为 *JSP\
    \ 文档*，以区别于以传统的非 XML 兼容方式编写的 *JSP 页面*。\n\n作为第一个示例，让我们将 [清单 1-4](#Chapter01.html#list_1_4)\
    \ 中显示的 `hello.jsp` 页面转换为 `hello.jspx` 文档。[清单 5-16](#Chapter05.html#list_5_16)\
    \ 显示了一个仅写入 `\"Hello World!\"` 的部分 `hello.jspx`。我们稍后将转换显示动态信息的脚本小程序。\n\n***清单 5-16.**\
    \ 部分 hello.jspx*\n\n```\n01: <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n02: <jsp:root\n\
    03:  \n04:  \n05:  \n06:   version=\"2.1\"\n07:   >\n08: <jsp:directive.page\n\
    09:   language=\"java\"\n10:   contentType=\"application/xhtml+xml;charset=UTF-8\"\
    \n11:   />\n12: <html>\n13: <head><title>Hello World in XHTML</title></head>\n\
    14: <body>\n15:   <jsp:text>Hello World!</jsp:text>\n15: </body>\n16: </html>\n\
    17: </jsp:root>\n```\n\n第 1 行声明该文件符合 XML 规范。第 2-7 行中的 `root` 元素有多个用途。例如，它允许你使用\
    \ `jsp` 扩展名而不是推荐的 `jspx`。它也是一个方便的地方，你可以在其中分组命名空间声明 (`xmlns`)。JSTL 核心标签库的命名空间声明是\
    \ JSP 页面中 `taglib` 指令的 XML 等价物。你不需要在 JSP 页面中指定 JSP 命名空间，但在 JSP 文档中不能省略它；否则，`jsp:`\
    \ 标签将不会被识别。\n\n第 8-11 行是 JSP 页面中 `page` 指令的 XML 等价物。`include` 指令也有其 XML 等价物，即元素\
    \ `<jsp:directive.include file=\"`*`relativeURL`*`\"/>`。\n\n请注意，第 15 行中的字符串 “Hello\
    \ World!” 被括在 `jsp:text` 元素内。这是必要的，因为在 XML 中不能有“未标记”的文本。\n\n为了保持一致并能够对生成的 HTML\
    \ 进行完整验证，你还应该包含正确的 `DOCTYPE`。最好的方法是使用专门为此目的设计的 `jsp:output` 动作的属性。你只需要将第 12 行中的\
    \ `<html>` 标签替换为以下三个元素：\n\n```\n<jsp:output omit-xml-declaration=\"false\"/>\n\
    <jsp:output\n  doctype-root-element=\"html\"\n  doctype-public=\"-//W3C//DTD XHTML\
    \ 1.0 Strict//EN\"\n  doctype-system=\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
    \n  />\n<html >\n```\n\n是的，仅仅为了写 “Hello World!” 就需要做相当多的工作，但是对于任何大小的 JSP 文档，这个开销都是相同的。第一行导致\
    \ `<?xml ... ?>` 元素被写入生成的 HTML 页面的开头，而第二个元素生成 `DOCTYPE`。\n\n如果你查看由这个初步版本的 `hello.jspx`\
    \ 生成的 HTML 页面，你会看到所有的 HTML 代码都在一行中。如果你希望在输出中的 HTML 标签之间有换行符，你必须编写它们。实际上，你可以使用\
    \ `jsp:text` 动作来做到这一点。例如，以下代码片段中的所有 `jsp:text` 元素都包含一个换行符（你可以看到），后跟两个空格（在列表中看不到，但确实存在）：\n\
    \n```\n<html ><jsp:text>\n  </jsp:text><head><title>Hello World in XHTML</title></head><jsp:text>\n\
    \  </jsp:text><body>Hello World!</body><jsp:text>\n  </jsp:text></html>\n```\n\
    \n由于 `jsp:text` 内容按原样发送到输出，生成的 HTML 将跨多行书写并缩进：\n\n```\n<html >\n  <head><title>Hello\
    \ World in XHTML</title></head>\n  <body>Hello World!</body>\n  </html>\n```\n\
    \n另一种可能性是使用 `CDATA` 部分来包含整个 HTML：\n\n```\n<![CDATA[<html >\n  <head><title>Hello\
    \ World in XHTML</title></head>\n  <body>Hello World!</body>\n  </html>]]>\n```\n\
    \n这样，整个块将按原样发送到客户端，不被解释。然而，发送本可以在源代码处验证 XML 合规性的代码似乎是一种认输。你不觉得吗？\n\n**IE 和 XHTML**\n\
    \n微软直到 IE9 才在其 Internet Explorer 中包含对 XHTML 的完全支持。不幸的是，IE9 至少需要 Windows Vista。如果你运行的是\
    \ XP，那你运气不好。\n\n但即使你运行的是 Vista，为了安装 IE9，你首先需要安装 Service Pack 2，而它*不是*自动更新。此外，虽然所有其他浏览器在识别内容类型为\
    \ `\"text/html\"` 的页面中的 XHTML 时都没有问题，但 IE 要求你将页面的 MIME 类型指定为 `\"application/xhtml+xml\"\
    `。\n\n供你参考，2012 年 4 月，[`http://en.wikipedia.org/wiki/Web_browsers`](http://en.wikipedia.org/wiki/Web_browsers)\
    \ 报告称 IE [仍然] 约占全球浏览器使用量的 26%。大约在同一时间，[`http://www.statowl.com`](http://www.statowl.com)\
    \ 声称大约 36% 的已安装 IE 是版本 9。这意味着当时几乎有 17% 的人无法查看 XHTML 页面。当你阅读本文时，这个百分比将显著下降，不仅因为更多人将升级到最新版本的\
    \ IE，还因为许多人将转而使用 Chrome、Android 或其他浏览器。\n\n现在你终于准备好处理将 `hello.jsp` 中的脚本小程序转换为\
    \ XML 语法了。[清单 5-17](#Chapter05.html#list_5_17) 显示了完整的 `hello.jspx`。\n\n***清单 5-17.**\
    \ hello.jspx*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<jsp:root\n\
    \    \n  version=\"2.1\"\n  >\n<jsp:directive.page\n  language=\"java\"\n  contentType=\"\
    application/xhtml+xml;charset=UTF-8\"\n  />\n<jsp:output omit-xml-declaration=\"\
    false\"/>\n<jsp:output\n  doctype-root-element=\"html\"\n  doctype-public=\"-//W3C//DTD\
    \ XHTML 1.0 Strict//EN\"\n  doctype-system=\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
    \n  />\n<html >\n<head><title>Hello World in XHTML</title></head>\n<body>\n  <jsp:text>Hello\
    \ World!</jsp:text>\n  <br/>\n  <jsp:text>Your IP address is ${pageContext.request.remoteAddr}</jsp:text>\n\
    \  <br/>\n  <jsp:text>and your browser is </jsp:text>\n  <c:set var=\"usAg\" value=\"\
    ${header['user-agent']}\"/>\n  <c:choose>\n    <c:when test=\"${fn:contains(usAg,\
    \ 'MSIE')}\">\n      <jsp:text>MS InternetExplorer</jsp:text>\n      </c:when>\n\
    \    <c:when test=\"${fn:contains(usAg, 'Firefox')}\">\n      <jsp:text>Mozilla\
    \ Firefox</jsp:text>\n      </c:when>\n    <c:when test=\"${fn:contains(usAg,\
    \ 'Opera')}\">\n      <jsp:text>Opera</jsp:text>\n      </c:when>\n    <c:when\
    \ test=\"${fn:contains(usAg, 'Chrome')}\">\n      <jsp:text>Google Chrome</jsp:text>\n\
    \      </c:when>\n    <c:when test=\"${fn:contains(usAg, 'Safari')}\">\n     \
    \ <jsp:text>Apple Safari</jsp:text>\n      </c:when>\n    <c:otherwise><jsp:text>unknown</jsp:text></c:otherwise>\n\
    \    </c:choose>\n</body>\n</html>\n</jsp:root>\n```\n\n![Image](images/square.jpg)\
    \ **注意** 在 JSP 文档中，你不能使用诸如 `${whatever > 0}` 之类的表达式，因为大于号在 XML 中是非法的。相反，请使用 `gt`\
    \ 形式，例如 `${whatever gt 0}`。\n\n作为将 JSP 页面转换为 JSP 文档的第二个示例，你可以将 `starfleet.jspx`（[清单\
    \ 5-18](#Chapter05.html#list_5_18)）与原始的 `starfleet.jsp`（[清单 5-10](#Chapter05.html#list_5_10)）进行比较。\n\
    \n***清单 5-18.** starfleet.jspx*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
    ?>\n<jsp:root\n    \n  version=\"2.1\"\n  >\n<jsp:directive.page\n  language=\"\
    java\"\n  contentType=\"application/xhtml+xml;charset=UTF-8\"\n  />\n<jsp:output\
    \ omit-xml-declaration=\"false\"/>\n<jsp:output\n  doctype-root-element=\"html\"\
    \n  doctype-public=\"-//W3C//DTD XHTML 1.0 Strict//EN\"\n  doctype-system=\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
    \n  />\n<c:import url=\"starfleet.xml\" var=\"sf\"/>\n<x:parse doc=\"${sf}\" varDom=\"\
    dom\"/>\n<html >\n<head>\n  <title>Parsing starfleet.xml</title>\n  <style>th\
    \ {text-align:left}</style>\n  </head>\n<body>\n<table border=\"1\">\n  <tr><th>Name</th><th>S/N</th><th>Class</th><th>Year</th><th>Captain</th></tr>\n\
    \  <x:forEach var=\"tag\" select=\"$dom//starship\">\n    <tr>\n      <td><x:out\
    \ select=\"$tag/@name\"/></td>\n      <td><x:out select=\"$tag/@sn\"/></td>\n\
    \      <td><x:out select=\"$tag/class\"/></td>\n      <td><x:out select=\"$tag/class/@commissioned\"\
    /></td>\n      <td><x:out select=\"$tag/captain\"/></td>\n      </tr>\n    </x:forEach>\n\
    \  </table>\n</body>\n</html>\n</jsp:root>\n```\n\n前 17 行与 `hello.jspx` 的对应行相同，而文档的其余部分与\
    \ `starfleet.jsp` 的对应行相同，只是添加了 `jsp:root` 的结束标签。这是因为 `starfleet.jsp` 不包含任何脚本元素或未标记的文本。\n\
    \n### 总结\n\n在本章中，你了解了 XML 文档、DTD 和 XML 模式的结构和语法。\n\n然后，你看到了几种如何根据 DTD 和模式验证 XML\
    \ 文档的方法。\n\n接下来，我向你介绍了 XSL，并解释了 XPath 的使用示例以及从 XML 到 XML 和从 XML 到 HTML 的转换。\n\n\
    最后，我展示了如何将带有指令和脚本元素的 JSP 页面转换为完全符合 XML 规范的 JSP 文档。\n\n在下一章中，我们将讨论数据库。\n\n## 第\
    \ 6 章\n\n![Image](images/3square.jpg)\n\n## 数据库\n\n在许多情况下，Web 应用程序只不过是数据库 (DB)\
    \ 的前端。事实上，使网页动态化的正是背后有大量数据这一事实。\n\n数据库由有组织的数据组成——即数据本身和提供数据结构的*模式*。如今，大多数数据库都组织成*表*。你可以独立于将要存储到其中的实际数据来定义表特征。这是格式和内容分离的另一个实例，你在[第\
    \ 3 章](#Chapter03.html)讨论 Web 应用程序时已经遇到过。\n\n数据库管理系统 (DBMS)，例如 MySQL 或 PostgreSQL，是一个软件包，它允许你创建、检索、更新和删除\
    \ (CRUD) 数据项和模式元素。\n\n因此，在谈论数据库时，你需要区分三个方面：\n\n> *   它包含的数据。\n> *   你为了高效地 CRUD\
    \ 数据而强加于数据的结构。\n> *   允许你操作数据本身和数据库结构的软件 (DBMS)。\n\n使用数据库意味着你正在与其 DBMS 进行交互。你可以通过命令行界面\
    \ (CLI)、通过 DBMS 供应商和第三方提供的图形用户界面 (GUI)，或通过 API 以编程方式执行此操作。通常，你会使用所有三种方法，每种方法用于不同的目的。CLI\
    \ 最适合设置初始数据结构和进行测试，API 用于你的 Web 应用程序与数据库交互以执行其任务，而 GUI 用于检查单个数据项或修复一次性问题。\n\n\
    在本章的示例中，我将使用 MySQL 作为首选的 DBMS，因为首先，它是免费提供的，其次，它是免费提供的 DBMS 中使用最广泛的。因此，它已被证明可以在各种环境中可靠地工作。在本章末尾，我将简要讨论\
    \ MySQL 的可能替代方案。\n\n### MySQL\n\n在本节中，我将解释如何安装 MySQL。你实际上需要三个包：MySQL 数据库服务器、用于从\
    \ Java 访问 MySQL 数据库的连接器 (JDBC) 以及 MySQL Workbench，这是一个允许你通过舒适的 GUI 轻松检查和修改数据库的应用程序。\n\
    \n要安装 MySQL，请执行以下操作：\n\n> 1.  转到 [`http://dev.mysql.com/downloads/`](http://dev.mysql.com/downloads/)\
    \ 并单击标有 \"`Download`\" 的绿色大按钮。\n> 2.  确保所选平台是 \"Microsoft Windows\"，然后单击 \"`Download`\"\
    \ 按钮。\n> 3.  在下载包之前，你必须以用户身份登录或注册成为用户。然后，在选择镜像站点后，你将能够下载 MSI 安装程序 `mysql-installer-5.5.21.0.msi`（或更新版本）。此包包含\
    \ MySQL 的所有三个组件。请注意，Workbench 需要 \".NET 4.0\" 和 \"Visual C++ 2010 Redistributable\
    \ Package\"。MySQL 安装程序将指导你下载和安装它们（如果需要）。或者，你可以转到 [`http://dev.mysql.com/resources/wb52_prerequisites.html`](http://dev.mysql.com/resources/wb52_prerequisites.html)\
    \ 以确保你事先已准备好一切。\n> 4.  执行 MySQL 安装程序时，选择 \"`Full`\" 安装。\n> 5.  默认情况下，MySQL 将所有数据库保存在\
    \ \"`C:\\Program Data\\MySQL\\MySQL Server 5.5`\" 中。我选择将数据路径更改为 \"`C:\\Program\
    \ Data\\MySQL\\data`\\\"，因为这样更方便访问和备份。\n> 6.  选择 \"`Standard Configuration`\"\
    ，并在单击 \"`Next >`\" 之前勾选两个选项框。第一个选项是从启动时就将 MySQL 作为服务运行。第二个选项允许你从命令行使用 MySQL。\n\
    > 7.  保留默认配置：开发机器、启用 TCP/IP 并创建 Windows 服务 MySQL55。\n> 8.  我使用的安装程序版本强制我选择一个密码来访问数据库。\n\
    \n如果你像为 Tomcat 解释的那样转到服务控制面板，你应该会看到服务 MySQL55 正在运行。\n\n对于本书的示例，由于所有数据库都是本地访问且不包含有价值的数据，我决定不需要密码。\n\
    \n为了删除我在安装过程中被迫选择的密码，我打开了一个命令窗口，进入目录 \"`C:\\Program Files\\MySQL\\MySQL Server\
    \ 5.5\\bin\\\"` 并键入了命令 `\"mysqladmin -u root -p password\"`。程序要求我输入密码，我照做了，然后要求我两次输入新密码，我两次都按\
    \ `Enter` 键作为回答。\n\n这些包含所有组件的 MySQL 包不一定包含最新版本的连接器和 Workbench。我并不特别关心拥有最新的 Workbench，因为我打算只使用它来检查从\
    \ JSP 生成的简单数据库。但我渴望拥有最新的 Java 连接器。因此，我去了 [`http://dev.mysql.com/downloads/connector/j/`](http://dev.mysql.com/downloads/connector/j/)\
    \ 并下载了 `mysql-connector-java-5.1.18.zip`。\n\n要安装 JDBC，你只需要将其 JAR 文件复制到 `%CATALINA_HOME%\\\
    lib\\`。MySQL 安装程序将其放入 `C:\\Program Files\\MySQL\\MySQL Connector J\\`。\n\n为了方便访问，你应该创建一个指向\
    \ Workbench 应用程序的快捷方式，并将其放在 `quickstart` 栏或桌面上。应用程序路径如下所示：\n\n```\nC:\\Program\
    \ Files\\MySQL\\MySQL Workbench CE 5.2.37\\MySQLWorkbench.exe.\n```\n\n#### MySQL\
    \ 测试\n\n[清单 6-1](#Chapter06.html#list_6_1) 显示了一个 SQL 脚本，用于创建一个简单的数据库，我们将在你首次在[第\
    \ 3 章](#Chapter03.html)中遇到的 E-shop 应用程序中使用它。供你参考，我在[附录 B](#AppendixB.html) 中编写了\
    \ SQL 语言的摘要。\n\n***清单 6-1.** shop_create.sql*\n\n```\n01    drop database shop;\n\
    02    create database shop;\n03    create table shop.categories (\n04      category_id\
    \ integer not null auto_increment unique,\n05      category_name varchar(70),\n\
    07      primary key (category_id)\n08      );\n09    create table shop.books (\n\
    10      book_id integer not null auto_increment unique,\n11      title varchar(70),\n\
    12      author varchar(70),\n13      price double precision,\n14      category_id\
    \ integer,\n15      primary key (book_id)\n16      );\n17    create index category_id_key\
    \ on shop.categories (category_id);\n18    create index book_id_key on shop.books\
    \ (book_id);\n19    alter table shop.books add index category_id (category_id),\n\
    20      add constraint category_id foreign key (category_id)\n21      references\
    \ shop.categories (category_id)\n22      ;\n```\n\n第 01 行删除数据库。当你第一次使用它时，它会报告一个错误，因为没有数据库可以删除，但它也允许你重新运行脚本以从头开始重新创建数据库。在非测试环境中，这不是你通常会做的事情。\n\
    \n第 02 行创建一个名为 `shop` 的空白数据库。\n\n第 03 到 08 行创建一个用于存储图书类别的表。\n\n第 09 到 16 行创建一个用于存储图书记录的表。\n\
    \n第 17 行创建一个索引以加快类别搜索速度。\n\n第 18 行创建一个索引，以便在按 ID 选择图书时加快搜索速度。\n\n第 19 到 22 行创建一个索引，以便在按类别选择图书时加快搜索速度。\n\
    \n要执行 SQL 脚本，你可以使用命令行客户端或 Workbench。你将在本章的软件包中找到该脚本。\n\n要使用命令行客户端，请单击 \"`Start`\"\
    \ 并选择 \"`Programs` ![Image](images/U001.jpg) `MySQL` ![Image](images/U001.jpg)\
