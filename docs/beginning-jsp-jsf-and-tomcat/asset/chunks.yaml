  trans: "\n> 1.  访问网址 [`http://tomcat.apache.org/download-70.cgi`](http://tomcat.apache.org/download-70.cgi)。在第二个标题（“`Quick\
    \ Navigation`”）正下方，你会看到四个链接：`KEYS`、`7.0.26`、`Browse` 和 `Archives`。\n> 2.  点击 `7.0.26`\
    \ 后，页面会跳转到同一页面的底部，那里有一个相同版本号的标题。在该版本标题下方，你会看到子标题“`Core`”。再往下，紧挨着下一个子标题的上方，你会看到三个链接，排列如下：`32-bit/64-bit\
    \ Windows Service Installer`（`pgp`、`md5`）。\n> 3.  点击 `32-bit/64-bit Windows Service\
    \ Installer` 下载文件 `apache-tomcat-7.0.26.exe`（8.2 MB）。\n> 4.  在启动安装程序文件之前，你必须检查其完整性。为此，你需要一个小工具来计算其校验和。互联网上有几个免费的工具。我从\
    \ [`http://www.winmd5.com/`](http://www.winmd5.com/) 下载了 `WinMD5Free`，它对我有效，但这并不意味着我认为它比其他类似工具更好。它只是我看到的第一个。该程序不需要任何特殊安装：只需解压并启动即可。当你打开\
    \ Tomcat 安装程序文件时，你会看到一个 32 位的十六进制数字，类似于这样：`8ad7d25179168e74e3754391cdb24679`。\n\
    > 5.  返回你下载 Tomcat 安装程序的页面，点击 `md5` 链接（第三个，括号内的第二个）。这将打开一个包含单行文本的页面，如下所示：\n> \
    \    `8ad7d25179168e74e3754391cdb24679 *apache-tomcat-7.0.26.exe`\n>     \n> \
    \    \n>     \n>     如果该十六进制字符串与校验和工具计算出的字符串完全相同，则说明你下载的 Tomcat 安装程序版本未被损坏或以任何方式修改。\n\
    >     \n>     \n> 6.  现在你已经验证了 Tomcat 安装程序的正确性，启动它。\n> 7.  同意许可条款后，你将看到如图 1-5\
    \ 所示的对话框。点击 Tomcat 项前的加号，并选择“`Service`”和“`Native`”，如图所示，然后点击“`Next >`”按钮。\n> 8.\
    \  我选择将 Tomcat 安装在目录“`C:\\Program Files\\Apache Software Foundation\\Tomcat`”中，而不是默认的“`Tomcat\
    \ 7.0`”。这是因为有时你可能希望从程序内部指向此目录（通常称为 `%CATALINA_HOME%`），而有一天你可能会用 Tomcat 8.0 替换\
    \ Tomcat 7.0。通过将 Tomcat 的主目录命名为“`Tomcat`”，你在未来几年内都是“安全”的。你也可以决定保留默认设置。一般来说，使用默认设置，你遇到问题的可能性更小，因为任何应用程序的默认设置总是经过最充分的测试！\n\
    > 9.  接下来，Tomcat 安装程序会要求你指定连接器端口以及管理员登录的用户 ID 和密码。将端口保留为 8080，因为本书中的所有示例都引用端口\
    \ 8080。如果你愿意，以后可以随时将其更改为 HTTP 标准端口（即 80）。至于用户 ID/密码，你也可以使用你的 Windows 用户名和密码。这并不关键。\n\
    > 10.  最后，你需要提供 Java 运行时环境的路径。这是你在安装 Java 时看到的路径（参见上一节）。根据我安装的 Java 版本，正确的路径是\
    \ `C:\\Program Files\\Java\\jre7`。\n\n![图片](img/9781430246237_Fig01-05.jpg)\n\n\
    ***图 1-5.** Tomcat 的服务和本地设置*\n\nTomcat 作为 Windows 服务运行。要启动和停止它，你可以右键单击 Windows\
    \ 工具栏通知区域中的 Apache 服务管理器图标，然后选择相应的操作。你也可以通过打开 Windows 的 `Services` 控制面板（并右键单击\
    \ Tomcat 条目，如图 1-6 所示）来实现相同的结果。\n\n![图片](img/9781430246237_Fig01-06.jpg)\n\n***图\
    \ 1-6.** 从服务控制面板停止和启动 Tomcat*\n\n无论如何，要进入 `Services` 控制面板，请单击 Windows 的 `Start`\
    \ 菜单，然后选择 `Setting` ![图片](img/U001.jpg) `Control Panel` ![图片](img/U001.jpg) `Administrative\
    \ Tools` ![图片](img/U001.jpg) `Services`。你会看到数十个条目，但当你找到 Tomcat 服务时，其状态应为“`Started`”。\n\
    \n有了 Java 和 Tomcat，我们终于可以开始使用 JSP 了！\n\n#### 简单的 Tomcat 测试\n\n要查看 Tomcat 是否正常工作，请打开浏览器并输入\
    \ `localhost:8080`。你应该会看到如图 1-7 所示的页面（示例中为 Firefox）。\n\n![图片](img/9781430246237_Fig01-07.jpg)\n\
    \n***图 1-7.** 本地主机主页*\n\nWindows 可能会提示需要阻止一个需要权限的启动程序。要解决此问题，请进入 `User Accounts`\
    \ 控制面板，点击“`Turn User Account Control on or off`”来关闭 Windows 的用户帐户控制。无论如何，这个用户帐户控制可能很烦人，因为每次我在被视为受保护的目录（包括“`Program\
    \ Files`”文件夹中的所有目录）中处理文件时，它都会要求授权。\n\n重新启动后的某个时刻，如果你运行的是 Vista，Windows 的程序兼容性助手可能会显示一个对话框，指出位于\
    \ `C:\\Program Files\\Common Files\\Java Update\\jusched.exe` 的 Sun Java 计划程序与你的\
    \ Windows 版本不兼容。要解决此问题，你需要在点击“`Start`”后选择“`Run`”，在文本字段中输入“`msconfig`”（不含双引号），然后按\
    \ `Enter`。在对话框中选择“`Startup`”选项卡，找到 Java 更新程序的条目，并将其删除。\n"
- fmt: '### What Is JSP?


    `JSP` is a technology that lets you add dynamic content to web pages. In absence
    of `JSP`, to update the appearance or the content of plain static HTML pages,
    you always have to do it by hand. Even if all you want to do is change a date
    or a picture, you must edit the HTML file and type in your modifications. Nobody
    is going to do it for you, whereas with `JSP`, you can make the content dependent
    on many factors, including the time of the day, the information provided by the
    user, the user’s history of interaction with your web site, and even the user’s
    browser type. This capability is essential to provide online services in which
    you can tailor each response to the viewer who made the request, depending on
    the viewer’s preferences and requirements. A crucial aspect of providing meaningful
    online services is for the system to be able to *remember* data associated with
    the service and its users. That’s why databases play an essential role in dynamic
    web pages. But let’s take it one step at a time.


    ### History


    Sun Microsystems introduced `JSP` in 1999. Developers quickly realized that additional
    tags would be useful, and the `JSP` Standard Tag Library (`JSTL`) was born. `JSTL`
    is a collection of custom tag libraries that encapsulates the functionality of
    many `JSP` standard applications, thereby eliminating repetitions and making the
    applications more compact. Together with `JSTL` also came the `JSP` Expression
    Language (`EL`).


    In 2003, with the introduction of `JSP 2.0`, `EL` was incorporated into the `JSP`
    specification, making it available for custom components and template text, not
    just for `JSTL`, as was the case in the previous versions. Additionally, `JSP
    2.0` made it possible to create custom tag files, thereby perfecting the extendibility
    of the language.


    In parallel to the evolution of `JSP`, several frameworks to develop web applications
    became available. In 2004, one of them, `JavaServer Faces` (`JSF`), focused on
    building user interfaces (`UIs`) and used `JSP` by default as the underlying scripting
    language. It provided an `API`, `JSP` custom tag libraries, and an expression
    language.


    The `Java Community Process` (`JCP`), formed in 1998, released in May 2006 the
    `Java Specification Request` (`JSR`) 245 titled *JavaServer Pages 2.1*, which
    effectively aligned `JSP` and `JSF` technologies. In particular, `JSP 2.1` included
    a `Unified EL` (`UEL`) that merged the two versions of `EL` defined in `JSP 2.0`
    and `JSF 1.2` (itself specified as `JSR 252`). Sun Microsystems includes `JSP
    2.1` in its `Java Platform, Enterprise Edition 5` (`Java EE 5`), finalized in
    May 2006 as `JSR 244`.


    The latest version of Java is 7 (specified in `JSR 342` and released in July 2011).
    It includes `JSP 2.2`, `Servlets 3.1` (`JSR 340`), `EL 3.0` (`JSR 341`), and `JSF
    2.2` (`JSR 344`). Version 8 is expected in mid-2013. At the time of this writing,
    Java 7 is only available as part of the `JSE` (`Java Standard Edition`) platform.
    The latest version of Java released in the `JEE` (`Java Enterprise Edition`) platform
    is 6 (update 32).


    The latest version of Tomcat (7.0), supports `Servlets 3.0` and `JSF 2.1.7`.


    ### Viewing a JSP Page


    With `JSP`, the web page doesn’t actually exist on the server. As you can see
    in [Figure 1-8](#Chapter01.html#fig_1_8), the server creates it fresh when responding
    to each request.


    ![Image](images/9781430246237_Fig01-08.jpg)


    ***Figure 1-8.** Viewing a JSP page*


    The following steps explain how the web server creates the web page:


    > 1. As with a normal page, your browser sends an HTTP request to the web server.
    This doesn’t change with `JSP`, although the URL probably ends in `.jsp` instead
    of `.html` or `.htm`.

    > 2. The web server is not a normal server, but rather a Java server, with the
    extensions necessary to identify and handle Java servlets. The web server recognizes
    that the HTTP request is for a `JSP` page and forwards it to a `JSP` engine.

    > 3. The `JSP` engine loads the `JSP` page from disk and converts it into a Java
    servlet. From this point on, this servlet is indistinguishable from any other
    servlet developed directly in Java rather than `JSP`, although the automatically
    generated Java code of a `JSP` servlet is not always easy to read, and you should
    never modify it by hand.

    > 4. The `JSP` engine compiles the servlet into an executable class and forwards
    the original request to another part of the web server called the *servlet engine*.
    Note that the `JSP` engine only converts the `JSP` page to Java and recompiles
    the servlet if it finds that the `JSP` page has changed since the last request.
    This makes the process more efficient than with other scripting languages (such
    as `PHP`) and therefore faster.

    > 5. The servlet engine loads the servlet class and executes it. During execution,
    the servlet produces an output in HTML format, which the servlet engine passes
    to the web server inside an HTTP response.

    > 6. The web server forwards the HTTP response to your browser.

    > 7. Your web browser handles the dynamically generated HTML page inside the HTTP
    response exactly as if it were a static page. In fact, static and dynamic web
    pages are in the same format.


    You might ask, “Why do you say that with `JSP`, the page is created fresh for
    each request, if the server only converts and compiles the `JSP` source if you
    have updated it since the previous request?”


    What reaches your browser is the output generated by the servlet (that is, by
    the converted and compiled `JSP` page), not the `JSP` page itself. The same servlet
    produces different outputs depending on the parameters of the HTTP request and
    other factors. For example, suppose you’re browsing the products offered by an
    online shop. When you click on the image of a product, your browser generates
    an HTTP request with the product code as a parameter. As a result, the servlet
    generates an HTML page with the description of that product. The server doesn’t
    need to recompile the servlet for each product code.


    The servlet queries a database containing the details of all the products, obtains
    the description of the product you’re interested in, and formats an HTML page
    with that data. This is what dynamic HTML is all about!


    Plain HTML is not capable of interrogating a database, but Java is, and `JSP`
    gives you the means of including snippets of Java inside an HTML page.'
