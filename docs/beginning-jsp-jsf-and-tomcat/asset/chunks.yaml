- fmt: "### XML Schemas\n\nThe most significant difference from DTDs is that the schemas\
    \ are in XML syntax themselves. This makes the schemas more extensible and flexible\
    \ than DTDs. Furthermore, schemas can perform a more sophisticated validation\
    \ thanks to their support data types. As the schemas are in XML format, you can\
    \ store, handle, and style schemas like any other XML document. W3C describes\
    \ standardized XML schemas in three documents: [`http://www.w3.org/TR/xmlschema-0/`](http://www.w3.org/TR/xmlschema-0/)\
    \ (a primer to get you started), [`http://www.w3.org/TR/xmlschema-1/`](http://www.w3.org/TR/xmlschema-1/)\
    \ (about structures), and [`http://www.w3.org/TR/xmlschema-2/`](http://www.w3.org/TR/xmlschema-2/)\
    \ (about data types). Unfortunately, schemas are complicated, and the standards\
    \ aren’t exactly easy to read and understand. In this section, I am only going\
    \ to describe a sub-set of schemas that will get you by in most situations.\n\n\
    Let’s see the XML schema for `enterprises.xml` (see [Listing 5-3](#Chapter05.html#list_5_3)).\n\
    \n**Listing 5-3.** `starfleet.xsd`\n\n```\n01: <?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n02: <xsd:schema\n03:    \n04:     targetNamespace=\"http://localhost:8080/xml-validate/xsd\"\
    \n05:     elementFormDefault=\"qualified\"\n06:     attributeFormDefault=\"unqualified\"\
    \n07:     >\n08:   <xsd:annotation>\n09:     <xsd:documentation xml:lang=\"en\"\
    >\n10:       Schema for Starfleet\n11:       </xsd:documentation>\n12:     </xsd:annotation>\n\
    13:   <xsd:element name=\"starfleet\">\n14:     <xsd:complexType>\n15:       <xsd:sequence>\n\
    16:         <xsd:element name=\"title\" type=\"xsd:string\" maxOccurs=\"1\"/>\n\
    17:         <xsd:element name=\"starship\" type=\"ShipType\" maxOccurs=\"unbounded\"\
    />\n18:         </xsd:sequence>\n19:       </xsd:complexType>\n20:     </xsd:element>\n\
    21:   <xsd:complexType name=\"ShipType\">\n22:     <xsd:all>\n23:       <xsd:element\
    \ name=\"class\" type=\"ClassType\" minOccurs=\"1\"/>\n24:       <xsd:element\
    \ name=\"captain\" type=\"xsd:string\" minOccurs=\"1\"/>\n25:       </xsd:all>\n\
    26:     <xsd:attribute name=\"name\" type=\"xsd:string\" use=\"required\"/>\n\
    27:     <xsd:attribute name=\"sn\" type=\"xsd:string\" use=\"required\"/>\n28:\
    \     </xsd:complexType>\n29:   <xsd:complexType name=\"ClassType\">\n30:    \
    \ <xsd:attribute name=\"name\" type=\"xsd:string\" use=\"required\"/>\n31:   \
    \  </xsd:complexType>\n32:   </xsd:schema>\n```\n\nLines 2–7 establish that this\
    \ schema conforms to the standard XML schema and define the schema’s namespace\
    \ and how XML files are supposed to refer to elements and attributes. To understand\
    \ it all, you need to learn quite a bit about namespaces and schemas. The whole\
    \ matter is quite tricky, and the error messages you get when you try to validate\
    \ an XML document with a schema are sometimes implicit (more about this later).\
    \ For example, if you remove the setting of `elementFormDefault` to `\"qualified\"\
    ` and try to validate a correct XML document, you will get the following error\
    \ message:\n\n```\n*** Validation Error: org.xml.sax.SAXParseException; systemId:\
    \  \nfile:///C:/Program%20Files/Apache%20Software%20Foundation/Tomcat/webapps/xml-\n\
    validate/xml/enterprises_schema.xml; lineNumber: 7; columnNumber: 10;  \ncvc-complex-type.2.4.a:\
    \ Invalid content was found starting with element 'title'.\nOne of '{title}' is\
    \ expected.\n```\n\nHow can it be that the validator expects the element `title`\
    \ but complains when it encounters `title`? It has to do with the fact that normally\
    \ the element tags include a prefix and a colon before the element name, like\
    \ in `xsd:element`, and that schema and the XML document must be consistent.\n\
    \nLines 8–12 are essentially a comment.\n\nLines 13–20 specify the `starfleet`\
    \ element, which is of a complex type, as defined in Line 14. This means that\
    \ `starfleet` can have attributes and/or can contain other elements. Line 15 tells\
    \ you in which way `starfleet` is complex: it contains a sequence of elements.\
    \ Elements in `xsd:sequence` must appear in the order in which they are specified\
    \ (in this case, `title` followed by `starship`).\n\nLine 16 specifies that `title`\
    \ is of type `xsd:string`, which is a primitive type hard-coded in the standard\
    \ XML Schema. Line 16 also tells you that there can be maximum one `title` per\
    \ `starfleet`. It is also possible to define `minOccurs`, and the default for\
    \ both `minOccurs` and `maxOccurs` is `1`. This means that by omitting `minOccurs`,\
    \ you make `title` mandatory.\n\nLine 17 declares that the `starship` element\
    \ is of type `ShipType`, which is defined somewhere else in `starfleet.xsd`. This\
    \ is an alternative to defining the type of an element inside its body, as we\
    \ did with the `starfleet` element. Naming a type lets you use it for several\
    \ element definitions and as a base for more complex types. However, I have only\
    \ extracted the type specification from the body of `starship` to make the code\
    \ more readable. `maxOccurs=\"unbounded\"` states that there can be as many `starship`\
    \ elements in `starfleet` as you need.\n\nLines 21–28 define the type of the `starship`\
    \ element. It’s a complex type, but it’s different from that of `starfleet`. The\
    \ `xsd:all` group means that there can only be up to one element each of all those\
    \ listed, in any order. This would normally mean that each `starship` could be\
    \ empty or contain a `class`, a `captain`, or both as children. However, we want\
    \ to make ship `class` and `captain` mandatory. To achieve this result, we specified\
    \ the attribute `minOccurs=\"1\"` for both elements.\n\nLines 26–27 define the\
    \ two attributes of `starship`. The `use` attribute lets you specify that they\
    \ are mandatory.\n\nIf you now look again at `enterprises.xml`, you’ll notice\
    \ that the `class` element has an attribute (`name`). Because of this attribute,\
    \ you must define its type as complex, although `class` has no body. This is done\
    \ in lines 29–31. As you can see, you specify an empty body by creating a complex\
    \ type without sub-elements.\n\n### Occurrence Constraints\n\nIn `starfleet.xsd`,\
    \ we used three attributes to limit the number of occurrences: `minOccurs` and\
    \ `maxOccurs` when declaring elements, and `use` when declaring attributes. While\
    \ the constraints for elements accept non-negative integers as values (with `1`\
    \ as the default), `use` can only have one of the following values: `required`,\
    \ `optional` (the default), and `prohibited`. You can use two additional attributes\
    \ when declaring either elements or attributes: `default` and `fixed`.\n\nWhen\
    \ applied to an attribute, `default` supplies the value of an optional attribute\
    \ in case it is omitted when you define its element in the XML document (it is\
    \ an error to provide a default for attributes that are `required`). Note that\
    \ when you define elements in an XML document, they’re always created with all\
    \ their attributes, whether you explicitly define them in the XML document or\
    \ not, because their existence is determined by their presence in the schema.\
    \ When applied to an element, `default` refers to the element content, but it\
    \ never results in the creation of elements. It only provides content for empty\
    \ elements. For example: `<xsd:attribute name=\"country\" type=\"xsd:string\"\
    \ default=\"USA\"/>`.\n\nThe `fixed` constraint forces an attribute value or an\
    \ element content to have a particular value. You can still define a value in\
    \ the XML document, but it must match the fixed value assigned in the schema.\n\
    \n### Primitive and Derived Types\n\nWith `xsd:string`, you’ve already seen an\
    \ example of primitive types. [Table 5-1](#Chapter05.html#tab_5_1) summarizes\
    \ the full list of primitive types.\n\n![Image](images/9781430246237_Tab05-01.jpg)\n\
    \n![Image](images/9781430246237_Tab05-01a.jpg)\n\nThe XML Schema standard also\
    \ defines additional types called *derived*, among which are those listed in [Table\
    \ 5-2](#Chapter05.html#tab_5_2).\n\n![Image](images/9781430246237_Tab05-02.jpg)\n\
    \n![Image](images/9781430246237_Tab05-02a.jpg)"
  raw: '#### XML Schemas


    The most significant difference from DTDs is that the schemas are in XML syntax
    themselves. This makes the schemas more extensible and flexible than DTDs. Furthermore,
    schemas can perform a more sophisticated validation thanks to their support data
    types. As the schemas are in XML format, you can store, handle, and style schemas
    like any other XML document. W3C describes standardized XML schemas in three documents:
    [`http://www.w3.org/TR/xmlschema-0/`](http://www.w3.org/TR/xmlschema-0/) (a primer
    to get you started), [`http://www.w3.org/TR/xmlschema-1/`](http://www.w3.org/TR/xmlschema-1/)
    (about structures), and [`http://www.w3.org/TR/xmlschema-2/`](http://www.w3.org/TR/xmlschema-2/)
    (about data types). Unfortunately, schemas are complicated, and the standards
    aren’t exactly easy to read and understand. In this section, I am only going to
    describe a sub-set of schemas that will get you by in most situations.


    Let’s see the XML schema for `enterprises.xml` (see [Listing 5-3](#Chapter05.html#list_5_3)).


    ***Listing 5-3.** starfleet.xsd*


    `01: <?xml version="1.0" encoding="UTF-8"?>`

    `02: <xsd:schema`

    `03:    `

    `04:     targetNamespace="http://localhost:8080/xml-validate/xsd"`

    `05:     elementFormDefault="qualified"`

    `06:     attributeFormDefault="unqualified"`

    `07:     >`

    `08:   <xsd:annotation>`

    `09:     <xsd:documentation xml:lang="en">`

    `10:       Schema for Starfleet`

    `11:       </xsd:documentation>`

    `12:     </xsd:annotation>`

    `13:   <xsd:element name="starfleet">`

    `14:     <xsd:complexType>`

    `15:       <xsd:sequence>`

    `16:         <xsd:element name="title" type="xsd:string" maxOccurs="1"/>`

    `17:         <xsd:element name="starship" type="ShipType" maxOccurs="unbounded"/>`

    `18:         </xsd:sequence>`

    `19:       </xsd:complexType>`

    `20:     </xsd:element>`

    `21:   <xsd:complexType name="ShipType">`

    `22:     <xsd:all>`

    `23:       <xsd:element name="class" type="ClassType" minOccurs="1"/>`

    `24:       <xsd:element name="captain" type="xsd:string" minOccurs="1"/>`

    `25:       </xsd:all>`

    `26:     <xsd:attribute name="name" type="xsd:string" use="required"/>`

    `27:     <xsd:attribute name="sn" type="xsd:string" use="required"/>`

    `28:     </xsd:complexType>`

    `29:   <xsd:complexType name="ClassType">`

    `30:     <xsd:attribute name="name" type="xsd:string" use="required"/>`

    `31:     </xsd:complexType>`

    `32:   </xsd:schema>`


    Lines 2–7 establish that this schema conforms to the standard XML schema and define
    the schema’s namespace and how XML files are supposed to refer to elements and
    attributes. To understand it all, you need to learn quite a bit about namespaces
    and schemas. The whole matter is quite tricky, and the error messages you get
    when you try to validate an XML document with a schema are sometimes implicit
    (more about this later). For example, if you remove the setting of `elementFormDefault`
    to `"qualified"` and try to validate a correct XML document, you will get the
    following error message:


    `*** Validation Error: org.xml.sax.SAXParseException; systemId:  `![Image](images/U002.jpg)

    `file:///C:/Program%20Files/Apache%20Software%20Foundation/Tomcat/webapps/xml-`
    ![Image](images/U002.jpg)

    `validate/xml/enterprises_schema.xml; lineNumber: 7; columnNumber: 10;  `![Image](images/U002.jpg)

    `cvc-complex-type.2.4.a: Invalid content was found starting with element ''title''.`
    ![Image](images/U002.jpg)

    `One of ''{title}'' is expected.`


    How can it be that the validator expects the element `title` but complains when
    it encounters `title`? It has to do with the fact that normally the element tags
    include a prefix and a colon before the element name, like in `xsd:element`, and
    that schema and the XML document must be consistent.


    Lines 8–12 are essentially a comment.


    Lines 13–20 specify the `starfleet` element, which is of a complex type, as defined
    in Line 14\. This means that `starfleet` can have attributes and/or can contain
    other elements. Line 15 tells you in which way `starfleet` is complex: it contains
    a sequence of elements. Elements in `xsd:sequence` must appear in the order in
    which they are specified (in this case, `title` followed by `starship`).


    Line 16 specifies that `title` is of type `xsd:string`, which is a primitive type
    hard-coded in the standard XML Schema. Line 16 also tells you that there can be
    maximum one `title` per `starfleet`. It is also possible to define `minOccurs`,
    and the default for both `minOccurs` and `maxOccurs` is `1`. This means that by
    omitting `minOccurs`, you make `title` mandatory.


    Line 17 declares that the `starship` element is of type `ShipType`, which is defined
    somewhere else in `starfleet.xsd`. This is an alternative to defining the type
    of an element inside its body, as we did with the `starfleet` element. Naming
    a type lets you use it for several element definitions and as a base for more
    complex types. However, I have only extracted the type specification from the
    body of `starship` to make the code more readable. `maxOccurs="unbounded"` states
    that there can be as many `starship` elements in `starfleet` as you need.


    Lines 21–28 define the type of the `starship` element. It’s a complex type, but
    it’s different from that of `starfleet`. The `xsd:all` group means that there
    can only be up to one element each of all those listed, in any order. This would
    normally mean that each `starship` could be empty or contain a `class`, a `captain`,
    or both as children. However, we want to make ship `class` and `captain` mandatory.
    To achieve this result, we specified the attribute `minOccurs="1"` for both elements.


    Lines 26–27 define the two attributes of `starship`. The `use` attribute lets
    you specify that they are mandatory.


    If you now look again at `enterprises.xml`, you’ll notice that the `class` element
    has an attribute (`name`). Because of this attribute, you must define its type
    as complex, although `class` has no body. This is done in lines 29–31\. As you
    can see, you specify an empty body by creating a complex type without sub-elements.


    ##### Occurrence Constraints


    In `starfleet.xsd`, we used three attributes to limit the number of occurrences:
    `minOccurs` and `maxOccurs` when declaring elements, and `use` when declaring
    attributes. While the constraints for elements accept non-negative integers as
    values (with `1` as the default), `use` can only have one of the following values:
    `required`, `optional` (the default), and `prohibited`. You can use two additional
    attributes when declaring either elements or attributes: `default` and `fixed`.


    When applied to an attribute, `default` supplies the value of an optional attribute
    in case it is omitted when you define its element in the XML document (it is an
    error to provide a default for attributes that are `required`). Note that when
    you define elements in an XML document, they’re always created with all their
    attributes, whether you explicitly define them in the XML document or not, because
    their existence is determined by their presence in the schema. When applied to
    an element, `default` refers to the element content, but it never results in the
    creation of elements. It only provides content for empty elements. For example:
    `<xsd:attribute name="country" type="xsd:string" default="USA"/>`.


    The `fixed` constraint forces an attribute value or an element content to have
    a particular value. You can still define a value in the XML document, but it must
    match the fixed value assigned in the schema.


    ##### Primitive and Derived Types


    With `xsd:string`, you’ve already seen an example of primitive types. [Table 5-1](#Chapter05.html#tab_5_1)
    summarizes the full list of primitive types.


    ![Image](images/9781430246237_Tab05-01.jpg)


    ![Image](images/9781430246237_Tab05-01a.jpg)


    The XML Schema standard also defines additional types called *derived*, among
    which are those listed in [Table 5-2](#Chapter05.html#tab_5_2).


    ![Image](images/9781430246237_Tab05-02.jpg)


    ![Image](images/9781430246237_Tab05-02a.jpg)'
  trans: '

    #### XML 模式


    与 DTD 最显著的区别在于，模式本身采用 XML 语法编写。这使得模式比 DTD 更具扩展性和灵活性。此外，由于支持数据类型，模式能够执行更复杂的验证。由于模式是
    XML 格式，你可以像处理任何其他 XML 文档一样存储、处理和样式化模式。W3C 在三份文档中描述了标准化的 XML 模式：[`http://www.w3.org/TR/xmlschema-0/`](http://www.w3.org/TR/xmlschema-0/)（入门指南）、[`http://www.w3.org/TR/xmlschema-1/`](http://www.w3.org/TR/xmlschema-1/)（关于结构）和
    [`http://www.w3.org/TR/xmlschema-2/`](http://www.w3.org/TR/xmlschema-2/)（关于数据类型）。不幸的是，模式很复杂，而且这些标准并不容易阅读和理解。在本节中，我将只描述模式的一个子集，它足以让你应对大多数情况。


    让我们看看 `enterprises.xml` 的 XML 模式（参见 清单 5-3）。


    ***清单 5-3.** starfleet.xsd*


    `01: <?xml version="1.0" encoding="UTF-8"?>`

    `02: <xsd:schema`

    `03:    `

    `04:     targetNamespace="http://localhost:8080/xml-validate/xsd"`

    `05:     elementFormDefault="qualified"`

    `06:     attributeFormDefault="unqualified"`

    `07:     >`

    `08:   <xsd:annotation>`

    `09:     <xsd:documentation xml:lang="en">`

    `10:       Schema for Starfleet`

    `11:       </xsd:documentation>`

    `12:     </xsd:annotation>`

    `13:   <xsd:element name="starfleet">`

    `14:     <xsd:complexType>`

    `15:       <xsd:sequence>`

    `16:         <xsd:element name="title" type="xsd:string" maxOccurs="1"/>`

    `17:         <xsd:element name="starship" type="ShipType" maxOccurs="unbounded"/>`

    `18:         </xsd:sequence>`

    `19:       </xsd:complexType>`

    `20:     </xsd:element>`

    `21:   <xsd:complexType name="ShipType">`

    `22:     <xsd:all>`

    `23:       <xsd:element name="class" type="ClassType" minOccurs="1"/>`

    `24:       <xsd:element name="captain" type="xsd:string" minOccurs="1"/>`

    `25:       </xsd:all>`

    `26:     <xsd:attribute name="name" type="xsd:string" use="required"/>`

    `27:     <xsd:attribute name="sn" type="xsd:string" use="required"/>`

    `28:     </xsd:complexType>`

    `29:   <xsd:complexType name="ClassType">`

    `30:     <xsd:attribute name="name" type="xsd:string" use="required"/>`

    `31:     </xsd:complexType>`

    `32:   </xsd:schema>`


    第 2–7 行确立了此模式符合标准 XML 模式，并定义了模式的命名空间以及 XML 文件应如何引用元素和属性。要完全理解这些内容，你需要学习不少关于命名空间和模式的知识。整个问题相当棘手，当你尝试使用模式验证
    XML 文档时，得到的错误消息有时是隐晦的（稍后会详细介绍）。例如，如果你移除 `elementFormDefault` 设置为 `"qualified"`
    的配置，并尝试验证一个正确的 XML 文档，你将收到以下错误消息：


    `*** Validation Error: org.xml.sax.SAXParseException; systemId:  `![Image](img/U002.jpg)

    `file:///C:/Program%20Files/Apache%20Software%20Foundation/Tomcat/webapps/xml-`
    ![Image](img/U002.jpg)

    `validate/xml/enterprises_schema.xml; lineNumber: 7; columnNumber: 10;  `![Image](img/U002.jpg)

    `cvc-complex-type.2.4.a: Invalid content was found starting with element ''title''.`
    ![Image](img/U002.jpg)

    `One of ''{title}'' is expected.`


    为什么验证器期望元素 `title`，却在遇到 `title` 时报错？这与以下事实有关：通常元素标签在元素名称前包含一个前缀和冒号，例如 `xsd:element`，并且模式与
    XML 文档必须保持一致。


    第 8–12 行本质上是一条注释。


    第 13–20 行指定了 `starfleet` 元素，它是一个复杂类型，如第 14 行所定义。这意味着 `starfleet` 可以拥有属性，并且/或者可以包含其他元素。第
    15 行说明了 `starfleet` 的复杂之处：它包含一个元素序列。`xsd:sequence` 中的元素必须按照它们指定的顺序出现（在本例中，先是 `title`，然后是
    `starship`）。


    第 16 行指定 `title` 的类型为 `xsd:string`，这是标准 XML 模式中硬编码的原始类型。第 16 行还告诉你，每个 `starfleet`
    最多只能有一个 `title`。也可以定义 `minOccurs`，`minOccurs` 和 `maxOccurs` 的默认值都是 `1`。这意味着通过省略
    `minOccurs`，你使得 `title` 成为必填项。


    第 17 行声明 `starship` 元素的类型为 `ShipType`，该类型在 `starfleet.xsd` 的其他地方定义。这是定义元素类型的一种替代方法，不同于我们在
    `starfleet` 元素中所做的在其主体内部定义类型。命名一个类型可以让你在多个元素定义中使用它，并作为更复杂类型的基础。然而，我只是将类型规范从 `starship`
    的主体中提取出来，以使代码更具可读性。`maxOccurs="unbounded"` 表明 `starfleet` 中可以根据需要包含任意多个 `starship`
    元素。


    第 21–28 行定义了 `starship` 元素的类型。它是一个复杂类型，但与 `starfleet` 的类型不同。`xsd:all` 组意味着所列出的每个元素最多只能出现一个，且顺序不限。这通常意味着每个
    `starship` 可以为空，或者包含 `class`、`captain` 或两者作为子元素。然而，我们希望飞船的 `class` 和 `captain`
    是必填项。为了实现这个结果，我们为这两个元素指定了属性 `minOccurs="1"`。


    第 26–27 行定义了 `starship` 的两个属性。`use` 属性让你可以指定它们是必填的。


    如果你现在再看一下 `enterprises.xml`，你会注意到 `class` 元素有一个属性（`name`）。由于这个属性，你必须将其类型定义为复杂类型，尽管
    `class` 没有主体内容。这在第 29–31 行中完成。如你所见，你通过创建一个没有子元素的复杂类型来指定一个空的主体。


    ##### 出现次数约束


    在 `starfleet.xsd` 中，我们使用了三个属性来限制出现次数：声明元素时使用 `minOccurs` 和 `maxOccurs`，声明属性时使用
    `use`。虽然元素的约束接受非负整数作为值（默认值为 `1`），但 `use` 只能取以下值之一：`required`、`optional`（默认值）和
    `prohibited`。在声明元素或属性时，你还可以使用两个额外的属性：`default` 和 `fixed`。


    当应用于属性时，`default` 会在你在 XML 文档中定义其元素时省略该可选属性的情况下提供其值（为 `required` 的属性提供默认值是错误的）。请注意，当你在
    XML 文档中定义元素时，无论你是否在 XML 文档中显式定义它们，它们总是会创建所有属性，因为它们的存由它们在模式中的存在决定。当应用于元素时，`default`
    指的是元素内容，但它永远不会导致元素的创建。它只为空元素提供内容。例如：`<xsd:attribute name="country" type="xsd:string"
    default="USA"/>`。


    `fixed` 约束强制属性值或元素内容具有特定值。你仍然可以在 XML 文档中定义一个值，但它必须与模式中分配的固定值匹配。


    ##### 原始类型和派生类型


    通过 `xsd:string`，你已经看到了一个原始类型的例子。表 5-1 总结了原始类型的完整列表。


    ![Image](img/9781430246237_Tab05-01.jpg)


    ![Image](img/9781430246237_Tab05-01a.jpg)


    XML 模式标准还定义了称为*派生*的附加类型，其中包括 表 5-2 中列出的那些。


    ![Image](img/9781430246237_Tab05-02.jpg)


    ![Image](img/9781430246237_Tab05-02a.jpg)

