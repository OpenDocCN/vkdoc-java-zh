    ## XML 与 JSP


    HTML 可能是我们大多数人接触到的第一种标记语言。它是一种很棒的语言，但也并非没有问题。


    例如，HTML 将内容数据与信息的呈现方式混合在一起，这使得以不同方式呈现相同数据以及跨多组数据标准化呈现变得困难。层叠样式表（CSS）显著减少了这个问题，但并未完全消除它，而且它还迫使你学习另一种语言。


    另一个问题，部分归因于 HTML 的定义方式，是浏览器对编写不一致的页面非常宽容。在许多情况下，它们能够渲染带有未加引号的属性值和未正确闭合标签的页面。这助长了编码中的草率行为，并浪费了计算机资源。


    XML（其标准可在 [`http://www.w3.org/TR/xml`](http://www.w3.org/TR/xml) 获取）允许你将信息组织成树状结构，其中每条信息代表一个叶子节点。它的强大和灵活性在于定义了其语法和一种定义标签的机制。这使得你可以针对正在处理的信息类型定义自己的标记语言。这也允许你将
    XHTML（一种消除了不一致性的 HTML 版本）定义为格式良好的 XML 文件。


    此外，XML 是交换结构化信息的完美载体。事实上，XML 的目的正是描述信息。


    我从 HTML 开始介绍 XML，是因为你对 HTML 很熟悉，而且它们都是标记语言。然而，XML 的实用性远不止为 HTML 提供更好的语法。在需要结构化信息时，优先使用
    XML 而非专有格式的巨大优势在于，标准化的解析器使得操作 XML 文档变得容易。在本章中，你还将学习如何使用 XML 自定义标签和 XPath 在 JSP
    中解析 XML 文档。


    许多组织，无论是私有的还是公共的，都已经转向使用 XML 来标准化各自领域内信息的表示。


    一些举措非常雄心勃勃，例如开发通用商业语言（UBL）以生成基于 XML 的商业文档标准，如采购订单和发票（参见 [`http://ubl.xml.org`](http://ubl.xml.org)）。


    其他举措，例如用于标准化房地产交易编码的房地产交易标记语言（RETML），已经经历了多年的改进和相关工具的开发，并且正在被采用。


    还有一些举措，比如读心术标记语言（MRML），可能只是为了好玩（参见 [`http://ifaq.wap.org/computers/mrml.html`](http://ifaq.wap.org/computers/mrml.html)）。


    OASIS 是一个促进建立信息交换开放标准的非营利联盟，它在 [`http://xml.coverpages.org/xmlApplications.html`](http://xml.coverpages.org/xmlApplications.html)
    列出了近 600 个 XML 应用和举措。


    **层叠样式表**


    样式表的概念源于桌面出版。样式表用于将呈现与内容分离。术语“层叠”指的是你可以编写一系列样式表，其中每个样式表都建立在更通用的样式表之上并对其进行细化。


    在讨论与 HTML 页面关联的样式表时，W3C 制定了两项相关标准：层叠样式表，第 1 级（CSS1）和层叠样式表，第 2 级（CSS2）。（分别参见 [`http://www.w3.org/TR/REC-CSS1`](http://www.w3.org/TR/REC-CSS1)
    和 [`http://www.w3.org/TR/REC-CSS2`](http://www.w3.org/TR/REC-CSS2)。）


    定义样式需要以下三个组件：`selector {property: value}`

