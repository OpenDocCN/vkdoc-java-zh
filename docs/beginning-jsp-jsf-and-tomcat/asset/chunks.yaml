    ## 数据库


    在许多情况下，Web 应用程序只不过是数据库（DB）的前端。事实上，使 Web 页面动态化的正是其背后有大量数据这一事实。


    数据库由组织化的数据组成——即数据本身和提供数据结构的*模式*。如今，大多数数据库都组织成*表*。你可以独立于将要存储到其中的实际数据来定义表特征。这是格式和内容分离的另一个实例，你在第
    3 章讨论 Web 应用程序时已经遇到过。


    数据库管理系统（DBMS），例如 MySQL 或 PostgreSQL，是一个软件包，它允许你创建、检索、更新和删除（CRUD）数据项和模式元素。


    因此，在谈论数据库时，你需要区分三个方面：


    > *   它包含的数据。

    > *   你为了高效地 CRUD 数据而强加于数据的结构。

    > *   允许你操作数据本身和数据库结构的软件（DBMS）。


    使用数据库意味着你正在与其 DBMS 进行交互。你可以通过命令行界面（CLI）、通过 DBMS 供应商和第三方提供的图形用户界面（GUI），或者通过 API
    以编程方式来实现。通常，你会同时使用这三种方法，每种方法用于不同的目的。CLI 最适合设置初始数据结构和进行测试，API 用于你的 Web 应用程序与数据库交互以执行其任务，而
    GUI 用于检查单个数据项或修复一次性问题。


    在本章的示例中，我将使用 MySQL 作为首选的 DBMS，首先，它是免费提供的，其次，它是免费可用的 DBMS 中使用最广泛的。因此，它已被证明可以在各种环境中可靠地工作。在本章末尾，我将简要讨论
    MySQL 的可能替代方案。


    ### MySQL


    在本节中，我将解释如何安装 MySQL。你实际上需要三个包：MySQL 数据库服务器、用于从 Java 访问 MySQL 数据库的连接器（JDBC）以及 MySQL
    Workbench，这是一个允许你通过舒适的 GUI 轻松检查和修改数据库的应用程序。


    要安装 MySQL，请执行以下操作：


    > 1.  转到 [`http://dev.mysql.com/downloads/`](http://dev.mysql.com/downloads/)
    并单击标有 "`Download`" 的绿色大按钮。

    > 2.  确保所选平台是 "Microsoft Windows"，然后单击 "`Download`" 按钮。

    > 3.  在下载包之前，你必须以用户身份登录，或注册成为用户。然后，在选择一个镜像站点后，你将能够下载 MSI 安装程序 `mysql-installer-5.5.21.0.msi`（或更新版本）。此包包含
    MySQL 的所有三个组件。请注意，Workbench 需要 ".NET 4.0" 和 "Visual C++ 2010 Redistributable Package"。MySQL
    安装程序将指导你下载并安装它们（如果需要）。或者，你可以转到 [`http://dev.mysql.com/resources/wb52_prerequisites.html`](http://dev.mysql.com/resources/wb52_prerequisites.html)
    以确保你事先已准备好一切。

    > 4.  当你执行 MySQL 安装程序时，选择 "`Full`" 安装。

    > 5.  默认情况下，MySQL 将所有数据库保存在 "`C:\Program Data\MySQL\MySQL Server 5.5`" 中。我选择将数据路径更改为
    "`C:\Program Data\MySQL\data`\"，因为这样更方便访问和备份。

    > 6.  选择 "`Standard Configuration`"，并在单击 "`Next >`" 之前勾选两个选项框。第一个选项是从启动时就将 MySQL
    作为服务运行。第二个选项允许你从命令行使用 MySQL。

    > 7.  保留默认配置：开发机器、启用 TCP/IP 并创建 Windows 服务 MySQL55。

    > 8.  我使用的安装程序版本强制我选择一个密码来访问数据库。


    如果你像解释 Tomcat 那样进入服务控制面板，你应该会看到 MySQL55 服务正在运行。


    对于本书的示例，由于所有数据库都是本地访问且不包含有价值的数据，我决定不需要密码。


    为了删除我在安装过程中被迫选择的密码，我打开了一个命令窗口，进入目录 "`C:\Program Files\MySQL\MySQL Server 5.5\bin\"`
    并键入了命令 `"mysqladmin -u root -p password"`。程序要求我输入密码，我照做了，然后两次要求我输入新密码，我两次都按 `Enter`
    键作为回应。


    这些包含所有组件的 MySQL 包不一定包含最新版本的连接器和 Workbench。我并不特别关心拥有最新的 Workbench，因为我打算只使用它来检查从
    JSP 生成的简单数据库。但我渴望拥有最新的 Java 连接器。因此，我去了 [`http://dev.mysql.com/downloads/connector/j/`](http://dev.mysql.com/downloads/connector/j/)
    并下载了 `mysql-connector-java-5.1.18.zip`。


    要安装 JDBC，你只需要将其 JAR 文件复制到 `%CATALINA_HOME%\lib\`。MySQL 安装程序将其放入 `C:\Program Files\MySQL\MySQL
    Connector J\`。


    为了方便访问，你应该创建一个指向 Workbench 应用程序的快捷方式，并将其放在 `quickstart` 栏或桌面上。应用程序路径如下所示：


    `C:\Program Files\MySQL\MySQL Workbench CE 5.2.37\MySQLWorkbench.exe.`


