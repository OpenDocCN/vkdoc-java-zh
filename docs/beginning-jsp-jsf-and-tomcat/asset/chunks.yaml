    #### 数据类型与变量


    Java 提供了与 C/C++ 基本类型相似的原始数据类型（参见表 2-1）。然而，有一个重要但不太明显的区别：在 C 语言中，数值类型的精度依赖于具体实现，而在
    Java 中，其精度在所有平台上都是恒定的。


    ![图片](img/9781430246237_Tab02-01.jpg)


    表 2-1 的第二列给出了 Java 为每种原始类型提供的所谓*包装类*的名称。这些类提供了一些有用的静态方法来操作数字。例如，`Integer.parseInt(String
    s, int radix)` 将字符串解释为第二个参数所指定基数的数字，并将其作为 `int` 值返回（例如，`Integer.parseInt("12",
    16)` 和 `Integer.parseInt("10010", 2)` 都返回 18）。


    在 Java 中，与 C 语言一样，你可以通过在数字前加零来定义八进制字面量，通过添加 `0x` 或 `0X` 来定义十六进制字面量。例如，0123（表示
    1×64 + 2×8 + 3×1）和 0x53（表示 5×16 + 3×1）都是表示十进制数 83 的不同方式。在 Java 7 中，你还可以使用后缀 0b
    和 0B 来标识二进制字面量。这意味着你也可以将十进制数 83 写成 0b1010011。


    我将在相关之处提及 Java 7 引入的新特性。这些特性很好，有助于提高代码的可读性和可维护性，但在采用它们之前，请检查你将部署应用程序的所有服务器是否都已升级到
    Java 7。


    Java 程序可以做到平台无关，因为所有平台依赖性都“隐藏”在库中。我刚才提到的包装类位于 `java.lang` 库中，该库还包含数十个其他通用类，例如
    `String` 和 `Math`。你可以在 [`http://docs.oracle.com/javase/7/docs/`](http://docs.oracle.com/javase/7/docs/)
    找到 Java 7.0 平台的完整文档，并在 [`http://docs.oracle.com/javase/7/docs/api/`](http://docs.oracle.com/javase/7/docs/api/)
    找到其类的描述。


    以下是一些如何声明变量并初始化它们的示例：


    `String aString = "abcdxyz";`

    `int k = aString.length();  // k 被设置为 7`

    `char c = aString.charAt(4);  // c 被设置为 ''x''`

    `static final NAME = "John Doe";`


    在最后一个声明示例中，`final` 关键字使变量不可更改。这就是在 Java 中定义常量的方式。`static` 关键字表示该变量将由从该类实例化的同一应用程序中的所有对象共享。


    在 JSP 中使用静态变量需要进一步说明。在 JSP 中，你可以通过三种方式声明变量：


    `<% int k = 0; %>`

    `<%! int k = 0; %>`

    `<%! static int k = 0; %>`


    第一种声明意味着每个传入的 HTTP 客户端请求都会创建一个新变量；第二种声明意味着每个新的 Servlet 实例都会创建一个新变量；第三种声明意味着该变量在
    Servlet 的所有实例之间共享。


    Tomcat 会将每个 JSP 页面转换为 HTTP Servlet 类（`javax.servlet.http.HttpServlet`）的一个子类。通常，Tomcat
    只会实例化这些类中的每一个一次，然后为每个传入请求创建一个 Java 线程。然后，它在每个线程内执行同一个 Servlet 对象。如果应用程序运行在分布式环境中或处理大量请求，Tomcat
    可能会多次实例化同一个 Servlet。因此，只有第三种声明才能保证该变量在所有请求之间共享。


    Tomcat 将 Servlet 代码深藏在名为 `work` 的文件夹中。例如，从 `webapps\ROOT\tests\a.jsp` 生成的 Servlet
    位于 `work\Catalina\localhost\_\org\apache\jsp\tests\`，并命名为 `a_jsp.java`。


    你可以随意命名变量，但你的区分大小写的字符串必须以字母、美元符号或下划线开头，并且不能包含空格。也就是说，请注意以下关键字是保留的，使用它们会导致编译错误：`abstract`、`assert`、`boolean`、`break`、`byte`、`case`、`catch`、`char`、`class`、`const`、`continue`、`default`、`do`、`double`、`else`、`enum`、`extends`、`final`、`finally`、`float`、`for`、`goto`、`if`、`implements`、`import`、`instanceof`、`int`、`interface`、`long`、`native`、`new`、`package`、`private`、`protected`、`public`、`return`、`short`、`static`、`strictfp`、`super`、`switch`、`synchronized`、`this`、`throw`、`throws`、`transient`、`try`、`void`、`volatile`
    和 `while`。尽可能使用大写字母表示常量。这不是必须的，但它能使代码更具可读性，并且是一种公认的编码实践。


    要在字符串中使用特殊字符，你需要使用反斜杠对它们进行“转义”，如表 2-2 所示。使用 `\u` 后跟最多四位十六进制数字，你可以指定任何 Unicode
    字符。例如，你可以将希腊大写字母 delta 输入为 \u0394。


    ![图片](img/9781430246237_Tab02-02.jpg)


    #### 对象与数组


    要创建特定类型的对象（即实例化一个类），请使用关键字 `new`，如下例所示：


    `Integer integerVar = new Integer(55);`


    这将创建一个类型为 `Integer`、值为 `55` 的对象。


    你可以拥有任何对象类型或原始数据类型的数组，如下面的数组声明示例所示：


    `int[] intArray1;`

    `int[] intArray2 = {10, 100, 1000};`

    `String[] stringArray = {"a", "bb"};`


    `intArray1` 为 `null`；`intArray2` 是一个长度为 3 的数组，包含 `10`、`100` 和 `1000`；`stringArray`
    是一个长度为 2 的数组，包含字符串 `"a"` 和 `"bb"`。虽然数组看起来特殊，但它们实际上只是对象，并且被当作对象处理。因此，你可以使用 `new`
    来初始化它们。例如，下面这行代码声明了一个包含 10 个元素的整数数组，每个元素都初始化为零：


    `int[] array = new int[10];`


    二维表是一个数组，其中每个元素对象本身也是一个数组。这与 C 语言*不同*，在 C 语言中，一个连续的内存块包含多维表的所有元素。例如，下面这行代码表示一个有两行的表，但第一行有三个元素，而第二行只有两个：


    `int[][] table1 = {{11, 12, 13}, {21, 22}};`


    如果你像这样定义：


    `int[][] table = new int[2][3];`


    你就得到了一个两行三列的表，所有元素都初始化为零。


    声明表时，你可以将最后一个（最内层）维度留空。例如，以下声明会得到一个有两行的表，但行未定义，并保持为 `null`：


    `int[][] table = new int[2][];`


    在能够为这种部分定义的表的各个元素赋值之前，你必须先声明其行，或者将已声明的一维数组赋值给它们：


    `table[0] = new int[5];`

    `int[] anArray = {10, 100};`

    `table[1] = anArray;`

