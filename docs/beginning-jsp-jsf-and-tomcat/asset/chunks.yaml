    of all, notice that I renamed the file `first.xhtml`. This is because facelet
    elements (i.e., those with prefix `ui`) only work inside `h:body`. This means
    that you can no longer use the HTML `body` tag. As `h:body` requires the extension
    of the document to be `xhtml`, I had to ditch the extension `jspx`. Old Will Shakespeare
    said through Juliet’s lips, “What''s in a name? That which we call a rose by any
    other name would smell as sweet.” The same applies to `first.xhtml`, which remains
    a valid JSP document despite the change of name.    Another difference from `first.jspx`
    is that I moved the namespace declarations for the core and HTML JSF libraries
    from `jsp:root` to the `html` tag, and then added to them the declaration for
    the JSF facelet library. As none of the JSF tags are used outside the `html` element,
    it makes sense to keep them there, which is where they normally are in XHTML documents.    Finally,
    notice that `first.xhtml` includes a standard header with `ui:include`.    So
    far so good. Nothing too exciting. You could have done the same with `jsp:include`,
    without need for facelets. But now let’s look at page2.xhtml ([Listing 7-25](#Chapter07.html#list_7_25)),
    and in particular to its `h:body` element. Incidentally, I didn’t have any technical
    reason for renaming `second.jspx` to `page2.xhtml`. I just found `page2` and `page3`
    more appealing than `second` and `third`.    ***Listing 7-25.** page2.xhtml*  `<?xml
    version="1.0" encoding="UTF-8"?>` `<jsp:root`  `  version="2.1"` `  >` `<jsp:directive.page`
