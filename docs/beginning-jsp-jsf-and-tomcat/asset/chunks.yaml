    #### 关于电子书店的更多内容


    至此，你应该已经清楚 Servlet 是如何控制应用程序，以及 JSP 仅用于呈现数据。要了解全貌，你只需查看用于表示图书的 Java Bean `Book.java`，以及显示账单的
    `Checkout.jsp`。清单 3-3 展示了 `Book.java` 的代码。


    ***清单 3-3.** Book.java*


