    ##### 使用 JSP 根据 DTD 验证 XML


    要根据 DTD 验证 XML 文件，首先必须通过向 XML 文件添加 `DOCTYPE` 声明，将 XML 文档与 DTD 关联起来。该声明应紧跟在 `<?xml...?>`
    行之后插入，内容如下：


    `<!DOCTYPE starfleet SYSTEM "http://localhost:8080/xml-validate/dtd/starfleet.dtd">`


    请注意，`starfleet.dtd` 文件不需要放在 `WEB-INF\dtds\` 文件夹中。我们之前必须将 DTD 放在那里，是因为 Tomcat 期望它们在那里；但如果你自己进行验证，Tomcat
    就不再参与其中了。因此，你可以将 DTD 放在任何你喜欢的位置。


    下一步是定义异常处理器。这是一个继承自 `org.xml.sax.helpers.DefaultHandler` 的 Java 类对象，并重写了它的三个方法：`warning`、`error`
    和 `fatalError`。一旦处理器在解析器中注册，当遇到验证问题时，解析器就会执行相应的方法。`DefaultHandler` 的默认行为是什么都不做。因此，你需要重写这些方法来报告错误。清单
    5-4 展示了一个可能的处理器代码。报告级别完全由你决定，但我决定报告所有验证问题并中断解析过程。


    ***清单 5-4.** ParsingExceptionHandler.java*


    `package myPkg;`

    `import org.xml.sax.helpers.DefaultHandler;`

    `import org.xml.sax.SAXParseException;`

    `public class ParsingExceptionHandler extends DefaultHandler {`

    `  public SAXParseException parsingException = null;`

    `  public String errorLevel = null;`

    `  public void warning(SAXParseException e) {`

    `    errorLevel = "Warning";`

    `    parsingException = e;`

    `    }`

    `  public void error(SAXParseException e) {`

    `    errorLevel = "Error";`

    `    parsingException = e;`

    `    }`

    `  public void fatalError(SAXParseException e) {`

    `    errorLevel = "Fatal error";`

    `    parsingException = e;`

    `    }`

    `  }`


    如你所见，这非常简单。你定义了两个公共属性：一个用于保存解析器生成的异常，另一个用于保存错误级别。然后，你在三个方法中的每一个里更新这两个属性。每次解析后，你可以检查其中一个属性是否为
    `null`，以确定解析是否成功。在 DOS 命令行中使用 `javac ParsingExceptionHandler.java` 编译此模块，并将生成的
    `.class` 文件复制到应用程序目录的 `WEB-INF\classes\myPkg` 文件夹中。


    现在，你可以执行验证了。清单 5-5 展示了一个实现 SAX 解析器的 JSP 页面。


    ***清单 5-5.** starfleet_validate_sax.jsp（初版）*


    `<%@page language="java" contentType="text/html"%>`

    `<%@page import="javax.xml.parsers.SAXParserFactory"%>`

    `<%@page import="javax.xml.parsers.SAXParser"%>`

    `<%@page import="org.xml.sax.InputSource"%>`

    `<%@page import="myPkg.ParsingExceptionHandler"%>`

    `<html><head><title>Starfleet validation (SAX - DTD)</title></head><body>`

    `<%`

    `  SAXParserFactory factory = SAXParserFactory.newInstance();`

    `  factory.setValidating(true);`

    `  SAXParser parser = factory.newSAXParser();`

    `  InputSource inputSource = new InputSource("webapps/xml-validate/xml/enterprises.xml");`

    `  ParsingExceptionHandler handler = new ParsingExceptionHandler();`

    `  parser.parse(inputSource, handler);`

    `  %>`

    `</body></html>`


    实例化解析器工厂并将其 `validating` 属性设置为 `true` 后，你指示工厂创建一个 SAX 解析器。然后，你实例化 `InputSource`
    类以访问 XML 文档和异常处理器。之后，你只需要执行解析器即可。


    不过，这个实现并不太好，因为当验证失败时，它会转储堆栈跟踪。更好的做法是将解析包装在 `try`/`catch` 块中，如清单 5-6 所示，这样你就可以显示验证错误而无需堆栈跟踪。


    请注意，在运行改进版的 `starfleet_validate_sax.jsp` 之前，你需要从 Apache Commons 下载 `StringEscapeUtils`。其目的是将特殊字符转换为对应的
    HTML 实体，以便它们能在你的网页中正确显示。访问 [`http://commons.apache.org/lang/download_lang.cgi`](http://commons.apache.org/lang/download_lang.cgi)
    并点击链接 `commons-lang3-3.1-bin.zip`。


    要将其安装到 Tomcat 中，请解压文件，将 `commons-lang3-3.1.jar` 复制到 `%CATALINA_HOME%\lib\`，然后重启
    Tomcat。


    ![Image](img/square.jpg) **提示** 除了将库复制到 Tomcat 的 `lib` 文件夹之外，你还可以通过将它们放在应用程序的
    `WEB-INF\lib` 文件夹中（如果该文件夹不存在，请创建它），使其对特定应用程序可用。这样，该库将不会全局可用，但你也不会冒以后另一个应用程序需要不同版本的同一库，并且当两个版本都在
    Tomcat 的 `lib` 文件夹中时引入冲突的风险。


    ***清单 5-6.** starfleet_validate_sax.jsp*


    `<%@page language="java" contentType="text/html"%>`

    `<%@page import="javax.xml.parsers.SAXParserFactory"%>`

    `<%@page import="javax.xml.parsers.SAXParser"%>`

    `<%@page import="org.xml.sax.InputSource"%>`

    `<%@page import="org.apache.commons.lang3.StringEscapeUtils"%>`

    `<%@page import="myPkg.ParsingExceptionHandler"%>`

    `<html><head><title>Starfleet validation (SAX - DTD)</title></head><body>`

    `<%`

    `  SAXParserFactory factory = SAXParserFactory.newInstance();`

    `  factory.setValidating(true);`

    `  SAXParser parser = factory.newSAXParser();`

    `  InputSource inputSource = new InputSource("webapps/xml-validate/xml/enterprises.xml");`

    `  ParsingExceptionHandler handler = new ParsingExceptionHandler();`

    `  try { parser.parse(inputSource, handler); }`

    `  catch (Exception e) { }`

    `  if (handler.errorLevel == null) {`

    `    out.println("The document is valid.");`

    `    }`

    `  else {`

    `    out.println(`

    `        "*** Validation " + handler.errorLevel + ": "`

    `      + StringEscapeUtils.escapeHtml4(handler.parsingException.toString())`

    `      );`

    `    }`

    `  %>`

    `</body></html>`


    现在，如果你在浏览器中输入 [`http://localhost:8080/xml-validate/with-dtd/starfleet_validate_sax.jsp`](http://localhost:8080/xml-validate/with-dtd/starfleet_validate_sax.jsp)，你应该会看到一行确认信息，表明
    `enterprises.xml` 是正确的。


    当你在 XML 文档中引入一个错误时，例如将结束标签误写为 `<captain>James Tiberius Kirk</catain>`，你会收到以下消息：


    `*** Validation Fatal error: org.xml.sax.SAXParseException; systemId:  `![Image](img/U002.jpg)

    `file:///C:/Program%20Files/Apache%20Software%20Foundation/Tomcat/webapps/xml-`
    ![Image](img/U002.jpg)

    `validate/xml/enterprises.xml; lineNumber: 7; columnNumber: 35; The element type  `![Image](img/U002.jpg)

    `"captain" must be terminated by the matching end-tag "</captain>".`


    不错，是吧？请注意，这是一个致命错误。顺便提一下，`/captain` 周围的尖括号正是你需要使用 `StringEscapeUtils` 转义消息的原因。如果你完全删除这一行，你会收到以下消息：


    `*** Validation Error: org.xml.sax.SAXParseException; systemId:  `![Image](img/U002.jpg)

    `file:///C:/Program%20Files/Apache%20Software%20Foundation/Tomcat/webapps/xml-`
    ![Image](img/U002.jpg)

    `validate/xml/enterprises.xml; lineNumber: 7; columnNumber: 16; The content of  `![Image](img/U002.jpg)

    `element type "starship" is incomplete, it must match "(class,captain)".`

