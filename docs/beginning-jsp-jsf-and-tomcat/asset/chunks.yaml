    as you will see below`,` two HTML `a` elements are to be converted to `h:commandLink`
    components, which need to be inside `h:form`. It seemed reasonable to use a single
    form.    #### The Top Menu    [Listing 8-2](#Chapter08.html#list_8_2) shows `TopMenu.jspx`
    and its use of the `h:panelGroup` component.    ***Listing 8-2.** eshopf: TopMenu.jspx*  `<?xml
