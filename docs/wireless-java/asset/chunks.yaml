    Back Cover


    | Although Java is incredibly popular, the standard edition of Java is way too
    big and bulky to build applications for wireless devices such as PDAs and phones.
    Thus, Sun has released Java 2 Platform, Micro Edition (J2ME). J2ME has the potential
    to be as revolutionary in the wireless space as Java has been in the server space.*Wireless
    Java: Developing with J2ME, Second Edition* is updated to include coverage of
    the next version of programs for mobile Java devices. MIDP 2.0 contains many exciting
    new features, such as sound HTTPS support, lots of user interface API enhancements,
    a Game API, and much more. Also, author Jonathan Knudsen makes clear what material
    is new so readers can still use the book for MIDP 1.0/CLDC 1.0.**About the Author**Jonathan
    Knudsen is a Java developer and noted author of several books, including *Wireless
    Java: Developing with Java 2, Micro Edition, Mobile Java, The Unofficial Guide
    to LEGO MINDSTORMS Robots, Learning Java*, and *Java 2D Graphics*. Jonathan began
    his object-oriented programming career in Objective-C on the NeXT OS, soon thereafter
    suffering through a couple of purgatorial years in Microsoft''s Visual C++, before
    graduating to Java in 1996\. He has written extensively about Java and LEGO robots,
    including five books, a monthly online column called "Bite-Size Java," and articles
    for JavaWorld, EXE, NZZ Folio, and the O''Reilly Network. Jonathan holds a degree
    in mechanical engineering from Princeton University. |'
