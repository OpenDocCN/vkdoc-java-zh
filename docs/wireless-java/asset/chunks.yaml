    \ = (w - fullWidth) / 2;\n    mMiddleCY = (h - kNoteHeight[0]) / 2;\n\nmCurrentNote\
    \ = 60;\n  }\n\npublic void paint(Graphics g) {\n    int w = getWidth();\n   \
