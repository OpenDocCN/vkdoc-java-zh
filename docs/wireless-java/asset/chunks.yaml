    \ * 2 + 1], 16);\n      int value = (high << 4) | low;\n      if (value > 127)\
    \ value -= 256;\n      raw[i] = (byte)value;\n    }\n    return raw;\n  }\n\n\
    public static byte[] hexToBytes(String hex) {\n    return hexToBytes(hex.toCharArray());\n\
    \  }\n} \n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nPasswordMIDlet also\
