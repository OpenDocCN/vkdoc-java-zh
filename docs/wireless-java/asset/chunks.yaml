    \n | - |\n| Class | 不同 | 与 CLDC 相同 |\n| ClassLoader | - | - |\n| Compiler | -\
    \ | - |\n| Double | - | 不同 |\n| Float | - | 不同 |\n| InheritableThreadLocal | -\
    \ | - |\n| Integer | 不同 | 不同 |\n| Long | 不同 | 不同 |\n| Math | 不同 | 不同 |\n| Number\
    \ | - | - |\n| Object | 不同 | 与 CLDC 1.0 相同 |\n| Package | - | - |\n| Process |\
    \ - | - |\n| Runtime | 不同 | 与 CLDC 1.0 相同 |\n| RuntimePermission | - | - |\n|\
    \ SecurityManager | - | - |\n| Short | 不同 | 与 CLDC 1.0 相同 |\n| StackTraceElement\
    \ | - | - |\n| StrictMath | - | - |\n| String | 不同 | 不同 |\n| StringBuffer | 不同\
    \ | 不同 |\n| System | 不同 | 与 CLDC 1.0 相同 |\n| Thread | 不同 | 不同 |\n| ThreadGroup\
    \ | - | - |\n| ThreadLocal | - | - |\n| Throwable | 不同 | 与 CLDC 1.0 相同 |\n| Void\
    \ | - | - |\n\n表 4-2：*java.lang.ref* 包\n\n| **类** |   |   |\n| --- | --- | ---\
    \ |\n| ***J2SE SDK 1.4.0*** | ***CLDC 1.0*** | ***CLDC 1.1*** |\n| --- | --- |\
    \ --- |\n| PhantomReference | - | - |\n| Reference | - | 不同 |\n| ReferenceQueue\
    \ | - | - |\n| SoftReference | - | - |\n| WeakReference | - | 不同 |\n\n`java.lang.Object`\
    \ 一如既往，是每个 Java 类的根。它与 J2SE 相比基本保持不变，但存在一些重要的差异。\n\n### 无用户类加载\n\n正如我在第 1 章中讨论的，Java\
    \ 平台的优势之一是在运行时加载类的能力。不幸的是，由于资源限制和安全问题，CLDC 不允许你定义自己的类加载器。运行 MIDlet 的应用程序管理器有一个类加载器，但你无法以任何方式访问或使用它。\n\
    \n### 无对象终结\n\nCLDC（以及扩展的 MIDP）中不支持对象终结。*终结*是一种机制，对象可以通过它在被垃圾回收之前自行清理。在 J2SE 中，对象的\
    \ `finalize()` 方法会在对象被垃圾回收器回收之前调用。CLDC 中不存在这种机制。如果你需要清理资源，你需要显式地进行清理，而不是将清理代码放在\
    \ `finalize()` 中。无论如何，这本身就是一个好主意，尤其是在资源有限的小型设备上。显式清理资源意味着它们消耗的内存和处理能力将更早被回收。`finalize()`\
    \ 方法中的清理代码直到垃圾回收器运行时才会执行，而你永远不知道它何时会发生。\n\n### 无反射\n\nCLDC 不支持反射 API。CLDC/MIDP\
    \ 的目标设备实在太小，无法支持它。尽管大多数开发者不需要直接使用反射，但这一缺失有重要影响。没有反射，就不可能实现远程方法调用（RMI）。没有 RMI，就不可能实现\
    \ JINI。因此，基础的 CLDC/MIDP 实现无法运行 JINI。如果你想运行 JINI，你需要研究更大的 J2ME 配置文件之一，很可能是个人配置文件（参见第\
    \ 1 章）和 RMI 可选 API（JSR 66）。\n\n### 无本地方法\n\nCLDC（以及扩展的 MIDP）中不支持本地方法。该规范不支持从 Java\
    \ 访问本地设备方法的方式。尽管 MIDP 实现当然包含本地方法，但它们被编译到实现本身中。应用程序不能定义新的本地方法。\n\n不过，不必担心失去对平台特定功能的访问，因为设备供应商很可能在\
    \ MIDP 之外实现专有 API。详情请查看你的设备制造商或网络运营商的开发者网站。请记住，使用供应商或设备特定的 API 会限制你应用程序的受众。在某些情况下（主要是游戏），针对特定设备分发应用程序的多个版本是有意义的。\n\
    \n### 多线程\n\n只要你保持简单，使用线程的方式与你从 J2SE 中记忆的差不多。创建新线程、启动它们以及使用方便的 `java.lang.Runnable`\
    \ 接口与 J2SE 中相同。CLDC 1.0 中一个重要的遗漏是 `interrupt()` 方法，它在 `java.lang.Thread` 类中不存在。在\
    \ CLDC 1.1 中，`interrupt()` 方法可用。\n\n`pause()`、`resume()` 和 `stop()` 方法（在 J2SE\
    \ SDK 中已弃用）也不存在。CLDC/MIDP 不支持线程组和守护线程；CLDC 1.0 不支持线程命名，但在 CLDC 1.1 中可用。\n\n###\
    \ String 和 StringBuffer\n\n`String` 和 `StringBuffer` 都存在于 CLDC 的 `java.lang` 包中。它们与其\
    \ J2SE 对应类相比基本保持不变。\n\nCLDC 1.0 中 `String` 类最大的变化是移除了在浮点基本类型和 `String` 之间进行转换的\
    \ `valueOf()` 静态方法，尽管这些方法在 CLDC 1.1 中存在。CLDC 的 `String` 类中还缺少一些其他不常用的方法，但你很可能不会想念它们。例如，尽管\
    \ CLDC 的 `String` 包含了 `compareTo(String str)` 方法，但它没有 J2SE SDK 中的 `compareTo(Object\
    \ o)` 或 `compareToIgnoreCase(String str)` 方法。（CLDC 1.1 的 `String` 类中确实包含了一个 `equalsIgnoreCase()`\
    \ 方法。）\n\n在 CLDC 1.0 版本的 `StringBuffer` 类中，`append()` 和 `insert()` 方法不包含针对浮点类型的重载，但这些在\
    \ CLDC 1.1 中可用。此外，`substring()` 方法已被移除。除此之外，对于经验丰富的 J2SE 程序员来说，`StringBuffer`\
    \ 应该非常熟悉。\n"
- fmt: "### Math\n\n`Math`类包含用于执行数学计算的静态方法。在J2SE中，许多方法涉及浮点数的三角函数。在CLDC 1.0中，这些方法全部被移除，只留下少数方法。CLDC\
    \ 1.1由于支持浮点类型，在`java.lang.Math`中包含了更多方法，但CLDC的`java.lang.Math`仍然是J2SE版本中该类的一个子集。在下面的API列表中，加号（`+`）表示CLDC\
    \ 1.1中新增的变量或方法。\n\n```\npublic final class Math\n    extends java.lang.Object\
    \ {\n  // 常量\n+ public static final double E;\n+ public static final double PI;\n\
    \    // 静态方法\n  public static int abs(int a);\n  public static long abs(long a);\n\
    + public static float abs(float a);\n+ public static double abs(double a);\n+\
    \ public static native double ceil(double a);\n+ public static native double cos(double\
    \ a);\n+ public static native double floor(double a);\n  public static int max(int\
    \ a, int b);\n  public static long max(long a, long b);\n+ public static float\
    \ max(float a, float b);\n+ public static double max(double a, double b);\n  public\
    \ static int min(int a, int b);\n  public static long min(long a, long b);\n+\
    \ public static float min(float a, float b);\n+ public static double min(double\
    \ a, double b);\n+ public static native double sin(double a);\n+ public static\
    \ native double sqrt(double a);\n+ public static native double tan(double a);\n\
    + public static double toDegrees(double angrad);\n+ public static double toRadians(double\
    \ angdeg);\n}\n```\n\n### Runtime 和 System\n\n`Runtime`和`System`提供对Java虚拟机（JVM）和系统级资源的访问。这两个类相较于J2SE中的对应类被大幅缩减，因此在此完整重现它们的公共API是合理的。首先，让我们看看`Runtime`：\n\
    \n```\npublic class Runtime\n    extends java.lang.Object {\n  // 静态方法\n  public\
    \ static Runtime getRuntime();\n\n  // 方法\n  public void exit(int status);\n \
    \ public native long freeMemory();\n  public native void gc();\n  public native\
    \ long totalMemory();\n}\n```\n\n要获取唯一的`Runtime`实例，请调用`getRuntime()`。你可以通过调用`gc()`来指示JVM运行其垃圾回收器。如果尝试调用`exit()`，则会抛出`SecurityException`；应用程序的生命周期完全通过`MIDlet`类的方法进行管理。另外两个方法`totalMemory()`和`freeMemory()`允许你检查可用于应用程序数据的内存量。\n\
    \n请注意，`Runtime`不支持通过`exec()`方法运行外部进程。MIDlet不能超出JVM的边界。\n\n`System`提供用于执行各种常见任务的静态方法：\n\
    \n```\npublic final class System\n    extends java.lang.Object {\n  // 常量\n  public\
    \ static final PrintStream err;\n  public static final PrintStream out;\n\n  //\
    \ 静态方法\n  public static native void arraycopy(Object src, int src_position,\n\
    \      Object dst, int dst_position, int length);\n  public static native long\
    \ currentTimeMillis();\n  public static void exit(int status);\n  public static\
    \ void gc();\n  public static String getProperty(String key);\n  public static\
    \ native int identityHashCode(Object x);\n}\n```\n\n你可能首先注意到，虽然定义了`err`和`out`这两个`PrintStream`，但没有`System.in`。这很合理——`System.in`代表控制台输入；在MIDP设备上，实际上并没有控制台。事实上，定义了`System.out`和`System.err`可能看起来很奇怪。如果你将信息打印到`System.out`，它在设备上可能不会显示在任何地方；然而，在设备模拟器上，你可能能够在控制台窗口中查看`System.out`。\n\
    \n`gc()`和`exit()`方法是调用`Runtime`类中相应方法的快捷方式。\n\n`System`的所有方法都是静态的。`arraycopy()`方法提供了数组复制的快速实现。\n\
    \n最后，`identityHashCode()`是`Object`的`hashCode()`方法使用的默认实现。\n\n`getProperty()`方法返回系统属性，这些属性与`MIDlet`的`getAppProperty()`方法返回的MIDlet属性不同。支持以下标准系统属性，并且可以在运行时检索它们的值：\n\
    \n*   **microedition.platform:** 此属性包含设备或主机平台的名称。如果实现未提供值，则默认为`null`。\n*   **microedition.encoding:**\
    \ 此属性包含默认字符编码，它指定了Unicode字符在字节流中的表示方式。\n*   **microedition.configuration:** 此属性包含已实现配置的名称，例如`\"\
    CLDC-1.1\"`。\n*   **microedition.profiles:** 已实现的配置文件包含在此系统属性中。"
  raw: "### Math\n\nThe Math class contains static methods for performing mathematical\
    \ calculations. In J2SE, many of these methods involve trigonometric functions\
    \ on floating-point numbers. In CLDC 1.0, these are all gone, leaving only a handful\
    \ of methods. CLDC 1.1, because it supports floating-point types, includes several\
    \ more methods in java.lang.Math, but CLDC's java.lang.Math is still a subset\
    \ of the J2SE version of the class. In the API listing below, the plus signs (+)\
    \ indicate new variables or methods in CLDC 1.1.\n\n```\n public final class Math\n\
    \     extends java.lang.Object {\n   // Constants\n+  public static final double\
    \ E;\n+  public static final double PI;\n     // Static methods\n   public static\
    \ int abs(int a);\n   public static long abs(long a);\n+  public static float\
    \ abs(float a);\n+  public static double abs(double a);\n+  public static native\
    \ double ceil(double a);\n+  public static native double cos(double a);\n+  public\
    \ static native double floor(double a);\n   public static int max(int a, int b);\n\
    \   public static long max(long a, long b);\n+  public static float max(float\
    \ a, float b);\n+  public static double max(double a, double b);\n   public static\
    \ int min(int a, int b);\n   public static long min(long a, long b);\n+  public\
    \ static float min(float a, float b);\n+  public static double min(double a, double\
    \ b);\n+  public static native double sin(double a);\n+  public static native\
    \ double sqrt(double a);\n+  public static native double tan(double a);\n+  public\
    \ static double toDegrees(double angrad);\n+  public static double toRadians(double\
    \ angdeg);\n  }\n```\n\n### Runtime and System\n\nRuntime and System provide access\
    \ to the Java Virtual Machine (JVM) and system-wide resources. These two classes\
    \ are greatly reduced from their J2SE counterparts, so much so that it makes sense\
    \ to reproduce their entire public API here. First, let's take a look at Runtime:\n\
    \n```\npublic class Runtime\n    extends java.lang.Object {\n  // Static methods\n\
    \  public static Runtime getRuntime();\n\n  // Methods\n   public void exit(int\
    \ status);\n   public native long freeMemory();\n   public native void gc();\n\
    \   public native long totalMemory();\n  } \n```\n\nTo get the single Runtime\
    \ instance, call getRuntime(). You can tell the JVM to run its garbage collector\
    \ by calling gc(). If you try to call exit(), a SecurityException will be thrown;\
    \ the application life cycle is managed entirely through the methods of the MIDlet\
    \ class. The other two methods, totalMemory() and freeMemory(), allow you to examine\
    \ the amount of memory that is available for your application's data.\n\nNote\
    \ that Runtime does not support running external processes with the exec() method.\
    \ MIDlets cannot step outside the bounds of the JVM.\n\nSystem provides static\
    \ methods for performing various common tasks:\n\n```\npublic final class System\n\
    \    extends java.lang.Object {\n  // Constants\n  public static final PrintStream\
    \ err;\n  public static final PrintStream out;\n\n  // Static methods\n  public\
    \ static native void arraycopy(Object src, int src_position,\n      Object dst,\
    \ int dst_position, int length);\n  public static native long currentTimeMillis();\n\
    \  public static void exit(int status);\n  public static void gc();\n  public\
    \ static String getProperty(String key);\n  public static native int identityHashCode(Object\
    \ x);\n}\n```\n\nThe first thing you might notice is that while the err and out\
    \ PrintStreams are defined, there is no System.in. This makes sense—System.in\
    \ represents the console input; on a MIDP device, there really isn't any console.\
    \ In fact, it may seem weird to have System.out and System.err defined. If you\
    \ print information to System.out, it may not come out anywhere on a device; however,\
    \ on a device emulator, you may be able to view System.out in a console window.\n\
    \nThe gc() and exit() methods are shortcuts for calling the corresponding methods\
    \ in the Runtime class.\n\nAll of System's methods are static. The arraycopy()\
    \ method provides a fast implementation of array copying.\n\nFinally, identityHashCode()\
    \ is a default used by Object's hashCode() method.\n\nThe getProperty() method\
    \ returns system properties, which are different than the MIDlet properties returned\
    \ by MIDlet's getAppProperty() method. The following standard system properties\
    \ are supported and their values can be retrieved at runtime:\n\n*   **microedition.platform:**\
    \ This property contains the name of the device or host platform. If the implementation\
    \ does not supply a value, the default is null.\n\n*   **microedition.encoding:**\
    \ This property contains the default character encoding, which specifies how Unicode\
    \ characters are represented in a byte stream.\n\n*   **microedition.configuration:**\
    \ This property contains the name of the implemented configuration, e.g., \"CLDC-1.1\"\
    .\n\n*   **microedition.profiles:** Implemented profiles are contained in this\
    \ system property."
