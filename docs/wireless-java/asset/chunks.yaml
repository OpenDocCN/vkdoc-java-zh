    ## 本书结构


    本书共分为十五章及一个附录，基本包含三个部分。前两章为引言内容。第 3 章至第 12 章全面涵盖了 MIDP API。第 13 章至第 15 章则探讨高级主题。各章节详细划分如下：


    *   第 1 章：引言，为后续内容提供背景和动机。本章详细解释了 J2ME，并逐步聚焦到 MIDP。

    *   第 2 章：构建 MIDlet，旨在作为引子。本章包含一个示例应用程序，允许你使用任何 MIDP 设备通过互联网查询单词定义。在此过程中，你将学到大量关于为
    MIDP 平台开发应用程序的知识。

    *   第 3 章：关于 MIDlet 的一切，详细介绍了 MIDP 应用程序的生命周期和打包。本章包含了关于 MIDP 2.0 安全架构的新内容。

    *   第 4 章：几乎相同的老内容，描述了 Java 程序员会熟悉的 MIDP API 部分。

    *   第 5 章：创建用户界面，是专门介绍 MIDP 用户界面包的几章中的第一章。本章概述了 MIDP 的用户界面包，并详细介绍了简单的可视化组件。

    *   第 6 章：列表和表单，接续第 5 章的内容，描述了 MIDP 的高级用户界面组件。

    *   第 7 章：自定义项，展示了如何在 MIDP 2.0 中创建你自己的表单项。

    *   第 8 章：持久化存储，描述了 MIDP 的数据存储机制。

    *   第 9 章：连接世界，包含了关于 MIDP 应用程序如何通过互联网发送和接收数据的所有精彩细节。

    *   第 10 章：编程自定义用户界面，描述了可用于专门应用程序用户界面的底层 API。

    *   第 11 章：游戏 API，描述了 MIDP 2.0 中用于创建游戏的新特性，包括精灵和瓦片图层。

    *   第 12 章：声音与音乐，全面介绍 MIDP 2.0 的新多媒体功能。你将学习如何产生简单音调以及播放采样音频数据。

    *   第 13 章：性能调优，描述了应对小型设备上有限资源的技巧。

    *   第 14 章：解析 XML，审视了当前可用的一系列小型 XML 解析器。本章描述了如何将解析器移植到 MIDP，并简要讨论了每种解析器的使用方法。

    *   第 15 章：保护网络数据，讨论了如何在不安全的互联网上保护有价值的数据。本章包含两个示例应用程序，演示了用于保护数据的加密技术。

    *   最后，附录包含了构成 MIDP 的类和接口的完整 API 参考。每个类和接口的公共 API 方法签名均已列出，方便快速查阅。在第二版中，API 参考已做标记，便于识别哪些方法是
    MIDP 2.0 中新增的。


    # 第 1 章：引言


    Java™ 2 平台微型版（J2ME）是 Java 短暂历史中的第二次革命。当 Java 于 1995 年问世时，计算的未来似乎在于*小程序*——那些可以按需下载并运行的小型程序。缓慢的互联网迫使小程序退出了主流。作为一个平台，Java
    直到*服务器端小程序*（运行在服务器上的 Java 程序，本质上是 CGI 的替代品）出现后才真正起飞。Java 进一步扩展到服务器端领域，最终获得了 Java
    2 平台企业版（J2EE）的称号。这是第一次革命，即服务器端 Java 的闪电战。


    第二次革命是小型设备 Java 的爆发，而这正在发生。小型设备市场正在迅速扩张，Java 之所以重要有两个原因。首先，开发者可以编写代码，并使其无需修改即可在数十种小型平台上运行。其次，Java
    对于可下载代码具有重要的安全特性。

    '
- fmt: '# Understanding J2ME


    `J2ME` isn''t a specific piece of software or specification. All it means is Java
    for small devices. Small devices range in size from pagers, mobile phones, and
    personal digital assistants (PDAs), all the way up to things like set-top boxes
    that are just shy of being desktop PCs.


    `J2ME` is divided into *configurations*, *profiles*, and *optional APIs*, which
    provide specific information about APIs and different families of devices. A configuration
    is designed for a specific kind of device based on memory constraints and processor
    power. It specifies a Java Virtual Machine (JVM) that can be easily ported to
    devices supporting the configuration. It also specifies some subset of the Java
    2 Platform, Standard Edition (J2SE) APIs that will be used on the platform, as
    well as additional APIs that may be necessary.


    Profiles are more specific than configurations. A profile is based on a configuration
    and adds APIs for user interface, persistent storage, and whatever else is necessary
    to develop running applications.


    Optional APIs define specific additional functionality that may be included in
    a particular configuration. The whole caboodle—configuration, profile, and optional
    APIs—that is implemented on a device is called a *stack*. For example, a possible
    future device stack might be `CLDC/MIDP` + Mobile Media API. See the section later
    on platform standardization for information on `JSR 185`, which will define standard
    `J2ME` stacks.


    Currently, there are a handful of configurations and profiles, as illustrated
    in [Figure 1-1](#LiB0004_split_001.html#ch01fig01).


    [![Click To expand](fig20_01.jpg)](fig20_01_0.jpg)

    Figure 1-1: The J2ME universe


    | **![Start Sidebar](_1.gif)** |

    | --- |

    | **The Java Community Process** |

    | The Java Community Process (JCP) is designed to ensure that Java technology
    is developed according to community consensus. The process is described here:
    |

    | [http://jcp.org/introduction/overview/](http://jcp.org/introduction/overview/)
    |

    | Configurations and profiles first appear in the world as Java Specification
    Requests (JSRs). You can see a list of current JSRs here: |

    | [http://jcp.org/jsr/all/](http://jcp.org/jsr/all/) |

    | **![End Sidebar](_1.gif)** |


    |  |

    | --- |


    To give you a flavor of what''s happening in the `J2ME` world, [Table 1-1](#LiB0004_split_001.html#ch01table01)
    shows some of the configurations, profiles, and optional APIs that are available
    and under development. This is not a comprehensive list; for more information,
    check out the JCP web site at [http://jcp.org/](http://jcp.org/).


    Table 1-1: J2ME Configurations, Profiles, and Optional APIs


    | **CONFIGURATIONS** |

    | --- |

    | **JSR** | **NAME** | **URL** |

    | --- | --- | --- |

    | 30 | Connected, Limited Device Configuration (CLDC) 1.0 | [http://jcp.org/jsr/detail/30.jsp](http://jcp.org/jsr/detail/30.jsp)
    |

    | 139 | Connected, Limited Device Configuration (CLDC) 1.1 | [http://jcp.org/jsr/detail/139.jsp](http://jcp.org/jsr/detail/139.jsp)
    |

    | 36 | Connected Device Configuration | [http://jcp.org/jsr/detail/36.jsp](http://jcp.org/jsr/detail/36.jsp)
    |


    | **PROFILES** |

    | --- |

    | **JSR** | **NAME** | **URL** |

    | --- | --- | --- |

    | 37 | Mobile Information Device Profile 1.0 | [http://jcp.org/jsr/detail/37.jsp](http://jcp.org/jsr/detail/37.jsp)
    |

    | 118 | Mobile Information Device Profile 2.0 | [http://jcp.org/jsr/detail/118.jsp](http://jcp.org/jsr/detail/118.jsp)
    |

    | 75 | PDA Profile 1.0 | [http://jcp.org/jsr/detail/75.jsp](http://jcp.org/jsr/detail/75.jsp)
    |

    | 46 | Foundation Profile | [http://jcp.org/jsr/detail/46.jsp](http://jcp.org/jsr/detail/46.jsp)
    |

    | 129 | Personal Basis Profile | [http://jcp.org/jsr/detail/129.jsp](http://jcp.org/jsr/detail/129.jsp)
    |

    | 62 | Personal Profile | [http://jcp.org/jsr/detail/62.jsp](http://jcp.org/jsr/detail/62.jsp)
    |


    | **OPTIONAL APIS** |

    | --- |

    | **JSR** | **NAME** | **URL** |

    | --- | --- | --- |

