  trans: "\n### 一个简单的示例\n\nHTTP 并非只用于交换 HTML 页面。它实际上是一个通用的文件交换协议。在本节中，我们将看一个从网络加载图像并显示的示例。清单\
    \ 9-1 展示了 ImageLoader 的源代码，这是一个 MIDlet，它从互联网获取图像并在屏幕上显示。\n\n清单 9-1：从互联网获取图像\n\n\
    | **![开始示例](img/_1.gif)** |\n\n```\nimport java.io.*;\n\nimport javax.microedition.io.*;\n\
    import javax.microedition.lcdui.*;\nimport javax.microedition.midlet.*;\n\npublic\
    \ class ImageLoader\n    extends MIDlet\n    implements CommandListener, Runnable\
    \ {\n  private Display mDisplay;\n  private Form mForm;\n\n  public ImageLoader()\
    \ {\n    mForm = new Form(\"Connecting...\");\n    mForm.addCommand(new Command(\"\
    Exit\", Command.EXIT, 0));\n    mForm.setCommandListener(this);\n  }\n\n  public\
    \ void startApp() {\n    if (mDisplay == null) mDisplay = Display.getDisplay(this);\n\
    \    mDisplay.setCurrent(mForm);\n\n    // Do network loading in a separate thread.\n\
    \    Thread t = new Thread(this);\n    t.start();\n  }\n\n  public void pauseApp()\
    \ {}\n\n  public void destroyApp(boolean unconditional) {}\n\n  public void commandAction(Command\
    \ c, Displayable s) {\n    if (c.getCommandType() == Command.EXIT)\n      notifyDestroyed();\n\
    \  }\n\n  public void run() {\n    HttpConnection hc = null;\n    DataInputStream\
    \ in = null;\n\n    try {\n      String url = getAppProperty(\"ImageLoader-URL\"\
    );\n      hc = (HttpConnection)Connector.open(url);\n      int length = (int)hc.getLength();\n\
    \      byte[] data = null;\n      if (length != -1) {\n        data = new byte[length];\n\
    \        in = new DataInputStream(hc.openInputStream());\n        in.readFully(data);\n\
    \      }\n      else {\n        // If content length is not given, read in chunks.\n\
    \        int chunkSize = 512;\n        int index = 0;\n        int readLength\
    \ = 0;\n        in = new DataInputStream(hc.openInputStream());\n        data\
    \ = new byte[chunkSize];\n        do {\n          if (data.length < index + chunkSize)\
    \ {\n            byte[] newData = new byte[index + chunkSize];\n            System.arraycopy(data,\
    \ 0, newData, 0, data.length);\n            data = newData;\n          }\n   \
    \       readLength = in.read(data, index, chunkSize);\n          index += readLength;\n\
    \        } while (readLength == chunkSize);\n        length = index;\n      }\n\
    \      Image image = Image.createImage(data, 0, length);\n      ImageItem imageItem\
    \ = new ImageItem(null, image, 0, null);\n      mForm.append(imageItem);\n   \
    \   mForm.setTitle(\"Done.\");\n    }\n    catch (IOException ioe) {\n      StringItem\
    \ stringItem = new StringItem(null, ioe.toString());\n      mForm.append(stringItem);\n\
    \      mForm.setTitle(\"Done.\");\n    }\n    finally {\n      try {\n       \
    \ if (in != null) in.close();\n        if (hc != null) hc.close();\n      }\n\
    \      catch (IOException ioe) {}\n    }\n  }\n} \n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n`run()` 方法包含了所有网络代码。它相当简单；我们将图像的 URL（作为应用程序属性获取）传递给 `Connector`\
    \ 的 `open()` 方法，并将结果转换为 `HttpConnection`。然后，我们使用 `getLength()` 方法获取图像文件的长度。根据这个长度，我们创建一个字节数组并将数据读入其中。最后，将整个图像文件读入字节数组后，我们可以从原始数据创建一个\
    \ `Image`。\n\n如果未指定内容长度，则图像数据将以 512 字节的块进行读取。\n\n为了使此示例正常工作，您需要指定 MIDlet 属性 `\"\
    ImageLoader-URL\"`。请注意，您需要指定 PNG 图像的 URL，而不是 JPEG 或 GIF 图像。URL [`65.215.221.148:8080/wj2/res/java2d_sm_ad.png`](http://65.215.221.148:8080/wj2/res/java2d_sm_ad.png)\
    \ 会产生如图 9-3 所示的结果。\n\n![](img/fig164_01.jpg)\n图 9-3：*ImageLoader* 示例\n\n## 使用\
    \ HTTP POST 提交表单\n\n在 MIDlet 端，提交表单稍微复杂一些。特别是，在联系服务器之前，需要在 `HttpConnection` 中设置请求头。过程如下：\n\
    \n1.  从 `Connector` 的 `open()` 方法获取一个 `HttpConnection`。\n\n2.  修改请求的头部字段。具体来说，您需要通过调用\
    \ `setRequestMethod()` 来更改请求方法，并且应该通过调用 `setRequestProperty()` 来设置 `\"Content-Length\"\
    ` 头部。这是您将要发送的参数的长度。\n\n3.  通过调用 `openOutputStream()` 获取 `HttpConnection` 的输出流。这会将请求头发送到服务器。\n\
    \n4.  在从 `HttpConnection` 返回的输出流上发送请求参数。参数应按照前面所述（以及在 J2SE 类 `java.net.URLEncoder`\
    \ 的文档中）的方式进行编码。\n\n5.  从通过 `HttpConnection` 的 `openInputStream()` 方法获取的输入流中读取服务器的响应。\n\
    \n以下示例清单 9-2 演示了如何使用 HTTP POST 向服务器发送单个参数。多个参数可以通过使用 & 分隔符连接起来。请注意，此示例中的参数已按上述方式编码。在此示例中，参数值\
    \ `\"Jonathan Knudsen!\"` 已被编码为 `\"Jonathan+Knudsen%21\"`。清单 9-3 展示了一个非常简单的 servlet，它可以与\
    \ PostMIDlet 通信。\n\n清单 9-2：执行 HTTP POST 的简单 MIDlet\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\nimport java.io.*;\n\nimport javax.microedition.io.*;\nimport javax.microedition.lcdui.*;\n\
    import javax.microedition.midlet.*;\n\npublic class PostMIDlet\n    extends MIDlet\n\
    \    implements CommandListener, Runnable {\n  private Display mDisplay;\n  private\
    \ Form mForm;\n\npublic PostMIDlet() {\n    mForm = new Form(\"Connecting...\"\
    );\n    mForm.addCommand(new Command(\"Exit\", Command.EXIT, 0));\n    mForm.setCommandListener(this);\n\
    \  }\n\npublic void startApp() {\n    if (mDisplay == null) mDisplay = Display.getDisplay(this);\n\
    \    mDisplay.setCurrent(mForm);\n\n// Do network loading in a separate thread.\n\
    \    Thread t = new Thread(this);\n    t.start();\n  }\n  public void pauseApp()\
    \ {}\n\npublic void destroyApp(boolean unconditional) {}\n\npublic void commandAction(Command\
    \ c, Displayable s) {\n    if (c.getCommandType() == Command.EXIT)\n      notifyDestroyed();\n\
    \  }\n\npublic void run() {\n    HttpConnection hc = null;\n    InputStream in\
    \ = null;\n    OutputStream out = null;\n\ntry {\n      String message = \"name=Jonathan+Knudsen%21\"\
    ;\n      String url = getAppProperty(\"PostMIDlet-URL\");\n      hc = (HttpConnection)Connector.open(url);\n\
    \      hc.setRequestMethod(HttpConnection.POST);\n      hc.setRequestProperty(\"\
    Content-Type\",\n          \"application/x-www-form-urlencoded\");\n      hc.setRequestProperty(\"\
    Content-Length\",\n          Integer.toString(message.length()));\n      out =\
    \ hc.openOutputStream();\n      out.write(message.getBytes());\n      in = hc.openInputStream();\n\
    \      int length = (int)hc.getLength();\n      byte[] data = new byte[length];\n\
    \      in.read(data);\n      String response = new String(data);\n      StringItem\
    \ stringItem = new StringItem(null, response);\n      mForm.append(stringItem);\n\
    \      mForm.setTitle(\"Done.\");\n    }\n    catch (IOException ioe) {\n    \
    \  StringItem stringItem = new StringItem(null, ioe.toString());\n      mForm.append(stringItem);\n\
    \      mForm.setTitle(\"Done.\");\n    }\n    finally {\n      try {\n       \
    \ if (out != null) out.close();\n        if (in != null) in.close();\n       \
    \ if (hc != null) hc.close();\n      }\n      catch (IOException ioe) {}\n   \
    \ }\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n清单 9-3：响应 *PostServlet*\
    \ 的简单 Servlet\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport javax.servlet.http.*;\n\
    import javax.servlet.*;\nimport java.io.*;\n"
- fmt: "# Using Cookies for Session Tracking\n\nHTTP is a stateless protocol, which\
    \ means that each request and response pair is a separate conversation. Sometimes,\
    \ though, you want the server to remember who you are. This can be done with a\
    \ *session*. On the server side, a session is just a collection of information.\
    \ When the client sends an HTTP request to the server, it includes a session ID\
    \ as part of the request. The server can then look up the corresponding session\
    \ and have some idea of the identity (or at least the state) of the client.\n\n\
    The most common way to store a session ID on the client side is using HTTP *cookies*.\
    \ A cookie is just a little piece of data that is passed from the server to the\
    \ client in an HTTP response. Most web browsers automatically store cookies and\
    \ will send them back to the appropriate server when a new request is made.\n\n\
    In the MIDP world, of course, there's no web browser taking care of cookies for\
    \ you. You have to do it yourself. Fortunately, it's not very complicated.\n\n\
    Network code that maintains a server session ID needs to do two things:\n\n1.\
    \ When receiving a response from a server, check for a cookie. If there is a cookie\
    \ present, save it away for later (perhaps in a member variable). A cookie is\
    \ just another HTTP response header line. You can check for a cookie by calling\
    \ `getHeaderField()` on an `HttpConnection` object after the request has been\
    \ sent.\n\n2. When sending a request to the server, send the session ID cookie\
    \ if it has been previously received. Again, sending a cookie to the server is\
    \ just a matter of putting it in the request headers, using `HttpConnection`'s\
    \ `setRequestProperty()` method.\n\nEach time you send a request to the server,\
    \ you will be sending a session ID as a request header. The server uses this session\
    \ ID to look up a session object that can be used, server side, to do useful stuff\
    \ like retrieve preferences or maintain a shopping cart.\n\nIt's not hard to implement\
    \ this behavior in a MIDlet. If you have a session ID cookie handy, you should\
    \ send it when you open up an HTTP connection to the same server, like this:\n\
    \n```\nHttpConnection hc = (HttpConnection)Connector.open(url);\nif (mSession\
    \ != null)\n    hc.setRequestProperty(\"cookie\", mSession);\n```\n\nThis code\
    \ assumes you have a session ID cookie saved away in the `mSession` member variable.\
    \ The first time you contact the server, of course, you won't have a session ID\
    \ cookie.\n\nLater, when you receive a response from an HTTP request, look for\
    \ a cookie. If you find one, parse out the session ID and save it away, like this:\n\
    \n```\nInputStream in = hc.openInputStream();\n\nString cookie = hc.getHeaderField(\"\
    Set-cookie\");\nif (cookie != null) {\n  int semicolon = cookie.indexOf(';');\n\
    \  mSession = cookie.substring(0, semicolon);\n}\n```\n\nThe cookie string needs\
    \ to be parsed because it comes in two pieces. The first piece is a path that\
    \ can be used to determine when the cookie should be sent back to the server.\
    \ The second part contains the session ID—that's the part we parse out and save.\n\
    \nFor more information on the different parts of a cookie string and how they\
    \ are used, see [http://www.ietf.org/rfc/rfc2965.txt](http://www.ietf.org/rfc/rfc2965.txt)\
    \ and [http://www.ietf.org/rfc/rfc2109.txt](http://www.ietf.org/rfc/rfc2109.txt).\n\
    \n[Listing 9-4](#LiB0067.html#ch09list04) shows a class, `CookieMIDlet`, that\
    \ uses this technique to maintain a session with a server. It has a very bland\
    \ user interface—just an empty `Form` with two commands. If you invoke the `Send`\
    \ command, the MIDlet sends an HTTP request and receives a response using the\
    \ cookie handling described earlier.\n\n## Listing 9-4: Saving a Server Session\
    \ ID Cookie\n\n```\nimport java.io.*;\n\nimport javax.microedition.io.*;\nimport\
    \ javax.microedition.midlet.*;\nimport javax.microedition.lcdui.*;\n\npublic class\
    \ CookieMIDlet\n    extends MIDlet\n    implements CommandListener, Runnable {\n\
    \  private Display mDisplay;\n  private Form mForm;\n\n  private String mSession;\n\
    ```\n\n## Code Example: `PostServlet`\n\n```\npublic class PostServlet extends\
    \ HttpServlet {\n  public void doPost(HttpServletRequest request,\n      HttpServletResponse\
    \ response)\n      throws ServletException, IOException {\n    String name = request.getParameter(\"\
    name\");\n\n    String message = \"Received name: '\" + name + \"'\";\n    response.setContentType(\"\
    text/plain\");\n    response.setContentLength(message.length());\n    PrintWriter\
    \ out = response.getWriter();\n    out.println(message);\n  }\n}\n```"
