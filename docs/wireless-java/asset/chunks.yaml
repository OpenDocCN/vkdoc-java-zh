  trans: "\n## 使用 HTTPS\n\nHTTP 并非一种安全的协议。它运行在 TCP/IP 套接字之上。使用 HTTP 交换的信息极易受到窃听者的攻击。一种更安全的替代方案\
    \ HTTPS，运行在传输层安全协议（TLS）、安全套接字层（SSL）或类似协议之上。TLS 和 SSL 在套接字与 HTTP、POP3、SMTP 和 NNTP\
    \ 等高层协议之间提供了一层身份验证和加密功能。\n\nTLS 1.0 实际上只是 SSLv3 的更新版本。有关这些协议的更多信息，请参阅 [`wp.netscape.com/eng/ssl3/`](http://wp.netscape.com/eng/ssl3/)\
    \ 和 [`www.ietf.org/rfc/rfc2246.txt`](http://www.ietf.org/rfc/rfc2246.txt)。\n\n\
    在典型的 TLS 交互中，服务器会向客户端发送一个证书以进行身份验证。客户端必须拥有证书颁发机构（CA）的根证书，才能验证服务器的证书。（J2ME Wireless\
    \ Toolkit 附带了一个名为 MEKeyTool 的实用程序，可用于修改工具包模拟器使用的 CA 根证书集。真实设备可能也有类似的实用程序，但通常，您需要确保您的服务器证书由广泛认可的\
    \ CA 签名。）如果客户端能够验证证书，客户端将向服务器发送一个秘密值，该值使用服务器的公钥加密。服务器和客户端都从这个秘密值派生出一个*会话密钥*，该密钥用于加密客户端和服务器之间发送的所有后续流量。\n\
    \n通用连接框架使得获取 HTTPS 连接变得非常容易。您只需构造一个 HTTPS 连接字符串即可。因此，不必使用以下代码：\n\n```\nHttpConnection\
    \ hc = (HttpConnection)\n    Connector.open(\"http://www.cert.org/\");\n```\n\n\
    而是使用以下代码：\n\n```\nHttpConnection hc = (HttpConnection)\n    Connector.open(\"\
    https://www.cert.org/\"); \n```\n\n就是这么简单。HTTPS 连接在 MIDP 1.0 中就已经可以实现；尽管规范并未要求支持，但实现可以自由提供。在\
    \ MIDP 2.0 中，API 也支持 HTTPS，因此新增了一个接口 HttpsConnection，它表示通过某种安全传输承载的 HTTP。\n\n\
    HttpsConnection 是 HttpConnection 的扩展；它增加了一个 getPort() 方法，以便您可以获取服务器的端口号。HTTPS\
    \ 的默认端口是 443。更重要的是，HttpsConnection 有一个 getSecurityInfo() 方法，该方法返回有关安全连接的信息。新的\
    \ SecurityInfo 接口封装了有关正在使用的密码套件、安全协议的名称和版本以及服务器证书的信息。该证书是 javax.microedition.pki.Certificate\
    \ 的一个实现，包含标准信息，如主题、签名者、签名算法以及证书的有效期。\n\n以下示例展示了如何从 HTTPS 连接中检索服务器证书的主题：\n\n```\n\
    String url = \"https://www.cert.org/\";\nHttpsConnection hc = (HttpsConnection)Connector.open(url);\n\
    SecurityInfo si = hc.getSecurityInfo();\nCertificate c = si.getServerCertificate();\n\
    String subject = c.getSubject();\n```\n\n## 使用数据报连接\n\n在本节中，我将简要介绍数据报连接。尽管 MIDP\
    \ 规范并未强制要求支持数据报，但某些设备实现可能会选择支持数据报连接。与面向流的连接不同，数据报连接是*无连接*的。这意味着您可以在网络中发送数据包，但无法保证它们会按正确顺序到达目的地，甚至无法保证它们最终能够到达。\n\
    \n数据报通信基于 javax.microedition.io 包中的两个接口：DatagramConnection 和 Datagram。图 9-4 展示了\
    \ DatagramConnection 中的方法。\n\n![点击展开](img/fig175_01_0.jpg)\n图 9-4：*DatagramConnection*\
    \ 接口\n\n第一步是使用通用连接框架获取一个 DatagramConnection，如下所示：\n\n```\nString url = \"datagram://jonathanknudsen.com:7999\"\
    ;\nDatagramConnection dc = (DatagramConnection)Connector.open(url); \n```\n\n\
    传递给 Connector 的 open() 方法的 URL 字符串包含了数据报连接另一端的主机名和端口。如果 MIDP 实现不支持数据报连接，open()\
    \ 方法将抛出一个异常。\n\n所有数据都通过 Datagram 进行交换。要发送一个数据报，首先请使用 newDatagram() 方法之一请求 DatagramConnection\
    \ 为您创建一个数据报。然后，将一些数据写入其中，并将其传递给 DatagramConnection 的 send() 方法。接收数据报也几乎同样简单。您只需调用\
    \ receive() 方法，该方法会阻塞，直到接收到一个数据报。\n\n本质上，Datagram 是作为数据报有效载荷的字节数组的包装器。您可以通过调用\
    \ getData() 获取对此字节数组的引用。但请记住，Datagram 的数据可能只是数组中数据的一个子集。您可以通过调用 getOffset() 和\
    \ getLength() 来查找实际数据的数组偏移量和长度。\n\n有趣的是，Datagram 是 DataInput 和 DataOutput 接口的扩展，因此可以像读取流一样在\
    \ Datagram 中读写数据。\n\n在 MIDP 2.0 中，数据报连接由 UDPDatagramConnection 接口表示，该接口是 DatagramConnection\
    \ 接口的扩展。UDPDatagramConnection 增加了两个新方法：getLocalAddress() 和 getLocalPort()。您可以使用这些方法来查找使用该连接发送的数据报的源点。\n\
    \n## 其他连接类型\n\n尽管 MIDP 2.0 规范仅要求支持 HTTP 和 HTTPS 连接，但它建议实现支持套接字、服务器套接字和安全套接字连接。API\
    \ 为这些连接提供了相应的接口。设备也可以选择通过通用连接框架实现对串行端口的访问。表 9-1 详细列出了其他连接类型、它们支持的连接接口以及示例连接字符串。有关更详细的信息，请参阅相应接口的\
    \ API 文档。\n\n表 9-1：可选连接类型\n\n| **类型** | **接口** | **示例** |\n| --- | --- | --- |\n\
    | 套接字 | SocketConnection | socket://jonathanknudsen.com:79 |\n| 服务器套接字 | ServerSocketConnection\
    \ | socket://:129 |\n| TLS 或 SSL 套接字 | SecureConnection | ssl://jonathanknudsen.com:79\
    \ |\n| 串行端口 | CommConnection | comm:com0;baudrate=19200 |\n"
- fmt: "# Responding to Incoming Connections\n\nYou may be used to thinking of mobile\
    \ phones as client devices, but they may be full-fledged networked citizens, with\
    \ the ability to receive incoming network connections. Although `ServerSocketConnection`\
    \ provides the ability to listen for incoming socket connections, it can only\
    \ be active while a MIDlet is actually running.\n\nA typical server loop, listening\
    \ for incoming socket connections on port 80, looks something like this:\n\n```\n\
    ServerSocketConnection ssc;\nssc = (ServerSocketConnection)Connector.open(\"socket://:80\"\
    );\nboolean trucking = true;\nwhile (trucking) {\n  SocketConnection sc = (SocketConnection)ssc.acceptAndOpen();\n\
    \  // Handle the client connection sc.\n}\n```\n\nMIDP 2.0 goes one step further\
    \ and allows MIDlets to be launched in response to incoming network connections.\
    \ The name for this technique is *push*. You could, in theory, create a web server\
    \ MIDlet, although in practice a mobile phone is probably a poor platform for\
    \ a web server. A more likely example would be an SMS MIDlet, something built\
    \ using JSR 120, the Wireless Messaging API. Assuming the MIDlet was configured\
    \ correctly, incoming SMS messages would cause the MIDlet to be launched to handle\
    \ the connection.\n\nA MIDlet may register for push connections in two ways. It\
    \ can register at runtime, using static methods in `javax.microedition.io.PushRegistry`,\
    \ or it can register at install time using special entries in the application\
    \ descriptor (JAD file). The important thing to remember is that the push registry\
    \ has a lifetime beyond your MIDlet. It is part of the MIDlet management software\
    \ that runs on the device. When a MIDlet registers for push notifications, the\
    \ device software is obligated to listen for incoming network connections and\
    \ launch your MIDlet if the appropriate connection is made.\n\nInside your MIDlet,\
    \ you don't have to do anything different to catch the incoming connection. All\
    \ you do is call `Connector.open()` with the appropriate network listening string.\n\
    \nLet's say, for example, that you had created a web server in a MIDlet and called\
    \ it `PatchyMIDlet`. (The source code for this book, available from [http://www.apress.com/](http://www.apress.com/),\
    \ includes `PatchyMIDlet`; it sends a randomly selected text message in response\
    \ to incoming requests.) This MIDlet responds to incoming socket connections on\
    \ port 80 (the default HTTP port). If you wanted to register the MIDlet at runtime,\
    \ you'd do this in the code somewhere:\n\n```\nPushRegistry.registerConnection(\"\
    socket://:80\", PatchyMIDlet, \"*\");\n```\n\nThe first two parameters are pretty\
    \ clear—any incoming socket connections on port 80 should launch `PatchyMIDlet`.\
    \ The third parameter is a filter that will be applied to incoming connections.\
    \ In this case, we accept all incoming connections with the `\"*\"` wildcard.\
    \ Other possibilities would be to restrict incoming connections to a single IP\
    \ address or a range of addresses.\n\nRemember, the results of the call to `registerConnection()`\
    \ persist beyond the lifetime of the MIDlet. Even after the MIDlet has been destroyed,\
    \ the MIDlet management software on the device is watching out for incoming socket\
    \ connections on port 80. If a connection is received, `PatchyMIDlet` will be\
    \ launched. The push registry doesn't actually do anything with the incoming connection;\
    \ it just detects it and launches a registered MIDlet to respond. It's the MIDlet's\
    \ responsibility to accept the incoming connection. To find out whether it has\
    \ been launched by the push registry or the user, the MIDlet can call `PushRegistry`'s\
    \ `listConnections()` method, passing `true` for the `available` parameter. The\
    \ method will then return a list of connections that have input available. If\
    \ this list is empty, then the MIDlet must have been launched by the user, not\
    \ by an incoming connection.\n\nInstead of a MIDlet registering push connections\
    \ at runtime, it's much more likely that the push registrations would be contained\
    \ in the application description for the MIDlet suite containing `PatchyMIDlet`.\
    \ Thus, the push registration would be performed at installation time so that\
    \ the user would never need to run the MIDlet manually. In this case, the MIDlet\
    \ descriptor would contain a line like this:\n\n```\nMIDlet-Push-1: socket://:80,\
    \ PatchyMIDlet, *\n```\n\nThe parameters are exactly the same. The push registration\
    \ is made when the MIDlet suite is installed. If the MIDlet cannot be registered\
    \ (for example, some other application might already be listening for incoming\
    \ socket connections on port 80), then the MIDlet suite will not be installed.\
    \ Multiple push registrations are listed in the descriptor using ascending numbers:\
    \ `MIDlet-Push-1`, `MIDlet-Push-2`, and so on.\n\nThe J2ME Wireless Toolkit (version\
    \ 2.0) allows you to register and test push connections easily. Just click on\
    \ the **Settings…** button, then choose the **Push Registry** tab. If you downloaded\
    \ the source code for this book, you'll see an entry for `PatchyMIDlet`. [Figure\
    \ 9-5](#LiB0072.html#ch09fig05) shows this entry.\n\n[![Click To expand](fig178_01.jpg)](fig178_01_0.jpg)\n\
    Figure 9-5: The push registry entry for `PatchyMIDlet`\n\nTo test the push notification,\
    \ you'll have to package the application, then deploy it on the emulator. First\
    \ choose **Project** Ø **Package** Ø **Create Package** to package the project\
    \ into a MIDlet suite JAR. Then choose the **Project** Ø **Run via OTA** from\
    \ the KToolbar menu. You'll see the emulator pop up, showing its Application Management\
    \ Software (AMS). Select **Install Application**, then accept the URL that is\
    \ supplied. KToolbar contains a small OTA server; the URL is automatically preloaded\
    \ when you select **Run via OTA**. You will see a series of other prompts about\
    \ installing the application; just say yes to everything. Eventually the installation\
    \ succeeds and you will see the MIDlet suite `wj2` listed in the emulator's menu.\
    \ The emulator is now running, listening for incoming connections, even though\
    \ no MIDlets are running.\n\nNow test `PatchyMIDlet` by pointing your browser\
    \ to `http://localhost/`. `PatchyMIDlet` will be launched and will send a response\
    \ to the browser. (The emulator will ask if it's okay to send data back on the\
    \ network; you'll have to say yes.) [Figure 9-6](#LiB0072.html#ch09fig06) shows\
    \ the emulator running `PatchyMIDlet` and a browser showing its output.\n\n[![Click\
    \ To expand](fig179_01.jpg)](fig179_01_0.jpg)\nFigure 9-6: `PatchyMIDlet`, a small\
    \ web server\n\n**Run via OTA** is an excellent tool for testing your MIDlet's\
    \ installation behavior rather than its runtime behavior. Just remember that you\
    \ need to package the MIDlet first because the toolkit's small OTA distributes\
    \ the MIDlet suite JAR file from the project's `bin` directory.\n\n|  | Note |\
    \ The **Run via OTA** feature is not available in the J2ME Wireless Toolkit 2.0\
    \ beta 1. It was added in version 2.0 beta 2. |\n\n`PushRegistry` contains several\
    \ other static methods that are related to network registrations. The `getMIDlet()`\
    \ and `getFilter()` methods return the MIDlet name and filter for a given network\
    \ connection string. The `listConnections()` method returns a string array containing\
    \ all the registered network connection strings. Finally, to remove a connection-to-MIDlet\
    \ mapping, use `unregisterConnection()`."
