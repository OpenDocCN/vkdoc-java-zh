    ## java.io 中的流


    CLDC/MIDP 环境中的 `java.io` 包是 J2SE 中 `java.io` 的精简版本。表 4-3 总结了 J2SE 和 CLDC/MIDP
    中 `java.io` 的类。如你所见，许多在 J2SE 中常见的 `java.io` 类在 CLDC/MIDP 中缺失了。


    表 4-3：*java.io* 包


    | **接口** |   |   |

    | --- | --- | --- |

    | ***J2SE SDK 1.4.0*** | ***CLDC 1.0*** | ***CLDC 1.1*** |

    | --- | --- | --- |

    | DataInput | 不同 | 不同 |

    | DataOutput | 不同 | 不同 |

    | Externalizable | - | - |

    | FileFilter | - | - |

    | FilenameFilter | - | - |

    | ObjectInput | - | - |

    | ObjectInputValidation | - | - |

    | ObjectOutput | - | - |

    | ObjectStreamConstants | - | - |

    | Serializable | - | - |

    | BufferedInputStream | - | - |

    | BufferedOutputStream | - | - |

    | BufferedReader | - | - |

    | BufferedWriter | - | - |

    | ByteArrayInputStream | 相同 | 相同 |

    | ByteArrayOutputStream | 不同 | 与 CLDC 1.0 相同 |

    | CharArrayReader | - | - |

    | CharArrayWriter | - | - |

    | DataInputStream | 不同 | 不同 |

    | DataOutputStream | 不同 | 不同 |

    | File | - | - |

    | FileDescriptor | - | - |

    | FileInputStream | - | - |

    | FileOutputStream | - | - |

    | FilePermission | - | - |

    | FileReader | - | - |

    | FileWriter | - | - |

    | FilterInputStream | - | - |

    | FilterOutputStream | - | - |

    | FilterReader | - | - |

    | FilterWriter | - | - |

    | InputStream | 相同 | 相同 |

    | InputStreamReader | 不同 | 与 CLDC 1.0 相同 |

    | LineNumberInputStream | - | - |

    | LineNumberReader | - | - |

    | ObjectInputStream | - | - |

    | ObjectInputStream.GetField | - | - |

    | ObjectOutputStream | - | - |

    | ObjectOutputStream.PutField | - | - |

    | ObjectStreamClass | - | - |

    | ObjectStreamField | - | - |

    | OutputStream | 相同 | 相同 |

    | OutputStreamWriter | 不同 | 与 CLDC 1.0 相同 |

    | PipedInputStream | - | - |

    | PipedOutputStream | - | - |

    | PipedReader | - | - |

    | PipedWriter | - | - |

    | PrintStream | 不同 | 不同 |

    | PrintWriter | - | - |

    | PushbackInputStream | - | - |

    | PushbackReader | - | - |

    | RandomAccessFile | - | - |

    | Reader | 相同 | 相同 |

    | SequenceInputStream | - | - |

    | SerializablePermission | - | - |

    | StreamTokenizer | - | - |

    | StringBufferInputStream | - | - |

    | StringReader | - | - |

    | StringWriter | - | - |

    | Writer | 相同 | 相同 |


    尽管 J2SE 和 CLDC 类之间的差异看起来很大，但它们可以轻松地归为三类：


    1.  由于 CLDC/MIDP 没有本地文件系统的概念，所有与文件相关的类都已从 `java.io` 包中移除。这包括 `File`、`FileInputStream`、`FileOutputStream`、相应的
    `Reader` 和 `Writer` 类、`RandomAccessFile` 以及各种支持类。如果你需要在设备上持久化存储数据，则需要使用 `javax.microedition.rms`
    包 API，详见第 8 章。


    2.  CLDC 不支持对象序列化。这意味着 `Serializable` 接口和各种对象流类都不存在。


    3.  最后，J2SE 包含了一些实用流类——这些类你可能某天会用到，但不应该包含在内存较小的设备上。这些类包括管道流、回推流、序列流、行号流，以及像 `StreamTokenizer`
    这样的其他一些“瑰宝”。如果你的 MIDlet 确实需要其中之一，你可以尝试将其与你的应用程序一起打包。^([1]) 请记住，直接使用 J2SE 中的类存在许可限制和技术问题；在开始复制文件之前，请确保你了解相关的法律影响。


    ### 字符编码


    MIDP 包含了用于处理 Unicode 字符的 `Reader` 和 `Writer` 字符流。`InputStreamReader` 和 `OutputStreamWriter`
    负责处理字节流和字符流之间的转换，这与 J2SE 中一样。*编码*决定了字节流和字符流之间的转换方式。如果你不指定编码，则会使用默认编码。如果你愿意，可以将编码名称传递给
    `InputStreamReader` 和 `OutputStreamWriter` 的构造函数。到目前为止，这与 J2SE 完全相同。不过，在 MIDP
    中，你可用的编码数量可能比 J2SE 少得多。


    可以通过调用 `System.getProperty("microedition.encoding")` 获取 MIDP 实现的默认编码——默认为 `ISO8859_1`。


    ### 资源文件


    如第 8 章所述，你可以从 MIDlet 套件的 JAR 文件中检索资源文件。使用 `Class` 中的 `getResourceAsStream()` 方法；它会返回一个
    `InputStream`，你可以随意使用。


    ^([1])更好的做法是重新设计你的应用程序，使得在设备上不需要进行复杂的流处理。通常，你应该让服务器尽可能多地完成工作，而让你的 MIDlet 尽可能少地工作。


    ## java.util


    CLDC 仅包含 J2SE 的 `java.util` 包中的十几个类。许多缺失的类是集合 API 的一部分，该 API 对于小型设备来说过于庞大。表 4-4
    列出了 J2SE 和 CLDC/MIDP 中 `java.util` 的类和接口。


    表 4-4：*java.util* 包


    | **接口** |   |   |

