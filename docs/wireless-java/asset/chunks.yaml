- fmt: '基本流程是从 MIDlet 的请求中提取参数，然后独立计算消息摘要值。Servlet 通过`lookupPassword()`方法查找用户密码。在更严谨的实现中，Servlet
    可能会从某种数据库中查找密码。


    一旦 Servlet 获取到用户密码，它会将用户名、密码、时间戳和随机数输入到消息摘要中。然后计算消息摘要值，并将此结果与 MIDlet 发送来的摘要值进行比较。如果摘要值匹配，则
    MIDlet 客户端通过身份验证。


    ### 建议的增强功能


    对此系统的一个明显增强是，实际从数据库或某种密码仓库中检索密码（在服务器端）。


    此外，Servlet 需要验证从客户端接收到的时间戳。每次用户尝试登录时，Servlet 应确保用户的时间戳大于用户上一次登录尝试的时间戳。


    客户端方面的一个可能增强是将用户名和密码存储在记录存储中，以便每次登录尝试时自动发送。通常这似乎是个坏主意。但小型设备通常由其所有者物理保管——你会尽量让手机时刻不离身，或者将其锁在某个地方。这是在便利性和安全性之间的一种权衡。但考虑到在手机键盘上输入文本有多困难，你可能希望为用户提供使用存储的用户名和密码的便利。


    请注意，此方案中执行的身份验证是*按请求*进行的。每次客户端向服务器发送 HTTP 请求时，都是一次完全独立的会话。因此，每次客户端需要向服务器验证自身以执行某些操作时，都必须重新经历整个过程——创建时间戳和随机数，计算消息摘要，并将整个数据包发送到服务器。在此系统中，你可能需要在
    HTTP 请求中添加参数，以指定代表已认证用户执行的操作或命令。


    ## 保护网络数据


    让我们看一些更复杂的内容。假设你想隐藏通过网络发送的数据。受保护的密码示例展示了客户端向服务器验证自身的一种方式，但我们仍然面临窃听者从网络中截获信用卡号或其他敏感信息的问题。


    此示例由一个配对的 MIDlet 和 Servlet 组成。MIDlet `StealthMIDlet` 有一个简单的用户界面，允许你输入一条消息。该消息使用
    RC4 流密码加密后发送给 Servlet。在服务器端，`StealthServlet` 接收加密消息，解密它，并发送回其自身的加密消息。两条消息都作为密文通过不安全的互联网传输，攻击者没有正确的密钥很难读取。


    RC4 是一种对称加密算法，这意味着使用相同的密钥来加密和解密数据。`StealthMIDlet` 和 `StealthServlet` 使用两个密钥，每个数据传输方向一个。一个密钥用于在
    MIDlet 中加密数据并在 Servlet 中解密；另一个密钥用于在 Servlet 中加密数据并在 MIDlet 中解密。


    Servlet 为多个客户端 MIDlet 提供服务，每个 MIDlet 都有自己的加密和解密密钥。因此，Servlet 必须跟踪每个客户端的两个密钥，并且不能混淆。它使用
    HTTP 会话对象来实现这一点。每次收到客户端请求时，Servlet 都会在会话对象中找到相应的密码器。如果密码器不存在，则使用客户端特定的密钥创建并初始化它们。


    该系统同时提供了数据机密性和身份验证。客户端和服务器相互认证，因为它们必须拥有正确的密钥才能交换数据。


    [图 15-4](#LiB0122.html#ch15fig04) 显示了 `StealthMIDlet` 的主用户界面。它允许你输入要加密并发送到服务器的消息。准备就绪后，点击
    **Send** 命令启动流程。


    ![](fig298_01.jpg)

    图 15-4：在 *StealthMIDlet* 的主屏幕中输入你的秘密消息。


    Servlet 解密你的消息并发送回一个加密的响应，MIDlet 会显示该响应，如[图 15-5](#LiB0122.html#ch15fig05) 所示。


    ![](fig298_02.jpg)

    图 15-5：Servlet 发送回它自己的秘密消息。


    ### 使用 Bouncy Castle 密码器


    在 Bouncy Castle 加密包中，流密码由`org.bouncycastle.crypto.StreamCipher`接口表示。你只需要使用`init()`初始化密码器，然后就可以使用`processBytes()`加密或解密数据。


    Bouncy Castle 包只提供一个直接的流密码实现：`org.bouncycastle.crypto.engines.RC4`。如果你更喜欢使用不同的算法，可以使用分组密码代替。你可以使用密码反馈（CFB）模式将分组密码当作流密码使用。在
    Bouncy Castle 包中，这由`org.bouncycastle.crypto.StreamBlockCipher`类实现。


    这种技术让你能够访问 Bouncy Castle 庞大的分组密码实现库，从老旧的 DES 到 AES、Blowfish、Rijndael 等等。有关密码模式的更多信息，请参阅
    *Java Cryptography* 的第 7 章。


    我们的简单实现实例化了一对 RC4 对象，如下所示：


    ```

    StreamCipher inCipher = new RC4Engine();

    StreamCipher outCipher = new RC4Engine();

    ```


    密码器在使用前需要初始化。`init()`的第一个参数，如果密码器将用于加密数据则为`true`，用于解密则为`false`。第二个参数本质上是密钥，包装在`KeyParameter`对象中。


    ```

    // 假设我们已经检索到了 inKey 和 outKey，两者都是字节数组。

    inCipher.init(false, new KeyParameter(inKey));

    outCipher.init(true, new KeyParameter(outKey));

    ```


    要加密数据，我们只需要创建一个数组来保存密文。然后调用流密码的`processBytes()`方法来执行加密。`processBytes()`方法接受明文数组、明文中的起始索引、要处理的字节数、密文数组以及密文应写入的起始索引。


    ```

    // 假设我们有一个名为 plaintext 的字节数组。

    byte[] ciphertext = new byte[plaintext.length];

    outCipher.processBytes(plaintext, 0, plaintext.length, ciphertext, 0);

    ```


    解密过程相同，只是你会使用一个已初始化为解密的密码器。'
  raw: 'The basic procedure is to pull the parameters out of the request from the
    MIDlet, and then independently calculate the message digest value. The servlet
    looks up the user''s password in the lookupPassword() method. In a more serious
    implementation, the servlet would probably look up the password in a database
    of some sort.


    Once the servlet figures out the user''s password, it pumps the user name, password,
    timestamp, and random number into a message digest. Then it calculates the message
    digest value and compares this result with the digest value that was sent from
    the MIDlet. If the digest values match, the MIDlet client is authenticated.


    ### Suggested Enhancements


    One obvious enhancement to this system is to actually retrieve passwords (on the
    server side) from a database or password repository of some sort.


    Furthermore, the servlet needs to validate the timestamp it receives from the
    client. Every time a user tries to login, the servlet should make sure that the
    user''s timestamp is greater than the timestamp from the user''s previous login
    attempt.


    One possible enhancement on the client side is to store the user''s name and password
    in a record store so that they can be automatically sent with each login attempt.
    Normally this might seem like a bad idea. But small devices are generally kept
    physically secure by their owners—you try to keep your mobile phone in your possession
    at all times, or you lock it up somewhere. It''s a trade-off between convenience
    and security. But just considering how difficult it is to enter text on a mobile
    phone keypad, you might want to give your users the convenience of using a stored
    name and password.


    Note that the authentication performed in this scheme is *per request*. Each time
    the client sends an HTTP request to the server, it is an entirely separate conversation.
    Therefore, each time, the client needs to authenticate itself to the server to
    perform some work, it must go through the whole process again—creating a timestamp
    and random number, calculating a message digest, and sending the whole mess up
    to the server. In this system, then, you would probably add parameters to the
    HTTP request that specify an action or command that should be performed on behalf
    of the authenticated user.


    ## Securing Network Data


    Let''s look at something a little more complicated. Suppose you wish to conceal
    the data you are sending over the network. The protected password example showed
    one way for a client to authenticate itself to the server, but we''ve still got
    the problem of eavesdroppers picking up credit card numbers or other sensitive
    information off the network.


    This example consists of a matched MIDlet and servlet. The MIDlet, StealthMIDlet,
    has a simple user interface that allows you to enter a message. This message is
    encrypted using an RC4 stream cipher and sent to the servlet. On the server side,
    StealthServlet receives the encrypted message, decrypts it, and sends back its
    own encrypted message. Both messages pass over the insecure Internet as ciphertext,
    which is difficult for attackers to read without the proper keys.


    RC4 is a symmetric encryption algorithm, which means that the same key is used
    to encrypt and decrypt data. StealthMIDlet and StealthServlet use two keys, one
    for each direction of data travel. One key is used to encrypt data in the MIDlet
    and decrypt it in the servlet; the other key encrypts data in the servlet and
    decrypts it in the MIDlet.


    The servlet services multiple client MIDlets, each with their own encrypting and
    decrypting keys. Therefore, the servlet must keep track of two keys per client
    without getting them mixed up. It uses an HTTP session object to do this. Every
    time a client request is received, the servlet finds the corresponding ciphers
    in the session object. If the ciphers don''t exist, they are created and initialized
    using client-specific keys.


    This system provides both data confidentiality and authentication. The client
    and server are authenticated to each other because they must possess the correct
    keys to exchange data.


    [Figure 15-4](#LiB0122.html#ch15fig04) shows the main user interface of StealthMIDlet.
    It allows you to enter a message you want to encrypt and send to the server. When
    you''re ready, hit the **Send** command to kick things off.


    ![](fig298_01.jpg)

    Figure 15-4: Enter your secret message in *StealthMIDlet*''s main screen.


    The servlet decrypts your message and sends back an encrypted response, which
    is displayed by the MIDlet as shown in [Figure 15-5](#LiB0122.html#ch15fig05).


    ![](fig298_02.jpg)

    Figure 15-5: The servlet sends back its own secret message.


    ### Using Bouncy Castle Ciphers


    In the Bouncy Castle cryptography package, stream ciphers are represented by the
    org.bouncycastle.crypto.StreamCipher interface. You just need to initialize the
    cipher, using init(), and then you can encrypt or decrypt data using processBytes().


    The Bouncy Castle package only provides one direct stream cipher implementation,
    org.bouncycastle.crypto.engines.RC4\. If you''d prefer to use a different algorithm,
    you can use a block cipher instead. You can treat block ciphers like stream ciphers
    using Cipher Feedback (CFB) mode. In the Bouncy Castle package, this is implemented
    in the org.bouncycastle.crypto.StreamBlockCipher class.


    This technique gives you access to Bouncy Castle''s considerable arsenal of block
    cipher implementations, from the wizened DES through AES, Blowfish, Rijndael,
    and more. For more information on cipher modes, see Chapter 7 of *Java Cryptography*.


    Our simple implementation instantiates a pair of RC4 objects, something like this:


    ```

    StreamCipher inCipher = new RC4Engine();

    StreamCipher outCipher = new RC4Engine();

    ```


    The ciphers need to be initialized before they can be used. The first parameter
    to init() should be true if the cipher will be encrypting data, false for decryption.
    The second parameter is essentially the key, wrapped up in a KeyParameter object.


    ```

    // Assume we have retrieved inKey and outKey, both byte arrays.

    inCipher.init(false, new KeyParameter(inKey));

    outCipher.init(true, new KeyParameter(outKey));

    ```


    To encrypt data, we just need to create an array to hold the ciphertext. Then
    call the stream cipher''s processBytes() method to perform the encryption. The
    processBytes() method accepts the plaintext array, an index into the plaintext,
    the number of bytes that should be processed, the ciphertext array, and the index
    at which the ciphertext should be written.


    ```

    // Assume we have a byte array called plaintext.

    byte[] ciphertext = new byte[plaintext.length];

    outCipher.processBytes(plaintext, 0, plaintext.length, ciphertext, 0);

    ```


    Decryption is identical, except you would use a cipher that has been initialized
    for decryption.'
  trans: '

    基本流程是从 MIDlet 的请求中提取参数，然后独立计算消息摘要值。Servlet 会在 `lookupPassword()` 方法中查找用户的密码。在更严谨的实现中，Servlet
    可能会从某种数据库中查找密码。


    一旦 Servlet 获取到用户密码，它就会将用户名、密码、时间戳和随机数输入到消息摘要中。然后计算消息摘要值，并将此结果与 MIDlet 发送来的摘要值进行比较。如果摘要值匹配，则
    MIDlet 客户端通过身份验证。


    ### 建议的改进


    对此系统的一个明显改进是，实际从数据库或某种密码仓库中（在服务器端）检索密码。


    此外，Servlet 需要验证从客户端接收到的时间戳。每次用户尝试登录时，Servlet 都应确保该用户的时间戳大于其上一次登录尝试的时间戳。


    客户端方面的一个可能改进是，将用户名和密码存储在记录存储中，以便每次登录尝试时都能自动发送。通常这似乎是个坏主意。但小型设备通常由其所有者进行物理安全保管——你会尽量让手机随身携带，或者将其锁在某个地方。这是在便利性和安全性之间的一种权衡。但考虑到在手机键盘上输入文本有多困难，你可能希望为用户提供使用存储的用户名和密码的便利。


    请注意，此方案中执行的身份验证是*按请求*进行的。每次客户端向服务器发送 HTTP 请求时，都是一次完全独立的会话。因此，每次客户端需要向服务器验证自身身份以执行某些操作时，都必须重新经历整个过程——创建时间戳和随机数、计算消息摘要，并将所有这些数据发送到服务器。在此系统中，你可能需要在
    HTTP 请求中添加参数，以指定应为经过身份验证的用户执行的操作或命令。


    ## 保护网络数据安全


    让我们来看一个稍微复杂一点的例子。假设你想隐藏通过网络发送的数据。受密码保护的示例展示了一种客户端向服务器验证自身身份的方法，但我们仍然面临窃听者从网络中截获信用卡号或其他敏感信息的问题。


    此示例由一个配对的 MIDlet 和 Servlet 组成。MIDlet（StealthMIDlet）有一个简单的用户界面，允许你输入一条消息。该消息使用
    RC4 流密码加密后发送给 Servlet。在服务器端，StealthServlet 接收加密消息，解密它，然后发回自己加密的消息。两条消息都以密文形式通过不安全的互联网传输，攻击者在没有正确密钥的情况下很难读取。


    RC4 是一种对称加密算法，这意味着加密和解密数据使用相同的密钥。StealthMIDlet 和 StealthServlet 使用两个密钥，每个数据传输方向各一个。一个密钥用于在
    MIDlet 中加密数据并在 Servlet 中解密；另一个密钥用于在 Servlet 中加密数据并在 MIDlet 中解密。


    Servlet 为多个客户端 MIDlet 提供服务，每个 MIDlet 都有自己的加密和解密密钥。因此，Servlet 必须跟踪每个客户端的两个密钥，且不能混淆。它使用
    HTTP 会话对象来实现这一点。每次收到客户端请求时，Servlet 都会在会话对象中找到相应的密码器。如果密码器不存在，则会使用客户端特定的密钥创建并初始化它们。


    该系统同时提供了数据机密性和身份验证。客户端和服务器相互验证身份，因为它们必须拥有正确的密钥才能交换数据。


    图 15-4 展示了 StealthMIDlet 的主用户界面。它允许你输入想要加密并发送到服务器的消息。准备就绪后，点击 **发送** 命令即可开始。


    ![](img/fig298_01.jpg)

    图 15-4：在 *StealthMIDlet* 的主屏幕中输入你的秘密消息。


    Servlet 解密你的消息并发送回加密的响应，MIDlet 会显示该响应，如 图 15-5 所示。


    ![](img/fig298_02.jpg)

    图 15-5：Servlet 发回自己的秘密消息。


    ### 使用 Bouncy Castle 密码器


    在 Bouncy Castle 加密包中，流密码由 `org.bouncycastle.crypto.StreamCipher` 接口表示。你只需使用 `init()`
    初始化密码器，然后就可以使用 `processBytes()` 加密或解密数据。


    Bouncy Castle 包只提供了一个直接的流密码实现：`org.bouncycastle.crypto.engines.RC4`。如果你更喜欢使用不同的算法，可以使用分组密码代替。你可以使用密码反馈（CFB）模式将分组密码当作流密码使用。在
    Bouncy Castle 包中，这是通过 `org.bouncycastle.crypto.StreamBlockCipher` 类实现的。


    这种技术让你能够使用 Bouncy Castle 庞大的分组密码实现库，从老旧的 DES 到 AES、Blowfish、Rijndael 等等。有关密码模式的更多信息，请参阅
    *Java Cryptography* 的第 7 章。


    我们的简单实现实例化了一对 RC4 对象，如下所示：


    ```

    StreamCipher inCipher = new RC4Engine();

    StreamCipher outCipher = new RC4Engine();

    ```


    密码器在使用前需要初始化。如果密码器将用于加密数据，`init()` 的第一个参数应为 `true`，解密则为 `false`。第二个参数本质上是密钥，包装在
    `KeyParameter` 对象中。


    ```

    // 假设我们已经获取了 inKey 和 outKey，两者都是字节数组。

    inCipher.init(false, new KeyParameter(inKey));

    outCipher.init(true, new KeyParameter(outKey));

    ```


    要加密数据，我们只需创建一个数组来保存密文。然后调用流密码的 `processBytes()` 方法来执行加密。`processBytes()` 方法接受明文数组、明文中的起始索引、要处理的字节数、密文数组以及密文应写入的起始索引。


    ```

    // 假设我们有一个名为 plaintext 的字节数组。

    byte[] ciphertext = new byte[plaintext.length];

    outCipher.processBytes(plaintext, 0, plaintext.length, ciphertext, 0);

    ```


    解密过程相同，只是需要使用已初始化为解密状态的密码器。

