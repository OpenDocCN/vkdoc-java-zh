- fmt: '# Streams in java.io


    The `java.io` package in the CLDC/MIDP world is a stripped down version of `java.io`
    in J2SE. [Table 4-3](#LiB0033.html#ch04table03) summarizes the classes of `java.io`
    in both J2SE and CLDC/MIDP. As you can see, many of the `java.io` classes you
    normally find in J2SE are missing from CLDC/MIDP.


    **Table 4-3: The `java.io` Package**


    | **INTERFACES** | | |

    | --- | --- | --- |

    | ***J2SE SDK 1.4.0*** | ***CLDC 1.0*** | ***CLDC 1.1*** |

    | --- | --- | --- |

    | `DataInput` | Different | Different |

    | `DataOutput` | Different | Different |

    | `Externalizable` | - | - |

    | `FileFilter` | - | - |

    | `FilenameFilter` | - | - |

    | `ObjectInput` | - | - |

    | `ObjectInputValidation` | - | - |

    | `ObjectOutput` | - | - |

    | `ObjectStreamConstants` | - | - |

    | `Serializable` | - | - |

    | `BufferedInputStream` | - | - |

    | `BufferedOutputStream` | - | - |

    | `BufferedReader` | - | - |

    | `BufferedWriter` | - | - |

    | `ByteArrayInputStream` | Same | Same |

    | `ByteArrayOutputStream` | Different | Same as CLDC 1.0 |

    | `CharArrayReader` | - | - |

    | `CharArrayWriter` | - | - |

    | `DataInputStream` | Different | Different |

    | `DataOutputStream` | Different | Different |

    | `File` | - | - |

    | `FileDescriptor` | - | - |

    | `FileInputStream` | - | - |

    | `FileOutputStream` | - | - |

    | `FilePermission` | - | - |

    | `FileReader` | - | - |

    | `FileWriter` | - | - |

    | `FilterInputStream` | - | - |

    | `FilterOutputStream` | - | - |

    | `FilterReader` | - | - |

    | `FilterWriter` | - | - |

    | `InputStream` | Same | Same |

    | `InputStreamReader` | Different | Same as CLDC 1.0 |

    | `LineNumberInputStream` | - | - |

    | `LineNumberReader` | - | - |

    | `ObjectInputStream` | - | - |

    | `ObjectInputStream.GetField` | - | - |

    | `ObjectOutputStream` | - | - |

