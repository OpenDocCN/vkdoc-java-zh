  trans: "\n## 控制播放器\n\n播放器的*媒体时间*是指其在音频播放中的当前位置。例如，一个播放 4 秒音频片段且进度过半的播放器，其媒体时间为 2,000,000\
    \ 微秒。若想跳转到音频片段的特定位置，可调用`setMediaTime()`。通过`getMediaTime()`可获取当前媒体时间。音频片段的总时长由`getDuration()`返回。对于某些类型的流媒体，时长可能无法确定，此时将返回特殊值`TIME_UNKNOWN`。\n\
    \n播放器还可以循环播放，即反复播放同一音频片段。你可以在播放器启动前调用`setLoopCount()`来控制此行为。传入值-1 可实现无限循环。\n\n\
    播放器接口之外是一个完整的控件世界。你可以通过调用`getControls()`（播放器从`Controllable`接口继承的方法）获取播放器的控件列表。该方法返回适用于该播放器的控件数组。ABB\
    \ 仅定义了`VolumeControl`和`ToneControl`，但具体实现可自由提供其他适用于其所支持内容类型和协议的控件。\n\n若只需获取单个控件，可将控件名称传递给播放器的`getControl()`方法（同样继承自`Controllable`）。该名称是`javax.microedition.media.control`包中某个接口的名称。\n\
    \n播放器必须至少处于`REALIZED`状态才能返回其控件。\n\n例如，要使用`VolumeControl`将播放音量设置为最大音量的一半，可以这样操作：\n\
    \n```\n// Player player = Manager.createPlayer(...);\nplayer.prefetch();\nVolumeControl\
    \ vc = (VolumeControl)player.getControl(\"VolumeControl\");\nvc.setLevel(50);\n\
    ```\n\n## 监听播放器事件\n\n播放器包含用于添加和移除监听器的方法，这些监听器将收到播放器生命周期中各种里程碑事件的通知：\n\n```\npublic\
    \ void addPlayerListener(PlayerListener playerListener)\npublic void removePlayerListener(PlayerListener\
    \ playerListener)\n```\n\n`PlayerListener`定义了一个单一方法，该方法会随各种信息消息被调用：\n\n```\npublic\
    \ void playerUpdate(Player player, String event, Object eventData)\n```\n\n其中`player`参数自然是生成事件的播放器。事件由字符串`event`描述，并可能包含附加信息`eventData`。`PlayerListener`接口中的常量描述了常见事件：`STARTED`、`END_OF_MEDIA`和`VOLUME_CHANGED`等。完整列表请参阅\
    \ API 文档。\n\n## 音调与音调序列\n\n你已经看到使用`Manager`播放单个音调是多么简单。在 MIDP 2.0 媒体 API 中隐藏着一个更为复杂的音调序列播放器。它是在播放器和控件架构中实现的，考虑到音调序列与采样音频几乎没有共同点，这算是一种权宜之计。\n\
    \n要获取音调序列播放器，只需将特殊值（`Manager`的`TONE_DEVICE_LOCATOR`）传递给`createPlayer()`。如果你查看`TONE_DEVICE_LOCATOR`，会发现它的值是`\"\
    device://tone\"`，这大致意味着一个\"设备\"协议和\"audio/x-tone-seq\"内容类型。你可能还记得在`MediaInformationMIDlet`的输出中见过它。正如我所说，这算是一种权宜之计。\n\
    \n一旦获取了音调序列播放器，就可以通过其关联的`ToneControl`对象为其提供音调序列。要获取此控件，请调用`getControl(\"ToneControl\"\
    )`。（记住，播放器需要先处于`REALIZED`状态。）\n\n`ToneControl`封装了一个字节数组，其语法和构造在 API 文档中描述得晦涩难懂。掌握它之后，你就能像鲍比·麦克费林那样，将任何歌曲变成单声道杰作。我将描述字节数组格式并给出几个示例。\n\
    \n音调本身由音符编号和持续时间对定义。音符编号与`Manager`的`playTone()`方法相同，其中 60 是中央 C，69 是中央 C 上方的 440\
    \ 赫兹 A 音。持续时间以*分辨率*的倍数指定。默认情况下，音调序列的分辨率是 4/4 拍（四拍）中一小节的 1/64。因此，持续时间 64 对应全音符（四拍），16\
    \ 对应四分音符（一拍），8 是八分音符，以此类推。\n\n所有音调序列必须以版本号开头。这不是你的数据版本，而是你正在使用的音调序列格式的版本。目前唯一接受的版本是\
    \ 1。一个简单的音调序列如下所示：\n\n```\nbyte[] sequence = new byte[] {\n  ToneControl.VERSION,\
    \ 1,\n  67, 16, // 那\n  69, 16, // 山\n  67,  8, // 丘\n  65,  8, // 充\n  64, 48,\
    \ // 满\n  62,  8, // 了\n  60,  8, // 生\n  59, 16, // 机\n  57, 16, // 的\n  59,\
    \ 32, // 音\n  59, 32  // 乐\n}; \n```\n\n此音调序列依赖于几个默认值。默认速度为每分钟 120 拍（bpm），默认分辨率为\
    \ 1/64。默认音量为 100（最大音量）。\n\n音调序列中还有其他可用功能。可以实现相当程度的控制：\n\n*   使用`TEMPO`常量设置速度，传入的速度值（以每分钟拍数为单位）需除以四。例如，`ToneControl.TEMPO,\
    \ 15`将速度设置为 60 bpm，即每秒一拍。此操作只能在序列开头（在`VERSION`之后）执行一次。\n\n*   可以使用`RESOLUTION`常量更改默认的\
    \ 1/64 分辨率。传入的参数是分母，例如，使用`ToneControl.RESOLUTION, 64`将恢复默认的 1/64 分辨率。此操作只能在序列开头（在`TEMPO`之后）执行一次。\n\
    \n*   可以定义可重用的音调*块*。要开始块定义，请使用`ToneControl.BLOCK_START`并提供块编号。然后提供该块中的音符和持续时间。要结束块定义，请使用`ToneControl.BLOCK_END`并提供相同的块编号。要实际播放一个块，请使用`ToneControl.PLAY_BLOCK`并提供要播放的块编号。块必须在序列中的`VERSION`、`TEMPO`和`RESOLUTION`之后定义。\n\
    \n*   可以在序列中的任何时刻设置音量，以实现戏剧性的动态效果。例如，`ToneControl.SET_VOLUME, 25`将音量设置为最大值的四分之一。\n\
    \n*   要表示特定时长的休止符，请使用特殊音符值`ToneControl.SILENCE`。\n\n*   可以多次重复单个音符。例如，`ToneControl.REPEAT,\
    \ 7, 60, 16`以持续时长 16 播放中央 C（60）7 次。\n"
- fmt: "\n`MIDlet`中的[清单12-4](#LiB0102.html#ch12list04)包含几个示例，可帮助你编写自己的音调序列。\n\n**清单12-4：单声道中的经典老歌**\n\
    \n```\nimport java.io.*;\n\nimport javax.microedition.io.*;\nimport javax.microedition.lcdui.*;\n\
    import javax.microedition.midlet.*;\nimport javax.microedition.media.*;\nimport\
    \ javax.microedition.media.control.*;\n\npublic class ToneMIDlet\n    extends\
    \ MIDlet\n    implements CommandListener {\n  private final static String kSoundOfMusic\
    \ = \"Sound of Music\";\n  private final static String kQuandoMenVo = \"Quando\
    \ men vo\";\n  private final static String kTwinkle = \"Twinkle number VII\";\n\
    \nprivate Display mDisplay;\n  private List mMainScreen;\n\npublic void startApp()\
    \ {\n    mDisplay = Display.getDisplay(this);\n\nif (mMainScreen == null) {\n\
    \      mMainScreen = new List(\"AudioMIDlet\", List.IMPLICIT);\n\nmMainScreen.append(kSoundOfMusic,\
    \ null);\n      mMainScreen.append(kQuandoMenVo, null);\n      mMainScreen.append(kTwinkle,\
    \ null);\n      mMainScreen.addCommand(new Command(\"Exit\", Command.EXIT, 0));\n\
    \      mMainScreen.addCommand(new Command(\"Play\", Command.SCREEN, 0));\n   \
    \   mMainScreen.setCommandListener(this);\n    }\n\nmDisplay.setCurrent(mMainScreen);\n\
    \  }\n\npublic void pauseApp() {}\n\npublic void destroyApp(boolean unconditional)\
    \ {}\n  public void commandAction(Command c, Displayable s) {\n    if (c.getCommandType()\
    \ == Command.EXIT) notifyDestroyed();\n    else run();\n  }\n\npublic void run()\
    \ {\n    String selection = mMainScreen.getString(\n        mMainScreen.getSelectedIndex());\n\
    \nbyte[] sequence = null;\n    if (selection.equals(kSoundOfMusic)) {\n      sequence\
    \ = new byte[] {\n        ToneControl.VERSION, 1,\n        67, 16, // The\n  \
    \      69, 16, // hills\n        67,  8, // are\n        65,  8, // a -\n    \
    \    64, 48, // live\n        62,  8, // with\n        60,  8, // the\n      \
    \  59, 16, // sound\n        57, 16, // of\n        59, 32, // mu -\n        59,\
    \ 32  // sic\n      };\n    }\n    else if (selection.equals(kQuandoMenVo)) {\n\
    \      sequence = new byte[] {\n        ToneControl.VERSION, 1,\n        ToneControl.TEMPO,\
    \ 22,\n        ToneControl.RESOLUTION, 96,\n        64, 48, ToneControl.SILENCE,\
    \ 8, 52, 4, 56, 4, 59, 4, 64, 4,\n        63, 48, ToneControl.SILENCE, 8, 52,\
    \ 4, 56, 4, 59, 4, 63, 4,\n        61, 72,\n        ToneControl.SILENCE, 12, 61,\
    \ 12,\n            63, 12, 66, 2, 64, 10, 63, 12, 61, 12,\n        64, 12, 57,\
    \ 12, 57, 48,\n        ToneControl.SILENCE, 12, 59, 12,\n            61, 12, 64,\
    \ 2, 63, 10, 61, 12, 59, 12,\n        63, 12, 56, 12, 56, 48,\n      };\n    }\n\
    \    else if (selection.equals(kTwinkle)) {\n      sequence = new byte[] {\n \
    \       ToneControl.VERSION, 1,\n        ToneControl.TEMPO, 22,\n        ToneControl.BLOCK_START,\
    \ 0,\n        60, 8,        62, 4, 64, 4, 65, 4, 67, 4, 69, 4, 71, 4,\n      \
    \  72, 4, 74, 4, 76, 4, 77, 4, 79, 4, 81, 4, 83, 4, 84, 4,\n        83, 4, 81,\
    \ 4, 80, 4, 81, 4, 86, 4, 84, 4, 83, 4, 81, 4,\n        81, 4, 79, 4, 78, 4, 79,\
    \ 4, 60, 4, 79, 4, 88, 4, 79, 4,\n        57, 4, 77, 4, 88, 4, 77, 4, 59, 4, 77,\
    \ 4, 86, 4, 77, 4,\n        56, 4, 76, 4, 86, 4, 76, 4, 57, 4, 76, 4, 84, 4, 76,\
    \ 4,\n        53, 4, 74, 4, 84, 4, 74, 4, 55, 4, 74, 4, 83, 4, 74, 4,\n      \
    \  84, 16, ToneControl.SILENCE, 16,\n        ToneControl.BLOCK_END, 0,\n     \
    \   ToneControl.BLOCK_START, 1,\n        79, 4, 84, 4, 88, 4, 86, 4, 84, 4, 83,\
    \ 4, 81, 4, 79, 4,\n        77, 4, 76, 4, 74, 4, 72, 4, 71, 4, 69, 4, 67, 4, 65,\
    \ 4,\n        64, 8,        76, 8,        77, 8,        78, 8,\n        79, 12,\
    \              76, 4, 74, 8, ToneControl.SILENCE, 8,\n        ToneControl.BLOCK_END,\
    \ 1,\n\nToneControl.SET_VOLUME, 100, ToneControl.PLAY_BLOCK, 0,\n        ToneControl.SET_VOLUME,\
    \ 50, ToneControl.PLAY_BLOCK, 0,\n        ToneControl.SET_VOLUME, 100, ToneControl.PLAY_BLOCK,\
    \ 1,\n        ToneControl.SET_VOLUME, 50, ToneControl.PLAY_BLOCK, 1,\n       \
    \ ToneControl.SET_VOLUME, 100, ToneControl.PLAY_BLOCK, 0,\n      };\n    }\n \
    \   try {\n      Player player = Manager.createPlayer(Manager.TONE_DEVICE_LOCATOR);\n\
    \      player.realize();\n      ToneControl tc = (ToneControl)player.getControl(\"\
    ToneControl\");\n      tc.setSequence(sequence);\n      player.start();\n    }\n\
    \    catch (Exception e) {\n      Alert a = new Alert(\"Exception\", e.toString(),\
    \ null, null);\n      a.setTimeout(Alert.FOREVER);\n      mDisplay.setCurrent(a,\
    \ mMainScreen);\n    }\n  }\n} \n```\n\n请记住，`Player`的`start()`方法不会阻塞。如果你愿意，可以在模拟器中同时启动所有三首歌曲。这是因为工具包模拟器使用复音设备来播放音调序列。在真实设备上，同时播放多个序列可能不可行。但你可以设置一个序列运行，假设它不会占用太多处理器时间，你的`MIDlet`就可以去执行其他任务，比如绘制游戏显示或连接到网络。\n\
    \n## 移动媒体API\n\nMIDP 2.0的音频支持是移动媒体API全部功能的一个子集。如果你使用的是J2ME无线工具包，其模拟器默认支持完整的MMAPI。这意味着你可以使用其他API，并且实现支持多种附加内容类型。\n\
    \n如果你想移除MMAPI支持，仅保留MIDP 2.0音频，请从KToolbar菜单中选择**编辑** → **首选项**，然后点击**API可用性**选项卡。如果你不希望使用**移动媒体API**，可以取消勾选它。\n\
    \n如果你使用的是工具包的MMAPI实现，可以在首选项窗口的**MMedia**选项卡中自定义支持的内容类型和媒体功能。\n\n有关MMAPI的更多信息，请参见[http://wireless.java.sun.com/apis/articles/mmapi_overview/](http://wireless.java.sun.com/apis/articles/mmapi_overview/)。\n\
    \n## 总结\n\n在本章中，你学习了如何在MIDP 2.0中播放音调和采样音频。MIDP 2.0包含了移动媒体API的一个子集——音频构建块。它基于知道如何渲染音频数据的`Player`和知道如何将音频数据传输到`Player`的隐式协议对象。除了对采样音频的可选和灵活支持外，ABB还包括音调序列播放器。你的`MIDlet`现在可以从音乐和采样音频的激动人心之处受益。\n\
    \n# 第13章：性能调优\n\n## 概述\n\nMIDP是一个小型平台。MIDP设备上的处理器可能比典型的桌面计算机处理器慢得多，可用内存也小得多。让你的应用程序快速且精简地运行非常重要。你需要节约使用内存，使应用程序运行速度足够快以便于使用，并对其进行结构化设计，使代码本身尽可能小。\n\
    \n本章描述了对你现有代码进行基准测试的简单方法。然后继续介绍各种优化方法，这些方法可以使你的代码运行得更快或使用更少的内存。常识会对你大有帮助，但本章致力于为你提供优化应用程序的基本技术。\n\
    \n重要的经验法则是：只在需要的地方进行优化。换句话说：如果没坏，就不要修。我建议你在编写应用程序的第一版时，应专注于代码的整洁性和可维护性。如果存在性能问题，请识别它们并开始优化。你不应该在编写代码时进行优化——这很可能导致代码难以阅读和维护。先编写，再测试，最后优化。"
  raw: "The MIDlet in [Listing 12-4](#LiB0102.html#ch12list04) contains several examples\
    \ that will help you write your own tone sequences.\n\nListing 12-4: Old Classics\
    \ in Monophonic Glory\n\n| **![Start example](_1.gif)** |\n\n```\nimport java.io.*;\n\
    \nimport javax.microedition.io.*;\nimport javax.microedition.lcdui.*;\nimport\
    \ javax.microedition.midlet.*;\nimport javax.microedition.media.*;\nimport javax.microedition.media.control.*;\n\
    \npublic class ToneMIDlet\n    extends MIDlet\n    implements CommandListener\
    \ {\n  private final static String kSoundOfMusic = \"Sound of Music\";\n  private\
    \ final static String kQuandoMenVo = \"Quando men vo\";\n  private final static\
    \ String kTwinkle = \"Twinkle number VII\";\n\nprivate Display mDisplay;\n  private\
    \ List mMainScreen;\n\npublic void startApp() {\n    mDisplay = Display.getDisplay(this);\n\
