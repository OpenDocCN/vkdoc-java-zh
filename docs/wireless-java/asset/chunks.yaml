  trans: '

    ### 连接有限设备配置


    CLDC 是我们感兴趣的配置，因为它涵盖了手机、寻呼机、PDA 以及其他尺寸类似的设备。CLDC 面向的是比 CDC 更小的设备。这个名称可能有点误导性；实际上，CLDC
    是为具有有限网络连接的小型设备设计的——"有限连接设备配置"或许更为准确。


    CLDC 专为 Java 平台可用内存为 160KB 到 512KB 的设备而设计。如果你曾见识过 J2SE 在桌面电脑上吞噬数十兆字节内存的场景，你就会理解
    J2ME 所面临的挑战。"有限连接"仅指一种间歇性且可能速度不快的网络连接。（例如，大多数移动电话的典型数据传输速率仅为 9.6Kbps。）考虑到屏幕尺寸小、内存有限以及网络连接速度慢，在
    CLDC 环境下设计的应用程序应非常谨慎地使用网络连接。


    CLDC 基于一个名为 KVM 的小型 JVM。其名称源于它是一个以千字节而非兆字节来衡量大小的 JVM。虽然 CLDC 是一份规范文档，但 KVM 指的是一套具体的软件。^([1])
    由于体积小，KVM 无法完成 J2SE 世界中 JVM 所能做的所有事情。


    *   不能在运行时添加本地方法。所有本地功能都内置于 KVM 中。

    *   KVM 仅包含标准字节码验证器的一个子集。这意味着验证类的任务被拆分给了 CLDC 设备和某种外部机制。这具有严重的安全隐患，我们稍后将讨论。


    你可以在 CLDC 主页 [`java.sun.com/products/cldc/`](http://java.sun.com/products/cldc/)
    找到更多信息。大多数已部署的设备实现的是 CLDC 1.0，但在撰写本文时，CLDC 1.1 已接近完成。CLDC 1.1 包含对 CLDC 1.0 的增强，包括对浮点数据类型的支持。


    ### 平台标准化


    鉴于配置、简表以及特别是可选 API 的繁多，你如何知道典型设备上可能提供哪些 API？Sun 对此问题的答案是 JSR 185 ([`jcp.org/jsr/detail/185.jsp`](http://jcp.org/jsr/detail/185.jsp))，其标题令人印象深刻，为*无线行业
    Java 技术*。该规范旨在标准化软件栈，为 J2ME 世界带来一致性。


    在下一代 J2ME 中，一个名为"构建块"的概念预计将取代配置和简表。一个*构建块*只是 J2SE API 的某个子集。例如，一个构建块可能由 J2SE 的
    java.io 包的一个子集创建。从概念上讲，一个构建块代表的信息块比一个配置更小。那么，简表将构建在一组构建块之上，而不是一个配置之上。


    构建块的定义是一个 JSR，此处简要描述：[`jcp.org/jsr/detail/68.jsp`](http://jcp.org/jsr/detail/68.jsp)。自
    2000 年 6 月创建以来，JSR 68 的进展极其缓慢。我建议你转而关注 JSR 185。


    ^([1])KVM 最初是 Sun 研究项目 Spotless 系统的一部分。参见 [`www.sun.com/research/spotless/`](http://www.sun.com/research/spotless/)。


    ## 简表


    简表分层位于配置之上（将来，或许位于构建块之上），为针对特定设备系列开发应用程序添加必要的 API 和规范。


    ### 当前简表


    在 Java 社区进程下，正在开发几种不同的简表。表 1-1（前面已展示）提供了概览。


    基础简表是针对能够支持丰富网络化 J2ME 环境的设备的规范。它不支持用户界面；其他简表可以分层位于基础简表之上，以添加用户界面支持和其他功能。


    分层位于基础简表之上的是个人基础简表和个人简表。CDC + 基础简表 + 个人基础简表 + 个人简表的组合被设计为 PersonalJava 应用程序运行时环境的下一代产品（参见
    [`java.sun.com/products/personaljava/`](http://java.sun.com/products/personaljava/)）。因此，个人简表的具体目标是向后兼容
    PersonalJava 的早期版本。


    PDA 简表 (PDAP) 构建在 CLDC 之上，专为掌上设备设计，这些设备至少拥有 512KB 的 ROM 和 RAM 总和（最大 16MB）。它介于移动信息设备简表
    (MIDP) 和个人简表之间。它包含一个基于 MIDlet 的应用程序模型，但使用 J2SE 抽象窗口工具包 (AWT) 的子集来实现图形用户界面。尽管 PDAP
    规范已接近完成，但据我所知，还没有硬件制造商宣布将实现 PDAP。目前，J2ME 世界在低端由 MIDP 覆盖，在高端则由个人简表覆盖。


    ### 移动信息设备简表


    本书的重点是移动信息设备简表 (MIDP)。根据规范，移动信息设备具有以下特征：


    *   128KB 的非易失性内存用于 MIDP 实现

    *   32KB 的易失性内存用于运行时堆

    *   8KB 的非易失性内存用于持久化数据

    *   至少 96 × 54 像素的屏幕

    *   一定的输入能力，可通过键盘、键盘或触摸屏实现

    *   双向网络连接，可能是间歇性的


    试着想象一下可能是 MIDP 设备的设备：移动电话和高级寻呼机完全符合要求，但入门级 PDA 也可能符合此描述。


    关于 MIDP 的更多信息，包括官方规范文档的链接，请访问 [`java.sun.com/products/midp/`](http://java.sun.com/products/midp/)。


    本书涵盖 MIDP 1.0 和 MIDP 2.0。MIDP 2.0 具有众多增强功能，包括对多媒体的支持、新的游戏用户界面 API、对 HTTPS 连接的支持以及其他特性。它完全向后兼容
    MIDP 1.0。我将在本书其余部分指出 MIDP 2.0 特有的功能。

    '
- fmt: '# Anatomy of MIDP Applications


    The APIs available to a MIDP application come from packages in both CLDC and MIDP,
    as shown in [Figure 1-2](#LiB0007.html#ch01fig02). Packages marked with a `+`
    are new in CLDC 1.1 and MIDP 2.0.


    [![Click To expand](fig25_01.jpg)](fig25_01_0.jpg)

    Figure 1-2: MIDP packages


    CLDC defines a core of APIs, mostly taken from the J2SE world. These include fundamental
    language classes in `java.lang`, stream classes from `java.io`, and simple collections
    from `java.util`. CLDC also specifies a generalized network API in `javax.microedition.io`.


    | Note | According to the MIDP 2.0 specification, MIDP 2.0 will most likely be
    paired with CLDC 1.1, although it is certainly possible for MIDP 2.0 to be implemented
    atop CLDC 1.0. The first implementations of MIDP 2.0 will be paired with CLDC
    1.0, as the MIDP 2.0 specification is further along in the Java Community Process
    than the CLDC 1.1 specification. |


    Optionally, device vendors may also supply Java APIs to access device-specific
    features. MIDP devices, then, will typically be able to run several different
    flavors of applications. [Figure 1-3](#LiB0007.html#ch01fig03) shows a map of
    the possibilities.


    [![Click To expand](fig26_01.jpg)](fig26_01_0.jpg)

    Figure 1-3: MIDP software components


    Each device implements some kind of operating system (OS). Native applications
    run directly on this layer and represent the world as it is today—many different
    kinds of devices, each with its own OS and native applications.


    Layered on top of the device OS is the CLDC (including the KVM) and the MIDP APIs.
    MIDP applications use only the CLDC and MIDP APIs. Device-specific Java applications
    may also use Java APIs supplied by the device vendor.


    ## Advantages of MIDP


    Given the spectrum of configurations and profiles, why is this book about MIDP?
    First, MIDP comes at a critical time, a time when MIDP devices, like mobile phones,
    are an exploding market. Simultaneously, MIDP devices are achieving the kind of
    processing power, memory consumption, and Internet connectivity that makes them
    an attractive platform for distributed applications. MIDP 1.0 is already deployed
    on millions of handsets all over the world, and MIDP 2.0 holds much promise for
    the future.


    Second, of course, MIDP is the first J2ME profile that is ready for prime time.
    If you read into the [next chapter](#LiB0012_split_000.html#57), you can write
    MIDP applications today.


    ### Portability


    The advantage of using Java over using other tools for small device application
    development is portability. You could write device applications with C or C++,
    but the result would be specific to a single platform. An application written
    using the MIDP APIs will be directly portable to any MIDP device.


    If you''ve been following Java''s development for any time, this should sound
    familiar. It''s the same "Write Once, Run Anywhere" (WORA) mantra that Sun''s
    been repeating since 1995. Unfortunately, WORA is a bit of a four-letter word
    for developers who struggled with cross-platform issues in JDK 1.0 and JDK 1.1
    (particularly the browser implementations). While Java''s cross-platform capabilities
    in Java 2 are generally successful, WORA still has the taint of an unfulfilled
    promise.


    Does MIDP deliver painless cross-platform functionality? Yes. There will always
    be platform-specific bugs in MIDP implementations, but I believe MIDP works as
    advertised because it is so much smaller than desktop Java. Less code means fewer
    bugs when porting to multiple platforms. Most of the cross-platform incompatibilities
    of JDK 1.0 and JDK 1.1 were caused by the nightmare of trying to fit disparate
    windowing systems into the AWT''s peer-based component architecture. MIDP has
    nothing approaching the complexity of AWT, which means there''s an excellent possibility
    that MIDP applications will seamlessly run on multiple platforms right out of
    the starting gate. Furthermore, while the JDK 1.0 test suite only included a few
    dozen tests, the MIDP compatibility test suite includes several thousand tests.


    ### Security


    A second compelling reason for using Java for small device development is security.
    Java is well known for its ability to safely run downloaded code like applets.
    This is a perfect fit—it''s easy to imagine nifty applications dynamically downloading
    to your mobile phone.


    But it''s not quite such a rosy picture. For one thing, the KVM used in the CLDC
    only implements a partial bytecode verifier, which means that part of the important
    task of bytecode verification is performed off the MIDP device.


    Second, the CLDC does not allow for application-defined classloaders. This means
    that any kind of dynamic application delivery is dependent on device-specific
    mechanisms. As you''ll see, application deployment is not specifically defined
    in the CLDC or MIDP.


    MIDP applications do offer one important security promise: they can never escape
    from the confines of the KVM. This means that, barring bugs, a MIDP application
    will never be able to write to device memory that doesn''t belong to the KVM.
    A MIDP application will never mess up another application on the same device or
    the device OS itself. ^([[2](#LiB0008.html#ftn.N53)]) This is the killer feature
    of MIDP. It allows manufacturers and carriers to open up application development
    to the world, more or less free from certification and verification programs,
    without the fear that rogue coders will write applications that crash phones.


    In MIDP 2.0, MIDlet suites can be cryptographically signed, then verified on the
    device, which gives users some security about executing downloaded code. A new
    permissions architecture also allows the user to deny untrusted code access to
    certain API features. For example, if you install a suspicious-looking MIDlet
    suite on your phone, you can prevent it from making network connections.


    ^([[2](#LiB0008.html#N53)])A MIDP application could conceivably launch a denial-of-service
    attack, (i.e., sucking up all the processor''s time or bringing the device OS
    to a standstill). It''s widely acknowledged that there''s not much defense against
    denial-of-service attacks. Applications and applets in J2SE suffer from the same
    vulnerability.


    ## MIDP Vendors


    Several large players have thrown their weight behind MIDP. A quick browse of
    the JSR page for MIDP exposes the most important companies.


    Two Asian companies led the charge to provide network services for Java-enabled
    mobile phones. In Korea, LG TeleCom deployed a service called `ez-i` in mid-2000.
    Later that same year, NTT DoCoMo deployed their wildly popular `i-mode`. The APIs
    developed for LG TeleCom (`KittyHawk`) and NTT DoCoMo (`i-Appli`) are similar
    to MIDP but were completed before the MIDP 1.0 specification.


    In the United States, Motorola was the first manufacturer to produce a MIDP telephone.
    The `i50sx` and `i85s` were released on April 2, 2001, with service provided by
    Nextel. Motorola has since expanded its offerings with a handful of new devices.


    Nokia has also made serious commitments to MIDP, and the expert group that created
    the MIDP specification includes an impressive list of manufacturers—Ericsson,
    Hitachi, Nokia, Sony, Symbian, and many more. You can go read the industry predictions
    if you wish—a gazillion MIDP phones sold in the next three years, and so on. It''s
    a safe bet that your MIDP application will have a large market. For a comprehensive
    listing of MIDP devices, visit [http://wireless.java.sun.com/device/](http://wireless.java.sun.com/device/).'
