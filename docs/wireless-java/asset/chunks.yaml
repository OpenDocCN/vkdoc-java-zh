  trans: "\n## TextBox，最简单的屏幕\n\n最简单的屏幕类型是 TextBox，您已经在实际操作中见识过它了。TextBox 允许用户输入字符串。请记住，在普通的\
    \ MIDP 设备上，文本输入是一个繁琐的过程。许多设备只有数字键盘，因此输入单个字符需要按一次、两次或三次按钮。一个好的 MIDlet 应尽量减少用户输入。\n\
    \n话虽如此，您的 MIDlet 可能仍需要某种输入——也许是邮政编码、短名称或某种密码。在这些情况下，您可能希望使用 TextBox。\n\n创建 TextBox\
    \ 需要指定四个参数：\n\n```\npublic TextBox(String title, String text, int maxSize, int\
    \ constraints)\n```\n\n`title` 用作屏幕标题，而 `text` 和 `maxSize` 决定了文本框的初始文本和最大大小。最后，`constraints`\
    \ 可用于限制用户的输入。使用 `TextField` 类中的常量来指定所需的输入类型：\n\n*   `ANY` 允许任何类型的输入。\n*   `NUMERIC`\
    \ 将输入限制为整数。\n*   `DECIMAL`（MIDP 2.0 新增）允许包含小数部分的数字。\n*   `PHONENUMBER` 要求输入电话号码。\n\
    *   `EMAILADDR` 输入必须是电子邮件地址。\n*   `URL` 输入必须是网址。\n\n如何强制执行这些约束取决于具体实现。工具包模拟器只是不允许无效输入；例如，一个\
    \ `NUMERIC` 类型的 TextBox 不允许您输入字母字符。\n\n上述约束可以与下面列出的标志组合使用。约束限制用户的行为，而标志则定义 TextBox\
    \ 的行为。除 `PASSWORD` 之外的所有标志都是 MIDP 2.0 新增的。\n\n*   `PASSWORD` 输入的字符不会显示；通常，它们会用星号表示。\n\
    *   `UNEDITABLE` 表示无法编辑的文本。\n*   `SENSITIVE` 用于标记实现不应存储的文本。某些输入方案会存储用户的输入，以便日后用于自动补全。此标志表示该文本是受限的，不应保存或缓存。\n\
    *   `NON_PREDICTIVE` 表示您期望用户输入任何文本预测输入方案可能无法猜到的文本。例如，如果您期望用户输入像 Z51002S 这样的订单号，您可以使用此标志来告知输入方案不必费心尝试预测输入。\n\
    *   `INITIAL_CAPS_WORD` 用于每个单词都应大写的输入。\n*   `INITIAL_CAPS_SENTENCE` 表示每个句子的首字符都应大写的输入。\n\
    \n如果您不希望 TextBox 执行任何验证，可以在构造函数中将 `ANY` 或其数值等效值 `0` 用于 `constraints` 参数。\n\n这些标志可以使用\
    \ OR 运算符与任何其他约束组合。例如，要创建一个将输入限制为电子邮件地址但隐藏输入数据的 TextBox，您可以这样做：\n\n```\nDisplayable\
    \ d = new TextBox(\"Email\", \"\", 64,\n        TextField.EMAILADDR | TextField.PASSWORD);\n\
    ```\n\n不过，仔细想想，`PASSWORD` 可能得不偿失。至少在桌面电脑上，密码字段的目的是防止路过您电脑屏幕的人看到您的秘密密码。您每输入一个字符，密码字段就会显示一个星号或其他符号。当您输入秘密密码时，屏幕上显示的只是一行星号。在手机和其他小型设备上，这就不那么令人担忧了，因为屏幕更小，而且比典型的桌面显示器更难看清。\n\
    \n此外，在小型设备上输入数据的困难意味着，如果您盲目输入，将很难正确输入密码。例如，手机通常需要您多次按键才能输入一个字母。在 Sun 的工具包模拟器上，按两次\
    \ '7' 键会输入字母 'Q'。在真实设备上，您必须通过以下按键序列来输入密码 \"gandalf\"：4, 2, 6, 6, 3, 2, 5, 5, 5,\
    \ 3, 3, 3。如果没有视觉反馈，输入密码时极容易出错。（“我按了 5 键两次还是三次？”）J2ME Wireless Toolkit 模拟器会显示当前字符，但之前输入的字符会显示为星号。好的密码通常混合大小写、数字，可能还有标点符号；这些字符很难正确输入。\n\
    \n在 MIDP 2.0 应用程序中，密码字段（无论是否使用 `PASSWORD` 标志）都应使用 `SENSITIVE` 标志进行保护，这样密码就不会出现在任何系统字典中，也不会在用户输入其他文本时意外弹出。\n\
    \nMIDP 2.0 在 TextBox 类中新增了一个方法，名为 `setInitialInputMode(String characterSubset)`。此方法用于向实现建议哪种输入模式最适合预期的文本。您只能建议输入模式，并且无法知道实现是否遵从了该请求。传递给该方法的字符串可以是\
    \ J2SE `java.lang.Character.UnicodeBlock` 类中的常量之一，并加上前缀 \"UCB_\"。例如，您可以向此方法传递\
    \ \"UCB_BASIC_LATIN\" 或 \"UCB_KATAKANA\"。您也可以使用 `java.awt.im.InputSubset` 定义的输入子集，并加上前缀\
    \ \"IS_\"。例如，\"IS_LATIN\" 或 \"IS_KANJI\" 都是有效的。最后，MIDP 2.0 还定义了字符子集 \"MIDP_UPPERCASE_LATIN\"\
    \ 和 \"MIDP_LOWERCASE_LATIN\"。\n\n输入模式是对文本约束和标志的补充。您可以为约束指定 `ANY`，然后调用 `setInitialInputMode(\"\
    MIDP_LOWERCASE_LATIN\")` 来请求实现以小写输入开始。这并不会阻止用户更改输入模式，只是让事情从一开始就走上正轨。\n"
- fmt: "# Using Alerts\n\nAn *alert* is an informative message shown to the user.\
    \ In the MIDP universe, there are two flavors of alert:\n\n- A *timed* alert is\
    \ shown for a certain amount of time, typically just a few seconds. It displays\
    \ an informative message that does not need to be acknowledged, like \"Your transaction\
    \ is complete,\" or \"I can't do that right now, Dave.\"\n- A *modal* alert stays\
    \ up until the user dismisses it. Modal alerts are useful when you need to offer\
    \ the user a choice of actions. You might display a message like \"Are you ready\
    \ to book these tickets?\" and offer **Yes** and **No** commands as options.\n\
    \nMIDP alerts can have an associated icon, like a stop sign or question mark.\
    \ Alerts may even have an associated sound, although this depends on the implementation.\
    \ MIDP alerts are very much the same concept as modal dialogs in windowing systems\
    \ like MacOS and Windows. [Figure 5-6](#LiB0042.html#ch05fig06) shows a typical\
    \ Alert.\n\n![](fig91_01.jpg)\nFigure 5-6: Alerts are similar to modal dialogs\
    \ in a desktop windowing system.\n\nAlerts are represented by instances of the\
    \ `javax.microedition.lcdui.Alert` class, which offers the following constructors:\n\
    \n```\npublic Alert()\npublic Alert(String title, String alertText, Image alertImage,\
    \ AlertType alertType)\n```\n\nAny or all of the parameters in the second constructor\
    \ may be `null`. (Don't worry about the `Image` class right now; I'll discuss\
    \ it in the [next chapter](#LiB0044_split_000.html#209) in the section on Lists.)\n\
    \nBy default, timed Alerts are created using a default timeout value; you can\
    \ find out the default value by calling `getDefaultTimeout()`. To change the Alert's\
    \ timeout, call `setTimeout()` with the timeout value in milliseconds. A special\
    \ value, `FOREVER`, may be used to indicate that the Alert is modal.\n\nYou could\
    \ create a simple timed Alert with the following code:\n\n```\nAlert alert = new\
    \ Alert(\"Sorry\", \"I'm sorry, Dave...\", null, null);\n```\n\nTo explicitly\
    \ set the timeout value to five seconds, you could do this:\n\n```\nalert.setTimeout(5000);\n\
    ```\n\nIf, instead, you wanted a modal alert, you would use the special value\
    \ `FOREVER`:\n\n```\nalert.setTimeout(Alert.FOREVER);\n```\n\nThe MIDP implementation\
    \ will automatically supply a way to dismiss a modal alert. Sun's reference implementation,\
    \ for example, provides a **Done** command mapped to a soft button. MIDP 2.0 exposes\
    \ this command as the static member `DISMISS_COMMAND`, allowing you to register\
    \ your own command listener and explicitly recognize this command. You can add\
    \ your own commands to an Alert using the usual `addCommand()` method. The first\
    \ time you call `addCommand()`, the system's dismiss command is removed.\n\nThe\
    \ default behavior for Alerts automatically advances to the next screen when the\
    \ Alert is dismissed or times out. You can specify the next screen by passing\
    \ it and the Alert to the two-argument `setCurrent()` method in `Display`. If\
    \ you call the regular one-argument `setCurrent()` method, the previous screen\
    \ is restored when the Alert is dismissed. Alert types serve as hints to the underlying\
    \ MIDP implementation. The implementation may use the alert type to decide what\
    \ kind of sound to play when the alert is shown. The `AlertType` class provides\
    \ five types, accessed as static member variables: `ALARM`, `CONFIRMATION`, `ERROR`,\
    \ `INFO`, and `WARNING`.\n\nMIDP 2.0 adds an indicator to an Alert. By default,\
    \ no indicator is present, but you can add one by passing a `Gauge` to Alert's\
    \ `setIndicator()` method. (`Gauge` is presented in the [next chapter](#LiB0044_split_000.html#209)\
    \ in the section on Forms.) The indicator is handy for showing progress in a network\
    \ connection or a long computation.\n\nThe following example, `TwoAlerts`, shows\
    \ both types of alert. It features a main `TextBox` that is displayed when the\
    \ MIDlet begins. Two commands, **Go** and **About**, provide access to the alerts.\
    \ The **Go** command shows a timed alert that contains a message about a fictitious\
    \ network error. The **About** command displays a modal alert that could contain\
    \ copyright information. A third command, **Exit**, provides a way to exit the\
    \ MIDlet. Keep in mind that all three commands may not fit on the screen; some\
    \ of them may be accessible from a secondary menu.\n\n```\nimport javax.microedition.midlet.*;\n\
    import javax.microedition.lcdui.*;\n\npublic class TwoAlerts\n    extends MIDlet\n\
    \    implements CommandListener {\n  private Display mDisplay;\n\n  private TextBox\
    \ mTextBox;\n  private Alert mTimedAlert;\n  private Alert mModalAlert;\n\n  private\
    \ Command mAboutCommand, mGoCommand, mExitCommand;\n\n  public TwoAlerts() {\n\
    \    mAboutCommand = new Command(\"About\", Command.SCREEN, 1);\n    mGoCommand\
    \ = new Command(\"Go\", Command.SCREEN, 1);\n    mExitCommand = new Command(\"\
    Exit\", Command.EXIT, 2);\n\n    mTextBox = new TextBox(\"TwoAlerts\", \"\", 32,\
    \ TextField.ANY);\n    mTextBox.addCommand(mAboutCommand);\n    mTextBox.addCommand(mGoCommand);\n\
    \    mTextBox.addCommand(mExitCommand);\n    mTextBox.setCommandListener(this);\n\
    \n    mTimedAlert = new Alert(\"Network error\",\n        \"A network error occurred.\
    \ Please try again.\",\n        null,\n        AlertType.INFO);\n    mModalAlert\
    \ = new Alert(\"About TwoAlerts\",\n          \"TwoAlerts is a simple MIDlet that\
    \ demonstrates the use of Alerts.\",\n          null,\n          AlertType.INFO);\n\
    \    mModalAlert.setTimeout(Alert.FOREVER);\n  }\n\n  public void startApp() {\n\
    \    mDisplay = Display.getDisplay(this);\n\n    mDisplay.setCurrent(mTextBox);\n\
    \  }\n\n  public void pauseApp() {\n  }\n\n  public void destroyApp(boolean unconditional)\
    \ {}\n\n  public void commandAction(Command c, Displayable s) {\n    if (c ==\
    \ mAboutCommand)\n      mDisplay.setCurrent(mModalAlert);\n    else if (c == mGoCommand)\n\
    \      mDisplay.setCurrent(mTimedAlert, mTextBox);\n    else if (c == mExitCommand)\n\
    \      notifyDestroyed();\n  }\n}\n```\n\n## Summary\n\nMIDP's main user-interface\
    \ classes are based on abstractions that can be adapted to devices that have different\
    \ display and input capabilities. Several varieties of prepackaged screen classes\
    \ make it easy to create a user interface. Screens have a title and an optional\
    \ ticker. Most importantly, screens can contain Commands, which the implementation\
    \ makes available to the user. Your application can respond to commands by acting\
    \ as a listener object. This chapter described `TextBox`, a screen for accepting\
    \ user input, and `Alert`, a simple screen for displaying information. In the\
    \ [next chapter](#LiB0044_split_000.html#209), we'll get into the more complex\
    \ `List` and `Form` classes.\n\n# Chapter 6: Lists and Forms\n\nIn the last chapter,\
    \ you learned about MIDP's simpler screen classes. Now we're getting into deeper\
    \ waters, with screens that show lists and screens with mixed types of controls.\n\
    \n## Using Lists\n\nAfter `TextBox` and `Alert`, the next simplest Screen is `List`,\
    \ which allows the user to select items (called *elements*) from a list of choices.\
    \ A text string or an image is used to represent each element in the list. `List`\
    \ supports the selection of a single element or of multiple elements.\n\nThere\
    \ are two main types of `List`, denoted by constants in the `Choice` interface:\n\
    \n- `MULTIPLE` designates a list where multiple elements may be selected simultaneously.\n\
    - `EXCLUSIVE` specifies a list where only one element may be selected. It is akin\
    \ to a group of radio buttons."
