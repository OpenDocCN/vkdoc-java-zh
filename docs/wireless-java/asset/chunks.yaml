- fmt: '### Telling Time


    J2SE has an impressive array of classes that can be used for specifying dates
    and times and translating to and from human-readable representations of dates
    and times. The J2SE time classes have four distinct responsibilities:


    - *Points in time* are represented by instances of `java.util.Date`. If you think
    of time as a line graph, then an instance of `Date` is just a point on the line.


    - *Calendars* are used for representing points in time with calendar fields like
    year, month, and day. If you''re using a Gregorian calendar, for example, then
    you can translate from a single point in time to a set of calendar values like
    month, day, and hours, minutes, and seconds. In J2SE, `java.util.Calendar` is
    a parent class for calendars, while the `java.util.GregorianCalendar` class represents
    the Gregorian calendar system that is familiar to most of the world.


    - *Formatting* classes translate between points in time and human-readable strings.
    In J2SE, `java.text.DateFormat` is the parent for classes that can both generate
    and parse human-readable strings representing points in time. Formatting classes
    are very likely to make use of a calendar. For example, a typical `DateFormat`
    implementation might use a `GregorianCalendar` to translate a point in time to
    a set of calendar values, which it would then format in a string.


    - *Time zone* classes represent the time zones of the world. The calendar and
    format classes use a time zone to create a localized representation of a particular
    point in time. In J2SE, `java.util.TimeZone` is the parent class of all time zones,
    with `java.util.SimpleTimeZone` as a concrete implementation.


    Understanding these classes and their interactions is a little tricky, and it''s
    complicated by the fact that the APIs changed considerably between JDK 1.0 and
    JDK 1.1. The `java.util.Date` class used to have extra functionality in it; although
    the methods are deprecated, they''re still present and may be confusing. Fortunately,
    you don''t have to deal with this in the CLDC/MIDP world.


    The situation is somewhat simpler in CLDC/MIDP. There are fewer classes, for one
    thing, and the `Date` class API has been cleaned up. In MIDP, the four responsibilities
    I just discussed are assigned to classes as follows:


    - *Points in time* are represented by instances of `java.util.Date`, just like
    before. The `Date` class, in essence, is just a wrapper for a `long` value that
    indicates the number of milliseconds since midnight on January 1, 1970. (This
    is a standard way of representing time. It will work for about another 290 million
    years, so don''t worry about another millennium bug.)


    - *Calendars* are still represented by instances of `java.util.Calendar`. However,
    the `GregorianCalendar` class is no longer part of the public API. To get a `Calendar`
    instance, you can use the `getInstance()` factory method. Chances are you won''t
    need to do this.


    - *Formatting* classes are hidden from view in MIDP. One of the user interface
    classes, `javax.microedition.lcdui.DateField`, can convert a `Date` to a human-readable
    display, eliminating the need for you to mess around with date formatters yourself.
    Essentially `DateField` is a graphic wrapper around a `Date` instance. It also
    allows the user to edit calendar and clock fields to produce a new `Date` value.
    See [Chapter 6](#LiB0044_split_000.html#209) for a full discussion of `DateField`.


    - *Time zones* are still represented by instances of `java.util.TimeZone`. `TimeZone`
    offers several static methods for examining the available time zones and getting
    an instance representing a particular time zone.


    ## Summary


    Developers are bombarded with information, and the best developers are the ones
    who can learn new material fast. Every once in a while, though, something you
    already know can be used again. This is one of those cases—something you already
    know about, the J2SE APIs, comes in very handy as you learn MIDP programming.
    MIDP''s `java.lang`, `java.io`, and `java.util` packages contain classes that
    look and act a lot like the corresponding classes in J2SE.


    # Chapter 5: Creating a User Interface


    ## Overview


    MIDP applications are built to run on many different devices without modification.
    This is particularly difficult in the area of the user interface because devices
    have screens of all sizes, in grayscale and in color. Furthermore, devices vary
    widely in their input capabilities, from numeric keypads to alphabetic keyboards,
    soft keys, and even touch screens. The minimum screen size mandated by MIDP is
    96 × 54 pixels, with at least one bit of color depth. ^([[1](#LiB0036_split_001.html#ftn.N21)])
    As for input, MIDP is fairly openended: devices are expected to have some type
    of keyboard, or a touch screen, or possibly both.


    Given the wide variety of devices that are compliant with MIDP, there are two
    ways to create applications that work well on all devices:


    - *Abstraction*: Specify a user interface in abstract terms, relying on the MIDP
    implementation to create something concrete. Instead of saying something like,
    "Display the word ''Next'' on the screen above the soft button," you say, "Give
    me a **Next** command somewhere in this interface."


    - *Discovery*: The application learns about the device at runtime and tailors
    the user interface programmatically. You might, for example, find out how big
    the device''s screen was in order to scale your user interface appropriately.


    The MIDP APIs support both methods. Abstraction is the preferred method because
    it involves less code in your application and more work by the MIDP implementation.
    In some cases, like games, you need to be more specific about the user interface;
    these types of applications will discover the capabilities of a device and attempt
    to tailor their behavior appropriately. MIDP''s user-interface APIs are designed
    so that it''s easy to mix the two techniques in the same application.


    ^([[1](#LiB0036_split_001.html#N21)])Color depth is the number of bits that determine
    the color of a pixel on the screen. One bit allows for two colors (usually black
    and white). Four bits allows for 16 colors, which could be different levels of
    gray or a palette of other colors.'
