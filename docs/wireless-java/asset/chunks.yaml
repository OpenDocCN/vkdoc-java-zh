- fmt: "# Wireless Java Developing with J2ME, Second Edition\n\nby Jonathan Knudsen\
    \  \nISBN: 1590590775  \nApress © 2003 (384 pages)\n\nThis edition is updated\
    \ to include coverage of the next version of programs for mobile Java devices.\
    \ `MIDP 2.0` contains many exciting new features, such as sound `HTTPS` support,\
    \ lots of user interface API enhancements, a `Game API`, and much more.\n\n##\
    \ Table of Contents\n\n- [Wireless Java Developing with J2ME, Second Edition](#LiB0001.html)\n\
    - [Preface](#LiB0002_split_000.html)\n- [Chapter 1 - Introduction](#LiB0004_split_000.html)\n\
    - [Chapter 2 - Building MIDlets](#LiB0012_split_000.html)\n- [Chapter 3 - All\
    \ About MIDlets](#LiB0024_split_000.html)\n- [Chapter 4 - Almost the Same Old\
    \ Stuff](#LiB0030_split_000.html)\n- [Chapter 5 - Creating a User Interface](#LiB0036_split_000.html)\n\
    - [Chapter 6 - Lists and Forms](#LiB0044_split_000.html)\n- [Chapter 7 - Custom\
    \ Items](#LiB0047_split_000.html)\n- [Chapter 8 - Persistent Storage](#LiB0054_split_000.html)\n\
    - [Chapter 9 - Connecting to the World](#LiB0063_split_000.html)\n- [Chapter 10\
    \ - Programming a Custom User Interface](#LiB0075_split_000.html)\n- [Chapter\
    \ 11 - The Game API](#LiB0085_split_000.html)\n- [Chapter 12 - Sound and Music](#LiB0095_split_000.html)\n\
    - [Chapter 13 - Performance Tuning](#LiB0105_split_000.html)\n- [Chapter 14 -\
    \ Parsing XML](#LiB0112_split_000.html)\n- [Chapter 15 - Protecting Network Data](#LiB0118_split_000.html)\n\
    - [Appendix A - MIDP API Reference](#LiB0125_split_000.html)\n- [Index](#LiB0138.html)\n\
    - [List of Figures](#LiB0165_split_000.html)\n- [List of Tables](#LiB0166_split_000.html)\n\
    - [List of Listings](#LiB0167_split_000.html)\n- [List of Sidebars](#LiB0168_split_000.html)\n\
    \n## Back Cover\n\nAlthough Java is incredibly popular, the standard edition of\
    \ Java is way too big and bulky to build applications for wireless devices such\
    \ as PDAs and phones. Thus, Sun has released Java 2 Platform, Micro Edition (`J2ME`).\
    \ `J2ME` has the potential to be as revolutionary in the wireless space as Java\
    \ has been in the server space.\n\n*Wireless Java: Developing with J2ME, Second\
    \ Edition* is updated to include coverage of the next version of programs for\
    \ mobile Java devices. `MIDP 2.0` contains many exciting new features, such as\
    \ sound `HTTPS` support, lots of user interface API enhancements, a `Game API`,\
    \ and much more. Also, author Jonathan Knudsen makes clear what material is new\
    \ so readers can still use the book for `MIDP 1.0`/`CLDC 1.0`.\n\n### About the\
    \ Author\n\nJonathan Knudsen is a Java developer and noted author of several books,\
    \ including *Wireless Java: Developing with Java 2, Micro Edition*, *Mobile Java*,\
    \ *The Unofficial Guide to LEGO MINDSTORMS Robots*, *Learning Java*, and *Java\
    \ 2D Graphics*. Jonathan began his object-oriented programming career in Objective-C\
    \ on the NeXT OS, soon thereafter suffering through a couple of purgatorial years\
    \ in Microsoft's Visual C++, before graduating to Java in 1996. He has written\
    \ extensively about Java and LEGO robots, including five books, a monthly online\
    \ column called \"Bite-Size Java,\" and articles for JavaWorld, EXE, NZZ Folio,\
    \ and the O'Reilly Network. Jonathan holds a degree in mechanical engineering\
    \ from Princeton University."
