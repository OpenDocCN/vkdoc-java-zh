    感谢 Apress 的所有同仁帮助完成本书。首先要感谢加里·康奈尔最初说服我撰写本书。格蕾丝·王是我的项目经理，这份工作我绝对做不来。她对我所有的拖延都非常宽容，与她共事非常愉快。我的文字编辑丽贝卡·莱德容忍了我格式上的怪癖，并极大地精简了本书。感谢迈克尔·袁出色的技术审校。


    如果我再考虑承担这样的项目，我的家人现在有权扇我耳光。感谢所有人——克里斯汀、达芙妮、卢克、安迪和埃琳娜——对我的包容。


    **关于作者**


    乔纳森·克努森是其他几本 Java 书籍的作者，包括《学习 Java》、《Java 2D 图形》和《Java 加密技术》。他还是《LEGO MINDSTORMS
    机器人非官方指南》的作者，但遗憾的是，他未能将这一成功转化为全职事业。乔纳森撰写了大量关于 Java 的文章，以及一些关于 LEGO 机器人的文章。他是四个孩子的父亲，喜欢骑自行车和弹钢琴。更多信息，请访问
    [`jonathanknudsen.com/`](http://jonathanknudsen.com/)。


    # 前言


    本书介绍如何使用 Java 技术为移动电话、寻呼机及其他小型设备编程。本书围绕移动信息设备配置文件（MIDP）展开，该配置文件是 Java 2 平台微型版（J2ME）的一部分。本书内容简洁而完整，不仅描述了
    MIDP 的全部内容，还深入探讨了 XML 和加密技术等多个高级主题。


    第二版涵盖了 MIDP 2.0，其中包含许多令人兴奋的增强功能。新增了三个全新章节，其余部分也经过了细致的更新。


    ## 读者对象


    你阅读本书，很可能是因为你对使用 Java 构建无线应用程序感到兴奋。本书面向已有 Java 编程经验的人士。至少，你应该理解 Java 编程语言和面向对象编程的基础知识。有些章节深入探讨的主题本身就可以写成整本书。如果你想快速了解某个特定主题，这些章节会提供推荐阅读材料。


    如果你不熟悉 Java，我建议你阅读一本入门书籍或参加一门课程。《学习 Java（第二版）》（O''Reilly 2002）对于已经熟悉其他语言（如 C 或
    C++）的程序员来说，是一本很好的 Java 入门书。

    '
- fmt: '## The Structure of this Book


    This book is organized into fifteen chapters and one appendix. There are basically
    three sections. The first two chapters are introductory material. Chapters 3 through
    12 provide complete coverage of the MIDP APIs. Chapters 13 through 15 cover advanced
    topics. The complete breakdown of chapters is listed here:


    * [Chapter 1](#LiB0004_split_000.html#24), "Introduction," provides context and
    motivation for the rest of the book. J2ME is explained in detail, gradually zooming
    in to MIDP.

    * [Chapter 2](#LiB0012_split_000.html#57), "Building MIDlets," is intended to
    be a teaser. It includes an example application that allows you to look up the
    definitions of words over the Internet using any MIDP device. Along the way you''ll
    learn a lot about developing applications for the MIDP platform.

    * [Chapter 3](#LiB0024_split_000.html#106), "All About MIDlets," goes into detail
    about the life cycle and packaging of MIDP applications. It includes new material
    on the MIDP 2.0 security architecture.

    * [Chapter 4](#LiB0030_split_000.html#134), "Almost the Same Old Stuff," describes
    the pieces of the MIDP API that will be familiar to Java programmers.

    * [Chapter 5](#LiB0036_split_000.html#174), "Creating a User Interface," is the
    first of a handful of chapters devoted to MIDP''s user-interface packages. It
    provides an overview of MIDP''s user-interface package and goes into detail about
    the simple visual components.

    * [Chapter 6](#LiB0044_split_000.html#209), "Lists and Forms," picks up where
    [Chapter 5](#LiB0036_split_000.html#174) left off, describing MIDP''s advanced
    user-interface components.

    * [Chapter 7](#LiB0047_split_000.html#275), "Custom Items," shows how to create
    your own form items in MIDP 2.0.

    * [Chapter 8](#LiB0054_split_000.html#307), "Persistent Storage," describes MIDP''s
    mechanism for storing data.

    * [Chapter 9](#LiB0063_split_000.html#351), "Connecting to the World," contains
    all the juicy details about how MIDP applications can send and receive data over
    the Internet.

    * [Chapter 10](#LiB0075_split_000.html#408), "Programming a Custom User Interface,"
    describes the low level API that can be used for specialized application user
    interfaces.

    * [Chapter 11](#LiB0085_split_000.html#471), "The Game API," describes MIDP 2.0''s
    new features for creating games, including sprites and tiled layers.

    * [Chapter 12](#LiB0095_split_000.html#523), "Sound and Music," is all about MIDP
    2.0''s new multimedia capabilities. You''ll learn how to produce simple tones
    as well as play sampled audio data.

    * [Chapter 13](#LiB0105_split_000.html#562), "Performance Tuning," describes techniques
    for coping with the limited resources that are available on small devices.

    * [Chapter 14](#LiB0112_split_000.html#599), "Parsing XML," examines the spectrum
    of small XML parsers that are currently available. It describes how to port parsers
    to MIDP and briefly discusses the usage involved with each parser.

    * [Chapter 15](#LiB0118_split_000.html#623), "Protecting Network Data," discusses
    how to protect valuable data on the insecure Internet. It includes two sample
    applications that demonstrate cryptographic techniques for protecting data.

    * Finally, an Appendix contains a complete API reference for the classes and interfaces
    that make up MIDP. The method signatures for the public API of each class and
    interface are listed for handy quick reference. In this second edition, the API
    reference is flagged to make it easy to see which methods are new in MIDP 2.0.


    # Chapter 1: Introduction


    Java™ 2 Platform, Micro Edition (J2ME) is the second revolution in Java''s short
    history. When Java was introduced in 1995, it looked like the future of computing
    was in *applets*, small programs that could be downloaded and run on demand. A
    slow Internet forced applets out of the mainstream. Java, as a platform, did not
    really take off until the advent of *servlets*, Java programs that run on a server
    (essentially a replacement for CGI). Java further expanded into the server side
    of things, eventually picking up the moniker of Java 2 Platform, Enterprise Edition
    (J2EE). This was the first revolution, the blitz of server-side Java.


    The second revolution is the explosion of small-device Java, and it''s happening
    now. The market for small devices is expanding rapidly, and Java is important
    for two reasons. First, developers can write code and have it run on dozens of
    small platforms, without change. Second, Java has important safety features for
    downloadable code.'
