    \    mQuatsch = new Sprite(quatschImage, 48, 48);\n    mQuatsch.setPosition(96\
    \ + (getWidth() - 48) / 2, 96);\n    mQuatsch.defineReferencePixel(24, 24);\n\
    \    setDirection(kLeft);\n    setState(kStanding);\n    mLayerManager.insert(mQuatsch,\
    \ 1);\n  }\n\npublic void start() {\n    mTrucking = true;\n    Thread t = new\
    \ Thread(this);\n    t.start();\n  }\n\npublic void run() {\n    int w = getWidth();\n\
    \    int h = getHeight();\n    Graphics g = getGraphics();\n    int frameCount\
