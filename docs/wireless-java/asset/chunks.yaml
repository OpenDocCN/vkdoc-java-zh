    \ \n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n## 编译 MIDlet\n\n编写 MIDlet 是交叉编译的一个例子，即在一个平台上编译代码，在另一个平台上运行。在本例中，你将在桌面计算机上使用\
    \ J2SE 编译 MIDlet。MIDlet 本身将在支持 MIDP 的手机、寻呼机或其他移动信息设备上运行。\n\n只要将源代码放在正确的目录中，J2ME\
    \ Wireless Toolkit 就会处理所有细节。\n\n1.  启动工具包，名为 KToolbar。\n\n2.  从工具栏中选择**新建项目...**来创建一个新项目。\n\
    \n3.  当 J2ME Wireless Toolkit 询问项目名称和 MIDlet 类名时，两者都使用 \"Jargoneer\"。\n\n4.  点击**确定**两次以关闭项目设置窗口。\n\
    \n图 2-1 显示了新建项目对话框。\n\n![点击展开](img/fig36_01_0.jpg)\n图 2-1：使用 J2ME Wireless Toolkit\
    \ 创建新项目\n\nJ2ME Wireless Toolkit 将项目表示为其 *apps* 目录的子目录。下图显示了创建新项目后 *Jargoneer*\
    \ 目录的内容。\n\n![](img/fig37_01.jpg)\n\n将源代码保存为 Jargoneer.java 并放在项目的 *src* 目录中。你可以直接点击\
    \ J2ME Wireless Toolkit 工具栏中的**构建**按钮来编译打开的项目。\n\n在后台，J2ME Wireless Toolkit 使用\
    \ J2SE 的编译器。通常，在编译 J2SE 源代码时，CLASSPATH 环境变量指向你的源代码需要了解的所有类。当你使用 javac 编译文件时，会包含一些隐式的\
    \ API，比如 java.lang 中的类。然而，对于 MIDlet，情况稍微复杂一些。假设你在 MIDlet 中使用了 java.lang.System\
    \ 类。你（或 J2ME Wireless Toolkit）如何让编译器知道你想使用这个类的 MIDP 版本，而不是 J2SE 版本？\n\n答案是使用命令行选项\
    \ -bootclasspath。这个选项允许你指向一个类路径，该路径描述了编译源代码所依据的基础 API。在我们的例子中，应该使用这个选项来指定 MIDP\
    \ 参考实现安装中的 *classes* 目录。如果你安装了 MIDP 参考实现，命令行如下所示：\n\n```\njavac -bootclasspath\
    \ \\midp\\classes Jargoneer.java\n```\n\n如果你将 MIDP 参考实现安装在不同的位置，则需要调整 *classes*\
    \ 的路径。\n"
- fmt: "# Preverifying Class Files\n\nNow comes an entirely new step in building your\
    \ program, preverifying. Because the memory on small devices is so scarce, MIDP\
    \ (actually, CLDC) specifies that bytecode verification be split into two pieces.\
    \ Somewhere off the device, a preverify step is performed. The device itself is\
    \ only required to do a lightweight second verification step before loading classes.\n\
    \nIf you are using the J2ME Wireless Toolkit, you don't have to worry about preverifying\
    \ class files and you may not even notice that it's happening when you click the\
    \ **Build** button. If you'd like to understand more about preverifying, read\
    \ the rest of this section. Otherwise you can just skip ahead.\n\nAs you may recall,\
    \ bytecode verification is one of the foundation stones of Java's runtime security\
    \ model. Before a classloader dynamically loads a class, the bytecode verifier\
    \ checks the class file to make sure it behaves well and won't do nasty things\
    \ to the JVM. Unfortunately, the code that implements the bytecode verifier is\
    \ bulky, too large to fit on a small device like a mobile phone. The CLDC dictates\
    \ a two-step bytecode verification:\n\n1. Off the device, class files are preverified.\
    \ Certain checks are performed, and the class file is massaged into a format that\
    \ the lightweight second-step verifier can easily handle.\n2. On the device, the\
    \ second step of verification is performed as classes are loaded. If a class file\
    \ has not been preverified, it is rejected.\n\nThe MIDP reference implementation\
    \ and the J2ME Wireless Toolkit contain a tool called `preverify` that performs\
    \ the first step.\n\nThe `preverify` tool takes, as input, a class file. It produces\
    \ a preverified class file. You need to specify a classpath so that the tool can\
    \ find the class you want to preverify as well as any referenced classes. Finally,\
    \ you can specify an output directory using the `-d` option. To overwrite an existing\
    \ class file with a preverified version, you could do something like this:\n\n\
    ```\npreverify -classpath .;\\ midp\\ classes -d . Jargoneer\n```\n\nIn this example,\
    \ the `-d` option tells `preverify` to write the preverified class file to the\
    \ current directory. Don't forget about inner classes, which must also be preverified.\n\
    \n|  | Note | Splitting bytecode verification into two pieces like this has important\
    \ security ramifications. Devices should only download code from trusted sources,\
    \ using a secure method because some bytecode verification is performed off the\
    \ device. (See [Chapter 3](#LiB0024_split_000.html#106) for more information on\
    \ MIDlet suite security.) An attacker could supply malicious code that appeared\
    \ to be preverified, even if it violated the rules of the full J2SE bytecode verifier.\
    \ To the MIDP second-step verifier, the code would look okay and it would be loaded\
    \ and run. |\n\n## Sun's J2ME Wireless Toolkit Emulators\n\nThe J2ME Wireless\
    \ Toolkit includes several different emulators that you can use to test your applications.\
    \ When you click the **Run** button in the J2ME Wireless Toolkit, your application\
    \ is launched in the currently selected emulator.\n\n### The Wireless Toolkit\
    \ Devices\n\nThe J2ME Wireless Toolkit 2.0 (in its beta 2 release) contains four\
    \ main device emulators:\n\n* `DefaultColorPhone` is a device with a 180 × 208-pixel\
    \ color screen. This is the device shown in [Figure 2-2](#LiB0017.html#ch02fig02)\
    \ and is used for most of the screen shots in the remainder of this book.\n\n\
    \  [![Click To expand](fig40_01.jpg)](fig40_01_0.jpg)\n  Figure 2-2: Buttons on\
    \ the J2ME Wireless Toolkit emulator\n\n* `DefaultGrayPhone` is the same as `DefaultColorPhone`\
    \ but has a grayscale screen.\n\n* `MediaControlSkin` looks like the default phone\
    \ emulator but its buttons are labeled with controls like a music player: a square\
    \ for stop, a triangle for play, volume control buttons, etc.\n\n* `QwertyDevice`\
    \ is a smartphone with a 640 × 240-color screen and a miniature qwerty keyboard.\n\
    \n### Running MIDlets\n\nIf you're using the J2ME Wireless Toolkit, you can simply\
    \ choose an emulator from the Device combo box and click the **Run** button to\
    \ fire up your application.\n\nSun's MIDP reference implementation includes an\
    \ emulator named `midp`. It emulates an imaginary MID, a mobile telephone with\
    \ some standard keys and a 182 × 210-pixel screen. The J2ME Wireless Toolkit includes\
    \ an almost identical emulator, as well as several others.\n\nOnce you've got\
    \ a preverified class file, you can use the `midp` emulator to run it. The emulator\
    \ is an application that runs under J2SE and acts just like a MIDP device. It\
    \ shows itself on your screen as a representative device, a generic mobile phone.\
    \ You can run your MIDlet by typing the following at the command line, assuming\
    \ you added `*\\midp\\bin*` to your PATH:\n\n```\nmidp Jargoneer\n```\n\nIf all\
    \ goes well, you'll see something like the window shown in [Figure 2-2](#LiB0017.html#ch02fig02).\
    \ Congratulations! You've just built and run your first MIDlet.\n\n### Using the\
    \ Emulator Controls\n\nThe J2ME Wireless Toolkit emulator appears as a generic\
    \ mobile phone, as shown in [Figure 2-2](#LiB0017.html#ch02fig02).\n\nSun's J2ME\
    \ Wireless Toolkit emulator exhibits several qualities that you are likely to\
    \ find in real devices:\n\n* The device has a small screen size and limited input\
    \ capabilities. (It's not as small as the J2ME Wireless Toolkit 1.0 emulators,\
    \ which included emulated devices with 96 × 128 and 96 × 54-pixel screens.)\n\
    * Two soft buttons are available. A soft button does not have a fixed function.\
    \ Generally, the function of the button at any given time is shown on the screen\
    \ near the button. In MIDlets, the soft buttons are used for commands.\n* Navigation\
    \ buttons are provided to allow the user to browse through lists or other sets\
    \ of choices.\n* A select button allows the user to make a choice after moving\
    \ to it with the navigation buttons. (Think \"Yes, that's my final answer.\")\n\
    \n## Tour of MIDP Features\n\nNow that you have run your first MIDlet, take a\
    \ moment to admire it. There are several salient features, even in such a small\
    \ example.\n\n### It's Java\n\nFirst of all, Jargoneer is written in the Java\
    \ language, the same language you'd use to code servlets, Enterprise JavaBeans,\
    \ or J2SE client applications. If you're already a J2SE developer, you'll be extremely\
    \ comfortable developing MIDlets.\n\nNot only is the Java language familiar, but\
    \ also many core APIs are very similar to J2SE. Notice, for example, that multithreading\
    \ in Jargoneer is just the same as it might be in any other Java code. The MIDlet\
    \ class `Jargoneer` implements `java.lang.Runnable`, and the technique for kicking\
    \ off a new thread is the same as it always was:\n\n```\nThread t = new Thread(this);\n\
    t.start();\n```\n\nSignificant parts of `java.lang` are essentially unchanged\
    \ from J2SE, as are parts of `java.io` and `java.util`. The code that reads the\
    \ result from the server in `lookUp()` is familiar stream handling, just like\
    \ what you might see in J2SE.\n\n### MIDlet Life Cycle\n\nJargoneer also demonstrates\
    \ the basic structure of MIDlets. Like all good MIDlets, it extends `javax.microedition.midlet.MIDlet`,\
    \ the base class for all MIDP applications. Special software on the device, called\
    \ the Java Application Manager (JAM), Application Management Software (AMS), or\
    \ MIDlet management software, controls the process of installing, running, and\
    \ removing MIDlets. When a user chooses to run your MIDlet, it is the JAM that\
    \ creates an instance of the MIDlet class and runs methods on it.\n\nThe sequence\
    \ of methods that will be called in your MIDlet subclass is defined by the MIDlet\
    \ life cycle. MIDlets, like applets and servlets, have a small set of well-defined\
    \ states. The JAM will call methods in the MIDlet to signify changes from one\
    \ state to another. You can see these methods in Jargoneer—`startApp()`, `pauseApp()`,\
    \ `destroyApp()`, and Jargoneer's constructor are all part of the MIDlet life\
    \ cycle."
  raw: "## Preverifying Class Files\n\nNow comes an entirely new step in building\
    \ your program, *preverifying*. Because the memory on small devices is so scarce,\
    \ MIDP (actually, CLDC) specifies that bytecode verification be split into two\
    \ pieces. Somewhere off the device, a preverify step is performed. The device\
    \ itself is only required to do a lightweight second verification step before\
    \ loading classes.\n\nIf you are using the J2ME Wireless Toolkit, you don't have\
    \ to worry about preverifying class files and you may not even notice that it's\
    \ happening when you click the **Build** button. If you'd like to understand more\
    \ about preverifying, read the rest of this section. Otherwise you can just skip\
    \ ahead.\n\nAs you may recall, bytecode verification is one of the foundation\
    \ stones of Java's runtime security model. Before a classloader dynamically loads\
    \ a class, the bytecode verifier checks the class file to make sure it behaves\
    \ well and won't do nasty things to the JVM. Unfortunately, the code that implements\
    \ the bytecode verifier is bulky, too large to fit on a small device like a mobile\
    \ phone. The CLDC dictates a two-step bytecode verification:\n\n1.  Off the device,\
    \ class files are preverified. Certain checks are performed, and the class file\
    \ is massaged into a format that the lightweight second-step verifier can easily\
    \ handle.\n\n2.  On the device, the second step of verification is performed as\
    \ classes are loaded. If a class file has not been preverified, it is rejected.\n\
    \nThe MIDP reference implementation and the J2ME Wireless Toolkit contain a tool\
    \ called preverify that performs the first step.\n\nThe preverify tools takes,\
    \ as input, a class file. It produces a preverified class file. You need to specify\
    \ a classpath so that the tool can find the class you want to preverify as well\
    \ as any referenced classes. Finally, you can specify an output directory using\
    \ the -d option. To overwrite an existing class file with a preverified version,\
    \ you could do something like this:\n\n```\npreverify -classpath .;\\ midp\\ classes\
    \ -d . Jargoneer\n```\n\nIn this example, the -d option tells preverify to write\
    \ the preverified class file to the current directory. Don't forget about inner\
    \ classes, which must also be preverified.\n\n|  | Note  | Splitting bytecode\
    \ verification into two pieces like this has important security ramifications.\
    \ Devices should only download code from trusted sources, using a secure method\
    \ because some bytecode verification is performed off the device. (See [Chapter\
    \ 3](#LiB0024_split_000.html#106) for more information on MIDlet suite security.)\
    \ An attacker could supply malicious code that appeared to be preverified, even\
    \ if it violated the rules of the full J2SE bytecode verifier. To the MIDP second-step\
    \ verifier, the code would look okay and it would be loaded and run. |\n\n## Sun's\
    \ J2ME Wireless Toolkit Emulators\n\nThe J2ME Wireless Toolkit includes several\
    \ different emulators that you can use to test your applications. When you click\
    \ the **Run** button in the J2ME Wireless Toolkit, your application is launched\
    \ in the currently selected emulator.\n\n### The Wireless Toolkit Devices\n\n\
    The J2ME Wireless Toolkit 2.0 (in its beta 2 release) contains four main device\
    \ emulators:\n\n*   DefaultColorPhone is a device with a 180 × 208-pixel color\
    \ screen. This is the device shown in [Figure 2-2](#LiB0017.html#ch02fig02) and\
    \ is used for most of the screen shots in the remainder of this book.\n\n    [![Click\
    \ To expand](fig40_01.jpg)](fig40_01_0.jpg)\n    Figure 2-2: Buttons on the J2ME\
    \ Wireless Toolkit emulator\n\n*   DefaultGrayPhone is the same as DefaultColorPhone\
    \ but has a grayscale screen.\n\n*   MediaControlSkin looks like the default phone\
    \ emulator but its buttons are labeled with controls like a music player: a square\
    \ for stop, a triangle for play, volume control buttons, etc.\n\n*   QwertyDevice\
    \ is a smartphone with a 640 × 240-color screen and a miniature qwerty keyboard.\n\
    \n### Running MIDlets\n\nIf you're using the J2ME Wireless Toolkit, you can simply\
    \ choose an emulator from the Device combo box and click the **Run** button to\
    \ fire up your application.\n\nSun's MIDP reference implementation includes an\
    \ emulator named midp. It emulates an imaginary MID, a mobile telephone with some\
    \ standard keys and a 182 × 210-pixel screen. The J2ME Wireless Toolkit includes\
    \ an almost identical emulator, as well as several others.\n\nOnce you've got\
    \ a preverified class file, you can use the midp emulator to run it. The emulator\
    \ is an application that runs under J2SE and acts just like a MIDP device. It\
    \ shows itself on your screen as a representative device, a generic mobile phone.\
    \ You can run your MIDlet by typing the following at the command line, assuming\
    \ you added *\\midp\\bin* to your PATH:\n\n```\nmidp Jargoneer \n```\n\nIf all\
    \ goes well, you'll see something like the window shown in [Figure 2-2](#LiB0017.html#ch02fig02).\
    \ Congratulations! You've just built and run your first MIDlet.\n\n### Using the\
    \ Emulator Controls\n\nThe J2ME Wireless Toolkit emulator appears as a generic\
    \ mobile phone, as shown in [Figure 2-2](#LiB0017.html#ch02fig02).\n\nSun's J2ME\
    \ Wireless Toolkit emulator exhibits several qualities that you are likely to\
    \ find in real devices:\n\n*   The device has a small screen size and limited\
    \ input capabilities. (It's not as small as the J2ME Wireless Toolkit 1.0 emulators,\
    \ which included emulated devices with 96 × 128 and 96 × 54-pixel screens.)\n\n\
    *   Two *soft buttons* are available. A soft button does not have a fixed function.\
    \ Generally, the function of the button at any given time is shown on the screen\
    \ near the button. In MIDlets, the soft buttons are used for commands.\n\n*  \
    \ *Navigation buttons* are provided to allow the user to browse through lists\
    \ or other sets of choices.\n\n*   A *select button* allows the user to make a\
    \ choice after moving to it with the navigation buttons. (Think \"Yes, that's\
    \ my final answer.\")\n\n## Tour of MIDP Features\n\nNow that you have run your\
    \ first MIDlet, take a moment to admire it. There are several salient features,\
    \ even in such a small example.\n\n### It's Java\n\nFirst of all, Jargoneer is\
    \ written in the Java language, the same language you'd use to code servlets,\
    \ Enterprise JavaBeans, or J2SE client applications. If you're already a J2SE\
    \ developer, you'll be extremely comfortable developing MIDlets.\n\nNot only is\
    \ the Java language familiar, but also many core APIs are very similar to J2SE.\
    \ Notice, for example, that multithreading in Jargoneer is just the same as it\
    \ might be in any other Java code. The MIDlet class Jargoneer implements java.lang.Runnable,\
    \ and the technique for kicking off a new thread is the same as it always was:\n\
    \n```\n Thread t = new Thread(this);\n       t.start();\n```\n\nSignificant parts\
    \ of java.lang are essentially unchanged from J2SE, as are parts of java.io and\
    \ java.util. The code that reads the result from the server in lookUp() is familiar\
    \ stream handling, just like what you might see in J2SE.\n\n### MIDlet Life Cycle\n\
    \nJargoneer also demonstrates the basic structure of MIDlets. Like all good MIDlets,\
    \ it extends javax.microedition.midlet.MIDlet, the base class for all MIDP applications.\
    \ Special software on the device, called the Java Application Manager (JAM), Application\
    \ Management Software (AMS), or MIDlet management software, controls the process\
    \ of installing, running, and removing MIDlets. When a user chooses to run your\
    \ MIDlet, it is the JAM that creates an instance of the MIDlet class and runs\
    \ methods on it.\n\nThe sequence of methods that will be called in your MIDlet\
    \ subclass is defined by the MIDlet life cycle. MIDlets, like applets and servlets,\
    \ have a small set of well-defined states. The JAM will call methods in the MIDlet\
    \ to signify changes from one state to another. You can see these methods in Jargoneer—startApp(),\
    \ pauseApp(), destroyApp(), and Jargoneer's constructor are all part of the MIDlet\
    \ life cycle."
  trans: "\n## 预验证类文件\n\n现在，构建程序时出现了一个全新的步骤：*预验证*。由于小型设备上的内存非常稀缺，MIDP（实际上是 CLDC）规定将字节码验证分为两部分。在设备之外的某个地方，执行预验证步骤。设备本身只需在加载类之前执行一个轻量级的二次验证步骤。\n\
    \n如果你使用的是 J2ME Wireless Toolkit，则无需担心预验证类文件的问题，甚至可能不会注意到点击**构建**按钮时正在发生此过程。如果你想进一步了解预验证，请阅读本节的其余部分。否则，你可以直接跳过。\n\
    \n你可能还记得，字节码验证是 Java 运行时安全模型的基石之一。在类加载器动态加载类之前，字节码验证器会检查类文件，以确保其行为良好，不会对 JVM 造成不良影响。不幸的是，实现字节码验证器的代码体积庞大，无法容纳在手机这样的小型设备上。CLDC\
    \ 规定了分两步进行的字节码验证：\n\n1.  在设备之外，对类文件进行预验证。执行某些检查，并将类文件转换为轻量级二次验证器易于处理的格式。\n\n2.\
    \  在设备上，加载类时执行第二步验证。如果类文件未经预验证，则会被拒绝。\n\nMIDP 参考实现和 J2ME Wireless Toolkit 包含一个名为\
    \ preverify 的工具，用于执行第一步。\n\npreverify 工具接收一个类文件作为输入，并生成一个预验证后的类文件。你需要指定一个类路径，以便该工具能够找到你想要预验证的类以及任何被引用的类。最后，你可以使用\
    \ `-d` 选项指定输出目录。要用预验证版本覆盖现有的类文件，可以执行如下操作：\n\n```\npreverify -classpath .;\\ midp\\\
    \ classes -d . Jargoneer\n```\n\n在此示例中，`-d` 选项告诉 preverify 将预验证后的类文件写入当前目录。不要忘记内部类，它们也必须进行预验证。\n\
    \n|  | 注意 | 像这样将字节码验证分成两部分具有重要的安全意义。设备应仅使用安全的方法从可信来源下载代码，因为部分字节码验证是在设备之外执行的。（有关\
    \ MIDlet 套件安全性的更多信息，请参见第 3 章。）攻击者可能会提供看似已预验证的恶意代码，即使它违反了完整 J2SE 字节码验证器的规则。对于 MIDP\
    \ 第二步验证器来说，该代码看起来是正常的，因此会被加载并运行。 |\n\n## Sun 的 J2ME Wireless Toolkit 模拟器\n\nJ2ME\
    \ Wireless Toolkit 包含多个不同的模拟器，你可以使用它们来测试你的应用程序。当你在 J2ME Wireless Toolkit 中点击**运行**按钮时，你的应用程序会在当前选定的模拟器中启动。\n\
    \n### Wireless Toolkit 设备\n\nJ2ME Wireless Toolkit 2.0（其 beta 2 版本）包含四个主要的设备模拟器：\n\
    \n*   DefaultColorPhone 是一款配备 180 × 208 像素彩色屏幕的设备。此设备如图 2-2 所示，本书其余部分的大部分屏幕截图均使用此设备。\n\
    \n    ![点击展开](img/fig40_01_0.jpg)\n    图 2-2：J2ME Wireless Toolkit 模拟器上的按钮\n\n\
    *   DefaultGrayPhone 与 DefaultColorPhone 相同，但配备的是灰度屏幕。\n\n*   MediaControlSkin\
    \ 看起来像默认的手机模拟器，但其按钮标有类似音乐播放器的控制图标：方形代表停止，三角形代表播放，音量控制按钮等。\n\n*   QwertyDevice\
    \ 是一款配备 640 × 240 彩色屏幕和微型 qwerty 键盘的智能手机。\n\n### 运行 MIDlet\n\n如果你使用的是 J2ME Wireless\
    \ Toolkit，只需从“设备”组合框中选择一个模拟器，然后点击**运行**按钮即可启动你的应用程序。\n\nSun 的 MIDP 参考实现包含一个名为\
    \ midp 的模拟器。它模拟一个虚构的 MID，即一部带有一些标准按键和 182 × 210 像素屏幕的移动电话。J2ME Wireless Toolkit\
    \ 包含一个几乎相同的模拟器，以及其他几个模拟器。\n\n一旦你有了预验证后的类文件，就可以使用 midp 模拟器来运行它。该模拟器是一个在 J2SE 下运行的应用程序，其行为就像一个\
    \ MIDP 设备。它在你的屏幕上显示为一个代表性的设备，即一部通用的移动电话。假设你已经将 *\\midp\\bin* 添加到了 PATH 中，你可以通过在命令行输入以下内容来运行你的\
    \ MIDlet：\n\n```\nmidp Jargoneer \n```\n\n如果一切顺利，你将看到类似图 2-2 所示的窗口。恭喜！你已经成功构建并运行了你的第一个\
    \ MIDlet。\n\n### 使用模拟器控件\n\nJ2ME Wireless Toolkit 模拟器显示为一款通用的移动电话，如图 2-2 所示。\n\
    \nSun 的 J2ME Wireless Toolkit 模拟器展现出你在真实设备上可能发现的几个特性：\n\n*   该设备屏幕尺寸小，输入能力有限。（它不像\
    \ J2ME Wireless Toolkit 1.0 的模拟器那么小，后者包含屏幕为 96 × 128 和 96 × 54 像素的模拟设备。）\n\n*\
    \   提供两个*软按钮*。软按钮没有固定功能。通常，按钮在任意时刻的功能会显示在屏幕靠近按钮的位置。在 MIDlet 中，软按钮用于执行命令。\n\n*\
    \   提供*导航按钮*，允许用户浏览列表或其他选项集。\n\n*   提供一个*选择按钮*，允许用户在使用导航按钮移动到某个选项后做出选择。（可以理解为“是的，这是我的最终答案。”）\n\
    \n## MIDP 功能概览\n\n既然你已经运行了第一个 MIDlet，请花点时间欣赏一下它。即使是这样一个小例子，也有几个显著的特点。\n\n### 它是\
    \ Java\n\n首先，Jargoneer 是用 Java 语言编写的，与你用来编写 Servlet、Enterprise JavaBeans 或 J2SE\
    \ 客户端应用程序的语言相同。如果你已经是 J2SE 开发者，那么开发 MIDlet 会让你感到非常得心应手。\n\n不仅 Java 语言本身很熟悉，而且许多核心\
    \ API 也与 J2SE 非常相似。例如，请注意 Jargoneer 中的多线程与任何其他 Java 代码中的多线程完全相同。MIDlet 类 Jargoneer\
    \ 实现了 java.lang.Runnable，启动新线程的技术也与以往相同：\n\n```\n Thread t = new Thread(this);\n\
    \       t.start();\n```\n\njava.lang 的重要部分与 J2SE 基本保持不变，java.io 和 java.util 的部分也是如此。在\
    \ lookUp() 中从服务器读取结果的代码是熟悉的流处理方式，就像你在 J2SE 中可能看到的那样。\n\n### MIDlet 生命周期\n\nJargoneer\
    \ 也展示了 MIDlet 的基本结构。像所有优秀的 MIDlet 一样，它扩展了 javax.microedition.midlet.MIDlet，这是所有\
    \ MIDP 应用程序的基类。设备上称为 Java 应用程序管理器 (JAM)、应用程序管理软件 (AMS) 或 MIDlet 管理软件的特殊软件，控制着安装、运行和删除\
    \ MIDlet 的过程。当用户选择运行你的 MIDlet 时，正是 JAM 创建了 MIDlet 类的实例并对其调用方法。\n\n将在你的 MIDlet\
    \ 子类中调用的方法序列由 MIDlet 生命周期定义。MIDlet 与 Applet 和 Servlet 一样，具有一组定义明确的状态。JAM 将调用 MIDlet\
    \ 中的方法来指示状态之间的转换。你可以在 Jargoneer 中看到这些方法——startApp()、pauseApp()、destroyApp() 以及\
    \ Jargoneer 的构造函数都是 MIDlet 生命周期的一部分。\n"
- fmt: '### Generalized User Interface


    Jargoneer''s user-interface code may take you by surprise. Later on, I''ll spend
    several chapters on user interface. For now, the important thing to notice is
    how Jargoneer''s user interface is flexible enough to run on devices with different
    screen sizes and different input capabilities. A big part of MIDP''s appeal, after
    all, is the concept of writing one set of source code that runs on multiple devices.


    One example of MIDP''s generalized user interface is the `TextBox` that is initially
    shown when Jargoneer is launched. [Figure 2-3](#LiB0018.html#ch02fig03) shows
    this `TextBox`.


    ![](fig42_01.jpg)

    Figure 2-3: *Jargoneer*''s *TextBox*


    `TextBox` is a text input field. It has a title and an area for entering text.
    It has a simple design and can easily be shown on screens of different sizes.
    Even more interesting are the commands that appear at the bottom of the `TextBox`.
    These are `Exit` and `Find`. The code that creates the `TextBox` and its commands
    is in Jargoneer''s constructor:


    ```

    mExitCommand = new Command("Exit", Command.EXIT, 0);

    mFindCommand = new Command("Find", Command.SCREEN, 0);

    // ...

    mSubmitBox = new TextBox("Jargoneer", "", 32, 0);

    mSubmitBox.addCommand(mExitCommand);

    mSubmitBox.addCommand(mFindCommand);

    mSubmitBox.setCommandListener(this);

    ```


    Notice how the commands are created. You specify only a label and a type, and
    you register an event listener to find out when the commands are invoked. This
    is purposely vague—it leaves the implementation considerable latitude in deciding
    how commands should be displayed and invoked. In Sun''s J2ME Wireless Toolkit
    emulator, for example, `TextBox` shows its commands at the bottom of the screen
    and allows the user to invoke them using soft buttons. Another device might put
    both commands in a menu and allow the user to invoke them using a selector wheel
    or some other mechanism.


    ### The Likelihood of Server-Side Components


    The Jargoneer example connects to a Web server, sends a request, and receives
    a response. The Web server is actually an intermediary—it connects to the real
    Jargon File server, makes a request, parses the result, and sends the stripped-down
    definition back to the MIDP device.


    In the first edition of this book, Jargoneer connected directly to the Jargon
    File server. In response to its query, it received a lot of information it didn''t
    need. The original Jargoneer went to considerable trouble to parse through the
    HTML response to extract the definition it wanted. Architecturally, the old Jargoneer
    looked like [Figure 2-4](#LiB0018.html#ch02fig04).


    [![Click To expand](fig44_01.jpg)](fig44_01_0.jpg)

    Figure 2-4: *Jargoneer* architecture


    The new architecture is shown in [Figure 2-5](#LiB0018.html#ch02fig05).


    [![Click To expand](fig44_02.jpg)](fig44_02_0.jpg)

    Figure 2-5: A cleaner architecture for *Jargoneer*


    Instead of hitting the web server directly, Jargoneer goes through a different
    server hosted by Apress. This server queries the Jargon File, parses the result,
    and returns the definition to the device. This is advantageous from several stand-points:


    - Bandwidth is expensive in terms of both time and money. Today''s wireless networks
    are relatively slow, so less data passing through the air means less waiting time
    for your users. Also, wireless service tends to be pricey, so less data passing
    through the air means smaller bills for your users.

    - Small devices have limited memory and processing power. It is unwise to spend
    these limited resources on tasks like parsing HTML. In general, you will be able
    to place most of the processing burden of your application on a server component,
    making your client MIDlet''s life very easy.

    - In this particular application, the HTML parsing is not very stable. Suppose
    the server we are using decides to return its Jargon File definitions in a different
    format; if four million users are running Jargoneer, then four million copies
    of our code have just broken. Performing this task on a server gives it a single
    point of failure and a single point of update. If we fix the parsing code on the
    server, the interface between the server and the client devices can remain unchanged.
    This makes it easy to upgrade or fix Jargoneer.


    Network MIDP applications are likely to need a server component. If you''re planning
    to do much MIDP development, you might like to study up on Java servlets.


    ## Packaging Your Application


    You won''t pass class files directly to a MIDP to deploy an application. Instead,
    you''ll package them in a Java Archive (JAR) using the `jar` tool that comes with
    the Java 2 SDK.


    If you''re using the J2ME Wireless Toolkit, you won''t ever have to perform these
    steps manually; the toolkit automatically packages your MIDlets when you choose
    **Project** Ø **Package** Ø **Create Package** from the menu. (You don''t have
    to do this if you just want to test your application in the emulator, but you
    need to create a package if you''re going to distribute the MIDlet suite.) Even
    if you use the J2ME Wireless Toolkit, you might want to read through this section
    so that you understand exactly what''s going on.


    If you''re using the MIDP reference implementation, you should follow these steps
    to package your MIDlets. I''ll only sketch the steps here; in the [next chapter](#LiB0024_split_000.html#106)
    you''ll learn all the gory details of MIDlets and MIDlet suites.


    ### Manifest Information


    Every JAR includes a manifest file, `META-INF\MANIFEST.MF`, that describes the
    contents of the archive. For MIDlet JARs, the manifest file should contain extra
    information. The extra information is stuff that''s important to the MIDP runtime
    environment, like the MIDlet''s class name and the versions of CLDC and MIDP that
    the MIDlet expects.


    You can specify extra manifest information in a simple text file and tell the
    `jar` utility to include that information in the manifest when the JAR is created.
    To package Jargoneer, for example, save the following text in a file named `extra.mf`:


    ```

    MIDlet-1: Jargoneer, , Jargoneer

    MIDlet-Name: Jargoneer

    MIDlet-Vendor: Jonathan Knudsen

    MIDlet-Version: 1.0

    MicroEdition-Configuration: CLDC-1.0

    MicroEdition-Profile: MIDP-1.0

    ```


    Now assemble the MIDlet classes and the extra manifest information into a JAR
    with the following command:


    ```

    jar cvmf extra.mf Jargoneer.jar Jargoneer.class

    ```


    With the J2ME Wireless Toolkit, the toolkit automatically assembles your application
    into a MIDlet suite JAR when you press the **Build** button. It''s very convenient,
    and it saves you from the effort of learning the `jar` tool.


    ### Creating a MIDlet Descriptor


    One additional file is needed before your MIDlet is ready to go out the door.
    An *application descriptor* file must be created. This file contains a lot of
    the same information that''s in the MIDlet JAR manifest file. However, it lives
    outside the JAR and enables application management software to learn about a MIDlet
    JAR without installing it.


    The application descriptor is a text file with a `.jad` extension. Type in the
    following and save it as `Jargoneer.jad`:


    ```

    MIDlet-1: Jargoneer, , Jargoneer

    MIDlet-Jar-Size: 3853

    MIDlet-Jar-URL: Jargoneer.jar

    MIDlet-Name: Jargoneer

    MIDlet-Vendor: Jonathan Knudsen

    MIDlet-Version: 1.0

    ```


    If your MIDlet suite JAR is a different size, enter the actual size for the `MIDlet-Jar-Size`
    entry. The MIDlet descriptor is automatically generated when you press the **Build**
    button in the J2ME Wireless Toolkit. If you''re using the J2ME Wireless Toolkit,
    you won''t need to create the application descriptor yourself.'
  raw: "### Generalized User Interface\n\nJargoneer's user-interface code may take\
    \ you by surprise. Later on, I'll spend several chapters on user interface. For\
    \ now, the important thing to notice is how Jargoneer's user interface is flexible\
    \ enough to run on devices with different screen sizes and different input capabilities.\
    \ A big part of MIDP's appeal, after all, is the concept of writing one set of\
    \ source code that runs on multiple devices.\n\nOne example of MIDP's generalized\
    \ user interface is the TextBox that is initially shown when Jargoneer is launched.\
    \ [Figure 2-3](#LiB0018.html#ch02fig03) shows this TextBox.\n\n![](fig42_01.jpg)\n\
    Figure 2-3: *Jargoneer*'s *TextBox*\n\nTextBox is a text input field. It has a\
    \ title and an area for entering text. It has a simple design and can easily be\
    \ shown on screens of different sizes. Even more interesting are the commands\
    \ that appear at the bottom of the TextBox. These are Exit and Find. The code\
    \ that creates the TextBox and its commands is in Jargoneer's constructor:\n\n\
    ```\n mExitCommand = new Command(\"Exit\", Command.EXIT, 0);\n    mFindCommand\
    \ = new Command(\"Find\", Command.SCREEN, 0);\n    // ...\n    mSubmitBox = new\
    \ TextBox(\"Jargoneer\", \"\", 32, 0);\n    mSubmitBox.addCommand(mExitCommand);\n\
    \    mSubmitBox.addCommand(mFindCommand);\n    mSubmitBox.setCommandListener(this);\n\
    ```\n\nNotice how the commands are created. You specify only a label and a type,\
    \ and you register an event listener to find out when the commands are invoked.\
    \ This is purposely vague—it leaves the implementation considerable latitude in\
    \ deciding how commands should be displayed and invoked. In Sun's J2ME Wireless\
    \ Toolkit emulator, for example, TextBox shows its commands at the bottom of the\
    \ screen and allows the user to invoke them using soft buttons. Another device\
    \ might put both commands in a menu and allow the user to invoke them using a\
    \ selector wheel or some other mechanism.\n\n### The Likelihood of Server-Side\
    \ Components\n\nThe Jargoneer example connects to a Web server, sends a request,\
    \ and receives a response. The Web server is actually an intermediary—it connects\
    \ to the real Jargon File server, makes a request, parses the result, and sends\
    \ the stripped-down definition back to the MIDP device.\n\nIn the first edition\
    \ of this book, Jargoneer connected directly to the Jargon File server. In response\
    \ to its query, it received a lot of information it didn't need. The original\
    \ Jargoneer went to considerable trouble to parse through the HTML response to\
    \ extract the definition it wanted. Architecturally, the old Jargoneer looked\
    \ like [Figure 2-4](#LiB0018.html#ch02fig04).\n\n[![Click To expand](fig44_01.jpg)](fig44_01_0.jpg)\n\
    Figure 2-4: *Jargoneer* architecture\n\nThe new architecture is shown in [Figure\
    \ 2-5](#LiB0018.html#ch02fig05).\n\n[![Click To expand](fig44_02.jpg)](fig44_02_0.jpg)\n\
    Figure 2-5: A cleaner architecture for *Jargoneer*\n\nInstead of hitting the web\
    \ server directly, Jargoneer goes through a different server hosted by Apress.\
    \ This server queries the Jargon File, parses the result, and returns the definition\
    \ to the device. This is advantageous from several stand-points:\n\n*   Bandwidth\
    \ is expensive in terms of both time and money. Today's wireless networks are\
    \ relatively slow, so less data passing through the air means less waiting time\
    \ for your users. Also, wireless service tends to be pricey, so less data passing\
    \ through the air means smaller bills for your users.\n\n*   Small devices have\
    \ limited memory and processing power. It is unwise to spend these limited resources\
    \ on tasks like parsing HTML. In general, you will be able to place most of the\
    \ processing burden of your application on a server component, making your client\
    \ MIDlet's life very easy.\n\n*   In this particular application, the HTML parsing\
    \ is not very stable. Suppose the server we are using decides to return its Jargon\
    \ File definitions in a different format; if four million users are running Jargoneer,\
    \ then four million copies of our code have just broken. Performing this task\
    \ on a server gives it a single point of failure and a single point of update.\
    \ If we fix the parsing code on the server, the interface between the server and\
    \ the client devices can remain unchanged. This makes it easy to upgrade or fix\
    \ Jargoneer.\n\nNetwork MIDP applications are likely to need a server component.\
    \ If you're planning to do much MIDP development, you might like to study up on\
    \ Java servlets.\n\n## Packaging Your Application\n\nYou won't pass class files\
    \ directly to a MIDP to deploy an application. Instead, you'll package them in\
    \ a Java Archive (JAR) using the jar tool that comes with the Java 2 SDK.\n\n\
    If you're using the J2ME Wireless Toolkit, you won't ever have to perform these\
    \ steps manually; the toolkit automatically packages your MIDlets when you choose\
    \ **Project** Ø **Package** Ø **Create Package** from the menu. (You don't have\
    \ to do this if you just want to test your application in the emulator, but you\
    \ need to create a package if you're going to distribute the MIDlet suite.) Even\
    \ if you use the J2ME Wireless Toolkit, you might want to read through this section\
    \ so that you understand exactly what's going on.\n\nIf you're using the MIDP\
    \ reference implementation, you should follow these steps to package your MIDlets.\
    \ I'll only sketch the steps here; in the [next chapter](#LiB0024_split_000.html#106)\
    \ you'll learn all the gory details of MIDlets and MIDlet suites.\n\n### Manifest\
    \ Information\n\nEvery JAR includes a manifest file, *META-INF\\MANIFEST.MF*,\
    \ that describes the contents of the archive. For MIDlet JARs, the manifest file\
    \ should contain extra information. The extra information is stuff that's important\
    \ to the MIDP runtime environment, like the MIDlet's class name and the versions\
    \ of CLDC and MIDP that the MIDlet expects.\n\nYou can specify extra manifest\
    \ information in a simple text file and tell the jar utility to include that information\
    \ in the manifest when the JAR is created. To package Jargoneer, for example,\
    \ save the following text in a file named *extra.mf* :\n\n```\nMIDlet-1: Jargoneer,\
    \ , Jargoneer\nMIDlet-Name: Jargoneer\nMIDlet-Vendor: Jonathan Knudsen\nMIDlet-Version:\
    \ 1.0\nMicroEdition-Configuration: CLDC-1.0\nMicroEdition-Profile: MIDP-1.0\n\
    ```\n\nNow assemble the MIDlet classes and the extra manifest information into\
    \ a JAR with the following command:\n\n```\njar cvmf extra.mf Jargoneer.jar Jargoneer.class\n\
    ```\n\nWith the J2ME Wireless Toolkit, the toolkit automatically assembles your\
    \ application into a MIDlet suite JAR when you press the **Build** button. It's\
    \ very convenient, and it saves you from the effort of learning the jar tool.\n\
    \n### Creating a MIDlet Descriptor\n\nOne additional file is needed before your\
    \ MIDlet is ready to go out the door. An *application descriptor* file must be\
    \ created. This file contains a lot of the same information that's in the MIDlet\
    \ JAR manifest file. However, it lives outside the JAR and enables application\
    \ management software to learn about a MIDlet JAR without installing it.\n\nThe\
    \ application descriptor is a text file with a *.jad* extension. Type in the following\
    \ and save it as *Jargoneer.jad*:\n\n```\nMIDlet-1: Jargoneer, , Jargoneer\nMIDlet-Jar-Size:\
    \ 3853\nMIDlet-Jar-URL: Jargoneer.jar\nMIDlet-Name: Jargoneer\nMIDlet-Vendor:\
    \ Jonathan Knudsen\nMIDlet-Version: 1.0\n```\n\nIf your MIDlet suite JAR is a\
    \ different size, enter the actual size for the MIDlet-Jar-Size entry. The MIDlet\
    \ descriptor is automatically generated when you press the **Build** button in\
    \ the J2ME Wireless Toolkit. If you're using the J2ME Wireless Toolkit, you won't\
    \ need to create the application descriptor yourself."
  trans: "\n### 通用用户界面\n\nJargoneer 的用户界面代码可能会让你感到惊讶。稍后，我将用几个章节来介绍用户界面。目前，需要重点注意的是\
    \ Jargoneer 的用户界面如何足够灵活，能够运行在不同屏幕尺寸和不同输入能力的设备上。毕竟，MIDP 的一大吸引力在于“编写一套源代码，即可在多种设备上运行”的理念。\n\
    \nMIDP 通用用户界面的一个例子是 Jargoneer 启动时最初显示的 TextBox。图 2-3 展示了这个 TextBox。\n\n![](img/fig42_01.jpg)\n\
    图 2-3：*Jargoneer* 的 *TextBox*\n\nTextBox 是一个文本输入字段。它有一个标题和一个用于输入文本的区域。它的设计简单，可以轻松地显示在不同尺寸的屏幕上。更有趣的是出现在\
    \ TextBox 底部的命令。它们是“退出”和“查找”。创建 TextBox 及其命令的代码位于 Jargoneer 的构造函数中：\n\n```\n mExitCommand\
    \ = new Command(\"Exit\", Command.EXIT, 0);\n    mFindCommand = new Command(\"\
    Find\", Command.SCREEN, 0);\n    // ...\n    mSubmitBox = new TextBox(\"Jargoneer\"\
    , \"\", 32, 0);\n    mSubmitBox.addCommand(mExitCommand);\n    mSubmitBox.addCommand(mFindCommand);\n\
    \    mSubmitBox.setCommandListener(this);\n```\n\n请注意命令是如何创建的。你只需指定一个标签和一个类型，并注册一个事件监听器来了解命令何时被调用。这种设计有意保持模糊——它给实现留下了相当大的自由度，来决定命令应如何显示和调用。例如，在\
    \ Sun 的 J2ME Wireless Toolkit 模拟器中，TextBox 在屏幕底部显示其命令，并允许用户使用软按钮调用它们。而另一台设备可能会将这两个命令放在一个菜单中，并允许用户使用选择轮或其他机制来调用它们。\n\
    \n### 服务器端组件的可能性\n\nJargoneer 示例连接到一个 Web 服务器，发送请求并接收响应。该 Web 服务器实际上是一个中介——它连接到真正的\
    \ Jargon File 服务器，发出请求，解析结果，然后将精简后的定义发送回 MIDP 设备。\n\n在本书的第一个版本中，Jargoneer 直接连接到\
    \ Jargon File 服务器。作为对其查询的响应，它收到了大量不需要的信息。最初的 Jargoneer 费了很大力气来解析 HTML 响应，以提取它想要的定义。从架构上看，旧的\
    \ Jargoneer 如图 2-4 所示。\n\n![点击展开](img/fig44_01_0.jpg)\n图 2-4：*Jargoneer* 架构\n\n\
    新的架构如图 2-5 所示。\n\n![点击展开](img/fig44_02_0.jpg)\n图 2-5：*Jargoneer* 的更简洁架构\n\nJargoneer\
    \ 不再直接访问 Web 服务器，而是通过由 Apress 托管的另一个服务器。该服务器查询 Jargon File，解析结果，并将定义返回给设备。从几个角度来看，这都具有优势：\n\
    \n*   带宽在时间和金钱上都很昂贵。当今的无线网络相对较慢，因此空中传输的数据越少，用户的等待时间就越短。此外，无线服务往往价格不菲，因此空中传输的数据越少，用户的账单就越少。\n\
    \n*   小型设备的内存和处理能力有限。将有限的资源花费在解析 HTML 等任务上是不明智的。通常，你可以将应用程序的大部分处理负担放在服务器组件上，从而使客户端\
    \ MIDlet 的工作变得非常轻松。\n\n*   在这个特定的应用程序中，HTML 解析并不十分稳定。假设我们使用的服务器决定以不同的格式返回其 Jargon\
    \ File 定义；如果四百万用户正在运行 Jargoneer，那么我们的代码就会有四百万个副本同时失效。在服务器上执行此任务，使其成为一个单一的故障点和单一的更新点。如果我们修复了服务器上的解析代码，服务器与客户端设备之间的接口可以保持不变。这使得升级或修复\
    \ Jargoneer 变得容易。\n\n网络 MIDP 应用程序很可能需要一个服务器组件。如果你计划进行大量的 MIDP 开发，你可能需要学习 Java\
    \ Servlet。\n\n## 打包你的应用程序\n\n你不会直接将类文件传递给 MIDP 来部署应用程序。相反，你将使用 Java 2 SDK 附带的\
    \ `jar` 工具将它们打包成一个 Java 归档文件（JAR）。\n\n如果你使用的是 J2ME Wireless Toolkit，则无需手动执行这些步骤；当你从菜单中选择\
    \ **项目** Ø **打包** Ø **创建包** 时，该工具包会自动打包你的 MIDlet。（如果你只是想测试模拟器中的应用程序，则无需执行此操作，但如果你要分发\
    \ MIDlet 套件，则需要创建一个包。）即使你使用 J2ME Wireless Toolkit，你可能也想阅读本节，以便准确了解正在发生的事情。\n\n\
    如果你使用的是 MIDP 参考实现，则应按照以下步骤打包你的 MIDlet。我在这里只概述步骤；在下一章中，你将了解 MIDlet 和 MIDlet 套件的所有详细细节。\n\
    \n### 清单信息\n\n每个 JAR 都包含一个清单文件 *META-INF\\MANIFEST.MF*，该文件描述了归档文件的内容。对于 MIDlet\
    \ JAR，清单文件应包含额外信息。这些额外信息对 MIDP 运行时环境很重要，例如 MIDlet 的类名以及 MIDlet 期望的 CLDC 和 MIDP\
    \ 版本。\n\n你可以在一个简单的文本文件中指定额外的清单信息，并告诉 `jar` 实用程序在创建 JAR 时将这些信息包含在清单中。例如，要打包 Jargoneer，请将以下文本保存在名为\
    \ *extra.mf* 的文件中：\n\n```\nMIDlet-1: Jargoneer, , Jargoneer\nMIDlet-Name: Jargoneer\n\
    MIDlet-Vendor: Jonathan Knudsen\nMIDlet-Version: 1.0\nMicroEdition-Configuration:\
    \ CLDC-1.0\nMicroEdition-Profile: MIDP-1.0\n```\n\n现在，使用以下命令将 MIDlet 类和额外的清单信息组装到一个\
    \ JAR 中：\n\n```\njar cvmf extra.mf Jargoneer.jar Jargoneer.class\n```\n\n使用 J2ME\
    \ Wireless Toolkit 时，当你按下 **构建** 按钮时，该工具包会自动将你的应用程序组装成一个 MIDlet 套件 JAR。这非常方便，让你免去学习\
    \ `jar` 工具的麻烦。\n\n### 创建 MIDlet 描述符\n\n在你的 MIDlet 准备就绪之前，还需要一个额外的文件。必须创建一个*应用程序描述符*文件。该文件包含许多与\
    \ MIDlet JAR 清单文件中相同的信息。但是，它位于 JAR 之外，使应用程序管理软件无需安装即可了解 MIDlet JAR 的信息。\n\n应用程序描述符是一个扩展名为\
    \ *.jad* 的文本文件。输入以下内容并将其保存为 *Jargoneer.jad*：\n\n```\nMIDlet-1: Jargoneer, , Jargoneer\n\
    MIDlet-Jar-Size: 3853\nMIDlet-Jar-URL: Jargoneer.jar\nMIDlet-Name: Jargoneer\n\
    MIDlet-Vendor: Jonathan Knudsen\nMIDlet-Version: 1.0\n```\n\n如果你的 MIDlet 套件 JAR\
    \ 大小不同，请为 MIDlet-Jar-Size 条目输入实际大小。当你在 J2ME Wireless Toolkit 中按下 **构建** 按钮时，MIDlet\
    \ 描述符会自动生成。如果你使用的是 J2ME Wireless Toolkit，则无需自己创建应用程序描述符。\n"
- fmt: "# Using an Obfuscator\n\nBecause MIDP devices have so little memory, MIDlet\
    \ suites should be as compact as possible. An *obfuscator* is a useful tool for\
    \ minimizing the size of MIDlet suite JARs. Obfuscators, originally designed to\
    \ foil attempts to reverse engineer compiled bytecode, perform any combination\
    \ of the following functions:\n\n- Renaming classes, member variables, and methods\
    \ to more compact names\n- Removing unused classes, methods, and member variables\n\
    - Inserting illegal or questionable data to confuse decompilers\n\nExcept for\
    \ the last point, obfuscators can significantly reduce the size of compiled classes\
    \ in a MIDlet suite JAR.\n\nThere's a wide spectrum of obfuscators, with a variety\
    \ of licenses, costs, and features. For a comprehensive list, see [http://proguard.sourceforge.net/alternatives.html](http://proguard.sourceforge.net/alternatives.html).\n\
    \nUsing an obfuscator requires some finesse. The trick is to obfuscate the classes\
    \ before they are preverified. The J2ME Wireless Toolkit, starting with version\
    \ 1.0.4, includes support for inserting an obfuscator into the build cycle. Support\
    \ for RetroGuard is built in 1.0.4, with ProGuard supported in 2.0, and you can\
    \ write adapter code to use other obfuscators. If you're using the 2.0 version\
    \ of the toolkit, you just need to download ProGuard and copy the `proguard.jar`\
    \ file into the toolkit's `bin` directory. Then choose **Project** Ø **Package**\
    \ Ø **Create Obfuscated Package** and the toolkit handles all the details.\n\n\
    This article describes how to use the ProGuard obfuscator with the J2ME Wireless\
    \ Toolkit 1.0.4 and outlines how to add support for any obfuscator to the toolkit.\n\
    \n[http://wireless.java.sun.com/midp/ttips/proguard/](http://wireless.java.sun.com/midp/ttips/proguard/)\n\
    \nObfuscators tend to be a little finicky, but once you get them configured correctly,\
    \ they can provide significant size savings.\n\n# Using Ant\n\nAnt is a powerful\
    \ build tool that is useful for automating MIDlet suite builds. It's similar in\
    \ concept to make, but it is cleaner and easier to use. Ant is open source software,\
    \ part of the Apache Jakarta project, at [http://jakarta.apache.org/ant/](http://jakarta.apache.org/ant/).\n\
    \nAnt is a tool for serious developers. If you believe you've exhausted the possibilities\
    \ of the J2ME Wireless Toolkit, Ant is probably the next tool you should learn.\
    \ Ant provides considerable flexibility in structuring your build cycle and lets\
    \ you easily automate tasks like generating documentation or packaging source\
    \ code. For an introduction to Ant and MIDP, see [http://wireless.java.sun.com/midp/articles/ant/](http://wireless.java.sun.com/midp/articles/ant/).\n\
    \nThe code download for this book includes an Ant build script. A simplified version\
    \ of the build script is shown in [Listing 2-2](#LiB0021.html#ch02list02).\n\n\
    **Listing 2-2: An Example Ant Build Script**\n\n```\n<project name=\"wj2\" default=\"\
    dist\" basedir=\"..\">\n  <property name=\"project\" value=\"wj2\"/>\n\n  <property\
    \ name=\"midp\" value=\"/WTK20\"/>\n  <property name=\"midp_lib\" value=\"${midp}/lib/midpapi.zip\"\
    />\n\n  <target name=\"run\">\n    <exec executable=\"${midp}/bin/emulator\">\n\
    \      <arg line=\"-classpath build/bin/${project}.jar\"/>\n      <arg line=\"\
    -Xdescriptor build/bin/${project}.jad\"/>\n    </exec>\n  </target>\n\n  <target\
    \ name=\"dist\" depends=\"preverify\">\n    <mkdir dir=\"build/bin\"/>\n    <jar\
    \ basedir=\"build/preverified\"\n        jarfile=\"build/bin/${project}.jar\"\n\
    \        manifest=\"bin/MANIFEST.MF\">\n      <fileset dir=\"res\"/>\n    </jar>\n\
    \    <copy file=\"bin/${project}.jad\"\n        tofile=\"build/bin/${project}.jad\"\
    />\n  </target>\n\n  <target name=\"preverify\" depends=\"obfuscate_null\">\n\
    \    <mkdir dir=\"build/preverified\"/>\n    <exec executable=\"${midp}/bin/preverify\"\
    >\n      <arg line=\"-classpath ${midp_lib}\"/>\n      <arg line=\"-d build/preverified\"\
    />\n      <arg line=\"build/obfuscated\"/>\n    </exec>\n  </target>\n  <target\
    \ name=\"obfuscate_null\" depends=\"compile\">\n    <mkdir dir=\"build/obfuscated\"\
    />\n    <copy todir=\"build/obfuscated\">\n      <fileset dir=\"build/classes\"\
    />\n    </copy>\n  </target>\n\n  <target name=\"compile\" depends=\"init\">\n\
    \    <mkdir dir=\"build/classes\"/>\n    <javac destdir=\"build/classes\" srcdir=\"\
    src\"\n        bootclasspath=\"${midp_lib}\" target=\"1.1\"/>\n  </target>\n\n\
    \  <target name=\"init\">\n    <tstamp/>\n  </target>\n</project>\n```\n\nThis\
    \ build script contains targets that correspond to the steps of MIDlet suite development:\
    \ compile, preverify, and dist (which packages the application). An `obfuscate_null`\
    \ target is also included; it serves as a placeholder for inserting obfuscation\
    \ in the build cycle. (The actual build script in the source download includes\
    \ a target for obfuscating using ProGuard.)\n\nSeveral developers have created\
    \ specialized Ant tasks to help with MIDlet suite builds. One such project is\
    \ here:\n\n[http://antenna.sourceforge.net/](http://antenna.sourceforge.net/)\n\
    \n# Running on a Real Device\n\nAs of this writing, millions of MIDP-enabled phones\
    \ are deployed worldwide. A comprehensive list of MIDP devices is available at\
    \ [http://wireless.java.sun.com/device/](http://wireless.java.sun.com/device/).\
    \ How do you actually put MIDlets on a device? There are two possibilities: either\
    \ you'll transfer MIDlet suites to the phone from your computer via a serial cable,\
    \ or you'll transfer MIDlet suites over the wireless network. (Another possibility\
    \ serves as a hybrid—a device in its cradle, attached to your computer via a serial\
    \ cable, can use the desktop computer's network connection as though it were a\
    \ wireless connection, and applications can be transferred this way.) This second\
    \ possibility is called *over the air* (OTA) *provisioning*. There's a standard\
    \ protocol for OTA, which is described as an addendum to the MIDP 1.0 specification.\
    \ (The OTA addendum is included in the MIDP 2.0 specification.)\n\nInstalling\
    \ MIDlets via serial cable or OTA provisioning is specific to whatever device\
    \ you're using. You'll have to check the documentation for your device to see\
    \ exactly how to install MIDlet suites.\n\n# Summary\n\nThis chapter took you\
    \ on a tour of MIDP development. Creating source code is much the same as in J2SE\
    \ development, but the build process is different. First, the source code must\
    \ be compiled against the MIDP classes using `javac`'s `-bootclasspath` option.\
    \ Second, the class files must be preverified using the `preverify` command line\
    \ tool. With the J2ME Wireless Toolkit, these steps are conveniently automated.\
    \ Just press the **Build** button to build and preverify. Applications can be\
    \ easily tested in emulators using the J2ME Wireless Toolkit.\n\n# Chapter 3:\
    \ All About MIDlets\n\nIn [Chapter 2](#LiB0012_split_000.html#57), you got a quick\
    \ introduction to the process of building and running MIDlets. In this chapter,\
    \ you'll explore the details. I'll cover the subjects that I skimmed in last chapter,\
    \ starting with the MIDlet life cycle and continuing through to a full discussion\
    \ of MIDlet packaging. The chapter concludes with a look at MIDP 2.0's security\
    \ architecture."
  raw: "## Using an Obfuscator\n\nBecause MIDP devices have so little memory, MIDlet\
    \ suites should be as compact as possible. An *obfuscator* is a useful tool for\
    \ minimizing the size of MIDlet suite JARs. Obfuscators, originally designed to\
    \ foil attempts to reverse engineer compiled bytecode, perform any combination\
    \ of the following functions:\n\n*   Renaming classes, member variables, and methods\
    \ to more compact names\n\n*   Removing unused classes, methods, and member variables\n\
    \n*   Inserting illegal or questionable data to confuse decompilers\n\nExcept\
    \ for the last point, obfuscators can significantly reduce the size of compiled\
    \ classes in a MIDlet suite JAR.\n\nThere's a wide spectrum of obfuscators, with\
    \ a variety of licenses, costs, and features. For a comprehensive list, see [http://proguard.sourceforge.net/alternatives.html](http://proguard.sourceforge.net/alternatives.html).\n\
    \nUsing an obfuscator requires some finesse. The trick is to obfuscate the classes\
    \ before they are preverified. The J2ME Wireless Toolkit, starting with version\
    \ 1.0.4, includes support for inserting an obfuscator into the build cycle. Support\
    \ for RetroGuard is built in 1.0.4, with ProGuard supported in 2.0, and you can\
    \ write adapter code to use other obfuscators. If you're using the 2.0 version\
    \ of the toolkit, you just need to download ProGuard and copy the *proguard.jar*\
    \ file into the toolkit's *bin* directory. Then choose **Project** Ø **Package**\
    \ Ø **Create Obfuscated** **Package** and the toolkit handles all the details.\n\
    \nThis article describes how to use the ProGuard obfuscator with the J2ME Wireless\
    \ Toolkit 1.0.4 and outlines how to add support for any obfuscator to the toolkit.\n\
    \n[http://wireless.java.sun.com/midp/ttips/proguard/](http://wireless.java.sun.com/midp/ttips/proguard/)\n\
    \nObfuscators tend to be a little finicky, but once you get them configured correctly,\
    \ they can provide significant size savings.\n\n## Using Ant\n\nAnt is a powerful\
    \ build tool that is useful for automating MIDlet suite builds. It's similar in\
    \ concept to make, but it is cleaner and easier to use. Ant is open source software,\
    \ part of the Apache Jakarta project, at [http://jakarta.apache.org/ant/](http://jakarta.apache.org/ant/).\n\
    \nAnt is a tool for serious developers. If you believe you've exhausted the possibilities\
    \ of the J2ME Wireless Toolkit, Ant is probably the next tool you should learn.\
    \ Ant provides considerable flexibility in structuring your build cycle and lets\
    \ you easily automate tasks like generating documentation or packaging source\
    \ code. For an introduction to Ant and MIDP, see [http://wireless.java.sun.com/midp/articles/ant/](http://wireless.java.sun.com/midp/articles/ant/).\n\
    \nThe code download for this book includes an Ant build script. A simplified version\
    \ of the build script is shown in [Listing 2-2](#LiB0021.html#ch02list02).\n\n\
    Listing 2-2: An Example Ant Build Script\n\n| **![Start example](_1.gif)** |\n\
    \n```\n<project name=\"wj2\" default=\"dist\" basedir=\"..\">\n  <property name=\"\
    project\" value=\"wj2\"/>\n\n  <property name=\"midp\" value=\"/WTK20\"/>\n  <property\
    \ name=\"midp_lib\" value=\"${midp}/lib/midpapi.zip\"/>\n\n  <target name=\"run\"\
    >\n    <exec executable=\"${midp}/bin/emulator\">\n      <arg line=\"-classpath\
    \ build/bin/${project}.jar\"/>\n      <arg line=\"-Xdescriptor build/bin/${project}.jad\"\
    />\n    </exec>\n  </target>\n\n  <target name=\"dist\" depends=\"preverify\"\
    >\n    <mkdir dir=\"build/bin\"/>\n    <jar basedir=\"build/preverified\"\n  \
    \      jarfile=\"build/bin/${project}.jar\"\n        manifest=\"bin/MANIFEST.MF\"\
    >\n      <fileset dir=\"res\"/>\n    </jar>\n    <copy file=\"bin/${project}.jad\"\
    \n        tofile=\"build/bin/${project}.jad\"/>\n  </target>\n\n  <target name=\"\
    preverify\" depends=\"obfuscate_null\">\n    <mkdir dir=\"build/preverified\"\
    />\n    <exec executable=\"${midp}/bin/preverify\">\n      <arg line=\"-classpath\
    \ ${midp_lib}\"/>\n      <arg line=\"-d build/preverified\"/>\n      <arg line=\"\
    build/obfuscated\"/>\n    </exec>\n  </target>\n  <target name=\"obfuscate_null\"\
    \ depends=\"compile\">\n    <mkdir dir=\"build/obfuscated\"/>\n    <copy todir=\"\
    build/obfuscated\">\n      <fileset dir=\"build/classes\"/>\n    </copy>\n  </target>\n\
    \n  <target name=\"compile\" depends=\"init\">\n    <mkdir dir=\"build/classes\"\
    />\n    <javac destdir=\"build/classes\" srcdir=\"src\"\n        bootclasspath=\"\
    ${midp_lib}\" target=\"1.1\"/>\n  </target>\n\n  <target name=\"init\">\n    <tstamp/>\n\
    \  </target>\n</project>\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nThis\
    \ build script contains targets that correspond to the steps of MIDlet suite development:\
    \ compile, preverify, and dist (which packages the application). An obfuscate_null\
    \ target is also included; it serves as a placeholder for inserting obfuscation\
    \ in the build cycle. (The actual build script in the source download includes\
    \ a target for obfuscating using ProGuard.)\n\nSeveral developers have created\
    \ specialized Ant tasks to help with MIDlet suite builds. One such project is\
    \ here:\n\n[http://antenna.sourceforge.net/](http://antenna.sourceforge.net/)\n\
    \n## Running on a Real Device\n\nAs of this writing, millions of MIDP-enabled\
    \ phones are deployed worldwide. A comprehensive list of MIDP devices is available\
    \ at [http://wireless.java.sun.com/device/](http://wireless.java.sun.com/device/).\
    \ How do you actually put MIDlets on a device? There are two possibilities: either\
    \ you'll transfer MIDlet suites to the phone from your computer via a serial cable,\
    \ or you'll transfer MIDlet suites over the wireless network. (Another possibility\
    \ serves as a hybrid—a device in its cradle, attached to your computer via a serial\
    \ cable, can use the desktop computer's network connection as though it were a\
    \ wireless connection, and applications can be transferred this way.) This second\
    \ possibility is called *over the air* (OTA) *provisioning*. There's a standard\
    \ protocol for OTA, which is described as an addendum to the MIDP 1.0 specification.\
    \ (The OTA addendum is included in the MIDP 2.0 specification.)\n\nInstalling\
    \ MIDlets via serial cable or OTA provisioning is specific to whatever device\
    \ you're using. You'll have to check the documentation for your device to see\
    \ exactly how to install MIDlet suites.\n\n## Summary\n\nThis chapter took you\
    \ on a tour of MIDP development. Creating source code is much the same as in J2SE\
    \ development, but the build process is different. First, the source code must\
    \ be compiled against the MIDP classes using javac's -bootclasspath option. Second,\
    \ the class files must be preverified using the preverify command line tool. With\
    \ the J2ME Wireless Toolkit, these steps are conveniently automated. Just press\
    \ the **Build** button to build and preverify. Applications can be easily tested\
    \ in emulators using the J2ME Wireless Toolkit.\n\n# Chapter 3: All About MIDlets\n\
    \nIn [Chapter 2](#LiB0012_split_000.html#57), you got a quick introduction to\
    \ the process of building and running MIDlets. In this chapter, you'll explore\
    \ the details. I'll cover the subjects that I skimmed in last chapter, starting\
    \ with the MIDlet life cycle and continuing through to a full discussion of MIDlet\
    \ packaging. The chapter concludes with a look at MIDP 2.0's security architecture."
  trans: "\n## 使用混淆器\n\n由于 MIDP 设备的内存非常有限，MIDlet 套件应尽可能紧凑。*混淆器*是一种用于最小化 MIDlet 套件\
    \ JAR 文件大小的有用工具。混淆器最初设计用于阻止对编译后字节码进行逆向工程，它可执行以下任意组合的功能：\n\n*   将类、成员变量和方法重命名为更紧凑的名称\n\
    *   移除未使用的类、方法和成员变量\n*   插入非法或可疑数据以迷惑反编译器\n\n除了最后一点，混淆器可以显著减小 MIDlet 套件 JAR 中编译类的大小。\n\
    \n市面上有各种各样的混淆器，它们拥有不同的许可证、成本和功能。如需完整列表，请参见 [`proguard.sourceforge.net/alternatives.html`](http://proguard.sourceforge.net/alternatives.html)。\n\
    \n使用混淆器需要一些技巧。关键在于在预校验之前对类进行混淆。从 1.0.4 版本开始，J2ME Wireless Toolkit 支持将混淆器插入构建周期。1.0.4\
    \ 版本内置了对 RetroGuard 的支持，2.0 版本则支持 ProGuard，并且你可以编写适配器代码来使用其他混淆器。如果你使用的是 2.0 版本的工具包，只需下载\
    \ ProGuard 并将 *proguard.jar* 文件复制到工具包的 *bin* 目录下。然后选择 **项目** Ø **包** Ø **创建混淆包**，工具包将处理所有细节。\n\
    \n本文描述了如何将 ProGuard 混淆器与 J2ME Wireless Toolkit 1.0.4 结合使用，并概述了如何为工具包添加对任何混淆器的支持。\n\
    \n[`wireless.java.sun.com/midp/ttips/proguard/`](http://wireless.java.sun.com/midp/ttips/proguard/)\n\
    \n混淆器往往有点挑剔，但一旦你正确配置好它们，它们就能显著节省空间。\n\n## 使用 Ant\n\nAnt 是一个强大的构建工具，可用于自动化 MIDlet\
    \ 套件的构建。它在概念上与 make 类似，但更简洁且更易于使用。Ant 是开源软件，属于 Apache Jakarta 项目的一部分，位于 [`jakarta.apache.org/ant/`](http://jakarta.apache.org/ant/)。\n\
    \nAnt 是面向专业开发者的工具。如果你认为已经穷尽了 J2ME Wireless Toolkit 的可能性，那么 Ant 很可能是你接下来应该学习的工具。Ant\
    \ 在构建周期的结构上提供了相当大的灵活性，并让你能够轻松地自动化诸如生成文档或打包源代码等任务。关于 Ant 和 MIDP 的介绍，请参见 [`wireless.java.sun.com/midp/articles/ant/`](http://wireless.java.sun.com/midp/articles/ant/)。\n\
    \n本书的代码下载中包含一个 Ant 构建脚本。构建脚本的简化版本如清单 2-2 所示。\n\n清单 2-2：一个 Ant 构建脚本示例\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\n<project name=\"wj2\" default=\"dist\" basedir=\"..\">\n  <property\
    \ name=\"project\" value=\"wj2\"/>\n\n  <property name=\"midp\" value=\"/WTK20\"\
    />\n  <property name=\"midp_lib\" value=\"${midp}/lib/midpapi.zip\"/>\n\n  <target\
    \ name=\"run\">\n    <exec executable=\"${midp}/bin/emulator\">\n      <arg line=\"\
    -classpath build/bin/${project}.jar\"/>\n      <arg line=\"-Xdescriptor build/bin/${project}.jad\"\
    />\n    </exec>\n  </target>\n\n  <target name=\"dist\" depends=\"preverify\"\
    >\n    <mkdir dir=\"build/bin\"/>\n    <jar basedir=\"build/preverified\"\n  \
    \      jarfile=\"build/bin/${project}.jar\"\n        manifest=\"bin/MANIFEST.MF\"\
    >\n      <fileset dir=\"res\"/>\n    </jar>\n    <copy file=\"bin/${project}.jad\"\
    \n        tofile=\"build/bin/${project}.jad\"/>\n  </target>\n\n  <target name=\"\
    preverify\" depends=\"obfuscate_null\">\n    <mkdir dir=\"build/preverified\"\
    />\n    <exec executable=\"${midp}/bin/preverify\">\n      <arg line=\"-classpath\
    \ ${midp_lib}\"/>\n      <arg line=\"-d build/preverified\"/>\n      <arg line=\"\
    build/obfuscated\"/>\n    </exec>\n  </target>\n  <target name=\"obfuscate_null\"\
    \ depends=\"compile\">\n    <mkdir dir=\"build/obfuscated\"/>\n    <copy todir=\"\
    build/obfuscated\">\n      <fileset dir=\"build/classes\"/>\n    </copy>\n  </target>\n\
    \n  <target name=\"compile\" depends=\"init\">\n    <mkdir dir=\"build/classes\"\
    />\n    <javac destdir=\"build/classes\" srcdir=\"src\"\n        bootclasspath=\"\
    ${midp_lib}\" target=\"1.1\"/>\n  </target>\n\n  <target name=\"init\">\n    <tstamp/>\n\
    \  </target>\n</project>\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n此构建脚本包含与\
    \ MIDlet 套件开发步骤相对应的目标：编译、预校验和 dist（打包应用程序）。还包含一个 obfuscate_null 目标；它作为在构建周期中插入混淆操作的占位符。（源代码下载中的实际构建脚本包含一个使用\
    \ ProGuard 进行混淆的目标。）\n\n一些开发者创建了专门的 Ant 任务来帮助进行 MIDlet 套件构建。其中一个项目位于：\n\n[`antenna.sourceforge.net/`](http://antenna.sourceforge.net/)\n\
    \n## 在真实设备上运行\n\n在撰写本文时，全球已部署了数百万部支持 MIDP 的手机。MIDP 设备的完整列表可在 [`wireless.java.sun.com/device/`](http://wireless.java.sun.com/device/)\
    \ 找到。如何将 MIDlet 实际安装到设备上？有两种可能：要么通过串行电缆将 MIDlet 套件从计算机传输到手机，要么通过无线网络传输 MIDlet\
    \ 套件。（另一种可能性是混合方式——设备放在底座中，通过串行电缆连接到计算机，可以利用台式计算机的网络连接，就像使用无线连接一样，应用程序可以通过这种方式传输。）这第二种可能性称为*空中下载*（OTA）*配置*。OTA\
    \ 有一个标准协议，作为 MIDP 1.0 规范的附录进行了描述。（OTA 附录包含在 MIDP 2.0 规范中。）\n\n通过串行电缆或 OTA 配置安装\
    \ MIDlet 的方式取决于你使用的具体设备。你需要查阅设备的文档，了解如何安装 MIDlet 套件。\n\n## 总结\n\n本章带你了解了 MIDP\
    \ 开发。创建源代码与 J2SE 开发非常相似，但构建过程有所不同。首先，必须使用 javac 的 -bootclasspath 选项针对 MIDP 类编译源代码。其次，必须使用\
    \ preverify 命令行工具对类文件进行预校验。使用 J2ME Wireless Toolkit，这些步骤可以方便地自动化。只需按下**构建**按钮即可构建和预校验。应用程序可以使用\
    \ J2ME Wireless Toolkit 在模拟器中轻松测试。\n\n# 第 3 章：关于 MIDlet 的一切\n\n在第 2 章中，你快速了解了构建和运行\
    \ MIDlet 的过程。在本章中，你将深入探讨细节。我将涵盖上一章中略过的主题，从 MIDlet 生命周期开始，一直到对 MIDlet 打包的全面讨论。本章最后将介绍\
    \ MIDP 2.0 的安全架构。\n"
- fmt: "# The MIDlet Life Cycle\n\nMIDP applications are represented by instances\
    \ of the `javax.microedition.midlet.MIDlet` class. MIDlets have a specific life\
    \ cycle, which is reflected in the methods and behavior of the `MIDlet` class.\n\
    \nA piece of device software outside the realm of Java, the *application manager*,\
    \ controls the installation and execution of MIDlets. A MIDlet is installed by\
    \ moving its class files to a device. The class files will be packaged in a Java\
    \ Archive (JAR), while an accompanying descriptor file (with a `*.jad*` extension)\
    \ describes the contents of the JAR.\n\nA MIDlet goes through the following states:\n\
    \n1. When the MIDlet is about to be run, an instance is created. The MIDlet's\
    \ constructor is run, and the MIDlet is in the *Paused* state.\n2. Next, the MIDlet\
    \ enters the *Active* state after the application manager calls `startApp()`.\n\
    3. While the MIDlet is Active, the application manager can suspend its execution\
    \ by calling `pauseApp()`. This puts the MIDlet back in the Paused state. A MIDlet\
    \ can place itself in the Paused state by calling `notifyPaused()`.\n4. The application\
    \ manager can terminate the execution of the MIDlet by calling `destroyApp()`,\
    \ at which point the MIDlet is *destroyed* and patiently awaits garbage collection.\
    \ A MIDlet can destroy itself by calling `notifyDestroyed()`.\n\n[Figure 3-1](#LiB0024_split_001.html#ch03fig01)\
    \ shows the states of a MIDlet and the transitions between them.\n\n[![Click To\
    \ expand](fig52_01.jpg)](fig52_01_0.jpg)\nFigure 3-1: MIDlet life cycle\n\nThere\
    \ is one additional method in the `MIDlet` class related to the MIDlet life cycle:\
    \ `resumeRequest()`. A MIDlet in the Paused state can call this method to signal\
    \ to the application manager that it wants to become Active. It might seem weird\
    \ to think about a MIDlet in the Paused state running any code at all. However,\
    \ Paused MIDlets are still able to handle timer events or other types of callbacks\
    \ and thus have some chances to call `resumeRequest()`. If the application manager\
    \ does decide to move a MIDlet from the Paused to the Active state, it will do\
    \ so through the normal mechanism of calling `startApp()`.\n\n## Requesting a\
    \ Wakeup Call\n\nMIDP 2.0 allows MIDlets to request to be launched at a later\
    \ time, in essence requesting a wakeup call from the implementation. The method\
    \ is defined in `javax.microedition.io.PushRegistry`, which is kind of a weird\
    \ place for it. All of `PushRegistry`'s other methods have to do with launching\
    \ MIDlets in response to incoming network connections; the class is fully described\
    \ in [Chapter 9](#LiB0063_split_000.html#351). The following method in `PushRegistry`\
    \ requests that a named MIDlet be woken up at a specific time:\n\n```\npublic\
    \ static long registerAlarm(String midlet, long time)\n    throws ClassNotFoundException,\
    \ ConnectionNotFoundException \n```\n\nYou need to supply the class name of a\
    \ MIDlet in the MIDlet suite, and `time` specifies exactly when you want the MIDlet\
    \ to be launched, in the standard form as the number of milliseconds since January\
    \ 1, 1970. ([Chapter 4](#LiB0030_split_000.html#134) contains a discussion of\
    \ MIDP's classes and methods pertaining to time.)\n\nIf you supply a class name\
    \ that is not found in the current MIDlet suite, a `ClassNotFoundException` is\
    \ thrown. If the implementation is unable to launch MIDlets at specified times,\
    \ a `ConnectionNotFoundException` is thrown.\n\nIf the MIDlet for which you are\
    \ requesting a timed launch was previously registered for timed launch, this method\
    \ returns the previous wakeup time.\n\n## A Bridge to the Outside World\n\nMany\
    \ MIDP devices, especially mobile phones, have WAP browsers. A new method in MIDP\
    \ 2.0's `MIDlet` class supplies a bridge to these browsers and other capabilities:\n\
    \n```\npublic final boolean platformRequest(String URL)\n    throws ConnectionNotFoundException\n\
    ```\n\nOn a sophisticated device, the browser and the MIDlet suite may be able\
    \ to run at the same time, in which case the browser will be launched and pointed\
    \ to the specified URL. In this case the method returns `true`.\n\nOn smaller\
    \ devices, the browser may not be able to run until the MIDlet is destroyed. In\
    \ this case, `platformRequest()` returns `false` and it's the MIDlet's responsibility\
    \ to terminate. After the MIDlet terminates, it's the implementation's responsibility\
    \ to launch the browser and point it at the specified URL.\n\nIn either case,\
    \ `platformRequest()` is a nonblocking method.\n\nThere are two special possibilities\
    \ for the supplied URL. If you supply a telephone number URL of the form `tel:<number>`\
    \ as specified in RFC 2806 ([http://ietf.org/rfc/rfc2806.txt](http://ietf.org/rfc/rfc2806.txt)),\
    \ the implementation should initiate a voice call.\n\nIf you supply the URL of\
    \ a MIDlet suite descriptor or JAR, the implementation should interpret this as\
    \ a request to install the given MIDlet suite.\n\n## Packaging MIDlets\n\nMIDlets\
    \ are deployed in *MIDlet suites*. A MIDlet suite is a collection of MIDlets with\
    \ some extra information; it is composed of two files. One is an *application\
    \ descriptor*, which is a simple text file. The other is a JAR file that contains\
    \ the class files and resource files that make up your MIDlet suite. Like any\
    \ JAR file, a MIDlet suite's JAR file has a manifest file. [Figure 3-2](#LiB0027.html#ch03fig02)\
    \ shows a diagram of a MIDlet suite.\n\n[![Click To expand](fig54_01.jpg)](fig54_01_0.jpg)\n\
    Figure 3-2: Anatomy of a MIDlet suite\n\nIf you're using a tool like the J2ME\
    \ Wireless Toolkit, you don't need to worry much about MIDlet suite packaging\
    \ because most of the details are handled automatically. If you want to understand\
    \ things at a lower level, or if you're just curious, keep reading for a complete\
    \ description of MIDlet suite packaging.\n\nPackaging a MIDlet suite consists\
    \ of three steps:\n\n1. The class files and resource files that make up the MIDlets\
    \ are packaged into a JAR file. Usually, you'll use the `jar` command line tool\
    \ to accomplish this.\n2. Additional information that's needed at runtime is placed\
    \ in the JAR's manifest file. All JARs include a manifest; a MIDlet suite JAR\
    \ contains some extra information needed by application management software.\n\
    3. An application descriptor file must also be generated. This is a file with\
    \ a `*.jad*` extension that describes the MIDlet suite JAR. It can be used by\
    \ the application management software to decide whether a MIDlet suite JAR should\
    \ be downloaded to the device."
