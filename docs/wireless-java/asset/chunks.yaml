    \      t.start();\n    }\n  }\n\npublic void run() {\n    String selection = mMainScreen.getString(\n\
    \        mMainScreen.getSelectedIndex());\n    boolean viaHttp = selection.equals(\"\
    Via HTTP\");\n\nif (viaHttp)\n      playViaHttp();\n    else\n      playFromResource();\n\
    \  }\n\nprivate void playViaHttp() {\n    try {\n      String url = getAppProperty(\"\
    AudioMIDlet-URL\");\n      Player player = Manager.createPlayer(url);\n      player.start();\n\
    \    }\n    catch (Exception e) {\n      showException(e);\n      return;\n  \
    \  }\n    mDisplay.setCurrent(mMainScreen);\n  }\n\nprivate void playFromResource()\
    \ {\n    try {\n      InputStream in = getClass().getResourceAsStream(\"/relax.wav\"\
    );\n      Player player = Manager.createPlayer(in, \"audio/x-wav\");\n      player.start();\n\
    \    }\n    catch (Exception e) {\n      showException(e);\n      return;\n  \
    \  }\n    mDisplay.setCurrent(mMainScreen);\n  }\n\nprivate void showException(Exception\
    \ e) {\n    Alert a = new Alert(\"Exception\", e.toString(), null, null);\n  \
    \  a.setTimeout(Alert.FOREVER);\n    mDisplay.setCurrent(a, mMainScreen);\n  }\n\
    }\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\n## MIDP 2.0 Media Concepts\n\
    \nAudio data comes in a variety of *content types.* A content type is really just\
    \ a file format, a specification that tells how each bit in the data contributes\
    \ to the resulting sound. Common audio content types are MP3, AIFF, and WAV. In\
    \ the MIDP 2.0 ABB, content types are specified using MIME types, which use a\
    \ string to specify a primary and secondary type. For example, the MIME type for\
    \ WAV audio is \"audio/x-wav\".\n\nThe content type tells how to translate bits\
    \ into sound, but that's only half the battle. A *protocol* specifies how to get\
    \ the data from its original location to the place where it will be rendered.\
    \ You could use HTTP, for example, to transfer audio data from a server to a MIDP\
    \ device.\n\nIn the ABB, a Player knows how to render audio data with a particular\
    \ content type, while an associated *data source* handles transporting the data\
    \ to the Player. In the Mobile Media API, the abstract DataSource class represents\
    \ data sources. In the MIDP 2.0 ABB, data sources are not explicitly available,\
    \ but implicitly associated with a Player. The path of the audio information is\
    \ illustrated in [Figure 12-2](#LiB0097.html#ch12fig02).\n\n[![Click To expand](fig244_01.jpg)](fig244_01_0.jpg)\n\
    Figure 12-2: Audio data path\n\nManager doles out Players for content types and\
    \ protocols requested via its createPlayer() methods. One or more *controls* may\
    \ be associated with a Player to specify playback parameters like volume. In the\
    \ ABB, javax.microedition.media.Control is an interface representing a control,\
    \ while the javax.microedition.media.control package contains more specific subinterfaces.\
    \ The relationship between the classes is shown in [Figure 12-3](#LiB0097.html#ch12fig03).\n\
    \n![](fig244_02.jpg)\nFigure 12-3: Class relationships"
  trans: "\nABB 还支持播放采样音频文件，尽管规范并未要求支持此功能。要播放采样音频，你只需为想要听到的数据获取一个 Player，然后启动该 Player\
    \ 即可。你可以通过向 Manager 请求来获取一个 Player。在最简单的形式下，播放采样音频数据如下所示：\n\n```\nURL url = \"\
    http://65.215.221.148:8080/wj2/res/relax.wav\";\nPlayer p = Manager.createPlayer(url);\n\
    p.start();\n```\n\n在这种方法中，Web 服务器提供了数据的内容类型。另一种方法是获取音频数据的 InputStream，然后通过告知 Manager\
    \ 数据的内容类型来创建 Player。这对于读取存储在 MIDlet 套件 JAR 中作为资源的音频文件非常方便。例如：\n\n```\nInputStream\
    \ in = getClass().getResourceAsStream(\"/relax.wav\");\nPlayer player = Manager.createPlayer(in,\
    \ \"audio/x-wav\");\nplayer.start();\n```\n\n清单 12-2 是一个演示了这两种技术的简单 MIDlet。\n\n\
    清单 12-2：播放音频文件\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport java.io.*;\n\nimport\
    \ javax.microedition.io.*;\nimport javax.microedition.lcdui.*;\nimport javax.microedition.midlet.*;\n\
    import javax.microedition.media.*;\n\npublic class AudioMIDlet\n    extends MIDlet\n\
    \    implements CommandListener, Runnable {\n  private Display mDisplay;\n  private\
    \ List mMainScreen;\n\npublic void startApp() {\n    mDisplay = Display.getDisplay(this);\n\
    \nif (mMainScreen == null) {\n      mMainScreen = new List(\"AudioMIDlet\", List.IMPLICIT);\n\
    \      mMainScreen.append(\"Via HTTP\", null);\n      mMainScreen.append(\"From\
    \ resource\", null);\n      mMainScreen.addCommand(new Command(\"Exit\", Command.EXIT,\
    \ 0));\n      mMainScreen.addCommand(new Command(\"Play\", Command.SCREEN, 0));\n\
    \      mMainScreen.setCommandListener(this);\n    }\n\nmDisplay.setCurrent(mMainScreen);\n\
    \  }\n\npublic void pauseApp() {}\n\npublic void destroyApp(boolean unconditional)\
    \ {}\n\npublic void commandAction(Command c, Displayable s) {\n    if (c.getCommandType()\
    \ == Command.EXIT) notifyDestroyed();\n    else {\n      Form waitForm = new Form(\"\
    Loading...\");\n      mDisplay.setCurrent(waitForm);\n      Thread t = new Thread(this);\n\
    \      t.start();\n    }\n  }\n\npublic void run() {\n    String selection = mMainScreen.getString(\n\
    \        mMainScreen.getSelectedIndex());\n    boolean viaHttp = selection.equals(\"\
    Via HTTP\");\n\nif (viaHttp)\n      playViaHttp();\n    else\n      playFromResource();\n\
    \  }\n\nprivate void playViaHttp() {\n    try {\n      String url = getAppProperty(\"\
    AudioMIDlet-URL\");\n      Player player = Manager.createPlayer(url);\n      player.start();\n\
    \    }\n    catch (Exception e) {\n      showException(e);\n      return;\n  \
    \  }\n    mDisplay.setCurrent(mMainScreen);\n  }\n\nprivate void playFromResource()\
    \ {\n    try {\n      InputStream in = getClass().getResourceAsStream(\"/relax.wav\"\
    );\n      Player player = Manager.createPlayer(in, \"audio/x-wav\");\n      player.start();\n\
    \    }\n    catch (Exception e) {\n      showException(e);\n      return;\n  \
    \  }\n    mDisplay.setCurrent(mMainScreen);\n  }\n\nprivate void showException(Exception\
    \ e) {\n    Alert a = new Alert(\"Exception\", e.toString(), null, null);\n  \
    \  a.setTimeout(Alert.FOREVER);\n    mDisplay.setCurrent(a, mMainScreen);\n  }\n\
    }\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n## MIDP 2.0 媒体概念\n\n音频数据有多种*内容类型*。内容类型实际上就是一种文件格式，它规定了数据中的每个比特如何对最终声音产生影响。常见的音频内容类型有\
    \ MP3、AIFF 和 WAV。在 MIDP 2.0 ABB 中，内容类型使用 MIME 类型来指定，MIME 类型使用字符串来指定主类型和子类型。例如，WAV\
    \ 音频的 MIME 类型是 \"audio/x-wav\"。\n\n内容类型规定了如何将比特转换为声音，但这只是成功的一半。*协议*规定了如何将数据从其原始位置传输到将要渲染它的地方。例如，你可以使用\
    \ HTTP 将音频数据从服务器传输到 MIDP 设备。\n\n在 ABB 中，Player 知道如何渲染具有特定内容类型的音频数据，而关联的*数据源*则负责将数据传输给\
    \ Player。在移动媒体 API 中，抽象的 DataSource 类代表数据源。在 MIDP 2.0 ABB 中，数据源并非显式可用，而是隐式地与 Player\
    \ 关联。音频信息的路径如图 12-2 所示。\n\n![点击展开](img/fig244_01_0.jpg)\n图 12-2：音频数据路径\n\nManager\
    \ 通过其 createPlayer() 方法为请求的内容类型和协议分配 Player。一个或多个*控件*可能与 Player 关联，以指定播放参数（如音量）。在\
    \ ABB 中，javax.microedition.media.Control 是一个代表控件的接口，而 javax.microedition.media.control\
    \ 包则包含更具体的子接口。这些类之间的关系如图 12-3 所示。\n\n![](img/fig244_02.jpg)\n图 12-3：类关系\n"
- fmt: "# Supported Content Types and Protocols\n\nOne of the least understood aspects\
    \ of the ABB is its supported content types. MIDP 2.0 is very flexible about the\
    \ content types and protocols an implementation may support. All the specification\
    \ says is that if sampled audio is supported at all, then 8-bit PCM WAV must be\
    \ supported. Beyond that, the sky's the limit.\n\nIf you do ask `Manager` for\
    \ data or a protocol that it can't handle, a `MediaException` will be thrown.\n\
    \nYou can find out, at runtime, what content types and protocols are supported\
    \ using two methods in the `Manager` class:\n\n```\npublic static String getSupportedContentTypes(String\
    \ protocol)\npublic static String getSupportedProtocols(String content_type)\n\
    ```\n\nYou can find out the content types for a given protocol, or the protocols\
    \ for a given content. If you supply `null` to either of these methods, you'll\
    \ get a complete list of supported content types or protocols.\n\nThe MIDlet in\
    \ [Listing 12-3](#LiB0098.html#ch12list03) finds all supported content types and\
    \ prints out the corresponding protocols for each.\n\n**Listing 12-3: Examining\
    \ Content Types and Protocols at Runtime**\n\n```\nimport javax.microedition.lcdui.*;\n\
    import javax.microedition.midlet.*;\nimport javax.microedition.media.*;\n\npublic\
    \ class MediaInformationMIDlet\n    extends MIDlet\n    implements CommandListener\
    \ {\n  private Form mInformationForm;\n\n  public void startApp() {\n    if (mInformationForm\
    \ == null) {\n      mInformationForm =\n          new Form(\"Content types and\
    \ protocols\");\n      String[] contentTypes =\n          Manager.getSupportedContentTypes(null);\n\
    \      for (int i = 0; i < contentTypes.length; i++) {\n        String[] protocols\
    \ =\n            Manager.getSupportedProtocols(contentTypes[i]);\n        for\
    \ (int j = 0; j < protocols.length; j++) {\n          StringItem si = new StringItem(contentTypes[i]\
    \ + \": \",\n              protocols[j]);\n          si.setLayout(Item.LAYOUT_NEWLINE_AFTER);\n\
    \          mInformationForm.append(si);\n        }\n      }\n      Command exitCommand\
    \ = new Command(\"Exit\", Command.EXIT, 0);\n      mInformationForm.addCommand(exitCommand);\n\
    \      mInformationForm.setCommandListener(this);\n    }\n    Display.getDisplay(this).setCurrent(mInformationForm);\n\
    \  }\n\n  public void pauseApp() {}\n\n  public void destroyApp(boolean unconditional)\
    \ {}\n\n  public void commandAction(Command c, Displayable s) {\n    notifyDestroyed();\n\
    \  }\n}\n```\n\n[Figure 12-4](#LiB0098.html#ch12fig04) shows the results if you\
    \ run `MediaInformationMIDlet` on the J2ME Wireless Toolkit emulator (in the 2.0\
    \ beta 2 release). There are three things to understand about this list:\n\n1.\
    \ HTTP is a file transfer protocol, not a streaming media protocol. If you specify\
    \ a media file with HTTP, the whole file will be downloaded before playback begins.\
    \ By contrast, some devices may support real streaming protocols like RTP (see\
    \ [http://www.ietf.org/rfc/rfc1889.txt](http://www.ietf.org/rfc/rfc1889.txt)).\n\
    \n2. The `\"audio/x-tone-seq\"` content type is not really sampled audio; it's\
    \ a special case for tone sequences, which I'll describe soon.\n\n3. The list\
    \ includes some features and content types (video, MIDI, audio capture) from the\
    \ wireless toolkit's MMAPI implementation. If you want to see a bare-bones list\
    \ of supported content types and protocols, turn off the MMAPI support as described\
    \ near the end of this chapter.\n\n![Figure 12-4: MediaInformationMIDlet running\
    \ on the toolkit's 2.0 beta2 emulator](fig246_01.jpg)\n\nTo find out the content\
    \ type of an existing `Player`, just call `getContentType()`.\n\n## Player Life\
    \ Cycle\n\nBecause playing audio may use scarce resources on a MIDP device, and\
    \ because sampled audio files are relatively large, `Player` has a detailed life\
    \ cycle that allows its behavior to be closely controlled. The life cycle is described\
    \ in terms of *states,* represented by constants in the `Player` interface. The\
    \ usual order of states in the `Player`'s life cycle is as follows:\n\n- A `Player`\
    \ begins its life as `UNREALIZED`. This means that a `Player` implementation has\
    \ been created, but it hasn't tried to find the audio data it's supposed to render,\
    \ and it hasn't tried to acquire resources like the audio hardware.\n\n- A `Player`\
    \ becomes `REALIZED` after it locates the media data, for example by initiating\
    \ a network connection and sending headers.\n\n- The next state, `PREFETCHED`,\
    \ means the `Player` has done everything else it needed to do to get ready to\
    \ start rendering audio. This might include obtaining control of the audio hardware,\
    \ filling up buffers, or other operations.\n\n- When the `Player` has begun rendering\
    \ audio data, it is in the `STARTED` state.\n\n- One final state, `CLOSED`, indicates\
    \ that the `Player` has released all resources, shut down all network connections,\
    \ and cannot be used again.\n\n- `Player` contains a corresponding set of methods\
    \ that move from state to state:\n\n```\npublic void prefetch()\npublic void realize()\n\
    public void start()\n```\n\nThese methods work as you'd expect, for the most part.\
    \ If you skip a step, the intervening states are implied. In the example above,\
    \ I call `start()` on a freshly created `Player`, which implies calls to `prefetch()`\
    \ and `realize()`.\n\nIf anything goes wrong with locating the media data or acquiring\
    \ system resources, these methods throw a `MediaException`.\n\nSeveral other methods\
    \ allow for backward state transitions, although their names are not as intuitive.\
    \ The `stop()` method takes a `STARTED` `Player` back to `PREFETCHED`. The `deallocate()`\
    \ method moves a `PREFETCHED` or `STARTED` `Player` back to the `REALIZED` state\
    \ by releasing resources. The `deallocate()` method has one additional wrinkle;\
    \ it will take an `UNREALIZED` `Player` that is stuck trying to locate its media\
    \ (in the middle of `realize()`) back to the `UNREALIZED` state.\n\nFinally, the\
    \ `close()` method moves a `Player` in any state to `CLOSED`. All resources are\
    \ released, all network connections are closed, and the `Player` cannot be used\
    \ again.\n\nYou may retrieve the `Player`'s current state by calling `getState()`.\n\
    \nNow that you understand `Player`'s life cycle, you can probably imagine ways\
    \ to improve on the simple `AudioMIDlet` presented above. You might, for example,\
    \ call `prefetch()` on the newly created `Player` to ensure that playback could\
    \ begin as soon as possible after the user selects the **Play** command. You might\
    \ not have noticed much of delay, but a real device will perform much slower:\n\
    \n- Your desktop computer running the emulator has a lot more processing power\
    \ and memory than a MIDP device.\n\n- The emulator on your desktop probably has\
    \ a much faster network connection than a real MIDP device.\n\n- The file `relax.wav`\
    \ that is used by `AudioMIDlet` is very small (1530 bytes). A larger media file\
    \ would produce more noticeable delays.\n\nAs with network and persistent storage\
    \ operations, any time-consuming operations with a `Player` should be performed\
    \ in a thread that is separate from the user interface thread. Although the `start()`\
    \ method does not block, both `realize()` and `prefetch()` will not return until\
    \ they have finished their potentially slow work."
