    \ = new XmlParser(in);\nParseEvent pe = null;\nwhile ((pe = p.read()) != null)\
    \ {\n  ; // Process the event.\n  if (pe.getType() == org.kxml.Xml.END_DOCUMENT)\n\
    \    break;\n}\n```\n\nParseEvent has a type property (returned by getType())\
    \ that will be one of the constants defined in the org.kxml.Xml class. ParseEvent\
    \ also has various subclasses that represent some of the event types. However,\
    \ downcasting will rarely be necessary because ParseEvent already contains most\
    \ of the methods you need for accessing data.\n\nIn the previous sample code,\
    \ I've explicitly tested for an END_DOCUMENT event type that signals that the\
    \ parser is finished.\n\nFor a practical example of XML parsing from a MIDlet,\
    \ see the PeekAndPick application at [http://wireless.java.sun.com/applications/peekandpick/2.0/](http://wireless.java.sun.com/applications/peekandpick/2.0/).\
    \ This application parses RSS files (XML documents) that represent news feeds\
    \ and displays the results on the MIDP device.\n\n## Porting Techniques\n\nIf\
    \ you do decide to port one of the parsers that doesn't build in MIDP out of the\
    \ box, there are several techniques you may wish to consider:\n\n*   Dump features\
    \ you don't need. If the parser code is modularized well, you may be able to remove\
    \ entire subdirectories of the source code, assuming you don't need those features\
    \ in your application. You might, for example, be able to drop off a package that\
    \ puts a SAX interface on top of the parser or a WAP support package.\n\n*   Parsers\
    \ often won't compile because they use classes from J2SE that aren't present in\
    \ MIDP. One way to fix this is to supply the missing J2SE classes. There are two\
    \ challenges with this approach. First, there are legal restrictions on the use\
    \ of J2SE source code. See the source license for the full details. You can work\
    \ around this by supplying your own implementation. The second problem is that\
    \ MIDP implementations won't load classes defined in the java.* and javax.* namespaces.\
    \ You can work around this problem using an obfuscator that renames the classes\
    \ into different packages. ([Chapter 15](#LiB0118_split_000.html#623) has some\
    \ more details on this.)\n\n*   A cleaner option is to use classes in the same\
    \ package or inner classes to replace the missing pieces of J2SE.\n\n## Using\
    \ Parsers in the J2ME Wireless Toolkit\n\nIncorporating a parser into your MIDlet\
    \ suite is surprisingly easy. If a compiled JAR or ZIP file of classes is available,\
    \ you can drop it into the *lib* directory of your project. For example, if the\
    \ J2ME Wireless Toolkit is installed in */WTK20,* your project is called *ParseProject,*\
    \ and you're using kXML 1.21, then you would install the *kxml-min.zip* archive\
    \ into */WTK20/apps/ParseProject/lib.*\n\nOn the other hand, if the source code\
    \ of the parser is available, you can simply drop it into the *src* directory\
    \ of your project.\n\nYou will probably want to use an obfuscator to reduce the\
    \ size of your MIDlet suite JAR. It's a good idea to use an obfuscator whenever\
    \ you add a third-party library to your application. A good obfuscator will remove\
    \ methods and classes that you are not using in your code, which can result in\
    \ significant size savings.\n\n## Summary\n\nThe world of XML on small devices\
    \ is wild and untamed. Bold developers can parse XML in a MIDP environment using\
    \ one of the parsers described in this chapter. As a means of transmitting data\
    \ from server to client, XML is a great choice. Just remember to keep those documents\
    \ small and simple.\n\n# Chapter 15: Protecting Network Data\n\nMIDlets are undeniably\
    \ cool—Java code that runs on a small device, and HTTP network connectivity, as\
    \ well. But once you start thinking about the possibilities, you realize that\
    \ a lot of applications just aren't possible without some form of data security.\
    \ What if you were going to buy something? You shouldn't send credit card numbers\
    \ over the Internet without some kind of protection, and you shouldn't be sending\
    \ sensitive corporate information over the Internet to small devices. Many applications,\
    \ then, need something else—something that keeps sensitive data from being stolen.\
    \ The answer in the MIDP world is no different than the answer anywhere else:\
    \ cryptography.\n\n## Cryptography Review\n\n*Cryptography* is a branch of mathematics.\
    \ It's based on the idea that certain kinds of mathematical problems are hard\
    \ to solve. Using cryptography is a bit speculative; as research in mathematics\
    \ continues, it's very possible that someone will discover a way to solve (or\
    \ \"break\") most of the modern cryptographic algorithms. Nevertheless, for today\
    \ at least, cryptography provides protection for sensitive data, and there aren't\
    \ many acceptable alternatives in the everything-connects-to-everything modern\
    \ world.\n\n### The Internet is a Big Room\n\nThere are many aspects to the security\
    \ of a system. We'll focus on the data your MIDlet sends and receives over the\
    \ network. This data travels over some infrastructure we know nothing about (provided\
    \ by your mobile carrier) and probably over the Internet, as well. The Internet\
    \ is definitely not a secure network, and your carrier's mobile infrastructure\
    \ probably isn't either. If you're passing sensitive data around, it's very possible\
    \ that eavesdroppers at various points in the network can listen in on the data.\
    \ They may even be able to change parts of it. If your MIDP application involves\
    \ passing around credit card numbers or sensitive corporate data, you should be\
    \ concerned.\n\nThink of the Internet as a big room. You can talk to anyone else\
    \ in the room, but everyone else can listen in on the conversation. Furthermore,\
    \ you may be talking to someone on the other side of the room through intermediaries,\
    \ like the children's game of \"telephone.\" Any one of the intermediaries might\
    \ be changing the conversation, and they can all hear what you're saying."
  trans: "\n## 使用 kXML 1.21\n\n目前，kXML 1.21 是最完善且支持度最好的解析器。它最初由德国多特蒙德大学开发，现已成为 Enhydra\
    \ 网站的一部分。该解析器基于通用 XML（[`simonstl.com/articles/cxmlspec.txt`](http://simonstl.com/articles/cxmlspec.txt)），这是一套关于使用\
    \ XML 1.0 的建议规范。通用 XML 定义了一组核心的 XML 功能，与其说它是一个规范，不如说是一种理念。\n\nkXML 专为 CLDC 和 MIDP\
    \ 等 KVM 环境设计。在本章介绍的所有解析器中，kXML 是少数几个无需修改即可在 MIDP 环境中编译的解析器之一。它的体积也相对较大；如果你担心内存问题，可能需要考虑其他体积更小的解析器。另一方面，使用混淆器可以显著减小代码体积，特别是当你的应用程序中未使用解析器\
    \ API 的某些部分时。\n\nkXML 实现了一个基于拉取（pull）的解析器，遵循 XmlPull 标准，包含在 `org.kxml.parser`\
    \ 包中。*基于拉取*意味着你指示解析器逐个解析每个元素。相比之下，SAX 解析器会一次性解析整个文档，并在事件发生时通知你。\n\nkXML 的大部分解析器功能都在\
    \ `AbstractXmlParser` 类中定义。在你的代码中，你将使用具体的 `XMLParser` 子类。基本思路是实例化一个 `XMLParser`，并传入一个代表待解析数据的\
    \ `java.io.Reader`。然后重复调用 `read()` 方法，处理每个元素，直到文档结束。`read()` 返回一个 `ParseEvent`，它可以表示开始标签、元素文本或其他解析器事件。在\
    \ MIDlet 代码中，大致如下所示：\n\n```\n// InputStream rawIn = ...\nReader in = new InputStreamReader(rawIn);\n\
    AbstractXmlParser p = new XmlParser(in);\nParseEvent pe = null;\nwhile ((pe =\
    \ p.read()) != null) {\n  ; // 处理事件。\n  if (pe.getType() == org.kxml.Xml.END_DOCUMENT)\n\
    \    break;\n}\n```\n\n`ParseEvent` 有一个类型属性（通过 `getType()` 返回），该属性将是 `org.kxml.Xml`\
    \ 类中定义的常量之一。`ParseEvent` 也有各种子类来表示某些事件类型。然而，通常不需要向下转型，因为 `ParseEvent` 已经包含了访问数据所需的大部分方法。\n\
    \n在上面的示例代码中，我显式地测试了 `END_DOCUMENT` 事件类型，该类型表示解析器已完成解析。\n\n有关从 MIDlet 解析 XML 的实际示例，请参阅\
    \ [`wireless.java.sun.com/applications/peekandpick/2.0/`](http://wireless.java.sun.com/applications/peekandpick/2.0/)\
    \ 上的 PeekAndPick 应用程序。该应用程序解析代表新闻源的 RSS 文件（XML 文档），并在 MIDP 设备上显示结果。\n\n## 移植技术\n\
    \n如果你决定移植一个不能直接在 MIDP 中构建的解析器，可以考虑以下几种技术：\n\n*   移除不需要的功能。如果解析器代码模块化良好，并且你的应用程序不需要这些功能，你可以删除源代码的整个子目录。例如，你可以移除一个在解析器之上提供\
    \ SAX 接口的包，或者一个 WAP 支持包。\n\n*   解析器通常无法编译，因为它们使用了 J2SE 中但 MIDP 中没有的类。解决这个问题的一种方法是提供缺失的\
    \ J2SE 类。这种方法有两个挑战。首先，使用 J2SE 源代码存在法律限制。详情请参阅源代码许可协议。你可以通过提供自己的实现来解决这个问题。第二个问题是\
    \ MIDP 实现不会加载在 `java.*` 和 `javax.*` 命名空间中定义的类。你可以使用混淆器将类重命名到不同的包中来解决这个问题。（第 15\
    \ 章对此有更详细的介绍。）\n\n*   一个更简洁的选择是使用同一包中的类或内部类来替换 J2SE 中缺失的部分。\n\n## 在 J2ME Wireless\
    \ Toolkit 中使用解析器\n\n将解析器集成到你的 MIDlet 套件中出奇地简单。如果有编译好的类 JAR 或 ZIP 文件，你可以将其放入项目的\
    \ *lib* 目录中。例如，如果 J2ME Wireless Toolkit 安装在 */WTK20*，你的项目名为 *ParseProject*，并且你使用的是\
    \ kXML 1.21，那么你需要将 *kxml-min.zip* 文件安装到 */WTK20/apps/ParseProject/lib* 目录下。\n\n\
    另一方面，如果有解析器的源代码，你可以直接将其放入项目的 *src* 目录中。\n\n你可能希望使用混淆器来减小 MIDlet 套件 JAR 的大小。每当向应用程序添加第三方库时，使用混淆器都是一个好主意。一个好的混淆器会移除代码中未使用的方法和类，从而显著节省空间。\n\
    \n## 总结\n\n小型设备上的 XML 世界广阔且尚未定型。勇敢的开发者可以使用本章描述的解析器之一，在 MIDP 环境中解析 XML。作为从服务器向客户端传输数据的一种方式，XML\
    \ 是一个绝佳的选择。只需记住保持文档小巧简洁即可。\n\n# 第 15 章：保护网络数据\n\nMIDlet 无疑很酷——在小型设备上运行的 Java 代码，以及\
    \ HTTP 网络连接。但一旦你开始思考各种可能性，就会意识到如果没有某种形式的数据安全，许多应用程序根本无法实现。如果你要购买东西怎么办？你不应该在没有任何保护的情况下通过互联网发送信用卡号，也不应该将敏感的公司信息通过互联网发送到小型设备。因此，许多应用程序需要别的东西——一种防止敏感数据被盗的方法。在\
    \ MIDP 世界中，答案与其他地方并无不同：密码学。\n\n## 密码学回顾\n\n*密码学*是数学的一个分支。它基于这样一种理念：某些类型的数学问题很难解决。使用密码学有点推测性；随着数学研究的继续，很可能有人会发现一种方法来解决（或“破解”）大多数现代密码算法。尽管如此，至少在当今，密码学为敏感数据提供了保护，在这个万物互联的现代世界中，没有太多可接受的替代方案。\n\
    \n### 互联网是一个大房间\n\n系统的安全性涉及许多方面。我们将重点关注你的 MIDlet 通过网络发送和接收的数据。这些数据通过我们一无所知的某些基础设施（由你的移动运营商提供）传输，并且很可能也通过互联网传输。互联网绝对不是一个安全的网络，你的运营商的移动基础设施可能也不安全。如果你在传输敏感数据，网络中各处的窃听者很可能监听这些数据。他们甚至可能修改其中的部分内容。如果你的\
    \ MIDP 应用程序涉及传输信用卡号或敏感的公司数据，你应该对此保持警惕。\n\n把互联网想象成一个巨大的房间。你可以与房间里的任何人交谈，但其他每个人都能听到你们的对话。此外，你可能通过中间人与房间另一侧的人交谈，就像孩子们玩的“传话”游戏一样。任何一个中间人都可能改变对话内容，而且他们都能听到你在说什么。\n"
- fmt: '### Data Security Needs and Cryptographic Solutions


    Your applications will have some or all of the following data security needs:


    - **Integrity**. At the simplest level, you''d like to be sure that the data you''re
    sending is not getting changed or corrupted in any way. This is data integrity.

    - **Authentication**. It''s often important to verify the identity of the machine
    or person on the other end of your network connection. Authentication is the process
    of proving identity.

    - **Confidentiality**. If you''re sending sensitive data over the network, other
    people shouldn''t be able to see that information. This is confidentiality.


    Cryptography provides solutions for each of these needs:


    - **Message digests**. A message digest smushes a large piece of data into a small
    piece of data. You might, for example, run an entire file through a message digest
    to end up with a 160-bit digest value. If you change even 1 bit of the file and
    run it through the message digest again, you''ll get an entirely different digest
    value. A message digest value is sometimes called a *digital fingerprint*.

    - **Digital signatures**. A digital signature is like a message digest except
    it is produced by a particular person, the *signer*. The signer must have a *private
    key* that is used to create the signature. A corresponding *public key* can be
    used by anyone to verify that the signature came from the signer. The private
    key and public key together are called a *key pair*. Keys are really just data—think
    of an array of bytes. *Certificates* are really just an extension of digital signatures.
    A certificate is a document, signed by some authority like the U.S. Postal Service,
    that proves your identity. It''s like a driver''s license, except it''s based
    on digital signatures.

    - **Ciphers**. Ciphers can either encrypt data or decrypt it. An encrypting cipher
    accepts your data, called *plaintext*, and produces an unreadable mess, called
    *ciphertext*. A decrypting cipher takes ciphertext and converts it back to plaintext.
    Ciphers use keys; if you encrypt the same plaintext with two different keys, you''ll
    get two different sets of ciphertext. A *symmetric* cipher uses the same key for
    encryption and decryption. An *asymmetric* cipher operates with a key pair—one
    key is used for encrypting, while the matching key is used for decrypting.


    Ciphers operate in different *modes* that determine how plaintext is encrypted
    into ciphertext. This, in turn, affects the use and security of the cipher.


    | Note | For comprehensive coverage of cryptographic concepts and algorithms,
    see Bruce Schneier''s *Applied Cryptography: Protocols, Algorithms, and Source
    Code in C* (John Wiley & Sons, 1995). To find out more about the JCA and JCE in
    J2SE, read my somewhat out-of-date *Java Cryptography* (O''Reilly, 1998). Sun''s
    Wireless Developer web site also contains my four-part series on security and
    cryptography in MIDP, located at [http://wireless.java.sun.com/midp/articles/security1/](http://wireless.java.sun.com/midp/articles/security1/).
    |


    ## HTTPS is Almost Everything You Could Want


    The Generic Connection Framework has always been flexible enough to allow MIDP
    implementations to include support for HTTPS, which is HTTP over a secure connection
    like TLS or SSL. Starting with MIDP 2.0, support for HTTPS is now built into the
    MIDP platform. (See [Chapter 9](#LiB0063_split_000.html#351) for the skinny on
    HTTPS and its supporting APIs.)


    TLS provides server authentication and an encrypted data connection between client
    and server. The security provided by TLS is sufficient for most applications.
    There are only a handful of reasons you might want to implement cryptographic
    solutions beyond what''s available from TLS, including the following:


    - **Client authentication.** TLS provides server authentication, usually via an
    RSA certificate. But although TLS will support client authentication, the APIs
    in MIDP 2.0 don''t allow you to take advantage of this feature. A technique for
    using password or passphrase authentication is presented later in this chapter.
    If you''re looking for something stronger, a scheme based on client certificates
    and signatures is described at [http://wireless.java.sun.com/midp/articles/security3/](http://wireless.java.sun.com/midp/articles/security3/).

    - **Stronger encryption.** TLS usually results in encryption using 128-bit keys
    that are valid for a particular session. (Although you can''t control which cipher
    suites are accepted on the client, you will probably have control of the server
    and will be able to configure acceptable cipher suites there.) For many applications,
    128-bit session keys provide plenty of data security. However, if your application
    deals with especially sensitive or valuable data, you might want something stronger.

    - **Message-driven applications.** HTTPS only provides encryption for channels.
    Some applications work by sending encrypted messages over insecure transport like
    HTTP or sockets. Here the MIDP APIs are insufficient and you''ll need to do your
    own cryptography.


    As I said, HTTPS support in MIDP 2.0 is all you need for many applications. Read
    on if you need something stronger, or if you''re just curious.


    More information about HTTPS and TLS in MIDP is at [http://wireless.java.sun.com/midp/articles/security2/](http://wireless.java.sun.com/midp/articles/security2/).


    ## The Bouncy Castle Cryptography Package


    In the J2SE world, Sun provides support for cryptography through the Java Cryptography
    Architecture (JCA) and the Java Cryptography Extension (JCE). The problem, of
    course, is that the JCA and JCE are too heavy for the MIDP platform. MIDP 2.0''s
    HTTPS support is very useful, but it''s definitely not a general-purpose cryptography
    toolkit.


    If you''re looking to move beyond HTTPS, your best bet is the Bouncy Castle cryptography
    package, an open-source effort based in Australia. It''s a wonderful piece of
    work, featuring a clean API and a formidable toolbox of cryptographic algorithms.
    There are several other open source cryptography packages around the world, but
    Bouncy Castle specifically offers a lightweight J2ME distribution of their software.
    To download the package, go to [http://www.bouncycastle.org/](http://www.bouncycastle.org/),
    follow the link for **latest releases**, and choose the **J2ME** release. As I
    write this, the current version is 1.17.


    Download the zip file into the location of your choice and unpack it. If you''re
    using the J2ME Wireless Toolkit, just drop the `midp_classes.zip` file into the
    `lib` directory of your project. You can go ahead and write MIDlets that use the
    Bouncy Castle packages.


    ## Protecting Passwords with a Message Digest


    Having installed the Bouncy Castle cryptography package, let''s try a simple example
    involving authentication. Computer systems often use passwords instead of digital
    signatures (or certificates) because they''re so much easier. A password is a
    *shared secret*, which means that you know it and the server knows it, but nobody
    else should know it.


    **What If Someone Steals Your Phone?**


    For convenience, an application will probably store your password in persistent
    storage. This is a conscious trade-off of security for usability. The user never
    enters a password, but the password is available in device storage, vulnerable
    to theft by other applications on the device. Furthermore, if someone steals the
    device itself, they''ll be able to use the application without being challenged
    for a password.


    JSR 177, Security and Trust Services for J2ME ([http://jcp.org/en/jsr/detail?id=177](http://jcp.org/en/jsr/detail?id=177))
    will address these concerns by providing an API to secure storage, among other
    things.'
