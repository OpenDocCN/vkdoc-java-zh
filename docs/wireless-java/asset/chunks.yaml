  trans: "\n## 多线程与动画\n\n与任何图形界面工具包一样，在 MIDP 用户界面类中使用线程需要格外小心。用户界面实现拥有自己的线程，负责处理用户界面方法和屏幕绘制。例如，当用户在设备上按下某个按键时，实现会调用你的\
    \ `Canvas` 子类中的 `keyPressed()` 方法。调用此方法的线程属于 MIDP 实现。因此，需要谨慎处理。在 MIDP 实现中，调用事件方法的同一个线程也会调用\
    \ `paint()`。\n\n|  | 注意 | 所有事件驱动的用户界面工具包都有这种系统拥有的用户界面线程的概念。在 AWT 和 Swing 中，它被称为*事件分发线程*。同样的规则适用：如果你在一个不属于你的线程中运行，不要占用它太久。\
    \ |\n\n由不属于你的线程调用的方法称为*回调*。对于回调的经验法则是，你不应该执行任何耗时很长的操作。由于该线程不属于你，你不应该长时间占用它来执行你的工作。因为这个线程负责操作用户界面，用冗长的计算占用它会让你应用程序看起来像被切除了脑叶。例如，假设你需要从网络检索一些数据。作为对某个命令的响应，你可能会这样做：\n\
    \n```\npublic void commandAction(Command c, Displayable s) {\n  if (c == mNetworkCommand)\
    \ {\n    // 创建一个进度屏幕，progressScreen。\n    mDisplay.setCurrent(progressForm);\n\
    \    // 现在执行网络操作。\n    // 糟糕！用户永远看不到 progressScreen。\n  }\n  // ...\n}\n```\n\n\
    问题在于进度屏幕将不会被显示。`commandAction()` 方法是从用户界面线程调用的，也就是负责绘制屏幕的同一个线程。如果你用自己的一些耗时处理占用了这个线程，用户界面线程就永远没有机会更新屏幕。如果你需要执行一些耗时操作，请为其创建一个单独的线程。例如，在第\
    \ 2 章 的 Jargoneer 示例中，网络访问是在一个单独的线程中执行的。\n\n在某些情况下，你需要请求用户界面线程代表你执行代码。例如，如果你正在显示一个动画，你需要确保动画的帧与重绘周期正确同步。否则，你最终很可能会显示部分绘制的帧。\n\
    \n`Display` 提供了一种在用户界面线程中执行你的代码的机制。它有一个方法 `callSerially()`，接受一个 `Runnable` 对象。当用户界面线程准备就绪时，即当它完成所有重绘请求的服务后，它将从用户界面线程执行该\
    \ `Runnable` 的 `run()` 方法。一个典型的动画看起来像这样：\n\n```\npublic class AnimationCanvas\n\
    \    extends Canvas\n    implements Runnable {\n  public start() {\n    run();\n\
    \  }\n\npublic void paint(Graphics g) {\n    // 绘制动画的一帧。\n  }\n  public void run()\
    \ {\n    // 更新我们的状态。\n    // 现在请求绘制新帧。\n    repaint();\n    Display.callSerially(this);\n\
    \  }\n}\n```\n\n你可以通过调用 `start()` 来启动动画，而 `start()` 又会简单地调用 `run()`。在 `run()`\
    \ 内部，我们更新状态并调用 `repaint()` 来请求绘制新帧。然后我们使用 `callSerially()` 来请求在绘制完成后再次被调用。\n\n\
    这种技术产生的动画会以设备允许的最快速度运行。然而，许多应用程序需要在不同设备上提供一致的体验。在这些情况下，使用具有一致帧延迟的独立动画线程更有意义。下面的示例演示了这种技术。它包含两个类：`Sweep`\
    \ 和 `SweepCanvas`。`Sweep` 是一个 MIDlet，它显示实际实现动画的类 `SweepCanvas`。正在运行的 `SweepCanvas`\
    \ 如图 10-9 所示。\n\n![](img/fig208_01.jpg)\n图 10-9：在灰度模拟器上运行的 *SweepCanvas* 动画\n\n\
    首先，这是 `Sweep` 的源代码：\n\n```\nimport javax.microedition.lcdui.*;\nimport javax.microedition.midlet.*;\n\
    \npublic class Sweep\n    extends MIDlet {\n  public void startApp() {\n    final\
    \ SweepCanvas sweeper = new SweepCanvas();\n    sweeper.start();\n    sweeper.addCommand(new\
    \ Command(\"退出\", Command.EXIT, 0));\n    sweeper.setCommandListener(new CommandListener()\
    \ {\n      public void commandAction(Command c, Displayable s) {\n        sweeper.stop();\n\
    \        notifyDestroyed();\n      }\n    });\n\nDisplay.getDisplay(this).setCurrent(sweeper);\n\
    \  }\n\npublic void pauseApp() {}\n\npublic void destroyApp(boolean unconditional)\
    \ {}\n}\n```\n\n这是 `SweepCanvas` 的代码：\n\n```\nimport javax.microedition.lcdui.*;\n\
    \npublic class SweepCanvas\n    extends Canvas\n    implements Runnable {\n  private\
    \ boolean mTrucking;\n  private int mTheta;\n  private int mBorder;\n  private\
    \ int mDelay;\n\npublic SweepCanvas() {\n    mTheta = 0;\n    mBorder = 10;\n\
    \    mDelay = 50;\n  }\n\npublic void start() {\n    mTrucking = true;\n    Thread\
    \ t = new Thread(this);\n    t.start();\n  }\n\npublic void stop() {\n    mTrucking\
    \ = false;\n  }\n  public void paint(Graphics g) {\n    int width = getWidth();\n\
    \    int height = getHeight();\n\n// 清除 Canvas。\n    g.setGrayScale(255);\n  \
    \  g.fillRect(0, 0, width - 1, height - 1);\n\nint x = mBorder;\n    int y = mBorder;\n\
    \    int w = width - mBorder * 2;\n    int h = height - mBorder * 2;\n    for\
    \ (int i = 0; i < 8; i++) {\n      g.setGrayScale((8 - i) * 32 - 16);\n      g.fillArc(x,\
    \ y, w, h, mTheta + i * 10, 10);\n      g.fillArc(x, y, w, h, (mTheta + 180) %\
    \ 360 + i * 10, 10);\n    }\n  }\n\npublic void run() {\n    while (mTrucking)\
    \ {\n      mTheta = (mTheta + 1) % 360;\n      repaint();\n      try { Thread.sleep(mDelay);\
    \ }\n      catch (InterruptedException ie) {}\n    }\n  }\n}\n```\n\nMIDP 2.0\
    \ 中的 Game API 为运行动画提供了另一种选择。在下一章中，你将看到如何使用 `GameCanvas` 实现 Sweep 的简单动画。\n\n##\
    \ 总结\n\n本章我们涵盖了很多内容。`Canvas` 类为游戏或其他要求苛刻的应用程序提供了低级接口。你可以使用 `Graphics` 类在 `Canvas`\
    \ 上绘制形状、文本和图像。此外，你可以接收关于按键和指针事件的详细输入信息。游戏动作是一种基于按键事件的简单通用输入方法。最后，你应该理解与重绘和事件回调相关的多线程问题。耗时处理应放在单独的线程中，以免导致系统拥有的用户界面线程陷入停滞。动画可以使用\
    \ `Display` 的 `callSerially()` 方法与用户界面线程同步，尽管更常见的是使用单独的动画线程来实现。下一章将详细介绍 MIDP 2.0\
    \ 的新 Game API。\n\n# 第 11 章：Game API\n\nMIDP 2.0 的许多新特性旨在使 MIDP 成为对游戏有吸引力的平台，而游戏是消费级\
    \ J2ME 软件的先锋。你已经了解了一些新特性：RGB 图像和 Canvas 中的位块传输是两个很好的例子。在下一章中，你将了解 MIDP 2.0 对多媒体的支持。本章介绍新的\
    \ Game API，它简化了 2D 游戏的编写。\n"
- fmt: "# Overview\n\nThe Game API builds on the `Canvas` and `Graphics` classes you\
    \ read about in [Chapter 10](#LiB0075_split_000.html#408). The entire API is composed\
    \ of five classes in the `javax.microedition.lcdui.game` package. One class, `GameCanvas`,\
    \ provides methods for animation and key polling. The other four classes deal\
    \ with *layers*, which can be used to compose scenes from several different elements.\n\
    \n`GameCanvas` offers two main advantages over `Canvas`. First, your application\
    \ has control over exactly *when* the display is updated, instead of having to\
    \ wait for the system software to call `paint()`. Second, you can control what\
    \ region of the screen is updated. `GameCanvas` gives your application very specific\
    \ control of display updates.\n\n# Driving Animation with GameCanvas\n\n`GameCanvas`\
    \ extends `javax.microedition.lcdui.Canvas` with methods for animation and key\
    \ state polling. `GameCanvas` is used differently than `Canvas`:\n\n*   To use\
    \ `Canvas`, you subclass it and define the `paint()` method. Inside `paint()`,\
    \ you use a `Graphics` to render graphics on the screen. When you change something\
    \ and want to update the screen, you call `repaint()` and the system calls `paint()`\
    \ again for you.\n\n*   To use `GameCanvas`, you subclass it. To draw on the screen,\
    \ you use the `Graphics` returned from `getGraphics()`. When you want updates\
    \ to appear on the screen, call `flushGraphics()`, which does not return until\
    \ the screen is updated. For more specific updates, use the method `flushGraphics(int\
    \ x, int y, int width, int height)`, which only updates a region of the screen.\n\
    \n    ```\n    public void flushGraphics(int x, int y, int width, int height)\n\
    \    ```\n\n`GameCanvas`'s model of use makes it easy to use it inside a game\
    \ loop like this:\n\n```\nGraphics g = getGraphics();\nwhile(true) {\n  // Check\
    \ for user input.\n  // Update game state.\n  // Draw stuff using g.\n  flushGraphics();\n\
    }\n```\n\nTo subclass `GameCanvas`, you need to call its protected constructor\
    \ from your subclass's constructor. This constructor accepts a single boolean\
    \ argument, which indicates whether the normal key event mechanism should be suppressed\
    \ for the `GameCanvas` instance. The normal key event mechanism refers to the\
    \ callback mechanism of `keyPressed()`, `keyReleased()`, and `keyRepeated()`.\
    \ Suppressing the normal mechanism may result in better performance. `GameCanvas`\
    \ provides an alternate method for responding to key events, which is detailed\
    \ in the [next section](#LiB0087.html#479).\n\nTo show how `GameCanvas` works\
    \ for drawing, I'll rewrite the `SweepCanvas` example from [Chapter 10](#LiB0075_split_000.html#408)\
    \ using `GameCanvas`. Note that the subclass no longer overrides `paint()`. All\
    \ the action happens in `run()`, which is executed in a separate thread that drives\
    \ the animation. The `run()` method calls `render()`, which does the actual drawing\
    \ (and is identical to the old `paint()`).\n\nListing 11-1: Using `GameCanvas`\
    \ for Animation\n\n| **![Start example](_1.gif)** |\n\n```\nimport javax.microedition.lcdui.*;\n\
    import javax.microedition.lcdui.game.*;\n\npublic class SweepGameCanvas\n    extends\
    \ GameCanvas\n    implements Runnable {\nprivate boolean mTrucking;\nprivate int\
    \ mTheta;\nprivate int mBorder;\nprivate int mDelay;\n  public SweepGameCanvas()\
    \ {\n    super(true);\n    mTheta = 0;\n    mBorder = 10;\n    mDelay = 50;\n\
    \  }\n\n  public void start() {\n    mTrucking = true;\n    Thread t = new Thread(this);\n\
    \    t.start();\n  }\n\n  public void stop() {\n    mTrucking = false;\n  }\n\n\
    \  public void render(Graphics g) {\n    int width = getWidth();\n    int height\
    \ = getHeight();\n\n    // Clear the Canvas.\n    g.setGrayScale(255);\n    g.fillRect(0,\
    \ 0, width - 1, height - 1);\n\n    int x = mBorder;\n    int y = mBorder;\n \
    \   int w = width - mBorder * 2;\n    int h = height - mBorder * 2;\n    for (int\
    \ i = 0; i < 8; i++) {\n      g.setGrayScale((8 - i) * 32 - 16);\n      g.fillArc(x,\
    \ y, w, h, mTheta + i * 10, 10);\n      g.fillArc(x, y, w, h, (mTheta + 180) %\
    \ 360 + i * 10, 10);\n    }\n  }\n\n  public void run() {\n    Graphics g = getGraphics();\n\
    \    while (mTrucking) {\n      mTheta = (mTheta + 1) % 360;\n      render(g);\n\
    \      flushGraphics();\n      try { Thread.sleep(mDelay); }\n      catch (InterruptedException\
    \ ie) {}\n    }\n  }\n} \n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nI'll\
    \ assume you can write your own MIDlet to display `SweepGameCanvas`. If you've\
    \ downloaded the online examples, `SweepGame` is a MIDlet that displays `SweepGameCanvas`.\n\
    \n# Polling for Key States\n\n`GameCanvas` offers an alternate method for responding\
    \ to key presses, which are expected to be the way for the user to control the\
    \ game. Instead of passively waiting for the key event callbacks defined in `Canvas`,\
    \ `GameCanvas` offers a method that returns the current state of the keys:\n\n\
    ```\npublic int getKeyStates()\n```\n\nThis is attractive for games because it\
    \ gives your application more control. Instead of waiting for the system to invoke\
    \ the key callback methods in `Canvas`, you can immediately find out the state\
    \ of the device keys.\n\nThe returned integer uses one bit to represent each of\
    \ the nine game actions. A one bit indicates a key press, while a zero bit indicates\
    \ no key press. Each of the bits is represented by a constant in the `GameCanvas`\
    \ class as shown in [Table 11-1](#LiB0087.html#ch11table01).\n\nTable 11-1: Game\
    \ Action Bit Constants in `GameCanvas`\n\n| **GAMECANVAS BIT CONSTANTS** | **CORRESPONDING\
    \ CANVAS GAME ACTION CONSTANT** |\n| --- | --- |\n| `UP_PRESSED` | `UP` |\n| `DOWN_PRESSED`\
    \ | `DOWN` |\n| `LEFT_PRESSED` | `LEFT` |\n| `RIGHT_PRESSED` | `RIGHT` |\n| `FIRE_PRESSED`\
    \ | `FIRE` |\n| `GAME_A_PRESSED` | `GAME_A` |\n| `GAME_B_PRESSED` | `GAME_B` |\n\
    | `GAME_C_PRESSED` | `GAME_C` |\n| `GAME_D_PRESSED` | `GAME_D` |\n\nBy grabbing\
    \ the current state of the keys (a technique called *polling*), you can respond\
    \ to user actions within the game loop instead of relying on the event callback\
    \ methods, which run in a different thread. You could expand the example `GameCanvas`\
    \ loop presented above as follows to respond to key presses:\n\n```\nGraphics\
    \ g = getGraphics();\nwhile(true) {\n  // Check for user input.\n  int ks = getKeyStates();\n\
    \  if ((ks & UP_PRESSED) != 0)\n    moveUp();\n  else if ((ks & DOWN_PRESSED)\
    \ != 0)\n    moveDown();\n  // ...\n\n  // Update game state.\n  // Draw stuff\
    \ using g.\n  flushGraphics();\n}\n```\n\nIf you're still paying attention, you're\
    \ probably wondering what happens when the user presses and release a key between\
    \ the times when your application calls `getKeyStates()`. The key states are *latched*,\
    \ which means that a key press sets the corresponding bit and makes it stick until\
    \ the next call to `getKeyStates()`. Every time you call `getKeyStates()`, the\
    \ latched values are all cleared."
