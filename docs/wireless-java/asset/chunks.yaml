  trans: "\n## 自定义项绘制\n\n如你所见，自定义项在其 `paint()` 方法中绘制到屏幕上。该方法接收一个 `Graphics` 对象，该对象有两个用途。首先，它代表自定义项内容区域的绘制表面。其次，它提供了大量用于绘制形状、图像和文本的方法。我不会在第\
    \ 10 章之前介绍所有这些方法，但你将在本章的示例中看到其中几个：例如，`drawString()` 用于渲染文本，而 `drawLine()` 用于渲染直线。\n\
    \n`paint()` 方法是*回调*的一个示例，即由 MIDP 实现调用的代码中的方法。当实现需要在屏幕上显示你的自定义项时，它会调用 `paint()`。当包含自定义项的表单正在布局时，它会调用其他方法来获取组件的最小和首选尺寸。显示整个屏幕是实现的工作；它仅调用你的\
    \ `paint()` 方法来显示屏幕上由自定义项占据的部分。你无需告诉实现何时绘制你的项；只需告诉它你的项是表单的一部分，然后它会自行计算如何显示所有内容。\n\
    \n如果自定义项的外观需要更改，你可以通过调用 `repaint()` 方法来请求刷新。此方法向实现发出信号，表明你的项需要重新绘制。作为响应，实现将很快再次调用\
    \ `paint()` 方法。为了优化绘制，你可能只想重绘项的一部分。在这种情况下，请使用 `repaint(int x, int y, int width,\
    \ int height)` 来描述需要绘制的项的矩形区域。\n\n有两个方法可以返回有助于使项的外观与设备的外观和风格保持一致的信息。第一个是 `Display`\
    \ 类中的 `getColor()`。当你提供以下常量之一时，此方法返回一个表示颜色的 `int` 值：\n\n*   `COLOR_BACKGROUND`\n\
    *   `COLOR_BORDER`\n*   `COLOR_FOREGROUND`\n*   `COLOR_HIGHLIGHTED_BACKGROUND`\n\
    *   `COLOR_HIGHLIGHTED_BORDER`\n*   `COLOR_HIGHLIGHTED_FOREGROUND`\n\n例如，你可以使用以下代码将当前绘制颜色设置为系统的高亮前景色：\n\
    \n```\npublic void paint(Graphics g) {\n  // Display mDisplay = ...\n  int fhc\
    \ = mDisplay.getColor(\n      Display.COLOR_HIGHLIGHTED_FOREGROUND);\n  g.setColor(fhc);\n\
    \  // Draw stuff ...\n}\n```\n\n类似地，如果你希望自定义项绘制的任何文本与表单中的其他项协调一致，你可以使用 `Font`\
    \ 类中的以下方法检索合适的 `Font`：\n\n```\npublic static Font getFont(int fontSpecifier)\n\
    ```\n\n只需传递 `FONT_STATIC_TEXT` 或 `FONT_INPUT_TEXT`，此方法就会返回一个可用于绘制文本的合适 `Font`\
    \ 对象。以下代码展示了如何使用合适的字体绘制用户可编辑文本：\n\n```\npublic void paint(Graphics g) {\n  Font\
    \ f = Font.getFont(Font.FONT_INPUT_TEXT);\n  g.setFont(f);\n  // Draw text ...\n\
    } \n```\n\n我将在第 10 章中详细介绍 `Font`。简而言之，`Font` 决定了屏幕上绘制的文本的外观。\n\n## 显示、隐藏和调整大小\n\
    \n当自定义项变为可见（甚至部分可见）时，MIDP 实现会调用其 `showNotify()` 方法。你可以预期随后会调用 `paint()` 来渲染该项。类似地，当该项不再可见时（例如，用户已将该项滚动出屏幕），会调用\
    \ `hideNotify()`。\n\n自定义项的大小可能会被实现更改，例如，当包含的表单因内容变化而重新布局时。在这种情况下，会使用内容区域的新宽度和高度调用项的\
    \ `sizeChanged()` 方法。\n\n同样，你的自定义项可能决定需要更改大小。在这种情况下，你的项应调用 `invalidate()` 方法，该方法向实现发出信号，表明它可能需要重新布局包含的表单。\n\
    \n## 处理事件\n\n自定义项可以通过重写以下任意或所有方法来响应键盘和指针事件：\n\n```\nprotected void keyPressed(int\
    \ keyCode)\nprotected void keyReleased(int keyCode)\nprotected void keyRepeated(int\
    \ keyCode)\nprotected void pointerPressed(int x, int y)\nprotected void pointerReleased(int\
    \ x, int y)\nprotected void pointerDragged(int x, int y)\n```\n\n这些方法会响应用户的操作而被调用。`keyCode`\
    \ 参数很可能是 `Canvas` 类中定义的常量之一：`KEY_NUM0` 到 `KEY_NUM9`、`KEY_POUND` 或 `KEY_STAR`。`CustomItem`\
    \ 类还支持一种称为*游戏动作*的便捷机制，它将设备特定的键映射到设备无关的动作。`getGameAction()` 方法执行此映射。有关游戏动作的完整讨论，请参见第\
    \ 10 章。\n\n指针回调方法提供指针事件的位置，该位置是相对于自定义项内容区域的一对坐标。\n\n设备具有不同的能力，有些可能无法向自定义项传递某些类型的事件。例如，许多手机不支持指针事件。要在运行时了解设备的能力，自定义项使用\
    \ `getInteractionModes()` 方法。此方法返回以下常量（在 `CustomItem` 中定义）的某种组合：\n\n*   `KEY_PRESS`\n\
    *   `KEY_RELEASE`\n*   `KEY_REPEAT`\n*   `POINTER_PRESS`\n*   `POINTER_RELEASE`\n\
    *   `POINTER_DRAG`\n*   `TRAVERSE_HORIZONTAL`\n*   `TRAVERSE_VERTICAL`\n\n除了遍历项（将在下一节中介绍）之外，`getInteractionModes()`\
    \ 返回值的组合直接对应于你的自定义项中可能被调用的回调。你可以利用此信息构建一个在任何情况下都能正常工作的 `CustomItem`。例如，在极少数情况下，如果某个设备无法向自定义项传递按键和指针事件，你可以在该项上提供一个\
    \ `Command` 来调用一个单独的编辑屏幕。\n"
- fmt: "# Item Traversal\n\nForms support a concept of *focus,* where one item in\
    \ the form is currently selected. *Traversal* refers to the user being able to\
    \ shift focus from one item to another. In most cases, the MIDP implementation\
    \ handles the details of Form traversal. In the Sun emulator, for example, you\
    \ can move the focus through the items in a form by pressing the up and down keys.\
    \ Focus is indicated by a solid black border around an item. [Figure 7-2](#LiB0051.html#ch07fig02)\
    \ shows a form with several items; the third item, an `ImageItem`, has the focus.\n\
    \n![](fig130_01.jpg)\nFigure 7-2: The focus is on the third item in this form.\n\
    \nSo far, so good—this is all pretty straightforward. As a matter of fact, the\
    \ default implementation provided in `CustomItem` means you don't even have to\
    \ think about traversal in many cases.\n\nWhat makes things a little wonky is\
    \ the concept of *internal* traversal. Some items support traversal of multiple\
    \ choices *inside* the item. A good example is the `ChoiceGroup` item. The following\
    \ sequence shows traversal through a form with three items in the MIDP reference\
    \ implementation emulator. [Figure 7-3](#LiB0051.html#ch07fig03) shows the traversal\
    \ progressing from the text field through the gauge and into the `ChoiceGroup`.\n\
    \n[![Click To expand](fig130_02.jpg)](fig130_02_0.jpg)\nFigure 7-3: Form traversal\
    \ and internal item traversal\n\nTwo methods signal traversal events. The first,\
    \ `traverse()`, is called the first time the user traverses into the item. By\
    \ default this method returns `false`, indicating that the item does not support\
    \ internal traversal. The second method, `traverseOut()`, is called whenever the\
    \ user leaves the item.\n\n```\nprotected boolean traverse(int dir, int viewportWidth,\
    \ int viewportHeight,\n    int[] visRect_inout);\nprotected void traverseOut();\
    \ \n```\n\n|  | Note  | At first glance, you might expect custom items to receive\
    \ calls on both the traversal methods and the key event methods when keys are\
    \ pressed on the device. For example, if the user presses the down arrow key to\
    \ move into the item, you might expect both the `traverse()` and `keyPressed()`\
    \ methods to be called. In reality, the implementation should keep key events\
    \ and traversal events unambiguous. Bear in mind that some devices will have alternate\
    \ traversal controls (wheels, for example), so the implementation (and your custom\
    \ item) should treat the events distinctly. |\n\nIf you do write a custom item\
    \ that supports internal traversal, you need to pay attention to the arguments\
    \ passed to `traverse()` and you need to return `true` to indicate that your item\
    \ supports internal traversal. The information passed to the `traverse()` method\
    \ is as follows:\n\n*   `dir` indicates the traversal direction requested by the\
    \ user. It is one of the following: `Canvas.UP`, `Canvas.DOWN`, `Canvas.LEFT`,\
    \ `Canvas.RIGHT`, or `CustomItem.NONE`.\n\n*   `viewportWidth` and `viewportHeight`\
    \ indicate the size available for items in the Form containing this custom item.\
    \ (In essence, `viewportWidth` and `viewportHeight` describe the content area\
    \ of the Form.) These dimensions may be useful for determining the relationship\
    \ between an item's choices and the amount of available screen area.\n\n*   `visRect_inout`\
    \ is kind of weird. It is an integer array with four elements. When the `traverse()`\
    \ method is called, `visRect_inout` describes the region of the custom item's\
    \ visible content area. When the `traverse()` method returns, `visRect_inout`\
    \ should contain the bounds of the currently selected choice in the item.\n\n\
    If this is starting to sound a little hairy, just wait. The traversal mechanism\
    \ is flexible enough to support different kinds of traversal. Some devices may\
    \ only be able to support vertical traversal, while others may only support horizontal,\
    \ and still others may support both. You can find out the device's traversal capabilities\
    \ with the `getInteractionModes()` method, which can return `CustomItem.TRAVERSE_HORIZONTAL`,\
    \ `CustomItem.TRAVERSE_VERTICAL`, or both. Depending on the nature of the choices\
    \ contained in your custom item, you may have to be flexible about the traversal\
    \ directions you're receiving and the actual traversal inside the item.\n\nRemember,\
    \ the `traverse()` method is called when focus first comes to your item. If this\
    \ method returns `true`, `traverse()` will be repeatedly called while traversal\
    \ progresses through your item. When the user traverses out of your item, return\
    \ `false` from the `traverse()` method. This lets the implementation know that\
    \ internal traversal has ended. Most likely the implementation will call `traverseOut()`,\
    \ although this only happens if focus actually moves away from the item. This\
    \ may not be the case if the user has reached the end or beginning of the form.\n\
    \nAll of this is discussed in meticulous detail in the API documentation for `CustomItem`'s\
    \ `traverse()` method. If you're planning to implement a custom item with internal\
    \ traversal, go read the documentation a few times until it all sinks in."
  raw: "## Item Traversal\n\nForms support a concept of *focus,* where one item in\
    \ the form is currently selected. *Traversal* refers to the user being able to\
    \ shift focus from one item to another. In most cases, the MIDP implementation\
    \ handles the details of Form traversal. In the Sun emulator, for example, you\
    \ can move the focus through the items in a form by pressing the up and down keys.\
    \ Focus is indicated by a solid black border around an item. [Figure 7-2](#LiB0051.html#ch07fig02)\
    \ shows a form with several items; the third item, an ImageItem, has the focus.\n\
    \n![](fig130_01.jpg)\nFigure 7-2: The focus is on the third item in this form.\n\
    \nSo far, so good—this is all pretty straightforward. As a matter of fact, the\
    \ default implementation provided in CustomItem means you don't even have to think\
    \ about traversal in many cases.\n\nWhat makes things a little wonky is the concept\
    \ of *internal* traversal. Some items support traversal of multiple choices *inside*\
    \ the item. A good example is the ChoiceGroup item. The following sequence shows\
    \ traversal through a form with three items in the MIDP reference implementation\
    \ emulator. [Figure 7-3](#LiB0051.html#ch07fig03) shows the traversal progressing\
    \ from the text field through the gauge and into the ChoiceGroup.\n\n[![Click\
    \ To expand](fig130_02.jpg)](fig130_02_0.jpg)\nFigure 7-3: Form traversal and\
    \ internal item traversal\n\nTwo methods signal traversal events. The first, traverse(),\
    \ is called the first time the user traverses into the item. By default this method\
    \ returns false, indicating that the item does not support internal traversal.\
    \ The second method, traverseOut(), is called whenever the user leaves the item.\n\
    \n```\nprotected boolean traverse(int dir, int viewportWidth, int viewportHeight,\n\
    \    int[] visRect_inout);\nprotected void traverseOut(); \n```\n\n|  | Note \
    \ | At first glance, you might expect custom items to receive calls on both the\
    \ traversal methods and the key event methods when keys are pressed on the device.\
    \ For example, if the user presses the down arrow key to move into the item, you\
    \ might expect both the *traverse()* and *keyPressed()* methods to be called.\
    \ In reality, the implementation should keep key events and traversal events unambiguous.\
    \ Bear in mind that some devices will have alternate traversal controls (wheels,\
    \ for example), so the implementation (and your custom item) should treat the\
    \ events distinctly. |\n\nIf you do write a custom item that supports internal\
    \ traversal, you need to pay attention to the arguments passed to traverse() and\
    \ you need to return true to indicate that your item supports internal traversal.\
    \ The information passed to the traverse() method is as follows:\n\n*   dir indicates\
    \ the traversal direction requested by the user. It is one of the following: Canvas.UP,\
    \ Canvas.DOWN, Canvas.LEFT, Canvas.RIGHT, or CustomItem.NONE.\n\n*   viewportWidth\
    \ and viewportHeight indicate the size available for items in the Form containing\
    \ this custom item. (In essence, viewportWidth and viewportHeight describe the\
    \ content area of the Form.) These dimensions may be useful for determining the\
    \ relationship between an item's choices and the amount of available screen area.\n\
    \n*   visRect_inout is kind of weird. It is an integer array with four elements.\
    \ When the traverse() method is called, visRect_inout describes the region of\
    \ the custom item's visible content area. When the traverse() method returns,\
    \ visRect_inout should contain the bounds of the currently selected choice in\
    \ the item.\n\nIf this is starting to sound a little hairy, just wait. The traversal\
    \ mechanism is flexible enough to support different kinds of traversal. Some devices\
    \ may only be able to support vertical traversal, while others may only support\
    \ horizontal, and still others may support both. You can find out the device's\
    \ traversal capabilities with the getInteractionModes() method, which can return\
    \ CustomItem.TRAVERSE_ HORIZONTAL, CustomItem.TRAVERSE_VERTICAL, or both. Depending\
    \ on the nature of the choices contained in your custom item, you may have to\
    \ be flexible about the traversal directions you're receiving and the actual traversal\
    \ inside the item.\n\nRemember, the traverse() method is called when focus first\
    \ comes to your item. If this method returns true, traverse() will be repeatedly\
    \ called while traversal progresses through your item. When the user traverses\
    \ out of your item, return false from the traverse() method. This lets the implementation\
    \ know that internal traversal has ended. Most likely the implementation will\
