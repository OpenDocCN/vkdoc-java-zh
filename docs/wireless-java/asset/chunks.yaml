  trans: "\n## 使用警报\n\n*警报*是向用户显示的信息性消息。在 MIDP 领域中，有两种类型的警报：\n\n*   **定时**警报会显示一段时间，通常只有几秒钟。它显示无需确认的信息性消息，例如“您的交易已完成”或“我现在无法执行此操作，戴夫。”\n\
    \n*   **模态**警报会一直显示，直到用户将其关闭。当需要为用户提供操作选择时，模态警报非常有用。您可以显示一条消息，例如“您准备好预订这些票了吗？”，并提供**是**和**否**命令作为选项。\n\
    \nMIDP 警报可以有一个关联的图标，例如停止标志或问号。警报甚至可能带有关联的声音，但这取决于具体实现。MIDP 警报与 MacOS 和 Windows\
    \ 等窗口系统中的模态对话框概念非常相似。图 5-6 显示了一个典型的警报。\n\n![](img/fig91_01.jpg)\n图 5-6：警报类似于桌面窗口系统中的模态对话框。\n\
    \n警报由 `javax.microedition.lcdui.Alert` 类的实例表示，该类提供以下构造函数：\n\n```\npublic Alert()\n\
    public Alert(String title, String alertText, Image alertImage, AlertType alertType)\n\
    ```\n\n第二个构造函数中的任何或所有参数都可以为 `null`。（现在不必担心 `Image` 类；我将在下一章的列表部分讨论它。）\n\n默认情况下，定时警报使用默认超时值创建；您可以通过调用\
    \ `getDefaultTimeout()` 来查找默认值。要更改警报的超时时间，请调用 `setTimeout()`，并将超时值以毫秒为单位传入。特殊值\
    \ `FOREVER` 可用于指示该警报是模态的。\n\n您可以使用以下代码创建一个简单的定时警报：\n\n```\nAlert alert = new Alert(\"\
    抱歉\", \"我很抱歉，戴夫...\", null, null);\n```\n\n要显式将超时值设置为五秒，您可以这样做：\n\n```\nalert.setTimeout(5000);\n\
    ```\n\n相反，如果您想要一个模态警报，您可以使用特殊值 `FOREVER`：\n\n```\nalert.setTimeout(Alert.FOREVER);\n\
    ```\n\nMIDP 实现将自动提供一种关闭模态警报的方法。例如，Sun 的参考实现提供了一个映射到软按钮的**完成**命令。MIDP 2.0 将此命令公开为静态成员\
    \ `DISMISS_COMMAND`，允许您注册自己的命令监听器并显式识别此命令。您可以使用通常的 `addCommand()` 方法向警报添加自己的命令。第一次调用\
    \ `addCommand()` 时，系统的关闭命令将被移除。\n\n警报的默认行为是在警报被关闭或超时时自动前进到下一个屏幕。您可以通过将警报和下一个屏幕传递给\
    \ `Display` 中的双参数 `setCurrent()` 方法来指定下一个屏幕。如果您调用常规的单参数 `setCurrent()` 方法，则在警报关闭时会恢复上一个屏幕。\n\
    \n警报类型作为对底层 MIDP 实现的提示。实现可能会使用警报类型来决定在显示警报时播放何种声音。`AlertType` 类提供了五种类型，作为静态成员变量访问：`ALARM`、`CONFIRMATION`、`ERROR`、`INFO`\
    \ 和 `WARNING`。\n\nMIDP 2.0 为警报添加了一个指示器。默认情况下，没有指示器，但您可以通过将 `Gauge` 传递给 `Alert`\
    \ 的 `setIndicator()` 方法来添加一个。（`Gauge` 将在下一章的表单部分介绍。）该指示器对于显示网络连接或长时间计算中的进度非常方便。\n\
    \n以下示例 `TwoAlerts` 展示了两种类型的警报。它以一个主 `TextBox` 为特色，该文本框在 MIDlet 启动时显示。两个命令，**Go**\
    \ 和 **About**，提供对警报的访问。**Go** 命令显示一个包含关于虚构网络错误消息的定时警报。**About** 命令显示一个可能包含版权信息的模态警报。第三个命令\
    \ **Exit** 提供了一种退出 MIDlet 的方法。请记住，所有三个命令可能无法同时显示在屏幕上；其中一些可能可以从二级菜单访问。\n\n```\n\
    import javax.microedition.midlet.*;\nimport javax.microedition.lcdui.*;\n\npublic\
    \ class TwoAlerts\n    extends MIDlet\n    implements CommandListener {\n  private\
    \ Display mDisplay;\n\nprivate TextBox mTextBox;\n  private Alert mTimedAlert;\n\
    \  private Alert mModalAlert;\n\nprivate Command mAboutCommand, mGoCommand, mExitCommand;\n\
    \npublic TwoAlerts() {\n    mAboutCommand = new Command(\"关于\", Command.SCREEN,\
    \ 1);\n    mGoCommand = new Command(\"执行\", Command.SCREEN, 1);\n    mExitCommand\
    \ = new Command(\"退出\", Command.EXIT, 2);\n\nmTextBox = new TextBox(\"TwoAlerts\"\
    , \"\", 32, TextField.ANY);\n    mTextBox.addCommand(mAboutCommand);\n    mTextBox.addCommand(mGoCommand);\n\
    \    mTextBox.addCommand(mExitCommand);\n    mTextBox.setCommandListener(this);\n\
    \nmTimedAlert = new Alert(\"网络错误\",\n        \"发生网络错误。请重试。\",\n        null,\n\
    \        AlertType.INFO);\n    mModalAlert = new Alert(\"关于 TwoAlerts\",\n   \
    \       \"TwoAlerts 是一个简单的 MIDlet，用于演示警报的使用。\",\n          null,\n          AlertType.INFO);\n\
    \    mModalAlert.setTimeout(Alert.FOREVER);\n  }\n\npublic void startApp() {\n\
    \    mDisplay = Display.getDisplay(this);\n\nmDisplay.setCurrent(mTextBox);\n\
    \  }\n\npublic void pauseApp() {\n  }\n\npublic void destroyApp(boolean unconditional)\
    \ {}\n\npublic void commandAction(Command c, Displayable s) {\n    if (c == mAboutCommand)\n\
    \      mDisplay.setCurrent(mModalAlert);\n    else if (c == mGoCommand)\n    \
    \  mDisplay.setCurrent(mTimedAlert, mTextBox);\n    else if (c == mExitCommand)\n\
    \      notifyDestroyed();\n  }\n}\n```\n\n## 总结\n\nMIDP 的主要用户界面类基于可适应具有不同显示和输入能力设备的抽象概念。几种预包装的屏幕类使得创建用户界面变得容易。屏幕具有标题和可选的滚动条。最重要的是，屏幕可以包含命令，实现将这些命令提供给用户。您的应用程序可以通过充当监听器对象来响应命令。本章描述了用于接受用户输入的屏幕\
    \ `TextBox`，以及用于显示信息的简单屏幕 `Alert`。在下一章中，我们将深入探讨更复杂的 `List` 和 `Form` 类。\n\n# 第\
    \ 6 章：列表和表单\n\n在上一章中，您了解了 MIDP 较简单的屏幕类。现在我们进入更深层次的内容，涉及显示列表的屏幕以及包含混合类型控件的屏幕。\n\
    \n## 使用列表\n\n在 `TextBox` 和 `Alert` 之后，下一个最简单的屏幕是 `List`，它允许用户从选项列表中选择项目（称为*元素*）。列表中的每个元素由文本字符串或图像表示。`List`\
    \ 支持选择单个元素或多个元素。\n\n`List` 主要有两种类型，由 `Choice` 接口中的常量表示：\n\n*   `MULTIPLE` 表示一个可以同时选择多个元素的列表。\n\
    \n*   `EXCLUSIVE` 指定一个只能选择一个元素的列表。它类似于一组单选按钮。\n"
- fmt: "### Understanding List Types\n\nFor both `MULTIPLE` and `EXCLUSIVE` lists,\
    \ selection and confirmation are separate steps. In fact, `List` does not handle\
    \ confirmation for these types of lists—your `MIDlet` will need to provide some\
    \ other mechanism (probably a `Command`) that allows users to confirm their choices.\
    \ `MULTIPLE` lists allow users to select and deselect various elements before\
    \ confirming the selection. `EXCLUSIVE` lists permit users to change their minds\
    \ several times before confirming the selection.\n\n[Figure 6-1](#LiB0044_split_001.html#ch06fig01)a\
    \ shows an `EXCLUSIVE` list. The user navigates through the list using the arrow\
    \ up and down keys. An element is selected by pressing the select button on the\
    \ device. [Figure 6-1](#LiB0044_split_001.html#ch06fig01)b shows a `MULTIPLE`\
    \ list. It works basically the same way as an `EXCLUSIVE` list, but multiple elements\
    \ can be selected simultaneously. As before, the user moves through the list with\
    \ the up and down arrow keys. The select key toggles the selection of a particular\
    \ element.\n\n[![Click To expand](fig96_01.jpg)](fig96_01_0.jpg)\nFigure 6-1:\
    \ List types— (a) `EXCLUSIVE` and (b) `MULTIPLE`\n\nA further refinement of `EXCLUSIVE`\
    \ also exists: `IMPLICIT` lists combine the steps of selection and confirmation.\
    \ The `IMPLICIT` list acts just like a menu. [Figure 6-2](#LiB0044_split_001.html#ch06fig02)\
    \ shows an `IMPLICIT` list with images and text for each element. When the user\
    \ hits the select key, the list immediately fires off an event, just like a `Command`.\
    \ An `IMPLICIT` list is just like an `EXCLUSIVE` list in that the user can only\
    \ select one of the list elements. But with `IMPLICIT` lists, there's no opportunity\
    \ for the user to change his or her mind before confirming the selection.\n\n\
    ![](fig96_02.jpg)\nFigure 6-2: `IMPLICIT` lists combine selection and confirmation.\n\
    \n### Event Handling for IMPLICIT Lists\n\nWhen the user makes a selection in\
    \ an `IMPLICIT` `List`, the `commandAction()` method of the `List`'s `CommandListener`\
    \ is invoked. A special value is passed to `commandAction()` as the `Command`\
    \ parameter:\n\n```\npublic static final Command SELECT_COMMAND\n```\n\nFor example,\
    \ you can test the source of command events like this:\n\n```\npublic void commandAction(Command\
    \ c, Displayable s) {\n  if (c == nextCommand)\n    // ...\n  else if (c == List.SELECT_COMMAND)\n\
    \    // ...\n}\n```\n\nThere's an example at the end of this chapter that demonstrates\
    \ an `IMPLICIT` `List`.\n\nIn MIDP 2.0, the `setSelectCommand()` offers you the\
    \ opportunity to specify your own `Command` to be used for selections instead\
    \ of having to use the `SELECT_COMMAND`.\n\n### Creating Lists\n\nTo create a\
    \ `List`, specify a title and a list type. If you have the element names and images\
    \ available ahead of time, you can pass them in the constructor:\n\n```\npublic\
    \ List(String title, int type)\npublic List(String title, int type,\n    String[]\
    \ stringElements, Image[] imageElements)\n```\n\nThe `stringElements` parameter\
    \ cannot be null; however, `stringElements` or `imageElements` may contain null\
    \ array elements. If both the string and image for a given list element are null,\
    \ the element is displayed blank. If both the string and the image are defined,\
    \ the element will display using the image and the string.\n\nSome `List`s will\
    \ have more elements than can be displayed on the screen. Indeed, the actual number\
    \ of elements that will fit varies from device to device. But don't worry: `List`\
    \ implementations automatically handle scrolling up and down to show the full\
    \ contents of the `List`.\n\n### About Images\n\nOur romp through the `List` class\
    \ yields a first look at images. Instances of the `javax.microedition.lcdui.Image`\
    \ class represent images in MIDP. The specification dictates that implementations\
    \ be able to load images files in PNG format.^([[1](#LiB0044_split_001.html#ftn.N359)])\
    \ This format supports both a transparent color and lossless compression.\n\n\
    `Image` has no constructors, but the `Image` class offers a handful of `createImage()`\
    \ factory methods for obtaining `Image` instances. The first are for loading images\
    \ from PNG data.\n\n```\npublic static Image createImage(String name)\npublic\
    \ static Image createImage(byte[] imagedata, int imageoffset,\n    int imagelength)\n\
    ```\n\nThe first method attempts to create an `Image` from the named file, which\
    \ should be packaged inside the JAR that contains your `MIDlet`. You should use\
    \ an absolute pathname or the image file may not be found. The second method creates\
    \ an `Image` using data in the supplied array. The data starts at the given array\
    \ offset, `imageoffset`, and is `imagelength` bytes long. In MIDP 2.0, you can\
    \ also create an `Image` from an `InputStream`:\n\n```\npublic static Image createImage(InputStream\
    \ stream)\n```\n\nImages may be *mutable* or *immutable*. Mutable `Image`s can\
    \ be modified by calling `getGraphics()` and using the returned `Graphics` object\
    \ to draw on the image. (For full details on `Graphics`, see [Chapter 10](#LiB0075_split_000.html#408).)\
    \ If you try to call `getGraphics()` on an immutable `Image`, an `IllegalStateException`\
    \ will be thrown.\n\nThe `createImage()` methods described above return immutable\
    \ `Image`s. To create a mutable `Image`, use the following method:\n\n```\npublic\
    \ static Image createImage(int width, int height)\n```\n\nTypically you would\
    \ create a mutable `Image` for off-screen drawing, perhaps for an animation or\
    \ to reduce flicker if the device's display is not double buffered.\n\nAny `Image`\
    \ you pass to `Alert`, `ChoiceGroup`, `ImageItem`, or `List` should be immutable.\
    \ To create an immutable `Image` from a mutable one, use the following method:\n\
    \n```\npublic static Image createImage(Image image)\n```\n\nIn MIDP 2.0, you can\
    \ also create an `Image` from a portion of another `Image` using the following\
    \ method:\n\n```\npublic static Image createImage(Image image,\n    int x, int\
    \ y, int width, int height, int transform)\n```\n\nThis method takes the part\
    \ of the original image described by `x`, `y`, `width`, and `height`, applies\
    \ the specified transformation, and returns the result as an immutable `Image`.\
    \ The possible transformations are described by constants in the `javax.microedition.lcdui.game.Sprite`\
    \ class and include things like mirroring and 90-degree rotation.\n\n`Image` also\
    \ includes methods that handle image data as an `int` array. I'll talk about these\
    \ methods later in [Chapter 10](#LiB0075_split_000.html#408).\n\nHow do you figure\
    \ out what size `Image`s you need? In MIDP 2.0, `Display` provides methods that\
    \ return information about the optimal width and height for various types of images:\n\
    \n```\npublic int getBestImageHeight(int imageType);\npublic int getBestImageWidth(int\
    \ imageType);\n```\n\nThe `imageType` parameter should be one of `Display`'s constants\
    \ `LIST_ELEMENT`, `ALERT`, or `CHOICE_GROUP_ELEMENT`. (You'll learn all about\
    \ `ChoiceGroup` later in this chapter.) If you were building a `List`, you could\
    \ query `Display` to find the best size for element images. Assuming you had packaged\
    \ icons of various sizes in your application, you could select the best-sized\
    \ images at runtime."
