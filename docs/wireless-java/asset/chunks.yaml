  trans: "\n### 字符串与 StringBuffer\n\n字符串在 Java 中拥有特殊地位。它们是唯一支持加号运算符（+）重载的对象。每次使用加号运算符拼接字符串时需谨慎——在幕后，很可能正在为你创建新的\
    \ String 和 StringBuffer 对象。\n\nString 与 StringBuffer 之间存在着微妙的关系。当你创建并修改 StringBuffer\
    \ 时，实际操作是在内部字符数组上进行的。当你从 StringBuffer 创建 String 时，该 String 会指向同一个字符数组。到目前为止一切正常，对吧？但如果你进一步修改\
    \ StringBuffer，它会巧妙地创建一个新的字符数组——即原数组的副本。因此，虽然 StringBuffer 通常是创建字符串的高效方式，但新对象究竟在何时创建并不总是显而易见。\n\
    \n这个故事给我们的启示是：但凡看到字符串拼接的地方，都可能正在创建新对象。如果你在循环中拼接字符串，就应该考虑采用不同的方法，可能涉及 StringBuffer。另一种可能的优化是彻底放弃\
    \ String 和 StringBuffer，直接使用字符数组。虽然这在你自己的代码中可能是快速高效的解决方案，但请记住，许多 API 要求将字符串作为参数，并从方法返回字符串，因此你最终可能需要在字符数组和字符串之间进行大量转换。\n\
    \n### 优雅地处理失败\n\n鉴于典型 MIDP 设备内存匮乏，你的应用程序每次请求内存时都应做好失望的准备。每次创建对象时，代码都应捕获`java.lang.OutOfMemoryError`。由你来捕获\
    \ OutOfMemoryError 远比宿主环境捕获要好得多。至少你有机会做一些合理的事情——释放一些内存并重试，或者向用户显示措辞礼貌的消息来优雅地失败。宿主环境不太可能如此友善，用户对你应用的观感也会糟糕得多。请记住，你可能需要先丢弃大型数据结构来释放内存，然后才有足够空间创建用于向用户显示消息的\
    \ Alert。\n\n## 为速度而编码\n\n小型设备配备的是小型且相对较慢的处理器。作为开发者，你的部分任务是确保应用程序运行速度足够快，以免用户拒绝使用。\n\
    \n### 优化循环\n\n一个简单的优化与循环有关。遍历 Vector v 的典型循环可能如下所示：\n\n```\nfor (int i = 0; i\
    \ < v.size(); i++) {\n  Object o = v.elementAt(i);\n  // 处理 Object o。\n}\n```\n\
    \n每次循环时，都会调用 v 的 size()方法。优化版本会先存储向量的大小，如下所示：\n\n```\nint size = v.size();\nfor\
    \ (int i = 0; i < size; i++) {\n  Object o = v.elementAt(i);\n  // 处理 Object o。\n\
    }\n```\n\n这是一个简单的例子，但它说明循环条件是你寻找速度优化的一个切入点。\n\n### 使用数组替代对象\n\n数组通常比集合类更快、更精简。我们在前面讨论字符串和\
    \ StringBuffer 时已经触及这个主题；如果不太笨拙的话，直接使用字符数组可能比处理 String 和 StringBuffer 对象更高效。同样的规则也适用于\
    \ MIDP 集合类 Vector 和 Hashtable。虽然 Vector 和 Hashtable 简单方便，但它们确实会带来一些可以削减的开销。Vector\
    \ 本质上只是数组的一个包装器，因此如果你能直接使用数组，就能节省一些内存和处理时间。同样，如果你有简单的键对象到值对象的映射，使用对象数组可能比使用 Hashtable\
    \ 更合理。\n\n如果你决定使用 Hashtable 或 Vector，请在创建时尽量正确指定其大小。Vector 和 Hashtable 都会根据需要增长，但这一操作相对昂贵。Vector\
    \ 会创建新的内部数组，并将元素从旧数组复制到新数组。Hashtable 会分配新数组，并执行一种计算开销很大的操作，称为*rehashing*（再哈希）。Vector\
    \ 和 Hashtable 都有允许你指定集合初始大小的构造函数。你应该尽可能准确地指定这些集合的初始大小。\n\n如果你正在使用持久存储 API，可能会倾向于将流类包装在记录数据周围。例如，你可能读取一条记录，然后在记录数据周围包装一个\
    \ ByteArrayInputStream，再在 ByteArrayInputStream 周围包装一个 DataInputStream，以便从记录中读取基本类型。这很可能过于笨重而不实用。如果可能的话，请直接操作记录的字节数组。\n\
    \n### 使用缓冲 I/O\n\n不要从流中逐个字节地读取，也不要逐个字节地写入。虽然流类提供了读写单个字节的方法，但你应该尽可能避免使用它们。读取或写入整个数据数组几乎总是更高效。\n\
    \nJ2SE 提供了 BufferedReader 和 BufferedWriter 类，可以\"免费\"提供缓冲功能。在 MIDP 领域则没有这样的奢侈功能，因此如果你想使用缓冲，就必须自己实现。\n"
- fmt: "### Be Clean\n\nOne simple piece of advice is to clean up after yourself.\
    \ Releasing resources as soon as you are done with them can improve the performance\
    \ of your application. If you have internal arrays or data structures, you should\
    \ free them when you're not using them. One way to do this is to set your array\
    \ reference to `null` so that the array can be garbage collected. You could even\
    \ call the garbage collector explicitly with `System.gc()` if you're anxious to\
    \ release memory back to the runtime system.\n\nNetwork connections should also\
    \ be released as soon as you're done with them. One good way to do this is to\
    \ use a `finally` clause. Consider the following code, which does not use a `finally`\
    \ clause:\n\n```\nHttpConnection hc = null;\nInputStream in = null;\ntry {\n \
    \ hc = (HttpConnection)Connector.open(url);\n  in = hc.openInputStream();\n  //\
    \ Read data from in.\n  in.close();\n  hc.close();\n}\ncatch (IOException ioe)\
    \ {\n  // Handle the exception.\n}\n```\n\nThe problem occurs if an exception\
    \ is thrown while you're trying to read data from the connection's input stream.\
    \ In this case, execution jumps down to the exception handler, and the input stream\
    \ and connection are never closed. In a J2SE environment, with memory to burn,\
    \ this is probably not a big deal. But on a MIDP device, a hanging connection\
    \ could be a disaster. When you absolutely, positively want to be sure to run\
    \ some code, you should put it in a `finally` block like this:\n\n```\nHttpConnection\
    \ hc = null;\nInputStream in = null;\ntry {\n  hc = (HttpConnection)Connector.open(url);\n\
    \  in = hc.openInputStream();\n  // Read data from in.\n}\ncatch (IOException\
    \ ioe) {\n  // Handle the exception.\n}\nfinally {\n  try {\n    if (in != null)\
    \ in.close();\n    if (hc != null) hc.close();\n  }\n  catch (IOException ioe)\
    \ { }\n}\n```\n\nThis is starting to look a little ugly, particularly the `try`\
    \ and `catch` inside our `finally` block. A cleaner solution would be to enclose\
    \ this code in a method and declare that the method throws `IOException`. This\
    \ cleans up the code considerably:\n\n```\nprivate void doNetworkStuff(String\
    \ url) throws IOException {\n  HttpConnection hc = null;\n  InputStream in = null;\n\
    \  try {\n    hc = (HttpConnection)Connector.open(url);\n    in = hc.openInputStream();\n\
    \    // Read data from in.\n  }\n  finally {\n    if (in != null) in.close();\n\
    \    if (hc != null) hc.close();\n  }\n}\n```\n\nThe deal with `finally` is that\
    \ its code gets executed no matter how control leaves the `try` block. If an exception\
    \ is thrown, or if somebody calls `return`, or even if control leaves the `try`\
    \ block normally, our `finally` block still gets executed. Note that there is\
    \ still a small amount of room for trouble here: if an exception is thrown when\
    \ we try to close `in`, then `hc` will never be closed. You could enclose each\
    \ `close()` call in its own `try` and `catch` block to handle this problem.\n\n\
    Being clean applies to any type of stream, records stores, and record enumerations.\
    \ Anything that can be closed should be, preferably in a `finally` block.\n\n\
    ### Optimize the User Interface\n\nIt's important to remember that you are trying\
    \ to optimize the *perceived* speed of your application, not the actual speed\
    \ of the application. Users get fidgety if the application freezes up for a few\
    \ seconds; adding some sort of progress indicator can go a long way toward making\
    \ users happier. There's really nothing you can do to make the network run faster,\
    \ but if you display a spinning clock or a moving progress bar, your application\
    \ will at least look like it's still alive while it's waiting for the network.\n\
    \nKeep in mind that users of mobile phones and other small \"consumer\" devices\
    \ will be much more demanding than typical desktop computer users. Through years\
    \ of experience, bitter desktop computer users have fairly low expectations of\
    \ their applications. They realize that most desktop applications have a learning\
    \ curve and are frequently cantankerous. Consumer devices, on the other hand,\
    \ are much more likely to work right the first time, requiring neither manuals\
    \ nor advanced degrees to operate.\n\nWith this in mind, be sure that your MIDlet\
    \ user interface is uncomplicated, fast, responsive, and informative.\n\n## Optimizing\
    \ Application Deployment\n\nOne last area of optimization has to do with the actual\
    \ deployment of your application. As you may remember from [Chapter 3](#LiB0024_split_000.html#106),\
    \ MIDlets are packaged in MIDlet suites, which are really just fancy JAR files.\
    \ One way to optimize your application is partition your classes so that only\
    \ the ones you need are loaded into the runtime environment. If you are careful,\
    \ you can reduce the size or your MIDlet suite JAR by eliminating classes you\
    \ don't need. Finally, a code obfuscator may be used to further reduce the size\
    \ or the MIDlet suite JAR.\n\n### Partition Your Application\n\nThe MIDP runtime\
    \ environment loads classes as they are needed. You can use this to your advantage\
    \ to optimize the runtime footprint of your application. For example, suppose\
    \ you write a datebook application that has the capability to send you reminder\
    \ e-mails, or *ticklers*. You would probably realize that many people will not\
    \ take advantage of the tickler feature. Why should tickler code take up space\
    \ in a MIDP device if the user is not using ticklers? If you partition your code\
    \ correctly, all of the tickler functionality can be encapsulated in a single\
    \ class. If the rest of the application never calls the tickler code, the class\
    \ will not be loaded, resulting in a slimmer runtime footprint.\n\n### Only Include\
    \ Classes You Need\n\nYou may be using third-party packages in your MIDlet suite,\
    \ like an XML parser (see [Chapter 14](#LiB0112_split_000.html#599)) or a cryptography\
    \ package (see [Chapter 15](#LiB0118_split_000.html#623)). For development, you\
    \ might have simply dumped the whole package into your MIDlet suite. But come\
    \ deployment time, you should prune out the excess packages to reduce the size\
    \ or your MIDlet suite JAR. In some cases this will be fairly easy, like dumping\
    \ out WAP support classes if you're simply parsing XML. Other times it will not\
    \ be so obvious which classes you need and which ones you can get rid of. However,\
    \ if you really want to reduce your MIDlet suite JAR size, this is a crucial step.\
    \ You don't need to do this by hand; an *obfuscator* will do the work for you.\n\
    \n### Use an Obfuscator\n\nFinally, a *bytecode obfuscator* can reduce the size\
    \ of your class files. A bytecode obfuscator is a tool that is supposed to make\
    \ it difficult to decompile class files. Decompilation is a process by which someone\
    \ can recreate the source code that was used to make a particular class file.\
    \ People who are worried about competitors stealing their code use obfuscators\
    \ to make decompilation more difficult. However, obfuscation has the side effect\
    \ of reducing class file size, mainly because the descriptive method and variable\
    \ names you created are replaced with small machine-generated names. If you're\
    \ very serious about reducing the size of your MIDlet suite JAR, try obfuscating\
    \ your code. I suggest running the obfuscator before preverifying the class files,\
    \ but it's conceivable it would work the other way around, too. Here are two obfuscators\
    \ to get you started:\n\n```\nhttp://proguard.sourceforge.net/\nhttp://www.retrologic.com/retroguard-main.html\n\
    ```"
  raw: "### Be Clean\n\nOne simple piece of advice is to clean up after yourself.\
    \ Releasing resources as soon as you are done with them can improve the performance\
    \ of your application. If you have internal arrays or data structures, you should\
    \ free them when you're not using them. One way to do this is to set your array\
    \ reference to null so that the array can be garbage collected. You could even\
    \ call the garbage collector explicitly with System.gc() if you're anxious to\
    \ release memory back to the runtime system.\n\nNetwork connections should also\
    \ be released as soon as you're done with them. One good way to do this is to\
    \ use a finally clause. Consider the following code, which does not use a finally\
    \ clause:\n\n```\nHttpConnection hc = null;\nInputStream in = null;\ntry {\n \
    \ hc = (HttpConnection)Connector.open(url);\n  in = hc.openInputStream();\n  //\
    \ Read data from in.\n  in.close();\n  hc.close();\n}\ncatch (IOException ioe)\
    \ {\n  // Handle the exception.\n} \n```\n\nThe problem occurs if an exception\
    \ is thrown while you're trying to read data from the connection's input stream.\
    \ In this case, execution jumps down to the exception handler, and the input stream\
    \ and connection are never closed. In a J2SE environment, with memory to burn,\
    \ this is probably not a big deal. But on a MIDP device, a hanging connection\
    \ could be a disaster. When you absolutely, positively want to be sure to run\
    \ some code, you should put it in a finally block like this:\n\n```\nHttpConnection\
    \ hc = null;\nInputStream in = null;\ntry {\n  hc = (HttpConnection)Connector.open(url);\n\
    \  in = hc.openInputStream();\n  // Read data from in.\n}\ncatch (IOException\
    \ ioe) {\n  // Handle the exception.\n}\nfinally {\n  try {\n    if (in != null)\
    \ in.close();\n    if (hc != null) hc.close();\n  }\n  catch (IOException ioe)\
    \ { }\n}\n```\n\nThis is starting to look a little ugly, particularly the try\
    \ and catch inside our finally block. A cleaner solution would be to enclose this\
    \ code in a method and declare that the method throws IOException. This cleans\
    \ up the code considerably:\n\n```\nprivate void doNetworkStuff(String url) throws\
    \ IOException {\n  HttpConnection hc = null;\n  InputStream in = null;\n  try\
    \ {\n    hc = (HttpConnection)Connector.open(url);\n    in = hc.openInputStream();\n\
    \    // Read data from in.\n  }\n  finally {\n    if (in != null) in.close();\n\
    \    if (hc != null) hc.close();\n  }\n} \n```\n\nThe deal with finally is that\
    \ its code gets executed no matter how control leaves the try block. If an exception\
    \ is thrown, or if somebody calls return, or even if control leaves the try block\
    \ normally, our finally block still gets executed. Note that there is still a\
    \ small amount of room for trouble here: if an exception is thrown when we try\
    \ to close in, then hc will never be closed. You could enclose each close() call\
    \ in its own try and catch block to handle this problem.\n\nBeing clean applies\
    \ to any type of stream, records stores, and record enumerations. Anything that\
    \ can be closed should be, preferably in a finally block.\n\n### Optimize the\
    \ User Interface\n\nIt's important to remember that you are trying to optimize\
    \ the *perceived* speed of your application, not the actual speed of the application.\
    \ Users get fidgety if the application freezes up for a few seconds; adding some\
    \ sort of progress indicator can go a long way toward making users happier. There's\
    \ really nothing you can do to make the network run faster, but if you display\
    \ a spinning clock or a moving progress bar, your application will at least look\
    \ like it's still alive while it's waiting for the network.\n\nKeep in mind that\
    \ users of mobile phones and other small \"consumer\" devices will be much more\
    \ demanding than typical desktop computer users. Through years of experience,\
    \ bitter desktop computer users have fairly low expectations of their applications.\
    \ They realize that most desktop applications have a learning curve and are frequently\
    \ cantankerous. Consumer devices, on the other hand, are much more likely to work\
    \ right the first time, requiring neither manuals nor advanced degrees to operate.\n\
    \nWith this in mind, be sure that your MIDlet user interface is uncomplicated,\
    \ fast, responsive, and informative.\n\n## Optimizing Application Deployment\n\
    \nOne last area of optimization has to do with the actual deployment of your application.\
    \ As you may remember from [Chapter 3](#LiB0024_split_000.html#106), MIDlets are\
    \ packaged in MIDlet suites, which are really just fancy JAR files. One way to\
    \ optimize your application is partition your classes so that only the ones you\
    \ need are loaded into the runtime environment. If you are careful, you can reduce\
    \ the size or your MIDlet suite JAR by eliminating classes you don't need. Finally,\
    \ a code obfuscator may be used to further reduce the size or the MIDlet suite\
    \ JAR.\n\n### Partition Your Application\n\nThe MIDP runtime environment loads\
    \ classes as they are needed. You can use this to your advantage to optimize the\
    \ runtime footprint of your application. For example, suppose you write a datebook\
    \ application that has the capability to send you reminder e-mails, or *ticklers*.\
    \ You would probably realize that many people will not take advantage of the tickler\
    \ feature. Why should tickler code take up space in a MIDP device if the user\
    \ is not using ticklers? If you partition your code correctly, all of the tickler\
    \ functionality can be encapsulated in a single class. If the rest of the application\
    \ never calls the tickler code, the class will not be loaded, resulting in a slimmer\
    \ runtime footprint.\n\n### Only Include Classes You Need\n\nYou may be using\
    \ third-party packages in your MIDlet suite, like an XML parser (see [Chapter\
    \ 14](#LiB0112_split_000.html#599)) or a cryptography package (see [Chapter 15](#LiB0118_split_000.html#623)).\
    \ For development, you might have simply dumped the whole package into your MIDlet\
    \ suite. But come deployment time, you should prune out the excess packages to\
    \ reduce the size or your MIDlet suite JAR. In some cases this will be fairly\
    \ easy, like dumping out WAP support classes if you're simply parsing XML. Other\
    \ times it will not be so obvious which classes you need and which ones you can\
    \ get rid of. However, if you really want to reduce your MIDlet suite JAR size,\
    \ this is a crucial step. You don't need to do this by hand; an *obfuscator* will\
    \ do the work for you.\n\n### Use an Obfuscator\n\nFinally, a *bytecode obfuscator*\
    \ can reduce the size of your class files. A bytecode obfuscator is a tool that\
    \ is supposed to make it difficult to decompile class files. Decompilation is\
    \ a process by which someone can recreate the source code that was used to make\
    \ a particular class file. People who are worried about competitors stealing their\
    \ code use obfuscators to make decompilation more difficult. However, obfuscation\
    \ has the side effect of reducing class file size, mainly because the descriptive\
    \ method and variable names you created are replaced with small machine-generated\
    \ names. If you're very serious about reducing the size of your MIDlet suite JAR,\
    \ try obfuscating your code. I suggest running the obfuscator before preverifying\
    \ the class files, but it's conceivable it would work the other way around, too.\
    \ Here are two obfuscators to get you started:\n\n```\nhttp://proguard.sourceforge.net/\n\
    http://www.retrologic.com/retroguard-main.html \n```"
  trans: "\n### 保持整洁\n\n一个简单的建议是及时清理。一旦使用完毕就释放资源，可以提升应用程序的性能。如果你有内部数组或数据结构，在不使用时应当释放它们。一种方法是将数组引用设为\
    \ null，以便数组能被垃圾回收。如果你急于将内存归还给运行时系统，甚至可以显式调用垃圾回收器 `System.gc()`。\n\n网络连接也应在使用完毕后立即释放。一个很好的做法是使用\
    \ `finally` 子句。考虑以下未使用 `finally` 子句的代码：\n\n```\nHttpConnection hc = null;\nInputStream\
    \ in = null;\ntry {\n  hc = (HttpConnection)Connector.open(url);\n  in = hc.openInputStream();\n\
    \  // 从 in 中读取数据。\n  in.close();\n  hc.close();\n}\ncatch (IOException ioe) {\n\
    \  // 处理异常。\n} \n```\n\n问题在于，当尝试从连接的输入流读取数据时如果抛出异常，执行流程会跳转到异常处理程序，导致输入流和连接从未被关闭。在内存充裕的\
    \ J2SE 环境中，这可能不是什么大问题。但在 MIDP 设备上，一个挂起的连接可能是一场灾难。当你绝对、肯定地想要确保某些代码被执行时，应该将其放入 `finally`\
    \ 块中，如下所示：\n\n```\nHttpConnection hc = null;\nInputStream in = null;\ntry {\n\
    \  hc = (HttpConnection)Connector.open(url);\n  in = hc.openInputStream();\n \
    \ // 从 in 中读取数据。\n}\ncatch (IOException ioe) {\n  // 处理异常。\n}\nfinally {\n  try\
    \ {\n    if (in != null) in.close();\n    if (hc != null) hc.close();\n  }\n \
    \ catch (IOException ioe) { }\n}\n```\n\n这看起来有点丑陋，尤其是 `finally` 块内部的 `try` 和 `catch`。一个更简洁的解决方案是将这段代码封装到一个方法中，并声明该方法抛出\
    \ `IOException`。这能显著简化代码：\n\n```\nprivate void doNetworkStuff(String url) throws\
    \ IOException {\n  HttpConnection hc = null;\n  InputStream in = null;\n  try\
    \ {\n    hc = (HttpConnection)Connector.open(url);\n    in = hc.openInputStream();\n\
    \    // 从 in 中读取数据。\n  }\n  finally {\n    if (in != null) in.close();\n    if\
    \ (hc != null) hc.close();\n  }\n} \n```\n\n`finally` 的关键在于，无论控制流如何离开 `try` 块，其代码都会被执行。无论是抛出异常、有人调用\
    \ `return`，还是控制流正常离开 `try` 块，我们的 `finally` 块都会被执行。注意，这里仍然存在一点小隐患：如果在尝试关闭 `in`\
    \ 时抛出异常，那么 `hc` 将永远不会被关闭。你可以将每个 `close()` 调用分别放在自己的 `try` 和 `catch` 块中来解决这个问题。\n\
    \n保持整洁适用于任何类型的流、记录存储和记录枚举。任何可以关闭的资源都应该被关闭，最好是在 `finally` 块中。\n\n### 优化用户界面\n\n\
    重要的是要记住，你试图优化的是应用程序的*感知*速度，而非实际速度。如果应用程序冻结几秒钟，用户会变得焦躁不安；添加某种进度指示器可以大大提升用户满意度。你确实无法让网络运行得更快，但如果你显示一个旋转的时钟或移动的进度条，你的应用程序至少在等待网络时看起来还活着。\n\
    \n请记住，手机和其他小型“消费类”设备的用户会比典型的桌面电脑用户要求高得多。经过多年的体验，饱受折磨的桌面电脑用户对应用程序的期望已经相当低。他们意识到大多数桌面应用程序都有学习曲线，并且经常难以驾驭。而消费类设备则更有可能第一次就正常工作，既不需要手册，也不需要高级学位才能操作。\n\
    \n考虑到这一点，请确保你的 MIDlet 用户界面简单、快速、响应迅速且信息丰富。\n\n## 优化应用程序部署\n\n最后一个优化领域与应用程序的实际部署有关。你可能还记得第\
    \ 3 章，MIDlet 被打包在 MIDlet 套件中，这实际上就是一些花哨的 JAR 文件。优化应用程序的一种方法是划分你的类，以便只将需要的类加载到运行时环境中。如果小心处理，你可以通过消除不需要的类来减小\
    \ MIDlet 套件 JAR 的大小。最后，可以使用代码混淆器来进一步减小 MIDlet 套件 JAR 的大小。\n\n### 划分你的应用程序\n\n\
    MIDP 运行时环境在需要时加载类。你可以利用这一点来优化应用程序的运行时占用空间。例如，假设你编写了一个约会簿应用程序，它能够向你发送提醒邮件，或称*提醒器*。你可能会意识到许多人不会使用提醒器功能。如果用户不使用提醒器，为什么提醒器代码要占用\
    \ MIDP 设备上的空间呢？如果你正确地划分代码，所有提醒器功能都可以封装在一个单独的类中。如果应用程序的其他部分从未调用提醒器代码，该类就不会被加载，从而获得更精简的运行时占用空间。\n\
    \n### 只包含你需要的类\n\n你可能在 MIDlet 套件中使用了第三方包，例如 XML 解析器（参见第 14 章）或加密包（参见第 15 章）。在开发阶段，你可能只是将整个包转储到\
    \ MIDlet 套件中。但在部署时，你应该修剪掉多余的包，以减小 MIDlet 套件 JAR 的大小。在某些情况下，这会相当容易，比如如果你只是解析 XML，就可以丢弃\
    \ WAP 支持类。其他时候，哪些类需要、哪些可以去掉则不那么明显。然而，如果你真的想减小 MIDlet 套件 JAR 的大小，这是一个关键步骤。你不需要手动完成这项工作；一个*混淆器*会为你代劳。\n\
    \n### 使用混淆器\n\n最后，一个*字节码混淆器*可以减小类文件的大小。字节码混淆器是一种旨在使反编译类文件变得困难工具。反编译是一个过程，通过它，某人可以重新创建用于生成特定类文件的源代码。担心竞争对手窃取代码的人会使用混淆器来增加反编译的难度。然而，混淆有一个副作用，即减小类文件的大小，这主要是因为你所创建的描述性方法和变量名被替换成了机器生成的小名称。如果你非常认真地想要减小\
    \ MIDlet 套件 JAR 的大小，请尝试混淆你的代码。我建议在预验证类文件之前运行混淆器，但反过来操作也是可行的。以下是两个可供入门的混淆器：\n\n\
    ```\nhttp://proguard.sourceforge.net/\nhttp://www.retrologic.com/retroguard-main.html\
    \ \n```\n"
- fmt: "## Summary\n\nMIDP applications are targeted to run on a small platform, which\
    \ means that using memory and processing power efficiently is important. Creating\
    \ and destroying objects is expensive, so one way to optimize your code is to\
    \ reduce the number of objects you create. One common source of new objects is\
    \ code that creates `String`s. Consider optimizing `String` manipulation using\
    \ `StringBuffer` or character arrays. Similarly, you may be able to streamline\
    \ code by using object arrays in place of `Vector`s or `Hashtable`s. Remember\
    \ that performance is as much about perception as anything else; provide a responsive,\
    \ active user interface and handle failures gracefully. You can also optimize\
    \ the delivery of your application in several ways. First, partitioning the functionality\
    \ of your application intelligently can reduce the runtime footprint of your application.\
    \ Next, trimming out excess classes can reduce the size of your MIDlet suite JAR.\
    \ Finally, a bytecode obfuscator can further reduce the size of your MIDlet suite\
    \ JAR.\n\n# Chapter 14: Parsing XML\n\nOn the desktop and in the enterprise, Java\
    \ and XML are a winning combination. In brief, Java is portable code and XML is\
    \ portable data. Developing in Java gives you the ability to deploy code on many\
    \ different platforms, while XML supplies a highly portable data format for exchanging\
    \ data between application components and applications themselves.\n\nXML's popularity\
    \ reaches into the J2ME world. This chapter describes XML parsers that are available\
    \ for MIDP environments. This is fun stuff, right at the raw edge of J2ME development.\
    \ Standards are on the way, but they haven't arrived yet. See [http://jcp.org/en/jsr/detail?id=172](http://jcp.org/en/jsr/detail?id=172)\
    \ for details on an XML parsing and web services JSR.\n\n## XML Overview\n\nXML\
    \ is the Extensible Markup Language. An XML file is some collection of data that\
    \ is demarcated by tags. XML files are structured and highly portable.\n\nLet's\
    \ consider the Jargoneer application from [Chapter 2](#LiB0012_split_000.html#57)\
    \ again. In that application, the MIDP device talks to an intermediate server.\
    \ This server retrieves an HTML page from the Jargon File server, performs the\
    \ parsing, and sends a distilled version of the data down to the MIDP device.\
    \ [Figure 14-1](#LiB0112_split_001.html#ch14fig01) shows this architecture.\n\n\
    [![Click To expand](fig271_01.jpg)](fig271_01_0.jpg)\nFigure 14-1: A simple architecture\
    \ for *Jargoneer*\n\nWhat, exactly, could get sent from the intermediate server\
    \ to the MIDP device? The Jargoneer example application actually sends flat text,\
    \ but there are many other possibilities. The next simplest technique for exchanging\
    \ data between a server and a device would be to use a properties file, like this:\n\
    \n```\nword: grok\npronunciation: /grok/\ntype: vt.\nmeaning: [from the novel\
    \ \"Stranger in ...\n```\n\nThis works fine and is probably all you would need\
    \ for simple applications. You'd have to write a class that could parse this input\
    \ (MIDP doesn't include `java.util.Properties`), but that wouldn't be too bad.\n\
    \nHowever, chances are excellent that some parts of your application are already\
    \ speaking XML, and it would likely simplify your life considerably if your MIDlet\
    \ could parse XML instead of having its own specific data format. Furthermore,\
    \ using XML validation during the development cycle may be a big help in flushing\
    \ out bugs.\n\nAs an XML file, then, the same information would probably look\
    \ like this:\n\n```\n<?xml version=\"1.0\" encoding=\"ISO-8859-1\"?>\n<jargon-definition>\n\
    \  <word>grok</word>\n  <pronunciation>/grok/</pronunciation>\n  <type>vt.</type>\n\
    \  <meaning>[from the novel \"Stranger in ...</meaning>\n</jargon-definition>\n\
    ```\n\nThis simple XML document illustrates some important points. First, tags\
    \ mark off every piece of data (element) in the document. In essence, every element\
    \ has a name. Matching start and end tags are used to clearly separate elements.\
    \ For example, the start tag `<word>` and the end tag `</word>` surround the word\
    \ itself. Also note that elements may be nested. The `jargon-definition` element\
    \ is simply a collection of other elements. Any of the other elements could contain\
    \ further nested elements.\n\nElement tags may also contain attributes. An alternate\
    \ way of writing the previous XML file looks like this:\n\n```\n<?xml version=\"\
    1.0\" encoding=\"ISO-8859-1\"?>\n<jargon-definition word=\"grok\" pronunciation=\"\
    /grok/\" type=\"vt.\">\n  [from the novel \"Stranger in ...\n</jargon-definition>\
    \ \n```\n\nIt's up to you exactly how you structure your XML data. Usually it\
    \ depends on the structure of your application and the systems with which you\
    \ will be exchanging data.\n\n| **![Start Sidebar](_1.gif)** |\n\n**XML and HTML**\n\
    \nXML looks a lot like HTML, but there are some important differences. First,\
    \ HTML has a fixed set of tags, like `<TITLE>`, `<BODY>`, `<H1>`, `<P>`, and so\
    \ forth. In XML, you can define whatever tags you want.\n\nHTML is also pretty\
    \ lax about requiring closing tags. For example, HTML documents typically have\
    \ `<P>` tags at the beginning of each paragraph, but it's unusual to have matching\
    \ `</P>` close tags. As a matter of fact, the HTML world is pretty loose about\
    \ document formatting in general. You can throw all sorts of strange documents\
    \ at a browser and it will do its best to display them.\n\nIt is possible to write\
    \ HTML so that it complies with XML; this is XHTML. For more information on XHTML,\
    \ see [http://www.w3.org/TR/xhtml1/](http://www.w3.org/TR/xhtml1/).\n\n| **![End\
    \ Sidebar](_1.gif)** |\n\n|  |\n\n### Understanding SAX\n\nSAX is the Simple API\
    \ for XML, a standard API for Java applications that want to parse XML data. The\
    \ API is documented online at [http://www.megginson.com/SAX/](http://www.megginson.com/SAX/),\
    \ but SAX-compliant parsers usually include the SAX API as part of their software.\
    \ The current version of SAX is 2.0, but the small parsers covered in this chapter\
    \ are only at the 1.0 level if they implement SAX at all.\n\nSAX 1.0 revolves\
    \ around the `org.xml.sax.Parser` interface. `Parser` has a method, `parse()`,\
    \ that parses through an entire XML document, spitting out events to listening\
    \ objects. Typically, your application will implement a `DocumentHandler` that\
    \ receives notification about start tags, end tags, element data, and other important\
    \ events. A SAX 1.0 application looks something like this:\n\n```\ntry {\n  Parser\
    \ p = new SAXParser(); // Create a specific parser implementation.\n  // Create\
    \ some DocumentHandler named handler.\n  p.setDocumentHandler(handler);\n  p.parse();\n\
    }\ncatch (Exception e) { // Handle exceptions. } \n```\n\nThe call to `parse()`\
    \ proceeds until the document has been fully parsed. During the parse, callback\
    \ methods in the registered `DocumentHandler` are invoked. In these methods, you'll\
    \ process the data from the XML document.\n\nSAX 1.0 is not MIDP-compliant straight\
    \ out of the box. The `Parser` interface includes a `setLocale()` method that\
    \ references the `java.util.Locale` class, a class that is missing in the MIDP\
    \ platform.\n\nAnother standard API, the Document Object Model (DOM), takes a\
    \ different approach to XML parsing. With DOM, the parser creates an internal\
    \ model of a document as it is parsed. After parsing is complete, an application\
    \ can examine the entire document. DOM is further described here at [http://www.w3.org/TR/DOM-Level-2-Core/](http://www.w3.org/TR/DOM-Level-2-Core/).\
    \ Although none of the parsers described in this chapter implement DOM directly,\
    \ some of them do follow the DOM paradigm of creating an internal representation\
    \ of a parsed document.\n\nA more recent XML parser API standard is `XmlPull`,\
    \ which is documented at [http://www.xmlpull.org/](http://www.xmlpull.org/). `XmlPull`\
    \ is implemented by `kXML 2`, which is presented later."
  raw: "## Summary\n\nMIDP applications are targeted to run on a small platform, which\
    \ means that using memory and processing power efficiently is important. Creating\
    \ and destroying objects is expensive, so one way to optimize your code is to\
    \ reduce the number of objects you create. One common source of new objects is\
    \ code that creates Strings. Consider optimizing String manipulation using StringBuffer\
    \ or character arrays. Similarly, you may be able to streamline code by using\
    \ object arrays in place of Vectors or Hashtables. Remember that performance is\
    \ as much about perception as anything else; provide a responsive, active user\
    \ interface and handle failures gracefully. You can also optimize the delivery\
    \ of your application in several ways. First, partitioning the functionality of\
    \ your application intelligently can reduce the runtime footprint of your application.\
    \ Next, trimming out excess classes can reduce the size of your MIDlet suite JAR.\
    \ Finally, a bytecode obfuscator can further reduce the size of your MIDlet suite\
    \ JAR.\n\n# Chapter 14: Parsing XML\n\nOn the desktop and in the enterprise, Java\
    \ and XML are a winning combination. In brief, Java is portable code and XML is\
    \ portable data. Developing in Java gives you the ability to deploy code on many\
    \ different platforms, while XML supplies a highly portable data format for exchanging\
    \ data between application components and applications themselves.\n\nXML's popularity\
    \ reaches into the J2ME world. This chapter describes XML parsers that are available\
    \ for MIDP environments. This is fun stuff, right at the raw edge of J2ME development.\
    \ Standards are on the way, but they haven't arrived yet. See [http://jcp.org/en/jsr/detail?id=172](http://jcp.org/en/jsr/detail?id=172)\
    \ for details on an XML parsing and web services JSR.\n\n## XML Overview\n\nXML\
    \ is the Extensible Markup Language. An XML file is some collection of data that\
    \ is demarcated by tags. XML files are structured and highly portable.\n\nLet's\
    \ consider the Jargoneer application from [Chapter 2](#LiB0012_split_000.html#57)\
    \ again. In that application, the MIDP device talks to an intermediate server.\
    \ This server retrieves an HTML page from the Jargon File server, performs the\
    \ parsing, and sends a distilled version of the data down to the MIDP device.\
    \ [Figure 14-1](#LiB0112_split_001.html#ch14fig01) shows this architecture.\n\n\
    [![Click To expand](fig271_01.jpg)](fig271_01_0.jpg)\nFigure 14-1: A simple architecture\
    \ for *Jargoneer*\n\nWhat, exactly, could get sent from the intermediate server\
    \ to the MIDP device? The Jargoneer example application actually sends flat text,\
    \ but there are many other possibilities. The next simplest technique for exchanging\
    \ data between a server and a device would be to use a properties file, like this:\n\
    \n```\nword: grok\npronunciation: /grok/\ntype: vt.\nmeaning: [from the novel\
    \ \"Stranger in ...\n```\n\nThis works fine and is probably all you would need\
    \ for simple applications. You'd have to write a class that could parse this input\
    \ (MIDP doesn't include java.util.Properties), but that wouldn't be too bad.\n\
    \nHowever, chances are excellent that some parts of your application are already\
    \ speaking XML, and it would likely simplify your life considerably if your MIDlet\
    \ could parse XML instead of having its own specific data format. Furthermore,\
    \ using XML validation during the development cycle may be a big help in flushing\
    \ out bugs.\n\nAs an XML file, then, the same information would probably look\
    \ like this:\n\n```\n<?xml version=\"1.0\" encoding=\"ISO-8859-1\"?>\n<jargon-definition>\n\
    \  <word>grok</word>\n  <pronunciation>/grok/</pronunciation>\n  <type>vt.</type>\n\
    \  <meaning>[from the novel \"Stranger in ...</meaning>\n</jargon-definition>\n\
    ```\n\nThis simple XML document illustrates some important points. First, tags\
    \ mark off every piece of data (element) in the document. In essence, every element\
    \ has a name. Matching start and end tags are used to clearly separate elements.\
    \ For example, the start tag <word> and the end tag </word> surround the word\
    \ itself. Also note that elements may be nested. The jargon-definition element\
    \ is simply a collection of other elements. Any of the other elements could contain\
    \ further nested elements.\n\nElement tags may also contain attributes. An alternate\
    \ way of writing the previous XML file looks like this:\n\n```\n<?xml version=\"\
    1.0\" encoding=\"ISO-8859-1\"?>\n<jargon-definition word=\"grok\" pronunciation=\"\
    /grok/\" type=\"vt.\">\n  [from the novel \"Stranger in ...\n</jargon-definition>\
    \ \n```\n\nIt's up to you exactly how you structure your XML data. Usually it\
    \ depends on the structure of your application and the systems with which you\
    \ will be exchanging data.\n\n| **![Start Sidebar](_1.gif)** |\n\n**XML and HTML\n\
    \nXML looks a lot like HTML, but there are some important differences. First,\
    \ HTML has a fixed set of tags, like <TITLE>, <BODY>, <H1>, <P>, and so forth.\
    \ In XML, you can define whatever tags you want.\n\nHTML is also pretty lax about\
    \ requiring closing tags. For example, HTML documents typically have <P> tags\
    \ at the beginning of each paragraph, but it's unusual to have matching </P> close\
    \ tags. As a matter of fact, the HTML world is pretty loose about document formatting\
    \ in general. You can throw all sorts of strange documents at a browser and it\
    \ will do its best to display them.\n\nIt is possible to write HTML so that it\
    \ complies with XML; this is XHTML. For more information on XHTML, see [http://www.w3.org/TR/xhtml1/](http://www.w3.org/TR/xhtml1/).\n\
    \n| **![End Sidebar](_1.gif)** |\n\n|  |\n\n### Understanding SAX\n\nSAX is the\
    \ Simple API for XML, a standard API for Java applications that want to parse\
    \ XML data. The API is documented online at [http://www.megginson.com/SAX/](http://www.megginson.com/SAX/),\
    \ but SAX-compliant parsers usually include the SAX API as part of their software.\
    \ The current version of SAX is 2.0, but the small parsers covered in this chapter\
    \ are only at the 1.0 level if they implement SAX at all.\n\nSAX 1.0 revolves\
    \ around the org.xml.sax.Parser interface. Parser has a method, parse(), that\
    \ parses through an entire XML document, spitting out events to listening objects.\
    \ Typically, your application will implement a DocumentHandler that receives notification\
    \ about start tags, end tags, element data, and other important events. A SAX\
    \ 1.0 application looks something like this:\n\n```\ntry {\n  Parser p = new SAXParser();\
    \ // Create a specific parser implementation.\n  // Create some DocumentHandler\
    \ named handler.\n  p.setDocumentHandler(handler);\n  p.parse();\n}\ncatch (Exception\
    \ e) { // Handle exceptions. } \n```\n\nThe call to parse() proceeds until the\
    \ document has been fully parsed. During the parse, callback methods in the registered\
    \ DocumentHandler are invoked. In these methods, you'll process the data from\
    \ the XML document.\n\nSAX 1.0 is not MIDP-compliant straight out of the box.\
    \ The Parser interface includes a setLocale() method that references the java.util.Locale\
    \ class, a class that is missing in the MIDP platform.\n\nAnother standard API,\
    \ the Document Object Model (DOM), takes a different approach to XML parsing.\
    \ With DOM, the parser creates an internal model of a document as it is parsed.\
    \ After parsing is complete, an application can examine the entire document. DOM\
    \ is further described here at [http://www.w3.org/TR/DOM-Level-2-Core/](http://www.w3.org/TR/DOM-Level-2-Core/).\
    \ Although none of the parsers described in this chapter implement DOM directly,\
    \ some of them do follow the DOM paradigm of creating an internal representation\
    \ of a parsed document.\n\nA more recent XML parser API standard is XmlPull, which\
    \ is documented at [http://www.xmlpull.org/](http://www.xmlpull.org/). XmlPull\
    \ is implemented by kXML 2, which is presented later."
  trans: "\n## 摘要\n\nMIDP 应用程序的目标是在小型平台上运行，这意味着高效使用内存和处理能力至关重要。创建和销毁对象的开销很大，因此优化代码的一种方法是减少创建对象的数量。新对象的一个常见来源是创建字符串的代码。考虑使用\
    \ `StringBuffer` 或字符数组来优化字符串操作。同样，你可以通过使用对象数组代替 `Vector` 或 `Hashtable` 来精简代码。请记住，性能在很大程度上也关乎用户体验；提供一个响应迅速、交互活跃的用户界面，并优雅地处理故障。你还可以通过多种方式优化应用程序的交付。首先，智能地划分应用程序的功能可以减少其运行时占用空间。其次，裁剪多余的类可以减小\
    \ MIDlet 套件 JAR 文件的大小。最后，字节码混淆器可以进一步减小 MIDlet 套件 JAR 文件的大小。\n\n# 第 14 章：解析 XML\n\
    \n在桌面和企业级应用中，Java 和 XML 是一对黄金组合。简而言之，Java 是可移植的代码，而 XML 是可移植的数据。使用 Java 开发，你能够将代码部署到许多不同的平台上，而\
    \ XML 则提供了一种高度可移植的数据格式，用于在应用程序组件以及应用程序本身之间交换数据。\n\nXML 的流行也延伸到了 J2ME 世界。本章介绍可用于\
    \ MIDP 环境的 XML 解析器。这些内容非常有趣，正处在 J2ME 开发的前沿。相关标准正在制定中，但尚未最终确定。有关 XML 解析和 Web 服务的\
    \ JSR 详情，请参见 [`jcp.org/en/jsr/detail?id=172`](http://jcp.org/en/jsr/detail?id=172)。\n\
    \n## XML 概述\n\nXML 即可扩展标记语言。一个 XML 文件是由标签分隔的数据集合。XML 文件是结构化的，并且具有高度的可移植性。\n\n\
    让我们再次回顾第 2 章中的 Jargoneer 应用程序。在该应用中，MIDP 设备与一个中间服务器通信。该服务器从 Jargon 文件服务器检索 HTML\
    \ 页面，执行解析，然后将精简后的数据版本发送到 MIDP 设备。图 14-1 展示了这种架构。\n\n![点击展开](img/fig271_01_0.jpg)\n\
    图 14-1：*Jargoneer* 的简单架构\n\n那么，究竟什么数据可以从中间服务器发送到 MIDP 设备呢？Jargoneer 示例应用实际上发送的是纯文本，但还有许多其他可能性。在服务器和设备之间交换数据的次简单技术是使用属性文件，如下所示：\n\
    \n```\nword: grok\npronunciation: /grok/\ntype: vt.\nmeaning: from the novel \"\
    Stranger in ...\n```\n\n这种方法效果不错，对于简单的应用来说可能就足够了。你需要编写一个类来解析此输入（MIDP 不包含 `java.util.Properties`），但这并不太难。\n\
    \n然而，你的应用程序的某些部分很可能已经在使用 XML，如果你的 MIDlet 能够解析 XML 而不是使用其特定的数据格式，这可能会大大简化你的工作。此外，在开发周期中使用\
    \ XML 验证可能有助于发现错误。\n\n那么，同样的信息作为 XML 文件，可能看起来像这样：\n\n```\n<?xml version=\"1.0\"\
    \ encoding=\"ISO-8859-1\"?>\n<jargon-definition>\n  <word>grok</word>\n  <pronunciation>/grok/</pronunciation>\n\
    \  <type>vt.</type>\n  <meaning>[from the novel \"Stranger in ...</meaning>\n\
    </jargon-definition>\n```\n\n这个简单的 XML 文档说明了一些重要点。首先，标签标记了文档中的每一段数据（元素）。本质上，每个元素都有一个名称。匹配的开始和结束标签用于清晰地区分元素。例如，开始标签\
    \ `<word>` 和结束标签 `</word>` 包围了单词本身。还要注意，元素可以嵌套。`jargon-definition` 元素只是其他元素的集合。任何其他元素都可以包含进一步嵌套的元素。\n\
    \n元素标签也可以包含属性。编写上述 XML 文件的另一种方式如下：\n\n```\n<?xml version=\"1.0\" encoding=\"ISO-8859-1\"\
    ?>\n<jargon-definition word=\"grok\" pronunciation=\"/grok/\" type=\"vt.\">\n\
    \  [from the novel \"Stranger in ...\n</jargon-definition> \n```\n\n如何构建 XML 数据完全取决于你。通常，这取决于你的应用程序结构以及你将与之交换数据的系统。\n\
    \n| **![开始侧边栏** |\n\n**XML 与 HTML\n\nXML 看起来很像 HTML，但有一些重要的区别。首先，HTML 有一套固定的标签，如\
    \ `<TITLE>`、`<BODY>`、`<H1>`、`<P>` 等。而在 XML 中，你可以定义任何你想要的标签。\n\nHTML 对于要求闭合标签也相当宽松。例如，HTML\
    \ 文档通常在每段开头有 `<P>` 标签，但很少会有匹配的 `</P>` 闭合标签。事实上，HTML 世界在文档格式方面通常相当松散。你可以向浏览器抛出各种奇怪的文档，它会尽力显示它们。\n\
    \n可以编写符合 XML 规范的 HTML；这就是 XHTML。有关 XHTML 的更多信息，请参见 [`www.w3.org/TR/xhtml1/`](http://www.w3.org/TR/xhtml1/)。\n\
    \n| **![结束侧边栏](img/_1.gif)** |\n\n|  |\n\n### 理解 SAX\n\nSAX 是 XML 的简单 API，是一个供希望解析\
    \ XML 数据的 Java 应用程序使用的标准 API。该 API 在线文档位于 [`www.megginson.com/SAX/`](http://www.megginson.com/SAX/)，但兼容\
    \ SAX 的解析器通常会将 SAX API 作为其软件的一部分包含在内。SAX 的当前版本是 2.0，但本章涵盖的小型解析器如果实现了 SAX，通常只达到\
    \ 1.0 级别。\n\nSAX 1.0 围绕 `org.xml.sax.Parser` 接口展开。`Parser` 有一个 `parse()` 方法，该方法解析整个\
    \ XML 文档，并向监听对象抛出事件。通常，你的应用程序会实现一个 `DocumentHandler`，它接收关于开始标签、结束标签、元素数据和其他重要事件的通知。一个\
    \ SAX 1.0 应用程序看起来像这样：\n\n```\ntry {\n  Parser p = new SAXParser(); // 创建一个特定的解析器实现。\n\
    \  // 创建一个名为 handler 的 DocumentHandler。\n  p.setDocumentHandler(handler);\n  p.parse();\n\
    }\ncatch (Exception e) { // 处理异常。 } \n```\n\n对 `parse()` 的调用会一直进行，直到文档被完全解析。在解析过程中，已注册的\
    \ `DocumentHandler` 中的回调方法会被调用。在这些方法中，你将处理来自 XML 文档的数据。\n\nSAX 1.0 并非开箱即用就能兼容\
    \ MIDP。`Parser` 接口包含一个 `setLocale()` 方法，该方法引用了 `java.util.Locale` 类，而该类在 MIDP\
    \ 平台中缺失。\n\n另一个标准 API，文档对象模型（DOM），采用了不同的 XML 解析方法。使用 DOM，解析器在解析文档时会创建一个文档的内部模型。解析完成后，应用程序可以检查整个文档。DOM\
    \ 在 [`www.w3.org/TR/DOM-Level-2-Core/`](http://www.w3.org/TR/DOM-Level-2-Core/)\
    \ 有进一步描述。尽管本章描述的所有解析器都没有直接实现 DOM，但其中一些确实遵循了 DOM 的范式，即创建已解析文档的内部表示。\n\n一个较新的 XML\
    \ 解析器 API 标准是 XmlPull，其文档位于 [`www.xmlpull.org/`](http://www.xmlpull.org/)。XmlPull\
    \ 由 kXML 2 实现，稍后将介绍 kXML 2。\n"
- fmt: '### Validation and Development Cycle


    XML documents may also make reference to a Document Type Definition (DTD) or an
    XML Schema; these are files that describe the contents of a particular kind of
    XML document. We could, for example, write a DTD that specified the contents of
    a jargon-definition document. This is part of the power of XML, and it''s the
    reason XML is sometimes called *self-describing data*.


    Given a document, you can determine if it conforms to its DTD, which is a great
    way to determine if part of your system is producing data that''s unreadable by
    the rest of your system. In XML terms, a document that follows the rules of its
    DTD or schema is *valid*. In the J2SE and J2EE worlds, parsers may be validating
    or non-validating. The J2ME world is too small to support XML document validation,
    so all of the parsers we''ll discuss in this chapter are non-validating.


    Even though you won''t be able to perform validation on a MIDP device, you may
    well want to use validating parsers during your development and test cycle. For
    example, you might write code that emulates the MIDP client, having it request
    data from your server and validate the results. This helps flush out bugs in the
    server code before you make the switch over to the MIDP client software.


    ### Design Tips


    Common sense, as always, takes you a long way. As you contemplate the use of XML
    in your MIDP application, keep three things in mind:


    - Keep the documents small. If you''re sending some 100KB document down to the
    MIDP device and only using a few elements, it''s time to rethink your server-side
    strategy. You can probably transform the document at the server and just send
    what you need to the device. Keep in mind that network connectivity is likely
    to be slow and there''s not much memory on the device.

    - Don''t use comments in the XML that you send to the MIDP device, except perhaps
    as a debugging aid during the development cycle. Comments will only make the document
    longer, which implies a slower download and more memory usage on the device.

    - Choose a parser that fits your needs. Some of the parsers we''ll examine build
    an entire model of a document in memory as the document is parsed. This is like
    writing a blank check to the supplier of the XML document. If the server sends
    you a 1MB file, these types of parsers will attempt to read through the whole
    thing, right up until they run out of memory. On the other hand, if you know the
    size of the files you''ll be parsing, and they are small enough, you might choose
    a model-building parser, as it is slightly easier to use than the other types
    of parsers.

    - Consider using a compact representation of the XML document. Representing XML
    documents in ASCII or Unicode is not efficient, and there are various schemes
    for more compact representations. The WAP forum, in fact, has defined a standard
    for binary coded XML called WBXML. A parser called SWX can handle WBXML and is
    appropriate for small platforms like MIDP: [http://www.trantor.de/wbxml/](http://www.trantor.de/wbxml/).
    For another approach to this problem, see the JXME project at [http://jxme.jxta.org/](http://jxme.jxta.org/).


    Finally, you may be concerned about the performance of a small XML parser. This
    is a valid concern, especially on a small device that has a relatively slow processor.
    For a fascinating comparison of XML parser performance, see [http://www.extreme.indiana.edu/~aslom/exxp/](http://www.extreme.indiana.edu/~aslom/exxp/).
    With small documents, the small parsers can hold their own or outperform larger
    parsers.


    As with other potentially time-consuming operations, parsing should be done in
    its own thread so the user interface doesn''t freeze.


    ## MIDP XML Parser Roundup


    [Table 14-1](#LiB0113.html#ch14table01) lists small, open-source XML parsers that
    can be used with the MIDP platform. Each of these parsers is released under some
    type of open-source software license as listed in the License column. The Size
    column shows the approximate size of the compressed class files for the parser.
    The Type column describes the parsing paradigm using one of the following:


    - "Pull" indicates that the programmer repeatedly calls a method on the parser
    to propel it through a document.

    - "Push" means that the parser runs through the entire document by itself, invoking
    callback methods in your code when important events happen. SAX parsers implement
    the push paradigm.

    - "Model" indicates that the parser builds some internal representation (in memory)
    of the document. After parsing is finished, your code can examine this model and
    pull out element data.


    **Table 14-1: Small XML Parsers**


    | **NAME** | **VERSION** | **URL** | **LICENSE** | **SIZE** | **MIDP** | **TYPE**
    |

    | --- | --- | --- | --- | --- | --- | --- |

    | kXML | 1.21 | [http://kxml.enhydra.org/](http://kxml.enhydra.org/) | EPL | 21KB
    | Yes | Pull |

    | kXML | 2.1.6 | [http://kxml.org/](http://kxml.org/) | CPL | 9KB | Yes | Pull
    |

    | MinML | 1.7 | [http://www.wilson.co.uk/xml/minml.htm](http://www.wilson.co.uk/xml/minml.htm)
    | BSD | 14KB | No | Push |

    | NanoXML | 2.2.2 lite | [http://web.wanadoo.be/cyberelf/nanoxml/](http://web.wanadoo.be/cyberelf/nanoxml/)
    | zlib/libpng | 6KB | No | Model |

    | TAM | - | [http://simonstl.com/projects/tam/](http://simonstl.com/projects/tam/)
    | MPL | 17KB | Yes | Push |

    | TinyXML | 0.7 | [http://www.gibaradunn.srac.org/tiny/](http://www.gibaradunn.srac.org/tiny/)
    | GPL | 6KB | No | Model |

    | XmlReader | - | [http://kobjects.org/utils4me/](http://kobjects.org/utils4me/)
    | LGPL | 5KB | Yes | Pull |

    | XMLtp | 1.7 | [http://mitglied.lycos.de/xmltp/](http://mitglied.lycos.de/xmltp/)
    | BSD | 21KB | No | Model |

    | Xparse-J | 1.1 | [http://www.webreference.com/xml/tools/xparse-j.html](http://www.webreference.com/xml/tools/xparse-j.html)
    | GPL | 7KB | Yes | Model |


    The MIDP column indicates whether or not the parser source code compiles without
    modification on the MIDP platform.


    [Table 14-2](#LiB0113.html#ch14table02) provides more information about each type
    of license, listing both the license name and a URL that provides more information.


    **Table 14-2: Software Licenses**


    | **NAME** | **URL** |

    | --- | --- |

    | BSD | [http://opensource.org/licenses/bsd-license.php](http://opensource.org/licenses/bsd-license.php)
    |

    | CPL | [http://opensource.org/licenses/cpl.php](http://opensource.org/licenses/cpl.php)
    |

    | EPL | [http://kxml.enhydra.org/software/license/](http://kxml.enhydra.org/software/license/)
    |

    | GPL | [http://www.webreference.com/xml/tools/license.html](http://www.webreference.com/xml/tools/license.html)
    |

    | LGPL | [http://opensource.org/licenses/lgpl-license.php](http://opensource.org/licenses/lgpl-license.php)
    |

    | MPL | [http://www.mozilla.org/MPL/MPL-1.1.html](http://www.mozilla.org/MPL/MPL-1.1.html)
    |

    | zlib/libpng | [http://opensource.org/licenses/zlib-license.php](http://opensource.org/licenses/zlib-license.php)
    |


    In the following sections, I''ll describe one of the more solid parsers, `kXML
    1.21`. I''ll also talk about techniques for porting the parsers that don''t comply
    with MIDP.'
  raw: '### Validation and Development Cycle


    XML documents may also make reference to a Document Type Definition (DTD) or an
    XML Schema; these are files that describe the contents of a particular kind of
    XML document. We could, for example, write a DTD that specified the contents of
    a jargon-definition document. This is part of the power of XML, and it''s the
    reason XML is sometimes called *self-describing data*.


    Given a document, you can determine if it conforms to its DTD, which is a great
    way to determine if part of your system is producing data that''s unreadable by
    the rest of your system. In XML terms, a document that follows the rules of its
    DTD or schema is *valid*. In the J2SE and J2EE worlds, parsers may be validating
    or non-validating. The J2ME world is too small to support XML document validation,
    so all of the parsers we''ll discuss in this chapter are non-validating.


    Even though you won''t be able to perform validation on a MIDP device, you may
    well want to use validating parsers during your development and test cycle. For
    example, you might write code that emulates the MIDP client, having it request
    data from your server and validate the results. This helps flush out bugs in the
    server code before you make the switch over to the MIDP client software.


    ### Design Tips


    Common sense, as always, takes you a long way. As you contemplate the use of XML
    in your MIDP application, keep three things in mind:


    *   Keep the documents small. If you''re sending some 100KB document down to the
    MIDP deviceand only using a few elements, it''s time to rethink your server-side
    strategy. You can probably transform the document at the server and just send
    what you need to the device. Keep in mind that network connectivity is likely
    to be slow and there''s not much memory on the device.


    *   Don''t use comments in the XML that you send to the MIDP device, except perhaps
    as a debugging aid during the development cycle. Comments will only make the document
    longer, which implies a slower download and more memory usage on the device.


    *   Choose a parser that fits your needs. Some of the parsers we''ll examine build
    an entire model of a document in memory as the document is parsed. This is like
    writing a blank check to the supplier of the XML document. If the server sends
    you a 1MB file, these types of parsers will attempt to read through the whole
    thing, right up until they run out of memory. On the other hand, if you know the
    size of the files you''ll be parsing, and they are small enough, you might choose
    a model-building parser, as it is slightly easier to use than the other types
    of parsers.


    *   Consider using a compact representation of the XML document. Representing
    XML documents in ASCII or Unicode is not efficient, and there are various schemes
    for more compact representations. The WAP forum, in fact, has defined a standard
    for binary coded XML called WBXML. A parser called SWX can handle WBXML and is
    appropriate for small platforms like MIDP: [http://www.trantor.de/wbxml/](http://www.trantor.de/wbxml/).
    For another approach to this problem, see the JXME project at [http://jxme.jxta.org/](http://jxme.jxta.org/).


    Finally, you may be concerned about the performance of a small XML parser. This
    is a valid concern, especially on a small device that has a relatively slow processor.
    For a fascinating comparison of XML parser performance, see [http://www.extreme.indiana.edu/~aslom/exxp/](http://www.extreme.indiana.edu/~aslom/exxp/).
    With small documents, the small parsers can hold their own or outperform larger
    parsers.


    As with other potentially time-consuming operations, parsing should be done in
    its own thread so the user interface doesn''t freeze.


    ## MIDP XML Parser Roundup


    [Table 14-1](#LiB0113.html#ch14table01) lists small, open-source XML parsers that
    can be used with the MIDP platform. Each of these parsers is released under some
    type of open-source software license as listed in the License column. The Size
    column shows the approximate size of the compressed class files for the parser.
    The Type column describes the parsing paradigm using one of the following:


    *   "Pull" indicates that the programmer repeatedly calls a method on the parser
    to propel it through a document.


    *   "Push" means that the parser runs through the entire document by itself, invoking
    callback methods in your code when important events happen. SAX parsers implement
    the push paradigm.


    *   "Model" indicates that the parser builds some internal representation (in
    memory) of the document. After parsing is finished, your code can examine this
    model and pull out element data.


