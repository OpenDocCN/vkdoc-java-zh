    \ insufficient and you'll need to do your own cryptography.\n\nAs I said, HTTPS\
    \ support in MIDP 2.0 is all you need for many applications. Read on if you need\
    \ something stronger, or if you're just curious.\n\nMore information about HTTPS\
    \ and TLS in MIDP is at [http://wireless.java.sun.com/midp/articles/security2/](http://wireless.java.sun.com/midp/articles/security2/).\n\
    \n## The Bouncy Castle Cryptography Package\n\nIn the J2SE world, Sun provides\
    \ support for cryptography through the Java Cryptography Architecture (JCA) and\
    \ the Java Cryptography Extension (JCE). The problem, of course, is that the JCA\
    \ and JCE are too heavy for the MIDP platform. MIDP 2.0's HTTPS support is very\
    \ useful, but it's definitely not a general-purpose cryptography toolkit.\n\n\
    If you're looking to move beyond HTTPS, your best bet is the Bouncy Castle cryptography\
    \ package, an open-source effort based in Australia. It's a wonderful piece of\
    \ work, featuring a clean API and a formidable toolbox of cryptographic algorithms.\
    \ There are several other open source cryptography packages around the world,\
    \ but Bouncy Castle specifically offers a lightweight J2ME distribution of their\
    \ software. To download the package, go to [http://www.bouncycastle.org/](http://www.bouncycastle.org/),\
    \ follow the link for **latest releases**, and choose the **J2ME** release. As\
    \ I write this, the current version is 1.17.\n\nDownload the zip file into the\
    \ location of your choice and unpack it. If you're using the J2ME Wireless Toolkit,\
    \ just drop the *midp_classes.zip* file into the *lib* directory of your project.\
    \ You can go ahead and write MIDlets that use the Bouncy Castle packages.\n\n\
    ## Protecting Passwords with a Message Digest\n\nHaving installed the Bouncy Castle\
    \ cryptography package, let's try a simple example involving authentication. Computer\
    \ systems often use passwords instead of digital signatures (or certificates)\
    \ because they're so much easier. A password is a *shared secret*, which means\
    \ that you know it and the server knows it, but nobody else should know it.\n\n\
    | **![Start Sidebar](_1.gif)** |\n\n**What If Someone Steals Your Phone?\n\nFor\
    \ convenience, an application will probably store your password in persistent\
    \ storage. This is a conscious trade-off of security for usability. The user never\
    \ enters a password, but the password is available in device storage, vulnerable\
    \ to theft by other applications on the device. Furthermore, if someone steals\
    \ the device itself, they'll be able to use the application without being challenged\
    \ for a password.\n\nJSR 177, Security and Trust Services for J2ME ([http://jcp.org/en/jsr/detail?id=177](http://jcp.org/en/jsr/detail?id=177))\
    \ will address these concerns by providing an API to secure storage, among other\
    \ things.\n\n| **![End Sidebar](_1.gif)** |\n\n|  |"
  trans: "\n### 数据安全需求与加密解决方案\n\n您的应用程序将面临以下部分或全部数据安全需求：\n\n*   *完整性*。在最基本的层面上，您希望确保发送的数据不会以任何方式被更改或损坏。这就是数据完整性。\n\
    *   *身份验证*。验证网络连接另一端机器或人员的身份通常非常重要。身份验证就是证明身份的过程。\n*   *机密性*。如果您通过网络发送敏感数据，其他人不应能够看到这些信息。这就是机密性。\n\
    \n密码学为上述每种需求提供了解决方案：\n\n*   *消息摘要*。消息摘要是将一大块数据压缩成一小块数据。例如，您可以将整个文件通过消息摘要算法处理，最终得到一个\
    \ 160 位的摘要值。如果您更改了文件中的哪怕 1 个比特位，并再次运行消息摘要算法，您将得到一个完全不同的摘要值。消息摘要值有时也被称为*数字指纹*。\n\
    *   *数字签名*。数字签名类似于消息摘要，但它是由特定的人（即*签名者*）生成的。签名者必须拥有一个用于创建签名的*私钥*。任何人都可以使用相应的*公钥*来验证该签名是否来自签名者。私钥和公钥合称为*密钥对*。密钥本质上只是数据——可以将其视为一个字节数组。*证书*实际上只是数字签名的扩展。证书是由某个权威机构（如美国邮政服务）签署的、用于证明您身份的文件。它类似于驾驶执照，但它是基于数字签名的。\n\
    *   *密码*。密码可以加密数据或解密数据。加密密码接收您的数据（称为*明文*），并生成一串不可读的乱码（称为*密文*）。解密密码接收密文并将其转换回明文。密码使用密钥；如果您用两个不同的密钥加密同一段明文，您将得到两段不同的密文。*对称*密码使用相同的密钥进行加密和解密。*非对称*密码使用密钥对进行操作——一个密钥用于加密，而匹配的密钥用于解密。\n\
    \n    密码以不同的*模式*运行，这些模式决定了明文如何被加密成密文。这反过来又会影响密码的使用和安全性。\n\n|  | 注意 | 如需全面了解密码学概念和算法，请参阅\
    \ Bruce Schneier 的《应用密码学：协议、算法与 C 语言源码》（John Wiley & Sons, 1995 年）。要了解更多关于 J2SE\
    \ 中 JCA 和 JCE 的信息，请阅读我稍显过时的《Java 密码学》（O'Reilly, 1998 年）。Sun 的无线开发者网站也包含了我关于 MIDP\
    \ 安全和密码学的四部分系列文章，位于 [*http://wireless.java.sun.com/midp/articles/security1/*](http://wireless.java.sun.com/midp/articles/security1/)。\
    \ |\n\n## HTTPS 几乎能满足您的所有需求\n\n通用连接框架一直足够灵活，允许 MIDP 实现包含对 HTTPS 的支持，HTTPS 即通过\
    \ TLS 或 SSL 等安全连接运行的 HTTP。从 MIDP 2.0 开始，对 HTTPS 的支持已内置于 MIDP 平台中。（有关 HTTPS 及其支持\
    \ API 的详细信息，请参阅第 9 章。）\n\nTLS 提供服务器身份验证以及客户端和服务器之间的加密数据连接。TLS 提供的安全性足以满足大多数应用程序的需求。您可能希望在\
    \ TLS 提供的能力之外实现加密解决方案的原因只有少数几个，包括：\n\n*   **客户端身份验证。** TLS 通常通过 RSA 证书提供服务器身份验证。但是，尽管\
    \ TLS 支持客户端身份验证，但 MIDP 2.0 中的 API 不允许您利用此功能。本章后面将介绍一种使用密码或口令短语进行身份验证的技术。如果您需要更强的方案，请参阅\
    \ [`wireless.java.sun.com/midp/articles/security3/`](http://wireless.java.sun.com/midp/articles/security3/)\
    \ 中描述的基于客户端证书和签名的方案。\n*   **更强的加密。** TLS 通常使用 128 位密钥进行加密，这些密钥在特定会话期间有效。（虽然您无法控制客户端接受哪些密码套件，但您可能可以控制服务器，并能够在服务器上配置可接受的密码套件。）对于许多应用程序来说，128\
    \ 位会话密钥提供了足够的数据安全性。但是，如果您的应用程序处理特别敏感或有价值的数据，您可能需要更强的加密。\n*   **消息驱动的应用程序。** HTTPS\
    \ 仅提供通道加密。某些应用程序通过在不安全的传输（如 HTTP 或套接字）上发送加密消息来工作。在这种情况下，MIDP API 是不够的，您需要自行实现加密功能。\n\
    \n正如我所说，MIDP 2.0 中的 HTTPS 支持对于许多应用程序来说已经足够了。如果您需要更强的功能，或者只是好奇，请继续阅读。\n\n有关 MIDP\
    \ 中 HTTPS 和 TLS 的更多信息，请访问 [`wireless.java.sun.com/midp/articles/security2/`](http://wireless.java.sun.com/midp/articles/security2/)。\n\
    \n## Bouncy Castle 密码学包\n\n在 J2SE 世界中，Sun 通过 Java 密码学架构（JCA）和 Java 密码学扩展（JCE）提供对密码学的支持。当然，问题在于\
    \ JCA 和 JCE 对于 MIDP 平台来说过于庞大。MIDP 2.0 的 HTTPS 支持非常有用，但它绝对不是一个通用的密码学工具包。\n\n如果您希望超越\
    \ HTTPS，最好的选择是 Bouncy Castle 密码学包，这是一个基于澳大利亚的开源项目。它是一个出色的作品，拥有简洁的 API 和强大的密码学算法工具箱。全球还有其他几个开源密码学包，但\
    \ Bouncy Castle 专门提供了其软件的轻量级 J2ME 发行版。要下载该包，请访问 [`www.bouncycastle.org/`](http://www.bouncycastle.org/)，点击**最新版本**的链接，然后选择**J2ME**版本。在我撰写本文时，当前版本是\
    \ 1.17。\n\n将 zip 文件下载到您选择的位置并解压。如果您使用的是 J2ME 无线工具包，只需将 *midp_classes.zip* 文件放入您项目的\
    \ *lib* 目录中。然后您就可以编写使用 Bouncy Castle 包的 MIDlet 了。\n\n## 使用消息摘要保护密码\n\n安装了 Bouncy\
    \ Castle 密码学包后，让我们尝试一个涉及身份验证的简单示例。计算机系统通常使用密码而不是数字签名（或证书），因为密码要简单得多。密码是一个*共享秘密*，这意味着您知道它，服务器也知道它，但其他任何人都不知道。\n\
    \n| **![开始侧边栏](img/_1.gif)** |\n\n**如果有人偷了您的手机怎么办？\n\n为了方便起见，应用程序可能会将您的密码存储在持久化存储中。这是安全性与可用性之间的一种有意识的权衡。用户无需输入密码，但密码存储在设备中，容易受到设备上其他应用程序的窃取。此外，如果有人偷走了设备本身，他们就可以使用该应用程序而无需输入密码。\n\
    \nJSR 177，即 J2ME 的安全与信任服务（[`jcp.org/en/jsr/detail?id=177`](http://jcp.org/en/jsr/detail?id=177)），将通过提供安全存储\
    \ API 等方式来解决这些问题。\n\n| **![结束侧边栏](img/_1.gif)** |\n\n|  |\n"
- fmt: "### The Problem with Passwords\n\nThe problem with passwords is that you don't\
    \ want to send them over an insecure network. Imagine, for example, that your\
    \ MIDlet requires the user to sign on to a server using a user name and password.\
    \ On the MIDP device, you key in your user name and password, then click the button\
    \ to send the information up to the server. Unfortunately, your data is sent as\
    \ plaintext in some HTTP request. Anybody snooping on the network can easily lift\
    \ your password.\n\n### Using a Message Digest\n\nMessage digests provides a way\
    \ to solve this problem. Instead of sending a password as plaintext, you create\
    \ a message digest value from the password and send that instead. An attacker\
    \ could just steal the digest value, of course, so you add some other stuff to\
    \ the digest as well so that only the server, knowing the password, can re-create\
    \ the same digest value. [Figure 15-1](#LiB0121.html#ch15fig01) shows the process.\n\
    \n[![Click To expand](fig286_01.jpg)](fig286_01_0.jpg)\nFigure 15-1: Protecting\
    \ a password with a message digest\n\nThe MIDlet creates a timestamp and a random\
    \ number, both of which are fed into the message digest along with the user name\
    \ and the password. Then the MIDlet sends the user name, the timestamp, the random\
    \ number, and the digest value up to the server. It does not send the password\
    \ as cleartext, but the password is used to calculate the digest value.\n\nThe\
    \ server takes the user name and looks up the corresponding password, which should\
    \ be stored securely in a file or a database. Then it creates a digest value of\
    \ the user name, password, timestamp, and random number. If the digest value created\
    \ on the server matches the digest value sent by the client MIDlet, then the server\
    \ knows that the user typed in the right password. The user has just logged in\
    \ successfully.\n\nThe server needs some logic to prevent replay attacks. Specifically,\
    \ the server should reject login attempts that use timestamps and random numbers\
    \ that have been used before with that login. Although you could save the random\
    \ numbers and timestamps of all user login attempts, it would be relatively expensive\
    \ to compare each of these every time a user wanted to login. An easier way to\
    \ implement this is to save the timestamp of each user's last login attempt. For\
    \ each subsequent login attempt, the server looks up the saved timestamp. If the\
    \ timestamp on the current attempt is later than the saved timestamp, the attempt\
    \ is allowed. The current attempt's timestamp replaces the saved timestamp for\
    \ this user.\n\n### Using the Bouncy Castle Cryptography Package\n\nIn the Bouncy\
    \ Castle package, message digests are generically represented by the `org.bouncycastle.crypto.Digest`\
    \ interface. You can add data into the message digest using one of two `update()`\
    \ methods. To calculate the message digest value, call `doFinal()`. Specific implementations\
    \ of the `Digest` interface are contained in the `org.bouncycastle.crypto.digests`\
    \ package. We'll be using one called `SHA1Digest`, which implements the SHA-1\
    \ digest algorithm. The following line shows how to create a SHA-1 message digest\
    \ object:\n\n```\nDigest digest = new SHA1Digest();\n```\n\nThe cryptography code\
    \ is pretty simple. Most of the effort, in fact, is devoted to converting the\
    \ timestamp and random number to bytes that can be pushed into the message digest\
    \ object. Then it's just a matter of calling the `update()` method with each array\
    \ of bytes.\n\nTo calculate the digest, call `Digest`'s `doFinal()` method. You'll\
    \ need to pass in a byte array to hold the message digest value. To find out how\
    \ long this array should be, call the `getDigestSize()` method.\n\n```\nbyte[]\
    \ digestValue = new byte[digest.getDigestSize()];\ndigest.doFinal(digestValue,\
    \ 0);\n```\n\n### Implementing a Protected Password Protocol\n\nThis section details\
    \ an implementation of protected password login. On the client side, a MIDlet\
    \ collects a user name and password, as shown in [Figure 15-2](#LiB0121.html#ch15fig02).\n\
    \n![](fig287_01.jpg)\nFigure 15-2: A simple form collects a user name and password.\n\
    \nWhen the `Login` command is invoked, the MIDlet sends data to a servlet, which\
    \ determines whether or not the client is authenticated. The servlet sends back\
    \ a message, which is displayed on the screen of the device, as shown in [Figure\
    \ 15-3](#LiB0121.html#ch15fig03).\n\n![](fig288_01.jpg)\nFigure 15-3: The server\
    \ says whether you're logged in or not.\n\nThe MIDlet and servlet exchange various\
    \ byte arrays, such as the timestamp, the random number, and the message digest\
    \ value. To make this work smoothly in the context of HTTP headers, which are\
    \ plain text, the byte arrays are exchanged as hexadecimal strings. A helper class,\
    \ `HexCodec`, handles the translation between hexadecimal strings and byte arrays.\
    \ This same class is used by the MIDlet and the servlet.\n\nLet's look at the\
    \ MIDlet first. Its main screen is a form where the user can enter a user name\
    \ and a password. You might be tempted to use a `PASSWORD` `TextField`, but I\
    \ chose not to. For one thing, it's hard to know exactly what text you're entering.\
    \ For another thing, I'm assuming that the screen of a small device is reasonably\
    \ private—probably no one will be peeking over your shoulder as you enter your\
    \ password.\n\nWhen the user invokes the `Login` command, the MIDlet calculates\
    \ a message digest value as described above. It assembles various parameters into\
    \ an HTTP request. It then reads the response from the server and displays the\
    \ response in an `Alert`.\n\nThe meat of the protected password algorithm is in\
    \ the `login()` method. We create a timestamp and a random number and convert\
    \ these values to byte arrays using a helper method:\n\n```\nlong timestamp =\
    \ System.currentTimeMillis();\nlong randomNumber = mRandom.nextLong();\nbyte[]\
    \ timestampBytes = getBytes(timestamp);\nbyte[] randomBytes = getBytes(randomNumber);\
    \ \n```\n\nThe user name and password strings, which come from the MIDlet's main\
    \ form, are easily converted to byte arrays.\n\nThe entire source code for `PasswordMIDlet`\
    \ is shown in [Listing 15-1](#LiB0121.html#ch15list01).\n\nListing 15-1: *PasswordMIDlet*,\
    \ A Protected Password Client\n\n| **![Start example](_1.gif)** |\n\n```\nimport\
    \ java.io.*;\nimport java.util.Random;\n\nimport javax.microedition.io.*;\nimport\
    \ javax.microedition.midlet.*;\nimport javax.microedition.lcdui.*;\n\nimport org.bouncycastle.crypto.Digest;\n\
    import org.bouncycastle.crypto.digests.SHA1Digest;\n\npublic class PasswordMIDlet\n\
    \    extends MIDlet\n    implements CommandListener, Runnable {\n  private Display\
    \ mDisplay;\n  private Form mForm;\n  private TextField mUserField, mPasswordField;\n\
    \  private Random mRandom;\n\npublic void startApp() {\n    mDisplay = Display.getDisplay(this);\n\
    \    mRandom = new Random(System.currentTimeMillis());\n\nif (mForm == null) {\n\
    \      mForm = new Form(\"Login\");\n      mUserField = new TextField(\"Name\"\
    , \"jonathan\", 32, 0);\n      mPasswordField = new TextField(\"Password\", \"\
    happy8\", 32, 0);\n      mForm.append(mUserField);\n      mForm.append(mPasswordField);\n\
    \nmForm.addCommand(new Command(\"Exit\", Command.EXIT, 0));\n      mForm.addCommand(new\
    \ Command(\"Login\", Command.SCREEN, 0));\n      mForm.setCommandListener(this);\n\
    \    }\n\nmDisplay.setCurrent(mForm);\n  }\n  public void commandAction(Command\
    \ c, Displayable s) {\n    if (c.getCommandType() == Command.EXIT) notifyDestroyed();\n\
    \    else {\n      Form waitForm = new Form(\"Connecting...\");\n      mDisplay.setCurrent(waitForm);\n\
    \      Thread t = new Thread(this);\n      t.start();\n    }\n  }\n```"
