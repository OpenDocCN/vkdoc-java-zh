    \ red, green, and blue values in a packed integer, as shown in [Figure 10-3](#LiB0078.html#ch10fig03).\n\
    \n[![Click To expand](fig189_01.jpg)](fig189_01_0.jpg)\nFigure 10-3: Packing a\
    \ color into an integer\n\nAn alternate convenience method accepts red, green,\
    \ and blue values as integers in the range from 0 to 255 inclusive:\n\n```\npublic\
    \ void setColor(int red, int green, int blue)\n```\n\nYou can retrieve the current\
    \ drawing color (as a packed integer) with getColor(). Alternately, you can retrieve\
    \ each component separately using getRedComponent(), getGreenComponent(), and\
    \ getBlueComponent().\n\nOf course, different devices will have different levels\
    \ of color support, from black and white (affectionately known as \"one-bit color\"\
    ) through full 24-bit color. As I mentioned in [Chapter 5](#LiB0036_split_000.html#174),\
    \ the isColor() and numColors() methods in Display return useful information about\
    \ the capabilities of the device.\n\nFor grayscale devices, Graphics provides\
    \ setGrayScale() as a convenience method. You pass it a number from 0 (black)\
    \ to 255 (white). You can find out the current grayscale value by calling getGrayScale().\
    \ If the current color of this Graphics is not a grayscale color (i.e., if the\
    \ red, green, and blue values of the current color are not the same), then this\
    \ method returns its best guess as to the brightness of the current color.\n\n\
    MIDP 2.0 adds a getDisplayColor() method to the Graphics class. This is a handy\
    \ method that can tell you at runtime exactly how a requested color will be displayed\
    \ on the device. You feed it a color int and it returns the color int that will\
    \ actually be displayed on the device. For example, on the J2ME Wireless Toolkit's\
    \ **DefaultGrayPhone** emulator, pure green (0x00ff00) maps to the gray level\
    \ 0x959595.\n\n### Line Styles\n\nGraphics also maintains a current line style,\
    \ called a *stroke style*, which is used for drawing shape outlines and lines.\
    \ There are two choices for line style, represented by constants in the Graphics\
    \ class:\n\n*   SOLID is the default.\n\n*   DOTTED lines may also be drawn.\n\
    \nIt's up to the implementation to decide exactly how dotted lines are implemented,\
    \ so dotted lines on one device may look dashed on another. You can set or retrieve\
    \ the current style using setStrokeStyle() and getStrokeStyle(). For example,\
    \ the following code draws a square with a solid outline (the default) and another\
    \ square with a dotted outline:\n\n```\npublic void paint(Graphics g) {\n  g.drawRect(20,\
    \ 10, 35, 35);\n  g.setStrokeStyle(Graphics.DOTTED);\n  g.drawRect(20, 60, 35,\
    \ 35);\n}\n```\n\n### Drawing Text\n\nThe Graphics class makes it easy to draw\
    \ text anywhere on the screen. Text drawing is based around the idea of an anchor\
    \ point. The anchor point determines exactly where the text will be drawn. Anchor\
    \ points are described with a horizontal and vertical component. The Graphics\
    \ class defines the horizontal and vertical anchor points as constants. [Figure\
    \ 10-4](#LiB0078.html#ch10fig04) illustrates the various anchor points for a string\
    \ of text. Each anchor point is described as a combination of a horizontal and\
    \ vertical anchor point.\n\n[![Click To expand](fig191_01.jpg)](fig191_01_0.jpg)\n\
    Figure 10-4: Text anchor points\n\nTo draw text, you just need to specify the\
    \ text itself and the location and type of anchor point. You could, for example,\
    \ place some text in the upper-left corner of the screen by using a TOP | LEFT\
    \ anchor point located at 0, 0.\n\nText is specified as a String or an array of\
    \ chars, which means you can draw text in many languages, provided that the fonts\
    \ you're using have the corresponding glyphs.\n\nGraphics provides four different\
    \ methods for drawing text. You can draw characters or Strings, depending on what\
    \ you have available:\n\n```\npublic void drawChar(char character, int x, int\
    \ y, int anchor)\npublic void drawChars(char[] data, int offset, int length,\n\
    \    int x, int y, int anchor)\npublic void drawString(String str, int x, int\
    \ y, int anchor)\npublic void drawSubstring(String str, int offset, int len,\n\
    \    int x, int y, int anchor)\n```\n\nThe following example shows how to place\
    \ text at various places on a Canvas:\n\n```\nimport javax.microedition.lcdui.*;\n\
    \npublic class TextCanvas\n    extends Canvas {\n  public void paint(Graphics\
    \ g) {\n    int w = getWidth();\n    int h = getHeight();\n\n    g.setColor(0xffffff);\n\
    \    g.fillRect(0, 0, w, h);\n    g.setColor(0x000000);\n    // First label the\
    \ four corners.\n    g.drawString(\"corner\", 0, 0,\n        Graphics.TOP | Graphics.LEFT);\n\
    \    g.drawString(\"corner\", w, 0,\n        Graphics.TOP | Graphics.RIGHT);\n\
    \    g.drawString(\"corner\", 0, h,\n        Graphics.BOTTOM | Graphics.LEFT);\n\
    \    g.drawString(\"corner\", w, h,\n        Graphics.BOTTOM | Graphics.RIGHT);\n\
    \n// Now put something in the middle (more or less).\n    g.drawString(\"Sin Wagon\"\
    , w / 2, h / 2,\n        Graphics.BASELINE | Graphics.HCENTER);\n  }\n}\n```\n\
    \nTo see this Canvas, you'll have to create a MIDlet that displays it. I suggest\
    \ using Pacer; just edit the source file so it instantiates a TextCanvas instead\
    \ of a PacerCanvas. The finished product is shown in [Figure 10-5](#LiB0078.html#ch10fig05).\n\
    \n![](fig192_01.jpg)\nFigure 10-5: *TextCanvas* in the flesh\n\nNote that Canvas\
    \ denies us some real estate at the bottom of the screen. This is to allow space\
    \ for Commands. Canvas, like any other Displayable, can display commands and have\
    \ a command listener."
  trans: "\n### 使用颜色\n\nGraphics 类维护一个当前绘图颜色，用于绘制形状轮廓、填充形状以及绘制文本。颜色由红、绿、蓝三色组合表示，每种颜色分量占八位。你可以使用以下方法设置当前绘图颜色：\n\
    \n```\npublic void setColor(int RGB)\n```\n\n该方法期望将红、绿、蓝值打包成一个整数，如图 10-3 所示。\n\
    \n![点击展开](img/fig189_01_0.jpg)\n图 10-3：将颜色打包成整数\n\n另一种便捷方法接受红、绿、蓝值作为 0 到 255（含）范围内的整数：\n\
    \n```\npublic void setColor(int red, int green, int blue)\n```\n\n你可以使用 `getColor()`\
    \ 获取当前绘图颜色（以打包整数形式）。或者，也可以分别使用 `getRedComponent()`、`getGreenComponent()` 和 `getBlueComponent()`\
    \ 获取各个分量。\n\n当然，不同设备对颜色的支持程度各不相同，从黑白（俗称“单色”）到完整的 24 位色。正如我在第 5 章中提到的，Display 中的\
    \ `isColor()` 和 `numColors()` 方法会返回关于设备能力的有用信息。\n\n对于灰度设备，Graphics 提供了便捷方法 `setGrayScale()`。你传入一个\
    \ 0（黑色）到 255（白色）之间的数字。可以通过调用 `getGrayScale()` 获取当前灰度值。如果此 Graphics 对象的当前颜色不是灰度色（即当前颜色的红、绿、蓝值不相同），则此方法会返回其对当前颜色亮度的最佳估算值。\n\
    \nMIDP 2.0 为 Graphics 类新增了 `getDisplayColor()` 方法。这是一个便捷方法，可以在运行时准确告知你请求的颜色在设备上会如何显示。你传入一个颜色\
    \ int 值，它会返回设备上实际显示的颜色 int 值。例如，在 J2ME Wireless Toolkit 的 **DefaultGrayPhone**\
    \ 模拟器上，纯绿色（0x00ff00）会映射为灰度值 0x959595。\n\n### 线条样式\n\nGraphics 还维护一个当前线条样式，称为*描边样式*，用于绘制形状轮廓和线条。线条样式有两种选择，由\
    \ Graphics 类中的常量表示：\n\n*   SOLID 是默认样式。\n*   也可以绘制 DOTTED（虚线）线条。\n\n虚线具体如何实现由具体实现决定，因此在一台设备上的虚线在另一台设备上可能显示为短划线。你可以使用\
    \ `setStrokeStyle()` 和 `getStrokeStyle()` 设置或获取当前样式。例如，以下代码绘制一个实线轮廓（默认）的正方形和另一个虚线轮廓的正方形：\n\
    \n```\npublic void paint(Graphics g) {\n  g.drawRect(20, 10, 35, 35);\n  g.setStrokeStyle(Graphics.DOTTED);\n\
    \  g.drawRect(20, 60, 35, 35);\n}\n```\n\n### 绘制文本\n\nGraphics 类使得在屏幕任意位置绘制文本变得简单。文本绘制基于锚点的概念。锚点精确决定文本的绘制位置。锚点由水平和垂直分量描述。Graphics\
    \ 类将水平和垂直锚点定义为常量。图 10-4 展示了文本字符串的各种锚点。每个锚点由水平和垂直锚点的组合来描述。\n\n![点击展开](img/fig191_01_0.jpg)\n\
    图 10-4：文本锚点\n\n要绘制文本，只需指定文本本身以及锚点的位置和类型。例如，你可以通过使用位于 (0, 0) 的 TOP | LEFT 锚点，将文本放置在屏幕左上角。\n\
    \n文本以 String 或 char 数组形式指定，这意味着你可以绘制多种语言的文本，前提是你使用的字体包含相应的字形。\n\nGraphics 提供了四种不同的文本绘制方法。你可以根据可用情况绘制字符或字符串：\n\
    \n```\npublic void drawChar(char character, int x, int y, int anchor)\npublic\
    \ void drawChars(char[] data, int offset, int length,\n    int x, int y, int anchor)\n\
    public void drawString(String str, int x, int y, int anchor)\npublic void drawSubstring(String\
    \ str, int offset, int len,\n    int x, int y, int anchor)\n```\n\n以下示例展示了如何在\
    \ Canvas 的不同位置放置文本：\n\n```\nimport javax.microedition.lcdui.*;\n\npublic class\
    \ TextCanvas\n    extends Canvas {\n  public void paint(Graphics g) {\n    int\
    \ w = getWidth();\n    int h = getHeight();\n\n    g.setColor(0xffffff);\n   \
    \ g.fillRect(0, 0, w, h);\n    g.setColor(0x000000);\n    // 首先标记四个角。\n    g.drawString(\"\
    corner\", 0, 0,\n        Graphics.TOP | Graphics.LEFT);\n    g.drawString(\"corner\"\
    , w, 0,\n        Graphics.TOP | Graphics.RIGHT);\n    g.drawString(\"corner\"\
    , 0, h,\n        Graphics.BOTTOM | Graphics.LEFT);\n    g.drawString(\"corner\"\
    , w, h,\n        Graphics.BOTTOM | Graphics.RIGHT);\n\n// 现在在中间（大致位置）放置一些内容。\n\
    \    g.drawString(\"Sin Wagon\", w / 2, h / 2,\n        Graphics.BASELINE | Graphics.HCENTER);\n\
    \  }\n}\n```\n\n要查看此 Canvas，你需要创建一个显示它的 MIDlet。我建议使用 Pacer；只需编辑源文件，使其实例化 TextCanvas\
    \ 而不是 PacerCanvas。最终结果如图 10-5 所示。\n\n![](img/fig192_01.jpg)\n图 10-5：*TextCanvas*\
    \ 的实际效果\n\n请注意，Canvas 在屏幕底部占用了一些空间。这是为了给 Commands 留出空间。与其他任何 Displayable 一样，Canvas\
    \ 可以显示命令并拥有命令监听器。\n"
- fmt: "### Selecting a Font\n\nMIDP fonts are represented by a *font face*, *style*,\
    \ and *size*. You won't find a big selection of fonts, but there are a few choices.\
    \ Three faces are available, as shown in [Figure 10-6](#LiB0078.html#ch10fig06).\
    \ These are represented by constants in the `Font` class: `FACE_SYSTEM`, `FACE_MONOSPACE`,\
    \ and `FACE_PROPORTIONAL`.\n\n![](fig193_01.jpg)\nFigure 10-6: The three font\
    \ faces in italics\n\nOnce you've chosen a font face, you can also specify a style\
    \ and a size. The styles are what you'd expect, and they are represented by constants\
    \ in the `Font` class: `STYLE_PLAIN`, `STYLE_BOLD`, `STYLE_ITALIC`, and `STYLE_UNDERLINE`.\
    \ You can combine styles, like bold and italic, by ORing the constants together.\
    \ The size is simply `SIZE_SMALL`, `SIZE_MEDIUM`, or `SIZE_LARGE`.\n\nYou could\
    \ create a small, italic, proportional font with the following call:\n\n```\n\
    Font f = Font.getFont(\n    Font.FACE_PROPORTIONAL,\n    Font.STYLE_ITALIC,\n\
    \    Font.SIZE_SMALL);\n```\n\nTo tell `Graphics` to use a new font for subsequent\
    \ text, call `setFont()`. You can get a reference to the current font by calling\
    \ `getFont()`. You can also find out information about a `Font` with the `getFace()`,\
    \ `getStyle()`, and `getSize()` methods. For convenience, `Font` also includes\
    \ `isPlain()`, `isBold()`, `isItalic()`, and `isUnderlined()` methods.\n\nThe\
    \ MIDP implementation has a default font that you can retrieve from `Font`'s static\
    \ method `getDefaultFont()`.\n\nThe following `Canvas` demonstrates the creation\
    \ and use of fonts.\n\n```\nimport javax.microedition.lcdui.*;\n\npublic class\
    \ FontCanvas\n    extends Canvas {\n  private Font mSystemFont, mMonospaceFont,\
    \ mProportionalFont;\n\npublic FontCanvas() { this(Font.STYLE_PLAIN); }\n\npublic\
    \ FontCanvas(int style) { setStyle(style); }\n  public void setStyle(int style)\
    \ {\n    mSystemFont = Font.getFont(Font.FACE_SYSTEM,\n        style, Font.SIZE_MEDIUM);\n\
    \    mMonospaceFont = Font.getFont(Font.FACE_MONOSPACE,\n        style, Font.SIZE_MEDIUM);\n\
    \    mProportionalFont = Font.getFont(Font.FACE_PROPORTIONAL,\n        style,\
    \ Font.SIZE_MEDIUM);\n  }\n\npublic boolean isBold() {\n    return mSystemFont.isBold();\n\
    \  }\n  public boolean isItalic() {\n    return mSystemFont.isItalic();\n  }\n\
    \  public boolean isUnderline() {\n    return mSystemFont.isUnderlined();\n  }\n\
    \npublic void paint(Graphics g) {\n    int w = getWidth();\n    int h = getHeight();\n\
    \n// Clear the Canvas.\n    g.setGrayScale(255);\n    g.fillRect(0, 0, w - 1,\
    \ h - 1);\n    g.setGrayScale(0);\n    g.drawRect(0, 0, w - 1, h - 1);\n\nint\
    \ x = w / 2;\n    int y = 20;\n\ny += showFont(g, \"System\", x, y, mSystemFont);\n\
    \    y += showFont(g, \"Monospace\", x, y, mMonospaceFont);\n    y += showFont(g,\
    \ \"Proportional\", x, y, mProportionalFont);\n  }\n\nprivate int showFont(Graphics\
    \ g, String s, int x, int y, Font f) {\n    g.setFont(f);\n    g.drawString(s,\
    \ x, y, Graphics.TOP | Graphics.HCENTER);\n    return f.getHeight();\n  }\n} \n\
    ```\n\nTo see this `Canvas` in action, you'll need a MIDlet that shows it. You\
    \ could modify `Pacer` again, if you wish, or use the following code:\n\n```\n\
    import javax.microedition.lcdui.*;\nimport javax.microedition.midlet.*;\n\npublic\
    \ class FontMIDlet\n    extends MIDlet\n   implements CommandListener {\n  private\
    \ FontCanvas mFontCanvas;\n  private Command mBoldCommand, mItalicCommand, mUnderlineCommand;\n\
    \npublic FontMIDlet() {\n    mFontCanvas = new FontCanvas();\n\nmBoldCommand =\
    \ new Command(\"Bold\", Command.SCREEN, 0);\n    mItalicCommand = new Command(\"\
    Italic\", Command.SCREEN, 0);\n    mUnderlineCommand = new Command(\"Underline\"\
    , Command.SCREEN, 0);\n    Command exitCommand = new Command(\"Exit\", Command.EXIT,\
    \ 0);\n\nmFontCanvas.addCommand(mBoldCommand);\n    mFontCanvas.addCommand(mItalicCommand);\n\
    \    mFontCanvas.addCommand(mUnderlineCommand);\n    mFontCanvas.addCommand(exitCommand);\n\
    \    mFontCanvas.setCommandListener(this);\n  }\n\npublic void startApp() {\n\
    \    Display.getDisplay(this).setCurrent(mFontCanvas);\n  }\n\npublic void pauseApp()\
    \ {}\n\npublic void destroyApp(boolean unconditional) {}\n\npublic void commandAction(Command\
    \ c, Displayable s) {\n    if (c.getCommandType() == Command.EXIT) {\n      notifyDestroyed();\n\
    \      return;\n    }\n    boolean isBold = mFontCanvas.isBold() ^ (c == mBoldCommand);\n\
    \    boolean isItalic = mFontCanvas.isItalic() ^ (c == mItalicCommand);\n    boolean\
    \ isUnderline = mFontCanvas.isUnderline() ^\n        (c == mUnderlineCommand);\n\
    \nint style =\n        (isBold ? Font.STYLE_BOLD : 0) |\n        (isItalic ? Font.STYLE_ITALIC\
    \ : 0) |\n        (isUnderline ? Font.STYLE_UNDERLINED : 0);\n\nmFontCanvas.setStyle(style);\n\
    \    mFontCanvas.repaint();\n  }\n}\n```\n\n### Measuring Text\n\nThe `Font` class\
    \ can tell you useful information about the dimensions of text. If you read the\
    \ previous example carefully, you'll notice we already used one of these methods,\
    \ `getHeight()`. This method returns the height of an entire line of text and\
    \ can be used to position multiple lines.\n\nIf you really need to know the location\
    \ of the baseline, call `getBaselinePosition()`. This returns the distance from\
    \ the top of a line of text to the baseline. However, given the flexibility offered\
    \ by the anchor points in `Graphics`, you probably won't ever need to find the\
    \ baseline yourself.\n\nThe rest of the methods in `Font` for measuring text measure\
    \ the width of various pieces of text. The names and parameters of these methods\
    \ are the same as text drawing methods in `Graphics`:\n\n```\npublic int charWidth(char\
    \ ch)\npublic int charsWidth(char ch, int offset, int length)\npublic int stringWidth(String\
    \ str)\npublic int substringWidth(String str, int offset, int len)\n```\n\nYou\
    \ could draw a box around a string, for example:\n\n```\nimport javax.microedition.lcdui.*;\n\
    \npublic class BoxTextCanvas\n    extends Canvas {\n  private Font mFont;\npublic\
    \ BoxTextCanvas() {\n    mFont = Font.getFont(Font.FACE_PROPORTIONAL,\n      \
    \  Font.STYLE_PLAIN, Font.SIZE_LARGE);\n  }\n\n  public void paint(Graphics g)\
    \ {\n    int w = getWidth();\n    int h = getHeight();\n\n    g.setColor(0xffffff);\n\
    \    g.fillRect(0, 0, w, h);\n    g.setColor(0x000000);\n\n    String s = \"dolce\"\
    ;\n    int stringWidth = mFont.stringWidth(s);\n    int stringHeight = mFont.getHeight();\n\
    \    int x = (w - stringWidth) / 2;\n    int y = h / 2;\n\n    g.setFont(mFont);\n\
    \    g.drawString(s, x, y, Graphics.TOP | Graphics.LEFT);\n    g.drawRect(x, y,\
    \ stringWidth, stringHeight);\n  }\n}\n```\n\n### Drawing Images\n\nThe `Graphics`\
    \ class contains a single method for drawing an image:\n\n```\npublic void drawImage(Image\
    \ img, int x, int y, int anchor)\n```\n\nThe `drawImage()` method uses an anchor\
    \ point, just like the anchor point in the text drawing methods. The available\
    \ anchor points are slightly different. `BASELINE` is no longer an option for\
    \ the vertical anchor point of an image, as the concept of baseline is specific\
    \ to text. Instead, `VCENTER` is an additional option for the vertical anchor\
    \ point. [Figure 10-7](#LiB0078.html#ch10fig07) shows the available combinations\
    \ of anchor points.\n\n[![Click To expand](fig198_01.jpg)](fig198_01_0.jpg)\n\
    Figure 10-7: Image anchor points\n\nMIDP 2.0 specifically requires support for\
    \ rendering images with transparency."
