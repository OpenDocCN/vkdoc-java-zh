- fmt: "### A Simple Example\n\nHTTP isn't all about exchanging HTML pages. It's actually\
    \ a generic file-exchange protocol. In this section, we'll look at an example\
    \ that loads an image from the network and displays it. [Listing 9-1](#LiB0065.html#ch09list01)\
    \ shows the source code for `ImageLoader`, a MIDlet that retrieves an image from\
    \ the Internet and displays it on the screen.\n\n**Listing 9-1: Retrieving an\
    \ Image from the Internet**\n\n```\nimport java.io.*;\n\nimport javax.microedition.io.*;\n\
    import javax.microedition.lcdui.*;\nimport javax.microedition.midlet.*;\n\npublic\
    \ class ImageLoader\n    extends MIDlet\n    implements CommandListener, Runnable\
    \ {\n  private Display mDisplay;\n  private Form mForm;\n\n  public ImageLoader()\
    \ {\n    mForm = new Form(\"Connecting...\");\n    mForm.addCommand(new Command(\"\
    Exit\", Command.EXIT, 0));\n    mForm.setCommandListener(this);\n  }\n\n  public\
    \ void startApp() {\n    if (mDisplay == null) mDisplay = Display.getDisplay(this);\n\
    \    mDisplay.setCurrent(mForm);\n\n    // Do network loading in a separate thread.\n\
    \    Thread t = new Thread(this);\n    t.start();\n  }\n\n  public void pauseApp()\
    \ {}\n\n  public void destroyApp(boolean unconditional) {}\n\n  public void commandAction(Command\
    \ c, Displayable s) {\n    if (c.getCommandType() == Command.EXIT)\n      notifyDestroyed();\n\
    \  }\n\n  public void run() {\n    HttpConnection hc = null;\n    DataInputStream\
    \ in = null;\n\n    try {\n      String url = getAppProperty(\"ImageLoader-URL\"\
    );\n      hc = (HttpConnection)Connector.open(url);\n      int length = (int)hc.getLength();\n\
    \      byte[] data = null;\n      if (length != -1) {\n        data = new byte[length];\n\
    \        in = new DataInputStream(hc.openInputStream());\n        in.readFully(data);\n\
    \      }\n      else {\n        // If content length is not given, read in chunks.\n\
    \        int chunkSize = 512;\n        int index = 0;\n        int readLength\
    \ = 0;\n        in = new DataInputStream(hc.openInputStream());\n        data\
    \ = new byte[chunkSize];\n        do {\n          if (data.length < index + chunkSize)\
    \ {\n            byte[] newData = new byte[index + chunkSize];\n            System.arraycopy(data,\
    \ 0, newData, 0, data.length);\n            data = newData;\n          }\n   \
    \       readLength = in.read(data, index, chunkSize);\n          index += readLength;\n\
    \        } while (readLength == chunkSize);\n        length = index;\n      }\n\
    \      Image image = Image.createImage(data, 0, length);\n      ImageItem imageItem\
    \ = new ImageItem(null, image, 0, null);\n      mForm.append(imageItem);\n   \
    \   mForm.setTitle(\"Done.\");\n    }\n    catch (IOException ioe) {\n      StringItem\
    \ stringItem = new StringItem(null, ioe.toString());\n      mForm.append(stringItem);\n\
    \      mForm.setTitle(\"Done.\");\n    }\n    finally {\n      try {\n       \
    \ if (in != null) in.close();\n        if (hc != null) hc.close();\n      }\n\
    \      catch (IOException ioe) {}\n    }\n  }\n}\n```\n\nThe `run()` method contains\
    \ all of the networking code. It's fairly simple; we pass the URL of an image\
    \ (retrieved as an application property) to `Connector`'s `open()` method and\
    \ cast the result to `HttpConnection`. Then we retrieve the length of the image\
    \ file, using the `getLength()` method. Given the length, we create a byte array\
    \ and read data into it. Finally, having read the entire image file into a byte\
    \ array, we can create an `Image` from the raw data.\n\nIf the content length\
    \ is not specified, the image data is read in 512-byte chunks.\n\nYou'll need\
    \ to specify the MIDlet property `\"ImageLoader-URL\"` in order for this example\
    \ to work correctly. Note that you need to specify the URL of a PNG image, not\
    \ of a JPEG or GIF. The URL `http://65.215.221.148:8080/wj2/res/java2d_sm_ad.png`\
    \ produces the results shown in [Figure 9-3](#LiB0065.html#ch09fig03).\n\n![](fig164_01.jpg)\n\
    **Figure 9-3: The *ImageLoader* example**\n\n## Posting a Form with HTTP POST\n\
    \nPosting a form is a little more complicated on the MIDlet side. In particular,\
    \ there are request headers that need to be set in `HttpConnection` before the\
    \ server is contacted. The process works like this:\n\n1.  Obtain an `HttpConnection`\
    \ from `Connector`'s `open()` method.\n2.  Modify the header fields of the request.\
    \ In particular, you need to change the request method by calling `setRequestMethod()`,\
    \ and you should set the `\"Content-Length\"` header by calling `setRequestProperty()`.\
    \ This is the length of the parameters you will be sending.\n3.  Obtain the output\
    \ stream for the `HttpConnection` by calling `openOutputStream()`. This sends\
    \ the request headers to the server.\n4.  Send the request parameters on the output\
    \ stream returned from the `HttpConnection`. Parameters should be encoded as described\
    \ earlier (and in the documentation for the J2SE class `java.net.URLEncoder`).\n\
    5.  Read the response from the server from the input stream retrieved from `HttpConnection`'s\
    \ `openInputStream()` method.\n\nThe following example, [Listing 9-2](#LiB0066.html#ch09list02),\
    \ demonstrates how to send a single parameter to a server using an HTTP POST.\
    \ Multiple parameters can be assembled by joining them with an ampersand separator.\
    \ Note that the parameter in this example has been encoded as described above.\
    \ In this example, the parameter value `\"Jonathan Knudsen!\"` has been encoded\
    \ to `\"Jonathan+Knudsen%21\"`. [Listing 9-3](#LiB0066.html#ch09list03) shows\
    \ a very simple servlet that can communicate with `PostMIDlet`.\n\n**Listing 9-2:\
    \ A Simple MIDlet Performing an HTTP POST**\n\n```\nimport java.io.*;\n\nimport\
    \ javax.microedition.io.*;\nimport javax.microedition.lcdui.*;\nimport javax.microedition.midlet.*;\n\
    \npublic class PostMIDlet\n    extends MIDlet\n    implements CommandListener,\
    \ Runnable {\n  private Display mDisplay;\n  private Form mForm;\n\npublic PostMIDlet()\
    \ {\n    mForm = new Form(\"Connecting...\");\n    mForm.addCommand(new Command(\"\
    Exit\", Command.EXIT, 0));\n    mForm.setCommandListener(this);\n  }\n\npublic\
    \ void startApp() {\n    if (mDisplay == null) mDisplay = Display.getDisplay(this);\n\
    \    mDisplay.setCurrent(mForm);\n\n// Do network loading in a separate thread.\n\
    \    Thread t = new Thread(this);\n    t.start();\n  }\n  public void pauseApp()\
    \ {}\n\npublic void destroyApp(boolean unconditional) {}\n\npublic void commandAction(Command\
    \ c, Displayable s) {\n    if (c.getCommandType() == Command.EXIT)\n      notifyDestroyed();\n\
    \  }\n\npublic void run() {\n    HttpConnection hc = null;\n    InputStream in\
    \ = null;\n    OutputStream out = null;\n\ntry {\n      String message = \"name=Jonathan+Knudsen%21\"\
    ;\n      String url = getAppProperty(\"PostMIDlet-URL\");\n      hc = (HttpConnection)Connector.open(url);\n\
    \      hc.setRequestMethod(HttpConnection.POST);\n      hc.setRequestProperty(\"\
    Content-Type\",\n          \"application/x-www-form-urlencoded\");\n      hc.setRequestProperty(\"\
    Content-Length\",\n          Integer.toString(message.length()));\n      out =\
    \ hc.openOutputStream();\n      out.write(message.getBytes());\n      in = hc.openInputStream();\n\
    \      int length = (int)hc.getLength();\n      byte[] data = new byte[length];\n\
    \      in.read(data);\n      String response = new String(data);\n      StringItem\
    \ stringItem = new StringItem(null, response);\n      mForm.append(stringItem);\n\
    \      mForm.setTitle(\"Done.\");\n    }\n    catch (IOException ioe) {\n    \
    \  StringItem stringItem = new StringItem(null, ioe.toString());\n      mForm.append(stringItem);\n\
    \      mForm.setTitle(\"Done.\");\n    }\n    finally {\n      try {\n       \
    \ if (out != null) out.close();\n        if (in != null) in.close();\n       \
    \ if (hc != null) hc.close();\n      }\n      catch (IOException ioe) {}\n   \
    \ }\n  }\n}\n```\n\n**Listing 9-3: A Simple Servlet That Responds to *PostServlet***\n\
    \n```\nimport javax.servlet.http.*;\nimport javax.servlet.*;\nimport java.io.*;\n\
    ```"
