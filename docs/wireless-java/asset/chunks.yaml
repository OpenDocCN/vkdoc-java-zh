  trans: '

    ## 通用连接框架


    CLDC 定义了一个极其灵活的网络连接 API，即*通用连接框架*。它全部包含在 `javax.microedition.io` 包中，并以 `Connection`
    接口为基础。图 9-1 详细展示了 `Connection` 接口及其各种子接口。加号表示 MIDP 2.0 中新增的接口。


    ![点击展开](img/fig157_01_0.jpg)

    图 9-1：*Connection* 家族树


    连接接口与现实世界之间的桥梁是一个名为 `javax.microedition.io.Connector` 的类。其基本思想是，你将一个连接字符串传递给 `Connector`
    的某个静态方法，然后获得某个 `Connection` 实现。*连接字符串*看起来有点像 URL，但还有其他各种可能性。例如，连接字符串 `socket://apress.com:79`
    可能会在 79 端口上打开一个到 `apress.com` 的 TCP/IP 连接，然后返回一个 `StreamConnection` 实现。


    MIDP 1.0 通过仅要求一种连接类型（超文本传输协议，HTTP）极大地简化了这个通用框架。你将一个 HTTP URL 传递给 `Connector`，然后获得一个
    `HttpConnection` 的实现。尽管符合 MIDP 1.0 的设备可能支持其他类型的连接，但 HTTP 是你唯一应该依赖的。MIDP 2.0 增加了对
    HTTPS 连接（安全 HTTP）的强制支持，并标准化了其他几种连接类型的连接字符串。我将在本章后面讨论这些新特性。


    `HttpConnection` 的方法在图 9-2 中有详细说明。`HttpConnection` 中的大多数方法都与 HTTP 的细节有关，这里我不再赘述。我将涵盖你在此处连接服务器所需了解的一切，包括
    GET 和 POST 请求。如果你需要深入研究，可以阅读 RFC 2616（互联网标准文档之一），该文档可在 [`www.faqs.org/rfcs/rfc2616.html`](http://www.faqs.org/rfcs/rfc2616.html)
    获取。请注意，MIDP 使用的是完整 HTTP 1.1 的一个子集；仅要求支持 GET、POST 和 HEAD 命令。


    ![点击展开](img/fig158_01_0.jpg)

    图 9-2：*HttpConnection* 接口


    ## HTTP 回顾


    本节简要回顾超文本传输协议。完整内容在 RFC 2616 中；本节涵盖要点。


    ### 请求与响应


    HTTP 是围绕请求和响应构建的。客户端向服务器发送一个请求——例如，“请给我某某 HTML 页面”。服务器发回一个响应——例如，“这是文件”，或者“我不知道你在说什么”。


    请求和响应包含两部分：标头和内容。如果你在浏览器中输入一个 URL，浏览器会创建一个 HTTP 请求（主要是标头）并将其发送到服务器。服务器找到请求的文件，并在
    HTTP 响应中将其发回。响应标头描述了诸如 Web 服务器类型、响应的文件类型、响应长度以及其他信息。响应内容则是文件本身的数据。


    ### 参数


    浏览器和其他 HTTP 客户端向 HTTP 服务器请求特定的命名资源。此外，客户端可以向服务器传递参数。参数是简单的名称和值对。例如，客户端可能向服务器发送一个值为“jonathan”的“userid”参数。HTTP
    还支持在请求体中向服务器传递二进制数据，而 Java 流类使得交换各种数据类型变得容易。


    当浏览器作为 HTTP 客户端时，参数通常从 HTML 表单中收集。你见过这些表单，比如填写送货地址和信用卡号码的那种。当你点击表单上的**提交**或**下一步**按钮时，表单值会作为参数发送到
    Web 服务器。


    客户端在参数发送到服务器之前对其进行编码。参数以名称和值对的形式传递；多个参数用 & 符号分隔。参数编码的具体方式在 J2SE 文档的 `java.net.URLEncoder`
    中有说明。规则相对简单。


    *   空格字符被转换为加号 (+) 符号。

    *   以下字符保持不变：小写字母 a 到 z、大写字母 A 到 Z、数字 0 到 9、句点 (.)、连字符 (-)、星号 (*) 和下划线 (_)。

    *   所有其他字符都被转换为“%xy”，其中“xy”是一个十六进制数，表示该字符的低八位。


    ### GET、HEAD 和 POST


    最简单的 HTTP 操作是 GET。当你在浏览器中输入 URL 时就会发生这种情况。浏览器说：“GET 这个 URL”，然后服务器用响应的标头和内容进行响应。


    对于 GET 请求，参数以编码形式附加到 URL 的末尾。（某些服务器处理超长 URL 时会有问题；如果你有很多参数或二进制数据，你可能希望将数据放在 HTTP
    请求体中传递。）例如，假设以下 URL 映射到你应用程序中的一个 Servlet 或其他服务器端组件：


    [`jonathanknudsen.com/simple`](http://jonathanknudsen.com/simple)


    添加参数很容易。如果你想传递一个名称为“user”、值为“jonathan”的参数，你可以使用以下 URL：


    [`jonathanknudsen.com/simple?user=jonathan`](http://jonathanknudsen.com/simple?user=jonathan)


    可以添加更多的名称和值对，用 & 符号分隔：


    [`jonathanknudsen.com/simple?user=jonathan&zip=08540&day=saturday`](http://jonathanknudsen.com/simple?user=jonathan&zip=08540&day=saturday)


    HEAD 操作与 GET 相同，但服务器只发回响应的标头。


    POST 基本上与 GET 相同，但参数的处理方式不同。参数不是像 GET 那样附加在 URL 的末尾，而是作为请求体传递。它们的编码方式相同。


    ## 使用 HTTP GET 建立连接


    从服务器加载数据非常简单，尤其是在执行 HTTP GET 时。只需将一个 URL 传递给 `Connector` 的静态 `open()` 方法。返回的 `Connection`
    很可能是一个 `HttpConnection` 的实现，但你可以直接将其视为 `InputConnection`。然后获取相应的 `InputStream`
    并尽情读取数据。


    在代码中，它看起来像这样：


    ```

    String url = "http://jonathanknudsen.com/simple";

    InputConnection ic = (InputConnection)Connector.open(url);

    InputStream in = ic.openInputStream();

    // 从 InputStream 读取数据

    ic.close();

    ```


    涉及的大多数方法都可能抛出 `java.io.IOException`。为了清晰起见，我在示例中省略了 try 和 catch 块。


    仅此而已。你现在可以将你的 MIDlet 连接到世界了。在 MIDP 2.0 中，情况稍微复杂一些，因为网络访问受设备上的安全策略约束。我将在本章末尾附近详细讨论这一点。


    ### 传递参数


    对于 HTTP GET，所有参数都在 URL 体中传递给服务器。这使得向服务器发送参数变得容易。以下代码片段展示了如何传递两个参数：


    ```

    String url = "http://localhost/midp/simple?pOne=one+bit&pTwo=two";

    InputConnection ic = (InputConnection)Connector.open(url);

    InputStream in = ic.openInputStream();

    ```


    第一个参数名为“pOne”，值为“one bit”；第二个参数名为“pTwo”，值为“two”。

