    \ 4, 86, 4, 77, 4,\n        56, 4, 76, 4, 86, 4, 76, 4, 57, 4, 76, 4, 84, 4, 76,\
    \ 4,\n        53, 4, 74, 4, 84, 4, 74, 4, 55, 4, 74, 4, 83, 4, 74, 4,\n      \
