- fmt: "### Implementation\n\nThe source code for `StealthMIDlet` is shown in [Listing\
    \ 15-5](#LiB0122.html#ch15list05). This MIDlet has a simple user interface, initialized\
    \ in the `startApp()` method. The MIDlet's ciphers are also created and initialized\
    \ in `startApp()`.\n\nListing 15-5: *StealthMIDlet*, a Data Encryption MIDlet\n\
    \n```\nimport java.io.*;\n\nimport javax.microedition.io.*;\nimport javax.microedition.midlet.*;\n\
    import javax.microedition.lcdui.*;\n\nimport org.bouncycastle.crypto.StreamCipher;\n\
    import org.bouncycastle.crypto.engines.RC4Engine;\nimport org.bouncycastle.crypto.params.KeyParameter;\n\
    \npublic class StealthMIDlet\n    extends MIDlet\n    implements CommandListener,\
    \ Runnable {\n  private Display mDisplay;\n  private TextBox mTextBox;\n\nprivate\
    \ String mSession;\n  private StreamCipher mOutCipher, mInCipher;\n\npublic StealthMIDlet()\
    \ {\n    mOutCipher = new RC4Engine();\n    mInCipher = new RC4Engine();\n  }\n\
    \npublic void startApp() {\n    if (mSession == null) {\n      // Load the keys\
    \ from resource files.\n      byte[] inKey = getInKey();\n      byte[] outKey\
    \ = getOutKey();\n\n// Initialize the ciphers.\n      mOutCipher.init(true, new\
    \ KeyParameter(outKey));\n      mInCipher.init(false, new KeyParameter(inKey));\n\
    \    }\n\nmDisplay = Display.getDisplay(this);\n\nif (mTextBox == null) {\n  \
    \    mTextBox = new TextBox(\"StealthMIDlet\",\n          \"The eagle has landed\"\
    , 256, 0);\n      mTextBox.addCommand(new Command(\"Exit\", Command.EXIT, 0));\n\
    \      mTextBox.addCommand(new Command(\"Send\", Command.SCREEN, 0));\n      mTextBox.setCommandListener(this);\n\
    \    }\n\nmDisplay.setCurrent(mTextBox);\n  }\n\npublic void commandAction(Command\
    \ c, Displayable s) {\n    if (c.getCommandType() == Command.EXIT) notifyDestroyed();\n\
    \    else {\n      Form waitForm = new Form(\"Connecting...\");\n      mDisplay.setCurrent(waitForm);\n\
    \      Thread t = new Thread(this);\n      t.start();\n    }\n  }\n\npublic void\
    \ run() {\n    // Encrypt our message.\n    byte[] plaintext = mTextBox.getString().getBytes();\n\
    \    byte[] ciphertext = new byte[plaintext.length];\n    mOutCipher.processBytes(plaintext,\
    \ 0, plaintext.length, ciphertext, 0);\n    char[] hexCiphertext = HexCodec.bytesToHex(ciphertext);\n\
    \n// Create the GET URL. Our user name and the encrypted, hex\n    //   encoded\
    \ message are included as parameters. The user name\n    //   and base URL are\
    \ retrieved as application properties.\n    String baseURL = getAppProperty(\"\
    StealthMIDlet-URL\");\n    URLBuilder ub = new URLBuilder(baseURL);\n    ub.addParameter(\"\
    user\", getAppProperty(\"StealthMIDlet.user\"));\n    ub.addParameter(\"message\"\
    , new String(hexCiphertext));\n    String url = ub.toString();\n\ntry {\n    \
    \  // Query the server and retrieve the response.\n      HttpConnection hc = (HttpConnection)Connector.open(url);\n\
    \      if (mSession != null)\n        hc.setRequestProperty(\"cookie\", mSession);\n\
    \      InputStream in = hc.openInputStream();\n\nString cookie = hc.getHeaderField(\"\
    Set-cookie\");\n      if (cookie != null) {\n        int semicolon = cookie.indexOf(';');\n\
    \        mSession = cookie.substring(0, semicolon);\n      }\n\nint length = (int)hc.getLength();\n\
    \      ciphertext = new byte[length];\n      in.read(ciphertext);\n      in.close();\n\
    \      hc.close();\n    }\n    catch (IOException ioe) {\n      Alert a = new\
    \ Alert(\"Exception\", ioe.toString(), null, null);\n      a.setTimeout(Alert.FOREVER);\n\
    \      mDisplay.setCurrent(a, mTextBox);\n    }\n\n// Decrypt the server response.\n\
    \    String hex = new String(ciphertext);\n    byte[] dehexed = HexCodec.hexToBytes(hex.toCharArray());\n\
    \    byte[] deciphered = new byte[dehexed.length];\n    mInCipher.processBytes(dehexed,\
    \ 0, dehexed.length, deciphered, 0);\n\nString decipheredString = new String(deciphered);\n\
    \    Alert a = new Alert(\"Response\", decipheredString, null, null);\n    a.setTimeout(Alert.FOREVER);\n\
    \    mDisplay.setCurrent(a, mTextBox);\n  }\n\n// Normally you would probably\
    \ read keys from resource files\n  //   in the MIDlet suite JAR, using the getResourceAsStream()\n\
    \  //   method in Class. Here I just use hardcoded values that match\n  //   the\
    \ hardcoded values in StealthServlet.\n  private byte[] getInKey() {\n    return\
    \ \"Incoming MIDlet key\".getBytes();\n  }\n\nprivate byte[] getOutKey() {\n \
    \   return \"Outgoing MIDlet key\".getBytes();\n  }\n\npublic void pauseApp()\
    \ { }\n\npublic void destroyApp(boolean unconditional) { }\n} \n```\n\nWhen the\
    \ user invokes the `Send` command, `StealthMIDlet` encrypts the user's message\
    \ with its outgoing cipher. It then encodes the ciphertext as hexadecimal text\
    \ in preparation for sending it to the servlet. The user's name and the ciphertext\
    \ are packaged into a GET URL and sent to the server. Additionally, `StealthMIDlet`\
    \ keeps track of a cookie that is used for session tracking. If the server sends\
    \ back a session ID cookie, it is saved in `StealthMIDlet`'s `mSession` member\
    \ variable. The saved cookie is sent with each subsequent request. This allows\
    \ the server to retrieve session information for this client. Without this session\
    \ information, each HTTP request from client to server would need to reinitialize\
    \ the ciphers so that they didn't get unsynchronized.\n\n`StealthMIDlet` retrieves\
    \ the response from the server as hexadecimal ciphertext. It converts the string\
    \ to a byte array, and then decrypts the byte array using the MIDlet's incoming\
    \ cipher. The decrypted message is displayed in an `Alert`.\n\n`StealthMIDlet`\
    \ makes use of the same `HexCodec` and `URLBuilder` classes that were presented\
    \ earlier in this chapter.\n\nOn the server side, things are a little more complicated.\
    \ `StealthServlet` should be capable of handling multiple clients, which means\
    \ it should maintain a pair of ciphers for each user that connects. This is done\
    \ using HTTP sessions, one session per user. When a client request comes in, `StealthServlet`\
    \ attempts to find two ciphers in the user's session. If they don't exist, as\
    \ will be the case the first time a user connects to the servlet, new ciphers\
    \ are created. The ciphers are initialized using keys that are unique to each\
    \ user. Exactly how these keys are located is left up to you. In this simple implementation,\
    \ the `getInKey()` and `getOutKey()` methods are hard-coded.\n\nYou should notice\
    \ that the keys on the servlet side appear to be reversed from the MIDlet. This\
    \ is because the servlet's incoming cipher should decrypt using the same key as\
    \ the MIDlet's outgoing cipher.\n\nOnce `StealthServlet` has located or created\
    \ the ciphers that correspond to a particular user, it decrypts the incoming message\
    \ and prints it out to the server console. Then it encrypts a response message\
    \ (also hard-coded) and sends the response back to the MIDlet.\n\nThe entire `StealthServlet`\
    \ class is shown in [Listing 15-6](#LiB0122.html#ch15list06).\n\nListing 15-6:\
    \ The Source Code for *StealthServlet*\n\n```\nimport javax.servlet.http.*;\n\
    import javax.servlet.*;\nimport java.io.*;\nimport java.util.*;\n\nimport org.bouncycastle.crypto.StreamCipher;\n\
    import org.bouncycastle.crypto.engines.RC4Engine;\nimport org.bouncycastle.crypto.params.KeyParameter;\n\
    \npublic class StealthServlet extends HttpServlet {\n  public void doGet(HttpServletRequest\
    \ request,\n      HttpServletResponse response)\n      throws ServletException,\
    \ IOException {\n    String user = request.getParameter(\"user\");\n\n// Try to\
    \ find the user's cipher pair.\n    HttpSession session = request.getSession();\n\
    \    StreamCipher inCipher = (StreamCipher)session.getAttribute(\"inCipher\");\n\
    \    StreamCipher outCipher = (StreamCipher)session.getAttribute(\"outCipher\"\
    );\n```"
