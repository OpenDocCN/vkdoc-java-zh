  trans: "\n## 项目遍历\n\n表单支持一种*焦点*概念，即表单中的某一项当前被选中。*遍历*指的是用户能够将焦点从一个项目移动到另一个项目。在大多数情况下，MIDP\
    \ 实现会处理表单遍历的细节。例如，在 Sun 模拟器中，你可以通过按上下方向键来移动表单中各项的焦点。焦点通过项目周围的实心黑色边框来指示。图 7-2 展示了一个包含多个项目的表单；第三个项目（一个\
    \ ImageItem）拥有焦点。\n\n![](img/fig130_01.jpg)\n图 7-2：焦点位于此表单的第三个项目上。\n\n到目前为止，一切顺利——这都非常简单。事实上，CustomItem\
    \ 中提供的默认实现意味着在许多情况下你甚至不需要考虑遍历问题。\n\n让事情变得有点棘手的是*内部*遍历的概念。某些项目支持在项目*内部*遍历多个选项。一个很好的例子是\
    \ ChoiceGroup 项目。以下序列展示了在 MIDP 参考实现模拟器中遍历一个包含三个项目的表单的过程。图 7-3 展示了遍历从文本字段开始，经过仪表，最后进入\
    \ ChoiceGroup 的过程。\n\n![点击展开](img/fig130_02_0.jpg)\n图 7-3：表单遍历与内部项目遍历\n\n有两个方法用于指示遍历事件。第一个是\
    \ `traverse()`，在用户首次遍历进入该项目时被调用。默认情况下，此方法返回 `false`，表示该项目不支持内部遍历。第二个方法是 `traverseOut()`，在用户离开该项目时被调用。\n\
    \n```\nprotected boolean traverse(int dir, int viewportWidth, int viewportHeight,\n\
    \    int[] visRect_inout);\nprotected void traverseOut(); \n```\n\n|  | 注意 | 乍一看，你可能会期望当设备上按下按键时，自定义项目会同时接收到遍历方法和按键事件方法的调用。例如，如果用户按下向下箭头键移入项目，你可能会期望同时调用\
    \ `traverse()` 和 `keyPressed()` 方法。实际上，实现应该保持按键事件和遍历事件互不混淆。请记住，某些设备可能具有替代的遍历控件（例如滚轮），因此实现（以及你的自定义项目）应明确区分这些事件。\
    \ |\n\n如果你确实编写了一个支持内部遍历的自定义项目，你需要关注传递给 `traverse()` 的参数，并且需要返回 `true` 以表明你的项目支持内部遍历。传递给\
    \ `traverse()` 方法的信息如下：\n\n*   `dir` 指示用户请求的遍历方向。它可以是以下值之一：`Canvas.UP`、`Canvas.DOWN`、`Canvas.LEFT`、`Canvas.RIGHT`\
    \ 或 `CustomItem.NONE`。\n\n*   `viewportWidth` 和 `viewportHeight` 指示包含此自定义项目的表单中可用于项目的尺寸。（本质上，`viewportWidth`\
    \ 和 `viewportHeight` 描述了表单的内容区域。）这些尺寸可能有助于确定项目选项与可用屏幕区域大小之间的关系。\n\n*   `visRect_inout`\
    \ 有点奇怪。它是一个包含四个元素的整数数组。当调用 `traverse()` 方法时，`visRect_inout` 描述了自定义项目可见内容区域的区域。当\
    \ `traverse()` 方法返回时，`visRect_inout` 应包含项目中当前选中选项的边界。\n\n如果这开始听起来有点复杂，请稍等。遍历机制足够灵活，可以支持不同类型的遍历。某些设备可能仅支持垂直遍历，而其他设备可能仅支持水平遍历，还有一些设备可能两者都支持。你可以通过\
    \ `getInteractionModes()` 方法了解设备的遍历能力，该方法可以返回 `CustomItem.TRAVERSE_HORIZONTAL`、`CustomItem.TRAVERSE_VERTICAL`\
    \ 或两者兼有。根据自定义项目中所包含选项的性质，你可能需要灵活处理接收到的遍历方向以及项目内部的实际遍历。\n\n请记住，当焦点首次到达你的项目时，会调用\
    \ `traverse()` 方法。如果此方法返回 `true`，则在遍历过程中会重复调用 `traverse()`。当用户遍历离开你的项目时，从 `traverse()`\
    \ 方法返回 `false`。这会让实现知道内部遍历已结束。实现很可能会调用 `traverseOut()`，尽管这仅在焦点实际移离项目时才会发生。如果用户已到达表单的末尾或开头，则可能不会出现这种情况。\n\
    \n所有这些都在 CustomItem 的 `traverse()` 方法的 API 文档中进行了详尽细致的讨论。如果你计划实现一个具有内部遍历功能的自定义项目，请多次阅读文档，直到完全理解为止。\n"
- fmt: "## An Example\n\nIn this section, I'll show you `StationSign`, a `CustomItem`\
    \ of medium complexity. `StationSign` has the following features:\n\n- Implements\
    \ a simple scrolling list of string choices. Pointer events and key events cause\
    \ the current selection to move to the next choice. The scrolling is animated.\
    \ `StationSign` is a `Runnable`—a separate thread is created in the constructor\
    \ and used to call the `run()` method. If there's a difference between the current\
    \ display state of the item and the current selection, `run()` reconciles the\
    \ two by scrolling.\n- Conforms to the device's look and feel by using the font\
    \ for static text and colors returned from `Display`'s `getColor()` method.\n\
    - Does not implement internal traversal.\n- Uses the `traverse()` and `traverseOut()`\
    \ methods to recognize focus and paint using highlight colors. When `traverse()`\
    \ is called, `StationSign` sets a boolean member variable, `mFocus`, to indicate\
    \ that the item has focus. In the `paint()` method, `mFocus` is used to determine\
    \ what colors are used to draw the item. When `traverseOut()` is called, `mFocus`\
    \ is set to `false` indicating that focus has been lost.\n\nThe entire source\
    \ code for `StationSign` is shown in [Listing 7-3](#LiB0052.html#ch07list03).\n\
    \n**Listing 7-3: The *StationSign* Custom Item**\n\n```\nimport java.util.Vector;\n\
    \nimport javax.microedition.lcdui.*;\n\npublic class StationSign\n    extends\
    \ CustomItem\n    implements Runnable {\n  private Vector mValues;\n  private\
    \ int mSelection;\n  private boolean mTrucking;\n\nprivate Display mDisplay;\n\
    \  private Font mFont;\n  private int mVisibleIndexTimesTen;\n  private boolean\
    \ mFocus;\n\npublic StationSign(String title, Display display) {\n    super(title);\n\
    \    mDisplay = display;\n    mValues = new Vector();\n    mSelection = 0;\n \
    \   mTrucking = true;\n    mFont = Font.getFont(Font.FONT_STATIC_TEXT);\n    mVisibleIndexTimesTen\
    \ = mSelection * 10;\n\nThread t = new Thread(this);\n    t.start();\n  }\n\n\
    public void add(String value) {\n    if (value == null) return;\n    mValues.addElement(value);\n\
    \  }\n\npublic void remove(String value) {\n    if (value == null) return;\n \
    \   mValues.removeElement(value);\n  }\n\npublic String getSelection() {\n   \
    \ if (mValues.size() == 0) return \"\";\n    return (String)mValues.elementAt(mSelection);\n\
    \  }\n\npublic void flip() {\n    mSelection++;\n    if (mSelection >= mValues.size())\
    \ mSelection = 0;\n  }\n\npublic void dispose() {\n    mTrucking = false;\n  }\n\
    \n// Runnable interface.\n\npublic void run() {\n    while (mTrucking) {\n   \
    \   int target = mSelection * 10;\n      if (mVisibleIndexTimesTen != target)\
    \ {\n        mVisibleIndexTimesTen++;\n        if (mVisibleIndexTimesTen >= mValues.size()\
    \ * 10)\n          mVisibleIndexTimesTen = 0;\n        repaint();\n      }\n \
    \     try { Thread.sleep(50); }\n      catch (InterruptedException ie) {}\n  \
    \  }\n  }\n\n// CustomItem abstract methods.\n\npublic int getMinContentWidth()\
    \ {\n    // Loop through the values. Find the maximum width.\n    int maxWidth\
    \ = 0;\n    for (int i = 0; i < mValues.size(); i++) {\n      String value = (String)mValues.elementAt(i);\n\
    \      int width = mFont.stringWidth(value);\n      maxWidth = Math.max(maxWidth,\
    \ width);\n    }\n    // Don't forget about the title, although we don't\n   \
    \ // really know what font is used for that.\n    int width = mFont.stringWidth(getLabel())\
    \ + 20;\n    maxWidth = Math.max(maxWidth, width);\n    return maxWidth;\n  }\n\
    \  public int getMinContentHeight() {\n    return mFont.getHeight();\n  }\n\n\
    public int getPrefContentWidth(int width) {\n    return getMinContentWidth();\n\
    \  }\n\npublic int getPrefContentHeight(int height) {\n    return getMinContentHeight();\n\
    \  }\n\npublic void paint(Graphics g, int w, int h) {\n    int fraction = mVisibleIndexTimesTen\
    \ % 10;\n    int visibleIndex = (mVisibleIndexTimesTen - fraction) / 10;\n   \
    \ String value = (String)mValues.elementAt(visibleIndex);\n\ng.setFont(mFont);\n\
    \    int bc = mDisplay.getColor(Display.COLOR_BACKGROUND);\n    int fc = mDisplay.getColor(Display.COLOR_FOREGROUND);\n\
    \    if (mFocus == true) {\n      bc = mDisplay.getColor(Display.COLOR_HIGHLIGHTED_BACKGROUND);\n\
    \      fc = mDisplay.getColor(Display.COLOR_HIGHLIGHTED_FOREGROUND);\n    }\n\
    \    g.setColor(bc);\n    g.fillRect(0, 0, w, h);\n    g.setColor(fc);\n\n// Simple\
    \ case: visibleIndex is aligned on a single item.\n    if (fraction == 0) {\n\
    \      g.drawString(value, 0, 0, Graphics.TOP | Graphics.LEFT);\n      return;\n\
    \    }\n\n// Complicated case: show two items and a line.\n    int lineHeight\
    \ = mFont.getHeight();\n    int divider = lineHeight - lineHeight * fraction /\
    \ 10;\n\n// Draw the piece of the visible value.\n    g.drawString(value, 0, divider\
    \ - lineHeight,\n        Graphics.TOP | Graphics.LEFT);\n    // Now get the next\
    \ value.\n    visibleIndex = (visibleIndex + 1) % mValues.size();\n    value =\
    \ (String)mValues.elementAt(visibleIndex);\n    // Draw the line.\n    g.setStrokeStyle(Graphics.DOTTED);\n\
    \    g.drawLine(0, divider, w, divider);\n\ng.drawString(value, 0, divider,\n\
    \        Graphics.TOP | Graphics.LEFT);\n  }\n\n// CustomItem methods.\n\nprotected\
    \ void keyPressed(int keyCode) { flip (); }\n\nprotected void pointerPressed(int\
    \ x, int y) { flip(); }\n\nprotected boolean traverse(int dir,\n      int viewportWidth,\
    \ int viewportHeight,\n      int[] visRect_inout) {\n    mFocus = true;\n    repaint();\n\
    \    return false;\n  }\n\nprotected void traverseOut() {\n    mFocus = false;\n\
    \    repaint();\n  }\n}\n```\n\nThe MIDlet in [Listing 7-4](#LiB0052.html#ch07list04)\
    \ displays a form that contains a `StationSign`.\n\n**Listing 7-4: A MIDlet That\
    \ Demonstrates *StationSign***\n\n```\nimport javax.microedition.midlet.*;\nimport\
    \ javax.microedition.lcdui.*;\n\npublic class StationSignMIDlet\n    extends MIDlet\n\
    \    implements CommandListener {\n  public void startApp() {\n    Display display\
    \ = Display.getDisplay(this);\n    Form form = new Form(\"StationSignMIDlet\"\
    );\n    form.append(new StringItem(\"StringItem: \", \"item one\"));\n    StationSign\
    \ ss = new StationSign(\"Destination\", display);\n    ss.add(\"Albuquerque\"\
    );\n    ss.add(\"Savannah\");\n    ss.add(\"Pocatello\");\n    ss.add(\"Des Moines\"\
    );\n    form.append(ss);\n    form.append(new StringItem(\"StringItem: \", \"\
    item two\"));\n\nCommand c = new Command(\"Exit\", Command.EXIT, 0);\n    form.addCommand(c);\n\
    \    form.setCommandListener(this);\n\ndisplay.setCurrent(form);\n  }\n\npublic\
    \ void pauseApp() {}\n\npublic void destroyApp(boolean unconditional) {}\n\npublic\
    \ void commandAction(Command c, Displayable s) {\n    if (c.getCommandType() ==\
    \ Command.EXIT)\n      notifyDestroyed();\n  }\n}\n```\n\nThe MIDlet in action\
    \ appears in [Figure 7-4](#LiB0052.html#ch07fig04). The figure shows an instance\
    \ of `StationSign` sandwiched between two `StringItem`s. You can navigate through\
    \ the form to see how the appearance of `StationSign` changes when it has input\
    \ focus. If you press the select key on `StationSign`, you'll see the next choice\
    \ scroll into view.\n\n![](fig137_01.jpg)\n**Figure 7-4: *StationSign* in action\
    \ in a *Form***\n\n## Summary\n\nThis chapter describes one of MIDP 2.0's exciting\
    \ new features, custom items. The `CustomItem` class is the basis of items you\
    \ can write to include in `Form`s. You can determine the custom item's appearance\
    \ in the `paint()` method by drawing using a `Graphics` object. Callback methods\
    \ throughout `CustomItem` let you know when the item is shown or hidden and deliver\
    \ key, pointer, and traversal events. Two examples, `SimpleItem` and `StationSign`,\
    \ provide a foundation of working code that you can adapt to build your own items.\n\
    \n# Chapter 8: Persistent Storage"
