    \ in javax.microedition.io.PushRegistry, which is kind of a weird place for it.\
    \ All of PushRegistry's other methods have to do with launching MIDlets in response\
    \ to incoming network connections; the class is fully described in [Chapter 9](#LiB0063_split_000.html#351).\
    \ The following method in PushRegistry requests that a named MIDlet be woken up\
    \ at a specific time:\n\n```\npublic static long registerAlarm(String midlet,\
    \ long time)\n    throws ClassNotFoundException, ConnectionNotFoundException \n\
    ```\n\nYou need to supply the class name of a MIDlet in the MIDlet suite, and\
    \ time specifies exactly when you want the MIDlet to be launched, in the standard\
    \ form as the number of milliseconds since January 1, 1970\\. ([Chapter 4](#LiB0030_split_000.html#134)\
    \ contains a discussion of MIDP's classes and methods pertaining to time.)\n\n\
    If you supply a class name that is not found in the current MIDlet suite, a ClassNotFoundException\
    \ is thrown. If the implementation is unable to launch MIDlets at specified times,\
    \ a ConnectionNotFoundException is thrown.\n\nIf the MIDlet for which you are\
    \ requesting a timed launch was previously registered for timed launch, this method\
    \ returns the previous wakeup time.\n\n## A Bridge to the Outside World\n\nMany\
    \ MIDP devices, especially mobile phones, have WAP browsers. A new method in MIDP\
    \ 2.0's MIDlet class supplies a bridge to these browsers and other capabilities:\n\
    \n```\npublic final boolean platformRequest(String URL)\n    throws ConnectionNotFoundException\n\
    ```\n\nOn a sophisticated device, the browser and the MIDlet suite may be able\
    \ to run at the same time, in which case the browser will be launched and pointed\
    \ to the specified URL. In this case the method returns true.\n\nOn smaller devices,\
    \ the browser may not be able to run until the MIDlet is destroyed. In this case,\
    \ platformRequest() returns false and it's the MIDlet's responsibility to terminate.\
    \ After the MIDlet terminates, it's the implementation's responsibility to launch\
    \ the browser and point it at the specified URL.\n\nIn either case, platformRequest()\
    \ is a nonblocking method.\n\nThere are two special possibilities for the supplied\
    \ URL. If you supply a telephone number URL of the form tel:<number> as specified\
    \ in RFC 2806 ([http://ietf.org/rfc/rfc2806.txt](http://ietf.org/rfc/rfc2806.txt)),\
    \ the implementation should initiate a voice call.\n\nIf you supply the URL of\
    \ a MIDlet suite descriptor or JAR, the implementation should interpret this as\
    \ a request to install the given MIDlet suite.\n\n## Packaging MIDlets\n\nMIDlets\
    \ are deployed in *MIDlet suites*. A MIDlet suite is a collection of MIDlets with\
    \ some extra information; it is composed of two files. One is an *application\
    \ descriptor*, which is a simple text file. The other is a JAR file that contains\
    \ the class files and resource files that make up your MIDlet suite. Like any\
    \ JAR file, a MIDlet suite's JAR file has a manifest file. [Figure 3-2](#LiB0027.html#ch03fig02)\
    \ shows a diagram of a MIDlet suite.\n\n[![Click To expand](fig54_01.jpg)](fig54_01_0.jpg)\n\
    Figure 3-2: Anatomy of a MIDlet suite\n\nIf you're using a tool like the J2ME\
    \ Wireless Toolkit, you don't need to worry much about MIDlet suite packaging\
    \ because most of the details are handled automatically. If you want to understand\
    \ things at a lower level, or if you're just curious, keep reading for a complete\
    \ description of MIDlet suite packaging.\n\nPackaging a MIDlet suite consists\
    \ of three steps:\n\n1.  The class files and resource files that make up the MIDlets\
    \ are packaged into a JAR file. Usually, you'll use the jar command line tool\
    \ to accomplish this.\n\n2.  Additional information that's needed at runtime is\
    \ placed in the JAR's manifest file. All JARs include a manifest; a MIDlet suite\
    \ JAR contains some extra information needed by application management software.\n\
    \n3.  An application descriptor file must also be generated. This is a file with\
    \ a *.jad* extension that describes the MIDlet suite JAR. It can be used by the\
    \ application management software to decide whether a MIDlet suite JAR should\
    \ be downloaded to the device."
  trans: "\n## MIDlet 生命周期\n\nMIDP 应用程序由 `javax.microedition.midlet.MIDlet` 类的实例表示。MIDlet\
    \ 具有特定的生命周期，这体现在 `MIDlet` 类的方法和行为中。\n\nJava 领域之外的一块设备软件——*应用程序管理器*，控制着 MIDlet\
    \ 的安装和执行。MIDlet 通过将其类文件移动到设备上来完成安装。类文件将被打包到 Java 归档文件（JAR）中，而附带的描述符文件（扩展名为 `*.jad*`）则描述了\
    \ JAR 的内容。\n\nMIDlet 会经历以下状态：\n\n1.  当 MIDlet 即将运行时，会创建一个实例。MIDlet 的构造函数被执行，此时\
    \ MIDlet 处于*暂停*状态。\n\n2.  接着，在应用程序管理器调用 `startApp()` 后，MIDlet 进入*活动*状态。\n\n3.\
    \  当 MIDlet 处于活动状态时，应用程序管理器可以通过调用 `pauseApp()` 来暂停其执行。这会使 MIDlet 回到暂停状态。MIDlet\
    \ 也可以通过调用 `notifyPaused()` 自行进入暂停状态。\n\n4.  应用程序管理器可以通过调用 `destroyApp()` 来终止 MIDlet\
    \ 的执行，此时 MIDlet 被*销毁*，并耐心等待垃圾回收。MIDlet 可以通过调用 `notifyDestroyed()` 自行销毁。\n\n图 3-1\
    \ 展示了 MIDlet 的状态及其之间的转换。\n\n![点击展开](img/fig52_01_0.jpg)\n图 3-1：MIDlet 生命周期\n\n\
    `MIDlet` 类中还有一个与 MIDlet 生命周期相关的方法：`resumeRequest()`。处于暂停状态的 MIDlet 可以调用此方法，向应用程序管理器发出信号，表明它希望变为活动状态。考虑一个处于暂停状态的\
    \ MIDlet 还能运行任何代码，这似乎有些奇怪。然而，暂停的 MIDlet 仍然能够处理定时器事件或其他类型的回调，因此有机会调用 `resumeRequest()`。如果应用程序管理器决定将\
    \ MIDlet 从暂停状态转移到活动状态，它将通过调用 `startApp()` 这一常规机制来实现。\n\n## 请求唤醒调用\n\nMIDP 2.0\
    \ 允许 MIDlet 请求在稍后的时间启动，本质上就是向实现请求一个唤醒调用。该方法定义在 `javax.microedition.io.PushRegistry`\
    \ 中，这看起来有点奇怪。`PushRegistry` 的所有其他方法都与响应传入网络连接而启动 MIDlet 有关；该类在第 9 章中有完整描述。`PushRegistry`\
    \ 中的以下方法用于请求在特定时间唤醒一个指定的 MIDlet：\n\n```\npublic static long registerAlarm(String\
    \ midlet, long time)\n    throws ClassNotFoundException, ConnectionNotFoundException\
    \ \n```\n\n你需要提供 MIDlet 套件中某个 MIDlet 的类名，而 `time` 则精确指定了你希望 MIDlet 启动的时间，采用标准格式，即自\
    \ 1970 年 1 月 1 日以来的毫秒数。（第 4 章讨论了 MIDP 中与时间相关的类和方法。）\n\n如果你提供的类名在当前 MIDlet 套件中未找到，则会抛出\
    \ `ClassNotFoundException`。如果实现无法在指定时间启动 MIDlet，则会抛出 `ConnectionNotFoundException`。\n\
    \n如果你为其请求定时启动的 MIDlet 之前已经注册过定时启动，此方法将返回之前的唤醒时间。\n\n## 通往外部世界的桥梁\n\n许多 MIDP 设备，尤其是手机，都带有\
    \ WAP 浏览器。MIDP 2.0 的 `MIDlet` 类中新增了一个方法，为这些浏览器和其他功能提供了桥梁：\n\n```\npublic final\
    \ boolean platformRequest(String URL)\n    throws ConnectionNotFoundException\n\
    ```\n\n在功能强大的设备上，浏览器和 MIDlet 套件可能能够同时运行，在这种情况下，浏览器将被启动并指向指定的 URL。此时该方法返回 `true`。\n\
    \n在较小的设备上，浏览器可能必须等到 MIDlet 被销毁后才能运行。在这种情况下，`platformRequest()` 返回 `false`，并且 MIDlet\
    \ 有责任自行终止。MIDlet 终止后，实现有责任启动浏览器并将其指向指定的 URL。\n\n无论哪种情况，`platformRequest()` 都是一个非阻塞方法。\n\
    \n提供的 URL 有两种特殊情况。如果你提供的电话号码 URL 格式为 `tel:<number>`（如 RFC 2806 ([`ietf.org/rfc/rfc2806.txt`](http://ietf.org/rfc/rfc2806.txt))\
    \ 所规定），则实现应发起一个语音通话。\n\n如果你提供的是 MIDlet 套件描述符或 JAR 的 URL，则实现应将其解释为安装给定 MIDlet 套件的请求。\n\
    \n## 打包 MIDlet\n\nMIDlet 以 *MIDlet 套件* 的形式部署。MIDlet 套件是一个包含一些额外信息的 MIDlet 集合；它由两个文件组成。一个是*应用程序描述符*，它是一个简单的文本文件。另一个是\
    \ JAR 文件，其中包含构成 MIDlet 套件的类文件和资源文件。与任何 JAR 文件一样，MIDlet 套件的 JAR 文件都有一个清单文件。图 3-2\
    \ 展示了 MIDlet 套件的结构图。\n\n![点击展开](img/fig54_01_0.jpg)\n图 3-2：MIDlet 套件剖析\n\n如果你使用的是像\
    \ J2ME 无线工具包这样的工具，则无需过多担心 MIDlet 套件的打包问题，因为大部分细节都会自动处理。如果你想从更底层理解，或者只是好奇，请继续阅读关于\
    \ MIDlet 套件打包的完整描述。\n\n打包 MIDlet 套件包括三个步骤：\n\n1.  构成 MIDlet 的类文件和资源文件被打包到一个 JAR\
    \ 文件中。通常，你会使用 `jar` 命令行工具来完成此操作。\n\n2.  运行时所需的额外信息被放置在 JAR 的清单文件中。所有 JAR 都包含一个清单；MIDlet\
    \ 套件 JAR 包含一些应用程序管理软件所需的额外信息。\n\n3.  还必须生成一个应用程序描述符文件。这是一个扩展名为 `*.jad*` 的文件，用于描述\
    \ MIDlet 套件 JAR。应用程序管理软件可以使用它来决定是否应将 MIDlet 套件 JAR 下载到设备上。\n"
- fmt: "### MIDlet Manifest Information\n\nThe information stored in a MIDlet's manifest\
    \ file consists of name and value pairs, like a properties file. For example,\
    \ an unadorned JAR manifest might look like this:\n\n```\nManifest-Version: 1.0\n\
    Created-By: 1.3.0 (Sun Microsystems Inc.)\n```\n\nA MIDlet JAR manifest for Jargoneer\
    \ looks like this:\n\n```\nManifest-Version: 1.0\nMIDlet-1: Jargoneer, Jargoneer.png,\
    \ Jargoneer\nMIDlet-Name: Jargoneer\nMIDlet-Version: 1.0\nMIDlet-Vendor: Sun Microsystems\n\
    Created-By: 1.3.0 (Sun Microsystems Inc.)\nMicroEdition-Configuration: CLDC-1.0\n\
    MicroEdition-Profile: MIDP-1.0\n```\n\nThe extra attributes describe software\
    \ versions, class names, and other information about the MIDlet suite. The following\
    \ attributes must be included:\n\n- **MIDlet-Name**: Despite the moniker, this\
    \ attribute actually refers to the name of the entire MIDlet suite, not just one\
    \ MIDlet.\n- **MIDlet-Version**: This describes the version of the MIDlet suite.\
    \ It's a number you pick yourself in the form *major.minor.micro*.\n- **MIDlet-Vendor**:\
    \ This is your name or the name of your company.\n- **MIDlet-*n***: For each MIDlet\
    \ in the MIDlet suite, the displayable name, icon file, and class name are listed.\
    \ The MIDlets should be numbered starting from 1 and counting up. For example,\
    \ several MIDlets in a single MIDlet suite could be listed like this:\n\n    ```\n\
    \    MIDlet-1: Sokoban, /icons/Sokoban.png, example.sokoban.Sokoban\n    MIDlet-2:\
    \ Tickets, /icons/Auction.png, example.lcdui.TicketAuction\n    MIDlet-3: Colors,\
    \ /icons/ColorChooser.png, example.chooser.Color\n    MIDlet-4: Stock, /icons/Stock.png,\
    \ example.stock.StockMIDlet \n    ```\n\n- **MicroEdition-Configuration**: This\
    \ attribute describes the J2ME configurations upon which this MIDlet suite can\
    \ run. Multiple configuration names should be separated by spaces.\n- **MicroEdition-Profile**:\
    \ This describes the set of profiles upon which this MIDlet suite can run. For\
    \ MIDP 1.0 applications, this is `MIDP-1.0`. For applications that can run on\
    \ MIDP 1.0 or MIDP 2.0, use `\"MIDP-2.0 MIDP-1.0\"`.\n\nIn addition to the required\
    \ manifest attributes, the following attributes may also be defined:\n\n- **MIDlet-Description**:\
    \ The description of the MIDlet suite goes in this attribute.\n- **MIDlet-Icon**:\
    \ Icons for individual MIDlets are described in the `MIDlet-n` attributes. This\
    \ attribute specifies an icon to represent the entire MIDlet suite.\n- **MIDlet-Info-URL**:\
    \ If additional information about the MIDlet suite is available online, use this\
    \ attribute to list the URL.\n- **MIDlet-Data-Size**: If you know how many bytes\
    \ of persistent data are required by the MIDlet suite, you can specify the number\
    \ with this attribute.\n\n|  | Tip | Don't get tripped up by the attribute names.\
    \ Many of them appear to refer to a single MIDlet, like `MIDlet-Name` and `MIDlet-Description`.\
    \ In fact, these attributes describe an entire MIDlet suite. The only attribute\
    \ that applies to a specific MIDlet is the `MIDlet-n` attribute, which is used\
    \ to list each MIDlet in the suite. |\n\nIn MIDP 2.0, several additional attributes\
    \ may be included. MIDP 2.0 protects network APIs from unauthorized access using\
    \ a permission scheme, which will be fully discussed later in this chapter. MIDlets\
    \ can list necessary permissions and optional permissions in the MIDlet JAR manifest\
    \ as follows:\n\n- **MIDlet-Permissions**: Use this attribute to list permissions\
    \ that are critical to the operation of the MIDlet suite. Multiple permissions\
    \ are separated by commas.\n- **MIDlet-Permissions-Opt**: This attribute lists\
    \ permissions that may be used but are not critical for this MIDlet suite.\n\n\
    Finally, MIDP 2.0 also provides a way for MIDlet suites to signal their dependence\
    \ on optional APIs:\n\n- **MIDlet-Extensions**: List the optional APIs used by\
    \ this MIDlet suite in this attribute. The exact names are determined by the individual\
    \ optional API specifications.\n\n### Application Descriptor\n\nThe attributes\
    \ in a MIDlet suite JAR are used by the application management software to run\
    \ MIDlets within a suite. The application descriptor, by contrast, contains information\
    \ that helps a device decide whether or not to load a MIDlet suite. Because an\
    \ application descriptor is a file separate from the MIDlet suite JAR, it is easy\
    \ for a device to load and examine the file before downloading the MIDlet suite.\n\
    \nAs it happens, a lot of the information in the application descriptor is the\
    \ same as the information that's in the MIDlet suite JAR. For example, the application\
    \ descriptor must contain the `MIDlet-Name`, `MIDlet-Version`, and `MIDlet-Vendor`\
    \ attributes. In addition, it should include the following:\n\n- **MIDlet-Jar-URL**:\
    \ This is the URL where the MIDlet suite JAR can be found.\n- **MIDlet-Jar-Size**:\
    \ This is the size, in bytes, of the MIDlet suite JAR.\n\nThe application descriptor\
    \ can optionally contain the `MIDlet-Description`, `MIDlet-Icon`, `MIDlet-Info-URL`,\
    \ and `MIDlet-Data-Size` attributes.\n\nDevices and emulators vary widely in their\
    \ handling of MIDlet suite descriptors. Some will fail installation if any fields\
    \ in the descriptor are incorrect while others are more lenient. A tool like the\
    \ J2ME Wireless Toolkit is extremely useful in creating well-formed descriptors.\n\
    \nThe application descriptor is useful in over the air (OTA) deployment. A device\
    \ can download and inspect the descriptor, a relatively short file, before deciding\
    \ whether or not the entire MIDlet suite JAR should be downloaded and installed.\
    \ For OTA provisioning, the server's returned MIME type for the application descriptor\
    \ should be `text/vnd.sun.j2me.app-descriptor`. This and more (a whole protocol)\
    \ is described in the *Over the Air User Initiated Provisioning Specification*\
    \ section of the MIDP 2.0 specification.\n\n### MIDlet Properties\n\nThere's one\
    \ other possibility for attributes in the manifest or application descriptor.\
    \ You can add attributes that have meaning to your MIDlets. MIDlets can retrieve\
    \ the values of these attributes using the `getAppProperty()` method in the `javax.microedition.midlet.MIDlet`\
    \ class. An attribute can be listed in the application descriptor, JAR manifest,\
    \ or both; if it is listed in both, the value from the application descriptor\
    \ will be used. In general, it makes sense to store application properties in\
    \ the application descriptor file. Because it's distinct from the MIDlet suite\
    \ JAR, the application descriptor can easily be changed to modify the behavior\
    \ of your MIDlets. You might, for example, store a URL or other configuration\
    \ information in the application descriptor.\n\nFor example, suppose you put an\
    \ application-specific attribute in the application descriptor, like this:\n\n\
    ```\nJargoneer.url: http://www.dict.org/bin/Dict\n```\n\nInside the MIDlet, you\
    \ can retrieve the value of the attribute like this:\n\n```\nString url = getAppProperty(\"\
    Jargoneer.url\");\n```\n\nChanging the URL is as easy as changing the application\
    \ descriptor, a simple text file. None of your code needs to be recompiled. This\
    \ could be useful if you were expecting to distribute many copies of a MIDlet\
    \ and wanted to share the server load among a group of servers. You could distribute\
    \ the same MIDlet suite JAR with a group of different application descriptors,\
    \ each one using a MIDlet attribute to point to a different server."
