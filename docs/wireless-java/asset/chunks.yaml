    \ 50, ToneControl.PLAY_BLOCK, 0,\n        ToneControl.SET_VOLUME, 100, ToneControl.PLAY_BLOCK,\
    \ 1,\n        ToneControl.SET_VOLUME, 50, ToneControl.PLAY_BLOCK, 1,\n       \
    \ ToneControl.SET_VOLUME, 100, ToneControl.PLAY_BLOCK, 0,\n      };\n    }\n \
    \   try {\n      Player player = Manager.createPlayer(Manager.TONE_DEVICE_LOCATOR);\n\
    \      player.realize();\n      ToneControl tc = (ToneControl)player.getControl(\"\
    ToneControl\");\n      tc.setSequence(sequence);\n      player.start();\n    }\n\
    \    catch (Exception e) {\n      Alert a = new Alert(\"Exception\", e.toString(),\
    \ null, null);\n      a.setTimeout(Alert.FOREVER);\n      mDisplay.setCurrent(a,\
    \ mMainScreen);\n    }\n  }\n} \n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\
    \nRemember, Player's start() method does not block. If you want, you can start\
    \ all three songs running simultaneously in the emulator. This works because the\
    \ toolkit emulator is using a polyphonic device to play the tone sequences. On\
    \ a real device, playing multiple sequences simultaneously is probably not possible.\
    \ But you can set one sequence running, and assuming it doesn't suck up too much\
    \ processor time, your MIDlet can go and do other tasks, like drawing a game display\
    \ or connecting to a network.\n\n## The Mobile Media API\n\nMIDP 2.0's audio support\
    \ is a subset of the full power of the Mobile Media API. If you're using the J2ME\
    \ Wireless Toolkit, its emulators support the full MMAPI by default. This means\
    \ that you have other APIs available and several additional content types supported\
    \ by the implementation.\n\nIf you'd like to remove MMAPI support, leaving only\
    \ MIDP 2.0 audio, choose **Edit** Ø **Preferences** from the KToolbar menu, then\
    \ click on the **API Availability** tab. You can uncheck the **Mobile Media API**\
    \ if you do not wish to use it.\n\nIf you are using the toolkit's MMAPI implementation,\
    \ you can customize the supported content types and media features in the **MMedia**\
    \ tab of the preferences window.\n\nFor more information on the MMAPI, see [http://wireless.java.sun.com/apis/articles/mmapi_overview/](http://wireless.java.sun.com/apis/articles/mmapi_overview/).\n\
    \n## Summary\n\nIn this chapter you learned about playing tones and sampled audio\
    \ in MIDP 2.0\\. A subset of the Mobile Media API, the Audio Building Block, is\
    \ included in MIDP 2.0\\. It is based on Players that know how to render audio\
    \ data and implicit protocol objects that understand how to transport audio data\
    \ to the Player. Aside from optional and flexible support for sampled audio, the\
    \ ABB also includes tone sequence player. Your MIDlets can now benefit from the\
    \ excitement of music and sampled audio.\n\n# Chapter 13: Performance Tuning\n\
    \n## Overview\n\nMIDP is a small platform. The processor on a MIDP device will\
    \ probably be much slower than a typical desktop computer processor, and the available\
    \ memory will be much smaller also. Making your application run fast and lean\
    \ is important. You'll need to use memory sparingly, make your application run\
    \ fast enough to be easily usable, and structure it so that the code itself is\
    \ as small as it can be.\n\nThis chapter describes simple methods for benchmarking\
    \ your existing code. It then goes on to describe various optimizations that can\
    \ make your code run faster or use less memory. Common sense will take you a long\
    \ way, but this chapter is devoted to giving you the basic techniques for optimizing\
    \ your application.\n\nThe important rule of thumb is this: only optimize where\
    \ it's needed. Said another way: if it ain't broke, don't fix it. I suggest that\
    \ your first pass at coding your application should concentrate on cleanliness\
    \ and maintainability. If there are performance problems, identify them and begin\
    \ optimizing. You shouldn't be optimizing code as you write it—that's just likely\
    \ to result in hard-to-read, hard-to-maintain code. Write first, then test, then\
    \ optimize."
  trans: "\n清单 12-4 中的 MIDlet 包含几个示例，可帮助你编写自己的音调序列。\n\n清单 12-4：单声道经典老歌\n\n| **![示例开始](img/_1.gif)**\
    \ |\n\n```\nimport java.io.*;\n\nimport javax.microedition.io.*;\nimport javax.microedition.lcdui.*;\n\
    import javax.microedition.midlet.*;\nimport javax.microedition.media.*;\nimport\
    \ javax.microedition.media.control.*;\n\npublic class ToneMIDlet\n    extends\
    \ MIDlet\n    implements CommandListener {\n  private final static String kSoundOfMusic\
    \ = \"音乐之声\";\n  private final static String kQuandoMenVo = \"漫步街上\";\n  private\
    \ final static String kTwinkle = \"小星星变奏曲 VII\";\n\nprivate Display mDisplay;\n\
    \  private List mMainScreen;\n\npublic void startApp() {\n    mDisplay = Display.getDisplay(this);\n\
    \nif (mMainScreen == null) {\n      mMainScreen = new List(\"音频 MIDlet\", List.IMPLICIT);\n\
    \nmMainScreen.append(kSoundOfMusic, null);\n      mMainScreen.append(kQuandoMenVo,\
    \ null);\n      mMainScreen.append(kTwinkle, null);\n      mMainScreen.addCommand(new\
    \ Command(\"退出\", Command.EXIT, 0));\n      mMainScreen.addCommand(new Command(\"\
    播放\", Command.SCREEN, 0));\n      mMainScreen.setCommandListener(this);\n    }\n\
    \nmDisplay.setCurrent(mMainScreen);\n  }\n\npublic void pauseApp() {}\n\npublic\
    \ void destroyApp(boolean unconditional) {}\n  public void commandAction(Command\
    \ c, Displayable s) {\n    if (c.getCommandType() == Command.EXIT) notifyDestroyed();\n\
    \    else run();\n  }\n\npublic void run() {\n    String selection = mMainScreen.getString(\n\
    \        mMainScreen.getSelectedIndex());\n\nbyte[] sequence = null;\n    if (selection.equals(kSoundOfMusic))\
    \ {\n      sequence = new byte[] {\n        ToneControl.VERSION, 1,\n        67,\
    \ 16, // 那\n        69, 16, // 山\n        67,  8, // 是\n        65,  8, // 充 -\n\
    \        64, 48, // 满\n        62,  8, // 生\n        60,  8, // 机\n        59,\
    \ 16, // 的\n        57, 16, // 声\n        59, 32, // 音 -\n        59, 32  // 啊\n\
    \      };\n    }\n    else if (selection.equals(kQuandoMenVo)) {\n      sequence\
    \ = new byte[] {\n        ToneControl.VERSION, 1,\n        ToneControl.TEMPO,\
    \ 22,\n        ToneControl.RESOLUTION, 96,\n        64, 48, ToneControl.SILENCE,\
    \ 8, 52, 4, 56, 4, 59, 4, 64, 4,\n        63, 48, ToneControl.SILENCE, 8, 52,\
    \ 4, 56, 4, 59, 4, 63, 4,\n        61, 72,\n        ToneControl.SILENCE, 12, 61,\
    \ 12,\n            63, 12, 66, 2, 64, 10, 63, 12, 61, 12,\n        64, 12, 57,\
    \ 12, 57, 48,\n        ToneControl.SILENCE, 12, 59, 12,\n            61, 12, 64,\
    \ 2, 63, 10, 61, 12, 59, 12,\n        63, 12, 56, 12, 56, 48,\n      };\n    }\n\
    \    else if (selection.equals(kTwinkle)) {\n      sequence = new byte[] {\n \
