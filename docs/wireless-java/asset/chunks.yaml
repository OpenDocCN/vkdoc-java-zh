    ### 验证与开发周期


    XML 文档也可能引用文档类型定义（DTD）或 XML 模式；这些文件描述了特定类型 XML 文档的内容。例如，我们可以编写一个 DTD 来规定术语定义文档的内容。这是
    XML 强大功能的一部分，也是 XML 有时被称为*自描述数据*的原因。


    给定一个文档，你可以判断它是否符合其 DTD，这是确定系统某部分是否产生了系统其他部分无法读取的数据的好方法。用 XML 术语来说，遵循其 DTD 或模式规则的文档是*有效的*。在
    J2SE 和 J2EE 世界中，解析器可以是验证型或非验证型的。J2ME 世界太小，无法支持 XML 文档验证，因此我们将在本章讨论的所有解析器都是非验证型的。


    尽管你无法在 MIDP 设备上执行验证，但在开发和测试周期中，你很可能希望使用验证型解析器。例如，你可以编写模拟 MIDP 客户端的代码，让其从服务器请求数据并验证结果。这有助于在切换到
    MIDP 客户端软件之前，清除服务器代码中的错误。


    ### 设计技巧


    常识总能让你走得很远。在考虑如何在 MIDP 应用程序中使用 XML 时，请牢记三点：


    *   **保持文档小巧。** 如果你要向 MIDP 设备发送一个约 100KB 的文档，却只使用其中几个元素，那么是时候重新考虑你的服务器端策略了。你很可能可以在服务器端转换文档，只将所需内容发送到设备。请记住，网络连接可能很慢，而且设备上的内存也不多。


    *   **不要在发送给 MIDP 设备的 XML 中使用注释**，除非在开发周期中作为调试辅助。注释只会使文档变长，这意味着下载速度更慢，设备上的内存占用更多。


    *   **选择适合你需求的解析器。** 我们将研究的一些解析器会在解析文档时在内存中构建整个文档模型。这就像给 XML 文档的提供者开了一张空白支票。如果服务器向你发送一个
    1MB 的文件，这类解析器会尝试读取整个文件，直到内存耗尽。另一方面，如果你知道要解析的文件大小，并且它们足够小，你可能会选择模型构建型解析器，因为它比其他类型的解析器稍微容易使用。


    *   **考虑使用 XML 文档的紧凑表示形式。** 用 ASCII 或 Unicode 表示 XML 文档效率不高，并且有多种方案可以实现更紧凑的表示。事实上，WAP
    论坛已经定义了一种名为 WBXML 的二进制编码 XML 标准。一个名为 SWX 的解析器可以处理 WBXML，并且适用于像 MIDP 这样的小型平台：[`www.trantor.de/wbxml/`](http://www.trantor.de/wbxml/)。关于这个问题的另一种方法，请参见
    [`jxme.jxta.org/`](http://jxme.jxta.org/) 上的 JXME 项目。


    最后，你可能会担心小型 XML 解析器的性能。这是一个合理的担忧，尤其是在处理器相对较慢的小型设备上。关于 XML 解析器性能的精彩对比，请参见 [`www.extreme.indiana.edu/~aslom/exxp/`](http://www.extreme.indiana.edu/~aslom/exxp/)。对于小型文档，小型解析器可以保持自己的优势，甚至超越大型解析器。


    与其他可能耗时的操作一样，解析应该在其自己的线程中完成，以免用户界面冻结。


    ## MIDP XML 解析器概览


    表 14-1 列出了可用于 MIDP 平台的小型开源 XML 解析器。每个解析器都根据“许可证”列中列出的某种开源软件许可证发布。“大小”列显示了解析器压缩类文件的近似大小。“类型”列使用以下之一描述了解析范式：


    *   “拉取”表示程序员反复调用解析器上的一个方法来驱动它遍历文档。

    *   “推送”表示解析器自行遍历整个文档，在重要事件发生时调用代码中的回调方法。SAX 解析器实现了推送范式。

    *   “模型”表示解析器构建文档的某种内部表示（在内存中）。解析完成后，你的代码可以检查此模型并提取元素数据。


