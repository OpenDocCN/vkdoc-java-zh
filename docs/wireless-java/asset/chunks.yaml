    \ 5-4](#LiB0039.html#ch05fig04), the **Exit** command is given a higher priority\
    \ (lower number) than the other commands, which insures that it appears directly\
    \ on the screen. The other commands, with a lower priority, are relegated to the\
    \ command menu.\n\n## Screens and Tickers\n\nThe remainder of this chapter and\
    \ all of [Chapter 6](#LiB0044_split_000.html#209) are devoted to Screen and its\
    \ subclasses, which is the left branch of the hierarchy shown in [Figure 5-1](#LiB0037.html#179).\
    \ Screen is the base class for all classes that represent generalized user interfaces.\n\
    \nCanvas, by contrast, is a base class for specialized interfaces, such as those\
    \ for games. Canvas will be fully covered later, in [Chapter 10](#LiB0075_split_000.html#408).\n\
    \nIn the coming sections, we'll explore each of Screen's child classes. Here,\
    \ I'll briefly describe what all Screens have in common: a title and a ticker.\
    \ The *title* is just what you expect: a string that appears at the top of the\
    \ screen. A *ticker* is simply a bit of text that scrolls across the top of a\
    \ Screen; it is named after old-fashioned stock tickers.\n\nIn MIDP 2.0, the four\
    \ methods I'm about to describe are moved from Screen to Displayable. Thus, MIDP\
    \ 2.0 extends the concept of title and ticker to all Displayables, not just Screens.\
    \ In MIDP 2.0, the Screen class has no methods.\n\nThe title is a text string\
    \ displayed at the top of the screen. As you saw in [Figure 5-3](#LiB0039.html#193),\
    \ the title of the screen is \"TextBox.\" Subclasses of Screen have constructors\
    \ that set the title, but the title may also be accessed using the following methods:\n\
    \n```\npublic void setTitle(String newTitle)\npublic String getTitle()\n```\n\n\
    The ticker is just as easy to access:\n\n```\npublic void setTicker(Ticker newTicker)\n\
    public Ticker getTicker() \n```\n\nThe Ticker class is a simple wrapper for a\
    \ string. To add a ticker to a screen, you would do something like this:\n\n```\n\
    // Displayable d = ...\nTicker ticker = new Ticker(\"This is the ticker message!\"\
    );\nd.setTicker(ticker);\n```\n\n[Figure 5-5](#LiB0040.html#ch05fig05) shows a\
    \ ticker in action.\n\n![](fig88_01.jpg)\nFigure 5-5: A ticker scrolls across\
    \ the top of a screen."
  trans: "\n### 创建命令\n\n在 MIDP 中，命令由 `Command` 类的实例表示。要创建一个命令，只需提供名称、类型和优先级。名称通常显示在屏幕上。类型可用于标识常用命令，它应为\
    \ `Command` 类中定义的某个值。表 5-1 列出了类型值及其含义。\n\n表 5-1：命令类型\n\n| **名称** | **含义** |\n\
    | --- | --- |\n| OK | 确认选择。 |\n| CANCEL | 取消待处理的更改。 |\n| BACK | 将用户返回到上一个屏幕。 |\n\
    | STOP | 停止正在运行的操作。 |\n| HELP | 显示应用程序说明。 |\n| SCREEN | 特定应用程序命令的通用类型。 |\n\n例如，要创建一个标准的\
    \ **OK** 命令，可以这样做：\n\n```\nCommand c = new Command(\"OK\", Command.OK, 0);\n```\n\
    \n要创建一个特定于应用程序的命令，可以这样做：\n\n```\nCommand c = new Command(\"Launch\", Command.SCREEN,\
    \ 0);\n```\n\n如何显示命令由 MIDP 实现决定。在 Sun J2ME Wireless Toolkit 模拟器中，命令被分配给两个软键。*软键*是设备键盘上没有预定义功能的按钮。软键在不同时间可以服务于不同目的。如果命令数量超过软键数量，则无法容纳的命令将被分组到一个菜单中，并分配给其中一个软键。\n\
    \n一个简单的优先级方案决定了当命令数量超过可用屏幕空间时，哪些命令会胜出。每个命令都有一个优先级，表示显示系统应尽力显示该命令的程度。数字越小，优先级越高。如果你添加一个优先级为\
    \ 0 的命令，然后再添加几个优先级为 1 的命令，那么优先级为 0 的命令将直接显示在屏幕上，而其他命令很可能最终出现在次级菜单中。\n\nMIDP 2.0\
    \ 增加了对命令长标签的支持。MIDP 实现会根据可用屏幕空间和标签大小来决定使用哪个标签。你可以像这样创建一个带有短标签和长标签的命令：\n\n```\n\
    Command c = new Command(\"Run\", \"Run simulation\", Command.SCREEN, 0);\n```\n\
    \n`Command` 类提供了 `getLabel()`、`getLongLabel()` 和 `getCommandType()` 方法，用于检索命令的相关信息。\n\
    \n### 响应命令\n\n命令本身并不令人兴奋。它们会显示在屏幕上，但当用户调用命令时，不会自动发生任何事情。当用户在 `Displayable` 中调用任何命令时，一个称为*监听器*的对象会收到通知。这遵循了\
    \ JavaBeans 事件模型的基本形式；`Displayable` 是一个*单播事件源*。每次用户调用其某个命令时，`Displayable` 都会触发一个事件。\n\
    \n监听器是一个实现了 `CommandListener` 接口的对象。要将监听器注册到 `Displayable`，请使用以下方法：\n\n```\npublic\
    \ void setListener(CommandListener l) \n```\n\n`Displayable` 是单播事件源，因为它只能有一个监听器对象。（*多播*事件源可以有多个监听器，并使用\
    \ `add…` 方法来添加监听器，而不是 `set…` 方法。）\n\n实现 `CommandListener` 只需定义一个方法：\n\n```\npublic\
    \ void commandAction(Command c, Displayable s)\n```\n\n当命令被调用时，包含该命令的 `Displayable`\
    \ 会调用已注册监听器的 `commandAction()` 方法。\n\n|  | 提示  | 事件监听器不应在事件处理线程内执行耗时操作。系统使用自己的线程来调用\
    \ *commandAction()* 以响应用户输入。如果你的 *commandAction()* 实现执行了任何繁重任务，它将占用系统的事件处理线程。如果你有复杂操作要执行，请使用自己的线程。\
    \ |\n\n### 一个简单示例\n\n为了说明问题，请考虑以下类：\n\n```\nimport javax.microedition.midlet.*;\n\
    import javax.microedition.lcdui.*;\n\npublic class Commander extends MIDlet {\n\
    \  public void startApp() {\n    Displayable d = new TextBox(\"TextBox\", \"Commander\"\
    , 20, TextField.ANY);\n    Command c = new Command(\"Exit\", Command.EXIT, 0);\n\
    \    d.addCommand(c);\n    d.setCommandListener(new CommandListener() {\n    \
    \  public void commandAction(Command c, Displayable s) {\n        notifyDestroyed();\n\
    \      }\n    });\n\n    Display.getDisplay(this).setCurrent(d);\n  }\n\n  public\
    \ void pauseApp() { }\n\n  public void destroyApp(boolean unconditional) { }\n\
    } \n```\n\n这个 MIDlet 创建了一个 `TextBox`（它是 `Displayable` 的一种），并向其添加了一个命令。监听器被创建为一个匿名内部子类。在\
    \ Sun 的工具包中，这个 MIDlet 显示如图 5-3 所示。\n\n![点击展开](img/fig86_01_0.jpg)\n图 5-3：一个带有单个命令\
    \ *Exit* 的简单 MIDlet\n\n图 5-3 显示了 **Exit** 命令被映射到 MIDP 模拟器的一个软键上。如果你向这个 MIDlet\
    \ 添加另一个命令，它将被映射到另一个软键。如果你继续添加命令，那些无法在屏幕上容纳的命令将被放入屏幕外的菜单中。例如，一个包含四个命令的屏幕在 MIDP\
    \ 模拟器中显示如图 5-4a 所示。\n\n![点击展开](img/fig87_01_0.jpg)\n图 5-4：此 MIDlet 的命令数量超过了设备的软键数量。调用\
    \ (a) 系统生成的 *Menu* 命令会显示 (b) 剩余的命令。\n\n如果你按下 **Menu** 软键，你将看到剩余的命令，如图 5-4b 所示。现在可以通过按数字键或使用方向键导航来选择菜单项。在图\
    \ 5-4 所示的示例中，**Exit** 命令被赋予了比其他命令更高的优先级（数字更小），这确保了它直接显示在屏幕上。其他优先级较低的命令则被归入命令菜单。\n\
    \n## 屏幕与滚动条\n\n本章的剩余部分以及第 6 章的全部内容将专门介绍 `Screen` 及其子类，它们是图 5-1 所示层次结构的左分支。`Screen`\
    \ 是所有表示通用用户界面的类的基类。\n\n相比之下，`Canvas` 是专用界面（例如游戏界面）的基类。`Canvas` 将在后面的第 10 章中全面介绍。\n\
    \n在接下来的章节中，我们将探讨 `Screen` 的每个子类。在这里，我将简要描述所有 `Screen` 的共同点：标题和滚动条。*标题*正如你所期望的那样：显示在屏幕顶部的字符串。*滚动条*只是一段在屏幕顶部滚动的文本；其名称来源于老式的股票行情自动收录器。\n\
    \n在 MIDP 2.0 中，我将要描述的四个方法已从 `Screen` 移至 `Displayable`。因此，MIDP 2.0 将标题和滚动条的概念扩展到了所有\
    \ `Displayable`，而不仅仅是 `Screen`。在 MIDP 2.0 中，`Screen` 类没有方法。\n\n标题是显示在屏幕顶部的文本字符串。正如你在图\
    \ 5-3 中看到的，屏幕的标题是 \"TextBox\"。`Screen` 的子类有设置标题的构造函数，但标题也可以通过以下方法访问：\n\n```\n\
    public void setTitle(String newTitle)\npublic String getTitle()\n```\n\n滚动条的访问同样简单：\n\
    \n```\npublic void setTicker(Ticker newTicker)\npublic Ticker getTicker() \n```\n\
    \n`Ticker` 类是一个简单的字符串包装器。要向屏幕添加滚动条，可以这样做：\n\n```\n// Displayable d = ...\nTicker\
    \ ticker = new Ticker(\"This is the ticker message!\");\nd.setTicker(ticker);\n\
    ```\n\n图 5-5 展示了滚动条的实际效果。\n\n![](img/fig88_01.jpg)\n图 5-5：滚动条在屏幕顶部滚动。\n"
- fmt: "# TextBox, the Simplest Screen\n\nThe simplest type of screen is the `TextBox`,\
    \ which you've already seen in action. `TextBox` allows the user to enter a string.\
    \ Keep in mind that on a garden-variety MIDP device, text input is a tedious process.\
    \ Many devices only have a numeric keypad, so entering a single character is a\
    \ matter of one, two, or three button presses. A good MIDlet requires minimal\
    \ user input.\n\nThat said, your MIDlet may need some kind of input—perhaps a\
    \ zip code, or a short name, or some kind of password. In these cases, you'll\
    \ probably want to use a `TextBox`.\n\nA `TextBox` is created by specifying four\
    \ parameters:\n\n```\npublic TextBox(String title, String text, int maxSize, int\
    \ constraints)\n```\n\nThe `title` is used as the screen title, while `text` and\
    \ `maxSize` determine the initial text and maximum size of the text box. Finally,\
    \ `constraints` can be used to restrict the user's input. Constants from the `TextField`\
    \ class are used to specify the type of input required:\n\n*   `ANY` allows any\
    \ type of input.\n*   `NUMERIC` restricts the input to integers.\n*   `DECIMAL`\
    \ (new in MIDP 2.0) allows numbers with fractional parts.\n*   `PHONENUMBER` requires\
    \ a telephone number.\n*   `EMAILADDR` input must be an e-mail address.\n*   `URL`\
    \ input must be a web address.\n\nIt's up to the implementation to determine how\
    \ these constraints are enforced. The toolkit emulators simply don't allow invalid\
    \ input; for example, a `NUMERIC` `TextBox` doesn't allow you to enter alphabetic\
    \ characters.\n\nThe constraints above may be combined with the flags listed below.\
    \ Constraints limit the behavior of users, while flags define the behavior of\
    \ the `TextBox`. All the flags except `PASSWORD` are new in MIDP 2.0.\n\n*   `PASSWORD`\
    \ characters are not shown when entered; generally, they are represented by asterisks.\n\
    *   `UNEDITABLE` indicates text that cannot be edited.\n*   `SENSITIVE` is used\
    \ to flag text that the implementation should not store. Some input schemes store\
    \ input from the user for later use in autocompletion. This flag indicates that\
    \ the text is off-limits and should not be saved or cached.\n*   `NON_PREDICTIVE`\
    \ indicates that you are expecting the user to enter text that any text-predicting\
    \ input scheme will probably not be able to guess. For example, if you're expecting\
    \ the user to enter an order number like `Z51002S`, you would use this flag to\
    \ tell the input scheme to not bother trying to predict the input.\n*   `INITIAL_CAPS_WORD`\
    \ is used for input where each word should be capitalized.\n*   `INITIAL_CAPS_SENTENCE`\
    \ indicates input where the first character of each sentence should be capitalized.\n\
    \nIf you don't want the `TextBox` to perform any validation, use `ANY` or its\
    \ numerical equivalent, `0`, for the `constraints` parameter in the constructor.\n\
    \nThe flags may be combined with any of the other constraints using the OR operator.\
    \ For example, to create a `TextBox` that constrains input to an e-mail address\
    \ but keeps the entered data hidden, you would do something like this:\n\n```\n\
    Displayable d = new TextBox(\"Email\", \"\", 64,\n        TextField.EMAILADDR\
    \ | TextField.PASSWORD);\n```\n\nIf you think about it, though, `PASSWORD` is\
    \ probably more trouble than it's worth. The point of `PASSWORD` fields, at least\
    \ on desktop machines, is to keep someone walking past your computer screen from\
    \ seeing your secret password. For every character you enter, the password field\
    \ shows an asterisk or some other symbol. As you type your secret password, all\
    \ that shows up on the screen is a line of asterisks. On mobile phones and other\
    \ small devices, this is less of a concern because the screens are smaller and\
    \ much more difficult to read than a typical desktop monitor.\n\nFurthermore,\
    \ the difficulty of entering data on a small device means that it will be hard\
    \ to correctly enter passwords if you are typing blind. Mobile phones, for example,\
    \ typically require you to press keys several times to enter a single letter.\
    \ On Sun's toolkit emulator, pressing the `'7'` key twice enters the letter `'Q'`.\
    \ On a real device, you would have to enter a password `\"gandalf\"` with the\
    \ following sequence of key presses: `4`, `2`, `6`, `6`, `3`, `2`, `5`, `5`, `5`,\
    \ `3`, `3`, `3`. Without visual feedback, it would be extremely easy to make a\
    \ mistake when entering a password. (\"Did I press the `5` key two times or three\
    \ times?\") The J2ME Wireless Toolkit emulator shows the current character but\
    \ previously typed characters are shown as asterisks. Good passwords typically\
    \ have mixed case, numbers, and possibly punctuation; these would be hard to enter\
    \ correctly.\n\nIn MIDP 2.0 applications, password fields (whether or not they\
    \ use the `PASSWORD` flag) should be protected with the `SENSITIVE` flag so that\
    \ the password doesn't show up in any system dictionaries or pop up unexpectedly\
    \ when the user is entering other text.\n\nMIDP 2.0 includes a single new method\
    \ in the `TextBox` class called `setInitialInputMode(String characterSubset)`.\
    \ This method is used to suggest to the implementation what input mode would be\
    \ best suited to the expected text. You can only suggest the input mode, and you\
    \ have no way of knowing whether the implementation has honored the request. The\
    \ string passed to the method can be one of the constants from the J2SE `java.lang.Character.UnicodeBlock`\
    \ class, prepended with `\"UCB_\"`. For example, you might pass `\"UCB_BASIC_LATIN\"\
    ` or `\"UCB_KATAKANA\"` to this method. You can also use input subsets defined\
    \ by `java.awt.im.InputSubset` by prepending them with `\"IS_\"`. For example,\
    \ `\"IS_LATIN\"` or `\"IS_KANJI\"` would be valid. Finally, MIDP 2.0 also defines\
    \ the character subsets `\"MIDP_UPPERCASE_LATIN\"` and `\"MIDP_LOWERCASE_LATIN\"\
    `.\n\nThe input mode is complementary to the text constraints and flags. You might\
    \ specify `ANY` for the constraints, then call `setInitialInputMode(\"MIDP_LOWERCASE_LATIN\"\
    )` to request that the implementation begin by allowing lowercase input. This\
    \ doesn't prevent the user from changing the input mode, it just starts things\
    \ off on the right foot."
