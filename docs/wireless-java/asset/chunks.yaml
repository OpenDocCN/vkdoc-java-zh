  trans: '

    ## 碎片化问题


    平台碎片化是 MIDP 社区中一个严重的问题。许多实现 MIDP 1.0 的设备也包含设备特定的 API。这些 API 用于访问设备特定功能，或提供 MIDP
    1.0 的“最小公分母”规范中未涉及的功能。当前的软件供应商，尤其是游戏开发商，有时会创建并分发同一应用的多个版本，每个版本都针对特定平台量身定制。这显然是一个问题：最初使用
    MIDP 的部分意义就在于能够编写一套代码并在多个平台上部署。


    我不会假装知道这场“戏剧”将如何收场。我相信 MIDP 2.0 解决了 MIDP 1.0 的许多（甚至可能是全部）缺陷。它的时机很好，因此 MIDP 2.0
    设备的采用和部署可能会为无线开发提供一个标准、统一的平台。


    另一个碎片化问题在于，将配置、简表和可选 API 组合成软件栈时存在混乱。作为开发者，你希望确切了解哪些 API 可用或可能可用，但似乎有太多的选择和可能性。JSR
    185（[`jcp.org/jsr/detail/185.jsp`](http://jcp.org/jsr/detail/185.jsp)）旨在为这一问题带来清晰度。


    ## 总结


    J2ME 是面向小型设备的 Java 平台，这是一个涵盖几乎所有比面包盒还小的设备的广阔领域。由于 J2ME 横跨如此多样化的硬件，它被划分为配置、简表和可选
    API。配置规定了 J2SE 功能的一个子集以及 JVM 的行为，而简表通常更具体地针对具有相似特性的设备系列。可选 API 以灵活的包形式提供附加功能。移动信息设备简表（本书的重点）包含了面向手机和双向寻呼机等设备的
    API。


    # 第 2 章：构建 MIDlet


    ## 概述


    MIDP 应用被别致地称为 MIDlet，这是延续了由 *applet* 和 *servlet* 开始的命名主题。对于有一定经验的 Java 程序员来说，编写
    MIDlet 相对容易。毕竟，编程语言仍然是 Java。此外，来自 java.lang 和 java.io 的许多基础 API 在 MIDP 中与在 J2SE
    中基本相同。学习新的 API（位于 javax.microedition 层次结构中）并不十分困难，正如你将在本书后续内容中看到的那样。


    然而，实际的开发过程对于 MIDlet 来说比 J2SE 应用要稍微复杂一些。除了基本的编译和运行周期外，MIDlet 还需要一些额外的调整和打包。完整的构建周期如下所示：


    编辑源代码 > 编译 > 预校验 > 打包 > 测试或部署


    为了展示工作原理，并让你初步体验 MIDlet 开发，本章专门用于构建和运行一个简单的 MIDlet。在后续章节中，我们将深入探讨 MIDP API 的细节。在本章中，你将了解
    MIDlet 开发的整体概况。


    ## 工具准备


    MIDlet 是在常规桌面计算机上开发的，尽管 MIDlet 本身是为在小型设备上运行而设计的。要开发 MIDlet，你需要某种开发工具包，无论是来自 Sun
    还是其他供应商。请记住，MIDP 只是一个规范；供应商可以自由开发自己的实现。


    如果你知道去哪里找，世界上充满了 MIDlet 开发工具。此外，其中许多工具是免费提供的。


    最基本的工具集是 Sun 的 MIDP 参考实现。这包括预校验工具（稍后会详细介绍）、MIDP 设备模拟器、源代码和文档。你可以通过 [`java.sun.com/products/midp/`](http://java.sun.com/products/midp/)
    上的链接下载 MIDP 参考实现。但是，我不建议使用参考实现，除非你真的很喜欢处理构建和打包 MIDlet 的繁琐细节。（如果你有兴趣将 MIDP 运行时移植到新设备或平台，也应该研究一下参考实现。）


    对于初学者来说，一个更好的工具是 Sun 的 J2ME Wireless Toolkit，可从 [`java.sun.com/products/j2mewtoolkit/`](http://java.sun.com/products/j2mewtoolkit/)
    获取。J2ME Wireless Toolkit（或亲切地称为 J2MEWTK）包含一个 GUI 工具，可以自动处理构建和打包 MIDlet 的一些繁琐细节，提供从源代码到运行
    MIDlet 的简单路径。同时，J2ME Wireless Toolkit 是一个相对轻量级的解决方案，几乎是一个微型 IDE，不会让你的机器不堪重负。


    更大的 IDE 也大量存在，来自设备制造商、无线运营商和 IDE 供应商，包括以下这些：


    *   Borland JBuilder MobileSet：[`www.borland.com/jbuilder/mobileset/`](http://www.borland.com/jbuilder/mobileset/)

    *   IBM WebSphere Studio Device Developer：[`www-3.ibm.com/software/pervasive/products/wsdd/`](http://www-3.ibm.com/software/pervasive/products/wsdd/)

    *   Metrowerks CodeWarrior Wireless Studio：[`www.metrowerks.com/MW/Develop/Wireless/Wireless_Studio/default.htm`](http://www.metrowerks.com/MW/Develop/Wireless/Wireless_Studio/default.htm)

    *   Research In Motion BlackBerry Java Development Environment：[`www.blackberry.net/developers/na/java/start/download.shtml`](http://www.blackberry.net/developers/na/java/start/download.shtml)

    *   Sun ONE Studio, Mobile Edition：[`wwws.sun.com/software/sundev/jde/features/me-features.html`](http://wwws.sun.com/software/sundev/jde/features/me-features.html)

    *   Zucotto Wireless WHITEboard SDK：[`www.zucotto.com/products/wb/whiteboard.html`](http://www.zucotto.com/products/wb/whiteboard.html)


    你可以使用任何你想要的开发工具包。我建议你从 J2ME Wireless Toolkit 开始，它易于使用且具有权威性。在本书的其余部分，我将使用 J2ME
    Wireless Toolkit。其他开发环境通常也会将 J2ME Wireless Toolkit 作为插件使用，因此无论你使用什么工具，你的体验可能都相似。在本章中，你会最明显地感受到开发环境的细节，我将详细介绍构建工具和模拟器。在本书的大部分后续内容中，我将描述
    MIDP API，因此你使用哪个开发工具包实际上并不重要。

    '
- fmt: "# Creating Source Code\n\nWriting Java source code is the same as it always\
    \ was: use your favorite text editor to create a source file with a `.java` extension.\
    \ The example we'll build and run is `Jargoneer`, a MIDlet that looks up words\
    \ in the Jargon File. The Jargon File is a comprehensive lexicon of hacker slang\
    \ (find out more by visiting [http://www.tuxedo.org/~esr/jargon/](http://www.tuxedo.org/~esr/jargon/)).\n\
    \nWhen you enter a word into `Jargoneer`, it connects to a server to find the\
    \ definition. Running this MIDlet will allow you to appear cool in the company\
    \ of your hacker friends. When someone uses an unfamiliar word, like \"cruft\"\
    \ or \"grok,\" you can surreptitiously key the word into your mobile phone and\
    \ see a definition in a few seconds.\n\n`Jargoneer`'s source code is provided\
    \ in [Listing 2-1](#LiB0014.html#ch02list01). If you don't want to type it in,\
    \ you can download all of the code examples in this book from the Downloads page\
    \ at [http://www.apress.com](http://www.apress.com).\n\n**Listing 2-1:** `Jargoneer`'s\
    \ Source Code\n\n```\nimport java.io.*;\n\nimport javax.microedition.io.*;\nimport\
    \ javax.microedition.midlet.*;\nimport javax.microedition.lcdui.*;\n\npublic class\
    \ Jargoneer extends MIDlet\n    implements CommandListener, Runnable {\n  private\
    \ Display mDisplay;\n\nprivate Command mExitCommand, mFindCommand, mCancelCommand;\n\
    \nprivate TextBox mSubmitBox;\n  private Form mProgressForm;\n  private StringItem\
    \ mProgressString;\n\npublic Jargoneer() {\n    mExitCommand = new Command(\"\
    Exit\", Command.EXIT, 0);\n    mFindCommand = new Command(\"Find\", Command.SCREEN,\
    \ 0);\n    mCancelCommand = new Command(\"Cancel\", Command.CANCEL, 0);\n\nmSubmitBox\
    \ = new TextBox(\"Jargoneer\", \"\", 32, 0);\n    mSubmitBox.addCommand(mExitCommand);\n\
    \    mSubmitBox.addCommand(mFindCommand);\n    mSubmitBox.setCommandListener(this);\n\
    \    mProgressForm = new Form(\"Lookup progress\");\n    mProgressString = new\
    \ StringItem(null, null);\n    mProgressForm.append(mProgressString);\n  }\n\n\
    public void startApp() {\n    mDisplay = Display.getDisplay(this);\n\nmDisplay.setCurrent(mSubmitBox);\n\
    \  }\n\npublic void pauseApp() {}\n\npublic void destroyApp(boolean unconditional)\
    \ {}\n\npublic void commandAction(Command c, Displayable s) {\n    if (c == mExitCommand)\
    \ {\n      destroyApp(false);\n      notifyDestroyed();\n    }\n    else if (c\
    \ == mFindCommand) {\n      // Show the progress form.\n      mDisplay.setCurrent(mProgressForm);\n\
    \      // Kick off the thread to do the query.\n      Thread t = new Thread(this);\n\
    \      t.start();\n    }\n  }\n\npublic void run() {\n    String word = mSubmitBox.getString();\n\
    \    String definition;\n\ntry { definition = lookUp(word); }\n    catch (IOException\
    \ ioe) {\n      Alert report = new Alert(\n          \"Sorry\",\n          \"\
    Something went wrong and that \" +\n          \"definition could not be retrieved.\"\
    ,\n          null, null);\n      report.setTimeout(Alert.FOREVER);\n      mDisplay.setCurrent(report,\
    \ mSubmitBox);\n      return;\n    }\n    Alert results = new Alert(\"Definition\"\
    , definition,\n        null, null);\n    results.setTimeout(Alert.FOREVER);\n\
    \    mDisplay.setCurrent(results, mSubmitBox);\n  }\n\nprivate String lookUp(String\
    \ word) throws IOException {\n    HttpConnection hc = null;\n    InputStream in\
    \ = null;\n    String definition = null;\n\ntry {\n      String baseURL = \"http://65.215.221.148:8080/wj2/jargoneer?word=\"\
    ;\n      String url = baseURL + word;\n      mProgressString.setText(\"Connecting...\"\
    );\n      hc = (HttpConnection)Connector.open(url);\n      hc.setRequestProperty(\"\
    Connection\", \"close\");\n      in = hc.openInputStream();\n\nmProgressString.setText(\"\
    Reading...\");\n      int contentLength = (int)hc.getLength();\n      if (contentLength\
    \ == -1) contentLength = 255;\n      byte[] raw = new byte[contentLength];\n \
    \     int length = in.read(raw);\n\n// Clean up.\n      in.close();\n      hc.close();\n\
    \ndefinition = new String(raw, 0, length);\n    }\n    finally {\n      try {\n\
    \        if (in != null) in.close();\n        if (hc != null) hc.close();\n  \
    \    }\n      catch (IOException ignored) {}\n    }\n\nreturn definition;\n  }\
    \ \n```\n\n# Compiling a MIDlet\n\nWriting MIDlets is an example of cross-compiling,\
    \ where you compile code on one platform and run it on another. In this case,\
    \ you'll be compiling a MIDlet using J2SE on your desktop computer. The MIDlet\
    \ itself will run on a mobile phone, pager, or other mobile information device\
    \ that supports MIDP.\n\nThe J2ME Wireless Toolkit takes care of the details as\
    \ long as you put the source code in the right directory.\n\n1. Start the toolkit,\
    \ called `KToolbar`.\n2. Choose **New Project...** from the toolbar to create\
    \ a new project.\n3. When the J2ME Wireless Toolkit asks you for the name of the\
    \ project and the MIDlet class name, use \"Jargoneer\" for both.\n4. Click **OK**\
    \ twice to dismiss the project settings window.\n\n[Figure 2-1](#LiB0015.html#ch02fig01)\
    \ shows the New Project dialog.\n\n[![Click To expand](fig36_01.jpg)](fig36_01_0.jpg)\n\
    **Figure 2-1:** Creating a new project with the J2ME Wireless Toolkit\n\nThe J2ME\
    \ Wireless Toolkit represents projects as subdirectories of its `apps` directory.\
    \ The following diagram shows the contents of the `Jargoneer` directory after\
    \ the new project is created.\n\n![](fig37_01.jpg)\n\nSave the source code as\
    \ `Jargoneer.java` in the project's `src` directory. You can simply click the\
    \ **Build** button in the J2ME Wireless Toolkit tool bar to compile the open project.\n\
    \nBehind the scenes, the J2ME Wireless Toolkit uses J2SE's compiler. Normally,\
    \ when you're compiling J2SE source code, the `CLASSPATH` environment variable\
    \ points to all the classes that your source code needs to know about. When you\
    \ use `javac` to compile a file, there are some implied APIs that get included,\
    \ like the classes in `java.lang`. With MIDlets, however, the situation is a little\
    \ more complicated. Say that you use the `java.lang.System` class in your MIDlet.\
    \ How do you (or how does the J2ME Wireless Toolkit) let the compiler know that\
    \ you want to use the MIDP version of this class, not the J2SE version?\n\nThe\
    \ answer is a command line option, `-bootclasspath`. This option lets you point\
    \ to a classpath that describes the fundamental APIs against which you will be\
    \ compiling your source code. In our case, this option should be used to specify\
    \ the `classes` directory in the MIDP reference implementation installation. If\
    \ you install the MIDP reference implementation, the command line looks like this:\n\
    \n```\njavac -bootclasspath \\midp\\classes Jargoneer.java\n```\n\nYou will need\
    \ to adjust the path to `classes` if you installed the MIDP reference implementation\
    \ in a different location."
  raw: "## Creating Source Code\n\nWriting Java source code is the same as it always\
    \ was: use your favorite text editor to create a source file with a *.java* extension.\
    \ The example we'll build and run is Jargoneer, a MIDlet that looks up words in\
    \ the Jargon File. The Jargon File is a comprehensive lexicon of hacker slang\
    \ (find out more by visiting [http://www.tuxedo.org/~esr/jargon/](http://www.tuxedo.org/~esr/jargon/)).\n\
    \nWhen you enter a word into Jargoneer, it connects to a server to find the definition.\
    \ Running this MIDlet will allow you to appear cool in the company of your hacker\
    \ friends. When someone uses an unfamiliar word, like \"cruft\" or \"grok,\" you\
    \ can surreptitiously key the word into your mobile phone and see a definition\
    \ in a few seconds.\n\nJargoneer's source code is provided in [Listing 2-1](#LiB0014.html#ch02list01).\
    \ If you don't want to type it in, you can download all of the code examples in\
    \ this book from the Downloads page at [http://www.apress.com](http://www.apress.com).\n\
    \nListing 2-1: *Jargoneer*'s Source Code\n\n| **![Start example](_1.gif)** |\n\
    \n```\nimport java.io.*;\n\nimport javax.microedition.io.*;\nimport javax.microedition.midlet.*;\n\
    import javax.microedition.lcdui.*;\n\npublic class Jargoneer extends MIDlet\n\
    \    implements CommandListener, Runnable {\n  private Display mDisplay;\n\nprivate\
    \ Command mExitCommand, mFindCommand, mCancelCommand;\n\nprivate TextBox mSubmitBox;\n\
    \  private Form mProgressForm;\n  private StringItem mProgressString;\n\npublic\
    \ Jargoneer() {\n    mExitCommand = new Command(\"Exit\", Command.EXIT, 0);\n\
    \    mFindCommand = new Command(\"Find\", Command.SCREEN, 0);\n    mCancelCommand\
    \ = new Command(\"Cancel\", Command.CANCEL, 0);\n\nmSubmitBox = new TextBox(\"\
    Jargoneer\", \"\", 32, 0);\n    mSubmitBox.addCommand(mExitCommand);\n    mSubmitBox.addCommand(mFindCommand);\n\
    \    mSubmitBox.setCommandListener(this);\n    mProgressForm = new Form(\"Lookup\
    \ progress\");\n    mProgressString = new StringItem(null, null);\n    mProgressForm.append(mProgressString);\n\
    \  }\n\npublic void startApp() {\n    mDisplay = Display.getDisplay(this);\n\n\
    mDisplay.setCurrent(mSubmitBox);\n  }\n\npublic void pauseApp() {}\n\npublic void\
    \ destroyApp(boolean unconditional) {}\n\npublic void commandAction(Command c,\
    \ Displayable s) {\n    if (c == mExitCommand) {\n      destroyApp(false);\n \
    \     notifyDestroyed();\n    }\n    else if (c == mFindCommand) {\n      // Show\
    \ the progress form.\n      mDisplay.setCurrent(mProgressForm);\n      // Kick\
    \ off the thread to do the query.\n      Thread t = new Thread(this);\n      t.start();\n\
    \    }\n  }\n\npublic void run() {\n    String word = mSubmitBox.getString();\n\
    \    String definition;\n\ntry { definition = lookUp(word); }\n    catch (IOException\
    \ ioe) {\n      Alert report = new Alert(\n          \"Sorry\",\n          \"\
    Something went wrong and that \" +\n          \"definition could not be retrieved.\"\
    ,\n          null, null);\n      report.setTimeout(Alert.FOREVER);\n      mDisplay.setCurrent(report,\
    \ mSubmitBox);\n      return;\n    }\n    Alert results = new Alert(\"Definition\"\
    , definition,\n        null, null);\n    results.setTimeout(Alert.FOREVER);\n\
    \    mDisplay.setCurrent(results, mSubmitBox);\n  }\n\nprivate String lookUp(String\
    \ word) throws IOException {\n    HttpConnection hc = null;\n    InputStream in\
    \ = null;\n    String definition = null;\n\ntry {\n      String baseURL = \"http://65.215.221.148:8080/wj2/jargoneer?word=\"\
    ;\n      String url = baseURL + word;\n      mProgressString.setText(\"Connecting...\"\
    );\n      hc = (HttpConnection)Connector.open(url);\n      hc.setRequestProperty(\"\
    Connection\", \"close\");\n      in = hc.openInputStream();\n\nmProgressString.setText(\"\
    Reading...\");\n      int contentLength = (int)hc.getLength();\n      if (contentLength\
    \ == -1) contentLength = 255;\n      byte[] raw = new byte[contentLength];\n \
    \     int length = in.read(raw);\n\n// Clean up.\n      in.close();\n      hc.close();\n\
    \ndefinition = new String(raw, 0, length);\n    }\n    finally {\n      try {\n\
    \        if (in != null) in.close();\n        if (hc != null) hc.close();\n  \
    \    }\n      catch (IOException ignored) {}\n    }\n\nreturn definition;\n  }\
    \ \n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\n## Compiling a MIDlet\n\n\
    Writing MIDlets is an example of cross-compiling, where you compile code on one\
    \ platform and run it on another. In this case, you'll be compiling a MIDlet using\
    \ J2SE on your desktop computer. The MIDlet itself will run on a mobile phone,\
    \ pager, or other mobile information device that supports MIDP.\n\nThe J2ME Wireless\
    \ Toolkit takes care of the details as long as you put the source code in the\
    \ right directory.\n\n1.  Start the toolkit, called KToolbar.\n\n2.  Choose **New\
    \ Project...** from the toolbar to create a new project.\n\n3.  When the J2ME\
    \ Wireless Toolkit asks you for the name of the project and the MIDlet class name,\
    \ use \"Jargoneer\" for both.\n\n4.  Click **OK** twice to dismiss the project\
    \ settings window.\n\n[Figure 2-1](#LiB0015.html#ch02fig01) shows the New Project\
    \ dialog.\n\n[![Click To expand](fig36_01.jpg)](fig36_01_0.jpg)\nFigure 2-1: Creating\
    \ a new project with the J2ME Wireless Toolkit\n\nThe J2ME Wireless Toolkit represents\
    \ projects as subdirectories of its *apps* directory. The following diagram shows\
    \ the contents of the *Jargoneer* directory after the new project is created.\n\
    \n![](fig37_01.jpg)\n\nSave the source code as Jargoneer.java in the project's\
    \ *src* directory. You can simply click the **Build** button in the J2ME Wireless\
    \ Toolkit tool bar to compile the open project.\n\nBehind the scenes, the J2ME\
    \ Wireless Toolkit uses J2SE's compiler. Normally, when you're compiling J2SE\
    \ source code, the CLASSPATH environment variable points to all the classes that\
    \ your source code needs to know about. When you use javac to compile a file,\
    \ there are some implied APIs that get included, like the classes in java.lang.\
    \ With MIDlets, however, the situation is a little more complicated. Say that\
    \ you use the java.lang.System class in your MIDlet. How do you (or how does the\
    \ J2ME Wireless Toolkit) let the compiler know that you want to use the MIDP version\
    \ of this class, not the J2SE version?\n\nThe answer is a command line option,\
    \ -bootclasspath. This option lets you point to a classpath that describes the\
    \ fundamental APIs against which you will be compiling your source code. In our\
    \ case, this option should be used to specify the *classes* directory in the MIDP\
    \ reference implementation installation. If you install the MIDP reference implementation,\
    \ the command line looks like this:\n\n```\njavac -bootclasspath \\midp\\classes\
    \ Jargoneer.java\n```\n\nYou will need to adjust the path to *classes* if you\
    \ installed the MIDP reference implementation in a different location."
  trans: "\n## 创建源代码\n\n编写 Java 源代码的方式一如既往：使用你喜欢的文本编辑器创建一个扩展名为 *.java* 的源文件。我们将构建并运行的示例是\
    \ Jargoneer，这是一个用于在 Jargon 文件中查找单词的 MIDlet。Jargon 文件是一本全面的黑客俚语词典（更多信息请访问 [`www.tuxedo.org/~esr/jargon/`](http://www.tuxedo.org/~esr/jargon/)）。\n\
    \n当你在 Jargoneer 中输入一个单词时，它会连接到一个服务器来查找定义。运行这个 MIDlet 可以让你在黑客朋友面前显得很酷。当有人使用一个不熟悉的词，比如\
    \ \"cruft\" 或 \"grok\" 时，你可以偷偷地把这个词输入你的手机，几秒钟后就能看到定义。\n\nJargoneer 的源代码在清单 2-1\
    \ 中提供。如果你不想手动输入，可以从 [`www.apress.com`](http://www.apress.com) 的下载页面下载本书中的所有代码示例。\n\
    \n清单 2-1：*Jargoneer* 的源代码\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport java.io.*;\n\
