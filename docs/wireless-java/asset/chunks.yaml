    \ IOException {\n    String name = request.getParameter(\"name\");\n\nString message\
    \ = \"Received name: '\" + name + \"'\";\n    response.setContentType(\"text/plain\"\
    );\n    response.setContentLength(message.length());\n    PrintWriter out = response.getWriter();\n\
    \    out.println(message);\n  }\n}\n```\n\n| **![End example](_1.gif)** |\n\n\
    |  |\n\n## Using Cookies for Session Tracking\n\nHTTP is a stateless protocol,\
    \ which means that each request and response pair is a separate conversation.\
    \ Sometimes, though, you want the server to remember who you are. This can be\
    \ done with a *session*. On the server side, a session is just a collection of\
    \ information. When the client sends an HTTP request to the server, it includes\
    \ a session ID as part of the request. The server can then look up the corresponding\
    \ session and have some idea of the identity (or at least the state) of the client.\n\
    \nThe most common way to store a session ID on the client side is using HTTP *cookies*.\
    \ A cookie is just a little piece of data that is passed from the server to the\
    \ client in an HTTP response. Most web browsers automatically store cookies and\
    \ will send them back to the appropriate server when a new request is made.\n\n\
    In the MIDP world, of course, there's no web browser taking care of cookies for\
    \ you. You have to do it yourself. Fortunately, it's not very complicated.\n\n\
    Network code that maintains a server session ID needs to do two things:\n\n1.\
    \  When receiving a response from a server, check for a cookie. If there is a\
    \ cookie present, save it away for later (perhaps in a member variable). A cookie\
    \ is just another HTTP response header line. You can check for a cookie by calling\
    \ getHeaderField() on an HttpConnection object after the request has been sent.\n\
    \n2.  When sending a request to the server, send the session ID cookie if it has\
    \ been previously received. Again, sending a cookie to the server is just a matter\
    \ of putting it in the request headers, using HttpConnection's setRequestProperty()\
    \ method.\n\nEach time you send a request to the server, you will be sending a\
    \ session ID as a request header. The server uses this session ID to look up a\
    \ session object that can be used, server side, to do useful stuff like retrieve\
    \ preferences or maintain a shopping cart.\n\nIt's not hard to implement this\
    \ behavior in a MIDlet. If you have a session ID cookie handy, you should send\
    \ it when you open up an HTTP connection to the same server, like this:\n\n```\n\
    HttpConnection hc = (HttpConnection)Connector.open(url);\nif (mSession != null)\n\
    \    hc.setRequestProperty(\"cookie\", mSession);\n```\n\nThis code assumes you\
    \ have a session ID cookie saved away in the mSession member variable. The first\
    \ time you contact the server, of course, you won't have a session ID cookie.\n\
    \nLater, when you receive a response from an HTTP request, look for a cookie.\
    \ If you find one, parse out the session ID and save it away, like this:\n\n```\n\
    InputStream in = hc.openInputStream();\n\nString cookie = hc.getHeaderField(\"\
    Set-cookie\");\nif (cookie != null) {\n  int semicolon = cookie.indexOf(';');\n\
    \  mSession = cookie.substring(0, semicolon);\n} \n```\n\nThe cookie string needs\
    \ to be parsed because it comes in two pieces. The first piece is a path that\
    \ can be used to determine when the cookie should be sent back to the server.\
    \ The second part contains the session ID—that's the part we parse out and save.\n\
    \nFor more information on the different parts of a cookie string and how they\
    \ are used, see [http://www.ietf.org/rfc/rfc2965.txt](http://www.ietf.org/rfc/rfc2965.txt)\
    \ and [http://www.ietf.org/rfc/rfc2109.txt](http://www.ietf.org/rfc/rfc2109.txt).\n\
    \n[Listing 9-4](#LiB0067.html#ch09list04) shows a class, CookieMIDlet, that uses\
    \ this technique to maintain a session with a server. It has a very bland user\
    \ interface—just an empty Form with two commands. If you invoke the **Send** command,\
    \ the MIDlet sends an HTTP request and receives a response using the cookie handling\
    \ described earlier.\n\nListing 9-4: Saving a Server Session ID Cookie\n\n| **![Start\
    \ example](_1.gif)** |\n\n```\nimport java.io.*;\n\nimport javax.microedition.io.*;\n\
    import javax.microedition.midlet.*;\nimport javax.microedition.lcdui.*;\n\npublic\
    \ class CookieMIDlet\n    extends MIDlet\n    implements CommandListener, Runnable\
    \ {\n  private Display mDisplay;\n  private Form mForm;\n\nprivate String mSession;"
  trans: "\npublic class PostServlet extends HttpServlet {\n  public void doPost(HttpServletRequest\
    \ request,\n      HttpServletResponse response)\n      throws ServletException,\
    \ IOException {\n    String name = request.getParameter(\"name\");\n\nString message\
    \ = \"Received name: '\" + name + \"'\";\n    response.setContentType(\"text/plain\"\
    );\n    response.setContentLength(message.length());\n    PrintWriter out = response.getWriter();\n\
    \    out.println(message);\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\
    \n## 使用 Cookie 进行会话跟踪\n\nHTTP 是一种无状态协议，这意味着每个请求和响应对都是独立的对话。但有时，您希望服务器能够记住您的身份。这可以通过*会话*来实现。在服务器端，会话只是一组信息的集合。当客户端向服务器发送\
    \ HTTP 请求时，它会在请求中包含一个会话 ID。然后，服务器可以查找相应的会话，从而大致了解客户端的身份（或至少是状态）。\n\n在客户端存储会话 ID\
    \ 最常见的方法是使用 HTTP *Cookie*。Cookie 只是服务器在 HTTP 响应中传递给客户端的一小段数据。大多数 Web 浏览器会自动存储\
    \ Cookie，并在发出新请求时将它们发送回相应的服务器。\n\n当然，在 MIDP 世界中，没有 Web 浏览器为您处理 Cookie。您必须自己动手。幸运的是，这并不复杂。\n\
    \n维护服务器会话 ID 的网络代码需要做两件事：\n\n1.  当从服务器接收响应时，检查是否存在 Cookie。如果存在 Cookie，则将其保存起来以备后用（例如保存在成员变量中）。Cookie\
    \ 只是另一个 HTTP 响应头行。您可以在发送请求后，通过调用 `HttpConnection` 对象上的 `getHeaderField()` 方法来检查\
    \ Cookie。\n\n2.  当向服务器发送请求时，如果之前已收到会话 ID Cookie，则将其发送出去。同样，向服务器发送 Cookie 只需使用\
    \ `HttpConnection` 的 `setRequestProperty()` 方法将其放入请求头中即可。\n\n每次向服务器发送请求时，您都会将会话\
    \ ID 作为请求头发送出去。服务器使用此会话 ID 来查找一个会话对象，该对象可在服务器端用于执行有用的操作，例如检索偏好设置或维护购物车。\n\n在 MIDlet\
    \ 中实现此行为并不困难。如果您手头有会话 ID Cookie，则在打开到同一服务器的 HTTP 连接时应将其发送出去，如下所示：\n\n```\nHttpConnection\
    \ hc = (HttpConnection)Connector.open(url);\nif (mSession != null)\n    hc.setRequestProperty(\"\
    cookie\", mSession);\n```\n\n此代码假设您已将会话 ID Cookie 保存在 `mSession` 成员变量中。当然，第一次联系服务器时，您还没有会话\
    \ ID Cookie。\n\n稍后，当您收到来自 HTTP 请求的响应时，查找 Cookie。如果找到，则解析出会话 ID 并将其保存起来，如下所示：\n\
    \n```\nInputStream in = hc.openInputStream();\n\nString cookie = hc.getHeaderField(\"\
    Set-cookie\");\nif (cookie != null) {\n  int semicolon = cookie.indexOf(';');\n\
    \  mSession = cookie.substring(0, semicolon);\n} \n```\n\n需要解析 Cookie 字符串，因为它由两部分组成。第一部分是一个路径，可用于确定何时应将\
    \ Cookie 发送回服务器。第二部分包含会话 ID——这就是我们解析并保存的部分。\n\n有关 Cookie 字符串不同部分及其使用方式的更多信息，请参阅\
    \ [`www.ietf.org/rfc/rfc2965.txt`](http://www.ietf.org/rfc/rfc2965.txt) 和 [`www.ietf.org/rfc/rfc2109.txt`](http://www.ietf.org/rfc/rfc2109.txt)。\n\
    \n清单 9-4 展示了一个名为 `CookieMIDlet` 的类，它使用此技术与服务器保持会话。它的用户界面非常简单——只是一个带有两个命令的空表单。如果您调用\
    \ **Send** 命令，MIDlet 会发送一个 HTTP 请求，并使用前面描述的 Cookie 处理方式接收响应。\n\n清单 9-4：保存服务器会话\
    \ ID Cookie\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport java.io.*;\n\nimport\
    \ javax.microedition.io.*;\nimport javax.microedition.midlet.*;\nimport javax.microedition.lcdui.*;\n\
    \npublic class CookieMIDlet\n    extends MIDlet\n    implements CommandListener,\
    \ Runnable {\n  private Display mDisplay;\n  private Form mForm;\n\nprivate String\
    \ mSession;\n"
- fmt: "```java\npublic void startApp() {\n    mDisplay = Display.getDisplay(this);\n\
    \nif (mForm == null) {\n      mForm = new Form(\"CookieMIDlet\");\n\nmForm.addCommand(new\
    \ Command(\"Exit\", Command.EXIT, 0));\n      mForm.addCommand(new Command(\"\
    Send\", Command.SCREEN, 0));\n      mForm.setCommandListener(this);\n    }\n\n\
    mDisplay.setCurrent(mForm);\n  }\n  public void pauseApp() {}\n\npublic void destroyApp(boolean\
    \ unconditional) {}\n\npublic void commandAction(Command c, Displayable s) {\n\
    \    if (c.getCommandType() == Command.EXIT) notifyDestroyed();\n    else {\n\
    \      Form waitForm = new Form(\"Connecting...\");\n      mDisplay.setCurrent(waitForm);\n\
    \      Thread t = new Thread(this);\n      t.start();\n    }\n  }\n\npublic void\
    \ run() {\n    String url = getAppProperty(\"CookieMIDlet-URL\");\n\ntry {\n \
    \     // Query the server and retrieve the response.\n      HttpConnection hc\
    \ = (HttpConnection)Connector.open(url);\n      if (mSession != null)\n      \
    \  hc.setRequestProperty(\"cookie\", mSession);\n      InputStream in = hc.openInputStream();\n\
    \nString cookie = hc.getHeaderField(\"Set-cookie\");\n      if (cookie != null)\
    \ {\n        int semicolon = cookie.indexOf(';');\n        mSession = cookie.substring(0,\
    \ semicolon);\n      }\n\nint length = (int)hc.getLength();\n      byte[] raw\
    \ = new byte[length];\n      in.read(raw);\n\nString s = new String(raw);\n  \
    \    Alert a = new Alert(\"Response\", s, null, null);\n      a.setTimeout(Alert.FOREVER);\n\
    \      mDisplay.setCurrent(a, mForm);\n\nin.close();\n      hc.close();\n    }\n\
    \    catch (IOException ioe) {\n      Alert a = new Alert(\"Exception\", ioe.toString(),\
    \ null, null);\n      a.setTimeout(Alert.FOREVER);\n      mDisplay.setCurrent(a,\
    \ mForm);\n    }\n  }\n}\n```\n\nOn the server side, things are much simpler,\
    \ as you'll see in [Listing 9-5](#LiB0067.html#ch09list05). If you're writing\
    \ Java servlets, you don't even have to worry about cookies. Instead, you just\
    \ deal with an `HttpSession` object. The code that follows shows a servlet that\
    \ interacts with `CookieMIDlet`; it implements a session-based hit counter. It's\
    \ been tested on Tomcat 4.0 but should work fine on other servers. Note that you\
    \ will have to map the URL used by the MIDlet to this servlet class; for details,\
    \ see an introductory book on servlets or your server's documentation.\n\n**Listing\
    \ 9-5: A Simple Session Handling Servlet**\n\n```java\nimport javax.servlet.http.*;\n\
    import javax.servlet.*;\nimport java.io.*;\nimport java.util.*;\n\npublic class\
    \ CookieServlet extends HttpServlet {\n  private Map mHitMap = new HashMap();\n\
    \npublic void doGet(HttpServletRequest request,\n      HttpServletResponse response)\n\
    \      throws ServletException, IOException {\n    HttpSession session = request.getSession();\n\
    \nString id = session.getId();\n\nint hits = -1;\n\n// Try to retrieve the hits\
    \ from the map.\n    Integer hitsInteger = (Integer)mHitMap.get(id);\n    if (hitsInteger\
    \ != null)\n      hits = hitsInteger.intValue();\n\n// Increment and store.\n\
    \    hits++;\n    mHitMap.put(id, new Integer(hits));\n    String message = \"\
    Hits for this session: \" + hits + \".\";\n\nresponse.setContentType(\"text/plain\"\
    );\n    response.setContentLength(message.length());\n    PrintWriter out = response.getWriter();\n\
    \    out.println(message);\n  }\n}\n```\n\nThe servlet retrieves the `HttpSession`\
    \ object. Then it pulls out the session ID and uses it as a key into a map of\
    \ hit counts. After retrieving and incrementing the hit count for the session,\
    \ the servlet sends it as the response back to the MIDlet. You can start up multiple\
    \ copies of the emulator and run them simultaneously to see how the hit counts\
    \ are independent of each other and associated with each session.\n\n## Design\
    \ Tips\n\nThis section contains some suggestions about creating networked MIDlets.\n\
    \n*   Use GET rather than POST. It's simpler, and you won't have to worry about\
    \ fiddling around with the request headers.\n*   Don't hard-code URLs. Put them\
    \ in a MIDlet property in the application descriptor. This will make it possible\
    \ to change the URL without recompiling your code.\n*   Put network access in\
    \ a separate thread. Network access always takes time; it shouldn't hold up the\
    \ user interface. Furthermore, you must let your users know what's going on. Put\
    \ up a \"loading progress\" type of message or some kind of indication that your\
    \ application is trying to access a network resource.\n*   Make sure you handle\
    \ exceptions gracefully. Network connections on wireless devices are not tremendously\
    \ reliable, so you should make sure you're prepared for the worst. Catch all your\
    \ exceptions and do something reasonable.\n*   Clean up after yourself. On a small\
    \ device, resources are scarce, so be sure to close connections when you are done\
    \ with them. `try`-`finally` blocks are especially useful for ensuring that unused\
    \ streams and connections are closed. ^([[1](#LiB0068.html#ftn.N45)]) The code\
    \ in Jargoneer demonstrates this technique.\n\n^([[1](#LiB0068.html#N45)])You\
    \ are probably familiar with the `try`-`catch` blocks that are used in Java for\
    \ exception handling. The `finally` clause is not as well known, but it is very\
    \ useful. Code in the `finally` block will be executed regardless of how control\
    \ leaves the `try` block."
  raw: "public void startApp() {\n    mDisplay = Display.getDisplay(this);\n\nif (mForm\
    \ == null) {\n      mForm = new Form(\"CookieMIDlet\");\n\nmForm.addCommand(new\
    \ Command(\"Exit\", Command.EXIT, 0));\n      mForm.addCommand(new Command(\"\
    Send\", Command.SCREEN, 0));\n      mForm.setCommandListener(this);\n    }\n\n\
    mDisplay.setCurrent(mForm);\n  }\n  public void pauseApp() {}\n\npublic void destroyApp(boolean\
    \ unconditional) {}\n\npublic void commandAction(Command c, Displayable s) {\n\
    \    if (c.getCommandType() == Command.EXIT) notifyDestroyed();\n    else {\n\
    \      Form waitForm = new Form(\"Connecting...\");\n      mDisplay.setCurrent(waitForm);\n\
    \      Thread t = new Thread(this);\n      t.start();\n    }\n  }\n\npublic void\
    \ run() {\n    String url = getAppProperty(\"CookieMIDlet-URL\");\n\ntry {\n \
    \     // Query the server and retrieve the response.\n      HttpConnection hc\
    \ = (HttpConnection)Connector.open(url);\n      if (mSession != null)\n      \
    \  hc.setRequestProperty(\"cookie\", mSession);\n      InputStream in = hc.openInputStream();\n\
    \nString cookie = hc.getHeaderField(\"Set-cookie\");\n      if (cookie != null)\
    \ {\n        int semicolon = cookie.indexOf(';');\n        mSession = cookie.substring(0,\
    \ semicolon);\n      }\n\nint length = (int)hc.getLength();\n      byte[] raw\
    \ = new byte[length];\n      in.read(raw);\n\nString s = new String(raw);\n  \
    \    Alert a = new Alert(\"Response\", s, null, null);\n      a.setTimeout(Alert.FOREVER);\n\
    \      mDisplay.setCurrent(a, mForm);\n\nin.close();\n      hc.close();\n    }\n\
    \    catch (IOException ioe) {\n      Alert a = new Alert(\"Exception\", ioe.toString(),\
    \ null, null);\n      a.setTimeout(Alert.FOREVER);\n      mDisplay.setCurrent(a,\
    \ mForm);\n    }\n  }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nOn\
    \ the server side, things are much simpler, as you'll see in [Listing 9-5](#LiB0067.html#ch09list05).\
    \ If you're writing Java servlets, you don't even have to worry about cookies.\
    \ Instead, you just deal with an HttpSession object. The code that follows shows\
    \ a servlet that interacts with CookieMIDlet; it implements a session-based hit\
    \ counter. It's been tested on Tomcat 4.0 but should work fine on other servers.\
    \ Note that you will have to map the URL used by the MIDlet to this servlet class;\
    \ for details, see an introductory book on servlets or your server's documentation.\n\
    \nListing 9-5: A Simple Session Handling Servlet\n\n| **![Start example](_1.gif)**\
    \ |\n\n```\nimport javax.servlet.http.*;\nimport javax.servlet.*;\nimport java.io.*;\n\
    import java.util.*;\n\npublic class CookieServlet extends HttpServlet {\n  private\
    \ Map mHitMap = new HashMap();\n\npublic void doGet(HttpServletRequest request,\n\
    \      HttpServletResponse response)\n      throws ServletException, IOException\
    \ {\n    HttpSession session = request.getSession();\n\nString id = session.getId();\n\
    \nint hits = -1;\n\n// Try to retrieve the hits from the map.\n    Integer hitsInteger\
    \ = (Integer)mHitMap.get(id);\n    if (hitsInteger != null)\n      hits = hitsInteger.intValue();\n\
    \n// Increment and store.\n    hits++;\n    mHitMap.put(id, new Integer(hits));\n\
    \    String message = \"Hits for this session: \" + hits + \".\";\n\nresponse.setContentType(\"\
    text/plain\");\n    response.setContentLength(message.length());\n    PrintWriter\
    \ out = response.getWriter();\n    out.println(message);\n  }\n}\n```\n\n| **![End\
    \ example](_1.gif)** |\n\n|  |\n\nThe servlet retrieves the HttpSession object.\
    \ Then it pulls out the session ID and uses it as a key into a map of hit counts.\
    \ After retrieving and incrementing the hit count for the session, the servlet\
    \ sends it as the response back to the MIDlet. You can start up multiple copies\
    \ of the emulator and run them simultaneously to see how the hit counts are independent\
    \ of each other and associated with each session.\n\n## Design Tips\n\nThis section\
    \ contains some suggestions about creating networked MIDlets.\n\n*   Use GET rather\
    \ than POST. It's simpler, and you won't have to worry about fiddling around with\
    \ the request headers.\n\n*   Don't hard-code URLs. Put them in a MIDlet property\
    \ in the application descriptor. This will make it possible to change the URL\
    \ without recompiling your code.\n\n*   Put network access in a separate thread.\
    \ Network access always takes time; it shouldn't hold up the user interface. Furthermore,\
    \ you must let your users know what's going on. Put up a \"loading progress\"\
    \ type of message or some kind of indication that your application is trying to\
    \ access a network resource.\n\n*   Make sure you handle exceptions gracefully.\
    \ Network connections on wireless devices are not tremendously reliable, so you\
    \ should make sure you're prepared for the worst. Catch all your exceptions and\
    \ do something reasonable.\n\n*   Clean up after yourself. On a small device,\
    \ resources are scarce, so be sure to close connections when you are done with\
    \ them. try - finally blocks are especially useful for ensuring that unused streams\
    \ and connections are closed. ^([[1](#LiB0068.html#ftn.N45)]) The code in Jargoneer\
    \ demonstrates this technique.\n\n^([[1](#LiB0068.html#N45)])You are probably\
    \ familiar with the try - catch blocks that are used in Java for exception handling.\
    \ The finally clause is not as well known, but it is very useful. Code in the\
    \ finally block will be executed regardless of how control leaves the try block."
  trans: "\npublic void startApp() {\n    mDisplay = Display.getDisplay(this);\n\n\
    if (mForm == null) {\n      mForm = new Form(\"CookieMIDlet\");\n\nmForm.addCommand(new\
    \ Command(\"Exit\", Command.EXIT, 0));\n      mForm.addCommand(new Command(\"\
    Send\", Command.SCREEN, 0));\n      mForm.setCommandListener(this);\n    }\n\n\
    mDisplay.setCurrent(mForm);\n  }\n  public void pauseApp() {}\n\npublic void destroyApp(boolean\
