    ### 集合


    尽管 CLDC 不支持完整的 J2SE 集合 API，但旧的、熟悉的 `Vector` 和 `Hashtable` 类仍然保留，以及不太知名的 `Stack`。如果你熟悉
    J2SE SDK 的 `Vector` 和 `Hashtable` 类，那么在 MIDP 中使用它们应该没有问题。


    ### 定时器


    MIDP 包含了在 J2SE SDK 1.3 版本中引入的 `Timer` 和 `TimerTask` 类。这些是唯一未包含在 CLDC 中但包含在 MIDP
    中的 J2SE 类。


    `Timer` 的 API 与 J2SE 版本相同，但有一个例外。指定线程是否为守护线程的构造函数缺失了，因为 MIDP 不支持守护线程。`TimerTask`
    的 API 在 J2SE SDK 和 MIDP 中完全相同。

