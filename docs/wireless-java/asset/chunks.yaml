    *   LAYOUT_2 | LAYOUT_RIGHT | LAYOUT_NEWLINE_AFTER


    ![](fig109_01.jpg)

    Figure 6-5: Form layout example


    #### StringItem


    StringItem represents a simple text label. For example, consider the following
    code:


    ```

    Form form = new Form("Form Title");

    StringItem stringItem = new StringItem("Label: ", "Value");

    form.append(stringItem);

    ```


    The form produced by this code (plus a **Back** command) is shown in [Figure 6-6](#LiB0045.html#ch06fig06).


    ![](fig110_01.jpg)

    Figure 6-6: A form with a single *StringItem* and a *Back* command


    You can use null for the StringItem''s label or value to indicate that it should
    not be shown on the screen. (Better yet, you could just use Form''s append(String)
    method.) StringItem inherits setLabel() and getLabel() methods from Item. It also
    includes getText() and setText() methods for accessing and adjusting the string
    value.


    MIDP 2.0 adds support for *appearance modes* for both StringItem and ImageItem.
    The appearance mode allows the item to look like a URL link or a button, although
    in all other respects the item behaves the same as a regular StringItem or ImageItem.
    The three appearance modes (which are defined in the Item class) are


    *   PLAIN shows the item in its normal state.


    *   HYPERLINK shows the item as a URL. A typical action would be to attempt to
    open the link using MIDlet''s platformRequest() method.


    *   BUTTON shows the item as a button. Note that this may be clumsy, especially
    on devices without pointer events, and you should generally use a Command where
    you feel tempted to use an item with a BUTTON appearance mode.


    As with almost everything else in the javax.microedition.lcdui package, it''s
    the implementation''s responsibility to show different appearance modes, and your
    application may look different on different devices. Furthermore, it is your application''s
    responsibility to implement appropriate behavior. For example, you might want
    to add a command to a HYPERLINK StringItem that calls MIDlet''s platformRequest()
    method to open the link.


    |  | Note  | The J2ME Wireless Toolkit beta release emulators don''t show *HYPERLINK*
    or *BUTTON StringItem*s any differently from *PLAIN* ones, except for one special
    case. If the *StringItem* has a *BUTTON* type and it has an associated item command,
    it is shown with a beveled border. |


    Finally, MIDP 2.0 offers getFont() and setFont() methods in the StringItem class.
    I''ll describe the Font class in [Chapter 10](#LiB0075_split_000.html#408).


    #### Spacer in MIDP 2.0


    MIDP 2.0 introduces a new Item, Spacer, that represents empty space in a Form.
    It may be used for layout purposes. All you need to do is specify a minimum width
    and height:


    ```

    public Spacer(minWidth, minHeight)

    ```'
  trans: '

    #### Item 类


    所有可添加到表单中的项目都继承自 `javax.microedition.lcdui.Item` 类。在 MIDP 1.0 中，Item 类并未定义太多内容，仅提供了
    `getLabel()` 和 `setLabel()` 方法。所有 Item 对象都有一个字符串标签，但具体子类可能会选择显示或不显示该标签。


    MIDP 2.0 在两个方向上对 Item 类进行了显著扩展。首先是命令处理。在 MIDP 2.0 中，Item 对象可以像 Displayable 对象一样拥有命令。当表单中的某个
    Item 被选中时，该 Item 的命令会与表单自身的命令一同显示。图 6-3 展示了一个包含四个字符串项目的表单，它们被巧妙地命名为“one”、“two”、“three”和“four”。表单本身有一个命令“Exit”。除了“three”有一个名为“Details”的命令外，其他字符串项目均无命令。


    ![](img/fig106_01.jpg)

    图 6-3：项目“three”拥有一个命令。


    请注意，工具包模拟器如何通过一条浅下划线来指示项目上存在一个或多个命令。当您导航到表单中带有额外命令的项目时，该命令会像其他任何命令一样显示出来，如图 6-4
    所示。


    ![](img/fig107_01.jpg)

    图 6-4：当项目被选中时，其命令会显示出来。


    管理项目命令的语义与管理表单命令的语义几乎相同。您可以使用 `addCommand()` 和 `removeCommand()` 来管理 Item 上的命令。请注意，添加到
    Item 的命令类型应为 `ITEM`，即使不是此类型也不会抛出异常。可以使用 `setItemCommandListener()` 方法分配一个命令监听器。`ItemCommandListener`
    接口包含一个单一方法，类似于 `CommandListener` 的单一方法：


    ```

    public void commandAction(Command c, Item item)

    ```


    如何显示项目的命令取决于具体实现。您在 MIDlet 中只需添加命令、设置监听器，然后等待命令事件即可。


    Item 还支持*默认命令*。如果运行时设备具有适合默认命令的按钮、旋钮或其他用户界面控件，则可以调用此命令。您可以通过调用 `setDefaultCommand()`
    来设置 Item 的默认命令。


    Item 在 MIDP 2.0 中最大的 API 变化与布局控制有关。Item 具有*最小尺寸*和*首选尺寸*，可用于控制项目在表单中显示的大小。最小尺寸由实现计算得出，并可通过
    `getMinimumWidth()` 和 `getMinimumHeight()` 获取。最小尺寸取决于 Item 的内容，并且每次内容更改时，实现都可能更改它。无法更改项目的最小尺寸，但检查最小尺寸可能有助于您的应用程序决定如何布局表单。


    相比之下，首选尺寸既可以由实现计算，也可以由您指定。首选宽度和高度的默认值为 -1，这是一个特殊值，告诉实现“我不关心，你自行决定该项目的最佳尺寸”。如果您在
    `setPreferredSize()` 中为宽度或高度传递了特定的正值，则该维度被称为*锁定*，实现将尝试在布局中使用它。


    `getPreferredWidth()` 和 `getPreferredHeight()` 方法并不总是返回您传递给 `setPreferredSize()`
    的值。例如，如果您通过调用 `setPreferredSize(-1, -1)` 解锁了宽度和高度，那么 `getPreferredWidth()` 和 `getPreferredHeight()`
    返回的值将是实现计算出的首选尺寸。


    最后，MIDP 2.0 的 Item 类包含一个布局指令，可通过 `getLayout()` 和 `setLayout()` 访问。布局值由一个整数表示，通常是
    `LAYOUT_2`（一个指示 MIDP 2.0 布局的标志）、一个水平值和一个垂直值的组合。`LAYOUT_2` 是一个标志，告诉实现该项目应使用 MIDP
    2.0 规则进行布局。水平值包括：


    *   `LAYOUT_LEFT`

    *   `LAYOUT_RIGHT`

    *   `LAYOUT_CENTER`


    垂直值包括：


    *   `LAYOUT_TOP`

    *   `LAYOUT_BOTTOM`

    *   `LAYOUT_VCENTER`


    此外，布局值可能包含*收缩*或*扩展*。收缩意味着使用项目的最小宽度或高度，而扩展意味着拉伸项目的大小以填充可用宽度或行高。用于收缩和扩展的常量是：


    *   `LAYOUT_SHRINK`（用于宽度）

    *   `LAYOUT_EXPAND`（用于宽度）

    *   `LAYOUT_VSHRINK`（用于高度）

    *   `LAYOUT_VEXPAND`（用于高度）


    最后，Item 的布局可能包含在项目之前或之后换行的请求，使用 `LAYOUT_NEWLINE_BEFORE` 或 `LAYOUT_NEWLINE_AFTER`
    常量。项目在表单中的布局方式类似于文本在页面上的流动，因此这些常量允许您在项目之前或之后请求新行。


    图 6-5 展示了一个简单示例，三个组件具有以下布局：


    *   `LAYOUT_2 | LAYOUT_LEFT | LAYOUT_NEWLINE_AFTER`

    *   `LAYOUT_2 | LAYOUT_CENTER | LAYOUT_NEWLINE_AFTER`

    *   `LAYOUT_2 | LAYOUT_RIGHT | LAYOUT_NEWLINE_AFTER`


    ![](img/fig109_01.jpg)

    图 6-5：表单布局示例


    #### StringItem


    `StringItem` 表示一个简单的文本标签。例如，考虑以下代码：


    ```

    Form form = new Form("Form Title");

    StringItem stringItem = new StringItem("Label: ", "Value");

    form.append(stringItem);

    ```


    此代码（加上一个**返回**命令）生成的表单如图 6-6 所示。


    ![](img/fig110_01.jpg)

    图 6-6：包含单个 *StringItem* 和一个 *返回* 命令的表单


    您可以将 `StringItem` 的标签或值设置为 `null`，以指示其不应显示在屏幕上。（更好的方法是，您可以直接使用 Form 的 `append(String)`
    方法。）`StringItem` 从 Item 继承了 `setLabel()` 和 `getLabel()` 方法。它还包含用于访问和调整字符串值的 `getText()`
    和 `setText()` 方法。


    MIDP 2.0 为 `StringItem` 和 `ImageItem` 增加了对*外观模式*的支持。外观模式允许项目看起来像 URL 链接或按钮，尽管在其他所有方面，该项目的行为与普通的
    `StringItem` 或 `ImageItem` 相同。三种外观模式（定义在 Item 类中）是：


    *   `PLAIN`：以正常状态显示项目。

    *   `HYPERLINK`：将项目显示为 URL。典型的操作是尝试使用 MIDlet 的 `platformRequest()` 方法打开链接。

    *   `BUTTON`：将项目显示为按钮。请注意，这可能不太方便，尤其是在没有指针事件的设备上，通常您应该在使用 `BUTTON` 外观模式的项目时，改用
    Command。


    与 `javax.microedition.lcdui` 包中几乎所有其他内容一样，显示不同外观模式是具体实现的责任，您的应用程序在不同设备上可能看起来不同。此外，实现适当的行为是您应用程序的责任。例如，您可能希望向一个
    `HYPERLINK` 类型的 `StringItem` 添加一个命令，该命令调用 MIDlet 的 `platformRequest()` 方法来打开链接。


    |  | 注意 | J2ME Wireless Toolkit 测试版模拟器在显示 *HYPERLINK* 或 *BUTTON* 类型的 *StringItem*
    时，与 *PLAIN* 类型没有区别，除了一种特殊情况。如果 *StringItem* 是 *BUTTON* 类型并且有关联的项目命令，它会显示为带有斜角边框。
    |


    最后，MIDP 2.0 在 `StringItem` 类中提供了 `getFont()` 和 `setFont()` 方法。我将在第 10 章中描述 Font
    类。


    #### MIDP 2.0 中的 Spacer


    MIDP 2.0 引入了一个新的 Item 类 `Spacer`，它表示表单中的空白区域。它可用于布局目的。您需要做的就是指定最小宽度和高度：


    ```

    public Spacer(minWidth, minHeight)

    ```

