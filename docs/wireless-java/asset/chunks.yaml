- fmt: "# Using kXML 1.21\n\nCurrently, `kXML` 1.21 is the most complete and well-supported\
    \ parser. Originally developed at the Universität Dortmund in Germany, it is now\
    \ part of the Enhydra web site. It is based on Common XML ([http://simonstl.com/articles/cxmlspec.txt](http://simonstl.com/articles/cxmlspec.txt)),\
    \ which is a set of recommendations for using XML 1.0. Common XML specifies a\
    \ core set of XML functionality and is really more of a state of mind than a specification.\n\
    \n`kXML` is specifically designed for KVM environments like CLDC and MIDP. Of\
    \ all the parsers covered in this chapter, `kXML` is one of the few that compiles\
    \ without modification in a MIDP environment. It is also relatively large; if\
    \ you're concerned about memory, you might want to consider one of the other parsers,\
    \ which are considerably smaller. On the other hand, using an obfuscator may significantly\
    \ reduce the size of the code, especially if there are portions of the parser\
    \ API you don't use in your application.\n\n`kXML` implements a pull-based parser,\
    \ based on the `XmlPull` standard, that is contained in the `org.kxml.parser`\
    \ package. *Pull-based* means that you tell the parser to parse each element.\
    \ A SAX parser, by contrast, parses the whole document in one shot and just lets\
    \ you know when things happen.\n\nMost of `kXML`'s parser functionality is defined\
    \ in the `AbstractXmlParser` class. In your code, you will use the concrete `XMLParser`\
    \ subclass. The basic idea is to instantiate an `XMLParser`, passing in a `java.io.Reader`\
    \ that represents the data to be parsed. Then call the `read()` method repeatedly,\
    \ processing each element until the end of the document is reached. `read()` returns\
    \ a `ParseEvent`, which could represent a start tag, an element text, or other\
    \ parser events. In MIDlet code, it looks something like this:\n\n```\n// InputStream\
    \ rawIn = ...\nReader in = new InputStreamReader(rawIn);\nAbstractXmlParser p\
    \ = new XmlParser(in);\nParseEvent pe = null;\nwhile ((pe = p.read()) != null)\
    \ {\n  ; // Process the event.\n  if (pe.getType() == org.kxml.Xml.END_DOCUMENT)\n\
    \    break;\n}\n```\n\n`ParseEvent` has a type property (returned by `getType()`)\
    \ that will be one of the constants defined in the `org.kxml.Xml` class. `ParseEvent`\
    \ also has various subclasses that represent some of the event types. However,\
    \ downcasting will rarely be necessary because `ParseEvent` already contains most\
    \ of the methods you need for accessing data.\n\nIn the previous sample code,\
    \ I've explicitly tested for an `END_DOCUMENT` event type that signals that the\
    \ parser is finished.\n\nFor a practical example of XML parsing from a MIDlet,\
    \ see the PeekAndPick application at [http://wireless.java.sun.com/applications/peekandpick/2.0/](http://wireless.java.sun.com/applications/peekandpick/2.0/).\
    \ This application parses RSS files (XML documents) that represent news feeds\
    \ and displays the results on the MIDP device.\n\n## Porting Techniques\n\nIf\
    \ you do decide to port one of the parsers that doesn't build in MIDP out of the\
    \ box, there are several techniques you may wish to consider:\n\n*   Dump features\
    \ you don't need. If the parser code is modularized well, you may be able to remove\
    \ entire subdirectories of the source code, assuming you don't need those features\
    \ in your application. You might, for example, be able to drop off a package that\
    \ puts a SAX interface on top of the parser or a WAP support package.\n\n*   Parsers\
    \ often won't compile because they use classes from J2SE that aren't present in\
    \ MIDP. One way to fix this is to supply the missing J2SE classes. There are two\
    \ challenges with this approach. First, there are legal restrictions on the use\
    \ of J2SE source code. See the source license for the full details. You can work\
    \ around this by supplying your own implementation. The second problem is that\
    \ MIDP implementations won't load classes defined in the `java.*` and `javax.*`\
    \ namespaces. You can work around this problem using an obfuscator that renames\
    \ the classes into different packages. ([Chapter 15](#LiB0118_split_000.html#623)\
    \ has some more details on this.)\n\n*   A cleaner option is to use classes in\
    \ the same package or inner classes to replace the missing pieces of J2SE.\n\n\
    ## Using Parsers in the J2ME Wireless Toolkit\n\nIncorporating a parser into your\
    \ MIDlet suite is surprisingly easy. If a compiled JAR or ZIP file of classes\
    \ is available, you can drop it into the `lib` directory of your project. For\
    \ example, if the J2ME Wireless Toolkit is installed in `/WTK20`, your project\
    \ is called `ParseProject`, and you're using `kXML` 1.21, then you would install\
    \ the `kxml-min.zip` archive into `/WTK20/apps/ParseProject/lib`.\n\nOn the other\
    \ hand, if the source code of the parser is available, you can simply drop it\
    \ into the `src` directory of your project.\n\nYou will probably want to use an\
    \ obfuscator to reduce the size of your MIDlet suite JAR. It's a good idea to\
    \ use an obfuscator whenever you add a third-party library to your application.\
    \ A good obfuscator will remove methods and classes that you are not using in\
    \ your code, which can result in significant size savings.\n\n## Summary\n\nThe\
    \ world of XML on small devices is wild and untamed. Bold developers can parse\
    \ XML in a MIDP environment using one of the parsers described in this chapter.\
    \ As a means of transmitting data from server to client, XML is a great choice.\
    \ Just remember to keep those documents small and simple.\n\n# Chapter 15: Protecting\
    \ Network Data\n\nMIDlets are undeniably cool—Java code that runs on a small device,\
    \ and HTTP network connectivity, as well. But once you start thinking about the\
    \ possibilities, you realize that a lot of applications just aren't possible without\
    \ some form of data security. What if you were going to buy something? You shouldn't\
    \ send credit card numbers over the Internet without some kind of protection,\
    \ and you shouldn't be sending sensitive corporate information over the Internet\
    \ to small devices. Many applications, then, need something else—something that\
    \ keeps sensitive data from being stolen. The answer in the MIDP world is no different\
    \ than the answer anywhere else: cryptography.\n\n## Cryptography Review\n\n*Cryptography*\
    \ is a branch of mathematics. It's based on the idea that certain kinds of mathematical\
    \ problems are hard to solve. Using cryptography is a bit speculative; as research\
    \ in mathematics continues, it's very possible that someone will discover a way\
    \ to solve (or \"break\") most of the modern cryptographic algorithms. Nevertheless,\
    \ for today at least, cryptography provides protection for sensitive data, and\
    \ there aren't many acceptable alternatives in the everything-connects-to-everything\
    \ modern world.\n\n### The Internet is a Big Room\n\nThere are many aspects to\
    \ the security of a system. We'll focus on the data your MIDlet sends and receives\
    \ over the network. This data travels over some infrastructure we know nothing\
    \ about (provided by your mobile carrier) and probably over the Internet, as well.\
    \ The Internet is definitely not a secure network, and your carrier's mobile infrastructure\
    \ probably isn't either. If you're passing sensitive data around, it's very possible\
    \ that eavesdroppers at various points in the network can listen in on the data.\
    \ They may even be able to change parts of it. If your MIDP application involves\
    \ passing around credit card numbers or sensitive corporate data, you should be\
    \ concerned.\n\nThink of the Internet as a big room. You can talk to anyone else\
    \ in the room, but everyone else can listen in on the conversation. Furthermore,\
    \ you may be talking to someone on the other side of the room through intermediaries,\
    \ like the children's game of \"telephone.\" Any one of the intermediaries might\
    \ be changing the conversation, and they can all hear what you're saying."
