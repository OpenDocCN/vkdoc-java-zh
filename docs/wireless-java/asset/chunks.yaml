    \ mSelection = 0;\n  }\n\npublic void dispose() {\n    mTrucking = false;\n  }\n\
    \n// Runnable interface.\n\npublic void run() {\n    while (mTrucking) {\n   \
    \   int target = mSelection * 10;\n      if (mVisibleIndexTimesTen != target)\
    \ {\n        mVisibleIndexTimesTen++;\n        if (mVisibleIndexTimesTen >= mValues.size()\
    \ * 10)\n          mVisibleIndexTimesTen = 0;\n        repaint();\n      }\n \
    \     try { Thread.sleep(50); }\n      catch (InterruptedException ie) {}\n  \
    \  }\n  }\n\n// CustomItem abstract methods.\n\npublic int getMinContentWidth()\
    \ {\n    // Loop through the values. Find the maximum width.\n    int maxWidth\
    \ = 0;\n    for (int i = 0; i < mValues.size(); i++) {\n      String value = (String)mValues.elementAt(i);\n\
    \      int width = mFont.stringWidth(value);\n      maxWidth = Math.max(maxWidth,\
    \ width);\n    }\n    // Don't forget about the title, although we don't\n   \
    \ // really know what font is used for that.\n    int width = mFont.stringWidth(getLabel())\
    \ + 20;\n    maxWidth = Math.max(maxWidth, width);\n    return maxWidth;\n  }\n\
    \  public int getMinContentHeight() {\n    return mFont.getHeight();\n  }\n\n\
    public int getPrefContentWidth(int width) {\n    return getMinContentWidth();\n\
    \  }\n\npublic int getPrefContentHeight(int height) {\n    return getMinContentHeight();\n\
    \  }\n\npublic void paint(Graphics g, int w, int h) {\n    int fraction = mVisibleIndexTimesTen\
    \ % 10;\n    int visibleIndex = (mVisibleIndexTimesTen - fraction) / 10;\n   \
    \ String value = (String)mValues.elementAt(visibleIndex);\n\ng.setFont(mFont);\n\
    \    int bc = mDisplay.getColor(Display.COLOR_BACKGROUND);\n    int fc = mDisplay.getColor(Display.COLOR_FOREGROUND);\n\
    \    if (mFocus == true) {\n      bc = mDisplay.getColor(Display.COLOR_HIGHLIGHTED_BACKGROUND);\n\
    \      fc = mDisplay.getColor(Display.COLOR_HIGHLIGHTED_FOREGROUND);\n    }\n\
    \    g.setColor(bc);\n    g.fillRect(0, 0, w, h);\n    g.setColor(fc);\n\n// Simple\
    \ case: visibleIndex is aligned on a single item.\n    if (fraction == 0) {\n\
    \      g.drawString(value, 0, 0, Graphics.TOP | Graphics.LEFT);\n      return;\n\
    \    }\n\n// Complicated case: show two items and a line.\n    int lineHeight\
    \ = mFont.getHeight();\n    int divider = lineHeight - lineHeight * fraction /\
    \ 10;\n\n// Draw the piece of the visible value.\n    g.drawString(value, 0, divider\
    \ - lineHeight,\n        Graphics.TOP | Graphics.LEFT);\n    // Now get the next\
    \ value.\n    visibleIndex = (visibleIndex + 1) % mValues.size();\n    value =\
    \ (String)mValues.elementAt(visibleIndex);\n    // Draw the line.\n    g.setStrokeStyle(Graphics.DOTTED);\n\
    \    g.drawLine(0, divider, w, divider);\n\ng.drawString(value, 0, divider,\n\
    \        Graphics.TOP | Graphics.LEFT);\n  }\n\n// CustomItem methods.\n\nprotected\
    \ void keyPressed(int keyCode) { flip (); }\n\nprotected void pointerPressed(int\
    \ x, int y) { flip(); }\n\nprotected boolean traverse(int dir,\n      int viewportWidth,\
    \ int viewportHeight,\n      int[] visRect_inout) {\n    mFocus = true;\n    repaint();\n\
    \    return false;\n  }\n\nprotected void traverseOut() {\n    mFocus = false;\n\
    \    repaint();\n  }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nThe\
    \ MIDlet in [Listing 7-4](#LiB0052.html#ch07list04) displays a form that contains\
    \ a StationSign.\n\nListing 7-4: A MIDlet That Demonstrates *StationSign*\n\n\
    | **![Start example](_1.gif)** |\n\n```\nimport javax.microedition.midlet.*;\n\
    import javax.microedition.lcdui.*;\n\npublic class StationSignMIDlet\n    extends\
    \ MIDlet\n    implements CommandListener {\n  public void startApp() {\n    Display\
    \ display = Display.getDisplay(this);\n    Form form = new Form(\"StationSignMIDlet\"\
    );\n    form.append(new StringItem(\"StringItem: \", \"item one\"));\n    StationSign\
    \ ss = new StationSign(\"Destination\", display);\n    ss.add(\"Albuquerque\"\
    );\n    ss.add(\"Savannah\");\n    ss.add(\"Pocatello\");\n    ss.add(\"Des Moines\"\
    );\n    form.append(ss);\n    form.append(new StringItem(\"StringItem: \", \"\
    item two\"));\n\nCommand c = new Command(\"Exit\", Command.EXIT, 0);\n    form.addCommand(c);\n\
    \    form.setCommandListener(this);\n\ndisplay.setCurrent(form);\n  }\n\npublic\
    \ void pauseApp() {}\n\npublic void destroyApp(boolean unconditional) {}\n\npublic\
    \ void commandAction(Command c, Displayable s) {\n    if (c.getCommandType() ==\
    \ Command.EXIT)\n      notifyDestroyed();\n  }\n}\n```\n\n| **![End example](_1.gif)**\
    \ |\n\n|  |\n\nThe MIDlet in action appears in [Figure 7-4](#LiB0052.html#ch07fig04).\
    \ The figure shows an instance of StationSign sandwiched between two StringItems.\
    \ You can navigate through the form to see how the appearance of StationSign changes\
    \ when it has input focus. If you press the select key on StationSign, you'll\
    \ see the next choice scroll into view.\n\n![](fig137_01.jpg)\nFigure 7-4: *StationSign*\
    \ in action in a *Form*\n\n## Summary\n\nThis chapter describes one of MIDP 2.0's\
    \ exciting new features, custom items. The CustomItem class is the basis of items\
    \ you can write to include in Forms. You can determine the custom item's appearance\
    \ in the paint() method by drawing using a Graphics object. Callback methods throughout\
    \ CustomItem let you know when the item is shown or hidden and deliver key, pointer,\
    \ and traversal events. Two examples, SimpleItem and StationSign, provide a foundation\
    \ of working code that you can adapt to build your own items.\n\n# Chapter 8:\
    \ Persistent Storage"
  trans: "\n## 示例\n\n在本节中，我将向你展示 StationSign，一个中等复杂度的 CustomItem。StationSign 具有以下特性：\n\
    \n*   实现了一个简单的字符串选择滚动列表。指针事件和按键事件会使当前选择移动到下一个选项。滚动过程带有动画效果。StationSign 是一个 Runnable——在构造函数中创建了一个单独的线程，用于调用\
    \ run() 方法。如果项目的当前显示状态与当前选择之间存在差异，run() 方法会通过滚动来协调两者。\n\n*   通过使用静态文本的字体以及从 Display\
    \ 的 getColor() 方法返回的颜色，来符合设备的外观和感觉。\n\n*   不实现内部遍历。\n\n*   使用 traverse() 和 traverseOut()\
    \ 方法来识别焦点，并使用高亮颜色进行绘制。当调用 traverse() 时，StationSign 会设置一个布尔成员变量 mFocus，以指示该项目已获得焦点。在\
    \ paint() 方法中，使用 mFocus 来决定绘制项目所使用的颜色。当调用 traverseOut() 时，mFocus 被设置为 false，表示焦点已丢失。\n\
    \nStationSign 的完整源代码如清单 7-3 所示。\n\n清单 7-3：*StationSign* 自定义项目\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\nimport java.util.Vector;\n\nimport javax.microedition.lcdui.*;\n\n\
    public class StationSign\n    extends CustomItem\n    implements Runnable {\n\
    \  private Vector mValues;\n  private int mSelection;\n  private boolean mTrucking;\n\
    \nprivate Display mDisplay;\n  private Font mFont;\n  private int mVisibleIndexTimesTen;\n\
    \  private boolean mFocus;\n\npublic StationSign(String title, Display display)\
    \ {\n    super(title);\n    mDisplay = display;\n    mValues = new Vector();\n\
    \    mSelection = 0;\n    mTrucking = true;\n    mFont = Font.getFont(Font.FONT_STATIC_TEXT);\n\
    \    mVisibleIndexTimesTen = mSelection * 10;\n\nThread t = new Thread(this);\n\
    \    t.start();\n  }\n\npublic void add(String value) {\n    if (value == null)\
    \ return;\n    mValues.addElement(value);\n  }\n\npublic void remove(String value)\
    \ {\n    if (value == null) return;\n    mValues.removeElement(value);\n  }\n\n\
    public String getSelection() {\n    if (mValues.size() == 0) return \"\";\n  \
    \  return (String)mValues.elementAt(mSelection);\n  }\n\npublic void flip() {\n\
    \    mSelection++;\n    if (mSelection >= mValues.size()) mSelection = 0;\n  }\n\
    \npublic void dispose() {\n    mTrucking = false;\n  }\n\n// Runnable 接口。\n\n\
    public void run() {\n    while (mTrucking) {\n      int target = mSelection *\
    \ 10;\n      if (mVisibleIndexTimesTen != target) {\n        mVisibleIndexTimesTen++;\n\
    \        if (mVisibleIndexTimesTen >= mValues.size() * 10)\n          mVisibleIndexTimesTen\
    \ = 0;\n        repaint();\n      }\n      try { Thread.sleep(50); }\n      catch\
    \ (InterruptedException ie) {}\n    }\n  }\n\n// CustomItem 抽象方法。\n\npublic int\
    \ getMinContentWidth() {\n    // 遍历所有值。找出最大宽度。\n    int maxWidth = 0;\n    for\
    \ (int i = 0; i < mValues.size(); i++) {\n      String value = (String)mValues.elementAt(i);\n\
    \      int width = mFont.stringWidth(value);\n      maxWidth = Math.max(maxWidth,\
    \ width);\n    }\n    // 不要忘记标题，尽管我们并不\n    // 确切知道用于标题的字体。\n    int width = mFont.stringWidth(getLabel())\
    \ + 20;\n    maxWidth = Math.max(maxWidth, width);\n    return maxWidth;\n  }\n\
    \  public int getMinContentHeight() {\n    return mFont.getHeight();\n  }\n\n\
    public int getPrefContentWidth(int width) {\n    return getMinContentWidth();\n\
    \  }\n\npublic int getPrefContentHeight(int height) {\n    return getMinContentHeight();\n\
    \  }\n\npublic void paint(Graphics g, int w, int h) {\n    int fraction = mVisibleIndexTimesTen\
    \ % 10;\n    int visibleIndex = (mVisibleIndexTimesTen - fraction) / 10;\n   \
    \ String value = (String)mValues.elementAt(visibleIndex);\n\ng.setFont(mFont);\n\
    \    int bc = mDisplay.getColor(Display.COLOR_BACKGROUND);\n    int fc = mDisplay.getColor(Display.COLOR_FOREGROUND);\n\
    \    if (mFocus == true) {\n      bc = mDisplay.getColor(Display.COLOR_HIGHLIGHTED_BACKGROUND);\n\
    \      fc = mDisplay.getColor(Display.COLOR_HIGHLIGHTED_FOREGROUND);\n    }\n\
    \    g.setColor(bc);\n    g.fillRect(0, 0, w, h);\n    g.setColor(fc);\n\n// 简单情况：visibleIndex\
    \ 对齐到单个项目。\n    if (fraction == 0) {\n      g.drawString(value, 0, 0, Graphics.TOP\
    \ | Graphics.LEFT);\n      return;\n    }\n\n// 复杂情况：显示两个项目并画一条线。\n    int lineHeight\
    \ = mFont.getHeight();\n    int divider = lineHeight - lineHeight * fraction /\
    \ 10;\n\n// 绘制可见值的一部分。\n    g.drawString(value, 0, divider - lineHeight,\n   \
    \     Graphics.TOP | Graphics.LEFT);\n    // 现在获取下一个值。\n    visibleIndex = (visibleIndex\
    \ + 1) % mValues.size();\n    value = (String)mValues.elementAt(visibleIndex);\n\
    \    // 绘制分隔线。\n    g.setStrokeStyle(Graphics.DOTTED);\n    g.drawLine(0, divider,\
    \ w, divider);\n\ng.drawString(value, 0, divider,\n        Graphics.TOP | Graphics.LEFT);\n\
    \  }\n\n// CustomItem 方法。\n\nprotected void keyPressed(int keyCode) { flip ();\
    \ }\n\nprotected void pointerPressed(int x, int y) { flip(); }\n\nprotected boolean\
    \ traverse(int dir,\n      int viewportWidth, int viewportHeight,\n      int[]\
    \ visRect_inout) {\n    mFocus = true;\n    repaint();\n    return false;\n  }\n\
    \nprotected void traverseOut() {\n    mFocus = false;\n    repaint();\n  }\n}\n\
    ```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n清单 7-4 中的 MIDlet 显示了一个包含 StationSign\
    \ 的表单。\n\n清单 7-4：演示 *StationSign* 的 MIDlet\n\n| **![开始示例](img/_1.gif)** |\n\n\
    ```\nimport javax.microedition.midlet.*;\nimport javax.microedition.lcdui.*;\n\
    \npublic class StationSignMIDlet\n    extends MIDlet\n    implements CommandListener\
    \ {\n  public void startApp() {\n    Display display = Display.getDisplay(this);\n\
    \    Form form = new Form(\"StationSignMIDlet\");\n    form.append(new StringItem(\"\
    StringItem: \", \"item one\"));\n    StationSign ss = new StationSign(\"Destination\"\
    , display);\n    ss.add(\"Albuquerque\");\n    ss.add(\"Savannah\");\n    ss.add(\"\
    Pocatello\");\n    ss.add(\"Des Moines\");\n    form.append(ss);\n    form.append(new\
    \ StringItem(\"StringItem: \", \"item two\"));\n\nCommand c = new Command(\"Exit\"\
    , Command.EXIT, 0);\n    form.addCommand(c);\n    form.setCommandListener(this);\n\
    \ndisplay.setCurrent(form);\n  }\n\npublic void pauseApp() {}\n\npublic void destroyApp(boolean\
    \ unconditional) {}\n\npublic void commandAction(Command c, Displayable s) {\n\
    \    if (c.getCommandType() == Command.EXIT)\n      notifyDestroyed();\n  }\n\
    }\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n运行中的 MIDlet 如图 7-4 所示。该图展示了一个夹在两个\
    \ StringItem 之间的 StationSign 实例。你可以通过表单导航，观察 StationSign 在获得输入焦点时外观的变化。如果在 StationSign\
    \ 上按下选择键，你将看到下一个选项滚动进入视野。\n\n![](img/fig137_01.jpg)\n图 7-4：在*表单*中运行的 *StationSign*\n\
    \n## 总结\n\n本章描述了 MIDP 2.0 令人兴奋的新特性之一：自定义项目。CustomItem 类是你编写可包含在 Form 中的项目的基础。你可以通过在\
    \ paint() 方法中使用 Graphics 对象进行绘制，来决定自定义项目的外观。CustomItem 中的回调方法让你能够了解项目何时显示或隐藏，并传递按键、指针和遍历事件。两个示例\
    \ SimpleItem 和 StationSign 提供了可运行代码的基础，你可以在此基础上进行改编，构建自己的项目。\n\n# 第 8 章：持久化存储\n"
- fmt: "# Highlights\n\nMIDP applications have to run seamlessly on many devices.\
    \ You've already seen how this can be a challenge in the user-interface arena.\
    \ The trick there was to use abstract concepts that would be mapped to the screen\
    \ by a device-specific implementation.\n\nMIDP's approach to persistent storage\
    \ is basically the same. Your application could run on a device with flash ROM,\
    \ battery-backed RAM, or even a small hard disk. MIDP applications don't really\
    \ care; all they know about are small databases called record stores. It's up\
    \ to the device's MIDP implementation to map record stores in some reasonable\
    \ manner to whatever persistent storage is available.\n\nThese are *small* amounts\
    \ of data we're talking about; the MIDP specification dictates that the minimum\
    \ amount of persistent storage is only 8KB.\n\n# Overview\n\nPersistent storage\
    \ in MIDP is centered around record stores. A *record store* is a small database\
    \ that contains pieces of data called *records*. Record stores are represented\
    \ by instances of `javax.microedition.rms.RecordStore`. In MIDP 1.0, the scope\
    \ of a record store is limited to a single MIDlet suite. Said another way, a MIDlet\
    \ can only access record stores that were created by a MIDlet in the same suite.\
    \ [Figure 8-1](#LiB0055.html#ch08fig01) shows the relationship between MIDlet\
    \ suites and record stores. MIDP 2.0 allows optional sharing of record stores.\
    \ See the section on \"[Sharing Record Stores in MIDP 2.0](#LiB0056.html#316)\"\
    \ later in this chapter.\n\n[![Click To expand](fig140_01.jpg)](fig140_01_0.jpg)\n\
    Figure 8-1: Record stores belong to MIDlet suites.\n\nRecord stores are identified\
    \ by a name. Within a MIDlet suite's record stores, the names must be unique.\n\
    \n# Managing Record Stores\n\nThe `RecordStore` class serves two purposes. First,\
    \ it defines an API for manipulating individual records. Second, it defines an\
    \ API (mostly static methods) for managing record stores.\n\n## Opening, Closing,\
    \ and Removing Record Stores\n\nTo open a record store, you simply need to name\
    \ it.\n\n```\npublic static RecordStore openRecordStore(String recordStoreName,\n\
    \    boolean createIfNecessary) throws RecordStoreException,\n    RecordStoreFullException,\
    \ RecordStoreNotFoundException\n```\n\nIf the record store does not exist, the\
    \ `createIfNecessary` parameter determines whether a new record store will be\
    \ created or not. If the record store does not exist, and the `createIfNecessary`\
    \ parameter is `false`, then a `RecordStoreNotFoundException` will be thrown.\n\
    \nThe following code opens a record store named \"Address.\"\n\n```\nRecordStore\
    \ rs = RecordStore.openRecordStore(\"Address\", true); \n```\n\nThe record store\
    \ will be created if it does not already exist.\n\nAn open record store can be\
    \ closed by calling the `closeRecordStore()` method. As with anything that can\
    \ be opened and closed, it's a good idea to close record stores when you're finished\
    \ with them. Memory and processing power are in short supply on a small device,\
    \ so you should remember to clean up after yourself as much as possible. You probably\
    \ shouldn't even keep a record store open over the lifetime of the MIDlet; after\
    \ all, your MIDlet may be paused by the device's application manager, and it would\
    \ be unwise to have open resources while the MIDlet is paused.\n\nTo find out\
    \ all the record stores available to a particular MIDlet suite, call the `listRecordStores()`\
    \ method:\n\n```\npublic static String[] listRecordStores()\n```\n\nFinally, to\
    \ remove a record store, call the static `deleteRecordStore()` method. The record\
    \ store and its contained records will be deleted.\n\n|  | Note  | Record store\
    \ operations, particularly opening and closing, may be time-consuming on actual\
    \ devices. You probably won't notice the delays using a desktop MIDP emulator,\
    \ but on a real device, it may slow down applications noticeably. (See [*http://www.poqit.com/midp/bench/*](http://www.poqit.com/midp/bench/)\
    \ for some sobering measurements from real devices.) For many applications, it\
    \ may be appropriate to place record store access in its own thread, just as network\
    \ access goes in its own thread. |\n\n## Sharing Record Stores in MIDP 2.0\n\n\
    In MIDP 2.0, record stores also have an *authorization mode.* The default authorization\
    \ mode is `AUTHMODE_PRIVATE`, which means that a record store is only accessible\
    \ from MIDlets in the MIDlet suite that created the record store. This is exactly\
    \ as described earlier.\n\nRecord stores can be shared by changing their authorization\
    \ mode to `AUTHMODE_ANY`, which means that any other MIDlet on the device can\
    \ access the record store. Be careful with this! Don't put any secrets in an `AUTHMODE_ANY`\
    \ record store. In addition, you can also decide if you want a shared record store\
    \ to be writable or read-only.\n\nYou can create a shared record store using a\
    \ new `openRecordStore()` method in the `RecordStore` class:\n\n```\npublic static\
    \ RecordStore openRecordStore(String recordStoreName,\n    boolean createIfNecessary,\
    \ byte authMode, boolean writable)\n    throws RecordStoreException, RecordStoreFullException,\n\
    \    RecordStoreNotFoundException\n```\n\nThe `authMode` and `writable` parameters\
    \ are only used if the record store is created, which implies that the record\
    \ store doesn't exist and `createIfNecessary` is `true`. You can change the authorization\
    \ mode and writable flag of an open record store using the following method:\n\
    \n```\npublic void setMode(byte authmode, boolean writable)\n    throws RecordStoreException\n\
    ```\n\nNote that only a MIDlet belonging to the suite that created the record\
    \ store can change its authorization mode and writable flag.\n\nHow do you access\
    \ a shared record store? One final `openRecordStore()` method provides the answer:\n\
    \n```\npublic static RecordStore openRecordStore(String recordStoreName,\n   \
    \ String vendorName, String suiteName)\n    throws RecordStoreException, RecordStoreNotFoundException\n\
    ```\n\nTo access a shared record store, you need to know its name, the name of\
    \ the MIDlet suite that created it, and the name of the MIDlet suite's vendor.\
    \ These names should be the `MIDlet-Name` and `MIDlet-Vendor` attributes in the\
    \ MIDlet suite JAR manifest or the application descriptor.\n\n## Record Store\
    \ Size\n\nRecord stores consist of records; each record is simply an array of\
    \ bytes. On space-constrained devices, you'll probably want to keep a close eye\
    \ on the size of your record stores. To find out the number of bytes used by a\
    \ record store, call the following method on a `RecordStore` instance:\n\n```\n\
    public int getSize()\n```\n\nYou can find out how much more space is available\
    \ by calling the following method:\n\n```\npublic int getSizeAvailable() \n```\n\
    \nNote that this method returns the total space available in the record store,\
    \ which is not the same as the amount of record data that is available. That is,\
    \ there is some overhead associated with each record in the record store; the\
    \ `getSizeAvailable()` method returns the amount of space available for both record\
    \ data and overhead.\n\n## Version and Timestamp\n\nRecord stores maintain both\
    \ a version number and a timestamp. The version number is updated every time the\
    \ record store is modified. It is represented by an integer and can be retrieved\
    \ by calling `getVersion()`.\n\nThe record store also remembers the last time\
    \ it was modified. This moment in time is represented by a `long`, which can be\
    \ retrieved with `getLastModified()`. The `long` represents the number of milliseconds\
    \ since midnight on January 1, 1970. You may recall (from [Chapter 4](#LiB0030_split_000.html#134))\
    \ that this is the same way that `Date` uses a `long` to represent a moment in\
    \ time. If you need to examine the timestamp of a record store, you can create\
    \ a `Date` from the `long` timestamp. Then you could use a `Calendar` to translate\
    \ from a `Date` to calendar fields like month, day, hour, and minute."
