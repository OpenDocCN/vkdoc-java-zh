  trans: "\n### 理解列表类型\n\n对于**多选**和**单选**列表，选择与确认是两个独立的步骤。实际上，列表本身并不处理这些类型的确认操作——你的\
    \ MIDlet 需要提供其他机制（通常是一个命令）让用户确认其选择。**多选**列表允许用户在确认选择前，对各个元素进行选中或取消选中操作。**单选**列表则允许用户在确认选择前多次更改选择。\n\
    \n图 6-1a 展示了一个**单选**列表。用户通过上下方向键在列表中导航，按下设备上的选择键即可选中某个元素。图 6-1b 展示了一个**多选**列表。其操作方式与**单选**列表基本相同，但可以同时选中多个元素。同样，用户通过上下方向键在列表中移动，选择键用于切换特定元素的选中状态。\n\
    \n![点击展开](img/fig96_01_0.jpg)\n图 6-1：列表类型——(a) *单选* 和 (b) *多选*\n\n此外，还存在一种**单选**的变体：**隐式**列表将选择与确认步骤合二为一。**隐式**列表的行为类似于菜单。图\
    \ 6-2 展示了一个**隐式**列表，每个元素都包含图像和文本。当用户按下选择键时，列表会立即触发一个事件，就像命令一样。**隐式**列表与**单选**列表类似，用户只能选择其中一个列表元素。但使用**隐式**列表时，用户在确认选择前没有机会更改主意。\n\
    \n![](img/fig96_02.jpg)\n图 6-2：*隐式*列表将选择与确认合二为一。\n\n### 隐式列表的事件处理\n\n当用户在**隐式**列表中做出选择时，会调用列表的\
    \ `CommandListener` 中的 `commandAction()` 方法。一个特殊值会作为 `Command` 参数传递给 `commandAction()`：\n\
    \n```\npublic static final Command SELECT_COMMAND\n```\n\n例如，你可以像这样测试命令事件的来源：\n\
    \n```\npublic void commandAction(Command c, Displayable s) {\n  if (c == nextCommand)\n\
    \    // ...\n  else if (c == List.SELECT_COMMAND)\n    // ...\n}\n```\n\n本章末尾有一个演示**隐式**列表的示例。\n\
    \n在 MIDP 2.0 中，`setSelectCommand()` 方法允许你指定自己的命令用于选择，而不必使用 `SELECT_COMMAND`。\n\
    \n### 创建列表\n\n要创建一个列表，需要指定标题和列表类型。如果你预先知道元素名称和图像，可以在构造函数中传递它们：\n\n```\npublic\
    \ List(String title, int type)\npublic List(String title, int type,\n    String[]\
    \ stringElements, Image[] imageElements)\n```\n\n`stringElements` 参数不能为 null；但是，`stringElements`\
    \ 或 `imageElements` 数组中可能包含 null 元素。如果某个列表元素的字符串和图像都为 null，则该元素显示为空白。如果字符串和图像都已定义，则该元素将同时显示图像和字符串。\n\
    \n某些列表的元素数量可能超过屏幕显示范围。实际上，不同设备能容纳的元素数量各不相同。但不必担心：列表实现会自动处理上下滚动，以显示列表的全部内容。\n\n\
    ### 关于图像\n\n我们对列表类的初步探索让我们首次接触到了图像。`javax.microedition.lcdui.Image` 类的实例代表了 MIDP\
    \ 中的图像。规范要求实现能够加载 PNG 格式的图像文件。^([1]) 该格式支持透明色和无损压缩。\n\n`Image` 没有构造函数，但 `Image`\
    \ 类提供了几个 `createImage()` 工厂方法来获取 `Image` 实例。首先是用于从 PNG 数据加载图像的方法。\n\n```\npublic\
    \ static Image createImage(String name)\npublic static Image createImage(byte[]\
    \ imagedata, int imageoffset,\n    int imagelength)\n```\n\n第一个方法尝试从指定名称的文件创建图像，该文件应打包在包含你的\
    \ MIDlet 的 JAR 文件中。你应该使用绝对路径名，否则可能找不到图像文件。第二个方法使用提供的数组中的数据创建图像。数据从给定的数组偏移量 `imageoffset`\
    \ 开始，长度为 `imagelength` 字节。在 MIDP 2.0 中，你还可以从 `InputStream` 创建图像：\n\n```\npublic\
    \ static Image createImage(InputStream stream)\n```\n\n图像可以是*可变*的或*不可变*的。可变图像可以通过调用\
    \ `getGraphics()` 并使用返回的 `Graphics` 对象在图像上绘制来进行修改。（关于 `Graphics` 的完整细节，请参见第 10\
    \ 章。）如果尝试在不可变图像上调用 `getGraphics()`，则会抛出 `IllegalStateException`。\n\n上述 `createImage()`\
    \ 方法返回的是不可变图像。要创建可变图像，请使用以下方法：\n\n```\npublic static Image createImage(int width,\
    \ int height)\n```\n\n通常，你会创建一个可变图像用于离屏绘制，例如用于动画，或者在设备显示不支持双缓冲时减少闪烁。\n\n你传递给 `Alert`、`ChoiceGroup`、`ImageItem`\
    \ 或 `List` 的任何图像都应该是不可变的。要从可变图像创建不可变图像，请使用以下方法：\n\n```\npublic static Image createImage(Image\
    \ image)\n```\n\n在 MIDP 2.0 中，你还可以使用以下方法从另一图像的一部分创建图像：\n\n```\npublic static Image\
    \ createImage(Image image,\n    int x, int y, int width, int height, int transform)\n\
    ```\n\n此方法获取由 `x`、`y`、`width` 和 `height` 描述的原始图像部分，应用指定的变换，并将结果作为不可变图像返回。可能的变换由\
    \ `javax.microedition.lcdui.game.Sprite` 类中的常量描述，包括镜像和 90 度旋转等。\n\n`Image` 还包含将图像数据作为\
    \ int 数组处理的方法。我将在第 10 章中稍后讨论这些方法。\n\n如何确定你需要多大尺寸的图像？在 MIDP 2.0 中，`Display` 提供了返回各种类型图像最佳宽度和高度信息的方法：\n\
    \n```\npublic int getBestImageHeight(int imageType);\npublic int getBestImageWidth(int\
    \ imageType);\n```\n\n`imageType` 参数应为 `Display` 的常量之一：`LIST_ELEMENT`、`ALERT`\
    \ 或 `CHOICE_GROUP_ELEMENT`。（你将在本章后面全面了解 `ChoiceGroup`。）如果你正在构建一个列表，可以查询 `Display`\
    \ 以找到元素图像的最佳尺寸。假设你的应用程序中打包了各种尺寸的图标，你可以在运行时选择最佳尺寸的图像。\n"
- fmt: "### Editing a List\n\n`List` provides methods for adding items, removing elements,\
    \ and examining elements. Each element in the `List` has an index. The first element\
    \ is at index 0, the next at index 1, and so forth. You can replace an element\
    \ with `set()` or add an element to the end of the list with `append()`. The `insert()`\
    \ method adds a new element to the list at the given index; this bumps all elements\
    \ at that position and higher up by one.\n\n```\npublic void set(int elementNum,\
    \ String stringPart, Image imagePart)\npublic void insert(int elementNum, String\
    \ stringPart, Image imagePart)\npublic int append(String stringPart, Image imagePart)\n\
    ```\n\nYou can examine the string or image for a given element by supplying its\
    \ index. Similarly, you can use `delete()` to remove an element from the `List`.\n\
    \n```\npublic String getString(int elementNum)\npublic Image getImage(int elementNum)\n\
    public void delete(int elementNum)\n```\n\nMIDP 2.0 also features a `deleteAll()`\
    \ method that removes every element from the `List`.\n\nFinally, the `size()`\
    \ method returns the number of elements in the `List`.\n\nAlthough you usually\
    \ give the MIDP implementation the responsibility of displaying your `List`, new\
    \ methods in MIDP 2.0 give you some control over the appearance of a `List`. The\
    \ first method, `setFitPolicy()`, tells the `List` how it should handle elements\
    \ whose text is wider than the screen. The possible values (from the `Choice`\
    \ interface) are:\n\n*   `TEXT_WRAP_ON` denotes that long elements will be wrapped\
    \ to multiple lines.\n*   `TEXT_WRAP_OFF` denotes that long elements will be truncated\
    \ at the edge of the screen.\n*   `TEXT_WRAP_DEFAULT` indicates that the implementation\
    \ should use its default fit policy.\n\nAnother new method is `setFont()`, which\
    \ allows you to specify the font that will be used for a specific `List` element.\
    \ (Fonts will be fully discussed in [Chapter 10](#LiB0075_split_000.html#408).)\
    \ The current `Font` for an element can be retrieved by calling `getFont()`. Calls\
    \ to `setFitPolicy()` and `setFont()` only serve as hints; it's up to the implementation\
    \ to decide how to display the `List` and whether the requested fit policy or\
    \ font can be honored.\n\n### Working with List Selections\n\nYou can find out\
    \ whether a particular element in a `List` is selected by supplying the element's\
    \ index to the following method:\n\n```\npublic boolean isSelected(int index)\
    \ \n```\n\nFor `EXCLUSIVE` and `IMPLICIT` lists, the index of the single selected\
    \ element is returned from the following method:\n\n```\npublic int getSelectedIndex()\n\
    ```\n\nIf you call `getSelectedIndex()` on a `MULTIPLE` list, it will return -1.\n\
    \nTo change the current selection programmatically, use `setSelectedIndex()`.\n\
    \n```\npublic void setSelectedIndex(int index, boolean selected)\n```\n\nFinally,\
    \ `List` allows you to set or get the selection state *en masse* with the following\
    \ methods. The supplied arrays must have as many array elements as there are list\
    \ elements.\n\n```\npublic int getSelectedFlags(boolean[] selectedArray_return)\n\
    public void setSelectedFlags(boolean[] selectedArray)\n```\n\n### An Example\n\
    \nThe example in [Listing 6-1](#LiB0044_split_001.html#ch06list01) shows a simple\
    \ MIDlet that could be part of a travel reservation application. The user chooses\
    \ what type of reservation to make. This example uses an `IMPLICIT` list, which\
    \ is essentially a menu.\n\n**Listing 6-1: The *TravelList* Source Code**\n\n\
    ```\nimport java.io.*;\nimport javax.microedition.midlet.*;\nimport javax.microedition.lcdui.*;\n\
    \npublic class TravelList\n    extends MIDlet\n    implements CommandListener\
    \ {\n  private List mList;\n  private Command mExitCommand, mNextCommand;\n\n\
    \  public TravelList() {\n    String[] stringElements = { \"Airplane\", \"Car\"\
    , \"Hotel\" };\n    Image[] imageElements = { loadImage(\"/airplane.png\"),\n\
    \        loadImage(\"/car.png\"), loadImage(\"/hotel.png\") };\n    mList = new\
    \ List(\"Reservation type\", List.IMPLICIT,\n        stringElements, imageElements);\n\
    \    mNextCommand = new Command(\"Next\", Command.SCREEN, 0);\n    mExitCommand\
    \ = new Command(\"Exit\", Command.EXIT, 0);\n    mList.addCommand(mNextCommand);\n\
    \    mList.addCommand(mExitCommand);\n    mList.setCommandListener(this);\n  }\n\
    \n  public void startApp() {\n    Display.getDisplay(this).setCurrent(mList);\n\
    \  }\n\n  public void commandAction(Command c, Displayable s) {\n    if (c ==\
    \ mNextCommand || c == List.SELECT_COMMAND) {\n      int index = mList.getSelectedIndex();\n\
    \      Alert alert = new Alert(\"Your selection\",\n        \"You chose \" + mList.getString(index)\
    \ + \".\",\n        null, AlertType.INFO);\n      Display.getDisplay(this).setCurrent(alert,\
    \ mList);\n    }\n    else if (c == mExitCommand)\n      notifyDestroyed();\n\
    \  }\n\n  public void pauseApp() {}\n\n  public void destroyApp(boolean unconditional)\
    \ {}\n\n  private Image loadImage(String name) {\n    Image image = null;\n  \
    \  try {\n      image = Image.createImage(name);\n    }\n    catch (IOException\
    \ ioe) {\n      System.out.println(ioe);\n    }\n\n    return image;\n  }\n} \n\
    ```\n\nTo see images in this example, you'll need to either download the examples\
    \ from the book's Web site or supply your own images. With the J2ME Wireless Toolkit,\
    \ image files should go in the `res` directory of your toolkit project directory.\
    \ `TravelList` expects to find three images named `airplane.png`, `car.png`, and\
    \ `hotel.png`.\n\nConstruction of the `List` itself is very straightforward. Our\
    \ application also includes a `Next` command and an `Exit` command, which are\
    \ both added to the `List`. The `TravelList` instance is registered as the `CommandListener`\
    \ for the `List`. If the `Next` command or the `List`'s `IMPLICIT` command is\
    \ fired off, we simply retrieve the selected item from the `List` and show it\
    \ in an `Alert`.\n\nThe `Next` command, in fact, is not strictly necessary in\
    \ this example since you can achieve the same result by clicking the select button\
    \ on one of the elements in the `List`. Nevertheless, it might be a good idea\
    \ to leave it there. Maybe all of the other screens in your application have a\
    \ `Next` command, so you could keep it for user interface consistency. It never\
    \ hurts to provide the user with more than one way of doing things.\n\nThe difference\
    \ between `EXCLUSIVE` and `IMPLICIT` lists can be subtle. Try changing the `List`\
    \ in this example to `EXCLUSIVE` to see how the user experience is different.\n\
    \n^([[1](#LiB0044_split_001.html#N359)])MIDP implementations are not required\
    \ to recognize all varieties of PNG files. The documentation for the `Image` class\
    \ has the specifics."
