    \ to an image is fine, as is a Graphics object that works on a double-buffered\
    \ Canvas. A Graphics object from GameCanvas's getGraphics() method will also work.\
    \ By contrast, a Graphics object for a non-double-buffered Canvas will throw an\
    \ IllegalStateException if the copyArea() method is called. (See the upcoming\
    \ section on double buffering for more information on the technique.)\n\n### Clipping\n\
    \nGraphics maintains a rectangular *clipping shape*. The clipping shape limits\
    \ drawing, such that any drawing that takes place outside of the clipping shape\
    \ will not be displayed. It's kind of like painting through a stencil, except\
    \ you can only use a rectangular stencil. If you were writing a game that had\
    \ some kind of border on the game board, you might set the clipping rectangle\
    \ to be the inside of the game board, so that no drawing could overwrite the border.\n\
    \nYou can find out the current clipping rectangle by calling getClipX(), getClipY(),\
    \ getClipWidth(), and getClipHeight().\n\nIf you would like to modify the clipping\
    \ rectangle, there are two methods that you can use. First, you can set the clipping\
    \ rectangle directly by calling the following method:\n\n```\npublic void setClip(int\
    \ x, int y, int width, int height);\n```\n\nThe other possibility is to limit\
    \ the current clipping rectangle with another rectangle. The following method\
    \ takes the intersection of the current clipping rectangle and the supplied rectangle\
    \ and uses it to set the new clipping rectangle:\n\n```\npublic void clipRect(int\
    \ x, int y, int width, int height); \n```\n\n## Key Events\n\nCanvas handles events\
    \ at a lower level than the other Displayable subclasses. Although you can add\
    \ Commands and respond to them, Canvas also includes a set of methods that handle\
    \ interaction with the individual keys of a device.\n\nThe following methods are\
    \ called whenever the user presses and releases a key.\n\n```\nprotected void\
    \ keyPressed(int keyCode)\nprotected void keyReleased(int keyCode)\n```\n\nThe\
    \ key code that is passed to these methods will most likely be one of the constants\
    \ defined in Graphics, from KEY_NUM0 through KEY_NUM9 and including KEY_STAR and\
    \ KEY_POUND. Devices may have more keys than this, which will be returned as device-specific\
    \ key codes. Assuming there's an obvious mapping between the key and some Unicode\
    \ character, the rule of thumb is that a key should have a code equal to its Unicode\
    \ character value. Keys that don't have a Unicode mapping should use negative\
    \ values. This means that, given a positive key code, you can find out the corresponding\
    \ Unicode character by casting the int key code to char.\n\nNote that key presses\
    \ and key releases are separate events, which allows you considerable flexibility\
    \ in how you design your user interface. The time between the press and the release\
    \ could determine how high a game character jumps or how powerful a laser blast\
    \ will be.\n\nDepending on the device and the MIDP implementation, a key that\
    \ is held down may spit out repeated key events. You can find out if repeated\
    \ keys are supported by calling hasRepeatEvents(). If repeated key events are\
    \ supported, the keyRepeated() method will be called with these events.\n\nFinally,\
    \ you can find a text description of a given key code by calling getKeyName().\n\
    \nIn MIDP 2.0, the Game API offers a mechanism to bypass the key event callback\
    \ methods. You can poll the state of the device's keys directly using a method\
    \ in GameCanvas. For more information, see the following chapter."
  trans: "\n### 高级图像渲染\n\n在 MIDP 2.0 中，`Graphics` 类还包含一个 `drawRegion()` 方法，用于渲染图像的某个区域，并可能同时对其进行变换。该方法如下所示：\n\
    \n```\npublic void drawRegion(Image src,\n    int x_src, int y_src, int width,\
    \ int height,\n    int transform, int x_dest, int y_dest, int anchor)\n```\n\n\
    参数 `x_src`、`y_src`、`width` 和 `height` 描述了图像中一个矩形区域，该区域将被渲染到 `Graphics` 的绘图表面上。该区域根据锚点绘制在\
    \ `x_dest` 和 `y_dest` 位置，这与 `drawImage()` 方法中的处理方式相同。\n\n`transform` 参数开启了一个全新的可能性世界。它可以是\
    \ `Sprite` 类中定义的任何变换常量，如下所列。（`Sprite` 是 MIDP 2.0 游戏 API 的一部分，将在下一章中介绍。）\n\n* \
    \  `TRANS_NONE`\n*   `TRANS_ROT90`\n*   `TRANS_ROT180`\n*   `TRANS_ROT270`\n*\
    \   `TRANS_MIRROR`\n*   `TRANS_MIRROR_ROT90`\n*   `TRANS_MIRROR_ROT180`\n*   `TRANS_MIRROR_ROT270`\n\
    \n`ROT` 变换将源图像区域旋转 90、180 或 270 度。`MIRROR_ROT` 变换则先将该区域沿其垂直中心镜像，然后再旋转镜像后的区域。\n\
    \n`drawRegion()` 方法使得操作和显示打包在单个图像中的动画帧变得非常容易。\n\n### 作为整数数组的图像\n\n你已经了解了如何将单一颜色表示为整数。以此类推，图像可以表示为整数数组，其中数组中的每个整数包含图像中单个像素的颜色。\n\
    \nMIDP 2.0 支持通过以下方法将整数数组渲染为图像：\n\n```\npublic void drawRGB(int[] rgbData, int\
    \ offset, int scanlength,\n    int x, int y, int width, int height,\n    boolean\
    \ processAlpha) \n```\n\n图像数据包含在 `rgbData` 数组中，从 `offset` 位置开始。连续的行数据以 `scanlength`\
    \ 的倍数作为偏移量进行存储。图像将渲染在 `x` 和 `y` 位置，其大小由 `width` 和 `height` 定义。\n\n`width` 和 `scanlength`\
    \ 之间的关系起初可能有点令人困惑。下面的示例应该能澄清这一点。\n\n考虑以下代码：\n\n```\n int[] rgbData = {\n     \
    \      0x123456, 0x123456, 0x123456,\n           0x000000, 0xffffff, 0xffffff,\
    \ 0x000000, 0x654321, 0x654321,\n           0x000000, 0x000000, 0xffffff, 0x000000,\
    \ 0x654321, 0x654321,\n           0x000000, 0xffffff, 0x000000, 0x000000, 0x654321,\
    \ 0x654321,\n           0x000000, 0xffffff, 0xffffff, 0x000000, 0x654321, 0x654321\n\
    \         };\n\n         g.drawRGB(rgbData, 3, 6, 10, 10, 4, 4, false);\n```\n\
    \n这段代码生成了一个非常小的图像，在图 10-8 中以极大放大倍率显示。通过传递偏移量 3，数组的前三个元素被忽略。尽管图像宽度为 4 个像素，但每行数据在整数数组中相隔\
    \ 6 个位置。该图像将渲染在坐标 (10, 10) 处，大小为 4x4 像素。\n\n![](img/fig200_01.jpg)\n图 10-8：一个非常小的图像\n\
    \n`drawRGB()` 方法的最后一个参数 `processAlpha` 指示整数数组是否包含 alpha（不透明度）分量。如果该参数为 `false`，则图像的每个像素都被视为完全不透明。如果\
    \ `processAlpha` 为 `true`，则每个像素的不透明度由整数值的高位字节决定，并且像素的颜色将与绘图表面适当混合。alpha 值为 0 表示完全透明，而\
    \ alpha 值为 255 表示完全不透明。\n\n### MIDP 2.0 中的位块传输\n\n*位块传输*，即将屏幕的一个区域复制到另一个位置，对于某些类型的游戏来说是一项关键操作。MIDP\
    \ 2.0 的 `Graphics` 类包含一个用于位块传输的方法：\n\n```\npublic void copyArea(int x_src, int\
    \ y_src, int width, int height,\n    int x_dest, int y_dest, int anchor)\n```\n\
    \n这个方法不言自明。它将屏幕的一部分（由 `x_src`、`y_src`、`width` 和 `height` 描述）复制到由 `x_dest`、`y_dest`\
    \ 和 `anchor` 描述的目标位置。锚点的工作方式与 `drawImage()` 方法相同。\n\n此方法仅适用于不直接绘制到屏幕的 `Graphics`\
    \ 对象。绘制到图像的 `Graphics` 对象可以正常工作，在双缓冲 `Canvas` 上工作的 `Graphics` 对象也是如此。来自 `GameCanvas`\
    \ 的 `getGraphics()` 方法的 `Graphics` 对象也可以正常工作。相比之下，对于非双缓冲 `Canvas` 的 `Graphics`\
    \ 对象，如果调用 `copyArea()` 方法，则会抛出 `IllegalStateException`。（有关该技术的更多信息，请参阅即将推出的关于双缓冲的章节。）\n\
    \n### 裁剪\n\n`Graphics` 维护一个矩形的*裁剪形状*。裁剪形状限制了绘图，任何在裁剪形状之外进行的绘图都不会被显示。这有点像通过模板进行绘画，只不过你只能使用矩形模板。如果你正在编写一个游戏，游戏板上有某种边框，你可以将裁剪矩形设置为游戏板的内部区域，这样任何绘图都不会覆盖边框。\n\
    \n你可以通过调用 `getClipX()`、`getClipY()`、`getClipWidth()` 和 `getClipHeight()` 来获取当前的裁剪矩形。\n\
    \n如果你想修改裁剪矩形，有两种方法可以使用。首先，你可以通过调用以下方法直接设置裁剪矩形：\n\n```\npublic void setClip(int\
    \ x, int y, int width, int height);\n```\n\n另一种可能性是用另一个矩形来限制当前的裁剪矩形。以下方法取当前裁剪矩形与提供的矩形的交集，并用它来设置新的裁剪矩形：\n\
    \n```\npublic void clipRect(int x, int y, int width, int height); \n```\n\n##\
    \ 按键事件\n\n`Canvas` 在比其他 `Displayable` 子类更低的层次上处理事件。虽然你可以添加 `Command` 并响应它们，但 `Canvas`\
    \ 还包含一组处理与设备单个按键交互的方法。\n\n每当用户按下和释放按键时，会调用以下方法：\n\n```\nprotected void keyPressed(int\
    \ keyCode)\nprotected void keyReleased(int keyCode)\n```\n\n传递给这些方法的键码很可能是 `Graphics`\
    \ 中定义的常量之一，从 `KEY_NUM0` 到 `KEY_NUM9`，包括 `KEY_STAR` 和 `KEY_POUND`。设备可能拥有比这更多的按键，这些按键将作为设备特定的键码返回。假设按键与某个\
    \ Unicode 字符之间存在明显的映射关系，经验法则是按键的代码应等于其 Unicode 字符值。没有 Unicode 映射的按键应使用负值。这意味着，给定一个正键码，你可以通过将\
    \ `int` 类型的键码强制转换为 `char` 来找到对应的 Unicode 字符。\n\n请注意，按键按下和按键释放是独立的事件，这让你在设计用户界面时拥有相当大的灵活性。按下和释放之间的时间可以决定游戏角色跳多高，或者激光爆炸的威力有多大。\n\
    \n根据设备和 MIDP 实现的不同，按住不放的按键可能会产生重复的按键事件。你可以通过调用 `hasRepeatEvents()` 来了解是否支持重复按键。如果支持重复按键事件，则会调用\
    \ `keyRepeated()` 方法来处理这些事件。\n\n最后，你可以通过调用 `getKeyName()` 来查找给定键码的文本描述。\n\n在 MIDP\
    \ 2.0 中，游戏 API 提供了一种机制来绕过按键事件回调方法。你可以使用 `GameCanvas` 中的方法直接轮询设备按键的状态。更多信息，请参阅下一章。\n"
- fmt: "# Game Actions\n\nKey codes may be useful in certain situations, but they're\
    \ fairly specific to a device. MIDP offers a simple abstraction called a *game\
    \ action* that makes it easier to map user key events to events that will be useful\
    \ for games and other applications with specialized user interfaces.\n\nThe concept\
    \ is simple: Supply a key code to `getGameAction()`, and you'll receive a game\
    \ action—one of the following values: `UP`, `DOWN`, `LEFT`, `RIGHT`, `FIRE`, `GAME_A`,\
    \ `GAME_B`, `GAME_C`, or `GAME_D`. Basically game actions are a way to map the\
    \ physical keys on a device to a set of video game buttons such as you might find\
    \ on game platforms like Sega Genesis or Nintendo Game Boy.\n\nTo understand how\
    \ this maps to a physical device, think about how you might map the `UP`, `DOWN`,\
    \ `LEFT`, and `RIGHT` game actions to keys. On Sun's MIDP emulator, there are\
    \ navigation keys that have an obvious relationship to these game actions. Think\
    \ about a simpler phone, however, one that has only a numeric keypad. In this\
    \ case, you might want to map `UP` to the 2 key, `DOWN` to the 8 key, `LEFT` to\
    \ the 4 key, and `RIGHT` to the 6 key.\n\nUsing game actions saves you from having\
    \ to make these decisions yourself; the MIDP implementation simply provides a\
    \ reasonable mapping for the device. To find the game action for a key code, pass\
    \ the key code to `getGameAction()`. You can also find the key code for a game\
    \ action by calling `getKeyCode()`.\n\nThe following example listens for key presses\
    \ in the `keyPressed()` method. It converts the key code to a game action and\
    \ displays the game action on the screen.\n\n```\nimport javax.microedition.lcdui.*;\n\
    \npublic class KeyCanvas\n    extends Canvas {\n  private Font mFont;\n  private\
    \ String mMessage = \"[Press keys]\";\n\n  public KeyCanvas() {\n    mFont = Font.getFont(Font.FACE_PROPORTIONAL,\n\
    \        Font.STYLE_PLAIN, Font.SIZE_MEDIUM);\n  }\n\n  public void paint(Graphics\
    \ g) {\n    int w = getWidth();\n    int h = getHeight();\n\n    // Clear the\
    \ Canvas.\n    g.setGrayScale(255);\n    g.fillRect(0, 0, w - 1, h - 1);\n   \
    \ g.setGrayScale(0);\n    g.drawRect(0, 0, w - 1, h - 1);\n\n    g.setFont(mFont);\n\
    \    int x = w / 2;\n    int y = h / 2;\n\n    g.drawString(mMessage, x, y, Graphics.BASELINE\
    \ | Graphics.HCENTER);\n  }\n\n  protected void keyPressed(int keyCode) {\n  \
    \  int gameAction = getGameAction(keyCode);\n    switch(gameAction) {\n      case\
    \ UP:     mMessage = \"UP\";             break;\n      case DOWN:   mMessage =\
    \ \"DOWN\";           break;\n      case LEFT:   mMessage = \"LEFT\";        \
    \   break;\n      case RIGHT:  mMessage = \"RIGHT\";          break;\n      case\
    \ FIRE:   mMessage = \"FIRE\";           break;\n      case GAME_A: mMessage =\
    \ \"GAME_A\";         break;\n      case GAME_B: mMessage = \"GAME_B\";      \
    \   break;\n      case GAME_C: mMessage = \"GAME_C\";         break;\n      case\
    \ GAME_D: mMessage = \"GAME_D\";         break;\n      default:     mMessage =\
    \ \"\";               break;\n    }\n    repaint();\n  }\n}\n```\n\nTo run this\
    \ example, you'll need a corresponding MIDlet to display `KeyCanvas`. At this\
    \ point, I think you can do this by yourself.\n\n# Pointer Events\n\nSome devices,\
    \ particularly PDAs, may support a pointer. The popular Palm platform, for example,\
    \ is based around the use of a stylus and a touch-sensitive screen. You can find\
    \ out at runtime if your device supports pointer events by calling `hasPointerEvents()`\
    \ and `hasPointerMotionEvents()`. If the device supports pointer events, the following\
    \ methods get called when the pointer is pressed and released:\n\n```\nprotected\
    \ void pointerPressed(int x, int y)\nprotected void pointerReleased(int x, int\
    \ y) \n```\n\nIf the device supports pointer motion events, the following method\
    \ will be called as the user drags the stylus around the screen.\n\n```\nprotected\
    \ void pointerDragged(int x, int y)\n```\n\n# Double Buffering\n\n*Double buffering*\
    \ is a well-known technique for reducing flicker in drawing and animations. Imagine\
    \ you are implementing an animation that clears and redraws the entire screen\
    \ for each frame of the animation. Without double buffering, the animation will\
    \ flicker badly as the screen is cleared and redrawn. With double buffering, the\
    \ new frame is drawn into an off-screen image (the buffer). When the off-screen\
    \ drawing is complete, the image is drawn on the screen in one smooth, quick move.\
    \ You pay a price in the memory that's needed for the off-screen image, but the\
    \ improvement in the quality of the animation is dramatic.\n\nThe MIDP implementation\
    \ may provide double buffering by default. You can find out whether a `Canvas`\
    \ is double buffered by calling the `isDoubleBuffered()` method.\n\nIf the implementation\
    \ does not give you double buffering, you'll have to do it yourself. Fortunately,\
    \ it's not terribly difficult. The process looks like this:\n\n1.  Create an off-screen\
    \ image by calling the static `Image.createImage(int width, int height)` method.\n\
    \n2.  Obtain a `Graphics` that draws *into the image* by calling `getGraphics()`\
    \ on the `Image`.\n\n3.  Draw stuff into the off-screen image using the `Graphics`\
    \ object.\n\n4.  In the `paint()` method of the `Canvas`, use `drawImage()` to\
    \ put the off-screen image on the `Canvas`.\n\nHere's a `Canvas` subclass that\
    \ creates a simple off-screen image and displays it:\n\n```\nimport javax.microedition.lcdui.*;\n\
    \npublic class OffscreenCanvas\n    extends Canvas {\n  private Image mImage;\n\
    \  public void paint(Graphics g) {\n    if (mImage == null)\n      initialize();\n\
    \    g.drawImage(mImage, 0, 0, Graphics.TOP | Graphics.LEFT);\n  }\n\n  private\
    \ void initialize() {\n    int w = getWidth();\n    int h = getHeight();\n\n \
    \   mImage = Image.createImage(w, h);\n\n    Graphics g = mImage.getGraphics();\n\
    \n    g.drawRect(0, 0, w - 1, h - 1);\n    g.drawLine(0, 0, w - 1, h - 1);\n \
    \   g.drawLine(w - 1, 0, 0, h - 1);\n  }\n}\n```"
