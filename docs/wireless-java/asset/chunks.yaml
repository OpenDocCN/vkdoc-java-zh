  trans: "\n### 编辑列表\n\n列表提供了添加项目、删除元素和检查元素的方法。列表中的每个元素都有一个索引。第一个元素的索引为 0，下一个为 1，依此类推。你可以使用`set()`替换元素，或使用`append()`将元素添加到列表末尾。`insert()`方法在指定索引处向列表添加新元素；这会使该位置及之后的所有元素索引加一。\n\
    \n```\npublic void set(int elementNum, String stringPart, Image imagePart)\npublic\
    \ void insert(int elementNum, String stringPart, Image imagePart)\npublic int\
    \ append(String stringPart, Image imagePart)\n```\n\n你可以通过提供元素的索引来检查其字符串或图像。同样，你可以使用`delete()`从列表中移除元素。\n\
    \n```\npublic String getString(int elementNum)\npublic Image getImage(int elementNum)\n\
    public void delete(int elementNum)\n```\n\nMIDP 2.0 还提供了一个`deleteAll()`方法，用于移除列表中的所有元素。\n\
    \n最后，`size()`方法返回列表中的元素数量。\n\n虽然通常由 MIDP 实现负责显示列表，但 MIDP 2.0 中的新方法让你对列表的外观有了一定控制。第一个方法`setFitPolicy()`告诉列表应如何处理文本宽度超过屏幕的元素。可选值（来自`Choice`接口）如下：\n\
    \n*   `TEXT_WRAP_ON` 表示长元素将自动换行显示。\n*   `TEXT_WRAP_OFF` 表示长元素将在屏幕边缘被截断。\n*   `TEXT_WRAP_DEFAULT`\
    \ 表示实现应使用其默认的适配策略。\n\n另一个新方法是`setFont()`，它允许你指定用于特定列表元素的字体。（字体将在第 10 章中详细讨论。）可以通过调用`getFont()`来获取元素当前的字体。对`setFitPolicy()`和`setFont()`的调用仅作为提示；具体如何显示列表，以及是否满足所请求的适配策略或字体，由实现决定。\n\
    \n### 处理列表选择\n\n你可以通过将元素的索引传递给以下方法，来检查列表中的特定元素是否被选中：\n\n```\npublic boolean isSelected(int\
    \ index) \n```\n\n对于`EXCLUSIVE`和`IMPLICIT`列表，以下方法会返回唯一选中元素的索引：\n\n```\npublic\
    \ int getSelectedIndex()\n```\n\n如果你在`MULTIPLE`列表上调用`getSelectedIndex()`，它将返回-1。\n\
    \n要以编程方式更改当前选择，请使用`setSelectedIndex()`。\n\n```\npublic void setSelectedIndex(int\
    \ index, boolean selected)\n```\n\n最后，列表允许你使用以下方法*批量*设置或获取选择状态。提供的数组必须具有与列表元素数量相同的数组元素。\n\
    \n```\npublic int getSelectedFlags(boolean[] selectedArray_return)\npublic void\
    \ setSelectedFlags(boolean[] selectedArray)\n```\n\n### 示例\n\n清单 6-1 中的示例展示了一个简单的\
    \ MIDlet，它可以是旅行预订应用程序的一部分。用户选择要进行的预订类型。此示例使用了一个`IMPLICIT`列表，本质上是一个菜单。\n\n清单 6-1：*TravelList*\
    \ 源代码\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport java.io.*;\nimport javax.microedition.midlet.*;\n\
    import javax.microedition.lcdui.*;\n\npublic class TravelList\n    extends MIDlet\n\
    \    implements CommandListener {\n  private List mList;\n  private Command mExitCommand,\
    \ mNextCommand;\n\n  public TravelList() {\n    String[] stringElements = { \"\
    Airplane\", \"Car\", \"Hotel\" };\n    Image[] imageElements = { loadImage(\"\
    /airplane.png\"),\n        loadImage(\"/car.png\"), loadImage(\"/hotel.png\")\
    \ };\n    mList = new List(\"Reservation type\", List.IMPLICIT,\n        stringElements,\
    \ imageElements);\n    mNextCommand = new Command(\"Next\", Command.SCREEN, 0);\n\
    \    mExitCommand = new Command(\"Exit\", Command.EXIT, 0);\n    mList.addCommand(mNextCommand);\n\
    \    mList.addCommand(mExitCommand);\n    mList.setCommandListener(this);\n  }\n\
    \n  public void startApp() {\n    Display.getDisplay(this).setCurrent(mList);\n\
    \  }\n\n  public void commandAction(Command c, Displayable s) {\n    if (c ==\
    \ mNextCommand || c == List.SELECT_COMMAND) {\n      int index = mList.getSelectedIndex();\n\
    \      Alert alert = new Alert(\"Your selection\",\n        \"You chose \" + mList.getString(index)\
    \ + \".\",\n        null, AlertType.INFO);\n      Display.getDisplay(this).setCurrent(alert,\
    \ mList);\n    }\n    else if (c == mExitCommand)\n      notifyDestroyed();\n\
    \  }\n\n  public void pauseApp() {}\n\n  public void destroyApp(boolean unconditional)\
    \ {}\n\n  private Image loadImage(String name) {\n    Image image = null;\n  \
    \  try {\n      image = Image.createImage(name);\n    }\n    catch (IOException\
    \ ioe) {\n      System.out.println(ioe);\n    }\n\n    return image;\n  }\n} \n\
    ```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n要查看此示例中的图像，你需要从本书网站下载示例，或提供你自己的图像。使用\
    \ J2ME Wireless Toolkit 时，图像文件应放在工具包项目目录的*res*目录中。TravelList 期望找到三个名为*airplane.png*、*car.png*和*hotel.png*的图像。\n\
    \n列表本身的构造非常简单。我们的应用程序还包含一个**Next**命令和一个**Exit**命令，它们都被添加到列表中。TravelList 实例被注册为列表的`CommandListener`。如果触发了**Next**命令或列表的`IMPLICIT`命令，我们只需从列表中检索选中的项目，并在`Alert`中显示它。\n\
    \n实际上，在此示例中，**Next**命令并非严格必要，因为你可以通过单击列表中某个元素的选择按钮来实现相同的结果。不过，保留它可能是个好主意。也许应用程序中的所有其他屏幕都有**Next**命令，因此你可以为了用户界面的一致性而保留它。为用户提供多种操作方式总没有坏处。\n\
    \n`EXCLUSIVE`和`IMPLICIT`列表之间的区别可能很微妙。尝试将此示例中的列表更改为`EXCLUSIVE`，看看用户体验有何不同。\n\n\
    ^([1])MIDP 实现不需要识别所有类型的 PNG 文件。`Image`类的文档中有具体说明。\n"
- fmt: "## Creating Advanced Interfaces with Forms\n\nA `Form` is a screen that can\
    \ include an arbitrary collection of user-interface controls, called items. In\
    \ a movie ticket reservation MIDlet, you might use a form to allow the user to\
    \ enter a date and a Zip code on one screen.\n\nKeep in mind that the minimum\
    \ screen size for a MID is 96 × 54 pixels. You can't fit a whole lot on a screen\
    \ this size, nor should you try to. Forms that don't fit on the screen will automatically\
    \ scroll as needed, so your MIDlet will be able to show forms, regardless of the\
    \ screen size. Scrolling forms tend to be confusing to users, however, so you\
    \ should keep your forms as small as possible.\n\nThe `javax.microedition.ldcui.Form`\
    \ class itself is fairly simple. One way to create a `Form` is by specifying a\
    \ title:\n\n```\npublic Form(String title) \n```\n\nIn essence, a `Form` is a\
    \ collection of items. Each item is represented by an instance of the `Item` class.\
    \ If you have all the items ahead of time, you can pass them to `Form`'s other\
    \ constructor:\n\n```\npublic Form(String title, Item[] items)\n```\n\nAs a subclass\
    \ of `Screen` and `Displayable`, `Form` inherits both a title and a ticker. Given\
    \ the small screen size of a typical MIDP device, however, you may want to avoid\
    \ using a ticker with your forms.\n\n`Form`'s grandparent class, `Displayable`,\
    \ gives `Form` the capabilities of displaying commands and firing command events.\
    \ Again, you should probably keep commands simple with forms; in many cases a\
    \ `Next` and a `Back` will probably be sufficient.\n\nAs with any `Displayable`,\
    \ the basic strategy for showing a `Form` is to create one and pass it to `Display`'s\
    \ `setCurrent()` method. MIDP 2.0 offers an additional option, the `setCurrentItem()`\
    \ method in `Display`. This method makes the form containing the item visible,\
    \ then it scrolls the form so the item is visible and has input focus.\n\n###\
    \ Managing Items\n\nItems may be added and removed, even while the `Form` is showing.\
    \ The order of items is important, as well; most MIDP implementations will display\
    \ a form's items top to bottom and possibly left to right, scrolling the form\
    \ vertically as needed if there are more items than available screen space.\n\n\
