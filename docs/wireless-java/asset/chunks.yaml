    | MinML | 1.7 | [`www.wilson.co.uk/xml/minml.htm`](http://www.wilson.co.uk/xml/minml.htm)
    | BSD | 14KB | 否 | 推送 |

    | NanoXML | 2.2.2 lite | [`web.wanadoo.be/cyberelf/nanoxml/`](http://web.wanadoo.be/cyberelf/nanoxml/)
    | zlib/libpng | 6KB | 否 | 模型 |

    | TAM | - | [`simonstl.com/projects/tam/`](http://simonstl.com/projects/tam/)
    | MPL | 17KB | 是 | 推送 |

    | TinyXML | 0.7 | [`www.gibaradunn.srac.org/tiny/`](http://www.gibaradunn.srac.org/tiny/)
    | GPL | 6KB | 否 | 模型 |

    | XmlReader | - | [`kobjects.org/utils4me/`](http://kobjects.org/utils4me/) |
    LGPL | 5KB | 是 | 拉取 |

    | XMLtp | 1.7 | [`mitglied.lycos.de/xmltp/`](http://mitglied.lycos.de/xmltp/)
    | BSD | 21KB | 否 | 模型 |

    | Xparse-J | 1.1 | [`www.webreference.com/xml/tools/xparse-j.html`](http://www.webreference.com/xml/tools/xparse-j.html)
    | GPL | 7KB | 是 | 模型 |


    MIDP 列指示解析器源代码是否无需修改即可在 MIDP 平台上编译。


    表 14-2 提供了关于每种许可证类型的更多信息，列出了许可证名称和提供更多信息的 URL。


