    *To Andrew and Elena*


    ## Acknowledgments


    Thanks to all the folks at Apress for helping get this book done. Thanks to Gary
    Cornell for talking me into this book in the first place. Grace Wong was my project
    manager, a job I could never have. She was very nice about all of my delays and
    a pleasure to work with. My copy editor, Rebecca Rider, put up with my formatting
    idiosyncrasies and tightened the book up a lot. Thanks to Michael Yuan for an
    excellent technical review.


    My family now has permission to slap me upside the head if I ever consider taking
    on a project like this again. Thanks to everyone—Kristen, Daphne, Luke, Andy,
    and Elena—for putting up with me.


    ## About the Author


    Jonathan Knudsen is the author of several other Java books, including *Learning
    Java*, *Java 2D Graphics*, and *Java Cryptography*. He is also the author of *The
    Unofficial Guide to LEGO MINDSTORMS Robots*, but, sadly, was unable to parlay
    that success into a full-time career. Jonathan has written numerous articles about
    Java and a few about LEGO robots as well. He is the father of four children and
    enjoys bicycling and playing the piano. For more information, see http://jonathanknudsen.com/.


    # Preface


    This book describes how to program mobile telephones, pagers, and other small
    devices using Java technology. It is about the Mobile Information Device Profile
    (MIDP), which is part of Java 2 Platform, Micro Edition (J2ME). It is concise
    and complete, describing all of MIDP, as well as moving into several advanced
    topics like XML and cryptography.


    This second edition covers MIDP 2.0, which includes many exciting enhancements.
    Three entirely new chapters have been added, and the rest of the book has been
    meticulously updated.


    ## Who are You?


    You''re probably reading this book because you''re excited about building wireless
    applications with Java. This book is aimed at people who already have experience
    programming in Java. At a minimum, you should understand the Java programming
    language and the fundamentals of object-oriented programming. Some chapters delve
    into subjects that in themselves could occupy entire books. These chapters include
    suggested reading if you want to get up to speed on a particular subject.


    If you are unfamiliar with Java, I suggest you read an introductory book or take
    a course. *Learning Java, Second Edition* (O''Reilly 2002) is a good introduction
    to Java for programmers who are already experienced in another language such as
    C or C++.'
