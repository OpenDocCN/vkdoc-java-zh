    \ javax.microedition.midlet.*;\nimport javax.microedition.media.*;\n\npublic class\
    \ MediaInformationMIDlet\n    extends MIDlet\n    implements CommandListener {\n\
    \  private Form mInformationForm;\n\n  public void startApp() {\n    if (mInformationForm\
    \ == null) {\n      mInformationForm =\n          new Form(\"Content types and\
    \ protocols\");\n      String[] contentTypes =\n          Manager.getSupportedContentTypes(null);\n\
    \      for (int i = 0; i < contentTypes.length; i++) {\n        String[] protocols\
    \ =\n            Manager.getSupportedProtocols(contentTypes[i]);\n        for\
    \ (int j = 0; j < protocols.length; j++) {\n          StringItem si = new StringItem(contentTypes[i]\
    \ + \": \",\n              protocols[j]);\n          si.setLayout(Item.LAYOUT_NEWLINE_AFTER);\n\
    \          mInformationForm.append(si);\n        }\n      }\n      Command exitCommand\
    \ = new Command(\"Exit\", Command.EXIT, 0);\n      mInformationForm.addCommand(exitCommand);\n\
    \      mInformationForm.setCommandListener(this);\n    }\n    Display.getDisplay(this).setCurrent(mInformationForm);\n\
    \  }\n\n  public void pauseApp() {}\n\n  public void destroyApp(boolean unconditional)\
    \ {}\n\n  public void commandAction(Command c, Displayable s) {\n    notifyDestroyed();\n\
    \  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n图 12-4 显示了在 J2ME 无线工具包模拟器（2.0\
    \ beta 2 版本）上运行 `MediaInformationMIDlet` 的结果。关于此列表，需要理解三点：\n\n1.  HTTP 是一种文件传输协议，而非流媒体协议。如果你通过\
    \ HTTP 指定媒体文件，则整个文件将在播放开始前下载完毕。相比之下，某些设备可能支持真正的流协议，如 RTP（参见 [`www.ietf.org/rfc/rfc1889.txt`](http://www.ietf.org/rfc/rfc1889.txt)）。\n\
    \n2.  “audio/x-tone-seq”内容类型并非真正的采样音频；它是音调序列的一种特殊情况，我稍后会介绍。\n\n3.  该列表包含来自无线工具包\
    \ MMAPI 实现的一些功能和内容类型（视频、MIDI、音频捕获）。如果你想查看支持的内容类型和协议的精简列表，请按照本章末尾的描述关闭 MMAPI 支持。\n\
    \n![](img/fig246_01.jpg)\n图 12-4：在工具包 2.0 beta2 模拟器上运行的 *MediaInformationMIDlet*\n\
    \n要查找现有 Player 的内容类型，只需调用 `getContentType()`。\n\n## Player 生命周期\n\n由于播放音频可能会占用\
    \ MIDP 设备上的稀缺资源，并且采样音频文件相对较大，因此 Player 具有详细的生命周期，可以严格控制其行为。生命周期用 *状态* 来描述，由 Player\
    \ 接口中的常量表示。Player 生命周期中状态的通常顺序如下：\n\n*   Player 的生命始于 UNREALIZED 状态。这意味着已创建 Player\
    \ 实现，但它尚未尝试查找要渲染的音频数据，也未尝试获取音频硬件等资源。\n\n*   当 Player 定位到媒体数据后（例如通过发起网络连接并发送标头），它会进入\
    \ REALIZED 状态。\n\n*   下一个状态是 PREFETCHED，表示 Player 已完成准备开始渲染音频所需的所有其他操作。这可能包括获取音频硬件的控制权、填充缓冲区或其他操作。\n\
    \n*   当 Player 开始渲染音频数据时，它处于 STARTED 状态。\n\n*   最后一个状态是 CLOSED，表示 Player 已释放所有资源，关闭所有网络连接，并且无法再次使用。\n\
    \n*   Player 包含一组相应的方法，用于在状态之间转换：\n\n    ```\n    public void prefetch()\n   \
    \ public void realize()\n    public void start()\n    ```\n\n这些方法在大多数情况下按预期工作。如果你跳过某个步骤，则会隐含中间状态。在上面的示例中，我在新创建的\
    \ Player 上调用了 `start()`，这隐含了对 `prefetch()` 和 `realize()` 的调用。\n\n如果在定位媒体数据或获取系统资源时出现任何问题，这些方法会抛出\
    \ `MediaException`。\n\n其他几个方法允许向后状态转换，尽管它们的名称不那么直观。`stop()` 方法将 STARTED 状态的 Player\
    \ 带回 PREFETCHED 状态。`deallocate()` 方法通过释放资源，将 PREFETCHED 或 STARTED 状态的 Player 移回\
    \ REALIZED 状态。`deallocate()` 方法还有一个额外的特点；它可以将卡在尝试定位其媒体（在 `realize()` 过程中）的 UNREALIZED\
    \ 状态的 Player 带回 UNREALIZED 状态。\n\n最后，`close()` 方法将任何状态的 Player 移至 CLOSED 状态。所有资源被释放，所有网络连接被关闭，并且\
    \ Player 无法再次使用。\n\n你可以通过调用 `getState()` 来获取 Player 的当前状态。\n\n现在你已经了解了 Player\
    \ 的生命周期，或许可以想象出改进上述简单 `AudioMIDlet` 的方法。例如，你可以对新创建的 Player 调用 `prefetch()`，以确保在用户选择\
    \ **Play** 命令后能尽快开始播放。你可能没有注意到太多延迟，但真实设备的运行速度会慢得多：\n\n*   运行模拟器的桌面计算机比 MIDP 设备拥有更强大的处理能力和更多的内存。\n\
    *   桌面上的模拟器可能拥有比真实 MIDP 设备快得多的网络连接。\n*   `AudioMIDlet` 使用的文件 `relax.wav` 非常小（1530\
    \ 字节）。较大的媒体文件会产生更明显的延迟。\n\n与网络和持久存储操作一样，任何与 Player 相关的耗时操作都应在与用户界面线程分离的线程中执行。虽然\
    \ `start()` 方法不会阻塞，但 `realize()` 和 `prefetch()` 在完成其可能缓慢的工作之前不会返回。\n"
- fmt: "# Controlling Players\n\nA Player's *media time* is its current position in\
    \ the audio playback. For example, a Player that is halfway through a 4-second\
    \ audio clip would have a media time of 2,000,000 microseconds. If you want to\
    \ jump to a particular point in an audio clip, call `setMediaTime()`. You can\
    \ find out the current media time using `getMediaTime()`. The total time represented\
    \ by the audio clip is returned from `getDuration()`. For some types of streaming\
    \ media, the duration cannot be determined, in which case the special value `TIME_UNKNOWN`\
    \ will be returned.\n\nPlayers can also loop, which means the audio clip is played\
    \ over and over again. You can control this behavior by calling `setLoopCount()`\
    \ before the Player is started. Pass a value of `-1` to loop indefinitely.\n\n\
    Beyond the Player interface is a whole world of Controls. You can obtain a list\
    \ of Controls for a Player by calling `getControls()` (a method Player inherits\
    \ from the `Controllable` interface). This method returns an array of Controls\
    \ that are appropriate for the Player. The ABB only defines a `VolumeControl`\
    \ and a `ToneControl`, but implementations are free to provide other controls\
    \ appropriate for the content types and protocols they support.\n\nTo obtain just\
    \ one control, pass its name to Player's `getControl()` method (again inherited\
    \ from `Controllable`). The name is the name of an interface in the `javax.microedition.media.control`\
    \ package.\n\nThe Player must be in at least a `REALIZED` state to return its\
    \ controls.\n\nTo use a `VolumeControl` to set playback volume to half its maximum,\
    \ for example, you would do something like this:\n\n```\n// Player player = Manager.createPlayer(...);\n\
    player.prefetch();\nVolumeControl vc = (VolumeControl)player.getControl(\"VolumeControl\"\
    );\nvc.setLevel(50);\n```\n\n## Listening for Player Events\n\nPlayer includes\
    \ methods for adding and removing listeners that will be notified about various\
    \ milestones in the Player's life:\n\n```\npublic void addPlayerListener(PlayerListener\
    \ playerListener)\npublic void removePlayerListener(PlayerListener playerListener)\n\
    ```\n\n`PlayerListener` defines a single method that is called with a variety\
    \ of informational messages:\n\n```\npublic void playerUpdate(Player player, String\
    \ event, Object eventData)\n```\n\nThe `player` parameter, of course, is the Player\
    \ generating the event. The event is described by a string, `event`, and may include\
    \ additional information, `eventData`. Constants in the `PlayerListener` interface\
    \ describe common events: `STARTED`, `END_OF_MEDIA`, and `VOLUME_CHANGED` are\
    \ a few. See the API documentation for the full list.\n\n## Tones and Tone Sequences\n\
    \nYou've already seen how easy it is to play single tones using Manager. There's\
    \ a somewhat more sophisticated tone sequence player lurking in the MIDP 2.0 media\
    \ APIs. It's implemented within the Player and Control architecture, which is\
    \ kind of a kluge, considering that tone sequences have little in common with\
    \ sampled audio.\n\nTo obtain the tone sequence Player, just pass a special value\
    \ (Manager's `TONE_DEVICE_LOCATOR`) to `createPlayer()`. If you examine `TONE_DEVICE_LOCATOR`,\
    \ you'll see it is the value `\"device://tone\"`, which kind of means a \"device\"\
    \ protocol and an `\"audio/x-tone-seq\"` content type. You may remember seeing\
    \ this in the output of `MediaInformationMIDlet`. As I said, it's kind of a kluge.\n\
    \nOnce you've obtained the tone sequence Player, you can give it a tone sequence\
    \ using its associated `ToneControl` object. To get this control, call `getControl(\"\
    ToneControl\")`. (Remember, the Player needs to be `REALIZED` first.)\n\n`ToneControl`\
    \ encapsulates a byte array whose syntax and construction is obtusely described\
    \ in the API documentation. Master it and you'll be able to make any song into\
    \ a monophonic masterpiece, Bobby McFerrin style. I'll describe the byte array\
    \ format and present several examples.\n\nThe tones themselves are defined with\
    \ note number and duration pairs. Note numbers are the same as for Manager's `playTone()`\
    \ method, where 60 is middle C and 69 is the 440-Hz A above middle C. Duration\
    \ is specified as multiples of the *resolution.* By default, the resolution of\
    \ a tone sequence is 1/64 of one measure of 4/4 time (four beats). Therefore,\
    \ a duration of 64 corresponds to a whole note (four beats), 16 corresponds to\
    \ a quarter note (one beat), 8 is an eighth note, and so on.\n\nAll tone sequences\
    \ must begin with a version. This is not the version of your data, but rather\
    \ the version of the tone sequence format you're using. Currently the only accepted\
    \ version is 1. A simple tone sequence looks like this:\n\n```\nbyte[] sequence\
    \ = new byte[] {\n  ToneControl.VERSION, 1,\n  67, 16, // The\n  69, 16, // hills\n\
    \  67,  8, // are\n  65,  8, // a -\n  64, 48, // live\n  62,  8, // with\n  60,\
    \  8, // the\n  59, 16, // sound\n  57, 16, // of\n  59, 32, // mu -\n  59, 32\
    \  // sic\n}; \n```\n\nThis tone sequence relies on several default values. The\
    \ default tempo is 120 beats per minute (bpm) and the default resolution is 1/64.\
    \ The default volume is 100 (the loudest).\n\nThere are other features available\
    \ in tone sequences. A reasonable amount of control is possible:\n\n- Set the\
    \ tempo by using the `TEMPO` constant and passing the tempo, in beats per minute,\
    \ divided by four. For example, `ToneControl.TEMPO, 15` sets the tempo to 60 bpm,\
    \ or one beat per second. This may be done only once at the beginning of a sequence\
    \ (following the `VERSION`).\n\n- The resolution can be changed from its default\
    \ of 1/64 using the `RESOLUTION` constant. The argument that is passed is the\
    \ denominator, for example, using `ToneControl.RESOLUTION, 64` will restore the\
    \ default resolution of 1/64. This may be done only once at the beginning of a\
    \ sequence (following the `TEMPO`).\n\n- Reusable *blocks* of tones can be defined.\
    \ To begin a block definition, use `ToneControl.BLOCK_START` and supply a block\
    \ number. Then supply the notes and durations that go into the block. To end a\
    \ block definition, use `ToneControl.BLOCK_END` and supply the same block number.\
    \ To actually play a block, use `ToneControl.PLAY_BLOCK` and supply the number\
    \ of the block you wish to play. Blocks must be defined following the `VERSION`,\
    \ `TEMPO`, and `RESOLUTION` in a sequence.\n\n- The volume can be set at any time\
    \ during a sequence for dramatic dynamic effects. For example, `ToneControl.SET_VOLUME,\
    \ 25` sets the volume to one quarter of its maximum value.\n\n- To indicate a\
    \ rest of a certain duration, use the special note value `ToneControl.SILENCE`.\n\
    \n- You can repeat a single note multiple times. For example, `ToneControl.REPEAT,\
    \ 7, 60, 16` plays middle C (60) 7 times with a duration of 16."
