  trans: "\n## 使用表单创建高级界面\n\n表单是一种屏幕，可以包含任意一组用户界面控件，这些控件称为项目。在电影票预订 MIDlet 中，你可以使用表单让用户在一个屏幕上输入日期和邮政编码。\n\
    \n请记住，MID 的最小屏幕尺寸为 96 × 54 像素。你无法在这个尺寸的屏幕上容纳太多内容，也不应尝试这样做。无法完全显示在屏幕上的表单会自动滚动，因此无论屏幕尺寸如何，你的\
    \ MIDlet 都能显示表单。不过，滚动表单往往会让用户感到困惑，因此应尽量保持表单简洁。\n\n`javax.microedition.ldcui.Form`\
    \ 类本身相当简单。创建表单的一种方法是指定标题：\n\n```\npublic Form(String title) \n```\n\n本质上，表单是一个项目的集合。每个项目由\
    \ `Item` 类的实例表示。如果你提前准备好了所有项目，可以将它们传递给 Form 的另一个构造函数：\n\n```\npublic Form(String\
    \ title, Item[] items)\n```\n\n作为 `Screen` 和 `Displayable` 的子类，`Form` 继承了标题和滚动条。然而，考虑到典型\
    \ MIDP 设备屏幕尺寸较小，你可能应避免在表单中使用滚动条。\n\nForm 的父类 `Displayable` 赋予了 Form 显示命令和触发命令事件的能力。同样，你应尽量保持表单中的命令简单；在许多情况下，一个**下一步**和一个**返回**可能就足够了。\n\
    \n与任何 `Displayable` 一样，显示表单的基本策略是创建一个表单并将其传递给 `Display` 的 `setCurrent()` 方法。MIDP\
    \ 2.0 提供了一个额外的选项，即 `Display` 中的 `setCurrentItem()` 方法。此方法会使包含该项目的表单可见，然后滚动表单，使该项目可见并获得输入焦点。\n\
    \n### 管理项目\n\n即使在表单显示时，也可以添加和移除项目。项目的顺序也很重要；大多数 MIDP 实现会从上到下、可能从左到右显示表单的项目，如果项目数量超过屏幕可用空间，则会根据需要垂直滚动表单。\n\
    \n要将项目添加到表单底部，请使用 `append()` 方法之一。第一个方法可用于添加任何 `Item` 实现。后两个 `append()` 方法纯粹是为了方便；在后台，会为你创建一个\
    \ `StringItem` 或 `ImageItem`。\n\n```\npublic int append(Item item)\npublic int\
    \ append(String str)\npublic int append(Image image)\n```\n\n表单中的每个项目都有一个索引。你可以使用以下方法将项目放置在特定索引处（替换该索引处的先前项目）：\n\
    \n```\npublic void set(int index, Item item) \n```\n\n或者，如果你想在表单中间某处添加项目，只需为 `insert()`\
    \ 方法提供新项目所需的索引即可。后续项目的索引将依次递增一位。\n\n```\npublic void insert(int index, Item item)\n\
    ```\n\n要从表单中移除项目，请使用 `delete()`。\n\n```\npublic void delete(int index)\n```\n\n\
    MIDP 2.0 还包含一个 `deleteAll()` 方法，用于移除表单的所有项目。\n\n如果你忘记了表单中放置的内容，可以通过以下方法获取项目数量并检索它们：\n\
    \n```\npublic int size()\npublic Item get(int index)\n```\n\n### 理解表单布局\n\n在 MIDP\
    \ 1.0 实现中，表单大多是垂直排列的。通常，添加到表单的项目会垂直堆叠显示。如果项目无法全部显示在屏幕上，表单允许用户根据需要滚动。\n\n此规则的例外是\
    \ `StringItem` 和 `ImageItem`。如果屏幕上有足够空间，这些项目可能会从左到右排列。然而，具体如何布局表单由实现决定。在 J2ME\
    \ Wireless Toolkit 1.0.1 模拟器中，`StringItem` 和 `ImageItem` 始终垂直堆叠。\n\nMIDP 2.0 通过增加对更具体布局的支持，承认了\
    \ MIDP 设备屏幕不断扩大的趋势。在 `javax.microedition.lcdui.Form` 文档的“布局”部分，有对布局算法的详尽描述。简而言之，Form\
    \ 尝试从左到右按行排列项目，并从上到下堆叠行，就像页面上的英文文本一样。正如你将看到的，`Item` 类在 MIDP 2.0 中包含了额外的机制，允许对单个项目的布局进行一定控制。\n\
    \n### 项目工具箱\n\nMIDP 规范包含一个方便的项目工具箱，可用于构建表单。我将在本节中简要介绍每个项目，并展示其中一些项目在 Sun 的 MIDP\
    \ 参考实现中的外观。\n"
- fmt: '#### The `Item` Class


    All of the items that can be added to forms descend from the class `javax.microedition.lcdui.Item`.
    In MIDP 1.0, `Item` doesn''t specify much, just a `getLabel()` and `setLabel()`
    method. All `Item`s have a string label, although it may or may not be shown by
    the specific subclass.


    MIDP 2.0 expands the `Item` class considerably in two areas. The first is command
    handling. In MIDP 2.0, `Item`s can have commands, just like `Displayable`s. When
    an `Item` is selected in a form, the `Item`''s commands are shown along with the
    commands in the form. [Figure 6-3](#LiB0045.html#ch06fig03) shows a form with
    four string items, cunningly named "one," "two," "three," and "four." The form
    itself has one command, "Exit." None of the string items has commands, except
    for "three," which has one command named "Details."


    ![](fig106_01.jpg)

    Figure 6-3: Item "three" has a command.


    Note how the toolkit emulator indicates the presence of one or more commands on
    the item with a light underline. When you navigate through the form to the item
    with the additional command, it shows up just like any other command, as shown
    in [Figure 6-4](#LiB0045.html#ch06fig04).


    ![](fig107_01.jpg)

    Figure 6-4: When an item is selected, its commands are shown.


    The semantics for managing item commands are nearly identical to the semantics
    for managing form commands. You can manage the commands on an `Item` using `addCommand()`
    and `removeCommand()`. Note that the command type should be `ITEM` for commands
    added to `Item`, although no exception will be thrown if this is not true. A command
    listener may be assigned using the `setItemCommandListener()` method. The `ItemCommandListener`
    interface contains a single method, similar to `CommandListener`''s single method:


    ```

    public void commandAction(Command c, Item item)

    ```


    It''s up to the implementation to figure out how to show commands for an item.
    All you do in a MIDlet is add commands, set a listener, and wait for command events.


    `Item`s also support a *default command*. This command may be invoked if the runtime
    device has a button or knob or other user interface control that is appropriate
    for a default command. You can set an `Item`''s default command by calling `setDefaultCommand()`.


    `Item`''s greatest API changes in MIDP 2.0 are related to layout control. `Item`s
    have a *minimum size* and a *preferred size* that can be used to control how large
    an item appears in a form. The minimum size is computed by the implementation
    and can be retrieved using `getMinimumWidth()` and `getMinimumHeight()`. The minimum
    size depends on the contents of the `Item` and can be changed by the implementation
    every time the contents change. There''s no way to change an item''s minimum size,
    but examining the minimum size may be useful to your application in deciding how
    to lay out a form.


    The preferred size, by contrast, can either be computed by the implementation
    or specified by you. The default values for preferred width and height are `-1`,
    a special value that tells the implementation "I don''t care, you go ahead and
    figure out the best size for this item." If you pass a specific positive value
    for the width or height in `setPreferredSize()`, that dimension is said to be
    *locked* and the implementation will attempt to use it during layout.


    The `getPreferredWidth()` and `getPreferredHeight()` methods don''t always return
    the values you''ve passed to `setPreferredSize()`. For example, if you''ve unlocked
    the width and height by calling `setPreferredSize(-1, -1)` the values returned
    from `getPreferredWidth()` and `getPreferredHeight()` are the preferred sizes
    that the implementation has computed.


    Finally, the MIDP 2.0 `Item` class includes a layout directive, accessed using
    `getLayout()` and `setLayout()`. Represented by an integer, the layout value is
    usually a combination of `LAYOUT_2` (a flag indicating MIDP 2.0 layout), a horizontal
    value and a vertical value. `LAYOUT_2` is a flag to the implementation that the
    item should be laid out using MIDP 2.0 rules. The horizontal values are


    *   `LAYOUT_LEFT`

    *   `LAYOUT_RIGHT`

    *   `LAYOUT_CENTER`


    The vertical values are


    *   `LAYOUT_TOP`

    *   `LAYOUT_BOTTOM`

    *   `LAYOUT_VCENTER`


    In addition, a layout value may include *shrinking* or *expanding*. Shrinking
    means that an item''s minimum width or height is used, while expanding means that
    an item''s size is stretched to fill the available width or row height. The constants
    for shrinking and expanding are


    *   `LAYOUT_SHRINK` (for width)

    *   `LAYOUT_EXPAND` (for width)

    *   `LAYOUT_VSHRINK` (for height)

    *   `LAYOUT_VEXPAND` (for height)


    Finally, an `Item`''s layout may include a request for a new line before or after
    the item using the `LAYOUT_NEWLINE_BEFORE` or `LAYOUT_NEWLINE_AFTER` constants.
    Items are laid out in Forms much like text flows on a page, so these constants
    allow you to request a new row before or after an item.


    [Figure 6-5](#LiB0045.html#ch06fig05) shows a simple example, three components
    with the following layouts:


    *   `LAYOUT_2 | LAYOUT_LEFT | LAYOUT_NEWLINE_AFTER`

    *   `LAYOUT_2 | LAYOUT_CENTER | LAYOUT_NEWLINE_AFTER`

    *   `LAYOUT_2 | LAYOUT_RIGHT | LAYOUT_NEWLINE_AFTER`


    ![](fig109_01.jpg)

    Figure 6-5: Form layout example


    #### `StringItem`


    `StringItem` represents a simple text label. For example, consider the following
    code:


    ```

    Form form = new Form("Form Title");

    StringItem stringItem = new StringItem("Label: ", "Value");

    form.append(stringItem);

    ```


    The form produced by this code (plus a **Back** command) is shown in [Figure 6-6](#LiB0045.html#ch06fig06).


    ![](fig110_01.jpg)

    Figure 6-6: A form with a single `StringItem` and a **Back** command


    You can use `null` for the `StringItem`''s label or value to indicate that it
    should not be shown on the screen. (Better yet, you could just use `Form`''s `append(String)`
    method.) `StringItem` inherits `setLabel()` and `getLabel()` methods from `Item`.
    It also includes `getText()` and `setText()` methods for accessing and adjusting
    the string value.


    MIDP 2.0 adds support for *appearance modes* for both `StringItem` and `ImageItem`.
    The appearance mode allows the item to look like a URL link or a button, although
    in all other respects the item behaves the same as a regular `StringItem` or `ImageItem`.
    The three appearance modes (which are defined in the `Item` class) are


    *   `PLAIN` shows the item in its normal state.

    *   `HYPERLINK` shows the item as a URL. A typical action would be to attempt
    to open the link using `MIDlet`''s `platformRequest()` method.

    *   `BUTTON` shows the item as a button. Note that this may be clumsy, especially
    on devices without pointer events, and you should generally use a `Command` where
    you feel tempted to use an item with a `BUTTON` appearance mode.


    As with almost everything else in the `javax.microedition.lcdui` package, it''s
    the implementation''s responsibility to show different appearance modes, and your
    application may look different on different devices. Furthermore, it is your application''s
    responsibility to implement appropriate behavior. For example, you might want
    to add a command to a `HYPERLINK` `StringItem` that calls `MIDlet`''s `platformRequest()`
    method to open the link.


    |  | Note | The J2ME Wireless Toolkit beta release emulators don''t show `HYPERLINK`
    or `BUTTON` `StringItem`s any differently from `PLAIN` ones, except for one special
    case. If the `StringItem` has a `BUTTON` type and it has an associated item command,
    it is shown with a beveled border. |


    Finally, MIDP 2.0 offers `getFont()` and `setFont()` methods in the `StringItem`
    class. I''ll describe the `Font` class in [Chapter 10](#LiB0075_split_000.html#408).


    #### `Spacer` in MIDP 2.0


    MIDP 2.0 introduces a new `Item`, `Spacer`, that represents empty space in a `Form`.
    It may be used for layout purposes. All you need to do is specify a minimum width
    and height:


    ```

    public Spacer(minWidth, minHeight)

    ```'
