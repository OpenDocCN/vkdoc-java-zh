  trans: "\n## 理解图层\n\nGame API 的其余部分专门用于处理*图层*。图层是可以组合起来创建完整场景的图形元素。例如，你可能有一个山脉背景、一个城市建筑背景，以及前景中的几个较小元素：人物、飞船、汽车等等。\n\
    \n组合图层的技术类似于传统的手绘动画。背景和前景图像绘制在透明赛璐珞片上，这些赛璐珞片一层层叠放，然后拍摄下来形成最终场景。\n\n在 Game API\
    \ 中，`javax.microedition.lcdui.game.Layer` 类的实例代表一个图层。`Layer` 是一个抽象类，有两个具体的子类。`Layer`\
    \ 本身相当简单。它有位置、大小，并且可以设置为可见或不可见。位置和大小通过以下方法进行访问和修改，这些方法不言自明：\n\n```\npublic final\
    \ int getX()\npublic final int getY()\npublic final int getWidth()\npublic final\
    \ int getHeight()\npublic void setPosition(int x, int y) \n```\n\n`Layer` 还提供了一个便捷的方法，用于相对于当前位置移动。将像素偏移量传递给以下方法，即可调整图层的位置：\n\
    \n```\npublic void move(int dx, int dy)\n```\n\n图层的可见性通过 `getVisible()` 和 `setVisible()`\
    \ 方法访问。\n\n`Layer` 中的最后一个方法是 `paint()`，它被声明为抽象方法。子类重写此方法以定义它们的外观。\n\n## 管理图层\n\
    \n在我介绍 `Layer` 的具体子类之前，我将解释如何将图层组合起来形成完整的场景。你可以自己完成，维护一个图层列表，并使用它们的 `paint()`\
    \ 方法绘制每个图层。幸运的是，Game API 包含了 `LayerManager`，这是一个为你处理大部分细节的类。要创建一个 `LayerManager`，只需调用它的无参构造方法。\n\
    \n`LayerManager` 的主要工作是维护一个有序的图层列表。图层有一个索引，指示它们从前到后的位置。位置 0 在最顶层，最靠近用户，而索引越大，则越靠后，越远离用户。（图层的顺序有时被称为\
    \ *z* *顺序*）。\n\n可以使用以下方法将图层添加到列表的底部：\n\n```\npublic void append(Layer l)\n```\n\
    \n你可以使用 `insert()` 在特定位置添加图层：\n\n```\npublic void insert(Layer l, int index)\n\
    ```\n\n例如，你可以通过在索引 0 处插入一个图层，将其添加到列表的顶部。\n\n你可以通过调用 `getSize()` 来查找 `LayerManager`\
    \ 中的图层数量。如果你想检索特定位置的图层，可以将索引传递给 `getLayerAt()` 方法。\n\n最后，你可以通过将 `Layer` 对象传递给\
    \ `remove()` 方法来移除一个图层。\n\n`LayerManager` 包含一个*视图窗口*的概念，即场景中将要被绘制的矩形部分。其假设是整体场景大于设备屏幕，因此任何时候都只会绘制一部分。默认情况下，视图窗口的原点在\
    \ (0, 0)，并且尺寸尽可能大（宽度和高度均为 `Integer.MAX_VALUE`）。你可以使用以下方法设置视图窗口，其中 x 和 y 坐标是相对于\
    \ `LayerManager` 原点的。\n\n```\npublic void setViewWindow(int x, int y, int width,\
    \ int height)\n```\n\n要实际绘制由 `LayerManager` 的图层所代表的场景，请调用 `paint()` 方法：\n\n```\n\
    public void paint(Graphics g, int x, int y)\n```\n\n场景的视图窗口将使用给定的 `Graphics` 对象在指定位置绘制，该位置是在\
    \ `Graphics` 的坐标系中指定的。\n\n如果你对图层管理器、其图层及其视图窗口之间的关系仍然模糊不清，请参阅 `LayerManager` 的\
    \ API 文档，其中包含两个非常有帮助的图示。\n\n## 使用平铺图层\n\n平铺图层由一组图块构成，就像你可以在浴缸旁组装装饰性瓷砖来创建漂亮的图案一样。这些图块来自一个被分割成等大小部分的单一图像。\n\
    \n`TiledLayer` 使用从 `Layer` 继承的 `paint()` 方法绘制在 `Graphics` 对象上。像任何其他 `Layer` 一样，平铺图层在\
    \ `Graphics` 的坐标系中，在其当前位置渲染自身。此外，像任何其他 `Layer` 一样，平铺图层可以是 `LayerManager` 的一部分，并且可以在使用*其*\
    \ `paint()` 方法渲染 `LayerManager` 时自动渲染。\n\n例如，图 11-1 宽 240 像素，高 96 像素。\n\n![点击展开](img/fig219_01_0.jpg)\n\
    图 11-1：平铺图层的源图像\n\n该图像可以分割成 10 个方形图块，每个图块的宽度和高度均为 48 像素。图块的编号如图 11-2 所示。\n\n![](img/fig220_01.jpg)\n\
    图 11-2：图块编号\n\n该图像可以有几种不同的布局方式来达到相同的结果。另外两种可能的布局方式如图 11-3 所示。\n\n![](img/fig220_02.jpg)\n\
    图 11-3：其他图块图像布局\n\n请注意，图块索引从 1 开始编号，而行号和列号从 0 开始。\n\n平铺图层本身是一个*单元格*网格，每个单元格由一个图块占据。你在构造时指定平铺图层的行数和列数。平铺图层的确切尺寸如下：\n\
    \n```\n宽度 = [列数] x [图块宽度]\n高度 = [行数] x [图块高度] \n```\n"
- fmt: "### Creating and Initializing a `TiledLayer`\n\nTo create a `TiledLayer`,\
    \ supply the number of columns and rows, the source image, and the tile dimensions\
    \ to the constructor:\n\n```\npublic TiledLayer(int columns, int rows,\n    Image\
    \ image, int tileWidth, int tileHeight)\n```\n\nThe image and tile dimensions\
    \ describe a *static tile set*. You can change the static tile set on an existing\
    \ `TiledLayer` with the following method:\n\n```\npublic void setStaticTileSet(Image\
    \ image, int tileWidth, int tileHeight)\n```\n\nThe number of columns and rows\
    \ in a `TiledLayer` can be retrieved with `getColumns()` and `getRows()`. To retrieve\
    \ the tile dimensions, use `getCellWidth()` and `getCellHeight()`. (Although the\
    \ method naming isn't quite consistent, this works because the pixel size of each\
    \ cell is the same as the pixel size of the tiles.)\n\nA `TiledLayer` is empty\
    \ when you first create it. To assign a tile to a cell, use this method:\n\n```\n\
    public void setCell(int col, int row, int tileIndex)\n```\n\nAll the cells in\
    \ the `TiledLayer` are initially filled with tile index 0, which indicates a blank\
    \ tile. You can retrieve the tile index of a particular cell by passing its column\
    \ and row number to `getCell()`. If you would like to assign the same tile to\
    \ a range of cells, use the `fillCells()` method:\n\n```\npublic void fillCells(int\
    \ col, int row, int numCols, int numRows,\n    int tileIndex)\n```\n\nThe `col`,\
    \ `row`, `numCols`, and `numRows` parameters describe a rectangular region of\
    \ cells that will be filled with the specified tile. For example, `fillCells(2,\
    \ 0, 1, 2, 6)` would assign tile 6 to the cells in the first and second rows of\
    \ the third column of the tiled layer.\n\nThe following excerpt (adapted from\
    \ *QuatschCanvas.java* in the source code download for this book, available from\
    \ [http://www.apress.com/](http://www.apress.com/)) demonstrates one way to create\
    \ and initialize a `TiledLayer`.\n\n```\nImage backgroundImage = Image.createImage(\"\
    /background_tiles.png\");\nTiledLayer background = new TiledLayer(8, 4, backgroundImage,\
    \ 48, 48);\nbackground.setPosition(12, 0);\nint[] map = {\n  1, 2, 0, 0, 0, 0,\
    \ 0, 0,\n  3, 3, 2, 0, 0, 0, 5, 0,\n  3, 3, 3, 2, 4, 1, 3, 2,\n  6, 6, 6, 6, 6,\
    \ 6, 6, 6\n};\nfor (int i = 0; i < map.length; i++) {\n  int column = i % 8;\n\
    \  int row = (i - column) / 8;\n  background.setCell(column, row, map[i]);\n}\n\
    ```\n\nUsing the source image of [Figure 11-1](#LiB0090.html#ch11fig01), this\
    \ code produces the tiled layer shown in [Figure 11-4](#LiB0090.html#ch11fig04).\n\
    \n[![Click To expand](fig222_01.jpg)](fig222_01_0.jpg)\nFigure 11-4: A tiled layer\n\
    \nYou now know almost everything there is to know about `TiledLayer`; it serves\
    \ as a simple map between a palette of tiles and a fully assembled layer.\n\n\
    ### Using Animated Tiles\n\nThere is one additional wrinkle, *animated* tiles.\
    \ An animated tile is a virtual tile whose mapping can be changed at runtime.\
    \ Although you could accomplish the same thing by calling `setCell()` on all the\
    \ cells you wanted to change, using an animated tile allows you to make a single\
    \ call that changes all the affected cells.\n\nTo use an animated tile, you create\
    \ one by calling this method:\n\n```\npublic int createAnimatedTile(int staticTileIndex)\n\
    ```\n\nYou pass a regular tile index to the method, which is the initial tile\
    \ that should be used for the animated tile. The method returns a special animated\
    \ tile index. (There's no magic here; it's just a negative number.)\n\nTo assign\
    \ an animated tile to a cell, pass the return value from `createAnimatedTile()`\
    \ to `setCell()`. When you want to change the contents of an animated tile, use\
    \ the following method:\n\n```\npublic void setAnimatedTile(int animatedTileIndex,\
    \ int staticTileIndex)\n```\n\nThis assigns the supplied tile index to the animated\
    \ tile. All cells that have the supplied animated tile will now display the given\
    \ tile.\n\nIf you need to retrieve the current tile associated with an animated\
    \ tile, just pass the animated tile index to `getAnimatedTile()`.\n\n## Using\
    \ Sprites\n\nWhile a `TiledLayer` uses a palette of tiles to fill a large area,\
    \ a `Sprite` uses a palette of tiles to animate a layer that is the same size\
    \ as a single tile. Usually a sprite represents one of the protagonists in a game.\
    \ In `Sprite` parlance, tiles are called *frames* instead. As with a `TiledLayer`,\
    \ a `Sprite` is created from a source image that is divided into equally sized\
    \ frames.\n\n```\npublic Sprite(Image image, int frameWidth, int frameHeight)\n\
    ```\n\nThere's also a special case if the image contains just one frame, in which\
    \ case it will not be animated:\n\n```\npublic Sprite(Image image) \n```\n\nInterestingly,\
    \ a `Sprite` cannot be created from separate frame images; the frames must be\
    \ packed into a single source image.\n\nIf you want to change the source image\
    \ after the `Sprite` is created, use `setImage()`:\n\n```\npublic void setImage(Image\
    \ img, int frameWidth, int frameHeight)\n```\n\nThe total number of frames contained\
    \ in the `Sprite` is returned from `getRawFrameCount()`.\n\nLike any other `Layer`,\
    \ `Sprites` are rendered when the `paint()` method is called. Usually the `Sprite`\
    \ will belong to a `LayerManager`, in which case it is rendered automatically\
    \ when the `LayerManager` is rendered.\n\n### Animating Sprites\n\n`Sprite` animation\
    \ is all about *frame sequences*. When a `Sprite` is created, it has a default\
    \ frame sequence that includes every frame in the source image. For example, consider\
    \ the source image for a fictional character named Dr. Quatsch, shown in [Figure\
    \ 11-5](#LiB0091.html#ch11fig05).\n\n![](fig224_01.jpg)\nFigure 11-5: A sprite\
    \ source image\n\nThis image is 192 × 48 pixels. If it is created with a 48 ×\
    \ 48-pixel frame size, there are four frames. The default frame sequence is `{\
    \ 0, 1, 2, 3 }`. Note that frame indices are numbered starting at zero, while\
    \ tile indices (in the `TiledLayer` class) were numbered starting at one.\n\n\
    In the image above, the first three frames represent Dr. Quatsch running, while\
    \ the fourth is a frame that shows him standing still. The following method changes\
    \ the current frame sequence:\n\n```\npublic void setFrameSequence(int[] sequence)\
    \ \n```\n\nFor example, the following code shows how you could create a new `Sprite`\
    \ and set its frame sequence to only include the running frames:\n\n```\nint[]\
    \ runningSequence = { 0, 1, 2 };\nImage quatschImage = Image.createImage(\"/quatsch.png\"\
    );\nSprite quatsch = new Sprite(quatschImage, 48, 48);\nquatsch.setFrameSequence(runningSequence);\n\
    ```\n\n`Sprite` provides several methods for navigating through the frame sequence.\
    \ The animation doesn't happen automatically; your application needs to tell the\
    \ `Sprite` when it's time to move to the next frame in the sequence. Usually this\
    \ is accomplished in a separate thread, most likely as part of the animation thread.\
    \ To move forward and backward in the sequence, use `nextFrame()` and `prevFrame()`.\
    \ These methods do what you'd expect at the ends of the sequence, wrapping around\
    \ to the next value. For example, using the frame sequence of `{ 0, 1, 2 }`, if\
    \ the `Sprite`'s current frame is 2 and you call `nextFrame()`, the current frame\
    \ will be set to 0.\n\nYou can jump directly to a particular frame using this\
    \ method:\n\n```\npublic void setFrame(int sequenceIndex)\n```\n\nNote that this\
    \ method accepts a sequence index. If the `Sprite`'s frame sequence was `{ 2,\
    \ 3, 1, 9 }`, then calling `setFrame(1)` would result in the `Sprite`'s current\
    \ frame being set to 3.\n\nNothing happens visually when you adjust the `Sprite`'s\
    \ current frame. Changes will only be visible the next time the `Sprite` is rendered\
    \ using its `paint()` method. Typically, this will be at the end of your animation\
    \ loop if you are using `GameCanvas`.\n\nTo find out the current frame sequence\
    \ index, call `getFrame()`. Don't get confused here; the method does not return\
    \ a frame index, but the current index in the current frame sequence. Interestingly,\
    \ there is no `getFrameSequence()` method, so if you haven't saved the current\
    \ frame sequence, there's no way to find out the current frame index. You can,\
    \ however, retrieve the number of elements in the current frame sequence using\
    \ `getFrameSequenceLength()`."
