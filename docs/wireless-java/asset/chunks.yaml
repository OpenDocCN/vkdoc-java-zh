  trans: "\n## 响应传入连接\n\n你可能习惯于将手机视为客户端设备，但它们也可以成为功能完备的网络节点，具备接收传入网络连接的能力。尽管 `ServerSocketConnection`\
    \ 提供了监听传入套接字连接的能力，但它只能在 MIDlet 实际运行时保持活动状态。\n\n一个典型的服务器循环，在 80 端口上监听传入套接字连接，大致如下所示：\n\
    \n```\nServerSocketConnection ssc;\nssc = (ServerSocketConnection)Connector.open(\"\
    socket://:80\");\nboolean trucking = true;\nwhile (trucking) {\n  SocketConnection\
    \ sc = (SocketConnection)ssc.acceptAndOpen();\n  // 处理客户端连接 sc。\n}\n```\n\nMIDP\
    \ 2.0 更进一步，允许 MIDlet 在响应传入网络连接时启动。这种技术的名称是*推送*。理论上，你可以创建一个 Web 服务器 MIDlet，尽管在实践中，手机可能并不是运行\
    \ Web 服务器的理想平台。一个更实际的例子是 SMS MIDlet，即使用 JSR 120（无线消息 API）构建的程序。假设 MIDlet 配置正确，传入的\
    \ SMS 消息将触发 MIDlet 启动以处理该连接。\n\nMIDlet 可以通过两种方式注册推送连接。它可以在运行时使用 `javax.microedition.io.PushRegistry`\
    \ 中的静态方法进行注册，也可以在安装时使用应用程序描述符（JAD 文件）中的特殊条目进行注册。需要记住的重要一点是，推送注册的生命周期超出了你的 MIDlet\
    \ 的生命周期。它是运行在设备上的 MIDlet 管理软件的一部分。当 MIDlet 注册推送通知时，设备软件有义务监听传入的网络连接，并在建立相应连接时启动你的\
    \ MIDlet。\n\n在你的 MIDlet 内部，你无需做任何特殊处理来捕获传入连接。你只需使用适当的网络监听字符串调用 `Connector.open()`\
    \ 即可。\n\n例如，假设你在 MIDlet 中创建了一个 Web 服务器，并将其命名为 `PatchyMIDlet`。（本书的源代码可从 [`www.apress.com/`](http://www.apress.com/)\
    \ 获取，其中包含 `PatchyMIDlet`；它会发送一条随机选择的文本消息来响应传入请求。）此 MIDlet 响应 80 端口（默认 HTTP 端口）上的传入套接字连接。如果你想在运行时注册该\
    \ MIDlet，可以在代码中的某处执行以下操作：\n\n```\nPushRegistry.registerConnection(\"socket://:80\"\
    , PatchyMIDlet, \"*\");\n```\n\n前两个参数非常明确——任何在 80 端口上的传入套接字连接都应启动 `PatchyMIDlet`。第三个参数是一个过滤器，将应用于传入连接。在此例中，我们使用\
    \ `\"*\"` 通配符接受所有传入连接。其他可能性包括将传入连接限制为单个 IP 地址或一个地址范围。\n\n请记住，对 `registerConnection()`\
    \ 的调用结果会持续存在，超过 MIDlet 的生命周期。即使 MIDlet 已被销毁，设备上的 MIDlet 管理软件仍在监视 80 端口上的传入套接字连接。如果收到连接，`PatchyMIDlet`\
    \ 将被启动。推送注册实际上并不对传入连接做任何处理；它只是检测到连接并启动一个已注册的 MIDlet 来响应。接受传入连接是 MIDlet 的责任。为了查明\
    \ MIDlet 是由推送注册启动的还是由用户启动的，MIDlet 可以调用 `PushRegistry` 的 `listConnections()` 方法，并为\
    \ `available` 参数传递 `true`。该方法将返回一个包含有可用输入的连接列表。如果此列表为空，则 MIDlet 必须是由用户启动的，而不是由传入连接启动的。\n\
    \n相比于 MIDlet 在运行时注册推送连接，更常见的情况是，推送注册包含在包含 `PatchyMIDlet` 的 MIDlet 套件的应用程序描述中。因此，推送注册将在安装时执行，这样用户就永远不需要手动运行\
    \ MIDlet。在这种情况下，MIDlet 描述符将包含如下一行：\n\n```\nMIDlet-Push-1: socket://:80, PatchyMIDlet,\
    \ *\n```\n\n参数完全相同。推送注册在 MIDlet 套件安装时进行。如果 MIDlet 无法注册（例如，可能已有其他应用程序在监听 80 端口上的传入套接字连接），则\
    \ MIDlet 套件将不会被安装。多个推送注册在描述符中使用递增的数字列出：`MIDlet-Push-1`、`MIDlet-Push-2`，依此类推。\n\
    \nJ2ME 无线工具包（2.0 版）允许你轻松注册和测试推送连接。只需点击 **设置...** 按钮，然后选择 **推送注册** 选项卡。如果你下载了本书的源代码，你会看到\
    \ `PatchyMIDlet` 的一个条目。图 9-5 显示了此条目。\n\n![点击展开](img/fig178_01_0.jpg)\n图 9-5：*PatchyMIDlet*\
    \ 的推送注册条目\n\n要测试推送通知，你需要打包应用程序，然后将其部署到模拟器上。首先选择 **项目** Ø **打包** Ø **创建包** 将项目打包成\
    \ MIDlet 套件 JAR。然后从 KToolbar 菜单中选择 **项目** Ø **通过 OTA 运行**。你会看到模拟器弹出，显示其应用程序管理软件\
    \ (AMS)。选择 **安装应用程序**，然后接受提供的 URL。KToolbar 包含一个小型 OTA 服务器；当你选择 **通过 OTA 运行** 时，URL\
    \ 会自动预加载。你会看到一系列关于安装应用程序的其他提示；对所有提示都选择“是”。最终安装成功，你会在模拟器的菜单中看到 `wj2` MIDlet 套件。现在模拟器正在运行，监听传入连接，即使没有\
    \ MIDlet 在运行。\n\n现在，通过将浏览器指向 `http://localhost/` 来测试 `PatchyMIDlet`。`PatchyMIDlet`\
    \ 将被启动，并向浏览器发送响应。（模拟器会询问是否允许将数据发送回网络；你需要选择“是”。）图 9-6 显示了运行 `PatchyMIDlet` 的模拟器以及显示其输出的浏览器。\n\
    \n![点击展开](img/fig179_01_0.jpg)\n图 9-6：*PatchyMIDlet*，一个小型 Web 服务器\n\n**通过 OTA\
    \ 运行** 是测试 MIDlet 安装行为（而非运行时行为）的绝佳工具。请记住，你需要先打包 MIDlet，因为工具包的小型 OTA 服务器会分发项目 *bin*\
    \ 目录中的 MIDlet 套件 JAR 文件。\n\n|  | 注意 | **通过 OTA 运行** 功能在 J2ME 无线工具包 2.0 beta 1\
    \ 中不可用。该功能是在 2.0 beta 2 版本中添加的。 |\n\n`PushRegistry` 包含其他几个与网络注册相关的静态方法。`getMIDlet()`\
    \ 和 `getFilter()` 方法返回给定网络连接字符串的 MIDlet 名称和过滤器。`listConnections()` 方法返回一个字符串数组，其中包含所有已注册的网络连接字符串。最后，要移除连接与\
    \ MIDlet 的映射，请使用 `unregisterConnection()`。\n"
- fmt: '# Permissions for Network Connections


    MIDP 2.0 includes a security framework that is designed to prevent MIDlets from
    running up your phone bill by making unauthorized network connections. As I discussed
    in [Chapter 3](#LiB0024_split_000.html#106), network access in MIDP 2.0 is guarded
    by permissions and protection domains. Here are the permission names defined by
    MIDP 2.0:


    - `javax.microedition.io.Connector.http`

    - `javax.microedition.io.Connector.https`

    - `javax.microedition.io.Connector.datagram`

    - `javax.microedition.io.Connector.datagramreceiver`

    - `javax.microedition.io.Connector.socket`

    - `javax.microedition.io.Connector.serversocket`

    - `javax.microedition.io.Connector.ssl`

    - `javax.microedition.io.Connector.comm`

    - `javax.microedition.io.PushRegistry`


    These permissions have names corresponding to the API that they protect. All of
    these permissions, except one, protect connection types, which are accessed via
    the `javax.microedition.io.Connector` class, hence the prefix on those permission
    names. The very last permission refers to the push registry and shares its name
    with the `PushRegistry` class.


    When you run a MIDlet suite in the toolkit, it runs in the untrusted domain by
    default. In the untrusted domain, HTTP and HTTPS connections are allowed if the
    user grants permission. You can see this when you run a MIDlet that attempts a
    network connection. [Figure 9-7](#LiB0073.html#ch09fig07) shows how the emulator
    asks the user for permission and allows the user to make the decision stick for
    the remainder of the session.


    ![](fig181_01.jpg)

    Figure 9-7: The emulator asks for the user''s permission for network connections.


    You can indicate the necessary and optional permissions used by your MIDlet suite
    by using the `MIDlet-Permissions` and `MIDlet-Permissions-Opt` descriptor attributes.
    (In the J2ME Wireless Toolkit, you can set permissions in the descriptor by choosing
    **Settings…**, then clicking the **Permissions** tab.)


    ## Summary


    Networking on the MIDP platform is based on a generalized connection framework.
    The only protocol mandated by the MIDP 1.0 specification is HTTP. You can perform
    GET, HEAD, or POST requests with just a few lines of code. HTTP session handling
    is also feasible. Implementations are free to support additional connection types;
    datagrams, sockets, server sockets, and serial port communications are some of
    the possibilities. MIDP 2.0 requires support for HTTPS in addition to HTTP and
    formalizes the connection strings and APIs for handling additional connection
    types. MIDP 2.0''s security architecture protects users from unauthorized network
    use.


    # Chapter 10: Programming a Custom User Interface


    [Chapters 5](#LiB0036_split_000.html#174), [6](#LiB0044_split_000.html#209), and
    [7](#LiB0047_split_000.html#275) were devoted to MIDP''s generalized user-interface
    APIs. Clever as these APIs are, they are unsuitable for game development and other
    specialized user interfaces. Games are programmed "closer to the metal" than other
    applications. MIDP offers a class, `javax.microedition.lcdui.Canvas`, that provides
    low-level access to a device''s screen and input facilities. You can find out
    exactly which keys a user is pressing and draw whatever you want on the screen.


    A further enhancement in MIDP 2.0 is the Game API, contained in the `javax.microedition.lcdui.game`
    package. It includes a refinement of `Canvas` and classes for layer-based graphics
    and sprite animations. The Game API is fully discussed in [Chapter 11](#LiB0085_split_000.html#471).
    In this chapter you''ll learn the basics of `Canvas` and drawing with the `Graphics`
    class.


    ## The Canvas Class


    `Canvas` is the heart of MIDP''s custom user-interface API. To use it, you must
    create a subclass of `Canvas`. This differs from the `Screen` subclasses, which
    are ready to use "out of the box."


    Aside from that, however, `Canvas` fits in very nicely with the other subclasses
    of `Displayable`. A MIDlet can mix and match regular screens and `Canvas`es. In
    a game, for instance, a high score screen might be a `Form`, while the game itself
    would be played on a `Canvas`.


    `Canvas` contains event-handling methods that are invoked by the MIDP implementation
    whenever something important happens. When the user presses a key, or when the
    screen needs to be painted, one of `Canvas`''s methods will be called. Most of
    these methods have empty implementations in `Canvas`. To respond to an event,
    you need to override the appropriate method and provide an implementation.


    The one exception to this rule is the `paint()` method, which is declared abstract
    and thus must be defined in subclasses.


    ## Canvas Information


    If you would like to draw your own user interface, you''ll need some basic information
    about the `Canvas`. You can find out the size of the `Canvas` by calling `getWidth()`
    and `getHeight()`. As we''ll discuss later, you can also find out the color capabilities
    of the device by calling methods in `Display`.


    MIDP 2.0 offers a full screen mode. Some `Canvas` implementations won''t occupy
    all the available screen space, reserving areas of the screen for information
    about the state of the device or other purposes. If the device supports an alternate
    full screen mode for `Canvas`, you can use it by calling `setFullScreenMode(true)`.
    Setting full screen mode on or off may result in calls to the `sizeChanged()`
    method `Canvas` inherits from `Displayable`.


    `Canvas` also features event handler methods that will be called by the MIDP implementation
    as your `Canvas` is displayed and hidden. Each time your `Canvas` is shown, the
    `showNotify()` method will be called. If another `Displayable` is shown, or the
    application manager decides to run a different application, `hideNotify()` is
    called.'
