  trans: "\n## 精简 Bouncy Castle 库\n\n本章的两个示例都只使用了 Bouncy Castle 加密包的一小部分功能。我使用混淆器来裁剪掉不需要的部分。一个好的混淆器能够找出应用程序中未使用的方法、实例变量，甚至整个类，并将其移除。这对于第三方库尤为重要，因为你可能只使用了其中一小部分功能。Bouncy\
    \ Castle 包含了大量在 PasswordMIDlet 和 StealthMIDlet 中并未使用的功能。\n\n使用 Bouncy Castle 和其他一些第三方\
    \ API 时，还有另一个原因使得混淆器必不可少。Bouncy Castle 包含了核心 `java.*` 命名空间中类的实现，例如 `java.math.BigInteger`。MIDP\
    \ 实现无法加载应用程序中来自此命名空间的类。混淆器可用于将这些类重命名，使其脱离被禁止的命名空间。\n\n本章的示例代码（可从 Apress 网站 [[`www.apress.com`](http://www.apress.com)]\
    \ 的“下载”部分获取）包含一个 Ant 构建文件，该文件调用了 ProGuard 1.4 混淆器。ProGuard 是一款出色的软件。它完全用 Java\
    \ 编写，并且可以免费使用。更多信息，请参见 [`proguard.sourceforge.net/`](http://proguard.sourceforge.net/)。\n\
    \n运行 ProGuard 的 Ant 目标如下所示：\n\n```\n<target name=\"obfuscate_proguard\" depends=\"\
    compile, copylib\">\n  <mkdir dir=\"build/proguard\"/>\n  <jar basedir=\"build/classes\"\
    \n      jarfile=\"build/proguard/$wj2-crypto-input.jar\"/>\n\n  <java fork=\"\
    yes\" classname=\"proguard.ProGuard\"\n      classpath=\"${proguard}\">\n    <arg\
    \ line=\"-libraryjars ${midp_lib}\"/>\n    <arg line=\"-injars build/proguard/${project}-input.jar\"\
    />\n    <arg line=\"-outjar build/proguard/${project}-output.jar\"/>\n    <arg\
    \ line=\"-keep\n        'public class * extends javax.microedition.midlet.MIDlet'\"\
    />\n    <arg line=\"-defaultpackage\"/>\n    <arg line=\"-dontusemixedcaseclassnames\"\
    />\n  </java>\n\n  <mkdir dir=\"build/obfuscated\"/>\n  <unjar src=\"build/proguard/${project}-output.jar\"\
    \n      dest=\"build/obfuscated\"/>\n</target>\n```\n\nProGuard 期望其输入类被打包在 JAR\
    \ 文件中，因此首先要做的是根据包名创建一个 JAR 文件，即 *wj2-crypto-input.jar*。请注意，此 JAR 文件包含了 Bouncy\
    \ Castle 的类。\n\n接下来，通过派生一个 Java 进程来运行 ProGuard。第一个参数 `-libraryjars` 告诉 ProGuard\
    \ 在哪里可以找到 MIDP 类。下一个参数 `-injars` 将 ProGuard 指向输入文件的 JAR 包。输出文件名通过 `-outjar` 指定。接下来是三个重要的选项。保留\
    \ MIDlet 类本身的名称非常重要，这样设备上的 MIDlet 管理软件才能加载并运行这些类。`-keep` 参数使得所有 MIDlet 的子类都能保留名称。包重命名（将类移出\
    \ `java.*`）通过 `-defaultpackage` 参数实现。最后，`-dontusemixedcaseclassnames` 参数用于解决 Windows\
    \ 系统中一个愚蠢的行为，即混淆后的类文件（如 *a.class* 和 *A.class*）不能存在于同一目录下。\n\n有关 ProGuard 及其选项的更多信息，请查阅其文档，该文档质量很高。关于其使用的另一个示例，请参见\
    \ [`wireless.java.sun.com/midp/articles/security3/`](http://wireless.java.sun.com/midp/articles/security3/)。\n\
    \n结果令人印象深刻。未使用混淆器时，包含 PasswordMIDlet 和 StealthMIDlet 的 MIDlet 套件 JAR 文件大小为 493KB。此外，由于它包含了\
    \ `java.*` 命名空间中的类，因此无法运行。运行 ProGuard 后，MIDlet 套件 JAR 文件大小变为 38KB，并且那些有问题的 `java.*`\
    \ 类已被重命名为无害的名称。\n\n## 总结\n\n数据安全对于某些类型的应用程序至关重要。在 MIDP 领域，使用 Bouncy Castle 加密包可以实现数据安全。Bouncy\
    \ Castle 包为 MIDP 平台提供了复杂、易用且工业级的加密功能。本示例展示了两个可能的应用——一个使用消息摘要进行安全密码认证，另一个使用密码对\
    \ MIDlet 和 Servlet 之间发送的数据进行加密。\n\n请记住，为应用程序或系统添加加密功能并不一定会使其更安全。你需要采用全面的系统级安全方法。加密只是你工具箱中的工具之一。\n\
    \n# 附录 A：MIDP API 参考\n\n## 概述\n\n本附录是 MIDP API 中类和接口的参考。此参考旨在帮助你快速找到 MIDP API\
    \ 中方法的签名。异常和错误未包含在内。\n\n有关任何类、接口或方法的完整描述，请查阅 API 文档，无论是 HTML 格式（通常随 MIDP 工具包一起分发）还是\
    \ MIDP 规范本身。\n\nAPI 列表按字母顺序排列，并按包分组。\n\n本参考涵盖 MIDP 1.0、CLDC 1.0、MIDP 2.0 和 CLDC\
    \ 1.1。在 MIDP 2.0 或 CLDC 1.1 中新增的方法用“+”标记。在 MIDP 2.0 或 CLDC 1.1 中已移除（或移动）的方法用“-”标记。MIDP\
    \ 2.0 的初始实现将与 CLDC 1.0 配对；在浏览本参考时请记住这一点。\n\n## 包 java.io\n\n### 类 java.io.ByteArrayInputStream\n\
    \n```\n public class ByteArrayInputStream\n      extends java.io.InputStream {\n\
    \    // 构造方法\n    public ByteArrayInputStream(byte[] buf);\n    public ByteArrayInputStream(byte[]\
    \ buf, int offset, int length);\n\n    // 方法\n    public synchronized int available();\n\
    \    public synchronized void close();\n    public void mark(int readAheadLimit);\n\
    \    public boolean markSupported();\n    public synchronized int read();\n  \
    \  public synchronized int read(byte[] b, int off, int len);\n    public synchronized\
    \ void reset();\n    public synchronized long skip(long n);\n  } \n```\n\n###\
    \ 类 java.io.ByteArrayOutputStream\n\n```\n public class ByteArrayOutputStream\n\
    \      extends java.io.OutputStream {\n    // 构造方法\n    public ByteArrayOutputStream();\n\
    \    public ByteArrayOutputStream(int size);\n\n    // 方法\n    public synchronized\
    \ void close();\n    public synchronized void reset();\n    public int size();\n\
    \    public synchronized byte[] toByteArray();\n    public String toString();\n\
    \    public synchronized void write(int b);\n    public synchronized void write(byte[]\
    \ b, int off, int len);\n  }\n```\n\n### 接口 java.io.DataInput\n\n```\n public\
    \ interface DataInput {\n    // 方法\n    public boolean readBoolean();\n    public\
    \ byte readByte();\n    public char readChar();\n+   public double readDouble();\n\
    +   public float readFloat();\n    public void readFully(byte[] b);\n    public\
    \ void readFully(byte[] b, int off, int len);\n    public int readInt();\n   \
    \ public long readLong();\n    public short readShort();\n    public String readUTF();\n\
    \    public int readUnsignedByte();\n    public int readUnsignedShort();\n   \
    \ public int skipBytes(int n);\n  } \n```\n"
