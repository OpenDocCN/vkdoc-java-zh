    \ the record store. If that's not practical, or if you don't know how large the\
    \ largest record will be, you can simply check the size of each record before\
    \ you retrieve it. If you come across a record that's larger than the buffer,\
    \ you could create a larger buffer.\n\nIf you're not worried about memory usage\
    \ or speed, then you might as well use the other form of getRecord(), which is\
    \ essentially the same as the previous code example:\n\n```\nbyte[] retrieved\
    \ = rs.getRecord(id);\n```\n\n### Deleting and Replacing Records\n\nSo far you've\
    \ seen how to add new records and retrieve them. There are two more record operations\
    \ supported by RecordStore. First, you can remove a record by passing its ID to\
    \ deleteRecord(). Second, you can replace the data of an existing record by calling\
    \ the following method:\n\n```\npublic void setRecord(int recordId, byte[] newData,\
    \ int offset, int numBytes)\n    throws RecordStoreNotOpenException,\n       \
    \    InvalidRecordIDException,\n           RecordStoreException,\n           RecordStoreFullException\
    \ \n```\n\n### Getting RecordStore Record Information\n\nThe RecordStore keeps\
    \ an internal counter that it uses to assign record IDs. You can find out what\
    \ the next record ID will be by calling getNextRecordID(). And you can find out\
    \ how many records exist in the RecordStore by calling getNumRecords().\n\n##\
    \ Listening for Record Changes\n\nRecordStores support a JavaBeans-style listener\
    \ mechanism. Interested objects can listen for changes to a record store by registering\
    \ themselves as listeners.\n\nThe listener interface is javax.microedition.rms.RecordListener.\
    \ You can manage a RecordStore's listeners with the following two methods:\n\n\
    ```\npublic void addRecordListener(RecordListener listener)\npublic void removeRecordListener(RecordListener\
    \ listener)\n```\n\nThe RecordListener interface has three methods: recordAdded(),\
    \ recordChanged(), and recordDeleted(). These are called whenever a record is\
    \ added, changed, or deleted. Each method is passed the RecordStore involved and\
    \ the ID of the record in question.\n\n## Performing RecordStore Queries\n\nThe\
    \ real power of a database is being able to pull out just the record or records\
    \ you want. In a larger database, this is called *performing a query*. In the\
    \ RecordStore world, you use the enumerateRecords() method:\n\n```\npublic RecordEnumeration\
    \ enumerateRecords(RecordFilter filter,\n    RecordComparator comparator, boolean\
    \ keepUpdated)\n    throws RecordStoreNotOpenException \n```\n\nThis single method\
    \ in RecordStore involves three different interfaces that you've never seen before.\
    \ Let's start with the big picture first, and then drill down into the new interfaces.\n\
    \nThe enumerateRecords() method returns a sorted subset of the records in a RecordStore.\
    \ The RecordFilter determines which records will be included in the subset, while\
    \ the RecordComparator is used to sort them. The returned RecordEnumeration allows\
    \ you to navigate through the returned records.\n\n### RecordFilter\n\nThe simplest\
    \ interface is RecordFilter. When you call enumerateRecords() on a RecordStore,\
    \ each record's data is retrieved. RecordFilter has a single method, matches(),\
    \ which is called for each record. A record filter should examine the record data\
    \ and return true if the record should be included in the results returned from\
    \ enumerateRecords().\n\nHere's a simple RecordFilter implementation that will\
    \ only select records whose first byte of data is 7:\n\n```\npublic class SevenFilter\n\
    \    implements javax.microedition.rms.RecordFilter {\n  public boolean matches(byte[]\
    \ candidate) {\n    if (candidate.length == 0) return false;\n    return (candidate[0]\
    \ == 7);\n  }\n}\n```\n\n### RecordComparator\n\nThe job of a RecordComparator\
    \ implementation is to determine the order of two sets of record data. RecordComparator\
    \ is similar to the java.util.Comparator interface in J2SE.\n\nTo implement the\
    \ RecordComparator interface, you just need to define one method:\n\n```\npublic\
    \ int compare(byte[] rec1, byte[] rec2) \n```\n\nThis method examines the data\
    \ contained in rec1 and rec2 and determines which of them should come first in\
    \ a sorted list. It should return one of the following constants defined in RecordComparator:\n\
    \n*   PRECEDES indicates that rec1 should come before rec2.\n\n*   FOLLOWS indicates\
    \ that rec1 should come after rec2.\n\n*   EQUIVALENT signals that rec1 and rec2\
    \ are the same, at least as far as sorting is concerned.\n\nThe following simple\
    \ implementation compares each byte of the given records and sorts them numerically.\
    \ If the two records have the same data, up to the length of the shorter one,\
    \ then they are deemed EQUIVALENT.\n\n```\npublic class SimpleComparator\n   \
    \ implements javax.microedition.rms.RecordComparator {\n  public int compare(byte[]\
    \ rec1, byte[] rec2) {\n    int limit = Math.min(rec1.length, rec2.length);\n\n\
    \    for (int index = 0; index < limit; index++) {\n      if (rec1[index] < rec2[index])\n\
    \        return PRECEDES;\n      else if (rec1[index] > rec2[index])\n       \
    \ return FOLLOWS;\n    }\n    return EQUIVALENT;\n  }\n}\n```"
  trans: "\n## 使用记录\n\n*记录*本质上就是一个字节数组。RecordStore 中的每条记录都有一个整数标识号。图 8-2 展示了一个包含四条记录的\
    \ RecordStore 示意图。\n\n![点击展开](img/fig143_01_0.jpg)\n图 8-2：*RecordStore* 内部结构\n\
    \n### 添加记录\n\n要添加新记录，需将字节数组提供给 addRecord() 方法：\n\n```\npublic int addRecord(byte[]\
    \ data, int offset, int numBytes)\n    throws RecordStoreNotOpenException,\n \
    \          RecordStoreException,\n           RecordStoreFullException\n```\n\n\
    添加的记录长度为 numBytes 字节，数据取自 data 数组中从 offset 开始的位置。该方法会返回新记录的 ID。大多数其他记录操作都需要此 ID\
    \ 来标识特定记录。\n\n虽然没有明确的最大记录长度，但显然会受设备上可用于记录存储的空间限制。\n\n以下代码片段演示了如何向名为 rs 的记录存储中添加一条新记录。它从一个字符串创建字节数组，然后将整个字节数组写入一条新记录。\n\
    \n```\nString record = \"This is a record\";\nbyte[] data = record.getBytes();\n\
    int id = rs.addRecord(data, 0, data.length);\n```\n\n### 检索记录\n\n你可以通过将记录 ID 提供给以下方法来检索记录：\n\
    \n```\npublic byte[] getRecord(int recordId)\n    throws RecordStoreNotOpenException,\n\
    \           InvalidRecordIDException,\n           RecordStoreException\n```\n\n\
    此方法返回一个新创建的字节数组，其中包含具有所请求 ID 的记录。该方法的另一个版本会将记录数据放入你提供的数组中：\n\n```\npublic int\
    \ getRecord(int recordId, byte[] buffer, int offset)\n    throws RecordStoreNotOpenException,\n\
    \           InvalidRecordIDException,\n           RecordStoreException \n```\n\
    \n此方法返回复制到数组中的字节数。如果你提供的数组不够大，无法容纳该记录，则会抛出 ArrayOutOfBoundsException。你可以通过调用 getRecordSize()\
    \ 提前了解特定记录的大小。\n\n给定一个 RecordStore rs 和一个记录 ID id，以下是检索记录数据的一种方法：\n\n```\nbyte[]\
    \ retrieved = new byte[rs.getRecordSize(id)];\nrs.getRecord(id, retrieved, 0);\n\
    String retrievedString = new String(retrieved);\n```\n\n如果你要从记录存储中提取大量记录，可能不希望每次都创建一个新的字节数组。为了提高效率，你可以创建一个数组并反复使用它来从记录存储中提取记录。创建缓冲区的一种方法是使其与记录存储中最大的记录一样大。如果这不可行，或者你不知道最大记录有多大，你可以简单地在检索每条记录之前检查其大小。如果遇到比缓冲区大的记录，你可以创建一个更大的缓冲区。\n\
    \n如果你不担心内存使用或速度问题，那么你可以使用 getRecord() 的另一种形式，它本质上与前面的代码示例相同：\n\n```\nbyte[] retrieved\
    \ = rs.getRecord(id);\n```\n\n### 删除和替换记录\n\n到目前为止，你已经了解了如何添加新记录和检索它们。RecordStore\
    \ 还支持另外两种记录操作。首先，你可以通过将记录 ID 传递给 deleteRecord() 来删除记录。其次，你可以通过调用以下方法来替换现有记录的数据：\n\
    \n```\npublic void setRecord(int recordId, byte[] newData, int offset, int numBytes)\n\
    \    throws RecordStoreNotOpenException,\n           InvalidRecordIDException,\n\
    \           RecordStoreException,\n           RecordStoreFullException \n```\n\
    \n### 获取 RecordStore 记录信息\n\nRecordStore 维护一个内部计数器，用于分配记录 ID。你可以通过调用 getNextRecordID()\
    \ 来了解下一个记录 ID 是什么。并且你可以通过调用 getNumRecords() 来了解 RecordStore 中存在多少条记录。\n\n## 监听记录变更\n\
    \nRecordStore 支持类似 JavaBeans 的监听器机制。感兴趣的对象可以通过将自己注册为监听器来监听记录存储的变更。\n\n监听器接口是 javax.microedition.rms.RecordListener。你可以使用以下两个方法来管理\
    \ RecordStore 的监听器：\n\n```\npublic void addRecordListener(RecordListener listener)\n\
    public void removeRecordListener(RecordListener listener)\n```\n\nRecordListener\
    \ 接口有三个方法：recordAdded()、recordChanged() 和 recordDeleted()。每当添加、更改或删除记录时，都会调用这些方法。每个方法都会传入相关的\
    \ RecordStore 和所涉及记录的 ID。\n\n## 执行 RecordStore 查询\n\n数据库的真正强大之处在于能够只提取你想要的记录。在更大的数据库中，这被称为*执行查询*。在\
    \ RecordStore 的世界中，你使用 enumerateRecords() 方法：\n\n```\npublic RecordEnumeration\
    \ enumerateRecords(RecordFilter filter,\n    RecordComparator comparator, boolean\
    \ keepUpdated)\n    throws RecordStoreNotOpenException \n```\n\nRecordStore 中的这一个方法涉及三个你之前从未见过的不同接口。让我们先从整体上看，然后再深入探讨这些新接口。\n\
    \nenumerateRecords() 方法返回 RecordStore 中记录的一个排序子集。RecordFilter 决定哪些记录将包含在该子集中，而\
    \ RecordComparator 则用于对它们进行排序。返回的 RecordEnumeration 允许你遍历返回的记录。\n\n### RecordFilter\n\
    \n最简单的接口是 RecordFilter。当你在 RecordStore 上调用 enumerateRecords() 时，会检索每条记录的数据。RecordFilter\
    \ 有一个方法 matches()，该方法会为每条记录调用。记录过滤器应检查记录数据，如果该记录应包含在 enumerateRecords() 返回的结果中，则返回\
    \ true。\n\n以下是一个简单的 RecordFilter 实现，它只选择第一个数据字节为 7 的记录：\n\n```\npublic class SevenFilter\n\
    \    implements javax.microedition.rms.RecordFilter {\n  public boolean matches(byte[]\
    \ candidate) {\n    if (candidate.length == 0) return false;\n    return (candidate[0]\
    \ == 7);\n  }\n}\n```\n\n### RecordComparator\n\nRecordComparator 实现的工作是确定两组记录数据的顺序。RecordComparator\
    \ 类似于 J2SE 中的 java.util.Comparator 接口。\n\n要实现 RecordComparator 接口，你只需要定义一个方法：\n\
    \n```\npublic int compare(byte[] rec1, byte[] rec2) \n```\n\n此方法检查 rec1 和 rec2\
    \ 中包含的数据，并确定在排序列表中哪个应该排在前面。它应返回 RecordComparator 中定义的以下常量之一：\n\n*   PRECEDES 表示\
    \ rec1 应排在 rec2 之前。\n*   FOLLOWS 表示 rec1 应排在 rec2 之后。\n*   EQUIVALENT 表示 rec1\
    \ 和 rec2 相同，至少在排序方面如此。\n\n以下简单的实现比较给定记录的每个字节，并按数值排序。如果两条记录的数据相同（直到较短记录的长度），则认为它们是\
    \ EQUIVALENT。\n\n```\npublic class SimpleComparator\n    implements javax.microedition.rms.RecordComparator\
    \ {\n  public int compare(byte[] rec1, byte[] rec2) {\n    int limit = Math.min(rec1.length,\
    \ rec2.length);\n\n    for (int index = 0; index < limit; index++) {\n      if\
    \ (rec1[index] < rec2[index])\n        return PRECEDES;\n      else if (rec1[index]\
    \ > rec2[index])\n        return FOLLOWS;\n    }\n    return EQUIVALENT;\n  }\n\
    }\n```\n"
- fmt: "### Working with `RecordEnumeration`\n\n`RecordStore`'s `enumerateRecords()`\
    \ method returns an implementation of the `RecordEnumeration` interface. `RecordEnumeration`\
    \ is surprisingly complicated. Its basic function is to allow you to iterate through\
    \ the records retrieved from the `RecordStore`. Unlike a regular J2SE `Enumeration`\
    \ or `Iterator`, however, `RecordEnumeration` allows you to scroll through its\
    \ contents both forward and backward. In addition, you can peek at the next or\
    \ previous record ID. Finally, `RecordEnumeration` offers the possibility of keeping\
    \ its data synchronized with the actual `RecordStore`. Behind the scenes, this\
    \ is accomplished by registering the `RecordEnumeration` as a listener for `RecordStore`\
    \ changes.\n\nThe basic operation of `RecordEnumeration` is to iterate through\
    \ a set of records. You can find out if there's a next record by calling `hasNextElement()`.\
    \ If the next record exists, you can retrieve its data by calling the following\
    \ method:\n\n```\npublic byte[] nextRecord()\n    throws InvalidRecordIDException,\n\
    \           RecordStoreNotOpenException,\n           RecordStoreException\n```\n\
    \nAlternately, you can retrieve the next record's ID by calling this method:\n\
    \n```\npublic int nextRecordId() throws InvalidRecordIDException\n```\n\nYou can't\
    \ really have your cake and eat it, though; both `nextRecord()` and `nextRecordId()`\
    \ advance the `RecordEnumeration` to the next record. If you want to retrieve\
    \ both the ID and the data for the next record, you'd need to call `nextRecordId()`\
    \ and then retrieve the record data directly from the `RecordStore`.\n\nA typical\
    \ use of `RecordEnumeration` would be to walk straight through the selected records,\
    \ like this:\n\n```\n// Open a RecordStore rs\n// Create a RecordFilter rf\n//\
    \ Create a RecordComparator rc\n\nRecordEnumeration re = rs.enumerateRecords(rf,\
    \ rc, false);\nwhile (re.hasNextElement()) {\n  byte[] recordBytes = re.nextRecord();\n\
    \  // Process the retrieved bytes.\n}\n```\n\nThe `RecordFilter` and `RecordComparator`\
    \ can both be `null`, in which case the `RecordEnumeration` will iterate through\
    \ every record in the record store. The `Preferences` class uses `RecordEnumeration`\
    \ in this way.\n\n|  | Note | `RecordEnumeration` makes no guarantees about the\
    \ order of the returned records if the `RecordComparator` is `null`. |\n\nAs you're\
    \ moving through the selected records, you can also move backward. `RecordEnumeration`\
    \ includes `hasPreviousElement()`, `previousRecord()`, and `previousRecordId()`\
    \ methods that work just like their next counterparts.\n\nFour out of the five\
    \ ways to move the current position in the `RecordEnumeration` are the `nextRecord()`,\
    \ `nextRecordId()`, `previousRecord()`, or `previousRecordId()` methods. The fifth\
    \ method is kind of like a rewind button: `reset()` moves the record pointer back\
    \ to the very beginning of the selected records.\n\nWhen you're finished using\
    \ a `RecordEnumeration`, you should release its resources. You can do this by\
    \ calling `destroy()`, after which the `RecordEnumeration` is no longer usable.\n\
    \n### Keeping a `RecordEnumeration` Up-to-Date\n\nIn a multithreaded environment,\
    \ it's entirely possible that a `RecordStore` will change at the same time you're\
    \ iterating through a `RecordEnumeration` for the same `RecordStore`. There are\
    \ two ways to deal with this.\n\nThe first thing you can do is call `rebuild()`,\
    \ which explicitly rebuilds the `RecordEnumeration` based on the `RecordFilter`\
    \ and `RecordComparator` you originally specified.\n\nThe other possibility is\
    \ to request a `RecordEnumeration` that is automatically updated with any changes\
    \ to the underlying `RecordStore`. You can do this by passing `true` for the `keepUpdated`\
    \ parameter of `RecordStore`'s `enumerateRecords()` method. You can find out if\
    \ the `RecordEnumeration` is automatically updated by calling `isKeptUpdated()`.\
    \ Furthermore, you can change its state by calling `keepUpdated()`.\n\nAutomatically\
    \ updated `RecordEnumeration`s register themselves as `RecordListener`s with the\
    \ underlying `RecordStore`. Each time the `RecordStore` is changed, the `RecordEnumeration`\
    \ is rebuilt. Keep in mind that this is an expensive operation (in terms of time),\
    \ so if there are many `RecordStore` changes, you'll be paying a price for it.\n\
    \n## Using Resource Files\n\nResource files are another form of persistent storage.\
    \ Accessing resource files is very simple, but they are important nevertheless.\
    \ Resource files can be images, text, or other types of files that are stored\
    \ in a MIDlet suite JAR. These files are read-only.\n\nYou can access a resource\
    \ file as an `InputStream` by using the `getResourceAsStream()` method in `Class`.\
    \ A typical usage looks like this:\n\n```\nInputStream in = this.getClass().getResourceAsStream(\"\
    /Robotag-t.png\");\n```\n\n## Summary\n\nThe MIDP API for persistent storage is\
    \ deliberately abstract in recognition that small devices will likely have many\
    \ different methods for storing data. In MIDP, the central concept for persistent\
    \ storage is the record store, which is a collection of bits of data called records.\
    \ A record store is really a tiny database, but the details of exactly how it\
    \ is stored are left to the device implementation. The `javax.microedition.rms.RecordStore`\
    \ class encapsulates all access to persistent storage. It provides methods for\
    \ accessing and manipulating `RecordStore`s, as well as methods for working with\
    \ individual records. For more advanced `RecordStore` work, methods and interfaces\
    \ exist to help keep track of changes to a `RecordStore` or to perform `RecordStore`\
    \ queries.\n\n# Chapter 9: Connecting to the World\n\nIt's cool running Java on\
    \ mobile phones and pagers, but the real kicker is getting your MIDlets connected\
    \ to the Internet. With an Internet connection, you can write applications that\
    \ allow you to access information and do work from your mobile telephone, from\
    \ wherever you are in the world."
