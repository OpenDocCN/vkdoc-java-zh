  trans: "\n### 变换精灵\n\n你可能已经注意到，图 11-5 中显示的帧只展示了夸奇博士面向左侧。如果他打算向右跑呢？精灵支持*变换*功能，这样你就可以使用\
    \ API 生成现有帧的简单变换后的额外帧。以下方法可对精灵应用变换：\n\n```\npublic void setTransform(int transform)\n\
    ```\n\n`transform`参数可以是`Sprite`类中定义的任意常量值：\n\n```\nTRANS_NONE\nTRANS_ROT90\nTRANS_ROT180\n\
    TRANS_ROT270\nTRANS_MIRROR\nTRANS_MIRROR_ROT90\nTRANS_MIRROR_ROT180\nTRANS_MIRROR_ROT270\n\
    ```\n\n要让夸奇博士面向右侧而非左侧，你需要应用`TRANS_MIRROR`变换。要理解所有变换，请参阅精灵 API 文档，其中包含一组非常有帮助的战斗机图像。\n\
    \n关于变换，唯一棘手的部分是*参考像素*。所有精灵都有一个参考像素，它在精灵自身的坐标空间中表示；默认情况下，参考像素位于精灵的左上角(0, 0)处。当精灵被变换时，参考像素也会随之变换。\n\
    \n应用变换时，精灵的位置会发生变化，以确保参考像素的当前位置保持不变，即使在其变换之后也是如此。例如，图 11-6 展示了应用简单的`TRANS_MIRROR`变换时精灵位置的变化。\n\
    \n![](img/fig227_01.jpg)\n图 11-6：参考像素位置不变。\n\n假设精灵的原始位置为 100, 100（在容器的坐标系中），参考像素位置为\
    \ 0, 0（在精灵的坐标系中）。应用`TRANS_MIRROR`旋转后，精灵的位置会被调整，使得变换后的参考像素与原始参考像素位于同一位置。由于帧宽度为\
    \ 48 像素，精灵的位置（其左上角）从 100, 100 变为 52, 100。\n\n要在精灵未变换的坐标系中调整参考点的位置，请使用以下方法：\n\n\
    ```\npublic void defineReferencePixel(int x, int y)\n```\n\n对于夸奇博士的情况，我希望应用镜像变换而不让精灵移动，因此我将参考像素设置为\
    \ 48 × 48 帧的中心：\n\n```\n// 精灵 quatsch 按之前的方式定义。\nquatsch.defineReferencePixel(24,\
    \ 24);\n```\n\n要查找精灵参考像素在其所在容器坐标系中的当前位置，请使用`getRefPixelX()`和`getRefPixelY()`。不要混淆：`defineReferencePixel()`接受相对于精灵原点的坐标，而`getRefPixelX()`和`getRefPixelY()`返回相对于精灵容器的值。\n\
    \n也可以基于参考点设置精灵的位置。你已经知道可以使用从`Layer`继承的`setPosition()`方法设置精灵左上角的位置，但以下方法用于设置精灵参考点的当前位置：\n\
    \n```\npublic void setRefPointPosition(int x, int y)\n```\n\n这比初看起来更方便，因为它允许你将参考点放置在特定位置，而无需考虑当前的变换。\n\
    \n### 处理碰撞\n\n精灵提供了方法来回答游戏中出现的关键问题——子弹击中飞船了吗？夸奇博士是否站在门前？\n\n游戏 API 支持两种碰撞检测技术。\n\
    \n1.  实现可以比较代表精灵和另一个精灵的矩形。如果矩形相交，则发生碰撞。这是一种快速测试碰撞的方法，但对于非矩形形状可能产生不准确的结果。\n\n2.\
    \  实现可以比较精灵和另一个精灵的每个像素。如果精灵中的一个不透明像素与另一个精灵中的不透明像素重叠，则发生碰撞。这种技术涉及更多计算，但产生更准确的结果。\n\
    \n精灵有一个用于碰撞检测的*碰撞矩形*。它像参考像素一样，在精灵自身的坐标系中定义。默认情况下，碰撞矩形位于(0, 0)处，其宽度和高度与精灵相同。你可以使用以下方法更改碰撞矩形：\n\
    \n```\npublic void defineCollisionRectangle(int x, int y, int width, int height);\n\
    ```\n\n碰撞矩形有两个用途。如果不使用像素级碰撞检测，则使用碰撞矩形来确定碰撞。如果使用像素级碰撞检测，则仅检查碰撞矩形内的像素。\n\n精灵能够检测与其他精灵、`TiledLayer`和`Image`的碰撞。\n\
    \n```\npublic final boolean collidesWith(Sprite s, boolean pixelLevel)\npublic\
    \ final boolean collidesWith(TiledLayer t, boolean pixelLevel)\npublic final boolean\
    \ collidesWith(Image image,\n    int x, int y, boolean pixelLevel)\n```\n\n每种方法的语义略有不同，如表\
    \ 11-1 所述。\n\n表 11-1：与精灵的碰撞检测\n\n| **目标** | **矩形相交** | **像素级** |\n| --- | ---\
    \ | --- |\n| Sprite | 比较碰撞矩形 | 比较碰撞矩形内的像素 |\n| TiledLayer | 比较精灵的碰撞矩形与 TiledLayer\
    \ 中的图块 | 比较精灵碰撞矩形内的像素与 TiledLayer 中的像素 |\n| Image | 比较精灵的碰撞矩形与 Image 的边界 | 比较精灵碰撞矩形内的像素与\
    \ Image 中的像素 |\n\n### 复制精灵\n\n精灵包含一个复制构造函数：\n\n```\npublic Sprite(Sprite s)\n\
    ```\n\n这比你想象的要强大得多。它会创建一个新精灵，包含原始精灵的所有属性，包括：\n\n*   源图像帧\n\n*   帧序列\n\n*   当前帧\n\
    \n*   当前变换\n\n*   参考像素\n\n*   碰撞矩形\n"
- fmt: "# Putting it all Together\n\n`QuatschCanvas`, shown in [Listing 11-2](#LiB0092.html#ch11list02),\
    \ is an example that showcases many of the features of the Game API. Although\
    \ it looks long, it's broken into manageable methods and demonstrates quite a\
    \ few features of the Game API:\n\n*   Using an animation loop in `GameCanvas`\n\
    *   Polling for key state using `GameCanvas`\n*   Using a `LayerManager` to maintain\
    \ multiple layers\n*   Creating a `Sprite` and `TiledLayers`\n*   Animating a\
    \ `Sprite`, including changing frame sequences and transformations\n*   Using\
    \ an animated tile in a `TiledLayer`\n\nListing 11-2: *QuatschCanvas*, a Game\
    \ API Example\n\n```\nimport java.io.IOException;\n\nimport javax.microedition.lcdui.*;\n\
    import javax.microedition.lcdui.game.*;\n\npublic class QuatschCanvas\n    extends\
    \ GameCanvas\n    implements Runnable {\n  private boolean mTrucking;\n\nprivate\
    \ LayerManager mLayerManager;\n\nprivate TiledLayer mAtmosphere;\n  private TiledLayer\
    \ mBackground;\n  private int mAnimatedIndex;\n\nprivate Sprite mQuatsch;\n  private\
    \ int mState, mDirection;\n\nprivate static final int kStanding = 1;\n  private\
    \ static final int kRunning = 2;\n\nprivate static final int kLeft = 1;\n  private\
    \ static final int kRight = 2;\n\nprivate static final int[] kRunningSequence\
    \ = { 0, 1, 2 };\n  private static final int[] kStandingSequence = { 3 };\n\n\
    public QuatschCanvas(String quatschImageName,\n      String atmosphereImageName,\
    \ String backgroundImageName)\n      throws IOException {\n    super(true);\n\n\
    // Create a LayerManager.\n    mLayerManager = new LayerManager();\n    int w\
    \ = getWidth();\n    int h = getHeight();\n    mLayerManager.setViewWindow(96,\
    \ 0, w, h);\n    createBackground(backgroundImageName);\n    createAtmosphere(atmosphereImageName);\n\
    \    createQuatsch(quatschImageName);\n  }\n\nprivate void createBackground(String\
    \ backgroundImageName)\n      throws IOException {\n    // Create the tiled layer.\n\
    \    Image backgroundImage = Image.createImage(backgroundImageName);\n    int[]\
    \ map = {\n      1, 2, 0, 0, 0, 0, 0, 0,\n      3, 3, 2, 0, 0, 0, 5, 0,\n    \
    \  3, 3, 3, 2, 4, 1, 3, 2,\n      6, 6, 6, 6, 6, 6, 6, 6\n    };\n    mBackground\
    \ = new TiledLayer(8, 4, backgroundImage, 48, 48);\n    mBackground.setPosition(12,\
    \ 0);\n    for (int i = 0; i < map.length; i++) {\n      int column = i % 8;\n\
    \      int row = (i - column) / 8;\n      mBackground.setCell(column, row, map[i]);\n\
    \    }\n    mAnimatedIndex = mBackground.createAnimatedTile(8);\n    mBackground.setCell(3,\
    \ 0, mAnimatedIndex);\n    mBackground.setCell(5, 0, mAnimatedIndex);\n    mLayerManager.append(mBackground);\n\
    \  }\n\nprivate void createAtmosphere(String atmosphereImageName)\n      throws\
    \ IOException {\n    // Create the atmosphere layer\n    Image atmosphereImage\
    \ = Image.createImage(atmosphereImageName);\n    mAtmosphere = new TiledLayer(8,\
    \ 1, atmosphereImage,\n        atmosphereImage.getWidth(), atmosphereImage.getHeight());\n\
    \    mAtmosphere.fillCells(0, 0, 8, 1, 1);\n    mAtmosphere.setPosition(0, 96);\n\
    \    mLayerManager.insert(mAtmosphere, 0);\n  }\n\nprivate void createQuatsch(String\
    \ quatschImageName)\n    throws IOException {\n    // Create the sprite.\n   \
    \ Image quatschImage = Image.createImage(quatschImageName);\n    mQuatsch = new\
    \ Sprite(quatschImage, 48, 48);\n    mQuatsch.setPosition(96 + (getWidth() - 48)\
    \ / 2, 96);\n    mQuatsch.defineReferencePixel(24, 24);\n    setDirection(kLeft);\n\
    \    setState(kStanding);\n    mLayerManager.insert(mQuatsch, 1);\n  }\n\npublic\
    \ void start() {\n    mTrucking = true;\n    Thread t = new Thread(this);\n  \
    \  t.start();\n  }\n\npublic void run() {\n    int w = getWidth();\n    int h\
    \ = getHeight();\n    Graphics g = getGraphics();\n    int frameCount = 0;\n \
    \   int factor = 2;\n    int animatedDelta = 0;\n\nwhile (mTrucking) {\n     \
    \ if (isShown()) {\n        int keyStates = getKeyStates();\n        if ((keyStates\
    \ & LEFT_PRESSED) != 0) {\n          setDirection(kLeft);\n          setState(kRunning);\n\
    \          mBackground.move(3, 0);\n          mAtmosphere.move(3, 0);\n      \
    \    mQuatsch.nextFrame();\n        }\n        else if ((keyStates & RIGHT_PRESSED)\
    \ != 0) {\n          setDirection(kRight);\n          setState(kRunning);\n  \
    \        mBackground.move(-3, 0);\n          mAtmosphere.move(-3, 0);\n      \
    \    mQuatsch.nextFrame();\n        }\n        else {\n          setState(kStanding);\n\
    \        }\n      frameCount++;\n      if (frameCount % factor == 0) {\n     \
    \   int delta = 1;\n        if (frameCount / factor < 10) delta = -1;\n      \
    \  mAtmosphere.move(delta, 0);\n        if (frameCount / factor == 20) frameCount\
    \ = 0;\n\nmBackground.setAnimatedTile(mAnimatedIndex,\n            8 + animatedDelta++);\n\
    \        if (animatedDelta == 3) animatedDelta = 0;\n      }\n\ng.setColor(0x5b1793);\n\
    \      g.fillRect(0, 0, w, h);\n\nmLayerManager.paint(g, 0, 0);\n\nflushGraphics();\n\
    \    }\n\ntry { Thread.sleep(80); }\n    catch (InterruptedException ie) {}\n\
    \   }\n  }\n\npublic void stop() {\n    mTrucking = false;\n  }\n\npublic void\
    \ setVisible(int layerIndex, boolean show) {\n    Layer layer = mLayerManager.getLayerAt(layerIndex);\n\
    \    layer.setVisible(show);\n  }\n\npublic boolean isVisible(int layerIndex)\
    \ {\n    Layer layer = mLayerManager.getLayerAt(layerIndex);\n    return layer.isVisible();\n\
    \  }\n  private void setDirection(int newDirection) {\n    if (newDirection ==\
    \ mDirection) return;\n    if (mDirection == kLeft)\n      mQuatsch.setTransform(Sprite.TRANS_MIRROR);\n\
    \    else if (mDirection == kRight)\n      mQuatsch.setTransform(Sprite.TRANS_NONE);\n\
    \    mDirection = newDirection;\n  }\n\nprivate void setState(int newState) {\n\
    \    if (newState == mState) return;\n    switch (newState) {\n      case kStanding:\n\
    \        mQuatsch.setFrameSequence(kStandingSequence);\n        mQuatsch.setFrame(0);\n\
    \        break;\n      case kRunning:\n        mQuatsch.setFrameSequence(kRunningSequence);\n\
    \        break;\n      default:\n        break;\n    }\n    mState = newState;\n\
    \  }\n}\n```\n\nA corresponding MIDlet, `QuatschMIDlet`, is available in the code\
    \ download but not presented here. It creates and displays a `QuatschCanvas` and\
    \ provides commands for showing and hiding the layers.\n\n[Figure 11-7](#LiB0092.html#ch11fig07)\
    \ shows `QuatschMIDlet` running in the emulator.\n\n[![Click To expand](fig230_01.jpg)](fig230_01_0.jpg)\n\
    Figure 11-7: The whole iguana— sprites and tiled layers\n\n[Listing 11-2](#LiB0092.html#ch11list02)\
    \ contains the source code for `QuatschCanvas`.\n\n## Special Effects\n\nAlthough\
    \ they are not strictly contained in the Game API, two other methods in the `Display`\
    \ class are closely related:\n\n```\npublic boolean flashBacklight(int duration)\n\
    public boolean vibrate(int duration)\n```\n\nBoth methods accept a duration in\
    \ milliseconds that specifies how long the backlight should be turned on or how\
    \ long the device should vibrate. Both methods return `true` to indicate success\
    \ or `false` if the device does not support a backlight or vibration (or if your\
    \ application is not running in the foreground).\n\n## Summary\n\nThis chapter\
    \ described MIDP 2.0's Game API, a set of classes that simplify developing two-dimensional\
    \ games. The `GameCanvas` class provides a drawing surface that can easily be\
    \ rendered in a game thread. `GameCanvas` also provides key state polling, also\
    \ useful for detecting user input in a game thread. The remainder of the Game\
    \ API is based on layers, which are elements that can be combined to create complex\
    \ scenes. `LayerManager` makes it easy to maintain multiple layers. The `Sprite`\
    \ class supports animation and collision detection. Large scenes or backgrounds\
    \ can be constructed efficiently using `TiledLayer`. Finally, MIDP 2.0's `Display`\
    \ includes methods for controlling the backlight and vibration of a device. Game\
    \ developers have a lot to be happy about. Read on to the [next chapter](#LiB0095_split_000.html#523)\
    \ for more good news about MIDP 2.0's sound capabilities.\n\n# Chapter 12: Sound\
    \ and Music"
  raw: "## Putting it all Together\n\nQuatschCanvas, shown in [Listing 11-2](#LiB0092.html#ch11list02),\
    \ is an example that showcases many of the features of the Game API. Although\
    \ it looks long, it's broken into manageable methods and demonstrates quite a\
    \ few features of the Game API:\n\n*   Using an animation loop in GameCanvas\n\
    \n*   Polling for key state using GameCanvas\n\n*   Using a LayerManager to maintain\
    \ multiple layers\n\n*   Creating a Sprite and TiledLayers\n\n*   Animating a\
    \ Sprite, including changing frame sequences and transformations\n\n*   Using\
    \ an animated tile in a TiledLayer\n\nListing 11-2: *QuatschCanvas*, a Game API\
    \ Example\n\n| **![Start example](_1.gif)** |\n\n```\nimport java.io.IOException;\n\
    \nimport javax.microedition.lcdui.*;\nimport javax.microedition.lcdui.game.*;\n\
    \npublic class QuatschCanvas\n    extends GameCanvas\n    implements Runnable\
    \ {\n  private boolean mTrucking;\n\nprivate LayerManager mLayerManager;\n\nprivate\
    \ TiledLayer mAtmosphere;\n  private TiledLayer mBackground;\n  private int mAnimatedIndex;\n\
    \nprivate Sprite mQuatsch;\n  private int mState, mDirection;\n\nprivate static\
    \ final int kStanding = 1;\n  private static final int kRunning = 2;\n\nprivate\
    \ static final int kLeft = 1;\n  private static final int kRight = 2;\n\nprivate\
    \ static final int[] kRunningSequence = { 0, 1, 2 };\n  private static final int[]\
    \ kStandingSequence = { 3 };\n\npublic QuatschCanvas(String quatschImageName,\n\
    \      String atmosphereImageName, String backgroundImageName)\n      throws IOException\
    \ {\n    super(true);\n\n// Create a LayerManager.\n    mLayerManager = new LayerManager();\n\
    \    int w = getWidth();\n    int h = getHeight();\n    mLayerManager.setViewWindow(96,\
    \ 0, w, h);\n    createBackground(backgroundImageName);\n    createAtmosphere(atmosphereImageName);\n\
    \    createQuatsch(quatschImageName);\n  }\n\nprivate void createBackground(String\
    \ backgroundImageName)\n      throws IOException {\n    // Create the tiled layer.\n\
    \    Image backgroundImage = Image.createImage(backgroundImageName);\n    int[]\
    \ map = {\n      1, 2, 0, 0, 0, 0, 0, 0,\n      3, 3, 2, 0, 0, 0, 5, 0,\n    \
    \  3, 3, 3, 2, 4, 1, 3, 2,\n      6, 6, 6, 6, 6, 6, 6, 6\n    };\n    mBackground\
    \ = new TiledLayer(8, 4, backgroundImage, 48, 48);\n    mBackground.setPosition(12,\
    \ 0);\n    for (int i = 0; i < map.length; i++) {\n      int column = i % 8;\n\
    \      int row = (i - column) / 8;\n      mBackground.setCell(column, row, map[i]);\n\
    \    }\n    mAnimatedIndex = mBackground.createAnimatedTile(8);\n    mBackground.setCell(3,\
    \ 0, mAnimatedIndex);\n    mBackground.setCell(5, 0, mAnimatedIndex);\n    mLayerManager.append(mBackground);\n\
    \  }\n\nprivate void createAtmosphere(String atmosphereImageName)\n      throws\
    \ IOException {\n    // Create the atmosphere layer\n    Image atmosphereImage\
    \ = Image.createImage(atmosphereImageName);\n    mAtmosphere = new TiledLayer(8,\
    \ 1, atmosphereImage,\n        atmosphereImage.getWidth(), atmosphereImage.getHeight());\n\
    \    mAtmosphere.fillCells(0, 0, 8, 1, 1);\n    mAtmosphere.setPosition(0, 96);\n\
    \    mLayerManager.insert(mAtmosphere, 0);\n  }\n\nprivate void createQuatsch(String\
    \ quatschImageName)\n    throws IOException {\n    // Create the sprite.\n   \
    \ Image quatschImage = Image.createImage(quatschImageName);\n    mQuatsch = new\
    \ Sprite(quatschImage, 48, 48);\n    mQuatsch.setPosition(96 + (getWidth() - 48)\
    \ / 2, 96);\n    mQuatsch.defineReferencePixel(24, 24);\n    setDirection(kLeft);\n\
    \    setState(kStanding);\n    mLayerManager.insert(mQuatsch, 1);\n  }\n\npublic\
    \ void start() {\n    mTrucking = true;\n    Thread t = new Thread(this);\n  \
    \  t.start();\n  }\n\npublic void run() {\n    int w = getWidth();\n    int h\
    \ = getHeight();\n    Graphics g = getGraphics();\n    int frameCount = 0;\n \
    \   int factor = 2;\n    int animatedDelta = 0;\n\nwhile (mTrucking) {\n     \
    \ if (isShown()) {\n        int keyStates = getKeyStates();\n        if ((keyStates\
    \ & LEFT_PRESSED) != 0) {\n          setDirection(kLeft);\n          setState(kRunning);\n\
    \          mBackground.move(3, 0);\n          mAtmosphere.move(3, 0);\n      \
    \    mQuatsch.nextFrame();\n        }\n        else if ((keyStates & RIGHT_PRESSED)\
    \ != 0) {\n          setDirection(kRight);\n          setState(kRunning);\n  \
    \        mBackground.move(-3, 0);\n          mAtmosphere.move(-3, 0);\n      \
    \    mQuatsch.nextFrame();\n        }\n        else {\n          setState(kStanding);\n\
    \        }\n      frameCount++;\n      if (frameCount % factor == 0) {\n     \
    \   int delta = 1;\n        if (frameCount / factor < 10) delta = -1;\n      \
    \  mAtmosphere.move(delta, 0);\n        if (frameCount / factor == 20) frameCount\
    \ = 0;\n\nmBackground.setAnimatedTile(mAnimatedIndex,\n            8 + animatedDelta++);\n\
    \        if (animatedDelta == 3) animatedDelta = 0;\n      }\n\ng.setColor(0x5b1793);\n\
    \      g.fillRect(0, 0, w, h);\n\nmLayerManager.paint(g, 0, 0);\n\nflushGraphics();\n\
    \    }\n\ntry { Thread.sleep(80); }\n    catch (InterruptedException ie) {}\n\
    \   }\n  }\n\npublic void stop() {\n    mTrucking = false;\n  }\n\npublic void\
    \ setVisible(int layerIndex, boolean show) {\n    Layer layer = mLayerManager.getLayerAt(layerIndex);\n\
    \    layer.setVisible(show);\n  }\n\npublic boolean isVisible(int layerIndex)\
    \ {\n    Layer layer = mLayerManager.getLayerAt(layerIndex);\n    return layer.isVisible();\n\
    \  }\n  private void setDirection(int newDirection) {\n    if (newDirection ==\
    \ mDirection) return;\n    if (mDirection == kLeft)\n      mQuatsch.setTransform(Sprite.TRANS_MIRROR);\n\
    \    else if (mDirection == kRight)\n      mQuatsch.setTransform(Sprite.TRANS_NONE);\n\
    \    mDirection = newDirection;\n  }\n\nprivate void setState(int newState) {\n\
    \    if (newState == mState) return;\n    switch (newState) {\n      case kStanding:\n\
    \        mQuatsch.setFrameSequence(kStandingSequence);\n        mQuatsch.setFrame(0);\n\
    \        break;\n      case kRunning:\n        mQuatsch.setFrameSequence(kRunningSequence);\n\
    \        break;\n      default:\n        break;\n    }\n    mState = newState;\n\
    \  }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nA corresponding MIDlet,\
