- fmt: "# Painting and Repainting\n\nThe MIDP implementation calls a `Canvas`'s `paint()`\
    \ method when the contents of the `Canvas` need to be shown. This `paint()` method\
    \ should look familiar to anyone who has ever implemented a custom Swing or AWT\
    \ component.\n\nThe MIDP implementation passes a `Graphics` object to your `paint()`\
    \ method. `Graphics` has methods for drawing shapes, text, and images on a `Canvas`.\
    \ A typical `Canvas` implementation, then, looks something like this:\n\n```\n\
    import javax.microedition.lcdui.*;\n\npublic class JonathanCanvas\n    extends\
    \ Canvas {\n  public void paint(Graphics g) {\n    // Draw stuff using g.\n  }\n\
    }\n```\n\nWhat if you want to tell the `Canvas` to draw itself? You can't call\
    \ `paint()` directly, because you don't have a suitable `Graphics` to pass to\
    \ `paint()`. Instead, you need to tell the MIDP implementation that it's time\
    \ to paint the `Canvas`. The way you do this is by calling `repaint()`. The first\
    \ version of this method simply tells `Canvas` to paint everything.\n\n```\npublic\
    \ void repaint()\npublic void repaint(int x, int y, int width, int height)\n```\n\
    \nThe second version is a way of saying, \"I only want you to paint this rectangular\
    \ portion of the screen.\" If the drawing you're doing is very complicated, you\
    \ can save some time by only painting the portion of the `Canvas` that has changed.\
    \ This is implemented using a technique called clipping. A later section discusses\
    \ clipping in more detail.\n\nHow exactly does `repaint()` work? When you call\
    \ `repaint()`, `paint()` won't be called right away. The call to `repaint()` just\
    \ signals to the MIDP implementation that you want the screen to be painted. Some\
    \ time later, the implementation *services* the repaint request, which results\
    \ in an actual call to the `paint()` method of the `Canvas`. The MIDP implementation\
    \ may even combine several repaint requests, particularly if their repaint regions\
    \ overlap.\n\n| Tip | `Canvas` does not automatically clear itself when you call\
    \ `repaint()`. If you want to change what's on the screen, rather than adding\
    \ to it, you should clear the screen in the `paint()` method. You'll see how to\
    \ do this in the `FontCanvas` example later in this chapter. |\n\nAn application\
    \ can force the implementation to service all the repaint requests by calling\
    \ `serviceRepaints()` on the `Canvas` object. This method does not return until\
    \ all pending repaint requests have been serviced. If you are going to call `serviceRepaints()`,\
    \ you should make sure that you aren't trying to acquire object locks in the `paint()`\
    \ method that won't be released until `serviceRepaints()` returns. In general,\
    \ you won't need to call `serviceRepaints()`; you can usually use `Display`'s\
    \ `callSerially()` method instead. (See the \"Multithreading and Animation\" section\
    \ of this chapter for a discussion of `callSerially()`.)\n\n# Drawing Shapes,\
    \ Text, and Images\n\nThe `Graphics` class contains methods for drawing shapes,\
    \ text, and images on a `Canvas`. It also maintains some state, like the current\
    \ pen color and line style. MIDP's `Graphics` class is similar to the `Graphics`\
    \ and `Graphics2D` classes in J2SE but much smaller.\n\n## Coordinate Space\n\n\
    All drawing on a `Canvas` takes place in a coordinate space based on the pixels\
    \ of the device. By default, the origin of this coordinate space is located in\
    \ the upper-left corner of the `Canvas`. X coordinates increase in the right-hand\
    \ direction, while Y coordinates increase in the downward direction, as shown\
    \ in Figure 10-1.\n\n![](fig186_01.jpg)\nFigure 10-1: Canvas coordinate axes\n\
    \nYou can adjust the origin of this coordinate space by calling the `translate()`\
    \ method of the `Graphics` class. This sets the origin to the given coordinates\
    \ in the current coordinate system. To find out the location of the translated\
    \ origin relative to the default origin, call `getTranslateX()` and `getTranslateY()`.\n\
    \n## Drawing and Filling Shapes\n\n`Graphics` contains a collection of methods\
    \ that draw and fill simple shapes. These are detailed in Table 10-1. MIDP 2.0\
    \ includes a new method, `fillTriangle()`.\n\nTable 10-1: Drawing and Filling\
    \ Shapes with `Graphics`\n\n| SHAPE OUTLINE | FILLED SHAPE |\n| --- | --- |\n\
    | `drawLine(int x1, int y1, int x2, int y2)` | - |\n| - | `fillTriangle(int x1,\
    \ int y1, int x2, int y2, int x3, int y3)` |\n| `drawRect(int x, int y, int width,\
    \ int height)` | `fillRect(int x, int y, int width, int height)` |\n| `drawRoundRect(int\
    \ x, int y, int width, int height, int arcWidth, int arcHeight)` | `fillRoundRect(int\
    \ x, int y, int width, int height, int arcWidth, int arcHeight)` |\n| `drawArc(int\
    \ x, int y, int width, int height, int startAngle, int arcAngle)` | `fillArc(int\
    \ x, int y, int width, int height, int startAngle, int arcAngle)` |\n\nThese methods\
    \ do basically what you'd expect. The following example demonstrates some simple\
    \ drawing using `Graphics`. It consists of two pieces. First, `PacerCanvas` demonstrates\
    \ some simple drawing and filling:\n\n```\nimport javax.microedition.lcdui.*;\n\
    \npublic class PacerCanvas\n    extends Canvas {\n  public void paint(Graphics\
    \ g) {\n    int w = getWidth();\n    int h = getHeight();\n\n    g.setColor(0xffffff);\n\
    \    g.fillRect(0, 0, w, h);\n    g.setColor(0x000000);\n\n    for (int x = 0;\
    \ x < w; x += 10)\n      g.drawLine(0, w - x, x, 0);\n\n    int z = 50;\n    g.drawRect(z,\
    \ z, 20, 20);\n    z += 20;\n    g.fillRoundRect(z, z, 20, 20, 5, 5);\n    z +=\
    \ 20;\n    g.drawArc(z, z, 20, 20, 0, 360);\n  }\n}\n```\n\nThe next class is\
    \ `Pacer`, a MIDlet that uses `PacerCanvas`.\n\n```\nimport javax.microedition.lcdui.*;\n\
    import javax.microedition.midlet.*;\n\npublic class Pacer\n    extends MIDlet{\n\
    \  public void startApp() {\n    Displayable d = new PacerCanvas();\n\n    d.addCommand(new\
    \ Command(\"Exit\", Command.EXIT, 0));\n    d.setCommandListener(new CommandListener()\
    \ {\n      public void commandAction(Command c, Displayable s) {\n        notifyDestroyed();\n\
    \      }\n    } );\n\n    Display.getDisplay(this).setCurrent(d);\n  }\n\n  public\
    \ void pauseApp() { }\n\n  public void destroyApp(boolean unconditional) { }\n\
    }\n```\n\nWhen you run `Pacer` in Sun's J2ME Wireless Toolkit emulator, it looks\
    \ like Figure 10-2.\n\n![](fig188_01.jpg)\nFigure 10-2: Playing around with `Graphics`"
  raw: "## Painting and Repainting\n\nThe MIDP implementation calls a Canvas's paint()\
    \ method when the contents of the Canvas need to be shown. This paint() method\
    \ should look familiar to anyone who has ever implemented a custom Swing or AWT\
    \ component.\n\nThe MIDP implementation passes a Graphics object to your paint()\
    \ method. Graphics has methods for drawing shapes, text, and images on a Canvas.\
    \ A typical Canvas implementation, then, looks something like this:\n\n```\nimport\
    \ javax.microedition.lcdui.*;\n\npublic class JonathanCanvas\n    extends Canvas\
    \ {\n  public void paint(Graphics g) {\n    // Draw stuff using g.\n  }\n} \n\
    ```\n\nWhat if you want to tell the Canvas to draw itself? You can't call paint()\
    \ directly, because you don't have a suitable Graphics to pass to paint() . Instead,\
    \ you need to tell the MIDP implementation that it's time to paint the Canvas.\
    \ The way you do this is by calling repaint(). The first version of this method\
    \ simply tells Canvas to paint everything.\n\n```\npublic void repaint()\npublic\
    \ void repaint(int x, int y, int width, int height)\n```\n\nThe second version\
    \ is a way of saying, \"I only want you to paint this rectangular portion of the\
    \ screen.\" If the drawing you're doing is very complicated, you can save some\
    \ time by only painting the portion of the Canvas that has changed. This is implemented\
    \ using a technique called clipping. A later section discusses clipping in more\
    \ detail.\n\nHow exactly does repaint() work? When you call repaint(), paint()\
    \ won't be called right away. The call to repaint() just signals to the MIDP implementation\
    \ that you want the screen to be painted. Some time later, the implementation\
    \ *services* the repaint request, which results in an actual call to the paint()\
    \ method of the Canvas. The MIDP implementation may even combine several repaint\
    \ requests, particularly if their repaint regions overlap.\n\n|  | Tip  | *Canvas*\
    \ does not automatically clear itself when you call *repaint()*. If you want to\
    \ change what's on the screen, rather than adding to it, you should clear the\
    \ screen in the *paint()* method. You'll see how to do this in the *FontCanvas*\
    \ example later in this chapter. |\n\nAn application can force the implementation\
    \ to service all the repaint requests by calling serviceRepaints() on the Canvas\
    \ object. This method does not return until all pending repaint requests have\
    \ been serviced. If you are going to call serviceRepaints(), you should make sure\
    \ that you aren't trying to acquire object locks in the paint() method that won't\
    \ be released until serviceRepaints() returns. In general, you won't need to call\
    \ serviceRepaints(); you can usually use Display's callSerially() method instead.\
    \ (See the \"[Multithreading and Animation](#LiB0083.html#462)\" section of this\
    \ chapter for a discussion of callSerially().)\n\n## Drawing Shapes, Text, and\
    \ Images\n\nThe Graphics class contains methods for drawing shapes, text, and\
    \ images on a Canvas. It also maintains some state, like the current pen color\
    \ and line style. MIDP's Graphics class is similar to the Graphics and Graphics2D\
    \ classes in J2SE but much smaller.\n\n### Coordinate Space\n\nAll drawing on\
    \ a Canvas takes place in a coordinate space based on the pixels of the device.\
    \ By default, the origin of this coordinate space is located in the upper-left\
    \ corner of the Canvas. X coordinates increase in the right-hand direction, while\
    \ Y coordinates increase in the downward direction, as shown in [Figure 10-1](#LiB0078.html#ch10fig01).\n\
    \n![](fig186_01.jpg)\nFigure 10-1: Canvas coordinate axes\n\nYou can adjust the\
    \ origin of this coordinate space by calling the translate() method of the Graphics\
    \ class. This sets the origin to the given coordinates in the current coordinate\
    \ system. To find out the location of the translated origin relative to the default\
    \ origin, call getTranslateX() and getTranslateY().\n\n### Drawing and Filling\
    \ Shapes\n\nGraphics contains a collection of methods that draw and fill simple\
    \ shapes. These are detailed in [Table 10-1](#LiB0078.html#ch10table01). MIDP\
    \ 2.0 includes a new method, fillTriangle().\n\nTable 10-1: Drawing and Filling\
    \ Shapes with *Graphic*s\n\n| **SHAPE OUTLINE** | **FILLED SHAPE** |\n| --- |\
    \ --- |\n| drawLine(int x1, int y1, int x2, int y2) | - |\n| - | fillTriangle(int\
    \ x1, int y1, int x2, int y2, int x3, int y3) |\n| drawRect(int x, int y, int\
    \ width, int height) | fillRect(int x, int y, int width, int height) |\n| drawRoundRect(int\
    \ x, int y, int width, int height, int arcWidth, int arcHeight) | fillRoundRect(int\
    \ x, int y, int width, int height, int arcWidth, int arcHeight) |\n| drawArc(int\
    \ x, int y, int width, int height, int startAngle, int arcAngle) | fillArc(int\
    \ x, int y, int width, int height, int startAngle, int arcAngle) |\n\nThese methods\
    \ do basically what you'd expect. The following example demonstrates some simple\
    \ drawing using Graphics. It consists of two pieces. First, PacerCanvas demonstrates\
    \ some simple drawing and filling:\n\n```\nimport javax.microedition.lcdui.*;\n\
    \npublic class PacerCanvas\n    extends Canvas {\n  public void paint(Graphics\
    \ g) {\n    int w = getWidth();\n    int h = getHeight();\n\n    g.setColor(0xffffff);\n\
    \    g.fillRect(0, 0, w, h);\n    g.setColor(0x000000);\n\n    for (int x = 0;\
    \ x < w; x += 10)\n      g.drawLine(0, w - x, x, 0);\n\n    int z = 50;\n    g.drawRect(z,\
    \ z, 20, 20);\n    z += 20;\n    g.fillRoundRect(z, z, 20, 20, 5, 5);\n    z +=\
    \ 20;\n    g.drawArc(z, z, 20, 20, 0, 360);\n  }\n} \n```\n\nThe next class is\
    \ Pacer, a MIDlet that uses PacerCanvas.\n\n```\nimport javax.microedition.lcdui.*;\n\
    import javax.microedition.midlet.*;\n\npublic class Pacer\n    extends MIDlet{\n\
    \  public void startApp() {\n    Displayable d = new PacerCanvas();\n\n    d.addCommand(new\
    \ Command(\"Exit\", Command.EXIT, 0));\n    d.setCommandListener(new CommandListener()\
    \ {\n      public void commandAction(Command c, Displayable s) {\n        notifyDestroyed();\n\
    \      }\n    } );\n\n    Display.getDisplay(this).setCurrent(d);\n  }\n\n  public\
    \ void pauseApp() { }\n\n  public void destroyApp(boolean unconditional) { }\n\
    }\n```\n\nWhen you run Pacer in Sun's J2ME Wireless Toolkit emulator, it looks\
    \ like [Figure 10-2](#LiB0078.html#ch10fig02).\n\n![](fig188_01.jpg)\nFigure 10-2:\
    \ Playing around with *Graphics*"
  trans: "\n## 绘制与重绘\n\n当需要显示 Canvas 的内容时，MIDP 实现会调用 Canvas 的 `paint()` 方法。任何实现过自定义\
    \ Swing 或 AWT 组件的人，都应该对这个 `paint()` 方法感到熟悉。\n\nMIDP 实现会向你的 `paint()` 方法传递一个 `Graphics`\
    \ 对象。`Graphics` 提供了在 Canvas 上绘制形状、文本和图像的方法。因此，一个典型的 Canvas 实现大致如下：\n\n```\nimport\
    \ javax.microedition.lcdui.*;\n\npublic class JonathanCanvas\n    extends Canvas\
    \ {\n  public void paint(Graphics g) {\n    // 使用 g 绘制内容\n  }\n} \n```\n\n如果你想告诉\
    \ Canvas 自行绘制，该怎么办？你不能直接调用 `paint()`，因为你没有合适的 `Graphics` 对象可以传递给 `paint()`。相反，你需要告诉\
    \ MIDP 实现是时候绘制 Canvas 了。实现这一操作的方法是调用 `repaint()`。该方法的第一个版本只是简单地告诉 Canvas 绘制所有内容。\n\
    \n```\npublic void repaint()\npublic void repaint(int x, int y, int width, int\
    \ height)\n```\n\n第二个版本的意思是：“我只希望你绘制屏幕上的这个矩形区域。” 如果你要进行的绘制非常复杂，可以通过只绘制 Canvas\
    \ 中发生变化的部分来节省时间。这是通过一种称为**裁剪**的技术实现的。后面的章节会更详细地讨论裁剪。\n\n`repaint()` 究竟是如何工作的？当你调用\
    \ `repaint()` 时，`paint()` 并不会立即被调用。调用 `repaint()` 只是向 MIDP 实现发出信号，表明你想要绘制屏幕。稍后，实现会*处理*这个重绘请求，最终导致实际调用\
    \ Canvas 的 `paint()` 方法。MIDP 实现甚至可能合并多个重绘请求，特别是当它们的重绘区域重叠时。\n\n|  | 提示 | 当你调用\
    \ *repaint()* 时，*Canvas* 不会自动清除自身。如果你想改变屏幕上的内容，而不是在其上添加内容，你应该在 *paint()* 方法中清除屏幕。你将在本章后面的\
    \ *FontCanvas* 示例中看到如何做到这一点。 |\n\n应用程序可以通过调用 Canvas 对象上的 `serviceRepaints()` 来强制实现处理所有重绘请求。此方法在所有待处理的重绘请求被处理完毕之前不会返回。如果你打算调用\
    \ `serviceRepaints()`，应确保你没有在 `paint()` 方法中试图获取那些在 `serviceRepaints()` 返回前不会释放的对象锁。通常，你不需要调用\
    \ `serviceRepaints()`；你可以改用 `Display` 的 `callSerially()` 方法。（关于 `callSerially()`\
    \ 的讨论，请参见本章的“多线程与动画”部分。）\n\n## 绘制形状、文本和图像\n\n`Graphics` 类包含在 Canvas 上绘制形状、文本和图像的方法。它还维护一些状态，比如当前的画笔颜色和线条样式。MIDP\
    \ 的 `Graphics` 类类似于 J2SE 中的 `Graphics` 和 `Graphics2D` 类，但规模小得多。\n\n### 坐标空间\n\n\
    Canvas 上的所有绘制都发生在一个基于设备像素的坐标空间中。默认情况下，该坐标空间的原点位于 Canvas 的左上角。X 坐标向右增加，而 Y 坐标向下增加，如图\
    \ 10-1 所示。\n\n![](img/fig186_01.jpg)\n图 10-1：Canvas 坐标轴\n\n你可以通过调用 `Graphics`\
    \ 类的 `translate()` 方法来调整此坐标空间的原点。这会将原点设置为当前坐标系中的给定坐标。要找出平移后的原点相对于默认原点的位置，可以调用\
    \ `getTranslateX()` 和 `getTranslateY()`。\n\n### 绘制和填充形状\n\n`Graphics` 包含一组绘制和填充简单形状的方法。这些方法详列于表\
    \ 10-1 中。MIDP 2.0 包含了一个新方法 `fillTriangle()`。\n\n表 10-1：使用 *Graphics* 绘制和填充形状\n\
    \n| **形状轮廓** | **填充形状** |\n| --- | --- |\n| drawLine(int x1, int y1, int x2, int\
    \ y2) | - |\n| - | fillTriangle(int x1, int y1, int x2, int y2, int x3, int y3)\
    \ |\n| drawRect(int x, int y, int width, int height) | fillRect(int x, int y,\
    \ int width, int height) |\n| drawRoundRect(int x, int y, int width, int height,\
    \ int arcWidth, int arcHeight) | fillRoundRect(int x, int y, int width, int height,\
    \ int arcWidth, int arcHeight) |\n| drawArc(int x, int y, int width, int height,\
    \ int startAngle, int arcAngle) | fillArc(int x, int y, int width, int height,\
    \ int startAngle, int arcAngle) |\n\n这些方法基本上执行你所期望的操作。以下示例演示了使用 `Graphics` 进行的一些简单绘制。它由两部分组成。首先，`PacerCanvas`\
    \ 演示了一些简单的绘制和填充：\n\n```\nimport javax.microedition.lcdui.*;\n\npublic class PacerCanvas\n\
    \    extends Canvas {\n  public void paint(Graphics g) {\n    int w = getWidth();\n\
    \    int h = getHeight();\n\n    g.setColor(0xffffff);\n    g.fillRect(0, 0, w,\
    \ h);\n    g.setColor(0x000000);\n\n    for (int x = 0; x < w; x += 10)\n    \
    \  g.drawLine(0, w - x, x, 0);\n\n    int z = 50;\n    g.drawRect(z, z, 20, 20);\n\
    \    z += 20;\n    g.fillRoundRect(z, z, 20, 20, 5, 5);\n    z += 20;\n    g.drawArc(z,\
    \ z, 20, 20, 0, 360);\n  }\n} \n```\n\n下一个类是 `Pacer`，一个使用 `PacerCanvas` 的 MIDlet。\n\
    \n```\nimport javax.microedition.lcdui.*;\nimport javax.microedition.midlet.*;\n\
    \npublic class Pacer\n    extends MIDlet{\n  public void startApp() {\n    Displayable\
    \ d = new PacerCanvas();\n\n    d.addCommand(new Command(\"Exit\", Command.EXIT,\
    \ 0));\n    d.setCommandListener(new CommandListener() {\n      public void commandAction(Command\
    \ c, Displayable s) {\n        notifyDestroyed();\n      }\n    } );\n\n    Display.getDisplay(this).setCurrent(d);\n\
    \  }\n\n  public void pauseApp() { }\n\n  public void destroyApp(boolean unconditional)\
    \ { }\n}\n```\n\n当你在 Sun 的 J2ME Wireless Toolkit 模拟器中运行 `Pacer` 时，它看起来像图 10-2。\n\
    \n![](img/fig188_01.jpg)\n图 10-2：使用 *Graphics* 进行绘制\n"
- fmt: "### Working with Color\n\nThe `Graphics` class maintains a current drawing\
    \ color that is used for drawing shape outlines, filling shapes, and drawing text.\
    \ Colors are represented as combinations of red, green, and blue, with eight bits\
    \ for each color component. You can set the current drawing color using the following\
    \ method:\n\n```\npublic void setColor(int RGB)\n```\n\nThis method expects the\
    \ red, green, and blue values in a packed integer, as shown in [Figure 10-3](#LiB0078.html#ch10fig03).\n\
    \n[![Click To expand](fig189_01.jpg)](fig189_01_0.jpg)\nFigure 10-3: Packing a\
    \ color into an integer\n\nAn alternate convenience method accepts red, green,\
    \ and blue values as integers in the range from 0 to 255 inclusive:\n\n```\npublic\
    \ void setColor(int red, int green, int blue)\n```\n\nYou can retrieve the current\
    \ drawing color (as a packed integer) with `getColor()`. Alternately, you can\
    \ retrieve each component separately using `getRedComponent()`, `getGreenComponent()`,\
    \ and `getBlueComponent()`.\n\nOf course, different devices will have different\
    \ levels of color support, from black and white (affectionately known as \"one-bit\
    \ color\") through full 24-bit color. As I mentioned in [Chapter 5](#LiB0036_split_000.html#174),\
    \ the `isColor()` and `numColors()` methods in `Display` return useful information\
    \ about the capabilities of the device.\n\nFor grayscale devices, `Graphics` provides\
    \ `setGrayScale()` as a convenience method. You pass it a number from 0 (black)\
    \ to 255 (white). You can find out the current grayscale value by calling `getGrayScale()`.\
    \ If the current color of this `Graphics` is not a grayscale color (i.e., if the\
    \ red, green, and blue values of the current color are not the same), then this\
    \ method returns its best guess as to the brightness of the current color.\n\n\
    MIDP 2.0 adds a `getDisplayColor()` method to the `Graphics` class. This is a\
    \ handy method that can tell you at runtime exactly how a requested color will\
    \ be displayed on the device. You feed it a color `int` and it returns the color\
    \ `int` that will actually be displayed on the device. For example, on the J2ME\
    \ Wireless Toolkit's `DefaultGrayPhone` emulator, pure green (`0x00ff00`) maps\
    \ to the gray level `0x959595`.\n\n### Line Styles\n\n`Graphics` also maintains\
    \ a current line style, called a *stroke style*, which is used for drawing shape\
    \ outlines and lines. There are two choices for line style, represented by constants\
    \ in the `Graphics` class:\n\n*   `SOLID` is the default.\n*   `DOTTED` lines\
    \ may also be drawn.\n\nIt's up to the implementation to decide exactly how dotted\
    \ lines are implemented, so dotted lines on one device may look dashed on another.\
    \ You can set or retrieve the current style using `setStrokeStyle()` and `getStrokeStyle()`.\
    \ For example, the following code draws a square with a solid outline (the default)\
    \ and another square with a dotted outline:\n\n```\npublic void paint(Graphics\
    \ g) {\n  g.drawRect(20, 10, 35, 35);\n  g.setStrokeStyle(Graphics.DOTTED);\n\
    \  g.drawRect(20, 60, 35, 35);\n}\n```\n\n### Drawing Text\n\nThe `Graphics` class\
    \ makes it easy to draw text anywhere on the screen. Text drawing is based around\
    \ the idea of an anchor point. The anchor point determines exactly where the text\
    \ will be drawn. Anchor points are described with a horizontal and vertical component.\
    \ The `Graphics` class defines the horizontal and vertical anchor points as constants.\
    \ [Figure 10-4](#LiB0078.html#ch10fig04) illustrates the various anchor points\
    \ for a string of text. Each anchor point is described as a combination of a horizontal\
    \ and vertical anchor point.\n\n[![Click To expand](fig191_01.jpg)](fig191_01_0.jpg)\n\
    Figure 10-4: Text anchor points\n\nTo draw text, you just need to specify the\
    \ text itself and the location and type of anchor point. You could, for example,\
    \ place some text in the upper-left corner of the screen by using a `TOP | LEFT`\
    \ anchor point located at `0, 0`.\n\nText is specified as a `String` or an array\
    \ of `chars`, which means you can draw text in many languages, provided that the\
    \ fonts you're using have the corresponding glyphs.\n\n`Graphics` provides four\
    \ different methods for drawing text. You can draw characters or `Strings`, depending\
    \ on what you have available:\n\n```\npublic void drawChar(char character, int\
    \ x, int y, int anchor)\npublic void drawChars(char[] data, int offset, int length,\n\
    \    int x, int y, int anchor)\npublic void drawString(String str, int x, int\
    \ y, int anchor)\npublic void drawSubstring(String str, int offset, int len,\n\
    \    int x, int y, int anchor)\n```\n\nThe following example shows how to place\
    \ text at various places on a `Canvas`:\n\n```\nimport javax.microedition.lcdui.*;\n\
    \npublic class TextCanvas\n    extends Canvas {\n  public void paint(Graphics\
    \ g) {\n    int w = getWidth();\n    int h = getHeight();\n\n    g.setColor(0xffffff);\n\
    \    g.fillRect(0, 0, w, h);\n    g.setColor(0x000000);\n    // First label the\
    \ four corners.\n    g.drawString(\"corner\", 0, 0,\n        Graphics.TOP | Graphics.LEFT);\n\
    \    g.drawString(\"corner\", w, 0,\n        Graphics.TOP | Graphics.RIGHT);\n\
    \    g.drawString(\"corner\", 0, h,\n        Graphics.BOTTOM | Graphics.LEFT);\n\
    \    g.drawString(\"corner\", w, h,\n        Graphics.BOTTOM | Graphics.RIGHT);\n\
    \n// Now put something in the middle (more or less).\n    g.drawString(\"Sin Wagon\"\
    , w / 2, h / 2,\n        Graphics.BASELINE | Graphics.HCENTER);\n  }\n}\n```\n\
    \nTo see this `Canvas`, you'll have to create a `MIDlet` that displays it. I suggest\
    \ using `Pacer`; just edit the source file so it instantiates a `TextCanvas` instead\
    \ of a `PacerCanvas`. The finished product is shown in [Figure 10-5](#LiB0078.html#ch10fig05).\n\
    \n![](fig192_01.jpg)\nFigure 10-5: *TextCanvas* in the flesh\n\nNote that `Canvas`\
    \ denies us some real estate at the bottom of the screen. This is to allow space\
    \ for `Commands`. `Canvas`, like any other `Displayable`, can display commands\
    \ and have a command listener."
