    \              76, 4, 74, 8, ToneControl.SILENCE, 8,\n        ToneControl.BLOCK_END,\
    \ 1,\n\nToneControl.SET_VOLUME, 100, ToneControl.PLAY_BLOCK, 0,\n        ToneControl.SET_VOLUME,\
    \ 50, ToneControl.PLAY_BLOCK, 0,\n        ToneControl.SET_VOLUME, 100, ToneControl.PLAY_BLOCK,\
    \ 1,\n        ToneControl.SET_VOLUME, 50, ToneControl.PLAY_BLOCK, 1,\n       \
    \ ToneControl.SET_VOLUME, 100, ToneControl.PLAY_BLOCK, 0,\n      };\n    }\n \
    \   try {\n      Player player = Manager.createPlayer(Manager.TONE_DEVICE_LOCATOR);\n\
    \      player.realize();\n      ToneControl tc = (ToneControl)player.getControl(\"\
    ToneControl\");\n      tc.setSequence(sequence);\n      player.start();\n    }\n\
    \    catch (Exception e) {\n      Alert a = new Alert(\"异常\", e.toString(), null,\
    \ null);\n      a.setTimeout(Alert.FOREVER);\n      mDisplay.setCurrent(a, mMainScreen);\n\
    \    }\n  }\n} \n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n请记住，Player 的`start()`方法不会阻塞。如果你愿意，可以在模拟器中同时启动所有三首歌曲。这是因为工具包模拟器使用和弦设备来播放音调序列。在真实设备上，同时播放多个序列可能无法实现。但你可以设置一个序列运行，假设它不会占用太多处理器时间，你的\
    \ MIDlet 就可以去执行其他任务，比如绘制游戏界面或连接网络。\n\n## 移动媒体 API\n\nMIDP 2.0 的音频支持是移动媒体 API 全部功能的一个子集。如果你使用的是\
    \ J2ME 无线工具包，其模拟器默认支持完整的 MMAPI。这意味着你可以使用其他 API，并且实现支持多种额外的内容类型。\n\n如果你想移除 MMAPI\
    \ 支持，仅保留 MIDP 2.0 音频，请从 KToolbar 菜单中选择**编辑** Ø **首选项**，然后点击**API 可用性**选项卡。如果你不希望使用**移动媒体\
    \ API**，可以取消勾选。\n\n如果你使用的是工具包的 MMAPI 实现，可以在首选项窗口的**MMedia**选项卡中自定义支持的内容类型和媒体功能。\n\
    \n有关 MMAPI 的更多信息，请参见[`wireless.java.sun.com/apis/articles/mmapi_overview/`](http://wireless.java.sun.com/apis/articles/mmapi_overview/)。\n\
    \n## 总结\n\n在本章中，你学习了如何在 MIDP 2.0 中播放音调和采样音频。MIDP 2.0 包含了移动媒体 API 的一个子集——音频构建模块。它基于能够渲染音频数据的\
    \ Player 和知道如何将音频数据传输到 Player 的隐式协议对象。除了对采样音频的可选和灵活支持外，ABB 还包含音调序列播放器。现在，你的 MIDlet\
    \ 可以受益于音乐和采样音频带来的乐趣。\n\n# 第 13 章：性能调优\n\n## 概述\n\nMIDP 是一个小型平台。MIDP 设备上的处理器可能比典型的桌面计算机处理器慢得多，可用内存也小得多。让你的应用程序运行快速且精简非常重要。你需要节约使用内存，使应用程序运行速度足够快以便于使用，并合理组织代码结构，使代码本身尽可能小。\n\
    \n本章描述了对你现有代码进行基准测试的简单方法。然后继续介绍各种优化方法，这些方法可以使你的代码运行更快或使用更少的内存。常识会对你大有帮助，但本章致力于为你提供优化应用程序的基本技术。\n\
    \n重要的经验法则是：只在需要的地方进行优化。换句话说：如果没坏，就别修。我建议你在编写应用程序的第一版时，应专注于代码的整洁性和可维护性。如果存在性能问题，找出它们并开始优化。你不应该在编写代码的同时进行优化——这很可能导致代码难以阅读和维护。先编写，再测试，最后优化。\n"
- fmt: "# Benchmarking\n\nIn the J2SE world, there are many tools for examining the\
    \ performance of code, the location of bottlenecks, and memory usage. Unfortunately,\
    \ little of this is available in the J2ME world. For the most part, you'll have\
    \ to perform benchmarking the old-fashioned way. For this, there are several methods\
    \ in the MIDP API that will be useful. To test memory use, you can use the following\
    \ methods in `java.lang.Runtime`:\n\n```\npublic long freeMemory()\npublic long\
    \ totalMemory()\n```\n\nThe first method tells how much memory, in bytes, is currently\
    \ available. The second method gives the total number of bytes in the current\
    \ runtime environment, whether they are used for objects or not. Interestingly,\
    \ this number can change because the host environment (device operating system)\
    \ can give more memory to the Java runtime environment.\n\nTo find out how much\
    \ memory an object uses, you can do something like this:\n\n```\nRuntime runtime\
    \ = Runtime.getRuntime();\nlong before, after;\nSystem.gc();\nbefore = runtime.freeMemory();\n\
    Object newObject = new String();\nafter = runtime.freeMemory();\nlong size = before\
    \ - after;\n```\n\nAside from examining memory usage, you may also be concerned\
    \ with the speed of your application. Again, you can test this the old-fashioned\
    \ way—look at the clock before you start doing something, then look at it again\
    \ when you're finished. The relevant method comes from the `java.lang.System`\
    \ class:\n\n```\npublic static long currentTimeMillis()\n```\n\nYou might calculate\
    \ the execution time for a method like this:\n\n```\nlong start, finish;\nstart\
    \ = System.currentTimeMillis();\nsomeMethod();\nfinish = System.currentTimeMillis();\n\
    long duration = finish - start;\n```\n\nFor accurate timing, you should measure\
    \ the duration multiple times and calculate an average.\n\n## Diagnostic Tools\
    \ in the J2ME Wireless Toolkit\n\nStarting with version 1.0.4, the J2ME Wireless\
    \ Toolkit contains three tools you can use to understand your application's performance.\n\
    \nThe first tool is a memory monitor. You can see a graph of memory usage in your\
    \ application over time or a detailed breakdown of every object in your application.\
    \ Turn on the memory monitor by choosing **Edit** Ø **Preferences** from the KToolbar\
    \ menu. Click the **Monitoring** tab and check off **Enable Memory Monitor**.\
    \ Next time you run the emulator, an additional window will pop up. You can examine\
    \ the total memory used, which is useful when you're trying to make an application\
    \ fit on a device with a limited heap size. (You can even set the heap size of\
    \ the emulator in the **Storage** tab of the preferences window.) [Figure 13-1](#LiB0107.html#ch13fig01)\
    \ shows the memory monitor graph.\n\n[![Click To expand](fig259_01.jpg)](fig259_01_0.jpg)\n\
    Figure 13-1: Graph of memory use over time\n\nIf you click the **Objects** tab\
    \ in the memory monitor window, you'll see a detailed listing of the objects in\
    \ your application. [Figure 13-2](#LiB0107.html#ch13fig02) shows this view.\n\n\
    [![Click To expand](fig259_02.jpg)](fig259_02_0.jpg)\nFigure 13-2: Objects and\
    \ their memory\n\nYou can click on any column in the table to sort by that column.\
    \ You can even search for specific items using **View** Ø **Find**. Examining\
    \ the memory monitor window will help you identify the places where memory is\
    \ consumed most in your application.\n\nAside from the memory monitor, the toolkit\
    \ also includes a *code profiler*—a tool that shows how much time is spent in\
    \ every method in your application. To turn on the profiler, choose **Edit** Ø\
    \ **Preferences** from the KToolbar menu. Choose the **Monitoring** tab and check\
    \ off **Enable Profiling**.\n\nYou won't see the profiler until you exit the emulator.\
    \ When you do, the profiler window pops up, summarizing time spent in every method\
    \ in your application during the last emulator run. Note that what you do in the\
    \ emulator will affect the output in the profiler; if you want to test the performance\
    \ of your application as a whole, you'll have to exercise all of its options.\
    \ [Figure 13-3](#LiB0107.html#ch13fig03) shows the emulator after running the\
    \ QuatschMIDlet example from [Chapter 11](#LiB0085_split_000.html#471).\n\n[![Click\
    \ To expand](fig260_01.jpg)](fig260_01_0.jpg)\nFigure 13-3: The profiler times\
    \ everything.\n\nFinally, the J2ME Wireless Toolkit also includes a network monitor.\
    \ Although it's probably more useful for debugging network protocols than for\
    \ optimization, it deserves mention here. To turn on the network monitor, choose\
    \ **Edit** Ø **Preferences** from the KToolbar menu. Choose the **Monitoring**\
    \ tab and check off **Enable Network Monitoring**. Next time you run the emulator,\
    \ a new window will pop up that tracks network usage. [Figure 13-4](#LiB0107.html#ch13fig04)\
    \ shows a few network interactions from the PeekAndPick application ([http://wireless.java.sun.com/applications/peekandpick/2.0/](http://wireless.java.sun.com/applications/peekandpick/2.0/)).\n\
    \n[![Click To expand](fig261_01.jpg)](fig261_01_0.jpg)\nFigure 13-4: Network activity\
    \ from the PeekAndPick application\n\n## Optimizing Memory Use\n\nIt's easy for\
    \ J2SE programmers to be blasé about memory usage. After all, having a garbage\
    \ collector means that you don't have to worry about explicitly freeing memory—objects\
    \ that are no longer in use will be magically harvested by the garbage collector,\
    \ running in a low-priority thread. In the J2ME universe, however, memory is scarce\
    \ and should be treated with respect. Furthermore, both the allocation of memory\
    \ and the work of the garbage collector can drag down the speed of your application.\
    \ In this section, we'll look at techniques for efficient object use, particularly\
    \ with Strings and StringBuffers. Finally, I'll talk about gracefully handling\
    \ the situation where there really isn't any memory left.\n\n### Creating and\
    \ Discarding Objects\n\nIf you're creating a new object inside a loop, it should\
    \ be setting off alarm bells in your head. Every time you create an object (using\
    \ `new`), memory is allocated. Allocating memory takes time. Worse, objects created\
    \ at the beginning of a loop are likely to fall out of scope by the end of the\
    \ loop, which means that each iteration through the loop pushes the runtime system\
    \ closer to running the garbage collector. Here's an example:\n\n```\n// Set up\
    \ the inputs and results arrays.\nObject[] inputs = new Object[1000];\nint[] results\
    \ = new int[1000];\n// Process each input to calculate a result.\nint length =\
    \ inputs.length;\nfor (int i = 0; i < length; i++) {\n  Processor p = new Processor(inputs[i]);\n\
    \  results[i] = p.calculateResult();\n}\n```\n\nCreating objects in a loop imposes\
    \ a double penalty in terms of performance. A new `Processor` is created every\
    \ time through the loop; if these objects are large enough, then garbage collection\
    \ may be forced one or more times before the loop is finished. You pay a price\
    \ up front when the object is first created, then later when the object is garbage\
    \ collected.\n\nYou can almost always restructure your code to avoid this problem.\
    \ For example, instead of creating a new `Processor` for each input, you could\
    \ do something like this:\n\n```\n// Set up the inputs and results arrays.\nObject[]\
    \ inputs = new Object[1000];\nint[] results = new int[1000];\n// Process each\
    \ input to calculate a result.\nint length = inputs.length;\nProcessor p = new\
    \ Processor();\nfor (int i = 0; i < length; i++) {\n  p.setInput(inputs[i]);\n\
    \  results[i] = p.calculateResult();\n}\n```"
