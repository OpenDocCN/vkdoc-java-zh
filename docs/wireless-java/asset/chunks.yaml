  trans: "\n### 创建并初始化 TiledLayer\n\n要创建 TiledLayer，需向构造函数提供列数、行数、源图像以及图块尺寸：\n\n```\n\
    public TiledLayer(int columns, int rows,\n    Image image, int tileWidth, int\
    \ tileHeight)\n```\n\n图像和图块尺寸描述了一个*静态图块集*。你可以通过以下方法更改现有 TiledLayer 上的静态图块集：\n\n\
    ```\npublic void setStaticTileSet(Image image, int tileWidth, int tileHeight)\n\
    ```\n\nTiledLayer 的列数和行数可通过 getColumns() 和 getRows() 获取。要获取图块尺寸，请使用 getCellWidth()\
    \ 和 getCellHeight()。（虽然方法命名不太一致，但这样是可行的，因为每个单元格的像素尺寸与图块的像素尺寸相同。）\n\nTiledLayer\
    \ 在首次创建时是空的。要将图块分配给某个单元格，请使用以下方法：\n\n```\npublic void setCell(int col, int row,\
    \ int tileIndex)\n```\n\nTiledLayer 中的所有单元格初始时都填充图块索引 0，表示空白图块。你可以通过将单元格的列号和行号传递给\
    \ getCell() 来获取特定单元格的图块索引。如果你想将同一个图块分配给一系列单元格，请使用 fillCells() 方法：\n\n```\npublic\
    \ void fillCells(int col, int row, int numCols, int numRows,\n    int tileIndex)\n\
    ```\n\ncol、row、numCols 和 numRows 参数描述了一个矩形单元格区域，该区域将被填充指定的图块。例如，fillCells(2, 0,\
    \ 1, 2, 6) 会将图块 6 分配给图块层第三列第一行和第二行的单元格。\n\n以下摘录（改编自本书源代码下载中的 *QuatschCanvas.java*，可从\
    \ [`www.apress.com/`](http://www.apress.com/) 获取）演示了创建和初始化 TiledLayer 的一种方法。\n\
    \n```\nImage backgroundImage = Image.createImage(\"/background_tiles.png\");\n\
    TiledLayer background = new TiledLayer(8, 4, backgroundImage, 48, 48);\nbackground.setPosition(12,\
    \ 0);\nint[] map = {\n  1, 2, 0, 0, 0, 0, 0, 0,\n  3, 3, 2, 0, 0, 0, 5, 0,\n \
    \ 3, 3, 3, 2, 4, 1, 3, 2,\n  6, 6, 6, 6, 6, 6, 6, 6\n};\nfor (int i = 0; i < map.length;\
    \ i++) {\n  int column = i % 8;\n  int row = (i - column) / 8;\n  background.setCell(column,\
    \ row, map[i]);\n}\n```\n\n使用图 11-1 的源图像，这段代码将生成图 11-4 所示的图块层。\n\n![点击展开](img/fig222_01_0.jpg)\n\
    图 11-4：一个图块层\n\n现在你几乎已经了解了 TiledLayer 的全部内容；它充当了图块调色板与完整组装层之间的简单映射。\n\n### 使用动画图块\n\
    \n还有一个额外的技巧：*动画*图块。动画图块是一种虚拟图块，其映射可以在运行时更改。虽然你可以通过在所有想要更改的单元格上调用 setCell() 来实现同样的效果，但使用动画图块只需一次调用即可更改所有受影响的单元格。\n\
    \n要使用动画图块，请通过调用以下方法创建一个：\n\n```\npublic int createAnimatedTile(int staticTileIndex)\n\
    ```\n\n你向该方法传递一个常规图块索引，作为动画图块应使用的初始图块。该方法返回一个特殊的动画图块索引。（这里没什么神奇的；它只是一个负数。）\n\n\
    要将动画图块分配给某个单元格，请将 createAnimatedTile() 的返回值传递给 setCell()。当你想更改动画图块的内容时，请使用以下方法：\n\
    \n```\npublic void setAnimatedTile(int animatedTileIndex, int staticTileIndex)\n\
    ```\n\n这将把提供的图块索引分配给该动画图块。所有拥有该动画图块的单元格现在都将显示给定的图块。\n\n如果你需要获取与动画图块关联的当前图块，只需将动画图块索引传递给\
    \ getAnimatedTile() 即可。\n\n## 使用 Sprite\n\nTiledLayer 使用图块调色板来填充大面积区域，而 Sprite\
    \ 则使用图块调色板来动画化一个与单个图块大小相同的层。通常，精灵代表游戏中的某个主角。在 Sprite 的术语中，图块被称为*帧*。与 TiledLayer\
    \ 类似，Sprite 也是从被分割成等尺寸帧的源图像创建的。\n\n```\npublic Sprite(Image image, int frameWidth,\
    \ int frameHeight)\n```\n\n还有一种特殊情况，如果图像只包含一帧，则不会进行动画：\n\n```\npublic Sprite(Image\
    \ image) \n```\n\n有趣的是，Sprite 不能由单独的帧图像创建；帧必须打包到单个源图像中。\n\n如果你想在 Sprite 创建后更改源图像，请使用\
    \ setImage()：\n\n```\npublic void setImage(Image img, int frameWidth, int frameHeight)\n\
    ```\n\nSprite 中包含的帧总数由 getRawFrameCount() 返回。\n\n与其他 Layer 一样，Sprite 在调用 paint()\
    \ 方法时进行渲染。通常，Sprite 会属于一个 LayerManager，在这种情况下，当 LayerManager 被渲染时，Sprite 会自动渲染。\n\
    \n### 动画化 Sprite\n\nSprite 动画的核心在于*帧序列*。当 Sprite 被创建时，它有一个默认的帧序列，该序列包含源图像中的每一帧。例如，考虑一个名为\
    \ Dr. Quatsch 的虚构角色的源图像，如图 11-5 所示。\n\n![](img/fig224_01.jpg)\n图 11-5：一个精灵源图像\n\
    \n该图像为 192 × 48 像素。如果以 48 × 48 像素的帧尺寸创建，则有四帧。默认帧序列是 { 0, 1, 2, 3 }。请注意，帧索引从零开始编号，而图块索引（在\
    \ TiledLayer 类中）从一开始编号。\n\n在上图中，前三帧代表 Dr. Quatsch 在奔跑，而第四帧是显示他静止站立的帧。以下方法更改当前帧序列：\n\
    \n```\npublic void setFrameSequence(int[] sequence) \n```\n\n例如，以下代码展示了如何创建一个新的\
    \ Sprite 并将其帧序列设置为仅包含奔跑帧：\n\n```\nint[] runningSequence = { 0, 1, 2 };\nImage\
    \ quatschImage = Image.createImage(\"/quatsch.png\");\nSprite quatsch = new Sprite(quatschImage,\
    \ 48, 48);\nquatsch.setFrameSequence(runningSequence);\n```\n\nSprite 提供了几种在帧序列中导航的方法。动画不会自动发生；你的应用程序需要告诉\
    \ Sprite 何时移动到序列中的下一帧。这通常在一个单独的线程中完成，很可能是作为动画线程的一部分。要在序列中向前和向后移动，请使用 nextFrame()\
    \ 和 prevFrame()。这些方法在序列的末尾会按预期进行循环，回到下一个值。例如，使用帧序列 { 0, 1, 2 }，如果 Sprite 的当前帧是\
    \ 2，并且你调用了 nextFrame()，则当前帧将被设置为 0。\n\n你可以使用以下方法直接跳转到特定帧：\n\n```\npublic void\
    \ setFrame(int sequenceIndex)\n```\n\n请注意，此方法接受一个序列索引。如果 Sprite 的帧序列是 { 2, 3,\
    \ 1, 9 }，那么调用 setFrame(1) 将导致 Sprite 的当前帧被设置为 3。\n\n当你调整 Sprite 的当前帧时，视觉上不会立即发生任何变化。只有在下次使用其\
    \ paint() 方法渲染 Sprite 时，更改才会可见。通常，如果你使用 GameCanvas，这将在你的动画循环结束时发生。\n\n要找出当前帧序列索引，请调用\
    \ getFrame()。这里不要混淆；该方法返回的不是帧索引，而是当前帧序列中的当前索引。有趣的是，没有 getFrameSequence() 方法，因此如果你没有保存当前帧序列，就无法找出当前帧索引。不过，你可以使用\
    \ getFrameSequenceLength() 获取当前帧序列中的元素数量。\n"
- fmt: "### Transforming Sprites\n\nYou may have noticed that the frames shown in\
    \ [Figure 11-5](#LiB0091.html#ch11fig05) only show Dr. Quatsch facing left. What\
    \ if he's going to run to the right? `Sprite` includes support for *transformations*\
    \ so that you can use the API to generate additional frames that are simple transformations\
    \ of existing frames. The following method applies a transformation to a `Sprite`:\n\
    \n```\npublic void setTransform(int transform)\n```\n\nThe `transform` argument\
    \ can be any of the constant values defined in the `Sprite` class:\n\n```\nTRANS_NONE\n\
    TRANS_ROT90\nTRANS_ROT180\nTRANS_ROT270\nTRANS_MIRROR\nTRANS_MIRROR_ROT90\nTRANS_MIRROR_ROT180\n\
    TRANS_MIRROR_ROT270\n```\n\nTo make Dr. Quatsch face right instead of left, you\
    \ would apply a `TRANS_MIRROR` transformation. To understand all the transformations,\
    \ see the `Sprite` API documentation, which contains a set of fighter plane images\
    \ that are very helpful.\n\nThe only tricky part about transformations is the\
    \ *reference pixel*. All `Sprite`s have a reference pixel, which is expressed\
    \ in the `Sprite`'s own coordinate space; by default, the reference pixel is located\
    \ at `0, 0`, the upper-left corner of the `Sprite`. When the `Sprite` is transformed,\
    \ the reference pixel is also transformed.\n\nWhen a transformation is applied,\
    \ the `Sprite`'s position is changed so that the current location of the reference\
    \ pixel does not change, even after it is transformed. For example, [Figure 11-6](#LiB0091.html#ch11fig06)\
    \ shows how the position of the `Sprite` changes when a simple `TRANS_MIRROR`\
    \ transformation is applied.\n\n![](fig227_01.jpg)\nFigure 11-6: The reference\
    \ pixel doesn't move.\n\nSuppose, for example, that the original position of the\
    \ `Sprite` was `100, 100` (in the coordinate system of the container), and the\
    \ reference pixel position was `0, 0` (in the coordinate system of the `Sprite`).\
    \ After applying a `TRANS_MIRROR` rotation, the `Sprite`'s position is adjusted\
    \ so that the transformed reference pixel is in the same location as the original\
    \ reference pixel. Because the frame width is 48 pixels, the `Sprite`'s position\
    \ (its upper-left corner) changes from `100, 100` to `52, 100`.\n\nTo adjust the\
    \ location of the reference point in the `Sprite`'s untransformed coordinate system,\
    \ use this method:\n\n```\npublic void defineReferencePixel(int x, int y)\n```\n\
    \nIn the case of Dr. Quatsch, I want to apply a mirror transformation without\
    \ having the `Sprite` move, so I set the reference pixel to be at the center of\
    \ the 48 × 48 frame:\n\n```\n// Sprite quatsch is defined as before.\nquatsch.defineReferencePixel(24,\
    \ 24);\n```\n\nTo find the current location of the `Sprite`'s reference pixel\
    \ in its containing coordinate system, use `getRefPixelX()` and `getRefPixelY()`.\
    \ Don't get confused: `defineReferencePixel()` accepts coordinates relative to\
    \ the `Sprite`'s origin, while `getRefPixelX()` and `getRefPixelY()` return values\
    \ relative to the `Sprite`'s container.\n\nIt's also possible to set the position\
    \ of the `Sprite` based on its reference point. You already know you can set the\
    \ position of the `Sprite`'s upper-left corner using the `setPosition()` method\
    \ that is inherited from `Layer`, but the following method sets the current position\
    \ of the `Sprite`'s reference point:\n\n```\npublic void setRefPointPosition(int\
    \ x, int y)\n```\n\nThis is more convenient than it might appear at first, as\
    \ it allows you to place the reference point at a specific position, regardless\
    \ of the current transformation.\n\n### Handling Collisions\n\n`Sprite` provides\
    \ methods to answer critical questions that come up in games— did the bullet hit\
    \ the spaceship? Is Dr. Quatsch standing in front of the door?\n\nThe Game API\
    \ supports two techniques for collision detection.\n\n1.  The implementation can\
    \ compare rectangles representing a sprite and another sprite. A collision has\
    \ occurred if the rectangles intersect. This is a quick way to test for collisions,\
    \ but it may produce inaccurate results for non-rectangular shapes.\n\n2.  The\
    \ implementation can compare each pixel of the sprite and another sprite. If an\
    \ opaque pixel in the sprite overlaps an opaque pixel in the other sprite, a collision\
    \ has occurred. This technique involves more computation but produces a more accurate\
    \ result.\n\nA `Sprite` has a *collision rectangle* that is used for collision\
    \ detection. It is defined in the coordinate system of the `Sprite` itself, like\
    \ the reference pixel. By default, the collision rectangle is located at `0, 0`\
    \ and is the same width and height as the `Sprite`. You can change the collision\
    \ rectangle using this method:\n\n```\npublic void defineCollisionRectangle(int\
    \ x, int y, int width, int height);\n```\n\nThe collision rectangle serves two\
    \ purposes. If pixel-level collision detection is not used, the collision rectangle\
    \ is used to determine collisions. If pixel-level collision detection is used,\
    \ then only pixels inside the collision rectangle are examined.\n\n`Sprite` is\
    \ capable of detecting collisions with other `Sprite`s, `TiledLayer`s, and `Image`s.\n\
    \n```\npublic final boolean collidesWith(Sprite s, boolean pixelLevel)\npublic\
    \ final boolean collidesWith(TiledLayer t, boolean pixelLevel)\npublic final boolean\
    \ collidesWith(Image image,\n    int x, int y, boolean pixelLevel)\n```\n\nThe\
    \ semantics of each method are subtly different, as described in [Table 11-1](#LiB0091.html#ch11table01a).\n\
    \nTable 11-1: Collision Detection with `Sprite`\n\n| **TARGET** | **INTERSECTING\
    \ RECTANGLE** | **PIXEL LEVEL** |\n| --- | --- | --- |\n| `Sprite` | Compares\
    \ collision rectangles | Compares pixels inside the collision rectangles |\n|\
    \ `TiledLayer` | Compares the `Sprite`'s collision rectangle and tiles in the\
    \ `TiledLayer` | Compares pixels inside the `Sprite`'s collision rectangle with\
    \ pixels in the `TiledLayer` |\n| `Image` | Compares the `Sprite`'s collision\
    \ rectangle and the `Image`'s bounds | Compares pixels inside the `Sprite`'s collision\
    \ rectangle with pixels in the `Image` |\n\n### Copying Sprites\n\n`Sprite` includes\
    \ a copy constructor:\n\n```\npublic Sprite(Sprite s)\n```\n\nThis is more powerful\
    \ than you might think. It creates a new `Sprite` with all of the attributes of\
    \ the original, including\n\n*   Source image frames\n\n*   Frame sequence\n\n\
    *   Current frame\n\n*   Current transformation\n\n*   Reference pixel\n\n*  \
    \ Collision rectangle"
