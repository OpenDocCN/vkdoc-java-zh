    long timestamp = System.currentTimeMillis();\nlong randomNumber = mRandom.nextLong();\n\
    byte[] timestampBytes = getBytes(timestamp);\nbyte[] randomBytes = getBytes(randomNumber);\
    \ \n```\n\nThe user name and password strings, which come from the MIDlet's main\
    \ form, are easily converted to byte arrays.\n\nThe entire source code for PasswordMIDlet\
    \ is shown in [Listing 15-1](#LiB0121.html#ch15list01).\n\nListing 15-1: *PasswordMIDlet*,\
    \ A Protected Password Client\n\n| **![Start example](_1.gif)** |\n\n```\nimport\
    \ java.io.*;\nimport java.util.Random;\n\nimport javax.microedition.io.*;\nimport\
    \ javax.microedition.midlet.*;\nimport javax.microedition.lcdui.*;\n\nimport org.bouncycastle.crypto.Digest;\n\
    import org.bouncycastle.crypto.digests.SHA1Digest;\n\npublic class PasswordMIDlet\n\
    \    extends MIDlet\n    implements CommandListener, Runnable {\n  private Display\
    \ mDisplay;\n  private Form mForm;\n  private TextField mUserField, mPasswordField;\n\
    \  private Random mRandom;\n\npublic void startApp() {\n    mDisplay = Display.getDisplay(this);\n\
    \    mRandom = new Random(System.currentTimeMillis());\n\nif (mForm == null) {\n\
    \      mForm = new Form(\"Login\");\n      mUserField = new TextField(\"Name\"\
    , \"jonathan\", 32, 0);\n      mPasswordField = new TextField(\"Password\", \"\
    happy8\", 32, 0);\n      mForm.append(mUserField);\n      mForm.append(mPasswordField);\n\
    \nmForm.addCommand(new Command(\"Exit\", Command.EXIT, 0));\n      mForm.addCommand(new\
    \ Command(\"Login\", Command.SCREEN, 0));\n      mForm.setCommandListener(this);\n\
    \    }\n\nmDisplay.setCurrent(mForm);\n  }\n  public void commandAction(Command\
    \ c, Displayable s) {\n    if (c.getCommandType() == Command.EXIT) notifyDestroyed();\n\
    \    else {\n      Form waitForm = new Form(\"Connecting...\");\n      mDisplay.setCurrent(waitForm);\n\
    \      Thread t = new Thread(this);\n      t.start();\n    }\n  }"
  trans: "\n### 密码的问题\n\n密码的问题在于，你不希望在不安全的网络上发送它们。例如，假设你的 MIDlet 要求用户使用用户名和密码登录服务器。在\
    \ MIDP 设备上，你输入用户名和密码，然后点击按钮将信息发送到服务器。不幸的是，你的数据会以明文形式通过某个 HTTP 请求发送。任何在网络中窥探的人都能轻易窃取你的密码。\n\
    \n### 使用消息摘要\n\n消息摘要提供了一种解决这个问题的方法。你不再以明文形式发送密码，而是根据密码创建一个消息摘要值，然后发送这个摘要值。当然，攻击者可能会直接窃取这个摘要值，因此你还需要在摘要中加入其他内容，这样只有知道密码的服务器才能重新生成相同的摘要值。图\
    \ 15-1 展示了这一过程。\n\n![点击展开](img/fig286_01_0.jpg)\n图 15-1：使用消息摘要保护密码\n\nMIDlet 会生成一个时间戳和一个随机数，这两者连同用户名和密码一起被输入到消息摘要中。然后，MIDlet\
    \ 将用户名、时间戳、随机数和摘要值发送给服务器。它不会以明文形式发送密码，但密码被用于计算摘要值。\n\n服务器接收用户名，并查找对应的密码（该密码应安全地存储在文件或数据库中）。然后，它根据用户名、密码、时间戳和随机数生成一个摘要值。如果服务器生成的摘要值与客户端\
    \ MIDlet 发送的摘要值匹配，服务器就知道用户输入了正确的密码。用户便成功登录了。\n\n服务器需要一些逻辑来防止重放攻击。具体来说，服务器应拒绝使用之前已用于该登录的时间戳和随机数的登录尝试。虽然你可以保存所有用户登录尝试的随机数和时间戳，但每次用户登录时都逐一比较这些数据会相当耗费资源。一种更简单的实现方法是保存每个用户上次登录尝试的时间戳。对于后续的每次登录尝试，服务器会查找已保存的时间戳。如果当前尝试的时间戳晚于已保存的时间戳，则允许该尝试。当前尝试的时间戳会替换该用户已保存的时间戳。\n\
    \n### 使用 Bouncy Castle 加密包\n\n在 Bouncy Castle 包中，消息摘要通常由 `org.bouncycastle.crypto.Digest`\
    \ 接口表示。你可以使用两个 `update()` 方法之一将数据添加到消息摘要中。要计算消息摘要值，请调用 `doFinal()` 方法。`Digest`\
    \ 接口的具体实现包含在 `org.bouncycastle.crypto.digests` 包中。我们将使用一个名为 `SHA1Digest` 的实现，它实现了\
    \ SHA-1 摘要算法。以下代码行展示了如何创建一个 SHA-1 消息摘要对象：\n\n```\nDigest digest = new SHA1Digest();\n\
    ```\n\n加密代码非常简单。实际上，大部分工作都集中在将时间戳和随机数转换为可以推送到消息摘要对象中的字节数组。然后，只需使用每个字节数组调用 `update()`\
    \ 方法即可。\n\n要计算摘要，请调用 `Digest` 的 `doFinal()` 方法。你需要传入一个字节数组来保存消息摘要值。要了解这个数组应该有多长，请调用\
    \ `getDigestSize()` 方法。\n\n```\nbyte[] digestValue = new byte[digest.getDigestSize()];\n\
    digest.doFinal(digestValue, 0);\n```\n\n### 实现受保护的密码协议\n\n本节详细介绍受保护密码登录的实现。在客户端，MIDlet\
    \ 收集用户名和密码，如图 图 15-2 所示。\n\n![](img/fig287_01.jpg)\n图 15-2：一个简单的表单用于收集用户名和密码。\n\
    \n当调用 **登录** 命令时，MIDlet 将数据发送到一个 servlet，由该 servlet 判断客户端是否通过身份验证。Servlet 会发回一条消息，该消息会显示在设备屏幕上，如图\
    \ 图 15-3 所示。\n\n![](img/fig288_01.jpg)\n图 15-3：服务器告知你是否已登录。\n\nMIDlet 和 servlet\
    \ 会交换各种字节数组，例如时间戳、随机数和消息摘要值。为了使这在纯文本的 HTTP 标头上下文中顺利工作，字节数组以十六进制字符串的形式进行交换。一个辅助类\
    \ `HexCodec` 负责处理十六进制字符串和字节数组之间的转换。MIDlet 和 servlet 都使用这个类。\n\n我们先来看 MIDlet。它的主屏幕是一个表单，用户可以在其中输入用户名和密码。你可能会想使用\
    \ `PASSWORD` 类型的 `TextField`，但我没有选择这样做。首先，很难确切知道你输入的是什么文本。其次，我假设小型设备的屏幕具有合理的私密性——在你输入密码时，可能没有人会偷看。\n\
    \n当用户调用 **登录** 命令时，MIDlet 会按照上述方法计算一个消息摘要值。它将各种参数组装成一个 HTTP 请求。然后，它读取服务器的响应，并将响应显示在一个\
    \ `Alert` 中。\n\n受保护密码算法的核心在于 `login()` 方法。我们创建一个时间戳和一个随机数，并使用一个辅助方法将这些值转换为字节数组：\n\
    \n```\nlong timestamp = System.currentTimeMillis();\nlong randomNumber = mRandom.nextLong();\n\
    byte[] timestampBytes = getBytes(timestamp);\nbyte[] randomBytes = getBytes(randomNumber);\
    \ \n```\n\n来自 MIDlet 主表单的用户名字符串和密码字符串很容易转换为字节数组。\n\n`PasswordMIDlet` 的完整源代码如 代码清单\
    \ 15-1 所示。\n\n代码清单 15-1：*PasswordMIDlet*，一个受保护的密码客户端\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\nimport java.io.*;\nimport java.util.Random;\n\nimport javax.microedition.io.*;\n\
    import javax.microedition.midlet.*;\nimport javax.microedition.lcdui.*;\n\nimport\
    \ org.bouncycastle.crypto.Digest;\nimport org.bouncycastle.crypto.digests.SHA1Digest;\n\
    \npublic class PasswordMIDlet\n    extends MIDlet\n    implements CommandListener,\
    \ Runnable {\n  private Display mDisplay;\n  private Form mForm;\n  private TextField\
    \ mUserField, mPasswordField;\n  private Random mRandom;\n\npublic void startApp()\
    \ {\n    mDisplay = Display.getDisplay(this);\n    mRandom = new Random(System.currentTimeMillis());\n\
    \nif (mForm == null) {\n      mForm = new Form(\"登录\");\n      mUserField = new\
    \ TextField(\"名称\", \"jonathan\", 32, 0);\n      mPasswordField = new TextField(\"\
    密码\", \"happy8\", 32, 0);\n      mForm.append(mUserField);\n      mForm.append(mPasswordField);\n\
    \nmForm.addCommand(new Command(\"退出\", Command.EXIT, 0));\n      mForm.addCommand(new\
    \ Command(\"登录\", Command.SCREEN, 0));\n      mForm.setCommandListener(this);\n\
    \    }\n\nmDisplay.setCurrent(mForm);\n  }\n  public void commandAction(Command\
    \ c, Displayable s) {\n    if (c.getCommandType() == Command.EXIT) notifyDestroyed();\n\
    \    else {\n      Form waitForm = new Form(\"连接中...\");\n      mDisplay.setCurrent(waitForm);\n\
    \      Thread t = new Thread(this);\n      t.start();\n    }\n  }\n"
