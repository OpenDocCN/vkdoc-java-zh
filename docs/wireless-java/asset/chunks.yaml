    \ or not. If the record store does not exist, and the createIfNecessary parameter\
    \ is false, then a RecordStoreNotFoundException will be thrown.\n\nThe following\
    \ code opens a record store named \"Address.\"\n\n```\nRecordStore rs = RecordStore.openRecordStore(\"\
    Address\", true); \n```\n\nThe record store will be created if it does not already\
    \ exist.\n\nAn open record store can be closed by calling the closeRecordStore()\
    \ method. As with anything that can be opened and closed, it's a good idea to\
    \ close record stores when you're finished with them. Memory and processing power\
    \ are in short supply on a small device, so you should remember to clean up after\
    \ yourself as much as possible. You probably shouldn't even keep a record store\
    \ open over the lifetime of the MIDlet; after all, your MIDlet may be paused by\
    \ the device's application manager, and it would be unwise to have open resources\
    \ while the MIDlet is paused.\n\nTo find out all the record stores available to\
    \ a particular MIDlet suite, call the listRecordStores() method:\n\n```\npublic\
    \ static String[] listRecordStores()\n```\n\nFinally, to remove a record store,\
    \ call the static deleteRecordStore() method. The record store and its contained\
    \ records will be deleted.\n\n|  | Note  | Record store operations, particularly\
    \ opening and closing, may be time-consuming on actual devices. You probably won't\
    \ notice the delays using a desktop MIDP emulator, but on a real device, it may\
    \ slow down applications noticeably. (See [*http://www.poqit.com/midp/bench/*](http://www.poqit.com/midp/bench/)\
    \ for some sobering measurements from real devices.) For many applications, it\
    \ may be appropriate to place record store access in its own thread, just as network\
    \ access goes in its own thread. |\n\n### Sharing Record Stores in MIDP 2.0\n\n\
    In MIDP 2.0, record stores also have an *authorization mode.* The default authorization\
    \ mode is AUTHMODE_PRIVATE, which means that a record store is only accessible\
    \ from MIDlets in the MIDlet suite that created the record store. This is exactly\
    \ as described earlier.\n\nRecord stores can be shared by changing their authorization\
    \ mode to AUTHMODE_ANY, which means that any other MIDlet on the device can access\
    \ the record store. Be careful with this! Don't put any secrets in an AUTHMODE_ANY\
    \ record store. In addition, you can also decide if you want a shared record store\
    \ to be writable or read-only.\n\nYou can create a shared record store using a\
    \ new openRecordStore() method in the RecordStore class:\n\n```\npublic static\
    \ RecordStore openRecordStore(String recordStoreName,\n    boolean createIfNecessary,\
    \ byte authMode, boolean writable)\n    throws RecordStoreException, RecordStoreFullException,\n\
    \    RecordStoreNotFoundException\n```\n\nThe authMode and writable parameters\
    \ are only used if the record store is created, which implies that the record\
    \ store doesn't exist and createIfNecessary is true. You can change the authorization\
    \ mode and writable flag of an open record store using the following method:\n\
    \n```\npublic void setMode(byte authmode, boolean writable)\n    throws RecordStoreException\n\
    ```\n\nNote that only a MIDlet belonging to the suite that created the record\
    \ store can change its authorization mode and writable flag.\n\nHow do you access\
    \ a shared record store? One final openRecordStore() method provides the answer:\n\
    \n```\npublic static RecordStore openRecordStore(String recordStoreName,\n   \
    \ String vendorName, String suiteName)\n    throws RecordStoreException, RecordStoreNotFoundException\n\
    ```\n\nTo access a shared record store, you need to know its name, the name of\
    \ the MIDlet suite that created it, and the name of the MIDlet suite's vendor.\
    \ These names should be the MIDlet-Name and MIDlet-Vendor attributes in the MIDlet\
    \ suite JAR manifest or the application descriptor.\n\n### Record Store Size\n\
    \nRecord stores consist of records; each record is simply an array of bytes. On\
    \ space-constrained devices, you'll probably want to keep a close eye on the size\
    \ of your record stores. To find out the number of bytes used by a record store,\
    \ call the following method on a RecordStore instance:\n\n```\npublic int getSize()\n\
    ```\n\nYou can find out how much more space is available by calling the following\
    \ method:\n\n```\npublic int getSizeAvailable() \n```\n\nNote that this method\
    \ returns the total space available in the record store, which is not the same\
    \ as the amount of record data that is available. That is, there is some overhead\
    \ associated with each record in the record store; the getSizeAvailable() method\
    \ returns the amount of space available for both record data and overhead.\n\n\
    ### Version and Timestamp\n\nRecord stores maintain both a version number and\
    \ a timestamp. The version number is updated every time the record store is modified.\
    \ It is represented by an integer and can be retrieved by calling getVersion().\n\
    \nThe record store also remembers the last time it was modified. This moment in\
    \ time is represented by a long, which can be retrieved with getLastModified().\
    \ The long represents the number of milliseconds since midnight on January 1,\
    \ 1970\\. You may recall (from [Chapter 4](#LiB0030_split_000.html#134)) that\
    \ this is the same way that Date uses a long to represent a moment in time. If\
    \ you need to examine the timestamp of a record store, you can create a Date from\
    \ the long timestamp. Then you could use a Calendar to translate from a Date to\
    \ calendar fields like month, day, hour, and minute."
  trans: "\n## 重点\n\nMIDP 应用程序必须在多种设备上无缝运行。您已经看到这在用户界面领域可能是一个挑战。当时的技巧是使用抽象概念，这些概念将由特定于设备的实现映射到屏幕上。\n\
    \nMIDP 处理持久性存储的方法基本相同。您的应用程序可以在带有闪存 ROM、电池供电 RAM 甚至小型硬盘的设备上运行。MIDP 应用程序并不真正关心这些；它们只知道一种称为记录存储的小型数据库。设备上的\
    \ MIDP 实现负责以某种合理的方式将记录存储映射到任何可用的持久性存储上。\n\n我们讨论的是*少量*数据；MIDP 规范规定持久性存储的最小容量仅为\
    \ 8KB。\n\n## 概述\n\nMIDP 中的持久性存储以记录存储为核心。*记录存储*是一个小型数据库，包含称为*记录*的数据片段。记录存储由 `javax.microedition.rms.RecordStore`\
    \ 的实例表示。在 MIDP 1.0 中，记录存储的作用域仅限于单个 MIDlet 套件。换句话说，一个 MIDlet 只能访问由同一套件中的 MIDlet\
    \ 创建的记录存储。图 8-1 展示了 MIDlet 套件与记录存储之间的关系。MIDP 2.0 允许可选地共享记录存储。请参阅本章后面的“在 MIDP 2.0\
    \ 中共享记录存储”一节。\n\n![点击展开](img/fig140_01_0.jpg)\n图 8-1：记录存储属于 MIDlet 套件。\n\n记录存储通过名称进行标识。在一个\
    \ MIDlet 套件的记录存储中，名称必须是唯一的。\n\n## 管理记录存储\n\nRecordStore 类有两个用途。首先，它定义了一个用于操作单个记录的\
    \ API。其次，它定义了一个用于管理记录存储的 API（主要是静态方法）。\n\n### 打开、关闭和删除记录存储\n\n要打开一个记录存储，您只需为其命名即可。\n\
    \n```\npublic static RecordStore openRecordStore(String recordStoreName,\n   \
    \ boolean createIfNecessary) throws RecordStoreException,\n    RecordStoreFullException,\
    \ RecordStoreNotFoundException\n```\n\n如果记录存储不存在，`createIfNecessary` 参数将决定是否创建一个新的记录存储。如果记录存储不存在，并且\
    \ `createIfNecessary` 参数为 `false`，则会抛出 `RecordStoreNotFoundException`。\n\n以下代码打开一个名为\
    \ \"Address\" 的记录存储。\n\n```\nRecordStore rs = RecordStore.openRecordStore(\"Address\"\
    , true); \n```\n\n如果该记录存储尚不存在，则会被创建。\n\n可以通过调用 `closeRecordStore()` 方法来关闭一个已打开的记录存储。与任何可以打开和关闭的事物一样，在完成操作后关闭记录存储是一个好习惯。小型设备上的内存和处理能力都很有限，因此您应记住尽可能地进行清理。您甚至可能不应该在\
    \ MIDlet 的整个生命周期内保持记录存储打开；毕竟，您的 MIDlet 可能会被设备的应用程序管理器暂停，而在 MIDlet 暂停期间保持资源打开是不明智的。\n\
    \n要找出特定 MIDlet 套件可用的所有记录存储，请调用 `listRecordStores()` 方法：\n\n```\npublic static\
    \ String[] listRecordStores()\n```\n\n最后，要删除一个记录存储，请调用静态方法 `deleteRecordStore()`。该记录存储及其包含的记录将被删除。\n\
    \n|  | 注意  | 记录存储操作，特别是打开和关闭，在实际设备上可能会很耗时。使用桌面 MIDP 模拟器您可能不会注意到延迟，但在真实设备上，它可能会明显降低应用程序的速度。（请参阅\
    \ [*http://www.poqit.com/midp/bench/*](http://www.poqit.com/midp/bench/) 获取来自真实设备的一些发人深省的测量数据。）对于许多应用程序，将记录存储访问放在其自己的线程中可能是合适的，就像网络访问放在其自己的线程中一样。\
    \ |\n\n### 在 MIDP 2.0 中共享记录存储\n\n在 MIDP 2.0 中，记录存储还具有*授权模式*。默认的授权模式是 `AUTHMODE_PRIVATE`，这意味着记录存储只能由创建该记录存储的\
    \ MIDlet 套件中的 MIDlet 访问。这与前面描述的情况完全相同。\n\n通过将记录存储的授权模式更改为 `AUTHMODE_ANY`，可以共享记录存储，这意味着设备上的任何其他\
    \ MIDlet 都可以访问该记录存储。请谨慎使用！不要在 `AUTHMODE_ANY` 记录存储中存放任何秘密。此外，您还可以决定是否希望共享的记录存储是可写的还是只读的。\n\
    \n您可以使用 `RecordStore` 类中一个新的 `openRecordStore()` 方法来创建共享记录存储：\n\n```\npublic static\
    \ RecordStore openRecordStore(String recordStoreName,\n    boolean createIfNecessary,\
    \ byte authMode, boolean writable)\n    throws RecordStoreException, RecordStoreFullException,\n\
    \    RecordStoreNotFoundException\n```\n\n`authMode` 和 `writable` 参数仅在创建记录存储时使用，这意味着记录存储不存在且\
    \ `createIfNecessary` 为 `true`。您可以使用以下方法更改已打开记录存储的授权模式和可写标志：\n\n```\npublic void\
    \ setMode(byte authmode, boolean writable)\n    throws RecordStoreException\n\
    ```\n\n请注意，只有属于创建该记录存储的套件的 MIDlet 才能更改其授权模式和可写标志。\n\n如何访问共享的记录存储？最后一个 `openRecordStore()`\
    \ 方法提供了答案：\n\n```\npublic static RecordStore openRecordStore(String recordStoreName,\n\
    \    String vendorName, String suiteName)\n    throws RecordStoreException, RecordStoreNotFoundException\n\
    ```\n\n要访问共享的记录存储，您需要知道它的名称、创建它的 MIDlet 套件的名称以及该 MIDlet 套件供应商的名称。这些名称应该是 MIDlet\
    \ 套件 JAR 清单或应用程序描述符中的 `MIDlet-Name` 和 `MIDlet-Vendor` 属性。\n\n### 记录存储大小\n\n记录存储由记录组成；每条记录只是一个字节数组。在空间受限的设备上，您可能希望密切关注记录存储的大小。要查明记录存储使用的字节数，请在\
    \ `RecordStore` 实例上调用以下方法：\n\n```\npublic int getSize()\n```\n\n您可以通过调用以下方法来了解还有多少可用空间：\n\
    \n```\npublic int getSizeAvailable() \n```\n\n请注意，此方法返回记录存储中的总可用空间，这与可用的记录数据量不同。也就是说，记录存储中的每条记录都关联有一些开销；`getSizeAvailable()`\
    \ 方法返回的是可用于记录数据和开销的空间总量。\n\n### 版本和时间戳\n\n记录存储维护一个版本号和一个时间戳。每次修改记录存储时，版本号都会更新。它由一个整数表示，可以通过调用\
    \ `getVersion()` 来获取。\n\n记录存储还会记住其最后被修改的时间。这个时间点由一个 `long` 值表示，可以通过 `getLastModified()`\
    \ 获取。该 `long` 值表示自 1970 年 1 月 1 日午夜以来的毫秒数。您可能还记得（来自第 4 章），这与 `Date` 使用 `long`\
    \ 表示时间点的方式相同。如果您需要检查记录存储的时间戳，可以从 `long` 时间戳创建一个 `Date` 对象。然后，您可以使用 `Calendar`\
    \ 将 `Date` 转换为日历字段，如月、日、小时和分钟。\n"
- fmt: "# Working with Records\n\nA *record* is simply an array of bytes. Each record\
    \ in a `RecordStore` has an integer identification number. [Figure 8-2](#LiB0057.html#ch08fig02)\
    \ shows a diagram of a `RecordStore` with four records.\n\n[![Click To expand](fig143_01.jpg)](fig143_01_0.jpg)\n\
    Figure 8-2: Inside a `RecordStore`\n\n## Adding Records\n\nTo add a new record,\
    \ supply the byte array to the `addRecord()` method:\n\n```\npublic int addRecord(byte[]\
    \ data, int offset, int numBytes)\n    throws RecordStoreNotOpenException,\n \
    \          RecordStoreException,\n           RecordStoreFullException\n```\n\n\
    The added record will be `numBytes` long, taken from the `data` array starting\
    \ at `offset`. The new record's ID is returned. Most other record operations need\
    \ this ID to identify a particular record.\n\nThere's no explicit maximum record\
    \ length, although of course there will be limits based on the amount of space\
    \ that is available on the device for record stores.\n\nThe following code fragment\
    \ illustrates adding a new record to a record store named `rs`. It creates a byte\
    \ array from a `String`, and then writes the entire byte array into a new record.\n\
    \n```\nString record = \"This is a record\";\nbyte[] data = record.getBytes();\n\
    int id = rs.addRecord(data, 0, data.length);\n```\n\n## Retrieving Records\n\n\
    You can retrieve a record by supplying the record ID to the following method:\n\
    \n```\npublic byte[] getRecord(int recordId)\n    throws RecordStoreNotOpenException,\n\
    \           InvalidRecordIDException,\n           RecordStoreException\n```\n\n\
    This method returns a freshly created byte array containing the record with the\
    \ requested ID. An alternate version of this method puts the record data into\
    \ an array that you supply:\n\n```\npublic int getRecord(int recordId, byte[]\
    \ buffer, int offset)\n    throws RecordStoreNotOpenException,\n           InvalidRecordIDException,\n\
    \           RecordStoreException \n```\n\nThis method returns the number of bytes\
    \ that were copied into your array. If the array you supply is not large enough\
    \ to hold the record, an `ArrayOutOfBoundsException` will be thrown. You can find\
    \ out the size of a particular record ahead of time by calling `getRecordSize()`.\n\
    \nGiven a `RecordStore rs` and a record ID `id`, here is one way to retrieve a\
    \ record's data:\n\n```\nbyte[] retrieved = new byte[rs.getRecordSize(id)];\n\
    rs.getRecord(id, retrieved, 0);\nString retrievedString = new String(retrieved);\n\
    ```\n\nIf you're going to be pulling many records out of the record store, you\
    \ probably won't want to create a new byte array each time. For efficiency, you\
    \ would create one array and use it over and over again to pull records out of\
    \ the record store. One way to create the buffer is to make it as large as the\
    \ largest record in the record store. If that's not practical, or if you don't\
    \ know how large the largest record will be, you can simply check the size of\
    \ each record before you retrieve it. If you come across a record that's larger\
    \ than the buffer, you could create a larger buffer.\n\nIf you're not worried\
    \ about memory usage or speed, then you might as well use the other form of `getRecord()`,\
    \ which is essentially the same as the previous code example:\n\n```\nbyte[] retrieved\
    \ = rs.getRecord(id);\n```\n\n## Deleting and Replacing Records\n\nSo far you've\
    \ seen how to add new records and retrieve them. There are two more record operations\
    \ supported by `RecordStore`. First, you can remove a record by passing its ID\
    \ to `deleteRecord()`. Second, you can replace the data of an existing record\
    \ by calling the following method:\n\n```\npublic void setRecord(int recordId,\
    \ byte[] newData, int offset, int numBytes)\n    throws RecordStoreNotOpenException,\n\
    \           InvalidRecordIDException,\n           RecordStoreException,\n    \
    \       RecordStoreFullException \n```\n\n## Getting RecordStore Record Information\n\
    \nThe `RecordStore` keeps an internal counter that it uses to assign record IDs.\
    \ You can find out what the next record ID will be by calling `getNextRecordID()`.\
    \ And you can find out how many records exist in the `RecordStore` by calling\
    \ `getNumRecords()`.\n\n# Listening for Record Changes\n\n`RecordStore`s support\
    \ a JavaBeans-style listener mechanism. Interested objects can listen for changes\
    \ to a record store by registering themselves as listeners.\n\nThe listener interface\
    \ is `javax.microedition.rms.RecordListener`. You can manage a `RecordStore`'s\
    \ listeners with the following two methods:\n\n```\npublic void addRecordListener(RecordListener\
    \ listener)\npublic void removeRecordListener(RecordListener listener)\n```\n\n\
    The `RecordListener` interface has three methods: `recordAdded()`, `recordChanged()`,\
    \ and `recordDeleted()`. These are called whenever a record is added, changed,\
    \ or deleted. Each method is passed the `RecordStore` involved and the ID of the\
    \ record in question.\n\n# Performing RecordStore Queries\n\nThe real power of\
    \ a database is being able to pull out just the record or records you want. In\
    \ a larger database, this is called *performing a query*. In the `RecordStore`\
    \ world, you use the `enumerateRecords()` method:\n\n```\npublic RecordEnumeration\
    \ enumerateRecords(RecordFilter filter,\n    RecordComparator comparator, boolean\
    \ keepUpdated)\n    throws RecordStoreNotOpenException \n```\n\nThis single method\
    \ in `RecordStore` involves three different interfaces that you've never seen\
    \ before. Let's start with the big picture first, and then drill down into the\
    \ new interfaces.\n\nThe `enumerateRecords()` method returns a sorted subset of\
    \ the records in a `RecordStore`. The `RecordFilter` determines which records\
    \ will be included in the subset, while the `RecordComparator` is used to sort\
    \ them. The returned `RecordEnumeration` allows you to navigate through the returned\
    \ records.\n\n## RecordFilter\n\nThe simplest interface is `RecordFilter`. When\
    \ you call `enumerateRecords()` on a `RecordStore`, each record's data is retrieved.\
    \ `RecordFilter` has a single method, `matches()`, which is called for each record.\
    \ A record filter should examine the record data and return `true` if the record\
    \ should be included in the results returned from `enumerateRecords()`.\n\nHere's\
    \ a simple `RecordFilter` implementation that will only select records whose first\
    \ byte of data is 7:\n\n```\npublic class SevenFilter\n    implements javax.microedition.rms.RecordFilter\
    \ {\n  public boolean matches(byte[] candidate) {\n    if (candidate.length ==\
    \ 0) return false;\n    return (candidate[0] == 7);\n  }\n}\n```\n\n## RecordComparator\n\
    \nThe job of a `RecordComparator` implementation is to determine the order of\
    \ two sets of record data. `RecordComparator` is similar to the `java.util.Comparator`\
    \ interface in J2SE.\n\nTo implement the `RecordComparator` interface, you just\
    \ need to define one method:\n\n```\npublic int compare(byte[] rec1, byte[] rec2)\
    \ \n```\n\nThis method examines the data contained in `rec1` and `rec2` and determines\
    \ which of them should come first in a sorted list. It should return one of the\
    \ following constants defined in `RecordComparator`:\n\n*   `PRECEDES` indicates\
    \ that `rec1` should come before `rec2`.\n*   `FOLLOWS` indicates that `rec1`\
    \ should come after `rec2`.\n*   `EQUIVALENT` signals that `rec1` and `rec2` are\
    \ the same, at least as far as sorting is concerned.\n\nThe following simple implementation\
    \ compares each byte of the given records and sorts them numerically. If the two\
    \ records have the same data, up to the length of the shorter one, then they are\
    \ deemed `EQUIVALENT`.\n\n```\npublic class SimpleComparator\n    implements javax.microedition.rms.RecordComparator\
    \ {\n  public int compare(byte[] rec1, byte[] rec2) {\n    int limit = Math.min(rec1.length,\
    \ rec2.length);\n\n    for (int index = 0; index < limit; index++) {\n      if\
    \ (rec1[index] < rec2[index])\n        return PRECEDES;\n      else if (rec1[index]\
    \ > rec2[index])\n        return FOLLOWS;\n    }\n    return EQUIVALENT;\n  }\n\
    }\n```"
