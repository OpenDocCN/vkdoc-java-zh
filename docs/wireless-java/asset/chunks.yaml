    \  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n对应的 MIDlet 程序`QuatschMIDlet`可在代码下载中找到，但此处未列出。它创建并显示一个`QuatschCanvas`，并提供用于显示和隐藏图层的命令。\n\
    \n图 11-7 展示了在模拟器中运行的`QuatschMIDlet`。\n\n![点击展开](img/fig230_01_0.jpg)\n图 11-7：完整的鬣蜥——精灵与平铺图层\n\
    \n清单 11-2 包含了`QuatschCanvas`的源代码。\n\n## 特殊效果\n\n虽然严格来说不属于 Game API，但`Display`类中另外两个方法与游戏开发密切相关：\n\
    \n```\npublic boolean flashBacklight(int duration)\npublic boolean vibrate(int\
    \ duration)\n```\n\n两个方法都接受一个以毫秒为单位的持续时间参数，用于指定背光应开启多长时间或设备应振动多长时间。两个方法都返回`true`表示成功，如果设备不支持背光或振动（或者你的应用程序未在前台运行），则返回`false`。\n\
    \n## 总结\n\n本章介绍了 MIDP 2.0 的 Game API，这是一组简化二维游戏开发的类。`GameCanvas`类提供了一个绘图表面，可以轻松地在游戏线程中进行渲染。`GameCanvas`还提供了按键状态轮询功能，同样有助于在游戏线程中检测用户输入。Game\
    \ API 的其余部分基于图层，这些图层是可以组合起来创建复杂场景的元素。`LayerManager`使得维护多个图层变得容易。`Sprite`类支持动画和碰撞检测。使用`TiledLayer`可以高效地构建大型场景或背景。最后，MIDP\
    \ 2.0 的`Display`包含了控制设备背光和振动的方法。游戏开发者有很多值得高兴的理由。请继续阅读下一章，了解关于 MIDP 2.0 声音功能的更多好消息。\n\
    \n# 第 12 章：声音与音乐\n"
- fmt: "# Overview\n\nMIDP 2.0 Includes basic audio capabilities. The media APIs in\
    \ MIDP 2.0 are a strict subset of the Mobile Media API (`MMAPI`), a more general\
    \ API for multimedia rendering. For full details on `MMAPI`, see the specification\
    \ here:\n\n[http://jcp.org/jsr/detail/135.jsp](http://jcp.org/jsr/detail/135.jsp)\n\
    \nThe `MMAPI` itself is kind of a pint-sized version of the Java Media Framework\
    \ (`JMF`), which is an optional package for J2SE. More information on the `JMF`\
    \ is available here:\n\n[http://java.sun.com/products/java-media/jmf/](http://java.sun.com/products/java-media/jmf/)\n\
    \nThe subset of the `MMAPI` that is included in MIDP 2.0 is called the Audio Building\
    \ Block (`ABB`). It includes the capability to play simple tones and sampled audio.\
    \ The `ABB` is implemented in the `javax.microedition.media` and `javax.microedition.media.control`\
    \ packages. This chapter begins with a rush of runnable code, and then backs off\
    \ to explain some of the concepts and dig into the APIs more carefully.\n\n##\
    \ Quick Start\n\nYou can play tones by calling this method in `javax.microedition.media.Manager`:\n\
    \n```\npublic static void playTone(int note, int duration, int volume)\n```\n\n\
    In this method, `note` is specified just like a MIDI note, where each integer\
    \ corresponds to a single key on a piano keyboard. Middle C is 60, and the A above\
    \ middle C (a 440 Hz tone) is 69. The `duration` is in milliseconds, and `volume`\
    \ can range from 0, silent, to 100, loudest.\n\nLike most other methods in the\
    \ `ABB`, `playTone()` may throw a `MediaException`. Although support for simple\
    \ tones is required by the specification, the device may be temporarily unable\
    \ to play tones. (For example, a mobile phone might be using the tone generation\
    \ hardware to ring the phone.)\n\n[Figure 12-1](#LiB0096.html#ch12fig01) shows\
    \ `PianoCanvas`, an example that displays a simple piano keyboard and allows the\
    \ user to navigate through the keys to play different tones. `PianoCanvas` is\
    \ presented in [Listing 12-1](#LiB0096.html#ch12list01). The code for playing\
    \ the tones is very compact, consisting solely of a call to `playTone()` in the\
    \ `keyPressed()` method. The rest of the code is devoted to the user interface.\n\
    \nListing 12-1: *PianoCanvas* Source Code\n\n| **![Start example](_1.gif)** |\n\
    \n```\nimport javax.microedition.lcdui.*;\nimport javax.microedition.media.*;\n\
    \npublic class PianoCanvas\n    extends Canvas {\n  private static final int[]\
    \ kNoteX = {\n     0, 11, 16, 29, 32, 48, 59, 64, 76, 80, 93, 96\n  };\n\nprivate\
    \ static final int[] kNoteWidth = {\n    16, 8, 16, 8, 16, 16, 8, 16, 8, 16, 8,\
    \ 16\n  };\n\nprivate static final int[] kNoteHeight = {\n    96, 64, 96, 64,\
    \ 96, 96, 64, 96, 64, 96, 64, 96\n  };\n\nprivate static final boolean[] kBlack\
    \ = {\n    false, true, false, true, false,\n        false, true, false, true,\
    \ false, true, false\n  };\n\nprivate int mMiddleCX, mMiddleCY;\n  private int\
    \ mCurrentNote;\n\npublic PianoCanvas() {\n    int w = getWidth();\n    int h\
    \ = getHeight();\n\nint fullWidth = kNoteWidth[0] * 8;\n    mMiddleCX = (w - fullWidth)\
    \ / 2;\n    mMiddleCY = (h - kNoteHeight[0]) / 2;\n\nmCurrentNote = 60;\n  }\n\
    \npublic void paint(Graphics g) {\n    int w = getWidth();\n    int h = getHeight();\n\
    \ng.setColor(0xffffff);\n    g.fillRect(0, 0, w, h);\n    g.setColor(0x000000);\n\
    \nfor (int i = 60; i <= 72; i++)\n      drawNote(g, i);\n\ndrawSelection(g, mCurrentNote);\n\
    \  }\n\nprivate void drawNote(Graphics g, int note) {\n    int n = note % 12;\n\
    \    int octaveOffset = ((note - n) / 12 - 5) * 7 * kNoteWidth[0];\n    int x\
    \ = mMiddleCX + octaveOffset + kNoteX[n];\n    int y = mMiddleCY;\n    int w =\
    \ kNoteWidth[n];\n    int h = kNoteHeight[n];\n\nif (isBlack(n))\n      g.fillRect(x,\
    \ y, w, h);\n    else\n      g.drawRect(x, y, w, h);\n  }\n\nprivate void drawSelection(Graphics\
    \ g, int note) {\n    int n = note % 12;\n    int octaveOffset = ((note - n) /\
    \ 12 - 5) * 7 * kNoteWidth[0];\n    int x = mMiddleCX + octaveOffset + kNoteX[n];\n\
    \    int y = mMiddleCY;\n    int w = kNoteWidth[n];\n    int h = kNoteHeight[n];\n\
    \nint sw = 6;\n    int sx = x + (w - sw) / 2;\n    int sy = y + h - 8;\n    g.setColor(0xffffff);\n\
    \    g.fillRect(sx, sy, sw, sw);\n    g.setColor(0x000000);\n    g.drawRect(sx,\
    \ sy, sw, sw);\n    g.drawLine(sx, sy, sx + sw, sy + sw);\n    g.drawLine(sx,\
    \ sy + sw, sx + sw, sy);\n  }\n\nprivate boolean isBlack(int note) {\n    return\
    \ kBlack[note];\n  }\n\npublic void keyPressed(int keyCode) {\n    int action\
    \ = getGameAction(keyCode);\n    switch (action) {\n      case LEFT:\n       \
    \ mCurrentNote--;\n        if (mCurrentNote < 60)\n          mCurrentNote = 60;\n\
    \        repaint();\n        break;\n      case RIGHT:\n        mCurrentNote++;\n\
    \        if (mCurrentNote > 72)\n          mCurrentNote = 72;\n        repaint();\n\
    \        break;\n      case FIRE:\n        try { Manager.playTone(mCurrentNote,\
    \ 1000, 100); }\n        catch (MediaException me) {}\n        break;\n      default:\n\
    \        break;\n    }\n  }\n} \n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\
    \n![](fig238_01.jpg)\nFigure 12-1: An itty bitty piano"
  raw: "## Overview\n\nMIDP 2.0 Includes basic audio capabilities. The media APIs\
    \ in MIDP 2.0 are a strict subset of the Mobile Media API (MMAPI), a more general\
    \ API for multimedia rendering. For full details on MMAPI, see the specification\
    \ here:\n\n[http://jcp.org/jsr/detail/135.jsp](http://jcp.org/jsr/detail/135.jsp)\n\
    \nThe MMAPI itself is kind of a pint-sized version of the Java Media Framework\
    \ (JMF), which is an optional package for J2SE. More information on the JMF is\
    \ available here:\n\n[http://java.sun.com/products/java-media/jmf/](http://java.sun.com/products/java-media/jmf/)\n\
    \nThe subset of the MMAPI that is included in MIDP 2.0 is called the Audio Building\
    \ Block (ABB). It includes the capability to play simple tones and sampled audio.\
    \ The ABB is implemented in the javax.microedition.media and javax.microedition.media.control\
    \ packages. This chapter begins with a rush of runnable code, and then backs off\
    \ to explain some of the concepts and dig into the APIs more carefully.\n\n##\
    \ Quick Start\n\nYou can play tones by calling this method in javax.microedition.media.Manager:\n\
    \n```\npublic static void playTone(int note, int duration, int volume)\n```\n\n\
    In this method, note is specified just like a MIDI note, where each integer corresponds\
    \ to a single key on a piano keyboard. Middle C is 60, and the A above middle\
    \ C (a 440 Hz tone) is 69\\. The duration is in milliseconds, and volume can range\
    \ from 0, silent, to 100, loudest.\n\nLike most other methods in the ABB, playTone()\
    \ may throw a MediaException. Although support for simple tones is required by\
    \ the specification, the device may be temporarily unable to play tones. (For\
    \ example, a mobile phone might be using the tone generation hardware to ring\
    \ the phone.)\n\n[Figure 12-1](#LiB0096.html#ch12fig01) shows PianoCanvas, an\
    \ example that displays a simple piano keyboard and allows the user to navigate\
    \ through the keys to play different tones. PianoCanvas is presented in [Listing\
    \ 12-1](#LiB0096.html#ch12list01). The code for playing the tones is very compact,\
    \ consisting solely of a call to playTone() in the keyPressed() method. The rest\
    \ of the code is devoted to the user interface.\n\nListing 12-1: *PianoCanvas*\
    \ Source Code\n\n| **![Start example](_1.gif)** |\n\n```\nimport javax.microedition.lcdui.*;\n\
