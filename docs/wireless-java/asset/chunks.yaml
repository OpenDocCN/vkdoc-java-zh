    |

    | 120 | Wireless Messaging API | [http://jcp.org/jsr/detail/120.jsp](http://jcp.org/jsr/detail/120.jsp)
    |

    | 135 | Mobile Media API | [http://jcp.org/jsr/detail/135.jsp](http://jcp.org/jsr/detail/135.jsp)
    |

    | 179 | Location API for J2ME | [http://jcp.org/jsr/detail/179.jsp](http://jcp.org/jsr/detail/179.jsp)
    |


    ---


    ## Configurations


    A configuration specifies a JVM and some set of core APIs for a specific family
    of devices. Currently there are two: the Connected Device Configuration (CDC)
    and the Connected, Limited Device Configuration (CLDC).


    ### Connected Device Configuration


    A *connected device* has, at a minimum, 512KB of read-only memory (ROM), 256KB
    of random access memory (RAM), and some kind of network connection. The CDC is
    designed for devices like television set-top boxes, car navigation systems, and
    high end PDAs. The CDC specifies that a full JVM (as defined in the Java Virtual
    Machine Specification, 2nd edition) must be supported.


    The configurations and profiles of `J2ME` are generally described in terms of
    their memory capacity. Usually a minimum amount of ROM and RAM is specified. For
    small devices, it makes sense to think in terms of volatile and non-volatile memory.
    The *non-volatile memory* is capable of keeping its contents intact as the device
    is turned on and off. ROM is one type, but non-volatile memory could also be flash
    memory or battery-backed RAM. *Volatile memory* is essentially workspace and does
    not maintain its contents when the device is turned off.


    The CDC is being developed under the Java Community Process. For more information
    on the CDC, see [http://java.sun.com/products/cdc/](http://java.sun.com/products/cdc/).
    A Linux reference implementation is available.


    The CDC is the basis of the Personal Profile stack. The Personal Profile is the
    next generation of PersonalJava, a Java application environment that is similar
    to JDK 1.1.8.'
