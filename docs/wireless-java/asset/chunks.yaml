    \   ToneControl.BLOCK_START, 1,\n        79, 4, 84, 4, 88, 4, 86, 4, 84, 4, 83,\
    \ 4, 81, 4, 79, 4,\n        77, 4, 76, 4, 74, 4, 72, 4, 71, 4, 69, 4, 67, 4, 65,\
    \ 4,\n        64, 8,        76, 8,        77, 8,        78, 8,\n        79, 12,\
