    decides to run a different application, hideNotify() is called.'
  trans: '

    ## 网络连接权限


    MIDP 2.0 包含一个安全框架，旨在防止 MIDlet 通过未经授权的网络连接来增加你的电话费。正如我在第 3 章中讨论的，MIDP 2.0 中的网络访问受到权限和保护域的管控。以下是
    MIDP 2.0 定义的权限名称：


    *   javax.microedition.io.Connector.http


    *   javax.microedition.io.Connector.https


    *   javax.microedition.io.Connector.datagram


    *   javax.microedition.io.Connector.datagramreceiver


    *   javax.microedition.io.Connector.socket


    *   javax.microedition.io.Connector.serversocket


    *   javax.microedition.io.Connector.ssl


    *   javax.microedition.io.Connector.comm


    *   javax.microedition.io.PushRegistry


    这些权限的名称与其所保护的 API 相对应。除一个例外，所有这些权限都保护连接类型，这些连接类型通过 `javax.microedition.io.Connector`
    类进行访问，因此这些权限名称带有该前缀。最后一个权限指的是推送注册表，其名称与 `PushRegistry` 类相同。


    当你在工具包中运行 MIDlet 套件时，它默认在不受信任的域中运行。在不受信任的域中，如果用户授予权限，则允许 HTTP 和 HTTPS 连接。当你运行一个尝试进行网络连接的
    MIDlet 时，可以看到这一点。图 9-7 展示了模拟器如何请求用户许可，并允许用户在当前会话的剩余时间内保持该决定。


    ![](img/fig181_01.jpg)

    图 9-7：模拟器请求用户对网络连接的许可。


    你可以通过使用 `MIDlet-Permissions` 和 `MIDlet-Permissions-Opt` 描述符属性来指明你的 MIDlet 套件所使用必要和可选的权限。（在
    J2ME 无线工具包中，你可以通过选择**设置…**，然后点击**权限**选项卡来在描述符中设置权限。）


    ## 总结


    MIDP 平台上的网络功能基于一个通用的连接框架。MIDP 1.0 规范强制要求的唯一协议是 HTTP。你只需几行代码即可执行 GET、HEAD 或 POST
    请求。HTTP 会话处理也是可行的。实现可以自由支持额外的连接类型；数据报、套接字、服务器套接字和串行端口通信都是可能的选择。MIDP 2.0 除了要求支持
    HTTP 外，还要求支持 HTTPS，并正式定义了用于处理额外连接类型的连接字符串和 API。MIDP 2.0 的安全架构保护用户免受未经授权的网络使用。


    # 第 10 章：编程自定义用户界面


    第 5 章、第 6 章和第 7 章专门讨论了 MIDP 的通用用户界面 API。尽管这些 API 设计巧妙，但它们并不适合游戏开发和其他专用用户界面。游戏编程比其他应用程序更“贴近硬件”。MIDP
    提供了一个类 `javax.microedition.lcdui.Canvas`，它提供了对设备屏幕和输入功能的底层访问。你可以精确地知道用户按下了哪些键，并在屏幕上绘制任何你想要的内容。


    MIDP 2.0 的另一个增强是游戏 API，它包含在 `javax.microedition.lcdui.game` 包中。它包括对 `Canvas` 的改进以及用于基于层的图形和精灵动画的类。游戏
    API 将在第 11 章中全面讨论。在本章中，你将学习 `Canvas` 的基础知识以及使用 `Graphics` 类进行绘图。


    ## Canvas 类


    `Canvas` 是 MIDP 自定义用户界面 API 的核心。要使用它，你必须创建一个 `Canvas` 的子类。这与 `Screen` 的子类不同，后者是“开箱即用”的。


    然而，除此之外，`Canvas` 与 `Displayable` 的其他子类配合得非常好。一个 MIDlet 可以混合使用常规屏幕和 `Canvas`。例如，在游戏中，高分屏幕可能是一个
    `Form`，而游戏本身则在 `Canvas` 上进行。


    `Canvas` 包含事件处理方法，每当发生重要事件时，MIDP 实现都会调用这些方法。当用户按下某个键，或者需要绘制屏幕时，`Canvas` 的某个方法将被调用。这些方法中的大多数在
    `Canvas` 中都有空实现。要响应事件，你需要重写相应的方法并提供实现。


    此规则的一个例外是 `paint()` 方法，它被声明为抽象方法，因此必须在子类中定义。


    ## Canvas 信息


    如果你想绘制自己的用户界面，你需要一些关于 `Canvas` 的基本信息。你可以通过调用 `getWidth()` 和 `getHeight()` 来获取
    `Canvas` 的大小。正如我们稍后将讨论的，你还可以通过调用 `Display` 中的方法来了解设备的颜色能力。


    MIDP 2.0 提供了全屏模式。某些 `Canvas` 实现不会占用所有可用的屏幕空间，而是会为设备状态信息或其他目的保留屏幕区域。如果设备支持 `Canvas`
    的备用全屏模式，你可以通过调用 `setFullScreenMode(true)` 来使用它。开启或关闭全屏模式可能会导致调用 `Canvas` 从 `Displayable`
    继承的 `sizeChanged()` 方法。


    `Canvas` 还具有事件处理方法，当你的 `Canvas` 显示和隐藏时，MIDP 实现会调用这些方法。每次你的 `Canvas` 显示时，都会调用 `showNotify()`
    方法。如果显示了另一个 `Displayable`，或者应用程序管理器决定运行另一个应用程序，则会调用 `hideNotify()`。

