    \ { }\n} \n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n当用户调用**发送**命令时，StealthMIDlet\
    \ 使用其输出密码器加密用户的消息。然后，它将密文编码为十六进制文本，准备发送给 Servlet。用户名和密文被打包到 GET URL 中并发送到服务器。此外，StealthMIDlet\
    \ 会跟踪一个用于会话跟踪的 cookie。如果服务器发回一个会话 ID cookie，它会被保存在 StealthMIDlet 的 `mSession`\
    \ 成员变量中。保存的 cookie 会随每个后续请求一起发送。这使得服务器能够检索该客户端的会话信息。如果没有此会话信息，客户端到服务器的每个 HTTP\
    \ 请求都需要重新初始化密码器，以防止它们不同步。\n\nStealthMIDlet 以十六进制密文的形式从服务器检索响应。它将字符串转换为字节数组，然后使用\
    \ MIDlet 的输入密码器解密该字节数组。解密后的消息显示在 Alert 中。\n\nStealthMIDlet 使用了本章前面介绍的相同 `HexCodec`\
    \ 和 `URLBuilder` 类。\n\n在服务器端，情况稍微复杂一些。StealthServlet 应能够处理多个客户端，这意味着它应该为每个连接的用户维护一对密码器。这是通过\
    \ HTTP 会话实现的，每个用户一个会话。当客户端请求到来时，StealthServlet 尝试在用户的会话中找到两个密码器。如果它们不存在（就像用户第一次连接到\
    \ Servlet 时的情况），则会创建新的密码器。密码器使用每个用户唯一的密钥进行初始化。具体如何定位这些密钥由您决定。在这个简单的实现中，`getInKey()`\
    \ 和 `getOutKey()` 方法是硬编码的。\n\n您应该注意到，Servlet 端的密钥似乎与 MIDlet 中的相反。这是因为 Servlet\
    \ 的输入密码器应使用与 MIDlet 输出密码器相同的密钥进行解密。\n\n一旦 StealthServlet 找到或创建了对应于特定用户的密码器，它就会解密传入的消息并将其打印到服务器控制台。然后，它加密一条响应消息（也是硬编码的）并将响应发送回\
    \ MIDlet。\n\n整个 StealthServlet 类如清单 15-6 所示。\n\n清单 15-6：*StealthServlet* 的源代码\n\
    \n| **![示例开始](img/_1.gif)** |\n\n```\nimport javax.servlet.http.*;\nimport javax.servlet.*;\n\
    import java.io.*;\nimport java.util.*;\n\nimport org.bouncycastle.crypto.StreamCipher;\n\
    import org.bouncycastle.crypto.engines.RC4Engine;\nimport org.bouncycastle.crypto.params.KeyParameter;\n\
    \npublic class StealthServlet extends HttpServlet {\n  public void doGet(HttpServletRequest\
    \ request,\n      HttpServletResponse response)\n      throws ServletException,\
    \ IOException {\n    String user = request.getParameter(\"user\");\n\n// 尝试查找用户的密码器对。\n\
    \    HttpSession session = request.getSession();\n    StreamCipher inCipher =\
    \ (StreamCipher)session.getAttribute(\"inCipher\");\n    StreamCipher outCipher\
    \ = (StreamCipher)session.getAttribute(\"outCipher\");\n"
- fmt: "```java\n// If the ciphers aren't found, create and initialize a new pair.\n\
    if (inCipher == null && outCipher == null) {\n    // Retrieve the client's keys.\n\
