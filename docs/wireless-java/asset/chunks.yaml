    ### 计时


    J2SE 拥有一系列令人印象深刻的类，可用于指定日期和时间，并在日期时间与人类可读的表示形式之间进行转换。J2SE 的时间类有四个不同的职责：


    *   *时间点*由 `java.util.Date` 的实例表示。如果你把时间想象成一条线图，那么 `Date` 的实例就是线上的一个点。


    *   *日历*用于通过年、月、日等日历字段来表示时间点。例如，如果你使用公历，那么你可以将单个时间点转换为一组日历值，如月、日以及小时、分钟和秒。在 J2SE
    中，`java.util.Calendar` 是日历的父类，而 `java.util.GregorianCalendar` 类则代表了世界上大多数人熟悉的公历系统。


    *   *格式化*类在时间点和人类可读字符串之间进行转换。在 J2SE 中，`java.text.DateFormat` 是那些既能生成也能解析表示时间点的人类可读字符串的类的父类。格式化类很可能会使用日历。例如，一个典型的
    `DateFormat` 实现可能会使用 `GregorianCalendar` 将一个时间点转换为一组日历值，然后将其格式化为字符串。


    *   *时区*类代表世界上的各个时区。日历和格式化类使用时区来创建特定时间点的本地化表示。在 J2SE 中，`java.util.TimeZone` 是所有时区的父类，`java.util.SimpleTimeZone`
    是其具体实现。


    理解这些类及其交互有点棘手，而且由于 JDK 1.0 和 JDK 1.1 之间的 API 发生了显著变化，情况变得更加复杂。`java.util.Date`
    类曾经拥有额外的功能；尽管这些方法已被弃用，但它们仍然存在，可能会造成混淆。幸运的是，在 CLDC/MIDP 世界中，你无需处理这些问题。


    在 CLDC/MIDP 中，情况稍微简单一些。首先，类更少了，而且 `Date` 类的 API 也得到了清理。在 MIDP 中，我刚才讨论的四个职责被分配给以下类：


    *   *时间点*仍然由 `java.util.Date` 的实例表示。本质上，`Date` 类只是一个 `long` 值的包装器，该值表示自 1970 年
    1 月 1 日午夜以来的毫秒数。（这是一种表示时间的标准方式。它大约还能再用 2.9 亿年，所以不用担心另一个千年虫问题。）


    *   *日历*仍然由 `java.util.Calendar` 的实例表示。然而，`GregorianCalendar` 类不再是公共 API 的一部分。要获取
    `Calendar` 实例，你可以使用 `getInstance()` 工厂方法。你很可能不需要这样做。


    *   *格式化*类在 MIDP 中是不可见的。其中一个用户界面类 `javax.microedition.lcdui.DateField` 可以将 `Date`
    转换为人类可读的显示形式，从而省去了你自己处理日期格式化器的麻烦。本质上，`DateField` 是 `Date` 实例的一个图形包装器。它还允许用户编辑日历和时钟字段以生成新的
    `Date` 值。有关 `DateField` 的完整讨论，请参见第 6 章。


    *   *时区*仍然由 `java.util.TimeZone` 的实例表示。`TimeZone` 提供了几个静态方法，用于检查可用的时区并获取代表特定时区的实例。


    ## 总结


    开发者被信息所淹没，而最优秀的开发者是那些能够快速学习新知识的人。不过，偶尔，你已知的东西可以再次被利用。这就是其中一种情况——当你学习 MIDP 编程时，你已经了解的
    J2SE API 会变得非常有用。MIDP 的 `java.lang`、`java.io` 和 `java.util` 包中包含的类，其外观和行为与 J2SE
    中的对应类非常相似。


    # 第 5 章：创建用户界面


    ## 概述


    MIDP 应用程序旨在无需修改即可在多种不同设备上运行。这在用户界面领域尤其困难，因为设备拥有各种尺寸的屏幕，有灰度的也有彩色的。此外，设备的输入能力也千差万别，从数字键盘到字母键盘、软键，甚至触摸屏。MIDP
    规定的最小屏幕尺寸为 96 × 54 像素，且至少具有 1 位色深。^([1]) 至于输入，MIDP 相当开放：设备预计会配备某种类型的键盘，或触摸屏，或者两者兼有。


    鉴于符合 MIDP 规范的设备种类繁多，有两种方法可以创建在所有设备上都能良好运行的应用程序：


    *   *抽象*：以抽象术语指定用户界面，依赖 MIDP 实现来创建具体内容。与其说“在软键上方的屏幕上显示‘下一步’这个词”，不如说“在这个界面的某处给我一个**下一步**命令”。


    *   *发现*：应用程序在运行时了解设备信息，并通过编程方式定制用户界面。例如，你可能会查明设备屏幕的大小，以便适当地缩放你的用户界面。


    MIDP API 支持这两种方法。抽象是首选方法，因为它涉及应用程序中更少的代码，而 MIDP 实现承担了更多工作。在某些情况下，比如游戏，你需要对用户界面有更具体的要求；这类应用程序会发现设备的能力，并尝试相应地调整其行为。MIDP
    的用户界面 API 被设计成易于在同一应用程序中混合使用这两种技术。


    ^([1])色深是决定屏幕上像素颜色的位数。1 位允许两种颜色（通常是黑色和白色）。4 位允许 16 种颜色，可以是不同级别的灰度或其他颜色的调色板。

