- fmt: "# The View From the Top\n\nMIDP contains user-interface classes in the `javax.microedition.lcdui`\
    \ and `javax.microedition.lcdui.game` packages. The device's display is represented\
    \ by an instance of the `Display` class, accessed from a factory method, `getDisplay()`.\
    \ `Display`'s main purpose in life is to keep track of what is currently shown,\
    \ which is an instance of `Displayable`. If you think of `Display` as an easel,\
    \ a `Displayable` instance is akin to a canvas on that easel.\n\nMIDlets can change\
    \ the contents of the display by passing `Displayable` instances to `Display`'s\
    \ `setCurrent()` method. This is the basic function of a typical MIDlet:\n\n1.\
    \ Show a `Displayable`.\n2. Wait for input.\n3. Decide what `Displayable` should\
    \ be next.\n4. Repeat.\n\n`Displayable` has a small family of subclasses that\
    \ represent various types of user interfaces. [Figure 5-1](#LiB0037.html#ch05fig01)\
    \ shows the lineage.\n\n[![Click To expand](fig80_01.jpg)](fig80_01_0.jpg)\nFigure\
    \ 5-1: Displayables in the `javax.microedition.lcdui` and `javax.microedition.lcdui.game`\
    \ package\n\n`Displayable`'s progeny are split between two branches that correspond\
    \ to the two methods for creating generalized user interfaces, abstraction and\
    \ discovery. The `Screen` class represents displays that are specified in abstract\
    \ terms.\n\nThese screens contain standard user-interface items like combo boxes,\
    \ lists, menus, and buttons. Four subclasses provide a wide range of functionality,\
    \ as illustrated in [Figure 5-2](#LiB0037.html#ch05fig02).\n\n[![Click To expand](fig81_01.jpg)](fig81_01_0.jpg)\n\
    Figure 5-2: The four children of `Screen`— (a) `TextBox`, (b) `Alert`, (c) `List`,\
    \ and (d) `Form`\n\nThe remainder of this chapter is devoted to explaining the\
    \ simplest of these four classes: `TextBox` and `Alert`. The [next chapter](#LiB0044_split_000.html#209)\
    \ explores the more flexible `List` and `Form`.\n\nFor particularly demanding\
    \ or idiosyncratic displays, you'll have to create a subclass of `Canvas`. Your\
    \ MIDlet will assume responsibility for most of the drawing, but you get much\
    \ finer control over what is shown and how user input is handled. `Canvas` supplies\
    \ methods that allow your MIDlet to learn about its environment—the size of the\
    \ display, for example, and which kinds of events are supported by the device.\
    \ User interfaces built on `Canvas` discover the attributes of a device and attempt\
    \ to create something that looks reasonable. [Chapter 10](#LiB0075_split_000.html#408)\
    \ explains `Canvas`-based user interfaces in detail.\n\n`GameCanvas`, new in MIDP\
    \ 2.0, provides user interface functionality specifically for game displays. [Chapter\
    \ 11](#LiB0085_split_000.html#471) explains this new API.\n\n## Using `Display`\n\
    \n`Display` manages a device's screen. You can get a reference to the device's\
    \ display by supplying a MIDlet reference to the static `getDisplay()` method.\
    \ Typically, you'll do this in the `startApp()` method of a MIDlet:\n\n```\npublic\
    \ void startApp() {\n  Display d = Display.getDisplay(this);\n  // ...\n}\n```\n\
    \nYou may be tempted to call `getDisplay()` in a MIDlet's constructor, but according\
    \ to the specification, `getDisplay()` can only be called after the beginning\
    \ of the MIDlet's `startApp()` method.\n\nOnce you've got a reference to a device's\
    \ `Display`, you'll just need to create something to show (an instance of `Displayable`)\
    \ and pass it to one of `Display`'s `setCurrent()` methods:\n\n```\npublic void\
    \ setCurrent(Displayable next)\npublic void setCurrent(Alert alert, Displayable\
    \ nextDisplayable)\n```\n\nThe second version is used when you want to show a\
    \ temporary message (an `Alert`) followed by something else. I'll talk more about\
    \ `Alert`s at the end of this chapter.\n\n`Display`'s `getCurrent()` method returns\
    \ a reference to what's currently being shown. Note that a MIDlet may return a\
    \ valid object from `getCurrent()` even if it is not visible to the user. This\
    \ could happen on a device running multiple MIDlets simultaneously, for example.\
    \ Note that the `Displayable` interface has a method called `isShown()` that indicates\
    \ whether the given object is actually being shown on the device screen.\n\nYou\
    \ can also query a `Display` to determine its capabilities, which is helpful for\
    \ applications that need to adapt themselves to different types of displays. The\
    \ `numColors()` method returns the number of distinct colors supported by this\
    \ device, while the `isColor()` method tells whether the device supports color\
    \ or grayscale. A `Display` for a device supporting 16 levels of gray, for example,\
    \ would return `false` from `isColor()` and `16` from `numColors()`. In MIDP 2.0,\
    \ you can also find out whether the device supports transparency by calling `numAlphaLevels()`,\
    \ which returns the number of transparency levels. The minimum return value is\
    \ two, indicating that image pixels with full transparency and full opacity are\
    \ supported. Return values greater than two indicate that alpha blending is supported.\
    \ In MIDP 2.0, `Display` contains two additional pairs of methods. The first methods,\
    \ `getColor()` and `getBorderStyle()`, are used for finding out colors and line\
    \ styles from the system user interface scheme. These methods are useful for drawing\
    \ custom items, a topic that is covered in [Chapter 7](#LiB0047_split_000.html#275).\
    \ The other method pair, `flashBacklight()` and `vibrate()`, invoke the corresponding\
    \ features of the device. These are more fully discussed in [Chapter 11](#LiB0085_split_000.html#471).\n\
    \n## Event Handling with Commands\n\n`Displayable`, the parent of all screen displays,\
    \ supports a very flexible user interface concept, the command. A *command* is\
    \ something the user can invoke—you can think of it as a button. Like a button,\
    \ it has a title, like \"OK\" or \"Cancel,\" and your application can respond\
    \ appropriately when the user invokes the command. The premise is that you want\
    \ a command to be available to the user, but you don't really care how it is shown\
    \ on the screen or exactly how the user invokes it—keypad button, soft button,\
    \ touch screen, whatever.\n\nEvery `Displayable` keeps a list of its `Command`s.\
    \ You can add and remove `Command`s using the following methods:\n\n```\npublic\
    \ void addCommand(Command cmd)\npublic void removeCommand(Command cmd)\n```"
