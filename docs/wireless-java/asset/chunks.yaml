    \ run() {\n    String url = getAppProperty(\"CookieMIDlet-URL\");\n\ntry {\n \
    \     // 查询服务器并获取响应。\n      HttpConnection hc = (HttpConnection)Connector.open(url);\n\
    \      if (mSession != null)\n        hc.setRequestProperty(\"cookie\", mSession);\n\
    \      InputStream in = hc.openInputStream();\n\nString cookie = hc.getHeaderField(\"\
    Set-cookie\");\n      if (cookie != null) {\n        int semicolon = cookie.indexOf(';');\n\
    \        mSession = cookie.substring(0, semicolon);\n      }\n\nint length = (int)hc.getLength();\n\
    \      byte[] raw = new byte[length];\n      in.read(raw);\n\nString s = new String(raw);\n\
    \      Alert a = new Alert(\"Response\", s, null, null);\n      a.setTimeout(Alert.FOREVER);\n\
    \      mDisplay.setCurrent(a, mForm);\n\nin.close();\n      hc.close();\n    }\n\
    \    catch (IOException ioe) {\n      Alert a = new Alert(\"Exception\", ioe.toString(),\
    \ null, null);\n      a.setTimeout(Alert.FOREVER);\n      mDisplay.setCurrent(a,\
    \ mForm);\n    }\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n在服务器端，事情要简单得多，如清单\
    \ 9-5 所示。如果你正在编写 Java Servlet，甚至无需担心 Cookie。相反，你只需处理一个 `HttpSession` 对象。下面的代码展示了一个与\
    \ `CookieMIDlet` 交互的 Servlet；它实现了一个基于会话的点击计数器。该代码已在 Tomcat 4.0 上测试过，但在其他服务器上应该也能正常工作。请注意，你需要将\
    \ MIDlet 使用的 URL 映射到此 Servlet 类；有关详细信息，请参阅 Servlet 入门书籍或你的服务器文档。\n\n清单 9-5：一个简单的会话处理\
    \ Servlet\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport javax.servlet.http.*;\n\
    import javax.servlet.*;\nimport java.io.*;\nimport java.util.*;\n\npublic class\
    \ CookieServlet extends HttpServlet {\n  private Map mHitMap = new HashMap();\n\
    \npublic void doGet(HttpServletRequest request,\n      HttpServletResponse response)\n\
    \      throws ServletException, IOException {\n    HttpSession session = request.getSession();\n\
    \nString id = session.getId();\n\nint hits = -1;\n\n// 尝试从映射中检索点击次数。\n    Integer\
    \ hitsInteger = (Integer)mHitMap.get(id);\n    if (hitsInteger != null)\n    \
    \  hits = hitsInteger.intValue();\n\n// 递增并存储。\n    hits++;\n    mHitMap.put(id,\
    \ new Integer(hits));\n    String message = \"Hits for this session: \" + hits\
    \ + \".\";\n\nresponse.setContentType(\"text/plain\");\n    response.setContentLength(message.length());\n\
    \    PrintWriter out = response.getWriter();\n    out.println(message);\n  }\n\
    }\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n该 Servlet 检索 `HttpSession` 对象。然后它提取出会话\
    \ ID，并将其用作点击次数映射中的键。在检索并递增该会话的点击次数后，Servlet 将其作为响应发送回 MIDlet。你可以启动模拟器的多个副本并同时运行它们，以观察点击次数如何相互独立并与每个会话相关联。\n\
    \n## 设计技巧\n\n本节包含一些关于创建联网 MIDlet 的建议。\n\n*   使用 GET 而非 POST。它更简单，而且你不必担心摆弄请求头。\n\
    \n*   不要硬编码 URL。将它们放在应用程序描述符的 MIDlet 属性中。这样可以在不重新编译代码的情况下更改 URL。\n\n*   将网络访问放在单独的线程中。网络访问总是需要时间；它不应阻塞用户界面。此外，你必须让用户了解正在发生的事情。显示一条“加载进度”类型的消息或某种指示，表明你的应用程序正在尝试访问网络资源。\n\
    \n*   确保优雅地处理异常。无线设备上的网络连接并非极其可靠，因此你应该确保做好最坏的准备。捕获所有异常并做出合理的处理。\n\n*   使用后自行清理。在小型设备上，资源稀缺，因此请确保在使用完连接后将其关闭。`try\
    \ - finally` 块对于确保未使用的流和连接被关闭特别有用。^([1]) Jargoneer 中的代码演示了这种技术。\n\n^([1])你可能熟悉\
    \ Java 中用于异常处理的 `try - catch` 块。`finally` 子句虽然不那么广为人知，但非常有用。无论控制流如何离开 `try` 块，`finally`\
    \ 块中的代码都会被执行。\n"
- fmt: "# Using HTTPS\n\nHTTP is not a secure protocol. It operates on top of TCP/IP\
    \ sockets. Information exchanged using HTTP is highly susceptible to eavesdroppers.\
    \ A more secure alternative, HTTPS, runs atop Transport Layer Security (TLS),\
    \ Secure Sockets Layer (SSL), or a similar protocol. TLS and SSL provide a layer\
    \ of authentication and encryption between sockets and higher-level protocols\
    \ like HTTP, POP3, SMTP, and NNTP.\n\nTLS 1.0 is really just an updated version\
    \ of SSLv3. For more information on these protocols, see [http://wp.netscape.com/eng/ssl3/](http://wp.netscape.com/eng/ssl3/)\
    \ and [http://www.ietf.org/rfc/rfc2246.txt](http://www.ietf.org/rfc/rfc2246.txt).\n\
    \nIn typical TLS interactions, the server sends a certificate to the client to\
    \ authenticate itself. The client must have Certificate Authority (CA) root certificates\
    \ on hand to verify the server's certificate. (The J2ME Wireless Toolkit comes\
    \ with a utility, `MEKeyTool`, that can be used to modify the set of CA root certificates\
    \ used by the toolkit emulator. Real devices may have similar utilities, but in\
    \ general, you'll have to make sure that your server certificate is signed by\
    \ a CA that is widely recognized.) If the client can verify the certificate, the\
    \ client will then send a secret value to the server, encrypted with the server's\
    \ public key. The server and the client both derive a *session key* from this\
    \ secret value, which is used to encrypt all subsequent traffic sent between the\
    \ client and server.\n\nThe generic connection framework makes it very easy to\
    \ obtain HTTPS connections. All you have to do is construct an HTTPS connection\
    \ string. So instead of this:\n\n```\nHttpConnection hc = (HttpConnection)\n \
    \   Connector.open(\"http://www.cert.org/\");\n```\n\nYou would do this:\n\n```\n\
    HttpConnection hc = (HttpConnection)\n    Connector.open(\"https://www.cert.org/\"\
    ); \n```\n\nIt's really that simple. HTTPS connections were possible in MIDP 1.0;\
    \ even though the specification didn't demand support, implementations were free\
    \ to provide it. In MIDP 2.0, the API also supports HTTPS, so there's a new interface,\
    \ `HttpsConnection`, that represents HTTP carried over some secure transport.\n\
    \n`HttpsConnection` is an extension of `HttpConnection`; it adds a `getPort()`\
    \ method so that you can find out the server's port number. The default port for\
    \ HTTPS is 443. More importantly, `HttpsConnection` has a `getSecurityInfo()`\
    \ method that returns information about the secure connection. The new `SecurityInfo`\
    \ interface encapsulates information about the cipher suite in use, the name and\
    \ version of the secure protocol, and the server's certificate. The certificate\
    \ is an implementation of `javax.microedition.pki.Certificate` and includes standard\
    \ information like the subject, signer, signature algorithm, and validity dates\
    \ of the certificate.\n\nThe following example shows how you can retrieve the\
    \ subject of a server certificate from an HTTPS connection:\n\n```\nString url\
    \ = \"https://www.cert.org/\";\nHttpsConnection hc = (HttpsConnection)Connector.open(url);\n\
    SecurityInfo si = hc.getSecurityInfo();\nCertificate c = si.getServerCertificate();\n\
    String subject = c.getSubject();\n```\n\n# Using Datagram Connections\n\nIn this\
    \ section, I'll briefly describe datagram connections. Although support for datagrams\
    \ is not mandated by the MIDP specification, certain device implementations may\
    \ choose to support datagram connections. Unlike stream-oriented connections,\
    \ datagram connections are *connectionless*. This means that you can fire packets\
    \ of data around the network, but you have no guarantee that they will reach their\
    \ destination in the right order, or that they will even arrive at all.\n\nDatagram\
    \ communications is based on two interfaces in the `javax.microedition.io` package,\
    \ `DatagramConnection` and `Datagram`. [Figure 9-4](#LiB0070.html#ch09fig04) shows\
    \ the methods in `DatagramConnection`.\n\n[![Click To expand](fig175_01.jpg)](fig175_01_0.jpg)\n\
    Figure 9-4: The *DatagramConnection* interface\n\nThe first step is to use the\
    \ generic connection framework to obtain a `DatagramConnection`—something like\
    \ this:\n\n```\nString url = \"datagram://jonathanknudsen.com:7999\";\nDatagramConnection\
    \ dc = (DatagramConnection)Connector.open(url); \n```\n\nThe URL string passed\
    \ to `Connector`'s `open()` method contains both the host name and port of the\
    \ opposite end of the datagram connection. If datagram connections are not supported\
    \ by a MIDP implementation, an exception will be thrown from the `open()` method.\n\
    \nAll data is exchanged using `Datagrams`. To send a datagram, first ask the `DatagramConnection`\
    \ to create one for you using one of the `newDatagram()` methods. Then write some\
    \ data into it and pass it into the `send()` method of `DatagramConnection`. Receiving\
    \ a datagram is almost as easy. You just call `receive()`, which blocks until\
    \ a datagram is received.\n\nIn essence, `Datagram` is a wrapper for an array\
    \ of bytes that are the payload of the datagram. You can retrieve a reference\
    \ to this byte array by calling `getData()`. Keep in mind, however, that the data\
    \ for the `Datagram` may be only a subset of the data in the array. You can find\
    \ the array offset and length of the actual data by calling `getOffset()` and\
    \ `getLength()`.\n\nInterestingly, `Datagram` is an extension of both the `DataInput`\
    \ and `DataOutput` interfaces, so it's possible to read and write data in a `Datagram`\
    \ as though it were a stream.\n\nIn MIDP 2.0, datagram connections are represented\
    \ by the `UDPDatagramConnection` interface, an extension of the `DatagramConnection`\
    \ interface. `UDPDatagramConnection` adds two new methods, `getLocalAddress()`\
    \ and `getLocalPort()`. You can use these methods to find out the originating\
    \ point of datagrams sent using the connection.\n\n# Other Connection Types\n\n\
    Although the MIDP 2.0 specification requires only HTTP and HTTPS connections,\
    \ it suggests that implementations support socket, server socket, and secure socket\
    \ connections. The API provides appropriate interfaces for these connections.\
    \ Devices may also choose to implement access to serial ports through the generic\
    \ connection framework. [Table 9-1](#LiB0071.html#ch09table01) details the additional\
    \ connection types, their supporting connection interfaces, and example connection\
    \ strings. For more detailed information, see the API documentation for the corresponding\
    \ interface.\n\nTable 9-1: Optional Connection Types\n\n| **TYPE** | **INTERFACE**\
    \ | **EXAMPLE** |\n| --- | --- | --- |\n| Socket | `SocketConnection` | `socket://jonathanknudsen.com:79`\
    \ |\n| Server socket | `ServerSocketConnection` | `socket://:129` |\n| TLS or\
    \ SSL socket | `SecureConnection` | `ssl://jonathanknudsen.com:79` |\n| Serial\
    \ port | `CommConnection` | `comm:com0;baudrate=19200` |"
