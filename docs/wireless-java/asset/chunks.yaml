    \ 4, 86, 4, 77, 4,\n        56, 4, 76, 4, 86, 4, 76, 4, 57, 4, 76, 4, 84, 4, 76,\
    \ 4,\n        53, 4, 74, 4, 84, 4, 74, 4, 55, 4, 74, 4, 83, 4, 74, 4,\n      \
    \  84, 16, ToneControl.SILENCE, 16,\n        ToneControl.BLOCK_END, 0,\n     \
    \   ToneControl.BLOCK_START, 1,\n        79, 4, 84, 4, 88, 4, 86, 4, 84, 4, 83,\
    \ 4, 81, 4, 79, 4,\n        77, 4, 76, 4, 74, 4, 72, 4, 71, 4, 69, 4, 67, 4, 65,\
