- fmt: "# The ABB also offers support for playing sampled audio files, although the\
    \ specification does not require support for this feature. To play sampled audio,\
    \ you just need to get a `Player` for the data you wish to hear, then start the\
    \ `Player` running. You can get a `Player` by asking `Manager` for one. In its\
    \ simplest form, playing sampled audio data looks like this:\n\n```\nURL url =\
    \ \"http://65.215.221.148:8080/wj2/res/relax.wav\";\nPlayer p = Manager.createPlayer(url);\n\
    p.start();\n```\n\nIn this approach, the web server provides the content type\
    \ of the data. Another approach is to obtain an `InputStream` to the audio data,\
    \ then create a `Player` by telling `Manager` the content type of the data. This\
    \ is handy for reading audio files that are stored as resources in the MIDlet\
    \ suite JAR. For example:\n\n```\nInputStream in = getClass().getResourceAsStream(\"\
    /relax.wav\");\nPlayer player = Manager.createPlayer(in, \"audio/x-wav\");\nplayer.start();\n\
    ```\n\n[Listing 12-2](#LiB0096.html#ch12list02) is a simple MIDlet that demonstrates\
    \ both techniques.\n\n## Listing 12-2: Playing Audio Files\n\n```\nimport java.io.*;\n\
    \nimport javax.microedition.io.*;\nimport javax.microedition.lcdui.*;\nimport\
    \ javax.microedition.midlet.*;\nimport javax.microedition.media.*;\n\npublic class\
    \ AudioMIDlet\n    extends MIDlet\n    implements CommandListener, Runnable {\n\
    \  private Display mDisplay;\n  private List mMainScreen;\n\npublic void startApp()\
    \ {\n    mDisplay = Display.getDisplay(this);\n\nif (mMainScreen == null) {\n\
    \      mMainScreen = new List(\"AudioMIDlet\", List.IMPLICIT);\n      mMainScreen.append(\"\
    Via HTTP\", null);\n      mMainScreen.append(\"From resource\", null);\n     \
    \ mMainScreen.addCommand(new Command(\"Exit\", Command.EXIT, 0));\n      mMainScreen.addCommand(new\
    \ Command(\"Play\", Command.SCREEN, 0));\n      mMainScreen.setCommandListener(this);\n\
    \    }\n\nmDisplay.setCurrent(mMainScreen);\n  }\n\npublic void pauseApp() {}\n\
    \npublic void destroyApp(boolean unconditional) {}\n\npublic void commandAction(Command\
    \ c, Displayable s) {\n    if (c.getCommandType() == Command.EXIT) notifyDestroyed();\n\
    \    else {\n      Form waitForm = new Form(\"Loading...\");\n      mDisplay.setCurrent(waitForm);\n\
    \      Thread t = new Thread(this);\n      t.start();\n    }\n  }\n\npublic void\
    \ run() {\n    String selection = mMainScreen.getString(\n        mMainScreen.getSelectedIndex());\n\
    \    boolean viaHttp = selection.equals(\"Via HTTP\");\n\nif (viaHttp)\n     \
    \ playViaHttp();\n    else\n      playFromResource();\n  }\n\nprivate void playViaHttp()\
    \ {\n    try {\n      String url = getAppProperty(\"AudioMIDlet-URL\");\n    \
    \  Player player = Manager.createPlayer(url);\n      player.start();\n    }\n\
    \    catch (Exception e) {\n      showException(e);\n      return;\n    }\n  \
    \  mDisplay.setCurrent(mMainScreen);\n  }\n\nprivate void playFromResource() {\n\
    \    try {\n      InputStream in = getClass().getResourceAsStream(\"/relax.wav\"\
    );\n      Player player = Manager.createPlayer(in, \"audio/x-wav\");\n      player.start();\n\
    \    }\n    catch (Exception e) {\n      showException(e);\n      return;\n  \
    \  }\n    mDisplay.setCurrent(mMainScreen);\n  }\n\nprivate void showException(Exception\
    \ e) {\n    Alert a = new Alert(\"Exception\", e.toString(), null, null);\n  \
    \  a.setTimeout(Alert.FOREVER);\n    mDisplay.setCurrent(a, mMainScreen);\n  }\n\
    }\n```\n\n## MIDP 2.0 Media Concepts\n\nAudio data comes in a variety of *content\
    \ types.* A content type is really just a file format, a specification that tells\
    \ how each bit in the data contributes to the resulting sound. Common audio content\
    \ types are MP3, AIFF, and WAV. In the MIDP 2.0 ABB, content types are specified\
    \ using MIME types, which use a string to specify a primary and secondary type.\
    \ For example, the MIME type for WAV audio is `\"audio/x-wav\"`.\n\nThe content\
    \ type tells how to translate bits into sound, but that's only half the battle.\
    \ A *protocol* specifies how to get the data from its original location to the\
    \ place where it will be rendered. You could use HTTP, for example, to transfer\
    \ audio data from a server to a MIDP device.\n\nIn the ABB, a `Player` knows how\
    \ to render audio data with a particular content type, while an associated *data\
    \ source* handles transporting the data to the `Player`. In the Mobile Media API,\
    \ the abstract `DataSource` class represents data sources. In the MIDP 2.0 ABB,\
    \ data sources are not explicitly available, but implicitly associated with a\
    \ `Player`. The path of the audio information is illustrated in [Figure 12-2](#LiB0097.html#ch12fig02).\n\
    \n[![Click To expand](fig244_01.jpg)](fig244_01_0.jpg)\nFigure 12-2: Audio data\
    \ path\n\n`Manager` doles out `Player`s for content types and protocols requested\
    \ via its `createPlayer()` methods. One or more *controls* may be associated with\
    \ a `Player` to specify playback parameters like volume. In the ABB, `javax.microedition.media.Control`\
    \ is an interface representing a control, while the `javax.microedition.media.control`\
    \ package contains more specific subinterfaces. The relationship between the classes\
    \ is shown in [Figure 12-3](#LiB0097.html#ch12fig03).\n\n![](fig244_02.jpg)\n\
    Figure 12-3: Class relationships"
