    \ user, it decrypts the incoming message and prints it out to the server console.\
    \ Then it encrypts a response message (also hard-coded) and sends the response\
    \ back to the MIDlet.\n\nThe entire StealthServlet class is shown in [Listing\
    \ 15-6](#LiB0122.html#ch15list06).\n\nListing 15-6: The Source Code for *StealthServlet*\n\
    \n| **![Start example](_1.gif)** |\n\n```\nimport javax.servlet.http.*;\nimport\
