    \ methods are hard-coded.\n\nYou should notice that the keys on the servlet side\
    \ appear to be reversed from the MIDlet. This is because the servlet's incoming\
    \ cipher should decrypt using the same key as the MIDlet's outgoing cipher.\n\n\
