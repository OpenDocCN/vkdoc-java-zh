    \ will be used. In general, it makes sense to store application properties in\
    \ the application descriptor file. Because it's distinct from the MIDlet suite\
    \ JAR, the application descriptor can easily be changed to modify the behavior\
    \ of your MIDlets. You might, for example, store a URL or other configuration\
    \ information in the application descriptor.\n\nFor example, suppose you put an\
    \ application-specific attribute in the application descriptor, like this:\n\n\
    ```\nJargoneer.url: http://www.dict.org/bin/Dict\n```\n\nInside the MIDlet, you\
    \ can retrieve the value of the attribute like this:\n\n```\nString url = getAppProperty(\"\
    Jargoneer.url\");\n```\n\nChanging the URL is as easy as changing the application\
    \ descriptor, a simple text file. None of your code needs to be recompiled. This\
    \ could be useful if you were expecting to distribute many copies of a MIDlet\
    \ and wanted to share the server load among a group of servers. You could distribute\
    \ the same MIDlet suite JAR with a group of different application descriptors,\
    \ each one using a MIDlet attribute to point to a different server."
  trans: "\n### MIDlet 清单信息\n\n存储在 MIDlet 清单文件中的信息由名称和值对组成，类似于属性文件。例如，一个简单的 JAR 清单可能如下所示：\n\
    \n```\nManifest-Version: 1.0\nCreated-By: 1.3.0 (Sun Microsystems Inc.)\n```\n\
    \nJargoneer 的 MIDlet JAR 清单如下所示：\n\n```\nManifest-Version: 1.0\nMIDlet-1: Jargoneer,\
    \ Jargoneer.png, Jargoneer\nMIDlet-Name: Jargoneer\nMIDlet-Version: 1.0\nMIDlet-Vendor:\
    \ Sun Microsystems\nCreated-By: 1.3.0 (Sun Microsystems Inc.)\nMicroEdition-Configuration:\
    \ CLDC-1.0\nMicroEdition-Profile: MIDP-1.0\n```\n\n额外的属性描述了软件版本、类名以及关于 MIDlet\
    \ 套件的其他信息。必须包含以下属性：\n\n*   **MIDlet-Name**：尽管名称如此，此属性实际上指的是整个 MIDlet 套件的名称，而不仅仅是单个\
    \ MIDlet。\n\n*   **MIDlet-Version**：描述 MIDlet 套件的版本。这是一个您自己选择的数字，格式为 *主版本号.次版本号.修订号*。\n\
    \n*   **MIDlet-Vendor**：这是您的姓名或公司名称。\n\n*   **MIDlet-*n***：对于 MIDlet 套件中的每个 MIDlet，列出其可显示名称、图标文件和类名。MIDlet\
    \ 应从 1 开始连续编号。例如，单个 MIDlet 套件中的多个 MIDlet 可以这样列出：\n\n    ```\n    MIDlet-1: Sokoban,\
    \ /icons/Sokoban.png, example.sokoban.Sokoban\n    MIDlet-2: Tickets, /icons/Auction.png,\
    \ example.lcdui.TicketAuction\n    MIDlet-3: Colors, /icons/ColorChooser.png,\
    \ example.chooser.Color\n    MIDlet-4: Stock, /icons/Stock.png, example.stock.StockMIDlet\
    \ \n    ```\n\n*   **MicroEdition-Configuration**：此属性描述此 MIDlet 套件可以运行的 J2ME 配置。多个配置名称应用空格分隔。\n\
    \n*   **MicroEdition-Profile**：描述此 MIDlet 套件可以运行的配置文件集。对于 MIDP 1.0 应用程序，这是 MIDP-1.0。对于可以在\
    \ MIDP 1.0 或 MIDP 2.0 上运行的应用程序，请使用 \"MIDP-2.0 MIDP-1.0\"。\n\n除了必需的清单属性外，还可以定义以下属性：\n\
    \n*   **MIDlet-Description:** MIDlet 套件的描述放在此属性中。\n\n*   **MIDlet-Icon:** 单个 MIDlet\
    \ 的图标在 MIDlet-n 属性中描述。此属性指定一个图标来表示整个 MIDlet 套件。\n\n*   **MIDlet-Info-URL:** 如果在线提供了关于\
    \ MIDlet 套件的额外信息，请使用此属性列出 URL。\n\n*   **MIDlet-Data-Size:** 如果您知道 MIDlet 套件需要多少字节的持久数据，您可以使用此属性指定该数字。\n\
    \n|  | 提示  | 不要被属性名称迷惑。许多属性名称似乎指的是单个 MIDlet，例如 *MIDlet-Name* 和 *MIDlet-Description*。实际上，这些属性描述的是整个\
    \ MIDlet 套件。唯一适用于特定 MIDlet 的属性是 *MIDlet-n* 属性，它用于列出套件中的每个 MIDlet。 |\n\n在 MIDP\
    \ 2.0 中，可以包含几个额外的属性。MIDP 2.0 使用权限方案保护网络 API 免受未经授权的访问，这将在本章后面详细讨论。MIDlet 可以在 MIDlet\
    \ JAR 清单中列出必需的权限和可选的权限，如下所示：\n\n*   **MIDlet-Permissions:** 使用此属性列出对 MIDlet 套件运行至关重要的权限。多个权限用逗号分隔。\n\
    \n*   **MIDlet-Permissions-Opt:** 此属性列出可能使用但对本 MIDlet 套件并非至关重要的权限。\n\n最后，MIDP\
    \ 2.0 还提供了一种方式，让 MIDlet 套件表明它们对可选 API 的依赖：\n\n*   **MIDlet-Extensions:** 在此属性中列出本\
    \ MIDlet 套件使用的可选 API。确切名称由各个可选 API 规范决定。\n\n### 应用程序描述符\n\n应用程序管理软件使用 MIDlet 套件\
    \ JAR 中的属性来运行套件内的 MIDlet。相比之下，应用程序描述符包含帮助设备决定是否加载 MIDlet 套件的信息。由于应用程序描述符是一个独立于\
    \ MIDlet 套件 JAR 的文件，设备可以在下载 MIDlet 套件之前轻松加载并检查该文件。\n\n实际上，应用程序描述符中的许多信息与 MIDlet\
    \ 套件 JAR 中的信息相同。例如，应用程序描述符必须包含 MIDlet-Name、MIDlet-Version 和 MIDlet-Vendor 属性。此外，它还应包含以下内容：\n\
    \n*   **MIDlet-Jar-URL:** 这是可以找到 MIDlet 套件 JAR 的 URL。\n\n*   **MIDlet-Jar-Size:**\
    \ 这是 MIDlet 套件 JAR 的大小，以字节为单位。\n\n应用程序描述符可以选择性地包含 MIDlet-Description、MIDlet-Icon、MIDlet-Info-URL\
    \ 和 MIDlet-Data-Size 属性。\n\n设备和模拟器在处理 MIDlet 套件描述符方面差异很大。有些设备在描述符中任何字段不正确时都会导致安装失败，而其他设备则更为宽松。像\
    \ J2ME Wireless Toolkit 这样的工具对于创建格式良好的描述符非常有用。\n\n应用程序描述符在无线（OTA）部署中非常有用。设备可以在决定是否下载并安装整个\
    \ MIDlet 套件 JAR 之前，下载并检查描述符（一个相对较短的文件）。对于 OTA 配置，服务器返回的应用程序描述符的 MIME 类型应为 text/vnd.sun.j2me.app-descriptor。这一点以及更多内容（整个协议）在\
    \ MIDP 2.0 规范的 *Over the Air User Initiated Provisioning Specification* 部分中有描述。\n\
    \n### MIDlet 属性\n\n清单或应用程序描述符中还有另一种属性可能性。您可以添加对您的 MIDlet 有意义的属性。MIDlet 可以使用 `javax.microedition.midlet.MIDlet`\
    \ 类中的 `getAppProperty()` 方法检索这些属性的值。一个属性可以列在应用程序描述符、JAR 清单或两者中；如果两者都列出，则将使用应用程序描述符中的值。通常，将应用程序属性存储在应用程序描述符文件中是合理的。由于它独立于\
    \ MIDlet 套件 JAR，因此可以轻松更改应用程序描述符以修改 MIDlet 的行为。例如，您可以在应用程序描述符中存储一个 URL 或其他配置信息。\n\
    \n例如，假设您在应用程序描述符中放置了一个特定于应用程序的属性，如下所示：\n\n```\nJargoneer.url: http://www.dict.org/bin/Dict\n\
    ```\n\n在 MIDlet 内部，您可以像这样检索该属性的值：\n\n```\nString url = getAppProperty(\"Jargoneer.url\"\
    );\n```\n\n更改 URL 就像更改应用程序描述符（一个简单的文本文件）一样容易。您的任何代码都不需要重新编译。如果您希望分发 MIDlet 的多个副本并在多台服务器之间分担服务器负载，这将非常有用。您可以使用一组不同的应用程序描述符来分发相同的\
    \ MIDlet 套件 JAR，每个描述符都使用一个 MIDlet 属性指向不同的服务器。\n"
- fmt: '# MIDlet Suite Security


    Wireless application security is important to almost everyone involved in the
    wireless industry:


    - Carriers want to be sure that viruses do not bring down their customers'' devices
    or their networks.

    - Device manufacturers don''t want customer-installed software crashing their
    devices.

    - Users want to be able to run downloaded code without threatening the stability
    of their device or the safety of their personal information. Additionally, they
    may want control over the network usage of their applications, as network usage
    often costs money.


    `MIDP 1.0` does not directly address these issues in the text of the specification,
    but the `JVM`-based architecture makes it an attractive platform from a security
    standpoint. The design of the Java Virtual Machine (`JVM`) ensures that `MIDlets`
    cannot escape the confines of the `JVM`, so even a rogue `MIDlet` can do no worse
    than crash or immobilize the `JVM`, leaving the rest of the device''s software
    unharmed. Furthermore, the `MIDP 1.0` APIs do not expose any sensitive features,
    with the possible exception of the networking APIs.


    ## Permissions


    `MIDP 2.0` brings an explicit security architecture to the table. `MIDlets` must
    have *permission* to perform sensitive operations. In `MIDP 2.0`, the only parts
    of the API that are protected by permissions are the network connections. Optional
    APIs are free to define additional permissions to protect sensitive data or functionality.


    Permission names use the same prefix and class or interface name as the API that
    they protect. In [Chapter 9](#LiB0063_split_000.html#351), I''ll explain the names
    of the network permissions in `MIDP 2.0` in detail. For the moment, suppose that
    you write a `MIDlet` that needs to make a socket connection. This `MIDlet` would
    need the permission of `javax.microedition.io.Connector.socket`. The `MIDlet`
    itself needs no knowledge of permissions. It simply attempts the connection, which
    either succeeds or throws a `java.lang.SecurityException`.


    `MIDP 2.0` adds a new method to the `MIDlet` class that programmers can use to
    check if a permission will be granted or denied:


    ```

    public final int checkPermission(String permission)

    ```


    This method returns `1` if the permission is granted and `0` if the permission
    is denied. A special return value, `-1`, indicates that the implementation cannot
    determine whether the permission will be granted or denied, which might be the
    case if the user will be asked about the given permission.


    ## Protection Domains


    In `MIDP 2.0`, `MIDlet` suites belong to *protection domains* that determine which
    permissions are granted, which are denied, and which ones must be deferred to
    the user''s judgment. A protection domain is kind of like a secret club and comprises
    two parts:


    1. The set of permissions that are allowed and those for which the user must be
    consulted.

    2. The rules for how a `MIDlet` suite can get into this protection domain.


    A very simple protection domain, "SimplePD," might contain the permission `javax.microedition.io.Connector.http`.
    The rules for membership in SimplePD could be something as simple as verifying
    the origin IP address of the `MIDlet` suite. For example, if the `MIDlet` suite
    is downloaded from [www.bigcarrier.com](http://www.bigcarrier.com), then the application
    management software on the device would know to place the `MIDlet` suite in the
    SimplePD protection domain. At runtime, any `MIDlet` that tries to make an HTTP
    connection will be granted the permission. Attempts to make other connection types
    will be denied.


    The simple IP-origin criterion for SimplePD is pretty weak. `MIDlet` suites in
    SimplePD are susceptible to many attacks, including data modification, data replacement,
    man-in-the-middle attacks, and DNS spoofing. More robust rules are based on cryptographic
    solutions for data integrity and authentication. In the `MIDP 2.0` specification,
    the section "Trusted MIDlet Suites Using X.509 PKI" describes one such scheme,
    including additional manifest attributes.


    `MIDlet` suites whose contents and origin cannot be verified are placed in a kind
    of default protection domain, the *untrusted* domain. The only restriction that
    the `MIDP 2.0` specification places on the untrusted domain is that, given explicit
    confirmation from the user, it must allow `MIDlets` access to HTTP and HTTPS connections.


    The concept of protection domains is deliberately vague, leaving implementations
    considerable latitude in their implementation. My guess is that many implementations
    will choose to have a single untrusted domain and a single trusted domain, with
    entry to the trusted domain limited to cryptographically signed (and verified)
    `MIDlet` suites.


    ## Permission Types


    The protection domain contains the permissions that will be granted to `MIDlets`
    (*allowed* permissions) as well as the permissions for which the user must be
    consulted (*user* permissions). There are several varieties of user permissions.
    *Blanket* means that the user is only required to grant or deny the permission
    once for a `MIDlet` suite. *Session* means that the user must grant or deny permission
    once per invocation of a `MIDlet` suite. Finally, *oneshot* indicates that the
    user must be consulted each time the necessary permission is needed.


    ## Permissions in MIDlet Suite Descriptors


    `MIDP 2.0` defines additional attributes for `MIDlet` suite descriptors. If your
    `MIDlet` suite absolutely, positively needs certain permissions, use the `MIDlet-Permissions`
    attribute. For example, if your `MIDlet` suite needs to make HTTP connections
    to function correctly, you would have a line in your descriptor file like this:


    ```

    MIDlet-Permissions: javax.microedition.io.Connector.http

    ```


    Multiple permission types are placed on the same line, separated by commas.


    If your `MIDlet` suite does not need certain permissions to function, but it may
    use them for enhanced functionality, these permissions can be placed in the `MIDlet-Permissions-Opt`
    attribute.


    At installation time, the application management software will compare the permissions
    requested in the descriptor with the permissions in the destination protection
    domain. If there are irreconcilable differences, the `MIDlet` suite will not be
    installed.


    ## Summary


    `MIDP` applications are called `MIDlets`. Like applets or servlets, `MIDlets`
    have a specific life cycle; they are managed by device software. This chapter
    details the entries that may be in the `MIDlet` suite manifest file and the application
    descriptor. Application properties can be used as a way to store information in
    the application descriptor instead of hard-coding values into the `MIDlet` source
    code. A tool like the `J2ME Wireless Toolkit` automatically handles many of the
    details of `MIDlet` attributes packaging. `MIDP 2.0` includes a comprehensive
    security architecture based on protection domains.


    # Chapter 4: Almost the Same Old Stuff


    ## Overview


    As I discussed in [Chapter 1](#LiB0004_split_000.html#24), one of the reasons
    you might be interested in `MIDP` as a platform is that it''s based on the Java
    programming language and the Java APIs. You''ll also recall that `MIDP` is built
    on top of the Connected, Limited Device Configuration (`CLDC`). The `CLDC` contains
    most of the APIs that will look familiar to experienced Java programmers. As of
    this writing, `CLDC 1.0` is the current version, but the finishing touches are
    just being applied to the `CLDC 1.1` specification. I''ll mention the changes
    between `CLDC 1.0` and `CLDC 1.1` throughout this chapter.


    In this chapter, we''ll explore the `java.lang`, `java.io`, and `java.util` packages
    as defined in the `CLDC`. I''ll assume you''re already familiar with the basic
    APIs of `J2SE`; I''ll walk through what''s the same and what''s different.


    At the time of this writing (first quarter 2003), `CLDC 1.1` and `MIDP 2.0` have
    not yet been implemented on real devices. Although `MIDP 2.0` will eventually
    be implemented on top of `CLDC 1.1`, the first wave of `MIDP 2.0` implementations
    will use `CLDC 1.0`.'
