  trans: "\n## 基准测试\n\n在 J2SE 领域，有许多工具可用于检查代码性能、瓶颈位置以及内存使用情况。遗憾的是，在 J2ME 领域，这些工具几乎不可用。大多数情况下，你只能采用传统方式进行基准测试。为此，MIDP\
    \ API 中提供了几种有用的方法。要测试内存使用情况，你可以使用 `java.lang.Runtime` 中的以下方法：\n\n```\npublic long\
    \ freeMemory()\npublic long totalMemory()\n```\n\n第一个方法返回当前可用内存的字节数。第二个方法返回当前运行时环境中的总字节数，无论这些字节是否被对象使用。有趣的是，这个数字可能会发生变化，因为宿主环境（设备操作系统）可能会为\
    \ Java 运行时环境分配更多内存。\n\n要查明一个对象使用了多少内存，你可以这样做：\n\n```\nRuntime runtime = Runtime.getRuntime();\n\
    long before, after;\nSystem.gc();\nbefore = runtime.freeMemory();\nObject newObject\
    \ = new String();\nafter = runtime.freeMemory();\nlong size = before - after;\n\
    ```\n\n除了检查内存使用情况，你可能还会关心应用程序的速度。同样，你可以用传统方式测试——在开始执行某项操作前查看时钟，操作完成后再查看一次。相关方法来自\
    \ `java.lang.System` 类：\n\n```\npublic static long currentTimeMillis()\n```\n\n\
    你可以像这样计算某个方法的执行时间：\n\n```\nlong start, finish;\nstart = System.currentTimeMillis();\n\
    someMethod();\nfinish = System.currentTimeMillis();\nlong duration = finish -\
    \ start;\n```\n\n为了获得精确的时间测量，你应该多次测量持续时间并计算平均值。\n\n## J2ME Wireless Toolkit 中的诊断工具\n\
    \n从 1.0.4 版本开始，J2ME Wireless Toolkit 包含了三个可用于了解应用程序性能的工具。\n\n第一个工具是内存监视器。你可以查看应用程序随时间变化的内存使用情况图表，或者应用程序中每个对象的详细分解信息。通过从\
    \ KToolbar 菜单中选择 **编辑** Ø **首选项** 来打开内存监视器。点击 **监视** 选项卡，并勾选 **启用内存监视器**。下次运行模拟器时，会弹出一个额外的窗口。你可以检查已使用的总内存，这在尝试让应用程序适配堆大小有限的设备时非常有用。（你甚至可以在首选项窗口的\
    \ **存储** 选项卡中设置模拟器的堆大小。）图 13-1 显示了内存监视器图表。\n\n![点击展开](img/fig259_01_0.jpg)\n图\
    \ 13-1：内存使用随时间变化的图表\n\n如果你点击内存监视器窗口中的 **对象** 选项卡，会看到应用程序中对象的详细列表。图 13-2 显示了此视图。\n\
    \n![点击展开](img/fig259_02_0.jpg)\n图 13-2：对象及其内存\n\n你可以点击表格中的任何列来按该列排序。你甚至可以使用 **视图**\
    \ Ø **查找** 来搜索特定项目。检查内存监视器窗口将帮助你识别应用程序中内存消耗最多的地方。\n\n除了内存监视器，该工具包还包括一个 *代码分析器*——一个显示应用程序中每个方法耗时情况的工具。要打开分析器，从\
    \ KToolbar 菜单中选择 **编辑** Ø **首选项**。选择 **监视** 选项卡并勾选 **启用分析**。\n\n在退出模拟器之前，你不会看到分析器。退出时，分析器窗口会弹出，总结上次模拟器运行期间应用程序中每个方法的耗时。请注意，你在模拟器中的操作会影响分析器的输出；如果你想测试整个应用程序的性能，必须执行其所有选项。图\
    \ 13-3 显示了运行第 11 章中的 QuatschMIDlet 示例后的模拟器。\n\n![点击展开](img/fig260_01_0.jpg)\n\
    图 13-3：分析器对所有内容计时。\n\n最后，J2ME Wireless Toolkit 还包含一个网络监视器。虽然它可能对调试网络协议比对优化更有用，但这里值得一提。要打开网络监视器，从\
    \ KToolbar 菜单中选择 **编辑** Ø **首选项**。选择 **监视** 选项卡并勾选 **启用网络监视**。下次运行模拟器时，会弹出一个跟踪网络使用情况的新窗口。图\
    \ 13-4 显示了来自 PeekAndPick 应用程序 ([`wireless.java.sun.com/applications/peekandpick/2.0/`](http://wireless.java.sun.com/applications/peekandpick/2.0/))\
    \ 的一些网络交互。\n\n![点击展开](img/fig261_01_0.jpg)\n图 13-4：PeekAndPick 应用程序的网络活动\n\n##\
    \ 优化内存使用\n\nJ2SE 程序员很容易对内存使用掉以轻心。毕竟，有了垃圾回收器，你就不必担心显式释放内存——不再使用的对象会被运行在低优先级线程中的垃圾回收器神奇地回收。然而，在\
    \ J2ME 领域，内存是稀缺的，应该谨慎对待。此外，内存分配和垃圾回收器的工作都可能拖慢应用程序的速度。在本节中，我们将探讨高效使用对象的技术，特别是针对\
    \ `String` 和 `StringBuffer`。最后，我将讨论在确实没有剩余内存的情况下如何优雅地处理这种情况。\n\n### 创建和丢弃对象\n\n\
    如果你在循环内部创建新对象，这应该在你的脑海中敲响警钟。每次创建对象（使用 `new`）时，都会分配内存。分配内存需要时间。更糟糕的是，在循环开始时创建的对象很可能在循环结束时超出作用域，这意味着循环的每次迭代都会使运行时系统更接近运行垃圾回收器。以下是一个示例：\n\
    \n```\n// 设置输入和结果数组。\nObject[] inputs = new Object[1000];\nint[] results = new\
    \ int[1000];\n// 处理每个输入以计算结果。\nint length = inputs.length;\nfor (int i = 0; i\
    \ < length; i++) {\n  Processor p = new Processor(inputs[i]);\n  results[i] =\
    \ p.calculateResult();\n}\n```\n\n在循环中创建对象会在性能方面造成双重惩罚。每次循环都会创建一个新的 `Processor`；如果这些对象足够大，那么在循环结束之前可能会强制进行一次或多次垃圾回收。你需要在对象首次创建时付出代价，然后在对象被垃圾回收时再次付出代价。\n\
    \n你几乎总是可以重构代码来避免这个问题。例如，你可以这样做，而不是为每个输入创建一个新的 `Processor`：\n\n```\n// 设置输入和结果数组。\n\
    Object[] inputs = new Object[1000];\nint[] results = new int[1000];\n// 处理每个输入以计算结果。\n\
    int length = inputs.length;\nProcessor p = new Processor();\nfor (int i = 0; i\
    \ < length; i++) {\n  p.setInput(inputs[i]);\n  results[i] = p.calculateResult();\n\
    } \n```\n"
- fmt: "### Strings and StringBuffers\n\n`Strings` have a special status in Java.\
    \ They are the only objects for which the plus operator (`+`) is overloaded. Each\
    \ time you concatenate strings using the plus operator, be wary—behind the scenes,\
    \ new `String` and `StringBuffer` objects are probably being created for you.\n\
    \n`String` and `StringBuffer` share a curious relationship. When you can create\
    \ and modify a `StringBuffer`, the actual work is performed on an internal character\
    \ array. When you create a `String` from the `StringBuffer`, the `String` points\
    \ to the same character array. Everything is fine so far, right? But if you further\
    \ modify the `StringBuffer`, it cleverly creates a new character array, a copy\
    \ of the old one. Thus, while `StringBuffer` is generally an efficient way to\
    \ create `Strings`, it is not always obvious exactly when new objects are created.\n\
    \nThe moral of the story is that every place you see string concatenation, there\
    \ may be new objects being created. If you're assembling strings inside a loop,\
    \ you should think about a different approach, possibly involving `StringBuffer`.\
    \ Another possible optimization is to forego `String` and `StringBuffer` entirely\
    \ and just use character arrays. While this may be a fast and efficient solution\
    \ in your own code, keep in mind that many APIs require `Strings` as parameters\
    \ and return `Strings` from methods, so you may end up doing a lot of conversion\
    \ between character arrays and `Strings`.\n\n### Failing Gracefully\n\nGiven the\
    \ paucity of memory in a typical MIDP device, your application should be prepared\
    \ for disappointment each time it asks for memory. Each time objects are created,\
    \ your code should catch `java.lang.OutOfMemoryError`. It is far better for you\
    \ to catch `OutOfMemoryErrors` than for your host environment to catch them. You,\
    \ at least, have a chance to do something reasonable—free up some memory and try\
    \ again, or fail gracefully with a politely worded message to the user. The host\
    \ environment is not likely to be so kind, and user perception of your application\
    \ will be much worse. Bear in mind that you will probably need to free up memory\
    \ by discarding large data structures before you will have enough space to create\
    \ an `Alert` for your message to the user.\n\n## Coding for Speed\n\nSmall devices\
    \ have small, relatively slow processors. Part of your task as a developer is\
    \ ensuring that your application runs fast enough that users won't reject it.\n\
    \n### Optimize Loops\n\nOne simple optimization has to do with looping. A typical\
    \ loop through a `Vector v` might look like this:\n\n```\nfor (int i = 0; i <\
    \ v.size(); i++) {\n  Object o = v.elementAt(i);\n  // Process the Object o.\n\
    }\n```\n\nEach time through the loop, `v`'s `size()` method is called. An optimized\
    \ version would store the size of the vector first, like this:\n\n```\nint size\
    \ = v.size();\nfor (int i = 0; i < size; i++) {\n  Object o = v.elementAt(i);\n\
    \  // Process the Object o.\n}\n```\n\nThis is a simple example, but it illustrates\
    \ that loop conditions are one place you can look for speed optimizations.\n\n\
    ### Use Arrays Instead of Objects\n\nArrays are usually faster and leaner than\
    \ collection classes. We touched on this theme earlier in our discussion of `Strings`\
    \ and `StringBuffers`; if it's not too clumsy, using character arrays directly\
    \ will probably be more efficient than dealing with `String` and `StringBuffer`\
    \ objects. The same rule applies to the MIDP collection classes `Vector` and `Hashtable`.\
    \ Although `Vector` and `Hashtable` are simple and convenient, they do impose\
    \ some overhead that can be trimmed. `Vector` is basically just a wrapper for\
    \ an array, so if you can work with an array directly, you'll save yourself some\
    \ memory and processing time. Similarly, if you have a simple mapping of key objects\
    \ to value objects, it might make sense to use object arrays instead of `Hashtable`.\n\
    \nIf you do decide to use `Hashtable` or `Vector`, try to size them correctly\
    \ when you create them. Both `Vector` and `Hashtable` grow larger as needed, but\
    \ it is relatively expensive. `Vector` creates a new internal array and copies\
    \ elements from the old array to the new array. `Hashtable` allocates new arrays\
    \ and performs a computationally expensive operation called *rehashing*. Both\
    \ `Vector` and `Hashtable` have constructors that allow you to specify the initial\
    \ size of the collection. You should specify the initial size of these collections\
    \ as accurately as possible.\n\nIf you are using the persistent storage APIs,\
    \ you may be tempted to wrap stream classes around the record data. For example,\
    \ you might read a record, then wrap a `ByteArrayInputStream` around the record's\
    \ data, and then wrap a `DataInputStream` around the `ByteArrayInputStream` to\
    \ read primitive types from the record. This is likely too heavy to be practical.\
    \ If at all possible, work directly with the record's byte array.\n\n### Use Buffered\
    \ I/O\n\nDon't read bytes one at a time from a stream, and don't write them out\
    \ one at a time. Although the stream classes provide methods that read and write\
    \ a single byte, you should avoid them if at all possible. It will almost always\
    \ be more efficient to read or write a whole array full of data.\n\nJ2SE provides\
    \ `BufferedReader` and `BufferedWriter` classes that provide buffering functionality\
    \ \"for free.\" There is no such luxury in the MIDP universe, so if you want to\
    \ use buffering, you'll have to do it yourself."
