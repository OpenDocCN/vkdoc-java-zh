    \ static final int kLeft = 1;\n  private static final int kRight = 2;\n\nprivate\
    \ static final int[] kRunningSequence = { 0, 1, 2 };\n  private static final int[]\
    \ kStandingSequence = { 3 };\n\npublic QuatschCanvas(String quatschImageName,\n\
    \      String atmosphereImageName, String backgroundImageName)\n      throws IOException\
    \ {\n    super(true);\n\n// 创建一个 LayerManager。\n    mLayerManager = new LayerManager();\n\
    \    int w = getWidth();\n    int h = getHeight();\n    mLayerManager.setViewWindow(96,\
    \ 0, w, h);\n    createBackground(backgroundImageName);\n    createAtmosphere(atmosphereImageName);\n\
    \    createQuatsch(quatschImageName);\n  }\n\nprivate void createBackground(String\
