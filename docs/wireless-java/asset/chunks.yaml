  trans: "\n## 支持的内容类型与协议\n\nABB 最不为人知的方面之一是其支持的内容类型。MIDP 2.0 在实现可能支持的内容类型和协议方面非常灵活。规范中仅说明，如果支持采样音频，则必须支持\
    \ 8 位 PCM WAV。除此之外，再无限制。\n\n如果你向 Manager 请求其无法处理的数据或协议，将会抛出 `MediaException`。\n\
    \n你可以在运行时通过 Manager 类中的两个方法了解支持哪些内容类型和协议：\n\n```\npublic static String getSupportedContentTypes(String\
