    \    g.setColor(0x000000);\n\nfor (int i = 60; i <= 72; i++)\n      drawNote(g,\
    \ i);\n\ndrawSelection(g, mCurrentNote);\n  }\n\nprivate void drawNote(Graphics\
    \ g, int note) {\n    int n = note % 12;\n    int octaveOffset = ((note - n) /\
    \ 12 - 5) * 7 * kNoteWidth[0];\n    int x = mMiddleCX + octaveOffset + kNoteX[n];\n\
    \    int y = mMiddleCY;\n    int w = kNoteWidth[n];\n    int h = kNoteHeight[n];\n\
