  trans: '

    ## MIDlet 套件安全


    无线应用安全对于无线行业的几乎所有参与者都至关重要：


    *   **运营商**希望确保病毒不会导致客户设备或网络瘫痪。

    *   **设备制造商**不希望用户安装的软件导致设备崩溃。

    *   **用户**希望能够运行下载的代码，而不会威胁到设备的稳定性或个人信息的安全。此外，他们可能希望控制应用程序的网络使用，因为网络使用通常需要付费。


    MIDP 1.0 并未在规范文本中直接解决这些问题，但基于 JVM 的架构使其从安全角度来看成为一个有吸引力的平台。Java 虚拟机（JVM）的设计确保了
    MIDlet 无法逃脱 JVM 的限制，因此即使是恶意的 MIDlet，其最坏情况也仅是导致 JVM 崩溃或无法响应，而不会损害设备上的其他软件。此外，MIDP
    1.0 API 没有暴露任何敏感功能，网络 API 可能是个例外。


    ### 权限


    MIDP 2.0 引入了一个明确的安全架构。MIDlet 必须拥有*权限*才能执行敏感操作。在 MIDP 2.0 中，API 中唯一受权限保护的部分是网络连接。可选
    API 可以自由定义额外的权限来保护敏感数据或功能。


    权限名称使用与其保护的 API 相同的前缀和类或接口名称。在第 9 章中，我将详细解释 MIDP 2.0 中网络权限的名称。目前，假设您编写了一个需要建立套接字连接的
    MIDlet。这个 MIDlet 需要 `javax.microedition.io.Connector.socket` 权限。MIDlet 本身不需要了解权限。它只是尝试连接，连接要么成功，要么抛出
    `java.lang.SecurityException`。


    MIDP 2.0 在 MIDlet 类中添加了一个新方法，程序员可以使用它来检查权限是否会被授予或拒绝：


    ```

    public final int checkPermission(String permission)

    ```


    如果权限被授予，此方法返回 1；如果权限被拒绝，则返回 0。特殊返回值 -1 表示实现无法确定权限是否会被授予或拒绝，这可能是当系统会询问用户关于给定权限的情况。


    ### 保护域


    在 MIDP 2.0 中，MIDlet 套件属于*保护域*，这些域决定了哪些权限被授予、哪些被拒绝，以及哪些必须交由用户判断。保护域有点像秘密俱乐部，由两部分组成：


    1.  允许的权限集以及需要咨询用户的权限集。

    2.  MIDlet 套件如何进入此保护域的规则。


    一个非常简单的保护域 "SimplePD" 可能包含权限 `javax.microedition.io.Connector.http`。进入 SimplePD
    的规则可能简单到验证 MIDlet 套件的源 IP 地址。例如，如果 MIDlet 套件是从 [www.bigcarrier.com](http://www.bigcarrier.com)
    下载的，那么设备上的应用程序管理软件就会知道将该 MIDlet 套件放入 SimplePD 保护域。在运行时，任何尝试进行 HTTP 连接的 MIDlet
    都将被授予该权限。尝试其他连接类型将被拒绝。


    SimplePD 基于简单 IP 来源的标准相当薄弱。SimplePD 中的 MIDlet 套件容易受到多种攻击，包括数据修改、数据替换、中间人攻击和 DNS
    欺骗。更健壮的规则基于用于数据完整性和身份验证的加密解决方案。在 MIDP 2.0 规范中，“使用 X.509 PKI 的可信 MIDlet 套件”一节描述了一种此类方案，包括额外的清单属性。


    其内容和来源无法验证的 MIDlet 套件将被放入一种默认的保护域，即*不受信任*域。MIDP 2.0 规范对不受信任域的唯一限制是，在获得用户明确确认后，它必须允许
    MIDlet 访问 HTTP 和 HTTPS 连接。


    保护域的概念故意定义得比较模糊，以便在实现时留有相当大的自由度。我猜测许多实现会选择拥有一个不受信任域和一个受信任域，进入受信任域仅限于经过加密签名（和验证）的
    MIDlet 套件。


    ### 权限类型


    保护域包含将授予 MIDlet 的权限（*允许*权限）以及必须咨询用户的权限（*用户*权限）。用户权限有几种变体。*全局*意味着用户只需为某个 MIDlet
    套件授予或拒绝一次权限。*会话*意味着用户必须在每次调用 MIDlet 套件时授予或拒绝权限。最后，*一次性*表示每次需要必要权限时都必须咨询用户。


    ### MIDlet 套件描述符中的权限


    MIDP 2.0 为 MIDlet 套件描述符定义了额外的属性。如果您的 MIDlet 套件绝对、肯定需要某些权限，请使用 `MIDlet-Permissions`
    属性。例如，如果您的 MIDlet 套件需要建立 HTTP 连接才能正常运行，您需要在描述符文件中添加如下一行：


    ```

    MIDlet-Permissions: javax.microedition.io.Connector.http

    ```


    多个权限类型放在同一行，用逗号分隔。


    如果您的 MIDlet 套件不需要某些权限即可运行，但可以使用它们来增强功能，则可以将这些权限放在 `MIDlet-Permissions-Opt` 属性中。


    在安装时，应用程序管理软件会将描述符中请求的权限与目标保护域中的权限进行比较。如果存在不可调和的分歧，则不会安装该 MIDlet 套件。


    ## 总结


    MIDP 应用程序称为 MIDlet。与 applet 或 servlet 类似，MIDlet 具有特定的生命周期；它们由设备软件管理。本章详细介绍了 MIDlet
    套件清单文件和应用程序描述符中可能包含的条目。应用程序属性可用作在应用程序描述符中存储信息的一种方式，而不是将值硬编码到 MIDlet 源代码中。像 J2ME
    无线工具包这样的工具会自动处理 MIDlet 属性打包的许多细节。MIDP 2.0 包含一个基于保护域的全面安全架构。


    # 第 4 章：几乎相同的老内容


    ## 概述


    正如我在第 1 章中讨论的，您可能对 MIDP 作为平台感兴趣的原因之一是它基于 Java 编程语言和 Java API。您还会记得 MIDP 是构建在连接有限设备配置（CLDC）之上的。CLDC
    包含大多数经验丰富的 Java 程序员会感到熟悉的 API。在撰写本文时，CLDC 1.0 是当前版本，但 CLDC 1.1 规范的收尾工作正在进行中。在本章中，我将提及
    CLDC 1.0 和 CLDC 1.1 之间的变化。


    在本章中，我们将探讨 CLDC 中定义的 `java.lang`、`java.io` 和 `java.util` 包。我假设您已经熟悉 J2SE 的基本 API；我将介绍哪些是相同的，哪些是不同的。


    在撰写本文时（2003 年第一季度），CLDC 1.1 和 MIDP 2.0 尚未在真实设备上实现。尽管 MIDP 2.0 最终将在 CLDC 1.1 之上实现，但第一波
    MIDP 2.0 实现将使用 CLDC 1.0。

    '
- fmt: '# No Floating Point in CLDC 1.0


    One overarching change is that CLDC 1.0 does not support floating-point types
    at all. That means there are no `float` or `double` primitive types. The corresponding
    wrapper types, `java.lang.Float` and `java.lang.Double`, have also been eliminated.


    Floating point support is absent in CLDC 1.0 because most small devices don''t
    have hardware support for floating-point operations. If calculations involving
    fractional numbers are important to your application, you can perform them in
    software. One implementation (using fixed-point integers) can be found at [http://home.rochester.rr.com/ohommes/MathFP/](http://home.rochester.rr.com/ohommes/MathFP/).


    CLDC 1.1 includes floating point support, the primitive types `double` and `float`,
    and the wrapper types `Double` and `Float`. Various other classes have been modified
    for floating-point support in CLDC 1.1, but the changes are minor.


    ## java.lang


    [Table 4-1](#LiB0032.html#ch04table01) and [Table 4-2](#LiB0032.html#ch04table02)
    list the classes and interfaces of `java.lang` and `java.lang.ref` in both J2SE
    (SDK version 1.4.0) and CLDC. The CLDC columns indicate whether the class is identical
    to its J2SE counterpart, is present with API differences, or is not present at
    all.


    Table 4-1: The `java.lang` Package


    | **INTERFACES** | | |

    | --- | --- | --- |

    | ***J2SE SDK 1.4.0*** | ***CLDC 1.0*** | ***CLDC 1.1*** |

    | --- | --- | --- |

    | `CharSequence` | - | - |

    | `Cloneable` | - | - |

    | `Comparable` | - | - |

    | `Runnable` | Same | Same |


    | **CLASSES** | | |

    | --- | --- | --- |

    | ***J2SE SDK 1.4.0*** | ***CLDC 1.0*** | ***CLDC 1.1*** |

    | --- | --- | --- |

    | `Boolean` | Different | Different |

    | `Byte` | Different | Same as CLDC 1.0 |

    | `Character` | Different | Same as CLDC 1.0 |

    | `Character.Subset` | - | - |

    | `Character.UnicodeBlock` | - | - |

    | `Class` | Different | Same as CLDC |

    | `ClassLoader` | - | - |

    | `Compiler` | - | - |

    | `Double` | - | Different |

    | `Float` | - | Different |

    | `InheritableThreadLocal` | - | - |

    | `Integer` | Different | Different |

    | `Long` | Different | Different |

    | `Math` | Different | Different |

    | `Number` | - | - |

    | `Object` | Different | Same as CLDC 1.0 |

    | `Package` | - | - |

    | `Process` | - | - |

    | `Runtime` | Different | Same as CLDC 1.0 |

    | `RuntimePermission` | - | - |

    | `SecurityManager` | - | - |

    | `Short` | Different | Same as CLDC 1.0 |

    | `StackTraceElement` | - | - |

    | `StrictMath` | - | - |

    | `String` | Different | Different |

    | `StringBuffer` | Different | Different |

    | `System` | Different | Same as CLDC 1.0 |

    | `Thread` | Different | Different |

    | `ThreadGroup` | - | - |

    | `ThreadLocal` | - | - |

    | `Throwable` | Different | Same as CLDC 1.0 |

    | `Void` | - | - |


    Table 4-2: The `java.lang.ref` Package


    | **CLASSES** | | |

    | --- | --- | --- |

    | ***J2SE SDK 1.4.0*** | ***CLDC 1.0*** | ***CLDC 1.1*** |

    | --- | --- | --- |

    | `PhantomReference` | - | - |

    | `Reference` | - | Different |

    | `ReferenceQueue` | - | - |

    | `SoftReference` | - | - |

    | `WeakReference` | - | Different |


    `java.lang.Object`, as always, is the root of every Java class. It remains mostly
    unchanged from J2SE, but there are some important differences.


    ### No User Classloading


    As I discussed in [Chapter 1](#LiB0004_split_000.html#24), one of the strengths
    of the Java platform is the ability to load classes at runtime. Unfortunately,
    because of resource constraints and security concerns, CLDC does not allow you
    to define your own classloaders. The application manager that runs MIDlets has
    a classloader, but you cannot access it or use it yourself in any way.


    ### No Object Finalization


    Object finalization is not available in CLDC (and, by extension, MIDP). *Finalization*
    is a mechanism by which objects can clean up after themselves just before they
    are garbage collected. In J2SE, an Object''s `finalize()` method is called before
    the object is reclaimed by the garbage collector. No such mechanism exists in
    CLDC. If you need to clean up resources, you will need to do it explicitly instead
    of placing cleanup code in `finalize()`. This is a good idea anyhow, particularly
    in a small device with limited resources. Explicitly cleaning up resources means
    that the memory and processing power they consume will be reclaimed sooner rather
    than later. Cleanup code in `finalize()` methods doesn''t get executed until the
    garbage collector runs, and you never know exactly when that''s going to happen.


    ### No Reflection


    CLDC does not support the Reflection API. The target devices of CLDC/MIDP are
    simply too small to allow it. Although most developers don''t need to use reflection
    directly, this omission has important implications. Without reflection, no Remote
    Method Invocation (RMI) is possible. Without RMI, JINI is not possible. Therefore,
    bare bones CLDC/MIDP implementations cannot run JINI. If you want to run JINI,
    you''ll need to investigate one of the larger J2ME profiles, most likely the Personal
    Profile (see [Chapter 1](#LiB0004_split_000.html#24)), and the RMI Optional API
    (JSR 66).


    ### No Native Methods


    Native methods are not supported in CLDC (and, by extension, MIDP). The specification
    does not support a way to access native device methods from Java. Although the
    MIDP implementation does, of course, include native methods, they are compiled
    into the implementation itself. Applications cannot define new native methods.


    Don''t worry about losing access to platform-specific features, however, because
    device vendors are likely to implement proprietary APIs in addition to MIDP. For
    details, check the developer web site of the manufacturer or network carrier of
    your device. Bear in mind that your use of vendor-or device-specific APIs will
    limit the audience of your application. In certain instances (games, mostly),
    it makes sense to distribute multiple versions of an application targeted at specific
    devices.


    ### Multithreading


    Using threads is much as you remember it from J2SE, as long as you keep things
    simple. Creating new threads, starting them, and using the handy `java.lang.Runnable`
    interface are the same as in J2SE. One important omission in CLDC 1.0 is the `interrupt()`
    method, which is not present in the `java.lang.Thread` class. In CLDC 1.1, the
    `interrupt()` method is available.


    The `pause()`, `resume()`, and `stop()` methods (which are deprecated in the J2SE
    SDK) are also absent. Thread groups and daemon threads are not supported in CLDC/MIDP;
    thread naming is not supported in CLDC 1.0 but is available in CLDC 1.1.


    ### String and StringBuffer


    Both `String` and `StringBuffer` are present in the CLDC `java.lang` package.
    They are largely unchanged from their J2SE counterparts.


    The largest change in the `String` class in CLDC 1.0 is the elimination of `valueOf()`
    static methods that convert between floating-point primitives and Strings, although
    these are present in CLDC 1.1. A few other obscure methods are absent from CLDC''s
    `String` class, but you probably won''t miss them. For example, although CLDC''s
    `String` includes the `compareTo(String str)` method, it doesn''t have either
    the `compareTo(Object o)` or `compareToIgnoreCase(String str)` methods that are
    found in the J2SE SDK. (CLDC 1.1 does include an `equalsIgnoreCase()` method in
    the `String` class.)


    `StringBuffer`''s `append()` and `insert()` methods do not include overrides for
    floating-point types in the CLDC 1.0 version of the class, but these are available
    in CDLC 1.1. Also, the `substring()` method has been pruned. Other than that,
    however, `StringBuffer` should be very familiar for seasoned J2SE programmers.'
