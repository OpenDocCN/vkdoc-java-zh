- fmt: "### `TextField`\n\n`TextField`表示一个可编辑的字符串。[图6-7](#LiB0045.html#ch06fig07)展示了一个标签为`\"\
    TextFieldTitle\"`、值为`\"text\"`的`TextField`。\n\n![](fig111_01.jpg)\n图6-7：包含单个`TextField`和`Back`命令的表单\n\
    \n在Sun的MIDP 2.0模拟器中，可以通过点击模拟器中的数字按钮或使用键盘直接向`TextField`输入文本。当然，具体如何允许编辑由实现决定。某些实现甚至可能显示一个单独的编辑屏幕。\n\
    \n`TextField`可以限制输入。定义了以下常量：\n\n*   `ANY`允许任何类型的输入。\n*   `NUMERIC`将输入限制为数字。\n\
    *   `DECIMAL`（MIDP 2.0新增）允许包含小数部分的数字。\n*   `PHONENUMBER`要求输入电话号码。\n*   `EMAILADDR`输入必须是电子邮件地址。\n\
    *   `URL`输入必须是URL。\n\n这些输入约束可能看起来很熟悉；它们与`TextBox`使用的约束相同，我在[上一章](#LiB0036_split_000.html#174)中介绍过。与`TextBox`一样，可以使用`OR`运算符将`PASSWORD`、`SENSITIVE`、`UNEDITABLE`、`NON_PREDICTIVE`、`INITIAL_CAPS_WORD`和`INITIAL_CAPS_SENTENCE`标志与约束组合使用。\n\
    \n要创建一个`TextField`，需要提供标签、文本值、最大长度和输入约束。\n\n```\npublic TextField(String label,\
    \ String text, int maxSize, int constraints)\n```\n\n对于初始为空的`TextField`，为`text`参数传递`null`。\n\
    \n与`TextBox`一样，MIDP 2.0中的`TextField`类包含一个`setInitialInputMode()`方法，用于向实现建议合适的输入模式。\n\
    \n### `ImageItem`\n\n表单也可以包含图像，这些图像由`ImageItem`的实例表示。`ImageItem`具有几个关联的数据片段：\n\
    \n*   标签（`label`）可能与图像一起显示。\n*   布局（`layout`）决定图像的位置。\n*   如果无法显示图像，则会显示替代文本（`alternate\
    \ text`）。\n\n要创建一个`ImageItem`，只需提供要显示的`Image`、标签、布局和替代文本。\n\n`ImageItem`为布局参数定义了常量。最简单的方式是指定默认值`LAYOUT_DEFAULT`。如果需要更多控制，可以将水平值与垂直值组合。水平值包括`LAYOUT_LEFT`、`LAYOUT_CENTER`和`LAYOUT_RIGHT`。垂直值包括`LAYOUT_NEWLINE_BEFORE`和`LAYOUT_NEWLINE_AFTER`。在MIDP\
    \ 2.0中，布局由`Item`类中的布局常量控制。`ImageItem`类中的常量是为了向后兼容而保留的。\n\n`ImageItem`在MIDP 2.0中支持外观模式，就像`StringItem`一样。`ImageItem`包含一个新的构造函数，允许您设置外观模式。\n\
    \n[图6-8](#LiB0045.html#ch06fig08)展示了一个包含单个`ImageItem`的表单。\n\n![](fig113_01.jpg)\n\
    图6-8：一个`ImageItem`\n\n### `DateField`\n\n`DateField`是一种极其方便的机制，用户可以通过它输入日期、时间或两者。由实现决定某种合理的方式让用户输入日期和时间；作为MIDlet程序员，您只需使用`DateField`，无需担心实现细节。\n\
    \n要创建一个`DateField`，请指定一个标签和一个类型。`DateField`类中的三个常量描述了不同的类型：\n\n*   `DATE`显示可编辑的日期。\n\
    *   `TIME`显示可编辑的时间。\n*   `DATE_TIME`同时显示日期和时间。\n\n`DateField`提供了两个构造函数。第一个使用默认时区，而第二个允许您显式指定一个`TimeZone`：\n\
    \n```\npublic DateField(String label, int mode)\npublic DateField(String label,\
    \ int mode, TimeZone timeZone) \n```\n\n本质上，`DateField`是`java.util.Date`的编辑器。正如您在[第4章](#LiB0030_split_000.html#134)中看到的，`Date`表示时间点。`DateField`扮演着在`Date`和人类可读的字符串之间进行转换的角色，类似于`Calendar`类。您可以使用以下方法设置或获取`DateField`所表示的`Date`：\n\
    \n```\npublic Date getDate()\npublic void setDate(Date date)\n```\n\n在J2ME Wireless\
    \ Toolkit模拟器中，`DateField`的外观如图6-9a所示。请注意，如果在显示`DateField`之前没有向`setDate()`提供`Date`，它将显示为未初始化状态，如图6-9b所示。\n\
    \n[![Click To expand](fig114_01.jpg)](fig114_01_0.jpg)\n图6-9：Sun的MIDP 2.0模拟器中的`DateField`\n\
    \n当用户选择`DateField`的日期或时间部分并进行编辑时，MIDP实现会提供某种合适的编辑器。Sun的模拟器提供了如图6-9c和图6-9d所示的编辑器。"
  raw: "#### TextField\n\nTextField represents an editable string. [Figure 6-7](#LiB0045.html#ch06fig07)\
    \ shows a TextField with a label of \"TextFieldTitle\" and a value of \"text\"\
    .\n\n![](fig111_01.jpg)\nFigure 6-7: A form with a single *TextField* and a *Back*\
    \ command\n\nIn Sun's MIDP 2.0 emulator, text can be entered directly into a TextField\
    \ either by clicking on the number buttons in the emulator or by typing on the\
    \ keyboard. Of course, it's up to the implementation to decide exactly how to\
    \ allow editing. Some implementations may even show a separate screen for editing.\n\
    \nTextFields can limit input. The following constants are defined:\n\n*   ANY\
    \ allows any type of input.\n\n*   NUMERIC restricts the input to numbers.\n\n\
    *   DECIMAL (new in MIDP 2.0) allows numbers with fractional parts.\n\n*   PHONENUMBER\
    \ requires a telephone number.\n\n*   EMAILADDR input must be an e-mail address.\n\
    \n*   URL input must be a URL.\n\nThese input constraints might look familiar;\
    \ they're the same ones used by TextBox, which I covered in the [previous chapter](#LiB0036_split_000.html#174).\
    \ As with TextBox, the flags PASSWORD, SENSITIVE, UNEDITABLE, NON_PREDICTIVE,\
    \ INITIAL_CAPS_WORD, and INITIAL_CAPS_SENTENCE can be combined with constraints\
    \ using the OR operator.\n\nTo create a TextField, you need to supply the label,\
    \ text value, maximum length, and input constraints.\n\n```\npublic TextField(String\
    \ label, String text, int maxSize, int constraints)\n```\n\nFor an initially empty\
    \ TextField, pass null for the text parameter.\n\nAs with TextBox, the TextField\
    \ class in MIDP 2.0 includes a setInitialInputMode() method for suggesting to\
    \ the implementation an appropriate input mode.\n\n#### ImageItem\n\nForms can\
    \ also contain images, which are represented by instances of ImageItem. ImageItems\
    \ have several pieces of associated data:\n\n*   A *label* may be displayed with\
    \ the image.\n\n*   The *layout* determines the placement of the image.\n\n* \
    \  *Alternate text* is displayed if the image cannot be shown.\n\nTo create an\
    \ ImageItem, just supply the Image that is to be displayed, the label, layout,\
    \ and alternate text.\n\nImageItem defines constants for the layout parameter.\
    \ The simplest thing is to specify the default value, LAYOUT_DEFAULT. If you need\
    \ more control, combine a horizontal value with a vertical value. The horizontal\
    \ values are LAYOUT_LEFT, LAYOUT_CENTER, and LAYOUT_RIGHT. The vertical values\
    \ are LAYOUT_NEWLINE_BEFORE and LAYOUT_NEWLINE_AFTER. In MIDP 2.0, layout is controlled\
    \ with the layout constants in the Item class. The constants in the ImageItem\
    \ class are present for backward compatibility.\n\nImageItem supports appearance\
    \ modes in MIDP 2.0, just like StringItem. ItemItem includes a new constructor\
    \ that allows you to set the appearance mode.\n\n[Figure 6-8](#LiB0045.html#ch06fig08)\
    \ shows a form containing a single ImageItem.\n\n![](fig113_01.jpg)\nFigure 6-8:\
    \ An *ImageItem*\n\n#### DateField\n\nDateField is an extremely handy mechanism\
    \ by which users can enter dates, times, or both. It's up to the implementation\
    \ to determine some reasonable way for users to enter dates and times; you, as\
    \ the MIDlet programmer, can simply use DateField and not worry about the implementation.\n\
    \nTo create a DateField, specify a label and a type. Three constants in the DateField\
    \ class describe the different types:\n\n*   DATE displays an editable date.\n\
    \n*   TIME displays an editable time.\n\n*   DATE_TIME displays both a date and\
    \ a time.\n\nDateField provides two constructors. The first uses the default time\
    \ zone, while the second allows you to specify a TimeZone explicitly:\n\n```\n\
    public DateField(String label, int mode)\npublic DateField(String label, int mode,\
    \ TimeZone timeZone) \n```\n\nIn essence, a DateField is an editor for a java.util.Date.\
    \ As you saw in [Chapter 4](#LiB0030_split_000.html#134), Dates represent points\
    \ in time. DateField takes the role of translating between a Date and strings\
    \ that humans can read, much like the Calendar class. You can set or get the Date\
    \ represented by the DateField using the following methods:\n\n```\npublic Date\
    \ getDate()\npublic void setDate(Date date)\n```\n\nIn the J2ME Wireless Toolkit\
    \ emulator, a DateField appears as shown in [Figure 6-9](#LiB0045.html#ch06fig09)a.\
    \ Note that if you do not supply a Date to setDate() before showing the DateField,\
    \ it will appear unitialized, as shown in [Figure 6-9](#LiB0045.html#ch06fig09)b.\n\
    \n[![Click To expand](fig114_01.jpg)](fig114_01_0.jpg)\nFigure 6-9: *DateField*\
    \ in Sun's MIDP 2.0 emulator\n\nWhen the user selects either the date or time\
    \ portion of the DateField and selects it for editing, the MIDP implementation\
    \ provides some kind of appropriate editor. Sun's emulator provides the editors\
    \ shown in [Figure 6-9](#LiB0045.html#ch06fig09)c and [Figure 6-9](#LiB0045.html#ch06fig09)d."
  trans: "\n#### TextField\n\nTextField 表示一个可编辑的字符串。图 6-7 展示了一个标签为“TextFieldTitle”、值为“text”的\
    \ TextField。\n\n![](img/fig111_01.jpg)\n图 6-7：包含一个 *TextField* 和一个 *Back* 命令的表单\n\
    \n在 Sun 的 MIDP 2.0 模拟器中，可以通过点击模拟器中的数字按钮或使用键盘直接向 TextField 输入文本。当然，具体如何允许编辑由实现决定。某些实现甚至可能显示一个单独的编辑屏幕。\n\
    \nTextField 可以限制输入。定义了以下常量：\n\n*   ANY 允许任何类型的输入。\n*   NUMERIC 将输入限制为数字。\n*  \
    \ DECIMAL（MIDP 2.0 新增）允许包含小数部分的数字。\n*   PHONENUMBER 要求输入电话号码。\n*   EMAILADDR 输入必须是电子邮件地址。\n\
    *   URL 输入必须是 URL。\n\n这些输入约束可能看起来很熟悉；它们与 TextBox 使用的约束相同，我在上一章中介绍过。与 TextBox 一样，标志\
    \ PASSWORD、SENSITIVE、UNEDITABLE、NON_PREDICTIVE、INITIAL_CAPS_WORD 和 INITIAL_CAPS_SENTENCE\
    \ 可以使用 OR 运算符与约束组合使用。\n\n要创建 TextField，需要提供标签、文本值、最大长度和输入约束。\n\n```\npublic TextField(String\
    \ label, String text, int maxSize, int constraints)\n```\n\n对于初始为空的 TextField，将\
    \ null 传递给 text 参数。\n\n与 TextBox 一样，MIDP 2.0 中的 TextField 类包含一个 setInitialInputMode()\
    \ 方法，用于向实现建议合适的输入模式。\n\n#### ImageItem\n\n表单也可以包含图像，这些图像由 ImageItem 的实例表示。ImageItem\
    \ 具有若干关联数据：\n\n*   *标签* 可能与图像一起显示。\n*   *布局* 决定图像的放置位置。\n*   如果无法显示图像，则显示*替代文本*。\n\
    \n要创建 ImageItem，只需提供要显示的 Image、标签、布局和替代文本。\n\nImageItem 为布局参数定义了常量。最简单的方式是指定默认值\
    \ LAYOUT_DEFAULT。如果需要更多控制，可以将水平值与垂直值组合使用。水平值包括 LAYOUT_LEFT、LAYOUT_CENTER 和 LAYOUT_RIGHT。垂直值包括\
    \ LAYOUT_NEWLINE_BEFORE 和 LAYOUT_NEWLINE_AFTER。在 MIDP 2.0 中，布局由 Item 类中的布局常量控制。ImageItem\
    \ 类中的常量是为了向后兼容而保留的。\n\nImageItem 在 MIDP 2.0 中支持外观模式，与 StringItem 类似。ImageItem\
    \ 包含一个新的构造函数，允许您设置外观模式。\n\n图 6-8 展示了一个包含单个 ImageItem 的表单。\n\n![](img/fig113_01.jpg)\n\
    图 6-8：一个 *ImageItem*\n\n#### DateField\n\nDateField 是一种极其方便的机制，用户可以通过它输入日期、时间或两者。由实现决定为用户提供某种合理的方式来输入日期和时间；作为\
    \ MIDlet 程序员，您只需使用 DateField，无需担心具体实现。\n\n要创建 DateField，请指定标签和类型。DateField 类中的三个常量描述了不同的类型：\n\
    \n*   DATE 显示可编辑的日期。\n*   TIME 显示可编辑的时间。\n*   DATE_TIME 同时显示日期和时间。\n\nDateField\
    \ 提供了两个构造函数。第一个使用默认时区，而第二个允许您显式指定 TimeZone：\n\n```\npublic DateField(String label,\
    \ int mode)\npublic DateField(String label, int mode, TimeZone timeZone) \n```\n\
    \n本质上，DateField 是 java.util.Date 的编辑器。正如您在第 4 章中所见，Date 表示时间点。DateField 负责在 Date\
    \ 和人类可读的字符串之间进行转换，这与 Calendar 类非常相似。您可以使用以下方法设置或获取 DateField 所表示的 Date：\n\n```\n\
    public Date getDate()\npublic void setDate(Date date)\n```\n\n在 J2ME Wireless\
    \ Toolkit 模拟器中，DateField 的外观如图 6-9a 所示。请注意，如果在显示 DateField 之前没有向 setDate() 提供\
    \ Date，它将显示为未初始化状态，如图 6-9b 所示。\n\n![点击展开](img/fig114_01_0.jpg)\n图 6-9：Sun 的 MIDP\
    \ 2.0 模拟器中的 *DateField*\n\n当用户选择 DateField 的日期或时间部分并进入编辑状态时，MIDP 实现会提供某种合适的编辑器。Sun\
    \ 的模拟器提供了如图 6-9c 和图 6-9d 所示的编辑器。\n"
- fmt: "### Gauge\n\n`Gauge`表示一个整数值。具体如何显示由实现决定。在Sun的MIDP实现中，`Gauge`的外观如图6-10所示。\n\
    \n![图6-10：一个Gauge](fig115_01.jpg)\n\n`Gauge`的值可以通过`getValue()`和`setValue()`方法获取和修改。该值的范围从0到一个可变的最大值。`Gauge`的最大值可以通过`getMaxValue()`和`setMaxValue()`方法获取和修改。\n\
    \n`Gauge`的视觉外观是其值的近似表示。例如，图6-10中显示的`Gauge`可能值为7、最大值为10，或者值为42、最大值为61。\n\n在**交互式**`Gauge`中，用户可以修改其值。同样，具体实现方式由实现决定。在Sun的参考实现中，可以使用左右导航按钮来修改`Gauge`的值。\n\
    \n`Gauge`的构造函数很直接：\n\n```\npublic Gauge(String label, boolean interactive,\n \
    \   int maxValue, int initialValue)\n```\n\n例如，以下代码创建了一个最大值为24、初始值为2的交互式`Gauge`：\n\
    \n```\nGauge g = new Gauge(\"Power\", true, 24, 2);\n```\n\nMIDP 2.0扩展了`Gauge`的角色。交互式`Gauge`与之前相同，但新增了三种非交互式`Gauge`，它们可用作进度指示器。你可以使用一个已知最大值的常规非交互式`Gauge`来显示下载或计算的进度。例如，如果你要循环20次，可以创建一个最大值为20的`Gauge`，并在每次循环时更新其值。\n\
    \n有两种没有最大值的非交互式`Gauge`。在这种情况下，你需要使用特殊值`INDEFINITE`作为最大值。此类`Gauge`可以是**增量式**或**连续式**的。增量式`Gauge`显示具有可测量步骤的操作；你的应用程序会在每次执行重要操作时更新它。例如，如果你正在下载一个文件但不知道其大小，可以使用增量式`Gauge`，并在每次读取到一些数据时更新它。连续式`Gauge`可能通过动画显示进度，无需应用程序主动触发。这种类型的`Gauge`适用于无法测量进度的操作。\n\
    \n`Gauge`的值本身可以设置为以下之一：\n\n- `INCREMENTAL_UPDATING`：表示你刚刚完成了一些操作，`Gauge`应更新以反映该操作。\n\
    - `INCREMENTAL_IDLE`：表示你希望`Gauge`是增量式的，但当前没有发生任何操作。\n- `CONTINUOUS_RUNNING`：表示连续式`Gauge`处于运行模式。\n\
    - `CONTINUOUS_IDLE`：用于连续式`Gauge`，表示当前没有进度。\n\n以下示例展示了交互式、连续式和增量式`Gauge`。命令（`Update`和`Idle`）为连续式和增量式`Gauge`设置相应的值。通常你会从单独的线程中设置这些值，但使用命令可以更容易地理解本例中的情况。\n\
    \n在Sun的MIDP 2.0模拟器中，连续式和空闲`Gauge`使用简单的Duke动画来显示进度。屏幕截图见图6-11。清单6-2包含了一个演示不同类型`Gauge`的MIDlet的源代码。\n\
    \n**清单6-2：GaugeMIDlet源代码**\n\n| **![开始示例](_1.gif)** |\n\n```\nimport javax.microedition.midlet.*;\n\
    import javax.microedition.lcdui.*;\n\npublic class GaugeMIDlet\n    extends MIDlet\n\
    \    implements CommandListener {\nprivate Display mDisplay;\n\nprivate Form mGaugeForm;\n\
    private Command mUpdateCommand, mIdleCommand;\n\nprivate Gauge mInteractiveGauge;\n\
    private Gauge mIncrementalGauge;\nprivate Gauge mContinuousGauge;\n\npublic GaugeMIDlet()\
    \ {\n  mGaugeForm = new Form(\"Gauges\");\n  mInteractiveGauge = new Gauge(\"\
    Interactive\", true, 5, 2);\n  mInteractiveGauge.setLayout(Item.LAYOUT_2);\n \
    \ mGaugeForm.append(mInteractiveGauge);\n  mContinuousGauge = new Gauge(\"Non-I\
    \ continuous\", false,\n      Gauge.INDEFINITE, Gauge.CONTINUOUS_RUNNING);\n \
    \ mContinuousGauge.setLayout(Item.LAYOUT_2);\n  mGaugeForm.append(mContinuousGauge);\n\
    \  mIncrementalGauge = new Gauge(\"Non-I incremental\", false,\n      Gauge.INDEFINITE,\
    \ Gauge.INCREMENTAL_UPDATING);\n  mIncrementalGauge.setLayout(Item.LAYOUT_2);\n\
    \  mGaugeForm.append(mIncrementalGauge);\n\n  mUpdateCommand = new Command(\"\
    Update\", Command.SCREEN, 0);\n  mIdleCommand = new Command(\"Idle\", Command.SCREEN,\
    \ 0);\n  Command exitCommand = new Command(\"Exit\", Command.EXIT, 0);\n  mGaugeForm.addCommand(mUpdateCommand);\n\
    \  mGaugeForm.addCommand(mIdleCommand);\n  mGaugeForm.addCommand(exitCommand);\n\
    \  mGaugeForm.setCommandListener(this);\n}\n\npublic void startApp() {\n  if (mDisplay\
    \ == null) mDisplay = Display.getDisplay(this);\n  mDisplay.setCurrent(mGaugeForm);\n\
    }\n  public void pauseApp() {}\n\n  public void destroyApp(boolean unconditional)\
    \ {}\n\n  public void commandAction(Command c, Displayable s) {\n    if (c.getCommandType()\
    \ == Command.EXIT)\n      notifyDestroyed();\n    else if (c == mUpdateCommand)\
    \ {\n      mContinuousGauge.setValue(Gauge.CONTINUOUS_RUNNING);\n      mIncrementalGauge.setValue(Gauge.INCREMENTAL_UPDATING);\n\
    \    }\n    else if (c == mIdleCommand) {\n      mContinuousGauge.setValue(Gauge.CONTINUOUS_IDLE);\n\
    \      mIncrementalGauge.setValue(Gauge.INCREMENTAL_IDLE);\n    }\n  }\n}\n```\n\
    \n| **![结束示例](_1.gif)** |\n\n|  |\n\n![图6-11：MIDP 2.0中的三种Gauge](fig116_01.jpg)\n\
    \n### ChoiceGroup\n\n`Form`中`Item`的最后一个类是`ChoiceGroup`。`ChoiceGroup`提供一个选项列表。它与本章开头描述的`javax.microedition.lcdui.List`非常相似。这种相似性并非巧合；`ChoiceGroup`和`List`都实现了`Choice`接口，该接口是两个类中所有实例方法的源泉。\n\
    \n如果你已经阅读了关于`List`的部分，那么你几乎已经掌握了使用`ChoiceGroup`所需的一切知识，因为其实例方法的工作方式完全相同。\n\n`ChoiceGroup`具有以下构造函数：\n\
    \n```\npublic ChoiceGroup(String label, int choiceType)\npublic ChoiceGroup(String\
    \ label, int choiceType, String[] stringElements,\n    Image[] imageElements)\n\
    ```\n\n`choiceType`应该很熟悉；它可以是`EXCLUSIVE`或`MULTIPLE`，即`Choice`接口中定义的常量。实际上，`ChoiceGroup`的构造函数与`List`的构造函数工作方式完全相同，只是不允许使用`IMPLICIT`。这很合理，因为`ChoiceGroup`是表单中的一个项目，而不是整个屏幕。MIDP\
    \ 2.0还为`ChoiceGroup`添加了`POPUP`类型，使其看起来像组合框或下拉菜单。`ChoiceGroup`在`Form`中显示为其他元素一样；图6-12展示了示例。\n\
    \n[![点击展开](fig119_01.jpg)](fig119_01_0.jpg)\n图6-12：`ChoiceGroup`示例——(a) `MULTIPLE`，(b)\
    \ `EXCLUSIVE`和(c) `POPUP`"
  raw: "#### Gauge\n\nA Gauge represents an integer value. It's up to the implementation\
    \ to decide how to display it. In Sun's MIDP implementation, a Gauge appears as\
    \ shown in [Figure 6-10](#LiB0045.html#ch06fig10).\n\n![](fig115_01.jpg)\nFigure\
    \ 6-10: A *Gauge*\n\nThe value of the Gauge can be retrieved and modified with\
    \ the getValue() and setValue() methods. This value runs from 0 to a variable\
    \ maximum value. The maximum for the Gauge can be retrieved and modified with\
    \ the getMaxValue() and setMaxValue() methods.\n\nThe visual appearance of the\
    \ Gauge is an approximation of the Gauge's value. The Gauge shown in [Figure 6-10](#LiB0045.html#ch06fig10)\
    \ could, for example, have a value of 7 and a maximum of 10, or perhaps a value\
    \ of 42 and a maximum of 61.\n\nIn an *interactive* Gauge, the user can modify\
    \ the value. Again, it's up to the implementation to decide exactly how this works.\
    \ In Sun's reference implementation, the left and right navigation buttons can\
    \ be used to modify a Gauge's value.\n\nGauge's constructor is straightforward:\n\
    \n```\npublic Gauge(String label, boolean interactive,\n    int maxValue, int\
    \ initialValue)\n```\n\nFor example, the following code creates an interactive\
    \ Gauge with a maximum value of 24 and an initial value of 2:\n\n```\nGauge g\
    \ = new Gauge(\"Power\", true, 24, 2);\n```\n\nMIDP 2.0 expands Gauge's role.\
    \ Interactive gauges are the same as before, but there are three varieties of\
    \ noninteractive gauges that can be useful as progress indicators. You can use\
    \ a regular noninteractive gauge with a known maximum value to show the progress\
    \ of a download or a calculation. For example, if you were going to run through\
    \ a loop 20 times, you could create a Gauge with a maximum of 20 and update its\
    \ value each time through the loop.\n\nThere are two kinds of noninteractive gauges\
    \ with no maximum value. In this case, you use the special value INDEFINITE for\
    \ the maximum. Such gauges can be either *incremental* or *continuous*. An incremental\
    \ gauge shows an operation with measurable steps; your application will update\
    \ the gauge every time it does something significant. For example, if you were\
    \ downloading a file, but you didn't know how big it was, you could use an incremental\
    \ gauge and update the gauge whenever you read some data. A continuous gauge shows\
    \ progress, probably using an animation, with no prodding needed from the application.\
    \ This type of gauge is useful for operations where you can't measure the progress.\n\
    \nThe gauge value itself can be set to one of the following:\n\n*   INCREMENTAL_UPDATING\
    \ indicates that you have just accomplished something and the gauge should be\
    \ updated to reflect it.\n\n*   INCREMENTAL_IDLE means that you want the gauge\
    \ to be incremental but nothing is currently happening.\n\n*   CONTINUOUS_RUNNING\
    \ indicates a continuous gauge in its running mode.\n\n*   CONTINUOUS_IDLE is\
    \ used for a continuous gauge, indicating that no progress is currently being\
    \ made.\n\nThe following example shows interactive, continuous, and incremental\
    \ gauges. Commands (**Update** and **Idle**) set the appropriate values on the\
    \ continuous and incremental gauges. Normally you would set these from separate\
    \ threads, but using commands makes it easy to understand what's going on in this\
    \ example.\n\nIn Sun's MIDP 2.0 emulator, the continuous and idle gauges use simple\
    \ Duke animations to show progress. See [Figure 6-11](#LiB0045.html#ch06fig11)\
    \ for a screen shot. [Listing 6-2](#LiB0045.html#ch06list02) contains the source\
    \ code for a MIDlet that demonstrates different kinds of Gauges.\n\nListing 6-2:\
    \ *GaugeMIDlet* Source Code\n\n| **![Start example](_1.gif)** |\n\n```\nimport\
    \ javax.microedition.midlet.*;\nimport javax.microedition.lcdui.*;\n\npublic class\
    \ GaugeMIDlet\n    extends MIDlet\n    implements CommandListener {\nprivate Display\
    \ mDisplay;\n\nprivate Form mGaugeForm;\nprivate Command mUpdateCommand, mIdleCommand;\n\
    \nprivate Gauge mInteractiveGauge;\nprivate Gauge mIncrementalGauge;\nprivate\
    \ Gauge mContinuousGauge;\n\npublic GaugeMIDlet() {\n  mGaugeForm = new Form(\"\
    Gauges\");\n  mInteractiveGauge = new Gauge(\"Interactive\", true, 5, 2);\n  mInteractiveGauge.setLayout(Item.LAYOUT_2);\n\
    \  mGaugeForm.append(mInteractiveGauge);\n  mContinuousGauge = new Gauge(\"Non-I\
    \ continuous\", false,\n      Gauge.INDEFINITE, Gauge.CONTINUOUS_RUNNING);\n \
    \ mContinuousGauge.setLayout(Item.LAYOUT_2);\n  mGaugeForm.append(mContinuousGauge);\n\
    \  mIncrementalGauge = new Gauge(\"Non-I incremental\", false,\n      Gauge.INDEFINITE,\
    \ Gauge.INCREMENTAL_UPDATING);\n  mIncrementalGauge.setLayout(Item.LAYOUT_2);\n\
    \  mGaugeForm.append(mIncrementalGauge);\n\n  mUpdateCommand = new Command(\"\
    Update\", Command.SCREEN, 0);\n  mIdleCommand = new Command(\"Idle\", Command.SCREEN,\
    \ 0);\n  Command exitCommand = new Command(\"Exit\", Command.EXIT, 0);\n  mGaugeForm.addCommand(mUpdateCommand);\n\
    \  mGaugeForm.addCommand(mIdleCommand);\n  mGaugeForm.addCommand(exitCommand);\n\
    \  mGaugeForm.setCommandListener(this);\n}\n\npublic void startApp() {\n  if (mDisplay\
    \ == null) mDisplay = Display.getDisplay(this);\n  mDisplay.setCurrent(mGaugeForm);\n\
    }\n  public void pauseApp() {}\n\n  public void destroyApp(boolean unconditional)\
    \ {}\n\n  public void commandAction(Command c, Displayable s) {\n    if (c.getCommandType()\
    \ == Command.EXIT)\n      notifyDestroyed();\n    else if (c == mUpdateCommand)\
    \ {\n      mContinuousGauge.setValue(Gauge.CONTINUOUS_RUNNING);\n      mIncrementalGauge.setValue(Gauge.INCREMENTAL_UPDATING);\n\
    \    }\n    else if (c == mIdleCommand) {\n      mContinuousGauge.setValue(Gauge.CONTINUOUS_IDLE);\n\
    \      mIncrementalGauge.setValue(Gauge.INCREMENTAL_IDLE);\n    }\n  }\n}\n```\n\
    \n| **![End example](_1.gif)** |\n\n|  |\n\n![](fig116_01.jpg)\nFigure 6-11: Three\
    \ kinds of *Gauge*s in MIDP 2.0\n\n#### ChoiceGroup\n\nThe final class in the\
    \ Form arsenal of Items is ChoiceGroup. ChoiceGroup offers a list of choices.\
    \ It is very similar to javax.microedition.lcdui.List, which was described at\
    \ the beginning of this chapter. This similarity is more than coincidental; ChoiceGroup\
    \ and List both implement the Choice interface, which is the wellspring of all\
    \ of the instance methods in both classes.\n\nIf you read the section about List,\
    \ you already know almost everything you need to know to use ChoiceGroup because\
    \ the instance methods work exactly the same way.\n\nChoiceGroup features the\
    \ following constructors:\n\n```\npublic ChoiceGroup(String label, int choiceType)\n\
    public ChoiceGroup(String label, int choiceType, String[] stringElements,\n  \
    \  Image[] imageElements)\n```\n\nThe choiceType should look familiar; it can\
    \ be either EXCLUSIVE or MULTIPLE, the constants defined in the Choice interface.\
    \ In fact, ChoiceGroup's constructors work exactly like List's constructors, except\
    \ that IMPLICIT is not allowed. This makes sense, since a ChoiceGroup is one item\
    \ in a form, not an entire screen. MIDP 2.0 also adds a POPUP type for ChoiceGroup\
    \ that makes it appear like a combo box or a drop-down menu. The ChoiceGroup appears\
    \ like any other element in the Form; [Figure 6-12](#LiB0045.html#ch06fig12) shows\
    \ examples.\n\n[![Click To expand](fig119_01.jpg)](fig119_01_0.jpg)\nFigure 6-12:\
    \ *ChoiceGroup* examples— (a) *MULTIPLE*, (b) *EXCLUSIVE* and (c) *POPUP*"
  trans: "\n#### 仪表\n\n仪表（Gauge）表示一个整数值。具体如何显示由实现决定。在 Sun 的 MIDP 实现中，仪表的外观如图 6-10\
    \ 所示。\n\n![](img/fig115_01.jpg)\n图 6-10：一个*仪表*\n\n仪表的值可以通过 getValue() 和 setValue()\
    \ 方法获取和修改。该值的范围从 0 到某个可变的最大值。仪表的最大值可以通过 getMaxValue() 和 setMaxValue() 方法获取和修改。\n\
    \n仪表的视觉外观是其值的近似表示。例如，图 6-10 中显示的仪表，其值可能为 7，最大值为 10；或者值可能为 42，最大值为 61。\n\n在*交互式*仪表中，用户可以修改其值。同样，具体如何实现由实现决定。在\
    \ Sun 的参考实现中，可以使用左、右导航按钮来修改仪表的值。\n\n仪表的构造函数很直接：\n\n```\npublic Gauge(String label,\
    \ boolean interactive,\n    int maxValue, int initialValue)\n```\n\n例如，以下代码创建了一个最大值为\
    \ 24、初始值为 2 的交互式仪表：\n\n```\nGauge g = new Gauge(\"Power\", true, 24, 2);\n```\n\
    \nMIDP 2.0 扩展了仪表的作用。交互式仪表与之前相同，但新增了三种非交互式仪表，可用作进度指示器。你可以使用一个已知最大值的常规非交互式仪表来显示下载或计算的进度。例如，如果你要循环执行\
    \ 20 次，可以创建一个最大值为 20 的仪表，并在每次循环时更新其值。\n\n有两种没有最大值的非交互式仪表。在这种情况下，你需要使用特殊值 `INDEFINITE`\
    \ 作为最大值。此类仪表可以是*增量式*或*连续式*。增量式仪表显示具有可测量步骤的操作；你的应用程序会在每次执行重要操作时更新仪表。例如，如果你正在下载一个文件，但不知道其大小，可以使用增量式仪表，并在每次读取一些数据时更新它。连续式仪表可能通过动画来显示进度，无需应用程序主动触发。这种类型的仪表适用于无法测量进度的操作。\n\
    \n仪表值本身可以设置为以下之一：\n\n*   `INCREMENTAL_UPDATING` 表示你刚刚完成了一些操作，仪表应更新以反映该操作。\n* \
    \  `INCREMENTAL_IDLE` 表示你希望仪表是增量式的，但当前没有发生任何操作。\n*   `CONTINUOUS_RUNNING` 表示连续式仪表处于运行模式。\n\
    *   `CONTINUOUS_IDLE` 用于连续式仪表，表示当前没有进度。\n\n以下示例展示了交互式、连续式和增量式仪表。命令（**Update**\
    \ 和 **Idle**）为连续式和增量式仪表设置相应的值。通常你会从不同的线程中设置这些值，但在此示例中使用命令可以更容易理解发生了什么。\n\n在 Sun\
    \ 的 MIDP 2.0 模拟器中，连续式和空闲仪表使用简单的 Duke 动画来显示进度。屏幕截图请参见图 6-11。清单 6-2 包含一个演示不同类型仪表的\
    \ MIDlet 的源代码。\n\n清单 6-2：*GaugeMIDlet* 源代码\n\n| **![开始示例](img/_1.gif)** |\n\n\
    ```\nimport javax.microedition.midlet.*;\nimport javax.microedition.lcdui.*;\n\
    \npublic class GaugeMIDlet\n    extends MIDlet\n    implements CommandListener\
    \ {\nprivate Display mDisplay;\n\nprivate Form mGaugeForm;\nprivate Command mUpdateCommand,\
    \ mIdleCommand;\n\nprivate Gauge mInteractiveGauge;\nprivate Gauge mIncrementalGauge;\n\
    private Gauge mContinuousGauge;\n\npublic GaugeMIDlet() {\n  mGaugeForm = new\
    \ Form(\"Gauges\");\n  mInteractiveGauge = new Gauge(\"Interactive\", true, 5,\
    \ 2);\n  mInteractiveGauge.setLayout(Item.LAYOUT_2);\n  mGaugeForm.append(mInteractiveGauge);\n\
    \  mContinuousGauge = new Gauge(\"Non-I continuous\", false,\n      Gauge.INDEFINITE,\
    \ Gauge.CONTINUOUS_RUNNING);\n  mContinuousGauge.setLayout(Item.LAYOUT_2);\n \
    \ mGaugeForm.append(mContinuousGauge);\n  mIncrementalGauge = new Gauge(\"Non-I\
    \ incremental\", false,\n      Gauge.INDEFINITE, Gauge.INCREMENTAL_UPDATING);\n\
    \  mIncrementalGauge.setLayout(Item.LAYOUT_2);\n  mGaugeForm.append(mIncrementalGauge);\n\
    \n  mUpdateCommand = new Command(\"Update\", Command.SCREEN, 0);\n  mIdleCommand\
    \ = new Command(\"Idle\", Command.SCREEN, 0);\n  Command exitCommand = new Command(\"\
    Exit\", Command.EXIT, 0);\n  mGaugeForm.addCommand(mUpdateCommand);\n  mGaugeForm.addCommand(mIdleCommand);\n\
    \  mGaugeForm.addCommand(exitCommand);\n  mGaugeForm.setCommandListener(this);\n\
    }\n\npublic void startApp() {\n  if (mDisplay == null) mDisplay = Display.getDisplay(this);\n\
    \  mDisplay.setCurrent(mGaugeForm);\n}\n  public void pauseApp() {}\n\n  public\
    \ void destroyApp(boolean unconditional) {}\n\n  public void commandAction(Command\
    \ c, Displayable s) {\n    if (c.getCommandType() == Command.EXIT)\n      notifyDestroyed();\n\
    \    else if (c == mUpdateCommand) {\n      mContinuousGauge.setValue(Gauge.CONTINUOUS_RUNNING);\n\
    \      mIncrementalGauge.setValue(Gauge.INCREMENTAL_UPDATING);\n    }\n    else\
    \ if (c == mIdleCommand) {\n      mContinuousGauge.setValue(Gauge.CONTINUOUS_IDLE);\n\
    \      mIncrementalGauge.setValue(Gauge.INCREMENTAL_IDLE);\n    }\n  }\n}\n```\n\
    \n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n![](img/fig116_01.jpg)\n图 6-11：MIDP 2.0\
    \ 中的三种*仪表*\n\n#### 选择组\n\nForm 中 Item 的最后一个类是 ChoiceGroup。ChoiceGroup 提供一组选项。它与本章开头描述的\
    \ `javax.microedition.lcdui.List` 非常相似。这种相似性并非巧合；ChoiceGroup 和 List 都实现了 `Choice`\
    \ 接口，该接口是两个类中所有实例方法的源泉。\n\n如果你已经阅读了关于 List 的部分，那么你几乎已经掌握了使用 ChoiceGroup 所需的一切知识，因为其实例方法的工作方式完全相同。\n\
    \nChoiceGroup 具有以下构造函数：\n\n```\npublic ChoiceGroup(String label, int choiceType)\n\
    public ChoiceGroup(String label, int choiceType, String[] stringElements,\n  \
    \  Image[] imageElements)\n```\n\nchoiceType 应该很熟悉；它可以是 `EXCLUSIVE` 或 `MULTIPLE`，即\
    \ `Choice` 接口中定义的常量。实际上，ChoiceGroup 的构造函数与 List 的构造函数工作方式完全相同，只是不允许使用 `IMPLICIT`。这是合理的，因为\
    \ ChoiceGroup 是表单中的一个项目，而不是整个屏幕。MIDP 2.0 还为 ChoiceGroup 添加了 `POPUP` 类型，使其看起来像组合框或下拉菜单。ChoiceGroup\
    \ 在 Form 中显示为其他任何元素；图 6-12 显示了示例。\n\n![点击展开](img/fig119_01_0.jpg)\n图 6-12：*ChoiceGroup*\
    \ 示例—— (a) *MULTIPLE*，(b) *EXCLUSIVE* 和 (c) *POPUP*\n"
- fmt: "### Responding to Item Changes\n\nMost items in a `Form` fire events when\
    \ the user changes them. Your application can listen for these events by registering\
    \ an `ItemStateListener` with the `Form` using the following method:\n\n```\n\
    public void setItemStateListener(ItemStateListener iListener)\n```\n\n`ItemStateListener`\
    \ is an interface with a single method. This method is called every time an item\
    \ in a `Form` is changed:\n\n```\npublic void itemStateChanged(Item item)\n```\n\
    \n[Listing 6-3](#LiB0045.html#ch06list03) creates a `Form` with two items, an\
    \ interactive `Gauge` and a `StringItem`. As you adjust the `Gauge`, its value\
    \ is reflected in the `StringItem` using the `ItemStateListener` mechanism.\n\n\
    **Listing 6-3: *GaugeTracker* Source Code**\n\n```\nimport javax.microedition.midlet.*;\n\
    import javax.microedition.lcdui.*;\n\npublic class GaugeTracker\n    extends MIDlet\n\
    \    implements ItemStateListener, CommandListener {\n  private Gauge mGauge;\n\
    \  private StringItem mStringItem;\n  public GaugeTracker() {\n    int initialValue\
    \ = 3;\n    mGauge = new Gauge(\"GaugeTitle\", true, 5, initialValue);\n    mStringItem\
    \ = new StringItem(null, \"[value]\");\n    itemStateChanged(mGauge);\n  }\n\n\
    \  public void itemStateChanged(Item item) {\n    if (item == mGauge)\n      mStringItem.setText(\"\
    Value = \" + mGauge.getValue());\n  }\n\n  public void commandAction(Command c,\
    \ Displayable s) {\n    if (c.getCommandType() == Command.EXIT)\n      notifyDestroyed();\n\
    \  }\n\n  public void startApp() {\n    Form form = new Form(\"GaugeTracker\"\
    );\n    form.addCommand(new Command(\"Exit\", Command.EXIT, 0));\n    form.setCommandListener(this);\n\
    \    // Now add the selected items.\n    form.append(mGauge);\n    form.append(mStringItem);\n\
    \    form.setItemStateListener(this);\n\n    Display.getDisplay(this).setCurrent(form);\n\
    \  }\n\n  public void pauseApp() {}\n\n  public void destroyApp(boolean unconditional)\
    \ {}\n}\n```\n\n## Summary\n\nThis chapter described MIDP's advanced user-interface\
    \ screens, `List` and `Form`. A `List` is a list of elements that allows for single\
    \ or multiple selections. You supply the items—it's up to the implementation to\
    \ figure out how to show them, how the user navigates through them, and how the\
    \ user selects items. `Forms` are generalized screens that are built up from a\
    \ collection of `Items`. The MIDP API supplies a handy toolbox of `Items`—everything\
    \ from simple string and image `Items` to the more complex `DateField` and `ChoiceGroup`\
    \ classes.\n\nEven though `List` and `Form` are very capable, you should use them\
    \ sparingly, particularly `Form`. Small devices have small screens, so you don't\
    \ want to put much information in each screen, especially if it's going to force\
    \ the user to scroll up and down a lot. Furthermore, ease of use is crucial on\
    \ consumer devices like mobile phones and pagers. Make sure your interface is\
    \ clean, intuitive, and as simple as it can possibly be.\n\n# Chapter 7: Custom\
    \ Items\n\nIn the last chapter, you learned about `Forms`, the most flexible and\
    \ powerful descendents of `javax.microedition.lcdui.Screen`. `Forms` are essentially\
    \ collections of `Items`. The MIDP APIs include a complete toolbox of `Item` subclasses,\
    \ everything from text and image display to interactive date fields and gauges.\n\
    \nMIDP 2.0 provides even more power, through the opportunity to define your own\
    \ items. In this chapter, you'll learn how to create items that do their own drawing\
    \ and respond to user input.\n\n## Introducing CustomItem\n\nThe class that makes\
    \ custom items possible is appropriately named `CustomItem`. Like all items that\
    \ live in a `Form`, it is a subclass of `Item`. To create your very own item,\
    \ all you have to do is define a subclass of `CustomItem` by implementing five\
    \ abstract methods. The first four, listed below, have to do with the size of\
    \ the item's *content area,* which is the area for which your code has responsibility.\
    \ The total area of the custom item includes a label and perhaps borders, but\
    \ these are the responsibility of the implementation. Your `CustomItem` subclass\
    \ is only responsible for the content area.\n\n```\nprotected int getPrefContentWidth(int\
    \ height)\nprotected int getPrefContentHeight(int width)\nprotected int getMinContentWidth()\n\
    protected int getMinContentHeight()\n```\n\nThe first two methods should return\
    \ values that define how big your item *wants* to be. When the MIDP implementation\
    \ lays out a `Form` containing your item, it may not be able to honor your preferred\
    \ size, but it will try. The implementation passes a proposed height and width\
    \ into these methods to give your item class an idea of what its dimensions might\
    \ eventually be. For example, the implementation might call your item's `getPrefContentWidth()`\
    \ method and pass a value of 18 for the height parameter. This is the implementation\
    \ asking your item, \"What width would you like to be if I make your height 18?\"\
    \n\nThe second pair of methods should return information about the minimum size\
    \ of the item. This is the smallest size that your item believes it can tolerate.\n\
    \nThe fifth method that must be defined by a concrete `CustomItem` subclass is\
    \ the `paint()` method, which the implementation calls to render the item.\n\n\
    ```\nprotected void paint(Graphics g, int w, int h)\n```\n\nThe `Graphics` object\
    \ can be used to draw lines, shapes, text, and images on the content area of the\
    \ item. The `Graphics` class is fully covered in [Chapter 10](#LiB0075_split_000.html#408);\
    \ for now, I'll just use a few simple methods to demonstrate how to draw custom\
    \ items. The `w` and `h` parameters indicate the current width and height of the\
    \ content area.\n\nArmed with this knowledge, you can create a simple `CustomItem`\
    \ by implementing the five abstract methods described above and providing a constructor.\
    \ [Listing 7-1](#LiB0047_split_001.html#ch07list01) shows one such class, `SimpleItem`.\
    \ This class returns hardcoded values for the minimum and preferred content dimensions\
    \ and provides a `paint()` method that draws a simple pattern of triangles.\n\n\
    **Listing 7-1: A Simple Custom Item**\n\n```\nimport javax.microedition.lcdui.*;\n\
    \npublic class SimpleItem\n    extends CustomItem {\n  public SimpleItem(String\
    \ title) { super(title); }\n\n// CustomItem abstract methods.\n\npublic int getMinContentWidth()\
    \ { return 100; }\n  public int getMinContentHeight() { return 60; }\n\npublic\
    \ int getPrefContentWidth(int width) {\n    return getMinContentWidth();\n  }\n\
    \npublic int getPrefContentHeight(int height) {\n    return getMinContentHeight();\n\
    \  }\n\npublic void paint(Graphics g, int w, int h) {\n    g.drawRect(0, 0, w\
    \ - 1, h - 1);\n    g.setColor(0x000000ff);\n    int offset = 0;\n    for (int\
    \ y = 4; y < h; y += 12) {\n      offset = (offset + 12) % 24;\n      for (int\
    \ x = 4; x < w; x += 24) {\n        g.fillTriangle(x + offset, y,\n          \
    \             x + offset - 3, y + 6,\n                       x + offset + 3, y\
    \ + 6);\n      }\n    }\n  }\n}\n```\n\nI won't make you write your own MIDlet\
    \ to see your new item. [Listing 7-2](#LiB0047_split_001.html#ch07list02) shows\
    \ a MIDlet that uses `SimpleItem`:\n\n**Listing 7-2: A MIDlet That Demonstrates\
    \ *SimpleItem***\n\n```\nimport javax.microedition.midlet.*;\nimport javax.microedition.lcdui.*;\n\
    \npublic class SimpleItemMIDlet\n    extends MIDlet\n    implements CommandListener\
    \ {\n  public void startApp() {\n    Form form = new Form(\"SimpleItemMIDlet\"\
    );\n    form.append(new SimpleItem(\"SimpleItem\"));\n\nCommand c = new Command(\"\
    Exit\", Command.EXIT, 0);\n    form.addCommand(c);\n    form.setCommandListener(this);\n\
    \nDisplay.getDisplay(this).setCurrent(form);\n  }\n\npublic void pauseApp() {}\n\
    \npublic void destroyApp(boolean unconditional) {}\n\npublic void commandAction(Command\
    \ c, Displayable s) {\n    if (c.getCommandType() == Command.EXIT)\n      notifyDestroyed();\n\
    \  }\n}\n```\n\n[Figure 7-1](#LiB0047_split_001.html#ch07fig01) shows this MIDlet\
    \ in action.\n\n![](fig126_01.jpg)\n**Figure 7-1: A simple custom item**"
