  trans: "\n## 概述\n\n游戏 API 建立在你在第 10 章中了解到的 Canvas 和 Graphics 类之上。整个 API 由 javax.microedition.lcdui.game\
    \ 包中的五个类组成。其中一个类 GameCanvas 提供了动画和按键轮询的方法。其他四个类处理*图层*，可用于从多个不同元素组合场景。\n\nGameCanvas\
    \ 相比 Canvas 有两个主要优势。首先，你的应用程序可以精确控制*何时*更新显示，而不必等待系统软件调用 paint()。其次，你可以控制屏幕的哪个区域被更新。GameCanvas\
    \ 让你的应用程序对显示更新拥有非常具体的控制权。\n\n## 使用 GameCanvas 驱动动画\n\nGameCanvas 扩展了 javax.microedition.lcdui.Canvas，增加了动画和按键状态轮询的方法。GameCanvas\
    \ 的使用方式与 Canvas 不同：\n\n*   使用 Canvas 时，你需要创建其子类并定义 paint()方法。在 paint()内部，你使用 Graphics\
    \ 在屏幕上渲染图形。当你更改某些内容并希望更新屏幕时，调用 repaint()，系统会再次为你调用 paint()。\n\n*   使用 GameCanvas\
    \ 时，你需要创建其子类。要在屏幕上绘制，请使用 getGraphics()返回的 Graphics 对象。当你希望更新显示在屏幕上时，调用 flushGraphics()，该方法直到屏幕更新后才返回。对于更具体的更新，请使用\
    \ flushGraphics(int x, int y, int width, int height)方法，该方法仅更新屏幕的某个区域。\n\n    ```\n\
    \    public void flushGraphics(int x, int y, int width, int height)\n    ```\n\
    \nGameCanvas 的使用模型使其易于在游戏循环中使用，如下所示：\n\n```\nGraphics g = getGraphics();\nwhile(true)\
    \ {\n  // 检查用户输入。\n  // 更新游戏状态。\n  // 使用 g 绘制内容。\n  flushGraphics();\n}\n```\n\
    \n要创建 GameCanvas 的子类，你需要从其子类的构造函数中调用其受保护的构造函数。该构造函数接受一个布尔参数，指示是否应为该 GameCanvas\
    \ 实例抑制正常的按键事件机制。正常的按键事件机制指的是 keyPressed()、keyReleased()和 keyRepeated()的回调机制。抑制正常机制可能会带来更好的性能。GameCanvas\
    \ 提供了一种响应按键事件的替代方法，详见下一节。\n\n为了展示 GameCanvas 如何用于绘制，我将使用 GameCanvas 重写第 10 章中的\
    \ SweepCanvas 示例。请注意，子类不再重写 paint()。所有操作都在 run()方法中执行，该方法在一个单独的线程中运行以驱动动画。run()方法调用\
    \ render()，后者执行实际的绘制（与旧的 paint()相同）。\n\n清单 11-1：使用*GameCanvas*实现动画\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\nimport javax.microedition.lcdui.*;\nimport javax.microedition.lcdui.game.*;\n\
    \npublic class SweepGameCanvas\n    extends GameCanvas\n    implements Runnable\
    \ {\nprivate boolean mTrucking;\nprivate int mTheta;\nprivate int mBorder;\nprivate\
    \ int mDelay;\n  public SweepGameCanvas() {\n    super(true);\n    mTheta = 0;\n\
    \    mBorder = 10;\n    mDelay = 50;\n  }\n\n  public void start() {\n    mTrucking\
    \ = true;\n    Thread t = new Thread(this);\n    t.start();\n  }\n\n  public void\
    \ stop() {\n    mTrucking = false;\n  }\n\n  public void render(Graphics g) {\n\
    \    int width = getWidth();\n    int height = getHeight();\n\n    // 清除画布。\n\
    \    g.setGrayScale(255);\n    g.fillRect(0, 0, width - 1, height - 1);\n\n  \
    \  int x = mBorder;\n    int y = mBorder;\n    int w = width - mBorder * 2;\n\
    \    int h = height - mBorder * 2;\n    for (int i = 0; i < 8; i++) {\n      g.setGrayScale((8\
    \ - i) * 32 - 16);\n      g.fillArc(x, y, w, h, mTheta + i * 10, 10);\n      g.fillArc(x,\
    \ y, w, h, (mTheta + 180) % 360 + i * 10, 10);\n    }\n  }\n\n  public void run()\
    \ {\n    Graphics g = getGraphics();\n    while (mTrucking) {\n      mTheta =\
    \ (mTheta + 1) % 360;\n      render(g);\n      flushGraphics();\n      try { Thread.sleep(mDelay);\
    \ }\n      catch (InterruptedException ie) {}\n    }\n  }\n} \n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n我假设你可以自己编写一个 MIDlet 来显示 SweepGameCanvas。如果你已经下载了在线示例，SweepGame\
    \ 就是一个显示 SweepGameCanvas 的 MIDlet。\n\n## 轮询按键状态\n\nGameCanvas 提供了一种响应按键按下的替代方法，这被认为是用户控制游戏的方式。GameCanvas\
    \ 没有被动等待 Canvas 中定义的按键事件回调，而是提供了一个返回按键当前状态的方法：\n\n```\npublic int getKeyStates()\n\
    ```\n\n这对游戏很有吸引力，因为它让你的应用程序拥有更多控制权。你可以立即获知设备按键的状态，而无需等待系统调用 Canvas 中的按键回调方法。\n\
    \n返回的整数使用一个位来表示九个游戏动作中的每一个。1 位表示按键按下，0 位表示未按下。每个位都由 GameCanvas 类中的一个常量表示，如表 11-1\
    \ 所示。\n\n表 11-1：*GameCanvas*中的游戏动作位常量\n\n| **GAMECANVAS 位常量** | **对应的 CANVAS 游戏动作常量**\
    \ |\n| --- | --- |\n| UP_PRESSED | UP |\n| DOWN_PRESSED | DOWN |\n| LEFT_PRESSED\
    \ | LEFT |\n| RIGHT_PRESSED | RIGHT |\n| FIRE_PRESSED | FIRE |\n| GAME_A_PRESSED\
    \ | GAME_A |\n| GAME_B_PRESSED | GAME_B |\n| GAME_C_PRESSED | GAME_C |\n| GAME_D_PRESSED\
    \ | GAME_D |\n\n通过获取按键的当前状态（一种称为*轮询*的技术），你可以在游戏循环中响应用户操作，而不是依赖在不同线程中运行的事件回调方法。你可以像下面这样扩展上面给出的\
    \ GameCanvas 循环示例来响应按键按下：\n\n```\nGraphics g = getGraphics();\nwhile(true) {\n\
    \  // 检查用户输入。\n  int ks = getKeyStates();\n  if ((ks & UP_PRESSED) != 0)\n   \
    \ moveUp();\n  else if ((ks & DOWN_PRESSED) != 0)\n    moveDown();\n  // ...\n\
    \n  // 更新游戏状态。\n  // 使用 g 绘制内容。\n  flushGraphics();\n}\n```\n\n如果你还在关注，你可能想知道当用户在应用程序调用\
    \ getKeyStates()之间按下并释放一个键时会发生什么。按键状态是*锁存的*，这意味着一次按键按下会设置相应的位并使其保持，直到下一次调用 getKeyStates()。每次你调用\
    \ getKeyStates()时，所有锁存的值都会被清除。\n"
- fmt: "# Understanding Layers\n\nThe rest of the Game API is devoted to *layers*.\
    \ Layers are graphic elements that can be combined to create a complete scene.\
    \ You might, for example, have a background of mountains, another background of\
    \ city buildings, and several smaller items in the foreground: people, spaceships,\
    \ cars, whatever.\n\nThe technique of combining layers resembles traditional hand-drawn\
    \ animations. Background and foreground images are drawn on transparent cels,\
    \ which are placed one on top of another and photographed to create the final\
    \ scene.\n\nIn the Game API, an instance of the `javax.microedition.lcdui.game.Layer`\
    \ class represents a layer. `Layer` is abstract, with two concrete subclasses.\
    \ `Layer` itself is pretty straightforward. It has a location, a size, and can\
    \ be visible or invisible. The location and size are accessed and modified with\
    \ the following methods, which are self-explanatory:\n\n```\npublic final int\
    \ getX()\npublic final int getY()\npublic final int getWidth()\npublic final int\
    \ getHeight()\npublic void setPosition(int x, int y) \n```\n\n`Layer` also offers\
    \ a handy method for moving relative to the current position. Pass pixel offsets\
    \ to the following method to adjust the position of the layer:\n\n```\npublic\
    \ void move(int dx, int dy)\n```\n\nThe layer's visibility is accessed using `getVisible()`\
    \ and `setVisible()`.\n\nThe last method in `Layer` is `paint()`, which is declared\
    \ abstract. Subclasses override this method to define their appearance.\n\n# Managing\
    \ Layers\n\nBefore I tell you about `Layer`'s concrete children, I'll explain\
    \ how layers are put together to form a complete scene. You could do it yourself,\
    \ maintaining a list of layers and drawing each of them using their `paint()`\
    \ methods. Fortunately, the Game API includes `LayerManager`, a class that handles\
    \ most of the details for you. To create a `LayerManager`, just call its no-argument\
    \ constructor.\n\nMost of `LayerManager`'s job is keeping an ordered list of layers.\
    \ Layers have an index, which indicates their position front to back. A position\
    \ of 0 is on top, closest to the user, while larger indices are farther away,\
    \ towards the bottom. (The order of layers is sometimes called the *z order*.)\n\
    \nLayers may be added to the bottom of the list using this method:\n\n```\npublic\
    \ void append(Layer l)\n```\n\nYou can add a layer at a specific location using\
    \ `insert()`:\n\n```\npublic void insert(Layer l, int index)\n```\n\nFor example,\
    \ you could add a layer to the top of the list by inserting a layer at index 0.\n\
    \nYou can find the number of layers in the `LayerManager` by calling `getSize()`.\
    \ If you'd like to retrieve the layer at a certain position, pass the index to\
    \ the `getLayerAt()` method.\n\nFinally, you can remove a layer by passing the\
    \ `Layer` object to the `remove()` method.\n\n`LayerManager` includes the concept\
    \ of a *view window*, which is the rectangular portion of the scene that will\
    \ be drawn. The assumption is that the overall scene is larger than the screen\
    \ of the device, so only a portion will be drawn at any time. By default, the\
    \ view window has its origin at 0, 0 and is as large as it can be (`Integer.MAX_VALUE`\
    \ for both width and height). You can set the view window using the following\
    \ method, where the `x` and `y` coordinates are relative to the origin of the\
    \ `LayerManager`.\n\n```\npublic void setViewWindow(int x, int y, int width, int\
    \ height)\n```\n\nTo actually draw the scene represented by the `LayerManager`'s\
    \ layers, call the `paint()` method:\n\n```\npublic void paint(Graphics g, int\
    \ x, int y)\n```\n\nThe view window of the scene will be drawn using the given\
    \ `Graphics` at the specified location, which is specified in the coordinate system\
    \ of the `Graphics`.\n\nIf you're still fuzzy on the relationship between a layer\
    \ manager, its layers, and its view window, see the API documentation for `LayerManager`,\
    \ which contains two very helpful figures.\n\n# Using Tiled Layers\n\nA tiled\
    \ layer is made from a palette of tiles, just as you might assemble decorative\
    \ tiles to create a pretty design next to your bathtub. The tiles come from a\
    \ single image that is divided into equal-sized pieces.\n\nA `TiledLayer` is drawn\
    \ on a `Graphics` object using the `paint()` method inherited from `Layer`. Like\
    \ any other `Layer`, a tiled layer renders itself at its current location in the\
    \ coordinate system of the `Graphics`. Furthermore, like any other `Layer`, a\
    \ tiled layer can be part of a `LayerManager` and can be rendered automatically\
    \ when the `LayerManager` is rendered using *its* `paint()` method.\n\nFor example,\
    \ [Figure 11-1](#LiB0090.html#ch11fig01) is 240 pixels wide and 96 pixels high.\n\
    \n[![Click To expand](fig219_01.jpg)](fig219_01_0.jpg)\nFigure 11-1: A source\
    \ image for a tiled layer\n\nThe image can be divided into 10 square tiles, each\
    \ with a width and height of 48 pixels. Tiles are numbered as shown in [Figure\
    \ 11-2](#LiB0090.html#ch11fig02).\n\n![](fig220_01.jpg)\nFigure 11-2: Tile numbering\n\
    \nThe image could have been laid out several different ways to achieve the same\
    \ result. Two of the other possibilities are shown in [Figure 11-3](#LiB0090.html#ch11fig03).\n\
    \n![](fig220_02.jpg)\nFigure 11-3: Other tile image layouts\n\nNote that tile\
    \ indices are numbered starting at one, while row and column numbers start at\
    \ zero.\n\nThe tiled layer itself is a grid of *cells*, where each cell is occupied\
    \ by one tile. You specify the number of rows and columns in the tiled layer at\
    \ construction. The exact size of a tiled layer is as follows:\n\n```\nwidth =\
    \ [number of columns] x [tile width]\nheight = [number of rows] x [tile height]\
    \ \n```"
