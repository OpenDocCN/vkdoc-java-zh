    \ displays, you'll have to create a subclass of Canvas. Your MIDlet will assume\
    \ responsibility for most of the drawing, but you get much finer control over\
    \ what is shown and how user input is handled. Canvas supplies methods that allow\
    \ your MIDlet to learn about its environment—the size of the display, for example,\
    \ and which kinds of events are supported by the device. User interfaces built\
    \ on Canvas discover the attributes of a device and attempt to create something\
    \ that looks reasonable. [Chapter 10](#LiB0075_split_000.html#408) explains Canvas-based\
    \ user interfaces in detail.\n\nGameCanvas, new in MIDP 2.0, provides user interface\
    \ functionality specifically for game displays. [Chapter 11](#LiB0085_split_000.html#471)\
    \ explains this new API.\n\n## Using Display\n\nDisplay manages a device's screen.\
    \ You can get a reference to the device's display by supplying a MIDlet reference\
    \ to the static getDisplay() method. Typically, you'll do this in the startApp()\
    \ method of a MIDlet:\n\n```\npublic void startApp() {\n  Display d = Display.getDisplay(this);\n\
    \  // ...\n}\n```\n\nYou may be tempted to call getDisplay() in a MIDlet's constructor,\
    \ but according to the specification, getDisplay() can only be called after the\
    \ beginning of the MIDlet's startApp() method.\n\nOnce you've got a reference\
    \ to a device's Display, you'll just need to create something to show (an instance\
    \ of Displayable) and pass it to one of Display's setCurrent() methods:\n\n```\n\
    public void setCurrent(Displayable next)\npublic void setCurrent(Alert alert,\
    \ Displayable nextDisplayable)\n```\n\nThe second version is used when you want\
    \ to show a temporary message (an Alert) followed by something else. I'll talk\
    \ more about Alerts at the end of this chapter.\n\nDisplay's getCurrent() method\
    \ returns a reference to what's currently being shown. Note that a MIDlet may\
    \ return a valid object from getCurrent() even if it is not visible to the user.\
    \ This could happen on a device running multiple MIDlets simultaneously, for example.\
    \ Note that the Displayable interface has a method called isShown() that indicates\
    \ whether the given object is actually being shown on the device screen.\n\nYou\
    \ can also query a Display to determine its capabilities, which is helpful for\
    \ applications that need to adapt themselves to different types of displays. The\
    \ numColors() method returns the number of distinct colors supported by this device,\
    \ while the isColor() method tells whether the device supports color or grayscale.\
    \ A Display for a device supporting 16 levels of gray, for example, would return\
    \ false from isColor() and 16 from numColors(). In MIDP 2.0, you can also find\
    \ out whether the device supports transparency by calling numAlphaLevels(), which\
    \ returns the number of transparency levels. The minimum return value is two,\
    \ indicating that image pixels with full transparency and full opacity are supported.\
    \ Return values greater than two indicate that alpha blending is supported. In\
    \ MIDP 2.0, Display contains two additional pairs of methods. The first methods,\
    \ getColor() and getBorderStyle(), are used for finding out colors and line styles\
    \ from the system user interface scheme. These methods are useful for drawing\
    \ custom items, a topic that is covered in [Chapter 7](#LiB0047_split_000.html#275).\
    \ The other method pair, flashBacklight() and vibrate(), invoke the corresponding\
    \ features of the device. These are more fully discussed in [Chapter 11](#LiB0085_split_000.html#471).\n\
    \n## Event Handling with Commands\n\nDisplayable, the parent of all screen displays,\
    \ supports a very flexible user interface concept, the command. A *command* is\
    \ something the user can invoke—you can think of it as a button. Like a button,\
    \ it has a title, like \"OK\" or \"Cancel,\" and your application can respond\
    \ appropriately when the user invokes the command. The premise is that you want\
    \ a command to be available to the user, but you don't really care how it is shown\
    \ on the screen or exactly how the user invokes it—keypad button, soft button,\
    \ touch screen, whatever.\n\nEvery Displayable keeps a list of its Commands. You\
    \ can add and remove Commands using the following methods:\n\n```\npublic void\
    \ addCommand(Command cmd)\npublic void removeCommand(Command cmd)\n```"
  trans: "\n## 顶层视角\n\nMIDP 在 `javax.microedition.lcdui` 和 `javax.microedition.lcdui.game`\
    \ 包中包含了用户界面类。设备的显示屏由 `Display` 类的实例表示，可通过工厂方法 `getDisplay()` 获取。`Display` 的主要职责是跟踪当前显示的内容，即\
    \ `Displayable` 的实例。如果将 `Display` 比作画架，那么 `Displayable` 实例就相当于画架上的画布。\n\nMIDlet\
    \ 可以通过将 `Displayable` 实例传递给 `Display` 的 `setCurrent()` 方法来更改显示内容。这是典型 MIDlet 的基本功能：\n\
    \n1.  显示一个 `Displayable`。\n2.  等待输入。\n3.  决定下一个要显示的 `Displayable`。\n4.  重复。\n\n\
    `Displayable` 有一系列子类，代表不同类型的用户界面。图 5-1 展示了其继承关系。\n\n![点击展开](img/fig80_01_0.jpg)\n\
    图 5-1：*javax.microedition.lcdui* 和 *javax.microedition.lcdui.game* 包中的 Displayable\n\
    \n`Displayable` 的后代分为两个分支，分别对应创建通用用户界面的两种方法：抽象与发现。`Screen` 类代表以抽象术语定义的显示界面。\n\n\
    这些屏幕包含标准的用户界面元素，如组合框、列表、菜单和按钮。四个子类提供了广泛的功能，如图 5-2 所示。\n\n![点击展开](img/fig81_01_0.jpg)\n\
    图 5-2：*Screen* 的四个子类——(a) *TextBox*、(b) *Alert*、(c) *List* 和 (d) *Form*\n\n本章剩余部分将重点解释这四个类中最简单的两个：`TextBox`\
    \ 和 `Alert`。下一章 将探讨更灵活的 `List` 和 `Form`。\n\n对于特别苛刻或特殊的显示需求，你需要创建 `Canvas` 的子类。你的\
    \ MIDlet 将承担大部分绘制工作，但你能更精细地控制显示内容以及用户输入的处理方式。`Canvas` 提供了方法，使你的 MIDlet 能够了解其运行环境——例如显示屏的尺寸，以及设备支持哪些类型的事件。基于\
    \ `Canvas` 构建的用户界面会探测设备属性，并尝试创建看起来合理的界面。第 10 章 将详细解释基于 `Canvas` 的用户界面。\n\n`GameCanvas`\
    \ 是 MIDP 2.0 中的新特性，专门为游戏显示提供用户界面功能。第 11 章 将解释这个新的 API。\n\n## 使用 Display\n\n`Display`\
    \ 管理设备的屏幕。你可以通过向静态方法 `getDisplay()` 提供一个 MIDlet 引用来获取设备显示屏的引用。通常，你会在 MIDlet 的\
    \ `startApp()` 方法中执行此操作：\n\n```\npublic void startApp() {\n  Display d = Display.getDisplay(this);\n\
    \  // ...\n}\n```\n\n你可能会想在 MIDlet 的构造函数中调用 `getDisplay()`，但根据规范，`getDisplay()`\
    \ 只能在 MIDlet 的 `startApp()` 方法开始之后调用。\n\n一旦获得了设备 `Display` 的引用，你只需要创建要显示的内容（`Displayable`\
    \ 的实例），并将其传递给 `Display` 的某个 `setCurrent()` 方法：\n\n```\npublic void setCurrent(Displayable\
    \ next)\npublic void setCurrent(Alert alert, Displayable nextDisplayable)\n```\n\
    \n当你想要先显示一条临时消息（`Alert`），然后再显示其他内容时，会使用第二个版本。我将在本章末尾详细讨论 `Alert`。\n\n`Display`\
    \ 的 `getCurrent()` 方法返回当前显示内容的引用。请注意，即使 MIDlet 对用户不可见，`getCurrent()` 也可能返回一个有效对象。例如，在同时运行多个\
    \ MIDlet 的设备上就可能发生这种情况。另外请注意，`Displayable` 接口有一个名为 `isShown()` 的方法，用于指示给定对象是否实际显示在设备屏幕上。\n\
    \n你还可以查询 `Display` 以确定其能力，这对于需要适应不同类型显示器的应用程序很有帮助。`numColors()` 方法返回此设备支持的不同颜色的数量，而\
    \ `isColor()` 方法则告知设备是支持彩色还是灰度。例如，支持 16 级灰度的设备的 `Display`，其 `isColor()` 会返回 false，而\
    \ `numColors()` 会返回 16。在 MIDP 2.0 中，你还可以通过调用 `numAlphaLevels()` 来了解设备是否支持透明度，该方法返回透明度级别数。最小返回值为\
    \ 2，表示支持完全透明和完全不透明的图像像素。返回值大于 2 表示支持 Alpha 混合。在 MIDP 2.0 中，`Display` 还包含另外两对方法。第一对方法\
    \ `getColor()` 和 `getBorderStyle()` 用于从系统用户界面方案中获取颜色和线条样式。这些方法对于绘制自定义项目很有用，该主题将在第\
    \ 7 章中介绍。另一对方法 `flashBacklight()` 和 `vibrate()` 用于调用设备的相应功能。这些将在第 11 章中更详细地讨论。\n\
    \n## 使用命令进行事件处理\n\n`Displayable` 是所有屏幕显示的父类，它支持一个非常灵活的用户界面概念——命令。*命令*是用户可以调用的东西——你可以将其视为一个按钮。像按钮一样，它有一个标题，例如“确定”或“取消”，并且当用户调用该命令时，你的应用程序可以做出适当的响应。其前提是，你希望某个命令对用户可用，但你不关心它在屏幕上如何显示，也不关心用户具体如何调用它——键盘按钮、软按钮、触摸屏等等。\n\
    \n每个 `Displayable` 都维护一个其 `Command` 的列表。你可以使用以下方法添加和删除 `Command`：\n\n```\npublic\
    \ void addCommand(Command cmd)\npublic void removeCommand(Command cmd)\n```\n"
- fmt: "### Creating Commands\n\nIn MIDP, commands are represented by instances of\
    \ the `Command` class. To create a `Command`, just supply a name, a type, and\
    \ a priority. The name is usually shown on the screen. The type can be used to\
    \ signify a commonly used command. It should be one of the values defined in the\
    \ `Command` class. [Table 5-1](#LiB0039.html#ch05table01) shows the type values\
    \ and their meanings.\n\n**Table 5-1: Command Types**\n\n| **NAME** | **MEANING**\
    \ |\n| --- | --- |\n| `OK` | Confirms a selection. |\n| `CANCEL` | Cancels pending\
    \ changes. |\n| `BACK` | Moves the user back to a previous screen. |\n| `STOP`\
    \ | Stops a running operation. |\n| `HELP` | Shows application instructions. |\n\
    | `SCREEN` | Generic type for specific application commands. |\n\nTo create a\
    \ standard `OK` command, for example, you would do this:\n\n```\nCommand c = new\
    \ Command(\"OK\", Command.OK, 0);\n```\n\nTo create a command specific to your\
    \ application, you might do this:\n\n```\nCommand c = new Command(\"Launch\",\
    \ Command.SCREEN, 0);\n```\n\nIt's up to the MIDP implementation to figure out\
    \ how to show the commands. In the Sun J2ME Wireless Toolkit emulator, commands\
    \ are assigned to the two soft buttons. A *soft button* is a button on the device\
    \ keypad with no predefined function. A soft button can serve a different purpose\
    \ at different times. If there are more commands than there are soft buttons,\
    \ the commands that don't fit will be grouped into a menu that is assigned to\
    \ one of the soft buttons.\n\nA simple priority scheme determines who wins when\
    \ there are more commands than available screen space. Every command has a priority\
    \ that indicates how hard the display system should try to show the command. Lower\
    \ numbers indicate a higher priority. If you add a command with priority 0, then\
    \ several more with priority 1, the priority 0 command will show up on the screen\
    \ directly. The other commands will most likely end up in a secondary menu.\n\n\
    MIDP 2.0 adds support for long labels on commands. The MIDP implementation decides\
    \ which label it will use based on the available screen space and the size of\
    \ the labels. You can create a command with a short and long label like this:\n\
    \n```\nCommand c = new Command(\"Run\", \"Run simulation\", Command.SCREEN, 0);\n\
    ```\n\nThe `Command` class provides `getLabel()`, `getLongLabel()`, and `getCommandType()`\
    \ methods for retrieving information about commands.\n\n### Responding to Commands\n\
    \nBy themselves, Commands aren't very exciting. They'll show up on the screen,\
    \ but nothing happens automatically when a user invokes a command. An object called\
    \ a *listener* is notified when the user invokes any command in a `Displayable`.\
    \ This follows the basic form of the JavaBeans event model; a `Displayable` is\
    \ a *unicast event source*. A `Displayable` fires off an event every time the\
    \ user invokes one of its Commands.\n\nThe listener is an object that implements\
    \ the `CommandListener` interface. To register the listener with a `Displayable`,\
    \ use the following method:\n\n```\npublic void setListener(CommandListener l)\
    \ \n```\n\n`Displayable` is a unicast event source because it can only have one\
    \ listener object. (*Multicast* event sources can have multiple listeners and\
    \ use an `add…` method for adding listeners rather than a `set…` method.)\n\n\
    Implementing a `CommandListener` is a matter of defining a single method:\n\n\
    ```\npublic void commandAction(Command c, Displayable s)\n```\n\nWhen a command\
    \ is invoked, the `Displayable` that contains it calls the `commandAction()` method\
    \ of the registered listener.\n\n|  | Tip | Event listeners should not perform\
    \ lengthy processing inside the event-handling thread. The system uses its own\
    \ thread to call `commandAction()` in response to user input. If your implementation\
    \ of `commandAction()` does any heavy thinking, it will tie up the system's event-handling\
    \ thread. If you have anything complicated to do, use your own thread. |\n\n###\
    \ A Simple Example\n\nBy way of illustration, consider the following class:\n\n\
    ```\nimport javax.microedition.midlet.*;\nimport javax.microedition.lcdui.*;\n\
    \npublic class Commander extends MIDlet {\n  public void startApp() {\n    Displayable\
    \ d = new TextBox(\"TextBox\", \"Commander\", 20, TextField.ANY);\n    Command\
    \ c = new Command(\"Exit\", Command.EXIT, 0);\n    d.addCommand(c);\n    d.setCommandListener(new\
    \ CommandListener() {\n      public void commandAction(Command c, Displayable\
    \ s) {\n        notifyDestroyed();\n      }\n    });\n\n    Display.getDisplay(this).setCurrent(d);\n\
    \  }\n\n  public void pauseApp() { }\n\n  public void destroyApp(boolean unconditional)\
    \ { }\n} \n```\n\nThis MIDlet creates a `TextBox`, which is a kind of `Displayable`,\
    \ and adds a single command to it. The listener is created as an anonymous inner\
    \ subclass. In Sun's toolkit, this MIDlet appears as shown in [Figure 5-3](#LiB0039.html#ch05fig03).\n\
    \n[![Click To expand](fig86_01.jpg)](fig86_01_0.jpg)\n**Figure 5-3: A simple MIDlet\
    \ with a single command, *Exit***\n\n[Figure 5-3](#LiB0039.html#ch05fig03) shows\
    \ the `Exit` command being mapped to one of the MIDP simulator's soft buttons.\
    \ If you add another command to this MIDlet, it will be mapped to the other soft\
    \ button. If you continue adding commands, the ones that don't fit on the screen\
    \ will be put into an off-screen menu. For example, a screen with four commands\
    \ shows up in the MIDP simulator as illustrated in [Figure 5-4](#LiB0039.html#ch05fig04)a.\n\
    \n[![Click To expand](fig87_01.jpg)](fig87_01_0.jpg)\n**Figure 5-4: This MIDlet\
    \ has more commands than the device has soft buttons. Invoking the (a) system-generated\
    \ *Menu* command brings up the (b) remaining commands.**\n\nIf you press the soft\
    \ button for `Menu`, you'll see the remainder of the commands as shown in [Figure\
    \ 5-4](#LiB0039.html#ch05fig04)b. Menu items can now be selected by pressing a\
    \ number or using the arrow keys for navigation. In the example shown in [Figure\
    \ 5-4](#LiB0039.html#ch05fig04), the `Exit` command is given a higher priority\
    \ (lower number) than the other commands, which insures that it appears directly\
    \ on the screen. The other commands, with a lower priority, are relegated to the\
    \ command menu.\n\n## Screens and Tickers\n\nThe remainder of this chapter and\
    \ all of [Chapter 6](#LiB0044_split_000.html#209) are devoted to `Screen` and\
    \ its subclasses, which is the left branch of the hierarchy shown in [Figure 5-1](#LiB0037.html#179).\
    \ `Screen` is the base class for all classes that represent generalized user interfaces.\n\
    \n`Canvas`, by contrast, is a base class for specialized interfaces, such as those\
    \ for games. `Canvas` will be fully covered later, in [Chapter 10](#LiB0075_split_000.html#408).\n\
    \nIn the coming sections, we'll explore each of `Screen`'s child classes. Here,\
    \ I'll briefly describe what all Screens have in common: a title and a ticker.\
    \ The *title* is just what you expect: a string that appears at the top of the\
    \ screen. A *ticker* is simply a bit of text that scrolls across the top of a\
    \ `Screen`; it is named after old-fashioned stock tickers.\n\nIn MIDP 2.0, the\
    \ four methods I'm about to describe are moved from `Screen` to `Displayable`.\
    \ Thus, MIDP 2.0 extends the concept of title and ticker to all `Displayable`s,\
    \ not just `Screen`s. In MIDP 2.0, the `Screen` class has no methods.\n\nThe title\
    \ is a text string displayed at the top of the screen. As you saw in [Figure 5-3](#LiB0039.html#193),\
    \ the title of the screen is \"TextBox.\" Subclasses of `Screen` have constructors\
    \ that set the title, but the title may also be accessed using the following methods:\n\
    \n```\npublic void setTitle(String newTitle)\npublic String getTitle()\n```\n\n\
    The ticker is just as easy to access:\n\n```\npublic void setTicker(Ticker newTicker)\n\
    public Ticker getTicker() \n```\n\nThe `Ticker` class is a simple wrapper for\
    \ a string. To add a ticker to a screen, you would do something like this:\n\n\
    ```\n// Displayable d = ...\nTicker ticker = new Ticker(\"This is the ticker message!\"\
    );\nd.setTicker(ticker);\n```\n\n[Figure 5-5](#LiB0040.html#ch05fig05) shows a\
    \ ticker in action.\n\n![](fig88_01.jpg)\n**Figure 5-5: A ticker scrolls across\
    \ the top of a screen.**"
