    \n### 建议的改进\n\n只需进行一些相对较小的改进，就能使这个示例成为一个严肃的应用程序。首先要处理的是密钥管理。`StealthMIDlet` 应从\
    \ MIDlet 套件 JAR 中的资源文件加载密钥，而不是使用硬编码的值。这可以通过 `Class` 中的 `getResourceAsStream()`\
    \ 方法实现。密钥很可能在部署时被放置在那里，这意味着 MIDlet 需要谨慎部署，最好使用 HTTPS。\n\n同样地，`StealthServlet`\
    \ 应从数据库或某种文件存储库中定位并加载密钥。像基于用户名的标准命名方案这样简单的方法可能就足够了。\n\n密钥本身应该比这里硬编码的示例更长——具体长度由你决定。早在\
    \ 1996 年，美国政府就对允许出口 40 位 RC4 技术相当乐观，因此你可以放心，40 位长度是远远不够的。当然，随着密钥长度的增加，你可能会开始遇到内存或性能问题，尤其是在像\
    \ MIDP 这样受限的环境中。请尝试在性能与安全性之间找到良好的平衡。\n\n此外，你可能需要考虑使用不同的算法，例如 Blowfish 或 Rijndael。Bouncy\
    \ Castle 加密包在 `org.bouncycastle.crypto.engines` 包中提供了大量选项。正如我所提到的，你可以使用 CFB 模式将分组密码当作流密码来使用。\n\
    \n最后，Servlet 与 MIDlet 之间的通信也可以改进。例如，如果 Servlet 有办法告诉 MIDlet 它找不到会话，那就太好了。MIDlet\
    \ 可能会发送一个针对服务器端已过期会话的 Cookie。在当前实现中，Servlet 会创建一组新的密码器，而这些密码器与 MIDlet 的密码器不同步。解决这个问题的一种方法是让\
    \ Servlet 向 MIDlet 传递一个响应代码。其中一个响应代码可能意味着：“我丢失了你的会话。请重新初始化你的密码器，然后重试。”\n\n###\
    \ 部署问题\n\n假设你完善了这个示例并将其集成到一个产品中。那么分发时会遇到哪些问题呢？对于软件的每一份副本，你都需要生成一对密钥。这些密钥作为资源文件存储在\
    \ MIDlet 套件 JAR 中，这意味着对于软件的每一份副本，你都需要生成一个唯一的 MIDlet 套件 JAR。同时，你需要在服务器端某处保存这些密钥。当客户端\
    \ MIDlet 建立连接时，你需要能够找到对应的密钥。这些操作都不特别困难，并且可以自动化完成。\n\nMIDlet 套件 JAR 包含应保密的密钥。因此，通过互联网将\
    \ JAR 传输给客户存在安全风险。你可以通过 HTTPS 将其传输到客户的浏览器，然后依靠客户通过串行电缆将其安装到移动电话或其他小型设备上。\n"
- fmt: "# Trimming Bouncy Castle Down to Size\n\nWith both of the examples in this\
    \ chapter, I'm only using a small subset of the Bouncy Castle cryptography package.\
    \ I use an obfuscator to trim out the pieces I don't need. A good obfuscator will\
    \ find the methods, instance variables, and even entire classes that are not used\
    \ in an application and simply remove them. This is important with third-party\
    \ libraries, where you may only be using a fraction of the available functionality.\
    \ Bouncy Castle includes all sorts of stuff that isn't used in `PasswordMIDlet`\
    \ and `StealthMIDlet`.\n\nThere is another reason an obfuscator is necessary when\
    \ using Bouncy Castle and some other third-party APIs. Bouncy Castle includes\
    \ implementations of classes in the core `java.*` namespace, like `java.math.BigInteger`.\
    \ MIDP implementations will fail to load classes from this namespace in an application.\
    \ An obfuscator can be used to rename these classes out of the forbidden namespace.\n\
    \nThe sample code from this chapter (available from the Downloads section of the\
    \ Apress web site [http://www.apress.com](http://www.apress.com)) contains an\
    \ Ant build file that invokes the ProGuard 1.4 obfuscator. ProGuard is an excellent\
    \ piece of software. It is written entirely in Java and may be used freely. For\
    \ more information, see [http://proguard.sourceforge.net/](http://proguard.sourceforge.net/).\n\
    \nThe Ant target that runs ProGuard looks something like this:\n\n```\n<target\
    \ name=\"obfuscate_proguard\" depends=\"compile, copylib\">\n  <mkdir dir=\"build/proguard\"\
    />\n  <jar basedir=\"build/classes\"\n      jarfile=\"build/proguard/$wj2-crypto-input.jar\"\
    />\n\n  <java fork=\"yes\" classname=\"proguard.ProGuard\"\n      classpath=\"\
    ${proguard}\">\n    <arg line=\"-libraryjars ${midp_lib}\"/>\n    <arg line=\"\
    -injars build/proguard/${project}-input.jar\"/>\n    <arg line=\"-outjar build/proguard/${project}-output.jar\"\
    />\n    <arg line=\"-keep\n        'public class * extends javax.microedition.midlet.MIDlet'\"\
    />\n    <arg line=\"-defaultpackage\"/>\n    <arg line=\"-dontusemixedcaseclassnames\"\
    />\n  </java>\n\n  <mkdir dir=\"build/obfuscated\"/>\n  <unjar src=\"build/proguard/${project}-output.jar\"\
    \n      dest=\"build/obfuscated\"/>\n</target>\n```\n\nProGuard expects its input\
    \ classes to be packaged in a JAR, so the first thing to do is create a JAR based\
    \ on the package name, `wj2-crypto-input.jar`. Note that this JAR includes the\
    \ Bouncy Castle classes.\n\nNext, ProGuard is run by forking a Java process. The\
    \ first argument, `-libraryjars`, tells ProGuard where to find the MIDP classes.\
    \ The next argument, `-injars`, points ProGuard to the JAR of input files. The\
    \ output file name is specified using `-outjar`. Next come three important options.\
    \ It's important that the MIDlet classes themselves retain their names so that\
    \ MIDlet management software on a device can load and run the classes. The `-keep`\
    \ argument makes this happen for all subclasses of `MIDlet`. The package renaming\
    \ (moving things out of `java.*`) is accomplished using the `-defaultpackage`\
    \ argument. Finally, `-dontusemixedcaseclassnames` works around asinine behavior\
    \ in Windows where obfuscated class files like `a.class` and `A.class` cannot\
    \ exist in the same directory.\n\nFor more information on ProGuard and its options,\
    \ consult the documentation, which is quite good. For another example of its use,\
    \ see [http://wireless.java.sun.com/midp/articles/security3/](http://wireless.java.sun.com/midp/articles/security3/).\n\
    \nThe results are impressive. Without the obfuscator, the MIDlet suite JAR containing\
    \ both `PasswordMIDlet` and `StealthMIDlet` is 493KB. Furthermore, it won't run\
    \ because it contains classes in the `java.*` namespace. After running ProGuard,\
    \ the MIDlet suite JAR is 38KB and the offending `java.*` classes have been renamed\
    \ to something innocuous.\n\n## Summary\n\nData security is crucial for some types\
    \ of applications. Data security is feasible in the MIDP world using the Bouncy\
    \ Castle cryptography package. The Bouncy Castle package provides sophisticated,\
    \ accessible, industrial-strength cryptography for the MIDP platform. This example\
    \ presented two possible applications— one using a message digest for secure password\
    \ authentication, and the other using ciphers to encrypt data sent between a MIDlet\
    \ and a servlet.\n\nKeep in mind that adding cryptography to an application or\
    \ system won't necessarily make it more secure. You need to take a comprehensive\
    \ system-level approach to security. Cryptography is just one of the tools in\
    \ your box.\n\n# Appendix A: MIDP API Reference\n\n## Overview\n\nThis appendix\
    \ is a reference for the classes and interfaces of the MIDP API. This reference\
    \ is designed to help you quickly find the signature of a method in the MIDP API.\
    \ Exceptions and errors are not included.\n\nFor a full description of any class,\
    \ interface, or method, consult the API documentation, either in HTML (usually\
    \ distributed with a MIDP toolkit) or in the MIDP specification itself.\n\nThe\
    \ API listings are alphabetical, grouped by package.\n\nThis reference covers\
    \ MIDP 1.0, CLDC 1.0, MIDP 2.0, and CLDC 1.1. Methods that are new in MIDP 2.0\
    \ or CLDC 1.1 are marked with a \"+\". Methods that have been removed (or moved)\
    \ in MIDP 2.0 or CLDC 1.1 are marked with a \"-\". Initial implementations of\
    \ MIDP 2.0 will be paired with CLDC 1.0; keep this in mind as you browse the reference.\n\
    \n## Package `java.io`\n\n### Class `java.io.ByteArrayInputStream`\n\n```\n public\
    \ class ByteArrayInputStream\n      extends java.io.InputStream {\n    // Constructors\n\
    \    public ByteArrayInputStream(byte[] buf);\n    public ByteArrayInputStream(byte[]\
    \ buf, int offset, int length);\n\n    // Methods\n    public synchronized int\
    \ available();\n    public synchronized void close();\n    public void mark(int\
    \ readAheadLimit);\n    public boolean markSupported();\n    public synchronized\
    \ int read();\n    public synchronized int read(byte[] b, int off, int len);\n\
    \    public synchronized void reset();\n    public synchronized long skip(long\
    \ n);\n  } \n```\n\n### Class `java.io.ByteArrayOutputStream`\n\n```\n public\
    \ class ByteArrayOutputStream\n      extends java.io.OutputStream {\n    // Constructors\n\
    \    public ByteArrayOutputStream();\n    public ByteArrayOutputStream(int size);\n\
    \n    // Methods\n    public synchronized void close();\n    public synchronized\
    \ void reset();\n    public int size();\n    public synchronized byte[] toByteArray();\n\
    \    public String toString();\n    public synchronized void write(int b);\n \
    \   public synchronized void write(byte[] b, int off, int len);\n  }\n```\n\n\
    ### Interface `java.io.DataInput`\n\n```\n public interface DataInput {\n    //\
    \ Methods\n    public boolean readBoolean();\n    public byte readByte();\n  \
    \  public char readChar();\n+   public double readDouble();\n+   public float\
    \ readFloat();\n    public void readFully(byte[] b);\n    public void readFully(byte[]\
    \ b, int off, int len);\n    public int readInt();\n    public long readLong();\n\
    \    public short readShort();\n    public String readUTF();\n    public int readUnsignedByte();\n\
    \    public int readUnsignedShort();\n    public int skipBytes(int n);\n  } \n\
    ```"
