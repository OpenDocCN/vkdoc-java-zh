  trans: '

    ## MIDP 应用程序剖析


    MIDP 应用程序可用的 API 来自 CLDC 和 MIDP 中的包，如图 1-2 所示。标有 + 的包是 CLDC 1.1 和 MIDP 2.0 中新增的。


    ![点击展开](img/fig25_01_0.jpg)

    图 1-2: MIDP 包


    CLDC 定义了一套核心 API，主要取自 J2SE 领域。这些包括 `java.lang` 中的基础语言类、`java.io` 中的流类以及 `java.util`
    中的简单集合。CLDC 还在 `javax.microedition.io` 中指定了一个通用网络 API。


    |  | 注意 | 根据 MIDP 2.0 规范，MIDP 2.0 很可能会与 CLDC 1.1 配对使用，尽管 MIDP 2.0 完全有可能在 CLDC
    1.0 之上实现。MIDP 2.0 的首次实现将与 CLDC 1.0 配对，因为 MIDP 2.0 规范在 Java 社区进程中的进展比 CLDC 1.1
    规范更快。 |


    可选地，设备供应商也可以提供 Java API 来访问设备特定功能。因此，MIDP 设备通常能够运行几种不同类型的应用程序。图 1-3 展示了这些可能性的示意图。


    ![点击展开](img/fig26_01_0.jpg)

    图 1-3: MIDP 软件组件


    每个设备都实现了某种操作系统（OS）。原生应用程序直接运行在这一层，代表了当今的现状——许多不同类型的设备，每种设备都有自己的操作系统和原生应用程序。


    位于设备操作系统之上的是 CLDC（包括 KVM）和 MIDP API。MIDP 应用程序仅使用 CLDC 和 MIDP API。设备特定的 Java 应用程序也可能使用设备供应商提供的
    Java API。


    ## MIDP 的优势


    考虑到配置和简表（Profile）的多样性，为什么这本书要讲 MIDP？首先，MIDP 出现在一个关键时刻，一个像手机这样的 MIDP 设备市场正在爆炸式增长的时代。与此同时，MIDP
    设备正获得足够的处理能力、内存容量和互联网连接性，使其成为分布式应用程序有吸引力的平台。MIDP 1.0 已经部署在全球数百万部手机上，而 MIDP 2.0
    则对未来充满希望。


    其次，当然，MIDP 是第一个准备就绪、可以投入实际应用的 J2ME 简表。如果你阅读下一章，你现在就可以编写 MIDP 应用程序了。


    ### 可移植性


    在小型设备应用程序开发中使用 Java 而非其他工具的优势在于可移植性。你可以用 C 或 C++ 编写设备应用程序，但结果将是特定于单一平台的。使用 MIDP
    API 编写的应用程序可以直接移植到任何 MIDP 设备上。


    如果你一直关注 Java 的发展，这听起来应该很熟悉。这正是 Sun 自 1995 年以来一直重复的“一次编写，到处运行”（WORA）口号。不幸的是，对于在
    JDK 1.0 和 JDK 1.1（尤其是浏览器实现）中与跨平台问题作斗争的开发者来说，WORA 有点像四个字母的脏话。虽然 Java 2 中的跨平台能力总体上是成功的，但
    WORA 仍然带有未兑现承诺的污点。


    MIDP 能否提供无痛的跨平台功能？能。MIDP 实现中总会存在特定于平台的错误，但我相信 MIDP 能像宣传的那样工作，因为它比桌面 Java 小得多。更少的代码意味着移植到多个平台时更少的错误。JDK
    1.0 和 JDK 1.1 的大部分跨平台不兼容问题，是由于试图将不同的窗口系统塞进 AWT 基于对等组件的架构这一噩梦造成的。MIDP 完全没有 AWT
    那样的复杂性，这意味着 MIDP 应用程序极有可能从一开始就能无缝地在多个平台上运行。此外，虽然 JDK 1.0 测试套件只包含几十个测试，但 MIDP 兼容性测试套件包含数千个测试。


    ### 安全性


    使用 Java 进行小型设备开发的第二个令人信服的理由是安全性。Java 以其安全运行像 applet 这样的下载代码的能力而闻名。这是一个完美的契合——很容易想象有吸引力的应用程序动态下载到你的手机上。


    但情况并非如此美好。首先，CLDC 中使用的 KVM 只实现了部分字节码验证器，这意味着字节码验证这一重要任务的一部分是在 MIDP 设备之外执行的。


    其次，CLDC 不允许应用程序自定义类加载器。这意味着任何形式的动态应用程序交付都依赖于设备特定的机制。正如你将看到的，应用程序部署在 CLDC 或 MIDP
    中并没有明确定义。


    MIDP 应用程序确实提供了一个重要的安全承诺：它们永远无法逃脱 KVM 的限制。这意味着，除非存在错误，否则 MIDP 应用程序永远无法写入不属于 KVM
    的设备内存。MIDP 应用程序永远不会搞乱同一设备上的其他应用程序或设备操作系统本身。^([2]) 这是 MIDP 的杀手级特性。它允许制造商和运营商向世界开放应用程序开发，或多或少地免于认证和验证程序，而无需担心恶意程序员会编写导致手机崩溃的应用程序。


    在 MIDP 2.0 中，MIDlet 套件可以进行加密签名，然后在设备上进行验证，这为用户执行下载的代码提供了一定的安全性。一个新的权限架构还允许用户拒绝不受信任的代码访问某些
    API 功能。例如，如果你在手机上安装了一个看起来可疑的 MIDlet 套件，你可以阻止它进行网络连接。


    ^([2])可以想象，MIDP 应用程序可能会发起拒绝服务攻击（即，耗尽所有处理器时间或使设备操作系统陷入停滞）。人们普遍认为，对于拒绝服务攻击没有太多防御手段。J2SE
    中的应用程序和 applet 也存在同样的漏洞。


    ## MIDP 供应商


    几家大型企业已经全力支持 MIDP。快速浏览一下 MIDP 的 JSR 页面，就能发现最重要的公司。


    两家亚洲公司率先为支持 Java 的手机提供网络服务。在韩国，LG TeleCom 于 2000 年中部署了一项名为 ez-i 的服务。同年晚些时候，NTT
    DoCoMo 部署了广受欢迎的 i-mode。为 LG TeleCom（KittyHawk）和 NTT DoCoMo（i-Appli）开发的 API 与 MIDP
    类似，但都是在 MIDP 1.0 规范完成之前完成的。


    在美国，摩托罗拉是第一家生产 MIDP 电话的制造商。i50sx 和 i85s 于 2001 年 4 月 2 日发布，由 Nextel 提供服务。此后，摩托罗拉通过推出少量新设备扩展了其产品线。


    诺基亚也对 MIDP 做出了严肃的承诺，而制定 MIDP 规范的专家组包括一份令人印象深刻的制造商名单——爱立信、日立、诺基亚、索尼、Symbian 等等。如果你愿意，可以去阅读行业预测——未来三年将售出数不清的
    MIDP 手机，等等。可以肯定的是，你的 MIDP 应用程序将拥有一个巨大的市场。有关 MIDP 设备的全面列表，请访问 [`wireless.java.sun.com/device/`](http://wireless.java.sun.com/device/)。

    '
- fmt: '# Fragmentation


    Platform fragmentation is a serious concern in the MIDP community. Many devices
    that implement MIDP 1.0 also include device-specific APIs. These APIs access device-specific
    features or provide functionality that wasn''t addressed in MIDP 1.0''s least-common-denominator
    specification. Current software vendors, particularly game developers, sometimes
    create and distribute multiple versions of an application, each tailored to a
    specific platform. Obviously this is a concern: part of the point of using MIDP
    in the first place is the ability to write one set of code and deploy it on multiple
    platforms.


    I won''t pretend to know how this particular drama is going to play out. I believe
    that MIDP 2.0 addresses many, possibly all, of the shortcomings of MIDP 1.0. Its
    timing is good, so the adoption and deployment of MIDP 2.0 devices may provide
    a standard, unified platform for wireless development.


    Another fragmentation issue is the confusion surrounding the assembly of configurations,
    profiles, and optional APIs into a software stack. As a developer, you want to
    understand exactly what set of APIs will be available or are likely to be available,
    but there seem to be so many choices and so many possibilities. JSR 185 ([http://jcp.org/jsr/detail/185.jsp](http://jcp.org/jsr/detail/185.jsp))
    aims to bring clarity to this issue.


    ## Summary


    J2ME is the Java platform for small devices, a broad field that covers pretty
    much everything smaller than a breadbox. Because J2ME spans such a diverse selection
    of hardware, it is divided into configurations, profiles, and optional APIs. A
    configuration specifies a subset of J2SE functionality and the behavior of the
    JVM, while profiles are generally more specific to a family of devices with similar
    characteristics. Optional APIs offer added functionality in a flexible package.
    The Mobile Information Device Profile, which is the focus of this book, includes
    APIs for devices like mobile phones and two-way pagers.


    # Chapter 2: Building MIDlets


    ## Overview


    MIDP applications are piquantly called MIDlets, a continuation of the naming theme
    begun by `applets` and `servlets`. Writing MIDlets is relatively easy for a moderately
    experienced Java programmer. After all, the programming language is still Java.
    Furthermore, many of the fundamental APIs from `java.lang` and `java.io` are basically
    the same in the MIDP as they are in J2SE. Learning the new APIs (in the `javax.microedition`
    hierarchy) is not terribly difficult, as you''ll see in the remainder of this
    book.


    The actual development process, however, is a little more complicated for MIDlets
    than it is for J2SE applications. Beyond a basic compile-and-run cycle, MIDlets
    require some additional tweaking and packaging. The complete build cycle looks
    like this:


    Edit Source Code > Compile > Preverify > Package > Test or Deploy


    To show how things work, and to give you a taste of MIDlet development, this chapter
    is dedicated to building and running a simple MIDlet. In later chapters, we''ll
    delve into the details of the MIDP APIs. In this chapter, you''ll get a feel for
    the big picture of MIDlet development.


    ## Tooling Up


    MIDlets are developed on regular desktop computers, although the MIDlet itself
    is designed to run on a small device. To develop MIDlets, you''ll need some kind
    of development kit, either from Sun or another vendor. Remember, MIDP is only
    a specification; vendors are free to develop their own implementations.


    The world is full of MIDlet development tools if you know where to look. Furthermore,
    many of these tools are freely available.


    The bare bones set of tools is Sun''s MIDP reference implementation. This includes
    the `preverify` tool (more on this later), a MIDP device emulator, source code,
    and documentation. You can download the MIDP reference implementation by following
    the links from [http://java.sun.com/products/midp/](http://java.sun.com/products/midp/).
    However, I don''t recommend using the reference implementation unless you really
    enjoy being in the middle of the gritty details of building and packaging MIDlets.
    (You should also investigate the reference implementation if you are interested
    in porting the MIDP runtime to a new device or platform.)


    A much better tool for beginners is Sun''s J2ME Wireless Toolkit, available from
    [http://java.sun.com/products/j2mewtoolkit/](http://java.sun.com/products/j2mewtoolkit/).
    The J2ME Wireless Toolkit (or J2MEWTK, as it''s affectionately known) includes
    a GUI tool that automates some of the tedious details of building and packaging
    MIDlets, providing a simple path from source code to running MIDlets. At the same
    time, the J2ME Wireless Toolkit is a relatively lightweight solution, almost a
    miniature IDE, not something that will choke your machine.


    Larger IDEs are available in abundance, from device manufacturers, wireless carriers,
    and IDE vendors, including the following:


    *   Borland JBuilder MobileSet: [http://www.borland.com/jbuilder/mobileset/](http://www.borland.com/jbuilder/mobileset/)

    *   IBM WebSphere Studio Device Developer: [http://www-3.ibm.com/software/pervasive/products/wsdd/](http://www-3.ibm.com/software/pervasive/products/wsdd/)

    *   Metrowerks CodeWarrior Wireless Studio: [http://www.metrowerks.com/MW/Develop/Wireless/Wireless_Studio/default.htm](http://www.metrowerks.com/MW/Develop/Wireless/Wireless_Studio/default.htm)

    *   Research In Motion BlackBerry Java Development Environment: [http://www.blackberry.net/developers/na/java/start/download.shtml](http://www.blackberry.net/developers/na/java/start/download.shtml)

    *   Sun ONE Studio, Mobile Edition: [http://wwws.sun.com/software/sundev/jde/features/me-features.html](http://wwws.sun.com/software/sundev/jde/features/me-features.html)

    *   Zucotto Wireless WHITEboard SDK: [http://www.zucotto.com/products/wb/whiteboard.html](http://www.zucotto.com/products/wb/whiteboard.html)


    You can use whatever development kit you wish. I suggest you start with the J2ME
    Wireless Toolkit, which is easy to use and authoritative. I''ll be using the J2ME
    Wireless Toolkit throughout the rest of the book. Other development environments
    generally use the J2ME Wireless Toolkit as a plugin anyhow, so your experiences
    are likely to be similar no matter what tool you use. You''ll notice details about
    the development environment most in this chapter, where I''ll go into detail about
    the build tools and the emulators. For much of the remainder of this book, I''ll
    be describing the MIDP APIs, so it won''t really matter which development kit
    you use.'
