    \ g.drawImage(mImage, 0, 0, Graphics.TOP | Graphics.LEFT);\n  }\n\n  private void\
    \ initialize() {\n    int w = getWidth();\n    int h = getHeight();\n\n    mImage\
    \ = Image.createImage(w, h);\n\n    Graphics g = mImage.getGraphics();\n\n   \
    \ g.drawRect(0, 0, w - 1, h - 1);\n    g.drawLine(0, 0, w - 1, h - 1);\n    g.drawLine(w\
    \ - 1, 0, 0, h - 1);\n  }\n}\n```"
  trans: "\n## 游戏动作\n\n在某些情况下，键码可能很有用，但它们通常与特定设备紧密相关。MIDP 提供了一种名为*游戏动作*的简单抽象，使得将用户按键事件映射为对游戏及其他具有专用用户界面的应用程序有用的事件变得更加容易。\n\
    \n其概念很简单：向 `getGameAction()` 提供一个键码，你将收到一个游戏动作——即以下值之一：`UP`、`DOWN`、`LEFT`、`RIGHT`、`FIRE`、`GAME_A`、`GAME_B`、`GAME_C`\
    \ 或 `GAME_D`。基本上，游戏动作是一种将设备上的物理按键映射到一组视频游戏按钮（例如你在世嘉 Genesis 或任天堂 Game Boy 等游戏平台上可能找到的按钮）的方式。\n\
    \n要理解这如何映射到物理设备，请思考如何将 `UP`、`DOWN`、`LEFT` 和 `RIGHT` 这些游戏动作映射到按键上。在 Sun 的 MIDP\
    \ 模拟器中，存在与这些游戏动作有明显对应关系的导航键。然而，考虑一个更简单的手机，例如只有数字键盘的手机。在这种情况下，你可能希望将 `UP` 映射到 2\
    \ 键，`DOWN` 映射到 8 键，`LEFT` 映射到 4 键，`RIGHT` 映射到 6 键。\n\n使用游戏动作可以省去你自己做这些决定的麻烦；MIDP\
    \ 实现会为设备提供一个合理的映射。要查找某个键码对应的游戏动作，请将该键码传递给 `getGameAction()`。你也可以通过调用 `getKeyCode()`\
    \ 来查找某个游戏动作对应的键码。\n\n以下示例在 `keyPressed()` 方法中监听按键事件。它将键码转换为游戏动作，并在屏幕上显示该游戏动作。\n\
    \n```\nimport javax.microedition.lcdui.*;\n\npublic class KeyCanvas\n    extends\
    \ Canvas {\n  private Font mFont;\n  private String mMessage = \"[Press keys]\"\
    ;\n\n  public KeyCanvas() {\n    mFont = Font.getFont(Font.FACE_PROPORTIONAL,\n\
    \        Font.STYLE_PLAIN, Font.SIZE_MEDIUM);\n  }\n\n  public void paint(Graphics\
    \ g) {\n    int w = getWidth();\n    int h = getHeight();\n\n    // 清除画布。\n  \
    \  g.setGrayScale(255);\n    g.fillRect(0, 0, w - 1, h - 1);\n    g.setGrayScale(0);\n\
    \    g.drawRect(0, 0, w - 1, h - 1);\n\n    g.setFont(mFont);\n    int x = w /\
    \ 2;\n    int y = h / 2;\n\n    g.drawString(mMessage, x, y, Graphics.BASELINE\
    \ | Graphics.HCENTER);\n  }\n\n  protected void keyPressed(int keyCode) {\n  \
    \  int gameAction = getGameAction(keyCode);\n    switch(gameAction) {\n      case\
    \ UP:     mMessage = \"UP\";             break;\n      case DOWN:   mMessage =\
    \ \"DOWN\";           break;\n      case LEFT:   mMessage = \"LEFT\";        \
    \   break;\n      case RIGHT:  mMessage = \"RIGHT\";          break;\n      case\
    \ FIRE:   mMessage = \"FIRE\";           break;\n      case GAME_A: mMessage =\
    \ \"GAME_A\";         break;\n      case GAME_B: mMessage = \"GAME_B\";      \
    \   break;\n      case GAME_C: mMessage = \"GAME_C\";         break;\n      case\
    \ GAME_D: mMessage = \"GAME_D\";         break;\n      default:     mMessage =\
    \ \"\";               break;\n    }\n    repaint();\n  }\n}\n```\n\n要运行此示例，你需要一个相应的\
    \ MIDlet 来显示 `KeyCanvas`。至此，我想你可以自己完成这个操作。\n\n## 指针事件\n\n某些设备，特别是 PDA，可能支持指针。例如，流行的\
    \ Palm 平台就是基于触控笔和触摸屏的使用。你可以在运行时通过调用 `hasPointerEvents()` 和 `hasPointerMotionEvents()`\
    \ 来了解你的设备是否支持指针事件。如果设备支持指针事件，当指针被按下和释放时，将调用以下方法：\n\n```\nprotected void pointerPressed(int\
    \ x, int y)\nprotected void pointerReleased(int x, int y) \n```\n\n如果设备支持指针移动事件，当用户在屏幕上拖动触控笔时，将调用以下方法：\n\
    \n```\nprotected void pointerDragged(int x, int y)\n```\n\n## 双缓冲\n\n*双缓冲*是一种用于减少绘图和动画闪烁的知名技术。想象一下，你正在实现一个动画，该动画在每一帧都会清除并重绘整个屏幕。如果没有双缓冲，当屏幕被清除和重绘时，动画会严重闪烁。使用双缓冲时，新帧会被绘制到一个离屏图像（缓冲区）中。当离屏绘制完成后，该图像会以一次平滑、快速的操作绘制到屏幕上。你需要为离屏图像付出内存代价，但动画质量的提升是显著的。\n\
    \nMIDP 实现可能默认提供双缓冲。你可以通过调用 `isDoubleBuffered()` 方法来了解某个 `Canvas` 是否使用了双缓冲。\n\n\
    如果实现没有提供双缓冲，你就需要自己实现。幸运的是，这并不太难。过程如下：\n\n1.  通过调用静态方法 `Image.createImage(int width,\
    \ int height)` 创建一个离屏图像。\n\n2.  通过在 `Image` 上调用 `getGraphics()` 方法，获取一个用于*在图像中*绘图的\
    \ `Graphics` 对象。\n\n3.  使用该 `Graphics` 对象在离屏图像中绘制内容。\n\n4.  在 `Canvas` 的 `paint()`\
    \ 方法中，使用 `drawImage()` 将离屏图像放置到 `Canvas` 上。\n\n以下是一个创建简单离屏图像并显示它的 `Canvas` 子类：\n\
    \n```\nimport javax.microedition.lcdui.*;\n\npublic class OffscreenCanvas\n  \
    \  extends Canvas {\n  private Image mImage;\n  public void paint(Graphics g)\
    \ {\n    if (mImage == null)\n      initialize();\n    g.drawImage(mImage, 0,\
    \ 0, Graphics.TOP | Graphics.LEFT);\n  }\n\n  private void initialize() {\n  \
    \  int w = getWidth();\n    int h = getHeight();\n\n    mImage = Image.createImage(w,\
    \ h);\n\n    Graphics g = mImage.getGraphics();\n\n    g.drawRect(0, 0, w - 1,\
    \ h - 1);\n    g.drawLine(0, 0, w - 1, h - 1);\n    g.drawLine(w - 1, 0, 0, h\
    \ - 1);\n  }\n}\n```\n"
- fmt: "# Multithreading and Animation\n\nAs with any graphic-interface toolkit, threading\
    \ with the MIDP user-interface classes is a little tricky. The user-interface\
    \ implementation has its own thread that handles both user-interface methods and\
    \ screen painting. For example, when the user presses a key on their device, the\
    \ implementation calls `keyPressed()` in your `Canvas` subclass. The thread that\
    \ calls this method belongs to the MIDP implementation. As such, it should be\
    \ handled with some care. In MIDP implementations, the same thread that calls\
    \ event methods also calls `paint()`.\n\n|  | Note | All event-driven user-interface\
    \ toolkits have this idea of a system-owned user-interface thread. In AWT and\
    \ Swing, it's called the *event dispatch thread*. The same rule applies: If you're\
    \ running inside a thread that doesn't belong to you, don't take all day about\
    \ it. |\n\nMethods that are called by a thread that doesn't belong to you are\
    \ *callbacks*. The rule of thumb for callbacks is that you shouldn't do anything\
    \ that takes a long time. Since the thread doesn't belong to you, you shouldn't\
    \ hold it up a long time performing your work. Because this thread is responsible\
    \ for operating the user interface, holding it up with lengthy computations will\
    \ make your application look lobotomized. Suppose, for example, that you had to\
    \ retrieve some data from the network. In response to a `Command`, you might do\
    \ something like this:\n\n```\npublic void commandAction(Command c, Displayable\
    \ s) {\n  if (c == mNetworkCommand) {\n    // Create a progress screen, progressScreen.\n\
    \    mDisplay.setCurrent(progressForm);\n    // Now do the network stuff.\n  \
    \  // Oops! Users never see progressScreen.\n  }\n  // ...\n}\n```\n\nThe problem\
    \ is that the progress screen won't be shown. The `commandAction()` method is\
    \ called from the user-interface thread, the same thread that's responsible for\
    \ painting the screen. If you tie up this thread with some lengthy processing\
    \ of your own, the user-interface thread never has a chance to update the screen.\
    \ If you need to do something that takes a long time, create a separate thread\
    \ for it. In the Jargoneer example in [Chapter 2](#LiB0012_split_000.html#57),\
    \ for example, network access was performed in a separate thread.\n\nIn certain\
    \ situations, you will need to ask the user-interface thread to execute code on\
    \ your behalf. If you are showing an animation, for example, you'll want to make\
    \ sure that the frames of the animation are properly synchronized with the repainting\
    \ cycle. Otherwise, you're likely to end up showing frames that are partially\
    \ drawn.\n\n`Display` has a mechanism for executing your code in the user-interface\
    \ thread. It has a method, `callSerially()`, that accepts a `Runnable`. When the\
    \ user-interface thread is ready, meaning when it has finished servicing all repaint\
    \ requests, it will execute the `run()` method of the `Runnable` from the user-interface\
    \ thread. A typical animation, then, looks like this:\n\n```\npublic class AnimationCanvas\n\
    \    extends Canvas\n    implements Runnable {\n  public start() {\n    run();\n\
    \  }\n\npublic void paint(Graphics g) {\n    // Paint a frame of the animation.\n\
    \  }\n  public void run() {\n    // Update our state.\n    // Now request a paint\
    \ of the new frame.\n    repaint();\n    Display.callSerially(this);\n  }\n}\n\
    ```\n\nYou'd kick off the animation by calling `start()`, which in turn would\
    \ simply call `run()`. Inside `run()`, we update our state and call `repaint()`\
    \ to request the painting of a new frame. Then we use `callSerially()` to request\
    \ that we get called again when the painting is done.\n\nThis technique results\
    \ in an animation that runs as fast as the device allows. Many applications, however,\
    \ need to provide a consistent experience across different devices. In these cases,\
    \ it makes much more sense to use a separate animation thread with a consistent\
    \ frame delay. The following example demonstrates this technique. It consists\
    \ of two classes, `Sweep` and `SweepCanvas`. `Sweep` is a `MIDlet` that displays\
    \ the class that actually implements the animation, `SweepCanvas`. The running\
    \ `SweepCanvas` is shown in [Figure 10-9](#LiB0083.html#ch10fig09).\n\n![](fig208_01.jpg)\n\
    Figure 10-9: *SweepCanvas* animation running on a grayscale emulator\n\nFirst,\
    \ here's the source code for `Sweep`:\n\n```\nimport javax.microedition.lcdui.*;\n\
    import javax.microedition.midlet.*;\n\npublic class Sweep\n    extends MIDlet\
    \ {\n  public void startApp() {\n    final SweepCanvas sweeper = new SweepCanvas();\n\
    \    sweeper.start();\n    sweeper.addCommand(new Command(\"Exit\", Command.EXIT,\
    \ 0));\n    sweeper.setCommandListener(new CommandListener() {\n      public void\
    \ commandAction(Command c, Displayable s) {\n        sweeper.stop();\n       \
    \ notifyDestroyed();\n      }\n    });\n\nDisplay.getDisplay(this).setCurrent(sweeper);\n\
    \  }\n\npublic void pauseApp() {}\n\npublic void destroyApp(boolean unconditional)\
    \ {}\n}\n```\n\nAnd here's the code for `SweepCanvas`:\n\n```\nimport javax.microedition.lcdui.*;\n\
    \npublic class SweepCanvas\n    extends Canvas\n    implements Runnable {\n  private\
    \ boolean mTrucking;\n  private int mTheta;\n  private int mBorder;\n  private\
    \ int mDelay;\n\npublic SweepCanvas() {\n    mTheta = 0;\n    mBorder = 10;\n\
    \    mDelay = 50;\n  }\n\npublic void start() {\n    mTrucking = true;\n    Thread\
    \ t = new Thread(this);\n    t.start();\n  }\n\npublic void stop() {\n    mTrucking\
    \ = false;\n  }\n  public void paint(Graphics g) {\n    int width = getWidth();\n\
    \    int height = getHeight();\n\n// Clear the Canvas.\n    g.setGrayScale(255);\n\
    \    g.fillRect(0, 0, width - 1, height - 1);\n\nint x = mBorder;\n    int y =\
    \ mBorder;\n    int w = width - mBorder * 2;\n    int h = height - mBorder * 2;\n\
    \    for (int i = 0; i < 8; i++) {\n      g.setGrayScale((8 - i) * 32 - 16);\n\
    \      g.fillArc(x, y, w, h, mTheta + i * 10, 10);\n      g.fillArc(x, y, w, h,\
    \ (mTheta + 180) % 360 + i * 10, 10);\n    }\n  }\n\npublic void run() {\n   \
    \ while (mTrucking) {\n      mTheta = (mTheta + 1) % 360;\n      repaint();\n\
    \      try { Thread.sleep(mDelay); }\n      catch (InterruptedException ie) {}\n\
    \    }\n  }\n}\n```\n\nThe Game API in MIDP 2.0 offers another option for running\
    \ an animation. In the [next chapter](#LiB0085_split_000.html#471), you'll see\
    \ how `Sweep`'s simple animation can be implemented using `GameCanvas`.\n\n##\
    \ Summary\n\nWe've covered a lot of ground in this chapter. The `Canvas` class\
    \ provides a low-level interface for games or other demanding applications. You\
    \ can draw shapes, text, and images on a `Canvas` using the `Graphics` class.\
    \ Furthermore, you can receive detailed input information about key and pointer\
    \ events. Game actions are a simple generalized input method based on key events.\
    \ Finally, you should understand the multithreading issues with repainting and\
    \ event callbacks. Lengthy processing should be placed in a separate thread so\
    \ that it doesn't bring the system-owned user-interface thread to a grinding halt.\
    \ Animations can use `Display`'s `callSerially()` method to synchronize with the\
    \ user-interface thread, although more commonly they will be implemented using\
    \ a separate animation thread. The [next chapter](#LiB0085_split_000.html#471)\
    \ details MIDP 2.0's new Game API.\n\n# Chapter 11: The Game API\n\nMany of the\
    \ new features in MIDP 2.0 are aimed at making MIDP an attractive platform for\
    \ games, which are the leading edge of consumer J2ME software. You've already\
    \ read about some of the new goodies: RGB images and blitting in `Canvas` are\
    \ two good examples. In the [next chapter](#LiB0095_split_000.html#523), you'll\
    \ read about MIDP 2.0's support for multimedia. This chapter describes the new\
    \ Game API, which simplifies writing 2D games."
