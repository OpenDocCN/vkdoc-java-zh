    \  }\n\nmDisplay.setCurrent(mMainScreen);\n  }\n\npublic void pauseApp() {}\n\n\
    public void destroyApp(boolean unconditional) {}\n  public void commandAction(Command\
    \ c, Displayable s) {\n    if (c.getCommandType() == Command.EXIT) notifyDestroyed();\n\
    \    else run();\n  }\n\npublic void run() {\n    String selection = mMainScreen.getString(\n\
    \        mMainScreen.getSelectedIndex());\n\nbyte[] sequence = null;\n    if (selection.equals(kSoundOfMusic))\
    \ {\n      sequence = new byte[] {\n        ToneControl.VERSION, 1,\n        67,\
    \ 16, // The\n        69, 16, // hills\n        67,  8, // are\n        65,  8,\
    \ // a -\n        64, 48, // live\n        62,  8, // with\n        60,  8, //\
    \ the\n        59, 16, // sound\n        57, 16, // of\n        59, 32, // mu\
