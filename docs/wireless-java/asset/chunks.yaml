    \ Three faces are available, as shown in [Figure 10-6](#LiB0078.html#ch10fig06).\
    \ These are represented by constants in the Font class: FACE_SYSTEM, FACE_MONOSPACE,\
    \ and FACE_PROPORTIONAL.\n\n![](fig193_01.jpg)\nFigure 10-6: The three font faces\
    \ in italics\n\nOnce you've chosen a font face, you can also specify a style and\
    \ a size. The styles are what you'd expect, and they are represented by constants\
    \ in the Font class: STYLE_PLAIN, STYLE_BOLD, STYLE_ITALIC, and STYLE_UNDERLINE.\
    \ You can combine styles, like bold and italic, by ORing the constants together.\
    \ The size is simply SIZE_SMALL, SIZE_MEDIUM, or SIZE_LARGE.\n\nYou could create\
    \ a small, italic, proportional font with the following call:\n\n```\nFont f =\
    \ Font.getFont(\n    Font.FACE_PROPORTIONAL,\n    Font.STYLE_ITALIC,\n    Font.SIZE_SMALL);\n\
    ```\n\nTo tell Graphics to use a new font for subsequent text, call setFont().\
    \ You can get a reference to the current font by calling getFont(). You can also\
    \ find out information about a Font with the getFace() , getStyle(), and getSize()\
    \ methods. For convenience, Font also includes isPlain(), isBold(), isItalic(),\
    \ and isUnderlined() methods.\n\nThe MIDP implementation has a default font that\
    \ you can retrieve from Font's static method getDefaultFont().\n\nThe following\
    \ Canvas demonstrates the creation and use of fonts.\n\n```\nimport javax.microedition.lcdui.*;\n\
    \npublic class FontCanvas\n    extends Canvas {\n  private Font mSystemFont, mMonospaceFont,\
    \ mProportionalFont;\n\npublic FontCanvas() { this(Font.STYLE_PLAIN); }\n\npublic\
    \ FontCanvas(int style) { setStyle(style); }\n  public void setStyle(int style)\
    \ {\n    mSystemFont = Font.getFont(Font.FACE_SYSTEM,\n        style, Font.SIZE_MEDIUM);\n\
    \    mMonospaceFont = Font.getFont(Font.FACE_MONOSPACE,\n        style, Font.SIZE_MEDIUM);\n\
    \    mProportionalFont = Font.getFont(Font.FACE_PROPORTIONAL,\n        style,\
    \ Font.SIZE_MEDIUM);\n  }\n\npublic boolean isBold() {\n    return mSystemFont.isBold();\n\
    \  }\n  public boolean isItalic() {\n    return mSystemFont.isItalic();\n  }\n\
    \  public boolean isUnderline() {\n    return mSystemFont.isUnderlined();\n  }\n\
    \npublic void paint(Graphics g) {\n    int w = getWidth();\n    int h = getHeight();\n\
    \n// Clear the Canvas.\n    g.setGrayScale(255);\n    g.fillRect(0, 0, w - 1,\
    \ h - 1);\n    g.setGrayScale(0);\n    g.drawRect(0, 0, w - 1, h - 1);\n\nint\
    \ x = w / 2;\n    int y = 20;\n\ny += showFont(g, \"System\", x, y, mSystemFont);\n\
    \    y += showFont(g, \"Monospace\", x, y, mMonospaceFont);\n    y += showFont(g,\
    \ \"Proportional\", x, y, mProportionalFont);\n  }\n\nprivate int showFont(Graphics\
    \ g, String s, int x, int y, Font f) {\n    g.setFont(f);\n    g.drawString(s,\
    \ x, y, Graphics.TOP | Graphics.HCENTER);\n    return f.getHeight();\n  }\n} \n\
    ```\n\nTo see this Canvas in action, you'll need a MIDlet that shows it. You could\
    \ modify Pacer again, if you wish, or use the following code:\n\n```\nimport javax.microedition.lcdui.*;\n\
    import javax.microedition.midlet.*;\n\npublic class FontMIDlet\n    extends MIDlet\n\
    \   implements CommandListener {\n  private FontCanvas mFontCanvas;\n  private\
    \ Command mBoldCommand, mItalicCommand, mUnderlineCommand;\n\npublic FontMIDlet()\
    \ {\n    mFontCanvas = new FontCanvas();\n\nmBoldCommand = new Command(\"Bold\"\
    , Command.SCREEN, 0);\n    mItalicCommand = new Command(\"Italic\", Command.SCREEN,\
    \ 0);\n    mUnderlineCommand = new Command(\"Underline\", Command.SCREEN, 0);\n\
    \    Command exitCommand = new Command(\"Exit\", Command.EXIT, 0);\n\nmFontCanvas.addCommand(mBoldCommand);\n\
    \    mFontCanvas.addCommand(mItalicCommand);\n    mFontCanvas.addCommand(mUnderlineCommand);\n\
    \    mFontCanvas.addCommand(exitCommand);\n    mFontCanvas.setCommandListener(this);\n\
    \  }\n\npublic void startApp() {\n    Display.getDisplay(this).setCurrent(mFontCanvas);\n\
    \  }\n\npublic void pauseApp() {}\n\npublic void destroyApp(boolean unconditional)\
    \ {}\n\npublic void commandAction(Command c, Displayable s) {\n    if (c.getCommandType()\
    \ == Command.EXIT) {\n      notifyDestroyed();\n      return;\n    }\n    boolean\
    \ isBold = mFontCanvas.isBold() ^ (c == mBoldCommand);\n    boolean isItalic =\
    \ mFontCanvas.isItalic() ^ (c == mItalicCommand);\n    boolean isUnderline = mFontCanvas.isUnderline()\
    \ ^\n        (c == mUnderlineCommand);\n\nint style =\n        (isBold ? Font.STYLE_BOLD\
    \ : 0) |\n        (isItalic ? Font.STYLE_ITALIC : 0) |\n        (isUnderline ?\
    \ Font.STYLE_UNDERLINED : 0);\n\nmFontCanvas.setStyle(style);\n    mFontCanvas.repaint();\n\
    \  }\n}\n```\n\n### Measuring Text\n\nThe Font class can tell you useful information\
    \ about the dimensions of text. If you read the previous example carefully, you'll\
    \ notice we already used one of these methods, getHeight(). This method returns\
    \ the height of an entire line of text and can be used to position multiple lines.\n\
    \nIf you really need to know the location of the baseline, call getBaselinePosition().\
    \ This returns the distance from the top of a line of text to the baseline. However,\
    \ given the flexibility offered by the anchor points in Graphics, you probably\
    \ won't ever need to find the baseline yourself.\n\nThe rest of the methods in\
    \ Font for measuring text measure the width of various pieces of text. The names\
    \ and parameters of these methods are the same as text drawing methods in Graphics:\n\
    \n```\npublic int charWidth(char ch)\npublic int charsWidth(char ch, int offset,\
    \ int length)\npublic int stringWidth(String str)\npublic int substringWidth(String\
    \ str, int offset, int len)\n```\n\nYou could draw a box around a string, for\
    \ example:\n\n```\nimport javax.microedition.lcdui.*;\n\npublic class BoxTextCanvas\n\
    \    extends Canvas {\n  private Font mFont;\npublic BoxTextCanvas() {\n    mFont\
    \ = Font.getFont(Font.FACE_PROPORTIONAL,\n        Font.STYLE_PLAIN, Font.SIZE_LARGE);\n\
    \  }\n\n  public void paint(Graphics g) {\n    int w = getWidth();\n    int h\
    \ = getHeight();\n\n    g.setColor(0xffffff);\n    g.fillRect(0, 0, w, h);\n \
    \   g.setColor(0x000000);\n\n    String s = \"dolce\";\n    int stringWidth =\
    \ mFont.stringWidth(s);\n    int stringHeight = mFont.getHeight();\n    int x\
    \ = (w - stringWidth) / 2;\n    int y = h / 2;\n\n    g.setFont(mFont);\n    g.drawString(s,\
    \ x, y, Graphics.TOP | Graphics.LEFT);\n    g.drawRect(x, y, stringWidth, stringHeight);\n\
    \  }\n}\n```\n\n### Drawing Images\n\nThe Graphics class contains a single method\
    \ for drawing an image:\n\n```\npublic void drawImage(Image img, int x, int y,\
    \ int anchor)\n```\n\nThe drawImage() method uses an anchor point, just like the\
    \ anchor point in the text drawing methods. The available anchor points are slightly\
    \ different. BASELINE is no longer an option for the vertical anchor point of\
    \ an image, as the concept of baseline is specific to text. Instead, VCENTER is\
    \ an additional option for the vertical anchor point. [Figure 10-7](#LiB0078.html#ch10fig07)\
    \ shows the available combinations of anchor points.\n\n[![Click To expand](fig198_01.jpg)](fig198_01_0.jpg)\n\
    Figure 10-7: Image anchor points\n\nMIDP 2.0 specifically requires support for\
    \ rendering images with transparency."
  trans: "\n### 选择字体\n\nMIDP 字体由*字体外观*、*样式*和*大小*表示。你不会有太多字体选择，但仍有几种可选。有三种外观可用，如图 10-6\
    \ 所示。这些外观由 Font 类中的常量表示：`FACE_SYSTEM`、`FACE_MONOSPACE` 和 `FACE_PROPORTIONAL`。\n\
    \n![](img/fig193_01.jpg)\n图 10-6：三种斜体字体外观\n\n选定字体外观后，你还可以指定样式和大小。样式与你预期的一致，由 Font\
    \ 类中的常量表示：`STYLE_PLAIN`、`STYLE_BOLD`、`STYLE_ITALIC` 和 `STYLE_UNDERLINE`。你可以通过按位或运算组合样式，例如粗体和斜体。大小则只有\
    \ `SIZE_SMALL`、`SIZE_MEDIUM` 或 `SIZE_LARGE`。\n\n你可以通过以下调用创建一个小的、斜体的、比例字体：\n\n\
    ```\nFont f = Font.getFont(\n    Font.FACE_PROPORTIONAL,\n    Font.STYLE_ITALIC,\n\
    \    Font.SIZE_SMALL);\n```\n\n要告诉 Graphics 对象为后续文本使用新字体，请调用 `setFont()`。你可以通过调用\
    \ `getFont()` 获取当前字体的引用。你还可以使用 `getFace()`、`getStyle()` 和 `getSize()` 方法了解字体的信息。为方便起见，Font\
    \ 还包含了 `isPlain()`、`isBold()`、`isItalic()` 和 `isUnderlined()` 方法。\n\nMIDP 实现有一个默认字体，你可以通过\
    \ Font 的静态方法 `getDefaultFont()` 获取。\n\n以下 Canvas 演示了字体的创建和使用。\n\n```\nimport javax.microedition.lcdui.*;\n\
    \npublic class FontCanvas\n    extends Canvas {\n  private Font mSystemFont, mMonospaceFont,\
    \ mProportionalFont;\n\npublic FontCanvas() { this(Font.STYLE_PLAIN); }\n\npublic\
    \ FontCanvas(int style) { setStyle(style); }\n  public void setStyle(int style)\
    \ {\n    mSystemFont = Font.getFont(Font.FACE_SYSTEM,\n        style, Font.SIZE_MEDIUM);\n\
    \    mMonospaceFont = Font.getFont(Font.FACE_MONOSPACE,\n        style, Font.SIZE_MEDIUM);\n\
    \    mProportionalFont = Font.getFont(Font.FACE_PROPORTIONAL,\n        style,\
    \ Font.SIZE_MEDIUM);\n  }\n\npublic boolean isBold() {\n    return mSystemFont.isBold();\n\
    \  }\n  public boolean isItalic() {\n    return mSystemFont.isItalic();\n  }\n\
    \  public boolean isUnderline() {\n    return mSystemFont.isUnderlined();\n  }\n\
    \npublic void paint(Graphics g) {\n    int w = getWidth();\n    int h = getHeight();\n\
    \n// 清除 Canvas。\n    g.setGrayScale(255);\n    g.fillRect(0, 0, w - 1, h - 1);\n\
    \    g.setGrayScale(0);\n    g.drawRect(0, 0, w - 1, h - 1);\n\nint x = w / 2;\n\
    \    int y = 20;\n\ny += showFont(g, \"System\", x, y, mSystemFont);\n    y +=\
    \ showFont(g, \"Monospace\", x, y, mMonospaceFont);\n    y += showFont(g, \"Proportional\"\
    , x, y, mProportionalFont);\n  }\n\nprivate int showFont(Graphics g, String s,\
    \ int x, int y, Font f) {\n    g.setFont(f);\n    g.drawString(s, x, y, Graphics.TOP\
    \ | Graphics.HCENTER);\n    return f.getHeight();\n  }\n} \n```\n\n要查看此 Canvas\
    \ 的实际效果，你需要一个显示它的 MIDlet。你可以再次修改 Pacer，或者使用以下代码：\n\n```\nimport javax.microedition.lcdui.*;\n\
    import javax.microedition.midlet.*;\n\npublic class FontMIDlet\n    extends MIDlet\n\
    \   implements CommandListener {\n  private FontCanvas mFontCanvas;\n  private\
    \ Command mBoldCommand, mItalicCommand, mUnderlineCommand;\n\npublic FontMIDlet()\
    \ {\n    mFontCanvas = new FontCanvas();\n\nmBoldCommand = new Command(\"粗体\"\
    , Command.SCREEN, 0);\n    mItalicCommand = new Command(\"斜体\", Command.SCREEN,\
    \ 0);\n    mUnderlineCommand = new Command(\"下划线\", Command.SCREEN, 0);\n    Command\
    \ exitCommand = new Command(\"退出\", Command.EXIT, 0);\n\nmFontCanvas.addCommand(mBoldCommand);\n\
    \    mFontCanvas.addCommand(mItalicCommand);\n    mFontCanvas.addCommand(mUnderlineCommand);\n\
    \    mFontCanvas.addCommand(exitCommand);\n    mFontCanvas.setCommandListener(this);\n\
    \  }\n\npublic void startApp() {\n    Display.getDisplay(this).setCurrent(mFontCanvas);\n\
    \  }\n\npublic void pauseApp() {}\n\npublic void destroyApp(boolean unconditional)\
    \ {}\n\npublic void commandAction(Command c, Displayable s) {\n    if (c.getCommandType()\
    \ == Command.EXIT) {\n      notifyDestroyed();\n      return;\n    }\n    boolean\
    \ isBold = mFontCanvas.isBold() ^ (c == mBoldCommand);\n    boolean isItalic =\
    \ mFontCanvas.isItalic() ^ (c == mItalicCommand);\n    boolean isUnderline = mFontCanvas.isUnderline()\
    \ ^\n        (c == mUnderlineCommand);\n\nint style =\n        (isBold ? Font.STYLE_BOLD\
    \ : 0) |\n        (isItalic ? Font.STYLE_ITALIC : 0) |\n        (isUnderline ?\
    \ Font.STYLE_UNDERLINED : 0);\n\nmFontCanvas.setStyle(style);\n    mFontCanvas.repaint();\n\
    \  }\n}\n```\n\n### 测量文本\n\nFont 类可以告诉你关于文本尺寸的有用信息。如果你仔细阅读了前面的示例，你会注意到我们已经使用了其中一个方法\
    \ `getHeight()`。此方法返回一整行文本的高度，可用于定位多行文本。\n\n如果你确实需要知道基线的位置，请调用 `getBaselinePosition()`。此方法返回从文本行顶部到基线的距离。但是，鉴于\
    \ Graphics 中锚点提供的灵活性，你可能永远不需要自己查找基线。\n\nFont 中用于测量文本的其余方法测量各种文本片段的宽度。这些方法的名称和参数与\
    \ Graphics 中的文本绘制方法相同：\n\n```\npublic int charWidth(char ch)\npublic int charsWidth(char\
    \ ch, int offset, int length)\npublic int stringWidth(String str)\npublic int\
    \ substringWidth(String str, int offset, int len)\n```\n\n例如，你可以在字符串周围绘制一个框：\n\
    \n```\nimport javax.microedition.lcdui.*;\n\npublic class BoxTextCanvas\n    extends\
    \ Canvas {\n  private Font mFont;\npublic BoxTextCanvas() {\n    mFont = Font.getFont(Font.FACE_PROPORTIONAL,\n\
    \        Font.STYLE_PLAIN, Font.SIZE_LARGE);\n  }\n\n  public void paint(Graphics\
    \ g) {\n    int w = getWidth();\n    int h = getHeight();\n\n    g.setColor(0xffffff);\n\
    \    g.fillRect(0, 0, w, h);\n    g.setColor(0x000000);\n\n    String s = \"dolce\"\
    ;\n    int stringWidth = mFont.stringWidth(s);\n    int stringHeight = mFont.getHeight();\n\
    \    int x = (w - stringWidth) / 2;\n    int y = h / 2;\n\n    g.setFont(mFont);\n\
    \    g.drawString(s, x, y, Graphics.TOP | Graphics.LEFT);\n    g.drawRect(x, y,\
    \ stringWidth, stringHeight);\n  }\n}\n```\n\n### 绘制图像\n\nGraphics 类包含一个用于绘制图像的方法：\n\
    \n```\npublic void drawImage(Image img, int x, int y, int anchor)\n```\n\n`drawImage()`\
    \ 方法使用锚点，就像文本绘制方法中的锚点一样。可用的锚点略有不同。`BASELINE` 不再是图像垂直锚点的选项，因为基线的概念特定于文本。相反，`VCENTER`\
    \ 是垂直锚点的一个额外选项。图 10-7 显示了锚点的可用组合。\n\n![点击展开](img/fig198_01_0.jpg)\n图 10-7：图像锚点\n\
    \nMIDP 2.0 特别要求支持渲染带有透明度的图像。\n"
- fmt: "### Advanced Image Rendering\n\nIn MIDP 2.0, the `Graphics` class also includes\
    \ a `drawRegion()` method for rendering a region of an image and possibly manipulating\
    \ it at the same time. The method looks like this:\n\n```\npublic void drawRegion(Image\
    \ src,\n    int x_src, int y_src, int width, int height,\n    int transform, int\
    \ x_dest, int y_dest, int anchor)\n```\n\nThe `x_src`, `y_src`, `width`, and `height`\
    \ parameters describe a rectangular region of the image that will be rendered\
    \ on the drawing surface of the `Graphics`. The region is drawn at `x_dest` and\
    \ `y_dest` subject to the `anchor`, just as in the `drawImage()` method.\n\nThe\
    \ `transform` parameter opens up a whole new world of possibilities. It may be\
    \ any of the transformations described by constants in the `Sprite` class, listed\
    \ below. (`Sprite` is part of MIDP 2.0's Game API and is described in the [next\
    \ chapter](#LiB0085_split_000.html#471).)\n\n- `TRANS_NONE`\n- `TRANS_ROT90`\n\
    - `TRANS_ROT180`\n- `TRANS_ROT270`\n- `TRANS_MIRROR`\n- `TRANS_MIRROR_ROT90`\n\
    - `TRANS_MIRROR_ROT180`\n- `TRANS_MIRROR_ROT270`\n\nThe `ROT` transformations\
    \ rotate the source image region by 90, 180, or 270 degrees. The `MIRROR_ROT`\
    \ transformations first mirror the region around its vertical center, then rotate\
    \ the mirrored region.\n\nThe `drawRegion()` method allows easy manipulation and\
    \ display of animation frames that are packed into a single image.\n\n### Images\
    \ as Integer Arrays\n\nYou've already seen how a single color can be represented\
    \ as an integer. By extension, an image can be represented as an array of integers,\
    \ where each integer in the array contains the color for a single pixel in the\
    \ image.\n\nMIDP 2.0 supports rendering integer arrays as images with the following\
    \ method:\n\n```\npublic void drawRGB(int[] rgbData, int offset, int scanlength,\n\
    \    int x, int y, int width, int height,\n    boolean processAlpha) \n```\n\n\
    The image data is contained in the `rgbData` array, starting at `offset`. Consecutive\
    \ rows of data are contained at offsets measured by multiples of `scanlength`.\
    \ The image will be rendered at `x` and `y` with a size defined by `width` and\
    \ `height`.\n\nThe relationship between `width` and `scanlength` is a little confusing\
    \ at first. The following example should clear things up.\n\nConsider the following\
    \ code.\n\n```\n int[] rgbData = {\n           0x123456, 0x123456, 0x123456,\n\
    \           0x000000, 0xffffff, 0xffffff, 0x000000, 0x654321, 0x654321,\n    \
    \       0x000000, 0x000000, 0xffffff, 0x000000, 0x654321, 0x654321,\n        \
    \   0x000000, 0xffffff, 0x000000, 0x000000, 0x654321, 0x654321,\n           0x000000,\
    \ 0xffffff, 0xffffff, 0x000000, 0x654321, 0x654321\n         };\n\n         g.drawRGB(rgbData,\
    \ 3, 6, 10, 10, 4, 4, false);\n```\n\nThis code produces the very small image\
    \ shown at great magnification in [Figure 10-8](#LiB0078.html#ch10fig08). The\
    \ first three elements of the array are ignored by passing an `offset` of 3. Although\
    \ the image width is 4 pixels, each row of data is separated by 6 positions in\
    \ the integer array. The image will be rendered at 10, 10, with a size of 4 by\
    \ 4 pixels.\n\n![](fig200_01.jpg)\nFigure 10-8: A very small image\n\nThe final\
    \ parameter in the `drawRGB()` method, `processAlpha`, indicates whether the integer\
    \ array is considered to contain an alpha (opacity) component. If the parameter\
    \ is `false`, every pixel of the image is considered fully opaque. If `processAlpha`\
    \ is `true`, the opacity of each pixel is determined by the high-order byte of\
    \ the integer value and the pixel's color will be blended with the drawing surface\
    \ appropriately. An alpha value of 0 is fully transparent, while an alpha value\
    \ of 255 is fully opaque.\n\n### Blitting in MIDP 2.0\n\n*Blitting*, the copying\
    \ of one region of the screen to another location, is a crucial operation for\
    \ some types of games. The MIDP 2.0 `Graphics` class includes one method for blitting:\n\
    \n```\npublic void copyArea(int x_src, int y_src, int width, int height,\n   \
    \ int x_dest, int y_dest, int anchor)\n```\n\nThis method is pretty self-explanatory.\
    \ It copies a portion of the screen, described by `x_src`, `y_src`, `width`, and\
    \ `height`, to a destination described by `x_dest`, `y_dest`, and `anchor`. The\
    \ anchor works the same as for the `drawImage()` method.\n\nThis method works\
    \ only on a `Graphics` object that does not draw directly to the screen. A `Graphics`\
    \ object that draws to an image is fine, as is a `Graphics` object that works\
    \ on a double-buffered `Canvas`. A `Graphics` object from `GameCanvas`'s `getGraphics()`\
    \ method will also work. By contrast, a `Graphics` object for a non-double-buffered\
    \ `Canvas` will throw an `IllegalStateException` if the `copyArea()` method is\
    \ called. (See the upcoming section on double buffering for more information on\
    \ the technique.)\n\n### Clipping\n\n`Graphics` maintains a rectangular *clipping\
    \ shape*. The clipping shape limits drawing, such that any drawing that takes\
    \ place outside of the clipping shape will not be displayed. It's kind of like\
    \ painting through a stencil, except you can only use a rectangular stencil. If\
    \ you were writing a game that had some kind of border on the game board, you\
    \ might set the clipping rectangle to be the inside of the game board, so that\
    \ no drawing could overwrite the border.\n\nYou can find out the current clipping\
    \ rectangle by calling `getClipX()`, `getClipY()`, `getClipWidth()`, and `getClipHeight()`.\n\
    \nIf you would like to modify the clipping rectangle, there are two methods that\
    \ you can use. First, you can set the clipping rectangle directly by calling the\
    \ following method:\n\n```\npublic void setClip(int x, int y, int width, int height);\n\
    ```\n\nThe other possibility is to limit the current clipping rectangle with another\
    \ rectangle. The following method takes the intersection of the current clipping\
    \ rectangle and the supplied rectangle and uses it to set the new clipping rectangle:\n\
    \n```\npublic void clipRect(int x, int y, int width, int height); \n```\n\n##\
    \ Key Events\n\n`Canvas` handles events at a lower level than the other `Displayable`\
    \ subclasses. Although you can add `Commands` and respond to them, `Canvas` also\
    \ includes a set of methods that handle interaction with the individual keys of\
    \ a device.\n\nThe following methods are called whenever the user presses and\
    \ releases a key.\n\n```\nprotected void keyPressed(int keyCode)\nprotected void\
    \ keyReleased(int keyCode)\n```\n\nThe key code that is passed to these methods\
    \ will most likely be one of the constants defined in `Graphics`, from `KEY_NUM0`\
    \ through `KEY_NUM9` and including `KEY_STAR` and `KEY_POUND`. Devices may have\
    \ more keys than this, which will be returned as device-specific key codes. Assuming\
    \ there's an obvious mapping between the key and some Unicode character, the rule\
    \ of thumb is that a key should have a code equal to its Unicode character value.\
    \ Keys that don't have a Unicode mapping should use negative values. This means\
    \ that, given a positive key code, you can find out the corresponding Unicode\
    \ character by casting the `int` key code to `char`.\n\nNote that key presses\
    \ and key releases are separate events, which allows you considerable flexibility\
    \ in how you design your user interface. The time between the press and the release\
    \ could determine how high a game character jumps or how powerful a laser blast\
    \ will be.\n\nDepending on the device and the MIDP implementation, a key that\
    \ is held down may spit out repeated key events. You can find out if repeated\
    \ keys are supported by calling `hasRepeatEvents()`. If repeated key events are\
    \ supported, the `keyRepeated()` method will be called with these events.\n\n\
    Finally, you can find a text description of a given key code by calling `getKeyName()`.\n\
    \nIn MIDP 2.0, the Game API offers a mechanism to bypass the key event callback\
    \ methods. You can poll the state of the device's keys directly using a method\
    \ in `GameCanvas`. For more information, see the following chapter."
