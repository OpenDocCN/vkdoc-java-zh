  trans: "\n### 响应项目变更\n\n表单中的大多数项目在用户更改时都会触发事件。您的应用程序可以通过以下方法向表单注册 `ItemStateListener`\
    \ 来监听这些事件：\n\n```\npublic void setItemStateListener(ItemStateListener iListener)\n\
    ```\n\n`ItemStateListener` 是一个包含单个方法的接口。每当表单中的项目发生更改时，都会调用此方法：\n\n```\npublic\
    \ void itemStateChanged(Item item)\n```\n\n清单 6-3 创建了一个包含两个项目的表单：一个交互式仪表盘和一个字符串项目。当您调整仪表盘时，其值会通过\
    \ `ItemStateListener` 机制反映在字符串项目中。\n\n清单 6-3：*GaugeTracker* 源代码\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\nimport javax.microedition.midlet.*;\nimport javax.microedition.lcdui.*;\n\
    \npublic class GaugeTracker\n    extends MIDlet\n    implements ItemStateListener,\
    \ CommandListener {\n  private Gauge mGauge;\n  private StringItem mStringItem;\n\
    \  public GaugeTracker() {\n    int initialValue = 3;\n    mGauge = new Gauge(\"\
    GaugeTitle\", true, 5, initialValue);\n    mStringItem = new StringItem(null,\
    \ \"[value]\");\n    itemStateChanged(mGauge);\n  }\n\n  public void itemStateChanged(Item\
    \ item) {\n    if (item == mGauge)\n      mStringItem.setText(\"Value = \" + mGauge.getValue());\n\
    \  }\n\n  public void commandAction(Command c, Displayable s) {\n    if (c.getCommandType()\
    \ == Command.EXIT)\n      notifyDestroyed();\n  }\n\n  public void startApp()\
    \ {\n    Form form = new Form(\"GaugeTracker\");\n    form.addCommand(new Command(\"\
    Exit\", Command.EXIT, 0));\n    form.setCommandListener(this);\n    // 现在添加选定的项目。\n\
    \    form.append(mGauge);\n    form.append(mStringItem);\n    form.setItemStateListener(this);\n\
    \n    Display.getDisplay(this).setCurrent(form);\n  }\n\n  public void pauseApp()\
    \ {}\n\n  public void destroyApp(boolean unconditional) {}\n} \n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n## 总结\n\n本章介绍了 MIDP 的高级用户界面屏幕：列表和表单。列表是一个元素列表，允许单选或多选。您提供项目——具体实现负责决定如何显示它们、用户如何导航以及用户如何选择项目。表单是由一系列项目构建的通用屏幕。MIDP\
    \ API 提供了一个便捷的项目工具箱——从简单的字符串和图像项目到更复杂的日期字段和选择组类。\n\n尽管列表和表单功能非常强大，但您应谨慎使用它们，尤其是表单。小型设备屏幕较小，因此您不应在每个屏幕中放置过多信息，尤其是当这会导致用户频繁上下滚动时。此外，易用性对于手机和寻呼机等消费类设备至关重要。请确保您的界面简洁、直观且尽可能简单。\n\
    \n# 第 7 章：自定义项目\n\n在上一章中，您了解了表单，它是 `javax.microedition.lcdui.Screen` 最灵活、最强大的子类。表单本质上是项目的集合。MIDP\
    \ API 包含一个完整的项目子类工具箱，从文本和图像显示到交互式日期字段和仪表盘，一应俱全。\n\nMIDP 2.0 通过允许您定义自己的项目，提供了更强大的功能。在本章中，您将学习如何创建能够自行绘制并响应用户输入的项目。\n\
    \n## 介绍 CustomItem\n\n实现自定义项目的类被恰当地命名为 `CustomItem`。与表单中的所有项目一样，它是 `Item` 的子类。要创建您自己的项目，只需通过实现五个抽象方法来定义\
    \ `CustomItem` 的子类。下面列出的前四个方法与项目*内容区域*的大小有关，该区域是您的代码负责的区域。自定义项目的总区域包括标签和可能的边框，但这些由实现负责。您的\
    \ `CustomItem` 子类仅负责内容区域。\n\n```\nprotected int getPrefContentWidth(int height)\n\
    protected int getPrefContentHeight(int width)\nprotected int getMinContentWidth()\n\
    protected int getMinContentHeight()\n```\n\n前两个方法应返回定义项目*期望*大小的值。当 MIDP 实现布局包含您的项目的表单时，它可能无法满足您的首选大小，但会尽力尝试。实现会将建议的高度和宽度传递给这些方法，以便让您的项目类了解其最终尺寸的大致情况。例如，实现可能会调用您的项目的\
    \ `getPrefContentWidth()` 方法，并将高度参数的值设为 18。这相当于实现向您的项目询问：“如果我将您的高度设为 18，您希望宽度是多少？”\n\
    \n第二对方法应返回有关项目最小尺寸的信息。这是您的项目认为可以容忍的最小尺寸。\n\n具体 `CustomItem` 子类必须定义的第五个方法是 `paint()`\
    \ 方法，实现会调用它来渲染项目。\n\n```\nprotected void paint(Graphics g, int w, int h)\n```\n\
    \n`Graphics` 对象可用于在项目的内容区域绘制线条、形状、文本和图像。`Graphics` 类将在第 10 章中全面介绍；现在，我将仅使用几个简单的方法来演示如何绘制自定义项目。`w`\
    \ 和 `h` 参数表示内容区域的当前宽度和高度。\n\n掌握了这些知识，您可以通过实现上述五个抽象方法并提供构造函数来创建一个简单的 `CustomItem`。清单\
    \ 7-1 展示了这样一个类 `SimpleItem`。该类为最小和首选内容尺寸返回硬编码值，并提供了一个绘制简单三角形图案的 `paint()` 方法。\n\
    \n清单 7-1：一个简单的自定义项目\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport javax.microedition.lcdui.*;\n\
    \npublic class SimpleItem\n    extends CustomItem {\n  public SimpleItem(String\
    \ title) { super(title); }\n\n// CustomItem 抽象方法。\n\npublic int getMinContentWidth()\
    \ { return 100; }\n  public int getMinContentHeight() { return 60; }\n\npublic\
    \ int getPrefContentWidth(int width) {\n    return getMinContentWidth();\n  }\n\
    \npublic int getPrefContentHeight(int height) {\n    return getMinContentHeight();\n\
    \  }\n\npublic void paint(Graphics g, int w, int h) {\n    g.drawRect(0, 0, w\
    \ - 1, h - 1);\n    g.setColor(0x000000ff);\n    int offset = 0;\n    for (int\
    \ y = 4; y < h; y += 12) {\n      offset = (offset + 12) % 24;\n      for (int\
    \ x = 4; x < w; x += 24) {\n        g.fillTriangle(x + offset, y,\n          \
    \             x + offset - 3, y + 6,\n                       x + offset + 3, y\
    \ + 6);\n      }\n    }\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n\
    我不会让您自己编写 MIDlet 来查看您的新项目。清单 7-2 展示了一个使用 `SimpleItem` 的 MIDlet：\n\n清单 7-2：演示 *SimpleItem*\
    \ 的 MIDlet\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport javax.microedition.midlet.*;\n\
    import javax.microedition.lcdui.*;\n\npublic class SimpleItemMIDlet\n    extends\
    \ MIDlet\n    implements CommandListener {\n  public void startApp() {\n    Form\
    \ form = new Form(\"SimpleItemMIDlet\");\n    form.append(new SimpleItem(\"SimpleItem\"\
    ));\n\nCommand c = new Command(\"Exit\", Command.EXIT, 0);\n    form.addCommand(c);\n\
    \    form.setCommandListener(this);\n\nDisplay.getDisplay(this).setCurrent(form);\n\
    \  }\n\npublic void pauseApp() {}\n\npublic void destroyApp(boolean unconditional)\
    \ {}\n\npublic void commandAction(Command c, Displayable s) {\n    if (c.getCommandType()\
    \ == Command.EXIT)\n      notifyDestroyed();\n  }\n} \n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n图 7-1 展示了此 MIDlet 的运行效果。\n\n![](img/fig126_01.jpg)\n图 7-1：一个简单的自定义项目\n"
- fmt: "# CustomItem Painting\n\nAs you've seen, a `CustomItem` is drawn on the screen\
    \ in its `paint()` method. This method is passed a `Graphics` object that serves\
    \ two purposes. First, it represents the drawing surface of the `CustomItem`'s\
    \ content area. Second, it provides numerous methods for drawing shapes, images,\
    \ and text. I won't cover all of these methods until [Chapter 10](#LiB0075_split_000.html#408),\
    \ but you'll see a couple of them in the examples in this chapter: for instance,\
    \ `drawString()` renders text, while `drawLine()` renders a straight line.\n\n\
    The `paint()` method is an example of a *callback*, a method in your code that\
    \ is called by the MIDP implementation. The implementation calls `paint()` whenever\
    \ it needs to show your custom item on the screen. It calls other methods to find\
    \ out the minimum and preferred sizes of your component when its containing form\
    \ is being laid out. It's the implementation's job to show the whole screen; it\
    \ just calls your `paint()` method to show the part of the screen occupied by\
    \ your custom item. You don't tell the implementation when to draw your item;\
    \ you just tell it that your item is part of a form and then it figures out how\
    \ to show everything.\n\nIf something needs to change in your custom item's appearance,\
    \ you can request a refresh by calling the `repaint()` method. This method signals\
    \ to the implementation that your item needs to be drawn. In response, the implementation\
    \ will soon call the `paint()` method again. For optimized drawing, you may only\
    \ wish to redraw part of the item. In this case, use `repaint(int x, int y, int\
    \ width, int height)` to describe a rectangular region of the item that needs\
    \ to be drawn.\n\nTwo methods return information that can help you make your item's\
    \ appearance consistent with the device's look and feel. The first is `getColor()`\
    \ in the `Display` class. This method returns an `int` representing a color when\
    \ you supply one of the following constants:\n\n* `COLOR_BACKGROUND`\n* `COLOR_BORDER`\n\
    * `COLOR_FOREGROUND`\n* `COLOR_HIGHLIGHTED_BACKGROUND`\n* `COLOR_HIGHLIGHTED_BORDER`\n\
    * `COLOR_HIGHLIGHTED_FOREGROUND`\n\nFor example, you could set the current drawing\
    \ color to the system's highlighted foreground color with the following code:\n\
    \n```\npublic void paint(Graphics g) {\n  // Display mDisplay = ...\n  int fhc\
    \ = mDisplay.getColor(\n      Display.COLOR_HIGHLIGHTED_FOREGROUND);\n  g.setColor(fhc);\n\
    \  // Draw stuff ...\n}\n```\n\nSimilarly, if you want any text drawn by your\
    \ custom item to harmonize with other items in a `Form`, you can retrieve an appropriate\
    \ `Font` using the following method in the `Font` class:\n\n```\npublic static\
    \ Font getFont(int fontSpecifier)\n```\n\nJust pass either `FONT_STATIC_TEXT`\
    \ or `FONT_INPUT_TEXT` and this method returns an appropriate `Font` object that\
    \ you can use for drawing text. The following code shows how to use an appropriate\
    \ font for drawing user-editable text:\n\n```\npublic void paint(Graphics g) {\n\
    \  Font f = Font.getFont(Font.FONT_INPUT_TEXT);\n  g.setFont(f);\n  // Draw text\
    \ ...\n}\n```\n\nI'll cover `Font` in detail in [Chapter 10](#LiB0075_split_000.html#408).\
    \ In brief, a `Font` determines the appearance of text that is drawn on the screen.\n\
    \n## Showing, Hiding, and Sizing\n\nWhen a `CustomItem` is made visible, even\
    \ partially visible, its `showNotify()` method is called by the MIDP implementation.\
    \ You can expect subsequent calls to `paint()` to render the item. Similarly,\
    \ `hideNotify()` is called when the item is no longer visible (if the user has\
    \ scrolled the item off the screen, for example).\n\nThe size of your custom item\
    \ may be changed by the implementation, perhaps if the containing `Form` gets\
    \ laid out again in response to changing content. In this case, your item's `sizeChanged()`\
    \ method is called with the new width and height of the content area.\n\nSimilarly,\
    \ your custom item may decide that it needs to be a different size. In this case,\
    \ your item should call the `invalidate()` method, which signals the implementation\
    \ that it may need to lay out the containing `Form` again.\n\n## Handling Events\n\
    \nA `CustomItem` can respond to keyboard and pointer events by overriding any\
    \ or all of the following methods:\n\n```\nprotected void keyPressed(int keyCode)\n\
    protected void keyReleased(int keyCode)\nprotected void keyRepeated(int keyCode)\n\
    protected void pointerPressed(int x, int y)\nprotected void pointerReleased(int\
    \ x, int y)\nprotected void pointerDragged(int x, int y)\n```\n\nThese methods\
    \ are called in response to the user's actions. The `keyCode` parameter will most\
    \ likely be one of the constants defined in the `Canvas` class: `KEY_NUM0` through\
    \ `KEY_NUM9`, `KEY_POUND`, or `KEY_STAR`. The `CustomItem` class also supports\
    \ a handy mechanism called *game actions*, which maps device-specific keys to\
    \ device-independent actions. The `getGameAction()` method performs this mapping.\
    \ For a full discussion of game actions, see [Chapter 10](#LiB0075_split_000.html#408).\n\
    \nThe pointer callback methods supply the location of the pointer event as a pair\
    \ of coordinates relative to the custom item's content area.\n\nDevices have varying\
    \ capabilities, and some may not be able to deliver certain types of events to\
    \ `CustomItems`. Many phones, for example, will not support pointer events. To\
    \ find out the capabilities of the device at runtime, custom items use the `getInteractionModes()`\
    \ method. This method returns some combination of the following constants (defined\
    \ in `CustomItem`):\n\n* `KEY_PRESS`\n* `KEY_RELEASE`\n* `KEY_REPEAT`\n* `POINTER_PRESS`\n\
    * `POINTER_RELEASE`\n* `POINTER_DRAG`\n* `TRAVERSE_HORIZONTAL`\n* `TRAVERSE_VERTICAL`\n\
    \nExcept for the traversal items (which are covered in the [next section](#LiB0051.html#290)),\
    \ the combination of values returned from `getInteractionModes()` corresponds\
    \ directly to which callbacks are likely to be invoked in your custom item. You\
    \ can use this information to build a `CustomItem` that will work under any circumstances.\
    \ For example, in the unlikely event that a device was unable to deliver both\
    \ key and pointer events to a custom item, you could supply a `Command` on the\
    \ item to invoke a separate editing screen."
