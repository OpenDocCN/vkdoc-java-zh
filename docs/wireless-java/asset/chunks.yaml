    ## Collections


    Although the full J2SE Collections API is not supported by CLDC, the old familiar
    `Vector` and `Hashtable` classes remain, as well as the lesser-known `Stack`.
    If you are familiar with the J2SE SDK `Vector` and `Hashtable` classes, you should
    have no trouble with them in MIDP.


    ## Timers


    MIDP includes the `Timer` and `TimerTask` classes that were introduced into J2SE
    in the 1.3 version of the SDK. These are the only J2SE classes that are not included
    in the CLDC but are included in MIDP.


    `Timer`''s API is identical to the J2SE version with one exception. The constructor
    that specifies whether the thread is a daemon is missing, as daemon threads are
    not supported in MIDP. The `TimerTask` API is exactly the same in the J2SE SDK
    and MIDP.'
