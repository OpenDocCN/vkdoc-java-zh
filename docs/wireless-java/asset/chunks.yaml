  trans: "\n## 概述\n\nMIDP 2.0 包含基本的音频功能。MIDP 2.0 中的媒体 API 是移动媒体 API（MMAPI）的严格子集，后者是一个更通用的多媒体渲染\
    \ API。有关 MMAPI 的完整详细信息，请参阅以下规范：\n\n[`jcp.org/jsr/detail/135.jsp`](http://jcp.org/jsr/detail/135.jsp)\n\
    \nMMAPI 本身类似于 Java 媒体框架（JMF）的袖珍版本，JMF 是 J2SE 的一个可选包。有关 JMF 的更多信息，请访问：\n\n[`java.sun.com/products/java-media/jmf/`](http://java.sun.com/products/java-media/jmf/)\n\
    \nMIDP 2.0 中包含的 MMAPI 子集称为音频构建模块（ABB）。它包含播放简单音调和采样音频的功能。ABB 在 `javax.microedition.media`\
    \ 和 `javax.microedition.media.control` 包中实现。本章首先提供可运行的代码示例，然后退一步解释一些概念，并更仔细地深入探讨这些\
    \ API。\n\n## 快速入门\n\n你可以通过调用 `javax.microedition.media.Manager` 中的以下方法来播放音调：\n\
    \n```\npublic static void playTone(int note, int duration, int volume)\n```\n\n\
    在此方法中，`note` 的指定方式与 MIDI 音符类似，每个整数对应钢琴键盘上的一个琴键。中央 C 是 60，中央 C 上方的 A（440 Hz 音调）是\
    \ 69。`duration` 以毫秒为单位，`volume` 的范围可以从 0（静音）到 100（最大音量）。\n\n与 ABB 中的大多数其他方法一样，`playTone()`\
    \ 可能会抛出 `MediaException`。尽管规范要求支持简单音调，但设备可能暂时无法播放音调。（例如，手机可能正在使用音调生成硬件来响铃。）\n\n\
    图 12-1 展示了 `PianoCanvas`，这是一个显示简单钢琴键盘并允许用户浏览琴键以播放不同音调的示例。`PianoCanvas` 的代码见清单\
    \ 12-1。播放音调的代码非常简洁，仅包含在 `keyPressed()` 方法中对 `playTone()` 的调用。其余代码则专注于用户界面。\n\n\
    清单 12-1：*PianoCanvas* 源代码\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport javax.microedition.lcdui.*;\n\
    import javax.microedition.media.*;\n\npublic class PianoCanvas\n    extends Canvas\
    \ {\n  private static final int[] kNoteX = {\n     0, 11, 16, 29, 32, 48, 59,\
    \ 64, 76, 80, 93, 96\n  };\n\nprivate static final int[] kNoteWidth = {\n    16,\
    \ 8, 16, 8, 16, 16, 8, 16, 8, 16, 8, 16\n  };\n\nprivate static final int[] kNoteHeight\
    \ = {\n    96, 64, 96, 64, 96, 96, 64, 96, 64, 96, 64, 96\n  };\n\nprivate static\
    \ final boolean[] kBlack = {\n    false, true, false, true, false,\n        false,\
    \ true, false, true, false, true, false\n  };\n\nprivate int mMiddleCX, mMiddleCY;\n\
    \  private int mCurrentNote;\n\npublic PianoCanvas() {\n    int w = getWidth();\n\
    \    int h = getHeight();\n\nint fullWidth = kNoteWidth[0] * 8;\n    mMiddleCX\
    \ = (w - fullWidth) / 2;\n    mMiddleCY = (h - kNoteHeight[0]) / 2;\n\nmCurrentNote\
    \ = 60;\n  }\n\npublic void paint(Graphics g) {\n    int w = getWidth();\n   \
    \ int h = getHeight();\n\ng.setColor(0xffffff);\n    g.fillRect(0, 0, w, h);\n\
    \    g.setColor(0x000000);\n\nfor (int i = 60; i <= 72; i++)\n      drawNote(g,\
    \ i);\n\ndrawSelection(g, mCurrentNote);\n  }\n\nprivate void drawNote(Graphics\
    \ g, int note) {\n    int n = note % 12;\n    int octaveOffset = ((note - n) /\
    \ 12 - 5) * 7 * kNoteWidth[0];\n    int x = mMiddleCX + octaveOffset + kNoteX[n];\n\
    \    int y = mMiddleCY;\n    int w = kNoteWidth[n];\n    int h = kNoteHeight[n];\n\
    \nif (isBlack(n))\n      g.fillRect(x, y, w, h);\n    else\n      g.drawRect(x,\
    \ y, w, h);\n  }\n\nprivate void drawSelection(Graphics g, int note) {\n    int\
    \ n = note % 12;\n    int octaveOffset = ((note - n) / 12 - 5) * 7 * kNoteWidth[0];\n\
    \    int x = mMiddleCX + octaveOffset + kNoteX[n];\n    int y = mMiddleCY;\n \
    \   int w = kNoteWidth[n];\n    int h = kNoteHeight[n];\n\nint sw = 6;\n    int\
    \ sx = x + (w - sw) / 2;\n    int sy = y + h - 8;\n    g.setColor(0xffffff);\n\
    \    g.fillRect(sx, sy, sw, sw);\n    g.setColor(0x000000);\n    g.drawRect(sx,\
    \ sy, sw, sw);\n    g.drawLine(sx, sy, sx + sw, sy + sw);\n    g.drawLine(sx,\
    \ sy + sw, sx + sw, sy);\n  }\n\nprivate boolean isBlack(int note) {\n    return\
    \ kBlack[note];\n  }\n\npublic void keyPressed(int keyCode) {\n    int action\
    \ = getGameAction(keyCode);\n    switch (action) {\n      case LEFT:\n       \
    \ mCurrentNote--;\n        if (mCurrentNote < 60)\n          mCurrentNote = 60;\n\
    \        repaint();\n        break;\n      case RIGHT:\n        mCurrentNote++;\n\
    \        if (mCurrentNote > 72)\n          mCurrentNote = 72;\n        repaint();\n\
    \        break;\n      case FIRE:\n        try { Manager.playTone(mCurrentNote,\
    \ 1000, 100); }\n        catch (MediaException me) {}\n        break;\n      default:\n\
    \        break;\n    }\n  }\n} \n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n\
