    \ Configuration (CLDC) 1.0 | [http://jcp.org/jsr/detail/30.jsp](http://jcp.org/jsr/detail/30.jsp)\
    \ |\n| 139 | Connected, Limited Device Configuration (CLDC) 1.1 | [http://jcp.org/jsr/detail/139.jsp](http://jcp.org/jsr/detail/139.jsp)\
    \ |\n| 36 | Connected Device Configuration | [http://jcp.org/jsr/detail/36.jsp](http://jcp.org/jsr/detail/36.jsp)\
    \ |\n\n| **PROFILES** |\n| --- |\n| **JSR** | **NAME** | **URL** |\n| --- | ---\
    \ | --- |\n| 37 | Mobile Information Device Profile 1.0 | [http://jcp.org/jsr/detail/37.jsp](http://jcp.org/jsr/detail/37.jsp)\
    \ |\n| 118 | Mobile Information Device Profile 2.0 | [http://jcp.org/jsr/detail/118.jsp](http://jcp.org/jsr/detail/118.jsp)\
    \ |\n| 75 | PDA Profile 1.0 | [http://jcp.org/jsr/detail/75.jsp](http://jcp.org/jsr/detail/75.jsp)\
    \ |\n| 46 | Foundation Profile | [http://jcp.org/jsr/detail/46.jsp](http://jcp.org/jsr/detail/46.jsp)\
    \ |\n| 129 | Personal Basis Profile | [http://jcp.org/jsr/detail/129.jsp](http://jcp.org/jsr/detail/129.jsp)\
    \ |\n| 62 | Personal Profile | [http://jcp.org/jsr/detail/62.jsp](http://jcp.org/jsr/detail/62.jsp)\
    \ |\n\n| **OPTIONAL APIS** |\n| --- |\n| **JSR** | **NAME** | **URL** |\n| ---\
    \ | --- | --- |\n| 66 | RMI Optional Package | [http://jcp.org/jsr/detail/66.jsp](http://jcp.org/jsr/detail/66.jsp)\
    \ |\n| 82 | Java APIs for Bluetooth | [http://jcp.org/jsr/detail/82.jsp](http://jcp.org/jsr/detail/82.jsp)\
    \ |\n| 120 | Wireless Messaging API | [http://jcp.org/jsr/detail/120.jsp](http://jcp.org/jsr/detail/120.jsp)\
    \ |\n| 135 | Mobile Media API | [http://jcp.org/jsr/detail/135.jsp](http://jcp.org/jsr/detail/135.jsp)\
    \ |\n| 179 | Location API for J2ME | [http://jcp.org/jsr/detail/179.jsp](http://jcp.org/jsr/detail/179.jsp)\
    \ |\n|  \n* * *\n\n|\n\n## Configurations\n\nA configuration specifies a JVM and\
    \ some set of core APIs for a specific family of devices. Currently there are\
    \ two: the Connected Device Configuration (CDC) and the Connected, Limited Device\
    \ Configuration (CLDC).\n\n### Connected Device Configuration\n\nA *connected\
    \ device* has, at a minimum, 512KB of read-only memory (ROM), 256KB of random\
    \ access memory (RAM), and some kind of network connection. The CDC is designed\
    \ for devices like television set-top boxes, car navigation systems, and high\
    \ end PDAs. The CDC specifies that a full JVM (as defined in the Java Virtual\
    \ Machine Specification, 2^(nd) edition) must be supported.\n\nThe configurations\
    \ and profiles of J2ME are generally described in terms of their memory capacity.\
    \ Usually a minimum amount of ROM and RAM is specified. For small devices, it\
    \ makes sense to think in terms of volatile and non-volatile memory. The *non-volatile\
    \ memory* is capable of keeping its contents intact as the device is turned on\
    \ and off. ROM is one type, but non-volatile memory could also be flash memory\
    \ or battery-backed RAM. *Volatile memory* is essentially workspace and does not\
    \ maintain its contents when the device is turned off.\n\nThe CDC is being developed\
    \ under the Java Community Process. For more information on the CDC, see [http://java.sun.com/products/cdc/](http://java.sun.com/products/cdc/).\
    \ A Linux reference implementation is available.\n\nThe CDC is the basis of the\
    \ Personal Profile stack. The Personal Profile is the next generation of PersonalJava,\
    \ a Java application environment that is similar to JDK 1.1.8."
  trans: "\n## 理解 J2ME\n\nJ2ME 并非一个具体的软件或规范，它仅指用于小型设备的 Java。小型设备的范围从寻呼机、手机和个人数字助理（PDA），一直到接近台式电脑的机顶盒等设备。\n\
    \nJ2ME 分为*配置*、*简表*和*可选 API*，它们提供了关于 API 和不同设备系列的特定信息。配置是基于内存限制和处理器能力为特定类型的设备设计的。它指定了一个可以轻松移植到支持该配置的设备上的\
    \ Java 虚拟机（JVM）。它还指定了将在该平台上使用的 Java 2 平台标准版（J2SE）API 的某个子集，以及可能需要的附加 API。\n\n\
    简表比配置更具体。简表基于配置，并添加了用于用户界面、持久化存储以及开发运行应用程序所需的其他任何功能的 API。\n\n可选 API 定义了可能包含在特定配置中的特定附加功能。在设备上实现的整个组合——配置、简表以及可选\
    \ API——被称为一个*栈*。例如，未来可能的设备栈可能是 CLDC/MIDP + 移动媒体 API。有关 JSR 185 的信息，请参阅后面关于平台标准化的章节，该章节将定义标准的\
    \ J2ME 栈。\n\n目前，有几种配置和简表，如图 1-1 所示。\n\n![点击展开](img/fig20_01_0.jpg)\n图 1-1：J2ME\
    \ 世界\n\n| **![开始侧边栏](img/_1.gif)** |\n\n**Java 社区进程\n\nJava 社区进程（JCP）旨在确保 Java\
    \ 技术根据社区共识进行开发。该进程描述如下：\n\n[`jcp.org/introduction/overview/`](http://jcp.org/introduction/overview/)\n\
    \n配置和简表最初以 Java 规范请求（JSR）的形式出现。您可以在此处查看当前 JSR 的列表：\n\n[`jcp.org/jsr/all/`](http://jcp.org/jsr/all/)\n\
    \n| **![结束侧边栏](img/_1.gif)** |\n\n|  |\n\n为了让您了解 J2ME 世界的动态，表 1-1 展示了一些可用和正在开发中的配置、简表和可选\
    \ API。这不是一个完整的列表；更多信息，请访问 JCP 网站 [`jcp.org/`](http://jcp.org/)。\n\n表 1-1：J2ME\
    \ 配置、简表和可选 API\n\n| **配置** |\n| --- |\n| **JSR** | **名称** | **URL** |\n| --- |\
    \ --- | --- |\n| 30 | 连接有限设备配置（CLDC）1.0 | [`jcp.org/jsr/detail/30.jsp`](http://jcp.org/jsr/detail/30.jsp)\
    \ |\n| 139 | 连接有限设备配置（CLDC）1.1 | [`jcp.org/jsr/detail/139.jsp`](http://jcp.org/jsr/detail/139.jsp)\
    \ |\n| 36 | 连接设备配置 | [`jcp.org/jsr/detail/36.jsp`](http://jcp.org/jsr/detail/36.jsp)\
    \ |\n\n| **简表** |\n| --- |\n| **JSR** | **名称** | **URL** |\n| --- | --- | ---\
    \ |\n| 37 | 移动信息设备简表 1.0 | [`jcp.org/jsr/detail/37.jsp`](http://jcp.org/jsr/detail/37.jsp)\
    \ |\n| 118 | 移动信息设备简表 2.0 | [`jcp.org/jsr/detail/118.jsp`](http://jcp.org/jsr/detail/118.jsp)\
    \ |\n| 75 | PDA 简表 1.0 | [`jcp.org/jsr/detail/75.jsp`](http://jcp.org/jsr/detail/75.jsp)\
    \ |\n| 46 | 基础简表 | [`jcp.org/jsr/detail/46.jsp`](http://jcp.org/jsr/detail/46.jsp)\
    \ |\n| 129 | 个人基础简表 | [`jcp.org/jsr/detail/129.jsp`](http://jcp.org/jsr/detail/129.jsp)\
    \ |\n| 62 | 个人简表 | [`jcp.org/jsr/detail/62.jsp`](http://jcp.org/jsr/detail/62.jsp)\
    \ |\n\n| **可选 API** |\n| --- |\n| **JSR** | **名称** | **URL** |\n| --- | --- |\
    \ --- |\n| 66 | RMI 可选包 | [`jcp.org/jsr/detail/66.jsp`](http://jcp.org/jsr/detail/66.jsp)\
    \ |\n| 82 | Java 蓝牙 API | [`jcp.org/jsr/detail/82.jsp`](http://jcp.org/jsr/detail/82.jsp)\
    \ |\n| 120 | 无线消息 API | [`jcp.org/jsr/detail/120.jsp`](http://jcp.org/jsr/detail/120.jsp)\
    \ |\n| 135 | 移动媒体 API | [`jcp.org/jsr/detail/135.jsp`](http://jcp.org/jsr/detail/135.jsp)\
    \ |\n| 179 | J2ME 位置 API | [`jcp.org/jsr/detail/179.jsp`](http://jcp.org/jsr/detail/179.jsp)\
    \ |\n|  \n* * *\n\n|\n\n## 配置\n\n配置为特定设备系列指定了一个 JVM 和一组核心 API。目前有两种：连接设备配置（CDC）和连接有限设备配置（CLDC）。\n\
    \n### 连接设备配置\n\n一个*连接设备*至少拥有 512KB 的只读存储器（ROM）、256KB 的随机存取存储器（RAM）以及某种网络连接。CDC\
    \ 是为电视机顶盒、汽车导航系统和高档 PDA 等设备设计的。CDC 规定必须支持完整的 JVM（如《Java 虚拟机规范》第二版所定义）。\n\nJ2ME\
    \ 的配置和简表通常根据其内存容量来描述。通常会指定 ROM 和 RAM 的最小数量。对于小型设备，从易失性和非易失性内存的角度来考虑是合理的。*非易失性内存*能够在设备开关机时保持其内容不变。ROM\
    \ 是一种类型，但非易失性内存也可以是闪存或电池供电的 RAM。*易失性内存*本质上是工作空间，当设备关闭时，它不会保持其内容。\n\nCDC 正在 Java\
    \ 社区进程下开发。有关 CDC 的更多信息，请参见 [`java.sun.com/products/cdc/`](http://java.sun.com/products/cdc/)。有一个\
    \ Linux 参考实现可用。\n\nCDC 是个人简表栈的基础。个人简表是 PersonalJava 的下一代产品，PersonalJava 是一个类似于\
    \ JDK 1.1.8 的 Java 应用程序环境。\n"
- fmt: '### Connected, Limited Device Configuration


    `CLDC` is the configuration that interests us, because it encompasses mobile phones,
    pagers, PDAs, and other devices of similar size. `CLDC` is aimed at smaller devices
    than the `CDC`. The name is a little misleading; really, the `CLDC` is designed
    for a small device with a limited network connection—"Limited Connection Device
    Configuration" might have been more accurate.


    The `CLDC` is designed for devices with 160KB to 512KB of memory available for
    the Java platform. If you''ve ever watched `J2SE` gobble up tens of megabytes
    of memory on your desktop computer, you''ll appreciate the challenge of `J2ME`.
    The "limited connection" simply refers to a network connection that is intermittent
    and probably not very fast. (Most mobile telephones, for example, typically achieve
    data rates of 9.6Kbps.) Between the small screen size, limited memory, and slow
    network connection, applications designed in the `CLDC` space should be very sparing
    with the use of the network connection.


    The `CLDC` is based around a small `JVM` called the `KVM`. Its name comes from
    the fact that it is a `JVM` whose size is measured in kilobytes rather than megabytes.
    While the `CLDC` is a specifications document, the `KVM` refers to a specific
    piece of software. ^([[1](#LiB0005.html#ftn.N67)]) Because of its small size,
    the `KVM` can''t do everything a `JVM` does in the `J2SE` world.


    - Native methods cannot be added at runtime. All native functionality is built
    into the `KVM`.

    - The `KVM` only includes a subset of the standard bytecode verifier. This means
    that the task of verifying classes is split between the `CLDC` device and some
    external mechanism. This has serious security implications, as we''ll discuss
    later.


    You can find more information at the `CLDC` home page, [http://java.sun.com/products/cldc/](http://java.sun.com/products/cldc/).
    Most deployed devices implement `CLDC 1.0`, but `CLDC 1.1` is almost complete
    as this is written. `CLDC 1.1` includes enhancements to `CLDC 1.0`, including
    support for floating-point data types.


    ### Platform Standardization


    Given the profusion of configurations, profiles, and especially optional APIs,
    how do you know what APIs are likely to be available on typical devices? Sun''s
    answer to this question is `JSR 185` ([http://jcp.org/jsr/detail/185.jsp](http://jcp.org/jsr/detail/185.jsp)),
    impressively titled *Java Technology for the Wireless Industry*. This specification
    aims to standardize software stacks to bring coherence to the `J2ME` world.


    In the next generation of `J2ME`, a concept called Building Blocks is supposed
    to replace configurations and profiles. A *Building Block* is just some subset
    of a `J2SE` API. For example, one Building Block might be created from a subset
    of the `J2SE` `java.io` package. Conceptually, a Building Block represents a smaller
    chunk of information than a configuration. Profiles, then, will be built on top
    of a set of Building Blocks rather than a configuration.


    The definition of Building Blocks is a `JSR`, which is briefly described here:
    [http://jcp.org/jsr/detail/68.jsp](http://jcp.org/jsr/detail/68.jsp). Progress
    on `JSR 68` has been extremely slow since its creation in June 2000. I suggest
    keeping your eyes on `JSR 185` instead.


    ^([[1](#LiB0005.html#N67)])The `KVM` was originally part of the Spotless system,
    a Sun research project. See [http://www.sun.com/research/spotless/](http://www.sun.com/research/spotless/).


    ## Profiles


    A profile is layered on top of a configuration (and someday, perhaps, on Building
    Blocks), adding the APIs and specifications necessary to develop applications
    for a specific family of devices.


    ### Current Profiles


    Several different profiles are being developed under the Java Community Process.
    [Table 1-1](#LiB0004_split_001.html#30) (shown earlier) provides a bird''s-eye
    view.


    The Foundation Profile is a specification for devices that can support a rich
    networked `J2ME` environment. It does not support a user interface; other profiles
    can be layered on top of the Foundation Profile to add user interface support
    and other functionality.


    Layered on top of the Foundation Profile are the Personal Basis Profile and the
    Personal Profile. The combination of `CDC` + Foundation Profile + Personal Basis
    Profile + Personal Profile is designed as the next generation of the PersonalJava
    application runtime environment (see [http://java.sun.com/products/personaljava/](http://java.sun.com/products/personaljava/)).
    As such, the Personal Profile has the specific goal of backward compatibility
    with previous versions of PersonalJava.


    The PDA Profile (`PDAP`), which is built on `CLDC`, is designed for palmtop devices
    with a minimum of 512KB combined ROM and RAM (and a maximum of 16MB). It sits
    midway between the Mobile Information Device Profile (`MIDP`) and the Personal
    Profile. It includes an application model based on MIDlets but uses a subset of
    the `J2SE` Abstract Windowing Toolkit (`AWT`) for graphic user interface. Although
    the `PDAP` specification is nearly finished, to my knowledge no hardware manufacturer
    has announced that it will be implementing `PDAP`. The `J2ME` world currently
    is covered by `MIDP` on the small end and Personal Profile on the higher end.


    ### Mobile Information Device Profile


    The focus of this book is the Mobile Information Device Profile (`MIDP`). According
    to the specification, a Mobile Information Device has the following characteristics:


    - 128KB of non-volatile memory for the `MIDP` implementation

    - 32KB of volatile memory for the runtime heap

    - 8KB of non-volatile memory for persistent data

    - A screen of at least 96 × 54 pixels

    - Some capacity for input, either by keypad, keyboard, or touch screen

    - Two-way network connection, possibly intermittent


    Try to imagine a device that might be a `MIDP` device: mobile telephones and advanced
    pagers are right in the groove, but entry-level PDAs could also fit this description.


    More information about `MIDP`, including a link to the official specification
    document, is at [http://java.sun.com/products/midp/](http://java.sun.com/products/midp/).


    This book covers both `MIDP 1.0` and `MIDP 2.0`. `MIDP 2.0` features numerous
    enhancements, including support for multimedia, a new game user interface API,
    support for HTTPS connection, and other features. It is fully backward compatible
    with `MIDP 1.0`. I will indicate features that are specific to `MIDP 2.0` throughout
    the rest of the book.'
