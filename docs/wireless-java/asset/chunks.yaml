    \ ID。最后，`RecordEnumeration` 提供了使其数据与实际的 `RecordStore` 保持同步的可能性。在幕后，这是通过将 `RecordEnumeration`\
    \ 注册为 `RecordStore` 变更的监听器来实现的。\n\n`RecordEnumeration` 的基本操作是遍历一组记录。你可以通过调用 `hasNextElement()`\
    \ 来判断是否存在下一条记录。如果下一条记录存在，你可以通过调用以下方法来检索其数据：\n\n```\npublic byte[] nextRecord()\n\
    \    throws InvalidRecordIDException,\n           RecordStoreNotOpenException,\n\
    \           RecordStoreException\n```\n\n或者，你也可以通过调用以下方法来检索下一条记录的 ID：\n\n```\n\
    public int nextRecordId() throws InvalidRecordIDException\n```\n\n不过，你无法两全其美；`nextRecord()`\
    \ 和 `nextRecordId()` 都会将 `RecordEnumeration` 推进到下一条记录。如果你想同时获取下一条记录的 ID 和数据，你需要先调用\
    \ `nextRecordId()`，然后直接从 `RecordStore` 中检索记录数据。\n\n`RecordEnumeration` 的一个典型用法是直接遍历选定的记录，如下所示：\n\
    \n```\n// 打开一个 RecordStore rs\n// 创建一个 RecordFilter rf\n// 创建一个 RecordComparator\
    \ rc\n\nRecordEnumeration re = rs.enumerateRecords(rf, rc, false);\nwhile (re.hasNextElement())\
    \ {\n  byte[] recordBytes = re.nextRecord();\n  // 处理检索到的字节数据。\n}\n```\n\n`RecordFilter`\
    \ 和 `RecordComparator` 都可以为 `null`，在这种情况下，`RecordEnumeration` 将遍历记录存储中的每一条记录。`Preferences`\
    \ 类就是以这种方式使用 `RecordEnumeration` 的。\n\n|  | 注意 | 如果 *RecordComparator* 为 *null*，则\
    \ *RecordEnumeration* 不保证返回记录的排序顺序。 |\n\n当你在选定的记录中移动时，你也可以向后移动。`RecordEnumeration`\
    \ 包含了 `hasPreviousElement()`、`previousRecord()` 和 `previousRecordId()` 方法，它们的工作方式与对应的“下一个”方法相同。\n\
    \n在 `RecordEnumeration` 中移动当前位置的五种方式中，有四种是 `nextRecord()`、`nextRecordId()`、`previousRecord()`\
    \ 或 `previousRecordId()` 方法。第五种方法有点像倒带按钮：`reset()` 将记录指针移回到选定记录的最开始位置。\n\n当你使用完\
    \ `RecordEnumeration` 后，应该释放其资源。你可以通过调用 `destroy()` 来实现，之后 `RecordEnumeration`\
    \ 将不再可用。\n\n### 保持 RecordEnumeration 为最新状态\n\n在多线程环境中，完全有可能在你遍历某个 `RecordStore`\
    \ 的 `RecordEnumeration` 的同时，该 `RecordStore` 发生了变化。有两种方法可以处理这种情况。\n\n第一种方法是调用 `rebuild()`，它会根据你最初指定的\
    \ `RecordFilter` 和 `RecordComparator` 显式地重建 `RecordEnumeration`。\n\n另一种可能性是请求一个能根据底层\
    \ `RecordStore` 的任何变更自动更新的 `RecordEnumeration`。你可以通过将 `RecordStore` 的 `enumerateRecords()`\
    \ 方法的 `keepUpdated` 参数设置为 `true` 来实现这一点。你可以通过调用 `isKeptUpdated()` 来了解 `RecordEnumeration`\
    \ 是否自动更新。此外，你还可以通过调用 `keepUpdated()` 来更改其状态。\n\n自动更新的 `RecordEnumeration` 会将自己作为\
    \ `RecordListener` 注册到底层的 `RecordStore` 中。每次 `RecordStore` 发生变更时，`RecordEnumeration`\
    \ 都会被重建。请记住，这是一项开销很大的操作（就时间而言），因此如果 `RecordStore` 发生多次变更，你将为此付出代价。\n\n## 使用资源文件\n\
    \n资源文件是持久化存储的另一种形式。访问资源文件非常简单，但它们仍然很重要。资源文件可以是图像、文本或其他类型的文件，它们存储在 MIDlet 套件的 JAR\
    \ 文件中。这些文件是只读的。\n\n你可以通过使用 `Class` 中的 `getResourceAsStream()` 方法，将资源文件作为 `InputStream`\
    \ 来访问。典型的用法如下所示：\n\n```\nInputStream in = this.getClass().getResourceAsStream(\"\
    /Robotag-t.png\");\n```\n\n## 总结\n\nMIDP 的持久化存储 API 特意设计得比较抽象，以认识到小型设备可能拥有许多不同的数据存储方法。在\
    \ MIDP 中，持久化存储的核心概念是记录存储，它是一组称为记录的数据位的集合。记录存储实际上是一个微型数据库，但其具体存储方式的细节则留给设备实现去处理。`javax.microedition.rms.RecordStore`\
    \ 类封装了对持久化存储的所有访问。它提供了访问和操作 `RecordStore` 的方法，以及处理单个记录的方法。对于更高级的 `RecordStore`\
    \ 操作，存在一些方法和接口，用于帮助跟踪 `RecordStore` 的变更或执行 `RecordStore` 查询。\n\n# 第 9 章：连接世界\n\
    \n在手机和寻呼机上运行 Java 很酷，但真正的亮点在于让你的 MIDlet 连接到互联网。有了互联网连接，你就可以编写应用程序，从而能够从世界任何地方通过手机访问信息并完成工作。\n"
- fmt: '# The Generic Connection Framework


    The CLDC defines an extremely flexible API for network connections, the *generic
    connection framework*. It''s all contained in the `javax.microedition.io` package
    and based around the `Connection` interface. [Figure 9-1](#LiB0063_split_001.html#ch09fig01)
    details the `Connection` interface and its various child interfaces. Plus signs
    indicate new interfaces in MIDP 2.0.


    [![Click To expand](fig157_01.jpg)](fig157_01_0.jpg)

    Figure 9-1: The `Connection` family tree


    The link between the `Connection` interfaces and reality is a class called `javax.microedition.io.Connector`.
    The basic idea is that you pass a connection string to one of `Connector`''s static
    methods and get back some `Connection` implementation. A *connection string* looks
    something like a URL, but there are various other possibilities. The connection
    string `socket://apress.com:79` might open a TCP/IP connection to `apress.com`
    on port 79, then return a `StreamConnection` implementation.


    MIDP 1.0 simplifies this generic framework considerably by only requiring one
    type of connection, Hypertext Transfer Protocol (HTTP). You pass an HTTP URL to
    `Connector` and get back an implementation of `HttpConnection`. Although MIDP
    1.0-compliant devices may support additional types of connections, HTTP is the
    only one you should depend on. MIDP 2.0 adds mandatory support for HTTPS connections
    (secure HTTP) and standardizes the connection strings for several other types
    of connections. I''ll discuss these new features later in this chapter.


    `HttpConnection`''s methods are detailed in [Figure 9-2](#LiB0063_split_001.html#ch09fig02).
    Most of the methods in `HttpConnection` have to do with details of HTTP, which
    I won''t cover here. I''ll cover everything you need to know to connect to a server
    here, including both GET and POST requests. If you need to dig deeper, you can
    read RFC 2616 (one of the Internet standards documents), available at [http://www.faqs.org/rfcs/rfc2616.html](http://www.faqs.org/rfcs/rfc2616.html).
    Note that MIDP uses a subset of the full HTTP 1.1; only the GET, POST, and HEAD
    commands are required.


    [![Click To expand](fig158_01.jpg)](fig158_01_0.jpg)

    Figure 9-2: The `HttpConnection` interface


    ## Review of HTTP


    This section presents a brief review of the Hypertext Transfer Protocol. The whole
    story is in RFC 2616; this section covers the essentials.


    ### Requests and Responses


    HTTP is built around requests and responses. A client sends a request for a server—something
    like, "Please give me such-and-so HTML page." The server sends back a response—something
    like, "Here''s the file," or "I don''t know what you''re talking about."


    Requests and responses have two parts: headers and content. If you type a URL
    into your browser, the browser creates an HTTP request (mostly headers) and sends
    it to a server. The server finds the requested file and sends it back in an HTTP
    response. The response headers describe things like the type of web server, the
    file type of the response, the length of the response, and other information.
    The response content is the data of the file itself.


    ### Parameters


    Browsers and other HTTP clients request specific named resources from HTTP servers.
    In addition, clients can pass parameters to the server. Parameters are simple
    name and value pairs. For example, a client might send a `userid` parameter with
    a value of `jonathan` to a server. HTTP also supports passing binary data to the
    server in the body of a request, and the Java stream classes make it easy to exchange
    a variety of data types.


    When a browser is the HTTP client, parameters are generally collected from HTML
    forms. You''ve seen these forms, like the one where you fill in your shipping
    address and your credit card number. Form values are sent as parameters to a web
    server when you click the **Submit** or **Next** button on the form.


    The client encodes parameters before they are sent to the server. Parameters are
    passed as name and value pairs; multiple parameters are separated by ampersands.
    The exact way that parameters are encoded is documented in the J2SE documentation
    for `java.net.URLEncoder`. The rules are relatively simple.


    *   The space character is converted to a plus (`+`) sign.

    *   The following characters remain unchanged: lowercase letters a through z,
    uppercase letters A through Z, the numbers 0 through 9, the period (`.`), the
    hyphen (`-`), the asterisk (`*`), and the underscore (`_`).

    *   All other characters are converted into `%xy`, where `xy` is a hexadecimal
    number that represents the low eight bits of the character.


    ### GET, HEAD, and POST


    The simplest HTTP operation is GET. This is what happens when you type a URL into
    your browser. The browser says, "GET me this URL," and the server responds with
    the headers and content of the response.


    With a GET request, parameters are added to the end of the URL in encoded form.
    (Some servers have trouble with very long URLs; if you have a lot of parameters,
    or binary data, you may wish to pass data in the body of the HTTP request.) For
    example, suppose the following URL maps to a servlet or some other serverside
    component of your application:


    [http://jonathanknudsen.com/simple](http://jonathanknudsen.com/simple)


    Adding a parameter is easy. If you want to pass a parameter with a name of `user`
    and a value of `jonathan`, you would use the following URL:


    [http://jonathanknudsen.com/simple?user=jonathan](http://jonathanknudsen.com/simple?user=jonathan)


    Additional name and value pairs can be added, separated by ampersands:


    [http://jonathanknudsen.com/simple?user=jonathan&zip=08540&day=saturday](http://jonathanknudsen.com/simple?user=jonathan&zip=08540&day=saturday)


    The HEAD operation is identical to GET, but the server sends back only the headers
    of the response.


    POST is basically the same as GET, but parameters are handled differently. Instead
    of being pasted on the end of the URL, as they are with GET, the parameters are
    passed as the body of the request. They are encoded in the same way.


    ## Making a Connection with HTTP GET


    Loading data from a server is startlingly simple, particularly if you''re performing
    an HTTP GET. Simply pass a URL to `Connector`''s static `open()` method. The returned
    `Connection` will probably be an implementation of `HttpConnection`, but you can
    just treat it as an `InputConnection`. Then get the corresponding `InputStream`
    and read data to your heart''s content.


    In code, it looks something like this:


    ```

    String url = "http://jonathanknudsen.com/simple";

    InputConnection ic = (InputConnection)Connector.open(url);

    InputStream in = ic.openInputStream();

    // Read stuff from the InputStream

    ic.close();

    ```


    Most of the methods involved can throw a `java.io.IOException`. I''ve omitted
    the `try` and `catch` blocks from the example for clarity.


    That''s all there is to it. You can now connect your MIDlets to the world. The
    story is a little more complicated in MIDP 2.0 because network access is subject
    to security policies on the device. I''ll talk more about this near the end of
    this chapter.


    ### Passing Parameters


    With HTTP GET, all parameters are passed to the server in the body of the URL.
    This makes it easy to send parameters to the server. The following code fragment
    shows how two parameters can be passed:


    ```

    String url = "http://localhost/midp/simple?pOne=one+bit&pTwo=two";

    InputConnection ic = (InputConnection)Connector.open(url);

    InputStream in = ic.openInputStream();

    ```


    The first parameter is named `pOne` and has `one bit` as a value; the second parameter
    is named `pTwo` and has `two` as a value.'
