  \ 不同 | 不同 |\n| Byte | 不同 | 与 CLDC 1.0 相同 |\n| Character | 不同 | 与 CLDC 1.0 相同 |\n\
  | Character.Subset | - | - |\n| Character.UnicodeBlock |  \n```\n-\n```\n\n | -\
  \ |\n| Class | 不同 | 与 CLDC 相同 |\n| ClassLoader | - | - |\n| Compiler | - | - |\n\
  | Double | - | 不同 |\n| Float | - | 不同 |\n| InheritableThreadLocal | - | - |\n| Integer\
  \ | 不同 | 不同 |\n| Long | 不同 | 不同 |\n| Math | 不同 | 不同 |\n| Number | - | - |\n| Object\
  \ | 不同 | 与 CLDC 1.0 相同 |\n| Package | - | - |\n| Process | - | - |\n| Runtime |\
  \ 不同 | 与 CLDC 1.0 相同 |\n| RuntimePermission | - | - |\n| SecurityManager | - | -\
