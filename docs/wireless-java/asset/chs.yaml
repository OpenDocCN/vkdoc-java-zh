  \n|  |\n\n\n\n基本流程是从 MIDlet 的请求中提取参数，然后独立计算消息摘要值。Servlet 会在 `lookupPassword()` 方法中查找用户的密码。在更严谨的实现中，Servlet\
  \ 可能会从某种数据库中查找密码。\n\n一旦 Servlet 获取到用户密码，它就会将用户名、密码、时间戳和随机数输入到消息摘要中。然后计算消息摘要值，并将此结果与\
  \ MIDlet 发送来的摘要值进行比较。如果摘要值匹配，则 MIDlet 客户端通过身份验证。\n\n### 建议的改进\n\n对此系统的一个明显改进是，实际从数据库或某种密码仓库中（在服务器端）检索密码。\n\
  \n此外，Servlet 需要验证从客户端接收到的时间戳。每次用户尝试登录时，Servlet 都应确保该用户的时间戳大于其上一次登录尝试的时间戳。\n\n客户端方面的一个可能改进是，将用户名和密码存储在记录存储中，以便每次登录尝试时都能自动发送。通常这似乎是个坏主意。但小型设备通常由其所有者进行物理安全保管——你会尽量让手机随身携带，或者将其锁在某个地方。这是在便利性和安全性之间的一种权衡。但考虑到在手机键盘上输入文本有多困难，你可能希望为用户提供使用存储的用户名和密码的便利。\n\
  \n请注意，此方案中执行的身份验证是*按请求*进行的。每次客户端向服务器发送 HTTP 请求时，都是一次完全独立的会话。因此，每次客户端需要向服务器验证自身身份以执行某些操作时，都必须重新经历整个过程——创建时间戳和随机数、计算消息摘要，并将所有这些数据发送到服务器。在此系统中，你可能需要在\
  \ HTTP 请求中添加参数，以指定应为经过身份验证的用户执行的操作或命令。\n\n## 保护网络数据安全\n\n让我们来看一个稍微复杂一点的例子。假设你想隐藏通过网络发送的数据。受密码保护的示例展示了一种客户端向服务器验证自身身份的方法，但我们仍然面临窃听者从网络中截获信用卡号或其他敏感信息的问题。\n\
  \n此示例由一个配对的 MIDlet 和 Servlet 组成。MIDlet（StealthMIDlet）有一个简单的用户界面，允许你输入一条消息。该消息使用\
  \ RC4 流密码加密后发送给 Servlet。在服务器端，StealthServlet 接收加密消息，解密它，然后发回自己加密的消息。两条消息都以密文形式通过不安全的互联网传输，攻击者在没有正确密钥的情况下很难读取。\n\
  \nRC4 是一种对称加密算法，这意味着加密和解密数据使用相同的密钥。StealthMIDlet 和 StealthServlet 使用两个密钥，每个数据传输方向各一个。一个密钥用于在\
  \ MIDlet 中加密数据并在 Servlet 中解密；另一个密钥用于在 Servlet 中加密数据并在 MIDlet 中解密。\n\nServlet 为多个客户端\
  \ MIDlet 提供服务，每个 MIDlet 都有自己的加密和解密密钥。因此，Servlet 必须跟踪每个客户端的两个密钥，且不能混淆。它使用 HTTP 会话对象来实现这一点。每次收到客户端请求时，Servlet\
  \ 都会在会话对象中找到相应的密码器。如果密码器不存在，则会使用客户端特定的密钥创建并初始化它们。\n\n该系统同时提供了数据机密性和身份验证。客户端和服务器相互验证身份，因为它们必须拥有正确的密钥才能交换数据。\n\
  \n图 15-4 展示了 StealthMIDlet 的主用户界面。它允许你输入想要加密并发送到服务器的消息。准备就绪后，点击 **发送** 命令即可开始。\n\
  \n![](img/fig298_01.jpg)\n图 15-4：在 *StealthMIDlet* 的主屏幕中输入你的秘密消息。\n\nServlet 解密你的消息并发送回加密的响应，MIDlet\
  \ 会显示该响应，如 图 15-5 所示。\n\n![](img/fig298_02.jpg)\n图 15-5：Servlet 发回自己的秘密消息。\n\n###\
  \ 使用 Bouncy Castle 密码器\n\n在 Bouncy Castle 加密包中，流密码由 `org.bouncycastle.crypto.StreamCipher`\
  \ 接口表示。你只需使用 `init()` 初始化密码器，然后就可以使用 `processBytes()` 加密或解密数据。\n\nBouncy Castle\
  \ 包只提供了一个直接的流密码实现：`org.bouncycastle.crypto.engines.RC4`。如果你更喜欢使用不同的算法，可以使用分组密码代替。你可以使用密码反馈（CFB）模式将分组密码当作流密码使用。在\
  \ Bouncy Castle 包中，这是通过 `org.bouncycastle.crypto.StreamBlockCipher` 类实现的。\n\n这种技术让你能够使用\
  \ Bouncy Castle 庞大的分组密码实现库，从老旧的 DES 到 AES、Blowfish、Rijndael 等等。有关密码模式的更多信息，请参阅 *Java\
  \ Cryptography* 的第 7 章。\n\n我们的简单实现实例化了一对 RC4 对象，如下所示：\n\n```\nStreamCipher inCipher\
  \ = new RC4Engine();\nStreamCipher outCipher = new RC4Engine();\n```\n\n密码器在使用前需要初始化。如果密码器将用于加密数据，`init()`\
  \ 的第一个参数应为 `true`，解密则为 `false`。第二个参数本质上是密钥，包装在 `KeyParameter` 对象中。\n\n```\n// 假设我们已经获取了\
  \ inKey 和 outKey，两者都是字节数组。\ninCipher.init(false, new KeyParameter(inKey));\noutCipher.init(true,\
  \ new KeyParameter(outKey));\n```\n\n要加密数据，我们只需创建一个数组来保存密文。然后调用流密码的 `processBytes()`\
  \ 方法来执行加密。`processBytes()` 方法接受明文数组、明文中的起始索引、要处理的字节数、密文数组以及密文应写入的起始索引。\n\n```\n\
  // 假设我们有一个名为 plaintext 的字节数组。\nbyte[] ciphertext = new byte[plaintext.length];\n\
  outCipher.processBytes(plaintext, 0, plaintext.length, ciphertext, 0);\n```\n\n\
  解密过程相同，只是需要使用已初始化为解密状态的密码器。\n\n\n\n### 实现\n\nStealthMIDlet 的源代码如清单 15-5 所示。该 MIDlet\
  \ 具有一个简单的用户界面，在 `startApp()` 方法中初始化。MIDlet 的密码器也在 `startApp()` 中创建并初始化。\n\n清单 15-5：*StealthMIDlet*，一个数据加密\
  \ MIDlet\n\n| **![示例开始](img/_1.gif)** |\n\n```\nimport java.io.*;\n\nimport javax.microedition.io.*;\n\
  import javax.microedition.midlet.*;\nimport javax.microedition.lcdui.*;\n\nimport\
  \ org.bouncycastle.crypto.StreamCipher;\nimport org.bouncycastle.crypto.engines.RC4Engine;\n\
  import org.bouncycastle.crypto.params.KeyParameter;\n\npublic class StealthMIDlet\n\
  \    extends MIDlet\n    implements CommandListener, Runnable {\n  private Display\
  \ mDisplay;\n  private TextBox mTextBox;\n\nprivate String mSession;\n  private\
  \ StreamCipher mOutCipher, mInCipher;\n\npublic StealthMIDlet() {\n    mOutCipher\
  \ = new RC4Engine();\n    mInCipher = new RC4Engine();\n  }\n\npublic void startApp()\
  \ {\n    if (mSession == null) {\n      // 从资源文件中加载密钥。\n      byte[] inKey = getInKey();\n\
  \      byte[] outKey = getOutKey();\n\n// 初始化密码器。\n      mOutCipher.init(true, new\
  \ KeyParameter(outKey));\n      mInCipher.init(false, new KeyParameter(inKey));\n\
  \    }\n\nmDisplay = Display.getDisplay(this);\n\nif (mTextBox == null) {\n    \
  \  mTextBox = new TextBox(\"StealthMIDlet\",\n          \"The eagle has landed\"\
  , 256, 0);\n      mTextBox.addCommand(new Command(\"退出\", Command.EXIT, 0));\n \
  \     mTextBox.addCommand(new Command(\"发送\", Command.SCREEN, 0));\n      mTextBox.setCommandListener(this);\n\
  \    }\n\nmDisplay.setCurrent(mTextBox);\n  }\n\npublic void commandAction(Command\
  \ c, Displayable s) {\n    if (c.getCommandType() == Command.EXIT) notifyDestroyed();\n\
  \    else {\n      Form waitForm = new Form(\"正在连接...\");\n      mDisplay.setCurrent(waitForm);\n\
  \      Thread t = new Thread(this);\n      t.start();\n    }\n  }\n\npublic void\
  \ run() {\n    // 加密我们的消息。\n    byte[] plaintext = mTextBox.getString().getBytes();\n\
  \    byte[] ciphertext = new byte[plaintext.length];\n    mOutCipher.processBytes(plaintext,\
  \ 0, plaintext.length, ciphertext, 0);\n    char[] hexCiphertext = HexCodec.bytesToHex(ciphertext);\n\
  \n// 创建 GET URL。我们的用户名和加密后的十六进制编码消息作为参数包含在内。\n    //   用户名和基础 URL 作为应用程序属性获取。\n\
  \    String baseURL = getAppProperty(\"StealthMIDlet-URL\");\n    URLBuilder ub\
  \ = new URLBuilder(baseURL);\n    ub.addParameter(\"user\", getAppProperty(\"StealthMIDlet.user\"\
  ));\n    ub.addParameter(\"message\", new String(hexCiphertext));\n    String url\
  \ = ub.toString();\n\ntry {\n      // 查询服务器并获取响应。\n      HttpConnection hc = (HttpConnection)Connector.open(url);\n\
  \      if (mSession != null)\n        hc.setRequestProperty(\"cookie\", mSession);\n\
  \      InputStream in = hc.openInputStream();\n\nString cookie = hc.getHeaderField(\"\
  Set-cookie\");\n      if (cookie != null) {\n        int semicolon = cookie.indexOf(';');\n\
  \        mSession = cookie.substring(0, semicolon);\n      }\n\nint length = (int)hc.getLength();\n\
  \      ciphertext = new byte[length];\n      in.read(ciphertext);\n      in.close();\n\
  \      hc.close();\n    }\n    catch (IOException ioe) {\n      Alert a = new Alert(\"\
  异常\", ioe.toString(), null, null);\n      a.setTimeout(Alert.FOREVER);\n      mDisplay.setCurrent(a,\
  \ mTextBox);\n    }\n\n// 解密服务器响应。\n    String hex = new String(ciphertext);\n \
  \   byte[] dehexed = HexCodec.hexToBytes(hex.toCharArray());\n    byte[] deciphered\
  \ = new byte[dehexed.length];\n    mInCipher.processBytes(dehexed, 0, dehexed.length,\
  \ deciphered, 0);\n\nString decipheredString = new String(deciphered);\n    Alert\
  \ a = new Alert(\"响应\", decipheredString, null, null);\n    a.setTimeout(Alert.FOREVER);\n\
  \    mDisplay.setCurrent(a, mTextBox);\n  }\n\n// 通常，您可能会使用 Class 中的 getResourceAsStream()\
  \ 方法\n  //   从 MIDlet 套件 JAR 中的资源文件读取密钥。\n  //   这里我仅使用与 StealthServlet 中硬编码值匹配的硬编码值。\n\
  \  private byte[] getInKey() {\n    return \"Incoming MIDlet key\".getBytes();\n\
  \  }\n\nprivate byte[] getOutKey() {\n    return \"Outgoing MIDlet key\".getBytes();\n\
  \  }\n\npublic void pauseApp() { }\n\npublic void destroyApp(boolean unconditional)\
  \ { }\n} \n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n当用户调用**发送**命令时，StealthMIDlet\
  \ 使用其输出密码器加密用户的消息。然后，它将密文编码为十六进制文本，准备发送给 Servlet。用户名和密文被打包到 GET URL 中并发送到服务器。此外，StealthMIDlet\
  \ 会跟踪一个用于会话跟踪的 cookie。如果服务器发回一个会话 ID cookie，它会被保存在 StealthMIDlet 的 `mSession` 成员变量中。保存的\
  \ cookie 会随每个后续请求一起发送。这使得服务器能够检索该客户端的会话信息。如果没有此会话信息，客户端到服务器的每个 HTTP 请求都需要重新初始化密码器，以防止它们不同步。\n\
  \nStealthMIDlet 以十六进制密文的形式从服务器检索响应。它将字符串转换为字节数组，然后使用 MIDlet 的输入密码器解密该字节数组。解密后的消息显示在\
  \ Alert 中。\n\nStealthMIDlet 使用了本章前面介绍的相同 `HexCodec` 和 `URLBuilder` 类。\n\n在服务器端，情况稍微复杂一些。StealthServlet\
  \ 应能够处理多个客户端，这意味着它应该为每个连接的用户维护一对密码器。这是通过 HTTP 会话实现的，每个用户一个会话。当客户端请求到来时，StealthServlet\
  \ 尝试在用户的会话中找到两个密码器。如果它们不存在（就像用户第一次连接到 Servlet 时的情况），则会创建新的密码器。密码器使用每个用户唯一的密钥进行初始化。具体如何定位这些密钥由您决定。在这个简单的实现中，`getInKey()`\
  \ 和 `getOutKey()` 方法是硬编码的。\n\n您应该注意到，Servlet 端的密钥似乎与 MIDlet 中的相反。这是因为 Servlet 的输入密码器应使用与\
  \ MIDlet 输出密码器相同的密钥进行解密。\n\n一旦 StealthServlet 找到或创建了对应于特定用户的密码器，它就会解密传入的消息并将其打印到服务器控制台。然后，它加密一条响应消息（也是硬编码的）并将响应发送回\
  \ MIDlet。\n\n整个 StealthServlet 类如清单 15-6 所示。\n\n清单 15-6：*StealthServlet* 的源代码\n\n\
  | **![示例开始](img/_1.gif)** |\n\n```\nimport javax.servlet.http.*;\nimport javax.servlet.*;\n\
  import java.io.*;\nimport java.util.*;\n\nimport org.bouncycastle.crypto.StreamCipher;\n\
  import org.bouncycastle.crypto.engines.RC4Engine;\nimport org.bouncycastle.crypto.params.KeyParameter;\n\
  \npublic class StealthServlet extends HttpServlet {\n  public void doGet(HttpServletRequest\
  \ request,\n      HttpServletResponse response)\n      throws ServletException,\
  \ IOException {\n    String user = request.getParameter(\"user\");\n\n// 尝试查找用户的密码器对。\n\
  \    HttpSession session = request.getSession();\n    StreamCipher inCipher = (StreamCipher)session.getAttribute(\"\
  inCipher\");\n    StreamCipher outCipher = (StreamCipher)session.getAttribute(\"\
  outCipher\");\n\n\n\n// 如果密码器未找到，则创建并初始化一对新的密码器。\n    if (inCipher == null && outCipher\
  \ == null) {\n      // 获取客户端的密钥。\n      byte[] inKey = getInKey(user);\n      byte[]\
  \ outKey = getOutKey(user);\n      // 创建并初始化密码器。\n      inCipher = new RC4Engine();\n\
  \      outCipher = new RC4Engine();\n      inCipher.init(true, new KeyParameter(inKey));\n\
  \      outCipher.init(false, new KeyParameter(outKey));\n      // 现在将它们存入会话对象中。\n\
  \      session.setAttribute(\"inCipher\", inCipher);\n      session.setAttribute(\"\
  outCipher\", outCipher);\n    }\n\n// 获取客户端的消息。\n    String clientHex = request.getParameter(\"\
  message\");\n    byte[] clientCiphertext = HexCodec.hexToBytes(clientHex);\n   \
  \ byte[] clientDecrypted = new byte[clientCiphertext.length];\n    inCipher.processBytes(clientCiphertext,\
  \ 0, clientCiphertext.length,\n        clientDecrypted, 0);\n    System.out.println(\"\
  message = \" + new String(clientDecrypted));\n    // 创建响应消息。\n    String message\
  \ = \"Hello, this is StealthServlet.\";\n\n// 加密消息。\n    byte[] plaintext = message.getBytes();\n\
  \    byte[] ciphertext = new byte[plaintext.length];\n    outCipher.processBytes(plaintext,\
  \ 0, plaintext.length, ciphertext, 0);\n    char[] hexCiphertext = HexCodec.bytesToHex(ciphertext);\n\
  \nresponse.setContentType(\"text/plain\");\n    response.setContentLength(hexCiphertext.length);\n\
  \    PrintWriter out = response.getWriter();\n    out.println(hexCiphertext);\n\
  \  }\n\nprivate byte[] getInKey(String user) {\n    return \"Outgoing MIDlet key\"\
  .getBytes();\n  }\n\nprivate byte[] getOutKey(String user) {\n    return \"Incoming\
  \ MIDlet key\".getBytes();\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\
  \n### 建议的改进\n\n只需进行一些相对较小的改进，就能使这个示例成为一个严肃的应用程序。首先要处理的是密钥管理。`StealthMIDlet` 应从 MIDlet\
  \ 套件 JAR 中的资源文件加载密钥，而不是使用硬编码的值。这可以通过 `Class` 中的 `getResourceAsStream()` 方法实现。密钥很可能在部署时被放置在那里，这意味着\
  \ MIDlet 需要谨慎部署，最好使用 HTTPS。\n\n同样地，`StealthServlet` 应从数据库或某种文件存储库中定位并加载密钥。像基于用户名的标准命名方案这样简单的方法可能就足够了。\n\
  \n密钥本身应该比这里硬编码的示例更长——具体长度由你决定。早在 1996 年，美国政府就对允许出口 40 位 RC4 技术相当乐观，因此你可以放心，40 位长度是远远不够的。当然，随着密钥长度的增加，你可能会开始遇到内存或性能问题，尤其是在像\
  \ MIDP 这样受限的环境中。请尝试在性能与安全性之间找到良好的平衡。\n\n此外，你可能需要考虑使用不同的算法，例如 Blowfish 或 Rijndael。Bouncy\
  \ Castle 加密包在 `org.bouncycastle.crypto.engines` 包中提供了大量选项。正如我所提到的，你可以使用 CFB 模式将分组密码当作流密码来使用。\n\
  \n最后，Servlet 与 MIDlet 之间的通信也可以改进。例如，如果 Servlet 有办法告诉 MIDlet 它找不到会话，那就太好了。MIDlet\
  \ 可能会发送一个针对服务器端已过期会话的 Cookie。在当前实现中，Servlet 会创建一组新的密码器，而这些密码器与 MIDlet 的密码器不同步。解决这个问题的一种方法是让\
  \ Servlet 向 MIDlet 传递一个响应代码。其中一个响应代码可能意味着：“我丢失了你的会话。请重新初始化你的密码器，然后重试。”\n\n### 部署问题\n\
  \n假设你完善了这个示例并将其集成到一个产品中。那么分发时会遇到哪些问题呢？对于软件的每一份副本，你都需要生成一对密钥。这些密钥作为资源文件存储在 MIDlet\
  \ 套件 JAR 中，这意味着对于软件的每一份副本，你都需要生成一个唯一的 MIDlet 套件 JAR。同时，你需要在服务器端某处保存这些密钥。当客户端 MIDlet\
  \ 建立连接时，你需要能够找到对应的密钥。这些操作都不特别困难，并且可以自动化完成。\n\nMIDlet 套件 JAR 包含应保密的密钥。因此，通过互联网将 JAR\
  \ 传输给客户存在安全风险。你可以通过 HTTPS 将其传输到客户的浏览器，然后依靠客户通过串行电缆将其安装到移动电话或其他小型设备上。\n\n\n\n## 精简\
  \ Bouncy Castle 库\n\n本章的两个示例都只使用了 Bouncy Castle 加密包的一小部分功能。我使用混淆器来裁剪掉不需要的部分。一个好的混淆器能够找出应用程序中未使用的方法、实例变量，甚至整个类，并将其移除。这对于第三方库尤为重要，因为你可能只使用了其中一小部分功能。Bouncy\
  \ Castle 包含了大量在 PasswordMIDlet 和 StealthMIDlet 中并未使用的功能。\n\n使用 Bouncy Castle 和其他一些第三方\
  \ API 时，还有另一个原因使得混淆器必不可少。Bouncy Castle 包含了核心 `java.*` 命名空间中类的实现，例如 `java.math.BigInteger`。MIDP\
  \ 实现无法加载应用程序中来自此命名空间的类。混淆器可用于将这些类重命名，使其脱离被禁止的命名空间。\n\n本章的示例代码（可从 Apress 网站 [[`www.apress.com`](http://www.apress.com)]\
  \ 的“下载”部分获取）包含一个 Ant 构建文件，该文件调用了 ProGuard 1.4 混淆器。ProGuard 是一款出色的软件。它完全用 Java 编写，并且可以免费使用。更多信息，请参见\
  \ [`proguard.sourceforge.net/`](http://proguard.sourceforge.net/)。\n\n运行 ProGuard\
  \ 的 Ant 目标如下所示：\n\n```\n<target name=\"obfuscate_proguard\" depends=\"compile, copylib\"\
  >\n  <mkdir dir=\"build/proguard\"/>\n  <jar basedir=\"build/classes\"\n      jarfile=\"\
  build/proguard/$wj2-crypto-input.jar\"/>\n\n  <java fork=\"yes\" classname=\"proguard.ProGuard\"\
  \n      classpath=\"${proguard}\">\n    <arg line=\"-libraryjars ${midp_lib}\"/>\n\
  \    <arg line=\"-injars build/proguard/${project}-input.jar\"/>\n    <arg line=\"\
  -outjar build/proguard/${project}-output.jar\"/>\n    <arg line=\"-keep\n      \
  \  'public class * extends javax.microedition.midlet.MIDlet'\"/>\n    <arg line=\"\
  -defaultpackage\"/>\n    <arg line=\"-dontusemixedcaseclassnames\"/>\n  </java>\n\
  \n  <mkdir dir=\"build/obfuscated\"/>\n  <unjar src=\"build/proguard/${project}-output.jar\"\
  \n      dest=\"build/obfuscated\"/>\n</target>\n```\n\nProGuard 期望其输入类被打包在 JAR 文件中，因此首先要做的是根据包名创建一个\
  \ JAR 文件，即 *wj2-crypto-input.jar*。请注意，此 JAR 文件包含了 Bouncy Castle 的类。\n\n接下来，通过派生一个\
  \ Java 进程来运行 ProGuard。第一个参数 `-libraryjars` 告诉 ProGuard 在哪里可以找到 MIDP 类。下一个参数 `-injars`\
  \ 将 ProGuard 指向输入文件的 JAR 包。输出文件名通过 `-outjar` 指定。接下来是三个重要的选项。保留 MIDlet 类本身的名称非常重要，这样设备上的\
  \ MIDlet 管理软件才能加载并运行这些类。`-keep` 参数使得所有 MIDlet 的子类都能保留名称。包重命名（将类移出 `java.*`）通过 `-defaultpackage`\
  \ 参数实现。最后，`-dontusemixedcaseclassnames` 参数用于解决 Windows 系统中一个愚蠢的行为，即混淆后的类文件（如 *a.class*\
  \ 和 *A.class*）不能存在于同一目录下。\n\n有关 ProGuard 及其选项的更多信息，请查阅其文档，该文档质量很高。关于其使用的另一个示例，请参见\
  \ [`wireless.java.sun.com/midp/articles/security3/`](http://wireless.java.sun.com/midp/articles/security3/)。\n\
  \n结果令人印象深刻。未使用混淆器时，包含 PasswordMIDlet 和 StealthMIDlet 的 MIDlet 套件 JAR 文件大小为 493KB。此外，由于它包含了\
  \ `java.*` 命名空间中的类，因此无法运行。运行 ProGuard 后，MIDlet 套件 JAR 文件大小变为 38KB，并且那些有问题的 `java.*`\
  \ 类已被重命名为无害的名称。\n\n## 总结\n\n数据安全对于某些类型的应用程序至关重要。在 MIDP 领域，使用 Bouncy Castle 加密包可以实现数据安全。Bouncy\
  \ Castle 包为 MIDP 平台提供了复杂、易用且工业级的加密功能。本示例展示了两个可能的应用——一个使用消息摘要进行安全密码认证，另一个使用密码对 MIDlet\
  \ 和 Servlet 之间发送的数据进行加密。\n\n请记住，为应用程序或系统添加加密功能并不一定会使其更安全。你需要采用全面的系统级安全方法。加密只是你工具箱中的工具之一。\n\
