  封底


  | 尽管 Java 非常流行，但标准版 Java 对于构建 PDA 和手机等无线设备的应用程序来说过于庞大和臃肿。因此，Sun 发布了 Java 2 平台微型版
  (J2ME)。J2ME 有潜力在无线领域引发革命，正如 Java 在服务器领域所做到的那样。《无线 Java：使用 J2ME 进行开发，第二版》已更新，涵盖了移动
  Java 设备下一代程序的内容。MIDP 2.0 包含许多令人兴奋的新特性，例如声音 HTTPS 支持、大量用户界面 API 增强、游戏 API 等等。此外，作者
  Jonathan Knudsen 明确指出了哪些内容是新增的，因此读者仍然可以将本书用于 MIDP 1.0/CLDC 1.0。**关于作者**Jonathan
  Knudsen 是一位 Java 开发者，也是多本知名书籍的作者，包括《无线 Java：使用 Java 2 微型版进行开发》、《移动 Java》、《LEGO MINDSTORMS
  机器人非官方指南》、《学习 Java》和《Java 2D 图形》。Jonathan 在 NeXT 操作系统上使用 Objective-C 开始了他的面向对象编程生涯，随后在微软的
  Visual C++ 中经历了几年炼狱般的时光，最终于 1996 年转向 Java。他撰写了大量关于 Java 和 LEGO 机器人的文章，包括五本书、一个名为“Bite-Size
  Java”的月度在线专栏，以及为 JavaWorld、EXE、NZZ Folio 和 O''Reilly Network 撰写的文章。Jonathan 拥有普林斯顿大学机械工程学位。
