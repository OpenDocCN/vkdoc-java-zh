  \ 1.0*** | ***CLDC 1.1*** |\n| --- | --- | --- |\n| PhantomReference | - | - |\n\
  | Reference | - | 不同 |\n| ReferenceQueue | - | - |\n| SoftReference | - | - |\n\
  | WeakReference | - | 不同 |\n\n`java.lang.Object` 一如既往，是每个 Java 类的根。它与 J2SE 相比基本保持不变，但存在一些重要的差异。\n\
  \n### 无用户类加载\n\n正如我在第 1 章中讨论的，Java 平台的优势之一是在运行时加载类的能力。不幸的是，由于资源限制和安全问题，CLDC 不允许你定义自己的类加载器。运行\
  \ MIDlet 的应用程序管理器有一个类加载器，但你无法以任何方式访问或使用它。\n\n### 无对象终结\n\nCLDC（以及扩展的 MIDP）中不支持对象终结。*终结*是一种机制，对象可以通过它在被垃圾回收之前自行清理。在\
  \ J2SE 中，对象的 `finalize()` 方法会在对象被垃圾回收器回收之前调用。CLDC 中不存在这种机制。如果你需要清理资源，你需要显式地进行清理，而不是将清理代码放在\
  \ `finalize()` 中。无论如何，这本身就是一个好主意，尤其是在资源有限的小型设备上。显式清理资源意味着它们消耗的内存和处理能力将更早被回收。`finalize()`\
  \ 方法中的清理代码直到垃圾回收器运行时才会执行，而你永远不知道它何时会发生。\n\n### 无反射\n\nCLDC 不支持反射 API。CLDC/MIDP 的目标设备实在太小，无法支持它。尽管大多数开发者不需要直接使用反射，但这一缺失有重要影响。没有反射，就不可能实现远程方法调用（RMI）。没有\
  \ RMI，就不可能实现 JINI。因此，基础的 CLDC/MIDP 实现无法运行 JINI。如果你想运行 JINI，你需要研究更大的 J2ME 配置文件之一，很可能是个人配置文件（参见第\
  \ 1 章）和 RMI 可选 API（JSR 66）。\n\n### 无本地方法\n\nCLDC（以及扩展的 MIDP）中不支持本地方法。该规范不支持从 Java\
  \ 访问本地设备方法的方式。尽管 MIDP 实现当然包含本地方法，但它们被编译到实现本身中。应用程序不能定义新的本地方法。\n\n不过，不必担心失去对平台特定功能的访问，因为设备供应商很可能在\
  \ MIDP 之外实现专有 API。详情请查看你的设备制造商或网络运营商的开发者网站。请记住，使用供应商或设备特定的 API 会限制你应用程序的受众。在某些情况下（主要是游戏），针对特定设备分发应用程序的多个版本是有意义的。\n\
  \n### 多线程\n\n只要你保持简单，使用线程的方式与你从 J2SE 中记忆的差不多。创建新线程、启动它们以及使用方便的 `java.lang.Runnable`\
  \ 接口与 J2SE 中相同。CLDC 1.0 中一个重要的遗漏是 `interrupt()` 方法，它在 `java.lang.Thread` 类中不存在。在\
  \ CLDC 1.1 中，`interrupt()` 方法可用。\n\n`pause()`、`resume()` 和 `stop()` 方法（在 J2SE SDK\
  \ 中已弃用）也不存在。CLDC/MIDP 不支持线程组和守护线程；CLDC 1.0 不支持线程命名，但在 CLDC 1.1 中可用。\n\n### String\
  \ 和 StringBuffer\n\n`String` 和 `StringBuffer` 都存在于 CLDC 的 `java.lang` 包中。它们与其 J2SE\
  \ 对应类相比基本保持不变。\n\nCLDC 1.0 中 `String` 类最大的变化是移除了在浮点基本类型和 `String` 之间进行转换的 `valueOf()`\
  \ 静态方法，尽管这些方法在 CLDC 1.1 中存在。CLDC 的 `String` 类中还缺少一些其他不常用的方法，但你很可能不会想念它们。例如，尽管 CLDC\
  \ 的 `String` 包含了 `compareTo(String str)` 方法，但它没有 J2SE SDK 中的 `compareTo(Object o)`\
  \ 或 `compareToIgnoreCase(String str)` 方法。（CLDC 1.1 的 `String` 类中确实包含了一个 `equalsIgnoreCase()`\
  \ 方法。）\n\n在 CLDC 1.0 版本的 `StringBuffer` 类中，`append()` 和 `insert()` 方法不包含针对浮点类型的重载，但这些在\
  \ CLDC 1.1 中可用。此外，`substring()` 方法已被移除。除此之外，对于经验丰富的 J2SE 程序员来说，`StringBuffer` 应该非常熟悉。\n\
  \n\n\n### 数学类\n\n`Math` 类包含用于执行数学计算的静态方法。在 J2SE 中，这些方法大多涉及浮点数的三角函数。在 CLDC 1.0 中，这些方法全部被移除，仅保留了少数几个方法。CLDC\
  \ 1.1 由于支持浮点类型，在 `java.lang.Math` 中增加了更多方法，但 CLDC 的 `java.lang.Math` 仍然是 J2SE 版本该类的一个子集。在下面的\
  \ API 列表中，加号 (+) 表示 CLDC 1.1 中新增的变量或方法。\n\n```\n public final class Math\n     extends\
  \ java.lang.Object {\n   // 常量\n+  public static final double E;\n+  public static\
  \ final double PI;\n     // 静态方法\n   public static int abs(int a);\n   public static\
  \ long abs(long a);\n+  public static float abs(float a);\n+  public static double\
  \ abs(double a);\n+  public static native double ceil(double a);\n+  public static\
  \ native double cos(double a);\n+  public static native double floor(double a);\n\
  \   public static int max(int a, int b);\n   public static long max(long a, long\
  \ b);\n+  public static float max(float a, float b);\n+  public static double max(double\
  \ a, double b);\n   public static int min(int a, int b);\n   public static long\
  \ min(long a, long b);\n+  public static float min(float a, float b);\n+  public\
  \ static double min(double a, double b);\n+  public static native double sin(double\
  \ a);\n+  public static native double sqrt(double a);\n+  public static native double\
  \ tan(double a);\n+  public static double toDegrees(double angrad);\n+  public static\
  \ double toRadians(double angdeg);\n  }\n```\n\n### 运行时与系统类\n\n`Runtime` 和 `System`\
  \ 提供了对 Java 虚拟机 (JVM) 和系统级资源的访问。这两个类相较于 J2SE 中的对应类被大幅精简，因此在此完整重现它们的公共 API 是合理的。首先，我们来看一下\
  \ `Runtime`：\n\n```\npublic class Runtime\n    extends java.lang.Object {\n  //\
  \ 静态方法\n  public static Runtime getRuntime();\n\n  // 方法\n   public void exit(int\
  \ status);\n   public native long freeMemory();\n   public native void gc();\n \
  \  public native long totalMemory();\n  } \n```\n\n要获取唯一的 `Runtime` 实例，请调用 `getRuntime()`。你可以通过调用\
  \ `gc()` 来指示 JVM 运行其垃圾回收器。如果尝试调用 `exit()`，则会抛出 `SecurityException`；应用程序的生命周期完全通过\
  \ `MIDlet` 类的方法进行管理。另外两个方法 `totalMemory()` 和 `freeMemory()` 允许你检查可用于应用程序数据的内存量。\n\
  \n请注意，`Runtime` 不支持通过 `exec()` 方法运行外部进程。MIDlet 不能超出 JVM 的边界。\n\n`System` 提供了用于执行各种常见任务的静态方法：\n\
  \n```\npublic final class System\n    extends java.lang.Object {\n  // 常量\n  public\
  \ static final PrintStream err;\n  public static final PrintStream out;\n\n  //\
  \ 静态方法\n  public static native void arraycopy(Object src, int src_position,\n  \
  \    Object dst, int dst_position, int length);\n  public static native long currentTimeMillis();\n\
  \  public static void exit(int status);\n  public static void gc();\n  public static\
  \ String getProperty(String key);\n  public static native int identityHashCode(Object\
  \ x);\n}\n```\n\n你可能首先注意到，虽然定义了 `err` 和 `out` 这两个 `PrintStream`，但并没有 `System.in`。这很合理——`System.in`\
  \ 代表控制台输入；在 MIDP 设备上，实际上并没有控制台。事实上，定义了 `System.out` 和 `System.err` 可能看起来有些奇怪。如果你将信息打印到\
  \ `System.out`，它在设备上可能不会显示在任何地方；然而，在设备模拟器上，你可能能够在控制台窗口中查看 `System.out`。\n\n`gc()`\
  \ 和 `exit()` 方法是调用 `Runtime` 类中对应方法的快捷方式。\n\n`System` 的所有方法都是静态的。`arraycopy()` 方法提供了数组复制的快速实现。\n\
  \n最后，`identityHashCode()` 是 `Object` 的 `hashCode()` 方法使用的默认方法。\n\n`getProperty()`\
  \ 方法返回系统属性，这些属性不同于 `MIDlet` 的 `getAppProperty()` 方法返回的 MIDlet 属性。支持以下标准系统属性，并且可以在运行时检索它们的值：\n\
  \n*   **microedition.platform:** 此属性包含设备或主机平台的名称。如果实现未提供值，则默认为 null。\n\n*   **microedition.encoding:**\
  \ 此属性包含默认字符编码，它指定了 Unicode 字符在字节流中的表示方式。\n\n*   **microedition.configuration:**\
  \ 此属性包含所实现配置的名称，例如 \"CLDC-1.1\"。\n\n*   **microedition.profiles:** 已实现的配置文件包含在此系统属性中。\n\
  \n\n\n## java.io 中的流\n\nCLDC/MIDP 环境中的 `java.io` 包是 J2SE 中 `java.io` 的精简版本。表 4-3\
  \ 总结了 J2SE 和 CLDC/MIDP 中 `java.io` 的类。如你所见，许多在 J2SE 中常见的 `java.io` 类在 CLDC/MIDP\
  \ 中缺失了。\n\n表 4-3：*java.io* 包\n\n| **接口** |   |   |\n| --- | --- | --- |\n| ***J2SE\
  \ SDK 1.4.0*** | ***CLDC 1.0*** | ***CLDC 1.1*** |\n| --- | --- | --- |\n| DataInput\
  \ | 不同 | 不同 |\n| DataOutput | 不同 | 不同 |\n| Externalizable | - | - |\n| FileFilter\
  \ | - | - |\n| FilenameFilter | - | - |\n| ObjectInput | - | - |\n| ObjectInputValidation\
  \ | - | - |\n| ObjectOutput | - | - |\n| ObjectStreamConstants | - | - |\n| Serializable\
  \ | - | - |\n| BufferedInputStream | - | - |\n| BufferedOutputStream | - | - |\n\
  | BufferedReader | - | - |\n| BufferedWriter | - | - |\n| ByteArrayInputStream |\
  \ 相同 | 相同 |\n| ByteArrayOutputStream | 不同 | 与 CLDC 1.0 相同 |\n| CharArrayReader |\
  \ - | - |\n| CharArrayWriter | - | - |\n| DataInputStream | 不同 | 不同 |\n| DataOutputStream\
  \ | 不同 | 不同 |\n| File | - | - |\n| FileDescriptor | - | - |\n| FileInputStream |\
  \ - | - |\n| FileOutputStream | - | - |\n| FilePermission | - | - |\n| FileReader\
  \ | - | - |\n| FileWriter | - | - |\n| FilterInputStream | - | - |\n| FilterOutputStream\
  \ | - | - |\n| FilterReader | - | - |\n| FilterWriter | - | - |\n| InputStream |\
  \ 相同 | 相同 |\n| InputStreamReader | 不同 | 与 CLDC 1.0 相同 |\n| LineNumberInputStream\
  \ | - | - |\n| LineNumberReader | - | - |\n| ObjectInputStream | - | - |\n| ObjectInputStream.GetField\
  \ | - | - |\n| ObjectOutputStream | - | - |\n| ObjectOutputStream.PutField | - |\
  \ - |\n| ObjectStreamClass | - | - |\n| ObjectStreamField | - | - |\n| OutputStream\
  \ | 相同 | 相同 |\n| OutputStreamWriter | 不同 | 与 CLDC 1.0 相同 |\n| PipedInputStream |\
  \ - | - |\n| PipedOutputStream | - | - |\n| PipedReader | - | - |\n| PipedWriter\
  \ | - | - |\n| PrintStream | 不同 | 不同 |\n| PrintWriter | - | - |\n| PushbackInputStream\
  \ | - | - |\n| PushbackReader | - | - |\n| RandomAccessFile | - | - |\n| Reader\
  \ | 相同 | 相同 |\n| SequenceInputStream | - | - |\n| SerializablePermission | - | -\
  \ |\n| StreamTokenizer | - | - |\n| StringBufferInputStream | - | - |\n| StringReader\
  \ | - | - |\n| StringWriter | - | - |\n| Writer | 相同 | 相同 |\n\n尽管 J2SE 和 CLDC 类之间的差异看起来很大，但它们可以轻松地归为三类：\n\
  \n1.  由于 CLDC/MIDP 没有本地文件系统的概念，所有与文件相关的类都已从 `java.io` 包中移除。这包括 `File`、`FileInputStream`、`FileOutputStream`、相应的\
  \ `Reader` 和 `Writer` 类、`RandomAccessFile` 以及各种支持类。如果你需要在设备上持久化存储数据，则需要使用 `javax.microedition.rms`\
  \ 包 API，详见第 8 章。\n\n2.  CLDC 不支持对象序列化。这意味着 `Serializable` 接口和各种对象流类都不存在。\n\n3. \
  \ 最后，J2SE 包含了一些实用流类——这些类你可能某天会用到，但不应该包含在内存较小的设备上。这些类包括管道流、回推流、序列流、行号流，以及像 `StreamTokenizer`\
  \ 这样的其他一些“瑰宝”。如果你的 MIDlet 确实需要其中之一，你可以尝试将其与你的应用程序一起打包。^([1]) 请记住，直接使用 J2SE 中的类存在许可限制和技术问题；在开始复制文件之前，请确保你了解相关的法律影响。\n\
  \n### 字符编码\n\nMIDP 包含了用于处理 Unicode 字符的 `Reader` 和 `Writer` 字符流。`InputStreamReader`\
  \ 和 `OutputStreamWriter` 负责处理字节流和字符流之间的转换，这与 J2SE 中一样。*编码*决定了字节流和字符流之间的转换方式。如果你不指定编码，则会使用默认编码。如果你愿意，可以将编码名称传递给\
  \ `InputStreamReader` 和 `OutputStreamWriter` 的构造函数。到目前为止，这与 J2SE 完全相同。不过，在 MIDP\
  \ 中，你可用的编码数量可能比 J2SE 少得多。\n\n可以通过调用 `System.getProperty(\"microedition.encoding\"\
  )` 获取 MIDP 实现的默认编码——默认为 `ISO8859_1`。\n\n### 资源文件\n\n如第 8 章所述，你可以从 MIDlet 套件的 JAR\
  \ 文件中检索资源文件。使用 `Class` 中的 `getResourceAsStream()` 方法；它会返回一个 `InputStream`，你可以随意使用。\n\
  \n^([1])更好的做法是重新设计你的应用程序，使得在设备上不需要进行复杂的流处理。通常，你应该让服务器尽可能多地完成工作，而让你的 MIDlet 尽可能少地工作。\n\
  \n## java.util\n\nCLDC 仅包含 J2SE 的 `java.util` 包中的十几个类。许多缺失的类是集合 API 的一部分，该 API 对于小型设备来说过于庞大。表\
  \ 4-4 列出了 J2SE 和 CLDC/MIDP 中 `java.util` 的类和接口。\n\n表 4-4：*java.util* 包\n\n| **接口**\
  \ |   |   |\n| --- | --- | --- |\n| ***J2SE SDK 1.4.0*** | ***CLDC 1.0*** | ***CLDC\
  \ 1.1*** |\n| --- | --- | --- |\n| Collection | - | - |\n| Comparator | - | - |\n\
  | Enumeration | 相同 | 相同 |\n| EventListener | - | - |\n| Iterator | - | - |\n| List\
  \ | - | - |\n| ListIterator | - | - |\n| Map | - | - |\n| Map.Entry | - | - |\n\
  | Observer | - | - |\n| RandomAccess | - | - |\n| Set | - | - |\n| SortedMap | -\
  \ | - |\n| SortedSet | - | - |\n\n| **类** |   |   |\n| --- | --- | --- |\n| ***J2SE\
  \ SDK 1.4.0*** | ***CLDC 1.0*** | ***CLDC 1.1*** |\n| --- | --- | --- |\n| AbstractCollection\
  \ | - | - |\n| AbstractList | - | - |\n| AbstractMap | - | - |\n| AbstractSequentialList\
  \ | - | - |\n| AbstractSet | - | - |\n| ArrayList | - | - |\n| Arrays | - | - |\n\
  | BitSet | - | - |\n| Calendar | - | - |\n| Collections | - | - |\n| Currency |\
  \ - | - |\n| Date | 不同 | 与 CLDC 1.0 相同 |\n| Dictionary | - | - |\n| EventListenerProxy\
  \ | - | - |\n| EventObject | - | - |\n| GregorianCalendar | - | - |\n| HashMap |\
  \ - | - |\n| HashSet | - | - |\n| Hashtable | 不同 | 与 CLDC 1.0 相同 |\n| IdentityHashMap\
  \ | - | - |\n| LinkedHashMap | - | - |\n| LinkedHashSet | - | - |\n| LinkedList\
  \ | - | - |\n| ListResourceBundle | - | - |\n| Locale | - | - |\n| Observable |\
  \ - | - |\n| Properties | - | - |\n| PropertyPermission | - | - |\n| PropertyResourceBundle\
  \ | - | - |\n| Random | 不同 | 不同 |\n| ResourceBundle | - | - |\n| SimpleTimeZone\
  \ | - | - |\n| Stack | 相同 | 相同 |\n| StringTokenizer | - | - |\n| Timer | 相同 (MIDP)\
  \ | 相同 (MIDP) |\n| TimerTask | 相同 (MIDP) | 相同 (MIDP) |\n| TimeZone | 不同 | 与 CLDC\
  \ 1.0 相同 |\n| TreeMap | - | - |\n| TreeSet | - | - |\n| Vector | 不同 | 与 CLDC 1.0\
  \ 相同 |\n| WeakHashMap |   |   |\n\n### 集合\n\n尽管 CLDC 不支持完整的 J2SE 集合 API，但旧的、熟悉的\
  \ `Vector` 和 `Hashtable` 类仍然保留，以及不太知名的 `Stack`。如果你熟悉 J2SE SDK 的 `Vector` 和 `Hashtable`\
  \ 类，那么在 MIDP 中使用它们应该没有问题。\n\n### 定时器\n\nMIDP 包含了在 J2SE SDK 1.3 版本中引入的 `Timer` 和\
  \ `TimerTask` 类。这些是唯一未包含在 CLDC 中但包含在 MIDP 中的 J2SE 类。\n\n`Timer` 的 API 与 J2SE 版本相同，但有一个例外。指定线程是否为守护线程的构造函数缺失了，因为\
  \ MIDP 不支持守护线程。`TimerTask` 的 API 在 J2SE SDK 和 MIDP 中完全相同。\n\n\n\n### 计时\n\nJ2SE\
  \ 拥有一系列令人印象深刻的类，可用于指定日期和时间，并在日期时间与人类可读的表示形式之间进行转换。J2SE 的时间类有四个不同的职责：\n\n*   *时间点*由\
  \ `java.util.Date` 的实例表示。如果你把时间想象成一条线图，那么 `Date` 的实例就是线上的一个点。\n\n*   *日历*用于通过年、月、日等日历字段来表示时间点。例如，如果你使用公历，那么你可以将单个时间点转换为一组日历值，如月、日以及小时、分钟和秒。在\
  \ J2SE 中，`java.util.Calendar` 是日历的父类，而 `java.util.GregorianCalendar` 类则代表了世界上大多数人熟悉的公历系统。\n\
  \n*   *格式化*类在时间点和人类可读字符串之间进行转换。在 J2SE 中，`java.text.DateFormat` 是那些既能生成也能解析表示时间点的人类可读字符串的类的父类。格式化类很可能会使用日历。例如，一个典型的\
  \ `DateFormat` 实现可能会使用 `GregorianCalendar` 将一个时间点转换为一组日历值，然后将其格式化为字符串。\n\n*   *时区*类代表世界上的各个时区。日历和格式化类使用时区来创建特定时间点的本地化表示。在\
  \ J2SE 中，`java.util.TimeZone` 是所有时区的父类，`java.util.SimpleTimeZone` 是其具体实现。\n\n理解这些类及其交互有点棘手，而且由于\
  \ JDK 1.0 和 JDK 1.1 之间的 API 发生了显著变化，情况变得更加复杂。`java.util.Date` 类曾经拥有额外的功能；尽管这些方法已被弃用，但它们仍然存在，可能会造成混淆。幸运的是，在\
  \ CLDC/MIDP 世界中，你无需处理这些问题。\n\n在 CLDC/MIDP 中，情况稍微简单一些。首先，类更少了，而且 `Date` 类的 API 也得到了清理。在\
  \ MIDP 中，我刚才讨论的四个职责被分配给以下类：\n\n*   *时间点*仍然由 `java.util.Date` 的实例表示。本质上，`Date` 类只是一个\
  \ `long` 值的包装器，该值表示自 1970 年 1 月 1 日午夜以来的毫秒数。（这是一种表示时间的标准方式。它大约还能再用 2.9 亿年，所以不用担心另一个千年虫问题。）\n\
  \n*   *日历*仍然由 `java.util.Calendar` 的实例表示。然而，`GregorianCalendar` 类不再是公共 API 的一部分。要获取\
  \ `Calendar` 实例，你可以使用 `getInstance()` 工厂方法。你很可能不需要这样做。\n\n*   *格式化*类在 MIDP 中是不可见的。其中一个用户界面类\
  \ `javax.microedition.lcdui.DateField` 可以将 `Date` 转换为人类可读的显示形式，从而省去了你自己处理日期格式化器的麻烦。本质上，`DateField`\
  \ 是 `Date` 实例的一个图形包装器。它还允许用户编辑日历和时钟字段以生成新的 `Date` 值。有关 `DateField` 的完整讨论，请参见第 6\
  \ 章。\n\n*   *时区*仍然由 `java.util.TimeZone` 的实例表示。`TimeZone` 提供了几个静态方法，用于检查可用的时区并获取代表特定时区的实例。\n\
  \n## 总结\n\n开发者被信息所淹没，而最优秀的开发者是那些能够快速学习新知识的人。不过，偶尔，你已知的东西可以再次被利用。这就是其中一种情况——当你学习\
  \ MIDP 编程时，你已经了解的 J2SE API 会变得非常有用。MIDP 的 `java.lang`、`java.io` 和 `java.util` 包中包含的类，其外观和行为与\
  \ J2SE 中的对应类非常相似。\n\n"
- "# 第 5 章：创建用户界面\n\n## 概述\n\nMIDP 应用程序旨在无需修改即可在多种不同设备上运行。这在用户界面领域尤其困难，因为设备拥有各种尺寸的屏幕，有灰度的也有彩色的。此外，设备的输入能力也千差万别，从数字键盘到字母键盘、软键，甚至触摸屏。MIDP\
  \ 规定的最小屏幕尺寸为 96 × 54 像素，且至少具有 1 位色深。^([1]) 至于输入，MIDP 相当开放：设备预计会配备某种类型的键盘，或触摸屏，或者两者兼有。\n\
  \n鉴于符合 MIDP 规范的设备种类繁多，有两种方法可以创建在所有设备上都能良好运行的应用程序：\n\n*   *抽象*：以抽象术语指定用户界面，依赖 MIDP\
  \ 实现来创建具体内容。与其说“在软键上方的屏幕上显示‘下一步’这个词”，不如说“在这个界面的某处给我一个**下一步**命令”。\n\n*   *发现*：应用程序在运行时了解设备信息，并通过编程方式定制用户界面。例如，你可能会查明设备屏幕的大小，以便适当地缩放你的用户界面。\n\
  \nMIDP API 支持这两种方法。抽象是首选方法，因为它涉及应用程序中更少的代码，而 MIDP 实现承担了更多工作。在某些情况下，比如游戏，你需要对用户界面有更具体的要求；这类应用程序会发现设备的能力，并尝试相应地调整其行为。MIDP\
  \ 的用户界面 API 被设计成易于在同一应用程序中混合使用这两种技术。\n\n^([1])色深是决定屏幕上像素颜色的位数。1 位允许两种颜色（通常是黑色和白色）。4\
  \ 位允许 16 种颜色，可以是不同级别的灰度或其他颜色的调色板。\n\n\n\n## 顶层视角\n\nMIDP 在 `javax.microedition.lcdui`\
  \ 和 `javax.microedition.lcdui.game` 包中包含了用户界面类。设备的显示屏由 `Display` 类的实例表示，可通过工厂方法\
  \ `getDisplay()` 获取。`Display` 的主要职责是跟踪当前显示的内容，即 `Displayable` 的实例。如果将 `Display`\
  \ 比作画架，那么 `Displayable` 实例就相当于画架上的画布。\n\nMIDlet 可以通过将 `Displayable` 实例传递给 `Display`\
  \ 的 `setCurrent()` 方法来更改显示内容。这是典型 MIDlet 的基本功能：\n\n1.  显示一个 `Displayable`。\n2. \
  \ 等待输入。\n3.  决定下一个要显示的 `Displayable`。\n4.  重复。\n\n`Displayable` 有一系列子类，代表不同类型的用户界面。图\
  \ 5-1 展示了其继承关系。\n\n![点击展开](img/fig80_01_0.jpg)\n图 5-1：*javax.microedition.lcdui*\
  \ 和 *javax.microedition.lcdui.game* 包中的 Displayable\n\n`Displayable` 的后代分为两个分支，分别对应创建通用用户界面的两种方法：抽象与发现。`Screen`\
  \ 类代表以抽象术语定义的显示界面。\n\n这些屏幕包含标准的用户界面元素，如组合框、列表、菜单和按钮。四个子类提供了广泛的功能，如图 5-2 所示。\n\n\
  ![点击展开](img/fig81_01_0.jpg)\n图 5-2：*Screen* 的四个子类——(a) *TextBox*、(b) *Alert*、(c)\
  \ *List* 和 (d) *Form*\n\n本章剩余部分将重点解释这四个类中最简单的两个：`TextBox` 和 `Alert`。下一章 将探讨更灵活的\
  \ `List` 和 `Form`。\n\n对于特别苛刻或特殊的显示需求，你需要创建 `Canvas` 的子类。你的 MIDlet 将承担大部分绘制工作，但你能更精细地控制显示内容以及用户输入的处理方式。`Canvas`\
  \ 提供了方法，使你的 MIDlet 能够了解其运行环境——例如显示屏的尺寸，以及设备支持哪些类型的事件。基于 `Canvas` 构建的用户界面会探测设备属性，并尝试创建看起来合理的界面。第\
  \ 10 章 将详细解释基于 `Canvas` 的用户界面。\n\n`GameCanvas` 是 MIDP 2.0 中的新特性，专门为游戏显示提供用户界面功能。第\
  \ 11 章 将解释这个新的 API。\n\n## 使用 Display\n\n`Display` 管理设备的屏幕。你可以通过向静态方法 `getDisplay()`\
  \ 提供一个 MIDlet 引用来获取设备显示屏的引用。通常，你会在 MIDlet 的 `startApp()` 方法中执行此操作：\n\n```\npublic\
  \ void startApp() {\n  Display d = Display.getDisplay(this);\n  // ...\n}\n```\n\
  \n你可能会想在 MIDlet 的构造函数中调用 `getDisplay()`，但根据规范，`getDisplay()` 只能在 MIDlet 的 `startApp()`\
  \ 方法开始之后调用。\n\n一旦获得了设备 `Display` 的引用，你只需要创建要显示的内容（`Displayable` 的实例），并将其传递给 `Display`\
  \ 的某个 `setCurrent()` 方法：\n\n```\npublic void setCurrent(Displayable next)\npublic\
  \ void setCurrent(Alert alert, Displayable nextDisplayable)\n```\n\n当你想要先显示一条临时消息（`Alert`），然后再显示其他内容时，会使用第二个版本。我将在本章末尾详细讨论\
  \ `Alert`。\n\n`Display` 的 `getCurrent()` 方法返回当前显示内容的引用。请注意，即使 MIDlet 对用户不可见，`getCurrent()`\
  \ 也可能返回一个有效对象。例如，在同时运行多个 MIDlet 的设备上就可能发生这种情况。另外请注意，`Displayable` 接口有一个名为 `isShown()`\
  \ 的方法，用于指示给定对象是否实际显示在设备屏幕上。\n\n你还可以查询 `Display` 以确定其能力，这对于需要适应不同类型显示器的应用程序很有帮助。`numColors()`\
  \ 方法返回此设备支持的不同颜色的数量，而 `isColor()` 方法则告知设备是支持彩色还是灰度。例如，支持 16 级灰度的设备的 `Display`，其\
  \ `isColor()` 会返回 false，而 `numColors()` 会返回 16。在 MIDP 2.0 中，你还可以通过调用 `numAlphaLevels()`\
  \ 来了解设备是否支持透明度，该方法返回透明度级别数。最小返回值为 2，表示支持完全透明和完全不透明的图像像素。返回值大于 2 表示支持 Alpha 混合。在\
  \ MIDP 2.0 中，`Display` 还包含另外两对方法。第一对方法 `getColor()` 和 `getBorderStyle()` 用于从系统用户界面方案中获取颜色和线条样式。这些方法对于绘制自定义项目很有用，该主题将在第\
  \ 7 章中介绍。另一对方法 `flashBacklight()` 和 `vibrate()` 用于调用设备的相应功能。这些将在第 11 章中更详细地讨论。\n\
  \n## 使用命令进行事件处理\n\n`Displayable` 是所有屏幕显示的父类，它支持一个非常灵活的用户界面概念——命令。*命令*是用户可以调用的东西——你可以将其视为一个按钮。像按钮一样，它有一个标题，例如“确定”或“取消”，并且当用户调用该命令时，你的应用程序可以做出适当的响应。其前提是，你希望某个命令对用户可用，但你不关心它在屏幕上如何显示，也不关心用户具体如何调用它——键盘按钮、软按钮、触摸屏等等。\n\
  \n每个 `Displayable` 都维护一个其 `Command` 的列表。你可以使用以下方法添加和删除 `Command`：\n\n```\npublic\
  \ void addCommand(Command cmd)\npublic void removeCommand(Command cmd)\n```\n\n\n\
  \n### 创建命令\n\n在 MIDP 中，命令由 `Command` 类的实例表示。要创建一个命令，只需提供名称、类型和优先级。名称通常显示在屏幕上。类型可用于标识常用命令，它应为\
  \ `Command` 类中定义的某个值。表 5-1 列出了类型值及其含义。\n\n表 5-1：命令类型\n\n| **名称** | **含义** |\n| ---\
  \ | --- |\n| OK | 确认选择。 |\n| CANCEL | 取消待处理的更改。 |\n| BACK | 将用户返回到上一个屏幕。 |\n| STOP\
  \ | 停止正在运行的操作。 |\n| HELP | 显示应用程序说明。 |\n| SCREEN | 特定应用程序命令的通用类型。 |\n\n例如，要创建一个标准的\
  \ **OK** 命令，可以这样做：\n\n```\nCommand c = new Command(\"OK\", Command.OK, 0);\n```\n\
  \n要创建一个特定于应用程序的命令，可以这样做：\n\n```\nCommand c = new Command(\"Launch\", Command.SCREEN,\
  \ 0);\n```\n\n如何显示命令由 MIDP 实现决定。在 Sun J2ME Wireless Toolkit 模拟器中，命令被分配给两个软键。*软键*是设备键盘上没有预定义功能的按钮。软键在不同时间可以服务于不同目的。如果命令数量超过软键数量，则无法容纳的命令将被分组到一个菜单中，并分配给其中一个软键。\n\
  \n一个简单的优先级方案决定了当命令数量超过可用屏幕空间时，哪些命令会胜出。每个命令都有一个优先级，表示显示系统应尽力显示该命令的程度。数字越小，优先级越高。如果你添加一个优先级为\
  \ 0 的命令，然后再添加几个优先级为 1 的命令，那么优先级为 0 的命令将直接显示在屏幕上，而其他命令很可能最终出现在次级菜单中。\n\nMIDP 2.0\
  \ 增加了对命令长标签的支持。MIDP 实现会根据可用屏幕空间和标签大小来决定使用哪个标签。你可以像这样创建一个带有短标签和长标签的命令：\n\n```\nCommand\
  \ c = new Command(\"Run\", \"Run simulation\", Command.SCREEN, 0);\n```\n\n`Command`\
  \ 类提供了 `getLabel()`、`getLongLabel()` 和 `getCommandType()` 方法，用于检索命令的相关信息。\n\n###\
  \ 响应命令\n\n命令本身并不令人兴奋。它们会显示在屏幕上，但当用户调用命令时，不会自动发生任何事情。当用户在 `Displayable` 中调用任何命令时，一个称为*监听器*的对象会收到通知。这遵循了\
  \ JavaBeans 事件模型的基本形式；`Displayable` 是一个*单播事件源*。每次用户调用其某个命令时，`Displayable` 都会触发一个事件。\n\
  \n监听器是一个实现了 `CommandListener` 接口的对象。要将监听器注册到 `Displayable`，请使用以下方法：\n\n```\npublic\
  \ void setListener(CommandListener l) \n```\n\n`Displayable` 是单播事件源，因为它只能有一个监听器对象。（*多播*事件源可以有多个监听器，并使用\
  \ `add…` 方法来添加监听器，而不是 `set…` 方法。）\n\n实现 `CommandListener` 只需定义一个方法：\n\n```\npublic\
  \ void commandAction(Command c, Displayable s)\n```\n\n当命令被调用时，包含该命令的 `Displayable`\
  \ 会调用已注册监听器的 `commandAction()` 方法。\n\n|  | 提示  | 事件监听器不应在事件处理线程内执行耗时操作。系统使用自己的线程来调用\
  \ *commandAction()* 以响应用户输入。如果你的 *commandAction()* 实现执行了任何繁重任务，它将占用系统的事件处理线程。如果你有复杂操作要执行，请使用自己的线程。\
  \ |\n\n### 一个简单示例\n\n为了说明问题，请考虑以下类：\n\n```\nimport javax.microedition.midlet.*;\n\
  import javax.microedition.lcdui.*;\n\npublic class Commander extends MIDlet {\n\
  \  public void startApp() {\n    Displayable d = new TextBox(\"TextBox\", \"Commander\"\
  , 20, TextField.ANY);\n    Command c = new Command(\"Exit\", Command.EXIT, 0);\n\
  \    d.addCommand(c);\n    d.setCommandListener(new CommandListener() {\n      public\
  \ void commandAction(Command c, Displayable s) {\n        notifyDestroyed();\n \
  \     }\n    });\n\n    Display.getDisplay(this).setCurrent(d);\n  }\n\n  public\
  \ void pauseApp() { }\n\n  public void destroyApp(boolean unconditional) { }\n}\
  \ \n```\n\n这个 MIDlet 创建了一个 `TextBox`（它是 `Displayable` 的一种），并向其添加了一个命令。监听器被创建为一个匿名内部子类。在\
  \ Sun 的工具包中，这个 MIDlet 显示如图 5-3 所示。\n\n![点击展开](img/fig86_01_0.jpg)\n图 5-3：一个带有单个命令\
  \ *Exit* 的简单 MIDlet\n\n图 5-3 显示了 **Exit** 命令被映射到 MIDP 模拟器的一个软键上。如果你向这个 MIDlet 添加另一个命令，它将被映射到另一个软键。如果你继续添加命令，那些无法在屏幕上容纳的命令将被放入屏幕外的菜单中。例如，一个包含四个命令的屏幕在\
  \ MIDP 模拟器中显示如图 5-4a 所示。\n\n![点击展开](img/fig87_01_0.jpg)\n图 5-4：此 MIDlet 的命令数量超过了设备的软键数量。调用\
  \ (a) 系统生成的 *Menu* 命令会显示 (b) 剩余的命令。\n\n如果你按下 **Menu** 软键，你将看到剩余的命令，如图 5-4b 所示。现在可以通过按数字键或使用方向键导航来选择菜单项。在图\
  \ 5-4 所示的示例中，**Exit** 命令被赋予了比其他命令更高的优先级（数字更小），这确保了它直接显示在屏幕上。其他优先级较低的命令则被归入命令菜单。\n\
  \n## 屏幕与滚动条\n\n本章的剩余部分以及第 6 章的全部内容将专门介绍 `Screen` 及其子类，它们是图 5-1 所示层次结构的左分支。`Screen`\
  \ 是所有表示通用用户界面的类的基类。\n\n相比之下，`Canvas` 是专用界面（例如游戏界面）的基类。`Canvas` 将在后面的第 10 章中全面介绍。\n\
  \n在接下来的章节中，我们将探讨 `Screen` 的每个子类。在这里，我将简要描述所有 `Screen` 的共同点：标题和滚动条。*标题*正如你所期望的那样：显示在屏幕顶部的字符串。*滚动条*只是一段在屏幕顶部滚动的文本；其名称来源于老式的股票行情自动收录器。\n\
  \n在 MIDP 2.0 中，我将要描述的四个方法已从 `Screen` 移至 `Displayable`。因此，MIDP 2.0 将标题和滚动条的概念扩展到了所有\
  \ `Displayable`，而不仅仅是 `Screen`。在 MIDP 2.0 中，`Screen` 类没有方法。\n\n标题是显示在屏幕顶部的文本字符串。正如你在图\
  \ 5-3 中看到的，屏幕的标题是 \"TextBox\"。`Screen` 的子类有设置标题的构造函数，但标题也可以通过以下方法访问：\n\n```\npublic\
  \ void setTitle(String newTitle)\npublic String getTitle()\n```\n\n滚动条的访问同样简单：\n\
  \n```\npublic void setTicker(Ticker newTicker)\npublic Ticker getTicker() \n```\n\
  \n`Ticker` 类是一个简单的字符串包装器。要向屏幕添加滚动条，可以这样做：\n\n```\n// Displayable d = ...\nTicker\
  \ ticker = new Ticker(\"This is the ticker message!\");\nd.setTicker(ticker);\n\
  ```\n\n图 5-5 展示了滚动条的实际效果。\n\n![](img/fig88_01.jpg)\n图 5-5：滚动条在屏幕顶部滚动。\n\n\n\n##\
  \ TextBox，最简单的屏幕\n\n最简单的屏幕类型是 TextBox，您已经在实际操作中见识过它了。TextBox 允许用户输入字符串。请记住，在普通的\
  \ MIDP 设备上，文本输入是一个繁琐的过程。许多设备只有数字键盘，因此输入单个字符需要按一次、两次或三次按钮。一个好的 MIDlet 应尽量减少用户输入。\n\
  \n话虽如此，您的 MIDlet 可能仍需要某种输入——也许是邮政编码、短名称或某种密码。在这些情况下，您可能希望使用 TextBox。\n\n创建 TextBox\
  \ 需要指定四个参数：\n\n```\npublic TextBox(String title, String text, int maxSize, int constraints)\n\
  ```\n\n`title` 用作屏幕标题，而 `text` 和 `maxSize` 决定了文本框的初始文本和最大大小。最后，`constraints` 可用于限制用户的输入。使用\
  \ `TextField` 类中的常量来指定所需的输入类型：\n\n*   `ANY` 允许任何类型的输入。\n*   `NUMERIC` 将输入限制为整数。\n\
  *   `DECIMAL`（MIDP 2.0 新增）允许包含小数部分的数字。\n*   `PHONENUMBER` 要求输入电话号码。\n*   `EMAILADDR`\
  \ 输入必须是电子邮件地址。\n*   `URL` 输入必须是网址。\n\n如何强制执行这些约束取决于具体实现。工具包模拟器只是不允许无效输入；例如，一个 `NUMERIC`\
  \ 类型的 TextBox 不允许您输入字母字符。\n\n上述约束可以与下面列出的标志组合使用。约束限制用户的行为，而标志则定义 TextBox 的行为。除 `PASSWORD`\
  \ 之外的所有标志都是 MIDP 2.0 新增的。\n\n*   `PASSWORD` 输入的字符不会显示；通常，它们会用星号表示。\n*   `UNEDITABLE`\
  \ 表示无法编辑的文本。\n*   `SENSITIVE` 用于标记实现不应存储的文本。某些输入方案会存储用户的输入，以便日后用于自动补全。此标志表示该文本是受限的，不应保存或缓存。\n\
  *   `NON_PREDICTIVE` 表示您期望用户输入任何文本预测输入方案可能无法猜到的文本。例如，如果您期望用户输入像 Z51002S 这样的订单号，您可以使用此标志来告知输入方案不必费心尝试预测输入。\n\
  *   `INITIAL_CAPS_WORD` 用于每个单词都应大写的输入。\n*   `INITIAL_CAPS_SENTENCE` 表示每个句子的首字符都应大写的输入。\n\
  \n如果您不希望 TextBox 执行任何验证，可以在构造函数中将 `ANY` 或其数值等效值 `0` 用于 `constraints` 参数。\n\n这些标志可以使用\
  \ OR 运算符与任何其他约束组合。例如，要创建一个将输入限制为电子邮件地址但隐藏输入数据的 TextBox，您可以这样做：\n\n```\nDisplayable\
  \ d = new TextBox(\"Email\", \"\", 64,\n        TextField.EMAILADDR | TextField.PASSWORD);\n\
  ```\n\n不过，仔细想想，`PASSWORD` 可能得不偿失。至少在桌面电脑上，密码字段的目的是防止路过您电脑屏幕的人看到您的秘密密码。您每输入一个字符，密码字段就会显示一个星号或其他符号。当您输入秘密密码时，屏幕上显示的只是一行星号。在手机和其他小型设备上，这就不那么令人担忧了，因为屏幕更小，而且比典型的桌面显示器更难看清。\n\
  \n此外，在小型设备上输入数据的困难意味着，如果您盲目输入，将很难正确输入密码。例如，手机通常需要您多次按键才能输入一个字母。在 Sun 的工具包模拟器上，按两次\
  \ '7' 键会输入字母 'Q'。在真实设备上，您必须通过以下按键序列来输入密码 \"gandalf\"：4, 2, 6, 6, 3, 2, 5, 5, 5,\
  \ 3, 3, 3。如果没有视觉反馈，输入密码时极容易出错。（“我按了 5 键两次还是三次？”）J2ME Wireless Toolkit 模拟器会显示当前字符，但之前输入的字符会显示为星号。好的密码通常混合大小写、数字，可能还有标点符号；这些字符很难正确输入。\n\
  \n在 MIDP 2.0 应用程序中，密码字段（无论是否使用 `PASSWORD` 标志）都应使用 `SENSITIVE` 标志进行保护，这样密码就不会出现在任何系统字典中，也不会在用户输入其他文本时意外弹出。\n\
  \nMIDP 2.0 在 TextBox 类中新增了一个方法，名为 `setInitialInputMode(String characterSubset)`。此方法用于向实现建议哪种输入模式最适合预期的文本。您只能建议输入模式，并且无法知道实现是否遵从了该请求。传递给该方法的字符串可以是\
  \ J2SE `java.lang.Character.UnicodeBlock` 类中的常量之一，并加上前缀 \"UCB_\"。例如，您可以向此方法传递 \"\
  UCB_BASIC_LATIN\" 或 \"UCB_KATAKANA\"。您也可以使用 `java.awt.im.InputSubset` 定义的输入子集，并加上前缀\
  \ \"IS_\"。例如，\"IS_LATIN\" 或 \"IS_KANJI\" 都是有效的。最后，MIDP 2.0 还定义了字符子集 \"MIDP_UPPERCASE_LATIN\"\
  \ 和 \"MIDP_LOWERCASE_LATIN\"。\n\n输入模式是对文本约束和标志的补充。您可以为约束指定 `ANY`，然后调用 `setInitialInputMode(\"\
  MIDP_LOWERCASE_LATIN\")` 来请求实现以小写输入开始。这并不会阻止用户更改输入模式，只是让事情从一开始就走上正轨。\n\n\n\n## 使用警报\n\
  \n*警报*是向用户显示的信息性消息。在 MIDP 领域中，有两种类型的警报：\n\n*   **定时**警报会显示一段时间，通常只有几秒钟。它显示无需确认的信息性消息，例如“您的交易已完成”或“我现在无法执行此操作，戴夫。”\n\
  \n*   **模态**警报会一直显示，直到用户将其关闭。当需要为用户提供操作选择时，模态警报非常有用。您可以显示一条消息，例如“您准备好预订这些票了吗？”，并提供**是**和**否**命令作为选项。\n\
  \nMIDP 警报可以有一个关联的图标，例如停止标志或问号。警报甚至可能带有关联的声音，但这取决于具体实现。MIDP 警报与 MacOS 和 Windows 等窗口系统中的模态对话框概念非常相似。图\
  \ 5-6 显示了一个典型的警报。\n\n![](img/fig91_01.jpg)\n图 5-6：警报类似于桌面窗口系统中的模态对话框。\n\n警报由 `javax.microedition.lcdui.Alert`\
  \ 类的实例表示，该类提供以下构造函数：\n\n```\npublic Alert()\npublic Alert(String title, String alertText,\
  \ Image alertImage, AlertType alertType)\n```\n\n第二个构造函数中的任何或所有参数都可以为 `null`。（现在不必担心\
  \ `Image` 类；我将在下一章的列表部分讨论它。）\n\n默认情况下，定时警报使用默认超时值创建；您可以通过调用 `getDefaultTimeout()`\
  \ 来查找默认值。要更改警报的超时时间，请调用 `setTimeout()`，并将超时值以毫秒为单位传入。特殊值 `FOREVER` 可用于指示该警报是模态的。\n\
  \n您可以使用以下代码创建一个简单的定时警报：\n\n```\nAlert alert = new Alert(\"抱歉\", \"我很抱歉，戴夫...\",\
  \ null, null);\n```\n\n要显式将超时值设置为五秒，您可以这样做：\n\n```\nalert.setTimeout(5000);\n```\n\
  \n相反，如果您想要一个模态警报，您可以使用特殊值 `FOREVER`：\n\n```\nalert.setTimeout(Alert.FOREVER);\n\
  ```\n\nMIDP 实现将自动提供一种关闭模态警报的方法。例如，Sun 的参考实现提供了一个映射到软按钮的**完成**命令。MIDP 2.0 将此命令公开为静态成员\
  \ `DISMISS_COMMAND`，允许您注册自己的命令监听器并显式识别此命令。您可以使用通常的 `addCommand()` 方法向警报添加自己的命令。第一次调用\
  \ `addCommand()` 时，系统的关闭命令将被移除。\n\n警报的默认行为是在警报被关闭或超时时自动前进到下一个屏幕。您可以通过将警报和下一个屏幕传递给\
  \ `Display` 中的双参数 `setCurrent()` 方法来指定下一个屏幕。如果您调用常规的单参数 `setCurrent()` 方法，则在警报关闭时会恢复上一个屏幕。\n\
  \n警报类型作为对底层 MIDP 实现的提示。实现可能会使用警报类型来决定在显示警报时播放何种声音。`AlertType` 类提供了五种类型，作为静态成员变量访问：`ALARM`、`CONFIRMATION`、`ERROR`、`INFO`\
  \ 和 `WARNING`。\n\nMIDP 2.0 为警报添加了一个指示器。默认情况下，没有指示器，但您可以通过将 `Gauge` 传递给 `Alert` 的\
  \ `setIndicator()` 方法来添加一个。（`Gauge` 将在下一章的表单部分介绍。）该指示器对于显示网络连接或长时间计算中的进度非常方便。\n\n\
  以下示例 `TwoAlerts` 展示了两种类型的警报。它以一个主 `TextBox` 为特色，该文本框在 MIDlet 启动时显示。两个命令，**Go** 和\
  \ **About**，提供对警报的访问。**Go** 命令显示一个包含关于虚构网络错误消息的定时警报。**About** 命令显示一个可能包含版权信息的模态警报。第三个命令\
  \ **Exit** 提供了一种退出 MIDlet 的方法。请记住，所有三个命令可能无法同时显示在屏幕上；其中一些可能可以从二级菜单访问。\n\n```\nimport\
  \ javax.microedition.midlet.*;\nimport javax.microedition.lcdui.*;\n\npublic class\
  \ TwoAlerts\n    extends MIDlet\n    implements CommandListener {\n  private Display\
  \ mDisplay;\n\nprivate TextBox mTextBox;\n  private Alert mTimedAlert;\n  private\
  \ Alert mModalAlert;\n\nprivate Command mAboutCommand, mGoCommand, mExitCommand;\n\
  \npublic TwoAlerts() {\n    mAboutCommand = new Command(\"关于\", Command.SCREEN,\
  \ 1);\n    mGoCommand = new Command(\"执行\", Command.SCREEN, 1);\n    mExitCommand\
  \ = new Command(\"退出\", Command.EXIT, 2);\n\nmTextBox = new TextBox(\"TwoAlerts\"\
  , \"\", 32, TextField.ANY);\n    mTextBox.addCommand(mAboutCommand);\n    mTextBox.addCommand(mGoCommand);\n\
  \    mTextBox.addCommand(mExitCommand);\n    mTextBox.setCommandListener(this);\n\
  \nmTimedAlert = new Alert(\"网络错误\",\n        \"发生网络错误。请重试。\",\n        null,\n \
  \       AlertType.INFO);\n    mModalAlert = new Alert(\"关于 TwoAlerts\",\n      \
  \    \"TwoAlerts 是一个简单的 MIDlet，用于演示警报的使用。\",\n          null,\n          AlertType.INFO);\n\
  \    mModalAlert.setTimeout(Alert.FOREVER);\n  }\n\npublic void startApp() {\n \
  \   mDisplay = Display.getDisplay(this);\n\nmDisplay.setCurrent(mTextBox);\n  }\n\
  \npublic void pauseApp() {\n  }\n\npublic void destroyApp(boolean unconditional)\
  \ {}\n\npublic void commandAction(Command c, Displayable s) {\n    if (c == mAboutCommand)\n\
  \      mDisplay.setCurrent(mModalAlert);\n    else if (c == mGoCommand)\n      mDisplay.setCurrent(mTimedAlert,\
  \ mTextBox);\n    else if (c == mExitCommand)\n      notifyDestroyed();\n  }\n}\n\
  ```\n\n## 总结\n\nMIDP 的主要用户界面类基于可适应具有不同显示和输入能力设备的抽象概念。几种预包装的屏幕类使得创建用户界面变得容易。屏幕具有标题和可选的滚动条。最重要的是，屏幕可以包含命令，实现将这些命令提供给用户。您的应用程序可以通过充当监听器对象来响应命令。本章描述了用于接受用户输入的屏幕\
  \ `TextBox`，以及用于显示信息的简单屏幕 `Alert`。在下一章中，我们将深入探讨更复杂的 `List` 和 `Form` 类。\n\n"
- "# 第 6 章：列表和表单\n\n在上一章中，您了解了 MIDP 较简单的屏幕类。现在我们进入更深层次的内容，涉及显示列表的屏幕以及包含混合类型控件的屏幕。\n\
  \n## 使用列表\n\n在 `TextBox` 和 `Alert` 之后，下一个最简单的屏幕是 `List`，它允许用户从选项列表中选择项目（称为*元素*）。列表中的每个元素由文本字符串或图像表示。`List`\
  \ 支持选择单个元素或多个元素。\n\n`List` 主要有两种类型，由 `Choice` 接口中的常量表示：\n\n*   `MULTIPLE` 表示一个可以同时选择多个元素的列表。\n\
  \n*   `EXCLUSIVE` 指定一个只能选择一个元素的列表。它类似于一组单选按钮。\n\n\n\n### 理解列表类型\n\n对于**多选**和**单选**列表，选择与确认是两个独立的步骤。实际上，列表本身并不处理这些类型的确认操作——你的\
  \ MIDlet 需要提供其他机制（通常是一个命令）让用户确认其选择。**多选**列表允许用户在确认选择前，对各个元素进行选中或取消选中操作。**单选**列表则允许用户在确认选择前多次更改选择。\n\
  \n图 6-1a 展示了一个**单选**列表。用户通过上下方向键在列表中导航，按下设备上的选择键即可选中某个元素。图 6-1b 展示了一个**多选**列表。其操作方式与**单选**列表基本相同，但可以同时选中多个元素。同样，用户通过上下方向键在列表中移动，选择键用于切换特定元素的选中状态。\n\
  \n![点击展开](img/fig96_01_0.jpg)\n图 6-1：列表类型——(a) *单选* 和 (b) *多选*\n\n此外，还存在一种**单选**的变体：**隐式**列表将选择与确认步骤合二为一。**隐式**列表的行为类似于菜单。图\
  \ 6-2 展示了一个**隐式**列表，每个元素都包含图像和文本。当用户按下选择键时，列表会立即触发一个事件，就像命令一样。**隐式**列表与**单选**列表类似，用户只能选择其中一个列表元素。但使用**隐式**列表时，用户在确认选择前没有机会更改主意。\n\
  \n![](img/fig96_02.jpg)\n图 6-2：*隐式*列表将选择与确认合二为一。\n\n### 隐式列表的事件处理\n\n当用户在**隐式**列表中做出选择时，会调用列表的\
  \ `CommandListener` 中的 `commandAction()` 方法。一个特殊值会作为 `Command` 参数传递给 `commandAction()`：\n\
  \n```\npublic static final Command SELECT_COMMAND\n```\n\n例如，你可以像这样测试命令事件的来源：\n\n\
  ```\npublic void commandAction(Command c, Displayable s) {\n  if (c == nextCommand)\n\
  \    // ...\n  else if (c == List.SELECT_COMMAND)\n    // ...\n}\n```\n\n本章末尾有一个演示**隐式**列表的示例。\n\
  \n在 MIDP 2.0 中，`setSelectCommand()` 方法允许你指定自己的命令用于选择，而不必使用 `SELECT_COMMAND`。\n\n\
  ### 创建列表\n\n要创建一个列表，需要指定标题和列表类型。如果你预先知道元素名称和图像，可以在构造函数中传递它们：\n\n```\npublic List(String\
  \ title, int type)\npublic List(String title, int type,\n    String[] stringElements,\
  \ Image[] imageElements)\n```\n\n`stringElements` 参数不能为 null；但是，`stringElements`\
  \ 或 `imageElements` 数组中可能包含 null 元素。如果某个列表元素的字符串和图像都为 null，则该元素显示为空白。如果字符串和图像都已定义，则该元素将同时显示图像和字符串。\n\
  \n某些列表的元素数量可能超过屏幕显示范围。实际上，不同设备能容纳的元素数量各不相同。但不必担心：列表实现会自动处理上下滚动，以显示列表的全部内容。\n\n###\
  \ 关于图像\n\n我们对列表类的初步探索让我们首次接触到了图像。`javax.microedition.lcdui.Image` 类的实例代表了 MIDP 中的图像。规范要求实现能够加载\
  \ PNG 格式的图像文件。^([1]) 该格式支持透明色和无损压缩。\n\n`Image` 没有构造函数，但 `Image` 类提供了几个 `createImage()`\
  \ 工厂方法来获取 `Image` 实例。首先是用于从 PNG 数据加载图像的方法。\n\n```\npublic static Image createImage(String\
  \ name)\npublic static Image createImage(byte[] imagedata, int imageoffset,\n  \
  \  int imagelength)\n```\n\n第一个方法尝试从指定名称的文件创建图像，该文件应打包在包含你的 MIDlet 的 JAR 文件中。你应该使用绝对路径名，否则可能找不到图像文件。第二个方法使用提供的数组中的数据创建图像。数据从给定的数组偏移量\
  \ `imageoffset` 开始，长度为 `imagelength` 字节。在 MIDP 2.0 中，你还可以从 `InputStream` 创建图像：\n\
  \n```\npublic static Image createImage(InputStream stream)\n```\n\n图像可以是*可变*的或*不可变*的。可变图像可以通过调用\
  \ `getGraphics()` 并使用返回的 `Graphics` 对象在图像上绘制来进行修改。（关于 `Graphics` 的完整细节，请参见第 10 章。）如果尝试在不可变图像上调用\
  \ `getGraphics()`，则会抛出 `IllegalStateException`。\n\n上述 `createImage()` 方法返回的是不可变图像。要创建可变图像，请使用以下方法：\n\
  \n```\npublic static Image createImage(int width, int height)\n```\n\n通常，你会创建一个可变图像用于离屏绘制，例如用于动画，或者在设备显示不支持双缓冲时减少闪烁。\n\
  \n你传递给 `Alert`、`ChoiceGroup`、`ImageItem` 或 `List` 的任何图像都应该是不可变的。要从可变图像创建不可变图像，请使用以下方法：\n\
  \n```\npublic static Image createImage(Image image)\n```\n\n在 MIDP 2.0 中，你还可以使用以下方法从另一图像的一部分创建图像：\n\
  \n```\npublic static Image createImage(Image image,\n    int x, int y, int width,\
  \ int height, int transform)\n```\n\n此方法获取由 `x`、`y`、`width` 和 `height` 描述的原始图像部分，应用指定的变换，并将结果作为不可变图像返回。可能的变换由\
  \ `javax.microedition.lcdui.game.Sprite` 类中的常量描述，包括镜像和 90 度旋转等。\n\n`Image` 还包含将图像数据作为\
  \ int 数组处理的方法。我将在第 10 章中稍后讨论这些方法。\n\n如何确定你需要多大尺寸的图像？在 MIDP 2.0 中，`Display` 提供了返回各种类型图像最佳宽度和高度信息的方法：\n\
  \n```\npublic int getBestImageHeight(int imageType);\npublic int getBestImageWidth(int\
  \ imageType);\n```\n\n`imageType` 参数应为 `Display` 的常量之一：`LIST_ELEMENT`、`ALERT` 或\
  \ `CHOICE_GROUP_ELEMENT`。（你将在本章后面全面了解 `ChoiceGroup`。）如果你正在构建一个列表，可以查询 `Display`\
  \ 以找到元素图像的最佳尺寸。假设你的应用程序中打包了各种尺寸的图标，你可以在运行时选择最佳尺寸的图像。\n\n\n\n### 编辑列表\n\n列表提供了添加项目、删除元素和检查元素的方法。列表中的每个元素都有一个索引。第一个元素的索引为\
  \ 0，下一个为 1，依此类推。你可以使用`set()`替换元素，或使用`append()`将元素添加到列表末尾。`insert()`方法在指定索引处向列表添加新元素；这会使该位置及之后的所有元素索引加一。\n\
  \n```\npublic void set(int elementNum, String stringPart, Image imagePart)\npublic\
  \ void insert(int elementNum, String stringPart, Image imagePart)\npublic int append(String\
  \ stringPart, Image imagePart)\n```\n\n你可以通过提供元素的索引来检查其字符串或图像。同样，你可以使用`delete()`从列表中移除元素。\n\
  \n```\npublic String getString(int elementNum)\npublic Image getImage(int elementNum)\n\
  public void delete(int elementNum)\n```\n\nMIDP 2.0 还提供了一个`deleteAll()`方法，用于移除列表中的所有元素。\n\
  \n最后，`size()`方法返回列表中的元素数量。\n\n虽然通常由 MIDP 实现负责显示列表，但 MIDP 2.0 中的新方法让你对列表的外观有了一定控制。第一个方法`setFitPolicy()`告诉列表应如何处理文本宽度超过屏幕的元素。可选值（来自`Choice`接口）如下：\n\
  \n*   `TEXT_WRAP_ON` 表示长元素将自动换行显示。\n*   `TEXT_WRAP_OFF` 表示长元素将在屏幕边缘被截断。\n*   `TEXT_WRAP_DEFAULT`\
  \ 表示实现应使用其默认的适配策略。\n\n另一个新方法是`setFont()`，它允许你指定用于特定列表元素的字体。（字体将在第 10 章中详细讨论。）可以通过调用`getFont()`来获取元素当前的字体。对`setFitPolicy()`和`setFont()`的调用仅作为提示；具体如何显示列表，以及是否满足所请求的适配策略或字体，由实现决定。\n\
  \n### 处理列表选择\n\n你可以通过将元素的索引传递给以下方法，来检查列表中的特定元素是否被选中：\n\n```\npublic boolean isSelected(int\
  \ index) \n```\n\n对于`EXCLUSIVE`和`IMPLICIT`列表，以下方法会返回唯一选中元素的索引：\n\n```\npublic int\
  \ getSelectedIndex()\n```\n\n如果你在`MULTIPLE`列表上调用`getSelectedIndex()`，它将返回-1。\n\n\
  要以编程方式更改当前选择，请使用`setSelectedIndex()`。\n\n```\npublic void setSelectedIndex(int index,\
  \ boolean selected)\n```\n\n最后，列表允许你使用以下方法*批量*设置或获取选择状态。提供的数组必须具有与列表元素数量相同的数组元素。\n\
  \n```\npublic int getSelectedFlags(boolean[] selectedArray_return)\npublic void\
  \ setSelectedFlags(boolean[] selectedArray)\n```\n\n### 示例\n\n清单 6-1 中的示例展示了一个简单的\
  \ MIDlet，它可以是旅行预订应用程序的一部分。用户选择要进行的预订类型。此示例使用了一个`IMPLICIT`列表，本质上是一个菜单。\n\n清单 6-1：*TravelList*\
  \ 源代码\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport java.io.*;\nimport javax.microedition.midlet.*;\n\
  import javax.microedition.lcdui.*;\n\npublic class TravelList\n    extends MIDlet\n\
  \    implements CommandListener {\n  private List mList;\n  private Command mExitCommand,\
  \ mNextCommand;\n\n  public TravelList() {\n    String[] stringElements = { \"Airplane\"\
  , \"Car\", \"Hotel\" };\n    Image[] imageElements = { loadImage(\"/airplane.png\"\
  ),\n        loadImage(\"/car.png\"), loadImage(\"/hotel.png\") };\n    mList = new\
  \ List(\"Reservation type\", List.IMPLICIT,\n        stringElements, imageElements);\n\
  \    mNextCommand = new Command(\"Next\", Command.SCREEN, 0);\n    mExitCommand\
  \ = new Command(\"Exit\", Command.EXIT, 0);\n    mList.addCommand(mNextCommand);\n\
  \    mList.addCommand(mExitCommand);\n    mList.setCommandListener(this);\n  }\n\
  \n  public void startApp() {\n    Display.getDisplay(this).setCurrent(mList);\n\
  \  }\n\n  public void commandAction(Command c, Displayable s) {\n    if (c == mNextCommand\
  \ || c == List.SELECT_COMMAND) {\n      int index = mList.getSelectedIndex();\n\
  \      Alert alert = new Alert(\"Your selection\",\n        \"You chose \" + mList.getString(index)\
  \ + \".\",\n        null, AlertType.INFO);\n      Display.getDisplay(this).setCurrent(alert,\
  \ mList);\n    }\n    else if (c == mExitCommand)\n      notifyDestroyed();\n  }\n\
  \n  public void pauseApp() {}\n\n  public void destroyApp(boolean unconditional)\
  \ {}\n\n  private Image loadImage(String name) {\n    Image image = null;\n    try\
  \ {\n      image = Image.createImage(name);\n    }\n    catch (IOException ioe)\
  \ {\n      System.out.println(ioe);\n    }\n\n    return image;\n  }\n} \n```\n\n\
  | **![结束示例](img/_1.gif)** |\n\n|  |\n\n要查看此示例中的图像，你需要从本书网站下载示例，或提供你自己的图像。使用 J2ME\
  \ Wireless Toolkit 时，图像文件应放在工具包项目目录的*res*目录中。TravelList 期望找到三个名为*airplane.png*、*car.png*和*hotel.png*的图像。\n\
  \n列表本身的构造非常简单。我们的应用程序还包含一个**Next**命令和一个**Exit**命令，它们都被添加到列表中。TravelList 实例被注册为列表的`CommandListener`。如果触发了**Next**命令或列表的`IMPLICIT`命令，我们只需从列表中检索选中的项目，并在`Alert`中显示它。\n\
  \n实际上，在此示例中，**Next**命令并非严格必要，因为你可以通过单击列表中某个元素的选择按钮来实现相同的结果。不过，保留它可能是个好主意。也许应用程序中的所有其他屏幕都有**Next**命令，因此你可以为了用户界面的一致性而保留它。为用户提供多种操作方式总没有坏处。\n\
  \n`EXCLUSIVE`和`IMPLICIT`列表之间的区别可能很微妙。尝试将此示例中的列表更改为`EXCLUSIVE`，看看用户体验有何不同。\n\n^([1])MIDP\
  \ 实现不需要识别所有类型的 PNG 文件。`Image`类的文档中有具体说明。\n\n\n\n## 使用表单创建高级界面\n\n表单是一种屏幕，可以包含任意一组用户界面控件，这些控件称为项目。在电影票预订\
  \ MIDlet 中，你可以使用表单让用户在一个屏幕上输入日期和邮政编码。\n\n请记住，MID 的最小屏幕尺寸为 96 × 54 像素。你无法在这个尺寸的屏幕上容纳太多内容，也不应尝试这样做。无法完全显示在屏幕上的表单会自动滚动，因此无论屏幕尺寸如何，你的\
  \ MIDlet 都能显示表单。不过，滚动表单往往会让用户感到困惑，因此应尽量保持表单简洁。\n\n`javax.microedition.ldcui.Form`\
  \ 类本身相当简单。创建表单的一种方法是指定标题：\n\n```\npublic Form(String title) \n```\n\n本质上，表单是一个项目的集合。每个项目由\
  \ `Item` 类的实例表示。如果你提前准备好了所有项目，可以将它们传递给 Form 的另一个构造函数：\n\n```\npublic Form(String\
  \ title, Item[] items)\n```\n\n作为 `Screen` 和 `Displayable` 的子类，`Form` 继承了标题和滚动条。然而，考虑到典型\
  \ MIDP 设备屏幕尺寸较小，你可能应避免在表单中使用滚动条。\n\nForm 的父类 `Displayable` 赋予了 Form 显示命令和触发命令事件的能力。同样，你应尽量保持表单中的命令简单；在许多情况下，一个**下一步**和一个**返回**可能就足够了。\n\
  \n与任何 `Displayable` 一样，显示表单的基本策略是创建一个表单并将其传递给 `Display` 的 `setCurrent()` 方法。MIDP\
  \ 2.0 提供了一个额外的选项，即 `Display` 中的 `setCurrentItem()` 方法。此方法会使包含该项目的表单可见，然后滚动表单，使该项目可见并获得输入焦点。\n\
  \n### 管理项目\n\n即使在表单显示时，也可以添加和移除项目。项目的顺序也很重要；大多数 MIDP 实现会从上到下、可能从左到右显示表单的项目，如果项目数量超过屏幕可用空间，则会根据需要垂直滚动表单。\n\
  \n要将项目添加到表单底部，请使用 `append()` 方法之一。第一个方法可用于添加任何 `Item` 实现。后两个 `append()` 方法纯粹是为了方便；在后台，会为你创建一个\
  \ `StringItem` 或 `ImageItem`。\n\n```\npublic int append(Item item)\npublic int append(String\
  \ str)\npublic int append(Image image)\n```\n\n表单中的每个项目都有一个索引。你可以使用以下方法将项目放置在特定索引处（替换该索引处的先前项目）：\n\
  \n```\npublic void set(int index, Item item) \n```\n\n或者，如果你想在表单中间某处添加项目，只需为 `insert()`\
  \ 方法提供新项目所需的索引即可。后续项目的索引将依次递增一位。\n\n```\npublic void insert(int index, Item item)\n\
  ```\n\n要从表单中移除项目，请使用 `delete()`。\n\n```\npublic void delete(int index)\n```\n\n\
  MIDP 2.0 还包含一个 `deleteAll()` 方法，用于移除表单的所有项目。\n\n如果你忘记了表单中放置的内容，可以通过以下方法获取项目数量并检索它们：\n\
  \n```\npublic int size()\npublic Item get(int index)\n```\n\n### 理解表单布局\n\n在 MIDP\
  \ 1.0 实现中，表单大多是垂直排列的。通常，添加到表单的项目会垂直堆叠显示。如果项目无法全部显示在屏幕上，表单允许用户根据需要滚动。\n\n此规则的例外是\
  \ `StringItem` 和 `ImageItem`。如果屏幕上有足够空间，这些项目可能会从左到右排列。然而，具体如何布局表单由实现决定。在 J2ME Wireless\
  \ Toolkit 1.0.1 模拟器中，`StringItem` 和 `ImageItem` 始终垂直堆叠。\n\nMIDP 2.0 通过增加对更具体布局的支持，承认了\
  \ MIDP 设备屏幕不断扩大的趋势。在 `javax.microedition.lcdui.Form` 文档的“布局”部分，有对布局算法的详尽描述。简而言之，Form\
  \ 尝试从左到右按行排列项目，并从上到下堆叠行，就像页面上的英文文本一样。正如你将看到的，`Item` 类在 MIDP 2.0 中包含了额外的机制，允许对单个项目的布局进行一定控制。\n\
  \n### 项目工具箱\n\nMIDP 规范包含一个方便的项目工具箱，可用于构建表单。我将在本节中简要介绍每个项目，并展示其中一些项目在 Sun 的 MIDP\
  \ 参考实现中的外观。\n\n\n\n#### Item 类\n\n所有可添加到表单中的项目都继承自 `javax.microedition.lcdui.Item`\
  \ 类。在 MIDP 1.0 中，Item 类并未定义太多内容，仅提供了 `getLabel()` 和 `setLabel()` 方法。所有 Item 对象都有一个字符串标签，但具体子类可能会选择显示或不显示该标签。\n\
  \nMIDP 2.0 在两个方向上对 Item 类进行了显著扩展。首先是命令处理。在 MIDP 2.0 中，Item 对象可以像 Displayable 对象一样拥有命令。当表单中的某个\
  \ Item 被选中时，该 Item 的命令会与表单自身的命令一同显示。图 6-3 展示了一个包含四个字符串项目的表单，它们被巧妙地命名为“one”、“two”、“three”和“four”。表单本身有一个命令“Exit”。除了“three”有一个名为“Details”的命令外，其他字符串项目均无命令。\n\
  \n![](img/fig106_01.jpg)\n图 6-3：项目“three”拥有一个命令。\n\n请注意，工具包模拟器如何通过一条浅下划线来指示项目上存在一个或多个命令。当您导航到表单中带有额外命令的项目时，该命令会像其他任何命令一样显示出来，如图\
  \ 6-4 所示。\n\n![](img/fig107_01.jpg)\n图 6-4：当项目被选中时，其命令会显示出来。\n\n管理项目命令的语义与管理表单命令的语义几乎相同。您可以使用\
  \ `addCommand()` 和 `removeCommand()` 来管理 Item 上的命令。请注意，添加到 Item 的命令类型应为 `ITEM`，即使不是此类型也不会抛出异常。可以使用\
  \ `setItemCommandListener()` 方法分配一个命令监听器。`ItemCommandListener` 接口包含一个单一方法，类似于 `CommandListener`\
  \ 的单一方法：\n\n```\npublic void commandAction(Command c, Item item)\n```\n\n如何显示项目的命令取决于具体实现。您在\
  \ MIDlet 中只需添加命令、设置监听器，然后等待命令事件即可。\n\nItem 还支持*默认命令*。如果运行时设备具有适合默认命令的按钮、旋钮或其他用户界面控件，则可以调用此命令。您可以通过调用\
  \ `setDefaultCommand()` 来设置 Item 的默认命令。\n\nItem 在 MIDP 2.0 中最大的 API 变化与布局控制有关。Item\
  \ 具有*最小尺寸*和*首选尺寸*，可用于控制项目在表单中显示的大小。最小尺寸由实现计算得出，并可通过 `getMinimumWidth()` 和 `getMinimumHeight()`\
  \ 获取。最小尺寸取决于 Item 的内容，并且每次内容更改时，实现都可能更改它。无法更改项目的最小尺寸，但检查最小尺寸可能有助于您的应用程序决定如何布局表单。\n\
  \n相比之下，首选尺寸既可以由实现计算，也可以由您指定。首选宽度和高度的默认值为 -1，这是一个特殊值，告诉实现“我不关心，你自行决定该项目的最佳尺寸”。如果您在\
  \ `setPreferredSize()` 中为宽度或高度传递了特定的正值，则该维度被称为*锁定*，实现将尝试在布局中使用它。\n\n`getPreferredWidth()`\
  \ 和 `getPreferredHeight()` 方法并不总是返回您传递给 `setPreferredSize()` 的值。例如，如果您通过调用 `setPreferredSize(-1,\
  \ -1)` 解锁了宽度和高度，那么 `getPreferredWidth()` 和 `getPreferredHeight()` 返回的值将是实现计算出的首选尺寸。\n\
  \n最后，MIDP 2.0 的 Item 类包含一个布局指令，可通过 `getLayout()` 和 `setLayout()` 访问。布局值由一个整数表示，通常是\
  \ `LAYOUT_2`（一个指示 MIDP 2.0 布局的标志）、一个水平值和一个垂直值的组合。`LAYOUT_2` 是一个标志，告诉实现该项目应使用 MIDP\
  \ 2.0 规则进行布局。水平值包括：\n\n*   `LAYOUT_LEFT`\n*   `LAYOUT_RIGHT`\n*   `LAYOUT_CENTER`\n\
  \n垂直值包括：\n\n*   `LAYOUT_TOP`\n*   `LAYOUT_BOTTOM`\n*   `LAYOUT_VCENTER`\n\n此外，布局值可能包含*收缩*或*扩展*。收缩意味着使用项目的最小宽度或高度，而扩展意味着拉伸项目的大小以填充可用宽度或行高。用于收缩和扩展的常量是：\n\
  \n*   `LAYOUT_SHRINK`（用于宽度）\n*   `LAYOUT_EXPAND`（用于宽度）\n*   `LAYOUT_VSHRINK`（用于高度）\n\
  *   `LAYOUT_VEXPAND`（用于高度）\n\n最后，Item 的布局可能包含在项目之前或之后换行的请求，使用 `LAYOUT_NEWLINE_BEFORE`\
  \ 或 `LAYOUT_NEWLINE_AFTER` 常量。项目在表单中的布局方式类似于文本在页面上的流动，因此这些常量允许您在项目之前或之后请求新行。\n\n\
  图 6-5 展示了一个简单示例，三个组件具有以下布局：\n\n*   `LAYOUT_2 | LAYOUT_LEFT | LAYOUT_NEWLINE_AFTER`\n\
  *   `LAYOUT_2 | LAYOUT_CENTER | LAYOUT_NEWLINE_AFTER`\n*   `LAYOUT_2 | LAYOUT_RIGHT\
  \ | LAYOUT_NEWLINE_AFTER`\n\n![](img/fig109_01.jpg)\n图 6-5：表单布局示例\n\n#### StringItem\n\
  \n`StringItem` 表示一个简单的文本标签。例如，考虑以下代码：\n\n```\nForm form = new Form(\"Form Title\"\
  );\nStringItem stringItem = new StringItem(\"Label: \", \"Value\");\nform.append(stringItem);\n\
  ```\n\n此代码（加上一个**返回**命令）生成的表单如图 6-6 所示。\n\n![](img/fig110_01.jpg)\n图 6-6：包含单个 *StringItem*\
  \ 和一个 *返回* 命令的表单\n\n您可以将 `StringItem` 的标签或值设置为 `null`，以指示其不应显示在屏幕上。（更好的方法是，您可以直接使用\
  \ Form 的 `append(String)` 方法。）`StringItem` 从 Item 继承了 `setLabel()` 和 `getLabel()`\
  \ 方法。它还包含用于访问和调整字符串值的 `getText()` 和 `setText()` 方法。\n\nMIDP 2.0 为 `StringItem` 和\
  \ `ImageItem` 增加了对*外观模式*的支持。外观模式允许项目看起来像 URL 链接或按钮，尽管在其他所有方面，该项目的行为与普通的 `StringItem`\
  \ 或 `ImageItem` 相同。三种外观模式（定义在 Item 类中）是：\n\n*   `PLAIN`：以正常状态显示项目。\n*   `HYPERLINK`：将项目显示为\
  \ URL。典型的操作是尝试使用 MIDlet 的 `platformRequest()` 方法打开链接。\n*   `BUTTON`：将项目显示为按钮。请注意，这可能不太方便，尤其是在没有指针事件的设备上，通常您应该在使用\
  \ `BUTTON` 外观模式的项目时，改用 Command。\n\n与 `javax.microedition.lcdui` 包中几乎所有其他内容一样，显示不同外观模式是具体实现的责任，您的应用程序在不同设备上可能看起来不同。此外，实现适当的行为是您应用程序的责任。例如，您可能希望向一个\
  \ `HYPERLINK` 类型的 `StringItem` 添加一个命令，该命令调用 MIDlet 的 `platformRequest()` 方法来打开链接。\n\
  \n|  | 注意 | J2ME Wireless Toolkit 测试版模拟器在显示 *HYPERLINK* 或 *BUTTON* 类型的 *StringItem*\
  \ 时，与 *PLAIN* 类型没有区别，除了一种特殊情况。如果 *StringItem* 是 *BUTTON* 类型并且有关联的项目命令，它会显示为带有斜角边框。\
  \ |\n\n最后，MIDP 2.0 在 `StringItem` 类中提供了 `getFont()` 和 `setFont()` 方法。我将在第 10 章中描述\
  \ Font 类。\n\n#### MIDP 2.0 中的 Spacer\n\nMIDP 2.0 引入了一个新的 Item 类 `Spacer`，它表示表单中的空白区域。它可用于布局目的。您需要做的就是指定最小宽度和高度：\n\
  \n```\npublic Spacer(minWidth, minHeight)\n```\n\n\n\n#### TextField\n\nTextField\
  \ 表示一个可编辑的字符串。图 6-7 展示了一个标签为“TextFieldTitle”、值为“text”的 TextField。\n\n![](img/fig111_01.jpg)\n\
  图 6-7：包含一个 *TextField* 和一个 *Back* 命令的表单\n\n在 Sun 的 MIDP 2.0 模拟器中，可以通过点击模拟器中的数字按钮或使用键盘直接向\
  \ TextField 输入文本。当然，具体如何允许编辑由实现决定。某些实现甚至可能显示一个单独的编辑屏幕。\n\nTextField 可以限制输入。定义了以下常量：\n\
  \n*   ANY 允许任何类型的输入。\n*   NUMERIC 将输入限制为数字。\n*   DECIMAL（MIDP 2.0 新增）允许包含小数部分的数字。\n\
  *   PHONENUMBER 要求输入电话号码。\n*   EMAILADDR 输入必须是电子邮件地址。\n*   URL 输入必须是 URL。\n\n这些输入约束可能看起来很熟悉；它们与\
  \ TextBox 使用的约束相同，我在上一章中介绍过。与 TextBox 一样，标志 PASSWORD、SENSITIVE、UNEDITABLE、NON_PREDICTIVE、INITIAL_CAPS_WORD\
  \ 和 INITIAL_CAPS_SENTENCE 可以使用 OR 运算符与约束组合使用。\n\n要创建 TextField，需要提供标签、文本值、最大长度和输入约束。\n\
  \n```\npublic TextField(String label, String text, int maxSize, int constraints)\n\
  ```\n\n对于初始为空的 TextField，将 null 传递给 text 参数。\n\n与 TextBox 一样，MIDP 2.0 中的 TextField\
  \ 类包含一个 setInitialInputMode() 方法，用于向实现建议合适的输入模式。\n\n#### ImageItem\n\n表单也可以包含图像，这些图像由\
  \ ImageItem 的实例表示。ImageItem 具有若干关联数据：\n\n*   *标签* 可能与图像一起显示。\n*   *布局* 决定图像的放置位置。\n\
  *   如果无法显示图像，则显示*替代文本*。\n\n要创建 ImageItem，只需提供要显示的 Image、标签、布局和替代文本。\n\nImageItem\
  \ 为布局参数定义了常量。最简单的方式是指定默认值 LAYOUT_DEFAULT。如果需要更多控制，可以将水平值与垂直值组合使用。水平值包括 LAYOUT_LEFT、LAYOUT_CENTER\
  \ 和 LAYOUT_RIGHT。垂直值包括 LAYOUT_NEWLINE_BEFORE 和 LAYOUT_NEWLINE_AFTER。在 MIDP 2.0 中，布局由\
  \ Item 类中的布局常量控制。ImageItem 类中的常量是为了向后兼容而保留的。\n\nImageItem 在 MIDP 2.0 中支持外观模式，与 StringItem\
  \ 类似。ImageItem 包含一个新的构造函数，允许您设置外观模式。\n\n图 6-8 展示了一个包含单个 ImageItem 的表单。\n\n![](img/fig113_01.jpg)\n\
  图 6-8：一个 *ImageItem*\n\n#### DateField\n\nDateField 是一种极其方便的机制，用户可以通过它输入日期、时间或两者。由实现决定为用户提供某种合理的方式来输入日期和时间；作为\
  \ MIDlet 程序员，您只需使用 DateField，无需担心具体实现。\n\n要创建 DateField，请指定标签和类型。DateField 类中的三个常量描述了不同的类型：\n\
  \n*   DATE 显示可编辑的日期。\n*   TIME 显示可编辑的时间。\n*   DATE_TIME 同时显示日期和时间。\n\nDateField\
  \ 提供了两个构造函数。第一个使用默认时区，而第二个允许您显式指定 TimeZone：\n\n```\npublic DateField(String label,\
  \ int mode)\npublic DateField(String label, int mode, TimeZone timeZone) \n```\n\
  \n本质上，DateField 是 java.util.Date 的编辑器。正如您在第 4 章中所见，Date 表示时间点。DateField 负责在 Date\
  \ 和人类可读的字符串之间进行转换，这与 Calendar 类非常相似。您可以使用以下方法设置或获取 DateField 所表示的 Date：\n\n```\n\
  public Date getDate()\npublic void setDate(Date date)\n```\n\n在 J2ME Wireless Toolkit\
  \ 模拟器中，DateField 的外观如图 6-9a 所示。请注意，如果在显示 DateField 之前没有向 setDate() 提供 Date，它将显示为未初始化状态，如图\
  \ 6-9b 所示。\n\n![点击展开](img/fig114_01_0.jpg)\n图 6-9：Sun 的 MIDP 2.0 模拟器中的 *DateField*\n\
  \n当用户选择 DateField 的日期或时间部分并进入编辑状态时，MIDP 实现会提供某种合适的编辑器。Sun 的模拟器提供了如图 6-9c 和图 6-9d\
  \ 所示的编辑器。\n\n\n\n#### 仪表\n\n仪表（Gauge）表示一个整数值。具体如何显示由实现决定。在 Sun 的 MIDP 实现中，仪表的外观如图\
  \ 6-10 所示。\n\n![](img/fig115_01.jpg)\n图 6-10：一个*仪表*\n\n仪表的值可以通过 getValue() 和 setValue()\
  \ 方法获取和修改。该值的范围从 0 到某个可变的最大值。仪表的最大值可以通过 getMaxValue() 和 setMaxValue() 方法获取和修改。\n\
  \n仪表的视觉外观是其值的近似表示。例如，图 6-10 中显示的仪表，其值可能为 7，最大值为 10；或者值可能为 42，最大值为 61。\n\n在*交互式*仪表中，用户可以修改其值。同样，具体如何实现由实现决定。在\
  \ Sun 的参考实现中，可以使用左、右导航按钮来修改仪表的值。\n\n仪表的构造函数很直接：\n\n```\npublic Gauge(String label,\
  \ boolean interactive,\n    int maxValue, int initialValue)\n```\n\n例如，以下代码创建了一个最大值为\
  \ 24、初始值为 2 的交互式仪表：\n\n```\nGauge g = new Gauge(\"Power\", true, 24, 2);\n```\n\n\
  MIDP 2.0 扩展了仪表的作用。交互式仪表与之前相同，但新增了三种非交互式仪表，可用作进度指示器。你可以使用一个已知最大值的常规非交互式仪表来显示下载或计算的进度。例如，如果你要循环执行\
  \ 20 次，可以创建一个最大值为 20 的仪表，并在每次循环时更新其值。\n\n有两种没有最大值的非交互式仪表。在这种情况下，你需要使用特殊值 `INDEFINITE`\
  \ 作为最大值。此类仪表可以是*增量式*或*连续式*。增量式仪表显示具有可测量步骤的操作；你的应用程序会在每次执行重要操作时更新仪表。例如，如果你正在下载一个文件，但不知道其大小，可以使用增量式仪表，并在每次读取一些数据时更新它。连续式仪表可能通过动画来显示进度，无需应用程序主动触发。这种类型的仪表适用于无法测量进度的操作。\n\
  \n仪表值本身可以设置为以下之一：\n\n*   `INCREMENTAL_UPDATING` 表示你刚刚完成了一些操作，仪表应更新以反映该操作。\n*   `INCREMENTAL_IDLE`\
  \ 表示你希望仪表是增量式的，但当前没有发生任何操作。\n*   `CONTINUOUS_RUNNING` 表示连续式仪表处于运行模式。\n*   `CONTINUOUS_IDLE`\
  \ 用于连续式仪表，表示当前没有进度。\n\n以下示例展示了交互式、连续式和增量式仪表。命令（**Update** 和 **Idle**）为连续式和增量式仪表设置相应的值。通常你会从不同的线程中设置这些值，但在此示例中使用命令可以更容易理解发生了什么。\n\
  \n在 Sun 的 MIDP 2.0 模拟器中，连续式和空闲仪表使用简单的 Duke 动画来显示进度。屏幕截图请参见图 6-11。清单 6-2 包含一个演示不同类型仪表的\
  \ MIDlet 的源代码。\n\n清单 6-2：*GaugeMIDlet* 源代码\n\n| **![开始示例](img/_1.gif)** |\n\n```\n\
  import javax.microedition.midlet.*;\nimport javax.microedition.lcdui.*;\n\npublic\
  \ class GaugeMIDlet\n    extends MIDlet\n    implements CommandListener {\nprivate\
  \ Display mDisplay;\n\nprivate Form mGaugeForm;\nprivate Command mUpdateCommand,\
  \ mIdleCommand;\n\nprivate Gauge mInteractiveGauge;\nprivate Gauge mIncrementalGauge;\n\
  private Gauge mContinuousGauge;\n\npublic GaugeMIDlet() {\n  mGaugeForm = new Form(\"\
  Gauges\");\n  mInteractiveGauge = new Gauge(\"Interactive\", true, 5, 2);\n  mInteractiveGauge.setLayout(Item.LAYOUT_2);\n\
  \  mGaugeForm.append(mInteractiveGauge);\n  mContinuousGauge = new Gauge(\"Non-I\
  \ continuous\", false,\n      Gauge.INDEFINITE, Gauge.CONTINUOUS_RUNNING);\n  mContinuousGauge.setLayout(Item.LAYOUT_2);\n\
  \  mGaugeForm.append(mContinuousGauge);\n  mIncrementalGauge = new Gauge(\"Non-I\
  \ incremental\", false,\n      Gauge.INDEFINITE, Gauge.INCREMENTAL_UPDATING);\n\
  \  mIncrementalGauge.setLayout(Item.LAYOUT_2);\n  mGaugeForm.append(mIncrementalGauge);\n\
  \n  mUpdateCommand = new Command(\"Update\", Command.SCREEN, 0);\n  mIdleCommand\
  \ = new Command(\"Idle\", Command.SCREEN, 0);\n  Command exitCommand = new Command(\"\
  Exit\", Command.EXIT, 0);\n  mGaugeForm.addCommand(mUpdateCommand);\n  mGaugeForm.addCommand(mIdleCommand);\n\
  \  mGaugeForm.addCommand(exitCommand);\n  mGaugeForm.setCommandListener(this);\n\
  }\n\npublic void startApp() {\n  if (mDisplay == null) mDisplay = Display.getDisplay(this);\n\
  \  mDisplay.setCurrent(mGaugeForm);\n}\n  public void pauseApp() {}\n\n  public\
  \ void destroyApp(boolean unconditional) {}\n\n  public void commandAction(Command\
  \ c, Displayable s) {\n    if (c.getCommandType() == Command.EXIT)\n      notifyDestroyed();\n\
  \    else if (c == mUpdateCommand) {\n      mContinuousGauge.setValue(Gauge.CONTINUOUS_RUNNING);\n\
  \      mIncrementalGauge.setValue(Gauge.INCREMENTAL_UPDATING);\n    }\n    else\
  \ if (c == mIdleCommand) {\n      mContinuousGauge.setValue(Gauge.CONTINUOUS_IDLE);\n\
  \      mIncrementalGauge.setValue(Gauge.INCREMENTAL_IDLE);\n    }\n  }\n}\n```\n\
  \n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n![](img/fig116_01.jpg)\n图 6-11：MIDP 2.0\
  \ 中的三种*仪表*\n\n#### 选择组\n\nForm 中 Item 的最后一个类是 ChoiceGroup。ChoiceGroup 提供一组选项。它与本章开头描述的\
  \ `javax.microedition.lcdui.List` 非常相似。这种相似性并非巧合；ChoiceGroup 和 List 都实现了 `Choice`\
  \ 接口，该接口是两个类中所有实例方法的源泉。\n\n如果你已经阅读了关于 List 的部分，那么你几乎已经掌握了使用 ChoiceGroup 所需的一切知识，因为其实例方法的工作方式完全相同。\n\
  \nChoiceGroup 具有以下构造函数：\n\n```\npublic ChoiceGroup(String label, int choiceType)\n\
  public ChoiceGroup(String label, int choiceType, String[] stringElements,\n    Image[]\
  \ imageElements)\n```\n\nchoiceType 应该很熟悉；它可以是 `EXCLUSIVE` 或 `MULTIPLE`，即 `Choice`\
  \ 接口中定义的常量。实际上，ChoiceGroup 的构造函数与 List 的构造函数工作方式完全相同，只是不允许使用 `IMPLICIT`。这是合理的，因为\
  \ ChoiceGroup 是表单中的一个项目，而不是整个屏幕。MIDP 2.0 还为 ChoiceGroup 添加了 `POPUP` 类型，使其看起来像组合框或下拉菜单。ChoiceGroup\
  \ 在 Form 中显示为其他任何元素；图 6-12 显示了示例。\n\n![点击展开](img/fig119_01_0.jpg)\n图 6-12：*ChoiceGroup*\
  \ 示例—— (a) *MULTIPLE*，(b) *EXCLUSIVE* 和 (c) *POPUP*\n\n\n\n### 响应项目变更\n\n表单中的大多数项目在用户更改时都会触发事件。您的应用程序可以通过以下方法向表单注册\
  \ `ItemStateListener` 来监听这些事件：\n\n```\npublic void setItemStateListener(ItemStateListener\
  \ iListener)\n```\n\n`ItemStateListener` 是一个包含单个方法的接口。每当表单中的项目发生更改时，都会调用此方法：\n\n\
  ```\npublic void itemStateChanged(Item item)\n```\n\n清单 6-3 创建了一个包含两个项目的表单：一个交互式仪表盘和一个字符串项目。当您调整仪表盘时，其值会通过\
  \ `ItemStateListener` 机制反映在字符串项目中。\n\n清单 6-3：*GaugeTracker* 源代码\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\nimport javax.microedition.midlet.*;\nimport javax.microedition.lcdui.*;\n\
  \npublic class GaugeTracker\n    extends MIDlet\n    implements ItemStateListener,\
  \ CommandListener {\n  private Gauge mGauge;\n  private StringItem mStringItem;\n\
  \  public GaugeTracker() {\n    int initialValue = 3;\n    mGauge = new Gauge(\"\
  GaugeTitle\", true, 5, initialValue);\n    mStringItem = new StringItem(null, \"\
  [value]\");\n    itemStateChanged(mGauge);\n  }\n\n  public void itemStateChanged(Item\
  \ item) {\n    if (item == mGauge)\n      mStringItem.setText(\"Value = \" + mGauge.getValue());\n\
  \  }\n\n  public void commandAction(Command c, Displayable s) {\n    if (c.getCommandType()\
  \ == Command.EXIT)\n      notifyDestroyed();\n  }\n\n  public void startApp() {\n\
  \    Form form = new Form(\"GaugeTracker\");\n    form.addCommand(new Command(\"\
  Exit\", Command.EXIT, 0));\n    form.setCommandListener(this);\n    // 现在添加选定的项目。\n\
  \    form.append(mGauge);\n    form.append(mStringItem);\n    form.setItemStateListener(this);\n\
  \n    Display.getDisplay(this).setCurrent(form);\n  }\n\n  public void pauseApp()\
  \ {}\n\n  public void destroyApp(boolean unconditional) {}\n} \n```\n\n| **![结束示例](img/_1.gif)**\
  \ |\n\n|  |\n\n## 总结\n\n本章介绍了 MIDP 的高级用户界面屏幕：列表和表单。列表是一个元素列表，允许单选或多选。您提供项目——具体实现负责决定如何显示它们、用户如何导航以及用户如何选择项目。表单是由一系列项目构建的通用屏幕。MIDP\
  \ API 提供了一个便捷的项目工具箱——从简单的字符串和图像项目到更复杂的日期字段和选择组类。\n\n尽管列表和表单功能非常强大，但您应谨慎使用它们，尤其是表单。小型设备屏幕较小，因此您不应在每个屏幕中放置过多信息，尤其是当这会导致用户频繁上下滚动时。此外，易用性对于手机和寻呼机等消费类设备至关重要。请确保您的界面简洁、直观且尽可能简单。\n\
  \n"
- "# 第 7 章：自定义项目\n\n在上一章中，您了解了表单，它是 `javax.microedition.lcdui.Screen` 最灵活、最强大的子类。表单本质上是项目的集合。MIDP\
  \ API 包含一个完整的项目子类工具箱，从文本和图像显示到交互式日期字段和仪表盘，一应俱全。\n\nMIDP 2.0 通过允许您定义自己的项目，提供了更强大的功能。在本章中，您将学习如何创建能够自行绘制并响应用户输入的项目。\n\
  \n## 介绍 CustomItem\n\n实现自定义项目的类被恰当地命名为 `CustomItem`。与表单中的所有项目一样，它是 `Item` 的子类。要创建您自己的项目，只需通过实现五个抽象方法来定义\
  \ `CustomItem` 的子类。下面列出的前四个方法与项目*内容区域*的大小有关，该区域是您的代码负责的区域。自定义项目的总区域包括标签和可能的边框，但这些由实现负责。您的\
  \ `CustomItem` 子类仅负责内容区域。\n\n```\nprotected int getPrefContentWidth(int height)\n\
  protected int getPrefContentHeight(int width)\nprotected int getMinContentWidth()\n\
  protected int getMinContentHeight()\n```\n\n前两个方法应返回定义项目*期望*大小的值。当 MIDP 实现布局包含您的项目的表单时，它可能无法满足您的首选大小，但会尽力尝试。实现会将建议的高度和宽度传递给这些方法，以便让您的项目类了解其最终尺寸的大致情况。例如，实现可能会调用您的项目的\
  \ `getPrefContentWidth()` 方法，并将高度参数的值设为 18。这相当于实现向您的项目询问：“如果我将您的高度设为 18，您希望宽度是多少？”\n\
  \n第二对方法应返回有关项目最小尺寸的信息。这是您的项目认为可以容忍的最小尺寸。\n\n具体 `CustomItem` 子类必须定义的第五个方法是 `paint()`\
  \ 方法，实现会调用它来渲染项目。\n\n```\nprotected void paint(Graphics g, int w, int h)\n```\n\n\
  `Graphics` 对象可用于在项目的内容区域绘制线条、形状、文本和图像。`Graphics` 类将在第 10 章中全面介绍；现在，我将仅使用几个简单的方法来演示如何绘制自定义项目。`w`\
  \ 和 `h` 参数表示内容区域的当前宽度和高度。\n\n掌握了这些知识，您可以通过实现上述五个抽象方法并提供构造函数来创建一个简单的 `CustomItem`。清单\
  \ 7-1 展示了这样一个类 `SimpleItem`。该类为最小和首选内容尺寸返回硬编码值，并提供了一个绘制简单三角形图案的 `paint()` 方法。\n\n\
  清单 7-1：一个简单的自定义项目\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport javax.microedition.lcdui.*;\n\
  \npublic class SimpleItem\n    extends CustomItem {\n  public SimpleItem(String\
  \ title) { super(title); }\n\n// CustomItem 抽象方法。\n\npublic int getMinContentWidth()\
  \ { return 100; }\n  public int getMinContentHeight() { return 60; }\n\npublic int\
  \ getPrefContentWidth(int width) {\n    return getMinContentWidth();\n  }\n\npublic\
  \ int getPrefContentHeight(int height) {\n    return getMinContentHeight();\n  }\n\
  \npublic void paint(Graphics g, int w, int h) {\n    g.drawRect(0, 0, w - 1, h -\
  \ 1);\n    g.setColor(0x000000ff);\n    int offset = 0;\n    for (int y = 4; y <\
  \ h; y += 12) {\n      offset = (offset + 12) % 24;\n      for (int x = 4; x < w;\
  \ x += 24) {\n        g.fillTriangle(x + offset, y,\n                       x +\
  \ offset - 3, y + 6,\n                       x + offset + 3, y + 6);\n      }\n\
  \    }\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n我不会让您自己编写 MIDlet 来查看您的新项目。清单\
  \ 7-2 展示了一个使用 `SimpleItem` 的 MIDlet：\n\n清单 7-2：演示 *SimpleItem* 的 MIDlet\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\nimport javax.microedition.midlet.*;\nimport javax.microedition.lcdui.*;\n\
  \npublic class SimpleItemMIDlet\n    extends MIDlet\n    implements CommandListener\
  \ {\n  public void startApp() {\n    Form form = new Form(\"SimpleItemMIDlet\");\n\
  \    form.append(new SimpleItem(\"SimpleItem\"));\n\nCommand c = new Command(\"\
  Exit\", Command.EXIT, 0);\n    form.addCommand(c);\n    form.setCommandListener(this);\n\
  \nDisplay.getDisplay(this).setCurrent(form);\n  }\n\npublic void pauseApp() {}\n\
  \npublic void destroyApp(boolean unconditional) {}\n\npublic void commandAction(Command\
  \ c, Displayable s) {\n    if (c.getCommandType() == Command.EXIT)\n      notifyDestroyed();\n\
  \  }\n} \n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n图 7-1 展示了此 MIDlet 的运行效果。\n\
  \n![](img/fig126_01.jpg)\n图 7-1：一个简单的自定义项目\n\n\n\n## 自定义项绘制\n\n如你所见，自定义项在其 `paint()`\
  \ 方法中绘制到屏幕上。该方法接收一个 `Graphics` 对象，该对象有两个用途。首先，它代表自定义项内容区域的绘制表面。其次，它提供了大量用于绘制形状、图像和文本的方法。我不会在第\
  \ 10 章之前介绍所有这些方法，但你将在本章的示例中看到其中几个：例如，`drawString()` 用于渲染文本，而 `drawLine()` 用于渲染直线。\n\
  \n`paint()` 方法是*回调*的一个示例，即由 MIDP 实现调用的代码中的方法。当实现需要在屏幕上显示你的自定义项时，它会调用 `paint()`。当包含自定义项的表单正在布局时，它会调用其他方法来获取组件的最小和首选尺寸。显示整个屏幕是实现的工作；它仅调用你的\
  \ `paint()` 方法来显示屏幕上由自定义项占据的部分。你无需告诉实现何时绘制你的项；只需告诉它你的项是表单的一部分，然后它会自行计算如何显示所有内容。\n\
  \n如果自定义项的外观需要更改，你可以通过调用 `repaint()` 方法来请求刷新。此方法向实现发出信号，表明你的项需要重新绘制。作为响应，实现将很快再次调用\
  \ `paint()` 方法。为了优化绘制，你可能只想重绘项的一部分。在这种情况下，请使用 `repaint(int x, int y, int width,\
  \ int height)` 来描述需要绘制的项的矩形区域。\n\n有两个方法可以返回有助于使项的外观与设备的外观和风格保持一致的信息。第一个是 `Display`\
  \ 类中的 `getColor()`。当你提供以下常量之一时，此方法返回一个表示颜色的 `int` 值：\n\n*   `COLOR_BACKGROUND`\n\
  *   `COLOR_BORDER`\n*   `COLOR_FOREGROUND`\n*   `COLOR_HIGHLIGHTED_BACKGROUND`\n\
  *   `COLOR_HIGHLIGHTED_BORDER`\n*   `COLOR_HIGHLIGHTED_FOREGROUND`\n\n例如，你可以使用以下代码将当前绘制颜色设置为系统的高亮前景色：\n\
  \n```\npublic void paint(Graphics g) {\n  // Display mDisplay = ...\n  int fhc =\
  \ mDisplay.getColor(\n      Display.COLOR_HIGHLIGHTED_FOREGROUND);\n  g.setColor(fhc);\n\
  \  // Draw stuff ...\n}\n```\n\n类似地，如果你希望自定义项绘制的任何文本与表单中的其他项协调一致，你可以使用 `Font` 类中的以下方法检索合适的\
  \ `Font`：\n\n```\npublic static Font getFont(int fontSpecifier)\n```\n\n只需传递 `FONT_STATIC_TEXT`\
  \ 或 `FONT_INPUT_TEXT`，此方法就会返回一个可用于绘制文本的合适 `Font` 对象。以下代码展示了如何使用合适的字体绘制用户可编辑文本：\n\
  \n```\npublic void paint(Graphics g) {\n  Font f = Font.getFont(Font.FONT_INPUT_TEXT);\n\
  \  g.setFont(f);\n  // Draw text ...\n} \n```\n\n我将在第 10 章中详细介绍 `Font`。简而言之，`Font`\
  \ 决定了屏幕上绘制的文本的外观。\n\n## 显示、隐藏和调整大小\n\n当自定义项变为可见（甚至部分可见）时，MIDP 实现会调用其 `showNotify()`\
  \ 方法。你可以预期随后会调用 `paint()` 来渲染该项。类似地，当该项不再可见时（例如，用户已将该项滚动出屏幕），会调用 `hideNotify()`。\n\
  \n自定义项的大小可能会被实现更改，例如，当包含的表单因内容变化而重新布局时。在这种情况下，会使用内容区域的新宽度和高度调用项的 `sizeChanged()`\
  \ 方法。\n\n同样，你的自定义项可能决定需要更改大小。在这种情况下，你的项应调用 `invalidate()` 方法，该方法向实现发出信号，表明它可能需要重新布局包含的表单。\n\
  \n## 处理事件\n\n自定义项可以通过重写以下任意或所有方法来响应键盘和指针事件：\n\n```\nprotected void keyPressed(int\
  \ keyCode)\nprotected void keyReleased(int keyCode)\nprotected void keyRepeated(int\
  \ keyCode)\nprotected void pointerPressed(int x, int y)\nprotected void pointerReleased(int\
  \ x, int y)\nprotected void pointerDragged(int x, int y)\n```\n\n这些方法会响应用户的操作而被调用。`keyCode`\
  \ 参数很可能是 `Canvas` 类中定义的常量之一：`KEY_NUM0` 到 `KEY_NUM9`、`KEY_POUND` 或 `KEY_STAR`。`CustomItem`\
  \ 类还支持一种称为*游戏动作*的便捷机制，它将设备特定的键映射到设备无关的动作。`getGameAction()` 方法执行此映射。有关游戏动作的完整讨论，请参见第\
  \ 10 章。\n\n指针回调方法提供指针事件的位置，该位置是相对于自定义项内容区域的一对坐标。\n\n设备具有不同的能力，有些可能无法向自定义项传递某些类型的事件。例如，许多手机不支持指针事件。要在运行时了解设备的能力，自定义项使用\
  \ `getInteractionModes()` 方法。此方法返回以下常量（在 `CustomItem` 中定义）的某种组合：\n\n*   `KEY_PRESS`\n\
  *   `KEY_RELEASE`\n*   `KEY_REPEAT`\n*   `POINTER_PRESS`\n*   `POINTER_RELEASE`\n\
  *   `POINTER_DRAG`\n*   `TRAVERSE_HORIZONTAL`\n*   `TRAVERSE_VERTICAL`\n\n除了遍历项（将在下一节中介绍）之外，`getInteractionModes()`\
  \ 返回值的组合直接对应于你的自定义项中可能被调用的回调。你可以利用此信息构建一个在任何情况下都能正常工作的 `CustomItem`。例如，在极少数情况下，如果某个设备无法向自定义项传递按键和指针事件，你可以在该项上提供一个\
  \ `Command` 来调用一个单独的编辑屏幕。\n\n\n\n## 项目遍历\n\n表单支持一种*焦点*概念，即表单中的某一项当前被选中。*遍历*指的是用户能够将焦点从一个项目移动到另一个项目。在大多数情况下，MIDP\
  \ 实现会处理表单遍历的细节。例如，在 Sun 模拟器中，你可以通过按上下方向键来移动表单中各项的焦点。焦点通过项目周围的实心黑色边框来指示。图 7-2 展示了一个包含多个项目的表单；第三个项目（一个\
  \ ImageItem）拥有焦点。\n\n![](img/fig130_01.jpg)\n图 7-2：焦点位于此表单的第三个项目上。\n\n到目前为止，一切顺利——这都非常简单。事实上，CustomItem\
  \ 中提供的默认实现意味着在许多情况下你甚至不需要考虑遍历问题。\n\n让事情变得有点棘手的是*内部*遍历的概念。某些项目支持在项目*内部*遍历多个选项。一个很好的例子是\
  \ ChoiceGroup 项目。以下序列展示了在 MIDP 参考实现模拟器中遍历一个包含三个项目的表单的过程。图 7-3 展示了遍历从文本字段开始，经过仪表，最后进入\
  \ ChoiceGroup 的过程。\n\n![点击展开](img/fig130_02_0.jpg)\n图 7-3：表单遍历与内部项目遍历\n\n有两个方法用于指示遍历事件。第一个是\
  \ `traverse()`，在用户首次遍历进入该项目时被调用。默认情况下，此方法返回 `false`，表示该项目不支持内部遍历。第二个方法是 `traverseOut()`，在用户离开该项目时被调用。\n\
  \n```\nprotected boolean traverse(int dir, int viewportWidth, int viewportHeight,\n\
  \    int[] visRect_inout);\nprotected void traverseOut(); \n```\n\n|  | 注意 | 乍一看，你可能会期望当设备上按下按键时，自定义项目会同时接收到遍历方法和按键事件方法的调用。例如，如果用户按下向下箭头键移入项目，你可能会期望同时调用\
  \ `traverse()` 和 `keyPressed()` 方法。实际上，实现应该保持按键事件和遍历事件互不混淆。请记住，某些设备可能具有替代的遍历控件（例如滚轮），因此实现（以及你的自定义项目）应明确区分这些事件。\
  \ |\n\n如果你确实编写了一个支持内部遍历的自定义项目，你需要关注传递给 `traverse()` 的参数，并且需要返回 `true` 以表明你的项目支持内部遍历。传递给\
  \ `traverse()` 方法的信息如下：\n\n*   `dir` 指示用户请求的遍历方向。它可以是以下值之一：`Canvas.UP`、`Canvas.DOWN`、`Canvas.LEFT`、`Canvas.RIGHT`\
  \ 或 `CustomItem.NONE`。\n\n*   `viewportWidth` 和 `viewportHeight` 指示包含此自定义项目的表单中可用于项目的尺寸。（本质上，`viewportWidth`\
  \ 和 `viewportHeight` 描述了表单的内容区域。）这些尺寸可能有助于确定项目选项与可用屏幕区域大小之间的关系。\n\n*   `visRect_inout`\
  \ 有点奇怪。它是一个包含四个元素的整数数组。当调用 `traverse()` 方法时，`visRect_inout` 描述了自定义项目可见内容区域的区域。当\
  \ `traverse()` 方法返回时，`visRect_inout` 应包含项目中当前选中选项的边界。\n\n如果这开始听起来有点复杂，请稍等。遍历机制足够灵活，可以支持不同类型的遍历。某些设备可能仅支持垂直遍历，而其他设备可能仅支持水平遍历，还有一些设备可能两者都支持。你可以通过\
  \ `getInteractionModes()` 方法了解设备的遍历能力，该方法可以返回 `CustomItem.TRAVERSE_HORIZONTAL`、`CustomItem.TRAVERSE_VERTICAL`\
  \ 或两者兼有。根据自定义项目中所包含选项的性质，你可能需要灵活处理接收到的遍历方向以及项目内部的实际遍历。\n\n请记住，当焦点首次到达你的项目时，会调用 `traverse()`\
  \ 方法。如果此方法返回 `true`，则在遍历过程中会重复调用 `traverse()`。当用户遍历离开你的项目时，从 `traverse()` 方法返回 `false`。这会让实现知道内部遍历已结束。实现很可能会调用\
  \ `traverseOut()`，尽管这仅在焦点实际移离项目时才会发生。如果用户已到达表单的末尾或开头，则可能不会出现这种情况。\n\n所有这些都在 CustomItem\
  \ 的 `traverse()` 方法的 API 文档中进行了详尽细致的讨论。如果你计划实现一个具有内部遍历功能的自定义项目，请多次阅读文档，直到完全理解为止。\n\
  \n\n\n## 示例\n\n在本节中，我将向你展示 StationSign，一个中等复杂度的 CustomItem。StationSign 具有以下特性：\n\
  \n*   实现了一个简单的字符串选择滚动列表。指针事件和按键事件会使当前选择移动到下一个选项。滚动过程带有动画效果。StationSign 是一个 Runnable——在构造函数中创建了一个单独的线程，用于调用\
  \ run() 方法。如果项目的当前显示状态与当前选择之间存在差异，run() 方法会通过滚动来协调两者。\n\n*   通过使用静态文本的字体以及从 Display\
  \ 的 getColor() 方法返回的颜色，来符合设备的外观和感觉。\n\n*   不实现内部遍历。\n\n*   使用 traverse() 和 traverseOut()\
  \ 方法来识别焦点，并使用高亮颜色进行绘制。当调用 traverse() 时，StationSign 会设置一个布尔成员变量 mFocus，以指示该项目已获得焦点。在\
  \ paint() 方法中，使用 mFocus 来决定绘制项目所使用的颜色。当调用 traverseOut() 时，mFocus 被设置为 false，表示焦点已丢失。\n\
  \nStationSign 的完整源代码如清单 7-3 所示。\n\n清单 7-3：*StationSign* 自定义项目\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\nimport java.util.Vector;\n\nimport javax.microedition.lcdui.*;\n\npublic\
  \ class StationSign\n    extends CustomItem\n    implements Runnable {\n  private\
  \ Vector mValues;\n  private int mSelection;\n  private boolean mTrucking;\n\nprivate\
  \ Display mDisplay;\n  private Font mFont;\n  private int mVisibleIndexTimesTen;\n\
  \  private boolean mFocus;\n\npublic StationSign(String title, Display display)\
  \ {\n    super(title);\n    mDisplay = display;\n    mValues = new Vector();\n \
  \   mSelection = 0;\n    mTrucking = true;\n    mFont = Font.getFont(Font.FONT_STATIC_TEXT);\n\
  \    mVisibleIndexTimesTen = mSelection * 10;\n\nThread t = new Thread(this);\n\
  \    t.start();\n  }\n\npublic void add(String value) {\n    if (value == null)\
  \ return;\n    mValues.addElement(value);\n  }\n\npublic void remove(String value)\
  \ {\n    if (value == null) return;\n    mValues.removeElement(value);\n  }\n\n\
  public String getSelection() {\n    if (mValues.size() == 0) return \"\";\n    return\
  \ (String)mValues.elementAt(mSelection);\n  }\n\npublic void flip() {\n    mSelection++;\n\
  \    if (mSelection >= mValues.size()) mSelection = 0;\n  }\n\npublic void dispose()\
  \ {\n    mTrucking = false;\n  }\n\n// Runnable 接口。\n\npublic void run() {\n   \
  \ while (mTrucking) {\n      int target = mSelection * 10;\n      if (mVisibleIndexTimesTen\
  \ != target) {\n        mVisibleIndexTimesTen++;\n        if (mVisibleIndexTimesTen\
  \ >= mValues.size() * 10)\n          mVisibleIndexTimesTen = 0;\n        repaint();\n\
  \      }\n      try { Thread.sleep(50); }\n      catch (InterruptedException ie)\
  \ {}\n    }\n  }\n\n// CustomItem 抽象方法。\n\npublic int getMinContentWidth() {\n \
  \   // 遍历所有值。找出最大宽度。\n    int maxWidth = 0;\n    for (int i = 0; i < mValues.size();\
  \ i++) {\n      String value = (String)mValues.elementAt(i);\n      int width =\
  \ mFont.stringWidth(value);\n      maxWidth = Math.max(maxWidth, width);\n    }\n\
  \    // 不要忘记标题，尽管我们并不\n    // 确切知道用于标题的字体。\n    int width = mFont.stringWidth(getLabel())\
  \ + 20;\n    maxWidth = Math.max(maxWidth, width);\n    return maxWidth;\n  }\n\
  \  public int getMinContentHeight() {\n    return mFont.getHeight();\n  }\n\npublic\
  \ int getPrefContentWidth(int width) {\n    return getMinContentWidth();\n  }\n\n\
  public int getPrefContentHeight(int height) {\n    return getMinContentHeight();\n\
  \  }\n\npublic void paint(Graphics g, int w, int h) {\n    int fraction = mVisibleIndexTimesTen\
  \ % 10;\n    int visibleIndex = (mVisibleIndexTimesTen - fraction) / 10;\n    String\
  \ value = (String)mValues.elementAt(visibleIndex);\n\ng.setFont(mFont);\n    int\
  \ bc = mDisplay.getColor(Display.COLOR_BACKGROUND);\n    int fc = mDisplay.getColor(Display.COLOR_FOREGROUND);\n\
  \    if (mFocus == true) {\n      bc = mDisplay.getColor(Display.COLOR_HIGHLIGHTED_BACKGROUND);\n\
  \      fc = mDisplay.getColor(Display.COLOR_HIGHLIGHTED_FOREGROUND);\n    }\n  \
  \  g.setColor(bc);\n    g.fillRect(0, 0, w, h);\n    g.setColor(fc);\n\n// 简单情况：visibleIndex\
  \ 对齐到单个项目。\n    if (fraction == 0) {\n      g.drawString(value, 0, 0, Graphics.TOP\
  \ | Graphics.LEFT);\n      return;\n    }\n\n// 复杂情况：显示两个项目并画一条线。\n    int lineHeight\
  \ = mFont.getHeight();\n    int divider = lineHeight - lineHeight * fraction / 10;\n\
  \n// 绘制可见值的一部分。\n    g.drawString(value, 0, divider - lineHeight,\n        Graphics.TOP\
  \ | Graphics.LEFT);\n    // 现在获取下一个值。\n    visibleIndex = (visibleIndex + 1) % mValues.size();\n\
  \    value = (String)mValues.elementAt(visibleIndex);\n    // 绘制分隔线。\n    g.setStrokeStyle(Graphics.DOTTED);\n\
  \    g.drawLine(0, divider, w, divider);\n\ng.drawString(value, 0, divider,\n  \
  \      Graphics.TOP | Graphics.LEFT);\n  }\n\n// CustomItem 方法。\n\nprotected void\
  \ keyPressed(int keyCode) { flip (); }\n\nprotected void pointerPressed(int x, int\
  \ y) { flip(); }\n\nprotected boolean traverse(int dir,\n      int viewportWidth,\
  \ int viewportHeight,\n      int[] visRect_inout) {\n    mFocus = true;\n    repaint();\n\
  \    return false;\n  }\n\nprotected void traverseOut() {\n    mFocus = false;\n\
  \    repaint();\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n清单 7-4 中的\
  \ MIDlet 显示了一个包含 StationSign 的表单。\n\n清单 7-4：演示 *StationSign* 的 MIDlet\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\nimport javax.microedition.midlet.*;\nimport javax.microedition.lcdui.*;\n\
  \npublic class StationSignMIDlet\n    extends MIDlet\n    implements CommandListener\
  \ {\n  public void startApp() {\n    Display display = Display.getDisplay(this);\n\
  \    Form form = new Form(\"StationSignMIDlet\");\n    form.append(new StringItem(\"\
  StringItem: \", \"item one\"));\n    StationSign ss = new StationSign(\"Destination\"\
  , display);\n    ss.add(\"Albuquerque\");\n    ss.add(\"Savannah\");\n    ss.add(\"\
  Pocatello\");\n    ss.add(\"Des Moines\");\n    form.append(ss);\n    form.append(new\
  \ StringItem(\"StringItem: \", \"item two\"));\n\nCommand c = new Command(\"Exit\"\
  , Command.EXIT, 0);\n    form.addCommand(c);\n    form.setCommandListener(this);\n\
  \ndisplay.setCurrent(form);\n  }\n\npublic void pauseApp() {}\n\npublic void destroyApp(boolean\
  \ unconditional) {}\n\npublic void commandAction(Command c, Displayable s) {\n \
  \   if (c.getCommandType() == Command.EXIT)\n      notifyDestroyed();\n  }\n}\n\
  ```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n运行中的 MIDlet 如图 7-4 所示。该图展示了一个夹在两个\
  \ StringItem 之间的 StationSign 实例。你可以通过表单导航，观察 StationSign 在获得输入焦点时外观的变化。如果在 StationSign\
  \ 上按下选择键，你将看到下一个选项滚动进入视野。\n\n![](img/fig137_01.jpg)\n图 7-4：在*表单*中运行的 *StationSign*\n\
  \n## 总结\n\n本章描述了 MIDP 2.0 令人兴奋的新特性之一：自定义项目。CustomItem 类是你编写可包含在 Form 中的项目的基础。你可以通过在\
  \ paint() 方法中使用 Graphics 对象进行绘制，来决定自定义项目的外观。CustomItem 中的回调方法让你能够了解项目何时显示或隐藏，并传递按键、指针和遍历事件。两个示例\
  \ SimpleItem 和 StationSign 提供了可运行代码的基础，你可以在此基础上进行改编，构建自己的项目。\n\n"
- "# 第 8 章：持久化存储\n\n\n\n## 重点\n\nMIDP 应用程序必须在多种设备上无缝运行。您已经看到这在用户界面领域可能是一个挑战。当时的技巧是使用抽象概念，这些概念将由特定于设备的实现映射到屏幕上。\n\
  \nMIDP 处理持久性存储的方法基本相同。您的应用程序可以在带有闪存 ROM、电池供电 RAM 甚至小型硬盘的设备上运行。MIDP 应用程序并不真正关心这些；它们只知道一种称为记录存储的小型数据库。设备上的\
  \ MIDP 实现负责以某种合理的方式将记录存储映射到任何可用的持久性存储上。\n\n我们讨论的是*少量*数据；MIDP 规范规定持久性存储的最小容量仅为 8KB。\n\
  \n## 概述\n\nMIDP 中的持久性存储以记录存储为核心。*记录存储*是一个小型数据库，包含称为*记录*的数据片段。记录存储由 `javax.microedition.rms.RecordStore`\
  \ 的实例表示。在 MIDP 1.0 中，记录存储的作用域仅限于单个 MIDlet 套件。换句话说，一个 MIDlet 只能访问由同一套件中的 MIDlet 创建的记录存储。图\
  \ 8-1 展示了 MIDlet 套件与记录存储之间的关系。MIDP 2.0 允许可选地共享记录存储。请参阅本章后面的“在 MIDP 2.0 中共享记录存储”一节。\n\
  \n![点击展开](img/fig140_01_0.jpg)\n图 8-1：记录存储属于 MIDlet 套件。\n\n记录存储通过名称进行标识。在一个 MIDlet\
  \ 套件的记录存储中，名称必须是唯一的。\n\n## 管理记录存储\n\nRecordStore 类有两个用途。首先，它定义了一个用于操作单个记录的 API。其次，它定义了一个用于管理记录存储的\
  \ API（主要是静态方法）。\n\n### 打开、关闭和删除记录存储\n\n要打开一个记录存储，您只需为其命名即可。\n\n```\npublic static\
  \ RecordStore openRecordStore(String recordStoreName,\n    boolean createIfNecessary)\
  \ throws RecordStoreException,\n    RecordStoreFullException, RecordStoreNotFoundException\n\
  ```\n\n如果记录存储不存在，`createIfNecessary` 参数将决定是否创建一个新的记录存储。如果记录存储不存在，并且 `createIfNecessary`\
  \ 参数为 `false`，则会抛出 `RecordStoreNotFoundException`。\n\n以下代码打开一个名为 \"Address\" 的记录存储。\n\
  \n```\nRecordStore rs = RecordStore.openRecordStore(\"Address\", true); \n```\n\n\
  如果该记录存储尚不存在，则会被创建。\n\n可以通过调用 `closeRecordStore()` 方法来关闭一个已打开的记录存储。与任何可以打开和关闭的事物一样，在完成操作后关闭记录存储是一个好习惯。小型设备上的内存和处理能力都很有限，因此您应记住尽可能地进行清理。您甚至可能不应该在\
  \ MIDlet 的整个生命周期内保持记录存储打开；毕竟，您的 MIDlet 可能会被设备的应用程序管理器暂停，而在 MIDlet 暂停期间保持资源打开是不明智的。\n\
  \n要找出特定 MIDlet 套件可用的所有记录存储，请调用 `listRecordStores()` 方法：\n\n```\npublic static String[]\
  \ listRecordStores()\n```\n\n最后，要删除一个记录存储，请调用静态方法 `deleteRecordStore()`。该记录存储及其包含的记录将被删除。\n\
  \n|  | 注意  | 记录存储操作，特别是打开和关闭，在实际设备上可能会很耗时。使用桌面 MIDP 模拟器您可能不会注意到延迟，但在真实设备上，它可能会明显降低应用程序的速度。（请参阅\
  \ [*http://www.poqit.com/midp/bench/*](http://www.poqit.com/midp/bench/) 获取来自真实设备的一些发人深省的测量数据。）对于许多应用程序，将记录存储访问放在其自己的线程中可能是合适的，就像网络访问放在其自己的线程中一样。\
  \ |\n\n### 在 MIDP 2.0 中共享记录存储\n\n在 MIDP 2.0 中，记录存储还具有*授权模式*。默认的授权模式是 `AUTHMODE_PRIVATE`，这意味着记录存储只能由创建该记录存储的\
  \ MIDlet 套件中的 MIDlet 访问。这与前面描述的情况完全相同。\n\n通过将记录存储的授权模式更改为 `AUTHMODE_ANY`，可以共享记录存储，这意味着设备上的任何其他\
  \ MIDlet 都可以访问该记录存储。请谨慎使用！不要在 `AUTHMODE_ANY` 记录存储中存放任何秘密。此外，您还可以决定是否希望共享的记录存储是可写的还是只读的。\n\
  \n您可以使用 `RecordStore` 类中一个新的 `openRecordStore()` 方法来创建共享记录存储：\n\n```\npublic static\
  \ RecordStore openRecordStore(String recordStoreName,\n    boolean createIfNecessary,\
  \ byte authMode, boolean writable)\n    throws RecordStoreException, RecordStoreFullException,\n\
  \    RecordStoreNotFoundException\n```\n\n`authMode` 和 `writable` 参数仅在创建记录存储时使用，这意味着记录存储不存在且\
  \ `createIfNecessary` 为 `true`。您可以使用以下方法更改已打开记录存储的授权模式和可写标志：\n\n```\npublic void\
  \ setMode(byte authmode, boolean writable)\n    throws RecordStoreException\n```\n\
  \n请注意，只有属于创建该记录存储的套件的 MIDlet 才能更改其授权模式和可写标志。\n\n如何访问共享的记录存储？最后一个 `openRecordStore()`\
  \ 方法提供了答案：\n\n```\npublic static RecordStore openRecordStore(String recordStoreName,\n\
  \    String vendorName, String suiteName)\n    throws RecordStoreException, RecordStoreNotFoundException\n\
  ```\n\n要访问共享的记录存储，您需要知道它的名称、创建它的 MIDlet 套件的名称以及该 MIDlet 套件供应商的名称。这些名称应该是 MIDlet\
  \ 套件 JAR 清单或应用程序描述符中的 `MIDlet-Name` 和 `MIDlet-Vendor` 属性。\n\n### 记录存储大小\n\n记录存储由记录组成；每条记录只是一个字节数组。在空间受限的设备上，您可能希望密切关注记录存储的大小。要查明记录存储使用的字节数，请在\
  \ `RecordStore` 实例上调用以下方法：\n\n```\npublic int getSize()\n```\n\n您可以通过调用以下方法来了解还有多少可用空间：\n\
  \n```\npublic int getSizeAvailable() \n```\n\n请注意，此方法返回记录存储中的总可用空间，这与可用的记录数据量不同。也就是说，记录存储中的每条记录都关联有一些开销；`getSizeAvailable()`\
  \ 方法返回的是可用于记录数据和开销的空间总量。\n\n### 版本和时间戳\n\n记录存储维护一个版本号和一个时间戳。每次修改记录存储时，版本号都会更新。它由一个整数表示，可以通过调用\
  \ `getVersion()` 来获取。\n\n记录存储还会记住其最后被修改的时间。这个时间点由一个 `long` 值表示，可以通过 `getLastModified()`\
  \ 获取。该 `long` 值表示自 1970 年 1 月 1 日午夜以来的毫秒数。您可能还记得（来自第 4 章），这与 `Date` 使用 `long` 表示时间点的方式相同。如果您需要检查记录存储的时间戳，可以从\
  \ `long` 时间戳创建一个 `Date` 对象。然后，您可以使用 `Calendar` 将 `Date` 转换为日历字段，如月、日、小时和分钟。\n\n\n\
  \n## 使用记录\n\n*记录*本质上就是一个字节数组。RecordStore 中的每条记录都有一个整数标识号。图 8-2 展示了一个包含四条记录的 RecordStore\
  \ 示意图。\n\n![点击展开](img/fig143_01_0.jpg)\n图 8-2：*RecordStore* 内部结构\n\n### 添加记录\n\n\
  要添加新记录，需将字节数组提供给 addRecord() 方法：\n\n```\npublic int addRecord(byte[] data, int offset,\
  \ int numBytes)\n    throws RecordStoreNotOpenException,\n           RecordStoreException,\n\
  \           RecordStoreFullException\n```\n\n添加的记录长度为 numBytes 字节，数据取自 data 数组中从\
  \ offset 开始的位置。该方法会返回新记录的 ID。大多数其他记录操作都需要此 ID 来标识特定记录。\n\n虽然没有明确的最大记录长度，但显然会受设备上可用于记录存储的空间限制。\n\
  \n以下代码片段演示了如何向名为 rs 的记录存储中添加一条新记录。它从一个字符串创建字节数组，然后将整个字节数组写入一条新记录。\n\n```\nString\
  \ record = \"This is a record\";\nbyte[] data = record.getBytes();\nint id = rs.addRecord(data,\
  \ 0, data.length);\n```\n\n### 检索记录\n\n你可以通过将记录 ID 提供给以下方法来检索记录：\n\n```\npublic\
  \ byte[] getRecord(int recordId)\n    throws RecordStoreNotOpenException,\n    \
  \       InvalidRecordIDException,\n           RecordStoreException\n```\n\n此方法返回一个新创建的字节数组，其中包含具有所请求\
  \ ID 的记录。该方法的另一个版本会将记录数据放入你提供的数组中：\n\n```\npublic int getRecord(int recordId, byte[]\
  \ buffer, int offset)\n    throws RecordStoreNotOpenException,\n           InvalidRecordIDException,\n\
  \           RecordStoreException \n```\n\n此方法返回复制到数组中的字节数。如果你提供的数组不够大，无法容纳该记录，则会抛出\
  \ ArrayOutOfBoundsException。你可以通过调用 getRecordSize() 提前了解特定记录的大小。\n\n给定一个 RecordStore\
  \ rs 和一个记录 ID id，以下是检索记录数据的一种方法：\n\n```\nbyte[] retrieved = new byte[rs.getRecordSize(id)];\n\
  rs.getRecord(id, retrieved, 0);\nString retrievedString = new String(retrieved);\n\
  ```\n\n如果你要从记录存储中提取大量记录，可能不希望每次都创建一个新的字节数组。为了提高效率，你可以创建一个数组并反复使用它来从记录存储中提取记录。创建缓冲区的一种方法是使其与记录存储中最大的记录一样大。如果这不可行，或者你不知道最大记录有多大，你可以简单地在检索每条记录之前检查其大小。如果遇到比缓冲区大的记录，你可以创建一个更大的缓冲区。\n\
  \n如果你不担心内存使用或速度问题，那么你可以使用 getRecord() 的另一种形式，它本质上与前面的代码示例相同：\n\n```\nbyte[] retrieved\
  \ = rs.getRecord(id);\n```\n\n### 删除和替换记录\n\n到目前为止，你已经了解了如何添加新记录和检索它们。RecordStore\
  \ 还支持另外两种记录操作。首先，你可以通过将记录 ID 传递给 deleteRecord() 来删除记录。其次，你可以通过调用以下方法来替换现有记录的数据：\n\
  \n```\npublic void setRecord(int recordId, byte[] newData, int offset, int numBytes)\n\
  \    throws RecordStoreNotOpenException,\n           InvalidRecordIDException,\n\
  \           RecordStoreException,\n           RecordStoreFullException \n```\n\n\
  ### 获取 RecordStore 记录信息\n\nRecordStore 维护一个内部计数器，用于分配记录 ID。你可以通过调用 getNextRecordID()\
  \ 来了解下一个记录 ID 是什么。并且你可以通过调用 getNumRecords() 来了解 RecordStore 中存在多少条记录。\n\n## 监听记录变更\n\
  \nRecordStore 支持类似 JavaBeans 的监听器机制。感兴趣的对象可以通过将自己注册为监听器来监听记录存储的变更。\n\n监听器接口是 javax.microedition.rms.RecordListener。你可以使用以下两个方法来管理\
  \ RecordStore 的监听器：\n\n```\npublic void addRecordListener(RecordListener listener)\n\
  public void removeRecordListener(RecordListener listener)\n```\n\nRecordListener\
  \ 接口有三个方法：recordAdded()、recordChanged() 和 recordDeleted()。每当添加、更改或删除记录时，都会调用这些方法。每个方法都会传入相关的\
  \ RecordStore 和所涉及记录的 ID。\n\n## 执行 RecordStore 查询\n\n数据库的真正强大之处在于能够只提取你想要的记录。在更大的数据库中，这被称为*执行查询*。在\
  \ RecordStore 的世界中，你使用 enumerateRecords() 方法：\n\n```\npublic RecordEnumeration enumerateRecords(RecordFilter\
  \ filter,\n    RecordComparator comparator, boolean keepUpdated)\n    throws RecordStoreNotOpenException\
  \ \n```\n\nRecordStore 中的这一个方法涉及三个你之前从未见过的不同接口。让我们先从整体上看，然后再深入探讨这些新接口。\n\nenumerateRecords()\
  \ 方法返回 RecordStore 中记录的一个排序子集。RecordFilter 决定哪些记录将包含在该子集中，而 RecordComparator 则用于对它们进行排序。返回的\
  \ RecordEnumeration 允许你遍历返回的记录。\n\n### RecordFilter\n\n最简单的接口是 RecordFilter。当你在\
  \ RecordStore 上调用 enumerateRecords() 时，会检索每条记录的数据。RecordFilter 有一个方法 matches()，该方法会为每条记录调用。记录过滤器应检查记录数据，如果该记录应包含在\
  \ enumerateRecords() 返回的结果中，则返回 true。\n\n以下是一个简单的 RecordFilter 实现，它只选择第一个数据字节为 7\
  \ 的记录：\n\n```\npublic class SevenFilter\n    implements javax.microedition.rms.RecordFilter\
  \ {\n  public boolean matches(byte[] candidate) {\n    if (candidate.length == 0)\
  \ return false;\n    return (candidate[0] == 7);\n  }\n}\n```\n\n### RecordComparator\n\
  \nRecordComparator 实现的工作是确定两组记录数据的顺序。RecordComparator 类似于 J2SE 中的 java.util.Comparator\
  \ 接口。\n\n要实现 RecordComparator 接口，你只需要定义一个方法：\n\n```\npublic int compare(byte[] rec1,\
  \ byte[] rec2) \n```\n\n此方法检查 rec1 和 rec2 中包含的数据，并确定在排序列表中哪个应该排在前面。它应返回 RecordComparator\
  \ 中定义的以下常量之一：\n\n*   PRECEDES 表示 rec1 应排在 rec2 之前。\n*   FOLLOWS 表示 rec1 应排在 rec2\
  \ 之后。\n*   EQUIVALENT 表示 rec1 和 rec2 相同，至少在排序方面如此。\n\n以下简单的实现比较给定记录的每个字节，并按数值排序。如果两条记录的数据相同（直到较短记录的长度），则认为它们是\
  \ EQUIVALENT。\n\n```\npublic class SimpleComparator\n    implements javax.microedition.rms.RecordComparator\
  \ {\n  public int compare(byte[] rec1, byte[] rec2) {\n    int limit = Math.min(rec1.length,\
  \ rec2.length);\n\n    for (int index = 0; index < limit; index++) {\n      if (rec1[index]\
  \ < rec2[index])\n        return PRECEDES;\n      else if (rec1[index] > rec2[index])\n\
  \        return FOLLOWS;\n    }\n    return EQUIVALENT;\n  }\n}\n```\n\n\n\n###\
  \ 使用 RecordEnumeration\n\n`RecordStore` 的 `enumerateRecords()` 方法返回一个实现了 `RecordEnumeration`\
  \ 接口的对象。`RecordEnumeration` 出乎意料地复杂。其基本功能是允许你遍历从 `RecordStore` 中检索到的记录。然而，与常规的 J2SE\
  \ `Enumeration` 或 `Iterator` 不同，`RecordEnumeration` 允许你向前和向后滚动浏览其内容。此外，你还可以预览下一条或上一条记录的\
  \ ID。最后，`RecordEnumeration` 提供了使其数据与实际的 `RecordStore` 保持同步的可能性。在幕后，这是通过将 `RecordEnumeration`\
  \ 注册为 `RecordStore` 变更的监听器来实现的。\n\n`RecordEnumeration` 的基本操作是遍历一组记录。你可以通过调用 `hasNextElement()`\
  \ 来判断是否存在下一条记录。如果下一条记录存在，你可以通过调用以下方法来检索其数据：\n\n```\npublic byte[] nextRecord()\n\
  \    throws InvalidRecordIDException,\n           RecordStoreNotOpenException,\n\
  \           RecordStoreException\n```\n\n或者，你也可以通过调用以下方法来检索下一条记录的 ID：\n\n```\npublic\
  \ int nextRecordId() throws InvalidRecordIDException\n```\n\n不过，你无法两全其美；`nextRecord()`\
  \ 和 `nextRecordId()` 都会将 `RecordEnumeration` 推进到下一条记录。如果你想同时获取下一条记录的 ID 和数据，你需要先调用\
  \ `nextRecordId()`，然后直接从 `RecordStore` 中检索记录数据。\n\n`RecordEnumeration` 的一个典型用法是直接遍历选定的记录，如下所示：\n\
  \n```\n// 打开一个 RecordStore rs\n// 创建一个 RecordFilter rf\n// 创建一个 RecordComparator\
  \ rc\n\nRecordEnumeration re = rs.enumerateRecords(rf, rc, false);\nwhile (re.hasNextElement())\
  \ {\n  byte[] recordBytes = re.nextRecord();\n  // 处理检索到的字节数据。\n}\n```\n\n`RecordFilter`\
  \ 和 `RecordComparator` 都可以为 `null`，在这种情况下，`RecordEnumeration` 将遍历记录存储中的每一条记录。`Preferences`\
  \ 类就是以这种方式使用 `RecordEnumeration` 的。\n\n|  | 注意 | 如果 *RecordComparator* 为 *null*，则\
  \ *RecordEnumeration* 不保证返回记录的排序顺序。 |\n\n当你在选定的记录中移动时，你也可以向后移动。`RecordEnumeration`\
  \ 包含了 `hasPreviousElement()`、`previousRecord()` 和 `previousRecordId()` 方法，它们的工作方式与对应的“下一个”方法相同。\n\
  \n在 `RecordEnumeration` 中移动当前位置的五种方式中，有四种是 `nextRecord()`、`nextRecordId()`、`previousRecord()`\
  \ 或 `previousRecordId()` 方法。第五种方法有点像倒带按钮：`reset()` 将记录指针移回到选定记录的最开始位置。\n\n当你使用完\
  \ `RecordEnumeration` 后，应该释放其资源。你可以通过调用 `destroy()` 来实现，之后 `RecordEnumeration` 将不再可用。\n\
  \n### 保持 RecordEnumeration 为最新状态\n\n在多线程环境中，完全有可能在你遍历某个 `RecordStore` 的 `RecordEnumeration`\
  \ 的同时，该 `RecordStore` 发生了变化。有两种方法可以处理这种情况。\n\n第一种方法是调用 `rebuild()`，它会根据你最初指定的 `RecordFilter`\
  \ 和 `RecordComparator` 显式地重建 `RecordEnumeration`。\n\n另一种可能性是请求一个能根据底层 `RecordStore`\
  \ 的任何变更自动更新的 `RecordEnumeration`。你可以通过将 `RecordStore` 的 `enumerateRecords()` 方法的\
  \ `keepUpdated` 参数设置为 `true` 来实现这一点。你可以通过调用 `isKeptUpdated()` 来了解 `RecordEnumeration`\
  \ 是否自动更新。此外，你还可以通过调用 `keepUpdated()` 来更改其状态。\n\n自动更新的 `RecordEnumeration` 会将自己作为\
  \ `RecordListener` 注册到底层的 `RecordStore` 中。每次 `RecordStore` 发生变更时，`RecordEnumeration`\
  \ 都会被重建。请记住，这是一项开销很大的操作（就时间而言），因此如果 `RecordStore` 发生多次变更，你将为此付出代价。\n\n## 使用资源文件\n\
  \n资源文件是持久化存储的另一种形式。访问资源文件非常简单，但它们仍然很重要。资源文件可以是图像、文本或其他类型的文件，它们存储在 MIDlet 套件的 JAR\
  \ 文件中。这些文件是只读的。\n\n你可以通过使用 `Class` 中的 `getResourceAsStream()` 方法，将资源文件作为 `InputStream`\
  \ 来访问。典型的用法如下所示：\n\n```\nInputStream in = this.getClass().getResourceAsStream(\"\
  /Robotag-t.png\");\n```\n\n## 总结\n\nMIDP 的持久化存储 API 特意设计得比较抽象，以认识到小型设备可能拥有许多不同的数据存储方法。在\
  \ MIDP 中，持久化存储的核心概念是记录存储，它是一组称为记录的数据位的集合。记录存储实际上是一个微型数据库，但其具体存储方式的细节则留给设备实现去处理。`javax.microedition.rms.RecordStore`\
  \ 类封装了对持久化存储的所有访问。它提供了访问和操作 `RecordStore` 的方法，以及处理单个记录的方法。对于更高级的 `RecordStore` 操作，存在一些方法和接口，用于帮助跟踪\
  \ `RecordStore` 的变更或执行 `RecordStore` 查询。\n\n"
- "# 第 9 章：连接世界\n\n在手机和寻呼机上运行 Java 很酷，但真正的亮点在于让你的 MIDlet 连接到互联网。有了互联网连接，你就可以编写应用程序，从而能够从世界任何地方通过手机访问信息并完成工作。\n\
  \n\n\n## 通用连接框架\n\nCLDC 定义了一个极其灵活的网络连接 API，即*通用连接框架*。它全部包含在 `javax.microedition.io`\
  \ 包中，并以 `Connection` 接口为基础。图 9-1 详细展示了 `Connection` 接口及其各种子接口。加号表示 MIDP 2.0 中新增的接口。\n\
  \n![点击展开](img/fig157_01_0.jpg)\n图 9-1：*Connection* 家族树\n\n连接接口与现实世界之间的桥梁是一个名为 `javax.microedition.io.Connector`\
  \ 的类。其基本思想是，你将一个连接字符串传递给 `Connector` 的某个静态方法，然后获得某个 `Connection` 实现。*连接字符串*看起来有点像\
  \ URL，但还有其他各种可能性。例如，连接字符串 `socket://apress.com:79` 可能会在 79 端口上打开一个到 `apress.com`\
  \ 的 TCP/IP 连接，然后返回一个 `StreamConnection` 实现。\n\nMIDP 1.0 通过仅要求一种连接类型（超文本传输协议，HTTP）极大地简化了这个通用框架。你将一个\
  \ HTTP URL 传递给 `Connector`，然后获得一个 `HttpConnection` 的实现。尽管符合 MIDP 1.0 的设备可能支持其他类型的连接，但\
  \ HTTP 是你唯一应该依赖的。MIDP 2.0 增加了对 HTTPS 连接（安全 HTTP）的强制支持，并标准化了其他几种连接类型的连接字符串。我将在本章后面讨论这些新特性。\n\
  \n`HttpConnection` 的方法在图 9-2 中有详细说明。`HttpConnection` 中的大多数方法都与 HTTP 的细节有关，这里我不再赘述。我将涵盖你在此处连接服务器所需了解的一切，包括\
  \ GET 和 POST 请求。如果你需要深入研究，可以阅读 RFC 2616（互联网标准文档之一），该文档可在 [`www.faqs.org/rfcs/rfc2616.html`](http://www.faqs.org/rfcs/rfc2616.html)\
  \ 获取。请注意，MIDP 使用的是完整 HTTP 1.1 的一个子集；仅要求支持 GET、POST 和 HEAD 命令。\n\n![点击展开](img/fig158_01_0.jpg)\n\
  图 9-2：*HttpConnection* 接口\n\n## HTTP 回顾\n\n本节简要回顾超文本传输协议。完整内容在 RFC 2616 中；本节涵盖要点。\n\
  \n### 请求与响应\n\nHTTP 是围绕请求和响应构建的。客户端向服务器发送一个请求——例如，“请给我某某 HTML 页面”。服务器发回一个响应——例如，“这是文件”，或者“我不知道你在说什么”。\n\
  \n请求和响应包含两部分：标头和内容。如果你在浏览器中输入一个 URL，浏览器会创建一个 HTTP 请求（主要是标头）并将其发送到服务器。服务器找到请求的文件，并在\
  \ HTTP 响应中将其发回。响应标头描述了诸如 Web 服务器类型、响应的文件类型、响应长度以及其他信息。响应内容则是文件本身的数据。\n\n### 参数\n\
  \n浏览器和其他 HTTP 客户端向 HTTP 服务器请求特定的命名资源。此外，客户端可以向服务器传递参数。参数是简单的名称和值对。例如，客户端可能向服务器发送一个值为“jonathan”的“userid”参数。HTTP\
  \ 还支持在请求体中向服务器传递二进制数据，而 Java 流类使得交换各种数据类型变得容易。\n\n当浏览器作为 HTTP 客户端时，参数通常从 HTML 表单中收集。你见过这些表单，比如填写送货地址和信用卡号码的那种。当你点击表单上的**提交**或**下一步**按钮时，表单值会作为参数发送到\
  \ Web 服务器。\n\n客户端在参数发送到服务器之前对其进行编码。参数以名称和值对的形式传递；多个参数用 & 符号分隔。参数编码的具体方式在 J2SE 文档的\
  \ `java.net.URLEncoder` 中有说明。规则相对简单。\n\n*   空格字符被转换为加号 (+) 符号。\n*   以下字符保持不变：小写字母\
  \ a 到 z、大写字母 A 到 Z、数字 0 到 9、句点 (.)、连字符 (-)、星号 (*) 和下划线 (_)。\n*   所有其他字符都被转换为“%xy”，其中“xy”是一个十六进制数，表示该字符的低八位。\n\
  \n### GET、HEAD 和 POST\n\n最简单的 HTTP 操作是 GET。当你在浏览器中输入 URL 时就会发生这种情况。浏览器说：“GET 这个\
  \ URL”，然后服务器用响应的标头和内容进行响应。\n\n对于 GET 请求，参数以编码形式附加到 URL 的末尾。（某些服务器处理超长 URL 时会有问题；如果你有很多参数或二进制数据，你可能希望将数据放在\
  \ HTTP 请求体中传递。）例如，假设以下 URL 映射到你应用程序中的一个 Servlet 或其他服务器端组件：\n\n[`jonathanknudsen.com/simple`](http://jonathanknudsen.com/simple)\n\
  \n添加参数很容易。如果你想传递一个名称为“user”、值为“jonathan”的参数，你可以使用以下 URL：\n\n[`jonathanknudsen.com/simple?user=jonathan`](http://jonathanknudsen.com/simple?user=jonathan)\n\
  \n可以添加更多的名称和值对，用 & 符号分隔：\n\n[`jonathanknudsen.com/simple?user=jonathan&zip=08540&day=saturday`](http://jonathanknudsen.com/simple?user=jonathan&zip=08540&day=saturday)\n\
  \nHEAD 操作与 GET 相同，但服务器只发回响应的标头。\n\nPOST 基本上与 GET 相同，但参数的处理方式不同。参数不是像 GET 那样附加在 URL\
  \ 的末尾，而是作为请求体传递。它们的编码方式相同。\n\n## 使用 HTTP GET 建立连接\n\n从服务器加载数据非常简单，尤其是在执行 HTTP GET\
  \ 时。只需将一个 URL 传递给 `Connector` 的静态 `open()` 方法。返回的 `Connection` 很可能是一个 `HttpConnection`\
  \ 的实现，但你可以直接将其视为 `InputConnection`。然后获取相应的 `InputStream` 并尽情读取数据。\n\n在代码中，它看起来像这样：\n\
  \n```\nString url = \"http://jonathanknudsen.com/simple\";\nInputConnection ic =\
  \ (InputConnection)Connector.open(url);\nInputStream in = ic.openInputStream();\n\
  // 从 InputStream 读取数据\nic.close();\n```\n\n涉及的大多数方法都可能抛出 `java.io.IOException`。为了清晰起见，我在示例中省略了\
  \ try 和 catch 块。\n\n仅此而已。你现在可以将你的 MIDlet 连接到世界了。在 MIDP 2.0 中，情况稍微复杂一些，因为网络访问受设备上的安全策略约束。我将在本章末尾附近详细讨论这一点。\n\
  \n### 传递参数\n\n对于 HTTP GET，所有参数都在 URL 体中传递给服务器。这使得向服务器发送参数变得容易。以下代码片段展示了如何传递两个参数：\n\
  \n```\nString url = \"http://localhost/midp/simple?pOne=one+bit&pTwo=two\";\nInputConnection\
  \ ic = (InputConnection)Connector.open(url);\nInputStream in = ic.openInputStream();\n\
  ```\n\n第一个参数名为“pOne”，值为“one bit”；第二个参数名为“pTwo”，值为“two”。\n\n\n\n### 一个简单的示例\n\nHTTP\
  \ 并非只用于交换 HTML 页面。它实际上是一个通用的文件交换协议。在本节中，我们将看一个从网络加载图像并显示的示例。清单 9-1 展示了 ImageLoader\
  \ 的源代码，这是一个 MIDlet，它从互联网获取图像并在屏幕上显示。\n\n清单 9-1：从互联网获取图像\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\nimport java.io.*;\n\nimport javax.microedition.io.*;\nimport javax.microedition.lcdui.*;\n\
  import javax.microedition.midlet.*;\n\npublic class ImageLoader\n    extends MIDlet\n\
  \    implements CommandListener, Runnable {\n  private Display mDisplay;\n  private\
  \ Form mForm;\n\n  public ImageLoader() {\n    mForm = new Form(\"Connecting...\"\
  );\n    mForm.addCommand(new Command(\"Exit\", Command.EXIT, 0));\n    mForm.setCommandListener(this);\n\
  \  }\n\n  public void startApp() {\n    if (mDisplay == null) mDisplay = Display.getDisplay(this);\n\
  \    mDisplay.setCurrent(mForm);\n\n    // Do network loading in a separate thread.\n\
  \    Thread t = new Thread(this);\n    t.start();\n  }\n\n  public void pauseApp()\
  \ {}\n\n  public void destroyApp(boolean unconditional) {}\n\n  public void commandAction(Command\
  \ c, Displayable s) {\n    if (c.getCommandType() == Command.EXIT)\n      notifyDestroyed();\n\
  \  }\n\n  public void run() {\n    HttpConnection hc = null;\n    DataInputStream\
  \ in = null;\n\n    try {\n      String url = getAppProperty(\"ImageLoader-URL\"\
  );\n      hc = (HttpConnection)Connector.open(url);\n      int length = (int)hc.getLength();\n\
  \      byte[] data = null;\n      if (length != -1) {\n        data = new byte[length];\n\
  \        in = new DataInputStream(hc.openInputStream());\n        in.readFully(data);\n\
  \      }\n      else {\n        // If content length is not given, read in chunks.\n\
  \        int chunkSize = 512;\n        int index = 0;\n        int readLength =\
  \ 0;\n        in = new DataInputStream(hc.openInputStream());\n        data = new\
  \ byte[chunkSize];\n        do {\n          if (data.length < index + chunkSize)\
  \ {\n            byte[] newData = new byte[index + chunkSize];\n            System.arraycopy(data,\
  \ 0, newData, 0, data.length);\n            data = newData;\n          }\n     \
  \     readLength = in.read(data, index, chunkSize);\n          index += readLength;\n\
  \        } while (readLength == chunkSize);\n        length = index;\n      }\n\
  \      Image image = Image.createImage(data, 0, length);\n      ImageItem imageItem\
  \ = new ImageItem(null, image, 0, null);\n      mForm.append(imageItem);\n     \
  \ mForm.setTitle(\"Done.\");\n    }\n    catch (IOException ioe) {\n      StringItem\
  \ stringItem = new StringItem(null, ioe.toString());\n      mForm.append(stringItem);\n\
  \      mForm.setTitle(\"Done.\");\n    }\n    finally {\n      try {\n        if\
  \ (in != null) in.close();\n        if (hc != null) hc.close();\n      }\n     \
  \ catch (IOException ioe) {}\n    }\n  }\n} \n```\n\n| **![结束示例](img/_1.gif)** |\n\
  \n|  |\n\n`run()` 方法包含了所有网络代码。它相当简单；我们将图像的 URL（作为应用程序属性获取）传递给 `Connector` 的 `open()`\
  \ 方法，并将结果转换为 `HttpConnection`。然后，我们使用 `getLength()` 方法获取图像文件的长度。根据这个长度，我们创建一个字节数组并将数据读入其中。最后，将整个图像文件读入字节数组后，我们可以从原始数据创建一个\
  \ `Image`。\n\n如果未指定内容长度，则图像数据将以 512 字节的块进行读取。\n\n为了使此示例正常工作，您需要指定 MIDlet 属性 `\"\
  ImageLoader-URL\"`。请注意，您需要指定 PNG 图像的 URL，而不是 JPEG 或 GIF 图像。URL [`65.215.221.148:8080/wj2/res/java2d_sm_ad.png`](http://65.215.221.148:8080/wj2/res/java2d_sm_ad.png)\
  \ 会产生如图 9-3 所示的结果。\n\n![](img/fig164_01.jpg)\n图 9-3：*ImageLoader* 示例\n\n## 使用 HTTP\
  \ POST 提交表单\n\n在 MIDlet 端，提交表单稍微复杂一些。特别是，在联系服务器之前，需要在 `HttpConnection` 中设置请求头。过程如下：\n\
  \n1.  从 `Connector` 的 `open()` 方法获取一个 `HttpConnection`。\n\n2.  修改请求的头部字段。具体来说，您需要通过调用\
  \ `setRequestMethod()` 来更改请求方法，并且应该通过调用 `setRequestProperty()` 来设置 `\"Content-Length\"\
  ` 头部。这是您将要发送的参数的长度。\n\n3.  通过调用 `openOutputStream()` 获取 `HttpConnection` 的输出流。这会将请求头发送到服务器。\n\
  \n4.  在从 `HttpConnection` 返回的输出流上发送请求参数。参数应按照前面所述（以及在 J2SE 类 `java.net.URLEncoder`\
  \ 的文档中）的方式进行编码。\n\n5.  从通过 `HttpConnection` 的 `openInputStream()` 方法获取的输入流中读取服务器的响应。\n\
  \n以下示例清单 9-2 演示了如何使用 HTTP POST 向服务器发送单个参数。多个参数可以通过使用 & 分隔符连接起来。请注意，此示例中的参数已按上述方式编码。在此示例中，参数值\
  \ `\"Jonathan Knudsen!\"` 已被编码为 `\"Jonathan+Knudsen%21\"`。清单 9-3 展示了一个非常简单的 servlet，它可以与\
  \ PostMIDlet 通信。\n\n清单 9-2：执行 HTTP POST 的简单 MIDlet\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\nimport java.io.*;\n\nimport javax.microedition.io.*;\nimport javax.microedition.lcdui.*;\n\
  import javax.microedition.midlet.*;\n\npublic class PostMIDlet\n    extends MIDlet\n\
  \    implements CommandListener, Runnable {\n  private Display mDisplay;\n  private\
  \ Form mForm;\n\npublic PostMIDlet() {\n    mForm = new Form(\"Connecting...\");\n\
  \    mForm.addCommand(new Command(\"Exit\", Command.EXIT, 0));\n    mForm.setCommandListener(this);\n\
  \  }\n\npublic void startApp() {\n    if (mDisplay == null) mDisplay = Display.getDisplay(this);\n\
  \    mDisplay.setCurrent(mForm);\n\n// Do network loading in a separate thread.\n\
  \    Thread t = new Thread(this);\n    t.start();\n  }\n  public void pauseApp()\
  \ {}\n\npublic void destroyApp(boolean unconditional) {}\n\npublic void commandAction(Command\
  \ c, Displayable s) {\n    if (c.getCommandType() == Command.EXIT)\n      notifyDestroyed();\n\
  \  }\n\npublic void run() {\n    HttpConnection hc = null;\n    InputStream in =\
  \ null;\n    OutputStream out = null;\n\ntry {\n      String message = \"name=Jonathan+Knudsen%21\"\
  ;\n      String url = getAppProperty(\"PostMIDlet-URL\");\n      hc = (HttpConnection)Connector.open(url);\n\
  \      hc.setRequestMethod(HttpConnection.POST);\n      hc.setRequestProperty(\"\
  Content-Type\",\n          \"application/x-www-form-urlencoded\");\n      hc.setRequestProperty(\"\
  Content-Length\",\n          Integer.toString(message.length()));\n      out = hc.openOutputStream();\n\
  \      out.write(message.getBytes());\n      in = hc.openInputStream();\n      int\
  \ length = (int)hc.getLength();\n      byte[] data = new byte[length];\n      in.read(data);\n\
  \      String response = new String(data);\n      StringItem stringItem = new StringItem(null,\
  \ response);\n      mForm.append(stringItem);\n      mForm.setTitle(\"Done.\");\n\
  \    }\n    catch (IOException ioe) {\n      StringItem stringItem = new StringItem(null,\
  \ ioe.toString());\n      mForm.append(stringItem);\n      mForm.setTitle(\"Done.\"\
  );\n    }\n    finally {\n      try {\n        if (out != null) out.close();\n \
  \       if (in != null) in.close();\n        if (hc != null) hc.close();\n     \
  \ }\n      catch (IOException ioe) {}\n    }\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
  \ |\n\n|  |\n\n清单 9-3：响应 *PostServlet* 的简单 Servlet\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\nimport javax.servlet.http.*;\nimport javax.servlet.*;\nimport java.io.*;\n\
  \n\n\npublic class PostServlet extends HttpServlet {\n  public void doPost(HttpServletRequest\
  \ request,\n      HttpServletResponse response)\n      throws ServletException,\
  \ IOException {\n    String name = request.getParameter(\"name\");\n\nString message\
  \ = \"Received name: '\" + name + \"'\";\n    response.setContentType(\"text/plain\"\
  );\n    response.setContentLength(message.length());\n    PrintWriter out = response.getWriter();\n\
  \    out.println(message);\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\
  \n## 使用 Cookie 进行会话跟踪\n\nHTTP 是一种无状态协议，这意味着每个请求和响应对都是独立的对话。但有时，您希望服务器能够记住您的身份。这可以通过*会话*来实现。在服务器端，会话只是一组信息的集合。当客户端向服务器发送\
  \ HTTP 请求时，它会在请求中包含一个会话 ID。然后，服务器可以查找相应的会话，从而大致了解客户端的身份（或至少是状态）。\n\n在客户端存储会话 ID\
  \ 最常见的方法是使用 HTTP *Cookie*。Cookie 只是服务器在 HTTP 响应中传递给客户端的一小段数据。大多数 Web 浏览器会自动存储 Cookie，并在发出新请求时将它们发送回相应的服务器。\n\
  \n当然，在 MIDP 世界中，没有 Web 浏览器为您处理 Cookie。您必须自己动手。幸运的是，这并不复杂。\n\n维护服务器会话 ID 的网络代码需要做两件事：\n\
  \n1.  当从服务器接收响应时，检查是否存在 Cookie。如果存在 Cookie，则将其保存起来以备后用（例如保存在成员变量中）。Cookie 只是另一个\
  \ HTTP 响应头行。您可以在发送请求后，通过调用 `HttpConnection` 对象上的 `getHeaderField()` 方法来检查 Cookie。\n\
  \n2.  当向服务器发送请求时，如果之前已收到会话 ID Cookie，则将其发送出去。同样，向服务器发送 Cookie 只需使用 `HttpConnection`\
  \ 的 `setRequestProperty()` 方法将其放入请求头中即可。\n\n每次向服务器发送请求时，您都会将会话 ID 作为请求头发送出去。服务器使用此会话\
  \ ID 来查找一个会话对象，该对象可在服务器端用于执行有用的操作，例如检索偏好设置或维护购物车。\n\n在 MIDlet 中实现此行为并不困难。如果您手头有会话\
  \ ID Cookie，则在打开到同一服务器的 HTTP 连接时应将其发送出去，如下所示：\n\n```\nHttpConnection hc = (HttpConnection)Connector.open(url);\n\
  if (mSession != null)\n    hc.setRequestProperty(\"cookie\", mSession);\n```\n\n\
  此代码假设您已将会话 ID Cookie 保存在 `mSession` 成员变量中。当然，第一次联系服务器时，您还没有会话 ID Cookie。\n\n稍后，当您收到来自\
  \ HTTP 请求的响应时，查找 Cookie。如果找到，则解析出会话 ID 并将其保存起来，如下所示：\n\n```\nInputStream in = hc.openInputStream();\n\
  \nString cookie = hc.getHeaderField(\"Set-cookie\");\nif (cookie != null) {\n  int\
  \ semicolon = cookie.indexOf(';');\n  mSession = cookie.substring(0, semicolon);\n\
  } \n```\n\n需要解析 Cookie 字符串，因为它由两部分组成。第一部分是一个路径，可用于确定何时应将 Cookie 发送回服务器。第二部分包含会话\
  \ ID——这就是我们解析并保存的部分。\n\n有关 Cookie 字符串不同部分及其使用方式的更多信息，请参阅 [`www.ietf.org/rfc/rfc2965.txt`](http://www.ietf.org/rfc/rfc2965.txt)\
  \ 和 [`www.ietf.org/rfc/rfc2109.txt`](http://www.ietf.org/rfc/rfc2109.txt)。\n\n清单\
  \ 9-4 展示了一个名为 `CookieMIDlet` 的类，它使用此技术与服务器保持会话。它的用户界面非常简单——只是一个带有两个命令的空表单。如果您调用\
  \ **Send** 命令，MIDlet 会发送一个 HTTP 请求，并使用前面描述的 Cookie 处理方式接收响应。\n\n清单 9-4：保存服务器会话 ID\
  \ Cookie\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport java.io.*;\n\nimport javax.microedition.io.*;\n\
  import javax.microedition.midlet.*;\nimport javax.microedition.lcdui.*;\n\npublic\
  \ class CookieMIDlet\n    extends MIDlet\n    implements CommandListener, Runnable\
  \ {\n  private Display mDisplay;\n  private Form mForm;\n\nprivate String mSession;\n\
  \n\n\npublic void startApp() {\n    mDisplay = Display.getDisplay(this);\n\nif (mForm\
  \ == null) {\n      mForm = new Form(\"CookieMIDlet\");\n\nmForm.addCommand(new\
  \ Command(\"Exit\", Command.EXIT, 0));\n      mForm.addCommand(new Command(\"Send\"\
  , Command.SCREEN, 0));\n      mForm.setCommandListener(this);\n    }\n\nmDisplay.setCurrent(mForm);\n\
  \  }\n  public void pauseApp() {}\n\npublic void destroyApp(boolean unconditional)\
  \ {}\n\npublic void commandAction(Command c, Displayable s) {\n    if (c.getCommandType()\
  \ == Command.EXIT) notifyDestroyed();\n    else {\n      Form waitForm = new Form(\"\
  Connecting...\");\n      mDisplay.setCurrent(waitForm);\n      Thread t = new Thread(this);\n\
  \      t.start();\n    }\n  }\n\npublic void run() {\n    String url = getAppProperty(\"\
  CookieMIDlet-URL\");\n\ntry {\n      // 查询服务器并获取响应。\n      HttpConnection hc = (HttpConnection)Connector.open(url);\n\
  \      if (mSession != null)\n        hc.setRequestProperty(\"cookie\", mSession);\n\
  \      InputStream in = hc.openInputStream();\n\nString cookie = hc.getHeaderField(\"\
  Set-cookie\");\n      if (cookie != null) {\n        int semicolon = cookie.indexOf(';');\n\
  \        mSession = cookie.substring(0, semicolon);\n      }\n\nint length = (int)hc.getLength();\n\
  \      byte[] raw = new byte[length];\n      in.read(raw);\n\nString s = new String(raw);\n\
  \      Alert a = new Alert(\"Response\", s, null, null);\n      a.setTimeout(Alert.FOREVER);\n\
  \      mDisplay.setCurrent(a, mForm);\n\nin.close();\n      hc.close();\n    }\n\
  \    catch (IOException ioe) {\n      Alert a = new Alert(\"Exception\", ioe.toString(),\
  \ null, null);\n      a.setTimeout(Alert.FOREVER);\n      mDisplay.setCurrent(a,\
  \ mForm);\n    }\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n在服务器端，事情要简单得多，如清单\
  \ 9-5 所示。如果你正在编写 Java Servlet，甚至无需担心 Cookie。相反，你只需处理一个 `HttpSession` 对象。下面的代码展示了一个与\
  \ `CookieMIDlet` 交互的 Servlet；它实现了一个基于会话的点击计数器。该代码已在 Tomcat 4.0 上测试过，但在其他服务器上应该也能正常工作。请注意，你需要将\
  \ MIDlet 使用的 URL 映射到此 Servlet 类；有关详细信息，请参阅 Servlet 入门书籍或你的服务器文档。\n\n清单 9-5：一个简单的会话处理\
  \ Servlet\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport javax.servlet.http.*;\n\
  import javax.servlet.*;\nimport java.io.*;\nimport java.util.*;\n\npublic class\
  \ CookieServlet extends HttpServlet {\n  private Map mHitMap = new HashMap();\n\n\
  public void doGet(HttpServletRequest request,\n      HttpServletResponse response)\n\
  \      throws ServletException, IOException {\n    HttpSession session = request.getSession();\n\
  \nString id = session.getId();\n\nint hits = -1;\n\n// 尝试从映射中检索点击次数。\n    Integer\
  \ hitsInteger = (Integer)mHitMap.get(id);\n    if (hitsInteger != null)\n      hits\
  \ = hitsInteger.intValue();\n\n// 递增并存储。\n    hits++;\n    mHitMap.put(id, new Integer(hits));\n\
  \    String message = \"Hits for this session: \" + hits + \".\";\n\nresponse.setContentType(\"\
  text/plain\");\n    response.setContentLength(message.length());\n    PrintWriter\
  \ out = response.getWriter();\n    out.println(message);\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
  \ |\n\n|  |\n\n该 Servlet 检索 `HttpSession` 对象。然后它提取出会话 ID，并将其用作点击次数映射中的键。在检索并递增该会话的点击次数后，Servlet\
  \ 将其作为响应发送回 MIDlet。你可以启动模拟器的多个副本并同时运行它们，以观察点击次数如何相互独立并与每个会话相关联。\n\n## 设计技巧\n\n本节包含一些关于创建联网\
  \ MIDlet 的建议。\n\n*   使用 GET 而非 POST。它更简单，而且你不必担心摆弄请求头。\n\n*   不要硬编码 URL。将它们放在应用程序描述符的\
  \ MIDlet 属性中。这样可以在不重新编译代码的情况下更改 URL。\n\n*   将网络访问放在单独的线程中。网络访问总是需要时间；它不应阻塞用户界面。此外，你必须让用户了解正在发生的事情。显示一条“加载进度”类型的消息或某种指示，表明你的应用程序正在尝试访问网络资源。\n\
  \n*   确保优雅地处理异常。无线设备上的网络连接并非极其可靠，因此你应该确保做好最坏的准备。捕获所有异常并做出合理的处理。\n\n*   使用后自行清理。在小型设备上，资源稀缺，因此请确保在使用完连接后将其关闭。`try\
  \ - finally` 块对于确保未使用的流和连接被关闭特别有用。^([1]) Jargoneer 中的代码演示了这种技术。\n\n^([1])你可能熟悉 Java\
  \ 中用于异常处理的 `try - catch` 块。`finally` 子句虽然不那么广为人知，但非常有用。无论控制流如何离开 `try` 块，`finally`\
  \ 块中的代码都会被执行。\n\n\n\n## 使用 HTTPS\n\nHTTP 并非一种安全的协议。它运行在 TCP/IP 套接字之上。使用 HTTP 交换的信息极易受到窃听者的攻击。一种更安全的替代方案\
  \ HTTPS，运行在传输层安全协议（TLS）、安全套接字层（SSL）或类似协议之上。TLS 和 SSL 在套接字与 HTTP、POP3、SMTP 和 NNTP\
  \ 等高层协议之间提供了一层身份验证和加密功能。\n\nTLS 1.0 实际上只是 SSLv3 的更新版本。有关这些协议的更多信息，请参阅 [`wp.netscape.com/eng/ssl3/`](http://wp.netscape.com/eng/ssl3/)\
  \ 和 [`www.ietf.org/rfc/rfc2246.txt`](http://www.ietf.org/rfc/rfc2246.txt)。\n\n在典型的\
  \ TLS 交互中，服务器会向客户端发送一个证书以进行身份验证。客户端必须拥有证书颁发机构（CA）的根证书，才能验证服务器的证书。（J2ME Wireless\
  \ Toolkit 附带了一个名为 MEKeyTool 的实用程序，可用于修改工具包模拟器使用的 CA 根证书集。真实设备可能也有类似的实用程序，但通常，您需要确保您的服务器证书由广泛认可的\
  \ CA 签名。）如果客户端能够验证证书，客户端将向服务器发送一个秘密值，该值使用服务器的公钥加密。服务器和客户端都从这个秘密值派生出一个*会话密钥*，该密钥用于加密客户端和服务器之间发送的所有后续流量。\n\
  \n通用连接框架使得获取 HTTPS 连接变得非常容易。您只需构造一个 HTTPS 连接字符串即可。因此，不必使用以下代码：\n\n```\nHttpConnection\
  \ hc = (HttpConnection)\n    Connector.open(\"http://www.cert.org/\");\n```\n\n\
  而是使用以下代码：\n\n```\nHttpConnection hc = (HttpConnection)\n    Connector.open(\"https://www.cert.org/\"\
  ); \n```\n\n就是这么简单。HTTPS 连接在 MIDP 1.0 中就已经可以实现；尽管规范并未要求支持，但实现可以自由提供。在 MIDP 2.0 中，API\
  \ 也支持 HTTPS，因此新增了一个接口 HttpsConnection，它表示通过某种安全传输承载的 HTTP。\n\nHttpsConnection 是\
  \ HttpConnection 的扩展；它增加了一个 getPort() 方法，以便您可以获取服务器的端口号。HTTPS 的默认端口是 443。更重要的是，HttpsConnection\
  \ 有一个 getSecurityInfo() 方法，该方法返回有关安全连接的信息。新的 SecurityInfo 接口封装了有关正在使用的密码套件、安全协议的名称和版本以及服务器证书的信息。该证书是\
  \ javax.microedition.pki.Certificate 的一个实现，包含标准信息，如主题、签名者、签名算法以及证书的有效期。\n\n以下示例展示了如何从\
  \ HTTPS 连接中检索服务器证书的主题：\n\n```\nString url = \"https://www.cert.org/\";\nHttpsConnection\
  \ hc = (HttpsConnection)Connector.open(url);\nSecurityInfo si = hc.getSecurityInfo();\n\
  Certificate c = si.getServerCertificate();\nString subject = c.getSubject();\n```\n\
  \n## 使用数据报连接\n\n在本节中，我将简要介绍数据报连接。尽管 MIDP 规范并未强制要求支持数据报，但某些设备实现可能会选择支持数据报连接。与面向流的连接不同，数据报连接是*无连接*的。这意味着您可以在网络中发送数据包，但无法保证它们会按正确顺序到达目的地，甚至无法保证它们最终能够到达。\n\
  \n数据报通信基于 javax.microedition.io 包中的两个接口：DatagramConnection 和 Datagram。图 9-4 展示了\
  \ DatagramConnection 中的方法。\n\n![点击展开](img/fig175_01_0.jpg)\n图 9-4：*DatagramConnection*\
  \ 接口\n\n第一步是使用通用连接框架获取一个 DatagramConnection，如下所示：\n\n```\nString url = \"datagram://jonathanknudsen.com:7999\"\
  ;\nDatagramConnection dc = (DatagramConnection)Connector.open(url); \n```\n\n传递给\
  \ Connector 的 open() 方法的 URL 字符串包含了数据报连接另一端的主机名和端口。如果 MIDP 实现不支持数据报连接，open() 方法将抛出一个异常。\n\
  \n所有数据都通过 Datagram 进行交换。要发送一个数据报，首先请使用 newDatagram() 方法之一请求 DatagramConnection 为您创建一个数据报。然后，将一些数据写入其中，并将其传递给\
  \ DatagramConnection 的 send() 方法。接收数据报也几乎同样简单。您只需调用 receive() 方法，该方法会阻塞，直到接收到一个数据报。\n\
  \n本质上，Datagram 是作为数据报有效载荷的字节数组的包装器。您可以通过调用 getData() 获取对此字节数组的引用。但请记住，Datagram 的数据可能只是数组中数据的一个子集。您可以通过调用\
  \ getOffset() 和 getLength() 来查找实际数据的数组偏移量和长度。\n\n有趣的是，Datagram 是 DataInput 和 DataOutput\
  \ 接口的扩展，因此可以像读取流一样在 Datagram 中读写数据。\n\n在 MIDP 2.0 中，数据报连接由 UDPDatagramConnection\
  \ 接口表示，该接口是 DatagramConnection 接口的扩展。UDPDatagramConnection 增加了两个新方法：getLocalAddress()\
  \ 和 getLocalPort()。您可以使用这些方法来查找使用该连接发送的数据报的源点。\n\n## 其他连接类型\n\n尽管 MIDP 2.0 规范仅要求支持\
  \ HTTP 和 HTTPS 连接，但它建议实现支持套接字、服务器套接字和安全套接字连接。API 为这些连接提供了相应的接口。设备也可以选择通过通用连接框架实现对串行端口的访问。表\
  \ 9-1 详细列出了其他连接类型、它们支持的连接接口以及示例连接字符串。有关更详细的信息，请参阅相应接口的 API 文档。\n\n表 9-1：可选连接类型\n\
  \n| **类型** | **接口** | **示例** |\n| --- | --- | --- |\n| 套接字 | SocketConnection |\
  \ socket://jonathanknudsen.com:79 |\n| 服务器套接字 | ServerSocketConnection | socket://:129\
  \ |\n| TLS 或 SSL 套接字 | SecureConnection | ssl://jonathanknudsen.com:79 |\n| 串行端口\
  \ | CommConnection | comm:com0;baudrate=19200 |\n\n\n\n## 响应传入连接\n\n你可能习惯于将手机视为客户端设备，但它们也可以成为功能完备的网络节点，具备接收传入网络连接的能力。尽管\
  \ `ServerSocketConnection` 提供了监听传入套接字连接的能力，但它只能在 MIDlet 实际运行时保持活动状态。\n\n一个典型的服务器循环，在\
  \ 80 端口上监听传入套接字连接，大致如下所示：\n\n```\nServerSocketConnection ssc;\nssc = (ServerSocketConnection)Connector.open(\"\
  socket://:80\");\nboolean trucking = true;\nwhile (trucking) {\n  SocketConnection\
  \ sc = (SocketConnection)ssc.acceptAndOpen();\n  // 处理客户端连接 sc。\n}\n```\n\nMIDP\
  \ 2.0 更进一步，允许 MIDlet 在响应传入网络连接时启动。这种技术的名称是*推送*。理论上，你可以创建一个 Web 服务器 MIDlet，尽管在实践中，手机可能并不是运行\
  \ Web 服务器的理想平台。一个更实际的例子是 SMS MIDlet，即使用 JSR 120（无线消息 API）构建的程序。假设 MIDlet 配置正确，传入的\
  \ SMS 消息将触发 MIDlet 启动以处理该连接。\n\nMIDlet 可以通过两种方式注册推送连接。它可以在运行时使用 `javax.microedition.io.PushRegistry`\
  \ 中的静态方法进行注册，也可以在安装时使用应用程序描述符（JAD 文件）中的特殊条目进行注册。需要记住的重要一点是，推送注册的生命周期超出了你的 MIDlet\
  \ 的生命周期。它是运行在设备上的 MIDlet 管理软件的一部分。当 MIDlet 注册推送通知时，设备软件有义务监听传入的网络连接，并在建立相应连接时启动你的\
  \ MIDlet。\n\n在你的 MIDlet 内部，你无需做任何特殊处理来捕获传入连接。你只需使用适当的网络监听字符串调用 `Connector.open()`\
  \ 即可。\n\n例如，假设你在 MIDlet 中创建了一个 Web 服务器，并将其命名为 `PatchyMIDlet`。（本书的源代码可从 [`www.apress.com/`](http://www.apress.com/)\
  \ 获取，其中包含 `PatchyMIDlet`；它会发送一条随机选择的文本消息来响应传入请求。）此 MIDlet 响应 80 端口（默认 HTTP 端口）上的传入套接字连接。如果你想在运行时注册该\
  \ MIDlet，可以在代码中的某处执行以下操作：\n\n```\nPushRegistry.registerConnection(\"socket://:80\"\
  , PatchyMIDlet, \"*\");\n```\n\n前两个参数非常明确——任何在 80 端口上的传入套接字连接都应启动 `PatchyMIDlet`。第三个参数是一个过滤器，将应用于传入连接。在此例中，我们使用\
  \ `\"*\"` 通配符接受所有传入连接。其他可能性包括将传入连接限制为单个 IP 地址或一个地址范围。\n\n请记住，对 `registerConnection()`\
  \ 的调用结果会持续存在，超过 MIDlet 的生命周期。即使 MIDlet 已被销毁，设备上的 MIDlet 管理软件仍在监视 80 端口上的传入套接字连接。如果收到连接，`PatchyMIDlet`\
  \ 将被启动。推送注册实际上并不对传入连接做任何处理；它只是检测到连接并启动一个已注册的 MIDlet 来响应。接受传入连接是 MIDlet 的责任。为了查明\
  \ MIDlet 是由推送注册启动的还是由用户启动的，MIDlet 可以调用 `PushRegistry` 的 `listConnections()` 方法，并为\
  \ `available` 参数传递 `true`。该方法将返回一个包含有可用输入的连接列表。如果此列表为空，则 MIDlet 必须是由用户启动的，而不是由传入连接启动的。\n\
  \n相比于 MIDlet 在运行时注册推送连接，更常见的情况是，推送注册包含在包含 `PatchyMIDlet` 的 MIDlet 套件的应用程序描述中。因此，推送注册将在安装时执行，这样用户就永远不需要手动运行\
  \ MIDlet。在这种情况下，MIDlet 描述符将包含如下一行：\n\n```\nMIDlet-Push-1: socket://:80, PatchyMIDlet,\
  \ *\n```\n\n参数完全相同。推送注册在 MIDlet 套件安装时进行。如果 MIDlet 无法注册（例如，可能已有其他应用程序在监听 80 端口上的传入套接字连接），则\
  \ MIDlet 套件将不会被安装。多个推送注册在描述符中使用递增的数字列出：`MIDlet-Push-1`、`MIDlet-Push-2`，依此类推。\n\n\
  J2ME 无线工具包（2.0 版）允许你轻松注册和测试推送连接。只需点击 **设置...** 按钮，然后选择 **推送注册** 选项卡。如果你下载了本书的源代码，你会看到\
  \ `PatchyMIDlet` 的一个条目。图 9-5 显示了此条目。\n\n![点击展开](img/fig178_01_0.jpg)\n图 9-5：*PatchyMIDlet*\
  \ 的推送注册条目\n\n要测试推送通知，你需要打包应用程序，然后将其部署到模拟器上。首先选择 **项目** Ø **打包** Ø **创建包** 将项目打包成\
  \ MIDlet 套件 JAR。然后从 KToolbar 菜单中选择 **项目** Ø **通过 OTA 运行**。你会看到模拟器弹出，显示其应用程序管理软件\
  \ (AMS)。选择 **安装应用程序**，然后接受提供的 URL。KToolbar 包含一个小型 OTA 服务器；当你选择 **通过 OTA 运行** 时，URL\
  \ 会自动预加载。你会看到一系列关于安装应用程序的其他提示；对所有提示都选择“是”。最终安装成功，你会在模拟器的菜单中看到 `wj2` MIDlet 套件。现在模拟器正在运行，监听传入连接，即使没有\
  \ MIDlet 在运行。\n\n现在，通过将浏览器指向 `http://localhost/` 来测试 `PatchyMIDlet`。`PatchyMIDlet`\
  \ 将被启动，并向浏览器发送响应。（模拟器会询问是否允许将数据发送回网络；你需要选择“是”。）图 9-6 显示了运行 `PatchyMIDlet` 的模拟器以及显示其输出的浏览器。\n\
  \n![点击展开](img/fig179_01_0.jpg)\n图 9-6：*PatchyMIDlet*，一个小型 Web 服务器\n\n**通过 OTA 运行**\
  \ 是测试 MIDlet 安装行为（而非运行时行为）的绝佳工具。请记住，你需要先打包 MIDlet，因为工具包的小型 OTA 服务器会分发项目 *bin* 目录中的\
  \ MIDlet 套件 JAR 文件。\n\n|  | 注意 | **通过 OTA 运行** 功能在 J2ME 无线工具包 2.0 beta 1 中不可用。该功能是在\
  \ 2.0 beta 2 版本中添加的。 |\n\n`PushRegistry` 包含其他几个与网络注册相关的静态方法。`getMIDlet()` 和 `getFilter()`\
  \ 方法返回给定网络连接字符串的 MIDlet 名称和过滤器。`listConnections()` 方法返回一个字符串数组，其中包含所有已注册的网络连接字符串。最后，要移除连接与\
  \ MIDlet 的映射，请使用 `unregisterConnection()`。\n\n\n\n## 网络连接权限\n\nMIDP 2.0 包含一个安全框架，旨在防止\
  \ MIDlet 通过未经授权的网络连接来增加你的电话费。正如我在第 3 章中讨论的，MIDP 2.0 中的网络访问受到权限和保护域的管控。以下是 MIDP 2.0\
  \ 定义的权限名称：\n\n*   javax.microedition.io.Connector.http\n\n*   javax.microedition.io.Connector.https\n\
  \n*   javax.microedition.io.Connector.datagram\n\n*   javax.microedition.io.Connector.datagramreceiver\n\
  \n*   javax.microedition.io.Connector.socket\n\n*   javax.microedition.io.Connector.serversocket\n\
  \n*   javax.microedition.io.Connector.ssl\n\n*   javax.microedition.io.Connector.comm\n\
  \n*   javax.microedition.io.PushRegistry\n\n这些权限的名称与其所保护的 API 相对应。除一个例外，所有这些权限都保护连接类型，这些连接类型通过\
  \ `javax.microedition.io.Connector` 类进行访问，因此这些权限名称带有该前缀。最后一个权限指的是推送注册表，其名称与 `PushRegistry`\
  \ 类相同。\n\n当你在工具包中运行 MIDlet 套件时，它默认在不受信任的域中运行。在不受信任的域中，如果用户授予权限，则允许 HTTP 和 HTTPS\
  \ 连接。当你运行一个尝试进行网络连接的 MIDlet 时，可以看到这一点。图 9-7 展示了模拟器如何请求用户许可，并允许用户在当前会话的剩余时间内保持该决定。\n\
  \n![](img/fig181_01.jpg)\n图 9-7：模拟器请求用户对网络连接的许可。\n\n你可以通过使用 `MIDlet-Permissions`\
  \ 和 `MIDlet-Permissions-Opt` 描述符属性来指明你的 MIDlet 套件所使用必要和可选的权限。（在 J2ME 无线工具包中，你可以通过选择**设置…**，然后点击**权限**选项卡来在描述符中设置权限。）\n\
  \n## 总结\n\nMIDP 平台上的网络功能基于一个通用的连接框架。MIDP 1.0 规范强制要求的唯一协议是 HTTP。你只需几行代码即可执行 GET、HEAD\
  \ 或 POST 请求。HTTP 会话处理也是可行的。实现可以自由支持额外的连接类型；数据报、套接字、服务器套接字和串行端口通信都是可能的选择。MIDP 2.0\
  \ 除了要求支持 HTTP 外，还要求支持 HTTPS，并正式定义了用于处理额外连接类型的连接字符串和 API。MIDP 2.0 的安全架构保护用户免受未经授权的网络使用。\n\
  \n"
- "# 第 10 章：编程自定义用户界面\n\n第 5 章、第 6 章和第 7 章专门讨论了 MIDP 的通用用户界面 API。尽管这些 API 设计巧妙，但它们并不适合游戏开发和其他专用用户界面。游戏编程比其他应用程序更“贴近硬件”。MIDP\
  \ 提供了一个类 `javax.microedition.lcdui.Canvas`，它提供了对设备屏幕和输入功能的底层访问。你可以精确地知道用户按下了哪些键，并在屏幕上绘制任何你想要的内容。\n\
  \nMIDP 2.0 的另一个增强是游戏 API，它包含在 `javax.microedition.lcdui.game` 包中。它包括对 `Canvas` 的改进以及用于基于层的图形和精灵动画的类。游戏\
  \ API 将在第 11 章中全面讨论。在本章中，你将学习 `Canvas` 的基础知识以及使用 `Graphics` 类进行绘图。\n\n## Canvas\
  \ 类\n\n`Canvas` 是 MIDP 自定义用户界面 API 的核心。要使用它，你必须创建一个 `Canvas` 的子类。这与 `Screen` 的子类不同，后者是“开箱即用”的。\n\
  \n然而，除此之外，`Canvas` 与 `Displayable` 的其他子类配合得非常好。一个 MIDlet 可以混合使用常规屏幕和 `Canvas`。例如，在游戏中，高分屏幕可能是一个\
  \ `Form`，而游戏本身则在 `Canvas` 上进行。\n\n`Canvas` 包含事件处理方法，每当发生重要事件时，MIDP 实现都会调用这些方法。当用户按下某个键，或者需要绘制屏幕时，`Canvas`\
  \ 的某个方法将被调用。这些方法中的大多数在 `Canvas` 中都有空实现。要响应事件，你需要重写相应的方法并提供实现。\n\n此规则的一个例外是 `paint()`\
  \ 方法，它被声明为抽象方法，因此必须在子类中定义。\n\n## Canvas 信息\n\n如果你想绘制自己的用户界面，你需要一些关于 `Canvas` 的基本信息。你可以通过调用\
  \ `getWidth()` 和 `getHeight()` 来获取 `Canvas` 的大小。正如我们稍后将讨论的，你还可以通过调用 `Display` 中的方法来了解设备的颜色能力。\n\
  \nMIDP 2.0 提供了全屏模式。某些 `Canvas` 实现不会占用所有可用的屏幕空间，而是会为设备状态信息或其他目的保留屏幕区域。如果设备支持 `Canvas`\
  \ 的备用全屏模式，你可以通过调用 `setFullScreenMode(true)` 来使用它。开启或关闭全屏模式可能会导致调用 `Canvas` 从 `Displayable`\
  \ 继承的 `sizeChanged()` 方法。\n\n`Canvas` 还具有事件处理方法，当你的 `Canvas` 显示和隐藏时，MIDP 实现会调用这些方法。每次你的\
  \ `Canvas` 显示时，都会调用 `showNotify()` 方法。如果显示了另一个 `Displayable`，或者应用程序管理器决定运行另一个应用程序，则会调用\
  \ `hideNotify()`。\n\n\n\n## 绘制与重绘\n\n当需要显示 Canvas 的内容时，MIDP 实现会调用 Canvas 的 `paint()`\
  \ 方法。任何实现过自定义 Swing 或 AWT 组件的人，都应该对这个 `paint()` 方法感到熟悉。\n\nMIDP 实现会向你的 `paint()`\
  \ 方法传递一个 `Graphics` 对象。`Graphics` 提供了在 Canvas 上绘制形状、文本和图像的方法。因此，一个典型的 Canvas 实现大致如下：\n\
  \n```\nimport javax.microedition.lcdui.*;\n\npublic class JonathanCanvas\n    extends\
  \ Canvas {\n  public void paint(Graphics g) {\n    // 使用 g 绘制内容\n  }\n} \n```\n\n\
  如果你想告诉 Canvas 自行绘制，该怎么办？你不能直接调用 `paint()`，因为你没有合适的 `Graphics` 对象可以传递给 `paint()`。相反，你需要告诉\
  \ MIDP 实现是时候绘制 Canvas 了。实现这一操作的方法是调用 `repaint()`。该方法的第一个版本只是简单地告诉 Canvas 绘制所有内容。\n\
  \n```\npublic void repaint()\npublic void repaint(int x, int y, int width, int height)\n\
  ```\n\n第二个版本的意思是：“我只希望你绘制屏幕上的这个矩形区域。” 如果你要进行的绘制非常复杂，可以通过只绘制 Canvas 中发生变化的部分来节省时间。这是通过一种称为**裁剪**的技术实现的。后面的章节会更详细地讨论裁剪。\n\
  \n`repaint()` 究竟是如何工作的？当你调用 `repaint()` 时，`paint()` 并不会立即被调用。调用 `repaint()` 只是向\
  \ MIDP 实现发出信号，表明你想要绘制屏幕。稍后，实现会*处理*这个重绘请求，最终导致实际调用 Canvas 的 `paint()` 方法。MIDP 实现甚至可能合并多个重绘请求，特别是当它们的重绘区域重叠时。\n\
  \n|  | 提示 | 当你调用 *repaint()* 时，*Canvas* 不会自动清除自身。如果你想改变屏幕上的内容，而不是在其上添加内容，你应该在 *paint()*\
  \ 方法中清除屏幕。你将在本章后面的 *FontCanvas* 示例中看到如何做到这一点。 |\n\n应用程序可以通过调用 Canvas 对象上的 `serviceRepaints()`\
  \ 来强制实现处理所有重绘请求。此方法在所有待处理的重绘请求被处理完毕之前不会返回。如果你打算调用 `serviceRepaints()`，应确保你没有在 `paint()`\
  \ 方法中试图获取那些在 `serviceRepaints()` 返回前不会释放的对象锁。通常，你不需要调用 `serviceRepaints()`；你可以改用\
  \ `Display` 的 `callSerially()` 方法。（关于 `callSerially()` 的讨论，请参见本章的“多线程与动画”部分。）\n\n\
  ## 绘制形状、文本和图像\n\n`Graphics` 类包含在 Canvas 上绘制形状、文本和图像的方法。它还维护一些状态，比如当前的画笔颜色和线条样式。MIDP\
  \ 的 `Graphics` 类类似于 J2SE 中的 `Graphics` 和 `Graphics2D` 类，但规模小得多。\n\n### 坐标空间\n\n\
  Canvas 上的所有绘制都发生在一个基于设备像素的坐标空间中。默认情况下，该坐标空间的原点位于 Canvas 的左上角。X 坐标向右增加，而 Y 坐标向下增加，如图\
  \ 10-1 所示。\n\n![](img/fig186_01.jpg)\n图 10-1：Canvas 坐标轴\n\n你可以通过调用 `Graphics` 类的\
  \ `translate()` 方法来调整此坐标空间的原点。这会将原点设置为当前坐标系中的给定坐标。要找出平移后的原点相对于默认原点的位置，可以调用 `getTranslateX()`\
  \ 和 `getTranslateY()`。\n\n### 绘制和填充形状\n\n`Graphics` 包含一组绘制和填充简单形状的方法。这些方法详列于表 10-1\
  \ 中。MIDP 2.0 包含了一个新方法 `fillTriangle()`。\n\n表 10-1：使用 *Graphics* 绘制和填充形状\n\n| **形状轮廓**\
  \ | **填充形状** |\n| --- | --- |\n| drawLine(int x1, int y1, int x2, int y2) | - |\n\
  | - | fillTriangle(int x1, int y1, int x2, int y2, int x3, int y3) |\n| drawRect(int\
  \ x, int y, int width, int height) | fillRect(int x, int y, int width, int height)\
  \ |\n| drawRoundRect(int x, int y, int width, int height, int arcWidth, int arcHeight)\
  \ | fillRoundRect(int x, int y, int width, int height, int arcWidth, int arcHeight)\
  \ |\n| drawArc(int x, int y, int width, int height, int startAngle, int arcAngle)\
  \ | fillArc(int x, int y, int width, int height, int startAngle, int arcAngle) |\n\
  \n这些方法基本上执行你所期望的操作。以下示例演示了使用 `Graphics` 进行的一些简单绘制。它由两部分组成。首先，`PacerCanvas` 演示了一些简单的绘制和填充：\n\
  \n```\nimport javax.microedition.lcdui.*;\n\npublic class PacerCanvas\n    extends\
  \ Canvas {\n  public void paint(Graphics g) {\n    int w = getWidth();\n    int\
  \ h = getHeight();\n\n    g.setColor(0xffffff);\n    g.fillRect(0, 0, w, h);\n \
  \   g.setColor(0x000000);\n\n    for (int x = 0; x < w; x += 10)\n      g.drawLine(0,\
  \ w - x, x, 0);\n\n    int z = 50;\n    g.drawRect(z, z, 20, 20);\n    z += 20;\n\
  \    g.fillRoundRect(z, z, 20, 20, 5, 5);\n    z += 20;\n    g.drawArc(z, z, 20,\
  \ 20, 0, 360);\n  }\n} \n```\n\n下一个类是 `Pacer`，一个使用 `PacerCanvas` 的 MIDlet。\n\n```\n\
  import javax.microedition.lcdui.*;\nimport javax.microedition.midlet.*;\n\npublic\
  \ class Pacer\n    extends MIDlet{\n  public void startApp() {\n    Displayable\
  \ d = new PacerCanvas();\n\n    d.addCommand(new Command(\"Exit\", Command.EXIT,\
  \ 0));\n    d.setCommandListener(new CommandListener() {\n      public void commandAction(Command\
  \ c, Displayable s) {\n        notifyDestroyed();\n      }\n    } );\n\n    Display.getDisplay(this).setCurrent(d);\n\
  \  }\n\n  public void pauseApp() { }\n\n  public void destroyApp(boolean unconditional)\
  \ { }\n}\n```\n\n当你在 Sun 的 J2ME Wireless Toolkit 模拟器中运行 `Pacer` 时，它看起来像图 10-2。\n\
  \n![](img/fig188_01.jpg)\n图 10-2：使用 *Graphics* 进行绘制\n\n\n\n### 使用颜色\n\nGraphics\
  \ 类维护一个当前绘图颜色，用于绘制形状轮廓、填充形状以及绘制文本。颜色由红、绿、蓝三色组合表示，每种颜色分量占八位。你可以使用以下方法设置当前绘图颜色：\n\n\
  ```\npublic void setColor(int RGB)\n```\n\n该方法期望将红、绿、蓝值打包成一个整数，如图 10-3 所示。\n\n![点击展开](img/fig189_01_0.jpg)\n\
  图 10-3：将颜色打包成整数\n\n另一种便捷方法接受红、绿、蓝值作为 0 到 255（含）范围内的整数：\n\n```\npublic void setColor(int\
  \ red, int green, int blue)\n```\n\n你可以使用 `getColor()` 获取当前绘图颜色（以打包整数形式）。或者，也可以分别使用\
  \ `getRedComponent()`、`getGreenComponent()` 和 `getBlueComponent()` 获取各个分量。\n\n当然，不同设备对颜色的支持程度各不相同，从黑白（俗称“单色”）到完整的\
  \ 24 位色。正如我在第 5 章中提到的，Display 中的 `isColor()` 和 `numColors()` 方法会返回关于设备能力的有用信息。\n\
  \n对于灰度设备，Graphics 提供了便捷方法 `setGrayScale()`。你传入一个 0（黑色）到 255（白色）之间的数字。可以通过调用 `getGrayScale()`\
  \ 获取当前灰度值。如果此 Graphics 对象的当前颜色不是灰度色（即当前颜色的红、绿、蓝值不相同），则此方法会返回其对当前颜色亮度的最佳估算值。\n\n\
  MIDP 2.0 为 Graphics 类新增了 `getDisplayColor()` 方法。这是一个便捷方法，可以在运行时准确告知你请求的颜色在设备上会如何显示。你传入一个颜色\
  \ int 值，它会返回设备上实际显示的颜色 int 值。例如，在 J2ME Wireless Toolkit 的 **DefaultGrayPhone** 模拟器上，纯绿色（0x00ff00）会映射为灰度值\
  \ 0x959595。\n\n### 线条样式\n\nGraphics 还维护一个当前线条样式，称为*描边样式*，用于绘制形状轮廓和线条。线条样式有两种选择，由\
  \ Graphics 类中的常量表示：\n\n*   SOLID 是默认样式。\n*   也可以绘制 DOTTED（虚线）线条。\n\n虚线具体如何实现由具体实现决定，因此在一台设备上的虚线在另一台设备上可能显示为短划线。你可以使用\
  \ `setStrokeStyle()` 和 `getStrokeStyle()` 设置或获取当前样式。例如，以下代码绘制一个实线轮廓（默认）的正方形和另一个虚线轮廓的正方形：\n\
  \n```\npublic void paint(Graphics g) {\n  g.drawRect(20, 10, 35, 35);\n  g.setStrokeStyle(Graphics.DOTTED);\n\
  \  g.drawRect(20, 60, 35, 35);\n}\n```\n\n### 绘制文本\n\nGraphics 类使得在屏幕任意位置绘制文本变得简单。文本绘制基于锚点的概念。锚点精确决定文本的绘制位置。锚点由水平和垂直分量描述。Graphics\
  \ 类将水平和垂直锚点定义为常量。图 10-4 展示了文本字符串的各种锚点。每个锚点由水平和垂直锚点的组合来描述。\n\n![点击展开](img/fig191_01_0.jpg)\n\
  图 10-4：文本锚点\n\n要绘制文本，只需指定文本本身以及锚点的位置和类型。例如，你可以通过使用位于 (0, 0) 的 TOP | LEFT 锚点，将文本放置在屏幕左上角。\n\
  \n文本以 String 或 char 数组形式指定，这意味着你可以绘制多种语言的文本，前提是你使用的字体包含相应的字形。\n\nGraphics 提供了四种不同的文本绘制方法。你可以根据可用情况绘制字符或字符串：\n\
  \n```\npublic void drawChar(char character, int x, int y, int anchor)\npublic void\
  \ drawChars(char[] data, int offset, int length,\n    int x, int y, int anchor)\n\
  public void drawString(String str, int x, int y, int anchor)\npublic void drawSubstring(String\
  \ str, int offset, int len,\n    int x, int y, int anchor)\n```\n\n以下示例展示了如何在 Canvas\
  \ 的不同位置放置文本：\n\n```\nimport javax.microedition.lcdui.*;\n\npublic class TextCanvas\n\
  \    extends Canvas {\n  public void paint(Graphics g) {\n    int w = getWidth();\n\
  \    int h = getHeight();\n\n    g.setColor(0xffffff);\n    g.fillRect(0, 0, w,\
  \ h);\n    g.setColor(0x000000);\n    // 首先标记四个角。\n    g.drawString(\"corner\",\
  \ 0, 0,\n        Graphics.TOP | Graphics.LEFT);\n    g.drawString(\"corner\", w,\
  \ 0,\n        Graphics.TOP | Graphics.RIGHT);\n    g.drawString(\"corner\", 0, h,\n\
  \        Graphics.BOTTOM | Graphics.LEFT);\n    g.drawString(\"corner\", w, h,\n\
  \        Graphics.BOTTOM | Graphics.RIGHT);\n\n// 现在在中间（大致位置）放置一些内容。\n    g.drawString(\"\
  Sin Wagon\", w / 2, h / 2,\n        Graphics.BASELINE | Graphics.HCENTER);\n  }\n\
  }\n```\n\n要查看此 Canvas，你需要创建一个显示它的 MIDlet。我建议使用 Pacer；只需编辑源文件，使其实例化 TextCanvas 而不是\
  \ PacerCanvas。最终结果如图 10-5 所示。\n\n![](img/fig192_01.jpg)\n图 10-5：*TextCanvas* 的实际效果\n\
  \n请注意，Canvas 在屏幕底部占用了一些空间。这是为了给 Commands 留出空间。与其他任何 Displayable 一样，Canvas 可以显示命令并拥有命令监听器。\n\
  \n\n\n### 选择字体\n\nMIDP 字体由*字体外观*、*样式*和*大小*表示。你不会有太多字体选择，但仍有几种可选。有三种外观可用，如图 10-6\
  \ 所示。这些外观由 Font 类中的常量表示：`FACE_SYSTEM`、`FACE_MONOSPACE` 和 `FACE_PROPORTIONAL`。\n\n\
  ![](img/fig193_01.jpg)\n图 10-6：三种斜体字体外观\n\n选定字体外观后，你还可以指定样式和大小。样式与你预期的一致，由 Font\
  \ 类中的常量表示：`STYLE_PLAIN`、`STYLE_BOLD`、`STYLE_ITALIC` 和 `STYLE_UNDERLINE`。你可以通过按位或运算组合样式，例如粗体和斜体。大小则只有\
  \ `SIZE_SMALL`、`SIZE_MEDIUM` 或 `SIZE_LARGE`。\n\n你可以通过以下调用创建一个小的、斜体的、比例字体：\n\n```\n\
  Font f = Font.getFont(\n    Font.FACE_PROPORTIONAL,\n    Font.STYLE_ITALIC,\n  \
  \  Font.SIZE_SMALL);\n```\n\n要告诉 Graphics 对象为后续文本使用新字体，请调用 `setFont()`。你可以通过调用 `getFont()`\
  \ 获取当前字体的引用。你还可以使用 `getFace()`、`getStyle()` 和 `getSize()` 方法了解字体的信息。为方便起见，Font 还包含了\
  \ `isPlain()`、`isBold()`、`isItalic()` 和 `isUnderlined()` 方法。\n\nMIDP 实现有一个默认字体，你可以通过\
  \ Font 的静态方法 `getDefaultFont()` 获取。\n\n以下 Canvas 演示了字体的创建和使用。\n\n```\nimport javax.microedition.lcdui.*;\n\
  \npublic class FontCanvas\n    extends Canvas {\n  private Font mSystemFont, mMonospaceFont,\
  \ mProportionalFont;\n\npublic FontCanvas() { this(Font.STYLE_PLAIN); }\n\npublic\
  \ FontCanvas(int style) { setStyle(style); }\n  public void setStyle(int style)\
  \ {\n    mSystemFont = Font.getFont(Font.FACE_SYSTEM,\n        style, Font.SIZE_MEDIUM);\n\
  \    mMonospaceFont = Font.getFont(Font.FACE_MONOSPACE,\n        style, Font.SIZE_MEDIUM);\n\
  \    mProportionalFont = Font.getFont(Font.FACE_PROPORTIONAL,\n        style, Font.SIZE_MEDIUM);\n\
  \  }\n\npublic boolean isBold() {\n    return mSystemFont.isBold();\n  }\n  public\
  \ boolean isItalic() {\n    return mSystemFont.isItalic();\n  }\n  public boolean\
  \ isUnderline() {\n    return mSystemFont.isUnderlined();\n  }\n\npublic void paint(Graphics\
  \ g) {\n    int w = getWidth();\n    int h = getHeight();\n\n// 清除 Canvas。\n   \
  \ g.setGrayScale(255);\n    g.fillRect(0, 0, w - 1, h - 1);\n    g.setGrayScale(0);\n\
  \    g.drawRect(0, 0, w - 1, h - 1);\n\nint x = w / 2;\n    int y = 20;\n\ny +=\
  \ showFont(g, \"System\", x, y, mSystemFont);\n    y += showFont(g, \"Monospace\"\
  , x, y, mMonospaceFont);\n    y += showFont(g, \"Proportional\", x, y, mProportionalFont);\n\
  \  }\n\nprivate int showFont(Graphics g, String s, int x, int y, Font f) {\n   \
  \ g.setFont(f);\n    g.drawString(s, x, y, Graphics.TOP | Graphics.HCENTER);\n \
  \   return f.getHeight();\n  }\n} \n```\n\n要查看此 Canvas 的实际效果，你需要一个显示它的 MIDlet。你可以再次修改\
  \ Pacer，或者使用以下代码：\n\n```\nimport javax.microedition.lcdui.*;\nimport javax.microedition.midlet.*;\n\
  \npublic class FontMIDlet\n    extends MIDlet\n   implements CommandListener {\n\
  \  private FontCanvas mFontCanvas;\n  private Command mBoldCommand, mItalicCommand,\
  \ mUnderlineCommand;\n\npublic FontMIDlet() {\n    mFontCanvas = new FontCanvas();\n\
  \nmBoldCommand = new Command(\"粗体\", Command.SCREEN, 0);\n    mItalicCommand = new\
  \ Command(\"斜体\", Command.SCREEN, 0);\n    mUnderlineCommand = new Command(\"下划线\"\
  , Command.SCREEN, 0);\n    Command exitCommand = new Command(\"退出\", Command.EXIT,\
  \ 0);\n\nmFontCanvas.addCommand(mBoldCommand);\n    mFontCanvas.addCommand(mItalicCommand);\n\
  \    mFontCanvas.addCommand(mUnderlineCommand);\n    mFontCanvas.addCommand(exitCommand);\n\
  \    mFontCanvas.setCommandListener(this);\n  }\n\npublic void startApp() {\n  \
  \  Display.getDisplay(this).setCurrent(mFontCanvas);\n  }\n\npublic void pauseApp()\
  \ {}\n\npublic void destroyApp(boolean unconditional) {}\n\npublic void commandAction(Command\
  \ c, Displayable s) {\n    if (c.getCommandType() == Command.EXIT) {\n      notifyDestroyed();\n\
  \      return;\n    }\n    boolean isBold = mFontCanvas.isBold() ^ (c == mBoldCommand);\n\
  \    boolean isItalic = mFontCanvas.isItalic() ^ (c == mItalicCommand);\n    boolean\
  \ isUnderline = mFontCanvas.isUnderline() ^\n        (c == mUnderlineCommand);\n\
  \nint style =\n        (isBold ? Font.STYLE_BOLD : 0) |\n        (isItalic ? Font.STYLE_ITALIC\
  \ : 0) |\n        (isUnderline ? Font.STYLE_UNDERLINED : 0);\n\nmFontCanvas.setStyle(style);\n\
  \    mFontCanvas.repaint();\n  }\n}\n```\n\n### 测量文本\n\nFont 类可以告诉你关于文本尺寸的有用信息。如果你仔细阅读了前面的示例，你会注意到我们已经使用了其中一个方法\
  \ `getHeight()`。此方法返回一整行文本的高度，可用于定位多行文本。\n\n如果你确实需要知道基线的位置，请调用 `getBaselinePosition()`。此方法返回从文本行顶部到基线的距离。但是，鉴于\
  \ Graphics 中锚点提供的灵活性，你可能永远不需要自己查找基线。\n\nFont 中用于测量文本的其余方法测量各种文本片段的宽度。这些方法的名称和参数与\
  \ Graphics 中的文本绘制方法相同：\n\n```\npublic int charWidth(char ch)\npublic int charsWidth(char\
  \ ch, int offset, int length)\npublic int stringWidth(String str)\npublic int substringWidth(String\
  \ str, int offset, int len)\n```\n\n例如，你可以在字符串周围绘制一个框：\n\n```\nimport javax.microedition.lcdui.*;\n\
  \npublic class BoxTextCanvas\n    extends Canvas {\n  private Font mFont;\npublic\
  \ BoxTextCanvas() {\n    mFont = Font.getFont(Font.FACE_PROPORTIONAL,\n        Font.STYLE_PLAIN,\
  \ Font.SIZE_LARGE);\n  }\n\n  public void paint(Graphics g) {\n    int w = getWidth();\n\
  \    int h = getHeight();\n\n    g.setColor(0xffffff);\n    g.fillRect(0, 0, w,\
  \ h);\n    g.setColor(0x000000);\n\n    String s = \"dolce\";\n    int stringWidth\
  \ = mFont.stringWidth(s);\n    int stringHeight = mFont.getHeight();\n    int x\
  \ = (w - stringWidth) / 2;\n    int y = h / 2;\n\n    g.setFont(mFont);\n    g.drawString(s,\
  \ x, y, Graphics.TOP | Graphics.LEFT);\n    g.drawRect(x, y, stringWidth, stringHeight);\n\
  \  }\n}\n```\n\n### 绘制图像\n\nGraphics 类包含一个用于绘制图像的方法：\n\n```\npublic void drawImage(Image\
  \ img, int x, int y, int anchor)\n```\n\n`drawImage()` 方法使用锚点，就像文本绘制方法中的锚点一样。可用的锚点略有不同。`BASELINE`\
  \ 不再是图像垂直锚点的选项，因为基线的概念特定于文本。相反，`VCENTER` 是垂直锚点的一个额外选项。图 10-7 显示了锚点的可用组合。\n\n![点击展开](img/fig198_01_0.jpg)\n\
  图 10-7：图像锚点\n\nMIDP 2.0 特别要求支持渲染带有透明度的图像。\n\n\n\n### 高级图像渲染\n\n在 MIDP 2.0 中，`Graphics`\
  \ 类还包含一个 `drawRegion()` 方法，用于渲染图像的某个区域，并可能同时对其进行变换。该方法如下所示：\n\n```\npublic void\
  \ drawRegion(Image src,\n    int x_src, int y_src, int width, int height,\n    int\
  \ transform, int x_dest, int y_dest, int anchor)\n```\n\n参数 `x_src`、`y_src`、`width`\
  \ 和 `height` 描述了图像中一个矩形区域，该区域将被渲染到 `Graphics` 的绘图表面上。该区域根据锚点绘制在 `x_dest` 和 `y_dest`\
  \ 位置，这与 `drawImage()` 方法中的处理方式相同。\n\n`transform` 参数开启了一个全新的可能性世界。它可以是 `Sprite` 类中定义的任何变换常量，如下所列。（`Sprite`\
  \ 是 MIDP 2.0 游戏 API 的一部分，将在下一章中介绍。）\n\n*   `TRANS_NONE`\n*   `TRANS_ROT90`\n*  \
  \ `TRANS_ROT180`\n*   `TRANS_ROT270`\n*   `TRANS_MIRROR`\n*   `TRANS_MIRROR_ROT90`\n\
  *   `TRANS_MIRROR_ROT180`\n*   `TRANS_MIRROR_ROT270`\n\n`ROT` 变换将源图像区域旋转 90、180\
  \ 或 270 度。`MIRROR_ROT` 变换则先将该区域沿其垂直中心镜像，然后再旋转镜像后的区域。\n\n`drawRegion()` 方法使得操作和显示打包在单个图像中的动画帧变得非常容易。\n\
  \n### 作为整数数组的图像\n\n你已经了解了如何将单一颜色表示为整数。以此类推，图像可以表示为整数数组，其中数组中的每个整数包含图像中单个像素的颜色。\n\
  \nMIDP 2.0 支持通过以下方法将整数数组渲染为图像：\n\n```\npublic void drawRGB(int[] rgbData, int offset,\
  \ int scanlength,\n    int x, int y, int width, int height,\n    boolean processAlpha)\
  \ \n```\n\n图像数据包含在 `rgbData` 数组中，从 `offset` 位置开始。连续的行数据以 `scanlength` 的倍数作为偏移量进行存储。图像将渲染在\
  \ `x` 和 `y` 位置，其大小由 `width` 和 `height` 定义。\n\n`width` 和 `scanlength` 之间的关系起初可能有点令人困惑。下面的示例应该能澄清这一点。\n\
  \n考虑以下代码：\n\n```\n int[] rgbData = {\n           0x123456, 0x123456, 0x123456,\n\
  \           0x000000, 0xffffff, 0xffffff, 0x000000, 0x654321, 0x654321,\n      \
  \     0x000000, 0x000000, 0xffffff, 0x000000, 0x654321, 0x654321,\n           0x000000,\
  \ 0xffffff, 0x000000, 0x000000, 0x654321, 0x654321,\n           0x000000, 0xffffff,\
  \ 0xffffff, 0x000000, 0x654321, 0x654321\n         };\n\n         g.drawRGB(rgbData,\
  \ 3, 6, 10, 10, 4, 4, false);\n```\n\n这段代码生成了一个非常小的图像，在图 10-8 中以极大放大倍率显示。通过传递偏移量\
  \ 3，数组的前三个元素被忽略。尽管图像宽度为 4 个像素，但每行数据在整数数组中相隔 6 个位置。该图像将渲染在坐标 (10, 10) 处，大小为 4x4 像素。\n\
  \n![](img/fig200_01.jpg)\n图 10-8：一个非常小的图像\n\n`drawRGB()` 方法的最后一个参数 `processAlpha`\
  \ 指示整数数组是否包含 alpha（不透明度）分量。如果该参数为 `false`，则图像的每个像素都被视为完全不透明。如果 `processAlpha` 为\
  \ `true`，则每个像素的不透明度由整数值的高位字节决定，并且像素的颜色将与绘图表面适当混合。alpha 值为 0 表示完全透明，而 alpha 值为 255\
  \ 表示完全不透明。\n\n### MIDP 2.0 中的位块传输\n\n*位块传输*，即将屏幕的一个区域复制到另一个位置，对于某些类型的游戏来说是一项关键操作。MIDP\
  \ 2.0 的 `Graphics` 类包含一个用于位块传输的方法：\n\n```\npublic void copyArea(int x_src, int y_src,\
  \ int width, int height,\n    int x_dest, int y_dest, int anchor)\n```\n\n这个方法不言自明。它将屏幕的一部分（由\
  \ `x_src`、`y_src`、`width` 和 `height` 描述）复制到由 `x_dest`、`y_dest` 和 `anchor` 描述的目标位置。锚点的工作方式与\
  \ `drawImage()` 方法相同。\n\n此方法仅适用于不直接绘制到屏幕的 `Graphics` 对象。绘制到图像的 `Graphics` 对象可以正常工作，在双缓冲\
  \ `Canvas` 上工作的 `Graphics` 对象也是如此。来自 `GameCanvas` 的 `getGraphics()` 方法的 `Graphics`\
  \ 对象也可以正常工作。相比之下，对于非双缓冲 `Canvas` 的 `Graphics` 对象，如果调用 `copyArea()` 方法，则会抛出 `IllegalStateException`。（有关该技术的更多信息，请参阅即将推出的关于双缓冲的章节。）\n\
  \n### 裁剪\n\n`Graphics` 维护一个矩形的*裁剪形状*。裁剪形状限制了绘图，任何在裁剪形状之外进行的绘图都不会被显示。这有点像通过模板进行绘画，只不过你只能使用矩形模板。如果你正在编写一个游戏，游戏板上有某种边框，你可以将裁剪矩形设置为游戏板的内部区域，这样任何绘图都不会覆盖边框。\n\
  \n你可以通过调用 `getClipX()`、`getClipY()`、`getClipWidth()` 和 `getClipHeight()` 来获取当前的裁剪矩形。\n\
  \n如果你想修改裁剪矩形，有两种方法可以使用。首先，你可以通过调用以下方法直接设置裁剪矩形：\n\n```\npublic void setClip(int x,\
  \ int y, int width, int height);\n```\n\n另一种可能性是用另一个矩形来限制当前的裁剪矩形。以下方法取当前裁剪矩形与提供的矩形的交集，并用它来设置新的裁剪矩形：\n\
  \n```\npublic void clipRect(int x, int y, int width, int height); \n```\n\n## 按键事件\n\
  \n`Canvas` 在比其他 `Displayable` 子类更低的层次上处理事件。虽然你可以添加 `Command` 并响应它们，但 `Canvas` 还包含一组处理与设备单个按键交互的方法。\n\
  \n每当用户按下和释放按键时，会调用以下方法：\n\n```\nprotected void keyPressed(int keyCode)\nprotected\
  \ void keyReleased(int keyCode)\n```\n\n传递给这些方法的键码很可能是 `Graphics` 中定义的常量之一，从 `KEY_NUM0`\
  \ 到 `KEY_NUM9`，包括 `KEY_STAR` 和 `KEY_POUND`。设备可能拥有比这更多的按键，这些按键将作为设备特定的键码返回。假设按键与某个\
  \ Unicode 字符之间存在明显的映射关系，经验法则是按键的代码应等于其 Unicode 字符值。没有 Unicode 映射的按键应使用负值。这意味着，给定一个正键码，你可以通过将\
  \ `int` 类型的键码强制转换为 `char` 来找到对应的 Unicode 字符。\n\n请注意，按键按下和按键释放是独立的事件，这让你在设计用户界面时拥有相当大的灵活性。按下和释放之间的时间可以决定游戏角色跳多高，或者激光爆炸的威力有多大。\n\
  \n根据设备和 MIDP 实现的不同，按住不放的按键可能会产生重复的按键事件。你可以通过调用 `hasRepeatEvents()` 来了解是否支持重复按键。如果支持重复按键事件，则会调用\
  \ `keyRepeated()` 方法来处理这些事件。\n\n最后，你可以通过调用 `getKeyName()` 来查找给定键码的文本描述。\n\n在 MIDP\
  \ 2.0 中，游戏 API 提供了一种机制来绕过按键事件回调方法。你可以使用 `GameCanvas` 中的方法直接轮询设备按键的状态。更多信息，请参阅下一章。\n\
  \n\n\n## 游戏动作\n\n在某些情况下，键码可能很有用，但它们通常与特定设备紧密相关。MIDP 提供了一种名为*游戏动作*的简单抽象，使得将用户按键事件映射为对游戏及其他具有专用用户界面的应用程序有用的事件变得更加容易。\n\
  \n其概念很简单：向 `getGameAction()` 提供一个键码，你将收到一个游戏动作——即以下值之一：`UP`、`DOWN`、`LEFT`、`RIGHT`、`FIRE`、`GAME_A`、`GAME_B`、`GAME_C`\
  \ 或 `GAME_D`。基本上，游戏动作是一种将设备上的物理按键映射到一组视频游戏按钮（例如你在世嘉 Genesis 或任天堂 Game Boy 等游戏平台上可能找到的按钮）的方式。\n\
  \n要理解这如何映射到物理设备，请思考如何将 `UP`、`DOWN`、`LEFT` 和 `RIGHT` 这些游戏动作映射到按键上。在 Sun 的 MIDP 模拟器中，存在与这些游戏动作有明显对应关系的导航键。然而，考虑一个更简单的手机，例如只有数字键盘的手机。在这种情况下，你可能希望将\
  \ `UP` 映射到 2 键，`DOWN` 映射到 8 键，`LEFT` 映射到 4 键，`RIGHT` 映射到 6 键。\n\n使用游戏动作可以省去你自己做这些决定的麻烦；MIDP\
  \ 实现会为设备提供一个合理的映射。要查找某个键码对应的游戏动作，请将该键码传递给 `getGameAction()`。你也可以通过调用 `getKeyCode()`\
  \ 来查找某个游戏动作对应的键码。\n\n以下示例在 `keyPressed()` 方法中监听按键事件。它将键码转换为游戏动作，并在屏幕上显示该游戏动作。\n\n\
  ```\nimport javax.microedition.lcdui.*;\n\npublic class KeyCanvas\n    extends Canvas\
  \ {\n  private Font mFont;\n  private String mMessage = \"[Press keys]\";\n\n  public\
  \ KeyCanvas() {\n    mFont = Font.getFont(Font.FACE_PROPORTIONAL,\n        Font.STYLE_PLAIN,\
  \ Font.SIZE_MEDIUM);\n  }\n\n  public void paint(Graphics g) {\n    int w = getWidth();\n\
  \    int h = getHeight();\n\n    // 清除画布。\n    g.setGrayScale(255);\n    g.fillRect(0,\
  \ 0, w - 1, h - 1);\n    g.setGrayScale(0);\n    g.drawRect(0, 0, w - 1, h - 1);\n\
  \n    g.setFont(mFont);\n    int x = w / 2;\n    int y = h / 2;\n\n    g.drawString(mMessage,\
  \ x, y, Graphics.BASELINE | Graphics.HCENTER);\n  }\n\n  protected void keyPressed(int\
  \ keyCode) {\n    int gameAction = getGameAction(keyCode);\n    switch(gameAction)\
  \ {\n      case UP:     mMessage = \"UP\";             break;\n      case DOWN:\
  \   mMessage = \"DOWN\";           break;\n      case LEFT:   mMessage = \"LEFT\"\
  ;           break;\n      case RIGHT:  mMessage = \"RIGHT\";          break;\n \
  \     case FIRE:   mMessage = \"FIRE\";           break;\n      case GAME_A: mMessage\
  \ = \"GAME_A\";         break;\n      case GAME_B: mMessage = \"GAME_B\";      \
  \   break;\n      case GAME_C: mMessage = \"GAME_C\";         break;\n      case\
  \ GAME_D: mMessage = \"GAME_D\";         break;\n      default:     mMessage = \"\
  \";               break;\n    }\n    repaint();\n  }\n}\n```\n\n要运行此示例，你需要一个相应的\
  \ MIDlet 来显示 `KeyCanvas`。至此，我想你可以自己完成这个操作。\n\n## 指针事件\n\n某些设备，特别是 PDA，可能支持指针。例如，流行的\
  \ Palm 平台就是基于触控笔和触摸屏的使用。你可以在运行时通过调用 `hasPointerEvents()` 和 `hasPointerMotionEvents()`\
  \ 来了解你的设备是否支持指针事件。如果设备支持指针事件，当指针被按下和释放时，将调用以下方法：\n\n```\nprotected void pointerPressed(int\
  \ x, int y)\nprotected void pointerReleased(int x, int y) \n```\n\n如果设备支持指针移动事件，当用户在屏幕上拖动触控笔时，将调用以下方法：\n\
  \n```\nprotected void pointerDragged(int x, int y)\n```\n\n## 双缓冲\n\n*双缓冲*是一种用于减少绘图和动画闪烁的知名技术。想象一下，你正在实现一个动画，该动画在每一帧都会清除并重绘整个屏幕。如果没有双缓冲，当屏幕被清除和重绘时，动画会严重闪烁。使用双缓冲时，新帧会被绘制到一个离屏图像（缓冲区）中。当离屏绘制完成后，该图像会以一次平滑、快速的操作绘制到屏幕上。你需要为离屏图像付出内存代价，但动画质量的提升是显著的。\n\
  \nMIDP 实现可能默认提供双缓冲。你可以通过调用 `isDoubleBuffered()` 方法来了解某个 `Canvas` 是否使用了双缓冲。\n\n如果实现没有提供双缓冲，你就需要自己实现。幸运的是，这并不太难。过程如下：\n\
  \n1.  通过调用静态方法 `Image.createImage(int width, int height)` 创建一个离屏图像。\n\n2.  通过在 `Image`\
  \ 上调用 `getGraphics()` 方法，获取一个用于*在图像中*绘图的 `Graphics` 对象。\n\n3.  使用该 `Graphics` 对象在离屏图像中绘制内容。\n\
  \n4.  在 `Canvas` 的 `paint()` 方法中，使用 `drawImage()` 将离屏图像放置到 `Canvas` 上。\n\n以下是一个创建简单离屏图像并显示它的\
  \ `Canvas` 子类：\n\n```\nimport javax.microedition.lcdui.*;\n\npublic class OffscreenCanvas\n\
  \    extends Canvas {\n  private Image mImage;\n  public void paint(Graphics g)\
  \ {\n    if (mImage == null)\n      initialize();\n    g.drawImage(mImage, 0, 0,\
  \ Graphics.TOP | Graphics.LEFT);\n  }\n\n  private void initialize() {\n    int\
  \ w = getWidth();\n    int h = getHeight();\n\n    mImage = Image.createImage(w,\
  \ h);\n\n    Graphics g = mImage.getGraphics();\n\n    g.drawRect(0, 0, w - 1, h\
  \ - 1);\n    g.drawLine(0, 0, w - 1, h - 1);\n    g.drawLine(w - 1, 0, 0, h - 1);\n\
  \  }\n}\n```\n\n\n\n## 多线程与动画\n\n与任何图形界面工具包一样，在 MIDP 用户界面类中使用线程需要格外小心。用户界面实现拥有自己的线程，负责处理用户界面方法和屏幕绘制。例如，当用户在设备上按下某个按键时，实现会调用你的\
  \ `Canvas` 子类中的 `keyPressed()` 方法。调用此方法的线程属于 MIDP 实现。因此，需要谨慎处理。在 MIDP 实现中，调用事件方法的同一个线程也会调用\
  \ `paint()`。\n\n|  | 注意 | 所有事件驱动的用户界面工具包都有这种系统拥有的用户界面线程的概念。在 AWT 和 Swing 中，它被称为*事件分发线程*。同样的规则适用：如果你在一个不属于你的线程中运行，不要占用它太久。\
  \ |\n\n由不属于你的线程调用的方法称为*回调*。对于回调的经验法则是，你不应该执行任何耗时很长的操作。由于该线程不属于你，你不应该长时间占用它来执行你的工作。因为这个线程负责操作用户界面，用冗长的计算占用它会让你应用程序看起来像被切除了脑叶。例如，假设你需要从网络检索一些数据。作为对某个命令的响应，你可能会这样做：\n\
  \n```\npublic void commandAction(Command c, Displayable s) {\n  if (c == mNetworkCommand)\
  \ {\n    // 创建一个进度屏幕，progressScreen。\n    mDisplay.setCurrent(progressForm);\n \
  \   // 现在执行网络操作。\n    // 糟糕！用户永远看不到 progressScreen。\n  }\n  // ...\n}\n```\n\n问题在于进度屏幕将不会被显示。`commandAction()`\
  \ 方法是从用户界面线程调用的，也就是负责绘制屏幕的同一个线程。如果你用自己的一些耗时处理占用了这个线程，用户界面线程就永远没有机会更新屏幕。如果你需要执行一些耗时操作，请为其创建一个单独的线程。例如，在第\
  \ 2 章 的 Jargoneer 示例中，网络访问是在一个单独的线程中执行的。\n\n在某些情况下，你需要请求用户界面线程代表你执行代码。例如，如果你正在显示一个动画，你需要确保动画的帧与重绘周期正确同步。否则，你最终很可能会显示部分绘制的帧。\n\
  \n`Display` 提供了一种在用户界面线程中执行你的代码的机制。它有一个方法 `callSerially()`，接受一个 `Runnable` 对象。当用户界面线程准备就绪时，即当它完成所有重绘请求的服务后，它将从用户界面线程执行该\
  \ `Runnable` 的 `run()` 方法。一个典型的动画看起来像这样：\n\n```\npublic class AnimationCanvas\n\
  \    extends Canvas\n    implements Runnable {\n  public start() {\n    run();\n\
  \  }\n\npublic void paint(Graphics g) {\n    // 绘制动画的一帧。\n  }\n  public void run()\
  \ {\n    // 更新我们的状态。\n    // 现在请求绘制新帧。\n    repaint();\n    Display.callSerially(this);\n\
  \  }\n}\n```\n\n你可以通过调用 `start()` 来启动动画，而 `start()` 又会简单地调用 `run()`。在 `run()` 内部，我们更新状态并调用\
  \ `repaint()` 来请求绘制新帧。然后我们使用 `callSerially()` 来请求在绘制完成后再次被调用。\n\n这种技术产生的动画会以设备允许的最快速度运行。然而，许多应用程序需要在不同设备上提供一致的体验。在这些情况下，使用具有一致帧延迟的独立动画线程更有意义。下面的示例演示了这种技术。它包含两个类：`Sweep`\
  \ 和 `SweepCanvas`。`Sweep` 是一个 MIDlet，它显示实际实现动画的类 `SweepCanvas`。正在运行的 `SweepCanvas`\
  \ 如图 10-9 所示。\n\n![](img/fig208_01.jpg)\n图 10-9：在灰度模拟器上运行的 *SweepCanvas* 动画\n\n\
  首先，这是 `Sweep` 的源代码：\n\n```\nimport javax.microedition.lcdui.*;\nimport javax.microedition.midlet.*;\n\
  \npublic class Sweep\n    extends MIDlet {\n  public void startApp() {\n    final\
  \ SweepCanvas sweeper = new SweepCanvas();\n    sweeper.start();\n    sweeper.addCommand(new\
  \ Command(\"退出\", Command.EXIT, 0));\n    sweeper.setCommandListener(new CommandListener()\
  \ {\n      public void commandAction(Command c, Displayable s) {\n        sweeper.stop();\n\
  \        notifyDestroyed();\n      }\n    });\n\nDisplay.getDisplay(this).setCurrent(sweeper);\n\
  \  }\n\npublic void pauseApp() {}\n\npublic void destroyApp(boolean unconditional)\
  \ {}\n}\n```\n\n这是 `SweepCanvas` 的代码：\n\n```\nimport javax.microedition.lcdui.*;\n\
  \npublic class SweepCanvas\n    extends Canvas\n    implements Runnable {\n  private\
  \ boolean mTrucking;\n  private int mTheta;\n  private int mBorder;\n  private int\
  \ mDelay;\n\npublic SweepCanvas() {\n    mTheta = 0;\n    mBorder = 10;\n    mDelay\
  \ = 50;\n  }\n\npublic void start() {\n    mTrucking = true;\n    Thread t = new\
  \ Thread(this);\n    t.start();\n  }\n\npublic void stop() {\n    mTrucking = false;\n\
  \  }\n  public void paint(Graphics g) {\n    int width = getWidth();\n    int height\
  \ = getHeight();\n\n// 清除 Canvas。\n    g.setGrayScale(255);\n    g.fillRect(0, 0,\
  \ width - 1, height - 1);\n\nint x = mBorder;\n    int y = mBorder;\n    int w =\
  \ width - mBorder * 2;\n    int h = height - mBorder * 2;\n    for (int i = 0; i\
  \ < 8; i++) {\n      g.setGrayScale((8 - i) * 32 - 16);\n      g.fillArc(x, y, w,\
  \ h, mTheta + i * 10, 10);\n      g.fillArc(x, y, w, h, (mTheta + 180) % 360 + i\
  \ * 10, 10);\n    }\n  }\n\npublic void run() {\n    while (mTrucking) {\n     \
  \ mTheta = (mTheta + 1) % 360;\n      repaint();\n      try { Thread.sleep(mDelay);\
  \ }\n      catch (InterruptedException ie) {}\n    }\n  }\n}\n```\n\nMIDP 2.0 中的\
  \ Game API 为运行动画提供了另一种选择。在下一章中，你将看到如何使用 `GameCanvas` 实现 Sweep 的简单动画。\n\n## 总结\n\n\
  本章我们涵盖了很多内容。`Canvas` 类为游戏或其他要求苛刻的应用程序提供了低级接口。你可以使用 `Graphics` 类在 `Canvas` 上绘制形状、文本和图像。此外，你可以接收关于按键和指针事件的详细输入信息。游戏动作是一种基于按键事件的简单通用输入方法。最后，你应该理解与重绘和事件回调相关的多线程问题。耗时处理应放在单独的线程中，以免导致系统拥有的用户界面线程陷入停滞。动画可以使用\
  \ `Display` 的 `callSerially()` 方法与用户界面线程同步，尽管更常见的是使用单独的动画线程来实现。下一章将详细介绍 MIDP 2.0\
  \ 的新 Game API。\n\n"
- "# 第 11 章：Game API\n\nMIDP 2.0 的许多新特性旨在使 MIDP 成为对游戏有吸引力的平台，而游戏是消费级 J2ME 软件的先锋。你已经了解了一些新特性：RGB\
  \ 图像和 Canvas 中的位块传输是两个很好的例子。在下一章中，你将了解 MIDP 2.0 对多媒体的支持。本章介绍新的 Game API，它简化了 2D\
  \ 游戏的编写。\n\n\n\n## 概述\n\n游戏 API 建立在你在第 10 章中了解到的 Canvas 和 Graphics 类之上。整个 API 由\
  \ javax.microedition.lcdui.game 包中的五个类组成。其中一个类 GameCanvas 提供了动画和按键轮询的方法。其他四个类处理*图层*，可用于从多个不同元素组合场景。\n\
  \nGameCanvas 相比 Canvas 有两个主要优势。首先，你的应用程序可以精确控制*何时*更新显示，而不必等待系统软件调用 paint()。其次，你可以控制屏幕的哪个区域被更新。GameCanvas\
  \ 让你的应用程序对显示更新拥有非常具体的控制权。\n\n## 使用 GameCanvas 驱动动画\n\nGameCanvas 扩展了 javax.microedition.lcdui.Canvas，增加了动画和按键状态轮询的方法。GameCanvas\
  \ 的使用方式与 Canvas 不同：\n\n*   使用 Canvas 时，你需要创建其子类并定义 paint()方法。在 paint()内部，你使用 Graphics\
  \ 在屏幕上渲染图形。当你更改某些内容并希望更新屏幕时，调用 repaint()，系统会再次为你调用 paint()。\n\n*   使用 GameCanvas\
  \ 时，你需要创建其子类。要在屏幕上绘制，请使用 getGraphics()返回的 Graphics 对象。当你希望更新显示在屏幕上时，调用 flushGraphics()，该方法直到屏幕更新后才返回。对于更具体的更新，请使用\
  \ flushGraphics(int x, int y, int width, int height)方法，该方法仅更新屏幕的某个区域。\n\n    ```\n\
  \    public void flushGraphics(int x, int y, int width, int height)\n    ```\n\n\
  GameCanvas 的使用模型使其易于在游戏循环中使用，如下所示：\n\n```\nGraphics g = getGraphics();\nwhile(true)\
  \ {\n  // 检查用户输入。\n  // 更新游戏状态。\n  // 使用 g 绘制内容。\n  flushGraphics();\n}\n```\n\n\
  要创建 GameCanvas 的子类，你需要从其子类的构造函数中调用其受保护的构造函数。该构造函数接受一个布尔参数，指示是否应为该 GameCanvas 实例抑制正常的按键事件机制。正常的按键事件机制指的是\
  \ keyPressed()、keyReleased()和 keyRepeated()的回调机制。抑制正常机制可能会带来更好的性能。GameCanvas 提供了一种响应按键事件的替代方法，详见下一节。\n\
  \n为了展示 GameCanvas 如何用于绘制，我将使用 GameCanvas 重写第 10 章中的 SweepCanvas 示例。请注意，子类不再重写 paint()。所有操作都在\
  \ run()方法中执行，该方法在一个单独的线程中运行以驱动动画。run()方法调用 render()，后者执行实际的绘制（与旧的 paint()相同）。\n\n\
  清单 11-1：使用*GameCanvas*实现动画\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport javax.microedition.lcdui.*;\n\
  import javax.microedition.lcdui.game.*;\n\npublic class SweepGameCanvas\n    extends\
  \ GameCanvas\n    implements Runnable {\nprivate boolean mTrucking;\nprivate int\
  \ mTheta;\nprivate int mBorder;\nprivate int mDelay;\n  public SweepGameCanvas()\
  \ {\n    super(true);\n    mTheta = 0;\n    mBorder = 10;\n    mDelay = 50;\n  }\n\
  \n  public void start() {\n    mTrucking = true;\n    Thread t = new Thread(this);\n\
  \    t.start();\n  }\n\n  public void stop() {\n    mTrucking = false;\n  }\n\n\
  \  public void render(Graphics g) {\n    int width = getWidth();\n    int height\
  \ = getHeight();\n\n    // 清除画布。\n    g.setGrayScale(255);\n    g.fillRect(0, 0,\
  \ width - 1, height - 1);\n\n    int x = mBorder;\n    int y = mBorder;\n    int\
  \ w = width - mBorder * 2;\n    int h = height - mBorder * 2;\n    for (int i =\
  \ 0; i < 8; i++) {\n      g.setGrayScale((8 - i) * 32 - 16);\n      g.fillArc(x,\
  \ y, w, h, mTheta + i * 10, 10);\n      g.fillArc(x, y, w, h, (mTheta + 180) % 360\
  \ + i * 10, 10);\n    }\n  }\n\n  public void run() {\n    Graphics g = getGraphics();\n\
  \    while (mTrucking) {\n      mTheta = (mTheta + 1) % 360;\n      render(g);\n\
  \      flushGraphics();\n      try { Thread.sleep(mDelay); }\n      catch (InterruptedException\
  \ ie) {}\n    }\n  }\n} \n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n我假设你可以自己编写一个\
  \ MIDlet 来显示 SweepGameCanvas。如果你已经下载了在线示例，SweepGame 就是一个显示 SweepGameCanvas 的 MIDlet。\n\
  \n## 轮询按键状态\n\nGameCanvas 提供了一种响应按键按下的替代方法，这被认为是用户控制游戏的方式。GameCanvas 没有被动等待 Canvas\
  \ 中定义的按键事件回调，而是提供了一个返回按键当前状态的方法：\n\n```\npublic int getKeyStates()\n```\n\n这对游戏很有吸引力，因为它让你的应用程序拥有更多控制权。你可以立即获知设备按键的状态，而无需等待系统调用\
  \ Canvas 中的按键回调方法。\n\n返回的整数使用一个位来表示九个游戏动作中的每一个。1 位表示按键按下，0 位表示未按下。每个位都由 GameCanvas\
  \ 类中的一个常量表示，如表 11-1 所示。\n\n表 11-1：*GameCanvas*中的游戏动作位常量\n\n| **GAMECANVAS 位常量**\
  \ | **对应的 CANVAS 游戏动作常量** |\n| --- | --- |\n| UP_PRESSED | UP |\n| DOWN_PRESSED\
  \ | DOWN |\n| LEFT_PRESSED | LEFT |\n| RIGHT_PRESSED | RIGHT |\n| FIRE_PRESSED |\
  \ FIRE |\n| GAME_A_PRESSED | GAME_A |\n| GAME_B_PRESSED | GAME_B |\n| GAME_C_PRESSED\
  \ | GAME_C |\n| GAME_D_PRESSED | GAME_D |\n\n通过获取按键的当前状态（一种称为*轮询*的技术），你可以在游戏循环中响应用户操作，而不是依赖在不同线程中运行的事件回调方法。你可以像下面这样扩展上面给出的\
  \ GameCanvas 循环示例来响应按键按下：\n\n```\nGraphics g = getGraphics();\nwhile(true) {\n \
  \ // 检查用户输入。\n  int ks = getKeyStates();\n  if ((ks & UP_PRESSED) != 0)\n    moveUp();\n\
  \  else if ((ks & DOWN_PRESSED) != 0)\n    moveDown();\n  // ...\n\n  // 更新游戏状态。\n\
  \  // 使用 g 绘制内容。\n  flushGraphics();\n}\n```\n\n如果你还在关注，你可能想知道当用户在应用程序调用 getKeyStates()之间按下并释放一个键时会发生什么。按键状态是*锁存的*，这意味着一次按键按下会设置相应的位并使其保持，直到下一次调用\
  \ getKeyStates()。每次你调用 getKeyStates()时，所有锁存的值都会被清除。\n\n\n\n## 理解图层\n\nGame API 的其余部分专门用于处理*图层*。图层是可以组合起来创建完整场景的图形元素。例如，你可能有一个山脉背景、一个城市建筑背景，以及前景中的几个较小元素：人物、飞船、汽车等等。\n\
  \n组合图层的技术类似于传统的手绘动画。背景和前景图像绘制在透明赛璐珞片上，这些赛璐珞片一层层叠放，然后拍摄下来形成最终场景。\n\n在 Game API 中，`javax.microedition.lcdui.game.Layer`\
  \ 类的实例代表一个图层。`Layer` 是一个抽象类，有两个具体的子类。`Layer` 本身相当简单。它有位置、大小，并且可以设置为可见或不可见。位置和大小通过以下方法进行访问和修改，这些方法不言自明：\n\
  \n```\npublic final int getX()\npublic final int getY()\npublic final int getWidth()\n\
  public final int getHeight()\npublic void setPosition(int x, int y) \n```\n\n`Layer`\
  \ 还提供了一个便捷的方法，用于相对于当前位置移动。将像素偏移量传递给以下方法，即可调整图层的位置：\n\n```\npublic void move(int\
  \ dx, int dy)\n```\n\n图层的可见性通过 `getVisible()` 和 `setVisible()` 方法访问。\n\n`Layer`\
  \ 中的最后一个方法是 `paint()`，它被声明为抽象方法。子类重写此方法以定义它们的外观。\n\n## 管理图层\n\n在我介绍 `Layer` 的具体子类之前，我将解释如何将图层组合起来形成完整的场景。你可以自己完成，维护一个图层列表，并使用它们的\
  \ `paint()` 方法绘制每个图层。幸运的是，Game API 包含了 `LayerManager`，这是一个为你处理大部分细节的类。要创建一个 `LayerManager`，只需调用它的无参构造方法。\n\
  \n`LayerManager` 的主要工作是维护一个有序的图层列表。图层有一个索引，指示它们从前到后的位置。位置 0 在最顶层，最靠近用户，而索引越大，则越靠后，越远离用户。（图层的顺序有时被称为\
  \ *z* *顺序*）。\n\n可以使用以下方法将图层添加到列表的底部：\n\n```\npublic void append(Layer l)\n```\n\n\
  你可以使用 `insert()` 在特定位置添加图层：\n\n```\npublic void insert(Layer l, int index)\n```\n\
  \n例如，你可以通过在索引 0 处插入一个图层，将其添加到列表的顶部。\n\n你可以通过调用 `getSize()` 来查找 `LayerManager` 中的图层数量。如果你想检索特定位置的图层，可以将索引传递给\
  \ `getLayerAt()` 方法。\n\n最后，你可以通过将 `Layer` 对象传递给 `remove()` 方法来移除一个图层。\n\n`LayerManager`\
  \ 包含一个*视图窗口*的概念，即场景中将要被绘制的矩形部分。其假设是整体场景大于设备屏幕，因此任何时候都只会绘制一部分。默认情况下，视图窗口的原点在 (0,\
  \ 0)，并且尺寸尽可能大（宽度和高度均为 `Integer.MAX_VALUE`）。你可以使用以下方法设置视图窗口，其中 x 和 y 坐标是相对于 `LayerManager`\
  \ 原点的。\n\n```\npublic void setViewWindow(int x, int y, int width, int height)\n\
  ```\n\n要实际绘制由 `LayerManager` 的图层所代表的场景，请调用 `paint()` 方法：\n\n```\npublic void paint(Graphics\
  \ g, int x, int y)\n```\n\n场景的视图窗口将使用给定的 `Graphics` 对象在指定位置绘制，该位置是在 `Graphics` 的坐标系中指定的。\n\
  \n如果你对图层管理器、其图层及其视图窗口之间的关系仍然模糊不清，请参阅 `LayerManager` 的 API 文档，其中包含两个非常有帮助的图示。\n\n\
  ## 使用平铺图层\n\n平铺图层由一组图块构成，就像你可以在浴缸旁组装装饰性瓷砖来创建漂亮的图案一样。这些图块来自一个被分割成等大小部分的单一图像。\n\n\
  `TiledLayer` 使用从 `Layer` 继承的 `paint()` 方法绘制在 `Graphics` 对象上。像任何其他 `Layer` 一样，平铺图层在\
  \ `Graphics` 的坐标系中，在其当前位置渲染自身。此外，像任何其他 `Layer` 一样，平铺图层可以是 `LayerManager` 的一部分，并且可以在使用*其*\
  \ `paint()` 方法渲染 `LayerManager` 时自动渲染。\n\n例如，图 11-1 宽 240 像素，高 96 像素。\n\n![点击展开](img/fig219_01_0.jpg)\n\
  图 11-1：平铺图层的源图像\n\n该图像可以分割成 10 个方形图块，每个图块的宽度和高度均为 48 像素。图块的编号如图 11-2 所示。\n\n![](img/fig220_01.jpg)\n\
  图 11-2：图块编号\n\n该图像可以有几种不同的布局方式来达到相同的结果。另外两种可能的布局方式如图 11-3 所示。\n\n![](img/fig220_02.jpg)\n\
  图 11-3：其他图块图像布局\n\n请注意，图块索引从 1 开始编号，而行号和列号从 0 开始。\n\n平铺图层本身是一个*单元格*网格，每个单元格由一个图块占据。你在构造时指定平铺图层的行数和列数。平铺图层的确切尺寸如下：\n\
  \n```\n宽度 = [列数] x [图块宽度]\n高度 = [行数] x [图块高度] \n```\n\n\n\n### 创建并初始化 TiledLayer\n\
  \n要创建 TiledLayer，需向构造函数提供列数、行数、源图像以及图块尺寸：\n\n```\npublic TiledLayer(int columns,\
  \ int rows,\n    Image image, int tileWidth, int tileHeight)\n```\n\n图像和图块尺寸描述了一个*静态图块集*。你可以通过以下方法更改现有\
  \ TiledLayer 上的静态图块集：\n\n```\npublic void setStaticTileSet(Image image, int tileWidth,\
  \ int tileHeight)\n```\n\nTiledLayer 的列数和行数可通过 getColumns() 和 getRows() 获取。要获取图块尺寸，请使用\
  \ getCellWidth() 和 getCellHeight()。（虽然方法命名不太一致，但这样是可行的，因为每个单元格的像素尺寸与图块的像素尺寸相同。）\n\
  \nTiledLayer 在首次创建时是空的。要将图块分配给某个单元格，请使用以下方法：\n\n```\npublic void setCell(int col,\
  \ int row, int tileIndex)\n```\n\nTiledLayer 中的所有单元格初始时都填充图块索引 0，表示空白图块。你可以通过将单元格的列号和行号传递给\
  \ getCell() 来获取特定单元格的图块索引。如果你想将同一个图块分配给一系列单元格，请使用 fillCells() 方法：\n\n```\npublic\
  \ void fillCells(int col, int row, int numCols, int numRows,\n    int tileIndex)\n\
  ```\n\ncol、row、numCols 和 numRows 参数描述了一个矩形单元格区域，该区域将被填充指定的图块。例如，fillCells(2, 0,\
  \ 1, 2, 6) 会将图块 6 分配给图块层第三列第一行和第二行的单元格。\n\n以下摘录（改编自本书源代码下载中的 *QuatschCanvas.java*，可从\
  \ [`www.apress.com/`](http://www.apress.com/) 获取）演示了创建和初始化 TiledLayer 的一种方法。\n\n\
  ```\nImage backgroundImage = Image.createImage(\"/background_tiles.png\");\nTiledLayer\
  \ background = new TiledLayer(8, 4, backgroundImage, 48, 48);\nbackground.setPosition(12,\
  \ 0);\nint[] map = {\n  1, 2, 0, 0, 0, 0, 0, 0,\n  3, 3, 2, 0, 0, 0, 5, 0,\n  3,\
  \ 3, 3, 2, 4, 1, 3, 2,\n  6, 6, 6, 6, 6, 6, 6, 6\n};\nfor (int i = 0; i < map.length;\
  \ i++) {\n  int column = i % 8;\n  int row = (i - column) / 8;\n  background.setCell(column,\
  \ row, map[i]);\n}\n```\n\n使用图 11-1 的源图像，这段代码将生成图 11-4 所示的图块层。\n\n![点击展开](img/fig222_01_0.jpg)\n\
  图 11-4：一个图块层\n\n现在你几乎已经了解了 TiledLayer 的全部内容；它充当了图块调色板与完整组装层之间的简单映射。\n\n### 使用动画图块\n\
  \n还有一个额外的技巧：*动画*图块。动画图块是一种虚拟图块，其映射可以在运行时更改。虽然你可以通过在所有想要更改的单元格上调用 setCell() 来实现同样的效果，但使用动画图块只需一次调用即可更改所有受影响的单元格。\n\
  \n要使用动画图块，请通过调用以下方法创建一个：\n\n```\npublic int createAnimatedTile(int staticTileIndex)\n\
  ```\n\n你向该方法传递一个常规图块索引，作为动画图块应使用的初始图块。该方法返回一个特殊的动画图块索引。（这里没什么神奇的；它只是一个负数。）\n\n要将动画图块分配给某个单元格，请将\
  \ createAnimatedTile() 的返回值传递给 setCell()。当你想更改动画图块的内容时，请使用以下方法：\n\n```\npublic void\
  \ setAnimatedTile(int animatedTileIndex, int staticTileIndex)\n```\n\n这将把提供的图块索引分配给该动画图块。所有拥有该动画图块的单元格现在都将显示给定的图块。\n\
  \n如果你需要获取与动画图块关联的当前图块，只需将动画图块索引传递给 getAnimatedTile() 即可。\n\n## 使用 Sprite\n\nTiledLayer\
  \ 使用图块调色板来填充大面积区域，而 Sprite 则使用图块调色板来动画化一个与单个图块大小相同的层。通常，精灵代表游戏中的某个主角。在 Sprite 的术语中，图块被称为*帧*。与\
  \ TiledLayer 类似，Sprite 也是从被分割成等尺寸帧的源图像创建的。\n\n```\npublic Sprite(Image image, int\
  \ frameWidth, int frameHeight)\n```\n\n还有一种特殊情况，如果图像只包含一帧，则不会进行动画：\n\n```\npublic\
  \ Sprite(Image image) \n```\n\n有趣的是，Sprite 不能由单独的帧图像创建；帧必须打包到单个源图像中。\n\n如果你想在 Sprite\
  \ 创建后更改源图像，请使用 setImage()：\n\n```\npublic void setImage(Image img, int frameWidth,\
  \ int frameHeight)\n```\n\nSprite 中包含的帧总数由 getRawFrameCount() 返回。\n\n与其他 Layer 一样，Sprite\
  \ 在调用 paint() 方法时进行渲染。通常，Sprite 会属于一个 LayerManager，在这种情况下，当 LayerManager 被渲染时，Sprite\
  \ 会自动渲染。\n\n### 动画化 Sprite\n\nSprite 动画的核心在于*帧序列*。当 Sprite 被创建时，它有一个默认的帧序列，该序列包含源图像中的每一帧。例如，考虑一个名为\
  \ Dr. Quatsch 的虚构角色的源图像，如图 11-5 所示。\n\n![](img/fig224_01.jpg)\n图 11-5：一个精灵源图像\n\n\
  该图像为 192 × 48 像素。如果以 48 × 48 像素的帧尺寸创建，则有四帧。默认帧序列是 { 0, 1, 2, 3 }。请注意，帧索引从零开始编号，而图块索引（在\
  \ TiledLayer 类中）从一开始编号。\n\n在上图中，前三帧代表 Dr. Quatsch 在奔跑，而第四帧是显示他静止站立的帧。以下方法更改当前帧序列：\n\
  \n```\npublic void setFrameSequence(int[] sequence) \n```\n\n例如，以下代码展示了如何创建一个新的\
  \ Sprite 并将其帧序列设置为仅包含奔跑帧：\n\n```\nint[] runningSequence = { 0, 1, 2 };\nImage quatschImage\
  \ = Image.createImage(\"/quatsch.png\");\nSprite quatsch = new Sprite(quatschImage,\
  \ 48, 48);\nquatsch.setFrameSequence(runningSequence);\n```\n\nSprite 提供了几种在帧序列中导航的方法。动画不会自动发生；你的应用程序需要告诉\
  \ Sprite 何时移动到序列中的下一帧。这通常在一个单独的线程中完成，很可能是作为动画线程的一部分。要在序列中向前和向后移动，请使用 nextFrame()\
  \ 和 prevFrame()。这些方法在序列的末尾会按预期进行循环，回到下一个值。例如，使用帧序列 { 0, 1, 2 }，如果 Sprite 的当前帧是 2，并且你调用了\
  \ nextFrame()，则当前帧将被设置为 0。\n\n你可以使用以下方法直接跳转到特定帧：\n\n```\npublic void setFrame(int\
  \ sequenceIndex)\n```\n\n请注意，此方法接受一个序列索引。如果 Sprite 的帧序列是 { 2, 3, 1, 9 }，那么调用 setFrame(1)\
  \ 将导致 Sprite 的当前帧被设置为 3。\n\n当你调整 Sprite 的当前帧时，视觉上不会立即发生任何变化。只有在下次使用其 paint() 方法渲染\
  \ Sprite 时，更改才会可见。通常，如果你使用 GameCanvas，这将在你的动画循环结束时发生。\n\n要找出当前帧序列索引，请调用 getFrame()。这里不要混淆；该方法返回的不是帧索引，而是当前帧序列中的当前索引。有趣的是，没有\
  \ getFrameSequence() 方法，因此如果你没有保存当前帧序列，就无法找出当前帧索引。不过，你可以使用 getFrameSequenceLength()\
  \ 获取当前帧序列中的元素数量。\n\n\n\n### 变换精灵\n\n你可能已经注意到，图 11-5 中显示的帧只展示了夸奇博士面向左侧。如果他打算向右跑呢？精灵支持*变换*功能，这样你就可以使用\
  \ API 生成现有帧的简单变换后的额外帧。以下方法可对精灵应用变换：\n\n```\npublic void setTransform(int transform)\n\
  ```\n\n`transform`参数可以是`Sprite`类中定义的任意常量值：\n\n```\nTRANS_NONE\nTRANS_ROT90\nTRANS_ROT180\n\
  TRANS_ROT270\nTRANS_MIRROR\nTRANS_MIRROR_ROT90\nTRANS_MIRROR_ROT180\nTRANS_MIRROR_ROT270\n\
  ```\n\n要让夸奇博士面向右侧而非左侧，你需要应用`TRANS_MIRROR`变换。要理解所有变换，请参阅精灵 API 文档，其中包含一组非常有帮助的战斗机图像。\n\
  \n关于变换，唯一棘手的部分是*参考像素*。所有精灵都有一个参考像素，它在精灵自身的坐标空间中表示；默认情况下，参考像素位于精灵的左上角(0, 0)处。当精灵被变换时，参考像素也会随之变换。\n\
  \n应用变换时，精灵的位置会发生变化，以确保参考像素的当前位置保持不变，即使在其变换之后也是如此。例如，图 11-6 展示了应用简单的`TRANS_MIRROR`变换时精灵位置的变化。\n\
  \n![](img/fig227_01.jpg)\n图 11-6：参考像素位置不变。\n\n假设精灵的原始位置为 100, 100（在容器的坐标系中），参考像素位置为\
  \ 0, 0（在精灵的坐标系中）。应用`TRANS_MIRROR`旋转后，精灵的位置会被调整，使得变换后的参考像素与原始参考像素位于同一位置。由于帧宽度为 48\
  \ 像素，精灵的位置（其左上角）从 100, 100 变为 52, 100。\n\n要在精灵未变换的坐标系中调整参考点的位置，请使用以下方法：\n\n```\n\
  public void defineReferencePixel(int x, int y)\n```\n\n对于夸奇博士的情况，我希望应用镜像变换而不让精灵移动，因此我将参考像素设置为\
  \ 48 × 48 帧的中心：\n\n```\n// 精灵 quatsch 按之前的方式定义。\nquatsch.defineReferencePixel(24,\
  \ 24);\n```\n\n要查找精灵参考像素在其所在容器坐标系中的当前位置，请使用`getRefPixelX()`和`getRefPixelY()`。不要混淆：`defineReferencePixel()`接受相对于精灵原点的坐标，而`getRefPixelX()`和`getRefPixelY()`返回相对于精灵容器的值。\n\
  \n也可以基于参考点设置精灵的位置。你已经知道可以使用从`Layer`继承的`setPosition()`方法设置精灵左上角的位置，但以下方法用于设置精灵参考点的当前位置：\n\
  \n```\npublic void setRefPointPosition(int x, int y)\n```\n\n这比初看起来更方便，因为它允许你将参考点放置在特定位置，而无需考虑当前的变换。\n\
  \n### 处理碰撞\n\n精灵提供了方法来回答游戏中出现的关键问题——子弹击中飞船了吗？夸奇博士是否站在门前？\n\n游戏 API 支持两种碰撞检测技术。\n\
  \n1.  实现可以比较代表精灵和另一个精灵的矩形。如果矩形相交，则发生碰撞。这是一种快速测试碰撞的方法，但对于非矩形形状可能产生不准确的结果。\n\n2. \
  \ 实现可以比较精灵和另一个精灵的每个像素。如果精灵中的一个不透明像素与另一个精灵中的不透明像素重叠，则发生碰撞。这种技术涉及更多计算，但产生更准确的结果。\n\
  \n精灵有一个用于碰撞检测的*碰撞矩形*。它像参考像素一样，在精灵自身的坐标系中定义。默认情况下，碰撞矩形位于(0, 0)处，其宽度和高度与精灵相同。你可以使用以下方法更改碰撞矩形：\n\
  \n```\npublic void defineCollisionRectangle(int x, int y, int width, int height);\n\
  ```\n\n碰撞矩形有两个用途。如果不使用像素级碰撞检测，则使用碰撞矩形来确定碰撞。如果使用像素级碰撞检测，则仅检查碰撞矩形内的像素。\n\n精灵能够检测与其他精灵、`TiledLayer`和`Image`的碰撞。\n\
  \n```\npublic final boolean collidesWith(Sprite s, boolean pixelLevel)\npublic final\
  \ boolean collidesWith(TiledLayer t, boolean pixelLevel)\npublic final boolean collidesWith(Image\
  \ image,\n    int x, int y, boolean pixelLevel)\n```\n\n每种方法的语义略有不同，如表 11-1 所述。\n\
  \n表 11-1：与精灵的碰撞检测\n\n| **目标** | **矩形相交** | **像素级** |\n| --- | --- | --- |\n| Sprite\
  \ | 比较碰撞矩形 | 比较碰撞矩形内的像素 |\n| TiledLayer | 比较精灵的碰撞矩形与 TiledLayer 中的图块 | 比较精灵碰撞矩形内的像素与\
  \ TiledLayer 中的像素 |\n| Image | 比较精灵的碰撞矩形与 Image 的边界 | 比较精灵碰撞矩形内的像素与 Image 中的像素 |\n\
  \n### 复制精灵\n\n精灵包含一个复制构造函数：\n\n```\npublic Sprite(Sprite s)\n```\n\n这比你想象的要强大得多。它会创建一个新精灵，包含原始精灵的所有属性，包括：\n\
  \n*   源图像帧\n\n*   帧序列\n\n*   当前帧\n\n*   当前变换\n\n*   参考像素\n\n*   碰撞矩形\n\n\n\n## 综合运用\n\
  \n如清单 11-2 所示的`QuatschCanvas`，是一个展示 Game API 诸多特性的示例。虽然代码看起来很长，但它被分解为易于管理的方法，并演示了\
  \ Game API 的不少功能：\n\n*   在`GameCanvas`中使用动画循环\n*   使用`GameCanvas`轮询按键状态\n*   使用`LayerManager`维护多个图层\n\
  *   创建`Sprite`和`TiledLayer`\n*   为`Sprite`添加动画，包括更改帧序列和变换\n*   在`TiledLayer`中使用动画图块\n\
  \n清单 11-2：*QuatschCanvas*，一个 Game API 示例\n\n| **![开始示例](img/_1.gif)** |\n\n```\n\
  import java.io.IOException;\n\nimport javax.microedition.lcdui.*;\nimport javax.microedition.lcdui.game.*;\n\
  \npublic class QuatschCanvas\n    extends GameCanvas\n    implements Runnable {\n\
  \  private boolean mTrucking;\n\nprivate LayerManager mLayerManager;\n\nprivate\
  \ TiledLayer mAtmosphere;\n  private TiledLayer mBackground;\n  private int mAnimatedIndex;\n\
  \nprivate Sprite mQuatsch;\n  private int mState, mDirection;\n\nprivate static\
  \ final int kStanding = 1;\n  private static final int kRunning = 2;\n\nprivate\
  \ static final int kLeft = 1;\n  private static final int kRight = 2;\n\nprivate\
  \ static final int[] kRunningSequence = { 0, 1, 2 };\n  private static final int[]\
  \ kStandingSequence = { 3 };\n\npublic QuatschCanvas(String quatschImageName,\n\
  \      String atmosphereImageName, String backgroundImageName)\n      throws IOException\
  \ {\n    super(true);\n\n// 创建一个 LayerManager。\n    mLayerManager = new LayerManager();\n\
  \    int w = getWidth();\n    int h = getHeight();\n    mLayerManager.setViewWindow(96,\
  \ 0, w, h);\n    createBackground(backgroundImageName);\n    createAtmosphere(atmosphereImageName);\n\
  \    createQuatsch(quatschImageName);\n  }\n\nprivate void createBackground(String\
  \ backgroundImageName)\n      throws IOException {\n    // 创建平铺图层。\n    Image backgroundImage\
  \ = Image.createImage(backgroundImageName);\n    int[] map = {\n      1, 2, 0, 0,\
  \ 0, 0, 0, 0,\n      3, 3, 2, 0, 0, 0, 5, 0,\n      3, 3, 3, 2, 4, 1, 3, 2,\n  \
  \    6, 6, 6, 6, 6, 6, 6, 6\n    };\n    mBackground = new TiledLayer(8, 4, backgroundImage,\
  \ 48, 48);\n    mBackground.setPosition(12, 0);\n    for (int i = 0; i < map.length;\
  \ i++) {\n      int column = i % 8;\n      int row = (i - column) / 8;\n      mBackground.setCell(column,\
  \ row, map[i]);\n    }\n    mAnimatedIndex = mBackground.createAnimatedTile(8);\n\
  \    mBackground.setCell(3, 0, mAnimatedIndex);\n    mBackground.setCell(5, 0, mAnimatedIndex);\n\
  \    mLayerManager.append(mBackground);\n  }\n\nprivate void createAtmosphere(String\
  \ atmosphereImageName)\n      throws IOException {\n    // 创建大气层\n    Image atmosphereImage\
  \ = Image.createImage(atmosphereImageName);\n    mAtmosphere = new TiledLayer(8,\
  \ 1, atmosphereImage,\n        atmosphereImage.getWidth(), atmosphereImage.getHeight());\n\
  \    mAtmosphere.fillCells(0, 0, 8, 1, 1);\n    mAtmosphere.setPosition(0, 96);\n\
  \    mLayerManager.insert(mAtmosphere, 0);\n  }\n\nprivate void createQuatsch(String\
  \ quatschImageName)\n    throws IOException {\n    // 创建精灵。\n    Image quatschImage\
  \ = Image.createImage(quatschImageName);\n    mQuatsch = new Sprite(quatschImage,\
  \ 48, 48);\n    mQuatsch.setPosition(96 + (getWidth() - 48) / 2, 96);\n    mQuatsch.defineReferencePixel(24,\
  \ 24);\n    setDirection(kLeft);\n    setState(kStanding);\n    mLayerManager.insert(mQuatsch,\
  \ 1);\n  }\n\npublic void start() {\n    mTrucking = true;\n    Thread t = new Thread(this);\n\
  \    t.start();\n  }\n\npublic void run() {\n    int w = getWidth();\n    int h\
  \ = getHeight();\n    Graphics g = getGraphics();\n    int frameCount = 0;\n   \
  \ int factor = 2;\n    int animatedDelta = 0;\n\nwhile (mTrucking) {\n      if (isShown())\
  \ {\n        int keyStates = getKeyStates();\n        if ((keyStates & LEFT_PRESSED)\
  \ != 0) {\n          setDirection(kLeft);\n          setState(kRunning);\n     \
  \     mBackground.move(3, 0);\n          mAtmosphere.move(3, 0);\n          mQuatsch.nextFrame();\n\
  \        }\n        else if ((keyStates & RIGHT_PRESSED) != 0) {\n          setDirection(kRight);\n\
  \          setState(kRunning);\n          mBackground.move(-3, 0);\n          mAtmosphere.move(-3,\
  \ 0);\n          mQuatsch.nextFrame();\n        }\n        else {\n          setState(kStanding);\n\
  \        }\n      frameCount++;\n      if (frameCount % factor == 0) {\n       \
  \ int delta = 1;\n        if (frameCount / factor < 10) delta = -1;\n        mAtmosphere.move(delta,\
  \ 0);\n        if (frameCount / factor == 20) frameCount = 0;\n\nmBackground.setAnimatedTile(mAnimatedIndex,\n\
  \            8 + animatedDelta++);\n        if (animatedDelta == 3) animatedDelta\
  \ = 0;\n      }\n\ng.setColor(0x5b1793);\n      g.fillRect(0, 0, w, h);\n\nmLayerManager.paint(g,\
  \ 0, 0);\n\nflushGraphics();\n    }\n\ntry { Thread.sleep(80); }\n    catch (InterruptedException\
  \ ie) {}\n   }\n  }\n\npublic void stop() {\n    mTrucking = false;\n  }\n\npublic\
  \ void setVisible(int layerIndex, boolean show) {\n    Layer layer = mLayerManager.getLayerAt(layerIndex);\n\
  \    layer.setVisible(show);\n  }\n\npublic boolean isVisible(int layerIndex) {\n\
  \    Layer layer = mLayerManager.getLayerAt(layerIndex);\n    return layer.isVisible();\n\
  \  }\n  private void setDirection(int newDirection) {\n    if (newDirection == mDirection)\
  \ return;\n    if (mDirection == kLeft)\n      mQuatsch.setTransform(Sprite.TRANS_MIRROR);\n\
  \    else if (mDirection == kRight)\n      mQuatsch.setTransform(Sprite.TRANS_NONE);\n\
  \    mDirection = newDirection;\n  }\n\nprivate void setState(int newState) {\n\
  \    if (newState == mState) return;\n    switch (newState) {\n      case kStanding:\n\
  \        mQuatsch.setFrameSequence(kStandingSequence);\n        mQuatsch.setFrame(0);\n\
  \        break;\n      case kRunning:\n        mQuatsch.setFrameSequence(kRunningSequence);\n\
  \        break;\n      default:\n        break;\n    }\n    mState = newState;\n\
  \  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n对应的 MIDlet 程序`QuatschMIDlet`可在代码下载中找到，但此处未列出。它创建并显示一个`QuatschCanvas`，并提供用于显示和隐藏图层的命令。\n\
  \n图 11-7 展示了在模拟器中运行的`QuatschMIDlet`。\n\n![点击展开](img/fig230_01_0.jpg)\n图 11-7：完整的鬣蜥——精灵与平铺图层\n\
  \n清单 11-2 包含了`QuatschCanvas`的源代码。\n\n## 特殊效果\n\n虽然严格来说不属于 Game API，但`Display`类中另外两个方法与游戏开发密切相关：\n\
  \n```\npublic boolean flashBacklight(int duration)\npublic boolean vibrate(int duration)\n\
  ```\n\n两个方法都接受一个以毫秒为单位的持续时间参数，用于指定背光应开启多长时间或设备应振动多长时间。两个方法都返回`true`表示成功，如果设备不支持背光或振动（或者你的应用程序未在前台运行），则返回`false`。\n\
  \n## 总结\n\n本章介绍了 MIDP 2.0 的 Game API，这是一组简化二维游戏开发的类。`GameCanvas`类提供了一个绘图表面，可以轻松地在游戏线程中进行渲染。`GameCanvas`还提供了按键状态轮询功能，同样有助于在游戏线程中检测用户输入。Game\
  \ API 的其余部分基于图层，这些图层是可以组合起来创建复杂场景的元素。`LayerManager`使得维护多个图层变得容易。`Sprite`类支持动画和碰撞检测。使用`TiledLayer`可以高效地构建大型场景或背景。最后，MIDP\
  \ 2.0 的`Display`包含了控制设备背光和振动的方法。游戏开发者有很多值得高兴的理由。请继续阅读下一章，了解关于 MIDP 2.0 声音功能的更多好消息。\n\
  \n"
- "# 第 12 章：声音与音乐\n\n\n\n## 概述\n\nMIDP 2.0 包含基本的音频功能。MIDP 2.0 中的媒体 API 是移动媒体 API（MMAPI）的严格子集，后者是一个更通用的多媒体渲染\
  \ API。有关 MMAPI 的完整详细信息，请参阅以下规范：\n\n[`jcp.org/jsr/detail/135.jsp`](http://jcp.org/jsr/detail/135.jsp)\n\
  \nMMAPI 本身类似于 Java 媒体框架（JMF）的袖珍版本，JMF 是 J2SE 的一个可选包。有关 JMF 的更多信息，请访问：\n\n[`java.sun.com/products/java-media/jmf/`](http://java.sun.com/products/java-media/jmf/)\n\
  \nMIDP 2.0 中包含的 MMAPI 子集称为音频构建模块（ABB）。它包含播放简单音调和采样音频的功能。ABB 在 `javax.microedition.media`\
  \ 和 `javax.microedition.media.control` 包中实现。本章首先提供可运行的代码示例，然后退一步解释一些概念，并更仔细地深入探讨这些\
  \ API。\n\n## 快速入门\n\n你可以通过调用 `javax.microedition.media.Manager` 中的以下方法来播放音调：\n\n\
  ```\npublic static void playTone(int note, int duration, int volume)\n```\n\n在此方法中，`note`\
  \ 的指定方式与 MIDI 音符类似，每个整数对应钢琴键盘上的一个琴键。中央 C 是 60，中央 C 上方的 A（440 Hz 音调）是 69。`duration`\
  \ 以毫秒为单位，`volume` 的范围可以从 0（静音）到 100（最大音量）。\n\n与 ABB 中的大多数其他方法一样，`playTone()` 可能会抛出\
  \ `MediaException`。尽管规范要求支持简单音调，但设备可能暂时无法播放音调。（例如，手机可能正在使用音调生成硬件来响铃。）\n\n图 12-1\
  \ 展示了 `PianoCanvas`，这是一个显示简单钢琴键盘并允许用户浏览琴键以播放不同音调的示例。`PianoCanvas` 的代码见清单 12-1。播放音调的代码非常简洁，仅包含在\
  \ `keyPressed()` 方法中对 `playTone()` 的调用。其余代码则专注于用户界面。\n\n清单 12-1：*PianoCanvas* 源代码\n\
  \n| **![开始示例](img/_1.gif)** |\n\n```\nimport javax.microedition.lcdui.*;\nimport\
  \ javax.microedition.media.*;\n\npublic class PianoCanvas\n    extends Canvas {\n\
  \  private static final int[] kNoteX = {\n     0, 11, 16, 29, 32, 48, 59, 64, 76,\
  \ 80, 93, 96\n  };\n\nprivate static final int[] kNoteWidth = {\n    16, 8, 16,\
  \ 8, 16, 16, 8, 16, 8, 16, 8, 16\n  };\n\nprivate static final int[] kNoteHeight\
  \ = {\n    96, 64, 96, 64, 96, 96, 64, 96, 64, 96, 64, 96\n  };\n\nprivate static\
  \ final boolean[] kBlack = {\n    false, true, false, true, false,\n        false,\
  \ true, false, true, false, true, false\n  };\n\nprivate int mMiddleCX, mMiddleCY;\n\
  \  private int mCurrentNote;\n\npublic PianoCanvas() {\n    int w = getWidth();\n\
  \    int h = getHeight();\n\nint fullWidth = kNoteWidth[0] * 8;\n    mMiddleCX =\
  \ (w - fullWidth) / 2;\n    mMiddleCY = (h - kNoteHeight[0]) / 2;\n\nmCurrentNote\
  \ = 60;\n  }\n\npublic void paint(Graphics g) {\n    int w = getWidth();\n    int\
  \ h = getHeight();\n\ng.setColor(0xffffff);\n    g.fillRect(0, 0, w, h);\n    g.setColor(0x000000);\n\
  \nfor (int i = 60; i <= 72; i++)\n      drawNote(g, i);\n\ndrawSelection(g, mCurrentNote);\n\
  \  }\n\nprivate void drawNote(Graphics g, int note) {\n    int n = note % 12;\n\
  \    int octaveOffset = ((note - n) / 12 - 5) * 7 * kNoteWidth[0];\n    int x =\
  \ mMiddleCX + octaveOffset + kNoteX[n];\n    int y = mMiddleCY;\n    int w = kNoteWidth[n];\n\
  \    int h = kNoteHeight[n];\n\nif (isBlack(n))\n      g.fillRect(x, y, w, h);\n\
  \    else\n      g.drawRect(x, y, w, h);\n  }\n\nprivate void drawSelection(Graphics\
  \ g, int note) {\n    int n = note % 12;\n    int octaveOffset = ((note - n) / 12\
  \ - 5) * 7 * kNoteWidth[0];\n    int x = mMiddleCX + octaveOffset + kNoteX[n];\n\
  \    int y = mMiddleCY;\n    int w = kNoteWidth[n];\n    int h = kNoteHeight[n];\n\
  \nint sw = 6;\n    int sx = x + (w - sw) / 2;\n    int sy = y + h - 8;\n    g.setColor(0xffffff);\n\
  \    g.fillRect(sx, sy, sw, sw);\n    g.setColor(0x000000);\n    g.drawRect(sx,\
  \ sy, sw, sw);\n    g.drawLine(sx, sy, sx + sw, sy + sw);\n    g.drawLine(sx, sy\
  \ + sw, sx + sw, sy);\n  }\n\nprivate boolean isBlack(int note) {\n    return kBlack[note];\n\
  \  }\n\npublic void keyPressed(int keyCode) {\n    int action = getGameAction(keyCode);\n\
  \    switch (action) {\n      case LEFT:\n        mCurrentNote--;\n        if (mCurrentNote\
  \ < 60)\n          mCurrentNote = 60;\n        repaint();\n        break;\n    \
  \  case RIGHT:\n        mCurrentNote++;\n        if (mCurrentNote > 72)\n      \
  \    mCurrentNote = 72;\n        repaint();\n        break;\n      case FIRE:\n\
  \        try { Manager.playTone(mCurrentNote, 1000, 100); }\n        catch (MediaException\
  \ me) {}\n        break;\n      default:\n        break;\n    }\n  }\n} \n```\n\n\
  | **![结束示例](img/_1.gif)** |\n\n|  |\n\n![](img/fig238_01.jpg)\n图 12-1：一个迷你的钢琴\n\n\
  \n\nABB 还支持播放采样音频文件，尽管规范并未要求支持此功能。要播放采样音频，你只需为想要听到的数据获取一个 Player，然后启动该 Player 即可。你可以通过向\
  \ Manager 请求来获取一个 Player。在最简单的形式下，播放采样音频数据如下所示：\n\n```\nURL url = \"http://65.215.221.148:8080/wj2/res/relax.wav\"\
  ;\nPlayer p = Manager.createPlayer(url);\np.start();\n```\n\n在这种方法中，Web 服务器提供了数据的内容类型。另一种方法是获取音频数据的\
  \ InputStream，然后通过告知 Manager 数据的内容类型来创建 Player。这对于读取存储在 MIDlet 套件 JAR 中作为资源的音频文件非常方便。例如：\n\
  \n```\nInputStream in = getClass().getResourceAsStream(\"/relax.wav\");\nPlayer\
  \ player = Manager.createPlayer(in, \"audio/x-wav\");\nplayer.start();\n```\n\n\
  清单 12-2 是一个演示了这两种技术的简单 MIDlet。\n\n清单 12-2：播放音频文件\n\n| **![开始示例](img/_1.gif)** |\n\
  \n```\nimport java.io.*;\n\nimport javax.microedition.io.*;\nimport javax.microedition.lcdui.*;\n\
  import javax.microedition.midlet.*;\nimport javax.microedition.media.*;\n\npublic\
  \ class AudioMIDlet\n    extends MIDlet\n    implements CommandListener, Runnable\
  \ {\n  private Display mDisplay;\n  private List mMainScreen;\n\npublic void startApp()\
  \ {\n    mDisplay = Display.getDisplay(this);\n\nif (mMainScreen == null) {\n  \
  \    mMainScreen = new List(\"AudioMIDlet\", List.IMPLICIT);\n      mMainScreen.append(\"\
  Via HTTP\", null);\n      mMainScreen.append(\"From resource\", null);\n      mMainScreen.addCommand(new\
  \ Command(\"Exit\", Command.EXIT, 0));\n      mMainScreen.addCommand(new Command(\"\
  Play\", Command.SCREEN, 0));\n      mMainScreen.setCommandListener(this);\n    }\n\
  \nmDisplay.setCurrent(mMainScreen);\n  }\n\npublic void pauseApp() {}\n\npublic\
  \ void destroyApp(boolean unconditional) {}\n\npublic void commandAction(Command\
  \ c, Displayable s) {\n    if (c.getCommandType() == Command.EXIT) notifyDestroyed();\n\
  \    else {\n      Form waitForm = new Form(\"Loading...\");\n      mDisplay.setCurrent(waitForm);\n\
  \      Thread t = new Thread(this);\n      t.start();\n    }\n  }\n\npublic void\
  \ run() {\n    String selection = mMainScreen.getString(\n        mMainScreen.getSelectedIndex());\n\
  \    boolean viaHttp = selection.equals(\"Via HTTP\");\n\nif (viaHttp)\n      playViaHttp();\n\
  \    else\n      playFromResource();\n  }\n\nprivate void playViaHttp() {\n    try\
  \ {\n      String url = getAppProperty(\"AudioMIDlet-URL\");\n      Player player\
  \ = Manager.createPlayer(url);\n      player.start();\n    }\n    catch (Exception\
  \ e) {\n      showException(e);\n      return;\n    }\n    mDisplay.setCurrent(mMainScreen);\n\
  \  }\n\nprivate void playFromResource() {\n    try {\n      InputStream in = getClass().getResourceAsStream(\"\
  /relax.wav\");\n      Player player = Manager.createPlayer(in, \"audio/x-wav\");\n\
  \      player.start();\n    }\n    catch (Exception e) {\n      showException(e);\n\
  \      return;\n    }\n    mDisplay.setCurrent(mMainScreen);\n  }\n\nprivate void\
  \ showException(Exception e) {\n    Alert a = new Alert(\"Exception\", e.toString(),\
  \ null, null);\n    a.setTimeout(Alert.FOREVER);\n    mDisplay.setCurrent(a, mMainScreen);\n\
  \  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n## MIDP 2.0 媒体概念\n\n音频数据有多种*内容类型*。内容类型实际上就是一种文件格式，它规定了数据中的每个比特如何对最终声音产生影响。常见的音频内容类型有\
  \ MP3、AIFF 和 WAV。在 MIDP 2.0 ABB 中，内容类型使用 MIME 类型来指定，MIME 类型使用字符串来指定主类型和子类型。例如，WAV\
  \ 音频的 MIME 类型是 \"audio/x-wav\"。\n\n内容类型规定了如何将比特转换为声音，但这只是成功的一半。*协议*规定了如何将数据从其原始位置传输到将要渲染它的地方。例如，你可以使用\
  \ HTTP 将音频数据从服务器传输到 MIDP 设备。\n\n在 ABB 中，Player 知道如何渲染具有特定内容类型的音频数据，而关联的*数据源*则负责将数据传输给\
  \ Player。在移动媒体 API 中，抽象的 DataSource 类代表数据源。在 MIDP 2.0 ABB 中，数据源并非显式可用，而是隐式地与 Player\
  \ 关联。音频信息的路径如图 12-2 所示。\n\n![点击展开](img/fig244_01_0.jpg)\n图 12-2：音频数据路径\n\nManager\
  \ 通过其 createPlayer() 方法为请求的内容类型和协议分配 Player。一个或多个*控件*可能与 Player 关联，以指定播放参数（如音量）。在\
  \ ABB 中，javax.microedition.media.Control 是一个代表控件的接口，而 javax.microedition.media.control\
  \ 包则包含更具体的子接口。这些类之间的关系如图 12-3 所示。\n\n![](img/fig244_02.jpg)\n图 12-3：类关系\n\n\n\n\
  ## 支持的内容类型与协议\n\nABB 最不为人知的方面之一是其支持的内容类型。MIDP 2.0 在实现可能支持的内容类型和协议方面非常灵活。规范中仅说明，如果支持采样音频，则必须支持\
  \ 8 位 PCM WAV。除此之外，再无限制。\n\n如果你向 Manager 请求其无法处理的数据或协议，将会抛出 `MediaException`。\n\n\
  你可以在运行时通过 Manager 类中的两个方法了解支持哪些内容类型和协议：\n\n```\npublic static String getSupportedContentTypes(String\
  \ protocol)\npublic static String getSupportedProtocols(String content_type)\n```\n\
  \n你可以查询给定协议支持的内容类型，或给定内容支持的协议。如果向这两个方法中的任何一个传递 `null`，你将获得支持的内容类型或协议的完整列表。\n\n清单\
  \ 12-3 中的 MIDlet 会查找所有支持的内容类型，并打印出每种类型对应的协议。\n\n清单 12-3：在运行时检查内容类型和协议\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\nimport javax.microedition.lcdui.*;\nimport javax.microedition.midlet.*;\n\
  import javax.microedition.media.*;\n\npublic class MediaInformationMIDlet\n    extends\
  \ MIDlet\n    implements CommandListener {\n  private Form mInformationForm;\n\n\
  \  public void startApp() {\n    if (mInformationForm == null) {\n      mInformationForm\
  \ =\n          new Form(\"Content types and protocols\");\n      String[] contentTypes\
  \ =\n          Manager.getSupportedContentTypes(null);\n      for (int i = 0; i\
  \ < contentTypes.length; i++) {\n        String[] protocols =\n            Manager.getSupportedProtocols(contentTypes[i]);\n\
  \        for (int j = 0; j < protocols.length; j++) {\n          StringItem si =\
  \ new StringItem(contentTypes[i] + \": \",\n              protocols[j]);\n     \
  \     si.setLayout(Item.LAYOUT_NEWLINE_AFTER);\n          mInformationForm.append(si);\n\
  \        }\n      }\n      Command exitCommand = new Command(\"Exit\", Command.EXIT,\
  \ 0);\n      mInformationForm.addCommand(exitCommand);\n      mInformationForm.setCommandListener(this);\n\
  \    }\n    Display.getDisplay(this).setCurrent(mInformationForm);\n  }\n\n  public\
  \ void pauseApp() {}\n\n  public void destroyApp(boolean unconditional) {}\n\n \
  \ public void commandAction(Command c, Displayable s) {\n    notifyDestroyed();\n\
  \  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n图 12-4 显示了在 J2ME 无线工具包模拟器（2.0\
  \ beta 2 版本）上运行 `MediaInformationMIDlet` 的结果。关于此列表，需要理解三点：\n\n1.  HTTP 是一种文件传输协议，而非流媒体协议。如果你通过\
  \ HTTP 指定媒体文件，则整个文件将在播放开始前下载完毕。相比之下，某些设备可能支持真正的流协议，如 RTP（参见 [`www.ietf.org/rfc/rfc1889.txt`](http://www.ietf.org/rfc/rfc1889.txt)）。\n\
  \n2.  “audio/x-tone-seq”内容类型并非真正的采样音频；它是音调序列的一种特殊情况，我稍后会介绍。\n\n3.  该列表包含来自无线工具包\
  \ MMAPI 实现的一些功能和内容类型（视频、MIDI、音频捕获）。如果你想查看支持的内容类型和协议的精简列表，请按照本章末尾的描述关闭 MMAPI 支持。\n\
  \n![](img/fig246_01.jpg)\n图 12-4：在工具包 2.0 beta2 模拟器上运行的 *MediaInformationMIDlet*\n\
  \n要查找现有 Player 的内容类型，只需调用 `getContentType()`。\n\n## Player 生命周期\n\n由于播放音频可能会占用 MIDP\
  \ 设备上的稀缺资源，并且采样音频文件相对较大，因此 Player 具有详细的生命周期，可以严格控制其行为。生命周期用 *状态* 来描述，由 Player 接口中的常量表示。Player\
  \ 生命周期中状态的通常顺序如下：\n\n*   Player 的生命始于 UNREALIZED 状态。这意味着已创建 Player 实现，但它尚未尝试查找要渲染的音频数据，也未尝试获取音频硬件等资源。\n\
  \n*   当 Player 定位到媒体数据后（例如通过发起网络连接并发送标头），它会进入 REALIZED 状态。\n\n*   下一个状态是 PREFETCHED，表示\
  \ Player 已完成准备开始渲染音频所需的所有其他操作。这可能包括获取音频硬件的控制权、填充缓冲区或其他操作。\n\n*   当 Player 开始渲染音频数据时，它处于\
  \ STARTED 状态。\n\n*   最后一个状态是 CLOSED，表示 Player 已释放所有资源，关闭所有网络连接，并且无法再次使用。\n\n*  \
  \ Player 包含一组相应的方法，用于在状态之间转换：\n\n    ```\n    public void prefetch()\n    public\
  \ void realize()\n    public void start()\n    ```\n\n这些方法在大多数情况下按预期工作。如果你跳过某个步骤，则会隐含中间状态。在上面的示例中，我在新创建的\
  \ Player 上调用了 `start()`，这隐含了对 `prefetch()` 和 `realize()` 的调用。\n\n如果在定位媒体数据或获取系统资源时出现任何问题，这些方法会抛出\
  \ `MediaException`。\n\n其他几个方法允许向后状态转换，尽管它们的名称不那么直观。`stop()` 方法将 STARTED 状态的 Player\
  \ 带回 PREFETCHED 状态。`deallocate()` 方法通过释放资源，将 PREFETCHED 或 STARTED 状态的 Player 移回\
  \ REALIZED 状态。`deallocate()` 方法还有一个额外的特点；它可以将卡在尝试定位其媒体（在 `realize()` 过程中）的 UNREALIZED\
  \ 状态的 Player 带回 UNREALIZED 状态。\n\n最后，`close()` 方法将任何状态的 Player 移至 CLOSED 状态。所有资源被释放，所有网络连接被关闭，并且\
  \ Player 无法再次使用。\n\n你可以通过调用 `getState()` 来获取 Player 的当前状态。\n\n现在你已经了解了 Player 的生命周期，或许可以想象出改进上述简单\
  \ `AudioMIDlet` 的方法。例如，你可以对新创建的 Player 调用 `prefetch()`，以确保在用户选择 **Play** 命令后能尽快开始播放。你可能没有注意到太多延迟，但真实设备的运行速度会慢得多：\n\
  \n*   运行模拟器的桌面计算机比 MIDP 设备拥有更强大的处理能力和更多的内存。\n*   桌面上的模拟器可能拥有比真实 MIDP 设备快得多的网络连接。\n\
  *   `AudioMIDlet` 使用的文件 `relax.wav` 非常小（1530 字节）。较大的媒体文件会产生更明显的延迟。\n\n与网络和持久存储操作一样，任何与\
  \ Player 相关的耗时操作都应在与用户界面线程分离的线程中执行。虽然 `start()` 方法不会阻塞，但 `realize()` 和 `prefetch()`\
  \ 在完成其可能缓慢的工作之前不会返回。\n\n\n\n## 控制播放器\n\n播放器的*媒体时间*是指其在音频播放中的当前位置。例如，一个播放 4 秒音频片段且进度过半的播放器，其媒体时间为\
  \ 2,000,000 微秒。若想跳转到音频片段的特定位置，可调用`setMediaTime()`。通过`getMediaTime()`可获取当前媒体时间。音频片段的总时长由`getDuration()`返回。对于某些类型的流媒体，时长可能无法确定，此时将返回特殊值`TIME_UNKNOWN`。\n\
  \n播放器还可以循环播放，即反复播放同一音频片段。你可以在播放器启动前调用`setLoopCount()`来控制此行为。传入值-1 可实现无限循环。\n\n播放器接口之外是一个完整的控件世界。你可以通过调用`getControls()`（播放器从`Controllable`接口继承的方法）获取播放器的控件列表。该方法返回适用于该播放器的控件数组。ABB\
  \ 仅定义了`VolumeControl`和`ToneControl`，但具体实现可自由提供其他适用于其所支持内容类型和协议的控件。\n\n若只需获取单个控件，可将控件名称传递给播放器的`getControl()`方法（同样继承自`Controllable`）。该名称是`javax.microedition.media.control`包中某个接口的名称。\n\
  \n播放器必须至少处于`REALIZED`状态才能返回其控件。\n\n例如，要使用`VolumeControl`将播放音量设置为最大音量的一半，可以这样操作：\n\
  \n```\n// Player player = Manager.createPlayer(...);\nplayer.prefetch();\nVolumeControl\
  \ vc = (VolumeControl)player.getControl(\"VolumeControl\");\nvc.setLevel(50);\n\
  ```\n\n## 监听播放器事件\n\n播放器包含用于添加和移除监听器的方法，这些监听器将收到播放器生命周期中各种里程碑事件的通知：\n\n```\npublic\
  \ void addPlayerListener(PlayerListener playerListener)\npublic void removePlayerListener(PlayerListener\
  \ playerListener)\n```\n\n`PlayerListener`定义了一个单一方法，该方法会随各种信息消息被调用：\n\n```\npublic\
  \ void playerUpdate(Player player, String event, Object eventData)\n```\n\n其中`player`参数自然是生成事件的播放器。事件由字符串`event`描述，并可能包含附加信息`eventData`。`PlayerListener`接口中的常量描述了常见事件：`STARTED`、`END_OF_MEDIA`和`VOLUME_CHANGED`等。完整列表请参阅\
  \ API 文档。\n\n## 音调与音调序列\n\n你已经看到使用`Manager`播放单个音调是多么简单。在 MIDP 2.0 媒体 API 中隐藏着一个更为复杂的音调序列播放器。它是在播放器和控件架构中实现的，考虑到音调序列与采样音频几乎没有共同点，这算是一种权宜之计。\n\
  \n要获取音调序列播放器，只需将特殊值（`Manager`的`TONE_DEVICE_LOCATOR`）传递给`createPlayer()`。如果你查看`TONE_DEVICE_LOCATOR`，会发现它的值是`\"\
  device://tone\"`，这大致意味着一个\"设备\"协议和\"audio/x-tone-seq\"内容类型。你可能还记得在`MediaInformationMIDlet`的输出中见过它。正如我所说，这算是一种权宜之计。\n\
  \n一旦获取了音调序列播放器，就可以通过其关联的`ToneControl`对象为其提供音调序列。要获取此控件，请调用`getControl(\"ToneControl\"\
  )`。（记住，播放器需要先处于`REALIZED`状态。）\n\n`ToneControl`封装了一个字节数组，其语法和构造在 API 文档中描述得晦涩难懂。掌握它之后，你就能像鲍比·麦克费林那样，将任何歌曲变成单声道杰作。我将描述字节数组格式并给出几个示例。\n\
  \n音调本身由音符编号和持续时间对定义。音符编号与`Manager`的`playTone()`方法相同，其中 60 是中央 C，69 是中央 C 上方的 440\
  \ 赫兹 A 音。持续时间以*分辨率*的倍数指定。默认情况下，音调序列的分辨率是 4/4 拍（四拍）中一小节的 1/64。因此，持续时间 64 对应全音符（四拍），16\
  \ 对应四分音符（一拍），8 是八分音符，以此类推。\n\n所有音调序列必须以版本号开头。这不是你的数据版本，而是你正在使用的音调序列格式的版本。目前唯一接受的版本是\
  \ 1。一个简单的音调序列如下所示：\n\n```\nbyte[] sequence = new byte[] {\n  ToneControl.VERSION,\
  \ 1,\n  67, 16, // 那\n  69, 16, // 山\n  67,  8, // 丘\n  65,  8, // 充\n  64, 48,\
  \ // 满\n  62,  8, // 了\n  60,  8, // 生\n  59, 16, // 机\n  57, 16, // 的\n  59, 32,\
  \ // 音\n  59, 32  // 乐\n}; \n```\n\n此音调序列依赖于几个默认值。默认速度为每分钟 120 拍（bpm），默认分辨率为 1/64。默认音量为\
  \ 100（最大音量）。\n\n音调序列中还有其他可用功能。可以实现相当程度的控制：\n\n*   使用`TEMPO`常量设置速度，传入的速度值（以每分钟拍数为单位）需除以四。例如，`ToneControl.TEMPO,\
  \ 15`将速度设置为 60 bpm，即每秒一拍。此操作只能在序列开头（在`VERSION`之后）执行一次。\n\n*   可以使用`RESOLUTION`常量更改默认的\
  \ 1/64 分辨率。传入的参数是分母，例如，使用`ToneControl.RESOLUTION, 64`将恢复默认的 1/64 分辨率。此操作只能在序列开头（在`TEMPO`之后）执行一次。\n\
  \n*   可以定义可重用的音调*块*。要开始块定义，请使用`ToneControl.BLOCK_START`并提供块编号。然后提供该块中的音符和持续时间。要结束块定义，请使用`ToneControl.BLOCK_END`并提供相同的块编号。要实际播放一个块，请使用`ToneControl.PLAY_BLOCK`并提供要播放的块编号。块必须在序列中的`VERSION`、`TEMPO`和`RESOLUTION`之后定义。\n\
  \n*   可以在序列中的任何时刻设置音量，以实现戏剧性的动态效果。例如，`ToneControl.SET_VOLUME, 25`将音量设置为最大值的四分之一。\n\
  \n*   要表示特定时长的休止符，请使用特殊音符值`ToneControl.SILENCE`。\n\n*   可以多次重复单个音符。例如，`ToneControl.REPEAT,\
  \ 7, 60, 16`以持续时长 16 播放中央 C（60）7 次。\n\n\n\n清单 12-4 中的 MIDlet 包含几个示例，可帮助你编写自己的音调序列。\n\
  \n清单 12-4：单声道经典老歌\n\n| **![示例开始](img/_1.gif)** |\n\n```\nimport java.io.*;\n\nimport\
  \ javax.microedition.io.*;\nimport javax.microedition.lcdui.*;\nimport javax.microedition.midlet.*;\n\
  import javax.microedition.media.*;\nimport javax.microedition.media.control.*;\n\
  \npublic class ToneMIDlet\n    extends MIDlet\n    implements CommandListener {\n\
  \  private final static String kSoundOfMusic = \"音乐之声\";\n  private final static\
  \ String kQuandoMenVo = \"漫步街上\";\n  private final static String kTwinkle = \"小星星变奏曲\
  \ VII\";\n\nprivate Display mDisplay;\n  private List mMainScreen;\n\npublic void\
  \ startApp() {\n    mDisplay = Display.getDisplay(this);\n\nif (mMainScreen == null)\
  \ {\n      mMainScreen = new List(\"音频 MIDlet\", List.IMPLICIT);\n\nmMainScreen.append(kSoundOfMusic,\
  \ null);\n      mMainScreen.append(kQuandoMenVo, null);\n      mMainScreen.append(kTwinkle,\
  \ null);\n      mMainScreen.addCommand(new Command(\"退出\", Command.EXIT, 0));\n\
  \      mMainScreen.addCommand(new Command(\"播放\", Command.SCREEN, 0));\n      mMainScreen.setCommandListener(this);\n\
  \    }\n\nmDisplay.setCurrent(mMainScreen);\n  }\n\npublic void pauseApp() {}\n\n\
  public void destroyApp(boolean unconditional) {}\n  public void commandAction(Command\
  \ c, Displayable s) {\n    if (c.getCommandType() == Command.EXIT) notifyDestroyed();\n\
  \    else run();\n  }\n\npublic void run() {\n    String selection = mMainScreen.getString(\n\
  \        mMainScreen.getSelectedIndex());\n\nbyte[] sequence = null;\n    if (selection.equals(kSoundOfMusic))\
  \ {\n      sequence = new byte[] {\n        ToneControl.VERSION, 1,\n        67,\
  \ 16, // 那\n        69, 16, // 山\n        67,  8, // 是\n        65,  8, // 充 -\n\
  \        64, 48, // 满\n        62,  8, // 生\n        60,  8, // 机\n        59, 16,\
  \ // 的\n        57, 16, // 声\n        59, 32, // 音 -\n        59, 32  // 啊\n   \
  \   };\n    }\n    else if (selection.equals(kQuandoMenVo)) {\n      sequence =\
  \ new byte[] {\n        ToneControl.VERSION, 1,\n        ToneControl.TEMPO, 22,\n\
  \        ToneControl.RESOLUTION, 96,\n        64, 48, ToneControl.SILENCE, 8, 52,\
  \ 4, 56, 4, 59, 4, 64, 4,\n        63, 48, ToneControl.SILENCE, 8, 52, 4, 56, 4,\
  \ 59, 4, 63, 4,\n        61, 72,\n        ToneControl.SILENCE, 12, 61, 12,\n   \
  \         63, 12, 66, 2, 64, 10, 63, 12, 61, 12,\n        64, 12, 57, 12, 57, 48,\n\
  \        ToneControl.SILENCE, 12, 59, 12,\n            61, 12, 64, 2, 63, 10, 61,\
  \ 12, 59, 12,\n        63, 12, 56, 12, 56, 48,\n      };\n    }\n    else if (selection.equals(kTwinkle))\
  \ {\n      sequence = new byte[] {\n        ToneControl.VERSION, 1,\n        ToneControl.TEMPO,\
  \ 22,\n        ToneControl.BLOCK_START, 0,\n        60, 8,        62, 4, 64, 4,\
  \ 65, 4, 67, 4, 69, 4, 71, 4,\n        72, 4, 74, 4, 76, 4, 77, 4, 79, 4, 81, 4,\
  \ 83, 4, 84, 4,\n        83, 4, 81, 4, 80, 4, 81, 4, 86, 4, 84, 4, 83, 4, 81, 4,\n\
  \        81, 4, 79, 4, 78, 4, 79, 4, 60, 4, 79, 4, 88, 4, 79, 4,\n        57, 4,\
  \ 77, 4, 88, 4, 77, 4, 59, 4, 77, 4, 86, 4, 77, 4,\n        56, 4, 76, 4, 86, 4,\
  \ 76, 4, 57, 4, 76, 4, 84, 4, 76, 4,\n        53, 4, 74, 4, 84, 4, 74, 4, 55, 4,\
  \ 74, 4, 83, 4, 74, 4,\n        84, 16, ToneControl.SILENCE, 16,\n        ToneControl.BLOCK_END,\
  \ 0,\n        ToneControl.BLOCK_START, 1,\n        79, 4, 84, 4, 88, 4, 86, 4, 84,\
  \ 4, 83, 4, 81, 4, 79, 4,\n        77, 4, 76, 4, 74, 4, 72, 4, 71, 4, 69, 4, 67,\
  \ 4, 65, 4,\n        64, 8,        76, 8,        77, 8,        78, 8,\n        79,\
  \ 12,              76, 4, 74, 8, ToneControl.SILENCE, 8,\n        ToneControl.BLOCK_END,\
  \ 1,\n\nToneControl.SET_VOLUME, 100, ToneControl.PLAY_BLOCK, 0,\n        ToneControl.SET_VOLUME,\
  \ 50, ToneControl.PLAY_BLOCK, 0,\n        ToneControl.SET_VOLUME, 100, ToneControl.PLAY_BLOCK,\
  \ 1,\n        ToneControl.SET_VOLUME, 50, ToneControl.PLAY_BLOCK, 1,\n        ToneControl.SET_VOLUME,\
  \ 100, ToneControl.PLAY_BLOCK, 0,\n      };\n    }\n    try {\n      Player player\
  \ = Manager.createPlayer(Manager.TONE_DEVICE_LOCATOR);\n      player.realize();\n\
  \      ToneControl tc = (ToneControl)player.getControl(\"ToneControl\");\n     \
  \ tc.setSequence(sequence);\n      player.start();\n    }\n    catch (Exception\
  \ e) {\n      Alert a = new Alert(\"异常\", e.toString(), null, null);\n      a.setTimeout(Alert.FOREVER);\n\
  \      mDisplay.setCurrent(a, mMainScreen);\n    }\n  }\n} \n```\n\n| **![示例结束](img/_1.gif)**\
  \ |\n\n|  |\n\n请记住，Player 的`start()`方法不会阻塞。如果你愿意，可以在模拟器中同时启动所有三首歌曲。这是因为工具包模拟器使用和弦设备来播放音调序列。在真实设备上，同时播放多个序列可能无法实现。但你可以设置一个序列运行，假设它不会占用太多处理器时间，你的\
  \ MIDlet 就可以去执行其他任务，比如绘制游戏界面或连接网络。\n\n## 移动媒体 API\n\nMIDP 2.0 的音频支持是移动媒体 API 全部功能的一个子集。如果你使用的是\
  \ J2ME 无线工具包，其模拟器默认支持完整的 MMAPI。这意味着你可以使用其他 API，并且实现支持多种额外的内容类型。\n\n如果你想移除 MMAPI\
  \ 支持，仅保留 MIDP 2.0 音频，请从 KToolbar 菜单中选择**编辑** Ø **首选项**，然后点击**API 可用性**选项卡。如果你不希望使用**移动媒体\
  \ API**，可以取消勾选。\n\n如果你使用的是工具包的 MMAPI 实现，可以在首选项窗口的**MMedia**选项卡中自定义支持的内容类型和媒体功能。\n\
  \n有关 MMAPI 的更多信息，请参见[`wireless.java.sun.com/apis/articles/mmapi_overview/`](http://wireless.java.sun.com/apis/articles/mmapi_overview/)。\n\
  \n## 总结\n\n在本章中，你学习了如何在 MIDP 2.0 中播放音调和采样音频。MIDP 2.0 包含了移动媒体 API 的一个子集——音频构建模块。它基于能够渲染音频数据的\
  \ Player 和知道如何将音频数据传输到 Player 的隐式协议对象。除了对采样音频的可选和灵活支持外，ABB 还包含音调序列播放器。现在，你的 MIDlet\
  \ 可以受益于音乐和采样音频带来的乐趣。\n\n"
- "# 第 13 章：性能调优\n\n## 概述\n\nMIDP 是一个小型平台。MIDP 设备上的处理器可能比典型的桌面计算机处理器慢得多，可用内存也小得多。让你的应用程序运行快速且精简非常重要。你需要节约使用内存，使应用程序运行速度足够快以便于使用，并合理组织代码结构，使代码本身尽可能小。\n\
  \n本章描述了对你现有代码进行基准测试的简单方法。然后继续介绍各种优化方法，这些方法可以使你的代码运行更快或使用更少的内存。常识会对你大有帮助，但本章致力于为你提供优化应用程序的基本技术。\n\
  \n重要的经验法则是：只在需要的地方进行优化。换句话说：如果没坏，就别修。我建议你在编写应用程序的第一版时，应专注于代码的整洁性和可维护性。如果存在性能问题，找出它们并开始优化。你不应该在编写代码的同时进行优化——这很可能导致代码难以阅读和维护。先编写，再测试，最后优化。\n\
  \n\n\n## 基准测试\n\n在 J2SE 领域，有许多工具可用于检查代码性能、瓶颈位置以及内存使用情况。遗憾的是，在 J2ME 领域，这些工具几乎不可用。大多数情况下，你只能采用传统方式进行基准测试。为此，MIDP\
  \ API 中提供了几种有用的方法。要测试内存使用情况，你可以使用 `java.lang.Runtime` 中的以下方法：\n\n```\npublic long\
  \ freeMemory()\npublic long totalMemory()\n```\n\n第一个方法返回当前可用内存的字节数。第二个方法返回当前运行时环境中的总字节数，无论这些字节是否被对象使用。有趣的是，这个数字可能会发生变化，因为宿主环境（设备操作系统）可能会为\
  \ Java 运行时环境分配更多内存。\n\n要查明一个对象使用了多少内存，你可以这样做：\n\n```\nRuntime runtime = Runtime.getRuntime();\n\
  long before, after;\nSystem.gc();\nbefore = runtime.freeMemory();\nObject newObject\
  \ = new String();\nafter = runtime.freeMemory();\nlong size = before - after;\n\
  ```\n\n除了检查内存使用情况，你可能还会关心应用程序的速度。同样，你可以用传统方式测试——在开始执行某项操作前查看时钟，操作完成后再查看一次。相关方法来自\
  \ `java.lang.System` 类：\n\n```\npublic static long currentTimeMillis()\n```\n\n\
  你可以像这样计算某个方法的执行时间：\n\n```\nlong start, finish;\nstart = System.currentTimeMillis();\n\
  someMethod();\nfinish = System.currentTimeMillis();\nlong duration = finish - start;\n\
  ```\n\n为了获得精确的时间测量，你应该多次测量持续时间并计算平均值。\n\n## J2ME Wireless Toolkit 中的诊断工具\n\n从 1.0.4\
  \ 版本开始，J2ME Wireless Toolkit 包含了三个可用于了解应用程序性能的工具。\n\n第一个工具是内存监视器。你可以查看应用程序随时间变化的内存使用情况图表，或者应用程序中每个对象的详细分解信息。通过从\
  \ KToolbar 菜单中选择 **编辑** Ø **首选项** 来打开内存监视器。点击 **监视** 选项卡，并勾选 **启用内存监视器**。下次运行模拟器时，会弹出一个额外的窗口。你可以检查已使用的总内存，这在尝试让应用程序适配堆大小有限的设备时非常有用。（你甚至可以在首选项窗口的\
  \ **存储** 选项卡中设置模拟器的堆大小。）图 13-1 显示了内存监视器图表。\n\n![点击展开](img/fig259_01_0.jpg)\n图 13-1：内存使用随时间变化的图表\n\
  \n如果你点击内存监视器窗口中的 **对象** 选项卡，会看到应用程序中对象的详细列表。图 13-2 显示了此视图。\n\n![点击展开](img/fig259_02_0.jpg)\n\
  图 13-2：对象及其内存\n\n你可以点击表格中的任何列来按该列排序。你甚至可以使用 **视图** Ø **查找** 来搜索特定项目。检查内存监视器窗口将帮助你识别应用程序中内存消耗最多的地方。\n\
  \n除了内存监视器，该工具包还包括一个 *代码分析器*——一个显示应用程序中每个方法耗时情况的工具。要打开分析器，从 KToolbar 菜单中选择 **编辑**\
  \ Ø **首选项**。选择 **监视** 选项卡并勾选 **启用分析**。\n\n在退出模拟器之前，你不会看到分析器。退出时，分析器窗口会弹出，总结上次模拟器运行期间应用程序中每个方法的耗时。请注意，你在模拟器中的操作会影响分析器的输出；如果你想测试整个应用程序的性能，必须执行其所有选项。图\
  \ 13-3 显示了运行第 11 章中的 QuatschMIDlet 示例后的模拟器。\n\n![点击展开](img/fig260_01_0.jpg)\n图 13-3：分析器对所有内容计时。\n\
  \n最后，J2ME Wireless Toolkit 还包含一个网络监视器。虽然它可能对调试网络协议比对优化更有用，但这里值得一提。要打开网络监视器，从 KToolbar\
  \ 菜单中选择 **编辑** Ø **首选项**。选择 **监视** 选项卡并勾选 **启用网络监视**。下次运行模拟器时，会弹出一个跟踪网络使用情况的新窗口。图\
  \ 13-4 显示了来自 PeekAndPick 应用程序 ([`wireless.java.sun.com/applications/peekandpick/2.0/`](http://wireless.java.sun.com/applications/peekandpick/2.0/))\
  \ 的一些网络交互。\n\n![点击展开](img/fig261_01_0.jpg)\n图 13-4：PeekAndPick 应用程序的网络活动\n\n## 优化内存使用\n\
  \nJ2SE 程序员很容易对内存使用掉以轻心。毕竟，有了垃圾回收器，你就不必担心显式释放内存——不再使用的对象会被运行在低优先级线程中的垃圾回收器神奇地回收。然而，在\
  \ J2ME 领域，内存是稀缺的，应该谨慎对待。此外，内存分配和垃圾回收器的工作都可能拖慢应用程序的速度。在本节中，我们将探讨高效使用对象的技术，特别是针对 `String`\
  \ 和 `StringBuffer`。最后，我将讨论在确实没有剩余内存的情况下如何优雅地处理这种情况。\n\n### 创建和丢弃对象\n\n如果你在循环内部创建新对象，这应该在你的脑海中敲响警钟。每次创建对象（使用\
  \ `new`）时，都会分配内存。分配内存需要时间。更糟糕的是，在循环开始时创建的对象很可能在循环结束时超出作用域，这意味着循环的每次迭代都会使运行时系统更接近运行垃圾回收器。以下是一个示例：\n\
  \n```\n// 设置输入和结果数组。\nObject[] inputs = new Object[1000];\nint[] results = new int[1000];\n\
  // 处理每个输入以计算结果。\nint length = inputs.length;\nfor (int i = 0; i < length; i++) {\n\
  \  Processor p = new Processor(inputs[i]);\n  results[i] = p.calculateResult();\n\
  }\n```\n\n在循环中创建对象会在性能方面造成双重惩罚。每次循环都会创建一个新的 `Processor`；如果这些对象足够大，那么在循环结束之前可能会强制进行一次或多次垃圾回收。你需要在对象首次创建时付出代价，然后在对象被垃圾回收时再次付出代价。\n\
  \n你几乎总是可以重构代码来避免这个问题。例如，你可以这样做，而不是为每个输入创建一个新的 `Processor`：\n\n```\n// 设置输入和结果数组。\n\
  Object[] inputs = new Object[1000];\nint[] results = new int[1000];\n// 处理每个输入以计算结果。\n\
  int length = inputs.length;\nProcessor p = new Processor();\nfor (int i = 0; i <\
  \ length; i++) {\n  p.setInput(inputs[i]);\n  results[i] = p.calculateResult();\n\
  } \n```\n\n\n\n### 字符串与 StringBuffer\n\n字符串在 Java 中拥有特殊地位。它们是唯一支持加号运算符（+）重载的对象。每次使用加号运算符拼接字符串时需谨慎——在幕后，很可能正在为你创建新的\
  \ String 和 StringBuffer 对象。\n\nString 与 StringBuffer 之间存在着微妙的关系。当你创建并修改 StringBuffer\
  \ 时，实际操作是在内部字符数组上进行的。当你从 StringBuffer 创建 String 时，该 String 会指向同一个字符数组。到目前为止一切正常，对吧？但如果你进一步修改\
  \ StringBuffer，它会巧妙地创建一个新的字符数组——即原数组的副本。因此，虽然 StringBuffer 通常是创建字符串的高效方式，但新对象究竟在何时创建并不总是显而易见。\n\
  \n这个故事给我们的启示是：但凡看到字符串拼接的地方，都可能正在创建新对象。如果你在循环中拼接字符串，就应该考虑采用不同的方法，可能涉及 StringBuffer。另一种可能的优化是彻底放弃\
  \ String 和 StringBuffer，直接使用字符数组。虽然这在你自己的代码中可能是快速高效的解决方案，但请记住，许多 API 要求将字符串作为参数，并从方法返回字符串，因此你最终可能需要在字符数组和字符串之间进行大量转换。\n\
  \n### 优雅地处理失败\n\n鉴于典型 MIDP 设备内存匮乏，你的应用程序每次请求内存时都应做好失望的准备。每次创建对象时，代码都应捕获`java.lang.OutOfMemoryError`。由你来捕获\
  \ OutOfMemoryError 远比宿主环境捕获要好得多。至少你有机会做一些合理的事情——释放一些内存并重试，或者向用户显示措辞礼貌的消息来优雅地失败。宿主环境不太可能如此友善，用户对你应用的观感也会糟糕得多。请记住，你可能需要先丢弃大型数据结构来释放内存，然后才有足够空间创建用于向用户显示消息的\
  \ Alert。\n\n## 为速度而编码\n\n小型设备配备的是小型且相对较慢的处理器。作为开发者，你的部分任务是确保应用程序运行速度足够快，以免用户拒绝使用。\n\
  \n### 优化循环\n\n一个简单的优化与循环有关。遍历 Vector v 的典型循环可能如下所示：\n\n```\nfor (int i = 0; i <\
  \ v.size(); i++) {\n  Object o = v.elementAt(i);\n  // 处理 Object o。\n}\n```\n\n\
  每次循环时，都会调用 v 的 size()方法。优化版本会先存储向量的大小，如下所示：\n\n```\nint size = v.size();\nfor (int\
  \ i = 0; i < size; i++) {\n  Object o = v.elementAt(i);\n  // 处理 Object o。\n}\n\
  ```\n\n这是一个简单的例子，但它说明循环条件是你寻找速度优化的一个切入点。\n\n### 使用数组替代对象\n\n数组通常比集合类更快、更精简。我们在前面讨论字符串和\
  \ StringBuffer 时已经触及这个主题；如果不太笨拙的话，直接使用字符数组可能比处理 String 和 StringBuffer 对象更高效。同样的规则也适用于\
  \ MIDP 集合类 Vector 和 Hashtable。虽然 Vector 和 Hashtable 简单方便，但它们确实会带来一些可以削减的开销。Vector\
  \ 本质上只是数组的一个包装器，因此如果你能直接使用数组，就能节省一些内存和处理时间。同样，如果你有简单的键对象到值对象的映射，使用对象数组可能比使用 Hashtable\
  \ 更合理。\n\n如果你决定使用 Hashtable 或 Vector，请在创建时尽量正确指定其大小。Vector 和 Hashtable 都会根据需要增长，但这一操作相对昂贵。Vector\
  \ 会创建新的内部数组，并将元素从旧数组复制到新数组。Hashtable 会分配新数组，并执行一种计算开销很大的操作，称为*rehashing*（再哈希）。Vector\
  \ 和 Hashtable 都有允许你指定集合初始大小的构造函数。你应该尽可能准确地指定这些集合的初始大小。\n\n如果你正在使用持久存储 API，可能会倾向于将流类包装在记录数据周围。例如，你可能读取一条记录，然后在记录数据周围包装一个\
  \ ByteArrayInputStream，再在 ByteArrayInputStream 周围包装一个 DataInputStream，以便从记录中读取基本类型。这很可能过于笨重而不实用。如果可能的话，请直接操作记录的字节数组。\n\
  \n### 使用缓冲 I/O\n\n不要从流中逐个字节地读取，也不要逐个字节地写入。虽然流类提供了读写单个字节的方法，但你应该尽可能避免使用它们。读取或写入整个数据数组几乎总是更高效。\n\
  \nJ2SE 提供了 BufferedReader 和 BufferedWriter 类，可以\"免费\"提供缓冲功能。在 MIDP 领域则没有这样的奢侈功能，因此如果你想使用缓冲，就必须自己实现。\n\
  \n\n\n### 保持整洁\n\n一个简单的建议是及时清理。一旦使用完毕就释放资源，可以提升应用程序的性能。如果你有内部数组或数据结构，在不使用时应当释放它们。一种方法是将数组引用设为\
  \ null，以便数组能被垃圾回收。如果你急于将内存归还给运行时系统，甚至可以显式调用垃圾回收器 `System.gc()`。\n\n网络连接也应在使用完毕后立即释放。一个很好的做法是使用\
  \ `finally` 子句。考虑以下未使用 `finally` 子句的代码：\n\n```\nHttpConnection hc = null;\nInputStream\
  \ in = null;\ntry {\n  hc = (HttpConnection)Connector.open(url);\n  in = hc.openInputStream();\n\
  \  // 从 in 中读取数据。\n  in.close();\n  hc.close();\n}\ncatch (IOException ioe) {\n\
  \  // 处理异常。\n} \n```\n\n问题在于，当尝试从连接的输入流读取数据时如果抛出异常，执行流程会跳转到异常处理程序，导致输入流和连接从未被关闭。在内存充裕的\
  \ J2SE 环境中，这可能不是什么大问题。但在 MIDP 设备上，一个挂起的连接可能是一场灾难。当你绝对、肯定地想要确保某些代码被执行时，应该将其放入 `finally`\
  \ 块中，如下所示：\n\n```\nHttpConnection hc = null;\nInputStream in = null;\ntry {\n  hc\
  \ = (HttpConnection)Connector.open(url);\n  in = hc.openInputStream();\n  // 从 in\
  \ 中读取数据。\n}\ncatch (IOException ioe) {\n  // 处理异常。\n}\nfinally {\n  try {\n    if\
  \ (in != null) in.close();\n    if (hc != null) hc.close();\n  }\n  catch (IOException\
  \ ioe) { }\n}\n```\n\n这看起来有点丑陋，尤其是 `finally` 块内部的 `try` 和 `catch`。一个更简洁的解决方案是将这段代码封装到一个方法中，并声明该方法抛出\
  \ `IOException`。这能显著简化代码：\n\n```\nprivate void doNetworkStuff(String url) throws\
  \ IOException {\n  HttpConnection hc = null;\n  InputStream in = null;\n  try {\n\
  \    hc = (HttpConnection)Connector.open(url);\n    in = hc.openInputStream();\n\
  \    // 从 in 中读取数据。\n  }\n  finally {\n    if (in != null) in.close();\n    if (hc\
  \ != null) hc.close();\n  }\n} \n```\n\n`finally` 的关键在于，无论控制流如何离开 `try` 块，其代码都会被执行。无论是抛出异常、有人调用\
  \ `return`，还是控制流正常离开 `try` 块，我们的 `finally` 块都会被执行。注意，这里仍然存在一点小隐患：如果在尝试关闭 `in` 时抛出异常，那么\
  \ `hc` 将永远不会被关闭。你可以将每个 `close()` 调用分别放在自己的 `try` 和 `catch` 块中来解决这个问题。\n\n保持整洁适用于任何类型的流、记录存储和记录枚举。任何可以关闭的资源都应该被关闭，最好是在\
  \ `finally` 块中。\n\n### 优化用户界面\n\n重要的是要记住，你试图优化的是应用程序的*感知*速度，而非实际速度。如果应用程序冻结几秒钟，用户会变得焦躁不安；添加某种进度指示器可以大大提升用户满意度。你确实无法让网络运行得更快，但如果你显示一个旋转的时钟或移动的进度条，你的应用程序至少在等待网络时看起来还活着。\n\
  \n请记住，手机和其他小型“消费类”设备的用户会比典型的桌面电脑用户要求高得多。经过多年的体验，饱受折磨的桌面电脑用户对应用程序的期望已经相当低。他们意识到大多数桌面应用程序都有学习曲线，并且经常难以驾驭。而消费类设备则更有可能第一次就正常工作，既不需要手册，也不需要高级学位才能操作。\n\
  \n考虑到这一点，请确保你的 MIDlet 用户界面简单、快速、响应迅速且信息丰富。\n\n## 优化应用程序部署\n\n最后一个优化领域与应用程序的实际部署有关。你可能还记得第\
  \ 3 章，MIDlet 被打包在 MIDlet 套件中，这实际上就是一些花哨的 JAR 文件。优化应用程序的一种方法是划分你的类，以便只将需要的类加载到运行时环境中。如果小心处理，你可以通过消除不需要的类来减小\
  \ MIDlet 套件 JAR 的大小。最后，可以使用代码混淆器来进一步减小 MIDlet 套件 JAR 的大小。\n\n### 划分你的应用程序\n\nMIDP\
  \ 运行时环境在需要时加载类。你可以利用这一点来优化应用程序的运行时占用空间。例如，假设你编写了一个约会簿应用程序，它能够向你发送提醒邮件，或称*提醒器*。你可能会意识到许多人不会使用提醒器功能。如果用户不使用提醒器，为什么提醒器代码要占用\
  \ MIDP 设备上的空间呢？如果你正确地划分代码，所有提醒器功能都可以封装在一个单独的类中。如果应用程序的其他部分从未调用提醒器代码，该类就不会被加载，从而获得更精简的运行时占用空间。\n\
  \n### 只包含你需要的类\n\n你可能在 MIDlet 套件中使用了第三方包，例如 XML 解析器（参见第 14 章）或加密包（参见第 15 章）。在开发阶段，你可能只是将整个包转储到\
  \ MIDlet 套件中。但在部署时，你应该修剪掉多余的包，以减小 MIDlet 套件 JAR 的大小。在某些情况下，这会相当容易，比如如果你只是解析 XML，就可以丢弃\
  \ WAP 支持类。其他时候，哪些类需要、哪些可以去掉则不那么明显。然而，如果你真的想减小 MIDlet 套件 JAR 的大小，这是一个关键步骤。你不需要手动完成这项工作；一个*混淆器*会为你代劳。\n\
  \n### 使用混淆器\n\n最后，一个*字节码混淆器*可以减小类文件的大小。字节码混淆器是一种旨在使反编译类文件变得困难工具。反编译是一个过程，通过它，某人可以重新创建用于生成特定类文件的源代码。担心竞争对手窃取代码的人会使用混淆器来增加反编译的难度。然而，混淆有一个副作用，即减小类文件的大小，这主要是因为你所创建的描述性方法和变量名被替换成了机器生成的小名称。如果你非常认真地想要减小\
  \ MIDlet 套件 JAR 的大小，请尝试混淆你的代码。我建议在预验证类文件之前运行混淆器，但反过来操作也是可行的。以下是两个可供入门的混淆器：\n\n```\n\
  http://proguard.sourceforge.net/\nhttp://www.retrologic.com/retroguard-main.html\
  \ \n```\n\n\n\n## 摘要\n\nMIDP 应用程序的目标是在小型平台上运行，这意味着高效使用内存和处理能力至关重要。创建和销毁对象的开销很大，因此优化代码的一种方法是减少创建对象的数量。新对象的一个常见来源是创建字符串的代码。考虑使用\
  \ `StringBuffer` 或字符数组来优化字符串操作。同样，你可以通过使用对象数组代替 `Vector` 或 `Hashtable` 来精简代码。请记住，性能在很大程度上也关乎用户体验；提供一个响应迅速、交互活跃的用户界面，并优雅地处理故障。你还可以通过多种方式优化应用程序的交付。首先，智能地划分应用程序的功能可以减少其运行时占用空间。其次，裁剪多余的类可以减小\
  \ MIDlet 套件 JAR 文件的大小。最后，字节码混淆器可以进一步减小 MIDlet 套件 JAR 文件的大小。\n\n"
- "# 第 14 章：解析 XML\n\n在桌面和企业级应用中，Java 和 XML 是一对黄金组合。简而言之，Java 是可移植的代码，而 XML 是可移植的数据。使用\
  \ Java 开发，你能够将代码部署到许多不同的平台上，而 XML 则提供了一种高度可移植的数据格式，用于在应用程序组件以及应用程序本身之间交换数据。\n\n\
  XML 的流行也延伸到了 J2ME 世界。本章介绍可用于 MIDP 环境的 XML 解析器。这些内容非常有趣，正处在 J2ME 开发的前沿。相关标准正在制定中，但尚未最终确定。有关\
  \ XML 解析和 Web 服务的 JSR 详情，请参见 [`jcp.org/en/jsr/detail?id=172`](http://jcp.org/en/jsr/detail?id=172)。\n\
  \n## XML 概述\n\nXML 即可扩展标记语言。一个 XML 文件是由标签分隔的数据集合。XML 文件是结构化的，并且具有高度的可移植性。\n\n让我们再次回顾第\
  \ 2 章中的 Jargoneer 应用程序。在该应用中，MIDP 设备与一个中间服务器通信。该服务器从 Jargon 文件服务器检索 HTML 页面，执行解析，然后将精简后的数据版本发送到\
  \ MIDP 设备。图 14-1 展示了这种架构。\n\n![点击展开](img/fig271_01_0.jpg)\n图 14-1：*Jargoneer* 的简单架构\n\
  \n那么，究竟什么数据可以从中间服务器发送到 MIDP 设备呢？Jargoneer 示例应用实际上发送的是纯文本，但还有许多其他可能性。在服务器和设备之间交换数据的次简单技术是使用属性文件，如下所示：\n\
  \n```\nword: grok\npronunciation: /grok/\ntype: vt.\nmeaning: from the novel \"\
  Stranger in ...\n```\n\n这种方法效果不错，对于简单的应用来说可能就足够了。你需要编写一个类来解析此输入（MIDP 不包含 `java.util.Properties`），但这并不太难。\n\
  \n然而，你的应用程序的某些部分很可能已经在使用 XML，如果你的 MIDlet 能够解析 XML 而不是使用其特定的数据格式，这可能会大大简化你的工作。此外，在开发周期中使用\
  \ XML 验证可能有助于发现错误。\n\n那么，同样的信息作为 XML 文件，可能看起来像这样：\n\n```\n<?xml version=\"1.0\"\
  \ encoding=\"ISO-8859-1\"?>\n<jargon-definition>\n  <word>grok</word>\n  <pronunciation>/grok/</pronunciation>\n\
  \  <type>vt.</type>\n  <meaning>[from the novel \"Stranger in ...</meaning>\n</jargon-definition>\n\
  ```\n\n这个简单的 XML 文档说明了一些重要点。首先，标签标记了文档中的每一段数据（元素）。本质上，每个元素都有一个名称。匹配的开始和结束标签用于清晰地区分元素。例如，开始标签\
  \ `<word>` 和结束标签 `</word>` 包围了单词本身。还要注意，元素可以嵌套。`jargon-definition` 元素只是其他元素的集合。任何其他元素都可以包含进一步嵌套的元素。\n\
  \n元素标签也可以包含属性。编写上述 XML 文件的另一种方式如下：\n\n```\n<?xml version=\"1.0\" encoding=\"ISO-8859-1\"\
  ?>\n<jargon-definition word=\"grok\" pronunciation=\"/grok/\" type=\"vt.\">\n  [from\
  \ the novel \"Stranger in ...\n</jargon-definition> \n```\n\n如何构建 XML 数据完全取决于你。通常，这取决于你的应用程序结构以及你将与之交换数据的系统。\n\
  \n| **![开始侧边栏** |\n\n**XML 与 HTML\n\nXML 看起来很像 HTML，但有一些重要的区别。首先，HTML 有一套固定的标签，如\
  \ `<TITLE>`、`<BODY>`、`<H1>`、`<P>` 等。而在 XML 中，你可以定义任何你想要的标签。\n\nHTML 对于要求闭合标签也相当宽松。例如，HTML\
  \ 文档通常在每段开头有 `<P>` 标签，但很少会有匹配的 `</P>` 闭合标签。事实上，HTML 世界在文档格式方面通常相当松散。你可以向浏览器抛出各种奇怪的文档，它会尽力显示它们。\n\
  \n可以编写符合 XML 规范的 HTML；这就是 XHTML。有关 XHTML 的更多信息，请参见 [`www.w3.org/TR/xhtml1/`](http://www.w3.org/TR/xhtml1/)。\n\
  \n| **![结束侧边栏](img/_1.gif)** |\n\n|  |\n\n### 理解 SAX\n\nSAX 是 XML 的简单 API，是一个供希望解析\
  \ XML 数据的 Java 应用程序使用的标准 API。该 API 在线文档位于 [`www.megginson.com/SAX/`](http://www.megginson.com/SAX/)，但兼容\
  \ SAX 的解析器通常会将 SAX API 作为其软件的一部分包含在内。SAX 的当前版本是 2.0，但本章涵盖的小型解析器如果实现了 SAX，通常只达到 1.0\
  \ 级别。\n\nSAX 1.0 围绕 `org.xml.sax.Parser` 接口展开。`Parser` 有一个 `parse()` 方法，该方法解析整个\
  \ XML 文档，并向监听对象抛出事件。通常，你的应用程序会实现一个 `DocumentHandler`，它接收关于开始标签、结束标签、元素数据和其他重要事件的通知。一个\
  \ SAX 1.0 应用程序看起来像这样：\n\n```\ntry {\n  Parser p = new SAXParser(); // 创建一个特定的解析器实现。\n\
  \  // 创建一个名为 handler 的 DocumentHandler。\n  p.setDocumentHandler(handler);\n  p.parse();\n\
  }\ncatch (Exception e) { // 处理异常。 } \n```\n\n对 `parse()` 的调用会一直进行，直到文档被完全解析。在解析过程中，已注册的\
  \ `DocumentHandler` 中的回调方法会被调用。在这些方法中，你将处理来自 XML 文档的数据。\n\nSAX 1.0 并非开箱即用就能兼容 MIDP。`Parser`\
  \ 接口包含一个 `setLocale()` 方法，该方法引用了 `java.util.Locale` 类，而该类在 MIDP 平台中缺失。\n\n另一个标准\
  \ API，文档对象模型（DOM），采用了不同的 XML 解析方法。使用 DOM，解析器在解析文档时会创建一个文档的内部模型。解析完成后，应用程序可以检查整个文档。DOM\
  \ 在 [`www.w3.org/TR/DOM-Level-2-Core/`](http://www.w3.org/TR/DOM-Level-2-Core/)\
  \ 有进一步描述。尽管本章描述的所有解析器都没有直接实现 DOM，但其中一些确实遵循了 DOM 的范式，即创建已解析文档的内部表示。\n\n一个较新的 XML\
  \ 解析器 API 标准是 XmlPull，其文档位于 [`www.xmlpull.org/`](http://www.xmlpull.org/)。XmlPull\
  \ 由 kXML 2 实现，稍后将介绍 kXML 2。\n\n\n\n### 验证与开发周期\n\nXML 文档也可能引用文档类型定义（DTD）或 XML 模式；这些文件描述了特定类型\
  \ XML 文档的内容。例如，我们可以编写一个 DTD 来规定术语定义文档的内容。这是 XML 强大功能的一部分，也是 XML 有时被称为*自描述数据*的原因。\n\
  \n给定一个文档，你可以判断它是否符合其 DTD，这是确定系统某部分是否产生了系统其他部分无法读取的数据的好方法。用 XML 术语来说，遵循其 DTD 或模式规则的文档是*有效的*。在\
  \ J2SE 和 J2EE 世界中，解析器可以是验证型或非验证型的。J2ME 世界太小，无法支持 XML 文档验证，因此我们将在本章讨论的所有解析器都是非验证型的。\n\
  \n尽管你无法在 MIDP 设备上执行验证，但在开发和测试周期中，你很可能希望使用验证型解析器。例如，你可以编写模拟 MIDP 客户端的代码，让其从服务器请求数据并验证结果。这有助于在切换到\
  \ MIDP 客户端软件之前，清除服务器代码中的错误。\n\n### 设计技巧\n\n常识总能让你走得很远。在考虑如何在 MIDP 应用程序中使用 XML 时，请牢记三点：\n\
  \n*   **保持文档小巧。** 如果你要向 MIDP 设备发送一个约 100KB 的文档，却只使用其中几个元素，那么是时候重新考虑你的服务器端策略了。你很可能可以在服务器端转换文档，只将所需内容发送到设备。请记住，网络连接可能很慢，而且设备上的内存也不多。\n\
  \n*   **不要在发送给 MIDP 设备的 XML 中使用注释**，除非在开发周期中作为调试辅助。注释只会使文档变长，这意味着下载速度更慢，设备上的内存占用更多。\n\
  \n*   **选择适合你需求的解析器。** 我们将研究的一些解析器会在解析文档时在内存中构建整个文档模型。这就像给 XML 文档的提供者开了一张空白支票。如果服务器向你发送一个\
  \ 1MB 的文件，这类解析器会尝试读取整个文件，直到内存耗尽。另一方面，如果你知道要解析的文件大小，并且它们足够小，你可能会选择模型构建型解析器，因为它比其他类型的解析器稍微容易使用。\n\
  \n*   **考虑使用 XML 文档的紧凑表示形式。** 用 ASCII 或 Unicode 表示 XML 文档效率不高，并且有多种方案可以实现更紧凑的表示。事实上，WAP\
  \ 论坛已经定义了一种名为 WBXML 的二进制编码 XML 标准。一个名为 SWX 的解析器可以处理 WBXML，并且适用于像 MIDP 这样的小型平台：[`www.trantor.de/wbxml/`](http://www.trantor.de/wbxml/)。关于这个问题的另一种方法，请参见\
  \ [`jxme.jxta.org/`](http://jxme.jxta.org/) 上的 JXME 项目。\n\n最后，你可能会担心小型 XML 解析器的性能。这是一个合理的担忧，尤其是在处理器相对较慢的小型设备上。关于\
  \ XML 解析器性能的精彩对比，请参见 [`www.extreme.indiana.edu/~aslom/exxp/`](http://www.extreme.indiana.edu/~aslom/exxp/)。对于小型文档，小型解析器可以保持自己的优势，甚至超越大型解析器。\n\
  \n与其他可能耗时的操作一样，解析应该在其自己的线程中完成，以免用户界面冻结。\n\n## MIDP XML 解析器概览\n\n表 14-1 列出了可用于 MIDP\
  \ 平台的小型开源 XML 解析器。每个解析器都根据“许可证”列中列出的某种开源软件许可证发布。“大小”列显示了解析器压缩类文件的近似大小。“类型”列使用以下之一描述了解析范式：\n\
  \n*   “拉取”表示程序员反复调用解析器上的一个方法来驱动它遍历文档。\n*   “推送”表示解析器自行遍历整个文档，在重要事件发生时调用代码中的回调方法。SAX\
  \ 解析器实现了推送范式。\n*   “模型”表示解析器构建文档的某种内部表示（在内存中）。解析完成后，你的代码可以检查此模型并提取元素数据。\n\n表 14-1：小型\
  \ XML 解析器\n\n| **名称** | **版本** | **URL** | **许可证** | **大小** | **MIDP** | **类型**\
  \ |\n| --- | --- | --- | --- | --- | --- | --- |\n| kXML | 1.21 | [`kxml.enhydra.org/`](http://kxml.enhydra.org/)\
  \ | EPL | 21KB | 是 | 拉取 |\n| kXML | 2.1.6 | [`kxml.org/`](http://kxml.org/) | CPL\
  \ | 9KB | 是 | 拉取 |\n| MinML | 1.7 | [`www.wilson.co.uk/xml/minml.htm`](http://www.wilson.co.uk/xml/minml.htm)\
  \ | BSD | 14KB | 否 | 推送 |\n| NanoXML | 2.2.2 lite | [`web.wanadoo.be/cyberelf/nanoxml/`](http://web.wanadoo.be/cyberelf/nanoxml/)\
  \ | zlib/libpng | 6KB | 否 | 模型 |\n| TAM | - | [`simonstl.com/projects/tam/`](http://simonstl.com/projects/tam/)\
  \ | MPL | 17KB | 是 | 推送 |\n| TinyXML | 0.7 | [`www.gibaradunn.srac.org/tiny/`](http://www.gibaradunn.srac.org/tiny/)\
  \ | GPL | 6KB | 否 | 模型 |\n| XmlReader | - | [`kobjects.org/utils4me/`](http://kobjects.org/utils4me/)\
  \ | LGPL | 5KB | 是 | 拉取 |\n| XMLtp | 1.7 | [`mitglied.lycos.de/xmltp/`](http://mitglied.lycos.de/xmltp/)\
  \ | BSD | 21KB | 否 | 模型 |\n| Xparse-J | 1.1 | [`www.webreference.com/xml/tools/xparse-j.html`](http://www.webreference.com/xml/tools/xparse-j.html)\
  \ | GPL | 7KB | 是 | 模型 |\n\nMIDP 列指示解析器源代码是否无需修改即可在 MIDP 平台上编译。\n\n表 14-2 提供了关于每种许可证类型的更多信息，列出了许可证名称和提供更多信息的\
  \ URL。\n\n表 14-2：软件许可证\n\n| **名称** | **URL** |\n| --- | --- |\n| BSD | [`opensource.org/licenses/bsd-license.php`](http://opensource.org/licenses/bsd-license.php)\
  \ |\n| CPL | [`opensource.org/licenses/cpl.php`](http://opensource.org/licenses/cpl.php)\
  \ |\n| EPL | [`kxml.enhydra.org/software/license/`](http://kxml.enhydra.org/software/license/)\
