- '# 前言


  本书介绍如何使用 Java 技术为移动电话、寻呼机及其他小型设备编程。本书围绕移动信息设备配置文件（MIDP）展开，该配置文件是 Java 2 平台微型版（J2ME）的一部分。本书内容简洁而完整，不仅描述了
  MIDP 的全部内容，还深入探讨了 XML 和加密技术等多个高级主题。


  第二版涵盖了 MIDP 2.0，其中包含许多令人兴奋的增强功能。新增了三个全新章节，其余部分也经过了细致的更新。


  ## 读者对象


  你阅读本书，很可能是因为你对使用 Java 构建无线应用程序感到兴奋。本书面向已有 Java 编程经验的人士。至少，你应该理解 Java 编程语言和面向对象编程的基础知识。有些章节深入探讨的主题本身就可以写成整本书。如果你想快速了解某个特定主题，这些章节会提供推荐阅读材料。


  如果你不熟悉 Java，我建议你阅读一本入门书籍或参加一门课程。《学习 Java（第二版）》（O''Reilly 2002）对于已经熟悉其他语言（如 C 或 C++）的程序员来说，是一本很好的
  Java 入门书。




  ## 本书结构


  本书共分为十五章及一个附录，基本包含三个部分。前两章为引言内容。第 3 章至第 12 章全面涵盖了 MIDP API。第 13 章至第 15 章则探讨高级主题。各章节详细划分如下：


  *   第 1 章：引言，为后续内容提供背景和动机。本章详细解释了 J2ME，并逐步聚焦到 MIDP。

  *   第 2 章：构建 MIDlet，旨在作为引子。本章包含一个示例应用程序，允许你使用任何 MIDP 设备通过互联网查询单词定义。在此过程中，你将学到大量关于为
  MIDP 平台开发应用程序的知识。

  *   第 3 章：关于 MIDlet 的一切，详细介绍了 MIDP 应用程序的生命周期和打包。本章包含了关于 MIDP 2.0 安全架构的新内容。

  *   第 4 章：几乎相同的老内容，描述了 Java 程序员会熟悉的 MIDP API 部分。

  *   第 5 章：创建用户界面，是专门介绍 MIDP 用户界面包的几章中的第一章。本章概述了 MIDP 的用户界面包，并详细介绍了简单的可视化组件。

  *   第 6 章：列表和表单，接续第 5 章的内容，描述了 MIDP 的高级用户界面组件。

  *   第 7 章：自定义项，展示了如何在 MIDP 2.0 中创建你自己的表单项。

  *   第 8 章：持久化存储，描述了 MIDP 的数据存储机制。

  *   第 9 章：连接世界，包含了关于 MIDP 应用程序如何通过互联网发送和接收数据的所有精彩细节。

  *   第 10 章：编程自定义用户界面，描述了可用于专门应用程序用户界面的底层 API。

  *   第 11 章：游戏 API，描述了 MIDP 2.0 中用于创建游戏的新特性，包括精灵和瓦片图层。

  *   第 12 章：声音与音乐，全面介绍 MIDP 2.0 的新多媒体功能。你将学习如何产生简单音调以及播放采样音频数据。

  *   第 13 章：性能调优，描述了应对小型设备上有限资源的技巧。

  *   第 14 章：解析 XML，审视了当前可用的一系列小型 XML 解析器。本章描述了如何将解析器移植到 MIDP，并简要讨论了每种解析器的使用方法。

  *   第 15 章：保护网络数据，讨论了如何在不安全的互联网上保护有价值的数据。本章包含两个示例应用程序，演示了用于保护数据的加密技术。

  *   最后，附录包含了构成 MIDP 的类和接口的完整 API 参考。每个类和接口的公共 API 方法签名均已列出，方便快速查阅。在第二版中，API 参考已做标记，便于识别哪些方法是
  MIDP 2.0 中新增的。


  '
- "# 第 1 章：引言\n\nJava™ 2 平台微型版（J2ME）是 Java 短暂历史中的第二次革命。当 Java 于 1995 年问世时，计算的未来似乎在于*小程序*——那些可以按需下载并运行的小型程序。缓慢的互联网迫使小程序退出了主流。作为一个平台，Java\
  \ 直到*服务器端小程序*（运行在服务器上的 Java 程序，本质上是 CGI 的替代品）出现后才真正起飞。Java 进一步扩展到服务器端领域，最终获得了 Java\
  \ 2 平台企业版（J2EE）的称号。这是第一次革命，即服务器端 Java 的闪电战。\n\n第二次革命是小型设备 Java 的爆发，而这正在发生。小型设备市场正在迅速扩张，Java\
  \ 之所以重要有两个原因。首先，开发者可以编写代码，并使其无需修改即可在数十种小型平台上运行。其次，Java 对于可下载代码具有重要的安全特性。\n\n\n\n\
  ## 理解 J2ME\n\nJ2ME 并非一个具体的软件或规范，它仅指用于小型设备的 Java。小型设备的范围从寻呼机、手机和个人数字助理（PDA），一直到接近台式电脑的机顶盒等设备。\n\
  \nJ2ME 分为*配置*、*简表*和*可选 API*，它们提供了关于 API 和不同设备系列的特定信息。配置是基于内存限制和处理器能力为特定类型的设备设计的。它指定了一个可以轻松移植到支持该配置的设备上的\
  \ Java 虚拟机（JVM）。它还指定了将在该平台上使用的 Java 2 平台标准版（J2SE）API 的某个子集，以及可能需要的附加 API。\n\n简表比配置更具体。简表基于配置，并添加了用于用户界面、持久化存储以及开发运行应用程序所需的其他任何功能的\
  \ API。\n\n可选 API 定义了可能包含在特定配置中的特定附加功能。在设备上实现的整个组合——配置、简表以及可选 API——被称为一个*栈*。例如，未来可能的设备栈可能是\
  \ CLDC/MIDP + 移动媒体 API。有关 JSR 185 的信息，请参阅后面关于平台标准化的章节，该章节将定义标准的 J2ME 栈。\n\n目前，有几种配置和简表，如图\
  \ 1-1 所示。\n\n![点击展开](img/fig20_01_0.jpg)\n图 1-1：J2ME 世界\n\n| **![开始侧边栏](img/_1.gif)**\
  \ |\n\n**Java 社区进程\n\nJava 社区进程（JCP）旨在确保 Java 技术根据社区共识进行开发。该进程描述如下：\n\n[`jcp.org/introduction/overview/`](http://jcp.org/introduction/overview/)\n\
  \n配置和简表最初以 Java 规范请求（JSR）的形式出现。您可以在此处查看当前 JSR 的列表：\n\n[`jcp.org/jsr/all/`](http://jcp.org/jsr/all/)\n\
  \n| **![结束侧边栏](img/_1.gif)** |\n\n|  |\n\n为了让您了解 J2ME 世界的动态，表 1-1 展示了一些可用和正在开发中的配置、简表和可选\
  \ API。这不是一个完整的列表；更多信息，请访问 JCP 网站 [`jcp.org/`](http://jcp.org/)。\n\n表 1-1：J2ME 配置、简表和可选\
  \ API\n\n| **配置** |\n| --- |\n| **JSR** | **名称** | **URL** |\n| --- | --- | ---\
  \ |\n| 30 | 连接有限设备配置（CLDC）1.0 | [`jcp.org/jsr/detail/30.jsp`](http://jcp.org/jsr/detail/30.jsp)\
  \ |\n| 139 | 连接有限设备配置（CLDC）1.1 | [`jcp.org/jsr/detail/139.jsp`](http://jcp.org/jsr/detail/139.jsp)\
  \ |\n| 36 | 连接设备配置 | [`jcp.org/jsr/detail/36.jsp`](http://jcp.org/jsr/detail/36.jsp)\
  \ |\n\n| **简表** |\n| --- |\n| **JSR** | **名称** | **URL** |\n| --- | --- | --- |\n\
  | 37 | 移动信息设备简表 1.0 | [`jcp.org/jsr/detail/37.jsp`](http://jcp.org/jsr/detail/37.jsp)\
  \ |\n| 118 | 移动信息设备简表 2.0 | [`jcp.org/jsr/detail/118.jsp`](http://jcp.org/jsr/detail/118.jsp)\
  \ |\n| 75 | PDA 简表 1.0 | [`jcp.org/jsr/detail/75.jsp`](http://jcp.org/jsr/detail/75.jsp)\
  \ |\n| 46 | 基础简表 | [`jcp.org/jsr/detail/46.jsp`](http://jcp.org/jsr/detail/46.jsp)\
  \ |\n| 129 | 个人基础简表 | [`jcp.org/jsr/detail/129.jsp`](http://jcp.org/jsr/detail/129.jsp)\
  \ |\n| 62 | 个人简表 | [`jcp.org/jsr/detail/62.jsp`](http://jcp.org/jsr/detail/62.jsp)\
  \ |\n\n| **可选 API** |\n| --- |\n| **JSR** | **名称** | **URL** |\n| --- | --- | ---\
  \ |\n| 66 | RMI 可选包 | [`jcp.org/jsr/detail/66.jsp`](http://jcp.org/jsr/detail/66.jsp)\
  \ |\n| 82 | Java 蓝牙 API | [`jcp.org/jsr/detail/82.jsp`](http://jcp.org/jsr/detail/82.jsp)\
  \ |\n| 120 | 无线消息 API | [`jcp.org/jsr/detail/120.jsp`](http://jcp.org/jsr/detail/120.jsp)\
  \ |\n| 135 | 移动媒体 API | [`jcp.org/jsr/detail/135.jsp`](http://jcp.org/jsr/detail/135.jsp)\
  \ |\n| 179 | J2ME 位置 API | [`jcp.org/jsr/detail/179.jsp`](http://jcp.org/jsr/detail/179.jsp)\
  \ |\n|  \n* * *\n\n|\n\n## 配置\n\n配置为特定设备系列指定了一个 JVM 和一组核心 API。目前有两种：连接设备配置（CDC）和连接有限设备配置（CLDC）。\n\
  \n### 连接设备配置\n\n一个*连接设备*至少拥有 512KB 的只读存储器（ROM）、256KB 的随机存取存储器（RAM）以及某种网络连接。CDC 是为电视机顶盒、汽车导航系统和高档\
  \ PDA 等设备设计的。CDC 规定必须支持完整的 JVM（如《Java 虚拟机规范》第二版所定义）。\n\nJ2ME 的配置和简表通常根据其内存容量来描述。通常会指定\
  \ ROM 和 RAM 的最小数量。对于小型设备，从易失性和非易失性内存的角度来考虑是合理的。*非易失性内存*能够在设备开关机时保持其内容不变。ROM 是一种类型，但非易失性内存也可以是闪存或电池供电的\
  \ RAM。*易失性内存*本质上是工作空间，当设备关闭时，它不会保持其内容。\n\nCDC 正在 Java 社区进程下开发。有关 CDC 的更多信息，请参见 [`java.sun.com/products/cdc/`](http://java.sun.com/products/cdc/)。有一个\
  \ Linux 参考实现可用。\n\nCDC 是个人简表栈的基础。个人简表是 PersonalJava 的下一代产品，PersonalJava 是一个类似于 JDK\
  \ 1.1.8 的 Java 应用程序环境。\n\n\n\n### 连接有限设备配置\n\nCLDC 是我们感兴趣的配置，因为它涵盖了手机、寻呼机、PDA 以及其他尺寸类似的设备。CLDC\
  \ 面向的是比 CDC 更小的设备。这个名称可能有点误导性；实际上，CLDC 是为具有有限网络连接的小型设备设计的——\"有限连接设备配置\"或许更为准确。\n\
  \nCLDC 专为 Java 平台可用内存为 160KB 到 512KB 的设备而设计。如果你曾见识过 J2SE 在桌面电脑上吞噬数十兆字节内存的场景，你就会理解\
  \ J2ME 所面临的挑战。\"有限连接\"仅指一种间歇性且可能速度不快的网络连接。（例如，大多数移动电话的典型数据传输速率仅为 9.6Kbps。）考虑到屏幕尺寸小、内存有限以及网络连接速度慢，在\
  \ CLDC 环境下设计的应用程序应非常谨慎地使用网络连接。\n\nCLDC 基于一个名为 KVM 的小型 JVM。其名称源于它是一个以千字节而非兆字节来衡量大小的\
  \ JVM。虽然 CLDC 是一份规范文档，但 KVM 指的是一套具体的软件。^([1]) 由于体积小，KVM 无法完成 J2SE 世界中 JVM 所能做的所有事情。\n\
  \n*   不能在运行时添加本地方法。所有本地功能都内置于 KVM 中。\n*   KVM 仅包含标准字节码验证器的一个子集。这意味着验证类的任务被拆分给了 CLDC\
  \ 设备和某种外部机制。这具有严重的安全隐患，我们稍后将讨论。\n\n你可以在 CLDC 主页 [`java.sun.com/products/cldc/`](http://java.sun.com/products/cldc/)\
  \ 找到更多信息。大多数已部署的设备实现的是 CLDC 1.0，但在撰写本文时，CLDC 1.1 已接近完成。CLDC 1.1 包含对 CLDC 1.0 的增强，包括对浮点数据类型的支持。\n\
  \n### 平台标准化\n\n鉴于配置、简表以及特别是可选 API 的繁多，你如何知道典型设备上可能提供哪些 API？Sun 对此问题的答案是 JSR 185\
  \ ([`jcp.org/jsr/detail/185.jsp`](http://jcp.org/jsr/detail/185.jsp))，其标题令人印象深刻，为*无线行业\
  \ Java 技术*。该规范旨在标准化软件栈，为 J2ME 世界带来一致性。\n\n在下一代 J2ME 中，一个名为\"构建块\"的概念预计将取代配置和简表。一个*构建块*只是\
  \ J2SE API 的某个子集。例如，一个构建块可能由 J2SE 的 java.io 包的一个子集创建。从概念上讲，一个构建块代表的信息块比一个配置更小。那么，简表将构建在一组构建块之上，而不是一个配置之上。\n\
  \n构建块的定义是一个 JSR，此处简要描述：[`jcp.org/jsr/detail/68.jsp`](http://jcp.org/jsr/detail/68.jsp)。自\
  \ 2000 年 6 月创建以来，JSR 68 的进展极其缓慢。我建议你转而关注 JSR 185。\n\n^([1])KVM 最初是 Sun 研究项目 Spotless\
  \ 系统的一部分。参见 [`www.sun.com/research/spotless/`](http://www.sun.com/research/spotless/)。\n\
  \n## 简表\n\n简表分层位于配置之上（将来，或许位于构建块之上），为针对特定设备系列开发应用程序添加必要的 API 和规范。\n\n### 当前简表\n\n\
  在 Java 社区进程下，正在开发几种不同的简表。表 1-1（前面已展示）提供了概览。\n\n基础简表是针对能够支持丰富网络化 J2ME 环境的设备的规范。它不支持用户界面；其他简表可以分层位于基础简表之上，以添加用户界面支持和其他功能。\n\
  \n分层位于基础简表之上的是个人基础简表和个人简表。CDC + 基础简表 + 个人基础简表 + 个人简表的组合被设计为 PersonalJava 应用程序运行时环境的下一代产品（参见\
  \ [`java.sun.com/products/personaljava/`](http://java.sun.com/products/personaljava/)）。因此，个人简表的具体目标是向后兼容\
  \ PersonalJava 的早期版本。\n\nPDA 简表 (PDAP) 构建在 CLDC 之上，专为掌上设备设计，这些设备至少拥有 512KB 的 ROM\
  \ 和 RAM 总和（最大 16MB）。它介于移动信息设备简表 (MIDP) 和个人简表之间。它包含一个基于 MIDlet 的应用程序模型，但使用 J2SE 抽象窗口工具包\
  \ (AWT) 的子集来实现图形用户界面。尽管 PDAP 规范已接近完成，但据我所知，还没有硬件制造商宣布将实现 PDAP。目前，J2ME 世界在低端由 MIDP\
  \ 覆盖，在高端则由个人简表覆盖。\n\n### 移动信息设备简表\n\n本书的重点是移动信息设备简表 (MIDP)。根据规范，移动信息设备具有以下特征：\n\n\
  *   128KB 的非易失性内存用于 MIDP 实现\n*   32KB 的易失性内存用于运行时堆\n*   8KB 的非易失性内存用于持久化数据\n*  \
  \ 至少 96 × 54 像素的屏幕\n*   一定的输入能力，可通过键盘、键盘或触摸屏实现\n*   双向网络连接，可能是间歇性的\n\n试着想象一下可能是\
  \ MIDP 设备的设备：移动电话和高级寻呼机完全符合要求，但入门级 PDA 也可能符合此描述。\n\n关于 MIDP 的更多信息，包括官方规范文档的链接，请访问\
  \ [`java.sun.com/products/midp/`](http://java.sun.com/products/midp/)。\n\n本书涵盖 MIDP\
  \ 1.0 和 MIDP 2.0。MIDP 2.0 具有众多增强功能，包括对多媒体的支持、新的游戏用户界面 API、对 HTTPS 连接的支持以及其他特性。它完全向后兼容\
  \ MIDP 1.0。我将在本书其余部分指出 MIDP 2.0 特有的功能。\n\n\n\n## MIDP 应用程序剖析\n\nMIDP 应用程序可用的 API\
  \ 来自 CLDC 和 MIDP 中的包，如图 1-2 所示。标有 + 的包是 CLDC 1.1 和 MIDP 2.0 中新增的。\n\n![点击展开](img/fig25_01_0.jpg)\n\
  图 1-2: MIDP 包\n\nCLDC 定义了一套核心 API，主要取自 J2SE 领域。这些包括 `java.lang` 中的基础语言类、`java.io`\
  \ 中的流类以及 `java.util` 中的简单集合。CLDC 还在 `javax.microedition.io` 中指定了一个通用网络 API。\n\n\
  |  | 注意 | 根据 MIDP 2.0 规范，MIDP 2.0 很可能会与 CLDC 1.1 配对使用，尽管 MIDP 2.0 完全有可能在 CLDC 1.0\
  \ 之上实现。MIDP 2.0 的首次实现将与 CLDC 1.0 配对，因为 MIDP 2.0 规范在 Java 社区进程中的进展比 CLDC 1.1 规范更快。\
  \ |\n\n可选地，设备供应商也可以提供 Java API 来访问设备特定功能。因此，MIDP 设备通常能够运行几种不同类型的应用程序。图 1-3 展示了这些可能性的示意图。\n\
  \n![点击展开](img/fig26_01_0.jpg)\n图 1-3: MIDP 软件组件\n\n每个设备都实现了某种操作系统（OS）。原生应用程序直接运行在这一层，代表了当今的现状——许多不同类型的设备，每种设备都有自己的操作系统和原生应用程序。\n\
  \n位于设备操作系统之上的是 CLDC（包括 KVM）和 MIDP API。MIDP 应用程序仅使用 CLDC 和 MIDP API。设备特定的 Java 应用程序也可能使用设备供应商提供的\
  \ Java API。\n\n## MIDP 的优势\n\n考虑到配置和简表（Profile）的多样性，为什么这本书要讲 MIDP？首先，MIDP 出现在一个关键时刻，一个像手机这样的\
  \ MIDP 设备市场正在爆炸式增长的时代。与此同时，MIDP 设备正获得足够的处理能力、内存容量和互联网连接性，使其成为分布式应用程序有吸引力的平台。MIDP\
  \ 1.0 已经部署在全球数百万部手机上，而 MIDP 2.0 则对未来充满希望。\n\n其次，当然，MIDP 是第一个准备就绪、可以投入实际应用的 J2ME\
  \ 简表。如果你阅读下一章，你现在就可以编写 MIDP 应用程序了。\n\n### 可移植性\n\n在小型设备应用程序开发中使用 Java 而非其他工具的优势在于可移植性。你可以用\
  \ C 或 C++ 编写设备应用程序，但结果将是特定于单一平台的。使用 MIDP API 编写的应用程序可以直接移植到任何 MIDP 设备上。\n\n如果你一直关注\
  \ Java 的发展，这听起来应该很熟悉。这正是 Sun 自 1995 年以来一直重复的“一次编写，到处运行”（WORA）口号。不幸的是，对于在 JDK 1.0\
  \ 和 JDK 1.1（尤其是浏览器实现）中与跨平台问题作斗争的开发者来说，WORA 有点像四个字母的脏话。虽然 Java 2 中的跨平台能力总体上是成功的，但\
  \ WORA 仍然带有未兑现承诺的污点。\n\nMIDP 能否提供无痛的跨平台功能？能。MIDP 实现中总会存在特定于平台的错误，但我相信 MIDP 能像宣传的那样工作，因为它比桌面\
  \ Java 小得多。更少的代码意味着移植到多个平台时更少的错误。JDK 1.0 和 JDK 1.1 的大部分跨平台不兼容问题，是由于试图将不同的窗口系统塞进\
  \ AWT 基于对等组件的架构这一噩梦造成的。MIDP 完全没有 AWT 那样的复杂性，这意味着 MIDP 应用程序极有可能从一开始就能无缝地在多个平台上运行。此外，虽然\
  \ JDK 1.0 测试套件只包含几十个测试，但 MIDP 兼容性测试套件包含数千个测试。\n\n### 安全性\n\n使用 Java 进行小型设备开发的第二个令人信服的理由是安全性。Java\
  \ 以其安全运行像 applet 这样的下载代码的能力而闻名。这是一个完美的契合——很容易想象有吸引力的应用程序动态下载到你的手机上。\n\n但情况并非如此美好。首先，CLDC\
  \ 中使用的 KVM 只实现了部分字节码验证器，这意味着字节码验证这一重要任务的一部分是在 MIDP 设备之外执行的。\n\n其次，CLDC 不允许应用程序自定义类加载器。这意味着任何形式的动态应用程序交付都依赖于设备特定的机制。正如你将看到的，应用程序部署在\
  \ CLDC 或 MIDP 中并没有明确定义。\n\nMIDP 应用程序确实提供了一个重要的安全承诺：它们永远无法逃脱 KVM 的限制。这意味着，除非存在错误，否则\
  \ MIDP 应用程序永远无法写入不属于 KVM 的设备内存。MIDP 应用程序永远不会搞乱同一设备上的其他应用程序或设备操作系统本身。^([2]) 这是 MIDP\
  \ 的杀手级特性。它允许制造商和运营商向世界开放应用程序开发，或多或少地免于认证和验证程序，而无需担心恶意程序员会编写导致手机崩溃的应用程序。\n\n在 MIDP\
  \ 2.0 中，MIDlet 套件可以进行加密签名，然后在设备上进行验证，这为用户执行下载的代码提供了一定的安全性。一个新的权限架构还允许用户拒绝不受信任的代码访问某些\
  \ API 功能。例如，如果你在手机上安装了一个看起来可疑的 MIDlet 套件，你可以阻止它进行网络连接。\n\n^([2])可以想象，MIDP 应用程序可能会发起拒绝服务攻击（即，耗尽所有处理器时间或使设备操作系统陷入停滞）。人们普遍认为，对于拒绝服务攻击没有太多防御手段。J2SE\
  \ 中的应用程序和 applet 也存在同样的漏洞。\n\n## MIDP 供应商\n\n几家大型企业已经全力支持 MIDP。快速浏览一下 MIDP 的 JSR\
  \ 页面，就能发现最重要的公司。\n\n两家亚洲公司率先为支持 Java 的手机提供网络服务。在韩国，LG TeleCom 于 2000 年中部署了一项名为 ez-i\
  \ 的服务。同年晚些时候，NTT DoCoMo 部署了广受欢迎的 i-mode。为 LG TeleCom（KittyHawk）和 NTT DoCoMo（i-Appli）开发的\
  \ API 与 MIDP 类似，但都是在 MIDP 1.0 规范完成之前完成的。\n\n在美国，摩托罗拉是第一家生产 MIDP 电话的制造商。i50sx 和 i85s\
  \ 于 2001 年 4 月 2 日发布，由 Nextel 提供服务。此后，摩托罗拉通过推出少量新设备扩展了其产品线。\n\n诺基亚也对 MIDP 做出了严肃的承诺，而制定\
  \ MIDP 规范的专家组包括一份令人印象深刻的制造商名单——爱立信、日立、诺基亚、索尼、Symbian 等等。如果你愿意，可以去阅读行业预测——未来三年将售出数不清的\
  \ MIDP 手机，等等。可以肯定的是，你的 MIDP 应用程序将拥有一个巨大的市场。有关 MIDP 设备的全面列表，请访问 [`wireless.java.sun.com/device/`](http://wireless.java.sun.com/device/)。\n\
  \n\n\n## 碎片化问题\n\n平台碎片化是 MIDP 社区中一个严重的问题。许多实现 MIDP 1.0 的设备也包含设备特定的 API。这些 API 用于访问设备特定功能，或提供\
  \ MIDP 1.0 的“最小公分母”规范中未涉及的功能。当前的软件供应商，尤其是游戏开发商，有时会创建并分发同一应用的多个版本，每个版本都针对特定平台量身定制。这显然是一个问题：最初使用\
  \ MIDP 的部分意义就在于能够编写一套代码并在多个平台上部署。\n\n我不会假装知道这场“戏剧”将如何收场。我相信 MIDP 2.0 解决了 MIDP 1.0\
  \ 的许多（甚至可能是全部）缺陷。它的时机很好，因此 MIDP 2.0 设备的采用和部署可能会为无线开发提供一个标准、统一的平台。\n\n另一个碎片化问题在于，将配置、简表和可选\
  \ API 组合成软件栈时存在混乱。作为开发者，你希望确切了解哪些 API 可用或可能可用，但似乎有太多的选择和可能性。JSR 185（[`jcp.org/jsr/detail/185.jsp`](http://jcp.org/jsr/detail/185.jsp)）旨在为这一问题带来清晰度。\n\
  \n## 总结\n\nJ2ME 是面向小型设备的 Java 平台，这是一个涵盖几乎所有比面包盒还小的设备的广阔领域。由于 J2ME 横跨如此多样化的硬件，它被划分为配置、简表和可选\
  \ API。配置规定了 J2SE 功能的一个子集以及 JVM 的行为，而简表通常更具体地针对具有相似特性的设备系列。可选 API 以灵活的包形式提供附加功能。移动信息设备简表（本书的重点）包含了面向手机和双向寻呼机等设备的\
  \ API。\n\n"
- "# 第 2 章：构建 MIDlet\n\n## 概述\n\nMIDP 应用被别致地称为 MIDlet，这是延续了由 *applet* 和 *servlet*\
  \ 开始的命名主题。对于有一定经验的 Java 程序员来说，编写 MIDlet 相对容易。毕竟，编程语言仍然是 Java。此外，来自 java.lang 和 java.io\
  \ 的许多基础 API 在 MIDP 中与在 J2SE 中基本相同。学习新的 API（位于 javax.microedition 层次结构中）并不十分困难，正如你将在本书后续内容中看到的那样。\n\
  \n然而，实际的开发过程对于 MIDlet 来说比 J2SE 应用要稍微复杂一些。除了基本的编译和运行周期外，MIDlet 还需要一些额外的调整和打包。完整的构建周期如下所示：\n\
  \n编辑源代码 > 编译 > 预校验 > 打包 > 测试或部署\n\n为了展示工作原理，并让你初步体验 MIDlet 开发，本章专门用于构建和运行一个简单的 MIDlet。在后续章节中，我们将深入探讨\
  \ MIDP API 的细节。在本章中，你将了解 MIDlet 开发的整体概况。\n\n## 工具准备\n\nMIDlet 是在常规桌面计算机上开发的，尽管 MIDlet\
  \ 本身是为在小型设备上运行而设计的。要开发 MIDlet，你需要某种开发工具包，无论是来自 Sun 还是其他供应商。请记住，MIDP 只是一个规范；供应商可以自由开发自己的实现。\n\
  \n如果你知道去哪里找，世界上充满了 MIDlet 开发工具。此外，其中许多工具是免费提供的。\n\n最基本的工具集是 Sun 的 MIDP 参考实现。这包括预校验工具（稍后会详细介绍）、MIDP\
  \ 设备模拟器、源代码和文档。你可以通过 [`java.sun.com/products/midp/`](http://java.sun.com/products/midp/)\
  \ 上的链接下载 MIDP 参考实现。但是，我不建议使用参考实现，除非你真的很喜欢处理构建和打包 MIDlet 的繁琐细节。（如果你有兴趣将 MIDP 运行时移植到新设备或平台，也应该研究一下参考实现。）\n\
  \n对于初学者来说，一个更好的工具是 Sun 的 J2ME Wireless Toolkit，可从 [`java.sun.com/products/j2mewtoolkit/`](http://java.sun.com/products/j2mewtoolkit/)\
  \ 获取。J2ME Wireless Toolkit（或亲切地称为 J2MEWTK）包含一个 GUI 工具，可以自动处理构建和打包 MIDlet 的一些繁琐细节，提供从源代码到运行\
  \ MIDlet 的简单路径。同时，J2ME Wireless Toolkit 是一个相对轻量级的解决方案，几乎是一个微型 IDE，不会让你的机器不堪重负。\n\
  \n更大的 IDE 也大量存在，来自设备制造商、无线运营商和 IDE 供应商，包括以下这些：\n\n*   Borland JBuilder MobileSet：[`www.borland.com/jbuilder/mobileset/`](http://www.borland.com/jbuilder/mobileset/)\n\
  *   IBM WebSphere Studio Device Developer：[`www-3.ibm.com/software/pervasive/products/wsdd/`](http://www-3.ibm.com/software/pervasive/products/wsdd/)\n\
  *   Metrowerks CodeWarrior Wireless Studio：[`www.metrowerks.com/MW/Develop/Wireless/Wireless_Studio/default.htm`](http://www.metrowerks.com/MW/Develop/Wireless/Wireless_Studio/default.htm)\n\
  *   Research In Motion BlackBerry Java Development Environment：[`www.blackberry.net/developers/na/java/start/download.shtml`](http://www.blackberry.net/developers/na/java/start/download.shtml)\n\
  *   Sun ONE Studio, Mobile Edition：[`wwws.sun.com/software/sundev/jde/features/me-features.html`](http://wwws.sun.com/software/sundev/jde/features/me-features.html)\n\
  *   Zucotto Wireless WHITEboard SDK：[`www.zucotto.com/products/wb/whiteboard.html`](http://www.zucotto.com/products/wb/whiteboard.html)\n\
  \n你可以使用任何你想要的开发工具包。我建议你从 J2ME Wireless Toolkit 开始，它易于使用且具有权威性。在本书的其余部分，我将使用 J2ME\
  \ Wireless Toolkit。其他开发环境通常也会将 J2ME Wireless Toolkit 作为插件使用，因此无论你使用什么工具，你的体验可能都相似。在本章中，你会最明显地感受到开发环境的细节，我将详细介绍构建工具和模拟器。在本书的大部分后续内容中，我将描述\
  \ MIDP API，因此你使用哪个开发工具包实际上并不重要。\n\n\n\n## 创建源代码\n\n编写 Java 源代码的方式一如既往：使用你喜欢的文本编辑器创建一个扩展名为\
  \ *.java* 的源文件。我们将构建并运行的示例是 Jargoneer，这是一个用于在 Jargon 文件中查找单词的 MIDlet。Jargon 文件是一本全面的黑客俚语词典（更多信息请访问\
  \ [`www.tuxedo.org/~esr/jargon/`](http://www.tuxedo.org/~esr/jargon/)）。\n\n当你在 Jargoneer\
  \ 中输入一个单词时，它会连接到一个服务器来查找定义。运行这个 MIDlet 可以让你在黑客朋友面前显得很酷。当有人使用一个不熟悉的词，比如 \"cruft\"\
  \ 或 \"grok\" 时，你可以偷偷地把这个词输入你的手机，几秒钟后就能看到定义。\n\nJargoneer 的源代码在清单 2-1 中提供。如果你不想手动输入，可以从\
  \ [`www.apress.com`](http://www.apress.com) 的下载页面下载本书中的所有代码示例。\n\n清单 2-1：*Jargoneer*\
  \ 的源代码\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport java.io.*;\n\nimport javax.microedition.io.*;\n\
  import javax.microedition.midlet.*;\nimport javax.microedition.lcdui.*;\n\npublic\
  \ class Jargoneer extends MIDlet\n    implements CommandListener, Runnable {\n \
  \ private Display mDisplay;\n\nprivate Command mExitCommand, mFindCommand, mCancelCommand;\n\
  \nprivate TextBox mSubmitBox;\n  private Form mProgressForm;\n  private StringItem\
  \ mProgressString;\n\npublic Jargoneer() {\n    mExitCommand = new Command(\"Exit\"\
  , Command.EXIT, 0);\n    mFindCommand = new Command(\"Find\", Command.SCREEN, 0);\n\
  \    mCancelCommand = new Command(\"Cancel\", Command.CANCEL, 0);\n\nmSubmitBox\
  \ = new TextBox(\"Jargoneer\", \"\", 32, 0);\n    mSubmitBox.addCommand(mExitCommand);\n\
  \    mSubmitBox.addCommand(mFindCommand);\n    mSubmitBox.setCommandListener(this);\n\
  \    mProgressForm = new Form(\"Lookup progress\");\n    mProgressString = new StringItem(null,\
  \ null);\n    mProgressForm.append(mProgressString);\n  }\n\npublic void startApp()\
  \ {\n    mDisplay = Display.getDisplay(this);\n\nmDisplay.setCurrent(mSubmitBox);\n\
  \  }\n\npublic void pauseApp() {}\n\npublic void destroyApp(boolean unconditional)\
  \ {}\n\npublic void commandAction(Command c, Displayable s) {\n    if (c == mExitCommand)\
  \ {\n      destroyApp(false);\n      notifyDestroyed();\n    }\n    else if (c ==\
  \ mFindCommand) {\n      // Show the progress form.\n      mDisplay.setCurrent(mProgressForm);\n\
  \      // Kick off the thread to do the query.\n      Thread t = new Thread(this);\n\
  \      t.start();\n    }\n  }\n\npublic void run() {\n    String word = mSubmitBox.getString();\n\
  \    String definition;\n\ntry { definition = lookUp(word); }\n    catch (IOException\
  \ ioe) {\n      Alert report = new Alert(\n          \"Sorry\",\n          \"Something\
  \ went wrong and that \" +\n          \"definition could not be retrieved.\",\n\
  \          null, null);\n      report.setTimeout(Alert.FOREVER);\n      mDisplay.setCurrent(report,\
  \ mSubmitBox);\n      return;\n    }\n    Alert results = new Alert(\"Definition\"\
  , definition,\n        null, null);\n    results.setTimeout(Alert.FOREVER);\n  \
  \  mDisplay.setCurrent(results, mSubmitBox);\n  }\n\nprivate String lookUp(String\
  \ word) throws IOException {\n    HttpConnection hc = null;\n    InputStream in\
  \ = null;\n    String definition = null;\n\ntry {\n      String baseURL = \"http://65.215.221.148:8080/wj2/jargoneer?word=\"\
  ;\n      String url = baseURL + word;\n      mProgressString.setText(\"Connecting...\"\
  );\n      hc = (HttpConnection)Connector.open(url);\n      hc.setRequestProperty(\"\
  Connection\", \"close\");\n      in = hc.openInputStream();\n\nmProgressString.setText(\"\
  Reading...\");\n      int contentLength = (int)hc.getLength();\n      if (contentLength\
  \ == -1) contentLength = 255;\n      byte[] raw = new byte[contentLength];\n   \
  \   int length = in.read(raw);\n\n// Clean up.\n      in.close();\n      hc.close();\n\
  \ndefinition = new String(raw, 0, length);\n    }\n    finally {\n      try {\n\
  \        if (in != null) in.close();\n        if (hc != null) hc.close();\n    \
  \  }\n      catch (IOException ignored) {}\n    }\n\nreturn definition;\n  } \n\
  ```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n## 编译 MIDlet\n\n编写 MIDlet 是交叉编译的一个例子，即在一个平台上编译代码，在另一个平台上运行。在本例中，你将在桌面计算机上使用\
  \ J2SE 编译 MIDlet。MIDlet 本身将在支持 MIDP 的手机、寻呼机或其他移动信息设备上运行。\n\n只要将源代码放在正确的目录中，J2ME\
  \ Wireless Toolkit 就会处理所有细节。\n\n1.  启动工具包，名为 KToolbar。\n\n2.  从工具栏中选择**新建项目...**来创建一个新项目。\n\
  \n3.  当 J2ME Wireless Toolkit 询问项目名称和 MIDlet 类名时，两者都使用 \"Jargoneer\"。\n\n4.  点击**确定**两次以关闭项目设置窗口。\n\
  \n图 2-1 显示了新建项目对话框。\n\n![点击展开](img/fig36_01_0.jpg)\n图 2-1：使用 J2ME Wireless Toolkit\
  \ 创建新项目\n\nJ2ME Wireless Toolkit 将项目表示为其 *apps* 目录的子目录。下图显示了创建新项目后 *Jargoneer* 目录的内容。\n\
  \n![](img/fig37_01.jpg)\n\n将源代码保存为 Jargoneer.java 并放在项目的 *src* 目录中。你可以直接点击 J2ME\
  \ Wireless Toolkit 工具栏中的**构建**按钮来编译打开的项目。\n\n在后台，J2ME Wireless Toolkit 使用 J2SE 的编译器。通常，在编译\
  \ J2SE 源代码时，CLASSPATH 环境变量指向你的源代码需要了解的所有类。当你使用 javac 编译文件时，会包含一些隐式的 API，比如 java.lang\
  \ 中的类。然而，对于 MIDlet，情况稍微复杂一些。假设你在 MIDlet 中使用了 java.lang.System 类。你（或 J2ME Wireless\
  \ Toolkit）如何让编译器知道你想使用这个类的 MIDP 版本，而不是 J2SE 版本？\n\n答案是使用命令行选项 -bootclasspath。这个选项允许你指向一个类路径，该路径描述了编译源代码所依据的基础\
  \ API。在我们的例子中，应该使用这个选项来指定 MIDP 参考实现安装中的 *classes* 目录。如果你安装了 MIDP 参考实现，命令行如下所示：\n\
  \n```\njavac -bootclasspath \\midp\\classes Jargoneer.java\n```\n\n如果你将 MIDP 参考实现安装在不同的位置，则需要调整\
  \ *classes* 的路径。\n\n\n\n## 预验证类文件\n\n现在，构建程序时出现了一个全新的步骤：*预验证*。由于小型设备上的内存非常稀缺，MIDP（实际上是\
  \ CLDC）规定将字节码验证分为两部分。在设备之外的某个地方，执行预验证步骤。设备本身只需在加载类之前执行一个轻量级的二次验证步骤。\n\n如果你使用的是 J2ME\
  \ Wireless Toolkit，则无需担心预验证类文件的问题，甚至可能不会注意到点击**构建**按钮时正在发生此过程。如果你想进一步了解预验证，请阅读本节的其余部分。否则，你可以直接跳过。\n\
  \n你可能还记得，字节码验证是 Java 运行时安全模型的基石之一。在类加载器动态加载类之前，字节码验证器会检查类文件，以确保其行为良好，不会对 JVM 造成不良影响。不幸的是，实现字节码验证器的代码体积庞大，无法容纳在手机这样的小型设备上。CLDC\
  \ 规定了分两步进行的字节码验证：\n\n1.  在设备之外，对类文件进行预验证。执行某些检查，并将类文件转换为轻量级二次验证器易于处理的格式。\n\n2. \
  \ 在设备上，加载类时执行第二步验证。如果类文件未经预验证，则会被拒绝。\n\nMIDP 参考实现和 J2ME Wireless Toolkit 包含一个名为\
  \ preverify 的工具，用于执行第一步。\n\npreverify 工具接收一个类文件作为输入，并生成一个预验证后的类文件。你需要指定一个类路径，以便该工具能够找到你想要预验证的类以及任何被引用的类。最后，你可以使用\
  \ `-d` 选项指定输出目录。要用预验证版本覆盖现有的类文件，可以执行如下操作：\n\n```\npreverify -classpath .;\\ midp\\\
  \ classes -d . Jargoneer\n```\n\n在此示例中，`-d` 选项告诉 preverify 将预验证后的类文件写入当前目录。不要忘记内部类，它们也必须进行预验证。\n\
  \n|  | 注意 | 像这样将字节码验证分成两部分具有重要的安全意义。设备应仅使用安全的方法从可信来源下载代码，因为部分字节码验证是在设备之外执行的。（有关\
  \ MIDlet 套件安全性的更多信息，请参见第 3 章。）攻击者可能会提供看似已预验证的恶意代码，即使它违反了完整 J2SE 字节码验证器的规则。对于 MIDP\
  \ 第二步验证器来说，该代码看起来是正常的，因此会被加载并运行。 |\n\n## Sun 的 J2ME Wireless Toolkit 模拟器\n\nJ2ME\
  \ Wireless Toolkit 包含多个不同的模拟器，你可以使用它们来测试你的应用程序。当你在 J2ME Wireless Toolkit 中点击**运行**按钮时，你的应用程序会在当前选定的模拟器中启动。\n\
  \n### Wireless Toolkit 设备\n\nJ2ME Wireless Toolkit 2.0（其 beta 2 版本）包含四个主要的设备模拟器：\n\
  \n*   DefaultColorPhone 是一款配备 180 × 208 像素彩色屏幕的设备。此设备如图 2-2 所示，本书其余部分的大部分屏幕截图均使用此设备。\n\
  \n    ![点击展开](img/fig40_01_0.jpg)\n    图 2-2：J2ME Wireless Toolkit 模拟器上的按钮\n\n*\
  \   DefaultGrayPhone 与 DefaultColorPhone 相同，但配备的是灰度屏幕。\n\n*   MediaControlSkin 看起来像默认的手机模拟器，但其按钮标有类似音乐播放器的控制图标：方形代表停止，三角形代表播放，音量控制按钮等。\n\
  \n*   QwertyDevice 是一款配备 640 × 240 彩色屏幕和微型 qwerty 键盘的智能手机。\n\n### 运行 MIDlet\n\n\
  如果你使用的是 J2ME Wireless Toolkit，只需从“设备”组合框中选择一个模拟器，然后点击**运行**按钮即可启动你的应用程序。\n\nSun\
  \ 的 MIDP 参考实现包含一个名为 midp 的模拟器。它模拟一个虚构的 MID，即一部带有一些标准按键和 182 × 210 像素屏幕的移动电话。J2ME\
  \ Wireless Toolkit 包含一个几乎相同的模拟器，以及其他几个模拟器。\n\n一旦你有了预验证后的类文件，就可以使用 midp 模拟器来运行它。该模拟器是一个在\
  \ J2SE 下运行的应用程序，其行为就像一个 MIDP 设备。它在你的屏幕上显示为一个代表性的设备，即一部通用的移动电话。假设你已经将 *\\midp\\bin*\
  \ 添加到了 PATH 中，你可以通过在命令行输入以下内容来运行你的 MIDlet：\n\n```\nmidp Jargoneer \n```\n\n如果一切顺利，你将看到类似图\
  \ 2-2 所示的窗口。恭喜！你已经成功构建并运行了你的第一个 MIDlet。\n\n### 使用模拟器控件\n\nJ2ME Wireless Toolkit\
  \ 模拟器显示为一款通用的移动电话，如图 2-2 所示。\n\nSun 的 J2ME Wireless Toolkit 模拟器展现出你在真实设备上可能发现的几个特性：\n\
  \n*   该设备屏幕尺寸小，输入能力有限。（它不像 J2ME Wireless Toolkit 1.0 的模拟器那么小，后者包含屏幕为 96 × 128 和\
  \ 96 × 54 像素的模拟设备。）\n\n*   提供两个*软按钮*。软按钮没有固定功能。通常，按钮在任意时刻的功能会显示在屏幕靠近按钮的位置。在 MIDlet\
  \ 中，软按钮用于执行命令。\n\n*   提供*导航按钮*，允许用户浏览列表或其他选项集。\n\n*   提供一个*选择按钮*，允许用户在使用导航按钮移动到某个选项后做出选择。（可以理解为“是的，这是我的最终答案。”）\n\
  \n## MIDP 功能概览\n\n既然你已经运行了第一个 MIDlet，请花点时间欣赏一下它。即使是这样一个小例子，也有几个显著的特点。\n\n### 它是\
  \ Java\n\n首先，Jargoneer 是用 Java 语言编写的，与你用来编写 Servlet、Enterprise JavaBeans 或 J2SE\
  \ 客户端应用程序的语言相同。如果你已经是 J2SE 开发者，那么开发 MIDlet 会让你感到非常得心应手。\n\n不仅 Java 语言本身很熟悉，而且许多核心\
  \ API 也与 J2SE 非常相似。例如，请注意 Jargoneer 中的多线程与任何其他 Java 代码中的多线程完全相同。MIDlet 类 Jargoneer\
  \ 实现了 java.lang.Runnable，启动新线程的技术也与以往相同：\n\n```\n Thread t = new Thread(this);\n\
  \       t.start();\n```\n\njava.lang 的重要部分与 J2SE 基本保持不变，java.io 和 java.util 的部分也是如此。在\
  \ lookUp() 中从服务器读取结果的代码是熟悉的流处理方式，就像你在 J2SE 中可能看到的那样。\n\n### MIDlet 生命周期\n\nJargoneer\
  \ 也展示了 MIDlet 的基本结构。像所有优秀的 MIDlet 一样，它扩展了 javax.microedition.midlet.MIDlet，这是所有\
  \ MIDP 应用程序的基类。设备上称为 Java 应用程序管理器 (JAM)、应用程序管理软件 (AMS) 或 MIDlet 管理软件的特殊软件，控制着安装、运行和删除\
  \ MIDlet 的过程。当用户选择运行你的 MIDlet 时，正是 JAM 创建了 MIDlet 类的实例并对其调用方法。\n\n将在你的 MIDlet 子类中调用的方法序列由\
  \ MIDlet 生命周期定义。MIDlet 与 Applet 和 Servlet 一样，具有一组定义明确的状态。JAM 将调用 MIDlet 中的方法来指示状态之间的转换。你可以在\
  \ Jargoneer 中看到这些方法——startApp()、pauseApp()、destroyApp() 以及 Jargoneer 的构造函数都是 MIDlet\
  \ 生命周期的一部分。\n\n\n\n### 通用用户界面\n\nJargoneer 的用户界面代码可能会让你感到惊讶。稍后，我将用几个章节来介绍用户界面。目前，需要重点注意的是\
  \ Jargoneer 的用户界面如何足够灵活，能够运行在不同屏幕尺寸和不同输入能力的设备上。毕竟，MIDP 的一大吸引力在于“编写一套源代码，即可在多种设备上运行”的理念。\n\
  \nMIDP 通用用户界面的一个例子是 Jargoneer 启动时最初显示的 TextBox。图 2-3 展示了这个 TextBox。\n\n![](img/fig42_01.jpg)\n\
  图 2-3：*Jargoneer* 的 *TextBox*\n\nTextBox 是一个文本输入字段。它有一个标题和一个用于输入文本的区域。它的设计简单，可以轻松地显示在不同尺寸的屏幕上。更有趣的是出现在\
  \ TextBox 底部的命令。它们是“退出”和“查找”。创建 TextBox 及其命令的代码位于 Jargoneer 的构造函数中：\n\n```\n mExitCommand\
  \ = new Command(\"Exit\", Command.EXIT, 0);\n    mFindCommand = new Command(\"Find\"\
  , Command.SCREEN, 0);\n    // ...\n    mSubmitBox = new TextBox(\"Jargoneer\", \"\
  \", 32, 0);\n    mSubmitBox.addCommand(mExitCommand);\n    mSubmitBox.addCommand(mFindCommand);\n\
  \    mSubmitBox.setCommandListener(this);\n```\n\n请注意命令是如何创建的。你只需指定一个标签和一个类型，并注册一个事件监听器来了解命令何时被调用。这种设计有意保持模糊——它给实现留下了相当大的自由度，来决定命令应如何显示和调用。例如，在\
  \ Sun 的 J2ME Wireless Toolkit 模拟器中，TextBox 在屏幕底部显示其命令，并允许用户使用软按钮调用它们。而另一台设备可能会将这两个命令放在一个菜单中，并允许用户使用选择轮或其他机制来调用它们。\n\
  \n### 服务器端组件的可能性\n\nJargoneer 示例连接到一个 Web 服务器，发送请求并接收响应。该 Web 服务器实际上是一个中介——它连接到真正的\
  \ Jargon File 服务器，发出请求，解析结果，然后将精简后的定义发送回 MIDP 设备。\n\n在本书的第一个版本中，Jargoneer 直接连接到\
  \ Jargon File 服务器。作为对其查询的响应，它收到了大量不需要的信息。最初的 Jargoneer 费了很大力气来解析 HTML 响应，以提取它想要的定义。从架构上看，旧的\
  \ Jargoneer 如图 2-4 所示。\n\n![点击展开](img/fig44_01_0.jpg)\n图 2-4：*Jargoneer* 架构\n\n\
  新的架构如图 2-5 所示。\n\n![点击展开](img/fig44_02_0.jpg)\n图 2-5：*Jargoneer* 的更简洁架构\n\nJargoneer\
  \ 不再直接访问 Web 服务器，而是通过由 Apress 托管的另一个服务器。该服务器查询 Jargon File，解析结果，并将定义返回给设备。从几个角度来看，这都具有优势：\n\
  \n*   带宽在时间和金钱上都很昂贵。当今的无线网络相对较慢，因此空中传输的数据越少，用户的等待时间就越短。此外，无线服务往往价格不菲，因此空中传输的数据越少，用户的账单就越少。\n\
  \n*   小型设备的内存和处理能力有限。将有限的资源花费在解析 HTML 等任务上是不明智的。通常，你可以将应用程序的大部分处理负担放在服务器组件上，从而使客户端\
  \ MIDlet 的工作变得非常轻松。\n\n*   在这个特定的应用程序中，HTML 解析并不十分稳定。假设我们使用的服务器决定以不同的格式返回其 Jargon\
  \ File 定义；如果四百万用户正在运行 Jargoneer，那么我们的代码就会有四百万个副本同时失效。在服务器上执行此任务，使其成为一个单一的故障点和单一的更新点。如果我们修复了服务器上的解析代码，服务器与客户端设备之间的接口可以保持不变。这使得升级或修复\
  \ Jargoneer 变得容易。\n\n网络 MIDP 应用程序很可能需要一个服务器组件。如果你计划进行大量的 MIDP 开发，你可能需要学习 Java Servlet。\n\
  \n## 打包你的应用程序\n\n你不会直接将类文件传递给 MIDP 来部署应用程序。相反，你将使用 Java 2 SDK 附带的 `jar` 工具将它们打包成一个\
  \ Java 归档文件（JAR）。\n\n如果你使用的是 J2ME Wireless Toolkit，则无需手动执行这些步骤；当你从菜单中选择 **项目** Ø\
  \ **打包** Ø **创建包** 时，该工具包会自动打包你的 MIDlet。（如果你只是想测试模拟器中的应用程序，则无需执行此操作，但如果你要分发 MIDlet\
  \ 套件，则需要创建一个包。）即使你使用 J2ME Wireless Toolkit，你可能也想阅读本节，以便准确了解正在发生的事情。\n\n如果你使用的是 MIDP\
  \ 参考实现，则应按照以下步骤打包你的 MIDlet。我在这里只概述步骤；在下一章中，你将了解 MIDlet 和 MIDlet 套件的所有详细细节。\n\n###\
  \ 清单信息\n\n每个 JAR 都包含一个清单文件 *META-INF\\MANIFEST.MF*，该文件描述了归档文件的内容。对于 MIDlet JAR，清单文件应包含额外信息。这些额外信息对\
  \ MIDP 运行时环境很重要，例如 MIDlet 的类名以及 MIDlet 期望的 CLDC 和 MIDP 版本。\n\n你可以在一个简单的文本文件中指定额外的清单信息，并告诉\
  \ `jar` 实用程序在创建 JAR 时将这些信息包含在清单中。例如，要打包 Jargoneer，请将以下文本保存在名为 *extra.mf* 的文件中：\n\
  \n```\nMIDlet-1: Jargoneer, , Jargoneer\nMIDlet-Name: Jargoneer\nMIDlet-Vendor:\
  \ Jonathan Knudsen\nMIDlet-Version: 1.0\nMicroEdition-Configuration: CLDC-1.0\n\
  MicroEdition-Profile: MIDP-1.0\n```\n\n现在，使用以下命令将 MIDlet 类和额外的清单信息组装到一个 JAR 中：\n\
  \n```\njar cvmf extra.mf Jargoneer.jar Jargoneer.class\n```\n\n使用 J2ME Wireless\
  \ Toolkit 时，当你按下 **构建** 按钮时，该工具包会自动将你的应用程序组装成一个 MIDlet 套件 JAR。这非常方便，让你免去学习 `jar`\
  \ 工具的麻烦。\n\n### 创建 MIDlet 描述符\n\n在你的 MIDlet 准备就绪之前，还需要一个额外的文件。必须创建一个*应用程序描述符*文件。该文件包含许多与\
  \ MIDlet JAR 清单文件中相同的信息。但是，它位于 JAR 之外，使应用程序管理软件无需安装即可了解 MIDlet JAR 的信息。\n\n应用程序描述符是一个扩展名为\
  \ *.jad* 的文本文件。输入以下内容并将其保存为 *Jargoneer.jad*：\n\n```\nMIDlet-1: Jargoneer, , Jargoneer\n\
  MIDlet-Jar-Size: 3853\nMIDlet-Jar-URL: Jargoneer.jar\nMIDlet-Name: Jargoneer\nMIDlet-Vendor:\
  \ Jonathan Knudsen\nMIDlet-Version: 1.0\n```\n\n如果你的 MIDlet 套件 JAR 大小不同，请为 MIDlet-Jar-Size\
  \ 条目输入实际大小。当你在 J2ME Wireless Toolkit 中按下 **构建** 按钮时，MIDlet 描述符会自动生成。如果你使用的是 J2ME\
  \ Wireless Toolkit，则无需自己创建应用程序描述符。\n\n\n\n## 使用混淆器\n\n由于 MIDP 设备的内存非常有限，MIDlet 套件应尽可能紧凑。*混淆器*是一种用于最小化\
  \ MIDlet 套件 JAR 文件大小的有用工具。混淆器最初设计用于阻止对编译后字节码进行逆向工程，它可执行以下任意组合的功能：\n\n*   将类、成员变量和方法重命名为更紧凑的名称\n\
  *   移除未使用的类、方法和成员变量\n*   插入非法或可疑数据以迷惑反编译器\n\n除了最后一点，混淆器可以显著减小 MIDlet 套件 JAR 中编译类的大小。\n\
  \n市面上有各种各样的混淆器，它们拥有不同的许可证、成本和功能。如需完整列表，请参见 [`proguard.sourceforge.net/alternatives.html`](http://proguard.sourceforge.net/alternatives.html)。\n\
  \n使用混淆器需要一些技巧。关键在于在预校验之前对类进行混淆。从 1.0.4 版本开始，J2ME Wireless Toolkit 支持将混淆器插入构建周期。1.0.4\
  \ 版本内置了对 RetroGuard 的支持，2.0 版本则支持 ProGuard，并且你可以编写适配器代码来使用其他混淆器。如果你使用的是 2.0 版本的工具包，只需下载\
  \ ProGuard 并将 *proguard.jar* 文件复制到工具包的 *bin* 目录下。然后选择 **项目** Ø **包** Ø **创建混淆包**，工具包将处理所有细节。\n\
  \n本文描述了如何将 ProGuard 混淆器与 J2ME Wireless Toolkit 1.0.4 结合使用，并概述了如何为工具包添加对任何混淆器的支持。\n\
  \n[`wireless.java.sun.com/midp/ttips/proguard/`](http://wireless.java.sun.com/midp/ttips/proguard/)\n\
  \n混淆器往往有点挑剔，但一旦你正确配置好它们，它们就能显著节省空间。\n\n## 使用 Ant\n\nAnt 是一个强大的构建工具，可用于自动化 MIDlet\
  \ 套件的构建。它在概念上与 make 类似，但更简洁且更易于使用。Ant 是开源软件，属于 Apache Jakarta 项目的一部分，位于 [`jakarta.apache.org/ant/`](http://jakarta.apache.org/ant/)。\n\
  \nAnt 是面向专业开发者的工具。如果你认为已经穷尽了 J2ME Wireless Toolkit 的可能性，那么 Ant 很可能是你接下来应该学习的工具。Ant\
  \ 在构建周期的结构上提供了相当大的灵活性，并让你能够轻松地自动化诸如生成文档或打包源代码等任务。关于 Ant 和 MIDP 的介绍，请参见 [`wireless.java.sun.com/midp/articles/ant/`](http://wireless.java.sun.com/midp/articles/ant/)。\n\
  \n本书的代码下载中包含一个 Ant 构建脚本。构建脚本的简化版本如清单 2-2 所示。\n\n清单 2-2：一个 Ant 构建脚本示例\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\n<project name=\"wj2\" default=\"dist\" basedir=\"..\">\n  <property\
  \ name=\"project\" value=\"wj2\"/>\n\n  <property name=\"midp\" value=\"/WTK20\"\
  />\n  <property name=\"midp_lib\" value=\"${midp}/lib/midpapi.zip\"/>\n\n  <target\
  \ name=\"run\">\n    <exec executable=\"${midp}/bin/emulator\">\n      <arg line=\"\
  -classpath build/bin/${project}.jar\"/>\n      <arg line=\"-Xdescriptor build/bin/${project}.jad\"\
  />\n    </exec>\n  </target>\n\n  <target name=\"dist\" depends=\"preverify\">\n\
  \    <mkdir dir=\"build/bin\"/>\n    <jar basedir=\"build/preverified\"\n      \
  \  jarfile=\"build/bin/${project}.jar\"\n        manifest=\"bin/MANIFEST.MF\">\n\
  \      <fileset dir=\"res\"/>\n    </jar>\n    <copy file=\"bin/${project}.jad\"\
  \n        tofile=\"build/bin/${project}.jad\"/>\n  </target>\n\n  <target name=\"\
  preverify\" depends=\"obfuscate_null\">\n    <mkdir dir=\"build/preverified\"/>\n\
  \    <exec executable=\"${midp}/bin/preverify\">\n      <arg line=\"-classpath ${midp_lib}\"\
  />\n      <arg line=\"-d build/preverified\"/>\n      <arg line=\"build/obfuscated\"\
  />\n    </exec>\n  </target>\n  <target name=\"obfuscate_null\" depends=\"compile\"\
  >\n    <mkdir dir=\"build/obfuscated\"/>\n    <copy todir=\"build/obfuscated\">\n\
  \      <fileset dir=\"build/classes\"/>\n    </copy>\n  </target>\n\n  <target name=\"\
  compile\" depends=\"init\">\n    <mkdir dir=\"build/classes\"/>\n    <javac destdir=\"\
  build/classes\" srcdir=\"src\"\n        bootclasspath=\"${midp_lib}\" target=\"\
  1.1\"/>\n  </target>\n\n  <target name=\"init\">\n    <tstamp/>\n  </target>\n</project>\n\
  ```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n此构建脚本包含与 MIDlet 套件开发步骤相对应的目标：编译、预校验和\
  \ dist（打包应用程序）。还包含一个 obfuscate_null 目标；它作为在构建周期中插入混淆操作的占位符。（源代码下载中的实际构建脚本包含一个使用\
  \ ProGuard 进行混淆的目标。）\n\n一些开发者创建了专门的 Ant 任务来帮助进行 MIDlet 套件构建。其中一个项目位于：\n\n[`antenna.sourceforge.net/`](http://antenna.sourceforge.net/)\n\
  \n## 在真实设备上运行\n\n在撰写本文时，全球已部署了数百万部支持 MIDP 的手机。MIDP 设备的完整列表可在 [`wireless.java.sun.com/device/`](http://wireless.java.sun.com/device/)\
  \ 找到。如何将 MIDlet 实际安装到设备上？有两种可能：要么通过串行电缆将 MIDlet 套件从计算机传输到手机，要么通过无线网络传输 MIDlet 套件。（另一种可能性是混合方式——设备放在底座中，通过串行电缆连接到计算机，可以利用台式计算机的网络连接，就像使用无线连接一样，应用程序可以通过这种方式传输。）这第二种可能性称为*空中下载*（OTA）*配置*。OTA\
  \ 有一个标准协议，作为 MIDP 1.0 规范的附录进行了描述。（OTA 附录包含在 MIDP 2.0 规范中。）\n\n通过串行电缆或 OTA 配置安装 MIDlet\
  \ 的方式取决于你使用的具体设备。你需要查阅设备的文档，了解如何安装 MIDlet 套件。\n\n## 总结\n\n本章带你了解了 MIDP 开发。创建源代码与\
  \ J2SE 开发非常相似，但构建过程有所不同。首先，必须使用 javac 的 -bootclasspath 选项针对 MIDP 类编译源代码。其次，必须使用\
  \ preverify 命令行工具对类文件进行预校验。使用 J2ME Wireless Toolkit，这些步骤可以方便地自动化。只需按下**构建**按钮即可构建和预校验。应用程序可以使用\
  \ J2ME Wireless Toolkit 在模拟器中轻松测试。\n\n"
- "# 第 3 章：关于 MIDlet 的一切\n\n在第 2 章中，你快速了解了构建和运行 MIDlet 的过程。在本章中，你将深入探讨细节。我将涵盖上一章中略过的主题，从\
  \ MIDlet 生命周期开始，一直到对 MIDlet 打包的全面讨论。本章最后将介绍 MIDP 2.0 的安全架构。\n\n\n\n## MIDlet 生命周期\n\
  \nMIDP 应用程序由 `javax.microedition.midlet.MIDlet` 类的实例表示。MIDlet 具有特定的生命周期，这体现在 `MIDlet`\
  \ 类的方法和行为中。\n\nJava 领域之外的一块设备软件——*应用程序管理器*，控制着 MIDlet 的安装和执行。MIDlet 通过将其类文件移动到设备上来完成安装。类文件将被打包到\
  \ Java 归档文件（JAR）中，而附带的描述符文件（扩展名为 `*.jad*`）则描述了 JAR 的内容。\n\nMIDlet 会经历以下状态：\n\n1.\
  \  当 MIDlet 即将运行时，会创建一个实例。MIDlet 的构造函数被执行，此时 MIDlet 处于*暂停*状态。\n\n2.  接着，在应用程序管理器调用\
  \ `startApp()` 后，MIDlet 进入*活动*状态。\n\n3.  当 MIDlet 处于活动状态时，应用程序管理器可以通过调用 `pauseApp()`\
  \ 来暂停其执行。这会使 MIDlet 回到暂停状态。MIDlet 也可以通过调用 `notifyPaused()` 自行进入暂停状态。\n\n4.  应用程序管理器可以通过调用\
  \ `destroyApp()` 来终止 MIDlet 的执行，此时 MIDlet 被*销毁*，并耐心等待垃圾回收。MIDlet 可以通过调用 `notifyDestroyed()`\
  \ 自行销毁。\n\n图 3-1 展示了 MIDlet 的状态及其之间的转换。\n\n![点击展开](img/fig52_01_0.jpg)\n图 3-1：MIDlet\
  \ 生命周期\n\n`MIDlet` 类中还有一个与 MIDlet 生命周期相关的方法：`resumeRequest()`。处于暂停状态的 MIDlet 可以调用此方法，向应用程序管理器发出信号，表明它希望变为活动状态。考虑一个处于暂停状态的\
  \ MIDlet 还能运行任何代码，这似乎有些奇怪。然而，暂停的 MIDlet 仍然能够处理定时器事件或其他类型的回调，因此有机会调用 `resumeRequest()`。如果应用程序管理器决定将\
  \ MIDlet 从暂停状态转移到活动状态，它将通过调用 `startApp()` 这一常规机制来实现。\n\n## 请求唤醒调用\n\nMIDP 2.0 允许\
  \ MIDlet 请求在稍后的时间启动，本质上就是向实现请求一个唤醒调用。该方法定义在 `javax.microedition.io.PushRegistry`\
  \ 中，这看起来有点奇怪。`PushRegistry` 的所有其他方法都与响应传入网络连接而启动 MIDlet 有关；该类在第 9 章中有完整描述。`PushRegistry`\
  \ 中的以下方法用于请求在特定时间唤醒一个指定的 MIDlet：\n\n```\npublic static long registerAlarm(String\
  \ midlet, long time)\n    throws ClassNotFoundException, ConnectionNotFoundException\
  \ \n```\n\n你需要提供 MIDlet 套件中某个 MIDlet 的类名，而 `time` 则精确指定了你希望 MIDlet 启动的时间，采用标准格式，即自\
  \ 1970 年 1 月 1 日以来的毫秒数。（第 4 章讨论了 MIDP 中与时间相关的类和方法。）\n\n如果你提供的类名在当前 MIDlet 套件中未找到，则会抛出\
  \ `ClassNotFoundException`。如果实现无法在指定时间启动 MIDlet，则会抛出 `ConnectionNotFoundException`。\n\
  \n如果你为其请求定时启动的 MIDlet 之前已经注册过定时启动，此方法将返回之前的唤醒时间。\n\n## 通往外部世界的桥梁\n\n许多 MIDP 设备，尤其是手机，都带有\
  \ WAP 浏览器。MIDP 2.0 的 `MIDlet` 类中新增了一个方法，为这些浏览器和其他功能提供了桥梁：\n\n```\npublic final boolean\
  \ platformRequest(String URL)\n    throws ConnectionNotFoundException\n```\n\n在功能强大的设备上，浏览器和\
  \ MIDlet 套件可能能够同时运行，在这种情况下，浏览器将被启动并指向指定的 URL。此时该方法返回 `true`。\n\n在较小的设备上，浏览器可能必须等到\
  \ MIDlet 被销毁后才能运行。在这种情况下，`platformRequest()` 返回 `false`，并且 MIDlet 有责任自行终止。MIDlet\
  \ 终止后，实现有责任启动浏览器并将其指向指定的 URL。\n\n无论哪种情况，`platformRequest()` 都是一个非阻塞方法。\n\n提供的 URL\
  \ 有两种特殊情况。如果你提供的电话号码 URL 格式为 `tel:<number>`（如 RFC 2806 ([`ietf.org/rfc/rfc2806.txt`](http://ietf.org/rfc/rfc2806.txt))\
  \ 所规定），则实现应发起一个语音通话。\n\n如果你提供的是 MIDlet 套件描述符或 JAR 的 URL，则实现应将其解释为安装给定 MIDlet 套件的请求。\n\
  \n## 打包 MIDlet\n\nMIDlet 以 *MIDlet 套件* 的形式部署。MIDlet 套件是一个包含一些额外信息的 MIDlet 集合；它由两个文件组成。一个是*应用程序描述符*，它是一个简单的文本文件。另一个是\
  \ JAR 文件，其中包含构成 MIDlet 套件的类文件和资源文件。与任何 JAR 文件一样，MIDlet 套件的 JAR 文件都有一个清单文件。图 3-2\
  \ 展示了 MIDlet 套件的结构图。\n\n![点击展开](img/fig54_01_0.jpg)\n图 3-2：MIDlet 套件剖析\n\n如果你使用的是像\
  \ J2ME 无线工具包这样的工具，则无需过多担心 MIDlet 套件的打包问题，因为大部分细节都会自动处理。如果你想从更底层理解，或者只是好奇，请继续阅读关于\
  \ MIDlet 套件打包的完整描述。\n\n打包 MIDlet 套件包括三个步骤：\n\n1.  构成 MIDlet 的类文件和资源文件被打包到一个 JAR\
  \ 文件中。通常，你会使用 `jar` 命令行工具来完成此操作。\n\n2.  运行时所需的额外信息被放置在 JAR 的清单文件中。所有 JAR 都包含一个清单；MIDlet\
  \ 套件 JAR 包含一些应用程序管理软件所需的额外信息。\n\n3.  还必须生成一个应用程序描述符文件。这是一个扩展名为 `*.jad*` 的文件，用于描述\
  \ MIDlet 套件 JAR。应用程序管理软件可以使用它来决定是否应将 MIDlet 套件 JAR 下载到设备上。\n\n\n\n### MIDlet 清单信息\n\
  \n存储在 MIDlet 清单文件中的信息由名称和值对组成，类似于属性文件。例如，一个简单的 JAR 清单可能如下所示：\n\n```\nManifest-Version:\
  \ 1.0\nCreated-By: 1.3.0 (Sun Microsystems Inc.)\n```\n\nJargoneer 的 MIDlet JAR\
  \ 清单如下所示：\n\n```\nManifest-Version: 1.0\nMIDlet-1: Jargoneer, Jargoneer.png, Jargoneer\n\
  MIDlet-Name: Jargoneer\nMIDlet-Version: 1.0\nMIDlet-Vendor: Sun Microsystems\nCreated-By:\
  \ 1.3.0 (Sun Microsystems Inc.)\nMicroEdition-Configuration: CLDC-1.0\nMicroEdition-Profile:\
  \ MIDP-1.0\n```\n\n额外的属性描述了软件版本、类名以及关于 MIDlet 套件的其他信息。必须包含以下属性：\n\n*   **MIDlet-Name**：尽管名称如此，此属性实际上指的是整个\
  \ MIDlet 套件的名称，而不仅仅是单个 MIDlet。\n\n*   **MIDlet-Version**：描述 MIDlet 套件的版本。这是一个您自己选择的数字，格式为\
  \ *主版本号.次版本号.修订号*。\n\n*   **MIDlet-Vendor**：这是您的姓名或公司名称。\n\n*   **MIDlet-*n***：对于\
  \ MIDlet 套件中的每个 MIDlet，列出其可显示名称、图标文件和类名。MIDlet 应从 1 开始连续编号。例如，单个 MIDlet 套件中的多个 MIDlet\
  \ 可以这样列出：\n\n    ```\n    MIDlet-1: Sokoban, /icons/Sokoban.png, example.sokoban.Sokoban\n\
  \    MIDlet-2: Tickets, /icons/Auction.png, example.lcdui.TicketAuction\n    MIDlet-3:\
  \ Colors, /icons/ColorChooser.png, example.chooser.Color\n    MIDlet-4: Stock, /icons/Stock.png,\
  \ example.stock.StockMIDlet \n    ```\n\n*   **MicroEdition-Configuration**：此属性描述此\
  \ MIDlet 套件可以运行的 J2ME 配置。多个配置名称应用空格分隔。\n\n*   **MicroEdition-Profile**：描述此 MIDlet\
  \ 套件可以运行的配置文件集。对于 MIDP 1.0 应用程序，这是 MIDP-1.0。对于可以在 MIDP 1.0 或 MIDP 2.0 上运行的应用程序，请使用\
  \ \"MIDP-2.0 MIDP-1.0\"。\n\n除了必需的清单属性外，还可以定义以下属性：\n\n*   **MIDlet-Description:**\
  \ MIDlet 套件的描述放在此属性中。\n\n*   **MIDlet-Icon:** 单个 MIDlet 的图标在 MIDlet-n 属性中描述。此属性指定一个图标来表示整个\
  \ MIDlet 套件。\n\n*   **MIDlet-Info-URL:** 如果在线提供了关于 MIDlet 套件的额外信息，请使用此属性列出 URL。\n\
  \n*   **MIDlet-Data-Size:** 如果您知道 MIDlet 套件需要多少字节的持久数据，您可以使用此属性指定该数字。\n\n|  | 提示 \
  \ | 不要被属性名称迷惑。许多属性名称似乎指的是单个 MIDlet，例如 *MIDlet-Name* 和 *MIDlet-Description*。实际上，这些属性描述的是整个\
  \ MIDlet 套件。唯一适用于特定 MIDlet 的属性是 *MIDlet-n* 属性，它用于列出套件中的每个 MIDlet。 |\n\n在 MIDP 2.0\
  \ 中，可以包含几个额外的属性。MIDP 2.0 使用权限方案保护网络 API 免受未经授权的访问，这将在本章后面详细讨论。MIDlet 可以在 MIDlet\
  \ JAR 清单中列出必需的权限和可选的权限，如下所示：\n\n*   **MIDlet-Permissions:** 使用此属性列出对 MIDlet 套件运行至关重要的权限。多个权限用逗号分隔。\n\
  \n*   **MIDlet-Permissions-Opt:** 此属性列出可能使用但对本 MIDlet 套件并非至关重要的权限。\n\n最后，MIDP 2.0\
  \ 还提供了一种方式，让 MIDlet 套件表明它们对可选 API 的依赖：\n\n*   **MIDlet-Extensions:** 在此属性中列出本 MIDlet\
  \ 套件使用的可选 API。确切名称由各个可选 API 规范决定。\n\n### 应用程序描述符\n\n应用程序管理软件使用 MIDlet 套件 JAR 中的属性来运行套件内的\
  \ MIDlet。相比之下，应用程序描述符包含帮助设备决定是否加载 MIDlet 套件的信息。由于应用程序描述符是一个独立于 MIDlet 套件 JAR 的文件，设备可以在下载\
  \ MIDlet 套件之前轻松加载并检查该文件。\n\n实际上，应用程序描述符中的许多信息与 MIDlet 套件 JAR 中的信息相同。例如，应用程序描述符必须包含\
  \ MIDlet-Name、MIDlet-Version 和 MIDlet-Vendor 属性。此外，它还应包含以下内容：\n\n*   **MIDlet-Jar-URL:**\
  \ 这是可以找到 MIDlet 套件 JAR 的 URL。\n\n*   **MIDlet-Jar-Size:** 这是 MIDlet 套件 JAR 的大小，以字节为单位。\n\
  \n应用程序描述符可以选择性地包含 MIDlet-Description、MIDlet-Icon、MIDlet-Info-URL 和 MIDlet-Data-Size\
  \ 属性。\n\n设备和模拟器在处理 MIDlet 套件描述符方面差异很大。有些设备在描述符中任何字段不正确时都会导致安装失败，而其他设备则更为宽松。像 J2ME\
  \ Wireless Toolkit 这样的工具对于创建格式良好的描述符非常有用。\n\n应用程序描述符在无线（OTA）部署中非常有用。设备可以在决定是否下载并安装整个\
  \ MIDlet 套件 JAR 之前，下载并检查描述符（一个相对较短的文件）。对于 OTA 配置，服务器返回的应用程序描述符的 MIME 类型应为 text/vnd.sun.j2me.app-descriptor。这一点以及更多内容（整个协议）在\
  \ MIDP 2.0 规范的 *Over the Air User Initiated Provisioning Specification* 部分中有描述。\n\
  \n### MIDlet 属性\n\n清单或应用程序描述符中还有另一种属性可能性。您可以添加对您的 MIDlet 有意义的属性。MIDlet 可以使用 `javax.microedition.midlet.MIDlet`\
  \ 类中的 `getAppProperty()` 方法检索这些属性的值。一个属性可以列在应用程序描述符、JAR 清单或两者中；如果两者都列出，则将使用应用程序描述符中的值。通常，将应用程序属性存储在应用程序描述符文件中是合理的。由于它独立于\
  \ MIDlet 套件 JAR，因此可以轻松更改应用程序描述符以修改 MIDlet 的行为。例如，您可以在应用程序描述符中存储一个 URL 或其他配置信息。\n\
  \n例如，假设您在应用程序描述符中放置了一个特定于应用程序的属性，如下所示：\n\n```\nJargoneer.url: http://www.dict.org/bin/Dict\n\
  ```\n\n在 MIDlet 内部，您可以像这样检索该属性的值：\n\n```\nString url = getAppProperty(\"Jargoneer.url\"\
  );\n```\n\n更改 URL 就像更改应用程序描述符（一个简单的文本文件）一样容易。您的任何代码都不需要重新编译。如果您希望分发 MIDlet 的多个副本并在多台服务器之间分担服务器负载，这将非常有用。您可以使用一组不同的应用程序描述符来分发相同的\
  \ MIDlet 套件 JAR，每个描述符都使用一个 MIDlet 属性指向不同的服务器。\n\n\n\n## MIDlet 套件安全\n\n无线应用安全对于无线行业的几乎所有参与者都至关重要：\n\
  \n*   **运营商**希望确保病毒不会导致客户设备或网络瘫痪。\n*   **设备制造商**不希望用户安装的软件导致设备崩溃。\n*   **用户**希望能够运行下载的代码，而不会威胁到设备的稳定性或个人信息的安全。此外，他们可能希望控制应用程序的网络使用，因为网络使用通常需要付费。\n\
  \nMIDP 1.0 并未在规范文本中直接解决这些问题，但基于 JVM 的架构使其从安全角度来看成为一个有吸引力的平台。Java 虚拟机（JVM）的设计确保了\
  \ MIDlet 无法逃脱 JVM 的限制，因此即使是恶意的 MIDlet，其最坏情况也仅是导致 JVM 崩溃或无法响应，而不会损害设备上的其他软件。此外，MIDP\
  \ 1.0 API 没有暴露任何敏感功能，网络 API 可能是个例外。\n\n### 权限\n\nMIDP 2.0 引入了一个明确的安全架构。MIDlet 必须拥有*权限*才能执行敏感操作。在\
  \ MIDP 2.0 中，API 中唯一受权限保护的部分是网络连接。可选 API 可以自由定义额外的权限来保护敏感数据或功能。\n\n权限名称使用与其保护的 API\
  \ 相同的前缀和类或接口名称。在第 9 章中，我将详细解释 MIDP 2.0 中网络权限的名称。目前，假设您编写了一个需要建立套接字连接的 MIDlet。这个\
  \ MIDlet 需要 `javax.microedition.io.Connector.socket` 权限。MIDlet 本身不需要了解权限。它只是尝试连接，连接要么成功，要么抛出\
  \ `java.lang.SecurityException`。\n\nMIDP 2.0 在 MIDlet 类中添加了一个新方法，程序员可以使用它来检查权限是否会被授予或拒绝：\n\
  \n```\npublic final int checkPermission(String permission)\n```\n\n如果权限被授予，此方法返回\
  \ 1；如果权限被拒绝，则返回 0。特殊返回值 -1 表示实现无法确定权限是否会被授予或拒绝，这可能是当系统会询问用户关于给定权限的情况。\n\n### 保护域\n\
  \n在 MIDP 2.0 中，MIDlet 套件属于*保护域*，这些域决定了哪些权限被授予、哪些被拒绝，以及哪些必须交由用户判断。保护域有点像秘密俱乐部，由两部分组成：\n\
  \n1.  允许的权限集以及需要咨询用户的权限集。\n2.  MIDlet 套件如何进入此保护域的规则。\n\n一个非常简单的保护域 \"SimplePD\"\
  \ 可能包含权限 `javax.microedition.io.Connector.http`。进入 SimplePD 的规则可能简单到验证 MIDlet 套件的源\
  \ IP 地址。例如，如果 MIDlet 套件是从 [www.bigcarrier.com](http://www.bigcarrier.com) 下载的，那么设备上的应用程序管理软件就会知道将该\
  \ MIDlet 套件放入 SimplePD 保护域。在运行时，任何尝试进行 HTTP 连接的 MIDlet 都将被授予该权限。尝试其他连接类型将被拒绝。\n\n\
  SimplePD 基于简单 IP 来源的标准相当薄弱。SimplePD 中的 MIDlet 套件容易受到多种攻击，包括数据修改、数据替换、中间人攻击和 DNS\
  \ 欺骗。更健壮的规则基于用于数据完整性和身份验证的加密解决方案。在 MIDP 2.0 规范中，“使用 X.509 PKI 的可信 MIDlet 套件”一节描述了一种此类方案，包括额外的清单属性。\n\
  \n其内容和来源无法验证的 MIDlet 套件将被放入一种默认的保护域，即*不受信任*域。MIDP 2.0 规范对不受信任域的唯一限制是，在获得用户明确确认后，它必须允许\
  \ MIDlet 访问 HTTP 和 HTTPS 连接。\n\n保护域的概念故意定义得比较模糊，以便在实现时留有相当大的自由度。我猜测许多实现会选择拥有一个不受信任域和一个受信任域，进入受信任域仅限于经过加密签名（和验证）的\
  \ MIDlet 套件。\n\n### 权限类型\n\n保护域包含将授予 MIDlet 的权限（*允许*权限）以及必须咨询用户的权限（*用户*权限）。用户权限有几种变体。*全局*意味着用户只需为某个\
  \ MIDlet 套件授予或拒绝一次权限。*会话*意味着用户必须在每次调用 MIDlet 套件时授予或拒绝权限。最后，*一次性*表示每次需要必要权限时都必须咨询用户。\n\
  \n### MIDlet 套件描述符中的权限\n\nMIDP 2.0 为 MIDlet 套件描述符定义了额外的属性。如果您的 MIDlet 套件绝对、肯定需要某些权限，请使用\
  \ `MIDlet-Permissions` 属性。例如，如果您的 MIDlet 套件需要建立 HTTP 连接才能正常运行，您需要在描述符文件中添加如下一行：\n\
  \n```\nMIDlet-Permissions: javax.microedition.io.Connector.http\n```\n\n多个权限类型放在同一行，用逗号分隔。\n\
  \n如果您的 MIDlet 套件不需要某些权限即可运行，但可以使用它们来增强功能，则可以将这些权限放在 `MIDlet-Permissions-Opt` 属性中。\n\
  \n在安装时，应用程序管理软件会将描述符中请求的权限与目标保护域中的权限进行比较。如果存在不可调和的分歧，则不会安装该 MIDlet 套件。\n\n## 总结\n\
  \nMIDP 应用程序称为 MIDlet。与 applet 或 servlet 类似，MIDlet 具有特定的生命周期；它们由设备软件管理。本章详细介绍了 MIDlet\
  \ 套件清单文件和应用程序描述符中可能包含的条目。应用程序属性可用作在应用程序描述符中存储信息的一种方式，而不是将值硬编码到 MIDlet 源代码中。像 J2ME\
  \ 无线工具包这样的工具会自动处理 MIDlet 属性打包的许多细节。MIDP 2.0 包含一个基于保护域的全面安全架构。\n\n"
- "# 第 4 章：几乎相同的老内容\n\n## 概述\n\n正如我在第 1 章中讨论的，您可能对 MIDP 作为平台感兴趣的原因之一是它基于 Java 编程语言和\
  \ Java API。您还会记得 MIDP 是构建在连接有限设备配置（CLDC）之上的。CLDC 包含大多数经验丰富的 Java 程序员会感到熟悉的 API。在撰写本文时，CLDC\
  \ 1.0 是当前版本，但 CLDC 1.1 规范的收尾工作正在进行中。在本章中，我将提及 CLDC 1.0 和 CLDC 1.1 之间的变化。\n\n在本章中，我们将探讨\
  \ CLDC 中定义的 `java.lang`、`java.io` 和 `java.util` 包。我假设您已经熟悉 J2SE 的基本 API；我将介绍哪些是相同的，哪些是不同的。\n\
  \n在撰写本文时（2003 年第一季度），CLDC 1.1 和 MIDP 2.0 尚未在真实设备上实现。尽管 MIDP 2.0 最终将在 CLDC 1.1 之上实现，但第一波\
  \ MIDP 2.0 实现将使用 CLDC 1.0。\n\n\n\n## CLDC 1.0 中无浮点数支持\n\n一个全局性的变化是，CLDC 1.0 完全不支持浮点类型。这意味着不存在\
  \ `float` 或 `double` 基本类型。对应的包装类型 `java.lang.Float` 和 `java.lang.Double` 也已被移除。\n\
  \nCLDC 1.0 中缺少浮点支持，是因为大多数小型设备没有用于浮点运算的硬件支持。如果涉及小数的计算对你的应用程序很重要，你可以在软件中执行这些计算。一个实现（使用定点整数）可以在\
  \ [`home.rochester.rr.com/ohommes/MathFP/`](http://home.rochester.rr.com/ohommes/MathFP/)\
  \ 找到。\n\nCLDC 1.1 包含了浮点支持，即基本类型 `double` 和 `float`，以及包装类型 `Double` 和 `Float`。CLDC\
  \ 1.1 中其他各种类也为了浮点支持做了修改，但这些改动很小。\n\n## java.lang\n\n表 4-1 和 表 4-2 列出了 J2SE（SDK 1.4.0\
  \ 版本）和 CLDC 中 `java.lang` 和 `java.lang.ref` 的类和接口。CLDC 列指示该类是否与其 J2SE 对应类相同、是否存在\
  \ API 差异，或者完全不存在。\n\n表 4-1：*java.lang* 包\n\n| **接口** |   |   |\n| --- | --- | ---\
  \ |\n| ***J2SE SDK 1.4.0*** | ***CLDC 1.0*** | ***CLDC 1.1*** |\n| --- | --- | ---\
  \ |\n| CharSequence | - | - |\n| Cloneable | - | - |\n| Comparable | - | - |\n|\
  \ Runnable | 相同 | 相同 |\n\n| **类** |   |   |\n| --- | --- | --- |\n| ***J2SE SDK\
