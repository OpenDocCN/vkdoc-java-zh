  \ 和 `run`。`sendMsg` 在调度一个新线程（使用已分配的 `SMSSender` 实例作为 `Runnable` 对象）之前，先保存它要发送的消息的参数——接收方地址、接收方端口和消息文本本身。\n\
  \n一旦 Java 运行时启动新线程，它就会调用 `run` 方法，该方法实际将消息文本发送到您提供的地址和端口。过程很简单：创建目标地址，使用 GCF 创建一个\
