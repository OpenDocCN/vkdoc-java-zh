  \ 章 ■ NetBeans IDE 入门\n\n**35**\n\n**熟悉 NetBeans IDE**\n\n第一次启动 NetBeans IDE 可能会让人不知所措，尤其是当你习惯了其他\
  \ IDE（或根本没有使用 IDE）时。图 3-1 展示了 NetBeans IDE 在处理一个典型项目时的界面。幸运的是，一旦你开始实际使用这个环境，这种挫败感很快就会消失，因为你经常使用的功能会变得自然，而不常用的功能则会逐渐淡出你的视线。\n\
  \n**图 3-1.** *工作中的 NetBeans IDE*\n\nNetBeans IDE 分为几个窗口。以下是一些最重要的窗口：\n\n• *项目/文件/运行时*：允许你检查应用程序的包和文件系统布局\n\
  \n• *导航器*：允许你浏览当前正在编辑的类的成员或类层次结构\n\n• *编辑器*：允许你编辑应用程序的设计、布局和源代码\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**36**\n\n第 3 章 ■ NetBeans IDE 入门\n\n• *面板*：在使用可视化 GUI 设计器（在 NetBeans IDE 的旧文档中常被称为\
  \ Matisse）时可见，其中包含可以拖放到可视化 GUI 编辑器窗口的组件\n\n• *属性*：允许你在可视化 GUI 设计器中工作时编辑所选项目的各种属性\n\
  \n• *输出*：显示构建结果、执行过程中的系统日志等\n\n与其他 IDE 一样，你需要习惯的一点是这些窗口可能会时隐时现；例如，在应用程序调试期间，输出窗口的区域会变小，释放出的空间用于容纳另一个窗口，该窗口带有选项卡，显示应用程序在断点处停止时的监视点、局部变量和调用堆栈。同样，面板窗口可能会根据你是在编辑可视化布局（此时应可见）还是源代码（此时可能消失）而出现或消失。如果你找不到想要的窗口——这是常见情况，尤其是在刚开始时——只需将鼠标移到“窗口”菜单栏，然后选择你正在寻找的窗口即可。\n\
  \nNetBeans IDE 将你的源代码作为一个*项目*来管理——即目录中的文件集合，包括你的源文件以及用于构建项目的 Apache Ant 输入。最好不要随意改动\
  \ NetBeans SDK 设定的目录层次结构，但了解每个文件和目录的用途会有所帮助：\n\n• build.xml：此文件包含 NetBeans SDK 用于构建应用程序的\
  \ Ant 构建脚本。\n\n• nbproject：此目录包含 IDE 用于管理项目本身的文件。\n\n• src：此目录包含你为应用程序编写的源代码。\n\n\
  • test：此可选目录包含你编写的任何单元测试的代码。\n\n• resources：此可选目录包含应用程序的任何二进制资源。\n\n• build：此目录由\
  \ NetBeans IDE 用于存放应用程序的中间构建产品，包括类和其他文件。\n\n• dist：此目录由 NetBeans IDE 生成，包含应用程序的已生成\
  \ Java 可执行文件。\n\n如果你正在使用诸如并发版本系统 (CVS) 或 Subversion (SVN) 之类的版本控制软件——对于任何严肃的工作，你都应该这样做——那么除了\
  \ build 和 dist 目录（这些目录是在你执行构建时由 NetBeans IDE 在运行时生成的）之外，你应该将所有其他目录都置于变更控制之下。IDE\
  \ 的一个出色功能是\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00029.png)\n\
  \n第 3 章 ■ NetBeans IDE 入门\n\n**37**\n\n对 CVS 和 Subversion 的集成支持；CVS 是内置的，而 SVN 可以从更新中心（从“工具”菜单中选择“更新中心”）作为可选模块安装。\n\
