  \ API 提供了 `Coordinates` 和 `QualifiedCoordinates` 类来表示空间中的特定位置。`Coordinates` 实例是绝对的，指定了纬度、经度和海拔高度，且没有误差；`QualifiedCoordinates`\
  \ 扩展了 `Coordinates` 的概念，增加了以米为单位的水平和垂直不确定度信息。`Coordinates` 类提供了获取坐标值的方法（`getAltitude`、`getLatitude`\
  \ 和 `getLongitude`），以及一个通用的转换方法（`convert`），用于在坐标的浮点表示和字符串表示之间进行转换。\n\n你还可以通过调用一个\
  \ `Coordinates` 对象的 `azimuthTo` 和 `distance` 方法，并传入第二个坐标，来获取坐标之间的方位角和距离。\n\n由于 `LocationProvider`\
  \ 始终提供真实的测量值，因此它总是返回一个 `QualifiedCoordinate`；你可以使用结果的 `getHorizontalAccuracy` 和\
  \ `getVerticalAccuracy` 方法来确定特定位置测量的不确定度。\n\n你的应用程序可能需要不止一次的位置测量；你可以重复调用 `LocationProvider`\
  \ 的 `getLocation` 方法，或者注册一个实现了 `LocationListener` 的对象来接收位置事件。通过 `setLocationListener`\
  \ 方法向 `LocationProvider` 注册一个 `LocationListener` 需要四个参数：\n\n• `listener`：接收位置事件的\
  \ `LocationListener` 实现\n\n• `interval`：指定确定位置并向监听器发送位置事件的频率\n\n• `timeout`：指定在间隔时间过后，位置信息最多可以延迟多久\n\
  \n• `maximumAge`：指定在设置事件时，允许的位置结果的最大时效（以秒为单位）\n\n类似地，你的应用程序可以通过使用 `addProximityListener`\
  \ 方法添加一个 `ProximityListener`，在设备接近特定位置时接收通知。\n\n当你这样做时，你需要指定实现 `ProximityListener`\
  \ 接口的实例、目标位置的坐标，以及围绕目标位置定义临近区域的半径（以米为单位）。但请注意，虽然你可以通过单个 `LocationProvider` 拥有多个临近通知，但你只能拥有一个\
  \ `LocationListener`。\n\n**使用 Location API 管理地标**\n\nLocation API 包含两个类，允许具有位置感知能力的应用程序通过一个公共存储进行交互：`Landmark`\
  \ 和 `LandmarkStore`。任何具有安全权限且支持 LBS 的应用程序都可以向此存储添加内容，以及查看和修改此存储中的元素。这两个类使你能够在一个应用程序（例如，旅行指南）中添加一个地标，并从另一个应用程序（例如，逐向导航应用程序）中访问同一个地标。\n\
  \n顾名思义，`LandmarkStore` 包含 `Landmark` 对象的表示。\n\n`LandmarkStore` 是持久化的，尽管没有指定具体的实现方式；它可能将记录保存在闪存中的\
  \ MIDP 记录存储中，或者完全使用其他存储方案。\n\nLocation API 要求任何实现至少有一个 `LandmarkStore`，称为*默认* `LandmarkStore`，尽管该实现可能支持额外的存储，你可以像访问\
  \ MIDP 记录存储一样通过名称来访问它们。要访问一个存储，你必须首先获取一个 `LandmarkStore` 的实例，方法是调用其静态方法 `getInstance`\
  \ 并传入你寻找的存储名称（对于默认存储则传入 `null`）。\n\n你可以通过调用 `LandmarkStore.listLandmarkStores` 方法来获取存储列表，该方法返回一个字符串数组，其中包含设备上每个存储的名称。`LandmarkStore`\
  \ 还提供了静态方法 `createLandmarkStore` 和 `deleteLandmarkStore`，用于创建和删除存储。\n\n与我向你展示的第\
  \ 7 章中的 PIM 包类似，Location API 支持 `LocationStore` 的类别；类别只是一个附加到存储中条目的字符串，允许用户通过该字符串对相关项目进行分组（例如“工作”或“假期”）。你可以使用以下方法与存储中的类别进行交互：\n\
  \n• `getCategories`：枚举存储中的类别，返回一个 `Enumeration`\n\n• `addCategory`：添加一个类别\n\n• `deleteCategory`：删除一个类别，同时保留该类别中的记录\n\
  \n请注意，你可以将一个类别与存储中的多个条目关联，但每个条目只能与一个类别关联。\n\n`LandmarkStore` 提供了以下用于在存储中添加、删除和更新\
  \ `Landmark` 的方法：\n\n• `addLandmark`：向存储中添加一个新的地标\n\n• `deleteLandmark`：删除存储中的一个地标\n\
  \n• `updateLandmark`：更新存储中一个已有的地标\n\n• `removeLandmarkFromCategory`：移除分配给特定 `Landmark`\
  \ 的类别\n\n添加一个 `Landmark` 需要你同时传入要添加的 `Landmark` 实例和一个类别名称（或者传入 `null` 表示无类别）。\n\n\
  你可以使用其定义的三个 `getLandmarks` 方法之一来搜索存储中已有的 `Landmark` 实例，所有这些方法都返回一个 `Landmark` 的\
  \ `Enumeration`。不传参数调用 `getLandmarks` 会枚举存储中的*所有* `Landmark`。向 `getLandmarks` 传入一个类别名称（或\
  \ `null`）和一个由纬度和经度构成的边界矩形，会返回该矩形内 `Landmark` 实例的枚举列表；而仅传入一个类别（或 `null`）和一个名称，则会返回你指定的类别中具有你提供名称的\
  \ `Landmark` 实例。\n\n`Landmark` 本身只是一个容器，用于保存用户的名称、描述、地址信息和坐标；该类通过访问器和修改器公开这些信息：\n\
  \n• `getName` 和 `setName`：获取和设置地标名称\n\n• `getDescription` 和 `setDescription`：获取和设置地标描述\n\
  \n• `getAddressInfo` 和 `setAddressInfo`：获取和设置地标地址，该地址是 `AddressInfo` 的一个实例\n\n•\
  \ `getQualifiedCoordinates` 和 `setQualifiedCoordinates`：获取和设置地标的位置，作为 `QualifiedCoordinates`\
  \ 的一个实例\n\n**理解安全在 LBS 中的作用**\n\n许多用户对位置和网络服务之间的相互关系*非常*敏感，这是可以理解的；隐私通常是一个关键问题。与大多数可选\
  \ API 一样，Location API 在支持它的平台（如 MIDP 2.0）上需要权限。因此，你的应用程序在分发后，可能需要在移动设备上运行时获得运营商签名。表\
  \ 17-3 列出了 Location API 中的权限名称和受保护的方法。该 API 不仅为确定位置提供权限，还为访问地标存储提供权限。\n\n**表 17-3.**\
