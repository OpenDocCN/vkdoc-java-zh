  `    if (connections != null && connections.length > 0) {`\n`        for (int i=0;\
  \ i < connections.length; i++) {`\n`            c = (MessageConnection) Connector.open(connections[i]);`\n\
  `            Message m = c.receive();`\n`            if (m instanceof TextMessage)\
  \ {`\n`                processOneMessage((TextMessage)m);`\n`            }`\n` \
