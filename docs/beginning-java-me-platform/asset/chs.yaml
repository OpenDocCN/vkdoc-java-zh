  \ NetBeans IDE 时，你会注意到两件事。首先，大段代码带有蓝色背景；IDE 会自动生成并维护这些代码块。其次，如果你将这些代码行的外观与清单 3-1\
  \ 中的代码进行比较，你会发现清单中有许多包含 `//GEN-BEGIN`、`//GEN_LINE` 和 `//GEN_END` 等注释的行，后面跟着唯一标识符。NetBeans\
  \ IDE 会插入这些注释，并用它们来标记其创建和维护的代码；如果你编辑源代码，请小心不要编辑这些行，否则当你再次使用屏幕设计器和流程设计器时，所做的更改将会丢失。\n\
  \n虽然我将在第 4 章更详细地介绍 MIDlet 的结构，但现在值得花点时间指出 NetBeans IDE 为我们生成的代码的一些特点。就像传统的 applet\
  \ 和应用程序一样，MIDlet 具有特定的生命周期，尽管它与 applet 略有不同：\n\n• **构造**：当应用程序管理系统启动 MIDlet 时，会创建一个实例，导致运行时调用\
  \ MIDlet 的构造函数。此时 MIDlet 处于*暂停*状态。\n\n• **活动**：当应用程序管理器调用 MIDlet 的 `startApp` 方法时，MIDlet\
  \ 处于*活动*状态并正常运行。\n\n• **暂停**：在任何时候，应用程序管理器都可以通过调用 `pauseApp` 来暂停 MIDlet，以允许其他应用程序访问手机（例如接听来电）。或者，MIDlet\
  \ 可以通过调用 `notifyPaused` 自行进入相同状态。从该状态，应用程序管理器可以通过再次调用 `startApp` 来恢复应用程序。\n\n• **销毁**：应用程序管理器可以随时通过调用\
  \ `destroyApp` 终止 MIDlet 的执行。或者，MIDlet 可以通过调用 `notifyDestroyed` 自行销毁。\n\n图 3-8 展示了\
  \ MIDlet 的生命周期。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 3 章 ■ 开始使用\
  \ NetBeans IDE\n\n**51**\n\n**图 3-8.** *MIDlet 生命周期*\n\n通常情况下，WeatherWidget 在构造时不会创建任何对象；相反，对象的创建会延迟到应用程序启动时进行。由应用程序管理器调用的\
  \ `startApp` 将 GUI 项目的创建委托给 `initialize`，并将显示器的当前表单设置为 `wxForm` 字段。应用程序在暂停或销毁时不执行任何操作，而是在销毁时依赖\
  \ Java 垃圾回收器回收应用程序表单所使用的内存。\n\nMIDP 环境提供了一种通用的事件概念；运行时不是处理诸如特定按键之类的事件，而是提供诸如*确定*、*返回*和*帮助*等抽象。这种抽象使得\
  \ MIDP 能够在各种设备上运行，从纯触摸屏设备，到带有四向导航键和两个软键的传统手机，再到语音驱动的用户界面。系统使用 `commandAction` 方法将这些命令发送给\
  \ MIDlet，该方法根据传入的命令决定显示哪个屏幕，或者是否完全退出（在 `exitCommand` 上）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**52**\n\n第 3 章 ■ 开始使用 NetBeans IDE\n\n**构建 CLDC/MIDP 应用程序**\n\nNetBeans IDE 使用相同的\
  \ Java 编译器来构建 CLDC 应用程序和其他应用程序；在后台，它使用一个特殊选项（`–bootpathoption`）来重定向编译器，使其为 CLDC\
  \ 使用不同的基础类。这一点很重要，因为正如你在第一章中记得的（并在前一章中详细了解到的那样），基础层次结构中的并非所有类和方法都作为 CLDC 的一部分提供。\n\
  \n构建选项——尤其是优化和混淆——在构建 Java ME 设备应用程序时起着重要作用，原因有二。首先，这些是商业应用程序，分发给广大用户，因此你当然希望保护自己的知识产权，使其免受反编译器的窥探。其次，更重要的是，优化和混淆会生成更小的应用程序，这意味着传输到目标硬件所需的时间更少，并且在目标硬件上占用的内存也更少。这是因为混淆会将类、成员变量和方法名称重命名为更短的名称，并在此过程中移除未使用的类、方法和成员变量。NetBeans\
  \ IDE 包含了流行的开源 ProGuard 混淆器，你可以通过项目属性窗口中的“混淆”面板来控制它。在编译时，你可能还想测试优化和非优化构建在内存和时间性能方面的表现；请前往项目属性“编译”面板中的“使用优化编译”项。最后，养成发布不带调试信息的发布版本的习惯；这样做将生成更小的二进制文件。\n\
  \n\n\n为了管理所有这些内容，NetBeans SDK 提供了*项目配置*的概念，这是一组项目选项的集合，包括目标平台、应用程序描述和打包（参见下一节）以及构建选项。\n\
  \n您可以通过单击“项目属性”窗口右上角的“管理配置”按钮来创建新的项目配置。执行此操作后，您将看到一个配置列表，可以在其中添加和删除配置；相应地，项目属性会与您在“项目配置”窗口中选择的配置相关联，如图\
  \ 3-9 所示。从图中可以看出，我喜欢设置三个项目配置：一个用于调试，一个用于发布，一个用于默认配置。更复杂的项目可能需要额外的配置来管理针对特定硬件目标或其他变量的特定构建。\n\
  \n如果您熟悉 Java 构建过程，您可能已经注意到在上一节执行的构建过程中有一个额外的步骤。仔细查看输出日志，您会在混淆步骤之后看到标记为 pre-preverify、preverify\
  \ 和 post-preverify 的行。\n\n正如您从第一章中回忆的那样，与 CDC 或标准 JVM 不同，CLDC 使用的虚拟机将一些开销较大的字节码验证委托给了构建过程。这发生在代码混淆*之后*，并且是打包应用程序之前的最后一步。preverify\
  \ 工具会在每个类文件中内联子例程，并向每个栈帧添加信息，以便运行时虚拟机更容易执行必要的类型检查和其他字节码验证。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00021.jpeg)\n\n第 3 章 ■ NetBeans IDE 入门\n\n**53**\n\n**图 3-9.** *标题为 WeatherWidget（左）的项目属性对话框和项目配置管理器对话框（右）*\n\
  \n如果您想使用 NetBeans IDE 以外的工具链来构建应用程序，您将需要这个 preverify 工具。只需安装一份 Sun Java Wireless\
  \ Toolkit（可从 http://java.sun.com/ 获取）。其他工具链，例如 EclipseME，会利用 Sun Java Wireless Toolkit\
  \ 中的 preverify 工具，或者提供自己的工具。\n\n**打包和执行 CLDC/MIDP 应用程序**\n\n在设备上，应用程序管理器为 MIDlet\
  \ 提供服务；例如，它下载 MIDlet、启动和终止 MIDlet、与 MIDlet 共享系统资源等等。MIDlet 以两个文件的形式呈现给应用程序管理器：一个描述应用程序的\
  \ JAD 文件，以及一个包含应用程序字节码和任何所需资源的 Java 归档（JAR）文件。实际上，一个 JAD/JAR 对中可以打包多个 MIDlet；这被称为一个*套件*，并且您必须在\
  \ JAD 中为套件中的每个 MIDlet 添加条目。\n\nJAD 文件是一个名称-值对形式的属性集合，例如 NetBeans IDE 为 WeatherWidget\
  \ 应用程序生成的 JAD 文件，如清单 3-2 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**54**\n\n第 3 章 ■ NetBeans IDE 入门\n\n**清单 3-2.** *WeatherWidget JAD 文件*\n\nMIDlet-1:\
  \ Weather,,com.apress.rischpater.weatherwidget.WeatherWidget MIDlet-Jar-Size: 2858\n\
  \nMIDlet-Jar-URL: WeatherWidget.jar\n\nMIDlet-Name: WeatherWidget\n\nMIDlet-Vendor:\
  \ Ray Rischpater\n\nMIDlet-Version: 1.0\n\nMicroEdition-Configuration: CLDC-1.1\n\
  \nMicroEdition-Profile: MIDP-2.1\n\n这是一个最基本的 JAD 文件，由 NetBeans IDE 根据我在创建应用程序时定义的项目属性构建而成。相关字段包括：\n\
  \n• MIDlet-*n*：MIDlet 套件中第 *n* 个 MIDlet 的名称、JAR 文件中图标的路径以及类名。\n\n• MIDlet-Jar-Size：MIDlet\
  \ 套件 JAR 文件的字节大小。这*必须*与 JAR 文件的实际大小匹配，否则许多设备将不接受该 JAR 文件。\n\n• MIDlet-Jar-URL：MIDlet\
  \ 的 JAR 文件的 URL。\n\n\n\n• MIDlet-名称：MIDlet 套件的名称。\n\n• MIDlet-供应商：MIDlet 套件供应商的名称。\n\
  \n• MIDlet-版本：MIDlet 套件的版本号。\n\n• MicroEdition-配置：MIDlet 套件所需的 Java ME 虚拟机版本（CDC\
  \ 或 CDLC 及其版本号）。\n\n• MicroEdition-配置文件：MIDlet 使用的配置文件，包括其版本号。\n\n你可以在“项目属性”窗口的“Applet\
  \ 描述符”部分设置这些属性。“Applet 描述符”部分包含通用属性和 MIDlet 属性的独立子部分。作为 JAD 文件的一部分，你还需要指定*推送注册*和*API\
  \ 权限*的相关条目——这是 MIDP 2.0（JSR 118）新增的两类信息。\n\n推送注册和相应的推送 API 允许应用程序管理器根据传入事件（如入站网络连接、短信消息或定时器警报）来激活你的\
  \ MIDlet。你为推送注册条目提供的信息是一个元组，包含入站端点、接收推送的类名，以及一个指示推送有效发起者的过滤器。我将在第 14 章中更详细地讨论这一点。\n\
  \n推送注册条目使用名称 `MIDlet-Push-*n*` 来指定，其中 *n* 是一个表示唯一推送条目的整数。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 3 章 ■ NETBEANS IDE 入门\n\n**55**\n\nAPI 权限表示在使用受限 API（例如套接字连接接口）时需要特定的权限。为此，你的\
  \ MIDlet 必须拥有 `javax.microedition.io.Connector.socket` 权限，该权限表示允许使用此 API。请注意，这是实际使用该\
  \ API 的必要但不充分条件；运行时可能会提示用户批准，或根据应用程序的来源拒绝该操作。API 权限是以受限 API 的包和类命名的字符串。（在后续章节中介绍\
  \ API 时，我会指出受限 API 所需的权限。）有两个 JAD 字段用于指示权限：`MIDlet-Permissions` 和 `MIDlet-Permissions-Opt`。前者列出必需的权限，后者列出套件中\
  \ MIDlet 可能使用的可选权限。\n\n■**注意** 仅仅在 JAD 文件中提供权限*并不*意味着你有权访问需要该权限的受限 API。正如我在第 1 章“营销和销售你的应用程序”一节中指出的，你的应用程序可能还需要来自第三方（例如\
  \ Java Verified 或无线运营商）的签名，才能使用你所需的 API。\n\n打包应用程序的最后一个方面是*签名*——即对应用程序进行加密签名的过程，以证明你是应用程序的发起者。\n\
  \n签名是 Java ME 权限机制链条中的最后一环；签名表明应用程序来自具有特定信任级别的来源，并且根据应用程序所携带的签名，应用程序可能被授予额外的操作权限。首先从知名提供商（如\
  \ VeriSign）处获取证书，然后使用安全管理器将其导入 NetBeans 密钥库。为此，请遵循以下步骤：\n\n**1.** 从你部署应用程序的运营商所信任的权威机构获取证书。\n\
  \n**2.** 使用 JDK 附带的 `keytool` 应用程序将证书导入你的密钥库。在命令行中输入以下命令：\n\n% keytool –import –alias\
  \ *你的证书别名*\n\n–file *你的证书文件*\n\n-keystore *你的密钥库.ks*\n\n**3.** 在 NetBeans IDE 中，通过导航到“项目属性”➤“签名”➤“安全管理器”➤“添加密钥库”，将你的密钥库添加到\
  \ IDE 中。\n\n**4.** 仍在“签名”窗格中，勾选“签名分发”复选框，并选择你刚刚导入的证书的别名。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00019.png)\n\n**56**\n\n第 3 章 ■ NETBEANS IDE 入门\n\n\n\n要测试 API 的访问权限，通常可以通过将证书导出到手机来使用自签名的\
  \ JAR 文件。不过，导入证书的方式取决于你使用的设备和网络，因此应查阅与所用设备配套的文档。\n\n有些设备允许通过蓝牙或数据线传输 JAD 和 JAR 文件，但迄今为止，将代码传输到手机最常见的方式还是通过网络。为此，你需要能够访问与测试设备位于同一网络上的\
  \ Web 服务器（换句话说，不要依赖防火墙后的企业 Web 服务器，以及防火墙外运营商网络上的无线终端）。使用 NetBeans IDE，你可以通过右键单击应用程序并选择“部署项目”，利用安全复制协议（SCP）或其他机制将\
  \ JAD 和 JAR 文件传输到服务器。然后，你可以使用设备的应用程序管理器或 Web 浏览器导航到 JAD 文件的 URL。接下来，在设备上下载 JAD 文件，这将触发应用程序的安装。图\
