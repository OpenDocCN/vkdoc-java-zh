  \n}\n\n}\n\n}\n\n该 MIDlet 使用了两个 `Command` 实例：一个用于发出退出信号，另一个用于在选择发送操作时发出信号。它还使用了两个\
  \ `TextField` 实例：一个用于输入接收方的 MSISDN，另一个用于输入您发送或接收的消息。\n\n我\n\n基于本书第三版中提供的示例代码实现了此示例和下一个示例应用程序，而不是使用\
  \ NetBeans 构建新的用户界面。因此，用户界面代码的流程略有不同；这些示例说明了如何手动构建一个拥有自己应用程序逻辑的 MIDlet，而不是使用 NetBeans\
  \ 来创建 UI。我在类创建时创建了 `Command` 实例，并在 MIDlet 的 `startApp` 方法中创建了 UI 的其余部分。这使得简单 MIDlet\
  \ 的代码易于阅读，但对于使用许多不同屏幕的大型 MIDlet 应用程序来说，可扩展性不佳。\n\n该 MIDlet 使用第二个线程来接收传入消息；它在 `startApp`\
  \ 方法中通过调用 `startReceive` 来启动此线程。此方法简单地分配一个新的 `Thread` 实例，并使用 MIDlet 自身作为 `Runnable`\
  \ 接口的实现来提供线程的 `run` 方法。我本可以轻松地使用一个内部类，但这似乎得不偿失。因此，当 MIDlet 启动时，用户界面在主线程上运行，而第二个线程启动并在\
  \ `run` 方法中对 `c.receive` 的调用处阻塞。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**396**\n\n第 14 章 ■ 使用无线消息 API 进行消息传递 当新的文本 SMS 消息到达应用程序的端口时，`c.receive` 返回新的\
  \ `TextMessage` 实例。线程的 `run` 方法从传入消息中提取有效载荷文本，并使用 `Display` 实例的 `callSerially` 方法安排在主线程上更新显示。然后它循环等待另一条传入的文本消息。\n\
  \n当您需要从单独的线程安排在应用程序主线程上执行操作时，`callSerially` 非常方便。它会在主线程处理完任何待处理的 UI 事件后，调度您提供的类实例的\
  \ `run` 方法执行。\n\n该线程使用 `callSerially` 来调度内部类 `SetMessage` 实例的 `run` 方法，该方法只是将输出文本字段的内容设置为传入消息的文本。\n\
  \n要发送消息，`SMSMIDlet` 会调用 `SMSSender` 类的 `sendMsg` 方法。\n\n这个单例类使用一个单独的线程来发送每条 MO 消息，以防止阻塞主线程。清单\
  \ 14-7 展示了 `SMSSender` 类。\n\n**清单 14-7.** *SMSSender 类*\n\npackage com.apress.rischpater.smsmidlet;\n\
