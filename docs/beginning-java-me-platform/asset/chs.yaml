  \n第 5 章 ■ 构建用户界面\n\n**105**\n\n**代码清单 5-2.** *在 Form 对象上组装一些 Item 对象*\n```java\n\
  public class StringItemDemo extends MIDlet implements CommandListener {\n\n    private\
  \ Form mainForm;\n    private StringItem stringItem1;\n    private StringItem stringItem2;\n\
  \n    public StringItem get_stringItem1() {\n        if (stringItem1 == null) {\n\
  \            stringItem1 = new StringItem(null, \"This is a simple label\");\n \
  \       }\n        return stringItem1;\n    }\n\n    public StringItem get_stringItem2()\
  \ {\n        if (stringItem2 == null) {\n            stringItem2 = new StringItem(\"\
  This is the StringItem label:\",\n                    \"This is the StringItem text\"\
  );\n            stringItem2.setLayout(Item.LAYOUT_NEWLINE_AFTER | Item.LAYOUT_2);\n\
  \        }\n        return stringItem2;\n    }\n\n    public Form get_mainForm()\
  \ {\n        if (mainForm == null) {\n            mainForm = new Form(\"String Item\
  \ Demo\", new Item[] {\n                get_stringItem1(),\n                get_stringItem2(),\n\
  \            });\n        }\n        return mainForm;\n    }\n\n    // ... 更多代码\
  \ ...\n}\n```\n\n如果您一直在使用 NetBeans 并通过 GUI 构建器创建用户界面，那么这段代码应该看起来很熟悉；它本质上是 NetBeans\
  \ 自身构建代码的清理版本。然而，它确实演示了一种填充`Form`的常见模式：正如`get_mainForm`方法所示，您可以在构造 Form 时创建显示项：\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**106**\n\n第 5 章 ■ 构建用户界面\n\
  \n```java\nmainForm = new Form(\"String Item Demo\", new Item[] {\n    get_stringItem1(),\n\
  \    get_stringItem2(),\n});\n```\n\n将`Item`实例列表传递给构造函数会按照相同的顺序在显示中插入这些实例，因此这是一种一次性构建整个屏幕的常见方式。\n\
  \n不过，`Form`类实际上是一个集合，并提供了多种方法来操作其显示的项。我将在本章后面的“使用 Form 类收集可见项”一节中向您介绍这些方法。但现在，您应该知道还可以使用`append`和`insert`方法向`Form`实例添加单个项。`append`方法将`Item`实例添加到`Form`上项列表的末尾，而`insert`方法则将该项插入到`Form`上另外两个项之间。\n\
  \n**介绍 Items**\n\n对于您的用户界面而言，关键之处在于`Item`类及其子类。除非您使用`Canvas`或`GameCanvas`类（我将在后面讨论）编写原始界面代码，否则用户界面中的每个可见项都必须实现`Item`接口，或者是一个完全独立的`Displayable`对象，例如`Alert`、`TextBox`或`List`。`Item`类封装了以下职责：\n\
  \n•   *命令管理*：一个`Item`可以将命令发送到`Form`的命令监听器，以响应用户的按键操作，例如选择或其他操作。此外，单个`Item`可以拥有自己的命令监听器。\n\
  \n•   *绘制*：`Item`知道如何绘制自身。\n\n•   *事件处理*：`Item`知道如何处理原始事件，例如按键操作，因此您的应用程序无需处理。\n\
  \n•   *布局偏好*：`Item`向其包含的`Form`发出关于其应如何布局的偏好信号，然后`Form`使用其布局策略以连贯的方式在显示上呈现所有项。\n\n\
  `Item`类提供了三种用于管理命令的方法：\n\n•   `addCommand`：允许您向该项添加一个类型为`ITEM`的`Command`实例。反过来，当该项处于活动状态（高亮显示）时，MIDP\
  \ 实现会呈现此命令。\n\n•   `removeCommand`：从该项中移除指定的命令。\n\n•   `setItemCommandListener`：为此项上的`ITEM`命令设置一个监听器。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 5 章 ■ 构建用户界面\n\n**107**\n\
  \n\n\n除了我将在本章最后一节详细讨论的 CustomItem 子类之外，Item 子类负责自身的绘制。不过，你可以自定义某些项目的绘制行为。例如，大多数项目都接受一个标签，这是一个位于项目之前的字符串，并以只读方式绘制。Item\
  \ 类提供了`getLabel`和`setLabel`方法来获取和设置标签，并通过特定 Item 子类（如`StringItem`）的构造函数提供常量，以建议按钮或超链接样式。\n\
  \n最后，Item 实例会向父级 Form 表明它们希望在父级 Form 中如何布局的偏好。它们通过使用`setLayout`方法设置的布局常量来实现这一点。Form\
  \ 类提供了布局标志，用于指示项目应对齐到其可视矩形的顶部、底部、左侧、右侧或中心；项目应缩小到最小边界或尽可能扩展；以及项目应出现在后续行中，还是其他项目应在其后单独成行。这些布局标志都会影响\
  \ Form 的基于行的布局策略，你将在本章后面的“使用 Form 类收集可见项目”一节中遇到。你还可以使用以下四种方法中的一种或多种来查询项目的最小或首选尺寸：`getMinimumHeight`、`getMinimumWidth`、`getPreferredHeight`和`getPreferredWidth`。你可以将这些方法与`setPreferredSize`结合使用，后者指示你*希望*Form\
  \ 呈现该项目的可视项目的大小。\n\n使用 NetBeans 时，如果你在屏幕设计视图中编辑 Form，可以从调色板的“Form 项目”部分（其位置默认为显示器的右上部分）选择任何支持的项目。事实上，如果你使用\
  \ NetBeans，很可能不会直接从源代码实例化这些类中的任何一个，而是依赖代码生成工具为你编写这些代码。\n\n■**提示** 你可以更改的 Item（和\
  \ Displayable）的属性在 NetBeans 的“属性”窗口中也都可用。通常，如果你使用 NetBeans 构建用户界面，你需要了解特定 Item 可用的属性，但不必知道修改这些属性的接口，因为你在\
  \ NetBeans 中设置 Item 的属性，而 NetBeans 的自动代码生成工具会完成其余工作。\n\n**介绍 Spacer**\n\n由于无法为用户界面项目指定像素位置，MIDP\
  \ 实现提供了 Spacer 类。Spacer 类的实例在创建时采用最小尺寸，可用于在相邻（水平或垂直）项目之间放置填充。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00017.png)\n\n**108**\n\n第 5 章 ■ 构建用户界面\n\n**介绍 StringItem**\n\nStringItem\
  \ 类提供了一个绘制文本值的只读控件。StringItem 实例可以带有标签，并绘制为按钮或超链接（见图 5-5）。StringItem 的外观取决于三个因素：标签、内容和外观模式标志。外观模式可以是`StringItem.PLAIN`、`StringItem.HYPERLINK`或`StringItem.BUTTON`之一，产生你期望的结果。\n\
  \n**图 5-5.** *不同外观的 StringItem 实例* 你可以随时通过`setLabel`和`setText`方法更改 StringItem 实例的标签或内容。你还可以通过`setFont`和`getFont`方法可用的属性来更改\
  \ StringItem 对象的字体。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 5 章\
  \ ■ 构建用户界面\n\n**109**\n\n**介绍 TextField**\n\n对于用户输入，MIDP 提供了 TextField 类。TextField\
  \ 带有*输入约束*，可以以多种方式限制用户输入；例如，它可能要求用户仅输入数字或电话号码。TextField 类还可以以多种方式格式化输入，并仅返回输入的内容；例如，它可能将输入的电话号码显示为(831)\
  \ 555-1212，但向应用程序报告输入的号码是 8315551212。你可以使用`setConstraints`方法设置输入约束，并使用诸如`EMAILADDR`、`NUMERIC`、`PHONENUMBER`、`URL`或`DECIMAL`等标志值。这些标志可以伴随其他标志（使用按位或运算符`|`组合），例如`PASSWORD`（阻止你看到输入的文本）或`UNEDITABLE`。\n\
  \n该类还支持*输入模式*的概念，它允许你向实现提供关于数字按键应如何映射到字母数字按键的提示。你可以通过向`setInitialInputMode`方法指定输入模式的字符串名称来设置输入模式；值包括由\
  \ Java SE 类`java.lang.Character.UnicodeBlock`定义的 Unicode 字符块的名称，前面加上字符串`UCB_`，如下所示：\n\
  \n• `UCB_BASIC_LATIN` 用于拉丁语系\n• `UCB_GREEK` 用于希腊语\n• `UCB_CYRILLIC` 用于西里尔语系\n• `UCB_HEBREW`\
  \ 用于希伯来语\n• `UCB_ARABIC` 用于阿拉伯语\n• `UCB_THAI` 用于泰语\n• `UCB_HIRAGANA` 用于日语平假名音节\n\
  • `UCB_KATAKANA` 用于日语片假名音节\n• `UCB_HANGUL_SYLLABLES` 用于韩语\n\nMIDP 还定义了以下特定输入模式：\n\
  • `MIDP_UPPERCASE_LATIN` 用于拉丁语系的大写字符\n• `MIDP_LOWERCASE_LATIN` 用于拉丁语系的小写字符\n\n创建\
  \ TextField 时，你需要向构造函数传递标签和默认文本，然后是 TextField 允许用户输入的最大字符数，最后是约束（按位 OR 运算）。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**110**\n\n第 5 章 ■ 构建用户界面\n\n\
  TextField 类的接口提供了几个低级操作，允许你直接与 TextField 的内容交互，包括以下方法：\n\n• `getCaretPosition`：返回当前输入位置\n\
  • `getChars`：将 TextField 的内容复制到你提供的数组中，从位置零开始\n• `getString`：以字符串形式返回 TextField\
  \ 的内容\n• `delete`：允许你从提供的偏移量开始删除特定数量的字符\n• `insert`：在指定位置插入你提供的字符数组或字符串\n• `setChars`：允许你通过指定新字符、偏移量和长度来替换\
  \ TextField 中的部分字符序列\n• `setString`：允许你用新字符串替换 TextField 的全部内容\n\n对于大多数应用程序，你只需在创建项目时设置所需的约束和输入模式（很可能使用\
  \ NetBeans 的“属性”窗格），然后在切换到新 Form 时获取项目的文本。\n\n**介绍 DateField**\n\nDateField 类是一个可编辑的组件，用于呈现日历（日期和时间）信息。使用\
  \ DateField，你可以通过指定`DATE`、`TIME`或`DATE_TIME`输入模式来获取日期、时间或日期和时间的受限用户输入。图 5-6 展示了\
  \ DateField 类的一个示例。\n\nDateField 通过四个方法扩展了 Item：\n\n• `getDate`：返回你输入的日期\n• `setDate`：将项目设置为指定的日期\n\
  • `getInputMode`：返回你为项目设置的输入模式\n• `setInputMode`：设置输入模式\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00035.png)\n\n第 5 章 ■ 构建用户界面\n\n**111**\n\n**图 5-6.** *一个 DateField，以及分别选择时间和日期部分时显示的屏幕*\n\
  \n**介绍 ImageItem**\n\n\n\n一个 ImageItem 会根据其外观模式，将图像显示为图片、按钮或超链接。与 StringItem 类似，你可以提供一个\
  \ Command 和一个 ItemCommandListener，来处理以按钮或超链接形式出现的 ImageItem 上的选择事件。\n\n**介绍 Gauge**\n\
  \nGauge 组件用于在零到某个预定义最大值之间的给定范围内，以图形方式显示一个整数值。创建 Gauge 组件时，你可以控制当前值和最大值。某些 Gauge\
  \ 实例是可交互的——也就是说，它们允许用户设置数值。图 5-7 展示了一个可交互的 Gauge。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00011.png)\n\n**112**\n\n第 5 章 ■ 构建用户界面\n\n**图 5-7.** *一个可交互的 Gauge*\n\
  \n由于 Gauge 可以是交互式的，你可以向 Gauge 添加一个 ITEM Command 实例，然后当 Gauge 通过其 ItemCommandListener\
  \ 发生变化时，Gauge 会做出响应，就像 ImageItem 或 StringItem 一样。\n\n**管理选择项**\n\nChoice 接口和 ChoiceGroup\
  \ 类允许你向用户呈现一个选择列表。如图 5-8 所示，你可以将选择项呈现为单选按钮（强制排他性选择，用户一次只能选择一项）、复选框（用户可以选择零个或多个项目）或弹出式菜单（仅显示选中的项目）。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00039.png)\n\n第 5\
  \ 章 ■ 构建用户界面\n\n**113**\n\n**图 5-8.** *Choice 和 ChoiceGroup 类呈现的各种选择类型* 由于 MIDP\
  \ 提供了 List 类（一个呈现选择项的类），MIDP 标准规定了 Choice 接口，该接口由 ChoiceGroup（一个 Item 子类）和 Displayable\
  \ 子类 List（你将在本章后面的“为屏幕创建自定义 Item”一节中看到）实现。通常，当你希望将选择项与其他用户界面项混合使用时，会使用 ChoiceGroup。另一方面，如果选择项占据整个显示区域，则\
  \ List 是最佳选择。\n\n创建 ChoiceGroup 时，还必须指定其类型：\n\n• EXCLUSIVE：ChoiceGroup 一次只能选中一个元素，但可以显示多个项目。\n\
  \n• MULTIPLE：ChoiceGroup 一次可以选中零个或多个项目。\n\n• POPUP：ChoiceGroup 一次只能选中一个元素，并且始终显示选中的元素。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**114**\n\n第 5 章 ■ 构建用户界面\n\
  \n你还可以指定一个字符串和图像列表，每个列表项对应组件应显示的一个选择项。\n\nChoice 接口定义了两个属性来管理你从界面中选择的内容。对于排他性列表和弹出式列表，选中索引属性（及其访问器\
  \ getSelectedIndex 和修改器 setSelectedIndex）可能是最有用的，因为它返回当前选中项在选择列表中的索引。对于多选列表，你需要使用\
  \ setSelectedFlags 和 getSelectedFlags，它们通过你提供给方法的布尔标志数组，提供每个选中和未选中项的状态。你还可以使用索引调用\
  \ isSelected 来确定用户是否选中了特定项目，并使用 setSelectedIndex 来设置特定项目的选中状态。\n\n由于 Choice 管理一组用户选择项，它拥有一个面向集合的接口，包含以下方法，允许你访问和修改用户选择列表：\n\
  \n• append：允许你将一个新的用户选择项（字符串和图像）追加到正在呈现的选择列表末尾。\n\n• delete：接受一个索引，并删除你指定索引处的用户选择项。\n\
  \n• deleteAll：删除所有用户选择项，得到一个空的选择集合。\n\n• insert：在指定索引之后插入一个新的选择项（字符串和索引）。\n\n• size：返回组中用户选择项的数量。\
  \ 你还可以使用 setFont 方法来修改某个项目的外观或内容，从而更改特定项目的字体。\n\n**介绍 Screen 及其子类**\n\n在本章开头，我告诉过你\
  \ Display 类如何使用 Displayable 子类来管理显示内容。对于高级用户界面编程，Screen 的子类 Form、Alert、TextBox 和\
  \ List 是唯一的选择。这些类允许你快速组合复杂的用户界面，尽管会牺牲一些对 Canvas 类的控制（例如逐像素定位）。\n\n**使用 Form 类收集可见项**\n\
  \nScreen 最灵活的子类是 Form 类。正如我已经说过的，它充当 Item 实例的集合和布局类，允许你组合各种 Item 子类实例，以创建包含各种用户界面控件的屏幕。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 5 章 ■ 构建用户界面\n\n**115**\n\
  \nForm 类的布局策略以行为中心，默认情况下，只要多个 Item 能放在同一行，就会将每个 Item 放在前一个旁边。如果 Item 数量超过一行能容纳的数量，Item\
  \ 会逐行向下放置。在极少数情况下，如果 Item 数量超过显示区域能容纳的数量，MIDP 实现可能会选择提供 Form 上 Item 的滚动视图，或者对 Form\
  \ 进行分页，将你带到新屏幕以查看 Form 上的其他 Item。\n\n布局算法为添加到 Form 的每个 Item 提供默认布局约束。例如，如果 Form\
  \ 从左到右布局 Item，则未指定布局策略的 Item 将默认为 LAYOUT_LEFT，在 Form 上左对齐。如果 Item 指定了其他布局策略，例如 LAYOUT_CENTER，那么\
  \ Form 将尝试在 Form 上满足该 Item 所需的布局。当 Item 在 Form 上布局时，布局算法会尝试将后续 Item 保持在一起，除非发生以下任一情况：\n\
  \n• 前一个 Item 之后有换行。\n\n• 当前 Item 设置了 LAYOUT_NEWLINE_BEFORE 布局提示。\n\n• 当前 Item 是以\
  \ \\n 开头的 StringItem。\n\n• 当前 Item 是 ChoiceGroup、DateField、Gauge 或 TextField，并且未设置\
  \ LAYOUT_2 提示。\n\n• 当前 Item 的布局标志与 Form 的当前对齐方式不同。\n\n如果发生以下任一情况，则 Item 之后会出现换行：\n\
  \n• 该 Item 是以 \\n 结尾的 StringItem。\n\n• 该 Item 设置了 LAYOUT_NEWLINE_AFTER 提示。\n\n•\
  \ 该 Item 是 ChoiceGroup、DateField、Gauge 或 TextField，并且未设置 LAYOUT_2 提示。\n\n如果这一切看起来令人困惑，请不要惊慌：该行为实际上相当直观，并且你会在实践中发现，稍加实验就能快速得到你想要的布局。\n\
  \nForm 的另一个职责是维护它绘制的 Item 的集合。虽然该集合的细节是 Form 类实现的私有部分，但 Form 类提供了以下方法：\n\n• append：向\
  \ Form 追加一个 Item。\n\n• delete：接受一个索引，并从 Form 的集合中删除指定索引处的 Item。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**116**\n\n第 5 章 ■ 构建用户界面\n\n• deleteAll：删除 Form 中的所有 Item。\n\n• get：接受一个索引，并返回该索引处的\
  \ Item。\n\n• insert：接受一个索引和一个 Item，并在指定索引之后插入该 Item。\n\n• set：接受一个索引和一个 Item，并用新\
  \ Item 替换指定索引处的 Item。\n\n• size：返回 Form 中 Item 的数量。\n\nForm 可以有一个监听器，当其 Item 的值发生变化时，该监听器会被调用。这种通知是通过调用你使用\
  \ setItemStateListener 方法注册的监听器的 itemStateChanged 方法来实现的。请注意，当你调用 Form 上的 Command\
  \ 实例时，*不会*触发此通知；你使用 setCommandListener 注册的 CommandListener 会接收 Command 事件。\n\n**提醒用户**\n\
  \n\n\nAlert 类提供一个屏幕，用于向用户显示数据，并在预设时间后自动显示另一个 Displayable。通常，Alert 会全屏显示；应用程序需要提供标题、可选的图像和正文文本。\n\
  \n你可以提供自己的图像、标题、正文文本，以及一个替换图像的仪表盘；图 5-9 展示了一个带有仪表盘的 Alert 示例。\n\nAlert 的构造函数最多可以接受四个参数：标题、Alert\
  \ 的文本、图像和 Alert 类型。前三个参数不言自明；第四个参数是来自 AlertType 枚举的一个值，用于指示该 Alert 是警报、确认、错误、警告还是信息提示。创建\
  \ Alert 后，你应该为其配置超时时间；如清单 5-3 所示，你可以使用 `setTimeout` 方法，以毫秒为单位指定延迟时间。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00007.png)\n\n第 5 章 ■ 构建用户界面\n\n**117**\n\n**图 5-9.** *带有仪表盘的 Alert*\n\
  \n**清单 5-3.** *配置 Alert*\n\npublic Alert get_cannotAddLocationAlert() {\n\nif (cannotAddLocationAlert\
  \ == null)\n\n{\n\ncannotAddLocationAlert = new Alert(\"无法添加位置\"); cannotAddLocationAlert.setString(\"\
  添加您输入的位置时发生错误。该位置尚未被添加。\");\n\ncannotAddLocationAlert.setTimeout(10000);\n\ncannotAddLocationAlert.addCommand(get_backCommand());\n\
  \n}\n\nreturn cannotAddLocationAlert;\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**118**\n\n第 5 章 ■ 构建用户界面\n\npublic void add_location( String l ) {\n\nString\
  \ locations[];\n\nint i;\n\ntry {\n\nlocationStore.addLocation( new Location( l,\
  \ \"\" )); locationList = null;\n\n} catch (Exception e) {\n\ngetDisplay().setCurrent(get_cannotAddLocationAlert(),\n\
  \nget_locationList());\n\n}\n\n// 延迟刷新位置列表。\n\n}\n\n显示 Alert 与显示其他 Displayable 略有不同，因为你需要指定在显示\
  \ Alert 之后屏幕应显示的 Displayable。\n\n因此，你需要使用 `Display.setCurrent` 方法，该方法同时接受一个 Alert\
  \ 和一个后续表单，如下所示：\n\nDisplay.getDisplay().setCurrent( alert, nextForm );\n\n有趣的是，你可以使用\
  \ `setCommandListener` 在 Alert 上设置自己的 CommandListener，但这样做需要小心：它会禁用自动前进功能，该功能原本会在用户关闭\
  \ Alert 或其计时器到期时将屏幕切换到下一个 Displayable。要恢复此功能，只需将 CommandListener 设置为 null 即可。\n\n\
  Alert 类拥有你期望的一系列常见的访问器和修改器方法，包括以下内容：\n\n• `setTimeout` 和 `getTimeout`：设置和获取 Alert\
  \ 转换到下一个 Displayable 之前的超时时间\n\n• `setImage` 和 `getImage`：设置和获取 Alert 显示的 Image\
  \ 实例\n\n• `setString` 和 `getString`：设置和获取 Alert 显示的字符串（不是标题！）\n\n• `setIndicator`\
  \ 和 `getIndicator`：设置和获取 Alert 显示的仪表盘\n\n■**提示** 如果你为 Alert 设置了一个仪表盘，它必须是非交互式的，不被其他\
  \ Displayable 拥有，不能有任何命令或标签，并且其布局值必须是 `LAYOUT_DEFAULT`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00024.png)\n\n第 5 章 ■ 构建用户界面\n\n**119**\n\n**接受大量文本**\n\nTextBox 类提供了\
  \ TextField 的全屏替代方案，并共享与 TextField 类似的接口（不幸的是，MIDP 没有像处理 Choice、ChoiceGroup 和 List\
  \ 那样，将文本接口拆分为独立的接口和实现）。图 5-10 展示了一个 TextBox。\n\n**图 5-10.** *一个 TextBox*\n\n从图中可以看出，TextBox\
  \ 实例最适合管理大量文本的输入，但问题在于：大多数支持 MIDP 的设备并没有提供非常适合文本输入的界面。因此，我建议你尽可能避免使用 TextBox 实例。相反，应尝试设计你的应用程序，使其尽可能减少文本输入需求，要么完全省略长文本输入，要么记住重复的文本输入，并将记住的文本作为\
  \ List 或 ChoiceGroup 中的选项呈现给用户。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00041.png)\n\n**120**\n\n第 5 章 ■ 构建用户界面\n\n**显示选项列表**\n\nList 类为你提供了一种呈现全屏选项的方式，例如全屏单选或多选列表。图\
  \ 5-11 展示了一个这样的 List，相应的代码取自 Sun 的 Java ME 示例代码，如清单 5-4 所示。\n\n**图 5-11.** *一个包含多个选项和单个\
  \ ITEM 命令的 List*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 5 章 ■\
  \ 构建用户界面\n\n**121**\n\n**清单 5-4.** *生成图 5-11 所示 List 的代码*\n\nimport javax.microedition.midlet.*;\n\
  \nimport javax.microedition.lcdui.*;\n\npublic class ListExample extends MIDlet\n\
  \n{\n\npublic void startApp() {\n\nfinal List l = new List(\"披萨配料\", Choice.MULTIPLE);\
  \ l.append(\"凤尾鱼\", null);\n\nl.append(\"奶酪\", null);\n\nl.append(\"橄榄\", null);\n\
  \nl.append(\"洋葱\", null);\n\nl.append(\"意大利辣香肠\", null);\n\nl.append(\"香肠\", null);\n\
  \nl.addCommand(new Command(\"订购\", \"订购披萨\", Command.ITEM, 0)); l.setCommandListener(new\
  \ CommandListener() {\n\npublic void commandAction(Command c, Displayable s) {\n\
  \nboolean isSelected[] = new boolean[ l.size() ];\n\nint i;\n\nl.getSelectedFlags(\
  \ isSelected );\n\nfor ( i = 0; i < l.size(); i++ ) {\n\nif ( isSelected[ i ] )\
  \ {\n\nSystem.out.println( l.getString( i ));\n\n}\n\n}\n\n}\n\n} );\n\nDisplay.getDisplay(this).setCurrent(l);\n\
  \n}\n\npublic void pauseApp() { }\n\npublic void destroyApp(boolean unconditional)\
  \ { }\n\n}\n\n这段代码也展示了从 Choice 子类获取选项的常用方法：对于多选列表，只需遍历从 `Choice.getSelectedFlags`\
  \ 获取的布尔值列表即可。对于单选列表，则更简单：只需调用 `Choice.getSelectedIndex`，因为用户只能选择一个项目。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**122**\n\n第 5 章 ■ 构建用户界面\n\n■**注意** 想知道为什么在清单 5-4 中 List l 被声明为 final 吗？这是因为变量\
  \ l 在声明匿名 CommandListener 子类时创建的闭包中被引用了。局部类实际上并不访问 l，而是访问 l 的一个私有副本。如果在 l 声明之后、平台调用闭包的\
  \ commandAction 方法之前 l 发生了变化，那么这两个 l 的概念就会彼此不同步。\n\n**使用 Canvas 和自定义 Item**\n\n\
  尽管 Screen 和 Item 类层次结构非常灵活，但有些操作你无法通过这些类完成。一个显著的例子当然是创建游戏；此外，由于这些类提供了高层次的抽象，几乎任何真正定制的界面都无法实现。\n\
  \n然而，还有另一种方法。MIDP 提供了 Canvas，它是一个基类，用于编写需要处理低级事件和执行低级绘图的应用程序。Canvas 或其子类 GameCanvas\
  \ 的实例通过将事件传递给实例，并允许实例使用传递给其 `paint` 方法的 Graphics 对象进行绘图，来封装事件和绘图行为。这些类让你能够尽可能接近\
  \ MIDP 平台的裸硬件。\n\n\n\n不过，有时你可能希望充分利用 Screen 和 Item 类提供的所有抽象功能，但又需要一个自定义的 Item 来呈现特定数据。你可以通过创建\
  \ CustomItem 子类来实现这一点，它允许你实现一个能在 Screen 和 Item 子类所建立的框架内工作的 UI 组件。\n\n■**注意** 不要误入\
  \ Java ME 编程的歧途，认为 Canvas 类与 Java SE 中的 Canvas 类相同！它们是两种截然不同的东西。\n\n**使用自定义 Canvas\
  \ 控制绘图行为**\n\n继承 Canvas 类让你有机会在最低层级管理事件和绘图行为。Canvas 的实现必须能够完成以下操作：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 5 章 ■ 构建用户界面\n\n**123**\n\n• *处理事件*：Canvas 类接收底层事件，包括按键按下、重复和释放事件，以及指针按下、拖动和释放事件。\n\
  \n• *处理命令*：与其他 Displayable 子类一样，你的 Canvas 实现继承了与 Command 基础设施相关的方法，包括 addCommand、removeCommand\
  \ 和 setCommandListener。\n\n• *绘图*：Canvas 的子类必须实现 paint 方法，该方法接收一个 Graphics 实例，你可以用它来在\
  \ Canvas 上绘图。\n\n使用 Canvas 类的缺点在于，事件处理不如 Command 和 CommandListener 类那样具有可移植性。对于每次按键，你的\
  \ Canvas 都会收到一次 keyPressed 调用和一次 keyReleased 调用，并且在这两次调用之间可能还会收到一次或多次 keyRepeated\
  \ 调用。系统会向这些方法传递一个*键码*——即一个表示你所按下按键的整数。Canvas 类为所有 MIDP 设备通用的按键定义了常量成员，包括数字键、方向键、四个游戏键和确认键（选择键）。这些按键之间可能存在重叠；例如，游戏键实际上可能就是数字键。\n\
  \n不幸的是，其他并非所有 MIDP 设备通用的按键可能具有不同的键码，因此，如果你正在设计一个使用大量按键的、更复杂的 Canvas 子类，或者一个需要字母数字输入的子类，你最终将需要为你的应用程序将要运行的每个设备编写代码。一种方法是将键码处理从事件处理中抽象出来，这与\
  \ MIDP 平台的做法非常相似；不要直接检查键码，而是使用一个函数来映射键码以及键码所代表的逻辑操作，这样你就可以将多个键码映射到单个逻辑事件。\n\n你的\
  \ Canvas 子类也可以接收指针事件，前提是你的应用程序运行在支持某种指针（大概是鼠标或触控笔）的平台上。有些设备没有指针；你可以通过调用 hasPointerEvents\
  \ 来确定对指针事件的支持情况，如果设备支持指针按下和释放事件，该方法将返回 true。类似地，Canvas 的 hasPointerMotionEvents\
  \ 方法在设备支持来自指针的拖动事件时返回 true。假设支持，你可以通过重写 pointerPressed、pointerDragged 和 pointerReleased\
  \ 方法来接收事件；这些方法各自接收两个整数，即事件的 *x* 和 *y* 坐标。\n\n在任何时候，系统都可以通过调用其 repaint 方法来指示 Canvas\
  \ 应该重绘自身。此方法有两种形式：一种接受要重绘的矩形边界，另一种不接受任何参数，但等同于使用整个 Canvas 边界调用 repaint。然而，repaint\
  \ 方法并不执行任何绘图操作；那是 paint 方法的职责。repaint-paint 流程是异步的；repaint 向对象指示它已“变脏”并应计划重绘，而 paint\
  \ 的实际绘图则发生在未来一个未指定的（希望是短暂的！）时间点。这允许应用程序和系统避免触发不必要的重绘操作，并防止客户端在 Canvas 的 paint 操作上阻塞。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**124**\n\n第 5 章 ■ 构建用户界面\n\
  \n你重写 paint 方法来实际执行绘图。调用者向此方法传递一个参数：一个你用来实际执行绘图的 Graphics 实例。你的 paint 操作应重绘由 Graphics\
  \ 对象裁剪区域定义的每个像素，因为它可能是多次 repaint 调用的结果。请注意，Graphics 实例仅在你的 paint 方法内有效；你绝对*不应该*缓存你收到的\
  \ Graphics 实例以便在退出 paint 方法后使用。\n\n**图形操作与双缓冲**\n\n在早期的 Java ME 设备上，对屏幕的图形操作很慢，并且执行大量绘图的应用程序会显示出可见的伪影，例如图像闪烁或撕裂，因为平台会将绘图操作与屏幕刷新交错进行。尽管今天这个问题要罕见得多，但它仍然可能是一个挑战，特别是如果你正在实现一个快节奏的游戏或类似要求苛刻的应用程序。\n\
  \n为了避免在绘图时因显示更新而产生视觉伪影，你可以使用一种称为*双缓冲*或*乒乓缓冲*的技术，在这种技术中，你在一个屏幕外位图上执行所有绘图操作，然后当所有绘图操作完成后，你将那个图像传输到显示器。较新版本的\
  \ MIDP 支持双缓冲；你可以通过调用 Canvas.isDoubleBuffered 直接查询 Canvas。如果此方法返回 true，则 MIDP 实现会将你的\
  \ paint 操作的结果渲染到一个屏幕外位图中，并在适当的时候将该位图传输到显示器的帧缓冲区，从而防止视觉伪影。\n\n如果平台不支持双缓冲，你可以自己实现双缓冲。不要使用平台传递给你的\
  \ item 的 paint 方法的 Graphics 对象进行绘图，而是创建一个 javax.microedition.lcdui.Image 实例来缓冲你所有的绘图操作。然后，调用新图像的\
  \ getGraphics 方法来获取与该图像关联的 Graphics 对象，并使用该 Graphics 对象进行所有绘图。完成后，使用传递给 paint 方法的\
  \ Graphics 对象将图像直接渲染到屏幕，如下所示： void paint(Graphics g) {\n\nint w = getWidth();\n\n\
  int h = getHeight();\n\nImage buffer = Image.createImage(w, h);\n\nGraphics bg =\
  \ buffer.getGraphics();\n\nbg.drawRect(0, 0, 10, 10);\n\ng.drawImage( buffer, 0,\
  \ 0 );\n\n}\n\n如果你只进行简单的图形更新或更新屏幕的一小部分区域，双缓冲带来的内存开销可能得不偿失，并会导致自身的性能损失。因此，你应该仔细测试你的代码，以确定双缓冲是否确实必要。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 5 章 ■ 构建用户界面\n\n**125**\n\
  \n\n\n`Graphics` 类包含了您可能期望的用于在 Canvas 上绘制的全套接口，包括绘制字符串、线条、弧线、单个像素和图像的方法。其接口与 Java\
  \ SE 的 `Graphics` 类相似但不完全相同，因此在使用此类编写代码之前，最好查阅 MIDP 文档。\n\n**为屏幕创建自定义 Item**\n\n\
  `CustomItem` 类为您提供了一个抽象类，您可以基于它实现一个新的可交互的 `Item`，并将其放置在 `Form` 上。`CustomItem` 实例必须能够执行以下操作：\n\
  \n• 确定其合适的尺寸\n\n• 绘制 item 的内容\n\n• 响应由按键、指针以及遍历其内部可聚焦子项（每个可聚焦子项的进入和退出）所生成的事件\n\n\
  • 当值发生变化时调用 `notifyStateChanged` 方法\n\n`Item` 对象（包括 `CustomItem` 子类）通过最小尺寸和首选尺寸的概念与其父对象进行交互。前者是父对象可以赋予\
  \ `CustomItem` 的最小尺寸，而后者是 `CustomItem` 希望在父对象上占据的尺寸。对于给定的 `CustomItem`，内容尺寸描述了父对象为其绘图分配的实际区域；`CustomItem`\
  \ 必须在该区域内绘制其内容。为简化问题，父对象使用相对于 `CustomItem` 的坐标来传达内容区域——也就是说，`CustomItem` 的左上角是 (0,0)。从您的\
  \ `CustomItem` 到父对象的尺寸信息通过以下方法传递：\n\n• `getMinContentHeight` *和* `getMinContentWidth`：分别用于指定您的\
  \ `CustomItem` 的最小高度和宽度\n\n• `getPrefContentHeight` *和* `getPrefContentWidth`：用于指定您的\
  \ `CustomItem` 的首选高度和宽度（可能基于其当前内容）\n\n父 Form 会将您的 `CustomItem` 的*实际*边界——即内容边界——传递给您的\
  \ `paint` 方法。与 `Canvas` 类似，您需要重写 `paint` 来提供重新绘制 `CustomItem` 区域的代码。您必须绘制由所提供的 `Graphics`\
  \ 实例裁剪的每个像素。\n\n与 `Canvas`（其边界由方法设置）不同，您的内容边界是作为参数传递给 `paint` 方法的。您也可以像使用 `Canvas`\
  \ 一样，使用 `repaint` 方法来安排重绘。\n\n`CustomItem` 可能接收的事件取决于 MIDP 实现，这构成了应用程序可移植性的障碍。您的实现可以通过调用\
  \ `CustomItem.getInteractionModes` 来确定它支持哪些事件；返回的整数是一个位掩码\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**126**\n\n第 5 章 ■ 构建用户界面\n\n，它指定了设备将把哪些事件传递给您的 `CustomItem`。位掩码的实际值作为 `CustomItem`\
  \ 的字段提供，包括 `KEY_PRESS`、`KEY_RELEASE`、`KEY_REPEAT`、`POINTER_PRESS`、`POINTER_DRAG`\
  \ 和 `POINTER_REPEAT`。对于您打算支持的每种事件类型，您必须实现相应的方法，系统将调用这些方法来通知您的子类有该类型的事件等待处理。这些方法与\
  \ `Canvas` 类中的方法相同：\n\n• `keyPressed`：通过键码处理按键按下事件\n\n• `keyReleased`：通过键码处理按键释放事件\n\
  \n• `keyRepeated`：通过键码处理按键重复事件（当您按住一个键时）\n\n• `pointerPressed`：处理在某个坐标处的触控笔按下或鼠标按下事件\n\
  \n• `pointerDragged`：处理用户将指针拖动到新坐标的事件\n\n• `pointerReleased`：处理在某个坐标处的触控笔抬起或鼠标抬起事件\n\
  \n除了这些事件之外，您还必须处理焦点事件，MIDP 规范令人困惑地将其称为*遍历*操作（大概是因为它们是在您遍历父对象时生成的）。遍历操作让您能够知道您的 `CustomItem`\
  \ 何时处于活动状态，以及您是从哪个方向到达该 `CustomItem` 的。例如，一个显示富格式文本且可以在其内容区域外滚动的 `CustomItem`，可能希望在从下方进入时显示文本的最后部分，而在从上方进入时显示其包含的第一部分文本。为此，您必须实现\
  \ `CustomItem.traverse`，调用者会向该方法提供四条信息。\n\n第一个参数指示您导航进入 `CustomItem` 的方向。第二个和第三个参数给出了\
  \ item 容器赋予其 item 的可视区域的宽度和高度。据此，您可以假设这是您的 item 将被赋予用于绘制的最大边界，尽管其实际内容边界将传递给 `paint`\
  \ 方法。最后一个参数是一个数组，指示一个形式为 `[x, y, w, h]` 的矩形边界。当容器调用 `traverse` 时，它包含当前可见的矩形；当您的\
  \ `traverse` 方法退出时，它应包含与查看者相关的矩形边界。因此，如果您的 `CustomItem` 包含的信息多于其内容区域，您应该在此矩形中传递要显示的区域。\n\
  \n视图系统可能会调用 `traverse` 来指示 `CustomItem` 获得了焦点，或者在获得焦点后，指示 `CustomItem` 中的某个子项应该获得焦点。例如，一个实现单元格网格（如电子表格）的\
  \ `CustomItem`，会在每次按下方向箭头时接收 `traverse` 调用，并绘制其内容，以便以某种方式指示当前选中的单元格。要保持您的 `CustomItem`\
  \ 获得焦点并接收遍历事件，您的 `CustomItem.traverse` 方法必须返回 `true`。要指示对 `CustomItem` 的导航已完成——即用户已遍历出该\
  \ item——则从 `traverse` 返回 `false`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 5 章 ■ 构建用户界面\n\n**127**\n\n最后，如果您的 `CustomItem` 具有状态概念——也就是说，它包含一个值——并且该值发生了变化，您必须调用\
  \ `notifyStateChanged` 来让 `CustomItem` 上的任何监听器知道其状态已更改。\n\n**实现一个自定义 Item**\n\n\
  让我们用一个具体的例子来总结一下。假设天气应用程序从远程服务器获取特定的天气状况——晴天、多云、雨天、雪天等等——并且您希望以图形格式在显示当前天气的 `Form`\
  \ 上呈现这些信息。您可以通过两种方式之一来实现。您可以简单地根据状况报告选择特定的图像，或者您可以将该功能封装在一个负责绘制与特定天气状况相关联的图像的 `CustomItem`\
  \ 中。在实践中，您选择哪种方式可能不会有*那么*大的区别，但为了本讨论的目的，我们假设封装在 `CustomItem` 中更好，因为它在一个单一的类中提供了清晰的数据呈现封装和职责。清单\
  \ 5-5 显示了实现 `WeatherItem` 所需的部分代码，这是一个实现了从 `CustomItem` 继承的功能的类。\n\n**清单 5-5.**\
  \ *WeatherItem，一个用于显示天气状况的 CustomItem 子类*\npackage example.wxitem;\n\nimport javax.microedition.midlet.*;\n\
  \nimport javax.microedition.lcdui.*;\n\npublic class WeatherItem\n\nextends CustomItem\
  \ {\n\nprivate String title;\n\nprivate Display display;\n\nprivate int width, height;\n\
  \nprivate boolean hasFocus = false;\n\nprivate int conditions;\n\n// 状态（调用者不可修改！）\n\
  \npublic final int SUNNY = 1;\n\npublic final int PARTLY_CLOUDY = 2;\n\npublic final\
  \ int CLOUDY = 3;\n\npublic final int SHOWERS = 4;\n\npublic final int RAIN = 5;\n\
  \npublic final int FLURRIES = 6;\n\npublic final int SNOW = 7;\n\npublic final int\
  \ SLEET = 8;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**128**\n\n\n\
  \n第 5 章 ■ 构建用户界面\n\n// 默认尺寸\n\nfinal private int DEFAULT_HEIGHT = 64;\n\nfinal private\
  \ int DEFAULT_WIDTH = 64;\n\n// 颜色\n\nfinal private int WHITE = 0xFFFFFF;\n\nfinal\
  \ private int YELLOW = 0xFFFF00;\n\npublic WeatherItem( String t, Display d ) {\n\
  \nsuper(t);\n\ntitle = t;\n\ndisplay = d;\n\nhasFocus = false;\n\nwidth = DEFAULT_HEIGHT;\n\
