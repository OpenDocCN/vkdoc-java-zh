  audio\")) {\n\nconfigViewSound();\n\n} else if (mediaType.startsWith(\"video\"))\
  \ {\n\nconfigViewVideo();\n\n}\n\nplayer.start();\n\n}\n\ndisplay.setCurrent(viewerDisplayable);\n\
  \n}\n\ncatch (Exception e) {\n\nshowException(e);\n\n}\n\n}\n\nprivate void showException(Exception\
  \ e) {\n\nAlert a = new Alert(\"Exception\", e.toString(), null, null); a.setTimeout(Alert.FOREVER);\n\
  \ndisplay.setCurrent(a, viewerDisplayable);\n\n}\n\n}\n\n该 MIDlet 源代码以几个导入指令开头，因为它依赖于\
  \ MIDP API 以及 MMAPI 和 SVGAPI。该 MIDlet 遵循本书中所有 MIDlet 的基本组织结构，避免在构造函数中进行初始化，而是采用一个显式的\
  \ `init` 方法，当 AMS 启动 MIDlet 时，`startApp` 方法会调用该方法。以下方法负责 MIDlet 的行为：\n\n• `startApp`、`pauseApp`\
  \ 和 `destroyApp`：这些方法共同管理 MIDlet 的生命周期。启动 MIDlet 会显示一个要播放的媒体列表，而暂停或退出 MIDlet 则会停止任何待处理的媒体播放。\n\
  \n• `init`：如前所述，`init` 创建初始的 `List` 实例，显示媒体播放的选项。它还使用 `showSupportedMedia` 方法将支持的媒体类型列表输出到系统控制台。\n\
  \n• `commandAction`：此方法处理来自初始 `List` 屏幕的用户选择，并允许您在视频播放期间捕获视频帧。\n\n• `run`：应用程序使用一个单独的线程（我将其称为*播放器线程*）进行媒体播放；该线程执行\
  \ `run` 方法，该方法启动媒体播放并等待用户捕获媒体的请求。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**492**\n\n第 16 章 ■ 渲染多媒体内容\n\n• `initMediaPlayer` 和 `initSvgPlayer`：这些方法分别初始化\
  \ MMAPI 和 SVGAPI 中的类。\n\n• `configViewSound`、`configViewSvg` 和 `configViewVideo`：这些方法对显示媒体的\
  \ `Canvas` 子类实例执行额外的配置。其中一些是空操作，在此实现中不执行任何操作；它们仅用于说明目的。\n\n• `playFromResource`：此方法使用您选择的媒体类型来决定是初始化\
  \ MMAPI 还是 SVGAPI，启动媒体播放，并显示包含渲染后媒体的 `Canvas` 子类实例。播放器线程的 `run` 方法会调用此方法。\n\n• `showException`：此方法在\
  \ `Alert` 中显示异常。\n\n\n\n`showSupportedMedia` 方法是你从未想过需要编写，却又会反复编写的实用工具之一。它通过 `getSupportedContentTypes`\
  \ 函数向 MMAPI 管理器查询支持的内容类型列表。接着，利用内容类型（例如 `audio/wav`），它再次查询管理器以确定 MMAPI 实现所支持的协议（例如\
  \ HTTP）。最后，它将每一对支持的内容类型与协议输出到控制台。清单 16-17 展示了模拟器中的典型输出。\n\n**清单 16-17.** *支持的媒体内容类型与协议*\
