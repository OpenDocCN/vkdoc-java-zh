  \n`WeatherFetcher`类实现了`Runnable`接口，因为实际的连接发生在一个单独的线程中。这使得`MIDlet`能够在不阻塞用户界面的情况下执行网络通信——这是当今用户期望的功能。给定一个位置和一个应用程序实例（用于在网络操作完成时通知），该类创建一个新线程，连接到远程服务器，将位置信息发送到服务器，并获取结果。这项工作在类的构造函数中启动，构造函数会保存提供的位置信息和应用程序用户界面的引用，然后使用该类的新建实例启动一个新线程。`WeatherFetcher`类需要引用使用它的`MIDlet`；当更新发生时，该类通过调用`MIDlet`的`update`方法来通知`MIDlet`。清单\
  \ 12-11 展示了`WeatherWidget MIDlet`的这一改动，稍后我将进一步讨论这一改动。\n\n用户界面可以随时取消操作；如果在`WeatherFetcher`及其线程阻塞等待网络响应时选择了不同的位置，就可能发生这种情况。为此，用户界面调用`cancel`方法；它只是设置一个取消标志，`WeatherFetcher`在更新用户界面之前会检查这个标志。实际上，`cancel`并没有真正取消\
  \ HTTP 连接，因为确实没有好的方法来实现这一点；相反，它允许 HTTP 连接完成，但取消更新用户界面。\n\n`run`方法实际执行获取特定位置天气预报所需的工作；现在这段代码你应该已经熟悉了。`WeatherConnection`类假设远程\
  \ Web 服务器已将所需位置作为编码为表单参数的名称-值对接受；这对于也为 Web 表单提供内容的简单 Web 服务器来说是典型的做法。因此，`run`做的第一件事就是创建一个名称-值对，并将结果存储在`vars`中；该对的语法适用于任何响应表单的\
  \ Web 服务器，看起来像这样：\n\nlocation=Berkeley,CA\n\n这一步必须对参数字符串进行*URL 编码*；某些字符（如空格字符\"\
  \ \"）不能原样传输，而是表示为单个百分号（%）后跟该字符的两位十六进制 ASCII 码。\n\n因此，空格字符\" \"将被表示为字符串`%20`。虽然示例只传递了一个名为`location`的值，但它同样可以轻松传递多个值；这些值将使用与号（&）连接起来，如下所示：city=Berkeley&state=CA\n\
  \n然而，通常情况下，如果你正在构建一个与 Web 服务器交换结构化数据的应用程序，你可能会使用 XML 来编码这些结构化数据——这个话题我留到第 13 章再讲。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 12 章 ■ 访问网络上的远程数据\n\n**319**\n\
  \n\n\n■**提示** 如果你使用 HTTP GET 或 POST 方法传递名称-值对，务必对值进行 URL 编码，否则 URL 格式将不正确，响应服务器很可能无法处理你的结果。URL\
  \ 编码的完整语法在 RFC 2396 中有详细说明。\n\n待发送数据经过 URL 编码后，就该设置 HTTP 连接了。它通过 GCF 实现，将请求方法设置为\
  \ POST，表明发送的内容类型是 URL 编码的表单数据（就像来自网页浏览器一样），并指定数据的长度。（本例*本可以*使用 HTTP GET 请求，只需将表单数据附加在\
  \ URL 末尾即可，但向你展示如何发起 HTTP POST 请求更有用，因为对于任何严肃的 Web 服务交互，你很可能都会使用 POST。）\n\n配置好连接后，代码将参数写入连接的输出流，然后打开输入流并读取结果。实际上，代码很可能在此处阻塞；在移动无线设备上，此交互过程可能需要大约一秒钟。事实上，处理此交互所需的时间很可能*更长*，至少是应用程序首次执行时，因为许多设备（尤其是\
  \ MIDP 设备）会询问用户是否允许 MIDlet 执行该请求。只有经过签名的第三方应用程序才被允许在未经许可的情况下使用网络资源；其他应用程序在发起任何网络请求之前都会提示用户请求许可。\n\
  \n代码从网络读取结果后，会使用结果数据构造一个新的字符串，并用新数据更新 Location 对象，然后通知应用程序 Location 对象已更改。\n\n■**提示**\
  \ 粗略来说，WeatherFetcher 使用了观察者模式，将初始化时接收到的 Location 对象作为模型，将应用程序作为更新的接收者。我本可以构建更复杂的接口和类层次结构来表示这一点，但这并不会简化本例的目的——即向你展示如何使用\
  \ HttpConnection。\n\n静态的 urlEncode 方法很简单，它基于输入字符串创建一个新字符串。\n\n新字符串中，任何非字母字符都会被替换为\
  \ URL 编码后的字符。坦率地说，我不明白为什么 CLDC 和 CDC 没有在某个地方提供这个实用函数；大多数需要联网的应用程序无论如何都会用到它。\n\n\
  将 WeatherFetcher 类集成到 WeatherWidget 应用程序中并不需要太多工作；从第 6 章中你上次看到的实现开始，你只需要对 MIDlet\
