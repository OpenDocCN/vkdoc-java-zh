  \ MIDlet；以及 `run`，用于在定时器调用任务时执行相应操作。\n\n`initialize` 方法（当 AMS 因任何原因启动 MIDlet 时，`startApp`\
  \ 会调用它）必须完成两件事。首先，它必须确定 MIDlet 的启动是由闹钟调用还是用户调用引起的；其次，它必须根据闹钟是否在应用程序未运行时触发，显示相应的屏幕（要么是一个信息表单，要么是闹钟提醒）。为此，MIDlet\
  \ 必须持久化所需的闹钟时间，以便区分用户启动和闹钟启动。为了持久化这些数据，MIDlet 使用了 Java ME 记录存储，我将在第 6 章中更详细地讨论这一点。目前，只需知道记录存储持久化的是字节数组形式的记录即可；如果\
  \ MIDlet 在存储中检测到记录，我会使用 `ByteArrayInputStream` 和 `DataInputStream` 类的实例来解码所需的闹钟时间。（接下来要讨论的\
  \ `scheduleMIDlet` 方法负责在退出时写入此记录，前提是设置了闹钟。）如果闹钟时间早于当前时间，MIDlet 将通过将其设置为当前显示项来显示闹钟提醒。如果未找到记录，或者闹钟时间尚未到达，MIDlet\
  \ 将创建一个新的 `MyTask` 实例，并安排其任务在适当的时间触发。\n\n`scheduleMIDlet` 方法则执行相反的操作。它在 MIDlet 退出时被调用，检查当前时间与启动时间，如果当前时间早于闹钟触发时间，它将使用\
  \ `ByteArrayOutputStream` 和 `DataOutputStream` 的实例，在将闹钟时间写入持久记录存储之前，向推送注册表注册该闹钟。\n\
  \n当您通过退出命令退出应用程序时，`exitMIDlet` 方法会调用 `scheduleMIDlet`（因此闹钟仅在正常退出时被调度，而非在 AMS 导致的终止时）。\n\
  \n定时器和闹钟都使用 `alarmFired` 方法，该方法简单地将当前显示设置为闹钟提醒通知，而不是 MIDlet 在应用程序启动时显示的默认信息屏幕。\n\
  \n代码的其余部分初始化用户界面：\n\n• `get_infoForm`：此方法延迟创建应用程序启动时显示的表单实例。\n\n• `get_helloStringItem`：此方法延迟创建介绍性表单所使用的字符串项实例。\n\
