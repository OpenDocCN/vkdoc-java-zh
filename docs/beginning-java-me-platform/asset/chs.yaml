  \ 最初创建的一个方法，是用于创建位置列表的工厂方法——现在调用 LocationStore 的 getLocationStrings 方法，而不是将位置 Vector\
  \ 转换为字符串数组。\n\n**总结**\n\n在本章中，您学习了如何使用 MIDP 的记录存储接口存储持久化数据。如您所知，记录存储是记录的集合，每条记录都是一个有序的字节集合。MIDP\
  \ 对记录存储接口的实现将您与目标设备的底层细节隔离开来，目标设备可以将记录存储为文件中的记录、受保护区域闪存中的字节，或任何其他符合标准要求的介质。默认情况下，MIDlet\
  \ 套件的记录存储只能被该套件中的 MIDlet 访问，尽管您可以通过在创建记录存储时指定授权模式，将访问权限导出给其他 MIDlet 套件。\n\njavax.microedition.rms\
  \ 包包含记录存储类，其中包括 RecordStore 类本身。RecordStore 类负责管理记录存储，以及插入、枚举、更新和删除记录存储。每条记录都是一个字节集合，记录存储会为其分配一个记录\
  \ ID，您随后在使用 RecordStore 的 addRecord、setRecord、getRecord 和 deleteRecord 方法获取、更新或删除记录时，可以使用该\
  \ ID 来引用记录。您还可以枚举存储中的记录，并传递用于过滤和排序枚举结果的类实例。\n\n在记录存储中创建和解析记录时，使用 java.io 类 ByteArrayInputStream、ByteArrayOutputStream、DataInputStream\
  \ 和 DataOutputStream 会很有帮助。DataInputStream 和 DataOutputStream 允许您向底层流中读写数据原语，例如整数、浮点数和字符串。结合\
  \ ByteArrayInputStream 和 ByteArrayOutputStream 类，您可以将生成的流转换为字节数组，RecordStore 类可以立即将其用作存储中的记录。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 7 章\n\n访问文件和其他数据\n\n**在**上一章中，我向您展示了如何使用记录存储——这是所有\
  \ MIDP 实现通用的持久化数据方式。但有时，您真正需要的是对文件系统上文件的原始访问，或对由集成应用程序（如内置联系人管理器或日期簿）管理的数据的访问。并非所有设备都支持这种访问；支持\
  \ JSR 75 的设备可以实现此功能，JSR 75 定义了一个可选接口，用于访问本地文件系统上的文件或个人信息管理（PIM）数据，例如联系人管理器、日期簿或待办事项程序所维护的数据。支持\
  \ JSR 75 的实现可能支持文件系统访问、PIM 数据，或两者都支持。此外，尽管 JSR 75 最初是为 CLDC 设备开发的，但它也可能出现在其他 Java\
  \ ME 平台上。鉴于其灵活性和日益普及，这是一个值得您熟悉的优秀接口。\n\n在本章中，我将讨论 JSR 75 的两个方面，以便您学习如何访问文件和 PIM\
  \ 数据。我将从文件连接可选包（FCOP）开始，解释它与记录存储的区别，并展示它如何融入 Java GCF。接下来，我将向您展示与 FCOP 交互时使用的实际\
  \ API。之后，我将把您的注意力转向 PIM 包，向您展示该包中的类如何协同工作，为您提供一个与设备上的联系人、日历和待办事项应用程序交互的接口。结合上一章，本章将使您牢固掌握如何在\
  \ MIDP 设备上存储数据。\n\n**介绍 FCOP**\n\nJSR 75 在 CLDC 1.0 发布后不久推出，它解决了一个困扰许多 J2ME（Java\
  \ ME 的直接前身）开发人员的问题。Java 应用程序无法安全地与移动设备上的集成应用程序交互。Java 社区（由 Sun 领导）为管理 PIM 数据的特定应用程序引入了\
  \ PIM 接口。（我将在本章后面的“介绍 PIM 包”部分对此进行更多说明。）但对于通用应用程序，或那些需要管理自己文件的应用程序，FCOP 提供了解决方案。\n\
  \n**161**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**162**\n\n第 7\
  \ 章 ■ 访问文件和其他数据\n\n设备可能有也可能没有文件系统，因此您不能假设所有 Java ME CLDC 设备（更不用说所有 Java ME 设备！）都支持\
  \ JSR 75 中描述的 FCOP。但如果它确实存在，它会以类似于图 7-1 所示的方式插入到 Java 运行时的其余部分中。\n\n\n\n**图 7-1.**\
  \ *FCOP 与 Java ME 包结构* 图 7-1 所示的关键关系是：CLDC 定义的 Connector 类创建了 FileConnection 接口的实例，用于管理对设备文件系统中文件的访问。通过\
  \ Connector，您可以获取所引用文件的输入输出流，或执行删除文件、更改访问模式等其他操作。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 ■ 访问文件与其他数据 **163**\n\n您将在第 12 章详细学习的 GCF（通用连接框架）提供了统一的类层次结构，以及通过 URL 和基于流的接口访问本地及远程连接资源的方法。javax.microedition.io.Connector\
  \ 类作为应用程序的连接工厂运行：您传入描述要打开项目的 URL，Connector 类返回一个 Connection 子类（如 FileConnection）的实例。获得\
  \ FileConnection 后，您可以使用流执行 I/O 操作，并访问文件系统的具体细节。您可以创建新文件和目录，也可以删除现有文件和目录。\n\n引用文件系统上本地文件的\
  \ URL 使用`file://`协议前缀而非`http://`前缀，示例如下：\n\nFileConnection fc =\n\n(FileConnection)\
  \ Connector.open(\"file:///SDC/wx.xml\", Connector.READ); 为什么会有*三个*斜杠（/）字符？前两个用于分隔文件协议指示符与文件路径。第二个和第三个之间的区域在\
  \ URL 中保留用于被操作对象的主机名；在此例中，由于主机名是本地主机，因此该区域为空。\n\n■**注意** 一个常见错误是像输入网络资源 URL 那样只使用两个斜杠来输入文件\
  \ URL。但这是错误的，而且除非仔细检查，否则很难发现。\n\n文件和目录的命名方式相同；URL `file:///SDC/directory` 可能是一个文件或目录，需要您和\
  \ API 来区分两者的区别。\n\n这在操作目录时非常重要；正如您稍后将看到的，打开指向 `file:///SDC/directory/` 的 FileConnection\
  \ 并调用`FileConnection.mkdir`方法来创建目录是错误的。\n\n**使用 FCOP**\n\n使用 FCOP 时的事件序列大致如下： **1.**\
  \ 确定运行您应用程序的设备是否具有 FCOP。\n\n**2.** 从 Connector 类获取代表您要访问文件的 FileConnection 实例。\n\
  \n**3.** 如有必要，创建该文件。\n\n**4.** 以读取或写入模式打开文件，并分别获取输入或输出流。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**164**\n\n第 7 章 ■ 访问文件与其他数据\n\n**5.** 使用从步骤 4 获得的流执行输入和输出操作。\n\n**6.** 关闭流。\n\
  \n**7.** 关闭 FileConnection。\n\n当然，您还可以执行其他多种操作。您可以删除文件或目录、更改其访问设置、枚举目录内容。最后，您可以监听文件系统的更改，这些更改会提醒您状态变化，例如插入\
  \ SanDisk microSD 卡等可移动存储卡。\n\n设备上的文件系统通常组织为树形结构，就像 FAT32 文件系统一样（尽管文件系统的实际性质可能完全不同）。\n\
  \n然而，一个关键区别在于文件系统可以有*多个*根目录，每个根目录对应一种可移动或永久文件系统。因此，`SD1/` 可能指代第一张 SD 卡的内容，而`internal`则指代内部存储。遗憾的是，没有标准来确定这些名称的含义；唯一的方法是使用提供的更改通知接口查询系统。（我将在后面的“监听文件系统更改”部分向您展示如何操作。）\
  \ **确定 FCOP 是否存在**\n\n在开始使用 FCOP 之前，您应检查它是否存在。您可以通过查询系统的 FileConnection 接口版本来实现，如清单\
  \ 7-1 所示。\n\n**清单 7-1.** *查询系统的 FileConnection 版本* String cv = System.getProperty(\n\
  \n\"microedition.io.file.FileConnection.version\"); if (cv != null) {\n\n// 标记您拥有该接口，或直接在此处执行文件\
  \ I/O 操作。\n\n}\n\n此检查返回一个版本字符串，例如`\"1.0\"`，但如果返回任何非空值，您就知道运行您应用程序的目标设备上存在 FCOP。\n\
  \n**获取 FileConnection 实例**\n\n如前所述，您使用 Connection 类获取 FileConnection 的实例，并通过它实际执行文件操作。您可以使用其`open`方法来实现，如下所示：\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 7 章 ■ 访问文件与其他数据 **165**\n\
  \nFileConnection fc =\n\n(FileConnection) Connector.open(\"file:///wx.xml\", Connector.READ);\
  \ 此方法接受两个参数：要打开文件的 URL，以及打开模式。模式可以是`Connector.READ`、`Connector.WRITE`或`Connector.READ_WRITE`之一。\n\
  \n毫不意外，`open`方法可能抛出您必须处理的异常，包括：\n\n• `IllegalArgumentException`：如果参数无效\n\n• `ConnectionNotFoundException`：如果无法找到名称的目标，或请求的协议类型不受支持\n\
  \n• `IOException`：如果发生其他类型的 I/O 错误\n\n• `SecurityException`：如果禁止访问协议处理器 **创建新文件或目录**\n\
  \n存在三个 FileConnection 接口来帮助您管理文件和目录的创建：\n\n• `exists`：返回一个布尔值，指示创建 FileConnection\
  \ 时指定的文件名是否存在\n\n• `create`：创建指定的文件，前提是您使用`Connector.WRITE`或`Connector.READ_WRITE`模式通过\
  \ Connector 打开了它\n\n• `mkdir`：创建指定的目录，前提是您使用`Connector.WRITE`或`Connector.READ_WRITE`模式通过\
  \ Connector 打开了它\n\n因此，重要的是要认识到，仅仅将文件名传递给`Connector.open`并使用`Connector.WRITE`或`Connector.READ_WRITE`调用它，*并不会*实际为您创建文件！\n\
  \n这些创建接口是 void 接口，但它们可能抛出`IOException`、`SecurityException`、`IllegalModeException`或`ConnectionClosedException`；`exists`可能抛出`SecurityException`、`IllegalModeException`或`ConnectionClosedException`。\n\
  \n■**注意** 您不能通过在文件 URL 末尾指定斜杠（/）然后调用`create`来创建目录；末尾的斜杠会导致`create`抛出`IOException`。请使用`mkdir`并传入不带末尾斜杠的路径。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**166**\n\n第 7 章 ■ 访问文件与其他数据\n\
  \n**打开文件**\n\n尽管您已经打开了引用要打开文件的 FileConnection，但仍需打开文件本身以获取输入或输出流。您可以使用以下方法之一来实现：\n\
  \n• `openDataInputStream`：返回一个`DataInputStream`，您可以从中读取文件内容\n\n• `openInputStream`：返回一个`InputStream`，您可以从中读取文件内容\n\
  \n• `openDataOutputStream`：返回一个`DataOutputStream`，您可以向其中写入数据到文件\n\n• `openOutputStream`：返回一个`OutputStream`，您可以向其中写入数据到文件\n\
  \n当然，您只能获取与打开 FileConnection 时模式相对应的流；例如，如果您指定了`Connector.READ`给`Connector.open`，则无法获取`OutputStream`。不匹配将导致运行时抛出`IllegalModeException`。您还应准备好处理`SecurityException`和`IOException`异常。\n\
  \n\n\n如果你想从文件第一个字节之后的位置开始写入，该怎么做？只需调用 `openOutputStream` 并传入你希望开始写入的偏移量即可。\n\n请确保偏移量为正数，否则运行时将抛出\
  \ `IllegalArgumentException` 异常。\n\n**调整文件属性**\n\n`FileConnection` 接口提供了大量方法，让你可以查询或调整与\
  \ `FileConnection` 关联的文件或目录的属性，包括以下内容：\n\n• `canRead`：如果允许你的应用程序读取该文件，则返回 `true`\n\
  • `canWrite`：如果允许你的应用程序写入该文件，则返回 `true`\n• `directorySize`：返回目录占用的字节数；你可以传入 `true`\
  \ 以在计算中包含目录的子目录，或传入 `false` 仅包含当前目录\n• `fileSize`：返回文件占用的字节数\n• `getName`：返回文件名，不包括\
  \ GCF URL 协议\n• `getPath`：返回包含该文件的目录名称，不包括 GCF URL 协议\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 ■ 访问文件及其他数据 **167**\n\n• `getURL`：以 `Connector` 打开文件时使用的格式返回路径和文件名（包括 GCF\
  \ URL 协议）\n• `isDirectory`：如果指定的 `FileConnection` 指向一个目录，则返回 `true`\n• `isHidden`：如果\
  \ `FileConnection` 指向一个隐藏文件，则返回 `true`\n• `isOpen`：如果当前 `FileConnection` 处于打开状态，则返回\
  \ `true`\n• `lastModified`：返回文件最后被修改的时间\n• `setHidden`：允许你更改文件的可见性状态\n• `setReadable`：允许你更改文件的可读属性\n\
  • `setWritable`：允许你更改文件的可写属性\n• `truncate`：允许你将文件截断为特定长度\n当然，所有这些方法都可能抛出异常，因此请准备好处理它们可能引发的任何异常。\n\
  \n**删除文件或目录**\n\n你可以使用 `FileConnection.delete` 方法删除文件或目录，该方法会*立即*删除指定的文件或目录。如果其他流与该文件关联，它们将被自动刷新并关闭；继续使用这些流将导致\
  \ `IOException` 异常。然而，`FileConnection` 本身仍保持打开状态并可重复使用（例如，用于创建一个同名的新文件）。\n\n**枚举目录内容**\n\
  \n如果你想获取目录内容的列表，可以使用 `FileConnection.list` 方法，该方法返回一个包含目录内容的 `Enumeration`。\n\n\
  `FileConnection.list` 有两种形式：一种不带参数，显示特定目录中的所有文件；另一种接受一个支持通配符的字符串和一个布尔值，用于指示结果 `Enumeration`\
  \ 中是否应包含隐藏文件。\n\n如果你需要操作 `Enumeration` 返回的文件或目录，*无需*通过为相关文件或目录构建符合 GCF 规范的 URL 来创建新的\
  \ `FileConnection`。相反，你可以直接将 `Enumeration` 中的字符串传递给打开该 `Enumeration` 的 `FileConnection`，使用\
  \ `setFileConnection` 方法即可。此方法会重置 `FileConnection`，使其指向你传入的文件或目录。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**168**\n\n第 7 章 ■ 访问文件及其他数据\n\n**监听文件系统变化**\n\n移动设备的环境容易发生许多变化，文件系统也不例外。许多 Java\
  \ ME 设备通过存储卡插槽（如 microSD 或 miniSD）支持可移动文件系统。因此，你的应用程序需要能够检测用户何时插入或移除存储卡，并且你需要一种方法来枚举已挂载的文件系统。你可以通过在应用程序运行时向文件系统注册一个监听器来实现这一点；FCOP\
  \ 提供了 `javax.microedition.io.file.FileSystemRegistry` 类来完成此操作。\n\n\n\n您可以使用 `FileSystemRegistry.addFileSystemListener`\
  \ 方法注册监听器，并传入一个实现了 `javax.microedition.io.file.FileSystemListener` 接口的类实例。您需要重写\
  \ `rootChanged` 方法，如清单 7-2 所示。\n\n**清单 7-2.** *重写 rootChanged 方法* FileSystemListener\
  \ l;\n\nprivate void startListener() {\n\nl = new FileSystemListener() {\n\npublic\
  \ void rootChanged( int state, String rootName ) {\n\n// 在此处处理变更。\n\n}\n\n}\n\n\
  try {\n\nFileSystemRegistry.addFileSystemListener( l );\n\n}\n\ncatch(Exception\
  \ ex) { /* 处理异常 */ }\n\n}\n\nprivate void stopListener() {\n\nif ( l != null ) {\n\
  \ntry {\n\nFileSystemRegistry.removeFileSystemListener( l );\n\n}\n\ncatch(Exception\
  \ ex) { /* 处理异常 */ }\n\n}\n\n}\n\n每当您添加或移除文件系统时，系统会调用您的 `rootChanged` 方法，并传入两个参数。第一个参数表示操作类型：如果收到\
  \ `FileSystemListener.ROOT_ADDED` 值，表示添加了文件系统根目录；如果收到 `FileSystemListener.ROOT_REMOVED`\
  \ 值，则表示移除了文件系统根目录。第二个参数表示用于访问被添加或移除的文件系统的根目录名称。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 ■ 访问文件和其他数据 **169**\n\n`addFileSystemListener` 方法可能抛出以下异常之一：\n\n• `SecurityException`：如果您的应用程序未被允许监听文件系统变更\n\
  • `NullPointerException`：如果您指定了一个不存在的监听器\n\n类似地，`removeFileSystemListener` 方法在您传入\
  \ `null` 时会抛出 `NullPointerException`。\n\n■**提示** 在 NetBeans 中工作时，您可以使用模拟器菜单模拟文件系统根目录的添加和移除。选择\
  \ MIDlet ➤ 外部事件。\n\n`FileSystemRegistry` 的另一个常见用途是确定当前已挂载了哪些根目录。您很可能希望在首次调用某个 FCOP\
  \ 类的接口之前执行此操作，以确保您的应用程序在不同设备之间具有可移植性。某些设备（如模拟器）会确保存在一个名为 `root1` 的默认文件系统，但无法保证所有设备都具有相同的根文件系统名称。您可以使用\
  \ `FileSystemRegistry.listRoots` 方法列出设备上的根文件系统，该方法返回一个包含 `String` 项的 `Enumeration`，每个项代表一个根文件系统名称。例如，您可以编写类似清单\
  \ 7-3 所示的代码。\n\n**清单 7-3.** *枚举设备上的根文件系统* Enumeration r = FileSystemRegistry.listRoots();\n\
  \nString cr = null;\n\nwhile (r.hasMoreElements()) {\n\ncr = (String) roots.nextElement();\n\
  \n/* 对发现的根目录执行某些操作 */\n\n}\n\n请注意，与 `FileSystemRegistry` 的其他方法一样，如果您的应用程序未被允许枚举设备上的根文件系统，`listRoots`\
  \ 可能会抛出 `SecurityException`。\n\n**让 FCOP 发挥作用**\n\n清单 7-4 展示了上一章中用于存储天气预报的 `LocationStore`\
  \ 类，该类已重构为使用文件而非记录存储。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**170**\n\
  \n第 7 章 ■ 访问文件和其他数据\n\n**清单 7-4.** *使用 FCOP 实现的 LocationStore*\n\npackage com.apress.rischpater.weatherwidget;\n\
  \nimport javax.microedition.io.*;\n\nimport javax.microedition.io.file.*;\n\nimport\
  \ java.io.*;\n\nimport java.util.*;\n\npublic class LocationStore {\n\nprivate static\
  \ final String storeName = \"wx\"; private static final String fileURLRoot = \"\
  file:///\"; private static String fileUrl;\n\nVector locations;\n\nFileConnection\
  \ fc;\n\npublic LocationStore() {\n\nlocations = new Vector();\n\nEnumeration em\
  \ = FileSystemRegistry.listRoots();\n\nif (em.hasMoreElements()) {\n\nfileUrl =\
  \ fileURLRoot + em.nextElement() + storeName;\n\n}\n\nload();\n\n}\n\nprivate void\
  \ open() {\n\nif (fc==null) {\n\ntry {\n\nfc =\n\n(FileConnection)Connector.open(fileUrl,\n\
  \nConnector.READ_WRITE);\n\n}\n\ncatch(Exception ex) {}\n\n}\n\n}\n\nprivate void\
  \ close() {\n\nif (fc!=null) {\n\ntry {\n\nfc.close();\n\n} catch( Exception ex\
  \ ) {}\n\nfc = null;\n\n}\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 ■ 访问文件和其他数据 **171**\n\n\n\npublic void addLocation(Location l) {\n\nlocations.addElement(\
  \ l );\n\nsave();\n\n}\n\npublic String[] getLocationStrings() {\n\nString result[]\
