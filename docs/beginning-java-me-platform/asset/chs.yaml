  \ F5，或单击工具栏中三个箭头中的第二个）来开始执行。执行时，程序将正常启动，但当你在模拟器中单击“设置”按钮时，执行将在断点处暂停，让你可以单步执行 showSettingPanel\
  \ 方法，使用右下角的检查器窗口检查变量和调用堆栈，等等（参见图 3-17）。我鼓励你自己尝试这些选项。\n\n**图 3-17.** *执行在断点处暂停以进行调试*\
  \ **打包和执行 CDC 应用程序**\n\n如何在支持 CDC 的设备上打包和执行 Java ME 应用程序因设备而异，但 Java Web Start 和\
  \ Java 网络启动协议（JNLP）让你可以采用与桌面应用程序相同的方式工作。与为 CLDC/MIDP 打包类似，使用这些方法之一打包应用程序涉及为你的应用程序创建一个\
  \ JAR 文件和一个配套的描述符文件，以及一个额外的策略文件，该文件指示应用程序所需的权限。与\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**76**\n\n第 3 章 ■ NetBeans IDE 入门\n\nCLDC/MIDP 不同，描述符是一个 XML 文件，包含三个主要部分：一个 `<resources>`\
  \ 部分，指定所需的运行时和应用程序 JAR 文件的位置；一个 `<information>` 部分，指示应用程序的标题和供应商；以及一个 `<application-desc>`\
  \ 条目，指示应用程序的主类。所有这些都包裹在一个 `<jnlp>` XML 标签中。清单 3-13 显示了一个示例。\n\n**清单 3-13.** *WeatherApplet\
  \ 的描述符文件*\n\n<?xml version=\"1.0\" encoding=\"utf-8\" ?>\n\n<jnlp codebase=\"sb:///WeatherApplet/\"\
  >\n\n<resources>\n\n<Java SE version=\"1.4+\"/>\n\n<jar href=\"lib/classes.jar\"\
  />\n\n</resources>\n\n<information>\n\n<title>WeatherApplet</title>\n\n<vendor>Ray\
  \ Rischpater</vendor>\n\n</information>\n\n<application-desc main-class=\"com.apress.rischpater.weatherxlet.Weather➥\n\
  \nXlet\">\n\n</application-desc>\n\n</jnlp>\n\n你可以手动编写此文件，也可以让 NetBeans IDE 为你生成部署包，就像它为\
  \ CDC/MIDP 部署所做的那样。当它这样做时，它会为 SavaJe 设备创建一个部署映像，其目录层次结构如下： bundle.jnlp\n\nbundle.policy\n\
  \nlib/\n\nlib/classes.jar\n\nbundle.jnlp 文件就是你看到的清单 3-13 中的描述符；bundle.policy 文件请求应用程序的权限，如下所示：\
  \ grant codeBase \"sb:/WeatherApplet/lib/classes.jar\" {\n\npermission java.security.AllPermission;\n\
  \n};\n\n此示例请求所有权限；在实践中，你可能希望应用最小权限原则，该原则要求 *仅* 在授权块中列出应用程序所需的权限。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 3 章 ■ NetBeans IDE 入门\n\n**77**\n\n■**注意** 权限块中的 codeBase 属性应与 JNLP 文件中的 codebase\
  \ 属性匹配。另外，请注意大小写的差异！\n\n要使用 NetBeans 创建合适的部署映像，请确保已在项目属性中（在“部署”选项卡下）为映像选择了目标路径，例如目标硬件的安全数字（SD）卡路径。然后，只需右键单击项目并选择“部署目标包”。当构建和部署完成后，你可以将介质传输到目标硬件并执行你的应用程序。\n\
  \n**总结**\n\n有多种工具可用于开发 Java ME 应用程序，但如果你是初学者，最好的工具之一是用于 Java ME 的 NetBeans IDE。通过添加两个可选包——用于\
  \ CLDC 的 NetBeans Mobility Pack 和用于 CDC 的 NetBeans Mobility Pack——你可以在 Linux 或 Windows\
  \ 平台上（或者通过虚拟化，在其他基于 Intel 的平台上）编写 Java ME 应用程序。该 IDE 提供了一个可视化编辑器用于开发应用程序 GUI，以及集成的构建工具，用于编译和构建你的\
  \ CLDC 或 CDC 应用程序。\n\nCLDC/MIDP 应用程序被称为 MIDlet，具有定义良好的生命周期，允许你在执行过程中的任何时刻暂停应用程序。CDC\
  \ 应用程序也具有相同的生命周期，被称为 Xlet。虽然你可以为许多基于 CDC 的应用程序使用 Java Swing 的子集，但 CLDC/MIDP 则 *不*\
  \ 能这样，它要求你使用专门为受限移动设备开发的 GUI 和事件层次结构。\n\n\n\n尽管 CLDC 和 CDC 使用相同的基本构建流程和构建工具链，但两者在构建和打包流程的后续步骤上有所不同。两者都使用\
  \ JDK 的编译器，并且你应当确保在生成 CLDC 或 CDC 的生产代码时使用混淆器以节省空间。然而，CLDC/MIDP 将字节码验证分为两个阶段，因此 CLDC/MIDP\
  \ 构建环境必须在混淆后、打包前对编译后的字节码进行预验证。最后，两个平台的打包机制也有所不同：CLDC/MIDP 设备使用一个描述应用程序的纯文本文件和一个\
  \ JAR 文件的组合，而 CDC\n\n应用程序通常使用与桌面应用程序相同的 JNLP（由一个 XML 文件和一个类文件组成）机制。\n\n尽管存在这些差异，NetBeans\
  \ IDE 提供了一个统一的可视化开发环境，其中包含用于编辑、调试、构建和打包 Java ME 应用程序的一致工具。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n间奏曲\n\n**到目前为止，你一直在学习关于 Java ME 及其包含的两个配置的通用知识，主要关注底层配置文件。在本书接下来的两个部分中，我将把注意力转向支持应用程序开发的关键库。第\
  \ 2 部分重点介绍用于 CLDC 的 MIDP，第 3 部分讨论用于 CDC 的基础配置文件和个人配置文件。你接下来要学习的内容在很大程度上取决于你的兴趣。如果你想尽可能多地了解\
  \ Java ME 作为一个平台，那么从第 2 部分开始，一直读到第 3 部分，要认识到所讨论的内容是互补的，但市场上很少有设备能提供你正在学习的*所有*功能。如果你对针对特定配置感兴趣，那么只需阅读第\
  \ 2 部分或第 3 部分，了解你感兴趣的配置和配置文件即可。**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 2 部分\n\n使用 MIDP 进行\n\nCLDC 开发\n\n**对于普通开发者来说，Java ME 就是 MIDP 的同义词，这并非没有道理。在超过五年的时间里，开发者们一直在\
  \ MIDP 之上成功交付游戏、娱乐、生产力和其他应用程序——这是移动 Java 在市场上的首次商业成功。在本部分中，你将学习构建成功的 MIDP 应用程序所需的知识。**\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 4 章\n\n介绍 MIDlet\n\n**M**IDlet\
  \ 是 Java ME CLDC 执行模型的核心。MIDlet 相当于 CLDC/MIDP 领域中的应用程序，处理来自用户的输入并呈现输出。MIDlet 还管理与系统的交互，通过暂停并将系统控制权让给中断应用程序来响应资源请求。\n\
  \n在本章中，我将讨论你必须在应用程序中实现的 MIDlet 接口。我首先向你展示最简单 MIDlet 的源代码，并讨论为满足 MIDlet 接口而必须实现的方法。我将讨论\
  \ MIDlet 的生命周期，并为你提供更多关于打包 MIDlet 的信息。接下来，我将向你展示 MIDlet 如何从其附带的 JAR 文件中加载属性和资源。\n\
  \n最后，我将向你展示启动 MIDlet 的各种方法。\n\n**查看最简单的 MIDlet**\n\n清单 4-1 展示了一个简单的 Hello World\
  \ MIDlet，它实现了所有 MIDlet 所需的方法。此 MIDlet 呈现一个带有“Hello World”消息的单个（可编辑）文本框。\n\n**清单\
  \ 4-1.** *Hello World MIDlet*\n\nimport javax.microedition.midlet.*;\n\nimport javax.microedition.lcdui.*;\n\
