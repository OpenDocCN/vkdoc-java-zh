  \n• `get_exitCommand`：此方法延迟创建 MIDlet 用于发出应用程序退出信号的退出命令实例。\n\n• `get_alarmAlert`：此方法延迟创建闹钟提醒消息。\n\
  \n**总结**\n\n\n\n`javax.microedition.midlet` 类封装了 MIDP 应用程序（称为 MIDlet）的概念。要实现一个 MIDlet，你必须继承此类并提供四个函数：构造函数、`startApp`、`pauseApp`\
  \ 和 `destroyApp`。当你的 MIDlet 从暂停状态转换到活动状态，再到销毁状态时（由于原生平台中断你的应用程序，可能会多次进入暂停和活动状态），AMS\
  \ 会调用这些方法。你可以触发其中一种转换；例如，在清理完 MIDlet 使用的资源后，你可以通过调用 `notifyDestroy` 来强制 MIDlet 退出。\n\
  \nMIDlet 被打包成套件，包含在一个 JAR 文件中。该 JAR 文件既包含实现套件中 MIDlet 的类，也包含一个清单文件，该文件通过诸如 MIDlet\
  \ 套件名称、图标、各个 MIDlet 名称、图标以及 MIDlet 子类等属性来描述套件。JAR 文件通常附带第二个文件——描述符（JAD）文件——其中包含与清单文件中相同的属性。你可以使用\
  \ MIDlet 的 `getAppProperty` 方法查询 MIDlet 的属性列表，或者使用 `Class` 的 `getResourceAsStream`\
  \ 方法从 JAR 文件中加载文件。\n\n并非只有用户操作才能调用 MIDlet。MIDlet 也可以响应传入事件（如连接请求或定时器事件）而启动。你可以使用推送注册表的\
  \ `registerAlarm` 方法安排一个闹钟，该方法指定要启动的 MIDlet 以及启动时间。对于正在运行的 MIDlet，你需要继承 `TimerTask`\
  \ 并使用 `Timer` 类的实例来运行你的任务。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 5 章\n\n构建用户界面\n\n**C**LDC 汇集了许多灵活的用户界面组件，你可以用它们构建多种类型的应用程序。与其他 GUI 平台不同，这些 UI\
  \ 组件的接口是高度抽象的，这意味着你可以编写一个应用程序，使其能在多种不同的设备配置上运行，例如带有键盘、触摸屏甚至语音输入的设备。事实上，可以公平地说，CLDC\
  \ 的通用性已经超出了大多数设备制造商的想象；其组件接口支持的硬件种类远超目前市场上已有的产品。\n\n在这个通过拖放式代码生成来构建用户界面的时代，人们很容易忽略这些细节。毕竟，当你只需从面板中选择一个特定的表单或组件，然后通过指向和点击来连接各个部分时，何必过于担心表单如何收集可见组件呢？除了显而易见的答案——扎实掌握基础知识能让你更好地设计应用程序——理解这些基础知识还能使你能够创建自己的用户界面组件，以及高效地组合出复杂且易于导航的应用程序。\n\
  \n在本章中，我将向你展示可用于构建应用程序用户界面的组件。我首先讨论 `javax.microedition.lcdui` 包中各个元素之间的关系，并向你展示这些元素如何组合在一起。然后，我将讨论*命令*——用户与应用程序交互的基本方式。之后，我将全面介绍你可以创建的各种可见对象，从用于显示文本和选项的简单项目开始，接着讲解如何将这些项目分组到应用程序屏幕中。最后，我将讨论这些项目如何与显示画布交互，以便你理解如何创建自己的可见对象。\n\
  \n**理解显示对象与可见项目对象之间的关系**\n\nMIDlet 的最终目的是与用户交互。从非常实际的意义上讲，你的 MIDlet 流程可以简化为以下过程：选择一个要显示的\
  \ Displayable，设置 Display 来显示该 Displayable，等待一个 Command，然后选择下一个 Displayable（或退出）。图\
  \ 5-1 中的状态机图展示了这一过程。\n\n**97**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**98**\n\n第 5 章 ■ 构建用户界面\n\n**图 5-1.** *从显示角度看的 MIDlet 生命周期*\n为了促进这一过程，每个 MIDlet\
  \ 都可以访问显示对象，该对象由 `Display` 类的一个实例表示。通过静态方法 `Display.getDisplay()` 获取，该实例允许你执行以下操作：\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 5 章 ■ 构建用户界面\n\n**99**\n\
  \n• 确定屏幕是否支持彩色或灰度\n\n• 确定显示支持的颜色数量和 Alpha 级别\n\n• 获取前景和背景的边框样式及用户可选颜色\n\n• 闪烁显示背光\n\
  \n• 获取 Alert 的最佳图像边界\n\n• 获取当前显示的 Displayable\n\n• 设置当前显示的 Displayable\n\n• 使用振动电机使设备振动\n\
  \n`Displayable` 接口究竟是做什么用的？图 5-2 中的层次结构展示了 `Display`、它可以显示的内容（`Displayable` 类）以及\
  \ `Item` 类之间的关系，`Displayable` 包含这些 `Item` 类以构成复杂的用户界面。\n\n如图 5-2 所示，`Display` 必须有一个对应的\
  \ `Displayable` 对象来向用户显示。`Displayable` 对象有几种类型。`Canvas` 类提供了对图形的最低级别访问，允许你拦截原始事件并直接绘制到屏幕。它的子类\
  \ `GameCanvas` 提供了一些简单的抽象，以方便将应用程序移植到各种设备上。对于更高级的用户界面布局方法，有 `Screen` 子类及其子类 `Form`、`Alert`、`TextBox`\
  \ 和 `List`。后三个是高级抽象，处理所有布局和事件处理，而 `Form` 允许你将一个或多个 `Item` 对象（例如文本和日期字段）分组。\n\n如果你熟悉\
  \ Java AWT 或 Swing，那么必须认识到 MIDlet 的用户界面模型是非常不同的。两个关键差异从一开始就影响着你设计用户界面的方式。首先，你无法真正控制应用程序的布局。与\
  \ AWT 和 Swing 提供的丰富 Java UI 框架不同，你的用户界面布局完全由 `Screen` 类及其子类控制，它们通常具有简单的布局策略。其次，MIDlet\
  \ 没有实现模型-视图-控制器（MVC）范式，因此如果你习惯使用 MVC，则需要自己实现它。\n\nMIDP 的架构师施加了这些限制，以使 MIDlet 能够在尽可能广泛的设备上运行，并简化设备间的应用程序移植，而无需像\
  \ Swing 那样提供重量级的全 Java 用户界面。\n\n不幸的是，这些限制确实带来了一个缺点：几乎不可能创建真正定制的用户界面。不同的设备通常向用户呈现不同的用户界面；这些变化可能很小，也可能严重影响应用程序的外观。如果你希望创建一个具有非常具体的控件外观和位置的\
  \ UI，则需要使用 `Canvas` 或 `GameCanvas` 类从头开始编写代码。我将在本章后面讨论这一点。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
