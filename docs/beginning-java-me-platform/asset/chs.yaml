  \ 套件更多信息的 URL\n\nMIDlet-Install-Notify\n\n否\n\n当 MIDlet 套件安装时通知的 URL\n\nMIDlet-Jar-Size\n\
  \n否\n\nMIDlet 套件 JAR 文件的大小（以字节为单位）\n\nMIDlet-Jar-URL\n\n否\n\nAMS 可以从中获取 JAR 文件的\
  \ URL\n\nMIDlet- *n*\n\n是\n\n套件中第 *n* 个 MIDlet 的名称、图标路径和类\n\nMIDlet-Name\n\n是\n\n\
  MIDlet 套件的名称\n\nMIDlet-Permissions\n\n否\n\nMIDlet 套件所需的权限列表\n\nMIDlet-Permissions-Opt\n\
  \n否\n\nMIDlet 套件使用但对操作不关键的权限列表\n\nMIDlet-Push- *n*\n\n否\n\n导致此 MIDlet 自动启动的推送注册条目列表\n\
  \nMIDlet-Vendor\n\n是\n\n提供 MIDlet 套件的组织名称\n\nMIDlet-Version\n\n是\n\nMIDlet 套件的版本号\n\
  \n如表所示，AMS *需要*其中六个属性才能安装你的应用程序：\n\n• MIDlet-Name：指定你的 MIDlet 套件的名称，作为显示内存使用等情况时的目录条目。AMS\
  \ 可能在安装过程中向用户显示此名称。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 4 章\
  \ ■ 介绍 MIDlet\n\n**89**\n\n• MIDlet-Version：指定你的 MIDlet 套件的版本，用于在升级 MIDlet 套件时确定当前安装的版本。AMS\
  \ 可能向用户显示版本。版本必须采用 *主版本号.次版本号.微版本号* 的形式，其中 *主版本号*、*次版本号* 和 *微版本号* 都是整数。（*微版本号* 值是可选的。）\n\
  \n• MIDlet-Vendor：指定你的机构名称，即 MIDlet 套件的发布者。\n\n• MIDlet- *n*：指定套件中第 *n* 个 MIDlet\
  \ 的名称、图标和入口类（以逗号分隔）。必须至少有一个这样的属性（MIDlet-1）来指定套件中的单个 MIDlet。\n\n• MicroEdition-Configuration：指定套件所需的\
  \ Java ME 配置版本（例如，CLDC 1.0）。\n\n• MicroEdition-Profile：指定套件所需的 Java ME 配置文件版本（例如，MIDP\
  \ 2.0）。\n\n除了向 AMS 描述 JAR 文件的清单文件外，AMS 还可以使用 JAD 文件在下载和安装套件本身之前确定 MIDlet 套件是否适合目标设备。\n\
  \n■**注意** 大多数平台要求你同时提供 JAD 文件和 JAR 文件。如果这样做，请确保 JAD 文件中的条目与清单文件*完全*匹配，否则 AMS 可能不会安装你的应用程序。\n\
  \n**获取属性和资源**\n\n来自清单文件和 JAD 文件的 MIDlet 属性在运行时对你的应用程序可用。MIDlet 方法 `getAppProperty`\
  \ 接受要返回的属性名称，如果设置了该属性，则返回其值，否则返回 null。请注意，属性名称区分大小写，因此 `MyProperty` *不*等同于 `myProperty`\
  \ 或 `Myproperty`。在搜索属性时，`getAppProperty` 遵循以下规则：\n\n• 如果 MIDlet 套件的 JAR 文件经过加密签名，`getAppProperty`\
  \ 首先搜索清单文件，然后搜索 JAD 文件。如果在两个文件中都找到值，它知道它们必须匹配。\n\n• 如果 MIDlet 套件的 JAR 文件未签名，`getAppProperty`\
  \ 首先搜索 JAD 文件。仅当在 JAD 文件中未找到该属性的条目时，它才会在清单文件中搜索该属性。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**90**\n\n第 4 章 ■ 介绍 MIDlet\n\n当然，JAR 文件可以包含的不仅仅是类。你可以使用 `java.lang.Class.getResourceAsStream`\
  \ 获取 JAR 文件中的命名资源，该方法返回一个指向 JAR 文件中文件的 `InputStream`。负责绘制 PNG 格式位图的 `javax.microedition.lcdui.Image`\
  \ 类还包含 `createImage` 类方法，该方法接受图像的路径并返回一个准备显示的 `Image` 实例。\n\n**管理启动事件和警报**\n\n除了用户输入之外，传入消息和警报等外部事件也可以触发你的\
  \ MIDlet 的激活。要使用外部事件触发你的 MIDlet 的激活，你的 MIDlet 必须向 AMS 注册以表明它希望接收推送事件，并且它必须拥有这样做的权限。\n\
  \n当 MIDlet 未运行时，AMS 和 MIDlet 共同负责处理传入事件，无论是警报还是传入连接请求（见图 4-3）。AMS 代表非活动 MIDlet 监控已注册的推送事件，并根据传入事件启动\
  \ MIDlet。另一方面，当 MIDlet 运行时，推送目录将推送事件直接发送给 MIDlet。\n\n**图 4-3.** *AMS 与等待启动事件的 MIDlet\
  \ 之间的关系*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 4 章 ■ 介绍 MIDlet\n\
  \n**91**\n\n我将把如何使用推送注册表处理传入消息的细节留到第 14 章介绍。\n\n\n\n当我详细讨论无线消息 API 时，你只需知道 MIDlet\
  \ 闹钟机制也通过相同的机制运作，但有一个例外：MIDlet 只能在运行时通过推送注册表注册闹钟，而不能通过清单文件注册。\n\n要注册闹钟，你需要使用`javax.microedition.io`包中的`PushRegistry.registerAlarm`方法。该方法接收闹钟应发送到的\
  \ MIDlet 名称以及闹钟触发的时间。一个 MIDlet 最多只能有一个活动闹钟；`registerAlarm`方法会返回上次计划启动的时间；要取消闹钟，将时间参数设为\
  \ 0。\n\n你只应在应用程序未运行时使用闹钟。当应用程序正在运行时，应改用 MIDP 提供的`Timer`和`TimerTask`类。`java.util.Timer`类管理一个`java.util.TimerTask`子类；使用时，创建一个覆盖其`run`方法的`java.util.TimerTask`子类，并在其中编写需执行的代码。然后使用定时器的`schedule`方法安排该子类的执行。清单\
  \ 4-2 展示了一个简单 MIDlet 中闹钟与定时器的关系，该 MIDlet 在启动后 15 秒通知用户，即使你在通知出现前终止了 MIDlet。\n\n\
  **清单 4-2.** *同时使用闹钟和定时器* package com.apress.rischpater.alarmtimer;\n\nimport java.io.*;\n\
  \nimport java.util.*;\n\nimport java.lang.*;\n\nimport javax.microedition.io.*;\n\
  \nimport\n\njavax.microedition.midlet.*;\n\nimport javax.microedition.lcdui.*;\n\
  \nimport javax.microedition.rms.*;\n\npublic class AlarmTimerMidlet extends MIDlet\
  \ implements CommandListener {\n\nprivate Form infoForm;\n\nprivate StringItem helloStringItem;\n\
  \nprivate Command exitCommand;\n\nprivate Alert alarmAlert;\n\nprivate long DELAY\
  \ = 15 * 1000;\n\nprivate Timer timer;\n\nprivate MyTask task;\n\nprivate long whenLaunched\
  \ = new Date().getTime();\n\nprivate String storeName = \"AlarmTimerStore\"; private\
  \ RecordStore store;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**92**\n\
  \n第 4 章 ■ 介绍 MIDlet\n\npublic AlarmTimerMidlet() {\n\n}\n\nclass MyTask extends\
