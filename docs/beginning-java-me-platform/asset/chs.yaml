  \n**使用套接字和数据报进行通信**\n\n尽管绝大多数联网移动应用程序可能使用 HTTP 来满足其通信需求，但某些应用程序可能仍然需要原始套接字或数据报功能。这包括系统管理员实用程序、即时消息客户端，以及将这些协议应用于游戏或多媒体应用程序的新颖应用。\n\
  \n不幸的是，对这些功能（通常通过 TCP 实现套接字，通过 UDP 实现数据报）的支持并非在所有设备上都可用。如表 12-2 所示，MIDP 2.0 可选地提供对套接字通信的支持，而所有\
  \ Java ME 平台都可能提供对数据报通信的支持。因此，在为您应用程序建立商业案例时，您应考虑这些协议的可用性，并进行一些研究以精确确定哪些设备将支持您的应用程序，以及目标市场中是否有足够多的设备来证明您的开发投入是合理的。如果没有，您可能需要考虑通过其他协议（如\
  \ HTTP）来隧道传输您的数据通信。\n\n■**提示** 诸如 http://developers.sun.com/mobility/device/device\
  \ 上的 Java ME 设备表和 http://wurfl.sourceforge.net 上的 WURFL 设备描述存储库等资源，可以帮助您确定哪些设备支持套接字或数据报通信。\n\
  \n**使用 GCF 进行套接字编程**\n\n使用 GCF 进行套接字编程很简单：构造一个指向套接字目标的 URL，然后使用 Connector 打开它。假设一切顺利——通往服务器的路径可用且服务器正在运行——那么您就可以获取流，以在设备建立的连接上执行输入和输出。\n\
  \n打开套接字连接时，`Connector.open` 返回一个 `SocketConnection` 实例，该实例实现了 `StreamConnection`。对于*大多数*面向套接字的编程，使用\
  \ `StreamConnection` 就足够了，如清单 12-2 所示。\n\n\n**列表 12-2.** *使用 StreamConnection*\n\
  \nString url = \"socket://nowhere.com:7\";\n\n…\n\nStreamConnection c = null;\n\n\
  InputStream s = null;\n\nOutputStream o = null;\n\nbyte[12] b;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 12 章 ■ 访问网络上的远程数据\n\n**301**\n\ntry {\n\nc = (StreamConnection)Connector.open(url);\n\
  \ns = c.openInputStream();\n\no = c.openOutputStream();\n\no.write(\"Hello world!\"\
  .getBytes());\n\ns.read( b, 0, b.length );\n\n} catch (ConnectionNotFoundException\
  \ e) {...}\n\ncatch (IllegalArgumentException e) {...}\n\ncatch (IOException ioe)\
  \ {...}\n\nfinally {\n\ntry {\n\nif (o != null) o.close();\n\nif (s != null) s.close();\n\
  \nif (c != null) c.close();\n\n} catch (Exception e) {...}\n\n}\n\n这段代码打开了一个指向 7\
  \ 号端口（即回显端口）的 TCP 套接字，并写入消息“Hello world!”。写入消息后，它读取响应，然后关闭流和连接。从代码中可以看出，你使用输入和输出流类\
  \ `InputStream` 和 `OutputStream` 来执行实际的 I/O 操作；它们允许你通过 `read` 和 `write` 方法交换单个字节数组。为了实现更高级别的访问，你还可以使用\
  \ `StreamConnection` 的 `openDataInputStream` 和 `openDataOutputStream` 方法从连接中获取 `DataInputStream`\
  \ 和 `DataOutputStream` 实例；正如你在第 2 章中回忆的那样，它们允许你读写包括浮点数、整数和字符串在内的原始数据类型。\n\n`Connector.open`\
  \ 返回的 `SocketConnection` 实例比 `StreamConnection` 拥有更多的方法，它允许你通过调用以下方法对套接字执行一些底层操作：\n\
  \n• `getAddress`：允许你通过调用套接字获取套接字绑定的远程地址\n• `getLocalAddress`：允许你获取套接字绑定的本地地址\n•\
  \ `getPort`：允许你获取套接字绑定的远程端口\n• `getLocalPort`：允许你获取套接字绑定的本地端口\n• `getSocketOption`：允许你获取一个套接字选项\n\
  • `setSocketOption`：允许你设置一个套接字选项\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**302**\n\n第 12 章 ■ 访问网络上的远程数据\n\n这些套接字选项是你在 Linux 或 UNIX 上使用 TCP 套接字时可能遇到过的套接字选项的子集；表\
  \ 12-3 总结了你能够获取或修改的选项。你将选项标识符传递给 `getSocketOption`，它会返回相应的选项值；你将选项标识符和一个新值传递给 `setSocketOption`，它会尝试设置你指定的选项。\n\
  \n**表 12-3.** *套接字选项*\n\n**选项标识符**\n\n**含义**\n\nSocketConnection.DELAY\n\n写入小缓冲区时的延迟时间\n\
  \nSocketConnection.KEEPALIVE\n\n为保持连接活跃而应保持套接字打开的时间\n\nSocketConnection.LINGER\n\
  \n当套接字另一端无响应时，套接字应保持打开状态以等待剩余输出数据的时间\n\nSocketConnection.RCVBUF\n\n接收缓冲区的大小（以字节为单位）\n\
  \nSocketConnection.SNDBUF\n\n发送缓冲区的大小（以字节为单位）\n\nGCF 还通过 `StreamConnectionNotifier`\
  \ 和 `ServerSocketConnection` 类支持接受传入的套接字请求，尽管在实践中 Java ME 应用程序很少使用此功能。至少有三个原因说明你可能不希望\
  \ Java ME 应用程序在套接字上监听传入连接。首先，监听传入连接需要硬件为网络子系统供电。对于许多便携式设备，尤其是那些带有无线电台的设备，这会极大地缩短电池寿命。其次，大多数\
  \ Java ME 设备运行所在的网络在为 Java ME 设备分配地址时通常使用动态地址分配；即使运行网络硬件没有能量损耗，如果不事先使用某种注册机制，你也不知道哪个地址对应哪个特定设备。最后，只有少数设备提供此支持。\n\
  \n\n\n如果你确信这些原因不适用于你，只需指定要监听的端口即可获取 `ServerSocketConnection`，如清单 12-3 所示。\n\n**清单\
  \ 12-3.** *获取 ServerSocketConnection* String url = \"socket://7\";\n\nServerSocketConnection\
  \ ssc = null;\n\ntry {\n\nssc = (ServerSocketConnection)Connector.open(url);\n\n\
  while (true) {\n\nSocketConnection sc = (SocketConnection)ssc.acceptAndOpen(); InputStream\
  \ s = sc.openInputStream();\n\nOutputStream o = sc.openOutputStream();\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 12 章 ■ 访问网络上的远程数据\n\n**303**\n\ntry {\n\n...\n\n}\n\ncatch(Exception e) {...}\n\
  \nfinally {\n\nif (s!=null) s.close();\n\nif (o!=null) o.close();\n\nif (sc!=null)\
  \ sc.close();\n\n}\n\n}\n\n} catch (Exception e) {...}\n\nfinally {\n\ntry {\n\n\
  if (ssc != null) ssc.close();\n\n} catch (Exception e) {...}\n\n}\n\n这段代码与使用 UNIX\
  \ 套接字编写的传统 select/accept 服务器循环非常相似。创建 `ServerSocketConnection` 后，代码会阻塞在 `ServerSocketConnection`\
  \ 实例的 `acceptAndOpen` 方法上，该方法在客户端连接后返回一个 `SocketConnection` 实例。接着，它使用套接字打开输入和输出流以执行必要的\
  \ I/O 服务；完成后，进行清理并返回等待下一个请求。\n\n当然，accept/respond 循环仅在应用程序的生命周期内运行；真正的服务器可能需要在应用程序未运行时也能监听。在\
  \ MIDP 平台上，你可以通过推送注册表（push registry）来实现这一点，即在安装时或运行时为你的应用程序注册传入请求。要在安装时注册，只需在应用程序描述符中，将描述要监听的套接字的\
  \ GCF URL 和你的 MIDlet 名称作为 `MIDlet-Push` 字段的值包含进来，如下所示：\n\nMIDlet-Push-1: socket://:7,\
  \ ServerMIDlet, *\n\n这指示应用程序管理系统在端口 7 上出现传入的 TCP 请求时调用你的应用程序。然后，你的应用程序可以使用 `PushRegistry`\
  \ 的 `listConnections` 方法（我在第 14 章中介绍）来获取有数据等待的连接列表。你也可以通过调用其 `registerConnection`\
  \ 方法，以编程方式将你的应用程序添加到推送注册表中，传递的信息与你在应用程序描述符的 `MIDlet-Push` 字段中提供的信息完全相同。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**304**\n\n第 12 章 ■ 访问网络上的远程数据\n\n**使用 GCF 进行数据报通信**\n\n数据报通信——通常适用于不需要排序和流量控制的短小单条消息——使用\
  \ `Datagram` 类来封装数据报的概念。与套接字类似，你使用 `Connector` 类打开连接；在使用数据报通信时，你会获得一个诸如 `DatagramConnection`\
  \ 或 `UDPDatagramConnection` 的类，并用它创建 `Datagram` 实例。一旦拥有 `Datagram` 实例，你就可以用它来发送和接收单个数据报。清单\
  \ 12-4 将“Hello world!”写入一个数据报回显服务器。\n\n**清单 12-4.** *将“Hello world!”写入数据报回显服务器*\
  \ String url = \"datagram://noplace.com:7\";\n\nDatagramConnection dgc = null;\n\
  \nDatagram d;\n\nString s = \"Hello world!\";\n\nbyte m[] = s.getBytes();\n\nbyte[]\
  \ b = new Byte[12];\n\ntry {\n\ndgc = (DatagramConnection)Connector.open(url);\n\
  \ntry {\n\nd = dgc.newDatagram(m, m.length);\n\ndgc.send(d);\n\nd.reset();\n\ndgc.receive(d);\n\
  \nd.readFully(b, 0, b.length);\n\n} finally {\n\ndgc.close();\n\n}\n\n} catch (Exception\
  \ e) {...}\n\nfinally {\n\ntry {\n\nif (dgc != null) dgc.close();\n\n} catch (Exception\
  \ e) {}\n\n}\n\n这里的 GCF 模式很清晰，不过输入输出不再使用流，而是使用 `Datagram` 类。`DatagramConnection`\
  \ 类充当 `Datagram` 对象的工厂，然后你将 `Datagram` 对象分别传递给 `send` 和 `receive` 来发送和接收单个数据报。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 12 章 ■ 访问网络上的远程数据\n\n**305**\n\
  \n`Datagram` 类是一个抽象类，它封装了所有数据报协议共有的以下概念：\n\n- 数据报有一个*缓冲区*，用于在单个数据报包中存储数据。\n- 数据报有一个*偏移量*，表示在缓冲区中读取或写入数据的当前位置。\n\
  - 数据报的缓冲区有一个*长度*，表示数据报缓冲区的大小。\n- 数据报具有源地址或目标地址的表示形式。\n\n如你在图 12-1 中所见，`Datagram`\
  \ 实现了 `DataInput` 和 `DataOutput` 接口，允许你读写各种原始数据类型，包括布尔型、字节型、字符型、双精度浮点型、浮点型、整型、长整型和\
  \ UTF 字符串。`DataInput` 和 `DataOutput` 的接口让人联想到 `DataInputStream` 和 `DataOutputStream`\
  \ 提供的接口；这些类为各种支持的类型 *X* 提供了 `read *X*` 和 `write *X*` 方法，包括以下内容：\n\n- `readBoolean`，用于读取一个输入字节，如果该字节非零则返回\
  \ true；`writeBoolean`，用于将一个布尔值作为单个字节写入\n- `readByte` 和 `writeByte`，分别用于读取和写入单个字节\n\
  - `readChar` 和 `writeChar`，分别用于读取和写入单个字符\n- `readFloat` 和 `writeFloat`，分别用于读取和写入浮点数\n\
  - `readShort` 和 `writeShort`，分别用于读取和写入短整数\n- `readInt` 和 `writeInt`，分别用于读取和写入整数\n\
  - `readLong` 和 `writeLong`，分别用于读取和写入长整数\n- `readUnsignedByte` 和 `writeUnsignedByte`，分别用于读取和写入单个无符号字节\n\
  - `readUTF` 和 `writeUTF`，分别用于读取和写入 UTF-8 编码的字符串\n- `readFully` 和 `write`，分别用于读取和写入字节数组\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**306**\n\n第 12 章 ■ 访问网络上的远程数据\n\
  \n每个 `Datagram` 实例代表一条消息，要么等待写入连接，要么先前已从连接中读取；你可以通过调用其 `reset` 方法来重用 `Datagram`\
  \ 实例。你还可以使用以下方法查询 `Datagram` 的各种属性：\n\n- `getAddress`：返回 `Datagram` 的地址\n- `getData`：返回\
  \ `Datagram` 缓冲区的内容\n- `getOffset`：返回 `Datagram` 缓冲区的偏移量\n- `setData`：允许你根据给定的字节数组设置\
  \ `Datagram` 的缓冲区、偏移量和长度\n- `setLength`：允许你设置 `Datagram` 缓冲区的长度\n\n**使用 HTTP 进行通信**\n\
  \n在提供电子邮件的协议之后，HTTP 可能是当今最广泛部署和理解的用于数据交换的协议。本质上，它是一个简单的客户端/服务器协议，其简单性和通用性使其成为当今互联网上最重要的协议之一。除了作为在\
  \ Web 上传递内容的协议——由蒂姆·伯纳斯-李创建，其起源是在欧洲核子研究组织（CERN）为超文本文档提供传输——它现在支撑着许多其他客户端/服务器交换，例如支持\
  \ Web 服务的交换。\n\n（我将在下一章中更多地讨论计算领域的 Web 服务模型。）\n\n**回顾 HTTP**\n\nHTTP 是一个客户端/服务器协议\n\
  \n\n\n一种客户端应用程序（即*用户代理*）向服务器发出*请求*，以对特定 URL 上的操作或内容进行访问的协议。该请求包含提供请求元数据的*标头*，以及一个*对象主体*，它是与请求相关的可选数据块。服务器以相同方式回复请求，返回提供请求元数据的标头，后跟可选的响应对象主体。HTTP\
  \ 可以在任何可靠的流协议上运行，但在实践中，它通常基于 TCP 运行。该协议本身使用八位表示字符，但请求和响应标头以纯文本形式编写，这使得开发人员易于理解、实现和排查问题。例如，客户端\
  \ Web 浏览器可能会发送清单 12-5 中的消息，以获取位于 URL http://www.noplace.com 的主页。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 12 章 ■ 访问网络上的远程数据\n\n**307**\n\n**清单 12-5.** *获取一个网页*\n\nGET /index.html HTTP/1.1\n\
  \nHost: www.noplace.com\n\n请求的第一行就是请求本身；请求包含一个方法、一个资源和协议版本。GET 请求要求远程服务器返回指定的资源——在本例中，是文档\
  \ index.html——使用 HTTP 1.1 版本。\n\n请求的后续行包含关于请求的元数据，以冒号分隔、换行符分隔的键值对形式表示，例如服务器目标主机（在示例中为\
  \ www.noplace.com）。如果请求包含对象主体，它将在空行之后跟随标头，如清单 12-6 所示。\n\n**清单 12-6.** *向 Web 服务器发布信息*\
  \ POST /do HTTP/1.1\n\nHost: www.noplace.com\n\nname=value\n\n此处，远程服务器被要求通过调用脚本\
  \ do 并将对象主体传递给该脚本来处理对象主体 name=value。表 12-4 列出了已定义的 HTTP 方法（也称为*动词*）及其用途。\n\n**表\
  \ 12-4.** *HTTP 方法及其含义*\n\n**方法**\n\n**含义**\n\nHEAD\n\n请求与 GET 创建的响应相同的响应，但不包含对象主体\n\
  \nGET\n\n请求指定资源的表示形式\n\nPOST\n\n提交数据以供指定资源处理\n\nPUT\n\n上传指定资源的表示形式\n\nDELETE\n\n\
  删除指定资源\n\nTRACE\n\n回显接收到的请求\n\nOPTIONS\n\n返回服务器为该资源支持的原始 HTTP 方法 CONNECT\n\n将请求连接转换为透明的\
  \ TCP 隧道 回到清单 12-5，服务器可能会做出如清单 12-7 所示的响应。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**308**\n\n第 12 章 ■ 访问网络上的远程数据\n\n**清单 12-7.** *一个典型的服务器响应*\n\nHTTP/1.1 200 OK\n\
  \nDate: Mon, 23 Jun 2008 22:13:40 GMT\n\nServer: Apache/2.2.8 (Unix) mod_ssl/2.2.8\
  \ OpenSSL/0.9.7l DAV/2 PHP/5.2.5\n\nContent-Location: index.html\n\nVary: negotiate,accept-language,accept-charset\n\
  \nTCN: choice\n\nLast-Modified: Mon, 24 Sept 2007 01:12:03 GMT\n\nETag: \"ec11-5b0-43ad74ee73ec0;44bbb82e73280\"\
  \n\nAccept-Ranges: bytes\n\nContent-Length: 49\n\nConnection: close\n\nContent-Type:\
  \ text/html\n\n<html>\n\n<body>\n\nHello world!\n\n</body>\n\n</html>\n\nHTTP 服务器响应的第一行始终是响应状态，包含服务器版本、数字状态指示和人类可读的状态字符串。状态码始终是三位数字；第一位数字表示响应类别，第二位和第三位表示详细信息。常见的类别有\
  \ 200（表示成功）和 400（表示客户端错误导致服务器无法完成请求）。表 12-5 列出了常见的（但并非全部）HTTP 状态码。\n\n在响应状态之后是一系列标头；每个标头的实际含义现在并不重要，重要的是理解每个标头都有一个名称（例如\
  \ Date）后跟一个值（Mon, 23 Jun 2008 22:13:40 GMT）。在使用 HTTP 时，您可能会经常遇到一些标头，例如 Content-Length\
  \ 和 Content-Type；许多其他标头可能对您的工作并非必需。幸运的是，最常见的标头，如 Date、Content-Length 和 Content-Type，都是不言自明的；它们分别指示服务器生成响应的日期和时间、响应中的字节数以及服务器用于编码响应的编码方法。\n\
  \n最后，在标头之后是响应的对象主体——在本例中，是一个简短的 HTML 文档。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 12 章 ■ 访问网络上的远程数据\n\n**309**\n\n**表 12-5.** *常见的 HTTP 状态码*\n\n**状态码**\n\n**含义**\n\
  \n已收到请求标头；客户端可以发送请求主体。\n\n正在切换协议。\n\n成功 HTTP 请求的标准响应。\n\n请求已完成并导致创建了新资源。\n\n请求已被接受处理，但处理尚未完成。\n\
  \n无内容。\n\n永久移动；此请求及所有未来请求都应定向到给定的 URL。\n\n临时移动；此请求应定向到给定的 URL。\n\n可以使用 GET 方法请求在另一个\
  \ URL 下找到响应。\n\n自上次请求以来资源未被修改。\n\n请求包含错误的语法或无法完成。\n\n用户代理的身份验证是可能的但未发生。\n\n请求合法，但服务器拒绝响应。\n\
  \n请求的资源未找到。\n\n对资源使用了该资源不支持的方法进行请求。\n\n处理请求时发生内部服务器错误。\n\n服务当前不可用。\n\n使用的 HTTP 版本不受支持。\n\
  \n已超出带宽限制。*\n\n*这不是官方状态码，*\n\n*但许多服务器会返回它。*\n\n**将 HTTP 与 GCF 结合使用**\n\nHTTP 能够使用标准动词为服务请求提供元数据，这使您可以定义远程系统能够提供的各种服务，而不仅仅是返回网页片段。不过，通常\
  \ Java ME 设备只需要读取远程内容的能力。您可以使用 GCF 和 ContentConnection 下载内容，如清单 12-8 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**310**\n\n第 12 章 ■ 访问网络上的远程数据\n\n**清单 12-8.** *使用 ContentConnection 下载图像* public\
