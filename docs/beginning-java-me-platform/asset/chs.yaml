  control = (ToneControl)player.getControl(\"ToneControl\");\ncontrol.setSequence(song);\n\
  player.start();\n\n}\n\ncatch (MediaException pe) {}\n\ncatch (IOException ioe)\
  \ {}\n\ncatch (Exception e) {}\n\n像这样在应用程序中指定音符序列既繁琐又笨重，因此我建议，如果你采用这种方法，请生成 `ToneControl`\
  \ 序列的数组，并将其作为资源存储在 JAR 文件中，然后你可以使用 `getClass().getResourceAsStream()` 加载它们。\n\n\
  最后，关于使用 `playTone` 方法还是 `ToneControl` 实例的一个提示：`playTone` *不会*阻塞当前正在执行的线程。如果你想使用\
  \ `playTone` 来排序多个音调，你应该在单独的线程中执行，并让线程在每次调用之间休眠。否则，一个 `playTone` 可能会覆盖下一个；最坏的情况下，你只会听到静音，但也可能得到混乱的噪音。因此，如果你想播放多个音调，我建议你使用由\
  \ `ToneControl` 实例控制的 `Player` 实例。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**470**\n\n第 16 章 ■ 渲染多媒体内容\n\n**介绍 Java 可缩放 2D 矢量图形 API**\n\n如今，多媒体的概念涵盖了来自模拟源的音频和视频，例如好莱坞电影、感恩而死乐队私制录音的\
  \ MP3 文件，或来自你拍照手机的相片快照。然而，全数字多媒体正以 SVG 格式的形式蓬勃发展。SVG 是一种开放的 XML 规范，用于描述二维矢量图形图像，这些图像可以是静态的，也可以包含动画并支持用户交互。为了与\
  \ Adobe 的 Shockwave Flash (SWF) 格式竞争，移动行业正在广泛采用 SVG 格式的一个子集，称为 SVG Tiny，用于无线终端和其他设备。\n\
  \n**理解基本 SVG 概念**\n\nSVG 格式允许你使用标签、圆形、线条、多边形和曲线等对象来表示图像。与你可能习惯的图像（如 PNG、GIF、BMP\
  \ 或 JPEG 图像，它们被称为*位图*或*光栅*图像，因为它们由单个图像元素的行组成）不同，SVG 格式是一种*矢量*格式，它使用构成图像的形状的数学描述。此外，SVG\
  \ 图像也可以包含位图数据。这些信息使用 W3C 定义的 XML 表示；有关具体标准的信息，请查阅 http://www.w3c.org/TR。\n\n由于 SVG\
  \ 是一种矢量格式，使用 SVG 表示的图像在不同分辨率下渲染时，不会像位图图像那样出现缩放伪影。此外，该标准明确支持动画图像，让艺术家能够创建在不同尺寸屏幕上都能良好渲染的动画。更有用的是，SVG\
  \ 包含对事件模型的支持，允许 SVG 图像与渲染图像的容器交换事件，因此可以使用 SVG 来表达整个用户界面的外观和感觉。SVG 文档还可以包含处理事件的脚本，使其本身成为一个成熟的图形创作环境。许多浏览器和其他应用程序已经提供了对\
  \ SVG 的支持，使其成为一个被广泛行业采用的有力标准。\n\nJSR 287 定义了一组可选的包，支持渲染和创建符合 SVG Mobile 1.2 标准（也称为\
  \ SVG Tiny 1.2，由 W3C 在 http://www.w3.org/TR/2003/REC-SVGMobile-20030114/ 描述）的 SVG\
  \ 图像。该标准消除了 SVG 的两个关键特性——对脚本的支持，以及渲染器可应用于矢量图形以生成修改后的位图输出的滤镜——以及对裁剪和透明度的其他一些限制。\n\
  \nSVG 是一种 XML 应用，因此你只需使用文本编辑器即可创建 SVG 内容。清单 16-11 显示了一个示例。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00012.jpeg)\n\n第 16 章 ■ 渲染多媒体内容\n\n**471**\n\n**清单 16-11.** *一个简单的 SVG\
  \ Tiny 文档*\n\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n<!DOCTYPE svg [\n<!ENTITY\
  \ smile \"\n<rect x='0' y='0' width='128' height='128' fill='gray' stroke='black'/>\n\
  <g transform='translate(0, 0)'>\n<circle cx='64' cy='64' r='64' fill='yellow'/>\n\
  <circle cx='40' cy='40' r='6.5' fill='black'/>\n<circle cx='88' cy='40' r='6.5'\
  \ fill='black'/>\n<path d='M 40 88 L 64 96 88 88' stroke='black' stroke-width='2'/>\n\
  </g>\n\">\n]>\n<svg version=\"1.2\" baseProfile=\"tiny\">\n<title>笑脸</title>\n⌣\n\
  </svg>\n\n这段代码产生了你在图 16-3 中看到的图像。\n\n**图 16-3.** *一个简单的 SVG 图像，已渲染*\n\n然而，在实践中，大多数有用的\
  \ SVG 图像都过于复杂，无法手工编码；复杂图像中大量的对象手动制作需要太长时间。幸运的是，大多数矢量图形应用程序，从重量级的 Adobe Illustrator\
  \ 到众多由小型团队和开源团队（如 Inkscape (http://www.inkscape.org/)）编写的较小应用程序，都允许你将图像导出为 SVG；任何制作数字内容的艺术家都应该熟悉这些工具。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**472**\n\n第 16 章 ■ 渲染多媒体内容\n\
  \n\n\n全面探讨 SVG 和 SVG Tiny 格式超出了本章的范围；如果你对标准的具体细节感兴趣，可以从 W3C 标准网站 http://www.w3c.org/TR\
  \ 以及互联网上丰富的信息资源入手。在纸质书籍方面，Kurt Cagle 在其著作 *SVG 编程：图形化网络*（Apress, 2002）中对标准的讨论是一个很好的起点。\n\
  \n**理解 SVGAPI 的组织结构**\n\nJava ME 对 SVG 的支持始于 JSR 226。该规范兼容 SVG Tiny 1.1，提供了一组包，支持\
  \ SVG 图像和动画图像的基本渲染，以及处理来自 SVG 图像的用户事件。标准社区很快用 JSR 287 取代了 JSR 226，后者为动画和 SVG 文档的\
  \ DOM 提供了更好的支持。\n\n■**提示** 在我撰写本文时，NetBeans 6.1 以及大多数支持 SVG 的设备仅支持 JSR 226 提供的 SVGAPI。然而，展望未来，我相信大多数支持\
  \ SVG 的设备及开发环境将支持 JSR 287，因此在本章剩余部分，我将重点介绍 JSR 287。\n\nJSR 226 和 JSR 287 所描述的 SVGAPI\
  \ 为矢量图形渲染的多个方面提供了支持。当然，关键在于 JSR 287 提供的高级渲染 API。然而，JSR 287 还提供了封装 SVG DOM 的接口。它还提供了\
  \ SVG 事件、通过同步多媒体集成语言（SMIL）实现的 SVG 动画，以及一个可选包，该包定义了高性能即时模式渲染（即 API 不保留被渲染对象的完整模型）的接口，供应商可以实现这些接口，使应用程序能够访问硬件渲染引擎。\n\
  \nSVGAPI 提供以下包：\n\n• javax.microedition.m2g：用于文档渲染的高级接口\n• javax.microedition.vectorgraphics：SVGAPI\
  \ 和其他应用程序可使用的可选高性能即时模式渲染 API\n• org.w3c.dom：提供 DOM Level 3 Core API 子集以管理 XML DOM\
  \ 的接口\n• org.w3c.dom.events：DOM Level 3 Core API 的事件接口\n• org.w3c.dom.smil：用于渲染\
  \ SMIL 动画的接口\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n第 16 章 ■ 渲染多媒体内容\n\
  **473**\n• org.w3c.dom.svg：SVG DOM API 的接口和类\n• org.w3c.dom.views：JSR 287 定义的用于与\
  \ SVG DOM 交互的 DOM Views API\n\n图 16-4 展示了一个类图，说明了 SVGAPI 相关部分之间的关系，我将在后续章节中讨论这些部分。为简洁起见，图中省略了包名。\n\
  \n**图 16-4.** *SVGAPI 关键部分之间的关系*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  **474**\n第 16 章 ■ 渲染多媒体内容\n\n■**注意** SVGAPI 非常庞大，尤其是考虑到 javax.microedition.vectorgraphics\
  \ 包提供的 API。图 16-4 仅展示了你在渲染 SVG 图像时可能用到的类之间的关系。\n\n如图 16-4 所示，根级类和接口的层次结构实际上相当扁平。请注意以下类和接口：\n\
  \n• ScalableGraphics：用于 2D 矢量渲染的基础类\n• ScalableImage：表示矢量格式的图像；是 SVGImage 类的父类\n\
  • SVGImage：表示符合 SVG Tiny 1.2 标准的 SVG 图像\n• SVGAnimator：使用 SVGImage 处理动画 SVG 图像中更新的自动渲染\n\
  • Document：表示一个 XML 文档\n• SVGDocument：表示一个 SVG 文档；是 Document 的子类\n• Element：表示 SVG\
  \ 文档 DOM 中的通用项；是各个 SVG 元素的父类\n• Event：表示特定接口的上下文信息；是 SVG 事件类的父类\n\n\n\n• EventListener：表示事件监听器，指定\
  \ SVGAPI 框架用于向对象发送事件时所使用的 handleEvent 方法\n\n**渲染 SVG 图像**\n\n你可以通过两种方式使用 SVGAPI\
  \ 渲染 SVG 图像。第一种方式简单易用，最适合静态图像（即不需要动画的图像）。第二种方式稍微复杂一些，因为它要求你完成第一种方式的所有操作，然后再额外做一些工作；但作为回报，你将获得一个能够管理动画\
  \ SVG 图像的对象。\n\n渲染静态 SVG 图像\n\n第一种方式很简单：使用一些初始数据创建一个 SVGImage 进行绘制，然后将其交给 ScalableGraphics\
  \ 实例来绘制。清单 16-12 展示了这种绘制 SVG 图像方式的伪代码。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 16 章 ■ 渲染多媒体内容\n\n**475**\n\n**清单 16-12.** *渲染 SVG 图像*\n\nInputStream in = …\n\
  \nSVGImage image;\n\nScalableGraphics sg = ScalableGraphics.createInstance(); Graphics\
  \ g;\n\nint w, h;\n\ntry {\n\nimage = (SVGImage)ScalableImage.createImage(in, null);\n\
  \n} catch( IOException e) {};\n\nsg.bindTarget(g);\n\nimage.setViewportWidth(w);\n\
  \nimage.setViewportHeight(h);\n\nsg.render(0, 0, image);\n\nsg.releaseTarget();\n\
  \n当你创建 SVGImage 实例时，可以将源数据指定为 InputStream 子类的实例或 URL。创建实例时，你还可以指定一个外部资源处理器，SVGImage\
  \ 会使用它来加载子元素。通常你不需要这样做——直接传递 null 即可。不过，例如当你的图像包含需要从网络获取的组件时，你可能需要这样做；在这种情况下，你需要提供一个包装了\
  \ HttpConnection 的 ExternalResourceHandler 实现。\n\n当然，清单 16-12 并不能很好地适用于 MIDP 图形环境。\n\
  \n清单 16-13 在清单 16-12 的基础上进行了扩展，展示了一个简单的 SVGImageItem 类，它扩展了 MIDP 的 CustomItem 类（我在第\
  \ 5 章中首次讨论过）。SVGImageItem 类的实例适合添加到 MIDlet 中的 Form 项中。\n\n**清单 16-13.** *用于在 Form\
  \ 上渲染静态 SVG 图像的 SVGImageItem 类*\n\nimport java.io.*;\n\nimport javax.microedition.lcdui.*;\n\
  \nimport javax.microedition.m2g.*;\n\npublic class SVGImageItem extends CustomItem\n\
  \n{\n\nprivate ScalableGraphics sg;\n\nprivate SVGImage image;\n\nprivate int prefWidth,\
  \ prefHeight;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**476**\n\n\
  第 16 章 ■ 渲染多媒体内容\n\npublic SVGImageItem( String l, InputStream in, ExternalResourceHandler\
  \ h ) {\n\nsuper(l);\n\nsg = ScalableGraphics.createInstance();\n\nif (in != null)\
  \ {\n\ntry {\n\nimage = (SVGImage)ScalableImage.createImage(in, h);\n\n} catch(\
  \ IOException e) { e.printStackTrace(); };\n\n} else {\n\nimage = (SVGImage)SVGImage.createEmptyImage(h);\n\
  \n}\n\nSVGAnimator animator = SVGAnimator.createAnimator(image); Canvas svgCanvas\
  \ = (Canvas)animator.getTargetComponent(); prefWidth = svgCanvas.getWidth();\n\n\
  prefHeight = svgCanvas.getHeight();\n\nimage.setViewportWidth(prefWidth);\n\nimage.setViewportHeight(prefHeight);\n\
  \n}\n\nprotected int getPrefContentHeight(int w) {\n\nreturn minContentHeight();\n\
  \n}\n\nprotected int getPrefContentWidth(int h) {\n\nreturn minContentWidth();\n\
  \n}\n\nprotected int getMinContentHeight() {\n\nreturn prefHeight;\n\n}\n\nprotected\
  \ int getMinContentWidth() {\n\nreturn prefWidth;\n\n}\n\npublic void paint(Graphics\
  \ g, int w, int h) {\n\ng.setColor(255, 255, 255);\n\ng.fillRect(0, 0, w, h);\n\n\
  sg.bindTarget(g);\n\nimage.setViewportWidth(w);\n\nimage.setViewportHeight(h);\n\
  \nsg.render(0, 0, image);\n\nsg.releaseTarget();\n\n}\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 16 章 ■ 渲染多媒体内容\n\n**477**\n\n该类必须满足 CustomItem 接口的最低要求：实现一个调用继承构造函数的构造函数，通过\
  \ getPref 和 getMin 维度方法向布局管理器提供布局提示，并提供用于绘制项内容的 paint 方法。\n\n\n\n清单 16-13 中的`SVGImageItem`构造方法比清单\
  \ 16-12 中的伪代码稍显复杂，因为它使用`SVGAnimator`来获取 SVG 图像的优选边界。我创建了一个`SVGAnimator`实例（它会在`Canvas`上渲染），然后获取该`Canvas`实例的优选边界。完成此操作后，我便丢弃了`Canvas`实例和`SVGAnimator`，因为后续不再需要它们。最后，我将图像的*视口*（即其边界）设置为从`SVGAnimator`的`Canvas`实例获取的优选边界。\n\
  \n■**注意** 虽然可以通过`SVGDocument`方法直接访问 SVG 图像的 DOM 来确定其边界，但使用`SVGAnimator`更为清晰，并且能为你理解如何制作\
  \ SVG 图像动画（下一节将介绍）铺平道路。\n\nMIDP 布局管理器使用`getPrefContentHeight`和`getPrefContentWidth`方法分别获取由构造方法计算出的\
  \ SVG 图像优选高度和宽度。当布局管理器需要获取宽度或高度的优选边界时，它会向相应方法传递另一个轴上的期望边界。\n\n`getMinContentHeight`和`getMinContentWidth`方法返回图像的优选边界。\n\
  \n`paint`方法执行与清单 16-12 中伪代码相同的基本工作。\n\n首先，它在将要绘制 SVG 图像的位置绘制一个空白矩形，以防该位置屏幕上已有其他内容。接着，它将`ScalableGraphics`实例绑定到包含该图像的`Canvas`提供给`paint`方法的`Graphics`实例上。这为`ScalableGraphics`实例提供了一个`GraphicContext`，用于渲染\
  \ SVG 图像。之后，它将图像的实际宽度和高度设置为包含该图像的`Canvas`提供的宽度和高度，然后指示`ScalableGraphics`实例在项的起点处渲染图像。最后，它通过`ScalableGraphics`的`releaseTarget`方法释放绑定的`Graphics`上下文。\n\
  \n**渲染动画 SVG 图像**\n\n第二种渲染`SVGImage`的方式是使用`SVGCanvas`，这需要更多工作，但能让你轻松渲染动画 SVG 图像或处理事件的\
  \ SVG 图像。其策略与你之前在清单 16-13 中看到的类似：\n\n**1.** 创建一个代表你想要绘制的图像的`SVGImage`实例。\n\n**2.**\
  \ 使用该`SVGImage`创建一个`SVGAnimator`实例。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**478**\n\n第 16 章 ■ 渲染多媒体内容\n\n**3.** 获取`SVGAnimator`将用于渲染图像的组件（在 MIDP 中为`Canvas`）。\n\
  \n**4.** 将`SVGImage`的边界设置为`SVGAnimator`组件的边界。\n\n**5.** 使`SVGAnimator`的组件可见。\n\n\
  **6.** 使用`SVGAnimator`开始播放动画。\n\n在渲染动画 SVG 时，`SVGAnimator`实现会使用所需的 SVG 图像以及由平台实际\
  \ GUI 层级结构（如 MIDP 或 AWT）提供的某种容器。`SVGAnimator`类的设计者假设它将在 CLDC 和 CDC 平台上使用，因此它不会返回\
  \ MIDP 类的特定实例（如`Canvas`）。相反，`SVGAnimator`提供`getTargetComponent`方法返回一个组件，它在该组件中渲染\
  \ SVG，这与 MMAPI 的`VideoControl`实例通过其`initDisplayComponent`方法返回组件的方式类似。在 MIDP 平台上使用\
  \ SVGAPI 时，`getTargetComponent`返回的对象是`Canvas`实例；在其他平台上，它是`Component`的子类。因此，在 MIDP\
  \ 平台上，你可以使用`Display`类的`setCurrent`方法将生成的`Canvas`设置为要绘制的`Displayable`；在其他平台上，你可以将生成的组件插入到\
  \ GUI 视图层级中的适当容器中。\n\n`SVGAnimator`类实现了一个更新线程，用于将 SVG 图像渲染为动画图像。该线程本身实现了一个简单的状态机，具有你在图\
  \ 16-5 中看到的三种状态。\n\n**图 16-5.** *SVGAnimator 状态机*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 16 章 ■ 渲染多媒体内容\n\n**479**\n\n一个`SVGAnimator`实例可以处于以下状态之一：\n\n• *已停止*：`SVGAnimator`在生命周期开始时处于已停止状态，在此状态下它不会绘制任何内容。当处于其他状态时，你可以通过调用其`stop`方法将`SVGAnimator`实例置于已停止状态。\n\
  \n• *播放中*：具有正在运行且正在向其组件绘制的更新线程的`SVGAnimator`处于播放中状态。你可以通过调用其`pause`方法暂停正在播放的`SVGAnimator`，或通过调用其`stop`方法停止它。\n\
  \n• *已暂停*：`SVGAnimator`可能被暂停，在此期间动画不会更新也不会继续。你可以在其处于已暂停状态时通过调用其`play`方法恢复播放`SVGAnimator`，或通过调用其`stop`方法停止它。\n\
  \n清单 16-14 展示了设置`SVGAnimator`并开始播放的伪代码。\n\n**清单 16-14.** *播放动画 SVG*\n\n```java\n\
  SVGAnimator svgAnimator = null;\nString mediaName = …;\nDisplay display = …;\n\n\
  private void initAndStartSvgPlayer()\n    throws IOException {\n    InputStream\
  \ in = getClass().getResourceAsStream(mediaName);\n    SVGImage svgImage = (SVGImage)ScalableImage.createImage(in,\
  \ null);\n    svgAnimator = SVGAnimator.createAnimator(svgImage);\n    Canvas svgCanvas\
  \ = (Canvas)svgAnimator.getTargetComponent();\n    svgImage.setViewportWidth(svgCanvas.getWidth());\n\
  \    svgImage.setViewportHeight(svgCanvas.getHeight());\n    display.setCurrent((Displayable)svgCanvas);\n\
  \    svgAnimator.play();\n}\n```\n\n由于`SVGAnimator`使用单独的线程来执行动画，因此在图像动画播放期间，你不能直接访问\
  \ SVG 图像本身。相反，如果你需要更改图像的内容（请参阅下一节“修改 SVG 图像”），则只能使用`SVGAnimator`的`invokeAndWait`或`invokeLater`方法进行更改。\n\
  \n■**注意** 渲染 SVG 图像*不*使用 MMAPI 定义的相同 API 和概念。这很遗憾，因为稍加扩展数据源和播放器的概念本可以创建一个简洁的接口。在处理媒体时，不要将\
  \ SVGAPI 与 MMAPI 混淆。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**480**\n\
  \n第 16 章 ■ 渲染多媒体内容\n\n通过其目标对象（`Canvas`或`Component`子类）以及 SVG 内容本身，`SVGAnimator`可以获取并生成事件。为了让你的应用程序逻辑接收这些事件，它必须实现一个继承`SVGEventListener`接口的类，该接口指定了用户事件的方法，例如按键事件、按键释放事件、指针按下事件、指针释放事件，以及平台隐藏或显示动画本身时的通知。你可以手动处理这些事件，但大多数情况下，当你需要与\
  \ SVG 图像的事件交互时，是为了创建特定于 SVG 的控件。幸运的是，NetBeans 环境提供了一些类来为你完成这项工作，我将在后面的“将 NetBeans\
  \ 与 SVG 图像结合使用”一节中讨论。\n\n■**注意** JSR 226 定义了一种机制，你可以通过该机制使用 MMAPI 播放 SVG 图像。这基本上与播放其他视频相同：获取一个指定了\
  \ SVG 图像定位器的`Player`实例，然后获取一个`Control`子接口`javax.microedition.media.control.SVGControl`。使用该`Control`实例，你可以获取一个`Item`或`Component`对象，将其添加到你的视图层级中，并正常播放媒体。JSR\
  \ 287 未指定设备是否会继续支持用于 SVG 播放的 MMAPI。\n\n**修改 SVG 图像**\n\n\n\n虽然你不太可能想编写一个创建 SVG 图像而非显示它们的应用程序，但这确实是可行的，并且\
  \ JSR 287 定义的 SVGAPI 让你能够做到这一点。由于 SVGAPI 提供了对 SVG DOM 的支持，你完全可以创建一个空的 SVG 图像并向其中添加新对象。要做到这一点，你必须掌握\
  \ XML DOM、SVG DOM 以及 SVG 标准本身的知识；这些内容大多超出了本节的范围。在这里，我只是概述基本原理，以便你知道如果确实有需要，这是可以实现的。我在本节中所述的所有内容仅适用于支持\
  \ JSR 287 的设备；JSR 226 缺少许多类以及一些直接操作 SVG DOM 所需的方法。\n\n清单 16-15 展示了源自 JSR 287 的伪代码，它演示了如何使用`SVGAnimator`向应用程序逻辑提供用户事件，从而修改现有的\
  \ SVG 图像。反过来，这些用户事件会触发代码向应用程序正在显示的 SVG 图像中添加新的圆形。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 16 章 ■ 渲染多媒体内容\n\n**481**\n\n**清单 16-15.** *创建并填充 SVG 图像*\nclass MIDPSVGEditor\
