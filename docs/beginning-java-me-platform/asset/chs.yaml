  \n**26**\n\n第 2 章 ■ 缩小 Java 以适应需求\n\n**表 2-2.** *续*\n\n**CLDC 1.0**\n\n**CLDC 1.1**\n\
  \nString\n\nString\n\nStringBuffer\n\nStringBuffer\n\nStringIndexOutOfBoundsException\n\
