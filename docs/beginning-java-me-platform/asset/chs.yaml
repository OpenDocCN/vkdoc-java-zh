  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 5 章 ■ 构建用户界面\n\n**101**\n\n\
  **使用命令控制应用程序流程**\n\n\n\n传统的用户界面编程需要基于事件处理或 MVC 范式（或两者结合）来实现。MIDP 采用了类似于前一种范式的方法，定义了`Command`类来封装从用户到应用程序的命令概念。MIDP\
  \ 环境将`Command`类的实例发送给已注册的监听器，这与 Java AWT 将事件发送给事件监听器的方式非常相似。为了接收`Command`类的实例，MIDP\
  \ 对象必须实现`CommandListener`接口，并提供`commandAction`方法。每个`Command`实例都被添加到一个`Displayable`实例中，该实例负责以某种方式（例如通过软键或菜单）向用户呈现该命令。当您激活该命令时，`Displayable`实例还负责将该实例发送给已注册的监听器。\n\
  \n`Command`的实例是元组，由短标签、长标签、类型和优先级组成：\n\n•   *标签*：标签指定了命令在用户界面上显示的内容；只需要一个标签。命令的标签实际出现在用户界面的位置以及具体是哪个标签，取决于多个因素，包括命令的优先级、您添加命令的`Displayable`的实现，以及\
  \ MIDP 运行时本身的实现。（图 5-3 展示了软键菜单中的命令示例。）\n\n•   *类型*：类型指示命令的种类，既用于您的应用程序逻辑，也可能用于 MIDP\
  \ 运行时的用户界面。它提供了关于该命令的附加信息（例如图标）。\n\n•   *优先级*：优先级指示了命令对用户界面的相对重要性。优先级越低，命令在其所分配的`Displayable`上的位置就越显眼。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00005.png)\n\n**102**\n\
  \n第 5 章 ■ 构建用户界面\n\n**图 5-3.** *三个命令——退出、帮助和停止——被添加到一个 Displayable 上*\n理解`Command`对象和`Displayable`对象之间关系的最简单方法是向您展示生成图\
  \ 5-3 的代码。它位于代码清单 5-1 中。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  第 5 章 ■ 构建用户界面\n\n**103**\n\n**代码清单 5-1.** *演示 Command 和 Displayable 对象之间的关系*\n\
