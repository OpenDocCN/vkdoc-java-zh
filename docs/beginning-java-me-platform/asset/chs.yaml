  \ 章 ■ 渲染多媒体内容\n\n**493**\n\n你可能会认为不需要这些信息——毕竟，大多数 Java ME 设备附带的厂商信息会提供支持的媒体类型列表——但通常你确实需要它，因为不能保证一台\
  \ Java ME 设备的固件与 MMAPI 正确连接，仅仅因为它能通过原生应用程序渲染某种媒体类型。事实上，有时 MMAPI 管理器提供的媒体列表可能是不正确的。\n\
  \n■**提示** 虽然在任何设备上测试 Java ME 应用程序都是开发周期中的关键环节，但对于大多数通过 JSR 文档化的 Java ME 扩展来说尤其如此，MMAPI\
  \ 也不例外。始终在开发周期早期就在目标硬件上测试你的应用程序，并经常重复测试。\n\nUI 流程的核心是 `commandListener` 方法和 MIDlet\
  \ 的字段 `mediaName` 与 `mediaType`。当你选择要播放的媒体类型时，`commandListener` 使用一个简单的 switch 语句，用\
  \ JAR 文件中的文件名和你选择的媒体类型来填充这些变量。接着，它启动播放器线程，并将 MIDlet 类本身作为 `Runnable` 对象。生成的线程从 MIDlet\
  \ 类的 `run` 方法开始，该方法负责初始化和启动播放。\n\n接下来的部分将描述 MIDlet 如何播放音频和视频、从视频流中捕获图像，以及播放动画 SVG\
  \ 内容。\n\n**播放音频和视频**\n\n当播放器线程启动时，其 `run` 方法首先调用 `playFromResource`。该方法使用 `commandListener`\
  \ 预先设置的关于你所选媒体类型的信息。\n\n随后，\n\n实现会利用这些信息来决定是初始化 SVGAPI 还是 MMAPI，以及设置 MIDlet 的 `viewerDisplayable`\
  \ 字段中的下一个 `Displayable` 项。此外，如果你选择的文件不是 SVGAPI，该类将创建 MIDlet 所需的任何额外控件。此逻辑由一系列嵌套的\
  \ if-else 语句组成，对于这个示例来说已经足够，但或许值得将其拆分为具有公共接口（返回 `Displayable`）的独立子类。\n\n`initMediaPlayer`\
  \ 负责初始化 MMAPI 的繁重工作；它与清单 16-1 非常相似。它创建一个 `Form` 实例，该实例将成为 MIDlet 在渲染媒体时显示的 `Displayable`。`initMediaPlayer`\
  \ 添加一个 `Command` 实例，允许你在将新表单的命令监听器设置为 MIDlet 之前退出应用程序。\n\n然后，该方法创建一个 `Player` 实例，如果你选择了“摄像头捕获”选项，则使用摄像头的定位器；否则，使用从\
  \ `commandAction` 方法中你选择的 JAR 资源中获取的 `InputStream`。最后，它通过先实现（realizing）播放器，然后预取（prefetching）内容来配置新的\
  \ `Player` 实例。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**494**\n\n\
  第 16 章 ■ 渲染多媒体内容\n\n\n\n一旦 `initMediaPlayer` 完成其工作，控制权将返回给 `playFromResource`，该方法会调用\
  \ `configViewSound` 或 `configViewVideo` 来对用户界面进行任何额外的后期配置，然后才开始媒体播放。`configViewSound`\
  \ 方法不执行任何操作；它只是一个占位符。你可以尝试修改代码，在播放器字段上创建各种 `Control` 子类，例如 `VolumeControl`。\n\n\
  然而，`configViewVideo` 必须执行一些操作；它创建了另一个 `Command` 实例，用于触发视频捕获，并在创建 `VideoControl`\
  \ 实例之前将其添加到 `Form` 实例中。生成的 `VideoControl` 向该方法提供一个 `Item` 实例以添加到 `Form` 中。最后，该方法创建了第二个额外的空\
  \ `ImageItem` 实例，MIDlet 使用该实例来显示你在选择“捕获”选项时捕获的图像。\n\n然后，`playFromResource` 方法启动新创建的\
  \ `Player` 实例，并将当前的 `Viewable` 实例设置为 `viewerDisplayable`，然后将控制权返回给播放器线程的 `run` 方法。在\
  \ MIDlet 执行的这个阶段，MMAPI 会渲染你选择的媒体，而播放器线程则会在此处阻塞，等待你选择“捕获”选项。\n\n**捕获图像**\n\nMIDlet\
  \ 存储在 `videoControl` 字段中的 `VideoControl` 实例可以在其 `Player` 实例开始播放后捕获快照，尽管不建议在主线程上执行此操作，因为这可能会导致\
  \ MIDlet UI 或 MMAPI 本身停滞。通过使用 Java 的 `synchronized` 关键字和 `Object` 的 `notify` 方法将\
  \ MIDlet 实例本身作为显式锁，MIDlet 可以从 UI 线程向播放器线程发送信号，表明你想要捕获一帧。此外，使用 `synchronized` 关键字可以确保在应用程序执行捕获操作时无法触发另一次捕获，这无论如何都可能是一个错误。\n\
  \n一旦 Java 虚拟机使用 `notify/synchronized` 来唤醒播放器线程以捕获一帧，播放器线程就会通过调用 `videoControl` 的\
  \ `getSnapshot` 方法（指定默认编码）来执行捕获。此时，播放器拥有捕获图像数据的 `byte[]`；代码仅使用这些数据来设置 `Form` 上的另一个图像，以显示你捕获的图像。\n\
  \n你可能还想对应用程序捕获的图像数据做另一件事，那就是与他人分享。你可以通过修改我在第 14 章中展示的 `MMSSender` 类来实现这一点，使其接受一个可选的编码图像数据\
  \ `byte[]`，如清单 16-18 所示，并使用清单 16-18 定义的新 `MMSSender` 方法。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
