  \n![](img/00040.png)\n\n第 17 章 ■ 寻路\n\n**519**\n\n**图 17-1.** *模拟设备位置*\n\n从图中可以看出，您不仅可以模拟设备的位置，还可以模拟其方向、海拔、速度和航向。您还可以通过更改\
  \ Location Provider 组合框来模拟定位失败，从而以可预测且可重复的方式测试您的应用程序。\n\n虽然手动指定位置是测试使用一次性定位的简单应用程序的好方法，但在测试更复杂的应用程序（尤其是那些使用多次定位请求或接近检测的应用程序）时，您需要随时间变化模拟位置。您可以使用包含以下两个\
  \ XML 标签的简单 XML 脚本来实现这一点：\n\n• `waypoints`：此顶级标签包含一个单独的航点项列表，每个项代表一个独立的位置。\n• `waypoint`：此标签使用`time`（毫秒）、`latitude`、`longitude`和`altitude`（米）属性包含一个特定的位置和时间戳。\n\
  \n清单 17-3 显示了一个简单的示例。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**520**\n\
  \n第 17 章 ■ 寻路\n\n**清单 17-3.** *在 Sun Java Wireless Toolkit 中模拟运动的简单脚本*\n\n<?xml\
  \ version=\"1.0\"?>\n\n<waypoints>\n\n<waypoint time=\"0\"\n\nlatitude=\"37.87\"\
  \ longitude=\"-122.22\" altitude=\"10\" />\n\n<waypoint time=\"50000\"\n\nlatitude=\"\
  38.0\" longitude=\"-122.30\" altitude=\"12\" />\n\n</waypoints>\n\n通过单击 Browse…按钮并选择包含`waypoint`元素的脚本，您就可以使用\
  \ Location 选项卡中 Location 窗格底部的回放控件，在 Sun Java Wireless Toolkit 中回放位置数据。\n\n■**提示**\
  \ 需要大量测试数据？带有 USB 或串口的 GPS 接收器价格低廉，而且几乎所有接收器都按照美国国家海洋电子协会（NMEA）规定的标准格式输出数据。使用一个接收器，您可以徒步、驾车或骑自行车在城镇中穿行，并在笔记本电脑上捕获位置信息，然后将数据转换为一系列航点条目，用于测试您的应用程序。NMEA\
  \ 使用逗号分隔的纯文本格式；将文件转换为 Sun Java Wireless Toolkit 可用的格式，可以简单到编写一个快速的 Emacs 宏或一个小的\
  \ Java 命令行工具。\n\n**总结**\n\n可选的 Location API 为当今设备使用的众多定位技术提供了一个通用封装。`javax.microedition.location`包中包含一个`LocationProvider`类，它允许您一次性或按时间序列获取设备的位置；您还可以使用它在设备接近某个位置时获取事件。\n\
  \n`LocationProvider`类是`LocationProvider`和`Location`实例的工厂，也是`locationUpdated`、`proximityEvent`、`providerStateChanged`和`monitoringStateChanged`事件的通知器。要使用该接口，您需要通过其静态方法`getInstance`获取一个`LocationProvider`实例，并传入一个描述您对所需位置信息要求的`Criteria`对象。然后，您可以向`LocationProvider`实例注册`LocationListener`或`ProximityListener`实现，以接收连续的位置信息或接近事件，或者根据需要简单地通过调用其`getLocation`方法来确定设备的位置。当然，所有这些都应在单独的线程上完成，以避免阻塞\
  \ UI 线程。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 17 章 ■ 寻路\n\n\
  **521**\n\n该 API 将位置数据表示为`Location`类的实例，这些实例包含表示坐标、街道地址、时间戳、航向、速度以及定位方式的字段。为了标准化对这些数据的访问，该\
  \ API 还包含了诸如`AddressInfo`和`QualifiedCoordinates`等类，它们分别表示街道地址和带有相关误差圆的位置。\n\n该 API\
  \ 还允许不同的应用程序（可能包括设备上的嵌入式应用程序）通过一个或多个地标存储库相互共享位置数据。您通过`LandmarkStore`类访问地标存储库，该类提供了用于在持久文件系统中创建和删除存储库以及访问特定存储库的静态方法。一旦创建了`LandmarkStore`实例，您就可以使用它来枚举存储库的内容，获取表示特定`Location`实例和用户提供数据（如实例的名称、描述和类别）的单个`Landmark`对象。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 18 章\n\n寻求通用\n\n平台\n\n\n\
  \n**Java ME 平台的分裂化**无疑是其最薄弱的环节。正如你在本部分各章节中所见，许多可选 API 使你能够为该平台创建引人入胜的应用程序。不幸的是，通常很难确定哪些设备支持这些\
  \ API 中的哪些，并且如果你在应用程序中使用了多个可选 API，你将需要管理因市场上目标设备可能支持或不支持的不同可选 API 数量而导致的组合爆炸问题。这种碎片化是\
  \ JCP 的一个不良副作用；当供应商试图扩展 Java ME 以支持其设备功能时，他们会向 Java ME 平台提出新的扩展。JCP 在确保不同供应商差异化产品时，新功能可通过通用\
  \ API 获得方面做得相当不错。然而，它却因存在太多可供选择的可选 API 而备受困扰。许多活跃在 JCP 中的组织都认识到了这个问题，并提出了几个 JSR\
  \ 来解决它。\n\n在本章中，我将更详细地讨论 Java ME 的碎片化问题，帮助你理解其发生的原因，以及你在开发工作中可以如何规划以应对它。我将进一步讨论典型\
  \ JSR 的实际内容，因为要成为一名真正熟练的 Java ME 开发者，你需要能够理解 JSR 提供了什么以及没有提供什么。然后，我将详细审视当前解决 Java\
  \ ME 碎片化问题的三个关键 JSR：JSR 185，它定义了无线行业 Java 技术（JTWI）；JSR 248，它定义了移动服务架构（MSA）1.0；以及\
  \ JSR 249，它定义了 MSA2。\n\n**理解 JSR 在碎片化中扮演的角色**\n\n正如你在第 1 章中所见，Java ME 作为小型计算设备平台的根源，驱使其创建者采取了一种极简的、最小公分母的方法，即基础平台只包含很少的功能。通过向平台添加新模块，Sun\
  \ 和其他供应商能够以可预测且一致的方式提供额外功能。配置、简表和包的引入，使得 Sun 能够提供满足特定类别设备能力的 Java ME 版本，并让开发者能够针对这些设备进行开发。\n\
  \n**导致碎片化与统一化**\n\nSun 将 Java ME 授权给一个由平台和设备供应商组成的开放市场，其中许多供应商希望提供额外的软件或硬件功能来使其产品差异化。JCP\
  \ 通过让相互竞争的供应商共同协作来描述 Java ME（以及整个 Java）的扩展来解决这个问题。例如，在 FCOP 之前，美国几家运营商的一些手机拥有基于\
  \ Java SE 的专有文件系统访问接口。虽然这些接口在架构上没有问题，但一家运营商支持来自多个供应商、使用不同接口访问文件系统文件的手机这一事实本身就是一个大问题：如果你想在该运营商上通过一个需要文件系统访问的应用程序获得广泛的市场份额，你需要编写并分发多个版本的应用程序。FCOP\
  \ 通过提供一个所有平台供应商都提供的单一 API 解决了这个问题。现在，你只需使用 FCOP 提供的 API 编写代码，即可在任何提供文件系统访问的设备上运行。\n\
  \n这种解决方案对于单一的 API 集（如 FCOP 或 MMAPI）效果很好，但在处理不同设备供应商提供不同可选 API 集这一事实时则显得不足。如果你正在编写一个只需要一两个可选\
  \ API 的单一应用程序，这可能对你来说不是一个大问题，但日益复杂的移动应用程序需要支持不止一两个可选 API。这些应用程序常常面临无法获得足以支持其开发的市场份额的风险，原因很简单，因为对于平台供应商在众多现有可选\
  \ API 中*实际*会支持哪些，缺乏明确性。\n\n解决这个问题的一个明显方法是将 Sun 用于描述 Java ME 版本的配置/平台/包模型应用于可选包，从而定义新的配置和平台。本质上，这正是\
  \ JCP 成员通过其他 JSR 所做的事情。一些 JSR——例如我在本章中讨论的 JSR 185、JSR 248 和 JSR 249——并不描述可选 API；相反，它们描述的是可选\
  \ API 的集合，并在必要时对特定可选 API 的可接受行为提供额外说明。本质上，这些 JSR 试图通过规定一组可选 API 是应用特定名称或标签所必需的，来统一平台。例如，正如你将在下一节“理解\
  \ JTWI”中看到的，一个符合 JSR 185 描述的 JTWI 设备必须包含 CLDC 1.0、MIDP 2.1 和 WMA 1.1；它也可以包含 MMAPI\
  \ 1.1。设备供应商可以——也应该——选择符合 JTWI 标准，以使他们的产品对市场更具吸引力，而运营商可以要求设备在允许其接入网络之前符合 JTWI 标准。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 18 章 ■ 寻求通用平台**\n\n**525**\n\
  \n诚然，这种解决方案也遭受着它试图治愈的同样问题：没有任何个人或组织能够真正命令供应商必须支持哪些 JSR。因此，这些统一化的尝试本身并不完美；它们依赖于市场力量来取得成功。然而，这些\
  \ JSR 背后的专家组通常包括主要的制造商和运营商——包括诺基亚、沃达丰、摩托罗拉、Orange 和 Sun 等公司——这为这些遏制平台碎片化的努力提供了可信度和动力。\n\
  \n**阅读 JSR**\n\n既然你已经读到了这本书的这个部分，我要告诉你一个小秘密：我在本书中告诉你的很多内容都可以在记录你所读到的 API 的 JSR 中找到。¹\
  \ 事实上，Java ME 变化如此之快，以至于在实践中，熟悉定义平台的 JSR 比仅仅读一两本关于 Java ME 的书对你更有利。（当然，实际编写平台代码的经验也是无可替代的！）这样，当供应商为新兴技术引入新\
  \ API 时，你将准备好学习这些 API 以及如何在你的应用程序中使用它们。\n\n广义上讲，大多数 JSR 都包含以下内容（通常使用这些标题）：\n\n•\
  \ *引言*：说明 JSR 的目的。这个引言通常会告诉你 JSR 的商业案例；对于可选 API，它会告诉你起草该 JSR 的专家组为何认为 Java 开发者社区需要这个可选\
  \ API。\n\n• *贡献者*：列出创建该 JSR 的公司（通常还有个人）。\n\n• *术语表*：定义 JSR 使用的领域特定术语，并且通常会重述*必须*、*不得*、*应该*、*不应*和*可以*的定义，如请求评论（RFC）2119“用于\
  \ RFC 中指示需求级别的关键词”所述。\n\n• *包*：描述 JSR 引入 Java 环境的包。\n\n• *API*：描述 JSR 引入的包中的类和接口。\n\
  \n\n\n• *示例*：展示如何使用 JSR 引入的 API。如果幸运的话，JSR 会包含示例。\n\n1.  话虽如此，我仍努力让你在应用 Java ME\
  \ API 时获得实践经验，同时也让内容比阿塔卡马沙漠少一些枯燥。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**526**\n\n第 18 章 ■ 寻求通用平台\n\n许多 JSR 实际上都包含由 Javadoc 生成的 HTML 格式的完整包文档；有些 JSR，例如\
  \ JSR 135，则以这种形式提供*所有*信息。因此，要成功使用 JSR 中的信息，你既需要具备关于 JSR 试图解决的问题的领域经验，也需要清晰理解 JSR\
  \ 所定义的包以及这些包中包含的类。\n\nJSR 本身具有清晰的生命周期，包括以下阶段：**1.** *草案*：JSR 通常会经历多个早期草案，其中许多由提出\
  \ JSR 的专家组进行内部审查。在此阶段，你可能甚至不知道 JSR 的存在；即使知道，也必须认识到其内容几乎肯定会在未来某个时刻发生变化。\n\n**2.**\
  \ *公开审查*：在此期间，任何人都可以查看或评论 JSR，只需将意见提交给负责该 JSR 的专家组。此阶段在 JCP 成员进行的批准投票中结束；如果文档未通过批准投票，专家组可以提交修订版以回应社区的关切。一旦\
  \ JSR 通过公开审查阶段，除维护外，其未来发生变化的可能性很小。\n\n**3.** *维护*：一旦 JSR 被社区接受，提供该 JSR 的专家组可以对其进行小幅修改，以修正需要更正的项目。\n\
  \n**4.** *休眠*：不再有专家组支持的 JSR 被称为休眠状态。休眠的 JSR 很可能描述的是在社区中未获得广泛支持的 API，或者已被新倡议明确取代的\
  \ API。\n\n了解 JSR 处于其生命周期的哪个阶段，可以帮助你确定在产品规划中是否可以依赖其提供的 API。例如，将产品建立在处于早期草案阶段的 JSR\
  \ 所描述的 API 上可能存在风险。在将产品建立在休眠 JSR 之上之前，最好先了解该 JSR 为何休眠。\n\n随着时间的推移，我总结出了一种方法，使我能够相当快速地学习和处理\
  \ JSR 中的信息。诀窍不仅在于查看 API，还在于尝试获取关于 API 设计者试图解决的问题的领域经验。例如，在查看 JSR 177 中的 SATSA-CRYPTO\
  \ API 时，我花了一些时间研究智能卡行业中的各种技术，尽管我正在进行的项目不太可能使用特定供应商的产品。我还花时间研究了其他社区开发的、实现相同目标的其他\
  \ API；观察不同的人如何解决相同的资源访问抽象问题，可以揭示 JSR 实际文档化实现中所做的决策。始终要记住，在某种程度上，JSR 定义的 API 实际上只是对某个物理系统的抽象；人们很容易过于沉浸在类和对象模型中，以至于忘记了现实世界的基础。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 18 章 ■ 寻求通用平台\n\n**527**\n\
  \n另一个有助于理解 JSR 的方法是，为 JSR 包提供的接口和类绘制类图——即使 JSR 作者已经贴心地提供了图表。如果你能通读一组类和方法的描述，并绘制出这些类和方法之间关系的图表，那么你就离真正理解它们如何协同工作不远了。\n\
  \n然而，有必要提出一个警告。JSR 是用英语编写的，这是一种充满细微差别和不确定性的自然语言。与任何软件系统规范一样，使用自然语言时很难消除歧义；更糟糕的是，JSR\
  \ 通常旨在描述多个实际实现，并且往往不够规范，无法涵盖所有可能的歧义。描述 MMAPI 的 JSR 135 就是一个痛苦的例证；你只需考虑我在第 16 章“捕获媒体”部分中提出的众多注意事项，就会意识到\
  \ JSR 并非全部真相。\n\n有些 JSR 实际上试图解决其他 JSR 的缺陷；描述 MSA 的两个 JSR 就是 JSR 试图修补先前 JSR 缺陷的例子。\n\
  \nSun（偶尔也包括其他公司）为关键包（包括 MMAPI）向供应商提供参考实现（RI）。RI 通常是某个或多个 JSR 中包的实现，并最终被纳入 Sun Java\
  \ Wireless Toolkit 和相应的 NetBeans Mobility Pack 中；Sun 也可能将 RI 提供给供应商，作为其实现的基础起点。此外，Sun\
  \ 还为许多这些关键的可选 API 提供技术兼容性套件（TCK）；供应商可以使用 TCK 的测试来确定*他们的*实现与 RI 的匹配程度。当然，所有这些都假设\
  \ RI 是完美 JSR 的完美实现，且不存在任何歧义（无论是在 RI 实现者*还是*你的眼中！）——这在当今的软件世界中是一种相当不可能的事件组合。\n\n\
  当然，正如我在本书中一直敦促你的那样，解决方案是对你使用的任何 API 进行实现和测试你的假设。虽然 API 或工具损坏或不存在的可能性极低，但 API 相关文档的某些元素完全有可能不够清晰（无论对你还是对基于该文档进行实现的人来说都是如此）。如果你正在学习一个新的\
  \ API，构建一个使用该 API 关键部分的应用程序原型，是巩固你对 API 的理解并确定其是否足够可靠的好方法。此外，你可以在不同的设备目标上使用同一个原型，以探索设备对\
  \ API 实现的任何细微差别。与大多数事情一样，经验确实是无可替代的。\n\n**自行处理碎片化问题**\n\n你可能会发现自己处于一种尴尬的境地，即必须使用没有对应\
  \ JSR 的 API 来开发应用程序；更糟糕的是，不同平台上的 API 可能不同。这种情况可能发生，尤其是在与设备制造商密切合作，或依赖社区尚未达成共识的前沿特性时。在这种情况下，\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**528**\n\n第 18 章 ■ 寻求通用平台\n\
  \n你可以做的一件事是提供一个隔离层来抽象非标准 API，并针对该隔离层进行实现。这让你可以替换符合特定 API 实现的隔离层实现，从而在将代码从一个非标准设备移植到另一个设备时，最大限度地减少应用程序中针对非标准\
  \ API 的更改。\n\n如果接口仅由逻辑组成，你也可以自己制作一个参考实现；例如，考虑如何在那些不支持通过 JSR 172 进行 XML 解析的设备上使用\
  \ kXML 解析器。当然，你也可以这样做来弥补那些未提供特定 API 实现的设备的不足。这种方法在使用 Sun Java Wireless Toolkit 时也很有帮助，因为如果没有仿真中缺失的可选\
  \ API，你可能无法运行应用程序，从而使开发和调试变得更加困难。\n\n\n\n您还应考虑加入 JCP 并亲自参与标准制定过程，成为解决方案的一部分。\n\n\
  **理解 JTWI**\n\nJTWI 由 JSR 185 定义，是首批尝试统一 Java ME 设备（特别是手机）可选 API 的规范之一。该规范于 2003\
  \ 年最终确定，实际上仅要求在当时大多数支持 Java 的手机所包含的 CLDC/MIDP 堆栈基础上增加极少内容。然而，它设定了一些针对手机 Java ME\
  \ 实现的明确目标，因此成为关键里程碑。\n\n在硬件方面，JTWI 提出了一些强烈建议，主要包括：\n\n• *彩色屏幕*：设备必须拥有至少 125×125\
  \ 像素的屏幕，像素宽高比为 1:1。屏幕必须为彩色，色彩深度至少 12 位。\n\n• *堆内存*：设备必须为 Java 虚拟机提供至少 256KB 的堆内存。\n\
  \n因此，虽然你*可能*会遇到屏幕更小或堆内存更少的 JTWI 设备，但这种可能性极低。\n\nJTWI 设备必须满足一些严格规范，包括：\n\n• *JAR\
  \ 文件大小*：AMS 必须能够支持至少 64KB 的 JAR 文件。\n\n• *JAD 文件大小*：AMS 必须能够支持至少 5KB 的 JAD 文件。\n\
  \n• *记录存储*：记录存储实现必须能够存储至少 30KB 数据。\n\n• *线程*：Java 虚拟机必须允许 MIDlet 套件创建至少 10 个同时运行的线程。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 18 章 ■ 寻求通用平台\n\n**529**\n\
  \n• *JPEG 支持*：Image 类必须能够支持 JPEG 图像以及 MIDP 2.0 要求的 PNG 图像。\n\n• *GSM 短信*：WMA 实现必须支持\
  \ GSM 短信，包括通过推送注册表将短信传递给 MIDlet 的能力。\n\n• *HTTP 1.1*：每个设备必须为所有支持的媒体类型提供 HTTP 1.1，这是\
  \ MIDP 2.0 的要求。\n\n此外，JTWI 要求 CLDC 1.0 或 1.1、MIDP 2.0 和 WMA 1.1。厂商也可包含 MMAPI 1.1。\n\
  \n**审视 JTWI 必需元素**\n\n为覆盖最低端设备（从而涵盖大量目标设备），JTWI 要求的包相对较少。但为确保这些设备间的兼容性，JTWI 要求以下元素：\n\
  \n• *CLDC*：JTWI 要求 JSR 30 定义的 CLDC 1.0。厂商可用 JSR 139 定义的 CLDC 1.1 替代，因为 CLDC 1.1\
  \ 是 CLDC 1.0 的严格超集。CLDC（1.0 或 1.1）为所有应用程序提供了稳健的核心基础（见第 2 章）。\n\n• *MIDP*：JTWI 要求\
  \ JSR 30 定义的 MIDP 2.0。这提供了许多应用程序所需的 UI、持久存储和通信层（见第 2、3、4、5 章）。\n\n• *WMA*：JTWI 要求\
  \ JSR 120 定义的 WMA 1.1（包括短信），使应用程序能够利用 JTWI 兼容设备运行的无线网络（见第 14 章）。\n\n正如我在上一节所述，JTWI\
  \ 为这些 JSR 中的每一个提供了澄清说明。好奇者（或过度严谨者）应参阅 JSR 185 了解详情。\n\n**审视 JTWI 可选元素**\n\n在编写 JSR\
  \ 185 时，多媒体接口刚刚开始出现在一些中高端手机上。为鼓励采用 MMAPI（我在第 16 章中描述过），JTWI 要求：如果设备通过 Java ME 支持多媒体访问，则必须通过\
  \ MMAPI 1.1 提供该功能。如果 JTWI 设备上存在 MMAPI 实现，则该设备必须支持以下特性：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**530**\n\n第 18 章 ■ 寻求通用平台\n\n• *HTTP*：设备必须支持所有支持媒体格式的 HTTP 1.1 下载（*非流式*）。这是因为\
  \ MMAPI 本身不强制任何协议，也不指定哪些媒体类型需要特定协议。\n\n• *MIDI*：设备必须支持 MIDI 文件播放。这是因为许多游戏通过合适的音频得到增强；MIDI\
  \ 提供了音频的紧凑表示。此外，设备还必须支持 MIDI 播放的 VolumeControl。\n\n• *音调序列*：设备必须支持音调序列，作为为游戏和其他应用提供音频的额外途径。\n\
  \n• *快照格式*：如果 MMAPI 实现支持视频功能集和视频图像捕获，则快照格式必须包含 JPEG 编码作为编码选项。\n\n令人沮丧的是，JTWI 对 MMAPI\
  \ 有很多*未提及*之处，例如是否应支持流式传输以及 WAV 或 MP3 等数字音频格式。\n\n然而，通过将门槛设得如此之低，它涵盖了许多商用设备，并帮助 Java\
  \ ME 开发者社区标准化了无线游戏多媒体开发的许多方面。\n\n**理解 MSA**\n\nJTWI 是统一手机市场 Java ME API 的极佳第一步。然而，它已严重过时；移动设备硬件和软件开发的快速步伐决定了，当\
  \ JTWI 被广泛采用和引用时，它已无法解决因 FCOP、额外 MMAPI 和 SVG 支持、蓝牙和 Mobile 3D Graphics API（本书中我甚至未详细讨论过）等附加功能带来的进一步碎片化问题。\n\
  \n因此，Java ME 社区制定了 JSR 248 和 249 来定义 MSA——一种比 JTWI 定义的平台架构更广泛的平台架构，但仍针对高销量设备。此外，虽然\
  \ JTWI 主要反映了其通过时 Java ME 设备市场的状态，但 MSA 旨在不仅描述某些设备上已有的功能，还描述专家预计在可预见的未来将普及的功能。\n\n\
  MSA 已有两个版本：JSR 248 定义的 MSA 1.0，以及 JSR 249 定义的 MSA2。MSA 1.0 已获 JCP 完全接受；在我撰写本章时，JSR\
  \ 248 的维护版本已发布。相比之下，JSR 249 还是个雏形；在其前身 JSR 248 获批时，JSR 249 仍处于私人草案状态，甚至未向整个社区公开。然而，两者都值得讨论，因为尚不清楚市场最终会采用哪一个，而且两者都为讨论\
  \ Java ME 平台的近期未来提供了优秀框架。\n\n与之前的 JTWI 类似，MSA 定义了符合设备必须支持的 API 集合，并针对许多 API 的歧义性提供了具体澄清。MSA\
  \ 1.0 和 MSA2 共同定义了五种不同的可选 Java ME API 组合，适用于使用当前或近期可用技术和 API 的大众市场手机。\n\n**理解 MSA\
  \ 1.0**\n\n制定 MSA 1.0 的努力始于 JTWI 完成后约两年，从它要求符合性所需可选接口的数量和类型可以清楚看出这一点。定义 MSA 1.0\
  \ 的 JSR 规定了必须满足的强制组件和要求，以及如果满足 JSR 中设定的特定条件则必须满足的*条件强制*要求。\n\n\n\nJSR 包含五个关键部分，分别描述了强制性组件\
  \ JSR、对组件 JSR 的额外说明、超越 JSR 的额外平台要求、给开发者的各种建议，以及一份详述 Java ME 和 MSA 暂定未来规划的路线图。该规范背后的专家组由\
  \ Java ME 市场的主要参与者组成，包括摩托罗拉、诺基亚、RIM（黑莓）、三星、西门子和索尼等硬件制造商，以及 Cingular Wireless（现为\
  \ AT&T 移动部门）、NTT docomo、Orange、Sprint、T-Mobile 和沃达丰等网络运营商，当然还有 Sun 公司。该规范定义了两个平台：*MSA*\
  \ 和 *MSA 子集*。（为避免与 JSR 249 定义的 MSA2 混淆，我将它们称为 MSA 1.0 和 MSA 子集 1.0。）顾名思义，MSA 1.0\
  \ 是一个完整的软件栈，而 MSA 子集 1.0 则为了适应成本更低、性能更弱的设备，删除了几个可选的软件包。为了满足这两个平台中任何一个的要求，符合规范的实现必须实现或遵守以下内容：\n\
  \n• *JSR*：必须实现 MSA 1.0 或 MSA 子集 1.0 指定为该平台必需组件的每一个 JSR。\n• *对 JSR 的额外说明*：必须遵守 JSR\
  \ 相关“额外说明”部分中详述的任何 MSA 1.0 或 MSA 子集 1.0 的额外要求。\n• *额外要求*：必须遵守 JSR 248 中列出的所有额外 MSA\
  \ 要求。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**532**\n\n第 18 章 ■\
  \ 寻求通用平台\n\n一些要求对 MSA 1.0 和 MSA 子集 1.0 是通用的，包括以下类别的要求：\n\n• *JTWI*：符合 MSA 规范的实现必须满足\
  \ JTWI 的要求。\n• *屏幕*：符合 MSA 规范的实现应配备至少 128✕128 像素、16 位色深、支持 65,536 种颜色的屏幕。（你可能会遇到不符合此要求的设备，但这不太可能。）\n\
  • *堆内存*：MIDlet 可用的最小 Java 堆内存应至少为 1024KB；MSA 建议堆内存至少为 2048KB。\n• *JAD 和 JAR 文件限制*：支持的最小\
  \ MIDlet JAR 大小为 300KB。支持的最小 MIDlet 套件 JAD 文件大小为 10KB。平台必须支持最多包含 512 个属性的 JAD 清单。\n\
  • *记录存储*：每个 MIDlet 套件支持的最小记录存储大小为 64KB，并且每个 MIDlet 套件最多可使用 10 个独立的记录存储。\n• *安全性*：MSA\
  \ 定义了需要权限的可选包 API 与相关权限名称之间的明确对应关系。\n• *系统属性*：MSA 定义并提供了系统属性的通用参考，用于确定特定 API（例如\
  \ FCOP）的可用性和版本。\n• *网络协议*：HTTP、基于安全套接字层 (SSL) 3.0 的 HTTP、TCP、SMS 和 MMS 是 MSA 实现必须提供的强制性协议。\n\
  \n此外，MSA 1.0（而非 MSA 子集 1.0）必须提供对会话发起协议 (SIP) 的支持。其他协议，如基于 TLS 的 HTTP、TCP 服务器支持、TLS\
  \ 1.0 和 UDP，则是可选的。一些协议，包括蓝牙和红外数据协会 (IrDA) 的多个配置文件，是有条件强制性的。\n\n• *内容格式*：MSA 要求支持多种常见内容格式，包括\
  \ PNG、JPEG、Mobile 3D Graphics API、SVG Tiny 1.1、8kHz 脉冲编码调制 (PCM) 格式的 WAV、自适应多速率窄带\
  \ (AMR-NB) 音频压缩、MIDI 和可扩展和弦 MIDI (SP-MIDI) 音频。\n\n审视 MSA 子集 1.0\n\n要被视为符合 MSA 子集\
  \ 1.0 规范，产品必须提供以下包：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 18\
  \ 章 ■ 寻求通用平台\n\n**533**\n\n• *CLDC 1.1 和 MIDP 2.1*：提供 JSR 139 和 JSR 118 中规定的基础平台。\n\
  \n\n\n• *FCOP 和 PIM*：提供对本地文件系统和个人信息管理器的访问。FCOP 必须提供属性，用于指定相机拍摄的照片和视频、壁纸图像、铃声、音乐和录音机的存储目录的默认\
  \ URL，以及每个 MIDlet 的私有存储目录。PIM 必须支持 PIMList 的子类 ContactList、ToDoList 和 EventList，并支持只读、读写和只写模式。ContactList\
  \ 必须支持传真、家庭、移动、首选和工作号码，以及街道地址、电子邮件、备注、URL 和照片字段。ToDoList 必须包含摘要、优先级、完成日期、截止日期和已完成字段。与\
  \ MSA Subset 1.0 的其他部分一样，这些要求同样适用于 MSA 1.0。\n\n• *蓝牙*：如果设备支持蓝牙技术，则必须包含基于 JSR 82\
  \ 描述的 GCF 的蓝牙 API。通过此 API，应用程序可以使用蓝牙在设备之间交换媒体。\n\n• *MMAPI*：必须包含 MMAPI，以允许开发人员创建引人入胜的多媒体应用程序。实现必须支持与系统相机应用程序相同的从图像传感器捕获图像的分辨率。\n\
  \n• *移动 3D 图形*：移动 3D 图形是游戏、一些丰富的 GUI 和其他图形密集型应用程序的重要元素。符合规范的设备必须提供 JSR 184 指定的接口。\n\
  \n• *WMA*：符合规范的设备必须提供 WMA 2.0，因为消息传递是必须可供 Java ME 开发人员使用的关键手机功能（参见第 14 章）。\n\n•\
  \ *SVG*：图形仍然是当今和未来移动应用程序的关键组成部分；包含对 JSR 226 的支持可确保应用程序能够显示 SVG 图像。\n\n审视 MSA 1.0\n\
  \nMSA 1.0 在 MSA Subset 1.0 的基础上增加了以下包：\n\n• *J2ME Web 服务*：JSR 172 描述的 J2ME Web 服务规范——包括\
  \ XML 解析器和 Web 服务可选包——必须包含在内，以促进支持 Web 服务的标准方式（参见第 13 章）。\n\n• *安全与信任服务*：SATSA 是各种移动应用程序和服务中的重要元素。必须提供\
  \ SATSA-CRYPTO，而对 SATSA 和 SATSA-PKI 中的 APDU 接口的支持则是条件性强制要求（参见第 15 章）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**534**\n\n第 18 章 ■ 寻求通用平台\n\n• *位置*：如果设备具有 GPS 接收器或其他位置定位采集子系统以支持基于位置的应用程序，则必须包含\
  \ JSR 179 描述的位置 API。\n\n• *SIP*：SIP 是基于 IP 的电话网络建立和管理语音呼叫处理的首选协议。MSA 1.0 要求符合规范的设备包含一个包，该包通过提供\
  \ JSR 180 指定的 SIP 来增强 GCF 支持。\n\n• *内容处理*：JSR 211 定义的内容处理 API 允许一个 Java 应用程序（或 MIDlet）根据其支持的内容类型启动另一个应用程序。\n\
  \n• *高级多媒体*：必须包含高级多媒体补充（AMMS）API（我在第 16 章中简要提及），以允许开发人员使用增强的相机支持、3D 音频、对内部收音机的支持以及卓越的图像编码和处理能力。\n\
  \n• *国际化*：Java ME 的 MIDlet 和应用程序难以国际化；没有好的方法将本地化的应用程序资源与源代码隔离，或在运行时动态识别这些资源。JSR\
  \ 238 提供了一种实现此目的的标准方法，并且必须包含在内。\n\n**面向未来的演进：MSA2**\n\nJSR 249 定义了 MSA2，这是一组与 MSA\
  \ 1.0 向后兼容的需求。由与 JSR 248 组成基本相同的专家组编写，MSA2 解决了 JSR 248 开发开始和结束期间 Java ME 市场发生的变化。它定义了三个平台：\n\
  \n• *MSA2 Limited*：面向低端大众市场手机。\n\n• *MSA2 Subset*：面向中端大众市场手机，是 MSA2 Limited 的超集，并包含额外需求。\n\
  \n• *MSA2*：面向高端设备，是 MSA2 Subset 的超集，并包含额外需求。\n\n与 JSR 248 一样，JSR 249 使用强制需求和条件性强制需求的概念来定义这些平台，它不仅指定了每个平台必须支持的一组\
  \ JSR，还提供了关于这些 JSR 的额外需求，以及针对整个目标平台的额外需求。\n\n其中一些需求继承自 MSA 1.0 和 JTWI；其他需求则是 MSA2\
  \ 新增的。硬件需求（例如屏幕和堆容量）与\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 18\
  \ 章 ■ 寻求通用平台\n\n**535**\n\nMSA 1.0 保持一致；安全需求在原则上保持相似，但已大幅扩展，以包含 MSA2 所需的额外 API 的权限。\n\
  \n■**注意** 在我撰写本文时，JSR 249 仍处于草案形式，可能会发生变化。在依赖我在此提供的材料之前，请访问 JCP 网站上关于此 JSR 的页面 http://jcp.org/en/jsr/detail?id=249\
  \ 以获取最新副本，并查看是否有任何可能影响您开发计划的更改。\n\n审视 MSA2 Limited\n\nMSA2 Limited 本质上是 MSA Subset\
  \ 1.0，仅包含最少数量的新增内容，以确保跨多个设备的最低层级具有通用 API。它包括 MSA 1.0 要求的移动国际化 API（JSR 238），以及 JSR\
  \ 256 定义的移动设备传感器管理通用框架。\n\n移动传感器 API 使您可以访问强制性的硬件传感器（电池和网络接收信号强度），如果设备硬件有的话，还可以访问\
  \ 3D 加速度计。\n\n审视 MSA2 Subset\n\nMSA2 Subset 建立在 MSA2 Limited 之上；实际上，它是 MSA2 Limited\
  \ 的超集。它必须提供对以下包的支持：\n\n• *MIDP 3.0*：JSR 271 定义的 MIDP 3.0 是 MSA2 Subset 和 MSA2 的基本组成部分。目前由\
  \ JCP 成员开发，它将扩展已有的 MIDP 2.1 API，增加对共享库代码、更好的应用程序生命周期管理、用于 MIDlet 间记录存储交换的安全二进制接口以及增强的用户界面（包括对\
  \ MMAPI 的强制支持）的支持。\n\n• *移动广播服务*：当今许多设备可以接收广播内容，例如数字电视。JSR 272 定义了访问服务指南（允许应用程序搜索节目内容数据库）以及使用基于\
  \ MMAPI 的 API 渲染广播内容（包括与广播内容相关的字幕或其他元数据）的接口。\n\n• *非接触式通信*：JSR 257（我在第 15 章中提到）描述了执行与\
  \ RFID 卡或视觉标签的非接触式通信的方法。如果底层硬件提供这些功能，则需要支持此 API。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**536**\n\n第 18 章 ■ 寻求通用平台\n\n• *移动用户界面定制*：设备个性化——壁纸、铃声和设备主题——是当今许多移动设备的重要功能，也是内容提供商的主要收入来源。JSR\
  \ 258 定义了一个允许访问个性化数据并为用户提供重新定制 Java ME 应用程序外观的 API；此 API 是强制要求的。\n\n• *XML*：XML\
  \ 可以说是当今网络的*通用语言*；JSR 280 定义了替代 JSR 172 所定义接口的标准接口。JSR 280 实现了更好的 XML 解析，并包含一个流式\
  \ XML 解析器和对 XML DOM 的支持。此 API 是强制要求的，以使应用程序开发人员能够使用 Web 服务。\n\n审视 MSA2\n\n\n\n基于\
  \ MSA2 子集，MSA2 要求包含对 IP 多媒体子系统（IMS）服务的支持。IMS 使用包括 SIP、Diameter（RADIUS 的超集）、MMS 和\
  \ RTSP 在内的标准协议，以实现基于 IP 的实时消息、聊天、一键通（PTT）和多人在线游戏，这些功能正迅速成为全球 3G 无线基础设施的标准组成部分。为了充分利用这些网络上的\
  \ IMS 骨干网，下载的应用程序必须能够通过标准 API 访问 IMS 功能；JSR 281 定义了此 API。\n\nJSR 281 以 Java 为中心的方式支持\
  \ IMS 的诸多方面，包括定义可选包以支持以下 IMS 功能：\n\n• *推送（Push）*：MIDlet 可以注册以响应传入的 IMS 连接，就像它们可以响应其他消息一样。\n\
  \n• *服务质量（QoS）*：QoS 保证是 IMS 标准的重要组成部分，IMS API 允许在 QoS 保证下进行音频和视频流传输。\n\n• *编解码器（Codecs）*：IMS\
  \ API 实现必须包含对 AMR-NB（以及 AMR-WB，即 AMR 的宽带版本，如果设备是宽带设备）的支持，并且如果设备支持，还需包含用于流视频的 H.263。\n\
  \nIMS API 建立在 GCF 和 MMAPI 提供的概念框架之上。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 18 章 ■ 寻求通用平台\n\n**537**\n\n**总结**\n\nJava ME 作为平台的强大之处在于其“一次编写，随处运行”的特性；不幸的是，这一值得称赞的目标始终受到\
  \ Java 社区开放性的威胁，这种开放性鼓励并拥抱增长，导致了 API 和平台碎片化。Java 社区致力于扩展 Java ME 可用的 API，并通过 JCP\
  \ 遏制 Java ME 平台的碎片化，JCP 发布 JSR 来记录额外的 API 或 API 组合，以支持新的应用程序和服务。有三个关键的 JSR 正致力于通过定义应尽可能多地包含在设备上的\
  \ Java ME API 集合来减少 Java ME 平台的碎片化。\n\n第一个是 JSR 185，它定义了 JTWI，这是一个支持 CLDC、MIDP 和\
  \ WMA 的极简移动手机。它也可能通过 MMAPI 支持一些音频多媒体。目前市场上大多数支持 Java ME 的设备都明确符合 JTWI，无论是设备制造商有意为之并验证的目标，还是顺其自然的结果。\n\
  \n另外两个，JSR 248 和 JSR 249，建立在 JTWI 之上，并定义了需要更多 API 的附加平台。这些 JSR 允许你依赖这些必需的 API 的存在，用于文件系统访问、MMAPI、SATSA、Mobile\
  \ 3D Graphics API、WMA 和 SVG API，以及实现新网络功能（如 SIP 和 IMS）的 API。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n附录\n\n查找 Java API\n\n**在**本书中，我重点介绍了特定的必需和可选 Java ME API 以及如何使用它们。在某些情况下，我引导你查阅了记录这些\
  \ API 的特定 JSR，而在其他情况下则没有。此外，我只讨论了可选 Java ME API 的一个子集；许多其他可选 API 在某些支持 Java ME 的设备上也是可用的。\n\
  \n关于 Java ME API 的 JSR 数量之多确实令人不知所措，尤其是在你刚开始接触时。不可避免地，会有人问你：“Java ME 设备能做*X*吗？”通常，问这个问题的是重要人物，比如正在设计公司下一代产品的产品经理，而你将在接下来的六个月里致力于开发该产品。准确回答这个问题并不像听起来那么容易，尤其是如果你不立即熟悉*X*的话。你需要查阅与\
  \ Java ME 相关的 JSR，找到与*X*相关的 API，并查看它们是否能满足你的需求。这就是本附录的目的：它包含表 A-1，该表将重要的移动技术映射到描述该技术\
  \ API 的相关 JSR。有了这些信息，你可以访问 http://www.jcp.org，查找相关的 JSR，并形成你所提问题的答案。\n\n最后一点：JSR\
  \ 告诉你*如何*用 Java ME 设备做某事。它们不会告诉你是否有任何 Java ME 设备*实际*上以那种方式做。请注意，我并非在抨击 JCP；这是一个伟大的流程。我只是指出围绕\
  \ Java ME 的自由市场的一个现实。某些 JSR 描述的 API 仅由少数设备制造商实现，这通常是因为这些设备制造商的客户（无论是网络运营商还是最终消费者）不理解\
  \ JSR 中 API 集合的重要性。其他 JSR 包含绝妙的想法，但实现成本过高。还有一些很快被取代或扩展，因此 JSR 只是一个化石，展示了 API 演进过程中某一时刻的快照。出于这些原因，你应该将\
  \ JSR 视为回答“Java ME 设备能做*X*吗？”这个问题的第一步。JSR 中的信息让你能够回答：“理论上，可以，”或者“没有标准方式”（因为可能在某些设备上存在执行*X*的专有方式）。为了完整回答这个问题——其真正含义可能是“有多少\
  \ Java ME 设备能做*X*？”以及“我们是否有可行的商业案例来构建需要*X*的应用程序？”——你还需要查看你产品所涵盖的时间范围内市场上的设备。这在许多情况下更加困难；你需要考虑你的产品将如何分发，是否仅涉及单一网络运营商的客户，等等。获得这些答案需要付出努力。预计要花时间**539**\n\
