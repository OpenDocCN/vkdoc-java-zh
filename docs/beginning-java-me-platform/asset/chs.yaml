  \n第 4 章 ■ 介绍 MIDlet\n\n**85**\n\n所有 MIDlet 都必须实现四个方法：\n\n• HelloMidlet（MIDlet 构造函数）：当系统需要构造\
  \ MIDlet 实例时，会调用此方法。构造函数通常不执行任何操作，将初始化工作推迟到 startApp 方法中。\n\n• startApp：当应用程序启动或恢复时，应用程序管理软件（AMS）会调用此方法。startApp\
  \ 应执行必要的引导操作来初始化应用程序，并显示应用程序的第一个屏幕。简单的应用程序可以选择在此方法内完成所有操作；更复杂的应用程序可能会链接到单独的方法。\n\
  \n• pauseApp：当系统因任何原因（如来电、消息或启动另一个应用程序）必须中断 MIDlet 时，AMS 会调用此方法。此时，MIDlet 应释放所有不需要的资源。\n\
  \n• destroyApp：当应用程序必须退出时（无论是用户操作还是系统输入导致），AMS 会调用此方法。\n\n■**提示** 从技术上讲，MIDlet 不需要构造函数；如果你不提供，Java\
  \ 会为你创建一个。不过，声明一个构造函数是良好的实践。\n\n创建时，此 MIDlet 会将一个新的文本框（实现了 Displayable 接口）设置为当前显示，并将控制权返回给\
  \ MIDlet GUI 框架。\n\n由于它非常简单，该 MIDlet 在应用程序暂停时不执行任何操作，并在应用程序退出时依赖原生垃圾回收机制。\n\n**理解\
  \ MIDlet 生命周期**\n\n我在第 3 章中介绍了 MIDlet 生命周期，因此图 4-2 应该看起来很熟悉。\n\n在任何时候，MIDlet 可能处于以下三种状态之一：\n\
  \n• *暂停*：暂停的应用程序不会接收系统事件，并等待激活或销毁。\n\n• *活动*：活动的应用程序会接收系统事件，并能与用户交互。\n\n• *已销毁*：已销毁的应用程序已完成执行，等待虚拟机垃圾回收器进行回收。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**86**\n\n第 4 章 ■ 介绍 MIDlet\n\
  \n**图 4-2.** *MIDlet 应用程序生命周期* 当 AMS 创建 MIDlet 时，MIDlet 从暂停状态开始其生命周期。只有当 AMS 调用\
  \ MIDlet 的 startApp 方法时，MIDlet 才会进入活动状态；此时，你可以与之交互。然而，此方法不仅仅是 MIDlet 的入口点；每当 MIDlet\
  \ 即将进入活动状态时，AMS 都会调用 startApp。\n\n在任何时候，AMS 都可以中断 MIDlet，强制其再次进入暂停状态。最常见的例子是在无线终端上收到来电时；当然，也可能因其他事件而发生，例如收到消息、系统任务资源不足等。无论原因如何，AMS\
  \ 都会调用你的 MIDlet 的 pauseApp 方法。pauseApp 方法应释放所有共享资源，并使 MIDlet 处于静止状态，因为 AMS 或设备操作系统将把另一个应用程序带到前台。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 4 章 ■ 介绍 MIDlet\n\n**87**\n\
  \n在任何时候，AMS 都可能通过调用 destroyApp 方法向你的 MIDlet 发出终止信号。当 AMS 调用 destroyApp 时，AMS 会传递一个标志，指示\
  \ MIDlet 可以选择退出或不退出。当此标志为 false 时，你的应用程序可以通过抛出 MIDletStateChangeException 来通知 AMS\
  \ 不要退出。由平台提供商决定在何种条件下 MIDlet 退出是无条件的，因此你的 MIDlet 设计不应依赖于能够控制其终止时机。\n\n\n\n当然，你也可以通过编程方式触发这些状态变化。如果你的\
  \ MIDlet 想要将控制权交还给 AMS 并进入暂停状态，只需调用 `notifyPaused`。相应地，AMS 会将你的 MIDlet 置于暂停状态，但这样做时*不会*调用你的\
  \ `pauseApp` 方法，因为它会假定你在调用 `notifyPaused` 之前已经准备好暂停执行。如果你需要从暂停状态返回活动状态，请调用 `resumeRequest`；AMS\
  \ 将处理你的恢复请求，并在准备好将你的 MIDlet 返回到活动状态时调用你的 `startApp` 方法。类似地，你可以调用 `notifyDestroyed`\
  \ 来退出你的 MIDlet；与 `notifyPaused` 一样，这不会通过 `destroyApp` 方法通知你的 MIDlet，而是立即终止你的 MIDlet。\n\
  \n■**注意** 不要在你的 MIDlet 中调用 `System.exit`！退出 MIDlet 的*唯一*方法是调用 `notifyDestroyed`，这向\
  \ AMS 发出你希望退出的信号。从 MIDlet 中调用 `System.exit` 会生成一个 `SecurityException`。\n\n**打包 MIDlet**\n\
  \n正如你在第 3 章中学到的，设备通过两个文件获取 MIDlet：JAD 和 JAR。JAD 文件包含 MIDlet 执行需求的摘要，设备可以下载此文件以确定\
  \ MIDlet 是否适合在设备的 Java ME 环境中执行。然而，实际上只需要 JAR 文件。\n\n在 JAR 文件中有一个*清单文件*，名为 `manifest.mf`。该清单文件位于\
  \ JAR 文件的根目录，并包含对 JAR 文件内容的详细描述。它由名称-值对组成，称为*MIDlet 属性*，这些属性由冒号分隔，并由换行符界定。表 4-1\
  \ 显示了 Java ME 规范定义的属性。除了表 4-1 中显示的属性外，你还可以在清单文件中向 MIDlet 传递其他属性；这些属性可以通过调用 MIDlet\
  \ 方法 `getAppProperty` 并传递属性名称来获取。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**88**\n\n第 4 章 ■ 介绍 MIDlet\n\n**表 4-1.** *MIDlet 属性*\n\n**属性**\n\n**必需？**\n\n\
  **用途**\n\nMicroEdition-Configuration\n\n是\n\nMIDlet 所需的 Java ME 配置的名称和版本\n\nMicroEdition-Profile\n\
  \n是\n\nMIDlet 所需的 MIDP 的名称和版本\n\nMIDlet-Data-Size\n\n否\n\nMIDlet 套件使用的持久存储的最小字节数\n\
  \nMIDlet-Delete-Confirm\n\n否\n\n当 AMS 确认删除 MIDlet 套件时显示的消息\n\nMIDlet-Delete-Notify\n\
