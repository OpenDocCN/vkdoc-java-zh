  \ `Vector` 中，每次 `Vector` 发生变化时，便将改动刷新到磁盘。构造函数创建此 `Vector`，然后枚举已挂载的文件系统，选择第一个（很可能代表内部存储），并构建一个符合\
  \ GCF 规范的文件名，该文件名由 `file:///` 协议、内部文件系统根目录名称以及存储名称组成。最后，它调用 `load` 从文件中读取记录。`open`\
  \ 和 `close` 方法分别用于打开和关闭 `FileConnection`。\n\n`load` 方法首先移除 `Vector` 中的所有现有元素，然后打开\
  \ `FileConnection`，接着打开一个指向文件本身的 `DataInputStream`。在 `DataInputStream` 打开后，它读取文件的版本号（在当前实现中始终为\
  \ 1），然后循环遍历文件，先读取一条记录的长度，再将记录作为字节集合读取，并将每个集合转换为 `Location` 实例。\n\n`save` 方法则反向操作，创建一个\
  \ `DataOutputStream`，写入版本号 1，然后遍历每个 `Location`，先写入长度，再写入每个 `Location` 的二进制表示。这种方法只需修改\
  \ `LocationStore` 类，无需修改 `Location` 类，也无需对接口进行任何更改。\n\n■**提示** 如有疑问，请使用 `RecordStore`\
