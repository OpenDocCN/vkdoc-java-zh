  \n`TiledLayer` 中的图块可以动画化；也就是说，它们可以依次循环显示不同的图块——例如，当需要模拟流动的水的效果时。\n\n\n\n为此，你只需使用\
  \ `createAnimatedTile` 方法，并传入动画图块帧的索引，将每个动画图块标记为动画状态。`createAnimatedTile` 方法会返回一个*负数*，你在使用\
  \ `setCell` 设置单元格值时需要使用该负数。相应地，你可以通过调用 `setAnimatedTile` 方法，并传入要更改的原始图块的索引以及它们应被更改到的目标索引，从而将给定索引的所有动画图块更改为不同的动画图块。\n\
  \n**生成动画**\n\n虽然 `TiledLayer` 类适用于创建大型可见区域（或许在可见区域内带有基础动画），但 `Sprite` 类最适合用于由一个或多个位图组成的小型对象。你可以通过循环播放不同的动画帧来为\
  \ `Sprite` 对象设置动画。与 `TiledLayer` 类似，这些帧以单个 `Image` 对象的形式提供给 `Sprite`，该对象包含多个帧，每个帧具有固定的宽度和高度。图\
  \ 8-3(a) 展示了一个动画蝴蝶的三个帧，而图 8-3(b) 展示了一种将这些帧组合成三帧动画源 `Image` 的方法。\n\n**图 8-3.** *如图\
  \ (a) 所示，三个帧构成了动画；在 (b) 中，这些帧被组合成一个* Image *实例，以传递给* Sprite *类。*\n\n■**提示** 源 `Image`\
  \ 中的透明度以常规方式表示，例如使用 PNG 文件的 alpha 通道。\n\n每个帧都被分配了一个唯一的索引；与 `TileLayer` 的图块不同，`Sprite`\
  \ 类从 0 开始对帧进行计数。后续索引按从左到右、从上到下的顺序分配。例如，要创建一个与图 8-3(a) 中帧组成的动画相对应的 `Sprite` 实例，你可以编写如清单\
  \ 8-7 所示的代码。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**206**\n\n\
  第 8 章 ■ 使用 Java 移动游戏 API\n\n**清单 8-7.** *创建 Sprite 实例*\n\nprivate final int tileWidth\
  \ = 16, tileHeight = 16;\n\nImage image = Image.createImage(imageName);\n\nSprite\
  \ butterfly = new Sprite(image, tileWidth, tileHeight); 每个 `Sprite` 都有一个帧序列，该序列定义了要显示的帧的有序列表。默认情况下，这仅仅是可用帧列表的顺序。你可以使用\
  \ `setFrameSequence` 方法显式设置此序列，该方法接受一个帧索引数组，如清单 8-8 所示。\n\n**清单 8-8.** *设置帧序列*\n\
  \nprivate static final int[] flightSequence = {\n\n0, 1, 2, 2, 1, 0};\n\nbutterfly.setFrameSequence(flightSequence);\n\
  \n在任何时候，你都可以使用 `setFrame`、`prevFrame` 或 `nextFrame` 方法中的任意一个来更改 `Sprite` 将要绘制的帧。\n\
  \n■**提示** 请记住，`setFrame`、`prevFrame` 和 `nextFrame` 处理的是*帧序列*中的索引，而不是帧图像的索引！\n\n\
  每个 `Sprite` 实例都有一个*参考像素*，用于指示 `Sprite` 绘制其帧的位置。默认情况下，这仅仅是帧的左上角，但你可以使用 `defineReferencePixel`\
  \ 方法更改此位置，并传入新参考像素的 *x* 和 *y* 坐标。当你考虑到 `Sprite` 类可以对构成 `Sprite` 的帧应用各种视觉变换时，参考像素尤其方便。这些变换包括以\
  \ 90° 为倍数的旋转，以及围绕每次旋转的垂直轴进行镜像。当 `Sprite` 类应用变换时，`Sprite` 会自动重新定位，以使参考像素看起来保持静止；例如，旋转是围绕参考像素进行的。你可以使用\
  \ `setTransform` 方法对 `Sprite` 应用变换，并传入表 8-2 中所示的常量之一。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 8 章 ■ 使用 Java 移动游戏 API **207**\n\n**表 8-2.** *可应用于 Sprite 帧的各种变换* **常量**\n\n\
  **动作**\n\nSprite.TRANS_NONE\n\n无变换\n\nSprite.TRANS_ROT180\n\n绕参考像素旋转 180°\n\nSprite.TRANS_MIRROR\n\
  \n\n\n关于参考像素的水平镜像\n\nSprite.TRANS_MIRROR_ROT180\n\n绕参考像素旋转 180°，然后关于参考像素进行水平镜像\n\
  \nSprite.TRANS_ROT90\n\n绕参考像素顺时针旋转 90°\n\nSprite.TRANS_MIRROR_ROT90\n\n关于参考像素进行水平镜像，然后顺时针旋转\
  \ 90°\n\nSprite.TRANS_MIRROR_ROT270\n\n关于参考像素进行水平镜像，然后逆时针旋转 90°\n\nSprite.ROT270\n\
  \n绕参考像素逆时针旋转 90°\n\n最后，Sprite 类通过 `collidesWith` 方法提供碰撞检测功能，用于检查两个 Sprite 实例（或一个\
  \ Sprite 与一个 Image）是否发生碰撞。Sprite 类可以使用帧图像的矩形区域或帧中的不透明像素（速度稍慢）来执行此碰撞测试；只需传入 `true`\
  \ 即可启用逐像素碰撞检测。使用 `collidesWith` 方法可以简化你的游戏开发，因为你无需自行实现碰撞检测逻辑。\n\n**运用移动游戏 API**\n\
