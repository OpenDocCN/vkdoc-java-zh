  \nint max = Math.max(fm.stringWidth(label) + LABEL_PAD,\n\nfm.getHeight() + LABEL_PAD);\n\
  \nreturn new Dimension(max, max);\n\n} else {\n\nreturn new Dimension(PREFERRED_SIZE,\
