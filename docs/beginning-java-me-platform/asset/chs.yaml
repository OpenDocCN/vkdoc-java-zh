  \n**444**\n\n第 15 章 ■ 保护 Java ME 应用程序\n\n`VisualTagConnection` 接口提供了两个方法：`readVisualTag`\
  \ 和 `generateVisualTag`。`readVisualTag` 方法（你可以在清单 15-12 的 `decode` 方法中看到）很直接，它接受源图像、源图像的类以及编码符号体系；成功扫描后生成的字节以字节数组形式返回。此方法可能抛出\
  \ `IOException` 或 `VisualTagCodingException`，后者表示编码操作失败。\n\n`generateVisualTag`\
  \ 方法（你可以在清单 15-12 的 `encode` 方法中看到）是 `readVisualTag` 的编码对应方法，它接受要编码的数据、数据应编码到的类（推测是\
  \ `Image` 或其子类），以及一组描述编码操作中符号体系特定属性的属性。你应该始终通过调用 `SymbologyManager` 的 `getImageProperties`\
  \ 方法来获取特定符号体系的这些图像属性；生成的属性定义了诸如生成的条形码尺寸以及像素间距等内容。\n\n**总结**\n\nJava ME 平台为应用程序开发者提供了一定数量的安全相关接口，例如包含用于安全网络交易的\
  \ HTTPS。然而，构建一个安全的应用程序不仅仅是加密网络流量；一个安全的应用程序可能需要防御各种威胁，包括未经授权的使用或对其私有数据的访问。\n\n幸运的是，针对安全挑战的解决方案是存在的，它们提供了用于数据隐藏的密码、用于防御数据篡改和证明消息来源的摘要和签名，以及用于提供身份的证书。Java\
  \ 社区通过多种方式实现了这些安全工具来响应需求，包括 JSR 177 定义的 SATSA；开源 Bouncy Castle API，它提供了一套全面的安全和加密接口；以及用于构建安全商业应用的更高级构建模块，例如\
  \ JSR 257 定义的非接触式通信 API。\n\n某些设备上可用的 SATSA 可选接口为安全问题提供了各种硬件和软件解决方案，包括访问加密智能卡的 API、用于安全管理公钥的基础设施，以及用于加密和解密数据的\
  \ JCA 的有限子集。使用 SATSA 可选接口，你的应用程序可以通过 GCF 在单个字节级别访问各种智能卡，如果设备支持 Java 智能卡，则可以通过 Java\
  \ RMI 访问。你的应用程序还可以使用此 API 使用对称密码执行加密和解密。\n\n开源 Bouncy Castle API 提供了一套全面的密码学解决方案来应对安全问题，它支持多种不同类型的密码和消息摘要。它还提供了其他数据表示形式的实现，包括\
  \ ASN.1 和 S/MIME，以及支持 OpenPGP 编码和解码。其接口类似于 SATSA 为常见操作（如加密、解密和创建消息摘要）定义的接口，并且其纯\
  \ Java 的洁净室实现使其成为任何需要使用其功能，同时保持对可能支持或不支持 SATSA 的硬件的可移植性的应用程序的理想选择。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 15 章 ■ 保护 Java ME 应用程序\n\n**445**\n\n如今的移动应用程序以多种方式利用安全解决方案，但电子商务在推动安全技术进入移动设备方面正扮演着越来越重要的角色。为了支持安全的商业应用，可选的非接触式通信\
  \ API 提供了与多种无线数据设备（如近场无线设备和条形码）通信的手段。该 API 既支持在低级层面（交换单个字节）操作接近卡，也支持 NDEF，并且还允许你解码或生成条形码图像。\n\
  \n安全是一个大话题，本章只是浅尝辄止。这不像用香料烹饪；虽然你可以往菜里扔一把辣椒让它变辣，但你不能往应用程序里扔一把安全 API 就让它变得安全。（实际上，它们比你想象的更相似：最终做出来的菜可能和你应用程序的不安全性一样难以下咽！）设计一个安全的应用程序需要细心和深思熟虑，如果你正朝着这个目标努力，请务必查阅本章中提到的一个或多个优秀的互联网和书籍参考资料以获取更多细节。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 16 章\n\n渲染多媒体内容\n\n**当**今的消费者越来越渴望他们在个人电脑或其他设备（包括移动无线终端和便携式媒体播放器）上所习惯的丰富多媒体体验。与此同时，为了满足这种需求并使产品在竞争中脱颖而出，制造商们越来越多地投入资金为其产品开发丰富的多媒体界面。虽然专家们可能会争论说，这些投资中有很多是多余的——例如，如今手机用户界面中的许多花哨和魅力对于打电话来说并非真正必要——但其中很多并非如此。多媒体应用，从普通的音频和视频播放到复杂的数据可视化应用，既可以区分产品，也可以增加价值。通过诸如定义\
  \ MMAPI 的 JSR 135 和定义对可缩放二维矢量图形支持的 JSR 287 等标准化工作，Java ME 提供了丰富的接口，使你能够构建富多媒体应用程序。\n\
  \n在本章中，我将展示这些 JSR 定义的接口。我首先讨论 MMAPI，因为它对音频和视频的支持使其成为当今许多应用程序的重要组成部分。我将解释 MMAPI 是如何组织的，以及它如何利用\
  \ Java 运行时和来自主机硬件的原生支持来渲染来自设备本地存储和网络的内容。接下来，我将注意力转向 Java ME 对 SVG 的支持——这是 W3C 正在开发的一个令人兴奋的标准，并得到了浏览器以及移动设备的广泛支持。我将向你展示如何使用可选的可缩放二维矢量图形\
  \ API（我将其简称为 SVGAPI）提供的类来渲染 SVG 图像和动画，以及如何构建利用 SVG 内容作为其用户界面一部分的 Java ME 应用程序。在介绍了所有可用的多媒体支持类的基础知识之后，我将展示一个示例\
  \ MIDlet，它可以播放音频、视频和 SVG 内容，并让你与设备的摄像头交互以捕获图像。\n\n**447**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**448**\n\n第 16 章 ■ 渲染多媒体内容\n\n**介绍 MMAPI**\n\n从移动 Java 历史的相对早期开始，硬件供应商和 Sun 就共同探索\
  \ Java 应如何支持多媒体内容的渲染。\n\n\n\n然而，当 Java 社区的参与者们正在敲定 MMAPI 的细节时，当时的硬件设备几乎只能勉强处理数字音频，更不用说视频了。很快，所有人都认识到多媒体支持将对许多\
  \ Java ME 应用发挥重要作用。\n\nMMAPI 提供了一个模块化的 API，使你既能够通过指定频率和音调数据来创建自己的简单音频媒体，也能够使用多种编解码器来渲染多媒体音频和视频。由于\
  \ MMAPI 是可扩展的，硬件制造商可以添加新的编解码器和传输协议，这样当新的数据格式出现时，你就可以使用相同的接口来渲染它们。\n\n■**注意** 由于篇幅限制，我无法详尽地介绍\
  \ MMAPI 的所有功能。\n\n如果你在阅读本章后想进一步了解 MMAPI，我建议你阅读 Vikram Goyal 所著的 *Pro Java ME MMAPI:\
  \ Mobile Media API for Java Micro Edition*（Apress, 2006），该书更详细地介绍了如何在 Java ME 应用中使用\
  \ MMAPI。\n\n**理解基本多媒体概念**\n\n要成功使用 MMAPI，你必须理解其划分媒体渲染职责的三个关键概念。第一个概念涉及创作者和分发者如何打包和交付多媒体内容。内容创作者（无论是大公司还是个人在\
  \ YouTube 等社交网站发布内容）在交换多媒体内容时使用特定的*媒体类型*。如今的媒体类型通常是复杂的文件格式，充当高度压缩的视听数据流的*容器*。例如，流行的运动图像专家组版本\
  \ 4（MPEG-4）标准不仅定义了一种，而是一整套音频和视频编码格式；一个 MPEG-4 文件可能包含一个与 H.263 视频流同步的高级音频编码（AAC）音频流，也可能包含一个与\
  \ MPEG-4 视频流同步的 PureVoice 音频流，或者完全是其他组合。因此，当设备供应商指定其硬件可以渲染的多媒体类型时，他们通常会同时根据容器格式*和*编解码器来提供信息。通常，当今大多数移动设备依赖于数字信号处理器（DSP）、专用集成电路等硬件与软件的复杂组合，来实现渲染多媒体所需的编解码器。特定的\
  \ MMAPI 栈实现会与这些硬件和软件互联，为渲染各种多媒体格式提供高效的机制。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 16 章 ■ 渲染多媒体内容\n\n**449**\n\n■**警告** 容器文件格式与数据文件格式之间的界限常常很模糊，尤其是当许多编码格式本身也是容器时。在与内容提供商合作时，仅仅说“请给我一个\
  \ MPEG-4 文件”是不够的，就像你索要一个 PNG 图像那样。更糟糕的是，不同设备支持的编码方案往往不同，因此你可能会发现，一个能在某台设备上播放的 MPEG-4\
  \ 文件，在另一台设备上却无法播放，因为文件*内部*的数据流在第一台设备上使用了兼容的编解码器（例如，在支持 AAC 的设备上使用了 AAC），而在第二台设备上则不兼容。稍后，我将向你展示如何查询设备的\
  \ MMAPI 实现，以确定哪些编解码器可用。\n\n其次，内容提供商可以通过文件交付多媒体内容——这是一种一次性完成的过程，设备将整个文件（例如一首歌或一个视频）存储在设备的文件系统中——或者使用诸如实时流协议（RTSP）等协议来流式传输数据。大多数多媒体系统的接口将数据源视为一个独立的实体，恰当地称之为*数据源*。数据源隐藏了设备如何获取编码数据的所有细节；它可能从文件中获取数据，也可能通过网络使用多种开放或专有技术中的任何一种来获取数据。\n\
  \n第三，对于普通应用程序开发者来说，编解码器这一底层概念通常处于错误的抽象层次。在应用层工作时，最容易想到的是*播放器*：一个引擎，给定一个数据源以及关于该数据源数据如何编码的一些信息，它就能将数据渲染为音频或视频流。播放器通常要么直接提供管理渲染的接口，要么（像\
  \ MMAPI 提供的某些平台那样）提供一个接口来获取一个或多个*控制器*，这些控制器可以控制特定播放器对来自数据源的数据进行渲染。\n\n■**注意**\n\n\
  有经验的读者无疑会看到 MVC 模式与许多多媒体 API 的源-播放器-控制器组织方式之间的相似之处。这并非巧合；MVC 提供的职责划分非常适合渲染多媒体流所需的工作，至少从我们作为应用程序开发者的角度来看是这样。\n\
  \n最后，虽然你可能最感兴趣的是从数据源（如 Web 服务或文件）渲染多媒体，但重要的是要认识到，当今的设备可能提供自己的数据源。例如，拍照手机有一个成像传感器；许多\
  \ MMAPI 实现允许你将这个成像传感器视为一个数据源，你可以从中渲染视频甚至捕获图像。在考虑多媒体应用时，务必记住，源-播放器-控制器的职责划分是一种通用的划分方式，几乎可以应用于任何代表多媒体数据流的事物。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**450**\n\n第 16 章 ■ 渲染多媒体内容\n\
  \n**理解 MMAPI 的组织结构**\n\n图 16-1 展示了 MMAPI 提供的关键类。在该图中，`DataSource` 类扮演数据源的角色，`Player`\
  \ 接口扮演播放器的角色，而 `Control` 接口的各种实现则扮演控制器角色，共同完成在 Java ME 设备上渲染多媒体所需的职责分工。所有这些类都包含在三个包中：`javax.microedition.media`、`javax.microedition.media.control`\
  \ 和 `javax.microedition.media.protocol`。\n\n**图 16-1.** *MMAPI 提供的关键类*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 16 章 ■ 渲染多媒体内容\n\n**451**\n\nMMAPI 提供了以下类及接口（以及其他）：\n\n*   **Manager**：`Manager`\
  \ 类提供了一个访问点，用于获取依赖于系统的资源，例如 `Player` 接口的实现。`Manager` 的方法是静态的，因此无需获取该类的实例。\n*   **Player**：`Player`\
  \ 接口提供了与多媒体片段交互的方法。实现 `Player` 的子类封装了特定的渲染编解码器，例如一个 MP3 音频播放器。\n*   **Control**：`Control`\
  \ 接口定义了一些媒体处理功能。`Control` 的实现与实现 `Controllable` 接口的对象（例如 `Player` 实例）交互，以允许通过编程方式和用户控制媒体。例如，`VolumeControl`\
  \ 允许你调整播放音量，而 `VideoControl` 允许你控制视频在显示屏上的可见性和位置。\n\n\n\n• **DataSource**：`DataSource`抽象类的实现为`Player`实例提供媒体数据。它们提供一个容器，用于指示媒体对象的内容类型和位置，并通过`SourceStream`实例提供源数据流，这些流允许对单个媒体流进行随机访问。\n\
  \n• **ContentDescriptor**：`ContentDescriptor`类的实例包含一个字符串，用于指示特定`DataSource`的类型。\n\
  \n• **TimeBase**：`TimeBase`接口代表一个持续计时的时钟源。您的应用程序可以在多个播放器之间共享一个`TimeBase`实例，以同步多个媒体流。\n\
  \n• **PlayerListener**：`PlayerListener`接口描述了`Player`实例可以向应用程序提供的异步事件。您可以实现此接口来监听有关媒体渲染的通知。\n\
  \n• **MediaException**：MMAPI 实现使用`MediaException`类的实例来指示错误。\n\n■**注意** `Control`接口包含许多子接口，此处不逐一讨论。如需详细了解每个子接口的功能，请参阅\
  \ JSR 135 或 MMAPI 实现附带的 Javadoc。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**452**\n\n第 16 章 ■ 渲染多媒体内容\n\n使用 MMAPI 渲染多媒体非常简单，您需要遵循以下四个步骤：**1.** 使用`Manager`类创建`Player`实例，并引用特定媒体文件的路径。\n\
  \n**2.** 允许`Player`实例获取渲染媒体所需的任何必要硬件资源。\n\n**3.** 获取任何必要的`Control`实例来控制或配置`Player`实例。\n\
  \n**4.** 播放媒体。\n\n由于 MMAPI 实现通常会封装设备上其他进程可能需要的专用硬件资源（例如 RAM、专用 DSP 或专用协处理器），因此仅实例化`Player`实例是不够的。相反，`Player`实例可以处于五种状态之一，这使您能够以编程方式控制获取必要系统资源这一可能耗时的过程（并允许您更好地与设备上的其他应用程序共享这些稀缺资源）。图\
  \ 16-2 展示了这些状态如何交互。\n\n**图 16-2.** *Player 实例的状态*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 16 章 ■ 渲染多媒体内容\n\n**453**\n\n这些状态包括：\n\n• ***未实现***：未实现的`Player`实例不具备其运行所需获取的资源信息。如果在此状态下调用`Player`的许多方法（包括`getContentType`、`setTimeBase`、`getTimeBase`、`setMediaTime`、`getControls`和`getControl`），这些方法将失败，并且`Player`会抛出`IllegalStateException`。\n\
  \n• ***已实现***：当您调用未实现播放器的`realize`方法时，它会转换到已实现状态。此转换可能是一个漫长的过程，因为`Player`实例需要获取系统资源，并与媒体内容协作以确定其内容类型或执行其他操作。您可以通过调用实例的`deallocate`方法来停止实现过程，但必须在`Player`实例完成向已实现状态转换*之前*执行此操作；一旦实现，`Player`实例无法返回到未实现状态。\n\
  \n• ***预取***：已实现的播放器可能仍需要进行额外的耗时处理，例如从网络填充媒体缓冲区或获取独占资源（如硬件编解码器）。为此，您需要调用`Player`实例的`prefetch`方法。\n\
  \n• ***已启动***：一旦`Player`实例已实现，并且其内容和资源已预取，您可以通过调用`Player`实例的`start`方法开始播放¹。这会使`Player`实例转换到已启动状态。\n\
  \n在已启动状态下，实例运行并渲染多媒体数据，直到您通过调用`stop`停止它，或者直到数据渲染完毕。对已启动的`Player`实例调用`stop`会使其返回到预取状态。\n\
  \n\n\n•   *关闭*：从任何其他状态，你可以通过调用 Player 实例的 `close` 方法强制其释放资源并进入关闭状态。一旦进入此状态，你绝不能再次尝试使用该实例；它已准备好被垃圾回收器回收，你唯一要做的就是将所有指向它的引用设置为\
  \ null。\n\n俗话说，细节决定成败，所以让我们来看一些实际渲染多媒体并控制其播放的代码。\n\n1.  奇怪的是，你通常可以通过调用 `start` 方法，直接将一个已实现（realized）的\
  \ Player 实例带到启动状态。你在网上看到的许多教程示例——包括 Sun 公司的示例——都这样做，但这与 MMAPI JSR 提供的文档相悖，因此我不推荐这样做。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**454**\n\n第 16 章 ■ 渲染多媒体内容\n\
  \n**启动渲染过程**\n\n作为 Player 实例的工厂，Manager 类拥有一组简洁的接口。\n\n你可以播放单音（我将在本章后面的“播放单音”部分进一步讨论），为特定的媒体获取\
  \ Player 实例，列出支持的内容类型和协议，以及获取用于渲染所有媒体的系统时间基准。当然，你最常使用的方法是 `createPlayer` 方法来获取 Player\
  \ 实例。\n\nManager 实际上有三种不同的 `createPlayer` 方法。最简单易用的是接受一个 `InputStream` 和一个表示媒体 MIME\
  \ 类型的 `String` 的方法，但这会限制你只能播放那些能获取到 `InputStream` 的多媒体，例如 JAR 文件中的静态资源。例如，你可以编写清单\
  \ 16-1 中的代码，使用本地资源来创建、实现、预取并启动一个 MP3 音频播放器：\n\n**清单 16-1.** *播放 MP3 音频文件的伪代码*\n\
  ```java\nPlayer player;\ntry {\n    InputStream in = getClass().getResourceAsStream(\"\
  /res/sound.mp3\");\n    player = Manager.createPlayer(in, \"audio/mp3\");\n    player.realize();\n\
  \    player.prefetch();\n    player.start();\n} catch (MediaException e) {}\ncatch\
  \ (IOException e) {}\n```\n\n当然，你可以使用任何其他方式为你的媒体源打开一个 `InputStream`；例如，你可能想使用我在第\
  \ 7 章中描述的 FCOP 来播放文件系统上用户加载的媒体文件。\n\n然而，很多时候，你可能希望为媒体指定一个不同的来源，例如网络源或设备的其他组件（如成像传感器）。Manager\
  \ 类也支持*定位器*的概念，这很像你传递给 GCF 的 URL。定位器是一个传递给 `Manager.createPlayer` 的 `String`。该字符串必须包含以下部分：\n\
  \n```\nscheme://scheme-part\n```\n\n具体来说，`scheme` 是协议的名称，例如 `http` 代表 HTTP，`rtp`\
  \ 代表实时传输协议 (RTP)，或 `rtsp` 代表 RTSP。`scheme-part` 是以特定于协议的方式表示的媒体位置，例如 Web 上资源的主机和路径。\n\
  \n表 16-1 展示了一些常用的协议及其用途。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  第 16 章 ■ 渲染多媒体内容\n\n**455**\n\n■**注意** 并非所有设备都支持所有协议。例如，RTSP 支持是 MMAPI 中相对较晚才加入的；在我撰写本文时，只有少数设备支持它。\n\
  \n**表 16-1.** *一些常用的 MMAPI 协议*\n| **协议名称** | **用途** | **备注** |\n| --- | --- | ---\
  \ |\n| `capture` | 从设备传感器捕获实时媒体 | `scheme-part` 指示捕获设备。 |\n| `http` | 通过 HTTP 获取\
  \ | 通常在*渲染之前*下载整个文件。 |\n| `rtp` | 通过 RTP 流式传输 | `scheme-part` 指示服务器地址、端口和内容类型。 |\n\
  | `rtsp` | 通过 RTSP 流式传输 | `scheme-part` 指示服务器地址、端口和要流式传输的资源。 |\n\n清单 16-2 展示了一些语法上有效的定位器示例。然而，仅仅因为一个定位器在语法上是正确的，并*不*意味着设备拥有必要的协议和编解码器支持来播放该定位器所指定的媒体。\n\
  \n\n\n**清单 16-2.** *一些有效的定位器*\n\nhttp://www.noplace.com/loon-hoot.mp3\n\nhttp://www.noplace.com/loon-display.3gp\n\
  \ncapture://video\n\ncapture://audio\n\ncapture://radio\n\nrtp://www.noplace.com:1224/audio\n\
  \n在底层，当你将一个定位器传递给 `Manager.createPlayer` 时，它会在解析定位器后设置所需的任何协议引擎。然后它会创建一个 `DataSource`，用于将媒体数据从源传递到播放器。如果你希望为特定设备上\
  \ MMAPI 实现不支持的协议提供支持，你可以编写一个实现该协议的 `DataSource` 子类，并将其与 `Manager.createPlayer` 一起使用，如清单\
  \ 16-3 中的伪代码所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**456**\n\
  \n第 16 章 ■ 渲染多媒体内容\n\n**清单 16-3.** *将自定义 DataSource 与 MMAPI Manager 结合使用* Player\
  \ player;\n\ntry {\n\nDataSource ds = (DataSource)new CleverStreamingDataSource(\n\
  \n\"proto://noplace.com/audio.mp3\" );\n\nplayer = Manager.createPlayer(ds);\n\n\
  player.realize();\n\nplayer.prefetch();\n\nplayer.start();\n\n} catch (MediaException\
  \ e) {}\n\ncatch (IOException e) {}\n\n将 `CleverStreamingDataSource` 实现为 `DataSource`\
  \ 的子类，允许 `Manager` 创建一个连接到你的数据源以获取数据的播放器。\n\n■**提示** 编写自定义 `DataSource` 并非易事，且超出了本书的范围。有关更多详细信息，我建议你从\
  \ Vikram Goyal 关于 Java ME 内容流媒体的文章《Java ME 中的流媒体内容实验》开始，该文章位于 http://today.java.net/pub/a/today/2006/08/22/experiments-instreaming-java-me.html。特别要查看“创建自定义\
  \ DataSource”部分。\n\n无论你如何创建和启动 `Player` 实例，你都应该在与主应用程序线程不同的线程中执行此操作，因为这是一个耗时的过程。\n\
  \n我将在本章后面的“将 MMAPI 和 SVGAPI 付诸实践”部分向你展示如何在实际中做到这一点。\n\n完成媒体渲染后，在某个时刻你将需要停止播放并回收\
  \ `Player` 实例已消耗的资源。清单 16-4 展示了通常的过程。\n\n**清单 16-4.** *停止媒体播放并回收资源* if (player !=\
  \ null) {\n\nplayer.stop();\n\nplayer.close();\n\nplayer = null;\n\n}\n\n有趣的是，`Player`\
  \ 的 `stop` 方法实际上并不会停止播放；它只是暂停播放。这意味着你可以通过调用 `Player` 实例的 `stop` 方法来实现用户发起的暂停，并通过再次调用其\
  \ `play` 方法从暂停处恢复播放。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 16\
  \ 章 ■ 渲染多媒体内容\n\n**457**\n\nMMAPI 非常模块化；为了实现在最广泛的平台上可用的目标，并非所有功能在所有实现中都可用。你可以通过调用\
  \ `Manager.getSupportedContentTypes` 获取支持的内容类型列表，或者通过将支持的内容类型传递给 `Manager.getSupportedProtocols`\
  \ 来获取每种内容类型支持的协议列表。清单 16-5 枚举了给定设备上支持的类型和协议，并将每种类型和协议写入调试控制台。\n\n**清单 16-5.** *枚举支持的媒体和协议类型*\
  \ private void showSupportedMedia() {\n\nString[] contentTypes = Manager.getSupportedContentTypes(null);\
  \ for (int i=0; i<contentTypes.length; i++) {\n\nString protocols[] = Manager.getSupportedProtocols(contentTypes[i]);\
  \ for (int j=0; j<protocols.length; j++) {\n\nString s = contentTypes[i] + \":\"\
  \ + protocols[j]; System.out.println(s);\n\n}\n\n}\n\n}\n\n除了确定给定的 MMAPI 实现是否支持特定的内容类型或协议之外，你可能还需要其他信息，例如目标设备是否支持同时播放多个音频通道（音频混音）、平台是否可以捕获音频或视频等。MMAPI\
  \ 定义了一组系统属性，你可以使用 `System.getProperty` 获取这些属性的值；这些属性如表 16-2 所示。\n\n\n\n**表 16-2.**\
  \ *描述目标设备 MMAPI 实现的属性* **属性**\n\n**返回值**\n\nmicroedition.media.version\n\n所实现的 MMAPI\
  \ 规范版本\n\nsupports.mixing\n\n若设备支持混音则返回 true；否则返回 false\n\nsupports.audio.capture\n\
  \n若设备支持音频捕获则返回 true；否则返回 false supports.video.capture\n\n若设备支持视频捕获则返回 true；否则返回\
  \ false supports.recording\n\n若至少一种返回的 Player 类型支持录制则返回 true；否则返回 false\n\naudio.encodings\n\
  \n指定支持的捕获音频格式的字符串 video.encodings\n\n指定支持的捕获视频格式的字符串 video.snapshot.encodings\n\n\
  指定 VideoControl.getSnapshot 支持的视频快照格式的字符串\n\nstreamable.contents\n\n指定 Player 实例在接收数据时可播放的内容类型的字符串\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**458**\n\n第 16 章 ■ 渲染多媒体内容\n\
  \n**控制渲染过程**\n\n对于除最简单媒体播放器之外的所有播放器，您通常希望对媒体播放拥有更多控制权。虽然 Player 接口本身允许您启动和停止播放，但通过获取特定\
  \ Control 子类的实例，您可以做更多事情来改变 Player 的行为。要获取特定类型控件的实例，您可以将所需类的名称（如果不是 javax.microedition.media.control\
  \ 包中的类，则需包含包名）传递给 Player 的 getControl 方法，如下所示：\n\nVolumeControl vc = (VolumeControl)player.getControl(\"\
  VolumeControl\"); 每个 Control 子类都有不同的方法，反映了它对媒体渲染过程提供的控制类型。表 16-3 描述了一些在编写多媒体应用程序时非常有用的\
  \ Control 子接口。当然，并非每个子接口都适用于渲染所有媒体类型的 Player 实例；例如，能够为音频文件获取 VideoControl，或为视频文件获取\
  \ TempoControl，这几乎毫无意义。\n\n**表 16-3.** *可用于控制媒体渲染的 Control 实现者* **接口**\n\n**用途**\n\
  \n**示例方法**\n\nFramePositioningControl 跳转到特定视频帧\n\nseek\n\nskip\n\nmapFrameToTime\n\
  \nmapTimeToFrame\n\nGUIControl\n\n提供一个对象将媒体渲染到 GUI\n\ninitDisplayMode\n\nMetaDataControl\n\
  \n获取媒体文件中的元数据\n\ngetKeys\n\ngetKeyValue\n\nMIDIControl\n\n控制内部合成器\n\n各种方法\n\nPitchControl\n\
  \n在不改变播放速度的情况下改变合成或采样音频的音高\n\ngetMaxPitch\n\ngetMinPitch\n\ngetPitch\n\nsetPitch\n\
  \nRateControl\n\n改变播放速率\n\ngetMaxRate\n\ngetMinRate\n\ngetRate\n\nsetRate\n\nRecordControl\n\
  \n从播放器录制媒体\n\ncommit\n\nsetRecordLocation\n\nsetRecordStream\n\nstartRecord\n\n\
  stopRecord\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 16 章 ■ 渲染多媒体内容\n\
  \n**459**\n\n**接口**\n\n**用途**\n\n**示例方法**\n\nStopTimeControl\n\n设置预设停止时间\n\ngetStopTime\n\
  \nsetStopTime\n\nTempoControl\n\n改变合成音频的节奏\n\ngetTempo\n\nsetTempo\n\nToneControl\n\
  \n重放单声道音调序列\n\nsetSequence\n\nVideoControl\n\n控制视频显示\n\ngetSnapshot\n\nsetDisplayFullScreen\n\
  \nsetDisplayLocation\n\nsetDisplaySize\n\nsetVisible\n\nGUIControl 及其子接口 VideoControl\
  \ 值得特别关注，因为通过它们，您可以从文件或设备摄像头等多媒体源获取视频数据并将其显示在屏幕上。GUIControl 接口指定了一个单一方法——initDisplayMode——您可以使用它来获取一个能够在\
  \ Displayable 对象上绘制的对象。VideoControl 扩展了此接口，为您提供了全屏显示视频、指定视频播放位置等方法。清单 16-6 展示了如何结合使用\
  \ VideoControl 实例和 Player 实例来播放视频片段。\n\n**清单 16-6.** *使用 VideoControl 和 Player 实例播放视频*\
  \ Player player;\n\nForm viewer;\n\nVideoControl vc;\n\ntry {\n\nInputStream in\
  \ = getClass().getResourceAsStream(\"/res/video.3g2\"); player = Manager.createPlayer(in,\
  \ null);\n\n\n\nvc = (VideoControl) player.getControl(\"VideoControl\"); player.realize();\n\
  \nplayer.prefetch();\n\nif (vc != null) {\n\nItem vi = (Item) vc.initDisplayMode(\n\
  \nVideoControl.USE_GUI_PRIMITIVE, null);\n\nviewer.append(vi);\n\n}\n\nplayer.start();\n\
  \n} catch (MediaException e) {}\n\ncatch (IOException e) {}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**460**\n\n第 16 章 ■ 渲染多媒体内容\n\n就我个人而言，我觉得向 Control 请求一个对象来放置到显示屏上有点诡异，但这就是它的工作方式：VideoControl\
  \ 实例的 `initDisplayMode` 方法接受一个标志和一个 Object 作为参数，并返回一个用于显示的可见组件。你传入 `VideoControl.USE_GUI_PRIMITIVE`\
  \ 值，以指示该实例应返回设备 GUI 层次结构中的一个对象实例。此示例运行在基于 CLDC 的 MIDP 平台上，因此 `initDisplayMode` 返回的对象实际上是\
  \ Item 的一个子类。支持 AWT 的平台（例如某些 CDC 平台）则返回 Component 子类的对象实例。\n\n■**注意** 在 MIDP 设备上，如果你想全屏渲染视频，可以将\
  \ `VideoControl.USE_DIRECT_VIDEO` 值传递给 `initDisplayMode`，以指示它直接将视频绘制到 Canvas 对象上。将目标\
  \ Canvas 对象的引用作为第二个参数传入。使用 `Display.getDisplay.setCurrent` 将你传递给 `initDisplayMode`\
  \ 的 Canvas 设置为当前的 Displayable 项，将 Player 实例置于已启动状态，然后大功告成！\n\n正如我在上一节中指出的，Player\
  \ 对象最好在其自己的线程中使用。它们所做的大部分工作都是异步的，并且通常跨越设备上整个硬件和软件栈。你需要有一种方法来获取 Player 实例正在做什么的信息，这一点很重要。一个简单的方法是使用其\
  \ `getState` 方法，该方法返回 Player 实例当前所处的状态。这对于粗粒度的控制来说已经足够，尤其是当你从不同线程管理一个实例时，但为了真正了解发生了什么，你可以使用其\
  \ `addPlayerListener` 方法向 Player 实例添加一个监听器。传递给 `addPlayerListener` 的对象必须实现 `PlayerListener`\
  \ 接口，该接口指定了 `playerUpdate` 方法，Player 实例会调用该方法并传递有关媒体渲染的信息。MMAPI 定义的事件系统是可扩展的；`PlayerListener`\
  \ 接口定义了许多事件，如表 16-4 所示。`PlayerListener` 接口还允许各个 Player 对象以字符串形式传递专有事件。你的应用程序可能会使用其中一些事件来向其用户界面提供细粒度的更新——例如，指示设备正在缓冲流。\n\
  \n**表 16-4.** *Player 对象提供的事件* **事件**\n\n**用途**\n\nPlayerListener.BUFFERING_STARTED\n\
  \nPlayer 实例进入缓冲模式。\n\nPlayerListener.BUFFERING_STOPPED\n\nPlayer 实例退出缓冲模式。\n\nPlayerListener.CLOSED\n\
  \nPlayer 实例已关闭。\n\nPlayerListener.DEVICE_AVAILABLE\n\n系统占用的独占设备已归还给 Player 实例。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 16 章 ■ 渲染多媒体内容\n\n**461**\n\
  \n**事件**\n\n**用途**\n\nPlayerListener.DEVICE_UNAVAILABLE\n\n系统已抢占 Player 实例先前使用的独占设备。\n\
  \nPlayerListener.DURATION_UPDATED\n\nPlayer 实例渲染的媒体时长已更新。\n\nPlayerListener.ERROR\n\
  \n处理媒体时发生错误。\n\nPlayerListener.RECORD_ERROR\n\n录制媒体时发生错误。\n\nPlayerListener.RECORD_STARTED\n\
  \n录制已开始。\n\nPlayerListener.RECORD_STOPPED\n\n录制已停止。\n\nPlayerListener.SIZE_CHANGED\n\
  \n正在渲染的视频尺寸已更改。\n\nPlayerListener.STARTED\n\nPlayer 实例已进入已启动状态。\n\nPlayerListener.STOPPED\n\
  \nPlayer 实例已响应停止调用而停止渲染媒体。\n\nPlayerListener.STOPPED_AT_TIME\n\n\n\nPlayer 实例因 StopTimeControl\
  \ 而停止渲染媒体。\n\nPlayerListener.VOLUME_CHANGED\n\n音频设备的音量已更改。\n\n**捕获媒体**\n\n越来越多的\
  \ Java ME 设备具备捕获音频和视频的能力，这令人兴奋，因为它催生了新型应用，例如执行音乐识别的应用，以及通过网络进行的不同社交互动。MMAPI 使得从内置图像传感器捕获图片变得异常简单；你只需打开一个连接到设备视频传感器的\
  \ Player，并调用 VideoControl 的 getSnapshot 方法即可。清单 16-7 展示了实现此功能的伪代码。\n\n**清单 16-7.**\
  \ *从成像传感器捕获快照* Player player;\n\nVideoControl vc;\n\nForm viewer;\n\nprivate void\
  \ startCamera() {\n\ntry {\n\nplayer = Manager.createPlayer(\"capture://video\"\
  ); vc = (VideoControl) player.getControl(\"VideoControl\"); player.realize();\n\n\
  player.prefetch();\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**462**\n\
  \n第 16 章 ■ 渲染多媒体内容\n\nif (vc != null) {\n\nItem vi = (Item) vc.initDisplayMode(\n\
  \nVideoControl.USE_GUI_PRIMITIVE, null);\n\nviewer.append(vi);\n\n}\n\nDisplay.getDisplay(this).setCurrent(viewer);\n\
  \nplayer.start();\n\n} catch (MediaException e) {}\n\ncatch (IOException e) {}\n\
  \n}\n\nprivate void stopCamera() {\n\ntry {\n\nif (player!=null) {\n\nplayer.stop();\n\
  \nplayer.close();\n\nplayer = null;\n\n}\n\n} catch (MediaException e) {}\n\n}\n\
  \nprivate void capture() {\n\nif (vc != null) try {\n\nbyte[] imageBytes = vc.getSnapshot(null);\n\
  \n// 对 imageBytes 进行处理...\n\n} catch (MediaException e) {}\n\n}\n\n■**注意** 所有这些方法都应在它们自己的线程上调用；在\
  \ UI 线程上运行它们可能会阻塞 UI 线程过长时间，导致应用程序停滞，这是不可接受的。在某些平台上，这还可能引发其他问题，例如应用程序挂起，尤其是当 Java\
  \ 平台的安全管理器想要提示用户批准应用程序使用 getSnapshot 方法时。要了解如何在真实的多线程应用程序中实现这一点，请阅读即将到来的“将 MMAPI\
  \ 和 SVGAPI 投入实践”部分，特别是“捕获图像”小节。\n\n到目前为止，你可能已经大致理解了 startCamera 的用途。它获取一个新的 Player\
  \ 实例，该实例将设备的成像传感器用作视频源，实现并初始化该实例，并获取一个 VideoControl 实例以在屏幕上显示为相机取景器。stopCamera 方法也很简单；它只是销毁\
  \ Player 实例。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 16 章 ■ 渲染多媒体内容\n\
  \n**463**\n\n要捕获图像，capture 方法会调用 VideoControl 实例的 getSnapshot 方法。此方法接受所需的图像格式名称和编码选项，并以字节数组的形式返回按所需图像格式编码的图像。默认情况下，getSnapshot\
  \ 使用系统的默认编码，该编码是 video.snapshot.encoding 系统属性值中的第一个字段。\n\n你可以将编码选项指定为 URL 编码的字符串，包含以下参数：\n\
  \n• encoding：指示所需的编码，例如 JPEG、PNG 或 GIF\n\n• width：指示编码图像的所需宽度（以像素为单位）\n\n• height：指示编码图像的所需高度（以像素为单位）\
  \ 例如，你可以将 encoding=jpeg&width=160&height=120 传递给 getSnapshot，以接收编码为 JPEG 的邮票大小图像。\n\
  \ngetSnapshot 可能会抛出异常；如果应用程序没有拍摄快照的权限，则预期会抛出 SecurityException；如果所需的格式不受支持或 Player\
  \ 不支持拍摄快照，则预期会抛出 MediaException。如果尝试在尚未调用 initDisplayMode 的 VideoControl 实例上调用 getSnapshot，则还可能抛出\
  \ IllegalStateException。\n\n不幸的是，虽然代码本身很简单，但在实践中，此操作充满了困难。首先是你可能预料到的明显问题：你的应用程序可能运行在没有成像传感器或\
  \ MMAPI 与成像传感器未集成的设备上。这通常很容易发现；正如你在表 16-2 中回忆的那样，调用 System.getProperty 并传递 supports.video.capture\
  \ 值会告诉你目标设备是否真的可以执行此操作。然而，你可能会发现其他问题，包括以下内容：\n\n• *不同的定位器*：某些设备保留定位器 capture://image\
  \ 用于捕获静态图像，而 capture://video 用于使用 RecordControl 实例捕获视频（我稍后会详细介绍）。\n\n• *渲染相机取景器的预览操作不可预测*：在某些设备上，只有使用\
  \ initDisplayMode 并通过 VideoControl.USE_GUI_PRIMITIVE 指定 GUI 基元，才能获得相机取景器。其他设备则只能通过使用\
  \ VideoControl.USE_DIRECT_VIDEO 并提供一个 Canvas 对象（MMAPI 在该对象上绘制传感器提供的视图）才能工作。\n\n\
  • *寻找通用编码方案*：不要假设所有 Java ME 设备都会提供相同的图像格式或分辨率，或者提供你请求的格式或分辨率来构建你的应用程序。某些设备可以以多种格式编码，而有些则不能。有些可以缩放编码后的图像，而有些则不能——而且有些设备只有在同时提供宽度和高度参数时才会缩放你的图像。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**464**\n\n第 16 章 ■ 渲染多媒体内容\n\
  \n• *怪异行为*：某些设备制造时，图像传感器是倒置安装的，或者为了满足特定的工业设计要求而向某个方向旋转了 90 度。不幸的是，在这种设备上，经常会发现原生相机软件知道旋转情况并进行了校正，而\
  \ Java ME MMAPI 实现却不知道，导致捕获的图像是旋转或倒置的。\n\nMMAPI 的相机支持可能会令人抓狂，因此请使用 System.getProperties\
  \ 检查设备的系统属性，仔细操作，并记录你的结果。如有疑问，请查阅制造商的开发者支持论坛；除非是全新设备，否则你很可能不是第一个遇到特定问题的人。不要绝望：帮助正在路上。JSR\
  \ 234，即高级多媒体补充（AMMS）API，定义了一组补充的 MMAPI 接口，包括几个特定于相机的 Control 子接口。虽然在我撰写本文时尚未在设备上广泛部署，但\
  \ AMMS API 有望标准化成像子系统的行为，并提供一套新的用于成像的 Control 子接口，包括以下内容：\n\n• javax.microedition.amms.control.camera.CameraControl：使用此接口来确定和更改快门反馈、相机旋转、曝光模式和图像分辨率等内容。\n\
  \n• javax.microedition.amms.control.camera.ExposureControl：使用此接口来确定和更改曝光设置。\n\n\
  • javax.microedition.amms.control.camera.FlashControl：使用此接口来确定和设置相机闪光灯的闪光模式。\n\n\
  • javax.microedition.amms.control.camera.FocusControl：使用此接口来确定和设置可变焦成像传感器的对焦模式和特定对焦设置。\n\
  \n• javax.microedition.amms.control.ImageFormatControl：使用此接口来设置所需的图像格式。\n\n• javax.microedition.amms.control.camera.SnapshotControl：使用此接口来控制连拍静态图像捕获，在一次捕获请求中拍摄多张图像。\n\
  \n• javax.microedition.amms.control.camera.ZoomControl：使用此接口来确定和设置可变焦成像传感器的数字和光学变焦选项。\n\
  \n你可以通过调用 System.getProperty 并传递字符串 microedition.amms.version 来了解特定设备是否支持 JSR 234。支持\
  \ AMMS 的设备\n\n\n\nAPI 的符合性要求比支持 MMAPI 的更为严格，因此提供 AMMS API 的设备之间很可能具有更高的一致性行为。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 16 章 ■ 渲染多媒体内容\n\n**465**\n\
  \n■**提示** JSR 234 定义的 AMMS API 提供的功能远不止对成像传感器的更好控制。它还包括用于高级音频功能的接口，例如 3D 音频定位、混响和均衡器；收音机调谐器控制；用于分层和分组\
  \ Player 实例的效果；以及媒体后处理。如果你正在为高端 Java ME 设备开发多媒体应用程序，请务必检查你的目标设备是否支持此 API。\n\n`getSnapshot`\
  \ 方法显然仅适用于从视频数据源捕获单帧。你的应用程序可能希望录制其他数据源，例如来自麦克风的音频流，用于录音机或音乐识别应用程序。\n\n要捕获其他类型的媒体，你可以使用\
  \ `RecordControl` 接口，该接口将录制媒体的副本写入 `OutputStream` 实例。清单 16-8 展示了一个源自 JSR 135 文档的示例。\n\
  \n**清单 16-8.** *演示 RecordControl 接口的伪代码* try {\n\n// 创建一个捕获实时音频的 DataSource。\n\n\
  ByteArrayOutputStream baos = new ByteArrayOutputStream(); Player p = Manager.createPlayer(\"\
  capture://audio\"); p.realize();\n\nRecordControl rc = (RecordControl)p.getControl(\"\
  RecordControl\"); rc.setRecordStream(baos);\n\nrc.startRecord();\n\np.start();\n\
  \nThread.currentThread().sleep(5000);\n\np.stop();\n\nrc.stopRecord();\n\nrc.commit();\n\
  \nbyte[] b = baos.toByteArray();\n\n} catch (IOException ioe) {}\n\ncatch (MediaException\
  \ me) {}\n\ncatch (InterruptedException e) {}\n\n此示例创建一个 `Player` 实例，该实例捕获当前音频五秒钟，并获取捕获的编码数据的字节数组。然后，你可以在其他地方使用此内容。例如，你可以将其用作写入文件、上传到\
  \ Web 服务器进行处理或通过 WMA 作为 MMS 附件发送的数据（我将在第 14 章中讨论）。\n\n使用 `RecordControl` 实例时，MMAPI\
  \ 通常以与源相同的格式对结果数据进行编码。从捕获设备录制时，你可以通过 `audio.encodings` 和 `video.encodings` 系统属性的值来了解支持的编码方案。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**466**\n\n第 16 章 ■ 渲染多媒体内容\n\
  \n■**提示** 与 `getSnapshot` 方法一样，不同的设备可能提供不同的编码方案，并且在一个设备上录制的媒体可能无法在另一个供应商的设备上播放。在设计应用程序时，请仔细考虑不同设备对特定媒体类型的需求，并记住你的应用程序可能需要一个特定组件（通常托管在某个服务器上）来将媒体从一种格式转码为另一种格式。\n\
  \n**播放单个音调**\n\n我编写多媒体应用程序的早期经历之一并非在计算机上，而是在可编程计算器上。它有一个 `BEEP` 指令，可以播放 ROM 中编码的四音调蜂鸣声，还有一个\
  \ `TONE` 指令，可以播放具有预设频率的音调。当时我认为这非常了不起；能够播放单个音调对于某些应用程序仍然有用。\n\n播放一两个音调的最简单方法是使用\
  \ `Manager` 的 `playTone` 方法，该方法接受音符、持续时间（毫秒）和音量，如下所示：`Manager.playTone( 60, 3000,\
  \ 100 );`\n\n音符值实际上是一个乐器数字接口（MIDI）音符选择器。中央 C 被任意赋予值 60，你可以从中央 C 开始以半音为单位向上或向下计数（例如，中央\
  \ C 上方的 A 为 69）。尽管很简单，但 `playTone` 可能会抛出 `MediaException`，就像任何播放器一样，因为另一个应用程序可能正在使用声音硬件。如果你提供的音调超出范围，它也可能抛出\
  \ `IllegalArgumentException`。\n\n如果你想按顺序播放音调，最好使用带有关联 `ToneControl` 实例的 `Player`\
  \ 实例，因为这样你可以使用 `Player` 来控制每个音调的顺序。请按照以下步骤播放一系列音调：**1.** 使用定位器 `Manager.TONE_DEVICE_LOCATOR`（其值为\
  \ `device://tone`）创建一个 `Player` 实例。\n\n**2.** 实现播放器。\n\n**3.** 通过调用 `player.getControl(\"\
  ToneControl\")` 获取 `ToneControl` 实例。\n\n**4.** 使用 `ToneControl` 的 `setSequence`\
  \ 方法，将编码为字节数组（`byte[]`）的音调序列传递给上一步中获得的 `ToneControl` 实例。\n\n**5.** 启动 `Player` 实例。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 16 章 ■ 渲染多媒体内容\n\n**467**\n\
  \n如果你觉得这有点奇怪，请放心，你并非唯一有此感觉的人。通过控件将音调序列馈送到播放器完全打破了源-播放器-控制器的抽象。\n\n更糟糕的是，编码音调序列的方案是一种拜占庭式的复杂事务，让人想起\
  \ MIDI 标准定义的音符控制序列，这很可能是因为大多数移动设备的声音硬件都接受 MIDI 命令。编码音调序列的字节流由一个初始版本号（指示你正在使用的 `ToneControl`\
  \ 实例的版本）组成，后跟成对的音符和持续时间。与 `playTone` 不同，你为 `ToneControl` 实例指定的持续时间不是以毫秒为单位，而是 `ToneControl`\
  \ 实例的*分辨率*（或基本速度）的倍数。默认情况下，分辨率是四拍一小节（如果你是音乐家，则为 4/4 拍）的 1/64。因此，在默认配置中，持续时间为 64\
  \ 表示全音符（四拍），持续时间为 16 表示四分音符（一拍），持续时间为 8 表示八分音符，依此类推。清单 16-9 展示了一个用于 `ToneControl`\
  \ 实例的简单音符序列示例。\n\n**清单 16-9.** *ToneControl 实例的一些示例数据* byte tempo = 30; // 将速度设置为\
  \ 120 bpm\n\nbyte d = 8;\n\n// 八分音符\n\nbyte C4 = ToneControl.C4;;\n\nbyte D4 = (byte)(C4\
  \ + 2); // 两个半音，一个全音 byte E4 = (byte)(C4 + 4); // 四个半音，一个大三度 byte G4 = (byte)(C4\
  \ + 7); // 七个半音，一个五度\n\nbyte rest = ToneControl.SILENCE;\n\nbyte block1 = 0;\n\n\
  byte block2 = 1;\n\nbyte[] song = new byte[] {\n\n// 如 JSR-135 中所转录\n\nToneControl.VERSION,\
  \ 1,\n\nToneControl.TEMPO, tempo,\n\nToneControl.SET_VOLUME, 50,\n\nToneControl.BLOCK_START,\
  \ block1,// 开始定义一个块 E4,d, D4,d, C4,d, E4,d, // 块 1 的内容\n\nE4,d, E4,d, E4,d, rest,d,\n\
  \nToneControl.BLOCK_END, block1, // 结束块定义 ToneControl.BLOCK_START, block2,\n\nD4,d,\
  \ D4,d, D4,d, rest,d, // 块 2 的内容\n\nE4,d, G4,d, G4,d, rest,d,\n\nToneControl.BLOCK_END,\
  \ block2,\n\nToneControl.PLAY_BLOCK, block1, // 播放第一个块 ToneControl.PLAY_BLOCK, block2,\
  \ // 播放下一个块\n\nD4,d, D4,d, E4,d, D4,d, C4,d // 播放最后一部分\n\n};\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**468**\n\n第 16 章 ■ 渲染多媒体内容\n\n此示例展示了你可以放置在 `ToneControl` 实例序列中的其他几个命令。这些命令影响以下选项：\n\
  \n*   **速度**：你可以随时使用 `ToneControl.TEMPO` 参数更改播放速度，后跟以每分钟节拍数除以 4 的新速度。\n*   **音量**：你可以随时使用\
  \ `ToneControl.VOLUME` 参数更改音量，后跟新音量（0 到 100 之间的数字）。\n\n\n\n•   *音符块*：你可以定义最多 255\
  \ 个可重复使用的音符块。要开始定义块，请使用 `ToneControl.BLOCK_START` 参数，后跟一个块 ID。接着输入块中的命令，并使用你开始块时所用的\
  \ ID 配合 `ToneControl.BLOCK_START` 参数来关闭该块。之后，你可以在序列中的任何时间通过指定 `ToneControl.PLAY_BLOCK`\
  \ 参数和块 ID 来播放该块。\n\n•   *休止符*：音乐不仅由音符构成，音符之间的停顿也同样重要。\n\n要指定一个休止符，请使用 `ToneControl.SILENCE`\
  \ 音符值，后跟休止符的持续时间。\n\n•   *重复*：你可以通过指定 `ToneControl.REPEAT` 后跟重复次数，再跟音符和持续时间，来多次重复单个音符。（例如，使用默认分辨率时，序列\
  \ `ToneControl.REPEAT, 4, 60, 16` 会演奏四个四分音符的中音 C。）\n\n•   *分辨率*：你可以使用 `ToneControl.RESOLUTION`\
  \ 将默认的 1/64 分辨率更改为其他值，只需在其后跟上新分辨率的分母即可。\n\n但是，你只能在序列的开头执行此操作一次。\n\n清单 16-10 基于清单\
  \ 16-1 和 16-9 的伪代码，演奏了《玛丽有只小羊羔》。\n\n**清单 16-10.** *使用 ToneControl 实例演奏简单歌曲的伪代码*\n\
  Player player;\n\nToneControl control;\n\nbyte tempo = 30; // 设置速度为 120 bpm\n\n\
  byte d = 8;\n\n// 八分音符\n\nbyte C4 = ToneControl.C4;;\n\nbyte D4 = (byte)(C4 + 2);\
  \ // 两个半音，一个全音\nbyte E4 = (byte)(C4 + 4); // 四个半音，一个大三度\nbyte G4 = (byte)(C4 + 7);\
  \ // 七个半音，一个五度\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 16 章 ■ 渲染多媒体内容\n\
  \n**469**\n\nbyte rest = ToneControl.SILENCE;\n\nbyte block1 = 0;\n\nbyte block2\
  \ = 1;\n\nbyte[] song = new byte[] {\n\n// 如 JSR-135 中所转录\nToneControl.VERSION,\
  \ 1,\nToneControl.TEMPO, tempo,\nToneControl.SET_VOLUME, 50,\nToneControl.BLOCK_START,\
  \ block1,// 开始定义块\nE4,d, D4,d, C4,d, E4,d, // 块 1 的内容\nE4,d, E4,d, E4,d, rest,d,\n\
  ToneControl.BLOCK_END, block1, // 结束块定义\nToneControl.BLOCK_START, block2,\nD4,d,\
  \ D4,d, D4,d, rest,d, // 块 2 的内容\nE4,d, G4,d, G4,d, rest,d,\nToneControl.BLOCK_END,\
  \ block2,\nToneControl.PLAY_BLOCK, block1, // 播放第一个块\nToneControl.PLAY_BLOCK, block2,\
  \ // 播放下一个块\nD4,d, D4,d, E4,d, D4,d, C4,d // 播放最后一部分\n\n};\n\ntry {\n\nplayer =\
