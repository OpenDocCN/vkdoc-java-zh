  \ Dimension(PREFERRED_SIZE, PREFERRED_SIZE);\n\n}\n\npublic void processMouseEvent(MouseEvent\
  \ e) {\n\nswitch(e.getID()) {\n\ncase MouseEvent.MOUSE_PRESSED:\n\npressed = true;\n\
  \nrepaint();\n\nbreak;\n\ncase MouseEvent.MOUSE_RELEASED:\n\nif(pressed == true)\
