  \ntry {\n\nparser.parse(bis);\n\n}\n\ncatch(Exception e){}\n\nfinally {\n\ntry {\n\
  \nbis.close();\n\n}\n\ncatch(Exception e) {}\n\n}\n\n}\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**372**\n\n第 13 章 ■ 访问 Web 服务\n\nfromXml 方法仍然接收一个字符串，但它不再需要获取 SAX 解析器的工厂并创建 SAX\
  \ 解析器，而只需创建一个 LocationParser 实例，将传入的字符串转换为字节数组流，然后调用 LocationParser 的 parse 方法。\n\
  \n■**注意** kXML 并非唯一适用于 Java ME 应用的 XML 解析器；其他解析器包括 NanoXML 和 Xparse-J。就个人而言，我偏好\
  \ kXML，因为它接口简洁、应用广泛、体积小巧且运行稳定，但如果你在寻找其他选择，不妨用 Google 搜索一下建议。\n\n**总结**\n\n与 Web\
  \ 服务交互是许多 Java ME 应用的关键部分。虽然 Java ME 本身对访问 Web 服务的支持不多，但通过一些努力，你可以弥合这一差距。\n\nWeb\
  \ 服务要求你将数据表示为 XML，以便通过 HTTP 与远程 Web 服务进行交换；虽然你可以使用 GCF 和 HttpConnection 轻松完成数据交换，但处理\
  \ XML 则需要多做一点工作。编码 XML 相对直接，通常是通过组合静态定义的字符串和要表示为 XML 的对象中的字段值来构建 XML 文档。你可以使用 StringBuffer\
  \ 高效地完成此操作，并在完成后调用其 toString 方法以获取 XML 文档。\n\n在需要解析 XML 时，你有多种选择；其中两种最常用的是由可选的 J2ME\
  \ Web 服务规范（JSR 172）定义的 XML 解析器和 kXML 解析器。\n\nJSR 172 既定义了用于使用 WSDL 和 SOAP 的远程 Web\
  \ 服务的可选 RMI 风格接口，也定义了一个可选的 SAX 解析器。使用 SAX 解析器，你可以通过向 SAX 解析器提供一个处理器来解析 XML，该处理器处理\
  \ SAX 解析器在扫描 XML 文档时生成的事件。\n\nkXML 解析器被打包成一个 JAR 文件，你可以将其包含在你的应用中；它提供了一个简单的拉式解析器，你可以通过遍历文档中的\
  \ XML 标记来使用它。你通过使用解析器的方法来完成此遍历，并调用你自己的代码来处理生成的标记。使用 kXML 解析器的一个好方法是让它生成类似于 SAX 解析器的事件。这可以在解析器的文档扫描部分（kXML\
  \ 解析器和用于获取连续 XML 标记的循环的职责）与解析器的解析部分之间提供合理的抽象层次。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 14 章\n\n使用无线消息 API 进行消息传递\n\n**几**乎所有的 CLDC 设备以及部分 CDC 设备都提供了连接到如今无处不在的全球蜂窝网络的硬件。除了为支持\
  \ Java ME 的设备提供无线 IP 连接外，这些网络还通过其他协议（如 SMS 和 MMS）提供无线消息传递。为了使你的应用能够访问这些无线消息协议，Sun\
  \ Microsystems 及其合作伙伴开发了无线消息 API（WMA），这是一套构建在 GCF 之上的综合性消息接口。\n\nWMA 是 Java ME 设备的一个可选包，最初由\
  \ JSR 120 定义，并由 JSR 205 扩展以支持 MMS。\n\n在本章中，我将向你展示如何使用 WMA 发送和接收 SMS 和 MMS 消息。首先，我将讨论无线消息服务，以及它们与你职业生涯中可能遇到的典型\
  \ IP 连接功能有何不同。接下来，我将展示 WMA 的组织方式，并介绍 WMA 提供的新类。之后，我将向你展示如何使用 Java ME 推送注册表——这是开发和部署无线消息应用时的一个重要组件。最后，我将通过一个具体示例，向你展示如何在你的应用中使用\
  \ WMA 发送和接收 SMS 消息。\n\n**介绍无线消息服务**\n\n无线消息协议的出现早于 Java ME 和基于蜂窝网络的 IP；第一代数字网络通过用于呼叫控制的寻呼信道集成了\
  \ SMS。\n\n如今，各种无线消息服务——SMS、小区广播（SMS-CB）和 MMS——已成为无数应用（用于消息传递、高级内容（如铃声、壁纸和应用）交付、游戏及其他用途）的承载网络。虽然许多应用直接使用这些协议，用户通过其无线设备上的原生消息应用发起或接收消息，但越来越多的应用使用\
  \ Java ME 作为消息协议的前端。这提供了 **373**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**374**\n\n第 14 章 ■ 使用无线消息 API 进行消息传递\n\n更好的用户体验，因为它可以验证数据输入并提供特定于应用的 UI。例如，一个专用的\
  \ Java ME 消息应用可以为消息对话提供线程化界面，而不是使用大多数原生无线终端消息应用所采用的电子邮件收件箱消息隐喻。\n\n**介绍短消息服务**\n\
  \nSMS 是当今广泛使用的无线消息协议中最古老的一种。该协议最初于 1985 年由全球移动通信系统（GSM）标准定义，如今估计有 24 亿活跃用户使用，每年交换数万亿条消息。\n\
  \n所有主要的地面蜂窝网络现在都支持某种形式的（通常是可互操作的）SMS，许多卫星通信网络也支持。\n\nSMS 消息由在相同或不同网络上的用户之间发送的短数据包（通常为压缩成\
  \ 140 字节的 160 个字符）组成。SMS 消息由 SMS 中心（SMSC）路由，并被称为*移动台发起*（MO）或*移动台终止*（MT）。在用户之间发送时，消息通常是文本形式，尽管该协议也支持二进制负载。SMS\
  \ 支持的二进制格式可用于发送和接收铃声和图片，或连接多条消息以便发送更长的文本或二进制消息。在大多数网络上，你可以将 SMS 消息发送到特定端口，以便不同的应用可以在专用端口上通信，这与\
  \ TCP/IP 网络非常相似。SMS 网络高度可靠，但不保证消息送达；例如，收件人可能关闭了她的无线终端，并且 SMS 消息可能无法在其终端上送达，直到网络判定该消息过旧而无法送达并将其完全丢弃。\n\
  \n在当今的大多数蜂窝网络上，SMS *聚合器*为你提供了从 Web 上的服务器发送和接收 SMS 消息的选项。使用聚合器，你可以安排获得使用*短码*（一个几位数的号码，例如\
  \ 40404）作为发起和接收消息的端点的权利。用户可以通过使用短码来通过聚合器寻址特定的服务器，就像他们向特定电话号码发送消息一样。\n\n**介绍多媒体消息服务**\n\
  \n\n\n在看到短信（SMS）的成功之后，网络基础设施提供商和运营商共同开发了彩信（MMS）——一种用于在手机之间传输富多媒体消息的独立协议。与仅限于简单格式化文本消息、和弦铃声和小位图的短信不同，彩信消息可以承载数字化音频、富文本以及当今无线终端上摄像头拍摄的图像。彩信可运行于包括短信或\
  \ TCP/IP 在内的多种无线协议之上，随着用户不断在无线终端之间创作和分享内容，其使用量正在增长。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 14 章 ■ 使用无线消息 API 进行消息通信 **375**\n\n彩信借鉴了电子邮件协议中的许多概念，包括消息主题、消息正文和多个消息部分的概念。彩信消息也可以发送给多个收件人。与短信一样，一个特殊的服务器（彩信中心）负责在无线终端之间路由彩信消息。尽管人们交换的彩信消息数量少于短信消息，但从应用程序开发者的角度来看，商业格局大致相同。公司可以在特定网络上获取短号码，并将这些短号码注册到聚合器——即运营在\
  \ Web 和蜂窝网络之间路由彩信消息的服务器的公司。\n\n由于彩信是一项较新的服务，它也存在一些缺点。拥有支持彩信功能的手机或付费接收彩信服务的人较少。此外，虽然短信在全球各大运营商之间基本实现了互操作性，但彩信尚未做到。例如，在美国，只有少数几家主要运营商就彩信互操作性达成了协议。如果你和我使用不同的运营商，我们可能能够交换彩信消息，也可能无法交换。\n\
  \n**介绍小区广播服务**\n\n虽然短信是一种点对点消息服务——发送者在发送消息时必须指定特定的接收者——但短信小区广播（SMS-CB）是一种点对区域（也称为*一对多*）协议，它使应用程序开发者和运营商能够针对单条消息定位多个无线终端。作为无线广域网（WAN）上可用消息标准中相对较新的补充，短信小区广播直到最近才在少数网络上得到采用，用于广告、天气警报、基于位置的新闻等应用。\n\
  \n使用短信小区广播时，消息较短（82 字节的压缩文本或二进制数据），但可以串联起来以提供传递较长消息的机制。消息不是发送给特定收件人，而是发送给一个小区范围，通常是在特定的地理区域内。一些先进的网络提供了整合地理信息的接口，从而无需短信小区广播应用程序引用特定的小区；相反，通过这些接口，你可以根据纬度和经度来引用区域。\n\
  \n**介绍无线消息 API**\n\n无线消息 API（WMA）扩展了通用连接框架（GCF，你首次在第 12 章中详细接触过），以包含各种消息的概念，在概念上类似于\
  \ UDP 数据报。JSR 120 定义了`javax.wireless.messaging`包，详细说明了 WMA 1.0 版本，而 JSR 205 则详细说明了\
  \ WMA 2.0 版本。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**376**\n\n\
  第 14 章 ■ 使用无线消息 API 进行消息通信\n\n■**注意** 由于目前出货的几乎所有无线终端都支持 WMA 2.0，除非我特别说明，否则以下内容均适用于\
  \ WMA 2.0。你需要记住的 WMA 1.0 和 WMA 2.0 之间的关键区别在于，WMA 2.0 增加了对短信小区广播和彩信消息的支持。\n\n图 14-1\
  \ 展示了你在第 12 章首次看到的 GCF 类，以及 WMA 引入的类。WMA 1.0 定义了创建消息实例的基本机制，而 WMA 2.0 定义了用于表示彩信消息的多部分消息，涉及以下类和接口：\n\
  \n\n\n• MessageConnection：作为表示单个消息的 Message 子类实例的工厂。你可以像获取其他任何 Connection 一样，通过在传递给\
  \ `Connector.open` 的 URL 中指定连接类型来获取 MessageConnection 实例。\n\n• Message：所有 WMA 消息的超类。它提供了操作消息时间戳和地址的接口。\n\
  \n• TextMessage：表示承载文本的 SMS 消息的接口。\n\n• BinaryMessage：表示承载二进制负载的 SMS 消息的接口。\n\n\
  • MultipartMessage：表示承载一个或多个消息部分的 MMS 消息的接口。只有 WMA 2.0 提供了 MultipartMessage 类。\n\
  \n• MessagePart：表示消息的单个部分，例如图像或文本片段。它在组合和解析 MMS 消息时使用。只有 WMA 2.0 提供了 MessagePart\
  \ 类。\n\n• MessageListener：提供了一种机制，AMS 可以通过该机制通知你的应用程序有传入消息。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 14 章 ■ 使用无线消息 API 进行消息传递 **377**\n\n**图 14-1.** *GCF 以及 WMA 定义的 GCF 扩展*\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**378**\n\n第 14 章 ■ 使用无线消息 API\
  \ 进行消息传递 WMA 使用 GCF 的 `Connector.open` 方法来创建 MessageConnection 实例，就像你在第 12 章和第 13\
  \ 章中学习如何创建其他 Connection 子类一样。与其他 Connection 子类一样，你可以通过使用 URL 指定所需的连接类型来获取 Connection\
  \ 子类；URL 的格式为\n\n`protocol://recipient:port`\n\nURL 的每个部分定义如下：\n\n• protocol：协议——对于\
  \ SMS-CB 消息为 `cbs`，对于 MMS 消息为 `mms`，对于 SMS 消息为 `sms`\n• recipient：MO 消息的接收方地址（电话号码、短代码或电子邮件地址）；当为空时，表示应用程序将使用生成的\
  \ MessageConnection 来接收消息\n• port：消息将发送到的端口——对于 SMS 或 SMS-CB 消息为数字端口，对于 MMS 消息为字母数字字符串\n\
  \n在创建 MessageConnection 实例时，你可以为使用 SMS 和 MMS 协议的 MO 或 MT 消息创建实例，但 WMA 2.0 仅支持 MT\
  \ SMS-CB 消息。因此，如果协议是 `cbs`，则在传递给 `Connector.open` 的 URL 中指定接收方是错误的。\n\n与 TCP/IP\
  \ 和 UDP 连接类似，SMS、SMS-CB 和 MMS 消息被定向到特定端口；不同的应用程序可以使用不同的端口来区分数据。某些端口可能被保留，供手机原生软件和网络使用的特定应用程序使用；例如，在\
  \ GSM 网络上，网络保留了表 14-1 中列出的端口，尝试在这些端口上发送或接收 SMS 消息将导致 `SecurityException`。\n\n某些网络，例如主要在北美使用的码分多址（CDMA）网络，可能根本不使用端口号，在这些网络上打开\
  \ MessageConnection 时，你应该完全省略端口号。\n\n**表 14-1.** *GSM 网络上的保留端口*\n\n**端口号**\n\n**用途**\n\
  \nWAP 无线电话应用（WTA）安全、无连接会话服务 2923\n\nWAP WTA 安全会话服务\n\nWAP 推送无连接会话服务（客户端侧）\n\nWAP\
  \ 推送安全、无连接会话服务（客户端侧） 5502\n\n用于用户身份模块（SIM）访问的服务卡读取器服务 5503\n\n互联网访问配置读取器\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 14 章 ■ 使用无线消息 API 进行消息传递 **379**\n\n**端口号**\n\n**用途**\n\n动态菜单控制协议（DMCP）\n\n\
  消息访问协议服务\n\n简单电子邮件通知服务\n\nWAP 无连接会话服务\n\nWAP 会话服务\n\nWAP 安全、无连接会话服务\n\nWAP 安全会话服务\n\
  \nWAP vCal Secure，用于日历数据的安全传输\n\nSyncML 空中下载（OTA）配置\n\n\n\nWAP OTA 配置\n\n**创建消息**\n\
  \n一旦你通过传递包含收件人地址的 URL，从 GCF 的 Connector 类获取到一个 MO MessageConnection，你就可以使用它的 newMessage\
  \ 方法来创建具体的 Message 子类（例如 TextMessage）的新实例，如下所示：`TextMessage tm = (TextMessage)c.newMessage(MessageConnection.TEXT_MESSAGE);`\
  \ 正如你所料，你可以使用 newMessage 方法来创建以下任何 Message 子类的实例：\n\n• TextMessage：传递 `MessageConnection.TEXT_MESSAGE`\
  \ 以获取 TextMessage 实例（用于文本短信）。\n\n• BinaryMessage：传递 `MessageConnection.BINARY_MESSAGE`\
  \ 以获取 BinaryMessage 实例（用于二进制短信）。\n\n• MultipartMessage：传递 `MessageConnection.MULTIPART_MESSAGE`\
  \ 以获取 MultipartMessage 实例（用于彩信）。\n\n你也可以使用 MessageConnection 实例向不同的收件人发送消息；只需调用\
  \ newMessage，同时传递指示所需消息类型的常量以及包含收件人地址的字符串。\n\n如果你的应用程序需要接收消息，你可以通过传递一个不带收件人地址的 URL\
  \ 来获取一个为 MT 消息配置的 MessageConnection 实例，然后调用该 MessageConnection 的 receive 方法。正如你将在接下来的“接收消息”一节中看到的，receive\
  \ 方法会阻塞调用它的线程，直到设备接收到新消息，因此你绝对应该在一个不同于 UI 线程的线程上执行此操作。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**380**\n\n第 14 章 ■ 使用无线消息 API 进行消息传递\n\n**发送消息**\n\n创建消息后，你需要设置消息的数据负载。不同的 Message\
  \ 子类在设置方式上略有不同。Message 类仅提供用于管理消息收件人地址和消息发送时间的方法：\n\n• getAddress：返回与消息关联的地址\n\n\
  • getTimestamp：以 `java.util.Date` 实例的形式返回消息发送的时间\n\n• setAddress：为消息关联一个新地址，丢弃之前与该消息关联的任何地址\n\
  \n正如我之前在“介绍短消息服务”一节中提到的，SMS 消息包的实现可以连接数据包（称为*段*），使你能够发送超过协议 160 字符（140 字节）限制的消息。WMA\
  \ 要求任何实现都必须支持将最多三个段连接为一条消息，从而允许你发送相当长的消息，大约 400 字节或更多（实际长度通常稍短，因为协议需要占用空间来支持段连接、可选的端口号等）。你可以通过调用\
  \ MessageConnection 的 numberOfSegments 方法并传递一个 TextMessage 或 BinaryMessage 来确定一条消息消耗了多少个段；结果就是该消息跨越的段数。\n\
  \nMMS 的实现则不同，它允许你将消息创建为多个部分的集合，这些部分由 MessagePart 的实例表示。不是一次性设置 MultipartMessage\
  \ 的负载，而是逐个添加各个部分。\n\n设置和获取 TextMessage 的负载\n\n正如你所想象的，管理 TextMessage 实例的负载非常简单。该类提供了两个方法：`getPayloadText`\
  \ 和 `setPayloadText`。两者都将消息负载视为 `String` 实例；你调用 `getPayloadText` 来获取包含该实例负载的 `String`，同时你向\
  \ `setPayloadText` 传递一个字符串来设置该实例的负载。你可以使用类似于清单 14-1 中的代码来设置文本消息的负载。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 14 章 ■ 使用无线消息 API 进行消息传递 **381**\n\n**清单 14-1.** *设置 TextMessage 实例的负载* `String\
  \ receiver = \"+18885551212\";`\n\n`String port = \"1234\";`\n\n`String address\
  \ = \"sms://\" + receiver + \":\" + port; MessageConnection c = null;`\n\n`try {`\n\
  \n`c = (MessageConnection) Connector.open(address);`\n\n`TextMessage t = (TextMessage)\
  \ c.newMessage(`\n\n`MessageConnection.TEXT_MESSAGE);`\n\n`t.setAddress(address);`\n\
  \n`t.setPayloadText(\"Hello world!\");`\n\n`c.send(t);`\n\n`} catch (Exception e)\
  \ {}`\n\n`finally {`\n\n`if (c != null) {`\n\n`try {`\n\n`c.close();`\n\n`} catch\
  \ (Exception e) { /* recover */}`\n\n`}`\n\n`}`\n\n这段代码首先创建一个 MessageConnection\
  \ 实例，并使用它创建一个新的 TextMessage 实例。接着，它设置 TextMessage 实例的收件人地址，并在发送消息之前将其负载设置为消息 \"\
  Hello world!\"。\n\n■**注意** 如果你熟悉电话协议，特别是 SMS，你就会知道 SMS 消息可以根据字符集、网络运营商，甚至网络运营商使用的承载网络，以多种不同方式中的任何一种进行编码。幸运的是，WMA\
  \ 实现负责处理消息编码和解码，以适应手机和承载网络可能需要的任何协议。\n\n设置和获取 BinaryMessage 的负载\n\n与 TextMessage\
  \ 类似，BinaryMessage 有一个简单的接口来管理其负载，将负载视为字节数组。`getPayloadData` 和 `setPayloadData`\
  \ 方法分别类似于 `getPayloadText` 和 `setPayloadText`。\n\n当人们发送二进制 SMS 消息时，负载通常是小型图像或和弦铃声，手机和\
  \ SMSC 将其编码和解码为增强型消息服务（EMS）对象。不幸的是，WMA 实现不支持 EMS 编码或解码，因此除非你自己编写编解码器，否则无法直接与 EMS\
  \ 编码的对象或服务进行互操作。但是，你可以通过 BinaryMessage 类使用二进制 SMS 来发送和接收其他应用程序数据，例如将压缩的金融数据（例如股票市场更新）、天气或配置数据推送到你的应用程序。\n\
  \n管理 MultipartMessage 的多个部分\n\n处理 MultipartMessage 实例与处理其他 Message 子类略有不同，因为 MMS\
  \ 消息的负载由一个或多个*部分*组成。每个部分都是一个单独的多媒体实体，例如图像、文本块或声音，很像传统的电子邮件消息。图 14-2 显示了一个包含多个部分的消息的示意图。\n\
  \n**图 14-2.** *MultipartMessage 实例的示意图* MultipartMessage 的实例有几个字段：\n\n• *时间戳*：继承自\
  \ Message 类，可通过 `getTimestamp` 方法获取时间戳。\n\n• *起始内容 ID*：该 ID 是一个字符串，用于命名将首先向用户显示的消息部分。可通过\
  \ `getStartContentId` 和 `setStartContentId` 方法获取。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 14 章 ■ 使用无线消息 API 进行消息传递 **383**\n\n• *主题*：主题是一个字符串，可通过 `getSubject` 和 `setSubject`\
  \ 方法获取。\n\n• *零个或多个地址*：地址是表示消息收件人的字符串。你可以使用 `addAddress` 方法添加单个地址，使用 `getAddresses`\
  \ 方法获取地址数组，或使用 `removeAddresses` 方法移除一个地址（或所有地址）。\n\n• *零个或多个命名标头*：标头包含关于消息的元数据。每个标头都是一个字符串，可通过其名称访问，你也可以使用字符串通过\
  \ `getHeader` 和 `setHeader` 方法指定该名称。\n\n\n\n•   *零个或多个消息部分*：消息部分是包含消息各个独立部分的 MessagePart\
  \ 实例。你可以使用 `addMessagePart` 方法将 MessagePart 实例添加到多部分消息中，使用 `getMessageParts` 获取消息中\
  \ MessagePart 的数组，或使用以下方法之一从消息中移除 MessagePart 实例：`removeMessagePart`、`removeMessagePartId`\
  \ 或 `removeMessagePartLocation`。\n\n当然，你不能直接访问这些字段；相反，你需要使用 `MultipartMessage` 类提供的访问器和修改器方法。\n\
  \n`MultipartMessage` 类封装了整个消息的概念，而 `MessagePart` 类则封装了消息的单个附件。每个部分都有一个唯一的名称，称为*内容\
  \ ID*。在处理 MessagePart 实例时，你经常通过此 ID 来引用它们，你可以通过调用特定部分的 `getContentID` 方法来获取该 ID。实例还有另外四个字段：\n\
  \n•   *消息内容*：一个字节数组，你可以使用 `getContent` 或 `getContentAsStream` 方法获取。\n\n•   *消息部分的指定内容位置*：一个字符串，通常包含一个\
  \ URL，你可以使用 `getContentLocation` 方法获取。\n\n•   *用于编码部分文本的编码方法*：由 `getEncoding` 方法确定。\n\
  \n•   *部分的 MIME 类型*：指示部分的类型（例如文本、PNG 图像等），你可以使用 `getMIMEType` 方法获取。由于 `MultipartMessage`\
  \ 类的面向部分的特性，创建一个要发送的消息比简单地创建一个 `TextMessage` 或 `BinaryMessage` 实例并设置其负载更复杂。相反，你需要遵循以下步骤：\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**384**\n\n第 14 章 ■ 使用无线消息\
  \ API 进行消息传递 **1.** 创建一个或多个 `MessagePart` 实例，将每个部分的内容、其 ID 和部分类型传递给 `MessagePart`\
  \ 构造函数。\n\n**2.** 通过在 `MessageConnection` 实例上调用 `newMessage` 来创建一个 `MultipartMessage`\
  \ 实例。\n\n**3.** 使用 `addMessagePart` 将你在第一步中创建的部分添加到 `MultipartMessage` 中。\n\n**4.**\
  \ 使用 `MultipartMessage` 的 `setSubject` 方法设置消息的主题（如果有）。\n\n**5.** 使用 `MultipartMessage`\
  \ 的 `addAddress` 方法设置消息的收件人。\n\n清单 14-2 展示了发送单个 PNG 图像此序列的伪代码。\n\n**清单 14-2.** *在多部分消息中发送单个\
  \ PNG 图像的伪代码* String address = \"mms://\" + receiver + \":\" + appId; MessageConnection\
  \ c = null;\n\ntry {\n\nc = (MessageConnection) Connector.open(address);\n\nMultipartMessage\
  \ mpm = (MultipartMessage)c.newMessage(\n\nMessageConnection.MULTIPART_MESSAGE);\n\
  \nmpm.setSubject(\"An image\");\n\nInputStream is = getClass().getResourceAsStream(\"\
  /img/i.png\"); byte[] bImage = new byte[is.available()];\n\nis.read(bImage);\n\n\
  mpm.addMessagePart(new MessagePart(bImage, 0, bImage.length,\n\n\"image/png\", \"\
  id1\", null, null));\n\nc.send(mpm);\n\n} catch (Exception e) { /* 恢复 */ }\n\nfinally\
  \ {\n\nif (c != null) {\n\ntry {\n\nc.close();\n\n} catch (IOException e) { /* 恢复\
  \ */}\n\n}\n\n}\n\n这段代码以与清单 14-1 相同的方式开始，不同之处在于它创建了一个 `MultipartMessage` 实例而不是 `TextMessage`\
  \ 实例。接下来，它将主题设置为 \"An image\"。之后，它使用 `InputStream` 实例将整个图像读入\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 14 章 ■ 使用无线消息 API 进行消息传递 **385**\n\n内存，并创建一个由 PNG 图像内容组成的新 `MessagePart`。最后，它使用\
  \ `MessageConnection` 发送图像。\n\n**接收消息**\n\n要接收消息，你需要一个配置为接受 MT 消息的 `MessageConnection`\
  \ 实例。你可以使用 `Connector.open` 创建一个，传递协议以及你的应用程序要接收的 MT 消息类型的可选端口或应用程序 ID，如下所示： MessageConnection\
  \ c = (MessageConnection)Connector.open(\"sms://:\" + port); 然后，你可以通过调用 `MessageConnection`\
  \ 的 `receive` 函数来接收新消息，如下所示：\n\nTextMessage msg = (TextMessage)c.receive();\n\n\
  听起来很简单，对吧？有一个问题：`receive` 会阻塞，直到应用程序收到消息，所以如果你在默认线程上执行此操作，你的应用程序 UI 将挂起，直到有传入消息到达。你可以通过以下两种方式之一解决此问题：注册一个\
  \ WMA 在有消息可用时通知的监听器，或者在单独的线程上调用 `receive`。\n\n注册监听器很容易；与其他 Java 监听器一样，你只需创建一个实现相应监听器接口（此处为\
  \ `MessageListener`）的类，并提供 `notifyIncomingMessage` 方法。当设备收到消息时，AMS 会使用一个配置为接收传入消息的\
  \ `MessageConnection` 来调用监听器。\n\n最健壮的方法实际上是同时注册一个监听器，并在 WMA 调用你的监听器时调用 `receive`，因为当\
  \ Java ME 运行时和 WMA 处理到达的传入消息时，`receive` 可能会阻塞一小段时间。我将在本章后面的“发送和接收 MMS 消息”部分向你展示这种技术。\n\
  \n当然，你只能在应用程序运行时通过这种方式接收传入消息。要在应用程序未运行时接收传入消息，你的应用程序必须在 AMS 维护的推送注册表中注册自己。反过来，当设备收到针对你的应用程序的消息时，AMS\
  \ 会调用你的应用程序。我将在接下来的“使用推送注册表”部分向你展示如何做到这一点。\n\n**管理消息头**\n\n`MultipartMessage` 实例提供了一组*头*，这些是中间服务器在消息从源点传输到目的地的过程中可能添加到消息中的名称-值对。你可以通过将头的名称传递给\
  \ `getHeader` 来获取消息头的值，也可以通过将头的名称和值传递给 `setHeader` 来设置头的值。使用 HTTP，你可以创建自己的头并包含特定于应用程序的数据。然而，`MultipartMessage`\
  \ 所代表的 MMS 协议\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**386**\n\n\
  第 14 章 ■ 使用无线消息 API 进行消息传递 只有协议规范定义的有限数量的头。表 14-2 显示了最常见的头及其用途。请注意，特定消息可能不包含所有这些头，或者可能包含表\
  \ 14-2 中未显示的其他头。\n\n**表 14-2.** *常见的 MultipartMessage 头及其含义* **头名称**\n\n**用途**\n\
  \nX-Mms-Delivery-Time\n\n消息必须传递给收件人的日期和时间\n\nX-Mms-Expiry\n\n消息应过期且 MMSC 不应传递的日期和时间\n\
  \nX-Mms-Message-Class\n\n消息的类别——Personal、Advertisement、Informational 或 Auto\n\n\
  X-Mms-Priority\n\n消息的优先级——High、Normal 或 Low X-Mms-Transaction-Id\n\n消息的分配事务 ID\n\
  \n■**注意** `MultipartMessage` 底层的 MMS 协议由开放移动联盟（OMA）及其 WAP-209-MMSEncapsulation 标准规定。如果你要深入研究\
  \ `MultipartMessage` 类和 MMS 协议，建议仔细阅读 OMA 网站（http://www.openmobilealliance.org）上的此标准及其他\
  \ MMS 文档。JSR 205 引用了此标准；JSR 206 的附录 D 讨论了 OMA 定义的 MMS 消息结构如何映射到 WMA 提供的接口。\n\n\n\
  \n**了解使用 WMA 时所需的权限** 正如使用 GCF 进行 HTTP 或套接字请求时需要权限一样，使用 GCF 获取 `MessageConnection`\
  \ 实例也需要权限。WMA 为其支持的每种消息定义了以下权限：\n\n• `javax.microedition.io.Connector.sms`：获取能够发送或接收文本或二进制\
  \ SMS 消息的 `MessageConnection` 实例所需权限\n• `javax.microedition.io.Connector.cbs`：获取能够接收\
  \ SMS-CB 消息的 `MessageConnection` 实例所需权限\n• `javax.microedition.io.Connector.mms`：获取能够发送或接收\
  \ MMS 消息的 `MessageConnection` 实例所需权限\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 14 章 ■ 使用无线消息 API 进行消息传递 **387**\n\n除了这些权限之外，你的应用程序还需要以下特定权限来发送或接收每种消息：\n\n\
  • `javax.microedition.io.Connector.sms.receive`：接收文本或二进制 SMS 消息所需权限\n• `javax.microedition.io.Connector.sms.send`：发送文本或二进制\
  \ SMS 消息所需权限\n• `javax.microedition.io.Connector.cbs.receive`：接收 SMS-CB 消息所需权限\n\
  • `javax.microedition.io.Connector.mms.receive`：接收 MMS 消息所需权限\n• `javax.microedition.io.Connector.mms.send`：发送\
  \ MMS 消息所需权限 这种细粒度的权限使用有助于防止恶意 MIDlet 在未经用户批准的情况下发送或接收消息。此外，AMS 会在允许 MIDlet 创建 `MessageConnection`\
  \ 实例或发送/接收消息之前提示用户。\n\n与其他权限一样，你必须在签署 MIDlet 进行认证和分发之前，在 JAD 文件的 `MIDlet-Permissions`\
  \ 字段中指定这些权限。\n\n**使用推送注册表**\n\n我曾在第 4 章首次向你介绍 Java ME 推送注册表，你学习了如何使用它以及 AMS 来注册一个在闹钟触发时启动的应用程序。你也可以使用推送注册表——通过\
  \ `PushRegistry` 类提供的方法——在收到传入消息时启动你的应用程序。图 14-3（包含与图 4-3 相同的事件序列）显示了当你的应用程序向推送注册表注册以接收传入消息，并且设备收到针对你应用程序的传入消息时的事件序列。\n\
  \n在第 4 章中，你只看到了如何使用 `PushRegistry` 类动态注册闹钟，该类封装了推送注册表的接口。\n\n■**注意** `PushRegistry`\
  \ 类提供所有类方法；你不需要 `PushRegistry` 的实例。这与 MIDP 配置文件中的许多其他类不同，在那些类中，你需要获取该类的单例实例并调用其方法。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**388**\n\n第 14 章 ■ 使用无线消息\
  \ API 进行消息传递 **图 14-3.** *使用推送注册表接收消息* 稍后，在第 12 章的“将套接字与 GCF 结合使用”部分，你了解了如何将 URL\
  \ 包含在 JAD 文件的 `MIDlet-Push` 字段中，用于传入端点。\n\n执行此操作时，你必须指定三项内容：\n\n• 描述入站端点的 URL（语法与\
  \ `Connector.open` 的 URL 相同）\n• 当对入站端点发出传入请求时，你希望 AMS 启动的 MIDlet 类\n• 允许建立到入站端点连接的发送方地址\n\
  \n清单 14-3 显示了一些假设的 `MIDlet-Push` 条目。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 14 章 ■ 使用无线消息 API 进行消息传递 **389**\n\n**清单 14-3.** *一些假设的 MIDlet-Push 条目* `MIDlet-Push-1:\
  \ socket://:7, com.apress.rischpater.EchoMIDLet, *`\n`MIDlet-Push-2: socket://:80,\
  \ com.apress.rischpater.HttpMIDlet, 192.168.1.128`\n`MIDlet-Push-3: sms://:1234,\
