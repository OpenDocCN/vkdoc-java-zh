  \n**104**\n\n第 5 章 ■ 构建用户界面\n\n**图 5-4.** *一个典型的 Displayable 实例、其 Command 实例及其 CommandListener\
  \ 之间的关系*\n\n**介绍基本可见项**\n\n如前所述，`Form`类负责将可见项收集到单个屏幕中。源自 Sun 的 UIWidget 示例，代码清单\
