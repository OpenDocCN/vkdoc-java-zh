  \n许多与我亲近的人提供了额外的支持，无论他们是否意识到自己正在这样做。布拉德·霍尔登、康妮·罗科西、克里斯·哈斯曼和肖恩·康德尔位列这份名单之首，在我多次怀疑自己是否能在全职工作且技术生涯之外拥有活跃生活的同时写出一本书时，他们给予了我急需的空间、工作时间以及积极的鼓励。我对他们以及其他做出贡献的人深表感激。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n引言\n\n**当**我着手撰写本书时，常常对朋友和同事们的评论感到惊讶。许多人问我，到本书出版时，其他平台（如\
  \ Android 或 iPhone）是否会让 Java 微型版（Java ME）变得过时（有些人甚至认为它会不复存在）。还有不少人指出，Java 不同分支之间的日益融合，使得关于\
  \ Java ME 的独立信息变得多余。更有几人尖刻地评论说，Java 书籍的市场已经饱和，投入时间再写一本纯属徒劳。当您决定是否阅读本书时，可能也会提出这些问题。\n\
  \n也许您对 Java ME 感兴趣，是将其作为部署现有产品的特定平台，或者您只是好奇是否应将 Java ME 技能纳入您的专业履历。\n\nJava ME 平台是一个非常成功的平台。*数十亿*——是的，是\
  \ *b* 开头的那个词——运行 Java ME 的设备如今已在消费者手中。还有更多设备正在涌现，包括手机、机顶盒以及您甚至无法想象的其他正在开发中的设备。Java\
  \ ME 在市场中根深蒂固，然而通过 Java 社区流程（JCP），它迅速演进，以应对现有和新兴竞争平台（包括 Qualcomm BREW、Android 和\
  \ Apple iPhone）提出的挑战。\n\nJava ME、Java 标准版（Java SE）和 Java 企业版（Java EE）之间的交叉融合已得到广泛认可，并将持续下去。JCP\
  \ 的成员们精心工作，引入可在这些 Java 平台间共享的 API，许多 Java ME API 是 Java SE 中提议或开发的 API 的子集。\n\n\
  在某些情况下，情况恰恰相反：Java ME API 正被引入 Java SE，例如用于通信和网络的 Java ME 框架。随着设备功能日益强大，您将看到各个 Java\
  \ 分支之间更多的融合，但移动设备的特定限制——包括无处不在的网络接入、小巧的外形以及稀缺的电力、内存和处理器资源——将推动 Java 平台内特定适配方案的需求。Java\
  \ ME 和 JCP 为供应商提供了进行这些适配的框架。\n\n有许多关于 Java 2 平台微型版（J2ME）——Java ME 的前身——的优秀书籍，也有几本关于\
  \ Java ME 各个方面的好书。然而，Java ME 平台以真正令人惊叹的速度演进和发展，这一事实以及 Java ME 的庞大规模，使得初学者很难找到一本能提供广泛基础以构建\
  \ Java ME 能力的优秀书籍。在本书中，我努力平衡介绍构成 Java ME 的两个配置文件，因为我 **xxiii**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**xxiv**\n\n## ■引言\n\n相信，为了您的成功，您需要理解两者。同时，我对所介绍的必需和可选 Java ME API 做出了明确的选择，因为我相信在构建这个基础时，您需要理解一些在\
  \ Java ME 世界中反复出现的基本原则，但您不一定需要记住每个可选 Java ME 类中的每一个方法。考虑到您的时间有限，我认为让您掌握平台基础至关重要，这样您就能更好地在日后感兴趣的领域进行专攻。简而言之，我*没有*在此呈现的内容，可能与我所*呈现*的内容同样重要。\n\
  \n**您为何应该阅读本书？**\n\n我已经部分回答了这个问题，但值得重申：Java ME 是移动计算市场不可或缺的一部分，也是每位从事移动设备开发的软件开发者都应熟悉的平台。无论您是需要每天在工作中使用它，将其视为竞争对手，还是仅仅好奇它与您当前开发应用程序的平台有何不同，理解\
  \ Java ME 基础都将使您成为更优秀的移动软件开发者。\n\n无论您是移动应用开发的新手，还是为其他平台编写过移动应用并有意学习成为 Java ME 开发者所需的知识，您都应该阅读本书。通过同等关注\
  \ Java ME 的两种配置——连接有限设备配置（CLDC）和连接设备配置（CDC）——我为您做好准备，以便为蓬勃发展的手机市场或新兴的机顶盒及具有高级用户界面和其他功能的高端手机市场编写软件。由于\
  \ Java ME 设备的核心是支持网络的设备，我花了大量时间向您解释 Java ME 用于使应用程序能够通信的 API，并让您准备好理解 Java ME 在未来几年可能使用的新通信方案。一旦您完成本书，您将有望掌握\
  \ Java ME 开发者使用的最重要的 API，并理解 Java ME 平台设计与方法背后的基本思想，以及整个移动软件市场的动态。\n\n然而，我对您也有一些期望。我假设您至少对\
  \ Java SE 有一些初步了解——包括语言本身及其支持的一些主要类。您可能不知道 HashMap 和 TreeMap 之间的区别，但您至少应对 Java 语法、Java\
  \ 包系统以及可以在 java.lang 和 java.util 包中找到的一些基本基础类有初步了解。由于它是一种重要的沟通工具，您还应对统一建模语言（UML）有初步了解，因为我经常使用\
  \ UML 类图、状态机图和序列图来帮助说明各种 Java ME 组件之间的关系。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n■引言\n\n**xxv**\n\n不过，如果您是移动软件开发的新手，也不必担心。本书的主要目标之一是帮助您理解移动软件开发市场的动态，因为这些动态已经并将继续影响\
  \ Java ME。我坚信，一位优秀的软件开发者不仅理解平台，还应理解市场背后的商业逻辑。同时，我也不期望您是 Java 专家：您可以使用最少的 Java 特定语言特性清晰地编写可靠的代码。如果我向您抛出闭包或匿名内部类，我会提前告知；我的目标是让您学会编写移动应用程序，而不是成为办公室里的\
  \ Java 大师。\n\n\n\n本着完全公开的原则，本书可能并不适合所有人。我并未详细讨论每一个可选的 Java ME API——例如，我略过了对 Java\
  \ Mobile 3D 图形 API 和 Java ME 蓝牙支持的讨论——因为其他书籍已经对此进行了充分阐述，并且它们并非每位 Java ME 开发者都必须掌握的必要内容。同样地，如果你已经拥有丰富的\
  \ Java ME 开发经验，你或许仍能从本书中学到一些东西，但将时间花在更深入地探索你感兴趣的特定可选 API 集上可能会更有价值。例如，其他资料，如描述特定\
  \ API 的 Java 规范请求（JSR）或关于特定主题的书籍，可能更适合你。我打算将本书作为面向初学者的概览，指出平台开发的规则和重要地标，而非描绘每个路口、山顶、小溪、岛屿和海湾的地图集。\n\
  \n**你应该如何阅读本书？**\n\n向新手介绍 Java ME 面临着特殊的挑战，因为在很多方面，Java ME 实际上是两个平台：一个在手机上取得了巨大成功，另一个则部署在其他消费电子市场中。作为一名工程师，我深知你有多忙碌，以及你期望我只提供解决特定平台（例如运行\
  \ Java ME CDC 的机顶盒）上的一系列问题所需的信息。因此，我将本书分为五个部分，以便你可以选择与你相关的信息。\n\n•   *第一部分，“入门”*：向你介绍每位\
