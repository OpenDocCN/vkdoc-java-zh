  \ showNotify() {\n\n    }\n\n}\n\n■**注意** 清单 16-15 *不*适用于 JSR 226，因为 JSR 226 不包含`SVGDocument`类，不支持\
  \ SVG DOM，也无法创建带有交互提示的空 SVG 图像。虽然可以在 Java ME 设备上创建 SVG XML 并使用 JSR 226 进行渲染，但您将无法获得`SVGDocument`和其他\
  \ JSR 287 类所提供的灵活性，这些类允许您操作单个 SVG DOM 元素。\n\n你需要用一个预先存在的`SVGImage`来初始化这个调用。该图像可能来自其他来源，或者你也可以通过调用`SVGImage`的静态方法`createEmptyImage`来创建一个空的`SVGImage`，如下所示：\n\
  \nSVGImage svgImage = SVGImage.createEmptyImage( null, hints );\n`createEmptyImage`的第一个参数是可选的`ExternalResourceHandler`，就像你为现有图像创建`SVGImage`时一样。第二个参数是关于`SVGImage`实例应期望从用户和\
  \ SVG 内容本身获得的交互类型的信息。它是一个位掩码，可以包含以下值（按位或运算）：\n\n• `SVGImage.INTERACTION_MODE_DISABLED`：表示不会发生与\
  \ SVG 图像的用户交互\n• `SVGImage.INTERACTION_MODE_SCRIPT_EXECUTION`：表示 SVG 图像内可能执行脚本（在大多数\
  \ API 实现中，此选项无效）\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 16 章 ■\
  \ 渲染多媒体内容\n\n**483**\n\n\n\n• SVGImage.INTERACTION_MODE_FOCUS_HIGHLIGHT：表示 SVG 图像可能包含焦点高亮，用户可更改获得焦点的元素。\n\
  \n• SVGImage.INTERACTION_MODE_IN_PLACE_TEXT_EDIT：表示 SVG 图像可能包含就地文本编辑（例如在文本字段内）。\n\
  \n• SVGImage.INTERACTION_MODE_OTHER：表示实现应支持与 SVG 图像的其他用户交互。\n\n在清单 16-15 中，`keyPressed`\
  \ 和 `run` 方法展示了如何修改 SVG 图像。当您在 SVGAnimator 的目标组件获得焦点时按下某个键，SVGAnimator 会调用 `keyPressed`，该方法会创建一个新的圆形元素，并将在后续第一个线程安全的机会中将其添加到目标文档中。由于\
  \ SVGAnimator 使用多线程，代码需要将圆形元素的添加操作与 SVGAnimator 同步；代码将新圆形添加到一个向量中，并使用 `invokeLater`\
  \ 安排更新。`run` 方法（由 Java 虚拟机在适当时机调用）实际上会将所有待处理的圆形添加到 SVG 文档中。\n\n一般来说，`Document` 和\
  \ `SVGDocument` 类允许您与特定的 SVG 文档进行交互；本示例使用 `Document` 方法 `createElementNS` 创建一个单独的圆形以绘制在图像上。要正确使用\
  \ `createElementNS`，您需要对 SVG 标准有相当深入的掌握，因为您要用它来创建 SVG 语言中的基本图元。如果您在应用程序中采用此方法，我建议您仔细研究我之前引用的\
  \ W3C 标准。\n\n当然，使用这些类，您还可以查询特定文档的 DOM；清单 16-15 中的 `run` 方法正是通过这种方式获取 SVG XML 的文档元素，根据\
  \ SVG 的定义，该元素为图像中的每个形状都包含一个子元素。您还可以使用 `SVGDocument` 继承的 `Node` 接口来更改 DOM 的元素；`run`\
  \ 方法通过调用 `appendChild` 并传入 `createElementNS` 创建的新对象来实现这一点。\n\n**在 NetBeans 中使用 SVG\
  \ 图像**\n\nSVGAPI 提供 SVG 支持的方法对于许多应用程序来说是不错的，但工作量稍大，尤其是对于许多应用程序开发者希望做的事情，例如简单地播放\
  \ SVG 动画图像、将 SVG 图像显示为启动屏幕或等待屏幕，或将其用作菜单。虽然您当然可以自己编写代码来实现这一点——这无非是组合一个使用 `SVGAnimator`\
  \ 的 `Displayable`——但这将是您、您的虚拟邻居以及许多其他 Java ME 开发者在未来几年内反复编写的代码。幸运的是，有更好的方法。\n\n\
  NetBeans IDE 的 Mobility Pack 提供了一个小包 `org.netbeans.microedition.svg`，其中包含一些用于构建\
  \ SVG 用户界面的实用类。这些类都扩展了 MIDP 的 `Canvas` 类，因此您只需使用 `Display` 类的 `setCurrent` 方法来显示其实例。更棒的是，这些类与\
  \ NetBeans IDE 集成，因此如果您使用可视化设计器构建应用程序，可以像在第 3 章中处理传统 MIDP 组件一样，将要在应用程序中使用的组件拖拽出来。`org.netbeans.microedition.svg`\
  \ 类包含以下类：\n\n• `SVGPlayer`：提供围绕 SVGAPI 的简单封装，用于播放动画 SVG 图像。它作为 `Canvas` 实现接收事件，并将其转发给\
  \ SVGAPI。\n\n• `SVGSplashScreen`：提供一个屏幕，用于显示单个 SVG 动画，并过渡到另一个屏幕。\n\n• `SVGWaitScreen`：提供一个插屏，在阻塞后台任务执行时显示\
  \ SVG 动画。\n\n• `SVGMenu`：为包含多个可选项目的 SVG 提供播放器。菜单项是单个 SVG 图像中的独立 SVG 元素。\n\n\n\n\
  **注意** 这些类包含在 NetBeans 6.1 附带的 `org.netbeans.microedition.svg` 包版本中。早期版本的 NetBeans\
  \ 也有类似的类，但在那些版本中，`SVGPlayer` 并不存在；取而代之的是 `SVGAnimatorWrapper`。如果你使用的是旧版 NetBeans，建议升级或改用\
  \ `SVGAnimatorWrapper`。升级可能是更合适的选择，因为在该包的较新版本中，`SVGAnimatorWrapper` 已被弃用。\n\n使用\
  \ NetBeans 的可视化 GUI 构建器可以轻松创建使用这些类的应用程序，当然你也可以不这样做；你也可以直接导入 `org.netbeans.microedition.svg`\
  \ 包并使用这些类。\n\n这些类及其他类正由 NetBeans 开发者社区不断优化；如果你有兴趣在比 SVGAPI 更高的层次上处理 SVG 内容，应查阅 http://wiki.netbeans.org/\
  \ 上的最新文档。\n\n**将 MMAPI 和 SVGAPI 付诸实践**\n\n你可以围绕 MMAPI 和 SVGAPI 构建一些有趣的天气应用程序，例如一个服务器端应用程序，以\
  \ SVG 动画形式向 Java ME 客户端提供天气预报；或者一个天气博客应用程序，允许用户查看、分享和交互天气数据。然而，这些应用都会相当复杂。因此，与其将\
  \ MMAPI 或 SVGAPI 集成到我在本书中提到的 WeatherWidget 示例中，不如在本节中介绍一个简单的媒体播放器应用程序，它同时使用 MMAPI\
  \ 和 SVGAPI 播放媒体。该应用程序打开时会显示一个媒体文件列表\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
