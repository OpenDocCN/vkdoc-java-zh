  \n第 17 章 ■ 寻路\n\n**505**\n\n`LocationProvider` 实例，您就可以通过分别调用 `LocationProvider`\
  \ 的 `getLocation` 或 `getLastKnownLocation` 方法来确定当前位置或最后已知位置（可能为 null）。许多 `LocationManager`\
  \ 方法可能会抛出异常——通常是针对基于位置故障的 `LocationException`，或者如果用户或平台不允许该操作，则抛出 `SecurityException`。\n\
  \n■**提示** 位置确定可能是一个耗时的过程，并且 `LocationProvider` 实现可能会阻塞当前线程。因此，最好在独立于主线程的线程中调用 `getLocation`，以避免阻塞应用程序的用户界面。在本章后面的“定位用户”部分，我将向您展示如何在实际的\
  \ MIDlet 中执行此操作。\n\n`LocationProvider` 类的 `getLocation` 方法返回的特定 `Location` 实例提供了设备在实现使用特定定位方法确定的特定时间点的位置。当您调用\
  \ `getLocation` 时，必须传入一个数字，指示您的应用程序愿意等待定位请求完成的最大秒数。\n\n通过 `Location` 实例，您可以使用以下方法来获取更多关于设备位置的信息：\n\
  \n*   `isValid`：如果 `Location` 有效且包含坐标，则返回 true\n*   `getQualifiedCoordinates`：返回\
  \ `Location` 的坐标\n*   `getTimestamp`：返回位置数据收集的时间\n*   `getAddressInfo`：返回街道地址（作为\
  \ `AddressInfo` 对象）\n*   `getCourse`：返回相对于真北的航向（以度为单位）\n*   `getSpeed`：返回测量时设备当前的地面速度（以米/秒为单位）\n\
  *   `getLocationMethod`：返回一个描述实现如何确定位置的位掩码\n*   `getExtraInfo`：返回关于请求的任何额外信息\n表\
