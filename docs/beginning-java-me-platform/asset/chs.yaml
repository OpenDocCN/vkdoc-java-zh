  \ `RecordComparator` 值，这有点奇怪，但这就是它的工作方式。一旦获得枚举器，你就可以简单地遍历枚举器，并将每条记录的位置插入结果数组的相应字段中。由于此方法模拟了在内存中拥有整个位置列表的效果，你可以将整个事件序列包装在异常处理器中。\n\
