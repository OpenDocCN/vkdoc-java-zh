  \n第 13 章 ■ 访问 Web 服务\n\n**371**\n\n大部分工作都在类的 `parse` 方法中完成，该方法接收一个用于读取 XML 的字节流。它创建一个\
  \ `KXmlParser` 实例，设置解析器从由传入字节流派生的 `InputStream` 中读取数据，然后在一个 `while` 循环中开始从解析器读取标签。该循环仅使用一个\
  \ `switch/case` 语句，为解析器遇到的 XML 令牌类型生成解析器事件，并调用我从 `LocationParserHandler` 实现中派生的事件处理器。\n\
  \n每个解析器的事件处理器都接收一个 `KXmlParser` 实例，以便它可以向解析器查询关于该事件的更多信息，例如遇到的标签名称（由 `getName` 返回）、属性值（由\
  \ `getAttributeValue` 返回），或者解析器在标签内遇到的字符数据（由 `getText` 返回）。\n\n\n\n在 WeatherWidget\
  \ 中使用支持 kXML 的 LocationParser 与使用 JSR 172 SAX 解析器几乎完全相同，如清单 13-13 所示。\n\n**清单 13-13.**\
