  \ 图像；如果你是为生产应用程序编写代码，则应扩展 `MMSSender` 以接受你提供的图像数据的 MIME 类型，并为 `getSnapshot` 方法指定特定的\
  \ MIME 类型。\n\n**播放 SVG 内容**\n\n回到 `MultimediaMIDlet`，播放 SVG 内容的流程是类似的。`playFromResource`\
  \ 方法调用 `initSvgPlayer` 和 `configViewSvg`，然后使用生成的 `svgAnimator` 的 `play` 方法开始播放。由于\
  \ SVGAPI 处理媒体渲染的方式与 MMAPI 略有不同，`initSvgPlayer` 中的流程也不同，尽管 `configViewSvg` 仍然是一个空方法，就像\
  \ `configViewSound` 一样。`initSvgPlayer` 方法与你在清单 16-12 中首次看到的伪代码非常相似。\n\n`initSvgPlayer`\
  \ 方法首先获取 JAR 文件中 SVG 图像的 `InputStream` 实例，然后使用该数据和默认的 SVGAPI `ExternalResourceHandler`\
  \ 创建一个新的 `SVGImage` 实例。有了图像后，该方法接下来创建它将用于播放动画的 `svgAnimator`；如果 SVG 是静态图像，那也没问题，因为当\
  \ `playFromResource` 调用 `svgAnimator.play` 时，它会被 `svgAnimator` 实例渲染。使用 `svgAnimator`，`initSvgPlayer`\
  \ 获取 `SVGAnimator` 的 `Canvas` 实例，并将其保存为当 `playFromResource` 设置下一个 `Displayable`\
  \ 时 MIDlet 应显示的 `Displayable`。最后，此方法获取 `svgCanvas` 的默认边界，并使用它们初始化 `svgImage` 的视口，以获取并设置图像在显示器上的最佳渲染矩形。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 16 章 ■ 渲染多媒体内容\n\n**497**\n\
  \n**总结**\n\n通过 JSR 135 和 JSR 287 中记录的可选 API，Java ME 平台为你的应用程序提供了以多种不同格式（包括 WAV、MPEG\
  \ 和 SVG）渲染丰富音频和视频的能力。尽管 JSR 135 定义的 MMAPI 与 JSR 287 定义的 SVGAPI 有根本不同，但它们共同为你的应用程序\
  \ UI 设计提供了广泛的自由度。\n\nMMAPI 使用一种让人联想到许多用户界面框架（如 Swing）所使用的 MVC 范式的范式。你的应用程序获取或向播放器提供数据源，该播放器可以由一个或多个控件控制，这些控件可以以某种方式影响媒体渲染。MMAPI\
  \ 提供了一个 `Manager` 类，该类在给定数据源（例如 `InputStream` 实例或指定数据源位置的定位器）时提供单独的 `Player` 实例。定位器可以指向设备上的媒体、来自设备上的传感器或来自网络上的设备；许多（但不是所有）MMAPI\
  \ 实现都支持通过 HTTP、RTP 或 RTSP 进行某种形式的远程媒体访问。\n\n由于 MMAPI 为专用硬件资源提供了 Java ME 包装器，使用 MMAPI\
  \ 的应用程序需要仔细考虑何时使用这些资源。`Player` 接口实现了一个状态机，有助于限制对设备上有限资源的访问。`Player` 对象可以处于五种状态之一：未实现、已实现、预取、已启动或已关闭。`Player`\
  \ 接口提供了在这些状态之间转换的方法；通常，你的应用程序会创建一个 `Player` 实例，并且仅在通过 `start` 开始播放之前调用其 `realize`\
  \ 和 `prefetch` 方法。\n\n\n\nMMAPI Player 对象同时也是 Control 对象的工厂；Control 可以改变 Player\
  \ 的行为（例如调整音量），或提供额外的功能，例如提供一个接口，从中获取可用于在媒体文件中显示视频的用户界面组件。在 Java 设备上从音频和视频传感器进行捕获就是这样工作的；你为设备指定一个定位器，然后可以使用\
  \ VideoControl 的 `getSnapshot` 方法获取图像快照，或者使用 RecordControl 类来录制音频或视频数据流。然而，并非所有设备都支持音频或视频捕获，Java\
  \ ME 运行时提供了系统属性，这些属性精确枚举了特定 MMAPI 实现所支持的媒体类型和传感器。某些设备可能支持 JSR 234，它定义了额外的 Control\
  \ 子类，你可以与 MMAPI 一起使用来控制捕获传感器以及执行额外的多媒体操作。\n\n另一方面，SVGAPI 支持 W3C 定义的 SVG Tiny 1.2\
  \ 标准。使用 SVG，你可以定义静态或动画图像，这些图像在几乎任何渲染尺寸下都显得清晰且无像素化。实际上，你可以通过在 SVG 文档中指定事件来构建应用程序用户界面的整个部分，你的\
  \ Java ME 应用程序可以接收这些事件以响应用户操作，例如焦点变化。SVG 基于 XML；许多基于矢量的绘图程序都支持这一广泛采用的标准，使其广泛适用于移动内容开发者。通过其包和类，SVGAPI\
  \ 拥有一套丰富的功能，包括能够通过 SVG DOM 访问 SVG 文档的各个部分。事实上，你甚至可以即时创建 SVG 图像，让用户在你的应用程序中直接在 Java\
  \ ME 设备上创建新的 SVG 图像。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**498**\n\
  \n第 16 章 ■ 渲染多媒体内容\n\n你可以通过两种方式之一使用 SVGAPI 来渲染图像：你可以使用 `SVGImage` 类来渲染静态图像，或者使用\
  \ `SVGAnimator` 类来渲染动态图像。这些类与 MIDP Canvas 子类或 AWT Component 子类配合使用，具体取决于目标设备的 Java\
  \ ME 配置。通常，创建 `SVGImage` 实例并将渲染委托给 `SVGAnimator` 是最简单的方法，`SVGAnimator` 拥有自己的渲染线程和状态机来管理动画\
  \ SVG 图像以及 SVG 图像所需的任何用户交互。最后，如果你只是使用 NetBeans 快速开发一个应用程序，并且需要一个简单的容器来容纳动画 SVG（例如，用于启动画面或插屏显示），NetBeans\
  \ 本身提供了一个包含一些简单组件的包，用于渲染静态或动画 SVG 图像。你可以直接从 NetBeans GUI 构建器中使用这些组件，从而轻松地将基于 SVG\
  \ 的功能添加到你的应用程序中。\n\n无论你的应用程序将要渲染哪种多媒体，多媒体应用程序中的线程管理都至关重要。你绝不应尝试在主应用程序或 MIDlet 线程上使用\
  \ MMAPI 或 SVGAPI 渲染多媒体，因为执行渲染所需的工作可能会阻塞 UI 线程，使设备感觉迟钝或无法使用。MMAPI 和 SVGAPI 都为你提供了在主线程上调度操作的接口，并且你可以使用简单的\
  \ Java 原语（例如通过 `synchronized` 关键字或监视器变量进行同步）来协调主 UI 线程与任何多媒体线程之间的活动。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 17 章\n\n寻找方向\n\n**对**于许多开发者来说，基于位置的服务（LBS）应用程序的潜力是当今 Java ME 开发中最令人兴奋的方面。将用户位置与网络可用数据（用于地理编码的商业位置、定位其他用户、实时交通、天气和其他事件信息）结合使用的新应用程序的潜力简直令人震惊。全新的市场正在涌现，例如经济高效的实时位置感知导航；涉及朋友位置的社交网络；以及透明地利用设备位置的调度和紧急服务应用程序。JSR\
  \ 179 定义了位置 API，它提供了一个简单的可选 API，用于确定设备的位置并与其他应用程序共享位置偏好。\n\n在本章中，我首先为之前未接触过 LBS\
  \ 背后技术的读者做一些简要介绍。接下来，我将介绍位置 API，描述 JSR 179 为在 Java ME 设备上启用 LBS 而定义的包和类，并向你展示如何在开发和调试应用程序时使用\
  \ Sun Java Wireless Toolkit 模拟位置数据。在本章结尾，我将向你展示 WeatherWidget 应用程序的一个扩展，该扩展允许用户在获取天气数据时指定其当前位置，而不是输入位置。\n\
  \n**理解基于位置的服务**\n\n多年来，包括美国在内的许多国家的应急管理官员已经能够确定电话呼叫者的位置。（在美国，这是 911 系统的关键部分；在任何电话上拨打\
  \ 911 都会接通紧急调度员，该调度员拥有你拨打电话所在位置的信息。）在 20 世纪 90 年代中期，许多国家的政府要求运营商为无线电话用户提供相同的信息，使应急响应人员拥有与处理有线电话紧急呼叫时相同的能力。这推动了多种移动手机定位技术的创建，包括辅助全球定位系统（A-GPS）和各种蜂窝基站三角测量系统。最初主要用于紧急目的，网络运营商热衷于寻找一种方式来对此服务收费，因为提供基于位置的信息在网络基础设施上产生了高昂的成本，这是由于需要对其网络基础设施进行硬件改造。与此同时，许多企业迅速认识到位置感知无线终端在车队管理和社交网络等多种应用中的市场潜力。\n\
  \nLBS 服务的首次商业推出是 2001 年日本 KDDI 公司；日本早期的服务获得了广泛赞誉和快速采用。在其他地方，采用速度较慢，但随着包括 Java ME、高通公司的无线二进制运行时环境（BREW）、苹果的\
  \ iPhone 和谷歌的 Android 在内的移动平台为 LBS 应用程序提供 API，现在正达到临界规模。此外，运营商已在其网络上为应用程序提供该服务。\n\
  \n如今，有几种商用系统允许无线设备高精度地确定其位置，前提是它们能够访问一个或多个广域网（WAN）服务。最著名的是 GPS，设备利用从轨道卫星接收的无线电信号中得出的信息来三角测量其位置。虽然商用\
  \ GPS 接收器以低成本用于工业和私人目的已有十多年，但商用 GPS 有两个主要缺点，使其不适合作为移动设备定位的唯一手段。首先，GPS\n\n\n\n接收器需要清晰的天空视野，才能接收服务所使用的卫星发出的无线电信号。其次，GPS\
  \ 的精度会因大气效应和一项名为“选择可用性”（SA）的特定 GPS 功能而有所变化，该功能允许美国政府战时降低民用 GPS 的精度。幸运的是，SA 目前已被停用，并且随着民用\
  \ GPS 的广泛普及，它不太可能被重新启用，但其他误差仍可能导致数米的偏差。如今，出于政治和经济原因，全球各地都在持续努力开发其他全球导航辅助系统，为 GPS（可在全球任何地方工作）提供国际替代方案。\n\
  \n为了解决 GPS 固有的问题，人们提出了其他几种方案，包括 A-GPS 和各种形式的网络三角测量。A-GPS 通过利用从设备可能使用的蜂窝基站数据中收集到的关于设备位置的额外提示来工作，并将确定位置所需的大量数学处理工作委托给网络资源。三角测量技术则依赖于根据从本地蜂窝基站（以及最近的本地\
  \ Wi-Fi 基站）接收到的信号来确定设备的位置。为了确保快速的定位时间以及高精度和高可用性，当今的无线手持设备通常集成了多种定位方案。\n\n虽然确定设备位置的具体方式可能有所不同，但定位系统提供的结果是相同的：设备的坐标，通常是在特定时间点根据一个*基准面*（地球表面的数学模型）计算出的经纬度。由于定位系统是近似的——大气效应、多径效应等无线电传播效应以及其他因素即使是最好的定位系统也会引入误差——系统提供的位置信息会包含一个位置*精度*的概念，通常是一个半径。坐标和半径定义了一个设备可能位于其中的圆形区域。在设计应用程序时，务必记住位置数据是近似的——即使考虑了位置圆也是如此。设备有可能落在定位圆之外，尽管在实践中这种情况并不常见。这种定位误差通常被称为位置的*不确定性*，在某些系统中，您可以用位置不确定性来换取其他因素，例如确定设备位置所涉及的时间或财务成本。根据设备和网络的能力，位置信息还可能附带设备的海拔高度、速度和航向（运动方向），但这并非总是可用。\n\
  \n由于定位系统本身的特性，从电池电量、时间和用户成本的角度来看，获取设备位置是一项昂贵的操作。定位可能需要稀缺的设备资源以及与远程服务器的网络事务，因此设备提供的是近实时的位置数据，而非实时数据。\n\
  \n**介绍位置 API**\n\nJava ME 位置 API 定义了 `javax.microedition.location` 包，其中包含一组类，允许应用程序请求和获取位置结果。位置\
  \ API 旨在与 CLDC 和 CDC 设备一起使用，但它仅适用于 CLDC 1.1 及更高版本的设备，因为定位框架需要浮点数学支持才能向您的应用程序提供经纬度信息。\n\
  \n位置 API 将设备的定位子系统从您的应用程序中抽象出来，为您提供一种以最能满足应用程序约束（例如位置获取时间、不确定性和用户成本）的方式来确定设备位置的方法。您可以只请求一次位置（通常称为*单次*定位请求），或者您可以请求\
  \ API 在应用程序运行时发送设备位置的通知。所有位置 API 实现都必须在位置响应中提供经纬度坐标、设备确定位置的时间以及精度度量。根据设备的硬件，位置数据还可能包括设备的方向（指南针、俯仰角和横滚角）、设备移动的速度，以及更人性化的数据，例如位置的街道地址。\n\
  \n位置 API 提供了一个大多数其他平台上的 API（例如，高通公司的 BREW）所不具备的额外功能，那就是访问系统范围的地标数据库以及这些地标的位置。这允许设备的原生软件和设备上的所有应用程序共享一个通用的用户指定位置存储库，例如用户的居住地和工作地点。这使得用户能够在设备上的所有\
  \ LBS 应用程序中获得一致的用户体验。\n\n**理解位置 API**\n\n`javax.microedition.location` 包定义了九个类、两个接口和两个异常。除了继承自\
  \ `Exception` 的异常之外，类层次结构几乎是完全扁平的，这体现了 API 及其所抽象领域的简洁性。该包提供了以下类：\n\n*   `LocationProvider`：表示设备内能够确定设备位置的硬件或软件模块。它提供了一个静态工厂方法，该方法返回配置为响应特定位置请求的特定\
  \ `LocationProvider` 实例。\n*   `Criteria`：表示适用于位置请求的特定标准，例如所需的精度和用户成本。\n*   `Location`：表示关于位置的基本信息集合，包括时间戳、坐标、精度、速度、航向以及关于用于确定位置的方法的信息，以及可选的文本地址。\n\
  *   `Coordinates`：表示位置的纬度、经度和海拔高度，并提供了在坐标的浮点表示和人类可读的文本表示之间进行相互转换的方法。\n*   `QualifiedCoordinates`：表示与坐标精度测量相关联的纬度、经度和海拔高度三元组。它是\
  \ `Coordinates` 的子类。\n*   `AddressInfo`：表示关于位置的文本信息，例如街道地址。`AddressInfo` 类封装了一个通过清单常量访问的字段集合。\n\
  *   `Orientation`：表示终端在空间中的物理方向，包括方位角（水平指向方向）、俯仰角（垂直仰角）和横滚角（围绕设备自身纵轴的方向）。\n*   `LandmarkStore`：表示单个用户地标的存储库。始终存在一个默认的地标存储库，并且实现可以提供额外的命名地标存储库供应用程序使用。\n\
  *   `Landmark`：表示一个具有用户提供名称的已知位置，由名称、一个 `QualifiedCoordinates` 对象和一个 `AddressInfo`\
  \ 对象组成。\n\n该 API 定义了两个接口：`LocationListener` 和 `ProximityListener`。`LocationListener`\
  \ 为您的应用程序提供了一种通过其 `locationUpdated` 方法定期从 API 实现接收位置报告的方式，并且它允许\n\n\nAPI 实现，用于在位置数据源发生变化时（例如，由于从一个网络切换到另一个网络）通知您的应用程序。当您希望持续接收位置通知时（例如，在设备移动时提供实时位置报告的应用程序），可以使用\
  \ `LocationListener` 接口。`ProximityListener` 接口则允许您的应用程序等待终端进入特定坐标附近范围的临近通知。使用 `ProximityListener`\
  \ 来确定设备何时到达预定位置比使用 `LocationListener` 更高效，因为定位硬件的底层实现可能具有类似的能力。它也更容易；您无需为了判断设备是否到达目标位置而接收和管理常规的位置报告。\n\
  \n`LocationException` 和 `LandmarkException` 是实现在定位子系统或地标存储发生严重故障时可能抛出的异常。对于这两种异常，与异常关联的字符串提供了关于故障细节的额外信息。\n\
  \n您可以使用位置 API 做两件事：确定设备的位置，以及管理用户为 LBS 应用程序创建的地标。\n\n**使用位置 API 确定设备位置**\n\n使用位置\
  \ API 需要您执行三个步骤：**1.** 建立位置请求的（可能由用户指定的）条件。\n\n**2.** 获取一个 `LocationProvider` 实例，该实例能够以满足您条件的方式向您的应用程序提供设备的位置。\n\
  \n**3.** 确定位置的坐标。\n\n清单 17-1 中的伪代码展示了这一基本事件序列。\n\n**清单 17-1.** *确定设备位置* try {\n\n\
  Criteria cr = new Criteria();\n\ncr.setHorizontalAccuracy(10);\n\nLocationProvider\
  \ lp = LocationProvider.getInstance(cr); Location l = lp.getLocation(60);\n\nCoordinates\
  \ c = l.getQualifiedCoordinates();\n\nif (c != null) {\n\n// 对位置信息进行处理\n\n}\n\n\
  } catch (LocationException e) {}\n\ncatch (Exception e) {}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
