  \ 表示支持 `VK_0` 到 `VK_9`（数字键盘），`8` 表示支持 `VK_A` 到 `VK_Z` 以及 `VK_SPACE` 和 `VK_BACK_SPACE`（字母数字键盘）。*\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**242**\n\n第 9 章 ■ 介绍 Xlet\
  \ 和个人基础框架配置文件\n\n**获取 Xlet 属性和资源**\n\n正如您在本章“使用 Xlet 上下文”一节中所见，应用程序运行时提供给您的 Xlet\
  \ 的 `XletContext` 包含用于获取运行时属性的 `getXletProperty` 方法。目前 Java ME 标准本身定义的唯一属性是 `XletContext.ARGS`\
  \ 属性，它允许您的应用程序收集用户在启动应用程序时传递的任何命令行启动参数，从而使应用程序管理器能够将选项传递给您的 Xlet。\n\nXlet 还可以使用静态类方法\
  \ `System.getProperty` 查询系统属性，该方法通常返回平台专有的系统级属性，而不是由您的应用程序所运行的 PBP 或 PP 实现定义的运行时属性。例如，对于面向视听市场的\
  \ Java ME 消费设备，这些属性包括有关文件系统、广播配置文件、互联网访问可用性以及附加包（如 UI 小部件集，例如 HAVi 包）版本号的信息。\n\n\
  Xlet 通常打包为 JAR 文件，因此您可以将其他资源作为关联 JAR 文件的一部分包含在应用程序中。要访问 Xlet 的 JAR 文件中的其他资源，您的实现必须使用\
  \ Xlet 上下文的类加载器，就像在独立应用程序或小程序中一样。例如，您可以编写如清单 9-6 所示的代码。\n\n**清单 9-6.** *从 Xlet JAR\
  \ 文件访问图像*\n```java\nClassLoader cl = context.getClassLoader();\nIcon icon = new\
  \ ImageIcon(cl.getResource(\"images/icon.png\"));\n```\n使用 `XletContext` 提供的类加载器，您可以按名称获取应用程序和系统资源，并且可以使用以下方法之一获取资源的\
  \ URL 或 `InputStream`：\n\n*   `getResource`：返回命名资源的 URL\n*   `getResourceAsStream`：返回命名资源的\
  \ `InputStream`\n*   `getSystemResource`：返回命名系统资源的 URL，该资源是目标硬件的平台特定属性\n*   `getSystemResourceAsStream`：返回命名系统资源的\
  \ `InputStream`，该资源是目标硬件的平台特定属性\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 介绍 Xlet 和个人基础框架配置文件\n\n**243**\n\n**与其他 Xlet 通信**\n\n\n\nMIDP 提供的 MIDlet\
  \ 执行模型与 PBP 提供的 Xlet 执行模型之间的一个关键区别在于，Xlet 执行模型要求 Xlet 支持基本的 Xlet 间通信（IXC）。对于 Xlet\
  \ 而言，数据共享正变得越来越重要，因为能够运行 Xlet 的平台通常可以访问大量数据（通过广播或因特网等广域网），但应用程序和数据的存储空间却有限。因此，应用程序之间的数据共享变得愈发关键，因为让每个应用程序都包含访问和解码网络数据源所需的代码，并缓存其运行所需数据的副本，这种做法并不现实。\n\
  \n在 Java 环境中，应用程序共享数据的常用方式是通过 Java RMI 栈，它支持应用程序间和设备间的通信。实际上，RMI 栈的一个健壮子集*可以*用于\
  \ Java ME；这在 JSR 66 中有所讨论，我将在第 11 章中更详细地探讨。这种对 RMI 的支持对于某些机顶盒以及其他严重依赖中间件的平台至关重要，因为\
  \ RMI 使服务器和客户端能够以 Java 原生、面向对象的方式交换数据，从而简化了多层系统的设计和部署。\n\n然而，并非所有 PBP 设备都需要完整的 RMI\
  \ 栈，因此 PBP 仅定义了适合让 Xlet 共享数据的 RMI 子集。毫不意外的是，PBP 机制紧密地镜像了 RMI 架构，利用了一些类以及相同的基本流程来定义通信过程。\n\
  \nIXC 要求数据由封装了待共享数据的共享 Java 对象来表示。这些对象必须是*可远程的*——也就是说，它们必须实现 `java.rmi.Remote` 接口。Xlet\
  \ 通过 IXC 注册表共享这些可远程对象，该注册表是一个单例，由本地主机上运行的所有 Xlet 共享，可通过 `XletContext` 获取。Xlet 可以使用\
  \ IXC 注册表注册可远程对象，也可以通过注册表获取对远程对象的访问权限。图 9-5 展示了两个不同 Xlet 与它们共享的一个对象之间的关系示意图。\n\n\
  如图表所示，第一个 Xlet 通过注册表共享的对象与第二个 Xlet 实际使用的对象之间存在细微差别。由于 Java 类加载器的运作方式，Xlet 不能简单地直接共享对象；相反，IXC\
  \ 注册表会创建并返回一个存根对象，该对象充当共享对象的代理。这与 RMI 模型类似，不过在完整的 RMI 实现中，要么必须使用 RMI 编译器生成存根（如果你使用的是\
  \ Java 5 之前的版本），要么 RMI 运行时可以自动完成此操作（如果你使用的是 Java 5 之后的版本）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**244**\n\n第 9 章 ■ 介绍 XLETS 和 PERSONAL BASIS PROFILE\n\n**图 9-5.** *两个 Xlet 与它们共享的一个对象之间的关系*\
  \ **实现一个共享对象**\n\n考虑一个能够显式访问网络并希望与其他应用程序共享数据的 Xlet。你必须将此数据包装在一个可远程类中，如清单 9-7 所示。\n\
  \n**清单 9-7.** *使用 IXC 导出的数据包装类*\n\nimport java.rmi.*;\n\npublic class Location\n\
  \nimplements java.rmi.Remote {\n\nprivate String location;\n\nprivate String forecast;\n\
  \npublic Location() {\n\n}\n\npublic void setLocation(String l)\n\nthrows RemoteException\
  \ {\n\nlocation = l;\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  第 9 章 ■ 介绍 XLETS 和 PERSONAL BASIS PROFILE\n\n**245**\n\npublic void setForecast(String\
  \ f)\n\nthrows RemoteException {\n\nforecast = f;\n\n}\n\npublic String getLocation()\n\
  \nthrows RemoteException {\n\nif (location != null) {\n\nreturn location;\n\n}\n\
  \nelse {\n\nreturn \"\";\n\n}\n\n}\n\npublic String getForecast()\n\nthrows RemoteException\
  \ {\n\nif (forecast != null) {\n\nreturn forecast;\n\n}\n\nelse {\n\nreturn \"\"\
  ;\n\n}\n\n}\n\n}\n\n\n\n这些内容相当简单，除了该类与通用数据容器类之间存在两个关键区别：声明中导入了 `java.rmi`，并且每个访问器和修改器都可能抛出\
  \ `java.rmi.RemoteException`。在实现可远程类时，其所有方法都可能抛出 `java.rmi.RemoteException`，因为该类的实现实际上可能是由\
  \ IXC 注册表提供的远程存根，并且可能无法与该类的实际实例进行通信。\n\n正如我之前所述，整个 `java.rmi` 类层次结构*并非*全部可用于运行在\
  \ PBP 之上的 Xlet。相反，PBP 仅要求以下 RMI 类：\n\n• `java.rmi.Remote`：用于标识可远程类\n• `java.rmi.AccessException`：当远程对象的调用者没有执行所请求操作的权限时抛出\n\
  • `java.rmi.AlreadyBoundException`：如果尝试将对象绑定到注册表中一个已绑定到其他对象的名称时抛出\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**246**\n\n第 9 章 ■ 介绍 XLET 和 PERSONAL BASIS PROFILE\n\n• `java.rmi.NotBoundException`：如果尝试查找或解绑一个没有关联绑定的对象时抛出\n\
  • `java.rmi.RemoteException`：远程方法调用期间可能发生的通信相关异常的通用超类\n• `java.rmi.UnexpectedException`：如果远程方法调用的客户端接收到一个异常，该异常不在远程接口中方法的\
  \ throws 子句声明的异常类型之列时抛出\n• `java.rmi.registry.Registry`：远程对象注册表的远程接口\n\n重要的是要记住，IXC\
  \ 机制允许你调用另一个 Xlet 上下文中的对象的方法，而不是在最简单的意义上共享数据。换句话说，你不能通过 IXC 和实现了 `java.rmi.Remote`\
  \ 的对象来获取或修改对象的属性；相反，你必须通过方法来提供属性。鉴于这本身就是良好的面向对象实践，这应该不是问题，但这确实意味着需要为你希望远程 Xlet 可用的类中的任何字段定义适当的访问器和修改器方法。这就是为什么\
  \ `Location` 将 `setLocation`、`setForecast`、`getLocation` 和 `getForecast` 定义为私有字段的修改器和访问器，而不是简单地将这些字段设为公有。\n\
  \n**共享对象以供其他 Xlet 查找**\n\n一旦你定义了可远程对象，你仍然需要让它们对其他 Xlet 可用。这需要两步过程：首先，创建你的 Xlet 将要共享的对象，然后将它们添加到系统范围的\
  \ Xlet 注册表中。该注册表是 `javax.microedition.xlet.ixc.IxcRegistry` 的一个实例，它维护了机器上运行的所有 Xlet\
  \ 注册的对象的名称-对象映射。\n\n■**注意** 不要将 `IxcRegistry` 与 `java.rmi.Naming` 或 `java.rmi.registry.LocateRegistry`\
  \ 注册表混淆；即使机器上可用 RMI，`IxcRegistry` 也是一个独立的可远程对象注册表。\n\n你不能直接获取 `IxcRegistry` 的实例；相反，你需要从\
  \ `XletContext` 中获取一个。在底层，PBP 实现在 `IxcRegistry` 实例和 `XletContext` 之间维护严格的一一对应关系，通过系统范围的\
  \ IXC 导出对象数据库共享数据。使用 `IxcRegistry`，你可以执行以下操作：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 介绍 XLET 和 PERSONAL BASIS PROFILE\n\n**247**\n\n• 通过调用其静态方法 `getRegistry`\
  \ 获取特定上下文的 `IxcRegistry` 实例。\n• 使用 `bind` 方法将实现了 `java.rmi.Remote` 的对象注册到一个唯一的名称。\n\
  • 使用 `list` 返回一个字符串数组，命名注册表中的每个绑定对象。\n• 调用 `lookup` 来检索特定的 `Remote` 对象。\n• 使用 `unbind`\
  \ 注销特定对象，或使用 `unbindAll` 注销当前 `XletContext` 中注册的所有对象。\n\n\n\n• 使用 `rebind` 方法，将一个新的实现了\
  \ `java.rmi.Remote` 接口的对象注册到一个已存在的名称上。\n\n清单 9-8 展示了一个原型 Xlet 如何向其他 Xlet 提供一个远程的\
  \ Location 实例。\n\n**清单 9-8.** *一个为 IXC 消费生成对象的 Xlet* import java.rmi.*;\n\nimport\
  \ javax.microedition.xlet.*;\n\nimport javax.microedition.xlet.ixc.*;\n\npublic\
  \ class XletLocationProducer implements Xlet {\n\nprivate XletContext context;\n\
  \nprivate Location location;\n\nprivate static final String NAME =\n\n\"XletLocationProducer.Location\"\
  ;\n\npublic XletLocationProducer () {\n\n}\n\npublic void initXlet( XletContext\
  \ c )\n\nthrows XletStateChangeException {\n\nlocation = new Location();\n\ncontext\
  \ = c;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**248**\n\n第 9 章 ■\
  \ 介绍 Xlet 和 Personal Basis Profile\n\ntry {\n\nIxcRegistry registry = IxcRegistry.getRegistry(context);\
  \ if ( registry == null ) {\n\nthrow new XLetStateChangeException(\"No registry\"\
  );\n\n}\n\nregistry.bind(NAME, location);\n\n}\n\ncatch(AlreadyBoundException e){\n\
  \nthrow new XletStateChangeException(\"Something bound\");\n\n}\n\ncatch(StubException\
  \ e){\n\nthrow new XletStateChangeException(\"Stub error\");\n\n}\n\n}\n\npublic\
  \ void pauseXlet() {\n\n}\n\npublic void startXlet()\n\nthrows XletStateChangeException\
  \ {\n\n}\n\npublic void destroyXlet(boolean b)\n\nthrows XletStateChangeException\
  \ {\n\nIxcRegistry registry = IxcRegistry.getRegistry(context); if ( registry ==\
  \ null ) {\n\nthrow new XLetStateChangeException(\"No registry\");\n\n}\n\nregistry.unbindAll();\n\
  \n}\n\n}\n\n该 Xlet 在初始化期间创建了一个它想要远程化的 Location 类实例，并使用当前 XletContext 的 IxcRegistry\
  \ 将其绑定到名称 XletLocationProducer.Location。这*应该*总是成功的，但可能因以下三个原因之一而失败：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 介绍 Xlet 和 Personal Basis Profile\n\n**249**\n\n• IxcRegistry 无法为 XletContext\
  \ 获取一个实例。这种情况本不应发生，但如果发生了，得到的 registry 将为 null。\n• 另一个 Xlet 已经将一个远程对象绑定到了名称 XletLocationProducer.Location。如果该\
  \ Xlet 在多个上下文中运行，或者另一个 Xlet 为其想要远程化的对象使用了相同的名称，就可能发生这种情况。\n• IxcRegistry 未能为远程化的类创建存根。\n\
  \n在这些失败中，最可能的是 StubException，如果你没有正确实现你的远程类，就可能发生这种情况。要正确实现你的远程类，你必须确保：\n• 该类实现了\
  \ `java.rmi.Remote`\n• 每个远程对象方法在其 throws 子句中声明了 `java.rmi.RemoteException`\n• 每个远程对象方法的类型只接受并返回原始\
  \ Java 类型（当然包括 void）或那些扩展了 `java.io.Serializable` 的类\n仔细想想，这些限制是合理的，因为 IXC 机制必须有一种方式来知道远程对象是可远程化的，能够处理远程执行期间遇到的异常，并且能够在远程执行期间将对象从一个\
  \ Java 类加载器传递到另一个。\n\n在 Xlet 退出时，该 Xlet 使用 `unbindAll` 从 IxcRegistry 中注销该对象。这也可能失败，但在退出时\
  \ Xlet 对这些失败几乎无能为力，因此 Xlet 仅记录这些失败以便调试。Xlet 并非必须执行此操作——运行时会在它不执行时自行处理——但这是一个好习惯。\n\
  \n■**提示** 当你的 Xlet 退出时，此时使用 `unbindAll` 而不是为每个命名对象调用 `unbind`，这样如果你向 registry 添加了额外的对象，就不需要再添加相应的\
  \ `unbind` 请求。\n\n**使用共享对象**\n\n在任何时候，一个 Xlet 都可以通过另一个 Xlet 用于注册对象的知名名称，向 IxcRegistry\
  \ 查询一个远程对象。清单 9-9 展示了一个假设的消费者 Xlet，它使用了由 XletLocationProducer 共享的 Location 对象。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**250**\n\n第 9 章 ■ 介绍 Xlet\
  \ 和 Personal Basis Profile\n\n**清单 9-9.** *访问远程对象*\n\nimport java.rmi.*;\n\nimport\
  \ javax.microedition.xlet.*;\n\nimport javax.microedition.xlet.ixc.*;\n\npublic\
  \ class XletLocationConsumer implements Xlet {\n\nprivate XletContext context;\n\
  \nprivate Location location;\n\nprivate static final String NAME =\n\n\"XletLocationProducer.location\"\
  ;\n\npublic XletLocationConsumer () {\n\n}\n\npublic void initXlet( XletContext\
  \ c )\n\nthrows XletStateChangeException {\n\ncontext = c;\n\ntry {\n\nIxcRegistry\
  \ registry = IxcRegistry.getRegistry(context); if ( registry == null ) {\n\nthrow\
  \ new XLetStateChangeException(\"No registry\");\n\n}\n\nlocation = (Location)registry.lookup(NAME);\n\
  \n}\n\ncatch(NotBoundException e){\n\nthrow new XletStateChangeException(\"Nothing\
  \ bound\");\n\n}\n\ncatch(StubException e){\n\nthrow new XletStateChangeException(\"\
  Stub error\");\n\n}\n\n}\n\npublic void pauseXlet() {\n\n}\n\npublic void startXlet()\n\
  \nthrows XletStateChangeException {\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 介绍 Xlet 和 Personal Basis Profile\n\n**251**\n\npublic void destroyXlet(\
  \ boolean b )\n\nthrows XletStateChangeException {\n\n}\n\n}\n\n获取远程对象的过程类似于注册远程对象：获取\
  \ XletContext 的 IxcRegistry 引用，然后调用 `lookup` 来获取远程对象的存根。返回的存根将是原始类的代理，因此你可以将其强制转换为原始类定义；你应该确保生产者和消费者\
  \ Xlet 都包含了远程类的类定义。\n\n在查找远程对象时，许多与注册时相同的情况都可能发生。在极少数情况下，可能没有 registry 可用于获取远程对象，或者\
  \ registry 可能无法为远程对象创建本地存根。然而，更常见的情况是远程对象根本没有被注册，因为生产者 Xlet 没有运行。如果发生这种情况，registry\
  \ 的 `lookup` 方法将抛出 `NotBoundException`，你的 Xlet 就可以根据其业务规则自行决定如何处理，而不使用该远程对象。\n\n\
  请做好准备，你的远程对象可能在使用过程中消失。当这种情况发生时，访问该对象的任何方法都会抛出 `RemoteException`。这可能是由多种原因造成的，但最可能的原因是生成该对象的\
  \ Xlet 已经退出，并且原始的远程对象已被释放。因此，通常最好只在需要其服务时才访问远程对象，并在使用完毕后立即释放它，而不是依赖服务 Xlet 和对象在消费者\
  \ Xlet 的整个生命周期内持续存在。\n\n**总结**\n\nCDC 与 CLDC 具有相似的应用程序执行约束，包括有限的内存和 I/O 选项。为了反映这一点，基于\
  \ CDC 的 PBP 定义了 Xlet，这是一个与 MIDP 定义的 MIDlet 相似的可执行接口。\n\n与 MIDlet 一样，Xlet 有一个定义良好的生命周期，由三个状态组成：*暂停*、*活动*和*销毁*。Xlet\
  \ 在创建后从暂停状态开始其生命周期，当应用程序管理器调用其 `startXlet` 方法时进入活动状态。类似地，应用程序管理器可以通过调用其 `pauseXlet`\
  \ 方法随时暂停 Xlet，并且可以通过再次调用 `startXlet` 强制 Xlet 重新进入活动状态来恢复执行。在任何时候，无论 Xlet 处于何种状态，应用程序管理器都可以通过调用\
  \ `destroyXlet` 方法来终止 Xlet 的执行。然而，与 MIDlet 不同的是，Xlet 可以通过抛出 `XletStateChangeException`\
  \ 来拒绝状态转换并生成错误。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**252**\n\
  \n第 9 章 ■ 介绍 Xlet 和 Personal Basis Profile\n\n\n\nXlet 拥有一个伴随的 XletContext 对象，该对象为\
  \ Xlet 提供对应用程序管理环境关键信息的访问，包括 Xlet 使用的类加载器、应放置其 GUI 元素的根容器以及运行时属性。Xlet 还可以将应用程序管理系统提供的任何启动参数作为\
  \ XletContext 的属性进行访问。\n\n多个 Xlet 可以同时运行；应用程序管理器将屏幕划分为多个独立的容器，为每个 Xlet 提供一个根容器。与定义了用户界面层次结构的\
  \ MIDP 不同，PBP 仅要求存在轻量级 AWT 组件，Xlet 及其支持类可以重写这些组件以创建用户界面。这可能会给跨平台 Xlet 带来挑战，因为支持\
  \ CDC 的不同 Java ME 设备可能具有不同的用户界面，范围从基于轻量级 AWT 层次结构的自定义 GUI，到实现了大部分 Java Swing 的 AGUI，再到其他\
  \ Java 包（例如提供 SVG 和 3D 图形的包）。\n\nXlet 可以通过基于 Java RMI 的接口共享数据；支持 PBP 的设备的运行时包含一个系统范围的注册表，用于注册实现了\
  \ `java.rmi.Remote` 接口的远程对象。使用此接口，您可以编写实现通过方法共享数据的对象的类，或者将计算任务卸载到另一个正在运行的 Xlet。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 10 章\n\n介绍 Applet 以及高级图形和用户界面\n\
  \n**基**于 CDC 的高端设备在许多方面与真正的计算机特性非常接近。许多设备可以始终访问互联网或通过网关连接到互联网的其他网络；有些甚至可能内置了 Web\
  \ 浏览器。为了体现这些能力，JSR 62 和 216 中定义的 PP 定义了对 applet 的支持，并提供了与上一章中看到的 Xlet 应用程序模型的向后兼容性。\n\
  \nPP 定义的 applet 模型与 Java 从一开始就使用的经典 applet 模型相同；PP 设备可以在嵌入式 Web 浏览器或提供相同功能的原生执行环境中执行\
  \ applet。\n\n此外，PP 要求存在 Java AWT，这使得创建复杂的用户界面变得容易。\n\n在本章中，我将解释提供 PP 的设备所支持的 applet\
  \ 执行模型。在讨论为支持 PP 的设备编写 Xlet 和 applet 时可用的用户界面选项之前，我将回顾编写 applet 的基础知识。\n\n在此过程中，我将讨论在支持\
  \ PP 的设备上可能遇到的 AWT 和高级图形与用户界面（AGUI）实现。\n\n**为 Java ME 编写 Applet**\n\nJava applet\
  \ 执行模型的最初目的是为在 Web 浏览器范围内通过 Web 下载的 Java 代码提供执行环境。\n\napplet 的历史可以追溯到 Java 的早期，它遵守严格的安全限制，包括以下内容：\n\
  \n• Applet 不能定义或调用原生方法。\n\n• Applet 不能访问执行 applet 的主机上的文件。\n\n**253**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**254**\n\n第 10 章 ■ 介绍 APPLET 以及高级图形和用户界面\n\n• Applet 不能建立网络连接，除非连接到提供该 applet\
  \ 的主机。\n\n• Applet 不能调用执行 applet 的主机上的任何程序。\n\n这些是 Xlet 没有的限制，这使得 applet 执行模型在提供与现有\
  \ applet 的向后兼容性或提供强大的 Web 浏览体验方面，比为新应用程序提供应用程序执行环境更受欢迎。\n\n与 Xlet 和 MIDlet 一样，applet\
  \ 具有通过基类 `java.applet.Applet` 提供的接口强制执行的生命周期。一个 applet 上下文伴随一个正在运行的 applet，允许 applet\
  \ 访问资源，例如声音、图像以及在同一上下文中运行的其他 applet。\n\n**查看 Applet 生命周期**\n\n图 10-1 显示了 applet\
  \ 在其执行过程中经历的状态。与 Xlet 和 MIDlet 不同，applet 不能暂停执行；相反，applet 执行环境可以停止或启动 applet。具体来说，运行时可以执行以下操作：\n\
  \n• 创建 applet，调用 applet 的构造函数。\n\n• 通过调用其 `init` 方法，让 applet 有机会进行初始化。\n\n• 通过调用其\
  \ `start` 方法启动 applet。\n\n• 当 applet 失去焦点时（例如，当浏览器导航到不同页面时），通过调用其 `stop` 方法停止 applet。\n\
  \n• 当 applet 重新获得焦点时，通过再次调用 `start` 来**重新启动** applet（可能重新加载并重新初始化它）。\n\n• 在垃圾回收\
  \ applet 之前，停止 applet 并通过调用其 `destroy` 方法让其有机会执行任何最终清理。当然，applet 也可以在任何其他时间被销毁。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 10 章 ■ 介绍 APPLET 以及高级图形和用户界面\n\
  \n**255**\n\n**图 10-1.** *Applet 的生命周期*\n\n清单 10-1 显示了 applet 为遵循 applet 生命周期必须实现的接口。\n\
  \n**清单 10-1.** *Applet 接口*\n\n```java\nimport java.applet.*;\n\npublic class SimplestApplet\
  \ extends Applet {\n\n    public void init() {\n    }\n\n    public void start()\
  \ {\n    }\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**256**\n\
  \n第 10 章 ■ 介绍 APPLET 以及高级图形和用户界面\n\n```java\n    public void stop() {\n    }\n\n\
  \    public void destroy() {\n    }\n}\n```\n\n从清单 10-1 可以看出，与 Xlet 模型相比，applet\
  \ 模型在两个关键方面存在不足：它不能拒绝状态转换，并且没有暂停或恢复执行的概念。请注意，如果 applet 在状态转换期间无事可做，则它*不*需要重写清单 10-1\
  \ 中的任何方法；该类为每个方法提供了默认实现。\n\n**呈现 Applet 的用户界面**\n\n在底层，applet 实际上是容器；具体来说，它们是 `java.awt.Container`\
  \ 的子类，这意味着 applet 可以包含其他用户界面对象，或者通过重写 `paint` 方法执行自己的绘制。清单 10-2 中显示的 Hello World\
  \ applet 演示了重写 `paint` 方法，窗口工具包在 applet 首次绘制以及每次显示时都会调用该方法。\n\n**清单 10-2.** *重写\
  \ paint 方法*\n\n```java\npackage com.apress.rischpater.HelloApplet;\n\nimport java.applet.*;\n\
  import java.awt.Graphics;\n\npublic class HelloApplet\n    extends Applet {\n\n\
  \    public void paint(Graphics g) {\n        g.drawString(\"Hello world!\", 0,\
  \ 0);\n    }\n}\n```\n\n清单 10-3 展示了一种使用 Java AWT 组件和容器的方法。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 10 章 ■ 介绍 APPLET 以及高级图形和用户界面\n\n**257**\n\n**清单 10-3.** *使用 Java AWT 组件和容器*\n\
  \n```java\npackage com.apress.rischpater.HelloApplet;\n\nimport java.awt.*;\nimport\
  \ java.applet.*;\n\npublic class HelloApplet extends Applet {\n\n    public void\
  \ init() {\n        Label label;\n        label = new Label(\"Hello world!\");\n\
  \        add(label);\n    }\n}\n```\n\n这两个示例之间的区别在于绘制的方式。清单 10-2 中的代码直接使用窗口工具包的\
  \ `Graphics` 对象，而清单 10-3 中的代码将绘制委托给窗口工具包提供的组件。由于只有 PP 支持 applet，因此您可以确信，在支持 applet\
  \ 的平台上至少可以使用 Java AWT。\n\n**访问 Applet 的上下文**\n\n\n\n小程序可以访问提供该小程序的服务器上的资源，包括图像和音频剪辑。这些资源可以由小程序本身或小程序的上下文直接获取。你可以通过调用小程序的`getAppletContext`方法来获取小程序的上下文（`AppletContext`类的实例）。`AppletContext`表示一个或多个小程序在其中执行的环境，例如网页或基于\
  \ Java 的应用程序管理器。\n\n拥有一个`AppletContext`实例后，你可以执行以下操作：\n\n• 使用`getApplet`获取对在`AppletContext`内运行的指定名称小程序的引用。\n\
  \n• 使用`getApplets`枚举由特定`AppletContext`管理的小程序列表。\n\n• 使用`getAudioClip`从小程序的服务器获取音频剪辑，或使用`getImage`从小程序的服务器获取图像。\n\
  \n• 使用`showDocument`发送查看网页的请求。\n\n• 使用`showStatus`更新上下文显示的状态。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**258**\n\n第 10 章 ■ 小程序简介及高级图形与用户界面\n\n由于`AppletContext`类的方法明显以浏览器为中心，并且由于传统 Java\
  \ 小程序与网页浏览器的关系，这些方法不如提供给 MIDlet 和 Xlet 的上下文强大。与 MIDlet 和 Xlet 上下文相比，`AppletContext`类的一个有趣缺陷是小程序无法通过上下文请求自身终止；相反，想要终止自身执行的小程序必须向一个不同于包含该小程序的文档的\
  \ URL 发起`showDocument`请求。\n\n**小程序间通信**\n\n正如你可能从`AppletContext`的`getApplets`方法推断的那样，可以同时运行多个小程序，并且多个小程序可以共享同一个小程序上下文。\n\
  \n这使得共享同一上下文的多个小程序能够执行小程序间通信，因为共享单一上下文的每个小程序都可以了解彼此的存在并调用彼此的方法。对于从小程序服务器获取信息的多个小程序，你可以执行小程序间通信来流水线化请求，例如，这样只需要一个小程序执行网络活动。为了使小程序能够相互通信，这些小程序必须源自同一台服务器（并且，取决于实现，是同一台服务器上的同一个*目录*），并在同一个上下文中运行——通常是在浏览器的同一个窗口或同一个屏幕上。\n\
  \n为了让一个小程序找到另一个，搜索的小程序必须知道被搜索小程序的名称。如何指定这个名称取决于目标设备加载小程序的方式；如果目标硬件使用网页浏览器作为小程序的容器，你可以在指定小程序源时使用`<APPLET>`标签或`<PARAM>`标签来指定小程序的名称。例如，你可以编写如清单\
  \ 10-4 所示的代码。\n\n**清单 10-4.** *指定小程序的名称*\n\n<APPLET CODEBASE=\"applets/\" CODE=\"\
  HelloWorld.class\"\n\nWIDTH=200\n\nHEIGHT=200\n\nNAME=\"hello\"/>\n\n清单 10-4 使用了`APPLET`标签的`NAME`属性，但你也可以使用更具扩展性的`APPLET`标签的`PARAM`属性，如清单\
  \ 10-5 所示。\n\n**清单 10-5.** *另一种指定小程序名称的方式*\n\n<APPLET CODEBASE=\"applets/\" CODE=\"\
  HelloWorld.class\"\n\nWIDTH=200\n\nHEIGHT=200>\n\n<PARAM NAME=\"name\" VALUE=\"\
  hello\"/>\n\n</APPLET>\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第\
  \ 10 章 ■ 小程序简介及高级图形与用户界面\n\n**259**\n\n`APPLET` HTML 标签指定了 Java 类文件`HelloWorld.class`中定义的\
  \ Java 小程序应从 Web 服务器的`applets`目录加载，并在当前小程序上下文中被赋予名称`hello`。\n\n回到小程序间通信的话题，考虑两个小程序：生产者（Producer）和消费者（Consumer）。生产者提供了一个在单一执行环境（如网页）上下文中由消费者使用的接口。生产者只需要声明一个供消费者使用的方法，如清单\
  \ 10-6 所示。\n\n**清单 10-6.** *在生产者中声明一个供消费者使用的方法* public class Producer extends Applet\
  \ {\n\n… 此处为方法 …\n\npublic void processRequest(String anArgument) {\n\n… 对 anArgument\
  \ 进行处理 …\n\n}\n\n}\n\n服务于生产者小程序的 HTML 必须标识生产者，以便消费者可以使用`AppletContext`通过名称找到它，如清单\
  \ 10-7 所示。\n\n**清单 10-7.** *标识生产者小程序*\n\n<APPLET CODEBASE=\"applets/\" CODE=\"Producer.class\"\
  \n\nWIDTH=200\n\nHEIGHT=200\n\nNAME=\"producer\"/>\n\n消费者小程序调用生产者的`processRequest`方法，它只需要在小程序上下文中定位生产者。然后它可以像对待任何其他\
  \ Java 对象一样对待结果对象，调用其`processRequest`方法，如清单 10-8 所示。\n\n**清单 10-8.** *调用生产者的 processRequest\
  \ 方法* public class Consumer extends Applet\n\nimplements ActionListener {\n\n… 此处为方法\
  \ …\n\npublic void actionPerformed(ActionEvent e) {\n\nApplet producer = null;\n\
  \nproducer = getAppletContext().getApplet(\"producer\"); if (producer != null &&\n\
  \nproducer instanceof Producer) {\n\n((Producer)producer).processRequest(\"Hi!\"\
  );\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**260**\n\n第 10 章 ■ 小程序简介及高级图形与用户界面\n\
  \n} else {\n\n// 以某种方式处理错误\n\n}\n\n}\n\n}\n\n换句话说，小程序上下文提供了一个在相同上下文中运行的小程序的命名注册表；一旦你从注册表中检索到一个小程序，就可以简单地调用它的一个方法。当然，良好的编程实践要求你在执行此操作时进行某种错误处理，要么通过显式测试目标是否实现了你为小程序间通信所需的接口，要么通过捕获可能在你调度的类不是你所期望的类时发生的`NoSuchMethod`异常。发生这种情况的一个常见原因是小程序管理器已加载了一个小程序但未加载另一个。\n\
  \n**使用 AWT 开发用户界面**\n\n历史上，PP（它是 PBP 的超集）源自 PersonalJava，这是 Sun 首次涉足机顶盒和其他消费电子设备领域。因此，它包含了对大多数\
  \ Java AWT 的支持，包括重量级组件。在内存和其实时操作系统（RTOS）占用方面成本高昂，包含 AWT 是必需的，因为 PP 支持与 Web 小程序向后兼容的小程序，并允许设备制造商托管和为新设备提供小程序。\n\
  \n■**注意** 为了向后兼容，PP 支持已弃用的 Java 1.0.2 事件模型，该模型基于`java.awt.Event`类。但这并不意味着你应该使用 Java\
  \ 1.02 事件模型，因为它已被弃用，并可能在 PP 的未来版本中消失。\n\nPP 包含了 J2SE 1.3 中的大部分 AWT 类。以下列出了一些关键的遗漏项：\n\
  \n• 二维图形类，例如`java.awt.Paint`和`java.awt.Stroke`\n\n• 通过`java.awt.PrintJob`和`java.awt.PrintGraphics`对打印的支持\n\
  \n• 通过`java.awt.Component.AccessibleAWTComponent`层次结构对可访问接口的支持\n\n重要的是要记住，AWT 仅在实现\
  \ PP 的 CDC 平台上可用；然而，PP 同时包含了 Xlet 和小程序执行模型。换句话说，只要你的小程序和 Xlet 在支持 PP 的硬件上运行，你就可以利用\
  \ PP 中定义的 AWT 来开发小程序和 Xlet。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 10 章 ■ 小程序简介及高级图形与用户界面\n\n**261**\n\n\n\n图 10-2 展示了用于用户界面组件的 AWT 类层次结构，并标出了该层次结构中的主要类。你可以将这些组件分为两个关键组：AWT\
  \ *组件* 和 AWT *容器*。组件（Component 是其超类）代表任何用户界面对象，包括按钮、复选框、单选按钮、标签、列表和文本输入项。容器（Container\
  \ 是其超类）是一种可以包含其他组件的组件。容器拥有布局管理器，负责决定组件在容器内的显示位置。\n\n**图 10-2.** *AWT 类层次结构*\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**262**\n\n第 10 章 ■ 小程序与高级图形及用户界面入门\n\
  \n■**注意** 如果你需要学习使用 Java AWT 进行编程的基础知识，请参阅 Jeff Friesen 所著的 *Beginning Java SE 6\
  \ Platform: From Novice to Professional*（Apress，2007），或访问 Sun 公司关于该主题的文档，网址为 http://java.sun.com/javase/6/docs/technotes/guides/awt/。\n\
  \n**使用 AWT 容器**\n\n在 AWT 中，容器就是一个可以包含其他组件的组件。轻量级的 Panel 容器允许你将相关组件分组，而 Window 和\
  \ Frame 容器在原生平台的窗口环境中具有相应的重量级实现。Window 在原生平台的窗口环境中提供一个顶级窗口，而 Frame 则提供顶级标题和边框。\n\
  \n容器维护一个组件列表，并允许你向该列表添加更多组件。Container 的各种 add 方法允许你添加组件，不仅指定要添加的组件，还指定新组件在组件列表中的位置，以及组件在容器内放置方式的任何约束条件。\n\
  \n该列表仅表示容器内的组件及其 Z 轴顺序；容器的*布局管理器*决定了组件在容器边界内的视觉布局方式。布局管理器使用每个组件指定的最小和首选大小、容器边界以及一种算法，来确定组件在容器内的显示方式。AWT\
  \ 定义了五种布局管理器：\n\n• BorderLayout：将其组件排列到五个区域：北、南、东、西和中心。当使用 BorderLayout 向容器添加组件时，你需要指明组件应占据哪个区域；BorderLayout\
  \ 在定位每个组件时会考虑其首选大小。\n\n• CardLayout：将其组件排列成每个组件占据一张虚拟卡片；一次只能看到一张卡片（因此只有一个组件）。CardLayout\
  \ 定义了一组方法，允许应用程序按顺序遍历卡片或显示特定卡片。\n\n• FlowLayout：按从左到右、从上到下的流式方式排列组件。\n\n• GridBagLayout：垂直和水平对齐组件，而不要求组件大小相同。每个组件都有一组相应的约束条件，指示组件应如何放置在容器中。\n\
  \n• GridLayout：在矩形网格中垂直和水平对齐组件，要求每个组件大小相同。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 10 章 ■ 小程序与高级图形及用户界面入门\n\n**263**\n\n当你创建一个容器时，其默认布局管理器是 FlowLayout。\n\n你可以使用\
  \ getComponent 或 getComponentAt 方法查询容器以获取其某个组件；前者接受组件列表中的索引，后者接受 Point 或 *x* 和 *y*\
  \ 坐标，并返回指定位置的组件。你还可以通过调用容器的 isAncestorOf 方法来测试容器是否包含特定组件。\n\n通常，在创建用户界面时，你会使用容器来分组组件，而用户界面本身可能继承自\
  \ Panel 或 Window 类。典型的模式是在容器的构造函数中，或在构造函数调用的方法（如 initComponents 方法）中创建容器的组件。由于手动创建用户界面可能很繁琐，可以考虑使用像\
  \ NetBeans 这样的工具，它为 Container 类提供了源代码视图和设计视图。\n\n■**提示** 在 NetBeans 中，右键单击“项目”窗格中的包，选择“新建”➤“JPanel\
  \ 表单…”或“新建”➤“JFrame 表单”，然后为新文档选择“设计”视图。你可以在“源代码”视图中将容器的基类更改为 java.awt.Panel 或 java.awt.Frame，而\
  \ NetBeans 提供的组件面板在 Swing 组件下方包含了 AWT 组件。\n\n由于许多消费电子设备存在限制，Window 类与底层窗口之间的关系可能有些薄弱。这是因为顶级窗口的位置、大小和标签由原生窗口管理器控制。那些允许你调整容器标题、边界和位置的方法，只是为原生窗口管理器提供指导，而非管理器必须遵守的绝对规则。因此，窗口管理器可能会忽略这些请求，或对其进行修改，以便恰当地显示\
  \ Window。\n\n在某些平台上，这些操作可能是异步的；诸如 getLocation、getSize 和 getLocationOnScreen 之类的接口可能无法反映\
  \ Window 的实际几何形状。此外，窗口管理器可能会忽略 Frame 的装饰、标题和可调整大小属性。\n\n**使用 AWT 组件**\n\njava.awt.Component\
  \ 的各种子类是你用户界面真正发挥作用的地方。正如你在图 10-2 中所见，组件层次结构包含了创建大多数用户界面所需的基本控件，并且你始终可以通过在容器中组合多个组件，或直接绘制组件内容并处理事件，来创建自己的组件。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**264**\n\n第 10 章 ■ 小程序与高级图形及用户界面入门\n\
  \njava.awt.Component 接口管理以下几项不同内容：\n\n• 组件的属性，例如组件的位置、字体、可见性、不透明度等\n\n• 组件的事件处理；这些方法包含一组已弃用的方法，现在已被我将在本章后面“处理\
  \ AWT 事件”一节中讨论的监听器模型所取代\n\n• 支持绘制组件的方法\n\n• 管理焦点并指示哪个组件拥有焦点的方法\n\n正如你已经看到的，AWT 组件有两种类型：重量级和轻量级。重量级组件是原生窗口工具包中*对等*对象的*代理*接口；例如，如果\
  \ java.awt.Button 类有一个与按钮对应的原生组件，那么某处就会有一个封装了该原生按钮接口的对等类。另一方面，轻量级组件在原生窗口工具包中没有对应的实体；Java\
  \ 环境会即时渲染它们。虽然这不是强制要求，但如果你在符合 PP 规范的设备上遇到 AWT，AWT 很可能会实现重量级组件的接口。\n\n重量级组件的一个优势在于，使用重量级组件开发的应用程序通常能够匹配原生平台的外观和感觉，因为重量级组件工具包使用的控件与底层平台提供的控件相同。然而，用于桥接\
  \ AWT 与底层平台的类的实现可能会消耗宝贵的堆和 ROM 空间，这就是为什么并非所有 CDC 配置文件都包含重量级组件的原因。\n\n\n\n在处理组件时，最好避免混合使用轻量级和重量级组件，这是由于\
  \ AWT 和底层平台都存在限制。轻量级组件（包括 AGUI 中的组件，我将在本章后面的“使用 AGUI 开发用户界面”一节中讨论）支持透明区域，这与重量级组件不同。除此之外，这意味着重量级组件会遮挡其背后的内容，并且只能显示为矩形。此外，当重量级组件和轻量级组件相交时，无论\
  \ Z 轴顺序如何，重量级组件始终位于顶层。最后，重量级对象会消耗落在其上的所有鼠标事件；而轻量级组件则会将事件传递给其父容器。\n\n**处理 AWT 事件**\n\
  \n使用 AWT 时，你可以通过重写从窗口工具包接收事件的特定方法来处理事件。你可以通过以下两种方式之一来实现：拦截传递给组件的低级事件，或者为高级事件注册监听器。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 10 章 ■ 介绍小程序以及高级图形和用户界面\n\
  \n**265**\n\n处理低级事件最好由特定组件来完成，例如在编写新的轻量级组件时（我将在第 9 章讨论这个主题）。如果你需要处理低级事件，可以按照以下步骤操作：\n\
  \n**1.** 通过调用 `enableEvents` 并传入一个常量来启用对相应事件的接收，该常量表示小程序想要接收的事件类型。\n\n**2.** 重写\
  \ `processEvent` 或其委托方法之一（`processComponentEvent`、`processFocusEvent`、`processKeyEvent`、`processMouseEvent`、`processMouseMotionEvent`、`processInputMethodEvent`\
  \ 或 `processMouseWheelEvent`）来处理任何传入的事件。\n\n**3.** 当你不想再接收任何事件时，通过调用 `disableEvents`\
  \ 来禁用事件接收。\n\n然而，处理事件最简单的方法是扩展组件以包含一个针对高级事件的特定监听器，然后实现相应的监听器。Java 事件模型——被 AWT 和\
  \ Swing（AGUI 的基础）共同使用——包含了针对各种事件的监听器接口，包括以下这些：\n\n• `ActionListener`：处理由组件生成的高级操作\n\
  • `FocusListener`：处理 `java.awt.Container` 及其子类中的焦点变化\n• `KeyListener`：处理单个键盘事件\n\
  • `MouseListener`、`MouseMotionListener` 和 `MouseWheelListener`：处理由鼠标和指针生成的事件\n•\
  \ `TextListener`：处理指示文本字段内容已更改的事件\n\n清单 10-9 展示了一个响应其按钮点击的简单小程序。\n\n**清单 10-9.**\
  \ *响应按钮点击*\n\npackage com.apress.rischpater.buttonsample;\n\nimport java.awt.*;\n\
  \nimport java.awt.event.*;\n\nimport java.applet.*;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**266**\n\n第 10 章 ■ 介绍小程序以及高级图形和用户界面\n\npublic class ButtonApplet extends Applet\n\
  \nimplements ActionListener {\n\nLabel label;\n\npublic ButtonApplet() {\n\n}\n\n\
  public void init() {\n\nlabel = new Label(\"Hello World\");\n\nButton button = new\
  \ Button(\"Click Here\");\n\nadd(label);\n\nadd(button);\n\nbutton.addActionListener(this);\n\
  \n}\n\npublic void actionPerformed(ActionEvent e) {\n\nlabel.setText(\"Click!\"\
  );\n\n}\n\n}\n\n虽然这个例子很简单，但它展示了基本思想：对接收事件感兴趣的对象必须声明自己实现了相应的监听接口，然后通过调用适当的方法向事件生成者表明它们正在监听事件。这个例子通过实现提供\
  \ `actionPerformed` 方法的 `ActionListener` 契约来做到这一点。此外，小程序通知生成 `ActionEvents` 的按钮，它希望接收该按钮生成的任何\
  \ `ActionEvents`。\n\n**使用 AGUI 开发用户界面**\n\n\n\nJSR 209 中定义的 AGUI 包为 Java ME 设备提供了\
  \ Java Swing 类的一个子集。使用 AGUI，你基本上可以开发一个既能运行在支持 AGUI 的 Java ME 设备上，也能运行在传统计算机上的单一应用程序。AGUI\
  \ 包依赖于 CDC 1.1、FP 1.1 和 PBP 1.1，并提供了以下包：\n\n•   java.awt 包的一个子集，用于提供实现 AGUI 轻量级组件的类层次结构\n\
  •   java.awt.font 包，用于支持渲染 PostScript Type 1、Type 1 多母版、OpenType 和 TrueType 字体\n\
  •   java.awt.geom 包，用于对与二维几何相关的对象进行操作\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 10 章 ■ 介绍小程序以及高级图形和用户界面\n\n**267**\n\n•   java.awt.image 包，用于支持图像的流式创建和修改；AGUI\
  \ 要求支持 GIF89a、JPEG、JFIF 和 PNG 1.0 版图像\n•   java.nio 包，用于指定字节顺序\n•   javax.imageio\
  \ 包，以及 javax.imageio.event、javax.imageio.metadata 和 javax.imageio.stream，用于支持图像\
  \ I/O\n•   javax.microedition.plaf 包，该包与 Java SE 实现的不同之处在于，其实现 API 不是类而是接口，以允许 OEM\
  \ 和服务提供商深度定制 AGUI 的外观和感觉\n•   javax.microedition.agui.event 类，用于支持消费电子设备上常见的专用硬件按键\n\
  •   javax.swing 包及其子包 javax.swing.border、javax.swing.event、javax.swing.plaf、javax.swing.table、javax.swing.text、javax.swing.tree\
  \ 和 javax.swing.undo，用于提供在多个平台上工作方式相同的轻量级组件\n\n使用 AGUI 类似于使用 AWT，因为你需要围绕包含组件的容器来组织用户界面，并注册事件监听器来处理用户界面事件。然而，存在两个关键区别，尤其是在使用\
  \ Swing 提供的一些更复杂的组件时。首先，Swing 的设计者围绕 MVC 设计模式设计了 Swing 的组件。理解 MVC 可以使与更复杂的 Swing\
  \ 组件的交互变得更容易。其次，Swing 支持可插拔的外观和感觉（尽管 AGUI 支持并*不*提供相同的功能）。\n\n■**注意** 如果你需要学习使用 Java\
  \ Swing 进行编程的基础知识，与 AWT 类似，我建议你购买一本 Jeff Friesen 所著的 *Beginning Java SE 6 Platform:\
  \ From Novice to Professional*（Apress，2007 年），或者访问 Sun 公司关于该主题的文档，网址为 http://java.sun.com/javase/6/docs/technotes/guides/swing/。\n\
  \n使用 AGUI 与使用 Swing 非常相似，凭借你现有的 Swing 经验，你应该会感到得心应手。然而，存在一些差异，包括以下内容：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**268**\n\n第 10 章 ■ 介绍小程序以及高级图形和用户界面\n\n•   对需要相应顶级窗口的容器行为的可能限制\n•   对输入约束和设备特定按键的额外支持\n\
  •   对组件子类化绘制行为的限制\n此外，根据 AGUI 实现的不同，几个类方法有一些可选的限制；你的应用程序可以通过系统属性查询系统以确定实际行为。表 10-1\
  \ 显示了你可查询的系统属性列表及其含义；后续章节将更详细地描述 AGUI 的限制。\n\n**表 10-1.** *AGUI 系统属性及其值* **属性**\n\
  \n**值**\n\njavax.swing.JComponent.setBackground.isRestricted\n\n当且仅当 JComponent.setBackground\
  \ 受到本地窗口工具包限制时为 true\n\njavax.swing.JComponent.setBorder.isRestricted\n\n当且仅当 JComponent.setBorder\
  \ 受到本地窗口工具包限制时为 true\n\njavax.swing.JComponent.setForeground.isRestricted\n\n当且仅当\
  \ JComponent.setForeground 受到本地窗口工具包限制时为 true\n\n\nJComponent.setForeground 受到限制\n\
  \njavax.swing.JComponent.setToolTipText.\n\n当且仅当对 `isRestricted` 的调用导致\nJComponent.setToolTipText\
  \ 静默失败时，返回 true\n因为工具提示不受支持\n\njavax.swing.JList.setCellRenderer.isRestricted\n\n\
  当且仅当\nJList.setCellRenderer 无法设置\n自定义单元格渲染器时，返回 true\n\njavax.swing.setMnemonic.isRestricted\n\
  \n当且仅当对 setMnemonic 的调用\n静默失败时，返回 true\n\njavax.swing.text.JTextComponent.\n\n当且仅当对\n\
  setFocusAccelerator.isRestricted 的调用导致\nJTextComponent.setFocusAccelerator\n静默失败时，返回\
  \ true\n\njavax.swing.JMenuBar.clientPropertiesSupported\n\n当且仅当 JMenuBar 支持\n客户端属性时，返回\
  \ true\n\njavax.swing.JMenuBar.NUM_SOFT_KEYS\n\n设备上可用的软键数量，\n如果支持 JMenuBar 客户端属性；\n\
  否则未定义\n\njavax.swing.JMenuBar.NUM_SOFT_MENUS\n\n设备上可用的软菜单数量，\n如果支持 JMenuBar 客户端属性；\n\
  否则未定义\n\njavax.swing.JTabbedPane.setToolTipTextAt.\n\n当且仅当对\nisRestricted 的调用导致\n\
  JTabbedPane.setToolTipTextAt 静默失败时，返回 true\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 10 章 ■ 介绍小程序以及高级图形和用户界面\n\n**269**\n\n最后，温馨提醒：AGUI 与 Swing 一样，*不*是线程安全的。Swing\
  \ 组件一次只能由一个线程访问；通常，这个线程是事件分发线程。如果你正在编写一个需要与 AGUI 接口交互的多线程应用程序，应确保所有 AGUI 更新都在事件分发线程上执行。你可以使用\
  \ `javax.swing.SwingUtilities` 类来实现这一点；它提供了静态方法 `invokeLater` 和 `invokeAndWait`，这两个方法接受一个\
  \ `Runnable`，在窗口系统处理完所有待处理事件后，在事件分发线程上执行该 `Runnable`。使用 `invokeLater` 方法将要在事件处理线程上执行的操作排队；这比\
  \ `invokeAndWait` 更可取，因为后者会阻塞，直到窗口系统完成你的任务。\n\n**理解对顶级窗口的限制**\n\nPBP 允许设备禁止多个顶级窗口。当\
  \ AGUI 与不允许有多个顶级窗口的设备结合使用时，AGUI 也受到同样的限制：单个图形设备上只允许有一个 `JFrame`。\n\n尝试构造第二个 `JFrame`\
  \ 会失败，运行时将抛出 `java.lang.UnsupportedOperationException`。这意味着，为了在支持 AGUI 的设备之间获得最大的可移植性，你的用户界面应完全驻留在一个窗口中。\n\
  \n这对其他容器也有影响。例如，`JOptionPane` 可能只能使用轻量级容器来显示对话框，并且可能无法通过创建父组件为 `null` 的 `JOptionPane`\
  \ 来创建顶级对话框。\n\n类似地，弹出菜单应根植于特定的容器中；你不能创建调用者为 `null` 的 `JPopupMenu`。此外，与 `JOptionPane`\
  \ 一样，`JPopupMenu` 在其组成中可能只使用轻量级组件。\n\n**使用 AGUI 新增的输入支持**\n\n许多消费电子设备没有传统的键盘；事实上，许多消费电子设备彼此之间拥有*不同*的输入设备。\n\
  \n这对任何通用的窗口工具包都构成了挑战，它必须以某种方式抽象不同设备之间的差异。\n\nAGUI 借鉴了输入约束的概念，该概念通过将 `INPUT_CONSTRAINT`\
  \ 客户端属性通过 `putClientProperty` 方法传递给 `JTextComponent`，来限制用户可以从 MIDP 2.0 输入的内容。表 10-2\
  \ 显示了 AGUI 实现可能支持的输入约束。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  **270**\n\n第 10 章 ■ 介绍小程序以及高级图形和用户界面\n\n**表 10-2.** *AGUI 支持的输入约束和值* **约束**\n\n\
  **传递给 putClientProperty 的数值**\n\n**描述**\n\nANY\n\n允许用户输入任何文本。\n\nEMAILADDR\n\n允许用户输入电子邮件地址。\n\
  \nNUMERIC\n\n允许用户输入整数值。\n\nPHONENUMBER\n\n允许用户输入电话号码。\n\nURL\n\n允许用户输入 URL。\n\n\
  DECIMAL\n\n允许用户输入有符号十进制值。\n\n由于 AGUI 可能实现在具有特定硬件键的设备上——例如遥控器或 PDA 或智能手机上的物理按钮——AGUI\
  \ 定义了 `javax.microedition.agui.event.DeviceKeyEvent`，用于指定硬件按键事件，例如键盘音量控制、专用应用程序启动功能或媒体控制（如快退或快进）。按键事件监听器可能会接收到值为\
  \ `VK_UNDEFINED` 的按键事件（`java.awt.event.KeyEvent` 类的子类实例），然后使用 `instanceof` 测试该事件，以确定该\
  \ `KeyEvent` 是否真的是 `DeviceKeyEvent`。如果是，则可以通过调用 `DeviceKeyEvent` 的 `getDeviceKeyCode`\
  \ 方法来确定用户按下了哪个硬件键。\n\n最后，许多消费电子设备支持*软键*，应用程序可以为这些软键分配自定义标签和操作。AGUI 允许你通过 `JMenuBar`\
  \ 接口来定义这些软键，指定一个*菜单类型*和一个*菜单优先级*。菜单类型指示你的应用程序通过软键提供的操作的意图，菜单优先级指示此命令标签相对于同一屏幕上的其他命令标签的重要性。\n\
  \n**理解绘图算法的变化**\n\nAGUI 的一个关键折衷是支持 Swing API，无论它们是以轻量级组件还是重量级组件的形式实现。为了实现这一目标，平台供应商可能会进行许多更改，以更好地支持实现\
  \ AGUI 的许多平台上常见的原生渲染管线。\n\n最显著的变化可能是，`JComponent` 子类的渲染默认是双缓冲的。你可以通过调用任何 `JComponent`\
  \ 实现者的 `isDoubleBuffered` 方法来确定双缓冲是否处于活动状态。你也可以通过调用 `setDoubleBuffered` 并传递 `false`\
  \ 来请求组件执行单缓冲绘制，但 AGUI 实现可以选择忽略你的请求。\n\n许多消费设备上的底层 UI 工具包远不如支持当今 Java SE 实现的工具包灵活。为了满足这些限制，\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 10 章 ■ 介绍小程序以及高级图形和用户界面\n\
  \n**271**\n\nAGUI 限制了应用程序在组件之上进行渲染的能力。由于组件可能是重量级的，`JComponent` 的绘制方法（`paint`、`paintComponent`、`paintBorder`\
  \ 和 `paintComponents`）在 `JComponent` 的第一个具体子类上已被设为 `final`。这是因为 AGUI 提供了与底层平台优化的、紧密的集成，并且可能使用平台的窗口工具包来实现\
  \ AGUI。\n\n看待此限制的另一种方式是结合 Swing 和 AGUI 提供的可插拔外观（PLAF）；在 Swing 中，开发人员很容易覆盖 Swing\
  \ 组件的呈现方式，以提供自己的外观。在 AGUI 中，此功能主要是为了让实现 AGUI 的平台供应商能够为设备提供最佳外观，而不是为了像你我这样的开发人员创建特定的外观。\n\
  \n**总结**\n\n为了与 Web 上的大量小程序保持兼容，并提供熟悉的编程模型，PP 提供了对小程序的执行模型的支持。\n\n与当今 Web 浏览器中使用的小程序模型相同，CDC\
  \ 设备提供的小程序模型在嵌入式 Web 浏览器或强制执行相同安全模型的其他执行环境的上下文中运行小程序。\n\n小程序的生命周期与 MIDlet 和 Xlet\
  \ 相似，但并不完全相同。\n\n\n\n值得注意的是，并没有定义好的方法来暂停和重启一个 applet，并且与 MIDlet 和 Xlet 不同，applet\
  \ 不能显式地请求其包含的应用程序来终止 applet 的执行。由于 applet 是`java.awt.Container`的子类，它可以包含其他用户界面组件，或者简单地重写其`paint`方法并直接绘制其用户界面。\n\
  \n为了支持 applet，PP 还支持大部分 AWT，这是 Java 的第一个用户界面层次结构。虽然 AWT 的实现并不完整——它缺乏对打印、可访问接口以及部分二维图形的支持——但它的限制相对较少。与\
  \ Java SE AWT 一样，PP 提供的 AWT 通常使用重量级组件实现，使您能够创建反映托管 Java 环境的原生平台外观和感觉的复杂用户界面。\n\n\
  AGUI 是一个可选包，需要 CDC、FP 和 PBP 的支持，它为您提供了在某些设备上开发丰富用户界面的另一种方式。您不仅可以使用 AGUI 编写 applet，还可以编写\
  \ Xlet。基于无处不在的 Swing 用户界面类层次结构，AGUI 有一些限制，例如对顶层容器的限制以及组件如何自定义绘制行为的限制。AGUI 还提供了一个更健壮的事件框架，支持当今消费电子设备上常见的软键和硬件按钮。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 11 章\n\n使用远程方法调用\n\n**C**DC\
  \ 专为具有始终在线或几乎始终在线互联网连接的设备而设计。CDC 设备为网络编程提供了巨大潜力，因为有限资源的需求与可靠的网络连接取得了平衡。Java 对远程方法调用（RMI）的支持提供了一种编程模型，它是\
  \ Web 服务提供的轻量级模型的一个受欢迎的替代方案。（具有讽刺意味的是，RMI 模型在很大程度上早于向 Web 服务的转变，因为它基于 Sun 公司开发的远程过程调用语义，并在各种远程计算计划中普及。）在本章中，我首先带您快速浏览\
  \ Java SE 中实现的 Java RMI 设施。在向您介绍了 Java RMI 的高级架构和方法之后，我将介绍关键的 Java RMI 接口，并展示这些接口如何协同工作以满足许多网络化应用程序的两个关键目标：远程化\
  \ Java 计算和远程化对 Java 对象的访问。接下来，我将注意力转向 JSR 66，即 Java RMI 可选包（RMI OP），它定义了在某些支持 CDC\
  \ 的设备上可用的 RMI 实现。在向您展示了通过 Java RMI OP 可用的内容之后，我将提供一个示例来帮助巩固您在本章中遇到的概念。\n\n**理解 Java\
  \ RMI**\n\nJava 编程语言的一个关键特性是它能够通过 Java RMI 范式支持分布式编程——即在独立主机上运行、来回传递对象的应用程序。\n\n\
  所有分布式面向对象应用程序都需要执行三种任务：\n\n• *远程对象发现*：应用程序需要发现远程对象引用的机制。\n\n• *远程通信*：在不同机器上的不同上下文中运行的应用程序需要能够就对象的不断变化的状态进行通信。\n\
  \n• *远程行为定义*：应用程序还必须能够就派生这些对象的**273** 定义进行通信。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**274**\n\n第 11 章 ■ 使用远程方法调用\n\n让我们看看 Java RMI 的架构如何满足这些要求。\n\n**理解 Java RMI 的架构**\n\
  \nJava RMI 通过两种关键方式满足分布式程序的需求：通过提供远程发现注册表，以及通过提供用于交换关于 Java 类和对象信息的健壮通信机制。图 11-1\
  \ 显示了基于 RMI 的应用程序中客户端和服务器之间的关系。\n\n**图 11-1.** *RMI 应用程序架构*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 11 章 ■ 使用远程方法调用\n\n**275**\n\n基于 RMI 的解决方案有几个关键组件：\n\n• *RMI 客户端应用程序*：它在客户端的\
  \ JVM 内运行。支持 RMI 客户端应用程序的是 Java 远程方法协议（JRMP）。1\n\n• *RMI 注册表*：由应用服务器维护，它为 RMI 客户端提供对象发现功能。\n\
  \n• *RMI 服务器*：托管在应用服务器的 JVM 上，负责执行远程对象。\n\n• *Web 服务器*：负责向 RMI 客户端应用程序提供新代码。\n\n\
  您像构建任何其他 Java 应用程序一样，通过接口和类来构建使用 RMI 的分布式应用程序。在您的分布式应用程序中，一些对象是*可远程化的*——也就是说，您可以通过\
  \ RMI 提供的协议跨 JVM 调用可远程化对象的方法。您使用运行在已知服务器上的 RMI 注册表来获取对这些对象的引用；注册表返回一个实现了远程对象提供的方法的*存根*。在底层，远程对象与本地对象不同；相反，它是一个代理，实现了与远程\
  \ JVM 的对象实例通信的网络接口。存根对象实现了与远程对象相同的接口，这意味着它可以被转换为远程对象可实现的任何对象。图 11-2 显示了这种关系；远程对象是\
  \ RMI 服务器中的实心圆，存根是 RMI 客户端中的虚线圆。\n\n**图 11-2.** *RMI 实现中远程对象和本地对象之间的关系*\n1. 其他协议，例如基于\
  \ Internet Inter-Orb 协议的 Java RMI（RMI-IIOP）以及专有实现，可以支持 RMI；这些协议不受 CDC 支持，此处不讨论。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**276**\n\n第 11 章 ■ 使用远程方法调用\n\
  \n事实上，RMI 不仅仅是您的接口、实现和存根。早期版本的 RMI 需要存根和*骨架*，骨架是服务器端的类，负责在存根和服务对象之间进行通信。您像构建存根一样，使用\
  \ RMI 编译器 `rmic` 构建这些骨架。如今，随着 Java 反射接口的兴起，RMI 应用程序只需要存根；事实上，正如您将在本章后面看到的，当使用为 Java\
  \ ME 定制的 RMI 包时，甚至不需要存根类。\n\nJava RMI 模型相对于专有和传统的 Web 服务方法有其优势，包括以下几点：\n\n• *面向对象*：RMI\
  \ 模型以无缝方式扩展了 Java 执行模型，允许您通过 RMI 接口传递 Java 对象。这使您在构建应用程序时可以继续使用面向对象的技术和设计模式。\n\n\
  • *安全性*：RMI 模型利用了 Java 现有的安全模型。\n\n• *遗留系统支持*：提供 RMI 服务的服务器可以通过 JNI 调用连接到遗留服务，让您将遗留系统包装在\
  \ Java 接口中，并将其集成到您的网络化应用程序中。\n\n这些优势使得 RMI 在许多情况下具有吸引力，尤其是在机顶盒市场的消费电子应用中，自九十年代末以来，安全性和与大规模遗留计算的集成一直是一项持续的努力。与此同时，RMI\
  \ 有些过时，它起源于九十年代中期到后期。与其主要竞争对手，基于 XML 和 HTTP 的 Web 服务模型相比，它可能被视为有所欠缺，尤其是在以下方面：\n\n\
  \n\n•   *与 Web 服务的互操作性*：Web 服务模型已成为许多市场中领先的客户端/服务器架构模式。将 RMI 应用程序连接到现有 Web 服务需要额外的工作，这与将\
  \ RMI 应用程序连接到任何其他遗留应用程序所需的工作类似。\n\n•   *重量*：RMI 在其支持的平台上会带来体积上的代价；RMI 在移动设备上需要 CDC\
  \ 和 Foundation Profile。这比 Java ME Web 服务实现需要更强大的硬件，后者可以在 CLDC 平台上运行。此外，在无线链路上，RMI\
  \ 协议可能比精心设计的 Web 服务交换昂贵得多。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 11 章 ■ 使用远程方法调用\n\n**277**\n\n•   *网络支持*：尽管完整的 RMI 实现支持通过防火墙的自动 HTTP 隧道，正如你将在本章后面的“了解\
  \ Java RMI 可选包提供的内容”一节中看到的，但 Java RMI OP 并不支持。因此，要在 Java ME 设备上支持 Java RMI，你的网络安全策略需要比单纯部署\
  \ Web 服务时考虑得更多。\n\n尽管存在这些限制，但在开发应用程序时，Java RMI 可能是一个不错的选择，特别是当你的情况满足以下两个条件之一时。首先，显然，如果你的应用程序基础设施已经使用了\
  \ RMI，那么在开发过程中继续使用 RMI 可以最好地与之集成。这在电信消费电子市场的某些领域尤其如此，在这些领域，针对受限电视机的中间件解决方案很常见。其次，如果你正在开发一个具有强远程计算需求的应用程序，RMI\
  \ 为通过代理表达远程计算程序提供了比传统 Web 服务更好的抽象层。\n\n**介绍 Java RMI 接口**\n\n理解 Java RMI 的关键在于理解接口的概念。正如你所知，接口是一种契约：它承诺某个特定对象将执行特定功能（类的方法），但它不说明如何执行这些功能。换句话说，*接口将行为的定义与行为的实现分离开来*。这一点至关重要，因为\
  \ RMI 在其整个实现中都使用了这一概念；你的远程对象是根据其接口来定义的，而其实现（即它们作为远程对象运行的能力）则在程序后台进行。\n\nJava RMI\
  \ 接口定义在`java.rmi`包层次结构中。该层次结构定义了一个接口、三个类和一系列异常：\n\n•   *`java.rmi.Remote`接口*：指定了用于远程执行的接口的意图\n\
  •   *`java.rmi.MarshalledObject`类*：抽象化一个包含对象序列化表示的字节流\n•   *`java.rmi.Naming`类*：提供了在远程对象注册表中存储和获取远程对象引用的接口\n\
  •   *`java.rmi.RMISecurityManager`类*：定义了从远程服务器下载代码时使用的默认安全管理器\n•   *诸如`java.rmi.RemoteException`的异常*：在处理分布式环境中可能发生的错误时出现\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**278**\n\n第 11 章 ■ 使用远程方法调用\n\
  \n■**注意** Java RMI 的一个并行实现提供了基于 Internet Inter-Orb 协议（RMI-IIOP）的 RMI。它现在是 Java SE\
  \ 的一部分，位于`javax.rmi`层次结构中，但在 Java ME 中没有相应的支持。\n\n要实现分布式系统的服务器端，还需要一些额外的代码。`java.rmi.server`层次结构提供了这些代码，包括`java.rmi.server.UnicastRemoteObject`和`java.rmi.activation.Activatable`类。这两个类的区别在于，扩展`UnicastRemoteObject`的远程对象需要服务器在对象的整个生命周期内运行，而扩展`Activatable`的对象则在\
  \ Java 的 RMI 守护进程`rmid`的上下文中运行。\n\n**了解 Java RMI 可选包**\n\nJava RMI OP（在 JSR 66 中正式化）在移动\
  \ Java 的历史上出现得相当早。它于 2000 年获得批准，源于摩托罗拉、西门子、Sun 等公司为将 RMI 引入运行 J2ME（Java ME 的前身）的移动平台所做的努力。这些合作伙伴开发了\
  \ RMI OP，以满足利用 Java 标准进行信息传递的高度连接、分布式应用程序的需求。如今，Sun 为被许可方提供了一个完全用 Java 实现的 Java\
  \ RMI OP 参考实现，该实现可以直接集成到满足最低要求的硬件上。RMI OP 与 Java SE RMI 实现可互操作，使其成为将嵌入式设备与现有基于 RMI\
  \ 的解决方案集成的理想选择。\n\n**查看 Java RMI 可选包的要求**\n\n尽管经过精心精简以满足嵌入式设备的需求，RMI OP 仍然有一些相当大的要求，包括以下内容：\n\
  \n•   在 Java ME 和其他平台要求的现有基础上，需要 2.5MB 的可用 ROM\n•   在 Java ME 和其他平台要求的现有基础上，需要 1MB\
  \ 或更多的可用 RAM\n•   与网络的 TCP/IP 连接\n•   支持在 Java ME 连接设备配置之上运行的 Java ME Foundation\
  \ Profile\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 11 章 ■ 使用远程方法调用\n\
  \n**279**\n\n许多设备供应商已转向在移动和嵌入式设备上提供对 CDC 的支持，尽管很少有供应商仍能提供运行 RMI OP 所需的处理能力。随着内存和处理器的成本持续下降，并且我们看到个人计算机与其他消费设备之间更大的融合，这种情况很可能会改变，RMI\
  \ OP 将从仅在专用环境中可用转变为更普遍地可用。\n\n**了解 Java RMI 可选包提供的内容**\n\nRMI OP 与 Java SE 提供的 RMI\
  \ 有何不同？首先确定 RMI OP 与 Java SE 的*相同*之处很有用，因为你很可能会围绕 Java SE RMI 设计你的解决方案，并使用基于 Java\
  \ SE 或 Java EE 的服务器环境来支持你的分布式应用程序。\n\n根据定义，RMI OP 必须支持以下功能：\n\n•   完全支持 RMI 调用语义，包括对\
  \ RMI 有线协议的支持\n•   支持编组——即支持在远程主机上表示对象\n•   能够通过`UnicastRemoteObject`类从支持 RMI OP\
  \ 的设备导出远程对象\n•   跨客户端和服务器的分布式垃圾回收和垃圾回收器接口\n•   支持不持久存在于调用之间且需要全职服务器管理其激活的对象的接口\n\
  •   支持注册表接口，以及支持 RMI OP 的设备远程导出注册表对象的能力\n\n对于一个针对低端设备的标准来说，RMI OP 出奇地全面。通过支持`UnicastRemoteObject`、分布式垃圾回收以及注册和导出远程对象的能力，支持\
  \ RMI OP 的硬件可以完全参与分布式计算，在对象分发过程中同时充当客户端和服务器。\n\n这种对称性是 RMI OP 相对于传统 Web 服务计算模型的一个关键特性，这既是因为它是与\
  \ Java SE RMI 完全互操作所必需的，也是因为它允许嵌入式设备向远程服务器提供对象。事实上，在提供 RMI OP 的设备上，RMI 可用于同一设备上的应用程序间通信，或用于跨网络的真正分布式应用程序。\n\
  \n\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**280**\n\n第 11 章 ■ 使用远程方法调用\n\
  \n那么缺少什么呢？实际上很多，但很可能你并不会用到其中的大部分：\n\n• 支持通过 HTTP 代理 RMI 请求\n\n• 支持 RMI 多路复用协议，该协议允许在仅存在单个通信通道时，多个\
  \ JVM 相互调用远程方法\n\n• 实现 `Activatable` 接口，为可激活对象提供具体实现\n\n• 已弃用的方法、类和接口（反正你也不应该使用它们！）\n\
  \n• 支持 RMI 骨架/存根协议，以及存根和骨架编译器的需求\n\n这些缺陷会带来一些实际影响，但并没有你想象的那么多。首先，也是限制最大的，是 RMI OP\
  \ 只能使用原始的基于 TCP/IP 套接字的 RPC 机制进行通信：不支持通过防火墙进行隧道传输。\n\n这对你部署应用程序的网络拓扑结构有直接影响，因为你必须配置保护服务器的防火墙以允许\
  \ Java RMI 流量。如果你希望设备托管在激活之间不持久化的对象，那么缺少 `Activatable` 的具体实现可能会成为一个问题，但你可以自由地提供该接口的自定义实现。而不需要构建存根和骨架实际上是一件好事；你只需要为你的\
  \ Java SE 应用程序做这项工作。\n\n**应用 Java RMI**\n\n当使用 Java 编写分布式应用程序时，你必须结合 `java.rmi`\
  \ 包执行以下步骤：\n\n**1.** 为远程服务编写 Java 接口。\n\n**2.** 实现远程服务，从 `UnicastRemoteObject` 或\
  \ `Activatable` 派生你的实现。\n\n**3.** 如果你将解决方案的一部分部署在 Java SE 或 Java EE 上，则从实现生成存根类。\n\
  \n**4.** 编写一个远程服务主机容器，用于创建和管理你的远程服务。\n\n**5.** 编写你的 Java 客户端，在客户端上调用远程对象。\n\n**6.**\
  \ 安装并部署客户端和服务器。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 11 章 ■\
  \ 使用远程方法调用\n\n**281**\n\n虽然这听起来工作量很大，但它使你免于处理开发远程应用程序的许多底层细节。步骤 1 和 2 是编写 Java 代码——这是你已经知道如何做的事情。Java\
  \ SE 附带了 `rmic` 编译器来执行步骤 3。\n\n步骤 4 只是编写一个小的 Java 应用程序，而步骤 5 是你无论如何都必须做的——你的客户端应用程序才是关键。步骤\
  \ 6 可能是一个小任务，也可能是一个大任务，具体取决于你的应用程序和服务的性质。\n\n让我们使用本书中一直使用的天气示例，逐一完成这些步骤。我们为 CDC\
  \ 编写的 `WeatherApplet` 示例需要一个天气数据源，该数据源可能来自商业或政府服务。在接下来的章节中，我将引导你构建一个可远程的 `Location`\
  \ 类，该类适合使用 RMI OP 来传输位置和天气数据。\n\n为了实现可远程的 `Location` 对象，你需要定义各种接口和实现之间的关系。图 11-3\
  \ 显示了 `Location` 接口、RMI OP 层次结构以及 `Location` 的实现 `LocationImpl` 之间的关系。\n\n**图 11-3.**\
  \ *可远程的 Location 接口及其实现*\n`Location` 接口——我最初在第 6 章中将其作为一个表示空间位置和特定位置天气预报的类引入——通过四个方法\
  \ `getLocation`、`setLocation`、`getForecast` 和 `setForecast` 将两个 `String` 属性作为属性导出。`Location`\
  \ 接口是可远程的，这通过它扩展了 `java.rmi.Remote` 接口来表明。它的具体实现 `LocationImpl` 基于 `java.rmi.UnicastRemoteObject`\
  \ 的 RMI OP 实现，可以在分布式计算环境中共享。\n\n■**注意** 由于 NetBeans 不直接支持 RMI 应用程序的开发，接下来的示例要求你已安装\
  \ JDK，该 JDK 应该在你安装 NetBeans 时已经安装。你可能需要确保已安装的 JDK 的 `bin` 目录在你的路径中，以便访问诸如 `javac`\
  \ 和 `rmic` 之类的命令。\n\n**为服务编写 Java 接口**\n\n正如我之前提到的，RMI 的关键在于定义远程服务的接口。清单 11-1 显示了\
  \ `Location` 接口。\n\n**清单 11-1.** *Location 接口*\n\n```java\npublic interface Location\n\
  \    extends java.rmi.Remote {\n    public String getLocation()\n        throws\
  \ java.rmi.RemoteException;\n    public void setLocation(String l)\n        throws\
  \ java.rmi.RemoteException;\n    public String getForecast()\n        throws java.rmi.RemoteException;\n\
  \    public void setForecast(String f)\n        throws java.rmi.RemoteException;\n\
  }\n```\n\n这个接口很直接，尽管你可以看到每个方法都可能抛出 `java.rmi.RemoteException`。这是因为接口的实现可能是代理，远离实际的实现。在这种情况下，接口的实现必须有一种方式来指示异常情况，例如网络连接丢失。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 11 章 ■ 使用远程方法调用\n\n**283**\n\
  \n**使用 Java SE 实现服务**\n\n服务本身是 `LocationImpl` 类，它在 `UnicastRemoteObject` 的帮助下提供了\
  \ `Location` 接口的具体实现，如清单 11-2 所示。\n\n**清单 11-2.** *LocationImpl 类*\n\n```java\n\
  public class LocationImpl\n    extends\n    java.rmi.server.UnicastRemoteObject\n\
  \    implements\n    Location {\n    private String location;\n    private String\
  \ forecast;\n    public LocationImpl()\n        throws java.rmi.RemoteException\
  \ {\n        super();\n    }\n    public String getLocation()\n        throws java.rmi.RemoteException\
  \ {\n        if (location != null) {\n            return location;\n        } else\
  \ {\n            return \"\";\n        }\n    }\n    public void setLocation(String\
  \ l)\n        throws java.rmi.RemoteException {\n        location = l;\n    }\n\
  \    public String getForecast()\n        throws java.rmi.RemoteException {\n  \
  \      if (forecast != null) {\n            return forecast;\n        } else {\n\
  \            return \"\";\n        }\n    }\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**284**\n\n第 11 章 ■ 使用远程方法调用\n\n```java\n    public void setForecast(String f)\n\
  \        throws java.rmi.RemoteException {\n        forecast = f;\n    }\n}\n```\n\
  \n请注意此实现的默认构造函数，它必须立即调用其父类的构造函数。这是因为该类必须调用 `UnicastRemoteObject` 的构造函数来执行与 RMI 子系统的链接和远程对象初始化。\n\
  \n`LocationImpl` 扩展了 `UnicastRemoteObject`，它提供了与 RMI 子系统的必要链接。这是将对象链接到 RMI 子系统并准备将其导出到远程系统的一种方法；另一种方法是调用\
  \ `UnicastRemoteObject.exportObject` 方法，并传入一个实现 `Remote` 的对象。无论哪种情况，`UnicastRemoteObject`\
  \ 实现都会在一个端口上导出该对象，使其可用于接收传入的方法调用。\n\n■**注意** 一个完整的 `Location` 实现会使用另一个远程计算接口（例如\
  \ Web 服务）来获取远程位置的天气预报。为简洁起见，我在此省略了这一点。\n\n虽然你通常不需要直接调用它，但 `UnicastRemoteObject`\
  \ 有一个对应的 `unexportObject` 方法，可以强制将对象从 RMI 运行时中移除。调用此方法后，如果成功，你传入的对象将无法再接受传入的 RMI\
  \ 调用。\n\n**为 Java SE 生成存根类**\n\n如果你愿意，可以生成\n\n\n\n生成 Java SE 存根类以包含在 Java SE 应用程序中；如果你希望将应用程序同时部署到\
  \ Java ME 和 Java SE，或者你的分布式架构要求从 Java ME 设备向运行 Java SE 的硬件提供对象，这会非常方便。有趣的是，你并非对\
  \ Java 源代码执行此步骤，而是对从实现生成的类文件执行此操作。\n\n对于像这样的小项目，只需编译 `LocationImpl`，然后在生成的类文件上运行\
  \ RMI 编译器 `rmic` 即可。为此，打开一个 shell 并输入清单 11-3 中所示的命令。\n\n**清单 11-3.** *手动构建 Java\
  \ SE 存根类*\nc:\\book\\Chapters\\chapter11\\code>javac Location.java\n\nc:\\book\\\
  Chapters\\chapter11\\code>javac LocationImpl.java\nc:\\book\\Chapters\\chapter11\\\
  code>rmic LocationImpl\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第\
  \ 11 章 ■ 使用远程方法调用\n\n**285**\n\n这些命令使用 `javac` 为 `Location.java` 和 `LocationImpl.java`\
  \ 生成类文件；最后一行使用 `rmic` 生成骨架 `LocationImpl_Stub.class`。\n\n■**注意** 虽然如果你使用 Mac OS\
  \ X 或 Linux，命令行的外观会有所不同，但命令语法保持不变。\n\n**编写远程服务主机应用程序**\n\n远程服务需要做两件事。首先，它必须创建其提供的对象实现的实例。其次，它必须将这些对象注册到\
  \ RMI 命名服务，指定客户端可以在何处访问远程对象。清单 11-4 展示了如何执行此操作。\n\n**清单 11-4.** *一个简单的 RMI 服务器应用程序*\n\
  import java.rmi.Naming;\n\npublic class LocationServer {\n\n    public LocationServer()\
  \ {\n        try {\n            Location c = new LocationImpl();\n            Naming.rebind(\"\
  rmi://localhost:1099/LocationService\", c);\n        } catch (Exception e) {\n \
  \           System.out.println(\"Exception: \" + e);\n        }\n    }\n\n    public\
  \ static void main(String args[]) {\n        new LocationServer();\n    }\n}\n\n\
  这非常简单，并展示了使用 RMI 构建远程应用程序的强大功能。服务器创建了一个 `LocationImpl` 的新实例，并将其注册到命名守护进程——仅此而已！\n\
  \n要在独立工作站上测试运行该服务，你必须首先启动 RMI 注册表，这是一个 Java 应用程序，`LocationServer` 将其对象注册到其中以供客户端查找。你可以在一个\
  \ shell 中启动 `rmiregistry`，在另一个 shell 中启动 `LocationServer`（使用 `java` 启动 Java 虚拟机）。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**286**\n\n第 11 章 ■ 使用远程方法调用\n\
  \n■**提示** 如果你无法运行该服务，或者客户端和服务器无法通信，请检查你是否正在运行防火墙或其他会阻止 `rmiregistry` 监听默认端口 (1099)\
  \ 的软件。\n\n另一种可能性是在不同的端口（例如 8081）上运行 `rmiregistry`，并更改应用程序中的端口号。\n\n当然，你的生产级服务器不会在你的笔记本电脑上运行\
  \ `rmiregistry`；相反，你会将生成的实现托管在诸如 Sun 的 GlassFish 或 BEA 的 WebLogic Server 之类的应用服务器上。如何打包和安装远程服务会根据你选择的应用服务器而略有不同。\n\
  \n**从客户端调用远程对象**\n\n从客户端调用远程对象非常简单：只需查找远程服务并获取远程对象的实例，如清单 11-5 所示。\n\n**清单 11-5.**\
  \ *调用远程对象*\n\nimport java.rmi.*;\n…\nLocation c = (Location)Naming.lookup(\n   \
  \ \"rmi://localhost/LocationService\");\n…\n\n调用远程对象时，必须确保指定远程主机（本例中为 `localhost`）以及端口和提供该对象的远程服务的名称。`java.rmi.Naming`\
  \ 类负责其余工作，联系远程服务并获取远程对象的实例。\n\n**总结**\n\n一些运行 CDC 的设备支持 RMI OP，这是一个可选扩展，将 Java RMI\
  \ 的大部分功能带到了受限设备。与 Java SE 实现一样，RMI OP 提供了远程对象发现、远程通信和远程行为定义的功能，以及 RMI OP 的 Java\
  \ 实现提供的安全通信通道。Java RMI 大量利用接口来解耦对象的描述行为与其实现。远程客户端使用抽象接口来描述远程对象将如何行为，并结合由 Java 运行时生成的底层对象，该对象与提供对象实际实现的远程服务器进行通信。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 11 章 ■ 使用远程方法调用\n\n**287**\n\
  \n由 JSR 66 定义的 RMI OP 包提供了 Java RMI 的一个全面子集，包括远程调用语义、远程对象表示、从 CDC 设备导出对象以及分布式垃圾回收。RMI\
  \ OP 基于原始的 J2SE RMI 实现及其有线协议；它*不是* RMI-IIOP 的实现，后者将 CORBA 引入 Java。在编写使用 RMI OP 的应用程序时，你必须为远程服务定义接口，使用你定义的接口实现远程服务，并编写管理这些接口的远程服务主机容器。如果你的应用程序部分运行在支持\
  \ Java SE 或 Java EE 的硬件上，你还必须生成 RMI 用于支持跨网络多虚拟机对象分发的存根类。\n\n在 Java ME 中使用 Java RMI\
  \ 并非适合所有人。在当今使用基于 HTTP 的 XML 的分布式 Web 服务世界中，它最适合需要完全面向对象方法进行分布式计算的环境，或者那些需要你将 Java\
  \ ME 设备连接到已向其他 Java 客户端提供 RMI 服务的现有网络服务的遗留环境。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n间奏曲\n\n**本书的下一部分对你作为移动应用程序开发者至关重要。如今的 Java ME 平台比以往任何时候都更加互联，它必须支持使用无处不在的 HTTP\
  \ 访问当今的互联网，并且为更低级的互联网协议以及蓝牙和短信等无线协议提供了可选接口。**\n\n**几乎每个有价值的应用程序都需要至少一些数据通信能力。**\n\
  \n**请仔细阅读第 12 章，因为它对 GCF 的解释是 Java ME 内部通信的基础。如果你正在开发使用 Web 服务的应用程序，请阅读第 13 章，因为它教你如何使用可扩展标记语言\
  \ (XML)，即互联网的通用语言。无线消息传递（第 14 章的主题）是可选的，但即使你不打算使用无线消息传递接口，我建议你至少浏览一下本章，以便了解可供你使用的无线通信选项。**\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 4 部分\n\n与世界其他地区通信\n\n**自\
  \ Java 诞生以来，对网络通信的支持一直是其关键组成部分，Java ME 延续了这一趋势，并为整个 Java 开发者社区带来了重要贡献。本部分的三个章节探讨了创建使用互联网的\
  \ Java ME 应用程序的关键方面。在第 12 章中，你将学习如何使用 GCF，这是 Java ME 提供的最重要的框架和 API 之一。**\n\n\n\n\
  **它贯穿了 Java ME 关于应用程序如何通过网络等物理接口进行通信的理念。在第 13 章中，你将了解在处理 XML 时有哪些选择——这是当今许多通信应用程序的重要方面。最后，在第\
  \ 14 章中，你将看到如何访问许多 Java ME 设备上提供的广域无线网络功能。**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 12 章\n\n访问网络上的远程数据\n\n**S**un Microsystems 早期的成功在于为科学和工程目的制造高性能计算平台。大多数工作站（包括\
  \ Sun 的硬件）的一个关键特性是对网络的支持。体现在 Sun 的座右铭“网络就是计算机”中，这种对网络的承诺一直延续到今天，通过 Java 平台提供并构建的稳健网络解决方案得以体现。\n\
  \nJava ME 也不例外；它从一开始就被设计为一个与网络上其他计算机交互的平台。\n\n在本章中，我将讨论 Java ME 对 Java 平台最重要的贡献之一：通用连接框架（GCF）。该框架提供了一个统一的\
  \ API，用于使用不同的协议与网络上的系统进行交互，并且已被扩展以涵盖文件操作（见第 7 章）、使用 SMS 的无线通信（见第 14 章）以及非接触式通信（见第\
  \ 15 章）。首先，我将解释什么是 GCF 以及它作为应用程序开发人员能为你提供什么。接下来，我将向你展示如何使用 GCF 在当今的 IP 网络上通过 TCP\
  \ 和 UDP 执行低级通信。然而，本章的主要内容是向你展示如何使用 GCF 通过 HTTP 访问互联网上的远程资源，这是几乎所有 Java ME 网络化应用程序的重要方面。最后，我将简要说明\
  \ Java ME 的权限模型如何影响你的应用程序。\n\n**介绍通用连接框架**\n\nJava SE 世界中的 I/O 和通信是一场狂野之旅：你会发现位于\
  \ java.net 和 java.io 包中的套接字、文件和连接类（派生自 URLConnection）。虽然可以说功能强大，但 Java SE 的 I/O\
  \ 框架的缺点在于，它要求你掌握数量相对较多的接口，其中许多具有不同的语义。事实证明，这对于移动设备来说同样笨重；这些深奥而复杂的类层次结构无法很好地扩展到移动设备，尤其是那些运行早期版本\
  \ Java ME 的设备。因此，随着第一个 CLDC 的引入，Sun 引入了 GCF，这是一个用于管理连接和执行 I/O 的直观的接口和类层次结构。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**294**\n\n第 12 章 ■ 访问网络上的远程数据\n\
  \nGCF 已被证明非常受欢迎，以至于在其最初的应用之外也被广泛采用；平台架构师现在使用 GCF 抽象出对文件、其他网络协议、智能卡、射频识别（RFID）卡、蓝牙外设甚至条形码的通信。事实上，目前正在进行将\
  \ GCF 重新整合到 Java SE 中的工作，如 JSR 197 所述，这展示了固定和移动计算范式的融合如何从两种环境中汲取灵感。\n\n包含在 javax.microedition.io\
  \ 包中的 GCF 提供了一种抽象的连接方法。通过提供一个可扩展的通用类接口层次结构（见图 12-1）和一个基于 URL 的通用请求方案来创建这些类实例的工厂，GCF\
  \ 显著减少了支持通信应用程序所需的类数量。这既减小了 Java ME 平台的占用空间，也降低了你在构建应用程序时作为 Java ME 开发人员必须管理的复杂性。\n\
  \n**图 12-1.** *最初在 CLDC 1.0 中引入的 GCF 层次结构*\n\n\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 12 章 ■ 访问网络上的远程数据\n\n**295**\n\nGCF 层次结构是一个紧密编织的接口集合，其中夹杂着少量类：\n\n• *Connector*\
  \ 类：负责充当 Connection 对象的工厂。\n\n• *Connection* 接口：表示两个实体之间的通用连接。\n\nConnection 接口定义了\
  \ close 方法，该方法负责关闭连接。\n\n• *DatagramConnection* 接口：定义了在面向数据报的连接（如 UDP）上可执行的操作。\n\
  \n• *StreamConnection* 接口：定义了在面向流的连接（如 TCP）上可执行的操作。StreamConnection 实例是双向的，由 InputConnection（从中读取数据）和\
  \ OutputConnection（向其写入数据）组成。\n\n• *StreamConnectionNotifier* 接口：定义了在监听新的 StreamConnection\
  \ 时可执行的操作。\n\n• *ContentConnection* 接口：支持传递通过已知编解码器编码的内容。\n\n• *Datagram* 接口：为单个数据报定义了抽象接口。\n\
  \n数据报是双向的，通过扩展 DataInput 和 DataOutput 接口来实现此功能。\n\n• *IOException* 类：表示通用通信错误，例如网络故障，以及\
  \ ConnectionNotFoundException，当您尝试创建平台无法解析的连接时，Connector 类方法会抛出此异常。（此 IOException\
  \ 类并非正式属于 GCF 的一部分。）使用 GCF 时，请遵循以下步骤：\n\n**1.** 创建一个 URL，描述您想要打开的套接字类型，并详细说明要连接的资源的地址和名称。\n\
  \n**2.** 调用 Connector.open 类方法，传入您构建的 URL，以接收特定 Connection 子类的实例。\n\n**3.** 根据 Connector.open\
  \ 返回的连接类型，使用具体的 Connection 子类方法来处理该连接。\n\n清单 12-1 中的伪代码演示了此模式，即打开到服务器 www.nowhere.com\
  \ 的 HTTP 连接，并获取一个用于读取的 InputStream。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**296**\n\n第 12 章 ■ 访问网络上的远程数据\n\n**清单 12-1.** *打开 HTTP 连接并获取 InputStream* String\
  \ url = \"http://www.nowhere.com\";\n\n…\n\nStreamConnection c = null;\n\nInputStream\
  \ s = null;\n\ntry {\n\nc = (StreamConnection)Connector.open(url);\n\ns = c.openInputStream();\n\
  \n…\n\n} catch (ConnectionNotFoundException e) {...}\n\ncatch (IllegalArgumentException\
  \ e) {...}\n\ncatch (IOException ioe) {...}\n\nfinally {\n\ntry {\n\nif (s != null)\
  \ s.close();\n\nif (c != null) c.close();\n\n} catch (Exception e) {...}\n\n}\n\n\
  这段伪代码对于大多数使用连接的应用程序来说相当典型。您首先构建一个 URL，描述应在何处建立连接，然后使用 Connection.open 生成一个具体的 Connection\
  \ 类，该类实现与您在 URL 中指定的地址的连接。连接打开后，您从连接中获取流（或数据报），并使用提供的流或数据执行 I/O 操作。完成后，您需要关闭流（不是数据报连接）和连接本身。\n\
  \n使用连接进行编程充满了异常，因为您受制于外部环境。网络可能不可用，手机可能没有服务，或者设备上可能没有足够的资源来满足您的网络请求。因此，open 方法可能会抛出多种异常：\n\
  \n• ConnectionNotFoundException：如果平台不支持请求的协议，或者平台找不到 URL 指定的目标\n\n• IllegalArgumentException：如果您指定了无效参数\n\
  \n• IOException：如果在打开连接时发生任何类型的 I/O 错误\n\n\n\n• SecurityException：如果您的应用程序未被允许访问您请求的协议\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 12 章 ■ 访问网络上的远程数据\n\n**297**\n\
  \n虽然清单 12-1 中的示例仅传递了要打开的 URL，但您也可以指定访问模式（`Connector.READ`、`Connector.WRITE`或`Connector.READ_WRITE`之一），以指示所生成连接的访问模式。如果提供了访问模式，您还可以指示您的应用程序在使用连接时，如果特定协议支持超时机制，则希望接收超时通知。\n\
  \n您可能对 URL 的概念很熟悉，但由于 URL 在连接的创建中起着关键作用，因此有必要回顾一下其语义。使用 GCF 时，URL 既描述了连接的类型，也描述了连接实例应连接到的位置。URL\
  \ 的语法在 RFC 1738 和 RFC 2396 中有详细描述；URL 是一个如下所示的单一字符串：\n\n`scheme://user:password@host:port/path;parameters`\n\
  \n其中：\n\n• `scheme` 指定了连接所使用的协议，例如 HTTP。\n\n• `user` 指定了访问连接时所需的可选用户名。\n\n• `password`\
  \ 指定了访问连接时所需的可选密码。\n\n• `host` 是远程连接端的完全限定域名或其他地址。\n\n• `port` 指定了远程连接端使用的可选端口。\n\
  \n• `path` 是远程连接端的路径，其解释和格式可能因协议而异。路径可能包含一个或多个用于修改连接的参数。\n\n在底层，`Connector`的实现会使用您在\
  \ URL 中指定的协议来确定应实例化并返回哪种类型的`Connection`。Java ME 以及用于扩展 Java ME 通信能力的各种 RFC 已经定义了几种不同的协议。表\
  \ 12-1 列出了常见的协议、对应的协议类型、返回的`Connection`子类，以及该协议被引入 Java ME 平台时所依据的 JSR 规范。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
