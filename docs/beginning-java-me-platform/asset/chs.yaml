  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 1 部分\n\n入门\n\n**在开始为 Java\
  \ 平台微型版（Java ME）编写代码之前，你应该对基础知识有扎实的掌握。这正是本部分的目的：帮助你理解 Java ME 为何重要，如何使用 NetBeans\
  \ 开始为 Java ME 编写代码，以及 Java ME 与传统 Java 编程有何不同。**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 1 章\n\n绘制 Java 丛林地图\n\n**虽**然 Java ME 的核心实际上只是 Java 语言、类库和概念为适应受限设备所做的改编，但 Java\
  \ ME 背后的商业运作实际上却大相径庭。对 Java ME 市场、平台和术语的牢固掌握，将为你使用 Java ME 成功开发产品奠定良好的基础。\n\n在本章中，我首先介绍\
  \ Java ME 的市场。接下来，我将带你了解 Java ME 平台，向你展示 Sun 公司如何识别并定义移动平台的基本需求，以及制造商、运营商和其他各方如何扩展这个基础平台。最后，我将讨论\
  \ Java ME 应用程序开发过程的不同之处，并向你展示了解你的受众、目标设备和分发渠道是多么重要。\n\n阅读本章后，你将理解 Java ME 为何不同于\
  \ Java。你将看到设备制造商、无线运营商和消费者如何看待 Java ME，以及 Java ME 如何满足所有这些参与方的需求。掌握了这些知识，你将能够更好地管理\
  \ Java ME 开发项目。\n\n**介绍 Java ME 的市场**\n\n三股力量主导着 Java ME 市场：寻求在市场中实现产品差异化的*设备制造商*，寻求服务差异化并提高每用户平均收入（ARPU）的*无线运营商*，以及以新颖方式个性化其设备的*消费者*。\n\
  \n**从设备制造商的角度看**\n\n设备制造商与无线运营商之间的相互作用是复杂的。制造商之间不断竞争以实现产品差异化，同时，在许多市场中，他们又受制于无线运营商，必须满足其在特性和功能方面的严格要求。\n\
  \n设备制造商大致可分为两类：*原始设备制造商*（OEM）和*原始设计制造商*（ODM）。OEM 以自有品牌制造设备，并将设备销售给消费者（直接销售或通过运营商销售，或者最常见的是两者兼有），而\
  \ ODM 则代表其他公司设计和制造硬件。虽然 ODM 和 OEM 都必须在价格、质量和特性上实现产品差异化，但对于 OEM 来说，品牌和营销也成为了关键问题。\n\
  \n当今许多无线运营商只是要求其提供给用户的大多数手机上配备 Java ME 运行时。正如我在下一节“从运营商的角度看”中所讨论的，运营商正在寻求提高每用户收入的方法，而数据服务就是实现这一目标的一种方式。如今，数据服务不仅仅包括无线\
  \ Web 服务；许多 Java ME 应用程序依赖网络来获取其内容。\n\n要求手机制造商在其设备上包含 Java ME，为开发者创造了开发新应用程序的大门，这些应用程序能为运营商提供新的收入来源。\n\
  \n对许多制造商来说，在设备上提供 Java ME 不仅仅是一项运营商要求。一些制造商，包括 Research In Motion（RIM），提供的 Java\
  \ ME 运行时既符合 Java ME 标准，又在其实现中包含额外的类，使开发者能够在手机的基础平台之上构建新颖的应用程序。然而，更常见的是，你会发现基线 Java\
  \ ME\n\n\n\n在设备上实现。无论哪种情况，Java ME 都能让设备制造商比使用现有嵌入式工具包更快地为其产品构建和捆绑应用程序。\n\n对于日益增多的通过家庭或市政有线和无线网络连接的专用设备而言尤其如此，这些设备可能并不强制要求使用\
  \ Java ME。Java ME 为无线互联网设备、机顶盒和其他嵌入式系统编写应用软件，提供了一种现成的替代封闭式专有平台的选择。即使最终平台对第三方开发者封闭，选择\
  \ Java ME\n\n也能帮助设备制造商将其产品推向市场，因为它提供了一个比内部定义或纯嵌入式替代方案更强大且更广为人知的平台。\n\n无论是出于客户需求、作为差异化机会，还是为了加快产品开发，Java\
  \ ME 相比其他平台都提供了重要优势。与其更大的同类平台——Java 平台标准版（Java SE）和 Java 平台企业版（Java EE）不同，Java ME\
  \ 经过精心调整，可在小型设备上运行，这对于满足当今大多数设备的成本和功耗限制至关重要。它是一个开放平台，通过 Java 社区流程（JCP）鼓励技术贡献。最后，Java\
  \ ME 带来了整个 Java 开发者社区，提供了一个由才华横溢的工程师、设计师和项目经理组成的人才库可供选用。\n\n**从运营商的角度看**\n\n如今的无线运营商也面临挑战。虽然基于质量和品牌的差异化仍然重要，但主要挑战之一是追求更高的\
  \ ARPU（每用户平均收入）。语音业务的收入已基本趋于平稳，这使得数据服务成为一个明显的增长领域。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 1 章 ■ 绘制 Java 丛林地图\n\n**5**\n\n尤其是在包括美国在内的一些国家，运营商已花费巨资获取新无线频谱部分的使用权。\n\n虽然可以说无线网络、短消息服务（SMS）和多媒体消息服务（MMS）都在为数据服务的盈利做出贡献，但移动应用的作用也日益增长。Java\
  \ ME 应用可以通过两种方式做出贡献：一是推动数据使用本身，二是当运营商作为应用分发渠道时提供收入。如今，就像你可以通过运营商的无线门户网站为手机购买铃声或壁纸一样，你也可以购买\
  \ Java ME 应用。正如你将在本章后面（“营销和销售你的应用”）学到的，开发者与运营商之间的合作关系为应用销售建立了重要渠道，为双方带来收入。\n\n虽然盈利驱动着商业决策，但营销和品牌形象在\
  \ Java ME 对运营商的重要性中扮演着越来越重要的角色。通过向像你这样的第三方开发者开放网络，运营商将你的创造力带到了台前。此外，Java ME 为运营商提供了与全球关键品牌合作的新途径，帮助运营商实现差异化，并让远离移动计算市场的品牌有机会以新的方式与消费者互动。\n\
  \n**从消费者的角度看**\n\n如今的消费者对他们的设备要求更高。无论是使用手机、机顶盒还是专用设备，消费者都期望获得明确的价值。可靠性、易用性、个性化和网络感知能力，即使是传统上孤立的设备，这些特性也变得越来越重要。Java\
  \ ME 符合作为这些设备基础平台的要求，因为它小巧、高度可移植且功能强大。\n\n在无线通信市场，消费者对可靠性、易用性、个性化和网络感知能力的需求已经开始并持续增长。\n\
  \n在我撰写本文时，Sun 公司估计，自 Java 首次在手机上推出以来，已有超过 *二十亿* 个无线终端搭载了 Java 运行时环境。这些设备支持通信、娱乐、多媒体以及其他应用，为世界各地的移动设备用户带来了定制化和选择。\n\
  \n经过多年的持续努力，Java 有望在机顶盒市场复制这一成功。随着 Java 出现在每一台蓝光播放器以及无数用于个人娱乐的机顶盒上，新应用的潜力几乎是无限的。这个市场将比移动市场更加多样化，既有小型玩家和大型应用开发公司的空间，也有传统娱乐内容合作伙伴（其中许多是无线通信市场的后来者）的空间。\n\
  \n通过这一切，Java ME 使开发者能够为订阅用户提供更多的选择、自由和灵活性。基础平台使开发者能够创建独立应用以及具有网络感知能力的应用和游戏，同时\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**6**\n\n第 1 章 ■ 绘制 Java 丛林地图\n\
  \n使制造商能够添加更多接口来利用底层平台的定制功能。\n\n一些权威人士指责 Java ME 市场在某种程度上“本末倒置”——即为了技术本身而驱动消费者对应用的需求。\n\
  \n虽然这种说法并非完全没有道理，但这也是一个快节奏市场的本质，新产品在市场上接受检验，只有那些具有成功商业案例且对消费者有明确价值的产品才能生存。Java ME\
  \ 通过提供一个开放标准来加速这一过程，新产品和服务的开发可以基于此标准。\n\n**深入了解 Java ME 平台**\n\nJava ME 平台实际上并非单一平台，而是一系列可在众多移动设备上运行的平台和库的集合。更令人困惑的是，Java\
  \ ME 最初是作为手机和个人数字助理（PDA）的移动环境而诞生的，但后来已扩展到包括具有类似限制的设备，如工业设备、机顶盒、互联网设备以及其他受限平台。\n\n\
  **论证 Java 移动版的必要性**\n\n起初，Java 移动版的必要性可能并不明显。毕竟，如今的手机比十多年前运行首批商用 Java 版本的 PC 更强大。然而，Java\
  \ ME 的一个关键特性是其体积和性能占用。这对于移动和嵌入式设备常见的限制尤为重要。移动性对体积、功耗和成本带来的限制意味着，在可预见的未来，设备中将会使用性能较弱的处理器和更少的内存。这些限制同样适用于机顶盒等移动性较差的设备；在设计大众消费品时，每一分钱都很重要，因此通常只能使用低成本（较慢）的处理器和更少的内存。此外，随着绿色制造日益受到重视，固定消费设备也将面临与移动设备类似的功耗限制。\n\
  \n但 Java ME 不仅仅关乎占用空间。它还关乎一种看待计算的新方式。Java SE 和 Java ME 之间的许多差异在于功能，而非占用空间。Java 应用描述符（JAD）文件就是一个例子；它描述了一个应用，包括其名称、图标、发布者和其他信息。再比如\
  \ Java ME 的安全模型，它包含了接口的权限和许可概念。\n\n\n\n使用 Java ME 时，运行中的应用程序可能需要单独的权限来执行敏感操作，例如发送短信、通过基于位置的接口请求手机位置，或使用蓝牙交换数据。权限在\
  \ Java ME 应用程序的 JAD 文件中指定，并且可以根据应用程序的来源被授予或拒绝。（我将在第 3 章的“打包和执行 CLDC/MIDP 应用程序”部分更详细地讨论这一点。）\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 1 章 ■ 绘制 Java 丛林地图\n\n**7**\n\
  \n重要的是要认识到，Java ME 的最终目标是提供一个可扩展、高度可移植、占用空间最小的 Java 实现，该实现可以在具有持续或间歇性网络连接的各种网络设备上运行。\n\
  \n该平台的重点是应用级编程，而非系统级编程，并且所支持的应用程序编程接口（API）也反映了这一区别。可扩展性是另一个区别，特别是对于 Java ME 的一种变体：连接有限设备配置，我将在本章后面的“介绍连接有限设备配置”部分讨论这一点。可扩展性是整个平台、其他\
  \ Java 平台以及其他计算平台之间的一个关键区别。\n\n**让 Java 在移动设备上工作**\n\n第 2 章将详细探讨为 Java ME 对 Java\
  \ 及其基类所做的更改，但这里值得先总结一下这些更改：\n\n• Java 运行时必须能够拒绝无效的 Java 类文件，以确保系统安全性和完整性。\n\n• Java\
  \ 运行时控制应用程序对系统特定部分（例如文件系统、网络访问等）的访问。\n\n• 应用程序在沙箱内运行，防止未经授权访问其他应用程序和库。\n\n• 环境必须支持下载新应用程序的能力，但不能使用此机制以任何方式修改或覆盖受保护的系统类（包括更改类的查找顺序）。\n\
  \n• 平台库可能因性能和内存使用原因而缺少特定接口；例如，Java ME 的一种配置不支持对象终结，也不支持 Java 抽象窗口工具包（AWT）或 Swing\
  \ 用户界面库。\n\n• 根据版本不同，平台可能支持也可能不支持浮点数学运算。\n\n为简洁起见，我粗略地列出了这个列表；并非所有这些更改都适用于 Java\
  \ ME 家族中的所有 Java 变体，您将在下一节和第 2 章中了解到这一点。\n\n由于 Java ME 支持的设备种类繁多，实际上针对不同的设备有不同的\
  \ Java 实现。具体来说，Java ME 功能如何为特定设备定义基于三个概念：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**8**\n\n第 1 章 ■ 绘制 Java 丛林地图\n\n• *配置*：为广泛的设备定义基本的库集和 Java 虚拟机（VM）\n• *配置文件*：为更窄范围的设备定义一组\
  \ API\n• *包*：一组与特定技术（例如多媒体或蓝牙访问）相关的可选 API\n\n图 1-1 展示了这些抽象层如何叠加来定义设备的软件特性。\n\n**图\
  \ 1-1.** *Java ME 中配置、配置文件与包之间的关系*\n\n每个配置、配置文件或包的实例*应该*以一个或多个 Java 规范请求（JSR）为基础，这些\
  \ JSR 记录了所讨论的 Java 扩展的目的和接口。附录 A 总结了与 Java ME 相关且定义了本书所讨论功能的 JSR。\n\n如今，Java ME\
  \ 中有两种配置：连接有限设备配置（CLDC）和连接设备配置（CDC）。有少数配置文件位于这两种配置之上，以及许多、许多的包。（在下一节中，我将更详细地探讨这些配置。）\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 1 章 ■ 绘制 Java 丛林地图\n\n**9**\n\
  \n最广为人知的配置、配置文件和包的组合基于 CLDC 包，包括移动信息设备配置文件（MIDP）以及可选包，为当今全球数十亿部手机提供动力。事实上，这种配置*非常*普遍，以至于许多人认为它是\
  \ Java ME 的唯一版本。\n\n图 1-2 展示了一个典型的手机配置，带有一些常见的可选包。我将在本章后面的“介绍移动信息设备配置文件”部分深入讨论 MIDP。\n\
  \n**图 1-2.** *典型手机中配置、配置文件与部分包之间的关系*\n\n另一种日益常见的组合基于 CDC 包，为机顶盒和其他设备提供动力。这种数字媒体配置适用于更高端的连接设备，它包含了基础配置文件和个人配置文件，以及可能额外的可选包。与\
  \ CLDC-MIDP 配置不同，此配置定义了 Java AWT 的一个子集，将易于理解的图形库引入移动设备。图 1-3 展示了当今消费电子设备中基于 CDC\
  \ 的典型配置。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**10**\n\n第 1 章\
  \ ■ 绘制 Java 丛林地图\n\n**图 1-3.** *典型机顶盒或其他数字媒体硬件中配置、配置文件与包之间的关系*\n\n**理解配置**\n\nJava\
  \ ME 架构的基本构建块是配置。\n\n配置为尽可能广泛的设备（例如所有移动无线终端或所有类似机顶盒的设备）定义了 Java 虚拟机（JVM）、基本语言支持和基础类。特定设备必须满足至少一个配置（例如\
  \ CLDC）的要求，才能有资格成为 Java ME 设备。\n\n**介绍连接有限设备配置** CLDC 是专门为内存受限的设备设计的，这些设备可能始终或间歇性地连接到网络。它定义了一个基于\
  \ Java K 虚拟机（KVM）的 Java 环境，KVM 是 JVM 的一个修改版本，经过特别调整，可以在具有 16 位或 32 位处理器且 RAM 低至\
  \ 192KB 的低功耗设备上运行。正如我已经指出的，CLDC 最常见的部署是在过去几年中出货的数十亿部支持 Java 的手机中。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 1 章 ■ 绘制 Java 丛林地图\n\n**11**\n\n具有 CLDC 的设备相当原始；它缺少许多您期望找到的允许应用程序开发的类（例如用户界面小部件、网络连接等）。相反，实现将这些细节留给\
  \ CLDC 之上的配置文件，并专注于将内存和 CPU 占用空间减少到 Java 环境所需的最低限度。一个明显受影响的领域是 CLDC 中包含的库的性质；许多\
  \ Java SE 类在 CLDC 中根本不可用，而在那些可用的类中，并非所有方法都可用。这对于集合尤其如此，其中只有三个类和一个接口可用。（关于*实际支持*的内容的更多细节，请参见第\
  \ 2 章。）\n\n\n\n虽然 JVM 历来承担了 Java 字节码验证的全部负担，但 CLDC 的情况并非如此。由于字节码验证在处理器和内存方面都代价高昂，因此字节码验证的责任由开发者和运行在移动设备上的\
  \ KVM 共同分担。作为构建过程的一部分，你需要运行一个名为 preverify 的工具，该工具会在每个类文件中内联子程序（在此过程中移除某些字节码），并添加关于栈上变量及其类型的信息。在运行时，KVM\
  \ 利用这些额外信息在执行前完成字节码验证。\n\n■**注意** 两遍预验证显然会带来潜在的安全问题，因为恶意开发者可能注入看似已预验证但不符合 CLDC 所有标准的代码。为解决此问题，CLDC\
  \ 应用程序通常从可信来源下载；此外，与 CLDC 配合使用的配置文件——MIDP——增加了代码签名，以便 Java 实现能够验证所执行代码的发起者，并提供适当的信任级别。\n\
  \n但安全方面的变化并不仅限于此。Java 早期小程序开发者所熟悉的沙箱模型，在 CLDC 中扮演着更重要的角色，其中应用程序彼此之间以及与主机操作系统之间都被隔离。每个应用程序都在一个环境中运行，它只能访问自身发行版中的类以及设备配置、配置文件和可选包提供的本地类。其他\
  \ Java 应用程序的下载、安装和管理也无法访问，从而防止一个应用程序影响另一个。最后，没有创建本地方法的机制，从而堵住了沙箱与本地平台之间的潜在漏洞。\n\n\
  CLDC 的另一个关键特性是通用连接框架（GCF），它定义了一个接口层次结构，用于泛化端口连接。由此产生的层次结构提供了一组单一的类，你可以用它们连接到任何网络或远程端口，包括基于\
  \ IP 的传输控制协议（TCP/IP）、用户数据报协议（UDP）和串行端口等。GCF 定义在`javax.microedition.io`包中。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**12**\n\n第 1 章 ■ 绘制 Java 丛林地图\n\n由于处理器和功耗限制，CLDC 1.0 不支持浮点运算；CLDC 1.0 设备只能执行整数运算。这种情况随着\
  \ CLDC 1.1 的出现而改变，因为 CLDC 1.1 设备必须支持浮点运算。\n\n然而，作为开发者，你应该意识到浮点运算在计算上仍然代价高昂。在选择使用它们时要小心，因为它们可能会在你的应用程序中导致性能问题。\n\
  \n**介绍连接设备配置**\n\nCDC 适用于比 CLDC 所用设备功能更强大的设备，例如高端 PDA、机顶盒和其他互联网设备。因此，CDC 的目标与 CLDC\
  \ 略有不同。CDC 并非针对尽可能多的低成本硬件，而是侧重于利用现有 Java SE 平台的技术和开发者技能，同时兼顾资源受限设备的需求。\n\n与 CLDC\
  \ 不同，CDC 虚拟机满足与驱动 Java SE 的 JVM 相同的要求。事实上，如果你向 CDC 添加通常出现在媒体功能设备上的配置文件和包，你会发现除了额外包可能提供的*额外*API\
  \ 之外，该环境与 Java SE 平台几乎没有什么区别。这就是 Java 的优势，尤其是更强大的 CDC：你可以在整个产品系列中利用你的 Java 技能。此外，CDC\
  \ 包含了 CLDC 所需的所有 Java 语言 API，包括 GCF。\n\nCDC 定义的包含类的包包括`java.lang`、`java.io`、`java.net`、`java.security`、`java.text`和`java.util`。运行\
  \ CDC 的设备还必须支持 CLDC 的 API 和包；这为所有 Java 应用程序提供了尽可能全面的支持。虽然这类设备在当今市场上很少见，但这显然是 Java\
  \ 未来的发展方向，因为大多数设备正变得越来越强大。\n\n**理解配置文件**\n\n配置文件收集了用于在一系列设备上构建最基本应用程序所必需的 API。迄今为止最著名的配置文件是\
  \ MIDP，它为手机提供动力并位于 CLDC 之上。同样重要的是基础配置文件（Foundation Profile），它类似于 MIDP，用于提供应用程序支持类。然而，与基于\
  \ CLDC 的设备不同，基于 CDC 的设备通常还包括个人基础配置文件（Personal Basis Profile）或个人配置文件（Personal Profile），或两者都包括，以为应用程序提供用户界面支持。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 1 章 ■ 绘制 Java 丛林地图\n\n**13**\n\
  \n**介绍移动信息设备配置文件**\n\nMIDP 是当今手机 Java 革命的基础（本书第二部分专门介绍 MIDP）。它定义了许多新接口，使你能够开发*MIDlet*，即运行在\
  \ CLDC 之上的应用程序。MIDP 还定义了以下这些其他接口：\n\n• 通过 MIDlet 实现的应用生命周期\n• 网络连接\n• 持久化存储\n• 声音\n\
  • 定时器\n• 用户界面（包括可移植显示和输入以及对游戏的支持）\n\n然而，MIDP 定义的不仅仅是接口和支持这些接口的类。它还描述了应用程序如何在设备上安装。虽然实际实现可能因设备而异，但一般要求是，你能够从设备上浏览应用程序，使用\
  \ HTTP/1.1 选择要下载的应用程序，然后让设备安装该 MIDP 并将其呈现在其应用程序管理器中。\n\n应用程序附带一个应用程序描述符（参见第 3 章“打包和执行\
  \ CLDC/MIDP 应用程序”部分），其中包含关于应用程序的信息，例如应用程序供应商、应用程序名称和应用程序大小。\n\nMIDP 定义了*权限*的概念，它指示\
  \ MIDlet 可以访问受限制的 API。MIDP 定义的唯一权限涉及网络连接，但包可以自由引入其他权限。权限是一个名称，使用与受限制 API 名称相同的前缀和类或接口名。例如，要使用网络套接字，MIDlet\
  \ 需要`javax.microedition.io.Connector.socket`权限。此权限随应用程序一起放在描述符文件中，MIDlet 可以使用`MIDlet`的`checkPermission`方法测试是否存在某个特权，如果权限被授予则返回\
  \ 1，未授予则返回 0，如果结果不确定（例如需要用户手动授予权限）则返回-1。\n\nMIDP 还定义了*可信应用程序*的概念，它被允许使用受限制的 API，例如文件连接包，来访问文件系统。应用程序通过其来源域获得信任；通常，应用程序通过由认证机构或运营商应用的加密签名来携带此信息。因此，即使拥有特权，应用程序也必须准备好处理安全异常，当应用程序不受信任并尝试访问受限制的\
  \ API 时，可能会发生这种情况。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**14**\n\
  \n第 1 章 ■ 绘制 Java 丛林地图\n\n**介绍基础配置文件**\n\n\n\n面向支持 CDC 的设备，基础框架（Foundation Profile）运行在\
  \ ROM 小于 256KB（当然，基础框架设备可以拥有更多 ROM，但这是该框架支持的最小值）、RAM 至少 512KB 且具备持久网络连接的设备上。从许多方面来看，基础框架的雄心远不及\
  \ MIDP。它与 CDC 结合，提供网络和输入/输出（I/O）支持，但不包含用于应用程序开发的类；这些功能被归入个人基础框架（Personal Basis Profile）和个人框架（Personal\
  \ Profile）。\n\n基础框架增强的类包括`java.lang`、`java.io`、`java.net`、`java.security`、`java.text`和`java.util`包中的类。这些类基于\
  \ Java SE 1.4 类层次结构中的类，以及额外的`javax.microedition.io`类，后者提供 HTTP 和基于传输层安全（TLS）的 HTTP\
  \ 网络操作。\n\n**介绍个人基础框架**\n\n大多数基于 CDC 的设备至少有一些用户界面需求。高度嵌入式的设备可能仅使用基础框架，并在其上叠加自定义包，以支持定制的液晶或发光二极管（LED）显示屏，但绝大多数设备都配备光栅显示屏，需要丰富的图形用户界面（GUI）。为了以标准方式满足这一需求，提供了两个框架。其中较小的一个是个人基础框架，它实际上为应用程序提供了*两个*类层次结构：applet\
  \ 模型，以及为媒体设备定义 Xlet 编程模型的新层次结构。Xlet 与 applet 类似，不同之处在于它们拥有支持暂停和恢复的生命周期，这对于媒体设备至关重要，因为多个应用程序和媒体流可能随时中断应用程序的执行。\n\
  \n个人基础框架还定义了用于 GUI 开发的 AWT 子集。\n\n与传统 AWT 不同，个人基础框架定义了一种*轻量级*控件机制，其中用户界面组件自行绘制，而非派生自原生平台的同级控件。（Java\
  \ Swing 实现采用了相同的方法，即让 Java 环境自行绘制控件。）因此，个人基础框架仅包含对`java.awt.Window`和`java.awt.Frame`（它们连接到原生平台的窗口管理器并包含轻量级组件），以及`java.awt.Component`和`java.awt.Container`（它们是用于创建层次结构中所有其他组件的轻量级组件）的支持。请注意，个人基础框架并未定义传统的\
  \ AWT 控件，包括按钮、列表和其他项目，因为这些控件会与原生平台的同级组件产生关联。相反，您可以创建自己的组件，或导入特定平台上提供所需组件的包。\n\n\
  最后，个人基础框架还包含支持 Xlet 间通信的类，这些类使用了 Java 远程方法调用（RMI）API 的子集。不过，务必记住，虽然`java.rmi`包的部分内容包含在个人基础框架中，但该框架*不*支持\
  \ RMI；仅包含了足够的 RMI 实现，以促进同一设备上运行的两个 Xlet 之间的通信。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 1 章 ■ 绘制 Java 丛林地图\n\n**15**\n\n**介绍个人框架**\n\n个人框架是个人基础框架的超集，它提供对整个 AWT 以及有限\
  \ JavaBean 支持。一些读者可能还记得 PersonalJava，它是 Java ME 的前身，面向高端互联网设备和机顶盒；基于 CDC 的个人框架是运行在\
  \ PersonalJava 上的应用程序的向前迁移路径。\n\n事实上，个人框架几乎与 Java SE 1.4.2 相同，但存在以下差异：\n\n*   通过可选包（`java.rmi`）提供对\
  \ RMI 的支持。\n*   通过可选包（`java.sql`）提供对 SQL 的支持。\n*   通过可选包（`java.swing`）提供对 Java Swing\
  \ 的支持。\n*   通过可选包（`org.omg`）提供对对象管理组（OMG）接口（包括通用对象请求代理架构（CORBA））的支持。\n*   目前不支持\
  \ Java 辅助功能 API（`javax.accessibility`）。\n*   目前不支持`java.naming`中的 Java 命名和目录接口（JNDI）。\n\
  *   不支持 Java 声音 API（`java.sound`）。\n*   对 JavaBeans 的支持仅限于运行时支持；不支持在 CDC 环境中直接运行的\
  \ bean 编辑器。\n*   不支持 applet API `getAccessibleContext`。\n*   已从所有受支持的类中移除 Java SE\
  \ 中已弃用的 Applet 和 AWT 方法。\n\n**理解包**\n\n包，顾名思义，是公共容器中的一个对象或一组对象。\n\n尽管平台和框架对 Java\
  \ ME 平台的模块化至关重要，但包可以说是 Java ME 持续成功的关键，因为它们允许 Sun 和第三方供应商为特定设备系列扩展 Java ME 平台。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**16**\n\n第 1 章 ■ 绘制 Java\
  \ 丛林地图\n\nJava ME 有无数个包；许多已成为成功基于 MIDP 设备组成部分的标准接口，实际上就是包。在本书中，您将学习如何使用多个包，包括：\n\
  \n*   GCF，记录于 JSR 30\n*   FileConnect 接口，为 MIDP 提供本地文件访问，记录于 JSR 75\n*   Java 蓝牙\
  \ API，记录于 JSR 82\n*   无线消息 API，记录于 JSR 120\n*   Web 服务 API，记录于 JSR 172\n*   Java\
  \ 高级图形和用户界面（AGUI）API，用于 CDC 设备，记录于 JSR 209\n*   Java 移动服务架构（MSA），记录于 JSR 248\n\n\
  **规划您的 Java ME 开发方法**\n\nJava ME 的优势植根于当今 Java 的普及性。然而，这种普及性也带来了挑战。众多的 API 和多样化的分发渠道使得规划应用程序的技术和业务方面同等重要。\n\
  \n**选择合适的设备目标**\n\n如您所见，配置、框架和包的三元组意味着要管理*大量*不同的 API。对于许多类型的应用程序来说，这可能不是一个严重的问题——大多数生产力和网络应用程序只需要一个网络层、一些\
  \ GUI 元素和一个持久存储，这在您可能遇到的几乎任何配置和框架组合下都是可用的。\n\n然而，情况并非总是如此。您的应用程序可能依赖于仅在特定包中存在的功能，无论是出于设计（例如，用于邻近检测的蓝牙应用程序）还是产品差异化。使用可选包来加快上市时间也总是充满诱惑，但后来才发现它在产品的下一个目标上不可用。\n\
  \n因此，如果可移植性很重要，您应该尽可能少地基于 Java ME 包来构建应用程序。显然，这并不意味着在非必要的情况下从头创建自己的控件框架或实现自己的 Web\
  \ 服务框架。但这确实意味着要了解您目标设备上可用的 API，并定期进行市场调研。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 1 章 ■ 绘制 Java 丛林地图\n\n**17**\n\n\n\n我发现，在设计和实现应用程序时，最好记录下计划使用的 API，并将它们与定义这些\
  \ API 的 JSR 关联起来。这样，当需要将应用程序推向不同设备时，我就能检查新硬件提供了哪些包，并据此规划移植工作。\n\n像 Wireless Universal\
  \ Resource File (WURFL) 设备描述库（网址：http://wurfl.sourceforge.net）和 J2ME Polish（一个最初针对\
  \ Java ME 前身 J2ME 的库，用于简化跨设备开发）的支持数据库（网址：http://devices.j2mepolish.org/）这类网站，在规划产品发布或移植工作时非常宝贵。在设计应用程序时稍作研究，就能在向消费者推出时获得巨大回报。\n\
  \n**营销与销售你的应用程序**\n\n如今，Java ME 应用程序的发布渠道多种多样，每个渠道都面临各自的商业挑战。鉴于 MIDP 如今的普及度，许多读者认为无线运营商是应用程序分发的合理渠道。另一些人则直接瞄准通过网页向硬件分发，或在制造阶段将应用程序与硬件捆绑。还有一小部分人可能直接与平台或硬件制造商合作，因此他们面向消费者的渠道（以及“消费者”这个概念本身！）就截然不同。\n\
  \n你可以通过多种方式将应用程序分发给消费者。直接分发当然是一种可能，即发布应用程序的链接（参见第 3 章，了解如何为不同配置打包应用程序）。这听起来简单，但却引出一个明显的商业问题：你如何从应用程序中获利？免费分发、广告、按次下载收费，或通过信用卡、PayPal\
  \ 订阅，这些都是可行的方式。\n\n由于大多数应用程序需要权限，而大多数开发者需要收入，移动应用程序的典型部署通常涉及第三方认证和商业谈判。第三方认证过程通常涉及一个商业项目，例如\
  \ Java Verified，它会测试你的应用程序，假设测试通过，则对你的应用程序进行加密签名以便分发。通常，获得这种签名背书的同时，也意味着获得了额外的权限；例如，大多数\
  \ MIDP 实现不允许在未经用户事先批准的情况下进行 HTTP 事务，除非应用程序已由 Java Verified 测试机构成员签名。签名后，你可以通过聚合商分发应用程序，聚合商会代表你和许多其他开发者协调与运营商的关系，并根据销售情况向你支付报酬（通常通过高级短信推送或直接计费）。另一种分发途径是与一个或多个无线运营商协商，以分发你的应用程序。这涉及到构建商业关系——消费者将为你的应用程序支付多少费用？如何获取？——以及额外的测试，这通常会导致你的应用程序获得第二个加密签名。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**18**\n\n第 1 章 ■ 绘制 Java\
  \ 丛林地图\n\n有了这个签名，可能会带来额外的权限，例如访问基于位置的 API。协商运营商合作关系可能是一项昂贵且耗时的任务，但如果没有中间聚合商的帮助，你需要为你希望发布应用程序的每个运营商网络进行这些谈判。\n\
  \n权限和加密签名的问题不仅仅是商业问题，也可能是一个功能性问题。这很可能影响你应用程序的功能需求；例如，Acme Wireless（一个虚构的运营商）可能只允许访问由*它*签名和分发的应用程序的基于位置的接口。\n\
  \n如果你的应用程序需要定位数据（例如，定位用户以推荐餐厅或服务），那么该需求将不仅仅是技术需求，更是建立必要运营商关系以确保所需权限的商业需求。这无疑增加了你商业模式的风险，因为很难提前确定特定运营商是否会采用你的应用程序，而提前获取这些信息可能涉及重大的商业投资。然而，如果你能弥合差距，为你的应用程序获得运营商签名和分发，这确实能给你带来一定的保证，因为这能为你的应用程序带来显著的定位和营销影响力。虽然这些评论主要适用于\
  \ Java ME MIDP 应用程序，但由于市场上存在大量 MIDP 应用程序和支持 MIDP 的设备，鉴于 MIDP 分发模式的巨大成功，我推测 Java\
  \ CDC 应用程序的格局也将类似。\n\n当然，如果你是一位参与制定商业策略的开发者，也不要忘记其他分发途径。直接与制造商合作，虽然难以达成，但却是潜在利润丰厚的长期收入来源。此外，提供\
  \ Java 咨询服务仍然是许多开发者的重要支柱。创造性地思考，一系列商业模式都可以支持你的应用程序开发和分发。\n\n**总结**\n\nJava ME 满足了运营商、设备制造商和消费者的需求。通过提供跨设备的丰富平台，从低端手机到高端机顶盒，从嵌入式设备到高端\
  \ PDA，Java ME 使像你这样的软件开发者能够利用自己的技能将新应用程序推向市场。\n\nJava ME 平台分为配置、平台和配置文件。目前有两种配置可用：CLDC，针对资源受限设备；CDC，针对功能更强大的设备。在这些配置之上是一个或多个配置文件，例如针对\
  \ CLDC 的 MIDP，或针对 CDC 的 Foundation、Personal Basis 和 Personal Profile。它们以标准方式提供额外的\
  \ API，让你能够为一类设备编写应用程序。最后，包允许 Sun 和第三方以标准方式扩展设备或设备系列上的 API，从而以可移植的方式提供对新功能的访问。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 2 章\n\n精简 Java 以适应需求\n\n**让**\
  \ Java 在资源受限设备上运行仍然是一个挑战，即使在首次尝试这样做近十年后。然而，Java ME 提供的配置正通过将 Java 平台带到尽可能广泛的设备选择中来帮助应对这一挑战。通过将\
  \ Java 拆分为独立的配置——CLDC 用于吞吐量最低的设备，CDC 用于具有中等内存和处理能力的受限移动设备——Java ME 可以为几乎每台移动设备提供计算环境。\n\
  \n在本章中，我将向你展示 Java ME 和 Java SE 之间的明确区别。\n\n我从 CLDC 开始，向你展示 CLDC 虚拟机过去和现在版本与运行 Java\
  \ SE 的虚拟机之间的具体差异。接下来，我以同样的方式审视 CDC。最后，我将你的注意力转向伴随每种配置的类库，精确地向你展示 CLDC 和 CDC 分别支持哪些类。\n\
  \n**使其适配：CLDC**\n\n要理解 Java ME CLDC 的局限性，了解一点其*历史*很重要。\n\n\n\nCLDC 本身的历史。CLDC 起源于\
  \ Java 发展早期，当时移动设备按今天的标准来看简直是功能残缺。手机的内存量远低于 1 兆字节，处理器按今天的标准也堪称羸弱。CLDC 的初始版本基于一个专为小型设备打造的全新虚拟机——Java\
  \ KVM。因此，它缺少了许多 Java 开发者习以为常的功能。2000 年在 JSR 30 中定义的 CLDC 1.0，是后来 Java ME 平台的起点。\n\
  \n为了跟上硬件能力和制造成本的发展，一个由 20 多家公司组成的专家工作组修订了 CLDC 标准，最终形成了定义 CLDC 1.1 的 JSR 139 标准。该标准于\
  \ 2002 年完成，考虑了移动设备不断增长的能力和市场，并重新加入了一些在 CLDC 1.0 短暂存续期间为了适配移动设备而从 Java 中剥离的功能。\n\n\
  **19**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**20**\n\n第 2 章 ■\
  \ 精简 Java 以适应需求\n\nCLDC 1.0 和 1.1 版本之间的区别可能会影响你的开发方法，也可能不会，因为当今销售的绝大多数新设备都支持 CLDC\
  \ 1.1（实际上，对于一些高端设备，甚至支持 CDC）。例如，在我撰写本文时，几乎所有无线运营商的 Java 功能手机——即运营商为提供低成本功能组合以推动语音和数据使用而补贴的手机——都符合\
  \ CLDC 1.1 标准。即使考虑到设备更替率（用户购买新设备的速度），市场上仍有无数 CLDC 1.0 设备，精明的开发者很可能从这些用户身上获取收益。另一方面，Java\
  \ ME 平台的许多引人注目的功能（通过 JSR 流程定义的包提供，如我在第 1 章所述），例如多媒体和 3D 图形，仅在相对较新的手机上可用，这些手机通常运行\
  \ CLDC 1.1 和 MIDP 2.0 或 2.1。\n\n因此，在规划应用程序时，你应该在较新版本 CLDC 或 MIDP 提供的 API 需求与业务案例之间取得平衡。你需要回答这个问题：你的应用程序的技术要求是否会大幅减少可运行该应用的设备数量，从而导致你的业务案例失效？这是前沿\
  \ Java ME 开发者面临的常见问题，但如今已不如过去几年那么突出，并且随着时间的推移（如我在本章“展望 CLDC 的未来”一节中所讨论的），这个问题应该会完全消失。\n\
  \n**了解现状：CLDC 1.1**\n\n成本和功耗严重限制了即使是当今移动设备的能力。虽然消费者对高能力可个性化设备的需求仍然很高，但制造成本仍然是一个关键因素，并驱动着低成本组件的选择（意味着更少的内存、更慢的处理器等）。尽管摩尔定律为消费者带来了更快、更便宜的设备，但电源却无法跟上，使得电源管理成为移动设备的另一个关键挑战。因此，受限设备依然存在，CLDC\
  \ 在这些设备上仍有其用武之地。\n\n具体来说，CLDC 1.1 在以下几个方面与 Java SE 不同：\n\n*   ***CLDC 1.1 不提供对象实例的终结化***：根据定义，CLDC\
  \ 库不包含 `Object.finalize` 方法。\n*   ***CLDC 1.1 不支持异步异常***：虚拟机不会抛出异步异常，并且你不能调用 `Thread.stop`，因为它在\
  \ CLDC 中不存在。\n*   ***CLDC 1.1 仅支持有限数量的 `java.lang.Error` 子类***：对于其他错误，CLDC 要么以特定于实现的方式停止虚拟机，要么抛出最近定义的\
  \ `java.lang.Error` 子类。（请参阅\n\n\n（本章稍后“java.lang.Exception 的变更”一节。）\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 2 章 ■ 精简 Java 以适应需求\n\n**21**\n\n• *CLDC 1.1 不支持线程组或守护线程*：CLDC 确实支持多线程，但如果你需要管理一组线程，则必须对集合中的成员使用单个线程操作。\n\
  \n• *CLDC 1.1 中的类文件验证是一个两步过程*：正如我在第 3 章“构建 CLDC/MIDP 应用程序”一节中所讨论的，CLDC 要求在应用程序开发期间进行预验证步骤，并在下载后完成后续验证。\n\
  \n• *出于安全原因，CLDC 1.1 不支持用户自定义的类加载器*：CLDC 必须拥有一个内部类加载器，其他代码无法以任何方式覆盖、替换或重新配置它。\n\n\
  除了 CLDC 1.1 缺少类终结化和线程组这两个可能的例外，这些差异不太可能影响你的应用程序开发方式。然而，影响范围更大的是 CLDC 类库本身的缩减，我将在本章稍后（“修改\
  \ Java 类库以适应 CLDC”一节）对此进行探讨。\n\n**摩尔定律与移动设备**\n\n摩尔定律——即集成电路芯片上可容纳的晶体管数量呈指数级增长这一观察结果——推动了计算革命的诸多方面，包括\
  \ 50 多年来计算速度和内存密度的提升。该定律由戈登·摩尔在 1965 年发表于《电子学杂志》的一篇文章中记录，它并非自然法则，而是对集成电路生产所带来的规模经济效益的认知。\n\
  \n对于移动设备而言，摩尔定律带来了两个关键点：每个晶体管成本的不断下降意味着可以用更少的钱买到更强的计算能力；同时，晶体管密度的提高使得便携设备在内存和速度上以与桌面设备相同的指数级速度提升。但这并不意味着移动设备和桌面设备的能力会*趋同*，因为摩尔定律同样适用于更大的计算平台。\n\
  \n此外，摩尔定律几乎未触及的一个领域是为移动设备提供能源。尽管过去二十年电池行业在技术上取得了许多进步，但这些进步本质上并非指数级的，这促使硬件和软件开发者积极努力，在硬件和软件层面管理功耗。这当然会直接影响计算资源，因为计算资源在运行时需要消耗电力。\n\
  \n这些因素很可能会持续到未来，这意味着尽管移动设备会变得越来越强大，但移动设备和桌面设备真正趋同的可能性不大。\n\n相反，更有可能的是，移动设备将足以支持过去桌面设备执行的大部分操作——我将在本章稍后的“展望\
  \ CLDC 的未来”一节中对此进行更多讨论。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  **22**\n\n第 2 章 ■ 精简 Java 以适应需求\n\n**回顾 CLDC 1.0**\n\nCLDC 1.0 的限制比 CLDC 1.1 多得多，考虑到其开发的时代背景，这一点不难想象。在开发符合\
  \ CLDC 1.0 规范的应用程序时，你必须考虑以下限制：\n\n• *不支持浮点运算*：符合 CLDC 1.0 规范的虚拟机不支持浮点字节码，也没有执行浮点数学运算的库\
  \ API。这些限制反映了 CLDC 1.0 通常针对的处理器能力。\n\n• *不支持弱引用*：符合 CLDC 1.0 规范的虚拟机不支持 WeakReference\
  \ 声明。\n\n• *不支持线程命名*：符合 CLDC 规范的虚拟机不支持为线程命名。\n\n\n\n•   `java.util.Calendar`、`java.util.Date`\
  \ 和 `java.util.TimeZone` 类的*不同用途*：这些类与其 Java SE 对应类存在显著差异。\n\n**展望 CLDC 的未来**\n\n\
  尽管我认为移动设备与固定设备之间真正实现能力融合仍需时日（参见边栏“摩尔定律与移动设备”），但就许多应用（包括数据处理、多媒体、娱乐、社交网络和用户生成内容）的基本可用性而言，移动设备可以说已与桌面设备并驾齐驱。目前，一些高端无线终端（如诺基亚和索尼爱立信销售的产品）已同时提供符合\
  \ CDC 和 CLDC 规范的运行时。展望未来，Sun 公司的代表已表示，Java ME 和 Java SE 接口最终将合并为一个统一平台。\n\n这是否意味着\
  \ CLDC 的重要性会降低？当然不会，因为已有数十亿台运行 CLDC 的设备掌握在消费者手中，未来几年还将有数十亿台设备出货。相反，我们应期待 CLDC 与完整\
  \ Java SE 平台之间的差距被逐步填补，就像从 CLDC 1.0 过渡到 CLDC 1.1 时填补了差距一样。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 2 章 ■ 精简 Java 以适应需求\n\n**23**\n\n**实现适配：CDC**\n\n在某些方面，CDC 的历史比其较小的同类 CLDC 更为曲折。\n\
  \nCDC 最初以 PersonalJava 的形式诞生，基于 Java 1.1.8，实际上历史相当悠久，可追溯到九十年代末。PersonalJava 包含一个经过高度优化的\
  \ Java 虚拟机以及一个关联的类库，该库整合了大部分 Java 技术栈（包括 GUI），适用于机顶盒、高端联网无线终端及其他产品的应用开发者。\n\n几年前，Sun\
  \ 公司宣布了 Java 的三种风格：Java 2 平台微型版 (J2ME)、Java 2 平台标准版 (J2SE) 和 Java 2 平台企业版 (J2EE)。PersonalJava\
  \ 虽然得以保留，但被纳入 Java ME，随后走到了生命周期的终点，这意味着 Sun 公司停止了对该平台的支持。\n\n与此同时，Sun 公司引入了定义 CDC\
  \ 的 JSR 36。CDC 面向那些需要完整虚拟机来运行硬件的设备，这些设备通过可选扩展，可以运行整个 Java 2 平台。JSR 36 的实现基于 Java\
  \ SE 1.3，并包含了 CLDC 定义的所有附加接口，为从 CLDC 设备迁移提供了路径。定义 CLDC 1.1.2 的 JSR 218 规范了针对 Java\
  \ SE 1.4.2 的接口，有助于确保 CDC 与更大规模 Java 环境之间的持续对等性。\n\n逐一列举 CDC 中的每个类意义不大，因为其列表与 Java\
  \ SE 的类列表相同。不过，我仍有必要指出 CDC 中包含的*包*，因为虽然 CDC 提供了兼容性基线，但它并未提供构建完整应用所需的用户界面类。表 2-1\
  \ 展示了 CDC 提供的包。\n\n**表 2-1.** *CDC 1.1.2 提供的包*\n\njava.io\n\njava.lang\n\njava.lang.ref\n\
  \njava.lang.reflect\n\njava.math\n\njava.net\n\njava.security\n\njava.security.cert\n\
  \njava.text\n\njava.util\n\njava.util.jar\n\njava.util.zip\n\njavax.microedition.io\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**24**\n\n第 2 章 ■ 精简 Java\
  \ 以适应需求\n\nCDC 是一个比 Java SE 限制更多的环境。请注意以下几点：\n\n•   如果你使用的 CDC 实现支持调用本地方法，则必须使用\
  \ Java 本地接口 (JNI) 1.1 来与这些本地方法交互。\n\n•   如果你使用的 CDC 实现支持调试接口，则必须使用 Java 虚拟机调试接口\
  \ (JVMDI) 进行调试。\n\n•   CDC 不支持安全代码签名、证书、密钥库以及 JDK 1.1 的 `java.security.Identity`\
  \ 和 `java.security.IdentityScope` 接口。\n\n\n\n通常，你遇到的任何 CDC 实现都会附带一个或多个配置文件，例如基础配置文件（Foundation\
  \ Profile），它为你提供了对 GUI 和其他功能的支持。\n\n**修改 Java 类库以适应 CLDC**\n\n缩小 Java 虚拟机只是让 CLDC\
  \ 适应移动设备的部分技巧。Java 对开发者的一个关键优势在于其强大的类库。\n\n然而，所有这些代码同样是用 Java 编写的，并且在资源受限的设备上会消耗宝贵的只读内存空间，而且有些类甚至可能因其运行时内存消耗而不适用。当然，如果没有其类层次结构，Java\
  \ 就不会成为一个如此有吸引力的平台，因此 CLDC 的设计者们取得了一个平衡，建立了一个拥有相对较少 Java 接口的环境，该环境可以在尽可能广泛的设备上运行，同时支持大量的应用程序。（当然，设备制造商可以自由地添加——并且已经添加——大量额外的接口。）\n\
  \n除了显而易见的部分——如你所知，AWT 和 Java Swing 都不属于 CLDC——许多其他类，以及其他类的一些方法，也被从 CLDC 中省略了。在接下来的章节中，我将向你展示\
  \ `java.lang`、`java.util` 和 `java.io` 层次结构中，CLDC 1.0、CLDC 1.1 和 Java SE 之间存在哪些差异，以及\
  \ CLDC 对 Java 类库家族所做的补充。\n\n**对 java.lang 包的修改**\n\n表 2-2 列出了从 `java.lang` 包继承的类。这些类中的许多都是\
  \ Java SE 中实现的子集。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 2 章 ■\
