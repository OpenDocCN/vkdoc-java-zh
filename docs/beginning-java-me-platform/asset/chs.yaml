  \ ME 特定配置的兴趣。**\n\n**在接下来的篇幅中，我将讨论 Java ME 平台的一些最重要的扩展。有些扩展，如 MMAPI，几乎可以在当今生产的所有\
  \ Java ME 设备上找到。其他扩展则不那么普遍，要么是因为它们是 Java ME 领域的新成员，要么是因为制造商推动这些 API 面向开发者和消费者的动力较小。与之前的部分不同，那些部分我旨在让你作为主菜来享用和消化，这些章节的组织方式不同。每一章都旨在独立成篇，让你领略\
  \ Java ME 平台为满足需求而发展的各种方式。请享用，祝你好胃口！**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 5 部分\n\n其他 Java ME\n\n接口\n\n**在最后四个部分中，你已经学习了使用支持 Java ME 的两种 Java 配置（CLDC 和\
  \ CDC）构建应用程序的基础知识。在此过程中，你已经看到了 Java ME 平台中使其如此强大的大部分接口和库：Java 语言和基本 Java 接口；通过 MIDP、AWT\
  \ 和 AGUI 提供的 GUI 支持；通过 Java 现有机制或 FCOP 提供的文件支持；通过 HTTP 和无线协议进行的通信；以及其他特性。你所看到的大部分内容完全属于\
  \ Java ME 平台；有些部分，如 FCOP 和 PIM API 以及对 Web 服务和无线消息传递的支持，实际上是 Java ME 平台的扩展，这些扩展非常普遍，几乎在所有\
  \ Java ME 设备上都能遇到。其他部分，如 Personal Profile 和 AGUI 提供的高级图形工具包，则不那么常见，但你未来遇到它们的可能性越来越大。**\n\
  \n**然而，本书的其余部分并非关于 Java ME 本身，而是关于一些位于 Java ME 之上的最强大、最令人兴奋的包。在我撰写本文时，有超过 20 个 JSR\
  \ 定义了增强 Java ME 平台的可选包。它们提供了支持额外功能的接口，例如加密接口、视频支持和基于位置的服务。并非所有由 JSR 流程定义的包都适用于所有\
  \ Java ME 设备，但所有设备之间日益增长的融合趋势意味着，考虑到你的应用程序创意，你很可能会找到一个记录着实现你所需接口的 Java ME Java 包的\
  \ JSR，并且会有足够多的设备支持该包。因此，你的应用程序很可能拥有一个可行的市场。**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 15 章\n\n保护 Java ME\n\n应用程序\n\n**安**全性在当今移动市场的成功中扮演着重要角色。消费设备比以往任何时候都更深入地融入电子商务的基础设施中。这场革命由移动版本的安全和信任技术（主要得益于上一代加密技术的革命）推动，这些技术也为互联网上的电子商务提供动力。\n\
  \n在本章中，我将介绍 Java ME 开发者可用的一些不同组件，这些组件可以帮助你创建更安全的应用程序。首先，我将探讨为什么你应该掌握当今安全基础知识，包括在设计安全应用程序时回顾一些关键构建块，然后我将讨论\
  \ Java ME 的安全与信任服务 API——一个提供智能卡和加密支持的可选包。接下来，我将简要介绍 Java ME 相对较新的非接触式通信 API，该 API\
  \ 通过近场通信设备实现安全商务应用，使你能够将移动设备用作无线钱包。最后，我将以对 Bouncy Castle 加密包的讨论作为结束——这是一个功能齐全的开源包，用于为\
  \ Java ME 设备提供加密功能。\n\n**理解安全需求**\n\n\n\n当我编写第一个网络应用程序时，互联网还是一个很小的世界——虽然小到并非人人都认识彼此，但密码常常以明文形式传输，如果人们有意为之，几乎每个人都能读到它们。当然，那也是在万维网出现之前，编写网络应用程序需要严谨的协议工作，或者对当时流行的远程过程调用语义有深入理解。转眼几十年过去，互联网已不再是狂野蛮荒的边疆，而是一座熙熙攘攘的大都市。\n\
  \n虽然人们很容易将加强安全性的需求归咎于用户数量的激增，但事实远比这复杂，它既反映了人类的存在，也同样反映了人性。如今，保护应用程序的安全，在抵御（真实或想象中的）针对知识产权和商业资源（如内容、存储、服务和个人信息）的攻击方面，与赢得相关利益方的信任同等重要。\n\
  \n设计安全的应用程序，既需要深入了解应用程序面临的风险，也需要掌握可以采取哪些对策来减轻这些风险。简而言之，*风险*是任何可能导致损失的可能事件。风险与*威胁*相关联——威胁是触发风险事件的一种方式。以下是风险威胁的示例：\n\
  \n*   用户未经付费就访问你的应用程序\n*   用户的个人数据（如身份信息）在知情或不知情的情况下被泄露给未经授权的第三方\n*   第三方在与你的客户互动时冒充你\n\
  \n在当今高度网络化的世界里，大多数人关注的是由网络应用程序显现出来的风险，但当然，这并非唯一需要关注的风险。考虑一下用户丢失移动设备，第三方访问其记录存储以获取个人数据的情况。\n\
  \n你可以通过采用*对策*来应对威胁，这些对策旨在阻止威胁触发风险，例如：\n\n*   仅通过可信的分发服务，将你的应用程序和内容提供给那些能防止再分发的设备\n\
  *   在通过网络传输或存储到设备记录存储之前，对易受攻击的个人数据进行加密\n*   在与客户交互时，使用带有签名证书的安全网络协议（如 HTTPS）来验证身份\n\
  \n对策设计的核心是成本概念：在选择对策时，你的目标是让假想的对手执行某项任务的成本，高于该任务在考虑实际风险事件发生可能性后的价值。你必须在安全带来的成本（更高的复杂性、更大的占用空间、更复杂的用户操作）与安全威胁实现后的成本之间取得精细的平衡。\n\
  \n当今保护应用程序安全的一个关键工具是*密码学*：隐藏信息的艺术与实践。密码学解决方案主要基于数论的最新进展，提供了几种应对安全威胁的工具，包括：\n\n*\
  \   **密码**：密码允许你加密数据或解密已加密的数据。加密密码接收你的原始消息（称为*明文*），并将其转换为没有相应解密密码的第三方无法读取的形式。密码依赖于*密钥*；要解密加密的消息，你必须拥有密钥。当今的密码利用数论的进步，允许你将密钥分为公钥和私钥两部分；共享秘密消息的参与者自己保留私钥，并使用接收者的公钥来加密消息。\n\
  *   **消息摘要**：消息摘要不过是一个巧妙设计的哈希函数；它接收一大块数据，并将其缩减为一小块数据。两种流行的消息摘要函数是 SHA-1（为任意输入生成\
  \ 20 字节长的摘要）和 MD5（为任意输入生成 16 字节长的摘要）。\n*   **数字签名**：数字签名是一种个性化的消息摘要。它使用个人的私钥创建消息摘要，该摘要可以使用签名者的公钥进行验证，以证明生成签名的人确实签署了该消息。\n\
  *   **证书**：证书实际上只是数字签名的扩展——它是由可信第三方签署的、用于证明你身份的文件。\n\n■**注意** 要全面了解密码学概念和算法，布鲁斯·施奈尔（Bruce\
  \ Schneier）所著的《应用密码学：协议、算法与 C 语言源码》（John Wiley & Sons, 1995）是最佳选择。\n\n这些工具如今在移动市场中得到了广泛应用。以数字签名和证书为例：它们为当今无线应用的“甲板内”交付提供了基础。通过\
  \ Java 验证计划，第三方在将你的应用程序交给运营商分发之前对其进行签名；当设备下载你的应用程序时，它会验证签名，并根据签署你应用程序的权限授予对受限 API\
  \ 的访问权限。\n\n这些工具的另一个应用是基于 TLS 的 HTTPS。HTTPS 是 HTTP 的安全版本，你可能正在用它来保护应用程序的网络通信。HTTPS\
  \ 可以依赖客户端和服务器之间交换的证书来证明双方的身份；无论如何，它都使用公钥密码来加密客户端和服务器之间的网络通信。\n\n当然，密码学只是众多对策中的一种。设计安全的应用程序需要*纵深防御*——永远不要只依赖单一的安全措施。包括物理安全（例如，防止访问你的应用服务数据中心）、日志记录、审计以及使用安全网络通道在内的策略，都能帮助你保护网络应用程序的安全。请记住，密码学只能解决你所面临安全挑战的一部分，而且你面临的许多挑战可能是社会性的（想想当今电子邮件中普遍存在的网络钓鱼诈骗），而非技术性的。\n\
  \n■**注意** 布鲁斯·施奈尔（Bruce Schneier）的《秘密与谎言：网络世界中的数字安全》（John Wiley & Sons, 2000）以及凯文·米特尼克（Kevin\
  \ D. Mitnick）和威廉·L·西蒙（William L. Simon）合著的《欺骗的艺术》（Wiley Publishing, 2002）是开始学习更多关于应用程序安全面临的技术和社会威胁以及如何建立应对这些威胁的对策的好起点。\n\
  \n**审视 Java ME 的安全与信任服务**\n\nJava SE 提供了大量密码学接口，包括 Java 密码体系结构（JCA）和 Java 密码扩展（JCE）；但\
  \ Java ME 的基础实现并非如此。这其中有技术和法律等多方面原因；内存占用和计算复杂性使得密码学在某些 Java ME 设备上难以实现，而如果 Java\
  \ ME 捆绑了强大的密码学解决方案，出口限制可能会阻碍其在某些市场的采用。\n\n\n然而，Java ME 的可扩展特性解决了这一问题。JSR 177 定义了\
  \ J2ME 的安全与信任服务 API（SATSA）。除了支持加密操作外，SATSA 还包含 Java ME 的可选组件，这些组件提供了与硬件安全组件通信的 API，以及证书和签名管理功能。SATSA\
  \ 定义了设备可能支持的四个关键可选包：\n\n• *应用协议数据单元（APDU）*：此通信 API 支持你的应用程序与加密硬件（如 Java 智能卡）之间的底层通信。\n\
  \n• *SATSA-Java Card RMI（SATSA-JCRMI）*：此通信 API 允许你的应用程序与 Java 智能卡进行高级通信。\n\n• *SATSA-公钥基础设施（SATSA-PKI）*：此\
  \ API 提供对公钥管理的支持。\n\n• *SATSA-CRYPTO*：此 API 提供用于加密的 java.security 包的一个子集。\n\nAPDU\
  \ 协议建立在 GCF 之上，为与 Java 智能卡、通用用户识别模块（USIM）和安全令牌智能卡通信提供了通用接口。APDU 接口适用于底层通信，处理与加密硬件交换的单个字节级别；对于许多应用程序，SATSA-JCRMI\
  \ API 可能更合适。另外两个 API——SATSA-PKI API 和 SATSA-CRYPTO——为你的应用程序提供高级加密服务。\n\n■**注意**\
  \ 在我撰写本文时，还没有一个统一的 SDK 能在 NetBeans 或较旧的 Sun Java Wireless Toolkit 中实现所有这些可选包。更糟糕的是，JSR\
  \ 177 中描述的这些包不仅是可选的，而且供应商可能选择只实现 JSR 177 中描述的*部分*包。这可能导致这些 API 的可用性严重碎片化。\n\n**使用\
  \ APDU API 与加密硬件通信**\n\n如今的智能卡保护着许多流行的消费电子设备，包括一些手机、计算机和消费电子机顶盒。它们也是一些工业通信控制系统的关键安全特性。智能卡的核心只是一张小型塑料卡，内部嵌入了一个或多个加固的集成电路，提供存储空间，可能还有处理能力。智能卡通常具有防篡改特性，例如安全文件系统、安全微处理器，以及人眼可见的防篡改指示设备（如全息图或其他信息）。一些智能卡支持加密功能，如密钥生成和密码算法；SATSA\
  \ API 的目的是支持使用支持 Java ME 的硬件访问这些卡。\n\n在最底层的软件层面，Java 智能卡或 USIM 等硬件通过比特和字节通道与其主机硬件通信，类似于网络套接字或串行端口。国际标准化组织（ISO）提供了\
  \ ISO 7816 标准，用于描述智能卡与其主机硬件之间的机械、电子和软件通信方案。该软件方案依赖于应用程序标识符（AID）的概念，允许选择特定的智能卡功能；与智能卡的通信是通过\
  \ ISO 定义的应用协议数据单元协议（因此 SATSA 包用于与卡通信的协议得名 *APDU*）完成的。\n\n由于这种对卡功能的底层访问涉及通过通信通道交换字节，你可能会认为\
  \ Java GCF 是支持这种通信的绝佳方式，而你的想法是正确的。图 15-1 显示了 GCF 类与 APDU 层次结构之间的关系。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**418**\n\n第 15 章 ■ 保护 Java ME 应用程序\n\n**图 15-1.** *APDU 类与 Java ME GCF 层次结构的关系*\n\
  \n两个接口——`javax.microedition.apdu.APDUConnection` 和 `javax.microedition.jcrmi.JavaCardRMIConnection`——为你的应用程序提供了与智能卡通信的方式。顾名思义，你使用\
  \ `APDUConnection` 与卡进行底层 APDU 交互，而使用 `JavaCardRMIConnection` 对 Java 智能卡执行 Java\
  \ RMI——这是我在下一节“使用 JCRMI 与 Java 智能卡通信”中会涉及的主题。\n\n就像使用 GCF 访问 FCOP 或网络接口一样，你从一个统一资源标识符（URI）开始，该\
  \ URI 描述了你的应用程序将要连接的实体。对于智能卡，URI 的格式如下：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**419**\n\n第 15 章 ■ 保护 Java ME 应用程序\n\n`protocol:[slotid];target`\n\n每个部分的定义如下：\n\
  \n• `protocol`：对于基于 APDU 的连接（返回实现 `APDUConnection` 的对象），为 `apdu`；对于基于 JCRMI 的连接（返回实现\
  \ `JavaCardRMIConnection` 的对象），为 `jcrmi`。\n\n• `slotid`：一个整数，表示用户插入卡的插槽。\n\n• `target`：要连接的特定智能卡应用程序的应用程序标识符，或者连接到\
  \ SIM 应用程序工具包的关键字 `SAT`。\n\n由于设备可以支持多个卡槽，你可以使用 `System.getProperty` 方法并传入 `microedition.smartcardslots`\
  \ 属性来查询支持智能卡的硬件，该属性返回一个逗号分隔的现有卡槽标识符列表。每个标识符由两个字符组成：第一个字符表示你在指定 URI 以指示插槽时使用的索引，第二个字符是\
  \ `C` 或 `H`，表示该插槽是冷插拔还是热插拔——即，卡片只能在设备关闭时移除（冷插拔），还是在设备运行时移除（热插拔）。\n\n一旦你建立了与智能卡的连接，就可以使用\
  \ `exchangeAPDU` 方法执行 I/O。使用 `exchangeAPDU`，你可以向智能卡发送命令 APDU，并以字节数组的形式接收响应。如有必要，你可以使用多个\
  \ `APDUConnection` 实例建立与智能卡的多个逻辑通道，从而允许你同时使用智能卡上的多个应用程序。例如，你可以编写如清单 15-1 所示的代码。\n\
  \n**清单 15-1.** *与智能卡交换 APDU*\n\n```java\nAPDUConnection ac;\n\ntry {\n\n    byte[]\
  \ commandAPDU = …;\n\n    String url = \"apdu:0;AID=A1.0.0.67.4.7.1F.3.2C.5\";\n\
  \n    ac = (APDUConnection)Connector.open(url);\n\n    // 发送命令 APDU 并接收响应 APDU\n\
  \n    byte[] responseAPDU = ac.exchangeAPDU(commandAPDU);\n\n    // 处理响应\n\n   \
  \ …\n\n} catch(Exception e){\n\n    // 处理异常\n\n    …\n\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**420**\n\n第 15 章 ■ 保护 Java ME 应用程序\n\n```java\n} finally {\n\n    …\n\n    if\
  \ (ac != null) {\n\n        // 关闭连接\n\n        ac.close();\n\n    }\n\n}\n```\n\n\
  当然，你应该准备好处理异常；可能会发生中断，例如用户在使用过程中弹出智能卡。完成后，你还必须关闭连接，以释放 Java VM 用于连接智能卡的底层资源。\n\n\
  `APDUConnection` 接口还支持启用、禁用、更改和确认个人识别码（PIN），智能卡所有者使用该 PIN 在允许智能卡执行操作之前进行身份验证。以下方法用于与用户交互，并在处理\
  \ PIN 后返回智能卡响应：\n\n• `changePin`：提示用户输入卡的当前 PIN，然后输入新 PIN，并在适当时将 PIN 更改提交到卡。\n\n\
  • `disablePIN`：提示用户输入卡的当前 PIN，并禁用后续使用 PIN 进行身份验证的需求。\n\n\n\n• enablePIN：提示用户输入当前卡片\
  \ PIN 码，并启用后续使用卡片时需要输入 PIN 码的功能\n• enterPIN：提示用户输入当前卡片 PIN 码并验证该 PIN 码\n\n要打开一个\n\
  \nAPDUConnection，您的应用程序必须以特权身份运行；您必须指定的权限是：对于任意智能卡应用程序 ID，使用`javax.microedition.apdu.aid`；对于\
  \ USIM 工具包，使用`javax.microedition.apdu.sat`。通常，此权限仅授予运营商、制造商或第三方可信域中的应用程序。\n\n**使用\
  \ JCRMI 与 Java 智能卡通信**\n\nAPDUConnection 提供了对智能卡最低级别的访问。这种访问级别不适合胆小者；它要求对智能卡基础知识以及智能卡上特定应用程序的通信协议有深入理解。这样的接口非常适合进行抽象，而这正是\
  \ JCRMI 的目的。\n\nJCRMI 利用 Java RMI 架构的概念，允许直接使用 Java 访问支持 Java 的智能卡上的操作（关于 RMI 在\
  \ Java 中的工作原理，请参阅第 11 章以获取更深入的理解）。您无需在单个比特和字节层面工作，而是可以连接到卡上的 Java 智能卡应用程序，获取该应用程序的存根接口，并远程调用其方法，如清单\
  \ 15-2 所示。\n\n**清单 15-2.** *使用 JCRMI 连接 Java 智能卡* try {\n\nString url = \"jcrmi:0;AID=A0.0.0.67.4.7.1F.3.2C.3\"\
  ; JavaCardRMIConnection jc =\n\n(JavaCardRMIConnection)Connector.open(url);\n\n\
  Wallet wallet = (Wallet)jc.getInitialReference();\n\n…\n\ncurrentBalance = wallet.getBalance();\n\
  \n…\n\njc.close();\n\n} catch (Exception e) {\n\n…\n\n}\n\n本质上，GCF Connector 类与您指定的\
  \ AID 的组合充当了远程 Java 对象的注册表；您使用 JavaCardRMIConnection 实例的`getInitialReference`方法来获取代表卡上远程应用程序的存根引用。\n\
  \n与 APDUConnection 一样，异常也可能发生；如果卡片未插入、智能卡应用程序不存在，或者 Java ME 应用程序根本不允许使用智能卡接口，都可能发生异常。请注意，如果在远程对象使用过程中弹出卡片，对远程对象的访问当然会失败；重新插入卡片需要\
  \ Java ME 应用程序重新连接到智能卡应用程序。\n\nJCRMI 接口在以下方面比 Java RMI 或 Java RMI OP 受到显著更多的限制：\n\
  \n• 远程类最多只能实现 15 个接口。\n• 远程方法只能返回基本 Java 类型（boolean、byte、short、int 以及这些类型的一维数组）。\n\
  • 参数和返回值按值传递，远程对象引用除外。\n\n与 APDUConnection 一样，使用 JavaCardRMIConnection 实例需要权限；您需要在应用程序的\
  \ JAD 文件或清单中声明`javax.microedition.jcrmi`权限。与 APDUConnection 一样，此权限的使用仅限于运营商、制造商或第三方可信域中的应用程序。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**422**\n\n第 15 章 ■ 保护 Java\
  \ ME 应用程序安全\n\n**利用 SATSA 高级 API 进行加密** 虽然您已经看到的 SATSA 定义的两个可选包用于与加密硬件交互，但剩下的两个包提供了当今许多移动应用程序所需的常见加密操作的实现。SATSA-CRYPTO\
  \ 包包括`java.security`包的一个子集、`java.security.spec`包的一个子集、`javax.crypto`包的一个子集以及`javax.crypto.spec`包的一个子集，以提供用于公钥和私钥管理、消息摘要、签名验证和数据加密的\
  \ API。SATSA-PKI 安全包包括`javax.microedition.pki`和`javax.microedition.securityservice`，它们定义了支持基本用户证书管理的类。\n\
  \n使用 SATSA-CRYPTO API，让我们看看您在应用程序开发过程中可能执行的两个常见操作：创建消息摘要和加密（或解密）消息。\n\n使用 SATSA-CRYPTO\
  \ API 创建消息摘要\n\n移动应用程序可能需要执行的最常见的加密操作之一是创建消息摘要。如今许多 Web 服务 API 使用消息摘要作为防止篡改 Web\
  \ 服务请求或响应负载的手段；消息摘要可能作为单独的 HTTP 头或 Web 服务请求的参数出现，或者简单地附加到 Web 服务头中。使用 SATSA-CRYPTO\
  \ API 可以非常轻松地实现这一点，如清单 15-3 所示。\n\n**清单 15-3.** *创建消息摘要*\n\nString webRequest =\
  \ \"…\";\n\nbyte[] message = webRequest.getBytes();\n\nstatic String digestAlgorithm\
  \ = \"MD5\";\n\nstatic int digestLen = 16;\n\nbyte[] digest = new byte[digestLen];\n\
  \ntry {\n\njava.security.MessageDigest md;\n\nmd = java.security.MessageDigest.getInstance(digestAlgorithm);\
  \ md.update(message, 0, message.length);\n\nmd.digest(digest, 0, digestLen);\n\n\
  } catch (Exception e) {\n\n// 处理 NoSuchAlgorithmException 或 DigestException\n\n\
  …\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 15 章 ■ 保护 Java ME\
  \ 应用程序安全\n\n**423**\n\nSATSA-CRYPTO API 提供了 MessageDigest 类，该类既提供了用于创建消息摘要算法实现的静态工厂，也提供了消息摘要算法的接口。您可以通过调用其`getInstance`函数并传递您想要实现的摘要函数名称（`\"\
  MD5\"`或`\"SHA-1\"`之一）来获取 MessageDigest 的具体实例。生成的 MessageDigest 对象通过调用其`update`方法消耗您传递给它的字节数组，并在您调用其`digest`方法时提供生成的消息摘要并重置算法。\n\
  \n这段代码假设您手头有一个 Web 请求，并且您希望为其生成一个 MD5 摘要，存储在`webRequest`中。由于 MessageDigest 接口处理字节数组，代码首先将\
  \ Web 请求表示为字节数组，然后声明变量来存储生成的摘要。完成此操作后，它获取 MD5 MessageDigest 实现的一个实例，并通过调用`md.update`将构成`webRequest`的字节传递给它。对于长文档，您可以多次调用此方法。一旦使用`update`将消息提供给\
  \ MessageDigest 实例，代码就会要求它使用`digest`方法计算摘要，该方法接受一个用于存储输出的字节数组以及数组中的字节数。\n\nSATSA-CRYPTO\
  \ 提供的 MessageDigest 实现通常包括 MD5 和 SHA-1 算法，但不能保证两者都可用。因此，您的应用程序应准备好处理`NoSuchAlgorithmException`。\n\
  \n您还可以使用 SATSA-CRYPTO API 通过创建源文档的消息摘要并将其与提供的消息摘要进行比较来验证消息摘要。\n\n\n\n没有用于比较消息摘要的\
  \ API；只需遍历每个摘要中的字节并比较各个字节，即可判断消息摘要是否相等。\n\n使用 SATSA-CRYPTO API 进行加密和解密\n\n在大多数情况下，唯一需要加密数据的时候是当数据离开设备进行网络传输时。在这种情况下，HTTPS\
  \ 通常足以满足您的数据安全需求；偶尔您可能会发现需要以加密形式在本地存储数据，或使用 HTTPS 以外的协议交换数据。SATSA-CRYPTO API 提供了用于加密和解密数据的接口，但有一个限制：虽然您可以使用公钥（也称为*非对称*）加密技术通过\
  \ SATSA-CRYPTO API 加密数据，但您无法解密使用公钥加密技术加密的数据。\n\n最好将 SATSA-CRYPTO 密码 API 视为一个接口，而不是具体的实现。对于给定的目标，无法明确保证您会遇到*哪种*密码实现；一台设备可能支持数据加密标准（DES）、Rivest\
  \ 密码 4（RC4）和加密标准（AES），而另一台设备可能只支持 DES。无论支持什么，使用 SATSA-CRYPTO 密码接口的一般方法保持不变：\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**424**\n\n第 15 章 ■ 保护 Java\
  \ ME 应用程序安全\n\n**1.** 将要加密的明文生成为一个字节数组。\n\n**2.** 生成用于加密明文的密钥，同样作为一个字节数组。\n\n**3.**\
  \ 获取所需密码实现的实例，该实例将是`java.security.Cipher`的一个实例。\n\n**4.** 初始化密码。\n\n**5.** 使用 Cipher\
  \ 的`update`方法逐步加密明文，或使用 Cipher 的`doFinal`方法在单次操作中完成加密。\n\n可以预见，解密是加密的逆过程；不是在步骤 3\
  \ 中指定密码，而是指定密码并指示它应在解密模式下使用。不是在步骤 5 中传递明文，而是传递密文。请参考清单 15-4，它演示了如何加密一条消息。\n\n**清单\
  \ 15-4.** *加密一条消息*\n\n```java\nString algo= \"RC4\";\nbyte[] secretKey = { … };\n\
  String plainText = \"Here there be treasure\";\nbyte[] plainTextBytes = plainText.getBytes();\n\
  try {\n    java.security.Key key =\n        new SecretKeySpec(secretKey, 0, secretKey.length,\
  \ algo);\n    java.security.Cipher cipher;\n    cipher = Cipher.getInstance(algo);\n\
  \    cipher.init(Cipher.ENCRYPT_MODE, key);\n    int ciphertextLength = plainText.length();\n\
  \    byte[] cipherTextBytes = new byte[ciphertextLength];\n    cipher.doFinal(plainTextBytes,\
  \ 0, plainText.length, cipherTextBytes, 0);\n} catch (Exception e) {…}\n```\n\n\
  这严格遵循了我逐步概述的算法；特别注意在初始化 Cipher 实例时使用`ENCRYPT_MODE`作为选定模式。解密将是加密的逆过程，代码只需在`init`的相应参数中传递`DECRYPT_MODE`即可。此代码运行后，假设没有异常，字节数组`cipherTextBytes`将包含加密后的文本。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 15 章 ■ 保护 Java ME 应用程序安全\n\
  \n**425**\n\n密码在处理输入方面可能有所不同；有些密码，如 DES，是*分组密码*，要求输入以规则大小的块形式出现，例如 64 字节的块。使用分组密码时，必须将输入填充到块对齐的边界；更复杂的是，某些分组密码是非对称的，这意味着输入块大小和输出块大小不同。其他密码，如\
  \ RC4，是流密码：它们只接收字节流（明文或密文）并施展其魔法。使用分组密码时，请确保将完整的块传递给`update`和`doFinal`方法。\n\n使用\
  \ Cipher 接口进行加密或解密时，可能会发生多种情况；这些情况通过以下异常之一发出信号：\n\n• 当输入未正确填充或块大小错误时，API 会为分组密码抛出`BadPaddingException`或`IllegalBlockSizeException`。\n\
  • 当对密码使用无效密钥时，API 会抛出`InvalidKeyException`。\n• 当您在初始化密码之前尝试使用它加密或解密消息时，API 会抛出`IllegalStateException`。\n\
  • 如果您尝试为不支持的算法获取 Cipher 实例，API 会抛出`NoSuchAlgorithmException`。\n\n■**注意** 在现实世界中，您不应如此轻率地将密码的私钥嵌入源代码或其他易于读取的资源（如\
  \ JAR 文件的组件）中。恶意用户可以通过反编译您的应用程序或 JAR 来找到密钥。相反，您可以在分发时创建密钥，为每个应用程序使用不同的密钥，并且仅通过安全的\
  \ HTTP 分发应用程序 JAD。\n\n然而，这意味着您的应用程序无法由 Java 验证计划的参与者进行签名和验证。您还可以提供一个 Web 服务，通过 HTTPS\
  \ 为您的应用程序提供安全的密钥生成和交付。\n\n**探索 Bouncy Castle 解决方案**\n**以应对安全挑战**\n\n虽然像 SATSA 这样的可选解决方案可以解决许多设备的问题，但依赖可选解决方案并不能实现\
  \ Java 所承诺的“一次编写，随处运行”。幸运的是，有一个可在 Java ME 上运行的解决方案：Bouncy Castle Java 加密 API。该 API\
  \ 在澳大利亚开发，并在宽松的开源许可下提供，它为 Java SE 的 JCE 和 JCA 提供了洁净室实现的提供者，\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**426**\n\n第 15 章 ■ 保护 Java ME 应用程序安全\n\n以及一个非常适合 Java ME 的轻量级加密 API。该 API 实现了许多流行的密码，包括\
  \ DES、AES、Blowfish、国际数据加密算法（IDEA）等，以及一系列消息摘要算法，包括 MD5 和 SHA。该 API 还提供了大量实用程序，包括对抽象语法标记一（ASN.1）编码和解码、X.509\
  \ 加密证书和公钥交换文件，以及安全/多用途互联网邮件扩展（S/MIME）和 OpenPGP 编解码器的支持。\n\n您可以从 http://www.bouncycastle.org/java.html\
  \ 获取该 API 的副本；在我撰写本文时，当前版本是 1.39。您需要下载该版本，解压，并将 ZIP 文件放入项目 lib 目录下的 zips 目录中。\n\n\
  Bouncy Castle API 由多个包组成；以下是您最可能使用的包：\n\n• `org.bouncycastle.crypto`：包含表示加密引擎、摘要和其他基本构造的基类\n\
  • `org.bouncycastle.crypto.digests`：包含实现消息摘要算法的类\n• `org.bouncycastle.crypto.engines`：包含实现密码算法的类\n\
  • `org.bouncycastle.crypto.generators`：包含实现密钥生成器的类\n• `org.bouncycastle.crypto.params`：包含实现特定密码算法选项表示的类\n\
  \n值得注意的是，用于 Java ME 的 Bouncy Castle 完整实现是*庞大*的：接近 1.5 兆字节！当然，几乎没有应用程序需要 API 提供的所有功能。为了管理依赖该\
  \ API 的应用程序的大小，您需要使用混淆器——我在第 3 章“构建 CLDC/MIDP 应用程序”一节中讨论过这一点。NetBeans 包含 ProGuard\
  \ (http://proguard.sourceforge.net) 混淆器，它在管理输出应用程序大小方面表现出色。图 15-2 显示了与 Bouncy Castle\
  \ API 一起使用的适当设置；在“构建”属性下选择“混淆”。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00004.png)\n\n第 15 章 ■ 保护 Java ME 应用程序安全\n\n**427**\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n**图 15-2.** *使用 Bouncy Castle API 的 Java ME 项目的代表性混淆设置*\n\n图 15-2 中显示的设置指示混淆器使用以下选项：\n\
  \n• –keep public class *.* extends javax.microedition.midlet.MIDlet: 强制 MIDlet 子类保留其名称\n\
  \n• -dontusemixedclassnames: 不允许在生成混淆类名时使用混合大小写，以解决 Microsoft Windows 中的一个问题\n\n\
  • -defaultpackage '': 重命名除实现 MIDlet 接口的包之外的所有包\n\n• -overloadaggressively: 尽可能为不同的方法使用相同的名称（即，只要不同的方法具有不同的参数和返回值），从而创建更小的包\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**428**\n\n第 15 章 ■ 保护 Java\
  \ ME 应用程序\n\n■**注意** 当混淆使用 Bouncy Castle API 的包时，-defaultpackage '' 指令尤其重要，因为 Bouncy\
  \ Castle 在 java 包中提供了一些类，例如 java.math.BigInteger。CLDC 的类加载器不会加载系统包中定义的类，因为这样做是一种安全威胁（它会使恶意应用程序能够用自己的类替换系统类）。通过使用\
  \ -defaultpackage '' 指令，混淆器会重命名该包中的任何类，因此这不会成为问题。\n\n让我们看看使用 Bouncy Castle API 与使用\
  \ SATSA API 创建消息摘要和加密消息的比较。\n\n**使用 Bouncy Castle API 创建消息摘要** 消息摘要函数由 org.bouncycastle.crypto.digests\
  \ 包提供，该包以与 JCA 一致的方式实现了各种消息摘要算法。摘要算法必须实现由 org.bouncycastle.crypto.Digest 定义的接口；这类似于在\
  \ SATSA-CRYPTO API 中也存在的 JCA 的 MessageDigest 接口。您可以编写清单 15-5 中的代码来计算 Web 请求的 MD5\
  \ 摘要。\n\n**清单 15-5.** *计算 Web 请求的 MD5 摘要* String webRequest = \"…\";\n\nbyte[] message\
  \ = webRequest.getBytes();\n\nbyte[] digest;\n\norg.bouncycastle.crypto.Digest md\
  \ =\n\nnew org.bouncycastle.crypto.digests.MD5Digest();\n\nmd.update(message, 0,\
  \ message.length);\n\ndigest = new byte[md.getDigestSize()];\n\nmd.doFinal(digest,\
  \ 0);\n\n这段代码的逻辑与您使用 JCA 或 SATSA-CRYPTO API 编写的代码非常相似。从高层次来看，方法是相同的：创建摘要算法的实例，使用\
  \ update 方法向其传递用于计算摘要的字节，然后使用 doFinal 方法计算摘要。但是，存在一些差异：\n\n• 没有用于摘要算法的通用工厂；相反，您需要显式创建所需摘要算法的实例（这有助于在您链接\
  \ Bouncy Castle 实现时限制应用程序中包含的类数量）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 15 章 ■ 保护 Java ME 应用程序\n\n**429**\n\n• 消息摘要算法不会抛出异常来指示错误。\n\n• Digest 接口提供了一个方法，告诉您摘要将有多少字节长。\n\
  \n除了 Digest 接口提供的方便的 getDigestSize 方法之外，您还可以通过调用 Digest 方法 getAlgorithmName 来获取消息摘要算法的人类可读名称，您可以通过应用程序的\
  \ UI 将其呈现给用户。Bouncy Castle API 提供的大多数消息摘要算法实际上都实现了 ExtendedDigest 接口，该接口实现了 Digest\
  \ 并添加了 getByteLength 方法。您可以调用 getByteLength 来了解摘要应用其算法的内部缓冲区的大小。\n\n**使用 Bouncy\
  \ Castle API 进行加密和解密** Bouncy Castle API 通过加密引擎（位于 org.bouncycastle.crypto.engines\
  \ 中）提供密码实现，这些引擎实现了特定的接口，例如 AsymmetricBlockCipher、BlockCipher 或 StreamCipher（所有这些接口都可以在\
  \ org.bouncycastle.crypto 包中找到）。这些接口都有一个共同的目的：它们允许您初始化密码，以字节数组的形式提供要加密或解密的数据（作为块或消息流的一部分），然后执行加密或解密操作。与\
  \ JCA 和 SATSA-CRYPTO API 一样，当您初始化密码时，您需要指明您是希望实现执行加密还是解密，以及操作的密钥详细信息。使用 Bouncy Castle\
  \ API 执行 RC4 加密，您可以编写如清单 15-6 所示的代码。\n\n**清单 15-6.** *使用 Bouncy Castle API 执行 RC4\
  \ 加密*\n\nbyte[] secretKey = { … };\n\nString plainText = \"Here there be treasure\"\
  ;\n\nbyte[] plainTextBytes = plainText.getBytes();\n\norg.bouncycastle.crypto.StreamCipher\
  \ cipher =\n\nnew org.bouncycastle.crypto.engines.RC4Engine();\n\ncipher.init( true,\n\
  \nnew org.bouncycastle.crypto.params.KeyParameter(secretKey)); byte[] cipherTextBytes\
  \ = new byte[plainTextBytes.length]; try {\n\ncipher.processBytes( plainTextBytes,\
  \ 0,\n\nplainTextBytes.length,\n\ncipherTextBytes, 0 );\n\n} catch( Exception e\
  \ ) {…}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**430**\n\n第 15 章\
  \ ■ 保护 Java ME 应用程序\n\n与消息摘要一样，Bouncy Castle API 的接口在概念上类似于 JCA 和 SATSA-CRYPTO API，但并不完全相同。同样，您无需使用工厂来创建所需的密码引擎，而是直接实例化该引擎。您以类似的方式初始化生成的引擎，指定您希望引擎加密（传递\
  \ true）还是解密（传递 false），以及引擎的 init 方法的选项。最后，将要加密或解密的字节传递给引擎进行处理。引擎如何接受您希望它处理的字节取决于引擎实现的是分组密码还是流密码。您可以使用\
  \ processBlock 方法将字节传递给分组密码或非对称分组密码进行处理，每次传递一个完整的块。您可以通过调用其 getBlockSize 方法来确定分组密码的块大小，或者通过分别调用\
  \ getInputBlockSize 或 getOutputBlockSize 来确定非对称分组密码的输入或输出块大小。您可以使用 processBytes\
  \ 方法将字节传递给流密码。\n\n无论哪种情况，密码引擎都会将结果返回给您为处理而调用的方法。此方法可能会抛出多种异常，包括数据数组长度无效时的 DataLengthException，或者您未能初始化密码时的\
  \ IllegalStateException。\n\n尽管此示例使用了（相对较弱的）RC4 算法，但 Bouncy Castle API 中还打包了许多其他受支持的密码。与\
  \ SATSA-CRYPTO API 不同，这些算法是为对称和非对称密码实现的，因此需要公钥密码加密和解密的应用程序受益于使用 Bouncy Castle API\
  \ 而不是 SATSA-CRYPTO API。\n\n除了支持许多不同的密码之外，Bouncy Castle API 还为其支持的密码提供密钥生成算法。这是该\
  \ API 的一个重要特性，因为在编写应用程序时，安全的密钥生成和分发是一个挑战。org.bouncycastle.crypto.generators 中包含的类包括受支持密码的生成器；创建密钥就像创建适当的生成器并调用方法一样简单。例如，要为\
  \ DES 创建随机密钥，您可以编写如清单 15-7 所示的代码。\n\n**清单 15-7.** *生成随机密钥*\n\norg.bouncycastle.crypto.generators.DESKeyGenerator\
  \ generator =\n\n\n\n`new org.bouncycastle.crypto.generators.DESKeyGenerator();\
  \ byte[] key = generator.generateKey();`\n\n某些密钥生成器必须先进行初始化，因此请务必查阅所选密码系统和密钥生成器的文档。这些密钥生成器通常是为公钥密码学提供密钥的，其中使用一对密钥——一个用于分发给其他方的公钥，另一个用于解密的私钥——来进行消息的加密和解密。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 15 章 ■ 保护 Java ME 应用程序安全\n\
  \n**431**\n\n■**警告** 虽然安全密钥生成是 Bouncy Castle API 提供的一大福音，但这并非故事的终点。应用程序如何处理其加密密钥，与如何创建它们同样重要；弱存储或交换（例如通过不安全的网络信道共享对称密码的密钥）首先就违背了拥有良好密钥生成算法的初衷。\n\
  \n**利用非接触式通信创建安全商务**\n\n非接触式通信——包括*近场*通信，如 RFID 标签和条形码——正成为移动市场的一个重要组成部分。\n\n有了对非接触式通信的适当支持，您可以创建多种应用程序，例如“刷手机支付”（将手机用作移动钱包）、“移动购买”（扫描条形码并启用远程购买）或“比价购物”（扫描条形码以了解更多产品信息，包括比价）。JSR\
  \ 257 定义了非接触式通信 API，这是一套可选包，为 RFID 标签（也称为*邻近标签*）和条形码（也称为*视觉标签*）提供支持。\n\n■**提示**\
  \ 在我撰写本文时，最适合您开发非接触式连接 API 的开发环境是诺基亚近场通信 (NFC) SDK，您可以在网上通过访问 http://www.forum.nokia.com/main/resources/technologies/nfc/\
  \ 找到它。\n\n非接触式通信 API 提供了五个包，其中四个可能存在于 API 的任何特定实现中，也可能不存在：\n\n• `javax.microedition.contactless`：始终存在，并提供允许您发现附近近场设备的类。\n\
  \n• `javax.microedition.contactless.ndef`：如果支持与支持 NFC 数据交换格式 (NDEF) 的卡进行通信，则提供此包。\n\
  \n• `javax.microedition.contactless.rf`：如果支持与通用 RFID 卡进行通信，则提供此包。\n\n• `javax.microedition.contactless.sc`：如果支持与符合\
  \ ISO 144443 邻近标准的 RFID 卡进行通信，则提供此包。\n\n• `javax.microedition.contactless.visual`：如果实现支持条形码识别和显示，则提供此包。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**432**\n\n第 15 章 ■ 保护 Java\
  \ ME 应用程序安全\n\n这些包依赖于设备上存在 CLDC 1.1 或更高版本，或来自其他 Java 配置的等效支持。\n\n非接触式通信设备有多种类型，但都基于某种通常围绕\
  \ RFID 标签构建的无线协议。非接触式通信 API 目前支持以下类型的非接触式设备：\n\n• *符合 NDEF 的设备*：通过交换包含单个 NDEFRecord\
  \ 对象的 NDEFMessage 对象进行通信。\n\n• *符合 ISO 144443 的设备*：通过一个 Connection 子类进行通信，该子类允许交换表示为字节数组的\
  \ APDU。\n\n• *通用 RFID 标签*：与这些设备的通信通过一个 Connection 子类进行，该子类允许您交换命令向量。\n\n并非非接触式通信\
  \ API 的每个实现都支持所有这些选项。\n\n使用非接触式通信 API 时，您的应用程序通常会执行以下一项或多项操作：\n\n• *注册以在非接触式目标可用时接收通知*：您可以使用\
  \ MIDP 推送注册表（参见第 14 章了解如何使用 MIDP 推送注册表）或 API 提供的 `javax.microedition.contactless.DiscoveryManager`\
  \ 类来执行此操作。\n\n• *使用非接触式连接 API 提供的适当* Connection *子类与非接触式通信设备进行通信*：您可以在设备进入范围时执行此操作——该事件报告为\
  \ MIDP 推送或来自 DiscoveryManager 的事件。\n\n• *如果需要视觉标签识别，则使用 MMAPI 捕获图像*：有关如何执行此操作的详细信息，请参见第\
  \ 16 章。您将捕获的图像传递给 VisualTagConnection 实例进行识别。\n\n• *如果需要视觉标签生成，则创建要编码为条形码的字节流，并将字节传递给*\
  \ VisualTagConnection *以生成图像*：生成图像后，将其呈现给用户。\n\n**发现非接触式目标**\n\n非接触式通信带来一个挑战，即您的应用程序不知道*何时*会遇到可以与之通信的目标。您的应用程序可能需要始终监听目标（用于销售点确认付款或用于安全识别机制的应用程序通常属于此类），或者可能仅在应用程序处于活动状态时监听目标——例如，一旦用户构建了要发送给目标的消息。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 15 章 ■ 保护 Java ME 应用程序安全\n\
  \n**433**\n\n要始终监听非接触式目标，您的应用程序只需向 MIDP 推送注册表注册此意图。当支持 NDEF 或非接触式目标进入 Java ME 设备的近场范围时，API\
  \ 会提供推送通知。要注册以在此发生时接收推送通知，您需要构造一个 URI，指示应用程序寻找的 NDEF 记录类型，并将此 URI 放在 JAD 文件中名为 `MIDlet-Push-*n*`\
  \ 的字段中。\n\n该 URI 可以指定当 Java ME 设备发现包含特定 MIME 编码数据或特定记录类型的目标时，您的应用程序是否应启动。无论哪种情况，推送注册表\
  \ URI 都以协议 `ndef` 开头，然后继续使用 MIME 类型声明或记录类型声明，如下所示：`ndef:mime?name=text/x-uri`\n\n\
  每当 Java ME 设备遇到一个带有 URI（即一个 MIME 类型为 `text/x-uri` 的数据块）的支持 NDEF 的目标时，此推送注册表 URI\
  \ 将启动您的应用程序。这是另一个示例：\n\n`ndef:rtd?name=urn:nfc:wkt:Sp`\n\n在此示例中，URI 的前两个字段——`urn`\
  \ 和 `nfc`——指示该记录是一个 NDEF 记录，而 `wkt` 指示该记录的命名空间。最后，`Sp` 指示正在寻找的目标是一个智能海报。\n\n如果您的应用程序使用注册表来接收附近目标的通知，它还应实现\
  \ `javax.microedition.contactless.ndef.NDEFRecordListener` 接口，该接口为平台提供了一种将数据从目标传输到应用程序的方法。此方法接受一个参数，即由目标生成的\
  \ `NDEFRecord`。（我将在下一节更详细地讨论这些记录。）\n\n一旦您的应用程序启动，您还可以使用 `javax.microedition.contactless`\
  \ 包提供的 `DiscoveryManager` 类来监听目标。\n\n\n\n所有符合非接触式通信 API 规范的设备都必须使用此接口，它允许你枚举支持的目标类型，并允许你在\
  \ Java ME 设备遇到特定目标时注册监听器。该监听器必须实现 `javax.microedition.contactless.TargetListener`\
  \ 接口，该接口定义了一个名为 `targetDetected` 的单一方法，当设备遇到新目标时，API 会调用该方法。API 会向此方法传递一个 `TargetProperties`\
  \ 数组，用于描述设备遇到的目标。例如，清单 15-8 为支持 NDEF 的目标注册了一个监听器。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**434**\n\n第 15 章 ■ 保护 Java ME 应用程序\n\n**清单 15-8.** *为支持 NDEF 的目标注册监听器* import\
  \ javax.microedition.contactless.*;\n\nimport javax.microedition.contactless.ndef.*;\n\
  \nimport javax.microedition.pim.*;\n\nimport java.util.Enumeration;\n\nimport javax.microedition.io.Connector;\n\
  \npublic class NDEFExample implements TargetListener {\n\nprivate DiscoveryManager\
  \ dm;\n\nNDEFTagConnection conn;\n\npublic void registerForDiscovery() {\n\nTargetType[]\
  \ targets = DiscoveryManager.getSupportedTargetTypes(); boolean supported = false;\n\
  \nfor (int i=0; i<targets.length; i++) {\n\nif (targets[i].equals(TargetType.NDEF_TAG))\
  \ {\n\nsupported = true;\n\n}\n\n}\n\nif (supported) {\n\ndm = DiscoveryManager.getInstance();\n\
  \ntry {\n\ndm.addTargetListener(this, TargetType.NDEF_TAG);\n\n}\n\ncatch (ContactlessException\
  \ e) { … }\n\n}\n\n}\n\npublic void targetDetected(TargetProperties[] prop) {\n\n\
  TargetProperties target = prop[0];\n\nString url = target.getUrl();\n\ntry {\n\n\
  conn = (NDEFTagConnection)Connector.open(url);\n\nif (conn != null) {\n\nreadMessage();\n\
  \n}\n\n}\n\ncatch (IOException e) { }\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 15 章 ■ 保护 Java ME 应用程序\n\n**435**\n\npublic static void readMessage()\n\n{\n\
  \n…\n\n}\n\npublic static void writeMessage()\n\n{\n\n…\n\n}\n\n}\n\n注册过程首先需要确定支持哪些目标类型，这一点非常重要；你可以通过调用\
  \ `DiscoveryManager` 的静态方法 `getSupportedTargetTypes` 来获取 API 特定实现所支持的目标类型列表。\n\n\
  ■**提示** 务必枚举支持的类型！某些版本的非接触式通信 API 可能支持除本文讨论之外的*其他*类型的近场设备；详情请参阅特定 Java ME 设备及 API\
  \ 实现附带的文档。\n\n代码在测试确认实现支持 NDEF 类型后，会使用 `addTargetListener` 方法注册一个监听器。如果你想监听多种目标类型，可以使用单个\
  \ `DiscoveryManager` 来实现；你可以指定不同的对象来响应 `targetDetected` 事件，也可以在 `targetDetected`\
  \ 方法内部处理检测到的目标类型。\n\n注册完成后，当设备遇到相应类型的目标时，API 实现会调用你的监听器的 `targetDetected` 方法；此时，你的代码应开始与设备进行通信。这可能是你的应用程序需要启动单独线程的地方，尤其是在通信交换不仅仅包含一两条命令的情况下。\n\
  \n**与非接触式目标通信**\n\n不出所料，与目标的通信是通过无处不在的 GCF 进行的；与各种目标通信的方式体现在 `Connection` 的子类中，如图\
  \ 15-3 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**436**\n\n第 15\
  \ 章 ■ 保护 Java ME 应用程序\n\n**图 15-3.** *用于与非接触式目标通信的支持类* 遗憾的是，实现 `Connection` 正是各个子类之间统一性终结的地方。该\
  \ API 采用面向消息的方式与非接触式目标通信，但不同目标类型的方法有所不同：\n\n• 支持 NDEF 的设备使用 `javax.microedition.contactless.ndef.NDEFTagConnection`\
  \ 类，通过连接的 `readNDEF` 和 `writeNDEF` 方法来交换 `NDEFMessage` 实例。\n\n\n\n• 支持 ISO 14443\
  \ 的设备使用 `javax.microedition.contactless.sc.ISO14443Connection` 类及其 `exchangeData`\
  \ 方法来交换原始字节数组。\n\n• 通用 RFID 设备使用 `javax.microedition.rf.PlainTagConnection` 类。该类的实例通过\
  \ `tranceive` 方法交换 Java 对象向量。这些 Java 对象由封装特定应用数据的 API 扩展定义。\n\n• 视觉标签可以使用 `javax.microedition.contactless.visual.VisualTagConnection`\
  \ 类进行编码和解码，该类实际上并不连接任何设备。（我将在下一节中详细介绍这个类。）\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 15 章 ■ 保护 Java ME 应用程序安全\n\n**437**\n\nNDEF 定义了由一条或多条*记录*组成的*消息*，每条记录采用轻量级二进制消息格式，包含有效载荷类型、可选的有效载荷标识符以及有效载荷本身。例如，要读取任何待处理的\
  \ NDEF 记录，你可以编写如清单 15-9 所示的代码。\n\n**清单 15-9.** *读取待处理的 NDEF 记录*\n\n```java\npublic\
  \ static void readMessage()\n{\n    try\n    {\n        NDEFMessage message = conn.readNDEF();\n\
  \        if(message == null)\n        {\n            return;\n        }\n      \
  \  NDEFRecord[] records = message.getRecords();\n        if(records == null)\n \
  \       {\n            return;\n        }\n        System.out.println(\"Got \"+records.length+\"\
  \ records.\");\n        for (int i = 0; i < records.length; i++)\n        {\n  \
  \          NDEFRecordType type = records[i].getRecordType();\n            System.out.println(\"\
  id: \" + new String(records[i].getId()) );\n            System.out.println(\"type:\
  \ \" + type.getName() );\n            System.out.println(\"payload: \" + new String(records[i].getPayload()));\n\
  \        }\n    } catch (Exception e) { … }\n}\n```\n\n这段代码遍历返回的记录列表，打印每条消息的 ID\
  \ 和有效载荷。消息也可能带有类型，可通过调用记录的 `getRecordType` 函数获取，该函数返回一个 `NDEFRecordType` 实例。此类型定义了多种记录类型，包括\
  \ `EMPTY`、`NFC_FORUM_RTD`、`MIME`、`URI`、`EXTERNAL_RTD` 和 `UNKNOWN`。一种常见的类型是 URI 类型，它表示消息的有效载荷是一个\
  \ URL，例如智能海报设备提供的 URL。\n\n如果需要向 NDEF 目标写入记录，可以创建一个新的 `NDEFRecord` 并使用 `NDEFTagConnection`\
  \ 的 `writeNDEF` 方法。定义新的 `NDEFRecord` 时，必须提供记录的**类型**、**ID** 和**有效载荷**，如清单 15-10\
  \ 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**438**\n\n第 15 章 ■\
  \ 保护 Java ME 应用程序安全\n\n**清单 15-10.** *定义一个新的 NDEF 记录*\n\n```java\npublic static\
  \ void writeMessage()\n{\n    try {\n        PIM pim = PIM.getInstance();\n    \
  \    ContactList cl =\n            (ContactList)pim.openPIMList(PIM.CONTACT_LIST,\
  \ PIM.READ_ONLY);\n        Enumeration items = cl.items();\n        Contact item\
  \ = (Contact) items.nextElement();\n        String name = item.getString(Contact.FORMATTED_NAME,0);\n\
  \        NDEFRecord[] records = new NDEFRecord[1];\n        records[ 0 ] = new NDEFRecord(\n\
  \            new NDEFRecordType(NDEFRecordType.UNKNOWN, \"name\"),\n           \
  \ new String(\"F_M_NAME\").getBytes(),\n            name.getBytes());\n        NDEFMessage\
  \ message = new NDEFMessage(records);\n        conn.writeNDEF(message);\n    } catch\
  \ (Exception e) { … }\n}\n```\n\n这段代码传输 PIM 联系人列表中的第一个名字。首先，它需要使用 PIM API（参见第 7\
  \ 章）获取 PIM 管理器的实例，以确定该名字。它使用 PIM 管理器获取联系人列表，然后使用联系人列表提供的枚举来获取联系人第一条记录中存储的名字。接着，代码创建一个新的\
  \ NDEF 记录数组，其中包含一条记录。\n\n该记录被分配一个新的 `NDEFRecord`，类型为未知，带有 ID `F_M_NAME` 以及从联系人列表中获取的格式化名称。然后使用记录数组创建一条新消息，并通过连接写入。\n\
  \n对其他非接触式目标（如 ISO 14443）的读写操作类似，不过不是使用连接器提供的单独的读写方法，而是直接交换消息，如清单 15-11 所示。\n\n**清单\
  \ 15-11.** *直接交换消息*\n\n```java\nimport java.io.IOException;\nimport javax.microedition.contactless.*;\n\
  import javax.microedition.contactless.sc.*;\nimport javax.microedition.io.Connector;\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 15 章 ■ 保护 Java ME 应用程序安全\n\
  \n**439**\n\n```java\npublic class ISO14443Example implements TargetListener {\n\
  \    byte[] commandAPDU = ...;\n    public ISO14443Example () {\n        try {\n\
  \            DiscoveryManager dm = DiscoveryManager.getInstance();\n           \
  \ dm.addTargetListener(this, TargetType.ISO14443_CARD);\n            dm.addTransactionListener(this);\n\
  \        }\n        catch (ContactlessException e) { … }\n    }\n    public void\
  \ targetDetected(TargetProperties[] properties) {\n        TargetProperties target\
  \ = properties[0];\n        Class[] classes = target.getConnectionNames();\n   \
  \     for (int i=0; i<classes.length; i++) {\n            try {\n              \
  \  if (classes[i].equals(Class.forName(\n                    \"javax.microedition.contactless.sc.ISO14443Connection\"\
  )\n                )) {\n                    String url = target.getUrl(classes[i]);\n\
  \                    ISO14443Connection smc =\n                        (ISO14443Connection)Connector.open(url);\n\
  \                    byte[] responseAPDU = smc.exchangeData(commandAPDU);\n    \
  \                // 对响应进行处理\n                }\n            }\n            catch\
  \ (Exception e) { … }\n        }\n    }\n}\n```\n\nISO 14443 目标（或其他 RFID 目标）的检测过程与支持\
  \ NDEF 的目标完全相同；只需在 `DiscoveryManager` 的 `addTargetListener` 接口中指定 `TargetType` 为\
  \ `ISO14443_CARD`。一旦检测到目标，平台会调用已注册的监听器 `targetDetected`，然后该监听器可以与目标交换 APDU 数据包。\n\
  \n如果这个接口看起来很眼熟，那很正常；因为 ISO 14443 设备与本章前面讨论的可选 SATSA API 支持的有线智能卡是近亲。\n\n■**注意**\
  \ 由于大多数非接触式目标设备的硬件限制，你一次只能打开一个到非接触式目标的连接。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**440**\n\n第 15 章 ■ 保护 Java ME 应用程序安全\n\n**识别和生成视觉标签**\n\n*视觉目标*——这是条形码的别称，你经常会看到接口规范将其称为*标签*——为移动电子商务应用提供了一条有趣的途径，因为它们如今在产品包装上无处不在。反过来，这意味着这些目标的读取器也很常见，从而支持诸如将凭证传输到读取器以实现无纸化门票等应用。\n\
  \n非接触式连接 API 对视觉标签的支持与其他非接触式目标略有不同，因为可能没有自动发现过程。虽然你的应用程序可以向 `DiscoveryManager` 注册，但你也可以启动对视觉标签的手动扫描。如果用户想要扫描视觉标签，则需要由她看到条形码，启动你的应用程序，让应用程序使用\
  \ MMAPI 接口捕获条形码图像，并将图像提交给非接触式 API 进行识别。类似地，你可以将任意数据编码到条形码中并显示在屏幕上，这样用户就可以将条形码呈现给条形码扫描器。\n\
  \n条形码有不同的类型，称为*符号体系*。有些符号体系，例如欧洲商品编号/通用产品代码（EAN/UPC），是一维的，包含单条信息条纹。其他较新的条形码，例如快速响应码（QR\
  \ 码），是二维的信息方块或矩形。这些二维条形码可以编码更多信息，应用程序通常使用它们来携带 URL 或其他信息。使用视觉标签接口时，首先需要确定你想要的符号体系是否被实现所支持。\n\
  \n通过调用静态方法 `SymbologyManager.getReadSymbologies` 可以确定支持的符号体系列表，该方法返回一个字符串数组，命名了支持的符号体系。表\
  \ 15-1 列出了可能支持的符号体系。\n\n\n\n除了与符号体系无关外，非接触式通信 API 也与图像格式无关。`SymbologyManager` 维护了一个受支持图像类的列表，实现可以通过这些类进行解码或编码；你可以通过静态方法\
  \ `SymbologyManager.getImageClasses` 获取这些列表。该方法返回一个受支持的 `Class` 实例数组；然后你可以仔细查看该列表，以确定实现是否支持特定的图像类型。\n\
  \n一旦确认支持所需的符号体系和图像类型，就可以执行编码或解码操作了。你需要使用一个 `VisualTagConnection` 对象来完成此操作，该对象通过打开指向\
  \ `\"vtag://\"` URI 的 `Connector` 来获取。得到的 `VisualTagConnection` 实例可以执行必要的编码或解码。使用\
  \ `Connection` 子类来做建立连接之外的事情有点奇怪，但非接触式连接 API 就是这样定义接口的；这至少提供了与其他非接触式接口在概念上的一致性。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 15 章 ■ 保护 Java ME 应用程序安全\n\
