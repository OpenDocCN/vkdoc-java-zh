  \n**介绍 PIM 包**\n\n\n\n许多 Java ME 设备都扮演着个人信息管理器的角色。它们内置了处理联系人、日历约会和待办事项的应用程序。向第三方应用开放这些数据库能带来巨大价值，因此\
  \ JSR 75 定义了一个可选的 PIM 包，其中包含用于抽象访问这些应用记录的类（见图 7-2）。\n\n**图 7-2.** *PIM 包中的类*\n\n\
  如图 7-2 所示，单例类 PIM 负责打开 PIMList 子类的实例，这些子类包含了联系人、日历和待办事项应用的记录存储。正如你将看到的，每个子类都被表示为一个\
  \ PIMItem 对象的枚举（Enumeration），而每个 PIMItem 则是应用数据库中特定条目的接口。利用这个层次结构中的各种接口，你可以枚举这些应用存储中的任何记录，检查条目如何分组到类别中，创建新记录，以及删除现有记录，就像原生应用一样。\n\
  \n**使用 PIM 包**\n\n要使用 PIM 包，你的代码需要遵循以下基本结构：\n**1.** 检查设备以确保 PIM 包可用。\n**2.** 打开所需的\
  \ PIM 数据库，并为目标数据库获取一个 PIMList。\n**3.** 如果你想从 PIMList 中读取条目，请使用其提供枚举（Enumeration）的接口之一来获取元素。\n\
  **4.** 如果你想在 PIMList 中创建新条目，请使用 PIMList 创建一个新的 PIMItem。然后将数据添加到 PIMItem，最后调用 commit\
  \ 提交更改。\n**5.** 如果你想修改 PIMList 中的某个条目，请获取对应要修改条目的 PIMItem，并调用方法来设置该条目的各个字段。然后调用\
  \ commit 将更改提交到该条目。\n**6.** 如果你想删除某个条目，请获取对应要删除条目的 PIMItem，然后在 PIMList 上调用相应的 remove\
  \ 方法，并将要删除的条目作为参数传入。\n\n与使用不同异常来标记不同错误的 FCOP 不同，PIM 包接口在出错时仅抛出 PIMException。抛出的\
  \ PIMException 将包含以下原因代码之一，可通过 getReason 方法获取，以指示抛出异常的原因：\n\n• FEATURE_NOT_SUPPORTED：如果实现不支持所请求的功能\n\
  • GENERAL_ERROR：一般性错误\n• LIST_CLOSED：如果你尝试使用的 PIMList 已经关闭\n• LIST_NOT_ACCESSIBLE：如果你尝试使用的\
  \ PIMList 不再可用，可能是因为底层数据库已被删除\n• MAX_CATEGORIES_EXCEEDED：如果 PIMList 中条目的最大类别数已超限\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**176**\n\n第 7 章 ■ 访问文件和其他数据\n\
  \n• UPDATE_ERROR：表示更新无法继续的异常\n• UNSUPPORTED_VERSION：如果数据不受该版本 PIM 数据库的支持\n\n让我们更详细地了解这些操作以及你可以使用\
  \ PIM 包执行的其他操作。\n\n**确保 PIM 包可用**\n\n在使用 PIM 包之前，你应该确保它确实可用。你可以使用 System.getProperty\
  \ 来实现，如下所示：\n\nString currentVersion = System.getProperty(\"microedition.pim.version\"\
  );\n\n这将返回 PIM 包的版本号，因此你可以（并且应该！）检查你的代码是否与你目标设备上的 PIM 包版本兼容。如果没有可用的 PIM 包，该调用将返回\
  \ null。\n\n一旦你确认 PIM 包可用，就必须获取 PIM 单例的实例，该实例提供了访问所有用于打开和管理 PIMList 的方法。你可以使用 PIM.getInstance\
  \ 方法来实现。\n\n**打开 PIM 数据库**\n\n\n\n打开 PIM 数据库的方式与打开文件不同，尽管底层可能发生类似的操作。相反，你需要通过 `PIM.getInstance().openPIMList`\
  \ 从 PIM 类获取一个 `PIMList` 实例。该接口接受两个参数：要返回的列表类型（`PIM.CONTACT_LIST`、`PIM.EVENT_LIST`\
  \ 或 `PIM.TODO_LIST`）以及一个访问模式，指示该列表应以只读（`PIM.READ_ONLY`）、只写（`PIM.WRITE_ONLY`）还是读写（`PIM.READ_WRITE`）方式返回。\n\
  \n某些设备能够保存多个特定类型的 PIM 列表。不要将其与类别混淆；类别表示 PIM 数据库内的组织结构，而此功能允许完全独立的列表。你可以通过调用 `PIM.getInstance().listPIMLists`\
  \ 并按类型获取 PIM 数据库列表，传入一个 PIM 列表类型（`PIM.CONTACT_LIST`、`PIM.EVENT_LIST` 或 `PIM.TODO_LIST`）。作为返回，你会得到一个\
  \ `String` 实例数组；每个字符串都是一个名称，你可以将其作为可选的第三个参数传递给 `PIM.getInstance().openPIMList`。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 7 章 ■ 访问文件和其他数据 **177**\n\
  \n**从 PIM 数据库读取记录**\n\n拿到要访问的 PIM 数据库对应的 `PIMList` 后，你可以获取其内容的枚举（`Enumeration`），这些内容以\
  \ `PIMItem` 对象的形式返回。你可以使用以下三种 `items` 方法之一来获取枚举：\n\n*   一个不带参数的 `items` 方法，返回数据库中*所有*项目的枚举\n\
  *   一个接受 `String` 参数的 `items` 方法，返回仅包含那些字符串字段包含你传递给 `items` 的字符串的记录的枚举\n*   一个接受\
  \ `PIMItem` 模板的 `items` 方法，返回仅包含那些字段包含你在模板项中指定的字段的记录的枚举（当然，该模板项必须是 `ContactItem`、`EventItem`\
  \ 或 `ToDoItem`，与你查询的 `PIMList` 类型匹配）\n\n这些 `items` 方法可能抛出以下异常之一：\n\n*   `IllegalArgumentException`：如果参数格式错误\n\
  *   `PIMException`：如果操作 `PIMList` 时出错\n*   `SecurityException`：如果应用程序未被允许访问 PIM\
  \ 数据库\n\n**从 PIM 记录读取字段**\n\n`PIMItem` 接口是一个通用接口，适用于多种类型的记录数据：联系人、事件或待办事项。因此，`PIMItem`\
  \ 使用*字段键*的概念来访问 `PIMItem` 中的特定数据项，例如联系人的名字或事件的开始时间。这些字段由定义良好的标准（如互联网邮件联盟的 vCard\
  \ 规范）定义。各个 `PIMItem` 接口子类都定义了常量整数访问器键，指示 `PIMItem` 可以响应访问器接口返回的字段类型。表 7-1 显示了 PIM\
  \ 包定义的访问器字段键。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**178**\n\n\
