  \n**239**\n\n`RoundButton` 展示了我在上一节中讨论的所有原则，它使用双缓冲技术将绘制内容缓存到一个离屏 `Image` 实例中，以防止组件重绘时出现闪烁。这个组件并不复杂，但代码稍长，因此我们逐字段、逐方法地进行分析。\n\
  \n`RoundButton` 有一个 `label` 字段，用于存储向用户显示的按钮标签字符串。它还必须跟踪自身的状态（是否被按下），这通过受保护的 `pressed`\
  \ 字段来实现。它维护了一个用于离屏绘制的 `Image` 对象，恰如其分地命名为 `offscreen`，以及两个私有常量变量：按钮的首选大小和按钮标签的默认内边距。\n\
  \n■**提示** 你可能会疑惑为什么我选择 `protected` 作为这些字段的访问保护级别。我假设这个类将作为一个更复杂的 GUI 框架的一部分，因此可能会有子类自定义此按钮的行为，并需要访问其字段。\n\
  \n`RoundButton` 的构造函数只是缓存了你提供的标签，并为该组件启用鼠标事件。作为双缓冲的一部分，`RoundButton` 必须重写 `invalidate`\
  \ 方法。窗口环境会在组件尺寸调整和布局时调用 `invalidate`，这进而要求 `RoundButton` 分配一个新的离屏位图用于绘制。为了提高速度，`invalidate`\
  \ 方法仅使当前的离屏位图失效；它将分配新离屏位图的任务留给了 `paint` 方法。\n\n`update` 方法——由窗口工具包层次结构因系统重绘而调用——根据定义，必须清除组件的背景并完全重绘组件。由于\
  \ `paint` 方法会将整个组件绘制到离屏位图，然后将该位图复制到屏幕，因此 `update` 可以直接调用 `paint`。\n\n`paint` 方法执行\
  \ `RoundButton` 的实际工作。它首先在需要时创建离屏位图，然后获取该离屏位图的 `Graphics` 实例。接着，它按照从后到前的顺序在离屏位图上绘制按钮，执行以下操作：\n\
  \n\n\n**1.** 它计算按钮的背景色，如果按钮正在被按下，颜色会稍微深一些。\n\n**2.** 它使用上一步计算出的颜色绘制按钮的填充圆形。\n\n\
  **3.** 绘制完背景后，它使用比按钮背景色更深的色调绘制边框。\n\n**4.** 绘制完背景和边框后，它绘制按钮的标签，该标签在按钮定义的区域内居中显示。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**240**\n\n第 9 章 ■ 介绍 Xlet\
  \ 和个人基础框架配置文件\n\n**5.** 现在它已完全更新了离屏位图，接着使用当前图形上下文绘制与该离屏位图对应的图像。\n\n**6.** 它释放离屏位图的图形上下文。\n\
  \n`getPreferredSize` 和 `getMinimumSize` 方法为布局管理器提供了关于组件所需尺寸的线索。这些方法会考虑按钮标签的大小。\n\
  \n`RoundButton` 只需要处理鼠标事件，它通过 `processMouseEvent` 方法来实现；当您按下鼠标且鼠标光标位于按钮边界内时，按钮应通过加深背景色来直观地显示按下状态；当您在\
  \ `RoundButton` 边界内释放鼠标按钮，或者鼠标光标移出 `RoundButton` 边界*且*您之前已按下 `RoundButton` 时，这种加深效果必须消失。`processMouseEvent`\
  \ 方法中的 `switch` 语句处理了此逻辑的各种情况。`processMouseEvent` 还会调用 `repaint` 来强制 `RoundButton`\
  \ 重绘，以直观地显示其状态变化。\n\n**了解 PBP 的窗口工具包限制**\n\n您刚刚看到了 PBP 提供的窗口工具包的一个关键限制：禁止使用重量级组件。然而，还有其他一些限制您应该了解：\n\
  \n*   `java.awt.Frame` 实例（对应于原生窗口）的数量、大小和位置可能会受到严格限制。\n*   `java.awt.Frame` 实例的装饰、标题和可调整大小性由原生窗口管理器控制，这些只是指导原则，而非硬性要求。原生窗口工具包可以自由地忽略您的应用程序关于装饰（包括标题、大小和位置）的请求。\n\
  *   平台可能有也可能没有鼠标，因此可能不会生成鼠标事件。\n*   平台可能有也可能没有完整的键盘，因此可能不会生成键盘事件。\n*   Alpha 合成可能不支持源图像在目标图像上的完整合成。\n\
  *   在指定图形笔画时，`BasicStroke` 属性可能会被忽略。\n*   您可能无法在特定组件的基础上设置光标位图。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 介绍 Xlet 和个人基础框架配置文件\n\n**241**\n\n实际上，这些限制的结果是，许多 PBP 实现只支持单个顶级窗口，因此您无法构建包含多个窗口的应用程序。要确定您正在使用的\
  \ PBP 实现是否存在这些限制，您可以查询每个限制对应的系统属性。表 9-1 显示了这些系统属性及其值。\n\n**表 9-1.** *PBP 系统属性及其值*\
