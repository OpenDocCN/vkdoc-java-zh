  \ 格式的 Location 对象的处理器，在解析操作期间使用一个 Location 实例和几个私有变量来跟踪对象的状态，并在成员变量 location 中构建最终的\
  \ Location 对象。其中的关键是 StringBuffer buffer，处理器用它来构建任何字符数据的字符串表示形式，例如当前温度或天气预报。\n\n\
  当 SAX 解析器处理 XML 时（我将在清单 13-9 中向你展示如何设置和启动该过程），处理器接收到的第一个事件是 startDocument。处理该事件的方法只是设置处理器的内部状态，如果客户端使用了处理器的默认构造函数（未提供\
  \ Location 对象），则创建一个新的 Location 来保存解析结果。\n\n每当 SAX 解析器遇到一个新元素的开始，例如 `<weather>`\
  \ 或 `<temperature>`，它就会调用 startElement。该方法接收元素的完整名称（在 qName 中）、命名空间 URL（在 uri 中）中的名称（在\
  \ localName 中）；通常你会希望检查 qName，除非你正在解析具有多个命名空间的 XML。清单 13-8 正是这样做的，它设置处理器的状态以接受刚刚遇到的标签的数据。在某些情况下，例如解析\n\
  \n\n\n<weather>标签的处理程序可以通过直接操作各个属性来立即完成所有工作；你可以使用属性的`getValue`方法获取其值，或使用`getType`方法获取其类型。在其他情况下，代码会利用属性值对传入数据进行运行时检查——例如，拒绝使用非英制单位的天气数据。\n\
  \n一旦 SAX 解析器调用了`startElement`，接下来它会根据正在解析的元素是否包含字符数据，调用`characters`或`endElement`。`characters`元素接收一个包含解析器已读取字符的字节数组；对于单个实体，它可能被多次调用，因此你需要自行缓冲结果。\n\
  \n■**注意** 不要忽略`characters`的`start`和`length`参数！SAX 解析器自行决定如何管理其内部字符数组，而你在传入的字符数组中获取的内容，在`start`和`length`共同指定的范围之外可能是无效数据。\n\
  \n如果说`startElement`是处理程序准备处理传入元素的地方，那么`endElement`显然是它应该将元素所代表的数据暂存起来的地方。此处的`endElement`正是这样做的，它根据指定的元素类型决定将累积的字符数据存储到何处，并在将缓冲区内容存储到`location`的相应字段后，清空用于累积数据的`StringBuffer`。\n\
  \n当 SAX 解析器遇到文档结束时，它会调用处理程序的`endDocument`；这是更新用于存储已解析 XML 数据的变量的另一个机会。`LocationParserHandler`方法不需要这样做，因为它会在整个解析操作中持续更新`location`，因此其`endDocument`是一个空方法。\n\
  \n■**注意** 如果你的类没有对 SAX 事件执行任何操作，则无需提供这些方法；在清单 13-8 中，我为了清晰和完整性包含了`endDocument`，但它并非必需。\n\
  \n使用 SAX 解析器很简单：实例化解析器和位置处理程序，然后将一个流连同解析器处理程序一起提供给解析器进行解析。清单 13-9 展示了`Location`类的`fromXml`方法中的这一过程，该方法接收一个\
  \ XML 文档，并使用 SAX 解析器将其字段的值设置为文档中指定的值。\n\n**清单 13-9.** *使用 JSR 172 提供的 SAX 解析器*\n\
  \n```java\npackage com.apress.rischpater.weatherwidget;\n\nimport javax.microedition.rms.*;\n\
  import java.io.*;\nimport javax.xml.parsers.*;\nimport org.xml.sax.*;\nimport org.xml.sax.helpers.*;\n\
  \npublic class Location {\n    /* 清单 13-7 中的其他方法 */\n    public void fromXml(String\
  \ xml) {\n        SAXParser parser = null;\n        LocationParserHandler handler\
  \ = new LocationParserHandler(this);\n        byte[] xmlBytes;\n        ByteArrayInputStream\
  \ bis;\n        try {\n            SAXParserFactory f = SAXParserFactory.newInstance();\n\
  \            parser = f.newSAXParser();\n        }\n        catch(Exception e) {\
  \ return; };\n        xmlBytes = xml.getBytes();\n        bis = new ByteArrayInputStream(xmlBytes);\n\
  \        try {\n            parser.parse(bis, handler);\n        }\n        catch(Exception\
  \ e){}\n        finally {\n            try {\n                bis.close();\n   \
  \         }\n            catch(Exception e) {}\n        }\n    }\n}\n```\n\n`fromXml`方法创建一个初始的`LocationParserHandler`，并将其链接到当前的`Location`实例。在底层，平台可能提供不同的\
  \ SAX 解析器实现，因此使用`SAXParserFactory`获取解析器实例非常重要；具体做法是创建工厂实例，然后调用该实例的`newSAXParser`方法。解析器以`InputStream`的形式接收数据；将传入的\
  \ XML 转换为字节数组，并与`ByteArrayInputStream`类一起使用，即可为解析器的`parse`方法提供所需的输入流。仅此而已！\n\n所有这些代码都假设一个\
  \ RESTful Web 服务，该服务根据位置提供包含天气数据的 XML 文档；清单 13-10 展示了一个实现此功能的`WeatherFetcher`版本，它基于你在前一章学到的知识构建。\n\
  \n**清单 13-10.** *WeatherFetcher 的 RESTful 实现*\n\n```java\npackage com.apress.rischpater.weatherwidget;\n\
  \nimport java.io.*;\nimport javax.microedition.io.*;\n\npublic class WeatherFetcher\
  \ implements Runnable {\n    private static String url = \"http://www.noplace.com/location/\"\
  ;\n    private Location location;\n    private boolean cancelled;\n    private WeatherWidget\
  \ app;\n\n    /** 创建 WeatherFetcher 的新实例 */\n    public WeatherFetcher(Location\
  \ l, WeatherWidget a) {\n        location = l;\n        app = a;\n        cancelled\
  \ = false;\n        if (l!=null && a!=null) {\n            Thread thread = new Thread(this);\n\
  \            thread.start();\n        }\n    }\n\n    public void cancel() {\n \
  \       cancelled = true;\n    }\n\n    private static String urlEncode(String s)\
  \ {\n        if (s!=null) {\n            StringBuffer tmp = new StringBuffer();\n\
  \            int i=0;\n            try {\n                while (true) {\n     \
  \               int b = (int)s.charAt(i++);\n                    if ((b>=0x30 &&\
  \ b<=0x39) ||\n                        (b>=0x41 && b<=0x5A) ||\n               \
  \         (b>=0x61 && b<=0x7A)) {\n                        tmp.append((char)b);\n\
  \                    } else {\n                        tmp.append(\"%\");\n    \
  \                    if (b <= 0xf) tmp.append(\"0\");\n                        tmp.append(Integer.toHexString(b));\n\
  \                    }\n                }\n            }\n            catch (Exception\
  \ e) {}\n            return tmp.toString();\n        }\n        return null;\n \
  \   }\n\n    private String requestEncode() {\n        StringBuffer result = new\
  \ StringBuffer();\n        result.append(url);\n        result.append(urlEncode(location.getLocation()));\n\
  \        return result.toString();\n    }\n\n    public void run() {\n        String\
  \ requestUrl;\n        String response = \"\";\n        HttpConnection hc = null;\n\
  \        InputStream in = null;\n        requestUrl = requestEncode();\n       \
  \ try {\n            hc = (HttpConnection)Connector.open(requestUrl);\n        \
  \    hc.setRequestMethod(HttpConnection.GET);\n            in = hc.openInputStream();\n\
  \            int length = (int)hc.getLength();\n            byte[] data = new byte[length];\n\
  \            in.read(data);\n            response = new String(data);\n        }\n\
  \        catch(Exception e){}\n        finally {\n            try {\n          \
  \      if (in!=null) in.close();\n                if (hc!=null) hc.close();\n  \
  \          }\n            catch(Exception e) {}\n        }\n        if (!cancelled)\
  \ {\n            location.fromXml(response);\n            app.update();\n      \
  \  }\n    }\n}\n```\n\n回顾一下，在 REST 服务中，URL 代表对象，HTTP 方法代表作用于这些对象的动词。因此，天气服务的 URL\
  \ 实际上是特定对象的前缀；访问加利福尼亚州伯克利市的天气 Web 服务时，应用程序可能会生成以下 URL：\n\n`http://www.noplace.com/location/Berkeley%2C%20CA%2C%20USA`\n\
  \n末尾斜杠后的字符串是唯一位置的 URL 安全编码（本例中为“Berkeley, CA, USA”）。`WeatherFetcher`类在`run`方法开始时完成此映射，它使用该类静态定义的服务\
  \ URL 前缀及其`requestEncode`方法创建 URL。接着，它创建一个使用`GET`方法的`HttpConnection`，并将响应读入字符串，供`Location`实例解析。\n\
  \n■**提示** 尽管此示例使用更多 RAM 将整个文档读入内存再解析，但调试起来更容易，因为在开发过程中，Web 服务客户端获取的 XML 可以写入调试文件或其他位置。我本可以轻松地将`Location`类设计为接受`InputStream`作为`fromXml`参数，并将`HttpConnection`的`InputStream`实例直接传递给`Location`实例进行解析，从而节省一些内存。当你需要解析大型\
  \ XML 文档时，可以考虑这种方法，因为底层的 SAX 解析器在解析操作期间可能不需要将整个文档读入内存。\n\n**介绍 kXML 解析器**\n\n\n\n\
  正如我在上一节开头所述，JSR 172 提供的 XML 解析器是可选的（实际上，*整个* JSR 172 都是可选的！），你很可能会遇到不提供 SAX 解析器的设备。幸运的是，有一个轻量级的替代方案——kXML，它可以在\
  \ http://kxml.sourceforge.net 上以宽松的许可证获取。要使用该解析器，请下载实现 kXML 解析器的 JAR 文件，并通过属性检查器将其包含在你的\
  \ NetBeans 项目中（见图 13-3）。\n\nkXML 包现已开始其第三次迭代；在我撰写本文时，kXML 版本 1 已弃用，而 kXML 版本 2 是团队开发版本\
  \ 3 期间人们应使用的版本。kXML 版本 2 在 `org.kxml2.io` 包中通过 `KXmlParser` 类实现了一个经典的拉解析器。使用此类，你可以通过以下各种\
  \ `next` 方法从包含 XML 的流中拉取项目：\n\n• `next`：返回流中下一个 XML 令牌的类型\n• `nextTag`：返回流中下一个标签的名称\n\
  • `nextText`：返回流中下一个 CDATA 区域的内容\n• `nextToken`：返回流中的下一个 XML 令牌\n\n这种方法——从源流中拉取标签，而不是将事件发送到新类——可能会略微减少你必须编写和交付的代码量，尽管许多开发者可能会觉得它不如你在上一节中看到的\
  \ SAX 推解析器清晰。正如你很快将在清单 13-12 中看到的，围绕拉解析器构建一个看起来非常像推解析器的包装器是很容易的。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
