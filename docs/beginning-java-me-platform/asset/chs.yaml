  \n或 ToDo.CLASS_PUBLIC\n\n那么，如何处理所有这些字段常量呢？无法保证某个特定的 PIM 包实现在其数据库中包含某个特定字段，因此首先要做的是找出\
  \ PIM 包的特定实现实际支持哪些字段。\n\n你可以通过使用 `PIMList.getInstance().isSupportedField` 来检查特定键，或者通过使用\
  \ `PIMList.getInstance().getSupportedFields` 获取所有支持的字段键的数组。\n\n然而，要实际读取字段中的值，你需要结合字段键使用以下\
  \ `PIMItem` 访问器方法之一：\n\n• `getBinary`：根据给定的字段键和该类型第 *n* 个数据的索引，以 `byte[]` 形式返回二进制字段的内容\n\
  • `getDate`：根据给定的字段键和该类型第 *n* 个数据的索引，以 `Date` 形式返回日期字段的内容\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**180**\n\n第 7 章 ■ 访问文件和其他数据\n\n• `getInt`：根据给定的字段键和该类型第 *n* 个数据的索引，以 `int` 形式返回整数字段的内容\n\
  • `getString`：根据给定的字段键和该类型第 *n* 个数据的索引，以 `String` 形式返回字符串字段的内容\n• `getBoolean`：根据给定的字段键和该类型第\
  \ *n* 个数据的索引，以 `boolean` 形式返回布尔字段的内容\n• `getStringArray`：根据给定的字段键和该类型第 *n* 个数据的索引，以\
  \ `String[]` 形式返回字符串数组字段的内容\n\n例如，清单 7-5 中的代码返回了一个待办事项的摘要。\n\n**清单 7-5.** *返回待办事项的摘要*\n\
  ```java\nToDoList list;\nToDo item;\n\n// 使用来自 PIMList 的枚举获取项目\nif (list.isSupportedField(ToDo.SUMMARY))\
  \ {\n    String summary = item.getString( ToDo.SUMMARY, 0 );\n    // 对摘要进行处理\n}\n\
  ```\n\n每个字段可以包含同一类型的多个条目，这就是为什么你需要向每个访问器方法传递一个索引。例如，要枚举联系人中的所有电话号码，你可以编写如清单 7-6\
  \ 所示的代码。\n\n**清单 7-6.** *枚举联系人中的记录字段*\n```java\nContactList list;\nContact item;\n\
  int i=0;\n\n// 使用来自 PIMList 的枚举获取项目\nif (list.isSupportedField(Contact.TEL)) {\n\
  \    String phone;\n    phone = item.getString(Contact.TEL, i);\n    while(phone!=null)\
  \ {\n        // 在此处对电话号码进行处理。\n        i++;\n        phone = item.getString(Contact.TEL,\
  \ i);\n    }\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 7\
  \ 章 ■ 访问文件和其他数据 **181**\n\n\n\n对于像 `Contact.TEL` 这样具有多个值的字段，其数据项可能包含一个属性，用于指示该数据项属于*哪种*类型。例如，一个联系人可能有多个电话号码，分别对应家庭、手机、办公室和传真。当你使用字段索引获取这些号码时，你需要通过给定字段的属性来确定*哪个*号码对应哪个用途。你可以使用\
  \ `PIMItem` 实例的 `getAttributes` 方法来实现这一点，该方法会返回给定字段和索引的属性位掩码，如下所示：`int attrs = item.getAttributes(\
  \ Contact.TEL, i );`\n\n在我撰写本文时，属性仅用于联系人项，表 7-4 列出了联系人项的属性列表。当然，这在未来的 PIM 包版本中可能会有所改变。\n\
  \n**表 7-4.** *联系人字段的属性*\n\n**属性**\n\n**用途**\n\nATTR_ASST\n\n与行政助理相关的字段数据\n\nATTR_AUTO\n\
  \n与汽车相关的字段数据\n\nATTR_FAX\n\n与传真相关的字段数据\n\nATTR_HOME\n\n与家庭相关的字段数据\n\nATTR_MOBILE\n\
  \n与手机相关的字段数据\n\nATTR_OTHER\n\n与其他信息相关的字段数据\n\nATTR_PAGER\n\n与寻呼机相关的字段数据\n\nATTR_PREFERRED\n\
  \n与首选联系方式相关的字段数据（可能仅用于一个数据项） ATTR_SMS\n\n与短信相关的字段数据\n\nATTR_WORK\n\n与工作相关的字段数据\n\
  \n有两个字段——`Contact.NAME` 和 `Contact.ADDR`——会返回一个字符串数组。这是因为不同的实现对于单个姓名或地址可能使用不同数量的字段。例如，一个地址是由一行街道和一行套房/公寓组成，还是由两行组成？因此，你可以将返回的字符串数组中的每个字符串作为这些字段的单独部分进行访问。`Contact`\
  \ 类提供了一些常量，让你可以索引这些数组以获取字段的特定部分，例如地址的城市、街道或邮政编码。表 7-5 显示了在访问这些字符串数组元素时可以使用的索引。你还可以通过调用\
  \ `ContactList` 的 `stringArraySize` 方法，并传入 `Contact.NAME` 或 `Contact.ADDR` 来确定这些数组的大小，从而获取任一数组中允许的最大元素数量。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**182**\n\n第 7 章 ■ 访问文件和其他数据\n\
  \n**表 7-5.** *联系人字段字符串数组的索引* **属性**\n\n**用途**\n\nADDR_COUNTRY\n\n地址的国家部分\n\nADDR_EXTRA\n\
  \n地址的额外部分\n\nADDR_LOCALITY\n\n地址的地点部分\n\nADDR_POBOX\n\n地址的邮政信箱部分\n\nADDR_POSTALCODE\n\
  \n地址的邮政编码部分\n\nADDR_REGION\n\n地址的区域部分\n\nADDR_STREET\n\n地址的街道部分\n\nNAME_FAMILY\n\
  \n姓名的姓氏部分\n\nNAME_GIVEN\n\n姓名的名字部分\n\nNAME_OTHER\n\n姓名的其他部分\n\nNAME_PREFIX\n\n姓名的前缀部分（例如，博士）\n\
  \nNAME_SUFFIX\n\n姓名的后缀部分（例如，小）\n\n**修改 PIM 记录**\n\n一旦你拥有了一个 `PIMItem`，你就可以修改它。你可能想要进行三种类型的修改：\n\
  \n*   向现有字段添加一个数据项（例如，向已有电话号码的联系人添加一个新电话号码）\n*   替换现有字段中的一个数据项（例如，用新信息替换现有的电话号码）\n\
  *   完全移除一个字段\n\n在第一种情况下，你使用 `PIMItem` 的添加方法；在第二和第三种情况下，你使用 `PIMItem` 的设置方法来完成。\n\
  \n以下是可用的添加方法：\n\n*   `addBinary`：添加一个新的二进制（`byte[]`）字段数据项\n*   `addDate`：添加一个新的日期字段数据项\n\
  *   `addInt`：添加一个新的整数（`int`）字段数据项\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 ■ 访问文件和其他数据 **183**\n\n*   `addString`：添加一个新的字符串字段数据项\n*   `addBoolean`：添加一个新的布尔字段数据项\n\
  *   `addStringArray`：添加一个新的字段数据项，该数据项由一个字符串数组组成\n所有这些方法都接受你想要添加到现有字段的字段、属性和字段数据项。\n\
  \n以下是可用的设置方法：\n\n*   `setBinary`：设置二进制字段的值\n*   `setDate`：设置日期字段的值\n*   `setInt`：设置整数字段的值\n\
  \n\n\n• setString：设置字符串字段的值\n\n• setBoolean：设置布尔字段的值\n\n• setStringArray：设置由字符串数组组成的字段的值。当调用这些方法之一时，你需要传入要添加或替换的字段、索引、项目的任何属性以及要设置的数据。\n\
  \n完成对 PIMItem 的更改后，你*必须*调用其 commit 方法，将更改写回 PIM 包的记录存储中。\n\n**添加 PIM 记录**\n\n添加新记录是一个三步过程：\n\
  \n**1.** 调用 PIMList 接口子类中的工厂方法，以创建所需类型的空记录。\n\n**2.** 在新记录上调用各种添加方法，用数据填充它。\n\n\
  **3.** 调用 commit 将你的更改刷新到 PIM 包的记录存储中。\n\nPIMList 子类各自定义了一个工厂方法（createContact、createEvent\
  \ 或 createToDo），你必须使用该方法在应用程序的记录存储中创建一个空记录。创建完成后，你可以填充结果记录的字段，然后将其刷新到存储中。清单 7-7\
  \ 展示了如何创建新联系人（省略了必要的异常处理）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
