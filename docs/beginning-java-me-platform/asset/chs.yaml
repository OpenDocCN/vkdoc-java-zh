  \ o ) {\n\nowner = o;\n\n}\n\npublic void run() {\n\nowner.alarmFired();\n\n}\n\n\
  }\n\nprivate void initialize() {\n\ntry {\n\nDate d = new Date();\n\nlong whenToFire\
  \ = d.getTime() + DELAY;\n\nstore = RecordStore.openRecordStore(storeName, true);\n\
