  \n第 8 章 ■ 使用 Java 移动游戏 API **217**\n\n`createBoard` 方法创建一个包含用于构建游戏背景的图块的 `Image`，然后创建一个\
  \ `TiledLayer`，将 `TiledLayer` 中的单元格设置为 `map` 指示的图块。在实际游戏中，这会更加复杂，会调用一个关卡加载器，从游戏资源中加载特定的游戏关卡，但原理基本相同。代码初始化\
  \ `TiledLayer` 后，会将其添加到 `LayerManager`。\n\n`createButterflies` 方法通过首先加载蝴蝶动画中使用的帧图像，然后依次创建每个蝴蝶精灵来创建两只蝴蝶。对于每个蝴蝶精灵，代码必须为蝴蝶选择一个随机的起始位置，初始化帧序列（显示蝴蝶动画如何遍历帧序列），并让蝴蝶从与前一个蝴蝶不同的帧开始。创建并初始化每个蝴蝶精灵后，代码会将其添加到\
  \ `LayerManager`。`createCat` 方法类似，只是猫没有动画帧，因此省略了设置帧序列的过程。\n\n游戏循环——由 `start` 方法启动——必须管理猫和蝴蝶的移动，检测这些角色之间的任何碰撞，并重新绘制屏幕。`run`\
  \ 方法连同辅助方法 `moveCat`、`moveButterflies` 和 `detectCollisions` 一起完成这项工作。最后，如果 `paused`\
  \ 为 true，游戏循环会在 `paused` 变量上等待，从而为 MIDlet 提供一种暂停游戏的方式。\n\n`moveCat` 方法首先轮询按键并测试方向键。对于按下的每个方向键，代码会逐步移动猫的位置；当测试完所有按键组合后，代码会检查以确保猫仍在游戏板上，然后设置猫的位置。\n\
  \n`moveButterflies` 方法的工作方式类似，但有两个不同之处。首先，蝴蝶随机移动；其次，`moveButterflies` 必须移动所有蝴蝶。它通过一个简单的循环来实现这一点。当然，这个方法与\
  \ `moveCat` 可以重构为使用一个单独的辅助函数，但我选择不这样做，以保持每个方法职责清晰。在更复杂的游戏中，这种行为很可能会委托给实现角色行为的整个类。\n\
  \n`detectCollisions` 的代码将碰撞检测委托给精灵猫，使用其 `collidesWith` 方法，并依次传入每个蝴蝶精灵。当猫检测到碰撞时，代码使用传递给画布构造函数的\
  \ `Display` 实例来闪烁背光和振动手机。\n\n游戏的主循环通过 `setPaused` 修改器、其关联的 `paused` 变量以及 Java 的线程同步来管理游戏的暂停和恢复操作。\n\
  \n当成员变量 `paused` 为 true 时，`SpriteCanvas` 的 `run` 方法中的游戏循环会等待，线程进入休眠。当 MIDlet 再次调用\
  \ `setPaused` 时，它会触发对成员变量 `paused` 的通知，线程继续执行。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**218**\n\n第 8 章 ■ 使用 Java 移动游戏 API\n\n**总结**\n\nMIDP 2.0 在 `javax.microedition.lcdui.game`\
  \ 中包含了移动游戏 API，这是一组健壮的类，可用于实现你自己的游戏。该接口由五个类组成：\n\n• `GameCanvas`：允许你轮询按键，并围绕使用 Java\
  \ 线程的游戏循环概念来构建游戏。\n\n• `LayerManager`：负责按你定义和绘制的 Z 轴顺序管理屏幕上的可见元素。\n\n• `Layer`：表示\
  \ Z 轴顺序中的一个单独平面。\n\n• `TiledLayer`：`Layer` 的一个实现，可用于从小图块创建大型位图图像。\n\n• `Sprite`：`Layer`\
  \ 的一个实现，可用于创建动画。\n\n使用移动游戏 API，你可以围绕游戏循环的概念来构建你的游戏 MIDlet，该循环在其自己的线程中运行，管理事件并更新游戏状态。\n\
  \n你的游戏循环可以轮询按键或以传统方式响应事件，并根据需要使用 `GameCanvas` 的 `Graphics` 上下文绘制到屏幕。`LayerManager`\
  \ 类通过管理一个 `Layer` 数组来简化绘制，每个 `Layer` 可以绘制自己的内容。该 API 定义了两种特定类型的图层：`TiledLayer`，适用于绘制游戏的大片区域，例如游戏关卡的背景；以及\
  \ `Sprite`，帮助你为特定的可见对象组织动画帧。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n间奏曲\n\n**目前很少有移动设备实际实现 CDC，这似乎有些奇怪。然而，当你考虑到 CDC 的** **目的——弥合低成本、低功耗计算设备与当今传统便携式或固定工作站之间的鸿沟——**\
  \ **很明显，*需要某种东西*** **来填补这一空白。移动设备和其他消费设备（如机顶盒）** **的处理能力和内存持续增长，使得越来越便宜的设备能够运行适合\
  \ CDC 的应用程序。**\n\n\n\n**如果你确信自己要坚持 MIDP 编程——你已具备成为资深移动开发者的潜质——可以跳过第 3 部分，直接进入第 4\
  \ 部分，在那里我将向你展示更多 Java ME 设备上日益常见的可选 Java 接口。另一方面，如果其他消费类设备的可能性让你兴奋，请继续阅读！Java ME\
  \ 远不止 CLDC 和 MIDP 这么简单。**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  第 3 部分\n\nCDC 开发\n\n**Sun Microsystems 长期以来一直将 Java 视为适用于所有计算设备（无论大小）的平台。可以说，Java\
  \ 在大型任务上取得了成功；Java Servlet 等技术为世界上一些大型企业提供动力。正如你在第 2 部分所见，Java 在一些最小的设备上也同样成功——具体来说，就是当今廉价、无处不在的手机。从\
  \ PersonalJava（后来演变为 Java ME CDC）开始，Sun 准备在中端设备（包括机顶盒和其他娱乐平台）上复制其成功。在本部分中，我将向你展示\
  \ CDC 如何补充 CLDC，介绍 CDC 及其配置文件的两种关键编程模型：Foundation Profile、Personal Basis Profile\
  \ 和 Personal Profile。不要以为你读到的内容只适用于娱乐设备或高端移动设备。正如融合趋势帮助将 Java SE 的关键特性引入 Java ME\
  \ 一样，在未来的几年里，我期望你在这些页面中看到的内容将同样适用于许多支持 Java 的非传统计算设备。**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章\n\n介绍 Xlet 和 Personal Basis Profile\n\n**J**ava 小程序的初始运行时环境是浏览器，但 Java ME\
  \ 的出现改变了这一点。正如你在第 4 章所见，MIDlet 是 MIDP 对应用程序运行时的回应；在本章中，你将看到 Xlet 如何在 CDC 之上为 Personal\
  \ Basis Profile (PBP) 扮演相同的角色。毫不意外，Xlet 履行的职责本质上与 MIDlet 相同，因此如果你熟悉 MIDlet，那么你在这里看到的内容将会非常熟悉。\n\
  \n在本章中，我将讨论 Xlet 的执行模型。阅读本章后，你将了解 Xlet 在 Java ME 环境中的起源以及 Xlet 的生命周期。你将能够编写自己的 Xlet，并使用\
  \ PBP 中可用的接口执行基本的 Xlet 间应用程序通信。\n\n**理解 Xlet**\n\nXlet 模型通过 Sun 在电视领域对 Java 应用程序的尝试进入\
  \ Java ME。现在作为 CDC 之上 PBP 的一部分，Xlet 模型必须满足一些超出简单小程序要求的额外标准；值得注意的是，它必须允许多个应用程序共享设备资源，包括\
  \ I/O 设备。它还必须确保没有单个应用程序能够使 Java 虚拟机崩溃，因为虚拟机可能同时托管其他应用程序。因此，Xlet 必须具有特定的生命周期，让 Xlet\
  \ 像 MIDlet 一样在活动（运行）和暂停状态下运行。\n\n与 MIDlet 一样，你通过扩展特定接口来实现 Xlet——具体来说，就是 `javax.microedition.xlet.Xlet`\
  \ 接口。当运行时初始化 Xlet 时，它会提供一个*上下文*，为你的 Xlet 提供一些与应用程序运行时交互的关键方法。\n\n**223**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**224**\n\n第 9 章 ■ 介绍 Xlet 和 Personal Basis Profile\n\n**查看 Xlet 生命周期**\n\n图 9-1\
  \ 显示了 Xlet 可能存在的状态。\n\n**图 9-1.** *Xlet 的生命周期*\n\n如图 9-1 所示，Xlet 可以处于以下三种状态之一：\n\
  \n• *暂停*：加载后，Xlet 应用程序管理器调用 Xlet 的 `initXlet` 方法，该方法应初始化 Xlet。Xlet 现在处于*暂停*状态。\n\
  \n• *活动*：当 Xlet 应用程序管理器准备将设备接口的控制权交给 Xlet 时，它使用 `startXlet` 方法启动 Xlet。Xlet 现在处于*活动*状态。在任何时候，Xlet\
  \ 应用程序管理器都可以通过调用 Xlet 的 `pauseXlet` 方法再次暂停 Xlet，使 Xlet 回到暂停状态，然后可以通过再次调用 `startXlet`\
  \ 恢复执行。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 9 章 ■ 介绍 Xlet 和\
  \ Personal Basis Profile\n\n**225**\n\n• *销毁*：当应用程序管理器想要关闭 Xlet 时，它会调用 Xlet 的 `destroyXlet`\
  \ 方法，该方法必须终止 Xlet 的执行。Xlet 现在处于*销毁*状态，等待运行时进行垃圾回收。\n\n重要的是要记住，Xlet 可以从暂停状态直接进入销毁状态，并且在其生命周期中可能会反复进入活动和暂停状态。同样重要的是要记住另外两点：\n\
  \n• *不要调用* `System.exit`：运行的 Xlet 可能不止你一个，你不想关闭 Java 运行时。请改用你的 Xlet 可用的 `XletContext`\
  \ 对象（本章稍后讨论）来指示你的应用程序何时想要关闭。\n\n• *在暂停和退出时释放所有可能的资源以帮助垃圾回收器*：这对于远程通信接口、文件和图形上下文等资源尤其重要。应用程序应始终能够自行清理。\n\
  \nXlet 生命周期与 MIDlet 生命周期的一个有趣区别是，如果 Xlet 想要忽略请求的状态更改，它可以抛出一个异常 `XletStateChangeException`。例如，初始化失败的\
  \ Xlet 可以抛出此异常以避免启动，或者即将被销毁的 Xlet 可以抛出此异常以避免被应用程序管理系统关闭。\n\n**扩展 Xlet 接口**\n\n一个\
  \ Xlet 必须提供五个方法：\n\n• *构造函数*：这通常是空的。\n\n• `initXlet`：此方法接受一个 `XletContext` 对象并初始化\
  \ Xlet。\n\n• `startXlet`：当 Xlet 进入活动状态时，运行时调用此方法。此方法必须执行启动 Xlet 活动执行所需的任何操作。\n\n\
  • `pauseXlet`：此方法必须释放不必要的资源，并指示 Xlet 处于暂停状态。\n\n• `destroyXlet`：当 Xlet 进入销毁状态并等待垃圾回收时，此方法必须释放所有资源。\n\
  \n清单 9-1 显示了一个最简单的 Xlet。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  **226**\n\n第 9 章 ■ 介绍 Xlet 和 Personal Basis Profile\n\n**清单 9-1.** *最简单的 Xlet*\n\
  \nimport javax.microedition.xlet.*;\n\npublic class SimplestXlet implements Xlet\
  \ {\n\npublic SimplestXlet () {\n\n}\n\npublic void destroyXlet( boolean unconditional\
  \ )\n\nthrows XletStateChangeException {\n\n}\n\npublic void initXlet( XletContext\
  \ context )\n\nthrows XletStateChangeException {\n\n}\n\npublic void pauseXlet()\
  \ {\n\n}\n\npublic void startXlet() throws XletStateChangeException {\n\n}\n\n}\n\
  \n这个 Xlet 显然什么也不做，但它说明了一个重要点：它表明 Xlet 接口实现也可以抛出 `XletStateChangeException`。此异常表示特定的状态转换失败——例如，从已加载到已初始化，或从运行到暂停，反之亦然。应用程序管理系统如何处理这些异常取决于失败的状态转换和平台的实现。\n\
  \n**使用 Xlet 上下文**\n\n对于每个 Xlet，应用程序管理器都会关联一个上下文，它是 `javax.microedition.xlet.XletContext`\
  \ 的一个实例。运行时提供此管理器，以便 Xlet 可以与其环境交互。`XletContext` 接口提供以下方法：\n\n• `getClassLoader`：返回\
  \ Xlet 的基类加载器\n\n\n\n• getContainer：返回 Xlet 应放置其组件的根容器\n\n• getXletProperty：从 XletContext\
  \ 返回一个命名属性\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 9 章 ■ 介绍 Xlet\
  \ 与个人基础配置文件\n\n**227**\n\n• notifyDestroyed：通知应用程序管理器 Xlet 已进入销毁状态\n\n• notifyPaused：通知应用程序管理器\
  \ Xlet 不希望处于活动状态并已进入暂停状态\n\n• notifyActive：通知应用程序管理器 Xlet 希望进入活动状态\n\n通常在 Xlet 初始化时使用\
  \ getContainer 来获取容器，其他可见组件应放置其中。应用程序管理器通过这种方式与多个 Xlet 共享屏幕；每个 Xlet 获得一个独立的容器组件，用于渲染其用户界面。\n\
  \n与 MIDlet 类似，Xlet 在需要改变状态时必须向运行时发出信号；运行时随后响应请求，执行状态变更。这就是 Xlet 指示退出意图的方式：它不调用 System.exit，而是调用\
  \ notifyDestroyed。\n\n同样，Xlet 可以通过调用 notifyPaused 指示希望进入暂停状态并将用户界面让给其他 Xlet，或通过调用\
  \ notifyActive 请求恢复至活动状态。\n\n**编写一个简单的 Xlet**\n\n为 PBP 编写 Xlet 在抽象层面很简单：只需实现 Xlet\
  \ 接口，并在此过程中扩展一个 Java AWT 容器（如 java.awt.Component）。实际应用程序驻留在此容器内，您可以通过初始化时提供给 Xlet\
  \ 的上下文与应用程序管理器交互。\n\n**查看一个简单的 Xlet**\n\n在清单 9-1 中，您看到了 Xlet 的骨架；清单 9-2 展示了一个实际运行的\
  \ Xlet。\n\n**清单 9-2.** *一个简单的 Xlet*\n\npackage com.apress.rischpater.HelloXlet;\n\
  \nimport java.awt.*;\n\nimport javax.microedition.xlet.*;\n\npublic class HelloXlet\
  \ extends Component implements Xlet {\n\nprivate XletContext context;\n\nprivate\
  \ Container rootContainer;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**228**\n\n第 9 章 ■ 介绍 Xlet 与个人基础配置文件\n\npublic HelloXlet() {\n\n}\n\npublic void\
  \ initXlet(final XletContext xletContext)\n\nthrows XletStateChangeException {\n\
  \ncontext = xletContext;\n\nif(rootContainer == null) {\n\ntry {\n\nrootContainer\
  \ = context.getContainer();\n\nrootContainer.add(this);\n\n} catch (UnavailableContainerException\
  \ e) {\n\nSystem.out.println(\"无法获取我们的容器！\"); throw new XletStateChangeException(\
  \ \"无容器。 \"\n\n+ e.getMessage() );\n\n}\n\n}\n\n}\n\npublic void startXlet() throws\
  \ XletStateChangeException {\n\nrootContainer.setVisible(true);\n\n}\n\npublic void\
  \ paint(Graphics g) {\n\ng.drawString(\"Hello Xlet\", 0, 100);\n\n}\n\npublic void\
  \ pauseXlet() {\n\nSystem.out.println(\"HelloXet.pauseXlet()\");\n\n}\n\npublic\
  \ void destroyXlet(boolean b) throws XletStateChangeException {\n\nSystem.out.println(\"\
  HelloXet.destroyXlet() - 再见\");\n\n}\n\n}\n\n图 9-2 显示了该 Xlet 在 Java ME 模拟器中运行时的输出。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00028.jpeg)\n\n第 9\
  \ 章 ■ 介绍 Xlet 与个人基础配置文件\n\n**229**\n\n**图 9-2.** *Hello Xlet*\n\n该 Xlet 本身很简单：它实现了\
  \ Xlet 契约，并扩展了 Component——这是一个轻量级 AWT 类，当调用其 paint 方法时知道如何绘制。\n\n在初始化时，Xlet 必须完成几件事。首先，它缓存应用程序管理系统提供的上下文，以便在需要退出时使用。接着，它获取上下文提供的根容器并缓存起来；该容器定义了\
  \ Xlet 在屏幕上允许绘制的区域。最后，它将自身添加到上下文提供的根容器中。\n\n默认情况下，Xlet 的用户界面不可见。因此，当应用程序管理器调用 startXlet\
  \ 使 Xlet 转换到活动状态时，应用程序必须使其根容器可见；这会触发重绘，显示由 paint 处理的应用程序界面，该界面执行简单的 Graphics 操作，在显示屏上绘制消息“Hello\
  \ Xlet”。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**230**\n\n第 9 章\
  \ ■ 介绍 Xlet 与个人基础配置文件\n\nXlet 在暂停时不应自行擦除；它可能仍是屏幕上的可见部分，只是未获得焦点。因此，暂停此 Xlet 很简单，因为它不做任何操作；pauseXlet\
  \ 方法仅将应用程序管理器触发转换到暂停状态这一事实记录到控制台。\n\n同样，销毁此 Xlet 也很简单；AMS 负责从根容器中移除框架，这会触发用户界面的销毁，因此销毁操作仅记录\
  \ Xlet 已被销毁的事实。（Xlet 也无需自行隐藏，因为应用程序管理器会为您处理。）\n\n**理解 Xlet 的依赖关系**\n\n值得注意的是，这个简单的\
  \ Xlet 实际上除了 CDC 之外还有两个关键依赖关系，这些依赖关系可能是您在设计自己的 Xlet 时面临的挑战。首先，也是最明显的，您必须记住 Xlet\
  \ 不是 CDC 类，而是 PBP 类。这意味着，设备支持 Java ME CDC 并不一定意味着它提供 Xlet 运行时，除非它实现了 PBP。幸运的是，当今绝大多数\
  \ CDC 设备至少包含 PBP，因此在实际中这不太可能成为问题。\n\n其次，核心 CDC 为连接的 Java ME 设备提供了 Java 类层次结构，但明确将确定应用程序如何运行以及使用何种窗口工具包的责任委托给\
  \ CDC 之上的各种配置文件。除了提供 Xlet 模型外，PBP 还提供了 Java AWT 的一个小子集：组件和容器。具体来说，PBP 支持那些在操作系统中没有对等体的\
  \ AWT 组件，让应用程序和框架开发者能够实现自己的窗口工具包。事实上，一些平台供应商已经这样做了，如果您在某些设备上使用 Java ME，可能根本不会使用像\
  \ AWT 这样的标准窗口工具包，而是使用第三方供应商提供的不同组件框架。\n\n幸运的是，对于许多功能更强的设备，还有其他选择。多个 JSR 详细说明了适用于支持\
  \ CDC 设备的特定用户界面包，包括可缩放矢量图形（SVG），它以适合支持 CDC 设备的移动配置文件格式提供。JSR 226 定义了通过 javax.microedition.m2g\
  \ 包支持 SVG 的接口，JSR 287 则定义了该接口的第二个迭代版本，支持事件和 SVG 文档对象模型（DOM）。此外，在某些设备上，可以通过 JSR 184\
  \ 定义的 Mobile 3D Graphics API 或 JSR 239 中定义的 OpenGL ES Common 配置文件接口使用三维图形。\n\n对许多\
  \ Java 开发者来说，JSR 209 定义的 AGUI 更为实用。它定义了 Java AWT 和 Swing 用户界面的一个合理子集，便于将 Swing 应用程序移植到\
  \ Java ME 设备。我将在第 10 章更详细地讨论 AGUI。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 介绍 Xlet 与个人基础配置文件\n\n**231**\n\n当然，所有这些窗口工具包选项都依赖于特定设备支持的核心配置和配置文件；图 9-3\
  \ 显示了由 JSR 流程定义的配置、配置文件和 GUI 配置文件的典型堆栈。\n\n**图 9-3.** *CDC、CDC 之上的配置文件以及一些更常用的 CDC\
