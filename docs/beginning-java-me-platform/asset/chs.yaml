  \n第 17 章 ■ 寻找方向\n\n`WeatherWidget`使用一个单独的线程来获取你的位置，尽管该线程的代码位于`WeatherWidget`类本身内部，而不是一个单独的类。当你从位置列表或位置输入屏幕中选择“使用此位置”时，`determineLocation`方法会创建并启动这个线程。当该线程执行完毕时，它会在主线程上调度一个`Runnable`任务，将新位置添加到位置列表中，并设置\
  \ MIDlet 显示`locationTextBox`，以便你查看位置请求的结果。\n\n\n\n**定位用户**\n\n该 MIDlet 使用一次性定位请求来确定您的位置；当您调用`determineLocation`时，定位线程会通过生成一个新线程来执行清单\
  \ 17-2 中的`run`方法，从而完成这项工作。这段代码是您在清单 17-1 中看到的伪代码的扩展，仅存在几个重要差异。\n\n应用程序为定位请求设置了特定标准，表明允许定位请求产生费用，请求应附带`AddressInfo`信息，并且允许设置相对较高的误差范围（100\
  \ 米）。`run`方法验证生成的`Location`实例，如果可用，则利用生成的`AddressInfo`结构为`WeatherLocation`结构提供真实的城市、州和国家信息，就像您直接输入这些信息一样。然而，在大多数情况下——尤其是在\
  \ Sun Java Wireless Toolkit 中——您只会收到一个`QualifiedCoordinates`实例，代码便直接使用该实例，构建一个由标签`GPS\
  \ Coordinates`后跟经纬度组成的字符串。这无疑是一种权宜之计，但也是合理的：它利用了 MIDlet 中其他类的现有实现，使我能够专注于向您展示 Location\
  \ API，而不是如何重构其他类以同时处理坐标数据及其人类可读的对应形式。\n\n一旦`run`方法构建了包含位置数据的字符串，它会使用一个独立的`Runnable`在主线程上更新\
  \ UI。这并非严格必要，因为`locatingAlert`会遮挡`locationTextBox`的输入，因此两个线程之间不可能发生冲突。然而，这向您演示了如何在主\
  \ UI 线程上调度一个操作。私有内部类`LocationUpdater`实际执行更新 UI 所需的工作，它本可以是一个匿名类，因为仅在此处使用。其构造函数接收新位置，而`run`方法则将新位置添加到位置列表中，将当前位置设置为新位置，并将显示从`locationAlert`切换到`locationTextBox`，后者会显示已确定的位置。\n\
