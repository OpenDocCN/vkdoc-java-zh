  第 2 章 ■ 精简 Java 以适应需求\n\nCDC 融合了 Java SE 和 CLDC，这意味着 CDC 和 CLDC 都包含 GCF，这是一个与媒体无关的接口层次结构，提供了诸如套接字、文件或其他实体的连接工厂。CLDC\
  \ 将 GCF 支持哪些协议的定义推迟到 MIDP，而 CDC 默认要求支持 HTTP 和 HTTPS。\n\nCLDC 和 CDC 都不提供对 GUI 开发的支持。为此，你需要在配置之上使用一个配置文件，例如\
  \ MIDP，这是本书第 2 部分和第 3 部分的主题。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 3 章\n\n开始使用\n\nNetBeans IDE\n\n**有**大量工具可用于构建 Java ME 应用程序，但 NetBeans 集成开发环境\
  \ (IDE) 脱颖而出，它为平台提供了最佳支持，同时保持开放以进行更改和扩展。如果你刚刚起步，NetBeans 软件开发工具包 (SDK) 是一个不错的起点；如果你正在探索\
  \ Java ME 平台并考虑在其他环境中工作，本章中你将学到的许多概念仍然适用。\n\n在本章中，我首先介绍 NetBeans IDE，并解释如何在 Microsoft\
  \ Windows 和 Linux 上安装它。接下来，我将快速浏览 NetBeans IDE；这*非常*简短，因为学习 IDE 的最佳方式就是使用它。因此，我将花大量时间在两个分步教程中使用\
  \ IDE：一个用于构建你的第一个 CLDC/Java ME 应用程序，另一个用于构建你的第一个 CDC/AGUI 应用程序。\n\n阅读本章后，你将了解使用\
  \ NetBeans 布局、编辑、编译和打包 CLDC/Java ME 和 CDC 应用程序的基础知识。你还将了解可以应用于其他环境（例如 EclipseME）的技术，如果你选择不同的工具链的话。\n\
  \n**选择 NetBeans IDE**\n\n虽然有大量工具可用于进行 Java ME 开发，但开始学习 Java ME 时使用 NetBeans IDE\
  \ 是个好主意，原因如下：\n\n• 它是免费的。\n\n• 它包含一个 GUI 构建器，可以让你快速轻松地布局复杂的屏幕，并在后台自动生成代码。\n\n• 它包含对应用程序源代码级调试的全面支持。\n\
  \n**33**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**34**\n\n第 3 章\
  \ ■ 开始使用 NetBeans IDE\n\n• 它支持从源代码编辑到部署到服务器进行设备测试的往返开发。\n\n• 通过 Mobility Pack（也是免费的），它包含对\
  \ Java 和 Java ME 的全面支持，包括一个手机模拟器，你可以在将应用程序部署到设备之前在其上进行测试。\n\n当然，还有其他用于 Java ME 的\
  \ IDE，包括同样免费的 EclipseME。\n\n\n\n不过，NetBeans IDE 与 Mobility Pack 提供了入门所需的一切，而 EclipseME\
  \ 则需要你先下载 Eclipse 和特定版本的 Sun Java Wireless Toolkit（也是免费下载），然后才能下载、安装和配置 EclipseME。此外，EclipseME\
  \ 最终生成的环境在功能完整性和集成度上都不如 NetBeans SDK，因此我建议你改用 NetBeans SDK。\n\n假设你已经安装了 Java SE\
  \ Java 开发工具包 (JDK) 4、5 或 6 版本，安装 NetBeans IDE 再简单不过了——只需访问 NetBeans 网站 http://www.netbeans.org/，然后点击“下载\
  \ NetBeans IDE”链接即可。如果你尚未安装所需的 Java SE JDK，有两个选择——前往 Sun 网站 http://java.sun.com/\
  \ 下载一个，或者下载与所需 JDK 捆绑的 NetBeans IDE。\n\n下载并安装 NetBeans IDE 后（下载文件提供了一个可双击运行的安装程序），返回\
  \ http://www.netbeans.org/ 找到适用于 CLDC/MIDP 和 CDC 的 Mobility Pack。根据你的目标平台（CLDC/MIDP\
  \ 或 CDC）下载其中一个或两个，然后运行提供的安装程序。\n\n不过，对于 Mac OS X 开发者来说有一个问题——虽然 NetBeans 可以在你选择的操作系统上顺利运行，但\
  \ Mobility Pack 却不行。幸运的是，你完全可以在虚拟机或通过 Boot Camp 运行其他操作系统的情况下，使用带 Mobility Pack 的\
  \ NetBeans IDE。（实际上，本书中的所有示例都是这样创建的。）只需查阅虚拟机提供商的文档来安装 Linux 或 Windows，然后在你选择的操作系统内按照这些说明操作即可。\n\
  \n■**注意** 本书中的所有示例均使用 NetBeans IDE 5.5.1 版本创建；本书付印时已有更新的版本。如果你使用的 NetBeans IDE 版本比这个新，后续的截图和说明可能会略有不同。\n\
