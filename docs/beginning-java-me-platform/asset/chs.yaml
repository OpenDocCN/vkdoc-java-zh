  \n代码以对象现在存储的各种字段的静态定义开始，同时还有代码在构建其 XML 表示时使用的各种 XML 片段的静态 String 声明。该类的大部分内容与第 6\
  \ 章保持一致，只是增加了新字段以及这些字段的访问器/修改器方法；`toBytes` 和 `fromBytes` 方法已更改，以使用我在第 6 章讨论记录存储时介绍的相同标签-值系统来序列化新字段。`toXml`\
  \ 方法通过附加序言、静态 XML 片段以及每个成员变量的值，在 `StringBuffer` 实例中构建 XML。这种技术虽然粗糙，但效果很好；根据你想要表示为\
  \ XML 的对象类型，你通常可以稍微简化代码，例如当你拥有相似对象的向量时。\n\n如果你使用 Java 已有相当长的时间，你可能会查看 `toXml` 方法，并倾向于使用\
  \ Java 反射做类似的事情，创建一个通用的 XML 编码器对象，该对象接收一个对象实例，查询该对象的成员字段，并根据每个字段的类型和内容编写 XML。这对于\
  \ Java SE 来说是一种极好的方法，因为 Java SE 提供了反射，但不幸的是，这种方法在 Java ME 设备上效果不佳，因为正如我在第 2 章中讨论的，CLDC\
  \ 缺乏对反射的支持。如果你的代码注定只在 CDC 上运行，那么面向反射的方法可能很有意义。\n\n**J2ME Web 服务规范简介**\n\nJ2ME Web\
  \ 服务规范（如其名称所示，其开发早于 Java ME 平台，并且是 CLDC 和 CDC 设备的一个选项）由 JSR 172 描述，它为 Java ME 平台提供了两个补充：访问基于远程\
  \ SOAP 的 Web 服务，以及一个推送 XML 解析器。这些补充——统称为可选的 Web 服务规范——都是可选的；实现 JSR 172 的平台可以提供基于\
  \ SOAP 的 Web 服务支持、推送 XML 解析器，或两者都提供。如今许多高级移动设备都包含了 JSR 172 的这两个部分，尽管它并非在所有地方都可用；与其他可选规范一样，在产品的早期开发阶段，确认目标设备上指定\
  \ API 的可用性非常重要。\n\n基于 SOAP 的 Web 服务支持的实现是 Java API for XML-based RPC (JAX-RPC) 的一个子集，JAX-RPC\
  \ 是基于 Web 的 RPC 服务的 Java 接口。该子集提供了 JAX-RPC 的客户端实现，包括 boolean、byte、short、int、long、String、数组和复杂类型在\
  \ Java 和 SOAP 之间的编组和解组，以及客户端对 RPC 调用的基于静态桩的调用。由于平台限制，它并非 JAX-RPC 的完整实现；实现该规范的设备不能提供服务端点或使用可扩展的类型映射。\n\
  \n使用 JAX-RPC 支持的应用程序必须遵循以下步骤：**1.** 在编译时，根据服务的 WSDL 描述定义并生成一个桩。\n\n**2.** 在运行时，实例化该桩的一个实例。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**356**\n\n第 13 章 ■ 访问 Web\
  \ 服务\n\n**3.** 在运行时，调用桩上对应于服务端点操作实现的方法。\n\n**4.** 将生成的桩与 Java ME 客户端应用程序打包在一起。\n\
  \n这里的工作与你在第 11 章中描述的使用 Java RMI 可选支持时需要做的工作类似，因为 JAX-RPC 接口使用相同的总体架构，依赖本地桩对象为远程服务提供者提供接口。\n\
  \n\n\n虽然 JAX-RPC 接口在对接某些现有遗留服务时为你提供了一个重要选项，但越来越多的 Web 服务正在转向或完全实现 RESTful 方法，在这种方法中，SOAP\
  \ 相对繁重的语义被更具描述性的 XML 用法所取代。从某种程度上说，这正让 XML 回归其本源，即用于提供数据对象内容的人类和机器可读的描述。就此而言，JSR\
  \ 172 的第二个可选组件对你来说变得重要：XML 解析器。\n\nJSR 172 定义的 XML 解析器是 JSR 63 中定义的 XML 解析器的一个严格子集。它规定：\n\
  \n• 实现不得为 XML 简单 API（SAX）解析提供任何支持。\n\n• 实现不得为 DOM 提供任何支持，因为 DOM 在实现大小和运行时内存占用方面过于庞大，不适合在\
  \ Java ME 设备上使用。\n\n• 实现不得支持 XML 转换（XSLT）。\n\n• 不要求实现支持 XML 验证，因为验证在处理能力和内存方面代价高昂。\n\
  \n• 实现必须支持预定义的 XML 实体（例如 `&`），但不要求支持可选的 XML 实体。\n\n• 实现必须支持 XML 命名空间。\n\n• 实现必须同时支持\
  \ UTF-8 和 UTF-16 字符编码。\n\n可选的解析器实现包含三个包：`javax.xml.parsers`、`org.xml.sax` 和 `org.xml.sax.helpers`。第一个包包含平台自身的解析器实现，而其他包则为解析器提供实用工具。解析器实现必须实现\
  \ SAX2 解析接口，正如这些包的命名空间所反映的那样。\n\nSAX 为解析 XML 提供了一个直接的接口，解析器从流中消费 XML，并在解析过程中生成代表特定\
  \ XML 元素、注释和其他项的事件。在使用 SAX 解析器时，你需要提供一个事件处理器，该处理器接收 SAX 解析器发送的事件，并根据这些事件构建结果对象。你的事件处理器实现由\
  \ `org.xml.sax.helpers.DefaultHandler` 类定义的接口，并重写其方法来处理单个 SAX 事件。\n\n你可以选择处理的一些事件包括以下内容：\n\
  \n• `startDocument`：表示 XML 文档的开始。\n• `endDocument`：表示 XML 文档的结束。\n• `startElement`：表示元素的开始，并传入元素名称、命名空间和属性。属性通过\
  \ `Attributes` 类的实例传递，该类提供了元素所有属性的集合，方便你查找特定属性的值。\n• `endElement`：表示元素的结束。\n• `characters`：获取元素内的字符数据。\n\
  \n回到 WeatherWidget 示例，清单 13-8 展示了 `LocationParserHandler` 类——它是 `DefaultHandler`\
  \ 的一个子类，用于解析表示带有相关预报的 `Location` 对象的 XML 文档。\n\n**清单 13-8.** *LocationParserHandler\
  \ SAX 处理器*\n```java\npackage com.apress.rischpater.weatherwidget;\n\nimport javax.xml.parsers.*;\n\
