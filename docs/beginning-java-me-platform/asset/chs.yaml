  \n**160**\n\n第 6 章 ■ 使用记录存储存储数据\n\n存储后，initialize 方法从存储中获取第一个位置，为 UI 提供一个默认位置。\n\
  \nget_location 返回的默认位置现在是一个空字符串，这与以下概念一致：这仅在您首次启动应用程序且尚未输入任何位置时发生。更新位置列表（由 add_location\
