  NoClassDefFoundError\n\nReference\n\nWeakReference\n\n对 java.lang.Exception 的修改\n\
  \n如前所述，`java.lang` 包的异常层次结构比 Java SE 的层次结构要小得多。\n\n对 java.lang.Object 的修改\n\n对 `Object`\
  \ 类——因此也是对*整个* Java 层次结构——的关键修改是 `finalize` 方法的缺失。如你所知，内存管理器会在垃圾回收之前调用一个方法的 `finalize`\
  \ 方法；在 CLDC 中，无法以这种方式挂钩垃圾回收过程。这是理所当然的：在 Java ME 设备上，内存通常是一种宝贵的资源，因此你应该在使用完资源后显式地清理它们。\n\
  \n反射 API 也不属于 CLDC；它所需的内存占用是不可行的。当然，没有反射，就没有 RMI；没有 RMI，就没有 Jini——Sun 公司基于 Java\
  \ 的分布式计算平台。\n\n对 java.lang.Math 的修改\n\n可以想象，随着 CLDC 1.0 中移除了浮点支持，`java.math` 类也被剥离了浮点运算，只保留了诸如\
  \ `min` 和 `max` 等全整数签名的方法。随着 CLDC 1.1 重新引入浮点支持，该类库再次与 Java SE 保持一致，这些方法也回到了类库中。\n\
  \n对多线程的修改\n\n在 CLDC 和面向更大内存占用设备的 Java 实现之间，多线程的核心本质保持不变。然而，存在一些关键差异：\n\n*   CLDC\
  \ 1.0 不支持线程命名和 `interrupt` 方法；不过，你可以在 CLDC 1.1 中找到它们。\n*   `suspend`、`resume` 和\
  \ `stop` 方法（在 Java SE 中已弃用）在 CLDC 中完全不存在。\n*   CLDC 不支持线程组和守护线程。\n\n对 java.lang.Runtime\
  \ 的修改\n\n出于安全和内存原因，Java SE 和 Java ME 之间的运行时工具发生了巨大变化。它提供了五个方法：\n\n*   `getRuntime`：此静态方法返回全局运行时。\n\
  *   `exit`：虽然你可以调用此方法，但它不会退出运行时；整个应用程序生命周期由应用程序管理器和 MIDlet 管理（更多细节请参见第 3 章）。\n*\
  \   `totalMemory`：你可以使用此方法来确定可用的总内存量。\n*   `freeMemory`：你可以使用此方法来确定可用的空闲内存量。\n*\
  \   `gc`：你使用此方法来调用垃圾回收操作。\n\n对 java.lang.System 的修改\n\n`System` 类也经过了大量修改。没有输入流，因为\
  \ CLDC 设备没有传统的控制台（事实上，在大多数设备上，也无法获取写入 `System.out` 和 `System.err` 的信息）。`System`\
  \ 类还提供了一个名为 `getProperty` 的属性访问器，用于获取诸如设备主机名、设备使用的字符编码方案、CLDC 平台版本、MIDP 版本等信息。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**28**\n\n第 2 章 ■ 缩小 Java\
