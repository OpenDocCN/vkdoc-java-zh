  \ WMA 消息一样。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 14 章 ■ 使用无线消息\
  \ API 进行消息传递 **407**\n\n■**注意** 此示例发送的是编译时随 MIDlet 一起包含的图像。动态生成并编码图像以通过 WMA 发送可能比较困难。我在第\
  \ 16 章中讨论的移动媒体 API（MMAPI）可以从设备摄像头生成 JPEG 图像，但如果没有 PNG 编码器等额外代码，通常无法对`Image`对象进行编码以通过\
  \ MMS 使用 WMA 发送。\n\n**总结**\n\nWMA 首先在 JSR 120 中定义，并在 JSR 205 中进行了扩展，它定义了 GCF 的一个扩展，允许\
  \ MIDlet 发送和接收 SMS 和 MMS 消息，以及接收 SMS-CB 消息。本质上，使用它就像编写任何其他支持 GCF 的应用程序一样：你使用`Connector`的`open`方法作为`MessageConnection`对象的工厂，然后可以使用它创建特定的`Message`子类实例，以表示设备要发送或已接收的消息。\n\
  \n你通过 GCF 创建的`MessageConnection`实例充当消息的工厂；你可以使用其`newMessage`方法创建新的 MO 消息，并传入你想要创建的消息类型，或者通过调用其`receive`方法（该方法会阻塞当前线程，直到消息到达）等待传入消息。WMA\
  \ 定义了`Message`类来封装消息的地址和时间戳概念。`Message`的子类定义了文本 SMS 消息、二进制 SMS 消息和 MMS 消息的特定语义：分别是`TextMessage`、`BinaryMessage`和`MultipartMessage`类。使用这些类，你可以设置消息负载，或者对于`MultipartMessage`实例，你可以管理多个收件人地址以及构成消息的各个部分。一旦配置好待发消息，你就可以使用`MessageConnection`的`send`方法发送它。\n\
  \n使用 WMA 要求你的 MIDlet 具有权限。在打包应用程序时，请确保在你的 JAD 文件中包含你的应用程序所使用的消息类型以及 MIDlet 所使用的消息方向（发送或接收）的权限。\n\
