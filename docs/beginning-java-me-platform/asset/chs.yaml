  \ -1 调用 getPrefContentHeight 和 getPrefContentWidth 方法，CustomItem 应以此返回一个默认的期望尺寸。\n\
  \npaint 方法正是执行此操作，它根据天气指示进行切换，并相应地绘制太阳、云、雨或雪花。该实现假设这些图像中的每一个都是分层的，要么作为位图，要么使用 Graphics\
  \ 上下文和 2D 矢量图形绘制。例如，drawSun 绘制一个圆，其大小为 WeatherItem 的四分之三，并居中于 WeatherItem 内。其他绘制可能使用\
  \ Graphics 方法或 Graphics.drawImage 从存储在 MIDlet 的 JAR 文件中的 PNG 文件进行绘制。\n\ntraverse\
  \ 的实现很简单，因为它只需要跟踪该项目是被遍历进入（聚焦）还是离开（失焦）。显然，当 WeatherItem 获得焦点时，要绘制的项目矩形应该是其整个矩形；当它失去焦点时，WeatherItem\
  \ 不返回矩形。\n\n**总结**\n\n尽管与 Java SE 完全不兼容，但 MIDP 提供了多功能的高级用户界面项集合以及更灵活的底层替代方案。你可以使用\
  \ Screen 的子类 Alert、TextBox、List 和 Form，以及各种可见的 Item 类（包括 TextBox、ChoiceGroup、StringItem、ImageItem\
  \ 和 Gauge）来创建灵活、易于移植的用户界面。此外，如果需要，你可以通过继承 CustomItem 来创建自定义项，从而扩展项的层次结构，为新项提供自己的事件处理和绘制行为。为了更底层地访问事件和绘制系统，你可以继承\
  \ Canvas 类，该类允许你直接接收指针和按键事件，并使用 Graphics 类的实例在屏幕上绘制。由于 Canvas 和 Screen 类都实现了相同的父类\
  \ Displayable，你可以在同一个应用程序中混合使用基于 Canvas 和基于 Screen 的显示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 6 章\n\n使用记录存储\n\n存储数据\n\n**几**乎每个 MIDP 应用程序在某个时候都需要存储数据。MIDP 的原始版本没有提供对文件系统的访问（我将在下一章讨论），但它引入了一个补充概念：*记录存储*。与可以存储任何内容的文件不同，记录存储存储的是结构相似的项组，尽管实际上它并不能完全满足数据库的所有用途。\n\
  \n在本章中，你将了解通过 javax.microedition.rms 接口提供的记录存储。阅读本章后，你将理解记录存储如何表示记录；如何创建、移除和共享记录存储；以及如何访问、修改和移除记录。在此过程中，你将看到记录存储的一个应用，我将向你展示如何在\
  \ WeatherWidget 应用程序中使用它来存储数据。\n\n**窥探记录存储内部**\n\n通过 javax.microedition.rms 接口，MIDlet\
  \ 可以访问多个唯一命名的记录存储。每个*存储*包含一组*记录*。MIDlet 套件可以将记录存储标记为*私有*，这意味着只有创建该存储的 MIDlet 套件中的\
  \ MIDlet 才能访问该存储；或者标记为*共享*，这意味着设备上的任何 MIDlet 都可以访问该存储。MIDP 实现将记录存储保存在设备的非易失性区域中，例如硬盘、闪存文件系统或由电池供电的\
  \ RAM，以便数据在 MIDlet 实例之间持久存在。当 MIDlet 被移除时，该 MIDlet 创建的所有记录存储也将被移除。图 6-1 显示了 MIDlet\
  \ 套件、MIDlet 和记录存储之间的示意关系。\n\n**133**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**134**\n\n第 6 章 ■ 使用记录存储数据\n\n**图 6-1.** *MIDlet 套件、MIDlet 和记录存储之间的关系*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 6 章 ■ 使用记录存储数据\n\n**135**\n\n如图 6-1 所示，示例应用程序中的 MIDlet 套件遵循以下规则：\n\n• WizardGames\
  \ MIDlet 套件仅使用 WizardGameHighScores 记录存储，该存储对 WizardGames 是私有的。\n\n• Weather 和 Traveller\
  \ MIDlet 套件各自拥有一个用于配置和其他数据的私有记录存储。\n\n• Traveller 和 Weather MIDlet 套件从 CurrentWeatherData\
  \ 公共记录存储中读取当前天气预报。\n\n当然，Traveller 和 Weather MIDlet 套件都必须理解 CurrentWeatherData 公共记录存储中记录的表示模式。你可以通过共享一个类来最轻松地实现这一点，因为代码不能在\
  \ MIDlet 之间共享。\n\n\n\n记录存储的名称必须是唯一的。为确保这一点，Java ME 运行时将 MIDlet 套件的名称作为记录存储名称的一部分，因此您只需保证应用程序内多个存储的名称唯一即可。请注意，名称区分大小写，并以\
  \ Unicode 字符串表示，因此您可以像本地化其他应用程序字符串一样对其进行本地化（尽管除非您的 MIDlet 显示其记录存储列表，否则它们通常不会出现在用户界面的任何位置）。\n\
  \n记录存储中的记录会被赋予一个唯一的索引，即记录的主键。该索引从 1 开始递增，因此在创建第 n 条记录后，您创建的下一条记录将被赋予索引 n+1。删除记录不会回收记录\
  \ ID；一旦某个记录 ID 被使用，它将被永久分配，即使其分配的值是 null。\n\n记录存储的实现必须保证单线程内的原子性，但不保证多线程间的原子性。因此，如果您的\
  \ MIDlet 从多个线程访问记录存储，请务必同步对存储中记录的访问。\n\n**使用记录存储**\n\n实际上，您对记录存储本身能做的操作非常有限，因为大部分工作都是针对存储中的记录进行的。因此，您可以打开或关闭记录存储，也可以删除记录存储。最后，您可以检查记录存储的版本，以确保您的应用程序在从存储中读取记录和向存储写入记录时使用正确的记录表示形式。\n\
  \n本节中的所有方法都属于 `javax.microedition.rms.RecordStore` 类。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**136**\n\n第 6 章 ■ 使用记录存储存储数据\n\n**打开和关闭记录存储**\n\n给定记录存储的名称，打开它很简单：只需调用 `RecordStore.openRecordStore`\
  \ 方法，传入存储的名称，并指明如果存储不存在是否应创建它。此方法返回一个 `RecordStore` 实例，您可以使用它来访问已打开存储中的记录。例如：\n\n\
  `RecordStore.openRecordStore(\"Weather\", true);` 为当前 MIDlet 创建名为 Weather 的记录存储，并返回一个\
  \ `RecordStore` 实例。此方法可能抛出以下异常之一，因此您最好准备好处理它们：\n\n*   `RecordStoreException`：当创建或打开记录存储时发生一般性错误，该方法会抛出此异常。\n\
  *   `RecordStoreNotFoundException`：如果找不到您指定的记录存储且创建标志为 false，该方法会抛出此异常。\n*   `RecordStoreFullException`：如果记录存储已满，该方法会抛出此异常。\n\
  *   `IllegalArgumentException`：如果名称无效，该方法会抛出此异常。\n\n其他 `RecordStore.openRecordStore`\
  \ 方法接受额外的参数，如果您想与多个应用程序共享记录存储，则必须使用这些参数。除了指定记录存储的名称以及是否应创建它之外，您还需要传递一个访问模式（`AUTHMODE_PRIVATE`\
  \ 或 `AUTHMODE_ANY`，表示任何 MIDlet 都可以访问该记录存储）以及最后一个参数，该参数指示该存储是否应对其他 MIDlet 提供只读访问（false）或读写访问（true）。此接口允许您创建共享记录存储；最后一个重载的\
  \ `RecordStore.openRecordStore` 方法允许您从不同的 MIDlet 打开一个共享记录存储。它接受三个参数：存储的名称、导出该记录存储的\
  \ MIDlet 套件供应商的名称，以及导出该记录存储的 MIDlet 套件的名称。\n\n因此，要使两个 MIDlet 共享记录存储，*必须*满足*所有*以下条件：\n\
  \n*   创建要共享的记录存储的 MIDlet 必须使用 `RecordStore.openRecordStore` 创建它，并传递 true 以创建记录存储，传递\
  \ `AUTHMODE_ANY` 以允许其他 MIDlet 访问该记录存储，如果共享记录存储允许其他应用程序写入，则传递 true。\n*   创建要共享的记录存储的\
  \ MIDlet 的作者必须公开记录存储中记录的格式（理想情况下通过一个客户端应用程序可以直接用来访问存储的类），以及创建该记录存储的 MIDlet 所使用的供应商名称和\
  \ MIDlet 套件名称。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 6 章 ■ 使用记录存储存储数据\n\
  \n**137**\n\n*   创建记录存储的 MIDlet 套件之外的其它 MIDlet 必须使用 `RecordStore.openRecordStore`\
  \ 打开该存储，并传入记录存储的名称、创建该存储的 MIDlet 套件供应商的名称以及最初创建该存储的 MIDlet 套件的名称。\n\n当您完成对记录存储的操作后，必须关闭它，以向底层\
  \ MIDP 实现发出信号，表明您已用完该记录存储所占用的资源。您可以通过在打开记录存储时获得的实例上调用 `closeRecordStore` 方法来执行此操作。\n\
  \n**删除记录存储**\n\n虽然 MIDP 会在删除 MIDlet 套件时删除与该套件关联的记录存储，但有时您希望自己删除一个记录存储。您可以通过调用 `RecordStore.deleteRecordStore`\
  \ 方法来执行此操作，该方法需要传入要删除的记录存储的名称。该记录存储必须由发出请求的 MIDlet 所属的 MIDlet 套件拥有，如果存储处于打开状态或发生任何其他错误，它可能会抛出异常。它可能抛出以下异常：\n\
  \n*   `RecordStoreException`：当删除记录存储时发生一般性错误，例如记录存储仍处于打开状态。\n*   `RecordStoreNotFoundException`：如果找不到您指定的记录存储。\n\
  \n正如您将在下一节“访问记录存储中的记录”中学到的，您可以监听记录存储的更改，从而在发生更改时让记录存储调用一个方法。但是，您应该注意，当您删除记录存储时，记录存储不会调用您提供的方法；在删除记录存储时，该存储及其记录将被不可恢复地删除，并且系统不会调用任何监听器。\n\
  \n**获取关于记录存储的信息**\n\n虽然您无法了解记录存储的底层实现细节，但*确实*有一些关于特定记录存储的详细信息您可以访问。当然，您通常知道您正在使用的记录存储的*名称*。一个对其数据采用面向文档方法的应用程序——例如，一个跟踪费用报告的应用程序——可能会选择将每个文档表示为一个记录或一个记录存储。如果是后者，那么用户可能负责命名记录存储，例如“伦敦销售之旅”或“Sun\
  \ JavaOne 之旅”。当然，一旦您向用户命名的记录存储敞开了大门，您就需要一种方法来确定*存在哪些*记录存储；您可以使用 `RecordStore.listRecordStores`\
  \ 方法来做到这一点，该方法返回一个 `String` 对象数组，每个对象包含属于该 MIDlet 套件的特定记录存储的名称。如果该套件的 MIDlet 尚未创建任何应用程序，此方法将返回\
  \ null。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**138**\n\n第 6 章\
  \ ■ 使用记录存储存储数据\n\n对于给定的记录存储，您可以使用其 `getLastModified` 方法确定该存储的最后修改时间，该方法返回自系统纪元开始（例如，1970\
  \ 年 1 月 1 日）以来的毫秒数。您可以反过来使用此时间与 `java.util.Date` 和 `java.util.Calendar` 中的工具来操作结果，以及使用\
  \ `javax.microedition.lcdui.DateField` 来显示结果。您可以获取的其他详细信息包括存储的大小（以字节为单位），由 `getSize`\
  \ 方法返回，以及记录数，通过 `getNumRecords` 方法获取。\n\n\n\n所有这些操作都可能抛出 `RecordStoreNotOpen` 异常，表明在获取此信息之前必须先打开记录存储。\n\
  \n最后，记录存储支持版本控制的概念，但这并非你可能预期的那种版本控制。记录存储的版本号并不表示在更改记录格式或访问记录存储的应用程序时应用的某种规范版本；相反，它是一个单调递增的数字，表示通过\
  \ `addRecord`、`setRecord` 和 `deleteRecord` 方法进行的更改次数。存储的初始版本是特定于实现的值，因此虽然你不能使用存储的版本来统计更改次数，但你可以用它来快速查看存储，判断自上次访问其内容以来是否发生了变化。这在多个应用程序之间共享记录存储时会非常有用。\n\
  \n**访问记录存储中的记录**\n\n如图 6-1 所示，记录存储中记录的组织形式是自由格式的。\n\n与可以定义主键并在特定字段上进行搜索的数据库不同，在记录存储中，最接近主键的是记录的索引。在特定记录存储中创建的第一条记录，其记录\
  \ ID 始终为 1；后续记录会被分配一个比前一条记录大 1 的记录 ID。正如我在上一节中指出的，删除记录并不会回收其记录 ID。例如，考虑以下事件序列：\n\
  \n**1.** 一个 MIDlet 创建了一个新的记录存储，名为 `SampleRecordStore`。\n\n**2.** 该 MIDlet 向记录存储中添加了一条记录。其\
  \ ID 为 1。\n\n**3.** 该 MIDlet 又添加了两条记录。这些记录的 ID 分别为 2 和 3。\n\n**4.** 该 MIDlet 现在删除了记录\
  \ 2。\n\n**5.** 该 MIDlet 添加了另一条记录。这条记录的 ID 值为 4。\n\n经过这一系列事件后，记录存储中将有三条记录，其 ID 分别为\
  \ 1、3 和 4。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 6 章 ■ 使用记录存储存储数据\n\
  \n**139**\n\n记录本身只是一个字节包。好消息是，你可以自由地在记录上实现任何你认为合适的结构；坏消息是，你需要自行定义一种既能支持应用程序又能良好扩展的结构。MIDP\
  \ 实现缺少 `java.io.Serializable` 中的序列化支持，这意味着你需要实现自己的序列化。（`java.io.Serializable` 定义的接口实际上也不完全符合记录存储中记录的概念，因为没有更低层的过滤流来辅助序列化，而且记录序列化的目标是将数据序列化为一个字节包，而不是输出流。）\n\
  \n这意味着你需要熟悉 Java 流，特别是 `java.io.ByteArrayInputStream`、`java.io.ByteArrayOutputStream`、`java.io.DataInputStream`\
  \ 和 `java.io.DataOutputStream` 类。这个过程并不像初看起来那么令人生畏。\n\n要保存一条记录，首先需要创建一个 `DataOutputStream`\
  \ 和一个 `ByteArrayOutputStream`，如清单 6-1 所示。\n\n**清单 6-1.** *创建 DataOutputStream 和\
  \ ByteArrayOutputStream*\n```java\nByteArrayOutputStream baos = new ByteArrayOutputStream();\n\
  DataOutputStream dos = new DataOutputStream(baos);\n```\n\n接下来，使用以下一个或多个方法将记录的字段写入\
  \ `DataOutputStream`：\n\n*   `write`：接收一个字节数组、一个偏移量和要写入的字节数，并将这些字节写入流\n*   `writeBoolean`：将一个布尔值写入流\n\
  *   `writeByte`：将一个单字节写入流\n*   `writeChar`：将一个字符作为双字节值写入流，高位字节在前\n*   `writeChars`：将一个字符串作为字符序列写入\n\
  *   `writeDouble`：使用 `doubleToLongBits` 将 double 转换为 long，并将该 long 作为八字节值写入流\n*\
  \   `writeFloat`：使用 `floatToIntBits` 将 float 转换为 int，并将该 int 作为四字节值写入流\n\n\n\n•\
  \ writeInt：以高位字节在前的顺序写入一个整数\n• writeLong：以高位字节在前的顺序写入一个长整数\n• writeShort：以高位字节在前的顺序写入一个短整数\n\
  • writeUTF：使用 Java 修改版 UTF-8 编码（以机器相关的方式）写入一个字符串\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**140**\n\n第 6 章 ■ 使用记录存储存储数据\n\n写入记录字段后，你可以通过调用 `ByteArrayOutputStream` 的 `toByteArray`\
  \ 实例方法来获取字节数组，如清单 6-2 所示。\n\n**清单 6-2.** *调用 toByteArray 实例方法*\ndos.writeUTF(record);\n\
  \nbyte[] bytes = baos.toByteArray();\n\n有了字节数组后，你可以使用 `addStore` 方法将其添加到存储中，我将在本章后面的“添加记录”部分向你展示具体做法。当然，在处理完这三个对象（字节数组\
  \ bytes、`ByteArrayOutputStream` 实例和 `DataOutputStream` 实例）后，最好将它们置空，以告知垃圾回收器它们占用的内存可以被释放。这在堆空间较小的旧设备上尤其有用。\n\
  \n毫不意外，反序列化是序列化的逆过程。首先，从记录中的字节创建 `ByteArrayInputStream` 和 `DataInputStream` 的实例，如清单\
  \ 6-3 所示。\n\n**清单 6-3.** *创建 ByteArrayInputStream 和 DataInputStream*\nByteArrayInputStream\
  \ bais = new ByteArrayInputStream(bytes);\nDataInputStream dis = new DataInputStream(bais);\n\
  \n接下来，你可以依次使用 `DataInputStream` 中的以下方法，从记录中读取之前写入的数据：\n\n• read：从流中读取一个字节数组\n• readBoolean：从流中读取一个布尔值\n\
  • readByte：从流中读取单个字节\n• readChar：从流中读取一个字符，作为双字节值，高位字节在前\n• readChars：读取一个字符串，作为字符序列\n\
  • readDouble：从流中读取一个长整数，作为八字节值，并将该长整数转换为双精度浮点数\n• readFloat：从流中读取一个整数，作为四字节值，并将该整数转换为单精度浮点数\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 6 章 ■ 使用记录存储存储数据\n\n**141**\n\
  \n• readInt：以高位字节在前的顺序读取一个整数\n• readLong：以高位字节在前的顺序读取一个长整数\n• readShort：以高位字节在前的顺序读取一个短整数\n\
  • readUTF：使用 Java 修改版 UTF-8 编码（以机器相关的方式）读取一个字符串\n\n当然，你必须按照最初写入字段的相同顺序来读取它们。\n\n\
  最后，你可以使用对象的构造函数，或任何其他你选择用来在内存中表示数据的数据结构，将这些字段处理成一个新对象。与写入时一样，最好将字节数组 bytes、`ByteArrayInputStream`\
  \ 实例和 `DataInputStream` 实例的引用置空。\n\n当然，如果你的应用程序需要，你可以采用更复杂的方法。\n\n一种常见模式是为写入的每个字段打上一个标识该字段的*字段类型*标签，这样你的\
  \ MIDlet 就可以按任意顺序读取字段。我将在本章最后一节向你展示如何做到这一点。\n\n**添加记录**\n\n一旦你有了想要存储为记录的字节数组，创建新记录就像调用打开的记录存储的\
  \ `addRecord` 方法一样简单。该方法接受三个参数：\n\n• 包含记录数据的字节数组\n• 数据数组中记录第一个字节的偏移量\n• 构成记录的字节数组中的字节数\n\
  \n这种方法——不仅传递一个字节包，还传递该包内的偏移量以及构成记录的字节数——允许你在必要时在一个缓冲区中构建多条记录，并有助于减少平台内存管理器的抖动。\n\
  \n`addRecord` 方法可能抛出以下异常之一：\n\n• `RecordStoreNotOpenException`：表示要添加记录的目标记录存储未打开\n\
  • `RecordStoreFullException`：表示记录存储或底层介质没有更多空间来完成操作\n• `RecordStoreException`：表示与打开的记录存储相关的一般性故障\n\
  • `SecurityException`：表示 MIDlet 未被授权写入记录存储\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**142**\n\n第 6 章 ■ 使用记录存储存储数据\n\n对于极度好奇的人——或者如果你出于某种原因（例如链接两个不同记录存储中的记录）正在跟踪记录\
  \ ID——你可以使用打开的存储的 `getNextRecordID` 方法获取下一个要分配的记录 ID。这可能会抛出以下异常之一：\n\n• `RecordStoreNotOpenException`：表示要添加记录的目标记录存储未打开\n\
  • `RecordStoreException`：表示与打开的记录存储相关的一般性故障\n\n当然，这不是原子操作：无法保证如果你调用此方法、做一些处理、然后插入一条记录，插入记录的\
  \ ID 实际上*会具有*这个 ID，因为平台是多线程的，并且你的应用程序中的另一个线程可能正在使用该存储！因此，如果你使用此接口，你需要自行管理跨 ID 的线程争用。\n\
  \n**检索记录**\n\n从根本上说，有两种检索记录的方法：按 ID 检索，或枚举存储中的所有记录。如果你知道记录的 ID，可以直接使用打开的记录存储的 `getRecord`\
  \ 方法并传入记录 ID 来获取它。该方法将记录作为字节数组返回。当然，此方法可能会失败；失败时会抛出以下异常之一：\n\n• `RecordStoreNotOpenException`：表示要添加记录的目标记录存储未打开\n\
  • `InvalidRecordIDException`：表示记录 ID 无效\n• `RecordStoreException`：表示与打开的记录存储相关的一般性故障\n\
  \n一旦你获得了构成记录的字节，就需要自行从这些字节中反序列化记录；正如我在本节开头所述，你可能会使用 `ByteArrayInputStream` 和 `DataInputStream`\
  \ 类来完成此操作。\n\n**枚举记录**\n\n通常，当你想要获取记录时，并不知道其 ID。这可能是因为你正在显示一个记录列表（例如天气应用程序的位置列表，或费用报告中的费用列表），或者因为你的记录结构不需要任何形式的连贯索引。在这种情况下，你需要一个枚举器，MIDP\
  \ 记录存储通过其 `enumerateRecords` 方法为你提供了支持。`enumerateRecords` 方法接受三个参数：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 6 章 ■ 使用记录存储存储数据\n\n**143**\n\n• `RecordFilter`：一个实例负责选择哪些记录应包含在枚举中。\n• `RecordComparator`：一个实例负责比较两条记录；记录存储枚举器使用它来确定返回记录的排序顺序。\n\
  • `boolean`：当为 true 时，布尔值表示枚举器在枚举期间应保持对记录存储中任何更改的实时更新。\n\n该方法返回一个 `RecordEnumeration`\
  \ 实例，你可以对其重复调用 `nextRecord` 以获取后续记录，这些记录按照你提供的 `RecordComparator`（如果有）所决定的顺序排序。你还可以调用\
  \ `previousRecord` 来获取 `nextRecord` 先前返回的记录（或者如果你尚未使用 `nextRecord` 获取任何记录，则获取枚举的最后一条记录）。\n\
  \n\n\n您的记录过滤器必须匹配的 RecordFilter 接口包含一个单一方法 match，该方法接受一个字节数组（来自记录存储的序列化形式记录），如果记录符合您定义的条件则返回\
  \ true。RecordComparator 接口定义了 compare 方法，该方法接受两个字节数组（每个都是来自记录存储的序列化形式记录），并根据第一个记录与第二个记录是相等、在后还是在先，返回\
  \ RecordComparator.EQUIVALENT、RecordComparator.FOLLOWS 或 RecordComparator.PRECEDES\
  \ 之一。清单 6-4 展示了一个纯虚构的示例。\n\n**清单 6-4.** *使用枚举过滤记录存储条目* RecordStore rs = RecordStore.openRecordStore(\
  \ store, true ); RecordEnumeration re = rs.enumerateRecords(\n\nnew RecordFilter()\
  \ {\n\npublic boolean\n\nmatch(byte[] r) {\n\nreturn true;\n\n}\n\n},\n\nnew RecordComparator()\
  \ {\n\npublic int compare( byte[] r1\\. byte[] r2) {\n\nreturn RecordComparator.EQUIVALENT;\n\
  \n}, false);\n\n凭直觉可知，如果顺序不重要，这*并非*遍历所有记录的最佳方式。相反，enumerateRecords 最高效的用法是在不指定过滤器或比较器的情况下调用它（只需传递\
  \ null）。这会返回一个枚举，该枚举以未定义的顺序返回存储中的每个元素。如果您需要按特定顺序访问存储中的所有记录，请指定比较函数但不指定过滤器；如果您想根据某些条件进行过滤但顺序不重要，请指定记录过滤器但不指定记录比较器。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**144**\n\n第 6 章 ■ 使用记录存储存储数据\n\
  \n如果在调用 enumerateRecords 方法之前已关闭记录存储，该方法可能会抛出 RecordStoreNotOpenException。\n\n**更新记录**\n\
  \n要更新记录存储中的记录，您必须拥有其 ID。有了 ID 后，您可以使用记录存储的 setRecord 方法为记录设置新内容，就像添加记录一样。该方法接受四个参数：\n\
  \n*   要修改的记录的 ID\n*   用于提取记录的字节数组\n*   数组中的偏移量，指示记录的第一个字节\n*   构成记录的字节数（从指定的偏移量开始计数）\n\
  \n与其他记录操作一样，此方法可能会抛出异常，包括以下任何一种：\n\n*   RecordStoreNotOpenException：指示要添加记录的目标记录存储未打开\n\
  *   InvalidRecordIDException：指示记录 ID 无效\n*   RecordStoreFullException：指示由于记录存储或其底层介质已满，无法完成操作\n\
  *   RecordStoreException：指示与打开的记录存储相关的一般性故障\n*   SecurityException：指示 MIDlet 无权写入记录存储。\n\
  \n**删除记录**\n\n要从记录存储中删除记录，只需调用 deleteRecord，并传入要删除记录的记录 ID。如果发生错误，此方法会抛出以下异常之一：\n\
  \n*   RecordStoreNotOpenException：指示要添加记录的目标记录存储未打开\n*   InvalidRecordIDException：指示记录\
  \ ID 无效\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 6 章 ■ 使用记录存储存储数据\n\
  \n**145**\n\n*   SecurityException：指示由于 MIDlet 对记录存储只有只读访问权限，无法完成操作\n*   RecordStoreException：指示与打开的记录存储相关的一般性故障\n\
  \n接口名称中的 *delete* 一词有点用词不当。您无法控制记录存储如何管理删除操作；记录存储压缩可能在删除操作时发生，也可能不发生。此外，该接口*不会*回收分配给已删除记录的\
  \ ID；一旦记录被删除，该 ID 仍保持已使用状态。查询该 ID 会返回空记录或指示无效记录 ID 的异常。\n\n**统计记录数**\n\n如果您准备预处理大量记录，您可能想知道记录存储中有多少条记录。当然，您可以通过枚举和计数器来实现，但有一种更简单的方法：只需在打开的记录存储上调用\
  \ getNumRecords。它要么返回一个整数，指示记录存储中当前的记录数，要么在记录存储未打开时抛出 RecordStoreNotOpenException。\n\
  \n**监听记录存储更改**\n\n有时，您可能希望一个应用程序响应另一个应用程序的更改。记录存储的 addRecordListener 和 removeRecordListener\
  \ 方法正是为此而设计，分别允许您在打开的记录存储上注册一个实现 RecordListener 接口的监听器，以及注销一个监听器。添加后，每当添加、更改或删除记录时，记录监听器会收到以下方法调用：\n\
  \n*   recordAdded：系统在添加记录时调用此方法。\n*   recordChanged：系统在更改记录时调用此方法。\n*   recordDeleted：系统在删除记录时调用此方法。\n\
  \n这三个方法都接受两个参数：存储该记录的记录存储的引用，以及正在添加、更改或删除的记录的记录 ID。\n\n**理解记录存储的平台限制**\n\n对于能够支持\
  \ Java ME 的各种移动设备而言，记录存储是一个不错的折衷方案。然而，它们并非完美无缺——或者更确切地说，随着您使用它们，您会发现它们在不同设备上的实现可能远非完美。如果您要将\
  \ Java ME 应用程序部署到许多设备上运行，您很可能会遇到两个陷阱。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**146**\n\n第 6 章 ■ 使用记录存储存储数据\n\n首先也是最重要的，设备拥有一定量的可用存储空间并*不能*保证您的 MIDlet 可以使用那么多存储空间。设备的软件（包括\
  \ Java 应用程序和本机应用程序，如消息、联系人/个人信息管理、网络浏览器等）共享持久存储，因此 Java ME 世界只能获得持久存储的一个子集来存储其数据。设备如何处理管理存储限制因设备而异，因为某些设备可能实现每个\
  \ MIDlet 的限制，而其他设备可能给 Java AMS 一个私有的持久存储块来工作。更糟糕的是，调用 RecordStore 的 getSizeAvailable\
  \ 方法会导致 RecordStore 在不同设备上表现不同；某些设备可能报告当前分配的记录存储中剩余的总空间量，而其他设备可能报告*所有* Java ME 记录存储的持久存储中剩余的总空间量。\n\
  \n第二个常见限制是单个记录的大小限制；这通常源于给定记录存储的底层实现。在某些设备上，写入超过某个任意最大大小的记录会直接失败并抛出异常，即使存储中有空间容纳该记录。更糟糕的是，您无法提前预测这一点：无法确定特定手机是否存在此限制，也无法查询记录存储实现以确定此上限是多少。\n\
  \n为避免这种情况，请尽量保持记录简短，如果遇到此问题，请将记录拆分成更小的子记录并单独写入，在从记录存储读取时再将它们重新链接起来。\n\n**让记录存储发挥作用**\n\
  \nWeatherWidget 示例需要存储您输入的位置列表以及每个位置的预报数据，这样您在选取位置时就不必访问网络。MIDP 记录存储非常适合此目的。\n\n\
  WeatherW\n\n\n\nidget 将其对记录存储的使用分为两个类：`Location` 类，表示加载到内存后的存储记录；以及 `LocationStore`\
  \ 类，它通过更友好的方法封装存储，以适配应用程序本身。清单 6-5 展示了 `Location` 类，该类负责存储位置及其天气预报。\n\n**清单 6-5.**\
  \ *Location 类的实现* package com.apress.rischpater.weatherwidget;\n\nimport javax.microedition.rms.*;\n\
  \nimport java.io.*;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 6 章\
  \ ■ 使用记录存储存储数据\n\n**147**\n\npublic class Location {\n\nprivate final static int\
  \ FIELD_VERSION = 1;\n\nprivate final static int FIELD_LOCATION = 2;\n\nprivate\
  \ final static int FIELD_FORECAST = 3;\n\npublic final static int NO_ID = -1;\n\n\
  private final static int version = 1;\n\nprivate String location;\n\nprivate String\
  \ forecast;\n\nprivate int recordId;\n\n/** 创建 Location 的新实例 */\n\npublic Location(String\
  \ l, String f) {\n\nlocation = l;\n\nforecast = f;\n\nrecordId = NO_ID;\n\n}\n\n\
  public Location(byte[] b) {\n\nfromBytes(b);\n\nrecordId = NO_ID;\n\n}\n\npublic\
  \ Location(byte[] b, int id) {\n\nfromBytes(b);\n\nrecordId = id;\n\n}\n\npublic\
  \ String getLocation() {\n\nif (location != null) {\n\nreturn location;\n\n} else\
  \ {\n\nreturn \"\";\n\n}\n\n}\n\npublic void setLocation(String l) {\n\nlocation\
  \ = l;\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**148**\n\n第\
  \ 6 章 ■ 使用记录存储存储数据\n\npublic String getForecast() {\n\nif (forecast != null) {\n\
  \nreturn forecast;\n\n} else {\n\nreturn \"\";\n\n}\n\n}\n\npublic void setForecast(String\
  \ f) {\n\nforecast = f;\n\n}\n\npublic int getId() {\n\nreturn recordId;\n\n}\n\n\
  public void setId(int id) {\n\nrecordId = id;\n\n}\n\npublic byte[] toBytes() {\n\
  \nbyte[] b;\n\nByteArrayOutputStream baos = new ByteArrayOutputStream(); DataOutputStream\
  \ dos = new DataOutputStream(baos);\n\n// 记录格式为：字段标签，后跟字段\n\ntry {\n\ndos.writeInt(FIELD_VERSION);\n\
  \ndos.writeInt(version);\n\nif (location != null) {\n\ndos.writeInt(FIELD_LOCATION);\n\
  \ndos.writeUTF(getLocation());\n\n}\n\nif (forecast != null)\n\n{\n\ndos.writeInt(FIELD_FORECAST);\n\
  \ndos.writeUTF(getForecast());\n\n}\n\n}\n\ncatch( Exception e) {\n\nreturn null;\n\
  \n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 6 章 ■ 使用记录存储存储数据\n\n\
  **149**\n\n// 获取此项的字节。\n\nb = baos.toByteArray();\n\ndos = null;\n\nbaos = null;\n\
  \nreturn b;\n\n}\n\npublic void fromBytes(byte[] b) {\n\nByteArrayInputStream bais\
  \ = new ByteArrayInputStream(b); DataInputStream dis = new DataInputStream(bais);\n\
  \n// 读取每个标签，然后读取每个字段\n\ntry\n\n{\n\nwhile(true) {\n\nint tag = dis.readInt();\n\n\
  switch(tag) {\n\ncase FIELD_VERSION:\n\n// 不检查版本；只有一个版本\n\ndis.readInt();\n\nbreak;\n\
  \ncase FIELD_LOCATION:\n\nsetLocation(dis.readUTF());\n\nbreak;\n\ncase FIELD_FORECAST:\n\
  \nsetForecast(dis.readUTF());\n\nbreak;\n\n}\n\n}\n\n}\n\ncatch (Exception e) {}\n\
  \ndis = null;\n\nbais = null;\n\n}\n\n}\n\n内存中的位置实际上有三个字段，其中两个对其客户端可见：\n\n• location：一个文本字符串，表示天气预报对应的位置\n\
  • forecast：一个文本字符串，表示该位置的天气情况\n• recordId：一个整数，表示记录存储中的记录 ID（如果有），或者值为 `NO_ID`，表示该记录尚未存储到记录存储中\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**150**\n\n第 6 章 ■ 使用记录存储存储数据\n\
  \n该类为这三个公共字段提供了访问器和修改器，并私有地维护一个常量字段——记录的版本号——该字段随每条记录写入存储。为每条记录附加版本号，使您能够更改记录存储的实现，而无需销毁现有记录；新代码可以检查每条记录的版本，选择适当的代码加载记录，然后以新格式重新保存记录。\n\
  \n`Location` 类实现中的大部分方法都是针对每个公共字段的 getter 和 setter。最有趣的是 `toBytes` 和 `fromBytes`\
  \ 方法，它们分别将记录序列化为字节数组和从字节数组反序列化记录。\n\n\n\n尽管记录格式不太可能需要大量修改，但你仍可以选择使用前面描述的记录标签方法。`toBytes`\
  \ 方法就是这种方法的一个示例，它执行以下步骤序列：\n\n**1.** 写入一个标签，指示字段版本紧随该标签之后。\n\n**2.** 写入记录版本。\n\n\
  **3.** 如果有字段需要写入，则写入一个标签，指示位置字段紧随该标签之后，随后写入位置字段的内容。\n\n**4.** 如果有字段需要写入，则写入一个标签，指示预报字段紧随该标签之后，随后写入预报字段的内容。\n\
  \n`fromBytes` 方法的工作方式则相反，但它使用了一个 `while` 循环和 `switch-case` 语句，以便能够以任意顺序读取记录中的字段。\n\
  \n如清单 6-6 所示，`LocationStore` 接口为记录存储提供了一个代理，使得获取位置列表以及某个位置的预报变得容易。它并没有完全抽象化记录存储接口——值得注意的是，当底层存储出现问题时，它会抛出\
  \ `RecordStoreException`——但它让你能够以应用程序所使用的方式来思考访问位置的问题，而不仅仅是将其视为存储中的记录。\n\n**清单 6-6.**\
