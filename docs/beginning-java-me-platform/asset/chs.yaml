  UDPDatagramConnection\n\n否\n\n✓\n\nGCF 并非完美：批评者可以合理地指出，Connection 类在将常见通信操作抽象为抽象方法方面做得还不够，以至于许多概念上相似的操作（例如向远程主机发送数据报或向智能卡发送协议数据单元）在\
  \ Connection 类的不同子类中具有截然不同的接口语义。这很不幸，因为它使得学习通过可选包提供的各种通信选项变得更加困难，并且使得在不使用适配器类的情况下，采用面向组件的方法来开发通信应用程序变得不可能。\n\
