  \n第 3 章 ■ 开始使用 NETBEANS IDE\n\n**71**\n\n对于这些类中的每一个，大部分实现都在 `initComponents` 方法中，该方法负责创建各种用户界面控件并将它们放置在布局中。幸运的是，所有这些代码都是自动生成的，因此您无需在此处详细了解。\n\
  \n`WeatherApplet` 应用程序本身是一个 Xlet，类似于 MIDlet。与 MIDlet 一样，Xlet 具有定义良好的生命周期，应用程序可以在其中经历五个状态，如图\
  \ 3-16 所示。NetBeans 生成的代码包括实现状态转换的 Xlet 方法的参考实现，从而在您初次启动时无需编写任何代码。您将在第 9 章中全面了解 Xlet。\n\
  \n**图 3-16.** *Xlet 的生命周期*\n\n在 `SettingPanel` 类中连接“返回”按钮更为棘手；为此，需要创建一个控制器，负责管理用户界面不同面板之间的转换。该控制器负责在响应按钮点击时隐藏和显示每个表单；“设置”按钮和“返回”按钮都将屏幕\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**72**\n\n第 3 章 ■ 开始使用 NETBEANS\
  \ IDE\n\n转换委托给控制器。要创建控制器类并将其连接到按钮，请执行以下步骤：\n\n**1.** 将 Java 类 `WeatherController`\
  \ 添加到包中（右键单击“源包”项，然后选择“新建”➤“Java 类”）。将其内容修改为如清单 3-7 所示。同时，您还应该更改包名称。\n\n**清单 3-7.**\
