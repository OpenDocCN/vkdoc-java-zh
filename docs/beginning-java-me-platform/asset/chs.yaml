  \nbyte[] data = null;\n\nif (length != -1) {\n\ndata = new byte[length];\n\nin.readFully(data);\n\
  \n}\n\nelse {\n\nint chunkSize = 512;\n\nint index = 0;\n\nint readLength = 0;\n\
  \ndata = new byte[chunkSize];\n\ndo {\n\nif (data.length < index + chunkSize) {\n\
  \nbyte[] newData = new byte[index + chunkSize];\n\nSystem.arraycopy(data, 0, newData,\
  \ 0, data.length);\n\ndata = newData;\n\n}\n\nreadLength = in.read(data, index,\
  \ chunkSize);\n\nindex += readLength;\n\n} while\n\n(readLength == chunkSize);\n\
  \nlength = index;\n\n}\n\nImage image = Image.createImage(data, 0, length);\n\n\
  …\n\n}\n\ncatch (Exception e) {...}\n\nfinally {\n\ntry {\n\nif (in != null) in.close();\n\
  \n}\n\ncatch (IOException ioe) {}\n\n}\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 12 章 ■ 访问网络上的远程数据\n\n**311**\n\n\n\n`ContentConnection` 类继承自 `StreamConnection`，并提供了三个新方法：`getEncoding`、`getLength`\
  \ 和 `getType`。本示例使用 `getLength` 方法来确定远程服务器返回的字节数；但遗憾的是，无法保证服务器一定会报告此信息。因此，本示例会测试返回的内容长度；如果该值为\
  \ `undefined`，代码将以 512 字节的块为单位读取数据。无论哪种情况，代码都会使用返回的数据创建一个新图像，并关闭输入流和 `ContentConnection`。此代码封装在一个可运行的方法\
  \ `run` 中，因为在实际应用中，你很可能需要为所有 I/O 操作使用线程。\n\n（我在“将 HTTP 付诸实践”一节中向你展示了一个具体示例，其中详细介绍了使用\
  \ HTTP 的完整应用程序。）\n\n`ContentConnection` 类是对 HTTP 提供的元数据类型的高级抽象，它只允许你获取远程内容。使用 `ContentConnection`\
  \ 时，你在使用 `Connector` 类创建连接时指定一个远程资源。在底层，平台使用 HTTP GET 方法以及你在请求用于读取远程资源的 `DataInputStream`\
  \ 时指定的连接来发起所需的请求，这使你无法控制 HTTP 请求本身的语义。一旦平台完成请求，你只能了解关于响应的三件事：响应的编码方式（使用 `getEncoding`\
  \ 方法）、返回的字节数（使用 `getLength` 方法）以及响应的多用途互联网邮件扩展（MIME）类型（使用 `getType` 方法）。\n\n■**注意**\
  \ 内容类型和关于响应的其他信息仅在服务器提供时才可用；你的应用程序必须准备好处理服务器不返回此信息的可能性（除非你也能控制服务器实现，即便如此，你也需要处理因缺少此元数据而在应用程序中出现的任何错误）。\n\
  \n由于 `ContentConnection` 是一个如此简单的接口，当你的应用程序只需要获取远程资源的内容时，它是理想的选择。然而，对于更复杂的 HTTP\
  \ 使用场景，它却远远不够，因为它既无法访问伴随 HTTP 请求和响应的大部分元数据，也无法让你指定 HTTP 在发起请求时调用的方法。要更精细地访问 HTTP\
  \ 协议，你需要使用 `HttpConnection` 类的实例——该类继承自 `ContentConnection`。（实际上，当你对带有 `http` 方案的\
  \ URL 调用 `Connector.open` 时，返回的实例是 `HttpConnection`，而不是清单 12-8 中代码所暗示的 `ContentConnection`。）\n\
  \n反映与远程 HTTP 服务器的底层连接，`HttpConnection` 实例可以处于以下三种状态之一：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**312**\n\n第 12 章 ■ 访问网络上的远程数据\n\n• **设置**：你可以设置请求参数，包括方法。\n\n• **已连接**：请求方法和参数已发送，并正在请求响应。\n\
  \n• **已关闭**：HTTP 连接已终止。\n\n与其他类型的连接不同，你需要知道 `HttpConnection` 处于何种状态，因为某些方法只有在连接处于适当状态时才能工作。例如，一旦连接处于已连接状态，你就无法设置连接应使用的方法类型，因为连接已经发送了请求。当你调用任何需要连接交换数据的方法（例如打开用于读取或写入连接的流）时，就会发生从设置状态到已连接状态的转换。\n\
  \n当连接处于设置状态时，你可以使用连接的 `setRequestMethod` 方法设置请求方法，并传入 `HttpConnection.GET`、`HttpConnection.POST`\
  \ 或 `HttpConnection.HEAD` 之一。你还可以为请求指定任意的请求头，例如提供的 MIME 内容类型。你可以使用连接的 `setRequestProperty`\
  \ 方法，将请求头的名称和值作为字符串传入，如下所示：\n\n```java\nhc.setRequestProperty(\"Content-Type\",\
  \ \"application/x-urlformencoded\");\n```\n\n许多 `HttpConnection` 方法与 HTTP 响应头有直接的对应关系，包括以下方法：\n\
  \n*   `getDate`：返回 `Date` 头的值，以自纪元开始以来的秒数表示\n*   `getExpiration`：返回资源何时过期，由 `Expires`\
  \ 头指示，以自纪元开始以来的秒数表示\n*   `getLastModified`：返回资源最后修改的时间，由 `Last-Modified` 头指示，以自纪元开始以来的秒数表示\n\
  *   `getResponseCode`：返回三位数的 HTTP 响应码\n*   `getResponseMessage`：返回 HTTP 响应消息（如果有）\n\
  *   `getHeaderField`：按名称返回特定 HTTP 头的值\n\n你还可以通过传递一个整数，使用 `getHeaderField` 和 `getHeaderFieldKey`\
  \ 方法来枚举所有响应头；它们将响应头块视为单个数组，返回第 *n* 个头的值和名称。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 12 章 ■ 访问网络上的远程数据\n\n**313**\n\n`HttpConnection` 类还包含一些用于检查 URL 的实用函数。这些实用函数允许你确定\
  \ GCF 创建 `HttpConnection` 实例时 URL 包含的方案、主机名、端口和文件。这些 `HttpConnection` 方法包括 `getProtocol`、`getHost`、`getPort`\
  \ 和 `getFile`。你还可以通过调用其 `getURL` 方法来确定特定 `HttpConnection` 引用的 URL。\n\n需要使用 `HttpConnection`\
  \ 而非 `ContentConnection` 的最常见原因可能是需要提交数据进行处理，例如将用户输入提交给 Web 服务。这可能涉及使用 HTTP POST\
  \ 方法而不是 GET。你使用 `HttpConnection` 并获取其 `OutputStream`，以便将数据写入服务器，如清单 12-9 所示。\n\n\
  **清单 12-9.** *向服务器发送数据*\n\n```java\nvoid run() throws IOException {\n\n    String\
  \ url = \"http://www.noplace.com/do\";\n\n    HttpConnection hc = null;\n\n    DataInputStream\
  \ is = null;\n\n    OutputStream os = null;\n\n    int rc;\n\n    try {\n\n    \
  \    hc = (HttpConnection)Connector.open(url);\n\n        hc.setRequestMethod(HttpConnection.POST);\n\
  \n        hc.setRequestProperty(\"Content-Type\",\n\n                \"application/x-urlformencoded\"\
  );\n\n        os = hc.openOutputStream();\n\n        os.write(\"name=value\\n\"\
  .getBytes());\n\n        rc = hc.getResponseCode();\n\n        if (rc != HttpConnection.HTTP_OK)\
  \ {\n\n            throw new IOException(\"HTTP response code: \" + rc);\n\n   \
  \     }\n\n        is = hc.openInputStream();\n\n        int length = (int)hc.getLength();\n\
  \n        byte[] data = null;\n\n        if (length != -1) {\n\n            data\
  \ = new byte[length];\n\n            is.readFully(data);\n\n        }\n\n      \
  \  else {\n\n            int chunkSize = 512;\n\n            int index = 0;\n\n\
  \            int readLength = 0;\n\n            data = new byte[chunkSize];\n\n\
  \            do {\n\n                if (data.length < index + chunkSize) {\n\n\
  \                    byte[] newData = new byte[index + chunkSize];\n\n         \
  \           System.arraycopy(data, 0, newData, 0, data.length);\n\n            \
  \        data = newData;\n\n                }\n\n                readLength = is.read(data,\
  \ index, chunkSize);\n\n                index += readLength;\n\n            } while\
  \ (readLength == chunkSize);\n\n            length = index;\n\n        }\n\n   \
  \     …\n\n    } catch (Exception e) {…}\n\n    finally {\n\n        try {\n\n \
  \           if (is != null) is.close();\n\n            if (os != null) os.close();\n\
  \n            if (hc != null) hc.close();\n\n        }\n\n        catch (Exception\
  \ e) {…}\n\n    }\n\n}\n```\n\n使用 GCF 的设置完全相同；唯一的区别是，这次代码将结果强制转换为 `HttpConnection`。然后，代码将请求方法设置为\
  \ `POST`。\n\n\n\n使用 `setRequestMethod` 方法，它会向请求中添加一个描述内容类型的额外标头。在大多数实现中，为请求获取输出流的过程会导致\
  \ `HttpConnection` 从设置状态转移到已连接状态；此时远程服务器正在等待应用程序写入 POST 请求的对象体。\n\n代码首先通过 `openOutputStream`\
  \ 获取连接上的输出流，然后写入一个简单的表单编码名称-值对。即使实现缓冲了你使用 `HttpConnection` 实例和 `OutputStream` 准备的标头和对象体，当你调用\
  \ `getResponseCode` 时，`HttpConnection` *必须*打开连接、发送请求并读取 HTTP 响应标头。\n\n此时，连接肯定处于已连接状态，你可以使用诸如\
  \ `getLength` 之类的连接方法来获取结果信息，就像这段代码用来确定结果对象体长度一样。代码的其余部分与\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 12 章 ■ 访问网络上的远程数据\n\n**315**\n\n使用 `ContentConnection` 和 `InputStream` 从服务器读取结果相同，在代码完成从流中读取后关闭流和连接。\n\
  \n**将 HTTP 付诸实践**\n\n使用 GCF 连接远程资源在理论上很简单，但在实践中稍微复杂一些，原因有二。首先，也是最重要的，你必须处理所有可能出现的异常；你之前看到的伪代码表明异常*可能*发生，但伪代码并没有对它们进行任何有用的处理。其次，你希望在一个单独的线程上执行\
  \ I/O 操作，因为连接在与远程服务器交换数据时通常会阻塞它们所操作的线程。虽然在某些设备和网络上，这种延迟可以忽略不计，但无法保证这一点，而让连接在主线程上执行工作的结果就是用户界面冻结——这是用户无法容忍的。\n\
  \n清单 12-10 展示了 `WeatherFetcher` 类，它使用 HTTP 获取特定城市和州的天气预报。`WeatherWidget` 示例使用它从远程\
  \ Web 服务器获取天气预报，如清单 12-11 所示。（如果你正在跟随本章的清单进行操作，你将需要对你项目中的*所有*清单进行更改，因为它们是相互关联的。）\n\
  \n■**注意** `WeatherFetcher` 的实现假设远程 Web 服务器能够根据给定的城市和州提供天气预报，并且生成的天气预报以纯文本形式提供给应用程序。在下一章中，我将基于你在这里学到的内容，探讨实际的\
  \ Web 服务如何利用 XML 为请求和响应数据提供结构。\n\n**清单 12-10.** *WeatherFetcher 类*\n\npackage com.apress.rischpater.weatherwidget;\n\
  \nimport java.io.*;\n\nimport javax.microedition.io.*;\n\npublic class WeatherFetcher\
  \ implements Runnable {\n\nprivate String url = \"http://www.noplace.com/weather\"\
  ; private Thread thread;\n\nprivate Location location;\n\nprivate boolean cancelled;\n\
  \nWeatherWidget app;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**316**\n\
  \n第 12 章 ■ 访问网络上的远程数据\n\npublic WeatherFetcher(Location l, WeatherWidget a) {\n\n\
