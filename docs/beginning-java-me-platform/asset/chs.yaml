  \n**390**\n\n第 14 章 ■ 使用无线消息 API 进行消息传递 此示例简单地遍历 `listConnections` 提供的入站连接，接收每条入站消息，并依次处理每条消息。\n\
  \n**动态注册以接收传入消息**\n\n当你在 MIDlet 的 JAD 文件中指定入站连接的 URL 时，你是在*静态地*向 AMS 表明你对入站连接的兴趣——也就是说，在构建和打包应用程序时。有时你可能不想这样做——例如，如果你的应用程序让用户决定设备收到传入消息时是否应启动它。为了允许用户确定你的\
  \ MIDlet 是否应响应传入消息，你的应用程序可以*动态地*注册其对入站请求的兴趣——即在运行时。\n\n动态注册入站消息很简单：只需调用 `PushRegistry.registerConnection`\
  \ 并传入入站连接 URL、要启动的类以及过滤器，如清单 14-5 所示。\n\n**清单 14-5.** *使用推送注册表动态注册入站连接* `PushRegistry.registerConnection(\"\
  sms://:1234\",`\n`    \"com.apress.rischpater.SMSMIDlet\",`\n`    \"*\" );`\n\n\
  这样做在功能上等同于在 `MIDlet-Push` 条目中列出入站端点 URL；一旦你这样做了，AMS 会在你的 MIDlet 未运行时将入站连接请求发送给它。要禁用此功能——换句话说，取消注册——请调用\
  \ `PushRegistry.unregisterConnection`，仅传入你传递给 `registerConnection` 的 URL：\n\n`PushRegistry.unregisterConnection(\"\
  sms://:1234\");` 一旦你这样做了，AMS 将不再通知你的 MIDlet 有关你指定的 GCF URL 上的入站连接。\n\n**使用 PushRegistry\
  \ API**\n\n第 4 章向你展示了如何注册闹钟，前面的清单向你展示了如何注册传入连接。你还可以确定先前为入站连接指定的过滤器，或负责处理入站连接的 MIDlet。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 14 章 ■ 使用无线消息 API 进行消息传递\
  \ **391**\n\n你可以调用 `PushRegistry.getFilter` 并传入一个 GCF URL，以获取一个包含先前为入站连接指定的过滤器的字符串；如果你的应用程序动态指定其入站端点和过滤器（可能代表用户），你可能需要这样做。\n\
  \n\n\n你调用 `PushRegistry.getMidlet`（注意其大小写与 MIDP API 中许多其他 MIDlet 实例不一致）来确定负责处理特定入站连接的\
  \ URL。\n\n**应用无线消息 API**\n\n通过 WMA 进行内容分发是 Java ME 应用领域中一个至关重要且不断发展的部分。服务器可以轻松地异步向设备推送信息，而当今\
  \ Java ME 手机丰富的 UI 功能比向无线终端的浏览器推送 WAP 内容能带来更好的用户体验。MO 消息在某些应用中也扮演着重要角色，例如社交网络应用，或者那些持续网络连接成本过高或过于沉重而不值得的应用。\n\
  \n在演示如何在实际示例中使用 WMA 时，我选择不扩展 WeatherWidget 来接收 SMS 天气更新，因为这无法向你展示如何在真实应用中使用 WMA\
  \ 发起消息。相反，下面提供的是两个简单的 MIDlet：一个用于发送和接收文本 SMS 消息，另一个用于在 MMS 消息中发送和接收图片。\n\n**发送和接收\
  \ SMS 消息**\n\n图 14-4 显示了在 Java ME 模拟器中运行的两个 SMSMIDlet 实例。如你所见，用户界面很简单，包含一个允许你输入目标电话号码（技术上称为移动台国际用户目录号码，即\
  \ MSISDN）的文本字段，以及另一个允许你输入消息的文本字段。\n\n为什么需要两个实例？Java ME 模拟器的特性之一是其能够完全模拟 WMA 提供的功能，包括发送和接收消息。通过同时运行两个\
  \ SMSMIDlet 实例，你可以测试消息的发送和接收。正如你在每个模拟器窗口的标题栏中所见，每个模拟器实例模拟了不同的 MSISDN（图中为 MSISDN\
  \ +5550000 和 +5550001）。通过使用每个模拟器的 MSISDN，你可以在将应用加载到实际设备之前测试 WMA 的使用。这让你能在工作站上比在目标设备上调试更高效地调试实现。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00020.png)\n\n**392**\n\
  \n第 14 章 ■ 使用无线消息 API 进行消息传递 **图 14-4.** *在模拟器的两个实例中运行的 SMSMidlet* SMSMIDlet 在其实现中使用了三个类。其中两个——SMSMidlet\
  \ 和 SMSSender——是公共类，而剩下的一个——SetMessage——是私有类。SMSMIDlet 类（如清单 14-6 所示）执行设置用户界面和接收消息所需的工作。\n\
