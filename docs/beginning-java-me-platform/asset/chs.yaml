  `}`\n\n从根本上说，清单 9-3 中的代码看起来与清单 9-2 中的代码非常相似。HAVi 工具包定义了*场景*的概念，你可以将其视为类似于容器；`initXlet`\
  \ 方法创建一个新场景并将其定位在显示器上。除此之外，代码与之前的示例相同，只是你必须在完成场景使用后显式地释放它；此 Xlet 在 `destroyXlet`\
  \ 方法中执行此操作。\n\n因此，很明显，在着手开发 Xlet 应用程序时，你应该在开始设计之前回答以下问题：\n\n• 支持哪个版本的 CDC？\n\n•\
  \ 支持哪个版本的 FP？\n\n• 支持哪个版本的 PBP 或 PP？\n\n• 有哪些额外的窗口工具包可用（如果有的话）？\n\n在第 10 章中，在简要讨论了针对\
  \ PP 对 Applet 模型支持的 Applet 开发之后，我将更深入地讨论 AWT 和 AGUI 的编程。\n\n**使用 PBP 开发轻量级用户界面**\n\
  \n在 Java SE AWT 中，整个 AWT 层次结构都继承自 `Component` 类及其子类 `Container`，并且该类层次结构充当原生 UI\
  \ 组件的代理；例如，`java.awt.Checkbox` 类只是对应同伴组件的代理，该组件封装了原生平台窗口工具包的行为。在某些支持 PBP 的平台上\n\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**234**\n\n第 9 章 ■ 介绍 Xlet\
  \ 与 Personal Basis Profile\n\n在某些主机上，除了 Java 运行时提供的原生窗口工具包外，可能没有其他工具包；而在另一些主机上，对等层级结构消耗的内存可能过大，导致平台无法支持。为了解决这个问题，正如你已经了解到的，PBP\n\
  \n并未为你的应用程序开发提供完整的用户界面层级结构。事实上，PBP 明确*排除了*诸如文本标签、文本输入框、按钮、列表和菜单等重量级组件。相反，它要求使用以下四个\
  \ AWT 顶级组件类：\n\n• java.awt.Component：所有用户界面组件的基类\n\n• java.awt.Container：可包含其他组件的\
  \ AWT 组件的基类\n\n• java.awt.Frame：带有标题栏和边框的顶级窗口\n\n• java.awt.Window：顶级窗口的基类 信不信由你，这四个核心组件类足以实现一个完整的窗口工具包，因为\
  \ Component 和 Container 类可以表示包括嵌套组件在内的各种组件，而 Frame 和 Window 类则允许你定义包含这些组件的顶级窗口。当然，PBP\
  \ 所需的 AWT 子集还包括大量其他类，使你能够实现用户界面，例如 java.awt.Graphics、java.awt.Image 和 java.awt.AWTEvent。\n\
  \n正如你在上一节中所见，构建使用 GUI 的应用程序时，你只有两种选择：要么使用他人提供的包中的组件，要么自行开发。Java 社区已经定义了几种这样的窗口工具包，包括更多用于\
  \ UI 的标准 Java 类（AWT 和/或 Swing，具体取决于目标平台上的配置文件和包），此外还有用于 BD-J 的 HAVi 层级结构等。此外，为你的应用程序自行创建层级结构也是可行的，尤其是当你的用户界面需求较为简单时。\n\
  \n**为窗口工具包实现你自己的组件** 在 Java 用户界面范式中，*组件*是指任何具有图形表示形式、可以在屏幕上显示并与用户交互的对象。*容器*是一种可以包含其他组件的组件。在实现你自己的\
  \ GUI 时，大部分工作涉及创建你自己的原始组件，例如按钮。这需要实现 java.awt.Component 的子类。\n\n实现你自己的工具包的关键在于处理工具包中每个组件的绘制。通常，绘制发生在以下两种情况之一：系统触发的绘制，例如当组件在屏幕上变为可见或调整大小时；或者应用程序触发的绘制，当组件因内容发生变化而决定需要重绘自身时。AWT\
  \ 约定——你必须通过实现 Component 接口来履行——要求通过回调组件的方式完成绘制，具体来说是通过其 paint 方法。你的 paint 方法会接收到一个\
  \ Graphics 对象，该对象包含你在画布上进行二维绘制所需的所有原语。\n\n重要的是，你应避免缓存系统调用你的 paint 方法时收到的 Graphics\
  \ 对象，也避免在 paint 方法之外的其他方法中进行绘制。其他方法可能会在组件不适合绘制的时间被调用，例如当组件不可见时，或者 Graphics 对象未处于可执行绘制的状态时。当框架调用你的\
  \ paint 方法时，Graphics 对象已预先配置好绘制组件所需的适当状态，包括以下图形渲染选项：\n\n• Graphics 对象的颜色被设置为组件的前景色属性。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 9 章 ■ 介绍 Xlet 与 Personal\
  \ Basis Profile\n\n**235**\n\n\n• Graphics 对象的字体被设置为组件的字体属性。\n• Graphics 对象的平移被设置为使原点\
  \ (0,0) 代表组件的左上角。\n• Graphics 对象的裁剪矩形被设置为组件中需要重绘的区域。\n\n当然，你可以根据需要自由重新配置传递给 `paint`\
  \ 方法的 Graphics 对象。\n\n为了向组件发出需要重绘的信号，应用程序（或组件本身）应调用组件的 `repaint` 方法之一。在调用 `repaint`\
  \ 时，应尽可能包含需要重绘的边界，以便组件可以将重绘限制在必要的区域。你还可以传递一个以毫秒为单位的时间间隔，指示组件应在指定的毫秒数过去之前重绘自身。这种形式的\
  \ `repaint` 在执行多次重绘时特别有用，因为它允许你一次性将所有绘制工作排队。\n\n请注意，尽管看起来相似，但组件提供的 `update` 方法与\
  \ `repaint` 并不相同。只有 AWT 事件系统会响应应用程序触发的重绘请求而调用 `update`；系统重绘不会触发对 `update` 的调用。这让你可以挂钩系统级重绘请求（通过重写\
  \ `update`）或应用程序级重绘请求（通过重写 `repaint`）。然而，很可能你会希望 `repaint` *和* `update` 都采用默认的组件行为。\n\
  \n可以包含多个组件的容器子类，它们本身也是 Component 的子类，并且也可以通过重写 `paint` 方法来执行自己的绘制。Container 的 `paint`\
  \ 方法的默认实现是，对其可见子组件中与要绘制的矩形相交的部分调用 `paint`。因此，如果你正在实现一个知道如何绘制的 Container 子类，那么你的容器的\
  \ `paint` 方法必须调用超类的 `paint` 方法，如清单 9-4 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**236**\n\n第 9 章 ■ 介绍 Xlet 和个人基础配置文件\n\n**清单 9-4.** *调用超类的 paint 方法* public class\
  \ PaintingContainer extends Container {\n\npublic void paint(Graphics g) {\n\n//\
  \ 首先绘制我的内容…\n\nsuper.paint(g);\n\n}\n\n}\n\n对 Graphics 类及其方法的全面讨论超出了本章的范围，但重要的是要记住，Graphics\
  \ 对象既存储了一组特定绘制原语的上下文（字体、颜色、裁剪区域等），也提供了绘制图形原语的方法，包括矩形、弧、线、多边形、字符和图像。最后一种原语——绘制图像的能力——可能对你的窗口工具包组件至关重要，因为你可以让美工为组件的各个部分（例如按钮的边界、背景等）绘制图像，然后你的\
  \ Component 子类只需在其 `paint` 方法中将这些图像与 Graphics 对象组合，使用最少的图形原语来提供特定的外观和感觉。\n\n**编写一个简单的轻量级组件**\n\
  \n实现一个丰富的窗口工具包*可能*需要大量工作，但并非必须如此，特别是当你的应用程序只有少数用户界面原语时。清单 9-5 展示了一个简单的组件：一个带有文本标签的圆形按钮。\n\
  \n**清单 9-5.** *RoundButton 轻量级组件* import java.awt.*;\n\nimport java.lang.*;\n\n\
  import java.util.*;\n\nimport java.awt.event.*;\n\npublic class RoundButton extends\
  \ Component {\n\nprotected String label;\n\nprotected boolean pressed = false;\n\
  \nprivate Image offscreen;\n\nprivate static int PREFERRED_SIZE = 100;\n\nprivate\
  \ static int LABEL_PAD = 40;\n\npublic RoundButton(String l) {\n\nlabel = l;\n\n\
  enableEvents(AWTEvent.MOUSE_EVENT_MASK);\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 介绍 Xlet 和个人基础配置文件\n\n**237**\n\npublic void invalidate() {\n\nsuper.invalidate();\n\
  \noffscreen = null;\n\n}\n\n\n\npublic void update(Graphics g) {\n\npaint(g);\n\n\
  }\n\npublic void paint(Graphics g) {\n\nint s = Math.min(getSize().width - 1, getSize().height\
  \ - 1);\n\n// 使用双缓冲进行绘制\n\nif(offscreen == null) {\n\noffscreen = createImage(getSize().width,\
  \ getSize().height);\n\n}\n\nGraphics og = offscreen.getGraphics();\n\nog.setClip(0,0,getSize().width,getSize().height);\n\
  \n// 绘制背景，指示按压状态。\n\nif(pressed) {\n\nog.setColor(getBackground().darker().darker());\n\
  \n} else {\n\nog.setColor(getBackground());\n\n}\n\nog.fillArc(0, 0, s, s, 0, 360);\n\
  \n// 绘制按钮的边框\n\nog.setColor(getBackground().darker().darker().darker()); og.drawArc(0,\
  \ 0, s, s, 0, 360);\n\n// 在按钮中心绘制标签\n\nFont f = getFont();\n\nif(f != null) {\n\n\
  FontMetrics fm = getFontMetrics(getFont());\n\nog.setColor(getForeground());\n\n\
  og.drawString(label,\n\ns/2 - fm.stringWidth(label)/2,\n\ns/2 + fm.getMaxDescent());\n\
