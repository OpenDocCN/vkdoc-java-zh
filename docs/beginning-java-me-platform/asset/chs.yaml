  \nPIM.getInstance().openPIMList(PIM.CONTACT_LIST, PIM.READ_WRITE); Contact c = list.createContact();\n\
  \nString [] name = new String[list.stringArraySize(Contact.NAME)]; name[Contact.NAME_GIVEN]\
  \ = \"Ray\";\n\nname[Contact.NAME_FAMILY] = \"Rischpater\";\n\nc.addStringArray(Contact.NAME,Contact.ATTR_NONE,name);\n\
  \nc.commit();\n\n**删除 PIM 条目**\n\n要删除 PIM 条目，首先必须拥有对应 PIMItem 项目的引用；你可以通过上一节“从 PIM\
  \ 数据库读取记录”中描述的任何枚举方法获取此引用。拿到条目后，调用你所管理的 PIMList 类型的相应删除方法。你可以调用 removeContact、removeEvent\
  \ 或 removeToDo，然后传入与要删除项目对应的 PIMEntry 实例。\n\n请注意，没有方法可以删除列表中的所有项目；要做到这一点，你需要枚举列表中的项目并逐一删除。\n\
  \n**管理 PIM 数据库类别**\n\n某些设备支持将项目分组到类别中，例如工作和家庭联系人。你可以使用 getCategories 方法枚举 PIMList\
  \ 的类别，该方法返回一个包含类别名称的字符串数组。如果结果是一个零长度列表，则表示不支持类别，或者没有为 PIMList 定义类别。你还可以通过调用 isCategory\
  \ 并传入包含要测试类别名称的字符串，来测试给定字符串是否被用作类别名称。\n\n你可以使用 addCategory 和 deleteCategory 方法添加和删除类别。\n\
  \n添加类别时，仅当该类别尚不存在时才会添加；你不能有两个同名的类别。此判断是区分大小写的，尽管底层实现可能不区分大小写。类似地，deleteCategory\
  \ 会删除你指定的类别，但你还需要传入一个布尔值，指示是否要删除因删除该类别而未分配给任何类别的项目。你还可以使用 renameCategory 方法重命名类别；依次传入当前类别名称和新类别名称。\n\
  \n类别通常用于限制列表中显示的项目数量；你可以使用 PIMList 的 itemsByCategory 方法以编程方式实现相同效果，传入类别名称。作为回报，你将收到一个（可能为空的）枚举，其中包含你指定类别中的\
  \ PIMItem。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 7 章 ■ 访问文件和其他数据\
