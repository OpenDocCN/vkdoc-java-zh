  \ 在存储未打开时将其打开，并在发生错误时重新抛出任何异常；`closeStore` 关闭存储，并隐藏可能发生的任何错误。\n\n`getLocationStrings`\
  \ 方法返回一个 `Location` 项的数组；你可以用它来填充主用户界面中的位置列表。它使用一个简单的 `RecordEnumeration`，依靠枚举器将结果枚举按字母升序排列。在我的匿名内部\
