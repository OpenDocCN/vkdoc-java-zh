  \ shell 中的文件名一样，你可以使用 `*` 指定一个或多个字符，使用 `?` 指定单个字符。\n\n■**注意** 使用推送注册表需要权限；请确保在 MIDlet\
  \ 的 JAD 文件的 `MIDlet-Permissions` 条目中包含你正在使用的 GCF 端点的适当权限。\n\n当 AMS 响应入站连接请求（例如 MT\
  \ 消息）启动你的应用程序时，AMS 会将入站连接的 GCF URL 添加到一个列表中。你可以使用 `PushRegistry` 类的 `listConnections`\
  \ 方法请求此列表，该方法返回一个入站连接列表。这实际上比你需要的*更多*信息，因为它列出了 AMS 正在为你的 MIDlet 监听的所有入站端点。通过传递 `true`，你将仅收到那些具有待处理数据连接的端点列表。清单\
  \ 14-4 显示了一些执行此操作的伪代码。\n\n**清单 14-4.** *使用 PushRegistry 的 listConnections 方法* `private\
