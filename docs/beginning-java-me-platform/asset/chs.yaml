  \ backCommand;\n\n}\n\n}\n\nMIDlet 现在必须声明一个 `WeatherFetcher` 实例，以便在启动时或选择某个位置时，能够发起和取消天气更新的请求。`initialize`\
  \ 方法负责处理第一种情况，即应用程序在启动时请求更新天气预报。\n\n新的 `update` 方法由 `WeatherFetcher` 实例调用，它必须完成两件事：用新获取的预报更新用户界面，以及用新的天气数据更新\
  \ `LocationStore`。它会静默忽略更新 `LocationStore` 时的任何失败，前提是旧的缓存数据可能足够好，并且后续查看同一位置时无论如何都会重新获取天气预报数据。\n\
  \n当您选择新位置时，MIDlet 的主命令处理器 `commandAction` 必须做出响应：取消任何待处理的操作，为新建的位置创建一个新的 `Fetcher`，并发起一个新的网络请求。\n\
  \n最后，退出 MIDlet 时应终止网络操作；这通过 `destroyApp` 和 `exitMIDlet` 两者共同完成，前者由应用程序管理器在设备必须终止应用程序时调用，后者由用户界面本身调用。\n\
  \n**使用 HTTPS 保护您的 HTTP 事务**\n\n虽然 HTTP 作为应用层协议有很多优点，但安全性并非其中之一。通过 HTTP 共享信息就像在拥挤的餐厅里交谈；您获得的唯一安全性来自模糊性，而这根本不是真正的安全。为了满足电子商务等安全应用的需求，出现了\
  \ HTTPS 协议，它本质上是在安全套接字连接（如 TLS）上实现的 HTTP。\n\nHTTPS 通过证书提供客户端/服务器身份验证，并使用双方商定的协议对端到端通信进行加密，从而抵御多种攻击，例如中间人攻击和窃听攻击。\n\
  \n作为 MIDP 2.0 的强制要求，HTTPS 是 Java ME 平台的一个重要补充，在许多应用中都有使用。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**326**\n\n第 12 章 ■ 访问网络上的远程数据\n\n幸运的是，在您的应用程序中使用 HTTPS 就像添加几个 `s` 字符一样简单。创建连接时，改为从\
  \ `Connector` 请求一个 `HttpsConnection`，如清单 12-12 所示。\n\n**清单 12-12.** *请求一个 HttpsConnection*\
  \ HttpsConnection hc = (HttpsConnection)\n\nConnector.open(\"https://www.noplace.com/\"\
  );\n\n生成的 `HttpsConnection` 实现了 `HttpConnection`，因此您可以以相同的方式使用它。此外，您还可以获取关于该连接的两条额外信息：服务器通过其\
  \ `getPort` 方法接受连接的端口，以及通过其 `getSecurityInfo` 方法获取关于协商后的安全连接的详细信息。\n\n`getSecurityInfo`\
  \ 方法返回一个 `SecurityInfo` 实例，该实例描述了您的应用程序与远程服务器之间建立的连接类型；从中您可以获取四条信息：GCF 如何加密事务、承载协议、承载协议的版本以及远程证书。这些信息可通过以下\
  \ `SecurityInfo` 方法获得：\n\n• `getCipherSuite`：返回一个字符串，命名 GCF 用于加密事务的密码套件\n\n• `getProtocolName`：返回一个字符串，指示承载事务的协议名称\n\
  \n• `getProtocolVersion`：返回一个字符串，指示承载事务的协议版本\n\n• `getServerCertificate`：返回远程服务器的证书\
  \ `getServerCertificate` 返回的证书是一个实现了 `Certificate` 接口的对象；您可以查询其属性，例如证书的颁发者和到期时间。\n\
  \n虽然为您的应用程序添加 HTTPS 可能很容易，但构建一个安全的应用程序却并非如此。正如顶尖计算机安全专家 Gene Spafford 所言，HTTPS 就像\n\
  \n“用装甲车在公园长椅上的人和纸板箱里做生意的人之间运送成卷的便士。”要构建真正安全的应用程序，您还必须对应用程序与远程服务器交换的数据负责；例如，电子商务应用程序应注意保护用户的凭据，以防用户设备丢失或被盗时造成泄露。我将在第\
  \ 15 章向您展示 Java ME 提供的一些应对这些挑战的工具。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 12 章 ■ 访问网络上的远程数据\n\n**327**\n\n**授予网络连接权限**\n\n正如我在“使用 HTTP”一节中指出的，网络应用程序需要权限。这个由\
  \ MIDP 强制要求的规定，确保应用程序不会生成未经授权的网络连接，从而避免产生数据使用费用或将您的信息传输给未经授权的个人。在 MIDP 中，通过 GCF\
  \ 进行的网络访问受到基于应用程序要创建的连接类型的权限保护。表 12-6 显示了这些权限的名称。\n\n**表 12-6.** *管理 GCF 访问的 MIDP\
  \ 权限*\n\n**权限**\n\n**接口**\n\njavax.microedition.io.Connector.http\n\nHttpConnection\n\
  \njavax.microedition.io.Connector.https\n\nHttpsConnection\n\njavax.microedition.io.Connector.datagram\n\
  \nDatagramConnection\n\njavax.microedition.io.Connector.datagramreceiver\n\nDatagramConnection\n\
  \njavax.microedition.io.Connector.socket\n\nSocketConnection\n\njavax.microedition.io.Connector.serversocket\n\
  \nServerSocketConnection\n\njavax.microedition.io.Connector.ssl\n\nHttpsConnection\n\
  \njavax.microedition.io.Connector.comm\n\nCommConnection\n\njavax.microedition.io.PushRegistry\n\
  \nPushRegistry\n\n默认情况下，在 NetBeans 提供的模拟器中运行时，您的 MIDlet 作为不受信任的 MIDlet 运行，并且只有在用户授予连接权限时才能使用连接。\n\
  \n正如我在第 3 章中所述，受信任的应用程序必须在 JAD 属性 `MIDlet-Permissions` 和 `MIDlet-Permissions-Opt`\
  \ 中指定它们所需的权限。在 NetBeans 中，最简单的方法是在应用程序的属性中指定：选择“属性”➤“应用程序描述符”➤“API 权限”，然后单击标有“添加”的按钮。\n\
  \n图 12-2 显示了 NetBeans 中的此屏幕。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00042.png)\n\n**328**\n\n第 12 章 ■ 访问网络上的远程数据\n\n**图 12-2.** *指定 MIDlet\
  \ 权限*\n\n**总结**\n\n与 Java 的其他配置不同，Java ME 通过 GCF 提供了一种统一的数据通信方法。GCF 提供了一个用于连接的工厂类，称为\
  \ `Connector`，它允许您基于 URL 创建 `Connection` 接口的子类。\n\n\n\n你传递给 `Connector.open` 的参数。URL\
  \ 不仅指定了连接的目标地址，还指定了协议类型和端口，让你能够创建各种不同的连接。然而，实际的连接类型（应用层协议和传输层协议）受限于你的应用程序所运行的平台；某些协议（如\
  \ HTTP）在几乎所有 Java ME 平台上都可用，包括 CDC 和 CLDC，而其他协议（如数据报协议或底层流式套接字协议）则可能不可用。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 12 章 ■ 访问网络上的远程数据\n\n**329**\n\n你使用 `Connector.open` 返回的 `Connection` 接口子类来执行实际的通信；它通常提供一种方式来获取流或数据报，用于与连接的远程端交换字节。大多数\
  \ `Connection` 的子类都提供了额外的方法来执行特定于协议的操作，例如设置套接字选项。\n\n`Connection` 接口子类的一个重要示例是以\
  \ `ContentConnection` 开头并包含 `HttpConnection` 的层次结构；你可以使用这两个类与远程 Web 服务器执行 HTTP 交换，以获取内容并与远程\
  \ Web 服务交互。仅使用 `HttpConnection`，你就可以将数据以 URL 编码形式发布到远程服务器，并获取响应，供你的应用程序解析、存储和显示；你也可以通过\
  \ `HttpsConnection` 在 HTTPS 上执行相同操作。\n\n在 CLDC MIDP 平台上运行时，你的应用程序需要权限才能建立连接。不受信任的应用程序会提示用户授予建立连接的权限；受信任的应用程序可以通过\
  \ JAD 属性 `MIDlet-Permissions` 和 `MIDlet-Permissions-Opt` 表明其对特定连接类型的访问需求。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章\n\n访问 Web 服务\n\n**在**上一章中，你学习了如何建立与远程资源（例如远程 Web 服务器）的连接。虽然连接到远程资源是许多 Java\
  \ ME 应用程序的关键组成部分，但当今大多数联网的 Java ME 应用程序还需要更多：能够与当今的 Web 服务互操作，这些服务由专为机器对机器交互而设计的\
  \ Web 服务器提供。Web 服务是客户端/服务器模型的重要演进，随着移动用户越来越依赖移动设备访问产品和服务，那些具有清晰用户界面、能够呈现来自 Web 服务的数据（如天气、金融和旅行信息）的应用程序需求旺盛。\n\
  \n在本章中，我将向你展示如何使用 JSR 172 指定的可选 J2ME Web 服务规范，将 Java ME 平台与驱动当今应用程序的 Web 服务连接起来，以及在\
  \ J2ME Web 服务规范不可用时如何实现相同的功能。我将从客户端角度回顾 Web 服务架构开始，以便你理解使用 Web 服务与简单地从互联网上拉取远程资源有何不同。在此过程中，你将了解\
  \ Web 服务架构的三种类别，以及 HTTP 和 XML 如何在支持当今 Web 服务中发挥关键作用。最后，我将详细讨论上一章中缺失的两个 Web 服务关键部分：如何在\
  \ Java ME 应用程序中生成和解析 XML。\n\n**从客户端视角看 Web 服务**\n\n计算领域的大多数突破并非革命性的，而是演进性的。Web 服务也不例外；其核心是客户端/服务器计算模型的一种应用，使用\
  \ HTTP 作为承载协议，并使用诸如 XML、JavaScript 对象表示法（JSON）或 YAML 非标记语言（YAML）等知名语言进行数据表示。一个完整的\
  \ Web 服务有三个关键组件，如图 13-1 所示：\n\n**331**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**332**\n\n第 13 章 ■ 访问 Web 服务\n\n*   ***服务代理***：负责帮助客户端确定一个或多个*服务提供者*的位置\n*  \
  \ ***一个或多个服务提供者***：负责向客户端提供远程计算设施，例如计算和对象交换\n*   ***一个或多个服务请求者***：使用代理查找提供者并与之交互的客户端\n\
  \n■**注意** 在接下来的讨论中，我将使用术语*客户端*来指代服务请求者。\n\n**图 13-1.** *Web 服务的示意图*\n在经典的 Web 服务中，请求者首先通过使用通用描述、发现和集成（UDDI）注册协议与服务代理协调，来发现哪些\
  \ Web 服务可用；一旦请求者确定了提供者提供哪些服务，请求者和提供者就会使用 Web 服务描述语言（WSDL）就实际可用的服务进行通信。实际的请求者-提供者通信利用简单对象访问协议（SOAP）。\n\
  \nUDDI、WSDL 和 SOAP 都是 XML 应用程序，因为它们使用 XML 作为表示数据的基础语言。在实践中，HTTP 承载这些语言编码的请求和响应，当然，任何能够承载对象数据和对象元数据的可靠协议都足以胜任。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 13 章 ■ 访问 Web 服务\n\n**333**\n\
  \n**考虑架构**\n\n在实践中，术语*Web 服务*已逐渐适用于任何利用 Web 技术的机器对机器通信应用程序。这种称谓不仅仅是描述某类应用程序的简写，而且随着范式的演进，它也是恰当的。\n\
  \n在大型环境中，Web 服务的职责划分（如图 13-1 所示）非常重要。然而，在许多情况下，职责划分可以（并且已经）被简化，以反映需求和计算环境的差异。\n\n\
  其中一种简化是移除代理，或者将代理与服务提供者合并。在这种模型中，客户端对服务提供者所提供服务的性质和位置有预定义的概念。这对于许多移动客户端尤其如此，因为动态发现和能力协商的复杂性和开销会显著增加应用程序的内存成本。\n\
  \n另一种对 Web 服务进行分类的方法是查看客户端与服务器之间交互的性质。广义上讲，有三种交互类别：远程过程调用（RPC）服务、面向服务的架构（SOA）服务以及使用表述性状态转移（REST）的服务。我喜欢将它们分别视为采用功能方法、消息传递方法和资源方法。\n\
  \n面向 RPC 的 Web 服务是最常见的类型之一，其语义可追溯到前 Web 时代的客户端/服务器编程，即客户端请求远程服务器执行特定操作。封装请求和响应的语义通常因服务而异；小型服务大量使用简单的\
  \ XML 表示对象和请求，而更复杂的应用程序几乎总是使用 SOAP 来表示对象。\n\n■**注意** 你在第 11 章首次看到的 Java RMI 是 RPC\
  \ 接口的另一个示例。\n\n\n\nSOA Web 服务是规模最大、最复杂的服务之一，并且如今得到了众多行业厂商的广泛支持。与 RPC（其核心概念是方法调用，通常与底层实现和领域紧密耦合）不同，SOA\
  \ 将请求表示为消息。换句话说，它的重点是消息，而非操作。在多个不同子系统或组织之间实现大规模 Web 服务时，SOA 能提供诸多优势。SOA Web 服务使用\
  \ SOAP（一种用于数据交换的 XML 对象表示形式）和 WSDL 来描述服务器或客户端提供或需要的服务类型。\n\n最后，基于 REST 的 Web 服务尝试利用\
  \ HTTP 提供的多种方法来描述客户端可以请求服务对已记录对象执行的操作类型。RESTful Web 服务的一个标志是呈现代表对象的知名 URL，而不是代表操作、服务或一个通用的\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**334**\n\n第 13 章 ■ 访问 Web\
  \ 服务\n\n调用点。客户端使用 HTTP 方法（如 GET、PUT 或 DELETE）请求与这些对象进行交互。RESTful 应用程序可能会使用 SOAP，但\
  \ RESTful 服务中强烈的简约倾向使得许多架构师使用简单的、自制的 XML 对象表示形式。\n\n虽然大型 Web 服务使用包括 UDDI、WSDL 和\
  \ SOAP 在内的万维网联盟（W3C）协议层次结构，但你完全有可能仅使用 XML 来构建一个 Web 服务。许多在软件混搭中使用的流行 Web 2.0 服务就是这样做的，它们避开了完整\
  \ W3C 技术栈的复杂性，转而采用仅基于 SOAP 或偶尔仅应用 XML 的轻量级对象表示形式。越来越多的 Web 服务可能提供对其他结构化数据表示形式（如\
  \ JSON 或 YAML）的支持，使软件开发人员能够利用 JavaScript 或 Ruby 等编程语言对这些较新数据表示形式的支持。\n\n■**提示**\
  \ 虽然你完全可以基于或使用提供 JSON 或 YAML 接口的 Web 服务来构建你的 Java ME 应用程序，但你应该准备好做更多工作来支持这些数据表示形式，因为在我撰写本文时，Java\
  \ ME 平台上对它们的支持很少。我设想，随着越来越多的服务在其客户端/服务器通信中使用这些表示形式，这种情况在未来几年可能会发生变化。\n\n**通过网络交换数据**\n\
  \n如果你正在为当今的任何 Web 服务编写客户端，那么你很可能会使用 HTTP 或 HTTPS。正如我在上一章“使用 HTTPS 保护你的 HTTP 事务”一节中指出的那样，HTTP\
  \ 是一种很好的数据交换协议，但它的安全性并不高。许多 Web 服务，包括电子商务服务，几乎肯定使用 HTTPS。重要的是要记住，你不仅需要使用 HTTPS 保护用户数据的安全，还需要负责在应用程序的其他地方保护他们的数据，例如当数据存储在记录存储或文件中时。\n\
  \n编写 Web 服务客户端时的另一个考虑因素是你可能需要使用的 HTTP 方法；在使用 REST 时尤其如此，因为 REST 范式依赖于 HTTP 方法来提供关于\
  \ Web 服务操作的一些语义。例如，在为一个基于 REST 构建的消息传递应用程序编写 Web 服务客户端时，你可能会发现用于删除消息的 Web 服务定义要求你发送一个使用\
  \ DELETE 方法的 HTTP 请求。幸运的是，这就像使用 HttpConnection（或 HttpsConnection）的 `setRequestMethod`\
  \ 方法并传入你想要使用的方法一样简单，如清单 13-1 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 ■ 访问 Web 服务\n\n**335**\n\n**清单 13-1.** *指定 HTTP 方法*\n\ntry {\n\nhc = (HttpConnection)Connector.open(url);\n\
  \nhc.setRequestMethod(\"DELETE\");\n\n…\n\n} catch (Exception e) {…}\n\n实际上，你可以将*任何*字符串传递给\
  \ `setRequestMethod`，但你当然应该坚持使用 HTTP 定义的方法，我在第 12 章的表 12-4 中为你总结了这些方法。\n\n另一个考虑因素是某些\
  \ Web 服务对*消息摘要*的需求，消息摘要是从客户端到服务器的 Web 请求或对象正文的安全哈希值。我将在第 15 章讨论如何使用 Java ME 开发人员可用的各种选项来计算消息摘要。\n\
  \n在 HTTP 层为 Web 服务开发客户端时，你可能遇到的最后一件事是需要一个 cookie 来保存会话状态。这对于源自 SOA 的 Web 服务尤其如此；这些服务通常要求客户端应用程序登录，并在每次事务期间呈现登录序列期间提供的一些状态数据。这通常通过*cookie*\
  \ 来实现——服务器在 HTTP 标头中提供的一小段数据，用于封装与服务器的会话。Web 客户端一直使用 cookie 来存储客户端和服务器之间的状态数据；你的应用程序可能也需要执行相同的操作。HTTP\
  \ 如何使用 cookie 携带会话状态的完整细节在 RFC 2965 和 RFC 2109 中有所描述。但是，你应该了解以下事实：\n\n• Web 服务器使用\
  \ `Set-Cookie` 标头将 cookie 传递给你的应用程序。\n• Cookie 由几个部分组成：第一部分是 cookie 的会话 ID，这是你需要在后续请求中回发给服务器的数据，其余部分是有关\
  \ cookie 的元数据，例如其过期时间以及它适用于哪个域。分号分隔这些部分。\n• 你通过使用 `Cookie` 标头将 cookie 传递给 Web 服务器。\n\
  \n要查找来自服务器的 cookie，你只需使用 HttpConnection 的 `getHeaderField` 方法，如清单 13-2 所示。\n\n**清单\
  \ 13-2.** *从服务器查找 Cookie* String cookie = hc.getHeaderField(\"Set-Cookie\"); if\
  \ (cookie != null) {\n\nint semicolon = cookie.indexOf(';');\n\n/* session is at\
  \ cookie.substring(0, semicolon); */\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**336**\n\n第 13 章 ■ 访问 Web 服务\n\n一旦你获得了一个 cookie，你应该将其分解为会话 ID 和域部分，你可以通过在其分号处解析\
  \ cookie 字符串来做到这一点；这将两部分分开。一个存储结果会话的好地方是在实现你的 Web 服务客户端的 Java 类的成员字段中。然后，你将根据后续请求的\
  \ URL 检查该域，仅当域匹配时才使用 HttpConnection 的 `setRequestProperty` 发送 cookie，如清单 13-3 所示。\n\
  \n**清单 13-3.** *随 HTTP 请求发送 Cookie* HttpConnection hc = (HttpConnection)Connector.open(url);\
  \ hc.setRequestProperty(\"cookie\", mSession);\n\n你可能希望将 cookie 存储在其他地方，例如记录存储中，但有一个问题：它们会过期，而过期时间取决于服务器的配置方式。如果你想持久化\
  \ cookie，你绝对应该解析 cookie 以获取过期日期，并通过在 cookie 过期时将其从应用程序的存储中移除来适当地处理过期。\n\n**使用 XML\
  \ 进行数据表示**\n\nXML 提供了一种标准语法，用于创建自定义标记语言，让你可以描述文档中的数据。它源自标准通用标记语言（SGML），是当今使用最广泛的标记语言之一。在本节中，我将仅为你提供\
  \ XML 的简要介绍，即你在自己的应用程序中使用简单 XML 所需了解的关键细节。有关 XML 的全面介绍，我鼓励你访问 W3C 文档，网址为 http://www.w3c.org/XML。\n\
  \nXML 语法为你提供了一种表示文档的通用语法\n\n\n\n树状结构始于一个单一的*根*元素，该元素必须包含零个或多个*子*元素，而这些子元素自身也可以拥有子元素。元素由*标签*构成，标签具有属性，并且可以包含其他标签或数据，如清单\
  \ 13-4 所示的天气预报示例。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 13 章\
  \ ■ 访问 Web 服务\n\n**337**\n\n**清单 13-4.** *一个 XML 文档示例*\n\n<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\"?>\n\n<weather city=\"Berkeley\" state=\"CA\" country=\"USA\"\
  >\n\n<temperatures units=\"F\">\n\n<temperature type=\"high\">76</temperature>\n\
  \n<temperature type=\"low\">56</temperature>\n\n<temperature type=\"current\">72</temperature>\n\
  \n</temperatures>\n\n<wind>\n\n<direction units=\"compass\">ENE</direction>\n\n\
  <speed units=\"MPH\">5</speed></wind>\n\n<precipitation probability=\"0\" type=\"\
  rain\" units=\"in\"/>\n\n<text>\n\n<when time=\"today\">\n\nMostly cloudy in the\
  \ morning then becoming mostly sunny.\n\nPatchy fog in the morning. Highs in the\
  \ 70s to lower 80s.\n\nAfternoon seabreeze 10 to 20 mph.\n\n</when>\n\n<when time=\"\
  tonight\">\n\nMostly clear except areas of low clouds and fog developing overnight.\
  \ Lows in the mid to upper 50s. Evening seabreeze 10 to 20 mph.\n\n</when>\n\n</text>\n\
  \n</weather>\n\n图 13-2 展示了一个表示此数据结构的树。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**338**\n\n第 13 章 ■ 访问 Web 服务\n\n**图 13-2.** *表示清单 13-4 中 XML 文档结构的树*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 ■ 访问 Web 服务\n\n**339**\n\n此示例展示了 XML 的几个关键特性：\n\n• XML 文档以*序言*开头，由`<?`和`?>`界定。序言指明了文件所使用的\
  \ XML 版本以及文件的字符集编码。\n\n• XML 文档可以包含注释，注释以`<!--`开头，以`-->`结束。（但注释不能嵌套。）\n\n• 元素由`<`和`>`包含的纯文本组成。（实际上，这两个符号之间能包含的内容是有限制的；就本讨论而言，可以安全地假设元素名称只能由字母数字字符和下划线字符组成。）\n\
  \n• 起始标签表示元素数据的开始；结束标签由`</`和`>`包含相同的标签名称来表示。\n\n• 元素之间的空白字符不重要。\n\n• 元素可以有*属性*，属性是包含在起始标签内的名称-值对。\n\
  \n• 元素区分大小写。\n\n• 空元素不包含任何元素，使用`<`和`/>`表示。\n\n• 元素可以包含其他元素或文本数据。\n\n■**注意**\n\n\
  本章使用的天气数据模式是我编造的，目的是展示 XML 的一些关键特性。在互联网上，存在多种天气数据模式，例如美国政府国家气象局在 http://www.weather.gov/data/current_obs/\
  \ 定义的模式，或者雅虎天气在 http://developer.yahoo.com/weather/ 描述的格式。\n\nXML 文档可以通过两种方式表示文本：作为平面字符数据，其中可能包含五个*实体*来表示特殊字符`<`、`>`、`&`、`'`和`\"\
  `；或者作为特殊的未解析字符指令，其中包含原始字符数据，XML 解析器会接受这些数据而不尝试解析。表 13-1 展示了这五个字符实体的定义。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**340**\n\n第 13 章 ■ 访问 Web 服务\n\n**表 13-1.** *XML 字符实体*\n\n**实体**\n\n**字符**\n\n\
  **表示**\n\n`&amp;`\n\n`&`\n\n&符号\n\n`&lt;`\n\n`<`\n\n小于号\n\n`&gt;`\n\n`>`\n\n大于号\n\
  \n`&apos;`\n\n`'`\n\n撇号\n\n`&quot;`\n\n`\"`\n\n引号\n\n清单 13-5 展示了一个简单的未解析字符指令示例。\n\
  \n**清单 13-5.** *使用 XML 的 CDATA 指令的未解析字符数据示例*\n\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n\n<root>\n\n<![CDATA[\n\nCDATA 结构中的每个字符都被视为普通字符；没有任何限制，因此我可以写像 3 < 4\
  \ 这样的内容而不会混淆 XML 解析器。\n\n]]>\n\n</root>\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n一个 XML 文档可以定义一个或多个*命名空间*，这些命名空间定义了文档中具有唯一名称的元素和属性。这使得 XML 文档可以为多个目的使用同一个元素或属性，例如，一个\
  \ `<id>` 元素既可以表示客户 ID，也可以表示产品 ID。使用命名空间时，需要使用 XML 保留的 `xmlns` 标签来定义一个唯一的 URL 来标识该命名空间；在标签中，命名空间名称位于标签名称之前。使用冒号将命名空间名称与标签名称分隔开，如清单\
  \ 13-6 所示。\n\n**清单 13-6.** *XML 命名空间示例*\n\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
  ?>\n\n<wx:weather city=\"Berkeley\" state=\"CA\" country=\"USA\"\n\n>\n\n<wx:temperatures\
  \ units=\"F\">\n\n<wx:temperature type=\"high\">76</wx:temperature>\n\n<wx:temperature\
  \ type=\"low\">56</wx:temperature>\n\n<wx:temperature type=\"current\">56</wx:temperature>\n\
  \n</wx:temperatures>\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 13\
  \ 章 ■ 访问 WEB 服务\n\n**341**\n\n<wx:wind units=\"MPH\">\n\n<wx:direction units=\"\
  compass\">ENE</wx:direction>\n\n<wx:speed>5</wx:speed></wx:wind>\n\n<wx:precipitation/>\n\
  \n<wx:text>\n\n<wx:when time=\"today\">\n\nMostly cloudy in the morning then becoming\
  \ mostly sunny.\n\nPatchy fog in the morning. Highs in the 70s to lower 80s.\n\n\
  Afternoon seabreeze 10 to 20 mph.\n\n</wx:when>\n\n<wx:when time=\"tonight\">\n\n\
  Mostly clear except areas of low clouds and fog developing overnight. Lows in the\
  \ mid to upper 50s. Evening seabreeze 10 to 20 mph.\n\n</wx:when>\n\n</wx:text>\n\
  \n</wx:weather>\n\nXML 文档提供了不同级别的有效性；*格式良好*的文档是指满足 XML 自身语法要求的文档，而*有效*的文档则满足由用户或文档语义的其他\
  \ XML 表示（如 XML 模式或 XML 文档类型定义 (DTD)）所施加的额外语义约束。在实践中，当为运行在支持 Java ME 的设备上的轻量级客户端使用\
  \ XML 时，您将创建和操作格式良好的 XML 内容，而将真正的验证工作留给服务器以及您解析 XML 本身的方式。\n\n■**注意** 近年来，XML 已被广泛采用作为数据表示挑战的万能解决方案，而\
  \ YAML 和 JSON 是其用于基于 Web 编程的亲密伙伴。然而，基于二进制的协议（如无线应用协议 (WAP) 二进制 XML (WBXML，W3C 在\
  \ http://www.w3.org/TR/wbxml/ 详述的 XML 二进制版本)）和基于标签的表示法仍有其用武之地，它们提供了更紧凑的数据表示，尤其适用于在较慢网络上运行或对数据传输收取高额费用的应用程序。\n\
  \n**探索 Java ME 中用于 Web 服务的 XML 支持**\n\n从您的 Java ME 应用程序中使用 Web 服务通常涉及以下步骤：**1.**\
  \ 您的应用程序呈现一个用户界面。\n\n**2.** 作为用户或应用程序执行的某个操作的结果，应用程序必须向远程 Web 服务发出一个 Web 服务请求。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**342**\n\n第 13 章 ■ 访问 WEB\
  \ 服务\n\n**3.** 应用程序生成一个表示 Web 服务请求的 XML 文档（通常称为请求数据的*编组*）。\n\n**4.** 应用程序使用 HTTP，通过\
  \ POST 请求将 XML 文档传输到远程 Web 服务。\n\n**5.** 应用程序使用 HTTP，从远程 Web 服务接收一个响应 XML 文档。\n\n\
  **6.** 应用程序解析生成的 XML 文档，以获取应用程序或用户感兴趣的值（通常称为响应的*解组*）。\n\n**7.** 应用程序使用从解析生成的 XML\
  \ 文档中获得的数据。\n\n因此，Web 服务为 Java ME 开发人员提出了三个常见的编程任务，这些任务可以通过添加新的 API 在多个应用程序中进行泛化：\n\
  \n•   使用 HTTP 与远程服务器交互（如第 12 章所述，GCF 以及 `HttpConnection` 和 `HttpsConnection` 处理此问题）\n\
  •   从 Java 对象生成 XML 文档——通常表示为 `String` 的实例\n•   解析 XML 文档以获取值，并将这些值放入一个或多个 Java\
  \ 对象的字段中\n\nGCF 很好地解决了第一个问题；此外，还有对在 J2ME Web 服务规范中封装 GCF 功能的支持，我将在本章后面的“介绍 J2ME\
  \ Web 服务规范”一节中详细介绍。\n\nJava ME 中的 XML 生成——第二个问题——通常采用两种形式之一：使用模板组件和 `StringBuffer`\
  \ 类的实例进行简单拼接，或者使用支持 SOA 的 J2ME Web 服务规范。我将在本章的后续部分讨论这些内容。您可以通过两种方式解决第三个问题——解析 XML：要么依赖可选的\
  \ Web 服务规范，要么在您的应用程序中包含一个轻量级解析器，如 `kXML`。\n\nXML 解析器有三种类型：*DOM* 解析器、*推送*解析器和*拉取*解析器。DOM\
  \ 解析器解析整个文档并返回一个文档树的实例，允许您使用其方法查询树中的元素；它们在实现和表示文档树方面通常代价高昂，并且通常不在 Java ME 环境中使用。推送解析器使用\
  \ XML 事件（例如标签的定义）调用客户端接口的方法；本质上，它们将 XML 中的数据“推送”到为解析具有特定标签的 XML 而编写的特定解析器类。拉取解析器的工作方式相反；扫描\
  \ XML 的代码调用 XML 解析器的方法来获取单个标签和其他信息。正如您在本章后续部分所见，推送和拉取模型都可用于 Java ME，选择哪种主要取决于您要使用的解析器的可用性。在实践中，我认为可以公平地说，拉取解析器可能比推送解析器使用稍少的内存；然而，给定其中一种，您可以轻松地编写另一种（如我将在本章后面所示），因此它们本质上是等效的，只是名称和与它们交互的代码结构不同。\n\
  \n**在 Java ME 应用程序中生成 XML**\n\n在 Java ME 应用程序中生成 XML 是一项简单但繁琐的任务，使用 `StringBuffer`\
