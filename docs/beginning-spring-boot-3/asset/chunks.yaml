    **排序**


    当你有两个或多个关联实体，且其中一个实体包含另一个实体的元素列表时，JPA 或 Hibernate 执行查询时不会考虑顺序。你有两个选择：在应用程序中对元素进行排序，或者将排序责任委托给数据库。


    让我们修改目录应用程序，在国家（country）和州（state）之间建立双向关系，以便更详细地了解情况并学习如何解决（参见清单 4-11）。Country
    实体添加了一个类型为 State 的 List 属性。


    第 4 章 持久化与领域模型


    ***清单 4-11.*** 添加双向关系


    @Entity


    @Table(name= "country")


    public class Country implements Serializable {


