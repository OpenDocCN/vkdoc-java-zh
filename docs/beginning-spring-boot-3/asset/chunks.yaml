    • Redis 是单线程的，并且可以水平扩展。此外，它原生支持集群实例。


    图 7-1 反映了这些优势。


    ***图 7-1.** 不同的数据类型*


    Redis 有多种用于持久化和检索信息的架构；根据您的方法，所有这些架构都可以将信息保存在内存中，并保存到磁盘上。让我们简要地了解一下这些类型。


    • **单一数据库**：一个唯一的实例接收所有请求。如果发生故障，则无法访问信息（见图 7-2）。当实例健康时，信息取决于其持久化策略。


