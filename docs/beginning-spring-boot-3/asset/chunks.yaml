    让我们以非响应式方式将 Cassandra 依赖项添加到 **api-catalog** 中，因为该数据库（Spring Boot 提供的另一种非关系型数据库）支持这两种方式，这将在下一章中介绍。同样，不要在依赖项中包含版本号（见清单
