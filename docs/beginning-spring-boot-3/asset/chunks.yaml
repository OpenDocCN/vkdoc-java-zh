    \ constructors, setters, and getters for all the attributes`\n`*// Override the\
    \ hashcode and equals*`\n`}`\n\nListing 4-6 reveals the following.\n\n- The name\
    \ of the columns could be the same or not; for example, the `timezone` attribute\
    \ in the table is declared differently.\n- If you want to declare a default value\
    \ in the column, you can do it as the attribute `enabled` assigned a value in\
    \ the declaration. Another option is to use the `columnDefinition` property with\
    \ the specification of the default value.\n\n**Table 4-1.** Definition of the\
    \ Default Value\n\n| The Default Value in the Attribute | The Default Value in\
    \ the Annotation |\n| --- | --- |\n| `@Column(name = \"enabled\", nullable = false)`<br>`private\
    \ Boolean enabled = Boolean.TRUE;` | `@Column(name = \"enabled\", nullable = false,\
    \ columnDefinition = \"boolean default true\")`<br>`private Boolean enabled;`\
    \ |\n\nThe `@ColumnDefinition` annotation does the same, but it is directly connected\
    \ with Hibernate. I recommend always using the annotations that JPA provides because\
    \ if Spring Data JPA uses another vendor in the future, parts of your code may\
    \ no longer compile.\n\n- The `length` property is only valid with the columns\
    \ that save a string. The columns are numeric, so you can indicate the minimum\
    \ and maximum values that support using the annotations connected with Spring\
    \ Validator.\n- The `nullable` property is valid only with the primitive’s wrappers.\n\
    \n**Tip** if you need to declare that a column has a unique value, there is an\
    \ attribute `\"unique\"` in the annotation. By default, the property’s value is\
    \ `false`, so you need to declare explicitly that the column is unique. For example,\
    \ the code of a country could be unique because it represents unambiguously and\
    \ only one country. For now, you do not include this property because this case\
    \ is used to see how to introduce changes in an existing table.\n\nThe main problem\
    \ when you define an entity of an existing table is which is the correct type\
    \ so let’s discuss how to define each ANSI SQL type in a Java class.\n\n**Primitive\
    \ Types**\n\nTable 4-2 describes the basic correlations between the SQL types\
    \ and Java types. In Java, you can use the primitive type or the wrapper; for\
    \ example, instead of using `long`, you can use `java.lang.Long`.\n\n**Table 4-2.**\
    \ Equivalence Between the SQL Type and Java Type\n\n| ANSI SQL Type | Java Type\
    \ |\n| --- | --- |\n| `BIGINT` | `long`, `java.lang.Long` |\n| `BIT` | `boolean`,\
    \ `java.lang.Boolean` |\n| `CHAR` | `char`, `java.lang.Character` |\n| `CHAR`\
