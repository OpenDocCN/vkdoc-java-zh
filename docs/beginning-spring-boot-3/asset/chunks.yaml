    **What Is Reactive Access?**


    In a traditional application, each request allocates a thread for a period of
    time to


    execute certain operations; this approach is known as the thread-per-request model.


    During this time, the process consumes memory and CPU exclusively. Figure [11-2](#index_split_003.html#p276)
    shows how a certain number of requests access the database simultaneously, wasting
    resources


    such as memory/CPU until each operation returns a result. Reactive programming
    is


    an alternative that addresses problems like the proper use of resources, which
    in turn


    provides the ability to improve scalability.


    ***Figure 11-2.** A reactive approach to accessing the database*


    To understand this problem in another way, imagine that you have the chance to


    receive a thousand requests simultaneously. Your application can’t be scaled for
    factors


    like needing more resources or the need to increase the size of the pool of connections.


    If you reduce the amount of time each resource is being used, you don’t need to
    make


    significant changes to your infrastructure or application to return results.


    The idea behind reactive programming is not to block a thread. Instead, the


    application receives the request like an event with a callback. This concept was
    popular


    many years ago in other languages like JavaScript. It implied waiting until to
    have


    something returned and using the callback to send a notification to the owner
    of the


    request and the result of the operation.


    Chapter 11 reaCtive aCCess


    During this process, the application''s thread can be used for another request.


    The information could be returned as a stream of information so you can execute


    different things when you receive the response instead of waiting until you have
    all the


    information. If an error occurs during the streaming process, the operation finishes,


    which makes sense because the same can happen when you try to do the same in the


    blocking method.


    In Spring Boot, the framework has a project for general reactive programming,
    called


    Spring WebFlux, which appears with the use of two publishers of events in the
    stream of


    information.


