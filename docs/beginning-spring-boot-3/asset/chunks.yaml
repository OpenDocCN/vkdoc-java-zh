- fmt: "# Flyway\n\nFlyway[^3] is one of the libraries that implement the versioning\
    \ of the changes, offering the possibility to run as a command line in various\
    \ operating systems, like Windows, macOS, and Linux. Also, you can include it\
    \ in your Java application using Maven/Gradle.\n\n**Note**: the tool works only\
    \ with version 8 or up of Java but does not mention that it has support for versions\
    \ 14 or up. But in the official repository, there are bugs associated with version\
    \ 17, so check the latest version of this library because there is a chance that\
    \ it solves some reported issues.\n\nThis tool offers two alternatives: community\
    \ and teams edition. The main differences between both alternatives are the number\
    \ of features they offer; for example, the team’s edition provides the following:\n\
    \n- A mechanism to undo the changes in a database (You have a way to indicate\
    \ the order of the undoing of a certain number of scripts.)\n- A way to simulate\
    \ the changes before doing it in the database to check if everything is okay with\
    \ your scripts\n- A large number of callbacks or hooks\n- The possibility of storing\
    \ the scripts in AWS or GCP\n\nThe tool offers a default naming structure to recognize\
    \ the types of operations, but you can customize the pattern. The file name must\
    \ have four parts: the first indicates the type of operation, the second states\
    \ the version, the third briefly describes the file, and the fourth is the suffix,\
    \ which in most cases is `.sql`. You can see the structure of the name files of\
    \ the tool on the Figure 6-3[^figure].\n\n[^3]: [https://flywaydb.org/](https://flywaydb.org/)\n\
    \n![Figure 6-3. Structure for naming an operation](index-182_1.png)\n\nThe suffix\
    \ could be `.sql`, but you can write the sentence in a Java class that extends\
    \ from `BaseJavaMigration`[^4]. In both cases, Flyway generates a table called\
    \ `flyway_schema_history`, which contains all the information of the executed\
    \ scripts. You can imagine this table as the history of a git repository.\n\n\
    **Note**: in this book’s source code, the files related to the database structure\
    \ follow this name pattern because you include it in the code of the microservice\
    \ catalog.\n\n```\n./\n├── chapter 1\n├── chapter 2\n├── chapter X\n├── databases\n\
    │   ├── docker\n│   │   ├── cassandra\n│   │   │   └── docker-compose.yml\n│ \
    \  │   ├── mongodb\n│   │   │   └── docker-compose.yml\n│   │   ├── neo4j\n│ \
    \  │   │   └── docker-compose.yml\n│   │   ├── postgres\n│   │   │   └── docker-compose.yml\n\
    │   │   └── redis\n│   │       ├── replication\n│   │       │   └── docker-compose.yml\n\
    │   │       └── single-node\n│   │           └── docker-compose.yml\n│   └── scripts\n\
    │       ├── mysql\n│       │   ├── V1.0__init_database.sql\n│       │   ├── V1.1__insert_rows.sql\n\
    │       │   ├── V2.0__audit_tables(run on chapter 4).sql\n│       │   └── V3.0__version_columns(run\
    \ on chapter 5).sql\n│       └── postgres\n│           ├── V1.0__init_database.sql\n\
    │           ├── V1.1__insert_rows.sql\n│           ├── V2.0__audit_tables(run\
    \ on chapter 4).sql\n│           └── V3.0__version_columns(run on chapter 5).sql\n\
    └── README.md\n```\n\n[^4]: [https://flywaydb.org/documentation/usage/api/javadoc/org/flywaydb/core/api/migration/BaseJavaMigration](https://flywaydb.org/documentation/usage/api/javadoc/org/flywaydb/core/api/migration/BaseJavaMigration)\n\
    \nTo execute scripts in the database, you need to indicate a user with the password\
    \ with the right access to execute certain operations. To hide this information\
    \ from everyone, someone on your DevOps teams could add the user/password in the\
    \ environments as a variable. Hence, you reduce the risk that something could\
    \ happen if someone obtains this information.\n\nLastly, Flyway offers a series\
    \ of commands that could be helpful, like `validate` to check if all the scripts\
    \ are executed correctly and `clean`, which cleans all the information that exists\
    \ in the schema (only use it in test environments).\n\n# Liquibase\n\nLiquibase\
    \ offers the possibility to use it in separate operating systems and Java projects\
    \ that use Maven/Gradle. Also, the tool allows you to use it in CI/CD tools, including\
    \ GitHub Actions[^5] and Jenkins[^6].\n\n[^5]: [https://docs.liquibase.com/workflows/liquibase-community/setup-github-actions-workflow.html](https://docs.liquibase.com/workflows/liquibase-community/setup-github-actions-workflow.html)\n\
    [^6]: [https://docs.liquibase.com/workflows/liquibase-community/using-the-jenkins-pipeline-stage-with-spinnaker.html](https://docs.liquibase.com/workflows/liquibase-community/using-the-jenkins-pipeline-stage-with-spinnaker.html)\n\
    \nLiquibase has three editions: Open Source, Pro, and Enterprise. It has a UI\
    \ interface that provides reports and monitoring of the execution of the changes.\
    \ You can roll back one or a set of changes in your database. It detects malicious\
    \ scripts in your database and alerts you.\n\nThis tool has a lot in common with\
    \ Flyway, like versioning changes, saving information on the changes in a particular\
    \ table, and having separate versions.\n\nThe following are the main differences\
    \ between Liquibase and Flyway:\n\n- Liquibase also supports non-relational databases\
    \ like MongoDB and Cassandra.\n- Flyway can write scripts using a variety of formats,\
    \ such as JSON, YML, SQL, or XML.\n- You can add labels or authors of the scripts,\
    \ which allow you to execute certain scripts; for example, if you want to execute\
    \ the scripts only in test environments or vice-versa.\n- You can take a snapshot\
    \ of the database in one environment and compare it with another.\n\n## Which\
    \ Library Does the Versioning?\n\nThe general answer to this question is “it depends\
    \ on the context” because there is no answer that covers all the scenarios. Both\
    \ tools have more or less the same basic features that cover the most relevant\
    \ scenarios and have support in Spring Boot. The only two libraries in Spring\
    \ Initializr that can be included in database migration are Flyway and Liquibase.\
    \ If you want to version the changes in non-relational databases, the only option\
    \ is Liquibase. Flyway did not have support when this book was written.\n\nThe\
    \ performance of each of these tools is very similar. There is no Internet benchmark\
    \ that shows the result of which of them uses fewer resources or quick migrations.\n\
    \n## Integrating Libraries in Spring Boot\n\nSpring Boot 2.0.0 and higher support\
    \ Flyway and Liquibase. You can create a new project, find the dependencies in\
    \ Spring Initializr, or use your preferred IDE plugin, such as IntelliJ. You need\
    \ to do the following steps to integrate any of these tools:\n\n1. Add a dependency\
    \ to configuration management tools like Maven or Gradle.\n2. Include the scripts\
    \ in a location, which in most cases is `/src/main/resources`.\n3. Include the\
    \ modifications in `application.yml` to indicate all the basic configurations\
    \ and define any custom configurations.\n\nLet’s examine how to implement these\
    \ steps on each versioning tool.\n\n### Liquibase\n\nYou need to add the dependency\
    \ of Liquibase in your `pom` file without specifying the version because parent-pom\
    \ in Spring Boot includes the correct version compatible with Liquibase (see Listing\
    \ 6-1[^listing]).\n\n***Listing 6-1.*** Liquibase Dependencies\n\n```xml\n<dependencies>\n\
    \    <dependency>\n        <groupId>org.liquibase</groupId>\n        <artifactId>liquibase-core</artifactId>\n\
    \    </dependency>\n    <!-- Other dependencies -->\n</dependencies>\n```\n\n\
    The next step is creating the files to populate the database you used in the previous\
    \ chapters to check concepts. Go to your project and create two folders inside\
    \ `/src/main/`.\n\n[^figure]: [Figure 6-3](#index_split_002.html#p182)\n[^listing]:\
    \ [Listing 6-1](#index_split_002.html#p185)"
