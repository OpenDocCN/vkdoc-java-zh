- fmt: 'properties, perhaps information in the repositories, and nothing more. The
    time to migrate from one database to another is shorter using Spring Data, and
    you have a unique way to access databases.


    Spring Data has groups of modules; some are across all types of databases, and
    others are for certain types. Let’s look at the most relevant of these modules.


    - **Spring Data Commons** provides a metadata model for persisting Java classes
    in a specific database using the repositories interfaces in the next section.

    - **Spring Data REST** is on top of Spring Data modules and helps you to create
    a RESTful API using the repositories associated with the entities.

    - **Spring Data JPA** provides an implementation of JPA using repositories which
    are an interface with support for all the CRUD operations in most cases. Creating
    a custom repository with a specific logic to access the database is possible if
    you need it.

    - **Spring Data JDBC** provides an implementation for accessing a database using
    JDBC using repositories without more JPA capabilities, like lazy-loading and cache.

    - **Spring Data for Apache Cassandra** supports all the CRUD operations and TTL
    definitions in the Cassandra entities. It also supports the configuration of multiple
    instances of a database.

    - **Spring Data MongoDB** offers the possibility to execute all the operations
    in a MongoDB database using the repositories or `MongoTemplate`, which is another
    way to execute the CRUD operations.

    - **Spring Data Neo4j** supports reactive and imperative applications using Neo4j
    Graph Database.

    - **Spring Data Redis** supports accessing Redis databases to save a simple value
    or something more complex like an object. Also, it supports using the Redis with
    a Sentinel mechanism responsible for monitoring and exposing a service with high
    availability.


    Figure 3-1 shows other modules not covered in the previous explanation but connected
    with Spring Data. These modules are covered in more detail later in this book.


    ***Figure 3-1.** Spring Data modules structure*


    The source code of all the projects of Spring Data is available to download from
    the Spring GitHub repository.


    ## How Does Spring Data Work?


    Chapter 1 discussed the repository pattern, which provides a way to access the
    database and execute any CRUD operations, but what does Spring Data do behind
    the scenes? How to translate the result of the query into an object? If it’s the
    first time you use Spring Data and read that some interfaces provide all the operations
    to access the database, you may think it is magical. But the truth is Spring Data
    dynamically creates a lot of classes in runtime to transform the interface into
    classes. Think of this approach as a proxy, using the interface instead of the
    classes that access the database.


    ## Spring Data Code Example'
