  trans: "\n如今，使用 XML 声明映射已不常见，但向后兼容性使得大多数 JPA 实现仍可使用它。\n\n在学习注解之前，你已经创建了一个代表数据库中表的实体。如图\
    \ 4-1 所示，灰色背景的表是应用程序中唯一的表，因此让我们将所有实体创建为普通的 POJO 类，不添加任何注解，因为你将在本章各节中逐步引入它们。\n\n\
    ***图 4-1.** 整个数据库结构概览*\n\n第 4 章 持久化与领域模型\n\n这个数据库模型很常见。当用户完成结账以指定收货地址时，或者当用户需要查找航班时，你可以在大多数电商网站或旅行社网站上看到这类信息。其理念是模拟一个真实场景，但不会过于复杂，因为本书的目标是让你理解\
