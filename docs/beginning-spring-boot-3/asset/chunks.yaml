- fmt: "Skipping auto-registration\n\n`2022-07-08 01:04:09.003 WARN 352046 --- [ restartedMain]\
    \ liquibase.hub : Skipping auto-registration`\n\n`2022-07-08 01:04:09.048 INFO\
    \ 352046 --- [ restartedMain] liquibase.changelog : Custom SQL executed`\n\n`2022-07-08\
    \ 01:04:09.050 INFO 352046 --- [ restartedMain] liquibase.changelog : ChangeSet\
    \ db/migrations/V1.0__init_database.sql::raw::includeAll ran successfully in 42ms`\n\
    \nThe next time you run the application and all the changes are in the database,\
    \ the number of logs decreases and the time to start up the application too because\
    \ it locks the database and only executes the validations of the changes (see\
    \ Listing 6-5).\n\n**Listing 6-5.** Logs That Appear When You Run the Second Time\n\
    \n`2022-07-08 01:07:52.089 INFO 354638 --- [ restartedMain] liquibase.lockservice\
    \ : Successfully released change log lock`\n\n`2022-07-08 01:07:52.093 INFO 354638\
    \ --- [ restartedMain] liquibase.lockservice : Successfully acquired change log\
    \ lock`\n\n## Flyway\n\nThis tool mostly follows the same steps as before, but\
    \ the configuration in Spring Boot may be simpler, depending on the approach that\
    \ you want to use. Flyway has various ways to execute a migration.\n\n- It includes\
    \ only the dependency in the `pom` file so that when the application starts up,\
    \ it executes all the scripts and validates the consistency of the database.\n\
    - It includes a plugin in the `pom` file and executes a command in the same way\
    \ you use the CLI interface.\n\nTo reduce the complexity, use the first option,\
    \ which implies that you only include the dependency and delegates the responsibility\
    \ to execute the command to Spring Boot. Let's add the dependency that appears\
    \ in Listing 6-6.\n\n**Listing 6-6.** Flyway Dependencies\n\n```\n<dependencies>\n\
    \    <dependency>\n        <groupId>org.flywaydb</groupId>\n        <artifactId>flyway-core</artifactId>\n\
    \    </dependency>\n    <!-- Other dependencies -->\n</dependencies>\n```\n\n\
    After that, create a new folder in `src/main/resources/db/migration` and paste\
    \ the SQL files that you used in the previous chapter inside the folder. The structure\
    \ will have an aspect like Figure 6-5.\n\n![](index-190_1.png)\n\n**Figure 6-5.**\
    \ Project structure after including files\n\nThere are many options to configure.\
    \ Most of them have default values, like the username/password and the URL, which,\
    \ if not indicated, takes the information from the data source. Listing 6-7 introduces\
    \ `application.yml`, a basic configuration that indicates where the files are\
    \ located.\n\n**Listing 6-7.** Tool Configurations\n\n```\nspring:\n  # Other\
    \ configuration of Spring\n  flyway:\n    sql-migration-prefix: V\n    sql-migration-separator:\
    \ __ # The pattern that you use to separate the version/description\n    sql-migration-suffixes:\
    \ .sql\n    locations: classpath:db/migration # Where the files are located\n\
    \    repeatable-sql-migration-prefix: R\n    baseline-on-migrate: true\n    baseline-version:\
    \ 0 # To indicate which is the first script to use it\n```\n\nThe last step in\
    \ using this tool is to run your `api-catalog` application. Before you delete\
    \ all the tables in the database (not the schema, because the tool cannot create\
    \ a schema, just tables or indexes), tell Flyway to create and populate the database\
    \ correctly to check if the scripts were executed or not.\n\nWhen you execute\
    \ the application, you see some of the logs from Listing 6-8, which give information\
    \ about what Flyway did. If something happens during the migration, the console\
    \ displays all the information related to the error.\n\n**Listing 6-8.** Logs\
    \ That Appear When Run the First Time\n\n```\n2022-07-08 00:34:06.088 INFO 336864\
    \ --- [ restartedMain] o.f.core.internal.command.DbMigrate : Migrating schema\
    \ \"public\" to version \"2.0 - audit tables\"\n2022-07-08 00:34:06.099 INFO 336864\
    \ --- [ restartedMain] o.f.core.internal.command.DbMigrate : Migrating schema\
    \ \"public\" to version \"3.0 - version columns\"\n```"
