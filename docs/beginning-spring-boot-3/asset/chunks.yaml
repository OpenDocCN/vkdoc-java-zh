    • Neo4j 中的**属性** 代表一个键值对，用于存储关于一个节点及其关系的信息。例如，在 api-catalog 中，一个属性可以是国家代码或描述。Neo4j
    支持的部分属性类型包括字符串、浮点数、长整型、日期（所有变体）和点。


