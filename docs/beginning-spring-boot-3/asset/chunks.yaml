  trans: "\n// 这将执行所有测试，忽略所有带有 `@ignore` 注解的测试文件。**.features**\n\n}\n\n}\n\n之后，将所有文件放入\
    \ **examples** 文件夹，并创建一个名为 **app/currency** 的新文件夹，以构建一个代表你正在测试内容的正确结构。下一步是在 **src/test/java/app/currency**\
    \ 中创建一个名为 **get-currency.feature** 的文件，其中包含所有场景（参见清单 13-6）。\n\n***清单 13-6.***\
    \ 场景的结构\n\nFeature: 货币操作\n\nBackground:\n\n* url AppUrl\n\n* def get_currency_response\
    \ = read('./get-currency-response.json')\n\nScenario: 获取某一种货币的所有信息\n\nGiven path\
    \ 'currency/1'\n\nWhen method GET\n\nThen status 200\n\nAnd match response ==\
    \ get_currency_response\n\n测试的结构很简单，没有任何奇怪之处。AppUrl 指的是你在 karate-config.js 上下文中定义的变量。**get_currency_response**\
    \ 变量包含了另一个文件中的所有信息。创建它是为了减少出现的内容数量，因为你可以在一个文件中包含多个场景（参见清单 13-7）。\n\n第 13 章 检测性能问题\n\
    \n***清单 13-7.*** 端点的预期响应\n\n{\n  \"id\":1,\n  \"code\":\"ARS\",\n  \"description\"\
    :\"Peso argentino\",\n  \"enable\":null,\n  \"decimalPlaces\":2,\n  \"symbol\"\
    :\"$\",\n  \"audit\":{\n    \"createdOn\":\"2022-07-26T10:52:46.836552\",\n  \
    \  \"updatedOn\":null\n  },\n  \"version\":0\n}\n\n现在，要检查一切是否正常工作的最后一步是运行 **api-catalog**，并在新项目的目录中运行\
    \ **mvn test** 命令。控制台会显示有关已执行测试的信息。\n\nfeature: classpath:app/currency/get-currency.feature\n\
    scenarios: 1 | passed: 1 | failed: 0 | time: 0.2407\nKarate version: 1.2.0\n======================================================\n\
    elapsed: 2.20 | threads: 1 | thread time: 0.24\nfeatures: 1 | skipped: 0 | efficiency:\
    \ 0.11\nscenarios: 1 | passed: 1 | failed: 0\n======================================================\n\
    \n所有这些信息都很棒，但你并没有在应用程序中进行性能测试，只进行了这一次测试，所以下一步是向你的应用程序添加 Gatling 支持。让我们对 pom 文件进行修改，以便在配置文件中运行\
    \ Karate 测试或 Gatling 测试，因此删除依赖项和构建部分的所有内容，替换为以下代码块（参见清单 13-8）。\n\n第 13 章 检测性能问题\n\
    \n***清单 13-8.*** Pom 文件修改\n\n<profiles>\n  <profile>\n    <id>karate</id>\n  \
    \  <dependencies>\n      <dependency>\n        <groupId>com.intuit.karate</groupId>\n\
    \        <artifactId>karate-junit5</artifactId>\n        <version>${karate.version}</version>\
    \ <!-- 默认版本为 1.2.0 -->\n        <scope>test</scope>\n      </dependency>\n   \
    \ </dependencies>\n    <build>\n      <testResources>\n        <testResource>\n\
    \          <directory>src/test/java</directory>\n          <excludes>\n      \
    \      <exclude>**/*.java</exclude>\n          </excludes>\n        </testResource>\n\
    \      </testResources>\n      <plugins>\n        <plugin>\n          <groupId>org.apache.maven.plugins</groupId>\n\
    \          <artifactId>maven-compiler-plugin</artifactId>\n          <version>${maven.compiler.version}</version>\n\
    \          <configuration>\n            <encoding>UTF-8</encoding>\n         \
    \   <source>${java.version}</source> <!-- 默认版本为 8 -->\n            <target>${java.version}</target>\n\
    \            <compilerArgument>-Werror</compilerArgument>\n          </configuration>\n\
    \        </plugin>\n        <plugin>\n          <groupId>org.apache.maven.plugins</groupId>\n\
    \          <artifactId>maven-surefire-plugin</artifactId>\n          <version>${maven.surefire.version}</version>\n\
    \          <configuration>\n            <argLine>-Dfile.encoding=UTF-8</argLine>\n\
    \          </configuration>\n        </plugin>\n      </plugins>\n    </build>\n\
    \  </profile>\n  <profile>\n    <id>gatling</id>\n    <dependencies>\n      <dependency>\n\
    \        <groupId>com.intuit.karate</groupId>\n        <artifactId>karate-gatling</artifactId>\n\
    \        <version>${karate.version}</version>\n        <scope>test</scope>\n \
    \     </dependency>\n    </dependencies>\n    <build>\n      <plugins>\n     \
    \   <plugin>\n          <groupId>net.alchim31.maven</groupId>\n          <artifactId>scala-maven-plugin</artifactId>\n\
    \          <version>4.5.6</version>\n          <executions>\n            <execution>\n\
    \              <goals>\n                <goal>testCompile</goal>\n"
- fmt: "# Chapter 13 Detecting Performance Issues\n\nAfter that, you can execute the\
    \ Karate scenarios as a common test or a performance test indicating the profiles.\
    \ For now, let’s continue with the next step: create a file called `CurrencySimulation.scala`\
    \ in the same directory where the `get-currency.feature` file is located, which\
    \ is `src/test/java/app/currency`. This file contains the Karate test and the\
    \ number of users doing the same action (see Listing [13-9](#index_split_004.html#p326)).\n\
    \n**Listing 13-9.** Gatling Simulation Using the Karate Scenario\n\n```scala\n\
    package app.currency\n\nimport com.intuit.karate.Runner\nimport com.intuit.karate.gatling.PreDef._\n\
    import io.gatling.core.Predef._\nimport scala.concurrent.duration._\n\n//Define\
    \ the simulation which imply the URL, how many request during a period\nclass\
    \ CurrencySimulation extends Simulation {\n\n  def urlPattern = \"GET /api/catalog/currency/1\"\
    \n\n  val protocol = karateProtocol(\n    \"/currency/{id}\" -> Nil\n  )\n\n \
    \ protocol.nameResolver = (req, ctx) => req.getHeader(\"karate-name\")\n\n  //Which\
    \ is the environment to run the test\n  protocol.runner.karateEnv(\"dev\")\n\n\
    \  //The name of the file and the scenario to run\n  val get = scenario(\"Get\
    \ all the information about one currency\").exec(karateFeature(\"classpath:app/currency/get-currency.feature\"\
    ))\n\n  setUp(\n    //The number of users that receive the endpoint for a period\
    \ of time\n    get.inject(rampUsers(10) during (5 seconds)).protocols(protocol)\n\
    \  ).assertions(\n    //The conditions that you want to validate\n    details(urlPattern).responseTime.percentile3.lte(3000)\n\
    \  )\n}\n```\n\nThis simulation is basic, but you can combine various scenarios,\
    \ like creating multiple currencies at the same time, which is defined in `rampUsers`\
    \ in Listing [13-8](#index_split_004.html#p323), so that you obtain the information\
    \ for another one. The definition of the complexity of the situation is your decision\
    \ and depends on the complexity of the actions that one endpoint performs.\n\n\
    The last step is to run the performance test using the `mvn test -P gatling` command,\
    \ which uses only the simulation classes that you defined previously. If everything\
    \ works fine, you see on the console the results of the execution of the test.\
    \ The Gatling profile was defined in Listing [13-7](#index_split_004.html#p322),\
    \ so the Maven command works fine.\n\n```\nGenerating reports...\n=========================================================================\n\
    ---- Global Information -------------------------------------------------\n> request\
    \ count 10          (OK=10     KO=0     )\n> min response time 4       (OK=4 \
    \     KO=-     )\n> max response time 27      (OK=27     KO=-     )\n> mean response\
    \ time 15     (OK=15     KO=-     )\n> std deviation 10          (OK=10     KO=-\
    \     )\n> response time 50th percentile 8   (OK=8      KO=-     )\n> response\
    \ time 75th percentile 27  (OK=27     KO=-     )\n> response time 95th percentile\
    \ 27  (OK=27     KO=-     )\n> response time 99th percentile 27  (OK=27     KO=-\
    \     )\n> mean requests/sec 2       (OK=2      KO=-     )\n---- Response Time\
    \ Distribution ----------------------------------------\n> t < 800 ms        \
    \     10 (100%)\n> 800 ms < t < 1200 ms    0 (  0%)\n> t > 1200 ms           \
    \  0 (  0%)\n> failed                  0 (  0%)\n=========================================================================\n\
    Reports generated in 0s.\nPlease open the following file: /home/apress-spring-data/chapter\
    \ 13/karate-\n```"
