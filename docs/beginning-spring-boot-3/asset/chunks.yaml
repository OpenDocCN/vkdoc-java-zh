    ## Appendix F: Further Reading


    - [***Spring Boot Persistence Best Practices***](https://link.springer.com/book/10.1007/978-1-4842-5626-8)
    by Anghel Leonard (Apress, 2020). This book covers the most relevant topics to
    improve the quality and the performance of the persistence of relational databases.
    Most of the concepts relate to relational databases, but there are aspects that
    you can apply to non-relational databases.

    - [***Learning Spring Boot 3.0***](https://www.amazon.com/Learning-Spring-Boot-3-0-production-grade/dp/1803233303)
    by Greg L. Turnquist (Packt, 2023). This book covers most of the relevant topics
    in the new version of Spring Boot, such as messaging and reactive applications.

    - [**Laurentiu Spilca’s channel on Youtube**](https://www.youtube.com/c/laurentiuspilca).
    This channel features videos on relevant Spring topics, like security, performance,
    and basic tutorials. Laurentiu is one of the most recognized speakers and authors
    on Spring.


    ### Relational Databases


    - [***Beginning SQL Queries***](https://link.springer.com/book/10.1007/978-1-4842-1955-3)
    by Clare Churcher (Apress, 2008). This book covers all the basic aspects of SQL,
    from how to write operations (insert, update, select, and delete) to the efficiency
    or performance of queries.


    ### Non-Relational Databases


    - [***Cassandra: The Definitive Guide, 3rd Edition***](https://learning.oreilly.com/library/view/cassandra-the-definitive/9781098115159/)
    by Jeff Carpenter, Eben Hewitt (O’Reilly, 2020). The author shows all the advantages
    this database provides instead of other non-relational databases. Also, this book
    covers topics that are not common, like monitoring, maintenance, and scaling.

    - [***Beginning Neo4j***](https://link.springer.com/book/10.1007/978-1-4842-1227-1)
    by Chris Kemper (Apress, 2015). This book is a basic introduction to Graph databases
    and how to implement them in Neo4j.

    - [***Redis in Action***](https://www.manning.com/books/redis-in-action?query=Redis)
    by Josiah Carlson (Manning, 2013). This book explains the basic use of Redis,
    building examples of information you can save into the database. The book also
    covers other aspects related to performance and scalability.

    - [***MongoDB Performance Tuning***](https://link.springer.com/book/10.1007/978-1-4842-6879-7)
    by Guy Harrison and Michael Harrison (Apress, 2021). This book covers the basic
    aspects of queries and how to improve performance. There are other topics, like
    creating a cluster with different instances and monitoring the use of the resources
    of the database.'
