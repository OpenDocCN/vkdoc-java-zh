- fmt: '# Eclipse


    `Eclipse` is another IDE option for Java development that most old developers
    know.


    Most plugins are free and have a vast community of developers who frequently update
    them and a large number of Spring’s plugins. The most relevant ones appear on
    the Spring website. If you use this tool, please follow the instructions to install
    the plugins.


    Figure B-2 shows how Eclipse looks like.


    2 [https://www.eclipse.org/downloads/](https://www.eclipse.org/downloads/)


    3 [https://spring.io/tools](https://spring.io/tools)


    ![](index-357_1.png)


    **Figure B-2.** Eclipse with an imported project


    # NetBeans


    `NetBeans` develops applications using various programming languages. There is
    no longer a large community of users because other options cover most developers’
    needs.


    Some developers use it as they start to learn their first language. Figure B-3
    shows how Netbeans looks like.


    4 [https://netbeans.apache.org/](https://netbeans.apache.org/)


    ![](index-358_1.jpg)


    **Figure B-3.** NetBeans with an imported project


    # REST Tools


    ## Postman


    `Postman` is a tool that tests REST endpoints where you can have variables representing
    environments or another thing like the actual date. You can use it to execute
    tests at a specific time. Figure B-4 shows a little overview of what the tool
    looks like.


    5 [https://www.postman.com/](https://www.postman.com/)


    ![](index-359_1.jpg)


    **Figure B-4.** Insomnia executes a call to an API


    ## Insomnia


    `Insomnia` is a tool for requests in REST endpoints. One of the biggest difference
    with Postman is this tool support multiple protocols like REST, gRPC, SOAP, and
    GraphQL. The feature is similar to Postman and the user interface but can have
    at least two themes. Figure B-5 shows a little overview of what the tool looks
    like.


    6 [https://insomnia.rest/](https://insomnia.rest/)


    ![](index-360_1.jpg)


    **Figure B-5.** Insomnia executes a call to an API


    ## cURL


    `cURL` is a simple command-line tool that you can use to call REST endpoints.
    You can use this tool as an alternative. It’s available for most common operating
    systems.


    # Databases


    An example of each type of database was covered in this book; the approach is
    similar.


    ## Cassandra


    ### DataStax Studio


    `DataStax Studio` was created and is maintained by developers who created Cassandra
    and provide the chance to install it on all the operating systems or use Docker.
    This tool’s features include exporting information in multiple formats, exporting
    the queries or the process to import in another machine, and an intelligent editor
    that validates the queries. Figure B-6 shows a little overview of what the tool
    looks like.


    7 [https://curl.se/download.html](https://curl.se/download.html)


    8 [https://cassandra.apache.org/_/index.html](https://cassandra.apache.org/_/index.html)


    9 [https://downloads.datastax.com/#studio](https://downloads.datastax.com/#studio)


    ![](index-361_1.jpg)


    **Figure B-6.** DataStax configuration page


    ## MongoDB


    ### Compass


    `Compass` is the official solution to connect, query, optimize, and analyze the
    performance in MongoDB. It offers the possibility to install on multiple operating
    systems and has a simple user interface. It also provides a good interface for
    seeing the impact of executing each query.'
