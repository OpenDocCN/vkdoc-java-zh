- fmt: '# Appendix D: Install and Configure a Relational Database


    ***Figure D-3.** Active connections in MySQL Workbench*


    The first thing that you need to do is create a new schema that contains all the
    tables.


    Click the plus icon. When the form appears, enter the name of the database. Finally,
    click the `Apply` button to create an empty schema, which you populate with different
    tables in the next step.


    ![](index-377_1.jpg)


    ***Figure D-4.** Create a new schema*


    **Step 5: Load the Data**


    The last step of this process is to create the structure of the schema and populate
    it with the information you use in the chapters on relational databases. It is
    in the code repository folders (`github.com/apress/beginning-spring-data`). Each
    of them is associated with one chapter. The `databases` folder is where you can
    find all the scripts to execute (see Figure [D-5](#index_split_004.html#p378)).


    ![](index-378_1.png)


    ![](index-378_2.png)


    ***Figure D-5.** Source repository with the scripts of the database*


    There are several files inside this folder. Execute each of them by version number
    (see Figure [D-6](#index_split_004.html#p378)). The first script to execute is
    `V1.0_init_database.sql`.


    ***Figure D-6.** Scripts that need to be executed in the database*


    The final step is to open each script and execute it. You can drag and drop the
    file inside the MySQL Workbench to do this. The application opens the file, showing
    the content. After that, you only need to click the button to run all the scripts
    into the database and repeat this process for each script (see Figure [D-7](#index_split_004.html#p379)).


    ![](index-379_1.jpg)


    ***Figure D-7.** Loading the script in MySQL Workbench*


    ## PostgreSQL


    PostgreSQL is a relational database created in 1996 as an alternative to MySQL.
    The following are some of the features that make this database popular among developers.


    - It’s free to use.

    - It’s an optimized database for a huge volume of reads and writes.

    - Supports more datatypes than MySQL, such as enumerated values.

    - According to StackOverflow’s 2021 survey, PostgreSQL is the second most used
    database after MySQL, which means that if something does not work well, many people
    report the bug.


    **Step 1: Install the Database on Your Local Machine**


    The first step of the process is to download the database installer and run the
    process. PostgreSQL supports multiple operating systems, including Windows and
    macOS, and many distributions of Linux, such as Debian, Ubuntu, Red Hat, and Suse.
    You can download the installer from the official website and follow the instructions
    after clicking your operating system. The instructions webpage includes the prerequisites
    for using each database version.


    Define a username/password for the root which you use to connect with the database
    in step 3.


    **Step 2: Install the Client to Access the Database**


    To work with PostgreSQL, you need a client that helps you do certain operations
    like creating a schema, inserting data, and checking if everything works fine.
    There are several options for all the relational databases; some are free, and
    another has a trial for a short time. This book uses `pgAdmin`, one of the most
    popular options.


    Find and download the installer according to your operating system by checking
    the official documentation. A great difference between this client to access the
    database and others is the possibility to run using Docker, so if you don’t want
    to install it for this book, you can run it using Docker.


    When you select your operating system, you see the prerequisites and instructions
    to install it on your local machine.'
