    • **读未提交** 是限制最严格的级别之一，因为如果一个事务尚未完成并提交所有更改，另一个事务可能无法写入特定行。这种限制类型不会影响读取操作。


    表 5-1 展示了所有隔离级别及其可能出现的潜在问题，其中绿色箭头表示可能出现的问题。


    ***表 5-1.** 隔离级别及相关问题*


