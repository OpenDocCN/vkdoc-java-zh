  trans: "\n抽象类是通过继承关系成为其他实体的一部分。但在数据库中，你会看到所有列都在同一个表中，如图 4-7 所示。\n\n![](img/index-137_1.png)\n\
    \n第 4 章 持久化与领域模型\n\n***图 4-7.** 将实体迁移至使用映射超类的策略*\n\n设想一个假设场景：你只想更改具体类某个属性的名称，而不改动其他任何内容。JPA\
    \ 提供了覆盖抽象类某些属性并指定新值的可能性；例如，让我们将 Currency 实体中 ID 的名称改为其他值。\n\n```java\n@Entity\n\
    @Table(name= \"currency\")\n@AttributeOverride(\n    name = \"id\",\n    column\
    \ = @Column(name = \"currency_id\", nullable = false))\n// 这意味着你将 id 的名称覆盖为另一个值\n\
    public class Currency extends Base implements Serializable {\n    // 所有属性的属性、构造器、setter\
    \ 和 getter\n    // 重写 hashCode 和 equals\n}\n```\n\n![](img/index-138_1.png)\n\n\
    第 4 章 持久化与领域模型\n\n当你有多个类具有某些共同点，但需要对某个特定类设置例外时，此功能极为有用。\n\n**每个类层次结构一张表**\n\n\
    这种方法将整个类层次结构表示在单个表中。该策略的另一个名称是**单表**。如果你没有使用 **@Inheritance** 注解明确指定任何内容，JPA 会默认使用此策略。\n\
    \n每个类层次结构一张表意味着你需要在数据库表中添加一个额外的列，该列不会出现在你的实体中，因为 JPA 需要据此来区分某一行数据属于哪个类。\n\n让我们对目录应用程序进行一些修改，以表示这种特定情况。图\
    \ 4-8 中出现了一组新的实体，表示你可以拥有不直接相连的城市和机场。这两个实体都继承自 Base 类，而 Base 类不再具有 **@MappedSuperclass**\
    \ 注解。\n\n***图 4-8.** 具有单表关系的新实体*\n\n这里只有两个表，因为城市和机场属于同一个类，而 BASE_TYPE 列充当鉴别器，用于判断数据库中的一行数据代表哪种实体类型。请记住，在不同表中，code\
    \ 和 name 属性是唯一的。\n\n第 4 章 持久化与领域模型\n\n```java\n@Entity\n@Inheritance(strategy\
    \ = InheritanceType.SINGLE_TABLE)\n@DiscriminatorColumn(name = \"BASE_TYPE\")\n\
    public abstract class Base implements Serializable {\n    @Id\n    @GeneratedValue(strategy\
    \ = GenerationType.SEQUENCE)\n    private Long id;\n    // 所有属性的属性、构造器、setter\
    \ 和 getter\n    // 重写 hashCode 和 equals\n}\n```\n\n现在你只需要修改 City 和 Airport 实体，为它们添加\
    \ **@DiscriminatorValue** 注解，并指定数据库中用于标识应用程序中实体的值。\n\n```java\n@Entity\n@Table(name=\
    \ \"airport\")\n@DiscriminatorValue( \"AIR\")\npublic class Airport extends Base\
    \ implements Serializable {\n    @OneToMany(fetch = FetchType.LAZY)\n    @JoinColumn(name\
    \ = \"AIRPORT_ID\")\n    private List<Terminal> terminals;\n    // 所有属性的属性、构造器、setter\
    \ 和 getter\n    // 重写 hashCode 和 equals\n}\n```\n\n城市代码的写法大致相同，但具有不同的 **@DiscriminatorValue**\
    \ 注解和属性，其逻辑与本章所有示例中出现的逻辑相同。唯一在目录应用程序中之前不存在的是 Terminal 类，它与 Airport 实体存在关联关系。\n\
    \n第 4 章 持久化与领域模型\n\n```java\n@Entity\n@Table(name= \"terminal\")\npublic class\
    \ Terminal implements Serializable {\n    @ManyToOne(fetch = FetchType.LAZY, optional\
    \ = false)\n    @JoinColumn(name = \"AIRPORT_ID\")\n    private Airport airport;\n\
    \    // 所有属性的属性、构造器、setter 和 getter\n    // 重写 hashCode 和 equals\n}\n```\n"
- fmt: "**Note** these modifications are an example of how the entities look if you\
    \ want to use this strategy of inherence. This book uses `@MappedSuperclass`.\n\
    \nThere are drawbacks to using this strategy; for example, you have several rows\
    \ that only have columns with the information the other ones have `null`, so in\
    \ a way, you lose all the constraints about not null values. Another problem is\
    \ connected with the normalization of the information, which could impact the\
    \ performance of the queries because there are many attributes. You decide which\
    \ are relevant to introduce an index and which are not relevant.\n\nThis strategy\
    \ introduces problems in the long term for stability, performance, and maintainability,\
    \ so it’s not recommended to use, at least in the new system.\n\n## Table per\
    \ Subclass with Joins\n\nThis strategy is an alternative to the “table per class”\
    \ hierarchy to solve the problem of having all the information with many rows\
    \ with null columns in one table. To solve the problem of the previous strategy,\
    \ this one produces a table per each concrete class of the hierarchy. You can\
    \ directly access any of the entities using the repositories that provide Spring\
    \ Data.\n\nFollowing the previous example that introduces modifications to your\
    \ catalog’s application to represent a hypothetical situation, let’s introduce\
    \ a little variation in the previous scenario to generate one table per class.\n\
    \nFigure 4-9 shows the relationship between tables and the classes with this type\
    \ of relationship.\n\n![](index-141_1.png)\n\n**Figure 4-9.** New entities with\
    \ a table per subclass\n\nThere are the same number of classes that entities exist\
