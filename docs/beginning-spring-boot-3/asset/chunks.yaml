    ## **APPENDIX F**


    **Further Reading**


    This book covers frameworks and libraries, technologies, and databases but it
    does not cover advanced topics. This appendix offers lists of books and other
    resources that you can explore to learn advanced topics more in-depth. There are
    three groups of resources: general, relational databases, and non-relational databases.


    ### **General**


    - ***Beginning IntelliJ IDEA*** by Ted Hagos (Apress[, 2021).1](#index_split_004.html#p411)
    This book covers all the aspects of using `IntelliJ`, like the installation process,
    how you can debug the application, and the most relevant elements to acquiring
    the basic skills of the IDE.

    - [***Learn Microservices with Spring Boot***](https://link.springer.com/book/10.1007/978-1-4842-6131-6)
    ***3.0*** by Moisés Macero García (Apress[, 2020).2](#index_split_004.html#p411)
    Suppose you want to understand all the aspects of a microservice, like how to
    create a new one or the philosophy of using microservices instead of monoliths.
    This book helps you understand these concepts and how to implement them using
    `Spring Boot`.

    - ***Docker in Action*** by Jeff Nickoloff and Stephen Kuenzli (Manning, [2019).3](#index_split_004.html#p411)
    This book extensively explains all the aspects of `Docker` and how it interacts
    with the layers of the operating system. Also, you learn how to create an image
    or run an existing one.'
