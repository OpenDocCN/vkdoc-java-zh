    Martin Fowler32 很早以前就首次讨论了规约模式。如今，该模式直接与仓库模式相关联，在 Spring Data 中用于过滤数据库中的表结果。


    **其他模式**


    我介绍了与本书最相关的几种模式，以便更好地解释如何访问数据库或在不同层之间传输信息。其他模式则用于解决特定问题，例如过滤结果或保存历史数据。


    **总结**


    本章涵盖了使用 JDBC 等技术将持久化演进到 Java 数据库的过程。JDBC 提供了一种访问信息的基本方式，但可能在执行 SQL 查询时引入多种问题。JDBC
    出现后，出现了许多访问数据库和执行查询的方法。其中最相关的是 JPA，这是一个所有库都可以遵循的规范。


    Spring Data 允许开发人员在关系型和非关系型数据库之间进行切换，而无需引入重大更改。


    你还了解了架构类型以及与持久化相关的最常见模式。


    32 [`martinfowler.com/apsupp/spec.pdf`](https://martinfowler.com/apsupp/spec.pdf)


    **第 2 章**


    **Spring 基础与进阶**


    在第 [1](https://doi.org/10.1007/978-1-4842-8764-4_1) 章中，你了解了将信息持久化到数据库的方法。Spring
    Data 是唯一一个提供使用关系型和非关系型数据库可能性的方案。


    在讨论框架如何在幕后工作之前，你需要了解 Spring 框架是如何工作的。在本章中，你将学习如何创建一个贯穿本书使用的小型项目。


    根据 Synk1 do 每年进行的调查，58% 的开发者使用 Spring，因为它提供了一种无需太多努力就能创建应用程序的可能性。


    此外，该框架还提供了与许多其他工具的集成，例如 Vault、Kubernetes、Apache Kafka 等等。


    **注意** 本书不会涵盖所有与 Spring 框架和 Spring Boot 相关的主题，因为许多其他 Apress 书籍已经涵盖了这些内容。以下仅是对相关概念的简要概述。


    **Spring 基础**


    Spring 的第一个版本于 2004 年发布，此后，采用该框架的开发者数量以及其支持的功能/技术数量都在增长。如今，有一个庞大的开发者社区为每个 Spring
    版本出现的问题提供支持。每年都会举办一次年度会议，其中最重要的议题是向开发者展示最新版本的新特性。


    该框架提供了一个容器，用于创建和管理现有的组件。定义这些组件的方式是使用注解或 XML，如今在定义组件时，XML 已不那么流行。Spring 应用上下文负责管理每个组件的生命周期。Spring
    应用了一种称为依赖注入（DI）的模式，这是一种对象接收其依赖的其他对象的技术。其他对象的状态由 Spring 管理，无需开发者干预。图 2-1 展示了 Spring
    中不同组件之间的交互方式。


    ***图 2-1.** 组件之间的交互*


    Spring 是一个由多个模块组成的生态系统，这些模块相互协作以提供功能。该生态系统包含以下元素。

    '
- fmt: '# Spring Framework Modules


    - **Core** contains all the core functionalities that Spring uses across the modules,
    like the dependency injection or how to manage the life cycle of the components.

    - **Web** is a group that supports developing web applications that serve HTTP
    requests.

    - **Data Access** provides a set of basic tools to persist the information in
    places like databases, relational and non-relational.

    - **Testing** is a group that offers support to create a test to check whether
    everything you develop using Spring works fine or not.


    Figure 2-2 shows the different modules that compose the Spring framework.


    ![Figure 2-2. Spring modules](index-56_1.png)


    ## Spring Boot


    Spring Boot is a project released in 2014 to reduce the complexity of creating
    and developing Java Web Applications, which behind the scenes uses Spring. Some
    of the key features of Spring Boot include autoconfiguring all the components
    to quickly get started without the need to deploy an artifact on a web server
    and provide ways to monitor and check if everything works fine or not.


    ![Figure 2-3. Spring Boot modules](index-57_1.png)


    Figure 2-3 illustrates some of the modules that exist in Spring Boot. The most
    relevant is in the center of the figure, which is responsible for providing support
    to the other modules and creating/running the application using the embedded web
    server. Also, it’s responsible for externalizing the application configuration
    in one or more files.


    One of the dependencies of Spring Boot that interact directly with the topic of
    this book is the `actuator`. The `actuator` is responsible for checking and informing
    if the application is healthy or not. Typically, Spring Boot internally checks
    that everything in the application context is okay. But when your application
    interacts with a database, you can explicitly indicate that you check the status
    and send the information as part of the response.


    ## Basic Application Setup


    Let’s create a catalog microservice that contains all the information about cities,
    states, and countries. To do this, you define a set of endpoints for each resource.
    Most operations are common in a CRUD (create, retrieve/read, update, delete) operation.


    First, you must create a basic skeleton that allows you to add different databases
    in the following chapters to persist the information. For simplicity, let’s use
    examples of databases applying the restrictions or having the ability to persist
    the information.


    There are several ways to create an application that uses Spring Boot. Remember
    that you use Spring Boot with the idea of creating web applications easily. Some
    imply creating a project manually and adding all the necessary dependencies to
    run the applications. In some cases, this approach could not be the best option
    and produced a lot of errors for missing dependencies. To solve this problem,
    Spring Boot offers a different mechanism to create a project and all the necessary
    dependencies simply. There are two that are the most popular.


    - Using Spring Initializr from the webpage

    - Using IDE plugins like Eclipse, IntelliJ, or Visual Studio Code


    This book teaches you how to create a project using both options but only covers
    the IntelliJ IDE.


    ## Creating an API Using Spring Initializr


    First, let’s create a project using Spring Initializr, an intuitive interface
    to understand how to configure the project. When you go to the webpage, you find
    something similar to Figure 2-4, where you need to indicate: the configuration
    management, language, version of Spring Boot, and all the project metadata (group,
    artifact, name, and version of Java).


    [https://start.spring.io/](https://start.spring.io/)


    ![Figure 2-4. Using Spring Initializr, you can create a new application.](index-59_1.png)'
