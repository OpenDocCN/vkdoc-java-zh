    That said, note that all examples in this book can be translated into `Gradle`
    with minimum changes.


    **Source Code**


    The source code for this book is available for download at `github.com/apress/beginning-spring-data`.


    **How This Book Is Structured**


    This book is structured into four parts.


    - The first part (Chapters [1](https://doi.org/10.1007/978-1-4842-8764-4_1)–[3](https://doi.org/10.1007/978-1-4842-8764-4_3))
    surveys the history of Java persistence and the patterns connected to persistence,
    explains how to create a project in Spring, and briefly explains the different
    types of persistence available in Spring Data.

    - The second part (Chapters [4](https://doi.org/10.1007/978-1-4842-8764-4_4)–[6](https://doi.org/10.1007/978-1-4842-8764-4_6))
    gives a basic tour of key features of Spring Data with relational databases and
    presents tools for versioning changes in a database.

    - The third part (Chapters [7](https://doi.org/10.1007/978-1-4842-8764-4_7)–[10](https://doi.org/10.1007/978-1-4842-8764-4_10))
    briefly explores how Spring Data interacts with non-relational databases like
    Cassandra, Redis, MongoDB, and Neo4j.

    - The fourth part (Chapters [11–14](https://doi.org/10.1007/978-1-4842-8764-4_11))
    covers advanced topics like performing unit and performance tests using different
    libraries. The last chapter describes some best practices for using Spring Data.


    ## Chapter 1: Application Architecture


    Persistence is typically one of the most important topics in any language because
    it provides a way to save information in the long term for the applications that
    consume or produce it. In the past, when developers created a single extensive
    application, problems tended to appear in one place. Perhaps most of the logic
    resided in stored procedures, but when microservices emerged and became an industry
    standard, most need to save their information. Hence, a topic’s importance grows
    more than before with monoliths. Also, during the transition from monoliths to
    microservices, many non-relational databases are an alternative to solve specific
    problems, like the cache mechanism for saved information with a different structure.


    Since Java was introduced, several ways to access information and other types
    of architecture have appeared. This chapter overviews the evolution of ways to
    access a database and the pros and cons. Also, you learn some of the most relevant
    patterns associated with persistence in relational or non-relational databases.


    ### Why Persistence Is So Important


    Persistent information is one of the most important aspects of microservices and
    applications. You will lose everything if you don’t preserve the data when you
    deploy or restart or if something happens to your system.


    But there are other things you need to consider because they can affect the performance
    of the entire platform, adding latency or errors. The following are some problems
    associated with the inappropriate use or design of a database.


    - Incrementing the latency to execute the queries and obtain information for a
    database

    - Incrementing the usage of CPU/memory for access to a database for a wrong design
    in the way to connect

    - Choosing the old version or the incorrect type of database for the kind of information
    to persist


    There are many problems associated with persistence, but this book does not require
    you to know all of them. A wrong decision or not understanding the pros/cons of
    each type of database and how access to the information could affect your entire
    system.


    ### The History of Persistence'
