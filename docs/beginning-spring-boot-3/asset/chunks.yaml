    \n## Chapter 12 Unit and Integration Testing\n\nListing 12-3 is a simple example\
    \ of how you can define a container and start it without any special instructions\
    \ about Docker or the database.\n\n***Listing 12-3.*** An Example of How to Configure\
    \ and Run a Container\n\n```\nPostgreSQLContainer postgreSQL = new PostgreSQLContainer(\"\
    postgres:145\")\n    .withDatabaseName(\"integration-tests-database\")\n    .withUsername(\"\
    test\")\n    .withPassword(\"test\");\npostgreSQL.start();\n```\n\nOne last thing\
    \ to consider about this library is having sponsor companies like Elastic and\
    \ Red Hat, which are used by many recognized companies like Wise, Zalando, Instana,\
    \ and Skyscanner, so you can be sure it is not a new library without support.\n\
    \n## Testcontainers vs. Embedded\n\nDatabases like MongoDB allow you to run an\
    \ embedded database using another library that you need to include in your `pom`\
    \ file. There are problems with this approach, however.\n\n- Not all databases\
    \ can support using an embedded database, so it’s a solution that works with a\
    \ reduced number.\n- You don’t know which version of the database is used, so\
    \ you can have one of the problems that appear in previous sections: the repositories\
    \ and queries work fine in your test but in a real environment fail. Also, a new\
    \ database version could appear and not be supported, so you have certain restrictions\
    \ on its use.\n- If you use a migration tool like `Flyway` or `Liquibase`, the\
    \ scripts could fail if you use an `H2` database because you use specific structures\
    \ or keywords that only work in `PostgreSQL` or `MySQL`.\n\nUsing `Testcontainers`,\
    \ all these problems disappear because you can use containers to represent the\
    \ real version of the database. Also, you can initialize the database with specific\
    \ information using the configuration of Docker.\n\n## Chapter 12 Unit and Integration\
    \ Testing\n\n## Using Testcontainers\n\nTo start using it is simple; you only\
    \ need to add the basic dependency about `Testcontainers` and the module you need;\
    \ in `api-catalog`, you use the `PostgreSQL` module (see Listing 12-4).\n\n***Listing\
    \ 12-4.*** Dependencies to Include in Your Application\n\n```\n<dependency>\n\
    \    <groupId>org.testcontainers</groupId>\n    <artifactId>junit-jupiter</artifactId>\n\
    \    <version>1.17.3</version>\n    <scope>test</scope>\n</dependency>\n<dependency>\n\
    \    <groupId>org.testcontainers</groupId>\n    <artifactId>postgresql</artifactId>\n\
    \    <version>1.17.3</version>\n    <scope>test</scope>\n</dependency>\n```\n\n\
    The `jupiter` dependency is connected directly with `Junit5`, which includes the\
    \ core dependency of `Testcontainers` behind the scenes. If you want to use this\
    \ library without a specific implementation—for example, you want to use a `MySQL`\
    \ or `MariaDB` implementation, only include the core and add the name of the image\
    \ you want to run without `Testcontainers`’ support.\n\nRunning a container that\
    \ only starts and stops a `PostgreSQL` image creates a class like Listing 12-5\
    \ but adds at least one test.\n\n***Listing 12-5.*** A Basic Unit Test That Runs\
    \ a Database\n\n```\nimport org.junit.jupiter.api.AfterAll;\nimport org.junit.jupiter.api.BeforeAll;\n\
    import org.junit.jupiter.api.Test;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.boot.test.context.SpringBootTest;\nimport org.springframework.test.context.DynamicPropertyRegistry;\n\
    import org.springframework.test.context.DynamicPropertySource;\nimport org.testcontainers.containers.PostgreSQLContainer;\n\
    import org.testcontainers.junit.jupiter.Testcontainers;\nimport static org.junit.jupiter.api.Assertions.*;\n\
    \n//This annotation enables the support of Testcontainers\n@Testcontainers\n@SpringBootTest(webEnvironment\
    \ = SpringBootTest.WebEnvironment.RANDOM_PORT)\npublic class CountryRepositoryIntegrationTest\
    \ {\n\n    //Define the container that you will use\n    public static PostgreSQLContainer\
    \ postgreSQL =\n        new PostgreSQLContainer(\"postgres:14\")\n           \
    \ .withUsername(\"postgres\")\n```"
