    没有完美的方法可以解决隔离问题。每种解决方案都有权衡，你需要牺牲某些方面以获得更好的性能或提高所使用信息的质量。


    高隔离级别要求数据库阻塞其他可能同时影响相同信息的事务。较低的级别允许用户查找可能未提交的信息，因此你可能会看到某些可能导致异常并回滚的内容。


    第 5 章 事务管理


    **锁定类型**


    锁定是解决与隔离相关的问题的一种方法。当你的应用程序有大量并发操作时，这非常有用。


    有两种锁定机制。


    • **悲观锁**：这种锁定级别最为常见，因为你假设多个事务之间可能发生问题。你需要创建或使用一种机制，在数据库中指示锁定行或表。这种方法保证了一个事务有机会更新该行，因为你锁定了行/表/数据库，但这种方法的主要问题是事务执行时会出现瓶颈，耗时较长。


    • **乐观锁**：这种机制不会在数据库中进行锁定，因为它使用另一种方式来控制更改。每一行都有一个包含行版本号的数字列，因此当需要对某行执行操作时，会检查该列的版本号。每个需要修改该行的操作都会递增版本号，一个事务有机会执行修改，并且你拥有一种机制来检测应用程序中某行的信息是否为最新版本。


    你可以使用另一种类型的列来表示版本，例如时间戳，但这并非好主意，因为该类型的精度取决于数据库。


    **这些概念在 Spring Data 中如何工作？**


    上一节中出现的所有概念都可以使用 Spring 注解轻松实现，这些注解涵盖了大多数相关场景。


