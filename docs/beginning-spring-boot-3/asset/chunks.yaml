- fmt: "# Appendix E: Installing and Configuring Non-Relational Databases\n\n`driver:\
    \ default`\n\n`config:`\n\n- `subnet: 10.0.75.0/24`\n- `gateway: 10.0.75.1`\n\n\
    ![](index-401_1.jpg)\n\nTo simulate a real scenario, you use three different instances\
    \ connected with limited resources to abuse the use of resources on your machine.\
    \ The `docker-compose` file includes Cassandra Web[,4](#index_split_004.html#p401)\
    \ a visual tool based on Ruby to work with the database.\n\n**Figure E-10.** Cassandra\
    \ Web with the status of the nodes\n\nAfter executing the `docker-compose` file\
    \ and ingressing it to `localhost:3000` in your browser, you see the result shown\
    \ in Figure [E-10](#index_split_004.html#p401) with the available nodes and the\
    \ keyspaces.\n\nI recommend creating a new keyspace indicating the replication\
    \ factor because if you do not indicate it, the database assigns a default value\
    \ which could not be the best option. Figure [E-11](#index_split_004.html#p364)\
    \ shows how looks like the page to create a new keyspace.\n\n4 [https://github.com/avalanche123/cassandra-web](https://github.com/avalanche123/cassandra-web)\n\
    \n![](index-402_1.jpg)\n\n**Figure E-11.** Create a keyspace to contain all the\
    \ tables\n\nWhen you have the new keyspace created, you see the tables. In this\
    \ case, there are no tables because this structure is new. You only need to click\
    \ the keyspace in the left menu and you will see the detail of the keyspace like\
    \ the Figure [E-12.](#index_split_004.html#p365)\n\n![](index-403_1.png)\n\n**Figure\
    \ E-12.** The new keyspace created\n\nTo create a table, you only need to click\
    \ the Create button and complete the sentence. Indicate the right type of consistency\
    \ that appears at the bottom of the modal. Figure [E-13](#index_split_004.html#p366)\
    \ show you the editor looks like with the creation of a table.\n\n![](index-404_1.png)\n\
    \n**Figure E-13.** How to create a table\n\n## Neo4j\n\nNeo4j offers various methods\
    \ of installation; some of them have more complexity. One of the basics implies\
    \ following the instructions for each operating system[.5](#index_split_004.html#p404)\n\
    \nThere is another option covered in the official documentation. **Homebrew**\
    \ reduces the complexity of the installation process which you see the steps on\
    \ the Listing [E-7.](#index_split_004.html#p404)\n\n**Listing E-7.** Install Neo4j\n\
    \n```\n$ brew install neo4j\n==> Checking for dependents of upgraded formulae...\n\
    ==> No broken dependents found!\n==> Caveats\n==> neo4j\n```\n\n5 [https://neo4j.com/docs/operations-manual/current/installation/](https://neo4j.com/docs/operations-manual/current/installation/)\n\
    \nTo restart `neo4j` after an upgrade:\n\n```\nbrew services restart neo4j\n```\n\
    \nOr, if you don't want/need a background service you can just run:\n\n```\n/home/linuxbrew/.linuxbrew/opt/neo4j/bin/neo4j\
    \ console\n```\n\nThe last recommended option is the `docker-compose` file to\
    \ run multiple instances in a clustering way mentioned in the official documentation.\
    \ [6](#index_split_004.html#p405)\n\nListing [E-8](#index_split_004.html#p405)\
    \ shows the configuration using Docker-compose of the database.\n\n**Listing E-8.**\
    \ Docker-compose to Run Neo4j\n\n```\nversion: '3'\n\nnetworks:\n  lan:\n\nservices:\n\
    \  core1:\n    image: neo4j:3.5-enterprise\n    networks:\n      - lan\n    ports:\n\
    \      - 7474:7474\n      - 6477:6477\n      - 7687:7687\n    volumes:\n     \
    \ - $HOME/neo4j/neo4j-core1/conf:/conf\n      - $HOME/neo4j/neo4j-core1/data:/data\n\
    \      - $HOME/neo4j/neo4j-core1/logs:/logs\n      - $HOME/neo4j/neo4j-core1/plugins:/plugins\n\
    \    environment:\n      - NEO4J_AUTH=neo4j/changeme\n      - NEO4J_dbms_mode=CORE\n\
    \      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes\n```\n\n6 [https://neo4j.com/docs/operations-manual/current/docker/clustering/](https://neo4j.com/docs/operations-manual/current/docker/clustering/)\n\
    \n```\n      - NEO4J_causal__clustering_minimum__core__cluster__size__at__formation=3\n\
    \      - NEO4J_causal__clustering_minimum__core__cluster__size__at__runtime=3\n\
    ```"
