    # Chapter 2: Spring Basics and Beyond


    After that, you need to add the dependencies to support basic operations like
    creating the endpoints of the microservices and processing the configuration files,
    so you need to click the **ADD DEPENDENCIES…** button, which shows a page similar
    to Figure 2-5.


    **Figure 2-5.** You can add dependencies from the webpage.


    For this project, add the following dependencies:


    - **Spring Boot Actuator**[^3] provides endpoints that give specific information,
    like if the application is healthy or not, the caches in the application, and
    more. Also, you can create custom endpoints that can extend or not an existing
    endpoint.

    - **Spring Configuration Processor**[^4] generates the metadata for developers
    to use in the configuration files like YML or properties, so it’s simpler for
    you to know which are the properties available for one configuration because you
    start to type and the IDE helps you with options to use in the file.

    - **Spring Web** allows you to add support to your application to create a RESTful
    API with an embeddable server like Tomcat.

    - **Spring Boot Devtools**[^5] is a library that provides helpful features for
    developers, like a fast application restart and debugging an application remotely.


    You don’t add any dependency connected with Spring Data because this chapter focuses
    on creating a basic project that exposes endpoints in which you include a level
    of logic to access databases using Spring Data.


    After you include the dependencies, you only need to click the **Generate** button,
    which packages the application in a ZIP file. You only need to decompress the
    file in any directory you want and continue with the step in the “How to Run the
    Application” section.


