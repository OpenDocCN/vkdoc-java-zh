  trans: '

    • **核心** 包含了 Spring 在各模块中使用的所有核心功能，例如依赖注入或组件生命周期管理。


    • **Web** 是一个支持开发处理 HTTP 请求的 Web 应用程序的模块组。


    • **数据访问** 提供了一套基本工具，用于将信息持久化存储到关系型和非关系型数据库等位置。


    • **测试** 是一个提供支持的模块组，用于创建测试以检查你使用 Spring 开发的一切是否运行正常。


    图 2-2 展示了组成 Spring 框架的不同模块。


    ![](img/index-56_1.png)


    第 2 章 Spring 基础与进阶


    ***图 2-2.** Spring 模块*


    **Spring Boot**


    Spring Boot 是一个于 2014 年发布的项目，旨在降低创建和开发 Java Web 应用程序的复杂性，它在底层使用了 Spring。Spring
    Boot 的一些关键特性包括：自动配置所有组件以便快速上手，无需在 Web 服务器上部署构件，并提供监控和检查一切是否正常运行的方法。


    ![](img/index-57_1.png)


    第 2 章 Spring 基础与进阶


    图 2-3 展示了 Spring Boot 中存在的一些模块。图中最核心的是位于中心的模块，它负责为其他模块提供支持，并使用嵌入式 Web 服务器创建/运行应用程序。


    此外，它还负责将应用程序配置外部化到一个或多个文件中。


    ***图 2-3.** Spring Boot 模块*


    Spring Boot 中与本书主题直接交互的依赖之一就是 Actuator。Actuator 负责检查并报告应用程序是否健康。通常，Spring Boot
    会在内部检查应用程序上下文中的所有内容是否正常。但当你的应用程序与数据库交互时，你可以明确指示它检查状态，并将该信息作为响应的一部分发送出去。


    **基本应用程序设置**


    让我们创建一个包含城市、州和国家所有信息的目录微服务。为此，你需要为每个资源定义一组端点。大多数操作都是 CRUD（创建、检索/读取、更新、删除）操作中的常见操作。


    第 2 章 Spring 基础与进阶


    首先，你必须创建一个基本骨架，以便在后续章节中添加不同的数据库来持久化信息。为简单起见，让我们使用应用了约束或具有持久化信息能力的数据库示例。


    有多种方法可以创建使用 Spring Boot 的应用程序。请记住，你使用 Spring Boot 是为了轻松创建 Web 应用程序。有些方法需要手动创建项目并添加所有必要的依赖项来运行应用程序。在某些情况下，这种方法可能不是最佳选择，并且会因缺少依赖项而产生大量错误。为了解决这个问题，Spring
    Boot 提供了一种不同的机制来简单地创建项目及其所有必要的依赖项。


    其中有两种最流行的方法。


    • 从网页使用 Spring Initializr

    • 使用 IDE 插件，如 Eclipse、IntelliJ 或 Visual Studio Code


    本书将教你如何使用这两种选项创建项目，但仅涵盖 IntelliJ IDE。


    **使用 Spring Initializr 创建 API**


    首先，让我们使用 Spring Initializr 创建一个项目，这是一个直观的界面，可以让你了解如何配置项目。当你访问该网页时，你会看到类似于图 2-4
    的内容，你需要在此处指明：配置管理、语言、Spring Boot 版本以及所有项目元数据（组、构件、名称和 Java 版本）。


    2 [`start.spring.io/`](https://start.spring.io/)


    ![](img/index-59_1.png)


    第 2 章 Spring 基础与进阶


    ***图 2-4.** 使用 Spring Initializr，你可以创建一个新的应用程序。*

