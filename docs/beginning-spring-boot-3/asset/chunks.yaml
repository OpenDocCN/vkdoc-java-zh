- fmt: "application exposes an endpoint that gives all the information of an entity\
    \ using the `ID`, you can increment or decrement the `ID` and obtain the rows\
    \ of a table instead. If you use a `UUID`, it reduces the risk that someone knows\
    \ which are valid `UUID`s that exist in the database.\n\n**Note:** Using a `VarChar`,\
    \ which is the way to represent a `UUID` in the database, is less efficient than\
    \ using a numerical type like `BIGINT` or `INTEGER`. Also, the numerical types\
    \ use less space than `VarChar`. If you use `VarChar` to save a `UUID`, consider\
    \ the length of the column because sometimes this column has a small size. When\
    \ you try to persist the information, an exception appears.\n\nIt is within the\
    \ scope of this book to explain scenarios when one approach is better than another.\
    \ Consider this explanation as a way that no existing correct answer for all cases,\
    \ so you can find an old application that could not follow any of the approaches\
    \ you read in this section’s first part.\n\nAfter you select the primary key of\
    \ an entity, the next thing to do is define the strategy to generate the value.\
    \ To do this, you need to indicate over the declaration of attribute that acts\
    \ as the primary key the `@GeneratedValue` annotation and indicates the generation\
    \ mechanism. Doing this, JPA completes this value before persisting the entity.\n\
    \nLet’s modify the `Country` entity to include the strategy to generate the value,\
    \ delegating the responsibility to indicate the next value to the database (see\
    \ Listing 4-8).\n\n***Listing 4-8.*** Definition of the Strategy To Generate the\
    \ Primary Key\n\n```java\nimport jakarta.persistence.Column;\nimport jakarta.persistence.Entity;\n\
    import jakarta.persistence.GeneratedValue;\nimport jakarta.persistence.GenerationType;\n\
    import jakarta.persistence.Id;\nimport jakarta.persistence.Table;\n\n@Entity //This\
    \ annotation indicates to JPA that it’s something that has a persistent state\n\
    @Table(name= \"country\") //This annotation is optionally\npublic class Country\
    \ implements Serializable {\n\n    @Id\n    @GeneratedValue(strategy = GenerationType.SEQUENCE)\n\
    \    private Long id;\n\n    // Attributes, constructors, setters, and getters\
    \ for all the attributes\n    // Override the hashcode and equals\n}\n```\n\n\
    Listing 4-8 shows a strategy to generate the value of the primary key, but JPA\
    \ offers an enumeration with multiple options. Let’s look at each of the available\
    \ options.\n\n- **`GenerationType.SEQUENCE`** defines a numeric sequence in the\
    \ database, so before persisting the information in the JPA table, call the sequence\
    \ to obtain the next number to insert into the table. The main benefit of using\
    \ the sequence is that you can use it in any column in multiple tables connected\
    \ directly by one table, but it’s a common practice to use it for a specific purpose.\
    \ Some databases that support the use of `SEQUENCE` are Oracle and PostgreSQL.\n\
    \n**Note:** Each database has a particular way of indicating the strategy to generate\
    \ the sequence. Let’s look at how to declare in PostgreSQL.\n\n```sql\nCREATE\
    \ TABLE IF NOT EXISTS city\n(\n    id bigint GENERATED ALWAYS AS IDENTITY PRIMARY\
    \ KEY,\n    name varchar(80) NOT NULL,\n    enabled BOOLEAN DEFAULT true NOT NULL,\n\
    \    state_id bigint NOT NULL REFERENCES state(id)\n);\n```\n\n**Note:** Depending\
    \ on the database version, an alternative could be declared in the generator outside\
    \ the table’s structure.\n\n```sql\nCREATE SEQUENCE city_id_seq;\n\nCREATE TABLE\
    \ IF NOT EXISTS city\n(\n    id bigint DEFAULT NEXTVAL('city_id_seq') NOT NULL,\n\
    \    name varchar(80) NOT NULL,\n    enabled BOOLEAN DEFAULT true NOT NULL,\n\
    \    state_id bigint NOT NULL REFERENCES state(id)\n);\n```\n\n- **`GenerationType.IDENTITY`**\
    \ is a special behind-the-scenes column that does the same as the `SEQUENCE` check,\
    \ which is the next available value. Some databases do not support the definition\
    \ of a `SEQUENCE`, so they have an alternative special column like this that is\
    \ an auto-incremented value.\n\nLet’s examine the definition of the `City` table\
    \ in MySQL.\n\n```sql\nCREATE TABLE IF NOT EXISTS city\n(\n    id bigint NOT NULL\
    \ AUTO_INCREMENT,\n    name varchar(80) NOT NULL,\n    ...\n);\n```"
