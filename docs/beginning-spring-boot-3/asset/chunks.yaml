    to access a database. All of them are important to understand the hierarchy of
    the layers and which rules you need to follow to create a new feature or application.


    In Java, tools like `Archunit` allow you to define and check if everything in
    your project follows your defined structure.


    **Layers**


    This type of architecture is the simplest because it splits the application into
    different layers like a cake where each layer can only access the elements to
    the same or the inferior level. These types of architecture mutate from architecture
