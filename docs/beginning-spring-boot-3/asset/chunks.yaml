- fmt: "# MongoDB: Document Database\n\nIt has a set of online courses with the idea\
    \ that anyone can learn most of the concepts related to this database. All the\
    \ courses are free and give you a certificate.\n\nThe database structure has a\
    \ certain equivalence with relational databases; for example, the concept of a\
    \ database is the same in both types. Still, a table has the name of the collection.\
    \ Table 8-1 lists the most relevant equivalence; this helps you to understand\
    \ many of the annotations that appear in Spring Data Mongo or when you need to\
    \ find information on the Internet.\n\n**Table 8-1.** Equivalence Between Two\
    \ Types of Databases\n\n| Relational Databases | MongoDB |\n|----------------------|---------|\n\
    | Database             | Database |\n| Table                | Collection |\n|\
    \ Row                  | Document |\n| Column               | Field |\n\nThe data\
    \ types that MongoDB supports are similar to what JSON supports but include extras\
    \ like the possibility to store spatial data, which is relevant if you want to\
    \ perform certain queries that consider the location/position of something, for\
    \ example, obtain all the shops near to my current position. Table 8-2 features\
    \ examples of the different data types that MongoDB supports and what they look\
    \ like in a JSON structure.\n\n**Table 8-2.** Data Types Supported by MongoDB\n\
    \n| Data Type MongoDB | JSON |\n|-------------------|------|\n| Numbers      \
    \     | Bson number `{\"version\": 1}` |\n| String            | Bson string `{\"\
    code\": \"BUE\"}` |\n| Boolean           | Bson Boolean `{\"enabled\": true}`\
    \ |\n| Datetime          | Custom Data format `{\"createdOn\": ISODate(\"2022-12-19T02:15:17.171Z\"\
    )}` |\n| Spatial data      | GeoJson `{\"geometry\": {\"type\": \"Point\", \"\
    coordinates\": [-104.99404, 39.75621]}}` |\n| Null              | Json null `{\"\
    code\": null}` |\n| Objects           | Flexible Json `{\"code\": \"BUE\", \"\
    currency\": {\"code\": \"ARS\", \"name\": \"Peso Argentino\", \"enabled\": true,\
    \ \"symbol\": \"$\"}}` |\n| Arrays            | Flexible Json `{\"id\": 2, \"\
    code\": \"BUE\", \"name\": \"Buenos Aires\", \"enabled\": true, \"states\": [{\"\
    code\": \"BUE\", \"name\": \"Buenos Aires\"}]}` |\n\nAnother feature is the relationship\
    \ between different entities. In Mongo, this is possible, but there are restrictions.\
    \ In a one-to-one relationship, you can include a reference to another collection/document,\
    \ like a foreign key or embedded object, but there is only one collection. The\
    \ same occurs in one-to-many or many-to-many relationships. You can embed an array\
    \ of objects or contain an array of references to other collections.\n\n## Introduction\
    \ to Spring Data Mongo\n\nThe first chapters of this book covered the modules\
    \ connected to Spring Data, including Spring Data Mongo, which reduces the complexity\
