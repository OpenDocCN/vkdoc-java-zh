    **第 5 步：加载数据**


    此过程的最后一步是创建模式的结构，并用你在关系型数据库章节中使用的信息填充它。这些信息位于代码仓库文件夹中（[github.com/apress/beginning-spring-data](http://github.com/apress/beginning-spring-data)）。每个文件夹对应一个章节。你可以在
    databases 文件夹中找到所有需要执行的脚本（见图 D-5）。


    ![](img/index-378_1.png)


    ![](img/index-378_2.png)


    附录 D 安装并配置关系型数据库


    ***图 D-5.** 包含数据库脚本的源代码仓库*


    此文件夹内有多个文件。请按版本号依次执行每个文件（见图 D-6）。第一个要执行的脚本是 `V1.0_init_database.sql`。


    ***图 D-6.** 需要在数据库中执行的脚本*


    最后一步是打开每个脚本并执行它。你可以将文件拖放到 MySQL Workbench 中来完成此操作。应用程序会打开该文件并显示其内容。之后，你只需点击按钮将所有脚本运行到数据库中，并对每个脚本重复此过程（见图
    D-7）。


    ![](img/index-379_1.jpg)


    附录 D 安装并配置关系型数据库


    ***图 D-7.** 在 MySQL Workbench 中加载脚本*


    **PostgreSQL**


    PostgreSQL 是一款创建于 1996 年的关系型数据库，是 MySQL 的替代品。以下是使该数据库在开发者中广受欢迎的一些特性。


    • 免费使用。

    • 针对海量读写进行了优化的数据库。

    • 支持比 MySQL 更多的数据类型，例如枚举值。


    附录 D 安装并配置关系型数据库


    • 根据 StackOverflow 2021 年的调查 6，PostgreSQL 是仅次于 MySQL 的第二大常用数据库，这意味着如果出现问题，会有很多人报告该错误。


    **第 1 步：在本地机器上安装数据库**


    此过程的第一步是下载数据库安装程序并运行安装过程。PostgreSQL 支持多种操作系统，包括 Windows 和 macOS，以及许多 Linux 发行版，例如
    Debian、Ubuntu、Red Hat 和 Suse。你可以从官方网站 7 下载安装程序，并在点击你的操作系统后按照说明进行操作。说明网页包含了使用每个数据库版本的前提条件。


    为 root 用户定义一个用户名/密码，你将在第 3 步中使用它来连接数据库。


    **第 2 步：安装客户端以访问数据库**


    要使用 PostgreSQL，你需要一个客户端来帮助你执行某些操作，例如创建模式、插入数据以及检查一切是否正常运行。对于所有关系型数据库，有几种选择；有些是免费的，有些则提供短期试用。本书使用
    pgAdmin，这是最流行的选择之一。


    通过查看官方文档 8，根据你的操作系统查找并下载安装程序。这个数据库访问客户端与其他客户端的一个巨大区别是它可以使用 Docker 运行，因此如果你不想为本书安装它，你可以使用
    Docker 运行它。


    当你选择操作系统时，你会看到在本地机器上安装它的前提条件和说明。

