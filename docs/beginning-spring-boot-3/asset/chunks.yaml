- fmt: '# Mechanism of Locking in the Writing Transaction


    The mechanism of locking in the writing transaction needs to block other transactions
    that try to access one particular row but do not affect the transactions that
    only want to read the information.


    - **Read uncommitted** is one of the most restricted levels because one transaction
    may not write a particular row if another transaction is not finished and commit
    all the changes. This type of restriction does not affect the reading operations.


    Table [5-1](#index_split_002.html#p165) represents all the isolation levels with
    potential issues that can appear, whereas the green arrow represents which problems
    can appear.


    ***Table 5-1.** Isolation Levels and Associated Issues*


    | **Levels/Issues** | **Lost update** | **Dirty read** | **Unrepeatable read**
    | **Phantom reading** |

    |-------------------|-----------------|----------------|------------------------|----------------------|

    | **Serializable**  |                 |                |                        |                      |

    | **Repeatable reads** |               |                |                        |                      |

    | **Read committed** |                |                |                        |                      |

    | **Read uncommitted** |              |                |                        |                      |


    There is no perfect way to solve the problem with isolation. Each solution has
    a tradeoff, and you need to sacrifice something to obtain a better performance
    or improve the quality of the information you use.


    The high isolation levels required the database to block other possible transactions
    that simultaneously affect the same information. The lower levels allow users
    to find information that could be uncommitted, so you can see something that could
    produce an exception and rollback.


    # Chapter 5: Transaction Management


    ## Locking Types


    Locking is a way to solve problems connected with isolation. This is extremely
    useful when you have an application with many simultaneous operations.


    There are two locking mechanisms.


    - **Pessimist**: This locking level is the most common because you assume that
    problems with multiple transactions could happen. You need to create or use a
    mechanism to indicate into the database to lock the row or the table. This approach
    guarantees that one transaction has the chance to update the row because you lock
    the row/table/database, but the main problem with this approach is that a bottleneck
    in the transactions takes time to be executed.


    - **Optimist**: This mechanism does not lock in a database because it uses an
    alternative way to control the changes. Each row has a numeric column containing
    the row''s version, so when an operation needs to be executed in the row, check
    which is the version of the column. Each operation that needs to modify the row
    increments the version number, one transaction has the chance to do it, and you
    have a mechanism to detect if the information of one row in your application is
    the latest version or not.


    You can use another type of column to represent the version, for example, timestamp,
    but it''s not a good idea because the precision of the type depends on the database.


    ## How Do These Concepts Work in Spring Data?


    All the concepts appearing in the previous section are simple to implement using
    Spring annotations that cover the most relevant scenarios.


    `@Transactional` is an important annotation that you can use in a method, class,
    or interface which creates a proxy class that has the responsibility to create
    the transaction and commit/roll back all the operations inside the transaction.
    This annotation is connected directly with Spring TX (`org.springframework.transaction.annotation.Transactional`),
    which is not the same as JEE. This annotation only works for the public methods
    because it''s a constraint of the proxy classes of Spring Framework, so if you
    put the annotation in the private/protected Spring Framework, you ignore them
    without showing any error on the console or in your IDE.


    ![](index-167_1.png)


    Figure [5-7](#index_split_002.html#p167) shows how a transaction works with Spring
    Interceptor, which is part of the Spring Framework.


    ***Figure 5-7.** A transaction works with Spring Interceptor*


    When you use Spring Boot with Spring Data in your application, you don''t need
    to do anything; use the `@Transactional` annotation, but if you don''t use Spring.'
