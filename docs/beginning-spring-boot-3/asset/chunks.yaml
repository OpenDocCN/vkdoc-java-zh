    This structure has the following benefits.


    - It’s simple to implement and maintain because you only have a hierarchy of layers.

    - Each layer has only one responsibility and does not know how to implement the
    logic of the other layers, so you can introduce modifications in the logic of
    layers that could not directly affect others.

    - The structure is more or less the same in all the projects. You can change from
    one project to another and know where to find something.


