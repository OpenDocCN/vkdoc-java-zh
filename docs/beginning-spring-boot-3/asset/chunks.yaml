    \n***Listing E-4.*** Update and Install Mongo Using Homebrew\n\n```\n$ brew update\n\
    Already up-to-date.\n$ brew install mongodb-community@6.0\nWarning: mongodb-community\
    \ provides a launchd plist which can only be used\non macOS!\nYou can manually\
    \ execute the service instead with:\nmongod --config /home/linuxbrew/.linuxbrew/etc/mongod.conf\n\
    ```\n\nThe last option is to use Docker commands to run the database or a docker-compose\
    \ file. Listing [E-5](#index_split_004.html#p395) shows the basic configuration\
    \ of the MongoDB using Docker-Compose.\n\n***Listing E-5.*** Docker-compose File\
    \ to Run Mongo\n\n```\nversion: '3.1'\nservices:\n  mongo-db:\n    image: mongo:6.0\n\
    \    container_name: mongo-db\n    restart: always\n    environment:\n      MONGO_INITDB_ROOT_USERNAME:\
    \ root\n      MONGO_INITDB_ROOT_PASSWORD: rootpassword\n    ports:\n      - 27017:27017\n\
    ```\n\nAfter running MongoDB on your machine, the next step uses the tool to access\
    \ the database graphically. Install Mongo Compass, an official Mongo tool, by\
    \ following the steps of the official documentation[2](#index_split_004.html#p396)\
    \ according to your operating system.\n\nWhen you have Mongo Compass on your machine,\
    \ the first time you open it you see a screen like Figure [E-6](#index_split_004.html#p396),\
    \ which allows you to configure the first connection.\n\n***Figure E-6.** Mongo\
    \ Compass first page*\n\nThe next step is to click Advanced Connection Options\
    \ to introduce the username and password of the Mongo Server running on your machine.\
    \ If you use the docker-compose file, the username is `root`, and the password\
    \ is `rootpassword`. Figure [E-7](#index_split_004.html#p360) shows how the advanced\
    \ configuration on the Mongo Compass looks like.\n\n2 [https://www.mongodb.com/try/download/compass](https://www.mongodb.com/try/download/compass)\n\
    \n***Figure E-7.** Configure the connection with MongoDB server*\n\nIf you introduce\
    \ all the information correctly, you see a screen with all the databases available\
    \ on your MongoDB server. By default, there are three databases that you should\
    \ try not to remove (see Figure [E-8](#index_split_004.html#p361)).\n\n***Figure\
    \ E-8.** The available database on your machine*\n\nThe last step implies creating\
    \ a new database to save the information related to your application that contains\
    \ the catalog information. To do this, you only need to press the Create Database\
    \ button and complete the fields as you can see on Figure [E-9](#index_split_004.html#p362).\n\
    \n***Figure E-9.** Creating a new database on your Mongo server*\n\n## Cassandra\n\
    \nThe Cassandra database’s official documentation includes instructions on installing\
    \ it.[3](#index_split_004.html#p399) The best options are to use Docker commands\
    \ or a docker-compose file. Listing [E-6](#index_split_004.html#p399) shows how\
    \ to configure different instances of Cassandra using Docker-Compose.\n\n***Listing\
    \ E-6.*** Docker-compose File to Run Cassandra with Multiple Nodes\n\n```\nversion:\
    \ \"2.1\"\nservices:\n  cassandra-1:\n    image: cassandra:3.11.1\n    container_name:\
    \ cassandra-1\n    environment:\n      CASSANDRA_CLUSTER_NAME: twa\n      CASSANDRA_DC:\
    \ TDC1\n      MAX_HEAP_SIZE: 600M\n      HEAP_NEWSIZE: 100M\n    ports:\n    \
    \  - '9042:9042'\n      - '9160:9160'\n    networks:\n      cassclus:\n      \
    \  ipv4_address: 10.0.75.11\n  #Other nodes of cassandra\n  cassandra-web:\n \
    \   image: dcagatay/cassandra-web\n    environment:\n      CASSANDRA_HOST_IPS:\
    \ 10.0.75.11,10.0.75.12,10.0.75.13\n      CASSANDRA_PORT: 9042\n    ports:\n \
    \     - \"3000:3000\"\n    restart: always\n    depends_on:\n      - cassandra-1\n\
    \      - cassandra-2\n      - cassandra-3\n    networks:\n      cassclus:\n  \
    \      ipv4_address: 10.0.75.15\nnetworks:\n  cassclus:\n    driver: bridge\n\
    \    ipam:\n```\n\n3 [https://cassandra.apache.org/doc/latest/cassandra/getting_started/installing.html](https://cassandra.apache.org/doc/latest/cassandra/getting_started/installing.html)"
