    **响应式访问**


    应用程序通过 HTTP 连接建立的大部分通信都涉及一个请求、一个获取响应的特定过程以及响应（可能是异常或某种类型的信息）。


    这种方法会带来一些问题。例如，您需要等待 API 所消费的服务返回结果，然后才能开始处理信息。但如果存在一种机制，能够以流式方式返回信息，从而使您的 API
    在获取所有信息之前就能开始执行操作，那会怎样呢？


    图 11-1 展示了访问数据库的标准方式。


    ***图 11-1.** 访问数据库的标准方式*


