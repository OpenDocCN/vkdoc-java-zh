    第 4 章 持久化与领域模型


    当你使用 MapStruct 并自动执行时，从一个对象到另一个对象的映射器会调用所有 get 方法，因此 Spring Data 会假定你需要所有懒加载集合的信息。这种双向关系的主要问题在于会产生无限循环，因此你需要在
    State 实体中排除 country 字段。为了解决这个问题，你必须修改 ApiMapper 类并创建一个自定义映射器（参见清单 4-13）。


