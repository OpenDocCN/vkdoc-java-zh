- fmt: '# Redis: Key/Value Database


    Sometimes, you need to persist complex objects in a database and/or for a long
    period of time. Under these circumstances, the key/value store acts more or less
    as the `Map<K,V>` class, wherein you need a key to obtain the values, but the
    key doesn’t need to be a string. It can be another type, and the value can be
    a simple string or a complex object.


    `Redis` and `Memcached` are examples of this type of database, which you can use
    with another module of Spring Boot, such as a cache mechanism.


    The main difference between these options is the number of types of information
    that you can persist. `Redis` supports the hash, string, list, and set data types,
    whereas `Memcached` only supports strings. Another big difference is `Redis`’s
    ability to persist information in memory or disk if something happens to the database.
    You don’t want to lose all your information.


    There are other differences, but this chapter''s intent is not to compare the
    various key/value database options. In light of what I described, let’s use `Redis`.


    ## What Is Redis?


    `Redis` was created in 2009 by Salvatore Sanfilippo. He developed this solution
    to solve a problem related to the scalability of a web analyzer in the company
    where he then worked. One of the biggest attributes of this database is its high
    performance, and it is a lightweight store that can save different types of information.


    Let’s delve deeper into the most relevant attributes of this database.


    - `Redis` supports keys/values with a maximum size of 512 MB.

    - It supports string, hash, list, set, and sorted set data types. It also supports
    saving complex data objects such as JSON.

    - `Redis` is single-threaded and can grow horizontally. Additionally, it boasts
    native support for clustering instances.


    Figure 7-1 reflects these benefits.


    ***Figure 7-1.** The different data types*


    `Redis` has architectures for persisting and retrieving information; all of them
    can have the information in memory and save it on disk, depending on your approach.
    Let’s briefly go through the types.


    - **Single database**: A unique instance receives all the requests. If something
    happens, the information is unavailable to access (see Figure 7-2). When the instance
    is healthy, the information depends on its persistence strategy.


    ***Figure 7-2.** A unique database that contains all the information*


    - **High availability**: This type of architecture implies that you have two instances
    of `Redis` (see Figure 7-3). The primary receives all the


    ## Summary


    Versioning the changes in the database provides a record of all the modifications
    that happen so you can detect problems and revert them. There are many tools that
    can solve this situation. Some were covered in this chapter, but others are less
    popular and do not integrate with multiple frameworks. But Spring Boot includes
    integrations with new libraries from time to time, so check the official documentation
    regularly.'
