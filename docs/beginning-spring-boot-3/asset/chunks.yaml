    ## 第3章 Spring Data 与不同类型的持久化


    **总结**


    在本章中，你学习了如何使用 Spring Data 提供的特性来访问数据库的类型，例如创建抽象层的仓库，你无法在其中定义执行查询的逻辑。你还可以创建自定义仓库并定义完整的逻辑。


    # 第4章 持久化与领域模型


    在上一章中，你学习了 Spring 的基础知识，以及如何使用 Spring Data 的分层架构构建一个项目，该项目暴露一个端点，将信息持久化到数据库中。然而，该端点仅获取一个实体的知识，而没有任何与其他实体的连接或关系。在关系型数据库中，这种情况并不常见。


    本章将解释实体之间的关系，以及如何使用继承来减少 Java 中的重复代码。为此，让我们使用你在图[1-4]中看到的目录数据库模型，该模型表示国家、州、城市和货币的目录列表。


    最后，你将学习如何在将信息持久化到数据库之前验证实体的值，因为你可能会向数据库发送导致异常的数据。在大多数情况下，这种情况意味着在大多数相关云提供商中，通过网络传输信息会产生成本。因此，在将数据发送到数据库之前进行验证至关重要。


    ## 使用注解的 JPA 配置


    JPA 提供了一组注解，这些注解在实体中提供元数据，以便扩展此规范的库/框架使用这些信息来执行某些操作，例如创建表或验证数据库中的模型是否与实体匹配。


    这个概念听起来很抽象，但 JPA 使用注解来表示类中数据库中存在的不同类型元素和关系；例如，列名在表中可能与在实体中不同，或者你想指示如果表中的一行被删除，所有与该行有关系的表也需要被删除。你可以在`jakarta.persistence`包中找到大多数与
    JPA API 相关的注解。在导入类时检查包很重要，因为许多类在不同库中具有相同的名称。


    注解并不是将类中的属性映射到实体的唯一方式。JPA 还提供了使用 XML 描述符文件的方式，这种方式在 Hibernate 的早期版本中使用过。'
