    @Document(value = "country")


    public class Country implements Serializable {


    @Id


    private Long id;


    @Indexed


    @Field(value = "code")


    private String code;


    @DBRef


    private Currency currency;


    // 其他字段保持不变


    }


    通过这个简单的修改，当你在数据库中持久化信息时，会看到 **DBRef(''currency'', ''2'')**，这意味着该字段与另一个集合存在引用关系。要验证这一点，最佳方式是使用附录
    E 中介绍的工具。


