    第 5 章 事务管理


    这些问题在数据库中是通过事务来解决的。本章讨论涉及事务的基本概念，以及如何将这些概念应用到 Spring Data 中。


    **什么是事务？**


    关于事务的含义有多种定义。在本书中，事务是一组为了满足特定标准而需要执行的读写操作集合，以确保要么所有操作都执行，要么一个都不执行。


    1981 年，吉姆·格雷在其论文《事务的概念：优点与局限》¹中，最早定义了关于事务的大部分概念。这篇论文启发了 1986 年定义的部分 SQL 标准，并影响了后续演进的
    SQL 版本。该论文还提到了与事务相关的其他概念，如原子性、一致性和持久性，这些将在下一节讨论。


    数据库中的事务以 `BEGIN_TRANSACTION` 关键字开始，并且需要使用 `COMMIT` 关键字来指示所有操作成功结束。这样，数据库就会接受这个指令，并确保受影响的行进入新状态。另一方面，当操作失败时，你需要调用
    `ROLLBACK` 关键字，指示数据库需要回滚到所有操作执行之前的状态。图 5-2 展示了事务的处理过程。


    ¹ [`jimgray.azurewebsites.net/papers/thetransactionconcept.pdf`](http://jimgray.azurewebsites.net/papers/thetransactionconcept.pdf)


    ![](img/index-160_1.png)


    第 5 章 事务管理


    ***图 5-2.** 事务处理过程*


    在将事务概念引入 Spring Data 领域之前，让我们先回顾一些事务主题，以理解其工作原理。


    **什么是 ACID？**


    ACID 是一个缩写词，指代四个概念：原子性（Atomicity）、一致性（Consistency）、隔离性（Isolation）和持久性（Durability）。这些概念适用于关系型数据库中的所有事务，并且必须被实现以保护信息；让我们看看它们各自的含义。


    • **原子性** 是指创建一个包含一个或多个操作的单一工作单元。每个操作都必须成功完成，事务才能正常结束。如果其中一个操作失败，则所有操作都必须回滚，使数据库恢复到之前的状态。


    • **一致性** 意味着你需要将数据库从一个有效状态转移到另一个有效状态。每个数据库都有完整性规则，用于在执行插入/更新/删除操作时检查一切是否正常；这些规则会检查列的类型、长度和是否可为空是否正确。此外，规则还涵盖诸如与其他表的约束，以及某个表的某列是否需要具有唯一值等内容。


    第 5 章 事务管理


    **注意** 并非所有数据库都以相同的方式声明列或生成主键，因此验证表结构和查询非常重要。


    为了减少在任何操作（插入/更新/删除）期间产生错误的可能性，你可以包含上一章中看到的验证注解，以防止向数据库发送会导致异常的数据。


    • **隔离性** 指的是两个或多个操作可能同时尝试修改相同信息的情况。数据库需要保证，只有当事务的所有操作都成功完成后，该信息才对其他人可见。每个数据库都必须提供一种机制来解决或缓解这个问题。存在一种锁定机制来解决数据库中的并发问题，这将在本章后面讨论。


    • **持久性** 确保所有事务都已完成

