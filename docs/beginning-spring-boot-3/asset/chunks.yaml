- fmt: "`/gatling/target/gatling/currencysimulation-20220727184940969/index.html`\n\
    \n`GET /api/catalog/currency/1`: 95th percentile of response time is less than\
    \ or equal to 3000.0 : `true`\n\nThese reports could not be the best option to\
    \ understand well what happened during the execution. Gatling generated a report\
    \ in the target folder containing an entire webpage with the same information\
    \ but a different look and feel.\n\n![](index-329_1.png)\n\n## Chapter 13 Detecting\
    \ Performance Issues\n\n**Figure 13-6.** The structure of the output of the reports\n\
    \n[Figure 13-7](#index_split_004.html#p330) graphically shows all the results\
    \ so you can see each endpoint, the time of the executions, and other relevant\
    \ information.\n\n![](index-330_1.jpg)\n\n**Figure 13-7.** The metrics for the\
    \ execution times\n\nIn this chapter, you saw mechanisms to analyze problems in\
    \ your repositories that access the database. Still, there are many ways to find\
    \ problems.\n\n**Summary**\n\nThere are many ways to detect problems related to\
    \ your application's performance. The tool you use always depends on the problem\
    \ because some problems only appear in production instead of other ones that you\
    \ can reproduce in the same way using tools like Gatling.\n\nI recommend creating\
    \ a test in Gatling that simulates the situation when problems occur after modifications\
    \ are made to your application.\n\n## Chapter 14 Best Practices\n\nDevelopers\
    \ frequently implement a solution that accesses a database, but problems appear\
    \ months later. These problems may or may not relate to the solution’s implementation\
    \ because many factors can affect performance (e.g., a significant number of requests\
    \ or the need to save a lot of information within a short period of time).\n\n\
    Best practices minimize the impact or reduce the size of the information you save\
    \ in your database. This chapter covers many of the most common practices. Some\
    \ of them are simple, while others require changes to your application.\n\n###\
    \ Compressing Information\n\nSometimes, you need to save a sizeable, complex object\
    \ in Redis, which is not a problem. Still, if you need to save thousands of them\
    \ within a short period, this could impact performance or the cost of memory usage.\n\
    \nRedis allows you to define custom serializers, giving you the power to serialize\
    \ or deserialize information. Let’s create a serializer that compresses and then\
    \ decompresses an object to save space in your database.\n\nThis process implies\
    \ modifying the code you implemented in [Chapter 7](https://doi.org/10.1007/978-1-4842-8764-4_7)\
    \ but let’s start to create a class that has the responsibility to transform an\
    \ array of bytes into a compressed object. This task is not complex because you\
    \ can use this class to compress something before persisting the information in\
    \ a file. [Listing 14-1](#index_split_004.html#p331) shows a possible implementation\
    \ of a class that compress all the values of the object.\n\n**Listing 14-1.**\
    \ The Compression Class\n\n```\npackage com.apress.catalog.util;\n\nimport java.io.BufferedReader;\n\
    import java.io.ByteArrayInputStream;\nimport java.io.ByteArrayOutputStream;\n\
    import java.io.IOException;\nimport java.io.InputStreamReader;\nimport java.util.zip.GZIPInputStream;\n\
    import java.util.zip.GZIPOutputStream;\n\npublic class CompressionUtil {\n\n \
    \   private CompressionUtil() {\n        // just to avoid create instances\n \
    \   }\n\n    // This method will receive an array of bytes and try to decompress\n\
    \    // the information using GZIPInputStream\n    public static String decompress(byte[]\
    \ compressed) throws IOException {\n        ByteArrayInputStream bis = new ByteArrayInputStream(compressed);\n\
    \        GZIPInputStream gis = new GZIPInputStream(bis);\n        BufferedReader\
    \ br = new BufferedReader(new InputStreamReader(gis, \"UTF-8\"));\n        StringBuilder\
    \ sb = new StringBuilder();\n        String line;\n        while ((line = br.readLine())\
    \ != null) {\n            sb.append(line);\n        }\n        br.close();\n \
    \       gis.close();\n        bis.close();\n        return sb.toString();\n  \
    \  }\n}\n```\n\n© Andres Sacco 2023  \nA. Sacco, *Beginning Spring Data*, [https://doi.org/10.1007/978-1-4842-8764-4_14](https://doi.org/10.1007/978-1-4842-8764-4_14#DOI)"
