    **EJB**


    Enterprise JavaBeans（EJB）是一种规范，用于构建可移植、可扩展且可重用的业务应用程序，而无需重新发明处理某些常见事务（如安全性、数据库访问、跨不同应用程序发送消息等）的方法。在
    Java 的早期版本中，这些功能中的一部分存在于其他库中，或者 JDK 内部有一个基础版本，因此当 EJB 出现时，它将所有这些功能统一到了同一个框架中。


    与之前使用 JDBC 访问数据库的方法相比，最大的区别之一是你需要一个运行在应用服务器（如 Glassfish4、Wildfly5 和 Jetty6）内部的
    EJB 容器。图 1-5 展示了 EJB 提供的一些最相关的特性。


    4 [`javaee.github.io/glassfish/`](https://javaee.github.io/glassfish/)


    5 [`www.wildfly.org/`](https://www.wildfly.org/)


    6 [`www.eclipse.org/jetty/`](https://www.eclipse.org/jetty/)


    ![](img/index-30_1.png)


    第 1 章 应用程序架构


    ***图 1-5.** EJB 提供的特性*


    自 1999 年以来，EJB 经历了多个版本，引入了许多新特性，提升了性能，并修复了先前版本的错误。最近，EJB 在 Jakarta EE 的 8 和 9
    版本中被采用。表 1-3 描述了每个版本中最相关的内容 7。


    7 [`jakarta.ee/about/working-group/`](https://jakarta.ee/about/working-group/)


    第 1 章 应用程序架构


    ***表 1-3.** EJB 版本及其特性列表*


    **年份**


    **版本**


    **特性**


    1998/ eJB 1.0


    • 引入对使用实体 Bean 处理持久化对象的支持


    • 具有用于远程访问的远程接口，因此在某种程度上，EJB 是可移植的


    1999 eJB 1.1

