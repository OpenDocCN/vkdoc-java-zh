    其他替代方案允许你“回滚”更改，而无需重新部署任何内容，只需更改数据库中的一个值。这种解决方案称为特性标志，这是一种旨在降低在生产环境中部署更改可能影响应用程序的风险的模式，并赋予开发人员开启/关闭的责任。此外，这种模式有助于你在微服务中引入
    A/B 测试，允许你将一定比例的请求重定向到新功能，或进行金丝雀发布。只有微服务的一个实例启用了新功能。A/B 测试意味着同一应用程序在生产环境中有两个不同版本，部分用户可以访问一个版本，而其他用户可以访问另一个版本。


    7 [`martinfowler.com/bliki/CanaryRelease.html?ref=wellarchitected`](https://martinfowler.com/bliki/CanaryRelease.html?ref=wellarchitected)


    8 [`martinfowler.com/bliki/BlueGreenDeployment.html`](https://martinfowler.com/bliki/BlueGreenDeployment.html)


    第 6 章 版本控制或迁移变更


    **注意** 这种解决方案并非新事物。Martin Fowler 的博客中有一篇关于此主题的长文 9，发表于 2017 年。


    另一种情况可能是从关系型数据库迁移到非关系型数据库，或在非关系型数据库之间迁移。你希望将应用程序中出现新问题的风险降至最低。


    **注意** 本书涵盖了多种数据库，因此你可以使用此机制从一种关系型数据库迁移到非关系型数据库，并进行测试以检查一切是否继续正常运行。


    开关或特性标志有多种类型。其中一些会在一定时间后从源代码中移除，而另一些则会长期存在，具体取决于要测试的功能。让我们来看看这些开关选项。


    • **发布** 开关非常适合希望创建或修改现有功能，并最大限度降低部署错误风险的开发者。在大多数情况下，这种开关不是永久性的；经过短暂时间后，它就会从源代码中移除。


    • **实验性** 开关非常适合进行 A/B 测试，因此你可以使用诸如请求百分比之类的标准来指示将请求导向一个版本而非另一个版本。想象一下，你有两种方式在数据库中进行操作，但你不确定其性能以及每种方式对整个应用程序的影响。最佳解决方案是将部分请求发送到一种解决方案，并检查结果。


    • **运维** 开关是一种启用或禁用功能的常见方式；只需更改一个变量的值即可。一个常见的用例是启用或禁用与外部服务的连接，这些连接可能会影响你的微服务并导致服务降级。


    9 [`martinfowler.com/articles/feature-toggles.html`](https://martinfowler.com/articles/feature-toggles.html)


    第 6 章 版本控制或迁移变更


    • **权限** 开关是开关最常见的用途，你可以根据用户或应用程序，启用或禁用对平台或微服务某部分的访问权限。


    **实现特性标志**


    在 Spring Boot 中，这种模式的最初实现是使用配置文件根据环境来启用或禁用功能。如果你想启用某个功能，需要重新部署整个应用程序，这需要时间，因此这不是一种可扩展且高性能的解决方案。


    许多工具都实现了这种模式，但并非所有工具都具有相同数量的功能或相同成熟度。在 Java 以及与 Spring Boot 的集成中，有两个选项：Togglz10
    和 FF4J11。每个都提供了许多教程，并且有众多开发者报告问题并提出新功能，但 FF4J 提供了额外的功能来帮助你。


    • 与多种类型的数据库集成，以保存关于特性标志的信息和指标

