- fmt: "# The Java Persistence API (JPA)\n\nThe Java Persistence API, or JPA, is a\
    \ specification[15](#index_split_000.html#p33) connected directly with the persistence\
    \ into databases. To be more specific, JPA provides a set of interfaces that all\
    \ the providers need to follow to guarantee that there are following the standard\
    \ so you can change the provider without too much effort.\n\nUsing JPA, developers\
    \ can access the information in a database and execute certain operations like\
    \ insert, update, delete and retrieve using a Java class that represents the structure\
    \ of the tables. To do these operations, you need to annotate the classes with\
    \ annotations representing the most common things in a table, such as the table\
    \ name, column size, and the relationship between tables.\n\nJPA offers several\
    \ ways to do the queries to retrieve the information. One is using a SQL statement\
    \ directly like JDBC with classes to help construct the sentence, and another\
    \ introduces an abstraction so that you don’t need to write the entire sentence\
    \ because the provider of JPA generates the sentence dynamically. Figure [1-7](#index_split_000.html#p34)\
    \ shows the different layers or the structure of JPA with an application.\n\n\
    15 [https://www.jcp.org/en/jsr/detail?id=338](https://www.jcp.org/en/jsr/detail?id=338)\n\
    \n![](index-34_1.png)\n\n**Figure 1-7.** Example of the structure of layers using\
    \ JPA\n\nThis specification has many implementations, but the most relevant are\
    \ Hibernate,[16](#index_split_000.html#p34) EclipseLink,[17](#index_split_000.html#p34)\
    \ Apache OpenJPA,[18](#index_split_000.html#p34) and Spring Data JPA.[19](#index_split_000.html#p34)\
    \ Each of them implements the specification of JPA but differently, prioritizing\
    \ things like the performance or the developer experience.\n\nLet’s look at an\
    \ example where you can declare a class representing one table in a database.\n\
    \n16 [https://hibernate.org/](https://hibernate.org/)\n17 [https://www.eclipse.org/eclipselink/](https://www.eclipse.org/eclipselink/)\n\
    18 [https://openjpa.apache.org/](https://openjpa.apache.org/)\n19 [https://spring.io/projects/spring-data](https://spring.io/projects/spring-data)\n\
    \n```\npackage com.apress.jpa.model;\n\nimport javax.persistence.Column;\nimport\
    \ javax.persistence.Entity;\nimport javax.persistence.GeneratedValue;\nimport\
    \ javax.persistence.GenerationType;\nimport javax.persistence.Id;\nimport javax.persistence.Table;\n\
    import java.io.Serializable;\n\n@Entity // Required\n@Table(name = \"currency\"\
    ) //Optional only if you need to indicate the name\npublic class Currency {\n\n\
    \    @Id //Required - Identify which is the primary key\n    @GeneratedValue(strategy\
    \ = GenerationType.SEQUENCE) //Indicate the way to generate the ID\n    private\
    \ Long id;\n\n    private String code;\n    private String description;\n    private\
    \ Boolean enable;\n\n    @Column(name = \"decimal_places\", length = 5) //Optional:\
    \ Indicate the name and the length of the column\n    private String decimalPlaces;\n\
    \n    public Currency(Long id, String code, String description, Boolean enable,\
    \ String decimalPlaces) {\n        this.id = id;\n        this.code = code;\n\
    \        this.description = description;\n        this.enable = enable;\n    \
    \    this.decimalPlaces = decimalPlaces;\n    }\n\n    // Setters and getters\
    \ for all the attributes\n    //Override the hashCode and equals methods\n}\n\
    ```\n\nThe way to indicate the name and the length of the columns is not so complicated.\
    \ If you do not indicate the name and the size by default, the implementation\
    \ of JPA defines the values, which is 255 in the string.\n\n**Note** You learn\
    \ more about JPA in part II of this book.\n\n## Spring Data\n\nThe main problem\
    \ with all the previous mechanisms of persistence is you don’t have the chance\
    \ to access both types of databases, relational or non-relational. But Spring\
    \ Data solves this problem, allowing you to access databases using repositories\
    \ with an interface to do CRUD operations. Also, you can create concrete that\
    \ implements the"
