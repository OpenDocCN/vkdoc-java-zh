- fmt: "# Redis: Key/Value Database\n\nOperations and replicates the changes in the\
    \ secondary, so if the primary database is unhealthy, you can access the information\
    \ using the other instance. The replication does not instantly take a few milliseconds,\
    \ so there is little chance you lost information.\n\n**Figure 7-3.** Multiple\
    \ databases that have a mechanism of replication\n\n- **Sentinel**: This is a\
    \ minor modification of the previous approach where some nodes are responsible\
    \ for detecting if the primary and secondary instances are functional and responding\
    \ to the request (see Figure [7-4](#index_split_002.html#p203)).\n\n![](index-203_1.png)\n\
    \n**Figure 7-4.** Multiple databases with a Sentinel mechanism\n\n- **Cluster**:\
    \ This approach implies the possibility of having multiple primary and secondary\
    \ instances with the idea of sharing the information, which means that you have\
    \ certain information in one primary instance but not in the other ones, maintaining\
    \ the mechanism of replication of the information in one secondary instance (see\
    \ Figure [7-5](#index_split_002.html#p204)). This approach is especially useful\
    \ when you have many requests and a huge volume of information.\n\n![](index-204_1.png)\n\
    \n**Figure 7-5.** Multiple databases where the master nodes have communication\n\
    \nSpring Data supports all these alternatives, where you can configure using `application.yml`.\n\
    \n## Spring Data Structures\n\nSpring Data Redis[3](#index_split_002.html#p204)\
    \ has the same idea that the JPA version tries to reduce the complexity of interaction\
    \ with the database by providing a set of classes or components to interact simply.\
    \ They have the following components.\n\n- The **driver** is responsible for interacting\
    \ with the database to execute all the operations.\n- `RedisConnection`/`RedisConnectionFactory`\
    \ is responsible for interacting with the driver and transforming all the operations\
    \ and the exceptions into something similar to the JPA repositories.\n- **Entities**\
    \ represent and contain all the information you persist in the database. This\
    \ is a good way to maintain certain standards for implementations of Spring Data\
    \ (JPA, Redis, Cassandra). Still, you can omit these classes and persist the information\
    \ using a simple string or a DTO.\n- **Serializers** provide a way to persist\
    \ and obtain the information in the database in another format. For example, you\
    \ can transform an object into a string and compress the information to reduce\
    \ the size of the information, which is extremely useful when you have a large\
    \ number of rows to persist. Some cloud providers, like AWS, pay for the memory\
    \ that Redis needs.\n- **Other components** using Sentinel or master/replica support\
    \ are connected similarly to the driver.\n\nSpring Data maintains the spirit of\
    \ including a short number of dependencies to work with each database. In Redis,\
    \ you only need to include the particular dependency of Redis and the driver,\
    \ which behind the scenes, is responsible for interacting with the database and\
    \ executing the operations to save or get the information.\n\nSpring Data Redis\
    \ supports drivers like Jedis,[4](#index_split_002.html#p205) Lettuce,[5](#index_split_002.html#p205)\
    \ JRedis,[6](#index_split_002.html#p205) and RJC,[7](#index_split_002.html#p205)\
    \ but the most popular among developers are the first two options. The main differences\
    \ between these options are contrasted in Table [7-1](#index_split_002.html#p205).\n\
    \n**Table 7-1.** Client Differences\n\n| Jedis | Lettuce |\n|-------|---------|\n\
    | does not support reactive connections and blocks the connection | a non-blocking\
    \ redis client based on Netty |\n| has a particular instance for each thread |\
    \ shares the connection with multiple threads |\n| does not support master/replica\
    \ connection | supports master/replica connection |\n| the default driver in Spring\
    \ Boot 1.x.x | the default driver in Spring Boot 2.x.x and 3.x.x |\n\n[4](https://github.com/xetorthio/jedis)\
    \  \n[5](https://github.com/lettuce-io/lettuce-core)  \n[6](https://github.com/spring-projects/spring-data-redis)\
    \  \n[7](https://github.com/redis/jedis)"
