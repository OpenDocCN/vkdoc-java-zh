    仓库接口体现了执行 Spring Data 框架未涵盖的特定操作的理念。这些仓库几乎在所有实现中都可用，用于访问数据库，以降低在同一应用程序中使用多个数据库的复杂性。


    有一些基础仓库可用于扩展你的仓库功能。


    其中，有两个最为相关。`CrudRepository` 包含了所有实体的基本操作。`PagingAndSortingRepository` 包含了使用分页和排序标准从数据库中获取某个结构信息的所有逻辑。


    图 1-8 展示了 Spring Data 支持 MongoDB、Redis、Neo4j、Cassandra 以及所有关系型数据库。其他数据库，如 ElasticSearch20
    和 Couchbase21，本书未作介绍，因为它们具有类似的信息存储结构。


    20 [`www.elastic.co/`](https://www.elastic.co/)

    21 [`www.couchbase.com/`](https://www.couchbase.com/)


    ![](img/index-37_1.png)


    第 1 章 应用程序架构


    ***图 1-8.** 仓库的结构取决于数据库*


    **注意** 在某些数据库中，Spring Data 提供了一种方法，可以使用在仓库或 DAO 后台使用的模板来分配和转换数据库中的异常，以执行诸如插入或检索信息之类的操作。Spring
