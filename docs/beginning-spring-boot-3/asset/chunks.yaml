    Chapter 8 MongoDB: Document Database


    Figure 8-1 shows the equivalence between the previous relational databases with
    a document database.


    ***Figure 8-1.** Relational databases vs. document databases*


    There is some equivalence between the structures; for example, a table in a relational
    database is a collection in MongoDB, one of the implementations of document store
    databases, so it does not remove all the concepts you know. It reconverts to something
    different.


    ### Possible Use Cases


    There are situations where these databases are good candidates to be used, but
    there is no restriction about use in other situations. Let''s look at some uses.


    - **Catalogs**: Some applications store information about the products in e-commerce
    or places like countries/cities/states or airports relevant to the database''s
    performance. Still, you want to have all the benefits of doing a lot of types
    of queries. Imagine needing to do a lot of queries to obtain information about
    a specific country. It could be better to execute one query to a specific structure
    and obtain the JSON that could be a response of the endpoint.


    - **Content management**: If you have applications like blogs or video platforms
    where the structure could be changed because the platform suffers modifications,
    but you don''t need that, everything with the same structure could be a good choice.
