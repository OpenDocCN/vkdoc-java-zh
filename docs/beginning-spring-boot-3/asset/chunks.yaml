    \ for isolation levels in versions prior to Spring 4.1.\n\nOne feature that does\
    \ not have an equivalent in the common transactions is the chance to set a timeout\
    \ to finish the entire operation (see Listing 5-5). If the transaction does not\
    \ finish in the timeout, Spring does the rollback automatically. The default value\
    \ is `-1`, meaning the transaction could take time to finish.\n\n**Listing 5-5.**\
    \ An Example of Setting Timeout\n\n```\n@Transactional(readOnly = true, timeout\
    \ = 1000) // Timeout is expressed in milliseconds\npublic CountryDTO getById(Long\
    \ id) {\n    // All the logic of the method\n}\n```\n\n3 [https://github.com/spring-projects/spring-framework/issues/9687](https://github.com/spring-projects/spring-framework/issues/9687)\n\
    \nAnother property that does not have a direct correlation with the transaction\
