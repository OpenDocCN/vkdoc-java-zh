- fmt: '# Studio 3t


    `Studio 3t`[12](#index_split_004.html#p361) is an alternative to `Compass`, which
    many beginning developers use.


    The interface looks similar to tools like `MySQL Workbench` or `pgAdmin III`.
    You can run queries without blocking the UI. Figure [B-7](#index_split_004.html#p360)
    shows a little overview of what the tool looks like.


    10 [https://www.mongodb.com/](https://www.mongodb.com/)

    11 [https://www.mongodb.com/products/compass](https://www.mongodb.com/products/compass)

    12 [https://studio3t.com/](https://studio3t.com/)


    ![Figure B-7](index-362_1.jpg)


    **Appendix B Recommended and Alternative Tools**


    ***Figure B-7.** Studio 3t finding a collection*


    # MySQL


    `MySQL Workbench`[14](#index_split_004.html#p362) is one of the most used interfaces
    to execute queries and do a certain level of administration of `MySQL` databases.
    Using this tool, you can see the use of the resources for each database, model
    the tables and the relationship between them, and explain each query. Figure [B-8](#index_split_004.html#p361)
    shows a little overview of what the tool looks like.


    13 [https://www.mysql.com/](https://www.mysql.com/)

    14 [https://www.mysql.com/products/workbench/](https://www.mysql.com/products/workbench/)


    ![Figure B-8](index-363_1.jpg)


    **Appendix B Recommended and Alternative Tools**


    ***Figure B-8.** MySQL Workbench with the results of one query*


    # Neo4j


    `Neo4j Browser`[16](#index_split_004.html#p363) is the default way to connect
    with any `Neo4j` database. By default, tools include `Neo4j Browser`. One of the
    pros of this tool is that it is free and created and supported by the company
    that created `Neo4j`. Figure [B-9](#index_split_004.html#p362) shows a little
    overview of what the tool looks like.


    15 [https://neo4j.com/](https://neo4j.com/)

    16 [https://neo4j.com/developer/neo4j-browser/](https://neo4j.com/developer/neo4j-browser/)


    ![Figure B-9](index-364_1.jpg)


    **Appendix B Recommended and Alternative Tools**


    ***Figure B-9.** The configuration window of Neo4j*


    `Graphileon`[17](#index_split_004.html#p364) is a fee-based tool to connect with
    different types of non-relational databases like `Neo4j`, `Redis`, and `Cassandra`.
    These tools support all the operating systems and provide some features that do
    not exist in `Neo4j Browser`, like creating libraries to visualize the information
    like diagrams or images. Figure [B-10](#index_split_004.html#p363) shows a little
    overview of what the tool looks like.


    17 [https://graphileon.com/](https://graphileon.com/)


    ![Figure B-10](index-365_1.jpg)


    **Appendix B Recommended and Alternative Tools**


    ***Figure B-10.** Settings windows of Neo4j*


    # PostgreSQL


    `pgAdmin`[19](#index_split_004.html#p365) is the most popular tool to connect
    with `PostgreSQL` databases. It provides a set of features to check the use of
    the memory/CPU and explain the queries graphically. Figure [B-11](#index_split_004.html#p364)
    shows a little overview of what the tool looks like.


    18 [https://www.postgresql.org/](https://www.postgresql.org/)

    19 [https://www.pgadmin.org/](https://www.pgadmin.org/)


    ![Figure B-11](index-366_1.jpg)


    **Appendix B Recommended and Alternative Tools**


    ***Figure B-11.** pgAdmin with the results of one query*


    # Redis


    `RedisInsight`[21](#index_split_004.html#p366) is the free official tool to connect
    with the `Redis` database and interact with all the features like seeing the size
    of the information that is saved, checking the information that uses the graphs,
    analyzing the use of resources like CPU and memory, and all the elements to administrate
    a `Redis` database locally or remotely. One interesting feature of this tool is
    that it allows you to configure an existing database, or you can download or create
    one using the tool. Figure [B-12](#index_split_004.html#p365) shows a little overview
    of what the tool looks like.


    20 [https://redis.io/](https://redis.io/)'
