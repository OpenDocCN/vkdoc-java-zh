    `Iterable`、`List` 和 `Set` 接口的类。但在本例中，你返回了一个列表，因为这里对元素是否重复没有限制。


    看完上一个示例中的代码块后，你可以考虑本节应包含哪些内容。这个问题的答案是，在完全手动编写查询和将创建查询的全部责任委托给 Spring Data 之间，还存在另一种方法。Criteria
    API 提供了一种以编程方式创建查询的方法，可以防止语法错误。要实现这种方法，你必须创建一个包含所有查询创建逻辑的自定义仓库。


    让我们以 Criteria API 为例。清单 3-14 将一个简单的按代码查找货币的方法转换为一个自定义方法。


