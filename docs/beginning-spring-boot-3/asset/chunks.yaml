    This book uses Neo4j, a popular graph database. Spring Data offers extensive support
    to this database since the first versions reduce the complexity of the use.


    ## What Is Neo4j?


    Neo4j is a graph database that supports ACID properties like relational databases
    where you can scale the database without downtime or the risk you lose some information.
    This database is optimized for queries across the nodes to obtain certain information.
    It’s used in applications that expose an interface with GraphQL.


    The following are the most relevant features.


    - It is unnecessary to join to obtain the information saved on another node because
    it obtained the information of the nearby node, which is connected.

    - It provides a flexible and simple data model that can be changed without problems.

    - Many languages, including Java, Scala, and Node.js, support it.

    - It provides a declarative language to write queries that are human-readable.


    There is a certain similarity between the relational databases, which could help
    you to understand how Neo4j is organized, as shown in Table 9-1, which explains
    some of the annotations that appear in Spring Data Neo4j.


    **Table 9-1.** Equivalence Between Two Databases


    | Relational Databases | Neo4j |

    |----------------------|-------|

    | Database             | Database |

    | table                | Node |

    | Column               | property |

    | Constrain            | relationship |


    Let’s examine these concepts.


    - A **node** represents an object which can have one or more properties that are
    grouped by criteria. The definition of the names needs to be in CamelCase as a
    suggestion for the official documentation of Neo4j.

    - A **property** in Neo4j represents a key-value pair to store the information
    about one node and the relationships. For example, in `api-catalog`, a property
    could be a country’s code or a description. Some of the property types supported
    by Neo4j are `string`, `float`, `long`, `date` (all the variations), and `point`.

    - A **relationship** connects one or more nodes, which in most cases are unidirectional,
    but it’s possible to do it bidirectional too.


    **Note** there are many tools to draw the graphs without creating the query. The
    most relevant is `arrows`, which Neo4j supports. You can drag and drop nodes,
    including the link between each of them and include the properties, and when you
    finish, you can export the result, which could be a Cypher query to run on your
    Neo4j browser.


    ## Introduction Spring Data Neo4j


    Spring Data supports databases by working directly with the drivers. In Neo4j,
    the Spring Data Neo4j project has been available for many years to help reduce
    the complexity of the database configuration and the entities.'
