    第 7 章 Redis：键/值数据库


    为了维护微服务，请移除所有与 JPA/PostgreSQL 相关的依赖项以及实体中与关系型数据库相关的注解，但不要移除仓库或服务中用于访问信息的逻辑。


    之后，你需要修改之前的 JPA 实体，使用 `@RedisHash` 注解并指定“实体”名称，将其转换为 Redis 实体，如清单 7-4 所示。


    ***清单 7-4.*** Redis 实体的定义


    import org.springframework.data.annotation.Id;


    import org.springframework.data.redis.core.RedisHash;


    import java.util.List;


    import java.io.Serializable;


    @RedisHash("country")


    public class Country implements Serializable {


    @Id


    private Long id;


    // 之前的源代码


    }


    在幕后，Spring Data 会获取“country”前缀，并将其附加到使用 `@Id` 注解的字段值上，从而减少多个实体或具有相同 ID 的对象之间发生冲突的问题或风险。


    如果你完成了上述所有修改，应用程序将继续使用相同的端点运行。但在 Redis 中，实体之间无法建立关联，因为该数据库作为键/值存储工作，所有键之间没有任何关系。


    你可以保存元素，但无法引用其他值。如果你的 Country 实体包含一个货币（currency）和一个州（states）列表，那么你会保存多个包含相同信息的元素。不过，让我们再次运行应用程序，并使用
