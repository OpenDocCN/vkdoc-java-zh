    第 4 章 持久化与领域模型


    • **GenerationType.TABLE** 是一种替代方案，适用于不支持使用 SEQUENCE 的数据库；例如，MySQL 5.7 及更低版本就不支持。其目标是在你的模式中创建一个表，该表为每个需要生成
    ID 的实体包含一行，该行的值即为下一个可用的值。


    • **GenerationType.AUTO** 是一种策略，它会考虑你所使用的数据库，并定义出最佳选项。你可以在注解中指明此策略，或者不写任何内容直接使用
    **@GeneratedValue()**，因为这两种情况表示的含义相同。


    **注意** 存在许多表生成器的实现，用于优化并降低冲突风险。例如 hilo 和 pooled 优化器，它们是 Hibernate 的一部分。对这些实现的详细解释超出了本书的范围，但你可以在
    Vlad Mihalcea 的博客¹中找到很好的解释。


    始终指明生成值的策略是一种好做法，这样可以保持控制权，而不将其委托给 Spring Data（Spring Data 又会委托给 Hibernate），因为由你决定哪种策略最适合。


    **关系类型**


    在定义数据库结构时，许多表之间都存在关系，以减少冗余信息的数量。当一个表中存在外键，而另一个表中存在主键时，你就能看到表之间的关系。


    JPA 提供了一组注解来声明实体之间的关系类型。如果从一个实体就能访问到两个实体的信息，那么这种关系可以是单向的；例如，你可以获取某个国家使用的货币信息，但反之则不行。另一方面，如果可以从任何一个实体导航到另一个实体，则存在双向关系。


    ¹ [`vladmihalcea.com/migrate-hilo-hibernate-pooled/`](https://vladmihalcea.com/migrate-hilo-hibernate-pooled/)


    ![](img/index-123_1.png)


    第 4 章 持久化与领域模型


    下面描述了实体之间的关系类型。


    • **@ManyToOne** 是最常见的关系类型，其中多个实体引用同一个实体；例如，在目录应用中，多个国家可能使用同一种货币。Spring Data 使用一个表中的外键来与另一个表进行连接；例如，国家表使用
    currency_id 来与货币表中的 id 列进行连接。


    另一种选择是 **@OneToMany**，当你试图建立双向关系时使用，但在你的表中，这两种类型实际上是相同的。要建立双向关系，两个实体都需要拥有一个指向对方实体的属性，其中一个使用
    @ManyToOne，另一个使用 @OneToMany。例如，在目录应用中，存在多个 @ManyToOne 关系。让我们建立 Country 和 Currency
    实体之间的连接。


    在 Country 实体中，有一个带有 @ManyToOne 注解的 Currency 属性；而在 Currency 中，你可以添加一个带有 @OneToMany
    注解的 Country 属性。这就是生成双向关系的方式。一对多关系的示例见图 4-2。


    ***图 4-2.** 目录应用的两个表*


    • **@OneToOne** 不是最常见的关系类型。一个表拥有一个与另一个表主键关联的外键，且没有机会引用多行。这种类型的一个问题是当你创建双向关系时，两个实体都使用非空值引用对方。这可能会产生异常，因为一个实体需要另一个实体存在于数据库中，反之亦然，这就像死锁一样。为了解决这个问题，其中一个实体需要允许空值。

