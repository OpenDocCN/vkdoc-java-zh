    This solution works fine but is not the best approach for creating multiple indexes
    in a database.


    ## Chapter 7 Redis: Key/Value Database


    **Summary**


    This chapter covered the approaches for using Redis. Most of them are supported
    in Spring Data, like having single or multiple database nodes. You learned how
    to persist the information using a custom serializer and how to do the configuration
    in the application.


    There is no correct answer about which approach you can use because it depends
    on your business and the cost associated with having multiple instances of the
    same database running, for example, on a cloud provider like AWS.


    ## Chapter 8 MongoDB: Document Database


    When you create an application, you may need to persist information in a specific
    format that will need modifying in the future. You may think that a relational
    database could be the best alternative for saving this kind of information. Still,
    some non-relational databases offer the flexibility to change the structure of
    the "tables" without problems and save complex objects where you have the chance
    to create complex queries.


    The evolution and the stability of non-relational databases offer excellent performance
    with large amounts of information. Still, you need to lose something compared
    with the relational databases, like having duplicate information.


    This chapter discusses a new non-relational database that can save all the information
    like a document and its primary benefits.


    ### What Is a Document Store?


    A document store is a non-relational database where you can store the information
    as a JSON document without having a rigid schema like the relational databases,
    so you can add, remove, or change the format of the attributes flexibly. Of course,
    you need to modify your application to not produce exceptions in the source code.


    The source offers you a structure that is readable for anyone and, depending on
    the complexity of your application, could be matched with the response of some
    endpoints.


    If you want to transform your `api-catalog` application from multiple tables to
    only one, it''s possible to do it while maintaining the exact structure of the
    DTO. Still, one of the main problems is the duplicity of the information, which
    is familiar in non-relational databases. Still, some implementations offer the
    possibility to create structures and connect them like relational databases.


