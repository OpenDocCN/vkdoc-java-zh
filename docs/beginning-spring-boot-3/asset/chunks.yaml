    第 7 章 Redis：键/值数据库


    **总结**


    本章涵盖了使用 Redis 的各种方法。其中大部分方法在 Spring Data 中都得到支持，例如使用单个或多个数据库节点。你学习了如何使用自定义序列化器持久化信息，以及如何在应用程序中进行配置。


    关于使用哪种方法并没有标准答案，因为这取决于你的业务需求，以及在同一数据库运行多个实例（例如在 AWS 这样的云服务提供商上）所产生的相关成本。


    **第 8 章**


    **MongoDB：文档**


    **数据库**


    当你创建应用程序时，可能需要以特定格式持久化信息，而这些格式将来可能需要修改。你可能会认为关系型数据库是保存这类信息的最佳选择。然而，一些非关系型数据库提供了灵活修改“表”结构的能力，并且可以保存复杂对象，让你有机会创建复杂的查询。


    非关系型数据库的演进和稳定性使其在处理大量信息时表现出色。但与关系型数据库相比，你也不得不做出一些取舍，例如数据重复的问题。


    本章将讨论一种新的非关系型数据库，它可以像保存文档一样保存所有信息，并介绍其主要优势。


    **什么是文档存储？**


    文档存储是一种非关系型数据库，你可以将信息存储为 JSON 文档，而无需像关系型数据库那样拥有严格的模式。因此，你可以灵活地添加、删除或修改属性的格式。当然，你需要修改应用程序，以避免在源代码中产生异常。


    这种数据源提供了一种任何人都能读懂的清晰结构，并且根据应用程序的复杂程度，它甚至可以与某些端点的响应格式相匹配。


    如果你想将你的 **api-catalog** 应用程序从多个表转换为单个表，这是可行的，同时还能保持 DTO 的精确结构。然而，主要问题之一是信息的重复性，这在非关系型数据库中很常见。不过，一些实现方案也提供了创建结构并将其像关系型数据库那样连接起来的可能性。


    © Andres Sacco 2023

    A. Sacco, *Spring Data 入门*[, https://doi.org/10.1007/978-1-4842-8764-4_8](https://doi.org/10.1007/978-1-4842-8764-4_8#DOI)


    ![](img/index-225_1.png)


    第 8 章 MongoDB：文档数据库


    图 8-1 展示了之前的关系型数据库与文档数据库之间的对应关系。


    ***图 8-1.** 关系型数据库 vs. 文档数据库*


    这些结构之间存在一些对应关系；例如，关系型数据库中的表在 MongoDB（文档存储数据库的一种实现）中就是集合。因此，它并没有完全抛弃你已知的所有概念，而是将其转换为不同的形式。


    **可能的使用场景**


    在某些情况下，这些数据库是很好的候选方案，但这并不限制它们在其他场景中的使用。让我们来看一些用例。


    • **目录**：一些应用程序存储电子商务中的产品信息，或者与数据库性能相关的国家/城市/州或机场等地点信息。同时，你希望享受执行多种类型查询的所有好处。想象一下，你需要执行大量查询才能获取某个特定国家的信息。那么，更好的做法是只对特定结构执行一次查询，并直接获得可以作为端点响应的
    JSON 数据。


    第 8 章 MongoDB：文档数据库


    • **内容管理**：如果你有博客或视频平台这类应用程序，其结构可能会因为平台本身的修改而发生变化，但你并不需要所有内容都保持相同的结构，那么这（指使用文档数据库）可能是一个不错的选择。修改新

