    第 11 章 响应式访问


    **什么是响应式访问？**


    在传统应用程序中，每个请求会在一段时间内分配一个线程来执行特定操作；这种方法被称为“每请求一线程”模型。在此期间，该进程会独占内存和 CPU 资源。图 11-2
    展示了大量请求同时访问数据库的情况，在每次操作返回结果之前，会浪费内存/CPU 等资源。响应式编程是一种替代方案，它解决了诸如资源合理利用等问题，从而提高了可扩展性。


    ***图 11-2.** 访问数据库的响应式方法*


    为了从另一个角度理解这个问题，假设您有机会同时接收一千个请求。您的应用程序可能因需要更多资源或需要增加连接池大小等因素而无法扩展。如果您减少每个资源的使用时间，就无需对基础设施或应用程序进行重大更改即可返回结果。


    响应式编程背后的理念是不阻塞线程。相反，应用程序将请求视为带有回调的事件。这个概念多年前在 JavaScript 等其他语言中就已流行。它意味着等待直到有结果返回，然后使用回调向请求的发起者发送通知以及操作的结果。


    第 11 章 响应式访问


    在此过程中，应用程序的线程可以用于处理其他请求。信息可以作为信息流返回，这样您可以在收到响应时执行不同的操作，而无需等待获取所有信息。如果在流式处理过程中发生错误，操作将终止，这是合理的，因为在阻塞方法中尝试执行相同操作时也可能发生同样的情况。


    在 Spring Boot 中，该框架有一个用于通用响应式编程的项目，称为 Spring WebFlux，它通过使用信息流中的两个事件发布器来实现。


