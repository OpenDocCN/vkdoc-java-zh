    \ {\n        this.settings = settings;\n        this.longSerializer = longSerializer;\n\
    \    }\n\n    @Bean\n    public RedisTemplate<Long, Object> redisTemplate(RedisConnectionFactory\
    \ connectionFactory) {\n        RedisTemplate<Long, Object> template = new RedisTemplate<>();\n\
    \        template.setConnectionFactory(connectionFactory);\n        template.setKeySerializer(longSerializer);\n\
    \        return template;\n    }\n\n    // 之前的源代码\n}\n```"
- fmt: "# Redis Custom Repositories\n\nIn this case, Redis has a serializer defined\
    \ to the base data types, but you can change their behavior and create a new one.\
    \ A possible reason for implementing this type of serializer is to optimize the\
    \ size of the information you persist in the database, which you learn more about\
    \ in the final chapter.\n\n## Defining Custom Repositories\n\nUntil now, you changed\
    \ the persistence model from a relational database for Redis without changing\
    \ anything in the repositories. But in Spring Data Redis, you can define a custom\
    \ repository using the `RedisTemplate` you defined or the predefined library.\n\
    \nLet’s change your previous repository to do the same but use `RedisTemplate`\
    \ instead of delegating everything to the framework. The first thing to do is\
    \ create an interface containing all the repository’s operations in the same way\
    \ that appears in Listing 7-12.\n\n***Listing 7-12.*** Definition of Custom Repository\
    \ Interface\n\n```\npackage com.apress.catalog.repository;\n\nimport com.apress.catalog.model.Country;\n\
    import java.util.Optional;\n\npublic interface CustomCountryRepository {\n   \
    \ Country save(Country entity);\n    Optional<Country> findById(Long id);\n  \
    \  void deleteById(Long id);\n}\n```\n\nThe next step is to create a concrete\
    \ class that implements the previous interface and imports `RedisTemplate`, which\
    \ you defined in the `RedisConfiguration` class. You need to obtain `HashOperations`\
    \ from `RedisTemplate`, which executes all the operations related to the database.\
    \ You can think of this as `EntityManager` in JPA (see Listing 7-13).\n\n***Listing\
    \ 7-13.*** Definition of Custom Repository Concrete Class\n\n```\npackage com.apress.catalog.repository;\n\
    \nimport com.apress.catalog.model.Country;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.data.redis.core.HashOperations;\nimport org.springframework.data.redis.core.RedisTemplate;\n\
    import org.springframework.stereotype.Repository;\nimport java.util.Optional;\n\
    \n@Repository\npublic class CustomCountryRepositoryImpl implements CustomCountryRepository\
    \ {\n    // Use the key to create a unique element in the database like country_xxx\n\
    \    private static final Object COUNTRY_KEY = \"country\";\n    private final\
    \ RedisTemplate redisTemplate;\n    private HashOperations hashOperations;\n\n\
    \    @Autowired\n    public CustomCountryRepositoryImpl(RedisTemplate redisTemplate)\
    \ {\n        this.redisTemplate = redisTemplate;\n        // Obtain the HashOperations\
    \ to interact directly with the database\n        this.hashOperations = redisTemplate.opsForHash();\n\
    \    }\n\n    @Override\n    public Country save(Country entity) {\n        //\
    \ Execute a save operation which does not return anything, so you need to\n  \
    \      // do a find operation to return it\n        hashOperations.put(COUNTRY_KEY,\
    \ entity.getId(), (Object) entity);\n        return findById(entity.getId()).get();\n\
    \    }\n\n    @Override\n    public Optional<Country> findById(Long id) {\n  \
    \      return Optional.of((Country) hashOperations.get(COUNTRY_KEY, id));\n  \
    \  }\n\n    @Override\n    public void deleteById(Long id) {\n        // This\
    \ operation only needs the \"prefix\" of the key and the value\n        // country_xxxx\
    \ to delete\n        hashOperations.delete(COUNTRY_KEY, id);\n    }\n}\n```\n\n\
    There are no `@Transactional` annotations in the methods because this database\
    \ does not have transactions.\n\nLastly, change the repository in the `CountryService`\
    \ to use the new one in the same way that appears in Listing 7-14.\n\n***Listing\
    \ 7-14.*** Service Modifications\n\n```\n@Service\npublic class CountryService\
    \ {\n    CustomCountryRepositoryImpl countryRepository;\n    // Previous source\
    \ code\n\n    @Autowired\n    public CountryService(CustomCountryRepositoryImpl\
    \ countryRepository,\n                          StateRepository stateRepository,\
    \ Validator validator) {\n        this.countryRepository = countryRepository;\n\
    \        this.stateRepository = stateRepository;\n        this.validator = validator;\n\
    \    }\n    // Previous source code\n}\n```\n\nIf you run the applications again\
    \ and execute the save or retrieve the information using some of the tools mentioned\
    \ in Appendix B, you have the same behavior used in the previous repository.\n\
    \n## Queries by Example"
