    **第 3 章**


    **Spring Data 与不同类型的持久化**


    第[1 章](https://doi.org/10.1007/978-1-4842-8764-4_1)讨论了持久化信息的机制。其中之一是 Spring Data，它提供了使用不同数据库进行信息持久化的可能性，具备一定的抽象层次，并且无需大量代码即可解决大多数常见操作。


    本章涵盖 Spring Data 的基础知识，包括仓库（Repository）的工作原理以及如何定义自定义实现。这些主题非常重要，因为后续章节中大部分都会用到它们。


    **什么是 Spring Data？**


    Spring Data 是 Spring 支持的一系列项目，旨在简化对 MongoDB、Redis、Cassandra、Neo4j、Memcached 以及所有关系型数据库的访问。在关系型数据库中，与
    JDBC、Hibernate、JPA、JDO 或 MyBatis 等其他方案相比，Spring Data 提供了更简化的访问方式，减少了任何数据库操作所需的类、层和配置数量。


    Spring Data1 首次出现在 2010 年的 Spring One 大会上。Rod Johnson（SpringSource 公司）和 Emil Eifrem（Neo
    Technologies 公司）尝试使用 Spring 将 Neo4j 数据库与应用程序连接起来。他们创建了用于在应用程序和数据库之间建立连接的类；这些类成为了
    Spring Data 的基础。此后，该项目家族不断壮大，为不同的数据库提供支持，遵循降低复杂性并在应用程序与数据库之间建立一定抽象层次的精神。


    现在，让我们思考一下为什么你需要转向使用 Spring Data，而不是使用数据库驱动程序。假设你有一个使用 Redis 的应用程序。维护该数据库的相关成本很高，因此基础设施团队建议将信息迁移到高度优化的
    Cassandra。这种情况下的问题是，如果你仅使用数据库驱动程序来实现所有持久化和检索信息的逻辑，那么你需要修改大量与 CRUD 操作、连接以及所有配置相关的代码行。但如果你使用
    Spring Data，更换数据库只需修改实体中的注解和配置即可。


