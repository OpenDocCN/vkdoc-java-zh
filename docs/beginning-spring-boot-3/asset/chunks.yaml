    **Repository Support**


    When you write an application that needs to persist/retrieve information from
    a database, you create a class or layer that contains all these operations in
    most cases. There are multiple ways to group these operations: all together in
    the same class, one class per table, but the most common way to do it is to create
    a class that represents the DAO pattern, which is discussed more in the next section,
    with all the operations of one table. This means that you can have multiple classes
    to access the database, where the main difference is the table you access. To
    reduce the complexity of having multiple classes with the same code, `Spring Data`
    offers the possibility to use an abstraction that contains all these operations,
    and you only need to indicate the name of the entity/table that you access.


    `Spring Data` offers interfaces that provide common database operations. You need
    to create an interface that extends from one of those common interfaces and indicate
    which table or structure you want to access. Behind the scenes, `Spring Data`
    transforms this interface into one query to save/retrieve the information depending
    on the type of database. Figure 1-9 illustrates combining interfaces to have more
    operations available, which is covered in more detail in Part II of this book.


