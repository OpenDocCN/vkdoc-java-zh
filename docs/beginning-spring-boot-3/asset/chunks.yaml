    **Spring Data 数据结构**


    Spring Data Redis3 与 JPA 版本的理念相同，旨在通过提供一组类或组件来简化与数据库交互的复杂性，从而实现简单交互。它们包含以下组件。


    • **驱动程序**负责与数据库交互以执行所有操作。


    • **RedisConnection/RedisConnectionFactory** 负责与驱动程序交互，并将所有操作和异常转换为类似于 JPA 仓库的形式。


    • **实体**表示并包含你在数据库中持久化的所有信息。这是为 Spring Data（JPA、Redis、Cassandra）实现保持特定标准的好方法。不过，你也可以省略这些类，使用简单的字符串或
    DTO 来持久化信息。


    3 [`spring.io/projects/spring-data-redis`](https://spring.io/projects/spring-data-redis)


    第 7 章 Redis：键/值数据库


    • **序列化器**提供了一种以其他格式在数据库中持久化和获取信息的方式。例如，你可以将对象转换为字符串并压缩信息以减小信息体积，当需要持久化大量数据行时，这极为有用。一些云提供商（如
    AWS）会根据 Redis 所需的内存收费。


    • **其他组件**（使用哨兵或主/从支持）的连接方式与驱动程序类似。


    Spring Data 秉承了为每种数据库引入少量依赖的理念。在 Redis 中，你只需包含 Redis 的特定依赖和驱动程序，后者在后台负责与数据库交互并执行保存或获取信息的操作。


    Spring Data Redis 支持诸如 Jedis4、Lettuce5、JRedis6 和 RJC7 等驱动程序，但开发者中最流行的是前两个选项。这些选项之间的主要区别在表
    7-1 中进行了对比。


    ***表 7-1.** 客户端差异*


    **Jedis**


    **Lettuce**


    不支持响应式连接，会阻塞连接


    基于 Netty 的非阻塞 Redis 客户端


    每个线程有单独的实例


    多个线程共享连接


    不支持主/从连接


    支持主/从连接


    Spring Boot 1.x.x 中的默认驱动程序


    Spring Boot 2.x.x 和 3.x.x 中的默认驱动程序


