    [spring-data.](http://github.com/apress/beginning-spring-data)


    当数据库中的所有内容看起来都相当相似时，如图 1-4 所示，你可以连接到数据库，并使用类似下面的代码块获取现有国家列表。


    *package* com.apress.jdbc;


    *import* java.sql. *Connection*;


    *import* java.sql.DriverManager;


    *import* java.sql. *Statement*;


    *import* java.sql. *ResultSet*;


    *import* java.sql.SQLException;


    第 1 章 应用程序架构


    *public class* App {


    *static final* String *DB_URL* = "jdbc:postgresql://localhost:5432/catalog"; *static
    final* String *USER* = "postgres";


    *static final* String *PASS* = "postgres";


    *static final* String *QUERY* = "SELECT id, code, name FROM country"; *public
    static void* main(String[] args) {


    *// 打开连接，并在执行完毕后关闭*


    *// 以这种方式使用 try/catch 可以自动关闭资源*


    *try*( *Connection* conn = DriverManager. *getConnection*( *DB_URL*, *USER*, *PASS*);


    *Statement* stmt = conn.createStatement();


    *ResultSet* rs = stmt.executeQuery( *QUERY*);) {


    *// 获取一行的信息*


    *while* (rs.next()) {


    *// 按列检索数据*


    *int* id = rs.getInt("id");


    String code = rs.getString("code");


    String name = rs.getString("name");


    System. *out*.println(String. *format*("ID: %s, Code: %s, Name:


    %s", id, code, name));


    }


    } *catch* (SQLException e) {


    e.printStackTrace();


    }


    }


    }


    ***DB_URL*** 具有特定格式，每种数据库类型对应一种格式。每种 URL 类型都在特定的数据库驱动程序中定义，你需要在运行应用程序之前将其包含在项目中。表
    1-2 按数据库列出了常见的 JDBC URL。如果你不想用 Postgres 测试这个示例，可以尝试列表中的其他数据库。


    第 1 章 应用程序架构


    ***表 1-2.** 按数据库划分的 JDBC URL*


    **数据库**


    **JDBC URL**


    postgreSQl


    jdbc:postgresql://主机:端口/数据库?属性


    SQl Server


    jdbc:sqlserver://[服务器名[\实例名][:端口号]][;属性=


    值[;属性=值]]


