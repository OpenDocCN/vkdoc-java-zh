    - **A dirty read** occurs when two or more transactions simultaneously obtain
    or use the information in a database before the changes of another transaction
    are committed. So the transactions use information that may not exist. For example,
    imagine that you update an attribute in the countries in your catalog to use a
    particular currency inserted in another transaction. If the transaction that inserts
    the new currency fails, you have an inconsistency in your database because most
    countries will have a currency that does not exist. If someone selects a country
    before the transaction is committed or rolled back, they could potentially use
