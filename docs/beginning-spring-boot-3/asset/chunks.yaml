- fmt: "# Chapter 9 Neo4j: Graph Database\n\nProblems could not be the same; for example,\
    \ the annotation `@Node` in previous versions is `@NodeEntity`.\n\nThe main difference\
    \ with other implementations of Spring Data databases is, in this case, when you\
    \ indicate that one entity has a relationship with others, try to persist all\
    \ the information like the cascade in JPA and detects when a node exists in the\
    \ database with the idea to not duplicate information and create the relationship\
    \ between nodes.\n\nListing 9-3 modifies the previous `Country` entity to persist\
    \ the information using Neo4j annotations in Table 9-1.\n\n## Listing 9-3. Definition\
    \ of the Neo4j Entity\n\n```java\nimport org.springframework.data.neo4j.core.schema.*;\n\
    import java.io.Serializable;\nimport java.util.List;\nimport java.util.Objects;\n\
    \n@Node(\"Country\")\npublic class Country implements Serializable {\n\n    @Id\n\
    \    @GeneratedValue\n    private Long id;\n\n    @Property(\"code\")\n    private\
    \ String code;\n\n    @Property(\"name\")\n    private String name;\n\n    @Property(\"\
    locale\")\n    private String locale;\n\n    @Property(\"timezone\")\n    private\
    \ String timezone;\n\n    @Property(\"enabled\")\n    private Boolean enabled\
    \ = Boolean.TRUE;\n\n    @Relationship(\"currency\")\n    private Currency currency;\n\
    \n    @Relationship(\"states\")\n    private List<State> states;\n\n    //Previous\
    \ setters and getters\n    //Override the hashCode and equals methods\n}\n```\n\
    \nThe use of annotations is quite simple to use. You could indicate the value\
    \ in the `@Property` or `@Relationship` annotations in the attributes of a class,\
    \ but it’s optional. If you don’t indicate one value, Spring Data Neo4j considers\
    \ that the property in the database has the same name as in the class. Also, if\
    \ you don’t use the annotation in one attribute, Spring Data Neo4j decides to\
    \ persist the information in the database with the same name that the attribute\
    \ has.\n\nThe next step is to declare the other entities with a relationship with\
    \ `Country`, like `State` and `Currency`. Let’s take one of them to represent\
    \ the format to define all of them, as shown in Listing 9-4.\n\n## Listing 9-4.\
    \ Definition of the State Neo4j Entity\n\n```java\nimport org.springframework.data.neo4j.core.schema.Id;\n\
    import org.springframework.data.neo4j.core.schema.Node;\nimport org.springframework.data.neo4j.core.schema.Relationship;\n\
    import java.io.Serializable;\n\n@Node(\"State\")\npublic class State implements\
    \ Serializable {\n\n    @Id\n    private Long id;\n\n    private String code;\n\
    \n    private String name;\n\n    private Boolean enabled = Boolean.TRUE;\n\n\
    \    private @Relationship Country country;\n\n    //Previous setters and getters\n\
    \    //Override the hashCode and equals methods\n}\n```\n\nThere are no differences\
    \ between the definition of both entities. You need to include attributes in the\
    \ other class to indicate how to do a bidirectional relationship. If you don’t\
    \ include any attribute to indicate the relationship and run the application,\
    \ you will see an exception indicating that you need to include the `countryId`\
    \ attribute.\n\n# Access Using Repositories\n\nIn this case, the use of repositories\
    \ is quite similar to other implementations of other databases. Still, behind\
    \ the scenes, Spring Data uses `Neo4jTemplate` to run the operations using a part\
    \ of the driver.\n\nFor example, you can use the general `CrudRepository<T, ID>`\
    \ and `PagingAndSortingRepository<T, ID>` to do the queries in the same way that\
    \ JPA but take into consideration that just the recent versions can limit and\
    \ skip the number of nodes writing a specific query (see Listing 9-5).\n\n## Listing\
    \ 9-5. Definition of the Neo4j Repository\n\n```java\npublic interface CountryRepository\
    \ extends CrudRepository<Country, Long> {\n    List<Country> findByCode(String\
    \ code);\n}\n```\n\nThe last step to enable the repositories and execute operations\
    \ into the database implies adding the `@EnableNeo4jRepositories` annotation in\
    \ the main class or a configuration class (see Listing 9-6). For simplicity, only\
    \ do it in the main class."
