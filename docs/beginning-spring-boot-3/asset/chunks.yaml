    • **Column family:** It’s a type to store rows and columns with a certain


    number of partitions which means that not all the information in


    a table exists in the same node. It could be distributed in different


    replicated nodes.


    • **Row key**: This structure contains a partition key or row key, which


    is mandatory in all the rows to know which node the information


    is stored.


    • **Column name/key**: Works as a secondary key that you can use for


    certain operations.


    • **Column**: A single column that stores certain information.


    **Configuration**


    In this section, you will see how to configure your previous api-catalog using
    Cassandra


    but excluding all details about the installation and configuration of the database,
    which


    you can see in Appendix E.


    Before modifying your microservices as suggested, remove all the dependencies
    and


    the annotations related to Spring JPA, including the scripts, in the DB folder.


    **Database and Connection Settings**


    Let’s add the Cassandra dependency to **api-catalog** to use in a non-reactive
    way,


    because this database (the other non-relational that Spring Boot provides) supports
    both


    alternatives, which is covered in the next chapter. Again, do not include the
    version in


    the dependency (see Listin[g 10-1](#index_split_003.html#p264)) because Spring
    Boot knows the best option.


    Chapter 10 Cassandra: Wide-Column database


    ***Listing 10-1.*** Dependencies Connected with Cassandra


    <dependency>


    <groupId>org.springframework.boot</groupId>


    <artifactId>spring-boot-starter-data-cassandra</artifactId>


    </dependency>


    This dependency contains a version of the driver, so you don’t need to specify
    any


    in your pom file. If you have problems with the specific version of the driver
    that Spring Boot provides, you override it, including the dependency in the pom.


    The next step is to introduce the configuration in your **application.yml** to
    use your machine''s information related to the Cassandra database (see Listin[g
    10-2](#index_split_003.html#p264)).


    ***Listing 10-2.*** Spring Data Connection Information for Apache Cassandra


    spring:


    data:


    cassandra:


    keyspace-name: twa


    schema-action: recreate


    local-datacenter: datacenter1


    contact-points: # The different nodes that Cassandra have


    - 127.0.0.1:9042


    - 127.0.0.1:9043


    - 127.0.0.1:9044


    The values of the attributes defined in **application.yml** relate to a configuration
    that appears in **docker-compose.yml**, which you can find in the GitHub repository,
    related to Cassandra. The contact points in Listin[g 10-2](#index_split_003.html#p264)
    are the instances of Cassandra that you are running on your machine. To keep the
    discussion simple, use the schema action with


    the **recreate** value, which drops the tables and creates them again.


    Let’s start with the modifications in the entities, including the annotations
    to


    indicate which are the primary keys for each cluster and which are for the partition
