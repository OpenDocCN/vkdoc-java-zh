    ## Appendix A Setting up environment tools


    ### Installing Docker


    Docker is one of the most popular options for running a container engine based
    on Linux. In this book, you can use it to reduce the complexity of installing
    databases on your system using Docker. You can run it easily and remove it to
    stop the container.


    **Note** this book does not explain all the pros and cons of using Docker. Many
    other books, articles, and videos explain all the concepts related to this technology
    in a lot of detail.


    Installing Docker depends on your operating system because there are a few ways
    to install it natively in a Linux distribution. In Windows/macOS, Docker Desktop
    introduces a layer between the operating system and Docker to provide the capacity
    to run containers. For details, follow the instructions on the official website[.17](#index_split_004.html#p353)


    After you install this tool, the only thing that you need to do is check which
    version is on your system. To do this, you type the following.


    ```

    ➜ ~ docker --version

    Docker version 20.10.12, build 20.10.12-0ubuntu2~20.04.1

    ```


    To run a container, you can find on the official webpage of Docker H[ub18 all](#index_split_004.html#p353)
    the images that exist. For the examples, run the `hello-world` images to test
    that everything works.


    ```

    ➜ ~ docker pull hello-world:latest

    ➜ ~ docker run hello-world:latest

    Hello from Docker!

    This message shows that your installation appears to be working correctly.

    To generate this message, Docker took the following steps:

    1. The Docker client contacted the Docker daemon.

    2. The Docker daemon pulled the "hello-world" image from the Docker Hub.

    17 [http://docs.docker.com/install](http://docs.docker.com/install)

    18 [https://hub.docker.com/](https://hub.docker.com/)

    (amd64)

    3. The Docker daemon created a new container from that image which runs the executable
    that produces the output you are currently reading.

    4. The Docker daemon streamed that output to the Docker client, which sent it
    to your terminal.

    ```


    To try something more ambitious, you can run an Ubuntu container with:


    ```

    $ docker run -it ubuntu bash

    ```


    Share images, automate workflows, and more with a free Docker ID:


    [https://hub.docker.com/](https://hub.docker.com/)


    For more examples and ideas, visit:


    [https://docs.docker.com/get-started/](https://docs.docker.com/get-started/)


    For more information on the commands, you can check this blo[g19](#index_split_004.html#p354)
    which explains the most relevant commands and components.


    19 [https://michaelhaar.dev/my-docker-compose-cheatsheet](https://michaelhaar.dev/my-docker-compose-cheatsheet)


