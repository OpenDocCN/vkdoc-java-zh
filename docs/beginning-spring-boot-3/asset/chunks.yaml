- fmt: "# 数据持久化与领域模型\n\n## 大对象类型\n\n`BLOB`（二进制大对象）和`CLOB`（字符大对象）都用于保存大量信息，但两者的主要概念不同。下面分别介绍它们。\n\
    \n- `BLOB`（二进制大对象）用于存储二进制文件，如视频、GIF 和音频文件。\n- `CLOB`（字符大对象）用于存储包含文本的大型文件，如 PDF\
    \ 文档、文本文件和 JSON 文件。\n- 根据数据库的不同，存在多种格式；例如，在 MySQL 中，`TEXT`类型代表`CLOB`。\n\n## 其他类型\n\
    \n其他类型不属于按条件分组的范畴。在大多数情况下，使用它们可以方便地减少从数据库获取信息后的任何转换。表 [4-6](#index_split_002.html#p117)\
    \ 展示了一些最相关的 SQL 类型及其与 Java 类的对应关系。\n\n**表 4-6.** 其他类型之间的对应关系\n\n| ANSI SQL 类型\
    \ | Java 类型 |\n| :--- | :--- |\n| `NUMERIC` | `java.math.BigInteger` |\n| `INTEGER`,\
    \ `NUMERIC`, `SMALLINT`, `TINYINT`, `BIGINT`, `DECIMAL`, `DOUBLE`, `FLOAT`, `CHAR`,\
