    \ state(id),\n\nPRIMARY KEY (id)\n);\n```\n\n# Chapter 4 Persistence and Domain\
    \ Model\n\n- **`GenerationType.TABLE`** is an alternative approach when you have\
    \ a database that does not support using `SEQUENCE`; for example, MySQL 5.7 and\
    \ lower do not have it. The goal is to have a table in your schema containing\
    \ one row per entity that needs to generate an ID, which is the next available\
    \ value.\n- **`GenerationType.AUTO`** is a strategy that considers the database\
    \ you used and defines which is the best option to use. You can indicate this\
    \ strategy in the annotation or without anything `@GeneratedValue()` because both\
    \ cases indicate the same.\n\n**Note:** There are many implementations of table\
    \ generators to optimize and reduce the risk of collision. Examples include `hilo`\
    \ and `pooled` optimizer, which is part of Hibernate. A detailed explanation of\
    \ these implementations is beyond the scope of this book, but you can find a great\
    \ explanation on Vlad Mihalcea’s blog[¹](#index_split_002.html#p122).\n\nAlways\
    \ indicate which strategy generates the value because it is a good way to have\
    \ control and not delegate to Spring Data, which delegates to Hibernate, which\
    \ is the best strategy for you.\n\n## Types of Relationships\n\nWhen you define\
    \ the structure of your database, many tables have a relationship with others\
    \ to reduce the number of redundant information. You can see the relationship\
    \ between tables when you have a foreign key in one table and the primary key\
    \ in another. JPA has a set of annotations to declare the types of relationships\
    \ between the entities. The relationship could be unidirectional if you can access\
    \ the information of both entities from one of them; for example, you have the\
    \ information about the Currency of a Country but not vice versa; on the other\
    \ hand, exists a bidirectional relationship when you can navigate from any entity\
    \ to the other one.\n\n¹ [https://vladmihalcea.com/migrate-hilo-hibernate-pooled/](https://vladmihalcea.com/migrate-hilo-hibernate-pooled/)\n\
    \n![index-123_1.png](index-123_1.png)\n\nThe following describes the types of\
    \ relationships between the entities.\n\n- **`@ManyToOne`** is the most common\
    \ type of relationship where many entities reference one another; for example,\
    \ many countries could have the same currency in the catalog’s application. Spring\
    \ Data uses the foreign key in one table to join with the other; for example,\
    \ the country’s table uses `currency_id` to join with the column `id` in the currency\
    \ table.\n\n  An alternative to this is **`@OneToMany`** which is used when you\
    \ try to have a bidirectional relationship, but in your tables, both types are\
    \ the same. To do a bidirectional relationship, both entities need to have an\
    \ attribute that refers to the other entity where one is `@ManyToOne`, and the\
    \ other is `@OneToMany`. For example, in the catalog’s application, there are\
    \ multiple `@ManyToOne` relationships. Let’s make the connection between the `Country`\
    \ and `Currency` entities. In the `Country` entity, there is a `Currency` attribute\
    \ with the `@ManyToOne` annotation, and in `Currency`, you can include adding\
    \ a `Country` attribute with the `@OneToMany` annotation. This is the way to generate\
    \ a bidirectional relationship. An example of a one to many relationship appears\
    \ on Figure 4-2[²](#index_split_002.html#p123).\n\n  ***Figure 4-2.** Two tables\
    \ of the catalog’s application*\n\n- **`@OneToOne`** is not the most frequent\
    \ type of relationship. One table has a foreign key associated with the table’s\
    \ primary key without having the chance to refer to multiple rows. One problem\
    \ with this type of problem is when you create a bidirectional relation, so both\
    \ entities refer to the other with a non-null value. This could produce an exception\
    \ because one entity needs that the other exists in the database, and vice versa\
    \ is like a deadlock. To solve this problem, one of the entities needs to have\
    \ the possibility to allow null values.\n\n![index-124_1.png](index-124_1.png)"
