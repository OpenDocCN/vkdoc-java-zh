    @QuickPerfTest // 此注解表示你将分析操作


    @Testcontainers


    @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)


    public class CurrencyRepositoryIntegrationTest {


    // 之前的测试代码


    @Test


    @ExpectSelect(1) // 验证执行的查询数量


    **@AnalyzeSql**


    public void should_get_a_currency() {


    Optional<Currency> currency = currencyRepository.findById(1L);


    assertAll(


    ()-> assertTrue(currency.isPresent()),


    ()-> assertEquals("ARS", currency.get().getCode())


    );


    }


    }


    如果再次执行相同的测试，一切仍能正常运行，但控制台上会显示所有分析信息。我建议将测试执行输出保存到文件中，这样更容易找到相关指标。


    第 13 章 检测性能问题


    [QUICK PERF] SQL 分析


    * * * * *


    SQL 执行次数：1


    最大时间：1 毫秒


    * * * * *


    SELECT 查询：1


    * * * * *


    查询


    时间：1，成功：是，类型：预编译，批处理：否，查询大小：1，


    批处理大小：0，查询：["


    select


    currency0_.id as id1_1_0_,


    currency0_.created_on as created_2_1_0_,


    currency0_.updated_on as updated_3_1_0_,


    currency0_.version as version4_1_0_,


    currency0_.code as code5_1_0_,


    currency0_.decimal_places as decimal_6_1_0_,


    currency0_.description as descript7_1_0_,


    currency0_.enabled as enabled8_1_0_,


    currency0_.symbol as symbol9_1_0_


    from


    currency currency0_


    where


    currency0_.id=?"], 参数：[(1)]


    还有许多其他注解可以帮助你的应用程序在数据库中的操作。表 13-1 列出了一些最相关的注解。


    第 13 章 检测性能问题


    ***表 13-1.** 注解*


    **注解**


    **描述**


    [@profileConnection](https://github.com/quick-perf/doc/wiki/@ProfileConnection)


    暴露与数据库连接时发生的所有操作


    @expectselect


    检查执行的某一类型查询的数量


    @expectinsert


    @expectDelete


    @expectupdate


    @expectmaxselect


    检查执行的语句数量是否不超过


    @expectmaxinsert


    某个特定数值


    @expectmaxDelete


    @expectmaxupdate


    @expectmaxQueryexecutiontime


    指示查询执行所需的时间（毫秒）


    @expectselectedColumn


    检查与查询相关的列数


    @expectupdateColumn


    @Disablesameselects


    检查同一查询是否执行了两次或更多次


    此解决方案仅适用于关系型数据库。你可以通过分析服务或访问非关系型数据库仓库的控制器，检查其是否使用了 QuickPerf 提供的 JVM 注解来发现问题。一些例子包括
    **@MeasureHeapAllocation** 或 **@HeapSize(value = 1, unit = AllocationUnit.GIGA_**


    **BYTE)**，它们用于检查特定方法使用了多少内存空间。


    **检查端点的性能**


    前面的方法是检查或分析存在一定风险的代码块的最佳选择，因为这些代码块执行了多个关键操作。你可能会花数小时编写一个测试来验证一切是否正常，但你可能并不总有时间这样做。


    另一种方法是，为整个微服务或单个端点创建一个性能测试，该测试为不同的请求提供信息，这些请求可以同时执行，或者每秒增加请求数量，直到达到最终的请求数量。


    ![](img/index-318_1.png)


    第 13 章 检测性能问题


    遵循创建性能测试的原则，有两种工具——Gatling10 和 JMeter11，许多开发者使用它们，因为它们提供了一种简单的方法来为应用程序创建负载测试。你可以创建复杂的场景，按特定顺序调用端点。这两种工具都是免费使用的，并且有许多文章或视频详细解释了它们各自的使用方法。Gatling
    还提供付费选项，你可以使用该公司的基础设施创建并执行你的场景。'
