    附录 f 进一步阅读


    • [***Neo4j 入门***](https://link.springer.com/book/10.1007/978-1-4842-1227-1)，作者
    Chris Kemper (Apress, 2015)。9 本书是对图数据库及其在 Neo4j 中实现方法的基础介绍。


    • [***Redis 实战***](https://www.manning.com/books/redis-in-action?query=Redis)，作者
    Josiah Carlson (Manning, 2013)。10 T 本书解释了 Redis 的基本用法，构建了可存入数据库的信息示例。


    本书还涵盖了与性能和可扩展性相关的其他方面。


    • [***MongoDB 性能调优***](https://link.springer.com/book/10.1007/978-1-4842-6879-7)，作者
    Guy Harrison 和 Michael Harrison (Apress, 2021)11。本书涵盖了查询的基本方面


    以及如何提升性能。还涉及其他主题，例如使用不同实例创建集群以及监控


    数据库资源的使用情况。

