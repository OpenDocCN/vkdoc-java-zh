- fmt: '# Application Architecture


    ## Interfaces in the Same Package or Layer


    **Note**: This book has no formal recommendation about which type of architecture
    you need to use. But most examples follow the layers architecture.


    ## Hexagonal


    The layered architecture offers developers a simple way to create an application
    and understand the separation of roles or responsibilities. In 2005, Alistar Cockburn[23](#index_split_000.html#p43)
    proposed a new alternative that encapsulates or keeps all external communication
    with databases or external systems agnostic. To this, he created the concept of
    input/output in the architecture to represent communication with external resources
    like databases or external systems.


    The main idea of this type of architecture is to create all the business logic
    that isolates it from the external tools and technologies that are irrelevant
    to how the application works. Figures [1-11](#index_split_000.html#p44) shows
    the different elements that have the hexagonal architecture and how to interact
    with external resources like databases or other applications.


    ***Figure 1-11.** Hexagonal architecture with the most relevant layers*


    This architecture splits the hexagon into two parts. One part is called the "driving
    side," where the actors start the interaction, such as external systems and web/mobile
    systems. The other part is the "driven side," where the actors receive a request
    to obtain certain information from a database or other external systems.


    ## Components


    The hexagonal architecture has several components inside each part of the structure,
    but I mention only the most relevant for understanding the basic idea.


    - **Infrastructure** contains the port and adapters responsible for connecting
    with external systems or databases using different protocols. The *ports* are
    interfaces agnostic to the technology defining the methods to access the application
    or other systems. The *adapters* are the implementation of the ports related to
    a specific technology, like a query to a database or a REST controller.


    - **Use cases** are the core of the systems because it contains all the logic
    related to various scenarios and how they are related. Depending on the author,
    this component receives other names like *application* or *domain layer* and combines
    the use cases with the domain component.


    - **Entities** are the pure domain of the application, with all the entities of
    value objects used in the application component.


    ## Benefits


    This structure has the following benefits.


    - You can change or swap adapters without problems.

    - The domain and the use cases are pure, so you can understand the business logic.

    - You can change the implementation of the ports for testing purposes.


    ## Drawbacks


    This type of architecture has the following drawbacks.


    - Implementing some frameworks is difficult because you can make mistakes with
    what you consider adapters/ports.

    - Introduce indirection to find the implementation of each port.

    - No guideline explains all the things about the organization of the projects,
    so anyone can introduce something wrong.


