    Other alternatives allow you to “roll back” the changes without deploying anything
    again, only changing a value in a database. This solution is called feature flags,
    a pattern that tries to reduce the risk of deploying changes in production that
    could affect our application somehow and give developers the responsibility to
    switch on/off. Also, this pattern helps you introduce A/B testing in your microservices,
    allowing you to redirect a percentage of the request to the new functionality
    or do a canary. Only one instance of the microservice has the new feature enabled.
    A/B testing means there are two different versions of the same application in
    a production, where some users have access to one version and others have access
    to another.


