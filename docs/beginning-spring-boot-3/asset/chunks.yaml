    在本章中，您了解了分析存储库中访问数据库的问题的机制。尽管如此，发现问题的方法还有很多。


    **总结**


    检测与应用程序性能相关的问题有多种方法。您使用的工具始终取决于具体问题，因为有些问题只会在生产环境中出现，而另一些问题则可以使用像 Gatling 这样的工具以相同方式复现。


    我建议在 Gatling 中创建一个测试，模拟对应用程序进行修改后出现问题的情况。


    **第 14 章**


    **最佳实践**


    开发人员经常实现一个访问数据库的解决方案，但问题会在数月后出现。这些问题可能与解决方案的实现有关，也可能无关，因为许多因素都会影响性能（例如，大量的请求或在短时间内需要保存大量信息）。


    最佳实践可以最大限度地减少影响或减少数据库中保存的信息量。本章涵盖了许多最常见的实践。其中一些很简单，而另一些则需要更改您的应用程序。


    **压缩信息**


    有时，您需要在 Redis 中保存一个庞大而复杂的对象，这本身不是问题。但是，如果您需要在短时间内保存数千个这样的对象，这可能会影响性能或增加内存使用成本。


    Redis 允许您定义自定义序列化器，使您能够序列化或反序列化信息。让我们创建一个序列化器，它先压缩对象，然后再解压缩，以节省数据库中的空间。


    这个过程意味着修改您在[第 7 章](https://doi.org/10.1007/978-1-4842-8764-4_7)中实现的代码，但让我们先创建一个类，负责将字节数组转换为压缩对象。这个任务并不复杂，因为您可以使用这个类在将信息持久化到文件之前对其进行压缩。清单
    14-1 展示了一个压缩对象所有值的类的可能实现。


