    **Flyway**


    该工具大部分步骤与之前相同，但 Spring Boot 中的配置可能更简单，具体取决于你想要使用的方法。Flyway 有多种执行迁移的方式。


    • 仅在 pom 文件中包含依赖项，这样当应用程序启动时，它会执行所有脚本并验证数据库的一致性。


    • 在 pom 文件中包含一个插件，并以与使用 CLI 界面相同的方式执行命令。


    为降低复杂性，请使用第一种选项，这意味着你只需包含依赖项，并将执行命令的责任委托给 Spring Boot。让我们添加清单 6-6 中出现的依赖项。


    ***清单 6-6.*** Flyway 依赖项


    <dependencies>


    <dependency>


    <groupId>org.flywaydb</groupId>


    <artifactId>flyway-core</artifactId>


    </dependency>


    ← 其他依赖项 –>


    </dependencies>


    之后，在 **src/main/resources/db/migration** 中创建一个新文件夹，并将上一章中使用的 SQL 文件粘贴到该文件夹内。其结构将类似于图
    6-5 所示。


    ![](img/index-190_1.png)


    第 6 章 版本控制或迁移变更


    ***图 6-5.*** 包含文件后的项目结构


    有许多可配置的选项。其中大部分都有默认值，例如用户名/密码和 URL，如果未指定，则会从数据源获取这些信息。清单 6-7 介绍了 application.yml，这是一个基本配置，用于指示文件所在位置。


    ***清单 6-7.*** 工具配置


    spring:


    # Spring 的其他配置


    flyway:


    sql-migration-prefix: V


    sql-migration-separator: __ # 用于分隔版本/描述的模式


    sql-migration-suffixes: .sql


    第 6 章 版本控制或迁移变更


    locations: classpath:db/migration # 文件所在位置


    repeatable-sql-migration-prefix: R


    baseline-on-migrate: true


    baseline-version: 0 # 用于指示要使用的第一个脚本


    使用此工具的最后一步是运行你的 **api-catalog** 应用程序。在删除数据库中的所有表（不是模式，因为该工具无法创建模式，只能创建表或索引）之前，告诉
    Flyway 正确创建并填充数据库，以检查脚本是否已执行。


    当你执行应用程序时，会看到清单 6-8 中的一些日志，这些日志提供了关于 Flyway 执行操作的信息。如果在迁移过程中发生任何情况，控制台会显示与错误相关的所有信息。


