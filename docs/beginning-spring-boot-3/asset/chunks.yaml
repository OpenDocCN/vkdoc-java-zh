    （Apress，2018 年）《Spring Boot 2 实战》（Apress，2018 年）以及《Java API、扩展与库》（Apress，2018
    年）。


    您可以通过他的博客[www.manueljordanelera.blogspot.com](http://www.manueljordanelera.blogspot.com)阅读他关于
    Spring 技术的详细教程，并与他取得联系。您也可以在 Twitter 上关注 Manuel，账号为@dr_pompeii。


    xiii


    **致谢**


    我要感谢我的家人和朋友在本书写作过程中给予的鼓励与支持。


    *   我的妻子 Gisela，在我长时间伏案写作时始终耐心相伴。

    *   我的小女儿 Francesca，在我撰写每一章时帮我放松心情。

    *   我的宝宝 Allegra，作为家庭新成员，她是我写作本书的灵感源泉。

    *   我的朋友 German Canale 和 Julian Delley，他们一直鼓励我写书，并在自我怀疑时给予支持。

    *   特别感谢 Manuel Jordan 指导我提升本书质量。


    我衷心感谢 Apress 团队在本书出版过程中提供的支持。感谢 Mark Powers 的出色协助。最后，感谢 Steve Anglin 建议并给予我撰写一本关于
    Spring Data 书籍的机会。


    xv


    **引言**


    过去，开发者使用 JDBC 等传统方法将信息保存在关系型数据库中。在系统规模较小或维护复杂度不高时，这种方法尚能奏效。随后，Ibatis 和 Hibernate
    等新技术逐渐兴起，降低了查询的复杂性，简化了对不同关系型数据库的访问，使开发者能够专注于创建出色的应用程序，而无需花费大量时间研究如何连接数据库或减少连接数。


    不久之后，许多非关系型数据库出现，解决了某些问题，但其他问题依然存在。作为开发者，仍然需要使用数据库客户端，并应对各种性能问题或不良实践。


    Spring¹被证明是解决多种问题的方案，无论是依赖注入，还是如何在某个方法/类被调用前后进行拦截。难怪该框架的开发者会创建出降低多数据库（关系型与非关系型）使用复杂度的工具。Spring
    Data 解决了大部分此类问题，提升了开发者的工作效率和创建新应用的能力。


    本书将介绍创建可访问多个数据库的应用的基础知识，并演示如何在不同数据库中实现功能。此外，您还将学习有助于减少应用中低效问题的最佳实践。


    **为何撰写本书**


