- fmt: "# 排版后的内容\n\nThere are many keywords, but the list covers the most relevant;\
    \ if you want to learn more about other keywords, check the official documentation.\n\
    \n**Note**: remember that you defined custom methods in the chapters connected\
    \ with `Jpa`, which are functional in `MongoDB` because, in most databases, `Spring\
    \ Data` translates the name of the method in the query to the specific database.\n\
    \n## Chapter 8 MongoDB: Document Database\n\n```java\npublic interface CurrencyRepository\
    \ extends MongoRepository<Currency, Long> {\n    // This method is equivalent\
    \ to use findByCode(String code)\n    List<Currency> findByCode(String code);\n\
    }\n```\n\n## Defining Queries\n\nMost of the time, the simple queries that offer\
    \ `Spring Data` with the definition of new methods using the keywords are great,\
    \ but it does not always happen. There are cases when you need to define the query\
    \ for the complexity that it implies or because you detected performance issues.\n\
    \nIf you don’t want to use the repositories’ default features, `Spring Data` offers\
    \ alternatives, like creating the query manually in the repository or using queries\
    \ by example. Let’s discuss this briefly.\n\n### Writing the Query Using Annotations\n\
    \nThis method is also familiar if you are familiar with `MongoDB` and writing\
    \ queries on a UI like `Compass`. As with `JPA`, `Mongo` has the possibility of\
    \ defining a query using annotations. Listing 8-7 writes the entire query or a\
    \ part of the query combined with the definition using keywords.\n\n***Listing\
    \ 8-7.*** Custom Queries\n\n```java\npublic interface CountryRepository extends\
    \ MongoRepository<Country, Long> {\n    // This is a custom query that find just\
    \ for one field\n    @Query(value = \"{'code': ?0}\")\n    List<Country> findCustom(String\
    \ code);\n\n    // This is a custom query combine the condition on the name of\
    \ the method with the query\n    @Query(value = \"{'code': ?0}\")\n    List<Country>\
    \ findEnabled(String code);\n}\n```\n\nA good practice to be human-readable is\
    \ to use one of these methods and not create complex queries that combine conditions\
    \ using the name of the method. Also, you can use `@Param` in `JPA`.\n\n### Queries\
    \ by Example\n\nThis is another interesting feature of `Spring Data` that you\
    \ implemented in the `Redis` chapter. Still, there are advantages to using `MongoRepository<T,ID>`.\
    \ You don’t need to change anything because that interface extends from `QueryByExampleExecutor<T>`.\
    \ You only need to create the matcher and the object to do the query.\n\nThe logic\
    \ to write a query using an example is the same as in Chapter 7. For simplicity,\
    \ do not duplicate the code you see at the bottom, just the `ExampleMatcher` you\
    \ need to include in `CountryService` when invoking the repositories.\n\n```java\n\
    ExampleMatcher matcher = ExampleMatcher.matching()\n    .withIgnorePaths(\"code\"\
    )\n    .withIncludeNullValues()\n    .withMatcher(\"name\", ExampleMatcher.GenericPropertyMatcher.of(ExampleMatcher.StringMatcher.DEFAULT));\n\
    ```\n\n### Using MongoTemplate with Custom Repositories\n\nAs you’ll recall, `Spring\
    \ Data` offers two alternatives to access the database; one is the most common\
    \ approach, which implies the creation of an interface as a repository and delegates\
    \ all the transformation of the information and the creation of the operations\
    \ to `Spring`. The second alternative implies that you create a custom repository\
    \ and use a mechanism to execute the operations, which in `Mongo` refers to using\
    \ `MongoTemplate`.\n\n`MongoTemplate` improves the performance of certain operations\
    \ with the database, but you can do many things, like creating queries. Table\
    \ 8-5 details the main differences between `MongoRepository<T, ID>` and `MongoTemplate`,\
    \ to better help you understand."
