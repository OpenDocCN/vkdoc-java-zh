    \ run the application in the IDE or execute the `./mvnw spring-boot:run` command.\n\
    \nListing 4-5 shows the `Country` entity with the `@Id` annotation.\n\n**Listing\
    \ 4-5.** Adding the Table ID\n\n```java\n@Entity //This indicates to JPA that\
    \ it’s something that has a\n        //persistent state\n@Table(name = \"country\"\
    ) //This is optionally\npublic class Country implements Serializable {\n    @Id\n\
    \    private Long id;\n    // Attributes, constructors, setters, and getters for\
