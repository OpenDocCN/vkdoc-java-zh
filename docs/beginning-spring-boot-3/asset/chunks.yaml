    version 2.0 of the tool\nports:\n  - '8001:8001'\n```\n\n![](index-390_1.png)\n\
    \n# Appendix E: Installing and Configuring Non-Relational Databases\n\nAfter creating\
    \ a file, run it using the `docker-compose up` command. Then, go to the browser\
    \ and enter `localhost:8001` which is the port that uses `RedisInsight`. Figure\
    \ [E-1](#index_split_004.html#p351) shows how `RedisInsight` looks the first time\
    \ that you enter the webpage.\n\n***Figure E-1.** RedisInsight home page*\n\n\
    The next step is to connect this tool with your database, which is running, so\
    \ you need to press the “I already have a database” button. You see a webpage\
    \ where you have multiple connection options because a database is hosted in different\
    \ places, such as on your machine, on a dedicated server, or by cloud providers\
    \ like AWS. Figure [E-2](#index_split_004.html#p352) shows the different options\
    \ that exist to configure access to the database.\n\n![](index-391_1.png)\n\n\
    ***Figure E-2.** Configuration of the database*\n\nThe next step is to click the\
    \ `Connect to a Redis Database` button and complete the modal with the information\
    \ on the connection.\n\n- **host**: `redis-db`\n- **port**: `6379`\n- **name**:\
    \ `catalog` (or anything that you want to use)\n\nWhen you confirm all the information,\
    \ `RedisInsight` connects to validate if all the information that you provided\
    \ is correct or not before adding the database. If everything works fine you will\
    \ see a screen like the Figure [E-3](#index_split_004.html#p356) with the databases\
    \ that you have configured on the tool.\n\n![](index-392_1.png)\n\n***Figure E-3.**\
    \ The connection with the database*\n\nIf you double-click the database, you access\
    \ a new page containing all the operations you can execute for this particular\
    \ database and check the status. The operations could be performed from your application\
    \ using the command line or the CLI tool on `RedisInsight` (see Figure [E-4](#index_split_004.html#p357)).\n\
    \n![](index-393_1.png)\n\n***Figure E-4.** Active database*\n\nThe last thing\
    \ that you can do is open the “Browser” option to add new elements to the database\
