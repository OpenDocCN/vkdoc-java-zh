  trans: '

    自 JDK 1.1 中引入 JDBC 以来，应用程序的持久化技术经历了一次演变，从 JDBC 发展到 ORM，再到如今使用 Spring Data——它提供了一个用于访问不同数据库的标准接口。其中一些是关系型数据库，而另一些则是非关系型数据库。


    持久化信息到数据库的方式有很多种。考虑到根据 Snyk 的报告,1，至少有 50% 的开发者使用 Spring Boot，那么其中许多人使用 Spring
    Data 似乎合乎逻辑。图 1-1 展示了从 Java 持久化技术到 2011 年 Spring Data 出现的历史。


    ***图 1-1.** 持久化技术历史*


    如今，大多数与数据库交互的库仍然具有重要意义。它们都经过了多年的演变。有些库之间会相互影响；例如，企业级 JavaBean（EJB）和 Java 持久化 API（JPA）在图
    1-1 中是两个不同的概念。早期的 EJB 版本包含了所有 JPA 规范，而 JPA 的重要性日益增长。EJB 3.0 版本则作为两个相互作用的独立部分出现。


    1 [`snyk.io/jvm-ecosystem-report-2021/`](https://snyk.io/jvm-ecosystem-report-2021/)


    ![](img/index-22_1.png)


    第 1 章 应用程序架构


    **JDBC**


    JDBC，即 Java 数据库连接（Java Database Connectivity），提供了一个通用接口来与其他数据库进行通信和交互。更具体地说，JDBC
    提供了一种连接数据库、创建和执行语句（如创建/删除/清空表）以及执行查询（如 SELECT/INSERT/UPDATE/DELETE）的方法。图 1-2 简要概述了使用
    JDBC 与数据库通信时交互的不同组件。


    ***图 1-2.** JDBC 结构*


    与数据库交互涉及一组组件或层次。


    • **JDBC API**：该层包含所有驱动程序需要实现的所有接口，以便 Java 开发者使用它们。这一层是最重要的层之一，因为你可以从一个数据库切换到另一个数据库而无需更改太多内容，只需更换另一个数据库的驱动程序，并对列类型进行少量修改。


    第 1 章 应用程序架构


    • **JDBC 驱动程序管理器**：这组类充当驱动程序和 JDBC API 之间的连接器，负责注册和注销可用的数据库、获取与数据库的连接以及与该连接相关的信息。


    • **驱动程序**：为了实现数据库之间的连接，JDBC 将所有与特定数据库交互的逻辑隐藏在一系列驱动程序中，每个驱动程序都包含针对一个数据库的逻辑。通常，开发这些数据库的公司会为大多数语言创建相应的驱动程序。


    JDBC 自 1997 年首次发布以来并非一成不变。后续版本尝试增加更多功能或解决与性能相关的问题（见表 1-1）。像 Spring 这样的框架实现了 JDBC
    的一个版本，并融入了该框架的一些特性。


    ***表 1-1.** JDBC 各版本演变*


    **年份**


    **版本**


    **规范**


    **JDK 版本**


    JDBC 4.3


    JSr 221


    JDBC 4.2


    JSr 221


    JDBC 4.1


    JSr 221


    JDBC 4.0


    JSr 2212


    JDBC 3.0


    JSr 543


    1.4


    JDBC 2.1


    1.2


    JDBC 1.2


    1.1


    此表展示了 JDBC 的演变过程以及详细说明每个版本引入了哪些功能的规范。一些早期版本并没有具体的规范。


    2 [`www.jcp.org/en/jsr/detail?id=221`](https://www.jcp.org/en/jsr/detail?id=221)


    3 [`www.jcp.org/en/jsr/detail?id=54`](https://www.jcp.org/en/jsr/detail?id=54)


    ![](img/index-24_1.png)


    第 1 章 应用程序架构


    **JDBC 驱动程序**


    JDBC 驱动程序组件实现了 JDBC API 中定义的接口，用于与数据库交互。可以将此组件视为客户端适配器，用于将特定数据库的元素或语法转换为 Java
    能够理解的标准格式。


    JDBC 针对不同情况提供了四种推荐的驱动程序类型，如下图所示：

    '
- fmt: '# 数据库驱动类型与连接方式


    ## 图 1-3：提供 JDBC 的驱动类型


    **类型 1：JDBC-ODBC 桥接器**


    这种类型最初被用于第一批 JDBC 驱动程序，因为大多数数据库最初都支持 ODBC 访问。该驱动程序将 JDBC 转换为 ODBC，反之亦然，充当独立于数据库的适配器。你可以将其视为
    JDK 的一部分的通用驱动程序，因此无需在项目中包含任何依赖项。


    这种类型的驱动程序仅用于开发或测试；由于从 JDBC 转换为 ODBC 的性能问题以及安全问题，它不用于生产环境。


    **类型 2：基于客户端的驱动**


    下一代驱动程序变得更加流行，因为它消除了将 JDBC 转换为 ODBC 的所有转换过程，直接使用每个数据库供应商的原生库进行调用，这通常重用现有的 C/C++
    代码来创建库。


    其优势包括性能提升，因为无需在各种格式之间进行转换。但也存在一些缺点；例如，驱动程序必须安装在客户端机器上。


    **类型 3：两层架构**


    *两层架构*、*网络协议*和*带有中间件的纯 Java 驱动程序*都指向同一个概念。这种类型使用 JDBC，通过套接字与中间件服务器交互，进而与数据库通信。该中间件包含所有不同数据库的驱动程序，因此无需在每台机器上安装所有内容。


    这种方法的主要问题是需要一台专用服务器与数据库交互，这意味着更多的信息传输，并引入了一个故障点。此外，供应商需要将 C/C++ 代码重写为纯 Java。


    **类型 4：有线协议驱动**


    *有线协议*或*原生协议驱动程序*是直接连接数据库最流行的方法之一。在这种类型中，驱动程序完全用 Java 编写，并使用每个供应商定义的协议与数据库通信。


    这种类型提供了许多优势，包括与之前类型相比具有出色的性能，并且无需在客户端或服务器上安装任何东西。但主要缺点是每个数据库都有一个使用不同协议的驱动程序。


    ## 如何连接数据库


    根据性能要求，有几种方法，例如使用连接池。连接数据库的基本过程包括以下步骤。


    1. **导入类。** 你必须包含使用 JDBC 和连接数据库所需的所有类。在大多数情况下，所有类都存在于`java.sql.*`包中。


    2. **打开连接。** 使用`DriverManager.getConnection()`创建一个连接，该连接表示与数据库的物理连接。


    3. **执行查询。** 创建一个`Statement`对象，其中包含要在数据库中执行的查询。


    4. **获取数据。** 在数据库中执行查询后，你需要使用`ResultSet.getXXX()`方法检索每一列的信息。


    5. **关闭连接。** 无论应用程序是否产生异常，你都需要在所有情况下显式关闭与数据库的连接。


    让我们看看与访问数据库和获取特定信息相关的所有概念。其想法是创建一个表示国家/州/城市目录的表结构，你将在关于关系数据库的章节中使用它。图 1-4 显示了具有不同关系的表结构。


    ## 图 1-4：目录数据库的结构


    **注意** 你可以在[github.com/apress/beginning-spring-data](http://github.com/apress/beginning-spring-data)找到填充这些表信息的结构和插入语句，以及所有其他源代码。'
  raw: 'Figur[e 1-3.](#index_split_000.html#p24)


    ***Figure 1-3.** Driver types that offer JDBC*


    Chapter 1 appliCation arChiteCture


    **Type 1: The JDBC-ODBC Bridge**


    This type was adopted for the first JDBC drivers because most databases initially


    supported ODBC access. This driver converts JDBC into ODBC and vice versa acting
    as


    an adapter independent of the database. You can think of this as a universal driver
    that is part of the JDK, so you don’t need to include any dependency in your project.


    This type of driver is only used for developing or testing; it is not used in
    production


    environments because of problems related to the performance of converting from
    JDBC


    to ODBC and issues with security.


    **Type 2: Client Based**


    The next generation of drivers becomes more popular because it removes all the


    transformation of JDBC into ODBC to do the calls directly using native libraries
    for each


    database vendor, which usually reuses the existing C/C++ code to create the libraries.


    The advantages include increased performance because there is no transformation


    between various formats. There are some drawbacks; for example, the driver must
    be


    installed in the client machine.


    **Type 3: Two-Tier Architecture**


    *Two-tier architecture*, *network protocol*, and *pure Java driver with middleware*
    all refer to the same concept. This type uses JDBC, which uses a socket to interact
    with a


    middleware server to communicate with a database. This middleware contains all
    the


    different databases’ drivers, so installing everything on each machine is unnecessary.


    The main problem of this approach is having a dedicated server to interact with


    databases, which implies more transference of information, introducing a point
    of


    failure. Also, the vendors need to rewrite, which are in C/C++ to pure Java.


    **Type 4: Wire Protocol Drivers**


    The *wire protocol* or *native protocol driver* is one of the most popular ways
    to connect directly with a database. In this type, the driver is written entirely
    in Java and communicates with a database using the protocol defined for each vendor.


    This type offers many advantages, including having an excellent performance


    compared with the previous one and not requiring that you install anything in
    the


    client or the server. But, the main disadvantage is each database has a driver
    which uses


    different protocols.


    Chapter 1 appliCation arChiteCture


    **How to Connect with a Database**


    There are several approaches, depending on the performance, like using a pool


    of connections. The basic process to connect with a database consists of the


    following steps.


    1\. **Import the classes.** You must include all the classes required


    to use JDBC and connect with a database. In most cases, all the


    classes exist in the java.sql.* package.


    2\. **Open a connection.** Create a connection using DriverManager.


    getConnection(), representing a physical connection with a


    database.


    3\. **Execute the query.** Create an object Statement that contains the


    query to execute in a database.


    4\. **Obtain the data.** After executing the query in a database, you


    need to use ResultSet.getXXX() method to retrieve the information


    of each column.


    5\. **Close the connection.** You need to explicitly close the connection


    to a database in all cases without considering if the application


    produces an exception or not.


    Let’s look at all the concepts related to accessing a database and obtaining certain


    information. The idea is to create a table structure that represents a catalog
    of countries/


    states/cities, which you use in the chapters on relational databases. Figur[e
    1-4 sho](#index_split_000.html#p27)ws the structure of the tables with the different
    relationships between them.


    ![](index-27_1.png)


    Chapter 1 appliCation arChiteCture


    ***Figure 1-4.** The structure of the catalog database*


    **Note** You can find the structure and the insert to populate the information
    of


    these tables, along with all other source code, a[t github.com/apress/beginning-](http://github.com/apress/beginning-spring-data)'
