    第 1 章 应用程序架构


    **EJB 类型**


    EJB 架构包含三个主要组件：EJB 容器、应用服务器以及企业级 JavaBeans（EJB），后者又分为多种类型。


    • **会话 Bean**：这些组件包含与用户任务或用例相关的所有逻辑。会话 Bean 在任务或用例执行期间（如同一次对话）可用。但是，如果服务器崩溃或重启，会话
    Bean 中保存的所有信息都将丢失。


    会话 Bean 分为两种类型：有状态和无状态。主要区别在于，前者在调用后会保存状态，而后者（无状态）在调用后不保存任何信息。


    • **消息驱动 Bean**：当需要在应用程序之间进行同步通信时，前述 Bean 工作良好；但如果需要异步通信，消息驱动 Bean 则是正确的选择。最常见的实现使用
    JMS（Java 消息服务）14。这种类型的 EJB 充当队列主题中的监听器，等待消息并在消息到达时执行相应操作。这种通信方式在微服务出现后变得流行。


    • **实体**：该组件包含代表数据库表的类，并为数据库中的 CRUD（创建、检索/读取、更新、删除）操作提供接口。EJB 3.0 引入了对此类组件的更改，使用
    JPA 替代了之前作为 EJB 规范一部分的实体 Bean。


    图 1-6 展示了构成 EJB 的各组件之间的交互。


    14 [`docs.oracle.com/cd/B19306_01/server.102/b14257/jm_create.htm`](https://docs.oracle.com/cd/B19306_01/server.102/b14257/jm_create.htm)


    ![](img/index-33_1.png)


    第 1 章 应用程序架构


    ***图 1-6.** EJB 组件及其与 JPA 的交互方式*


