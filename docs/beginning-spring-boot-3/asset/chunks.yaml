  trans: '

    **Eclipse**2 是大多数老开发人员熟知的另一种 Java 开发 IDE 选项。


    大多数插件都是免费的，并且拥有一个庞大的开发者社区，他们会频繁更新这些插件，同时还有大量的 Spring 插件。最相关的插件会出现在 Spring 网站上。3
    如果你使用这个工具，请按照说明安装插件。


    图 B-2 展示了 Eclipse 的界面。


    2 [`www.eclipse.org/downloads/`](https://www.eclipse.org/downloads/)


    3 [`spring.io/tools`](https://spring.io/tools)


    ![](img/index-357_1.png)


    附录 B 推荐与替代工具


    ***图 B-2.** 导入项目后的 Eclipse*


    **NetBeans**4 使用多种编程语言开发应用程序。由于其他选项已能满足大多数开发者的需求，其用户社区已不再庞大。


    一些开发者在开始学习第一门编程语言时会使用它。图 B-3 展示了 NetBeans 的界面。


    4 [`netbeans.apache.org/`](https://netbeans.apache.org/)


    ![](img/index-358_1.jpg)


    附录 B 推荐与替代工具


    ***图 B-3.** 导入项目后的 NetBeans*


    **REST 工具**


    **Postman**5 是一个用于测试 REST 端点的工具，你可以在其中使用变量来表示环境或实际日期等其他内容。你可以用它来在特定时间执行测试。图 B-4
    简要展示了该工具的外观。


    5 [`www.postman.com/`](https://www.postman.com/)


    ![](img/index-359_1.jpg)


    附录 B 推荐与替代工具


    ***图 B-4.** Insomnia 执行对 API 的调用*


    **Insomnia**6 是一个用于 REST 端点请求的工具。它与 Postman 最大的区别之一在于，该工具支持多种协议，如 REST、gRPC、SOAP
    和 GraphQL。其功能与 Postman 类似，用户界面也相似，但至少可以切换两种主题。图 B-5 简要展示了该工具的外观。


    6 [`insomnia.rest/`](https://insomnia.rest/)


    ![](img/index-360_1.jpg)


    附录 B 推荐与替代工具


    ***图 B-5.** Insomnia 执行对 API 的调用*


    **cURL**7 是一个简单的命令行工具，可用于调用 REST 端点。你可以将此工具作为替代方案。它适用于大多数常见的操作系统。


    **数据库**


    本书涵盖了每种数据库类型的示例；其方法类似。


    **Cassandra**8


    **DataStax Studio**9 由创建 Cassandra 的开发者创建并维护，它提供了在所有操作系统上安装或使用 Docker 的机会。该工具的功能包括：以多种格式导出信息、导出查询或导入到另一台机器的过程，以及一个能验证查询的智能编辑器。图
    B-6 简要展示了该工具的外观。


    7 [`curl.se/download.html`](https://curl.se/download.html)


    8 [`cassandra.apache.org/_/index.html`](https://cassandra.apache.org/_/index.html)


    9 [`downloads.datastax.com/#studio`](https://downloads.datastax.com/#studio)


    ![](img/index-361_1.jpg)


    附录 B 推荐与替代工具


    ***图 B-6.** DataStax 配置页面*


    **MongoDB**10


    **Compass**11 是用于在 MongoDB 中连接、查询、优化和分析性能的官方解决方案。它支持在多种操作系统上安装，并拥有简洁的用户界面。它还提供了一个良好的界面，用于查看执行每个查询的影响。

