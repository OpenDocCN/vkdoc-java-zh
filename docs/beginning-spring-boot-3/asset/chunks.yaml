    your database. This chapter covers many of the most common practices. Some of
    them


    are simple, while others require changes to your application.


    **Compressing Information**


    Sometimes, you need to save a sizeable, complex object in Redis, which is not
    a problem.


    Still, if you need to save thousands of them within a short period, this could
    impact


    performance or the cost of memory usage.


    Redis allows you to define custom serializers, giving you the power to serialize
    or


    deserialize information. Let’s create a serializer that compresses and then decompresses


    an object to save space in your database.


    This process implies modifying the code you implemented in Chapt[er 7](https://doi.org/10.1007/978-1-4842-8764-4_7)
    but let’s start to create a class that has the responsibility to transform an
    array of bytes into a


