    您可能有多个应用程序将开关信息保存在同一个数据库中，并且可能出现两个或多个应用程序引用不同内容时产生冲突的情况。


    • **为技术和非技术用户提供访问机制。** 其理念是为每个对微服务或平台负有责任的人提供一种机制，使其能够启用或禁用相关值。主要问题在于，您需要限制哪些人可以启用访问数据库的功能，因为并非所有非技术用户都了解查询的性能。


    **总结**


    对数据库中的变更进行版本控制，可以记录所有发生的修改，以便您检测问题并进行回滚。有许多工具可以解决这种情况。本章介绍了一些工具，但其他工具则不太流行，并且无法与多种框架集成。不过，Spring
    Boot 会不时地集成新库，因此请定期查看官方文档。


    **第 7 章**


    **Redis：键/值**


    **数据库**


    有时，您需要将复杂对象持久化到数据库中，并且/或者需要长时间保存。在这种情况下，键/值存储的作用或多或少类似于 `Map<K,V>` 类，您需要一个键来获取值，但键不必是字符串。它可以是其他类型，而值可以是简单的字符串或复杂的对象。


    Redis1 或 Memcached2 就是此类数据库的示例，您可以将其与 Spring Boot 的另一个模块（例如缓存机制）一起使用。


    这些选项之间的主要区别在于您可以持久化的信息类型数量。Redis 支持哈希、字符串、列表和集合数据类型，而 Memcached 仅支持字符串。另一个重大区别是，如果数据库发生故障，Redis
    能够将信息持久化到内存或磁盘中。您肯定不希望丢失所有信息。


    还有其他区别，但本章的目的并非比较各种键/值数据库选项。根据上述描述，我们选择使用 Redis。


    **什么是 Redis？**


    Redis 由 Salvatore Sanfilippo 于 2009 年创建。他开发此解决方案是为了解决当时所在公司中一个与 Web 分析器可扩展性相关的问题。该数据库最大的特点之一是其高性能，它是一个轻量级存储，可以保存不同类型的信息。


