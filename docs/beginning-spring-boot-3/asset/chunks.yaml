    \    assertNotNull(service.save(countryDTO));\n}\n```\n\n# Chapter 12 Unit and\
    \ Integration Testing\n\nThe unit test does not check anything about `CountryRepository`,\
    \ which makes sense because it is not part of the class’s code, but it’s an interface\
    \ which implies that it is not simple to test this type of object. Some approaches\
    \ imply that you create a concrete class that extends from the repository and\
    \ uses `DataSource` to access the database. Still, this solution is not the best\
    \ because you need to create extra objects and modify the logic of your application\
    \ to do a test.\n\n## Integration Testing with a Database\n\nTo do testing of\
    \ your database, you need to go to the next level of testing because you need\
    \ to run the entire application to test the interaction between the persistence\
    \ layer and the database. Behind the scenes, Spring Data generates the concrete\
    \ classes to access the database, so for you, the only object you can use is the\
    \ repositories with the queries you defined. Of course, you can use Spring Boot\
    \ Test without anything else to check a part of the logic that accesses the database,\
    \ but you need to access a database. Hence, if you insert a row with an attribute\
    \ that needs to be unique in a table, it is impossible to run the same test multiple\
    \ times in the same database, so you need to find another way; for example, using\
    \ a tool like `DbUnit`. An alternative to solving the problem of testing database\
    \ access is a library called `Testcontainers`.\n\n## Testcontainers\n\n`Testcontainers`\
    \ is a lightweight and open-source library that allows you to run containers in\
    \ your application and reuse test cases. This library has support for multiple\
    \ testing frameworks like different versions of `Junit` and `Spock`. And you can\
    \ use it in Java or Kotlin projects.\n\n- [http://www.dbunit.org/](http://www.dbunit.org/)\n\
    - [https://www.testcontainers.org/](https://www.testcontainers.org/)\n\n![Figure\
    \ 12-1](index-289_1.png)\n\n# Chapter 12 Unit and Integration Testing\n\nThe containers\
    \ could be databases or other services that your application requires; for example,\
    \ if your application needs to use a specific service of AWS, you can use the\
    \ image of `LocalStack`. `Testcontainers` develops a set of modules to reduce\
    \ the complexity of running a container and configure this image. These modules\
    \ include all the common relational databases and some of the most relevant non-relational\
    \ databases like `MongoDB`, `Cassandra`, `Neo4j`, and `ElasticSearch`. If you\
    \ need to use a database not included in the list of modules, you can run any\
    \ container, but you need to define all the logic related to the configuration.\
    \ Figure 12-1 shows the different connections that an API could have, like databases,\
    \ queues, and cloud provider services.\n\n**Figure 12-1.** An example that all\
    \ the external connections that can have an API\n\nBehind the scenes, this library\
    \ uses `Docker` to download and run the containers, so before using your project,\
    \ check the general requirements related to the versions of Docker that the library\
    \ needs to satisfy. In November 2020, DockerHub introduced restrictions in using\
    \ the various images in the repository, like the number of times you downloaded.\
    \ If you use this library in a pipeline, the machine that runs it must satisfy\
    \ the same requirements.\n\n- [https://github.com/localstack/localstack](https://github.com/localstack/localstack)\n\
    - [https://www.docker.com/](https://www.docker.com/)"
