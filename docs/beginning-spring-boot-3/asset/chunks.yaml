    本节涵盖 Spring Data 在幕后工作的两个最相关方面，以及如何扩展默认仓库以执行其他自定义操作。


    **对象映射**


    对象映射是 Spring Data 中负责创建属性访问和映射的部分。其流程包括使用类的公共构造函数创建新对象，并填充所有暴露的属性。


    第 3 章 Spring Data 与不同类型的持久化


    **注意** 通常，变体取决于用于持久化信息的数据库，例如自定义列或字段名称。


    让我们从使用 Spring Data 创建对象开始。对于这个主题，核心模块会检测所有与数据库交互的持久化实体，并在运行时生成一个工厂类来创建新实例。为什么要创建一个类来实例化该类，而不是使用反射来创建实例并填充所有属性呢？


    这种方法的主要问题与性能相关。


    现在是时候看看清单 3-3 中定义的 Currency 实体发生了什么。在幕后，Spring Data 获取该实体并创建一个实现 `ObjectInstantiator`
    的新类，如清单 3-7 所示。


