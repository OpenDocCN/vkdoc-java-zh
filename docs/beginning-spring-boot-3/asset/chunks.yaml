    **总结**


    本章概述了如何创建相互交互的实体结构，以使用策略（如急加载或懒加载）来表示数据库，具体取决于你的业务需求。你还学习了层次化策略及其优缺点。


    本章还介绍了在实体中进行验证，以防止将信息发送到数据库时产生异常。你可以在接收请求的第一层（在访问数据库的层之前）进行验证。


