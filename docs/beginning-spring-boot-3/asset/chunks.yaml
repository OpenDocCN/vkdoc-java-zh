  trans: '

    Java 持久化 API（JPA）是一种直接与数据库持久化相关的规范 15。更具体地说，JPA 提供了一组所有提供商都必须遵循的接口，以确保它们遵循标准，这样你就可以在不费太多力气的情况下更换提供商。


    使用 JPA，开发者可以通过一个代表表结构的 Java 类来访问数据库中的信息，并执行某些操作，如插入、更新、删除和检索。要执行这些操作，你需要使用代表表中常见内容的注解来标注类，例如表名、列大小以及表之间的关系。


    JPA 提供了多种执行查询以检索信息的方式。一种是像 JDBC 那样直接使用 SQL 语句，并借助类来帮助构建语句；另一种则引入了一种抽象，这样你无需编写完整的语句，因为
    JPA 的提供商会动态生成该语句。图 1-7 展示了 JPA 与应用程序的不同层级或结构。


    15 [`www.jcp.org/en/jsr/detail?id=338`](https://www.jcp.org/en/jsr/detail?id=338)


    ![](img/index-34_1.png)


    第 1 章 应用程序架构


    ***图 1-7.** 使用 JPA 的层级结构示例*


    该规范有许多实现，但最相关的是 Hibernate16、EclipseLink17、Apache OpenJPA18 和 Spring Data JPA19。它们各自都以不同的方式实现了
    JPA 规范，优先考虑性能或开发者体验等方面。


    让我们看一个示例，其中你可以声明一个代表数据库中某个表的类。


    16 [`hibernate.org/`](https://hibernate.org/)


    17 [`www.eclipse.org/eclipselink/`](https://www.eclipse.org/eclipselink/)


    18 [`openjpa.apache.org/`](https://openjpa.apache.org/)


    19 [`spring.io/projects/spring-data`](https://spring.io/projects/spring-data)


    第 1 章 应用程序架构


    *package com.apress.jpa.model;*


    *import javax.persistence.Column;*


    *import javax.persistence.Entity;*


    *import javax.persistence.GeneratedValue;*


    *import javax.persistence.GenerationType;*


    *import javax.persistence.Id;*


    *import javax.persistence.Table;*


    *import java.io.Serializable;*


    ***@Entity // 必需***


    ***@Table(name = "currency") //可选，仅当需要指定表名时使用***


    *public class Currency {*


    ***@Id //必需 - 标识哪个是主键***


    ***@GeneratedValue(strategy = GenerationType.SEQUENCE) //指示生成 ID 的方式***


    *private Long id;*


    *private String code;*


    *private String description;*


    *private Boolean enable;*


    ***@Column(name = "decimal_places", length = 5) //可选：指定列名和长度***


    *private String decimalPlaces;*


    *public Currency(Long id, String code, String description, Boolean*


    *enable, String decimalPlaces) {*


    *this.id = id;*


    *this.code = code;*


    *this.description = description;*


    *this.enable = enable;*


    *this.decimalPlaces = decimalPlaces;*


    *}*


    *// 所有属性的设置器和获取器*


    *// 重写 hashCode 和 equals 方法*


    *}*


    第 1 章 应用程序架构


    指定列名和长度的方法并不复杂。如果你不指定名称和默认大小，JPA 的实现会定义这些值，对于字符串类型，默认值为 255。


    **注意** 你将在本书的第二部分了解更多关于 JPA 的内容。


    **Spring Data**


    之前所有持久化机制的主要问题是，你无法同时访问关系型和非关系型这两种类型的数据库。但 Spring Data 解决了这个问题，它允许你使用带有接口的仓库来访问数据库，以执行
    CRUD 操作。此外，你还可以创建实现该接口的具体类。

