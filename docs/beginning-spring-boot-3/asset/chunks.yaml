- fmt: "# How They Organize Information\n\nBut what happens when another type of organizing\
    \ data is available—one that makes representation and access more easily digested?\n\
    \nThis chapter explains how a graph database works and how to perform it with\
    \ Spring Data. Let’s explore a few use cases, implementations, and Neo4j.\n\n\
    ## What Is a Graph Database?\n\nA graph database is a pictorial representation\
    \ of directly-connected nodes connected using links that represent the relationship\
    \ between them, in contrast to using tables or documents like other types of databases.\
    \ Each node represents an entity and contains all the information connected within\
    \ one node, and the relationship between nodes is the association.\n\nLet’s transform\
    \ the previous `api-catalog` example into a set of nodes and links to clarify\
    \ the idea, as shown in Figure [9-1](#index_split_003.html#p243).\n\n© Andres\
    \ Sacco 2023  \nA. Sacco, *Beginning Spring Data*, [https://doi.org/10.1007/978-1-4842-8764-4_9](https://doi.org/10.1007/978-1-4842-8764-4_9#DOI)\n\
    \n![](index-243_1.png)\n\n**Figure 9-1.** Example of the representation of the\
    \ nodes and links\n\nThis type of database solves many problems beyond the example\
    \ shown in Figure [9-1](#index_split_003.html#p243), as shown in the next section.\n\
    \n## Possible Use Cases\n\nThere are situations where these databases are good\
    \ candidates to be used, but there is no restriction about use in other situations.\
    \ Let’s look at a few possible uses.\n\n- **Social networks**: Databases help\
    \ represent the relationship between people to see the news or publications of\
    \ each of them.\n- **Modeling airline flights**: The nodes could be airports and\
    \ flights. Using nodes could be simple to represent or find a specific airport\
    \ and check which flights are available for certain destinations. Also, you could\
    \ apply this use case to other ground transportation like trains or buses.\n-\
    \ **Detect fraud patterns**: You can modulate the purchases and the IP where each\
    \ is doing it. If you detect that multiple actions happen in a short period in\
    \ different locations, you can simplify the detection process.\n- **Recommendation\
    \ engines**: Imagine that you have an e-commerce site where your clients buy various\
    \ things, so if the products have a certain level of associations, you can offer\
    \ other options that could be connected to criteria, like the product category.\
    \ Also, the recommendation engines could apply to suggest a song on Spotify or\
    \ a new movie on Netflix.\n- **Represent the hierarchy**: If you are part of a\
    \ big company, you usually want to know the partners of a person or the boss.\
    \ With the use of a graph, you can represent and see the structure of the company\
    \ without problems.\n\n## Implementations\n\nThere are implementations for this\
    \ type of database. Some of them are stable and used by a lot of developers across\
    \ the world. Let’s explore them.\n\n- **Neo4j**[^1]: This database is one of the\
    \ oldest graph databases with support for many languages, including Java, and\
    \ is used by most of the biggest companies worldwide. It offers the possibility\
    \ to use the community version where you are responsible for administrating the\
    \ database, or you can for a cloud service like MongoDB Atlas. It implies that\
    \ you need to pay for the use of the service, where you can configure the backups,\
    \ the restore, and the number of instances that are running simply. There are\
    \ many books, articles, StackOverflow discussions, and videos in this database.\
    \ Appendix F lists some recommended books.\n- **Redis Graph**[^2]: This database\
    \ based on Redis offers the possibility of using graphs. This behind-the-scenes\
    \ tool implements GraphBLAS, which defines a set of the matrix in a structure\
    \ of rings to do the representation in a graph. This database model has advantages.\n\
    \n[^1]: [https://neo4j.com/v2/](https://neo4j.com/v2/)  \n[^2]: [https://redis.io/docs/stack/graph/](https://redis.io/docs/stack/graph/)"
