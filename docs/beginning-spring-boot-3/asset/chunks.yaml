    **摘要**


    本章概述了 Neo4j。这个数据库并非适用于所有情况的银弹。在许多情况下，Neo4j 并非最佳选择；更好的做法是使用像 Redis 或 MongoDB 这样的数据库。请探索你的选择，以确定最适合解决你特定需求的数据库。


    **第 10 章**


    **Cassandra：宽列**


    **数据库**


    到目前为止，你所看到的非关系型数据库可以拥有特定的信息副本，但这意味着你需要配置一个主节点来指示从节点。另一个问题是如何复制信息，这有时需要一定的配置知识。


    本章将解释 Cassandra 如何让你能够增加节点数量，而无需指明哪个是主节点，至少在 Spring Data for Apache Cassandra
    的配置中是如此。


    **什么是 Cassandra？**


    Cassandra[2](https://cassandra.apache.org/_/index.html) 是一个由 Apache 创建的开源宽列数据库。许多开发者使用这个数据库，因为它为某些操作提供了高性能、水平扩展的可能性，以及像非关系型数据库一样的灵活模式。


    Cassandra 的理念是拥有一定数量的节点，信息通过分区键（类似于关系数据库中的主键）分布在这些节点上，这样你就可以在一台实例上有一行数据，而在另一个节点上有另一行数据。图
    10-1 说明了这一点。


    1 [`spring.io/projects/spring-data-cassandra`](https://spring.io/projects/spring-data-cassandra)

    2 [`cassandra.apache.org/_/index.html`](https://cassandra.apache.org/_/index.html)


    © Andres Sacco 2023

    A. Sacco, *Beginning Spring Data*[, https://doi.org/10.1007/978-1-4842-8764-4_10](https://doi.org/10.1007/978-1-4842-8764-4_10#DOI)


    ![](img/index-260_1.png)

    第 10 章 Cassandra：宽列数据库


    ***图 10-1.** Cassandra 中的节点架构*


    以下是这些数据库的一些主要优点。


    • **高度可扩展**：你可以无停机地添加或移除节点。

    每个新节点都会向其他已存在的节点报告，以便它们注册并分发信息。


    • **高性能**：没有中央节点或主节点来做决策，其他节点进行复制。在这个数据库中，所有节点都扮演着相同的角色。图 10-2 展示了信息如何在不同节点间分布。


    ![](img/index-261_1.png)

    第 10 章 Cassandra：宽列数据库


    ***图 10-2.** 信息的分布与复制*


    • **高可用性**：存储在一个节点上的信息会在其他节点上复制，你可以指定复制因子。此外，你还可以跨不同区域或云提供商复制信息。


    • **信息过期**：行可以像 Redis 一样拥有 TTL（生存时间）；之后，该行就会消失。


    • **适合分析**：这类数据库非常适合执行与大数据相关的操作。


    **注意** 请记住，非关系型数据库并不能涵盖 CAP [定理 3](https://www.ibm.com/cloud/learn/cap-theorem)
    中的所有内容，因为不可能同时保证这三个属性，所以你需要牺牲其中一个来换取另一个。


    本书的范围不在于解释这个定理，只是作为概念的一个小小回顾。图 10-3 说明了主要思想。


    3 [`www.ibm.com/cloud/learn/cap-theorem`](https://www.ibm.com/cloud/learn/cap-theorem)


    ![](img/index-262_1.png)

    第 10 章 Cassandra：宽列数据库


    ***图 10-3.** CAP 定理*


    **结构**


    Cassandra 提供了一种类似于 SQL 的语言，称为 CQL（Cassandra 查询语言），用于执行某些操作，例如向数据库中插入/更新/读取信息。在某种程度上，它与关系数据库之间存在某些对应关系。'
- fmt: "# Cassandra 与关系型数据库在信息组织方式上的对比\n\n表 10-1 展示了 Cassandra 与关系型数据库在信息组织方式上的对比。\n\
    \n***表 10-1.** 模型等价关系*\n\n| 关系型模型 | Cassandra 模型 |\n|-----------|----------------|\n\
    | 数据库 (`database`) | 键空间 (`Keyspace`) |\n| 表 (`table`) | 列族 (`Column Family`,\
    \ CF) |\n| 主键 (`primary key`) | 行键 (`row key`) |\n| 列名 (`Column name`) | 列名/键\
    \ (`Column name/key`) |\n| 列值 (`Column value`) | 列值 (`Column value`) |\n\n这种等价关系并不意味着所有概念完全相同，而是一种便于理解的思维映射。以下是对各概念的详细说明。\n\
    \n## 第 10 章 Cassandra：宽列数据库\n\n- **键空间 (`Keyspace`)**：该结构包含表或列族，并指示数据库的复制因子。您可以指定跨数据中心或云提供商存在多少个信息副本。\n\
    - **列族 (`Column family`)**：一种用于存储行和列的类型，具有特定数量的分区。这意味着表中的所有信息并非都存在于同一节点上，而是可能分布在不同的复制节点中。\n\
    - **行键 (`Row key`)**：该结构包含分区键或行键，所有行都必须包含此键，以确定信息存储在哪个节点上。\n- **列名/键 (`Column\
    \ name/key`)**：作为辅助键，可用于特定操作。\n- **列 (`Column`)**：存储特定信息的单个列。\n\n## 配置\n\n在本节中，您将了解如何配置之前的\
    \ `api-catalog` 以使用 Cassandra，但排除了数据库安装和配置的所有细节（这些内容请参见附录 E）。\n\n在按照建议修改微服务之前，请移除所有与\
    \ Spring JPA 相关的依赖和注解，包括 `DB` 文件夹中的脚本。\n\n### 数据库与连接设置\n\n让我们以非响应式方式将 Cassandra\
    \ 依赖添加到 `api-catalog` 中，因为该数据库（Spring Boot 提供的另一种非关系型数据库）支持这两种方式，这将在下一章中介绍。同样，不要在依赖中包含版本号（参见[清单\
    \ 10-1](#index_split_003.html#p264)），因为 Spring Boot 知道最佳选择。\n\n***清单 10-1.** 与\
    \ Cassandra 相关的依赖*\n\n```xml\n<dependency>\n    <groupId>org.springframework.boot</groupId>\n\
    \    <artifactId>spring-boot-starter-data-cassandra</artifactId>\n</dependency>\n\
    ```\n\n该依赖包含一个特定版本的驱动程序，因此您无需在 `pom` 文件中指定任何版本。如果您对 Spring Boot 提供的驱动程序特定版本有问题，可以在\
    \ `pom` 中包含该依赖来覆盖它。\n\n下一步是在 `application.yml` 中引入配置，以使用您机器上与 Cassandra 数据库相关的信息（参见[清单\
    \ 10-2](#index_split_003.html#p264)）。\n\n***清单 10-2.** Apache Cassandra 的 Spring\
    \ Data 连接信息*\n\n```yaml\nspring:\n  data:\n    cassandra:\n      keyspace-name:\
    \ twa\n      schema-action: recreate\n      local-datacenter: datacenter1\n  \
    \    contact-points: # Cassandra 的不同节点\n        - 127.0.0.1:9042\n        - 127.0.0.1:9043\n\
    \        - 127.0.0.1:9044\n```\n\n`application.yml` 中定义的属性值与 `docker-compose.yml`\
    \ 中的配置相关（您可以在 GitHub 仓库中找到与 Cassandra 相关的配置）。清单 10-2 中的连接点 (`contact points`)\
    \ 是您在机器上运行的 Cassandra 实例。为简化讨论，我们使用 `recreate` 值的模式操作 (`schema action`)，该操作会删除表并重新创建它们。\n\
    \n让我们从实体的修改开始，包括用于指示每个集群的主键以及用于分区的注解（参见[清单 10-3](#index_split_003.html#p265)）。\n\
    \n***清单 10-3.** Spring Data 与 Apache Cassandra 的连接信息*\n\n```java\nimport com.datastax.oss.driver.api.core.uuid.Uuids;\n\
    import org.springframework.data.cassandra.core.cql.Ordering;\nimport org.springframework.data.cassandra.core.cql.PrimaryKeyType;\n\
    import org.springframework.data.cassandra.core.mapping.Column;\nimport org.springframework.data.cassandra.core.mapping.PrimaryKeyColumn;\n\
    ```"
