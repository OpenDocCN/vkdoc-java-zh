    在 **org.springframework.transaction.annotation** 包中有一个枚举 **Propagation**，它包含以下值。


    • **REQUIRED** 表示方法或类使用同一个事务，并且不会创建新事务。但如果第一个方法不是事务性的，Spring 会创建一个新事务。此值是 Spring
    框架采用的默认值。


    • **SUPPORTS** 表示如果存在正在进行的事务，则两个方法使用同一个事务；但如果事务不存在，则不会创建事务。


    • **MANDATORY** 与 SUPPORTS 类似，但如果不存在正在进行的事务，则会抛出 **NoTransactionException** 异常。


    • **REQUIRES_NEW** 表示当存在正在进行的事务时，会暂停该事务并启动一个新事务；但如果不存在正在进行的事务，则会创建一个新事务。


    • **NOT_SUPPORTED** 是前一种情况的变体，因为如果存在正在进行的事务，它会暂停该事务，并且所有事务性方法都在无事务状态下执行。


    • **NEVER** 表示如果使用此属性的方法运行时存在正在进行的事务，则会抛出 **IllegalTransactionStateException**
    异常。


    • **NESTED** 是最复杂的属性之一，因为它意味着会创建一个新的子事务来执行所有代码。如果发生异常，所有内容都会回滚到调用该方法之前的状态。


