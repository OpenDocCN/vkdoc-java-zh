    \n5 [https://spockframework.org/](https://spockframework.org/)\n\n6 [https://testng.org/doc/](https://testng.org/doc/)\n\
    \n## 第12章 单元测试与集成测试\n\n***清单 12-1.*** `JUnit`/`Mockito` 依赖项\n\n```xml\n<dependencies>\n\
