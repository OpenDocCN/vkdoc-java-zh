    在 Java 中，像 Archunit22 这样的工具允许你定义并检查项目中的一切是否遵循你定义的结构。


    **分层架构**


    这种架构类型是最简单的，因为它将应用程序像蛋糕一样分成不同的层，每一层只能访问同一层或更低层的元素。这类架构从包含四层（视图/表示层、业务逻辑层、持久化层和数据库层）的架构演变为三层或五层的架构。


