    第 12 章 单元测试与集成测试


    单元测试不会检查**CountryRepository**的任何内容，这很合理，因为它不属于类的代码，而是一个接口，这意味着测试这类对象并不简单。有些方法会创建一个继承自该仓库并使用`DataSource`访问数据库的具体类。但这种方案并非最佳，因为你需要创建额外的对象并修改应用程序的逻辑来进行测试。


    **使用数据库进行集成测试**


    要对数据库进行测试，你需要进入更高层次的测试，因为你需要运行整个应用程序来测试持久层与数据库之间的交互。在幕后，Spring Data 会生成具体类来访问数据库，因此对你而言，唯一能使用的对象就是带有已定义查询的仓库。当然，你可以直接使用
    Spring Boot Test 来检查访问数据库的部分逻辑，但你需要访问一个数据库。因此，如果你插入一行包含表中唯一属性的数据，就无法在同一数据库中多次运行相同的测试，所以你需要另寻他法；例如，使用像
    DbUnit 这样的工具。7 另一种解决数据库访问测试问题的方案是使用名为 Testcontainers 的库。


    **Testcontainers**


    Testcontainers8 是一个轻量级开源库，允许你在应用程序中运行容器并复用测试用例。该库支持多种测试框架，例如不同版本的 Junit 和 Spock。你可以在
    Java 或 Kotlin 项目中使用它。


    7 [`www.dbunit.org/`](http://www.dbunit.org/)


    8 [`www.testcontainers.org/`](https://www.testcontainers.org/)


    ![](img/index-289_1.png)


    第 12 章 单元测试与集成测试


    这些容器可以是数据库，也可以是应用程序所需的其他服务；例如，如果你的应用程序需要使用 AWS 的特定服务，你可以使用 LocalStack9 的镜像。Testcontainers
    开发了一系列模块，以降低运行容器和配置此镜像的复杂性。这些模块包括所有常见的关系型数据库，以及一些最相关的非关系型数据库，如 MongoDB、Cassandra、Neo4j
    和 ElasticSearch。如果你需要使用模块列表中未包含的数据库，你可以运行任何容器，但需要定义所有与配置相关的逻辑。图 12-1 展示了一个 API
    可能拥有的不同连接，例如数据库、队列和云提供商服务。


    ***图 12-1.** 一个 API 可能拥有的所有外部连接示例*


    在幕后，该库使用 Docker10 来下载和运行容器，因此在你的项目中使用之前，请检查与该库需要满足的 Docker 版本相关的通用要求 11。2020 年
    11 月，DockerHub 对仓库中各种镜像的使用引入了限制，例如下载次数。如果你在流水线中使用此库，运行它的机器必须满足相同的要求。


    9 [`github.com/localstack/localstack`](https://github.com/localstack/localstack)


    10 [`www.docker.com/`](https://www.docker.com/)

