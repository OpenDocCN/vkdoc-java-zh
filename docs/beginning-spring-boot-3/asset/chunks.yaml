- fmt: '# Appendix A Setting up environment tools


    ## Installing Maven


    The second thing you need to have on your machine to run all the examples or follow
    the examples is `Maven`. This tool provides a good way to manage and solve the
    conflict between versions of the dependencies in your projects.


    Depending on the operating system, there are many ways to install `Maven`. Some
    involve doing it manually, so you need to download it from the official website
    and configure the environment variables to recognize the `mvn` command. Let’s
    look at how to install `Maven` using package manager tools.


    For macOS and Linux, you can use [Homebrew](https://brew.sh/), a tool for installing/updating.


    ```

    ➜ ~ brew install maven

    ```


    Also, you can install it using `SDKman` which follows the same approach as Homebrew
    and provides a simple way to install libraries or tools.


    ```

    ➜ ~ sdk install maven

    ```


    Another way to do it is only available in specific Linux distributions.


    - Ubuntu


    ```

    ➜ ~ sudo apt install maven

    ```


    - Fedora


    ```

    ➜ ~ sudo dnf install maven

    ```


    For Windows platforms, there are two possibilities. The first option is to install
    `SDKMAN!` and run the same commands as in macOS and Linux. The second option involves
    downloading manually, unzipping all the content in one directory, and creating
    an environment variable named `M2_HOME` with the root directory’s location inside
    the Maven folder you created.


    After finishing the Maven installation, check the version available in your system.
    To do this, type the following.


    ```

    ➜ ~ mvn --version

    Apache Maven 3.8.1

    Maven home: /usr/share/maven

    ```


    ## Installing Git


    `Git` is a version control system tracking all the modifications people can introduce.
    This tool is not required for using the source code in this book because GitHub
    allows you to download all the repositories. I included it in case you want to
    introduce modifications to the repository.


    To install this tool, you can use package manager tools.


    - Homebrew


    ```

    ➜ ~ brew install git

    ```


    - SDKman


    ```

    ➜ ~ sdk install git

    ```


    If you want another option, check the official Git website, where you can download
    an executable that installs everything in Windows.


    After you install the tool, you need to check which version is on your system.
    To do this, type the following.


    ```

    ➜ ~ git --version

    git version 2.37.1

    ```


    As a suggestion to not need to write in every commit information like your username
    and email, you can configure globally using these commands.


    ```

    ➜ ~ git config --global user.name "John Doe"

    ➜ ~ git config --global user.email "johndoe@example.com"

    ```


    ## Installing IntelliJ


    The instructions to install IntelliJ are on the official JetBrains webpage, which
    mentions the minimum resources and operating system. There are two versions of
    the IDE. The Community edition is free, and you can use and install several plugins.
    The Ultimate edition has a fee and offers extra features that are unnecessary
    for this book.


    Figure A-1 shows the official webpage with all the differences between both versions.


    **Figure A-1.** Official site to download the IDE


    The following plugins could be helpful to install on this IDE.


    - Maven Helper

    - GitToolBox

    - Docker

    - Spring Tools


    To install any of these plugins, go to Preferences ➤ Plugins, find the plugin
    by name, and install it.'
