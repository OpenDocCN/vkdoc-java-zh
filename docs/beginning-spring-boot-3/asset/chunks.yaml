    附录 D 安装并配置关系型数据库


    • 根据 2021 年 StackOverflow 调查 y,1，50% 的开发者在应用程序中使用该数据库，这一点很重要，因为许多人能够发现并报告任何问题。


    **步骤 1：在本地机器上安装数据库**


    该过程的第一步是下载数据库安装程序并运行安装过程。


    MySQL 支持多种操作系统，包括 Windows、macOS 以及许多 Linux 发行版。你可以从官方网站 e2 下载安装程序，并按照针对每个操作系统的说明
    3 进行操作。为 root 用户定义一个用户名/密码，你将在步骤 3 中使用该用户名/密码连接数据库。


    **步骤 2：安装客户端以访问数据库**


    要使用 MySQL，你需要一个客户端来帮助你执行某些操作，例如创建模式、插入数据以及检查一切是否正常运行。有许多选项可以安装到你的机器上；有些是免费的，有些则提供短期试用。本书使用
    MySQL Workbench，这是 MySQL 中推荐且最流行的工具，但还有其他选项，如附录 B 所述。


    要根据你的操作系统下载安装程序，你可以查看 MySQL Workbench 的官方文档.4 如果你想查看安装的系统要求，可以查看 MySQL 安装网页.5


    **步骤 3：配置连接**


    安装数据库并让客户端访问它之后，下一步是打开 MySQL Workbench，并使用你在步骤 1 中设置的凭据创建一个新连接。如果安装程序没有要求设置用户名和密码，那么数据库可能默认使用
    *root* 作为用户名，密码为空。


