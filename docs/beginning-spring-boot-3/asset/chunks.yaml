- fmt: '# Transaction Management


    Information in one or more tables. Following the previous example of the bank
    account, what happens if you share the account with your girlfriend/boyfriend
    and both simultaneously want to withdraw a certain amount that exceeds the availability
    of money in the account?


    These problems are solved in the database using transactions. This chapter discusses
    the basic concepts that involve a transaction and how you can transpose the concepts
    to Spring Data.


    ## What Is a Transaction?


    There are multiple definitions of the meaning of one transaction. In this book,
    a transaction is a set of write and read operations grouped for criteria that
    need to be executed to ensure that all operations are executed or not one of them.


    In 1981, Jim Gray was one of the first to define most of the concepts about transactions
