    附录 f 进一步阅读


    • [***Spring Boot 持久化最佳实践***](https://link.springer.com/book/10.1007/978-1-4842-5626-8)，作者
    Anghel Leonard (Apress,


    2020)。4 本书涵盖了提升关系型数据库持久化质量与性能的最相关主题。


    大部分概念与关系型数据库相关，但也有一些方面可应用于非关系型数据库。


    • ***学习 Spring Boot 3.0***，作者 Greg L. Turnquist (Packt, 2023)。5 本书涵盖了 Spring Boot
    新版本中的大部分相关主题，


    例如消息传递和响应式应用。


    • **Laurentiu Spilca 的 YouTube 频道**。6 T 该频道提供关于 Spring 相关主题的视频，如安全、性能及


    基础教程。Laurentiu 是最受认可的 Spring 演讲者和作者之一。


    **关系型数据库**


    • [***SQL 查询入门***](https://link.springer.com/book/10.1007/978-1-4842-1955-3)，作者
    Clare Churcher (Apress, 2008)。7 T 本书涵盖了 SQL 的所有基本方面，从如何编写操作


    （插入、更新、查询和删除）到查询的效率或性能。


    **非关系型数据库**


    • [***Cassandra：权威指南，第 3 版***](https://learning.oreilly.com/library/view/cassandra-the-definitive/9781098115159/)，作者
    Jeff Carpenter, Eben Hewitt (O’Reilly, 2020)。8 T 作者展示了该数据库


    相较于其他非关系型数据库所提供的所有优势。此外，本书还涵盖了不常见的主题，如监控、


    维护和扩展。


    4 [`link.springer.com/book/10.1007/978-1-4842-5626-8`](https://link.springer.com/book/10.1007/978-1-4842-5626-8)


