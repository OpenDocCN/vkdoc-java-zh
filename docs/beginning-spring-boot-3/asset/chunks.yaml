    ## 第13章 检测性能问题


    ### 检测问题


    没有能解决所有情况的银弹，但有一些工具可以帮助你根据上下文来最小化和分析问题。另一件需要考虑的事情是，并非所有的库/工具都能帮助你解决与数据库访问相关的问题，因为它们可能会导致你花费更多时间来开发新功能；仅在数据库访问是高风险操作或修改现有仓库时使用它们。


    **注意** 本章中的所有工具都适用于使用JVM的语言，例如Spring Boot具体案例中的Kotlin/Java，但如果你愿意，也可以与其他框架一起使用。


    ### 分析查询性能


    有一些工具可以直接分析与JVM相关的问题，例如`VisualVM`，或者其他负责监控整个应用程序的工具，例如`APM`。


    **注意** 本书的范围不包括展示所有`APM`替代方案及其优缺点。其目的是提供一个简要概述，并解释这些工具如何帮助找到解决问题的线索。


    使用`VisualVM`，你可以查看机器上运行的所有应用程序的情况，或者如果应用程序已打开JMX端口，还可以远程查看。这种对应用程序进行性能分析的方法可用于分析内存、CPU的使用情况，或者应用程序执行的查询，但前提是你的应用程序在后台使用JDBC，因为此工具不适用于非关系型数据库。


