    **CHAPTER 11**


    **Reactive Access**


    Most of the communication that an application establishes using HTTP connections
    implies a request, a specific process to obtain the response, and the response,
    which could be an exception or a type of information.


    This approach comes with issues. For instance, you need to wait until the services
    that your API consumes answer before you can start processing the information.
    But what if there were a mechanism that could return the information in a streaming
    fashion so that your API can start performing its operation before having all
    the information?


    Figure [11-1 vis](#index_split_003.html#p275)ualizes the standard way the database
    is accessed.


    ***Figure 11-1.** The standard way to access the database*


    This chapter explains how reactive programming offers solutions to these problems.


    © Andres Sacco 2023


    A. Sacco, *Beginning Spring Data*[, https://doi.org/10.1007/978-1-4842-8764-4_11](https://doi.org/10.1007/978-1-4842-8764-4_11#DOI)


    ![](index-276_1.png)


    Chapter 11 reaCtive aCCess


    **What Is Reactive Access?**


    In a traditional application, each request allocates a thread for a period of
    time to execute certain operations; this approach is known as the thread-per-request
    model. During this time, the process consumes memory and CPU exclusively. Figure
    [11-2](#index_split_003.html#p276) shows how a certain number of requests access
    the database simultaneously, wasting resources such as memory/CPU until each operation
    returns a result. Reactive programming is an alternative that addresses problems
    like the proper use of resources, which in turn provides the ability to improve
    scalability.


    ***Figure 11-2.** A reactive approach to accessing the database*


    To understand this problem in another way, imagine that you have the chance to
    receive a thousand requests simultaneously. Your application can’t be scaled for
    factors like needing more resources or the need to increase the size of the pool
    of connections. If you reduce the amount of time each resource is being used,
    you don’t need to make significant changes to your infrastructure or application
    to return results.


    The idea behind reactive programming is not to block a thread. Instead, the application
    receives the request like an event with a callback. This concept was popular many
    years ago in other languages like JavaScript. It implied waiting until to have
    something returned and using the callback to send a notification to the owner
    of the request and the result of the operation.


    Chapter 11 reaCtive aCCess


    During this process, the application''s thread can be used for another request.
    The information could be returned as a stream of information so you can execute
    different things when you receive the response instead of waiting until you have
    all the information. If an error occurs during the streaming process, the operation
    finishes, which makes sense because the same can happen when you try to do the
    same in the blocking method.


    In Spring Boot, the framework has a project for general reactive programming,
    called Spring WebFlux, which appears with the use of two publishers of events
    in the stream of information.


    - **Mono<T>** can emit zero or one element. For example, an endpoint'
