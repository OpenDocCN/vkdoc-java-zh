    **CHAPTER 3**


    **Spring Data and Different Types of Persistence**


    Chapter[ 1 dis](https://doi.org/10.1007/978-1-4842-8764-4_1)cussed mechanisms
    to persist the information. One of them is `Spring Data` which offers the possibility
    to persist the information using different databases with a certain level of abstraction
    and solve most of the common operations without requiring many lines of code.


    This chapter covers the basics of `Spring Data`, including how the repositories
    work and define custom implementations. These topics are relevant because most
    of them are used in the remaining chapters.


    **What Is Spring Data?**


    `Spring Data` is a family of projects supported by `Spring` to simplify access
    to databases like `MongoDB`, `Redis`, `Cassandra`, `Neo4j`, `Memcached`, and all
    the relational databases.


    In relational databases, `Spring Data` provides simplified access compared with
    other alternatives like `JDBC`, `Hibernate`, `JPA`, `JDO`, or `MyBatis`, reducing
    the number of classes, layers, and configurations necessary for any database operation.


    `Spring Data`[1 fir](#index_split_001.html#p78)st appeared at the 2010 `Spring
    One` conference. `Rod Johnson` (`SpringSource`) and `Emil Eifrem` (`Neo Technologies`)
    tried to connect a `Neo4j` database with an application using `Spring`. They created
    classes to generate a connection between the application and the database; these
    classes became the base of `Spring Data`. After that, the project family grows
    to provide support for different databases following the spirit of reducing the
    complexity and creating a certain level of abstraction between the application
    and the database.


    Now let’s think about why you need to move to `Spring Data` instead of using a
    database driver. Imagine that you have an application that uses `Redis`. The cost
    associated with maintaining this database is high, so the infrastructure team
    suggests


