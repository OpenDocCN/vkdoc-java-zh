    关系型数据库与非关系型数据库有很大不同，因为 Spring 默认不提供对响应式方法的支持。在这种情况下，你需要使用一个名为 R2DBC（响应式关系型数据库连接）的库，它为数据库提供了对响应式范式的支持。


    该库在社区中得到了广泛支持，有许多相关文章和会议演讲。Spring Data 包含对该库的支持，降低了在 Spring Boot 应用程序中使用的复杂性。不过，目前并非所有关系型数据库供应商都得到支持。每年都会有新的受支持数据库出现，但社区使用最广泛的数据库（如
    MySQL、PostgreSQL、MariaDB 和 SQL Server）均已获得支持。


