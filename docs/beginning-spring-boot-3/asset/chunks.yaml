    @Column("currency")


    private Currency currency;


    @Column("states")


    private List<State> states;


    //之前的 setter 和 getter 方法


    }


    第 10 章 Cassandra：宽列数据库


    JPA 定义事物的方式存在差异。Cassandra 允许你指定信息的顺序，如清单 10-3 所示，但仅限于@**PrimaryKeyColumn**，因为其他列无法进行过滤。普通查询需要使用@**Column**注解来指定，如果列名与数据库中的名称不同，你可以在该注解中指定真实名称。


    在前面的示例中，有些列是对象，这是与 JPA 的主要区别之一，因为你可以像保存 JSON 一样在列中保存复杂对象。现在，如果你仅修改 Country 实体并运行应用程序，控制台上会出现一个异常，提示某些复杂对象列存在问题。发生这种情况是因为你需要指定那些非实体的其他对象。为此，你只需在
    Currency 类中包含**@UserDefinedType("currency")**注解（参见清单 10-4）。


    ***清单 10-4.*** Spring Data 与 Apache Cassandra 的连接信息 import org.springframework.data.cassandra.core.mapping.UserDefinedType;


    import java.io.Serializable;


    @UserDefinedType("currency")


    public class Currency implements Serializable {


    //之前的属性，无需任何注解


    }


    下一步是定义仓库，这些仓库在不同数据库之间没有太大变化（参见清单 10-5）。在编写自定义方法执行查询之后，有一些事项需要考虑。


    ***清单 10-5.*** Cassandra 仓库


    public interface CountryRepository extends CrudRepository<Country, Long> {


    List<Country> findByCode(String code);


    }


    **注意** 与其他非关系型数据库的一大区别是，你无需使用特定注解来启用 Cassandra 的仓库。


    第 10 章 Cassandra：宽列数据库


    这个仓库可以正常工作，因为方法名涉及分区键，因此 Spring Data for Apache Cassandra 可以创建并执行查询。如果你尝试按其他属性（如时区）进行过滤，则会抛出一个异常，提示该操作无效。


    **注意** 由 com.datastax.driver.core.exceptions.invalidQueryexception 引起：无法执行此查询，因为它可能涉及数据过滤，从而导致不可预测的性能。如果你不顾性能不可预测性而仍想执行此查询，请使用
    alloW FilterinG。


    驱动程序建议你在方法中使用**@Query(allowFiltering = true)**注解来执行该操作。此注解可能会引发与性能相关的问题，因为你可能尝试执行驱动程序默认不支持的操作。如果你需要按非分区键的其他属性进行过滤，那么使用
    Cassandra Web 之类的工具来更改数据库中的列定义可能是个好主意。


    **注意** 该数据库提供了一种类似于 JPA 的方式来编写完整查询并在仓库中声明。


