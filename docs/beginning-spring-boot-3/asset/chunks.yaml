    不进行正确应用测试的另一个问题是数据库版本。


    有些开发者会使用像 H2 这样的内存数据库来执行特定测试。这种方法在某些条件下是可行的，但并非所有数据库都具备相同的特性，因此你需要使用应用在所有环境中都使用的同一数据库来执行测试。


    总而言之，测试数据访问层的主要问题之一是如何*仅*在仓库（Repository）中执行测试。第二个问题是如何测试数据库访问，以便能够多次执行测试而不会出现问题。在本章中，你将学习这两个问题的解决方案。本书不会详细讨论单元测试和集成测试。为此，我建议你查阅
    Martin Fowler 的网站。2


