    一个需要建立索引以提升搜索操作性能的特定字段


    `@Id`


    包含集合标识的属性


    `@transient`


    在持久化信息过程中忽略某个特定字段


    `@IndexDirection`


    指示索引的方向：降序或升序


    `@Field`


    显式指定数据库中属性的名称，类似于 JPA 中的 `@Column`


    `@DBref`


    用于连接多个集合的注解，类似于 JPA 中的 `@OneToMany` 或 `@ManyToMany`


    如果你使用 **@DBRef** 引用另一个实体，对该对象的更改不会持久化到数据库中，因为无法像 JPA 那样实现级联操作。


    了解了这些注解后，我将对 Country 实体进行一些小的修改，以避免持久化完整的货币信息。请查看清单 8-5 中实体的所有修改。


    ***清单 8-5.*** Mongo 实体的定义


