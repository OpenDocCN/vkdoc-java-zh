- fmt: "For this reason, when you invoke the `country` endpoint, you obtain all the\
    \ currency information because `MapStruct` is not configured to ignore certain\
    \ attributes during the mapping.\n\n## Ordering\n\nWhen you have two or more connected\
    \ entities, and one has another’s list of elements, `JPA` or `Hibernate` executes\
    \ the query without considering the order. You have two options: order the element\
    \ in your application or delegate to the database the responsibility to do it.\n\
    \nLet’s modify our catalog’s application to have a bidirectional relationship\
    \ between `country` and `state` to see the situation in more detail and learn\
    \ how to solve it (see Listing 4-11). The `Country` entity adds a `List` attribute\
    \ of type `State`.\n\n### Listing 4-11. Add the Bidirectional Relationship\n\n\
    ```java\n@Entity\n@Table(name= \"country\")\npublic class Country implements Serializable\
    \ {\n    @OneToMany(fetch = FetchType.LAZY)\n    @JoinColumn(name = \"country_id\"\
    , nullable = false, updatable = false,\n                insertable = false)\n\
    \    private List<State> states;\n\n    // Attributes, constructors, setters,\
    \ and getters for all the attributes\n    // Override the hashcode and equals\n\
    }\n```\n\n**Note** the use of the properties `updatable` and `insertable` in the\
    \ `@JoinColumn` annotation with `false` indicates that it is not the entity’s\
    \ responsibility to modify the connected entities.\n\nThe next step implies that\
    \ you modify the `State` entity to include the properties `updatable` and `insertable`\
    \ and do the same with the DTOs (see Listing 4-12).\n\n### Listing 4-12. Add the\
    \ Bidirectional Relationship\n\n```java\n@Entity\n@Table(name= \"state\")\npublic\
    \ class State implements Serializable {\n    @ManyToOne(fetch = FetchType.LAZY)\n\
    \    @JoinColumn(name = \"country_id\", nullable = false, updatable = false,\n\
    \                insertable = false)\n    private Country country;\n\n    // Attributes,\
    \ constructors, setters, and getters for all the attributes\n    // Override the\
    \ hashcode and equals\n}\n```\n\nWhen you use `MapStruct` and do it automatically,\
    \ the mapper from one object to another invokes all the `get` methods, so `Spring\
    \ Data` suppose that you need all the information of the lazy collections. The\
    \ main problem in this bidirectional relationship is that it produces an infinite\
    \ loop, so you need to exclude the field `country` in the `State` entity. To solve\
    \ this, you must modify the `ApiMapper` class and create a custom mapper (see\
    \ Listing 4-13).\n\n### Listing 4-13. Customize the Mapper of the Country Entity\n\
    \n```java\nimport com.apress.catalog.dto.CountryDTO;\nimport com.apress.catalog.dto.CurrencyDTO;\n\
    import com.apress.catalog.dto.StateDTO;\nimport com.apress.catalog.model.Country;\n\
    import com.apress.catalog.model.Currency;\nimport com.apress.catalog.model.State;\n\
    import org.mapstruct.Mapper;\nimport org.mapstruct.Mapping;\nimport org.mapstruct.factory.Mappers;\n\
    \n@Mapper(componentModel = \"spring\")\npublic interface ApiMapper {\n    ApiMapper\
    \ INSTANCE = Mappers.getMapper( ApiMapper.class );\n\n    CurrencyDTO entityToDTO(Currency\
    \ currency);\n    Currency DTOToEntity(CurrencyDTO currency);\n    CountryDTO\
    \ entityToDTO(Country country);\n    Country DTOToEntity(CountryDTO country);\n\
    \n    @Mapping(target=\"country\", ignore = true) //Exclude the country element\
    \ to prevent a recursive mapping\n    StateDTO stateToStateDTO(State state);\n\
    \    State stateDTOToState(StateDTO state);\n}\n```\n\nNow let’s run the application\
    \ and request the endpoint to obtain all the information about one country. When\
    \ you obtain the endpoint’s response, all the states are in the same order that\
    \ appears in the database by ID (see Figure 4-5).\n\n![Figure 4-5](index-132_1.png)\n\
    \n### Figure 4-5. Result of invoking the country endpoint without ordering the\
    \ states.\n\nTo indicate to `JPA` that the list of states needs to be ordered\
    \ for criteria, add the `@OrderBy` annotation with the column’s name (see Listing\
    \ 4-14).\n\n### Listing 4-14. Entity Order for a Specific Column\n\n```java\n\
    @Entity\n```"
