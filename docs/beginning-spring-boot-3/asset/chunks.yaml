- fmt: "# Abstract Classes and Inheritance\n\nAbstract classes are parts of other\
    \ entities using inheritance. But in the database, you see all the columns in\
    \ the same table, as shown in Figure [4-7](#index_split_002.html#p137).\n\n![](index-137_1.png)\n\
    \n**Chapter 4: Persistence and Domain Model**\n\n***Figure 4-7.** Migrating the\
    \ entities to a strategy of using a Mapped superclass*\n\nConsider a hypothetical\
    \ situation where you want to change the name of one attribute of the concrete\
    \ class without changing anything more. JPA offers the possibility to override\
    \ certain attributes of the abstract class indicating the new values; for example,\
    \ let’s change the name of the ID in the `Currency` entity to another value.\n\
    \n```java\n@Entity\n@Table(name= \"currency\")\n@AttributeOverride(\n    name\
    \ = \"id\",\n    column = @Column(name = \"currency_id\", nullable = false))\n\
    // This implies that you override the name of the id for another one\npublic class\
    \ Currency extends Base implements Serializable {\n    // Attributes, constructors,\
    \ setters, and getters for all the attributes\n    // Override the hashcode and\
    \ equals\n}\n```\n\n![](index-138_1.png)\n\n**Chapter 4: Persistence and Domain\
    \ Model**\n\nThis feature is extremely useful when you have multiple classes that\
    \ have something in common but must include an exception for a certain class.\n\
    \n## Table per Class Hierarchy\n\nThis approach represents an entire hierarchy\
    \ of classes inside a single table. An alternative name for this strategy is **single\
    \ table**. JPA uses this strategy as the default if you don’t indicate anything\
    \ explicitly using the `@Inheritance` annotation.\n\nA table per class hierarchy\
    \ implies that you need to add an extra column in the tables of the database which\
    \ does not appear in your entities because JPA needs to know to discriminate if\
    \ the information of one row is from one class to another.\n\nLet’s introduce\
    \ a few modifications to your catalog’s applications to represent this specific\
    \ situation. A new set of entities appear in Figure [4-8](#index_split_002.html#p138),\
    \ representing that you can have cities and airports that are not directly connected.\
    \ Both entities extend from the `Base` class, which no longer has the `@MappedSuperclass`\
    \ annotation.\n\n***Figure 4-8.** New entities with single table relationship*\n\
    \nThere are only two tables because the city and airport are part of one class\
    \ and the `BASE_TYPE` column works as a discriminator to know which type of entity\
    \ represents one row in the database. Remember that the `code` and `name` attributes\
    \ are unique in the different tables.\n\n**Chapter 4: Persistence and Domain Model**\n\
    \n```java\n@Entity\n@Inheritance(strategy = InheritanceType.SINGLE_TABLE)\n@DiscriminatorColumn(name\
    \ = \"BASE_TYPE\")\npublic abstract class Base implements Serializable {\n   \
    \ @Id\n    @GeneratedValue(strategy = GenerationType.SEQUENCE)\n    private Long\
    \ id;\n    // Attributes, constructors, setters, and getters for all the attributes\n\
    \    // Override the hashcode and equals\n}\n```\n\nThe only things you need to\
    \ modify now are the `City` and the `Airport` entities to have the `@DiscriminatorValue`\
    \ annotation with the value used in the database to know what entity is in the\
    \ application.\n\n```java\n@Entity\n@Table(name= \"airport\")\n@DiscriminatorValue(\"\
    AIR\")\npublic class Airport extends Base implements Serializable {\n    @OneToMany(fetch\
    \ = FetchType.LAZY)\n    @JoinColumn(name = \"AIRPORT_ID\")\n    private List<Terminal>\
    \ terminals;\n    // Attributes, constructors, setters, and getters for all the\
    \ attributes\n    // Override the hashcode and equals\n}\n```\n\nThe city code\
    \ is about the same but has a different `@DiscriminatorValue` annotation and attributes,\
    \ but the logic is the same that appears in all the examples of this chapter.\
    \ The only thing that did not exist previously in the catalog’s application is\
    \ the `Terminal` class, which has a relationship with the `Airport` entity.\n\n\
    **Chapter 4: Persistence and Domain Model**\n\n```java\n@Entity\n@Table(name=\
    \ \"terminal\")\npublic class Terminal implements Serializable {\n    @ManyToOne(fetch\
    \ = FetchType.LAZY, optional = false)\n    @JoinColumn(name = \"AIRPORT_ID\")\n\
    \    private Airport airport;\n    // Attributes, constructors, setters, and getters\
    \ for all the attributes\n    // Override the hashcode and equals\n}\n```"
