    interface CityRepository {


    Optional<City> get(long id);


    List<City> getAll();


    void save(City city);


    void delete(City city);


    }


    第 1 章 应用程序架构


    你可以使用一个或多个仓库来隐藏访问信息的逻辑。你可以从清单 1-3 中获取接口，并创建一个具体类，以与清单 1-2 相同的方式使用该仓库。


    ***清单 1-4.*** 使用 DAO 的仓库示例


    public class CityRepositoryImpl implements CityRepository {


    private CityDao cityDao;


    public CityRepositoryImpl(CityDao cityDao) {


    this.cityDao = cityDao;


    }


    public Optional<City> get(long id) {


    return cityDao.get(id);


    }


    public List<City> getAll() {


    return cityDao.getAll();


    }


    public void save(City city) {


    cityDao.save(city);


    }


    public void delete(City city) {


    cityDao.delete(city);


    }


    }


    这种组合非常少见，因为大多数开发者只使用其中一种。Spring Data 为仓库提供了大量元素，仅通过仓库接口即可解决问题。


    ![](img/index-51_1.png)


    第 1 章 应用程序架构


    ***图 1-13.** 组合两种模式的结构*


    **数据传输对象（DTO）**


    数据传输对象（DTO）模式在多种语言中使用，它聚合并封装数据，用于在应用程序或应用程序的各层之间传输。你可以将此模式视为一种不包含任何业务逻辑的数据结构，并且可以表示多种结构的组合。


    这种模式并非近期才出现。Martin Fowler 在 2002 年出版的《企业应用架构模式》一书中提到了它。在他的网页.25 上也对此进行了讨论。


    此模式有助于减少为获取执行特定任务所需的所有信息而调用不同端点或进程的次数，这些调用在时间或传输信息量方面成本高昂。


    25 [`martinfowler.com/eaaCatalog/dataTransferObject.html`](https://martinfowler.com/eaaCatalog/dataTransferObject.html)


    ![](img/index-52_1.png)


    第 1 章 应用程序架构


    ***图 1-14.** 组合两个不同对象的 DTO 示例*


    **注意** 当类转换用于将信息持久化到数据库的实体和其他应用程序层时，此模式会出现在示例中。


    有多种映射对象的方法；有些是手动完成的，意味着创建一个接收一个对象并返回另一个对象的类。另一种方法是使用像 MapStruct、26 Orika、27 Dozer、28
    JMapper、29 和 ModelMapper30 这样的库来自动完成大部分转换。关于哪个库是根据 CPU 使用率、内存或实现复杂度来选择的最佳方案，已有大量分析和基准测试
    31。


    **规约模式**


    规约模式根据条件过滤或选择对象的子集。例如，假设你想知道在你的旅行社至少有两个预订的所有用户，那么你可以创建一个类，该类接收每个用户并检查该用户是否满足条件。


