    \n![图6-4 包含文件后的项目结构](index-186_1.png)\n\n**图6-4.** 包含文件后的项目结构\n\n之后，在`application.yml`中包含基本配置。如果允许Liquibase使用数据源中的用户名、密码和数据库URL，则配置很短。如果未指定任何这些信息，则从Spring\
    \ Boot中定义的数据源获取信息。出于安全目的，请使用不同的用户名和密码访问数据库，并尽量不要在任何配置文件中直接包含这些值，可以使用环境变量（参见列表6-2）。\n\
