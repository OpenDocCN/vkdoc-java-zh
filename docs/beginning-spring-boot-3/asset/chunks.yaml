    第 8 章 MongoDB：文档数据库


    public interface CurrencyRepository extends

    MongoRepository<Currency, Long> {

    // 此方法等同于使用 **findByCode(String code)**

    List<Currency> findByCode(String code);

    }


    **定义查询**


    大多数情况下，Spring Data 通过使用关键字定义新方法所提供的简单查询非常出色，但并非总是如此。有时，由于查询的复杂性，或者因为你检测到了性能问题，你需要自行定义查询。


    如果你不想使用仓库的默认功能，Spring Data 提供了替代方案，例如在仓库中手动创建查询，或使用按示例查询。让我们简要讨论一下。


    **使用注解编写查询**


    如果你熟悉 MongoDB 并在 Compass 等用户界面上编写查询，那么这种方法你也不会陌生。与 JPA 一样，Mongo 也支持使用注解定义查询。清单
    8-7 编写了整个查询或部分查询，并与使用关键字的定义相结合。


    ***清单 8-7.*** 自定义查询


    public interface CountryRepository extends MongoRepository<Country, Long> {

    // 这是一个自定义查询，仅针对一个字段进行查找

    @Query(value = "{''code'': ?0}")

    List<Country> findCustom(String code);


    // 这是一个自定义查询，将方法名称中的条件与查询相结合

    @Query(value = "{''code'': ?0}")

    List<Country> findEnabled(String code);

    }


    第 8 章 MongoDB：文档数据库


    一个良好的可读性实践是使用这些方法之一，而不是创建结合方法名称条件的复杂查询。此外，你可以在 JPA 中使用 @Param。


    **按示例查询**


    这是 Spring Data 的另一个有趣特性，你在 Redis 章节中已经实现过。不过，使用 MongoRepository<T,ID> 有一些优势。你无需做任何更改，因为该接口扩展自
    **QueryByExampleExecutor<T>** 。


    你只需要创建匹配器和对象来执行查询。


    使用示例编写查询的逻辑与第 [7](https://doi.org/10.1007/978-1-4842-8764-4_7) 章相同。为简单起见，不要重复底部看到的代码，只需在调用仓库时，在
    CountryService 中包含所需的 ExampleMatcher。


    ExampleMatcher matcher = ExampleMatcher.matching()

    .withIgnorePaths("code")

    .withIncludeNullValues()

    .withMatcher("name", ExampleMatcher.GenericProperty

    Matcher.of(ExampleMatcher.StringMatcher.DEFAULT));


    **将 MongoTemplate 与自定义仓库结合使用**


    回想一下，Spring Data 提供了两种访问数据库的替代方案；一种是最常见的方法，即创建一个接口作为仓库，并将所有信息转换和操作创建的工作委托给 Spring。另一种替代方案是，你创建一个自定义仓库，并使用一种机制来执行操作，在
    Mongo 中，这指的是使用 MongoTemplate。


    MongoTemplate 可以提高某些数据库操作的性能，而且你可以做很多事情，比如创建查询。表 8-5 详细说明了 MongoRepository<T,
    ID> 和 MongoTemplate 之间的主要区别，以帮助你更好地理解。

