- fmt: "# 数据库版本与测试问题\n\n另一个因未正确进行应用程序测试而产生的问题是数据库版本。\n\n一些开发者使用像 H2 这样的内存数据库来执行特定测试。这种方法在某些条件下可以正常工作，但并非所有数据库都具有相同的特性，因此你需要使用应用程序在所有环境中使用的相同数据库来执行测试。\n\
    \n总而言之，测试数据访问层的主要问题之一是：如何*仅*在存储库中执行测试。第二个问题是：如何测试数据库访问，以便能够多次执行测试而不会出现问题。在本章中，你将学习这两个问题的解决方案。本书不详细讨论单元测试和集成测试。为此，我建议你查阅\
    \ Martin Fowler 的网站。[2](#index_split_003.html#p285)\n\n## 使用 Mock 进行单元测试\n\n测试\
    \ Java/Kotlin 应用程序最常用的库之一是 `JUnit`，[3](#index_split_003.html#p285) 它还有许多其他库可以添加额外功能，包括\
    \ `Spring Boot Test`，[4](#index_split_003.html#p285) 它使用最新版本的 `JUnit` 来执行某些操作。\n\
    \n**注意** 还有其他 Java 测试替代方案，例如 `Spock`[5](#index_split_003.html#p285) 或 `TestNG`。[6](#index_split_003.html#p285)\n\
    \n让我们开始创建一个使用 `JUnit` 的通用单元测试，以检查 `CountryService` 中的 `save` 方法的逻辑是否正常工作。首先要做的是添加使用\
    \ `JUnit` 创建和运行单元测试所需的所有依赖项；这些依赖项在最终解决方案中也会被复用。清单 12-1 显示了需要在 `pom` 文件中添加的用于创建单元测试的依赖项。\n\
    \n2 [https://martinfowler.com/articles/practical-test-pyramid.html](https://martinfowler.com/articles/practical-test-pyramid.html)\n\
