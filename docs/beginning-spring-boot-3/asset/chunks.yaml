    在你的机器上安装 Mongo 的命令（参见清单 E-4）。


    ***清单 E-4.*** 使用 Homebrew 更新并安装 Mongo


    $ brew update


    Already up-to-date.


    $ brew install mongodb-community@6.0


    Warning: mongodb-community provides a launchd plist which can only be used


    on macOS!


    You can manually execute the service instead with:


    mongod --config /home/linuxbrew/.linuxbrew/etc/mongod.conf


    最后一种选择是使用 Docker 命令来运行数据库，或者使用一个 docker-compose 文件。清单 E-5 展示了使用 Docker-Compose
    配置 MongoDB 的基本方法。


    ***清单 E-5.*** 用于运行 Mongo 的 Docker-compose 文件


    version: ''3.1''


    services:


    mongo-db:


    image: mongo:6.0


    container_name: mongo-db


    restart: always


    ![](img/index-396_1.png)


    附录 e 安装和配置非关系型数据库


    environment:


    MONGO_INITDB_ROOT_USERNAME: root


    MONGO_INITDB_ROOT_PASSWORD: rootpassword


    ports:


    - 27017:27017


    在你的机器上运行 MongoDB 之后，下一步是使用工具以图形化方式访问数据库。根据你的操作系统，按照官方文档 2 的步骤安装 Mongo Compass（一个官方的
    Mongo 工具）。


    当你的机器上安装了 Mongo Compass 后，首次打开时会看到一个如图 E-6 所示的界面，该界面允许你配置首次连接。


    ***图 E-6.** Mongo Compass 首页*


    下一步是点击“高级连接选项”，输入你机器上运行的 Mongo 服务器的用户名和密码。如果你使用了 docker-compose 文件，用户名为 **root**，密码为
    **rootpassword**。图 E-7 展示了 Mongo Compass 上高级配置的界面。


    2 [`www.mongodb.com/try/download/compass`](https://www.mongodb.com/try/download/compass)


    ![](img/index-397_1.jpg)


    附录 e 安装和配置非关系型数据库


    ***图 E-7.** 配置与 MongoDB 服务器的连接*


    如果你正确输入了所有信息，你会看到一个显示你 MongoDB 服务器上所有可用数据库的界面。默认情况下，有三个数据库，请尽量不要删除它们（参见图 E-8）。


    ![](img/index-398_1.jpg)


    附录 e 安装和配置非关系型数据库


    ***图 E-8.** 你机器上的可用数据库*


    最后一步是创建一个新数据库，用于保存与你的应用程序相关的信息，该信息包含目录数据。为此，你只需点击“创建数据库”按钮，并填写字段，如图 E-9 所示。


    ![](img/index-399_1.jpg)


    附录 e 安装和配置非关系型数据库


    ***图 E-9.** 在你的 Mongo 服务器上创建新数据库*


