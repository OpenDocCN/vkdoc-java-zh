    **CHAPTER 4**


    **Persistence and Domain**


    **Model**


    In the previous chapter, you learned the basics of Spring and how to build a project
    that


    exposes an endpoint that persists information into a database using an architecture


    of layers with Spring Data. Still, the endpoint only obtains the knowledge of
    one entity


    without any connection or relationship with another. This type of situation in
    the


    relational database is not so common.


    This chapter explains the relationships between the entities and how to use


    inherence to reduce duplicate code in Java. To do this, let’s use the catalog’s
    database


    model you saw in Figure [1-4](https://doi.org/10.1007/978-1-4842-8764-4_1#Fig4)
    in Chapter [1, whic](https://doi.org/10.1007/978-1-4842-8764-4_1)h represents
    a catalog’s list of countries, states, cities, and currencies.


    Lastly, you learn how to validate the values of the entities before persisting
    the


    information into the database because you could send something to the database
    that


    produces an exception. This type of situation, in most cases, implies cost associated


    with the transference of information across the network in most of the relevant
    cloud


    providers. Hence, validating the data before sending it to the database is essential.


    **JPA Configuration Using Annotations**


    JPA offers a set of annotations that provide the metadata in the entities with
    the idea


    that a library/framework that extends this specification uses the information
    to execute


    certain operations, like creating a table or validating if the model in the database


    matches the entities.


    This concept sounds abstract, but JPA uses annotations to represent in the classes


    the different types of elements and relationships that exist in the database;
    for example, the name of the columns could not be the same in a table as in an
    entity, or you want


