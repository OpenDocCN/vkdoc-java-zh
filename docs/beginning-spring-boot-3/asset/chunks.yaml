    ## Chapter 6 Versioning or Migrating Changes


    **Note** this solution is not something new. Martin Fowler’s blog features a long
    article[9](#index_split_002.html#p194) on this topic from 2017.


    Another situation could be to change from a relational database to a non-relational
    database or between non-relational databases. You want to minimize the risk of
    new problems in the application.


    **Note** this book covers a variety of databases, so you use this mechanism to
    migrate from one relational database to a non-relational database and do the tests
    to check if everything continues working.


    There are several types of toggles or feature flags. Some of them are removed
    from the source code after a while, but others exist for a long time, depending
    on the feature to test. Let’s look at the toggle options.


    - **Release** is ideal for a developer who wants to create or modify an existing
    functionality and minimize the risk of deploying something wrong. In most cases,
    this toggle is not permanent; after a short time, it is removed from the source
    code.

    - **Experimental** toggles are ideal for doing A/B testing, so you can indicate
    using criteria like the percentage of the request to one version instead another
    one. Imagine that you have two ways to do an operation in the database, and you
    are not sure about the performance and how it can affect each one of the entire
    applications. The best solution is to send a part of the request to one solution
    and check the results.

    - **Operational** is a common way to enable or disable features; just change the
    value of one variable. A common use case is for enabling or disabling the connection
    to external services that can affect your microservices and produce a degradation
    in the service.


    9 [https://martinfowler.com/articles/feature-toggles.html](https://martinfowler.com/articles/feature-toggles.html)


    ## Chapter 6 Versioning or Migrating Changes


    - **Permission** is the most common use of the toggles where you enable or disable
    access to a part of the platform or microservices for certain users or applications.


    ## Implementing Feature Flags


    The first implementation of this type of pattern in Spring Boot used the profiles
    to enable or disable features, depending on the environment. If you want to enable
    a feature, you need to redeploy the entire application, which implies time, so
    this is not a solution that is scalable and performant.


    Many tools implement this pattern, but not all have the same number of features
    or the same level of maturity. In Java and the integration with Spring Boot, there
    are two options: Togglz[10 and FF4J](#index_split_002.html#p195). [11 Eac](#index_split_002.html#p195)h
    provides many tutorials and has several developers who report issues and propose
    new features, but FF4J offers extra features that help you.


    - Integration with multiple types of databases to save the information and the
    metrics about the feature flags'
