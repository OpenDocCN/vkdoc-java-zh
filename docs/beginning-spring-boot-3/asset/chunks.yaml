    The first time you execute, all the migrations take a few extra seconds because
    you initialize the entire database. But the application at startup is shown in
    Listing [6-9](#index_split_002.html#p192) and takes less because you only validate
    the checksum and the name of the scripts in the database.


    ## Chapter 6 Versioning or Migrating Changes


    **Listing 6-9.** Logs That Appear When You Run the Second Time


    2022-07-08 00:35:42.479 INFO 337966 --- [ restartedMain] `o.f.core.internal.command.DbValidate`
    : Successfully validated 5 migrations (execution time 00:00.078s)


    2022-07-08 00:35:42.486 INFO 337966 --- [ restartedMain] `o.f.core.internal.command.DbMigrate`
    : Current version of schema "public": 3.0


    2022-07-08 00:35:42.487 INFO 337966 --- [ restartedMain] `o.f.core.internal.command.DbMigrate`
    : Schema "public" is up to date. No migration necessary.


    The second time you run the application, the validations take less than one second,
    so it’s a good way to synchronize your database and version the changes without
    affecting the application’s startup time.


    ## Best Practices


    The following are best practices when using these tools.


    - Define a pattern with the name of the files to help you identify the sequence
    of execution and what contains inside. Some tools have a rigid file pattern you
    need to follow; in others, you can use everything you want.

    - Do not include in the configuration the information about the user or the password
    to do the changes in the database; use external variables or configurations that
    reduce the risk of problems.

    - Each file must contain a certain number of modifications that have meaning.
    Try creating two files if you need to modify two tables for different reasons.

    - Do not modify any file that you previously deployed in an environment. Create
    a new one with the changes.

    - Do not run the scripts manually. Delegate the responsibility to execute the
    scripts and check if everything is okay with your tool. Remember that most tools
    create extra tables that verify if the script was executed or not.


    ## Chapter 6 Versioning or Migrating Changes


    - Each developer needs to have a database locally where they can check if the
    script works fine or not because multiple developers executing changes in a database
    could produce inconsistencies.


    ## Feature Flags


    Most developers need to introduce improvements or fix problems in the code of
    one microservice that could not work as expected.


    Imagine a common situation, you create a new method in the repository which replaces
    an existing one that is accessed in a way that is not performant, and you discover
    in production that you have two alternatives to have the previous status of the
    system: do a rollback of the code to the previous version and another fix problem
    quickly.


    The first two solutions solve the problem but not in the cases that are quick.
    Imagine a situation where you don’t discover the problem with the performance
    of the query, so your application could affect another part of the platform because
    taking more time to answer. An alternative to reduce the risk is deploying the
    changes with a strategy like a canary[7 or blue-green[8 deployment where the old
    and the new version coexist so you can detect the problem quickly and reduce the
    risk but not in all situations this solution works. Imagine that you didn’t see
    anything strange in the canary deployment and decided to propagate the change
    to all the microservice instances weeks after you'
