    ***图 E-1.** RedisInsight 主页*


    下一步是将此工具与正在运行的数据库连接，因此你需要点击“我已有一个数据库”按钮。你会看到一个包含多种连接选项的网页，因为数据库可以托管在不同的位置，例如你的本地机器、专用服务器或
    AWS 等云服务提供商。图 E-2 展示了配置数据库访问权限的不同选项。


    ![](img/index-391_1.png)


    附录 E 安装与配置非关系型数据库


    ***图 E-2.** 数据库配置*


    下一步是点击“连接到 Redis 数据库”按钮，并在弹出的模态框中填写连接信息。


    • **host**: redis-db

    • **port**: 6379

    • **name**: catalog（或你希望使用的任何名称）


    确认所有信息后，RedisInsight 会在添加数据库之前进行连接验证，检查你提供的信息是否正确。如果一切正常，你将看到类似图 E-3 的界面，其中显示了你已在工具中配置的数据库。


    ![](img/index-392_1.png)


    附录 E 安装与配置非关系型数据库


    ***图 E-3.** 与数据库的连接*


    双击该数据库，你将进入一个新页面，其中包含可针对该特定数据库执行的所有操作以及状态检查。这些操作可以通过命令行或 RedisInsight 中的 CLI 工具从你的应用程序执行（参见图
    E-4）。


    ![](img/index-393_1.png)


    附录 E 安装与配置非关系型数据库


    ***图 E-4.** 活跃的数据库*


    最后，你可以打开“浏览器”选项，向数据库添加新元素或检查现有元素，这有助于检查键的 TTL 是否正常（参见图 E-5）。


    ![](img/index-394_1.png)


    附录 E 安装与配置非关系型数据库


    ***图 E-5.** 浏览器选项卡，允许添加新键*


    **MongoDB**


    MongoDB 是一种非关系型数据库，它以文档形式持久化信息，并具备关系型数据库的部分功能。该数据库提供多种安装选项。


    该数据库提供了根据你的操作系统使用不同软件包进行安装的文档 1。然而，根据操作系统的不同，安装过程可能需要额外的步骤。


    Homebrew 简化了安装过程的复杂性。第一步是将与 Mongo 相关的仓库添加到 Homebrew 中，默认情况下 Homebrew 并不包含这些仓库（参见清单
    E-3）。


    1 [`www.mongodb.com/docs/v6.0/administration/install-on-linux/`](https://www.mongodb.com/docs/v6.0/administration/install-on-linux/)


    附录 E 安装与配置非关系型数据库


    ***清单 E-3.*** 为 Homebrew 添加 Mongo 仓库


