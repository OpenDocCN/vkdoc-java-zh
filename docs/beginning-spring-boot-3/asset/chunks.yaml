    \ 及以上版本的支持。不过，在官方仓库中，存在与 Java 17 相关的错误，因此请检查此库的最新版本，因为它有可能解决一些已报告的问题。\n\n该工具提供两种版本：社区版和团队版。两者之间的主要区别在于所提供的功能数量；例如，团队版提供以下功能：\n\
    \n•   一种撤销数据库中变更的机制（你可以指定撤销一定数量脚本的顺序。）\n•   一种在实际执行数据库变更前模拟变更，以检查脚本是否一切正常的方法\n\
    •   大量的回调或钩子\n•   将脚本存储在 AWS 或 GCP 中的可能性\n\n该工具提供了一套默认的命名结构来识别操作类型，但你可以自定义该模式。文件名必须包含四个部分：第一部分表示操作类型，第二部分指明版本，第三部分简要描述文件，第四部分是后缀（大多数情况下为\
    \ `.sql`）。你可以在图 6-3 中看到该工具的文件名结构。\n\n3 [`flywaydb.org/`](https://flywaydb.org/)\n\
    \n![](img/index-182_1.png)\n\n第 6 章 版本控制或迁移变更\n\n***图 6-3.** 操作命名结构*\n\n后缀可以是\
    \ `.sql`，但你也可以在继承自 **BaseJavaMigration**.4 的 Java 类中编写语句。在这两种情况下，Flyway 都会生成一个名为\
    \ **flyway_schema_history** 的表，其中包含所有已执行脚本的信息。你可以将此表想象为 Git 仓库的历史记录。\n\n**注意**：在本书的源代码中，与数据库结构相关的文件都遵循此命名模式，因为你已将其包含在微服务目录的代码中。\n\
    \n./\n\n├── chapter 1\n\n├── chapter 2\n\n├── chapter X\n\n├── databases\n\n│\
    \ ├── docker\n\n│ │ ├── cassandra\n\n│ │ │ └── docker-compose.yml\n\n│ │ ├── mongodb\n\
    \n│ │ │ └── docker-compose.yml\n\n│ │ ├── neo4j\n\n│ │ │ └── docker-compose.yml\n\
    \n│ │ ├── postgres\n\n4 [`flywaydb.org/documentation/usage/api/javadoc/org/flywaydb/core/api/`](https://flywaydb.org/documentation/usage/api/javadoc/org/flywaydb/core/api/migration/BaseJavaMigration)\n\
    [migration/BaseJavaMigration](https://flywaydb.org/documentation/usage/api/javadoc/org/flywaydb/core/api/migration/BaseJavaMigration)\n\
    \n第 6 章 版本控制或迁移变更\n\n│ │ │ └── docker-compose.yml\n\n│ │ └── redis\n\n│ │ ├──\
