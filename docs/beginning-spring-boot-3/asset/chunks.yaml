    在使用数据库时，你需要先通过信息对其进行初始化，然后再运行所有测试来解决这个问题。以下是几种策略。


    • 使用像 Flyway 或 Liquibase 这样的数据库迁移工具，但并非在所有情况下都适用。这些工具用于向数据库中填充信息。如果你使用它们来创建表结构，则需要寻找另一种工具，例如
    DBUnit。12


    • 数据库容器提供了一种方法，可以包含一个脚本来填充所有数据库。


    public static PostgreSQLContainer postgreSQL =


    new PostgreSQLContainer<>("postgres:14")


    .withUsername("postgres")


    .withPassword("postgres")


    .withInitScript("db/migration/V1.0__init_


    database.sql") //初始化脚本的 URL


    .withDatabaseName("catalog");


    12 [`www.dbunit.org/`](https://www.dbunit.org/)


    第 12 章 单元测试与集成测试


    • 另一种策略是创建一个自定义镜像，并将所有信息预加载到 Docker 仓库中。这种类型镜像的主要问题在于，需要负责维护该自定义镜像中更新的结构和信息。不过，这种方法有助于重现关键错误或异常情况。


    public static PostgreSQLContainer postgreSQL =


    new PostgreSQLContainer<>("custom-postgres:1.0.0")


    .withUsername("postgres")


    .withPassword("postgres");


    • 最后一种策略是在容器启动后，在容器内部执行命令。这种策略对于像 LocalStack 这样模拟基础设施的容器可能很有用。


    **潜在问题**


    Testcontainers 并非能解决所有问题的银弹，但它能帮助你检测查询中的问题。


    另一方面，它也引入了其他需要考虑的问题。


    每次启动容器时，测试的执行时间都会增加。不同数据库的时间差异很大；例如，Cassandra 数据库的启动时间比 MySQL 数据库要长。为了避免每个测试都创建新容器，在同一类的方法中重用容器至关重要。


    • 如果你使用固定端口并在流水线中运行测试（例如使用 Jenkins），则存在两个或多个应用程序使用相同端口从而导致端口冲突的风险。此外，如果某个应用程序发生异常且未停止容器，那么下次运行同一应用程序的流水线时，这些端口将不可用，并会出现异常。最佳解决方案是使用一种机制来为容器获取随机端口。


    Testcontainers 考虑到可能会发生此问题，因此默认提供随机端口，但你可以设置端口，并且在书籍或文章中出现的示例通常会设置端口。以下是一个定义了镜像端口的容器示例。


    第 12 章 单元测试与集成测试


    PostgreSQLContainer postgreSQL = new PostgreSQLContainer("postgres:14")


    .withDatabaseName("integration-tests-database")


    .withUsername("test")


    .withPassword("test")


    .withExposedPorts(5432); // 尽量不要设置此属性，因为默认情况下 Testcontainers 会使用随机端口来运行容器


    • 尽量在生产环境中使用相同的数据库版本。如果你在 AWS 上使用 ElasticSearch 等数据库的自定义版本，请使用 LocalStack，这是一个包含大多数
    AWS 服务以便在本地运行的容器。


    • 集成测试中存在大量重复代码来初始化容器。为了解决这个问题，你可以创建一个抽象类，定义应用程序运行所需的所有容器，并且所有测试都需要继承该类。


    • 测试中使用的所有镜像都会下载到机器上，因此你需要定期清理，以防止所有镜像占用大量空间。


    • 一个潜在的问题是存在多个不同数据库的连接，因此编写配置并不简单。为了解决这个问题，你可以创建一个 docker-compose 文件并执行，其中包含允许你同时运行多个容器的模块。


