    \                () -> assertEquals(\"ARS\", currency.get().getCode())\n     \
    \   );\n    }\n}\n```\n\nIf you execute the same test again, everything continues\
    \ working, but you have all the analysis information on the console. I recommend\
    \ saving the test execution output to a file so it’s simple to find the metrics.\n\
    \n## Chapter 13 Detecting Performance Issues\n\n[QUICK PERF] SQL ANALYSIS\n\n\
    * * * * *\n\nSQL EXECUTIONS: 1\n\nMAX TIME: 1 ms\n\n* * * * *\n\nSELECT: 1\n\n\
    * * * * *\n\nQUERY\n\nTime:1, Success:True, Type:Prepared, Batch:False, QuerySize:1,\
    \ BatchSize:0, Query:[\"\nselect\n    currency0_.id as id1_1_0_,\n    currency0_.created_on\
    \ as created_2_1_0_,\n    currency0_.updated_on as updated_3_1_0_,\n    currency0_.version\
    \ as version4_1_0_,\n    currency0_.code as code5_1_0_,\n    currency0_.decimal_places\
    \ as decimal_6_1_0_,\n    currency0_.description as descript7_1_0_,\n    currency0_.enabled\
    \ as enabled8_1_0_,\n    currency0_.symbol as symbol9_1_0_\nfrom\n    currency\
    \ currency0_\nwhere\n    currency0_.id=?\"], Params:[(1)]\n\nThere are many other\
    \ annotations that can assist your application’s operation in a database. Table\
    \ [13-1](#index_split_004.html#p317) lists some of the most relevant.\n\n## Chapter\
    \ 13 Detecting Performance Issues\n\n***Table 13-1.** Annotations*\n\n| Annotation\
    \ | Description |\n| --- | --- |\n| `@ProfileConnection` | exposes all the operations\
    \ that happen with the connection to the database |\n| `@ExpectSelect` | Checks\
    \ the number of queries of one type that executed |\n| `@ExpectInsert` | |\n|\
    \ `@ExpectDelete` | |\n| `@ExpectUpdate` | |\n| `@ExpectMaxSelect` | Checks if\
    \ the number of sentences executed is not up to a certain number |\n| `@ExpectMaxInsert`\
    \ | |\n| `@ExpectMaxDelete` | |\n| `@ExpectMaxUpdate` | |\n| `@ExpectMaxQueryExecutionTime`\
    \ | indicates how much time in milliseconds the query takes to be executed |\n\
    | `@ExpectSelectedColumn` | Checks the number of columns connected with the query\
    \ |\n| `@ExpectUpdateColumn` | |\n| `@DisableSameSelects` | Checks if the same\
    \ query executes two or more times |\n\nThis solution only works for the relational\
    \ database. You can check by analyzing if your service or the controller that\
    \ accesses the repository for a non-relational database has a problem using the\
    \ JVM annotation that offers QuickPerf. Some examples are `@MeasureHeapAllocation`\
    \ or `@HeapSize(value = 1, unit = AllocationUnit.GIGA_BYTE)`, which checks how\
    \ much memory space is used for a particular method.\n\n## Checking the Performance\
    \ of an Endpoint\n\nThe previous approach is the best alternative to check or\
    \ analyze blocks of code with a certain risk because they do several critical\
    \ operations. You could spend hours writing a test that verifies that everything\
    \ works fine. But you may not always have time to do it.\n\nAn alternative is\
    \ to create a performance test for the entire microservice or one endpoint providing\
    \ information for different requests, which could be executed simultaneously,\
    \ or increase the number of requests each second until you have the final number\
    \ of requests.\n\n![](index-318_1.png)\n\n## Chapter 13 Detecting Performance\
    \ Issues\n\nFollowing this principle of creating a performance test, there are\
    \ two tools, Gatling[10](#index_split_004.html#p318) and JMeter, [11](#index_split_004.html#p318)\
    \ that many developers use because they have a simple way to create the load test\
    \ for the application. You can create complex scenarios that invoke endpoints\
    \ in a certain sequence. Both tools are free to be used and have many articles\
    \ or videos that explain in detail the use of each of them. Gatling also offers\
    \ a paid option where you can create your scenarios and execute them using the\
    \ company's infrastructure."
