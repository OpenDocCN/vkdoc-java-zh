    type = PrimaryKeyType.CLUSTERED,


    ordering = Ordering.DESCENDING)


    private UUID id = Uuids.timeBased();


    @PrimaryKeyColumn(


    name = "code",


    type = PrimaryKeyType.PARTITIONED,


    ordering = Ordering.DESCENDING)


    private String code;


    @Column


    private String name;


