    为此，他创建了架构中的输入/输出概念，以表示与数据库或外部系统等外部资源的通信。


    这种架构的主要思想是创建所有业务逻辑，使其与应用程序工作方式无关的外部工具和技术相隔离。图 1-11 展示了六边形架构的不同元素，以及如何与数据库或其他应用程序等外部资源进行交互。


    ***图 1-11.** 包含最相关层的六边形架构*


    该架构将六边形分为两部分。一部分称为“驱动侧”，由参与者（如外部系统和 Web/移动系统）发起交互。另一部分称为“被驱动侧”，参与者在此接收请求，以从数据库或其他外部系统获取特定信息。


    **组件**


    六边形架构在结构的每个部分内部都有多个组件，但我只提及理解基本思想最相关的部分。


    • **基础设施** 包含负责使用不同协议与外部系统或数据库连接的端口和适配器。*端口*是与技术无关的接口，定义了访问应用程序或其他系统的方法。*适配器*是与特定技术相关的端口实现，例如对数据库的查询或
    REST 控制器。


    第 1 章 应用程序架构


    • **用例** 是系统的核心，因为它包含与各种场景及其关联方式相关的所有逻辑。根据作者的不同，该组件可能被称为*应用程序层*或*领域层*，并将用例与领域组件相结合。


    • **实体** 是应用程序的纯领域，包含应用程序组件中使用的所有值对象实体。


    **优势**


    这种结构具有以下优势。


    • 您可以毫无问题地更改或替换适配器。

    • 领域和用例是纯粹的，因此您可以理解业务逻辑。

    • 您可以为了测试目的更改端口的实现。


    **缺点**


    这种架构类型具有以下缺点。


    • 实现某些框架很困难，因为您可能会错误地判断什么是适配器/端口。

    • 引入间接性来查找每个端口的实现。

    • 没有指导方针解释有关项目组织的所有事项，因此任何人都可能引入错误。


