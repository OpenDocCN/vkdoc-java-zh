    **总结**


    本章讨论了在应用程序中使用事务的好处。但根据传播方式和隔离级别的不同，你可能会遇到相关问题。你必须根据业务需求为应用程序选择最佳方案。在某些情况下，脏读问题并不严重，但在其他上下文中则可能构成错误。


    **第 6 章**


    **版本控制或迁移**


    **变更**


    每个开发者在职业生涯中至少会遇到一次的主要问题之一，就是向数据库引入修改。数据库的变更总会带来问题，比如谁负责执行脚本，或者在不同环境中脚本保存在哪里——因为有些开发者会通过电子邮件或文件将脚本发送给数据库管理员来执行。一个常见的问题是，在部署需要这些变更的应用程序之前，如何确保所有数据库变更都已执行完毕？在大多数情况下，这需要有人手动检查一切是否正常。另一个可能的问题是，当出现问题时如何回滚数据库的变更。如果你发现代码有误或存在问题，可以通过手动回滚来撤销变更，即在数据库中执行一个新脚本，但这种解决方案可能会引入更多故障。


    本章将讨论一些工具和策略，以降低因变更引入问题的风险，并介绍如何将这些工具与 Spring Data 集成来执行变更。


    你还将学习如何实现功能开关，以降低在生产环境中部署可能失败的内容的风险，从而避免需要重新部署应用程序并撤销变更。


    **数据库中的版本控制变更**


    你已经简要了解了关系型数据库中与表结构或列变更相关的常见问题。大多数与变更相关的问题都可以通过多种方法缓解；例如，如果需要向表中添加新列，可以先允许该列接受空值，检查一切正常后再将其转换为非空列。如果变更简单且可以逐步执行，这类解决方案是可行的。但想象一下，如果变更涉及整个表结构的改动，或者需要添加与现有表存在约束关系的新表，这些场景就不那么容易引入变更了，因为某些环节可能会失败。最后，在应用程序的生命周期中，跟踪数据库模式的变更也很困难。如果没有变更记录，你就无法知道哪些变更影响了应用程序的性能。


    现在，数据库中的版本控制变更试图解决前文提到的大多数问题，它将数据库所经历的所有变更以可重现的方式共享出来，使任何人都能在任何环境中复现。其他好处包括创建脚本来引入数据加载或数据库结构修改的变更；当有人想在本地运行整个应用程序时，这一好处尤为实用。'
- fmt: '在[图 6-1](#index_split_002.html#p178)中，你可以看到数据库变更版本化的过程。


    ***图 6-1.** 在数据库中执行变更的过程*


    在幕后，后续章节讨论的大多数工具都采用相同的方式：在具有唯一标识名称结构的文件夹中存放一定数量的脚本。当你执行命令进行新变更的迁移时，工具会读取每个脚本，并检查这些变更是否已应用于数据库。为了检查脚本是否已执行，大多数工具会创建一个或多个表，其中包含与先前执行相关的所有信息，包括脚本名称以及其他对工具有用的信息。凭借这些信息，工具可以了解数据库的实际状态，并回滚到先前有效的状态。有效状态是指一个脚本中的所有变更都已执行完毕。这种方法类似于事务操作，因为工具必须时刻保持数据库的一致性。


    [图 6-2](#index_split_002.html#p179)展示了如何在数据库中保持变更一致性的方法示例。


    ***图 6-2.** 在不同环境中执行变更的过程*


    以下是使用这类工具时需要考虑的事项：


    - 所有代表迁移的脚本都需要用 SQL 编写，因为其理念是自动化数据库变更过程。在某些情况下，开发人员会在本地环境中通过手动修改来测试变更，因此学习一种新的元语言来执行此操作并非好主意。

    - 如果你在列的长度或类型上犯了错误，并且已经在环境中执行了变更，请创建一个新脚本来解决问题。切勿在脚本执行后对其进行修改，因为根据所使用的工具，这可能会导致异常。有些工具会使用校验和来判断已执行的文件是否相同或发生了更改；其他工具则会忽略更改，因为它们不会再次运行相同的脚本。

    - 为脚本名称定义一种易于理解的格式，例如`V1.0__create_database.sql`。

    - 生成一个包含所有相关变更的迁移文件，并尽量不将变更拆分到多个文件中。


    **实现版本化的库**


    大多数库与应用程序所使用的语言无关，因为它们提供了命令行界面，你可以通过它执行操作，例如引入修改或执行回滚。如果你想在 Spring Boot 应用程序之外使用它，一个好的做法是使用
    Docker 镜像运行，并挂载一个包含所有变更的卷；这种方法是一个不错的选择，因为你可以确保工具配置正确，并且不会遇到与本地机器相关的任何问题。


    对于变更版本化，并没有通用的方法，但大多数库建议将所有脚本纳入 Git 仓库，这样你不仅可以追踪数据库的变更，还可以追踪文件的变更。当你将脚本保存到应用程序的同一仓库中时，就实现了变更的版本化，并且如果遵循微服务原则（即一个应用程序只访问一个数据库模式），还可以为脚本赋予语义，指明哪个应用程序是信息的所有者。


    在生态系统中，有多种选择，例如 Liquibase[¹](#index_split_002.html#p180)、Flyway[²](#index_split_002.html#p180)
    以及其他本书未涵盖的工具，因为它们的用户较少，且与各种语言或框架集成的文档不够详尽。


    ¹ [https://www.liquibase.org/](https://www.liquibase.org/)

    ² [https://flywaydb.org/](https://flywaydb.org/)


    **Flyway**'
