    ## Summary


    This chapter overviewed Neo4j. This database is not a silver bullet that applies
    to all cases. In many situations, Neo4j is not the best option; a better idea
    would be to use a database like Redis or MongoDB. Explore your choices to determine
    the best database to solve your specific needs.


    ## Chapter 10


    ## Cassandra: Wide-Column Database


    The non-relational databases you have seen so far can have specific information
    replicas but imply that you configure a master node indicating the slaves. Another
    problem is how to replicate the information, which sometimes needs a certain knowledge
    about configuring it.


    This chapter explains how Cassandra offers you the ability to increase the number
    of nodes without the need to indicate which of them is the master, at least in
    Spring Data for Apache Cassandra[1](#index_split_003.html#p259) configuration.


    ### What Is Cassandra?


    Cassandra[2](https://cassandra.apache.org/_/index.html) is an open-source wide-column
    database created by Apache. Many developers use this database because it offers
    high performance for certain operations, the possibility of scaling horizontally,
    and a flexible schema like non-relational databases.


    The idea of Cassandra is to have a certain number of nodes where information is
    distributed using a partition key, which is like the primary key in a relational
    database so that you can have one row in one instance and another in a different
    node. Figure 10-1[3](#index_split_003.html#p260) illustrates this.


    1. [https://spring.io/projects/spring-data-cassandra](https://spring.io/projects/spring-data-cassandra)

    2. [https://cassandra.apache.org/_/index.html](https://cassandra.apache.org/_/index.html)


    © Andres Sacco 2023

    A. Sacco, *Beginning Spring Data*, [https://doi.org/10.1007/978-1-4842-8764-4_10](https://doi.org/10.1007/978-1-4842-8764-4_10#DOI)


    ![Figure 10-1. Node architecture in Cassandra](index-260_1.png)


    ### Figure 10-1. Node architecture in Cassandra


    The following are some of the main benefits of these databases.


    - **Highly scalable**: You add or remove nodes without downtime. Each new node
    reports to the other one that exists, so they register to distribute the information.

    - **High performance**: No central node or master takes the decision, and the
    other is replicated. In this database, all the nodes have the same role. Figure
    10-2[4](#index_split_003.html#p261) shows how information is distributed across
    different nodes.


    ![Figure 10-2. Distribution and replication of information](index-261_1.png)


    ### Figure 10-2. Distribution and replication of information


    - **High availability**: The information stored on one node is replicated on other
    nodes where you can indicate the factor or replication. Also, you can replicate
    the information across different regions or cloud providers.

    - **Expiration of the information**: The rows can have a TTL in the same way that
    Redis does; after that, the row disappears.

    - **Great for analytics**: This type of database is ideal for doing operations
    related to big data.


    **Note**: Remember that the non-relational databases do not cover everything in
    the CAP theorem[5](#index_split_003.html#p261) because it’s impossible to guarantee
    the three attributes at the same time, so you need to sacrifice one of them instead
    of the other one.


    It’s not within this book’s scope to explain the theorem as a little refresher
    of the concepts. Figure 10-3[6](#index_split_003.html#p262) illustrates the main
    idea.


    3. [https://www.ibm.com/cloud/learn/cap-theorem](https://www.ibm.com/cloud/learn/cap-theorem)


    ![Figure 10-3. CAP theorem](index-262_1.png)


    ### Figure 10-3. CAP theorem


    ### Structure


    Cassandra provides something similar to SQL, called CQL (Cassandra Query Language),
    to perform certain operations, such as inserting/updating/reading the information
    into the database. At some point, there are certain equivalences between relational
    databases.'
