    **Spring Data 是如何工作的？**


    第 [1 章](https://doi.org/10.1007/978-1-4842-8764-4_1)讨论了仓库模式，它提供了一种访问数据库并执行任何 CRUD
    操作的方式，但 Spring Data 在幕后做了什么呢？


    如何将查询结果转换为对象？如果你是第一次使用 Spring Data，并且读到某些接口提供了访问数据库的所有操作，你可能会觉得这很神奇。但事实是，Spring
    Data 在运行时动态创建了大量类，将接口转换为类。可以将这种方法视为一种代理，使用接口而不是直接访问数据库的类。


