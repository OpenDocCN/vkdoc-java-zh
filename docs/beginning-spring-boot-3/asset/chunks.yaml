    ## Appendix A Setting up Environment Tools


    This book used tools that are required to run all the examples. In this appendix,
    I show you how to install the most relevant of them, excluding the tools and databases
    you saw in the chapters.


    ### Installing Java


    `Java JDK` is the first thing you need to install before starting to try something.
    There are several JDK editions, but you must install version 17 in all cases.


    - **OracleJDK**: [1 T](#index_split_004.html#p347)his version was free until Java
    11. After this version, you can use it for development/test environments, but
    you need to pay a license to use it in production. This version of the JDK offers
    the most recent patches of bugs and new features because Oracle is the owner of
    the language.

    - **OpenJDK**: [2 W](#index_split_004.html#p347)hen Oracle bought Sun Microsystems
    created this as an open source alternative that all developers can use in any
    environment without restrictions. The main problem with this version is the patches
    of the bugs take time to appear in a case that is not critical.

    - **Others**: There are many other alternatives to JDK (e.g., AWS (Amazon Web
    Services) have `Amazon Corretto`[3](#index_split_004.html#p348) which extends
    from `OpenJDK` and optimizes the performance of the applications in the environments
    of this cloud provider.


    `OpenJDK` was used throughout this book, but you can choose any alternative.


    Depending on the operating system, there are many ways to install the JDK.


    For macOS and Linux, you can use `Homebrew`[4 a t](#index_split_004.html#p348)ool
    for installing/updating.


    ```

    ➜ ~ brew install openjdk

    ```


    Another possibility is to use `SDKMAN`[5](#index_split_004.html#p348) which is
    similar to `Homebrew` and has multiples versions and implementations of the JDK.


    ```

    ➜ ~ sdk install java 17.0.35-ms

    ```


    For Windows platforms, you have two possibilities. The first option is installing
    `SDKMAN` and running the same macOS/Linux command. The second option is to install
    `Adoptium`[6](#index_split_004.html#p348) which allows you to download the `OpenJDK`
    for various platforms. You can download a file MSI in Windows, making the installation
    easy.


    After installing the JDK, check if the version of Java is available on your system.
    To do this, type the following.


    ```

    ➜ ~ java –version

    openjdk 17.0.4 2022-07-19 LTS

    OpenJDK Runtime Environment Microsoft-38107 (build 17.0.4+8-LTS)

    OpenJDK 64-Bit Server VM Microsoft-38107 (build 17.0.4+8-LTS, mixed mode, sharing

    ```


    To execute all the examples, there are no limitations between which version of
    Java you need to have installed on your machine, but all the examples were written
    using `JDK 17`, the version required to use `Spring Boot 3.0`. Still, only a few
    developers use this version in production. According to `Snyk`[7](#index_split_004.html#p348),
    about 61% of developers use version 11 in production environments.


