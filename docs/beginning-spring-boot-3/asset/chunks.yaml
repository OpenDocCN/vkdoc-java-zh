    **第 1 章**


    **应用程序架构**


    持久化通常是任何语言中最重要的主题之一，因为它为消费或产生信息的应用程序提供了一种长期保存信息的方式。过去，当开发者创建单个大型应用程序时，问题往往集中出现在一个地方。也许大部分逻辑都存在于存储过程中，但当微服务出现并成为行业标准后，大多数应用都需要保存其信息。因此，与单体应用相比，该主题的重要性比以往任何时候都更加突出。此外，在从单体架构向微服务架构过渡期间，许多非关系型数据库成为解决特定问题的替代方案，例如为具有不同结构的已保存信息提供缓存机制。


    自 Java 问世以来，出现了多种访问信息的方式以及其他类型的架构。本章概述了数据库访问方式的演变及其优缺点。


    此外，您还将学习一些与关系型或非关系型数据库持久化相关的最重要的模式。


    **为什么持久化如此重要**


    持久化信息是微服务和应用程序最重要的方面之一。如果您在部署或重启时，或者系统发生故障时没有保存数据，您将丢失一切。


    但还有其他一些您需要考虑的因素，因为它们可能会影响整个平台的性能，增加延迟或错误。以下是与数据库不当使用或设计相关的一些问题。


