- fmt: '# Martin Fowler[32](#index_split_000.html#p53) first discussed the specification
    pattern a long time ago. Now it’s associated directly with the repository pattern,
    which is in Spring Data to filter the results of the table into a database.


    ## Other Patterns


    I covered the patterns most relevant to this book to better explain access to
    databases or transferring information between different layers. Other patterns
    solve particular problems, like filtering the results or saving historical data.


    ## Summary


    This chapter covered the evolution of persistence into Java databases using technologies
    like `JDBC`, which offer an essential way to access the information with the chance
    to introduce multiple problems in the execution of the SQL query. Once `JDBC`
    appeared, there were a lot of ways to access and execute queries in a database.
    The most relevant is `JPA`, specifications that all libraries can follow.


    Spring Data allows developers to make changes between relational and non-relational
    databases without introducing significant changes.


    You also learned about the types of architecture and the most common patterns
    associated with persistence.


    32 [https://martinfowler.com/apsupp/spec.pdf](https://martinfowler.com/apsupp/spec.pdf)


    # CHAPTER 2: Spring Basics and Beyond


    In Chapter [1](https://doi.org/10.1007/978-1-4842-8764-4_1), you read about ways
    to persist the information in databases. Spring Data is the only one that offers
    the possibility to use relational and non-relational databases.


    Before discussing how the framework works behind the scenes, you need to know
    how Spring Framework works. In this chapter, you learn how to create a small project,
    which you use throughout this book.


    According to the survey that Synk[1 do](#index_split_000.html#p54)es each year,
    Spring is used by 58% of developers because it offers the possibility to create
    an application without a lot of effort.


    Also, this framework offers a lot of integration with other tools like Vault,
    Kubernetes, Apache Kafka, and many more.


    **Note** This book does not cover all topics related to the Spring Framework and
    Spring Boot because many other Apress books do. The following is only a brief
    overview of the concepts.


    ## Spring Basics


    The first version of Spring was released in 2004, and after that, this framework
    grew in the number of developers that adopted it and the number of features/technologies
    that are supported. Nowadays, a big community of developers gives support to issues
    that each version of Spring has. There is an annual conference with the most important
    topic showing developers the latest features of the newest version.


    This framework offers a container that creates and manages the existing components.
    The way to define these components is using annotations or XML, which nowadays
    is not so popular when the components are defined. The Spring application context
    is the responsibility to manage the life cycle of each of them. Spring applies
    a pattern called dependency injection (DI), a technique in which an object receives
    other objects that it depends on. The status of the other object is managed by
    Spring without any intervention from the developer. Figure [2-1](#index_split_000.html#p55)
    shows how the different components in Spring interact between them.


    ***Figure 2-1.** Interaction between components*


    Spring is an ecosystem of modules that interact to provide functionality. This
    ecosystem contains the following elements.'
