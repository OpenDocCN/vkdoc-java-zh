    versions.


    Some developers use in-memory databases like H2 to perform specific tests. This


    approach works fine for certain conditions, but not all the databases have the
    same


    features, so you need to perform the test with the same database that your application


    uses in all environments.


    To summarize, one of the main problems with testing data access layers is how


    to perform a test *only* in a repository. The second one is how to test database
    access to allow you to execute your test multiple times without a problem. Throughout
    this


    chapter, you learn the solution to both problems. This book does not cover unit
    and


    integration testing in detail. For that, I encourage you to check out Martin Fowler’s


    website. [2](#index_split_003.html#p285)


    **Unit Testing with Mocks**


    One of the most used libraries to test a Java/Kotlin application is Junit, [3
    whic](#index_split_003.html#p285)h has many other libraries that add extra features,
    including Spring Boot Test, [4 whic](#index_split_003.html#p285)h uses the latest
    version of JUnit to do certain operations.


    **Note** There are other Java testing alternatives, such as Spock[5](#index_split_003.html#p285)
    or TestNG. [6](#index_split_003.html#p285)


    Let’s start creating a common unit test using JUnit to check the logic of your
    **save**


