    之前使用的 Repository 无需做任何更改，它们使用的是 **CrudRepository**，但需要修改为继承自 **MongoRepository<T,
    ID>**，后者在底层继承了 **PaginatingAndSorting<T, ID>** 和 **QueryByExampleExecutor<T>**
    7 b，并针对 Mongo 进行了某些改进。清单 8-6 展示了根据 MongoDB 对 Repository 所做的修改。


