    \nConsidering that the attribute that you declare as `@Id` is not a good practice\
    \ to modify the value after you persist the first time because you could have\
    \ problems with the cache mechanism that provides Spring Data and Hibernate behind\
    \ the scenes.\n\nAnother thing to consider is that `@Id` must have a value because\
    \ you set the value when you create the object, or you delegate the responsibility\
    \ to generate the value to the database using one of the key generators in the\
    \ next section.\n\n**Tip:** Define the `hashCode` and `equals` methods in all\
    \ your entities because it helps you to know if two instances of an entity are\
    \ identical, so refer to the same row of a table. If you don’t declare all the\
    \ comparisons between two or more instances of an entity, compare the position\
    \ in memory, which could be different. Each instance could have the same information.\n\
    \nWhen two objects have the same values and refer to the same row in a database,\
    \ it is known as database identity; instead, when two objects do not share the\
    \ same location in the memory but do not have the same values are known as object\
    \ identity.\n\n## Chapter 4: Persistence and Domain Model\n\nBefore continuing\
    \ with the rest of the explanation about the annotations related to the columns,\
    \ replicate the same logic of the previous chapter to expose an endpoint for obtaining\
    \ the information of one `Country`. If you prefer, you can check the folder in\
    \ the repository of Github to obtain the source code of the previous chapter and\
    \ add the new changes to this chapter.\n\n## Columns\n\nAfter you declare the\
    \ table’s name in your class, the next step is to declare the name and the type\
    \ of each table column that matches each class attribute. Also, you can define\
    \ each column’s length, minimum, and maximum and use these definitions to validate\
    \ if the values in one particular instance are valid or not to persist. And if\
    \ the column accepts null values or not.\n\nTo indicate the name, length, maximum,\
    \ and minimum, whether it supports null values or not, JPA offers the `@Column`\
    \ annotation, in which you can only use one type over each class attribute.\n\n\
    **Tip:** Is it necessary to include the `@Column` annotation in all the attributes?\
    \ The answer is no because JPA supposes that the name of the attribute and the\
    \ column in the database are the same. A good practice is defined in all cases,\
    \ including the annotation and defining the name if it allows null values, and\
    \ all the possible things you can use to validate the entity before persisting\
    \ it. Also, consider adding the string columns to the correct length of the attributes.\n\
    \nSome vendors of relational databases differentiate between words in lower cases\
    \ and uppercases, so a good practice is to try to indicate the name of the columns\
    \ in all cases.\n\nLet’s modify the previous entity to include the `@Column` annotation\
    \ and properties you can define inside (see Listing 4-6).\n\n**Listing 4-6.**\
    \ Definition of the Columns in the Entity\n\n```java\nimport jakarta.persistence.Column;\n\
    import jakarta.persistence.Entity;\nimport jakarta.persistence.Table;\nimport\
    \ jakarta.persistence.Id;\n\n@Entity //This indicates to JPA that it’s something\
    \ that has a\n        //persistent state\n@Table(name = \"country\") //This is\
    \ optionally\npublic class Country implements Serializable {\n    @Id\n    private\
    \ Long id;\n\n    @Column(name = \"code\", nullable = false, length = 4)\n   \
    \ private String code;\n\n    @Column(name = \"name\", nullable = false, length\
    \ = 30)\n    // ...\n}\n```"
