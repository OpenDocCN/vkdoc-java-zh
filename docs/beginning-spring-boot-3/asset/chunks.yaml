- fmt: "where it is relevant to use one instead the other.\n\n## Chapter 8 MongoDB:\
    \ Document Database\n\n**Table 8-5.** Main Differences Between Ways to Access\
    \ MongoDB\n\n| | **Pros** | **Cons** |\n|---|---|---|\n| `MongoTemplate` | You\
    \ can indicate which fields need to be updated instead of updating the entire\
    \ document. | It has a lot of code lines where most operations are simple. |\n\
    | | It provides the possibility to do all the operations of Mongo, like `updateFirst`\
    \ and `upsert`. | |\n| `MongoRepository<T, ID>` | It follows the same structure\
    \ of methods as Spring Data JPA, so you have predefined methods or create a new\
    \ one using the keywords. | It creates the operations and follows a standard,\
    \ so perhaps the operations could not be performant. |\n\nTo see this practically,\
    \ let’s create a custom repository, including `MongoTemplate`.\n\nListing 8-8\
    \ shows how to do the same operations as normal repositories.\n\n**Listing 8-8.**\
    \ Definition of Custom Repository Interface\n\n```\npackage com.apress.catalog.repository;\n\
    \nimport com.apress.catalog.model.Country;\nimport java.util.Optional;\n\npublic\
    \ interface CustomCountryRepository {\n    Country save(Country entity);\n   \
    \ Optional<Country> findById(Long id);\n    void deleteById(Long id);\n}\n```\n\
    \nAfter creating the repository’s interface, the next step is to create the implementation\
    \ that interacts with `MongoTemplate`. Listing 8-9 demonstrates this.\n\n**Listing\
    \ 8-9.** Implementation of a Custom Repository\n\n```\npackage com.apress.catalog.repository.impl;\n\
    \nimport com.apress.catalog.model.Country;\nimport com.apress.catalog.repository.CustomCountryRepository;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.data.domain.Example;\n\
    import org.springframework.data.mongodb.core.MongoTemplate;\nimport org.springframework.data.mongodb.core.query.Criteria;\n\
    import org.springframework.data.mongodb.core.query.Query;\nimport org.springframework.stereotype.Repository;\n\
    import java.util.Optional;\n\n@Repository\npublic class CustomCountryRepositoryImpl\
    \ implements CustomCountryRepository {\n    private final MongoTemplate mongoTemplate;\n\
    \n    @Autowired\n    public CustomCountryRepositoryImpl(MongoTemplate mongoTemplate)\
    \ {\n        this.mongoTemplate = mongoTemplate;\n    }\n\n    @Override\n   \
    \ public Country save(Country entity) {\n        return mongoTemplate.save(entity);\n\
    \    }\n\n    @Override\n    public Optional<Country> findById(Long id) {\n  \
    \      Country country = mongoTemplate.findById(id, Country.class);\n        return\
    \ Optional.of(country);\n    }\n\n    @Override\n    public void deleteById(Long\
    \ id) {\n        Query query = new Query();\n        query.addCriteria(Criteria.where(\"\
