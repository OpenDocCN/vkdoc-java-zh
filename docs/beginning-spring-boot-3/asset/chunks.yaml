    第 3 章 Spring Data 与不同类型的持久化


    **仓库**


    仓库是 Spring Data 用于与数据库交互的抽象，旨在减少应用程序中的代码量。如果你曾使用过某些旧框架或库来访问数据库，或许还记得那些与数据库交互并在同一层映射结果的
    DAO 类，其规模庞大且逻辑复杂，难以理解。但如果你查看清单 3-4 中的接口，会发现其中没有任何逻辑——只是一个继承自其他接口的接口。那么，幕后究竟发生了什么？


    Spring Data 提供了一系列仓库（均为可扩展的接口），用于指定实体及其 ID 类型。在运行时，框架会创建一个代理类，其中包含访问数据库所需的所有逻辑。在清单
    3-4 中，该仓库继承了 **CrudRepository<T, ID>** ,15，后者提供了一组用于在数据库中执行 CRUD 操作的方法。清单 3-9
    展示了该接口的部分操作。


    ***清单 3-9.*** CrudRepository 方法


    package org.springframework.data.repository;


    import java.util.Optional;


    @NoRepositoryBean


    public interface CrudRepository<T, ID> extends Repository<T, ID> {


    <S extends T> S save(S entity); // 保存或更新实体


    Optional<T> findById(ID primaryKey);


    Iterable<T> findAll();


    long count();


    void delete(T entity);


    boolean existsById(ID primaryKey);


    // ... 其他方法已省略。


    }


