- fmt: "\nSo you have a way to persist an entity and, after that, use it to put the\
    \ reference in the other one.\n\n- **`@ManyToMany`** is one of the most complex\
    \ relationships. If you have previously worked with databases, you know that this\
    \ type of relation implies creating an intermediate table that contains the primary\
    \ key of both tables. In the JPA world, these three tables become two entities,\
    \ and the specific implementation of JPA has the responsibility to understand\
    \ how the query and hide or abstract how it is implemented in the database.\n\n\
    For example, let’s transform the relationship between `Country` and `Currency`\
    \ into many-to-many so one country could have multiple currencies, and one currency\
    \ could have multiple countries associated with it. The database has a structure\
    \ similar to Figure [4-3](#index_split_002.html#p124), but in your catalog’s application,\
    \ there are only two entities: `Country` and `Currency`.\n\n***Figure 4-3.** A\
    \ hypothetical situation of transforming the relation in many-to-many*\n\nIn all\
    \ the types of relationships, you can indicate if you accept null values or not,\
    \ which is a way to say that the column in the database could or couldn’t have\
    \ a value. When you indicate this information in the relationship, it impacts\
    \ the query that Hibernate generates to obtain the information. For example, in\
    \ a **`@ManyToOne`** relation, if you allow null values, the query uses a **`LEFT\
    \ JOIN`** instead, which indicates the opposite query contains an **`INNER JOIN`**.\
    \ If you don’t indicate anything in the annotation, the column accepts null values.\n\
    \n**Note** in some cases, the relationship between the entities does not directly\
    \ correlate with the number of tables in the database; for example, if you have\
    \ a relationship with many-to-many between two entities could be transformed into\
    \ three tables. This “strange” situation has a simple explanation; JPA and most\
    \ of the implementation hide from the developer the details about the structure\
    \ of the database.\n\nThe scripts you run to populate the database in previous\
    \ chapters, the relationship between tables exists but is not mapping in the entities.\
    \ Now it’s the type to map the entities’ relationship, so let’s remove the `@Transient`\
    \ annotation in `Country` and include the **`@ManyToOne`** annotation, a variant\
    \ of one-to-many (see Listing [4-9](#index_split_002.html#p125)).\n\n***Listing\
    \ 4-9.*** Definition of the Relationship Between Two Entities\n\n```\nimport jakarta.persistence.Column;\n\
    import jakarta.persistence.Entity;\nimport jakarta.persistence.FetchType;\nimport\
    \ jakarta.persistence.JoinColumn;\nimport jakarta.persistence.ManyToOne;\nimport\
    \ jakarta.persistence.Table;\n\n@Entity\n@Table(name= \"country\")\npublic class\
    \ Country {\n    @ManyToOne\n    @JoinColumn(name = \"currency_id\", nullable\
    \ = false)\n    private Currency currency;\n\n    // Attributes, constructors,\
    \ setters, and getters for all the attributes\n    // Override the hashcode and\
    \ equals\n}\n```\n\nIt’s important to define the name of the column in the `Country`\
    \ table that acts as the foreign key to indicate to Spring Data how to match tables.\n\
    \nLet’s run the application and invoke the country endpoint using a particular\
    \ ID. If you didn’t create all the classes with the same logic as the `Currency`\
    \ entity to access the information, it’s time to do it. The best way to check\
    \ if everything works fine is to invoke the endpoint and check the response as\
    \ you can see on the Figure [4-4](#index_split_002.html#p126).\n\n***Figure 4-4.**\
    \ Result of invoking the country endpoint*\n\n**Lazy and Eager Loading**\n\nFigure\
    \ [4-4](#index_split_002.html#p126) shows that when you add the relationship between\
    \ two or more entities, the endpoint response gives all the information that could\
    \ not be necessary in all cases.\n\nImagine you want to check if a country exists\
    \ before sending the information to the database. So, you invoke a method that\
    \ receives the code and gives the countries this\n"
