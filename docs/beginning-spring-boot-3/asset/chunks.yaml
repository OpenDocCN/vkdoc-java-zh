    ## Appendix C: Opening a Project


    This book shows examples of projects which use different types of databases. You
    can create following the instructions in the chapters or download it from the
    official source code. You can follow the instructions in this appendix if you
    want to download and import it to your IDE.


    **Note** the IDE suggested for this book is `IntelliJ`, so all the instructions
    are related to this IDE.


    `JDK 17` or higher must be installed on your machine to run all the projects in
    this book. There is no restriction about which distribution you need to have.
    Appendix A has more information about the tools you need to install.


    Figure C-1 shows how to open a file or an existing project in `IntelliJ IDEA`.
    To select the project you want to open, choose **File** ➤ **Open**.


