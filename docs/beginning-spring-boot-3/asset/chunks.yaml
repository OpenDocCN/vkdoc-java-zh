    ## Appendix D: Install and Configure a Relational Database


    This appendix explains how to install `MySQL` and `PostgreSQL` databases in Parts
    I and II of this book. There is no restriction to using one database instead of
    another; this appendix shows the two most popular free databases. If you can use
    another one, you can do it because `Spring Data` supports at least all the existing
    relational databases.


    Each section finds the steps you need to execute to load a functional database
    with a good data set to use in your microservice.


    1. Install the database on your local machine.

    2. Install the client to access the database.

    3. In the client application, configure the connection with the database.

    4. Create the schema.

    5. Load the data.


    You can choose not to install the database and run it using `Docker`. See Appendix
    F for more information about how `Docker` works on each database.


    ### MySQL


    `MySQL` is a relational database that was published in 1994 by `Sun Microsystems`.
    The following are some of the features that make this database popular among developers.


    - It’s free to use.

    - Have a great performance with a considerable number of operations.


