- fmt: "# MongoDB: Document Database\n\n## Annotations\n\n- `@Id` - the attribute\
    \ that contains the identification of the collection\n- `@Transient` - ignores\
    \ a particular field for the process of persisting the information\n- `@IndexDirection`\
    \ - indicates which is the direction of the index: `Descending` or `Ascending`\n\
    - `@Field` - indicates the name of the attribute in the database explicitly, it’s\
    \ like the `@Column` in JPA\n- `@DBRef` - an annotation to connect multiple collections,\
    \ similar to `@OneToMany` or `@ManyToMany` in JPA\n\nIf you refer to another entity\
    \ using `@DBRef`, the changes to that object are not persisted in the database\
    \ because there is no possibility of having a cascade like in JPA.\n\nWith these\
    \ annotations in mind, I’ll introduce minor modifications to the `Country` entity\
    \ to not persist the entire currency information. Look at all the modifications\
    \ on the entity in Listing [8-5](#index_split_003.html#p234).\n\n***Listing 8-5.***\
    \ Definition of the Mongo Entity\n\n```java\nimport org.springframework.data.annotation.Id;\n\
    import org.springframework.data.mongodb.core.index.Indexed;\nimport org.springframework.data.mongodb.core.mapping.DBRef;\n\
    import org.springframework.data.mongodb.core.mapping.Document;\nimport org.springframework.data.mongodb.core.mapping.Field;\n\
    \nimport java.util.List;\n\n@Document(value = \"country\")\npublic class Country\
    \ implements Serializable {\n\n    @Id\n    private Long id;\n\n    @Indexed\n\
    \    @Field(value = \"code\")\n    private String code;\n\n    @DBRef\n    private\
    \ Currency currency;\n\n    // Other fields without changes\n}\n```\n\nWith this\
    \ simple modification, when you persist the information in the database, you see\
    \ `DBRef('currency', '2')`, which implies that the field has a reference with\
    \ another collection. To check if this happens, the best way to do it is using\
    \ the tools that appear in Appendix E.\n\n## Access Using Repositories\n\nDon’t\
    \ change anything from the previous repositories, which use `CrudRepository`,\
