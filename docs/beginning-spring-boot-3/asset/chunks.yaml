    \ package, which contains the following values.\n\n- `REQUIRED` means that methods\
    \ or classes use the same transaction and do not create a new one. But if the\
    \ first method is not transactional, Spring creates a new one. This value is the\
    \ default that takes Spring Framework.\n- `SUPPORTS` means that if there is a\
