    }


    **注意** 在 **@JoinColumn** 注解中，属性 **updatable** 和 **insertable** 设置为 false，表明修改关联实体并非该实体的职责。


    下一步需要修改 State 实体，使其包含 **updatable** 和 **insertable** 属性，并对 DTO 进行相同操作（参见清单 4-12）。


    ***清单 4-12.*** 添加双向关系


