    第 2 章 Spring 基础与进阶


    **注意** 本书的范围并未涵盖使用 Spring Boot 创建 REST API 的所有方面。因此，仅提供了创建应用程序的基本示例，以便让你有机会了解从
    REST 端点到数据库的完整流程。


    **最佳实践**


    在使用 Spring Boot 创建新应用程序时，最佳实践有助于开发者减少常见问题，例如确定可用的端点，或者应用程序在 IDE 中运行良好但在其他环境中表现不佳的原因。本节将讨论一些最佳实践。


    **防止依赖冲突**


    大多数开发者在项目中添加依赖时，并未考虑同一库的不同版本之间可能存在的冲突。像 Gradle 或 Maven 这样的依赖管理工具会使用特定策略来解决冲突。这种方法在大多数情况下都有效，直到你在某些环境中部署应用程序时出现错误；在构建或执行过程中，你可能会遇到诸如
    `ClassNotFoundException`、`NoClassDefNotFound` 或 `MethodNotSupportedException`
    之类的异常。


    要解决此类问题，或将应用程序的使用限制在特定版本的 JDK 或 Maven 上，你可以使用 Enforcer 插件，该插件在 Maven6 或 Gradle7
    中均受支持。与 Spring Boot 相关的依赖没有此问题，但如果你添加了其他依赖，则可能出现该问题，因此为防万一，请添加该插件。


