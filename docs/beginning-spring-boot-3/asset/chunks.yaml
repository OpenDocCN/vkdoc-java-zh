  trans: "\n因此，你有一种方法来持久化一个实体，然后使用它来将引用放入另一个实体中。\n\n• **@ManyToMany** 是最复杂的关系之一。如果你之前使用过数据库，你就会知道这种类型的关系意味着创建一个包含两个表主键的中间表。在\
    \ JPA 世界中，这三个表变成了两个实体，而 JPA 的具体实现负责理解查询方式，并隐藏或抽象其在数据库中的实现细节。\n\n例如，让我们将 Country\
    \ 和 Currency 之间的关系转换为多对多关系，这样一个国家可以有多种货币，一种货币也可以关联多个国家。数据库的结构类似于图 4-3，但在你的目录应用程序中，只有两个实体：Country\
    \ 和 Currency。\n\n***图 4-3.** 将关系转换为多对多关系的假设情况*\n\n在所有类型的关系中，你可以指明是否接受空值，这表示数据库中的列是否可以有一个值。当你在关系中指明此信息时，它会影响\
    \ Hibernate 为获取信息而生成的查询。例如，在一个 **@ManyToOne** 关系中，如果你允许空值，查询会使用 **LEFT JOIN**\
    \ 代替，这表示相反的查询包含一个 **INNER JOIN**。如果你在注解中未指明任何内容，则该列接受空值。\n\n**注意** 在某些情况下，实体之间的关系与数据库中的表数量并不直接相关；例如，如果你有两个实体之间的多对多关系，可能会转化为三个表。这种“奇怪”的情况有一个简单的解释：JPA\
    \ 及大多数实现向开发者隐藏了数据库结构的细节。\n\n在前几章中你运行以填充数据库的脚本中，表之间的关系是存在的，但并未在实体中进行映射。现在是时候映射实体关系了，因此让我们移除\
    \ Country 中的 @Transient 注解，并包含 **@ManyToOne** 注解，这是一对多关系的一种变体（参见代码清单 4-9）。\n\n\
    ***代码清单 4-9.** 两个实体之间关系的定义*\n\n```java\nimport jakarta.persistence.Column;\nimport\
    \ jakarta.persistence.Entity;\nimport jakarta.persistence.FetchType;\nimport jakarta.persistence.JoinColumn;\n\
    import jakarta.persistence.ManyToOne;\nimport jakarta.persistence.Table;\n\n@Entity\n\
    @Table(name= \"country\")\npublic class Country {\n\n    @ManyToOne\n    @JoinColumn(name\
    \ = \"currency_id\", nullable = false)\n    private Currency currency;\n\n   \
    \ // 所有属性的属性、构造方法、setter 和 getter 方法\n    // 重写 hashcode 和 equals 方法\n}\n```\n\
    \n![](img/index-126_1.png)\n\n定义 Country 表中作为外键的列名非常重要，以指示 Spring Data 如何匹配表。\n\
    \n让我们运行应用程序，并使用特定的 ID 调用 country 端点。如果你没有像 Currency 实体那样创建所有具有相同逻辑的类来访问信息，那么现在是时候这样做了。检查一切是否正常工作的最佳方法是调用端点并检查响应，如图\
    \ 4-4 所示。\n\n***图 4-4.** 调用 country 端点的结果*\n\n**懒加载与急加载**\n\n图 4-4 显示，当你添加两个或多个实体之间的关系时，端点响应会提供所有信息，而这些信息并非在所有情况下都是必需的。\n\
    \n想象一下，在将信息发送到数据库之前，你想检查一个国家是否存在。因此，你调用一个接收代码并返回国家信息的方法。\n"
- fmt: "`particular code`。你不需要检查与货币关系的任何内容，因此有必要将货币信息加载到内存中。\n\nJPA 提供了一种机制，可以在你需要之前减少内存中的数据量。实现方法是在表示两个实体之间关系的注解中添加一个`fetch`属性。该属性有两个可能的值。\n\
    \n- `FetchType.LAZY`：指示 JPA 实现，在有人调用属性的 get 方法之前，无需获取关系的信息。在幕后，Hibernate（在此例中）会在表示关系的属性中插入一个代理，该代理知道需要执行哪些查询来获取信息。这种方法在应用程序中占用更少的内存，并能更快地加载信息；另一方面，如果你总是需要获取关系的信息，执行操作的成本会增加，耗时也更长。\n\
    - `FetchType.EAGER`：指示 JPA 实现，在执行查询时必须获取所有其他实体的信息。使用这种方法，你可以减少初始化时间，因为当你在内存中拥有一个实体时，你就拥有了所有信息；另一方面，查询执行可能会花费更多时间，并对应用程序的性能产生负面影响。\n\
    \n这两种方法在性能方面各有利弊。标准做法是使用`FetchType.LAZY`来处理所有关系，以提高应用程序性能，并在需要时显式获取其他实体的信息。\n\n\
    让我们修改`Country`实体，以指示与货币的关系在执行查询时不需要加载所有信息（参见[清单 4-10](#index_split_002.html#p128)）。\n\
    \n**清单 4-10.** 加载信息的定义\n\n```java\nimport jakarta.persistence.Column;\nimport\
    \ jakarta.persistence.Entity;\nimport jakarta.persistence.FetchType;\nimport jakarta.persistence.JoinColumn;\n\
    import jakarta.persistence.ManyToOne;\nimport jakarta.persistence.Table;\n\n@Entity\n\
    @Table(name= \"country\")\npublic class Country implements Serializable {\n\n\
