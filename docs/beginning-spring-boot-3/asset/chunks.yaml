    **关于作者**


    **安德烈斯·萨科**自 2007 年起成为一名专业开发者，曾使用多种语言进行开发，包括 Java、Scala、PHP、Node.js 和 Kotlin。他的背景主要集中在
    Java 及其相关库或框架上，例如 Spring、JSF、iBATIS、Hibernate 和 Spring Data。他专注于研究新技术，以提升所开发应用程序的性能、稳定性和质量。


    2017 年，他开始探索优化应用程序间数据传输的新方法，以降低基础设施成本。他提出了一些适用于微服务的措施。这些措施实施后，成本降低了 55%。其中部分措施与数据库的不当使用直接相关。


