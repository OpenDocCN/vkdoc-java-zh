    ## JDBC


    `JDBC`, or Java Database Connectivity, provides a common interface to communicate
    and interact with other databases. More concretely, `JDBC` offers a way to connect
    with a database, create and execute statements like creating/dropping/truncating
    tables, and execute queries like `SELECT`/`INSERT`/`UPDATE`/`DELETE`. Figure [1-2
    sho](#index_split_000.html#p22)ws a brief overview of the different components
    that interact in the communication with a database using `JDBC`.


    ***Figure 1-2.** Structure of JDBC*


    Interacting with a database has a set of components or layers.


    - **JDBC API**: This layer contains all the interfaces that all the drivers need
    to implement to allow the Java developers to use them. This layer is one of the
    most important because you can change from one database to another without changing
    many things, only the driver of the other database and little changes in the type
    of columns.


    - **JDBC Driver Manager**: This set of classes acts as connectors between the
    drivers and the `JDBC API`, registering and deregistering the available databases,
    obtaining the connection with databases, and the information related to that connection.


    - **Drivers**: To make the connection between databases, `JDBC` hides all the
    logic related to the way to interact with one database in a series of drivers,
    each of which contains the logic for one database. Typically, the companies that
    develop these databases create the drivers for most languages.


    `JDBC` is not something that has not evolved since the first version in 1997.
    The subsequent versions try to add more features or solve problems connected with
    the performance (see Table [1-1](#index_split_000.html#p23)). Frameworks like
    Spring implement a version of `JDBC` with some of the features of that framework.


    ***Table 1-1.** Evolution of JDBC by Version*


    | Year | Version | Specification | JDK Version |

    |------|---------|--------------|-------------|

    |      | JDBC 4.3 | JSR 221 |             |

    |      | JDBC 4.2 | JSR 221 |             |

    |      | JDBC 4.1 | JSR 221 |             |

    |      | JDBC 4.0 | JSR 221[2](#index_split_000.html#p23) |             |

    |      | JDBC 3.0 | JSR 54[3](#index_split_000.html#p23) | 1.4         |

    |      | JDBC 2.1 |              | 1.2         |

    |      | JDBC 1.2 |              | 1.1         |


    This table shows the evolution of `JDBC` and the specifications that explain in
    detail which things introduce each version. Some of the first versions did not
    have concrete specifications.


    2 [https://www.jcp.org/en/jsr/detail?id=221](https://www.jcp.org/en/jsr/detail?id=221)

    3 [https://www.jcp.org/en/jsr/detail?id=54](https://www.jcp.org/en/jsr/detail?id=54)


    ![](index-24_1.png)


