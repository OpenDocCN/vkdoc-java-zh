    • **Amazon Neptune**:4 这是一个图数据库的自定义实现，可在 AWS 环境中运行。在该环境中，你需要为数据库消耗的内存/CPU 付费，并根据数据库接收的入站/出站流量支付一定费用。该数据库的主要特点是易于自动扩展，因为你将所有事务都委托给
    AWS，并且可以降低读取实例之间的加载延迟，以及在无需任何操作的情况下增加存储容量。


    本书使用 Neo4j，一个流行的图数据库。自早期版本以来，Spring Data 就为该数据库提供了广泛支持，从而降低了其使用复杂度。


    **什么是 Neo4j？**


    Neo4j 是一个图数据库，支持像关系数据库一样的 ACID 属性，你可以在不宕机或丢失信息风险的情况下扩展数据库。该数据库针对跨节点查询以获取特定信息进行了优化。它被用于那些通过
    GraphQL 暴露接口的应用程序中。5


    以下是其最相关的特性。


    • 无需进行连接（join）即可获取存储在另一个节点上的信息，因为它可以直接获取相连的邻近节点的信息。


    • 它提供了一个灵活且简单的数据模型，可以毫无问题地进行更改。


