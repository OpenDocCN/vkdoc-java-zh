- fmt: "# 排版后的内容\n\n`@Entity`和`@Table`，因为两者都能帮助 JPA 理解类中所有需要持久化到表中的属性。关于实体，另一个需要考虑的事项是重写`hashCode`和`equals`方法，以防止与对象内容发生冲突。\n\
    \n清单 4-4 展示了需要包含这两个注解的位置，以将一个简单的 Java 类转换为具有持久化状态的实体。\n\n**清单 4-4.** 表示表的实体定义\n\
    \n```java\n@Entity //此注解向 JPA 指示这是一个具有持久化状态的对象\n@Table(name = \"country\") //此注解是可选的\n\
    public class Country implements Serializable {\n    // 所有属性的属性、构造方法、setter 和 getter\n\
    \    // 重写 hashcode 和 equals\n}\n```\n\n当数据库中的表名大小写相同时，`@Table`注解中`name`的定义是可选的。在`@Entity`注解中，这不是可选的，因为这是\
    \ Spring Data 检测到该类包含需要持久化的信息的唯一方式。尽管如此，在所有情况下都指定表名是一个好习惯，因为如果你决定更改类名，应用程序可能无法正常工作。因此，通过定义表名，类名是无关的，你可以随意更改它。\n\
    \n此外，你可以定义包含该表的模式（schema），因为 JPA 中可以使用多个模式。最常见的用法是为整个表组只定义一个模式。\n\n```java\n@Table(name\
    \ = \"country\", schema = \"catalog\")\n```\n\n第 4 章 持久化与领域模型\n\n现在，按照第 2 章的说明运行应用程序，并检查如果在`Country`类中只定义`@Entity`和`@Table`而不添加其他内容会发生什么。\n\
    \n```\n2022-04-26 16:17:43.372 INFO 39331 --- [ restartedMain] o.apache.\ncatalina.core.StandardService\
