    **六边形架构**


    分层架构为开发者提供了一种创建应用程序并理解角色或职责分离的简单方式。2005 年，Alistar Cockburn23 提出了一种新的替代方案，该方案封装或保持所有与数据库或外部系统的外部通信无关。


