    以及 Cassandra 在信息组织方式上的异同。表 10-1 对此进行了说明。


    ***表 10-1.** 模型对应关系*


    **关系型模型 Cassandra 模型**


    数据库


    Keyspace


    表


    列族 (CF)


    主键


    行键


    列名


    列名/键


    列值


    列值


    这种对应关系并不意味着所有概念完全相同，而是一种便于建立思维导图的表示方式。下面逐一进行说明。


    第 10 章 Cassandra：宽列数据库


    • **Keyspace**：该结构包含表或列族，并指示数据库的复制因子。你可以指定跨数据中心或云提供商存在多少个信息副本。


    • **列族**：这是一种存储行和列的类型，具有特定数量的分区，这意味着表中的所有信息并非都存在于同一个节点上。信息可以分布在不同的复制节点上。


    • **行键**：该结构包含一个分区键或行键，所有行都必须包含此键，以确定信息存储在哪个节点上。


    • **列名/键**：作为辅助键，可用于某些特定操作。


    • **列**：存储特定信息的单个列。


    **配置**


    在本节中，你将了解如何使用 Cassandra 配置之前的 api-catalog，但会省略数据库安装和配置的所有细节（你可以在附录 E 中查看这些内容）。


    在按建议修改微服务之前，请移除所有与 Spring JPA 相关的依赖项和注解，包括 DB 文件夹中的脚本。


