    bug，并了解是否需要修改源代码以确保一切按计划运行。


    **注意** 学习测试的最佳资源之一是 Martin Fowler 的博客 1，其中涉及 BDD、不同类型的测试以及良好实践等主题。


    说实话，许多开发者不喜欢编写测试来覆盖基本场景。在这种情况下，花费大量时间测试访问数据库的层（在 Spring Data 中，大多数情况下是一个包含表示自定义查询方法的接口）意义不大。这种方法的主要问题在于，你可能会在环境或集成测试中发现查询的问题，而这些测试并不仅仅覆盖数据库访问，例如，我们目录应用程序的端点在保存信息前后会发生变化，因此你可以检查服务层的逻辑是否正常工作。但你无法检查仓库中的一切是否正常。


