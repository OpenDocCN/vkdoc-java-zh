    再次强调，微服务运行一切正常，没有任何问题。你可以在 IDE 中运行该应用程序，或执行**./mvnw spring-boot:run**命令。


    列表项 4-5 展示了带有@Id 注解的 Country 实体。


    ***列表项 4-5.*** 添加表 ID


    @Entity //这向 JPA 表明它是一个具有持久化状态的对象


    @Table(name = "country") //这是可选的


    public class Country implements Serializable {


    @Id


    private Long id;


    *// 所有属性的属性、构造方法、setter 和 getter 方法*


    *// 重写 hashcode 和 equals 方法*


    }


    考虑到你声明为**@Id**的属性，在首次持久化后修改其值并非良好实践，因为这可能导致 Spring Data 和 Hibernate 在后台提供的缓存机制出现问题。


    另一个需要考虑的问题是，**@Id**必须有一个值，你可以在创建对象时设置该值，或者将生成值的责任委托给数据库，使用下一节中介绍的某个键生成器。


    **提示** 在所有实体中定义 hashCode 和 equals 方法，因为这有助于判断两个实体实例是否相同，即它们是否指向数据库表中的同一行。如果你不声明这些方法，那么两个或多个实体实例之间的比较将基于内存中的位置，而内存位置可能不同，即使每个实例包含相同的信息。


    当两个对象具有相同的值且指向数据库中的同一行时，这被称为数据库标识；相反，当两个对象在内存中不共享相同位置但值不同时，这被称为对象标识。


    第 4 章 持久化与领域模型


    在继续解释与列相关的注解之前，请复制上一章的逻辑，公开一个端点以获取一个**Country**的信息。如果你愿意，可以查看 GitHub 仓库中的文件夹以获取上一章的源代码，并将新更改添加到此章中。


    **列**


    在类中声明表名之后，下一步是声明与每个类属性匹配的每个表列的名称和类型。此外，你可以定义每个列的长度、最小值和最大值，并使用这些定义来验证特定实例中的值是否有效以进行持久化，以及该列是否允许空值。


    为了指示名称、长度、最大值和最小值，以及是否支持空值，JPA 提供了@Column 注解，你可以在每个类属性上仅使用一种类型。


    **提示** 是否需要在所有属性中包含**@Column**注解？答案是否定的，因为 JPA 假设属性名称与数据库中的列名称相同。最佳实践是在所有情况下都进行定义，包括注解、定义名称（如果允许空值），以及所有可用于在持久化之前验证实体的可能内容。此外，考虑将字符串列添加到属性的正确长度。


    某些关系数据库供应商区分小写和大写单词，因此最佳实践是尝试在所有情况下指示列的名称。


    让我们修改之前的实体，以包含@Column 注解及其内部可定义的属性（参见列表项 4-6）。


