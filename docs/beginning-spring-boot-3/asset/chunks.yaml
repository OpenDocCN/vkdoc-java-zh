- fmt: '# 文档存储数据库


    添加或移除属性只会影响部分文档，而不会影响整个数据库。这是相较于关系型数据库的一个优势。


    这两个例子是最具代表性的。尽管如此，许多公司仍将文档存储数据库作为保存信息的主要机制，以取代关系型数据库。


    ## 实现方案


    这类数据库有多种实现方案。其中一些已经非常稳定，并被全球众多开发者使用。让我们来看看它们。


    - **MongoDB**[^1] 文档完善，被全球众多开发者使用。最新版本提供了多种方式来优化查询、索引、分片、复制以及跨集群实例的负载均衡。此外，它还允许你在执行查询时进行`map`归约和聚合，从而减少需要在应用程序中编写的代码量。最后，该数据库支持多种语言，如`Java`、`PHP`、`Go`、`Python`和`.NET`，因此如果数据库的某个版本出现问题，很多开发者会报告它，维护人员会找到解决方案。最后要提的一点是，`MongoDB`使用一种称为`BSON`的特殊方式来存储信息，它类似于`JSON`，但有所改进。


    - **Amazon DocumentDB**[^2] 类似于`MongoDB`的一个分支，针对`AWS`进行了优化，但该数据库中的某些功能无法使用；例如，`BigDecimal`精度尚不支持，你需要将数字持久化为字符串。该数据库的主要优势在于性能、在可用区中拥有多个实例的能力，以及与监控相关的所有功能。


    - **Azure Cosmos DB**[^3] 是多种类型的组合，而不仅仅是文档存储。你可以用它来保存关系型数据库、宽列数据库或类似`MongoDB`的文档存储数据库中的信息。该数据库针对在`Azure`中使用进行了优化，因此具有与`Amazon
    DocumentDB`类似的功能，也存在相同的问题。并非所有数据库功能都可用，因此在选择数据库之前需要考虑这一点。


    - **Couchbase**[^4] 与`MongoDB`非常相似。不过，你可以向引擎指示启用或禁用哪些功能，例如索引、搜索和分析，以优化操作的执行。该数据库中的信息以`JSON`格式存储（而非`MongoDB`中的`BSON`），这限制了你可以执行的一些操作。


    以上是文档存储数据库的一些可用选项。本书使用`MongoDB`，根据`StackOverflow`的一份报告，27%的开发者使用它[^5]。它是最常用的非关系型数据库。此外，`Spring
    Data`从早期版本开始就对`MongoDB`提供了强大的支持，降低了使用的复杂性。


    ## 什么是 MongoDB？


    `MongoDB`是最流行的非关系型数据库之一，它使用类似`BJSON`的格式来存储信息。`BJSON`是一组键/值元素，类似于`JSON`，但其表示方式与键/值数据库无关；在文档存储中，你可以保存复杂的文档并创建不同的查询。


