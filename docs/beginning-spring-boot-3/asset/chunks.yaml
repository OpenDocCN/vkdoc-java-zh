- fmt: '# Repository Interfaces


    `repository` interfaces support performing specific operations not covered by
    the Spring Data framework. These repositories are available in almost all implementations
    to access databases, reducing the complexity of using multiple databases in the
    same application.


    There are basic repositories that you use to extend the functionality of your
    repositories. In particular, two are most relevant. `CrudRepository` has the basic
    operations for all the entities. `PagingAndSortingRepository` contains all the
    logic to obtain the information of one structure in a database using the criteria
    of pagination and sorting.


    Figure [1-8](#index_split_000.html#p37) illustrates that Spring Data supports
    MongoDB, Redis, Neo4j, Cassandra, and all the relational databases. Others, like
    ElasticSearch[20](#index_split_000.html#p36) and Couchbase,[21](#index_split_000.html#p36)
    are not covered in this book because they have a similar structure for saving
    information.


    20 [https://www.elastic.co/](https://www.elastic.co/)


    21 [https://www.couchbase.com/](https://www.couchbase.com/)


    ![](index-37_1.png)


    **Figure 1-8.** The structure of repositories depends on the database


    **Note:** In some databases, Spring Data provides a way to allocate and translate
    exceptions in a database using templates used behind the scenes for the repositories
    or DAO to do certain operations like insert or retrieve information. Spring Data
    JPA is excluded from the use of templates because it’s an abstraction to access
    all the RDBMS databases.


    You can think of these templates to create custom repositories outside the basics
    that Spring Data provides. For example, you can introduce security or a compression
    mechanism in Redis before inserting or retrieving the information.


    ## Object Mapping


    One of the most significant advantages that JPA offers developers is the possibility
    to map a table with a particular class considering all the possible types of columns
    and the relationship between tables. Spring Data extends this approach to all
    NoSQL databases. Each type of database offers its annotations to represent the
    information to map databases with Java classes. Table [1-4](#index_split_000.html#p38)
    shows that each object could be represented in other databases without significant
    changes in the fields’ names and types. You only need to change the annotations
    related to each database.


    **Table 1-4.** Declaring Entities in Various Databases


    | **JPA** | **MongoDB** | **Neo4j** |

    |---------|-------------|-----------|

    | `@Entity`<br>`@Table(name = "currency")`<br>public class Currency {<br>&nbsp;&nbsp;`@Id`<br>&nbsp;&nbsp;`@GeneratedValue(strategy
    = GenerationType.SEQUENCE)`<br>&nbsp;&nbsp;private Long id;<br>&nbsp;&nbsp;`@Column(name
    = "decimal_places", length = 5)`<br>&nbsp;&nbsp;private String decimalPlaces;<br>&nbsp;&nbsp;//Other
    attributes and set/get<br>} | `@Document(collection="currency")`<br>public class
    Currency {<br>&nbsp;&nbsp;`@Id`<br>&nbsp;&nbsp;private String id;<br>&nbsp;&nbsp;`@Field("decimal_places")`<br>&nbsp;&nbsp;private
    String decimalPlaces;<br>&nbsp;&nbsp;//Other attributes and set/get<br>} | `@NodeEntity`<br>public
    class Currency {<br>&nbsp;&nbsp;`@GraphId`<br>&nbsp;&nbsp;private Long id;<br>&nbsp;&nbsp;private
    String decimalPlaces;<br>&nbsp;&nbsp;//Other attributes and set/get<br>} |


    JPA and Spring Data support mapping relationships between an object that could
    be stored in another object (table, document, node). The annotations in Table
    [1-5](#index_split_000.html#p39) tell Spring Data about the relationships among
    these objects and how to retrieve information.


    **Table 1-5.** Declaring Relationships Among Objects in a Database


    | **JPA** | **MongoDB** | **Neo4j** |

    |---------|-------------|-----------|

    | `@Entity`<br>`@Table(name = "country")`<br>public class Country {<br>&nbsp;&nbsp;`@Id`<br>&nbsp;&nbsp;`@GeneratedValue(strategy
    = GenerationType.SEQUENCE)`<br>&nbsp;&nbsp;private Long id;<br>&nbsp;&nbsp;`@OneToMany`<br>&nbsp;&nbsp;private
    List<Currency> currencies;<br>&nbsp;&nbsp;//Other attributes and set/get<br>}
    | `@Document(collection="country")`<br>public class Country {<br>&nbsp;&nbsp;`@Id`<br>&nbsp;&nbsp;private
    String id;<br>&nbsp;&nbsp;private List<Currency> currencies;<br>&nbsp;&nbsp;//Other
    attributes and set/get<br>} | `@NodeEntity`<br>public class Country {<br>&nbsp;&nbsp;`@GraphId`<br>&nbsp;&nbsp;private
    Long id;<br>&nbsp;&nbsp;`@RelatedTo(type = "has", direction = Direction.OUTGOING)`<br>&nbsp;&nbsp;private
    List<Currency> currencies;<br>&nbsp;&nbsp;//Other attributes and set/get<br>}
    |'
