  trans: "\n依赖项是 Caffeine。1 I 它在缓存中保存和检索信息方面表现出色。按照清单 14-7 所示的方式，在 `pom` 文件中添加与缓存相关的依赖项。\n\
    \n***清单 14-7.*** 缓存依赖项\n\n<dependency>\n\n<groupId>org.springframework.boot</groupId>\n\
    \n<artifactId>spring-boot-starter-cache</artifactId>\n\n</dependency>\n\n<dependency>\n\
    \n<groupId>com.github.ben-manes.caffeine</groupId>\n\n<artifactId>caffeine</artifactId>\n\
    \n</dependency>\n\n1 [`github.com/ben-manes/caffeine`](https://github.com/ben-manes/caffeine)\n\
    \n第 14 章 最佳实践\n\n下一步是添加带有名称的 `@Cacheable` 注解，并指定何时保存信息。以 `api-catalog` 应用程序为例，一种可行的方法是在\
    \ Service 层中包含该注解，如清单 14-8 所示。\n\n***清单 14-8.*** Service 层修改\n\n// 之前的导入\n**import\
    \ org.springframework.cache.annotation.Cacheable;**\n\n@Service\npublic class\
    \ CountryService {\n\n    *// 该注解会在调用实际实现之前，从缓存 CATALOG_COUNTRY 中获取信息*\n    *//\
    \ 如果信息不存在，则尝试获取信息并保存，除非结果为空*\n    **@Cacheable(cacheNames = \"CATALOG_COUNTRY\"\
    , unless = \"#result == null\")**\n    @Transactional(readOnly = true)\n    public\
    \ CountryDTO getById(Long id) {\n        // 之前的源代码\n    }\n}\n\n你可以使用注解来存储信息。然而，这种方法存在一些问题；例如，你可能会无限期地存储大量值，这意味着你的应用程序会占用大量内存。最佳做法是创建一个配置来限制元素的数量以及应用程序存储信息的时间。\n\
    \n考虑将缓存添加到 Service 层，而不是 Repository 层，因为你的 Repository 层没有自定义方法。要在 Repository 层中使用缓存，你必须重新声明所有方法，并使用\
    \ **@Cacheable** 注解。\n\n让我们通过添加逻辑来使缓存中的内容过期，从而改进之前的示例。对 **application.yml** 的修改意味着你可以为每种类型的元素进行细粒度配置，在清单\
    \ 14-8 中，这种元素是 **Country**。不过，你可能还有其他获取城市信息的方法。你需要一种方法来区分这两个缓存。\n\n第 14 章 最佳实践\n\
    \n***清单 14-8.*** 缓存配置\n\ncache:\n  configuration:\n    CATALOG_COUNTRY:\n    \
    \  refreshAfterWriteTime: 1 # 信息在需要刷新前存在的分钟数\n      expireAfterWriteTime: 1 #\
    \ 分钟\n      maxSize: 180 # 内存中保存的元素数量\n\n下一步是创建一个映射所有配置的类，这个类是一个 Map，旨在成为可扩展的解决方案（参见清单\
    \ 14-9）。\n\n***清单 14-9.*** 加载配置的类\n\npublic class CacheSettings {\n\n    private\
    \ Integer refreshAfterWriteTime;\n    private Integer expireAfterWriteTime;\n\
    \    private Integer maxSize;\n\n    private static final Integer DEFAULT_REFRESH_AFTER\
    \ = 10;\n    private static final Integer DEFAULT_EXPIRE_AFTER = 15;\n    private\
    \ static final Integer DEFAULT_MAX_SIZE = 180;\n\n    public static final CacheSettings\
    \ DEFAULT_CACHE_SETTINGS = new\n        CacheSettings(DEFAULT_REFRESH_AFTER,\n\
    \                      DEFAULT_EXPIRE_AFTER, DEFAULT_MAX_SIZE);\n\n    public\
    \ CacheSettings() {\n    }\n\n    public CacheSettings(Integer refreshAfterWriteTime,\
    \ Integer\n                         expireAfterWriteTime, Integer maxSize) {\n\
    \        this.refreshAfterWriteTime = refreshAfterWriteTime;\n        this.expireAfterWriteTime\
    \ = expireAfterWriteTime;\n        this.maxSize = maxSize;\n    }\n\n    // 定义\
    \ setter 和 getter 方法\n}\n\n第 14 章 最佳实践\n\n你需要一个类来将配置加载到 Spring 上下文中的 **application.yml**\
    \ 里。为此，创建一个名为 `CacheConfiguration` 的类，该类按照清单 14-10 所示的方式加载 \"cache\" 节点的配置。\n\n\
    ***清单 14-10.*** 加载配置\n"
