    \ is transactional invokes another one, so the second method is executed in which\
    \ transaction (see Listing 5-6).\n\n**Listing 5-6.** An Example of Setting Propagation\
    \ Level\n\n```\n@Transactional(readOnly = true, propagation = Propagation.MANDATORY)\n\
    public CountryDTO getById(Long id) {\n    // All the logic of the method\n}\n\
