- fmt: "# EJB 版本演进\n\n- 引入了部署描述符（XML），取代了包含所有元数据的类\n\n**2001 - EJB 2.0**  \n- 引入了与\
    \ CORBA 及其他 Java API 的兼容性  \n- 同一 J2EE 容器中的客户端可通过本地接口访问其他 EJB  \n- 出现了 JavaBeans\
    \ 查询语言，使开发者能够执行 SQL 查询\n\n**2003 - EJB 2.1**  \n- 增加了使用 SOAP 创建 Web 服务的支持  \n\
    - 引入了定时服务，可通过 cron 定期调用某些服务  \n- 在 EJB 查询中增加了对 `ORDER BY`、`AVG`、`MIN`、`MAX`、`SUM`\
    \ 和 `COUNT` 操作的支持\n\n**2006 - EJB 3.0**  \n- 出现了 POJO（Plain Old Java Objects）作为\
    \ EJB Bean 类的替代  \n- 重写了大部分代码，使用注解替代大型配置文件  \n- 远程和本地接口不再必须实现  \n- JPA 实体从 EJB\
    \ 容器中解耦，可独立使用\n\n**2009 - EJB 3.1**  \n- EJB Lite 可在同一 VM 中运行多个组件，作为 EJB 客户端\n\
    \n**2013 - EJB 3.2**  \n- 引入了 `AutoCloseable` 接口  \n- 增加了对生命周期拦截器方法事务性的更多控制\n\n\
    **2020 - EJB 4.0**  \n- 弃用了 `EJBContext.getEnvironment()` 方法  \n- 移除了依赖 JAX-RPC\
    \ 的方法  \n- 大部分 `javax.ejb` 包中的内容迁移至 `jakarta.ejb`\n\n参考链接：\n- [https://www.jcp.org/en/jsr/detail?id=19](https://www.jcp.org/en/jsr/detail?id=19)\n\
    - [https://www.jcp.org/en/jsr/detail?id=153](https://www.jcp.org/en/jsr/detail?id=153)\n\
    - [https://www.jcp.org/en/jsr/detail?id=220](https://www.jcp.org/en/jsr/detail?id=220)\n\
    - [https://www.jcp.org/en/jsr/detail?id=318](https://www.jcp.org/en/jsr/detail?id=318)\n\
    - [https://www.jcp.org/en/jsr/detail?id=345](https://www.jcp.org/en/jsr/detail?id=345)\n\
    - [https://jakarta.ee/specifications/enterprise-beans/4.0/](https://jakarta.ee/specifications/enterprise-beans/4.0/)\n\
    \n---\n\n# 第 1 章 应用程序架构\n\n## EJB 类型\n\nEJB 架构包含三个主要组件：EJB 容器、应用服务器和 Enterprise\
    \ JavaBeans（EJB），后者又分为多种类型。\n\n- **会话 Bean（Session Beans）**：这些组件包含与用户任务或用例相关的所有逻辑。会话\
    \ Bean 在任务或用例执行期间（如同一次对话）可用。但如果服务器崩溃或重启，会话 Bean 中保存的所有信息将丢失。\n\n  会话 Bean 分为两种类型：有状态（Stateful）和无状态（Stateless）。主要区别在于：有状态\
    \ Bean 在调用后会保存状态，而无状态 Bean 在调用后不保存任何信息。\n\n- **消息驱动 Bean（Message-Driven Beans）**：当需要同步通信时，前述\
    \ Bean 工作良好；但如果需要异步通信，消息驱动 Bean 是正确选择。最常见的实现使用 JMS（Java Message Service）[14]。这种类型的\
    \ EJB 作为队列主题中的监听器，等待消息并在消息到达时执行相应操作。这种通信方式在微服务出现后变得流行。\n\n- **实体（Entities）**：该组件包含表示数据库表的类，并提供\
    \ CRUD（创建、读取、更新、删除）操作的接口。EJB 3.0 引入了变更，使用 JPA 替代了之前作为 EJB 规范一部分的实体 Bean。\n\n图\
    \ 1-6 展示了构成 EJB 的各组件之间的交互。\n\n参考链接：\n- [https://docs.oracle.com/cd/B19306_01/server.102/b14257/jm_create.htm](https://docs.oracle.com/cd/B19306_01/server.102/b14257/jm_create.htm)\n\
    \n![图 1-6](index-33_1.png)\n\n**图 1-6.** EJB 组件及其与 JPA 的交互方式\n\n## JPA"
