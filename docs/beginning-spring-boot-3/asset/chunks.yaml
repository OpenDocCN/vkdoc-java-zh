- fmt: '# Appendix D: Install and Configure a Relational Database


    ## Step 3: Configure the Connection


    After installing the database and the client accesses it, the next step is to
    open `pgAdmin` and log in using the credentials you defined in step 2 (see Figure
    D-8).


    ***Figure D-8.** Login webpage*


    Figure D-9 shows the `pgAdmin` dashboard. Click the icon to add a new connection.


    ***Figure D-9.** Add a new server*


    Next, you see the window with all the information related to the database, such
    as username/password, the hostname (`localhost` or `127.0.0.1`), the port (`5432`),
    and the connection name, which could be anything because there are no restrictions
    with the name.


    ***Figure D-10.** Connection configuration*


    If everything is okay, click the **Save** button. You create the schema in the
    next step.


    ## Step 4: Create the Schema


    When you connect to a server created in `pgAdmin` (see Figure D-11), left-click
    the server, select **Create** in the menu, and then select the **Database** option.


    ***Figure D-11.** Create a new database*


    The next step is to complete the window shown in Figure D-12 and save the changes.


    ***Figure D-12.** Window to create a new database*


    ## Step 5: Load the Data


    The last step of this process is to create the schema structure and populate it
    with the information you used in the chapters on relational databases. Inside
    the source code folder are several files. You execute each of them by version
    number, so the first script to execute is `V1.0_init_database.sql`.


    Finally, you need to double-click the **Schemas** section in the database that
    you created and click the database icon to open the connection to execute queries.
    After that, you need to copy and paste the content of each file into the query
    editor and press the **Play** button to execute the queries. You need to repeat
    this process with each file in the `scripts` folder.


    ***Figure D-13.** Window to create a new database*


    ## Databases Using Docker


    Many developers don’t want to install databases on their machines because they
    consume resources and are not always used. For example, to do the exercises in
    this book, you must have a database running on your machine. After you complete
    the book, you won’t want to use MySQL or PostgreSQL any longer. Use Docker for
    a database that runs easily.


    You must check the Docker Hub site for a particular version of MySQL[9](#index_split_004.html#p385)
    or PostgreSQL[10](#index_split_004.html#p385). I recommend that you not use the
    latest version but instead the last version that exists in Docker Hub.


    ***Figure D-14.** Docker Hub’s webpage*


    When you decide which database you want to run, the next step is downloading the
    image to use locally.


    ```

    asacco@asacco:~/$ docker pull mysql/mysql-server: 8.0.30

    8.0.30: Pulling from mysql/mysql-server

    221c7ea50c9e: Pull complete

    d32a20f3a6af: Pull complete

    28749a63c815: Pull complete

    3cdab959ca41: Pull complete

    30ceffa70af4: Pull complete

    e4b028b699c1: Pull complete

    3abed4e8adad: Pull complete

    Digest: sha256:6fca505a0d41c7198b577628584e01d3841707c3292499baae87037f886c9fa2

    ```


