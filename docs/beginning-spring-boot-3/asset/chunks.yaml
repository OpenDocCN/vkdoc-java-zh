- fmt: "# Query by Example in Spring Data Redis\n\nOne of the most common problems\
    \ when you query is writing the entire sentence to be executed, even considering\
    \ all the advantages that Spring Data offers with creating a method with names\
    \ of the parameters to filter. To address this problem, Spring Data offers the\
    \ possibility to create a query using a user-friendly querying technique with\
    \ a simple interface where it's possible to create a dynamic query.\n\nTo use\
    \ this feature, you only need an object with the values, `ExampleMatcher`, which\
    \ contains the logic about which fields filter the results, and `Example`, which\
    \ is an interface that is part of the framework and is responsible for passing\
    \ the information to the matcher.\n\nTo do this more simply, let's go back to\
    \ your previous implementation to access the database using the repositories provided\
    \ for Spring Data and add the interface `QueryByExampleExecutor<T>` (see Listing\
    \ 7-15).\n\n**Listing 7-15.** Add the interface to use the QueryByExample\n\n\
    ```java\npublic interface CountryRepository extends CrudRepository<Country, Long>,\n\
    \        QueryByExampleExecutor<Country> {\n\n}\n```\n\nThe next step is to create\
    \ a new method in your service that receives one parameter string with part of\
    \ the country's name as a parameter. `ExampleMatcher` needs to indicate the criteria\
    \ to find on the same way that appears on Listing 7-16.\n\nReference: [https://github.com/spring-projects/spring-data-commons/blob/main/src/main/java/org/springframework/data/repository/query/QueryByExampleExecutor.java](https://github.com/spring-projects/spring-data-commons/blob/main/src/main/java/org/springframework/data/repository/query/QueryByExampleExecutor.java)\n\
    \n**Listing 7-16.** New Method That Uses ExampleMatcher\n\n```java\n@Service\n\
    public class CountryService {\n\n    CountryRepository countryRepository;\n\n\
    \    //Previous source code\n\n    public List<CountryDTO> getAll(String name)\
    \ {\n        List<CountryDTO> response = null;\n\n        //Here you create the\
    \ query using a name as an\n        //example to do the search, not considering\
    \ the\n        //value that have the \"code\" attribute\n        ExampleMatcher\
    \ matcher = ExampleMatcher.matching()\n                .withIgnorePaths(\"code\"\
    )\n                .withIncludeNullValues()\n                .withMatcher(\"name\"\
    , ExampleMatcher.\n                        GenericPropertyMatcher.of(ExampleMatcher.\n\
    \                                StringMatcher.DEFAULT));\n\n        Country entity\
    \ = new Country();\n        entity.setName(name);\n\n        Iterable<Country>\
    \ country = countryRepository.findAll(Example.\n                of(entity, matcher));\n\
    \n        if(country != null) {\n            response = mapper.mapAsList(country,\
    \ CountryDTO.class);\n        }\n\n        return response;\n    }\n\n    //Previous\
    \ source code\n}\n```\n\nThis example takes the value of a `\"name\"` and generates\
    \ a query to find the information. The last step is to create a new method in\
    \ the controller which receives the request and calls to the service (see Listing\
    \ 7-17).\n\n**Listing 7-17.** New Method in the Controller\n\n```java\n@GetMapping(value\
    \ = \"/\")\npublic ResponseEntity<List<CountryDTO>> getAll(@RequestParam String\
    \ name) {\n    List<CountryDTO> response = countryService.getAll(name);\n    return\
    \ new ResponseEntity<>(response, HttpStatus.OK);\n}\n```\n\nAfter doing all these\
    \ modifications, if you make various requests in the new endpoint to filter the\
    \ results, you may discover that nothing happens and return everything in the\
    \ database. This happens because you need to add Redis's case that there is a\
    \ second attribute to filter the information using the `@Indexed` annotation.\
    \ Behind the scenes, it creates a new index (see Listing 7-18).\n\n**Listing 7-18.**\
    \ Add the Annotation to Create a New Index\n\n```java\nimport org.springframework.data.annotation.Id;\n\
    import org.springframework.data.redis.core.RedisHash;\nimport org.springframework.data.redis.core.index.Indexed;\n\
    import java.io.Serializable;\nimport java.util.List;\n\n@RedisHash(\"country\"\
    )\npublic class Country implements Serializable {\n\n    @Id\n    private Long\
    \ id;\n\n    private String code;\n\n    @Indexed\n    private String name;\n\n\
    \    // getters and setters\n}\n```"
