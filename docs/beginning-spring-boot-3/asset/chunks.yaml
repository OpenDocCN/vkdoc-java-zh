    它们组织信息的方式。但当另一种数据组织方式出现——一种能让表示和访问更易于理解的方式时，会发生什么呢？


    本章将解释图数据库的工作原理，以及如何使用 Spring Data 进行操作。让我们探讨一些用例、实现方式以及 Neo4j。


    **什么是图数据库？**


    图数据库是一种用节点直接连接并通过表示它们之间关系的链接进行连接的图形化表示，这与使用表格或文档的其他类型数据库不同。每个节点代表一个实体，并包含该节点内连接的所有信息，节点之间的关系就是关联。


    让我们将之前的 **api-catalog** 示例转换为一组节点和链接来阐明这一概念，如图 9-1 所示。


    © Andres Sacco 2023


    A. Sacco, *Beginning Spring Data*[, https://doi.org/10.1007/978-1-4842-8764-4_9](https://doi.org/10.1007/978-1-4842-8764-4_9#DOI)


    ![](img/index-243_1.png)


    第 9 章 Neo4j：图数据库


    ***图 9-1.** 节点和链接表示示例*


    这种类型的数据库解决了许多问题，远不止图 9-1 所示的示例，下一节将进行说明。


    **可能的用例**


    在某些情况下，这些数据库是很好的候选方案，但并没有限制在其他情况下使用。让我们看看几个可能的用途。


    • **社交网络**：数据库有助于表示人与人之间的关系，以便查看每个人的动态或发布内容。


    • **模拟航班航线**：节点可以是机场和航班。使用节点可以轻松表示或查找特定机场，并检查哪些航班可用于特定目的地。此外，您可以将此用例应用于其他地面交通方式，如火车或巴士。


    • **检测欺诈模式**：您可以对购买行为及其发生的 IP 地址进行建模。如果您检测到在短时间内不同地点发生了多次操作，则可以简化检测过程。


    第 9 章 Neo4j：图数据库


    • **推荐引擎**：想象您有一个电子商务网站，您的客户购买各种商品，因此如果产品之间存在一定程度的关联，您可以提供其他可能符合某些条件的选项，例如产品类别。此外，推荐引擎也可用于在
    Spotify 上推荐歌曲或在 Netflix 上推荐新电影。


    • **表示层级结构**：如果您是一家大公司的成员，您通常想了解某个人的合作伙伴或上级。通过使用图，您可以轻松地表示和查看公司的结构。


    **实现方式**


    这种类型的数据库有多种实现方式。其中一些已经稳定，并被全球众多开发者使用。让我们来探索一下。


    • **Neo4j**[¹]：该数据库是最古老的图数据库之一，支持包括 Java 在内的多种语言，并被全球大多数大型公司使用。它提供了使用社区版的可能性，您需要自己负责数据库的管理；或者您可以选择使用云服务，如
    MongoDB Atlas。这意味着您需要为服务的使用付费，但可以轻松配置备份、恢复和运行的实例数量。关于该数据库，有许多书籍、文章、StackOverflow
    讨论和视频。附录 F 列出了一些推荐的书籍。


    • **Redis Graph**[²]：这个基于 Redis 的数据库提供了使用图的可能性。这个幕后工具实现了 GraphBLAS，它定义了一组矩阵结构，以环状结构进行图的表示。这种数据库模型具有优势，


    [¹]: https://neo4j.com/v2/

    [²]: https://redis.io/docs/stack/graph/


