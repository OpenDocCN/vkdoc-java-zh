    ## What Is ACID?


    ACID is an acronym that refers to four concepts: atomicity, consistency, isolation,
    and durability. These concepts apply to all the transactions in a relational database
    and must be implemented to preserve the information; let’s look at the meaning
    of each of them.


    - **Atomicity** is creating a single work unit that contains one or multiple operations.
    Each must be finished successfully for the transactions to end okay. If one of
    the operations fails, all the operations must be rolled back to return the database
    to the previous state.

    - **Consistency** means that you need to move the database from one valid status
    to another one. Each database has integrity rules to check if everything is okay
    when `insert`/`update`/`delete` operations are executed; these rules check if
    the column type, length, and nullability are correct. Also, the rules cover things
    like the constraint with other tables and if one of the tables needs to have a
    unique value in a column.


    **Note:** Not all the databases declare the columns or the way to generate the
    primary key in the same way, so it’s important to validate the structure of the
    tables and the queries.


    To reduce the chance of producing errors during any operation (`insert`/`update`/`delete`),
    you can include the validation annotations you saw in the previous chapter to
    prevent sending something to the database that produces an exception.


    - **Isolation** refers to the possibility that two or more operations try to modify
    the same information at the same moment. The database needs to guarantee that
    the information only is visible to other people when all the operations of the
    transactions finish okay. Each database must provide a mechanism to solve or mitigate
    this problem. There is a locking mechanism to solve the problems of concurrency
    in the databases, as discussed later in this chapter.

    - **Durability** ensures that all the transactions are completed.'
