  `        <property name=\"trimString\">`\n`            <value>   String need trimming  \
  \ </value>`\n`        </property>`\n`        <property name=\"url\">`\n`            <value>http://www.springframework.org</value>`\n\
  `        </property>`\n`    </bean>`\n`</beans>`\n\n如你所见，尽管 `PropertyEditorBean`\
  \ 上的所有属性都不是字符串类型，但属性的值都被指定为简单的字符串。另请注意，我们注册了 `CustomDateEditor` 和 `StringTrimmerEditor`，因为这两个编辑器默认情况下并未在\
  \ Spring 中注册。运行此示例将产生以下输出：\n\n\n\n`Adding 11 bytes`\n`Setting class: java.lang.String`\n\
  `Setting Boolean: true`\n`Setting string list with size: 2`\n`String member: String\
  \ member 1`\n`String member: String member 2`\n`Setting date: Thu Dec 29 00:00:00\
  \ CST 2011`\n`Setting float value: 123.45678`\n`Setting file: test.txt`\n`Setting\
  \ stream: java.io.BufferedInputStream@6490832e`\n`Setting locale: English (US)`\n\
  `Setting pattern: a*b`\n`Loaded 2 properties`\n`Setting trim string: String need\
  \ trimming`\n`Setting URL: http://www.springframework.org`\n\n如你所见，Spring 使用内置的\
  \ `PropertyEditor` 将各种属性的字符串表示形式转换为了正确的类型。表 5-1 总结了 Spring 中可用的内置 `PropertyEditor`。\n\
  \n![images](img/t0501.jpg)\n\n![images](img/t0501a.jpg)\n\n这套 `PropertyEditor` 为使用\
  \ Spring 提供了良好的基础，并使你能够更简单地使用诸如文件和 URL 等通用组件来配置应用程序。\n\n#### 创建自定义 PropertyEditor\n\
  \n虽然内置的 `PropertyEditor` 涵盖了属性类型转换的一些标准情况，但有时你可能需要创建自己的 `PropertyEditor` 来支持应用程序中使用的某个类或一组类。\n\
  \nSpring 完全支持注册自定义的 `PropertyEditor`；唯一的缺点是 `java.beans.PropertyEditor` 接口包含大量方法，其中许多与手头的任务（即属性类型转换）无关。幸运的是，JDK\
  \ 5 或更新版本提供了 `PropertyEditorSupport` 类，你自己的 `PropertyEditor` 可以继承该类，这样你只需实现一个方法：\n\
  `setAsText()`。\n\n让我们通过一个简单的示例来看看如何实现自定义属性编辑器。假设我们有一个 `Name` 类，它只有两个属性：名和姓。清单 5-29\
  \ 展示了这个类。\n\n***清单 5-29.** `Name` 类*\n\n`package com.apress.prospring3.ch5.pe;`\n\
  \n`public class Name {`\n\n`   private String firstName;`\n\n`   private String\
  \ lastName;`\n\n`   public Name() {`\n`   }`\n\n`   public Name(String firstName,\
  \ String lastName) {`\n`      this.firstName = firstName;`\n`      this.lastName\
  \ = lastName;`\n`   }`\n\n`   public String getFirstName() {`\n`      return firstName;`\n\
  `   }`\n\n`   public void setFirstName(String firstName) {`\n`      this.firstName\
  \ = firstName;`\n`   }`\n\n`   public String getLastName() {`\n`      return lastName;`\n\
  `   }`\n\n`   public void setLastName(String lastName) {`\n`      this.lastName\
  \ = lastName;`\n`   }`\n\n`   public String toString() {`\n`      return \"First\
  \ name: \" + firstName + \" - Last name: \" + lastName;`\n`   }`\n`}`\n\n为了简化应用程序配置，让我们开发一个自定义编辑器，它将一个以空格分隔的字符串分别转换为\
  \ `Name` 类的名和姓。清单 5-30 展示了这个自定义属性编辑器。\n\n***清单 5-30.** `NamePropertyEditor` 类*\n\
  \n`package com.apress.prospring3.ch5.pe;`\n\n`import java.beans.PropertyEditorSupport;`\n\
  \n`public class NamePropertyEditor extends PropertyEditorSupport {`\n\n`    public\
  \ void setAsText(String text) throws IllegalArgumentException {`\n\n`        String[]\
  \ name = text.split(\"\\\\s\");`\n\n`        Name result = new Name(name[0], name[1]);`\n\
  \n`        setValue(result);`\n`    }`\n`}`\n\n这个编辑器非常简单。它继承了 JDK 的 `PropertyEditorSupport`\
  \ 类并实现了 `setAsText()` 方法。在该方法中，我们简单地将字符串以空格为分隔符拆分成一个字符串数组。然后，实例化一个 `Name` 对象，将空格前的字符串作为名传入，空格后的字符串作为姓传入。最后，通过调用\
  \ `setValue()` 方法传入结果来返回转换后的值。\n\n要在我们的应用程序中使用 `NamePropertyEditor`，我们需要在 Spring\
  \ 的 `ApplicationContext` 中注册该编辑器。清单 5-31 展示了一个配置了 `CustomEditorConfigurer` 和 `NamePropertyEditor\
  \ (pe/custom.xml)` 的 `ApplicationContext` 配置。\n\n***清单 5-31.** 使用 `CustomEditorConfigurer`*\n\
  \n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\"\
  >`\n\n`    <bean name=\"customEditorConfigurer\"`\n`class=\"org.springframework.beans.factory.config.CustomEditorConfigurer\"\
  >`\n`        <property name=\"customEditors\">`\n`            <map>`\n`        \
  \        <entry key=\"com.apress.prospring3.ch5.pe.Name\">`\n`                 \
  \   <bean class=\"com.apress.prospring3.ch5.pe.NamePropertyEditor\"/>`\n`      \
  \          </entry>`\n`            </map>`\n`        </property>`\n`    </bean>`\n\
  `    <bean id=\"exampleBean\" class=\"com.apress.prospring3.ch5.pe.CustomEditorExample\"\
  >`\n`        <property name=\"name\">`\n`            <value>Clarence Ho</value>`\n\
  `        </property>`\n`    </bean>`\n`</beans>`\n\n在此配置中，你应该注意三点。第一，自定义的 `PropertyEditor`\
  \ 通过 `Map` 类型的 `customEditors` 属性注入到 `CustomEditorConfigurer` 类中。第二，`Map` 中的每个条目代表一个\
  \ `PropertyEditor`，条目的键是使用该 `PropertyEditor` 的类的名称。如你所见，`NamePropertyEditor` 的键是\
  \ `com.apress.prospring3.ch5.pe.Name`，这表明这是该编辑器应使用的类。这里最后一点值得注意的是，我们使用了一个匿名 bean\
  \ 声明作为单个 `Map` 条目的值。没有其他 bean 需要访问这个 bean，因此它不需要名称，所以你可以将其声明在 `<entry>` 标签内。\n\n\
  清单 5-32 展示了在清单 5-31 中注册为 bean 的 `CustomEditorExample` 类的代码。\n\n***清单 5-32.** `CustomEditorExample`\
  \ 类*\n\n`package com.apress.prospring3.ch5.pe;`\n\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  \n`public class CustomEditorExample {`\n\n`    private Name name;`\n\n`    public\
  \ static void main(String[] args) {`\n`        GenericXmlApplicationContext ctx\
  \ = new GenericXmlApplicationContext();`\n`        ctx.load(\"classpath:pe/custom.xml\"\
  );`\n`        ctx.refresh();`\n\n`        CustomEditorExample bean =`\n`       \
  \   (CustomEditorExample) ctx.getBean(\"exampleBean\");`\n\n`        System.out.println(bean.getName());`\n\
  `    }`\n\n`   public Name getName() {`\n`      return name;`\n`   }`\n\n`   public\
  \ void setName(Name name) {`\n`      this.name = name;`\n`   }`\n`}`\n\n上述代码没什么特别之处。运行该示例，你将看到以下输出：\n\
  \n`First name: Clarence - Last name: Ho`\n\n这是我们在 `Name` 类中实现的 `toString()` 方法的输出，你可以看到，Spring\
  \ 通过使用配置的 `NamePropertyEditor` 正确地填充了 `Name` 对象的名和姓。\n\n从版本 3 开始，Spring 引入了类型转换和字段格式化\
  \ SPI，它们提供了更简单、结构更清晰的 API 来执行类型转换和字段格式化。这对于 Web 应用程序开发尤其有用。类型转换 SPI 和字段格式化 API 都将在第\
  \ 14 章中详细讨论。\n\n\n\n### 更多 Spring ApplicationContext 配置\n\n到目前为止，虽然我们一直在讨论 Spring\
  \ 的 `ApplicationContext`，但我们所涵盖的大部分功能主要围绕 `ApplicationContext` 所包装的 `BeanFactory`\
  \ 接口。在 Spring 中，`BeanFactory` 接口的各种实现负责 Bean 的实例化，为 Spring 管理的 Bean 提供依赖注入和生命周期支持。然而，如前所述，作为\
  \ `BeanFactory` 的扩展，`ApplicationContext` 还提供了其他有用的功能。\n\n`ApplicationContext` 的主要功能是提供一个更丰富的框架，用于构建你的应用程序。与\
  \ `BeanFactory` 相比，`ApplicationContext` 对其内部配置的 Bean 有更深入的感知，并且对于许多 Spring 基础设施类和接口（例如\
  \ `BeanFactoryPostProcessor`），它会代表你与它们进行交互，从而减少你为了使用 Spring 而需要编写的代码量。\n\n使用 `ApplicationContext`\
  \ 的最大好处是，它允许你以完全声明式的方式配置和管理 Spring 以及 Spring 管理的资源。这意味着，只要可能，Spring 都会提供支持类，自动将\
  \ `ApplicationContext` 加载到你的应用程序中，从而无需你编写任何代码来访问 `ApplicationContext`。实际上，此功能目前仅在你使用\
  \ Spring 构建 Web 应用程序时可用，它允许你在 Web 应用程序部署描述符中初始化 Spring 的 `ApplicationContext`。当使用独立应用程序时，你也可以通过简单的编码来初始化\
  \ Spring 的 `ApplicationContext`。\n\n除了提供更侧重于声明式配置的模型外，`ApplicationContext` 还支持以下附加功能：\n\
  \n*   国际化\n*   事件发布\n*   资源管理与访问\n*   额外的生命周期接口\n*   改进的基础设施组件自动配置\n\n在接下来的章节中，我们将讨论\
  \ `ApplicationContext` 中除 DI 之外的一些最重要的功能。\n\n#### 使用 MessageSource 实现国际化\n\nSpring\
  \ 真正擅长的领域之一是支持国际化（i18n）。使用 `MessageSource` 接口，你的应用程序可以访问以多种不同语言存储的字符串资源，称为*消息*。对于你希望在应用程序中支持的每种语言，你都需要维护一个消息列表，这些消息通过键值与其他语言的消息相对应。例如，如果我想用英语和捷克语显示“The\
  \ quick brown fox jumped over the lazy dog”，我会创建两条消息，键值都是 `msg`；英语的那条会说“The quick\
  \ brown fox jumped over the lazy dog”，而捷克语的那条会说“Príšerne žlutoucký kun úpel dábelské\
  \ ódy。”\n\n虽然你不需要使用 `ApplicationContext` 来使用 `MessageSource`，但 `ApplicationContext`\
  \ 接口实际上扩展了 `MessageSource`，并为加载消息以及使其在你的环境中可用提供了特殊支持。消息的自动加载在任何环境中都可用，但自动访问仅在特定的\
  \ Spring 管理场景中提供，例如当你使用 Spring 的 MVC 框架构建 Web 应用程序时。虽然任何类都可以实现 `ApplicationContextAware`\
  \ 从而访问自动加载的消息，但我们建议在本章后面的“在独立应用程序中使用 MessageSource”一节中提供一个更好的解决方案。\n\n在继续之前，如果你不熟悉\
  \ Java 中的 i18n 支持，我们建议你至少查看一下 `Locale` 和 `ResourceBundle` 类的 Java 文档（[`http://download.oracle.com/javase/6/docs/api/index.html`](http://download.oracle.com/javase/6/docs/api/index.html)）。\n\
  \n##### 使用 ApplicationContext 和 MessageSource\n\n除了 `ApplicationContext`，Spring\
  \ 还提供了三种 `MessageSource` 实现：`ResourceBundleMessageSource`、`ReloadableResourceBundleMessageSource`\
  \ 和 `StaticMessageSource`。`StaticMessageSource` 实际上并不打算在生产应用程序中使用，因为你无法在外部对其进行配置，而这通常是在为应用程序添加\
  \ i18n 功能时的主要需求之一。`ResourceBundleMessageSource` 使用 Java `ResourceBundle` 加载消息。`ReloadableResourceBundleMessageSource`\
  \ 本质上相同，只是它支持对底层源文件进行定时重新加载。\n\n所有这三种 `MessageSource` 实现还实现了另一个名为 `HierarchicalMessageSource`\
  \ 的接口，该接口允许嵌套多个 `MessageSource` 实例。这是 `ApplicationContext` 与 `MessageSource` 协同工作的关键。\n\
  \n要利用 `ApplicationContext` 对 `MessageSource` 的支持，你必须在配置中定义一个类型为 `MessageSource`\
  \ 且名称为 `messageSource` 的 Bean。`ApplicationContext` 会获取这个 `MessageSource` 并将其嵌套在自身内部，从而允许你通过\
  \ `ApplicationContext` 访问消息。这可能难以想象，所以请看下面的示例。\n\n清单 5-33 展示了一个简单的应用程序，它访问了英语和捷克语环境的一组消息。\n\
  \n***清单 5-33.** 探索 `MessageSource` 的用法*\n\n`package com.apress.prospring3.ch5.context;`\n\
  \n`import java.util.Locale;`\n\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  \n`public class MessageSourceDemo {`\n\n`    public static void main(String[] args)\
  \ {`\n\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:appContext/messageSource.xml\");`\n`        ctx.refresh();`\n\
  \n`        Locale english = Locale.ENGLISH;`\n`        Locale czech = new Locale(\"\
  cs\", \"CZ\");`\n\n`        System.out.println(ctx.getMessage(\"msg\", null, english));`\n\
  `        System.out.println(ctx.getMessage(\"msg\", null, czech));`\n\n`        System.out.println(ctx.getMessage(\"\
  nameMsg\", new Object[] { \"Clarence\",`\n`                \"Ho\" }, english));`\n\
  `    }`\n`}`\n\n暂时不必担心对 `getMessage()` 的调用；我们稍后会回到这些调用。现在，只需知道它们会为指定的区域设置检索键控消息。在清单\
  \ 5-34 中，你可以看到此应用程序使用的配置（`appContext/messageSource.xml`）。\n\n***清单 5-34.** 配置 `MessageSource`\
  \ Bean*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans`\n`         http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\"\
  >`\n\n`    <bean id=\"messageSource\"`\n`class=\"org.springframework.context.support.ResourceBundleMessageSource\"\
  >`\n`        <property name=\"basenames\">`\n`            <list>`\n`                <value>buttons</value>`\n\
  `                <value>labels</value>`\n`            </list>`\n`        </property>`\n\
  `    </bean>`\n`</beans>`\n\n这里我们按照要求定义了一个名为 `messageSource` 的 `ResourceBundleMessageSource`\
  \ Bean，并使用一组名称进行配置，以形成其文件集的基础。`ResourceBundleMessageSource` 使用的 Java `ResourceBundle`\
  \ 基于一组由基名称标识的属性文件。当查找特定 `Locale` 的消息时，`ResourceBundle` 会查找一个由基名称和区域设置名称组合命名的文件。例如，如果基名称是\
  \ `foo`，并且我们正在查找 `en-GB`（英式英语）区域设置的消息，那么 `ResourceBundle` 会查找一个名为 `foo_en_GB.properties`\
  \ 的文件。\n\n\n\n对于前面的示例，英文（`labels_en.properties`）和捷克语（`labels_cs_CZ.properties`）属性文件的内容分别如清单\
  \ 5-35 和清单 5-36 所示。\n\n***清单 5-35.** `labels_en.properties` 文件*\n\n`msg=The quick\
  \ brown fox jumped over the lazy dog`\n`nameMsg=My name is {0} {1}`\n\n***清单 5-36.**\
  \ `labels_cs_CZ.properties` 文件*\n\n`msg=Príšerne žlutoucký kun úpel dábelské ódy`\n\
  \n运行清单 5-33 中的 `MessageSourceDemo` 类将产生以下输出：\n\n`The quick brown fox jumped over\
  \ the lazy dog`\n`Príšerne žlutoucký kun úpel dábelské ódy`\n`My name is Clarence\
  \ Ho`\n\n![images](img/square.jpg) **注意** 捷克语的翻译是“可怕的黄色马在呻吟着恶魔般的颂歌。”\n\n现在，这个示例引出了更多问题。那些对\
  \ `getMessage()` 的调用意味着什么？为什么我们使用 `ApplicationContext.getMessage()` 而不是直接访问 `ResourceBundleMessageSource`\
  \ bean？我们将依次回答这些问题。\n\n##### getMessage() 方法\n\n`MessageSource` 接口为 `getMessage()`\
  \ 方法定义了三个重载。这些重载在表 5-2 中进行了描述。\n\n![images](img/t0502.jpg)\n\n##### 为什么将 ApplicationContext\
  \ 用作 MessageSource？\n\n要回答这个问题，我们需要稍微超前一点，看看 Spring 中的 Web 应用程序支持。总的来说，这个问题的答案是，当这样做会将你的\
  \ bean 不必要地耦合到 `ApplicationContext` 时，你不应该将 `ApplicationContext` 用作 `MessageSource`（下一节将更详细地讨论这一点）。当你使用\
  \ Spring 的 MVC 框架构建 Web 应用程序时，应该使用 `ApplicationContext`。\n\nSpring MVC 中的核心接口是 `Controller`。与\
  \ Struts 等要求你通过继承具体类来实现控制器的框架不同，Spring 只要求你实现 `Controller` 接口（或者用 `@Controller`\
  \ 注解标注你的控制器类）。话虽如此，Spring 提供了一组有用的基类，你可以使用它们来实现自己的控制器。所有这些基类本身都是 `ApplicationObjectSupport`\
  \ 类的子类（直接或间接），而 `ApplicationObjectSupport` 是任何希望感知 `ApplicationContext` 的应用程序对象的便捷超类。\n\
  \n请记住，在 Web 应用程序环境中，`ApplicationContext` 是自动加载的。`ApplicationObjectSupport` 访问这个\
  \ `ApplicationContext`，将其包装在 `MessageSourceAccessor` 对象中，并通过受保护的 `getMessageSourceAccessor()`\
  \ 方法将其提供给控制器。`MessageSourceAccessor` 提供了大量便捷的方法来处理 `MessageSource`。这种“自动注入”形式非常有益；它消除了所有控制器暴露\
  \ `MessageSource` 属性的需要。\n\n然而，这并不是在 Web 应用程序中将 `ApplicationContext` 用作 `MessageSource`\
  \ 的最佳理由。使用 `ApplicationContext` 而不是手动定义的 `MessageSource` bean 的主要原因是，Spring 会尽可能地将\
  \ `ApplicationContext` 作为 `MessageSource` 暴露给视图层。这意味着当你使用 Spring 的 JSP 标签库时，`<spring:message>`\
  \ 标签会自动从 `ApplicationContext` 读取消息；而当你使用 JSTL 时，`<fmt:message>` 标签也会执行相同的操作。\n\n\
  所有这些好处意味着，在构建 Web 应用程序时，最好使用 `ApplicationContext` 中的 `MessageSource` 支持，而不是单独管理一个\
  \ `MessageSource` 实例。当你考虑到要利用此功能只需配置一个名为 `messageSource` 的 `MessageSource` bean\
  \ 时，这一点尤其正确。\n\n#### 在独立应用程序中使用 MessageSource\n\n当你在独立应用程序中使用 `MessageSource` 时，Spring\
  \ 除了自动将 `MessageSource` bean 嵌套在 `ApplicationContext` 中之外，不提供其他额外支持。在这种情况下，最好通过依赖注入来使用\
  \ `MessageSource`。你可以选择让你的 bean 实现 `ApplicationContextAware`，但这会阻止它们在 `BeanFactory`\
  \ 上下文中使用。再加上这样做会使测试复杂化而没有任何明显的好处，很明显，在独立环境中，你应该坚持使用依赖注入来访问 `MessageSource` 对象。\n\
  \n#### MessageSourceResolvable 接口\n\n当你从 `MessageSource` 查找消息时，可以使用实现了 `MessageSourceResolvable`\
  \ 的对象来代替键和一组参数。该接口在 Spring 验证库中使用最广泛，用于将 Error 对象与其国际化错误消息关联起来。在第 17 章中，当我们讨论 Spring\
  \ MVC 库中的错误处理时，你将看到一个如何使用 `MessageSourceResolvable` 的示例。\n\n#### 应用程序事件\n\n`ApplicationContext`\
  \ 中另一个 `BeanFactory` 不具备的特性是能够使用 `ApplicationContext` 作为代理来发布和接收事件。在本节中，我们将探讨其用法。\n\
  \n\n\n##### 使用应用程序事件\n\n事件是一个派生自 `ApplicationEvent` 的类，而 `ApplicationEvent` 本身又派生自\
  \ `java.util.EventObject`。任何 bean 都可以通过实现 `ApplicationListener<T>` 接口来监听事件；`ApplicationContext`\
  \ 在配置时会自动注册任何实现了此接口的 bean 作为监听器。事件通过 `ApplicationEventPublisher.publishEvent()`\
  \ 方法发布，因此发布事件的类必须知晓 `ApplicationContext`（它扩展了 `ApplicationEventPublisher` 接口）。在\
  \ Web 应用程序中，这很简单，因为你的许多类都派生自 Spring 框架的类，这些类允许通过受保护的方法访问 `ApplicationContext`。在独立应用程序中，你可以让你的发布\
  \ bean 实现 `ApplicationContextAware` 以使其能够发布事件。\n\n清单 5-37 展示了一个基本事件类的示例。\n\n***清单\
  \ 5-37.** 创建事件类*\n\n`package com.apress.prospring3.ch5.event;`\n\n`import org.springframework.context.ApplicationEvent;`\n\
  \n`public class MessageEvent extends ApplicationEvent {`\n\n`    private String\
  \ msg;`\n\n`    public MessageEvent(Object source, String msg) {`\n`        super(source);`\n\
  `        this.msg = msg;`\n`    }`\n\n`    public String getMessage() {`\n`        return\
  \ msg;`\n`    }`\n`}`\n\n这段代码非常基础；唯一需要注意的是 `ApplicationEvent` 有一个接受事件源引用的单一构造函数。这在\
  \ `MessageEvent` 的构造函数中得到了体现。在清单 5-38 中，你可以看到监听器的代码。\n\n***清单 5-38.** `MessageEventListener`\
  \ 类*\n\n`package com.apress.prospring3.ch5.event;`\n\n`import org.springframework.context.ApplicationListener;`\n\
  \n`public class MessageEventListener implements ApplicationListener<MessageEvent>\
  \ {`\n\n`    public void onApplicationEvent(MessageEvent event) {`\n`        MessageEvent\
  \ msgEvt = (MessageEvent) event;`\n`        System.out.println(\"Received: \" +\
  \ msgEvt.getMessage());`\n`    }`\n`}`\n\n`ApplicationListener` 接口定义了一个单一方法 `onApplicationEvent`，当事件被触发时，Spring\
  \ 会调用该方法。`MessageEventListener` 通过实现强类型的 `ApplicationListener` 接口，表明它只对 `MessageEvent`\
  \ 类型（或其子类）的事件感兴趣。如果接收到一个 `MessageEvent`，它会将消息写入 `stdout`。发布事件很简单；只需创建事件类的实例并将其传递给\
  \ `ApplicationEventPublisher.publishEvent()` 方法，如清单 5-39 所示。\n\n***清单 5-39.** 发布事件*\n\
  \n`package com.apress.prospring3.ch5.event;`\n\n`import org.springframework.beans.BeansException;`\n\
  `import org.springframework.context.ApplicationContext;`\n`import org.springframework.context.ApplicationContextAware;`\n\
  `import org.springframework.context.support.ClassPathXmlApplicationContext;`\n\n\
  `public class Publisher implements ApplicationContextAware {`\n\n`    private ApplicationContext\
  \ ctx;`\n\n`    public static void main(String[] args) {`\n\n`        ApplicationContext\
  \ ctx = new ClassPathXmlApplicationContext(`\n`                \"classpath:events/events.xml\"\
  );`\n\n`        Publisher pub = (Publisher) ctx.getBean(\"publisher\");`\n`        pub.publish(\"\
  Hello World!\");`\n`        pub.publish(\"The quick brown fox jumped over the lazy\
  \ dog\");`\n`    }`\n\n`    public void setApplicationContext(ApplicationContext\
  \ applicationContext)`\n`            throws BeansException {`\n`        this.ctx\
  \ = applicationContext;`\n\n`    }`\n\n`    public void publish(String message)\
  \ {`\n`        ctx.publishEvent(new MessageEvent(this, message));`\n`    }`\n`}`\n\
  \n在这里，你可以看到 `Publisher` 类从 `ApplicationContext` 中获取自身的一个实例，然后使用 `publish()` 方法向\
  \ `ApplicationContext` 发布两个 `MessageEvent`。`Publisher` bean 实例通过实现 `ApplicationContextAware`\
  \ 来访问 `ApplicationContext`。清单 5-40 展示了此示例的配置（`events/events.xml`）。\n\n***清单 5-40.**\
  \ 配置 `ApplicationListener` Bean*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n\
  `<beans`\n\n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n\
  `        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\">`\n\n\
  `    <bean id=\"publisher\" class=\"com.apress.prospring3.ch5.event.Publisher\"\
  />`\n`    <bean id=\"messageEventListener\"`\n`        class=\"com.apress.prospring3.ch5.event.MessageEventListener\"\
  />`\n`</beans>`\n\n请注意，你不需要特殊的配置来向 `ApplicationContext` 注册 `MessageEventListener`；Spring\
  \ 会自动拾取它。运行此示例将产生以下输出：\n\n`Received: Hello World!`\n`Received: The quick brown fox\
  \ jumped over the lazy dog`\n\n##### 事件使用的注意事项\n\n在应用程序中，有很多情况需要通知某些组件特定的事件。通常，你通过编写代码显式通知每个组件，或者使用诸如\
  \ JMS 之类的消息传递技术来实现。逐个编写代码通知每个组件的缺点在于，你将那些组件与发布者耦合在一起，这在很多情况下是不必要的。\n\n考虑这样一种情况：你在应用程序中缓存产品详细信息以避免访问数据库。另一个组件允许修改产品详细信息并将其持久化到数据库。为了避免使缓存失效，更新组件显式通知缓存用户详细信息已更改。在这个例子中，更新组件与一个实际上与其业务职责无关的组件耦合在一起。更好的解决方案是让更新组件在每次产品详细信息被修改时发布一个事件，然后让感兴趣的组件（例如缓存）监听该事件。这样做的好处是保持组件解耦，这使得在需要时移除缓存，或者添加另一个对产品详细信息更改感兴趣的监听器变得简单。\n\
  \n在这种情况下使用 JMS 会显得大材小用，因为使缓存中的产品条目失效的过程很快，并且不是业务关键性的。使用 Spring 事件基础设施为你的应用程序增加的开销非常小。\n\
  \n通常，我们将事件用于执行快速且不属于主要应用程序逻辑的反应性逻辑。在前面的例子中，缓存中产品的失效是对产品详细信息更新的反应，它执行得很快（或者应该很快），并且不是应用程序的主要功能的一部分。对于长时间运行且构成主要业务逻辑一部分的流程，建议使用\
  \ JMS 或类似的消息传递系统，例如 RabbitMQ。使用 JMS 的主要好处是它更适合长时间运行的流程，并且随着系统的发展，如果有必要，你可以将包含业务信息的消息的\
  \ JMS 驱动处理转移到单独的机器上。\n\n\n\n#### 访问资源\n\n应用程序通常需要以不同形式访问各种资源。你可能需要访问文件系统中某个文件里存储的配置数据、类路径下\
  \ JAR 文件中存储的图像数据，或者远程服务器上的某些数据。Spring 提供了一种统一的机制，以独立于协议的方式访问资源。这意味着你的应用程序可以以相同的方式访问文件资源，无论它存储在文件系统、类路径还是远程服务器上。\n\
  \nSpring 资源支持的核心是 `org.springframework.core.io.Resource` 接口。`Resource` 接口定义了十个不言自明的方法：`contentLength()`、`exists()`、`getDescription()`、`getFile()`、`getFileName()`、`getURI()`、`getURL()`、`isOpen()`、`isReadable()`\
  \ 和 `lastModified()`。除了这十个方法之外，还有一个方法不那么不言自明：`createRelative()`。`createRelative()`\
  \ 方法使用相对于调用该方法的实例的路径创建一个新的 `Resource` 实例。你可以提供自己的 `Resource` 实现，尽管这超出了本章的范围，但在大多数情况下，你会使用内置实现之一来访问文件（`FileSystemResource`\
  \ 类）、类路径（`ClassPathResource` 类）或 URL 资源（`UrlResource` 类）。\n\n在内部，Spring 使用另一个接口\
  \ `ResourceLoader` 及其默认实现 `DefaultResourceLoader` 来定位和创建 `Resource` 实例。但是，你通常不会直接与\
  \ `DefaultResourceLoader` 交互，而是使用另一个 `ResourceLoader` 实现——`ApplicationContext`。\n\
  \n清单 5-41 展示了一个使用 `ApplicationContext` 访问三个资源的示例应用程序。\n\n***清单 5-41.** 访问资源*\n\n\
  `package com.apress.prospring3.ch5.resource;`\n\n`import org.springframework.context.ApplicationContext;`\n\
  `import org.springframework.context.support.ClassPathXmlApplicationContext;`\n`import\
  \ org.springframework.core.io.Resource;`\n\n`public class ResourceDemo {`\n\n`    public\
  \ static void main(String[] args) throws Exception{`\n`        ApplicationContext\
  \ ctx = new ClassPathXmlApplicationContext(`\n`        \"classpath:events/events.xml\"\
  );`\n\n`        Resource res1 = ctx.getResource(\"file:///d:/temp/test.txt\");`\n\
  `        displayInfo(res1);`\n`        Resource res2 = ctx.getResource(\"classpath:test.txt\"\
  );`\n`        displayInfo(res2);`\n`        Resource res3 = ctx.getResource(\"http://www.google.co.uk\"\
  );`\n`        displayInfo(res3);`\n`    }`\n\n`    private static void displayInfo(Resource\
  \ res) throws Exception{`\n`        System.out.println(res.getClass());`\n`        System.out.println(res.getURL().getContent());`\n\
  `        System.out.println(\"\");`\n`    }`\n`}`\n\n你应该注意，本例中使用的配置文件并不重要。请注意，在每次调用\
  \ `getResource()` 时，我们都会为每个资源传入一个 URI。你会认出我们为 `res1` 和 `res3` 传入的常见 `file:` 和 `http:`\
  \ 协议。我们为 `res2` 使用的 `classpath:` 协议是 Spring 特有的，它指示 `ResourceLoader` 应在类路径中查找资源。运行此示例将产生以下输出：\n\
  \n`class org.springframework.core.io.UrlResource`\n`sun.net.www.content.text.PlainTextInputStream@709446e4`\n\
  \n`class org.springframework.core.io.ClassPathResource`\n`sun.net.www.content.text.PlainTextInputStream@16ba5c7a`\n\
  \n`class org.springframework.core.io.UrlResource`\n`sun.net.www.protocol.http.HttpURLConnection$HttpInputStream@6825c828`\n\
  \n请注意，对于 `file:` 和 `http:` 协议，Spring 都会返回一个 `UrlResource` 实例。Spring 确实包含一个 `FileSystemResource`\
  \ 类，但 `DefaultResourceLoader` 根本不使用这个类。这是因为 Spring 的默认资源加载策略将 URL 和文件视为具有不同协议（即\
  \ `file:` 和 `http:`）的同一类型资源。如果需要 `FileSystemResource` 的实例，请使用 `FileSystemResourceLoader`。一旦获得\
  \ `Resource` 实例，你就可以根据需要使用 `getFile()`、`getInputStream()` 或 `getURL()` 自由访问其内容。在某些情况下，例如当你使用\
  \ `http:` 协议时，调用 `getFile()` 会导致 `FileNotFoundException`。因此，我们建议你使用 `getInputStream()`\
  \ 来访问资源内容，因为它很可能适用于所有可能的资源类型。\n\n### 使用 Java 类进行配置\n\n除了 XML 配置之外，你还可以使用 Java 类来配置\
  \ Spring 的 `ApplicationContext`。Spring JavaConfig 曾经是一个独立的项目，但从 Spring 3.0 开始，其使用\
  \ Java 类进行配置的主要特性被合并到了核心 Spring 框架中。\n\n在本节中，我们将了解如何使用 Java 类来配置 Spring 的 `ApplicationContext`，以及使用\
  \ XML 配置时的等效方式。\n\n\n\n#### Java 中的 ApplicationContext 配置\n\n让我们看看如何通过引用我们在第 4 章中介绍的关于消息提供器和渲染器的相同示例，使用\
  \ Java 类来配置 Spring 的 `ApplicationContext`。清单 5-42 回顾了消息提供器接口和一个可配置的消息提供器。\n\n***清单\
  \ 5-42.** `MessageProvider` 和 `ConfigurableMessageProvider`*\n\n`package com.apress.prospring3.ch5.javaconfig;`\n\
  \n`public interface MessageProvider {`\n\n`    public String getMessage();`\n\n\
  `}`\n\n`package com.apress.prospring3.ch5.javaconfig;`\n\n`public class ConfigurableMessageProvider\
  \ implements MessageProvider {`\n\n`    private String message = \"Default message\"\
  ;`\n\n`    public ConfigurableMessageProvider() {`\n`    }`\n\n`    public ConfigurableMessageProvider(String\
  \ message) {`\n`        this.message = message;`\n`    }`\n\n`    public void setMessage(String\
  \ message) {`\n`        this.message = message;`\n`    }`\n\n`    public String\
  \ getMessage() {`\n`        return message;`\n`    }`\n`}`\n\n清单 5-43 展示了 `MessageRenderer`\
  \ 接口和 `StandardOutMessageRenderer` 实现。\n\n***清单 5-43.** `MessageRenderer` 和 `StandardOutMessageRenderer`*\n\
  \n`package com.apress.prospring3.ch5.javaconfig;`\n\n`public interface MessageRenderer\
  \ {`\n\n`   public void render();`\n\n`   public void setMessageProvider(MessageProvider\
  \ provider);`\n\n`   public MessageProvider getMessageProvider();`\n\n`}`\n\n`package\
  \ com.apress.prospring3.ch5.javaconfig;`\n\n`public class StandardOutMessageRenderer\
  \ implements MessageRenderer {`\n\n`   private MessageProvider messageProvider =\
  \ null;`\n\n`   public void render() {`\n`   if (messageProvider == null) {`\n`             \
  \ throw new RuntimeException(`\n`              \"You must set the property messageProvider\
  \ of class:\"`\n`      + StandardOutMessageRenderer.class.getName());`\n`          }`\n\
  `          System.out.println(messageProvider.getMessage());`\n`   }`\n\n`   public\
  \ void setMessageProvider(MessageProvider provider){`\n`        this.messageProvider\
  \ = provider;`\n`   }`\n\n`   public MessageProvider getMessageProvider() {`\n`      return\
  \ this.messageProvider;`\n`   }`\n\n`}`\n\n清单 5-44 展示了 Spring `ApplicationContext`\
  \ 的 XML 配置（`app-context.xml`）。\n\n***清单 5-44.** XML 配置*\n\n`<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n\
  `        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\">`\n\n\
  `    <bean id=\"messageRenderer\"`\n`class=\"com.apress.prospring3.ch5.javaconfig.StandardOutMessageRenderer\"\
  `\n`        p:messageProvider-ref=\"messageProvider\"/>`\n\n`    <bean id=\"messageProvider\"\
  `\n`class=\"com.apress.prospring3.ch5.javaconfig.ConfigurableMessageProvider\"`\n\
  `        c:message=\"This is a configurable message\"/>`\n\n`</beans>`\n\n清单 5-45\
  \ 展示了测试程序。\n\n***清单 5-45.** XML 配置测试程序*\n\n`package com.apress.prospring3.ch5.javaconfig;`\n\
  \n`import org.springframework.context.ApplicationContext;`\n`import org.springframework.context.support.ClassPathXmlApplicationContext;`\n\
  \n`public class JavaConfigSimpleExample {`\n\n`    public static void main(String[]\
  \ args) {`\n\n`        ApplicationContext ctx = new`\n`           ClassPathXmlApplicationContext(\"\
  classpath:app-context.xml\");`\n\n`        MessageRenderer renderer =`\n`            ctx.getBean(\"\
  messageRenderer\", MessageRenderer.class);`\n\n`        renderer.render();`\n\n\
  `    }`\n\n`}`\n\n当使用 Java 类而不是 XML 来配置上述消息提供器和渲染器时，我们只需像往常一样实现一个普通的 JavaBean，并添加适当的注解以用于\
  \ Spring 的 Java 配置。清单 5-46 展示了 Java 类，它等同于清单 5-44 中显示的 XML 配置。\n\n***清单 5-46.**\
  \ Java 配置*\n\n`package com.apress.prospring3.ch5.javaconfig;`\n\n`import org.springframework.context.annotation.Bean;`\n\
  `import org.springframework.context.annotation.Configuration;`\n\n`@Configuration`\n\
  `public class AppConfig {`\n\n`    // XML:`\n`    // <bean id=\"messageProvider\"\
  `\n`class=\"com.apress.prospring3.ch5.javaconfig.ConfigurableMessageProvider\"/>`\n\
  `    @Bean`\n`    public MessageProvider messageProvider() {`\n`        return new\
  \ ConfigurableMessageProvider();`\n`    }`\n\n`    // XML:`\n`    // <bean id=\"\
  messageRenderer\" class=\"com.apress.prospring3.ch5.javaconfig.StandardOutMessageRenderer\"\
  `\n`    //        p:messageProvider-ref=\"messageProvider\"/>`\n`    @Bean`\n`    public\
  \ MessageRenderer messageRenderer() {`\n`        MessageRenderer renderer = new\
  \ StandardOutMessageRenderer();`\n\n`        // Setter injection`\n`        renderer.setMessageProvider(messageProvider());`\n\
  \n`        return renderer;`\n`    }`\n`}`\n\n在上面的 `AppConfig` 类中，你可以看到我们首先使用 `@Configuration`\
  \ 注解来告知 Spring 这是一个基于 Java 的配置文件。之后，使用 `@Bean` 注解来声明一个 Spring bean 和 DI 需求。为了帮助你理解\
  \ Java 注解和代码对应的 XML 形式，我们在相应的方法中添加了注释。因此，你可以看到 `@Bean` 等同于 `<bean>` 标签，方法名等同于 `<bean>`\
  \ 标签中的 `id` 属性，并且在实例化 `MessageRender` bean 时，通过调用相应的方法来获取消息提供器实现了 Setter 注入，这与在\
  \ XML 配置中使用 `<ref>` 标签相同。清单 5-47 展示了如何从 Java 配置文件初始化 `ApplicationContext`。\n\n***清单\
  \ 5-47.** Java 配置测试*\n\n`package com.apress.prospring3.ch5.javaconfig;`\n\n`import\
  \ org.springframework.context.ApplicationContext;`\n`import org.springframework.context.annotationAnnotationConfigApplicationContext;`\n\
  \n`public class JavaConfigSimpleExample {`\n\n`    public static void main(String[]\
  \ args) {`\n\n`        ApplicationContext ctx = new`\n`            AnnotationConfigApplicationContext(AppConfig.class);`\n\
  \n`        MessageRenderer renderer =`\n`            ctx.getBean(\"messageRenderer\"\
  , MessageRenderer.class);`\n\n`        renderer.render();`\n\n`    }`\n\n`}`\n\n\
  从上面的清单中，我们使用了 `AnnotationConfigApplicationContext` 类，并将配置类作为构造函数参数传入（你可以通过 JDK 的可变参数特性向其传递多个配置类）。之后，你可以像往常一样使用返回的\
  \ `ApplicationContext`。\n\n请注意，Spring 需要 CGLIB 来支持 Java 配置类。在 STS 中将表 5-3 中的依赖项添加到项目中。\n\
  \n![images](img/t0503.jpg)\n\n运行程序将得到以下结果：\n\n`Default message`\n\n了解了 Java 配置类的基本用法后，让我们继续探讨更多的配置选项及其对应的\
  \ XML 形式。对于消息提供器，假设我们想要将消息外部化到一个属性文件（`message.properties`）中，然后使用构造函数注入将其注入到 `ConfigurableMessageProvider`\
  \ 中。`message.properties` 的内容如下：\n\n`message=Spring 3 Java Configuration Rocks!`\n\
  \n让我们看看修改后的测试程序，它通过使用 `@PropertySource` 注解加载属性文件，然后将它们注入到消息提供器实现中。在清单 5-48 中，我们还添加了\
  \ Spring 为基于 Java 的配置所支持的各种注解及其对应的 XML 形式。请注意，要使 `@EnableTransactionManagement`\
  \ 注解生效，我们需要将 `spring-tx` 模块的依赖项添加到项目中（参见表 5-4）。\n\n![images](img/t0504.jpg)\n\n\
  ***清单 5-48.** Java 配置类（修订版）*\n\n`package com.apress.prospring3.ch5.javaconfig;`\n\
  \n\n\n`import org.springframework.beans.factory.annotation.Autowired;`\n`import\
  \ org.springframework.context.annotation.Bean;`\n`import org.springframework.context.annotation.ComponentScan;`\n\
  `import org.springframework.context.annotation.Configuration;`\n`import org.springframework.context.annotation.DependsOn;`\n\
  `import org.springframework.context.annotation.Import;`\n`import org.springframework.context.annotation.ImportResource;`\n\
  `import org.springframework.context.annotation.Lazy;`\n`import org.springframework.context.annotation.PropertySource;`\n\
  `import org.springframework.context.annotation.Scope;`\n`import org.springframework.core.env.Environment;`\n\
  `import org.springframework.transaction.annotation.EnableTransactionManagement;`\n\
  \n`@Configuration`\n`@Import(OtherConfig.class)`\n`// XML: <import resource=\"classpath:events/events.xml\"\
  )`\n`@ImportResource(value=\"classpath:events/events.xml\")`\n`// XML: <context:property-placeholder\
  \ location=\"classpath:message.properties\"/>`\n`@PropertySource(value=\"classpath:message.properties\"\
  )`\n`// XML: <context:component-scan base-package=\"com.apress.prospring3.ch5.context\"\
  />`\n`@ComponentScan(basePackages={\"com.apress.prospring3.ch5.context\"})`\n`@EnableTransactionManagement`\n\
  `public class AppConfig {`\n\n`    @Autowired`\n`    Environment env;`\n\n`    //\
  \ XML:`\n`    // <bean id=\"messageProvider\"`\n`class=\"com.apress.prospring3.ch5.javaconfig.ConfigurableMessageProvider\"\
  />`\n`    @Bean`\n`    @Lazy(value=true)   //XML <bean .... lazy-init=\"true\"/>`\n\
  `    public MessageProvider messageProvider() {`\n`        // 构造器注入`\n`        return\
  \ new ConfigurableMessageProvider(env.getProperty(\"message\"));`\n`    }`\n\n`    //\
  \ XML:`\n`    // <bean id=\"messageRenderer\" class=\"com.apress.prospring3.ch5.javaconfig.StandardOutMessageRenderer\"\
  `\n`    //        p:messageProvider-ref=\"messageProvider\"/>`\n`    @Bean(name=\"\
  messageRenderer\")`\n`    @Scope(value=\"prototype\")  // XML: <bean ... scope=\"\
  prototype\"/>`\n`    @DependsOn(value=\"messageProvider\")  // XML: <bean ... depends-on=\"\
  messageProvider\"/>`\n`    public MessageRenderer messageRenderer() {`\n`        MessageRenderer\
  \ renderer = new StandardOutMessageRenderer();`\n\n`        // Setter 注入`\n`        renderer.setMessageProvider(messageProvider());`\n\
  \n`        return renderer;`\n`    }`\n`}`\n\n请注意，在清单 5-48 中，`OtherConfig` 类只是一个用\
  \ `@Configuration` 注解的空类。在该清单中，你可以看到许多 Java 类中用于配置的常见注解；我们还提供了它们对应的 XML 标签，方便你参考。以下是关于清单\
  \ 5-48 的一些特殊要点：\n\n*   `@PropertySource` 注解用于将属性文件加载到 Spring `ApplicationContext`\
  \ 中，它接受位置作为参数（可以提供多个位置）。在 XML 中，`<context:property-placeholder>` 具有相同的作用。\n*   `@Import`\
  \ 注解可以导入其他配置类，这意味着你也可以为不同的配置使用多个 Java 配置类（例如，一个类专门用于 DAO Bean 的声明，另一个用于 Service\
  \ Bean 的声明等）。\n*   除了 `@Import`，`@ImportResource` 也可用于从 XML 文件导入配置，这意味着你可以混合使用 XML\
  \ 和 Java 配置类，尽管我们不建议这样做。混合使用 XML 和 Java 配置会使你的应用程序更难维护，因为你需要同时扫描 XML 文件和 Java 类来查找特定的\
  \ Bean。\n*   `@ComponentScan` 定义了 Spring 应扫描哪些包以查找用于 Bean 定义的注解。它与 XML 配置中的 `<context:component-scan>`\
  \ 标签相同。\n*   其他注解的含义不言自明。`@Lazy` 注解指示 Spring 仅在请求时才实例化 Bean（与 XML 中的 `lazy-init=\"\
  true\"` 相同），而 `@DependsOn` 则告诉 Spring 某个 Bean 依赖于其他一些 Bean，因此 Spring 会确保这些 Bean\
  \ 首先被实例化。`@Scope` 注解用于定义 Bean 的作用域。\n*   应用程序基础设施服务也可以在 Java 类中定义。例如，`@EnableTransactionManagement`\
  \ 定义我们将使用 Spring 的事务管理功能，这将在第 12 章中进一步讨论。\n*   你可能还会注意到 `env` 变量的 `@Autowired` 属性，其类型为\
  \ `Environment`。这是 Spring 3.1 提供的 `Environment` 抽象特性。我们将在本章后面讨论它。\n\n再次运行测试程序将产生以下输出：\n\
  \n`Spring 3 Java Configuration Rocks!`\n\n这是 `message.properties` 文件中定义的消息。\n\n\
  #### Java 还是 XML 配置？\n\n正如你所见，使用 Java 类可以实现与 XML 相同级别的 `ApplicationContext` 配置。那么，你应该使用哪一种呢？这类似于我们应该使用\
  \ XML 还是 Java 注解进行 DI 配置的考量。每种方法都有其优缺点。然而，建议是相同的；也就是说，当你和你的团队决定使用哪种方法时，请坚持使用它，并保持配置风格的一致性，而不是分散在\
  \ Java 类和 XML 文件之间。这会使维护工作变得更加困难。\n\n### 配置文件\n\nSpring 3.1 为开发者带来的另一个有趣特性是配置配置文件的概念。基本上，配置文件指示\
  \ Spring 仅在指定配置文件处于活动状态时配置所定义的 `ApplicationContext`。在本节中，我们将通过一个简单程序演示配置文件的使用。\n\
  \n\n\n#### Spring Profiles 功能使用示例\n\n假设有一个名为 `FoodProviderService` 的服务，负责为学校（包括幼儿园和高中）提供食物。`FoodProviderService`\
  \ 接口只有一个名为 `provideLunchSet()` 的方法，该方法会为调用它的学校生成每个学生的午餐套餐。午餐套餐是一个 `Food` 对象列表，`Food`\
  \ 是一个非常简单的类，只有一个 `name` 属性。清单 5-49 展示了 `Food` 类。\n\n***清单 5-49.** `Food` 类*\n\n\
  `package com.apress.prospring3.ch5.profile;`\n\n`public class Food {`\n\n`    private\
  \ String name;`\n\n`    public Food() {`\n`    }`\n\n`    public Food(String name)\
  \ {`\n`        this.name = name;`\n`    }`\n\n`    public String getName() {`\n\
  `        return name;`\n`    }`\n\n`    public void setName(String name) {`\n`        this.name\
  \ = name;`\n`    }`\n`}`\n\n清单 5-50 展示了 `FoodProviderService` 接口。\n\n***清单 5-50.**\
  \ `FoodProviderService` 接口*\n\n`package com.apress.prospring3.ch5.profile;`\n\n\
  `import java.util.List;`\n\n`public interface FoodProviderService {`\n\n`    public\
  \ List<Food> provideLunchSet();`\n\n`}`\n\n现在假设有两个不同的午餐套餐供应商，一个面向幼儿园，一个面向高中。他们提供的午餐套餐不同，尽管他们提供的服务相同，即向学校学生提供午餐。因此，现在我们创建两个不同的\
  \ `FoodProviderService` 实现，使用相同的名称，但将它们放在不同的包中以标识其目标学校。清单 5-51 和 5-52 展示了这两个类。\n\
  \n***清单 5-51.** 幼儿园 `FoodProviderService` 实现*\n\n`package com.apress.prospring3.ch5.profile.kindergarten;`\n\
  \n`import java.util.ArrayList;`\n`import java.util.List;`\n\n`import com.apress.prospring3.ch5.profile.Food;`\n\
  `import com.apress.prospring3.ch5.profile.FoodProviderService;`\n\n`public class\
  \ FoodProviderServiceImpl implements FoodProviderService {`\n\n`    public List<Food>\
  \ provideLunchSet() {`\n`        List<Food> lunchSet = new ArrayList<Food>();`\n\
  `        lunchSet.add(new Food(\"Milk\"));`\n`        lunchSet.add(new Food(\"Biscuits\"\
  ));`\n\n`        return lunchSet;`\n`    }`\n`}`\n\n***清单 5-52.** 高中 `FoodProviderService`\
  \ 实现*\n\n`package com.apress.prospring3.ch5.profile.highschool;`\n\n`import java.util.ArrayList;`\n\
  `import java.util.List;`\n\n`import com.apress.prospring3.ch5.profile.Food;`\n`import\
  \ com.apress.prospring3.ch5.profile.FoodProviderService;`\n\n`public class FoodProviderServiceImpl\
  \ implements FoodProviderService {`\n\n`    public List<Food> provideLunchSet()\
  \ {`\n`        List<Food> lunchSet = new ArrayList<Food>();`\n`        lunchSet.add(new\
  \ Food(\"Coke\"));`\n`        lunchSet.add(new Food(\"Hamburger\"));`\n`        lunchSet.add(new\
  \ Food(\"French Fries\"));`\n\n`        return lunchSet;`\n`    }`\n`}`\n\n从上述清单可以看出，这两个不同的实现提供了相同的\
  \ `FoodProviderService` 接口，但生成了不同的午餐套餐食物组合。现在，假设一所幼儿园希望供应商为其学生配送午餐套餐；让我们看看如何使用 Spring\
  \ 的 profile 配置来实现这一点。我们将首先介绍 XML 配置。\n\n我们将创建两个不同的 XML 配置文件，一个用于幼儿园 profile，另一个用于高中\
  \ profile。清单 5-53 和 5-54 分别展示了幼儿园和高中食物供应商的配置。\n\n***清单 5-53.** 幼儿园的 XML 配置 (`kindergarten-config.xml`)*\n\
  \n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\"\
  `\n`        profile=\"kindergarten\">`\n\n`    <bean id=\"foodProviderService\"\
  `\n`class=\"com.apress.prospring3.ch5.profile.kindergarten.FoodProviderServiceImpl\"\
  />`\n\n`</beans>`\n\n***清单 5-54.** 高中的 XML 配置 (`highschool-config.xml`)*\n\n`<?xml\
  \ version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\"\
  `\n`        profile=\"highschool\">`\n\n`    <bean id=\"foodProviderService\"`\n\
  `class=\"com.apress.prospring3.ch5.profile.highschool.FoodProviderServiceImpl\"\
  />`\n\n`</beans>`\n\n从上述两个配置中，请注意在 `<beans>` 标签内分别使用了 `profile=\"kindergarten\"\
  ` 和 `profile=\"highschool\"`。这实际上是告诉 Spring，只有当指定的 profile 处于 `active`（激活）状态时，文件中的这些\
  \ bean 才应被实例化。现在让我们看看在独立应用程序中使用 Spring 的 `ApplicationContext` 时如何激活正确的 profile。清单\
  \ 5-55 展示了测试程序。\n\n***清单 5-55.** Profile XML 配置示例*\n\n`package com.apress.prospring3.ch5.profile;`\n\
  \n`import java.util.List;`\n\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  \n`public class ProfileXmlConfigExample {`\n\n`    public static void main(String[]\
  \ args) {`\n\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.getEnvironment().setActiveProfiles(\"kindergarten\");`\n`        ctx.load(\"\
  classpath:profile/*-config.xml\");`\n`        ctx.refresh();`\n\n`        FoodProviderService\
  \ foodProviderService =    `\n`            ctx.getBean(\"foodProviderService\",\
  \ FoodProviderService.class);`\n`        List<Food> lunchSet = foodProviderService.provideLunchSet();`\n\
  \n`        for (Food food: lunchSet) {`\n`            System.out.println(\"Food:\
  \ \" + food.getName());`\n`        }`\n\n`    }`\n`}`\n\n在上面的清单中，我们使用 `ctx.getEnvironment().setActiveProfiles()`\
  \ 方法来激活某个 profile。请注意，可以为同一个上下文激活多个 profile（即，你可以通过其 `varargs` 支持向 `setActiveProfile()`\
  \ 方法传递多个 profile 名称）。上面的清单将激活幼儿园 profile。之后，`ctx.load()` 方法将加载 `kindergarten-config.xml`\
  \ 和 `highschool-config.xml`，因为我们向该方法传递了通配符作为前缀。在这种情况下，Spring 将仅根据 `profile` 属性实例化文件\
  \ `kindergarten-config.xml` 中的 bean。运行该程序将产生以下输出：\n\n`Food: Milk`\n`Food: Biscuits`\n\
  \n这正是幼儿园供应商实现将为午餐套餐生成的内容。现在将上面清单中的 profile 字符串更改为 `\"highschool\"`，输出将变为以下内容：\n\n\
  `Food: Coke`\n`Food: Hamburger`\n`Food: French Fries`\n\n所以，现在你看到了它的用法。另一个有趣的事情是，除了以编程方式激活\
  \ profile 之外，你还可以通过传入以下 JVM 参数来指定它：\n\n`-Dspring.profiles.active=\"kindergarten\"\
  `\n\n图 5-2 展示了如何在 STS 中配置 JVM 参数。\n\n![images](img/9781430241072_Fig05-02.jpg)\n\
  \n***图 5-2.** 在 STS 中配置 JVM 参数*\n\n通过传入此参数，我们可以移除设置活动 profile 的那行代码并运行程序。结果与编程方式相同。你可以将\
  \ JVM 参数更改为 `\"highschool\"` 并再次运行程序。\n\n在第 21 章中，我们将讨论如何在 Web 应用程序中使用和激活 profile。\n\
  \n\n\n在使用 Java 配置而非 XML 时，你也可以使用 Profile。接下来看看具体如何操作。与 XML 版本类似，我们开发两个不同的 Java 配置类，并通过\
  \ `@Profile` 注解来定义 Profile。清单 5-56 和 5-57 分别展示了幼儿园和高中学段的 Java 配置文件。\n\n***清单 5-56.**\
  \ 幼儿园的 Profile Java 配置*\n\n`package com.apress.prospring3.ch5.profile;`\n\n`import\
  \ org.springframework.context.annotation.Bean;`\n`import org.springframework.context.annotation.Configuration;`\n\
  `import org.springframework.context.annotation.Profile;`\n\n`import com.apress.prospring3.ch5.profile.kindergarten.FoodProviderServiceImpl;`\n\
  \n`@Configuration`\n`@Profile(value=\"kindergarten\")`\n`public class KindergartenConfig\
  \ {`\n\n`    @Bean`\n`    public FoodProviderService foodProviderService() {`\n\
  `        return new FoodProviderServiceImpl();`\n`    }`\n`}`\n\n***清单 5-57.** 高中学段的\
  \ Profile Java 配置*\n\n`package com.apress.prospring3.ch5.profile;`\n\n`import org.springframework.context.annotation.Bean;`\n\
  `import org.springframework.context.annotation.Configuration;`\n`import org.springframework.context.annotation.Profile;`\n\
  \n`import com.apress.prospring3.ch5.profile.highschool.FoodProviderServiceImpl;`\n\
  \n`@Configuration`\n`@Profile(value=\"highschool\")`\n`public class HighschoolConfig\
  \ {`\n\n`    @Bean`\n`    public FoodProviderService foodProviderService() {`\n\
  `    return new FoodProviderServiceImpl();`\n`    }`\n`}`\n\n可以看到，这两个类只是模仿了我们之前展示的两个\
  \ XML 文件，通过 `@Profile` 注解指定了其所属的相应应用 Profile。接下来，我们实现另一个测试程序，来实际演示 Java Profile\
  \ 配置。清单 5-58 展示了这个测试程序。\n\n***清单 5-58.** Profile Java 配置示例*\n\n`package com.apress.prospring3.ch5.profile;`\n\
  \n`import java.util.List;`\n\n`import org.springframework.context.annotation.AnnotationConfigApplicationContext;`\n\
  \n`public class ProfileJavaConfigExample {`\n\n`    public static void main(String[]\
  \ args) {`\n\n`        AnnotationConfigApplicationContext ctx = new AnnotationConfigApplicationContext();`\n\
  `        ctx.getEnvironment().setActiveProfiles(\"kindergarten\");`\n`        ctx.register(KindergartenConfig.class,\
  \ HighschoolConfig.class);`\n`        ctx.refresh();`\n\n`        FoodProviderService\
  \ foodProviderService =`\n`            ctx.getBean(\"foodProviderService\", FoodProviderService.class);`\n\
  `        List<Food> lunchSet = foodProviderService.provideLunchSet();`\n\n`        for\
  \ (Food food: lunchSet) {`\n`            System.out.println(\"Food: \" + food.getName());`\n\
  `        }`\n\n`    }`\n`}`\n\n在清单 5-58 中，我们使用了 `AnnotationConfigApplicationContext`\
  \ 实现及其 `register()` 方法，从 `KindergartenConfig` 和 `HighschoolConfig` 两个类中注册了 Bean\
  \ 定义。其余代码保持不变。运行该程序，你将看到幼儿园的午餐套餐。\n\n使用 JVM 参数 `spring.profiles.active` 的方式与 XML\
  \ 示例相同。我将留给你自行尝试。示例源代码包含在本书的源代码中。\n\n#### 使用 Profile 的注意事项\n\nSpring 3.1 中的 Profile\
  \ 特性为开发者提供了另一种管理应用运行配置的方式，而此前这通常由构建工具（例如 Maven 的 Profile 支持）完成。构建工具依赖传入的参数，将正确的配置/属性文件打包到\
  \ Java 归档文件（JAR 或 WAR，取决于应用类型）中，然后部署到目标环境。Spring 的 Profile 特性让我们作为应用开发者可以自行定义 Profile，并通过编程方式或传入\
  \ JVM 参数来激活它们。通过使用 Spring 的 Profile 支持，你现在可以使用同一个应用归档文件，在 JVM 启动时传入正确的 Profile 作为参数，从而部署到所有不同的环境。例如，你可以拥有不同\
  \ Profile 组合的应用，如 `(dev, hibernate)`、`(prd, jdbc)` 等，每种组合代表运行环境（开发或生产）以及要使用的数据访问库（Hibernate\
  \ 或 JDBC）。这便将应用 Profile 管理带入了编程层面。\n\n但这种方法也有其缺点。例如，有些人可能会认为，将不同环境的所有配置都放入应用配置文件或\
  \ Java 类中并捆绑在一起，如果处理不当（例如，管理员忘记在其应用服务器环境中设置正确的 JVM 参数），就容易出错。将所有 Profile 的文件打包在一起也会使包比平时稍大一些。同样，请根据应用和配置需求，选择最适合你项目的方法。\n\
  \n\n\n### 环境与 PropertySource 抽象\n\n从前一节中，你已经了解了 Spring 的 profile 特性的用法。要设置激活的 profile，我们需要访问\
  \ `Environment` 接口。`Environment` 接口是 Spring 3.1 中引入的一个新的抽象层；它用于封装运行中的 Spring 应用程序的环境。\n\
  \n除了 profile 之外，`Environment` 接口封装的另一个关键信息是属性（properties）。属性用于存储应用程序的底层环境配置，例如应用程序文件夹的位置、数据库连接信息等。\n\
  \nSpring 3.1 中的 `Environment` 和 `PropertySource` 抽象特性帮助我们开发者从运行平台访问各种配置信息。在这个抽象层之下，所有系统属性、环境变量和应用程序属性都由\
  \ `Environment` 接口提供，Spring 在引导 `ApplicationContext` 时会填充这些信息。代码清单 5-59 展示了一个简单的示例。\n\
  \n***代码清单 5-59.** Spring 环境抽象示例*\n\n`package com.apress.prospring3.ch5.env;`\n\n\
  `import java.util.HashMap;`\n`import java.util.Map;`\n\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  `import org.springframework.core.env.ConfigurableEnvironment;`\n`import org.springframework.core.env.MapPropertySource;`\n\
  `org.springframework.core.env.MutablePropertySources;`\n\n`public class EnvironmentSample\
  \ {`\n\n`    public static void main(String[] args) {`\n\n`        GenericXmlApplicationContext\
  \ ctx = new GenericXmlApplicationContext();`\n`        ctx.refresh();`\n\n`        ConfigurableEnvironment\
  \ env = ctx.getEnvironment();`\n`        MutablePropertySources propertySources\
  \ = env.getPropertySources();`\n`        Map appMap = new HashMap();`\n`        appMap.put(\"\
  application.home\", \"/etc/prospring3/home\");`\n`        propertySources.addLast(new\
  \ MapPropertySource(\"PROSPRING3_MAP\", appMap));`\n\n`        System.out.println(\"\
  user.home: \" + System.getProperty(\"user.home\"));`\n`        System.out.println(\"\
  JAVA_HOME: \" + System.getenv(\"JAVA_HOME\"));`\n\n`        System.out.println(\"\
  user.home: \" + env.getProperty(\"user.home\"));`\n`        System.out.println(\"\
  JAVA_HOME: \" + env.getProperty(\"JAVA_HOME\"));`\n`        System.out.println(\"\
  application.home: \" + env.getProperty(\"application.home\"));`\n`    }`\n`}`\n\n\
  从代码清单 5-59 中可以看到，在 `ApplicationContext` 初始化之后，我们获取了一个 `ConfigurableEnvironment`\
  \ 接口的引用。通过该接口，我们获得了 `MutablePropertySources`（`PropertySources` 接口的一个默认实现，允许操作其中包含的属性源）的句柄。之后，我们构建了一个\
  \ map，将应用程序属性放入其中，然后用这个 map 构建了一个 `MapPropertySource` 类（一个 `PropertySource` 的子类，它从\
  \ `Map` 实例中读取键和值）。最后，通过 `addLast()` 方法将 `MapPropertySource` 类添加到 `MutablePropertySources`\
  \ 中。\n\n让我们运行这个程序，将会打印出以下内容：\n\n`user.home: C:\\Users\\Clarence`\n`JAVA_HOME: C:\
  \ \\Program Files\\Java\\jdk1.6.0_27`\n`user.home: C: \\Users\\Clarence`\n`JAVA_HOME:\
  \ C: \\Program Files\\Java\\jdk1.6.0_27`\n`application.home: /etc/prospring3/home`\n\
  \n对于前两行，我们像之前一样（通过使用 JVM 的 `System` 类）检索了 JVM 系统属性 `user.home` 和环境变量 `JAVA_HOME`。然而，对于最后三行，你可以看到所有系统属性、环境变量和应用程序属性都可以通过\
  \ `Environment` 接口访问。你可以看到 `Environment` 抽象如何帮助我们管理和访问应用程序运行环境中的所有各种属性。\n\n对于 `PropertySource`\
  \ 抽象，Spring 将按以下默认顺序访问属性：\n\n*   运行中 JVM 的系统属性\n*   环境变量\n*   应用程序定义的属性\n\n因此，举例来说，假设我们定义了相同的应用程序属性\
  \ `user.home`，并通过 `MutablePropertySources` 类将其添加到 `Environment` 接口中。如果你运行程序，你仍然会看到\
  \ `user.home` 是从 JVM 属性中检索到的，而不是你的属性。但是，Spring 允许你控制 `Environment` 检索属性的顺序。让我们稍微修改一下代码清单\
  \ 5-59，看看它是如何工作的。代码清单 5-60 展示了修改后的版本（差异部分以粗体突出显示）。\n\n***代码清单 5-60.** Spring 环境抽象示例（修订版）*\n\
  \n`// 代码省略`\n`public class EnvironmentSample {`\n\n`    public static void main(String[]\
  \ args) {`\n\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.refresh();`\n\n`        ConfigurableEnvironment env = ctx.getEnvironment();`\n\
  `        MutablePropertySources propertySources = env.getPropertySources();`\n`        Map\
  \ appMap = new HashMap();`\n`        appMap.put(\"`**`user.home`**`\", \"/etc/prospring3/home\"\
  );`\n`        propertySources.`**`addFirst`**`(new MapPropertySource(\"PROSPRING3_MAP\"\
  , appMap));`\n\n`        System.out.println(\"user.home: \" + System.getProperty(\"\
  user.home\"));`\n`        System.out.println(\"JAVA_HOME: \" + System.getenv(\"\
  JAVA_HOME\"));`\n\n`        System.out.println(\"user.home: \" + env.getProperty(\"\
  user.home\"));`\n`        System.out.println(\"JAVA_HOME: \" + env.getProperty(\"\
  JAVA_HOME\"));`\n`    }`\n`}`\n\n对于代码清单 5-60，我们定义了一个同样名为 `user.home` 的应用程序属性，并通过\
  \ `MutablePropertySources` 类的 `addFirst()` 方法将其添加为第一个要搜索的属性。当你运行程序时，你将看到以下输出：\n\n\
  `user.home: C:\\Users\\Clarence`\n`JAVA_HOME: C:\\Program Files\\Java\\jdk1.6.0_27`\n\
  `user.home: /etc/prospring3/home`\n`JAVA_HOME: C:\\Program Files\\Java\\jdk1.6.0_27`\n\
  \n前两行保持不变，因为我们仍然使用 JVM `System` 类的 `getProperty()` 和 `getenv()` 方法来检索它们。然而，当使用 `Environment`\
  \ 接口时，你会看到我们定义的 `user.home` 属性优先，因为我们将其定义为第一个要搜索属性值的来源。\n\n在实际应用中，你很少需要直接与 `Environment`\
  \ 接口交互，而是会使用 `${}` 形式的属性占位符（例如 `${application.home}`），并将解析后的值注入到 Spring Bean 中。让我们看看实际效果。\n\
  \n假设我们有一个类，用于存储从属性文件加载的所有应用程序属性。代码清单 5-61 展示了 `AppProperty` 类。\n\n***代码清单 5-61.**\
  \ Spring 属性占位符示例*\n\n`package com.apress.prospring3.ch5.env;`\n\n`public class AppProperty\
  \ {`\n\n`    private String applicationHome;`\n\n`    private String userHome;`\n\
  \n`    public String getApplicationHome() {`\n`        return applicationHome;`\n\
  `    }`\n\n`    public void setApplicationHome(String applicationHome) {`\n`        this.applicationHome\
  \ = applicationHome;`\n`    }`\n\n`    public String getUserHome() {`\n`        return\
  \ userHome;`\n`    }`\n\n`    public void setUserHome(String userHome) {`\n`        this.userHome\
  \ = userHome;`\n`    }`\n`}`\n\n这个类没什么特别的。代码清单 5-62 是存储运行中应用程序属性的 `application.properties`\
  \ 文件。\n\n***代码清单 5-62.** `application.properties` 文件*\n\n`application.home=/etc/prospring3/home`\n\
  `user.home=/clarence/home`\n\n请注意，属性文件也声明了 `user.home` 属性。让我们看一下 Spring XML 配置（参见代码清单\
  \ 5-63，即 `env/env.xml` 文件）。\n\n***代码清单 5-63.** Spring 属性占位符配置*\n\n`<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\n\n\n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n\
  `      http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n`      http://www.springframework.org/schema/context`\n\
  `      http://www.springframework.org/schema/context/spring-context-3.1.xsd\">`\n\
  \n`    <context:property-placeholder location=\"classpath:env/application.properties\"\
  />`\n\n`    <bean id=\"appProperty\" class=\"com.apress.prospring3.ch5.env.AppProperty\"\
  >`\n`        <property name=\"applicationHome\" value=\"${application.home}\"/>`\n\
  `        <property name=\"userHome\" value=\"${user.home}\"></property>`\n`    </bean>`\n\
  \n`</beans>`\n\n我们使用 `<context:property-placeholder>` 标签将属性加载到 Spring 的 `Environment`\
  \ 中，该接口被封装在 `ApplicationContext` 接口内。我们还使用占位符将值注入到 `AppProperty` bean 中。清单 5-64\
  \ 展示了测试程序。\n\n***清单 5-64.** Spring 属性占位符测试*\n\n`package com.apress.prospring3.ch5.env;`\n\
  \n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\n\
  `public class PlaceHolderSample {`\n\n`    public static void main(String[] args)\
  \ {`\n\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:env/env.xml\");`\n`        ctx.refresh();`\n\n`        AppProperty\
  \ appProperty = ctx.getBean(\"appProperty\", AppProperty.class);`\n\n`        System.out.println(\"\
  application.home: \" + appProperty.getApplicationHome());`\n`        System.out.println(\"\
  user.home: \" + appProperty.getUserHome());`\n`    }`\n`}`\n\n运行该程序，你将看到以下输出：\n\n\
  `application.home: /etc/prospring3/home`\n`user.home: C:\\Users\\Clarence`\n\n你会看到\
  \ `application.home` 占位符被正确解析，而 `user.home` 属性仍然从 JVM 属性中获取，这是正确的，因为这是 `PropertySource`\
  \ 抽象的默认行为。为了指示 Spring 优先使用 `application.properties` 文件中的值，我们向 `<context:property-placeholder>`\
  \ 标签添加了 `local-override=\"true\"` 属性。\n\n`<context:property-placeholder local-override=”true”`\n\
  `    location=\"classpath:env/application.properties\"/>`\n\n`local-override` 属性指示\
  \ Spring 使用此占位符中定义的属性覆盖现有属性。运行程序，你会看到现在从 `application.properties` 文件中获取了 `user.home`\
  \ 属性。\n\n`application.home: /etc/prospring3/home`\n`user.home: /clarence/home`\n\
  \n从前两节可以看出，Spring 3.1 中通过 `Environment` 接口提供的 profile 和属性源抽象，为我们提供了一种强大且集中的方式来管理应用程序环境的配置。\n\
  \n### 使用 JSR-330 注解进行配置\n\n正如我们在第 1 章中讨论的，JEE 6 提供了对 JSR-330（Java 依赖注入）的支持，这是一组用于在\
  \ JEE 容器或其他兼容的 IoC 框架中表达应用程序 DI 配置的注解。Spring 也支持并识别这些注解，因此即使你的应用程序不在 JEE 6 容器中运行，你仍然可以在\
  \ Spring 中使用 JSR-330 注解。使用 JSR-330 注解可以帮助你轻松地将应用程序从 Spring 迁移到 JEE 6 容器或其他兼容的 IoC\
  \ 容器（例如 Google Guice）。\n\n再次以消息渲染器和消息提供者为例，使用 JSR-330 注解来实现。\n\n为了支持 JSR-330 注解，你需要向项目添加一个依赖项，如表\
  \ 5-5 所示。\n\n![images](img/t0505.jpg)\n\n接口类（`MessageRenderer` 和 `MessageProvider`）保持不变，为了节省篇幅，此处不再列出。清单\
  \ 5-65 展示了 `ConfigurableMessageProvider` 的实现。\n\n***清单 5-65.** `ConfigurableMessageProvider`（JSR-330）*\n\
  \n`package com.apress.prospring3.ch5.jsr330;`\n\n`import javax.inject.Inject;`\n\
  `import javax.inject.Named;`\n\n`@Named(\"messageProvider\")`\n`public class ConfigurableMessageProvider\
  \ implements MessageProvider {`\n\n`    private String message = \"Default message\"\
  ;`\n\n`    public ConfigurableMessageProvider() {`\n`    }`\n\n`    @Inject`\n`    @Named(\"\
  message\")`\n`    public ConfigurableMessageProvider(String message) {`\n`        this.message\
  \ = message;`\n`    }`\n\n`    public void setMessage(String message) {`\n`        this.message\
  \ = message;`\n`    }`\n\n`    public String getMessage() {`\n`        return message;`\n\
  `    }`\n`}`\n\n你会注意到所有注解都属于 `javax.inject` 包，这是 JSR-330 标准。该类在两处使用了 `@Named`。首先，它可用于声明一个可注入的\
  \ bean（与 Spring 中的 `@Component` 或 `@Service` 注解相同）。在清单中，`@Named(\"messageProvider\"\
  )` 注解指定 `ConfigurableMessageProvider` 是一个可注入的 bean，并为其指定名称 `messageProvider`，这与\
  \ Spring 的 `<bean>` 标签中的 `name` 属性相同。其次，我们通过在接受字符串值的构造函数前使用 `@Inject` 注解来实现构造函数注入。然后，我们使用\
  \ `@Named` 来指定要注入具有名称 `message` 的值。接下来，让我们看看清单 5-66 中的 `StandardOutMessageRenderer`\
  \ 类。\n\n***清单 5-66.** `StandardOutMessageRenderer`（JSR-330）*\n\n`package com.apress.prospring3.ch5.jsr330;`\n\
  \n`import javax.inject.Inject;`\n`import javax.inject.Named;`\n`import javax.inject.Singleton;`\n\
  \n`@Named(\"messageRenderer\")`\n`@Singleton`\n`public class StandardOutMessageRenderer\
  \ implements MessageRenderer {`\n\n`   @Inject`\n`   @Named(\"messageProvider\"\
  )`\n`   private MessageProvider messageProvider = null;`\n\n`   public void render()\
  \ {`\n`      if (messageProvider == null) {`\n`         throw new RuntimeException(`\n\
  `            \"You must set the property messageProvider of class:\"`\n`            +\
  \ StandardOutMessageRenderer.class.getName());`\n`      }`\n\n`      System.out.println(messageProvider.getMessage());`\n\
  `   }`\n\n`   public void setMessageProvider(MessageProvider provider) {`\n`      this.messageProvider\
  \ = provider;`\n`   }`\n\n`   public MessageProvider getMessageProvider() {`\n`      return\
  \ this.messageProvider;`\n`   }`\n`}`\n\n\n\n在代码清单 5-66 中，我们使用 `@Named` 来定义它是一个可注入的\
  \ Bean。请注意 `@Singleton` 注解。值得注意的是，在 JSR-330 标准中，Bean 的默认作用域是非单例的，这类似于 Spring 的原型作用域。因此，在\
  \ JSR-330 环境中，如果你希望 Bean 是单例的，就需要使用 `@Singleton` 注解。然而，在 Spring 中使用此注解实际上没有任何效果，因为\
  \ Spring 的 Bean 实例化默认作用域已经是单例了。我们在此处只是为了演示，并且值得注意 Spring 与其他兼容 JSR-330 的容器之间的区别。\n\
  \n对于 `messageProvider` 属性，这次我们使用 `@Inject` 进行 Setter 注入，并指定应使用名为 `messageProvider`\
  \ 的 Bean 进行注入。\n\n代码清单 5-67 定义了应用程序的一个简单 Spring XML 配置（`jsr330/jsr330.xml`）。\n\n\
  ***代码清单 5-67.** Spring XML 配置 (JSR-330)*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"\
  ?>`\n`<beans`\n\n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n\
  `     http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n`     http://www.springframework.org/schema/context`\n\
  `     http://www.springframework.org/schema/context/spring-context-3.1.xsd\">`\n\
  \n`    <context:component-scan base-package=\"com.apress.prospring3.ch5.jsr330\"\
  />`\n\n`    <bean id=\"message\" class=\"java.lang.String\">`\n`        <constructor-arg\
  \ value=\"You are running JSR330!\"/>`\n`    </bean>`\n\n`</beans>`\n\n你不需要任何特殊标签来使用\
  \ JSR-330；只需像配置普通 Spring 应用程序一样配置你的应用即可。我们使用 `<context:component-scan>` 来指示 Spring\
  \ 扫描与 DI 相关的注解，Spring 会识别这些 JSR-330 注解。我们还声明了一个名为 `message` 的 Spring Bean，用于对 `ConfigurableMessageProvider`\
  \ 类进行构造器注入。代码清单 5-68 展示了测试程序。\n\n***代码清单 5-68.** JSR-330 示例*\n\n`package com.apress.prospring3.ch5.jsr330;`\n\
  \n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\n\
  `public class Jsr330Example {`\n\n`    public static void main(String[] args) {`\n\
  \n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:jsr330/jsr330.xml\");`\n`        ctx.refresh();`\n\
  \n`        MessageRenderer renderer = ctx.getBean(\"messageRenderer\", MessageRenderer.class);`\n\
  `        renderer.render();`\n`    }`\n`}`\n\n这与之前的示例相同。运行该程序将产生以下输出：\n\n`You are\
  \ running JSR330!`\n\n通过使用 JSR-330，你可以更轻松地迁移到其他兼容 JSR-330 的 IoC 容器（例如，兼容 JEE-6 的应用服务器、其他\
  \ DI 容器如 Google Guice 等）。然而，Spring 的注解比 JSR-330 注解功能更丰富、更灵活。这里突出强调了一些主要区别：\n\n*\
  \   使用 Spring 的 `@Autowired` 注解时，你可以指定一个 `required` 属性来指示 DI 必须被满足（你也可以使用 Spring\
  \ 的 `@Required` 注解来声明此需求），而对于 JSR-330 的 `@Inject` 注解，则没有等效的功能。此外，Spring 提供了 `@Qualifier`\
  \ 注解，它允许 Spring 基于限定符名称对依赖项进行更细粒度的自动装配控制。\n*   JSR-330 仅支持单例和非单例 Bean 作用域，而 Spring\
  \ 支持更多作用域，这对于 Web 应用程序非常有用。\n*   在 Spring 中，你可以使用 `@Lazy` 注解来指示 Spring 仅在应用程序请求时才实例化\
  \ Bean。JSR-330 中没有等效的功能。\n\n你也可以在同一个应用程序中混合使用 Spring 和 JSR-330 注解。但是，建议你选择其中一种，以保持应用程序风格的一致性。一种可能的方法是尽可能使用\
  \ JSR-330 注解，并在需要时使用 Spring 注解。然而，这带来的好处较少，因为迁移到另一个 DI 容器时你仍然需要做相当多的工作。总之，鉴于 Spring\
  \ 的注解功能强大得多，推荐使用 Spring 的注解方法而非 JSR-330 注解，除非你的应用程序有要求必须独立于 IoC 容器。\n\n### 本章小结\n\
  \n在本章中，你看到了大量 Spring 特有的功能，这些功能补充了核心 IoC 能力。你了解了如何挂接到 Bean 的生命周期中，并使其感知 Spring 环境。我们介绍了\
  \ `FactoryBean`，作为对更广泛的类启用 IoC 的解决方案。我们还探讨了如何使用 `PropertyEditor` 来简化应用程序配置，并消除对人为的字符串类型属性的需求。此外，我们深入研究了\
  \ `ApplicationContext` 提供的一些额外功能，包括国际化、事件发布和资源访问。\n\n我们还介绍了一些在 Spring 3.0 和 3.1\
  \ 中引入的最新特性，例如使用 Java 类代替 XML 配置、Profile 支持，以及环境和属性源抽象层。最后，我们讨论了在 Spring 中使用 JSR-330\
  \ 标准注解。\n\n到目前为止，我们已经介绍了 Spring 框架的主要概念及其作为 DI 容器的特性，以及核心 Spring 框架提供的其他服务。从下一章开始，我们将讨论\
  \ Spring 在不同特定领域的应用，例如 AOP、数据访问、事务支持、Web 应用程序支持等。\n\n## 第 6 章\n\n\n\n## 介绍 Spring\
  \ AOP\n\n除了依赖注入（DI）之外，Spring 框架为开发者社区带来的另一个核心特性是面向切面编程（AOP）。尽管过去 AOP 难以学习、理解和实现，但得益于\
  \ Spring 在框架内部对 AOP 的深入使用以及其提供的简化 AOP 编程模型，AOP 已成为开发者在日常开发中使用的技术，尤其是在开发基于 Spring\
  \ 的应用时。AOP 常被称为实现横切关注点的工具。当你“穿透”那些陌生的术语时，你会发现 AOP 用于模块化独立的逻辑片段（称为*关注点*），并将这些关注点应用到应用程序的多个部分。日志记录和安全性是许多应用程序中横切关注点的典型示例。考虑一个为调试目的而记录每个方法开始和结束的应用程序。你可能会将日志代码重构到一个专门的类中，但为了执行日志记录，你仍然需要在应用程序中每个方法内调用该类两次。使用\
  \ AOP，你可以简单地指定希望在应用程序中每个方法调用之前和之后调用日志类中的方法。\n\n理解 AOP 是对 OOP 的补充而非竞争非常重要。OOP 非常擅长解决我们作为程序员遇到的各类问题。然而，如果你再次审视日志记录的例子，可以清楚地看到\
  \ OOP 在实现大规模横切逻辑方面存在不足。单独使用 AOP 来开发整个应用程序几乎是不可能的，因为 AOP 是在 OOP 之上运行的。同样，虽然完全可以使用\
  \ OOP 开发整个应用程序，但通过使用 AOP 来解决涉及横切逻辑的某些问题，你可以更聪明地工作。\n\n我们将在本章和下一章中介绍 AOP。具体来说，本章涵盖以下主题：\n\
  \n*   *AOP 基础*：在开始讨论 Spring 的 AOP 实现之前，我们先介绍 AOP 作为一项技术的基础知识。本节涵盖的大多数概念并非 Spring\
  \ 特有，在任何 AOP 实现中都能找到。如果你已经熟悉其他 AOP 实现，可以跳过本节。\n*   *AOP 的类型*：AOP 有两种不同的类型：静态和动态。在静态\
  \ AOP 中（例如 AspectJ 的 [`http://eclipse.org/aspectj/`](http://eclipse.org/aspectj/)\
  \ 编译时织入机制），横切逻辑在编译时应用到你的代码中，如果不修改代码并重新编译，就无法更改。而在动态 AOP 中（例如 Spring AOP），横切逻辑在运行时动态应用。这允许你在不重新编译应用程序的情况下更改横切逻辑的分布。这两种\
  \ AOP 类型是互补的，当一起使用时，它们会形成一种强大的组合，你可以在应用程序中使用。\n\n![images](img/square.jpg) **注意**  静态和动态\
  \ AOP 与静态和动态横切概念是不同的。静态和动态横切之间的区别主要是学术性的，与 Spring AOP 无关。关于此主题以及整个 AOP 的更多信息，我们推荐阅读\
  \ Ramnivas Laddad 所著的 *AspectJ in Action: Enterprise AOP with Spring Applications*\
  \ 第二版（Manning, 2010）。\n\n*   *Spring AOP 架构*：在本节中，我们将深入探讨 Spring AOP 实现的细节。Spring\
  \ AOP 只是其他实现（如 AspectJ）中完整 AOP 功能集的一个子集。在本节中，我们将从高层次审视 Spring 中存在的功能、它们是如何实现的，以及为什么某些功能被排除在\
  \ Spring 实现之外。\n*   *Spring AOP 中的代理*：代理是 Spring AOP 工作原理的重要组成部分，你必须理解它们才能充分利用 Spring\
  \ AOP。在本节中，我们将介绍两种代理：JDK 动态代理和 CGLIB 代理。具体来说，我们将探讨 Spring 在不同场景下使用每种代理的情况、两种代理类型的性能，以及在应用程序中遵循的一些简单指南，以便从\
  \ Spring AOP 中获得最大收益。\n*   *使用 Spring AOP*：在本节中，我们将提供一些 AOP 使用的实际示例。我们从简单的“Hello\
  \ World”示例开始，让你轻松进入 Spring 的 AOP 代码，然后继续详细描述 Spring 中可用的不同 AOP 功能，并附有示例。\n\n在本章中，我们将\
  \ Spring AOP 与框架的其他部分隔离开来介绍。在第 7 章中，我们将从更面向框架的角度来看待 Spring AOP，包括如何使用 `ApplicationContext`\
  \ 配置 AOP。\n\n### AOP 概念\n\n与大多数技术一样，AOP 有其自己特定的概念和术语。在我们解释如何在应用程序中使用 AOP 之前，理解这些术语的含义非常重要。以下列表解释了\
  \ AOP 的核心概念：\n\n*   *连接点*：连接点是应用程序执行过程中的一个明确定义的点。典型的连接点示例包括方法调用、方法调用本身、类初始化和对象实例化。连接点是\
  \ AOP 的核心概念，定义了应用程序中可以使用 AOP 插入额外逻辑的点。\n*   *通知*：在特定连接点执行的代码就是通知。有许多不同类型的通知，例如*前置通知*（在连接点之前执行）和*后置通知*（在连接点之后执行）。在\
  \ OOP 中，通知以类中方法的形式出现。\n*   *切点*：切点是连接点的集合，用于定义通知应在何时执行。通过创建切点，你可以精细地控制如何将通知应用到应用程序中的组件。如前所述，典型的连接点是方法调用。典型的切点是特定类中所有方法调用的集合。通常，你可以通过复杂的关系组合切点，以进一步约束通知的执行时机。我们将在下一章更详细地讨论切点组合。\n\
  *   *切面*：切面是通知和切点的组合。这种组合定义了应包含在应用程序中的逻辑以及应在何处执行的逻辑定义。\n*   *织入*：这是将切面实际插入到应用程序代码中适当位置的过程。对于编译时\
  \ AOP 解决方案，这自然是在编译时完成的，通常是构建过程中的一个额外步骤。同样，对于运行时 AOP 解决方案，织入过程在运行时动态执行。AspectJ 支持另一种称为*加载时织入*（LTW）的织入机制，它会拦截底层\
  \ JVM 类加载器，并在字节码被类加载器加载时提供织入。\n*   *目标*：其执行流程被某个 AOP 过程修改的对象称为目标对象。你经常会看到目标对象被称为被通知对象。\n\
  *   *引入*：这是通过向对象引入额外方法或字段来修改其结构的过程。你可以使用引入使任何对象实现特定接口，而无需该对象的类显式实现该接口。\n\n如果你觉得这些概念令人困惑，不必担心；当你看到一些示例时，一切都会变得清晰。同时，请注意，在\
  \ Spring AOP 中，你无需直接处理许多这些概念，并且由于 Spring 的实现选择，有些概念并不相关。随着本章的深入，我们将在 Spring 的上下文中讨论这些特性中的每一个。\n\
  \n\n\n### AOP 的类型\n\n正如我们之前提到的，AOP 有两种不同的类型：静态和动态。它们之间的区别实际上在于织入过程发生的时机以及实现方式。\n\
  \n#### 静态 AOP\n\n许多早期的 AOP 实现都是静态的。在静态 AOP 中，织入过程构成了应用程序构建过程中的另一个步骤。用 Java 术语来说，在静态\
  \ AOP 实现中，你通过修改应用程序的实际字节码，根据需要更改和扩展应用程序代码来实现织入过程。显然，这是一种性能良好的织入方式，因为最终结果只是 Java\
  \ 字节码，你无需在运行时执行任何特殊技巧来判断何时应执行通知。\n\n这种机制的缺点是，你对切面所做的任何修改，即使只是想添加另一个连接点，都需要重新编译整个应用程序。AspectJ\
  \ 的编译时织入就是静态 AOP 实现的一个绝佳示例。\n\n#### 动态 AOP\n\n像 Spring AOP 这样的动态 AOP 实现与静态 AOP 实现的不同之处在于，织入过程是在运行时动态执行的。实现方式取决于具体实现，但正如你将看到的，Spring\
  \ 采用的方法是为所有被通知的对象创建代理，从而允许根据需要调用通知。动态 AOP 的一个小缺点是，通常它的性能不如静态 AOP，但其性能正在稳步提升。动态 AOP\
  \ 实现的主要优点是，你可以轻松地修改应用程序的整个切面集，而无需重新编译主应用程序代码。\n\n#### 选择 AOP 类型\n\n选择使用静态还是动态 AOP\
  \ 实际上是一个相当困难的决定。你没有理由只选择一种实现，因为两者各有优势。事实上，从 2.0 版本开始，Spring 就已经提供了与 AspectJ 的紧密集成，让你可以轻松地同时使用这两种类型的\
  \ AOP。通常，静态 AOP 实现存在的时间更长，它们往往拥有更丰富的功能实现，并提供更多可用的连接点。确实，Spring 只支持 AspectJ 可用功能的一个子集。通常，如果性能至关重要，或者你需要\
  \ Spring 中未实现的 AOP 功能，那么你将需要使用 AspectJ。在大多数其他情况下，Spring AOP 对于你想要实现的目标来说是理想的选择。请确保你了解\
  \ Spring 中已经提供了许多基于 AOP 的功能，例如声明式事务管理。使用 AspectJ 重新实现这些功能是浪费时间和精力的，尤其是 Spring 已经为你准备好了久经考验的实现。\n\
  \n最重要的是，让应用程序的需求驱动你对 AOP 实现的选择，如果组合使用多种实现更适合你的应用程序，则不要将自己局限于单一实现。总的来说，我们发现 Spring\
  \ AOP 比 AspectJ 更简单，因此它往往是我们的首选。如果我们发现 Spring AOP 无法满足我们的需求，或者在应用程序调优过程中发现性能不佳（例如，使用\
  \ Java 分析器分析应用程序时，分析结果表明大量时间花费在 Spring 为定义的切面生成动态代理上），那么我们会转而使用 AspectJ。\n\n###\
  \ Spring 中的 AOP\n\n你可以将 Spring 的 AOP 实现视为由两个逻辑部分组成。第一部分是 AOP 核心，它提供了完全解耦、纯编程式的 AOP\
  \ 功能（Spring 称之为 Spring AOP API）。AOP 实现的第二部分是一组框架服务，这些服务使得在应用程序中更容易使用 AOP。除此之外，Spring\
  \ 的其他组件，如事务管理器和 EJB 辅助类，提供了基于 AOP 的服务，以简化应用程序的开发。在本章中，我们只关注 AOP 核心的基础知识。框架服务和核心的高级功能将在第\
  \ 7 章中介绍。\n\nSpring AOP 实际上是完整 AOP 功能集的一个子集，只实现了像 AspectJ 这样的实现中可用的一小部分构造。但是，不要误以为\
  \ Spring AOP 没有用。实际上，Spring AOP 最强大的方面之一在于它使用起来非常简单，因为它没有包含那些你通常不需要的多余功能。只实现 AOP\
  \ 功能集的一个子集是 Spring 的一个特定设计目标，这使得 Spring 能够专注于对 AOP 最常见功能的简单访问。为了确保你不会缺少所需的 AOP 功能，Spring\
  \ 的设计者将 Spring 设计为与 AspectJ 完全集成。\n\n#### AOP 联盟\n\nAOP 联盟（[`http://aopalliance.sourceforge.net/`](http://aopalliance.sourceforge.net/)）是许多开源\
  \ AOP 项目（包括 Spring 的 Rod Johnson）的代表共同努力的结果，旨在为 AOP 实现定义一套标准接口。AOP 联盟非常保守，在 AOP\
  \ 仍在发展之际，抵制了过度约束 AOP 的诱惑，因此，它只为 AOP 功能的一个子集定义了接口。在适用的情况下，Spring 使用 AOP 联盟的接口，而不是定义自己的接口。这允许你在支持\
  \ AOP 联盟接口的多个 AOP 实现中重用某些通知。\n\n\n\n#### AOP 中的“Hello World！”\n\n在深入讨论 Spring AOP\
  \ 的实现细节之前，我们想先展示一个简单的示例，为这些讨论提供一些背景。在这个示例中，我们使用一个简单的类来输出“World”消息，然后通过 AOP，在运行时转换该类的实例，使其输出“Hello\
  \ World！”。清单 6-1 展示了基本的 `MessageWriter` 类。\n\n***清单 6-1.** `MessageWriter` 类*\n\n\
  `package com.apress.prospring3.ch6;`\n\n`public class MessageWriter {`\n\n`    public\
  \ void writeMessage() {`\n`        System.out.print(\"World\");`\n`    }`\n`}`\n\
  \n`MessageWriter` 类没什么特别之处；它只有一个方法，向控制台输出“World”消息。我们想要增强（即添加通知）这个类，使得 `writeMessage()`\
  \ 方法实际上输出“Hello World！”。\n\n为此，我们需要在方法体执行之前执行一些代码来输出“Hello”，并在方法体执行之后执行一些代码来输出“！”。用\
  \ AOP 的术语来说，我们需要的是一个*环绕*通知——即，在连接点周围执行的通知。在这个例子中，连接点就是 `writeMessage()` 方法的调用。清单\
  \ 6-2 展示了环绕通知 `MessageDecorator` 类的实现。\n\n***清单 6-2.** 实现环绕通知*\n\n`package com.apress.prospring3.ch6;`\n\
  \n`import org.aopalliance.intercept.MethodInterceptor;`\n`import org.aopalliance.intercept.MethodInvocation;`\n\
  \n`public class MessageDecorator implements MethodInterceptor {`\n\n`    public\
  \ Object invoke(MethodInvocation invocation) throws Throwable {`\n`        System.out.print(\"\
  Hello \");`\n`        Object retVal = invocation.proceed();`\n`        System.out.println(\"\
  !\");`\n`        return retVal;`\n`    }`\n`}`\n\n`MethodInterceptor` 接口是 AOP Alliance\
  \ 的标准接口，用于为方法调用连接点实现环绕通知。`MethodInvocation` 对象代表被通知的方法调用，通过使用该对象，我们可以控制方法调用实际何时进行。由于这是环绕通知，我们本质上可以在方法调用之前执行一些操作，以及在方法调用之后、返回之前执行一些操作。在清单\
  \ 6-2 中，我们简单地先向控制台输出“Hello”，然后通过调用 `MethodInvocation.proceed()` 来调用方法，最后再向控制台输出“！”。\n\
  \n此示例的最后一步是将 `MessageDecorator` 通知（更具体地说，是 `invoke()` 方法）织入到代码中。为此，我们创建一个目标对象 `MessageWriter`\
  \ 的实例，然后创建该实例的代理，并指示代理工厂织入 `MessageDecorator` 通知。如清单 6-3 所示。\n\n***清单 6-3**. 织入\
  \ `MessageDecorator` 通知*\n\n`package com.apress.prospring3.ch6;`\n\n`import org.springframework.aop.framework.ProxyFactory;`\n\
  \n`public class HelloWorldAOPExample {`\n\n`    public static void main(String[]\
  \ args) {`\n`        MessageWriter target = new MessageWriter();`\n\n`        //\
  \ 创建代理`\n`        ProxyFactory pf = new ProxyFactory();`\n\n`        pf.addAdvice(new\
  \ MessageDecorator());`\n`        pf.setTarget(target);`\n\n`        MessageWriter\
  \ proxy = (MessageWriter) pf.getProxy();`\n\n`        // 写入消息 target.writeMessage();`\n\
  `        target.writeMessage();`\n`        System.out.println(\"\");`\n`        proxy.writeMessage();`\n\
  `    }`\n`}`\n\n这里的关键部分是我们使用 `ProxyFactory` 类来创建目标对象的代理，同时织入通知。我们通过调用 `addAdvice()`\
  \ 将 `MessageDecorator` 通知传递给 `ProxyFactory`，并通过调用 `setTarget()` 指定要织入的目标。一旦设置了目标并向\
  \ `ProxyFactory` 添加了通知，我们就通过调用 `getProxy()` 生成代理。最后，我们在原始目标对象和代理对象上都调用 `writeMessage()`。在运行程序之前，我们需要将\
  \ CGLIB 的依赖项添加到项目中，如表 6-1 所示。\n\n![images](img/t0601.jpg)\n\n添加依赖项后，我们现在可以运行清单 6-3\
  \ 中的程序。以下是运行此示例的结果：\n\n`World`\n`Hello World!`\n\n如您所见，在未经修改的目标对象上调用 `writeMessage()`\
  \ 会执行标准的方法调用，并且没有向控制台输出额外内容。然而，对代理的调用导致 `MessageDecorator` 中的代码被执行，从而产生了期望的输出“Hello\
  \ World！”。从这个示例中，您可以看到被通知的类对 Spring 或 AOP Alliance 接口没有任何依赖；Spring AOP（实际上也是广义上的\
  \ AOP）的美妙之处在于，您可以增强几乎任何类，即使该类在创建时并未考虑 AOP。唯一的限制（至少在 Spring AOP 中）是，您不能增强 final 类，因为它们无法被重写，因此也无法被代理。\n\
  \n#### Spring AOP 架构\n\nSpring AOP 的核心架构基于代理。当您想要创建一个类的增强实例时，必须使用 `ProxyFactory`\
  \ 类来创建该类实例的代理，首先向 `ProxyFactory` 提供所有您希望织入代理的切面。使用 `ProxyFactory` 是一种纯编程式的创建 AOP\
  \ 代理的方法。在大多数情况下，您不需要在应用程序中使用它；相反，您可以依赖 Spring 提供的声明式 AOP 配置机制（`ProxyFactoryBean`\
  \ 类、`aop` 命名空间和 @AspectJ 风格的注解）来提供声明式的代理创建。然而，理解代理创建的工作原理非常重要。在本章的剩余部分，我们将使用编程式方法来创建代理。在下一章中，我们将讨论如何使用\
  \ Spring 的声明式 AOP 配置。\n\n在运行时，Spring 会分析为 `ApplicationContext` 中的 Bean 定义的横切关注点，并动态生成代理\
  \ Bean（它包装了底层的目标 Bean）。调用者将注入代理 Bean，而不是直接调用目标 Bean，并且对目标的任何调用都将由代理 Bean 接收。然后，代理\
  \ Bean 会分析运行条件（即连接点、切点、通知等），并相应地织入适当的通知。图 6-1 展示了 Spring AOP 代理运行的高级视图。\n\n![images](img/9781430241072_Fig06-01.jpg)\n\
  \n***图 6-1.** Spring AOP 代理运行示意图*\n\n在内部，Spring 有两种代理实现：JDK 动态代理和 CGLIB 代理。默认情况下，当要增强的目标对象实现了某种接口时，Spring\
  \ 将使用 JDK 动态代理来创建目标的代理实例。然而，当要增强的目标对象没有实现接口（例如，它是一个具体类）时，将使用 CGLIB 来创建代理实例。一个主要原因是\
  \ JDK 动态代理仅支持对接口进行代理。我们将在“理解代理”一节中详细讨论代理。\n\n##### Spring 中的连接点\n\nSpring AOP 最显著的简化之一是其仅支持一种连接点类型：方法调用。乍一看，如果您熟悉其他支持更多连接点的\
  \ AOP 实现（如 AspectJ），这似乎是一个严重的限制，但实际上，这反而使 Spring 更易于使用。\n\n方法调用连接点是迄今为止最有用的连接点，使用它，您可以完成许多使\
  \ AOP 在日常编程中变得有用的任务。请记住，如果您需要在方法调用之外的连接点处增强代码，您始终可以将 Spring 和 AspectJ 结合使用。\n\n\n\
  \n##### Spring 中的切面\n\n在 Spring AOP 中，切面由实现了 `Advisor` 接口的类实例表示。Spring 提供了一系列便捷的\
  \ `Advisor` 实现，你可以在应用程序中直接使用，从而无需为每个示例创建大量不同的 `Advisor` 实现。`Advisor` 有两个子接口：`IntroductionAdvisor`\
  \ 和 `PointcutAdvisor`。所有使用切点来控制通知是否适用于连接点的 `Advisor` 都实现了 `PointcutAdvisor` 接口。\n\
  \n在 Spring 中，引入被视作一种特殊的通知。通过使用 `IntroductionAdvisor` 接口，你可以控制哪些类可以应用引入。我们将在下一章中更详细地讨论这一点。\n\
  \n我们将在本章后面的“Spring 中的通知器和切点”一节中详细讨论不同的 `PointcutAdvisor` 实现。\n\n#### 关于 ProxyFactory\
  \ 类\n\n`ProxyFactory` 类控制 Spring AOP 中的织入和代理创建过程。在真正创建代理之前，你必须指定被通知的目标对象。正如你之前所见，你可以通过\
  \ `setTarget()` 方法来实现这一点。在内部，`ProxyFactory` 将代理创建过程委托给 `DefaultAopProxyFactory`\
  \ 的实例，而该实例又根据应用程序的设置，将任务委托给 `Cglib2AopProxy` 或 `JdkDynamicAopProxy`。我们将在本章后面更详细地讨论代理创建。\n\
  \n使用 `ProxyFactory` 类，你可以控制要将哪些切面织入代理。如前所述，你只能将切面（即通知与切点的组合）织入被通知的代码。然而，在某些情况下，你希望通知应用于类中所有方法的调用，而不仅仅是选定的方法。因此，`ProxyFactory`\
  \ 类提供了你在清单 6-3 中看到的 `addAdvice()` 方法。在内部，`addAdvice()` 会将你传入的通知包装在 `DefaultPointcutAdvisor`\
  \ 实例中（`DefaultPointcutAdvisor` 是 `PointcutAdvisor` 的标准实现），并使用一个默认包含所有方法的切点对其进行配置。当你希望对创建的\
  \ `Advisor` 进行更多控制，或者想要向代理添加引入时，请自行创建 `Advisor` 并使用 `ProxyFactory()` 的 `addAdvisor()`\
  \ 方法。\n\n你可以使用同一个 `ProxyFactory` 实例创建许多不同的代理，每个代理可以包含不同的切面。为此，`ProxyFactory` 提供了\
  \ `removeAdvice()` 和 `removeAdvisor()` 方法，允许你从 `ProxyFactory` 中移除之前传递给它的任何通知或 `Advisor`。要检查\
  \ `ProxyFactory` 是否附加了某个特定的通知，可以调用 `adviceIncluded()` 方法，并传入你想要检查的通知对象。\n\n####\
  \ 在 Spring 中创建通知\n\nSpring 支持六种不同类型的通知，如表 6-2 所述。\n\n![images](img/t0602.jpg)\n\n\
  ![images](img/t0602a.jpg)\n\n我们发现，这些通知类型与 Method Invocation 连接点相结合，足以完成我们希望通过 AOP\
  \ 实现的大约 90% 的任务。对于另外 10% 我们很少使用的情况，我们会退而求其次，使用 AspectJ。\n\n##### 通知的接口\n\n从我们之前对\
  \ `ProxyFactory` 类的讨论中可知，通知可以直接通过 `addAdvice()` 方法添加到代理，也可以间接通过使用 `Advisor` 的 `addAdvisor()`\
  \ 方法添加。`Advice` 和 `Advisor` 的主要区别在于，`Advisor` 携带了一个 `Advice` 以及关联的 `Pointcut`，从而可以对\
  \ `Advice` 将拦截哪些连接点进行更细粒度的控制。关于通知，Spring 为通知接口创建了一个定义良好的层次结构。该层次结构基于 AOP Alliance\
  \ 接口，并在图 6-2 中详细展示。\n\n这种层次结构的好处不仅在于它是合理的面向对象设计，还在于你可以通用地处理通知类型，例如通过在 `ProxyFactory`\
  \ 上使用单一的 `addAdvice()` 方法，并且你可以轻松地添加新的通知类型，而无需修改 `ProxyFactory` 类。\n\n![images](img/9781430241072_Fig06-02.jpg)\n\
  \n***图 6-2.** Spring 通知类型的接口*\n\n##### 创建前置通知\n\n前置通知是 Spring 中最有用的通知类型之一。前置通知可以修改传递给方法的参数，并且可以通过抛出异常来阻止方法执行。在下一章中，当我们研究\
  \ SpringBlog 应用程序如何使用 AOP 时，你会经常看到前置通知的使用。在本节中，我们将向你展示两个使用前置通知的示例：一个简单的示例，在方法执行前向控制台输出包含方法名称的消息；以及一个简单的安全通知，可用于限制对对象上方法的访问。\n\
  \n在清单 6-4 中，你可以看到 `SimpleBeforeAdvice` 类的代码。\n\n***清单 6-4**. `SimpleBeforeAdvice`\
  \ 类*\n\n`package com.apress.prospring3.ch6;`\n\n`import java.lang.reflect.Method;`\n\
  \n`import org.springframework.aop.MethodBeforeAdvice;`\n`import org.springframework.aop.framework.ProxyFactory;`\n\
  \n`public class SimpleBeforeAdvice implements MethodBeforeAdvice {`\n\n`    public\
  \ static void main(String[] args) {`\n`        MessageWriter target = new MessageWriter();`\n\
  \n`        // 创建代理`\n`        ProxyFactory pf = new ProxyFactory();`\n\n`        pf.addAdvice(new\
  \ SimpleBeforeAdvice());`\n`        pf.setTarget(target);`\n\n`        MessageWriter\
  \ proxy = (MessageWriter) pf.getProxy();`\n\n`        // 写入消息`\n`        proxy.writeMessage();`\n\
  `    }`\n\n`    public void before(Method method, Object[] args, Object target)`\n\
  `            throws Throwable {`\n`        System.out.println(\"Before method: \"\
  \ + method.getName());`\n`    }`\n`}`\n\n在这段代码中，你可以看到我们使用 `SimpleBeforeAdvice` 类的实例通知了之前创建的\
  \ `MessageWriter` 类的实例。`SimpleBeforeAdvice` 实现的 `MethodBeforeAdvice` 接口定义了一个单一方法\
  \ `before()`，AOP 框架会在连接点处的方法被调用之前调用该方法。请记住，目前我们使用的是 `addAdvice()` 方法提供的默认切点，该切点匹配类中的所有方法。`before()`\
  \ 方法接收三个参数：将要被调用的方法、将传递给该方法的参数，以及作为调用目标的 `Object`。`SimpleBeforeAdvice` 类使用 `before()`\
  \ 方法的 `Method` 参数向控制台输出一条包含将要被调用的方法名称的消息。运行此示例将得到以下输出：\n\n`Before method: writeMessage`\n\
  `World`\n\n如你所见，显示了调用 `writeMessage()` 的输出，但在此之前，你可以看到 `SimpleBeforeAdvice` 生成的输出。\n\
  \n\n\n##### 使用前置通知保护方法访问\n\n前面的示例相当简单，并未真正展示 AOP 的强大功能。在本节中，我们将构建一个前置通知，在允许方法调用继续之前检查用户凭证。如果用户凭证无效，通知将抛出异常，从而阻止方法执行。本节中的示例较为简化。它允许用户使用任意密码进行身份验证，并且仅允许单个硬编码用户访问受保护的方法。不过，它确实说明了使用\
  \ AOP 实现横切关注点（如安全性）是多么容易。\n\n![images](img/square.jpg) **注意**  这只是一个演示前置通知用法的示例。对于保护\
  \ Spring Bean 的方法执行，Spring Security 项目已经提供了全面的支持；你无需自行实现这些功能。\n\n清单 6-5 展示了 `SecureBean`\
  \ 类。这是我们使用 AOP 进行保护的类。\n\n***清单 6-5**. `SecureBean` 类*\n\n`package com.apress.prospring3.ch6.security;`\n\
  \n`public class SecureBean {`\n\n`    public void writeSecureMessage() {`\n`        System.out.println(\"\
  每次我学到新东西，\"`\n`            + \"就会把一些旧知识从脑子里挤出去\");`\n`    }`\n`}`\n\n`SecureBean`\
  \ 类分享了霍默·辛普森的一句小智慧箴言，我们不希望所有人都看到这句智慧之言。由于此示例要求用户进行身份验证，我们需要以某种方式存储他们的详细信息。清单 6-6\
  \ 展示了我们用于存储用户凭证的 `UserInfo` 类。\n\n***清单 6-6.** `UserInfo` 类*\n\n`package com.apress.prospring3.ch6.security;`\n\
  \n`public class UserInfo {`\n`    private String userName;`\n\n`    private String\
  \ password;`\n\n`    public UserInfo(String userName, String password) {`\n`        this.userName\
  \ = userName;`\n`        this.password = password;`\n`    }`\n\n`    public String\
  \ getPassword() {`\n`        return password;`\n`    }`\n\n`    public String getUserName()\
  \ {`\n`        return userName;`\n`    }`\n`}`\n\n这个类本身没什么特别之处；它只是保存用户的数据，以便我们能够利用这些数据做些有用的事情。清单\
  \ 6-7 展示了 `SecurityManager` 类，它负责对用户进行身份验证，并存储其凭证以供后续检索。\n\n***清单 6-7.** `SecurityManager`\
  \ 类*\n\n`package com.apress.prospring3.ch6.security;`\n\n`public class SecurityManager\
  \ {`\n\n`    private static ThreadLocal<UserInfo> threadLocal = new ThreadLocal<UserInfo>();`\n\
  \n`    public void login(String userName, String password) {`\n`        // 假设所有凭证`\n\
  `        // 对于登录都是有效的`\n`        threadLocal.set(new UserInfo(userName, password));`\n\
  `    }`\n\n`    public void logout() {`\n`        threadLocal.set(null);`\n`    }`\n\
  \n`    public UserInfo getLoggedOnUser() {`\n`        return threadLocal.get();`\n\
  `    }`\n`}`\n\n应用程序使用 `SecurityManager` 类来验证用户身份，并在之后检索当前已验证用户的详细信息。应用程序通过 `login()`\
  \ 方法验证用户身份。在真实应用中，`login()` 方法可能会根据数据库或 LDAP 目录检查提供的凭证，但在这里我们假设所有用户都允许进行身份验证。`login()`\
  \ 方法为用户创建一个 `UserInfo` 对象，并使用 `ThreadLocal` 将其存储在当前线程上。`logout()` 方法将可能存储在 `ThreadLocal`\
  \ 中的任何值设置为 `null`。最后，`getLoggedOnUser()` 方法返回当前已验证用户的 `UserInfo` 对象。如果没有用户通过身份验证，此方法返回\
  \ `null`。\n\n为了检查用户是否已通过身份验证，以及如果已通过，该用户是否被允许访问 `SecureBean` 上的方法，我们需要创建一个在方法执行前运行的通知，并将\
  \ `SecurityManager.getLoggedOnUser()` 返回的 `UserInfo` 对象与允许用户的凭证集进行比对。此通知 `SecurityAdvice`\
  \ 的代码如清单 6-8 所示。\n\n***清单 6-8.** `SecurityAdvice` 类*\n\n`package com.apress.prospring3.ch6.security;`\n\
  \n`import java.lang.reflect.Method;`\n\n`import org.springframework.aop.MethodBeforeAdvice;`\n\
  \n`public class SecurityAdvice implements MethodBeforeAdvice {`\n\n`    private\
  \ SecurityManager securityManager;`\n\n`    public SecurityAdvice() {`\n`        this.securityManager\
  \ = new SecurityManager();`\n`    }`\n\n`    public void before(Method method, Object[]\
  \ args, Object target)`\n`            throws Throwable {`\n`        UserInfo user\
  \ = securityManager.getLoggedOnUser();`\n\n`        if (user == null) {`\n`            System.out.println(\"\
  没有用户通过身份验证\");`\n`            throw new SecurityException(`\n`                \"\
  在尝试调用方法之前，你必须先登录: \"`\n`                + method.getName());`\n`        } else if\
  \ (\"clarence\".equals(user.getUserName())) {`\n`            System.out.println(\"\
  登录用户是 clarence - 通过！\");`\n`        } else {`\n`            System.out.println(\"\
  登录用户是 \" + user.getUserName()`\n`                + \" 不允许 :(\");`\n`            throw\
  \ new SecurityException(\"用户 \" + user.getUserName()`\n`                + \" 不允许访问方法\
  \ \" + method.getName());`\n`        }`\n`    }`\n`}`\n\n`SecurityAdvice` 类在其构造函数中创建了一个\
  \ `SecurityManager` 实例，然后将此实例存储在一个字段中。你应该注意，应用程序和 `SecurityAdvice` 不需要共享同一个 `SecurityManager`\
  \ 实例，因为所有数据都通过 `ThreadLocal` 与当前线程关联。在 `before()` 方法中，我们执行一个简单的检查，看已验证用户的用户名是否为\
  \ `clarence`。如果是，则允许用户访问；否则，抛出异常。还要注意，我们检查了 `UserInfo` 对象是否为 `null`，这表示当前用户未通过身份验证。\n\
  \n在清单 6-9 中，你可以看到一个使用 `SecurityAdvice` 类来保护 `SecureBean` 类的示例应用程序。\n\n***清单 6-9.**\
  \ `SecurityExample` 类*\n\n`package com.apress.prospring3.ch6.security;`\n\n`import\
  \ org.springframework.aop.framework.ProxyFactory;`\n\n`public class SecurityExample\
  \ {`\n\n`    public static void main(String[] args) {`\n`        // 获取安全管理器`\n`        SecurityManager\
  \ mgr = new SecurityManager();`\n\n`        // 获取 Bean`\n`        SecureBean bean\
  \ = getSecureBean();`\n\n`        // 尝试以 clarence 身份登录`\n`        mgr.login(\"clarence\"\
  , \"pwd\");`\n`        bean.writeSecureMessage();`\n`        mgr.logout();`\n\n\
  `        // 尝试以 janm 身份登录`\n`        try {`\n`            mgr.login(\"janm\", \"\
  pwd\");`\n`            bean.writeSecureMessage();`\n`        } catch(SecurityException\
  \ ex) {`\n`            System.out.println(\"捕获到异常: \" + ex.getMessage());`\n`        }\
  \ finally {`\n`            mgr.logout();`\n`        }`\n\n`        // 尝试无凭证访问`\n\
  `        try {`\n`            bean.writeSecureMessage();`\n`        } catch(SecurityException\
  \ ex) {`\n`            System.out.println(\"捕获到异常: \" + ex.getMessage());`\n`        }`\n\
  `    }`\n\n`    private static SecureBean getSecureBean() {`\n`        // 创建目标对象`\n\
  `        SecureBean target = new SecureBean();`\n\n`        // 创建通知`\n`        SecurityAdvice\
  \ advice = new SecurityAdvice();`\n\n`        // 获取代理`\n`        ProxyFactory factory\
  \ = new ProxyFactory();`\n`        factory.setTarget(target);`\n`        factory.addAdvice(advice);`\n\
  `        SecureBean proxy = (SecureBean)factory.getProxy();`\n\n`        return\
  \ proxy;`\n\n`    }`\n`}`\n\n\n\n在 `getSecureBean()` 方法中，我们创建了一个 `SecureBean` 类的代理，该代理通过\
  \ `SecurityAdvice` 实例提供增强。此代理将返回给调用者。当调用者调用此代理上的任何方法时，调用会首先路由到 `SecurityAdvice`\
  \ 实例进行安全检查。在 `main()` 方法中，我们测试了三种不同的场景：使用两组不同的用户凭据调用 `SecureBean.writeSecureMessage()`\
  \ 方法，然后完全不使用任何用户凭据。由于 `SecurityAdvice` 仅允许当前认证用户为 `clarence` 时继续执行方法调用，我们预计 清单 6-9\
  \ 中唯一成功的场景是第一个。运行此示例将输出以下内容：\n\n`Logged in user is clarence - OKAY!`\n`Every time\
  \ I learn something new, it pushes some old stuff out my brain`\n`Logged in user\
  \ is janm NOT GOOD :(`\n`Exception Caught: User janm is not allowed access to method\
  \ writeSecureMessage`\n`No user authenticated`\n`Exception Caught: You must login\
  \ before attempting to invoke the method: writeSecureMessage`\n\n如您所见，只有第一次调用 `SecureBean.writeSecureMessage()`\
  \ 被允许执行。其余调用均被 `SecurityAdvice` 抛出的 `SecurityException` 阻止。\n\n这个示例很简单，但它确实突出了前置通知的实用性。安全性是前置通知的典型示例，但当场景需要修改传入方法的参数时，我们也发现它很有用。在第\
  \ 7 章中，我们将向您展示如何使用前置通知为 SpringBlog 应用程序创建内容过滤功能。\n\n##### 创建后置返回通知\n\n顾名思义，后置返回通知在连接点的方法调用返回后执行。鉴于方法已经执行完毕，您无法更改传递给它的参数。虽然您可以读取这些参数，但无法更改执行路径，也无法阻止方法执行。这些限制是意料之中的；然而，出乎意料的是，您无法在后置返回通知中修改返回值。您只能执行一些额外的处理。尽管后置返回通知无法修改方法调用的返回值，但它可以抛出一个异常，该异常可以替代返回值沿调用栈向上传递。\n\
  \n在本节中，我们将探讨在应用程序中使用后置返回通知的两个示例。第一个示例在方法被调用后简单地向控制台输出一条消息。第二个示例展示了如何使用后置返回通知为方法添加额外的错误检查。考虑一个用于加密目的生成密钥的\
  \ `KeyGenerator` 类。许多加密算法都存在一个问题：密钥空间中的少量密钥被认为是弱密钥。弱密钥是指其特性使得在不知道密钥的情况下推导出原始消息变得显著容易的任何密钥。对于\
  \ DES 算法，总共有 256 个可能的密钥。在这个密钥空间中，有 4 个密钥被认为是弱密钥，另外 12 个被认为是半弱密钥。虽然随机生成这些密钥之一的概率小得离谱（1/252），但检查这些密钥非常简单，以至于忽略这种检查似乎有些松懈。在本节的第二个示例中，我们构建了一个后置返回通知，用于检查\
  \ `KeyGenerator` 生成的弱密钥，并在发现弱密钥时抛出异常。\n\n![images](img/square.jpg) **注意**  有关弱密钥和加密技术的更多信息，我们推荐您阅读\
  \ Bruce Schneier 所著的《应用密码学》（Wiley, 1995）。\n\n在清单 6-10 中，您可以看到 `SimpleAfterReturningAdvice`\
  \ 类，它通过在方法返回后向控制台输出一条消息来演示后置返回通知的使用。\n\n***清单 6-10.** `SimpleAfterReturningAdvice`\
  \ 类*\n\n`package com.apress.prospring3.ch6;`\n\n`import java.lang.reflect.Method;`\n\
  \n`import org.springframework.aop.AfterReturningAdvice;`\n`import org.springframework.aop.framework.ProxyFactory;`\n\
  \n`public class SimpleAfterReturningAdvice implements AfterReturningAdvice {`\n\n\
  `    public static void main(String[] args) {`\n`        MessageWriter target =\
  \ new MessageWriter();`\n\n`        // 创建代理`\n`        ProxyFactory pf = new ProxyFactory();`\n\
  \n`        pf.addAdvice(new SimpleAfterReturningAdvice());`\n`        pf.setTarget(target);`\n\
  \n`        MessageWriter proxy = (MessageWriter) pf.getProxy();`\n\n`        //\
  \ 写入消息`\n`        proxy.writeMessage();`\n`    }`\n\n`    public void afterReturning(Object\
  \ returnValue, Method method,`\n`             Object[] args, Object target) throws\
  \ Throwable {`\n`        System.out.println(\"\");`\n`        System.out.println(\"\
  After method: \" + method.getName());`\n`    }`\n`}`\n\n这个示例与您之前看到的 `SimpleBeforeAdvice`\
  \ 类实际上并没有太大区别。请注意，`AfterReturningAdvice` 接口声明了一个单一方法 `afterReturning()`，该方法接收方法调用的返回值、被调用方法的引用、传递给方法的参数以及调用的目标对象。运行此示例将输出以下结果：\n\
  \n`World`\n`After method: writeMessage`\n\n输出结果与前置通知示例非常相似，只是正如预期的那样，由通知写入的消息出现在\
  \ `writeMessage()` 方法写入的消息之后。\n\n\n\n后置返回通知的一个良好用途是，在方法可能返回无效值时执行一些额外的错误检查。在我们之前描述的场景中，加密密钥生成器可能会生成对于特定算法而言被视为弱密钥的密钥。理想情况下，密钥生成器会检查这些弱密钥，但由于这些密钥出现的概率通常非常小，许多生成器并不会进行检查。通过使用后置返回通知，我们可以对生成密钥的方法进行增强，并执行这项额外的检查。清单\
  \ 6-11 展示了一个极其原始的密钥生成器。\n\n***清单 6-11.** `KeyGenerator` 类*\n\n`package com.apress.prospring3.ch6.crypto;`\n\
  \n`import java.util.Random;`\n\n`public class KeyGenerator {`\n\n`    public static\
  \ final long WEAK_KEY = 0xFFFFFFF0000000L;`\n`    public static final long STRONG_KEY\
  \ = 0xACDF03F590AE56L;`\n\n`    private Random rand = new Random();`\n\n`    public\
  \ long getKey() {`\n`        int x = rand.nextInt(3);`\n\n`        if(x == 1) {`\n\
  `            return WEAK_KEY;`\n`        } else {`\n`            return STRONG_KEY;`\n\
  `        }`\n`    }`\n`}`\n\n显而易见，这个密钥生成器极其不安全，但我们不想让你为了等待一个真实的密钥生成器产生弱密钥而耗费数年时间，所以我们创建了这个生成器，它产生弱密钥的概率是三分之一。在清单\
  \ 6-12 中，你可以看到 `WeakKeyCheckAdvice`，它用于检查 `getKey()` 方法的结果是否为弱密钥。\n\n***清单 6-12.**\
  \ 检查弱密钥*\n\n`package com.apress.prospring3.ch6.crypto;`\n\n`import java.lang.reflect.Method;`\n\
  \n`import org.springframework.aop.AfterReturningAdvice;`\n\n`public class WeakKeyCheckAdvice\
  \ implements AfterReturningAdvice {`\n\n`    public void afterReturning(Object returnValue,\
  \ Method method,`\n`            Object[] args,Object target) throws Throwable {`\n\
  \n`        if ((target instanceof KeyGenerator)`\n`                && (\"getKey\"\
  .equals(method.getName()))) {`\n`            long key = ((Long) returnValue).longValue();`\n\
  \n`            if (key == KeyGenerator.WEAK_KEY) {`\n`                throw new\
  \ SecurityException(`\n`                    \"Key Generator generated a weak key.\
  \ Try again\");`\n`            }`\n`        }`\n`    }`\n`}`\n\n在 `afterReturning()`\
  \ 方法中，我们首先检查连接点处执行的方法是否为 `getKey()` 方法。如果是，则检查结果值是否为弱密钥。如果发现 `getKey()` 方法的结果是弱密钥，我们就抛出一个\
  \ `SecurityException` 来通知调用代码。清单 6-13 展示了一个演示该通知使用的简单应用程序。\n\n***清单 6-13.** 测试 `WeakKeyCheckAdvice`\
  \ 类*\n\n`package com.apress.prospring3.ch6.crypto;`\n\n`import org.springframework.aop.framework.ProxyFactory;`\n\
  \n`public class AfterAdviceExample {`\n\n`    public static void main(String[] args)\
  \ {`\n`        KeyGenerator keyGen = getKeyGenerator();`\n\n`        for(int x =\
  \ 0; x < 10; x++) {`\n`            try {`\n`                long key = keyGen.getKey();`\n\
  `                System.out.println(\"Key: \" + key);`\n`            } catch(SecurityException\
  \ ex) {`\n`                System.out.println(\"Weak Key Generated!\");`\n`            }`\n\
  `        }`\n`    }`\n\n`    private static KeyGenerator getKeyGenerator() {`\n\n\
  `        KeyGenerator target = new KeyGenerator();`\n\n`        ProxyFactory factory\
  \ = new ProxyFactory();`\n`        Factory.setTarget(target);`\n`        factory.addAdvice(new\
  \ WeakKeyCheckAdvice());`\n\n`        return (KeyGenerator)factory.getProxy();`\n\
  `    }`\n`}`\n\n在创建了 `KeyGenerator` 目标对象的增强代理后，`AfterAdviceExample` 类尝试生成十个密钥。如果在某次生成过程中抛出了\
  \ `SecurityException`，则会在控制台输出一条消息，通知用户生成了弱密钥；否则，显示生成的密钥。在我们的机器上运行一次，产生了以下输出：\n\n\
  `Key: 48658904092028502`\n`Key: 48658904092028502`\n`Weak Key Generated!`\n`Key:\
  \ 48658904092028502`\n`Key: 48658904092028502`\n`Key: 48658904092028502`\n`Weak\
  \ Key Generated!`\n`Key: 48658904092028502`\n`Key: 48658904092028502`\n`Key: 48658904092028502`\n\
  \n如你所见，`KeyGenerator` 类有时会按预期生成弱密钥，而 `WeakKeyCheckAdvice` 确保在遇到弱密钥时总会抛出一个 `SecurityException`。\n\
  \n\n\n##### 创建环绕通知\n\n环绕通知的功能类似于前置通知和后置通知的结合，但有一个重大区别——你可以修改返回值。不仅如此，你还可以阻止方法的实际执行。这意味着，使用环绕通知，你基本上可以用新代码替换方法的整个实现。Spring\
  \ 中的环绕通知被建模为使用 `MethodInterceptor` 接口的拦截器。环绕通知有很多用途，你会发现 Spring 的许多特性都是使用方法拦截器创建的，例如远程代理支持和事务管理功能。方法拦截也是分析应用程序执行情况的一种良好机制，并且构成了本节示例的基础。\n\
  \n我们不打算为方法拦截构建一个简单的示例；相反，我们参考 清单 6-2 中的第一个示例，该示例展示了如何使用基本的方法拦截器在方法调用的前后写入消息。从这个早期示例中请注意，`MethodInterceptor`\
  \ 类的 `invoke()` 方法不提供与 `MethodBeforeAdvice` 和 `AfterReturningAdvice` 相同的参数集——也就是说，该方法不会传递调用的目标、被调用的方法或使用的参数。但是，你可以使用传递给\
  \ `invoke()` 的 `MethodInvocation` 对象来访问这些数据。你将在下面的示例中看到这一点。\n\n对于这个示例，我们希望实现某种方式来通知一个类，以便获取其方法运行时性能的基本信息。具体来说，我们想知道方法执行花费了多长时间。为了实现这一点，我们可以使用\
  \ Spring 中包含的 `StopWatch` 类，并且显然需要一个 `MethodInterceptor`，因为我们需要在方法调用之前启动 `StopWatch`，并在之后立即停止它。\n\
  \n清单 6-14 展示了我们将使用 `StopWatch` 类和环绕通知进行性能分析的 `WorkerBean` 类。\n\n***清单 6-14.** `WorkerBean`\
  \ 类*\n\n`package com.apress.prospring3.ch6.profiling;`\n\n`public class WorkerBean\
  \ {`\n\n`    public void doSomeWork(int noOfTimes) {`\n`        for(int x = 0; x\
  \ < noOfTimes; x++) {`\n`            work();`\n`        }`\n`    }`\n\n`    private\
  \ void work() {`\n`        System.out.print(\"\");`\n`    }`\n`}`\n\n这是一个非常简单的类。`doSomeWork()`\
  \ 方法接受一个参数 `noOfTimes`，并调用 `work()` 方法恰好该参数指定的次数。`work()` 方法只是对 `System.out.print()`\
  \ 进行了一次虚拟调用，传入一个空 `String`。这可以防止编译器优化掉 `work()` 方法，从而也优化掉对 `work()` 的调用。\n\n在 清单\
  \ 6-15 中，你可以看到 `ProfilingInterceptor` 类，它使用 `StopWatch` 类来分析方法调用的时间。我们使用这个拦截器来分析\
  \ 清单 6-14 中所示的 `WorkerBean` 类。\n\n***清单 6-15.** `ProfilingInterceptor` 类*\n\n`package\
  \ com.apress.prospring3.ch6.profiling;`\n\n`import java.lang.reflect.Method;`\n\n\
  `import org.aopalliance.intercept.MethodInterceptor;`\n`import org.aopalliance.intercept.MethodInvocation;`\n\
  `import org.springframework.util.StopWatch;`\n\n`public class ProfilingInterceptor\
  \ implements MethodInterceptor {`\n\n`    public Object invoke(MethodInvocation\
  \ invocation) throws Throwable {`\n`        // 启动秒表`\n`        StopWatch sw = new\
  \ StopWatch();`\n`        sw.start(invocation.getMethod().getName());`\n\n`        Object\
  \ returnValue = invocation.proceed();`\n\n`        sw.stop();`\n`        dumpInfo(invocation,\
  \ sw.getTotalTimeMillis());`\n`        return returnValue;`\n`    }`\n\n`    private\
  \ void dumpInfo(MethodInvocation invocation, long ms) {`\n`        Method m = invocation.getMethod();`\n\
  `        Object target = invocation.getThis();`\n`        Object[] args = invocation.getArguments();`\n\
  \n`        System.out.println(\"执行的方法: \" + m.getName());`\n`        System.out.println(\"\
  对象类型: \" +`\n`                target.getClass().getName());`\n\n`        System.out.println(\"\
  参数:\");`\n`        for (int x = 0; x < args.length; x++) {`\n`            System.out.print(\"\
         > \" + args[x]);`\n`        }`\n`        System.out.print(\"\\n\");`\n\n\
  `        System.out.println(\"耗时: \" + ms + \" 毫秒\");`\n`    }`\n`}`\n\n在 `invoke()`\
  \ 方法（这是 `MethodInterceptor` 接口中唯一的方法）中，我们创建了一个 `StopWatch` 实例，然后立即启动它，通过调用 `MethodInvocation.proceed()`\
  \ 让方法调用继续执行。一旦方法调用结束并捕获了返回值，我们就停止 `StopWatch`，并将总耗时毫秒数以及 `MethodInvocation` 对象传递给\
  \ `dumpInfo()` 方法。最后，我们返回 `MethodInvocation.proceed()` 返回的 `Object`，以便调用者获得正确的返回值。在这种情况下，我们不想以任何方式中断调用堆栈；我们只是充当方法调用的监听者。如果我们愿意，我们可以完全改变调用堆栈，将方法调用重定向到另一个对象或远程服务，或者我们可以在拦截器内部重新实现方法逻辑并返回一个不同的返回值。\n\
  \n`dumpInfo()` 方法只是将有关方法调用的一些信息以及方法执行所花费的时间写入控制台输出。在 `dumpInfo()` 的前三行中，你可以看到如何使用\
  \ `MethodInvocation` 对象来确定被调用的方法、调用的原始目标以及使用的参数。\n\n清单 6-16 展示了 `ProfilingExample`\
  \ 类，它首先使用 `ProfilingInterceptor` 通知 `WorkerBean` 的一个实例，然后对 `doSomeWork()` 方法进行性能分析。\n\
  \n***清单 6-16.** `ProfilingExample` 类*\n\n`package com.apress.prospring3.ch6.profiling;`\n\
  \n`import org.springframework.aop.framework.ProxyFactory;`\n\n`public class ProfilingExample\
  \ {`\n\n`    public static void main(String[] args) {`\n`        WorkerBean bean\
  \ = getWorkerBean();`\n`        bean.doSomeWork(10000000);`\n`    }`\n\n`    private\
  \ static WorkerBean getWorkerBean() {`\n`        WorkerBean target = new WorkerBean();`\n\
  \n`        ProxyFactory factory = new ProxyFactory();`\n`        factory.setTarget(target);`\n\
  `        factory.addAdvice(new ProfilingInterceptor());`\n\n`        return (WorkerBean)factory.getProxy();`\n\
  `    }`\n`}`\n\n现在你应该对这段代码非常熟悉了。在我们的机器上运行此示例会产生以下输出：\n\n`执行的方法: doSomeWork`\n`对象类型:\
  \ com.apress.prospring3.ch6.profiling.WorkerBean`\n`参数:`\n`    > 10000000`\n`耗时:\
  \ 874 毫秒`\n\n从该输出中，你可以看到执行了哪个方法、目标对象的类是什么、传入了哪些参数以及调用花费了多长时间。\n\n\n\n##### 创建异常通知\n\
  \n异常通知与返回后通知类似，都是在连接点（始终是方法调用）之后执行，但异常通知仅在方法抛出异常时执行。异常通知与返回后通知的另一个相似之处在于，它对程序执行的控制能力很弱。如果使用异常通知，你无法选择忽略抛出的异常并为方法返回一个值。你能对程序流程做出的唯一修改是更改所抛出异常的类型。这实际上是一个非常强大的想法，可以使应用程序开发变得简单得多。考虑这样一种情况：你有一个\
  \ API，它抛出了一系列定义不明确的异常。通过使用异常通知，你可以通知该 API 中的所有类，并将异常层次结构重新分类为更易于管理和描述的形式。当然，你也可以使用异常通知来提供跨应用程序的集中式错误日志记录，从而减少分散在应用程序各处的错误日志记录代码。\n\
  \n正如你在图 6-1 的图表中所见，异常通知由 `ThrowsAdvice` 接口实现。与你目前看到的接口不同，`ThrowsAdvice` 没有定义任何方法；相反，它只是\
  \ Spring 使用的一个标记接口。这样做的原因是 Spring 支持类型化的异常通知，这允许你精确定义异常通知应该捕获哪些 `Exception` 类型。Spring\
  \ 通过使用反射检测具有特定签名的方法来实现这一点。Spring 会查找两种不同的方法签名。通过一个简单的示例可以最好地说明这一点。清单 6-17 展示了一个简单的\
  \ Bean，它有两个方法，这两个方法都只是抛出不同类型的异常。\n\n***清单 6-17.** `ErrorBean` 类*\n\n`package com.apress.prospring3.ch6;`\n\
  \n`public class ErrorBean {`\n\n`    public void errorProneMethod() throws Exception\
  \ {`\n`        throw new Exception(\"Foo\");`\n`    }`\n\n`    public void otherErrorProneMethod()\
  \ throws IllegalArgumentException {`\n`        throw new IllegalArgumentException(\"\
  Bar\");`\n`    }`\n`}`\n\n在清单 6-18 中，你可以看到 `SimpleThrowsAdvice` 类，它演示了 Spring 在异常通知上查找的两种方法签名。\n\
  \n***清单 6-18.** `SimpleThrowsAdvice` 类*\n\n`package com.apress.prospring3.ch6;`\n\
  \n`import java.lang.reflect.Method;`\n\n`import org.springframework.aop.ThrowsAdvice;`\n\
  `import org.springframework.aop.framework.ProxyFactory;`\n\n`public class SimpleThrowsAdvice\
  \ implements ThrowsAdvice {`\n\n`    public static void main(String[] args) throws\
  \ Exception {`\n`        ErrorBean errorBean = new ErrorBean();`\n\n`        ProxyFactory\
  \ pf = new ProxyFactory();`\n`        pf.setTarget(errorBean);`\n`        pf.addAdvice(new\
  \ SimpleThrowsAdvice());`\n\n`        ErrorBean proxy = (ErrorBean) pf.getProxy();`\n\
  \n`        try {`\n`            proxy.errorProneMethod();`\n`        } catch (Exception\
  \ ignored) {`\n\n`        }`\n\n`        try {`\n`            proxy.otherErrorProneMethod();`\n\
  `        } catch (Exception ignored) {`\n`        }`\n`    }`\n\n`    public void\
  \ afterThrowing(Exception ex) throws Throwable {`\n`        System.out.println(\"\
  ***\");`\n`        System.out.println(\"Generic Exception Capture\");`\n`        System.out.println(\"\
  Caught: \" + ex.getClass().getName());`\n`        System.out.println(\"***\\n\"\
  );`\n`    }`\n\n`    public void afterThrowing(Method method, Object[] args, Object\
  \ target,`\n`            IllegalArgumentException ex) throws Throwable {`\n`        System.out.println(\"\
  ***\");`\n`        System.out.println(\"IllegalArgumentException Capture\");`\n\
  `        System.out.println(\"Caught: \" + ex.getClass().getName());`\n`        System.out.println(\"\
  Method: \" + method.getName());`\n`        System.out.println(\"***\\n\");`\n`    }`\n\
  `}`\n\n我们相信你理解 `main()` 方法中的代码，所以现在我们只关注两个 `afterThrowing()` 方法。Spring 在异常通知中首先查找的是一个或多个名为\
  \ `afterThrowing()` 的公共方法。这些方法的返回类型并不重要，尽管我们发现最好坚持使用 `void`，因为此方法无法返回任何有意义的值。`SimpleThrowsAdvice`\
  \ 类中的第一个 `afterThrowing()` 方法只有一个类型为 `Exception` 的参数。你可以指定任何类型的 `Exception` 作为参数，当你并不关心是哪个方法抛出了异常或传递给它的参数是什么时，此方法是理想的选择。请注意，此方法会捕获\
  \ `Exception` 及其任何子类型，除非所讨论的类型有其自己的 `afterThrowing()` 方法。\n\n在第二个 `afterThrowing()`\
  \ 方法中，我们声明了四个参数来捕获抛出异常的 `Method`、传递给该方法的参数以及方法调用的目标对象。此方法中参数的顺序很重要，并且你必须指定所有四个参数。请注意，第二个\
  \ `afterThrowing()` 方法捕获的是 `IllegalArgumentException`（或其子类型）类型的异常。运行此示例会产生以下输出：\n\
  \n`***`\n`Generic Exception Capture`\n`Caught: java.lang.Exception`\n`***`\n\n`***`\n\
  `IllegalArgumentException Capture`\n`Caught: java.lang.IllegalArgumentException`\n\
  `Method: otherErrorProneMethod`\n`***`\n\n如你所见，当抛出一个普通的 `Exception` 时，会调用第一个 `afterThrowing()`\
  \ 方法；但当抛出一个 `IllegalArgumentException` 时，则会调用第二个 `afterThrowing()` 方法。Spring 仅为每个\
  \ `Exception` 调用一个 `afterThrowing()` 方法，并且正如你在清单 6-18 的示例中所见，Spring 会使用其签名与 `Exception`\
  \ 类型最匹配的方法。在你的异常通知有两个 `afterThrowing()` 方法的情况下，两者都声明了相同的 `Exception` 类型，但一个只有一个参数，另一个有四个参数，Spring\
  \ 会调用四个参数的 `afterThrowing()` 方法。\n\n正如我们之前提到的，异常通知在各种情况下都很有用；它允许你重新分类整个 `Exception`\
  \ 层次结构，并为你的应用程序构建集中的 `Exception` 日志记录。我们发现，在调试正在运行的应用程序时，异常通知特别有用，因为它允许我们添加额外的日志记录代码，而无需修改应用程序的代码。\n\
  \n##### 选择通知类型\n\n通常，选择使用哪种通知类型取决于应用程序的需求，但你应该选择最符合需求的具体通知类型。也就是说，不要在前置通知就能解决问题时使用环绕通知。在大多数情况下，环绕通知可以完成其他三种通知类型能做的所有事情，但对于你试图实现的目标来说，它可能有些大材小用。通过使用最具体的通知类型，你不仅使代码的意图更加清晰，而且还减少了出错的可能性。考虑一个用于统计方法调用次数的通知。当你使用前置通知时，你只需要编写计数器代码；但使用环绕通知时，你需要记住调用该方法并将返回值返回给调用者。这些小事可能会让偶发错误潜入你的应用程序。通过尽可能保持通知类型的专注性，你可以减少出错的范围。\n\
  \n\n\n### Spring 中的通知器与切点\n\n到目前为止，你看到的所有示例都使用了 `ProxyFactory.addAdvice()` 方法来为代理配置通知。正如我们之前提到的，此方法在幕后委托给\
  \ `addAdvisor()`，创建一个 `DefaultPointcutAdvisor` 实例，并用一个指向所有方法的切点对其进行配置。这样一来，通知就被视为适用于目标上的所有方法。在某些情况下，例如当你使用\
  \ AOP 进行日志记录时，这可能是可取的，但在其他情况下，你可能希望限制通知所应用的方法。\n\n当然，你可以简单地在通知本身中执行检查，以确认被通知的方法是正确的方法，但这种方法有几个缺点。首先，将可接受方法的列表硬编码到通知中会降低通知的可重用性。通过使用切点，你可以配置通知所应用的方法，而无需将此代码放入通知内部；这显然提高了通知的复用价值。将方法列表硬编码到通知中的第二个和第三个缺点与性能相关。要在通知中检查被通知的方法，你需要在目标上的每个方法被调用时都执行一次检查。这显然会降低应用程序的性能。当你使用切点时，每个方法只执行一次检查，并且结果会被缓存以供后续使用。不使用切点来限制被通知方法列表的另一个与性能相关的缺点是，Spring\
  \ 在创建代理时可以对未被通知的方法进行优化，从而加快对未被通知方法的调用速度。当我们稍后在本章讨论代理时，会更详细地介绍这些优化。\n\n我们强烈建议你抵制将方法检查硬编码到通知中的诱惑，而是尽可能使用切点来控制通知对目标方法的适用性。话虽如此，在某些情况下，有必要将检查硬编码到通知中。考虑前面那个用于捕获\
  \ `KeyGenerator` 类生成的弱密钥的后置返回通知示例。这种通知与其所通知的类紧密耦合，因此在通知内部进行检查以确保它应用于正确的类型是明智的。我们将这种通知与目标之间的耦合称为*目标亲和性*。通常，当你的通知具有很少或没有目标亲和性时——也就是说，它可以应用于任何类型或广泛的类型——你应该使用切点。当你的通知具有很强的目标亲和性时，请尝试在通知本身中检查通知是否被正确使用；这有助于减少因通知被误用而导致的令人挠头的错误。我们还建议你避免不必要地通知方法。正如你将看到的，这会导致调用速度显著下降，从而对应用程序的整体性能产生重大影响。\n\
  \n#### 切点接口\n\nSpring 中的切点通过实现 `Pointcut` 接口来创建，如清单 6-19 所示。\n\n***清单 6-19.** `Pointcut`\
  \ 接口*\n\n`package org.springframework.aop;`\n\n`public interface Pointcut {`\n\n\
  `    ClassFilter getClassFilter ();`\n\n`    MethodMatcher getMethodMatcher();`\n\
  `}`\n\n从这段代码可以看出，`Pointcut` 接口定义了两个方法：`getClassFilter()` 和 `getMethodMatcher()`，它们分别返回\
  \ `ClassFilter` 和 `MethodMatcher` 的实例。当你从头开始创建自己的切点时，也必须同时实现 `ClassFilter` 和 `MethodMatcher`\
  \ 接口。值得庆幸的是，正如你将在下一节中看到的，这通常是不必要的，因为 Spring 提供了一系列 `Pointcut` 实现，这些实现几乎涵盖了你的所有用例（即使不是全部）。\n\
  \n在确定 `Pointcut` 是否适用于特定方法时，Spring 首先使用 `Pointcut.getClassFilter()` 返回的 `ClassFilter`\
  \ 实例来检查 `Pointcut` 是否适用于该方法所属的类。清单 6-20 展示了 `ClassFilter` 接口。\n\n***清单 6-20.** `ClassFilter`\
  \ 接口*\n\n`org.springframework.aop;`\n\n`public interface ClassFilter {`\n\n`    boolean\
  \ matches(Class<?> clazz);`\n`}`\n\n如你所见，`ClassFilter` 接口定义了一个单一方法 `matches()`，该方法接收一个代表待检查类的\
  \ `Class` 实例。你无疑已经推断出，如果切点适用于该类，则 `matches()` 方法返回 true，否则返回 false。\n\n`MethodMatcher`\
  \ 接口比 `ClassFilter` 接口更复杂，如清单 6-21 所示。\n\n***清单 6-21.** `MethodMatcher` 接口*\n\n\
  `package org.springframework.aop;`\n\n`public interface MethodMatcher {`\n\n`    boolean\
  \ matches(Method m, Class<?> targetClass);`\n\n`    boolean isRuntime();`\n\n`    boolean\
  \ matches(Method m, Class<?> targetClass, Object[] args);`\n`}`\n\nSpring 支持两种不同类型的\
  \ `MethodMatcher`：静态和动态，由 `isRuntime()` 的返回值决定。在使用 `MethodMatcher` 之前，Spring 会调用\
  \ `isRuntime()` 来确定 `MethodMatcher` 是静态的（返回值为 false 表示）还是动态的（返回值为 true 表示）。\n\n\
  对于静态切点，Spring 会对目标上的每个方法调用一次 `MethodMatcher` 的 `matches(Method, Class<T>)` 方法，并缓存返回值以供后续对这些方法的调用使用。这样，每个方法只执行一次方法适用性检查，后续对某个方法的调用不会触发\
  \ `matches()` 的调用。\n\n对于动态切点，Spring 仍然会在第一次调用某个方法时使用 `matches(Method, Class<T>)`\
  \ 执行静态检查，以确定该方法的整体适用性。然而，除此之外，并且假设静态检查返回了 true，Spring 还会对每次方法调用使用 `matches(Method,\
  \ Class<T>, Object[])` 方法执行进一步的检查。这样，动态的 `MethodMatcher` 就可以基于方法的特定调用（而不仅仅是方法本身）来确定是否应应用切点。例如，一个切点仅当参数是值大于\
  \ 100 的 `Integer` 时才需要应用。在这种情况下，可以编写 `matches(Method, Class<T>, Object[])` 方法，使其在每次调用时对参数执行进一步的检查。\n\
  \n显然，静态切点——即其 `MethodMatcher` 是静态的切点——性能远优于动态切点，因为它们避免了每次调用都需要额外检查的开销。话虽如此，动态切点在决定是否应用通知方面提供了更高程度的灵活性。通常，我们建议你尽可能使用静态切点。然而，如果你的通知增加了大量开销，那么通过使用动态切点来避免任何不必要的通知调用可能是明智的。\n\
  \n通常，你很少从头开始创建自己的 `Pointcut` 实现，因为 Spring 为静态和动态切点都提供了抽象基类。我们将在接下来的几节中研究这些基类以及其他\
  \ `Pointcut` 实现。\n\n\n\n##### 可用的切点实现\n\n从 3.1 版本开始，Spring 提供了 `Pointcut` 接口的八种实现：两个抽象类作为创建静态和动态切点的便捷类，以及六个具体类，分别用于以下场景：\n\
  \n*   组合多个切点\n*   处理控制流切点\n*   执行简单的基于名称的匹配\n*   使用正则表达式定义切点\n*   使用 AspectJ 表达式定义切点\n\
  *   定义在类或方法级别查找特定注解的切点\n\n表 6-3 总结了这八种 `Pointcut` 接口的实现。\n\n![images](img/t0603.jpg)\n\
  \n![images](img/t0603a.jpg)\n\n图 6-3 展示了 `Pointcut` 实现类的 UML 图。\n\n![images](img/9781430241072_Fig06-03.jpg)\n\
  \n***图 6-3.** `Pointcut` 实现类*\n\n我们将在后续章节中详细介绍这六种基本实现。关于 `ComposablePointcut` 和\
  \ `ControlFlowPointcut` 类的讨论将留到下一章。\n\n##### 使用 DefaultPointcutAdvisor\n\n在使用任何\
  \ `Pointcut` 实现之前，必须先创建 `Advisor` 接口的实例，更具体地说是 `PointcutAdvisor` 接口。回顾我们之前的讨论，`Advisor`\
  \ 是 Spring 对切面的表示（本章“Spring 中的切面”部分），它是通知和切点的结合，用于控制哪些方法应该被通知以及如何被通知。Spring 提供了多种\
  \ `PointcutAdvisor` 的实现，但目前我们只关注其中一种——`DefaultPointcutAdvisor`（该类继承自 `AbstractGenericPointcutAdvisor`\
  \ 抽象类，而该类实现了 `PointcutAdvisor`）。`DefaultPointcutAdvisor` 是一个简单的 `PointcutAdvisor`，用于将单个\
  \ `Pointcut` 与单个 `Advice` 关联起来。\n\n##### 使用 StaticMethodMatcherPointcut 创建静态切点\n\
  \n在本节中，我们将通过扩展抽象类 `StaticMethodMatcherPointcut` 来创建一个简单的静态切点。由于 `StaticMethodMatcherPointcut`\
  \ 类扩展了 `StaticMethodMatcher` 类（也是一个抽象类），而该类实现了 `MethodMatcher` 接口，因此你需要实现 `matches(Method,\
  \ Class<?>)` 方法；其余的 `Pointcut` 实现会自动处理。虽然这是你唯一需要实现的方法（当扩展 `StaticMethodMatcherPointcut`\
  \ 类时），但你可能还想像本示例中那样重写 `getClassFilter()` 方法，以确保只有正确类型的方法被通知。\n\n在本示例中，我们有两个类 `BeanOne`\
  \ 和 `BeanTwo`，它们定义了相同的方法。清单 6-22 展示了 `BeanOne` 类。\n\n***清单 6-22.** `BeanOne` 类*\n\
  \n`package com.apress.prospring3.ch6.staticpc;`\n\n`public class BeanOne {`\n\n\
  `    public void foo() {`\n`        System.out.println(\"foo\");`\n`    }`\n\n`    public\
  \ void bar() {`\n`        System.out.println(\"bar\");`\n`    }`\n`}`\n\n`BeanTwo`\
  \ 类具有与 `BeanOne` 相同的方法。在本示例中，我们希望使用同一个 `DefaultPointcutAdvisor` 为这两个类创建代理，但通知仅应用于\
  \ `BeanOne` 类的 `foo()` 方法。为此，我们创建了 `SimpleStaticPointcut` 类，如清单 6-23 所示。\n\n***清单\
  \ 6-23.** `SimpleStaticPointcut` 类*\n\n`package com.apress.prospring3.ch6.staticpc;`\n\
  \n`import java.lang.reflect.Method;`\n\n`import org.springframework.aop.ClassFilter;`\n\
  `import org.springframework.aop.support.StaticMethodMatcherPointcut;`\n\n`public\
  \ class SimpleStaticPointcut extends StaticMethodMatcherPointcut {`\n\n`    public\
  \ boolean matches(Method method, Class<?> cls) {`\n`        return (\"foo\".equals(method.getName()));`\n\
  `    }`\n\n`    public ClassFilter getClassFilter() {`\n`        return new ClassFilter()\
  \ {`\n`            public boolean matches(Class<?> cls) {`\n`                return\
  \ (cls == BeanOne.class);`\n`            }`\n`        };`\n`    }`\n`}`\n\n这里可以看到，我们按照\
  \ `StaticMethodMatcher` 抽象类的要求实现了 `matches(Method, Class<?>)` 方法。该实现仅在方法名为 `foo`\
  \ 时返回 true，否则返回 false。注意，我们还重写了 `getClassFilter()` 方法，返回一个 `ClassFilter` 实例，其 `matches()`\
  \ 方法仅对 `BeanOne` 类返回 true。通过这个静态切点，我们声明只有 `BeanOne` 类的方法会被匹配，并且进一步地，只有该类的 `foo()`\
  \ 方法会被匹配。\n\n清单 6-24 展示了 `SimpleAdvice` 类，它简单地在方法调用的前后各输出一条消息。\n\n***清单 6-24.**\
  \ `SimpleAdvice` 类*\n\n`package com.apress.prospring3.ch6.staticpc;`\n\n`import\
  \ org.aopalliance.intercept.MethodInterceptor;`\n`import org.aopalliance.intercept.MethodInvocation;`\n\
  \n`public class SimpleAdvice implements MethodInterceptor {`\n\n`    public Object\
  \ invoke(MethodInvocation invocation) throws Throwable {`\n`        System.out.println(\"\
  >> Invoking \" + invocation.getMethod().getName());`\n`        Object retVal = invocation.proceed();`\n\
  `        System.out.println(\">> Done\");`\n`        return retVal;`\n`    }`\n\
  `}`\n\n在清单 6-25 中，你可以看到一个简单的驱动应用程序，它使用 `SimpleAdvice` 和 `SimpleStaticPointcut` 类创建了\
  \ `DefaultPointcutAdvisor` 的实例。\n\n***清单 6-25.** `StaticPointcutExample` 类*\n\n\
  `package com.apress.prospring3.ch6.staticpc;`\n\n`import org.aopalliance.aop.Advice;`\n\
  `import org.springframework.aop.Advisor;`\n`import org.springframework.aop.Pointcut;`\n\
  `import org.springframework.aop.framework.ProxyFactory;`\n`import org.springframework.aop.support.DefaultPointcutAdvisor;`\n\
  \n`public class StaticPointcutExample {`\n\n`    public static void main(String[]\
  \ args) {`\n`        BeanOne one = new BeanOne();`\n`        BeanTwo two = new BeanTwo();`\n\
  \n`        BeanOne proxyOne;`\n`        BeanTwo proxyTwo;`\n\n`        // 创建切点、通知和顾问`\n\
  `        Pointcut pc = new SimpleStaticPointcut();`\n`        Advice advice = new\
  \ SimpleAdvice();`\n`        Advisor advisor = new DefaultPointcutAdvisor(pc, advice);`\n\
  \n`        // 创建 BeanOne 代理`\n`        ProxyFactory pf = new ProxyFactory();`\n\
  `        pf.addAdvisor(advisor);`\n`        pf.setTarget(one);`\n`        proxyOne\
  \ = (BeanOne)pf.getProxy();`\n\n`        // 创建 BeanTwo 代理`\n`        pf = new ProxyFactory();`\n\
  `        pf.addAdvisor(advisor);`\n`        pf.setTarget(two);`\n`        proxyTwo\
  \ = (BeanTwo)pf.getProxy();`\n\n`        proxyOne.foo();`\n`        proxyTwo.foo();`\n\
  \n`        proxyOne.bar();`\n`        proxyTwo.bar();`\n`    }`\n`}`\n\n注意，`DefaultPointcutAdvisor`\
  \ 实例随后被用于创建两个代理：一个用于 `BeanOne` 实例，另一个用于 `BeanTwo` 实例。最后，在两个代理上分别调用了 `foo()` 和 `bar()`\
  \ 方法。\n\n运行此示例将产生以下输出：\n\n`>> Invoking foo`\n`foo`\n`>> Done`\n`foo`\n`bar`\n`bar`\n\
  \n如你所见，`SimpleAdvice` 实际被调用的唯一方法是 `BeanOne` 类的 `foo()` 方法，完全符合预期。限制通知所应用的方法非常简单，并且正如我们将在讨论不同代理选项时看到的那样，这是让应用程序获得最佳性能的关键。\n\
  \n\n\n##### 使用 DynamicMethodMatcherPointcut 创建动态切入点\n\n正如本节将要演示的，创建动态切入点与创建静态切入点并没有太大区别。在本例中，我们将为清单\
  \ 6-26 中所示的类创建一个动态切入点。\n\n***清单 6-26.** `SampleBean` 类*\n\n`package com.apress.prospring3.ch6.dynamicpc;`\n\
  \n`public class SampleBean {`\n\n`    public void foo(int x) {`\n`        System.out.println(\"\
  Invoked foo() with: \" + x);`\n`    }`\n\n`    public void bar() {`\n`        System.out.println(\"\
  Invoked bar()\");`\n`    }`\n`}`\n\n在本例中，我们只想增强 `foo()` 方法，但与上一个示例不同，我们仅当传递给该方法的\
  \ `int` 参数大于或小于 100 时才对其进行增强。\n\n与静态切入点一样，Spring 为创建动态切入点提供了一个便捷的基类——`DynamicMethodMatcherPointcut`。`DynamicMethodMatcherPointcut`\
  \ 类有一个必须实现的抽象方法 `matches(Method, Class<?>, Object[])`（通过其实现的 `MethodMatcher` 接口），但正如你将看到的，实现\
  \ `matches(Method, Class<?>)` 方法来控制静态检查的行为也是明智之举。清单 6-27 展示了 `SimpleDynamicPointcut`\
  \ 类。\n\n***清单 6-27.** `SimpleDynamicPointcut` 类*\n\n`package com.apress.prospring3.ch6.dynamicpc;`\n\
  \n`import java.lang.reflect.Method;`\n\n`import org.springframework.aop.ClassFilter;`\n\
  `import org.springframework.aop.support.DynamicMethodMatcherPointcut;`\n\n`public\
  \ class SimpleDynamicPointcut extends DynamicMethodMatcherPointcut {`\n\n`    public\
  \ boolean matches(Method method, Class<?> cls) {`\n`        System.out.println(\"\
  Static check for \" + method.getName());`\n`        return (\"foo\".equals(method.getName()));`\n\
  `    }`\n\n`    public boolean matches(Method method, Class<?> cls, Object[] args)\
  \ {`\n`        System.out.println(\"Dynamic check for \" + method.getName());`\n\
  \n`        int x = ((Integer) args[0]).intValue();`\n\n`        return (x != 100);`\n\
  `    }`\n\n`    public ClassFilter getClassFilter() {`\n`        return new ClassFilter()\
  \ {`\n`            public boolean matches(Class<?> cls) {`\n`                return\
  \ (cls == SampleBean.class);`\n`            }`\n`        };`\n`    }`\n`}`\n\n从清单\
  \ 6-27 的代码中可以看出，我们以与清单 6-23 所示的上一个示例类似的方式重写了 `getClassFilter()` 方法。这消除了在方法匹配方法中检查类的需要——这对于动态检查尤其重要。虽然我们只需要实现动态检查，但我们也实现了静态检查。这样做的原因是我们知道\
  \ `bar()` 方法永远不会被增强。通过使用静态检查来表明这一点，Spring 就无需再对该方法执行动态检查。这是因为当实现了静态检查方法时，Spring\
  \ 会首先对其进行检查，如果检查结果不匹配，Spring 就会停止进一步的动态检查。此外，静态检查的结果会被缓存以获得更好的性能。但如果我们忽略了静态检查，Spring\
  \ 每次调用 `bar()` 方法时都会执行动态检查。作为一种推荐做法，请在 `getClassFilter()` 方法中执行类检查，在 `matches(Method,\
  \ Class<?>)` 方法中执行方法检查，并在 `matches(Method, Class<?>, Object[])` 方法中执行参数检查。这将使你的切入点更易于理解和维护，并且性能也会更好。\n\
  \n在 `matches(Method, Class<?>, Object[])` 方法中，你可以看到，如果传递给 `foo()` 方法的 `int` 参数的值不等于\
  \ 100，则返回 false；否则返回 true。请注意，在动态检查中，我们知道我们正在处理的是 `foo()` 方法，因为没有其他方法能通过静态检查。\n\n\
  在清单 6-28 中，你可以看到此切入点实际应用的示例。\n\n***清单 6-28.** `DynamicPointcutExample` 类*\n\n`package\
  \ com.apress.prospring3.ch6.dynamicpc;`\n\n`import org.springframework.aop.Advisor;`\n\
  `import org.springframework.aop.framework.ProxyFactory;`\n`import org.springframework.aop.support.DefaultPointcutAdvisor;`\n\
  \n`import com.apress.prospring3.ch6.staticpc.SimpleAdvice;`\n\n`public class DynamicPointcutExample\
  \ {`\n\n`    public static void main(String[] args) {`\n`        SampleBean target\
  \ = new SampleBean();`\n\n`        // 创建通知器`\n`        Advisor advisor = new DefaultPointcutAdvisor(`\n\
  `            new SimpleDynamicPointcut(), new SimpleAdvice());`\n\n`        // 创建代理`\n\
  `        ProxyFactory pf = new ProxyFactory();`\n`        pf.setTarget(target);`\n\
  `        pf.addAdvisor(advisor);`\n`        SampleBean proxy = (SampleBean)pf.getProxy();`\n\
  \n`        proxy.foo(1);`\n`        proxy.foo(10);`\n`        proxy.foo(100);`\n\
  \n`        proxy.bar();`\n`        proxy.bar();`\n`        proxy.bar();`\n`    }`\n\
  `}`\n\n请注意，我们使用了与静态切入点示例中相同的通知类。但是，在本例中，只有前两次对 `foo()` 的调用应该被增强。动态检查阻止了对 `foo()`\
  \ 的第三次调用被增强，而静态检查则阻止了对 `bar()` 方法的增强。运行此示例将产生以下输出：\n\n`Static check for foo`\n`Static\
  \ check for bar`\n`Static check for toString`\n`Static check for clone`\n`Static\
  \ check for foo`\n`Dynamic check for foo`\n`>> Invoking foo`\n`Invoked foo() with:\
  \ 1`\n`>> Done`\n`Dynamic check for foo`\n`>> Invoking foo`\n`Invoked foo() with:\
  \ 10`\n`>> Done`\n`Dynamic check for foo`\n`Invoked foo() with: 100`\n`Static check\
  \ for bar`\n`Invoked bar()`\n`Invoked bar()`\n`Invoked bar()`\n\n正如我们所料，只有前两次对 `foo()`\
  \ 方法的调用被增强了。请注意，由于对 `bar()` 进行了静态检查，所有对 `bar()` 的调用都无需进行动态检查。这里一个有趣的点是，`foo()` 方法实际上经历了两次静态检查：一次是在初始阶段检查所有方法时，另一次是在它首次被调用时。\n\
  \n如你所见，动态切入点比静态切入点提供了更大的灵活性，但由于它们需要额外的运行时开销，因此你应该仅在绝对必要时才使用动态切入点。\n\n\n\n##### 使用简单名称匹配\n\
  \n在创建切点时，通常希望仅根据方法名称进行匹配，而忽略方法签名和返回类型。在这种情况下，无需创建 `StaticMethodMatcherPointcut`\
  \ 的子类，可以使用 `NameMatchMethodPointcut`（它是 `StaticMethodMatcherPointcut` 的子类）来匹配一个方法名称列表。使用\
  \ `NameMatchMethodPointcut` 时，不会考虑方法的签名，因此如果你有 `foo()` 和 `foo(int)` 方法，它们都会匹配名称\
  \ `foo`。\n\n下面进行演示。清单 6-29 展示了一个包含四个方法的简单类。\n\n***清单 6-29.** `NameBean` 类*\n\n`package\
  \ com.apress.prospring3.ch6.namepc;`\n\n`public class NameBean {`\n\n`    public\
  \ void foo() {`\n`        System.out.println(\"foo\");`\n`    }`\n\n`    public\
  \ void foo(int x) {`\n`        System.out.println(\"foo \" + x);`\n`    }`\n\n`    public\
  \ void bar() {`\n`        System.out.println(\"bar\");`\n`    }`\n\n`    public\
  \ void yup() {`\n`        System.out.println(\"yup\");`\n`    }`\n`}`\n\n在这个例子中，我们希望使用\
  \ `NameMatchMethodPointcut` 匹配 `foo()`、`foo(int)` 和 `bar()` 方法；这相当于匹配名称 `foo` 和\
  \ `bar`。如清单 6-30 所示。\n\n***清单 6-30.** 使用 `NameMatchMethodPointcut`*\n\n`package\
  \ com.apress.prospring3.ch6.namepc;`\n\n`import org.springframework.aop.Advisor;`\n\
  `import org.springframework.aop.framework.ProxyFactory;`\n`import org.springframework.aop.support.DefaultPointcutAdvisor;`\n\
  `import org.springframework.aop.support.NameMatchMethodPointcut;`\n\n`import com.apress.prospring3.ch6.staticpc.SimpleAdvice;`\n\
  \n`public class NamePointcutExample {`\n\n`    public static void main(String[]\
  \ args) {`\n`        NameBean target = new NameBean();`\n\n`        // 创建通知器`\n\
  `        NameMatchMethodPointcut pc = new NameMatchMethodPointcut();`\n`        pc.addMethodName(\"\
  foo\");`\n`        pc.addMethodName(\"bar\");`\n`        Advisor advisor = new DefaultPointcutAdvisor(pc,\
  \ new SimpleAdvice());`\n\n`        // 创建代理`\n`        ProxyFactory pf = new ProxyFactory();`\n\
  `        pf.setTarget(target);`\n`        pf.addAdvisor(advisor);`\n`        NameBean\
  \ proxy = (NameBean)pf.getProxy();`\n\n`        proxy.foo();`\n`        proxy.foo(999);`\n\
  `        proxy.bar();`\n`        proxy.yup();`\n`    }`\n`}`\n\n无需为切点创建类；只需创建一个\
  \ `NameMatchMethodPointcut` 实例即可。请注意，我们使用 `addMethodName()` 方法向切点添加了两个名称：`foo` 和\
  \ `bar`。运行此示例将产生以下输出：\n\n`>> Invoking foo`\n`foo`\n`>> Done`\n`>> Invoking foo`\n\
  `foo 999`\n`>> Done`\n`>> Invoking bar`\n`bar`\n`>> Done`\n`yup`\n\n正如预期，得益于切点，`foo()`、`foo(int)`\
  \ 和 `bar()` 方法被增强了，而 `yup()` 方法未被增强。\n\n##### 使用正则表达式创建切点\n\n在上一节中，我们讨论了如何针对预定义的方法列表进行简单匹配。但如果你事先不知道所有方法的名称，而是知道名称遵循的模式呢？例如，如果你想匹配所有名称以\
  \ `get` 开头的方法，该怎么办？在这种情况下，你可以使用正则表达式切点 `JdkRegexpMethodPointcut` 来基于正则表达式匹配方法名称。\n\
  \n清单 6-31 中的代码展示了一个包含三个方法的简单类。\n\n***清单 6-31.** `RegexpBean` 类*\n\n`package com.apress.prospring3.ch6.regexppc;`\n\
  \n`public class RegexpBean {`\n\n`    public void foo1() {`\n`        System.out.println(\"\
  foo1\");`\n`    }`\n\n`    public void foo2() {`\n`        System.out.println(\"\
  foo2\");`\n`    }`\n\n`    public void bar() {`\n`        System.out.println(\"\
  bar\");`\n`    }`\n`}`\n\n使用基于正则表达式的切点，我们可以匹配此类中所有名称以 `foo` 开头的方法。如清单 6-32 所示。\n\
  \n***清单 6-32.** 使用正则表达式创建切点*\n\n`package com.apress.prospring3.ch6.regexppc;`\n\n\
  `import org.springframework.aop.Advisor;`\n`import org.springframework.aop.framework.ProxyFactory;`\n\
  `import org.springframework.aop.support.DefaultPointcutAdvisor;`\n`import org.springframework.aop.support.JdkRegexpMethodPointcut;`\n\
  \n`import com.apress.prospring3.ch6.staticpc.SimpleAdvice;`\n\n`public class RegexpPointcutExample\
  \ {`\n\n`    public static void main(String[] args) {`\n`        RegexpBean target\
  \ = new RegexpBean();`\n\n`        // 创建通知器`\n`        JdkRegexpMethodPointcut pc\
  \ = new JdkRegexpMethodPointcut();`\n`        pc.setPattern(\".*foo.*\");`\n`        Advisor\
  \ advisor = new DefaultPointcutAdvisor(pc, new SimpleAdvice());`\n\n`        //\
  \ 创建代理`\n`        ProxyFactory pf = new ProxyFactory();`\n`        pf.setTarget(target);`\n\
  `        pf.addAdvisor(advisor);`\n`        RegexpBean proxy = (RegexpBean)pf.getProxy();`\n\
  \n`        proxy.foo1();`\n`        proxy.foo2();`\n`        proxy.bar();`\n`    }`\n\
  `}`\n\n请注意，我们不需要为切点创建类；只需创建一个 `JdkRegexpMethodPointcut` 实例并指定要匹配的模式即可。有趣的是这个模式。在匹配方法名称时，Spring\
  \ 会匹配方法的完全限定名，因此对于 `foo1()`，Spring 匹配的是 `com.apress.prospring3.ch6.regexppc.RegexpBean.foo1`，这就是模式开头有\
  \ `.*` 的原因。这是一个强大的概念，因为它允许你匹配给定包中的所有方法，而无需确切知道该包中有哪些类以及方法的名称是什么。运行此示例将产生以下输出：\n\n\
  `>> Invoking foo1`\n`foo1`\n`>> Done`\n`>> Invoking foo2`\n`foo2`\n`>> Done`\n`bar`\n\
  \n正如你所料，只有 `foo1()` 和 `foo2()` 方法被增强了，因为 `bar()` 方法与正则表达式模式不匹配。\n\n\n\n##### 使用\
  \ AspectJ 切点表达式创建切点\n\n除了 JDK 正则表达式，你还可以使用 AspectJ 的切点表达式语言来声明切点。在下一章中，你将看到，当我们在\
  \ XML 配置中使用`aop`命名空间声明切点时，Spring 默认会使用 AspectJ 的切点语言。此外，当使用 Spring 的@AspectJ 注解风格的\
  \ AOP 支持时，你也需要使用 AspectJ 的切点语言。因此，在使用表达式语言声明切点时，使用 AspectJ 切点表达式是最佳选择。Spring 提供了`AspectJExpressionPointcut`类，用于使用\
  \ AspectJ 的表达式语言定义切点。要在 Spring 中使用 AspectJ 切点表达式，你需要在项目的类路径中包含两个 AspectJ 库文件：`aspectjrt.jar`和`aspectjweaver.jar`。在\
  \ STS 中，你可以简单地将表 6-4 中所示的依赖项添加到你的项目中。\n\n![images](img/t0604.jpg)\n\n让我们再次使用之前 JDK\
  \ 正则表达式的例子，看看如何使用 AspectJ 表达式来实现相同的结果。清单 6-33 展示的 bean 与清单 6-31 中的 bean 相同，只是类名不同。\n\
  \n***清单 6-33.** `AspectjexpBean`类*\n\n`package com.apress.prospring3.ch6.aspectjexppc;`\n\
  \n`public class AspectjexpBean {`\n\n`    public void foo1() {`\n`        System.out.println(\"\
  foo1\");`\n`    }`\n\n`    public void foo2() {`\n`        System.out.println(\"\
  foo2\");`\n`    }`\n\n`    public void bar() {`\n`        System.out.println(\"\
  bar\");`\n`    }`\n`}`\n\n使用基于 AspectJ 表达式的切点，我们也可以轻松匹配该类中所有名称以`foo`开头的方法。如清单 6-34\
  \ 所示。\n\n***清单 6-34.** 使用 AspectJ 表达式定义切点*\n\n`package com.apress.prospring3.ch6.aspectjexppc;`\n\
  \n`import org.springframework.aop.Advisor;`\n`import org.springframework.aop.aspectj.AspectJExpressionPointcut;`\n\
  `import org.springframework.aop.framework.ProxyFactory;`\n`import org.springframework.aop.support.DefaultPointcutAdvisor;`\n\
  \n`import com.apress.prospring3.ch6.staticpc.SimpleAdvice;`\n\n`public class AspectjexpPointcutExample\
  \ {`\n\n`    public static void main(String[] args) {`\n`        AspectjexpBean\
  \ target = new AspectjexpBean();`\n\n`        // 创建通知器`\n`        AspectJExpressionPointcut\
  \ pc = new AspectJExpressionPointcut();`\n`        pc.setExpression(\"execution(*\
  \ foo*(..))\");`\n`        Advisor advisor = new DefaultPointcutAdvisor(pc, new\
  \ SimpleAdvice());`\n\n`        // 创建代理`\n`        ProxyFactory pf = new ProxyFactory();`\n\
  `        pf.setTarget(target);`\n`        pf.addAdvisor(advisor);`\n`        AspectjexpBean\
  \ proxy = (AspectjexpBean) pf.getProxy();`\n\n`        proxy.foo1();`\n`        proxy.foo2();`\n\
  `        proxy.bar();`\n`    }`\n`}`\n\n请注意，我们使用`AspectJExpressionPointcut`的`setExpression()`方法来设置匹配条件。表达式`\"\
  execution(* foo*(..))\"`表示通知应应用于所有以`foo`开头、接受任意参数并返回任意类型的方法的执行。运行该程序将得到与之前使用 JDK\
  \ 正则表达式的示例相同的结果。\n\n##### 创建注解匹配切点\n\n如果你的应用程序是基于注解的，你可能希望使用自己指定的注解来定义切点，即，将通知逻辑应用于所有带有特定注解的方法或类型。Spring\
  \ 提供了`AnnotationMatchingPointcut`类，用于使用注解定义切点。再次，让我们重用之前的例子，看看我们是如何使用注解作为切点的。\n\n\
  让我们定义一个名为`AdviceRequired`的注解接口，我们将使用它来声明切点。清单 6-35 展示了这个注解类。\n\n***清单 6-35.** 使用注解定义切点*\n\
  \n`package com.apress.prospring3.ch6.annotationpc;`\n\n`import java.lang.annotation.ElementType;`\n\
  `import java.lang.annotation.Retention;`\n`import java.lang.annotation.RetentionPolicy;`\n\
  `import java.lang.annotation.Target;`\n\n`@Retention(RetentionPolicy.RUNTIME)`\n\
  `@Target({ElementType.TYPE, ElementType.METHOD})`\n`public @interface AdviceRequired\
  \ {`\n`}`\n\n在上一个清单中，你可以看到我们通过使用`@interface`作为类型来将该接口声明为注解，并且`@Target`注解定义了该注解可以应用于类型或方法级别。\n\
  \n清单 6-36 展示了一个包含注解的简单 bean。\n\n***清单 6-36.** `SampleAnnotationBean`类*\n\n`package\
  \ com.apress.prospring3.ch6.annotationpc;`\n\n`public class SampleAnnotationBean\
  \ {`\n\n`   @AdviceRequired`\n`    public void foo(int x) {`\n`        System.out.println(\"\
  Invoked foo() with: \"  +x);`\n`    }`\n\n`    public void bar() {`\n`        System.out.println(\"\
  Invoked bar()\");`\n`    }`\n`}`\n\n对于上面的 bean，`foo()`方法被`@AdviceRequired`注解标记，我们希望将通知应用于该方法。\n\
  \n清单 6-37 展示了测试程序。\n\n***清单 6-37.** 使用注解测试切点*\n\n`package com.apress.prospring3.ch6.annotationpc;`\n\
  \n`import org.springframework.aop.Advisor;`\n`import org.springframework.aop.framework.ProxyFactory;`\n\
  `import org.springframework.aop.support.DefaultPointcutAdvisor;`\n`import org.springframework.aop.support.annotation.AnnotationMatchingPointcut;`\n\
  \n`import com.apress.prospring3.ch6.staticpc.SimpleAdvice;`\n\n`public class AnnotationPointcutExample\
  \ {`\n\n`    public static void main(String[] args) {`\n`        SampleAnnotationBean\
  \ target = new SampleAnnotationBean();`\n\n`        // 创建通知器`\n`        AnnotationMatchingPointcut\
  \ pc = AnnotationMatchingPointcut`\n`            .forMethodAnnotation(AdviceRequired.class);`\n\
  `        Advisor advisor = new DefaultPointcutAdvisor(pc, new SimpleAdvice());`\n\
  \n`        // 创建代理`\n`        ProxyFactory pf = new ProxyFactory();`\n`        pf.setTarget(target);`\n\
  `        pf.addAdvisor(advisor);`\n`        SampleAnnotationBean proxy = (SampleAnnotationBean)\
  \ pf.getProxy();`\n\n`        proxy.foo(100);`\n`        proxy.bar();`\n`    }`\n\
  `}`\n\n在上一个清单中，通过调用其静态方法`forMethodAnnotation()`并传入注解类型，获取了一个`AnnotationMatchingPointcut`实例。这表明我们希望将通知应用于所有带有给定注解的方法。也可以通过调用`forClassAnnotation()`方法来指定应用于类型级别的注解。以下是程序运行时的输出：\n\
  \n`>> Invoking foo`\n`Invoked foo() with: 100`\n`>> Done`\n`Invoked bar()`\n\n如你所见，由于我们注解了`foo()`方法，只有该方法被通知了。\n\
  \n\n\n##### 便捷的 Advisor 实现\n\n对于许多 `Pointcut` 实现，Spring 也提供了便捷的 `Advisor` 实现，它本身充当了\
  \ `Pointcut` 的角色。例如，在前面的示例中，我们不必将 `NameMatchMethodPointcut` 与 `DefaultPointcutAdvisor`\
  \ 结合使用，而可以直接使用 `NameMatchMethodPointcutAdvisor`，如清单 6-38 所示。\n\n***清单 6-38.** 使用\
  \ `NameMatchMethodPointcutAdvisor`*\n\n`package com.apress.prospring3.ch6.namepc;`\n\
  \n`import org.springframework.aop.framework.ProxyFactory;`\n`import org.springframework.aop.support.NameMatchMethodPointcutAdvisor;`\n\
  \n`import com.apress.prospring3.ch6.staticpc.SimpleAdvice;`\n\n`public class NamePointcutUsingAdvisor\
  \ {`\n\n`    public static void main(String[] args) {`\n`        NameBean target\
  \ = new NameBean();`\n\n`        // 创建 advisor`\n`        NameMatchMethodPointcutAdvisor\
  \ advisor = new`\n`            NameMatchMethodPointcutAdvisor(new SimpleAdvice());`\n\
  `        advisor.addMethodName(\"foo\");`\n`        advisor.addMethodName(\"bar\"\
  );`\n\n`        // 创建代理`\n`        ProxyFactory pf = new ProxyFactory();`\n`        pf.setTarget(target);`\n\
  `        pf.addAdvisor(advisor);`\n`        NameBean proxy = (NameBean) pf.getProxy();`\n\
  \n`        proxy.foo();`\n`        proxy.foo(999);`\n`        proxy.bar();`\n`        proxy.yup();`\n\
  `    }`\n`}`\n\n请注意，在清单 6-38 中，我们并没有创建 `NameMatchMethodPointcut` 的实例，而是在 `NameMatchMethodPointcutAdvisor`\
  \ 的实例上配置了切入点细节。通过这种方式，`NameMatchMethodPointcutAdvisor` 同时扮演了 `Advisor` 和 `Pointcut`\
  \ 的角色。\n\n你可以通过查阅 `org.springframework.aop.support` 包的 JavaDoc 来了解不同便捷 `Advisor`\
  \ 实现的完整细节。这两种方法在性能上没有明显差异，除了第二种方法代码稍少一些外，实际的编码方式也几乎没有区别。我们更倾向于坚持使用第一种方法，因为我们认为其代码意图更清晰。最终，选择哪种风格取决于个人偏好。\n\
  \n### 理解代理\n\n到目前为止，我们只是粗略地看了一下 `ProxyFactory` 生成的代理。我们提到 Spring 中有两种类型的代理：使用 JDK\
  \ `Proxy` 类创建的 JDK 代理和使用 CGLIB `Enhancer` 类创建的基于 CGLIB 的代理。你可能想知道这两种代理之间到底有什么区别，以及为什么\
  \ Spring 需要两种不同类型的代理。在本节中，我们将详细探讨代理之间的差异。\n\n代理的核心目标是拦截方法调用，并在必要时执行适用于特定方法的通知链。通知的管理和调用在很大程度上与代理无关，由\
  \ Spring AOP 框架管理。然而，代理负责拦截对所有方法的调用，并根据需要将它们传递给 AOP 框架以应用通知。\n\n除了这个核心功能外，代理还必须支持一组附加功能。可以配置代理通过\
  \ `AopContext` 类（这是一个抽象类）暴露自身，以便你可以检索代理并从目标对象调用代理上的通知方法。代理负责确保当通过 `ProxyFactory.setExposeProxy()`\
  \ 启用此选项时，代理类被适当地暴露。除此之外，所有代理类默认都实现了 `Advised` 接口，该接口允许在创建代理后更改通知链等操作。代理还必须确保任何返回\
  \ `this`（即返回被代理的目标）的方法实际上返回的是代理而不是目标。\n\n如你所见，一个典型的代理需要执行相当多的工作，所有这些逻辑都在 JDK 和 CGLIB\
  \ 代理中实现了。\n\n#### 使用 JDK 动态代理\n\nJDK 代理是 Spring 中最基本的代理类型。与 CGLIB 代理不同，JDK 代理只能生成接口的代理，而不能生成类的代理。因此，任何你想要代理的对象都必须至少实现一个接口。通常，为你的类使用接口是一种良好的设计，但这并不总是可行的，尤其是在处理第三方或遗留代码时。在这种情况下，你必须使用\
  \ CGLIB 代理。\n\n当使用 JDK 代理时，所有方法调用都会被 JVM 拦截并路由到代理的 `invoke()` 方法。然后，此方法确定所讨论的方法是否被通知（根据切入点定义的规则），如果是，则调用通知链，然后使用反射调用方法本身。除此之外，`invoke()`\
  \ 方法还执行了上一节讨论的所有逻辑。\n\nJDK 代理在进入 `invoke()` 方法之前，不会区分被通知和未被通知的方法。这意味着，对于代理上未被通知的方法，`invoke()`\
  \ 方法仍然会被调用，所有检查仍然会执行，并且该方法仍然会通过反射被调用。显然，每次调用该方法时都会产生运行时开销，即使代理除了通过反射调用未被通知的方法外，通常不执行任何额外的处理。\n\
  \n你可以通过使用 `setInterfaces()`（在 `ProxyFactory` 类间接扩展的 `AdvisedSupport` 类中）指定要代理的接口列表，来指示\
  \ `ProxyFactory` 使用 JDK 代理。\n\n#### 使用 CGLIB 代理\n\n对于 JDK 代理，关于如何处理特定方法调用的所有决策都是在每次调用该方法时在运行时做出的。当你使用\
  \ CGLIB 时，CGLIB 会为每个代理动态地生成一个新类的字节码，并尽可能重用已生成的类。\n\n当首次创建 CGLIB 代理时，CGLIB 会询问 Spring\
  \ 它希望如何处理每个方法。这意味着，在 JDK 代理的每次 `invoke()` 调用中执行的许多决策，对于 CGLIB 代理来说只执行一次。由于 CGLIB\
  \ 生成实际的字节码，因此在处理方式上也有更大的灵活性。例如，CGLIB 代理会生成适当的字节码来直接调用任何未被通知的方法，从而减少了代理引入的开销。除此之外，CGLIB\
  \ 代理还会判断一个方法是否可能返回 `this`；如果不可能，它允许直接调用该方法，再次减少了运行时开销。\n\nCGLIB 代理处理固定通知链的方式也与 JDK\
  \ 代理不同。固定通知链是指你保证在代理生成后不会更改的通知链。默认情况下，即使在代理创建之后，你也可以更改代理上的顾问和通知，尽管这很少是必需的。CGLIB\
  \ 代理以特定方式处理固定通知链，从而减少了执行通知链的运行时开销。\n\n\n\n#### 比较代理性能\n\n到目前为止，我们只是粗略地讨论了不同代理类型在实现上的差异。在本节中，我们将运行一个简单的性能测试，来比较\
  \ CGLIB 代理与 JDK 代理的性能。\n\n让我们创建一个 `ISimpleBean` 接口及其实现类 `SimpleBean`，我们将使用它作为代理的目标对象。代码清单\
  \ 6-39 和 代码清单 6-40 分别展示了 `ISimpleBean` 接口和 `SimpleBean` 类。\n\n***代码清单 6-39.** `ISimpleBean`\
  \ 接口*\n\n`package com.apress.prospring3.ch6.proxies;`\n\n`public interface ISimpleBean\
