  \ Servlet。该调度 Servlet 的 `WebApplicationContext` 位于 `/src/main/webapp/WEB-INF/spring/appServlet/servlet-context.xml`。\n\
  \n![images](img/t1701.jpg)\n\n### 在 Spring MVC 中创建第一个视图\n\n有了服务层和 Spring MVC 配置，我们就可以开始实现第一个视图了。在本节中，我们将实现一个简单的视图，用于显示最初由脚本\
  \ `test-data.sql` 填充的所有联系人。\n\n如前所述，我们将使用 JSPX 来实现视图。JSPX 是格式良好的 XML 格式的 JSP。与 JSP\
  \ 相比，JSPX 的主要优势如下：\n\n*   JSPX 更严格地强制将代码与视图层分离。例如，你不能在 JSPX 文档中放置 Java 脚本片段。\n*\
  \   工具可以执行即时验证（针对 XML 语法），因此可以更早地发现错误。\n*   当将 JSP 与 Spring MVC 以及其他 Spring 项目（Spring\
  \ Web Flow、Spring Roo 等）一起使用时，JSPX 是推荐的格式。\n\n为了准备第一个视图，需要添加一个新的 Maven 依赖项，如表 17-2\
  \ 所列。请将其添加到你的项目中。\n\n![images](img/t1702.jpg)\n\n#### 配置 DispatcherServlet\n\n下一步是配置\
  \ `DispatcherServlet`。为了实现这个简单的视图，我们需要对 Spring 模板项目生成的默认配置文件进行一些小的修改。清单 17-10 显示了修改后的配置（`/src/main/webapp/WEB-INF/spring/appServlet/servlet-context.xml`）。\n\
  \n***清单 17-10.** `DispatcherServlet` 配置*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"\
  ?>`\n`<beans:beans`\n\n`    xsi:schemaLocation=\"http://www.springframework.org/schema/mvc`\n\
  `        http://www.springframework.org/schema/mvc/spring-mvc-3.1.xsd`\n`        http://www.springframework.org/schema/beans`\n\
  `        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n`        http://www.springframework.org/schema/context`\n\
  `        http://www.springframework.org/schema/context/spring-context-3.1.xsd\"\
  >`\n\n`    <annotation-driven />`\n\n`    <resources mapping=\"/resources/**\" location=\"\
  /resources/\" />`\n\n`    <beans:bean class=\"org.springframework.web.servlet.view.InternalResourceViewResolver\"\
  >`\n`        <beans:property name=\"prefix\" value=\"/WEB-INF/views/\" />`\n`        <beans:property\
  \ name=\"suffix\" value=\".jspx\" />`\n`    </beans:bean>`\n\n`    <context:component-scan`\n\
  `        base-package=\"com.apress.prospring3.ch17.web.controller\" />`\n\n`</beans:beans>`\n\
  \n如清单 17-10 所示，`mvc` 命名空间被声明为默认命名空间。`<annotation-driven>` 标签启用了对 Spring MVC 控制器注解配置的支持，同时也启用了\
  \ Spring 3 类型转换和格式化支持。此外，该标签还启用了对 JSR-303 Bean 验证的支持。`<resources>` 标签定义了静态资源（例如，CSS、JavaScript、图像等）及其位置，以便\
  \ Spring MVC 可以提高提供这些文件的性能。`<context:component-scan>` 标签你应该很熟悉。\n\n对于 `ViewResolver`\
  \ 接口，我们将继续使用 `InternalResourceViewResolver` 类作为实现。但是，对于后缀，我们将将其更改为 `.jspx`。\n\n\
  #### 实现 ContactController\n\n配置好 `DispatherServlet` 的 `WebApplicationContext` 后，下一步是实现控制器类。清单\
  \ 17-11 显示了 `ContactController` 类。\n\n***清单 17-11.** `ContactController` 类*\n\n\
  `package com.apress.prospring3.ch17.web.controller;`\n\n`import java.util.List;`\n\
  \n`import org.slf4j.Logger;`\n`import org.slf4j.LoggerFactory;`\n`import org.springframework.beans.factory.annotation.Autowired;`\n\
  `import org.springframework.stereotype.Controller;`\n`import org.springframework.ui.Model;`\n\
  `import org.springframework.web.bind.annotation.RequestMapping;`\n`import org.springframework.web.bind.annotation.RequestMethod;`\n\
  \n`import com.apress.prospring3.ch17.domain.Contact;`\n`import com.apress.prospring3.ch17.service.ContactService;`\n\
  \n`@RequestMapping(\"/contacts\")`\n`@Controller`\n`public class ContactController\
  \ {`\n\n`   final Logger logger = LoggerFactory.getLogger(ContactController.class);`\n\
  \n`   @Autowired`\n`   private ContactService contactService;`\n\n`   @RequestMapping(method\
  \ = RequestMethod.GET)`\n`   public String list(Model uiModel) {`\n`      logger.info(\"\
  Listing contacts\");`\n\n`      List<Contact> contacts = contactService.findAll();`\n\
  `      uiModel.addAttribute(\"contacts\", contacts);`\n\n`      logger.info(\"No.\
  \ of contacts: \" + contacts.size());`\n\n`      return \"contacts/list\";`\n`   }`\n\
  `}`\n\n如清单 17-11 所示，注解 `@Controller` 应用于该类，表明它是一个 Spring MVC 控制器。类级别的 `@RequestMapping`\
  \ 注解指示了将由该控制器处理的根 URL。在这种情况下，所有前缀为 `/ch17/contacts` 的 URL 都将被分派到此控制器。在 `list()`\
  \ 方法中，也应用了 `@RequestMapping` 注解，但这次该方法映射到了 HTTP GET 方法。这意味着使用 HTTP GET 方法的 URL `/ch17/contacts`\
  \ 将由该方法处理。在 `list()` 方法内部，检索联系人列表并将其保存到由 Spring MVC 传入该方法的 `Model` 接口中。最后，返回逻辑视图名称\
  \ `contacts/list`。在 `DispatcherServlet` 配置中，`InternalResourceViewResolver` 被配置为视图解析器，并且文件的前缀为\
  \ `/WEB-INF/views/`，后缀为 `.jspx`。因此，Spring MVC 将选取文件 `/WEB-INF/views/contacts/list.jspx`\
  \ 作为视图。\n\n\n\n#### 实现联系人列表视图\n\n下一步是实现用于显示联系人信息的视图页面，即文件 `/src/main/webapp/WEB-INF/views/contacts/list.jspx`。清单\
  \ 17-12 展示了页面内容。\n\n***清单 17-12.** 联系人列表视图*\n\n`<?xml version=\"1.0\" encoding=\"\
  UTF-8\" standalone=\"no\"?>`\n`<div`\n\n`     version=\"2.0\">`\n`     <jsp:directive.page\
  \ contentType=\"text/html;charset=UTF-8\"/>`\n`     <jsp:output omit-xml-declaration=\"\
  yes\"/>`\n\n`     <h1>联系人列表</h1>  `\n\n`     <c:if test=\"${not empty contacts}\"\
  >`\n`         <table>`\n`             <thead>`\n`                 <tr>`\n`                     <th>名</th>`\n\
  `                     <th>姓</th>`\n`                     <th>出生日期</th>`\n`                 </tr>`\n\
  `             </thead>`\n`             <tbody>`\n`                 <c:forEach items=\"\
  ${contacts}\" var=\"contact\">`\n`                     <tr>`\n`                         <td>${contact.firstName}</td>`\n\
  `                         <td>${contact.lastName}</td>`\n`                         <td><joda:format\
  \ value=\"${contact.birthDate}\" pattern=\"yyyy-MM-`![images](img/U002.jpg)\n`dd\"\
  /></td>`\n`                     </tr>`\n`                </c:forEach>`\n`            </tbody>`\n\
  `        </table>`\n\n`    </c:if>`\n\n`</div>`\n\n如果你之前开发过 JSP，那么清单 17-12 对你来说应该很熟悉。但由于这是一个\
  \ JSPX 页面，页面内容被嵌入在 `<div>` 标签下。此外，所使用的标签库被声明为 XML 命名空间。\n\n首先，`<jsp:directive.page>`\
  \ 标签定义了适用于整个 JSPX 页面的属性，而 `<jsp:output>` 标签则控制 JSPX 文档输出的属性。\n\n其次，标签 `<c:if>` 检测模型属性\
  \ `contacts` 是否为空。由于我们已经在数据库中填充了一些联系人信息，`contacts` 属性应该包含数据。因此，`<c:forEach>` 标签将在页面内的表格中渲染联系人信息。注意使用了\
  \ `<joda:format>` 标签来格式化 `birthDate` 属性，该属性是 JodaTime 的 `DateTime` 类型。\n\n#### 测试联系人列表视图\n\
  \n现在我们可以测试联系人列表视图了。首先验证 Web 应用程序的上下文根是 `ch17`。为此，选择项目，右键单击，然后选择属性。接着在左侧菜单中，点击 Web\
  \ 项目设置选项，并验证“上下文根”设置为 ch17，如图 17-4 所示。\n\n![images](img/9781430241072_Fig17-04.jpg)\n\
