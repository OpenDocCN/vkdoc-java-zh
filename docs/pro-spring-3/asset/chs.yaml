  在上面的接口中，我们分别定义了两个查找方法以及插入、更新和删除方法。它们对应着 CRUD 术语（创建、读取、更新、删除）。\n\n最后，为了方便测试，让我们修改\
  \ `log4j` 属性，将所有类的日志级别设置为 `DEBUG`。在 `DEBUG` 级别下，Spring JDBC 模块将输出所有发送到数据库的底层 SQL\
  \ 语句，这样您就能确切地知道正在发生什么；这对于排查 SQL 语句语法错误尤其有用。清单 8-6 展示了启用了 `DEBUG` 级别的 `log4j.properties`\
