  `        contactDao.delete(contact);`\n`        contacts = contactDao.findAllWithDetail();`\n\
  `        listContactsWithDetail(contacts);`\n\n上一个清单检索了 ID 为 1 的联系人，然后调用 delete\
  \ 方法删除该联系人信息。运行程序将产生以下输出（其他输出已省略）：\n\n`Listing contacts with details:`\n`Contact\
  \ - Id: 4, First name: Michael, Last name: Jackson, Birthday: 2011-10-13`\n`Contact\
  \ Tel Detail - Id: 4, Contact id: 4, Type: Home, Number: 1111111111`\n`Contact Tel\
  \ Detail - Id: 5, Contact id: 4, Type: Mobile, Number: 2222222222`\n\n`Contact -\
  \ Id: 3, First name: John, Last name: Smith, Birthday: 1964-02-28`\n\n`Contact -\
  \ Id: 2, First name: Scott, Last name: Tiger, Birthday: 1990-11-02`\n`Contact Tel\
  \ Detail - Id: 3, Contact id: 2, Type: Home, Number: 1234567890`\n`Hobby :Swimming`\n\
  \n您可以看到 ID 为 1 的联系人已被删除。\n\n\n\n### 使用 Hibernate 的注意事项\n\n正如你在本章示例中所见，一旦正确定义了对象关系映射、关联关系和查询，Hibernate\
  \ 就能提供一个环境，让你专注于使用对象模型进行编程，而无需为每个操作编写 SQL 语句。在过去几年中，Hibernate 发展迅速，并已被 Java 开发者广泛采用作为数据访问层库，无论是在开源社区还是企业环境中。\n\
  \n然而，有一些要点你需要牢记。首先，由于你无法控制生成的 SQL，因此在定义映射时，尤其是关联关系及其获取策略时，必须非常谨慎。然后，观察 Hibernate\
  \ 生成的 SQL 语句，以验证所有操作是否按预期执行。\n\n理解 Hibernate 如何管理其会话的内部机制也非常重要，尤其是在批处理操作中。Hibernate\
  \ 会在会话中保留托管对象，并定期进行刷新和清理。设计不佳的数据访问逻辑可能导致 Hibernate 过于频繁地刷新会话，从而严重影响性能。如果你希望对查询拥有绝对控制权，可以使用原生查询，我们将在下一章讨论。\n\
  \n最后，设置（批处理大小、获取大小等）在调优 Hibernate 性能方面也起着重要作用。你应该在会话工厂中定义它们，并在对应用程序进行负载测试时进行调整，以确定最佳值。\n\
  \n总而言之，Hibernate 及其出色的 JPA 支持（我们将在下一章讨论）对于寻求以面向对象方式实现数据访问逻辑的 Java 开发者来说，是一个自然而然的选择。\n\
  \n### 本章小结\n\n在本章中，我们讨论了 Hibernate 的基本概念以及如何在 Spring 应用程序中配置它。然后，我们介绍了定义 ORM 映射的常用技术，并涵盖了关联关系以及如何使用\
  \ `HibernateTemplate` 类执行各种数据库操作。\n\n关于 Hibernate，我们只介绍了其功能和特性的一小部分。对于那些有兴趣在 Spring\
  \ 中使用 Hibernate 的人，我们强烈建议你学习 Hibernate 的标准文档。此外，还有许多书籍详细讨论了 Hibernate。我推荐《Beginning\
  \ Hibernate》第二版和《Pro JPA 2: Mastering the Java Persistence API》（2009 年），这两本书均由 Apress\
  \ 出版。\n\n在下一章中，我们将介绍 Java 持久化 API（JPA）以及如何在 Spring 中使用它。Hibernate 为 JPA 提供了出色的支持，我们将在下一章的示例中继续使用\
  \ Hibernate 作为持久化提供者。对于查询和更新操作，JPA 的行为类似于 Hibernate。因此，在下一章中，我们将讨论一些高级主题，包括原生查询和条件查询，以及如何在示例应用程序中使用\
  \ Hibernate 及其 JPA 支持。\n\n## 第 10 章\n\n## 在 Spring 中使用 JPA2 进行数据访问\n\n在上一章中，我们讨论了在使用\
  \ ORM 方法实现数据访问逻辑时，如何在 Spring 应用程序中使用 Hibernate。我们演示了如何在 Spring 配置中配置 Hibernate 的\
  \ `SessionFactory`，以及如何使用 Hibernate 的 `Session` 接口执行各种数据访问操作。\n\n然而，我们在上一章中讨论的只是\
  \ Hibernate 用法的一个方面。在 Spring 应用程序中采用 Hibernate 的另一种方式是，将 Hibernate 用作 JCP 标准——Java\
  \ 持久化 API（JPA）的持久化提供者。\n\n如前所述，Hibernate 基于 POJO 的映射及其强大的查询语言（HQL）取得了巨大成功，并影响了 Java\
  \ 世界中数据访问技术标准的发展。在 Hibernate 之后，JCP 制定了 Java 数据对象（JDO）标准，随后是 JPA。\n\n在撰写本文时，JPA\
  \ 已达到 2.0 版本（它是 JEE 6 技术栈的一部分）；它是一项更加成熟的技术，并被开发者广泛采用作为数据访问 API 标准。这是因为 JPA 通过 `PersistenceContext`、`EntityManager`\
  \ 和 Java 持久化查询语言（JPQL）等概念，标准化了 ORM 编程模型。这些标准化为开发者提供了一种在 Hibernate、EclipseLink、Oracle\
  \ TopLink、OpenJPA 等 JPA 持久化提供者之间切换的方法。因此，大多数新的 JEE 应用程序现在都采用 JPA 作为数据访问层。\n\nSpring\
  \ 也为 JPA 提供了强大的支持。例如，提供了多个 `EntityManagerFactoryBean`，用于在 Spring 应用程序中引导 JPA 实体管理器，并支持前面提到的所有\
  \ JPA 提供者。Spring Data 项目还提供了一个名为 Spring Data JPA 的子项目，它为在 Spring 应用程序中使用 JPA 提供了高级支持。Spring\
  \ Data JPA 项目的主要特性包括 `Repository` 和 `Specification` 的概念，以及对查询领域特定语言（QueryDSL）的支持等。\n\
  \n在本章中，我们将讨论如何使用 JPA（特别是 JPA 2）与 Spring 结合，并使用 Hibernate 作为底层的持久化提供者。你将学习如何使用 JPA\
  \ 的 `EntityManager` 接口和 JPQL（类似于 HQL）来实现各种数据库操作。然后，我们将讨论 Spring Data JPA 如何进一步帮助简化\
  \ JPA 开发。最后，我们将讨论一些与 ORM 相关的高级主题，包括原生查询和条件查询。\n\n具体来说，我们将讨论以下主题：\n\n*   *JPA 的核心概念：*\
  \ 我们将介绍 JPA 的一些主要概念。\n*   *创建一个简单的 Spring JPA 实用项目：* 我们将逐步介绍使用 STS 创建基于 Spring 的\
  \ JPA 项目的步骤。尽管 STS 创建的项目包含了所需的依赖项，但我们仍然需要微调项目配置，以支持本章讨论的所有特性。随着我们进入更高级的主题，将需要额外的第三方库，因此我们将演示如何在\
  \ STS 中添加它们。\n*   *配置 JPA 实体管理器：* 我们将讨论 Spring 支持的 `EntityManagerFactory` 类型，以及如何在\
  \ Spring 的 XML 配置中配置最常用的 `LocalContainerEntityManagerFactoryBean`。\n*   *数据操作：*\
  \ 我们将介绍如何在 JPA 中实现基本的数据库操作。这些概念与 Hibernate 非常相似。我们还将讨论在 JPA 应用程序中消除 DAO 层的问题。\n\
  *   *高级查询操作：* 我们将讨论如何在 JPA 中使用原生查询以及 JPA 中强类型的条件 API，以实现更灵活的查询操作。\n*   *介绍 Spring\
  \ Data JPA：* 我们将讨论 Spring Data JPA 项目，并演示它如何帮助简化数据访问逻辑的开发。\n*   *跟踪实体变更和审计：* 在数据库更新操作中，跟踪实体的创建日期或最后更新日期以及谁进行了更改是一个常见需求。此外，对于客户等关键信息，通常需要一个存储实体每个版本的历史表。我们将讨论\
  \ Spring Data JPA 和 Hibernate Envers（Hibernate 实体版本控制系统）如何帮助简化此类逻辑的开发。\n*   *在示例应用程序中将\
  \ JPA 与 Hibernate 结合使用：* 在示例应用程序中，对于 JPA 实现，我们选择消除 DAO 层，并将实体管理器直接注入服务层以执行业务逻辑。我们将讨论如何在示例应用程序中采用\
  \ JPA。\n\n![images](img/square.jpg) **注意** 与 Hibernate 一样，JPA 支持在 XML 或 Java 注解中定义映射。在本章中，我们将重点介绍注解类型的映射，因为它的使用比\
  \ XML 风格更普遍。\n\n\n\n### 介绍 JPA 2\n\n与许多其他 Java 规范请求（JSR）一样，JPA 2.0 规范（JSR-317）的目标是在\
  \ JSE 和 JEE 环境中标准化 ORM 编程模型。它定义了一组通用的概念、注解、接口以及其他 JPA 持久化提供程序应实现的服务（所有这些都放在 `javax.persistence`\
  \ 包下）。当按照 JPA 标准进行编程时，开发者可以随意切换底层提供程序，就像为基于 JEE 标准开发的应用程序切换到另一个符合 JEE 规范的应用服务器一样。\n\
  \n在 JPA 中，核心概念是 `EntityManager` 接口，它来源于 `EntityManagerFactory` 类型的工厂。`EntityManager`\
  \ 的主要工作是维护一个持久化上下文，其中将存储所有受管理的实体实例。`EntityManager` 的配置被定义为一个持久化单元，并且一个应用程序中可以有多个持久化单元。如果你正在使用\
  \ Hibernate，可以将持久化上下文视为与 `Session` 接口相同，而 `EntityManagerFactory` 则与 `SessionFactory`\
  \ 相同。在 Hibernate 中，受管理的实体存储在会话中，你可以通过 Hibernate 的 `SessionFactory` 或 `Session` 接口直接与之交互。然而，在\
  \ JPA 中，你不能直接与持久化上下文交互。相反，你需要依赖 `EntityManager` 来为你完成工作。\n\nJPQL 与 HQL 非常相似，因此如果你之前使用过\
  \ HQL，那么管理 JPQL 对你来说应该不难。然而，在 JPA 2 中，引入了一个强类型条件 API，它依赖于映射实体的元数据来构建查询，因此任何错误都将在编译时而非运行时被发现。\n\
  \n关于 JPA 2 的详细讨论，我们推荐书籍 *Pro JPA 2: Mastering the Java Persistence API*（Apress，2009\
  \ 年）。\n\n在本节中，我们将讨论 JPA 的基本概念、本章将使用的示例数据模型，以及如何配置 Spring 的 `ApplicationContext`\
  \ 以支持 JPA。\n\n#### 在 STS 中创建一个简单的 Spring JPA 实用项目\n\n首先，让我们在 STS 中创建一个 JPA 项目。STS\
  \ 提供了一个名为 Simple Spring JPA Utility Project 的模板项目。要在 STS 中创建这样一个项目，只需选择 New Project\
  \ ![images](img/U001.jpg) Spring Template Project，选择 Simple Spring JPA Utility Project，然后输入项目的详细信息。图\
  \ 10-1 显示了 New Template Project 对话框，图 10-2 显示了项目设置。\n\n![images](img/9781430241072_Fig10-01.jpg)\n\
  \n***图 10-1.** 在 STS 中创建一个简单的 Spring JPA 实用项目*\n\n![images](img/9781430241072_Fig10-02.jpg)\n\
  \n***图 10-2.** 简单的 Spring JPA 实用项目详情*\n\n完成后，STS 将创建一个基于 Maven 的项目，并包含所需的依赖项。如果你打开项目的\
  \ `pom.xml` 文件，你将看到为项目定义的默认依赖项。图 10-3 显示了 STS 中依赖项的部分列表。\n\n![images](img/9781430241072_Fig10-03.jpg)\n\
  \n***图 10-3.** 简单的 Spring JPA 实用项目 Maven 依赖项*\n\n从图 10-3 可以看出，Spring 默认使用 Hibernate\
  \ 作为 JPA 模板项目的 JPA 提供程序。你还需要执行的一个步骤是更新 `pom.xml` 文件，以使用 JDK 6 作为目标运行时，并更新项目的配置。确保项目使用的是\
  \ Spring 3.1。\n\n在撰写本文时，JPA 模板项目将添加 Hibernate 版本 3.6.0.Final 作为依赖项。请在 `pom.xml`\
  \ 文件中将其更改为 3.6.8.Final，因为较新的版本为本章讨论的示例提供了错误修复。\n\n#### 示例代码的示例数据模型\n\n在本章中，我们将使用与第\
  \ 9 章相同的数据模型。然而，当我们讨论如何实现审计功能时，我们将添加几列和一个历史表用于演示。因此，我们将从上一章使用的相同数据库创建脚本开始。\n\n如果你跳过了第\
  \ 9 章，请查看该章“示例代码的示例数据模型”部分中介绍的数据模型，这有助于你理解本章的示例代码。\n\n\n\n#### 配置 JPA EntityManagerFactory\n\
  \n如本章前面所述，要在 Spring 中使用 JPA，我们需要在 Spring 中配置一个 `EntityManagerFactory`，就像 Hibernate\
  \ 中的 `SessionFactory` 一样。Spring 支持三种类型的 `EntityManagerFactory` 配置。\n\n第一种是使用 `LocalEntityManagerFactoryBean`\
  \ 类。这是最简单的一种，只需要持久化单元名称即可。然而，由于它不支持注入数据源，因此无法参与全局事务，所以只适用于简单的部署。\n\n第二种选项用于符合 JEE\
  \ 6 规范的容器，在这种容器中，应用服务器会根据部署描述符中的信息引导 JPA 持久化单元，因此 Spring 能够通过 JNDI 查找来获取实体管理器。清单\
  \ 10-1 展示了一段通过 JNDI 查找实体管理器的代码片段。\n\n***清单 10-1.** 通过 JNDI 查找实体管理器*\n\n`<beans>`\n\
  `    <jee:jndi-lookup id=\"prospring3Emf\"`\n`        jndi-name=\"persistence/prospring3PersistenceUnit\"\
  />`\n`</beans>`\n\n在 JPA 规范中，持久化单元应在配置文件 `META-INF/persistence.xml` 中定义。然而，Spring\
  \ 3.1 提供了一项新特性，消除了这一需求。我们将在本节中向你展示该特性。\n\n第三种选项是最常见的，也将在本章以及示例应用程序中使用，即 `LocalContainerEntityManagerFactoryBean`\
  \ 类。它支持注入数据源，并且可以参与本地和全局事务。清单 10-2 展示了相应的 XML 配置文件（`app-context.xml`）。\n\n***清单\
  \ 10-2.** `LocalContainerEntityManagerFactoryBean` 的 Spring 配置*\n\n`<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n`    xmlns:xsi=http://www.w3.org/2001/XMLSchema-instance    `\n\
  \n`    xmlns:jdbc=http://www.springframework.org/schema/jdbc`\n\n`    xsi:schemaLocation=\"\
  http://www.springframework.org/schema/jdbc`\n`        http://www.springframework.org/schema/jdbc/spring-jdbc-3.1.xsd`\n\
  `        http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n\
  `        http://www.springframework.org/schema/tx    `\n`        http://www.springframework.org/schema/tx/spring-tx-3.1.xsd`\n\
  `        http://www.springframework.org/schema/context`\n`        http://www.springframework.org/schema/context/spring-context-3.1.xsd\"\
  >`\n\n`    <description>帮助你入门的示例配置。</description>`\n\n`    <jdbc:embedded-database\
  \ id=\"dataSource\" type=\"H2\">`\n`        <jdbc:script location=\"classpath:schema.sql\"\
  />`\n`        <jdbc:script location=\"classpath:test-data.sql\"/>`\n`    </jdbc:embedded-database>`\n\
  \n`    <bean id=\"transactionManager\"`\n`        class=\"org.springframework.orm.jpa.JpaTransactionManager\"\
  >`\n`        <property name=\"entityManagerFactory\" ref=\"emf\"/>`\n`    </bean>`\n\
  \n`    <tx:annotation-driven transaction-manager=\"transactionManager\" />`\n\n\
  `    <bean id=\"emf\" class=\"org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean\"\
  >`\n`        <property name=\"dataSource\" ref=\"dataSource\" />`\n`        <property\
  \ name=\"jpaVendorAdapter\">`\n`            <bean class=\"org.springframework.orm.jpa.vendor.HibernateJpaVendorAdapter\"\
  \ />`\n`        </property>`\n`        <property name=\"packagesToScan\"`\n`            value=\"\
  com.apress.prospring3.ch10.domain\"/>`\n`        <property name=\"jpaProperties\"\
  >`\n`            <props>`\n`                <prop key=\"hibernate.dialect\">`\n\
  `                    org.hibernate.dialect.H2Dialect`\n`                </prop>`\n\
  `                <prop key=\"hibernate.max_fetch_depth\">3</prop>`\n`                <prop\
  \ key=\"hibernate.jdbc.fetch_size\">50</prop>`\n`                <prop key=\"hibernate.jdbc.batch_size\"\
  >10</prop>`\n`                <prop key=\"hibernate.show_sql\">true</prop>`\n`            </props>`\n\
  `        </property>`\n`    </bean>`\n\n`    <context:annotation-config/>`\n\n`    <context:component-scan`\n\
  `        base-package=\"com.apress.prospring3.ch10.service.jpa\" />`\n`</beans>`\n\
  \n在上述配置中，声明了几个 bean 以支持将 `LocalContainerEntityManagerFactoryBean` 与 Hibernate 作为持久化提供者进行配置。主要配置如下：\n\
  \n*   ***dataSource bean：*** 我们使用 H2 声明了一个内嵌数据库作为数据源。由于是内嵌数据库，因此不需要指定数据库名称。\n* \
  \  ***transactionManager bean：*** 实体管理器工厂需要一个事务管理器来进行事务性数据访问。Spring 专门为 JPA 提供了一个事务管理器（`org.springframework.orm.jpa.JpaTransactionManager`）。该\
  \ bean 被声明并分配了 ID `transactionManager`。我们将在第 13 章中详细讨论事务。我们声明了 `<tx:annotation-driven>`\
  \ 标签，以支持使用注解声明事务边界需求。\n*   ***组件扫描：*** 这个标签你应该很熟悉。我们指示 Spring 扫描 `com.apress.prospring3.ch10.service.jpa`\
  \ 包下的组件。\n*   ***JPA EntityManagerFactory bean (emf)：*** `emf` bean 是最重要的部分。首先，我们声明该\
  \ bean 使用 `LocalContainerEntityManagerFactoryBean`。在该 bean 内部，提供了几个属性。首先，正如你所料，我们需要注入数据源\
  \ bean。其次，我们使用 `HibernateJpaVendorAdapter` 类配置了 `jpaVendorAdapter` 属性，因为我们使用的是 Hibernate。第三，我们指示实体工厂扫描\
  \ `com.apress.prospring3.ch10.domain` 包下带有 ORM 注解的领域对象（由 `<property name=\"packagesToScan\"\
  >` 标签指定）。请注意，此功能自 Spring 3.1 起才可用，借助领域类扫描的支持，你可以跳过在 `META-INF/persistence.xml` 文件中定义持久化单元。最后，`jpaProperties`\
  \ 属性为持久化提供者 Hibernate 提供了配置细节。你会看到这些配置与我们在第 9 章中使用的完全相同。因此，我们在此不再赘述。\n\n#### 使用\
  \ JPA 注解进行 ORM 映射\n\n如前所述，Hibernate 对 JPA 的设计影响很大。对于映射注解，它们非常相似，以至于我们在第 9 章中用于将领域对象映射到数据库的注解与\
  \ JPA 中的相同。\n\n如果你查看第 9 章中的领域类源代码，你会看到所有映射注解都在 `javax.persistence` 包下，这意味着这些注解已经兼容\
  \ JPA。因此，我们在本章中没有重复代码。有关映射及其解释，请参考第 9 章。\n\n\n\n#### 消除 DAO 层\n\n正如你在第 8 章和第 9 章中看到的，当我们使用\
  \ JDBC 和 Hibernate 编写数据访问逻辑时，会采用 DAO 模式。DAO 模式的目的是将数据访问逻辑的不同实现封装到自己的层中，以便这些细节对服务层完全隐藏，服务层无需知道我们使用\
  \ JDBC 还是 Hibernate 来完成数据访问工作。\n\n然而，JPA 诞生之后，为数据访问逻辑单独设立 DAO 层的理由就变得值得商榷了。因为 JPA\
  \ 被设计成一个标准，其底层的持久化提供者可以轻松切换，因此根本没有强有力的理由将数据访问逻辑维护在单独的 DAO 层中。所以，如今许多将 JPA 标准化为数据访问层的\
  \ JEE 开发者选择消除 DAO 层，并将 `EntityManager` 直接注入到服务层。\n\n在 JEE 应用中 DAO 层存在的合理性仍然存在激烈争论，但一个事实是，摆脱\
  \ DAO 层可以大大简化应用架构，这是其主要好处之一。在本章及示例应用中，我们选择为 JPA 实现消除 DAO 层，而是通过将实体管理器直接注入到服务层类中来提供服务层的实现。\n\
  \n不过，如果你或你的开发团队仍然倾向于保留 DAO 层，这也不会有太大区别。你仍然可以将所有 JPA 逻辑编写到单独的 DAO 层中，并将其注入到服务层。\n\
  \n#### 将 EntityManager 注入服务层类\n\n对于 JDBC 和 Hibernate 的支持，Spring 提供了相应的模板类 `JdbcTemplate`\
  \ 和 `HibernateTemplate`（尽管如我们在第 9 章中讨论的，它们已被明确弃用，推荐直接使用 Hibernate 的 `Session` 接口），这极大地简化了我们需要编写的代码。对于\
  \ JPA，Spring 过去也提供了 `JpaTemplate` 类。然而，随着 JPA 2 变得更加成熟，Spring 开发团队发现提供这样的模板已无必要。如果你查阅\
  \ Spring Framework 3.1 的 JavaDoc，你会看到 `JpaTemplate` 类已被弃用，对于 JPA 2，Spring 建议你直接使用\
  \ `EntityManager`。\n\n一旦 `EntityManagerFactory` 被正确配置，将其注入到你的服务层类就非常简单。清单 10-3 展示了\
  \ `ContactServiceImpl` 类的代码片段，我们将用它作为使用 JPA 执行数据库操作的示例。\n\n***清单 10-3.** 注入 `EntityManager`*\n\
  \n`package com.apress.prospring3.ch10.service.jpa;`\n\n`// 导入语句已省略`\n`@Service(\"\
  jpaContactService\")`\n`@Repository`\n`@Transactional`\n`public class ContactServiceImpl\
  \ implements ContactService {`\n\n`    private Log log = LogFactory.getLog(ContactServiceImpl.class);`\n\
  \n`    @PersistenceContext`\n`    private EntityManager em;`\n\n`    // 其他代码已省略`\n\
  `}`\n\n如清单 10-3 所示，该类应用了几个注解。`@Service` 注解用于标识它是一个向其他层提供业务服务的 Spring 组件，并将 Spring\
  \ Bean 命名为 `jpaContactService`。`@Repository` 注解表明该类包含数据访问逻辑，并指示 Spring 将特定于供应商的异常转换为\
  \ Spring 的 `DataAccessException` 层次结构。实际上，你可以使用 `@Repository(\"jpaContactService\"\
  )` 并去掉 `@Service` 注解，效果是一样的。这里我们使用 `@Service` 注解是为了表明它属于服务层（就像 `@Controller` 表明组件在\
  \ Web 层一样），因为这对开发者更友好。正如你已经熟悉的，`@Transactional` 注解用于定义事务需求。\n\n为了注入 `EntityManager`，我们使用了\
  \ `@PersistenceContext` 注解，这是用于实体管理器注入的标准 JPA 注解。你可能会疑惑为什么我们使用不同的名称（`@PersistenceContext`）来注入实体管理器，但考虑到持久化上下文是由\
  \ `EntityManager` 管理的，这个注解就非常合理了。如果你的应用中有多个持久化单元，你还可以向注解添加 `unitName` 属性，以指定要注入哪个持久化单元。通常，一个持久化单元代表一个独立的后端数据源。\n\
  \n注入 `EntityManager` 后，我们就可以执行数据库操作了，这将在下一节讨论。\n\n### 使用 JPA 进行数据库操作\n\n在本节中，我们将讨论如何在\
  \ JPA 中执行数据库操作。\n\n清单 10-4 展示了 `ContactService` 接口，它指明了我们将要提供的联系人信息服务。\n\n***清单\
  \ 10-4.** `ContactService` 接口*\n\n`package com.apress.prospring3.ch10.service;`\n\
  \n`import java.util.List;`\n\n`import com.apress.prospring3.ch10.domain.Contact;`\n\
  \n`public interface ContactService {`\n\n`    // 查找所有联系人`\n`    public List<Contact>\
  \ findAll();`\n\n`    // 查找所有联系人及其电话和爱好`\n`    public List<Contact> findAllWithDetail();`\n\
  \n`    // 根据 ID 查找联系人及其详细信息`\n`    public Contact findById(Long id);`\n\n`    //\
  \ 插入或更新联系人`\n`    public Contact save(Contact contact);`\n\n`    // 删除联系人`\n`    public\
  \ void delete(Contact contact);`\n`}`\n\n该接口非常简单；它只有三个查找方法、一个保存方法和一个删除方法。保存方法将同时服务于插入和更新操作。\n\
  \n\n\n#### 使用 Java 持久化查询语言查询数据\n\nJPQL 和 HQL 的语法非常相似，事实上，我们在第 9 章中使用的所有 HQL 查询都可以复用来实现\
  \ `ContactService` 接口中的三个查找方法。\n\n让我们回顾一下为 `Contact` 实体类定义的命名查询。代码清单 10-5 展示了相关代码片段。\n\
  \n***代码清单 10-5.** Contact 领域对象的命名查询*\n\n`package com.apress.prospring3.ch10.domain;`\n\
  \n`import java.io.Serializable;`\n`import javax.persistence.*;`\n\n`@Entity`\n`@Table(name\
  \ = \"contact\")`\n`@NamedQueries({`\n`    @NamedQuery(name=\"Contact.findAll\"\
  , query=\"select c from Contact c\"),`\n`    @NamedQuery(name=\"Contact.findById\"\
  ,`\n`        query=\"select distinct c from Contact c left join fetch c.contactTelDetails\
  \ t left`\n`join fetch c.hobbies h where c.id = :id\"),`\n`    @NamedQuery(name=\"\
  Contact.findAllWithDetail\",`\n`        query=\"select distinct c from Contact c\
  \ left join fetch c.contactTelDetails t left`\n`join fetch c.hobbies h\")`\n`})`\n\
  \n`public class Contact implements Serializable {`\n\n`    // 其他代码已省略`\n\n`}`\n\n\
  当你将这些查询与第 9 章中的查询进行比较时，会发现它们完全相同。因此，如果你正在使用 Hibernate，迁移到 JPA 相对容易。\n\n对于实现类 `com.apress.prospring3.ch10.service.jpa.ContactServiceImpl`，我们首先创建一个类，其中\
  \ `ContactService` 接口的所有方法都为空实现。在 STS 中，这非常容易实现。详情请参见第 8 章中的“使用注解设置 JDBC DAO”一节。\n\
  \n我们从 `findAll()` 方法开始，该方法简单地检索数据库中的所有联系人。代码清单 10-6 展示了相关代码片段。\n\n***代码清单 10-6.**\
  \ 实现 `findAll()` 方法*\n\n`package com.apress.prospring3.ch10.service.jpa;`\n\n`//\
  \ 导入语句已省略`\n`@Service(\"jpaContactService\")`\n`@Repository`\n`@Transactional`\n\
  `public class ContactServiceImpl implements ContactService {`\n\n`    // 其他代码已省略`\n\
