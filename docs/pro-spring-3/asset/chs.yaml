  \ Web Flow (2012)\n\n您可以通过他的博客 [`http://manueljordan.wordpress.com/`](http://manueljordan.wordpress.com/)\
  \ 阅读并联系他，并在 Twitter 上关注他，账号为 @dr_pompeii。\n\n## 第 1 章\n\n## Spring 简介\n\n当我们想到 Java\
  \ 开发者社区时，我们会想起 19 世纪 40 年代末那些疯狂淘金的人，他们在北美河流中疯狂地淘洗，寻找金粒。作为 Java 开发者，我们的河流中充斥着开源项目，但就像那些淘金者一样，找到一个有用的项目可能既耗时又费力。\n\
  \n许多开源 Java 项目的一个常见抱怨是，它们仅仅是为了填补最新流行术语或模式实现上的空白而构思出来的。话虽如此，许多高质量、可用的项目确实满足并解决了实际应用程序的真实需求，在本书中，您将接触到这些项目中的一部分。您将特别深入地了解其中一个——Spring。\n\
  \n在本书中，您将看到许多不同开源技术的应用，所有这些技术都统一在 Spring 框架之下。在使用 Spring 时，应用程序开发者可以使用大量开源工具，而无需编写大量代码，也无需将应用程序与任何特定工具过度耦合。\n\
  \n在本章中，正如其标题所示，我们将向您介绍 Spring 框架，而不是查看任何具体的示例或解释。如果您已经熟悉 Spring 项目，那么您可能希望跳过本章，直接进入第\
  \ 2 章。\n\n\n\n### 什么是 Spring？\n\n或许解释 Spring 这项技术最困难的部分之一，就是准确界定它到底是什么。通常，Spring\
  \ 被描述为用于构建 Java 应用的轻量级框架，但这个说法引出了两个有趣的点。首先，你可以使用 Spring 构建任何 Java 应用（例如，独立应用、Web\
  \ 应用、JEE 应用等），这与许多其他框架（如仅限于 Web 应用的 Apache Struts）不同。其次，描述中的“轻量级”并非指类数量或发行版大小，而是定义了整个\
  \ Spring 哲学的原则——即最小化影响。Spring 的轻量级体现在：你几乎无需修改应用代码就能获得 Spring 核心的好处，并且如果你决定在任何时候停止使用\
  \ Spring，你会发现这样做相当简单。请注意，我们限定最后一句仅指 Spring 核心——许多额外的 Spring 组件，如数据访问，需要与 Spring\
  \ 框架更紧密地耦合。然而，这种耦合的好处显而易见，本书将贯穿始终地介绍最小化其对应用影响的技术。\n\n#### 控制反转还是依赖注入？\n\nSpring\
  \ 框架的核心基于控制反转（IoC）原则。IoC 是一种将组件依赖关系的创建和管理外部化的技术。考虑一个示例，其中类 `Foo` 依赖于类 `Bar` 的实例来执行某种处理。传统上，`Foo`\
  \ 使用 `new` 运算符创建 `Bar` 的实例，或从某种工厂类获取一个实例。使用 IoC 方法，`Bar`（或其子类）的实例在运行时由某个外部过程提供给\
  \ `Foo`。这种在运行时注入依赖的行为，导致 Martin Fowler 将 IoC 重新命名为更具描述性的术语——依赖注入（DI）。DI 所管理的依赖关系的具体性质将在第\
  \ 4 章中讨论。\n\n![images](img/square.jpg) **注意** 正如你将在第 4 章中看到的，在指代控制反转时使用术语*依赖注入*总是正确的。在\
  \ Spring 的上下文中，你可以互换使用这两个术语，而不会损失任何含义。\n\nSpring 的 DI 实现基于两个核心 Java 概念：JavaBeans\
  \ 和接口。当你使用 Spring 作为 DI 提供者时，你可以灵活地以不同方式（例如，在外部 XML 文件中、Spring Java 配置类中或代码内的 Java\
  \ 注解中）定义应用内的依赖配置。JavaBeans（也称为 POJO，即 Plain Old Java Objects）提供了一种标准机制，用于创建可通过多种方式配置的\
  \ Java 资源。在第 4 章中，你将看到 Spring 如何利用 JavaBean 规范来形成其 DI 配置模型的核心；实际上，任何由 Spring 管理的资源都被称为一个\
  \ *bean*。如果你不熟悉 JavaBeans，请参考我们在第 4 章开头提供的快速入门指南。\n\n接口和 DI 是互惠互利的技术。我们确信，阅读本书的没有人会反对针对接口设计和编码应用能使应用更灵活，但将使用接口设计的应用各部分连接起来的复杂性相当高，这给开发者带来了额外的编码负担。通过使用\
  \ DI，你可以将应用中利用基于接口的设计所需的代码量减少到几乎为零。同样，通过使用接口，你可以充分利用 DI，因为你的 bean 可以使用任何接口实现来满足其依赖关系。\n\
  \n在 DI 的上下文中，Spring 更像是一个容器而非框架——它为你的应用类实例提供它们所需的所有依赖——但它的方式侵入性要小得多。使用 Spring 进行\
  \ DI 仅依赖于在你的类中遵循 JavaBeans 命名约定（正如你将在第 5 章中看到的，你可以通过使用 Spring 的方法注入支持来绕过这一要求）——无需继承特殊类，也无需遵循专有命名方案。如果说有什么变化，那就是在使用\
  \ DI 的应用中，你唯一需要做的改变就是暴露 JavaBeans 上更多的属性，从而允许在运行时注入更多的依赖。\n\n![images](img/square.jpg)\
  \ **注意** Spring 框架 3.0 版本（及更新版本）除了支持 XML 配置文件外，还支持基于 Java 的 bean 元数据。\n\n#### 依赖注入的演进\n\
  \n在过去几年中，得益于 Spring 和其他 DI 框架的普及，DI 在 Java 开发者社区中获得了广泛接受。同时，开发者们确信使用 DI 是应用开发中的最佳实践，并且使用\
  \ DI 的好处也已深入人心。\n\n广泛的 DI 实践也影响了由 Sun Microsystems（2009 年被 Oracle 收购）领导的 Java 社区进程（JCP）的发展。2009\
  \ 年，“Java 依赖注入”成为一项正式的 Java 规范请求（JSR-330），正如你所料，该规范的负责人之一是 Rod Johnson——Spring 框架的创始人。\n\
  \n在 Java 企业版 6（简称 JEE 6）中，JSR-330 成为整个技术栈中包含的规范之一。与此同时，企业 JavaBeans（EJB）架构（从 3.0\
  \ 版本开始）也进行了大幅革新；它采用了 DI 模型以简化各种企业 JavaBeans 应用的开发。\n\n虽然我们将对 DI 的全面讨论留到第 4 章，但值得先看看使用\
  \ DI 相比传统方法的好处：\n\n\n\n*   *减少胶水代码*：依赖注入最大的优点之一，就是能显著减少为拼接应用程序各组件而必须编写的代码量。这类代码通常很琐碎——比如创建依赖只需简单地实例化一个新对象。然而，当需要从\
  \ JNDI 仓库查找依赖，或依赖无法直接调用（如远程资源）时，胶水代码会变得相当复杂。在这些情况下，依赖注入通过提供自动的 JNDI 查找和远程资源自动代理，能真正简化胶水代码。\n\
  *   *简化应用程序配置*：采用依赖注入后，配置应用程序的过程被大大简化。你可以使用注解或 XML 来配置那些可注入到其他类中的类。同样，你也可以用这种技术向“注入器”表达依赖需求，以便注入合适的\
  \ Bean 实例或属性。此外，依赖注入让替换依赖的实现变得简单得多。假设你有一个数据访问对象（DAO）组件，它针对 PostgreSQL 数据库执行数据操作，而你想升级到\
  \ Oracle。使用依赖注入，你只需重新配置业务对象上的相应依赖，让其使用 Oracle 实现而非 PostgreSQL 实现即可。\n*   *在单一仓库中管理公共依赖的能力*：对于公共服务的依赖管理（例如数据源连接、事务、远程服务等），传统做法是在需要的地方（即依赖类内部）创建依赖实例（或从某些工厂类中查找）。这会导致依赖散布在应用程序的各个类中，修改它们会变得很棘手。而使用依赖注入时，所有关于这些公共依赖的信息都包含在一个单一仓库中（使用\
  \ Spring 时，你可以选择将信息存储在 XML 文件或 Java 类中），这使得依赖管理更简单，也更不容易出错。\n*   *提升可测试性*：当你为依赖注入设计类时，就能轻松替换依赖。这在测试应用程序时尤其方便。假设有一个执行复杂处理的业务对象；作为处理的一部分，它使用\
  \ DAO 来访问关系数据库中存储的数据。在测试中，你并不关心测试 DAO，只想用不同的数据集来测试业务对象。在传统方法中，业务对象负责自行获取 DAO 实例，这会让你很难进行测试，因为你无法轻易地用返回测试数据集的模拟实现来替换\
  \ DAO 实现。相反，你需要确保测试数据库包含正确的数据，并在测试中使用完整的 DAO 实现。而使用依赖注入，你可以创建一个返回测试数据集的 DAO 对象模拟实现，然后将其传递给业务对象进行测试。这种机制可以扩展到测试应用程序的任何层，对于测试\
  \ Web 组件尤其有用，因为你可以创建 `HttpServletRequest` 和 `HttpServletResponse` 的模拟实现。\n*   *促进良好的应用程序设计*：为依赖注入而设计，通常意味着要面向接口设计。一个典型的面向注入的应用程序是这样设计的：所有主要组件都被定义为接口，然后创建这些接口的具体实现，并通过依赖注入容器将它们连接起来。在依赖注入和基于依赖注入的容器（如\
  \ Spring）出现之前，这种设计在 Java 中也是可行的，但使用 Spring，你可以免费获得一整套依赖注入特性，从而能够专注于构建应用程序逻辑，而不是构建一个支持它的框架。\n\
  \n从以上列表可以看出，依赖注入为你的应用程序带来了很多好处，但它也并非没有缺点。特别是，依赖注入可能会让不熟悉代码的人难以看清某个特定依赖的哪个实现被注入到了哪些对象中。通常，这只是在开发者对依赖注入经验不足时才会出现的问题；随着经验增长并遵循良好的依赖注入编码实践（例如，将每个应用层中所有可注入的类放在同一个包中），开发者就能轻松掌握全局。总的来说，巨大的好处远远超过了这个小缺点，但在规划应用程序时，你仍应考虑这一点。\n\
  \n#### 超越依赖注入\n\n仅凭其先进的依赖注入能力，Spring 核心本身就是一个有价值的工具，但 Spring 真正卓越之处在于其众多附加功能，这些功能都基于依赖注入原则进行了优雅的设计和构建。Spring\
  \ 为应用程序的所有层提供了功能，从用于数据访问的辅助应用程序编程接口（API），到高级的模型-视图-控制器（MVC）能力。Spring 中这些功能的伟大之处在于，尽管\
  \ Spring 通常提供自己的方法，但你可以轻松地将它们与 Spring 中的其他工具集成，使这些工具成为 Spring 家族的一等公民。\n\n#####\
  \ 使用 Spring 进行面向切面编程\n\n面向切面编程（AOP）是 Java 领域“当下的编程模型”之一。AOP 提供了实现横切逻辑的能力——即适用于应用程序多个部分的逻辑——在一个地方实现，并让该逻辑自动应用于整个应用程序。AOP\
  \ 目前正备受瞩目；然而，在所有这些炒作背后，是一项真正有用的技术，它理应在每位 Java 开发者的工具箱中占有一席之地。\n\nSpring 的 AOP 方法是为目标对象创建“动态代理”，并将对象与配置的通知“编织”在一起，以执行横切逻辑。\n\
  \n另一个流行的 AOP 库是 Eclipse AspectJ 项目（[`www.eclipse.org/aspectj`](http://www.eclipse.org/aspectj)），它提供了更强大的功能，包括对象构造、类加载以及更强的横切能力。\n\
  \n不过，对于 Spring 和 AOP 开发者来说，好消息是从 2.0 版本开始，Spring 提供了与 AspectJ 更紧密的集成。以下是一些亮点：\n\n\
  *   支持 AspectJ 风格的切点表达式\n*   支持 `@AspectJ` 注解风格，同时仍使用 Spring AOP 进行编织\n*   支持在 AspectJ\
  \ 中实现的切面进行依赖注入\n*   支持在 Spring `ApplicationContext` 内进行加载时编织\n\n两种 AOP 各有其适用场景，在大多数情况下，Spring\
  \ AOP 足以满足应用程序的横切需求。然而，对于更复杂的需求，可以使用 AspectJ，并且 Spring AOP 和 AspectJ 可以在同一个基于 Spring\
  \ 的应用程序中混合使用。\n\nAOP 有许多应用。许多传统 AOP 示例中给出的典型应用是执行某种日志记录，但 AOP 的用途远不止于简单的日志记录应用。事实上，在\
  \ Spring 框架内部，AOP 被用于多种目的，尤其是在事务管理方面。Spring AOP 将在第 6 章和第 7 章中详细介绍，届时我们将展示 AOP 在\
  \ Spring 框架及你自己的应用程序中的典型用途，以及 AOP 的性能和传统技术比 AOP 更适用的领域。\n\n\n\n##### Spring 表达式语言\
  \ (SpEL)\n\n表达式语言 (EL) 是一种允许应用程序在运行时操作 Java 对象的技术。然而，EL 的问题在于不同的技术提供了各自的 EL 实现和语法。例如，Java\
  \ 服务器页面 (JSP) 和 Java 服务器面 (JSF) 都有各自的 EL，并且它们的语法不同。为了解决这个问题，统一表达式语言 (EL) 应运而生。\n\
  \n由于 Spring 框架发展迅速，因此需要一种可以在所有 Spring 框架模块以及其他 Spring 项目之间共享的标准表达式语言。因此，从 3.0 版本开始，Spring\
  \ 引入了 Spring 表达式语言 (SpEL)。SpEL 提供了强大的功能，用于评估表达式以及在运行时访问 Java 对象和 Spring Bean。其结果可以在应用程序中使用，或注入到其他\
  \ JavaBean 中。\n\n在本书中，你不会找到专门介绍 SpEL 的章节。然而，在整本书中，我们将在适当的地方使用 SpEL 并进行详细解释。\n\n\
  ##### Spring 中的校验\n\n在任何类型的应用程序中，校验都是另一个重要主题。理想的情况是，包含业务数据的 JavaBean 中属性的校验规则能够以一致的方式应用，无论数据操作请求是来自前端、批处理作业还是远程（例如，Web\
  \ 服务、RESTful Web 服务、RPC 等）。\n\n出于需求驱动，JCP 制定了 Bean 校验 API 规范 (JSR-303)。Bean 校验 API\
  \ 提供了一种定义 Bean 校验规则的标准方式。例如，当对 Bean 的属性应用 `@NotNull` 注解时，意味着在能够持久化到数据库之前，该属性不应包含空值。\n\
  \n从 3.0 版本开始，Spring 为 JSR-303 提供了开箱即用的支持。要使用该 API，只需声明一个 `ValidatorFactoryBean`\
  \ 并将 `Validator` 接口注入到任何 Spring 管理的 Bean 中。Spring 会为你解析底层实现。默认情况下，Spring 会首先查找 Hibernate\
  \ Validator (`hibernate.org/subprojects/validator`)，这是一个流行的 JSR-303 实现。许多前端技术（例如，JSF\
  \ 2、Google Web Toolkit），包括 Spring MVC，也支持在用户界面中应用 JSR-303 校验。开发人员需要在用户界面和后端层编写相同校验逻辑的时代已经过去了。详细信息将在第\
  \ 14 章中讨论。\n\n##### Spring 中的数据访问\n\n数据访问和持久化似乎是 Java 世界中最常讨论的话题。似乎你每次访问像 [`www.theserverside.com`](http://www.theserverside.com)\
  \ 这样的社区网站时，都会被关于最新、最强大的数据访问工具的文章和博客条目所淹没。Spring 提供了与精选数据访问工具的出色集成。除此之外，Spring 通过围绕标准\
  \ API 的简化包装器 API，使得普通的 Java 数据库连接 (JDBC) 成为许多项目的可行选择。\n\n从 3.*x* 版本开始，Spring 的数据访问模块为\
  \ JDBC、Hibernate、MyBatis（原 iBATIS）、Java 数据对象 (JDO) 和 Java 持久化 API (JPA) 提供了开箱即用的支持。\n\
  \n然而，在过去几年中，由于互联网和云计算的爆炸式增长，除了关系型数据库之外，还开发了许多其他“专用”数据库。例如，基于键值对处理极大量数据的数据库（通常称为\
  \ NoSQL）、图数据库、文档数据库等等。为了帮助开发人员支持这些数据库，同时不使 Spring 的数据访问模块复杂化，创建了一个名为 Spring Data\
  \ ([`www.springsource.org/spring-data`](http://www.springsource.org/spring-data))\
  \ 的独立项目。该项目进一步细分为不同的类别，以支持更具体的数据库访问需求。\n\n![images](img/square.jpg) **注意**  本书将不涵盖\
  \ Spring 对非关系型数据库的支持。对此主题感兴趣的读者，前面提到的 Spring Data 项目是一个很好的参考。该项目页面详细介绍了其支持的非关系型数据库，并提供了指向这些数据库主页的链接。\n\
  \nSpring 中的 JDBC 支持使得在 JDBC 之上构建应用程序变得现实，即使对于更复杂的应用程序也是如此。对 Hibernate、MyBatis、JDO\
  \ 和 JPA 的支持使本已简单的 API 变得更加简单，从而减轻了开发人员的负担。当使用 Spring API 通过任何工具访问数据时，你都可以利用 Spring\
  \ 出色的事务支持。你将在第 13 章中找到对此的全面讨论。\n\nSpring 最出色的特性之一是在应用程序中轻松混合搭配数据访问技术的能力。例如，你可能正在运行一个使用\
  \ Oracle 的应用程序，并使用 Hibernate 处理大部分数据访问逻辑。但是，如果你想利用一些 Oracle 特定的功能，那么使用 Spring 的\
  \ JDBC API 来实现数据访问层的该部分就很简单了。\n\n##### Spring 中的对象/XML 映射 (OXM)\n\n大多数应用程序需要集成或向其他应用程序提供服务。一个常见的要求是定期或实时地与其他系统交换数据。就数据格式而言，XML\
  \ 是最常用的格式。因此，普遍存在将 JavaBean 转换为 XML 格式以及反向转换的需求。\n\nSpring 支持许多常见的 Java 到 XML 映射框架，并且一如既往地消除了直接耦合到任何特定实现的需要。Spring\
  \ 提供了用于编组（将 JavaBean 转换为 XML）和解组（将 XML 转换为 Java 对象）的通用接口，以便进行依赖注入到任何 Spring Bean\
  \ 中。支持诸如用于 XML 绑定的 Java API (JAXB)、Castor、XStream 和 XMLBeans 等常见库。在第 16 章中，当我们讨论远程访问\
  \ Spring 应用程序以获取 XML 格式的业务数据时，你将看到如何在应用程序中使用 Spring 的对象到 XML 映射 (OXM) 支持。\n\n#####\
  \ 管理事务\n\nSpring 为事务管理提供了一个出色的抽象层，允许进行编程式和声明式事务控制。通过使用 Spring 的事务抽象层，你可以轻松更改底层事务协议和资源管理器。你可以从简单的、本地的、特定资源的事务开始，然后迁移到全局的、多资源的事务，而无需更改代码。\n\
  \n事务将在第 13 章中详细讨论。\n\n\n\n##### 简化并与 JEE 集成\n\n如前所述，在过去几年中，像 Spring 这样的 DI 框架已获得广泛认可，许多开发者选择使用\
  \ DI 框架来构建应用程序，而不是采用 JEE 的 EJB 方法。因此，JCP 社区也意识到了 EJB 的复杂性，在 EJB 规范的 3.0 和 3.1 版本中，API\
  \ 得到了简化，并且现在融入了 DI 的许多概念。\n\n然而，对于那些基于 EJB 构建的应用程序，或者需要将基于 Spring 的应用程序部署到 JEE 容器中并利用应用服务器的企业级服务（例如，JTA\
  \ 事务管理器、数据源连接池、JMS 连接工厂等）的应用程序，Spring 也为这些技术提供了简化的支持。对于 EJB，Spring 提供了一个简单的声明来执行\
  \ JNDI 查找并注入到 Spring Bean 中。反过来，Spring 也提供了简单的注解，用于将 Spring Bean 注入到 EJB 中。\n\n\
  对于存储在 JNDI 可访问位置中的任何资源，Spring 允许你省去复杂的查找代码，并在运行时将 JNDI 管理的资源作为依赖项注入到其他对象中。这样做的一个附带好处是，你的应用程序与\
  \ JNDI 解耦，从而为将来代码重用提供了更大的空间。\n\n##### Web 层的 MVC\n\n尽管 Spring 几乎可以用于从桌面到 Web 的任何环境，但它提供了丰富的类来支持基于\
  \ Web 的应用程序的创建。使用 Spring，你在选择如何实现 Web 前端时拥有最大的灵活性。\n\n对于开发 Web 应用程序，MVC 模式是最流行的实践。在最近的版本中，Spring\
  \ 已从一个简单的 Web 框架逐渐演变成一个成熟的 MVC 实现。\n\n首先，Spring MVC 中的视图支持非常广泛。除了对 JSP 的标准支持（通过\
  \ Spring 标签库得到了极大增强）之外，你还可以利用对 Apache Velocity、FreeMarker、Apache Tiles 和 XSLT 的完全集成支持。除此之外，你还会发现一组基础的视图类，可以轻松地为你的应用程序添加\
  \ Excel 和 PDF 输出功能。\n\n在许多情况下，你会发现 Spring MVC 足以满足你的 Web 应用程序开发需求。然而，Spring 也可以与其他流行的\
  \ Web 框架集成，例如 Struts、JSF、Google Web Toolkit (GWT) 等。\n\n在过去几年中，Web 框架技术发展迅速。用户需要更具响应性和交互性的体验，这导致\
  \ Ajax 成为开发富互联网应用程序 (RIA) 中广泛采用的技术。另一方面，用户还希望能够从任何设备（包括智能手机和平板电脑）访问他们的应用程序。这导致了对支持\
  \ HTML5、JavaScript 和 CSS3 的 Web 框架的需求，以满足这些要求。在第 17 章中，我们将讨论如何使用 Spring MVC 结合 jQuery（一个支持\
  \ Ajax 和许多其他功能的流行 JavaScript 库）和 JSP 来开发 Web 应用程序。\n\n另一个值得提及的用于 Web 应用程序开发的 Spring\
  \ 项目是 Spring Web Flow 项目 ([`www.springframework.org/webflow`](http://www.springframework.org/webflow))。该项目旨在满足控制页面流程的需求，并对需要在多个页面（称为*会话作用域*）之间维护的基于\
  \ Web 应用程序的数据提供更细粒度的控制。在第 18 章中，我们将介绍 Spring Web Flow 项目及其与 PrimeFaces ([`www.primefaces.org`](http://www.primefaces.org))（一个流行的\
  \ JSF 框架）的集成。\n\n##### 远程支持\n\n在 Java 中访问或暴露远程组件从来都不是一件简单的事情。使用 Spring，你可以利用对各种远程技术的广泛支持，快速暴露和访问远程服务。\n\
  \nSpring 支持多种远程访问机制，包括 Java RMI、JAXRPC、Caucho Hessian 和 Caucho Burlap。除了这些远程协议之外，Spring\
  \ 还提供了自己基于标准 Java 序列化的 HTTP 调用器。通过应用 Spring 的动态代理能力，你可以将远程资源的代理作为依赖项注入到你的一个类中，从而无需将你的应用程序耦合到特定的远程实现，并减少你需要为应用程序编写的代码量。\n\
  \n另一种如今已获得广泛认可的远程技术是 RESTful Web 服务 (RESTful-WS)。RESTful-WS 是围绕 HTTP 设计的，极大地简化了调用服务和获取结果的机制。例如，当客户端向\
  \ URL [`http://somedomain.com/someapp/customer/123`](http://somedomain.com/someapp/customer/123)\
  \ 发出 HTTP GET 请求时，这意味着客户端想要检索 ID（或客户编号）等于 123 的客户信息。返回值可以是 XML、JavaScript 对象表示法\
  \ (JSON) 或客户端 HTTP 请求头中指定的其他格式。从 3.0 版本开始，Spring MVC 模块为 RESTful-WS 提供了全面的支持。我们将在第\
  \ 16 章中讨论 Spring 中的远程支持。\n\n![images](img/square.jpg) **注意**  JCP 也已将 RESTful-WS\
  \ 的标准正式化为 JAX-RS，即用于 RESTful Web 服务的 Java API (JSR 311)。\n\n##### 邮件支持\n\n发送电子邮件是许多不同类型应用程序的典型需求，并且在\
  \ Spring 框架中得到了头等支持。Spring 提供了一个简化的 API 用于发送电子邮件消息，该 API 与 Spring DI 功能完美契合。Spring\
  \ 支持标准的 Java Mail API。\n\nSpring 提供了在 DI 容器中创建原型消息的能力，并将其用作从应用程序发送的所有消息的基础。这允许轻松自定义邮件参数，例如主题和发件人地址。此外，为了自定义消息正文，Spring\
  \ 与模板引擎（如 Apache Velocity）集成，允许将邮件内容从 Java 代码中外部化。\n\n##### 任务调度支持\n\n大多数重要的应用程序都需要某种调度能力。无论是向客户发送更新还是执行内务处理任务，在预定义时间点调度代码运行的能力对于开发者来说都是一个宝贵的工具。\n\
  \nSpring 提供了自己的调度支持，可以满足大多数常见场景。任务可以按固定间隔调度，也可以使用 Unix cron 表达式调度。\n\n另一方面，对于任务执行和调度，Spring\
  \ 也与其他调度库集成。例如，在应用服务器环境中，Spring 可以将执行委托给许多常用应用服务器使用的 CommonJ 库。对于作业调度，Spring 还支持包括\
  \ JDK Timer API 和 Quartz（一个常用的开源调度库）在内的库。\n\nSpring 中的调度支持将在第 15 章中全面介绍。\n\n#####\
  \ 动态脚本支持\n\n从 JDK 6 开始，Java 引入了动态语言支持，你可以在 JVM 环境中执行用其他语言编写的脚本。例如 Groovy、JRuby、JavaScript\
  \ 等。\n\nSpring 也支持在 Spring 驱动的应用程序中执行动态脚本，或者你可以定义一个用动态脚本语言编写的 Spring Bean，并将其注入到其他\
  \ JavaBean 中。Spring 支持的动态脚本语言包括 Groovy、JRuby 和 BeanShell。在第 22 章中，我们将详细讨论 Spring\
  \ 中对动态脚本的支持。\n\n\n\n##### 简化的异常处理\n\nSpring 真正能帮助你减少大量重复样板代码的领域之一就是异常处理。Spring 在此方面的核心理念是，Java\
  \ 中过度使用了受检异常，并且框架不应强制你去捕获那些你不太可能从中恢复的异常——我们完全赞同这一观点。\n\n实际上，许多框架的设计目标都是减少编写代码处理受检异常所带来的影响。然而，其中许多框架采取的做法是坚持使用受检异常，但人为地降低了异常类层次结构的粒度。你在使用\
  \ Spring 时会注意到的一点是，由于使用非受检异常为开发者带来的便利，其异常层次结构具有非常精细的粒度。\n\n在本书中，你将看到许多示例，展示 Spring\
  \ 的异常处理机制如何减少你必须编写的代码量，同时提高你在应用程序中识别、分类和诊断错误的能力。\n\n### Spring 项目\n\nSpring 项目最令人喜爱的一点是其社区当前活跃的程度，以及它与其他项目（如\
  \ CGLIB、Apache Geronimo 和 AspectJ）之间大量的交叉融合。开源最常被吹捧的好处之一是，如果项目明天就倒闭了，你还能保留代码；但让我们面对现实吧——你并不想留下一个像\
  \ Spring 这样庞大的代码库去维护和改进。因此，了解到 Spring 社区如此成熟且活跃，令人感到欣慰。\n\n#### Spring 的起源\n\nSpring\
  \ 的起源可以追溯到 Rod Johnson 所著的《*Expert One-to-One J2EE Design and Development*》（Wrox，2002\
  \ 年）一书。在这本书中，Rod 展示了他自己的框架，名为 Interface 21 框架，这是他为了在自己的应用程序中使用而开发的。这个框架被发布到开源世界后，成为了我们今天所知的\
  \ Spring 框架的基础。\n\nSpring 快速经历了早期的测试版和候选发布阶段，并于 2004 年 3 月 24 日发布了第一个正式的 1.0 版本。自那时起，Spring\
  \ 经历了巨大的发展，在撰写本文时，Spring 框架的最新版本是 3.1。\n\n#### Spring 社区\n\nSpring 社区是我们遇到过的所有开源项目中最好的社区之一。邮件列表和论坛总是很活跃，新功能的开发通常也很快。开发团队真正致力于让\
  \ Spring 成为所有 Java 应用框架中最成功的一个，这一点从所产出的代码质量中可见一斑。Spring 持续开发中的很大一部分工作是对现有代码进行重构，使其更快、更小、更整洁，或者三者兼得。\n\
  \n正如我们已经提到的，Spring 还得益于与其他开源项目的良好关系，当你考虑到完整的 Spring 发行版所依赖的大量项目时，这一点极其有益。\n\n从用户的角度来看，Spring\
  \ 最好的特性之一或许是随发行版附带的优秀文档和测试套件。Spring 几乎所有功能都提供了文档，使得新用户能够轻松上手。Spring 提供的测试套件非常全面——开发团队为所有内容编写测试。如果他们发现了一个\
  \ bug，他们会先编写一个能突出显示该 bug 的测试，然后让测试通过，以此来修复这个 bug。\n\n这一切对你意味着什么？简单来说，这意味着你可以对 Spring\
  \ 框架的质量充满信心，并且相信在可预见的未来，Spring 开发团队将继续改进这个已经非常优秀的框架。\n\n#### Spring for Microsoft\
  \ .NET\n\n主要的 Spring 框架项目是 100% 基于 Java 的。然而，由于 Java 版本的成功，.NET 世界的开发者开始感到有些被冷落；因此，Mark\
  \ Pollack 和 Rod Johnson 启动了 Spring .NET 项目。除了 Rod 之外，这两个项目拥有完全不同的开发团队，因此 .NET 项目对\
  \ Spring Java 的影响应该微乎其微。事实上，作者认为这是个极好的消息。与 Java 世界中的普遍看法相反，.NET 并非一堆垃圾，这一点我们可以证明，因为我们已成功为客户交付了多个\
  \ .NET 应用程序。这个项目为交叉融合开辟了全新的途径，特别是考虑到 .NET 已经在某些领域（如源代码级元数据）处于领先地位，这应该会促使两个平台的产品都变得更好。这个项目的另一个副作用是，它使开发者在平台之间的迁移变得更加容易，因为你可以在两边都使用\
  \ Spring。其他项目如 Hibernate 和 MyBATIS 现在也有了 .NET 版本，这进一步增强了这一点。你可以在 [`www.springframework.net`](http://www.springframework.net)\
  \ 找到更多关于 Spring .NET 的信息。\n\n#### SpringSource Tool Suite/Spring IDE\n\n为了简化在 Eclipse（Java\
  \ 应用开发中最常用的 IDE）中开发基于 Spring 的应用程序，Spring 创建了 Spring IDE 项目。此后不久，由 Rod Johnson 创立的\
  \ Spring 背后的公司 SpringSource 创建了一个名为 SpringSource Tool Suite (STS) 的集成工具。虽然它曾经是一个付费产品，但现在该工具已免费提供。该工具将\
  \ Eclipse IDE、Spring IDE、Mylyn（Eclipse 中一个基于任务的开发环境）、Maven for Eclipse、AspectJ 开发工具以及许多其他有用的\
  \ Eclipse 插件集成到一个单一的包中。在每个新版本中，都会添加更多功能，例如 Groovy 脚本语言支持、Spring Roo 支持和 SpringSource\
  \ tcServer（一个由 SpringSource 提供付费支持、构建于 Tomcat 服务器之上的应用服务器）支持。本书每章的示例源代码以及示例应用程序的代码都将在\
  \ STS 中开发，因此你需要下载 STS 并导入项目。（STS 将在附录 A 中详细讨论。）如果你想立即了解更多关于使用 STS 进行 Spring 应用程序开发的信息，请随时跳转到附录\
  \ A。\n\n#### Spring Security 项目\n\nSpring Security 项目（[`http://static.springsource.org/spring-security/site/index.html`](http://static.springsource.org/spring-security/site/index.html)），以前称为\
  \ Acegi Security System for Spring，是 Spring 产品组合中的另一个重要项目。Spring Security 为 Web\
  \ 应用程序和方法级安全提供了全面的支持。它与 Spring 框架以及其他常用的身份验证机制（如 HTTP 基本认证、基于表单的登录、X.509 证书、SSO\
  \ 产品（例如 SiteMinder）等）紧密集成。它为应用程序资源提供基于角色的访问控制，并且在具有更复杂安全需求（例如数据隔离）的应用程序中，支持访问控制列表（ACL）。然而，Spring\
  \ Security 主要用于保护 Web 应用程序的安全，我们将在第 17 章中详细讨论。\n\n\n\n#### Spring Batch 与 Spring\
  \ Integration\n\n毋庸置疑，批处理作业执行与集成是应用程序中的常见用例。为了满足这一需求并简化开发者的工作，Spring 创建了 Spring\
  \ Batch 和 Spring Integration 项目。Spring Batch 为批处理作业的实现提供了通用框架和多种策略，从而减少了大量样板代码。通过实现企业集成模式（EIP），Spring\
  \ Integration 能够轻松地将 Spring 应用程序与外部系统集成。我们将在第 20 章中详细讨论。\n\n#### 众多其他项目\n\n我们已经介绍了\
  \ Spring 的核心模块以及 Spring 产品组合中的一些主要项目，但还有众多其他项目是由社区针对不同需求推动而生的。例如，用于 Flex 集成的 Spring\
  \ BlazeDS、Spring Mobile、Spring Dynamic Modules、Spring Social、Spring AMQP 等。本书将不涵盖这些项目。如需了解详情，可参考\
  \ SpringSource 网站（[`www.springsource.org/projects`](http://www.springsource.org/projects)）。\n\
  \n### Spring 的替代方案\n\n回到我们之前关于开源项目数量的评论，你应当不会惊讶地发现，Spring 并非唯一提供依赖注入功能或构建应用程序的完整端到端解决方案的框架。事实上，可提及的项目几乎多到数不胜数。本着开放的精神，我们在此简要讨论其中几个框架，但我们认为，这些平台中没有一个能提供像\
  \ Spring 那样全面的解决方案。\n\n#### JBoss Seam 框架\n\n由 Gavin King（Hibernate ORM 库的创建者）创立的\
  \ Seam 框架（[`www.seamframework.org`](http://www.seamframework.org)）是另一个成熟的基于 DI 的框架；它包含了从\
  \ Web 应用前端（JSF）、业务逻辑层（EJB 3）到用于持久化的 JPA 等各层。如你所见，Seam 与 Spring 的主要区别在于，Seam 框架完全构建在\
  \ JEE 标准之上。JBoss 还将 Seam 框架中的理念回馈给了 JCP，并成为了 JSR-299（“Java EE 平台的上下文与依赖注入”）。\n\n\
  #### Google Guice\n\n另一个流行的 DI 框架是 Google Guice（[`http://code.google.com/p/google-guice`](http://code.google.com/p/google-guice)）。由搜索引擎巨头\
  \ Google 主导，Guice 是一个轻量级框架，专注于为应用程序配置管理提供 DI。它也是 JSR-330 规范（“Java 依赖注入”）的参考实现。\n\
  \n#### PicoContainer\n\nPicoContainer（[`www.picocontainer.org`](http://www.picocontainer.org)）是一个极其小巧（约\
  \ 300KB）的 DI 容器，它允许你在应用程序中使用 DI，而无需引入除 PicoContainer 之外的任何依赖。由于 PicoContainer 仅仅是一个\
  \ DI 容器，你可能会发现，随着应用程序的增长，你需要引入另一个框架（如 Spring），在这种情况下，从一开始就使用 Spring 会更好。然而，如果你只需要一个微型的\
  \ DI 容器，那么 PicoContainer 是个不错的选择，但由于 Spring 将 DI 容器与框架的其他部分分开打包，你也可以轻松地使用它，并为未来保留灵活性。\n\
  \n#### JEE 6 容器\n\n如前所述，DI 的概念已被广泛采用，并得到了 JCP 的实现。因此，在 JEE 6 中，技术栈（EJB 3.1、JPA 2.1、JSR-299、JSR-330\
  \ 等）大部分被重新设计，以采用 DI 并简化 JEE 应用程序的开发。因此，当你为兼容 JEE 6 的应用服务器开发应用程序时，可以在所有层使用标准的 DI\
  \ 技术。在撰写本文时，流行的兼容 JEE 6 的应用服务器包括 JBoss AS 7、Oracle Glassfish 3.1 和 WebSphere 8。\n\
  \n### 总结\n\n在本章中，我们为你提供了 Spring 框架的高层概览，并讨论了所有主要特性，同时引导你查阅本书中详细讨论这些特性的相关章节。阅读本章后，你应该对\
  \ Spring 能为你做什么有了大致的了解；剩下的就是看看它*如何*做到这一点。至此，是时候继续前进了。\n\n在下一章中，我们将讨论启动并运行一个基本 Spring\
  \ 应用程序所需了解的所有信息。我们将向你展示如何获取 Spring 框架，并讨论打包选项、测试套件和文档。此外，第 2 章将介绍一些基本的 Spring 代码，包括经典的“Hello\
  \ World!”示例，并充分展示其基于 DI 的魅力。\n\n## 第 2 章\n\n\n\n## 入门指南\n\n通常，掌握任何新开发工具最困难的部分是知道从何处着手。当工具像\
  \ Spring 一样提供众多选择时，这个问题尤为突出。幸运的是，如果你知道首先该看哪里，Spring 的入门实际上并不那么困难。在本章中，我们将为你介绍所有需要的基本知识，助你快速上手。具体来说，我们将探讨以下内容：\n\
  \n*   **获取 Spring：** 第一个合乎逻辑的步骤是获取或构建 Spring 的 JAR 文件。如果你想快速使用标准 Spring 发行版，只需从\
  \ Spring 网站 [`www.springframework.org`](http://www.springframework.org) 下载最新的 Spring\
  \ 发行版即可。然而，如果你想紧跟 Spring 开发的前沿，请从 Spring 的 GitHub 仓库中查看最新版本的源代码。如果你使用 Maven 进行应用程序开发，只需将\
  \ Spring 的依赖项添加到项目的 `pom.xml`（项目对象模型）文件中，Maven 就会为你下载 JAR 文件。详情请参考“Maven 仓库中的 Spring\
  \ 模块”一节。\n*   **Spring 打包选项：** Spring 打包是模块化的；它允许你挑选要在应用程序中使用的组件，并在分发应用程序时仅包含这些组件。\n\
  *   **Spring 依赖项：** Spring 的完整发行版包含大量的依赖项，但在许多情况下，你只需要这些依赖项的一个子集。在本节中，我们将探讨哪些 Spring\
  \ 特性需要哪些依赖项；这些信息有助于你将应用程序的大小缩减到绝对最小值。\n*   **Spring 示例：** Spring 附带大量示例应用程序，这些示例是构建你自己应用程序的理想参考点。在本节中，我们将深入查看示例应用程序，让你了解可用的示例代码量。如果你将此与本书过程中构建的示例应用程序结合起来，你将拥有足够多的代码库来开始构建自己的应用程序。\n\
  *   **测试套件和文档：** Spring 社区成员最引以为豪的事情之一就是他们全面的测试套件和文档集。测试是团队工作的重要组成部分。通过使用 Clover\
  \ ([`www.atlassian.com/software/clover`](http://www.atlassian.com/software/clover))，团队积极监控测试覆盖率百分比，并不断努力提高这一百分比。标准发行版附带的文档集也非常出色。\n\
  *   **为“Hello World!”注入活力：** 抛开所有蹩脚的双关语不谈，我们认为开始使用任何新编程工具的最佳方式就是直接动手编写一些代码。我们将看一些简单的示例，包括一个基于\
  \ DI 的完整实现，即大家最喜欢的“Hello World!”。如果你不能立即理解所有代码示例，请不要惊慌；本书后面会有完整的讨论。\n\n如果你已经熟悉 Spring\
  \ 框架的基础知识，可以直接跳到第 3 章 了解本书过程中将要构建的示例应用程序。然而，即使你熟悉 Spring 的基础知识，你可能会发现本章中的一些讨论很有趣，尤其是关于打包和依赖项的讨论。\n\
  \n### 获取 Spring 框架\n\n在开始任何 Spring 编码之前，你需要获取 Spring 代码。你有几种获取代码的选项：你可以从 Spring\
  \ 网站下载打包的发行版，或者从 Spring GitHub 仓库检出代码。另一种选择是使用诸如 Maven 或 Ivy 之类的应用程序依赖项管理工具，在配置文件中声明依赖项，然后让该工具为你获取所需的库。\n\
  \n#### 下载标准发行版\n\nSpring 将其开发托管在 SpringSource 下载中心，网址为 [`www.springsource.org/download`](http://www.springsource.org/download)。访问此页面以下载最新的\
  \ Spring 发行版（撰写本文时为版本 3.1）。你还可以从下载中心下载即将发布的版本的里程碑/夜间快照或以前的版本。\n\n从 3.0 版本开始，Spring\
  \ 框架发行版有两种形式：一种包含文档，另一种不包含。在 3.0 版本之前，Spring 曾经提供另一个包含所有第三方库（例如 `commons-logging`、`hibernate`\
  \ 等）的包。然而，Spring 现在依赖像 Maven 和 Ivy 这样的依赖项管理工具来在其每个模块上表达其对第三方库的依赖。因此，当你声明你的项目依赖于任何\
  \ Spring 模块（例如 `spring-context`）时，所有必需的依赖项将自动包含在内。更多内容将在本章后面讨论。\n\n#### 从 GitHub\
  \ 检出 Spring\n\n如果你想在快照版本发布之前就掌握新特性，你可以直接从 SpringSource 的 GitHub 仓库检出源代码。\n\n要检出最新版本的\
  \ Spring 代码，首先安装 GitHub（你可以从 [`http://git-scm.com/`](http://git-scm.com/) 下载），然后打开\
  \ Git Bash 工具，并运行以下命令：\n\n`git clone git://github.com/SpringSource/spring-framework.git`\n\
  \n### 理解 Spring 打包\n\n下载并解压包后，在 `dist` 文件夹下，你会找到一系列代表每个 Spring 模块的 JAR 文件。了解每个模块的用途后，你就可以选择项目中所需的模块并将其包含在你的代码中。图\
  \ 2-1 显示了解压下载的 Spring 框架包后 `dist` 文件夹的内容。\n\n![images](img/9781430241072_Fig02-01.jpg)\n\
  \n***图 2-1.** 解压后的 Spring 框架库*\n\n#### Spring 模块\n\n截至 Spring 3.1 版本，Spring 包含 20\
  \ 个模块，打包成 20 个 JAR 文件。表 2-1 描述了这些 JAR 文件及其对应的模块。实际的 JAR 文件格式例如 `org.springframework.aop-3.1.0.RELEASE.jar`，不过为简单起见，我们只包含了特定的模块部分（例如\
  \ `aop`）。\n\n![images](img/t0201.jpg)\n\n![images](img/t0201a.jpg)\n\n![images](img/t0201b.jpg)\n\
  \n\n\n#### 为应用程序选择模块\n\n如果没有 Eclipse 这样的集成开发环境（IDE），或者 Maven、Ivy 这类依赖管理工具，为你的应用程序选择要使用的模块可能会有点棘手。例如，如果你只需要\
  \ Spring 的 Bean 工厂和依赖注入（DI）支持，你仍然需要多个模块，包括 `spring-core`、`spring-beans`、`spring-context`、`spring-aop`\
  \ 和 `spring-asm`。如果你需要 Spring 的 Web 应用程序支持，那么还需要进一步添加 `spring-web`。若要集成 Struts，则需要\
  \ `spring-struts`，依此类推。\n\n然而，当使用 IDE 时，特别是 SpringSource Tool Suite (STS)（本书所有示例将默认使用此\
  \ IDE），管理/可视化这些依赖关系就变得容易得多。在 STS 中，你可以选择创建一个 Spring 模板项目，并从许多适合你应用程序的项目模板中进行选择。Spring\
  \ 模板项目使用 Maven 进行依赖管理，并且 STS 还捆绑了 m2e（一个用于集成 Maven 的 Eclipse 插件项目）。当你选择项目模板时，Spring\
  \ 会为你创建项目并声明适当的依赖关系。得益于 Maven 的传递性依赖支持，所有必需的第三方库也会被自动包含进来。\n\n图 2-2 展示了 STS 中一个简单的\
  \ Spring 工具项目。屏幕截图来自项目的 `pom.xml`（Maven 项目对象模型）文件和 m2e 插件的依赖层次结构查看器，该查看器显示了项目所需的所有依赖关系。从依赖层次结构图中，你可以看到该项目依赖于\
  \ `spring-context`，而 `spring-context` 又需要 `spring-aop`、`spring-beans`、`spring-core`、`spring-expression`\
  \ 和 `spring-asm`。此外，`spring-aop` 进一步依赖于 `aopalliance`，而 `spring-core` 依赖于 `commons-logging`。默认情况下，Spring\
  \ 项目使用 `log4j` 进行日志记录。最后，你还可以看到其他测试依赖项（`spring-test`、`junit`）。\n\n![images](img/9781430241072_Fig02-02.jpg)\n\
  \n***图 2-2.** 一个利用 Spring Bean 工厂和 DI 功能的简单 Spring 工具项目的 Spring 依赖层次结构*\n\n####\
  \ Maven 仓库中的 Spring 模块\n\n除了从互联网下载，你还可以通过应用程序依赖管理工具（如 Ivy 和 Maven）来管理 Spring 库。在本节中，我们将了解\
  \ Maven 仓库中的 Spring 模块。\n\nMaven（[`http://maven.apache.org`](http://maven.apache.org)）由\
  \ Apache 软件基金会创立，已成为从开源环境到企业环境中管理 Java 应用程序依赖关系最流行的工具之一。\n\nMaven 是一个强大的应用程序构建、打包和依赖管理工具。它管理着应用程序的整个构建周期，从资源处理、编译到测试和打包。此外，还有大量用于各种任务的\
  \ Maven 插件，例如更新数据库以及将打包好的应用程序部署到特定服务器（如 Tomcat、JBoss、WebSphere 等）。\n\n几乎所有开源项目都支持通过\
  \ Maven 仓库分发其库。最流行的是托管在 Apache 上的 Maven 中央仓库，你可以通过 Maven 中央仓库网站（[`http://search.maven.org`](http://search.maven.org)）访问并搜索某个构件是否存在及其相关信息。如果你在开发机器上下载并安装了\
  \ Maven，你将自动获得对 Maven 中央仓库的访问权限。其他一些开源社区（例如 JBoss、SpringSource 等）也为其用户提供了自己的 Maven\
  \ 仓库。但是，为了能够访问这些仓库，你需要将仓库地址添加到你的 Maven 设置文件中。\n\n对 Maven 的详细讨论不在本书的范围内，你随时可以参考在线文档或书籍来获取关于\
  \ Maven 的详细参考。然而，由于 Maven 被广泛采用，因此有必要提及 Spring 在 Maven 仓库中的打包结构。\n\n每个 Maven 构件都由组\
  \ ID、构件 ID、打包类型和版本标识。例如，对于 `log4j`，组 ID 是 `log4j`，构件 ID 是 `log4j`，打包类型是 `jar`。在此之下，定义了不同的版本。例如，对于版本\
  \ 1.2.16，该构件的文件名在组 ID、构件 ID 和版本文件夹下变为 `log4j-1.2.16.jar`。\n\n与其他开源库一样，Spring 的 Maven\
  \ 构件可以在 Apache 的 Maven 中央仓库中找到。然而，SpringSource 也托管了自己的 Maven 仓库，并以企业级 Bundle 仓库（EBR）的形式提供\
  \ Spring 库，这些库兼容 OSGi。Spring EBR 的命名约定与 Maven 中央仓库不同。\n\n为了减轻你的困惑，有必要提及 Spring 在\
  \ Maven 中央仓库及其自身 Maven 仓库中构件的命名差异，因为你的开发团队应该统一使用其中一种。通常，优先使用来自 Maven 中央仓库的构件。但是，如果你计划将应用程序部署到\
  \ OSGi 容器（例如 Spring 动态模块）中，那么请使用 Spring EBR。表 2-2 显示了 Spring 构件在 Maven 中央仓库和 SpringSource\
  \ EBR 上的各自命名。在这两个仓库中，组 ID 是相同的；只是构件 ID 不同。如表 2-1 所示，我们将只包含 JAR 文件名的模块部分。\n\n![images](img/t0202.jpg)\n\
  \n![images](img/t0202a.jpg)\n\n### 分析 Spring 依赖关系\n\nSpring 拥有大量的第三方库依赖关系。如果你是从源码构建\
  \ Spring，那么你将需要所有这些依赖关系。然而，在运行时，你很可能只需要这些依赖关系的一个子集，并且你可以通过只包含必要的依赖关系来真正最小化你的发行版大小。\n\
  \n由于依赖关系数量庞大，Spring 将它们分组以便于使用。表 2-3 描述了这些组；它还列出了每个组中的 JAR 文件，并定义了这些依赖关系的用途。\n\n\
  表 2-3 仅反映了 Spring 框架模块所依赖的基本和常见依赖关系。在你的应用程序中，你可能需要额外的依赖关系。例如，对于 Spring XML 支持（即\
  \ `oxm` 模块），如果你使用 Castor 作为底层的对象到 XML 映射库，你需要添加 Castor 的库。如果你使用 XStream，那么你需要添加\
  \ XStream 的库，依此类推。随着我们进入后续章节并讨论每个特定主题，我们将提及正在使用的其他第三方库。因此，请将此表视为一个总体概览，而非完整参考。\n\
  \n![images](img/t0203.jpg)\n\n![images](img/t0203a.jpg)\n\n![images](img/t0203b.jpg)\n\
  \n![images](img/t0203c.jpg)\n\n如你所见，Spring 的依赖关系相当多样化，对于大多数应用程序，你只需要完整依赖关系集的一小部分。花时间精确挑选出你需要的依赖关系，并只将这些依赖关系添加到你的应用程序中是值得的。通过这种方式，你可以保持应用程序的较小体积；这对于那些经常需要部署到远程位置的人来说尤其有益。如果你计划通过\
  \ Web 向可能使用慢速互联网连接下载的用户分发你的应用程序，那么尽可能保持应用程序的较小体积尤为重要。\n\n\n\n### 示例应用程序\n\n许多开源乃至商业产品失败的一个领域，在于未能提供足够完善的示例代码来帮助用户轻松入门。值得庆幸的是，Spring\
  \ 附带了一套完整的、精巧的示例应用程序，展示了 Spring 的众多特性。开发团队将这些示例应用程序视为框架的一等公民，并持续对其进行改进和完善。因此，你通常会发现，在从测试套件中获取所需信息后，示例是你在探索新功能时绝佳的入门起点。\n\
  \n#### 获取 Spring 示例源代码\n\n所有 Spring 示例的源代码（`spring-mvc-showcase` 项目除外）都托管在 SpringSource\
  \ 的 SVN 仓库中。要获取源代码，请在任意空目录下执行以下命令：\n\n`svn co` [`https://src.springframework.org/svn/spring-samples/`](https://src.springframework.org/svn/spring-samples/)\n\
  \n图 2-3 展示了从该链接检出后的示例应用程序文件夹。\n\n![images](img/9781430241072_Fig02-03.jpg)\n\n***图\
  \ 2-3.** Spring 示例应用程序*\n\n#### Petclinic 应用程序\n\nPetclinic（位于 `petclinic` 文件夹下）是一个有趣的示例应用程序，旨在展示\
  \ Spring 的数据访问支持。在其中，你会发现一个基于 Web 的应用程序，用于查询和更新一个虚构兽医诊所的数据库。这个应用程序的有趣之处在于，它附带了一系列可互换的\
  \ DAO 实现，突显了在使用 Spring 时，将应用程序与数据访问逻辑解耦是多么容易。\n\nHibernate DAO 实现通过仅用一两行代码就实现了全部八个\
  \ DAO 方法，充分展示了 Spring 对 Hibernate 的支持。JDBC 实现同样引人入胜。首先，它展示了如何使用 `SimpleJdbcTemplate`\
  \ 和 `SimpleJdbcInsert` 来消除常见 JDBC 操作中的冗余代码。另一方面，观察如何以更加面向对象的方式处理数据访问也非常有趣。通过使用 `RowMapper`\
  \ 接口及其各种实现，查询结果集可以直接映射到值对象并返回给调用者。\n\n该项目还包含一个非常扎实的示例，展示了如何使用 Spring 的 MVC 支持来构建\
  \ Web 应用程序。因此，如果你计划为自己的某个应用程序使用 Spring MVC，请务必先看看这个示例。\n\n我们将在第 8 章中介绍 JDBC 支持，在第\
  \ 9 章中介绍 Hibernate，在第 17 章中介绍 Spring MVC。\n\n#### Petclinic Groovy 应用程序\n\nPetclinic\
  \ Groovy 示例（位于 `petclinic-groovy` 文件夹下）展示了使用 Groovy 和 Grails 实现相同 Petclinic 应用程序的过程。Groovy\
  \ 是一种运行在 JVM 上的动态脚本语言，而 Grails 是一个快速开发框架，支持开发基于 Groovy 的 Web 应用程序。Spring MVC 层中的控制器全部使用\
  \ Groovy 语言开发。\n\n对 Grails 的讨论超出了本书的范围，但 Spring 与 Groovy 的集成将在第 22 章中介绍。\n\n####\
  \ jPetStore 应用程序\n\njPetStore 示例（位于 `jpetstore` 文件夹下）基于 Clinton Begin 为 iBATIS 创建的\
  \ jPetStore 示例。就示例应用程序而言，这个相当庞大。它包含一个完整的 DAO 层，使用 Spring 和 iBATIS 创建，并提供了针对 Oracle、Microsoft\
  \ SQL Server、MySQL 和 PostgreSQL 的实现。业务层完全由 Spring 管理，并与 DAO 层结合，很好地展示了 Spring 管理的事务。\n\
  \n该应用程序还包含一个扎实的示例，展示了如何同时使用 Spring MVC 和 Struts。此外，它还重点展示了如何使用 JAXRPC 进行 Spring\
  \ 远程调用。\n\nSpring MVC 将在第 17 章中介绍，iBATIS (MyBatis) 将在第 11 章中介绍，Spring 远程调用将在第 16\
  \ 章中介绍。\n\n#### Spring 配置基础应用程序\n\nconfiguration-basic 项目（位于 `configuration-basic`\
  \ 文件夹下）演示了如何使用 Java 类来定义 Spring 的应用程序配置，这是 Spring 3.0 开始引入的新特性。在该项目中，没有 XML 文件；所有与\
  \ Spring 相关的配置都在一个 Java 类（`AppConfig.java`）中通过各种注解声明。\n\n使用 Java 类进行 Spring 配置将在第\
  \ 5 章中介绍。\n\n#### Spring 任务与调度应用程序\n\ntask-basic 项目（位于 `task-basic` 文件夹下）演示了 Spring\
  \ 任务执行器和调度支持的使用。\n\nSpring 的调度支持将在第 15 章中介绍。\n\n#### Spring MVC Showcase 应用程序\n\n\
  Spring MVC Showcase 项目（位于 `spring-mvc-showcase` 文件夹下）通过许多小而简单的示例，展示了 Spring MVC\
  \ Web 框架的能力。它基于 Spring MVC 3 构建，并展示了 Spring MVC 3 的主要特性，例如：\n\n*   使用 `@Controller`\
  \ 注解声明 Spring MVC 控制器\n*   映射请求、获取请求数据以及生成响应\n*   消息转换器和视图渲染\n*   表单、类型验证、文件上传和异常处理\n\
  \n我们将在第 17 章中详细介绍 Spring MVC。\n\n![images](img/square.jpg) **注意**  与其他 Spring 示例项目不同，spring-mvc-showcase\
  \ 项目托管在 GitHub ([`www.github.com`](http://www.github.com)) 上，这是一个非常流行的社交编程网站。要从\
  \ GitHub 获取源代码，请先获取 Git 工具 ([`http://git-scm.com`](http://git-scm.com))。安装 Git 后，执行以下命令即可将项目仓库从\
  \ GitHub 克隆到你的桌面：`git clone` [`https://github.com/SpringSource/spring-mvc-showcase`](https://github.com/SpringSource/spring-mvc-showcase)。\n\
  \n#### Spring MVC 基础与 Ajax 应用程序\n\n除了 spring-mvc-showcase 项目，Spring 还提供了另外两个项目来演示\
  \ Spring MVC 3 的各种使用场景。mvc-basic 项目（位于 `mvc-basic` 文件夹下）是一个非常简单的 Spring MVC 项目，只有一个控制器。mvc-ajax\
  \ 项目（位于 `mvc-ajax` 文件夹下）演示了如何使用 Spring MVC 构建支持 Ajax 的 Web 应用程序。服务器端使用 Spring MVC\
  \ 构建，并利用其内置的 RESTful-WS 支持来映射请求，并以 JSON 格式返回数据。在客户端，使用了 jQuery（一个流行的支持 Ajax 的 JavaScript\
  \ 库）与 Spring MVC 进行交互，以提供丰富的用户体验。\n\n#### Spring Petcare 应用程序\n\npetcare 示例（位于 `petcare`\
  \ 文件夹下）是另一个有趣的项目。它是一个功能完备的 Web 应用程序，展示了 Spring 框架及其他 Spring 项目的许多不同特性。在 Web 端，它使用\
  \ Spring MVC 和 Spring Security 来保护受保护的资源。在视图方面，它与 Tiles 集成以提供模板支持。这里也提供了邮件支持。\n\n\
  另一个有趣的特性是与 Spring Integration 项目集成，用于广播应用程序消息。另一个 Spring 项目 Spring Roo 被用来基于后端数据库模式生成\
  \ JavaBean。\n\n使用 Spring Security 保护 Web 应用程序资源将在第 17 章中介绍，而关于将 Spring 框架与其他 Spring\
  \ 项目（包括 Spring Integration 和 Spring Roo）结合使用的高级概述，将在第 20 章中介绍。\n\n\n\n#### Spring\
  \ Webflow 示例应用\n\n多个示例项目展示了 Spring 和 Spring Webflow 的特性。旅行应用（位于 `travel` 文件夹下）是\
  \ Spring Framework 3 与 Spring Webflow 2.1 的参考实现。\n\nSpring Webflow 集成了多种视图技术，其中之一是\
  \ Java Server Faces (JSF)。Spring Faces 是 Spring Webflow 中的一个模块，提供了与 JSF 的紧密集成。有两个示例应用展示了这一特性。webflow-primefaces-showcase\
  \ 示例（位于 `webflow-primefaces-showcase` 文件夹下）展示了与 Primefaces 的集成，而 webflow-richfaces-showcase\
  \ 示例（位于 `webflow-richfaces-showcase` 文件夹下）则展示了与 JBoss Richfaces 的集成。Primefaces 和\
  \ JBoss Richfaces 都是流行的 JSF 库，其最新版本均符合 JSF 2.0 标准。\n\n使用 Spring Webflow 进行 Web 应用开发（以\
  \ Primefaces 为例）将在第 18 章中介绍。\n\n### Spring 文档\n\nSpring 之所以成为构建真实应用的开发者手中如此实用的框架，其优势之一在于它拥有大量编写精良、准确无误的文档。在每个版本中，Spring\
  \ 框架的文档团队都努力确保所有文档由开发团队完成并打磨。这意味着 Spring 的每个特性不仅在 JavaDoc 中有完整记录，而且在每个发行版附带的 Spring\
  \ 参考手册中也有涵盖。如果你尚未熟悉 Spring JavaDoc 和参考手册，现在就去了解吧。本书并非旨在替代这些资源，而是作为补充参考，演示如何从头开始构建一个基于\
  \ Spring 的应用。\n\n### 为“Hello World!”注入 Spring 活力\n\n我们希望读到本书此处时，你已经认识到 Spring 是一个坚实、支持良好的项目，具备成为优秀应用开发工具的所有要素。不过，还缺少一样东西——我们还没有向你展示任何代码。我们确信你已迫不及待想看到\
  \ Spring 的实际应用，既然不能再继续只谈理论而不写代码，那我们就开始吧。如果你不完全理解本节中的所有代码，请不要担心；随着本书的深入，我们会对所有主题进行更详细的讲解。\n\
  \n#### 构建示例“Hello World!”应用\n\n现在，我们确信你对传统的“Hello World!”示例很熟悉，但万一你在过去 30 年里一直生活在月球上，清单\
  \ 2-1 展示了其完整的 Java 版本。\n\n***清单 2-1.** 典型的“Hello World!”示例*\n\n`package com.apress.prospring3.ch2;`\n\
  \n`public class HelloWorld {`\n\n`    public static void main(String[] args) {`\n\
  `        System.out.println(\"Hello World!\");`\n`    }`\n`}`\n\n就示例而言，这个非常简单——它能完成任务，但扩展性不强。如果我们想更改消息呢？如果我们想以不同方式输出消息，比如输出到\
  \ stderr 而不是 stdout，或者用 HTML 标签包裹而不是纯文本呢？\n\n我们将重新定义示例应用的需求，要求它必须支持一种简单、灵活的机制来更改消息，并且必须易于更改渲染行为。在基本的“Hello\
  \ World!”示例中，你可以通过适当修改代码来快速轻松地实现这两项更改。然而，在更大的应用中，重新编译需要时间，并且要求应用再次进行全面测试。不，更好的解决方案是将消息内容外部化，并在运行时读取它，也许是从清单\
  \ 2-2 所示的命令行参数中读取。\n\n***清单 2-2.** 在“Hello World!”中使用命令行参数*\n\n`package com.apress.prospring3.ch2;`\n\
  \n`public class HelloWorldWithCommandLine {`\n\n`    public static void main(String[]\
  \ args) {`\n`        if(args.length > 0) {`\n`            System.out.println(args[0]);`\n\
  `        } else {`\n`            System.out.println(\"Hello World!\");`\n`        }`\n\
  `    }`\n`}`\n\n这个示例实现了我们想要的目标——现在我们可以不修改代码就更改消息。然而，这个应用仍然存在一个问题：负责渲染消息的组件同时也负责获取消息。更改消息的获取方式意味着要修改渲染器中的代码。再加上我们仍然无法轻松更改渲染器；这样做意味着要修改启动应用的类。\n\
  \n如果我们让这个应用更进一步，超越“Hello World!”的基础，更好的解决方案是将渲染和消息检索逻辑重构为独立的组件。此外，如果我们真的想让应用变得灵活，应该让这些组件实现接口，并使用这些接口定义组件与启动器之间的相互依赖关系。\n\
  \n通过重构消息检索逻辑，我们可以定义一个简单的 `MessageProvider` 接口，其中包含一个方法 `getMessage()`，如清单 2-3 所示。\n\
  \n***清单 2-3.** `MessageProvider` 接口*\n\n`package com.apress.prospring3.ch2;`\n\n\
  `public interface MessageProvider {`\n\n`    public String getMessage();`\n`}`\n\
  \n如清单 2-4 所示，`MessageRenderer` 接口由所有能够渲染消息的组件实现。\n\n***清单 2-4.** `MessageRenderer`\
  \ 接口*\n\n`package com.apress.prospring3.ch2;`\n\n`public interface MessageRenderer\
  \ {`\n\n`    public void render();`\n`    public void setMessageProvider(MessageProvider\
  \ provider);`\n`    public MessageProvider getMessageProvider();`\n`}`\n\n如你所见，`MessageRenderer`\
  \ 接口有一个方法 `render()`，以及一个 JavaBean 风格的属性 `MessageProvider`。任何 `MessageRenderer`\
  \ 的实现都与消息检索解耦，并将其委托给提供给它们的 `MessageProvider`。在这里，`MessageProvider` 是 `MessageRenderer`\
  \ 的一个依赖项。创建这些接口的简单实现很容易（见清单 2-5）。\n\n***清单 2-5.** `HelloWorldMessageProvider` 类*\n\
  \n`package com.apress.prospring3.ch2;`\n\n`public class HelloWorldMessageProvider\
  \ implements MessageProvider {`\n\n\n\n`    public String getMessage() {`\n`        return\
  \ \"Hello World!\";`\n`    }`\n`}`\n\n在清单 2-5 中，你可以看到我们创建了一个简单的 `MessageProvider`，它始终返回“Hello\
  \ World!”作为消息。`StandardOutMessageRenderer` 类（如清单 2-6 所示）也同样简单。\n\n***清单 2-6.** `StandardOutMessageRenderer`\
  \ 类*\n\n`package com.apress.prospring3.ch2;`\n\n`public class StandardOutMessageRenderer\
  \ implements MessageRenderer {`\n\n`    private MessageProvider messageProvider\
  \ = null;`\n\n`    public void render() {`\n`        if (messageProvider == null)\
  \ {`\n`            throw new RuntimeException(`\n`                \"You must set\
  \ the property messageProvider of class:\"`\n`                + StandardOutMessageRenderer.class.getName());`\n\
  `        }`\n`        System.out.println(messageProvider.getMessage());`\n`    }`\n\
  \n`    public void setMessageProvider(MessageProvider provider) {`\n`        this.messageProvider\
  \ = provider;`\n`    }`\n\n`    public MessageProvider getMessageProvider() {`\n\
  `        return this.messageProvider;`\n`    }`\n`}`\n\n现在剩下的就是重写入口类的 `main()` 方法，如清单\
  \ 2-7 所示。\n\n***清单 2-7.** 重构后的“Hello World!”*\n\n`package com.apress.prospring3.ch2;`\n\
  \n`public class HelloWorldDecoupled {`\n\n`    public static void main(String[]\
  \ args) {`\n`        MessageRenderer mr = new StandardOutMessageRenderer();`\n`        MessageProvider\
  \ mp = new HelloWorldMessageProvider();`\n`        mr.setMessageProvider(mp);`\n\
  `        mr.render();`\n`    }`\n`}`\n\n这里的代码相当简单：我们实例化了 `HelloWorldMessageProvider`\
  \ 和 `StandardOutMessageRenderer` 的实例，尽管声明的类型分别是 `MessageProvider` 和 `MessageRenderer`。这是因为在编程逻辑中，我们只需要与接口提供的方法进行交互，而这些接口已经分别由\
  \ `HelloWorldMessageProvider` 和 `StandardOutMessageRenderer` 实现了。然后，我们将 `MessageProvider`\
  \ 传递给 `MessageRenderer`，并调用 `MessageRenderer.render()`。图 2-4 显示了此示例的预期输出。\n\n![images](img/9781430241072_Fig02-04.jpg)\n\
  \n***图 2-4** `HelloWorldDecoupled` 的输出*\n\n现在这个示例更接近我们想要的效果了，但还有一个小问题。更改 `MessageRenderer`\
  \ 或 `MessageProvider` 接口的实现意味着要修改代码。为了解决这个问题，我们可以创建一个简单的工厂类，从属性文件中读取实现类名，并代表应用程序实例化它们（参见清单\
  \ 2-8）。\n\n***清单 2-8.** `MessageSupportFactory` 类*\n\n`package com.apress.prospring3.ch2;`\n\
  \n`import java.io.FileInputStream;`\n`import java.util.Properties;`\n\n`public class\
  \ MessageSupportFactory {`\n\n`    private static MessageSupportFactory instance\
  \ = null;`\n`    private Properties props = null;`\n`    private MessageRenderer\
  \ renderer = null;`\n`    private MessageProvider provider = null;`\n\n`    private\
  \ MessageSupportFactory() {`\n`        props = new Properties();`\n\n`        try\
  \ {`\n`            props.load(new FileInputStream(“ch2/src/conf/msf.properties”));`\n\
  \n`            // 获取实现类`\n`            String rendererClass = props.getProperty(“renderer.class”);`\n\
  `            String providerClass = props.getProperty(“provider.class”);`\n`            renderer\
  \ = (MessageRenderer) Class.forName(rendererClass).newInstance();`\n`            provider\
  \ = (MessageProvider) Class.forName(providerClass).newInstance();`\n`        } catch\
  \ (Exception ex) {`\n`            ex.printStackTrace();`\n`        }`\n`    }`\n\
  \n`    static {`\n`        instance = new MessageSupportFactory();`\n`    }`\n\n\
  `    public static MessageSupportFactory getInstance() {`\n`        return instance;`\n\
  `    }`\n\n`    public MessageRenderer getMessageRenderer() {`\n`        return\
  \ renderer;`\n`    }`\n\n`    public MessageProvider getMessageProvider() {`\n`        return\
  \ provider;`\n`    }`\n\n`}`\n\n这里的实现简单且原始，错误处理过于简单，配置文件的名称也是硬编码的，但我们已经有了相当数量的代码。这个类的配置文件非常简单：\n\
  \n`renderer.class=com.apress.prospring3.ch2.StandardOutMessageRenderer`\n`provider.class=com.apress.prospring3.ch2.HelloWorldMessageProvider`\n\
  \n对 `main()` 方法做一个简单的修改（如清单 2-9 所示），我们就可以开始工作了。\n\n***清单 2-9.** 使用 `MessageSupportFactory`*\n\
  \n`package com.apress.prospring3.ch2;`\n\n`public class HelloWorldDecoupledWithFactory\
  \ {`\n\n`    public static void main(String[] args) {`\n`        MessageRenderer\
  \ mr = MessageSupportFactory.getInstance().getMessageRenderer();`\n`        MessageProvider\
  \ mp = MessageSupportFactory.getInstance().getMessageProvider();`\n`        mr.setMessageProvider(mp);`\n\
  `        mr.render();`\n`    }`\n`}`\n\n在我们继续了解如何将 Spring 引入此应用程序之前，让我们快速回顾一下我们已经完成的工作。从简单的“Hello\
  \ World!”应用程序开始，我们定义了两个应用程序必须满足的额外需求。第一个是更改消息应该简单，第二个是更改渲染机制也应该简单。为了满足这些需求，我们引入了两个接口：`MessageProvider`\
  \ 和 `MessageRenderer`。`MessageRenderer` 接口依赖于 `MessageProvider` 接口的实现，以便能够检索要渲染的消息。最后，我们添加了一个简单的工厂类来检索实现类的名称，并在适用时实例化它们。\n\
  \n#### 在 STS 中创建 Spring 项目\n\n在讨论如何使用 Spring 重构“Hello World!”应用程序之前，我们将向你展示如何使用\
  \ STS 进行基于 Spring 的应用程序开发。在创建不同类型的 Spring 项目（例如，简单的 Spring DI 应用程序、Web 应用程序、JPA\
  \ 应用程序等）时，STS 可以为你节省大量时间，并且 STS 会为你创建一个声明了所有必需依赖项的项目。那么，让我们先下载并安装 STS，然后创建用于重构“Hello\
  \ World!”应用程序的项目。\n\n首先，从 SpringSource 网站（[`www.springsource.com/downloads/sts`](http://www.springsource.com/downloads/sts)）下载\
  \ STS，选择你的开发环境，然后安装它。在撰写本文时，版本是 2.8.1。这也是我们用于开发本书中所有示例代码以及示例应用程序的版本。\n\n接下来，安装完成后，启动\
  \ STS，并创建一个新的 Spring 模板项目。对于模板选择，选择 Simple Spring Utility Project（参见图 2-5）。\n\n\
  ![images](img/9781430241072_Fig02-05.jpg)\n\n***图 2-5.** 在 STS 中创建一个简单的 Spring 工具项目*\n\
  \n之后，STS 会要求你提供基本的项目信息，例如项目名称、基础包名称等（参见图 2-6）。\n\n![images](img/9781430241072_Fig02-06.jpg)\n\
  \n***图 2-6.** 定义 Spring 项目的基本属性*\n\n然后，STS 将创建启用了 Maven 依赖支持的项目。所需的依赖项（`spring-context`、`spring-test`、`log4j`\
  \ 等）将被自动声明并包含。你无需手动为项目包含 Spring 库。\n\n现在，我们准备好在 Spring 中重构之前的“Hello World!”应用程序了。\n\
  \n\n\n##### 使用 Spring 重构\n\n前面展示的最终示例实现了我们为示例应用设定的目标，但仍存在一些问题。第一个问题是，我们必须编写大量胶水代码来拼合应用，同时还要保持组件之间的松散耦合。第二个问题是，我们仍然需要手动为\
  \ `MessageRenderer` 提供 `MessageProvider` 的实例。使用 Spring 可以解决这两个问题。\n\n为了解决胶水代码过多的问题，我们可以从应用中完全移除\
  \ `MessageSupportFactory` 类，并用 Spring 的接口 `ApplicationContext` 来替代它。不必过于担心这个接口；目前只需知道\
  \ Spring 使用该接口来存储被 Spring 管理的应用的所有环境信息即可。该接口扩展了另一个接口 `ListableBeanFactory`，后者充当所有\
  \ Spring 管理的 Bean 实例的提供者（参见清单 2-10）。\n\n***清单 2-10.** 使用 Spring 的 `ApplicationContext`*\n\
  \n`package com.apress.prospring3.ch2;`\n\n`import org.springframework.context.ApplicationContext;`\n\
  `import org.springframework.context.support.ClassPathXmlApplicationContext;`\n\n\
  `public class HelloWorldSpringDI {`\n\n`    public static void main(String[] args)\
  \ {`\n\n`        // 初始化 Spring ApplicationContext`\n`        ApplicationContext\
  \ ctx = new ClassPathXmlApplicationContext`\n`           (\"META-INF/spring/app-context.xml\"\
  );`\n\n`        MessageRenderer mr = ctx.getBean(\"renderer\", MessageRenderer.class);`\n\
  `        mr.render();`\n`    }`\n\n`}`\n\n在清单 2-10 中，可以看到 `main()` 方法获取了一个 `ClassPathXmlApplicationContext`\
  \ 实例（应用配置信息从项目类路径下的文件 `META-INF/spring/app-context.xml` 中加载），其类型为 `ApplicationContext`，并从中通过\
  \ `ApplicationContext.getBean()` 方法获取 `MessageRenderer` 实例。暂时不必过于担心 `getBean()`\
  \ 方法；只需知道该方法读取应用配置（本例中为 XML 文件），初始化 Spring 的 `ApplicationContext` 环境，然后返回配置好的 Bean\
  \ 实例。这个 XML 文件（`app-context.xml`）的作用与我们之前用于 `MessageSupportFactory` 的配置文件相同（参见清单\
  \ 2-11）。\n\n***清单 2-11.** Spring XML 应用配置*\n\n`<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>`\n`<beans`\n`    xmlns:xsi=http://www.w3.org/2001/XMLSchema-instance  `\n\
  \n`      xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n`          http://www.springframework.org/schema/beans/spring-beans-3.0.xsd`\n\
  `          http://www.springframework.org/schema/context`\n`          http://www.springframework.org/schema/context/spring-context-3.0.xsd\"\
  >`\n\n`    <bean id=\"provider\" class=\"com.apress.prospring3.ch2.HelloWorldMessageProvider\"\
  />`\n\n`    <bean id=\"renderer\" class=\"com.apress.prospring3.ch2.StandardOutMessageRenderer\"\
  `\n`        p:messageProvider-ref=\"provider\"/>`\n\n`</beans>`\n\n上述文件展示了一个典型的\
  \ Spring `ApplicationContext` 配置文件。首先，声明了 Spring 的命名空间，默认命名空间为 `beans`，用于声明需要由 Spring\
  \ 管理的 Bean 及其依赖需求（在上述示例中，`renderer` Bean 的 `messageProvider` 属性引用了 `provider` Bean），以便\
  \ Spring 解析并注入这些依赖。\n\n随后，我们声明了 ID 为 `\"provider\"` 的 Bean 及其对应的实现类。当 Spring 在 `ApplicationContext`\
  \ 初始化过程中看到这个 Bean 定义时，它会实例化该类，并以指定的 ID 存储它。\n\n接着，声明了 `\"renderer\"` Bean 及其对应的实现类。请记住，这个\
  \ Bean 依赖于 `MessageProvider` 接口来获取要渲染的消息。为了告知 Spring 这个依赖注入需求，我们使用了 `p` 命名空间属性。标签属性\
  \ `p:messageProvider-ref=\"provider\"` 告诉 Spring，该 Bean 的属性 `messageProvider` 应该被注入另一个\
  \ Bean。要注入到该属性的 Bean 应引用 ID 为 `\"provider\"` 的 Bean。当 Spring 看到这个定义时，它会实例化该类，查找名为\
  \ `messageProvider` 的 Bean 属性，并将 ID 为 `\"provider\"` 的 Bean 实例注入其中。\n\n如您所见，在 Spring\
  \ 的 `ApplicationContext` 初始化之后，`main()` 方法现在只需通过类型安全的 `getBean()` 方法（传入 ID 和期望的返回类型，即\
  \ `MessageRenderer` 接口）获取 `MessageRenderer` Bean，并调用 `render()`；Spring 已经创建了 `MessageProvider`\
  \ 实现，并将其注入到 `MessageRenderer` 实现中。请注意，我们无需对使用 Spring 进行装配的类做任何修改。事实上，这些类完全没有引用 Spring，也完全不知道\
  \ Spring 的存在。然而，情况并非总是如此。您的类可以实现 Spring 指定的接口，以多种方式与 DI 容器进行交互。\n\n现在，让我们看看由 Spring\
  \ DI 驱动的“Hello World！”应用的实际运行效果。在 STS 中，只需右键单击 `HelloWorldSpringDI` 类，选择“Run As”，然后选择“Java\
  \ Application”。执行结果将显示在“Console”选项卡中（参见图 2-7）。\n\n![images](img/9781430241072_Fig02-07.jpg)\n\
  \n***图 2-7.** `HelloWorldSpringDI` 的执行输出*\n\n### 本章小结\n\n在本章中，我们为您提供了启动并运行 Spring\
  \ 所需的所有背景信息。我们向您展示了如何获取 Spring 的发布版本以及直接从 GitHub 获取当前的开发版本。我们描述了 Spring 的打包方式以及每个\
  \ Spring 特性所需的依赖项。利用这些信息，您可以做出明智的决策，确定您的应用需要哪些 Spring JAR 文件，以及需要随应用分发哪些依赖项。Spring\
  \ 的文档、示例应用和测试套件为 Spring 用户提供了一个理想的起点，以便开始他们的 Spring 开发，因此我们花了一些时间来研究 Spring 发行版中可用的内容。最后，我们展示了一个示例，说明如何使用\
  \ Spring DI 将传统的“Hello World！”变成一个松散耦合、可扩展的消息渲染应用。\n\n需要认识到的重要一点是，本章仅触及了 Spring\
  \ DI 的皮毛，对于整个 Spring 来说，我们几乎只是蜻蜓点水。在下一章中，我们将深入探讨将要构建的示例应用，特别关注如何使用 Spring 解决常见的设计问题，以及我们如何利用\
  \ Spring 使应用变得更简单、更易于管理。\n\n## 第 3 章\n\n\n\n## 示例应用程序\n\n本书各章节中的示例均针对当前讨论内容量身定制，旨在以易于理解的方式阐述每个功能的实现。大多数情况下，这些示例足以解释其所展示的主题。然而，这些示例是孤立出现的，并非基于真实场景，这可能会使理解不同\
  \ Spring 特性如何协同工作变得困难。为了解决这个问题，我们构建了一个基本的博客应用程序 SpringBlog，它突出了本书讨论的大部分主题，并展示了不同\
  \ Spring 特性如何协同工作。\n\n请注意，这个应用程序特意设计得非常简单，事实上，它的许多功能都是为了突出 Spring 的特定功能而构思的。尽管简单，SpringBlog\
  \ 应用程序演示了如何构建一个基于 Spring 的应用程序，以及各个组件是如何组合在一起的。\n\n在本章中，你将初步了解完成的 SpringBlog 应用程序。然后，我们将讨论用于实现应用程序不同部分的\
  \ Spring 特性。本章还强调了我们在设计 SpringBlog 应用程序时做出的一些决策及其原因。最重要的是，本章作为本书其余部分的路线图，让你能够突出自己应用程序中的重要领域，并立即在书中找到该领域的相关介绍。\n\
  \n具体来说，本章涵盖两个主要主题：\n\n*   *SpringBlog 应用程序的需求*：在本节中，我们将讨论 SpringBlog 应用程序的需求，并初步了解这些需求的最终成果。我们还将讨论为什么选择包含某些需求，以及在构建示例应用程序时为什么忽略其他需求。\n\
  *   *实现 SpringBlog 应用程序*：在本节中，我们将从高层次审视如何使用 Spring 实现上一节讨论的需求。本节不会深入探讨单个 Spring\
  \ 特性的细节；相反，它会概括性地讨论这些特性，并指引你查阅包含更完整描述的其他章节。\n\n如果你已经熟悉 Spring 应用程序的设计，或者已经知道哪些主题对你的应用程序最重要，可以随意跳过本章。如果你是\
  \ Spring 的完全新手，阅读本章将让你很好地了解不同 Spring 组件在应用程序中的位置。\n\n### SpringBlog 应用程序的需求\n\n\
  在定义 SpringBlog 应用程序的需求时，我们的主要目标是在完整应用程序的上下文中突出某些 Spring 框架特性。出于这个原因，我们加入了一些特性，例如审计和不当内容过滤，这些特性在传统的博客应用程序中可能不会出现，但它们仍然是有用的功能，并提供了一种突出\
  \ Spring 框架特定特性的方式。\n\n本节将全面介绍 SpringBlog 应用程序中包含的功能。\n\n#### 安全与认证\n\n与大多数其他博客应用程序一样，SpringBlog\
  \ 应用程序提供了安全控制，防止未经授权的用户创建和编辑博客条目。\n\n如图 3-1 所示，SpringBlog 应用程序提供了一个登录表单，供用户登录并将自己标识为应用程序的有效注册用户。\n\
  \n![images](img/9781430241072_Fig03-01.jpg)\n\n***图 3-1.** SpringBlog 中的用户身份*\n\n\
  然而，查看博客条目不需要登录。在 SpringBlog 中，你会自动被分配匿名身份。使用登录功能，你可以根据数据库中的用户列表验证你的详细信息，并为自己分配一个不同的身份。在内部，SpringBlog\
  \ 使用此身份进行安全访问控制，用户信息也将用于审计过程。\n\n安全控制需求如下：\n\n*   匿名用户只允许查看博客条目。\n*   应用程序内有两个用户角色，即用户（`ROLE_USER`）和管理员（`ROLE_ADMIN`）。\n\
  *   分配了用户角色（`ROLE_USER`）的用户可以执行以下操作：\n    *   发布博客条目或对现有条目发表评论\n    *   编辑他们创建的博客条目或评论\n\
  *   分配了管理员角色（`ROLE_ADMIN`）的用户可以执行以下操作：\n    *   查看审计数据\n    *   执行用户维护\n\n#### 查看博客条目\n\
  \n任何博客系统的一个明显需求是能够向用户显示博客条目。如图 3-2 所示，SpringBlog 应用程序在主页上按时间倒序显示所有博客帖子。博客条目将以表格格式显示。\n\
  \n![images](img/9781430241072_Fig03-02.jpg)\n\n***图 3-2.** 查看最近的博客条目*\n\n用户可以配置每页显示的条目数；按主题、类别和发布日期过滤博客条目；并控制博客条目的显示顺序。\n\
  \n点击某个特定的博客条目会仅显示该条目，以及为该条目发布的评论列表和附加到该条目的文件，如图 3-3 所示。\n\n![images](img/9781430241072_Fig03-03.jpg)\n\
  \n***图 3-3.** 查看博客条目*\n\n#### 发布博客条目\n\n如果没有发布博客条目的能力，就没有什么可显示的了。以有效用户身份登录后，你可以使用图\
  \ 3-4 所示的条目表单发布新的博客条目，该表单可通过主页上的“新建博客帖子”链接访问。\n\n在发布/编辑博客条目时，你可以输入详细信息，并选择博客条目的类别和子类别，以便访问者轻松过滤掉他们不想看到的博客条目。此外，在发布过程中，将对博客条目应用验证规则。\n\
  \n创建博客条目后，你可以通过点击条目详情页面上的“编辑”链接来编辑它（博客条目只能由发布它的用户编辑）。在幕后，SpringBlog 使用相同的 HTML 表单来创建和编辑博客条目，但使用不同的\
  \ Spring 控制器方法来处理每个操作。\n\n![images](img/9781430241072_Fig03-04.jpg)\n\n***图 3-4.**\
  \ 发布博客条目*\n\n#### 评论博客条目\n\n与大多数博客应用程序一样，SpringBlog 允许用户通过发布评论来表达他们对特定条目的看法（发布评论也需要登录）。用户可以使用条目详情页面上的“发表评论”链接来发布评论，如图\
  \ 3-5 所示。\n\n![images](img/9781430241072_Fig03-05.jpg)\n\n***图 3-5.** 发表评论*\n\n\
  与条目发布功能一样，此功能也允许你编辑评论。\n\n\n\n#### 过滤不当言论\n\n在 SpringBlog 中，我们真正想强调的 Spring 框架特性之一是\
  \ AOP，但我们不想使用传统的日志记录示例，而且基于 AOP 的事务管理已经内置于 Spring 框架中。虽然大多数博客不使用任何形式的不当言论过滤器，但我们决定采用这一功能。在设计过程中，使用\
  \ AOP 似乎是跨应用程序应用此功能的最佳方式。\n\n有了这个功能，当你尝试发布如图 3-6 所示的条目时，实际得到的发布结果会像图 3-7 那样。ROT13\
  \ 算法用于执行过滤，将在第 21 章中详细讨论。\n\n![images](img/9781430241072_Fig03-06.jpg)\n\n***图 3-6.**\
  \ 尝试发布不当言论*\n\n![images](img/9781430241072_Fig03-07.jpg)\n\n***图 3-7.** 不当言论过滤器生效*\n\
  \n#### 为博客条目或评论附加文件\n\n与万维网上使用的许多博客应用程序不同，SpringBlog 允许在博客条目和评论中上传文件。实际上，此功能会带来相当大的安全风险，但它确实让我们能够展示\
  \ Spring 框架出色的文件上传处理能力。图 3-8 显示了一个为现有条目上传文件的过程。\n\n![images](img/9781430241072_Fig03-08.jpg)\n\
  \n***图 3-8.** 向 SpringBlog 上传文件*\n\n#### 审计博客操作\n\n我们纯粹为了演示 Spring 特定功能而包含的一个特性是审计。通过引入对所有博客操作进行记录以供审计的需求，我们使每个博客操作都需要多个数据库操作；这需要使用数据库事务，显然，我们通过\
  \ Spring 的事务管理功能来管理它。\n\n你可以查看博客帖子的审计历史，如图 3-9 所示，只需点击博客条目详情页面上的“查看审计历史”链接即可。如前所述，只有拥有管理员角色的用户才能看到该链接并查看审计历史。\n\
  \n![images](img/9781430241072_Fig03-09.jpg)\n\n***图 3-9.** 查看审计数据*\n\n#### RSS 订阅源\n\
  \n有些用户可能不想定期访问网站，而是希望从他们自行开发的 Web 应用程序或通过他们自己的个性化门户网站（例如，来自 iGoogle）接收简易信息聚合（RSS）订阅源。SpringBlog\
  \ 应用程序将通过 RESTful-WS 提供博客条目。借助此服务，消费者能够以 XML 或 JSON 格式检索博客条目。\n\n#### 从 XML 文件上传博客\n\
  \n有些用户可能希望离线撰写博客，然后将其提交到 SpringBlog。SpringBlog 也提供此服务。用户可以撰写博客，将其保存为带有预定义标签的 XML\
  \ 文件，然后将文件上传到服务器上的特定位置。SpringBlog 会定期轮询该文件夹，并在发现新文件时导入它们。\n\n#### 实现 SpringBlog\n\
  \n使用 Spring 的最佳理由之一是，它使得使用传统的面向对象编程（OOP）实践来设计和构建应用程序变得更加简单。此外，近年来 Spring 的成熟度和全面的功能集使其成为\
  \ JEE 应用程序的强大支柱。借助 Spring，你可以自由地按照你认为合适的方式设计应用程序，而让 Spring 负责将不同的组件连接在一起。Spring\
  \ 消除了对工厂（Factory）和单例（Singleton）等虚假模式的需求，这些模式会阻碍测试，并且只能部分解决它们所设计要解决的问题。\n\n在本节中，我们将概述\
  \ SpringBlog 应用程序的设计和实现决策，并指出每个主题在何处进行详细讨论。\n\n#### 开发工具与依赖管理\n\n在进入设计之前，让我们决定如何实现\
  \ SpringBlog 应用程序。对于开发基于 Spring 的应用程序，最合适的工具是 SpringSource Tool Suite (STS)。STS\
  \ 将 Eclipse IDE、Spring IDE 以及许多有用的工具（例如 Eclipse 的 Maven 插件、Mylyn、Eclipse 的 AspectJ\
  \ 开发工具等）打包成一个单一的软件包。如果你的开发机器上已经安装了某个版本的 Eclipse，你也可以通过 STS Eclipse 更新站点（[`www.springsource.com/downloads/sts`](http://www.springsource.com/downloads/sts)）安装\
  \ STS 插件。SpringBlog 应用程序将使用 STS 进行开发。有关 STS 的详细信息将在附录 A 中提供。\n\n如前所述，整个 Spring 框架由许多模块组成，每个模块也依赖于其他\
  \ Java 库。虽然你可以手动整理所需的 Spring 模块和第三方依赖项并将其包含到项目中，但使用依赖管理工具来处理这些工作要容易得多。STS 内置了对 Maven\
  \ 的支持，Maven 是一种流行的应用程序依赖管理工具。SpringBlog 应用程序将使用 Maven 来管理依赖项以及构建生命周期。对于版本控制，将使用\
  \ Git，除了从本书页面下载示例应用程序的源代码外，你还可以从 GitHub（[`http://github.com`](http://github.com)）检出该应用程序的最新版本。\n\
  \n#### 应用程序设计\n\nSpringBlog 的设计非常简单，每一层都通过接口而非具体类来定义。在每一层中，与该层对应的接口仅定义该层向被归类为客户端层的其他层公开的方法。配置\
  \ SpringBlog 的参数不会硬编码在应用程序中。相反，配置方法在实现每一层接口的类上声明，并且配置数据使用 Spring 基于 IoC 的配置机制进行注入。第\
  \ 21 章将全面讨论构成 SpringBlog 的不同接口、如何使用 Spring 将它们连接在一起，以及影响接口粒度的因素。\n\nSpringBlog 应用程序还包含一个基本的领域对象模型（DOM），它封装了数据和行为。在第\
  \ 12 章中，我们将花时间研究你可能在你参与过的项目中见过的不同风格的 DOM，并讨论在决定是将行为封装在 DOM 中还是封装在单独的服务对象中时必须考虑的因素。\n\
  \n#### 应用程序配置管理\n\n在 SpringBlog 应用程序中，我们将使用最新的 Spring 框架（撰写本文时为 3.1 版本）进行 DI 配置。从\
  \ 3.0 版本开始，Spring 支持通过 XML 文件或 Java 注解进行配置管理。\n\n对于 SpringBlog，我们将采用混合方法。首先，所有基础设施设置（例如，数据源、事务管理器等）将在各种\
  \ XML 配置文件中定义，以便于维护。对于那些可注入的 bean 和需要 DI 的 bean，我们将使用 Java 注解来表达 DI 需求。其次，事务支持的需求也将使用\
  \ Java 注解来定义。然后，我们将依赖 Spring 的组件扫描和自动装配功能来扫描这些类以查找这些注解，并在后台管理这些 bean 及其对各种资源的需求。\n\
  \nSpring 配置主题的详细信息将在第 4 章和第 5 章中介绍。\n\n\n\n#### SpringBlog 的分层应用架构\n\n在深入探讨每一层的实现之前，让我们先从更高层次审视一下我们将在\
  \ SpringBlog 中实现的各个层。图 3-10 描绘了 SpringBlog 应用的分层架构，以下列表描述了 SpringBlog 应用中的各层（从后端到前端）：\n\
  \n> *持久层*：该层直接与底层持久化数据存储（此处为关系型数据库管理系统）交互，并将检索到的数据转换为 Java 领域对象，供服务层使用。对于后端数据库，将使用嵌入式\
  \ H2 数据库（[`www.h2database.com`](http://www.h2database.com)）以便于部署。不过，MySQL 也将得到支持，并且示例应用中会提供相关说明，以便您选择使用\
  \ MySQL 作为后端数据库。\n> \n> *服务层*：该层是应用的核心层。所有业务逻辑都将在此层实现。任何应用服务请求，无论来自何种渠道（例如，浏览器界面、RESTful\
  \ Web 服务请求、批处理作业等），都应通过此层路由以执行所需的业务处理。例如，Bean 属性的验证将在此处进行。此外，该层通过依赖注入依赖持久层进行数据库访问。\n\
  > \n> *批处理作业与集成层*：该层提供与外部系统的集成。例如，它将轮询（来自可配置文件夹位置的）包含用户博客条目的 XML 文件，并通过批处理将其导入 SpringBlog。它与服务层交互以上传博客条目。\n\
  > \n> *表示层*：这是 Web 应用的层，为 SpringBlog 用户提供前端界面。它还处理 RSS 源，为消费者生成 XML 数据。它与服务层交互以进行数据处理和业务逻辑执行。\n\
  > \n> *安全层*：安全层保护那些安全资源。例如，仅允许匿名用户查看博客条目。将提供登录功能，然后根据角色授予用户访问权限，以确保他们只能访问分配给其所属角色的功能。\n\
  \n![images](img/9781430241072_Fig03-10.jpg)\n\n***图 3-10.** SpringBlog 应用的分层架构*\n\
  \n在讨论了分层架构之后，让我们看看 SpringBlog 应用中每一层将如何实现。\n\n#### 实现持久层\n\n数据访问是许多开发者关注的核心话题，也常常是互联网上开发者论坛中激烈讨论的主题。近年来，Java\
  \ 世界的焦点已转向对象关系映射工具，以取代许多开发者认为过于复杂混乱的 JDBC。Spring 功能集的一个重要部分在于其对数据访问技术的支持。总而言之，Spring\
  \ 支持多种不同的数据访问机制：纯 JDBC、Hibernate、MyBatis（iBATIS）、Java 数据对象和 JPA。\n\n对于 SpringBlog\
  \ 应用，我们希望展示在数据访问实现之间切换是多么容易，因此我们构建了持久层的两种不同实现：一种使用 JPA（以 Hibernate 作为底层持久化服务提供者），另一种使用\
  \ MyBatis。\n\nHibernate 或许是 Java 世界中最知名的 ORM 工具，它因其易于用于开发高性能持久化逻辑而取得了巨大成功。尽管 Hibernate\
  \ 拥有相当简单的 API，但使用 Hibernate 所需的错误处理代码却相当冗长；Spring 极大地简化了这一点，将大多数 Hibernate 操作缩减为仅一行代码。此外，由于像\
  \ Hibernate 这样的 ORM 工具取得了显著成功，并且开发者广泛接受 Hibernate 进行数据访问，JCP 已将该技术正式纳入 JEE 技术栈。从\
  \ EJB 3.0 开始，实体 Bean 规范已被 Java 持久化 API 取代。目前版本为 2.0 的 JPA 是 JEE 6 标准的一部分，并吸收了众多流行\
  \ ORM 框架的思想。JPA 为 Java 应用访问关系型数据库管理系统定义了一个通用的对象关系映射模式，同时将实现（称为*持久化提供者*）留给开源社区和商业供应商。一些流行的\
  \ JPA 持久化提供者包括 Hibernate、Eclipselink 和 OpenJPA。第 9 章 讨论了 Spring 对 Hibernate 的支持，第\
  \ 10 章 讨论了 Spring 对 JPA 的支持。这两章结合展示了我们如何使用 Spring 和 JPA 2（以 Hibernate 作为持久化服务提供者）来构建数据访问层的实现。对于\
  \ Spring 与 JPA 和 Hibernate，我们还将讨论如何使用 Spring Data JPA 为创建博客或评论的用户实现日志记录，以及如何使用 Hibernate\
  \ 的 Envers（实体版本控制系统）实现审计日志功能。\n\n严格来说，MyBatis 并非 ORM 工具，而是一个数据映射器框架，它并未免除开发者创建将\
  \ Java 对象映射到关系型数据库管理系统中数据所需的 SQL 语句的全部责任。MyBatis 引入了 SQL 映射的概念，允许您指定各种 SQL 查询以及这些查询如何映射到输入和输出参数。MyBatis\
  \ 在数据访问的某些方面相当强大。第 11 章 详细讨论了 MyBatis，并展示了我们如何构建第二种数据访问实现。\n\n在所有情况下，我们都为每种数据访问工具使用了\
  \ Spring 的基础设施类。这些类与 Spring 的事务架构集成，允许在 SpringBlog 应用的服务层中以独立于平台和资源提供者的方式管理事务。\n\
  \n#### 实现服务层\n\nSpringBlog 应用相当简单，除了博客数据的基本存储和检索之外，系统中几乎没有多少业务规则。然而，SpringBlog 应用中有两个特定的业务功能利用了\
  \ Spring 最有趣的两个特性：基于 AOP 的色情内容过滤器和审计日志。\n\n#### 使用 AOP 进行色情内容过滤\n\nAOP 是当前 Java\
  \ 世界的一个热门话题，因此，Java 开发者有幸拥有多种可用的 AOP 实现。Spring AOP 支持有两种形式：Spring 原生 AOP 框架和与 AspectJ\
  \ AOP 框架的集成。第 6 章 和第 7 章 详细讨论了 Spring AOP 和 AspectJ 集成。\n\n对于 SpringBlog 应用，我们希望提供一个\
  \ AOP 使用的实际示例，而不是传统（且枯燥）的日志记录示例。我们为示例应用开发的一个功能是色情内容过滤器，在设计过程中，很明显 AOP 是实现此过滤器的理想机制。在第\
  \ 21 章 中，您将看到我们如何构建色情内容过滤器，以及如何使用 AOP 将过滤器选择性地应用于相关方法。\n\n\n\n##### 使用 Spring 事务支持\n\
  \n作为开发者，Spring 最令人印象深刻的功能之一便是其事务支持。Spring 的事务支持提供了一种简单的机制，可以通过编程式或声明式的方式，跨一个或多个资源提供者控制事务。第\
  \ 13 章 详细讨论了事务框架，特别关注了使用本地事务和分布式事务的数据库事务。\n\n对于 SpringBlog 应用，我们定义了一个需求：博客中的所有操作都需要被审计并记录到数据库中。为了确保在审计过程失败时操作能够回滚，我们使用了\
  \ Spring 事务框架，将每个操作及其审计过程封装在单个事务中。我们将在第 13 章 中讨论这一点。\n\n##### Bean 验证\n\n开发者最渴望的功能之一是一个集中化的验证规则引擎，在该引擎中，所有验证规则都应用于数据并进行检查，无论数据来自何处（例如，用户通过\
  \ Web 应用输入信息，或来自批处理作业中的 XML 文件）。理想的情况是，这些验证规则只需定义一次，然后数据便可在任何层需要时根据这些规则进行验证。Bean\
  \ 验证 API（JSR-303）正是为此目的而创建的。在 SpringBlog 中，我们将使用 Bean 验证 API 进行集中化验证检查。Spring 对\
  \ Bean 验证 API 支持的细节将在第 13 章 中讨论。\n\n在 SpringBlog 中，我们将使用 Hibernate Validator（[`http://hibernate.org/subprojects/validator`](http://hibernate.org/subprojects/validator)），它是\
  \ Bean 验证 API 的一个流行实现。\n\n##### 两种不同的服务层实现\n\n传统上，在数据访问层，开发者会实现数据访问对象（DAO）以将数据访问逻辑与业务逻辑分离。这些\
  \ DAO 将被注入到服务层的对象中。其目的是使从一种数据访问实现切换到另一种更容易。然而，DAO 模式在服务层和后端数据库之间引入了一个额外的层，这在大多数场景下已被证明相当繁琐。此外，通过使用像\
  \ JPA 这样的标准，持久化上下文可以直接注入到服务层进行数据访问，使用 JPA 定义的标准 API。这样，你就可以灵活地从一个 JPA 持久化提供者切换到另一个（例如，从\
  \ Hibernate 切换到 Eclipselink）。因此，如今大多数应用不再使用 DAO，所有业务和数据访问逻辑都被封装在服务层中。\n\n对于 SpringBlog\
  \ 应用，服务层包含多个接口，这些接口反映了该层可以提供的业务服务。正如前面所讨论的，我们将使用不同的持久化技术提供两种不同的服务层实现；一种使用 JPA 和\
  \ Hibernate，另一种使用 MyBatis。\n\n我们还将向你展示如何使用 Spring 3.1 中一个名为 *profiles* 的新配置特性，来指定在应用中使用哪个服务实现。配置和\
  \ profiles 将在第 5 章 中讨论。\n\n##### 实现批处理与集成层\n\n大多数应用需要与其他系统集成以交换信息，无论是通过批处理还是实时方式。两个\
  \ Spring 项目，Spring Batch 和 Spring Integration，可以协同工作，为批处理作业和基本企业集成模式（EIP）的实现提供一个强大且标准的平台。\n\
  \n我们将使用这两个 Spring 项目来实现一个批处理作业，用于从 XML 文件导入博客条目。我们将使用 Spring Integration 的文件轮询支持，每当文件到达特定文件夹时触发该批处理作业。关于\
  \ Spring Batch 和 Spring Integration 的简要介绍将在第 20 章 中提供。\n\n##### 实现表示层\n\n与对数据访问技术的支持一样，Spring\
  \ 以其对多种不同 Web 应用框架和工具的支持而闻名。第 17 章 和第 18 章 详细讨论了 Spring MVC 框架以及 Spring 支持的一些常见视图技术，包括\
  \ Java Server Pages (JSP) 和 Java Server Faces (JSF)。\n\n##### Spring MVC\n\n目前市场上有很多\
  \ Web 框架，每个都有其优缺点。标准化于一个单一的框架，并希望它能满足所有具有不同性质和业务目的的 Web 应用的需求，几乎是不可能的。\n\n在 SpringBlog\
  \ 中，我们将使用一种更常见且简单的方法来实现 Web 层。将采用 MVC 模式，并使用 Spring MVC 作为框架。在视图方面，我们将使用标准的 JSP\
  \ 页面。对于 Ajax 功能，我们将使用 jQuery JavaScript 库和 Spring MVC 全面的 RESTful-WS 支持来实现。详细信息将在第\
  \ 17 章 中介绍。\n\n##### 使用 Tiles\n\n在大多数 Web 应用中，每次处理新请求时，只有屏幕的一部分会发生变化，而页眉和导航栏等公共元素保持不变。使用\
  \ Tiles，你可以从称为 *tiles* 的独立部分组装页面，使得公共元素可以定义一次并在整个应用中重用。第 17 章 探讨了如何在 Spring 应用中使用\
  \ Tiles，并展示了我们如何使用 Tiles 构建示例应用。\n\n##### RESTful-WS 和 OXM\n\nSpring 提供的另一个功能是 XML\
  \ 格式的 RSS 源。为了实现这一点，我们将使用 Spring MVC 的 RESTful-WS 和对象到 XML 映射（OXM）支持。对于 XML 编组和解组，我们将使用\
  \ Castor（[`www.castor.org`](http://www.castor.org)）。Spring 支持的其他 XML 绑定框架包括 JAXB、XStream\
  \ 和 XMLBeans。这也将在第 16 章 中介绍。\n\n##### 实现安全层\n\n安全性是任何应用的另一个主要关注点，尤其是 Web 应用。如果没有适当的安全控制，你的\
  \ Web 应用可能会遭受 Web 攻击并丢失重要的业务数据。\n\nSpring Security（以前称为 Acegi Security Framework\
  \ for Spring）几乎是 Spring 驱动应用的默认安全框架。它对声明式和编程式安全访问控制的全面支持，以及与 Spring 的紧密集成，极大地简化了开发者需要实现的代码。对于\
  \ SpringBlog 应用，我们将使用 Spring Security 3.1 来保护 Web 应用，并确保用户只能根据分配的角色执行其被授予的操作。我们将在第\
  \ 16 章 和第 17 章 中介绍 Spring Security。\n\n由于用户信息及其分配的角色存储在 SpringBlog 数据库中，我们将为 Spring\
  \ Security 实现一个用户详情服务类，以检索信息并相应地应用安全措施。\n\n### 总结\n\n在本章中，你了解了我们将在本书中讨论的 SpringBlog\
  \ 应用，并介绍了 SpringBlog 的各种功能、它们是如何实现的，以及在本书的哪些部分进行了讨论。\n\n在下一章中，我们将讨论 Spring 框架的核心——其控制反转（IoC）容器。第\
  \ 4 章 扩展了我们在第 2 章 中介绍的示例，并讨论了不同类型的 IoC 以及它们在 Spring 中是如何得到支持的。\n\n## 第 4 章\n\n\n\
  \n## 介绍 Spring 中的 IoC 与 DI\n\n在第 1 章中，我们介绍了控制反转（IoC）和依赖注入（DI）的基本原理。实际上，DI 是 IoC\
  \ 的一种特殊形式，尽管你经常会发现这两个术语被互换使用。在本章中，我们将更详细地探讨 IoC 和 DI，明确两者之间的关系，并深入分析 Spring 在其中扮演的角色。\n\
  \n在定义两者并考察 Spring 与它们的关系之后，我们将探索对 Spring 实现 DI 至关重要的概念。本章仅涵盖 Spring DI 实现的基础知识；我们将在第\
  \ 5 章中讨论更高级的 DI 特性，并在第 5 章和第 12 章中结合应用设计来考察 DI。更具体地说，本章将涵盖以下主题：\n\n> *控制反转概念：* 在本节中，我们将讨论各种类型的\
  \ IoC，包括依赖注入和依赖查找。本节将考察不同 IoC 方法之间的差异，并介绍每种方法的优缺点。\n> \n> *Spring 中的控制反转：* 本节将考察\
  \ Spring 中可用的 IoC 能力以及这些能力是如何实现的。特别地，本节将考察 Spring 提供的依赖注入服务，包括 Setter 注入、构造器注入和方法注入。\n\
  > \n> *Spring 中的依赖注入：* 本节将考察 Spring 对 IoC 容器的实现。对于 Bean 定义和 DI 需求，`BeanFactory`\
  \ 是应用程序与之交互的主要接口。然而，除了前几个示例外，本章提供的其余所有示例代码都将重点使用 Spring 的 `ApplicationContext` 接口，该接口是\
  \ `BeanFactory` 的扩展，提供了比企业应用所需更强大的功能。我们将在后续章节中介绍 `BeanFactory` 和 `ApplicationContext`\
  \ 之间的区别。\n> \n> *配置 Spring 应用上下文：* 本章的最后部分将重点介绍如何使用基于 XML 的配置和 Java 注解方法来配置 `ApplicationContext`。本节首先讨论\
  \ DI 配置，然后继续考察 `BeanFactory`（Spring 的 `ApplicationContext` 的一部分）提供的其他服务，例如 Bean\
  \ 继承、生命周期管理和自动装配。\n\n### 控制反转与依赖注入\n\n其核心在于，IoC（以及因此的 DI）旨在提供一种更简单的机制来配置组件依赖关系（通常称为对象的*协作者*）并在其整个生命周期中管理这些依赖关系。需要特定依赖关系的组件通常被称为*依赖对象*，或者在\
  \ IoC 的语境中称为目标对象。这是一种相当宏大的说法，意思是 IoC 提供服务，通过这些服务，组件可以访问其依赖关系，并在依赖关系的整个生命周期中与之交互。通常，IoC\
  \ 可以分解为两种子类型：依赖注入和依赖查找。这些子类型进一步分解为 IoC 服务的具体实现。从这个定义中，你可以清楚地看到，当我们谈论 DI 时，我们总是在谈论\
  \ IoC，但当我们谈论 IoC 时，我们并不总是在谈论 DI（例如，依赖查找也是 IoC 的一种形式）。\n\n### 控制反转的类型\n\n你可能想知道为什么有两种不同类型的\
  \ IoC，以及为什么这些类型又进一步拆分为不同的实现。这个问题似乎没有明确的答案；当然，不同的类型提供了一定程度的灵活性，但对我们来说，IoC 更像是新旧思想的混合体；这两种不同类型的\
  \ IoC 代表了这一点。\n\n依赖查找是一种更传统的方法，乍一看，它对 Java 程序员来说更熟悉。依赖注入是一种较新的、尚未完全确立的方法，虽然起初看起来违反直觉，但实际上比依赖查找更灵活、更易用。\n\
  \n在使用依赖查找风格的 IoC 时，组件必须获取对依赖关系的引用，而在依赖注入中，依赖关系由 IoC 容器注入到组件中。依赖查找有两种类型：依赖拉取和上下文化依赖查找（CDL）。依赖注入也有两种常见形式：构造器依赖注入和\
  \ Setter 依赖注入。\n\n![images](img/square.jpg) **注意**  在本节的讨论中，我们不关心虚构的 IoC 容器是如何了解所有不同依赖关系的，只关心在某个时刻，它会执行针对每种机制所描述的操作。\n\
  \n#### 依赖拉取\n\n对于 Java 开发者来说，依赖拉取是最熟悉的 IoC 类型。在依赖拉取中，依赖关系根据需要从注册表中拉取。任何编写过访问 EJB（2.1\
  \ 或更早版本）代码的人都已经使用过依赖拉取（即通过 JNDI API 查找 EJB 组件）。图 4-1 展示了通过查找机制进行依赖拉取的场景。\n\n![images](img/9781430241072_Fig04-01.jpg)\n\
  \n***图 4-1.** 通过 JNDI 查找进行依赖拉取*\n\nSpring 也提供依赖拉取作为检索框架所管理组件的机制；你在第 2 章中已经看到了它的实际应用。清单\
  \ 4-1 展示了基于 Spring 的应用程序中典型的依赖拉取查找。\n\n***清单 4-1.** Spring 中的依赖拉取*\n\n`public static\
  \ void main(String[] args) throws Exception {`\n\n`    // 获取 bean 工厂`\n`    BeanFactory\
  \ factory = getBeanFactory();`\n\n`    MessageRenderer mr = (MessageRenderer) factory.getBean(\"\
  renderer\");`\n`    mr.render();`\n`}`\n\n这种 IoC 不仅在大量使用 JNDI 查找从注册表获取依赖关系的基于 JEE\
  \ 的应用程序（使用 EJB 2.1 或更早版本）中很普遍，而且在许多环境中使用 Spring 时也至关重要。\n\n\n\n#### 上下文相关依赖查找\n\n\
  上下文相关依赖查找（CDL）在某些方面与依赖拉取类似，但在 CDL 中，查找是针对管理资源的容器执行的，而不是针对某个中央注册中心，并且通常是在某个设定点执行的。图\
  \ 4-2 展示了 CDL 机制。\n\n![images](img/9781430241072_Fig04-02.jpg)\n\n***图 4-2.** 上下文相关依赖查找*\n\
  \nCDL 的工作原理是让组件实现一个类似于代码清单 4-2 中所示的接口。\n\n***代码清单 4-2.** 用于 CDL 的组件接口*\n\n`package\
  \ com.apress.prospring3.ch4;`\n\n`public interface ManagedComponent {`\n`    public\
  \ void performLookup(Container container);`\n`}`\n\n通过实现此接口，组件向容器发出信号，表明它想要获取一个依赖项。`Container`\
  \ 通常由底层应用服务器（例如 Tomcat、JBoss）或框架（例如 Spring）提供。代码清单 4-3 展示了一个提供依赖查找服务的简单 `Container`\
  \ 接口。\n\n***代码清单 4-3.** 一个简单的容器接口*\n\n`package com.apress.prospring3.ch4;`\n\n`public\
  \ interface Container {`\n\n`    public Object getDependency(String key);`\n`}`\n\
  \n当容器准备好将依赖项传递给组件时，它会依次在每个组件上调用 `performLookup()`。然后，组件可以使用 `Container` 接口查找其依赖项，如代码清单\
  \ 4-4 所示。\n\n***代码清单 4-4.** 在 CDL 中获取依赖项*\n\n`package com.apress.prospring3.ch4;`\n\
  \n`public class ContextualizedDependencyLookup implements ManagedComponent {`\n\n\
  `    private Dependency dependency;`\n\n`    public void performLookup(Container\
  \ container) {`\n`        this.dependency = (Dependency) container.getDependency(\"\
  myDependency\");`\n`    }`\n`}`\n\n请注意，在代码清单 4-4 中，`Dependency` 是一个空类。\n\n#### 构造器依赖注入\n\
  \n构造器依赖注入是一种依赖注入，其中组件的依赖项通过其构造器提供给它。组件声明一个构造器或一组构造器，将其依赖项作为参数，IoC 容器在实例化组件时将依赖项传递给组件，如代码清单\
  \ 4-5 所示。\n\n***代码清单 4-5.** 构造器依赖注入*\n\n`package com.apress.prospring3.ch4;`\n\n\
  `public class ConstructorInjection {`\n\n`   private Dependency dependency;`\n\n\
  `   public ConstructorInjection(Dependency dependency) {`\n`      this.dependency\
  \ = dependency;`\n`   }`\n`}`\n\n#### Setter 依赖注入\n\n在 Setter 依赖注入中，IoC 容器通过 JavaBean\
  \ 风格的 setter 方法将组件的依赖项注入到组件中。组件的 setter 方法暴露了 IoC 容器可以管理的一组依赖项。代码清单 4-6 展示了一个典型的基于\
  \ Setter 依赖注入的组件。\n\n***代码清单 4-6.** Setter 依赖注入*\n\n`package com.apress.prospring3.ch4;`\n\
  \n`public class SetterInjection {`\n\n`   private Dependency dependency;`\n\n`  \
  \ public void setDependency(Dependency dependency) {`\n`      this.dependency =\
  \ dependency;`\n`   }`\n`}`\n\n在容器内部，由 `setDependency()` 方法暴露的依赖需求通过 JavaBeans 风格的名称\
  \ *dependency* 来引用。在实践中，Setter 注入是使用最广泛的注入机制，也是实现起来最简单的 IoC 机制之一。\n\n#### 注入 vs.\
  \ 查找\n\n选择使用哪种 IoC 风格——注入还是查找——通常不是一个困难的决定。在许多情况下，你使用的 IoC 类型是由你所使用的容器强制决定的。例如，如果你使用的是\
  \ EJB 2.1 或更早版本，那么你必须使用查找风格的 IoC（通过 JNDI）从 JEE 容器中获取 EJB。在 Spring 中，除了初始的 bean 查找之外，你的组件及其依赖项始终使用注入风格的\
  \ IoC 进行装配。\n\n![images](img/square.jpg) **注意**  当你使用 Spring 时，你可以访问 EJB 资源而无需执行显式查找。Spring\
  \ 可以充当查找和注入风格 IoC 系统之间的适配器，从而允许你使用注入来管理所有资源。\n\n真正的问题是：如果有选择，你应该使用哪种方法，注入还是查找？答案绝对是注入。如果你查看代码清单\
  \ 4-4 和 4-5 中的代码，你可以清楚地看到，使用注入对组件的代码没有影响。另一方面，依赖拉取代码必须主动获取对注册中心的引用并与之交互以获取依赖项，而使用\
  \ CDL 则需要你的类实现特定的接口并手动查找所有依赖项。当你使用注入时，你的类最多只需要允许通过构造器或 setter 方法注入依赖项。\n\n使用注入，你可以自由地使用与提供依赖对象的\
  \ IoC 容器完全解耦的类，而使用查找，你的类总是依赖于容器定义的类和接口。查找的另一个缺点是，它使得在脱离容器的情况下测试你的类变得非常困难。使用注入，测试你的组件很简单，因为你可以简单地通过适当的构造器或\
  \ setter 自己提供依赖项。\n\n![images](img/square.jpg) **注意**  关于使用依赖注入和 Spring 进行测试的更完整讨论，请参考第\
  \ 19 章。\n\n基于查找的解决方案必然比基于注入的解决方案更复杂。虽然复杂性并不可怕，但我们质疑在像依赖管理这样对应用程序至关重要的过程中增加不必要的复杂性的合理性。\n\
  \n撇开所有这些原因不谈，选择注入而非查找的最大原因是它能让你的工作更轻松。当你使用注入时，你编写的代码要少得多，而且你编写的代码很简单，通常可以由一个好的 IDE\
  \ 自动生成。你会注意到，注入示例中的所有代码都是被动的，因为它不会主动尝试完成某项任务。你在注入代码中看到的最令人兴奋的事情是对象仅被存储在一个字段中；没有其他代码参与从任何注册中心或容器中拉取依赖项。因此，代码简单得多，也更不容易出错。被动代码比主动代码更容易维护，因为几乎不会出错。考虑以下摘自代码清单\
  \ 4-4 的代码：\n\n`public void performLookup(Container container) {`\n`   this.dependency\
  \ = (Dependency) container.getDependency(\"myDependency\");`\n`}`\n\n在这段代码中，很多地方都可能出错：依赖键可能改变，容器实例可能为\
  \ null，或者返回的依赖项可能是错误的类型。我们称这段代码有很多活动部件，因为很多东西都可能出错。使用 `Lookup` 可能会解耦应用程序的组件，但它增加了复杂性，因为需要额外的代码将这些组件重新耦合在一起以执行任何有用的任务。\n\
  \n\n\n#### Setter 注入 vs. 构造器注入\n\n既然我们已经确定了哪种 IoC 方法更可取，你仍然需要在 Setter 注入和构造器注入之间做出选择。当你绝对必须在组件使用之前拥有依赖类的一个实例时，构造器注入尤其有用。许多容器（包括\
  \ Spring）都提供了一种机制，以确保在使用 Setter 注入时定义了所有依赖项，但通过使用构造器注入，你可以以一种与容器无关的方式断言对依赖项的需求。\n\
  \nSetter 注入在多种情况下都很有用。如果组件将其依赖项暴露给容器，但乐意提供自己的默认值，那么 Setter 注入通常是实现此目的的最佳方式。Setter\
  \ 注入的另一个好处是它允许在接口上声明依赖项，尽管这并不像你最初想象的那么有用。考虑一个典型的业务接口，它有一个业务方法 `defineMeaningOfLife()`。如果除了这个方法之外，你还为注入定义了一个\
  \ setter，例如 `setEncylopedia()`，那么你就强制要求所有实现都必须使用或至少了解百科全书依赖项。然而，你不需要在业务接口中定义 `setEncylopedia()`。相反，你可以在实现业务接口的类中定义该方法。以这种方式编程时，所有最新的\
  \ IoC 容器（包括 Spring）都可以根据业务接口与组件协作，但仍然提供实现类的依赖项。一个例子可能会稍微澄清这个问题。考虑 清单 4-7 中的业务接口。\n\
  \n***清单 4-7.** `Oracle` 接口*\n\n`package com.apress.prospring3.ch4;`\n\n`public interface\
  \ Oracle {`\n\n`   public String defineMeaningOfLife();`\n`}`\n\n请注意，业务接口没有为依赖注入定义任何\
  \ setter。该接口可以像 清单 4-8 所示那样实现。\n\n***清单 4-8.** 实现 `Oracle` 接口*\n\n`package com.apress.prospring3.ch4;`\n\
  \n`public class BookwormOracle implements Oracle {`\n\n`    private Encyclopedia\
  \ encyclopedia;`\n\n`    public void setEncyclopedia(Encyclopedia encyclopedia)\
  \ {`\n`        this.encyclopedia = encyclopedia;`\n`    }`\n\n`    public String\
  \ defineMeaningOfLife() {`\n`        return \"百科全书是浪费钱——用互联网吧\";`\n`    }`\n`}`\n\
  \n如你所见，`BookwormOracle` 类不仅实现了 Oracle 接口，还定义了依赖注入的 setter。Spring 处理这种结构绰绰有余——绝对没有必要在业务接口上定义依赖项。使用接口定义依赖项的能力常被吹捧为\
  \ Setter 注入的一个好处，但实际上，你应该努力将仅用于注入的 setter 排除在你的业务接口和 DAO 接口之外。除非你绝对确定某个特定业务接口的所有实现都需要某个特定的依赖项，否则就让每个实现类定义自己的依赖项，并将业务接口保留给业务方法。\n\
  \n虽然你不应该总是将依赖项的 setter 放在业务接口中，但将配置参数的 setter 和 getter 放在业务接口中是一个好主意，并且使 Setter\
  \ 注入成为一个有价值的工具。我们认为配置参数是依赖项的一种特殊情况。当然，你的组件依赖于配置数据，但配置数据与你目前看到的依赖类型有显著不同。我们稍后将讨论这些差异，但现在，请考虑\
  \ 清单 4-9 中所示的业务接口。\n\n***清单 4-9.** `NewsletterSender` 接口*\n\n`package com.apress.prospring3.ch4;`\n\
  \n`public interface NewsletterSender {`\n\n`    public void setSmtpServer(String\
  \ smtpServer);`\n`    public String getSmtpServer();`\n\n`    public void setFromAddress(String\
  \ fromAddress);`\n`    public String getFromAddress();`\n\n`    public void send();`\n\
  `}`\n\n`NewsletterSender` 接口由通过电子邮件发送一组新闻通讯的类实现。`send()` 方法是唯一的业务方法，但请注意，我们在接口上定义了两个\
  \ JavaBean 属性。当我们刚刚说过不应该在业务接口中定义依赖项时，为什么我们要这样做呢？原因是这些值（SMTP 服务器地址和发送电子邮件的地址）在实际意义上并不是依赖项；相反，它们是影响\
  \ `NewsletterSender` 接口所有实现方式的配置细节。Spring 的依赖注入能力形成了应用程序组件外部配置的理想解决方案，不仅用于提供依赖，而且作为外部化组件配置设置的一种机制。那么这里的问题是：配置参数和任何其他类型的依赖项之间有什么区别？在大多数情况下，你可以清楚地看到某个依赖项是否应归类为配置参数，但如果你不确定，请查找以下三个指向配置参数的特征：\n\
  \n*   配置参数是被动的。在 清单 4-8 所示的 `NewsletterSender` 示例中，SMTP 服务器参数是被动依赖项的一个例子。被动依赖项不直接用于执行操作；相反，它们在内部被使用，或被另一个依赖项用来执行其操作。在\
  \ 第 2 章 的 `MessageRenderer` 示例中，`MessageProvider` 依赖项不是被动的——它执行了 `MessageRenderer`\
  \ 完成任务所必需的功能。\n*   配置参数通常是信息，而不是其他组件。我们的意思是，配置参数通常是组件完成其工作所需的一些信息。显然，SMTP 服务器是 `NewsletterSender`\
  \ 所需的一条信息，但 `MessageProvider` 实际上是 `MessageRenderer` 正常运行所需的另一个组件。\n*   配置参数通常是简单值或简单值的集合。这实际上是前两点的副产品，但配置参数通常是简单值。在\
  \ Java 中，这意味着它们是原始类型（或相应的包装类）、String 或这些值的集合。简单值通常是被动的。这意味着你不能对 String 做太多事情，除了操作它所代表的数据；而且你几乎总是将这些值用于信息目的——例如，表示网络套接字应监听的端口号的\
  \ int 值，或表示电子邮件程序应通过其发送消息的 SMTP 服务器的 String。\n\n在考虑是否在业务接口中定义配置选项时，还要考虑该配置参数是否适用于业务接口的所有实现，还是仅适用于一个实现。例如，对于\
  \ `NewsletterSender` 的实现，很明显所有实现都需要知道在发送电子邮件时使用哪个 SMTP 服务器。然而，我们可能会选择将标记是否发送安全电子邮件的配置选项排除在业务接口之外，因为并非所有电子邮件\
  \ API 都能做到这一点，并且可以合理地假设许多实现根本不会考虑安全性。\n\n![images](img/square.jpg) **注意** 回想一下，在第\
  \ 2 章中，我们选择在业务目的中定义依赖项。这是为了说明目的，绝不应被视为最佳实践。\n\n\n\nSetter 注入还允许你在不创建父组件新实例的情况下，动态地将依赖项替换为不同的实现。Spring\
  \ 的 JMX 支持使这成为可能。Setter 注入最大的优点或许是它是侵入性最小的注入机制。\n\n如果你正在为一个原本只有默认构造函数的类定义用于注入的构造函数，那么你正在影响所有在非\
  \ IoC 环境中使用该类的代码。为 IoC 目的而在类上定义的额外 Setter 方法，并不会影响其他类与其交互的能力。\n\n总的来说，基于 Setter\
  \ 的注入是最佳选择，因为它对你代码在非 IoC 环境中的可用性影响最小。当你希望确保依赖项被传递给组件时，构造函数注入是一个不错的选择，但请记住，许多容器都提供了自己的机制来通过\
  \ Setter 注入实现这一点。示例应用程序中的大部分代码都使用了 Setter 注入，尽管也有一些构造函数注入的例子。\n\n### Spring 中的控制反转\n\
  \n正如我们之前提到的，控制反转是 Spring 所做工作的重要组成部分，而 Spring 实现的核心基于依赖注入，尽管也提供了依赖查找功能。当 Spring\
  \ 自动向依赖对象提供协作者时，它使用的是依赖注入。在基于 Spring 的应用程序中，始终更倾向于使用依赖注入将协作者传递给依赖对象，而不是让依赖对象通过查找来获取协作者。图\
  \ 4-3 展示了 Spring 的依赖注入机制（关于依赖查找，请参考图 4-2）。\n\n![images](img/9781430241072_Fig04-03.jpg)\n\
  \n***图 4-3.** Spring 的依赖注入机制*\n\n尽管依赖注入是连接协作者和依赖对象的首选机制，但你仍然需要依赖查找来访问依赖对象。在许多环境中，Spring\
  \ 无法使用依赖注入自动连接所有应用程序组件，你必须使用依赖查找来访问初始组件集。例如，在独立的 Java 应用程序中，你需要在 `main()` 方法中引导\
  \ Spring 容器，并通过 `ApplicationContext` 接口以编程方式获取依赖项。但是，当你使用 Spring 的 MVC 支持构建 Web\
  \ 应用程序时，Spring 可以通过自动粘合整个应用程序来避免这种情况。只要有可能使用 Spring 的依赖注入，就应该这样做；否则，可以退而求其次使用依赖查找功能。在本章的过程中，你将看到这两种方式的实际应用示例，我们会在它们首次出现时指出。\n\
  \nSpring IoC 容器的一个有趣特性是，它能够充当自身依赖注入容器与外部依赖查找容器之间的适配器。我们将在本章后面讨论这个特性。\n\nSpring 同时支持构造函数注入和\
  \ Setter 注入，并通过大量有用的附加功能增强了标准的 IoC 特性集，使你的工作更轻松。\n\n本章的其余部分将介绍 Spring DI 容器的基础知识，并附有大量示例。\n\
  \n### 使用 Spring 进行依赖注入\n\nSpring 对依赖注入的支持非常全面，并且正如你将在第 5 章中看到的，它超越了迄今为止我们讨论的标准 IoC\
  \ 特性集。本章的其余部分将介绍 Spring 依赖注入容器的基础知识，探讨 Setter 注入、构造函数注入和方法注入，并详细说明如何在 Spring 中配置依赖注入。\n\
  \n#### Bean 和 BeanFactory\n\nSpring 依赖注入容器的核心是 `BeanFactory` 接口。`BeanFactory` 负责管理组件，包括它们的依赖项以及它们的生命周期。在\
  \ Spring 中，术语 *bean* 用于指代由容器管理的任何组件。通常，你的 bean 在某种程度上遵循 JavaBeans 规范，但这并非必需，特别是如果你计划使用构造函数注入来连接你的\
  \ bean。\n\n如果你的应用程序只需要 DI 支持，你可以通过 `BeanFactory` 接口与 Spring DI 容器交互。在这种情况下，你的应用程序必须创建一个实现了\
  \ `BeanFactory` 接口的类的实例，并使用 bean 和依赖信息对其进行配置。完成后，你的应用程序可以通过 `BeanFactory` 访问 bean\
  \ 并继续其处理。在某些情况下，所有这些设置都是自动处理的（例如，在 Web 应用程序中，Spring 的 `ApplicationContext` 将在应用程序启动期间由\
  \ Web 容器通过 `web.xml` 描述符文件中声明的 Spring 提供的 `ContextLoaderListener` 类进行引导）。但在许多情况下，你需要自己编写设置代码。本章中的所有示例都需要手动设置\
  \ `BeanFactory` 实现。\n\n尽管 `BeanFactory` 可以通过编程方式进行配置，但更常见的是使用某种配置文件在外部进行配置。在内部，bean\
  \ 配置由实现了 `BeanDefinition` 接口的类的实例表示。bean 配置不仅存储关于 bean 本身的信息，还存储关于它所依赖的 bean 的信息。对于任何同时实现了\
  \ `BeanDefinitionRegistry` 接口的 `BeanFactory` 实现类，你可以使用 `PropertiesBeanDefinitionReader`\
  \ 或 `XmlBeanDefinitionReader` 从配置文件中读取 `BeanDefinition` 数据。Spring 附带的两个主要的 `BeanFactory`\
  \ 实现都实现了 `BeanDefinitionRegistry`。`PropertiesBeanDefinitionReader` 从属性文件中读取 bean\
  \ 定义，而 `XmlBeanDefinitionReader` 从 XML 文件中读取。\n\n因此，你可以在 `BeanFactory` 中标识你的 bean，每个\
  \ bean 可以被分配一个 ID 或名称，或两者兼有。bean 也可以在没有 ID 和名称的情况下实例化（称为*匿名* bean），或者作为特定 bean 的内部\
  \ bean。每个 bean 至少有一个名称，但可以有任意多个（额外的名称用逗号分隔）。第一个名称之后的任何名称都被视为同一 bean 的别名。你使用 bean\
  \ ID 或名称从 `BeanFactory` 中检索 bean，并建立依赖关系——也就是说，bean X 依赖于 bean Y。\n\n\n\n#### BeanFactory\
  \ 实现\n\n对 `BeanFactory` 的描述可能会让人觉得使用它过于复杂，但实际上并非如此。让我们看一个简单的例子。\n\n假设你有一个实现，它模拟了一个能告诉你生命意义的神谕。清单\
  \ 4-10 和 4-11 分别定义了接口和一个简单的实现。\n\n***清单 4-10.** `Oracle` 接口*\n\n`package com.apress.prospring3.ch4;`\n\
  \n`public interface Oracle {`\n\n`    public String defineMeaningOfLife();`\n`}`\n\
  \n***清单 4-11.** 一个简单的 `Oracle` 接口实现*\n\n`package com.apress.prospring3.ch4;`\n\n\
  `public class BookwormOracle implements Oracle {`\n\n`    public String defineMeaningOfLife()\
  \ {`\n`        return \"Encyclopedias are a waste of money - use the Internet\"\
  ;`\n`    }`\n`}`\n\n现在，让我们看看在一个独立的 Java 程序中，如何初始化 Spring 的 `BeanFactory` 并获取 oracle\
  \ bean 进行处理（参见清单 4-12）。\n\n***清单 4-12.** 使用 Bean Factory*\n\n`package com.apress.prospring3.ch4;`\n\
  `import org.springframework.beans.factory.support.DefaultListableBeanFactory;`\n\
  `import org.springframework.beans.factory.xml.XmlBeanDefinitionReader;`\n`import\
  \ org.springframework.core.io.FileSystemResource;`\n\n`public class XmlConfigWithBeanFactory\
  \ {`\n\n`    public static void main(String[] args) {`\n\n`        DefaultListableBeanFactory\
  \ factory = new DefaultListableBeanFactory();`\n\n`        XmlBeanDefinitionReader\
  \ rdr = new XmlBeanDefinitionReader(factory);`\n`        rdr.loadBeanDefinitions(new`\n\
  `        FileSystemResource(\"src/main/resources/xmlBeanFactory.xml\"));`\n\n`        Oracle\
  \ oracle = (Oracle)factory.getBean(\"oracle\");`\n`            System.out.println(oracle.defineMeaningOfLife());`\n\
  `    }`\n`}`\n\n在清单 4-12 中，你可以看到我们正在使用 `DefaultListableBeanFactory`——Spring 提供的两个主要\
  \ `BeanFactory` 实现之一——并且我们正在使用 `XmlBeanDefinitionReader` 从 XML 文件中读取 `BeanDefinition`\
  \ 信息。一旦创建并配置了 `BeanFactory` 实现，我们就使用其名称 `oracle` 来检索 Oracle bean，该名称在 XML 配置文件中配置。清单\
  \ 4-13 是用于引导 Spring 的 `BeanFactory` 的 XML 内容（`xmlBeanFactory.xml`）。\n\n***清单 4-13.**\
  \ 简单的 Spring XML 配置*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\
  \n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\"\
  >`\n\n`    <!- oracle bean used for a few examples ->`\n`    <bean id=\"oracle\"\
  \ name=\"wiseworm\" class=\"com.apress.prospring3.ch4.BookwormOracle\"/>`\n\n`</beans>`\n\
  \n前面的文件声明了一个 Spring bean，为其指定了 ID `\"oracle\"` 和名称 `\"wiseworm\"`，并告诉 Spring 其底层实现类是\
  \ `com.apress.prospring3.ch4.BookwormOracle`。暂时不必过于担心配置细节；我们将在后续章节中详细讨论。\n\n定义好配置后，运行清单\
  \ 4-12 中的程序，你将在 STS 的控制台输出中看到 `defineMeaningOfLife()` 方法返回的短语。\n\n除了 `XmlBeanDefinitionReader`，Spring\
  \ 还提供了 `PropertiesBeanDefinitionReader`，它允许你使用属性文件而非 XML 来管理 bean 配置。虽然属性文件对于小型、简单的应用来说很理想，但在处理大量\
  \ bean 时，它们很快就会变得笨重。因此，对于除最琐碎应用之外的所有情况，最好使用 XML 配置格式。\n\n当然，你也可以自由定义自己的 `BeanFactory`\
  \ 实现，但请注意，这样做相当复杂；你需要实现比 `BeanFactory` 多得多的接口，才能获得与 Spring 提供的 `BeanFactory` 实现相同的功能级别。如果你只想定义一种新的配置机制，那么可以通过开发一个扩展\
  \ `DefaultListableBeanFactory` 类（该类已实现了 `BeanFactory` 接口）的类来创建你自己的定义读取器。\n\n####\
  \ ApplicationContext\n\n在 Spring 中，`ApplicationContext` 接口是 `BeanFactory` 的扩展。除了\
  \ DI 服务之外，`ApplicationContext` 还提供其他服务，例如事务和 AOP 服务、用于国际化（i18n）的消息源以及应用程序事件处理等。\n\
  \n在开发基于 Spring 的应用程序时，建议你通过 `ApplicationContext` 接口与 Spring 交互。Spring 支持通过手动编码（手动实例化并加载适当的配置）或在\
  \ Web 容器环境中通过 `ContextLoaderListener` 来引导 `ApplicationContext`。从现在开始，本书中的所有示例代码都将使用\
  \ `ApplicationContext`。\n\n### 配置 ApplicationContext\n\n在讨论了 IoC 和 DI 的基本概念，并经历了一个使用\
  \ Spring 的 `BeanFactory` 接口的简单示例之后，让我们深入了解如何配置 Spring 应用程序的细节。\n\n在接下来的章节中，我们将探讨配置\
  \ Spring 应用程序的各个方面。具体来说，我们将重点关注 `ApplicationContext` 接口，它提供了比传统 `BeanFactory` 接口更多的配置选项。\n\
  \n#### Spring 配置选项（XML 和 Java 注解）\n\n在深入探讨配置 Spring 的 `ApplicationContext` 的细节之前，让我们先看看在\
  \ Spring 中定义应用程序配置的可用选项。\n\n最初，Spring 支持通过属性文件或 XML 文件来定义 bean，并且在相当长的一段时间内，大多数\
  \ Spring 应用程序开发者都使用 XML 文件。自 JDK 5 发布以及 Spring 支持 Java 注解以来，Spring（从 Spring 2.5\
  \ 开始）也支持在配置 `ApplicationContext` 时使用 Java 注解。\n\n那么，XML 和注解哪个更好？关于这个话题有很多争论，你可以在互联网上找到大量相关讨论（例如，尝试\
  \ Spring 社区论坛 [`http://forum.springsource.org`](http://forum.springsource.org)）。没有确定的答案，每种方法都有其优缺点。使用\
  \ XML 文件可以将所有配置从 Java 代码中外部化，而注解则允许开发者从代码内部定义和查看 DI 设置。Spring 还支持在单个 `ApplicationContext`\
  \ 中混合使用这两种方法（XML 文件配置将覆盖注解配置）。如今一种常见的方法是在 XML 文件中定义应用程序基础设施（例如，数据源、事务管理器、JMS 连接工厂、JMX\
  \ 等），而在注解中定义 DI 配置（可注入的 bean 和 bean 的依赖关系）。然而，无论你选择哪种选项，都要坚持使用，并在整个开发团队中清晰地传达这一信息。就使用的风格达成一致并在整个应用程序中保持一致，将使后续开发和维护活动变得更加容易。\n\
  \n为了帮助你理解 XML 和注解配置，我们将在适当的时候并排提供 XML 和注解的示例代码。\n\n\n\n##### 基本配置概述\n\n对于 XML 配置，你需要声明应用程序所需的\
  \ Spring 提供的必要命名空间基础。清单 4-13 展示了最基本的示例，它仅声明了用于定义 Spring Bean 的 `beans` 命名空间。\n\n\
  除了 `beans`，Spring 还提供了大量其他用于不同目的的命名空间。清单 4-14 是本章示例将使用的 Spring 配置的命名空间声明。在 Spring\
  \ 配置部分，我们将在所有示例中准备两个配置文件。一个是用于 XML 风格配置的 `app-context-xml.xml`，另一个是用于注解风格配置的 `app-context-annotation.xml`。\n\
  \n***清单 4-14.** Spring XML 配置*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n\
  `<beans`\n\n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n\
  `        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n`        http://www.springframework.org/schema/context`\n\
  `        http://www.springframework.org/schema/context/spring-context-3.1.xsd`\n\
  `        http://www.springframework.org/schema/util`\n`        http://www.springframework.org/schema/util/spring-util-3.1.xsd\"\
  >`\n\n`</beans>`\n\n从之前的命名空间声明中，我们将 `beans` 设为默认命名空间。同时还声明了以下命名空间：\n\n> `context`：`context`\
  \ 命名空间为配置 Spring 的 `ApplicationContext` 提供支持。\n> \n> `p`：`p` 命名空间为 Setter 注入提供了更简单的\
  \ DI 配置。\n> \n> `c`：Spring 3.1 新增，`c` 命名空间为构造器注入提供了更简单的 DI 配置。\n> \n> `util`：`util`\
  \ 命名空间为 DI 配置提供了一些有用的工具。\n\nSpring 还提供了许多用于各种目的的命名空间，例如用于 AOP 支持的 `aop`、用于事务支持的\
  \ `tx` 等。这些命名空间将在相应的章节中介绍。\n\n要在应用程序中使用 Spring 的注解支持，你需要在 XML 配置（`app-context-annotation.xml`）中声明清单\
  \ 4-15 中显示的标签。\n\n***清单 4-15.** 支持注解的 Spring XML 配置*\n\n`// 命名空间声明已省略`\n\n`<context:annotation-config/>`\n\
  \n`<context:component-scan base-package=\"com.apress.prospring3.ch4.annotation\"\
  \ />`\n\n`<context:annotation-config>` 标签告诉 Spring 扫描代码库以查找依赖需求，而 `<context:component-scan>`\
  \ 标签告诉 Spring 扫描指定包（及其所有子包）下的代码以查找可注入的 Bean。在 `<context:component-scan>` 标签中，可以使用逗号、分号或空格作为分隔符来定义多个包。此外，该标签支持包含和排除组件扫描，以实现更精细的控制。例如，考虑清单\
  \ 4-16 中的配置。\n\n***清单 4-16.** Spring XML 配置组件扫描*\n\n`<context:component-scan base-package=\"\
  com.apress.prospring3.ch4.annotation\" >`\n`    <context:exclude-filter type=\"\
  assignable\" expression=\"com.example.NotAService\"/>`\n`</ context:component-scan>`\n\
  \n前面的标签告诉 Spring 扫描指定的包，但排除那些可赋值给表达式中指定类型（可以是类或接口）的类。除了排除过滤器，你还可以使用包含过滤器。对于类型，你可以使用注解、正则表达式、可赋值类型、AspectJ\
  \ 或自定义（使用实现了 `org.springframework.core.type.filter.TypeFilter` 的自定义过滤器类）作为过滤条件。表达式的格式取决于你指定的类型。\n\
  \n#### 声明 Spring 组件\n\n在开发了某种服务类并希望在基于 Spring 的应用程序中使用它之后，你需要告诉 Spring 这些 Bean 有资格注入到其他\
  \ Bean 中，并由 Spring 为你管理它们。考虑第 2 章中的示例，其中 `MessageRender` 输出消息，并依赖 `MessageProvider`\
  \ 提供要渲染的消息。清单 4-17 回顾了这两个服务的接口和实现。\n\n***清单 4-17.** `MessageRenderer` 和 `MessageProvider`*\n\
  \n`package com.apress.prospring3.ch4;`\n\n`public interface MessageRenderer {`\n\
  \n`    public void render();`\n\n`    public void setMessageProvider(MessageProvider\
  \ provider);`\n\n`    public MessageProvider getMessageProvider();`\n\n`}`\n\n`package\
  \ com.apress.prospring3.ch4.xml;`\n\n`import com.apress.prospring3.ch4.MessageProvider;`\n\
  `import com.apress.prospring3.ch4.MessageRenderer;`\n\n`public class StandardOutMessageRenderer\
  \ implements MessageRenderer {`\n\n`    private MessageProvider messageProvider\
  \ = null;`\n\n`    public void render() {`\n`        if (messageProvider == null)\
  \ {`\n`            throw new RuntimeException(`\n`            \"You must set the\
  \ property messageProvider of class:\"`\n`            + StandardOutMessageRenderer.class.getName());`\n\
  `        }`\n\n`        System.out.println(messageProvider.getMessage());`\n`    }`\n\
  \n`    public void setMessageProvider(MessageProvider provider) {`\n`        this.messageProvider\
  \ = provider;`\n`    }`\n\n`    public MessageProvider getMessageProvider() {`\n\
  `        return this.messageProvider;`\n`    }`\n\n`}`\n\n`package com.apress.prospring3.ch4;`\n\
  \n`public interface MessageProvider {`\n\n`    public String getMessage();`\n\n\
  `}`\n\n`package com.apress.prospring3.ch4.xml;`\n\n`import com.apress.prospring3.ch4.MessageProvider;`\n\
  \n`public class HelloWorldMessageProvider implements MessageProvider {`\n\n`    public\
  \ String getMessage() {`\n`        return \"Hello World!\";`\n`    }`\n\n`}`\n\n\
  要在 XML 文件中声明 Bean，在基本配置（如前面清单 4-14 所述）之上，将清单 4-18 中的 `<bean>` 标签添加到文件 `app-context-xml.xml`\
  \ 中。\n\n***清单 4-18.** 声明 Spring Bean (XML)*\n\n`<bean id=\"messageRenderer\" class=\"\
  com.apress.prospring3.ch4.xml.StandardOutMessageRenderer\"/>`\n\n`<bean id=\"messageProvider\"\
  \ class=\"com.apress.prospring3.ch4.xml.HelloWorldMessageProvider\"/>`\n\n前面的标签声明了两个\
  \ Bean，一个 ID 为 `\"messageProvider\"`，使用 `HelloWorldMessageProvider` 实现；另一个 ID 为\
  \ `\"messageRenderer\"`，使用 `StandardOutMessageRenderer` 实现。\n\n要通过注解定义 Spring Bean，你不再需要修改\
  \ XML 配置文件（`app-context-annotation.xml`）；只需在包 `com.apress.prospring3.ch4.annotation`\
  \ 下的服务实现类中添加相应的注解即可（参见清单 4-19）。\n\n***清单 4-19.** 声明 Spring Bean (注解)*\n\n`package\
  \ com.apress.prospring3.ch4.annotation;`\n\n`import org.springframework.stereotype.Service;`\n\
  \n`// 其余代码已省略`\n`@Service(\"messageRenderer\")`\n`public class StandardOutMessageRenderer\
  \ implements MessageRenderer {`\n\n`package com.apress.prospring3.ch4.annotation;`\n\
  \n`import org.springframework.stereotype.Service;`\n\n`// 其余代码已省略`\n`@Service(\"\
  messageProvider\")`\n`public class HelloWorldMessageProvider implements MessageProvider\
  \ {`\n\n从之前的代码示例中，你使用了 Spring 的 `@Service` 注解来指定该 Bean 提供其他 Bean 可能需要的服务，并将 Bean\
  \ 名称作为参数传入。当使用清单 4-15 中的 XML 配置引导 Spring 的 `ApplicationContext` 时，Spring 将查找这些组件并使用指定的名称实例化\
  \ Bean。\n\n\n\n使用任何一种方法都不会影响你从 `ApplicationContext` 获取 bean 的方式。清单 4-20 展示了获取消息提供者的示例代码。\n\
  \n***清单 4-20.** 声明 Spring Bean（测试）*\n\n`package com.apress.prospring3.ch4;`\n\n\
  `import org.springframework.context.support.GenericXmlApplicationContext;`\n\n`public\
  \ class DeclareSpringComponents {`\n\n`    public static void main(String[] args)\
  \ {`\n\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:app-context-xml.xml\");`\n`        ctx.refresh();`\n\
  \n`        MessageProvider messageProvider = ctx.getBean(\"messageProvider\",`\n\
  `            MessageProvider.class);`\n\n`        System.out.println(messageProvider.getMessage());`\n\
  `    }`\n\n`}`\n\n从清单 4-20 可以看出，这里实例化的是 `GenericXmlApplicationContext` 的实例，而不是 `DefaultListableBeanFactory`。`GenericXmlApplicationContext`\
  \ 类实现了 `ApplicationContext` 接口，并且能够根据 XML 文件中定义的配置来引导 Spring 的 `ApplicationContext`。\n\
  \n你可以将本章提供的源代码中的 `app-context-xml.xml` 文件替换为 `app-context-annotation.xml`，你会发现两种方式产生的结果相同；即，都会打印出\
  \ “Hello World!”。\n\n清单 4-21（`app-context-xml.xml`）和清单 4-22（`app-context-annotation.xml`）回顾了我们目前讨论过的\
  \ XML 和注解风格配置的配置文件内容。\n\n***清单 4-21.** XML 配置（`app-context-xml.xml`）*\n\n`<?xml\
  \ version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\n`       xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans`\n`          http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n\
  `          http://www.springframework.org/schema/context`\n`          http://www.springframework.org/schema/context/spring-context-3.1.xsd`\n\
  `          http://www.springframework.org/schema/util`\n`          http://www.springframework.org/schema/util/spring-util-3.1.xsd\"\
  >`\n\n`    <bean id=\"messageProvider\"`\n`          class=\"com.apress.prospring3.ch4.xml.HelloWorldMessageProvider\"\
  />`\n\n`</beans>`\n\n***清单 4-22.** 注解配置（`app-context-annotation.xml`）*\n\n`<?xml\
  \ version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\n`       xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans`\n`          http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n\
  `          http://www.springframework.org/schema/context`\n`          http://www.springframework.org/schema/context/spring-context-3.1.xsd`\n\
  `          http://www.springframework.org/schema/util`\n`          http://www.springframework.org/schema/util/spring-util-3.1.xsd\"\
  >`\n\n`    <context:annotation-config/>`\n\n`    <context:component-scan`\n`          base-package=\"\
  com.apress.prospring3.ch4.annotation\"/>`\n\n`</beans>`\n\n#### 使用 Setter 注入\n\n\
  要使用 XML 配置实现 Setter 注入，你需要在 `<bean>` 标签内为每个要注入依赖的 `<property>` 指定 `<property>` 标签。例如，要将消息提供者\
  \ bean 赋值给 `messageRenderer` bean 的 `messageProvider` 属性，你只需修改 `messageRenderer`\
  \ bean 的 `<bean>` 标签，如清单 4-23 所示。\n\n***清单 4-23.** Setter 注入（XML）*\n\n`<bean id=\"\
  messageRenderer\" class=\"com.apress.prospring3.ch4.xml.StandardOutMessageRenderer\"\
  >`\n`    <property name=\"messageProvider\">`\n`        <ref bean=\"messageProvider\"\
  />`\n`    </property>`\n`</bean>`\n\n从这段代码可以看出，我们将 `messageProvider` bean 赋值给了 `messageProvider`\
  \ 属性。你可以使用 `<ref>` 标签将一个 bean 引用赋值给一个属性（稍后会详细讨论）。\n\n如果你使用的是 Spring 2.5 或更高版本，并且在\
  \ XML 配置文件中声明了 `p` 命名空间，你可以像下面这样声明注入：\n\n`<bean id=\"messageRenderer\" class=\"\
  com.apress.prospring3.ch4.xml.StandardOutMessageRenderer\"`\n`    p:messageProvider-ref=\"\
  messageProvider\"/>`\n\n`p` 命名空间提供了一种定义 Setter 注入的简化方式。\n\n对于注解来说，这甚至更简单。你只需要在 setter\
  \ 方法上添加一个 `@Autowired` 注解，如清单 4-24 所示。\n\n***清单 4-24.** Setter 注入（注解）*\n\n`package\
  \ com.apress.prospring3.ch4.annotation;`\n\n`import org.springframework.beans.factory.annotation.Autowired;`\n\
  \n`// 其余代码省略`\n`@Service(\"messageRenderer\")`\n`public class StandardOutMessageRenderer\
  \ implements MessageRenderer {`\n`    …`\n`    @Autowired`\n`    public void setMessageProvider(MessageProvider\
  \ provider) {`\n`        this.messageProvider = provider;`\n`    }`\n`    …`\n`}`\n\
  \n由于我们在 XML 配置文件中声明了 `<context:annotation-config>` 标签，在 Spring 的 `ApplicationContext`\
  \ 初始化期间，Spring 会发现这些 `@Autowired` 注解，并根据需要注入依赖（通过 `<context:component-scan>` 标签发现）。\n\
  \n![images](img/square.jpg) **注意**  除了 `@Autowired`，你也可以使用 `@Resource(name=\"messageProvider\"\
  )` 来达到相同的结果。`@Resource` 是 JSR-250 标准中的注解之一，该标准定义了一组通用的 Java 注解，可用于 JSE 和 JEE 平台。与\
  \ `@Autowired` 不同，`@Resource` 注解支持 `name` 参数，以满足更细粒度的 DI 需求。\n\n现在，让我们使用清单 4-25\
  \ 中的代码来验证结果。\n\n***清单 4-25.** 使用 Setter 注入（测试）*\n\n`package com.apress.prospring3.ch4;`\n\
  \n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\n\
  `public class UsingSetterInjection {`\n\n`    public static void main(String[] args)\
  \ {`\n\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:app-context-xml.xml\");`\n`        ctx.refresh();`\n\
  \n`        MessageRenderer messageRenderer = ctx.getBean(\"messageRenderer\",`\n\
  `            MessageRenderer.class);`\n`        messageRenderer.render();`\n`    }`\n\
  \n`}`\n\n与上一节类似，你可以将本章提供的源代码中的 `app-context-xml.xml` 文件替换为 `app-context-annotation.xml`，你会发现两种方式产生的结果相同；即，都会打印出\
  \ “Hello World!”。\n\n\n\n#### 使用构造器注入\n\n在前面的示例中，`MessageProvider` 的实现类 `HelloWorldMessageProvider`\
  \ 在每次调用 `getMessage()` 方法时都返回相同的硬编码消息。在 Spring 配置文件中，你可以轻松创建一个可配置的 `MessageProvider`，允许从外部定义消息，如清单\
  \ 4-26 所示。\n\n***清单 4-26**. `ConfigurableMessageProvider` 类 (XML)*\n\n`package com.apress.prospring3.ch4.xml;`\n\
  \n`import com.apress.prospring3.ch4.MessageProvider;`\n\n`public class ConfigurableMessageProvider\
  \ implements MessageProvider {`\n\n`    private String message;`\n\n`    public\
  \ ConfigurableMessageProvider(String message) {`\n`        this.message = message;`\n\
  `    }`\n\n`    public String getMessage() {`\n`        return message;`\n`    }`\n\
  `}`\n\n如你所见，如果不为 message 提供一个值（除非你提供 `null`），就无法创建 `ConfigurableMessageProvider`\
  \ 的实例。这正是我们想要的，并且这个类非常适合与构造器注入一起使用。清单 4-27 展示了如何重新定义 `messageProvider` bean 来创建\
  \ `ConfigurableMessageProvider` 的实例，并使用构造器注入来注入消息。\n\n***清单 4-27**. 使用构造器注入 (XML)*\n\
  \n`<bean id=\"messageProvider\" class=\"com.apress.prospring3.ch4.xml.ConfigurableMessageProvider\"\
  >`\n`    <constructor-arg>`\n`        <value>This is a configurable message</value>`\n\
  `    </constructor-arg>`\n`</bean>`\n\n在这段代码中，我们没有使用 `<property>` 标签，而是使用了 `<constructor-arg>`\
  \ 标签。因为这次我们传入的不是另一个 bean，而是一个 `String` 字面量，所以我们使用 `<value>` 标签而不是 `<ref>` 来指定构造器参数的值。\n\
  \n当你拥有多个构造器参数，或者你的类有多个构造器时，你需要为每个 `<constructor-arg>` 标签添加一个 `index` 属性，以指定该参数在构造器签名中的索引（从\
  \ 0 开始）。在处理具有多个参数的构造器时，最好始终使用 `index` 属性，以避免参数混淆，并确保 Spring 选择正确的构造器。\n\n与 `p` 命名空间类似，在\
  \ Spring 3.1 中，你也可以使用 `c` 命名空间，如下所示：\n\n`    <bean id=\"messageProvider\"`\n`class=\"\
  com.apress.prospring3.ch4.xml.ConfigurableMessageProvider\"`\n`        c:message=\"\
  This is a configurable message\"/>`\n\n要使用注解进行构造器注入，我们还需要在目标 bean 的构造器方法上使用 `@Autowired`\
  \ 注解，如清单 4-28 所示，这是对清单 4-24 中使用的 Setter 注入的另一种选择。\n\n***清单 4-28**. 使用构造器注入 (注解)*\n\
  \n`package com.apress.prospring3.ch4.annotation;`\n\n`import org.springframework.beans.factory.annotation.Value;`\n\
  `…`\n`@Service(\"messageProvider\")`\n`public class ConfigurableMessageProvider\
  \ implements MessageProvider {`\n\n`    private String message;`\n\n`    @Autowired`\n\
  `    public ConfigurableMessageProvider(@Value(\"This is a configurable message\"\
  ) String`![images](img/U002.jpg)\n` message) {`\n`        this.message = message;`\n\
  `    }`\n`…`\n`}`\n\n从上面的清单可以看出，我们使用了另一个注解 `@Value` 来定义要注入到构造器中的值。这是 Spring 中将值注入\
  \ bean 的方式。除了简单的字符串，你还可以使用强大的 SpEL 进行动态值注入（本章稍后会详细介绍）。\n\n然而，将值硬编码在代码中并不是一个好主意，因为要更改它，你需要重新编译程序。即使你选择注解风格的\
  \ DI，一个好的实践是将这些值外部化以进行注入。为了外部化消息，让我们在注解配置文件中将消息定义为一个 Spring bean，如清单 4-29 所示。\n\n\
  ***清单 4-29**. 使用构造器注入 (注解)*\n\n`    <bean id=\"message\" class=\"java.lang.String\"\
  `\n`        c:_0=\"This is a configurable message\"/>`\n\n这里我们定义了一个 ID 为 `\"message\"\
  `、类型为 `java.lang.String` 的 bean。注意，我们还使用了 `c` 命名空间进行构造器注入来设置字符串值，并且 `_0` 表示构造器参数的索引。\n\
  \n声明了 bean 之后，我们可以从目标 bean 中移除 `@Value` 注解，如清单 4-30 所示。\n\n***清单 4-30**. 使用构造器注入\
  \ (注解)*\n\n`package com.apress.prospring3.ch4.annotation;`\n`…`\n`@Service(\"messageProvider\"\
  )`\n`public class ConfigurableMessageProvider implements MessageProvider {`\n\n\
  `    private String message;`\n\n`    @Autowired`\n`    public ConfigurableMessageProvider(String\
  \ message) {`\n`        this.message = message;`\n`    }`\n`…`\n`}`\n\n由于我们声明的 `message`\
  \ bean 及其 ID 与构造器中指定的参数名称相同，Spring 将检测到该注解并将值注入到构造器方法中。\n\n现在，针对 XML 配置（`app-context.xml.xml`）和注解配置（`app-context-annotation.xml`）运行测试（清单\
  \ 4-25 中所示的 `UsingSetterInjection` 类），两种情况下都会显示配置的消息。以下是示例输出：\n\n`This is a configurable\
  \ message`\n\n\n\n##### 避免构造器歧义\n\n在某些情况下，Spring 无法判断你希望它使用哪个构造器进行构造器注入。当你有两个参数数量相同，且参数类型表示方式完全相同的构造器时，通常会出现这种情况。请参考代码清单\
  \ 4-31 中的代码。\n\n***代码清单 4-31**. 构造器歧义*\n\n`package com.apress.prospring3.ch4.xml;`\n\
  \n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\n\
  `public class ConstructorConfusion {`\n\n`   private String someValue;`\n\n`   public\
  \ ConstructorConfusion(String someValue) {`\n`      System.out.println(\"ConstructorConfusion(String)\
  \ called\");`\n`      this.someValue = someValue;`\n`   }`\n\n`   public ConstructorConfusion(int\
  \ someValue) {`\n`      System.out.println(\"ConstructorConfusion(int) called\"\
  );`\n`      this.someValue = \"Number: \" + Integer.toString(someValue);`\n`   }`\n\
  \n`   public static void main(String[] args) {`\n\n`      GenericXmlApplicationContext\
  \ ctx = new GenericXmlApplicationContext();`\n`      ctx.load(\"classpath:app-context-xml.xml\"\
  );`\n`      ctx.refresh();`\n\n`      ConstructorConfusion cc = (ConstructorConfusion)\
  \ ctx.getBean(\"constructorConfusion\");`\n`      System.out.println(cc);`\n`  \
  \ }`\n\n`   public String toString() {`\n`      return someValue;`\n`   }`\n`}`\n\
  \n这里，你可以清楚地看到这段代码的作用——它只是从 `ApplicationContext` 中检索一个类型为 `ConstructorConfusion`\
  \ 的 bean，并将值写入控制台输出。现在来看代码清单 4-32 (`app-context-xml.xml`) 中的配置代码。\n\n***代码清单 4-32**.\
  \ 混淆的构造器*\n\n`    <bean id=\"constructorConfusion\"`\n`        class=\"com.apress.prospring3.ch4.xml.ConstructorConfusion\"\
  >`\n`       <constructor-arg>`\n`          <value>90</value>`\n`       </constructor-arg>`\n\
  `    </bean>`\n\n在这种情况下，会调用哪个构造器呢？运行示例会得到以下输出：\n\n`ConstructorConfusion(String)\
  \ called`\n`90`\n\n这表明调用了带有 `String` 参数的构造器。这不是我们想要的效果，因为我们希望像 `int` 构造器中那样，为通过构造器注入传入的任何整数值添加\
  \ `Number:` 前缀。为了解决这个问题，我们需要对配置进行小幅修改，如代码清单 4-33 (`app-context-xml.xml`) 所示。\n\n\
  ***代码清单 4-33**. 解决构造器歧义*\n\n`    <bean id=\"constructorConfusion\"`\n`        class=\"\
  com.apress.prospring3.ch4.xml.ConstructorConfusion\">`\n`       <constructor-arg\
  \ type=\"int\">`\n`          <value>90</value>`\n`       </constructor-arg>`\n`    </bean>`\n\
  \n现在请注意，`<constructor-arg>` 标签增加了一个额外的属性 `type`，它指定了 Spring 应查找的参数类型。使用修正后的配置再次运行示例，会得到正确的输出：\n\
  \n`ConstructorConfusion(int) called`\n`Number: 90`\n\n对于注解风格的构造器注入，可以通过将注解直接应用于目标构造器方法来避免歧义，正如我们在代码清单\
  \ 4-34 中所做的那样。\n\n***代码清单 4-34**. 构造器歧义（注解方式）*\n\n`package com.apress.prospring3.ch4.annotation;`\n\
  \n`// 代码省略`\n\n`@Service(\"constructorConfusion\")`\n`public class ConstructorConfusion\
  \ {`\n\n`   private String someValue;`\n\n`   public ConstructorConfusion(String\
  \ someValue) {`\n`        System.out.println(\"ConstructorConfusion(String) called\"\
  );`\n`        this.someValue = someValue;`\n`   }`\n\n`   @Autowired`\n`   public\
  \ ConstructorConfusion(@Value(\"90\") int someValue) {`\n`        System.out.println(\"\
  ConstructorConfusion(int) called\");`\n`        this.someValue = \"Number: \" +\
  \ Integer.toString(someValue);`\n`   }`\n\n`// 代码省略`\n\n`}`\n\n通过将 `@Autowired`\
  \ 注解应用于所需的构造器方法，Spring 将使用该方法来实例化 bean 并按照指定方式注入值。和之前一样，你应该将值外部化到配置中。\n\n![images](img/square.jpg)\
  \ **注意** 你只能将 `@Autowired` 注解应用于其中一个构造器方法。如果你将注解应用于多个构造器方法，Spring 在启动 `ApplicationContext`\
  \ 时会报错。\n\n#### 注入参数\n\n在前两个示例中，你看到了如何使用设值注入和构造器注入将其他组件和值注入到 bean 中。Spring 支持多种注入参数选项，允许你不仅注入其他组件和简单值，还可以注入\
  \ Java 集合、外部定义的属性，甚至另一个工厂中的 bean。你可以通过分别在 `<property>` 和 `<constructor-args>` 标签下使用相应的标签，将这些注入参数类型用于设值注入和构造器注入。\n\
  \n\n\n##### 注入简单值\n\n向 Bean 中注入简单值非常容易。只需在配置标签内，使用 `<value>` 标签包裹要注入的值即可。默认情况下，`<value>`\
  \ 标签不仅能读取 `String` 类型的值，还能将这些值转换为任何基本类型或基本类型的包装类。清单 4-35 展示了一个简单的 Bean，它暴露了多种属性以供注入。\n\
  \n***清单 4-35**. 注入简单值 (XML)*\n\n`package com.apress.prospring3.ch4.xml;`\n\n`import\
  \ org.springframework.context.support.GenericXmlApplicationContext;`\n\n`public\
  \ class InjectSimple {`\n\n`   private String name;`\n\n`   private int age;`\n\n\
  `   private float height;`\n\n`   private boolean programmer;`\n\n`   private Long\
  \ ageInSeconds;`\n\n`   public static void main(String[] args) {`\n\n`      GenericXmlApplicationContext\
  \ ctx = new GenericXmlApplicationContext();`\n`      ctx.load(\"classpath:app-context-xml.xml\"\
  );`\n`      ctx.refresh();`\n\n`      InjectSimple simple = (InjectSimple)ctx.getBean(\"\
  injectSimple\");`\n`      System.out.println(simple);`\n`   }`\n\n`   public void\
  \ setAgeInSeconds(Long ageInSeconds) {`\n`      this.ageInSeconds = ageInSeconds;`\n\
  `   }`\n\n`   public void setProgrammer(boolean programmer) {`\n`      this.programmer\
  \ = programmer;`\n`   }`\n\n`   public void setAge(int age) {`\n`      this.age\
  \ = age;`\n`   }`\n\n`   public void setHeight(float height) {`\n`      this.height\
  \ = height;`\n`   }`\n\n`   public void setName(String name) {`\n`      this.name\
  \ = name;`\n`   }`\n\n`   public String toString() {`\n`      return    \"Name :\"\
  \ + name + \"\\n\"`\n`          + \"Age:\" + age + \"\\n\"`\n`          + \"Age\
  \ in Seconds: \" + ageInSeconds + \"\\n\"`\n`          + \"Height: \" + height +\
  \ \"\\n\"`\n`          + \"Is Programmer?: \" + programmer;`\n`   }`\n`}`\n\n除了属性之外，`InjectSimple`\
  \ 类还定义了 `main()` 方法，该方法创建了一个 `ApplicationContext`，然后从 Spring 中获取一个 `InjectSimple`\
  \ Bean。接着，该 Bean 的属性值会被输出到控制台。清单 4-36 展示了该 Bean 的配置 (`app-context-xml.xml`)。\n\n\
  ***清单 4-36**. 配置简单值注入*\n\n`<bean id=\"injectSimple\" class=\"com.apress.prospring3.ch4.xml.InjectSimple\"\
  >`\n`   <property name=\"name\">`\n`      <value>John Smith</value>`\n`   </property>`\n\
  `   <property name=\"age\">`\n`      <value>35</value>`\n`   </property>`\n`   <property\
  \ name=\"height\">`\n`      <value>1.78</value>`\n`   </property>`\n`   <property\
  \ name=\"programmer\">`\n`      <value>true</value>`\n`   </property>`\n`   <property\
  \ name=\"ageInSeconds\">`\n`      <value>1103760000</value>`\n`   </property>`\n\
  `   </bean>`\n\n从清单 4-35 和 4-36 可以看出，你可以在 Bean 上定义接受 `String` 值、基本类型值或基本类型包装类值的属性，然后使用\
  \ `<value>` 标签为这些属性注入值。以下是运行此示例的预期输出：\n\n`Name: John Smith`\n`Age: 35`\n`Age in\
  \ Seconds: 1103760000`\n`Height: 1.78`\n`Is Programmer?: true`\n\n对于注解风格的简单值注入，我们可以将\
  \ `@Value` 注解应用于 Bean 的属性。这次，我们将注解应用于属性声明语句上，而不是 setter 方法上，如清单 4-37 所示。（Spring\
  \ 支持在 setter 方法或属性上使用该注解。）\n\n***清单 4-37**. 注入简单值 (注解)*\n\n`package com.apress.prospring3.ch4.annotation;`\n\
  \n`import org.springframework.beans.factory.annotation.Value;`\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  `import org.springframework.stereotype.Service;`\n\n`@Service(\"injectSimple\")`\n\
  `public class InjectSimple {`\n\n`    @Value(\"John Smith\")`\n`    private String\
  \ name;`\n\n`    @Value(\"35\")`\n`    private int age;`\n\n`    @Value(\"1.78\"\
  )`\n`    private float height;`\n\n`    @Value(\"true\")`\n`    private boolean\
  \ programmer;`\n\n`    @Value(\"1103760000\")`\n`    private Long ageInSeconds;`\n\
  \n`    public static void main(String[] args) {`\n\n`        GenericXmlApplicationContext\
  \ ctx = new GenericXmlApplicationContext();`\n`        ctx.load(\"classpath:app-context-annotation.xml\"\
  );`\n`        ctx.refresh();`\n\n`        InjectSimple simple = (InjectSimple)ctx.getBean(\"\
  injectSimple\");`\n`        ctx.getBean(\"injectRef\");`\n`        System.out.println(simple);`\n\
  `    }`\n\n`    // Getter/setter methods omitted`\n\n`    public String toString()\
  \ {`\n`        return    \"Name :\" + name + \"\\n\"`\n`                + \"Age:\"\
  \ + age + \"\\n\"`\n`                + \"Age in Seconds: \" + ageInSeconds + \"\\\
  n\"`\n`                + \"Height: \" + height + \"\\n\"`\n`                + \"\
  Is Programmer?: \" + programmer;`\n`    }`\n\n`}`\n\n这实现了与 XML 配置相同的结果。\n\n\n\n\
  ##### 使用 SpEL 注入值\n\nSpring 3 引入的一项强大功能是 Spring 表达式语言（SpEL）。SpEL 使你能够动态计算表达式，然后在\
  \ Spring 的 `ApplicationContext` 中使用它。一个用例是将计算结果注入到 Spring Bean 中。在本节中，我们将通过上一示例中的例子，了解如何使用\
  \ SpEL 从其他 Bean 注入属性。\n\n假设现在我们想将待注入 Spring Bean 的值外部化到配置类中，如清单 4-38 所示。\n\n***清单\
  \ 4-38**. 使用 SpEL 注入值（XML）*\n\n`package com.apress.prospring3.ch4.xml;`\n\n`public\
  \ class InjectSimpleConfig {`\n\n`    private String name = \"John Smith\";`\n\n\
  `    private int age = 35;`\n\n`    private float height = 1.78f;`\n\n`    private\
  \ boolean programmer = true;`\n\n`    private Long ageInSeconds = 1103760000L;`\n\
  \n`    // 省略 getter/setter 方法`\n`}`\n\n然后，我们可以在 XML 配置中定义 Bean，并使用 SpEL 将该 Bean\
  \ 的属性注入到依赖的 Bean 中，如清单 4-39（`app-context-xml.xml`）所示。\n\n***清单 4-39**. 使用 SpEL 注入值（XML）*\n\
  \n`<bean id=\"injectSimpleConfig\" class=\"com.apress.prospring3.ch4.xml.InjectSimpleConfig\"\
  />`\n\n`<bean id=\"injectSimpleSpel\" class=\"com.apress.prospring3.ch4.xml.InjectSimpleSpel\"\
  >`\n`    <property name=\"name\">`\n`        <value>#{injectSimpleConfig.name}</value>`\n\
  `    </property>`\n`    <property name=\"age\">`\n`        <value>#{injectSimpleConfig.age\
  \ + 1}</value>`\n`    </property>`\n`    <property name=\"height\">`\n`        <value>#{injectSimpleConfig.height}</value>`\n\
  `    </property>`\n`    <property name=\"isProgrammer\">`\n`        <value>#{injectSimpleConfig.programmer}</value>`\n\
  `    </property>`\n`    <property name=\"ageInSeconds\">`\n`        <value>#{injectSimpleConfig.ageInSeconds}</value>`\n\
  `    </property>`\n`</bean>`\n\n请注意，我们在引用其他 Bean 的属性时使用了 SpEL `#{injectSimpleConfig.name}`。对于年龄，我们在该\
  \ Bean 的值上加 1，以表明我们可以根据需要使用 SpEL 操作属性，并将其注入到依赖的 Bean 中。现在，我们可以使用清单 4-40 中的程序来测试该配置。\n\
  \n***清单 4-40**. 使用 SpEL 注入值（XML）*\n\n`package com.apress.prospring3.ch4.xml;`\n\n\
  `import org.springframework.context.support.GenericXmlApplicationContext;`\n\n`public\
  \ class InjectSimpleSpel {`\n\n`    private String name;`\n\n`    private int age;`\n\
  \n`    private float height;`\n\n`    private boolean programmer;`\n\n`    private\
  \ Long ageInSeconds;`\n\n`    public static void main(String[] args) {`\n\n`        GenericXmlApplicationContext\
  \ ctx = new GenericXmlApplicationContext();`\n`        ctx.load(\"classpath:app-context-xml.xml\"\
  );`\n`        ctx.refresh();`\n\n`        InjectSimpleSpel simple = (InjectSimpleSpel)ctx.getBean(\"\
  injectSimpleSpel\");`\n`        System.out.println(simple);`\n`    }`\n`// 其他代码省略`\n\
  `}`\n\n以下是程序的输出：\n\n`Name: John Smith`\n`Age:36`\n`Age in Seconds: 1103760000`\n\
  `Height: 1.78`\n`Is Programmer?: true`\n\n当使用注解风格的注入时，我们只需将 `@Value` 注解替换为 SpEL\
  \ 表达式即可（参见清单 4-41）。\n\n***清单 4-41**. 使用 SpEL 注入值（注解）*\n\n`package com.apress.prospring3.ch4.annotation;`\n\
  \n`import org.springframework.beans.factory.annotation.Value;`\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  `import org.springframework.stereotype.Service;`\n\n`@Service(\"injectSimpleSpel\"\
  )`\n`public class InjectSimpleSpel {`\n\n`   @Value(\"#{injectSimpleConfig.name}\"\
  )`\n`   private String name;`\n\n`   @Value(\"#{injectSimpleConfig.age + 1}\")`\n\
  `   private int age;`\n\n`   @Value(\"#{injectSimpleConfig.height}\")`\n`   private\
  \ float height;`\n\n`   @Value(\"#{injectSimpleConfig.programmer}\")`\n`   private\
  \ boolean programmer;`\n\n`   @Value(\"#{injectSimpleConfig.ageInSeconds}\")`\n\
  `   private Long ageInSeconds;`\n`// 其他代码省略`\n`}`\n\n清单 4-42 展示了 `InjectSimpleConfig`\
  \ 类的注解版本。\n\n***清单 4-42**. `InjectSimpleConfig` 类（注解）*\n\n`package com.apress.prospring3.ch4.annotation;`\n\
  \n`import org.springframework.stereotype.Component;`\n\n`@Component(\"injectSimpleConfig\"\
  )`\n`public class InjectSimpleConfig {`\n\n`    private String name = \"John Smith\"\
  ;`\n\n`    private int age = 35;`\n\n`    private float height = 1.78f;`\n\n`    private\
  \ boolean programmer = true;`\n\n`    private Long ageInSeconds = 1103760000L;`\n\
  \n`    // 省略 getter/setter 方法`\n`}`\n\n从清单 4-42 可以看出，这里使用了 `@Component` 注解，而不是 `@Service`。基本上，使用\
  \ `@Component` 与使用 `@Service` 效果相同。这两个注解都指示 Spring，被注解的类是基于注解的配置和类路径扫描的自动检测候选对象。然而，由于\
  \ `InjectSimpleConfig` 类存储的是应用程序配置，而不是提供业务服务，因此使用 `@Component` 更合理。实际上，`@Service`\
  \ 是 `@Component` 的一种特化，它表明被注解的类正在为应用程序中的其他层提供业务服务。\n\n测试该程序将产生相同的结果。通过使用 SpEL，你可以访问任何由\
  \ Spring 管理的 Bean 和属性，并借助 Spring 对复杂语言特性和语法的支持，对它们进行操作以供应用程序使用。\n\n\n\n##### 在同一\
  \ XML 单元中注入 Bean\n\n正如您已经看到的，可以使用 `<ref>` 标签将一个 Bean 注入到另一个 Bean 中。列表 4-43 展示了一个类，它暴露了一个\
  \ setter 方法以允许注入 Bean。\n\n***列表 4-43**. 注入 Bean*\n\n`package com.apress.prospring3.ch4.xml;`\n\
  \n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\n\
  `import com.apress.prospring3.ch4.Oracle;`\n\n`public class InjectRef {`\n\n`  \
  \ private Oracle oracle;`\n\n`   public void setOracle(Oracle oracle) {`\n`      this.oracle\
  \ = oracle;`\n`   }`\n\n`   public static void main(String[] args) {`\n\n`      GenericXmlApplicationContext\
  \ ctx = new GenericXmlApplicationContext();`\n`      ctx.load(\"classpath:app-context-xml.xml\"\
  );`\n`      ctx.refresh();`\n\n`      InjectRef injectRef = (InjectRef) ctx.getBean(\"\
  injectRef\");`\n`      System.out.println(injectRef);`\n`    }`\n\n`    public String\
  \ toString() {`\n`      return oracle.defineMeaningOfLife();`\n`    }`\n`}`\n\n\
  要配置 Spring 将一个 Bean 注入到另一个 Bean 中，首先需要配置两个 Bean：一个是被注入的 Bean，另一个是注入的目标 Bean。完成此操作后，只需在目标\
  \ Bean 上使用 `<ref>` 标签配置注入即可。请记住，`<ref>` 必须放在 `<property>` 或 `<constructor-arg>`\
  \ 标签内，具体取决于您使用的是 Setter 注入还是构造器注入。列表 4-44 展示了此配置的一个示例（`app-context-xml.xml`）。\n\n\
  ***列表 4-44**. 配置 Bean 注入*\n\n`<bean id=\"oracle\" name=\"wiseworm\" class=\"com.apress.prospring3.ch4.BookwormOracle\"\
  />`\n\n`<bean id=\"injectRef\" class=\"com.apress.prospring3.ch4.xml.InjectRef\"\
  >`\n`    <property name=\"oracle\">`\n`        <ref local=\"oracle\"/>`\n`    </property>`\n\
  `</bean>`\n\n运行列表 4-43 中的类将产生以下输出：\n\n`Encyclopedias are a waste of money - use\
  \ the Internet`\n\n需要注意的一个重要点是，被注入的类型不必与目标上定义的类型完全一致；只需类型兼容即可。*兼容* 意味着，如果目标上声明的类型是一个接口，那么被注入的类型必须实现该接口。如果声明的类型是一个类，那么被注入的类型必须是同一类型或其子类型。在此示例中，`InjectRef`\
  \ 类定义了 `setOracle()` 方法来接收一个 `Oracle` 实例（这是一个接口），而被注入的类型是 `BookwormOracle`，这是一个实现了\
  \ `Oracle` 接口的类。这一点可能会让一些开发者感到困惑，但实际上非常简单。注入遵循与任何 Java 代码相同的类型规则，因此只要您熟悉 Java 类型系统的工作原理，理解注入中的类型就很容易。\n\
  \n在前面的示例中，要注入的 Bean 的 `id` 是通过 `<ref>` 标签的 `local` 属性指定的。稍后您将在“理解 Bean 命名”一节中看到，您可以为一个\
  \ Bean 指定多个名称，以便使用各种别名来引用它。当您使用 `local` 属性时，意味着 `<ref>` 标签只会查找 Bean 的 `id`，而不会查找其任何别名。此外，Bean\
  \ 定义应存在于同一个 XML 配置文件中。要按任意名称注入 Bean，或从其他 XML 配置文件中导入 Bean，请使用 `<ref>` 标签的 `bean`\
  \ 属性，而不是 `local` 属性。列表 4-45 展示了前一个示例的另一种配置，该配置为被注入的 Bean 使用了替代名称。\n\n***列表 4-45**.\
  \ 使用 Bean 别名进行注入*\n\n`    <bean id=\"oracle\" name=\"wiseworm\" class=\"com.apress.prospring3.ch4.BookwormOracle\"\
  />`\n\n`    <bean id=\"injectRef\" class=\"com.apress.prospring3.ch4.xml.InjectRef\"\
  >`\n`       <property name=\"oracle\">`\n`          <ref bean=\"wiseworm\"/>`\n\
  `       </property>`\n`    </bean>`\n\n在此示例中，`oracle` Bean 通过 `name` 属性被赋予了一个别名，然后通过结合使用该别名与\
  \ `<ref>` 标签的 `bean` 属性，将其注入到 `injectRef` Bean 中。目前不必过于担心命名语义——我们将在本章后面更详细地讨论这一点。再次运行\
  \ `InjectRef` 类（列表 4-43）将产生与前一个示例相同的结果。\n\n\n\n##### 注入与 ApplicationContext 嵌套\n\
  \n到目前为止，我们注入的 bean 与它们被注入到的 bean 位于同一个 `ApplicationContext`（因此也是同一个 `BeanFactory`）中。然而，Spring\
  \ 支持 `ApplicationContext` 的层次结构，使得一个上下文（以及关联的 `BeanFactory`）被视为另一个上下文的父级。通过允许 `ApplicationContext`\
  \ 嵌套，Spring 允许你将配置拆分到不同的文件中——这对于拥有大量 bean 的大型项目来说简直是天赐之物。\n\n当嵌套 `ApplicationContext`\
  \ 时，Spring 允许被视为子上下文的 bean 引用父上下文中的 bean。使用 `GenericXmlApplicationContext` 进行 `ApplicationContext`\
  \ 嵌套非常容易掌握。要将一个 `GenericXmlApplicationContext` 嵌套到另一个中，只需在子 `ApplicationContext`\
  \ 中调用 `setParent()` 方法，如清单 4-46 所示。\n\n***清单 4-46**. 嵌套 `GenericXmlApplicationContext`*\n\
  \n`package com.apress.prospring3.ch4;`\n\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  \n`public class HierarchicalAppContextUsage {`\n\n`    public static void main(String[]\
  \ args) {`\n\n`        GenericXmlApplicationContext parent = new GenericXmlApplicationContext();`\n\
  `        parent.load(\"classpath:parent.xml\");`\n`        parent.refresh();`\n\n\
  `        GenericXmlApplicationContext child = new GenericXmlApplicationContext();`\n\
  `        child.load(\"classpath:app-context-xml.xml\");`\n`        child.setParent(parent);`\n\
  `        child.refresh();`\n\n`        SimpleTarget target1 = (SimpleTarget) child.getBean(\"\
  target1\");`\n`        SimpleTarget target2 = (SimpleTarget) child.getBean(\"target2\"\
  );`\n`        SimpleTarget target3 = (SimpleTarget) child.getBean(\"target3\");`\n\
  \n`        System.out.println(target1.getVal());`\n`        System.out.println(target2.getVal());`\n\
  `        System.out.println(target3.getVal());`\n\n`    }`\n\n`}`\n\n清单 4-47 展示了\
  \ `SimpleTarget` 类。\n\n***清单 4-47**. `SimpleTarget` 类*\n\n`package com.apress.prospring3.ch4;`\n\
  \n`public class SimpleTarget {`\n\n`    private String val;`\n\n`    public void\
  \ setVal(String val) {`\n`        this.val = val;`\n`    }`\n\n`    public String\
  \ getVal() {`\n`        return val;`\n`    }`\n\n`}`\n\n在子 `ApplicationContext`\
  \ 的配置文件中，引用父 `ApplicationContext` 中的 bean 与引用子 `ApplicationContext` 中的 bean 完全相同，除非你在子\
  \ `ApplicationContext` 中有一个同名的 bean。在这种情况下，你只需将 `<ref>` 标签的 `bean` 属性替换为 `parent`，即可继续。\
  \ 清单 4-48 展示了父 `BeanFactory` (`parent.xml`) 的示例配置文件。\n\n***清单 4-48**. 父 `ApplicationContext`\
  \ 配置*\n\n`    <bean id=\"injectBean\" class=\"java.lang.String\">`\n`       <constructor-arg>`\n\
  `          <value>Bean In Parent</value>`\n`       </constructor-arg>`\n`    </bean>`\n\
  `    <bean id=\"injectBeanParent\" class=\"java.lang.String\">`\n`       <constructor-arg>`\n\
  `          <value>Bean In Parent</value>`\n`       </constructor-arg>`\n`    </bean>`\n\
  \n如你所见，此配置仅定义了两个 bean：`injectBean` 和 `injectBeanParent`。两者都是值为 `Bean In Parent`\
  \ 的 `String` 对象。 清单 4-49 展示了子 `ApplicationContext` (`app-context-xml.xml`) 的示例配置。\n\
  \n***清单 4-49**. 子 `ApplicationContext` 配置*\n\n`    <bean id=\"target1\" class=\"\
  com.apress.prospring3.ch4.SimpleTarget\">`\n`       <property name=\"val\">`\n`          <ref\
  \ bean=\"injectBeanParent\"/>`\n`       </property>`\n`    </bean>`\n\n`    <bean\
  \ id=\"target2\" class=\"com.apress.prospring3.ch4.SimpleTarget\">`\n`       <property\
  \ name=\"val\">`\n`          <ref bean=\"injectBean\"/>`\n`       </property>`\n\
  `    </bean>`\n\n`    <bean id=\"target3\" class=\"com.apress.prospring3.ch4.SimpleTarget\"\
  >`\n`       <property name=\"val\">`\n`          <ref parent=\"injectBean\"/>`\n\
  `       </property>`\n`    </bean>`\n\n`    <bean id=\"injectBean\" class=\"java.lang.String\"\
  >`\n`       <constructor-arg>`\n`          <value>Bean In Child</value>`\n`      \
  \ </constructor-arg>`\n`    </bean>`\n\n请注意，我们在此处定义了四个 bean。此清单中的 `injectBean` 与父级中的\
  \ `injectBean` 类似，只是它表示的字符串具有不同的值，表明它位于子 `ApplicationContext` 中。\n\n`target1` bean\
  \ 使用 `<ref>` 标签的 `bean` 属性来引用名为 `injectBeanParent` 的 bean。由于此 bean 仅存在于父 `BeanFactory`\
  \ 中，因此 `target1` 接收到对该 bean 的引用。这里有两个值得关注的点。首先，你可以使用 `bean` 属性来引用子 `ApplicationContext`\
  \ 和父 `ApplicationContext` 中的 bean。这使得透明地引用 bean 变得容易，允许你在应用程序增长时将 bean 在配置文件之间移动。第二个值得关注的点是，你不能使用\
  \ `local` 属性来引用父 `ApplicationContext` 中的 bean。XML 解析器会检查 `local` 属性的值是否作为同一文件中的有效元素存在，从而阻止它用于引用父上下文中的\
  \ bean。\n\n`target2` bean 使用 `<ref>` 标签的 `bean` 属性来引用 `injectBean`。由于该 bean 在两个\
  \ `ApplicationContext` 中都有定义，因此 `target2` bean 接收到对其自身 `ApplicationContext` 中 `injectBean`\
  \ 的引用。\n\n`target3` bean 使用 `<ref>` 标签的 `parent` 属性来直接引用父 `ApplicationContext` 中的\
  \ `injectBean`。由于 `target3` 使用了 `<ref>` 标签的 `parent` 属性，因此在子 `ApplicationContext`\
  \ 中声明的 `injectBean` 被完全忽略。\n\n清单 4-46 中的代码也通过从子 `BeanFactory` 中检索三个 `targetX` bean\
  \ 并输出每种情况下 `val` 属性的值，演示了此处讨论的语义。\n\n以下是运行 `HierarchicalAppContextUsage` 类（清单 4-46）的输出：\n\
  \n`Bean In Parent`\n`Bean In Child`\n`Bean In Parent`\n\n正如预期的那样，`target1` 和 `target3`\
  \ bean 都获得了对父 `ApplicationContext` 中 bean 的引用，而 `target2` bean 获得了对子 `ApplicationContext`\
  \ 中 bean 的引用。\n\n\n\n##### 使用集合进行注入\n\n通常情况下，你的 Bean 需要访问的是对象集合，而不仅仅是单个 Bean 或值。因此，Spring\
  \ 允许你将对象集合注入到你的某个 Bean 中，这并不令人意外。使用集合很简单：你可以选择 `<list>`、`<map>`、`<set>` 或 `<props>`\
  \ 来表示一个 `List`、`Map`、`Set` 或 `Properties` 实例，然后像其他注入一样传入各个条目。`<props>` 标签只允许传入 `String`\
  \ 类型的值，因为 `Properties` 类只允许属性值为 `String` 类型。当使用 `<list>`、`<map>` 或 `<set>` 时，你可以在注入属性时使用任何你想要的标签，甚至可以是另一个集合标签。这允许你传入一个包含\
  \ `Map` 的 `List`、一个包含 `Set` 的 `Map`，甚至是一个包含 `Set` 的 `Map` 的 `List`，而这些 `Set` 里又包含\
  \ `List`！代码清单 4-50 展示了一个可以注入所有四种集合类型的类。\n\n***代码清单 4-50**. 集合注入 (XML)*\n\n`package\
  \ com.apress.prospring3.ch4.xml;`\n\n`import java.util.List;`\n`import java.util.Map;`\n\
  `import java.util.Properties;`\n`import java.util.Set;`\n\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  `public class CollectionInjection {`\n\n`    private Map<String, Object> map;`\n\
  \n`    private Properties props;`\n\n`    private Set set;`\n\n`    private List\
  \ list;`\n\n`    public static void main(String[] args) {`\n`        GenericXmlApplicationContext\
  \ ctx = new GenericXmlApplicationContext();`\n`        ctx.load(\"classpath:app-context-xml.xml\"\
  );`\n`        ctx.refresh();  `\n\n`        CollectionInjection instance = (CollectionInjection)\
  \ ctx.getBean(\"injectCollection\");`\n`        instance.displayInfo();`\n`    }`\n\
  \n`    public void setList(List list) {`\n`        this.list = list;`\n`    }`\n\
  \n`    public void setSet(Set set) {`\n`        this.set = set;`\n`    }`\n\n`    public\
  \ void setMap(Map <String, Object> map) {`\n`        this.map = map;`\n`    }`\n\
  \n`    public void setProps(Properties props) {`\n`        this.props = props;`\n\
  `    }`\n\n`    public void displayInfo() {`\n\n`        // 显示 Map`\n`        System.out.println(\"\
  Map contents:\\n\");`\n`        for (Map.Entry<String, Object> entry: map.entrySet())\
  \ {`\n`            System.out.println(\"Key: \" + entry.getKey() + \" - Value: \"\
  \ + entry.getValue());`\n`        }`\n\n`        // 显示 properties`\n`        System.out.println(\"\
  \\nProperties contents:\\n\");`\n`        for (Map.Entry<Object, Object> entry:\
  \ props.entrySet()) {`\n`            System.out.println(\"Key: \" + entry.getKey()\
  \ + \" - Value: \" + entry.getValue());`\n`        }`\n\n`        // 显示 set`\n`        System.out.println(\"\
  \\nSet contents:\\n\");`\n`        for (Object obj: set) {`\n`            System.out.println(\"\
  Value: \" + obj);`\n`        }`\n\n`        // 显示 list`\n`        System.out.println(\"\
  \\nList contents:\\n\");`\n`        for (Object obj: list) {`\n`            System.out.println(\"\
  Value: \" + obj);`\n`        }`\n`    }`\n`}`\n\n这段代码相当长，但实际上做的事情很少。`main()` 方法从\
  \ Spring 中获取一个 `CollectionInjection` Bean，然后调用 `displayInfo()` 方法。该方法只是输出将从 Spring\
  \ 注入的 `Map`、`Properties`、`Set` 和 `List` 实例的内容。在代码清单 4-51 中，你可以看到为 `CollectionInjection`\
  \ 类上的每个属性注入值所需的配置。\n\n另外，请注意 `Map<String,Object>` 属性的声明。对于 JDK 5 及更高版本，Spring 也支持强类型的\
  \ `Collection` 声明，并将根据 XML 配置执行到相应指定类型的转换（`app-context-xml.xml`）。\n\n***代码清单 4-51**.\
  \ 配置集合注入 (XML)*\n\n`<bean id=\"oracle\" name=\"wiseworm\" class=\"com.apress.prospring3.ch4.BookwormOracle\"\
  />`\n\n`<bean id=\"injectCollection\" class=\"com.apress.prospring3.ch4.xml.CollectionInjection\"\
  >`\n`        <property name=\"map\">`\n`            <map>`\n`                <entry\
  \ key=\"someValue\">`\n`                    <value>Hello World!</value>`\n`                </entry>`\n\
  `                <entry key=\"someBean\">`\n`                    <ref local=\"oracle\"\
  />`\n`                </entry>`\n`            </map>`\n`        </property>`\n`        <property\
  \ name=\"props\">`\n`            <props>`\n`                <prop key=\"firstName\"\
  >Clarence</prop>`\n`                <prop key=\"secondName\">Ho</prop>`\n`            </props>`\n\
  `        </property>`\n`        <property name=\"set\">`\n`            <set>`\n\
  `                <value>Hello World!</value>`\n`                <ref local=\"oracle\"\
  />`\n`            </set>`\n`        </property>`\n`        <property name=\"list\"\
  >`\n`            <list>`\n`                <value>Hello World!</value>`\n`                <ref\
  \ local=\"oracle\"/>`\n`            </list>`\n`        </property>`\n`    </bean>  `\n\
  \n在这段代码中，你可以看到我们已经向 `CollectionInjection` 类暴露的所有四个 setter 方法注入了值。对于 `map` 属性，我们使用\
  \ `<map>` 标签注入了一个 `Map` 实例。请注意，每个条目都使用 `<entry>` 标签指定，并且每个条目都有一个 `String` 类型的键和一个条目值。这个条目值可以是任何你可以单独注入到属性中的值；这个例子展示了如何使用\
  \ `<value>` 和 `<ref>` 标签向 `Map` 中添加一个 `String` 值和一个 Bean 引用。对于 `props` 属性，我们使用 `<props>`\
  \ 标签创建了一个 `java.util.Properties` 实例，并使用 `<prop>` 标签填充它。请注意，尽管 `<prop>` 标签的键值指定方式与\
  \ `<entry>` 标签类似，但你只能为 `Properties` 实例中的每个属性指定一个 `String` 值。\n\n`<list>` 和 `<set>`\
  \ 标签的工作方式完全相同：你可以使用任何单个值标签（例如用于向属性注入单个值的 `<value>` 和 `<ref>`）来指定每个元素。在代码清单 4-51\
  \ 中，你可以看到我们向 `List` 和 `Set` 都添加了一个 `String` 值和一个 Bean 引用。\n\n以下是代码清单 4-50 生成的输出。正如预期的那样，它只是列出了配置文件中添加到集合中的元素。\n\
  \n`Map contents:`\n\n`Key: someValue - Value: Hello World!`\n`Key: someBean - Value:\
  \ com.apress.prospring3.ch4.xml.BookwormOracle@2a0ab444`\n\n`Properties contents:`\n\
  \n`Key: secondName - Value: Ho`\n`Key: firstName - Value: Clarence`\n\n`Set contents:`\n\
  \n`Value: Hello World!`\n`Value: com.apress.prospring3.ch4.xml.BookwormOracle@2a0ab444`\n\
  \n`List contents:`\n\n`Value: Hello World!`\n`Value: com.apress.prospring3.ch4.xml.BookwormOracle@2a0ab444`\n\
  \n请记住，对于 `<list>`、`<map>` 和 `<set>` 元素，你可以使用任何用于设置非集合属性值的标签来指定集合中某个条目的值。这是一个非常强大的概念，因为你不仅限于注入原始值的集合；你还可以注入\
  \ Bean 的集合或其他集合。\n\n使用此功能，可以更容易地模块化你的应用程序，并为关键应用程序逻辑部分提供不同的、用户可选的实现。考虑一个允许公司员工在线创建、校对和订购个性化商务文具的系统。在此系统中，每个订单的完成稿在准备生产时会被发送到相应的打印机。唯一的复杂之处在于，一些打印机希望通过电子邮件接收稿件，一些希望通过\
  \ FTP，还有更多希望使用安全复制协议（SCP）。使用 Spring 的集合注入，你可以为此功能创建一个标准接口，如代码清单 4-52 所示。\n\n***代码清单\
  \ 4-52**. `ArtworkSender` 接口*\n\n`package com.apress.prospring3.ch4;`\n\n`public\
  \ interface ArtworkSender {`\n\n\n\n`   public void sendArtwork(String artworkPath,\
  \ Recipient recipient);`\n\n`   public String getFriendlyName();`\n\n`   public\
  \ String getShortName();`\n`}`\n\n在代码清单 4-52 中，`Recipient` 类是一个空类。基于此接口，你可以创建多个实现，每个实现都能向人类描述自身，例如代码清单\
  \ 4-53 中所示的实现。\n\n***代码清单 4-53**. `FtpArtworkSender` 类*\n\n`package com.apress.prospring3.ch4;`\n\
  \n`public class FtpArtworkSender implements ArtworkSender {`\n\n`   public void\
  \ sendArtwork(String artworkPath, Recipient recipient) {`\n\n`      // ftp 逻辑在此...`\n\
  `   }`\n\n`   public String getFriendlyName() {`\n`      return \"File Transfer\
  \ Protocol\";`\n`   }`\n\n`   public String getShortName() {`\n`      return \"\
  ftp\";`\n`   }`\n`}`\n\n假设你随后开发了一个 `ArtworkManager` 类，它支持 `ArtworkSender` 接口的所有可用实现。有了这些实现后，你只需将一个\
  \ `List` 传递给 `ArtworkManager` 类即可开始工作。利用 `getFriendlyName()` 方法，你可以在配置每个信纸模板时，向系统管理员展示一个交付选项列表供其选择。此外，如果你仅针对\
  \ `ArtworkSender` 接口进行编码，你的应用程序就可以与各个具体实现完全解耦。我们将 `ArtworkManager` 类的实现留作练习。\n\n\
  除了 XML 配置，我们还可以使用注解进行集合注入。不过，我们更希望将集合的值外部化到配置文件中，以便于维护。代码清单 4-54 是四个不同 Spring Bean\
  \ 的配置，它们模拟了之前示例（`app-context-annotation.xml`）中相同的集合属性。\n\n***代码清单 4-54.** 配置集合注入（注解方式）*\n\
  \n`    <util:map id=\"map\" map-class=\"java.util.HashMap\">`\n`       <entry key=\"\
  someValue\">`\n`          <value>Hello World!</value>`\n`       </entry>`\n`   \
  \    <entry key=\"someBean\">`\n`          <ref bean=\"oracle\"/>`\n`       </entry>`\n\
  `    </util:map>`\n\n`    <util:properties id=\"props\">`\n`            <prop key=\"\
  firstName\">Clarence</prop>`\n`            <prop key=\"secondName\">Ho</prop>`\n\
  `    </util:properties>`\n\n`    <util:set id=\"set\">`\n`           <value>Hello\
  \ World!</value>`\n`           <ref bean=\"oracle\"/>  `\n`    </util:set>`\n\n\
  `    <util:list id=\"list\">`\n`            <value>Hello World!</value>`\n`    \
  \        <ref bean=\"oracle\"/>`\n`    </util:list>`\n\n让我们也开发一个 `BookwormOracle`\
  \ 类的注解版本。代码清单 4-55 展示了该类的内容。\n\n***代码清单 4-55**. `BookwormOracle` 类（注解方式）*\n\n`package\
  \ com.apress.prospring3.ch4.annotation;`\n\n`import org.springframework.stereotype.Service;`\n\
  \n`import com.apress.prospring3.ch4.Oracle;`\n\n`@Service(\"oracle\")`\n`public\
  \ class BookwormOracle implements Oracle {`\n\n`    public String defineMeaningOfLife()\
  \ {`\n`        return \"Encyclopedias are a waste of money - use the Internet\"\
  ;`\n`    }`\n\n`}`\n\n在代码清单 4-54 的配置中，我们使用了 Spring 提供的 `util` 命名空间来声明用于存储集合属性的 Bean。与之前版本的\
  \ Spring 相比，这极大地简化了配置。在测试类中，我们注入上述 Bean，并使用 JSR-250 的 `@Resource` 注解并指定名称，如代码清单\
  \ 4-56 所示。\n\n***代码清单 4-56**. 配置集合注入（注解方式）*\n\n`package com.apress.prospring3.ch4.annotation;`\n\
  \n`// 其他代码已省略`\n`@Service(\"injectCollection\")`\n`public class CollectionInjection\
  \ {`\n\n`    @Resource(name=\"map\")`\n`    private Map<String, Object> map;`\n\n\
  `    @Resource(name=\"props\")`\n`    private Properties props;`\n\n`    @Resource(name=\"\
  set\")`\n`    private Set set;`\n\n`    @Resource(name=\"list\")`\n`    private\
  \ List list;`\n\n`// 其他代码已省略`\n`}`\n\n运行测试程序，你将得到与使用 XML 配置的示例相同的结果。\n\n![images](img/square.jpg)\
  \ **注意** 你可能会疑惑为什么使用 `@Resource` 注解而不是 `@Autowired`。这是因为 `@Autowired` 注解在语义上被定义为：它始终将数组、集合和映射视为对应\
  \ Bean 的集合，目标 Bean 类型由声明的集合值类型派生而来。因此，例如，如果一个类具有 `List<Oracle>` 类型的属性，并且定义了 `@Autowired`\
  \ 注解，Spring 会尝试将当前 `ApplicationContext` 中所有 Oracle 类型的 Bean 注入到该属性中（而不是配置文件中声明的\
  \ `<util:list>`），这可能导致注入意外的依赖项，或者如果没有定义 Oracle 类型的 Bean，Spring 会抛出异常。因此，对于集合类型的注入，我们必须通过指定\
  \ Bean 名称来明确指示 Spring 执行注入，而 `@Resource` 注解支持这一点。\n\n#### 使用方法注入\n\n除了构造器注入和 Setter\
  \ 注入之外，Spring 提供的另一个较少使用的 DI 特性是方法注入。Spring 的方法注入能力有两种松散相关的形式：查找方法注入和方法替换。查找方法注入提供了另一种机制，Bean\
  \ 可以通过该机制获取其依赖项之一；而方法替换允许你任意替换 Bean 上任何方法的实现，而无需更改原始源代码。\n\n为了提供这两个特性，Spring 使用了\
  \ CGLIB 的动态字节码增强功能。如果你想在应用程序中使用查找方法注入或方法替换，请确保你的类路径中包含 CGLIB 的 JAR 文件。\n\n\n\n#####\
  \ 查找方法注入\n\n查找方法注入自 Spring 1.1 版本起被引入，用于解决当一个 Bean 依赖于另一个具有不同生命周期的 Bean 时所遇到的问题——具体来说，就是当单例\
  \ Bean 依赖于非单例 Bean 时。在这种情况下，Setter 注入和构造器注入都会导致单例 Bean 持有一个本应是非单例 Bean 的单一实例。在某些情况下，你会希望单例\
  \ Bean 在每次需要该 Bean 时都能获取到非单例 Bean 的一个新实例。\n\n考虑这样一个场景：有一个 `LockOpener` 类，它提供打开任何储物柜的服务。`LockOpener`\
  \ 类依赖于一个 `KeyHelper` 类来打开储物柜，并且 `KeyHelper` 被注入到了 `LockOpener` 中。然而，`KeyHelper`\
  \ 类的设计涉及一些内部状态，这使得它不适合被重复使用。每次调用 `openLock()` 方法时，都需要一个新的 `KeyHelper` 实例。在这种情况下，`LockOpener`\
  \ 将是一个单例 Bean。但是，如果我们使用常规机制注入 `KeyHelper` 类，那么同一个 `KeyHelper` 类的实例（即 Spring 首次执行注入时实例化的那个）将会被重复使用。为了确保每次调用\
  \ `openLock()` 方法时都能传入一个新的 `KeyHelper` 实例，我们需要使用**查找方法注入**。\n\n通常，你可以通过让单例 Bean\
  \ 实现 `ApplicationContextAware` 接口（我们将在下一章讨论这个接口）来实现这一点。然后，利用 `ApplicationContext`\
  \ 实例，单例 Bean 可以在每次需要时查找非单例依赖项的一个新实例。查找方法注入允许单例 Bean 声明它需要一个非单例依赖项，并且每次需要与之交互时都能接收到非单例\
  \ Bean 的一个新实例，而无需实现任何 Spring 特定的接口。\n\n查找方法注入的工作原理是：让你的单例 Bean 声明一个方法（即查找方法），该方法返回非单例\
  \ Bean 的一个实例。当你在应用程序中获取对单例 Bean 的引用时，你实际上接收到的是一个动态创建的子类的引用，Spring 已经在该子类上实现了查找方法。一种典型的实现方式是将查找方法（以及\
  \ Bean 类）定义为抽象的。这可以防止当你忘记配置方法注入，并且直接使用带有空方法实现的 Bean 类（而非 Spring 增强的子类）时，出现任何奇怪的错误。这个话题相当复杂，最好通过示例来说明。\n\
  \n在本例中，我们创建一个非单例 Bean 和两个实现了相同接口的单例 Bean。其中一个单例 Bean 使用“传统的” Setter 注入来获取非单例 Bean\
  \ 的实例；另一个则使用方法注入。代码清单 4-57 展示了 `MyHelper` Bean，在本例中它是非单例 Bean。\n\n***代码清单 4-57.**\
  \ `MyHelper` Bean*\n\n`package com.apress.prospring3.ch4.mi;`\n\n`public class MyHelper\
  \ {`\n\n`    public void doSomethingHelpful() {`\n`      // 执行某些操作！`\n`   }`\n`}`\n\
  \n这个 Bean 显然平淡无奇，但它完美地满足了本例的目的。在代码清单 4-58 中，你可以看到 `DemoBean` 接口，它由两个单例 Bean 实现。\n\
  \n***代码清单 4-58.** `DemoBean` 接口*\n\n`package com.apress.prospring3.ch4.mi;`\n\n\
  `public interface DemoBean {`\n\n`   public MyHelper getMyHelper();`\n\n`   public\
  \ void someOperation();`\n`}`\n\n这个 Bean 有两个方法：`getMyHelper()` 和 `someOperation()`。示例应用程序使用\
  \ `getMyHelper()` 方法来获取对 `MyHelper` 实例的引用，并且在方法查找 Bean 的情况下，执行实际的方法查找。`someOperation()`\
  \ 方法是一个简单的方法，它依赖于 `MyHelper` 类来完成其处理。\n\n\n\n清单 4-59 展示了 `StandardLookupDemoBean`\
  \ 类，它使用 Setter 注入来获取 `MyHelper` 类的实例。\n\n***清单 4-59.** `StandardLookupDemoBean`\
  \ 类*\n\n`package com.apress.prospring3.ch4.mi;`\n\n`public class StandardLookupDemoBean\
  \ implements DemoBean {`\n\n`   private MyHelper myHelper;`\n\n`   public void setMyHelper(MyHelper\
  \ myHelper) {`\n`      this.myHelper = myHelper;`\n`   }`\n\n`   public MyHelper\
  \ getMyHelper() {`\n`      return this.myHelper;`\n`   }`\n\n`   public void someOperation()\
  \ {`\n`      myHelper.doSomethingHelpful();`\n`   }`\n`}`\n\n这段代码看起来应该很熟悉，但请注意，`someOperation()`\
  \ 方法使用了存储的 `MyHelper` 实例来完成其处理。在清单 4-60 中，你可以看到 `AbstractLookupDemoBean` 类，它使用方法注入来获取\
  \ `MyHelper` 类的实例。\n\n***清单 4-60.** `AbstractLookupDemoBean` 类*\n\n`package com.apress.prospring3.ch4.mi;`\n\
  \n`public abstract class AbstractLookupDemoBean implements DemoBean {`\n\n`   public\
  \ abstract MyHelper getMyHelper();`\n\n`   public void someOperation() {`\n`      getMyHelper().doSomethingHelpful();`\n\
  `   }`\n`}`\n\n请注意，`getMyHelper()` 方法被声明为抽象方法，并且 `someOperation()` 方法会调用此方法来获取 `MyHelper`\
  \ 实例。在清单 4-61 中，你可以看到此示例所需的配置代码（`lookup.xml`）。\n\n***清单 4-61.** 配置方法查找注入*\n\n`<?xml\
  \ version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\"\
  >`\n\n`    <bean id=\"helper\" class=\"com.apress.prospring3.ch4.mi.MyHelper\" scope=\"\
  prototype\"/>`\n\n`    <bean id=\"abstractLookupBean\" class=\"com.apress.prospring3.ch4.mi.AbstractLookupDemoBean\"\
  >`\n`        <lookup-method name=\"getMyHelper\" bean=\"helper\"/>`\n`    </bean>`\n\
  \n`    <bean id=\"standardLookupBean\" class=\"com.apress.prospring3.ch4.mi.StandardLookupDemoBean\"\
  >`\n`        <property name=\"myHelper\">`\n`            <ref local=\"helper\"/>`\n\
  `        </property>`\n`    </bean>`\n`</beans>`\n\n现在，`helper` 和 `standardLookupBean`\
  \ bean 的配置对你来说应该很熟悉了。对于 `abstractLookupBean`，你需要使用 `<lookup-method>` 标签来配置查找方法。`<lookup-method>`\
  \ 标签的 `name` 属性告诉 Spring 它应该覆盖的 bean 上的方法名称。此方法不能接受任何参数，并且返回类型应该是你希望从该方法返回的 bean\
  \ 的类型。在本例中，该方法应返回类型为 `MyHelper` 或其子类的实例。`bean` 属性告诉 Spring 查找方法应返回哪个 bean。\n\n清单\
  \ 4-62 展示了此示例的最后一段代码。\n\n***清单 4-62.** `LookupDemo` 类*\n\n`package com.apress.prospring3.ch4.mi;`\n\
  \n`import org.springframework.context.support.GenericXmlApplicationContext;`\n`import\
  \ org.springframework.util.StopWatch;`\n\n`public class LookupDemo {`\n\n`   public\
  \ static void main(String[] args) {`\n\n`      GenericXmlApplicationContext ctx\
  \ = new GenericXmlApplicationContext();`\n`      ctx.load(\"classpath:lookup.xml\"\
  );`\n\n`      DemoBean abstractBean = (DemoBean) ctx.getBean(\"abstractLookupBean\"\
  );`\n`      DemoBean standardBean = (DemoBean) ctx.getBean(\"standardLookupBean\"\
  );`\n\n`      displayInfo(standardBean);`\n`      displayInfo(abstractBean);`\n\
  `   }`\n\n`   public static void displayInfo(DemoBean bean) {`\n`      MyHelper\
  \ helper1 = bean.getMyHelper();`\n`      MyHelper helper2 = bean.getMyHelper();`\n\
  \n`      System.out.println(\"Helper Instances the Same?: \"`\n`            + (helper1\
  \ == helper2));`\n\n`      StopWatch stopWatch = new StopWatch();`\n`      stopWatch.start(\"\
  lookupDemo\");`\n\n`      for (int x = 0; x < 100000; x++) {`\n`         MyHelper\
  \ helper = bean.getMyHelper();`\n`         helper.doSomethingHelpful();`\n`      }`\n\
  \n`      stopWatch.stop();`\n\n`      System.out.println(\"100000 gets took \" +\
  \ stopWatch.getTotalTimeMillis() + \" ms\");`\n`    }`\n`}`\n\n在这段代码中，你可以看到我们从 `GenericXMLApplicationContext`\
  \ 中检索了 `abstractLookupBean`（仅当使用方法查找注入时才支持抽象类的实例化，此时 Spring 会使用 CGLIB 生成一个 `AbstractLookupDemoBean`\
  \ 类的子类，该子类会动态覆盖该方法）和 `standardLookupBean`，并将每个引用传递给 `displayInfo()` 方法。`displayInfo()`\
  \ 方法的第一部分创建了两个 `MyHelper` 类型的局部变量，并通过调用传递给它的 bean 上的 `getMyHelper()` 为它们各自赋值。使用这两个变量，它向\
  \ `stdout` 写入一条消息，指示这两个引用是否指向同一个对象。对于 `abstractLookupBean` 类，每次调用 `getMyHelper()`\
  \ 都应该获取一个新的 `MyHelper` 实例，因此这两个引用不应该相同。对于 `standardLookupBean`，通过 Setter 注入将 `MyHelper`\
  \ 的单个实例传递给 bean，该实例被存储并在每次调用 `getMyHelper()` 时返回，因此这两个引用应该是相同的。\n\n![images](img/square.jpg)\
  \ **注意** 上一个示例中使用的 `StopWatch` 类是 Spring 提供的一个实用工具类。当你需要执行简单的性能测试或测试应用程序时，你会发现 `StopWatch`\
  \ 非常有用。\n\n`displayInfo()` 方法的最后一部分运行一个简单的性能测试，以查看哪个 bean 更快。显然，`standardLookupBean`\
  \ 应该更快，因为它每次都返回同一个实例，但了解其中的差异也很有趣。\n\n在运行示例之前，我们需要将 CGLIB 依赖项添加到项目中，如表 4-1 所示。有关在\
  \ STS 中添加项目依赖项的详细信息，请参考附录 A。\n\n![images](img/t0401.jpg)\n\n现在我们可以运行 `LookupDemo`\
  \ 类（清单 4-62）进行测试。以下是此示例的输出结果：\n\n`Helper Instances the Same?: true`\n`100000 gets\
  \ took 3 ms`\n`Helper Instances the Same?: false`\n`100000 gets took 367 ms`\n\n\
  如你所见，正如预期的那样，使用 `standardLookupBean` 时 helper 实例是相同的，而使用 `abstractLookupBean` 时则不同。使用\
  \ `standardLookupBean` 时存在明显的性能差异，但这也在意料之中。\n\n\n\n###### 方法查找注入的注意事项\n\n当你需要处理两个具有不同生命周期的\
  \ Bean 时，才应考虑使用方法查找注入。当 Bean 共享相同生命周期时，应避免使用该方法查找注入，尤其是当它们都是单例时。清单 4-62 展示了使用方法注入获取依赖新实例与使用标准\
  \ DI 获取依赖单一实例之间显著的性能差异。此外，即使面对不同生命周期的 Bean，也请确保不要无谓地使用方法查找注入。\n\n考虑这样一种情况：你有三个共享同一个依赖的单例\
  \ Bean。你希望每个单例拥有该依赖的独立实例，因此将依赖创建为非单例，但你又希望每个单例在其整个生命周期内使用该协作者的同一实例。在这种情况下，Setter\
  \ 注入是理想的解决方案；方法查找注入只会增加不必要的开销。\n\n在使用方法查找注入时，构建类时应牢记一些设计准则。在前面的示例中，我们在接口中声明了查找方法。这样做的唯一原因是我们无需为两种不同的\
  \ Bean 类型重复编写 `displayInfo()` 方法。如前所述，通常你不需要用仅用于 IoC 目的的不必要定义来污染业务接口。另一点需要牢记的是，虽然你不必将查找方法声明为抽象方法，但这样做可以防止你忘记配置查找方法，从而意外使用空实现。\n\
  \n##### 方法替换\n\n尽管 Spring 文档将方法替换归类为一种注入形式，但它与你目前所见到的注入方式截然不同。到目前为止，我们纯粹使用注入来为 Bean\
  \ 提供其协作者。使用方法替换，你可以任意替换任何 Bean 上任何方法的实现，而无需修改被修改 Bean 的源代码。例如，你在 Spring 应用程序中使用了一个第三方库，并且需要更改某个方法的逻辑。然而，由于该代码由第三方提供，你无法修改其源代码，一种解决方案就是使用方法替换，用你自己的实现来替换该方法的逻辑。\n\
  \n在内部，这是通过动态创建 Bean 类的子类来实现的。你使用 CGLIB，并将对要替换方法的调用重定向到另一个实现了 `MethodReplacer` 接口的\
  \ Bean。\n\n在清单 4-63 中，你可以看到一个简单的 Bean，它声明了 `formatMessage()` 方法的两个重载版本。\n\n***清单\
  \ 4-63.** `ReplacementTarget` 类*\n\n`package com.apress.prospring3.ch4.mi;`\n\n\
  `public class ReplacementTarget {`\n\n`   public String formatMessage(String msg)\
  \ {`\n`      return \"<h1>\" + msg + \"</h1>\";`\n`   }`\n\n`   public String formatMessage(Object\
  \ msg) {`\n`      return \"<h1>\" + msg + \"</h1>\";`\n`   }`\n`}`\n\n你可以使用 Spring\
  \ 的方法替换功能替换 `ReplacementTarget` 类中的任何方法。在此示例中，我们将向你展示如何替换 `formatMessage(String)`\
  \ 方法，并比较替换后方法与原始方法的性能。\n\n要替换一个方法，首先需要创建 `MethodReplacer` 接口的实现；如清单 4-64 所示。\n\n\
  ***清单 4-64.** 实现 `MethodReplacer`*\n\n`package com.apress.prospring3.ch4.mi;`\n\n\
  `import java.lang.reflect.Method;`\n\n`import org.springframework.beans.factory.support.MethodReplacer;`\n\
  \n`public class FormatMessageReplacer implements MethodReplacer {`\n\n`    public\
  \ Object reimplement(Object arg0, Method method, Object[] args)`\n`            throws\
  \ Throwable {`\n\n`        if (isFormatMessageMethod(method)) {`\n\n`            String\
  \ msg = (String) args[0];`\n\n`            return \"<h2>\" + msg + \"</h2>\";`\n\
  `        } else {`\n`            throw new IllegalArgumentException(\"Unable to\
  \ reimplement method \"`\n`                    + method.getName());`\n`        }`\n\
  `    }`\n\n`    private boolean isFormatMessageMethod(Method method) {`\n\n`        //\
  \ 检查参数数量是否正确`\n`        if (method.getParameterTypes().length != 1) {`\n`            return\
  \ false;`\n`        }`\n\n`        // 检查方法名称`\n`        if (!(\"formatMessage\"\
  .equals(method.getName()))) {`\n`            return false;`\n`        }`\n\n`        //\
  \ 检查返回类型`\n`        if (method.getReturnType() != String.class) {`\n`            return\
  \ false;`\n`        }`\n\n`        // 检查参数类型是否正确`\n`        if (method.getParameterTypes()[0]\
  \ != String.class) {`\n`            return false;`\n`        }`\n\n`        return\
  \ true;`\n`    }`\n`}`\n\n\n\n`MethodReplacer` 接口只有一个必须实现的方法 `reimplement()`。`reimplement()`\
  \ 方法接收三个参数：被调用原始方法的 Bean 对象、代表被覆盖方法的 `Method` 实例，以及传递给该方法的参数数组。`reimplement()` 方法应返回重新实现逻辑的结果，并且显然，返回值的类型必须与所替换方法的返回类型兼容。在清单\
  \ 4-64 中，`FormatMessageReplacer` 首先检查被覆盖的方法是否为 `formatMessage(String)` 方法；如果是，则执行替换逻辑——本例中是在消息前后添加\
  \ `<h2>` 和 `</h2>` 标签——并将格式化后的消息返回给调用者。检查方法是否正确并非必需，但如果你使用了多个参数相似的 `MethodReplacer`，这种检查会很有用。使用检查有助于防止意外使用了参数和返回类型兼容但功能不同的\
  \ `MethodReplacer`。\n\n清单 4-65 展示了一个 `ApplicationContext`，它定义了两个 `ReplacementTarget`\
  \ 类型的 Bean——其中一个替换了 `formatMessage(String)` 方法，另一个则没有（`replacement.xml`）。\n\n***清单\
  \ 4-65.** 配置方法替换*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\n\
  `    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\"\
  >`\n\n`    <bean id=\"methodReplacer\" class=\"com.apress.prospring3.ch4.mi.FormatMessageReplacer\"\
  />`\n\n`    <bean id=\"replacementTarget\" class=\"com.apress.prospring3.ch4.mi.ReplacementTarget\"\
  >`\n`        <replaced-method name=\"formatMessage\" replacer=\"methodReplacer\"\
  >`\n`            <arg-type>String</arg-type>`\n`        </replaced-method>`\n`    </bean>`\n\
  \n`    <bean id=\"standardTarget\" class=\"com.apress.prospring3.ch4.mi.ReplacementTarget\"\
  />`\n\n`</beans>`\n\n从清单 4-65 可以看出，`MethodReplacer` 实现被声明为 `ApplicationContext`\
  \ 中的一个 Bean。然后我们使用 `<replaced-method>` 标签替换了 `replacementTargetBean` 上的 `formatMessage(String)`\
  \ 方法。`<replaced-method>` 标签的 `name` 属性指定了要替换的方法名称，`replacer` 属性用于指定我们想要用来替换方法实现的\
  \ `MethodReplacer` Bean 的名称。在存在重载方法的情况下（例如 `ReplacementTarget` 类），你可以使用 `<arg-type>`\
  \ 标签来指定要匹配的方法签名。`<arg-type>` 支持模式匹配，因此 `String` 可以匹配 `java.lang.String` 以及 `java.lang.StringBuffer`。\n\
  \n清单 4-66 展示了一个简单的演示应用程序，它从 `ApplicationContext` 中获取 `standardTarget` 和 `replacementTarget`\
  \ 这两个 Bean，执行它们的 `formatMessage(String)` 方法，然后运行一个简单的性能测试，看看哪个更快。\n\n***清单 4-66.**\
  \ 方法替换实战*\n\n`package com.apress.prospring3.ch4.mi;`\n\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  `import org.springframework.util.StopWatch;`\n\n`public class MethodReplacementExample\
  \ {`\n\n`    public static void main(String[] args) {`\n\n`        GenericXmlApplicationContext\
  \ ctx = new GenericXmlApplicationContext();`\n`        ctx.load(\"classpath:replacement.xml\"\
  );`\n`        ctx.refresh();`\n\n`        ReplacementTarget replacementTarget =\
  \ (ReplacementTarget) ctx`\n`                .getBean(\"replacementTarget\");`\n\
  `        ReplacementTarget standardTarget = (ReplacementTarget) ctx`\n`                .getBean(\"\
  standardTarget\");`\n\n`        displayInfo(replacementTarget);`\n`        displayInfo(standardTarget);`\n\
  `    }`\n\n`    private static void displayInfo(ReplacementTarget target) {`\n`        System.out.println(target.formatMessage(\"\
  Hello World!\"));`\n\n`        StopWatch stopWatch = new StopWatch();`\n`        stopWatch.start(\"\
  perfTest\");`\n\n`        for (int x = 0; x < 1000000; x++) {`\n`            String\
  \ out = target.formatMessage(\"foo\");`\n`        }`\n\n`        stopWatch.stop();`\n\
  \n`        System.out.println(\"1000000 invocations took: \"`\n`                +\
  \ stopWatch.getTotalTimeMillis() + \" ms\");`\n`    }`\n`}`\n\n你现在应该对这段代码非常熟悉了，因此我们不再赘述。在我们的机器上运行此示例，会得到以下输出：\n\
  \n`<h2>Hello World!</h2>`\n`1000000 invocations took: 363 ms`\n`<h1>Hello World!</h1>`\n\
  `1000000 invocations took: 107 ms`\n\n正如预期的那样，`replacementTarget` Bean 的输出反映了 `MethodReplacer`\
  \ 提供的覆盖实现。但有趣的是，动态替换的方法比静态定义的方法慢了三倍多。在多次执行中，移除 `MethodReplacer` 中的有效方法检查带来的差异微乎其微，因此我们可以得出结论，大部分开销来自\
  \ CGLIB 子类。\n\n###### 何时使用方法替换\n\n方法替换在各种情况下都非常有用，尤其是当你只想为单个 Bean 覆盖特定方法，而不是为同一类型的所有\
  \ Bean 覆盖时。话虽如此，我们仍然更倾向于使用标准的 Java 机制来覆盖方法，而不是依赖运行时字节码增强。\n\n如果你打算在应用程序中使用方法替换，我们建议每个方法或每组重载方法使用一个\
  \ `MethodReplacer`。避免使用单个 `MethodReplacer` 来处理大量不相关的方法；这会导致代码在确定应重新实现哪个方法时进行大量不必要的字符串比较。我们发现，执行简单的检查以确保\
  \ `MethodReplacer` 正在处理正确的方法是有用的，并且不会给代码增加太多开销。如果你确实关心性能，可以简单地向 `MethodReplacer`\
  \ 添加一个布尔属性，从而允许你通过依赖注入来开启或关闭检查。\n\n\n\n#### 理解 Bean 命名\n\nSpring 支持相当复杂的 Bean 命名结构，使您能够灵活地处理多种不同情况。每个\
  \ Bean 必须至少有一个在包含它的 `ApplicationContext` 中唯一的名称。Spring 遵循一个简单的解析过程来确定 Bean 使用的名称。如果您为\
  \ `<bean>` 标签指定了 `id` 属性，则该属性的值将用作名称。如果未指定 `id` 属性，Spring 会查找 `name` 属性，如果定义了该属性，则使用\
  \ `name` 属性中定义的第一个名称。（我们之所以说第一个名称，是因为可以在 `name` 属性中定义多个名称；稍后将更详细地介绍这一点。）如果既未指定 `id`\
  \ 属性也未指定 `name` 属性，Spring 将使用 Bean 的类名作为名称，当然，前提是没有其他 Bean 使用相同的类名。如果多个没有定义 ID 或名称的\
  \ Bean 使用了相同的类名，Spring 将在 `ApplicationContext` 初始化期间的注入时抛出异常（类型为 `org.springframework.beans.factory.NoSuchBeanDefinitionException`）。清单\
  \ 4-67 展示了一个使用了所有三种命名方案的示例配置。\n\n***清单 4-67**. Bean 命名*\n\n`<bean id=\"string1\"\
  \ class=\"java.lang.String\"/>`\n`<bean name=\"string2\" class=\"java.lang.String\"\
  />`\n`<bean class=\"java.lang.String\"/>`\n\n从技术角度来看，这些方法中的每一种都是同样有效的，但对于您的应用程序来说，哪个是最佳选择呢？首先，避免使用按类自动命名的行为。这不允许您灵活地定义同一类型的多个\
  \ Bean，最好自己定义名称。这样，如果 Spring 将来更改默认行为，您的应用程序仍能继续工作。在选择使用 `id` 还是 `name` 时，始终使用 `id`\
  \ 来指定 Bean 的默认名称。在 Spring 3.1 之前，`id` 属性与 XML 标识（即 `xsd:ID`）相同，这对您可以使用的字符施加了限制。从\
  \ Spring 3.1 开始，Spring 对 `id` 属性使用 `xsd:String`，因此之前对可用字符的限制已不复存在。但是，Spring 将继续确保\
  \ `id` 在整个 `ApplicationContext` 中是唯一的。作为一般实践，您应该使用 `id` 为 Bean 命名，然后使用名称别名将 Bean\
  \ 与其他名称关联起来，如下一节所述。\n\n##### Bean 名称别名\n\nSpring 允许一个 Bean 拥有多个名称。您可以通过在 Bean 的\
  \ `<bean>` 标签的 `name` 属性中指定一个以空格、逗号或分号分隔的名称列表来实现这一点。您可以将其作为 `id` 属性的替代或补充使用。\n\n\
  除了使用 `name` 属性，您还可以使用 `<alias>` 标签为 Spring Bean 名称定义别名。清单 4-68 展示了一个简单的 `<bean>`\
  \ 配置，它为单个 Bean 定义了多个名称（`app-context-xml.xml`）。\n\n***清单 4-68**. 配置多个 Bean 名称*\n\n\
  `<bean id=\"name1\" name=\"name2 name3,name4;name5\" class=\"java.lang.String\"\
  />`\n`<alias name=\"name1\" alias=\"name6\"/>`\n\n如您所见，我们定义了六个名称：一个使用 `id` 属性，另外四个作为列表使用\
  \ `name` 属性中所有允许的 Bean 名称分隔符（这仅用于演示目的，不建议在实际开发中使用）。在实际开发中，建议您标准化应用程序中用于分隔 Bean 名称声明的分隔符。还使用\
  \ `<alias>` 标签定义了一个别名。清单 4-69 展示了一个示例 Java 例程，它使用不同的名称从 `ApplicationContext` 中六次获取同一个\
  \ Bean，并验证它们是同一个 Bean。\n\n***清单 4-69**. 使用别名访问 Bean*\n\n`package com.apress.prospring3.ch4.xml;`\n\
  \n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\n\
  `public class BeanNameAliasing {`\n\n`public static void main(String[] args) {`\n\
  \n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:app-context-xml.xml\");`\n`        ctx.refresh();`\n\
  `        String s1 = (String) ctx.getBean(\"name1\");`\n`        String s2 = (String)\
  \ ctx.getBean(\"name2\");`\n`        String s3 = (String) ctx.getBean(\"name3\"\
  );`\n`        String s4 = (String) ctx.getBean(\"name4\");`\n`        String s5\
  \ = (String) ctx.getBean(\"name5\");`\n`        String s6 = (String) ctx.getBean(\"\
  name6\");`\n\n`        System.out.println((s1 == s2));`\n`        System.out.println((s2\
  \ == s3));`\n`        System.out.println((s3 == s4));`\n`        System.out.println((s4\
  \ == s5));`\n`        System.out.println((s5 == s6));`\n`   }`\n`}`\n\n对于清单 4-68\
  \ 中包含的配置，此代码在控制台输出中打印五次 `true`，验证了使用不同名称访问的 Bean 实际上是同一个 Bean。\n\n您可以通过调用 `ApplicationContext.getAliases(String)`\
  \ 并传入 Bean 的任何一个名称或 ID 来获取 Bean 别名的列表。除了您指定的那个之外，其他别名的列表将作为字符串数组返回。\n\nBean 名称别名是一个奇怪的东西，因为在构建新应用程序时您通常不会使用它。如果您要让许多其他\
  \ Bean 注入另一个 Bean，那么它们最好使用相同的名称来访问该 Bean。但是，随着您的应用程序投入生产并进行维护工作、进行修改等，Bean 名称别名会变得更加有用。\n\
  \n考虑以下场景：您有一个应用程序，其中 50 个不同的 Bean（使用 Spring 配置）都需要一个 `Foo` 接口的实现。其中 25 个 Bean 使用名为\
  \ `standardFoo` 的 `StandardFoo` 实现，另外 25 个使用名为 `superFoo` 的 `SuperFoo` 实现。在应用程序投入生产六个月后，您决定将前\
  \ 25 个 Bean 迁移到 `SuperFoo` 实现。为此，您有三个选择：\n\n*   第一种是更改 `standardFoo` Bean 的实现类为\
  \ `SuperFoo`。这种方法的缺点是，当您实际上只需要一个 `SuperFoo` 实例时，却有两个实例存在。此外，当配置更改时，您现在需要修改两个 Bean。\n\
  *   第二种选择是更新正在更改的 25 个 Bean 的注入配置，将 Bean 的名称从 `standardFoo` 更改为 `superFoo`。这种方法并不是最优雅的方式——您可以执行查找和替换，但当管理层不满意时，回滚更改意味着要从版本控制系统中检索旧版本的配置。\n\
  *   第三种也是最理想的方法是删除（或注释掉）`standardFoo` Bean 的定义，并使 `standardFoo` 成为 `superFoo` 的别名。此更改需要最少的努力，并且将系统恢复到以前的配置也同样简单。\n\
  \n\n\n#### Bean 实例化模式\n\n默认情况下，Spring 中的所有 Bean 都是单例的。这意味着 Spring 会维护 Bean 的单一实例，所有依赖对象都使用同一个实例，并且对\
  \ `ApplicationContext.getBean()` 的所有调用都会返回同一个实例。我们在 清单 4-64 所示的先前示例中演示了这一点，当时我们能够使用恒等比较（==）而非\
  \ `equals()` 比较来检查 Bean 是否相同。\n\n术语 *singleton* 在 Java 中可互换地用于指代两个不同的概念：在应用程序中具有单一实例的对象，以及单例设计模式。我们将第一个概念称为\
  \ singleton，将单例模式称为 Singleton。单例设计模式因 Erich Gamma 等人所著的经典之作 *《设计模式：可复用面向对象软件的基础》*（Addison-Wesley，1995\
  \ 年）而广为人知。当人们将单例实例的需求与应用单例模式的需求混淆时，问题就出现了。清单 4-70 展示了 Java 中单例模式的典型实现。\n\n***清单\
  \ 4-70**。单例设计模式*\n\n`package com.apress.prospring3.ch4;`\n\n`public class Singleton\
  \ {`\n\n`   private static Singleton instance;`\n\n`   static {`\n`      instance\
  \ = new Singleton();`\n`   }`\n\n`   public static Singleton getInstance() {`\n\
  `      return instance;`\n`   }`\n`}`\n\n这种模式实现了其目标，即允许你在整个应用程序中维护和访问类的单一实例，但代价是增加了耦合性。你的应用程序代码必须始终显式地了解\
  \ `Singleton` 类才能获取实例——这完全消除了面向接口编程的能力。实际上，单例模式本身是两种模式的结合。第一种，也是期望的模式，涉及维护对象的单一实例。第二种，也是不太理想的模式，是一种对象查找模式，它完全排除了使用接口的可能性。使用单例模式还使得随意替换实现变得非常困难，因为大多数需要\
  \ `Singleton` 实例的对象都直接访问 `Singleton` 对象。当你尝试对应用程序进行单元测试时，这可能会引发各种麻烦，因为你无法用模拟对象来替换单例以进行测试。\n\
  \n幸运的是，借助 Spring，你可以利用单例实例化模型，而无需绕开单例设计模式。默认情况下，Spring 中的所有 Bean 都创建为 `Singleton`\
  \ 实例，并且 Spring 使用相同的实例来满足对该 Bean 的所有请求。当然，Spring 并不仅限于使用单例实例；它仍然可以为每个依赖项和每次对 `getBean()`\
  \ 的调用创建 Bean 的新实例。所有这些操作都不会对你的应用程序代码产生任何影响，因此，我们喜欢将 Spring 称为 *实例化模式无关*。这是一个非常强大的概念。如果你最初使用的对象是单例，但后来发现它并不真正适合多线程访问，你可以将其更改为非单例，而不会影响任何应用程序代码。\n\
  \n![images](img/square.jpg) **注意**  虽然更改 Bean 的实例化模式不会影响你的应用程序代码，但如果你依赖 Spring 的生命周期接口，则会导致一些问题。我们将在第\
  \ 5 章中更详细地讨论这一点。\n\n将实例化模式从单例更改为非单例很简单（参见 清单 4-71，即 `app-context-xml.xml` 文件）。\n\
  \n***清单 4-71**。非单例 Bean 配置*\n\n`    <bean id=\"nonSingleton\" class=\"java.lang.String\"\
  \ scope=\"prototype\">`\n`       <constructor-arg>`\n`          <value>Clarence\
  \ Ho</value>`\n`       </constructor-arg>`\n`    </bean>`\n\n如你所见，此 Bean 声明与你之前看到的任何声明之间的唯一区别在于，我们添加了\
  \ `scope` 属性并将其值设置为 `prototype`。Spring 默认将 scope 的值设为 `singleton`。prototype 作用域指示\
  \ Spring 在应用程序每次请求 Bean 实例时都实例化一个新的 Bean 实例。清单 4-72 展示了此设置对应用程序的影响。\n\n***清单 4-72**。非单例\
  \ Bean 的实际应用*\n\n`package com.apress.prospring3.ch4;`\n\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  \n`public class NonSingleton {`\n\n`    public static void main(String[] args) {`\n\
  \n`          GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `          ctx.load(\"classpath:app-context-xml.xml\");`\n`          ctx.refresh();`\n\
  \n`          String s1 = (String) ctx.getBean(\"nonSingleton\");`\n`          String\
  \ s2 = (String) ctx.getBean(\"nonSingleton\");`\n\n`          System.out.println(\"\
  Identity Equal?: \" + (s1 ==s2));`\n`          System.out.println(\"Value Equal:?\
  \ \" + s1.equals(s2));`\n`          System.out.println(s1);`\n`          System.out.println(s2);`\n\
  `    }`\n`}`\n\n运行此示例将得到以下输出：\n\n`Identity Equal?:  false`\n`Value Equal:? true`\n\
  `Clarence Ho`\n`Clarence Ho`\n\n从中可以看出，尽管两个 `String` 对象的值明显相等，但它们的身份并不相同，尽管两个实例都是使用相同的\
  \ Bean 名称检索的。\n\n\n\n##### 选择实例化模式\n\n在大多数场景下，很容易判断哪种实例化模式是合适的。通常我们发现单例是 Bean 的默认模式。一般来说，单例应在以下场景中使用：\n\
  \n*   ***无状态共享对象***：当你拥有一个不维护状态且有许多依赖对象的对象时。由于没有状态则无需同步，因此当依赖对象需要用它进行某些处理时，你实际上不必每次都创建\
  \ Bean 的新实例。\n*   ***只读状态共享对象***：这与上一点类似，但包含一些只读状态。在这种情况下，你仍然不需要同步，因此为每次对 Bean 的请求创建实例只会增加额外开销。\n\
  *   ***共享状态共享对象***：如果你有一个必须共享状态的 Bean，那么单例是理想的选择。在这种情况下，请确保对状态写入的同步尽可能精细。\n*   ***具有可写状态的高吞吐量对象***：如果你的应用程序中大量使用某个\
  \ Bean，那么你可能会发现，保持单例并同步所有对 Bean 状态的写访问，比不断创建数百个 Bean 实例能带来更好的性能。使用此方法时，请在不牺牲一致性的前提下尽量保持同步的粒度。你会发现，当你的应用程序在长时间内创建大量实例、共享对象只有少量可写状态，或者新实例的创建成本很高时，这种方法特别有用。\n\
  \n在以下场景中，你应该考虑使用非单例：\n\n*   ***具有可写状态的对象***：如果你有一个包含大量可写状态的 Bean，那么你可能会发现同步的成本高于为处理依赖对象的每次请求而创建新实例的成本。\n\
  *   ***具有私有状态的对象***：在某些情况下，你的依赖对象需要一个具有私有状态的 Bean，以便它们能够与依赖该 Bean 的其他对象分开进行处理。在这种情况下，单例显然不合适，你应该使用非单例。\n\
  \n你从 Spring 的实例化管理中获得的主要好处是，你的应用程序可以立即受益于单例带来的更低内存使用率，而无需你付出太多努力。然后，如果你发现单例不能满足应用程序的需求，修改配置以使用非单例模式也是一项微不足道的任务。\n\
  \n##### Bean 作用域\n\n除了单例和原型作用域之外，在定义 Spring Bean 用于更特定目的时，还存在其他作用域。你也可以实现自己的自定义作用域，并将其注册到\
  \ Spring 的 `ApplicationContext` 中。以下是自 3.1 版本起支持的 Bean 作用域：\n\n*   ***单例***：默认的单例作用域。\n\
  *   ***原型***：当应用程序请求时，Spring 将创建一个新实例。\n*   ***请求***：用于 Web 应用程序。当使用 Spring MVC\
  \ 进行 Web 应用程序开发时，每个 HTTP 请求都会实例化请求作用域的 Bean，并在请求完成后销毁。\n*   ***会话***：用于 Web 应用程序。当使用\
  \ Spring MVC 进行 Web 应用程序开发时，每个 HTTP 会话都会实例化会话作用域的 Bean，并在会话结束时销毁。\n*   ***全局会话***：用于基于\
  \ Portlet 的 Web 应用程序。全局会话作用域的 Bean 可以在同一个 Spring MVC 驱动的门户应用程序中的所有 Portlet 之间共享。\n\
  *   ***线程***：当新线程请求时，Spring 将创建一个新的 Bean 实例，而对于同一个线程，将返回相同的 Bean 实例。请注意，此作用域默认未注册。\n\
  *   ***自定义***：可以通过实现接口 `org.springframework.beans.factory.config.Scope` 并在 Spring\
  \ 的配置中注册自定义作用域（对于 XML，使用类 `org.springframework.beans.factory.config.CustomScopeConfigurer`）来创建的自定义\
  \ Bean 作用域。\n\n### 解决依赖关系\n\n在正常运行期间，Spring 能够通过简单地查看你的配置文件或类中的注解来解决依赖关系。通过这种方式，Spring\
  \ 可以确保每个 Bean 按正确的顺序进行配置，从而使每个 Bean 的依赖关系都得到正确配置。如果 Spring 不执行此操作，而只是以任意顺序创建和配置\
  \ Bean，那么一个 Bean 可能会在其依赖项之前被创建和配置。这显然不是你想要的，并且会在你的应用程序中导致各种问题。\n\n不幸的是，Spring 无法感知代码中\
  \ Bean 之间存在的任何依赖关系。例如，考虑一个名为 BeanA 的 Bean，它在构造函数中通过调用 `getBean()` 获取另一个名为 BeanB\
  \ 的 Bean 的实例。例如，在 BeanA 的构造函数中，你通过调用 `ctx.getBean(\"beanB\")` 获取 BeanB 的实例，而没有要求\
  \ Spring 为你注入依赖。在这种情况下，Spring 不知道 BeanA 依赖于 BeanB，因此它可能会在 BeanB 之前实例化 BeanA。你可以使用\
  \ `<bean>` 标签的 `depends-on` 属性向 Spring 提供关于 Bean 依赖关系的额外信息。清单 4-73 展示了如何配置 BeanA\
  \ 和 BeanB 的场景。\n\n***清单 4-73**. 手动定义依赖关系*\n\n`<bean id=\"beanA\" class=\"com.apress.prospring.ch4.BeanA\"\
  \ depends-on=\"beanB\"/>`\n`<bean id=\"beanB\" class=\"com.apress.prospring.ch4.BeanB\"\
  />`\n\n在此配置中，我们断言 Bean `beanA` 依赖于 Bean `beanB`。Spring 在实例化 Bean 时会考虑这一点，并确保 `beanB`\
  \ 在 `beanA` 之前创建。\n\n在开发应用程序时，请避免设计使用此功能的应用程序；相反，应通过 Setter 注入和构造器注入契约来定义你的依赖关系。但是，如果你正在将\
  \ Spring 与遗留代码集成，那么你可能会发现代码中定义的依赖关系需要你向 Spring 框架提供额外的信息。\n\n### 自动装配你的 Bean\n\n\
  到目前为止的所有示例中，我们都必须通过配置文件显式定义各个 Bean 是如何装配在一起的。如果你不喜欢手动装配所有组件，那么你可以让 Spring 尝试自动完成。默认情况下，自动装配是禁用的。要启用它，你需要通过要自动装配的\
  \ Bean 的 `autowire` 属性来指定要使用的自动装配方法。\n\n\n\n#### 自动装配的不同模式\n\nSpring 支持四种自动装配模式：`byName`、`byType`、`constructor`、`default`\
  \ 和 `no`（此为默认模式）。使用 `byName` 自动装配时，Spring 会尝试将每个属性与同名的 Bean 进行装配。因此，如果目标 Bean 有一个名为\
  \ `foo` 的属性，并且在 `ApplicationContext` 中定义了一个 `foo` Bean，那么 `foo` Bean 就会被赋值给目标的 `foo`\
  \ 属性。\n\n使用 `byType` 自动装配时，Spring 会尝试使用 `ApplicationContext` 中相同类型的 Bean 来自动装配目标\
  \ Bean 上的每个属性。因此，如果目标 Bean 有一个 `String` 类型的属性，并且在 `ApplicationContext` 中有一个 `String`\
  \ 类型的 Bean，那么 Spring 就会将这个 `String` Bean 装配到目标 Bean 的 `String` 属性上。如果在同一个 `ApplicationContext`\
  \ 中有多个相同类型（本例中为 `String`）的 Bean，那么 Spring 将无法决定使用哪一个进行自动装配，并会抛出一个异常（类型为 `org.springframework.beans.factory.NoSuchBeanDefinitionException`）。\n\
  \n`constructor` 自动装配模式的功能与 `byType` 装配类似，区别在于它使用构造器而不是 setter 方法来执行注入。Spring 会尝试匹配构造器中尽可能多的参数。因此，如果你的\
  \ Bean 有两个构造器，一个接受 `String`，另一个接受 `String` 和 `Integer`，并且在你的 `ApplicationContext`\
  \ 中同时存在一个 `String` Bean 和一个 `Integer` Bean，那么 Spring 会使用双参数构造器。\n\n在 `default` 模式下，Spring\
  \ 会自动在 `constructor` 和 `byType` 模式之间进行选择。如果你的 Bean 有一个默认（无参数）构造器，那么 Spring 会使用 `byType`；否则，它会使用\
  \ `constructor`。\n\n清单 4-74 展示了一个简单的配置，它使用每种不同的模式（`autowiring.xml`）自动装配了三个相同类型的\
  \ Bean。\n\n***清单 4-74**. 配置自动装配*\n\n`    <bean id=\"foo\" class=\"com.apress.prospring3.ch4.autowiring.Foo\"\
  />`\n`    <bean id=\"bar1\" class=\"com.apress.prospring3.ch4.autowiring.Bar\"/>`\n\
  \n`    <bean id=\"targetByName\" autowire=\"byName\" class=\"com.apress.prospring3.ch4.autowiring.Target\"\
  `\n`        lazy-init=\"true\"/>`\n`    <bean id=\"targetByType\" autowire=\"byType\"\
  \ class=\"com.apress.prospring3.ch4.autowiring.Target\"`\n`        lazy-init=\"\
  true\"/>`\n`    <bean id=\"targetConstructor\" autowire=\"constructor\"`\n`class=\"\
  com.apress.prospring3.ch4.autowiring.Target\"`\n`    lazy-init=\"true\"/>`\n\n现在，这个配置对你来说应该非常熟悉了。`Foo`\
  \ 和 `Bar` 是空类。请注意，每个 `Target` Bean 的 `autowire` 属性都有不同的值。此外，`lazy-init` 属性被设置为 `true`，以告知\
  \ Spring 仅在首次请求时才实例化该 Bean，而不是在启动时，这样我们就可以在测试程序的正确位置输出结果。清单 4-75 展示了一个简单的 Java 应用程序，它从\
  \ `ApplicationContext` 中检索每个 `Target` Bean。\n\n***清单 4-75**. 自动装配协作者*\n\n`package\
  \ com.apress.prospring3.ch4.autowiring;`\n\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  \n`public class Target {`\n\n`    private Foo foo;`\n`    private Foo foo2;`\n\n\
  `    private Bar bar;`\n\n`    public Target() {`\n`    }`\n\n`    public Target(Foo\
  \ foo) {`\n`        System.out.println(\"Target(Foo) called\");`\n`    }`\n\n`    public\
  \ Target(Foo foo, Bar bar) {`\n`        System.out.println(\"Target(Foo, Bar) called\"\
  );`\n`    }`\n\n`    public void setFoo(Foo foo) {`\n`        this.foo = foo;`\n\
  `        System.out.println(\"Property foo set\");`\n`    }`\n\n`    public void\
  \ setFoo2(Foo foo) {`\n`        this.foo2 = foo;`\n`        System.out.println(\"\
  Property foo2 set\");`\n`    }`\n\n`    public void setBar(Bar bar) {`\n`        this.bar\
  \ = bar;`\n`        System.out.println(\"Property bar set\");`\n`    }`\n\n`    public\
  \ static void main(String[] args) {`\n`        GenericXmlApplicationContext ctx\
  \ = new GenericXmlApplicationContext();`\n`        ctx.load(\"classpath:autowiring.xml\"\
  );`\n`        ctx.refresh();`\n\n`        Target t = null;`\n\n`        System.out.println(\"\
  Using byName:\\n\");`\n`        t = (Target) ctx.getBean(\"targetByName\");`\n\n\
  `        System.out.println(\"\\nUsing byType:\\n\");`\n`        t = (Target) ctx.getBean(\"\
  targetByType\");`\n\n`        System.out.println(\"\\nUsing constructor:\\n\");`\n\
  `        t = (Target) ctx.getBean(\"targetConstructor\");`\n\n`    }`\n`}`\n\n在这段代码中，你可以看到\
  \ `Target` 类有三个构造器：一个无参构造器、一个接受 `Foo` 实例的构造器，以及一个接受 `Foo` 和 `Bar` 实例的构造器。除了这些构造器之外，`Target`\
  \ Bean 还有三个属性：两个 `Foo` 类型和一个 `Bar` 类型。这些属性和构造器在被调用时都会向控制台输出一条消息。main 方法只是从 `ApplicationContext`\
  \ 中检索每个声明的 `Target` Bean，从而触发自动装配过程。以下是运行此示例的输出：\n\n`Using byName:`\n\n`Property\
  \ foo set`\n\n`Using byType:`\n\n`Property bar set`\n`Property foo set`\n`Property\
  \ foo2 set`\n\n`Using constructor:`\n\n`Target(Foo, Bar) called`\n\n从输出中可以看出，当 Spring\
  \ 使用 `byName` 时，唯一被设置的属性是 `foo` 属性，因为这是唯一一个在配置文件中具有对应 Bean 条目的属性。当使用 `byType` 时，Spring\
  \ 会设置所有三个属性的值。`foo` 和 `foo2` 属性由 `foo` Bean 设置，`bar` 属性由 `bar1` Bean 设置。当使用 `constructor`\
  \ 时，Spring 会使用双参数构造器，因为 Spring 可以为这两个参数提供 Bean，并且不需要回退到另一个构造器。\n\n#### 何时使用自动装配\n\
  \n在大多数情况下，对于是否应该使用自动装配这个问题，答案绝对是“不！”自动装配可以在小型应用程序中为你节省时间，但在许多情况下，它会导致不良实践，并且在大型应用程序中缺乏灵活性。使用\
  \ `byName` 似乎是个好主意，但它可能会导致你为类赋予人为的属性名称，以便利用自动装配功能。Spring 背后的整个理念是，你可以按照自己喜欢的方式创建类，然后让\
  \ Spring 为你工作，而不是反过来。你可能会倾向于使用 `byType`，直到你意识到在 `ApplicationContext` 中每种类型只能有一个\
  \ Bean——当你需要维护同一类型但配置不同的 Bean 时，这个限制会带来问题。同样的论点也适用于 `constructor` 自动装配的使用。\n\n在某些情况下，自动装配可以节省时间，但显式定义装配实际上并不需要付出太多额外的努力，而且你可以从显式的语义、属性命名的完全灵活性以及管理同一类型实例的数量中受益。对于任何非平凡的应用程序，请不惜一切代价避免使用自动装配。\n\
  \n\n\n### Bean 继承\n\n在某些情况下，你可能需要多个类型相同或实现同一接口的 Bean 定义。如果你希望这些 Bean 共享部分配置设置，而其他设置各自独立，这就会带来问题。手动保持共享配置设置同步的过程极易出错，并且在大型项目中，这样做会非常耗时。为了解决这个问题，Spring\
  \ 允许你定义一个 `<bean>`，使其从同一 `ApplicationContext` 中的另一个 Bean 继承属性设置。你可以根据需要覆盖子 Bean\
  \ 上任何属性的值，从而拥有完全的控制权，而父 Bean 可以为你的每个 Bean 提供基础配置。清单 4-76 展示了一个包含两个 Bean 的简单配置，其中一个\
  \ Bean 是另一个的子 Bean（`app-context-xml.xml`）。\n\n***清单 4-76**. 配置 Bean 继承*\n\n`    <bean\
  \ id=\"inheritParent\" class=\"com.apress.prospring3.ch4.inheritance.SimpleBean\"\
  >`\n`        <property name=\"name\">`\n`            <value>Clarence Ho</value>`\n\
  `        </property>`\n`        <property name=\"age\">`\n`            <value>22</value>`\n\
  `        </property>`\n`    </bean>`\n\n`    <bean id=\"inheritChild\" class=\"\
  com.apress.prospring3.ch4.inheritance.SimpleBean\"`\n`        parent=\"inheritParent\"\
  >`\n`        <property name=\"age\">`\n`            <value>35</value>`\n`        </property>`\n\
  `    </bean>`\n\n在这段代码中，你可以看到 `inheritChild` Bean 的 `<bean>` 标签有一个额外的属性 `parent`，它指示\
  \ Spring 应将 `inheritParent` Bean 视为该 Bean 的父 Bean。如果你不希望父 Bean 定义可以从 `ApplicationContext`\
  \ 中查找，可以在声明父 Bean 时，在 `<bean>` 标签中添加 `abstract=\"true\"` 属性。由于 `inheritChild` Bean\
  \ 为 `age` 属性提供了自己的值，Spring 会将该值传递给 Bean。然而，`inheritChild` 没有为 `name` 属性提供值，因此 Spring\
  \ 会使用赋予 `inheritParent` Bean 的值。清单 4-77 展示了前面配置中使用的 `SimpleBean` 类的代码。\n\n***清单\
  \ 4-77**. `SimpleBean` 类*\n\n`package com.apress.prospring3.ch4.inheritance;`\n\n\
  `import org.springframework.context.support.GenericXmlApplicationContext;`\n\n`public\
  \ class SimpleBean {`\n\n`    public String name;`\n\n`    public int age;`\n\n\
  `    public static void main(String[] args) {`\n\n`        GenericXmlApplicationContext\
  \ ctx = new GenericXmlApplicationContext();`\n`        ctx.load(\"classpath:app-context-xml.xml\"\
  );`\n\n`        SimpleBean parent = (SimpleBean) ctx.getBean(\"inheritParent\");`\n\
  `        SimpleBean child = (SimpleBean) ctx.getBean(\"inheritChild\");`\n\n`        System.out.println(\"\
  Parent:\\n\" + parent);`\n`        System.out.println(\"Child:\\n\" + child);`\n\
  `    }`\n\n`    public void setName(String name) {`\n`        this.name = name;`\n\
  `    }`\n\n`    public void setAge(int age) {`\n`        this.age = age;`\n`    }`\n\
  \n`    public String toString() {`\n`        return    \"Name: \" + name + \"\\\
  n\"`\n`                + \"Age: \" + age;`\n`    }`\n`}`\n\n如你所见，`SimpleBean` 类的\
  \ `main()` 方法从 `ApplicationContext` 中获取了 `inheritChild` 和 `inheritParent` 两个 Bean，并将其属性内容输出到\
  \ `stdout`。以下是该示例的输出：\n\n`Parent:`\n`Name: Clarence Ho`\n`Age: 22`\n`Child:`\n`Name:\
  \ Clarence Ho`\n`Age: 35`\n\n正如预期，`inheritChild` Bean 从 `inheritParent` Bean 继承了\
  \ `name` 属性的值，但能够为 `age` 属性提供自己的值。\n\n子 Bean 会从父 Bean 继承构造器参数和属性值，因此你可以在 Bean 继承中使用两种注入方式。这种灵活性使得\
  \ Bean 继承成为构建包含多个 Bean 定义的应用程序的强大工具。如果你要声明许多具有共享属性值的同类型 Bean，请避免使用复制粘贴来共享值；相反，应在配置中建立一个继承层次结构。\n\
  \n使用继承时，请记住 Bean 继承不必与 Java 继承层次结构相匹配。对五个相同类型的 Bean 使用 Bean 继承是完全可接受的。可以将 Bean 继承更多地视为一种模板功能，而非继承功能。但请注意，如果你要更改子\
  \ Bean 的类型，则该类型必须与父 Bean 的类型兼容。\n\n### 本章小结\n\n在本章中，我们广泛探讨了 Spring 核心和 IoC 的各个方面。我们展示了不同类型\
  \ IoC 的示例，并讨论了在应用程序中使用每种机制的优缺点。我们研究了 Spring 提供了哪些 IoC 机制，以及在应用程序中何时使用以及何时不使用它们。在探索\
  \ IoC 的过程中，我们介绍了 Spring 的 `BeanFactory`，它是 Spring IoC 能力的核心组件，然后介绍了 `ApplicationContext`，它扩展了\
  \ `BeanFactory` 并提供了额外的功能。对于 `ApplicationContext`，我们重点介绍了 `GenericXmlApplicationContext`，它允许使用\
  \ XML 对 Spring 进行外部配置。我们还讨论了另一种为 `ApplicationContext` 声明 DI 需求的方法，即使用 Java 注解。\n\
  \n本章还向你介绍了 Spring IoC 功能集的基础知识，包括 Setter 注入、构造器注入、方法注入、自动装配和 Bean 继承。在配置的讨论中，我们演示了如何使用各种不同的值（包括其他\
  \ Bean）来配置 Bean 属性，同时使用了 XML 和注解类型的配置以及 `GenericXmlApplicationContext`。\n\n本章只是浅尝辄止地介绍了\
  \ Spring 及其 IoC 容器。在下一章中，我们将探讨一些 Spring 特有的 IoC 相关特性，并更详细地了解 Spring 核心中可用的其他功能。\n\
  \n## 第 5 章\n\n## Spring 配置详解\n\n在上一章中，我们详细探讨了控制反转（IoC）的概念以及它如何融入 Spring 框架。然而，正如我们在上一章结尾所说，我们实际上只是触及了\
  \ Spring 核心能力的皮毛。\n\nSpring 提供了广泛的服务来补充和扩展基本的 IoC 能力。许多项目都提供了 IoC 容器，但到目前为止，没有一个能提供像\
  \ Spring 这样全面的功能集。在本章中，我们将详细探讨 Spring 提供的一些额外的 IoC 相关特性，以及 Spring 核心提供的其他功能。此外，我们还将探讨在配置\
  \ Spring 的 `ApplicationContext` 时如何使用 Java 类，以及 3.0 和 3.1 版本中存在的一些用于更高级配置选项的新特性。具体来说，我们将探讨以下内容：\n\
  \n\n\n*   *管理 Bean 的生命周期：* 到目前为止，您所见到的所有 Bean 都相当简单，并且与 Spring 容器完全解耦。在本节中，我们将探讨一些策略，您可以使用这些策略让您的\
  \ Bean 在其生命周期的各个阶段接收来自 Spring 容器的通知。您可以通过实现 Spring 规定的特定接口、指定 Spring 可通过反射调用的方法，或者使用\
  \ JSR-250 JavaBeans 生命周期注解来实现这一点。\n*   *让您的 Bean “感知 Spring”：* 在某些情况下，您希望 Bean 能够与配置它的\
  \ `ApplicationContext` 进行交互。为此，Spring 提供了两个接口：`BeanNameAware` 和 `ApplicationContextAware`，它们分别允许您的\
  \ Bean 获取其分配的名称（即 `<bean>` 标签中的 `id` 或 `name` 属性，其中 `id` 属性优先级更高）以及引用其 `ApplicationContext`。本章的这一部分将探讨如何实现这些接口，并给出在应用程序中使用它们的一些实际考虑。\n\
  *   *使用 FactoryBeans：* 顾名思义，`FactoryBean` 接口旨在由任何充当其他 Bean 工厂的 Bean 来实现。`FactoryBean`\
  \ 接口提供了一种机制，通过该机制，您可以轻松地将自己的工厂与 Spring 的 `BeanFactory` 集成。\n*   *使用 JavaBeans PropertyEditors：*\
  \ `PropertyEditor` 接口是 `java.beans` 包中提供的标准接口。`PropertyEditor` 用于将属性值与 `String`\
  \ 表示形式相互转换。Spring 广泛使用 `PropertyEditor`，主要用于读取在 `BeanFactory` 配置中指定的值，并将其转换为正确的类型。在本章的这一部分，我们将讨论\
  \ Spring 提供的一组 `PropertyEditor`，以及如何在您的应用程序中使用它们。我们还将探讨如何实现自定义的 `PropertyEditor`。\n\
  *   *深入了解 Spring ApplicationContext：* 如前一章所述，`ApplicationContext` 是 `BeanFactory`\
  \ 的扩展，旨在用于完整的应用程序。`ApplicationContext` 接口提供了一组有用的附加功能，包括国际化消息提供、资源加载和事件发布。在本章中，我们将详细探讨\
  \ `ApplicationContext` 在 IoC 之外提供的功能。我们还会稍微超前一点，看看在构建 Web 应用程序时，`ApplicationContext`\
  \ 如何简化 Spring 的使用。\n*   *使用 Java 类进行配置：* 在 3.0 版本之前，Spring 仅支持基于 XML 的配置，并结合注解进行\
  \ Bean 和依赖配置。从 3.0 版本开始，Spring 为开发者提供了另一种选择，即使用 Java 类来配置 Spring `ApplicationContext`。我们将探讨\
  \ Spring 应用程序配置中的这一新选项。\n*   *Spring 3.1 配置中的新特性：* Spring 3.1 提供了一些与配置相关的有用新特性，例如配置文件管理、环境和属性源抽象等。在本节中，我们将探讨这些特性，并展示如何使用它们来满足特定的配置需求。\n\
  \n### Spring 对应用程序可移植性的影响\n\n本章讨论的大多数特性都是 Spring 特有的，并且在许多情况下，其他 IoC 容器中并不具备这些特性。尽管许多\
  \ IoC 容器都提供生命周期管理功能，但它们可能通过一套与 Spring 不同的接口来实现。如果您的应用程序在不同 IoC 容器之间的可移植性确实很重要，那么您可能希望避免使用某些将应用程序与\
  \ Spring 耦合在一起的特性。\n\n但是请记住，通过设定“您的应用程序可在 IoC 容器之间移植”这一约束，您将失去 Spring 提供的丰富功能。既然您很可能已经战略性地选择了使用\
  \ Spring，那么充分利用其能力是明智之举。\n\n注意不要凭空制造出对可移植性的需求。在许多情况下，应用程序的最终用户并不关心它是否能在三种不同的 IoC\
  \ 容器上运行；他们只希望它能正常运行。根据我们的经验，试图在所选技术中可用的最低公共特性集上构建应用程序通常是一个错误。这样做往往从一开始就让您的应用程序处于劣势。然而，如果您的应用程序确实需要\
  \ IoC 容器的可移植性，那么请不要将其视为一个缺点——这是一个真实的需求，因此也是您的应用程序应该满足的需求。在《Expert One-on-One: J2EE\
  \ Development without EJB》（Wrox, 2004）一书中，Rod Johnson 和 Jürgen Höller 将这类需求描述为“幻影需求”，并对其进行了更详细的讨论，以及它们如何影响您的项目。\n\
  \n虽然使用这些特性可能会将您的应用程序与 Spring 框架耦合，但实际上，您是在更广泛的范围内提高了应用程序的可移植性。请考虑一下，您正在使用一个免费、开源且没有特定供应商关联的框架。使用\
  \ Spring 的 IoC 容器构建的应用程序可以在任何运行 Java 的地方运行。对于 Java 企业应用程序，Spring 为可移植性开辟了新的可能性。Spring\
  \ 提供了许多与 JEE 相同的能力，还提供了用于抽象和简化 JEE 许多其他方面的类。在许多情况下，可以使用 Spring 构建一个在简单 Servlet 容器中运行的\
  \ Web 应用程序，但其复杂程度与针对完整 JEE 应用服务器的应用程序相当。通过与 Spring 耦合，您可以用 Spring 中的等效特性替换许多供应商特定或依赖于供应商配置的特性，从而提高应用程序的可移植性。\n\
  \n\n\n### Bean 生命周期管理\n\n任何 IoC 容器（包括 Spring）的一个重要方面是，Bean 可以被构造为在其生命周期的特定时刻接收通知。这使得你的\
  \ Bean 能够在整个生命周期中的特定时间点执行相关处理。通常，有两个生命周期事件与 Bean 特别相关：初始化后和销毁前。\n\n在 Spring 的上下文中，一旦\
  \ Spring 完成对 Bean 所有属性值的设置，并完成你配置它执行的所有依赖检查后，就会触发初始化后事件。销毁前事件则在 Spring 销毁 Bean 实例之前触发。但是，对于原型作用域的\
  \ Bean，Spring 不会触发销毁前事件。Spring 的设计是，无论 Bean 的作用域如何，都会调用初始化生命周期回调方法；而对于原型作用域的 Bean，则不会调用销毁生命周期回调方法。Spring\
  \ 提供了三种机制，Bean 可以使用它们来接入这些事件并执行一些额外的处理：基于接口的机制、基于方法的机制和基于注解的机制。\n\n使用基于接口的机制，你的\
  \ Bean 实现一个特定于它想要接收的通知类型的接口，然后 Spring 通过接口中定义的回调方法通知 Bean。对于基于方法的机制，Spring 允许你在\
  \ `ApplicationContext` 配置中指定 Bean 初始化时要调用的方法名称，以及 Bean 销毁时要调用的方法名称。对于基于注解的机制，你可以使用\
  \ JSR-250 注解来指定 Spring 在构造后或销毁前应调用的方法。\n\n对于这两个事件，这些机制实现的目标完全相同。接口机制在 Spring 中被广泛使用，这样你就不必在每次使用\
  \ Spring 的某个组件时都记得指定初始化或销毁方法。然而，在你自己的 Bean 中，使用基于方法或基于注解的机制可能更好，因为你的 Bean 不需要实现任何\
  \ Spring 特定的接口。尽管我们说过，可移植性通常不像许多书籍让你相信的那样是一个重要的需求，但这并不意味着当存在一个完全可行的替代方案时，你应该牺牲可移植性。也就是说，如果你正在以其他方式将应用程序与\
  \ Spring 耦合，那么使用接口方法可以让你一次性指定回调，然后就可以忘记它。如果你正在定义许多需要利用生命周期通知的相同类型的 Bean，那么使用接口机制可以避免在\
  \ XML 配置文件中为每个 Bean 指定生命周期回调方法。使用 JSR-250 注解是另一个可行的选择，因为它是 JCP 定义的标准，并且你也不会与 Spring\
  \ 的特定注解耦合。只需确保你运行应用程序的 IoC 容器支持 JSR-250 标准即可。\n\n总的来说，选择哪种机制来接收生命周期通知取决于你的应用程序需求。如果你关心可移植性，或者你只是定义了一两个需要回调的特定类型的\
  \ Bean，那么请使用基于方法的机制。如果你使用注解类型的配置，并且确定你正在使用支持 JSR-250 的 IoC 容器，那么请使用注解机制。如果你不太关心可移植性，或者你正在定义许多需要生命周期通知的相同类型的\
  \ Bean，那么使用基于接口的机制是确保你的 Bean 始终收到它们期望的通知的最佳方式。如果你计划在多个不同的 Spring 项目中使用一个 Bean，那么你几乎肯定希望该\
  \ Bean 的功能尽可能自包含，因此你应该坚决使用基于接口的机制。\n\n图 5-1 展示了 Spring 如何管理其容器内 Bean 生命周期的高级概述。\n\
  \n![images](img/9781430241072_Fig05-01.jpg)\n\n***图 5-1.** Spring Bean 的生命周期*\n\n\
  #### 接入 Bean 的创建\n\n通过了解何时被初始化，Bean 可以检查其所有必需的依赖项是否都已满足。尽管 Spring 可以为你检查依赖项，但这几乎是一种全有或全无的方法，并且它不提供任何机会将额外的逻辑应用于依赖项解析过程。考虑一个\
  \ Bean，它有四个声明为 setter 的依赖项，其中两个是必需的，一个在没有提供依赖项的情况下具有合适的默认值。使用初始化回调，你的 Bean 可以检查它所需的依赖项，在需要时抛出异常或提供默认值。\n\
  \nBean 无法在其构造函数中执行这些检查，因为此时 Spring 还没有机会为它可以满足的依赖项提供值。Spring 中的初始化回调是在 Spring 完成提供它可以提供的依赖项并执行你要求的任何依赖项检查之后调用的。\n\
  \n你不必将初始化回调仅限于检查依赖项；你可以在回调中做任何你想做的事情，但它对于我们描述的目的最为有用。在许多情况下，初始化回调也是触发你的 Bean 必须根据其配置自动执行的任何操作的地方。例如，如果你构建一个\
  \ Bean 来运行定时任务，那么初始化回调提供了启动调度器的理想位置——毕竟，配置数据是在 Bean 上设置的。\n\n![images](img/square.jpg)\
  \ **注意** 你不需要编写一个 Bean 来运行定时任务，因为这是 Spring 可以通过其内置的调度功能或通过与 Quartz 调度器的集成自动完成的事情。我们将在第\
  \ 15 章中更详细地介绍这一点。\n\n\n\n##### 在 Bean 创建时执行方法\n\n如前所述，接收初始化回调的一种方式是在 Bean 上指定一个方法作为初始化方法，并告知\
  \ Spring 将其用作初始化方法。正如讨论过的，当你只有少数几个相同类型的 Bean，或者希望保持应用程序与 Spring 解耦时，这种回调机制非常有用。使用该机制的另一个原因是，它能让你的\
  \ Spring 应用程序与之前构建的或由第三方供应商提供的 Bean 协同工作。\n\n指定回调方法只需在 Bean 的 `<bean>` 标签的 `init-method`\
  \ 属性中指定方法名称即可。代码清单 5-1 展示了一个包含两个依赖项的基本 Bean。\n\n***代码清单 5-1.** `SimpleBean` 类*\n\
  \n`package com.apress.prospring3.ch5.lifecycle;`\n\n`import org.springframework.beans.factory.BeanCreationException;`\n\
  `import org.springframework.context.ApplicationContext;`\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  \n`public class SimpleBean {`\n\n`    private static final String DEFAULT_NAME =\
  \ \"Luke Skywalker\";`\n\n`    private String name = null;`\n\n`    private int\
  \ age = Integer.MIN_VALUE;`\n\n`    public void setName(String name) {`\n`        this.name\
  \ = name;`\n`    }`\n\n`    public void setAge(int age) {`\n`        this.age =\
  \ age;`\n`    }`\n\n`    public void init() {`\n`        System.out.println(\"Initializing\
  \ bean\");`\n\n`       if (name == null) {`\n`            System.out.println(\"\
  Using default name\");`\n`            name = DEFAULT_NAME;`\n`        }`\n\n`        if\
  \ (age == Integer.MIN_VALUE) {`\n`            throw new IllegalArgumentException(`\n\
  `                    \"You must set the age property of any beans of type \" + SimpleBean.class);`\n\
  `        }`\n`    }`\n\n`    public String toString() {`\n`        return \"Name:\
  \ \" + name + \"\\nAge: \" + age;`\n`    }`\n\n`    public static void main(String[]\
  \ args) {`\n\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:lifecycle/initMethod.xml\");`\n`        ctx.refresh();\
  \ // 加载 XML 配置文件后刷新 ApplicationContext`\n\n`        SimpleBean simpleBean1 = getBean(\"\
  simpleBean1\", ctx);`\n`        SimpleBean simpleBean2 = getBean(\"simpleBean2\"\
  , ctx);`\n`        SimpleBean simpleBean3 = getBean(\"simpleBean3\", ctx);`\n`    }`\n\
  \n`    private static SimpleBean getBean(String beanName, ApplicationContext ctx)\
  \ {`\n`        try {`\n`            SimpleBean bean =(SimpleBean) ctx.getBean(beanName);`\n\
  `            System.out.println(bean);`\n`            return bean;`\n`        }\
  \ catch (BeanCreationException ex) {`\n`            System.out.println(\"An error\
  \ occured in bean configuration: \"`\n`                    + ex.getMessage());`\n\
  `            return null;`\n`        }`\n`    }`\n`}`\n\n请注意，我们定义了一个 `init()` 方法作为初始化回调。`init()`\
  \ 方法会检查 `name` 属性是否已设置，如果未设置，则使用存储在 `DEFAULT_NAME` 常量中的默认值。`init()` 方法还会检查 `age`\
  \ 属性是否已设置，如果未设置，则抛出 `IllegalArgumentException` 异常。\n\n`SimpleBean` 类的 `main()` 方法尝试通过其自身的\
  \ `getBean()` 方法从 `GenericXmlApplicationContext` 中获取三个类型均为 `SimpleBean` 的 Bean。请注意，在\
  \ `getBean()` 方法中，如果成功获取到 Bean，则将其详细信息输出到控制台。如果 `init()` 方法中抛出异常（在本例中，如果未设置 `age`\
  \ 属性就会发生），Spring 会将该异常包装在 `BeanCreationException` 中。`getBean()` 方法会捕获这些异常，向控制台输出一条告知错误的消息，并返回\
  \ `null` 值。\n\n代码清单 5-2 展示了一个 `ApplicationContext` 配置，该配置定义了代码清单 5-1 中使用的 Bean（`lifecycle/initMethod.xml`）。\n\
  \n***代码清单 5-2.** 配置 SimpleBeans*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n\
  `<beans`\n\n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n\
  `        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\"`\n`        default-lazy-init=\"\
  true\">`\n\n`    <bean id=\"simpleBean1\"`\n`        class=\"com.apress.prospring3.ch5.lifecycle.SimpleBean\"\
  `\n`        init-method=\"init\">`\n`        <property name=\"name\">`\n`            <value>Clarence\
  \ Ho</value>`\n`        </property>`\n`        <property name=\"age\">`\n`            <value>100</value>`\n\
  `        </property>`\n`    </bean>`\n`    <bean id=\"simpleBean2\"  `\n`        class=\"\
  com.apress.prospring3.ch5.lifecycle.SimpleBean\"`\n`         init-method=\"init\"\
  >`\n`        <property name=\"age\">`\n`            <value>100</value>`\n`        </property>`\n\
  `    </bean>`\n`    <bean id=\"simpleBean3\"`\n`        class=\"com.apress.prospring3.ch5.lifecycle.SimpleBean\"\
  `\n`        init-method=\"init\">`\n`        <property name=\"name\">`\n`            <value>Clarence\
  \ Ho</value>`\n`        </property>`\n`    </bean>`\n`</beans>`\n\n如你所见，三个 Bean\
  \ 各自的 `<bean>` 标签都有一个 `init-method` 属性，该属性告知 Spring 在完成 Bean 配置后应立即调用 `init()` 方法。`simpleBean1`\
  \ Bean 的 `name` 和 `age` 属性都有值，因此它通过 `init()` 方法时完全没有任何更改。`simpleBean2` Bean 没有 `name`\
  \ 属性的值，这意味着在 `init()` 方法中，`name` 属性会被赋予默认值。最后，`simpleBean3` Bean 没有 `age` 属性的值。`init()`\
  \ 方法中定义的逻辑将其视为错误，因此会抛出 `IllegalArgumentException` 异常。另请注意，在 `<beans>` 标签中，我们添加了属性\
  \ `default-lazy-init=\"true\"`，以指示 Spring 仅在从应用程序请求 Bean 时才实例化配置文件中定义的 Bean。如果我们不指定该属性，Spring\
  \ 会在 `ApplicationContext` 启动时尝试初始化所有 Bean，并且在初始化 `simpleBean3` 时会失败。运行上述示例将产生以下输出：\n\
  \n`Initializing bean`\n`Name: Clarence Ho`\n`Age: 100`\n`Initializing bean`\n`Using\
  \ default name`\n`Name: Luke Skywalker`\n`Age: 100`\n`Initializing bean`\n`An error\
  \ occured in bean configuration: Error creating bean with name 'simpleBean3' defined\
  \ in`\n`class path resource [lifecycle/initMethod.xml]: Invocation of init method\
  \ failed; nested`\n`exception is java.lang.IllegalArgumentException: You must set\
  \ the age property of any beans of`\n`type class com.apress.prospring3.ch5.lifecycle.SimpleBean`\n\
  \n从该输出可以看出，`simpleBean1` 已按照我们在配置文件中指定的值正确配置。对于 `simpleBean2`，由于配置中未指定 `name` 属性的值，因此使用了默认值。最后，对于\
  \ `simpleBean3`，由于 `init()` 方法因缺少 `age` 属性的值而引发错误，因此未创建任何 Bean 实例。\n\n如你所见，使用初始化方法是确保\
  \ Bean 正确配置的理想方式。通过使用这种机制，你可以充分利用 IoC 的优势，同时不会失去手动定义依赖关系所带来的任何控制权。对你的初始化方法唯一的限制是它不能接受任何参数。你可以定义任何返回类型（尽管\
  \ Spring 会忽略它），甚至可以使用静态方法，但该方法必须不接受任何参数。\n\n\n\n当使用静态初始化方法时，该机制的优点便不复存在，因为你无法访问\
  \ bean 的任何状态来对其进行验证。如果你的 bean 使用静态状态作为节省内存的机制，并且你正在使用静态初始化方法来验证此状态，那么你应该考虑将静态状态迁移为实例状态，并使用非静态初始化方法。如果你使用\
  \ Spring 的单例管理功能，最终效果是一样的，但你会得到一个更易于测试的 bean，并且还能在必要时创建具有各自状态的多个 bean 实例。当然，在某些情况下，你需要在\
  \ bean 的多个实例之间共享静态状态，此时你仍然可以使用静态初始化方法。\n\n##### 实现 InitializingBean 接口\n\nSpring\
  \ 中定义的 `InitializingBean` 接口允许你在 bean 代码中定义：希望 bean 在 Spring 完成其配置后收到通知。与使用初始化方法时类似，这为你提供了检查\
  \ bean 配置以确保其有效性的机会，并在此过程中提供任何默认值。`InitializingBean` 接口定义了一个单一方法 `afterPropertiesSet()`，其作用与\
  \ 清单 5-1 中的 `init()` 方法相同。清单 5-3 展示了使用 `InitializingBean` 接口替代初始化方法对先前示例的重现。\n\n\
  ***清单 5-3.** 使用 `InitializingBean` 接口*\n\n`package com.apress.prospring3.ch5.lifecycle;`\n\
  \n`import org.springframework.beans.factory.BeanCreationException;`\n`import org.springframework.beans.factory.InitializingBean;`\n\
  `import org.springframework.context.ApplicationContext;`\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  \n`public class SimpleBeanWithInterface implements` **`InitializingBean`** `{`\n\
  \n`    private static final String DEFAULT_NAME = \"Luke Skywalker\";`\n\n`    private\
  \ String name = null;`\n\n`    private int age = Integer.MIN_VALUE;`\n\n`    public\
  \ void setName(String name) {`\n`        this.name = name;`\n`    }`\n\n`    public\
  \ void setAge(int age) {`\n`        this.age = age;`\n`    }`\n\n`    public void\
  \ myInit() {`\n`        System.out.println(\"My Init\");`\n`    }`\n`public void`\
  \ **`afterPropertiesSet`**`() throws Exception {`\n`        System.out.println(\"\
  Initializing bean\");`\n\n`        if (name == null) {`\n`            System.out.println(\"\
  Using default name\");`\n`            name = DEFAULT_NAME;`\n`        }`\n\n`        if\
  \ (age == Integer.MIN_VALUE) {`\n`            throw new IllegalArgumentException(`\n\
  `                    \"You must set the age property of any beans of type \" + SimpleBean.class);`\n\
  `        }`\n`    }`\n\n`    public String toString() {`\n`        return \"Name:\
  \ \" + name + \"\\nAge: \" + age;`\n`    }`\n\n`    public static void main(String[]\
  \ args) {`\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:lifecycle/initInterface.xml\");`\n`        ctx.refresh();`\n\
  \n`        SimpleBeanWithInterface simpleBean1 = getBean(\"simpleBean1\", ctx);`\n\
  `        SimpleBeanWithInterface simpleBean2 = getBean(\"simpleBean2\", ctx);`\n\
  `        SimpleBeanWithInterface simpleBean3 = getBean(\"simpleBean3\", ctx);`\n\
  `    }`\n\n`    private static SimpleBeanWithInterface getBean(String beanName,`\n\
  `            ApplicationContext ctx) {`\n`        try {`\n`            SimpleBeanWithInterface\
  \ bean = (SimpleBeanWithInterface) ctx.getBean(beanName);`\n`            System.out.println(bean);`\n\
  `            return bean;`\n`        } catch (BeanCreationException ex) {`\n`            System.out.println(\"\
  An error occured in bean configuration: \"`\n`                    + ex.getMessage());`\n\
  `            return null;`\n`        }`\n`    }`\n`}`\n\n如你所见，此示例中变化不大（更改的代码已用粗体标出）。除了明显的类名更改外，唯一的区别在于此类实现了\
  \ `InitializingBean`，并且初始化逻辑已移至 `InitializingBean.afterPropertiesSet()` 方法中。\n\n\
  在 清单 5-4 中，你可以看到此示例的配置（`lifecycle/initInterface.xml`）。\n\n***清单 5-4.** 使用 `InitializingBean`\
  \ 的配置*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\"\
  `\n`        default-lazy-init=\"true\">`\n\n`    <bean id=\"simpleBean1\"`\n`        class=\"\
  com.apress.prospring3.ch5.lifecycle.SimpleBeanWithInterface\">`\n`        <property\
  \ name=\"name\">`\n`            <value>Clarence Ho</value>`\n`        </property>`\n\
  `        <property name=\"age\">`\n`            <value>100</value>`\n`        </property>`\n\
  `    </bean>`\n\n`    <bean id=\"simpleBean2\"`\n`        class=\"com.apress.prospring3.ch5.lifecycle.SimpleBeanWithInterface\"\
  >`\n`        <property name=\"age\">`\n`            <value>100</value>`\n`        </property>`\n\
  `    </bean>`\n\n`    <bean id=\"simpleBean3\"`\n`        class=\"com.apress.prospring3.ch5.lifecycle.SimpleBeanWithInterface\"\
  >`\n`        <property name=\"name\">`\n`            <value>Clarence Ho</value>`\n\
  `        </property>`\n`    </bean>`\n`</beans>`\n\n同样，清单 5-4 中的配置代码与 清单 5-2 中的配置代码差别不大。明显的区别是省略了\
  \ `init-method` 属性。由于 `SimpleBeanWithInterface` 类实现了 `InitializingBean` 接口，Spring\
  \ 知道将哪个方法作为初始化回调来调用，因此无需任何额外配置。此示例的输出如下所示：\n\n`Initializing bean`\n`Name: Clarence\
  \ Ho`\n`Age: 100`\n`Initializing bean`\n`Using default name`\n`Name: Luke Skywalker`\n\
  `Age: 100`\n`Initializing bean`\n`An error occured in bean configuration: Error\
  \ creating bean with name 'simpleBean3' defined in`\n`class path resource [lifecycle/initInterface.xml]:\
  \ Invocation of init method failed; nested`\n`exception is java.lang.IllegalArgumentException:\
  \ You must set the age property of any beans of`\n`type class com.apress.prospring3.ch5.lifecycle.SimpleBean`\n\
  \n如你所见，输出结果与方法机制相同。\n\n\n\n##### 使用 JSR-250 @PostConstruct 注解\n\n另一种能达到相同目的的方法是使用\
  \ JSR-250 生命周期注解 `@PostConstruct`。从 Spring 2.5 开始，Spring 也支持 JSR-250 注解，用于指定当类中存在与\
  \ Bean 生命周期相关的对应注解时，Spring 应调用的方法。清单 5-5 展示了应用了 `@PostConstruct` 注解的程序。\n\n***清单\
  \ 5-5.** 使用 JSR-250 `@PostConstruct` 注解*\n\n`package com.apress.prospring3.ch5.lifecycle;`\n\
  \n`import javax.annotation.PostConstruct;`\n`// 其他 import 语句已省略`\n`public class\
  \ SimpleBeanWithJSR250 {`\n\n`   // 代码已省略`\n`   @PostConstruct`\n`   public void\
  \ init() throws Exception {`\n\n`   // 其余代码已省略`\n`   }`\n`}`\n\n该程序与 SimpleBean\
  \ 完全相同；只是在 `init()` 方法前应用了 `@PostConstruct` 注解。请注意，你可以为该方法指定任意名称。\n\n对于配置，我们可以使用接口机制所用的配置（清单\
  \ 5-4）。然而，由于我们使用了注解，需要在配置文件中添加 `context` 命名空间和 `<context:annotation-driven>` 标签。\n\
  \n之后，运行该程序，你将看到与其他机制相同的输出。\n\n正如我们之前讨论的，这三种方法各有优缺点。使用初始化方法，你可以保持应用程序与 Spring 的解耦，但必须记得为每个需要初始化方法的\
  \ Bean 进行配置。使用 `InitializingBean`，你可以为 Bean 类的所有实例一次性指定初始化回调，但这样做会使应用程序与 Spring\
  \ 耦合。使用注解，你需要将注解应用到方法上，并确保 IoC 容器支持 JSR-250。最终，你应该根据应用程序的需求来决定使用哪种方法。如果可移植性是一个问题，那么使用初始化方法或注解方法；否则，使用\
  \ `InitializingBean` 接口来减少应用程序所需的配置量，并降低因配置错误而导致错误潜入应用程序的风险。\n\n##### 解析顺序\n\n你可以在同一个\
  \ Bean 实例上使用所有机制。在这种情况下，Spring 会先调用带有 `@PostConstruct` 注解的方法，然后调用 `InitializingBean.afterPropertiesSet()`，最后调用你的初始化方法。如果你有一个现有的\
  \ Bean，它在某个特定方法中执行一些初始化操作，但当你使用 Spring 时需要添加更多初始化代码，这会很有用。\n\n#### 钩入 Bean 销毁\n\n\
  当使用包装了 `DefaultListableBeanFactory` 接口的 `ApplicationContext` 实现（例如，通过 `GenericApplicationContext`.`getDefaultListableBeanFactory()`\
  \ 方法的 `GenericXmlApplicationContext`）时，你可以通过调用 `ConfigurableBeanFactory.destroySingletons()`\
  \ 向 `BeanFactory` 发出信号，表明你想要销毁所有单例实例。通常，你在应用程序关闭时执行此操作，它允许你清理 Bean 可能持有的任何打开的资源，从而使应用程序能够优雅地关闭。这个回调还提供了一个完美的位置，用于将存储在内存中的任何数据刷新到持久化存储，并允许你的\
  \ Bean 结束它们可能已启动的任何长时间运行的进程。\n\n为了让你的 Bean 能够接收到 `destroySingletons()` 已被调用的通知，你有三个选项，所有这些选项都与可用于接收初始化回调的机制类似。销毁回调通常与初始化回调结合使用。在许多情况下，你在初始化回调中创建和配置一个资源，然后在销毁回调中释放该资源。\n\
  \n##### 在 Bean 销毁时执行方法\n\n要指定一个在 Bean 销毁时被调用的方法，你只需在 Bean 的 `<bean>` 标签的 `destroy-method`\
  \ 属性中指定该方法名称即可。Spring 会在销毁 Bean 的单例实例之前调用它（如前所述，Spring 不会为那些原型作用域的 Bean 调用此方法）。清单\
  \ 5-6 展示了一个实现 `InitializingBean` 的简单类，在 `afterPropertiesSet()` 方法中，它创建了一个 `FileInputStream`\
  \ 实例并将其存储在一个私有字段中。\n\n***清单 5-6.** 使用 `destroy-method` 回调*\n\n`package com.apress.prospring3.ch5.lifecycle;`\n\
  \n`import java.io.FileInputStream;`\n`import java.io.IOException;`\n`import java.io.InputStream;`\n\
  \n`import org.springframework.beans.factory.InitializingBean;`\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  \n`public class DestructiveBean implements InitializingBean {`\n\n`    private InputStream\
  \ is = null;`\n\n`    public String filePath = null;`\n\n`    public void afterPropertiesSet()\
  \ throws Exception {`\n\n`        System.out.println(\"正在初始化 Bean\");`\n\n`        if\
  \ (filePath == null) {`\n`            throw new IllegalArgumentException(`\n`                    \"\
  你必须为 \" + DestructiveBean.class + \" 指定 filePath 属性\");`\n`        }`\n\n`        is\
  \ = new FileInputStream(filePath);`\n`    }`\n\n`    public void destroy() {`\n\n\
  `        System.out.println(\"正在销毁 Bean\");`\n\n`        if (is != null) {`\n`            try\
  \ {`\n`                is.close();`\n`                is = null;`\n`            }\
  \ catch (IOException ex) {`\n`                System.err.println(\"警告：尝试关闭 InputStream\
  \ 时发生 IOException\");`\n`            }`\n`        }`\n`    }`\n\n`    public void\
  \ setFilePath(String filePath) {`\n`        this.filePath = filePath;`\n`    }`\n\
  \n`    public static void main(String[] args) throws Exception {`\n\n`        GenericXmlApplicationContext\
  \ ctx = new GenericXmlApplicationContext();`\n`        ctx.load(\"classpath:lifecycle/disposeMethod.xml\"\
  );`\n`        ctx.refresh(); // 加载 XML 配置文件后刷新 ApplicationContext`\n\n`        DestructiveBean\
  \ bean = (DestructiveBean) ctx.getBean(\"destructiveBean\");`\n\n`        System.out.println(\"\
  正在调用 destroy()\");`\n`        ctx.destroy();`\n`        System.out.println(\"已调用\
  \ destroy()\");`\n`    }`\n`}`\n\n这段代码还定义了一个 `destroy()` 方法，在该方法中，`FileInputStream`\
  \ 被关闭并设置为 `null`，从而释放资源并允许其被垃圾回收。`main()` 方法从 `GenericXmlApplicationContext` 中获取一个\
  \ `DestructiveBean` 类型的 Bean，然后调用其 `destroy()` 方法（该方法将依次调用由 `ApplicationContext`\
  \ 包装的 `ConfigurableBeanFactory.destroySingletons()`），指示 Spring 销毁其管理的所有单例。初始化回调和销毁回调都会向控制台输出一条消息，告知我们它们已被调用。在清单\
  \ 5-7 中，你可以看到 `destructiveBean` Bean 的配置（`lifecycle/disposeMethod.xml`）。\n\n***清单\
  \ 5-7.** 配置 `destroy-method` 回调*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n\
  `<beans`\n\n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n\
  `        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\">`\n\n\
  `    <bean id=\"destructiveBean\"`\n`        class=\"com.apress.prospring3.ch5.lifecycle.DestructiveBean\"\
  `\n`        destroy-method=\"destroy\">`\n`        <property name=\"filePath\">`\n\
  `            <value>d:/temp/test.txt</value>`\n`        </property>`\n`    </bean>`\n\
  \n`</beans>`\n\n请注意，我们使用 `destroy-method` 属性将 `destroy()` 方法指定为销毁回调。运行此示例将产生以下输出：\n\
  \n`正在初始化 Bean`\n`正在调用 destroy()`\n`正在销毁 Bean`\n`已调用 destroy()`\n\n\n\n如您所见，Spring\
  \ 首先调用初始化回调，`DestructiveBean` 实例创建 `FileInputStream` 实例并存储它。接下来，在调用 `destroy()`\
  \ 期间，Spring 遍历其管理的单例集合（本例中只有一个），并调用任何指定的销毁回调。正是在这里，`DestructiveBean` 实例关闭了 `FileInputStream`\
  \ 并将其引用设置为 null。\n\n##### 实现 DisposableBean 接口\n\n与初始化回调类似，Spring 提供了一个接口，在本例中为\
  \ `DisposableBean`，您的 Bean 可以实现该接口，作为接收销毁回调的一种机制。`DisposableBean` 接口定义了一个单一方法 `destroy()`，该方法在\
  \ Bean 被销毁之前调用。使用此机制与使用 `InitializingBean` 接口接收初始化回调是正交的。清单 5-8 展示了实现 `DisposableBean`\
  \ 接口的 `DestructiveBean` 类的修改实现。\n\n***清单 5-8.** 实现 `DisposableBean`*\n\n`package\
  \ com.apress.prospring3.ch5.lifecycle;`\n\n`import java.io.FileInputStream;`\n`import\
  \ java.io.IOException;`\n`import java.io.InputStream;`\n\n`import org.springframework.beans.factory.DisposableBean;`\n\
  `import org.springframework.beans.factory.InitializingBean;`\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  \n`public class DestructiveBeanWithInterface implements InitializingBean,`\n**`DisposableBean`**\
  \ `{`\n\n`    private InputStream is = null;`\n\n`    public String filePath = null;`\n\
  \n`    public void afterPropertiesSet() throws Exception {`\n\n`        System.out.println(\"\
  Initializing Bean\");`\n\n`        if (filePath == null) {`\n`            throw\
  \ new IllegalArgumentException(`\n`                    \"You must specify the filePath\
  \ property of \" + DestructiveBean.class);`\n`        }`\n\n`        is = new FileInputStream(filePath);`\n\
  `    }`\n\n`    public void destroy() {`\n\n`        System.out.println(\"Destroying\
  \ Bean\");`\n\n`        if (is != null) {`\n`            try {`\n`                is.close();`\n\
  `                is = null;`\n`            } catch (IOException ex) {`\n`                System.err.println(\"\
  WARN: An IOException occured\"`\n`                        + \" trying to close the\
  \ InputStream\");`\n`            }`\n`        }`\n`    }`\n\n`    public void setFilePath(String\
  \ filePath) {`\n`        this.filePath = filePath;`\n`    }`\n\n`    public static\
  \ void main(String[] args) throws Exception {`\n`        GenericXmlApplicationContext\
  \ ctx = new GenericXmlApplicationContext();`\n`        ctx.load(\"classpath:lifecycle/disposeInterface.xml\"\
  );`\n`        ctx.refresh();`\n\n`        DestructiveBeanWithInterface bean = (DestructiveBeanWithInterface)`\n\
  `             ctx.getBean(\"destructiveBean\");`\n\n`        System.out.println(\"\
  Calling destroySingletons()\");`\n`        ctx.destroy();`\n`        System.out.println(\"\
  Called destroySingletons()\");`\n\n`    }`\n`}`\n\n同样，使用回调方法机制的代码（以粗体突出显示）与使用回调接口机制的代码之间没有太大区别。在本例中，我们甚至使用了相同的方法名称。清单\
  \ 5-9 展示了此示例的修改配置（`lifecycle/disposeInterface.xml`）。\n\n***清单 5-9.** 使用 `DisposableBean`\
  \ 接口的配置*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\"\
  >`\n\n`    <bean id=\"destructiveBean\"`\n`        class=\"com.apress.prospring3.ch5.lifecycle.DestructiveBeanWithInterface\"\
  >`\n`        <property name=\"filePath\">`\n`            <value>d:/temp/test.txt</value>`\n\
  `        </property>`\n`    </bean>`\n\n`</beans>`\n\n如您所见，除了类名不同之外，唯一的区别是省略了 `destroy-method`\
  \ 属性。\n\n运行此示例将产生以下输出：\n\n`Initializing Bean`\n`Calling destroy()`\n`Destroying\
  \ Bean`\n`Called destroy()`\n\n同样，这两种不同机制的输出完全相同。\n\n##### 使用 JSR-250 @PreDestroy\
  \ 注解\n\n第三种方式是使用 JSR-250 生命周期 `@PreDestroy` 注解，它与 `@PostConstruct` 注解相对应。清单 5-10\
  \ 是 `DestructiveBean` 的一个版本，它在同一个类中同时使用了 `@PostConstruct` 和 `@PreDestroy` 来执行程序初始化和销毁操作。\n\
  \n***清单 5-10.** 使用 `@PreDestroy` 实现 `DisposableBean`*\n\n`package com.apress.prospring3.ch5.lifecycle;`\n\
  \n`import java.io.FileInputStream;`\n`import java.io.IOException;`\n`import java.io.InputStream;`\n\
  \n`import javax.annotation.PostConstruct;`\n`import javax.annotation.PreDestroy;`\n\
  \n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\n\
  `public class DestructiveBeanWithJSR250 {`\n\n`    private InputStream is = null;`\n\
  \n`    public String filePath = null;`\n\n`    @PostConstruct`\n`    public void\
  \ afterPropertiesSet() throws Exception {`\n\n`        System.out.println(\"Initializing\
  \ Bean\");`\n\n`        if (filePath == null) {`\n`            throw new IllegalArgumentException(`\n\
  `                    \"You must specify the filePath property of \" + DestructiveBean.class);`\n\
  `        }`\n\n`        is = new FileInputStream(filePath);`\n`    }`\n\n`    @PreDestroy`\n\
  `    public void destroy() {`\n\n`        System.out.println(\"Destroying Bean\"\
  );`\n\n`        if (is != null) {`\n`            try {`\n`                is.close();`\n\
  `                is = null;`\n`            } catch (IOException ex) {`\n`                System.err.println(\"\
  WARN: An IOException occured\"`\n`                        + \" trying to close the\
  \ InputStream\");`\n`            }`\n`        }`\n`    }`\n\n`    public void setFilePath(String\
  \ filePath) {`\n`        this.filePath = filePath;`\n`    }`\n\n`    public static\
  \ void main(String[] args) throws Exception {`\n\n`        GenericXmlApplicationContext\
  \ ctx = new GenericXmlApplicationContext();`\n`        ctx.load(\"classpath:lifecycle/disposeJSR250.xml\"\
  );`\n`        ctx.refresh();`\n\n`        DestructiveBeanWithJSR250 bean = (DestructiveBeanWithJSR250)`\n\
  `            ctx.getBean(\"destructiveBean\");`\n\n`        System.out.println(\"\
  Calling destroy()\");`\n`        ctx.destroy();`\n`        System.out.println(\"\
  Called destroy()\");`\n`    }`\n`}`\n\n清单 5-11 是该 Bean 的 XML 配置，其中添加了 `<context:annotation-config>`\
  \ 标签（`lifecycle/disposeJSR250.xml`）。\n\n***清单 5-11.** 使用 JSR-250 注解的 `DisposableBean`\
  \ 配置*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n\
  `        http://www.springframework.org/schema/context`\n`        http://www.springframework.org/schema/context/spring-context-3.1.xsd\"\
  >`\n\n`    <context:annotation-config/>`\n\n`    <bean id=\"destructiveBean\"`\n\
  `        class=\"com.apress.prospring3.ch5.lifecycle.DestructiveBeanWithJSR250\"\
  >`\n`        <property name=\"filePath\">`\n`            <value>d:/temp/test.txt</value>`\n\
  `        </property>`\n`    </bean>`\n\n`</beans>`\n\n运行该程序将产生与其他两种机制相同的输出。\n\n\
  销毁回调是一种理想的机制，可确保您的应用程序优雅地关闭，并且不会使资源保持打开状态或处于不一致状态。但是，您仍然需要决定是使用销毁方法回调、`DisposableBean`\
  \ 接口还是 `@PreDestroy` 注解。同样，让您的应用程序需求来驱动您在此方面的决策；在可移植性成为问题时使用方法回调，并使用 `DisposableBean`\
  \ 接口或 JSR-250 注解来减少所需的配置量。\n\n\n\n##### 销毁顺序\n\n与 Bean 创建的情况类似，你可以在同一个 Bean 实例上使用所有机制进行\
  \ Bean 销毁。在这种情况下，Spring 会先调用带有 `@PreDestroy` 注解的方法，然后调用 `DisposableBean.destroy()`，最后执行你自定义的销毁方法。\n\
  \n##### 使用关闭钩子\n\nSpring 中销毁回调的唯一缺点是它们不会自动触发；你需要记得在应用程序关闭前调用 `AbstractApplicationContext.destroy()`。当你的应用程序作为\
  \ Servlet 运行时，你可以简单地在 Servlet 的 `destroy()` 方法中调用 `destroy()`。然而，在独立应用程序中，事情就没那么简单了，尤其是当你的应用程序有多个退出点时。幸运的是，有一个解决方案。Java\
  \ 允许你创建一个关闭钩子，这是一个在应用程序关闭前执行的线程。这是调用 `AbstractApplicationContext`（所有具体的 `ApplicationContext`\
  \ 实现都继承自它）的 `destroy()` 方法的完美方式。利用此机制最简单的方法是使用 `AbstractApplicationContext` 的 `registerShutdownHook()`\
  \ 方法。该方法会自动指示 Spring 注册底层 JVM 运行时的关闭钩子。如清单 5-12 所示。\n\n***清单 5-12.** 注册关闭钩子*\n\n\
  `package com.apress.prospring3.ch5.lifecycle;`\n\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  \n`public class ShutdownHookExample {`\n\n`    public static void main(String[]\
  \ args) {`\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:lifecycle/disposeInterface.xml\");`\n`        ctx.`**`registerShutdownHook`**`();`\n\
  `        ctx.refresh();`\n\n`        DestructiveBeanWithInterface bean = (DestructiveBeanWithInterface)`\n\
  `            ctx.getBean(\"destructiveBean\");`\n`    }`\n`}`\n\n运行此示例将产生以下输出：\n\
  \n`Initializing Bean`\n`Destroying Bean`\n\n如你所见，即使我们没有编写任何代码在应用程序关闭时显式调用 `destroy()`\
  \ 方法，它仍然被调用了。\n\n### 让你的 Bean “感知 Spring”\n\n依赖注入相对于依赖查找作为实现控制反转机制的最大卖点之一，是你的 Bean\
  \ 不需要感知管理它们的容器实现。对于使用构造器或 Setter 注入的 Bean 来说，Spring 容器与 Google Guice 或 PicoContainer\
  \ 提供的容器是一样的。然而，在某些情况下，你可能需要一个使用依赖注入来获取其依赖项的 Bean，以便它能出于其他原因与容器交互。例如，一个自动为你配置关闭钩子的\
  \ Bean，它需要访问 `ApplicationContext`。在其他情况下，一个 Bean 可能想知道它的名称（即在当前 `ApplicationContext`\
  \ 中分配的 Bean 名称），以便根据此名称执行一些额外的处理。\n\n话虽如此，此功能实际上是为 Spring 内部使用而设计的。给名称赋予某种业务含义通常是一个坏主意，并且可能导致配置问题，即\
  \ Bean 名称必须被人为地操纵以支持其业务含义。然而，我们发现让 Bean 在运行时能够找出自己的名称对于日志记录非常有用。考虑这样一种情况：你有许多相同类型的\
  \ Bean 在不同的配置下运行。当出现问题时，Bean 名称可以包含在日志消息中，以帮助你区分哪个 Bean 正在生成错误，哪个 Bean 运行正常。\n\n\
  #### 使用 BeanNameAware 接口\n\n`BeanNameAware` 接口可以被想要获取自身名称的 Bean 实现，它只有一个方法：`setBeanName(String)`。Spring\
  \ 在完成 Bean 的配置之后、但在任何生命周期回调（初始化或销毁）被调用之前调用 `setBeanName()` 方法（请参考图 5-1）。在大多数情况下，`setBeanName()`\
  \ 接口的实现只有一行代码，即将容器传入的值存储在一个字段中供以后使用。清单 5-13 展示了一个简单的 Bean，它使用 `BeanNameAware` 获取其名称，然后在编写日志消息时使用此\
  \ Bean 名称。\n\n***清单 5-13.** 实现 `BeanNameAware`*\n\n`package com.apress.prospring3.ch5.interaction;`\n\
  \n`import org.apache.commons.logging.Log;`\n`import org.apache.commons.logging.LogFactory;`\n\
  `import org.springframework.beans.factory.BeanNameAware;`\n\n`public class LoggingBean\
  \ implements BeanNameAware {`\n\n`    private static final Log log = LogFactory.getLog(LoggingBean.class);`\n\
  \n`    private String beanName = null;`\n\n`    public void setBeanName(String beanName)\
  \ {`\n`        this.beanName = beanName;`\n`    }`\n\n`    public void someOperation()\
  \ {`\n`        if(log.isInfoEnabled()) {`\n`            log.info(\"Bean [\" + beanName\
  \ + \"] - someOperation()\");`\n`        }`\n`    }`\n`}`\n\n这个实现相当简单。请记住，`BeanNameAware.setBeanName()`\
  \ 是在通过调用 `ApplicationContext.getBean()` 将 Bean 的第一个实例返回给你的应用程序之前调用的，因此无需在 `someOperation()`\
  \ 方法中检查 Bean 名称是否可用。清单 5-14 展示了此示例的简单配置（`interaction/logging.xml`）。\n\n***清单 5-14.**\
  \ 配置 `LoggingBean` 示例*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\
  \n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\"\
  >`\n\n`    <bean id=\"loggingBean\" class=\"com.apress.prospring3.ch5.interaction.LoggingBean\"\
  />`\n`</beans>`\n\n如你所见，利用 `BeanNameAware` 接口不需要特殊的配置。在清单 5-15 中，你可以看到一个简单的示例应用程序，它从\
  \ `ApplicationContext` 中检索 `LoggingBean` 实例，然后调用 `someOperation()` 方法（`interaction/logging.xml`）。\n\
  \n***清单 5-15.** `LoggingBeanExample` 类*\n\n`package com.apress.prospring3.ch5.interaction;`\n\
  \n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\n\
  `public class LoggingBeanExample {`\n\n`    public static void main(String[] args)\
  \ {`\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:interaction/logging.xml\");`\n`        ctx.refresh();`\n\
  \n`        LoggingBean bean = (LoggingBean) ctx.getBean(\"loggingBean\");`\n`        bean.someOperation();`\n\
  `    }`\n`}`\n\n此示例生成以下日志输出——注意在调用 `someOperation()` 的日志消息中包含了 Bean 名称：\n\n`Loading\
  \ XML bean definitions from class path resource [interaction/logging.xml]`\n`Refreshing\
  \ org.springframework.context.support.GenericXmlApplicationContext@5dccce3c: startup`\n\
  `date [Sun Sep 25 13:40:04 CST 2011]; root of context hierarchy`\n`Pre-instantiating\
  \ singletons in`\n`org.springframework.beans.factory.support.DefaultListableBeanFactory@7ec5495e:\
  \ defining beans`\n`[loggingBean]; root of factory hierarchy`\n`Bean [loggingBean]\
  \ - someOperation()`\n\n\n\n使用 `BeanNameAware` 接口实际上非常简单，在提升日志消息质量时，它能发挥很好的作用。不要仅仅因为能访问\
  \ bean 的名称，就试图赋予其业务含义；这样做会将你的类与 Spring 耦合，却只能带来微不足道的益处。如果你的 bean 内部需要某种名称，可以让它们实现一个类似\
  \ `Nameable`（特定于你的应用程序）的接口，其中包含 `setName()` 方法，然后通过依赖注入为每个 bean 赋予名称。这样，你就能保持配置所用名称的简洁性，也无需为了给\
  \ bean 赋予业务含义的名称而进行不必要的配置操作。\n\n#### 使用 ApplicationContextAware 接口\n\n通过使用 `ApplicationContextAware`\
  \ 接口，你的 bean 能够获取到配置它们的 `ApplicationContext` 的引用。创建此接口的主要目的是允许 bean 在你的应用程序中访问 Spring\
  \ 的 `ApplicationContext`，例如通过 `getBean()` 以编程方式获取其他 Spring bean。不过，你应该避免这种做法，而应使用依赖注入为你的\
  \ bean 提供其协作者。如果在可以使用依赖注入的情况下，却采用基于查找的 `getBean()` 方法来获取依赖，那么你就是在无充分理由的情况下，为 bean\
  \ 增加了不必要的复杂性，并将其与 Spring 框架耦合在一起。\n\n当然，`ApplicationContext` 不仅仅用于查找 bean；它还执行许多其他任务。正如你之前所见，其中一项任务就是销毁所有单例，并在销毁前依次通知每个单例。在上一节中，你了解了如何创建关闭钩子，以确保在应用程序关闭前指示\
  \ `ApplicationContext` 销毁所有单例。通过使用 `ApplicationContextAware` 接口，你可以构建一个 bean，该 bean\
  \ 可在 `ApplicationContext` 中配置，以自动创建并配置一个关闭钩子 bean。清单 5-16 展示了此 bean 的代码。\n\n***清单\
  \ 5-16.** `ShutdownHookBean` 类*\n\n`package com.apress.prospring3.ch5.interaction;`\n\
  \n`import org.springframework.beans.BeansException;`\n`import org.springframework.context.ApplicationContext;`\n\
  `import org.springframework.context.ApplicationContextAware;`\n`import org.springframework.context.support.GenericApplicationContext;`\n\
  \n`public class ShutdownHookBean implements ApplicationContextAware {`\n\n`    private\
  \ ApplicationContext ctx;`\n\n`    public void setApplicationContext(ApplicationContext\
  \ ctx)`\n`        throws BeansException {`\n\n`        if (ctx instanceof GenericApplicationContext)\
  \ {`\n`            ((GenericApplicationContext) ctx).registerShutdownHook();`\n\
  `        }`\n\n`    }`\n`}`\n\n到目前为止，这段代码的大部分内容对你来说应该很熟悉。`ApplicationContextAware`\
  \ 接口定义了一个单一方法 `setApplicationContext(ApplicationContext)`，Spring 会调用该方法，将 `ApplicationContext`\
  \ 的引用传递给 bean。在清单 5-16 中，`ShutdownHookBean` 类会检查 `ApplicationContext` 是否为 `GenericApplicationContext`\
  \ 类型，这意味着它支持 `registerShutdownHook()` 方法；如果是，它将向 `ApplicationContext` 注册一个关闭钩子。清单\
  \ 5-17 展示了如何配置此 bean，使其与上一节（`interaction/shutdownHook.xml`）中使用的 `DestructiveBeanWithInterface`\
  \ bean 协同工作。\n\n***清单 5-17.** 配置 `ShutdownHookBean`*\n\n`<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n\
  `        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\">`\n\n\
  `    <bean id=\"destructiveBean\"`\n`        class=\"com.apress.prospring3.ch5.lifecycle.DestructiveBeanWithInterface\"\
  >`\n`        <property name=\"filePath\">`\n`            <value>d:/temp/test.txt</value>`\n\
  `        </property>`\n`    </bean>`\n\n`    <bean id=\"shutdownHook\"`\n`        class=\"\
  com.apress.prospring3.ch5.interaction.ShutdownHookBean\"/>`\n`</beans>`\n\n请注意，无需特殊配置。清单\
  \ 5-18 展示了一个简单的示例应用程序，它使用 `ShutdownHookBean` 来管理单例 bean 的销毁。\n\n***清单 5-18.** 使用\
  \ `ShutdownHookBean`*\n\n`package com.apress.prospring3.ch5.interaction;`\n\n`import\
  \ org.springframework.context.support.GenericXmlApplicationContext;`\n\n`import\
  \ com.apress.prospring3.ch5.lifecycle.DestructiveBeanWithInterface;`\n\n`public\
  \ class ShutdownHookBeanExample {`\n\n`    public static void main(String[] args)\
  \ {`\n\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"interaction/shutdownHook.xml\");`\n`        ctx.refresh();`\n\
  \n`        DestructiveBeanWithInterface bean =`\n`            (DestructiveBeanWithInterface)\
  \ ctx.getBean(\"destructiveBean\");`\n`    }`\n`}`\n\n这段代码对你来说应该相当熟悉。当 Spring 启动\
  \ `ApplicationContext` 以及配置中定义的 `destructiveBean` 时（由于该 bean 实现了 `ApplicationContextAware`\
  \ 接口），Spring 会将 `ApplicationContext` 的引用传递给 `shutdownHook` bean，用于注册关闭钩子。运行此示例将按预期产生以下输出：\n\
  \n`Initializing Bean`\n`Destroying Bean`\n\n如你所见，即使主应用程序中没有调用 `destroy()`，`ShutdownHookBean`\
  \ 也会被注册为关闭钩子，并在应用程序关闭前调用 `destroy()`。\n\n### 使用 FactoryBean\n\n使用 Spring 时，你将面临的一个问题是如何创建并注入那些无法通过简单使用\
  \ `new` 运算符来创建的依赖。为了解决这个问题，Spring 提供了 `FactoryBean` 接口，它充当那些无法使用标准 Spring 语义创建和管理的对象的适配器。通常，你使用\
  \ `FactoryBean` 来创建那些无法使用 `new` 运算符创建的对象，例如通过静态工厂方法访问的对象，尽管情况并非总是如此。简而言之，`FactoryBean`\
  \ 是一个充当其他 bean 工厂的 bean。`FactoryBean` 像任何普通 bean 一样在你的 `ApplicationContext` 中进行配置，但当\
  \ Spring 使用 `FactoryBean` 接口来满足依赖或查找请求时，它不会返回 `FactoryBean` 本身；相反，它会调用 `FactoryBean.getObject()`\
  \ 方法并返回该调用的结果。\n\n`FactoryBean` 在 Spring 中得到了广泛应用；最显著的用途包括创建事务代理（我们将在第 13 章中介绍）以及从\
  \ JNDI 上下文中自动检索资源。然而，`FactoryBean` 不仅对构建 Spring 内部机制有用；在构建自己的应用程序时，你会发现它们非常实用，因为它们允许你使用\
  \ IoC 管理比原本可能更多的资源。\n\n\n\n#### 自定义 FactoryBean 示例：MessageDigestFactoryBean\n\n\
  我们从事的项目通常需要某种加密处理；典型情况包括生成用户密码的消息摘要或哈希值以存储在数据库中。在 Java 中，`MessageDigest` 类提供了为任意数据创建摘要的功能。`MessageDigest`\
  \ 本身是抽象类，你需要通过调用 `MessageDigest.getInstance()` 并传入所需摘要算法的名称来获取具体实现。例如，如果我们想使用 MD5\
  \ 算法创建摘要，可以使用以下代码创建 `MessageDigest` 实例：\n\n`MessageDigest md5 = MessageDigest.getInstance(\"\
  MD5\");`\n\n如果我们希望使用 Spring 来管理 `MessageDigest` 对象的创建，在没有 `FactoryBean` 的情况下，最好的做法是在\
  \ bean 上设置一个 `algorithmName` 属性，然后使用初始化回调来调用 `MessageDigest.getInstance()`。而使用 `FactoryBean`，我们可以将此逻辑封装在\
  \ bean 内部。这样，任何需要 `MessageDigest` 实例的 bean 只需声明一个 `messageDigest` 属性，并通过 `FactoryBean`\
  \ 获取该实例。清单 5-19 展示了实现此功能的 `FactoryBean` 代码。\n\n***清单 5-19.** `MessageDigestFactoryBean`\
  \ 类*\n\n`package com.apress.prospring3.ch5.factory;`\n\n`import java.security.MessageDigest;`\n\
  \n`import org.springframework.beans.factory.FactoryBean;`\n`import org.springframework.beans.factory.InitializingBean;`\n\
  \n`public class MessageDigestFactoryBean implements`\n`      FactoryBean<MessageDigest>,\
  \ InitializingBean {`\n\n`    private String algorithmName = \"MD5\";`\n\n`    private\
  \ MessageDigest messageDigest = null;`\n\n`    public MessageDigest getObject()\
  \ throws Exception {`\n`       return messageDigest;`\n`    }`\n\n`    public Class<MessageDigest>\
  \ getObjectType() {`\n`        return MessageDigest.class;`\n`    }`\n\n`    public\
  \ boolean isSingleton() {`\n`        return true;`\n`    }`\n\n`    public void\
  \ afterPropertiesSet() throws Exception {`\n`        messageDigest = MessageDigest.getInstance(algorithmName);`\n\
  `    }`\n\n`    public void setAlgorithmName(String algorithmName) {`\n`        this.algorithmName\
  \ = algorithmName;`\n`    }`\n`}`\n\n`FactoryBean` 接口声明了三个方法：`getObject()`、`getObjectType()`\
  \ 和 `isSingleton()`。Spring 调用 `getObject()` 方法来获取由 `FactoryBean` 创建的对象。这是实际传递给其他将\
  \ `FactoryBean` 作为协作者使用的 bean 的对象。在清单 5-19 中，你可以看到 `MessageDigestFactoryBean` 传递的是在\
  \ `InitializingBean.afterPropertiesSet()` 回调中创建的 `MessageDigest` 实例的克隆。\n\n`getObjectType()`\
  \ 方法允许你告知 Spring 你的 `FactoryBean` 将返回的对象类型。如果返回类型事先未知（例如，`FactoryBean` 根据配置创建不同类型的对象，这只有在\
  \ `FactoryBean` 初始化后才能确定），则可以返回 `null`；但如果你指定了类型，Spring 可以将其用于自动装配。我们返回 `MessageDigest`\
  \ 作为类型（此处是一个类，但除非必要，否则尽量返回接口类型，并让 `FactoryBean` 实例化具体的实现类）。原因是我们不知道会返回哪种具体类型（不过这并不重要，因为所有\
  \ bean 都会使用 `MessageDigest` 来定义它们的依赖关系）。\n\n`isSingleton()` 属性允许你告知 Spring 该 `FactoryBean`\
  \ 是否管理单例实例。请记住，通过设置 `FactoryBean` 的 `<bean>` 标签的 singleton 属性，你告知 Spring 的是 `FactoryBean`\
  \ 本身的单例状态，而不是它返回的对象的单例状态。\n\n现在让我们看看 `FactoryBean` 在应用程序中是如何使用的。在清单 5-20 中，你可以看到一个简单的\
  \ bean，它维护了两个 `MessageDigest` 实例，然后显示传递给其 `digest()` 方法的消息的摘要。\n\n***清单 5-20.**\
  \ `MessageDigester` 类*\n\n`package com.apress.prospring3.ch5.factory;`\n\n`import\
  \ java.security.MessageDigest;`\n\n`public class MessageDigester {`\n\n`    private\
  \ MessageDigest digest1 = null;`\n`    private MessageDigest digest2 = null;`\n\n\
  `    public void setDigest1(MessageDigest digest1) {`\n`        this.digest1 = digest1;`\n\
  `    }`\n\n`    public void setDigest2(MessageDigest digest2) {`\n`        this.digest2\
  \ = digest2;`\n`    }`\n\n`    public void digest(String msg) {`\n`        System.out.println(\"\
  Using digest1\");`\n`        digest(msg, digest1);`\n\n`        System.out.println(\"\
  Using digest2\");`\n`        digest(msg, digest2);`\n`    }`\n\n`    private void\
  \ digest(String msg, MessageDigest digest) {`\n`        System.out.println(\"Using\
  \ alogrithm: \" + digest.getAlgorithm());`\n`        digest.reset();`\n`        byte[]\
  \ bytes = msg.getBytes();`\n`        byte[] out = digest.digest(bytes);`\n`        System.out.println(out);`\n\
  `    }`\n`}`\n\n清单 5-21 展示了一个简单的 `BeanFactory` 配置，它配置了两个 `MessageDigestFactoryBean`，一个用于\
  \ SHA1 算法，另一个使用默认算法（MD5）（`factory/factory.xml`）。\n\n***清单 5-21.** 配置 `FactoryBean`*\n\
  \n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\"\
  >`\n\n`    <bean id=\"shaDigest\" class=\"com.apress.prospring3.ch5.factory.MessageDigestFactoryBean\"\
  >`\n`        <property name=\"algorithmName\">`\n`            <value>SHA1</value>`\n\
  `        </property>`\n`    </bean>`\n\n`    <bean id=\"defaultDigest\"`\n`        class=\"\
  com.apress.prospring3.ch5.factory.MessageDigestFactoryBean\"/>`\n\n`    <bean id=\"\
  digester\"`\n`        class=\"com.apress.prospring3.ch5.factory.MessageDigester\"\
  >`\n`        <property name=\"digest1\">`\n`            <ref local=\"shaDigest\"\
  />`\n`        </property>`\n`        <property name=\"digest2\">`\n`            <ref\
  \ local=\"defaultDigest\"/>`\n`        </property>`\n`    </bean>`\n`</beans>`\n\
  \n如你所见，我们不仅配置了两个 `MessageDigestFactoryBean`，还配置了一个 `MessageDigester`，使用这两个 `MessageDigestFactoryBean`\
  \ 来为 `digest1` 和 `digest2` 属性提供值。对于 `defaultDigest` bean，由于未指定 `algorithmName` 属性，因此不会发生注入，将使用类中编码的默认算法（即\
  \ MD5）。在清单 5-22 中，你看到一个基本示例类，它从 `BeanFactory` 中检索 `MessageDigester` bean，并创建一条简单消息的摘要。\n\
  \n***清单 5-22.** 使用 `MessageDigester`*\n\n`package com.apress.prospring3.ch5.factory;`\n\
  \n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\n\
  `public class MessageDigestExample {`\n\n`    public static void main(String[] args)\
  \ {`\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:factory/factory.xml\");`\n`        ctx.refresh();`\n\
  \n`        MessageDigester digester = (MessageDigester) ctx.getBean(\"digester\"\
  );`\n`        digester.digest(\"Hello World!\");`\n\n`    }`\n`}`\n\n运行此示例将产生以下输出：\n\
  \n`Using digest1`\n`Using alogrithm: SHA1`\n`[B@786c730`\n`Using digest2`\n`Using\
  \ alogrithm: MD5`\n`[B@217f242c`\n\n如你所见，`MessageDigest` bean 被提供了两个 `MessageDigest`\
  \ 实现（SHA1 和 MD5），尽管在 `BeanFactory` 中没有配置任何 `MessageDigest` bean。这正是 `FactoryBean`\
  \ 在发挥作用。\n\n\n\n当您处理无法使用 `new` 运算符创建的类时，`FactoryBean` 是完美的解决方案。如果您使用通过工厂方法创建的对象，并希望在\
  \ Spring 应用程序中使用这些类，那么可以创建一个 `FactoryBean` 作为适配器，使您的类能够充分利用 Spring 的 IoC 功能。\n\n\
  #### 直接访问 FactoryBean\n\n鉴于 Spring 会自动通过 `FactoryBean` 生成的对象来满足对该 `FactoryBean`\
  \ 的任何引用，您可能会想知道是否真的可以直接访问 `FactoryBean`。答案是“可以”。\n\n访问 `FactoryBean` 实际上非常简单：您只需在调用\
  \ `getBean()` 时，在 bean 名称前加上一个与符号（`&`），如清单 5-23 所示。\n\n***清单 5-23.** 直接访问 `FactoryBean`*\n\
  \n`package com.apress.prospring3.ch5.factory;`\n\n`import java.security.MessageDigest;`\n\
  \n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\n\
  `public class AccessingFactoryBeans {`\n\n`    public static void main(String[]\
  \ args) {`\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:factory/factory.xml\");`\n`        ctx.refresh();`\n\
  \n`        MessageDigest digest = (MessageDigest) ctx.getBean(\"shaDigest\");`\n\
  \n`        MessageDigestFactoryBean factoryBean =`\n`            (MessageDigestFactoryBean)\
  \ ctx.getBean(\"&shaDigest\");`\n\n`      try {`\n`         MessageDigest shaDigest\
  \ = factoryBean.getObject();`\n`         System.out.println(shaDigest.digest(\"\
  Hello world\".getBytes()));`\n`      } catch (Exception ex) {`\n`         ex.printStackTrace();`\n\
  `      }`\n`   }`\n`}`\n\n此功能在 Spring 代码的少数地方被使用，但您的应用程序实际上没有理由使用它。`FactoryBean`\
  \ 接口旨在用作支持性基础设施的一部分，使您能够在 IoC 环境中使用更多应用程序的类。避免直接访问 `FactoryBean` 并手动调用其 `getObject()`\
  \ 方法，让 Spring 为您完成这项工作；如果您手动执行此操作，您将为自己增加额外的工作量，并且不必要地将应用程序耦合到未来可能轻易更改的特定实现细节上。\n\
  \n#### 使用 factory-bean 和 factory-method 属性\n\n有时，您需要实例化由非 Spring 驱动的第三方应用程序提供的 JavaBean。您不知道如何实例化该类，但您知道该第三方应用程序确实提供了一个类，可用于获取\
  \ Spring 应用程序所需的 JavaBean 实例。在这种情况下，可以使用 Spring bean 的 `<bean>` 标签中的 `factory-bean`\
  \ 和 `factory-method` 属性。\n\n为了了解其工作原理，清单 5-24 展示了 `MessageDigestFactory` 的另一个版本，它提供了一个返回\
  \ `MessageDigest` bean 的方法。\n\n***清单 5-24.** `MessageDigestFactory` 类*\n\n`package\
  \ com.apress.prospring3.ch5.factory;`\n\n`import java.security.MessageDigest;`\n\
  \n`public class MessageDigestFactory {`\n\n`    private String algorithmName = \"\
  MD5\";`\n\n`    public MessageDigest createInstance() throws Exception {`\n`      \
  \ return MessageDigest.getInstance(algorithmName);`\n`    }`\n\n`    public void\
  \ setAlgorithmName(String algorithmName) {`\n`        this.algorithmName = algorithmName;`\n\
  `    }`\n`}`\n\n清单 5-25 展示了如何配置工厂方法以获取相应的 `MessageDigest` bean 实例（`factory/factoryMethod.xml`）。\n\
  \n***清单 5-25.** 配置 `MessageDigestFactory`*\n\n`<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n\
  `        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\">`\n\n\
  `    <bean id=\"shaDigestFactory\"`\n`        class=\"com.apress.prospring3.ch5.factory.MessageDigestFactory\"\
  >`\n`        <property name=\"algorithmName\">`\n`            <value>SHA1</value>`\n\
  `        </property>`\n`    </bean>`\n\n`    <bean id=\"defaultDigestFactory\"`\n\
  `        class=\"com.apress.prospring3.ch5.factory.MessageDigestFactory\"/>`\n\n\
  `    <bean id=\"shaDigest\"`\n`          factory-bean=\"shaDigestFactory\"`\n`          factory-method=\"\
  createInstance\">`\n`    </bean>`\n\n`    <bean id=\"defaultDigest\"`\n`          factory-bean=\"\
  defaultDigestFactory\"`\n`          factory-method=\"createInstance\"/>`\n\n`    <bean\
  \ id=\"digester\"`\n`        class=\"com.apress.prospring3.ch5.factory.MessageDigester\"\
  >`\n`        <property name=\"digest1\">`\n`            <ref local=\"shaDigest\"\
  />`\n`        </property>`\n`        <property name=\"digest2\">`\n`            <ref\
  \ local=\"defaultDigest\"/>`\n`        </property>`\n`    </bean>`\n`</beans>`\n\
  \n请注意，定义了两个摘要工厂 bean，一个使用 SHA1，另一个使用默认算法。然后，对于 `shaDigest` 和 `defaultDigest` 这两个\
  \ bean，我们指示 Spring 使用相应的消息摘要工厂 bean（`factory-bean`）来实例化 bean，并指定了用于获取 bean 实例的方法（`factory-method`）。清单\
  \ 5-26 展示了测试类。\n\n***清单 5-26.** 运行中的 `MessageDigestFactory`*\n\n`package com.apress.prospring3.ch5.factory;`\n\
  \n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\n\
  `public class MessageDigestFactoryExample {`\n\n`    public static void main(String[]\
  \ args) {`\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:factory/factoryMethod.xml\");`\n`        ctx.refresh();`\n\
  \n`        MessageDigester digester = (MessageDigester) ctx.getBean(\"digester\"\
  );`\n`        digester.digest(\"Hello World!\");`\n\n`    }`\n`}`\n\n运行该程序将生成以下输出：\n\
  \n`Using digest1`\n`Using alogrithm: SHA1`\n`[B@877ef83`\n`Using digest2`\n`Using\
  \ alogrithm: MD5`\n`[B@7a0d85cc`\n\n### JavaBeans PropertyEditors\n\n对于那些不完全熟悉 JavaBeans\
  \ 概念的人来说，`PropertyEditor` 是一个接口，它将属性的值从其原生类型表示形式转换为字符串，或进行反向转换。最初，这被设想为一种允许将属性值作为字符串值输入到编辑器中，并将其转换为正确类型的方法。然而，由于\
  \ `PropertyEditor` 本质上是轻量级类，它们已在许多不同的环境中得到应用，包括 Spring。\n\n由于基于 Spring 的应用程序中很大一部分属性值最初来源于\
  \ `BeanFactory` 配置文件，因此它们本质上是字符串。但是，设置这些值的属性可能不是字符串类型。因此，为了省去您人为创建大量字符串类型属性的麻烦，Spring\
  \ 允许您定义 `PropertyEditor` 来管理基于字符串的属性值到正确类型的转换。\n\n\n\n#### 内置的 PropertyEditor\n\n\
  从 3.1 版本开始，Spring 提供了 13 个内置的 `PropertyEditor` 实现，这些实现已预先注册到 `BeanFactory` 中。清单\
  \ 5-27 展示了一个简单的 Bean，它声明了 13 个属性，每个属性对应一个由内置 `PropertyEditor` 支持的类型。\n\n***清单 5-27.**\
  \ 使用内置的 `PropertyEditor`*\n\n`package com.apress.prospring3.ch5.pe;`\n\n`import\
  \ java.io.File;`\n`import java.io.InputStream;`\n`import java.net.URL;`\n`import\
  \ java.util.Date;`\n`import java.util.List;`\n`import java.util.Locale;`\n`import\
  \ java.util.Properties;`\n`import java.util.regex.Pattern;`\n\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  \n`public class PropertyEditorBean {`\n\n`    private byte[] bytes;                \
  \ // ByteArrayPropertyEditor`\n\n`    private Class cls;                    // ClassEditor`\n\
  \n`    private Boolean trueOrFalse;          // CustomBooleanEditor`\n\n`    private\
  \ List<String> stringList;      // CustomCollectionEditor`\n\n`    private Date\
  \ date;                    // CustomDateEditor`\n\n`    private Float floatValue;            \
  \ // CustomNumberEditor`\n\n`    private File file;                    // FileEditor`\n\
  \n`    private InputStream stream;           // InputStreamEditor`\n\n`    private\
  \ Locale locale;                // LocaleEditor`\n\n`    private Pattern pattern;              //\
  \ PatternEditor`\n\n`    private Properties properties;        // PropertiesEditor`\n\
  \n`    private String trimString;            // StringTrimmerEditor`\n\n`    private\
  \ URL url;                      // URLEditor`\n\n`    public void setCls(Class cls)\
  \ {`\n`        System.out.println(\"Setting class: \" + cls.getName());`\n`        this.cls\
  \ = cls;`\n`    }`\n\n`    public void setFile(File file) {`\n`        System.out.println(\"\
  Setting file: \" + file.getName());`\n`        this.file = file;`\n`    }`\n\n`    public\
  \ void setLocale(Locale locale) {`\n`        System.out.println(\"Setting locale:\
  \ \" + locale.getDisplayName());`\n`        this.locale = locale;`\n`    }`\n\n\
  `    public void setProperties(Properties properties) {`\n`        System.out.println(\"\
  Loaded \" + properties.size() + \" properties\");`\n`        this.properties = properties;`\n\
  `    }`\n\n`    public void setUrl(URL url) {`\n`        System.out.println(\"Setting\
  \ URL: \" + url.toExternalForm());`\n`        this.url = url;`\n`    }`\n\n`    public\
  \ void setBytes(byte[] bytes) {`\n`        System.out.println(\"Adding \" + bytes.length\
  \ + \" bytes\");`\n`        this.bytes = bytes;`\n`    }`\n\n`   public void setTrueOrFalse(Boolean\
  \ trueOrFalse) {`\n`      System.out.println(\"Setting Boolean: \" + trueOrFalse);`\n\
  `      this.trueOrFalse = trueOrFalse;`\n`   }`\n\n`   public void setStringList(List<String>\
  \ stringList) {`\n`      System.out.println(\"Setting string list with size: \"\
  `\n`         + stringList.size());`\n`      this.stringList = stringList;`\n`      for\
  \ (String string: stringList) {`\n`         System.out.println(\"String member:\
  \ \" + string);`\n`      }`\n`   }`\n\n`   public void setDate(Date date) {`\n`      System.out.println(\"\
  Setting date: \" + date);`\n`      this.date = date;`\n`   }`\n\n`   public void\
  \ setFloatValue(Float floatValue) {`\n`      System.out.println(\"Setting float\
  \ value: \" + floatValue);`\n`      this.floatValue = floatValue;`\n`   }`\n\n`   public\
  \ void setStream(InputStream stream) {`\n`      System.out.println(\"Setting stream:\
  \ \" + stream);`\n`      this.stream = stream;`\n`   }`\n\n`   public void setPattern(Pattern\
  \ pattern) {`\n`      System.out.println(\"Setting pattern: \" + pattern);`\n`      this.pattern\
  \ = pattern;`\n`   }`\n\n`   public void setTrimString(String trimString) {`\n`      System.out.println(\"\
  Setting trim string: \" + trimString);`\n`      this.trimString = trimString;`\n\
  `   }`\n\n`   public static void main(String[] args) {`\n`      GenericXmlApplicationContext\
  \ ctx = new GenericXmlApplicationContext();`\n`      ctx.load(\"classpath:pe/builtin.xml\"\
  );`\n`      ctx.refresh();`\n\n`      PropertyEditorBean bean =`\n`          (PropertyEditorBean)\
  \ ctx.getBean(\"builtInSample\");`\n`    }`\n`}`\n\n在清单 5-27 中，你可以看到 `PropertyEditorBean`\
  \ 有 13 个属性，每个属性对应一个内置的 `PropertyEditor`。在清单 5-28 中，你可以看到一个简单的 `BeanFactory` 配置，它为所有这些属性指定了值（`pe/builtin.xml`）。\n\
  \n***清单 5-28.** 使用 `PropertyEditor` 的配置*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"\
