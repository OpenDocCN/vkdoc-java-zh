  \n##### 在 MyBatis 中使用命名参数进行 Select 操作\n\n让我们再看一个使用命名参数的 select 示例，即`findById()`方法。该方法接受一个名为`id`的命名参数，并需要将其传递给\
  \ MyBatis 中的查询。\n\n清单 11-23 展示了添加到`ContactMapper`接口中的方法。\n\n***清单 11-23.** `findById()`\
  \ 方法*\n\n`package com.apress.prospring3.ch11.persistence;`\n\n`import java.util.List;`\n\
  \n`import com.apress.prospring3.ch11.domain.Contact;`\n\n`public interface ContactMapper\
  \ {`\n\n`    public List<Contact> findAll();`\n\n`    public List<Contact> findAllWithDetail();`\n\
  \n`    public Contact findById(Long id);`\n\n`}`\n\n该方法接受 ID 并返回找到的联系人记录。清单 11-24\
  \ 展示了在`ContactMapper.xml`文件中定义的映射。\n\n***清单 11-24.** `findById` Select 操作的映射*\n\n\
  `    <!-- 其他代码已省略 -->`\n\n`    <select id=\"findById\" parameterType=\"long\"`\n\
  `        resultMap=\"contactResultDetailMap\">`\n`        SELECT`\n`        C.ID,`\n\
  `        C.FIRST_NAME,`\n`        C.LAST_NAME,`\n`        C.BIRTH_DATE,`\n`        T.ID\
  \ AS CONTACT_TEL_ID,`\n`        T.TEL_TYPE,`\n`        T.TEL_NUMBER,`\n`        H.HOBBY_ID`\n\
  `        FROM CONTACT C`\n`        LEFT OUTER JOIN CONTACT_TEL_DETAIL T ON C.ID\
  \ = T.CONTACT_ID`\n`        LEFT OUTER JOIN CONTACT_HOBBY_DETAIL H ON C.ID = H.CONTACT_ID`\n\
  `        WHERE C.ID = #{id}`\n`    </select>`\n\n该 select 操作使用了与之前`findAllWithDetail`操作相同的结果映射，用于填充`Contact`对象图。查询语句也相同；只是在查询中添加了一个名为`id`的命名参数。当我们调用`ContactMapper.findById()`方法并传入`id`时，MyBatis\
  \ 会将这个命名参数传递给 select 操作。\n\n清单 11-25 展示了`ContactServiceImpl`类中`findById()`方法的实现。\n\
  \n***清单 11-25.** `findById()` 方法的实现*\n\n`package com.apress.prospring3.ch11.service.mybatis;`\n\
  \n`// 导入语句已省略`\n\n`@Service(\"contactService\")`\n`@Repository`\n`@Transactional`\n\
  `public class ContactServiceImpl implements ContactService {`\n\n`    // 其他代码已省略`\n\
  `    @Transactional(readOnly=true)`\n`    public Contact findById(Long id) {`\n\
  `        Contact contact = contactMapper.findById(id);`\n`        populateContactTelDetail(contact);`\n\
  `        return contact;`\n`    }`\n\n`    // 其他代码已省略`\n\n`}`\n\n为了测试`findById()`方法，请将清单\
  \ 11-26 中的代码片段添加到`MyBatisSample`类的`main()`方法中。\n\n***清单 11-26.** 测试 `findById()`\
  \ 方法*\n\n`        // 根据 id 查找联系人`\n`        contacts = new ArrayList<Contact>();`\n\
  `        System.out.println(\"查找 id 为 1 的联系人\");`\n`        Contact contact = contactService.findById(1l);`\n\
  `        contacts.add(contact);`\n`        listContactsWithDetail(contacts);`\n\n\
  运行程序将产生 ID 为 1 的联系人结果。\n\n\n\n##### 在 MyBatis 中使用动态 SQL 进行查询\n\nMyBatis 在编程式查询操作中一个强大的特性是动态\
  \ SQL，它极大地简化了复杂查询的开发。为了演示其用法，我们在 `ContactMapper` 接口中添加 `findByFirstNameAndLastName()`\
  \ 方法，如清单 11-27 所示。\n\n***清单 11-27.** `findByFirstNameAndLastName()` 方法*\n\n`package\
  \ com.apress.prospring3.ch11.persistence;`\n\n`import java.util.List;`\n\n`import\
  \ com.apress.prospring3.ch11.domain.*;`\n\n`public interface ContactMapper {`\n\n\
  `    public List<Contact> findAll();`\n\n`    public List<Contact> findAllWithDetail();`\n\
  \n`    public Contact findById(Long id);`\n\n`    public List<Contact> findByFirstNameAndLastName(SearchCriteria\
  \ criteria);`\n`}`\n\n从清单 11-27 可以看出，我们没有接受两个参数（名字和姓氏），而是定义了一个 Java 类来存储搜索条件。清单\
  \ 11-28 展示了 `SearchCriteria` 类。\n\n***清单 11-28.** `SearchCriteria` 类*\n\n`package\
  \ com.apress.prospring3.ch11.domain;`\n\n`public class SearchCriteria {`\n\n`    private\
  \ String firstName;`\n`    private String lastName;`\n\n`    // 省略了 Getter/setter\
  \ 方法`\n`}`\n\n该类简单地将可能的搜索条件存储到属性中。接下来，我们看看搜索条件是如何被代入 MyBatis 的动态 SQL 中的。清单 11-29\
  \ 展示了 `findByFirstNameAndLastName` 操作的映射。\n\n***清单 11-29.** `findByFirstNameAndLastName`\
  \ 操作的映射*\n\n`    <!-- 其他代码已省略 -->`\n\n`    <select id=\"findByFirstNameAndLastName\"\
  \ parameterType=\"SearchCriteria\"`\n`        resultMap=\"contactResultDetailMap\"\
  >`\n`        SELECT`\n`        C.ID,`\n`        C.FIRST_NAME,`\n`        C.LAST_NAME,`\n\
  `        C.BIRTH_DATE,`\n`        T.ID AS CONTACT_TEL_ID,`\n`        T.TEL_TYPE,`\n\
  `        T.TEL_NUMBER,`\n`        H.HOBBY_ID`\n`        FROM CONTACT C`\n`        LEFT\
  \ OUTER JOIN CONTACT_TEL_DETAIL T ON C.ID = T.CONTACT_ID`\n`        LEFT OUTER JOIN\
  \ CONTACT_HOBBY_DETAIL H ON C.ID = H.CONTACT_ID`\n`        <where>`\n`            <if\
  \ test=\"firstName != null\">`\n`                first_name = #{firstName}`\n`            </if>`\n\
  `            <if test=\"lastName != null\">`\n`                AND last_name = #{lastName}`\n\
  `            </if>`\n`        </where>`\n`    </select>`\n\n从清单 11-29 可以看出，神奇之处在于\
  \ `<where>` 标签，MyBatis 会智能地处理它来构建动态 SQL。例如，它会首先检查传入的 `SearchCriteria` 中的 `firstName`\
  \ 属性是否为 `null`。如果不是，它会将子句 `WHERE FIRST_NAME =` 和该属性相应地添加到查询中。对于 `lastName` 属性也是如此。一个巧妙之处是，如果你没有提供名字，MyBatis\
  \ 会智能地从使用姓氏的 `WHERE` 子句中移除 `AND` 运算符。如果两个属性都为 `null`，MyBatis 会直接完全省略 `WHERE` 子句。清单\
  \ 11-30 展示了 `ContactServiceImpl` 类中 `findByFirstNameAndLastName()` 方法的实现。\n\n***清单\
  \ 11-30.** 实现 `findByFirstNameAndLastName()` 方法*\n\n`package com.apress.prospring3.ch11.service.mybatis;`\n\
  \n`// 导入语句已省略`\n\n`@Service(\"contactService\")`\n`@Repository`\n`@Transactional`\n\
  `public class ContactServiceImpl implements ContactService {`\n\n`    // 其他代码已省略`\n\
  `    @Transactional(readOnly=true)`\n`    public List<Contact> findByFirstNameAndLastName(String\
  \ firstName,`\n`        String lastName) {`\n`        log.info(\"查找联系人，名字为：\" +\
  \ firstName`\n`            + \"，姓氏为：\" + lastName);`\n`        Contact contact =\
  \ new Contact();`\n`        contact.setFirstName(firstName);`\n`        contact.setLastName(lastName);`\n\
  `        SearchCriteria criteria = new SearchCriteria();`\n`        criteria.setFirstName(firstName);`\n\
  `        criteria.setLastName(lastName);`\n\n`        List<Contact> contacts = contactMapper.findByFirstNameAndLastName(criteria);`\n\
  `        for (Contact contactTemp: contacts) {`\n`            populateContactTelDetail(contactTemp);`\n\
  `        }`\n\n`        return contacts;`\n`    }`\n`}`\n\n如清单 11-30 所示，该方法仍然接受名字和姓氏作为参数。不过，它会构建\
  \ `SearchCriteria` 实例并传递给 `ContactMapper` 进行数据检索。为了测试 `findByFirstNameAndLastName()`\
