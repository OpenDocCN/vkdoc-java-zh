  \n对于后端，我们将使用 JPA 2 和 Hibernate 作为持久化服务提供者。此外，还将使用 Spring Data JPA 的仓库抽象。图 18-2 显示了服务层的类图。\n\
  \n![images](img/9781430241072_Fig18-02.jpg)\n\n***图 18-2.** 示例的服务层类图*\n\n#### 在\
  \ STS 中导入示例后端\n\n由于本章侧重于前端开发，我们准备了一个包含已实现服务层的项目，以便您可以直接导入，然后继续实现前端。\n\n从示例代码中，将文件\
