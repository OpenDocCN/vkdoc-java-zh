  \n### Spring 中的异步任务执行\n\n在 3.0 版本中，Spring 还支持使用注解来异步执行任务。要使用它，你只需使用 `@Async` 注解该方法即可。\n\
  \n让我们通过一个简单的示例来看看它的实际应用。清单 15-13 和清单 15-14 分别展示了 `AsyncService` 接口及其实现类 `AsyncServiceImpl`。\n\
  \n***清单 15-13.** `AsyncService` 接口*\n\n`package com.apress.prospring3.ch15.service;`\n\
  \n`import java.util.concurrent.Future;`\n\n`public interface AsyncService {`\n\n\
  `    public void asyncTask();`\n\n`    public Future<String> asyncWithReturn(String\
  \ name);`\n\n`}`\n\n***清单 15-14.** `AsyncServiceImpl` 类*\n\n`package com.apress.prospring3.ch15.service.async;`\n\
  \n`import java.util.concurrent.Future;`\n\n`import org.slf4j.Logger;`\n`import org.slf4j.LoggerFactory;`\n\
  `import org.springframework.scheduling.annotation.Async;`\n`import org.springframework.scheduling.annotation.AsyncResult;`\n\
  `import org.springframework.stereotype.Service;`\n\n`import com.apress.prospring3.ch15.service.AsyncService;`\n\
  \n`@Service(\"asyncService\")`\n`public class AsyncServiceImpl implements AsyncService\
  \ {`\n\n`    final Logger logger = LoggerFactory.getLogger(AsyncServiceImpl.class);`\n\
  \n`    @Async`\n`    public void asyncTask() {`\n\n`        logger.info(\"开始执行异步任务\"\
  );`\n\n`        try {`\n`            Thread.sleep(10000);`\n`        } catch (Exception\
  \ ex) {`\n`            ex.printStackTrace();`\n`        }`\n\n`        logger.info(\"\
  异步任务执行完成\");`\n`    }`\n\n`    @Async`\n`    public Future<String> asyncWithReturn(String\
  \ name) {`\n\n`        logger.info(\"开始执行带返回值的异步任务\");`\n\n`        try {`\n`            Thread.sleep(5000);`\n\
  `        } catch (Exception ex) {`\n`            ex.printStackTrace();`\n`        }`\n\
  \n`        logger.info(\"带返回值的异步任务执行完成\");`\n\n**`        return new AsyncResult<String>(\"\
  你好: \" + name);`**\n`    }`\n`}`\n\n`AsyncService` 定义了两个方法。`asyncTask()` 是一个简单的任务，用于将信息记录到日志中。方法\
  \ `asyncWithReturn()` 接受一个 `String` 参数，并返回一个 `java.util.concurrent.Future<V>` 接口的实例。请注意加粗的代码；在\
  \ `asyncWithReturn()` 完成后，结果存储在 `org.springframework.scheduling.annotation.AsyncResult<V>`\
  \ 类的实例中，该类实现了 `Future<V>` 接口，可供调用者稍后检索执行结果。\n\n清单 15-15 展示了 Spring 配置文件（`async-app-context.xml`）。\n\
