  \n首先，将`context`命名空间添加到配置文件中。然后，将`datasource-tx-jpa.xml`文件导入到`WebApplicationContext`中，最后，我们指示\
  \ Spring 扫描指定的包以查找 Spring Bean。\n\n现在服务层已完成，可供远程客户端暴露和使用。\n\n### 介绍 MVC 与 Spring\
  \ MVC\n\n在继续实现表示层之前，让我们先了解 MVC 作为 Web 应用程序模式的一些主要概念，以及 Spring MVC 如何在这方面提供全面支持。\n\
  \n在接下来的章节中，我们将逐一讨论这些高级概念。首先，我们将简要介绍 MVC。其次，我们将呈现 Spring MVC 及其`WebApplicationContext`层次结构的高级视图。最后，我们将讨论\
  \ Spring MVC 中的请求生命周期。\n\n\n\n#### 介绍 MVC\n\nMVC 是在实现应用程序表示层时常用的一种模式。MVC 模式的主要原则是定义一个架构，让不同组件拥有清晰的职责。顾名思义，MVC\
  \ 模式包含三个参与者：\n\n*   ***模型***：模型代表业务数据，以及在用户上下文中的应用程序“状态”。例如，在一个电子商务网站上，如果用户在该网站购买商品，模型将包含用户个人信息、购物车数据和订单数据。\n\
  *   ***视图***：视图以所需格式向用户呈现数据，支持与用户的交互，并支持客户端验证、国际化、样式等。\n*   ***控制器***：控制器处理用户在前端执行的操作请求，与服务层交互，更新模型，并根据执行结果将用户引导至适当的视图。\n\
  \n由于基于 Ajax 的 Web 应用程序的兴起，MVC 模式得到了增强，以提供更具响应性和更丰富的用户体验。例如，在使用 JavaScript 时，视图可以“监听”用户执行的事件或操作，然后向服务器提交一个\
  \ `XMLHttpRequest`。在控制器端，不再返回视图，而是返回原始数据（例如，XML 或 JSON 格式），然后 JavaScript 应用程序使用接收到的数据对视图进行“部分”更新。图\
  \ 17-1 展示了这一概念。\n\n![images](img/9781430241072_Fig17-01.jpg)\n\n***图 17-1.** MVC\
  \ 模式*\n\n图 17-1 展示了一种常用的 Web 应用程序模式，它可以被视为对传统 MVC 模式的增强。一个普通的视图请求按如下方式处理：\n\n1.\
  \  ***请求***：向服务器提交一个请求。在服务器端，大多数框架（例如 Spring MVC、Struts 等）都会有一个调度器（以 Servlet 的形式）来处理该请求。\n\
  2.  ***调用***：调度器根据 HTTP 请求信息和 Web 应用程序配置，将请求分派给适当的控制器。\n3.  ***服务调用***：控制器与服务层交互。\n\
  4.  ***响应***：控制器更新模型，并根据执行结果向用户返回相应的视图。\n\n此外，在视图内部，可能会发生 Ajax 调用。例如，假设用户正在网格中浏览数据。当用户点击下一页时，不会刷新整个页面，而是会发生以下流程：\n\
  \n1.  ***请求***：准备一个 `XMLHttpRequest` 并提交给服务器。调度器会将请求分派给相应的控制器。\n2.  ***响应***：控制器与服务层交互，响应数据将被格式化并发送到浏览器。在这种情况下不涉及视图。浏览器接收数据并对现有视图执行部分更新。\n\
  \n#### 介绍 Spring MVC\n\n在 Spring 框架中，Spring MVC 模块为 MVC 模式提供了全面的支持，并支持其他特性（例如主题、国际化、验证、类型转换和格式化等），从而简化了表示层的实现。\n\
  \n在接下来的章节中，我们将讨论 Spring MVC 的主要概念。主题包括 Spring MVC 的 `WebApplicationContext` 层次结构、典型的请求处理生命周期以及配置。\n\
  \n##### Spring MVC WebApplicationContext 层次结构\n\n在 Spring MVC 中，`DispatcherServlet`\
  \ 是接收请求并将其分派给适当控制器的中央 Servlet。在一个 Spring MVC 应用程序中，可以有任意数量的 `DispatcherServlet`\
  \ 用于不同目的（例如，处理用户界面请求、RESTful Web 服务请求等），并且每个 `DispatcherServlet` 都有自己的 `WebApplicationContext`\
  \ 配置，该配置定义了 Servlet 级别的特性，例如支持该 Servlet 的控制器、处理器映射、视图解析、国际化、主题、验证、类型转换和格式化等。\n\n\
  在 Servlet 级别的 `WebApplicationContext` 配置之下，Spring MVC 还维护一个根 `WebApplicationContext`，其中包含应用程序级别的配置，例如后端数据源、安全性、服务和持久层配置等。根\
  \ `WebApplicationContext` 将对所有 Servlet 级别的 `WebApplicationContext` 可用。\n\n让我们看一个例子。假设在一个应用程序中，我们有两个\
  \ `DispatcherServlet`。一个 Servlet 用于支持用户界面（我们称之为应用程序 Servlet），另一个用于以 RESTful Web\
  \ 服务的形式向其他应用程序提供服务（我们称之为 RESTful Servlet）。在 Spring MVC 中，我们将为根 `WebApplicationContext`\
  \ 以及两个 `DispatcherServlet` 的 `WebApplicationContext` 定义配置。图 17-2 展示了 Spring MVC\
  \ 为此场景维护的 `WebApplicationContext` 层次结构。\n\n![images](img/9781430241072_Fig17-02.jpg)\n\
  \n***图 17-2.** Spring MVC `WebApplicationContext` 层次结构*\n\n\n\n##### Spring MVC\
  \ 请求生命周期\n\n让我们看看 Spring MVC 如何处理一个请求。图 17-3 展示了 Spring MVC 中处理请求所涉及的主要组件。该图基于 Spring\
  \ 框架论坛（[`http://forum.springsource.org/showthread.php?21639-Spring-MVC-Request-Lifecycle-Diagram`](http://forum.springsource.org/showthread.php?21639-Spring-MVC-Request-Lifecycle-Diagram)）中描述的图表，并进行了修改。\n\
  \n![images](img/9781430241072_Fig17-03.jpg)\n\n***图 17-3.** Spring MVC 请求生命周期*\n\
  \n主要组件及其用途如下：\n\n*   *过滤器*：过滤器适用于每个请求。下一节将介绍几种常用的过滤器及其用途。\n*   *调度器 Servlet*：该 Servlet\
  \ 分析请求并将其分派给相应的控制器进行处理。\n*   *通用服务*：通用服务将应用于每个请求，以提供包括国际化（i18n）、主题、文件上传等在内的支持。它们的配置在\
  \ `DispatcherServlet` 的 `WebApplicationContext` 中定义。\n*   *处理器映射*：将请求映射到处理器（Spring\
  \ MVC 控制器类中的一个方法）。自 Spring 2.5 起，大多数情况下无需配置，因为 Spring MVC 会自动注册 `org.springframework.web.servlet.mvc.annotation.DefaultAnnotationHandlerMapping`\
  \ 类，该类根据控制器类中类型或方法级别上通过 `@RequestMapping` 注解表达的 HTTP 路径来映射处理器。\n*   *处理器拦截器*：在 Spring\
  \ MVC 中，你可以为处理器注册拦截器，以实现通用的检查或逻辑。例如，处理器拦截器可以检查并确保仅在办公时间内才能调用处理器。\n*   *处理器异常解析器*：在\
  \ Spring MVC 中，`HandlerExceptionResolver` 接口（位于 `org.springframework.web.servlet`\
  \ 包下）旨在处理处理器在请求处理过程中抛出的意外异常。默认情况下，`DispatcherServlet` 会注册 `DefaultHandlerExceptionResolver`\
  \ 类（位于 `org.springframework.web.servlet.mvc.support` 包下）。该解析器通过设置特定的响应状态码来处理某些标准的\
  \ Spring MVC 异常。你也可以通过使用 `@ExceptionHandler` 注解标注控制器方法并将异常类型作为属性传入，来实现自己的异常处理器。\n\
  *   *视图解析器*：Spring MVC 的 `ViewResolver` 接口（位于 `org.springframework.web.servlet`\
  \ 包下）支持基于控制器返回的逻辑名称进行视图解析。有许多实现类支持各种视图解析机制。例如，`UrlBasedViewResolver` 类支持将逻辑名称直接解析为\
  \ URL。`ContentNegotiatingViewResolver` 类支持根据客户端支持的媒体类型（如 XML、PDF、JSON 等）动态解析视图。此外，还有许多实现用于集成不同的视图技术，例如\
  \ FreeMarker（`FreeMarkerViewResolver`）、Velocity（`VelocityViewResolver`）和 JasperReports（`JasperReportsViewResolver`）。\n\
  \n这些描述仅涵盖了一些常用的处理器和解析器。如需完整描述，请参考 Spring 框架参考文档及其 Javadoc。\n\n##### Spring MVC 配置\n\
  \n要在 Web 应用程序中启用 Spring MVC，需要进行一些初始配置，特别是位于 `/src/main/webapp/WEB-INF` 文件夹中的 Web\
  \ 部署描述符 `web.xml`（Spring 3.1 引入了一项新功能，支持在 Servlet 3.0 Web 容器中进行基于代码的配置，我们将在本章的“支持\
  \ Servlet 3 基于代码的配置”中讨论）。\n\n要为 Web 应用程序配置 Spring MVC 支持，我们需要在 Web 部署描述符中执行以下配置：\n\
  \n*   配置根 `WebApplicationContext`\n*   配置 Spring MVC 所需的 Servlet 过滤器\n*   配置应用程序中的调度器\
  \ Servlet\n\n在 Spring MVC 模板项目中，它生成的 `web.xml` 文件支持 Servlet 2.5。在本章中，我们将使用 Servlet\
  \ 3.0（STS 附带的 tcServer 构建在 Apache Tomcat 7 之上，后者已支持 Servlet 3.0），因此我们也需要将 XML 头部从\
  \ 2.5 更改为 3.0。清单 17-9 显示了修改后的 `web.xml` 文件。\n\n***清单 17-9.** Spring MVC 的 Web 部署描述符*\n\
