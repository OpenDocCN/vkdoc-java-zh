  `</beans>`\n\n关于每个 bean 定义的详细信息，请参考第 10 章。然后，我们需要将该配置导入到 Spring 的根 `WebApplicationContext`\
  \ 中。对于一个 Spring MVC 模板项目，该文件位于 `/src/main/webapp/WEB-INF/spring/root-context.xml`。清单\
  \ 16-8 展示了修改后的文件。\n\n***清单 16-8.** `root-context.xml` 文件*\n\n`<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n\
  `        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n`        http://www.springframework.org/schema/context`\n\
  `        http://www.springframework.org/schema/context/spring-context-3.1.xsd\"\
  >`\n\n`    <import resource=\"classpath:datasource-tx-jpa.xml\" />`\n\n`    <context:component-scan`\n\
  `        base-package=\"com.apress.prospring3.ch16.service.jpa\" />`\n`</beans>`\n\
  \n首先，将 `context` 命名空间添加到配置文件中。然后，将 `datasource-tx-jpa.xml` 文件导入到 `WebApplicationContext`\
  \ 中，最后，我们指示 Spring 扫描指定的包以查找 Spring bean。\n\n至此，服务层已完成，可供远程客户端调用和使用。\n\n### 使用 Spring\
  \ HTTP Invoker\n\n如果你要通信的应用程序也是基于 Spring 的，那么使用 Spring HTTP invoker 是一个不错的选择。它提供了一种极其简单的方式，将\
  \ Spring `WebApplicationContext` 中的服务暴露给同样使用 Spring HTTP invoker 调用服务的远程客户端。以下各节将详细阐述暴露和访问服务的过程。\n\
  \n#### 暴露服务\n\n为了暴露服务，在 `root-context.xml` 配置文件中，添加清单 16-9 中的 bean 定义。\n\n***清单\
  \ 16-9.** 使用 HTTP Invoker 暴露 ContactService 的 Bean*\n\n`    <bean name=\"contactExporter\"\
  `\n`class=\"org.springframework.remoting.httpinvoker.HttpInvokerServiceExporter\"\
  >`\n`        <property name=\"service\" ref=\"contactService\" />`\n`        <property\
  \ name=\"serviceInterface\"`\n`            value=\"com.apress.prospring3.ch16.service.ContactService\"\
  \ />`\n`    </bean>`\n\n如清单 16-9 所示，定义了一个名为 `contactExporter` 的 bean，其类为 `HttpInvokerServiceExporter`，该类用于通过\
  \ HTTP invoker 将任何 Spring bean 导出为服务。在该 bean 中，定义了两个属性。第一个是 `service` 属性，指明提供服务的\
  \ bean。对于此属性，注入了 `contactService` bean。第二个属性是要暴露的接口类型，即 `com.apress.prospring3.ch16.service.ContactService`\
  \ 接口。\n\n接下来，我们需要在 Web 部署描述符（`/src/main/webapp/WEB-INF/web.xml`）中为该服务定义一个 servlet。清单\
  \ 16-10 展示了需要添加到 `web.xml` 文件中的代码片段。\n\n***清单 16-10.** HTTP Invoker 的 Servlet 定义*\n\
  \n`    <!-- Spring Remoting with HTTP Invoker -->`\n`    <servlet>`\n`        <servlet-name>contactExporter</servlet-name>`\n\
  `        <servlet-class>`\n`            org.springframework.web.context.support.HttpRequestHandlerServlet`\n\
  `        </servlet-class>`\n`    </servlet>`\n\n`    <servlet-mapping>`\n`        <servlet-name>contactExporter</servlet-name>`\n\
  `        <url-pattern>/remoting/ContactService</url-pattern>`\n`    </servlet-mapping>`\n\
  \n如清单 16-10 所示，定义了一个类为 `HttpRequestHandlerServlet` 的 servlet，它用于暴露在 `WebApplicationContext`\
  \ 中定义的 Spring 导出器。请注意，servlet 名称（`contactExporter`）应与导出器的 bean 名称（参见清单 16-9；bean\
  \ 名称也是 `contactExporter`）相匹配。然后，将该 servlet 映射到应用程序 Web 上下文（即 [`http://localhost:8080/ch16`](http://localhost:8080/ch16)）下的\
  \ URL `/remoting/ContactService`。\n\n到目前为止，如果你使用的是 STS 项目的默认设置，项目应该已经重建并部署到了 tc\
  \ Server。现在，我们可以继续开发客户端来调用该服务了。\n\n\n\n#### 调用服务\n\n通过 Spring HTTP 调用器调用服务非常简单。首先，我们配置一个\
  \ Spring `ApplicationContext`，如清单 16-11（`http-invoker-app-context.xml`）所示。\n\n***清单\
  \ 16-11.** HTTP 调用器客户端的 Spring `ApplicationContext`*\n\n`<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n\
  `        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\">`\n\n\
  `    <bean id=\"remoteContactService\"`\n`class=\"org.springframework.remoting.httpinvoker.HttpInvokerProxyFactoryBean\"\
  >`\n`        <property name=\"serviceUrl\"`\n`            value=\"http://localhost:8080/ch16/remoting/ContactService\"\
  \ />`\n`        <property name=\"serviceInterface\"`\n`            value=\"com.apress.prospring3.ch16.service.ContactService\"\
  \ />`\n`    </bean>`\n\n`</beans>`\n\n如清单 16-11 所示，在客户端声明了一个类型为 `HttpInvokerProxyFactoryBean`\
  \ 的 bean。设置了两个属性。`serviceUrl` 指定了远程服务的位置，即 [`http://localhost:8080/ch16/remoting/ContactService`](http://localhost:8080/ch16/remoting/ContactService)。第二个属性是服务的接口（即\
  \ `ContactService` 接口）。如果你正在为客户端开发另一个项目，则需要在客户端应用程序的类路径中包含 `ContactService` 接口和\
  \ `Contact` 实体类。\n\n清单 16-12 展示了一个用于调用远程服务的主类。\n\n***清单 16-12.** `HttpInvokerClientSample`\
  \ 类*\n\n`package com.apress.prospring3.ch16.remoting;`\n\n`import java.util.List;`\n\
  \n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\n\
  `import com.apress.prospring3.ch16.domain.Contact;`\n`import com.apress.prospring3.ch16.service.ContactService;`\n\
  \n`public class HttpInvokerClientSample {`\n\n`    public static void main(String[]\
  \ args) {`\n\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:http-invoker-app-context.xml\");`\n`        ctx.refresh();`\n\
  \n`        ContactService contactService =`\n`            ctx.getBean(\"remoteContactService\"\
  , ContactService.class);`\n\n`        // 查找所有联系人`\n`        System.out.println(\"\
  正在查找所有联系人\");`\n`        List<Contact> contacts = contactService.findAll();`\n`        listContacts(contacts);`\n\
  \n`        // 按名字查找联系人`\n`        System.out.println(\"正在查找名字为 Clarence 的联系人\");`\n\
  `        contacts = contactService.findByFirstName(\"Clarence\");`\n`        listContacts(contacts);`\n\
  \n`    }`\n\n`    private static void listContacts(List<Contact> contacts) {`\n\n\
  `        for (Contact contact: contacts) {`\n`            System.out.println(contact);`\n\
  `        }`\n`        System.out.println(\"\");`\n\n`    }`\n`}`\n\n如清单 16-12 所示，该程序与任何其他独立的\
  \ Spring 应用程序一样。首先初始化 `ApplicationContext`，然后获取 `contactService` bean。接着，我们就像调用本地应用程序一样调用其方法。运行该程序将产生以下输出：\n\
  \n`正在查找所有联系人`\n`Contact - Id: 1, First name: Clarence, Last name: Ho, Birthday:\
  \ 1980-07-30T00:00:00.000+08:00`\n`Contact - Id: 2, First name: Scott, Last name:\
  \ Tiger, Birthday: 1990-11-02T00:00:00.000+08:00`\n`Contact - Id: 3, First name:\
  \ John, Last name: Smith, Birthday: 1964-02-28T00:00:00.000+08:00`\n\n`正在查找名字为 Clarence\
  \ 的联系人`\n`Contact - Id: 1, First name: Clarence, Last name: Ho, Birthday: 1980-07-30T00:00:00.000+08:00`\n\
  \n在前面的输出中，你可以看到调用了 `findAll()` 和 `findByFirstName()` 方法，并返回了结果。\n\n### 在 Spring\
  \ 中使用 JMS\n\n使用面向消息的中间件（通常称为 *MQ 服务器*）是支持应用程序间通信的另一种流行方式。消息队列（MQ）服务器的主要优点是它为应用程序集成提供了一种异步且松散耦合的方式。在\
  \ Java 世界中，JMS 是连接 MQ 服务器以发送或接收消息的标准。\n\nMQ 服务器维护一个队列和主题列表，应用程序可以连接到这些队列和主题来发送和接收消息。以下是队列和主题之间区别的简要说明：\n\
  \n*   *队列*：队列用于支持点对点消息交换模型。当生产者向队列发送消息时，MQ 服务器将消息保留在队列中，并在消费者下次连接时将其传递给一个且仅一个消费者。\n\
  *   *主题*：主题用于支持发布-订阅模型。任意数量的客户端都可以订阅主题内的消息。当该主题有消息到达时，MQ 服务器会将其传递给所有已订阅该消息的客户端。当有多个应用程序对同一信息（例如，新闻源）感兴趣时，此模型特别有用。\n\
  \n在 JMS 中，生产者连接到 MQ 服务器并将消息发送到队列或主题。消费者也连接到 MQ 服务器，并监听队列或主题以获取感兴趣的消息。在 JMS 1.1 中，API\
  \ 被统一了，因此生产者和消费者无需为与队列和主题交互而处理不同的 API。在本节中，我们将重点介绍使用队列的点对点风格，这是企业中更常用的模式。\n\n为了开发和测试\
  \ JMS 应用程序，需要一个 MQ 服务器。在本节中，我们将使用 Apache ActiveMQ 服务器（`activemq.apache.org`），这是一个非常流行的开源\
  \ MQ 服务器。\n\n为了准备示例，需要几个新的 Maven 依赖项，如表 16-2 所列。请将它们添加到你的项目中。\n\n![images](img/t1602.jpg)\n\
  \n以下各节将讨论如何设置 ActiveMQ 服务器以及如何在 Spring 中使用 JMS。\n\n#### 设置 ActiveMQ\n\n为开发用途设置 ActiveMQ\
  \ 很容易。首先，从 ActiveMQ 网站（`activemq.apache.org/download.html`）下载最新版本，并将存档解压到计算机上的一个文件夹中。在撰写本文时，最新版本是\
  \ 5.5.1。\n\n解压后，导航到 bin 文件夹，并运行 `activemq` 命令（对于 Windows，它是 `activemq.bat`；而对于 Unix/Linux，它是\
  \ `activemq`）。服务器将启动，完成后，你将看到类似图 16-9 的输出。\n\n![images](img/9781430241072_Fig16-09.jpg)\n\
  \n***图 16-9.** 启动 ActiveMQ 服务器*\n\n在屏幕上，你将看到 ActiveMQ 服务器正在监听端口 61616 以进行 JMS 连接。此外，还启动了一个用于管理的嵌入式\
  \ Web 服务器，地址为 localhost:8161/admin。打开 Web 浏览器并访问管理网站。你看到的第一页将类似于图 16-10。\n\n![images](img/9781430241072_Fig16-10.jpg)\n\
  \n***图 16-10.** ActiveMQ 服务器管理网站*\n\n让我们创建一个用于测试的队列。在顶部菜单中，单击 Queues；然后在文本框中输入 **prospring3**\
  \ 作为队列名称，并单击 Create 按钮。完成后，队列将被创建，如图 16-11 所示。\n\n![images](img/9781430241072_Fig16-11.jpg)\n\
  \n***图 16-11.** 在 ActiveMQ 中创建队列*\n\n至此，ActiveMQ 服务器的设置已完成，我们可以继续使用 Spring 开发一个\
  \ JMS 客户端来连接服务器并接收消息。\n\n\n\n#### 在 Spring 中实现 JMS 监听器\n\n要开发一个消息监听器，我们需要创建一个实现\
  \ `javax.jms.MessageListener` 接口并实现其 `onMessage()` 方法的类。清单 16-13 展示了这个类。\n\n***清单\
  \ 16-13.** JMS 消息监听器类*\n\n`package com.apress.prospring3.ch16.jms.listener;`\n\n\
  `import javax.jms.JMSException;`\n`import javax.jms.Message;`\n`import javax.jms.MessageListener;`\n\
  `import javax.jms.TextMessage;`\n\n`import org.slf4j.Logger;`\n`import org.slf4j.LoggerFactory;`\n\
  \n`public class SimpleMessageListener implements MessageListener {`\n\n`    private\
  \ static final Logger logger =`\n`    LoggerFactory.getLogger(SimpleMessageListener.class);`\n\
  \n`    public void onMessage(Message message) {`\n\n`        TextMessage textMessage\
  \ = (TextMessage) message;`\n\n`        try {`\n`            logger.info(\"Message\
  \ received: \" + textMessage.getText());`\n`        } catch (JMSException ex) {`\n\
  `            logger.error(\"JMS error\", ex);`\n`        }`\n\n`    }`\n`}`\n\n\
  如清单 16-13 所示，在 `onMessage()` 方法中，当消息到达时，会传入一个 `javax.jms.Message` 接口的实例。在该方法内部，消息被转换为\
  \ `javax.jms.TextMessage` 接口的实例，并使用 `TextMessage.getText()` 方法检索文本形式的消息体。有关可能的消息格式列表，请参考\
  \ JEE 的在线文档 ([`http://docs.oracle.com/javaee/6/api/javax/jms/Message.html`](http://docs.oracle.com/javaee/6/api/javax/jms/Message.html))。\n\
  \n有了消息监听器之后，下一步是定义 Spring 的 `ApplicationContext` 配置。清单 16-14 展示了该文件 (`jms-listener-app-context.xml`)。\n\
  \n***清单 16-14.** JMS 消息监听器配置*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n\
  `<beans`\n\n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n\
  `        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n`        http://www.springframework.org/schema/jms`\n\
  `        http://www.springframework.org/schema/jms/spring-jms-3.1.xsd\">`\n\n`    <bean\
  \ id=\"connectionFactory\"`\n`        class=\"org.apache.activemq.ActiveMQConnectionFactory\"\
  `\n`        p:brokerURL=\"tcp://localhost:61616\" />`\n\n`    <bean id=\"simpleMessageListener\"\
  \ class=\"com.apress.prospring3.ch16.jms.listener.SimpleMessageListener\"/>`\n\n\
  `    <jms:listener-container container-type=\"default\"`\n`        connection-factory=\"\
  connectionFactory\" acknowledge=\"auto\">`\n`        <jms:listener destination=\"\
  prospring3\" ref=\"simpleMessageListener\"`\n`            method=\"onMessage\" />`\n\
  `    </jms:listener-container>`\n\n`</beans>`\n\n如清单 16-14 所示，我们首先声明了一个由 ActiveMQ\
  \ Java 库（`ActiveMQConnectionFactory` 类）提供的 `javax.jms.ConnectionFactory` 接口。请注意，`brokerURL`\
  \ 属性应与启动 ActiveMQ 时使用的 URL 相同，如图 16-9 所示。然后，声明了一个 `SimpleMessageListener` 类型的 bean。最后，我们使用\
  \ Spring 的 `jms` 命名空间提供的便捷标签 `<jms:listener-container>` 来声明一个消息监听器，并提供了目标（即 prospring3\
  \ 队列）、bean 引用以及消息到达时要调用的方法。\n\n清单 16-15 展示了用于测试接收消息的主测试程序。\n\n***清单 16-15.** 测试\
  \ JMS 消息监听器*\n\n`package com.apress.prospring3.ch16.jms;`\n\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  \n`public class JmsListenerSample {`\n\n`    public static void main(String[] args)\
  \ {`\n\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:jms-listener-app-context.xml\");`\n`        ctx.refresh();`\n\
  \n`        while (true) {`\n`        }`\n\n`    }`\n`}`\n\n这个程序没有什么特别之处。它只是初始化了\
  \ `ApplicationContext`，然后无限循环。运行该程序，它将连接到 ActiveMQ 并等待消息到达 prospring3 队列。现在，让我们尝试向\
  \ prospring3 队列发送一条消息。在 ActiveMQ 管理网站中，点击顶部菜单中的 Send 选项，输入队列名称和消息体，然后点击 Send，如图\
  \ 16-12 所示。\n\n![images](img/9781430241072_Fig16-12.jpg)\n\n***图 16-12.** 在 ActiveMQ\
  \ 中发送消息*\n\n点击 Send 按钮后，您将在 STS 的输出控制台中看到监听器输出的消息：\n\n`INFO : com.apress.prospring3.ch16.jms.listener.SimpleMessageListener\
  \ – Message received: Testing message for Spring JMS Listener`\n\n您可以看到在 Spring\
  \ 中设置一个用于远程通信的 JMS 监听器是多么容易。在 JEE 应用服务器环境中，您只需在 Spring 配置文件中使用 JNDI 查找来配置连接工厂即可。无需更改其他代码。\n\
  \n\n\n#### 在 Spring 中发送 JMS 消息\n\n让我们看看如何在 Spring 中使用 JMS 发送消息。为此，我们将使用便捷的 `org.springframework.jms.core.JmsTemplate`\
  \ 类。首先，我们将开发一个 `MessageSender` 接口及其实现类 `SimpleMessageSender`。清单 16-16 和 16-17 分别展示了该接口和类。\n\
  \n***清单 16-16.** `MessageSender` 接口*\n\n`package com.apress.prospring3.ch16.jms.sender;`\n\
  \n`public interface MessageSender {`\n\n`    public void sendMessage(String message);`\n\
  `}`\n\n***清单 16-17.** `SimpleMessageSender` 类*\n\n`package com.apress.prospring3.ch16.jms.sender;`\n\
  \n`import javax.jms.JMSException;`\n`import javax.jms.Message;`\n`import javax.jms.Session;`\n\
  \n`import org.springframework.beans.factory.annotation.Autowired;`\n`import org.springframework.jms.core.JmsTemplate;`\n\
  `import org.springframework.jms.core.MessageCreator;`\n`import org.springframework.stereotype.Component;`\n\
  \n`@Component(\"messageSender\")`\n`public class SimpleMessageSender implements\
  \ MessageSender {`\n\n`    @Autowired`\n`    private JmsTemplate jmsTemplate;`\n\
  \n`    public void sendMessage(final String message) {`\n`        this.jmsTemplate.send(new\
  \ MessageCreator() {`\n`            public Message createMessage(Session session)`\n\
  `                throws JMSException {`\n`                return session.createTextMessage(message);`\n\
  `            }`\n`        });`\n`    }`\n`}`\n\n如清单 16-17 所示，注入了一个 `JmsTemplate`\
  \ 实例。在 `sendMessage()` 方法中，我们调用了 `JmsTemplate.send()` 方法，并内联构造了一个 `org.springframework.jms.core.MessageCreator`\
  \ 接口的实例。在 `MessageCreator` 实例中，实现了 `createMessage()` 方法，用于创建一个新的 `TextMessage` 实例，该实例将被发送到\
  \ ActiveMQ。\n\n清单 16-18 展示了 JMS 发送方的 Spring 配置（`jms-sender-app-context.xml`）。\n\n\
  ***清单 16-18.** 发送消息的 Spring 配置*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n\
  `<beans`\n\n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n\
  `        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n`        http://www.springframework.org/schema/context`\n\
  `        http://www.springframework.org/schema/context/spring-context-3.1.xsd`\n\
  `        http://www.springframework.org/schema/jms`\n`        http://www.springframework.org/schema/jms/spring-jms-3.1.xsd\"\
  >`\n\n`    <context:annotation-config/>`\n\n`    <bean id=\"connectionFactory\"\
  `\n`        class=\"org.apache.activemq.ActiveMQConnectionFactory\"`\n`        p:brokerURL=\"\
  tcp://localhost:61616\" />`\n\n`    <bean id=\"jmsTemplate\" class=\"org.springframework.jms.core.JmsTemplate\"\
  >`\n`        <constructor-arg name=\"connectionFactory\" ref=\"connectionFactory\"\
  />`\n`        <property name=\"defaultDestinationName\" value=\"prospring3\"/>`\n\
  `    </bean>`\n\n`    <context:component-scan`\n`        base-package=\"com.apress.prospring3.ch16.jms.sender\"\
  />`\n\n`</beans>`\n\n如清单 16-18 所示，照常定义了 `connectionFactory` bean。此外，声明了一个 `JmsTemplate`\
  \ 实例，将 `connectionFactory` 作为构造函数参数，并将 `defaultDestinationName` 设置为 prospring3 队列。\n\
  \n清单 16-19 展示了用于发送消息的主要测试程序。\n\n***清单 16-19.** 测试发送消息*\n\n`package com.apress.prospring3.ch16.jms;`\n\
  \n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\n\
  `import com.apress.prospring3.ch16.jms.sender.MessageSender;`\n\n`public class JmsSenderSample\
  \ {`\n\n`    public static void main(String[] args) {`\n\n`        GenericXmlApplicationContext\
  \ ctx = new GenericXmlApplicationContext();`\n`        ctx.load(\"classpath:jms-sender-app-context.xml\"\
  );`\n`        ctx.refresh();`\n\n`        // 发送消息`\n`        MessageSender messageSender\
  \ = ctx.getBean(\"messageSender\",`\n`            MessageSender.class);`\n\n`        messageSender.sendMessage(\"\
  Clarence testing JMS message\");`\n`    }`\n\n`}`\n\n该程序很简单。运行程序会将消息发送到队列。如果 `JmsListenerSample`\
  \ 类仍在运行（或者你现在可以运行它），你将收到消息并看到以下输出：\n\n`INFO : com.apress.prospring3.ch16.jms.listener.SimpleMessageListener\
  \ – Message received:`\n`Clarence testing JMS message`\n\n在实际应用中，消息很可能采用 XML 格式，代表一条业务信息（例如，在线订单、交易、预订等）。\n\
  \n本节仅涵盖 JMS 的基本使用场景。有关详细信息，请参阅在线 JEE 教程，网址为 [`http://docs.oracle.com/javaee/5/tutorial/doc/bncdq.html`](http://docs.oracle.com/javaee/5/tutorial/doc/bncdq.html)。\n\
  \n### 在 Spring 中使用 RESTful-WS\n\n如今，RESTful-WS 可能是远程访问中使用最广泛的技术。从通过 HTTP 进行远程服务调用，到支持\
  \ Ajax 风格的交互式 Web 前端，RESTful-WS 正被广泛采用。\n\nRESTful Web 服务流行的原因有很多：\n\n*   **易于理解**：RESTful\
  \ Web 服务围绕 HTTP 协议设计。URL 与 HTTP 方法一起指定了请求的意图。例如，URL [`http://somedomain.com/restful/customer/1`](http://somedomain.com/restful/customer/1)\
  \ 使用 HTTP 方法 `GET` 意味着客户端想要检索客户 ID 等于 1 的客户信息。\n*   **轻量级**：与基于 SOAP 的 Web 服务相比，RESTful\
  \ 要轻量得多，SOAP 服务包含大量元数据来描述客户端想要调用哪个服务。对于 RESTful 请求和响应，它就像任何其他 Web 应用程序一样，只是一个 HTTP\
  \ 请求和响应。\n*   **防火墙友好**：由于 RESTful Web 服务设计为通过 HTTP（或 HTTPS）访问，因此应用程序对防火墙更加友好，并且远程客户端更容易访问。\n\
  \n在本节中，我们将讨论 RESTful-WS 的基本概念以及 Spring 通过其 Spring MVC 模块对 RESTful-WS 的支持。\n\n####\
  \ 介绍 RESTful Web 服务\n\nRESTful-WS 中的 REST 是 REpresentational State Transfer（表述性状态转移）的缩写，它是一种架构风格。REST\
  \ 定义了一组架构约束，这些约束共同描述了一个用于访问资源的“统一接口”。\n\n“统一接口”的主要概念包括资源的标识以及通过表示形式对资源进行操作。\n\n\
  对于资源的标识，一条信息应可通过统一资源标识符（URI）访问。例如，URL [`http://www.somedomain.com/api/contact/1`](http://www.somedomain.com/api/contact/1)\
  \ 是一个代表资源的 URI，该资源是一条标识符为 1 的联系人信息。如果标识符为 1 的联系人不存在，客户端将收到 404 HTTP 错误，就像在网站中找不到页面一样。另一个例子，[`http://www.somedomain.com/api/contacts`](http://www.somedomain.com/api/contacts)，是一个代表资源列表（即联系人信息列表）的\
  \ URI。\n\n这些可标识的资源将能够通过各种表示形式进行管理，如表 16-3 所示。\n\n![images](img/t1603.jpg)\n\n有关\
  \ RESTful Web 服务的详细描述，我们推荐《Ajax and REST Recipes, A Problem-Solution Approach》一书（Apress，2006\
  \ 年）。\n\n#### 为示例添加所需依赖\n\n要开发本节中的示例，需要添加一些依赖项，如表 16-4 所列。将它们添加到你的项目中。\n\n![images](img/t1604.jpg)\n\
  \n\n\n#### 联系人 RESTful Web 服务\n\n开发 RESTful Web 服务应用时，第一步是设计服务结构，包括支持哪些 HTTP 方法，以及不同操作对应的目标\
  \ URL。\n\n对于我们的联系人 RESTful Web 服务，我们希望支持查询、创建、更新和删除操作。在查询方面，我们希望支持检索所有联系人，或通过 ID\
  \ 检索单个联系人。\n\n这些服务将作为 Spring MVC 控制器实现。控制器名称为 `ContactController` 类，位于包 `com.apress.prospring3.ch16.web.restful.controller`\
  \ 下。URL 模式、HTTP 方法、描述以及对应的控制器方法如表 16-5 所示。所有 URL 均使用前缀 [`http://localhost:8080/ch16/restful`](http://localhost:8080/ch16/restful)。在数据格式方面，将同时支持\
  \ XML 和 JSON。系统会根据客户端 HTTP 请求头的 `accept` 媒体类型提供相应的格式。\n\n![images](img/t1605.jpg)\n\
  \n#### 使用 Spring MVC 暴露 RESTful Web 服务\n\n在本节中，我们将演示如何使用 Spring MVC 将联系人服务暴露为上一节设计的\
  \ RESTful Web 服务。\n\n首先，我们将创建另一个领域对象，即 `Contacts` 类。代码清单 16-20 展示了 `Contacts` 类。\n\
  \n***代码清单 16-20.** `Contacts` 类*\n\n`package com.apress.prospring3.ch16.domain;`\n\
  \n`import java.io.Serializable;`\n`import java.util.List;`\n\n`public class Contacts\
  \ implements Serializable {`\n\n`    private List<Contact> contacts;`\n\n`    public\
  \ Contacts() {`\n`    }`\n\n`    public Contacts(List<Contact> contacts) {`\n`        this.contacts\
  \ = contacts;`\n`    }`\n\n`    // Getter/setter methods omitted`\n`}`\n\n如代码清单\
  \ 16-20 所示，`Contacts` 类只有一个属性，即 `Contact` 对象的列表。其目的是支持将联系人列表（由 `ContactController`\
  \ 类中的 `listData()` 方法返回）转换为 XML 或 JSON 格式。\n\n##### 配置 Castor XML\n\n为了支持将返回的联系人信息转换为\
  \ XML 格式，我们将使用 Castor XML 库（[`http://castor.codehaus.org`](http://castor.codehaus.org)）。Castor\
  \ 支持 POJO 与 XML 转换的多种模式，在本示例中，我们将使用 XML 文件来定义映射。代码清单 16-21 展示了映射文件（`/src/main/resources/oxm-mapping.xml`）。\n\
  \n***代码清单 16-21.** 定义 Castor XML 映射*\n\n`<mapping>`\n\n`    <class name=\"com.apress.prospring3.ch16.domain.Contacts\"\
  >`\n`        <field name=\"contacts\" type=\"com.apress.prospring3.ch16.domain.Contact\"\
  `\n`collection=\"arraylist\">`\n**`<bind-xml name=\"contact\"/>`**\n`        </field>`\n\
  `    </class>`\n\n`    <class name=\"com.apress.prospring3.ch16.domain.Contact\"\
  \ identity=\"id\">`\n\n**`<map-to xml=\"contact\" />`**\n\n`        <field name=\"\
  id\" type=\"long\">`\n`            <bind-xml name=\"id\" node=\"element\"/>`\n`        </field>`\n\
  `        <field name=\"firstName\" type=\"string\">`\n`            <bind-xml name=\"\
  firstName\" node=\"element\" />`\n`        </field>`\n`        <field name=\"lastName\"\
  \ type=\"string\">`\n`            <bind-xml name=\"lastName\" node=\"element\" />`\n\
  `        </field>`\n`        <field name=\"birthDate\" type=\"string\" handler=\"\
  dateHandler\">`\n`            <bind-xml name=\"birthDate\" node=\"element\" />`\n\
  `        </field>`\n`        <field name=\"version\" type=\"integer\">`\n`            <bind-xml\
  \ name=\"version\" node=\"element\" />`\n`        </field>`\n\n`    </class>`\n\n\
  `    <field-handler name=\"dateHandler\" class=\"com.apress.prospring3.ch16`![images](img/U002.jpg)\n\
  `.xml.handler.DateTimeFieldHandler\">`\n`        <param name=\"date-format\" value=\"\
  yyyy-MM-dd\"/>`\n`    </field-handler>`\n`</mapping>`\n\n如代码清单 16-21 所示，定义了两个映射。第一个\
  \ `<class>` 标签映射了 `Contacts` 类，其中它的 `contacts` 属性（一个 `Contact` 对象的 `List`）使用 `<bind-xml\
  \ name=\"contact\"/>` 标签进行映射（注意加粗字符）。然后，`Contact` 对象被映射（通过第二个 `<class>` 标签内的 `<map-to\
  \ xml=\"contact\" />` 标签）。此外，为了支持从 JodaTime 的 `DateTime` 类型（用于 `Contact` 的 `birthDate`\
  \ 属性）进行转换，我们实现了一个自定义的 Castor 字段处理器。代码清单 16-22 展示了该字段处理器。\n\n***代码清单 16-22.** Castor\
  \ 中 DateTime 类型的自定义字段处理器*\n\n`package com.apress.prospring3.ch16.xml.handler;`\n\
  \n`import java.util.Properties;`\n\n`import org.exolab.castor.mapping.GeneralizedFieldHandler;`\n\
  `import org.exolab.castor.mapping.ValidityException;`\n`import org.joda.time.DateTime;`\n\
  `import org.joda.time.format.DateTimeFormat;`\n`import org.joda.time.format.DateTimeFormatter;`\n\
  \n`public class DateTimeFieldHandler extends GeneralizedFieldHandler {`\n\n`    private\
  \ static String dateFormatPattern;`\n\n`    public void setConfiguration(Properties\
  \ config) throws ValidityException {`\n`        dateFormatPattern = config.getProperty(\"\
  date-format\");`\n`    }`\n\n`    public Object convertUponGet(Object value) {`\n\
  \n`        DateTime dateTime = (DateTime) value;`\n\n`        return format(dateTime);`\n\
  `    }`\n\n`    public Object convertUponSet(Object value) {`\n\n`        String\
  \ dateTimeString = (String) value;`\n\n`        return parse(dateTimeString);`\n\
  `    }`\n\n`    public Class<DateTime> getFieldType() {`\n`        return DateTime.class;`\n\
  `    }`\n\n`    protected static String format(final DateTime dateTime) {`\n\n`        String\
  \ dateTimeString = \"\";`\n\n`        if (dateTime != null) {`\n`            DateTimeFormatter\
  \ dateTimeFormatter =`\n`                DateTimeFormat.forPattern(dateFormatPattern);`\n\
  `            dateTimeString = dateTimeFormatter.print(dateTime);`\n`        }`\n\
  \n`        return dateTimeString;`\n\n`    }`\n\n`    protected static DateTime\
  \ parse(final String dateTimeString) {`\n\n`        DateTime dateTime = new DateTime();`\n\
  \n`        if (dateTimeString != null) {`\n`            DateTimeFormatter dateTimeFormatter\
  \ =`\n`            DateTimeFormat.forPattern(dateFormatPattern);`\n`            dateTime\
  \ = dateTimeFormatter.parseDateTime(dateTimeString);`\n`        }`\n\n`        return\
  \ dateTime;`\n\n`    }`\n`}`\n\n如代码清单 16-22 所示，我们扩展了 Castor 的 `org.exolab.castor.mapping.GeneralizedFieldHandler`\
  \ 类，并实现了 `convertUponGet()`、`convertUponSet()` 和 `getFieldType()` 方法。在这些方法中，我们实现了在\
  \ `DateTime` 和 `String` 之间进行转换的逻辑，供 Castor 使用。\n\n此外，我们还定义了一个供 Castor 使用的属性文件。代码清单\
  \ 16-23 展示了该文件（`src/main/resources/castor.properties`）。\n\n***代码清单 16-23.** `castor.properties`\
  \ 文件*\n\n`org.exolab.castor.indent=true`\n\n如代码清单 16-23 所示，该属性指示 Castor 生成带缩进的 XML，这在测试时更易于阅读。\n\
  \n\n\n##### 实现 ContactController\n\n下一步是实现控制器类 `ContactController`。清单 16-24 展示了\
  \ `ContactController` 类，它实现了表 16-5 中的所有方法。\n\n***清单 16-24.** `ContactController`\
  \ 类*\n\n`package com.apress.prospring3.ch16.web.restful.controller;`\n\n`import\
  \ org.slf4j.Logger;`\n`import org.slf4j.LoggerFactory;`\n`import org.springframework.beans.factory.annotation.Autowired;`\n\
  `import org.springframework.stereotype.Controller;`\n`import org.springframework.web.bind.annotation.PathVariable;`\n\
  `import org.springframework.web.bind.annotation.RequestBody;`\n`import org.springframework.web.bind.annotation.RequestMapping;`\n\
  `import org.springframework.web.bind.annotation.RequestMethod;`\n`import org.springframework.web.bind.annotation.ResponseBody;`\n\
  `import com.apress.prospring3.ch16.domain.Contact;`\n`import com.apress.prospring3.ch16.domain.Contacts;`\n\
  `import com.apress.prospring3.ch16.service.ContactService;`\n\n`@Controller`\n`@RequestMapping(value=\"\
  /contact\")`\n`public class ContactController {`\n\n`    final Logger logger = LoggerFactory.getLogger(ContactController.class);`\n\
  \n`    @Autowired`\n`    private ContactService contactService;`\n\n`    @RequestMapping(value\
  \ = \"/listdata\", method = RequestMethod.GET)`\n`    @ResponseBody`\n`    public\
  \ Contacts listData() {`\n`        return new Contacts(contactService.findAll());`\n\
  `    }`\n\n`    @RequestMapping(value=\"/{id}\", method=RequestMethod.GET)`\n`    @ResponseBody`\n\
  `    public Contact findContactById(@PathVariable Long id) {`\n`        return contactService.findById(id);`\n\
  `    }`\n\n`    @RequestMapping(value=\"/\", method=RequestMethod.POST)`\n`    @ResponseBody`\n\
  `    public Contact create(@RequestBody Contact contact) {`\n`        logger.info(\"\
  Creating contact: \" + contact);`\n`        contactService.save(contact);`\n`        logger.info(\"\
  Contact created successfully with info: \" + contact);`\n`        return contact;`\n\
  `    }`\n\n`    @RequestMapping(value=\"/{id}\", method=RequestMethod.PUT)`\n`    @ResponseBody`\n\
  `    public void update(@RequestBody Contact contact,`\n`        @PathVariable Long\
  \ id) {`\n`        logger.info(\"Updating contact: \" + contact);`\n`        contactService.save(contact);`\n\
  `        logger.info(\"Contact updated successfully with info: \" + contact);`\n\
  `    }`\n\n`    @RequestMapping(value=\"/{id}\", method=RequestMethod.DELETE)`\n\
  `    @ResponseBody`\n`    public void delete(@PathVariable Long id) {`\n`        logger.info(\"\
  Deleting contact with id: \" + id);`\n`        Contact contact = contactService.findById(id);`\n\
  `        contactService.delete(contact);`\n`        logger.info(\"Contact deleted\
  \ successfully\");`\n`    }`\n`}`\n\n关于清单 16-24 的要点如下：\n\n*   该类使用 `@Controller`\
  \ 注解，表明它是一个 Spring MVC 控制器。\n*   类级别的注解 `@RequestMapping(value=\"/contact\")` 表明该控制器将映射到主\
  \ Web 上下文下的所有 URL。在本示例中，[`http://localhost:8080/ch16/contact`](http://localhost:8080/ch16/contact)\
  \ 下的所有 URL 都将由此控制器处理。\n*   本章前面实现的服务层中的 `ContactService` 被自动注入到控制器中。\n*   每个方法上的\
  \ `@RequestMapping` 注解指明了其将映射到的 URL 模式和对应的 HTTP 方法。例如，`listData()` 方法将映射到 [`http://localhost:8080/ch16/contact/listdata`](http://localhost:8080/ch16/contact/listdata)\
  \ URL，并使用 HTTP `GET` 方法。对于 `update()` 方法，它将映射到 URL [`http://localhost:8080/ch16/contact/{id}`](http://localhost:8080/ch16/contact/%7Bid%7D)，并使用\
  \ HTTP `PUT` 方法。\n*   所有方法都应用了 `@ResponseBody` 注解。这指示方法的所有返回值应直接写入 HTTP 响应流。\n*\
  \   对于接受路径变量的方法（例如 `findContactById()` 方法），路径变量使用 `@PathVariable` 注解。这指示 Spring\
  \ MVC 将 URL 中的路径变量（例如 [`http://localhost:8080/ch16/contact/1`](http://localhost:8080/ch16/contact/1)）绑定到\
  \ `findContactById()` 方法的 `id` 参数。请注意，`id` 参数的类型是 `Long`，而 Spring 3 的类型转换系统会自动为我们处理从\
  \ `String` 到 `Long` 的转换。\n*   对于 `create()` 和 `update()` 方法，`Contact` 参数使用 `@RequestBody`\
  \ 注解。这指示 Spring 自动将 HTTP 请求体中的内容绑定到 `Contact` 领域对象。转换将由声明的 `HttpMessageConverter<Object>`\
  \ 接口（位于 `org.springframework.http.converter` 包下）的实例完成，以支持各种格式，这将在本章后面讨论。\n\n\n\n\
  ##### 配置 RESTful Servlet\n\n控制器完成后，我们可以在 Spring MVC 中对其进行定义。首先，我们需要定义一个 `DispatcherServlet`（位于\
  \ `org.springframework.web.servlet` 包下），以指示 Spring MVC 将所有 RESTful 请求分派给 `ContactController`。\n\
  \n要声明该 Servlet，请将清单 16-25 中的代码片段添加到 Web 部署描述符文件（`src/main/webapp/WEB-INF/web.xml`）中。\n\
  \n***清单 16-25.** 用于 RESTful-WS 的 Dispatcher Servlet*\n\n`    <!-- RESTful Servlet\
  \ -->`\n`    <servlet>`\n`        <servlet-name>restful</servlet-name>`\n`        <servlet-class>`\n\
  `            org.springframework.web.servlet.DispatcherServlet`\n`        </servlet-class>`\n\
  `        <init-param>`\n`            <param-name>contextConfigLocation</param-name>`\n\
  `            <param-value>`\n`                /WEB-INF/spring/appServlet/restful-context.xml`\n\
  `            </param-value>`\n`        </init-param>`\n`        <load-on-startup>1</load-on-startup>`\n\
  `    </servlet>`\n\n`    <servlet-mapping>`\n`        <servlet-name>restful</servlet-name>`\n\
  `        <url-pattern>/restful/*</url-pattern>`\n`    </servlet-mapping>`\n\n如清单\
  \ 16-25 所示，声明了一个名为 `restful` 的 Servlet，其类型为 `DispatcherServlet`（有关 `DispatcherServlet`\
  \ 的详细信息将在第 17 章和第 18 章中讨论）。在 Spring MVC 中，每个 `DispatchServlet` 都会拥有自己的 `WebApplicationContext`（不过，在\
  \ `root-context.xml` 文件中定义的所有服务层 bean（称为根 `WebApplicationContext`）也将对每个 Servlet\
  \ 自身的 `WebApplicationContext` 可用）。\n\n`<servlet-mapping>` 标签指示 Web 容器（例如 Tomcat），所有匹配模式\
  \ `/restful/*` 的 URL（例如 [`http://localhost:8080/ch16/restful/contact`](http://localhost:8080/ch16/restful/contact)）都将由\
  \ restful Servlet 处理。\n\n如清单 16-25 所示，对于 `restful` Servlet，我们还指定了该 `DispatcherServlet`\
  \ 的 Spring `WebApplicationContext` 应从 `/WEB-INF/spring/appServlet/restful-context.xml`\
  \ 加载。清单 16-26 展示了该配置文件。\n\n***清单 16-26.** 用于 RESTful-WS 的 Spring `WebApplicationContext`*\n\
  \n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n\
  `        http://www.springframework.org/schema/context`\n`        http://www.springframework.org/schema/context/spring-context-3.1.xsd`\n\
  `        http://www.springframework.org/schema/mvc`\n`        http://www.springframework.org/schema/mvc/spring-mvc-3.1.xsd\"\
  >`\n\n`    <mvc:annotation-driven>`\n`        <mvc:message-converters>`\n`            <bean\
  \ class=\"org.springframework.http.converter.json.MappingJacksonHttpMessageConverter\"\
  />`\n`            <bean class=\"org.springframework.http.converter.xml.MarshallingHttpMessageConverter\"\
  >`\n`                <property name=\"marshaller\" ref=\"castorMarshaller\"/>`\n\
  `                <property name=\"unmarshaller\" ref=\"castorMarshaller\"/>`\n`            </bean>`\n\
  `        </mvc:message-converters>`\n`    </mvc:annotation-driven>`\n\n`    <context:component-scan`\n\
  `        base-package=\"com.apress.prospring3.ch16.web.restful.controller\"/>`\n\
  `    <bean id=\"castorMarshaller\"`\n`        class=\"org.springframework.oxm.castor.CastorMarshaller\"\
  >`\n`        <property name=\"mappingLocation\" value=\"classpath:oxm-mapping.xml\"\
  />`\n`    </bean>`\n\n`</beans>`\n\n清单 16-26 的重点如下：\n\n*   `<mvc:annotation-driven>`\
  \ 标签启用了 Spring MVC 的注解支持（即 `@Controller` 注解），并注册了 Spring 3 的类型转换和格式化系统。此外，在该标签的定义下，JSR-303\
  \ 验证支持也被启用。\n*   在 `<mvc:annotation-driven>` 内部，`<mvc:message-converters>` 标签声明了\
  \ `HttpMessageConverter` 的实例，这些实例将用于支持格式的媒体转换。请注意，`<mvc:message-converters>` 标签是在\
  \ Spring 3.1 中引入的。由于我们将同时支持 JSON 和 XML 作为数据格式，因此声明了两个转换器。第一个是 `MappingJacksonHttpMessageConverter`，它是\
  \ Spring 对 Jackson JSON 库（[`http://jackson.codehaus.org`](http://jackson.codehaus.org)）的支持。另一个是\
  \ `MarshallingHttpMessageConverter`，由 `spring-oxm` 模块提供，用于 XML 的编组/解组。在 `MarshallingHttpMessageConverter`\
  \ 内部，我们需要定义要使用的编组器和解组器，在本例中，我们使用的是 Castor 提供的编组器和解组器。\n*   对于 `castorMarshaller`\
  \ bean，我们使用了 Spring 提供的类 `org.springframework.oxm.castor.CastorMarshaller`，该类与 Castor\
  \ 集成，并且我们提供了 Castor 处理所需的映射位置。\n*   `<context:component-scan>` 标签指示 Spring 扫描指定包以查找控制器类。\n\
