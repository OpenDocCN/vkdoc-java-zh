  3.  修改视图的定义文件（`/views/contacts/views.xml`）。\n\n清单 17-27 展示了用于显示联系人信息的 `ContactController`\
  \ 类的 `show()` 方法实现。\n\n***清单 17-27.** `ContactController` 类的 `show()` 方法*\n\n`package\
