  ### Spring Data 项目：JDBC 扩展\n\n正如本章开头所述，近年来随着众多专用数据库的兴起，数据库技术发展迅速，如今 RDBMS 已不再是应用程序后端数据库管理系统的唯一选择。为了应对这种数据库技术的演进以及开发者社区的需求，Spring\
  \ 创建了 Spring Data 项目（*[www.springsource.org/spring-data](http://www.springsource.org/spring-data)*）。该项目的主要目标是在\
  \ Spring 核心数据访问功能之上提供有用的扩展，以满足与 RDBMS 之外的数据库后端进行交互的 Spring 开发者的需求。此外，还提供了对数据访问标准（例如\
  \ JDBC、JPA）的高级特性。\n\nSpring Data 项目包含许多扩展。这里我们想提及的一个扩展是 JDBC 扩展（*[www.springsource.org/spring-data/jdbc-extensions](http://www.springsource.org/spring-data/jdbc-extensions)*）。顾名思义，该扩展提供了一些高级特性，以简化使用\
  \ Spring 开发 JDBC 应用程序的过程。\n\n在撰写本文时，其首个版本（1.0.0 版）仍处于里程碑阶段。该扩展提供的主要特性如下：\n\n> *QueryDSL\
  \ 支持：* QueryDSL（*[www.querydsl.com](http://www.querydsl.com)*）是一种领域特定语言，提供了用于开发类型安全查询的框架。Spring\
  \ Data 的 JDBC 扩展提供了 `QueryDslJdbcTemplate`，以简化使用 QueryDSL 而非 SQL 语句开发 JDBC 应用程序的过程。\n\
  > \n> *对 Oracle 数据库的高级支持：* 该扩展为 Oracle 数据库用户提供了许多高级特性。在数据库连接方面，它支持 Oracle 特定的会话设置，以及在使用\
  \ Oracle RAC 时的快速连接故障转移技术。此外，还提供了与 Oracle 高级队列集成的类。在数据类型方面，提供了对 Oracle XML 类型、`STRUCT`\
  \ 和 `ARRAY` 等的原生支持。\n\n如果你正在使用 Spring 和 Oracle 数据库开发 JDBC 应用程序，那么 JDBC 扩展确实值得一看。\n\
  \n### 使用 JDBC 的注意事项\n\n从之前的讨论中，你可以看到 Spring 如何在使用 JDBC 与底层 RDBMS 交互时，让你的工作变得轻松许多。然而，你仍然需要编写相当多的代码，尤其是在将结果集转换为相应的领域对象时。\n\
  \n在 JDBC 之上，已经开发了许多开源库来帮助弥合关系数据结构与 Java 面向对象模型之间的差距。例如，MyBatis（原名 iBATIS）是一个流行的\
  \ `DataMapper` 框架，它也基于 SQL 映射。MyBatis 允许你将对象与存储过程或查询映射到 XML 描述符文件（也支持 Java 注解）。与\
  \ Spring 类似，MyBatis 提供了一种声明式的方式来查询对象映射，极大地节省了你维护可能分散在各个 DAO 类中的 SQL 查询所需的时间。\n\n\
  还有许多其他 ORM 框架专注于对象模型而非查询。流行的框架包括 Hibernate、EclipseLink（也称为 TopLink）和 OpenJPA。所有这些框架都符合\
  \ JCP 的 JPA 规范。\n\n近年来，这些 ORM 工具和映射框架已经变得相当成熟，以至于大多数开发者会选择其中一种，而不是直接使用 JDBC。然而，在出于性能目的需要完全控制提交给数据库的查询时（例如，在\
  \ Oracle 中使用层次查询），Spring JDBC 确实是一个可行的选择。而且，使用 Spring 的一大优势是你可以混合搭配不同的数据访问技术。例如，你可以将\
  \ Hibernate 作为主要的 ORM，然后将 JDBC 作为某些复杂查询逻辑或批量操作的补充；你可以在单个业务操作中混合使用它们，然后将它们包装在同一个数据库事务下。Spring\
  \ 将帮助你轻松处理这些情况。\n\n### 本章小结\n\n本章向你展示了如何使用 Spring 来简化 JDBC 编程。你学习了如何连接数据库并执行选择、更新、删除和插入操作，以及调用存储函数。我们详细讨论了如何使用核心的\
  \ Spring JDBC 类 `JdbcTemplate`。此外，我们还介绍了其他基于 `JdbcTemplate` 构建的 Spring 类，这些类有助于你建模各种\
  \ JDBC 操作。\n\n在接下来的几章中，我们将讨论在开发数据访问逻辑时，如何将 Spring 与流行的 ORM 技术结合使用。\n\n## 第 9 章\n\
  \n\n\n## 在 Spring 中使用 Hibernate\n\n在上一章中，你了解了如何在 Spring 应用程序中使用 JDBC。然而，尽管 Spring\
  \ 在简化 JDBC 开发方面取得了很大进展，但你仍然需要编写大量代码。\n\n在本章中，我们将介绍 Spring 广泛支持的对象关系映射（ORM）库之一——Hibernate。\n\
  \n如果你有使用 EJB 实体 Bean（EJB 3.0 之前）开发数据访问应用程序的经验，你可能还记得那痛苦的过程。繁琐的映射配置、事务划分以及每个 Bean\
  \ 中用于管理其生命周期的样板代码，极大地降低了开发企业级 Java 应用程序的生产力。\n\n正如 Spring 的开发是为了拥抱基于 POJO 的开发方式和声明式配置管理，而不是\
  \ EJB 那种笨重繁琐的设置一样，开发者社区意识到，一个更简单、轻量级且基于 POJO 的框架可以简化数据访问逻辑的开发。从那时起，出现了许多不同的库；它们通常被称为\
  \ *ORM 库*。ORM 库的主要目标是弥合 RDBMS 中的关系数据结构与 Java 中的 OO 模型之间的差距，以便开发者可以专注于使用对象模型进行编程，同时轻松执行与持久化相关的操作。\n\
  \n在开源社区可用的 ORM 库中，Hibernate 是最成功的之一。它的特性，例如基于 POJO 的方法、易于开发以及对复杂关系定义的支持，赢得了主流 Java\
  \ 开发者社区的青睐。\n\nHibernate 的流行也影响了 JCP，后者制定了 Java 数据对象（JDO）规范，作为 Java EE 中的标准 ORM\
  \ 技术之一。从 EJB 3.0 开始，EJB 实体 Bean 甚至被 Java 持久化 API（JPA）所取代，其中许多思想都受到了诸如 Hibernate、TopLink\
  \ 和 JDO 等流行 ORM 库的影响。\n\nHibernate 和 JPA 之间的关系非常密切。Hibernate 的创始人 Gavin King 代表\
  \ JBoss 作为 JCP 专家组成员之一参与了 JPA 规范的制定。从 3.2 版本开始，Hibernate 提供了 JPA 的实现。因此，当你使用 Hibernate\
  \ 开发应用程序时，你可以选择使用 Hibernate 自己的 API，或者使用以 Hibernate 作为持久化服务提供者的 JPA。\n\n在简要介绍了 Hibernate\
  \ 的历史之后，本章将介绍在开发数据访问逻辑时如何将 Spring 与 Hibernate 结合使用。Hibernate 是一个如此庞大的 ORM 库，仅用一章来涵盖\
  \ Hibernate 的方方面面是不可能的，而且有许多书籍专门讨论 Hibernate。\n\n本章将介绍在 Spring 中使用 Hibernate 的基本思想和主要用例。具体来说，我们将讨论以下主题：\n\
  \n*   *配置 Hibernate SessionFactory*：Hibernate 的核心概念围绕着由 `SessionFactory` 管理的 `Session`\
  \ 接口。我们将讨论如何配置 Hibernate 的会话工厂以在 Spring 应用程序中工作。\n*   *使用 Hibernate 进行 ORM 的主要概念*：我们将介绍如何使用\
  \ Hibernate 将 POJO 映射到底层关系数据库结构的主要概念。还将讨论一些常用的关系，包括一对多和多对多。\n*   *数据操作*：我们将通过多个示例，介绍如何在\
  \ Spring 环境中使用 Hibernate 执行数据操作（查询、插入、更新、删除）。在使用 Hibernate 时，其 `Session` 接口是我们将与之交互的主要接口。\n\
  \n![images](img/square.jpg) **注意**  在定义对象到关系映射时，Hibernate 支持两种配置风格。一种是将映射信息放在 XML\
  \ 文件中，另一种是在实体类中使用 Java 注解（在 ORM 或 JPA 世界中，映射到底层关系数据库结构的 Java 类称为*实体类*）。如今，注解方法更为流行。因此，在本章中，我们将重点使用注解方法进行对象关系映射。对于映射注解，我们将使用\
  \ JPA 标准（例如，位于 `javax.persistence` 包下），因为它们可以与 Hibernate 自己的注解互换，并且将有助于你将来迁移到 JPA\
  \ 环境。\n\n### 在 STS 中创建一个 Hibernate 实用项目\n\n就像 Spring 一样，Hibernate 是一个庞大的库，并被打包成多个模块（例如\
  \ Hibernate Core、Entity Manager 等）。有时你可能会发现很难确定你的应用程序需要哪些 Hibernate 模块。幸运的是，STS\
  \ 提供了一种简单的方法来创建基于 Spring 的常见类型项目，并且还提供了一个带有 Hibernate 的模板项目。\n\n要创建一个使用 Spring 并支持\
  \ Hibernate 的项目，在 STS 中只需使用 Simple Spring Hibernate Utility Project 模板创建一个新项目，你可以通过选择\
  \ New Project ![images](img/U001.jpg) Spring Template Project 找到它（参见 图 9-1）。\n\n\
  ![images](img/9781430241072_Fig09-01.jpg)\n\n***图 9-1.** 在 STS 中基于 Spring Hibernate\
  \ Utility Project 模板创建项目*\n\n然后，输入项目名称和顶级包名称，如 图 9-2 所示。\n\n![images](img/9781430241072_Fig09-02.jpg)\n\
  \n***图 9-2.** Spring Hibernate 实用项目详情*\n\n完成后，STS 将创建一个基于 Maven 的项目，其中包含所需的依赖项。当你查看项目根文件夹中的\
  \ `pom.xml` 文件（即 Maven 的项目对象模型文件）时，你会看到 Spring 已向项目添加了一个依赖项。代码清单 9-1 显示了代码片段。\n\n\
  ***代码清单 9-1.** Hibernate 依赖项*\n\n`   <dependencies>`\n\n`         <dependency>`\n\
  `             <groupId>org.hibernate</groupId>`\n`             <artifactId>hibernate-entitymanager</artifactId>`\n\
  `             <version>3.6.0.Final</version>`\n`         </dependency>`\n`…`\n\n\
  与一个简单的 Spring 实用项目相比，只添加了一个依赖项。然而，得益于 Maven 的传递依赖特性，所有其他必需的依赖项都将被 Maven 自动发现并添加到项目中。在\
  \ STS 中，如果你打开 `pom.xml`，将显示 POM 文件编辑器，当你单击 Dependencies Hierarchy 选项卡时，你将看到 Hibernate\
  \ 所需的其他依赖项（参见 图 9-3）。\n\n![images](img/9781430241072_Fig09-03.jpg)\n\n***图 9-3.**\
  \ Hibernate 的依赖层次结构选项卡*\n\n如 图 9-3 所示，`hibernate-entitymanager` 模块需要 `hibernate-core`\
  \ 模块，而 `hibernate-core` 模块又需要 `hibernate-commons-annotations` 模块，依此类推。这样，你就能快速了解项目中包含了哪些内容。\n\
  \n然而，对于生产应用程序，你可能仍然需要微调 `pom.xml` 文件，以确保只包含所需的库及其正确的版本。\n\n\n\n### 示例代码的样本数据模型\n\
