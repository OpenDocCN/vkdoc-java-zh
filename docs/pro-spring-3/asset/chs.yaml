  \ tel_type, tel_number)`\n`    values (1, 'Home', '1234567890');`\n`insert into\
  \ contact_tel_detail (contact_id, tel_type, tel_number)`\n`    values (2, 'Home',\
  \ '1234567890');`\n\n`insert into hobby (hobby_id) values ('Swimming');`\n`insert\
  \ into hobby (hobby_id) values ('Jogging');`\n`insert into hobby (hobby_id) values\
  \ ('Programming');`\n`insert into hobby (hobby_id) values ('Movies');`\n`insert\
  \ into hobby (hobby_id) values ('Reading');`\n\n`insert into contact_hobby_detail(contact_id,\
  \ hobby_id) values (1, 'Swimming');`\n`insert into contact_hobby_detail(contact_id,\
  \ hobby_id) values (1, 'Movies');`\n`insert into contact_hobby_detail(contact_id,\
  \ hobby_id) values (2, 'Swimming');`\n\n#### 配置 MyBatis 的 SqlSessionFactory 和 MapperScannerConfigurer\n\
  \nMyBatis 的核心概念围绕`SqlSession`接口（位于`org.apache.ibatis.session`包下）展开，该接口通过`SqlSessionFactory`接口（位于`org.apache.ibatis.session`包下）获取。`SqlSession`和`SqlSessionFactory`接口均属于`mybatis-3.0.6`库。要在\
  \ Spring 中配置工厂，我们使用`SqlSessionFactoryBean`类（位于`org.mybatis.spring`包下），该类属于`mybatis-spring`模块（`mybatis-spring-1.0.2`库）。\n\
  \nMyBatis 的另一个重要概念是映射器（mapper）接口，它们是简单的 Java 接口类，由 MyBatis 处理，用于配置 SQL 查询与领域对象属性之间的映射。映射可以在\
  \ XML 文件（与接口类同名）中定义，也可以在映射器接口内部通过注解定义。`mybatis-spring`模块提供了另一个名为`MapperScannerConfigurer`的类（位于`org.mybatis.spring.mapper`包下），它提供了一种便捷方式，指示\
  \ MyBatis 扫描映射器接口类，并将其注册为`MapperFactoryBean<T>`（位于`org.mybatis.spring.mapper`包下，属于`mybatis-spring`模块），从而允许将\
  \ MyBatis 映射器接口注入到其他 Spring Bean 中。\n\n映射器接口将在后续详细讨论，你将看到它如何帮助简化数据库操作的开发，而无需直接与`SqlSession`接口交互。\n\
  \n代码清单 11-4 展示了 Spring 应用上下文配置（`app-context.xml`）。\n\n***代码清单 11-4.** MyBatis 的\
  \ Spring 配置*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n\
  `        http://www.springframework.org/schema/context`\n`        http://www.springframework.org/schema/context/spring-context-3.1.xsd`\n\
  `        http://www.springframework.org/schema/jdbc`\n`        http://www.springframework.org/schema/jdbc/spring-jdbc-3.1.xsd`\n\
  `        http://www.springframework.org/schema/tx`\n`        http://www.springframework.org/schema/tx/spring-tx-3.1.xsd\"\
  >`\n\n`    <jdbc:embedded-database id=\"dataSource\" type=\"H2\">`\n`        <jdbc:script\
  \ location=\"classpath:schema.sql\" />`\n`        <jdbc:script location=\"classpath:test-data.sql\"\
  \ />`\n`    </jdbc:embedded-database>`\n\n`    <bean id=\"transactionManager\" class=\"\
  org.springframework.jdbc.datasource.DataSourceTransactionManager\">`\n`        <property\
  \ name=\"dataSource\" ref=\"dataSource\" />`\n`    </bean>`\n\n`    <tx:annotation-driven\
  \ />`\n\n`    <context:component-scan`\n`        base-package=\"com.apress.prospring3.ch11.service.mybatis\"\
  \ />`\n\n`    <!-- 定义 SqlSessionFactory -->`\n`    <bean id=\"sqlSessionFactory\"\
  `\n`        class=\"org.mybatis.spring.SqlSessionFactoryBean\">`\n`        <property\
  \ name=\"dataSource\" ref=\"dataSource\" />`\n`        <property name=\"typeAliasesPackage\"\
  `\n`            value=\"com.apress.prospring3.ch11.domain\" />`\n`    </bean>`\n\
  \n`    <!-- 扫描映射器并使其支持自动装配 -->`\n`    <bean class=\"org.mybatis.spring.mapper.MapperScannerConfigurer\"\
  >`\n`        <property name=\"basePackage\"`\n`            value=\"com.apress.prospring3.ch11.persistence\"\
  \ />`\n`    </bean>`\n\n`</beans>`\n\n大部分 Bean 你应该都很熟悉；让我们重点关注`sqlSessionFactory`和`org.mybatis.spring.mapper.MapperScannerConfigurer`这两个\
  \ Bean。\n\n`sqlSessionFactory`由`mybatis-spring`提供的类`org.mybatis.spring.SqlSessionFactoryBean`实现。正如你所料，该工厂需要数据源\
  \ Bean。此外，属性`typeAliasesPackage`定义了存储领域对象的包，MyBatis 在执行从 SQL 结果集到 POJO 的映射时会查找这些包。这类似于\
  \ Hibernate 和 JPA 中的映射实体类。\n\n\n\n请注意，在配置中，同一个 `dataSource` Bean 实例被注入到了 Spring\
  \ 的 `transactionManager` Bean 和 MyBatis 的 `sqlSessionFactory` Bean 中。这是因为 `SqlSessionFactoryBean`\
  \ 类被专门设计用于利用 Spring 中已有的 `DataSourceTransactionManager`。一旦配置了 Spring 事务管理器，你就可以像往常一样在\
  \ Spring 中配置事务。`@Transactional` 注解和 AOP 风格的配置都受支持。一旦事务设置完成，`mybatis-spring` 模块将透明地管理它们。你只需确保将同一个\
  \ `dataSource` 实例注入到 `transactionManager` 和 `SqlSessionFactory` Bean 中即可。\n\n`org.mybatis.spring.mapper.MapperScannerConfigurer`\
  \ 类也由 `mybatis-spring` 模块提供。该类接受一个包名，MyBatis 将扫描该包以查找映射器接口。此外，`MapperScannerConfigurer`\
  \ Bean 也需要注入一个 `SqlSessionFactory` 实例。如果 `ApplicationContext` 中只有一个 `SqlSessionFactory`\
  \ Bean，它将被自动注入到 `MapperScannerConfigurer` Bean 中。但是，如果你的应用程序包含多个 `SqlSessionFactory`\
  \ Bean（例如，在多数据源应用程序中，你为数据源 A 配置了 `sqlSessionFactoryA` Bean，为数据源 B 配置了另一个 `sqlSessionFactoryB`\
  \ Bean），那么你将需要显式地将对应 `SqlSessionFactory` Bean 的引用传递给每个 `MapperScannerConfigurer`\
  \ Bean。\n\n配置完成后，我们可以进入下一步，即在 MyBatis 中定义查询与 POJO 模型之间的 SQL 映射。\n\n### MyBatis 中的\
  \ SQL 映射\n\n在使用 MyBatis 实现数据访问逻辑时，最重要且最耗时的步骤是定义各种数据库操作的查询与相应领域对象之间的映射。这种映射与所需执行的操作及其底层查询密切相关。因此，对于联系人信息服务，让我们先定义我们将要实现的\
  \ `ContactService` 接口。清单 11-5 展示了该接口。\n\n***清单 11-5.** `ContactService` 接口*\n\n\
  `package com.apress.prospring3.ch11.service;`\n\n`import java.util.List;`\n\n`import\
  \ com.apress.prospring3.ch11.domain.Contact;`\n\n`public interface ContactService\
  \ {`\n\n`    // 查找所有联系人 - 不包含详细信息`\n`    public List<Contact> findAll();`\n\n`    //\
  \ 查找所有联系人 - 包含电话和爱好`\n`    public List<Contact> findAllWithDetail();`\n\n`    //\
  \ 根据 ID 查找 - 包含电话和爱好`\n`    public Contact findById(Long id);`\n\n`    // 创建新联系人或保存现有联系人`\n\
  `    public Contact save(Contact contact);`\n\n`    // 删除联系人`\n`    public void\
  \ delete(Contact contact);`\n\n`    // 根据名字和姓氏查找联系人`\n`    public List<Contact>\
  \ findByFirstNameAndLastName(String firstName,`\n`        String lastName);`\n\n\
  `}`\n\n该接口不言自明。它包含几个用于检索摘要或详细联系人信息的查找方法，其中一些方法接受参数作为搜索条件，而其他方法则包括插入、更新和删除操作。稍后我们将在\
  \ `ContactServiceImpl` 类中实现该服务。\n\n#### 映射器接口和 SQL 映射文件\n\n映射器接口和映射文件构成了 MyBatis\
  \ 工作方式的核心。它们与领域对象协同工作，在查询结果和领域对象之间执行映射（反之亦然）。对于每个领域对象的映射，主要涉及三个文件。表 11-2 描述了这些文件并给出了每个文件的示例。\n\
  \n![images](img/t1102.jpg)\n\n图表有助于更好地理解结构。例如，要实现 `ContactService` 接口的 `findAll()`\
  \ 方法，文件及其内容将类似于图 11-3 所示。\n\n![images](img/9781430241072_Fig11-03.jpg)\n\n***图 11-3.**\
  \ MyBatis 映射文件结构*\n\n如图 11-3 所示，映射器接口类有一个同名的对应 XML 文件（`ContactMapper.java` 和 `ContactMapper.xml`），用于支持对领域对象\
  \ `Contact.java` 的操作。\n\n完成所有映射后，项目结构将类似于图 11-4 中 STS 屏幕所示。\n\n![images](img/9781430241072_Fig11-04.jpg)\n\
  \n***图 11-4.** STS 中的 MyBatis 映射文件结构*\n\n#### SQL 映射 XML 配置\n\n在映射器 XML 配置文件中，MyBatis\
  \ 提供了大量用于执行映射操作的标签。表 11-3 重点介绍了一些最常用的标签。\n\n![images](img/t1103.jpg)\n\n### 使用 MyBatis\
  \ 进行数据库操作\n\n在本节中，我们将讨论如何在 Spring 中使用 MyBatis 执行各种 CRUD 操作。\n\n对于数据查询，我们将讨论如何执行从\
  \ SQL 到 POJO 的映射，以及如何对领域对象之间的关系进行建模。此外，还将涵盖 MyBatis 中的命名参数和动态 SQL 支持等主题。\n\n最后，我们还将讨论如何使用\
  \ MyBatis 实现插入/更新/删除操作。\n\n#### 查询数据\n\nMyBatis 为查询数据库中的数据提供了强大的支持。基本上，对于每个 select\
  \ 操作，我们将定义 SQL 语句、参数、结果类型（Java 类型）以及要使用的结果映射。各种关系（一对一、一对多和多对多）都可以轻松映射。MyBatis 的另一个强大功能是动态\
  \ SQL 支持，我们将在以下章节中讨论。\n\n\n\n##### 简单查询\n\n让我们从 `ContactService` 中最简单的方法 `findAll()`\
  \ 开始。该方法仅从数据库中检索所有联系人信息，不包含其电话和爱好详情。\n\n我们首先从一个没有任何关联关系的 `Contact` 领域对象开始。代码清单 11-6\
  \ 展示了该类的内容。\n\n***代码清单 11-6.** `Contact` 领域对象*\n\n`package com.apress.prospring3.ch11.domain;`\n\
  \n`import java.io.Serializable;`\n`import java.util.Date;`\n`public class Contact\
  \ implements Serializable {`\n\n`    private Long id;`\n`    private String firstName;`\n\
  `    private String lastName;`\n`    private Date birthDate;`\n\n`    // Getter/setter\
  \ 方法已省略`\n\n`    public String toString() {`\n`        return \"Contact - Id: \"\
  \ + id + \", First name: \" + firstName`\n`            + \", Last name: \" + lastName\
  \ + \", Birthday: \" + birthDate;`\n`    }`\n`}`\n\n该类是一个简单的 POJO，这里无需特别说明。下一步是定义联系人的映射器接口（以及\
  \ `findAll()` 方法），如代码清单 11-7 所示。\n\n***代码清单 11-7.** `ContactMapper` 接口*\n\n`package\
  \ com.apress.prospring3.ch11.persistence;`\n\n`import java.util.List;`\n\n`import\
  \ com.apress.prospring3.ch11.domain.Contact;`\n\n`public interface ContactMapper\
  \ {`\n\n`    public List<Contact> findAll();`\n\n`}`\n\n该接口同样没有什么特别之处。我们只需定义映射器支持的数据库操作，这些操作将由\
  \ `MapperScannerConfigurer` 类扫描，并可以自动装配到 Spring Bean 中。\n\n下一步是最重要的部分：XML 映射文件。代码清单\
  \ 11-8 展示了映射 `findAll()` 操作的内容（`ContactMapper.xml`）。\n\n***代码清单 11-8.** `findAll`\
  \ 操作的映射*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<!DOCTYPE mapper PUBLIC\
  \ \"-//mybatis.org//DTD Mapper 3.0//EN\"`\n`\"http://mybatis.org/dtd/mybatis-3-mapper.dtd\"\
  >`\n\n`<mapper namespace=\"com.apress.prospring3.ch11.persistence.ContactMapper\"\
  >`\n\n`    <resultMap id=\"contactResultMap\" type=\"Contact\">`\n`        <id property=\"\
  id\" column=\"ID\" />`\n`        <result property=\"firstName\" column=\"FIRST_NAME\"\
  \ />`\n`        <result property=\"lastName\" column=\"LAST_NAME\" />`\n`        <result\
  \ property=\"birthDate\" column=\"BIRTH_DATE\" />`\n`    </resultMap>`\n\n`    <select\
  \ id=\"findAll\" resultMap=\"contactResultMap\">`\n`        SELECT`\n`        ID,`\n\
  `        FIRST_NAME,`\n`        LAST_NAME,`\n`        BIRTH_DATE`\n`        FROM\
  \ CONTACT`\n`    </select>`\n\n`</mapper>`\n\n以下是映射配置的要点：\n\n*   文件以 `<mapper>`\
  \ 标签开头，并定义了 `namespace` 属性。`namespace` 属性（即 `com.apress.prospring3.ch11.persistence.ContactMapper`）指明了文件名和接口名（即\
  \ `ContactMapper.xml` 和 `ContactMapper.java`），两者应保持一致（本例中均为 `com.apress.prospring3.ch11.persistence.ContactMapper`）。\n\
  *   `<resultMap>` 定义了一个查询操作的唯一结果映射。根据应用需求，可以定义多个结果映射。如代码清单 11-8 所示，我们指定要映射的领域对象为\
  \ `Contact` 对象。这里无需提供领域对象的包名，因为该包名已在 Spring `ApplicationContext` 的 `sqlSessionFactory`\
  \ Bean 的 `typeAliasesPackage` 属性中提供（参见代码清单 11-4 中的 `app-context.xml`）。然后，我们使用 `<id>`\
  \ 标签定义 `id` 字段的属性及其在查询中对应的列名。接着，我们使用多个 `<result>` 标签将领域对象的属性映射到选定的列。\n*   `<select>`\
  \ 标签定义了查询操作。注意，`id` 属性应与 `ContactMapper` 接口中定义的方法名保持一致。然后，`resultMap` 属性指定了用于将结果集转换为\
  \ `Contact` 领域对象的映射。标签体内部是所使用的 SQL 语句。\n\n定义完映射后，我们可以继续实现。对于实现类 `com.apress.prospring3.ch11.service.mybatis.ContactServiceImpl`，我们首先创建一个类，其中\
  \ `ContactService` 接口的所有方法都为空实现。在 STS 中，这非常容易做到。详情请参考第 8 章。\n\n代码清单 11-9 展示了 `ContactService`\
  \ 接口中 `findAll()` 方法的实现。\n\n***代码清单 11-9.** 实现 `findAll()` 方法*\n\n`package com.apress.prospring3.ch11.service.mybatis;`\n\
  \n`// 导入语句已省略`\n\n`@Service(\"contactService\")`\n`@Repository`\n`@Transactional`\n\
  `public class ContactServiceImpl implements ContactService {`\n\n`    private Log\
  \ log = LogFactory.getLog(ContactServiceImpl.class);`\n\n`    @Autowired`\n`    private\
  \ ContactMapper contactMapper;`\n`    @Transactional(readOnly=true)`\n`    public\
  \ List<Contact> findAll() {`\n`        List<Contact> contacts = contactMapper.findAll();`\n\
  `        return contacts;`\n`    }`\n\n`    // 其他代码已省略`\n`}`\n\n如代码清单 11-9 所示，映射器接口被注入到服务类中，`findAll()`\
  \ 方法简单地调用了 `ContactMapper` 接口中的对应方法。MyBatis 将执行所有底层工作。\n\n以上就是 `findAll()` 方法实现的全部内容。代码清单\
  \ 11-10 展示了测试程序。\n\n***代码清单 11-10.** 测试 `findAll()` 方法*\n\n`package com.apress.prospring3.ch11;`\n\
  \n`import java.util.List;`\n\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  \n`import com.apress.prospring3.ch11.domain.Contact;`\n`import com.apress.prospring3.ch11.service.ContactService;`\n\
  \n`public class MyBatisSample {`\n\n`    public static void main(String[] args)\
  \ {`\n\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:app-context.xml\");`\n`        ctx.refresh();`\n\n\
  `        ContactService contactService = ctx.getBean(\"contactService\",`\n`            ContactService.class);`\n\
  \n`        List<Contact> contacts;`\n\n`        // 查找所有联系人`\n`        contacts =\
  \ contactService.findAll();`\n`        listContacts(contacts);`\n\n`    }`\n\n`    private\
  \ static void listContacts(List<Contact> contacts) {`\n`        System.out.println(\"\
  \");`\n`        System.out.println(\"列出不含详情的联系人：\");`\n`        for (Contact contact:\
  \ contacts) {`\n`            System.out.println(contact);`\n`            System.out.println();`\n\
  `        }`\n`    }`\n\n`}`\n\n运行该程序将在 STS 中产生如图 11-5 所示的输出。\n\n![images](img/9781430241072_Fig11-05.jpg)\n\
  \n***图 11-5.** 在 STS 中 `findAll()` 方法的输出*\n\n如图 11-5 所示，我们开启了 `DEBUG` 日志，因此除了联系人信息外，MyBatis\
  \ 提交给数据库的 select 语句也一并显示了出来。这对于开发目的非常有用。\n\n\n\n##### 使用 MyBatis 注解定义映射\n\n除了基于\
  \ XML 的配置外，MyBatis 也像许多其他工具一样，支持使用 Java 注解来定义映射。\n\n使用注解时，应将其应用于映射器接口。清单 11-11 展示了使用注解进行映射定义的\
  \ `ContactMapper` 接口。\n\n***清单 11-11.** 使用 MyBatis 注解支持的映射*\n\n`package com.apress.prospring3.ch11.persistence;`\n\
  \n`import java.util.List;`\n\n`import org.apache.ibatis.annotations.*;`\n\n`import\
  \ com.apress.prospring3.ch11.domain.Contact;`\n\n`public interface ContactMapperAnnotation\
  \ {`\n\n`    @Select(value=\"SELECT ID,FIRST_NAME,LAST_NAME,BIRTH_DATE FROM CONTACT\"\
  )`\n`    @Results(value={`\n`        @Result(javaType=Contact.class),`\n`        @Result(property=\"\
  id\", column=\"ID\"),`\n`        @Result(property=\"firstName\", column=\"FIRST_NAME\"\
  ),`\n`        @Result(property=\"lastName\", column=\"LAST_NAME\"),`\n`        @Result(property=\"\
  birthDate\", column=\"BIRTH_DATE\")`\n`    })`\n`    List<Contact> findAll();`\n\
  \n`}`\n\n如清单 11-11 所示，可以看到 `findAll()` 方法使用了 `@Select` 注解来指定查询，而 `@Results` 和嵌套的\
  \ `@Result` 注解则定义了映射细节。可以看到，注解结构与清单 11-8 中的 XML 风格非常相似。（在这种情况下，方法名 `findAll` 成为了\
  \ `<select>` 标签中的 `id` 属性。）\n\n基本上，MyBatis 为所有 XML 配置都提供了对应的注解。因此，你可以选择注解方式，完全摆脱\
  \ XML 映射文件。然而，对于复杂的查询和映射，接口类中会嵌入大量代码。\n\n因此，在本章中，我们将重点介绍 MyBatis 中基于 XML 风格的映射定义。\n\
  \n##### MyBatis 中的一对多和多对多查询\n\n接下来，我们通过查看 `Contact` 领域对象中的关系，来了解 MyBatis 中的关联映射。与\
  \ `ContactTelDetail` 领域对象的关联是一对多关联。与 `Hobby` 领域对象的关联是多对多关联。\n\n我们从一对多关联开始。清单 11-12\
  \ 和 11-13 分别展示了添加到 `Contact` 类中的 `contactTelDetails` 属性和 `ContactTelDetail` 类。\n\
  \n***清单 11-12.** `Contact` 类中的 `contactTelDetails` 属性*\n\n`package com.apress.prospring3.ch11.domain;`\n\
  \n`import java.io.Serializable;`\n`import java.util.*;`\n\n`public class Contact\
  \ implements Serializable {`\n\n`    // 其他代码已省略`\n\n`    private Set<ContactTelDetail>\
  \ contactTelDetails =`\n`        new HashSet<ContactTelDetail>();`\n`}`\n\n***清单\
  \ 11-13.** `ContactTelDetail` 类*\n\n`package com.apress.prospring3.ch11.domain;`\n\
  \n`import java.io.Serializable;`\n\n`public class ContactTelDetail implements Serializable\
  \ {`\n\n`    private Long id;`\n`    private Contact contact;`\n`    private String\
  \ telType;`\n`    private String telNumber;`\n\n`    // Getter/setter 方法已省略`\n\n\
  `    public String toString() {`\n`        return \"联系人电话详情 - Id: \" + id + \",\
  \ 联系人 id: \"`\n`            + contact.getId() + \", 类型: \" + telType`\n`            +\
  \ \", 号码: \" + telNumber;`\n`    }`\n`}`\n\n在 MyBatis 中，对于一对多（以及多对多）集合类型的映射，我们使用\
  \ `<collection>` 标签（MyBatis 提供 `<association>` 标签用于一对一关系）。对于关联映射，MyBatis 提供了两种选择：*嵌套查询*\
  \ 和 *嵌套结果*。让我们看看这两种选项及其区别。\n\n###### 使用嵌套查询选择关联\n\n正如你可能从名称中猜到的那样，嵌套查询方法意味着为每个联系人额外执行查询以检索电话详情。因此，当联系人查询选择了五个联系人时，将为每个联系人再向数据库发送五个查询以检索电话详情，总共产生\
  \ 5 + 1 = 6 个查询。这就是众所周知的 *N+1* 查询问题。让我们通过在 `ContactService` 接口中实现 `findAllWithDetail()`\
  \ 方法来实际看看嵌套查询。 清单 11-14 展示了在 `ContactMapper` 接口中声明的 `findAllWithDetail()` 方法。\n\n\
  ***清单 11-14.** `findAllWithDetail` 方法*\n\n`package com.apress.prospring3.ch11.persistence;`\n\
  \n`import java.util.List;`\n\n`import com.apress.prospring3.ch11.domain.Contact;`\n\
  \n`public interface ContactMapper {`\n\n`    public List<Contact> findAll();`\n\n\
  `    public List<Contact> findAllWithDetail();`\n\n`}`\n\n清单 11-15 展示了 `ContactMapper.xml`\
  \ 文件，其中使用嵌套查询定义了 `Contact` 和 `ContactTelDetail` 对象之间的一对多关联。\n\n***清单 11-15.** MyBatis\
  \ XML 映射定义中的嵌套查询*\n\n`<mapper namespace=\"com.apress.prospring3.ch11.persistence.ContactMapper\"\
  >`\n\n`    <!-- 其他代码已省略 -->`\n\n`    <resultMap id=\"contactResultDetailMap\" type=\"\
  Contact\">`\n`        <id property=\"id\" column=\"ID\" />`\n`        <result property=\"\
  firstName\" column=\"FIRST_NAME\" />`\n`        <result property=\"lastName\" column=\"\
  LAST_NAME\" />`\n`        <result property=\"birthDate\" column=\"BIRTH_DATE\" />`\n\
  `        <collection property=\"contactTelDetails\" ofType=\"ContactTelDetail\"\
  `\n`            column=\"id\" select=\"selectTelDetailsForContact\">`\n`        </collection>`\n\
  `    </resultMap>`\n\n`    <resultMap id=\"contactTelDetailResultMap\" type=\"ContactTelDetail\"\
  \ >`\n`        <id property=\"id\" column=\"ID\" />`\n`        <result property=\"\
  telType\" column=\"TEL_TYPE\"/>`\n`        <result property=\"telNumber\" column=\"\
  TEL_NUMBER\"/>`\n`    </resultMap>`\n\n`    <select id=\"findAllWithDetail\" resultMap=\"\
  contactResultDetailMap\">`\n`        SELECT`\n`        C.ID,`\n`        C.FIRST_NAME,`\n\
  `        C.LAST_NAME,`\n`        C.BIRTH_DATE`\n`        FROM CONTACT C`\n`    </select>`\n\
  \n`    <select id=\"selectTelDetailsForContact\" parameterType=\"long\"`\n`        resultType=\"\
  ContactTelDetail\" resultMap=\"contactTelDetailResultMap\">`\n`        SELECT`\n\
  `        ID,`\n`        TEL_TYPE,`\n`        TEL_NUMBER`\n`        FROM CONTACT_TEL_DETAIL\
  \ WHERE CONTACT_ID = #{id}`\n`    </select>`\n\n`</mapper>`\n\n以下是清单 11-15 中映射配置的要点：\n\
  \n*   定义了一个 ID 为 `contactResultDetailMap` 的新 `<resultMap>`。在此结果映射中，添加了一个 `<collection>`\
  \ 标签，并将其映射到 `Contact` 类的 `contactTelDetails` 属性。类型为 `ContactTelDetail`，用于选择每个联系人电话详情的对应语句是\
  \ `selectTelDetailsForContact`，需要传递给该 select 语句的值是 `CONTACT` 表的 ID 列。\n*   添加了一个\
  \ ID 为 `contactTelDetailResultMap` 的新 `<resultMap>`，它执行从 `selectTelDetailsForContact`\
  \ 操作到 `ContactTelDetail` 对象的映射。\n*   添加了一个名为 `selectTelDetailsForContact` 的新 `<select>`\
  \ 操作，该操作将被 `findAllWithDetail` 操作使用。此语句接收一个参数 ID，该参数表示每个联系人记录的 ID。\n\n清单 11-16 展示了\
  \ `ContactServiceImpl` 类中 `findAllWithDetail()` 方法的实现。\n\n***清单 11-16.** `findAllWithDetail()`\
  \ 方法的实现*\n\n`package com.apress.prospring3.ch11.service.mybatis;`\n\n`// 导入语句已省略`\n\
  \n`@Service(\"contactService\")`\n`@Repository`\n`@Transactional`\n`public class\
  \ ContactServiceImpl implements ContactService {`\n\n\n\n`    // 其他代码已省略`\n`    @Transactional(readOnly=true)`\n\
  `    public List<Contact> findAllWithDetail() {`\n`        List<Contact> contacts\
  \ = contactMapper.findAllWithDetail();`\n`        for (Contact contact: contacts)\
  \ {`\n`            populateContactTelDetail(contact);`\n`        }`\n`        return\
  \ contacts;`\n`    }`\n\n`    private void populateContactTelDetail(Contact contact)\
  \ {`\n`        if (contact.getContactTelDetails() != null) {`\n`            for\
  \ (ContactTelDetail contactTelDetail:`\n`                contact.getContactTelDetails())\
  \ {`\n`                contactTelDetail.setContact(contact);`\n`            }`\n\
  `        }`\n`    }`\n`}`\n\n`findAllWithDetail()` 方法将调用 `ContactMapper` 接口中同名的方法。然后，私有方法\
  \ `populateContactTelDetail()` 被调用，用于为每个联系人获取的每个 `ContactTelDetail` 对象填充 `Contact`\
  \ 对象引用。\n\n为了测试 `findAllWithDetail()` 方法，请将代码清单 11-17 中的代码片段添加到 `MyBatisSample`\
