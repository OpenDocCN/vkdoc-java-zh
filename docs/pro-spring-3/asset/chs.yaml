  \n#### 更新数据\n\n更新联系人就像插入数据一样简单。让我们看一个例子。假设对于 ID 为 1 的联系人，我们想要更新其名字并删除家庭电话记录。要测试更新操作，请将清单\
  \ 9-24 中的代码片段添加到 `SpringHibernateSample` 类中。\n\n***清单 9-24.** 测试更新操作*\n\n`        //\
  \ 更新联系人`\n`        contact = contactDao.findById(1l);`\n`        contact.setFirstName(\"\
  Kim Fung\");`\n`        Set<ContactTelDetail> contactTels = contact.getContactTelDetails();`\n\
  `        ContactTelDetail toDeleteContactTel = null;`\n`        for (ContactTelDetail\
  \ contactTel: contactTels) {`\n`            if (contactTel.getTelType().equals(\"\
  Home\")) {`\n`                toDeleteContactTel = contactTel;`\n`            }`\n\
  `        }`\n\n`        contact.removeContactTelDetail(toDeleteContactTel);`\n`        contactDao.save(contact);`\n\
  `        contacts = contactDao.findAllWithDetail();`\n`        listContactsWithDetail(contacts);`\n\
  \n如上一个清单所示，我们首先检索 ID 为 1 的记录。然后，更改名字。接着，我们遍历电话对象，检索类型为 `\"Home\"` 的电话，并将其从联系人的电话详情属性中移除。最后，我们再次调用\
  \ `ContactDao.save()` 方法。当您运行程序时，将看到以下输出（其他输出已省略）：\n\n`Contact - Id: 1, First name:\
