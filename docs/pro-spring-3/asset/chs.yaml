  \n对于 `ContactTelDetailMapper` 接口和 XML 文件，我们需要添加三个操作。第一个是通过联系人 ID 检索现有的电话记录。第二个是更新现有的电话详情。第三个是通过\
  \ ID 列表删除孤立的电话记录。清单 11-43 和 11-44 分别展示了 `ContactTelDetailMapper` 接口（包含新增的 `selectTelDetailForContact()`、`updateContactTelDetail()`\
  \ 和 `deleteOrphanContactTelDetail()` 方法）以及 `ContactTelDetailMapper.xml` 文件的代码片段。\n\
  \n***清单 11-43.** `ContactTelDetailMapper` 接口*\n\n`package com.apress.prospring3.ch11.persistence;`\n\
  \n`import java.util.List;`\n\n`import com.apress.prospring3.ch11.domain.ContactTelDetail;`\n\
