  #### 使用 BatchSqlUpdate 进行批量操作\n\n对于批量操作，我们使用 `BatchSqlUpdate` 类。其用法与 `SqlUpdate`\
  \ 类基本相同；我们只需要多做几件事。为了演示其用法，让我们在 `ContactDao` 接口中添加一个新方法：\n\n`public void insertWithDetail(Contact\
  \ contact);`\n\n新的 `insertWithDetail()` 方法会将联系人及其电话详情都插入到数据库中。\n\n为了能够插入电话详情记录，我们需要创建\
  \ `InsertContactTelDetail` 类，如清单 8-47 所示。：`InsertContactTelDetail` 类\n\n***清单 8-47.**\
  \ `InsertContactTelDetail` 类*\n\n`package com.apress.prospring3.ch8.dao.jdbc.annotation;`\n\
  \n`import java.sql.Types;`\n\n`import javax.sql.DataSource;`\n\n`import org.springframework.jdbc.core.SqlParameter;`\n\
  `import org.springframework.jdbc.object.BatchSqlUpdate;`\n\n`public class InsertContactTelDetail\
  \ extends BatchSqlUpdate {`\n\n`    private static final String SQL_INSERT_CONTACT_TEL\
  \ =`\n`        \"insert into contact_tel_detail (contact_id, tel_type, tel_number)\
  \ values`\n`(:contact_id, :tel_type, :tel_number)\";`\n\n`    private static final\
  \ int BATCH_SIZE = 10;`\n\n`    public InsertContactTelDetail(DataSource dataSource)\
  \ {`\n`        super(dataSource, SQL_INSERT_CONTACT_TEL);`\n`        declareParameter(new\
  \ SqlParameter(\"contact_id\", Types.INTEGER));`\n`        declareParameter(new\
  \ SqlParameter(\"tel_type\", Types.VARCHAR));`\n`        declareParameter(new SqlParameter(\"\
  tel_number\", Types.VARCHAR));`\n`        setBatchSize(BATCH_SIZE);`\n`    }`\n\
  `}`\n\n请注意，在构造函数中，我们调用了 `BatchSqlUpdate.setBatchSize()` 方法来设置 JDBC 插入操作的批量大小。\n\n\
  清单 8-48 展示了 `JdbcContactDao` 类中 `insertWithDetail()` 方法的实现。\n\n***清单 8-48.** 批量\
  \ SQL 更新操作*\n\n`package com.apress.prospring3.ch8.dao.jdbc.annotation;`\n\n`// 导入语句已省略`\n\
  `@Repository(\"contactDao\")`\n`public class JdbcContactDao implements ContactDao\
  \ {`\n\n`    private InsertContactTelDetail insertContactTelDetail;`\n\n`    public\
  \ void insertWithDetail(Contact contact) {`\n\n`        insertContactTelDetail =\
  \ new InsertContactTelDetail(dataSource);`\n\n`        // 插入联系人`\n`        Map<String,\
  \ Object> paramMap = new HashMap<String, Object>();`\n`        paramMap.put(\"first_name\"\
  , contact.getFirstName());`\n`        paramMap.put(\"last_name\", contact.getLastName());`\n\
  `        paramMap.put(\"birth_date\", contact.getBirthDate());`\n`        KeyHolder\
  \ keyHolder = new GeneratedKeyHolder();`\n`        insertContact.updateByNamedParam(paramMap,\
  \ keyHolder);`\n`        contact.setId(keyHolder.getKey().longValue());`\n`        log.info(\"\
  New contact inserted with id: \" + contact.getId());`\n\n`        // 批量插入联系人电话详情`\n\
  `        List<ContactTelDetail> contactTelDetails =    `\n`            contact.getContactTelDetails();`\n\
  `        if (contactTelDetails != null) {`\n`            for (ContactTelDetail contactTelDetail:\
  \ contactTelDetails) {`\n`                paramMap = new HashMap<String, Object>();`\n\
  `                paramMap.put(\"contact_id\", contact.getId());`\n`                paramMap.put(\"\
  tel_type\", contactTelDetail.getTelType());`\n`                paramMap.put(\"tel_number\"\
  , contactTelDetail.getTelNumber());`\n`                insertContactTelDetail.updateByNamedParam(paramMap);`\n\
  `            }`\n`        }`\n`        insertContactTelDetail.flush();`\n`    }`\n\
  \n`    public List<Contact> findAllWithDetail() {`\n`        JdbcTemplate jdbcTemplate\
  \ = new JdbcTemplate(getDataSource());`\n`        String sql = \"select c.id, c.first_name,\
  \ c.last_name, c.birth_date\" +`\n`\", t.id as contact_tel_id, t.tel_type, t.tel_number\
  \ from contact c \" +`\n`\"left join contact_tel_detail t on c.id = t.contact_id\"\
  ;`\n`        return jdbcTemplate.query(sql, new ContactWithDetailExtractor());`\n\
  `    }`\n\n\n```java\n    private static final class ContactWithDetailExtractor\n\
  \        implements ResultSetExtractor<List<Contact>> {\n\n        public List<Contact>\
  \ extractData(ResultSet rs) throws\n            SQLException, DataAccessException\
  \ {\n\n            Map<Long, Contact> map = new HashMap<Long, Contact>();\n    \
  \        Contact contact = null;\n            while (rs.next()) {\n            \
  \    Long id = rs.getLong(\"id\");\n                contact = map.get(id);\n   \
  \            if (contact == null) {  // 新联系人记录\n                   contact = new\
  \ Contact();\n                   contact.setId(id);\n                   contact.setFirstName(rs.getString(\"\
  first_name\"));\n                    contact.setLastName(rs.getString(\"last_name\"\
  ));\n                    contact.setBirthDate(rs.getDate(\"birth_date\"));\n   \
  \                 contact.setContactTelDetails(new ArrayList<ContactTelDetail>());\n\
  \                    map.put(id, contact);\n                }\n\n              \
  \  // 处理联系人电话详情（如果存在）\n               Long contactTelDetailId = rs.getLong(\"contact_tel_id\"\
  );\n               if (contactTelDetailId > 0) {\n                   ContactTelDetail\
  \ contactTelDetail = new ContactTelDetail();\n                   contactTelDetail.setId(contactTelDetailId);\n\
  \                   contactTelDetail.setContactId(id);\n                   contactTelDetail.setTelType(rs.getString(\"\
  tel_type\"));\n                   contactTelDetail.setTelNumber(rs.getString(\"\
  tel_number\"));\n                   contact.getContactTelDetails().add(contactTelDetail);\n\
  \               }\n            }\n            return new ArrayList<Contact> (map.values());\n\
  \        }\n    }\n\n    // 其他代码省略\n\n}\n```\n\n来自清单 8-48，每次调用 `insertWithDetail()`\
  \ 方法时，都会构造一个新的 `InsertContactTelDetail` 实例。原因是 `BatchSqlUpdate` 类不是线程安全的。然后我们像使用\
  \ `SqlUpdate` 一样使用它。然而，`BatchSqlUpdate` 类会将插入操作排队，并批量提交到数据库。每当记录数达到批量大小时，Spring\
  \ 就会对挂起的记录触发一次批量插入操作。另一方面，在完成时，我们调用 `BatchSqlUpdate.flush()` 方法来指示 Spring 刷新所有挂起的操作（即仍在排队且尚未达到批量大小的插入操作）。最后，我们遍历\
