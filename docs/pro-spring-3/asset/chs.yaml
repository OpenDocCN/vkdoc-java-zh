  \ ID 为 4 的新联系人，并且数据已正确填充。\n\n#### 更新数据\n\n更新联系人数据稍微复杂一些，主要涉及一对多的电话关联和多对多的爱好关联。让我们通过以下操作序列来实现更新方法：\n\
  \n1.  更新联系人记录。\n2.  在更新电话详情之前，检索该联系人现有的电话详情，并存储 ID 列表，以便删除孤立记录。\n3.  对于每条电话详情，检查\
  \ ID 是否存在。如果不存在，则插入新记录。否则，更新现有记录。同时，从孤立记录列表中移除该 ID。更新完所有电话详情后，检查 ID 列表中是否还有孤立的电话详情记录。如果存在孤立的电话记录，则将其删除。\n\
  4.  对于爱好，首先删除 `CONTACT_HOBBY_DETAIL` 表中所有现有的映射，然后插入更新后的 `Contact` 对象中包含的爱好。\n\n\
  这个序列只是一种典型的处理机制；你可以根据具体需求进行微调。首先，我们需要在 `ContactMapper` 接口和 XML 文件中添加更新操作。清单 11-41\
  \ 和 11-42 展示了相应的代码片段。\n\n***清单 11-41.** `ContactMapper` 的 `updateContact` 操作*\n\n\
  `package com.apress.prospring3.ch11.persistence;`\n\n`import java.util.List;`\n\n\
  `import com.apress.prospring3.ch11.domain.*;`\n\n`public interface ContactMapper\
  \ {`\n\n`    public List<Contact> findAll();`\n\n`    public List<Contact> findAllWithDetail();`\n\
  \n`    public Contact findById(Long id);`\n\n`    public List<Contact> findByFirstNameAndLastName(SearchCriteria\
  \ criteria);`\n\n`    public void insertContact(Contact contact);`\n\n`    public\
  \ void updateContact(Contact contact);`\n\n`}`\n\n***清单 11-42.** `ContactMapper.xml`\
  \ 文件的 `updateContact` 操作*\n\n`    <update id=\"updateContact\" parameterType=\"\
  Contact\">`\n`        UPDATE CONTACT SET`\n`        FIRST_NAME = #{firstName},`\n\
  `        LAST_NAME = #{lastName},`\n`        BIRTH_DATE = #{birthDate}`\n`        WHERE\
