  \ - <begin>`\n`DEBUG [org.springframework.orm.jpa.JpaTransactionManager] – <正在发起事务提交>`\n\
  **`DEBUG [org.springframework.orm.jpa.JpaTransactionManager] –`![images](img/U002.jpg)**\n\
  **`<正在提交 EntityManager [org.hibernate.ejb.EntityManagerImpl@396c75ed] 上的 JPA 事务>`**\n\
  `DEBUG [org.hibernate.transaction.JDBCTransaction] - <commit>`\n`DEBUG [org.hibernate.event.def.AbstractFlushingEventListener]\
  \ – <正在处理刷新时的级联操作>`\n`DEBUG [org.hibernate.event.def.AbstractFlushingEventListener]\
