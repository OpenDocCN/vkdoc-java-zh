  \ 查询数据\n\nSpring 提供了 `MappingSqlQuery<T>` 类来建模查询操作。基本上，我们使用数据源和查询字符串来构造一个 `MappingSqlQuery<T>`\
  \ 类。另一方面，我们实现 `mapRow()` 方法，将每个结果集记录映射到相应的领域对象。\n\n我们先实现 `findAll()` 方法。首先创建 `SelectAllContacts`\
  \ 类（它代表查询所有联系人的操作），该类继承自 `MappingSqlQuery<T>` 抽象类。清单 8-35 展示了 `SelectAllContacts`\
  \ 类。\n\n***清单 8-35.** `SelectAllContacts` 类*\n\n`package com.apress.prospring3.ch8.dao.jdbc.annotation;`\n\
  \n`import java.sql.ResultSet;`\n`import java.sql.SQLException;`\n\n`import javax.sql.DataSource;`\n\
  \n`import org.springframework.jdbc.object.MappingSqlQuery;`\n\n`import com.apress.prospring3.ch8.domain.Contact;`\n\
  \n`public class SelectAllContacts extends MappingSqlQuery<Contact> {`\n\n`    private\
  \ static final String SQL_SELECT_ALL_CONTACT =`\n`        \"select id, first_name,\
  \ last_name, birth_date from contact\";`\n\n`    public SelectAllContacts(DataSource\
  \ dataSource) {`\n`        super(dataSource, SQL_SELECT_ALL_CONTACT);`\n`    }`\n\
  \n`    protected Contact mapRow(ResultSet rs, int rowNum) throws SQLException {`\n\
  `        Contact contact = new Contact();`\n\n`        contact.setId(rs.getLong(\"\
  id\"));`\n`        contact.setFirstName(rs.getString(\"first_name\"));`\n`        contact.setLastName(rs.getString(\"\
  last_name\"));`\n`        contact.setBirthDate(rs.getDate(\"birth_date\"));`\n\n\
  `        return contact;`\n`    }`\n`}`\n\n在清单 8-35 中，`SelectAllContacts` 类内部声明了用于查询所有联系人的\
  \ SQL。在类的构造函数中，调用 `super()` 方法，使用 `DataSource` 和 SQL 语句来构造该类。此外，还实现了 `MappingSqlQuery<T>.mapRow()`\
  \ 方法，以提供结果集到 `Contact` 领域对象的映射。\n\n`SelectAllContacts` 类就绪后，我们就可以在 `JdbcContactDao`\
  \ 类中实现 `findAll()` 方法了。清单 8-36 展示了该类。\n\n***清单 8-36.** 实现 `findAll()` 方法*\n\n`package\
  \ com.apress.prospring3.ch8.dao.jdbc.annotation;`\n\n`import java.util.List;`\n\n\
  `import javax.annotation.Resource;`\n`import javax.sql.DataSource;`\n\n`import org.apache.commons.logging.Log;`\n\
  `import org.apache.commons.logging.LogFactory;`\n\n`import org.springframework.stereotype.Repository;`\n\
  \n`import com.apress.prospring3.ch8.dao.ContactDao;`\n`import com.apress.prospring3.ch8.domain.Contact;`\n\
  \n`@Repository(\"contactDao\")`\n`public class JdbcContactDao implements ContactDao\
  \ {`\n\n`    private Log log = LogFactory.getLog(JdbcContactDao.class);`\n\n`    private\
  \ DataSource dataSource;`\n\n`    private SelectAllContacts selectAllContacts;`\n\
  \n`    @Resource(name=\"dataSource\")`\n`    public void setDataSource(DataSource\
  \ dataSource) {`\n`        this.dataSource = dataSource;`\n\n`        selectAllContacts\
  \ = new SelectAllContacts(dataSource);`\n`    }`\n\n`    public DataSource getDataSource()\
  \ {`\n`        return dataSource;`\n`    }`\n\n`    public List<Contact> findAll()\
  \ {`\n`        return selectAllContacts.execute();`\n`    }`\n\n`    // 其他空实现方法已省略`\n\
  `}`\n\n在清单 8-36 中，`setDataSource()` 方法在注入 `DataSource` 时，构造了一个 `SelectAllContacts`\
