  #### 使用 SqlFunction 调用存储函数\n\nSpring 还提供了一系列类来简化使用 JDBC 执行存储过程/函数的过程。在本节中，我们将向您展示一个使用\
  \ `SqlFunction` 类调用数据库中 SQL 函数的简单示例。我们将以 MySQL 为例，创建一个存储函数，并使用 `SqlFunction<T>`\
  \ 类调用它。\n\n我们假设您有一个 MySQL 数据库，其模式名为 `prospring3_ch8`，用户名和密码均为 `prospring3`（与“探索\
  \ JDBC 基础设施”一节中的示例相同）。让我们创建一个名为 `getFirstNameById()` 的存储函数，该函数接受联系人的 ID 并返回联系人的名字。代码清单\
  \ 8-50 显示了在 MySQL 中创建该存储函数的脚本（`store-function.sql`）。请在 MySQL 数据库中运行该脚本。\n\n***代码清单\
  \ 8-50.** MySQL 的存储函数*\n\n`DELIMITER //`\n`CREATE FUNCTION getFirstNameById(in_id\
  \ INT)`\n`   RETURNS VARCHAR(60)`\n`BEGIN`\n`   RETURN (SELECT first_name FROM contact\
  \ WHERE id = in_id);`\n`END //`\n`DELIMITER ;`\n\n该存储函数的作用不言自明。它接受一个 ID，并返回具有该 ID\
  \ 的联系人记录的名字。\n\n让我们为此示例创建一个名为 `ContactSfDao` 的新接口。代码清单 8-51 显示了该接口。\n\n***代码清单 8-51.**\
  \ `ContactSfDao` 接口*\n\n`package com.apress.prospring3.ch8.dao;`\n\n`public interface\
  \ ContactSfDao {`\n\n`    public String getFirstNameById(Long id);`\n\n`}`\n\n第二步是创建\
  \ `SfFirstNameById` 类来表示存储函数操作，该类继承自 `SqlFunction<T>` 类。代码清单 8-52 显示了该类。\n\n***代码清单\
  \ 8-52.** `SfFirstNameById` 接口*\n\n`package com.apress.prospring3.ch8.dao.jdbc.annotation;`\n\
  \n`import java.sql.Types;`\n\n`import javax.sql.DataSource;`\n\n`import org.springframework.jdbc.core.SqlParameter;`\n\
  `import org.springframework.jdbc.object.SqlFunction;`\n\n`public class SfFirstNameById\
  \ extends SqlFunction<String> {`\n\n`    private static final String SQL = \"select\
  \ getfirstnamebyid(?)\";`\n\n`    public SfFirstNameById(DataSource dataSource)\
  \ {`\n`        super(dataSource, SQL);`\n`        declareParameter(new SqlParameter(Types.INTEGER));`\n\
  `        compile();`\n`    }`\n`}`\n\n在代码清单 8-52 中，该类继承自 `SqlFunction<T>` 并传入类型\
  \ `String`，这表示函数的返回类型。然后我们声明了用于调用 MySQL 中存储函数的 SQL。之后，在构造函数中声明了参数，然后编译该操作。现在，该类已准备好供我们在实现类中使用。代码清单\
  \ 8-53 显示了实现 `ContactSfDao` 接口的 `JdbcContactSfDao` 类。\n\n***代码清单 8-53.** `JdbcContactSfDao`\
  \ 类*\n\n`package com.apress.prospring3.ch8.dao.jdbc.annotation;`\n\n`import java.util.List;`\n\
  \n`import javax.annotation.Resource;`\n`import javax.sql.DataSource;`\n\n`import\
  \ org.springframework.stereotype.Repository;`\n\n`import com.apress.prospring3.ch8.dao.ContactSfDao;`\n\
  \n`@Repository(\"contactSfDao\")`\n`public class JdbcContactSfDao implements ContactSfDao\
  \ {`\n\n`    private DataSource dataSource;`\n\n`    private SfFirstNameById sfFirstNameById;`\n\
  \n`    @Resource(name=\"dataSource\")`\n`    public void setDataSource(DataSource\
  \ dataSource) {`\n`        this.dataSource = dataSource;`\n\n`        sfFirstNameById\
  \ = new SfFirstNameById(dataSource);`\n`    }`\n\n`    public DataSource getDataSource()\
  \ {`\n`        return dataSource;`\n`    }`\n\n`    public String getFirstNameById(Long\
  \ id) {`\n`        List<String> result = sfFirstNameById.execute(id);`\n`        return\
  \ result.get(0);`\n`    }`\n`}`\n\n在代码清单 8-53 中，在注入数据源时，构造了一个 `SfFirstNameById`\
  \ 实例。然后在 `getFirstNameById()` 方法中，调用了它的 `execute()` 方法，并传入了联系人 ID。该方法将返回一个 `String`\
  \ 列表，我们只需要第一个元素，因为结果集中应该只返回一条记录。\n\n代码清单 8-54 显示了用于连接 MySQL 的 Spring 配置文件（`app-context-sf.xml`）。\n\
