  \ \"contacts/update\";` `   }` `}`\n\n在清单 17-31 中，重点如下：\n\n*   `MessageSource` 接口被自动注入到控制器中，用于检索支持国际化的消息。\n\
  *   对于 `updateForm()` 方法，检索联系人并保存到 `Model` 中，然后返回逻辑视图 `contacts/update`，该视图将显示编辑联系人视图。\n\
  *   当用户更新联系人信息并单击“保存”按钮时，将触发 `update()` 方法。这个方法需要一些解释。首先，Spring MVC 会尝试将提交的数据绑定到\
  \ `Contact` 领域对象，并自动执行类型转换和格式化。如果发现绑定错误（例如，出生日期输入格式错误），错误将被保存到 `BindingResult` 接口（位于包\
  \ `org.springframework.validation` 下）中，并且一条错误消息将被保存到 `Model` 中，重新显示编辑视图。如果绑定成功，数据将被保存，并通过使用\
  \ `redirect:` 作为前缀返回逻辑视图名称以显示联系人视图。请注意，我们希望在重定向后显示消息，因此我们需要使用 `RedirectAttributes.addFlashAttribute()`\
  \ 方法（位于包 `org.springframework.web.servlet.mvc.support` 下的一个接口）在显示联系人视图中显示成功消息。在\
