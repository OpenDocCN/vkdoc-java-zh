  \ 添加联系人完成视图*\n\n### 总结\n\n在本章中，我们介绍了在实现基于流程的 Web 应用程序时使用 Spring Web Flow 和 JSF 2。\n\
  \n首先，我们讨论了 Spring Web Flow 和 JSF 2 的高级概念。然后，介绍了 Spring Web Flow 中对 JSF 的一流支持，包括所需的依赖项和配置。\n\
  \n然后，我们设计了一个用于添加联系人的示例流程。详细阐述了流程的设计，包括状态转换、视图、变量等。\n\n最后，我们逐步实现了该流程。步骤包括流程定义、控制器类、支持\
  \ bean、自定义转换器、使用 JSF 和 PrimeFaces 组件的视图的开发。\n\n## 第 19 章\n\n## Spring 测试\n\n在开发企业级应用程序时，测试是确保完成的应用程序按预期执行并满足各种需求（架构、安全、用户需求等）的重要方式。\n\
  \n每次进行更改时，都应确保引入的更改不会影响现有逻辑。维护持续的构建和测试环境对于确保高质量的应用程序至关重要。对所有代码进行可重复的、高覆盖率的测试，使您能够以高度的信心部署新应用程序和对应用程序进行更改。\n\
  \n在企业开发环境中，有许多不同类型的测试针对企业应用程序中的每一层，每种测试都有其自身的特点和要求。\n\n在本章中，我们将讨论涉及测试各种应用程序层的基本概念，特别是在测试基于\
  \ Spring 的应用程序时。我们还将介绍 Spring 使开发人员更容易实现各层测试用例的方式。具体来说，本章将涵盖以下主题：\n\n*   *企业测试框架*：我们将简要描述企业测试框架。我们将讨论各种类型的测试及其目的。在本章中，我们将重点放在单元测试上，针对不同的应用程序层。\n\
  *   *逻辑单元测试*：最细粒度的单元测试是仅测试类中方法的逻辑，所有其他依赖项都被“模拟”为正确的行为。在本章中，我们将讨论如何借助 Java 模拟库来模拟类的依赖项，从而为\
  \ Spring MVC 控制器类实现逻辑单元测试。\n*   *集成单元测试*：在企业测试框架中，集成测试是指测试不同应用程序层中一组类针对特定业务逻辑的交互。通常，在集成测试环境中，服务层应与持久化层一起测试，并且后端数据库可用。然而，随着应用程序架构的发展和轻量级内存数据库的成熟，现在将服务层与持久化层和后端数据库作为一个整体进行“单元测试”已成为一种常见做法。例如，在本章中，我们将使用\
  \ JPA 2，以 Hibernate 和 Spring Data JPA 作为持久化提供者，以 H2 作为数据库。在这种架构中，在测试服务层时“模拟”Hibernate\
  \ 和 Spring Data JPA 的重要性较低。因此，在本章中，我们将讨论将服务层与持久化层和 H2 内存数据库一起进行测试。这种测试通常被称为*集成单元测试*，它介于单元测试和完整的集成测试之间。\n\
  *   *前端单元测试*：即使我们测试了应用程序的每一层，在应用程序部署后，我们仍然需要确保整个应用程序按预期工作。更具体地说，对于 Web 应用程序，在部署到持续构建环境后，我们应该运行“前端”测试，以确保用户界面正常工作。例如，对于联系人应用程序，我们应该确保正常功能的每一步都能正常工作，并且我们还应该测试异常情况（例如，当信息未通过验证阶段时，应用程序如何运行）。在本章中，我们将讨论如何使用一个开源框架来帮助自动化\
  \ Web 应用程序前端的测试。\n\n### 示例 Web 应用程序的项目\n\n对于本章中的测试用例，我们将使用在第 17 章中实现的联系人 Web 应用程序作为被测目标应用程序。\n\
