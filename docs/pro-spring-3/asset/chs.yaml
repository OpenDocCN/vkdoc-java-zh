  \ arguments[org.springframework.context.support.DefaultMessageSourceResolvable:\
  \ codes [contact.firstName,firstName]; arguments []; default message [firstName],60,3];\
  \ default message [size must be between 3 and 60]]`\n\n在前面的输出中，你可以看到 JSR-303 验证错误信息被显示出来。在实际应用中，你应该让客户端知道这个错误。这可以通过设计一个存储错误信息的\
  \ POJO 并将其返回给客户端来实现，这样客户端就能知道请求中哪里出了问题。我们将把这个留作练习。\n\n### 示例应用中的远程调用\n\n在 SpringBlog\
  \ 应用中，主要的远程调用功能是客户端检索博客文章条目。为了满足这一需求，我们将使用 Spring MVC 全面的 RESTful-WS 支持。\n\n博客订阅服务实现的主要亮点如下：\n\
  \n*   将定义一个 RESTful servlet，用于通过 RESTful-WS 远程检索博客文章条目。\n*   将在 Web 层实现一个控制器，用于接收请求（使用预定义的\
  \ URL 和 HTTP `GET` 方法）并将最新的博客文章条目返回给客户端。\n*   在数据格式方面，将支持 JSON 和 XML，并且本章讨论的技术将应用于示例应用中。\n\
  \n有关详细信息，请参考第 21 章中的“用于博客文章条目 RSS 订阅的 RESTful-WS”一节。\n\n### 总结\n\n在本章中，我们介绍了基于 Spring\
  \ 的应用中最常用的远程调用技术。\n\n如果两个应用都运行在 Spring 上，那么使用 Spring HTTP invoker 是一个可行的选择。如果需要异步模式或松耦合的集成模式，那么\
  \ JMS 是一种常用的方法。最后，我们讨论了如何在 Spring 中使用 RESTful-WS 来暴露服务，或者使用 `RestTemplate` 类来访问服务。\n\
  \n在下一章中，我们将讨论如何使用 Spring 实现 Web 层。\n\n## 第 17 章\n\n\n\n## 使用 Spring 构建 Web 应用程序\n\
  \n在企业级应用中，表示层是一个关键层，它显著影响着用户对应用程序的接受程度。表示层是应用程序的门户。它让用户能够执行业务功能，并提供应用程序所维护信息的可视化视图。用户界面的表现方式在很大程度上决定了应用程序的成功与否。\n\
  \n由于互联网的爆炸式增长（尤其是近年来通过云计算以及人们使用的各种设备的兴起），开发应用程序的表示层是一项极具挑战性的任务。以下是开发 Web 应用程序时需要考虑的一些主要方面：\n\
  \n*   **性能**：性能始终是 Web 应用程序的首要需求。如果用户选择一个功能或点击一个链接，执行时间过长（在互联网世界中，十秒就像是一个世纪），用户肯定不会对应用程序满意。\n\
  *   **用户友好性**：应用程序应易于使用和导航，并配有清晰的说明，避免让用户感到困惑。\n*   **交互性与丰富性**：用户界面应具有高度的交互性和响应性。此外，在视觉呈现方面，表示层应内容丰富，例如图表、仪表盘类型的界面等。\n\
  *   **可访问性**：如今，用户要求能够随时随地通过任何设备访问应用程序。在办公室，他们会使用台式机访问应用程序。在路上，用户会使用各种移动设备，包括笔记本电脑、平板电脑、智能手机等，来访问应用程序。\n\
  \n开发一个满足上述要求的 Web 应用程序并非易事，但对于业务用户来说，这些被认为是强制性的要求。幸运的是，许多新技术和框架也应运而生，以满足这些需求。近年来，许多\
  \ Web 应用程序框架和库——例如 Spring MVC、Struts、Tapestry、Java Server Faces (JSF)、Adobe Flex、Google\
  \ Web Toolkit (GWT)、jQuery 和 Dojo 等——提供了工具和丰富的组件库，可以帮助您开发高度交互的 Web 前端。此外，许多框架还提供了针对移动设备（包括智能手机和平板电脑）的工具或相应的部件库。同时，HTML5\
  \ 和 CSS3 标准的兴起，以及大多数 Web 浏览器和移动设备制造商对这些最新标准的支持，也简化了需要从任何设备上任何位置访问的 Web 应用程序的开发。\n\
  \n在 Web 应用程序开发方面，Spring 提供了全面而深入的支持。Spring MVC 模块为 Web 应用程序开发提供了坚实的基础设施和模型-视图-控制器\
  \ (MVC) 框架。使用 Spring MVC 时，您可以使用各种视图技术（例如 JSP、Velocity 等）。此外，Spring MVC 还与许多常见的\
  \ Web 框架和工具包（例如 Struts、Adobe Flex、GWT 等）集成。其他 Spring 项目则有助于满足 Web 应用程序的特定需求。例如，Spring\
  \ MVC 与 Spring Web Flow 项目及其 Spring Faces 模块结合使用时，为开发具有复杂流程并使用 JSF 作为视图技术的 Web 应用程序提供了全面支持。简而言之，在表示层开发方面，有非常多的选择。\n\
  \n本章将重点介绍 Spring MVC，并讨论如何使用 Spring MVC 提供的强大功能来开发高性能的 Web 应用程序。具体来说，本章将涵盖以下主题：\n\
  \n*   **Spring MVC**：我们将讨论 MVC 模式的主要概念并介绍 Spring MVC。对于 Spring MVC，我们将深入探讨其核心概念，包括其\
  \ `WebApplicationContext` 层次结构和请求处理生命周期。\n*   **i18n、区域设置和主题**：Spring MVC 为常见的 Web\
  \ 应用程序需求提供了全面支持，包括 i18n（国际化）、区域设置和主题。我们将讨论如何使用 Spring MVC 开发支持这些需求的 Web 应用程序。\n\
  *   **视图和 Ajax 支持**：Spring MVC 支持多种视图技术。在本章中，我们将重点介绍使用 JavaServer Pages (JSP) 作为\
  \ Web 应用程序的视图部分。在 JSP 之上，将使用 JavaScript 来提供丰富的交互功能。有许多出色且流行的 JavaScript 库，例如 jQuery、Dojo\
  \ 等。在本章中，我们将重点介绍使用 jQuery 及其子项目 jQuery UI 库，该库支持开发高度交互的 Web 应用程序。\n*   **分页和文件上传支持**：在开发本章示例时，我们将讨论如何使用\
  \ Spring Data JPA 和前端 jQuery 组件在浏览基于网格的数据时提供分页支持。此外，还将介绍如何在 Spring MVC 中实现文件上传。我们将讨论如何将\
  \ Spring MVC 与 Servlet 3.0 容器内置的多部分支持结合使用来实现文件上传，而不是与 Apache Commons File Upload\
  \ 集成。\n*   **安全性**：安全性是 Web 应用程序中的一个重要主题。我们将讨论如何使用 Spring Security 来帮助保护应用程序并处理登录和注销。\n\
  *   **Spring MVC 与示例应用程序**：本章讨论的许多主题将用于开发本书的示例应用程序。我们将从高层次概述本章主题与示例应用程序之间的关系。\n\n\
  ### 在 STS 中为示例创建项目\n\n像往常一样，第一步是为本章的示例创建项目。由于我们讨论的是 Web 应用程序，因此需要创建一个 Spring MVC\
  \ 项目。此外，我们将使用 JPA 2（配合 Hibernate 和 Spring Data JPA 作为持久化服务提供者）创建一个服务层。要在 STS 中创建项目，请参考第\
  \ 16 章，其中也详细说明了所需的依赖项。请确保将项目名称和所有包名称更改为使用“ch17”而不是“ch16”。创建项目后，请验证您可以看到模板项目创建的默认主页，这表明初始项目工作正常。\n\
  \n### 为示例实现服务层\n\n在本章的服务层中，我们仍将像第 16 章一样，使用联系人应用程序作为示例。然而，为了向您展示一些 Web 应用程序功能（例如文件上传支持），服务层和数据模型将比我们在第\
  \ 16 章中开发的要稍微复杂一些。在本节中，我们将讨论将在本章中使用的数据模型和服务层的实现。\n\n\n\n#### 样本数据模型\n\n本章示例所使用的数据模型非常简单，仅包含一个用于存储联系人信息的\
  \ `CONTACT` 表。清单 17-1 展示了模式创建脚本（位于 `/src/main/resources` 文件夹中的 `schema.sql`）。\n\n\
  ***清单 17-1.** 示例数据库模式*\n\n`DROP TABLE IF EXISTS CONTACT;`\n\n`CREATE TABLE CONTACT\
