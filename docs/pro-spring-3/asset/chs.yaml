  \ MVC 中配置 Tiles\n\n在 Spring MVC 中配置 Tiles 支持很简单。在 `DispatcherServlet` 配置（`servlet-context.xml`）中，我们需要进行修改，将\
  \ `InternalResourceViewResolver` 替换为 `UrlBasedViewResolver` 类。清单 17-25 展示了需要对配置文件进行的修订。\n\
  \n***清单 17-25.** 在 Spring MVC 中配置 Tiles 支持*\n\n`<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>`  `    <!-- 其他代码已省略 -->` *`    <!-- 移除以下 bean -->`* *`    <beans`*`:`*`bean\
  \ class=\"org.springframework.web.servlet.view.InternalResourceViewResolver\">`*\
  \ *`        <beans`*`:`*`property name=\"prefix\" value=\"/WEB-INF/views/\" />`*\
  \ *`        <beans`*`:`*`property name=\"suffix\" value=\".jspx\" />`* *`    </beans`*`:`*`bean>`*\
  \  **`<!-- 其他代码已省略 -->`**  **`<!-- 添加以下 beans -->`** **`<!-- Tiles 配置 -->`** **`<beans:bean\
  \ class=\"org.springframework.web.servlet.view.UrlBasedViewResolver\"`** **`id=\"\
  tilesViewResolver\">`** **`<beans:property name=\"viewClass\" value=\"org.springframework.web.servlet.view.tiles2.TilesView\"\
  />`** **`</beans:bean>`**  **`<beans:bean class=\"org.springframework.web.servlet.view.tiles2.TilesConfigurer\"\
  \ id=\"tilesConfigurer\">`** **`<beans:property name=\"definitions\">`** **`<beans:list>`**\
  \ **`<beans:value>/WEB-INF/layouts/layouts.xml</beans:value>`** **`<!-- 扫描视图目录以获取\
  \ Tiles 配置 -->`** **`<beans:value>/WEB-INF/views/**/views.xml</beans:value>`** **`</beans:list>`**\
