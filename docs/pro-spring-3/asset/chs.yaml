  \ 17-5 所示。\n\n![images](img/9781430241072_Fig17-05.jpg)\n\n***图 17-5.** 联系人列表视图*\n\
  \n现在我们的第一个视图已经可以工作了。在接下来的章节中，我们将用更多视图来丰富应用程序，并启用 i18n、主题等支持。\n\n### Spring MVC 项目结构概览\n\
  \n在深入实现 Web 应用程序的各个方面之前，让我们先看看本章中开发的示例 Web 应用程序的项目结构。\n\n通常，在 Web 应用程序中，需要大量文件来支持各种功能。例如，有许多静态资源文件，如样式表、JavaScript\
  \ 文件、图像、组件库等。然后是支持以多种语言呈现界面的文件。当然，还有将由 Web 容器解析和渲染的视图页面，以及模板框架（例如 Apache Tiles）用于提供应用程序一致外观和感觉的布局和定义文件。\n\
  \n将服务于不同目的的文件存储在一个结构良好的文件夹层次结构中总是一个好习惯，这能让你清晰地了解应用程序使用的各种资源，并简化后续的维护工作。\n\n图 17-6\
  \ 展示了本章将要开发的示例 Web 应用程序的文件夹结构。每个文件夹（位于根文件夹 `/src/main/webapp` 下）的用途列在表 17-3 中。请注意，此处展示的结构并非强制要求，而是开发者社区中常用于\
  \ Web 应用程序开发的结构。\n\n在接下来的章节中，我们将需要各种文件（例如 CSS 文件、JavaScript 文件、图像等）来支持实现。CSS 和 JavaScript\
  \ 的源代码将不在此处展示。因此，我们建议你下载本章的源代码副本，并将其解压到一个临时文件夹中，以便你可以直接将所需的文件复制到项目中。\n\n![images](img/9781430241072_Fig17-06.jpg)\n\
  \n***图 17-6.** 示例 Web 项目文件夹结构*\n\n![images](img/t1703.jpg)\n\n### i18n（国际化）\n\n\
  在开发 Web 应用程序时，在早期阶段启用 i18n 总是一个好习惯。主要工作是将用户界面文本和消息外部化到属性文件中。\n\n即使你一开始没有 i18n 需求，将语言相关的设置外部化也是好的，这样以后当你需要支持更多语言时会更容易。\n\
  \n使用 Spring MVC，启用 i18n 非常简单。首先，将语言相关的用户界面设置外部化到 `/WEB-INF/i18n` 文件夹内的各种属性文件中，如表\
  \ 17-3 所述。由于我们将支持英语（美国）和中文（香港），我们将需要四个文件。`application.properties` 和 `message.properties`\
  \ 文件存储默认区域设置的设置，在我们的例子中是英语（美国）。此外，`application_zh_HK.properties` 和 `message_zh_HK.properties`\
  \ 文件存储中文（香港）语言的设置。\n\n#### 在 DispatcherServlet 配置中配置 i18n\n\n有了语言设置，下一步是配置 `DispatcherServlet`\
  \ 的 `WebApplicationContext` 以支持 i18n。\n\n清单 17-13 展示了支持 i18n 的修订后配置文件（`servlet-context.xml`）。\n\
