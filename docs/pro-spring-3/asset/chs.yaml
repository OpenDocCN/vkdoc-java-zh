  `Hobby :Swimming`\n\n`Contact - Id: 3, First name: John, Last name: Smith, Birthday:\
  \ 1964-02-28`\n\n接下来，我们来看 `findById()` 方法，它演示了如何在 JPA 中使用带有命名参数的命名查询。关联关系也会被一并获取。清单\
  \ 10-10 展示了其实现。\n\n***清单 10-10.** 实现 `findById()` 方法*\n\n`package com.apress.prospring3.ch10.service.jpa;`\n\
  \n`// 导入语句已省略`\n`@Service(\"jpaContactService\")`\n`@Repository`\n`@Transactional`\n\
  `public class ContactServiceImpl implements ContactService {`\n\n`    // 其他代码已省略`\n\
  `    @Transactional(readOnly=true)`\n`    public Contact findById(Long id) {`\n\
  `        TypedQuery<Contact> query = em.createNamedQuery(`\n`            \"Contact.findById\"\
  , Contact.class);`\n`        query.setParameter(\"id\", id);`\n`        return query.getSingleResult();`\n\
  `    }`\n`}`\n\n如清单 10-10 所示，调用了 `EntityManager.createNamedQuery(java.lang.String\
  \ name, java.lang.Class<T> resultClass)` 来获取 `TypedQuery<T>` 接口的一个实例，这确保了查询结果必须是\
  \ `Contact` 类型。然后，使用 `TypedQuery<T>.setParameter()` 方法设置查询中命名参数的值，接着调用 `getSingleResult()`\
  \ 方法，因为结果应仅包含一个具有指定 ID 的 `Contact` 对象。我们将该方法的测试留作练习供你完成。\n\n\n\n##### 使用无类型结果进行查询\n\
  \n在许多情况下，您希望向数据库提交查询并随意操作结果，而不是将其存储在映射的实体类中。一个典型的例子是基于网页的报告，该报告仅列出跨多个表的特定列数。\n\n\
  例如，假设您有一个网页，用于显示所有联系信息的摘要。该摘要信息仅包含每个联系人的名字、姓氏和家庭电话号码。没有家庭电话号码的联系人将不会被列出。在这种情况下，我们可以通过查询并手动操作结果集来实现该功能。\n\
  \n让我们将方法命名为 `displayAllContactSummary()`。清单 10-11 展示了该方法的典型实现。\n\n***清单 10-11.**\
  \ 实现 `displayAllContactSummary()` 方法*\n\n`package com.apress.prospring3.ch10.service.jpa;`\n\
  \n`// 省略导入语句`\n`@Service(\"contactSummaryUntype\")`\n`@Repository`\n`@Transactional`\n\
  `public class ContactSummaryUntypeImpl {`\n\n`     @PersistenceContext`\n`     private\
  \ EntityManager em;`\n\n`     @Transactional(readOnly=true)`\n`     public void\
  \ displayAllContactSummary() {`\n\n`        List result = em`\n`                .createQuery(\"\
  select c.firstName, c.lastName, t.telNumber \"`\n`                    + \"from Contact\
  \ c left join c.contactTelDetails t \"`\n`                    + \" where t.telType='Home'\"\
  ).getResultList();`\n`        int count = 0;`\n`        for (Iterator i = result.iterator();\
  \ i.hasNext();) {`\n`            Object[] values = (Object[]) i.next();`\n`            System.out.println(++count\
  \ + \": \" + values[0] + \", \"`\n`               + values[1] + \", \" + values[2]);`\n\
  `        }`\n`    }`\n`}`\n\n如清单 10-11 所示，我们使用 `EntityManager.createQuery()` 方法创建一个\
  \ `Query`，传入 JPQL 语句，然后获取结果列表。\n\n当我们在 JPQL 中显式指定要选择的列时，JPA 将返回一个迭代器，并且迭代器中的每个项目都是一个对象数组。然后我们遍历该迭代器，并显示对象数组中的每个值。每个对象数组对应结果集中的一条记录。清单\
  \ 10-12 展示了测试程序。\n\n***清单 10-12.** 测试 `displayAllContactSummary()` 方法*\n\n`package\
  \ com.apress.prospring3.ch10;`\n\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  \n`import com.apress.prospring3.ch10.service.jpa.ContactSummaryUntypeImpl;`\n\n\
  `public class ContactSummarySample {`\n\n`    public static void main(String[] args)\
  \ {`\n\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:app-context.xml\");`\n`        ctx.refresh();`\n\n\
  `        // 使用无类型结果的联系人摘要`\n`        ContactSummaryUntypeImpl contactSummaryUntype\
  \ =`\n`            ctx.getBean(\"contactSummaryUntype\",`\n`                ContactSummaryUntypeImpl.class);`\n\
  `        contactSummaryUntype.displayAllContactSummary();`\n\n`    }`\n`}`\n\n运行测试程序将产生以下输出：\n\
  \n`1: Clarence, Ho, 1234567890`\n`2: Scott, Tiger, 1234567890`\n\n在 JPA 中，有一种更优雅的解决方案，而不是处理查询返回的对象数组，这将在下一节中讨论。\n\
  \n##### 使用构造函数表达式查询自定义结果类型\n\n在 JPA 中，当查询类似上一节中的自定义结果时，您可以指示 JPA 直接为每条记录构造一个 POJO。对于上一节的示例，让我们创建一个名为\
  \ `ContactSummary` 的 POJO，用于存储联系人摘要的查询结果。清单 10-13 展示了该类。\n\n***清单 10-13.** `ContactSummary`\
  \ 类*\n\n`package com.apress.prospring3.ch10.domain;`\n\n`import java.io.Serializable;`\n\
  \n`public class ContactSummary implements Serializable {`\n\n`    private String\
  \ firstName;`\n\n`    private String lastName;`\n\n`    private String homeTelNumber;`\n\
  \n`    public ContactSummary(String firstName, String lastName,`\n`            String\
  \ homeTelNumber) {`\n`        this.firstName = firstName;`\n`        this.lastName\
  \ = lastName;`\n`        this.homeTelNumber = homeTelNumber;`\n`    }`\n\n`    //\
  \ 省略 getter/setter 方法`\n\n`    public String toString() {`\n`        return \"First\
  \ name: \" + firstName + \" Last Name: \" + lastName`\n`            + \" Home Phone:\
  \ \" + homeTelNumber;`\n`    }`\n`}`\n\n前面的 `ContactSummary` 类具有每个联系人摘要的属性，并带有一个接受所有属性的构造函数方法。\n\
  \n有了 `ContactSummary` 类，我们可以修改该方法，并在查询中使用构造函数表达式来指示 JPA 提供程序将结果集映射到 `ContactSummary`\
  \ 类。让我们首先为 `ContactSummary` 服务创建一个接口。清单 10-14 展示了该接口。\n\n***清单 10-14.** `ContactSummaryService`\
  \ 接口*\n\n`package com.apress.prospring3.ch10.service;`\n\n`import java.util.List;`\n\
  \n`import com.apress.prospring3.ch10.domain.ContactSummary;`\n\n`public interface\
  \ ContactSummaryService {`\n\n`    public List<ContactSummary> findAll();`\n\n`}`\n\
  \n清单 10-15 展示了使用构造函数表达式进行结果集映射的 `ContactSummaryService.findAll()` 方法的实现。\n\n***清单\
  \ 10-15.** 使用构造函数表达式的 `findAll()` 方法实现*\n\n`package com.apress.prospring3.ch10.service.jpa;`\n\
  \n`// 省略导入语句`\n`@Service(\"contactSummaryService\")`\n`@Repository`\n`@Transactional`\n\
  `public class ContactSummaryServiceImpl implements ContactSummaryService {`\n\n\
  `    @PersistenceContext`\n`    private EntityManager em;`\n\n`    @Transactional(readOnly=true)`\n\
  `    public List<ContactSummary> findAll() {`\n\n`    List<ContactSummary> result\
  \ = em.createQuery(`\n`        \"select new com.apress.prospring3.ch10.domain.ContactSummary(\"\
  `\n`        + \"c.firstName, c.lastName, t.telNumber) \"`\n`        + \"from Contact\
  \ c left join c.contactTelDetails t \"`\n`        + \"where t.telType='Home'\",`\n\
  `        ContactSummary.class).getResultList();`\n`        return result;`\n`    }`\n\
  `}`\n\n如清单 10-15 所示，在 JPQL 语句中，指定了 `new` 关键字，以及将存储结果的 POJO 类的完全限定名，并将选定的属性作为每个 `ContactSummary`\
  \ 类的构造函数参数传入。最后，将 `ContactSummary` 类传入 `createQuery()` 方法以指示结果类型。\n\n为了测试 `findAll()`\
  \ 方法，将清单 10-16 中的代码片段添加到 `ContactSummarySample` 类的 `main()` 方法中。\n\n***清单 10-16.**\
  \ 使用构造函数表达式测试 `findAll()` 方法*\n\n`        // 使用构造函数表达式的联系人摘要`\n`        ContactSummaryService\
  \ contactSummaryService =`\n`            ctx.getBean(\"contactSummaryService\",ContactSummaryService.class);`\n\
  `        List<ContactSummary> contacts = contactSummaryService.findAll();`\n\n`        for\
  \ (ContactSummary contactSummary: contacts) {`\n`            System.out.println(contactSummary);`\n\
  `        }`\n\n再次执行 `ContactSummarySample` 类将产生列表中每个 `ContactSummary` 对象的输出，如下所示（其他输出已省略）：\n\
  \n`First name: Clarence Last Name: Ho Home Phone: 1234567890`\n`First name: Scott\
  \ Last Name: Tiger Home Phone: 1234567890`\n\n如您所见，构造函数表达式对于将自定义查询的结果映射到 POJO 以进行进一步的应用处理非常有用。\n\
  \n\n\n#### 插入数据\n\n在 JPA 中插入数据非常简单。与 Hibernate 类似，JPA 也支持检索数据库生成的主键。清单 10-17 展示了\
  \ `save()` 方法的实现。\n\n***清单 10-17.** 实现 `save()` 方法*\n\n`package com.apress.prospring3.ch10.service.jpa;`\n\
  \n`// 导入语句已省略`\n`@Service(\"jpaContactService\")`\n`@Repository`\n`@Transactional`\n\
  `public class ContactServiceImpl implements ContactService {`\n\n`    // 其他代码已省略`\n\
  `    public Contact save(Contact contact) {`\n`        if (contact.getId() == null)\
  \ { // 插入联系人`\n`            log.info(\"正在插入新联系人\");`\n`            em.persist(contact);`\n\
  `        } else {                       // 更新联系人`\n`            em.merge(contact);`\n\
  `            log.info(\"正在更新现有联系人\");`\n`        }`\n`        log.info(\"联系人已保存，id:\
  \ \" + contact.getId());`\n`        return contact;`\n`    }`\n`}`\n\n如清单 10-17\
  \ 所示，`save()` 方法首先通过检查 `id` 值来判断该对象是否为一个新的实体实例。如果 `id` 为 null（即尚未分配），则说明它是一个新的实体实例，此时将调用\
  \ `EntityManager.persist()` 方法。调用 `persist()` 方法时，`EntityManager` 会持久化该实体，并使其成为当前持久化上下文中的一个受管实例。如果\
  \ `id` 值已存在，则说明是更新操作，此时将调用 `EntityManager.merge()` 方法。调用 `merge()` 方法时，`EntityManager`\
  \ 会将实体的状态合并到当前持久化上下文中。\n\n让我们测试一下插入操作。清单 10-18 展示了插入一条新联系人记录的代码片段。\n\n***清单 10-18.**\
  \ 测试插入操作*\n\n`// 其他代码已省略`\n`public class JpaSample {`\n\n`    public static void\
  \ main(String[] args) {`\n\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:app-context.xml\");`\n`        ctx.refresh();`\n\n\
  `        ContactService contactService = ctx.getBean(`\n`            \"jpaContactService\"\
  , ContactService.class);`\n\n`        // 添加新联系人`\n`        Contact contact = new\
  \ Contact();`\n`        contact.setFirstName(\"Michael\");`\n`        contact.setLastName(\"\
  Jackson\");`\n`        contact.setBirthDate(new Date());`\n`        ContactTelDetail\
  \ contactTelDetail =`\n`            new ContactTelDetail(\"Home\", \"1111111111\"\
  );`\n`        contact.addContactTelDetail(contactTelDetail);`\n`        contactTelDetail\
  \ = new ContactTelDetail(\"Mobile\", \"2222222222\");`\n`        contact.addContactTelDetail(contactTelDetail);`\n\
  `        contactService.save(contact);`\n`        List<Contact> contacts = contactService.findAllWithDetail();`\n\
  `        listContactsWithDetail(contacts);`\n`    }`\n\n`    private static void\
  \ listContactsWithDetail(List<Contact> contacts) {`\n`        System.out.println(\"\
  \");`\n`        System.out.println(\"列出联系人及其详细信息:\");`\n`        for (Contact contact:\
  \ contacts) {`\n`            System.out.println(contact);`\n`            if (contact.getContactTelDetails()\
  \ != null) {`\n`                for (ContactTelDetail contactTelDetail:`\n`                    contact.getContactTelDetails())\
  \ {`\n`                    System.out.println(contactTelDetail);`\n`                }`\n\
  `            }`\n`            if (contact.getHobbies() != null) {`\n`                for\
  \ (Hobby hobby: contact.getHobbies()) {`\n`                    System.out.println(hobby);`\n\
  `                }`\n`            }`\n`            System.out.println();`\n`        }`\n\
  `    }`\n\n`}`\n\n如清单 10-18 所示，我们创建了一个新联系人，添加了两个电话号码详情，然后保存该对象。接着，我们再次列出所有联系人。运行程序将产生以下输出（现有联系人的输出已省略）：\n\
  \n`2011-10-19 19:35:54,968 INFO [com.apress.prospring3.ch10.service.jpa.ContactServiceImpl]`\n\
  `<正在插入新联系人>`\n`Hibernate: insert into contact (ID, BIRTH_DATE, FIRST_NAME, LAST_NAME,\
  \ VERSION) values (null,`\n`?, ?, ?, ?)`\n`Hibernate: insert into contact_tel_detail\
  \ (ID, CONTACT_ID, TEL_NUMBER, TEL_TYPE, VERSION)`\n`values(null, ?, ?, ?, ?)`\n\
  `Hibernate: insert into contact_tel_detail (ID, CONTACT_ID, TEL_NUMBER, TEL_TYPE,\
  \ VERSION)`\n`values (null, ?, ?, ?, ?)`\n`2011-10-19 19:35:54,992 INFO [com.apress.prospring3.ch10.service.jpa.ContactServiceImpl]`\n\
  `<联系人已保存，id: 4>`\n\n`列出联系人及其详细信息:`\n`…`\n`Contact - Id: 4, First name: Michael,\
  \ Last name: Jackson, Birthday: 2011-10-19`\n`Contact Tel Detail - Id: 5, Contact\
  \ id: 4, Type: Mobile, Number: 2222222222`\n`Contact Tel Detail - Id: 4, Contact\
  \ id: 4, Type: Home, Number: 1111111111`\n\n从 `INFO` 日志记录中，您可以看到新保存的联系人的 `id` 已被正确填充。Hibernate\
  \ 还会显示所有发送到数据库的 SQL 语句。\n\n#### 更新数据\n\n更新联系人就像插入数据一样简单。让我们看一个例子。假设对于 ID 为 1 的联系人，我们想要更新其名字并删除家庭电话号码记录。为了测试更新操作，请将清单\
  \ 10-19 中的代码片段添加到 `JpaSample` 类的 `main()` 方法中。\n\n***清单 10-19.** 测试更新操作*\n\n`        //\
  \ 其他代码已省略`\n\n`        // 根据 ID 查找联系人`\n`        contact = contactService.findById(1l);`\n\
  `        System.out.println(\"\");`\n`        System.out.println(\"ID 为 1 的联系人:\"\
  \ + contact);`\n`        System.out.println(\"\");`\n\n`        // 更新联系人`\n`        contact.setFirstName(\"\
  Kim Fung\");`\n`        Set<ContactTelDetail> contactTels = contact.getContactTelDetails();`\n\
  `        ContactTelDetail toDeleteContactTel = null;`\n`        for (ContactTelDetail\
  \ contactTel: contactTels) {`\n`            if (contactTel.getTelType().equals(\"\
  Home\")) {`\n`                toDeleteContactTel = contactTel;`\n`            }`\n\
  `        }`\n`        contactTels.remove(toDeleteContactTel);`\n`        contactService.save(contact);`\n\
  `        contacts = contactService.findAllWithDetail();`\n`        listContactsWithDetail(contacts);`\n\
  \n如清单 10-19 所示，我们首先检索 ID 为 1 的记录。然后更改其名字。接着，我们遍历电话号码对象，找到类型为 `\"Home\"` 的电话号码，并将其从联系人的电话号码详情属性中移除。最后，我们再次调用\
  \ `ContactService.save()` 方法。运行程序时，您将看到以下输出（其他输出已省略）：\n\n`Contact - Id: 1, First\
  \ name: Kim Fung, Last name: Ho, Birthday: 1980-07-30`\n`Contact Tel Detail - Id:\
  \ 1, Contact id: 1, Type: Mobile, Number: 1234567890`\n`Hobby :Movies`\n`Hobby :Swimming`\n\
  \n您会看到名字已被更新，家庭电话号码已被移除。电话号码之所以能被移除，是因为在一对多关联中定义了 `orphanRemoval=true` 属性，该属性指示\
  \ JPA 提供者（即 Hibernate）在持久化时，移除所有存在于数据库中但对象中不再存在的孤立记录。\n\n`@OneToMany(mappedBy =\
  \ \"contact\", cascade=CascadeType.ALL, orphanRemoval=true)`\n\n\n\n#### 删除数据\n\n\
  删除数据很简单。只需调用 `EntityManager.remove()` 方法并传入联系人对象。代码清单 10-20 展示了相关代码片段。\n\n***代码清单\
  \ 10-20.** 实现 `delete()` 方法*\n\n`package com.apress.prospring3.ch10.service.jpa;`\n\
  \n`// 省略导入语句`\n`@Service(\"jpaContactService\")`\n`@Repository`\n`@Transactional`\n\
  `public class ContactServiceImpl implements ContactService {`\n\n`    private Log\
  \ log = LogFactory.getLog(ContactServiceImpl.class);`\n\n`    // 省略其他代码`\n`    public\
  \ void delete(Contact contact) {`\n`        Contact mergedContact = em.merge(contact);`\n\
  `        em.remove(mergedContact);`\n`        log.info(\"联系人 ID: \" + contact.getId()`\n\
  `            + \" 已成功删除\");`\n`    }`\n`}`\n\n如代码清单 10-20 所示，首先调用 `EntityManager.merge()`\
  \ 方法将实体的状态合并到当前持久化上下文中。`merge()` 方法会返回受管理的实体实例。然后调用 `EntityManager.remove()`，并传入受管理的联系人实体实例。删除操作会删除该联系人记录及其所有关联信息，包括电话详情和爱好，因为我们在映射中定义了\
  \ `cascade=CascadeType.ALL`。要测试删除操作，请将代码清单 10-21 中的代码片段添加到 `JpaSample` 类的 `main()`\
  \ 方法中。\n\n***代码清单 10-21.** 测试删除操作*\n\n`        // 删除联系人`\n`        contact = contactService.findById(1l);`\n\
  `        contactService.delete(contact);`\n`        contacts = contactService.findAllWithDetail();`\n\
  `        listContactsWithDetail(contacts);`\n\n上述代码清单检索了 ID 为 1 的联系人，然后调用 `delete()`\
  \ 方法删除该联系人信息。运行程序将产生以下输出（省略了其他输出）：\n\n`列出联系人详情：`\n`联系人 - ID: 4, 名字: Michael, 姓氏:\
  \ Jackson, 生日: 2011-10-13`\n`联系人电话详情 - ID: 4, 联系人 ID: 4, 类型: 家庭, 号码: 1111111111`\n\
  `联系人电话详情 - ID: 5, 联系人 ID: 4, 类型: 手机, 号码: 2222222222`\n\n`联系人 - ID: 3, 名字: John,\
  \ 姓氏: Smith, 生日: 1964-02-28`\n\n`联系人 - ID: 2, 名字: Scott, 姓氏: Tiger, 生日: 1990-11-02`\n\
  `联系人电话详情 - ID: 3, 联系人 ID: 2, 类型: 家庭, 号码: 1234567890`\n`爱好：游泳`\n\n可以看到，ID 为 1 的联系人已被删除。\n\
  \n#### 原生查询\n\n在讨论了使用 JPA 执行基本数据库操作之后，现在让我们进入一些更高级的主题。有时你可能希望对提交给数据库的查询拥有绝对的控制权。一个例子是在\
  \ Oracle 数据库中使用层次查询。这种查询是数据库特定的，被称为*原生查询*。\n\nJPA 支持执行原生查询；`EntityManager` 会按原样将查询提交给数据库，不执行任何映射或转换。你可能会想，既然\
  \ JDBC 支持直接将查询提交给数据库，为什么我们不直接使用 JDBC 呢？Spring 也为编程式 JDBC 访问逻辑提供了良好的支持，并能将行数据映射回\
  \ Java POJO。\n\n使用 JPA 原生查询的一个主要好处是能够将结果集映射回 ORM 映射的实体类。接下来的两节将讨论如何使用原生查询检索所有联系人，并将结果集直接映射回\
  \ `Contact` 对象。\n\n##### 简单原生查询\n\n为了演示如何使用原生查询，让我们实现一个新方法，通过原生查询从数据库中检索所有联系人。代码清单\
  \ 10-22 展示了 `ContactService` 接口中的新方法。\n\n***代码清单 10-22.** `findAllByNativeQuery()`\
  \ 方法*\n\n`package com.apress.prospring3.ch10.service;`\n\n`// 省略其他代码`\n`public interface\
  \ ContactService {`\n\n`    // 省略其他代码`\n\n`    // 通过原生查询查找所有联系人`\n`    public List<Contact>\
  \ findAllByNativeQuery();`\n`}`\n\n代码清单 10-23 展示了 `findAllByNativeQuery()` 方法的实现。\n\
  \n***代码清单 10-23.** 实现 `findAllByNativeQuery()` 方法*\n\n`package com.apress.prospring3.ch10.service.jpa;`\n\
  \n`// 省略导入语句`\n`@Service(\"jpaContactService\")`\n`@Repository`\n`@Transactional`\n\
  `public class ContactServiceImpl implements ContactService {`\n\n`    private Log\
  \ log = LogFactory.getLog(ContactServiceImpl.class);`\n\n`    // 省略其他代码`\n`    final\
  \ static String ALL_CONTACT_NATIVE_QUERY =`\n`        \"select id, first_name, last_name,\
  \ birth_date, version from contact\";`\n\n`    @Transactional(readOnly=true)`\n\
  `    public List<Contact> findAllByNativeQuery() {`\n`        return em.createNativeQuery(ALL_CONTACT_NATIVE_QUERY,    `\n\
  `            Contact.class).getResultList();`\n`    }`\n`}`\n\n如代码清单 10-23 所示，可以看到原生查询只是一个简单的\
  \ SQL 语句，用于检索 `CONTACT` 表中的所有列。要创建并执行该查询，首先调用 `EntityManager.createNativeQuery()`，传入查询字符串以及结果类型。结果类型应该是一个映射的实体类（本例中为\
  \ `Contact` 类）。`createNativeQuery()` 方法返回一个 `Query` 接口，该接口提供了 `getResultList()`\
  \ 操作来获取结果列表。JPA 提供者将执行查询，并根据实体类中定义的 JPA 映射将结果集转换为实体实例。执行上述方法会产生与 `findAll()` 方法相同的结果。\n\
  \n##### 带 SQL 结果集映射的原生查询\n\n在上一节中，对于 `EntityManager.createNativeQuery()`，除了映射的领域对象外，你还可以传入一个字符串，该字符串表示\
  \ SQL 结果集映射的名称。SQL 结果集映射是使用 `@SqlResultSetMapping` 注解在实体类级别定义的。一个 SQL 结果集映射可以包含一个或多个实体和列映射。\n\
  \n让我们在 `Contact` 实体类中定义一个简单的 SQL 结果集映射（参见代码清单 10-24）。\n\n***代码清单 10-24.** 使用 SQL\
  \ 结果集映射*\n\n`package com.apress.prospring3.ch10.domain;`\n\n`// 省略其他代码`\n`@SqlResultSetMapping(`\n\
  `     name=\"contactResult\",`\n`     entities=@EntityResult(entityClass=Contact.class)`\n\
  `)`\n`public class Contact implements Serializable {`\n`…`\n\n为实体类定义了一个名为 `contactResult`\
  \ 的 SQL 结果集映射，其 `entityClass` 属性指向 `Contact` 类本身。JPA 支持针对多个实体的更复杂映射，并支持向下到列级别的映射。\n\
  \n定义好 SQL 结果集映射后，就可以使用该结果集映射的名称来调用 `findAllByNativeQuery()` 方法。代码清单 10-25 展示了相关代码片段。\n\
  \n***代码清单 10-25.** 使用 SQL 结果集映射实现 `findAllByNativeQuery()` 方法*\n\n`package com.apress.prospring3.ch10.service.jpa;`\n\
  \n`// 省略其他代码`\n`public class ContactServiceImpl implements ContactService {`\n\n\
  `    // 省略其他代码`\n\n`    @Transactional(readOnly=true)`\n`    public List<Contact>\
  \ findAllByNativeQuery() {`\n`        return em.createNativeQuery(ALL_CONTACT_NATIVE_QUERY,`\n\
  `            \"contactResult\").getResultList();`\n`    }`\n`}`\n\n如你所见，JPA 也为执行原生查询提供了强大的支持，并提供了灵活的\
  \ SQL 结果集映射工具。\n\n\n\n#### 使用 JPA 2 标准 API 进行条件查询\n\n大多数应用程序都会提供一个前端界面供用户搜索信息。界面上很可能会显示大量可搜索的字段，而用户只会输入其中一部分字段进行搜索。为每一种用户可能输入的参数组合准备大量的查询语句是非常困难的。在这种情况下，标准\
  \ API 查询功能就派上了用场。\n\n在 JPA 2 中，引入的一个主要新特性就是强类型标准 API 查询。在这个新的标准 API 中，传入查询的条件是基于映射实体类的元模型的。因此，每个指定的条件都是强类型的，错误会在编译时而非运行时被发现。\n\
  \n在 JPA 标准 API 中，实体类的元模型由实体类名加上下划线（_）后缀来表示。例如，`Contact` 实体类的元模型类将是 `Contact_`。代码清单\
  \ 10-26 展示了 `Contact_` 类。\n\n***代码清单 10-26.** JPA 2 强类型标准 API：元模型*\n\n`package com.apress.prospring3.ch10.domain;`\n\
  \n`import java.util.Date;`\n`import javax.persistence.metamodel.SetAttribute;`\n\
  `import javax.persistence.metamodel.SingularAttribute;`\n`import javax.persistence.metamodel.StaticMetamodel;`\n\
  \n`@StaticMetamodel(Contact.class)`\n`public abstract class Contact_ {`\n\n`public\
  \ static volatile SingularAttribute<Contact, Long> id;`\n`    public static volatile\
  \ SetAttribute<Contact, ContactTelDetail>`\n`        contactTelDetails;`\n`    public\
  \ static volatile SingularAttribute<Contact, String> lastName;`\n`    public static\
  \ volatile SingularAttribute<Contact, Date> birthDate;`\n`    public static volatile\
  \ SetAttribute<Contact, Hobby> hobbies;`\n`    public static volatile SingularAttribute<Contact,\
  \ String> firstName;`\n`    public static volatile SingularAttribute<Contact, Integer>\
  \ version;`\n\n`}`\n\n如代码清单 10-26 所示，元模型类使用 `@StaticMetamodel` 注解进行标注，其属性即为被映射的实体类。该类内部声明了每个属性及其相关类型。\n\
  \n手动编写和维护这些元模型类会很繁琐。不过，有工具可以根据实体类中的 JPA 映射自动生成这些元模型类。Hibernate 提供的工具称为 Hibernate\
  \ 元模型生成器（[`www.hibernate.org/subprojects/jpamodelgen.html`](http://www.hibernate.org/subprojects/jpamodelgen.html)）。在\
  \ STS 中使用该工具并进行一些配置后，每次构建项目时，元模型类都会自动生成/更新。\n\n让我们逐步了解如何为 JPA 实体类启用元模型类的自动生成。首先，我们需要将表\
  \ 10-1 中的 JAR 文件准备好，用于我们的项目。这两个 JAR 文件都可以从前面提到的网站下载的软件包中找到。我们使用的版本是 1.1.1。\n\n![images](img/t1001.jpg)\n\
  \n其次，将这些文件复制到你的项目中。例如，我将 JAR 文件放到了项目根目录下名为 `metamodel-generator-lib` 的文件夹中，如图 10-4\
  \ 所示。\n\n![images](img/9781430241072_Fig10-04.jpg)\n\n***图 10-4.** STS 中的 Hibernate\
  \ 元模型生成器库*\n\nJAR 文件就位后，右键单击项目名称并选择 Properties。选择 Java Compiler ![images](img/U001.jpg)\
  \ Annotation Processing，勾选“Enable project specific settings”，然后勾选“Enable annotation\
  \ processing”。在“Generated source directory”字段中输入文件夹名称 **target/metamodel**。\n\n\
  图 10-5 显示了属性详情。\n\n![images](img/9781430241072_Fig10-05.jpg)\n\n***图 10-5.** 在 STS\
  \ 中启用注解处理*\n\n然后点击 Factory Path 选项（在左侧菜单中），勾选“Enable project specific settings”，接着点击\
  \ Add JARs 按钮，选择前面提到的两个 JAR 文件添加到工厂路径中。图 10-6 显示了选中的文件。\n\n![images](img/9781430241072_Fig10-06.jpg)\n\
  \n***图 10-6.** 在 STS 中设置注解处理工厂路径*\n\n完成后，点击 OK 按钮，STS 会提示你是否重建项目。点击 Yes 将重建项目，注解处理会生成元模型类。图\
  \ 10-7 显示了生成的元模型类。\n\n![images](img/9781430241072_Fig10-07.jpg)\n\n***图 10-7.**\
  \ 生成的元模型类*\n\n生成元模型类后，我们可以继续使用 JPA 2 强类型标准 API 查询来实现更灵活的查询。让我们定义一个查询，它接受名字和姓氏来搜索联系人。代码清单\
  \ 10-27 展示了 `ContactService` 接口中新方法 `findByCriteriaQuery()` 的定义。\n\n***代码清单 10-27.**\
  \ `findByCriteriaQuery()` 方法*\n\n`package com.apress.prospring3.ch10.service;`\n\
  \n`// 其他代码已省略`\n`public interface ContactService {`\n\n`    // 通过条件查询查找联系人`\n`    public\
  \ List<Contact> findByCriteriaQuery(`\n`        String firstName, String lastName);`\n\
  `}`\n\n代码清单 10-28 展示了使用 JPA 2 标准 API 查询实现 `findByCriteriaQuery()` 方法。\n\n***代码清单\
  \ 10-28.** 实现 `findByCriteriaQuery()` 方法*\n\n`package com.apress.prospring3.ch10.service.jpa;`\n\
  \n`// 其他代码已省略`\n`public class ContactServiceImpl implements ContactService {`\n\n\
  `    @Transactional(readOnly=true)`\n`    public List<Contact> findByCriteriaQuery(`\n\
  `        String firstName, String lastName) {`\n\n`        log.info(\"Finding contact\
  \ for firstName: \" + firstName`\n`                  + \" and lastName: \" + lastName);`\n\
  \n`        CriteriaBuilder cb = em.getCriteriaBuilder();`\n`        CriteriaQuery<Contact>\
  \ criteriaQuery = cb.createQuery(Contact.class);`\n`        Root<Contact> contactRoot\
  \ = criteriaQuery.from(Contact.class);`\n`        contactRoot.fetch(Contact_.contactTelDetails,\
  \ JoinType.LEFT);`\n`        contactRoot.fetch(Contact_.hobbies, JoinType.LEFT);`\n\
  \n`        criteriaQuery.select(contactRoot).distinct(true);`\n\n`        Predicate\
  \ criteria = cb.conjunction();`\n\n`        // 名字`\n`        if (firstName != null)\
  \ {`\n`            Predicate p = cb.equal(contactRoot.get(Contact_.firstName),`\n\
  `                firstName);`\n`             criteria = cb.and(criteria, p);`\n\
  `        }`\n\n`        // 姓氏`\n`        if (lastName != null) {`\n`            Predicate\
  \ p = cb.equal(contactRoot.get(Contact_.lastName),`\n`                lastName);`\n\
  `            criteria = cb.and(criteria, p);`\n`      }`\n\n`        criteriaQuery.where(criteria);`\n\
  `        List<Contact> result = em.createQuery(criteriaQuery).getResultList();`\n\
  `        return result;`\n`    }`\n`}`\n\n下面是对代码清单 10-28 的详细说明：\n\n\n\n*   调用 `EntityManager.getCriteriaBuilder()`\
  \ 获取了一个 `CriteriaBuilder` 实例。\n*   使用 `CriteriaBuilder.createQuery()` 创建了一个类型化查询，并将\
  \ `Contact` 作为结果类型传入。\n*   调用了 `CriteriaQuery.from()` 方法，并传入了实体类。结果是一个查询根对象（即 `Root<Contact>`\
  \ 接口），对应于指定的实体。查询根对象构成了查询中路径表达式的基础。\n*   两次 `Root.fetch()` 方法调用强制对与电话详情和爱好相关的关联进行即时抓取。`JoinType.LEFT`\
  \ 参数指定了外连接。使用 `JoinType.LEFT` 作为第二个参数调用 `Root.fetch()` 方法，等同于在 JPQL 中指定 `left join\
  \ fetch` 连接操作。\n*   调用了 `CriteriaQuery.select()` 方法，并将查询根对象作为结果类型传入。`distinct()`\
  \ 方法参数为 `true` 表示应消除重复记录。\n*   通过调用 `CriteriaBuilder.conjunction()` 方法获得了一个 `Predicate`\
  \ 实例，这意味着即将构建一个或多个限制条件的合取。`Predicate` 可以是简单或复合谓词，谓词是一种限制条件，指示由表达式定义的选择标准。\n*   检查了名字和姓氏参数。如果参数不为\
  \ null，将使用 `CriteriaBuilder()` 方法（即 `CriteriaBuilder.and()` 方法）构建一个新的 `Predicate`。`equal()`\
  \ 方法用于指定相等限制，其中调用了 `Root.get()` 方法，并传入了该限制所应用的实体类元模型的相应属性。然后，通过调用 `CriteriaBuilder.and()`\
  \ 方法，将构建的谓词与现有谓词（由变量 `criteria` 存储）进行“合取”。\n*   使用所有标准和限制条件构建了 `Predicate`，并通过调用\
  \ `CriteriaQuery.where()` 方法将其作为 `where` 子句传递给查询。\n*   最后，将 `CriteriaQuery` 传递给了\
  \ `EntityManager`。然后，`EntityManager` 将根据传入的 `CriteriaQuery` 构建查询，执行查询，并返回结果。\n\n\
  要测试条件查询操作，请将代码清单 10-29 中的代码片段添加到 `JpaSample` 类的 `main()` 方法中。\n\n***代码清单 10-29.**\
  \ 测试 `findByCriteriaQuery()` 方法*\n\n`        // 通过条件查询查找联系人`\n`        contacts\
  \ = contactService.findByCriteriaQuery(\"John\", \"Smith\");`\n`        listContactsWithDetail(contacts);`\n\
  \n运行程序将产生以下输出（其他输出已省略）：\n\n`2011-10-20 18:42:34,411 INFO [com.apress.prospring3.ch10.service.jpa.ContactServiceImpl]\
  \ -`\n`<Finding contact for firstName: John and lastName: Smith>`\n`...`\n\n`Listing\
  \ contacts with details:`\n`Contact - Id: 3, First name: John, Last name: Smith,\
  \ Birthday: 1964-02-28`\n\n您可以尝试不同的组合，或者向任一参数传递 `null` 值来观察输出。\n\n### 介绍 Spring\
  \ Data JPA\n\nSpring Data JPA 项目是 Spring Data 总项目下的一个子项目。Spring Data JPA 项目的主要目标是提供附加功能，以简化使用\
  \ JPA 进行应用程序开发。\n\nSpring Data JPA 提供了几个主要功能。在本节中，我们将讨论两个主要功能。第一个是 `Repository`\
  \ 抽象，另一个是用于跟踪实体类基本审计信息的实体监听器。\n\n#### 添加 Spring Data JPA 库依赖\n\n要使用 Spring Data\
  \ JPA，我们需要向项目添加几个依赖。表 10-2 描述了所需的 Maven 依赖。\n\n![images](img/t1002.jpg)\n\n在 STS\
  \ 中，您可以使用 POM 编辑器轻松添加依赖。只需双击包资源管理器中的 `pom.xml` 文件。在 POM 编辑器中，单击 Dependencies 选项卡并输入附加依赖。图\
  \ 10-8 显示了添加 `spring-data-jpa` 的示例。\n\n![images](img/9781430241072_Fig10-08.jpg)\n\
  \n***图 10-8.** 向 Spring 项目添加依赖*\n\n图 10-9 显示了添加所有依赖后 STS 中的列表。\n\n![images](img/9781430241072_Fig10-09.jpg)\n\
  \n***图 10-9.** Spring Data JPA 项目的 Maven 依赖*\n\n添加依赖后，我们可以继续探索 Spring Data JPA 的功能。\n\
  \n\n\n#### 使用 Spring Data JPA 仓库抽象进行数据库操作\n\nSpring Data 及其所有子项目的主要概念之一是 `Repository`\
  \ 抽象，它属于 Spring Data Commons 项目（[`www.springsource.org/spring-data/commons`](http://www.springsource.org/spring-data/commons)）。在撰写本文时，其版本为\
  \ 1.1.0.RELEASE。在 Spring Data JPA 中，仓库抽象封装了底层的 JPA `EntityManager`，并为基于 JPA 的数据访问提供了更简单的接口。Spring\
  \ Data 中的核心接口是 `org.springframework.data.repository.Repository<T,ID extends Serializable>`\
  \ 接口，这是一个属于 Spring Data Commons 分发包的标记接口。Spring Data 提供了 `Repository` 接口的各种扩展；其中之一是\
  \ `org.springframework.data.repository.CrudRepository` 接口（也属于 Spring Data Commons\
  \ 项目），我们将在本节中讨论。\n\n`CrudRepository` 接口提供了许多常用方法。清单 10-30 显示了该接口的声明，该声明摘自 Spring\
  \ Data Commons 项目源代码。\n\n***清单 10-30.** `CrudRepository` 接口*\n\n`package org.springframework.data.repository;`\n\
  \n`import java.io.Serializable;`\n\n`@NoRepositoryBean`\n`public interface CrudRepository<T,\
  \ ID extends Serializable> extends Repository<T, ID> {`\n\n`    T save(T entity);`\n\
  \n`    Iterable<T> save(Iterable<? extends T> entities);`\n\n`    T findOne(ID id);`\n\
  \n`    boolean exists(ID id);`\n\n`    Iterable<T> findAll();`\n\n`    long count();`\n\
  \n`    void delete(ID id);`\n\n`    void delete(T entity);`\n\n`    void delete(Iterable<?\
  \ extends T> entities);`\n\n`    void deleteAll();`\n`}`\n\n方法名称不言自明。最好通过一个简单的示例来展示\
  \ `Repository` 抽象的工作原理。让我们稍微修改一下 `ContactService` 接口，只保留三个查找方法。清单 10-31 显示了修改后的\
  \ `ContactService` 接口。修改 `ContactService` 接口后，`com.apress.prospring3.ch10.JpaSample`\
  \ 和 `com.apress.prospring3.ch10.service.jpa.ContactServiceImpl` 类将出现错误。只需删除这两个类，然后使用\
  \ Spring Data JPA 继续实现该接口即可。\n\n***清单 10-31.** 修改后的 `ContactService` 接口*\n\n`package\
  \ com.apress.prospring3.ch10.service;`\n\n`import java.util.List;`\n`import com.apress.prospring3.ch10.domain.Contact;`\n\
  \n`public interface ContactService {`\n\n`    // 查找所有联系人`\n`    public List<Contact>\
  \ findAll();`\n\n`    // 根据名字查找联系人`\n`    public List<Contact> findByFirstName(String\
  \ firstName);`\n\n`    // 根据名字和姓氏查找联系人`\n`    public List<Contact> findByFirstNameAndLastName(`\n\
  `        String firstName, String lastName);`\n`}`\n\n下一步是准备 `ContactRepository`\
  \ 接口，它扩展了 `CrudRepository` 接口。清单 10-32 显示了 `ContactRepository` 接口。\n\n***清单 10-32.**\
  \ `ContactRepository` 接口*\n\n`package com.apress.prospring3.ch10.repository;`\n\n\
  `import java.util.List;`\n\n`import org.springframework.data.repository.CrudRepository;`\n\
  \n`import com.apress.prospring3.ch10.domain.Contact;`\n\n`public interface ContactRepository\
  \ extends CrudRepository<Contact, Long> {`\n\n`    public List<Contact> findByFirstName(String\
  \ firstName);`\n\n`    public List<Contact> findByFirstNameAndLastName(`\n`        String\
  \ firstName, String lastName);`\n\n`}`\n\n我们只需要在此接口中声明两个方法，因为 `findAll()` 方法已由 `CrudRepository.findAll()`\
  \ 方法提供。如清单 10-32 所示，`ContactRepository` 接口扩展了 `CrudRepository` 接口，传入了实体类（`Contact`）和\
  \ ID 类型（`Long`）。Spring Data 的 `Repository` 抽象的一个奇妙之处在于，当你使用诸如 `findByFirstName`\
  \ 和 `findByFirstNameAndLastName` 这样的通用命名约定时，你无需向 Spring Data JPA 提供命名查询。相反，Spring\
  \ Data JPA 会根据方法名称为你“推断”并构建查询。例如，对于 `findByFirstName()` 方法，Spring Data JPA 会自动为你准备查询\
  \ `select c from Contact c where c.firstName = :firstName`，并从参数中设置命名参数 `firstName`。\n\
  \n要使用 `Repository` 抽象，我们必须在 Spring 的配置中定义它。清单 10-33 显示了配置文件（`spring-data-app-context.xml`）。\n\
  \n***清单 10-33.** Spring 中的 JPA 仓库配置*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"\
  ?>`\n`<beans`\n\n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n\
  `        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n`        http://www.springframework.org/schema/context`\n\
  `        http://www.springframework.org/schema/context/spring-context-3.1.xsd`\n\
  `        http://www.springframework.org/schema/jdbc`\n`        http://www.springframework.org/schema/jdbc/spring-jdbc-3.1.xsd`\n\
  `        http://www.springframework.org/schema/data/jpa`\n`        http://www.springframework.org/schema/data/jpa/spring-jpa-1.0.xsd`\n\
  `        http://www.springframework.org/schema/tx`\n`        http://www.springframework.org/schema/tx/spring-tx-3.1.xsd\"\
  >`\n\n`    <jdbc:embedded-database id=\"dataSource\" type=\"H2\">`\n`        <jdbc:script\
  \ location=\"classpath:schema.sql\"/>`\n`        <jdbc:script location=\"classpath:test-data.sql\"\
  />`\n`    </jdbc:embedded-database>`\n\n`    <bean id=\"transactionManager\"`\n\
  `        class=\"org.springframework.orm.jpa.JpaTransactionManager\">`\n`        <property\
  \ name=\"entityManagerFactory\" ref=\"emf\"/>`\n`    </bean>`\n\n`    <tx:annotation-driven\
  \ transaction-manager=\"transactionManager\" />`\n\n`    <bean id=\"emf\" class=\"\
  org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean\">`\n`        <property\
  \ name=\"dataSource\" ref=\"dataSource\" />`\n`        <property name=\"jpaVendorAdapter\"\
  >`\n`            <bean class=\"org.springframework.orm.jpa.vendor.HibernateJpaVendorAdapter\"\
  \ />`\n`        </property>`\n`        <property name=\"packagesToScan\"`\n`            \
  \ value=\"com.apress.prospring3.ch10.domain\"/>`\n`        <property name=\"jpaProperties\"\
  >`\n`            <props>`\n`                <prop key=\"hibernate.dialect\">`\n\
  `                    org.hibernate.dialect.H2Dialect`\n`                </prop>`\n\
  `                <prop key=\"hibernate.max_fetch_depth\">3</prop>`\n`                <prop\
  \ key=\"hibernate.jdbc.fetch_size\">50</prop>`\n`                <prop key=\"hibernate.jdbc.batch_size\"\
  >10</prop>`\n`                <prop key=\"hibernate.show_sql\">true</prop>`\n`            </props>`\n\
  `        </property>`\n`    </bean>`\n\n`    <context:annotation-config/>`\n\n`    <context:component-scan`\n\
  `          base-package=\"com.apress.prospring3.ch10.service.springjpa\"/>`\n\n\
  `    <jpa:repositories base-package=\"com.apress.prospring3.ch10.repository\"`\n\
  `                      entity-manager-factory-ref=\"emf\"`\n`                      transaction-manager-ref=\"\
  transactionManager\"/>`\n`</beans>`\n\n首先，我们需要在配置文件中添加 `jpa` 命名空间。然后，使用 `<jpa:repositories>`\
  \ 标签来配置 Spring Data JPA 的 `Repository` 抽象。我们指示 Spring 扫描包 `com.apress.prospring3.ch10.repository`\
  \ 以查找仓库接口，并分别传入 `EntityManagerFactory` 和事务管理器。\n\n\n\n现在我们可以继续实现部分。清单 10-34 展示了`ContactService`接口中三个查找方法的实现。\n\
  \n***清单 10-34.** `ContactServiceImpl`类*\n\n`package com.apress.prospring3.ch10.service.springjpa;`\n\
  \n`// 导入语句已省略`\n`@Service(\"springJpaContactService\")`\n`@Repository`\n`@Transactional`\n\
  `public class ContactServiceImpl implements ContactService {`\n\n`    @Autowired`\n\
  `    private ContactRepository contactRepository;`\n\n`    @Transactional(readOnly=true)`\n\
  `    public List<Contact> findAll() {`\n`        return Lists.newArrayList(contactRepository.findAll());`\n\
  `    }`\n\n`    @Transactional(readOnly=true)`\n`    public List<Contact> findByFirstName(String\
  \ firstName) {`\n`        return contactRepository.findByFirstName(firstName);`\n\
  `    }`\n\n`    @Transactional(readOnly=true)`\n`    public List<Contact> findByFirstNameAndLastName(`\n\
  `        String firstName, String lastName) {`\n`        return contactRepository.findByFirstNameAndLastName(`\n\
  `            firstName, lastName);`\n`    }`\n`}`\n\n可以看到，我们不再需要`EntityManager`，只需将`ContactRepository`接口注入到服务类中，Spring\
  \ Data JPA 就会替我们完成所有繁琐的工作。清单 10-35 展示了测试程序。\n\n***清单 10-35.** `SpringJpaSample`类*\n\
  \n`package com.apress.prospring3.ch10;`\n\n`// 导入语句已省略`\n`public class SpringJpaSample\
  \ {`\n\n`    public static void main(String[] args) {`\n\n`        GenericXmlApplicationContext\
  \ ctx = new GenericXmlApplicationContext();`\n`        ctx.load(\"classpath:spring-data-app-context.xml\"\
  );`\n`        ctx.refresh();`\n\n`        ContactService contactService = ctx.getBean(`\n\
  `            \"springJpaContactService\", ContactService.class);`\n\n`        //\
  \ 查找所有联系人`\n`        List<Contact> contacts = contactService.findAll();`\n`        listContacts(contacts);`\n\
  \n`        // 根据名字查找联系人`\n`        contacts = contactService.findByFirstName(\"\
  Clarence\");`\n`        listContacts(contacts);`\n\n`        // 根据名字和姓氏查找联系人`\n\
  `        contacts = contactService.findByFirstNameAndLastName(\"Clarence\", \"Ho\"\
  );`\n`        listContacts(contacts);`\n\n`    }`\n\n`    private static void listContacts(List<Contact>\
  \ contacts) {`\n`        System.out.println(\"\");`\n`        System.out.println(\"\
  列出联系人（不含详细信息）：\");`\n`        for (Contact contact: contacts) {`\n`            System.out.println(contact);`\n\
  `            System.out.println();`\n`        }`\n`    }`\n`}`\n\n这个类没有什么特别之处。运行程序将按预期列出联系人。我们将其留给你进行测试。\n\
  \n你已经看到 Spring Data JPA 如何帮助简化开发。我们不需要准备命名查询，不需要调用`EntityManager.createQuery()`方法，等等。\n\
  \n我们介绍的只是最简单的示例。`Repository`抽象支持许多特性，包括使用`@Query`注解定义自定义查询、`Specification`特性（自版本\
  \ 1.0.1.RELEASE 起属于 Spring Data JPA 项目）等。更多信息，请参考 SpringSource 的参考文档，链接如下：\n\n*\
  \   Spring Data Commons 项目：[`http://static.springsource.org/spring-data/data-commons/docs/current/reference/html/`](http://static.springsource.org/spring-data/data-commons/docs/current/reference/html/)\n\
  *   Spring Data JPA 项目：[`http://static.springsource.org/spring-data/data-jpa/docs/current/reference/html/`](http://static.springsource.org/spring-data/data-jpa/docs/current/reference/html/)\n\
  \n#### 跟踪实体类的变更\n\n在大多数应用程序中，我们需要跟踪用户维护的业务数据的基本审计活动。审计信息通常包括创建数据的用户、创建日期、最后修改日期以及最后修改的用户。\n\
  \nSpring Data JPA 以 JPA 实体监听器的形式提供了一个功能，可以帮助你自动跟踪这些审计信息。要使用此功能，实体类需要实现`org.springframework.data.domain.Auditable<U,ID\
  \ extends Serializable>`接口（属于 Spring Data Commons）或扩展任何实现了该接口的类。清单 10-36 展示了从 Spring\
  \ Data 参考文档中提取的`Auditable`接口。\n\n***清单 10-36.** `Auditable`接口*\n\n`package org.springframework.data.domain;`\n\
  \n`import java.io.Serializable;`\n\n`import org.joda.time.DateTime;`\n\n`public\
  \ interface Auditable<U, ID extends Serializable>`\n`    extends Persistable<ID>\
  \ {`\n\n`    U getCreatedBy();`\n`    void setCreatedBy(final U createdBy);`\n\n\
  `    DateTime getCreatedDate();`\n`    void setCreated(final DateTime creationDate);`\n\
  \n`    U getLastModifiedBy();`\n`    void setLastModifiedBy(final U lastModifiedBy);`\n\
  \n`    DateTime getLastModifiedDate();`\n`    void setLastModified(final DateTime\
  \ lastModifiedDate);`\n`}`\n\n为了展示其工作原理，让我们在数据库模式中创建一个名为`CONTACT_AUDIT`的新表，该表基于`CONTACT`表，并添加了四个与审计相关的列。清单\
  \ 10-37 展示了建表脚本（`schema.sql`）。\n\n***清单 10-37.** `CONTACT_AUDIT`表*\n\n`CREATE TABLE\
  \ CONTACT_AUDIT (`\n`       ID INT NOT NULL AUTO_INCREMENT`\n`    , FIRST_NAME VARCHAR(60)\
  \ NOT NULL`\n`    , LAST_NAME VARCHAR(40) NOT NULL`\n`    , BIRTH_DATE DATE`\n`    ,\
  \ VERSION INT NOT NULL DEFAULT 0`\n**`    , CREATED_BY VARCHAR(20)`**\n**`    ,\
  \ CREATED_DATE TIMESTAMP`**\n**`    , LAST_MODIFIED_BY VARCHAR(20)`**\n**`    ,\
  \ LAST_MODIFIED_DATE TIMESTAMP`**\n`    , UNIQUE UQ_CONTACT_AUDIT_1 (FIRST_NAME,\
  \ LAST_NAME)`\n`    , PRIMARY KEY (ID)`\n`);`\n\n在清单 10-37 中，四个加粗的列表示与审计相关的列。下一步是创建名为`ContactAudit`的实体类。它基本上与`Contact`实体类相同；我们只是添加了四个审计列的映射。此外，该类实现了`Auditable`接口。清单\
  \ 10-38 展示了在`Contact`类基础上添加的代码片段。\n\n***清单 10-38.** `ContactAudit`类*\n\n`package\
  \ com.apress.prospring3.ch10.domain;`\n\n`// 导入语句已省略`\n`@Entity`\n`@Table(name =\
  \ \"contact_audit\")`\n`public class ContactAudit implements Auditable<String, Long>,\
  \ Serializable {`\n\n`    // 其他声明映射属性已省略`\n\n`    // 审计字段`\n`    private String\
  \ createdBy;`\n`    private DateTime createdDate;`\n`    private String lastModifiedBy;`\n\
  `    private DateTime lastModifiedDate;`\n\n`    @Column(name=\"CREATED_BY\")`\n\
  `    public String getCreatedBy() {`\n`        return createdBy;`\n`    }`\n\n`    public\
  \ void setCreatedBy(String createdBy) {`\n`        this.createdBy = createdBy;`\n\
  `    }`\n\n`    @Column(name=\"CREATED_DATE\")`\n`    @Type(type=\"org.joda.time.contrib.hibernate.PersistentDateTime\"\
  )`\n`    public DateTime getCreatedDate() {`\n`        return createdDate;`\n`    }`\n\
  \n`    public void setCreatedDate(DateTime createdDate) {`\n`        this.createdDate\
  \ = createdDate;`\n`    }`\n\n`    @Column(name=\"LAST_MODIFIED_BY\")`\n`    public\
  \ String getLastModifiedBy() {`\n`        return lastModifiedBy;`\n`    }`\n\n`    public\
  \ void setLastModifiedBy(String lastModifiedBy) {`\n`        this.lastModifiedBy\
  \ = lastModifiedBy;`\n`    }`\n\n\n\n`    @Column(name=\"LAST_MODIFIED_DATE\")`\n\
  `    @Type(type=\"org.joda.time.contrib.hibernate.PersistentDateTime\")`\n`    public\
  \ DateTime getLastModifiedDate() {`\n`        return lastModifiedDate;`\n`    }`\n\
  \n`    public void setLastModifiedDate(DateTime lastModifiedDate) {`\n`        this.lastModifiedDate\
  \ = lastModifiedDate;`\n`    }`\n\n`    @Transient`\n`    public boolean isNew()\
  \ {`\n`        if (id == null) {`\n`            return true;`\n`        } else {`\n\
  `            return false;`\n`        }`\n`    }`\n\n`    public String toString()\
  \ {`\n`        return \"Contact - Id: \" + id + \", First name: \" + firstName`\n\
  `                     + \", Last name: \" + lastName + \", Birthday: \" + birthDate`\n\
  `            + \", Create by: \" + createdBy + \", Create date: \" + createdDate`\n\
  `            + \", Modified by: \" + lastModifiedBy + \", Modified date: \"`\n`            +\
  \ lastModifiedDate;`\n`    }`\n`}`\n\n在清单 10-38 中，`ContactAudit`实体类实现了`Auditable`接口，并通过映射四个审计列来实现其方法。`@Column`注解用于映射到表中的实际列。对于两个日期属性（`createdDate`、`lastModifiedDate`），应用了\
  \ Hibernate 自定义用户类型注解`@Type`，并将实现类设置为`org.joda.time.contrib.hibernate.PersistentDateTime`。正如\
  \ Spring Data JPA 的`Auditable`接口使用 Joda-time 库的`DateTime`类型一样，`joda-time-hibernate`库提供了这个自定义用户类型，以便在将属性持久化到数据库的`TIMESTAMP`列时与\
  \ Hibernate 一起使用。`Auditable`接口（继承自`org.springframework.data.domain.Persistable<ID\
  \ extends Serializable>`接口）的`isNew()`方法也已实现。注解`@Transient`表示该字段不需要持久化。Spring Data\
  \ JPA 使用此函数来识别它是否是一个新实体，以便确定是否需要设置`createdBy`和`createdDate`属性。在实现中，我们只需检查 ID，如果值为\
  \ null，则返回`true`，表示它是一个新的实体实例。\n\n清单 10-39 展示了`ContactAuditService`接口，我们只定义了几个方法来演示审计功能。\n\
  \n***清单 10-39.** `ContactAuditService`接口*\n\n`package com.apress.prospring3.ch10.service;`\n\
  \n`import java.util.List;`\n\n`import com.apress.prospring3.ch10.domain.ContactAudit;`\n\
  \n`public interface ContactAuditService {`\n\n`       public List<ContactAudit>\
  \ findAll();`\n\n`       public ContactAudit findById(Long id);`\n\n`       public\
  \ ContactAudit save(ContactAudit contact);`\n\n`}`\n\n下一步是创建`ContactAuditRepository`接口，如清单\
  \ 10-40 所示。\n\n***清单 10-40.** `ContactAuditRepository`接口*\n\n`package com.apress.prospring3.ch10.repository;`\n\
  \n`import org.springframework.data.repository.CrudRepository;`\n\n`import com.apress.prospring3.ch10.domain.ContactAudit;`\n\
  \n`public interface ContactAuditRepository extends`\n`     CrudRepository<ContactAudit,\
  \ Long> {`\n\n`}`\n\n`ContactAuditRepository`接口只是扩展了`CrudRepository`，后者已经实现了我们打算为`ContactAuditService`实现的所有方法。`findById()`方法由`CrudRepository.findOne()`方法实现。\n\
  \n清单 10-41 展示了服务实现类`ContactAuditServiceImpl`。\n\n***清单 10-41.** `ContactAuditServiceImpl`类*\n\
  \n`package com.apress.prospring3.ch10.service.springjpa;`\n\n`// 导入语句已省略`\n`@Service(\"\
  contactAuditService\")`\n`@Repository`\n`@Transactional`\n`public class ContactAuditServiceImpl\
  \ implements ContactAuditService {`\n\n`    @Autowired`\n`    private ContactAuditRepository\
  \ contactAuditRepository;`\n\n`    @Transactional(readOnly=true)`\n`    public List<ContactAudit>\
  \ findAll() {`\n`        return Lists.newArrayList(contactAuditRepository.findAll());`\n\
  `    }`\n\n`    public ContactAudit findById(Long id) {`\n`        return contactAuditRepository.findOne(id);`\n\
  `    }`\n\n`    public ContactAudit save(ContactAudit contact) {`\n`        return\
  \ contactAuditRepository.save(contact);`\n`    }`\n\n`}`\n\n现在你可能对代码很熟悉了。`ContactAuditRepository`接口被自动注入，并且`ContactAuditService`接口中的所有方法都已实现。\n\
  \n我们还需要添加一些配置。首先要添加的是声明`AuditingEntityListener<T>`，这是一个提供审计服务的 JPA 实体监听器。要声明该监听器，请在项目根目录下创建一个名为`/src/main/resources/META-INF/orm.xml`的文件（必须使用此文件名，这是\
  \ JPA 规范指定的），并声明监听器，如清单 10-42 所示。\n\n***清单 10-42.** 声明实体监听器*\n\n`<?xml version=\"\
  1.0\" encoding=\"UTF-8\" ?>`\n`<entity-mappings`\n\n`    xsi:schemaLocation=\"http://java.sun.com/xml/ns/persistence/orm`\n\
  `        http://java.sun.com/xml/ns/persistence/orm_2_0.xsd\"`\n`        version=\"\
  2.0\">`\n`    <description>JPA</description>`\n\n`    <persistence-unit-metadata>`\n\
  `        <persistence-unit-defaults>`\n`            <entity-listeners>`\n`                <entity-listener`\n\
  `class=\"org.springframework.data.jpa.domain.support.AuditingEntityListener\" />`\n\
  `        </entity-listeners>`\n`        </persistence-unit-defaults>`\n`    </persistence-unit-metadata>`\n\
  \n`</entity-mappings>`\n\n在持久化期间（即保存和更新事件），JPA 提供程序会拾取该监听器以处理审计字段。\n\n我们还需要在 Spring\
  \ 的配置中定义该监听器。清单 10-43 展示了代码片段（位于文件`spring-data-app-context.xml`中）。\n\n***清单 10-43.**\
  \ 在 Spring 中声明实体监听器*\n\n`    <!--  其他定义已省略  -->`\n`    <jpa:auditing auditor-aware-ref=\"\
  auditorAwareBean\"/>`\n\n`    <bean id=\"auditorAwareBean\" class=\"com.apress.prospring3.ch10.springjpa.auditor.AuditorAwareBean\"\
  />`\n\n标签`<jpa:auditing>`用于启用 Spring Data JPA 的审计功能，而 bean `auditorAwareBean`是提供用户信息的\
  \ bean。清单 10-44 展示了`AuditorAwareBean`类。\n\n***清单 10-44.** `AuditorAwareBean`类*\n\
  \n`package com.apress.prospring3.ch10.springjpa.auditor;`\n\n`import org.springframework.data.domain.AuditorAware;`\n\
  \n`public class AuditorAwareBean implements AuditorAware<String> {`\n\n`    public\
  \ String getCurrentAuditor() {`\n`        return \"prospring3\";`\n`    }`\n\n`}`\n\
  \n`AuditorAwareBean`实现了`AuditorAware<T>`接口，传入类型`String`。在实际情况下，这应该是一个用户信息的实例，例如一个`User`类，它代表执行数据更新操作的已登录用户。这里为了简单起见，我们使用`String`。在`AuditorAwareBean`类中，实现了`getCurrentAuditor()`方法，其值硬编码为`prospring3`。在实际情况下，应该从底层安全基础设施中获取用户。例如，在\
  \ Spring Security 中，可以从`SecurityContextHolder`类中检索用户信息。\n\n现在所有实现工作已完成。清单 10-45\
  \ 展示了测试程序。\n\n***清单 10-45.** 测试 Spring Data JPA 审计功能*\n\n`package com.apress.prospring3.ch10;`\n\
  \n`// 导入语句已省略`\n`public class SpringJpaAuditSample {`\n\n`    public static void\
