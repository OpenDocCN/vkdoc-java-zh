  \ int version;`\n`    private String firstName;`\n`    private String lastName;`\n\
  `    private Date birthDate;`\n\n`    @Id`\n`    @GeneratedValue(strategy = IDENTITY)`\n\
  `    @Column(name = \"ID\")`\n`    public Long getId() {`\n`        return this.id;`\n\
  `    }`\n\n`    public void setId(Long id) {`\n`        this.id = id;`\n`    }`\n\
  \n`    @Version`\n`    @Column(name = \"VERSION\")`\n`    public int getVersion()\
  \ {`\n`        return this.version;`\n`    }`\n\n`    public void setVersion(int\
  \ version) {`\n`        this.version = version;`\n`    }`\n\n`    @Column(name =\
  \ \"FIRST_NAME\")`\n`    public String getFirstName() {`\n`        return this.firstName;`\n\
  `    }`\n\n`    public void setFirstName(String firstName) {`\n`        this.firstName\
  \ = firstName;`\n`    }`\n\n`    @Column(name = \"LAST_NAME\")`\n`    public String\
  \ getLastName() {`\n`        return this.lastName;`\n`    }`\n\n`    public void\
  \ setLastName(String lastName) {`\n`        this.lastName = lastName;`\n`    }`\n\
  \n`    @Temporal(TemporalType.DATE)`\n`    @Column(name = \"BIRTH_DATE\")`\n`    public\
  \ Date getBirthDate() {`\n`        return this.birthDate;`\n`    }`\n\n`    public\
  \ void setBirthDate(Date birthDate) {`\n`        this.birthDate = birthDate;`\n\
  `    }`\n\n`    public String toString() {`\n`        return \"Contact - Id: \"\
  \ + id + \", First name: \" + firstName`\n`            + \", Last name: \" + lastName\
  \ + \", Birthday: \" + birthDate;`\n`    }`\n`}`\n\n首先，我们使用 `@Entity` 注解该类型，这意味着这是一个映射实体类。`@Table`\
  \ 注解定义了该实体映射到的数据库中的表名。对于每个映射的属性，我们使用 `@Column` 注解，并提供了列名。如果类型和属性名称与表和列名称完全相同，你可以省略表和列名称。\n\
  \n关于映射，我们想强调几点：\n\n\n\n*   对于出生日期属性，我们使用 `@Temporal` 进行注解，并指定了 `TemporalType DATE`。这意味着我们希望将\
  \ Java 日期类型（`java.util.Date`）映射到 SQL 数据类型（`java.sql.Date`）。因此，在我们的应用程序中，可以像往常一样使用\
  \ `java.util.Date` 来访问 `Contact` 对象中的 `birthDate` 属性。\n*   对于 `id` 属性，我们使用 `@Id`\
  \ 进行注解。这意味着它是对象的主键。Hibernate 在其会话中管理联系人实体实例时，会将其用作唯一标识符。另一方面，`@GeneratedValue` 注解告诉\
  \ Hibernate `id` 值是如何生成的。`IDENTITY`（由于 `import static` 语句，我们可以在注解中直接使用它）策略意味着 `id`\
  \ 是在插入操作期间由后端生成的（`CONTACT` 表的 `ID` 列是主键，并指定了 `AUTO_INCREMENT`，这意味着该值将在插入操作期间由数据库生成并分配）。\n\
  *   对于 `version` 属性，我们使用 `@Version` 进行注解。这指示 Hibernate 我们希望使用乐观锁定机制，并将 `version`\
  \ 属性作为控制手段。每次 Hibernate 更新一条记录时，它都会将实体实例的版本与数据库中记录的版本进行比较。如果两个版本相同，则意味着之前没有人更新过数据，Hibernate\
  \ 将更新数据并递增版本列。但是，如果版本不同，则意味着之前有人更新过该记录，Hibernate 将抛出一个 `StaleObjectStateException`\
  \ 异常，Spring 会将其转换为 `HibernateOptimisticLockingFailureException`。在示例中，我们使用整数进行版本控制。除了整数，Hibernate\
  \ 也支持使用时间戳。但是，建议使用整数进行版本控制，因为使用整数时，Hibernate 每次更新后都会将版本号递增 1。而使用时间戳时，Hibernate 每次更新后会更新最新的时间戳。时间戳的安全性稍差，因为两个并发事务可能会在同一毫秒内加载并更新同一个项目。\n\
  \n另一个被映射的对象是 `ContactTelDetail`，如清单 9-6 所示。\n\n***清单 9-6.** `ContactTelDetail` 类*\n\
  \n`package com.apress.prospring3.ch9.domain;`\n\n`// 导入语句已省略`\n`@Entity`\n`@Table(name\
  \ = \"contact_tel_detail\")`\n`public class ContactTelDetail implements Serializable\
  \ {`\n\n`    private Long id;`\n`    private int version;`\n`    private String\
  \ telType;`\n`    private String telNumber;`\n\n`    public ContactTelDetail() {`\n\
  `    }`\n\n`    public ContactTelDetail(String telType, String telNumber) {`\n`        this.telType\
  \ = telType;`\n`        this.telNumber = telNumber;`\n`    }`\n\n`    @Id`\n`    @GeneratedValue(strategy\
  \ = IDENTITY)`\n`    @Column(name = \"ID\")`\n`    public Long getId() {`\n`        return\
  \ this.id;`\n`    }`\n\n`    public void setId(Long id) {`\n`        this.id = id;`\n\
  `    }`\n\n`    @Version`\n`    @Column(name = \"VERSION\")`\n`    public int getVersion()\
  \ {`\n`        return this.version;`\n`    }`\n\n`    public void setVersion(int\
  \ version) {`\n`        this.version = version;`\n`    }`\n\n`    @Column(name =\
  \ \"TEL_TYPE\")`\n`    public String getTelType() {`\n`        return this.telType;`\n\
  `    }`\n\n`    public void setTelType(String telType) {`\n`        this.telType\
  \ = telType;`\n`    }`\n\n`    @Column(name = \"TEL_NUMBER\")`\n`    public String\
  \ getTelNumber() {`\n`        return this.telNumber;`\n`    }`\n\n`    public void\
  \ setTelNumber(String telNumber) {`\n`        this.telNumber = telNumber;`\n`    }`\n\
  \n`}`\n\n这个类没有什么新内容。清单 9-7 展示了 `Hobby` 类。\n\n***清单 9-7.** `Hobby` 类*\n\n`package\
  \ com.apress.prospring3.ch9.domain;`\n\n`// 导入语句已省略`\n`@Entity`\n`@Table(name =\
  \ \"hobby\")`\n`public class Hobby implements Serializable {`\n\n`    private String\
  \ hobbyId;`\n\n`    @Id`\n`    @Column(name = \"HOBBY_ID\")`\n`    public String\
  \ getHobbyId() {`\n`        return this.hobbyId;`\n`    }`\n\n`    public void setHobbyId(String\
  \ hobbyId) {`\n`        this.hobbyId = hobbyId;`\n`    }`\n\n`    public String\
  \ toString() {`\n`        return \"Hobby :\" + getHobbyId();`\n`    }`\n`}`\n\n\
  同样，这个映射也没有什么新内容。接下来，让我们看看如何对 `Contact` 和 `ContactTelDetail` 类之间的关联进行建模。\n\n\n\n\
  #### 一对多映射\n\nHibernate 能够对多种不同类型的关联进行建模。最常见的关联是一对多和多对多。每个 `Contact` 对象都会有零个或多个电话号码，因此这是一个一对多关联（在\
  \ ORM 术语中，一对多关联用于对数据结构中的零对多和一对多关系进行建模）。清单 9-8 展示了 `Contact` 类与 `ContactTelDetail`\
  \ 类进行映射的代码片段。\n\n***清单 9-8.** 一对多关联*\n\n`package com.apress.prospring3.ch9.domain;`\n\
  \n`// 导入语句已省略`\n`@Entity`\n`@Table(name = \"contact\")`\n`public class Contact implements\
  \ Serializable {`\n\n`    // 其他代码已省略`\n`    private Set<ContactTelDetail> contactTelDetails\
  \ =`\n`        new HashSet<ContactTelDetail>();`\n\n`    @OneToMany(mappedBy = \"\
  contact\", cascade=CascadeType.ALL,`\n`        orphanRemoval=true)`\n`    public\
  \ Set<ContactTelDetail> getContactTelDetails() {`\n`        return this.contactTelDetails;`\n\
  `    }`\n\n`    public void setContactTelDetails(Set<ContactTelDetail> contactTelDetails)\
  \ {`\n`     this.contactTelDetails = contactTelDetails;`\n`    }`\n\n`    public\
  \ void addContactTelDetail(ContactTelDetail contactTelDetail) {`\n`        contactTelDetail.setContact(this);`\n\
  `        getContactTelDetails().add(contactTelDetail);`\n`    }`\n\n`    public\
  \ void removeContactTelDetail(ContactTelDetail contactTelDetail) {`\n`        getContactTelDetails().remove(contactTelDetail);`\n\
  `    }`\n\n`}`\n\n如清单 9-8 所示，`contactTelDetails` 属性的 getter 方法使用了 `@OneToMany` 注解，这表明它与\
  \ `ContactTelDetail` 类存在一对多关系。该注解传递了几个属性。`mappedBy` 属性指明了 `ContactTelDetail` 类中提供关联的属性（即通过\
  \ `CONTACT_TEL_DETAIL` 表中的外键定义进行关联）。`cascade` 属性意味着更新操作应级联到子对象。`orphanRemoval` 属性表示，在联系人电话号码详情更新后，集合中不再存在的条目应从数据库中删除。清单\
  \ 9-9 展示了 `ContactTelDetail` 类中用于关联映射的相应代码片段。\n\n***清单 9-9.** `ContactTelDetail`\
  \ 中的一对多映射*\n\n`package com.apress.prospring3.ch9.domain;`\n\n`// 导入语句已省略`\n`@Entity`\n\
  `@Table(name = \"contact_tel_detail\")`\n`public class ContactTelDetail implements\
  \ Serializable {`\n\n`    // 其他代码已省略`\n`    private Contact contact;`\n\n`    @ManyToOne`\n\
  `    @JoinColumn(name = \"CONTACT_ID\")`\n`    public Contact getContact() {`\n\
  `        return this.contact;`\n`    }`\n\n`    public void setContact(Contact contact)\
  \ {`\n`        this.contact = contact;`\n`    }`\n\n`    public String toString()\
  \ {`\n`    return \"联系人电话详情 - ID: \" + id + \", 联系人 ID: \"`\n`            + getContact().getId()\
  \ + \", 类型: \"`\n`            + telType + \", 号码: \" + telNumber;`\n`    }`\n`}`\n\
  \n从上述清单中，我们对 `contact` 属性的 getter 方法使用了 `@ManyToOne` 注解，这表明它是来自 `Contact` 的关联的另一端。我们还指定了\
  \ `@JoinColumn` 注解来定义底层的外键列名。最后，重写了 `toString()` 方法以便于后续测试示例代码。\n\n#### 多对多映射\n\n\
  接下来，我们来看 `Contact` 类和 `Hobby` 类之间的多对多映射。每个联系人都有零个或多个爱好，每个爱好也会与零个或多个联系人关联。因此，这是一个多对多映射。多对多映射需要一个连接表，即图\
  \ 9-4 中的 `CONTACT_HOBBY_DETAIL` 表。清单 9-10 展示了 `Contact` 类中对该关系进行建模的代码片段。\n\n***清单\
  \ 9-10.** 多对多关联*\n\n`package com.apress.prospring3.ch9.domain;`\n\n`// 导入语句已省略`\n\
  `@Entity`\n`@Table(name = \"contact\")`\n`public class Contact implements Serializable\
  \ {`\n\n`    // 其余代码已省略`\n`    private Set<Hobby> hobbies = new HashSet<Hobby>();`\n\
  `    @ManyToMany`\n`    @JoinTable(name = \"contact_hobby_detail\",`\n`        joinColumns\
  \ = @JoinColumn(name = \"CONTACT_ID\"),`\n`        inverseJoinColumns = @JoinColumn(name\
  \ = \"HOBBY_ID\"))`\n`    public Set<Hobby> getHobbies() {`\n`        return this.hobbies;`\n\
  `    }`\n\n`    public void setHobbies(Set<Hobby> hobbies) {`\n`        this.hobbies\
  \ = hobbies;`\n`    }`\n`}`\n\n如清单 9-10 所示，`Contact` 类中 hobbies 属性的 getter 方法使用了\
  \ `@ManyToMany` 注解。我们还提供了 `@JoinTable` 注解来指明 Hibernate 应查找的底层连接表。`name` 是连接表的名称，`joinColumns`\
  \ 定义了作为 `CONTACT` 表外键的列，`inverseJoinColumns` 定义了作为关联另一端（即 `HOBBY` 表）外键的列。清单 9-11\
  \ 展示了 `Hobby` 类中相应的代码片段。\n\n***清单 9-11.** `Hobby` 类中的多对多映射*\n\n`package com.apress.prospring3.ch9.domain;`\n\
  \n`// 导入语句已省略`\n\n`@Entity`\n`@Table(name = \"hobby\")`\n`public class Hobby implements\
  \ Serializable {`\n\n`    // 其他代码已省略`\n\n`    private Set<Contact> contacts = new\
  \ HashSet<Contact>();`\n\n`    @ManyToMany`\n`    @JoinTable(name = \"contact_hobby_detail\"\
  ,`\n`        joinColumns = @JoinColumn(name = \"HOBBY_ID\"),`\n`        inverseJoinColumns\
  \ = @JoinColumn(name = \"CONTACT_ID\"))`\n`    public Set<Contact> getContacts()\
  \ {`\n`        return this.contacts;`\n`    }`\n\n`    public void setContacts(Set<Contact>\
  \ contacts) {`\n`        this.contacts = contacts;`\n`    }`\n`}`\n\n该映射与清单 9-10\
  \ 大致相同，但 `joinColumns` 和 `inverseJoinColumns` 属性进行了互换以反映关联关系。\n\n### Hibernate Session\
  \ 接口\n\n在 Hibernate 中，与数据库交互时，你需要处理的主要接口是 `Session` 接口，该接口从 `SessionFactory` 获取。\n\
  \n清单 9-12 展示了 `ContactDaoImpl` 类，其中包含了本章的示例。配置好的 Hibernate `SessionFactory` 被注入到了该类中。\n\
  \n***清单 9-12.** 注入 Hibernate `SessionFactory`*\n\n`package com.apress.prospring3.ch9.dao.hibernate;`\n\
  \n`// 导入语句已省略`\n`@Repository(\"contactDao\")`\n`@Transactional`\n`public class ContactDaoImpl\
  \ implements ContactDao {`\n\n`    // 其他代码已省略`\n`    private Log log = LogFactory.getLog(ContactDaoImpl.class);`\n\
  \n`    private SessionFactory sessionFactory;`\n\n`    public SessionFactory getSessionFactory()\
  \ {`\n`        return sessionFactory;`\n`    }`\n\n`    @Resource(name=\"sessionFactory\"\
  )`\n`    public void setSessionFactory(SessionFactory sessionFactory) {`\n`        this.sessionFactory\
  \ = sessionFactory;`\n`    }`\n`}`\n\n像往常一样，我们使用 `@Repository` 注解将 DAO 类声明为包含数据访问逻辑的\
  \ Spring Bean。`@Transactional` 注解定义了事务需求，我们将在第 13 章中讨论。`sessionFactory` 属性通过使用 `@Resource`\
  \ 注解被设置为注入目标。\n\n\n\n### 使用 Hibernate 进行数据库操作\n\n在本节中，我们将讨论如何在 Hibernate 中执行数据库操作。清单\
  \ 9-13 展示了 `ContactDao` 接口，该接口指明了我们将要提供的联系人数据访问服务。\n\n***清单 9-13.** `ContactDao`\
  \ 接口*\n\n`package com.apress.prospring3.ch9.dao;`\n\n`import java.util.List;`\n\n\
  `import com.apress.prospring3.ch9.domain.Contact;`\n\n`public interface ContactDao\
  \ {`\n\n`    // 查找所有联系人`\n`    public List<Contact> findAll();`\n\n`    // 查找所有联系人及其电话和爱好`\n\
  `    public List<Contact> findAllWithDetail();`\n\n`    // 根据 ID 查找联系人及其详细信息`\n\
  `    public Contact findById(Long id);`\n\n`    // 插入或更新联系人`\n`    public Contact\
  \ save(Contact contact);`\n\n`    // 删除联系人`\n`    public void delete(Contact contact);`\n\
  `}`\n\n该接口非常简单；它只有三个查找方法、一个保存方法和一个删除方法。`save()` 方法将同时执行插入和更新操作。\n\n对于实现类 `com.apress.prospring3.ch9.dao.hibernate.ContactDaoImpl`，我们首先创建一个类，其中包含\
  \ `ContactDao` 接口中所有方法的空实现。在 STS 中，这非常容易做到。有关详细信息，请参阅第 8 章中的“使用注解设置 JDBC DAO”一节。\n\
  \n#### 使用 Hibernate 查询语言查询数据\n\nHibernate 以及 JDO 和 JPA 等其他 ORM 工具都是围绕对象模型设计的。因此，在定义映射之后，我们无需构建\
  \ SQL 来与数据库交互。相反，对于 Hibernate，我们使用 Hibernate 查询语言（HQL）来定义查询。在与数据库交互时，Hibernate 会代表我们将查询转换为\
  \ SQL 语句。\n\n在编写 HQL 查询时，其语法与 SQL 非常相似。但是，你需要从对象的角度而非数据的角度来思考。在接下来的几节中，我们将通过几个示例进行讲解。\n\
  \n##### 使用懒加载的简单查询\n\n我们从 `findAll()` 方法开始，该方法简单地检索数据库中的所有联系人。清单 9-14 展示了代码片段。\n\
  \n***清单 9-14.** 实现 `findAll` 方法*\n\n`package com.apress.prospring3.ch9.dao.hibernate;`\n\
  \n`// 导入语句已省略`\n`@Repository(\"contactDao\")`\n`@Transactional`\n`public class ContactDaoImpl\
  \ implements ContactDao {`\n\n`    // 其他代码已省略`\n`    @Transactional(readOnly=true)`\n\
  `    public List<Contact> findAll() {`\n`        return sessionFactory.getCurrentSession().`\n\
  `        createQuery(\"from Contact c\").list();`\n`    }`\n`}`\n\n如清单 9-14 所示，`SessionFactory.getCurrentSession()`\
  \ 方法获取了 Hibernate 的 `Session` 接口。然后，调用 `Session.createQuery()` 方法，并传入 HQL 语句。语句\
  \ `from Contact c` 简单地检索数据库中的所有联系人。该语句的另一种语法是 `select c from Contact c`。`@Transactional(readOnly=true)`\
  \ 表示我们希望将事务设置为只读。为查找方法设置该属性将带来更好的性能。\n\n清单 9-15 展示了一个用于测试 `ContactDaoImpl` 的简单程序。\n\
  \n***清单 9-15.** 测试 `ContactDaoImpl` 类*\n\n`package com.apress.prospring3.ch9;`\n\
  \n`import java.util.List;`\n\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  \n`import com.apress.prospring3.ch9.dao.ContactDao;`\n`import com.apress.prospring3.ch9.domain.Contact;`\n\
  \n`public class SpringHibernateSample {`\n\n`    public static void main(String[]\
  \ args) {`\n\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:app-context.xml\");`\n`        ctx.refresh();`\n\n\
  `        ContactDao contactDao = ctx.getBean(\"contactDao\", ContactDao.class);`\n\
  `        List<Contact> contacts = contactDao.findAll();`\n`        listContacts(contacts);`\n\
  \n`    }`\n\n`    private static void listContacts(List<Contact> contacts) {`\n\
  `        System.out.println(\"\");`\n`        System.out.println(\"Listing contacts\
  \ without details:\");`\n`        for (Contact contact: contacts) {`\n`            System.out.println(contact);`\n\
  `            System.out.println();`\n`        }`\n`    }`\n`}`\n\n运行上述类将产生以下输出：\n\
  \n`Listing contacts without details:`\n`Contact - Id: 1, First name: Clarence, Last\
  \ name: Ho, Birthday: 1980-07-30`\n\n`Contact - Id: 2, First name: Scott, Last name:\
  \ Tiger, Birthday: 1990-11-02`\n\n`Contact - Id: 3, First name: John, Last name:\
  \ Smith, Birthday: 1964-02-28`\n\n联系人记录已被检索出来。但是，电话和爱好等详细信息呢？让我们在测试类中创建一个新方法来转储详细信息。清单\
  \ 9-16 展示了代码片段。\n\n***清单 9-16.** 测试 `ContactDaoImpl` 类*\n\n`// 其他代码已省略`\n`public\
  \ class SpringHibernateSample {`\n\n`    public static void main(String[] args)\
  \ {`\n\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:app-context.xml\");`\n`        ctx.refresh();`\n\n\
  `        ContactDao contactDao = ctx.getBean(\"contactDao\", ContactDao.class);`\n\
  `        List<Contact> contacts = contactDao.findAll();`\n`        listContactsWithDetail\
  \ (contacts);`\n\n`    }`\n\n`    private static void listContactsWithDetail(List<Contact>\
  \ contacts) {`\n`        System.out.println(\"\");`\n`        System.out.println(\"\
  Listing contacts with details:\");`\n`        for (Contact contact: contacts) {`\n\
  `            System.out.println(contact);`\n`            if (contact.getContactTelDetails()\
  \ != null) {`\n`                for (ContactTelDetail contactTelDetail:`\n`                        \
  \ contact.getContactTelDetails()) {`\n`                    System.out.println(contactTelDetail);`\n\
  `                }`\n`            }`\n`            if (contact.getHobbies() != null)\
  \ {`\n`                for (Hobby hobby: contact.getHobbies()) {`\n`                    System.out.println(hobby);`\n\
  `                }`\n`            }`\n`            System.out.println();`\n`        }`\n\
  `    }`\n`}`\n\n如果你再次运行该程序，将会看到以下异常：\n\n`Listing contacts with details:`\n`Contact\
  \ - Id: 1, First name: Clarence, Last name: Ho, Birthday: 1980-07-30`\n`Exception\
  \ in thread \"main\" org.hibernate.LazyInitializationException:`\n`…`\n\n当你尝试访问关联时，会看到\
  \ Hibernate 抛出 `LazyInitializationException`。这是因为默认情况下，Hibernate 会“懒加载”关联，这意味着 Hibernate\
  \ 不会为了获取记录而连接关联表（例如 `CONTACT_TEL_DETAIL`）。这样做的原因是出于性能考虑，因为可以想象，如果一个查询检索了数千条记录，并且所有关联都被检索出来，那么将会产生大量的数据传输。\n\
  \n\n\n##### 带关联抓取的查询\n\n要让 Hibernate 从关联中抓取数据，有两种选择。首先，你可以使用 `EAGER` 抓取模式来定义关联。以下是一个注解示例：\n\
  \n`@ManyToMany(fetch=FetchType.EAGER)`\n\n这会告诉 Hibernate 在每次查询中都抓取关联的记录。然而，如前所述，这会影响数据检索性能。\n\
  \n另一种选择是，在需要时强制 Hibernate 在查询中抓取关联记录。如果你使用 `Criteria` 查询，可以调用 `Criteria.setFetchMode()`\
  \ 函数来指示 Hibernate 急切地抓取关联。当使用 `NamedQuery` 时，你可以使用 `fetch` 操作符来指示 Hibernate 急切地抓取关联。\n\
  \n让我们来看一下 `findAllWithDetail()` 方法的实现，该方法将检索所有联系人信息及其电话号码详情和爱好。我们将使用 `NamedQuery`\
  \ 方法。`NamedQuery` 可以外部化到 XML 文件中，也可以在实体类中使用注解声明。清单 9-17 展示了修改后的 `Contact` 领域对象，其中使用注解定义了命名查询。\n\
  \n***清单 9-17.** 使用 `NamedQuery`*\n\n`@Entity`\n`@Table(name = \"contact\")`\n`@NamedQueries({`\n\
  `@NamedQuery(name=\"Contact.findAllWithDetail\",`\n`query=\"select distinct c from\
  \ Contact c left join fetch c.contactTelDetails t left join fetch`\n`c.hobbies h\"\
  )`\n`})`\n`public class Contact implements Serializable {`\n`    // 其他代码已省略`\n`}`\n\
  \n从清单 9-17 中，定义了一个名为 `Contact.findAllWithDetail` 的 `NamedQuery`。然后我们用 HQL 定义了查询。请注意\
  \ `left join fetch` 子句，它指示 Hibernate 急切地抓取关联。你还需要使用 `select distinct`；否则，Hibernate\
  \ 会返回重复的对象（例如，如果一个联系人有两条电话号码详情，则会返回两个联系人对象）。\n\n清单 9-18 展示了 `findAllWithDetail()`\
  \ 方法的实现。\n\n***清单 9-18.** 实现 `findAllWithDetail` 方法*\n\n`package com.apress.prospring3.ch9.dao.hibernate;`\n\
  \n`// 导入语句已省略`\n`@Repository(\"contactDao\")`\n`@Transactional`\n`public class ContactDaoImpl\
  \ implements ContactDao {`\n\n`    // 其他代码已省略`\n`    @Transactional(readOnly=true)`\n\
  `    public List<Contact> findAllWithDetail() {`\n`        return sessionFactory.getCurrentSession().`\n\
  `        getNamedQuery(\"Contact.findAllWithDetail\").list();`\n`    }`\n`}`\n\n\
  这次我们使用了 `Session.getNamedQuery()` 方法，并传入了 `NamedQuery` 的名称。修改测试程序以调用 `ContactDao.findAllWithDetail()`\
  \ 将产生以下输出：\n\n`Listing contacts with details:`\n`Contact - Id: 1, First name: Clarence,\
  \ Last name: Ho, Birthday: 1980-07-30`\n`Contact Tel Detail - Id: 2, Contact id:\
  \ 1, Type: Home, Number: 1234567890`\n`Contact Tel Detail - Id: 1, Contact id: 1,\
  \ Type: Mobile, Number: 1234567890`\n`Hobby :Swimming`\n`Hobby :Movies`\n\n`Contact\
  \ - Id: 2, First name: Scott, Last name: Tiger, Birthday: 1990-11-02`\n`Contact\
  \ Tel Detail - Id: 3, Contact id: 2, Type: Home, Number: 1234567890`\n`Hobby :Swimming`\n\
  \n`Contact - Id: 3, First name: John, Last name: Smith, Birthday: 1964-02-28`\n\n\
  现在所有带详情的联系人都被正确检索出来了。\n\n让我们再看一个带参数的 `NamedQuery` 示例。这次，我们将实现 `findById()` 方法，并且也希望抓取关联。清单\
  \ 9-19 展示了添加了新命名查询的 `Contact` 类。\n\n***清单 9-19.** 使用带参数的 `NamedQuery`*\n\n`@Entity`\n\
  `@Table(name = \"contact\")`\n`@NamedQueries({`\n`@NamedQuery(name=\"Contact.findById\"\
  ,`\n`query=\"select distinct c from Contact c left join fetch c.contactTelDetails\
  \ t`\n`left join fetch c.hobbies h where c.id = :id\"),`\n`@NamedQuery(name=\"Contact.findAllWithDetail\"\
  ,`\n`query=\"select distinct c from Contact c left join fetch c.contactTelDetails\
  \ t left join fetch`\n`c.hobbies h\")`\n`})`\n`public class Contact implements Serializable\
  \ {`\n`    // 其他代码已省略`\n`}`\n\n从名为 `Contact.findById` 的命名查询中，我们声明了一个命名参数 `:id`。清单\
  \ 9-20 展示了 `ContactDaoImpl` 中 `findById()` 的实现。\n\n***清单 9-20.** 实现 `findById` 方法*\n\
  \n`package com.apress.prospring3.ch9.dao.hibernate;`\n\n`// 导入语句已省略`\n`@Repository(\"\
  contactDao\")`\n`@Transactional`\n`public class ContactDaoImpl implements ContactDao\
  \ {`\n\n`    // 其他代码已省略`\n`    @Transactional(readOnly=true)`\n`    public Contact\
  \ findById(Long id) {`\n`        return (Contact) sessionFactory.getCurrentSession().`\n\
  `            getNamedQuery(\"Contact.findById\").`\n`            setParameter(\"\
  id\", id).uniqueResult();`\n`    }`\n`}`\n\n从清单 9-20 中，我们使用了相同的 `Session.getNameQuery()`\
  \ 方法。但随后我们还调用了 `setParameter()` 方法，传入了命名参数及其值。对于多个参数，你可以使用 `Query` 接口的 `setParameterList()`\
  \ 或 `setParameters()` 方法。\n\n还有一些更高级的查询方法，比如原生查询和条件查询，我们将在下一章讨论 JPA 时介绍。\n\n为了测试该方法，将清单\
  \ 9-21 中的代码片段添加到 `SpringHibernateSample` 类中。\n\n***清单 9-21.** 测试 `findById` 方法*\n\
  \n`        Contact contact;`\n\n`        // 按 ID 查找联系人`\n`        contact = contactDao.findById(1l);`\n\
  `        System.out.println(\"\");`\n`        System.out.println(\"Contact with\
