  \n如清单 13-21 所示，AOP 事务通知已被移除。此外，使用 `org.springframework.transaction.support.TransactionTemplate`\
  \ 类定义了一个 `transactionTemplate` Bean，事务属性在 properties 部分中定义。让我们看一下 `countAll()` 方法的实现，如清单\
  \ 13-22 所示。\n\n***清单 13-22.** 编程式事务管理实现*\n\n`package com.apress.prospring3.ch13.service.programmatic;`\n\
  \n`// 导入语句已省略`\n`@Service(\"contactService\")`\n`@Repository`\n`public class ContactServiceImpl\
  \ implements ContactService {`\n\n`    @Autowired`\n`    private TransactionTemplate\
  \ transactionTemplate;`\n\n`    @PersistenceContext`\n`    private EntityManager\
  \ em;`\n`    // 其他方法未实现`\n\n`    public long countAll() {`\n`        return transactionTemplate.execute(new\
  \ TransactionCallback<Long>() {`\n`            public Long doInTransaction(TransactionStatus\
  \ transactionStatus) {`\n`                return em.createNamedQuery(\"Contact.countAll\"\
  ,`\n`                    Long.class).getSingleResult();`\n`            }`\n\n`        });`\n\
  `    }`\n`}`\n\n在清单 13-22 中，`TransactionTemplate` 类是从 Spring 注入的。然后在 `countAll()`\
  \ 方法中，调用了 `TransactionTemplate.execute()` 方法，并传入了一个实现 `TransactionCallback<T>` 接口的内部类声明。接着重写了\
  \ `doInTransaction()` 方法，并加入了所需的逻辑。该逻辑将按照 `transactionTemplate` Bean 定义的属性运行。清单\
  \ 13-23 展示了测试程序。\n\n***清单 13-23.** 测试编程式事务*\n\n`package com.apress.prospring3.ch13;`\n\
  \n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\n\
  `import com.apress.prospring3.ch13.service.ContactService;`\n\n`public class TxProgrammaticSample\
  \ {`\n\n`    public static void main(String[] args) {`\n\n`        GenericXmlApplicationContext\
  \ ctx = new GenericXmlApplicationContext();`\n`        ctx.load(\"classpath:tx-programmatic-app-context.xml\"\
  );`\n`        ctx.refresh();`\n\n`        ContactService contactService = ctx.getBean(\"\
  contactService\",`\n`            ContactService.class);`\n\n`        System.out.println(\"\
  联系人数量: \" + contactService.countAll());`\n\n`    }`\n`}  `\n\n我们将运行程序并观察结果的任务留给你。尝试调整事务属性，看看在\
  \ `countAll()` 方法的事务处理中会发生什么。\n\n#### 事务管理考量\n\n那么，在讨论了实现事务管理的各种方式之后，你应该使用哪一种呢？在所有情况下都推荐使用声明式方法，并且应尽可能避免在代码中实现事务管理。大多数时候，当你发现有必要在应用程序中编写事务控制逻辑时，这通常是由于设计不佳造成的，在这种情况下，你应该考虑将逻辑重构为可管理的部分，并在这些部分上以声明方式定义事务需求。\n\
  \n对于声明式方法，使用 XML 和使用注解各有优缺点。一些开发者不喜欢在代码中声明事务需求，而另一些开发者则喜欢使用注解以便于维护，因为你可以在代码中看到所有的事务需求声明。同样，让应用程序需求驱动你的决策，一旦你的团队或公司标准化了某种方法，就应保持配置风格的一致性。\n\
  \n\n\n### 使用 Spring 实现全局事务\n\n许多企业级 Java 应用程序需要访问多个后端资源。例如，从外部业务合作伙伴处接收到的客户信息，可能需要更新多个系统（如\
  \ CRM、ERP 等）的数据库。有些甚至需要生成一条消息，并通过 JMS 将其发送到 MQ 服务器，供公司内部所有对客户信息感兴趣的其他应用程序使用。跨越多个后端资源的事务被称为*全局*（或分布式）事务。\n\
  \n全局事务的一个主要特性是保证原子性，这意味着要么所有涉及到的资源都被更新，要么一个都不更新。这包括应由事务管理器处理的复杂协调和同步逻辑。在 Java 世界中，JTA\
  \ 是实现全局事务的事实标准。\n\nSpring 对 JTA 事务的支持与本地事务一样出色，并将该逻辑对业务代码隐藏。在本节中，我们将演示如何通过 Spring\
  \ 使用 JTA 来实现全局事务。\n\n#### 实现 JTA 示例的基础设施\n\n我们使用与本章前面示例相同的表。但是，嵌入式 H2 数据库并不完全支持\
  \ XA（至少在撰写本文时如此），因此在本示例中，我们将使用 MySQL 作为后端数据库。\n\n我们还希望展示如何在独立应用程序或 Web 容器环境中使用 JTA\
  \ 实现全局事务。因此，在本示例中，我们将使用 Atomikos（[`www.atomikos.com/Main/TransactionsEssentials`](http://www.atomikos.com/Main/TransactionsEssentials)），这是一个广泛使用的开源\
  \ JTA 事务管理器，适用于非 JEE 环境。\n\n为了展示全局事务的工作原理，我们至少需要两个不同的后端资源。为简单起见，我们将使用一个 MySQL 数据库，但使用两个\
  \ JPA 实体管理器来模拟该用例。效果是相同的，因为您有多个 JPA 持久化单元对应不同的后端数据库。我们在开发此示例时使用的版本是 MySQL 5.1.58\
  \ Community Server 版。\n\n在 MySQL 数据库中，我们将创建两个模式，如表 13-5 所示。\n\n![images](img/t1305.jpg)\n\
  \n我使用 phpMyAdmin（[`www.phpmyadmin.net`](http://www.phpmyadmin.net)）来设置模式和脚本。但是，您可以使用任何您熟悉的工具来设置模式和用户。\n\
  \n然后，我们需要将 MySQL 和 Atomikos 所需的依赖项添加到项目中。表 13-6 显示了所需的依赖项。\n\n![images](img/t1306.jpg)\n\
  \n设置完成后，我们可以继续进行 Spring 配置和实现。\n\n#### 使用 JTA 实现全局事务\n\n首先，让我们看一下 Spring 的配置。清单\
  \ 13-24 显示了文件内容（`tx-jta-app-context.xml`）。\n\n***清单 13-24.** 使用 JTA 的 Spring 配置*\n\
