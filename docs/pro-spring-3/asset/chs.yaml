  \ 使用 curl 测试 RESTful Web 服务\n\n我们来快速测试一下已实现的 RESTful Web 服务。一种简单的方法是使用 `curl`（[`http://curl.haxx.se`](http://curl.haxx.se)），这是一个利用\
  \ URL 语法传输数据的命令行工具。要使用该工具，只需从网站下载并解压到你的电脑上即可。\n\n例如，要测试检索所有联系人，在 Windows 中打开命令提示符，或在\
  \ Unix/Linux 中打开终端，然后执行清单 16-27 所示的命令。\n\n***清单 16-27.** 用于测试 RESTful Web 服务的 `curl`\
  \ 命令*\n\n`curl -v -H \"Accept: application/json\" http://localhost:8080/ch16/restful/contact/listdata`\n\
  \n清单 16-27 中的命令会向服务器的 RESTful Web 服务发送一个 HTTP 请求；在此例中，它将调用 `ContactController` 中的\
  \ `listData()` 方法来检索并返回所有联系人信息。此外，`–H` 选项声明了一个 HTTP 头部属性，表示客户端希望以 JSON 格式接收数据。执行该命令将产生如图\
  \ 16-13 所示的输出。\n\n![images](img/9781430241072_Fig16-13.jpg)\n\n***图 16-13.** 使用\
  \ `curl` 以 JSON 格式测试 RESTful Web 服务*\n\n在图 16-13 中，可以看到返回了初始填充的联系人信息的 JSON 格式数据。现在让我们看看\
  \ XML 格式；命令如清单 16-28 所示。\n\n***清单 16-28.** 用于测试 RESTful Web 服务的 `curl` 命令*\n\n`curl\
  \ -v -H \"Accept: application/xml\" http://localhost:8080/ch16/restful/contact/listdata`\n\
  \n如清单 16-28 所示，与清单 16-27 相比只有一个区别。`accept` 媒体类型从 JSON 改为了 XML。执行该命令将产生如图 16-14 所示的输出。\n\
  \n![images](img/9781430241072_Fig16-14.jpg)\n\n***图 16-14.** 使用 `curl` 以 XML 格式测试\
  \ RESTful Web 服务*\n\n如图 16-14 所示，XML 格式的数据被正确返回。这是因为在 RESTful 服务的 `WebApplicationContext`\
  \ 中定义了 `HttpMessageConverters`，而 Spring MVC 会根据客户端 HTTP 头部的 accept 媒体信息调用相应的消息转换器，并相应地写入\
  \ HTTP 响应。\n\n#### 使用 RestTemplate 访问 RESTful Web 服务\n\n对于基于 Spring 的应用程序，`RestTemplate`\
  \ 类专为访问 RESTful Web 服务而设计。在本节中，我们将讨论如何使用该类访问服务器上的联系人服务。\n\n首先，我们来看一下 Spring `RestTemplate`\
  \ 的基本 `ApplicationContext` 配置，如清单 16-29（`restful-client-app-context.xml`）所示。\n\n\
