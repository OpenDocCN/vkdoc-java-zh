  ` `        start-state=\"start\">`  `    <view-state id=\"start\" view=\"list.xhtml\"\
  >` `        <on-entry>` `            <evaluate expression=\"contactController.newContactListBean()\"\
  ` `                result=\"viewScope.contactListBean\"/>` `        </on-entry>`\
