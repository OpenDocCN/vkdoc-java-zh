  \ hobby_id) values (2, 'Swimming');`\n\n### 配置 Hibernate SessionFactory\n\n如前所述，Hibernate\
  \ 的核心概念基于 `Session` 接口，该接口从 `SessionFactory` 获取。Spring 提供了许多类来支持将 Hibernate 的会话工厂配置为具有所需属性的\
  \ Spring Bean。由于我们将使用注解风格，因此将使用 `AnnotationSessionFactoryBean` 类。代码清单 9-4 显示了相应的\
  \ XML 配置文件 (`app-context.xml`)。\n\n***代码清单 9-4.** Hibernate 的 `AnnotationSessionFactoryBean`\
  \ 的 Spring 配置*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"\
  `\n`      http://www.springframework.org/schema/jdbc`\n`      http://www.springframework.org/schema/jdbc/spring-jdbc-3.1.xsd`\n\
