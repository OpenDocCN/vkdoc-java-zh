  \ 反映了联系人应用程序的完整流程。相应的视图、控制器方法和支持 bean 将在后面开发。该流程是使用 Spring Web Flow 的 DSL 定义的。正如在\
  \ `webflow.xml` 配置中，流程注册表 bean 配置了基本路径 `/WEB-INF/flows`，并且此流程定义文件位于 `contacts` 文件夹下。此流程将自动在\
  \ Spring Web Flow 中注册，ID 为 `contacts`，可通过 URL `/ch18/app/contacts` 访问。\n\n在流程定义中，除了命名空间声明之外，还提供了一个\
  \ `start-state` 属性，其值为 `start`，表示此流程启动时的状态。在我们的例子中，起始状态是 ID 为 `start` 的状态。起始状态指定了\
  \ `list.xhtml` 的视图属性，指示要为此状态渲染的文件。然后，在 `<view-state>` 标签内，在 `<on-entry>` 标签中（这意味着当流程进入此状态时），将执行名为\
  \ `contactController` 的 Spring bean 的 `newContactListBean()` 方法。这将检索联系人列表。结果联系人列表（存储在\
  \ `ContactListBean` 类中，稍后实现）作为视图作用域变量存储。`<transition>` 标签根据用户采取的操作定义了流程中可能的导航路径。对于联系人列表视图中的起始状态，当用户选择一个联系人并单击“查看选中项”按钮时，它将导航到显示联系人视图。当单击“添加联系人”按钮时，它将导航到添加联系人流程的第一步。\n\
  \n其他 `<view-state>` 标签根据设计的添加联系人流程进行定义。在每个状态内，用户可以选择继续或后退一步。`<global-transitions>`\
  \ 标签定义了一个全局转换规则。在这种情况下，指定了一个全局规则，以便每当用户单击“退出”按钮时，将触发退出转换，并且流程将始终导航回起始状态，即联系人列表视图。\n\
  \n对于 ID 为 `review` 和 `show` 的视图状态，请注意一个名为 `flowRequestContext` 的参数被传递到相应的方法中。`flowRequestContext`\
  \ 参数是 Spring Web Flow 中的一个隐式 EL 变量，它允许访问 `RequestContext` API，这是当前流程请求的表示。\n\n`<end-state>`\
  \ 标签表示流程的结束。默认情况下，当流程结束时，将创建一个新流程，并且 Spring Web Flow 将导航到该流程的起始状态。如果结束状态发生在子流程中，它将返回到父流程。\n\
  \nSpring Web Flow 支持许多其他功能，例如许多其他状态（例如，decision-state、action-state 等）以及子流程的定义，并在流程之间传递输入/输出参数。有关完整描述，请参考\
  \ Spring Web Flow 的在线文档 ([`http://static.springsource.org/spring-webflow/docs/2.3.x/reference/html/index.html`](http://static.springsource.org/spring-webflow/docs/2.3.x/reference/html/index.html))。\n\
  \n在 STS 中，也可以以图形格式查看流程。首先确保项目已激活 Spring Project 性质，并且 `flow.xml` 文件已作为流程定义添加到项目中。然后，您可以右键单击\
  \ `flow.xml` 文件，选择 Open With，然后选择 Spring Web Flow XML Editor，如图 18-9 所示。\n\n![images](img/9781430241072_Fig18-09.jpg)\n\
  \n***图 18-9.** 使用 Spring Web Flow XML 编辑器打开流程定义*\n\n然后，单击 flow-graph 选项卡，流程定义将以图形格式呈现在编辑器区域中，为您提供更友好的流程定义视图，如图\
  \ 18-10 所示。\n\n![images](img/9781430241072_Fig18-10.jpg)\n\n***图 18-10.** STS 中的流程图形视图*\n\
  \n#### 实现模板页面\n\n在实现每个单独的视图之前，我们需要实现模板页面，该页面将用于本章示例中的所有视图。清单 18-6 显示了模板页面（`/WEB-INF/layouts/standard.xhtml`）。\n\
