  emfB\" parent=\"emfBase\">`\n`        <property name=\"dataSource\" ref=\"dataSourceB\"\
  \ />`\n`    </bean>`\n\n`    <context:component-scan`\n`        base-package=\"\
  com.apress.prospring3.ch13.service.jta\" />`\n\n`</beans>`\n\n配置虽然很长，但并不复杂。首先，定义了两个数据源\
  \ Bean，分别指向两个不同的数据库资源。这两个 Bean 的名称是 `dataSourceA` 和 `dataSourceB`，它们分别连接到 `prospring3_ch13a`\
  \ 和 `prospring3_ch13b` 这两个模式。两个数据源 Bean 都使用了 `com.atomikos.jdbc.AtomikosDataSourceBean`\
  \ 类，该类支持符合 XA 规范的数据源。在两个 Bean 的定义中，还指定了 MySQL 的 XA 数据源实现类（`com.mysql.jdbc.jdbc2.optional.MysqlXADataSource`），这是\
  \ MySQL 的资源管理器。接着，提供了数据库连接信息。请注意，`poolSize` 属性定义了 Atomikos 需要维护的连接池中的连接数量。该属性并非强制要求，但如果不提供，Atomikos\
  \ 将使用默认值 1。\n\n对于 Atomikos 部分，定义了两个 Bean：`atomikosTransactionManager` 和 `atomikosUserTransaction`。它们的实现类由\
  \ Atomikos 提供，分别实现了标准 JEE 的 `TransactionManager` 和 `UserTransaction` 接口。这些 Bean\
  \ 提供了 JTA 所需的事务协调和同步服务，并通过 XA 协议与资源管理器通信以支持两阶段提交（2PC）。然后，定义了 Spring 的 `transactionManager`\
  \ Bean（实现类为 `JtaTransactionManager`），并将 Atomikos 提供的两个事务 Bean 注入其中。这指示 Spring 使用\
  \ Atomikos JTA 进行事务管理。\n\n接着，定义了三个 `EntityManagerFactory` Bean，名称分别为 `emfBase`、`emfA`\
  \ 和 `emfB`。`emfBase` Bean 是一个抽象的父 Bean，封装了通用的 JPA 属性。`emfBase` Bean 使用 Spring 的\
  \ `LocalContainerEntityManagerFactoryBean` 类实现。`emfA` 和 `emfB` Bean 都继承了父 Bean `emfBase`\
  \ 的配置，两者唯一的区别在于注入了各自对应的数据源（即 `dataSourceA` 注入到 `emfA`，`dataSourceB` 注入到 `emfB`）。因此，`emfA`\
  \ 将通过 `dataSourceA` Bean 连接到 MySQL 的 `prospring3_ch13a` 模式，而 `emfB` 将通过 `dataSourceB`\
  \ Bean 连接到 `prospring3_ch13b` 模式。请注意 `emfBase` Bean 中的 `hibernate.transaction.factory_class`\
  \ 和 `hibernate.transaction.manager_lookup_class` 属性。这两个属性非常重要，因为 Hibernate 使用它们来查找底层的\
  \ `UserTransaction` 和 `TransactionManager` 接口，以便将其管理的持久化上下文纳入全局事务。这些类由 Atomikos\
  \ 的 `transactions-hibernate3` 模块提供。\n\n清单 13-25 展示了用于 JTA 的 `ContactServiceImpl`\
  \ 类。请注意，为简单起见，仅实现了 `save()` 方法。\n\n***清单 13-25.** JTA `ContactService` 实现类*\n\n\
