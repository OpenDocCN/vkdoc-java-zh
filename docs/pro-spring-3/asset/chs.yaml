  \ - before) + \" ms\");`\n\n`        System.out.println(\">>>\\n\");`\n`    }`\n\
  `}`\n\n在这段代码中，你可以看到我们正在测试三种代理：标准 CGLIB 代理、具有冻结通知链的 CGLIB 代理（即，当通过调用 `ProxyFactory`\
  \ 间接扩展的 `ProxyConfig` 类中的 `setFrozen()` 方法冻结代理时，CGLIB 会执行进一步优化；但此后将不允许更改通知），以及 JDK\
  \ 代理。对于每种代理类型，我们运行以下五个测试用例：\n\n*   *被通知的方法（测试 1）*：一个被通知的方法。测试中使用的通知类型是一个不执行任何处理的前置通知，因此它减少了通知对性能测试的影响。\n\
  *   *未被通知的方法（测试 2）*：代理上未被通知的方法。通常你的代理有许多未被通知的方法。此测试考察了不同代理上未被通知方法的性能表现。\n*   *`equals()`\
  \ 方法（测试 3）*：此测试考察调用 `equals()` 方法的开销。当你在 `HashMap` 或类似集合中将代理用作键时，这一点尤其重要。\n*   *`hashCode()`\
  \ 方法（测试 4）*：与 `equals()` 方法类似，当你使用 `HashMap` 或类似集合时，`hashCode()` 方法也很重要。\n*   *在\
  \ `Advised` 接口上执行方法（测试 5）*：正如我们之前提到的，代理默认实现了 `Advised` 接口，允许你在创建后修改代理并查询代理的相关信息。此测试考察了使用不同代理类型访问\
  \ `Advised` 接口上方法的速度。\n\n我们在配备 8GB 内存的 Intel Core i7 2.8GHz 机器上运行了测试。运行测试时，我们将 JVM\
  \ 的初始堆大小设置为 2048MB，以减少堆大小调整对测试结果的影响。结果如表 6-5 所示。\n\n![images](img/t0605.jpg)\n\n\
  从该表的结果可以看出，对于被通知和未被通知的方法，标准 CGLIB 和 JDK 动态代理之间的性能没有太大差异。如果你读过本书的上一版，你会发现 JDK 代理在未被通知的方法上要慢得多。这是因为在本书的上一版中，测试是在\
  \ JDK 1.4 上运行的，当时反射的性能仍然非常差。而本次之前的测试是在 JDK 6 下运行的，其反射机制的性能已大幅提升。\n\n然而，当你使用具有冻结通知链的\
  \ CGLIB 代理时，会有一个明显的差异。`equals()` 和 `hashCode()` 方法也有类似的情况，使用 CGLIB 代理时它们明显更快。对于\
  \ `Advised` 接口上的方法，你会注意到它们在 CGLIB 代理上也更快。原因是 `Advised` 方法在 `intercept()` 方法中很早就被处理了，因此它们避免了其他方法所需的大部分逻辑。\n\
  \n#### 使用哪种代理？\n\n决定使用哪种代理通常是一个简单的决定。CGLIB 代理可以代理类和接口，而 JDK 代理只能代理接口。在性能方面，JDK 和\
  \ CGLIB 标准模式之间没有显著差异（至少在运行被通知和未被通知的方法时），除非你使用冻结模式的 CGLIB，在这种情况下通知链无法更改，并且 CGLIB\
  \ 在冻结模式下会执行进一步优化。当代理一个类时，CGLIB 代理是默认选择，因为它是唯一能够生成类代理的代理。当代理接口时，要使用 CGLIB 代理，你必须使用\
  \ `setOptimize()` 方法将 `ProxyFactory` 中的 `optimize` 标志设置为 true。\n\n![images](img/square.jpg)\
  \ **注意**  除了 CGLIB，还有另一个名为 Javassist 的字节码操作库，它被一些其他流行的项目（例如 Hibernate）所使用。一些开发者更喜欢\
  \ Javassist 而不是 CGLIB，并提出了一个 JIRA 问题（[`http://jira.springsource.org/browse/SPR-5654`](http://jira.springsource.org/browse/SPR-5654)），请求将\
  \ Spring AOP 代理从 CGLIB 迁移到 Javassist。Spring 开发团队正在 Spring 3.2 的时间线内考虑此事。社区也提供了一个中间解决方案。对于那些对在\
  \ Spring AOP 中使用 Javassist 细节感兴趣的人，请参阅 JIRA 问题以了解详情。\n\n\n\n### 本章小结\n\n在本章中，我们介绍了\
  \ AOP 的核心概念，然后探讨了这些概念如何转化为 Spring AOP 的实现。我们讨论了 Spring AOP 已实现和未实现的功能，并指出 AspectJ\
  \ 可作为那些 Spring 未实现功能的 AOP 解决方案。我们花了一些时间详细解释 Spring 中可用的通知类型，并展示了四种通知类型的实际示例。我们还探讨了如何通过切点来限制通知所应用的方法。特别地，我们介绍了\
  \ Spring 提供的六种基本切点实现。最后，我们详细介绍了 AOP 代理的构建方式、不同选项及其差异。我们通过比较三种不同代理类型的性能来结束关于代理的讨论，并强调了在\
  \ JDK 代理与 CGLIB 代理之间进行选择时的一些主要差异和限制。\n\n在第 7 章中，我们将通过详细研究 `ComposablePointcut` 和\
  \ `ControlFlowPointcut` 来完成对 Spring 中可用切点的讨论。我们将花一些时间探讨如何利用 Spring 的 AspectJ 集成来扩展应用程序可用的\
  \ AOP 功能集。我们还将了解 Spring 框架服务如何支持 AOP，这意味着你可以声明式地而非编程式地定义和配置通知。\n\n## 第 7 章\n\n##\
  \ 更多 Spring AOP 与注解\n\n在本章中，我们将更详细地探讨 Spring 中可用的 AOP 功能。特别是，我们将以更贴近实际应用的角度来审视这一主题：我们将探索\
  \ Spring 中支持透明应用 AOP 的框架服务，在示例应用程序的上下文中介绍 AOP 的实际用法，并讨论如何通过 Spring/AspectJ 集成来克服\
  \ Spring AOP 的局限性。更具体地说，本章涵盖以下内容：\n\n*   *切点的高级使用：* 本章通过研究 `ComposablePointcut`\
  \ 和 `ControlFlowPointcut` 来完成对切点的讨论。本节还总结了整个切点讨论，并探讨了在应用程序中使用切点时应该采用的适当技术。\n*  \
  \ *引入：* 上一章曾简要提及，引入允许你使用熟悉的拦截器概念，动态地为任何对象即时添加接口实现。\n*   *AOP 框架服务：* 我们在上一章中完全跳过了这个主题，只专注于手动组装\
  \ AOP 代理和通知链。然而，按照真正的 Spring 风格，该框架完全支持透明且声明式地配置 AOP。在本节中，我们将探讨三种方式（`ProxyFactoryBean`\
  \ 类、`aop` 命名空间和 @AspectJ 风格的注解）将声明式定义的 AOP 代理作为协作者注入到应用程序对象中，从而使你的应用程序完全不知道它在与带有通知的对象协作。\n\
  *   *集成 AspectJ：* AspectJ 是一个功能完备的 AOP 实现。AspectJ 与 Spring AOP 的主要区别在于，AspectJ 通过织入（编译时织入或加载时织入）将通知应用到目标对象，而正如上一章所讨论的，Spring\
  \ AOP 基于代理。AspectJ 的功能集远大于 Spring AOP，但使用起来也比 Spring 复杂得多。当你发现 Spring AOP 缺少你需要的功能时，AspectJ\
  \ 是一个很好的解决方案。从 2.0 版本开始，你可以在配置 AspectJ 切面时充分利用 Spring 的特性。\n\n要运行本章中的一些示例，你需要获取\
  \ AspectJ。你可以从 [`http://eclipse.org/aspectj`](http://eclipse.org/aspectj) 下载它。我们在本章的示例中使用了\
  \ AspectJ 1.6.11 版本。你还可以将 表 7-1 中的 Maven 依赖项添加到你的 STS 项目中。\n\n![images](img/t0701.jpg)\n\
  \n### 切点的高级使用\n\n在上一章中，我们介绍了 Spring 提供的六种基本 `Pointcut` 实现；在大多数情况下，我们发现这些实现能够满足我们应用程序的需求。然而，有时在定义切点时你需要更大的灵活性。Spring\
  \ 提供了另外两种 `Pointcut` 实现，`ComposablePointcut` 和 `ControlFlowPointcut`，它们恰好提供了你所需的灵活性。\n\
  \n\n\n#### 使用控制流切点\n\nSpring 的控制流切点由 `ControlFlowPointcut` 类实现，与许多其他 AOP 实现中的 `cflow`\
  \ 结构类似，但功能稍弱。本质上，Spring 中的控制流切点会切入给定方法或类中所有方法之下的所有方法调用。这很难直观理解，最好通过一个例子来说明。\n\n\
  清单 7-1 展示了一个 `SimpleBeforeAdvice`，它会输出一条描述其所通知方法的消息。\n\n***清单 7-1.** `SimpleBeforeAdvice`\
  \ 类*\n\n`package com.apress.prospring3.ch7.cflow;`\n\n`import java.lang.reflect.Method;`\n\
  \n`import org.springframework.aop.MethodBeforeAdvice;`\n\n`public class SimpleBeforeAdvice\
  \ implements MethodBeforeAdvice {`\n\n`    public void before(Method method, Object[]\
  \ args, Object target)`\n`            throws Throwable {`\n`        System.out.println(\"\
  Before method: \" + method);`\n`    }`\n`}`\n\n这个通知类让我们能够看到哪些方法被 `ControlFlowPointcut`\
  \ 切中了。在清单 7-2 中，你可以看到一个包含一个方法的简单类——即我们想要通知的方法。\n\n***清单 7-2.** `TestBean` 类*\n\n\
  `package com.apress.prospring3.ch7.cflow;`\n\n`public class TestBean {`\n\n`    public\
  \ void foo() {`\n`        System.out.println(\"foo()\");`\n`    }`\n`}`\n\n在清单 7-2\
  \ 中，你可以看到我们想要通知的简单 `foo()` 方法。然而，我们有一个特殊需求——我们只想在从另一个特定方法调用此方法时才对其进行通知。清单 7-3 展示了此示例的一个简单驱动程序。\n\
  \n***清单 7-3.** 使用 `ControlFlowPointcut` 类*\n\n`package com.apress.prospring3.ch7.cflow;`\n\
  \n`import org.springframework.aop.Advisor;`\n`import org.springframework.aop.Pointcut;`\n\
  `import org.springframework.aop.framework.ProxyFactory;`\n`import org.springframework.aop.support.ControlFlowPointcut;`\n\
  `import org.springframework.aop.support.DefaultPointcutAdvisor;`\n\n`public class\
  \ ControlFlowExample {`\n\n`    public static void main(String[] args) {`\n`        ControlFlowExample\
  \ ex = new ControlFlowExample();`\n`        ex.run();`\n`    }`\n\n`    public void\
  \ run() {`\n`         TestBean target = new TestBean();`\n\n`        // 创建通知器`\n\
  `        Pointcut pc = new ControlFlowPointcut(ControlFlowExample.class,`\n`            \"\
  test\");`\n`        Advisor advisor = new DefaultPointcutAdvisor(pc,`\n`            new\
  \ SimpleBeforeAdvice());`\n\n`        // 创建代理`\n`        ProxyFactory pf = new ProxyFactory();`\n\
  `        pf.setTarget(target);`\n`        pf.addAdvisor(advisor);`\n\n`        TestBean\
  \ proxy = (TestBean) pf.getProxy();`\n\n`        System.out.println(\"尝试普通调用\");`\n\
  `        proxy.foo();`\n`        System.out.println(\"尝试在 ControlFlowExample.test()\
  \ 下调用\");`\n`        test(proxy);`\n`    }`\n\n`    private void test(TestBean bean)\
  \ {`\n`        bean.foo();`\n`    }`\n`}`\n\n在清单 7-3 中，被通知的代理使用 `ControlFlowPointcut`\
  \ 进行组装，然后 `foo()` 方法被调用了两次：一次直接从 `run()` 方法调用，一次从 `test()` 方法调用。以下是特别值得关注的一行：\n\n\
  `Pointcut pc = new ControlFlowPointcut(ControlFlowExample.class, \"test\");`\n\n\
  在这一行中，我们为 `ControlFlowExample` 类的 `test()` 方法创建了一个 `ControlFlowPointcut` 实例。本质上，这表示：“切入所有从\
  \ `ControlFlowExample.test()` 方法调用的方法。”请注意，虽然我们说的是“切入所有方法”，但实际上，这真正意味着“切入代理对象上所有被与此\
  \ `ControlFlowPointcut` 实例对应的 `Advisor` 所通知的方法。”\n\n你还需要将 CGLIB 的依赖添加到你的项目中，如表 7-2\
  \ 所示。\n\n![images](img/t0702.jpg)\n\n运行清单 7-3 中的示例会产生以下输出：\n\n`Trying normal invoke`\n\
  `foo()`\n`Trying under ControlFlowExample.test()`\n`Before method: public void com.apress.prospring3.ch7.cflow.TestBean.foo()`\n\
  `foo()`\n\n如你所见，当 `foo()` 方法首次在 `test()` 方法的控制流之外被调用时，它没有被通知。当它第二次执行时，这次是在 `test()`\
  \ 方法的控制流之内，`ControlFlowPointcut` 指示其关联的通知适用于该方法，因此该方法被通知。请注意，如果我们在 `test()` 方法中调用了另一个不在被通知代理上的方法，那么该方法将不会被通知。\n\
  \n控制流切点非常有用，它允许你选择性地通知一个对象，仅当它在另一个对象的上下文中执行时。但是，请注意，与其他切点相比，使用控制流切点会带来显著的性能损失。Spring\
  \ 文档中的数据表明，在 1.4 JVM 上，控制流切点通常比其他切点慢五倍。\n\n让我们考虑一个例子。假设我们有一个事务处理系统，其中包含一个 `TransactionService`\
  \ 接口和一个 `AccountService` 接口。我们想要应用一个后置通知，以便当 `TransactionService.reverseTransaction()`\
  \ 调用 `AccountService.updateBalance()` 方法时，在账户余额更新后向客户发送一封电子邮件通知。然而，在任何其他情况下都不会发送电子邮件。在这种情况下，控制流切点将非常有用。图\
  \ 7-1 显示了此场景的 UML 时序图。\n\n![images](img/9781430241072_Fig07-01.jpg)\n\n***图 7-1.**\
  \ 控制流切点的 UML 时序图*\n\n\n\n#### 使用可组合切点\n\n在前面的切点示例中，我们为每个 `Advisor` 只使用了一个切点。在大多数情况下，这通常就足够了，但在某些情况下，你可能需要将两个或多个切点组合在一起以达到预期目标。考虑这样一种情况：你想为一个\
  \ Bean 的所有 getter 和 setter 方法定义切点。你有一个用于 getter 的切点和一个用于 setter 的切点，但没有一个能同时涵盖两者的切点。当然，你可以直接创建一个包含新逻辑的切点，但更好的方法是使用\
  \ `ComposablePointcut` 将这两个切点组合成一个切点。\n\n`ComposablePointcut` 支持两个方法：`union()` 和\
  \ `intersection()`。默认情况下，`ComposablePointcut` 使用一个匹配所有类的 `ClassFilter` 和一个匹配所有方法的\
  \ `MethodMatcher` 创建，尽管你可以在构造期间提供自己的初始 `ClassFilter` 和 `MethodMatcher`。`union()`\
  \ 和 `intersection()` 方法都被重载以接受 `ClassFilter` 和 `MethodMatcher` 参数。\n\n可以通过传入 `ClassFilter`、`MethodMatcher`\
  \ 或 `Pointcut` 接口的实例来调用 `ComposablePointcut.union()` 方法。联合操作的结果是，`ComposablePointcut`\
  \ 会向其调用链中添加一个“或”条件来匹配连接点。`ComposablePointcut.intersection()` 方法也是如此，但这次添加的是一个“与”条件，这意味着\
  \ `ComposablePointcut` 内的所有 `ClassFilter`、`MethodMatcher` 和 `Pointcut` 定义都必须匹配，才能应用通知。你可以将其想象为\
  \ SQL 查询中的“where”子句，`union()` 方法类似于“or”运算符，而 `intersection()` 方法类似于“and”运算符。\n\n\
  与控制流切点一样，这很难直观理解，通过一个示例来理解会容易得多。清单 7-4 展示了一个包含三个方法的简单 Bean。\n\n***清单 7-4.** `SampleBean`\
  \ 类*\n\n`package com.apress.prospring3.ch7.composable;`\n\n`public class SampleBean\
  \ {`\n\n`    public String getName() {`\n`        return \"Clarence Ho\";`\n`    }`\n\
  \n`    public void setName(String name) {`\n`    }`\n\n`    public int getAge()\
  \ {`\n`        return 100;`\n`    }`\n`}`\n\n在这个示例中，我们将使用同一个 `ComposablePointcut`\
  \ 实例生成三个不同的代理，但每次我们都会使用 `union()` 或 `intersection()` 方法来修改 `ComposablePointcut`。随后，我们将在\
  \ `SampleBean` 代理上调用所有三个方法，并查看哪些方法被通知了。清单 7-5 展示了相关代码。\n\n***清单 7-5.** 研究 `ComposablePointcut`*\n\
  \n`package com.apress.prospring3.ch7.composable;`\n\n`import java.lang.reflect.Method;`\n\
  \n`import org.springframework.aop.Advisor;`\n`import org.springframework.aop.ClassFilter;`\n\
  `import org.springframework.aop.framework.ProxyFactory;`\n`import org.springframework.aop.support.ComposablePointcut;`\n\
  `import org.springframework.aop.support.DefaultPointcutAdvisor;`\n`import org.springframework.aop.support.StaticMethodMatcher;`\n\
  \n`import com.apress.prospring3.ch7.cflow.SimpleBeforeAdvice;`\n\n`public class\
  \ ComposablePointcutExample {`\n\n`    public static void main(String[] args) {`\n\
  `        // 创建目标对象`\n`        SampleBean target = new SampleBean();`\n\n`        ComposablePointcut\
  \ pc = new ComposablePointcut(ClassFilter.TRUE,`\n`            new GetterMethodMatcher());`\n\
  \n`        System.out.println(\"测试 1\");`\n`        SampleBean proxy = getProxy(pc,\
  \ target);`\n`        testInvoke(proxy);`\n\n`        System.out.println(\"测试 2\"\
  );`\n`        pc.union(new SetterMethodMatcher());`\n`        proxy = getProxy(pc,\
  \ target);`\n`        testInvoke(proxy);`\n\n`        System.out.println(\"测试 3\"\
  );`\n`        pc.intersection(new GetAgeMethodMatcher());`\n`        proxy = getProxy(pc,\
  \ target);`\n`        testInvoke(proxy);`\n`    }`\n\n`    private static SampleBean\
  \ getProxy(ComposablePointcut pc,`\n`            SampleBean target) {`\n`        //\
  \ 创建通知器`\n`        Advisor advisor = new DefaultPointcutAdvisor(pc,`\n`            new\
  \ SimpleBeforeAdvice());`\n\n`        // 创建代理`\n`        ProxyFactory pf = new ProxyFactory();`\n\
  `        pf.setTarget(target);`\n`        pf.addAdvisor(advisor);`\n`        return\
  \ (SampleBean) pf.getProxy();`\n`    }`\n\n`    private static void testInvoke(SampleBean\
  \ proxy) {`\n`        proxy.getAge();`\n`        proxy.getName();`\n`        proxy.setName(\"\
  Clarence Ho\");`\n`    }`\n\n`    private static class GetterMethodMatcher extends\
  \ StaticMethodMatcher {`\n\n`        public boolean matches(Method method, Class<?>\
  \ cls) {`\n`            return (method.getName().startsWith(\"get\"));`\n`        }`\n\
  `    }`\n\n`    private static class GetAgeMethodMatcher extends StaticMethodMatcher\
  \ {`\n\n`        public boolean matches(Method method, Class<?> cls) {`\n`            return\
  \ \"getAge\".equals(method.getName());`\n`        }`\n`    }`\n\n`    private static\
  \ class SetterMethodMatcher extends StaticMethodMatcher {`\n\n`        public boolean\
  \ matches(Method method, Class<?> cls) {`\n`            return (method.getName().startsWith(\"\
  set\"));`\n`        }`\n\n`    }`\n`}`\n\n在这个示例中，首先要注意的是三个私有的 `MethodMatcher` 实现。`GetterMethodMatcher`\
  \ 匹配所有以 `get` 开头的方法。这是我们用来组装 `ComposablePointcut` 的默认 `MethodMatcher`。因此，我们预计第一轮对\
  \ `SampleBean` 方法的调用将只会导致 `getAge()` 和 `getName()` 方法被通知。\n\n`SetterMethodMatcher`\
  \ 匹配所有以 `set` 开头的方法，并且在第二轮调用中通过 `union()` 与 `ComposablePointcut` 组合。此时，我们有了两个 `MethodMatcher`\
  \ 的联合：一个匹配所有以 `get` 开头的方法，另一个匹配所有以 `set` 开头的方法。因此，我们预计第二轮中的所有调用都将被通知。\n\n`GetAgeMethodMatcher`\
  \ 非常具体，只匹配 `getAge()` 方法。在第三轮调用中，这个 `MethodMatcher` 通过 `intersection()` 与 `ComposablePointcut`\
  \ 组合。由于 `GetAgeMethodMatcher` 是使用 `intersection()` 组合的，我们预计在第三轮调用中唯一会被通知的方法是 `getAge()`，因为这是唯一一个匹配所有组合后的\
  \ `MethodMatcher` 的方法。\n\n运行此示例将产生以下输出：\n\n`测试 1`\n`Before method: public int com.apress.prospring3.ch7.composable.SampleBean.getAge()`\n\
  `Before method: public java.lang.String com.apress.prospring3.ch7`![images](img/U002.jpg)\n\
  `.composable.SampleBean.getName()`\n`测试 2`\n`Before method: public int com.apress.prospring3.ch7.composable.SampleBean.getAge()`\n\
  `Before method: public java.lang.String com.apress.prospring3.ch7`![images](img/U002.jpg)\n\
  `.composable.SampleBean.getName()`\n`Before method: public void com.apress.prospring3.ch7`![images](img/U002.jpg)\n\
  `.composable.SampleBean.setName(java.lang.String)`\n`测试 3`\n`Before method: public\
  \ int com.apress.prospring3.ch7.composable.SampleBean.getAge()`\n\n正如预期，第一轮对代理的调用中，只有\
  \ `getAge()` 和 `getName()` 方法被通知。在第二轮中，当 `SetterMethodMatcher` 通过 `union()` 方法组合后，所有方法都被通知了。在最后一轮中，由于\
  \ `GetAgeMethodMatcher` 的交集结果，只有 `getAge()` 方法被通知。\n\n尽管此示例仅演示了在组合过程中使用 `MethodMatcher`，但在构建切点时使用\
  \ `ClassFilter` 也同样简单。实际上，在构建组合切点时，你可以结合使用 `MethodMatcher` 和 `ClassFilter`。\n\n\n\
  \n#### 组合切点与 Pointcut 接口\n\n在上一节中，你了解了如何使用多个 `MethodMatcher` 和 `ClassFilter` 创建组合切点。你也可以使用其他实现了\
  \ `Pointcut` 接口的对象来创建组合切点。\n\n构建组合切点的另一种方法是使用 `org.springframework.aop.support.Pointcuts`\
  \ 类。该类提供了三个静态方法。`intersection()` 和 `union()` 方法都接受两个切点作为参数来构建组合切点。此外，还提供了一个 `matches(Pointcut,\
  \ Method, Class, Object[])` 方法，用于快速检查切点是否与给定的方法、类和参数匹配。\n\n`Pointcuts` 类仅支持对两个切点进行操作。因此，如果你需要将\
  \ `MethodMatcher` 和 `ClassFilter` 与 `Pointcut` 结合使用，则需要使用 `ComposablePointcut` 类。不过，当你只需要组合两个切点时，`Pointcuts`\
  \ 类会更方便。\n\n#### 切点总结\n\n从本章和上一章的讨论中可以看出，Spring 提供了一组强大的 `Pointcut` 实现，应该能够满足应用程序的大部分（即使不是全部）需求。请记住，如果找不到合适的切点，你可以通过实现\
  \ `Pointcut`、`MethodMatcher` 和 `ClassFilter` 从头开始创建自己的实现。\n\n有两种模式可用于组合切点和通知器。第一种模式（我们目前使用的模式）是将切点实现与通知器解耦。在到目前为止的代码中，我们创建了\
  \ `Pointcut` 实现的实例，然后使用 `DefaultPointcutAdvisor` 将通知与 `Pointcut` 一起添加到代理中。\n\n第二种模式（Spring\
  \ 文档中的许多示例都采用此模式）是将 `Pointcut` 封装在你自己的 `Advisor` 实现中。这样，你就拥有一个同时实现 `Pointcut` 和\
  \ `PointcutAdvisor` 的类，其中 `PointcutAdvisor.getPointcut()` 方法直接返回 `this`。这是 Spring\
  \ 中许多类（例如 `StaticMethodMatcherPointcutAdvisor`）采用的方法。\n\n我们发现第一种方法最灵活，允许你将不同的 `Pointcut`\
  \ 实现与不同的 `Advisor` 实现结合使用。然而，第二种方法在你将在应用程序的不同部分（甚至跨多个不同应用程序）使用相同的 `Pointcut` 和 `Advisor`\
  \ 组合时非常有用。当每个 `Advisor` 必须拥有一个独立的 `Pointcut` 实例时，第二种方法也很实用；通过让 `Advisor` 负责创建 `Pointcut`，你可以确保这一点。\n\
  \n如果你还记得上一章关于代理性能的讨论，就会记得未通知的方法比已通知的方法性能好得多。因此，你应该确保通过使用 `Pointcut`，只通知绝对必要的方法。这样，你就可以减少因使用\
  \ AOP 而给应用程序增加的不必要开销。\n\n### 引介入门\n\n引介是 Spring 中 AOP 功能集的重要组成部分。通过使用引介，你可以动态地向现有对象引入新功能。在\
  \ Spring 中，你可以向现有对象引入任何接口的实现。你可能很想知道这到底有什么用——既然可以在开发时简单地添加功能，为什么还要在运行时动态添加呢？这个问题的答案很简单。当功能是横切性的，并且不容易使用传统通知实现时，你就会动态地添加功能。\n\
  \n#### 引介基础\n\nSpring 将引介视为一种特殊类型的通知，更具体地说，是一种特殊类型的环绕通知。由于引介仅应用于类级别，因此你不能将切点与引介一起使用；从语义上讲，两者不匹配。引介向类添加新的接口实现，而切点则定义通知应用于哪些方法。你可以通过实现\
  \ `IntroductionInterceptor` 接口来创建引介，该接口扩展了 `MethodInterceptor` 和 `DynamicIntroductionAdvice`\
  \ 接口。图 7-2 展示了此结构以及两个接口的方法。\n\n![images](img/9781430241072_Fig07-02.jpg)\n\n***图\
  \ 7-2.** 引介的接口结构*\n\n如你所见，`MethodInterceptor` 接口定义了一个 `invoke()` 方法。使用此方法，你可以为你正在引入的接口提供实现，并根据需要对任何其他方法执行拦截。在单个方法中实现接口的所有方法可能会很麻烦，并且很可能导致大量代码，你需要费力地浏览这些代码才能决定调用哪个方法。幸运的是，Spring\
  \ 提供了 `IntroductionInterceptor` 的默认实现 `DelegatingIntroductionInterceptor`，它使创建引介变得更加简单。要使用\
  \ `DelegatingIntroductionInterceptor` 构建引介，你需要创建一个类，该类既继承自 `DelegatingIntroductionInterceptor`，又实现你想要引入的接口。然后，`DelegatingIntroductionInterceptor`\
  \ 只需将对引入方法的所有调用委托给其自身的相应方法。如果这看起来有点不清楚，请不要担心；你将在下一节中看到一个示例。\n\n就像在使用切点通知时需要 `PointcutAdvisor`\
  \ 一样，你需要使用 `IntroductionAdvisor` 来向代理添加引介。`IntroductionAdvisor` 的默认实现是 `DefaultIntroductionAdvisor`，它应该能够满足你大部分（即使不是全部）的引介需求。你应该注意，不允许使用\
  \ `ProxyFactory.addAdvice()` 添加引介，否则会抛出 `AopConfigException`。相反，你应该使用 `addAdvisor()`\
  \ 方法并传入一个 `IntroductionAdvisor` 接口的实例。\n\n当使用标准通知（即非引介）时，同一个通知实例可以用于许多不同的对象。Spring\
  \ 文档将此称为**每类生命周期**，尽管你可以对许多不同的类使用单个通知实例。对于引介，引介通知构成了被通知对象状态的一部分，因此，每个被通知对象必须有一个不同的通知实例。这称为**每实例生命周期**。由于你必须确保每个被通知对象都有一个不同的引介实例，因此通常最好创建一个\
  \ `DefaultIntroductionAdvisor` 的子类，负责创建引介通知。这样，你只需要确保为每个对象创建一个新的通知器类实例，因为它会自动创建一个新的引介实例。\n\
  \n例如，我们想要对 `Contact` 类的所有实例上的 `setFirstName()` 方法应用前置通知。图 7-3 显示了应用于所有 `Contact`\
  \ 类型对象的同一个通知。\n\n![images](img/9781430241072_Fig07-03.jpg)\n\n***图 7-3.** 通知的每类生命周期*\n\
  \n\n\n现在假设我们想要为所有 `Contact` 类的实例混入一个介绍，并且该介绍将为每个 `Contact` 实例携带信息（例如，一个 `isModified`\
  \ 属性，用于指示该特定实例是否被修改）。在这种情况下，将为 `Contact` 类的每个实例创建介绍，并将其绑定到该特定实例，如图 7-4 所示。\n\n![images](img/9781430241072_Fig07-04.jpg)\n\
  \n***图 7-4.** 每个实例的介绍*\n\n以上介绍了创建介绍的基础知识。接下来我们将讨论如何使用介绍来解决对象修改检测的问题。\n\n#### 使用介绍进行对象修改检测\n\
  \n对象修改检测是一种因多种原因而非常有用的技术。通常，在持久化对象数据时，你会应用修改检测来避免不必要的数据库访问。如果一个对象被传递给某个方法进行修改，但返回时并未被修改，那么向数据库发出更新语句就毫无意义。以这种方式使用修改检查可以真正提高应用程序的吞吐量，尤其是在数据库已经承受较大负载，或者位于远程网络上导致通信成本高昂的情况下。\n\
  \n不幸的是，这种功能很难手动实现，因为它要求你向每个可能修改对象状态的方法中添加代码，以检查对象状态是否真的被修改了。当你考虑到所有必须进行的空值检查以及检查值是否实际发生变化时，每个方法大约需要八行代码。你可以将其重构为一个单独的方法，但每次需要执行检查时仍然需要调用此方法。如果在一个需要修改检查的、包含许多不同类的典型应用程序中到处使用这种方法，那将是一场等待发生的灾难。\n\
  \n这显然是介绍能够发挥作用的地方。我们不想让每个需要修改检查的类都继承自某个基础实现，从而失去其唯一的继承机会；我们也不想真的在每个改变状态的方法中添加检查代码。通过使用介绍，我们可以为修改检测问题提供一个灵活的解决方案，而无需编写大量重复且容易出错的代码。\n\
  \n在本例中，我们将使用介绍构建一个完整的修改检查框架。修改检查逻辑由 `IsModified` 接口封装，该接口的一个实现将被引入到适当的对象中，同时还会引入拦截逻辑来自动执行修改检查。出于本例的目的，我们采用\
  \ JavaBeans 约定，即认为任何对 setter 方法的调用都构成一次修改。当然，我们不会仅仅将所有对 setter 方法的调用都视为修改——我们会检查传递给\
  \ setter 的值是否与对象中当前存储的值不同。此解决方案的唯一缺陷是，如果对象上的任何一个值发生过变化，即使将对象重置回其原始状态，它仍会被标记为已修改。例如，你有一个带有\
  \ `firstName` 属性的 `Contact` 对象。假设在处理过程中，`firstName` 属性从 Peter 改为了 John。结果，该对象被标记为已修改。然而，即使该值在后续处理中又从\
  \ John 改回了其原始值 Peter，它仍然会被标记为已修改。跟踪此类变化的一种方法是存储对象整个生命周期中变化的完整历史记录。不过，这里的实现已经足够满足大多数需求，并且实现更完整的解决方案会导致示例过于复杂。\n\
  \n##### IsModified 接口\n\n修改检查解决方案的核心是 `IsModified` 接口，我们虚构的应用程序使用该接口来做出关于对象持久化的智能决策。我们不讨论应用程序将如何使用\
  \ `IsModified`；相反，我们专注于介绍的实现。清单 7-6 展示了 `IsModified` 接口。\n\n***清单 7-6**. `IsModified`\
  \ 接口*\n\n`package com.apress.prospring3.ch7.introductions;`\n\n`public interface\
  \ IsModified {`\n\n`    public boolean isModified();`\n`}`\n\n这里没有什么特别的——只有一个方法\
  \ `isModified()`，用于指示对象是否已被修改。\n\n\n\n##### 创建混入\n\n下一步是创建实现 `IsModified` 接口的代码，并将其引入到目标对象中；这被称为混入。如前所述，通过继承\
  \ `DelegatingIntroductionInterceptor` 来创建混入，比直接实现 `IntroductionInterceptor` 接口要简单得多。我们的混入类\
  \ `IsModifiedMixin` 继承了 `DelegatingIntroductionInterceptor`，并同时实现了 `IsModified`\
  \ 接口，如清单 7-7 所示。\n\n***清单 7-7**. `IsModifiedMixin` 类*\n\n`package com.apress.prospring3.ch7.introductions;`\n\
  \n`import java.lang.reflect.Method;`\n`import java.util.HashMap;`\n`import java.util.Map;`\n\
  \n`import org.aopalliance.intercept.MethodInvocation;`\n`import org.springframework.aop.support.DelegatingIntroductionInterceptor;`\n\
  \n`public class IsModifiedMixin extends DelegatingIntroductionInterceptor`\n`        implements\
  \ IsModified {`\n\n`    private boolean isModified = false;`\n\n`    private Map<Method,\
  \ Method> methodCache = new HashMap<Method, Method>();`\n\n`    public boolean isModified()\
  \ {`\n`        return isModified;`\n`    }`\n\n`    public Object invoke(MethodInvocation\
  \ invocation) throws Throwable {`\n\n`        if (!isModified) {`\n`            if\
  \ ((invocation.getMethod().getName().startsWith(\"set\"))`\n`                &&\
  \ (invocation.getArguments().length == 1)) {`\n\n`                // 调用对应的 get 方法，检查值是否实际发生了变化`\n\
  `                Method getter = getGetter(invocation.getMethod());`\n\n`                if\
  \ (getter != null) {`\n`                    // 对于只写方法，修改检查不重要`\n`                    Object\
  \ newVal = invocation.getArguments()[0];`\n`                    Object oldVal =\
  \ getter.invoke(invocation.getThis(), null);`\n\n`                    if((newVal\
  \ == null) && (oldVal == null)) {`\n`                        isModified = false;`\n\
  `                    } else if((newVal == null) && (oldVal != null)) {`\n`                        isModified\
  \ = true;`\n`                    } else if((newVal != null) && (oldVal == null))\
  \ {`\n`                        isModified = true;`\n`                    } else\
  \ {`\n`                        isModified = (!newVal.equals(oldVal));`\n`                    }`\n\
  `                }`\n`            }`\n`        }`\n\n`        return super.invoke(invocation);`\n\
  `    }`\n\n`    private Method getGetter(Method setter) {`\n`        Method getter\
  \ = null;`\n\n`        // 尝试从缓存中获取`\n`        getter = (Method) methodCache.get(setter);`\n\
  \n`        if (getter != null) {`\n`            return getter;`\n`        }`\n\n\
  `        String getterName = setter.getName().replaceFirst(\"set\", \"get\");`\n\
  `        try {`\n`            getter = setter.getDeclaringClass().getMethod(getterName,\
  \ null);`\n\n`            // 缓存 getter`\n`            synchronized (methodCache)\
  \ {`\n`                methodCache.put(setter, getter);`\n`            }`\n\n`            return\
  \ getter;`\n`        } catch (NoSuchMethodException ex) {`\n`            // 必须是只写方法`\n\
  `            return null;`\n`        }`\n`    }`\n`}`\n\n这里首先要注意的是 `IsModified`\
  \ 接口的实现，它由私有的 `modified` 字段和 `isModified()` 方法组成。这个例子强调了为什么每个被通知对象必须拥有一个独立的混入实例——混入不仅向对象引入方法，还引入了状态。如果你在多个不同对象之间共享这个混入的单个实例，那么你也在共享状态，这意味着一旦单个对象被修改，所有对象都会显示为已修改。\n\
  \n实际上，你并不需要为混入实现 `invoke()` 方法，但在这个例子中，这样做可以让我们在发生修改时自动检测到。修改检查的实现相当简单。我们首先仅在对象尚未被修改时执行检查；一旦我们知道对象已被修改，就无需再检查修改。接着，我们检查该方法是否为\
  \ setter 方法，如果是，则检索对应的 getter 方法。请注意，我们缓存了 getter/setter 对，以便将来更快地检索。最后，我们比较 getter\
  \ 返回的值与传递给 setter 的值，以确定是否发生了修改。注意，我们检查了 null 值的不同可能组合，并相应地设置了修改标志。请务必记住，当你使用 `DelegatingIntroductionInterceptor`\
  \ 时，在重写 `invoke()` 时必须调用 `super.invoke()`，因为正是 `DelegatingIntroductionInterceptor`\
  \ 负责将调用分派到正确的位置，即被通知对象或混入本身。\n\n你可以在混入中实现任意数量的接口，每个接口都会自动引入到被通知对象中。\n\n##### 创建通知器\n\
  \n下一步是创建一个 `Advisor` 来包装混入类的创建。这一步是可选的，但它有助于确保每个被通知对象都使用一个新的混入实例。清单 7-8 展示了 `IsModifiedAdvisor`\
  \ 类。\n\n***清单 7-8**. 为你的混入创建通知器*\n\n`package com.apress.prospring3.ch7.introductions;`\n\
  \n`import org.springframework.aop.support.DefaultIntroductionAdvisor;`\n\n`public\
  \ class IsModifiedAdvisor extends DefaultIntroductionAdvisor {`\n\n`    public IsModifiedAdvisor()\
  \ {`\n`        super(new IsModifiedMixin());`\n`    }`\n`}`\n\n注意，我们继承了 `DefaultIntroductionAdvisor`\
  \ 来创建我们的 `IsModifiedAdvisor`。这个通知器的实现很简单，不言自明。\n\n\n\n##### 整合所有内容\n\n现在我们有了一个混入类和一个`Advisor`类，就可以测试修改检查框架了。清单\
  \ 7-9 展示了一个用于测试`IsModifiedMixin`的简单类。\n\n***清单 7-9**. `TargetBean`类*\n\n`package\
  \ com.apress.prospring3.ch7.introductions;`\n\n`public class TargetBean {`\n\n`    private\
  \ String name;`\n\n`    public void setName(String name) {`\n`        this.name\
  \ = name;`\n`    }`\n\n`    public String getName() {`\n`        return name;`\n\
  `    }`\n`}`\n\n这个 Bean 只有一个属性`name`，我们在测试修改检查混入时会用到它。清单 7-10 展示了如何组装增强代理，然后测试修改检查代码。\n\
  \n***清单 7-10**. 使用`IsModifiedMixin`*\n\n`package com.apress.prospring3.ch7.introductions;`\n\
  \n`import org.springframework.aop.IntroductionAdvisor;`\n`import org.springframework.aop.framework.ProxyFactory;`\n\
  \n`public class IntroductionExample {`\n\n`    public static void main(String[]\
  \ args) {`\n`        // 创建目标对象`\n`        TargetBean target = new TargetBean();`\n\
  `        target.setName(\"Clarence Ho\");`\n\n`        // 创建通知器`\n`        IntroductionAdvisor\
  \ advisor = new IsModifiedAdvisor();`\n\n`        // 创建代理`\n`        ProxyFactory\
  \ pf = new ProxyFactory();`\n`        pf.setTarget(target);`\n`        pf.addAdvisor(advisor);`\n\
  `        pf.setOptimize(true);`\n\n`        TargetBean proxy = (TargetBean)pf.getProxy();`\n\
  `        IsModified proxyInterface = (IsModified)proxy;`\n\n`        // 测试接口`\n\
  `        System.out.println(\"是 TargetBean 吗？: \" + (proxy instanceof TargetBean));`\n\
  `        System.out.println(\"是 IsModified 吗？: \" + (proxy instanceof IsModified));`\n\
  \n`        // 测试修改检查实现`\n`        System.out.println(\"是否已被修改？: \" +`\n`            proxyInterface.isModified());`\n\
  `        proxy.setName(\"Clarence Ho\");`\n`        System.out.println(\"是否已被修改？:\
  \ \" +`\n`            proxyInterface.isModified());`\n`        proxy.setName(\"\
  Rob Harrop\");`\n`        System.out.println(\"是否已被修改？: \" +`\n`            proxyInterface.isModified());`\n\
  \n`    }`\n`}`\n\n请注意，在创建代理时，我们将 optimize 标志设置为 true，以强制使用 CGLIB 代理。原因是：当你使用 JDK\
  \ 代理引入混入时，生成的代理不会是目标类（此处为`TargetBean`）的实例；代理仅实现混入接口，而不实现原始类。而使用 CGLIB 代理时，原始类会与混入接口一起由代理实现。\n\
  \n注意代码中，我们先测试代理是否是`TargetBean`的实例，然后测试它是否是`IsModified`的实例。使用 CGLIB 代理时，两个测试都返回 true，但使用\
  \ JDK 代理时，只有`IsModified`测试返回 true。最后，我们通过先将 name 属性设置为当前值，再设置为新值，并每次检查`isModified`标志的值，来测试修改检查代码。运行此示例将产生以下输出：\n\
  \n`是 TargetBean 吗？: true`\n`是 IsModified 吗？: true`\n`是否已被修改？: false`\n`是否已被修改？:\
  \ false`\n`是否已被修改？: true`\n\n正如预期，两个`instanceof`测试都返回 true。注意，在发生任何修改之前，第一次调用`isModified()`返回\
  \ false。在我们将 name 设置为相同值后的下一次调用，也返回 false。然而，在最后一次调用中，我们将 name 设置为新值后，`isModified()`方法返回\
  \ true，表明对象确实已被修改。\n\n#### 引入总结\n\n引入是 Spring AOP 最强大的特性之一；它不仅允许你扩展现有方法的功能，还允许你动态扩展对象实现的接口集。使用引入是实现横切逻辑的理想方式，你的应用程序通过定义良好的接口与这些逻辑交互。通常，这类逻辑你更希望以声明式而非编程式的方式应用。通过使用本例中定义的`IsModifiedMixin`以及下一节讨论的框架服务，我们可以声明式地定义哪些对象能够进行修改检查，而无需修改这些对象的实现。\n\
  \n显然，由于引入是通过代理工作的，它们会增加一定的开销，并且代理上的所有方法都被视为已增强，因为你不能将切入点与引入结合使用。然而，对于许多可以使用引入实现的服务（例如对象修改检查），这种性能开销相对于减少实现服务所需的代码量，以及完全集中服务逻辑所带来的稳定性和可维护性的提升，只是很小的代价。\n\
  \n### AOP 的框架服务\n\n到目前为止，我们必须编写大量代码来增强对象并为其生成代理。虽然这本身不是一个大问题，但它确实意味着所有通知配置都被硬编码到应用程序中，从而削弱了透明地增强方法实现的一些优势。幸运的是，Spring\
  \ 提供了额外的框架服务，允许你在应用程序配置中创建增强代理，然后将此代理像其他任何依赖一样注入到目标 Bean 中。\n\n使用声明式 AOP 配置方法优于手动编程机制。使用声明式机制时，你不仅将通知的配置外部化，还减少了编码错误的可能性。你还可以利用\
  \ DI 和 AOP 的结合来启用 AOP，使其能够在完全透明的环境中使用。\n\n#### 声明式配置 AOP\n\n在使用 Spring AOP 的声明式配置时，有三种选择。\n\
  \n*   *使用 ProxyFactoryBean：* 在 Spring AOP 中，`ProxyFactoryBean`提供了一种声明式方式，用于配置 Spring\
  \ 的`ApplicationContext`（以及底层的`BeanFactory`），以基于定义的 Spring Bean 创建 AOP 代理。\n*   *使用\
  \ Spring aop 命名空间：* 自 Spring 2.0 引入的`aop`命名空间提供了一种（与`ProxyFactoryBean`相比）简化的方式，用于在\
  \ Spring 应用程序中定义切面及其 DI 需求。然而，`aop`命名空间在幕后仍然使用`ProxyFactoryBean`。\n*   *使用@AspectJ\
  \ 风格的注解：* 除了基于 XML 的`aop`命名空间，你还可以在类中使用@AspectJ 风格的注解来配置 Spring AOP。虽然它使用的语法基于 AspectJ，并且使用此选项时需要包含一些\
  \ AspectJ 库，但 Spring 在引导`ApplicationContext`时仍然使用代理机制，即为目标对象创建代理对象。\n\n接下来，我们将逐一介绍这些选项。\n\
  \n\n\n#### 使用 ProxyFactoryBean\n\n`ProxyFactoryBean` 类是 `FactoryBean` 的一个实现，它允许你指定一个目标\
  \ bean，并为该 bean 提供一组通知和顾问，这些最终会被合并到一个 AOP 代理中。由于你可以同时使用顾问和通知与 `ProxyFactoryBean`，因此你不仅可以声明式地配置通知，还可以配置切入点。\n\
  \n`ProxyFactoryBean` 与 `ProxyFactory` 共享一个公共接口（`org.springframework.aop.framework.Advised`\
  \ 接口）（这两个类都间接扩展了 `org.springframework.aop.framework.AdvisedSupport` 类，而该类实现了 `Advised`\
  \ 接口），因此，它暴露了许多相同的标志，例如 `frozen`、`optimize` 和 `exposeProxy`。这些标志的值会直接传递给底层的 `ProxyFactory`，这也允许你以声明方式配置工厂。\n\
  \n##### ProxyFactoryBean 实战\n\n使用 `ProxyFactoryBean` 实际上非常简单。你定义一个 bean 作为目标 bean，然后使用\
  \ `ProxyFactoryBean`，定义你的应用程序实际将访问的 bean，并将目标 bean 作为代理目标。在可能的情况下，将目标 bean 定义为代理\
  \ bean 声明内部的匿名 bean。这可以防止你的应用程序意外访问未通知的 bean。然而，在某些情况下，例如我们即将向你展示的示例，你可能需要为同一个 bean\
  \ 创建多个代理，因此在这种情况下，你应该使用一个普通的顶级 bean。\n\n清单 7-11 和 7-12 展示了两个类，其中一个类依赖于另一个类。\n\n\
  ***清单 7-11**。`MyDependency` 类*\n\n`package com.apress.prospring3.ch7.pfb;`\n\n`public\
  \ class MyDependency {`\n\n`    public void foo() {`\n`        System.out.println(\"\
  foo()\");`\n`    }`\n\n`    public void bar() {`\n`        System.out.println(\"\
  bar()\");`\n`    }`\n`}`\n\n***清单 7-12**。`MyBean` 类*\n\n`package com.apress.prospring3.ch7.pfb;`\n\
  \n`public class MyBean {`\n\n`    private MyDependency dep;`\n\n`    public void\
  \ execute() {`\n`        dep.foo();`\n`        dep.bar();`\n`    }`\n\n`    public\
  \ void setDep(MyDependency dep) {`\n`        this.dep = dep;`\n`    }`\n`}`\n\n\
  对于这个示例，我们将为单个 `MyDependency` 实例创建两个代理，两者都使用 清单 7-13 中所示的基本通知。\n\n***清单 7-13**。`MyAdvice`\
  \ 类*\n\n`package com.apress.prospring3.ch7.pfb;`\n\n`import java.lang.reflect.Method;`\n\
  `import org.springframework.aop.MethodBeforeAdvice;`\n\n`public class MyAdvice implements\
  \ MethodBeforeAdvice {`\n\n`    public void before(Method method, Object[] args,\
  \ Object target)`\n`            throws Throwable {`\n`        System.out.println(\"\
  Executing: \" + method);`\n`    }`\n`}`\n\n第一个代理将直接使用通知来通知目标；因此，所有方法都将被通知。对于第二个代理，我们将配置一个\
  \ `AspectJExpressionPointcut` 和一个 `DefaultPointcutAdvisor`，以便仅通知 `MyDependency`\
  \ 类的 `foo()` 方法。为了测试通知，我们将创建两个类型为 `MyBean` 的 bean 定义，每个定义都将注入一个不同的代理。然后，我们将在每个 bean\
  \ 上调用 `execute()` 方法，并观察在依赖项上调用被通知的方法时会发生什么。\n\n清单 7-14 显示了此示例的配置（`pfb.xml`）。\n\n\
  ***清单 7-14**。声明式 AOP 配置*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\
  \n`       xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\"\
  >`\n\n`    <bean id=\"myBean1\" class=\"com.apress.prospring3.ch7.pfb.MyBean\">`\n\
  `        <property name=\"dep\">`\n`            <ref local=\"myDependency1\"/>`\n\
  `        </property>`\n`    </bean>`\n\n`    <bean id=\"myBean2\" class=\"com.apress.prospring3.ch7.pfb.MyBean\"\
  >`\n`        <property name=\"dep\">`\n`            <ref local=\"myDependency2\"\
  />`\n`        </property>`\n`    </bean>`\n\n`    <bean id=\"myDependencyTarget\"\
  \ class=\"com.apress.prospring3.ch7.pfb.MyDependency\"/>`\n\n`    <bean id=\"myDependency1\"\
  \ class=\"org.springframework.aop.framework.ProxyFactoryBean\">`\n`        <property\
  \ name=\"target\">`\n`            <ref local=\"myDependencyTarget\"/>`\n`        </property>`\n\
  `        <property name=\"interceptorNames\">`\n`            <list>`\n`                <value>advice</value>`\n\
  `            </list>`\n`        </property>`\n`    </bean>`\n\n`    <bean id=\"\
  myDependency2\" class=\"org.springframework.aop.framework.ProxyFactoryBean\">`\n\
  `        <property name=\"target\">`\n`            <ref local=\"myDependencyTarget\"\
  />`\n`        </property>`\n`        <property name=\"interceptorNames\">`\n`            <list>`\n\
  `                <value>advisor</value>`\n`            </list>`\n`        </property>`\n\
  `    </bean>`\n\n\n\n`    <bean id=\"advice\" class=\"com.apress.prospring3.ch7.pfb.MyAdvice\"\
  />`\n\n`    <bean id=\"advisor\" class=\"org.springframework.aop.support.DefaultPointcutAdvisor\"\
  >`\n`        <property name=\"advice\">`\n`            <ref local=\"advice\"/>`\n\
  `        </property>`\n`        <property name=\"pointcut\">`\n`            <bean\
  \ class=\"org.springframework.aop.aspectj.AspectJExpressionPointcut\">`\n`                <property\
  \ name=\"expression\">`\n`                    <value>execution(* foo*(..))</value>`\n\
  `                </property>`\n`            </bean>`\n`        </property>`\n`    </bean>`\n\
  `</beans>`\n\n这段代码你应该很熟悉。请注意，我们并没有做什么特别的事情；只是利用 Spring 的依赖注入功能，设置了之前在代码中设置的那些属性。唯一值得关注的是，我们为切入点使用了匿名\
  \ Bean，并且使用了 `ProxyFactoryBean` 类。当切入点不被共享时，我们倾向于使用匿名 Bean，因为这样可以使直接可访问的 Bean 集合尽可能小，并且与应用的相关性尽可能高。使用\
  \ `ProxyFactoryBean` 时需要认识到的重要一点是，`ProxyFactoryBean` 声明才是要暴露给应用程序的，也是在满足依赖关系时要使用的。不建议直接使用底层目标\
  \ Bean 的声明，因此，只有当你想绕过 AOP 框架时才应使用该 Bean。不过一般来说，你的应用程序不应该感知到 AOP 框架，因此也不应该想要绕过它。出于这个原因，你应该尽可能使用匿名\
  \ Bean，以避免应用程序意外访问。\n\n清单 7-15 展示了一个简单的类，它从 `ApplicationContext` 中获取两个 `MyBean`\
  \ 实例，然后对每个实例执行 `execute()` 方法。\n\n***清单 7-15.** `ProxyFactoryBeanExample` 类*\n\n\
  `package com.apress.prospring3.ch7.pfb;`\n\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  \n`public class ProxyFactoryBeanExample {`\n\n`    public static void main(String[]\
  \ args) {`\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:pfb.xml\");`\n`        ctx.refresh();`\n\n`        MyBean\
  \ bean1 = (MyBean)ctx.getBean(\"myBean1\");`\n`        MyBean bean2 = (MyBean)ctx.getBean(\"\
  myBean2\");`\n\n`        System.out.println(\"Bean 1\");`\n`        bean1.execute();`\n\
  \n`        System.out.println(\"\\nBean 2\");`\n`        bean2.execute();`\n`    }`\n\
  `}`\n\n运行清单 7-15 中的示例将产生以下输出：\n\n`Bean 1`\n`Executing: public void com.apress.prospring3.ch7.pfb.MyDependency.foo()`\n\
  `foo()`\n`Executing: public void com.apress.prospring3.ch7.pfb.MyDependency.bar()`\n\
  `bar()`\n\n`Bean 2`\n`Executing: public void com.apress.prospring3.ch7.pfb.MyDependency.foo()`\n\
  `foo()`\n`bar()`\n\n正如预期的那样，第一个代理中的 `foo()` 和 `bar()` 方法都被增强了，因为其配置中没有使用切入点。然而，对于第二个代理，由于配置中使用了切入点，只有\
  \ `foo()` 方法被增强了。\n\n##### 使用 ProxyFactoryBean 实现引入\n\n`ProxyFactoryBean` 类不仅限于对对象进行增强，还可以用于向对象引入混入。回想一下我们之前关于引入的讨论，必须使用\
  \ `IntroductionAdvisor` 来添加引入；不能直接添加引入。当你在引入中使用 `ProxyFactoryBean` 时，同样的规则也适用。使用\
  \ `ProxyFactoryBean` 时，如果你按照之前讨论的那样为你的混入创建了自定义的 `Advisor`，那么配置代理就会变得容易得多。清单 7-16\
  \ 展示了我们之前讨论过的 `IsModifiedMixin` 引入的示例配置（`introductions.xml`）。\n\n***清单 7-16.** 使用\
  \ `ProxyFactoryBean` 配置引入*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\
  \n`      xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n`      http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\"\
  >`\n\n`    <bean id=\"bean\" class=\"org.springframework.aop.framework.ProxyFactoryBean\"\
  >`\n`        <property name=\"target\">`\n`            <bean  class=\"com.apress.prospring3.ch7.introductions.TargetBean\"\
  >`\n`                <property name=\"name\">`\n`                    <value>Clarence\
  \ Ho</value>`\n`                </property>`\n`            </bean>`\n`        </property>`\n\
  `        <property name=\"interceptorNames\">`\n`            <list>`\n`                <value>advisor</value>`\n\
  `            </list>`\n`        </property>`\n`        <property name=\"proxyTargetClass\"\
  >`\n`            <value>true</value>`\n`        </property>`\n`    </bean>`\n\n\
  `    <bean id=\"advisor\" class=\"com.apress.prospring3.ch7.introductions.IsModifiedAdvisor\"\
  />`\n`</beans>`\n\n从配置中可以看出，我们使用 `IsModifiedAdvisor` 类作为 `ProxyFactoryBean` 的通知器，并且由于我们不需要为同一个目标对象创建另一个代理，因此我们为目标\
  \ Bean 使用了匿名声明。清单 7-17 展示了之前引入示例的一个修改版本，该版本从 `ApplicationContext` 中获取代理。\n\n***清单\
  \ 7-17.** `IntroductionConfigExample` 类*\n\n`package com.apress.prospring3.ch7.introductions;`\n\
  \n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\n\
  `public class IntroductionConfigExample {`\n\n`    public static void main(String[]\
  \ args) {`\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:introductions.xml\");`\n`        ctx.refresh();`\n\
  \n`        TargetBean bean = (TargetBean) ctx.getBean(\"bean\");`\n`        IsModified\
  \ mod = (IsModified) bean;`\n\n`        // 测试接口`\n`        System.out.println(\"\
  Is TargetBean?: \" + (bean instanceof TargetBean));`\n`        System.out.println(\"\
  Is IsModified?: \" + (bean instanceof IsModified));`\n\n`        // 测试 isModified\
  \ 实现`\n`        System.out.println(\"Has been modified?: \" + mod.isModified());`\n\
  `        bean.setName(\"Clarence Ho\");`\n`        System.out.println(\"Has been\
  \ modified?: \" + mod.isModified());`\n`        bean.setName(\"Rob Harrop\");`\n\
  `        System.out.println(\"Has been modified?: \" + mod.isModified());`\n`    }`\n\
  `}`\n\n运行此示例将产生与之前引入示例完全相同的输出，但这次代理是从 `ApplicationContext` 获取的，并且应用程序代码中不存在任何配置。\n\
  \n##### ProxyFactoryBean 总结\n\n使用 `ProxyFactoryBean` 时，你可以配置 AOP 代理，这些代理提供了编程方法的所有灵活性，而无需将应用程序与\
  \ AOP 配置耦合。除非你需要在运行时决定如何创建代理，否则最好使用声明式代理配置方法，而不是编程式方法。接下来，让我们看看声明式 Spring AOP 的另外两个选项，对于基于\
  \ Spring 2.0 或更高版本以及 JDK 5 或更高版本的应用程序来说，这两个选项都是首选。\n\n\n\n#### 使用 aop 命名空间\n\n`aop`\
  \ 命名空间为声明式 Spring AOP 配置提供了极大简化的语法。为了展示其工作原理，我们复用之前使用 `ProxyFactoryBean` 的示例，并稍作修改以演示其用法。\n\
  \n清单 7-18 和 7-19 展示了经过修改的 `MyDependency` 和 `MyBean` 类。\n\n***清单 7-18.** `MyDependency`\
  \ 类*\n\n`package com.apress.prospring3.ch7.aopns;`\n\n`public class MyDependency\
  \ {`\n\n`    public void foo(int intValue) {`\n`        System.out.println(\"foo(int):\
  \ \" + intValue);`\n`    }`\n\n`    public void bar() {`\n`        System.out.println(\"\
  bar()\");`\n`    }`\n`}`\n\n***清单 7-19.** `MyBean` 类*\n\n`package com.apress.prospring3.ch7.aopns;`\n\
  \n`public class MyBean {`\n\n`    private MyDependency dep;`\n\n`    public void\
  \ execute() {`\n`        dep.foo(100);`\n`        dep.foo(101);`\n`        dep.bar();`\n\
  `    }`\n\n`    public void setDep(MyDependency dep) {`\n`        this.dep = dep;`\n\
  `    }`\n`}`\n\n在上一个清单中，我们修改了 `MyDependency` 类的 `foo()` 方法，使其接受一个整数值作为参数。在 `MyBean`\
  \ 类中，`foo()` 方法被调用了两次，并传入了不同的参数。\n\n接下来看看通知类是什么样的。清单 7-20 展示了修改后的 `MyAdvice` 类。\n\
  \n***清单 7-20.** `MyAdvice` 类*\n\n`package com.apress.prospring3.ch7.aopns;`\n\n\
  `import org.aspectj.lang.JoinPoint;`\n\n`public class MyAdvice {`\n\n`    public\
  \ void simpleBeforeAdvice(JoinPoint joinPoint) {`\n`        System.out.println(\"\
  Executing: \" +    `\n`                joinPoint.getSignature().getDeclaringTypeName()\
  \ + \" \"`\n`                + joinPoint.getSignature().getName());`\n`    }`\n\
  `}`\n\n你会看到，通知类不再需要实现 `MethodBeforeAdvice` 接口。同时，前置通知接受 `JoinPoint` 作为参数，而不是方法、对象和参数。实际上，对于通知类来说，这个参数是可选的，因此你可以让方法不带任何参数。但是，如果你需要在通知中访问被通知的连接点的信息（本例中我们想要输出调用类型和方法名称的信息），那么就需要定义接受该参数。当为方法定义了参数时，Spring\
  \ 会自动将连接点传入方法供你处理。\n\n清单 7-21 展示了使用 `aop` 命名空间的 Spring XML 配置（`aopns.xml`）。\n\n\
  ***清单 7-21.** 使用 `aop` 命名空间配置 Spring AOP*\n\n`<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>`\n`<beans`\n\n`      xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n\
  `          http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n`          http://www.springframework.org/schema/aop`\n\
  `          http://www.springframework.org/schema/aop/spring-aop-3.1.xsd\">`\n\n\
  `    <aop:config>`\n\n`        <aop:pointcut id=\"fooExecution\"`\n`            expression=\"\
  execution(* com.apress.prospring3.ch7..foo*(int))\"/>`\n\n`        <aop:aspect ref=\"\
  advice\">`\n`            <aop:before pointcut-ref=\"fooExecution\"`\n`                method=\"\
  simpleBeforeAdvice\"/>`\n`        </aop:aspect>`\n\n`    </aop:config>`\n\n`    <bean\
  \ id=\"advice\" class=\"com.apress.prospring3.ch7.aopns.MyAdvice\"/>`\n\n`    <bean\
  \ id=\"myDependency\"  `\n`        class=\"com.apress.prospring3.ch7.aopns.MyDependency\"\
  />`\n\n`    <bean id=\"myBean\" class=\"com.apress.prospring3.ch7.aopns.MyBean\"\
  >`\n`        <property name=\"dep\" ref=\"myDependency\"/>`\n`    </bean>`\n`</beans>`\n\
  \n首先，我们需要在 `<beans>` 标签中声明 `aop` 命名空间。其次，所有 Spring AOP 配置都放在 `<aop:config>` 标签下。在\
  \ `<aop:config>` 下，你可以像往常一样定义切入点、切面、通知器等等，并引用其他 Spring Bean。\n\n从上述配置中，我们定义了一个 ID\
  \ 为 `fooExecution` 的切入点。表达式 `\"execution(* com.apress.prospring3.ch7..foo*(int))\"\
  ` 表示我们希望通知所有以 `foo` 为前缀的方法，并且这些类定义在包 `com.apress.prospring3.ch7` 下（包括所有子包）。同时，`foo()`\
  \ 方法应接收一个整数类型的参数。随后，切面通过 `<aop:aspect>` 标签声明，通知类引用 ID 为 `\"advice\"` 的 Spring Bean，即\
  \ `MyAdvice` 类。`pointcut-ref` 引用了 ID 为 `fooExecution` 的已定义切入点，而前置通知（通过 `<aop:before>`\
  \ 标签声明）则是通知 Bean 中的 `simpleBeforeAdvice()` 方法。\n\n清单 7-22 展示了测试程序。\n\n***清单 7-22.**\
  \ `AopNamespaceExample` 类*\n\n`package com.apress.prospring3.ch7.aopns;`\n\n`import\
  \ org.springframework.context.support.GenericXmlApplicationContext;`\n\n`public\
  \ class AopNamespaceExample {`\n\n`    public static void main(String[] args) {`\n\
  \n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:aopns.xml\");`\n`        ctx.refresh();`\n\n`        MyBean\
  \ myBean = (MyBean) ctx.getBean(\"myBean\");`\n`        myBean.execute();`\n`    }`\n\
  `}`\n\n这个类本身没什么特别之处。只是像往常一样初始化 `ApplicationContext`，获取 Bean，并调用其 `execute()` 方法。运行程序将产生以下输出：\n\
  \n`Executing: com.apress.prospring3.ch7.aopns.MyDependency foo`\n`foo(int): 100`\n\
  `Executing: com.apress.prospring3.ch7.aopns.MyDependency foo`\n`foo(int): 101`\n\
  `bar()`\n\n如你所见，对 `foo()` 方法的两次调用都被通知了，但 `bar()` 方法没有。这完全符合我们的预期，并且你可以看到，与 `ProxyFactoryBean`\
  \ 配置相比，配置大大简化了。\n\n让我们进一步将前面的示例修改为稍微复杂一点的情况。假设现在我们只想通知那些 Spring Bean ID 以 `myDependency`\
  \ 开头、且整数参数不等于 100 的方法。\n\n为了仅在参数不等于 100 时运行通知，我们需要修改通知。清单 7-23 展示了修改后的 `MyAdvice`\
  \ 类。\n\n***清单 7-23.** `MyAdvice` 类（为参数检查而修改）*\n\n`package com.apress.prospring3.ch7.aopns;`\n\
  \n`import org.aspectj.lang.JoinPoint;`\n\n`public class MyAdvice {`\n\n`    // 用于同时获取连接点和参数`\n\
  `    public void simpleBeforeAdvice(JoinPoint joinPoint, int intValue) {`\n\n`        //\
  \ 仅在 intValue 不等于 100 时执行`\n`        if (intValue != 100) {`\n`            System.out.println(\"\
  Executing: \" +    `\n`                joinPoint.getSignature().getDeclaringTypeName()\
  \ + \" \"`\n`                + joinPoint.getSignature().getName()`\n`                +\
  \ \" argument: \" + intValue);`\n`        }`\n`    }`\n`}`\n\n有两处进行了修改。首先，在前置通知的方法签名中添加了参数\
  \ `intValue`。其次，在通知中，我们仅在参数不等于 100 时才检查并执行逻辑。\n\n为了将参数传递给通知，我们还需要稍微修改 XML 配置。在这种情况下，我们需要修改切入点表达式。修改后的切入点表达式如下所示：\n\
  \n`        <aop:pointcut id=\"fooExecution\" expression=\"execution(* foo*(int))`\n\
  `            and args(intValue) and bean(myDependency*)\"/>`\n\n\n\n切入点表达式中新增了两个指示符。首先，`args(intValue)`\
  \ 指示 Spring 将名为 `intValue` 的参数也传递给前置通知。其次，`bean(myDependency*)` 指示 Spring 仅通知那些\
  \ ID 以 `myDependency` 为前缀的 Bean。这是一个强大的特性；如果你的 Spring Bean 命名结构定义良好，你可以轻松地通知你想要的对象。例如，你可以使用\
  \ `bean(*DAO*)` 来通知所有 DAO Bean，或者使用 `bean(*Service*)` 来通知所有服务层 Bean，而无需使用完全限定类名进行匹配。\n\
  \n运行相同的测试程序（`AopNamespaceExample`）将产生以下输出：\n\n`foo(int): 100`\n`Executing: com.apress.prospring3.ch7.aopns.MyDependency\
  \ foo argument: 101`\n`foo(int): 101`\n`bar()`\n\n你可以看到，只有参数不等于 100 的 `foo()` 方法被通知了。\n\
  \n让我们再看一个使用 `aop` 命名空间实现环绕通知的例子。我们无需创建另一个类来实现 `MethodInterceptor` 接口，只需在 `MyAdvice`\
  \ 类中添加一个新方法即可。清单 7-24 展示了修订后的 `MyAdvice` 类中的新方法 `simpleAroundAdvice()`。\n\n***清单\
  \ 7-24.** `MyAdvice` 类（为参数检查而修订）*\n\n`package com.apress.prospring3.ch7.aopns;`\n\
  \n`import org.aspectj.lang.JoinPoint;`\n`import org.aspectj.lang.ProceedingJoinPoint;`\n\
  \n`public class MyAdvice {`\n\n`    // 用于连接点和参数检索`\n`    public void simpleBeforeAdvice(JoinPoint\
  \ joinPoint, int intValue) {`\n\n`        // 仅在 intValue 不等于 100 时执行`\n`        if\
  \ (intValue != 100) {`\n`        System.out.println(\"Executing: \" +    `\n`            joinPoint.getSignature().getDeclaringTypeName()\
  \ + \" \"`\n`            + joinPoint.getSignature().getName()`\n`            + \"\
  \ argument: \" + intValue);`\n`        }`\n`    }`\n\n`    public Object simpleAroundAdvice(ProceedingJoinPoint\
  \ pjp, int intValue)`\n`            throws Throwable {`\n\n`        System.out.println(\"\
  Before execution: \" +    `\n`            pjp.getSignature().getDeclaringTypeName()\
  \ + \" \"`\n`            + pjp.getSignature().getName()`\n`            + \" argument:\
  \ \" + intValue);`\n\n`        Object retVal = pjp.proceed();`\n\n`        System.out.println(\"\
  After execution: \" +    `\n`            pjp.getSignature().getDeclaringTypeName()\
  \ + \" \"`\n`            + pjp.getSignature().getName() + \" argument: \" + intValue);`\n\
  \n`        return retVal;`\n`    }`\n`}`\n\n新添加的 `simpleAroundAdvice()` 方法需要至少接受一个\
  \ `ProceedingJoinPoint` 类型的参数，以便它可以继续调用目标对象。我们还添加了 `intValue` 参数来在通知中显示该值。\n\n对于\
  \ XML 配置，我们只需添加一行代码。清单 7-25 展示了代码片段。\n\n***清单 7-25.** 使用 `aop` 命名空间配置 Spring AOP（环绕通知）*\n\
  \n`…`\n`        <aop:aspect ref=\"advice\">`\n`            <aop:before pointcut-ref=\"\
  fooExecution\"`\n`                method=\"simpleBeforeAdvice\"/>`\n`            <aop:around\
  \ pointcut-ref=\"fooExecution\"`\n`                method=\"simpleAroundAdvice\"\
  />`\n`        </aop:aspect>`\n`…`\n\n我们只是添加了一个新的标签 `<aop:around>` 来声明环绕通知，并引用了同一个切入点。再次运行测试程序，你将得到以下输出：\n\
  \n`Before execution: com.apress.prospring3.ch7.aopns.MyDependency foo argument:\
  \ 100`\n`foo(int): 100`\n`After execution: com.apress.prospring3.ch7.aopns.MyDependency\
  \ foo argument: 100`\n`Executing: com.apress.prospring3.ch7.aopns.MyDependency foo\
  \ argument: 101`\n`Before execution: com.apress.prospring3.ch7.aopns.MyDependency\
  \ foo argument: 101`\n`foo(int): 101`\n`After execution: com.apress.prospring3.ch7.aopns.MyDependency\
  \ foo argument: 101`\n`bar()`\n\n这里有两个有趣的点。首先，你会看到环绕通知被应用到了 `foo()` 方法的两次调用上，因为它没有检查参数。其次，对于参数为\
  \ 101 的 `foo()` 方法，前置通知和环绕通知都执行了，并且默认情况下前置通知优先。\n\n![images](img/square.jpg) **注意**  当使用\
  \ `aop` 命名空间或 @AspectJ 风格时，有两种类型的后置通知。“返回后通知”（使用 `<aop:after-returning>` 标签）仅在目标方法正常完成时应用。另一种是“最终通知”（使用\
  \ `<aop:after>` 标签），无论方法是正常完成还是遇到错误并抛出异常，它都会执行。如果你需要一个无论目标方法执行结果如何都会执行的通知，你应该使用最终通知。\n\
  \n\n\n#### 使用 @AspectJ 风格注解\n\n正如你所料，当在 JDK 5 或更高版本中使用 Spring AOP 时，你也可以使用注解来声明通知。Spring\
  \ 支持 @AspectJ 风格的注解，这些注解利用了 @AspectJ 提供的注解和语法。然而，如前所述，Spring 仍然使用自己的代理机制来为目标方法提供通知，而不是\
  \ AspectJ 的织入机制。\n\n在本节中，我们将介绍如何使用 @AspectJ 风格的注解来实现与 aop-namespace 中相同的切面。对于本节中的示例，我们也将对其他\
  \ Spring Bean 使用注解。\n\n清单 7-26 和 7-27 展示了带有 Spring DI 注解的 `MyDependency` 和 `MyBean`\
  \ 类。\n\n***清单 7-26.** `MyDependency` 类*\n\n`package com.apress.prospring3.ch7.aspectjannotation;`\n\
  \n`import org.springframework.stereotype.Component;`\n\n`@Component(\"myDependency\"\
  )`\n`public class MyDependency {`\n\n`    public void foo(int intValue) {`\n`        System.out.println(\"\
  foo(int): \" + intValue);`\n`    }`\n\n`    public void bar() {`\n`        System.out.println(\"\
  bar()\");`\n`    }`\n`}`\n\n***清单 7-27.** `MyBean` 类*\n\n`package com.apress.prospring3.ch7.aspectjannotation;`\n\
  \n`import org.springframework.beans.factory.annotation.Autowired;`\n`import org.springframework.stereotype.Component;`\n\
  \n`@Component(\"myBean\")`\n`public class MyBean {`\n\n`    private MyDependency\
  \ myDependency;`\n\n`    public void execute() {`\n`        myDependency.foo(100);`\n\
  `        myDependency.foo(101);`\n`        myDependency.bar();`\n`    }`\n\n`    @Autowired`\n\
  `    public void setDep(MyDependency myDependency) {`\n`        this.myDependency\
  \ = myDependency;`\n`    }`\n`}`\n\n我们使用 `@Component` 注解标注了这两个类，并为它们分配了相应的名称。在 `MyBean`\
  \ 类中，属性 `myDependency` 的 setter 方法被标注了 `@Autowired`，以便 Spring 进行自动注入。\n\n现在让我们看看使用\
  \ @AspectJ 风格注解的 `MyAdvice` 类。我们将一次性实现切入点以及前置通知和环绕通知。清单 7-28 展示了 `MyAdvice` 类。\n\
  \n***清单 7-28.** `MyAdvice` 类*\n\n`package com.apress.prospring3.ch7.aspectjannotation;`\n\
  \n`import org.aspectj.lang.JoinPoint;`\n`import org.aspectj.lang.ProceedingJoinPoint;`\n\
  `import org.aspectj.lang.annotation.Around;`\n`import org.aspectj.lang.annotation.Aspect;`\n\
  `import org.aspectj.lang.annotation.Before;`\n`import org.aspectj.lang.annotation.Pointcut;`\n\
  `import org.springframework.stereotype.Component;`\n\n`@Component`\n`@Aspect`\n\
  `public class MyAdvice {`\n\n`    @Pointcut(\"execution(* com.apress.prospring3.ch7..foo*(int))\
  \ && args(intValue)\")`\n`    public void fooExecution(int intValue) {`\n`    }`\n\
  \n`    @Pointcut(\"bean(myDependency*)\")`\n`    public void inMyDependency() {`\n\
  `    }`\n\n`    @Before(\"fooExecution(intValue) && inMyDependency()\")`\n`    public\
  \ void simpleBeforeAdvice(JoinPoint joinPoint, int intValue) {`\n`        // 仅在\
  \ intValue 不等于 100 时执行`\n`        if (intValue != 100) {`\n`        System.out.println(\"\
  Executing: \" +`\n`            joinPoint.getSignature().getDeclaringTypeName() +\
  \ \" \"`\n`            + joinPoint.getSignature().getName() + \" argument: \" +\
  \ intValue);`\n`        }`\n`    }`\n\n`    @Around(\"fooExecution(intValue) &&\
  \ inMyDependency()\")`\n`    public Object simpleAroundAdvice(ProceedingJoinPoint\
  \ pjp, int intValue) throws Throwable {`\n\n`        System.out.println(\"Before\
  \ execution: \" +      `\n`            pjp.getSignature().getDeclaringTypeName()\
  \ + \" \"`\n`            + pjp.getSignature().getName()`\n`            + \" argument:\
  \ \" + intValue);`\n\n`        Object retVal = pjp.proceed();`\n\n`        System.out.println(\"\
  After execution: \" +  `\n`            pjp.getSignature().getDeclaringTypeName()\
  \ + \" \"`\n`            + pjp.getSignature().getName()`\n`            + \" argument:\
  \ \" + intValue);`\n\n`        return retVal;`\n`    }`\n`}`\n\n\n\n你会注意到，代码结构与我们在\
  \ `aop` 命名空间中使用的非常相似，只是这里我们改用了注解。不过，仍有几点值得注意：\n\n*   我们同时使用了 `@Component` 和 `@Aspect`\
  \ 来注解 `MyAdvice` 类。`@Aspect` 用于声明它是一个切面类。为了在 XML 配置中使用 `<context:component-scan>`\
  \ 标签时让 Spring 能扫描到该组件，我们还需要用 `@Component` 注解该类。\n*   切点被定义为返回 void 的方法。在该类中，我们定义了两个切点，两者都用\
  \ `@Pointcut` 进行了注解。我们有意将 `aop` 命名空间示例中的切点表达式拆分为两个。第一个（由方法 `fooExecution(int intValue)`\
  \ 表示）定义了 `com.apress.prospring3.ch7` 包下所有类中带有整数参数的 `foo*()` 方法的执行切点，并且该参数（`intValue`）也会被传入通知中。另一个（由方法\
  \ `inMyDependency()` 表示）定义了另一个切点，该切点匹配所有 Spring Bean 名称以 `myDependency` 开头的方法执行。另请注意，在切点表达式中我们需要使用\
  \ `&&` 来定义“与”条件，而在 `aop` 命名空间中，则需要使用 `and` 运算符。\n*   前置通知方法用 `@Before` 注解，而环绕通知用\
  \ `@Around` 注解。对于这两个通知，我们都传入了使用该类中定义的两个切点的值。值 `\"fooExecution(intValue) && inMyDependency()\"\
  ` 表示两个切点的条件都必须满足才能应用通知，这与 `ComposablePointcut` 中的“交集”操作相同。\n*   前置通知和环绕通知的逻辑与 `aop`\
  \ 命名空间示例中的相同。\n\n所有注解就位后，XML 配置变得非常简单。清单 7-29 展示了此示例的配置（`aspectjannotation.xml`）。\n\
  \n***清单 7-29.** 使用 @AspectJ 注解配置 Spring AOP*\n\n`<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"http://www.springframework.org/schema/aop`\n\
  `      http://www.springframework.org/schema/aop/spring-aop-3.1.xsd`\n`      http://www.springframework.org/schema/beans`\n\
  `      http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n`      http://www.springframework.org/schema/context`![images](img/U002.jpg)\n\
  `      http://www.springframework.org/schema/context/spring-context-3.1.xsd\">`\n\
  \n`    <aop:aspectj-autoproxy/>`\n\n`    <context:component-scan base-package=\"\
  com.apress.prospring3.ch7.aspectjannotation\"/>`\n`</beans>`\n\n只声明了两个标签。`<aop:aspect-autorpoxy>`\
  \ 用于告知 Spring 扫描 @AspectJ 风格的注解，而 `<context:component-scan>` 仍然是必需的，以便 Spring 扫描通知所在包中的\
  \ Spring Bean。我们还需要用 `@Component` 注解通知类，以表明它是一个 Spring 组件。\n\n`<aop:aspectj-autoproxy>`\
  \ 标签带有一个名为 `proxy-target-class` 的属性。默认值为 false，这意味着 Spring 将使用 JDK 动态代理创建标准的基于接口的代理。如果设置为\
  \ true，Spring 将使用 CGLIB 创建基于类的代理。\n\n清单 7-30 展示了测试程序 `AspectJAnnotationExample`\
  \ 类。\n\n***清单 7-30.** 测试 AspectJ 注解*\n\n`package com.apress.prospring3.ch7.aspectjannotation;`\n\
  \n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\n\
  `public class AspectJAnnotationExample {`\n\n`    public static void main(String[]\
  \ args) {`\n\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:aspectjannotation.xml\");`\n`        ctx.refresh();`\n\
  \n`        MyBean myBean = (MyBean) ctx.getBean(\"myBean\");`\n`        myBean.execute();`\n\
  \n`    }`\n`}`\n\n运行该程序将产生与 `aop` 命名空间示例相同的结果：\n\n`Before execution: com.apress.prospring3.ch7.aspectjannotation.MyDependency\
  \ foo argument: 100`\n`foo(int): 100`\n`After execution: com.apress.prospring3.ch7.aspectjannotation.MyDependency\
  \ foo argument: 100`\n`Executing: com.apress.prospring3.ch7.aspectjannotation.MyDependency\
  \ foo argument: 101`\n`Before execution: com.apress.prospring3.ch7.aspectjannotation.MyDependency\
  \ foo argument: 101`\n`foo(int): 101`\n`After execution: com.apress.prospring3.ch7.aspectjannotation.MyDependency\
  \ foo argument: 101`\n`bar()`\n\n#### 声明式 Spring AOP 配置的注意事项\n\n到目前为止，我们已经讨论了三种不同的声明\
  \ Spring AOP 配置的方式，包括 `ProxyFactoryBean`、`aop` 命名空间和 @AspectJ 风格的注解。我们相信你会同意 `aop`\
  \ 命名空间比 `ProxyFactoryBean` 简单得多。那么，一般的问题是，你是使用 `aop` 命名空间还是 @AspectJ 风格的注解？\n\n\
  如果你的 Spring 应用程序是基于 XML 配置的，那么使用 `aop` 命名空间方法是一个自然的选择，因为它保持了 AOP 和 DI 配置风格的一致性。另一方面，如果你的应用程序主要基于注解，那么请使用\
  \ @AspectJ 注解。@AspectJ 注解方法还有一个优点，即所有与切面相关的信息都封装在一个模块中，更易于管理。\n\n此外，`aop` 命名空间和\
  \ @AspectJ 注解方法之间还有一些其他差异：\n\n*   切点表达式的语法有一些细微差别（例如，在之前的讨论中，我们在 `aop` 命名空间中需要使用\
  \ `and`，而在 @AspectJ 注解中需要使用 `&&`）。\n*   `aop` 命名空间方法仅支持“单例”切面实例化模型。\n*   在 `aop`\
  \ 命名空间中，你无法“组合”多个切点表达式。例如，在使用 @AspectJ 的示例中，我们可以在前置和环绕通知中组合两个切点定义（即 `fooExecution(intValue)\
  \ && inMyDependency()`）。但在使用 `aop` 命名空间时无法做到这一点，你需要创建一个结合了匹配条件的新切点表达式。\n\n![images](img/square.jpg)\
  \ **注意**  当你查阅 Spring 参考手册时，还会看到另一种称为*自动代理*的机制。基本上，它提供了几种方法，让你可以在 `ApplicationContext`\
  \ 中定义通知并将其应用于多个 Spring Bean。例如，`BeanNameAutoProxyCreator` 类允许你按名称通知多个 Spring Bean，而\
  \ `DefaultAdvisorAutoProxyCreator` 类允许你将通知器应用于 `ApplicationContext` 中的 Bean，其切点逻辑在\
  \ `Advisor` 实现类中定义。然而，这两种机制现在都可以通过 `aop` 命名空间和 @AspectJ 风格注解中强大的切点表达式支持轻松处理。因此，我们决定在此跳过对自动代理的讨论，但如果你感兴趣，可以查阅\
  \ Spring 参考手册以了解详细信息。\n\n\n\n### AspectJ 集成\n\nAOP 为许多基于 OOP 的应用程序中出现的常见问题提供了强大的解决方案。使用\
  \ Spring AOP 时，你可以利用精选的 AOP 功能子集，在大多数情况下，这足以解决你在应用程序中遇到的问题。然而，在某些情况下，你可能需要使用一些超出\
  \ Spring AOP 范围的 AOP 特性。\n\n从连接点的角度来看，Spring AOP 仅支持在公共非静态方法的执行上进行切点匹配。但是，在某些情况下，你可能需要在对象构造或字段访问期间，将通知应用于受保护/私有方法等。\n\
  \n在这些情况下，你需要寻找一个功能更全面的 AOP 实现。在这种情况下，我们倾向于使用 AspectJ，并且由于你现在可以使用 Spring 配置 AspectJ\
  \ 切面，因此 AspectJ 成为了 Spring AOP 的完美补充。\n\n#### 关于 AspectJ\n\nAspectJ 是一个功能完备的 AOP\
  \ 实现，它使用织入过程（编译时或加载时织入）将切面引入你的代码。在 AspectJ 中，切面和切点是使用类似 Java 的语法构建的，这降低了 Java 开发人员的学习曲线。我们不打算花太多时间研究\
  \ AspectJ 及其工作原理，因为这超出了本书的范围。相反，我们将提供一些简单的 AspectJ 示例，并向你展示如何使用 Spring 配置它们。有关 AspectJ\
  \ 的更多信息，你绝对应该阅读 Ramnivas Laddad 所著的 *《AspectJ 实战：使用 Spring 应用程序的企业级 AOP》* 第二版（Manning，2010\
  \ 年）。\n\n![images](img/square.jpg) **注意** 我们不打算介绍如何将 AspectJ 切面织入到你的应用程序中。有关如何实现此目的的详细信息，请参阅\
  \ AspectJ 文档。或者，Eclipse 用户可以下载 Eclipse AspectJ 开发工具（AJDT），并利用完整的 IDE 集成和自动编译功能。AJDT\
  \ 也捆绑在 SpringSource Tool Suite（STS）中，因此使用 STS 时无需单独下载。\n\n#### 使用单例切面\n\n默认情况下，AspectJ\
  \ 切面是单例的，即每个类加载器只有一个实例。Spring 在处理任何 AspectJ 切面时面临的问题是，它无法创建切面实例，因为这是由 AspectJ 本身处理的。但是，每个切面都暴露了一个方法\
  \ `aspectOf()`（该方法来自 `aspectjrt` jar 库中的 `org.aspectj.lang.Aspects` 类），可用于访问切面实例。利用\
  \ `aspectOf()` 方法和 Spring 配置的一个特殊功能，你可以让 Spring 为你配置切面。这样做的好处不可低估。你可以充分利用 AspectJ\
  \ 强大的 AOP 功能集，同时又不失 Spring 出色的依赖注入和配置能力。这也意味着你的应用程序不需要两种独立的配置方法；你可以对所有 Spring 管理的\
  \ bean 和 AspectJ 切面使用相同的 Spring `ApplicationContext` 方法。\n\n实际上，使用 Spring 配置 AspectJ\
  \ 切面并没有什么特别或困难之处，如下例所示。在清单 7-31 中，你可以看到一个基本的类 `MessageWriter`，我们将使用 AspectJ 为其提供通知。\n\
  \n***清单 7-31.** `MessageWriter` 类*\n\n`package com.apress.prospring3.ch7.aspectj;`\n\
  \n`public class MessageWriter {`\n\n`    public void writeMessage() {`\n`        System.out.println(\"\
  foobar!\");`\n`    }`\n\n`    public void foo() {`\n`        System.out.println(\"\
  foo\");`\n`    }`\n`}`\n\n对于此示例，我们将使用 AspectJ 为 `writeMessage()` 方法提供通知，并在方法调用前后输出一条消息。这些消息将可通过\
  \ Spring 进行配置。\n\nSTS 捆绑了 AspectJ 开发工具，这是一个用于 AspectJ 开发的 Eclipse 插件。我们将使用它来开发示例\
  \ AspectJ 切面。要为项目启用 AspectJ 支持，请右键单击项目并选择 Configure ![images](img/U001.jpg) Convert\
  \ to AspectJ Project。图 7-5 显示了 STS 菜单。\n\n![images](img/9781430241072_Fig07-05.jpg)\n\
  \n***图 7-5.** 在 STS 中启用 AspectJ 支持*\n\n之后，我们可以通过右键单击包名 `com.apress.prospring3.ch7.aspectj`\
  \ 并选择 New ![images](img/U001.jpg) Aspect 来创建一个切面，如图 7-6 所示。\n\n![images](img/9781430241072_Fig07-06.jpg)\n\
  \n***图 7-6.** 创建新切面*\n\n但是，如果你现在构建项目，AspectJ 会报告一个关于先前示例（清单 7-28 中的 `MyAdvice` 类）的构建错误。图\
  \ 7-7 显示了 STS 中的错误。\n\n![images](img/9781430241072_Fig07-07.jpg)\n\n***图 7-7.**\
  \ `MyAdvice` 类的 AspectJ 问题*\n\n错误在于，在 @AspectJ 注解支持示例中，我们使用了 `bean()` 切点指示符，而 AspectJ\
  \ 不支持该指示符。`bean()` 切点指示符是 Spring 对 AspectJ 的扩展，其目的是支持将 bean 名称作为 @AspectJ 风格注解的切点。因此，如果我们为项目启用\
  \ AspectJ，AspectJ 工具将报告错误。要使 AspectJ 工具和 `bean()` 切点指示符共存，有两种选择：\n\n*   对于 `bean()`\
  \ 切点指示符，使用 XML 配置中的 `aop` 命名空间进行声明，而不是使用 @AspectJ 风格的注解。\n*   当你想在项目中使用 AspectJ\
  \ 时，不要使用 `bean()` 切点指示符。\n\n要消除该错误，只需暂时删除 `MyAdvice` 类。\n\n清单 7-32 显示了 `MessageWrapper`\
  \ 切面（文件名是 `MessageWrapper.aj`，这是一个 AspectJ 文件，而不是标准的 Java 类）。该切面是使用 STS 中的 New ![images](img/U001.jpg)\
  \ Aspect 选项创建的，如图 7-6 所示。\n\n***清单 7-32.** `MessageWrapper` 切面*\n\n\n\n`package\
  \ com.apress.prospring3.ch7.aspectj;`\n\n`public aspect MessageWrapper {`\n\n`    private\
  \ String prefix;`\n`    private String suffix;`\n\n`    public void setPrefix(String\
  \ prefix) {`\n`        this.prefix = prefix;`\n`    }`\n\n`    public void setSuffix(String\
  \ suffix) {`\n`        this.suffix = suffix;`\n`    }`\n\n`    pointcut doWriting()\
  \ :`\n`        execution(*`\n`           com.apress.prospring3.ch7.aspectj.MessageWriter.writeMessage());`\n\
  \n`    before() : doWriting() {`\n`        System.out.println(prefix);`\n`    }`\n\
  \n`    after() : doWriting() {`\n`        System.out.println(suffix);`\n`    }`\n\
  `}`\n\n这段代码的大部分内容应该看起来很熟悉。本质上，我们创建了一个名为 `MessageWrapper` 的切面，就像普通的 Java 类一样，我们为这个切面赋予了\
  \ `suffix` 和 `prefix` 两个属性，在通知 `writeMessage()` 方法时会用到它们。接下来，我们为一个连接点定义了一个命名切入点\
  \ `doWriting()`，在本例中，这个连接点就是 `writeMessage()` 方法的执行。（AspectJ 有大量的连接点，但涵盖这些内容超出了本示例的范围。）最后，我们定义了两组通知：一组在\
  \ `doWriting()` 切入点之前执行，另一组在其之后执行。前置通知会输出包含 `prefix` 的一行内容，后置通知则会输出包含 `suffix` 的一行内容。清单\
  \ 7-33 展示了如何在 Spring 中配置这个切面（`aspectj.xml`）。\n\n***清单 7-33.** 配置 AspectJ 切面*\n\n\
  `<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans xmlns=\"http://www.springframework.org/schema/beans`\n\
  \n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n`      http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\"\
  >`\n\n`    <bean id=\"aspect\" class=\"com.apress.prospring3.ch7.aspectj.MessageWrapper\"\
  `\n`        factory-method=\"aspectOf\">`\n`        <property name=\"prefix\">`\n\
  `            <value>Ha Ha!</value>`\n`        </property>`\n`        <property name=\"\
  suffix\">`\n`            <value>Ho Ho!</value>`\n`        </property>`\n`    </bean>`\n\
  `</beans>`\n\n如你所见，切面 Bean 的大部分配置与标准 Bean 配置非常相似。唯一的区别在于使用了 `<bean>` 标签的 `factory-method`\
  \ 属性。`factory-method` 属性旨在让遵循传统工厂模式的类能够无缝集成到 Spring 中。例如，如果你有一个类 `Foo`，它拥有私有构造函数和一个静态工厂方法\
  \ `getInstance()`，那么使用 `factory-method` 就可以让 Spring 管理这个类的 Bean。每个 AspectJ 切面暴露的\
  \ `aspectOf()` 方法允许你访问切面的实例，从而使 Spring 能够设置切面的属性。清单 7-34 展示了本示例的一个简单驱动应用程序。\n\n\
  ***清单 7-34.** AspectJ 配置实战*\n\n`package com.apress.prospring3.ch7.aspectj;`\n\n\
  `import org.springframework.context.support.GenericXmlApplicationContext;`\n\n`public\
  \ class AspectJExample {`\n\n`    public static void main(String[] args) {`\n`        GenericXmlApplicationContext\
  \ ctx = new GenericXmlApplicationContext();`\n`        ctx.load(\"classpath:aspectj.xml\"\
  );`\n`        ctx.refresh();`\n\n`        MessageWriter writer = new MessageWriter();`\n\
  `        writer.writeMessage();`\n`        writer.foo();`\n`    }`\n`}`\n\n注意，我们首先加载了\
  \ `ApplicationContext`，以便让 Spring 配置切面。接着，我们创建了一个 `MessageWriter` 实例，然后调用了 `writeMessage()`\
  \ 和 `foo()` 方法。本示例的输出如下：\n\n`Ha Ha!`\n`foobar!`\n`Ho Ho!`\n`foo`\n\n如你所见，`MessageWrapper`\
  \ 切面中的通知被应用到了 `writeMessage()` 方法上，并且在输出前置和后置消息时，通知使用了 `ApplicationContext` 配置中指定的\
  \ `prefix` 和 `suffix` 值。\n\n### 示例应用中的 AOP\n\n到目前为止，你已经看到了许多关于如何使用 Spring AOP 功能的小示例，但我们还没有探讨\
  \ AOP 在应用程序中的一些实际用途。这方面的典型例子是日志记录和安全性，我们在本章和上一章中已经简要地讨论过这些内容。然而，AOP 并不仅限于日志记录和安全性，在实现任何横切关注点的应用特定逻辑时——即应用程序中需要从大量独立组件调用的任何逻辑——它都能发挥巨大作用。在本节中，我们将概述如何在示例\
  \ SpringBlog 应用中使用 Spring AOP 来解决一个涉及横切逻辑的问题。\n\n#### 在 SpringBlog 中过滤不当言论\n\n在构建\
  \ SpringBlog 应用时，我们面临的一个问题是如何统一过滤博客帖子中的不当言论。这包括顶级博客条目以及针对特定条目的任何评论。我们需要确保既不能创建包含不当言论的条目或评论，也不能修改现有条目或评论使其包含不当言论。具体来说，我们希望能够自动用无害的替代词替换帖子中包含的不当言论。更进一步，我们决定在某些情况下，博客所有者可能实际上希望能够在自己的条目中添加不当言论（作为自己的审核员），但希望限制博客读者发布包含不当言论的评论。\n\
  \n解决这个问题的传统方法是定义一个接口（例如，`ObscenityFilter` 接口），然后构建该接口的实现，并通过某个工厂类使其可访问。接着，在创建或修改条目或评论的每个方法中，调用\
  \ `ObscenityFilter` 来移除帖子中的不当言论。然而，这种方法的主要问题是，所有涉及处理博客条目和评论的业务逻辑都必须记得实现这个检查。\n\n\
  使用 Spring AOP，我们可以创建一个更优雅的解决方案：将不当言论检查分解为一个前置通知，并将其应用于任何接受博客条目或评论领域对象作为参数的方法。这个实现的一个有趣之处在于，在大多数情况下，我们只是遵循了传统方法中建议的良好\
  \ OOP 实践。我们定义了一个接口 `ObscenityFilter`，然后构建了一个实现。得益于 Spring DI，我们避免了创建工厂类的需要，但通过遵循良好实践，我们构建了一个在\
  \ AOP 和非 AOP 环境中都能同样良好运行的不当言论过滤器。\n\n##### BlogPosting 接口\n\n在博客中，有两种不同类型的帖子：主博客条目（由\
  \ `Entry` 对象表示）和关于条目的评论（由 `Comment` 对象表示）。尽管这两个对象代表不同类型的帖子，但它们确实具有相似的特征，例如正文、主题、附件和发布日期。因此，我们创建了一个接口\
  \ `BlogPosting`，它允许同时操作 `Comment` 和 `Entry`。由于 `Comment` 和 `Entry` 的所有字符串类型属性都暴露在\
  \ `BlogPosting` 接口上，因此我们在不当言论过滤器通知中使用了 `BlogPosting` 接口。\n\n\n\n##### 实现 ObscenityFilter\n\
  \n对于 SpringBlog 应用程序，我们决定创建一个 `ObscenityFilter` 的实现，该实现允许将要过滤的违禁词列表指定为一个 List，并使用\
  \ ROT13 算法替换这些违禁词。完成 `ObscenityFilter` 接口的实现（即 `ListBasedObscenityFilter` 类）后，我们创建了一个通知（即\
  \ `ObscenityFilterAdvice`），该通知允许将违禁词过滤功能声明式地应用于任何接受 `Entry` 或 `Comment` 参数的方法。`ObscenityFilterAdvice`\
  \ 的基础是修改传递给方法的参数，以便将 `Entry` 或 `Comment` 对象中的任何字符串属性替换为其混淆后的替代内容。由于我们只需要查看传递给方法的参数并可能对其进行修改，因此前置通知非常适合此场景。此外，我们决定使用\
  \ @AspectJ 风格的注解来实现该通知。\n\n##### 违禁词过滤器总结\n\n正如您从本节示例中所见，AOP 在实际应用程序中有许多实用之处。我们发现，通过使用\
  \ AOP 实现违禁词过滤器，我们能够使 SpringBlog 应用程序的 `service` 层代码更加简洁，并且还能减少应用程序中的代码重复。当您使用 Spring\
  \ 构建自己的应用程序时，花时间识别横切逻辑是值得的。一旦完成此操作，定义与之交互的接口，构建实现，然后，不要使用工厂并在代码中嵌入对接口的调用，而是使用 Spring\
  \ AOP 将逻辑透明地织入您的应用程序中。有关违禁词过滤器实现及其源代码的详细说明，请参阅第 21 章中的“使用 AOP 实现违禁词过滤器”一节。\n\n###\
  \ 总结\n\n在本章中，我们结束了关于 AOP 的讨论。我们探讨了切入点的高级选项，以及如何使用引入（introductions）来扩展对象实现的接口集。本章的很大一部分内容集中在使用\
  \ Spring 框架服务以声明方式配置 AOP，从而避免将 AOP 代理构建逻辑硬编码到代码中。我们花了一些时间研究 Spring 和 AspectJ 是如何集成的，以便您能够在不损失\
  \ Spring 任何灵活性的情况下，利用 AspectJ 更强大的功能。在下一章中，我们将转向一个完全不同的主题——如何使用 Spring 的 JDBC 支持来极大地简化基于\
  \ JDBC 的数据访问代码的创建。\n\n## 第 8 章\n\n## Spring JDBC 支持\n\n在前面的章节中，您已经了解到构建一个完全由 Spring\
  \ 管理的应用程序是多么容易。现在，您对 Bean 配置和面向切面编程（AOP）有了扎实的理解——换句话说，您知道如何使用 Spring 来装配整个应用程序。然而，拼图的一部分仍然缺失：如何获取驱动应用程序的数据？\n\
  \n除了简单的、一次性的命令行工具之外，几乎每个应用程序都需要将数据持久化到某种数据存储中。最常见且最方便的数据存储是关系型数据库。\n\n最著名的开源关系型数据库可能是\
  \ MySQL ([`www.mysql.com`](http://www.mysql.com)) 和 PostgreSQL ([`www.postgresql.org`](http://www.postgresql.org))。在提供的\
  \ RDBMS 功能方面，这两个数据库大致相同。MySQL 通常更广泛地用于 Web 应用程序开发，尤其是在 Linux 平台上。另一方面，PostgreSQL\
  \ 对 Oracle 开发者更友好，因为它的过程化语言 PL/pgSQL 非常接近 Oracle 的 PL/SQL 语言。\n\n即使您选择了最快、最可靠的数据库，也不能因为使用设计不良且实现不佳的数据访问层而损失其提供的速度和灵活性。应用程序往往会非常频繁地使用数据访问层；因此，数据访问代码中任何不必要的瓶颈都会影响整个应用程序，无论其设计得多么好。\n\
  \n在本章中，我们将向您展示如何使用 Spring 来简化使用 JDBC 实现数据访问代码的过程。我们首先看看在没有 Spring 的情况下通常需要编写的令人头疼的大量代码，然后将其与使用\
  \ Spring 数据访问类实现的数据访问类进行比较。结果令人惊叹——Spring 允许您充分利用人工优化的 SQL 查询的全部功能，同时最大限度地减少需要实现的支持代码量。具体来说，我们将讨论以下内容：\n\
  \n*   *比较传统 JDBC 代码和 Spring JDBC 支持*：我们将探讨 Spring 如何在保持相同功能的同时简化旧式 JDBC 代码。您还将看到\
  \ Spring 如何访问底层 JDBC API，以及这个底层 API 如何映射到诸如 `JdbcTemplate` 之类的便捷类。\n*   *连接数据库*：尽管我们不会深入探讨数据库连接管理的每一个细节，但我们确实会向您展示简单的\
  \ `Connection` 和 `DataSource` 之间的根本区别。自然地，我们会讨论 Spring 如何管理 `DataSource`，以及您可以在应用程序中使用哪些数据源。\n\
  *   *检索数据并将其映射到 Java 对象*：我们将向您展示如何检索数据，然后有效地将选定的数据映射到 Java 对象。您还将了解到 Spring JDBC\
  \ 是对象关系映射（ORM）工具的一个可行替代方案。\n*   *插入、更新和删除数据*：最后，我们将讨论如何实现插入、更新和删除操作，以便您所使用的数据库的任何更改都不会对您编写的代码产生破坏性影响。\n\
  \n**什么是数据库？**\n\n开发者有时很难描述什么是数据库。在某些情况下，数据库代表实际的数据；在其他情况下，它可能代表管理数据的软件、该软件进程的一个实例，甚至是运行该管理进程的物理机器。从形式上讲，数据库是数据的集合；数据库软件（如\
  \ Oracle、PostgreSQL、MySQL 等）被称为*数据库管理软件*，或者更具体地说，是*关系型数据库管理系统*（RDBMS）；RDBMS 的实例被称为*数据库引擎*；最后，运行数据库引擎的机器被称为*数据库服务器*。然而，大多数开发者都能从使用该术语的上下文中立即理解*数据库*一词的含义。这就是为什么我们使用这个术语来代表刚刚描述的四种含义。\n\
  \n近年来，由于互联网和云计算技术的爆炸式增长，出现了许多特定用途的 Web 应用程序，例如社交网络、搜索引擎、地图、视频等。为了满足这些应用程序特定的数据访问需求，还开发了许多不同类别的“数据库”。一些例子包括键值对数据库（通常称为\
  \ NoSQL 数据库）、图形数据库、以文档为中心的数据库等等。因此，*数据库*现在是一个更广泛的术语。然而，对这些非关系型数据库的讨论不在本书的范围内，在本书中，当我们提到数据库时，我们指的是\
  \ RDBMS。\n\n\n\n### 示例代码的样本数据模型\n\n在开始讨论之前，我们先介绍一个非常简单的数据模型，它将用于本章以及后续几章中讨论其他数据访问技术时的示例（随着内容的推进，我们会相应地扩展该模型以满足每个主题的需求）。\n\
  \n该模型是一个非常简单的联系人数据库，包含两个表。第一个表是 `CONTACT` 表，用于存储联系人的信息；另一个表是 `CONTACT_TEL_DETAIL`\
  \ 表，用于存储联系人的电话号码详情。每个联系人可以有零个或多个电话号码；换句话说，`CONTACT` 和 `CONTACT_TEL_DETAIL` 之间是一对多的关系。联系人的信息包括名字、姓氏和出生日期，而电话号码详情信息则包括电话类型（手机、家庭电话等）和相应的电话号码。图\
  \ 8-1 展示了该数据库的实体关系（ER）图。\n\n![images](img/9781430241072_Fig08-01.jpg)\n\n***图 8-1.**\
