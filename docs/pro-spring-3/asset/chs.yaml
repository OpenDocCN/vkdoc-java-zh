  \ 中的数据填充脚本。\n\n到目前为止，你已经了解了如何使用 `JdbcTemplate` 执行一些常见的查询操作。`JdbcTemplate`（以及 `NamedParameterJdbcTemplate`\
  \ 类）还提供了许多重载的 `update()` 方法，用于支持数据更新操作，包括插入、更新、删除等。不过，`update()` 方法不言自明，因此我们决定不在本节中介绍它。\n\
  \n另一方面，正如你将在后续章节中看到的，我们将使用 Spring 提供的 `SqlUpdate` 类来执行数据更新操作。\n\n### 建模 JDBC 操作的\
  \ Spring 类\n\n在前一节中，你看到了 `JdbcTemplate` 和相关数据映射工具类如何极大地简化了使用 JDBC 开发数据访问逻辑的编程模型。基于\
  \ `JdbcTemplate`，Spring 还提供了一些有用的类来建模 JDBC 数据操作，让开发者能够以更面向对象的方式维护查询逻辑以及从结果集到领域对象的转换逻辑。如前所述，这些类被打包在\
  \ `org.springframework.jdbc.object` 下。具体来说，我们将讨论以下类：\n\n> *MappingSqlQuery<T>*：`MappingSqlQuery<T>`\
  \ 类允许你将查询字符串与 `mapRow()` 方法封装到一个单独的类中。\n> \n> *SqlUpdate*：`SqlUpdate` 类允许你将任何 SQL\
  \ 更新语句封装到其中。它还提供了许多有用的功能，用于绑定 SQL 参数、在插入新记录后检索 RDBMS 生成的键等。\n> \n> *BatchSqlUpdate*：顾名思义，该类允许你执行批量更新操作。例如，你可以遍历一个\
  \ Java `List` 对象，让 `BatchSqlUpdate` 将记录排队，并批量提交更新语句。你可以随时设置批量大小并刷新操作。\n> \n> *SqlFunction<T>*：`SqlFunction<T>`\
  \ 类允许你使用参数和返回类型调用数据库中的存储函数。另一个类 `StoredProcedure` 也存在，它可以帮助你调用存储过程。\n\n![images](img/square.jpg)\
  \ **注意**  在前面的章节中，所有示例代码都使用 XML 类型的配置。因此，在接下来的章节中，我们将使用 Spring 注解进行 `ApplicationContext`\
  \ 配置。如果你决定在应用程序中采用 XML 配置，我们相信你会知道如何操作。\n\n#### 使用注解设置 JDBC DAO\n\n首先，让我们看看如何使用注解设置\
  \ DAO 实现类。清单 8-32 展示了 `ContactDao` 接口类，其中更完整地列出了它提供的数据访问服务。\n\n***清单 8-32.** `ContactDao`\
  \ 接口*\n\n`package com.apress.prospring3.ch8.dao;`\n\n`// 导入语句已省略`\n`public interface\
  \ ContactDao {`\n\n`    public List<Contact> findAll();`\n\n`    public List<Contact>\
  \ findAllWithDetail();`\n\n`    public List<Contact> findByFirstName(String firstName);`\n\
  \n`    public String findFirstNameById(Long id);`\n\n`    public String findLastNameById(Long\
  \ id);`\n\n`    public void insert(Contact contact);`\n\n`    public void update(Contact\
  \ contact);`\n\n`    public void delete(Long contactId);`\n\n`}`\n\n在清单 8-33 中，展示了使用\
  \ JSR-250 注解对数据源属性进行初始声明和注入。类名为 `JdbcContactDao`，但这次我们将其放在包 `com.apress.prospring3.ch8.dao.jdbc.annotation`\
  \ 下。\n\n***清单 8-33.** 使用注解声明 `JdbcContactDao`*\n\n`package com.apress.prospring3.ch8.dao.jdbc.annotation;`\n\
  \n`import javax.annotation.Resource;`\n`import javax.sql.DataSource;`\n\n`import\
  \ org.apache.commons.logging.Log;`\n`import org.apache.commons.logging.LogFactory;`\n\
  `import org.springframework.stereotype.Repository;`\n\n`import com.apress.prospring3.ch8.dao.ContactDao;`\n\
  \n`@Repository(\"contactDao\")`\n`public class JdbcContactDao implements ContactDao\
  \ {`\n\n`    private Log log = LogFactory.getLog(JdbcContactDao.class);`\n\n`  \
  \  private DataSource dataSource;`\n\n`    @Resource(name=\"dataSource\")`\n`  \
  \  public void setDataSource(DataSource dataSource) {`\n`        this.dataSource\
  \ = dataSource;`\n`    }`\n\n`    public DataSource getDataSource() {`\n`      \
  \  return dataSource;`\n`    }`\n`}`\n\n在上一个清单中，我们使用 `@Repository` 声明了一个名为 `contactDao`\
  \ 的 Spring bean，并且由于该类包含数据访问代码，`@Repository` 还指示 Spring 将特定于数据库的 SQL 异常转换为更适用于应用程序的\
  \ Spring `DataAccessException` 层次结构。\n\n我们还使用 Apache `commons-logging` 声明了日志变量，用于在程序中记录消息。对于数据源属性，我们使用\
  \ JSR-250 的 `@Resource` 让 Spring 注入名为 `dataSource` 的数据源。\n\n我们将逐一实现 `ContactDao`\
  \ 接口中的方法。同时，让我们先在 `JdbcContactDao` 类中创建所有方法的空实现。一种简单的方法是使用 STS 为我们生成空实现。在 STS 中，右键单击该类，然后选择\
  \ Source ![images](img/U001.jpg) Override/Implement Methods（参见图 8-2）。\n\n![images](img/9781430241072_Fig08-02.jpg)\n\
  \n***图 8-2.** 在 STS 中实现方法*\n\n在下一个屏幕中，`ContactDao` 接口下的所有方法应该已经被选中，如图 8-3 所示。只需单击\
  \ OK，所有选定方法的空实现将自动创建。\n\n![images](img/9781430241072_Fig08-03.jpg)\n\n***图 8-3.**\
  \ 选择在 STS 中实现方法*\n\n之后，你将看到生成了空实现方法。然后我们可以逐步实现这些方法。\n\n清单 8-34 展示了使用注解的 Spring XML\
  \ 配置（`app-context-annotation.xml`）。\n\n***清单 8-34.** 使用注解的 Spring 配置*\n\n`<?xml\
  \ version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\n\n\n`    xsi:schemaLocation=\"\
