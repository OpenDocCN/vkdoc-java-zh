  \ Spring Security 保护 Web 应用程序\n\n假设现在我们想要保护我们的联系人应用程序。只有使用有效用户 ID 登录到应用程序的用户才能添加新联系人或更新现有联系人。其他用户，称为匿名用户，只能查看联系人信息。\n\
  \nSpring Security 是保护基于 Spring 的应用程序的最佳选择。尽管主要用于表示层，但 Spring Security 可以帮助保护应用程序内的所有层，包括服务层。在以下各节中，我们将演示如何使用\
  \ Spring Security 来保护联系人应用程序。\n\n表 17-8 列出了 Spring Security 所需的依赖项。\n\n![images](img/t1708.jpg)\n\
  \n#### 配置 Spring Security\n\n要配置 Spring Security，首先我们需要在 Web 部署描述符（`web.xml`）中配置一个过滤器。清单\
  \ 17-57 展示了您需要添加到 `web.xml` 文件的代码片段。\n\n***清单 17-57.** 配置 Spring Security 过滤器*\n\
