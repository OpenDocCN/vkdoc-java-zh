  \ contactId);`\n\n`}`\n\n***清单 11-52.** `ContactTelDetailMapper.xml` 映射文件*\n\n`    <delete\
  \ id=\"deleteTelDetailForContact\" parameterType=\"long\">`\n`        DELETE FROM\
  \ CONTACT_TEL_DETAIL WHERE CONTACT_ID = #{contactId}`\n`    </delete>`\n\n对于 `ContactHobbyDetailMapper`\
  \ 接口，我们不需要添加新操作，因为在更新操作中已经实现了删除联系人爱好映射的操作。\n\n现在我们可以继续在 `ContactServiceImpl` 类中实现\
  \ `delete()` 方法。清单 11-53 展示了代码片段。\n\n***清单 11-53.** 实现删除操作*\n\n`    // 其他代码已省略`\n\
  `    public void delete(Contact contact) {`\n`        Long contactId = contact.getId();`\n\
  `        contactTelDetailMapper.deleteTelDetailForContact(contactId);`\n`        contactHobbyDetailMapper.deleteHobbyDetailForContact(contactId);`\n\
  `        contactMapper.deleteContact(contactId);`\n`    }`\n\n删除方法非常简单。首先我们删除子记录，包括电话和爱好详情。然后我们删除联系人记录。\n\
  \n为了测试删除操作，将清单 11-54 中的代码片段添加到 `MyBatisSample` 类的 `main()` 方法中。\n\n***清单 11-54.**\
  \ 测试 `delete()` 方法的实现*\n\n`        // 删除联系人`\n`        System.out.println(\"删除 id\
  \ 为 1 的联系人\");`\n`        contact = contactService.findById(1l);`\n`        contactService.delete(contact);`\n\
  `        contacts = contactService.findAllWithDetail();`\n`        listContactsWithDetail(contacts);`\n\
  \n运行程序将删除 ID 为 1 的联系人。\n\n### 使用 MyBatis 时的注意事项\n\n从本章提供的示例可以看出，MyBatis 是一个专注于 SQL\
  \ 映射的优秀数据访问库。在使用 MyBatis 开发应用程序时，大部分时间你将专注于结果映射以及各种 select、insert、update 和 delete\
  \ 操作的设计与映射。\n\n在映射方面，MyBatis 提供了丰富的标签集，可以帮助你构建动态且复杂的查询，并轻松映射到相应的领域对象。从示例中你还可以看到，我们不需要直接与\
  \ `SqlSession` 接口交互。大多数情况下，映射器接口就能满足你的需求。\n\n但是，如果你愿意，也可以选择与 `SqlSession` 接口交互，并以编程方式构建查询。\n\
  \n总之，如果你更倾向于对提交给数据库的 SQL 语句有更多控制权，并且希望以一种灵活且简单的方式定义结果集到领域对象的映射，那么 MyBatis 提供了比 JDBC\
  \ 更优雅的解决方案。\n\n然而，使用 MyBatis 时也有一些注意事项。例如，你需要实现记录锁定机制（例如，用于乐观锁定的 `VERSION` 列），并手动维护历史记录的版本。此外，如果数据模型频繁更改，你将需要审查所有受此更改影响的查询。在持续维护方面，使用\
  \ MyBatis 的工作量将高于使用 Hibernate 和 JPA 等 ORM 库。\n\n### 在示例应用程序中使用 MyBatis\n\n在本节中，我们将结合将要开发的示例应用程序讨论本章中的主题。主题包括后端数据库以及针对各种数据库操作的\
  \ MyBatis 实现。\n\n我们还将重点介绍如何利用 MyBatis 的特性来简化数据访问逻辑。\n\n最后，我们将讨论如何跟踪基本的审计信息，以及如何实现实体版本控制功能，即使\
  \ MyBatis 并未对这些功能提供开箱即用的支持。\n\n#### 数据库后端\n\n对于数据库后端，将使用基于 H2 的 JDBC 嵌入式数据库。但是，脚本（数据库创建脚本、初始数据填充脚本）也将设计为与\
  \ MySQL 兼容。因此，在需要时，应用程序能够使用 MySQL 作为后端数据库。\n\n对于 Spring 的 `ApplicationContext` 配置，我们将简单地使用\
  \ `<jdbc:embedded-database>` 标签来声明一个嵌入式数据库。将开发两个 SQL 脚本。一个用于数据库创建（称为 `schema.sql`），另一个用于初始数据（例如，初始用户、类别和子类别、示例博客条目等）填充（称为\
  \ `initial-data.sql`）。\n\n#### 使用 MyBatis 实现持久层\n\n如第 3 章所述，对于持久层，将提供两种不同的实现。一种使用\
  \ JPA，另一种使用 MyBatis。\n\n对于 MyBatis 实现，我们将使用 MyBatis 3。更具体地说，将采用 MyBatis 映射器接口和 XML\
  \ 风格的映射配置。所有实体类都将放在包 `com.apress.prospring3.springblog.domain` 下（实际上，JPA 和 MyBatis\
  \ 将使用同一组领域对象进行映射）。\n\n此外，所有 MyBatis 映射器接口（例如，用于支持 `Entry` 实体类的 `EntryMapper` 接口）都将放在包\
  \ `com.apress.prospring3.springblog.persistence` 下。此外，为了支持在 Web 应用程序前端浏览博客文章条目，还将实现分页支持。\n\
  \n在数据库操作方面，查询是最复杂的部分，因为在前端，用户可以选择按发布日期、类别和子类别等过滤文章条目。为了满足这一需求，我们将使用 MyBatis 的动态\
  \ SQL 功能。\n\n\n\n#### 审计与实体版本控制\n\n在示例应用中，所有博客文章和评论都将启用审计功能。\n\n为了跟踪博客文章和评论的基本审计信息（创建人、创建日期、最后修改人、最后修改日期），并保留每条记录的版本，我们将利用\
  \ MyBatis 的插件机制拦截更新操作的调用，并相应地填充基本审计信息（创建人、创建日期、最后修改人、最后修改日期）。另一方面，更新前的记录副本将被保存到历史表中。\n\
  \n详情请参考第 21 章中的“MyBatis 服务实现”一节。\n\n### 本章小结\n\n在本章中，我们讨论了在使用 Spring 开发数据访问逻辑时，如何与\
  \ MyBatis（原 iBATIS）进行集成。主题包括核心概念、配置和映射定义等。\n\n接着，我们讨论了如何使用 MyBatis 执行各种数据库操作。我们涵盖了使用不同关联检索数据的各种技术，以及如何使用动态\
  \ SQL。\n\n在本章中，我们仅涵盖了在实现最常见的数据库操作时，MyBatis 可用功能的一小部分。有关 MyBatis 及其文档的详细信息，请参考项目网站（[`www.mybatis.org`](http://www.mybatis.org)）。\n\
  \n## 第 12 章\n\n## 设计与实现基于 Spring 的应用\n\n在前面的章节中，我们讨论了与使用 Spring 进行应用开发相关的各种主题，包括\
  \ Spring 的 `ApplicationContext` 配置、各种 DI 机制、用于横切关注点的 AOP 支持，以及 Spring 如何与不同的数据访问技术集成以与后端关系数据库进行交互。\n\
  \n在讨论数据访问逻辑的实现时，你看到了如何使用不同的实现模式。例如，在第 8 章中，涵盖了使用 JDBC 进行数据访问，数据访问逻辑被封装在 DAO 中。在第\
  \ 10 章和第 11 章中，讨论 JPA 和 MyBatis 时，我们取消了 DAO 层，并将 JPA 的 `EntityManager` 和 MyBatis\
  \ 的映射器接口直接注入到服务层。在这些章节中，我们还提到了领域对象（或 JPA 术语中的实体类）的设计，并展示了如何对其属性和关系进行建模并映射到数据库结构。\n\
  \n在继续之前，让我们暂时从编程主题中抽身，讨论一下设计和实现基于 Spring 的应用的一些主要原则。我们相信，在这里退一步，重新审视 JEE 应用的设计实践，将有助于你在后续学习整体应用架构时更好地关联各个主题。\n\
  \n应用设计是一个大话题，我们并不打算涵盖其所有方面。在本章中，我们将讨论一些经过验证的 OOP 实践，这些实践能够产生具有明确定义的组件职责且易于测试和维护的应用。本章将探讨\
  \ Spring 对应用设计的影响，特别关注那些你在使用 Spring 构建应用时会发现易于应用的模式和实践。本章的大部分内容将聚焦于我们在构建 SpringBlog\
  \ 应用时所做出的设计决策，并将该应用作为我们示例和讨论的基础。除了应用设计原则，我们还将讨论如何使用到目前为止所涵盖的许多 Spring 技术来实现 SpringBlog\
  \ 应用的数据访问层和服务层。\n\n具体来说，本章将探讨以下内容：\n\n*   **接口驱动设计**：接口驱动设计是一种传统的 OOP 最佳实践。当你使用接口驱动设计时，应用的主要组件是通过接口而非具体类来定义的。Java\
  \ 通过其将接口与类分离的概念，为此类设计提供了一流的支持。在本节中，我们将从一般意义上讨论接口驱动设计，以及为什么你应该在应用中使用它。\n*   **构建领域对象模型**：在本节中，我们将探讨领域对象模型（DOM）的概念，它是一个对象集合，为应用问题领域中的数据提供了抽象模型。通过为你的应用创建\
  \ DOM，你正在创建一组用于建模应用数据和行为的对象，这些对象与你问题领域的某些抽象概念相匹配。\n*   **数据访问层**：如今大多数应用都需要访问某种持久化数据存储，通常是关系数据库。第\
  \ 8 章到第 11 章讨论了 Spring 对各种不同数据访问方法的支持。在本节中，我们将研究与构建数据访问层以服务于应用其他部分相关的设计问题。\n*  \
  \ **构建服务层**：应用的服务层封装了构成应用的所有业务逻辑。在本节中，我们将探讨服务层如何与领域对象模型和数据访问层交互，以提供访问应用功能的统一接口。我们还将研究\
  \ SpringBlog 应用的业务需求，以及这些需求如何转化为接口设计及该接口的实现。\n\n你应该注意，本章不涉及应用 Web 层的设计或实现；这将在第 17\
  \ 章和第 18 章中更详细地介绍。特别是，我们不会介绍 SpringBlog 服务层如何被 Web 前端使用，也不会探讨 Spring 如何使用验证逻辑来支持前端的数据验证和错误报告。这两个主题都将在第\
  \ 17 章和第 18 章中介绍。\n\n### 面向接口设计\n\n无论你使用哪种框架或标准（Spring、JBoss Seam、Guice、EJB 等），面向接口设计都是架构和实现应用时的常见实践。Spring\
  \ 的主要设计目标之一就是进一步简化围绕一组定义良好的接口进行设计和实现的应用的开发。在我们详细探讨如何设计基于 Spring 的应用之前，应该先探究一下为什么面向接口设计如此重要，以及\
  \ Spring 是如何使其变得更容易的。\n\n\n\n#### 为何面向接口设计\n\n在设计和编码应用程序时，有许多理由让你选择面向接口而非具体的类层次结构，但最重要的原因或许是降低耦合度。如果应用程序中的组件通过接口而非具体类型进行通信，那么当某个组件出现问题时，替换它会变得非常容易。这种能力让你能够从一个实现切换到另一个实现，而无需修改应用程序的其他代码；实际上，你的应用程序甚至可以在不知情的情况下，与同一接口的多种不同实现协同工作。例如，在\
  \ Spring 中使用 profile 支持时，你可以为同一接口提供不同的具体实现，而不会对应用程序的其他部分产生任何影响。\n\n同时请记住，在 Java\
  \ 中，一个类只能有一次具体继承的机会，但可以实现任意数量的接口。通过面向接口而非类来定义应用程序组件，你不会不必要地将实现类限制在某个特定的基类上。正如我们在第\
  \ 7 章中讨论的，另一个好处是，使用接口使得采用 AOP 的引入支持成为可能，从而在解决横切关注点时，能够将特定接口“混入”目标 Bean 中，而无需在目标组件的源代码中引入额外的复杂性。\n\
  \n在测试方面，这种松散耦合带来的主要好处之一是提高了可测试性。作为忙碌开发团队的负责人，我们不断寻求新的方法来提高所生产应用程序的测试覆盖率，以此作为提升交付给客户产品质量的直接途径。通过面向接口设计，我们可以将接口的实现替换为模拟实现，这让我们在测试时拥有更大的灵活性。例如，在对\
  \ Web 控制器进行单元测试时，我们肯定希望专注于控制器行为是否正确，并假设它所依赖的服务类工作正常。在这种情况下，提供一个始终向被测 Web 控制器返回预期结果的“模拟”版本服务类将非常有用。\n\
  \n#### 工厂模式\n\n在实现一个所有组件都通过接口定义的应用程序时，你会遇到的一个关键问题是如何让应用程序找到实现这些接口的类的实例。传统的解决方案是使用工厂模式。工厂模式定义了一个类，其职责是为应用程序组件提供其他应用程序组件的实现；在这种情况下，可用的组件是通过接口而非具体实现来定义的。考虑一个拥有名为\
  \ `OrderService` 的业务接口的系统。系统中的其他组件希望获得该接口的实现，而无需事先知道它们需要哪个实现。为了实现这样一个系统，我们可以构建一个如清单\
  \ 12-1 所示的 `Factory` 类。请注意，`OrderService` 接口和 `DefaultOrderServiceImpl` 实现类（它实现了\
  \ `OrderService` 接口）都是空的，没有定义任何方法。\n\n***清单 12-1.** 一个基本的 `Factory` 类实现*\n\n`package\
  \ com.apress.prospring3.ch12.factory;`\n\n`import com.apress.prospring3.ch12.service.OrderService;`\n\
  `import com.apress.prospring3.ch12.service.impl.DefaultOrderServiceImpl;`\n\n`public\
  \ class BasicFactory {`\n`    private static final BasicFactory instance;`\n`    private\
  \ OrderService orderService;`\n\n`    static {`\n`        instance = new BasicFactory();`\n\
  `    }`\n\n`    public static BasicFactory getlnstance() {`\n`        return instance;`\n\
  `    }`\n\n`    public BasicFactory() {`\n`        this.orderService = new DefaultOrderServiceImpl();`\n\
  `    }`\n\n`    public OrderService getOrderService() {`\n`        return this.orderService;`\n\
  `    }`\n`}`\n\n这是一个简单的 `Factory` 实现，但它确实说明了基本的工厂模式方法。现在，任何想要获取 `OrderService` 实现的应用程序只需使用\
  \ `BasicFactory` 类的 `getOrderService()` 方法即可。\n\n##### 基本工厂模式的缺点\n\n在其基本形式中，工厂模式有三个主要缺点：\n\
  \n*   无法在不重新编译的情况下更改实现类。\n*   无法透明地向不同组件提供多个实现。这是一个更大问题的一部分，即 `Factory` 类要求每个组件对\
  \ `Factory` 以及要调用 `Factory` 上的哪个方法有一定的了解。\n*   无法简单地切换实例化模型。在清单 12-1 中，我们维护了 `DefaultOrderServiceImpl`\
  \ 的单例实例，但如果我们想返回多个实例，就必须重新编译 `Factory` 类。\n\n这些缺点将在接下来的三节中详细讨论。\n\n##### 外部可配置的工厂\n\
  \n从清单 12-1 的示例中可以看出，更改实现类意味着更改 `BasicFactory` 类并重新编译。基于接口的设计的好处之一是你可以非常轻松地替换实现。然而，必须重新编译\
  \ `Factory` 在一定程度上削弱了这种便利性。在过去许多项目中，在 Spring 出现之前，我们创建了允许在外部配置文件中指定接口实现类的工厂（正如你在第\
  \ 2 章中实现 `MessageSupportFactory` 类时所看到的）。这解决了最初的问题，但给我们的项目增加了更多的开发负担，并且对于剩下的两个问题并没有真正的帮助。\n\
  \n\n\n##### 透明地支持多种实现\n\n透明地支持多种实现或许是传统工厂模式最大的缺点。`BasicFactory` 类上的基本方法 `getOrderService()`\
  \ 只能返回一种特定的实现（或随机选择），但它无法根据调用者来选择返回哪种实现。这自然会导致出现如清单 12-2 所示的实现。请注意，`SuperOrderServiceImpl`\
  \ 也是一个空类，它实现了 `OrderService` 接口。\n\n***清单 12-2.** 对多种实现的基本支持*\n\n`package com.apress.prospring3.ch12.factory;`\n\
  \n`import com.apress.prospring3.ch12.service.OrderService;`\n`import com.apress.prospring3.ch12.service.impl.DefaultOrderServiceImpl;`\n\
  `import com.apress.prospring3.ch12.service.impl.SuperOrderServiceImpl;`\n\n`public\
  \ class MultiFactory {`\n`    private static final BasicFactory instance;`\n`    private\
  \ OrderService orderService;`\n`    private OrderService superOrderService;`\n`    static\
  \ {`\n`        instance = new BasicFactory();`\n`    }`\n`    public static BasicFactory\
  \ getInstance() {`\n`        return instance;`\n`    }`\n\n`    public MultiFactory()\
  \ {`\n`        this.orderService = new DefaultOrderServiceImpl();`\n`        this.superOrderService\
  \ = new SuperOrderServiceImpl();`\n`    }`\n\n`    public OrderService getOrderService()\
  \ {`\n`        return this.orderService;`\n`    }`\n\n`    public OrderService getSuperOrderService()\
  \ {`\n`        return this.superOrderService;`\n`    }`\n`}`\n\n通过这种实现，需要访问 `SuperOrderServiceImpl`\
  \ 实现类的组件可以调用 `getSuperOrderService()` 方法。然而，这种方法恰恰抵消了工厂的优势。虽然组件在类层面没有与特定实现耦合，但它们却通过调用工厂的方法而耦合在一起。这种方法的另一个缺点是，每增加一个新的实现，都需要修改\
  \ `Factory` 代码以及需要该新实现的组件。为每个新实现添加一个新方法，使得这种方法很难从外部进行配置。\n\n另一种试图解决透明支持多种实现问题的实现，要求调用\
  \ `getOrderService()` 方法的组件将自己的类作为参数传递给该方法，以便工厂能够根据调用者的类来决定返回哪个实现。这种实现存在许多问题，其中之一便是它仅适用于类，这意味着同一个类的两个实例无法拥有不同的\
  \ `OrderService` 实现。你还会发现，当有许多组件需要 `OrderService` 实现时，`getOrderService()` 方法的实现很快就会变得混乱不堪。\n\
  \n解决这个问题的一个稍微优雅的方法是采用查找风格的方式，让每个组件通过一个键来查找实现。因此，组件不再调用 `getOrderService()`，而是调用\
  \ `getOrderService(\"someKey\")`。这种方法的缺点是，为了保持完全的灵活性，每个组件必须使用一个独立的键，以便其实现可以与其他组件分开更改。当依赖对象想要同一个业务服务的不同实现时，它仍然需要更改代码以使用相应实现的键。\n\
  \n这个问题的根源在于，组件必须主动请求一个实现类，而为了获得完全的灵活性并确保每个组件都能获得其所需的适当的具体实现类，这个请求必须是完全唯一的。这是传统工厂模式无法解决的问题。\n\
  \n##### 支持多种实例化模式\n\n另一个问题是为不同组件支持实现类的多种实例化模式。这个问题存在许多与上一节讨论的类似问题，同样，其核心在于组件必须主动请求一个实现类。这个问题也无法通过传统工厂模式解决。幸运的是，Spring\
  \ 解决了所有这些问题；我们将在下一节讨论如何解决。\n\n#### Spring 对基于接口设计的影响\n\nSpring 对使用接口设计的应用程序有着巨大的影响。由于\
  \ Spring 负责将所有组件装配在一起，你不再需要担心创建那些考虑所有可能情况的 `Factory` 类。\n\n表面上看，在构建基于接口的应用程序时，Spring\
  \ 带来的最大好处是减少了你必须编写的胶水代码。这种好处通过其对组件依赖关系外部配置的出色开箱即用支持得到了进一步增强。然而，最大的好处来自于 Spring 对依赖注入的使用。因为\
  \ Spring 将依赖定位的责任从组件本身移除，只要求组件允许它为其提供依赖，所以 Spring 能够解决前面讨论的三个问题中的后两个。\n\n依赖注入意味着\
  \ Spring 可以将任何实现类的任何实例提供给任何应用程序组件的任何实例，而无需在应用程序组件中进行任何特殊编码。这还结合了这样一个事实：Spring 可以自由地管理其为应用程序组件管理的任何依赖项的任何实例的生命周期。\n\
  \n基本上，这意味着 Spring 拥有我们设计基于接口的应用程序所需的所有特性，我们不必担心在实现过程中如何将组件粘合在一起。\n\n### 构建领域对象模型\n\
  \n领域对象模型（DOM）是一组对问题领域中的概念进行建模的类。同样，DOM 是一个很大的主题，我们将在本节中仅介绍 DOM 的主要概念。有关 DOM 模式的更完整描述，我们建议你阅读\
  \ Martin Fowler 所著的 *Patterns of Enterprise Application Architecture*（Addison-Wesley，2002\
  \ 年）或 Eric Evans 所著的 *Domain-Driven Design*: *Tackling Complexity in the Heart of\
  \ Software*（Addison-Wesley，2003 年）。虽然我们不会深入探讨这个模式的细节，但我们会向你展示为什么我们选择为 SpringBlog\
  \ 应用程序创建一个 DOM，以及我们是如何构建我们的 DOM 的。\n\n\n\n#### Spring 与领域对象模型\n\n鉴于这是一本关于 Spring\
  \ 的书，你可能会觉得奇怪，我们竟然花了大量篇幅来讨论一个与 Spring 并无直接关联的主题。在我们使用 Spring 构建的应用中，唯一始终不由 Spring\
  \ 管理的对象就是领域对象。（尽管在 Spring 中，可以通过对类应用 `@Component` 注解并将其作用域设置为原型（prototype）来让 Spring\
  \ 管理领域对象，但大多数时候，我们会选择在应用内部自行管理领域对象。）这样做的原因在于，实际上，Spring 并不需要介入领域对象的管理。通常，你会使用 `new()`\
  \ 运算符创建多个领域对象实例，并在服务层或数据访问层进行处理。虽然 Spring 也支持在每次请求时注入新的领域对象实例（通过使用 bean 作用域 `prototype`），但开发者通常不会采用这种方法，因为领域对象一般不会利用依赖注入，它们通常除了\
  \ DOM 自身之外很少有外部依赖，并且也不需要太多配置。\n\n那么，你可能会问，为什么还要如此关注 DOM 呢？答案很简单。DOM 是影响应用中许多其他部分（这些部分由\
  \ Spring 管理）的最关键领域，因此，正确构建 DOM 对于确保整个应用的正确性至关重要。\n\n#### DOM 与值对象不同\n\n理解 DOM 模式的关键在于，它不同于值对象（通常称为数据传输对象）模式。值对象模式是为了克服早期\
  \ EJB 规范的一个缺陷而创建的，该缺陷意味着对 EJB 的所有调用都是远程调用。配置 EJB 的状态通常需要多次调用，而所有这些调用都是远程的。使用值对象，对象状态可以通过一次远程调用批量传输，从而减少多次远程调用带来的性能损失。\n\
  \n![images](img/square.jpg) **注意**  严格来说，值对象模式与数据传输对象模式并不相同。Martin Fowler 将值对象定义为“一个小的简单对象，例如金额或日期范围，其相等性不基于标识”。你可以在\
  \ [`http://martinfowler.com/bliki/ValueObject.html`](http://martinfowler.com/bliki/ValueObject.html)\
  \ 找到详细信息。然而，混淆源于 Core J2EE Patterns 目录，该目录在其许多数据传输对象模式的示例中使用了术语 *value object*。（详情请参考“Core\
  \ J2EE Patterns: Transfer Object”以及在线目录 [`http://java.sun.com/blueprints/corej2eepatterns/Patterns/TransferObject.html`](http://java.sun.com/blueprints/corej2eepatterns/Patterns/TransferObject.html)\
  \ 中的 Transfer Object 类图。）在本节中，我们交替使用术语 *value object* 和 *data transfer object*，但我们讨论的是数据传输对象模式。\n\
  \nDOM 是应用问题领域的一种基于对象的表示，旨在让程序员能够以问题领域中存在的对象术语进行编码。而值对象纯粹包含状态，领域对象同时包含状态和行为则是完全可以接受的（尽管你也可以选择不在领域对象内部封装行为）。\n\
  \n领域对象与值对象之间的另一个关键区别在于，值对象的结构是由远程传输数据的需求驱动的，而领域对象则是为了表示现实世界的概念而建模的，并非由应用基础设施的某种需求驱动。正如我们稍后讨论的，我们认为对于领域对象的建模没有硬性规定；你必须选择与你的应用及其将要执行的功能相匹配的粒度级别。\n\
  \n一个应用可以同时拥有领域对象和值对象。在这种方法中，值对象被服务层用于与其他层（如表示层和数据访问层）进行通信。然后，这些值对象会根据需要转换为领域对象，并传递到表示层进行渲染。通常，不推荐这种方法。原因之一是维护会变得复杂，因为对领域对象的更改也意味着对相关值对象的更改。另一个原因是，借助\
  \ Spring，数据访问和 Web 框架非常强大，可以轻松地将数据直接映射到领域对象，无论是用于处理还是用于表示。\n\n#### 为什么要创建领域对象模型\n\
  \n创建 DOM 需要一些前期工作，以便识别领域对象，然后在代码中创建这些对象的表示。然而，当涉及到实现业务逻辑来处理领域对象时，这些前期工作所节省的时间以及避免的错误将远远超过其投入。我们发现，使用良好的\
  \ DOM 可以更轻松地创建解决业务问题的代码，因为你能够以问题本身的术语进行编码，而不是以应用运行的机器术语进行编码。良好的 DOM 使开发者能够更轻松地将应用需求转化为应用功能。\n\
  \n\n\n#### 领域对象建模\n\n领域对象建模存在许多不同的方法论和途径。有些实践主张让底层数据存储驱动对象模型，而另一些则主张\"让业务领域驱动对象模型\"\
  。在实践中，我们发现这两种方法之间的折中方案能够产生既易于使用又性能良好的领域对象模型。\n\n对于只有五六个数据库表的小型应用，通常更简单的做法是为每个数据库表创建一个对应的领域对象。尽管这些对象严格来说并非领域对象——因为它们的创建并非由问题领域驱动，而是由数据结构驱动——但对于这种简单应用而言，它们已经足够接近了。实际上，在许多小型应用中，经过广泛的领域建模过程后，最终得到的对象模型与数据库结构完全一致。\n\
  \n对于大型应用，则需要更多地关注现实世界的问题领域和底层数据存储。当我们为应用构建领域对象模型时，通常关注三个主要方面：\n\n*   问题领域的结构\n*\
  \   领域对象将如何使用\n*   底层数据存储的构建方式\n\n我们追求的是一个尽可能接近理想模型，同时又不会过度影响数据存储性能，也不会对使用领域对象的代码造成太大影响的领域对象模型。\n\
  \n通常，领域对象模型粒度相当细，一个逻辑概念可能会对应多个类。例如，考虑采购系统中的订单概念。通常，订单被建模为一个单独的`Order`对象，以及一个或多个代表订单中每个行项目的`OrderLine`对象。试图使用单个对象来建模订单会导致对象模型过于粗糙、笨重，且难以实现和维护。当有助于简化领域对象模型的使用时，你应该始终寻找机会增加领域对象的粒度。\n\
  \n你还会发现领域对象模型中包含数据存储中不存在的对象。例如，一个典型的采购系统会有购物车的概念，可能由`Cart`和`CartItem`对象表示。除非你需要跨用户会话持久化内容，否则这些领域对象很可能没有对应的数据存储表。请记住，你并非仅仅在构建数据库的面向对象表示；你是在对业务领域进行建模。这一点怎么强调都不为过。我们见过许多项目直接从数据存储派生出伪领域对象模型，而这些项目无一例外地因缺乏良好定义的领域对象模型所能带来的抽象而遭受损失。\n\
  \n我们发现，一个扎实的领域对象模型来自于花时间审视问题领域，识别领域中的对象，然后观察这些对象的自然粒度如何适应应用的需求。虽然我们会同时考虑领域对象的用途和底层数据存储，但我们不希望让这些因素对领域对象模型产生不当影响。\n\
  \n重要的是要记住，构建领域对象模型的目标是创建一组类，帮助你和其它开发者在更接近应用问题领域的抽象层次上构建应用。总的来说，在构建领域对象模型时，我们认为所有其它考虑都是次要的。例如，如果你发现由于领域对象模型的设计导致性能下降，可以随时对模型进行微调。但请确保问题确实是由领域对象模型的设计引起的（例如，发现单个领域对象包含大量长文本字段如\
  \ CLOB 或 TEXT，影响了数据检索性能）。你不希望因为错误地认为领域对象模型性能不佳而削弱其优势。\n\n##### 数据库建模与领域对象建模\n\n\
  尽管数据库建模和领域对象建模非常相似，但两者得到的结果很少相同，而且实际上，你也很少希望它们相同。在建模数据库时，你寻找的是能够以最高效、最一致的方式存储和检索数据的结构。而在构建领域对象模型时，性能显然很重要，但同样重要的是在易于使用且便于组装业务逻辑的面向对象模型之上构建应用。总的来说，我们发现最好的做法是以最适合数据库的方式建模数据库，并以最适合领域对象模型的方式（至少最初如此）建模领域对象模型。如果之后发现性能瓶颈，你可以随时进行修改。\n\
  \n##### 领域对象关系建模\n\n我们在领域对象模型中最常见的错误，尤其是当领域对象模型由数据库设计驱动时，是创建用于表示表实体间关系的领域对象。这源于数据库中两个表之间的多对多关系必须有一个连接表来构建关系。领域对象模型中的关系应该以更符合面向对象编程风格的方式来建模，即领域对象维护对其他领域对象或领域对象列表的引用。\n\
  \n在从数据库填充领域对象数据时（例如在应用的数据访问层中所做的操作），一个常见错误是假设所有相关的领域对象（例如，当从`ORDER`表检索数据到`Order`领域对象时，`Order`对象中的`Item`对象列表也应从`ORDER_ITEM`表一起检索）也必须从数据库中加载——事实并非如此。关于此问题的更详细讨论，请参阅\"\
  领域对象关系\"一节。\n\n\n\n#### 是否封装行为？\n\n你并非必须让领域对象封装任何行为；实际上，你可以选择让领域对象仅表示问题领域的状态。在大多数情况下，我们发现将大量业务逻辑分解为一组与领域对象协作的服务对象，而不是将这些逻辑封装在领域对象内部，是更好的做法。通常，我们将所有与\
  \ DOM 外部组件交互的逻辑放入服务对象中。通过这种方式，我们降低了 DOM 与应用程序逻辑所涉及组件之间的耦合度。这使得 DOM 能够在更广泛的场景中使用，并且你常常会发现，DOM\
  \ 可以在解决同一领域问题的其他应用程序中复用。\n\n我们倾向于在 DOM 中封装行为的情况是，当逻辑纯粹在领域对象之间的交互中实现时。Spring 附带的\
  \ JPetStore 示例应用程序提供了一个很好的例子，可以映射到我们的采购系统示例中。在此场景中，用户拥有一个由`Cart`对象表示的购物车，以及一个`CartItem`对象列表。当用户准备购买购物车中的商品并创建订单时，应用程序必须创建一个`Order`对象以及一个`OrderLine`对象列表，这些对象对应于`Cart`和`CartItem`对象所建模的数据。这是一个行为应封装在\
  \ DOM 内部的完美示例。从`Cart`到`Order`的转换纯粹以领域对象的方式编码，不依赖于应用程序中的其他组件。在 JPetStore 中，`Order`类有一个`initOrder()`方法，该方法接受两个参数：`Account`和`Cart`。基于`Cart`对象为`Account`对象所代表的用户创建`Order`所需的所有逻辑都体现在此方法中。\n\
  \n与大多数与建模相关的事情一样，关于何时将逻辑放入领域对象内部，何时将其分解到服务对象中，并没有硬性规定。当将逻辑放入领域对象会导致领域对象依赖于 DOM 之外的其他应用程序组件时，你应该避免这样做。通过这种方式，你可以确保\
  \ DOM 尽可能可复用。另一方面，仅涉及领域对象的逻辑理想情况下应放在 DOM 中，这样它就可以在 DOM 被使用的任何地方被复用。\n\n### SpringBlog\
  \ 领域对象模型\n\n让我们看一下示例应用程序的 DOM。图 12-1 展示了 SpringBlog 中与博客文章相关的领域对象的 DOM，而图 12-2 展示了博客用户及其授予角色的\
  \ DOM。\n\n![images](img/9781430241072_Fig12-01.jpg)\n\n***图 12-1.** SpringBlog 中用于博客文章的\
  \ DOM*\n\n![images](img/9781430241072_Fig12-02.jpg)\n\n***图 12-2.** SpringBlog 中用于用户和角色的\
  \ DOM*\n\n尽管 DOM 并不复杂，但它确实突出了我们一直在讨论的一些要点。这些将在接下来的三节中讨论。\n\n##### SpringBlog DOM\
  \ 中的继承\n\nSpringBlog 应用程序的核心是文章（posting）的概念。文章分为两种类型：条目（entries），即博客的顶级文章；以及评论（comments），即对特定博客条目的评论。我们决定在一个接口`BlogPosting`中定义通用的文章特征，如清单\
  \ 12-3 所示，并让`Entry`和`Comment`都实现此接口。\n\n***清单 12-3.** `BlogPosting`接口*\n\n`package\
  \ com.apress.prospring3.springblog.domain;`\n\n`import java.util.Date;`\n`import\
  \ java.util.Set;`\n\n`import com.apress.prospring3.springblog.domain.Attachment;`\n\
  \n`public interface BlogPosting {`\n`    public String getBody();`\n`    public\
  \ void setBody(String body);`\n\n`    public Date getPostDate();`\n`    public void\
  \ setPostDate(Date postDate);`\n\n`    public String getSubject();`\n`    public\
  \ void setSubject(String subject);`\n`}`\n\n然而，这导致了不必要的代码重复，因为`Entry`和`Comment`都有各自的`BlogPosting`实现。为了解决这个问题，我们引入了`AbstractBlogPosting`类，并让`Entry`和`Comment`继承此类。清单\
  \ 12-4 展示了`AbstractBlogPosting`。\n\n***清单 12-4.** `AbstractBlogPosting`类*\n\n`package\
  \ com.apress.prospring3.springblog.domain;`\n\n`// 导入语句已省略`\n`public abstract class\
  \ AbstractBlogPosting implements BlogPosting {`\n\n`    protected Long id;`\n`    protected\
  \ String subject;`\n`    protected String body;`\n`    protected Date postDate;`\n\
  `    protected String createdBy;`\n`    protected DateTime createdDate;`\n`    protected\
  \ String lastModifiedBy;`\n`    protected DateTime lastModifiedDate;`\n`    protected\
  \ int version;`\n\n`    public String getBody() {`\n`        return body;`\n`    }`\n\
  \n`    public void setBody(String body) {`\n`        this.body = body;`\n`    }`\n\
  \n`    public Date getPostDate() {`\n`        return postDate;`\n`    }`\n\n`    public\
  \ void setPostDate(Date postDate) {`\n`        this.postDate = postDate;`\n`    }`\n\
  \n`    public String getSubject() {`\n`        return subject;`\n`    }`\n\n`    public\
  \ void setSubject(String subject) {`\n`        this.subject = subject;`\n`    }`\n\
  \n`    // 其他 setter/getter 方法已省略`\n`}`\n\n通过继承这个基类，我们将所有`BlogPosting`的实现细节从`Entry`和`Comment`中移出，减少了代码重复。作为示例，清单\
  \ 12-5 展示了`Entry`类的代码。\n\n***清单 12-5.** `Entry`类*\n\n`package com.apress.prospring3.springblog.domain;`\n\
  \n`// 导入语句已省略`\n`public class Entry extends AbstractBlogPosting {`\n\n`    private\
  \ static final int MAX_BODY_LENGTH = 80;`\n`    private static final String THREE_DOTS\
  \ = \"...\";`\n\n`    private String categoryId;`\n`    private String subCategoryId;`\n\
  `    private Set<EntryAttachment> attachments = new HashSet<EntryAttachment>();`\n\
  `    private Set<Comment> comments = new HashSet<Comment>();`\n\n`    public Entry()\
  \ {`\n`    }`\n\n`    public String getShortBody() {`\n`        if (body.length()\
  \ <= MAX_BODY_LENGTH)`\n`            return body;`\n`        StringBuffer result\
  \ = new StringBuffer(MAX_BODY_LENGTH + 3);`\n`        result.append(body.substring(0,\
  \ MAX_BODY_LENGTH));`\n`        result.append(THREE_DOTS);`\n\n`        return result.toString();`\n\
  `    }`\n\n`    public String getCategoryId() {`\n`        return this.categoryId;`\n\
  `    }`\n\n`    public void setCategoryId(String categoryId) {`\n`        this.categoryId\
  \ = categoryId;`\n`    }`\n\n`    public String getSubCategoryId() {`\n`        return\
  \ this.subCategoryId;`\n`    }`\n\n`    public void setSubCategoryId(String subCategoryId)\
  \ {`\n`        this.subCategoryId = subCategoryId;`\n`    }`\n\n`    public Set<EntryAttachment>\
  \ getAttachments() {`\n`        return this.attachments;`\n`    }`\n\n`    public\
  \ void setAttachments(Set<EntryAttachment> attachments) {`\n`        this.attachments\
  \ = attachments;`\n`    }`\n\n`    public Set<Comment> getComments() {`\n`        return\
  \ this.comments;`\n`    }`\n\n\n\n`    public void setComments(Set<Comment> comments)\
  \ {`\n`        this.comments = comments;`\n`    }`\n\n`}`\n\n这是一种在 Spring 及整个 SpringBlog\
  \ 应用中广泛使用的模式。通用功能定义在接口中而非抽象类中，但我们提供了接口的默认实现作为抽象类。这样做的原因是，在可能的情况下，我们可以像 `Entry` 和\
  \ `Comment` 那样利用抽象基类，从而无需让每个类都直接实现 `BlogPosting` 接口。然而，如果出现 `Entry` 类需要继承 `Foo`\
  \ 类的情况，那么我们可以直接在 `Entry` 中实现 `BlogPosting` 接口。这里需要记住的要点是，不要通过抽象类来定义通用功能，因为这样做会限制你的继承层次结构。相反，你应该通过接口来定义通用功能，并将这些接口的默认实现作为抽象基类。这样一来，你可以在尽可能的情况下利用继承的实现，同时又不会人为地约束你的继承层次结构。\n\
  \n这里值得注意的一点是，我们没有在数据库中反映这个继承树。也就是说，我们没有创建一个 `BLOG_POSTING` 表来存储共享数据，然后再创建 `ENTRY`\
  \ 和 `COMMENT` 两个表来存储实体特定的数据。主要原因是，我们认为像 SpringBlog 这样规模的应用，不值得引入这种结构的复杂性；此外，这个例子也突出了我们的观点，即领域对象模型（DOM）的结构可以与数据库不同。定义这个继承层次结构的主要原因，除了它是一种良好的设计之外，还在于允许\
  \ SpringBlog 应用处理 `Entry` 和 `Comment` 对象中的通用数据，而无需区分两者。一个很好的例子是在第 7 章中引入并在第 21 章中详细讨论的敏感词过滤器。\n\
  \n##### SpringBlog 中的领域行为\n\n尽管 SpringBlog 的领域模型很简单，但我们仍然需要在领域模型中封装一些逻辑。由于博客帖子的正文可能非常长，我们希望有一种机制，在显示博客帖子列表时获取正文的摘要。因此，我们创建了\
  \ `Entry.getShortBody()` 方法（注意，该方法既未在 `BlogPosting` 接口中定义，也未在 `AbstractBlogPosting`\
  \ 类中定义），如清单 12-6 所示。\n\n***清单 12-6.** `Entry` 类中的行为*\n\n`package com.apress.prospring3.springblog.domain;`\n\
  \n`// 导入语句已省略`\n`public class Entry extends AbstractBlogPosting {`\n\n`    private\
  \ static final int MAX_BODY_LENGTH = 80;`\n`    private static final String THREE_DOTS\
  \ = \"...\";`\n\n`    public String getShortBody() {`\n`        if (body.length()\
  \ <= MAX_BODY_LENGTH)`\n`            return body;`\n`        StringBuffer result\
  \ = new StringBuffer(MAX_BODY_LENGTH + 3);`\n`        result.append(body.substring(0,\
  \ MAX_BODY_LENGTH));`\n`        result.append(THREE_DOTS);`\n\n`        return result.toString();`\n\
  `    }`\n\n`// 代码已省略`\n`}`\n\n在这里你可以看到，为了构建短正文，我们取正文的前 80 个字符，然后在末尾简单地追加三个点。这是一个简单的实现，但它确实突出了在领域对象模型（DOM）中封装逻辑的典型场景。\n\
  \n##### 领域对象关系\n\n在图 12-1 所示的领域对象模型（DOM）中，请注意我们定义了 `Entry` 与 `Attachment` 之间以及 `Comment`\
  \ 与 `Attachment` 之间的关联。作为 SpringBlog 需求的一部分，我们希望能够为两种类型的帖子上传和存储文件。在数据库中，我们有一个名为\
  \ `ATTACHMENT` 的表来存储附件。然后，为了将附件与条目或评论关联起来，我们还有另外两个表：`ENTRY_ATTACHMENT_DETAIL` 和\
  \ `COMMENT_ATTACHMENT_DETAIL`。我们常见的一个错误是，人们创建领域对象来建模这些关系，而不是使用标准的 Java 特性来关联对象。当数据库中存在一对一关系时，你可以通过让一个对象持有对另一个对象的引用来在领域对象模型（DOM）中建模。对于一对多或多对多关系，使用\
  \ Java 集合可以以一种熟悉且易于在代码中操作的方式，轻松表示这些复杂关系。清单 12-7 是 `Entry` 类的一个片段，展示了我们如何使用 `Set`\
  \ 来存储每个帖子的 `Attachment` 对象。\n\n***清单 12-7.** 使用 Set 表示领域对象关系*\n\n`package com.apress.prospring3.springblog.domain;`\n\
  \n`// 导入语句已省略`\n`public class Entry extends AbstractBlogPosting {`\n\n`    private\
  \ Set<Attachment> attachments = new HashSet<Attachment>(0);`\n\n`    public Set<Attachment>\
  \ getAttachments() {`\n`        return this.attachments;`\n`    }`\n\n`    public\
  \ void setAttachments(Set<Attachment> attachments) {`\n`        this.attachments\
  \ = attachments;`\n`    }`\n\n`    // 代码已省略`\n`}`\n\n我们没有使用额外的对象来建模关系，而是使用一个简单的\
  \ `Set` 来建模一对多关系。除了减少需要编写的代码量之外，这种方法还能防止领域对象模型（DOM）被不必要的类污染，并允许在导航关系时使用熟悉的 Java\
  \ 概念，例如 `Iterator`。\n\n#### 领域对象模型总结\n\n在本节中，我们研究了 SpringBlog 应用的领域对象模型（DOM），并花了一些时间讨论了领域对象建模和实现的基础知识。毫无疑问，这个主题的范围比我们在这里所涵盖的要广泛得多。事实上，有大量的书籍详细讨论了这一主题（关于此主题的一本优秀著作是\
  \ *Domain-Driven Design*: *Tackling Complexity in the Heart of Software*，Addison-Wesley\
  \ Professional 出版）。我们在这里只是浅尝辄止，重点讨论了为什么要构建领域对象模型（DOM）、构建时的关注点，以及与 SpringBlog 应用相关的一些通用主题。\n\
  \n虽然不定义和构建领域对象模型（DOM）也能构建应用，但根据我们的经验，花时间这样做会带来回报，能够降低复杂性、降低维护成本并减少错误。\n\n\n\n###\
  \ 设计与构建数据访问层\n\n在讨论了 DOM 之后，让我们进入专门负责执行数据库交互，并将检索到的数据转换为 DOM 以供服务层处理的这一层。\n\n没有人会质疑数据访问层的必要性，因为数据访问逻辑总是复杂且对性能要求苛刻的。例如，在某些数据访问性能至关重要的场景中，数据访问层应能够向数据库发送经过调优的原生查询，以最大化数据检索的性能。此外，诸如并发控制（例如，乐观/悲观锁）、缓存、数据审计和安全需求等问题，也应由数据访问层来处理。\n\
  \n通常，在实现数据访问层时，DAO 模式在 JEE 应用程序中被广泛采用，其中 DAO 的职责是封装底层的持久化技术（例如，JDBC、Hibernate 等）。然而，由于当今的持久化框架已经变得相当成熟，并且采用\
  \ JPA 及其 `EntityManager`（它已经向开发者隐藏了持久化提供者）的兴起，一种常见的做法是消除 DAO 层。取而代之的是，在检索数据时，持久化提供者的服务提供者接口（SPI）将被直接注入到服务层。图\
  \ 12-3 展示了一个使用 DAO 的示意图。（例如，对于 JDBC，访问逻辑仍然涉及在代码中编写大量查询，对于这种情况，最好还是将这些代码放在 `DAO`\
  \ 类中，以向服务层隐藏这些 SQL 语句。）图 12-4 展示了另一个示意图，其中持久化提供者（例如，JPA 中的 `EntityManager`、MyBatis\
  \ 中的映射器接口）被直接注入到服务层。\n\n![images](img/9781430241072_Fig12-03.jpg)\n\n***图 12-3.**\
  \ 使用 DAO 模式的应用程序设计*\n\n![images](img/9781430241072_Fig12-04.jpg)\n\n***图 12-4.**\
  \ 使用持久化提供者的应用程序设计*\n\n#### 实际设计考量\n\n得益于各种持久化技术的演进和成熟，以及 Spring 在集成这些技术方面的灵活性，如今设计和构建数据访问层的任务要简单得多。实际上，最困难且最耗时的任务是在底层数据库结构与应用程序中的\
  \ DOM 之间执行映射。然而，在创建数据访问层时，您应该牢记一些实际考量，这将帮助您构建更易于使用和扩展的数据访问逻辑。\n\n##### 领域对象还是数据传输对象？\n\
  \n大多数情况下，您不需要依赖 DTO 在不同层之间传输数据。正如本章前面所讨论的，如今所有流行的持久化技术和 JEE 本身都支持使用 POJO 作为底层 DOM，这使得服务层、表示层和数据访问层可以直接使用领域对象进行通信成为可能。\n\
  \n由于所有领域对象现在都是 POJO，它们可以轻松地被前端表示框架（例如，Spring MVC、JSF、Adobe Flex 等）支持，以通过领域对象直接与服务层交互。\n\
  \n然而，在某些情况下，DTO 模式仍然值得考虑。例如，一个领域对象包含许多长文本数据属性，而这些属性可能不需要在每个请求中都发送到前端。在这种情况下，值得考虑是否创建一个值对象，该对象仅存储相应前端所需的确切属性，以最小化表示层和服务层之间的数据传输。\n\
  \n##### DAO 接口\n\n根据经验法则，始终以接口（而非类）的形式定义您的 DAO（如果您决定采用 DAO 模式）。在编写与服务对象交互的 DAO 代码时，请针对接口编程，而不是针对实现类。请记住，当您使用\
  \ Spring 时，将适当的 DAO 实现实例传递给您的服务层是一件微不足道的工作，因此为您的 DAO 使用接口几乎不会给您带来额外的编码负担。\n\n#####\
  \ DAO 粒度\n\n在决定如何构建您的 DAO 接口时，一定要避免为每个领域对象创建一个 DAO，或者为每个表创建一个 DAO。有时，经过深思熟虑的设计后，这些结构会自然出现，但不要假设其中任何一种结构必然是最好的。\n\
  \n我们经常在项目中看到的一个大问题是“每个表一个 DAO”的问题。当您定义这样的结构时，您最终会得到代表连接表的 DAO，而这些 DAO 除了在多对多关系中连接另外两个表之外，没有其他用途。此外，您经常会发现，为了持久化数据，您必须将单个领域对象传递给许多不同的\
  \ DAO。\n\n这是一个让数据库驱动 DAO 层设计的经典例子。在实践中，我们发现这是一个糟糕的主意。DAO 的目的是将领域对象映射到数据库，反之亦然。由于您的应用程序大部分是与领域对象交互，而不是与数据库交互，因此让\
  \ DOM 驱动数据库设计是合理的。让您的 DAO 隐藏将领域对象中的数据映射到数据库的复杂性；这就是它们的工作。您要避免的情况是，持久化一个领域对象需要您与许多不同的\
  \ DAO 交互。这种情况会自然出现，例如，当一个领域对象引用了另一个不同类型的领域对象，并且两者都被修改了，因此都需要被持久化。在这种情况下，您可以在服务层中封装该逻辑，但您不需要人为地制造这个问题。\n\
  \n那么，您可能会想，是否应该让 DOM 驱动 DAO 的设计呢？嗯，既是也不是。说是，是因为 DAO 的目的是将 DOM 数据存入和取出持久化数据存储，因此让\
  \ DOM 充当驱动者是合理的。说不是，是因为盲目地为每个领域对象创建一个 DAO 会导致持久化一个逻辑数据单元需要调用许多不同的 DAO。考虑前面从 `Cart`\
  \ 和 `CartItem` 对象创建的 `Order` 和 `OrderLine` 对象的例子。因为您不太可能在不保存或检索 `Order` 对象的情况下保存或检索\
  \ `OrderLine` 对象，所以将这两个领域对象的持久化逻辑封装在单个 `OrderDao` 中是有意义的，而不是创建 `OrderDao` 和 `OrderLineDao`。\n\
  \n\n\n#### 数据访问层总结\n\n为应用程序创建数据访问层，可以为其他应用组件提供一种标准机制来存储和检索数据。如果没有数据访问层，你会发现数据访问代码会分散在整个应用程序中，常常导致难以维护的代码重复。从长远来看，这种管理不善的代码不可避免地会导致错误，并让开发人员头疼。\n\
  \n根据实现数据访问层的技术决策，大多数情况下你不再需要采用 DAO 模式。许多流行的持久化技术和标准已经很好地为你隐藏了所有数据库访问细节。因此，建议你直接将那些持久化提供者注入到服务层。这将简化应用程序架构，并产生更易于跟踪和维护的代码。\n\
  \n如果你决定使用 DAO，或者这是你的团队或公司已标准化的规范，那么你应该始终将 DAO 定义为接口，然后使用你选择的数据访问技术来实现这些接口。当你使用 Spring\
  \ 时，使用接口是轻而易举的，你可以轻松地为应用程序中的其他组件提供 DAO 接口的具体实现。\n\n在本节中，我们探讨了在为应用程序构建数据访问层时存在的一些主要设计相关问题。实际上，数据访问层中的许多复杂性来自实现，而非设计。你可以在第\
  \ 8 章到第 11 章中找到关于数据访问的更多细节。\n\n### 设计服务层\n\n在我们应用程序设计的讨论中，我们已经有了在问题域中表示数据的方法，以便在代码中操作它；也有了将数据存储到数据库并在之后检索出来的方法。然而，目前我们并没有对这些数据做太多处理。除非你的应用程序特别简单，否则很可能需要实现某种逻辑。之前，我们讨论了应将逻辑封装在领域对象内的情况。在本节中，我们将探讨如何提供一个服务对象层，为应用程序的其余逻辑提供标准接口。\n\
  \n#### 为什么需要服务层\n\n与“为什么需要数据访问层”这个问题类似，一旦你在没有服务层的情况下实现过几个应用程序，这个问题的答案就变得简单明了。如果你不将所有业务逻辑集中在一个地方，它最终会分散在表示层代码中，通常会导致大量代码重复，更不用说创建出缺乏清晰职责边界定义的代码了。抛开代码重复问题不谈，未能为不同职责的代码定义清晰边界，通常会导致代码难以跟踪和维护，因为很难定位给定函数的位置。\n\
  \n一个定义良好的服务层充当了应用程序的某种网关，为表示层代码提供了一种简单、统一的方式来访问业务逻辑。一个好的服务层还定义了你的应用程序实际能执行哪些操作，以及哪些逻辑可供呈现给用户。\n\
  \n没有服务层的一个显著弊端是，当你决定为同一逻辑提供两种用户界面时就会显现出来。也许你构建了一个 Web 应用程序，但现在想为经常使用该应用程序的用户提供一个基于桌面的应用程序。如果你的业务逻辑代码嵌入在\
  \ Web 表示层代码中，那么你要么需要将代码从表示层重构出来（这需要大量的返工和测试工作），要么干脆再次复制业务逻辑代码，这次将其嵌入在富客户端（例如 Swing、RCP\
  \ 等）的代码中。\n\n如今，除了各种前端之外，你的业务服务可能还需要能被其他系统访问。例如，你的应用程序可能向某些第三方业务合作伙伴提供实时股票报价信息。很可能，你需要支持这些合作伙伴通过\
  \ Web 服务（例如 Web 服务、RESTful-WS 等）访问你的实时数据。此外，在批量处理数据时（例如从文件中处理），数据操作逻辑与用户通过 Web 界面输入数据的逻辑不应有太大差异。一个集中式的服务层作为所有可能来源数据的入口点，成为保持应用程序可维护性的关键部分。\n\
  \n#### 设计业务接口\n\n与应用程序中的大多数组件一样，你应该首先为应用程序中的服务对象定义一组接口。任何与服务层交互的代码都应通过这些接口进行。对于\
  \ Spring 管理的组件，你可以使用 DI 提供实现。如果你必须支持 Spring 不管理的组件，你可能需要提供一个简单的 `Factory` 类来实现查找。\n\
  \n##### 服务层依赖关系\n\n与我们讨论过的所有接口一样，你应该避免在服务对象的接口中定义依赖关系。服务对象应完全独立于实现。一个定义良好的服务对象接口只包含那些服务于业务功能的方法。避免通过服务对象暴露数据访问层中的类型。你的服务对象应将表示层代码与底层数据访问层完全隔离。例如，你的某个服务对象可能通过\
  \ Web 服务或 JMS 队列访问其所有数据。确保服务对象接口尽可能易于访问的一个好方法是，确保返回类型和参数类型不会将表示层代码与除领域对象之外的任何内容耦合。你将在应用程序的所有层中传递领域对象，但其他组件（如\
  \ DAO）应严格保留在自己的层内。\n\n##### 服务对象粒度\n\n在设计服务层所需的对象时，尝试将它们与业务需求中可能的用例关联起来。\n\n一种常见的做法是将操作高度相关的领域对象的逻辑分组到同一个服务对象接口中。例如，在\
  \ SpringBlog 应用程序中，服务层的设计由表 12-1 中列出的接口组成。\n\n![images](img/t1201.jpg)\n\n请记住，在应用程序设计中，没有绝对正确或错误的方法。然而，确实存在更好和更差的设计。一个好的设计应该易于文档化，并且技术团队和业务分析师都能理解。此外，始终要考虑灵活性、可维护性和可跟踪性。最后，确保你的服务层不与任何特定类型的消费者耦合。\n\
  \n#### 服务层总结\n\n在本节中，我们讨论了在为 Spring 应用程序设计和构建服务层时应考虑的问题。然后，通过查看 SpringBlog 的服务层，我们演示了如何通过将紧密相关的领域对象的操作分组到同一个服务接口中来设计服务层内的接口。\n\
  \n\n\n### 本章小结\n\n在本章中，我们探讨了与传统应用相关的诸多问题，并了解了 Spring 如何帮助您解决这些问题。我们讨论了应用开发过程中出现的各种问题，并研究了有效解决这些问题的合理方法。在本章中，我们始终审视了在设计\
  \ SpringBlog 应用时，所讨论的实践方法是如何被应用的。\n\n本章仅触及了应用设计的皮毛，但我们涵盖了一些针对基于 Spring 的应用的主要考量因素，以及在使用\
  \ Spring 时可以轻松修复的问题。如需更全面地讨论 SpringBlog 的应用设计，请参阅第 23 章。\n\n在下一章中，我们将详细介绍事务支持，包括本地事务和分布式事务的完整示例，以及一些用于测试事务方法的有用技巧。\n\
  \n## 第 13 章\n\n## 事务管理\n\n事务是构建可靠企业应用最关键的部分之一。最常见的事务类型是数据库操作。在典型的数据库更新操作中，数据库事务开始，数据被更新，然后根据数据库操作的结果，事务被提交或回滚。然而，在许多情况下，根据应用需求以及应用需要交互的后端资源（例如关系型数据库管理系统、面向消息的中间件、企业资源规划系统等），事务管理可能会复杂得多。\n\
  \n在 Java 应用开发的早期（在 JDBC 创建之后，但在 JEE 标准或像 Spring 这样的应用框架出现之前），开发者在应用代码中以编程方式控制和管理事务。当\
  \ JEE，更具体地说是 EJB 标准出现后，开发者能够使用容器管理事务（CMT）以声明式方式管理事务。但 EJB 部署描述符中复杂的事务声明难以维护，并为事务处理引入了不必要的复杂性。一些开发者倾向于对事务拥有更多控制权，并选择\
  \ Bean 管理事务（BMT）以编程方式管理事务。然而，使用 Java 事务 API（JTA）进行编程的复杂性也阻碍了开发者的生产力。\n\n正如在关于 AOP\
  \ 的第 6 章和第 7 章中所讨论的，事务管理是一个横切关注点，不应编码在业务逻辑中。实现事务管理最合适的方式是允许开发者以声明式方式定义事务需求，并由 Spring、JEE\
  \ 或 AOP 等框架代表我们织入事务处理逻辑。在本章中，我们将讨论 Spring 如何帮助简化事务处理逻辑的实现。Spring 同时支持声明式和编程式事务管理。\n\
  \nSpring 为声明式事务提供了出色的支持，这意味着您无需用事务管理代码来混乱您的业务逻辑。您只需声明那些必须参与事务的方法（在类内或层内），以及事务配置的详细信息，Spring\
  \ 就会负责处理事务管理。更具体地说，在本章中，我们将探讨以下内容：\n\n*   *Spring 事务抽象层：* 我们讨论 Spring 事务抽象类的基本组件，并解释如何使用这些类来控制事务的属性。\n\
  *   *声明式事务管理：* 我们向您展示如何使用 Spring 仅通过普通 Java 对象来实现声明式事务管理。我们提供了使用 XML 配置文件以及 Java\
  \ 注解进行声明式事务管理的示例。\n*   *编程式事务管理：* 尽管编程式事务管理并不常用，但我们解释了如何使用 Spring 提供的 `TransactionTemplate`\
  \ 类，它让您能够完全控制事务管理代码。\n*   *使用 JTA 的全局事务：* 对于需要跨越多个后端资源的全局事务，我们将展示一个如何在 Spring 中使用\
  \ JTA 配置和实现全局事务的示例。\n\n### 探索 Spring 事务抽象层\n\n在开发应用时，无论您是否选择使用 Spring，在使用事务时都必须做出一个基本选择：是使用全局事务还是本地事务。本地事务特定于单个事务性资源（例如一个\
  \ JDBC 连接），而全局事务由容器管理，并且可以跨越多个事务性资源。\n\n\n\n#### 事务类型\n\n本地事务易于管理，如果你的应用程序中所有操作都只需与一个事务性资源（例如\
  \ JDBC 事务）交互，那么使用本地事务就足够了。然而，如果你没有使用像 Spring 这样的应用程序框架，就需要编写大量的事务管理代码；并且如果将来事务的范围需要扩展到跨多个事务性资源，你就必须放弃本地事务管理代码，并重写为使用全局事务。\n\
  \n在 Java 世界中，全局事务是通过 Java 事务 API（JTA）实现的。在这种场景下，一个兼容 JTA 的事务管理器通过各自的资源管理器连接到多个事务性资源，这些资源管理器能够通过\
  \ XA 协议（一种定义分布式事务的开放标准）与事务管理器通信，并使用两阶段提交（2PC）机制来确保所有后端数据源要么全部更新，要么全部回滚。如果任何一个后端资源失败，整个事务都会回滚，因此对其他资源的更新也会被回滚。\n\
  \n图 13-1 展示了使用 JTA 的全局事务的高级视图。\n\n![images](img/9781430241072_Fig13-01.jpg)\n\n\
  ***图 13-1.** 使用 JTA 的全局事务概览*\n\n如图 13-1 所示，有四个主要参与方参与全局事务（通常也称为*分布式事务*）。第一方是后端资源，例如\
  \ RDBMS、消息中间件、企业资源规划（ERP）系统等。\n\n第二方是资源管理器，通常由后端资源供应商提供，负责与后端资源交互。例如，当连接到 MySQL\
  \ 数据库时，我们需要与 MySQL 的 Java 连接器提供的 `MysqlXADataSource` 类进行交互。其他后端资源（例如 MQ、ERP 等）也会提供它们自己的资源管理器。\n\
  \n第三方是 JTA 事务管理器，负责管理、协调和同步事务状态与所有参与事务的资源管理器。将使用 XA 协议，这是一种广泛用于分布式事务处理的开放标准。JTA\
  \ 事务管理器也支持 2PC，以便所有更改一起提交，如果任何资源更新失败，整个事务将回滚，导致所有资源都不会被更新。整个机制由 Java 事务服务（JTS）规范定义。\n\
  \n最后一个组件是应用程序。应用程序本身，或者其运行的底层容器或 Spring 框架，将管理事务（开始、提交、回滚事务等）。同时，应用程序将通过 JEE 定义的各种标准与底层后端资源交互。如图\
  \ 13-1 所示，应用程序通过 JDBC 连接到 RDBMS，通过 JMS 连接到 MQ，并通过 Java 连接器架构（JCA）连接到 ERP 系统。\n\n\
  所有完全符合 JEE 规范的应用程序服务器（例如 JBoss、WebSphere、WebLogic、GlassFish 等）都支持 JTA，在这些服务器中，可以通过\
  \ JNDI 查找获取事务。对于独立应用程序或 Web 容器（例如 Tomcat、Jetty 等），也存在开源和商业解决方案，在这些环境中提供对 JTA/XA\
  \ 的支持（例如 Atomikos、JOTM、Bitronix 等）。\n\n#### PlatformTransactionManager 的实现\n\n在\
  \ Spring 中，`PlatformTransactionManager` 接口使用 `TransactionDefinition` 和 `TransactionStatus`\
  \ 接口来创建和管理事务。这些接口的实际实现必须详细了解事务管理器。图 13-2 展示了截至 3.1 版本 Spring 中 `PlatformTransactionManager`\
  \ 的实现。\n\n![images](img/9781430241072_Fig13-02.jpg)\n\n***图 13-2.** 截至 Spring 3.1\
  \ 的 `PlatformTransactionManager` 实现*\n\nSpring 为 `PlatformTransactionManager` 接口提供了丰富的实现集。`CciLocalTransactionManager`\
  \ 类支持 JEE JCA 和通用客户端接口（CCI）。`DataSourceTransactionManager` 类用于通用 JDBC 连接。在 ORM 方面，有许多实现，包括\
  \ JDO（`JdoTransactionManager` 类）、JPA（`JpaTransactionManager` 类）以及 Hibernate 3 和\
  \ Hibernate 4（具有不同包名的 `HibernateTransactionManager` 类）。对于 JMS，实现包括 JMS 1.1 或更新版本（`JmsTransactionManager`\
  \ 类）和 JMS 1.0.2（`JmsTransactionManager102` 类）。对于 JTA，通用实现类是 `JtaTransactionManager`\
  \ 类。Spring 还提供了几个特定于特定应用程序服务器的 JTA 事务管理器类。这些类为 WebSphere（`WebSphereUowTransactionManager`\
  \ 类）、WebLogic（`WebLogicJtaTransactionManager` 类）和 Oracle OC4J（`OC4JJtaTransactionManager`\
  \ 类）提供原生支持。\n\n### 分析事务属性\n\n在本节中，我们将讨论 Spring 支持的事务属性，重点关注与作为后端资源的 RDBMS 的交互。\n\
  \n事务具有众所周知的四个 ACID 属性——原子性、一致性、隔离性和持久性——并且由事务性资源来维护事务的这些方面。你无法控制事务的原子性、一致性和持久性，但你可以控制事务传播和超时，以及配置事务是否为只读并指定隔离级别。\n\
  \nSpring 将这些设置全部封装在 `TransactionDefinition` 接口中。此接口用于 Spring 事务支持的核心接口 `PlatformTransactionManager`\
  \ 中，该接口的实现执行特定平台（例如 JDBC 或 JTA）上的事务管理。核心方法 `PlatformTransactionManager.getTransaction()`\
  \ 接受一个 `TransactionDefinition` 接口作为参数，并返回一个 `TransactionStatus` 接口。`TransactionStatus`\
  \ 接口用于控制事务执行，更具体地说，是用于设置事务结果以及检查事务是否已完成或是否是一个新事务。\n\n\n\n#### TransactionDefinition\
  \ 接口\n\n如前所述，`TransactionDefinition` 接口控制着事务的属性。我们来更详细地了解一下 `TransactionDefinition`\
  \ 接口（见清单 13-1）并描述其方法。\n\n***清单 13-1.** `TransactionDefinition` 接口*\n\n`package org.springframework.transaction;`\n\
  \n`import java.sql.Connection;`\n\n`public interface TransactionDefinition {`\n\n\
  `    // 变量声明语句已省略`\n\n`    int getPropagationBehavior();`\n\n`    int getIsolationLevel();`\n\
  \n`    int getTimeout();`\n\n`    boolean isReadOnly();`\n\n`    String getName();`\n\
  \n`}`\n\n该接口中简单明了的方法是 `getTimeout()`，它返回事务必须完成的时间（以秒为单位），以及 `isReadOnly()`，它指示事务是否为只读。事务管理器实现可以利用此值来优化执行，并检查以确保事务仅执行读取操作。`getName()`\
  \ 方法返回事务的名称。\n\n另外两个方法 `getPropagationBehavior()` 和 `getIsolationLevel()` 需要更详细地讨论。我们先从\
  \ `getIsolationLevel()` 开始，它控制其他事务可以看到哪些数据更改。表 13-1 列出了您可以使用的**事务隔离级别**，并解释了当前事务中所做的更改哪些可以被其他事务访问。\n\
  \n![images](img/t1301.jpg)\n\n选择合适的隔离级别对于数据的一致性非常重要，但这些选择会对性能产生很大影响。最高的隔离级别 `TransactionDefinition.ISOLATION_SERIALIZABLE`\
  \ 的维护成本尤其高昂。\n\n`getPropagationBehavior()` 方法根据是否存在活动事务来指定事务调用的行为。表 13-2 描述了此方法的值。\n\
  \n![images](img/t1302.jpg)\n\n#### TransactionStatus 接口\n\n`TransactionStatus` 接口（如清单\
  \ 13-2 所示）允许事务管理器控制事务的执行。代码可以检查事务是新的还是只读事务，并且可以启动回滚。\n\n***清单 13-2.** `TransactionStatus`\
  \ 声明*\n\n`package org.springframework.transaction;`\n\n`public interface TransactionStatus\
  \ extends SavepointManager {`\n\n`    boolean isNewTransaction();`\n\n`    boolean\
  \ hasSavepoint();`\n\n`    void setRollbackOnly();`\n\n`    boolean isRollbackOnly();`\n\
  \n`    void flush();`\n\n`    boolean isCompleted();`\n\n`}`\n\n`TransactionStatus`\
  \ 接口的方法不言自明；其中最值得注意的是 `setRollbackOnly()`，它会导致回滚并结束活动事务。\n\n`hasSavePoint()` 方法返回事务内部是否带有保存点（即，该事务是基于保存点作为嵌套事务创建的）。`flush()`\
  \ 方法在适用的情况下（例如，与 Hibernate 一起使用时）将底层会话刷新到数据存储。`isCompleted()` 方法返回事务是否已结束（即已提交或已回滚）。\n\
  \n### 示例代码的样本数据模型和基础设施\n\n本节概述了将在事务管理示例中使用的数据模型和基础设施。\n\n在本章中，我们将使用 JPA 和 Hibernate\
  \ 作为持久层来实现数据访问逻辑。此外，还将使用 Spring Data JPA 及其仓库抽象来简化基本数据库操作的开发。\n\n#### 创建带有依赖项的简单\
  \ Spring JPA 实用项目\n\n让我们首先创建项目。因为我们使用的是 JPA，所以创建一个新的 Spring 模板项目并选择 Simple Spring\
  \ JPA Utility Project。然后，输入项目详细信息，如图 13-3 所示。\n\n![images](img/9781430241072_Fig13-03.jpg)\n\
  \n***图 13-3.** 在 STS 中创建简单的 Spring JPA 实用项目*\n\n创建项目后，我们还需要为本章的示例向项目添加所需的依赖项。表 13-3\
  \ 显示了所需的额外依赖项。\n\n![images](img/t1303.jpg)\n\n确保您使用的是 Spring 3.1 和 JDK 6。详细步骤请参考附录\
  \ A。\n\n为了在修改事务属性时观察示例代码的详细行为，我们还在 log4j 中开启 `DEBUG` 级别的日志记录。清单 13-3 显示了 `log4j.properties`\
  \ 文件。\n\n***清单 13-3.** 在 `log4j.properties` 中开启 `DEBUG` 日志记录*\n\n`log4j.rootCategory=DEBUG,\
