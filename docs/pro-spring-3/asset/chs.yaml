  该联系人在服务器上创建成功，并返回给了客户端。\n\n\n\n#### 使用 Spring Security 保护 RESTful Web 服务\n\n任何远程服务都需要安全机制来限制未授权方访问服务、获取业务信息或执行操作。RESTful\
  \ Web 服务也不例外。在本节中，我们将演示如何使用 Spring Security 项目（[`http://static.springsource.org/spring-security/site/index.html`](http://static.springsource.org/spring-security/site/index.html)）来保护服务器端的\
  \ RESTful Web 服务。在本节的示例中，我们将使用 Spring Security 3.1（在撰写本文时，最新版本为 3.1.0.RELEASE），它为\
  \ RESTful Web 服务提供了一些有用的支持。\n\n使用 Spring Security 保护 RESTful Web 服务分为三个步骤。首先，在 Web\
  \ 应用程序部署描述符（`web.xml`）中，我们需要声明一个过滤器；代码片段如清单 16-35 所示。\n\n***清单 16-35.** 在 `web.xml`\
  \ 中声明 Spring Security 过滤器*\n\n`    <!-- Spring Security 配置 -->`\n`    <filter>`\n\
  `        <filter-name>springSecurityFilterChain</filter-name>`\n`        <filter-class>`\n\
  `            org.springframework.web.filter.DelegatingFilterProxy`\n`        </filter-class>`\n\
  `    </filter>`\n\n`    <filter-mapping>`\n`        <filter-name>springSecurityFilterChain</filter-name>`\n\
  `        <url-pattern>/restful/*</url-pattern>`\n`    </filter-mapping>`\n\n如清单\
  \ 16-35 所示，声明了一个过滤器，以使 Spring Security 能够拦截 HTTP 请求进行身份验证和授权检查。由于我们只想保护 RESTful\
  \ Web 服务，因此该过滤器仅应用于 URL 模式 `/restful/*`（参见 `<filter-mapping>` 标签）。\n\n下一步是创建 Spring\
  \ Security 配置，该配置将位于根 `WebApplicationContext` 中。清单 16-36 显示了该文件（`src/main/webapp/WEB-INF/spring/web-security.xml`）。\n\
  \n***清单 16-36.** Spring Security 配置*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"\
  ?>`\n`<beans:beans`\n\n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n\
  `        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n`        http://www.springframework.org/schema/security`\n\
  `        http://www.springframework.org/schema/security/spring-security-3.1.xsd\"\
  >`\n\n`    <!-- 使用基本身份验证的无状态 RESTful 服务 -->`\n`    <http pattern=\"/restful/**\"\
  \ create-session=\"stateless\">`\n`        <intercept-url pattern='/**' access='ROLE_REMOTE'\
  \ />`\n`        <http-basic />`\n`    </http>`\n\n`    <authentication-manager>`\n\
  `        <authentication-provider>`\n`            <user-service>`\n`                <user\
  \ name=\"remote\" password=\"remote\"`\n`                    authorities=\"ROLE_REMOTE\"\
  \ />`\n`            </user-service>`\n`        </authentication-provider>`\n`    </authentication-manager>`\n\
  \n`</beans:beans>`\n\n在清单 16-36 中，我们声明了 `security` 命名空间（注意 `xmlns=`[`\"http://www.springframework.org/schema/security\"\
  `](http://www.springframework.org/schema/security) 这一行），并将其用作配置文件的默认命名空间。在 `<http>`\
  \ 标签中，我们声明了 URL `/restful/**` 下的资源应受到保护。`create-session` 属性是 Spring Security 3.1.0\
  \ 中新增的，它允许我们配置是否在身份验证时创建 HTTP 会话。由于我们使用的 RESTful Web 服务是无状态的，因此我们将该值设置为 `stateless`，这指示\
  \ Spring Security 不为所有 RESTful 请求创建 HTTP 会话。这有助于提高 RESTful 服务的性能。\n\n接下来，在 `<intercept-url>`\
  \ 标签中，我们设置只有分配了 `ROLE_REMOTE` 角色的用户才能访问 RESTful 服务。`<http-basic/>` 指定 RESTful 服务仅支持\
  \ HTTP 基本身份验证。\n\n`<authentication-manager>` 标签定义了身份验证信息。这里我们定义了一个简单的身份验证提供程序，其中包含一个硬编码的用户和密码（均设置为\
  \ `remote`），并分配了 `ROLE_REMOTE` 角色。在企业环境中，身份验证很可能通过数据库或 LDAP 查找来完成。最后，我们将 Spring\
  \ Security 配置导入到根 `WebApplicationContext` 中。将以下行添加到文件 `src/main/webapp/WEB-INF/spring/root-context.xml`\
  \ 中：\n\n`<import resource=\"web-security.xml\" />`\n\n现在安全设置已完成。项目应该已经重新构建并部署。如果再次运行\
  \ `RestfulClientSample` 类，您将看到以下输出（其他输出已省略）：\n\n`Exception in thread \"main\" org.springframework.web.cient.HttpClientErrorException:\
  \ 401 Unauthorized`\n\n您将收到 HTTP 状态码 401，这意味着您无权访问该服务。现在，让我们配置客户端的 `RestTemplate`，以向服务器提供凭证信息。\n\
