  \ id;`\n`   }`\n\n`   @Version`\n`   @Column(name = \"VERSION\")`\n`   public int\
  \ getVersion() {`\n`      return version;`\n`   }`\n\n`   @Column(name = \"FIRST_NAME\"\
  )`\n`   public String getFirstName() {`\n`      return firstName;`\n`   }`\n\n`   @Column(name\
