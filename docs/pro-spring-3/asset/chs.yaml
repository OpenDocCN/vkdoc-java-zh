  \ `src/main/resources` 文件夹并进行修改，或者删除 `src/test/resources` 中的文件，然后在 `/src/main/resources`\
  \ 文件夹中创建 `log4j.properties` 文件。\n\n\n\n### 探索 JDBC 基础设施\n\nJDBC 为 Java 应用程序提供了一种访问数据库中存储数据的标准方式。JDBC\
  \ 基础设施的核心是每个数据库特有的驱动程序；正是这个驱动程序让 Java 代码能够访问数据库。\n\n一旦加载了驱动程序，它就会向 `java.sql.DriverManager`\
  \ 类注册自己。这个类管理着一个驱动程序列表，并提供用于建立数据库连接的静态方法。`DriverManager` 的 `getConnection()` 方法会返回一个由驱动程序实现的\
  \ `java.sql.Connection` 接口。该接口允许你对数据库执行 SQL 语句。\n\nJDBC 框架相当复杂且经过充分测试；然而，这种复杂性也带来了开发上的困难。第一层复杂性在于确保你的代码能够管理数据库连接。连接是一种稀缺资源，建立连接的成本非常高。通常，数据库会为每个连接创建一个线程或派生一个子进程。此外，并发连接的数量通常是有限的，打开过多的连接会拖慢数据库的速度。\n\
  \n我们将向你展示 Spring 如何帮助管理这种复杂性，但在进一步深入之前，我们需要向你展示如何在纯 JDBC 中选择、删除和更新数据。\n\n让我们创建一个\
  \ `ContactDao` 接口的简单实现，通过纯 JDBC 与数据库进行交互。考虑到我们已经了解的数据库连接知识，我们采取谨慎且成本高昂（就性能而言）的方法，为每条语句创建一个连接。这会极大地降低\
  \ Java 的性能，并给数据库增加额外的压力，因为每次查询都必须建立一个连接。然而，如果我们保持连接打开，可能会导致数据库服务器停止响应。清单 8-7 展示了以\
  \ MySQL 为例管理 JDBC 连接所需的代码。\n\n***清单 8-7.** 管理 JDBC 连接*\n\n`public class PlainContactDao\
  \ implements ContactDao {`\n\n`    static {`\n`        try {`\n`            Class.forName(\"\
  com.mysql.jdbc.Driver\");`\n`        } catch (ClassNotFoundException ex) {`\n`            //\
  \ 无操作`\n`        }`\n`    }`\n\n`    private Connection getConnection() throws SQLException\
  \ {`\n`        return DriverManager.getConnection(`\n`            \"jdbc:mysql://localhost:3306/prospring3_ch8\"\
  ,`\n`            \"prospring3\", \"prospring3\");`\n`    }`\n\n`    private void\
  \ closeConnection(Connection connection) {`\n`        if (connection == null) return;`\n\
  \n`        try {`\n`            connection.close();`\n`        } catch (SQLException\
  \ ex) {`\n`            // 无操作`\n`        }`\n`    }`\n\n`…`\n\n这段代码远非完整，但它让你了解了管理\
  \ JDBC 连接所需的步骤。这段代码甚至没有涉及连接池，而连接池是一种更有效管理数据库连接的常用技术。我们在此不讨论连接池（连接池将在本章后面的“数据库连接和数据源”部分讨论）；相反，在清单\
