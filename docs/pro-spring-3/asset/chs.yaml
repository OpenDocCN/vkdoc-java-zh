  \ Validation failed for argument at index [0] in method: public com.apress.prospring3.ch16.domain.Contact\
  \ com.apress.prospring3.ch16.web.restful.controller.ContactController.create(com.apress.prospring3.ch16.domain.Contact),\
  \ with 1 error(s): [Field error in object 'contact' on field 'firstName': rejected\
