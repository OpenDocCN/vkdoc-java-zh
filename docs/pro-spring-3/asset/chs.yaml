  从上述输出中可以看到，新联系人创建后，创建日期和最后修改日期是相同的。然而，更新之后，最后修改日期被更新了。审计是 Spring Data JPA 提供的另一个便捷功能，这样你就不需要自己实现该逻辑了。\n\
  \n至此，我们对 Spring Data JPA 的讨论就结束了。接下来，让我们看看 Hibernate 提供的另一个用于维护实体版本的有用功能。\n\n###\
  \ 使用 Hibernate Envers 维护实体版本\n\n在企业应用中，对于关键业务数据，始终需要维护每个实体的“版本”。例如，在客户关系管理（CRM）系统中，每次插入、更新或删除客户记录时，之前的版本都应保存在历史表或审计表中，以满足公司的审计或其他合规要求。\n\
  \n要实现这一点，有两种常见的选择。第一种是创建数据库触发器，在任何更新操作之前将更新前的记录克隆到历史表中；第二种是在数据访问层（例如，使用 AOP）开发相关逻辑。然而，这两种方法都有其缺点。触发器方法与数据库平台绑定，而手动实现逻辑则相当笨拙且容易出错。\n\
  \nHibernate Envers（实体版本控制系统）是一个专门设计用于自动化实体版本管理的 Hibernate 模块。在本节中，我们将讨论如何使用 Envers\
  \ 来实现 `ContactAudit` 实体的版本管理。\n\n![images](img/square.jpg) **注意**  Hibernate Envers\
  \ 并非 JPA 的特性。我们在此提及它，是因为我们认为在讨论了使用 Spring Data JPA 可以完成的一些基本审计功能之后，再来介绍它更为合适。事实上，维护关键业务数据（例如客户、交易等）的历史记录是企业应用中的一项基本功能。\n\
  \nEnvers 支持两种不同的审计策略，如表 10-3 所示。\n\n![images](img/t1003.jpg)\n\n在本节中，我们将演示有效性审计策略。虽然它会触发更多的数据库更新，但检索历史记录会快得多。由于最终修订时间戳也会写入历史记录，因此在查询数据时，更容易识别某个特定时间点的记录快照。\n\
  \n#### 添加 Hibernate Envers 依赖\n\n我们需要将表 10-4 中列出的 Maven 依赖添加到我们的项目中。\n\n![images](img/t1004.jpg)\n\
  \n#### 添加用于实体版本管理的表\n\n为了支持实体版本管理，我们需要添加一些表。首先，对于每个将要进行版本管理的实体（在本例中为 `ContactAudit`\
  \ 实体类）所对应的表，我们需要创建相应的历史表。为了对 `CONTACT_AUDIT` 表中的记录进行版本管理，让我们创建一个名为 `CONTACT_AUDIT_H`\
  \ 的历史表。清单 10-46 显示了该表的创建脚本（`schema.sql`）。\n\n***清单 10-46.** `CONTACT_AUDIT_H` 表*\n\
  \n`CREATE TABLE CONTACT_AUDIT_H (`\n`       ID INT NOT NULL`\n`    , FIRST_NAME\
  \ VARCHAR(60) NOT NULL`\n`    , LAST_NAME VARCHAR(40) NOT NULL`\n`    , BIRTH_DATE\
  \ DATE`\n`    , VERSION INT NOT NULL DEFAULT 0`\n`    , CREATED_BY VARCHAR(20)`\n\
  `    , CREATED_DATE TIMESTAMP`\n`    , LAST_MODIFIED_BY VARCHAR(20)`\n`    , LAST_MODIFIED_DATE\
  \ TIMESTAMP`\n**`    , AUDIT_REVISION INT NOT NULL`**\n**`    , ACTION_TYPE INT`**\n\
  **`    , AUDIT_REVISION_END INT`**\n**`    , AUDIT_REVISION_END_TS TIMESTAMP`**\n\
  `    , UNIQUE UQ_CONTACT_AUDIT_H_1 (FIRST_NAME, LAST_NAME)`\n`    , PRIMARY KEY\
  \ (ID, AUDIT_REVISION)`\n`);`\n\n为了支持有效性审计策略，我们需要为每个历史表添加四个列（清单 10-46 中加粗的列）。表 10-5\
  \ 显示了这些列及其用途。\n\n![images](img/t1005.jpg)\n\nHibernate Envers 还需要另一个表来跟踪修订号以及每次修订创建时的时间戳。该表名应为\
  \ `REVINFO`。清单 10-47 显示了该表的创建脚本（`schema.sql`）。\n\n***清单 10-47.** `REVINFO` 表*\n\n\
  `CREATE TABLE REVINFO (`\n`       REVTSTMP BIGINT NOT NULL`\n`    , REV INT NOT\
  \ NULL AUTO_INCREMENT`\n`    , PRIMARY KEY (REVTSTMP, REV)`\n`);`\n\n`REV` 列用于存储每次修订的编号，当创建新的历史记录时，该编号会自动递增。`REVTSTMP`\
  \ 列存储修订创建时的时间戳（以数字格式表示）。\n\n\n\n#### 为实体版本控制配置 EntityManagerFactory\n\nHibernate\
  \ Envers 以 EJB 监听器的形式实现。我们可以在 `LocalContainerEntityManagerFactory` bean 中配置这些监听器。清单\
  \ 10-48 展示了修改后的 bean 配置（位于文件 `spring-data-app-context.xml` 中）。\n\n***清单 10-48.**\
  \ 在 Spring 中配置 Hibernate Envers*\n\n`    <bean id=\"emf\" class=\"org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean\"\
  >`\n`        <!--  其他设置已省略  -->`\n`        <property name=\"jpaProperties\">`\n\
  `            <props>`\n\n`                <!-- 其他属性已省略 -->`\n\n`                <!--\
  \ Hibernate Envers 的监听器 -->`\n`                <prop key=\"hibernate.ejb.event.post-insert\"\
  >`\n`                    org.hibernate.ejb.event.EJB3PostInsertEventListener,`\n\
  **`org.hibernate.envers.event.AuditEventListener`**\n`                </prop>`\n\
  `                <prop key=\"hibernate.ejb.event.post-update\">`\n`                    org.hibernate.ejb.event.EJB3PostUpdateEventListener,`\n\
  **`org.hibernate.envers.event.AuditEventListener`**\n`                </prop>`\n\
  `                <prop key=\"hibernate.ejb.event.post-delete\">`\n`                    org.hibernate.ejb.event.EJB3PostDeleteEventListener,`\n\
  **`org.hibernate.envers.event.AuditEventListener`**\n`                </prop>`\n\
  `                <prop key=\"hibernate.ejb.event.pre-collection-update\">`\n**`                    org.hibernate.envers.event.AuditEventListener`**\n\
  `                </prop>`\n`                <prop key=\"hibernate.ejb.event.pre-collection-remove\"\
  >`\n**`                    org.hibernate.envers.event.AuditEventListener`**\n`                </prop>`\n\
  `                <prop key=\"hibernate.ejb.event.post-collection-recreate\">`\n\
  **`                    org.hibernate.envers.event.AuditEventListener`**\n`                </prop>`\n\
  \n`                <!-- Hibernate Envers 的属性 -->`\n`                <prop key=\"\
  org.hibernate.envers.audit_table_suffix\">_H</prop>`\n`                <prop key=\"\
  org.hibernate.envers.revision_field_name\">`\n`                    AUDIT_REVISION`\n\
  `                </prop>`\n`                <prop key=\"org.hibernate.envers.revision_type_field_name\"\
  >`\n`                    ACTION_TYPE`\n`                </prop>`\n`                <prop\
  \ key=\"org.hibernate.envers.audit_strategy\">`\n`                   org.hibernate.envers.strategy.ValidityAuditStrategy`\n\
  `                </prop>`\n`                <prop key=\"org.hibernate.envers.audit_strategy_validity_end_rev_field_name\"\
  >`\n`                    AUDIT_REVISION_END`\n`                </prop>`\n`                <prop\
  \ key=\"org.hibernate.envers.audit_strategy_validity_store_revend_timestamp\">`\n\
  `                    True`\n`                </prop>`\n`                <prop key=\"\
  org.hibernate.envers.audit_strategy_validity_revend_timestamp_field_name\">`\n`                    AUDIT_REVISION_END_TS`\n\
  `                </prop>`\n`            </props>`\n`        </property>`\n`    </bean>`\n\
  \n如清单 10-48 所示，Envers 审计事件监听器（`org.hibernate.envers.event.AuditEventListener`）被附加到各种持久化事件上。该监听器拦截\
  \ post-insert、post-update 或 post-delete 事件，并将实体类的更新前镜像克隆到历史表中。该监听器还附加到关联更新事件 `pre-collection-update`、`pre-collection-remove`\
  \ 和 `pre-collection-recreate` 上，用于处理实体类关联的更新操作。Envers 能够维护关联内实体的历史记录（例如，一对多、多对多等）。\n\
  \n还为 Hibernate Envers 定义了一些属性，这些属性总结在表 10-6 中（为清晰起见，省略了属性的前缀 `org.hibernate.envers`）。\n\
  \n![images](img/t1006.jpg)\n\n#### 实体版本控制与历史检索的编码变更\n\n要启用实体的版本控制，只需使用 `@Audited`\
  \ 注解实体类。清单 10-49 展示了应用了该注解的 `ContactAudit` 实体类。\n\n***清单 10-49.** 修改后的 `ContactAudit`\
  \ 类*\n\n`package com.apress.prospring3.ch10.domain;`\n\n`// 导入语句已省略`\n\n`import\
  \ org.hibernate.envers.Audited;`\n`import org.hibernate.envers.NotAudited;`\n\n\
  `@Entity`\n**`@Audited`**\n`@Table(name = \"contact_audit\")`\n`public class ContactAudit\
  \ implements Auditable<String, Long>, Serializable {`\n\n`    // 其他代码已省略`\n`    @ManyToMany`\n\
  **`    @NotAudited`**\n`    // 其他映射注解已省略`\n`    public Set<Hobby> getHobbies() {`\n\
  `        return this.hobbies;`\n`    }`\n\n`    @OneToMany(mappedBy = \"contact\"\
  , cascade=CascadeType.ALL,`\n`        orphanRemoval=true)`\n**`@NotAudited`**\n\
  `    public Set<ContactTelDetail> getContactTelDetails() {`\n`        return this.contactTelDetails;`\n\
  `    }`\n`}`\n\n如清单 10-49 所示，实体类使用 `@Audited` 进行了注解，Envers 监听器将检查该注解并对更新的实体执行版本控制。默认情况下，Envers\
  \ 也会尝试维护关联的历史记录。因此，它也会尝试维护联系人电话详细信息和爱好的历史记录。如果我们不想保留关联实体的版本，则需要使用 `@NotAudited`\
  \ 注解对它们进行注解。\n\n为了检索历史记录，Envers 提供了 `org.hibernate.envers.AuditReader` 接口，该接口可以从\
  \ `AuditReaderFactory` 类获取。让我们在 `ContactAuditService` 接口中添加一个名为 `findAuditByRevision()`\
  \ 的新方法，用于根据修订号检索 `ContactAudit` 历史记录。清单 10-50 展示了代码片段。\n\n***清单 10-50.** `findAuditByRevision()`\
  \ 方法*\n\n`package com.apress.prospring3.ch10.service;`\n\n`public interface ContactAuditService\
  \ {`\n\n`    public ContactAudit findAuditByRevision(Long id, int revision);`\n\
  `    …`\n`}`\n\n要检索历史记录，一种方法是传入实体的 ID 和修订号。Envers 还提供了其他检索历史记录的方法（详情请参考 `docs.jboss.org/hibernate/envers/3.6/reference/en-US/html/queries.html`）。清单\
  \ 10-51 展示了该方法的实现。\n\n***清单 10-51.** 实现 `findAuditByRevision()` 方法*\n\n`package\
  \ com.apress.prospring3.ch10.service.springjpa;`\n\n`// 导入语句已省略`\n\n`import org.hibernate.envers.AuditReader;`\n\
  `import org.hibernate.envers.AuditReaderFactory;`\n\n`@Service(\"contactAuditService\"\
  )`\n`@Repository`\n`@Transactional`\n`public class ContactAuditServiceImpl implements\
  \ ContactAuditService {`\n\n`    // 其他代码已省略`\n`    @PersistenceContext`\n`    private\
  \ EntityManager entityManager;`\n\n`    @Transactional(readOnly=true)`\n`    public\
  \ ContactAudit findAuditByRevision(Long id, int revision) {`\n`        AuditReader\
  \ auditReader = AuditReaderFactory.get(entityManager);`\n`        return auditReader.find(ContactAudit.class,\
  \ id, revision);`\n`    }`\n\n`}`\n\n如清单 10-51 所示，`EntityManager` 被注入到该类中，然后将其传递给\
  \ `AuditReaderFactory` 以获取 `AuditReader` 实例。然后，我们可以调用 `AuditReader.find()` 方法来检索特定修订版本下的\
  \ `ContactAudit` 实体实例。\n\n\n\n#### 测试实体版本控制\n\n让我们来看看实体版本控制是如何工作的。清单 10-52 展示了测试代码片段。在清单\
  \ 10-52 中，用于引导`ApplicationContext`和`listContacts()`函数的代码与`SpringJpaSample`类中的代码相同。\n\
  \n***清单 10-52.** 测试实体版本控制*\n\n`package com.apress.prospring3.ch10;`\n\n`// 导入语句已省略`\n\
  \n`public class SpringJpaAuditSample {`\n\n`       public static void main(String[]\
  \ args) {`\n\n`              // 其他代码已省略`\n`              // 添加新联系人`\n`              System.out.println(\"\
  添加新联系人\");`\n`              ContactAudit contact = new ContactAudit();`\n`              contact.setFirstName(\"\
  Michael\");`\n`              contact.setLastName(\"Jackson\");`\n`              contact.setBirthDate(new\
  \ Date());`\n`              contactService.save(contact);`\n`              contacts\
  \ = contactService.findAll();`\n`              listContacts(contacts);`\n\n`              //\
  \ 更新联系人`\n`              System.out.println(\"更新联系人\");`\n`              contact.setFirstName(\"\
  Tom\");`\n`              contactService.save(contact);`\n`              contacts\
  \ = contactService.findAll();`\n`              listContacts(contacts);`\n\n`              //\
  \ 按修订号查找审计记录`\n`              ContactAudit oldContact = contactService.findAuditByRevision(1l,\
  \ 1);`\n`              System.out.println(\"\");`\n`              System.out.println(\"\
  ID 为 1 且修订号为 1 的旧联系人:\" + oldContact);`\n`              System.out.println(\"\"\
  );`\n`              oldContact = contactService.findAuditByRevision(1l, 2);`\n`              System.out.println(\"\
  \");`\n`              System.out.println(\"ID 为 1 且修订号为 2 的旧联系人:\" + oldContact);`\n\
  `              System.out.println(\"\");`\n`       }`\n\n`}`\n\n从清单 10-52 中，我们首先创建一个新联系人，然后对其进行更新。接着，我们分别检索修订号为\
  \ 1 和 2 的`ContactAudit`实体。运行代码将产生以下输出：\n\n`列出联系人（不含详细信息）:`\n`联系人 - ID: 1, 名字: Tom,\
  \ 姓氏: Jackson, 生日: 2011-10-21, 创建者:`\n`prospring3, 创建日期: 2011-10-21T13:54:24.242+08:00,\
  \ 修改者: prospring3, 修改`\n`日期: 2011-10-21T13:54:24.360+08:00`\n\n`ID 为 1 且修订号为 1 的旧联系人:联系人\
  \ - ID: 1, 名字: Michael, 姓氏: Jackson,`\n`生日: 2011-10-21, 创建者: prospring3, 创建日期: 2011-10-21T13:54:24.242+08:00,`\n\
  `修改者: prospring3, 修改日期: 2011-10-21T13:54:24.242+08:00`\n\n`ID 为 1 且修订号为 2 的旧联系人:联系人\
  \ - ID: 1, 名字: Tom, 姓氏: Jackson,`\n`生日: 2011-10-21, 创建者: prospring3, 创建日期: 2011-10-21T13:54:24.242+08:00,`\n\
  `修改者: prospring3, 修改日期: 2011-10-21T13:54:24.360+08:00`\n\n从之前的输出中，你可以看到，在更新操作之后，`ContactAudit`的名字被改为了\
  \ Tom。然而，查看历史记录时，在修订号 1 处，名字是 Michael。在修订号 2 处，名字变成了 Tom。同时请注意，修订号 2 的最后修改日期正确地反映了更新后的日期时间。\n\
  \n### 使用 JPA 时的注意事项\n\n尽管本章篇幅较长，但只涵盖了 JPA 的一小部分。例如，未涉及使用 JPA 调用数据库存储过程。JPA 是一个完整且强大的\
  \ ORM 数据访问标准，借助 Spring Data JPA 和 Hibernate Envers 等第三方库，你可以相对容易地实现各种横切关注点。\n\n\
  JPA 是一个 JEE 标准，受到大多数主要开源社区以及商业供应商（例如，JBoss、GlassFish、WebSphere、WebLogic 等）的支持。因此，采用\
  \ JPA 作为数据访问标准是一个很有吸引力的选择。如果你需要对查询进行绝对控制，可以使用 JPA 的原生查询支持，而不是直接使用 JDBC。\n\n总之，对于使用\
  \ Spring 开发 JEE 应用程序，我们建议使用 JPA 来实现数据访问层。在需要时，你仍然可以混合使用 JDBC 来满足某些特殊的数据访问需求。请始终记住，Spring\
  \ 允许你轻松地混合搭配不同的数据访问技术，并且为你透明地处理事务管理。\n\n### 在示例应用程序中使用 JPA\n\n在本节中，我们将讨论本章讨论的主题与我们将要开发的示例应用程序之间的关系。主题包括后端数据库以及用于各种数据库操作的\
  \ JPA 实现。\n\n我们还将重点介绍我们如何采用 Spring Data JPA 中的特性来帮助简化数据访问逻辑并跟踪基本的审计信息。\n\n最后，我们将讨论示例应用程序的实体版本控制功能是如何使用\
  \ Hibernate 的 Envers 模块实现的。\n\n#### 数据库后端\n\n对于数据库后端，将使用带有 H2 的 JDBC 嵌入式数据库。但是，脚本（数据库创建脚本、初始数据填充脚本）也将设计为与\
  \ MySQL 兼容。因此，在需要时，应用程序能够使用 MySQL 作为后端数据库。\n\n对于 Spring 的`ApplicationContext`配置，我们将简单地使用`<jdbc:embedded-database>`标签来声明一个嵌入式数据库。将开发两个\
  \ SQL 脚本。一个（名为`schema.sql`）用于数据库创建，另一个（名为`initial-data.sql`）用于初始数据填充（例如，初始用户、类别和子类别、示例博客条目等）。\n\
  \n#### 使用 JPA 实现持久层\n\n如第 3 章所述，对于持久层，将提供两种不同的实现。一种使用 JPA，另一种使用 MyBatis。\n\n对于 JPA\
  \ 实现，我们将使用 JPA 2，并以 Hibernate 作为持久化提供者。所有实体类将放置在`com.apress.prospring3.springblog.domain`包下，对象关系映射属性将使用标准的\
  \ JPA 2 注解（位于`javax.persistence`包下）来定义。\n\n此外，我们将使用 Spring Data JPA 来简化各种数据库操作。所有仓库接口（例如，用于支持`Entry`实体类的`EntryRepository`接口）将放置在`com.apress.prospring3.springblog.repository`包下。此外，为了支持在\
  \ Web 应用程序前端浏览博客条目，将实现分页支持。\n\n在数据库操作方面，查询是最复杂的部分。在前端，用户可以选择按发布日期、类别和子类别等过滤条目。为了满足这一需求，我们将使用\
  \ JPA 2 的强类型条件查询 API。\n\n#### 审计与实体版本控制\n\n在示例应用程序中，所有博客条目和评论都将启用审计功能。\n\n借助 Spring\
  \ Data JPA 的审计功能，我们将跟踪博客帖子和评论的基本审计信息（创建者、创建日期、最后修改者、最后修改日期）。\n\n当博客帖子条目或评论被更新时，将使用\
  \ Hibernate 的 Envers 模块来保存每个记录的版本。将为博客帖子和评论表创建历史表以保存历史记录。\n\n有关详细信息，请参阅第 21 章。\n\
  \n\n\n### 本章小结\n\n本章介绍了 JPA 的基本概念，以及如何在 Spring 中配置 JPA 的`EntityManagerFactory`，并使用\
  \ Hibernate 作为持久化服务提供者。\n\n随后，我们讨论了如何使用 JPA 执行基本的数据库操作。高级主题包括原生查询和强类型的 JPA Criteria\
  \ API。\n\n接着，我们演示了 Spring Data JPA 的`Repository`抽象如何帮助简化 JPA 应用程序开发，以及如何使用其实体监听器来跟踪实体类的基本审计信息。对于实体类的完整版本控制，还介绍了如何使用\
  \ Hibernate Envers 来满足这一需求。\n\n下一章，我们将讨论另一个流行的数据访问库：MyBatis（原名 iBATIS）。\n\n## 第\
  \ 11 章\n\n## 在 Spring 中使用 MyBatis\n\n在前三章中，你了解了 Spring 如何支持与不同库和技术无缝集成，以实现数据访问逻辑，从传统的\
  \ JDBC 方法到 ORM 解决方案，包括 Hibernate 和 JEE 标准 JPA。本章我们将讨论另一个流行的数据访问库：MyBatis（[`www.mybatis.org`](http://www.mybatis.org)）。\n\
  \nMyBatis 原名 iBATIS（曾托管于 Apache 软件基金会，现已退役），是一个 Java 库（也有.NET 版本），它提供了一个数据映射框架，用于将数据库关系结构映射到\
  \ Java 的面向对象模型。然而，与 ORM 专注于面向对象模型编程不同，MyBatis 更侧重于 SQL 层面。你可以将 MyBatis 视为 JDBC 和\
  \ ORM 之间的混合方法。MyBatis 开发团队将其归类为面向对象软件开发的基于 SQL 的数据映射解决方案。\n\n本章我们将重点介绍如何使用 MyBatis\
  \ 实现 Spring 应用程序的数据访问层。具体来说，我们将涵盖以下内容：\n\n*   **配置**：我们将讨论如何配置 MyBatis 与 Spring\
  \ 集成，包括所需的 Maven 依赖项，以及在 Spring 的`ApplicationContext`中配置 MyBatis 的`SqlSessionFactory`。\n\
  *   **MyBatis SQL 映射**：在本节中，你将学习如何使用 MyBatis 定义 SQL 映射，以将 SQL 查询的结果集转换为相应 Java 领域对象的属性。\n\
  *   **CRUD 操作**：你将学习如何使用 MyBatis 实现选择、更新和删除操作。你还将学习如何实现代表主要数据关系类型的选择操作。\n*   **在示例应用程序中使用\
  \ MyBatis**：在示例应用程序中，对于 MyBatis 实现，我们将消除 DAO 层，并将 MyBatis 映射器直接注入服务层以执行业务逻辑。我们将讨论如何在示例应用程序中采用\
  \ MyBatis。\n\n### 在 Spring 中开始使用 MyBatis\n\n本节将介绍如何设置 MyBatis 以与 Spring 协同工作。首先，我们将简要介绍\
  \ MyBatis，然后演示如何在 STS 中创建一个用于 MyBatis 的项目。此外，我们还将介绍本章用于实现示例的数据模型。最后，我们将讨论使用 MyBatis\
  \ 所需的 Spring 配置。\n\n#### 介绍 MyBatis\n\niBATIS 是 MyBatis 的旧称，由 Clinton Begin 于 2001\
  \ 年创建，项目代码于 2004 年捐赠给 Apache 软件基金会（ASF）。凭借其专注于 SQL 映射、简单的基础架构以及从 SQL 查询到 Java 面向对象模型的易于理解的映射定义，iBATIS\
  \ 迅速流行起来，并成为 Java 开发者社区中最常用的数据访问库之一。\n\n在 ASF 停留六年后，iBATIS 开发团队意识到开源世界中的数据访问技术已经发生了巨大变化。因此，团队决定对该库进行大量重大更改。从版本\
  \ 3 开始，该项目也更名为 MyBatis，离开 ASF，成为一个独立的开源框架。ASF 的 iBATIS 项目也随之退役。在撰写本文时，MyBatis 的当前版本是\
  \ 3.0.6。\n\n在 Spring 3.0 之前，Spring 对 iBATIS 版本 2 提供了开箱即用的支持。然而，由于难以将 iBATIS 2 到\
  \ MyBatis 3 的巨大变化与 Spring 框架同步，Spring 开发团队决定放弃对 MyBatis 的内置支持。\n\n为了应对这种情况，MyBatis\
  \ 团队启动了 MyBatis Spring 集成项目（称为`mybatis-spring`）。在撰写本文时，`mybatis-spring`的当前版本是 1.0.2。\n\
  \n#### 在 STS 中创建支持 MyBatis 的简单实用项目\n\n在 STS 中，没有提供用于 Spring 与 MyBatis 集成的模板项目，因此我们需要在\
  \ STS 中创建一个简单的 Spring 实用项目，然后手动添加所需的依赖项。首先在 STS 中创建一个简单的 Spring 实用项目（详情请参阅附录 A）。请仔细检查项目是否使用\
  \ JSE 6 和 Spring 3.1。\n\n项目创建后，在 POM 编辑器中打开`pom.xml`文件，并添加表 11-1 中列出的依赖项。\n\n![images](img/t1101.jpg)\n\
  \n图 11-1 显示了定义所有依赖项后，STS 中 Maven 依赖项的情况。\n\n![images](img/9781430241072_Fig11-01.jpg)\n\
  \n***图 11-1.** Spring 与 MyBatis 的 Maven 依赖项*\n\n为了让 MyBatis 显示所有发送到数据库的 SQL 查询，我们需要开启`DEBUG`日志级别。让我们将\
  \ log4j 属性文件放入`src/main/resources`文件夹，并将根日志记录器级别设置为`DEBUG`。清单 11-1 显示了`log4j.properties`文件的内容。\n\
  \n![images](img/square.jpg) **注意**  在 STS 中，创建 Spring 模板项目后，STS 会在`src/test/resources`文件夹中生成一个`log4j.properties`文件。你可以简单地将该文件移动到`src/main/resources`文件夹并进行修改，或者删除`src/test/resources`中的文件，然后在`/src/main/resources`文件夹中创建`log4j.properties`文件。\n\
  \n***清单 11-1.** `log4j.properties`文件*\n\n`log4j.rootCategory=DEBUG, stdout`\n`log4j.appender.stdout=org.apache.log4j.ConsoleAppender`\n\
  `log4j.appender.stdout.layout=org.apache.log4j.PatternLayout`\n`log4j.appender.stdout.layout.ConversionPattern=%d{ABSOLUTE}\
  \ %5p %40.40c:%4L - %m%n`\n\n\n\n#### 示例代码的样本数据模型\n\n本章示例所使用的样本数据模型，与第 9 章讨论在 Spring\
  \ 中使用 Hibernate 时的模型基本相同，仅做了少量修改。图 11-2 展示了该样本数据模型。\n\n![images](img/9781430241072_Fig11-02.jpg)\n\
  \n***图 11-2.** MyBatis 的样本数据模型*\n\n该模型与第 9 章模型的主要区别在于，移除了`CONTACT`和`CONTACT_TEL_DETAIL`表中的`VERSION`列。主要原因在于\
  \ MyBatis 不像 Hibernate 那样提供基于`VERSION`列的乐观锁支持。不过，在示例应用中你将看到如何使用 MyBatis 实现乐观锁。\n\
  \n代码清单 11-2 和 11-3 分别展示了模式创建脚本（`schema.sql`）和样本数据填充脚本（`test-data.sql`）。\n\n***代码清单\
  \ 11-2.** 样本数据模型创建脚本*\n\n`CREATE TABLE CONTACT (`\n`    ID INT NOT NULL AUTO_INCREMENT`\n\
