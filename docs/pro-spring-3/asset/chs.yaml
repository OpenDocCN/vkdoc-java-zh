  \ 将在数据绑定后对 `Contact` 领域对象执行 JSR-303 验证，如果发现违反约束的情况，则会抛出异常。\n\n为了观察其实际效果，让我们修改 `RestfulClientSample`\
  \ 类的插入操作。清单 16-41 展示了 `RestfulClientSample` 类中用于测试插入操作的修改后的代码片段。\n\n***清单 16-41.**\
