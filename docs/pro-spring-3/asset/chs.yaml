  \n准备好联系人列表视图和显示联系人视图后，我们可以继续实现添加联系人流程。在以下各节中，我们将讨论添加联系人流程中视图的实现。\n\n#### 步骤 1：输入基本信息\n\
  \n当用户在列表联系人视图中单击“添加联系人”按钮时，将启动添加联系人流程。第一个状态是步骤 1，用户将在其中输入联系人的基本信息，包括名字、姓氏和出生日期。\n\
  \n看看清单 18-14 中的代码片段，该片段摘自清单 18-5（`flow.xml`）中起始状态的流程定义。\n\n***清单 18-14.** 从列表联系人导航到添加联系人的步骤\
