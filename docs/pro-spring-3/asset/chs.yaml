  \ 21 章中讨论。\n\n### 文件上传处理\n\n联系人信息有一个 `BLOB` 类型的字段用于存储照片，可以从客户端上传。在本节中，我们将讨论如何在 Spring\
  \ MVC 中实现文件上传。\n\n长期以来，标准的 Servlet 规范不支持文件上传。因此，Spring MVC 与其他库（最常见的是 Apache Commons\
  \ FileUpload 库，[`http://commons.apache.org/fileupload`](http://commons.apache.org/fileupload)）一起工作来实现此目的。Spring\
  \ MVC 内置了对 Commons FileUpload 的支持。但是，从 Servlet 3.0 开始，文件上传已成为 Web 容器的内置功能。Tomcat\
  \ 7 支持 Servlet 3.0，Spring 3.1 也增加了对 Servlet 3.0 文件上传的支持。\n\n在以下各节中，我们将讨论如何使用 Spring\
  \ MVC 3.1 和 Servlet 3.0 实现文件上传。\n\n为了支持文件上传，我们需要一个额外的依赖项，并且还需要将 Servlet API 的依赖项从版本\
  \ 2.5 修订为 3.0。表 17-7 显示了需要删除的依赖项以及我们需要添加的两个新依赖项。\n\n![images](img/t1707.jpg)\n\n\
  #### 配置文件上传支持\n\n在使用 Spring MVC 的 Servlet 3.0 兼容 Web 容器中，配置文件上传支持是一个两步过程。\n\n首先，在用于\
  \ `DispatchServlet` 定义的 Web 部署描述符（`web.xml`）中，我们需要添加一个 `<multipart-config>` 部分。清单\
  \ 17-52 展示了此更改的代码片段。\n\n***清单 17-52.** 在 `web.xml` 中添加文件上传支持*\n\n`<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>` `<web-app version=\"3.0\"`  `    <!-- 其他代码已省略 -->` \
  \ `    <!-- Processes application requests -->` `    <servlet>` `        <servlet-name>appServlet</servlet-name>`\
  \ `        <servlet-class>org.springframework.web.servlet.DispatcherServlet</servlet-class>`\
  \ `        <init-param>` `            <param-name>contextConfigLocation</param-name>`\
  \ `            <param-value>/WEB-INF/spring/appServlet/servlet-context.xml</param-value>`\
  \ `        </init-param>` **`<load-on-startup>1</load-on-startup>`** **`<multipart-config>`**\
  \ **`<max-file-size>5000000</max-file-size>`** **`</multipart-config>`** `    </servlet>`\
  \ `    <!-- 其他代码已省略 -->`  `</web-app>`\n\n更改已用粗体标出。在 Servlet 3.0 中，支持文件上传的 servlet\
  \ 应提供一个 `<multipart-config>` 标签来配置支持。`<max-file-size>` 标签控制允许上传的最大文件大小，这里是 5MB。\n\
  \n其次，我们需要在 `DispatcherServlet` 的 `WebApplicationContext` 中配置一个实现 `MultipartResolver`\
  \ 接口的 bean。清单 17-53 展示了您需要添加到文件（`servlet-context.xml`）中的 bean 定义。\n\n***清单 17-53.**\
