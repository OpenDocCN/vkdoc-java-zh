  \n因为我们在 `DispatcherServlet` 的 `WebApplicationContext` 中定义了 `localeResolver`，Spring\
  \ MVC 会将区域设置存储在浏览器的 cookie 中（名称为 `locale`），并且默认情况下，该 cookie 会在用户会话期间保留。如果您希望将 cookie\
  \ 保留更长时间，可以在清单 17-13 的 `localeResolver` bean 定义中覆盖属性 `cookieMaxAge`，该属性继承自类 `org.springframework.web.util.CookieGenerator`。\n\
  \n要切换到英语（美国），您可以在浏览器中附加 URL `?lang=en_US`，页面将切换回英语（美国）。尽管我们没有提供名为 `application_en_US.properties`\
  \ 的属性文件，但 Spring MVC 会回退到使用文件 `application.properties`，该文件以默认语言英语存储属性。\n\n### 主题化和模板化\n\
  \n除了国际化，Web 应用程序还需要适当的外观和感觉（例如，商业网站需要专业的外观，而社交网站需要更生动的风格），以及一致的布局，以便用户在使用 Web 应用程序时不会感到困惑。\n\
  \n在 Web 应用程序中，样式应该外部化到样式表中，而不是硬编码到视图页面中。此外，样式名称应该保持一致，以便可以通过简单地切换样式表文件来准备各种“主题”。Spring\
  \ MVC 为 Web 应用程序的主题化提供了全面的支持。\n\n此外，为了提供一致的布局，需要一个模板框架。在本节中，我们将使用 Apache Tiles ([`http://tiles.apache.org`](http://tiles.apache.org))，一个流行的页面模板框架，用于视图模板支持。Spring\
  \ MVC 在这方面与 Apache Tiles 紧密集成。\n\n在以下各节中，我们将讨论如何在 Spring MVC 中启用主题化支持，以及如何使用 Apache\
  \ Tiles 定义我们的页面布局。\n\n#### 主题化支持\n\nSpring MVC 为主题化提供了全面的支持，并且在 Web 应用程序中启用它很容易。例如，在本章的联系人示例应用程序中，我们想创建一个主题并将其命名为\
  \ `standard`。首先，在文件夹 `/src/main/webapp/WEB-INF/classes` 中，创建一个名为 `standard.properties`\
  \ 的文件，内容如清单 17-15 所示。\n\n***清单 17-15.** `standard.properties` 文件*\n\n`styleSheet=resources/styles/standard.css`\n\
  \n如清单 17-15 所示，该属性文件包含一个名为 `styleSheet` 的属性，它指向标准主题要使用的样式表。此属性文件是该主题的 `ResourceBundle`，您可以根据需要为主题添加任意数量的组件（例如，徽标图像位置、背景图像位置等）。\n\
  \n下一步是通过修改配置文件（`servlet-context.xml`）来配置 `DispatcherServlet` 的 `WebApplicationContext`\
  \ 以支持主题化。首先，在 `<interceptors>` 定义中，我们需要添加一个拦截器 bean，如清单 17-16 所示。\n\n***清单 17-16.**\
  \ 配置主题拦截器*\n\n`   <interceptors>` **`<beans:bean class=\"org.springframework.web.servlet.theme.ThemeChangeInterceptor\"\
  />`** `      <beans:bean class=\"org.springframework.web.servlet.i18n.LocaleChangeInterceptor\"\
  ` `p:paramName=\"lang\"/>` `   </interceptors>  `\n\n如清单 17-16 所示，新的拦截器已用粗体标出（顺序不重要）。`ThemeChangeInterceptor`\
  \ 类拦截每个请求以更改主题。\n\n其次，将清单 17-17 中的 bean 定义添加到配置文件（`servlet-context.xml`）中。\n\n***清单\
  \ 17-17.** 配置主题支持*\n\n`    <beans:bean class=\"org.springframework.ui.context.support.ResourceBundleThemeSource\"\
  ` `id=\"themeSource\"/>`  `    <beans:bean class=\"org.springframework.web.servlet.theme.CookieThemeResolver\"\
  ` `id=\"themeResolver\" p:cookieName=\"theme\" p:defaultThemeName=\"standard\"/>`\n\
  \n如清单 17-17 所示，定义了两个 bean。第一个 bean 由 `ResourceBundleThemeSource` 类实现，负责加载活动主题的 `ResourceBundle`。例如，如果活动主题名为\
  \ `standard`，则该 bean 将查找文件 `standard.properties` 作为该主题的 `ResourceBundle`。第二个 bean\
  \ 由 `CookieThemeResolver` 类实现，用于解析用户的活动主题。属性 `defaultThemeName` 定义了要使用的默认主题，即 `standard`\
  \ 主题。请注意，顾名思义，`CookieThemeResolver` 类使用 cookie 为用户存储主题。还存在 `SessionThemeResolver`\
  \ 类，它将主题属性存储在用户的会话中。\n\n现在 `standard` 主题已配置好，可以在我们的视图中使用了。清单 17-18 展示了修订后的、支持主题化的联系人列表视图（`/WEB-INF/views/contacts/list.jspx`）。\n\
  \n***清单 17-18.** 支持主题化的联系人列表视图*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"\
  no\"?>`  `    <!-- 其他代码已省略 -->` `    <spring:message code=\"label_contact_birth_date\"\
  \ var=\"labelContactBirthDate\"/>`  **`<head>`** **`<spring:theme code=\"styleSheet\"\
  \ var=\"app_css\" />`** **`<spring:url value=\"/${app_css}\" var=\"app_css_url\"\
  \ />`** **`<link rel=\"stylesheet\" type=\"text/css\" media=\"screen\" href=\"${app_css_url}\"\
  \ />`** **`</head>`**  `    <h1>${labelContactList}</h1>  `  `    <!-- 其他代码已省略 -->`\
  \  `</div>`\n\n在清单 17-18 中，新代码已用粗体标出。在视图中添加了一个 `<head>` 部分，并使用 `<spring:theme>`\
  \ 标签从主题的 `ResourceBundle` 中检索 `styleSheet` 属性，即样式表文件 `standard.css`。最后，将样式表的链接添加到视图中。\n\
  \n将应用程序重新构建并部署到服务器后，再次打开浏览器并访问联系人列表视图的 URL ([`http://localhost:8080/ch17/contacts`](http://localhost:8080/ch17/contacts))，您将看到\
  \ `standard.css` 文件中定义的样式已被应用，如图 17-8 所示。\n\n![images](img/9781430241072_Fig17-08.jpg)\n\
  \n***图 17-8.** 启用了主题化支持的联系人列表视图*\n\n使用 Spring MVC 的主题化支持，您可以轻松地在应用程序中添加新主题或更改现有主题。\n\
  \n#### 使用 Apache Tiles 进行视图模板化\n\n对于使用 JSP 技术的视图模板化，Apache Tiles ([`http://tiles.apache.org`](http://tiles.apache.org))\
  \ 是目前最流行的框架。Spring MVC 与 Tiles 紧密集成。\n\n为了使用 Tiles，我们需要在项目中添加所需的依赖项，如表 17-4 所示。\n\
  \n![images](img/t1704.jpg)\n\n在以下各节中，我们将讨论如何实现页面模板，包括页面布局设计、定义以及布局内组件的实现。\n\n#####\
  \ 模板布局设计\n\n首先，我们需要确定应用程序需要多少个模板，以及每个不同模板的布局是什么样的。\n\n在本章的联系人示例中，我们只需要一个模板。布局相当简单，如图\
  \ 17-9 所示。\n\n![images](img/9781430241072_Fig17-09.jpg)\n\n***图 17-9.** 包含布局组件的页面模板*\n\
  \n如图 17-9 所示，该模板需要以下页面组件：\n\n*   `/WEB-INF/views/header.jspx`：此页面提供页眉区域。\n*   `/WEB-INF/views/menu.jspx`：此页面提供左侧菜单区域，以及将在本章后面实现的登录表单。\n\
  *   `/WEB-INF/views/footer.jspx`：此页面提供页脚区域。\n\n我们将使用 Apache Tiles 来定义模板，并且需要开发页面模板文件以及布局定义文件，如下所列：\n\
  \n*   `/WEB-INF/layouts/default.jspx`：此页面提供特定模板的整体页面布局。\n*   `/WEB-INF/layouts/layouts.xml`：此文件存储\
  \ Apache Tiles 所需的页面布局定义。\n\n##### 实现页面布局组件\n\n定义好布局后，我们可以实现页面组件。首先，我们将开发 Apache\
  \ Tiles 所需的页面模板文件和布局定义文件。\n\n清单 17-19 展示了 Apache Tiles 定义文件（`src/main/webapp/WEB-INF/layouts.xml`）。\n\
