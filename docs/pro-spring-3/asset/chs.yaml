  \ bean 以斜体显示，而新的 bean 定义以粗体显示。首先，移除了原始的 `ViewResolver` bean（使用 `InternalResourceViewResolver`\
  \ 类）。然后，定义了一个类为 `UrlBasedViewResolver` 的 `ViewResolver` bean，其属性 `viewClass` 设置为\
  \ `TilesView` 类，这是 Spring MVC 对 Tiles 的支持。最后，定义了一个 `tilesConfigurer` bean，它提供了 Tiles\
  \ 所需的布局配置。\n\n我们需要准备的最后一个配置文件是 `/WEB-INF/views/contacts/views.xml` 文件，它定义了示例中联系人应用程序的视图。清单\
