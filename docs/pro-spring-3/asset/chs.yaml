  \n#### 使用注解保护控制器方法\n\n在菜单中隐藏新建联系人链接是不够的。例如，如果您直接在浏览器中输入 URL ([`http://localhost:8080/ch17/contacts?form`](http://localhost:8080/ch17/contacts?form))，即使您尚未登录，您仍然可以看到添加联系人页面。原因是我们还没有在\
  \ URL 级别保护应用程序。保护页面的一种方法是在 Spring Security 过滤器链（在文件 `security-context.xml` 中）中配置仅允许经过身份验证的用户访问该\
  \ URL。但是，这样做会阻止所有其他用户查看联系人列表视图。\n\n解决此问题的另一种方法是使用 Spring Security 的注解支持，在控制器方法级别应用安全性。\n\
  \n要启用方法级安全性，我们需要修改 `DispatcherServlet` 配置（`servlet-context.xml`），如清单 17-63 所示。\n\
  \n***清单 17-63.** 启用方法级安全性*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>` `<beans:beans`\
  \      ````` `    xsi:schemaLocation=\"http://www.springframework.org/schema/mvc`\
  \ `        http://www.springframework.org/schema/mvc/spring-mvc-3.1.xsd` `        http://www.springframework.org/schema/beans`\
  \ `        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd` `        http://www.springframework.org/schema/context`\
  \ `        http://www.springframework.org/schema/context/spring-context-3.1.xsd`\
  \ **`http://www.springframework.org/schema/security`** **`http://www.springframework.org/schema/security/spring-security-3.1.xsd\"\
  >`**  `    <!-- DispatcherServlet Context: defines this servlet's request-processing\
  \ infrastructure -->`  `    <!-- Enables the Spring MVC @Controller programming\
  \ model -->` `    <annotation-driven validator=\"validator\"/>`  **`<!-- Enable\
  \ controller method level security -->`** **`<security:global-method-security pre-post-annotations=\"\
  enabled\"/>`**  `    <!-- 其他代码已省略 -->`  `</beans:beans>`\n\n如清单 17-63 所示，添加了 `security`\
  \ 命名空间。然后，使用 `<security:global-method-security>` 标签启用 Spring Security 的方法级安全性，`pre-post-annotations`\
  \ 属性启用了对注解的支持。\n\n现在，我们可以对我们想要保护的控制器方法使用 `@PreAuthorize` 注解。清单 17-64 展示了保护 `createForm()`\
  \ 方法的示例。\n\n***清单 17-64.** 应用 Spring Security 注解*\n\n**`@PreAuthorize(\"isAuthenticated()\"\
  )`** `    @RequestMapping(params = \"form\", method = RequestMethod.GET)` `    public\
  \ String createForm(Model uiModel) {` `        Contact contact = new Contact();`\
  \ `        uiModel.addAttribute(\"contact\", contact);` `        return \"contacts/create\"\
  ;` `    }`\n\n如清单 17-64 所示，我们使用 `@PreAuthorize` 注解（位于包 `org.springframework.security.access.prepost`\
  \ 下）来保护 `createForm()` 方法，其参数是安全需求的表达式。\n\n现在，您可以尝试直接在浏览器中输入新建联系人 URL，如果您未登录，Spring\
  \ Security 会将您重定向到登录页面，即 `security-context.xml` 文件中配置的联系人列表视图。\n\n### 支持 Servlet\
  \ 3 基于代码的配置\n\nSpring 3.1 中与 Web 层相关的另一个新功能是对 Servlet 3 基于代码的配置的支持，它为 Web 部署描述符文件（`web.xml`）中所需的\
  \ XML 配置提供了一种替代方案。在本节中，我们将向您展示如何使用 Java 代码来引导 `DispatcherServlet` `WebApplicationContext`，而不是在\
  \ `web.xml` 文件中配置它。\n\n要使用基于代码的配置，我们只需要开发一个实现 `org.springframework.web.WebApplicationInitializer`\
  \ 接口的类。`WebApplicationInitializer` 接口是在 Spring 3.1 中引入的，所有实现此接口的类都将被 `org.springframework.web.SpringServletContainerInitializer`\
  \ 类（它实现了 Servlet 3 的 `javax.servlet.ServletContainerInitializer` 接口）自动检测到，该类在任何\
  \ Servlet 3.0 容器中自动引导。\n\n让我们看一个使用基于代码的配置来引导 `DispatcherServlet` `WebApplicationContext`\
  \ 的简单示例，而不是在 `web.xml` 文件中声明它。\n\n首先，从 `web.xml` 文件中移除清单 17-65 中的以下 servlet 和 servlet\
  \ 映射定义。\n\n***清单 17-65.** 从 `web.xml` 中移除以下 Servlet 定义*\n\n`    <servlet>` `        <servlet-name>appServlet</servlet-name>`\
  \ `        <servlet-class>org.springframework.web.servlet.DispatcherServlet</servlet-class>`\
  \ `        <init-param>` `            <param-name>contextConfigLocation</param-name>`\
  \ `            <param-value>/WEB-INF/spring/appServlet/servlet-context.xml</param-value>`\
  \ `        </init-param>` `        <load-on-startup>1</load-on-startup>` `        <multipart-config>`\
  \ `            <max-file-size>5000000</max-file-size>` `        </multipart-config>               `\
  \ `    </servlet>`  `    <servlet-mapping>` `        <servlet-name>appServlet</servlet-name>`\
  \ `        <url-pattern>/</url-pattern>` `    </servlet-mapping>`\n\n其次，创建一个实现 `WebApplicationInitializer`\
  \ 接口的类。我们在这里将其命名为 `MyWebAppInitializer`，其内容如清单 17-66 所示。\n\n***清单 17-66.** `MyWebAppInitializer`\
  \ 类*\n\n`package com.apress.prospring3.ch17.web.init;`  `import javax.servlet.MultipartConfigElement;`\
  \ `import javax.servlet.ServletContext;` `import javax.servlet.ServletException;`\
  \ `import javax.servlet.ServletRegistration;`  `import org.springframework.web.WebApplicationInitializer;`\
  \ `import org.springframework.web.context.support.XmlWebApplicationContext;` `import\
  \ org.springframework.web.servlet.DispatcherServlet;`  `public class MyWebAppInitializer\
  \ implements WebApplicationInitializer {`  `    @Override` `    public void onStartup(ServletContext\
  \ container) throws ServletException {`  `        XmlWebApplicationContext appContext\
  \ = new XmlWebApplicationContext();` `        appContext.setConfigLocation(\"/WEB-INF/spring/appServlet/servlet-context.xml\"\
  );`  `        ServletRegistration.Dynamic dispatcher =` `            container.addServlet(\"\
  appServlet\", new DispatcherServlet(appContext));`  `        MultipartConfigElement\
  \ multipartConfigElement =` `            new MultipartConfigElement(null, 5000000,\
  \ 5000000, 0);` `        dispatcher.setMultipartConfig(multipartConfigElement);`\
  \  `        dispatcher.setLoadOnStartup(1);` `        dispatcher.addMapping(\"/\"\
  );` `    }` `}`\n\n如清单 17-66 所示，重写了 `WebApplicationInitializer.onStartup()` 方法，其中包含了加载\
  \ `DispatcherServlet` 的 `WebApplicationContext` 的逻辑。通过调用 `ServletContext.addServlet()`\
  \ 方法，我们可以将 servlet 添加到底层 Web 容器。该方法将返回一个 `javax.servlet.ServletRegistration.Dynamic`\
  \ 接口的实例，通过此接口，我们可以配置 servlet 的各种属性，例如 `loadOnStartup`、servlet 到 URL 的映射，以及用于文件上传的多部分支持等。重新构建并部署项目，`DispatcherServlet`\
  \ 的 `WebApplicationContext` 将像在 `web.xml` 文件中定义的那样被引导。\n\n使用这种方法，当与 Spring 的基于 Java\
  \ 代码的配置结合使用时，可以实现纯基于 Java 代码的 Spring Web 应用程序配置，而无需在 `web.xml` 或其他 Spring XML 配置文件中声明任何\
  \ Spring 配置。有关此功能的更详细描述，请参考 Spring Framework 关于 `WebApplicationInitializer` 接口的在线文档\
  \ ([`http://static.springsource.org/spring/docs/3.1.x/javadoc-api/org/springframework/web/WebApplicationInitializer.html`](http://static.springsource.org/spring/docs/3.1.x/javadoc-api/org/springframework/web/WebApplicationInitializer.html))。\n\
  \n### 示例应用程序中的 Spring MVC\n\n本章讨论的许多主题将在示例应用程序中用于实现表示层，它们之间的关系将在本节中介绍。\n\n#### SpringBlog\
  \ 的 MVC 实现\n\n对于 SpringBlog 应用程序的表示层，将使用 Spring MVC 来实现 MVC 模式，并将使用 JSPX 作为视图技术。Spring\
  \ MVC 和相关库的使用如下：\n\n*   *国际化*：将使用 Spring MVC 内置的国际化支持来支持 SpringBlog 应用程序中的多种语言。在\
  \ SpringBlog 中，将提供英语（美国）和中文（香港）的支持。\n*   *主题化*：我们将使用 Spring MVC 中的主题化支持。例如，`<spring:theme>`\
  \ 标签将用于页面模板中，以加载正在使用的活动主题。\n*   *页面模板化*：在 SpringBlog 应用程序中，Apache Tiles 将用于页面模板化。页面布局将与我们本章介绍的非常相似，包含标准组件，包括页眉、菜单、页脚、主体等。还将使用\
  \ Spring MVC 内置的将 Tiles 用作视图解析器的支持。\n*   *验证、类型转换和格式化*：SpringBlog 应用程序中的所有前端验证都将依赖于\
  \ JSR-303 Bean 验证。还将使用 Spring 3 新的类型转换和格式化支持。所有 JSR-303 验证消息也将支持国际化，如本章所述。\n\n####\
  \ 丰富的用户界面和 Ajax\n\n本章讨论的所有 JavaScript 库都将用于为 SpringBlog 应用程序提供丰富性。重点如下：\n\n*   *用户界面*：jQuery\
  \ 和 jQuery UI 将用于实现 SpringBlog 的用户界面。例如，在按日期范围搜索博客条目时，将使用日期选择器窗口小部件。\n*   *富文本编辑*：CKEditor\
  \ 将用于在用户发布博客条目和评论时提供富文本编辑支持。\n*   *带分页的数据网格*：jqGrid 将用于在基于网格的界面中浏览博客条目。将提供分页支持，用户将能够按各种属性对条目进行排序，以及更改每页显示的记录数。此外，我们将使用\
  \ jqGrid 的过滤支持，允许用户按主题、发布日期范围等搜索条目。\n\n#### 安全支持\n\n在 SpringBlog 中，Spring Security\
  \ 将用于保护功能。重点如下：\n\n*   *用户和角色*：SpringBlog 数据库将包含用于存储已定义用户和角色的表。对于每个用户，授予的角色也将被存储，用于身份验证和授权。用户只能根据授予的角色执行允许的操作。例如，只有发布条目的用户才能修改该条目。此外，只有拥有管理员角色的用户才能查看条目的审核历史。\n\
  *   *用户界面*：用户界面将根据角色使用本章演示的技术进行渲染。在视图中，将使用 Spring Security 的 JSP 标签库来显示用户信息，以及显示允许用户执行的功能。此外，在需要的地方，将使用\
  \ Spring Security 的注解支持在控制器级别应用方法级安全性。\n\n#### Servlet 3.0 支持\n\nSpringBlog 应用程序还将使用\
  \ Spring 3.1 MVC 与 Servlet 3.0 兼容 Web 容器的最新支持。重点如下：\n\n*   *文件上传*：SpringBlog 的一个功能是用户可以将附件上传到他们的博客条目或评论。我们将使用\
  \ Spring MVC 3.1 对 Servlet 3.0 的多部分支持来实现此功能。\n\n有关详细信息，请参考第 21 章。\n\n### 总结\n\n\
  在本章中，我们涵盖了许多与使用 Spring MVC 进行 Web 前端开发相关的主题。\n\n首先，我们讨论了 MVC 模式的高级概念。然后，我们介绍了 Spring\
  \ MVC 的架构，包括其 `WebApplicationContext` 层次结构、请求处理生命周期和配置。\n\n接下来，我们使用 Spring MVC 开发了一个示例联系人应用程序，并使用\
  \ JSPX 作为视图技术。在开发示例的过程中，我们详细阐述了不同的领域。主要主题包括国际化、主题化以及使用 Apache Tiles 的模板支持。此外，我们使用了\
  \ jQuery、jQuery UI 和其他 JavaScript 库来丰富界面。示例包括日期选择器、富文本编辑器、带分页的数据网格等。还讨论了如何使用 Spring\
  \ Security 保护 Web 应用程序。\n\n我们还了解了 Spring 3.1 为我们带来的一些新功能，用于支持 Servlet 3.0 兼容的 Web\
  \ 容器。我们演示了如何在 Servlet 3.0 环境中使用 Spring 3.1 MVC 处理文件上传。此外，还介绍了新的基于代码的配置支持，以替代在 `web.xml`\
  \ 文件中进行配置。\n\n在下一章中，我们将讨论 Spring 在 Web 应用程序开发方面为我们带来的更多功能。\n\n## 第 18 章\n\n## Spring\
  \ Web Flow 和 JSF\n\n在上一章中，我们讨论了使用 Spring MVC 开发 Web 应用程序，并使用 JSPX 和 JavaScript 作为视图技术。\n\
  \n在 Web 应用程序开发方面，有众多选择，包括原生客户端（例如，Adobe Flex、JavaFX、Microsoft Silverlight 等）、MVC\
  \ 框架（例如，Spring MVC、JBoss Seam、Struts 等）和视图技术（例如，JSP、Velocity、JavaScript、JSF 等）。\n\
  \n除了 Spring MVC，Spring 还提供了一个名为 Spring Web Flow ([`www.springsource.org/webflow`](http://www.springsource.org/webflow))\
  \ 的项目，它支持开发基于流程的 Web 应用程序；它还与视图技术（如 Dojo Toolkit 和 JSF）紧密集成。此外，Spring Web Flow 与\
  \ Spring MVC 紧密集成，以支持 Web 应用程序功能，如国际化、主题化和验证。\n\n在本章中，我们将讨论 Spring Web Flow 项目如何帮助您开发基于流程的\
  \ Web 应用程序。此外，我们将演示 Spring Web Flow 如何使用 Spring Faces 模块（在 Spring Web Flow 下）和 PrimeFaces\
  \ ([`http://primefaces.org`](http://primefaces.org))（一个流行的 JSF 组件库）与 JSF（一种基于组件的视图技术，也是\
  \ JEE 堆栈中的标准视图技术）协同工作。具体来说，本章将涵盖以下主题：\n\n*   *Spring Web Flow*：我们将介绍 Spring Web\
  \ Flow 及其提供的主要功能，包括其对开发基于流程的应用程序的支持、其更细粒度的 Java Bean 作用域，以及 Spring Web Flow 集成的视图技术。\n\
  *   *JSF*：我们将对 JSF（特别是 JSF 2）进行高级描述。将讨论其主要概念，包括基于组件的模型、视图处理生命周期、模板支持等。此外，我们还将简要描述一些常用的\
  \ JSF 组件库。\n*   *Spring Web Flow 和 PrimeFaces*：我们将演示如何使用 Spring Web Flow 和 PrimeFaces\
  \ 开发基于流程的 Web 应用程序。\n\n### 示例后端的项目\n\n最好使用具体的后端来开发 Web 应用程序，而不是一些简单的“Hello World”示例。因此，在示例源代码中准备了一个示例后端项目，以便您可以直接导入项目，后端即可就绪。然后，我们可以专注于前端开发。在以下各节中，我们将简要描述示例后端以及如何导入项目以开发本章的前端示例。\n\
  \n#### 示例后端服务层\n\n本章示例的后端是一个简单的联系人应用程序。每个联系人都有基本信息，包括名字、姓氏和出生日期。此外，一个联系人还有零个或多个爱好。图\
