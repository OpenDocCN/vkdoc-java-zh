  \n`Contact with id 1:Contact - Id: 1, First name: Clarence, Last name: Ho, Birthday:\
  \ 1980-07-30`\n\n\n\n#### 插入数据\n\n在 Hibernate 中插入数据非常简单。另一个巧妙之处在于检索数据库生成的主键。在之前关于\
  \ JDBC 的章节中，我们需要显式声明想要检索生成的键，传入 `KeyHolder`，并在执行插入语句后从中获取键值。使用 Hibernate，所有这些操作都不需要了。Hibernate\
  \ 会巧妙地检索生成的键，并在插入后填充领域对象。清单 9-22 展示了 `save()` 方法的实现。\n\n***清单 9-22.** 实现 `save`\
  \ 方法*\n\n`package com.apress.prospring3.ch9.dao.hibernate;`\n\n`// 导入语句已省略`\n`@Repository(\"\
