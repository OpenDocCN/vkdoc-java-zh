  \n项目创建完毕，示例数据模型和脚本也已就绪，现在我们可以开始为本章示例实现并配置服务层。\n\n在接下来的小节中，我们将首先讨论使用 JPA 2、Spring\
  \ Data JPA 和 Hibernate 作为持久化服务提供者来实现 `ContactService`。然后，我们将介绍在 Spring 项目中配置服务层。\n\
  \n##### 实现 ContactService\n\n在示例中，我们将向表示层公开用于对联系人信息执行各种操作的服务。首先，我们需要创建 `Contact`\
  \ 实体类，如清单 17-3 所示。\n\n***清单 17-3.** `Contact` 实体类*\n\n`package com.apress.prospring3.ch17.domain;`\n\
  \n`import static javax.persistence.GenerationType.IDENTITY;`\n\n`import java.io.Serializable;`\n\
  \n`import javax.persistence.*;`\n\n`import org.hibernate.annotations.Type;`\n`import\
  \ org.joda.time.DateTime;`\n`import org.springframework.format.annotation.DateTimeFormat;`\n\
  `import org.springframework.format.annotation.DateTimeFormat.ISO;`\n\n`@Entity`\n\
  `@Table(name = \"contact\")`\n`public class Contact implements Serializable {`\n\
  \n`   private Long id;`\n`   private int version;`\n`   private String firstName;`\n\
  `   private String lastName;`\n`   private DateTime birthDate;`\n`   private String\
  \ description;`\n`   private byte[] photo;`\n\n`   @Id`\n`   @GeneratedValue(strategy\
