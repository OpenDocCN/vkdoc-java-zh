  \ name=\"footer\" value=\"/WEB-INF/views/footer.jspx\" />` `  </definition>`  `</tiles-definitions>`\n\
  \n该文件应该易于理解。有一个名为 `default` 的页面模板定义。模板代码在文件 `default.jspx` 中。在页面内，定义了三个组件，分别名为 `header`、`menu`\
  \ 和 `footer`。组件的内容将从 `value` 属性提供的文件中加载。有关 Tiles 定义的详细描述，请参考项目文档页面 ([`http://tiles.apache.org/2.2/framework/tiles-core/dtddoc/index.html`](http://tiles.apache.org/2.2/framework/tiles-core/dtddoc/index.html))。\n\
