  \  `@FacesConverter(\"jodaDataTimeConverter\")` `public class JodaDateTimeConverter\
  \ implements Converter {`  `   private static final String PATTERN = \"yyyy-MM-dd\"\
  ;`  `   @Override` `   public Object getAsObject(FacesContext ctx, UIComponent component,\
  \ String value) {` `      return DateTimeFormat.forPattern(PATTERN).parseDateTime(value);`\
  \ `   }`  `   @Override` `   public String getAsString(FacesContext ctx, UIComponent\
  \ component, Object value) {`  `      DateTime dateTime = (DateTime) value;`  `      return\
  \ DateTimeFormat.forPattern(PATTERN).print(dateTime);` `   }` `}`\n\n在清单 18-7 中，`JodaDateTimeConverter`\
  \ 类实现了 JSF 的 `Converter` 接口，并重写了两个方法 `getAsObject()`（从 String 转换为 JodaTime）和 `getAsString()`（从\
  \ JodaTime 转换为 String）。还要注意，该类使用 `@FacesConverter` 注解，以向 JSF 运行时指示它是一个 JSF 转换器。注解中定义的属性是转换器的\
  \ ID。当我们实现列表联系人视图时，我们将看到如何使用它。\n\n#### 实现控制器和支持 Bean\n\n下一步是实现控制器类，以及列表联系人视图的支持\
  \ bean。\n\n首先让我们实现支持 bean，即 `ContactListBean` 类。此类用于存储联系人列表，以及当用户单击数据表中的行时选中的联系人。清单\
  \ 18-8 显示了其内容。\n\n***清单 18-8.** `ContactListBean` 类*\n\n`package com.apress.prospring3.ch18.web.view;`\
