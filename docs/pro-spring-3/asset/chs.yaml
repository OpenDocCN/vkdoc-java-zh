  \ JSF 运行时环境存储。\n*   `ui-namespace` 由 Facelets 用于定义模板内的元素。例如，`<ui:insert>` 标签指定应在此处插入内容。使用此模板的视图应提供内容供此模板包含。\n\
  \n#### 实现自定义转换器\n\n对于联系人的出生日期属性，我们使用 JodaTime。但是，JSF 和 PrimeFaces 本身不支持显示 JodaTime。因此，我们需要实现一个自定义的\
  \ JSF 转换器，用于在前端显示联系人的出生日期。\n\n在 JSF 中，实现自定义转换器非常简单。我们只需要实现 `javax.faces.convert.Converter`\
  \ 接口。清单 18-7 显示了类的内容。\n\n***清单 18-7.** JSF 自定义转换器*\n\n`package com.apress.prospring3.ch18.web.converter;`\
