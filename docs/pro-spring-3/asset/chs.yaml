  \ `DualListModel`，用于步骤 2 中的 PrimeFaces PickList 组件。\n\n清单 18-16 显示了 `ContactController`\
  \ 类中 `newContactBean()` 方法的实现。\n\n***清单 18-16.** `newContactBean()` 方法*\n\n`package\
  \ com.apress.prospring3.ch18.web.controller;`  `// 导入语句已省略` `@Component(\"contactController\"\
  )` `public class ContactController {`  `    // 其他代码已省略`  `   @Autowired` `   private\
