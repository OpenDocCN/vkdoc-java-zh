  \n`    <!--  其他映射已省略  -->`\n\n`    <resultMap id=\"contactTelDetailResultMap\" type=\"\
  ContactTelDetail\">`\n`        <id property=\"id\" column=\"id\" />`\n`        <result\
  \ property=\"telType\" column=\"tel_type\" />`\n`        <result property=\"telNumber\"\
