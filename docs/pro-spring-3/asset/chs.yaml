  \ - Id: 2, First name: Scott, Last name: Tiger, Birthday: 1990-11-02`\n`Contact\
  \ - Id: 3, First name: John, Last name: Smith, Birthday: 1964-02-28`\n`Contact -\
  \ Id: 4, First name: Jacky, Last name: Chan, Birthday: 2001-11-01`\n\n`删除之前创建的联系人`\n\
  `删除新联系人后的联系人数据列表：`\n`Contact - Id: 1, First name: Clarence, Last name: Ho, Birthday:\
  \ 1980-07-30`\n`Contact - Id: 2, First name: Scott, Last name: Tiger, Birthday:\
  \ 1990-11-02`\n`Contact - Id: 3, First name: John, Last name: Smith, Birthday: 1964-02-28`\n\
  \n如输出所示，第一组行显示的是初始数据。第二组行显示新记录已添加。最后一组行显示新建的联系人已被删除。\n\n从清单 8-8 可以看出，大量代码需要迁移到一个辅助类中，或者更糟的是，在每个\
  \ DAO 类中重复编写。从应用程序开发人员的角度来看，这是 JDBC 的主要缺点——你根本没有时间在每个 DAO 类中编写重复的代码。相反，你希望专注于编写真正实现\
  \ DAO 类所需功能的代码：选择、更新和删除数据。你需要编写的辅助代码越多，需要处理的受检异常就越多，代码中可能引入的 bug 也就越多。\n\n这正是 DAO\
  \ 框架和 Spring 发挥作用的地方。框架消除了那些不执行任何自定义逻辑的代码，让你可以忽略所有需要执行的日常维护工作。此外，Spring 广泛的 JDBC\
  \ 支持让你的工作变得轻松许多。\n\n### Spring JDBC 基础设施\n\n我们在本章第一部分讨论的代码并不复杂，但编写起来很烦人，而且由于需要编写大量代码，编码错误的可能性相当高。现在是时候看看\
  \ Spring 如何让事情变得更简单、更优雅了。\n\n#### 概述与使用的包\n\nSpring 中的 JDBC 支持分为表 8-2 中详述的五个包；每个包处理\
  \ JDBC 访问的不同方面。\n\n![images](img/t0802.jpg)\n\n让我们从最低级别的功能开始讨论 Spring JDBC 支持。在考虑运行\
  \ SQL 查询之前，你需要做的第一件事是建立与数据库的连接。\n\n\n\n#### 数据库连接与数据源\n\n你可以通过提供一个实现了 `javax.sql.DataSource`\
  \ 的 Bean，让 Spring 为你管理数据库连接。`DataSource` 与 `Connection` 的区别在于，`DataSource` 提供并管理\
  \ `Connection`。\n\n`DriverManagerDataSource`（位于 `org.springframework.jdbc.datasource`\
  \ 包下）是 `DataSource` 最简单的实现。从类名可以看出，它只是简单地调用 `DriverManager` 来获取连接。由于 `DriverManagerDataSource`\
  \ 不支持数据库连接池，因此该类仅适用于测试。`DriverManagerDataSource` 的配置非常简单，如清单 8-10 所示；你只需提供驱动类名、连接\
  \ URL、用户名和密码即可（`datasource-drivermanager.xml`）。\n\n***清单 8-10.** Spring 管理的 `DriverManagerDataSource`\
  \ `dataSource` Bean*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\
  \n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n\
  `        http://www.springframework.org/schema/context`\n`        http://www.springframework.org/schema/context/spring-context-3.1.xsd\"\
  >`\n\n`    <bean id=\"dataSource\"`\n`        class=\"org.springframework.jdbc.datasource.DriverManagerDataSource\"\
  >`\n`        <property name=\"`**`driverClassName`**`\">`\n`            <value>${jdbc.driverClassName}</value>`\n\
  `        </property>`\n`        <property name=\"`**`url`**`\">`\n`            <value>${jdbc.url}</value>`\n\
  `        </property>`\n`        <property name=\"`**`username`**`\">`\n`            <value>${jdbc.username}</value>`\n\
  `        </property>`\n`        <property name=\"`**`password`**`\">`\n`            <value>${jdbc.password}</value>`\n\
  `        </property>`\n`    </bean>`\n\n`    <context:property-placeholder location=\"\
  jdbc.properties\"/>`\n`</beans>`\n\n你很可能认出了清单中的粗体属性。它们代表了你通常传递给 JDBC 以获取 `Connection`\
  \ 接口的值。数据库连接信息通常存储在属性文件中，以便于在不同部署环境中进行维护和替换。清单 8-11 展示了一个示例 `jdbc.properties` 文件，Spring\
  \ 的属性占位符将从该文件加载连接信息。\n\n***清单 8-11.** `jdbc.properties` 文件*\n\n`jdbc.driverClassName=com.mysql.jdbc.Driver`\n\
  `jdbc.url=jdbc:mysql://localhost:3306/prospring3_ch8`\n`jdbc.username=prospring3`\n\
  `jdbc.password=prospring3`\n\n在实际应用中，你可以使用 Apache Commons `BasicDataSource`（[`http://commons.apache.org/dbcp/`](http://commons.apache.org/dbcp/)）或由\
  \ JEE 应用服务器（例如 JBoss、WebSphere、WebLogic、GlassFish 等）实现的 `DataSource`，这可以进一步提升应用程序的性能。你可以在纯\
  \ JDBC 代码中使用 `DataSource` 并获得相同的连接池优势；然而，在大多数情况下，你仍然缺少一个集中配置数据源的地方。另一方面，Spring 允许你声明一个\
  \ `dataSource` Bean，并在 `ApplicationContext` 定义文件中设置连接属性（参见清单 8-12；文件名为 `datasource-dbcp.xml`）。\n\
  \n![images](img/square.jpg) **注意**  除了 Apache Commons `BasicDataSource`，其他流行的开源数据库连接池库还包括\
  \ C3P0（[`www.mchange.com/projects/c3p0/index.html`](http://www.mchange.com/projects/c3p0/index.html)）和\
  \ BoneCP（[`http://jolbox.com/`](http://jolbox.com/)）。\n\n***清单 8-12.** Spring 管理的\
  \ `dataSource` Bean*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\
  \n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n\
  `        http://www.springframework.org/schema/context`\n`        http://www.springframework.org/schema/context/spring-context-3.1.xsd\"\
  >`\n\n`    <bean id=\"dataSource\"`\n`        class=\"org.apache.commons.dbcp.BasicDataSource\"\
  `\n`        destroy-method=\"close\">`\n`        <property name=\"`**`driverClassName`**`\"\
  >`\n`            <value>${jdbc.driverClassName}</value>`\n`        </property>`\n\
  `        <property name=\"`**`url`**`\">`\n`            <value>${jdbc.url}</value>`\n\
  `        </property>`\n`        <property name=\"`**`username`**`\">`\n`            <value>${jdbc.username}</value>`\n\
  `        </property>`\n`        <property name=\"`**`password`**`\">`\n`            <value>${jdbc.password}</value>`\n\
  `        </property>`\n`    </bean>`\n\n`    <context:property-placeholder location=\"\
  jdbc.properties\"/>`\n`</beans>`\n\n这个特定的 Spring 管理的 `DataSource` 是在 `org.apache.commons.dbcp.BasicDataSource`\
  \ 中实现的。最重要的是，`dataSource` Bean 实现了 `javax.sql.DataSource`，你可以立即在你的数据访问类中使用它。\n\n\
  另一种配置 `dataSource` Bean 的方法是使用 JNDI。如果你正在开发的应用程序将在 JEE 容器中运行，你可以利用容器管理的连接池。要使用基于\
  \ JNDI 的数据源，你需要更改 `dataSource` Bean 的声明，如清单 8-13 所示（`datasource-jndi.xml`）。\n\n\
  ***清单 8-13.** Spring 管理的 JNDI `dataSource` Bean*\n\n`<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n\
  `        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd\">`\n\n\
  `    <bean id=\"dataSource\" class=\"org.springframework.jndi.JndiObjectFactoryBean\"\
  >`\n`        <property name=\"jndiName\">`\n`            <value>java:comp/env/jdbc/prospring3ch8</value>`\n\
  `        </property>`\n`    </bean>`\n`</beans>`\n\n在前面的示例中，我们使用 Spring 的 `JndiObjectFactoryBean`\
  \ 通过 JNDI 查找来获取数据源。从 2.5 版本开始，Spring 提供了 `jee` 命名空间，进一步简化了配置。清单 8-14 展示了使用 `jee`\
  \ 命名空间的相同 JNDI 数据源配置（`datasource-jee.xml`）。\n\n***清单 8-14.** Spring 管理的 JNDI `dataSource`\
  \ Bean（使用 `jee` 命名空间）*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\
  \n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n\
  `        http://www.springframework.org/schema/jee`\n`        http://www.springframework.org/schema/jee/spring-jee-3.1.xsd\"\
  >`\n\n`    <jee:jndi-lookup jndi-name=\"java:comp/env/jdbc/prospring3ch8\"/>`\n\n\
  `</beans>`\n\n在上一个清单中，我们在 `<beans>` 标签中声明了 `jee` 命名空间，然后使用 `<jee:jndi-lookup>` 标签来声明数据源。\n\
  \n如果你采用 JNDI 方法，则必须记住在应用程序描述文件中添加资源引用（`resource-ref`）（参见清单 8-15）。\n\n***清单 8-15.**\
  \ 描述文件中的资源引用*\n\n`<root-node>`\n`    <resource-ref>`\n`        <res-ref-name>jdbc/prospring3ch8</res-ref-name>`\n\
  `        <res-type>javax.sql.DataSource</res-type>`\n`        <res-auth>Container</res-auth>`\n\
  `    </resource-ref>`\n`</root-node>`\n\n\n\n`<root-node>` 是一个占位符值；你需要根据模块的打包方式对其进行修改。例如，如果应用程序是一个\
  \ Web 模块，那么在 Web 部署描述符（`WEB-INF/web.xml`）中，它会变成 `<web-app>`。很可能，你还需要在特定于应用服务器的描述符文件中配置\
  \ `resource-ref`。但请注意，`resource-ref` 元素配置了 `jdbc/prospring3ch8` 这个引用名称，并且 `dataSource`\
  \ bean 的 `jndiName` 被设置为 `java:comp/env/jdbc/prospring3ch8`。\n\n如你所见，Spring 允许你以几乎任何你喜欢的方式配置\
  \ `DataSource`，并且它对应用程序的其余代码隐藏了数据源的实际实现或位置。换句话说，你的 DAO 类不知道，也不需要知道 `DataSource`\
  \ 指向哪里。\n\n连接管理也被委托给了 `dataSource` bean，该 bean 要么自行执行管理，要么利用 JEE 容器来完成所有工作。\n\n\
  #### 嵌入式数据库支持\n\n从 3.0 版本开始，Spring 还提供了嵌入式数据库支持，它会自动启动一个嵌入式数据库，并将其作为 `DataSource`\
  \ 暴露给应用程序。代码清单 8-16 展示了嵌入式数据库的配置（`app-context-xml.xml`）。\n\n***代码清单 8-16.** Spring\
  \ 嵌入式数据库支持*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n\
  `        http://www.springframework.org/schema/jdbc`\n`        http://www.springframework.org/schema/jdbc/spring-jdbc-3.1.xsd\"\
  >`\n\n`    <jdbc:embedded-database id=\"dataSource\" type=\"H2\">`\n`        <jdbc:script\
  \ location=\"classpath:schema.sql\"/>`\n`        <jdbc:script location=\"classpath:test-data.sql\"\
  />`\n`    </jdbc:embedded-database>`\n\n`</beans>`\n\n在上一个代码清单中，我们首先在 `<beans>`\
  \ 标签中声明了 `jdbc` 命名空间。之后，我们使用 `<jdbc:embedded-database>` 来声明嵌入式数据库，并为其分配一个 ID 为 `dataSource`。在该标签内，我们还指示\
  \ Spring 执行指定的脚本来创建数据库模式并相应地填充测试数据。请注意，脚本的顺序很重要，包含数据定义语言（DDL）的文件应始终放在前面，后面跟着包含数据操作语言（DML）的文件。对于\
  \ `type` 属性，我们指定了要使用的嵌入式数据库类型。从 3.1 版本开始，Spring 支持 HSQL（默认）、H2 和 DERBY。\n\n嵌入式数据库支持对于本地开发或单元测试非常有用。在本章的其余部分，我们将使用嵌入式数据库来运行示例代码，因此你的机器无需安装数据库即可运行这些示例。\n\
  \n### 在 DAO 类中使用 DataSources\n\n让我们从一个空的 `ContactDao` 接口及其简单实现开始。我们将逐步添加更多功能，并在此过程中解释\
  \ Spring JDBC 类。代码清单 8-17 展示了空的 `ContactDao` 接口。\n\n***代码清单 8-17.** `ContactDao`\
  \ 接口及其实现*\n\n`public interface ContactDao { }`\n`public class JdbcContactDao implements\
  \ ContactDao { }`\n\n对于这个简单的实现，首先我们将为其添加一个 `dataSource` 属性。我们之所以将 `dataSource` 属性添加到实现类而不是接口中，原因应该很明显：接口不需要知道数据将如何被检索和更新。通过向接口添加\
  \ `get/setDataSource` 方法，我们——在最好的情况下——会强制实现类声明 getter 和 setter 存根。显然，这不是一个很好的设计实践。请查看代码清单\
  \ 8-18 中的简单 `JdbcContactDao` 类。\n\n***代码清单 8-18.** 带有 `dataSource` 属性的 `JdbcUserDao`*\n\
  \n`package com.apress.prospring3.ch8.dao.jdbc.xml;`\n\n`import javax.sql.DataSource;`\n\
  \n`import com.apress.prospring3.ch8.dao.ContactDao;`\n\n`public class JdbcContactDao\
  \ implements ContactDao {`\n\n`    private DataSource dataSource;`\n\n`    public\
  \ void setDataSource(DataSource dataSource) {`\n`        this.dataSource = dataSource;`\n\
  `    }`\n`}`\n\n现在，我们可以指示 Spring 使用 `JdbcContactDao` 实现来配置我们的 `contactDao` bean，并设置\
  \ `dataSource` 属性（参见代码清单 8-19；文件名为 `app-context-xml.xml`）。\n\n***代码清单 8-19.** 包含\
  \ `dataSource` 和 `contactDao` Bean 的 Spring 应用上下文文件*\n\n`    // 命名空间声明已省略`\n\n`    <jdbc:embedded-database\
  \ id=\"dataSource\" type=\"H2\">`\n`        <jdbc:script location=\"classpath:schema.sql\"\
  />`\n`        <jdbc:script location=\"classpath:test-data.sql\"/>`\n`    </jdbc:embedded-database>`\n\
  \n`    <bean id=\"contactDao\" class=\"com.apress.prospring3.ch8.dao.jdbc.xml.JdbcContactDao\"\
  >`\n`        <property name=\"dataSource\">`\n`            <ref local=\"dataSource\"\
  />`\n`        </property>`\n`    </bean>`\n\n为了支持 H2 数据库，我们需要将 H2 数据库的依赖项添加到项目中，如表\
  \ 8-3 所示。\n\n![images](img/t0803.jpg)\n\n现在，Spring 通过实例化 `JdbcContactDao` 类来创建 `contactDao`\
  \ bean，并将 `dataSource` 属性设置为 `dataSource` bean。\n\n确保 bean 上所有必需的属性都已设置是一个好习惯。最简单的方法是实现\
  \ `InitializingBean` 接口，并为 `afterPropertiesSet()` 方法提供实现（参见代码清单 8-20）。这样，你就可以确保\
  \ `JdbcContactDao` 上所有必需的属性都已设置。关于 bean 初始化的进一步讨论，请参考第 5 章。\n\n***代码清单 8-20.** 实现了\
  \ `InitializingBean` 的 `JdbcContactDao` 实现*\n\n`package com.apress.prospring3.ch8.dao.jdbc.xml;`\n\
  \n`import javax.sql.DataSource;`\n\n`import org.springframework.beans.factory.BeanCreationException;`\n\
  `import org.springframework.beans.factory.InitializingBean;`\n\n`import com.apress.prospring3.ch8.dao.ContactDao;`\n\
  \n`public class JdbcContactDao implements ContactDao, InitializingBean {`\n\n`    private\
  \ DataSource dataSource;`\n\n`    public void setDataSource(DataSource dataSource)\
  \ {`\n`        this.dataSource = dataSource;`\n`    }`\n\n`    public void afterPropertiesSet()\
  \ throws Exception {`\n`        if (dataSource == null) {`\n`            throw new\
  \ BeanCreationException(\"必须在 ContactDao 上设置 dataSource\");`\n`        }`\n`    }`\n\
  `}`\n\n到目前为止，我们看到的代码使用 Spring 来管理数据源，并介绍了 `ContactDao` 接口及其 JDBC 实现。我们还在 Spring\
  \ `ApplicationContext` 文件中为 `JdbcContactDao` 类设置了 `dataSource` 属性。现在，我们通过向接口和实现中添加实际的\
  \ DAO 操作来扩展代码。\n\n\n\n### 异常处理\n\n由于 Spring 提倡使用运行时异常而非受检异常，因此需要一种机制将受检的 `SQLException`\
  \ 转换为 Spring JDBC 运行时异常。由于 Spring 的 SQL 异常是运行时异常，它们可以比受检异常粒度更细。（根据定义，这并非运行时异常的特性，但若必须在\
  \ `throws` 子句中声明一长串受检异常会非常不便；因此，受检异常往往比其对应的运行时异常粒度更粗。）\n\nSpring 提供了 `SQLExceptionTranslator`\
  \ 接口的默认实现，负责将通用的 SQL 错误码转换为 Spring JDBC 异常。在大多数情况下，该实现已足够使用，但我们也可以扩展 Spring 的默认实现，并将新的\
  \ `SQLExceptionTranslator` 实现设置到 `JdbcTemplate` 中使用，如清单 8-21 所示。\n\n同时，我们需要在项目中添加对\
  \ `spring-jdbc` 的依赖，如表 8-4 所示。\n\n![images](img/t0804.jpg)\n\n***清单 8-21.** 自定义\
  \ `SQLExceptionTranslator`*\n\n`package com.apress.prospring3.ch8.exception.translator;`\n\
  \n`import java.sql.SQLException;`\n\n`import org.springframework.dao.DataAccessException;`\n\
  `import org.springframework.dao.DeadlockLoserDataAccessException;`\n`import org.springframework.jdbc.support.SQLErrorCodeSQLExceptionTranslator;`\n\
  \n`public class MySQLErrorCodesTranslator extends`\n`    SQLErrorCodeSQLExceptionTranslator  {`\n\
  \n`    protected DataAccessException customTranslate(String task,`\n`            String\
  \ sql, SQLException sqlex) {`\n`        if (sqlex.getErrorCode() == -12345)`\n`            return\
  \ new DeadlockLoserDataAccessException(task, sqlex);`\n`        return null;`\n\
  `    }`\n`}`\n\n要使用自定义转换器，我们需要在 DAO 类中将其传入 `JdbcTemplate`。清单 8-22 展示了实现此目的的示例代码片段。\n\
  \n***清单 8-22.** 在 Spring `Jdbc` 中使用自定义 `SQLExceptionTranslator`*\n\n`    // 在任何\
  \ DAO 类中`\n\n`    JdbcTemplate jdbcTemplate = new JdbcTemplate();`\n`    jdbcTemplate.setDataSource(dataSource);`\n\
  \n`    // 创建自定义转换器并设置数据源`\n`    // 用于默认转换查找`\n`    MySQLErrorCodesTranslator errorTranslator\
  \ =`\n`        new MySQLErrorCodesTranslator();`\n`    errorTranslator.setDataSource(dataSource);`\n\
  `    jdbcTemplate.setExceptionTranslator(errorTranslator);`\n\n`    // 将此 JdbcTemplate\
  \ 用于 SqlUpdate`\n`    SqlUpdate sqlUpdate = new SqlUpdate();`\n`    sqlUpdate.setJdbcTemplate(jdbcTemplate);`\n\
  `    sqlUpdate.setSql(\"update contact set first_name = 'Clarence'\");`\n`    sqlUpdate.compile();`\n\
  `    sqlUpdate.update();`\n\n有了自定义的 SQL 异常转换器后，当针对数据库执行 SQL 语句检测到 SQL 异常时，Spring\
  \ 将调用该转换器；当错误码为 -12345 时，将触发自定义异常转换。对于其他错误，Spring 将回退到其默认的异常转换机制。\n\n显然，你完全可以自由地将\
  \ `SQLExceptionTranslator` 创建为 Spring 管理的 Bean，并在 DAO 类中使用 `JdbcTemplate` Bean。如果你不记得读过关于\
  \ `JdbcTemplate` 类的内容，也不必担心，我们将在后续详细讨论。\n\n### JdbcTemplate 类\n\n该类是 Spring JDBC\
  \ 支持的核心。它可以执行所有类型的 SQL 语句。从最简化的视角来看，你可以将语句分为数据定义和数据操作两类。数据定义语句涵盖创建各种数据库对象（表、视图、存储过程等）。数据操作语句则操作数据，可分为查询语句和更新语句。查询语句通常返回一组行，每行具有相同的列集合。更新语句修改数据库中的数据，但不返回任何结果。\n\
  \n`JdbcTemplate` 类允许你向数据库发出任何类型的 SQL 语句，并返回任何类型的结果。\n\n在本节中，我们将通过 `JdbcTemplate`\
  \ 类介绍 Spring 中 JDBC 编程的几个常见用例。\n\n#### 在 DAO 类中初始化 JdbcTemplate\n\n在讨论如何使用 `JdbcTemplate`\
  \ 之前，我们先看看如何在 DAO 类中准备 `JdbcTemplate` 以供使用。这非常简单；大多数情况下，你只需通过传入数据源对象（应由 Spring 注入到\
  \ DAO 类中）来构造该类即可。清单 8-23 展示了初始化 `JdbcTemplate` 对象的代码片段。\n\n***清单 8-23.** 初始化 `JdbcTemplate`*\n\
  \n`    private JdbcTemplate jdbcTemplate;`\n\n`    private DataSource dataSource;`\n\
  \n`    public void setDataSource(DataSource dataSource) {`\n`        this.dataSource\
  \ = dataSource;`\n`        this.jdbcTemplate = new JdbcTemplate(dataSource);`\n\
  `    }`\n\n通常的做法是在设置数据源的方法中初始化 `JdbcTemplate`，这样一旦 Spring 注入了数据源，`JdbcTemplate`\
  \ 也会随之初始化并准备就绪。\n\n配置完成后，`JdbcTemplate` 是线程安全的。这意味着你也可以选择在 Spring 的 XML 配置中初始化一个\
  \ `JdbcTemplate` 单例实例，并将其注入到所有 DAO Bean 中。\n\n![images](img/square.jpg) **注意**  在\
  \ Spring `Jdbc` 模块中，有一个名为 `JdbcDaoSupport` 的类。它封装了 `JdbcTemplate` 类，你可以让你的 DAO 类继承\
  \ `JdbcDaoSupport` 类。在这种情况下，当 DAO 类被注入数据源时，`JdbcTemplate` 将自动初始化。\n\n\n\n#### 使用\
  \ JdbcTemplate 检索单值\n\n让我们从一个返回单个值的简单查询开始。例如，我们希望能够通过联系人 ID 检索其名字。首先，在 `ContactDao`\
  \ 接口中添加该方法：\n\n`public String findFirstNameById(Long id);`\n\n使用 `JdbcTemplate`，我们可以轻松地检索该值。清单\
  \ 8-24 展示了 `JdbcContactDao` 类中 `findFirstNameById()` 方法的实现。其他方法则创建了空实现。\n\n***清单\
  \ 8-24.** 使用 `JdbcTemplate` 检索单值*\n\n`package com.apress.prospring3.ch8.dao.jdbc.xml;`\n\
  \n`// 导入语句已省略`\n\n`public class JdbcContactDao implements ContactDao, InitializingBean\
  \ {`\n\n`    public String findFirstNameById(Long id) {`\n`        String firstName\
  \ = jdbcTemplate.queryForObject(`\n`            \"select first_name from contact\
  \ where id = ?\",`\n`            new Object[]{id}, String.class);`\n`        return\
  \ firstName;`\n`    }`\n\n`    public List<Contact> findAll() {`\n`        return\
  \ null;`\n`    }`\n\n`    public List<Contact> findByFirstName(String firstName)\
  \ {`\n`        return null;`\n`    }`\n\n`    public void insert(Contact contact)\
  \ {`\n`    }`\n\n`    public void update(Contact contact) {`\n`    }`\n\n`    public\
  \ void delete(Long contactId) {`\n`    }`\n\n`}`\n\n在上面的清单中，我们使用 `JdbcTemplate`\
  \ 的 `queryForObject()` 方法来检索名字的值。第一个参数是 SQL 字符串，第二个参数是以对象数组格式传递给 SQL 进行参数绑定的参数。最后一个参数是要返回的类型，在本例中是\
  \ `String`。除了 `Object`，你还可以查询其他类型，比如 `Long` 和 `Integer`。让我们看看结果。清单 8-25 展示了测试程序。\n\
  \n***清单 8-25.** 使用 `JdbcTemplate`*\n\n`package com.apress.prospring3.ch8;`\n\n`import\
