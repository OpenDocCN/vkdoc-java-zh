  \n\n\n#### 样本数据模型\n\n本章示例中使用的数据模型非常简单，仅包含一个用于存储联系人信息的 `CONTACT` 表。清单 16-1 展示了模式创建脚本（位于\
  \ `/src/main/resources` 文件夹中的 `schema.sql`）。\n\n***清单 16-1.** 示例数据库模式*\n\n`DROP\
