  \n这个配置你应该很熟悉。现在，让我们继续在 Spring 中安排汽车车龄更新任务。\n\n#### 使用 task-namespace 进行任务调度\n\n\
  与 Spring 对其他命名空间的支持类似，`task-namespace` 为使用 Spring 的 `TaskScheduler` 抽象进行任务调度提供了简化的配置。\n\
  \n使用 `task-namespace` 进行任务调度非常简单。清单 15-8 展示了配置文件 (`task-namespace-app-context.xml`)。\n\
  \n***清单 15-8.** 使用 `task-namespace` 的 Spring 配置*\n\n`<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>`\n`<beans xmlns=http://www.springframework.org/schema/beans`\n\n`    xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n\
  `        http://www.springframework.org/schema/task`\n`        http://www.springframework.org/schema/task/spring-task-3.1.xsd\"\
  `\n`>`\n\n`    <import resource=\"car-job-app-context.xml\"/>`\n\n`    <task:scheduler\
  \ id=\"myScheduler\" pool-size=\"10\"/>`\n\n`    <task:scheduled-tasks scheduler=\"\
  myScheduler\">`\n`        <task:scheduled ref=\"carService\" method=\"updateCarAgeJob\"\
  `\n`            fixed-delay=\"10000\"/>`\n`    </task:scheduled-tasks>`\n\n`</beans>`\n\
  \n如清单 15-8 所示，导入了汽车应用的上下文。当遇到 `<task:scheduler>` 标签时，Spring 会实例化一个 `ThreadPoolTaskScheduler`\
  \ 类的实例，而属性 `pool-size` 则指定了调度器可用的线程池大小。在 `<task:scheduled-tasks>` 标签内，可以调度一个或多个任务。在\
  \ `<task:scheduled>` 标签中，一个任务可以引用一个 Spring Bean（本例中为 `carService` Bean）以及该 Bean\
  \ 内的一个特定方法（本例中为 `updateCarAgeJob()` 方法）。属性 `fixed-delay` 将指示 Spring 实例化一个 `PeriodicTrigger`\
  \ 作为 `TaskScheduler` 的 `Trigger` 实现。\n\n清单 15-9 展示了任务调度的测试程序。\n\n***清单 15-9.** 测试\
  \ Spring 中的任务调度*\n\n`package com.apress.prospring3.ch15.schedule;`\n\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  \n`public class ScheduleTaskSample {`\n\n`    public static void main(String[] args)\
  \ {`\n\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:task-namespace-app-context.xml\");`\n`        ctx.refresh();`\n\
  \n`        while (true) {`\n`        }`\n`    }`\n`}`\n\n这个类很简单；只是启动 `ApplicationContext`，然后保持循环。如果应用部署到应用服务器环境中，调度器将持续运行。\n\
  \n运行程序将每十秒产生以下批处理作业输出：\n\n`INFO [com.apress.prospring3.ch15.service.jpa.CarServiceImpl]\
  \ - <>`\n`INFO [com.apress.prospring3.ch15.service.jpa.CarServiceImpl] - <Car age\
  \ update job started>`\n`INFO [com.apress.prospring3.ch15.service.jpa.CarServiceImpl]\
  \ - <Car age update--- License: LICENSE-1001 – Manufacturer: Ford - Manufacture\
  \ Date: 1980-07-30T00:00:00.000+08:00 - Age: 31>`\n`INFO [com.apress.prospring3.ch15.service.jpa.CarServiceImpl]\
  \ - <Car age update--- License: LICENSE-1002 – Manufacturer: Toyota - Manufacture\
  \ Date: 1992-12-30T00:00:00.000+08:00 - Age: 18>`\n`INFO [com.apress.prospring3.ch15.service.jpa.CarServiceImpl]\
  \ - <Car age update--- License: LICENSE-1003 – Manufacturer: BMW - Manufacture Date:\
  \ 2003-01-06T00:00:00.000+08:00 - Age: 8>`\n`INFO [com.apress.prospring3.ch15.service.jpa.CarServiceImpl]\
  \ - <Car age update job completed successfully>`\n`INFO [com.apress.prospring3.ch15.service.jpa.CarServiceImpl]\
  \ - <>`\n\n从输出中，你可以看到汽车的 `age` 属性已被更新。\n\n除了固定间隔，更灵活的调度机制是使用 `cron` 表达式。在清单 15-8\
  \ 中，将这一行：\n\n`<task:scheduled ref=\"carService\" method=\"updateCarAgeJob\" fixed-delay=\"\
  10000\"/>`\n\n改为以下内容：\n\n`<task:scheduled ref=\"carService\" method=\"updateCarAgeJob\"\
  \ cron=\"0 * * * * *\"/>`\n\n更改后，再次运行 `ScheduleTaskSample` 类，你将看到作业将每分钟运行一次。Quartz\
  \ 的 `CronTrigger` 教程页面（例如，[`www.quartz-scheduler.org/documentation/quartz-2.1.x/tutorials/crontrigger`](http://www.quartz-scheduler.org/documentation/quartz-2.1.x/tutorials/crontrigger)）提供了关于其结构的详细描述，并给出了\
  \ `cron` 表达式的示例。\n\n\n\n#### 使用注解进行任务调度\n\n使用 Spring 的 `TaskScheduler` 抽象进行任务调度的另一种方式是使用注解。Spring\
  \ 为此提供了 `@Scheduled` 注解。\n\n要启用任务调度的注解支持，我们需要在 Spring 的 XML 配置中提供 `<task:annotation-driven>`\
  \ 标签。清单 15-10 展示了该配置（`task-annotation-app-context.xml`）。\n\n***清单 15-10.** 基于注解调度的\
  \ Spring 配置*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans xmlns=http://www.springframework.org/schema/beans`\n\
  \n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n\
  `        http://www.springframework.org/schema/task`\n`        http://www.springframework.org/schema/task/spring-task-3.1.xsd\"\
  `\n`>`\n\n`    <import resource=\"car-job-app-context.xml\"/>`\n\n`    <task:scheduler\
  \ id=\"myScheduler\" pool-size=\"10\"/>`\n\n`    <task:annotation-driven scheduler=\"\
  myScheduler\"/>`\n\n`</beans>`\n\n如清单 15-10 所示，`<task:annotation-driven>` 标签启用了基于注解的调度支持，其\
  \ `scheduler` 属性引用了 `myScheduler` bean。\n\n要调度 Spring bean 中的特定方法，只需使用 `@Scheduled`\
  \ 注解该方法并传入调度要求。清单 15-11 展示了修改后的 `CarServiceImpl` 类的代码片段。\n\n***清单 15-11.** 修改后的\
  \ `CarServiceImpl` 类*\n\n`package com.apress.prospring3.ch15.service.jpa;`\n\n`import\
  \ org.springframework.scheduling.annotation.Scheduled;`\n\n`// 其他代码已省略`\n`public\
  \ class CarServiceImpl implements CarService {`\n\n`    @Scheduled(fixedDelay=10000)`\n\
  `    //@Scheduled(fixedRate=10000)`\n`    //@Scheduled(cron=\"0 * * * * *\")`\n\
  `    public void updateCarAgeJob() {`\n\n`        // 其他代码已省略`\n`    }`\n`}  `\n\n\
  清单 15-12 展示了测试程序。\n\n***清单 15-12.** 测试基于注解的调度*\n\n`package com.apress.prospring3.ch15.schedule;`\n\
  \n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\n\
  `public class ScheduleTaskAnnotationSample {`\n\n`    public static void main(String[]\
  \ args) {`\n\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:task-annotation-app-context.xml\");`\n`        ctx.refresh();`\n\
