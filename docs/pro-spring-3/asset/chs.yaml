  ![images](img/9781430241072_Fig18-04.jpg)\n\n***图 18-4.** 导入示例项目*\n\n至此，项目设置完成，我们准备开始使用\
  \ Spring Web Flow 和 PrimeFaces 实现前端。在此之前，让我们先了解一下 Spring Web Flow 和 JSF 的高级概念。\n\
  \n### 介绍 Spring Web Flow\n\nSpring Web Flow 构建在 Spring MVC 的基础之上，旨在为组织 Web 应用程序内部的流程提供高级支持。此外，还在各种\
  \ Web 应用程序领域提供了扩展功能。\n\n在以下各节中，我们将对 Spring Web Flow 进行高级概述。将讨论其主要功能、模块、与视图技术（如 JavaScript\
  \ 库和 JSF）的集成等。\n\n#### Spring Web Flow 模块\n\nSpring Web Flow 发行版中有几个模块。例如，在本章中，我们将讨论使用\
  \ Spring Faces（Spring Web Flow 中的一个模块）与 JSF 组件库 PrimeFaces 来开发基于流程的 Web 应用程序。稍后，我们将把\
  \ Spring Faces 的依赖项添加到项目中。图 18-5 显示了在 STS 中导入 Spring Faces 模块后项目的依赖层次结构。\n\n![images](img/9781430241072_Fig18-05.jpg)\n\
  \n***图 18-5.** Spring Web Flow 的依赖层次结构*\n\n如图 18-5 所示，Spring Faces 依赖于其他 Spring\
  \ Web Flow 模块，如 Spring Web Flow，它是核心模块；Spring Web Flow 又依赖于其他 Spring 项目，如 Spring\
  \ MVC、Spring Expression 等。Spring Web Flow 发行版（截至版本 2.3.0.RELEASE）中的模块如下：\n\n*  \
  \ *Spring Web Flow* (`spring-webflow`)：这是 Spring Web Flow 的核心模块；它提供了管理流程的基础设施，以及对于每个流程，其会话、状态和视图。\n\
  *   *Spring Faces* (`spring-faces`)：Spring Web Flow 为 JSF 提供了一流的支持，支持组件打包在 Spring\
  \ Faces 模块中。从版本 2.2 开始，Spring Web Flow 支持核心 JSF 2 功能，包括部分状态保存、资源请求和处理、Ajax 支持等。Spring\
  \ Web Flow 还与常见的 JSF 组件库紧密集成，包括 JBoss RichFaces ([`www.jboss.org/richfaces`](http://www.jboss.org/richfaces))\
  \ 和 PrimeFaces ([`www.primefaces.org`](http://www.primefaces.org))。\n*   *Spring\
  \ JavaScript* (`spring-js`, `spring-js-resources`)：Spring JavaScript 模块为使用 JavaScript\
  \ 进行视图开发提供支持。例如，在渲染的 HTML 视图中，JavaScript 可用于与服务器的 Ajax 通信和部分视图更新。此外，Spring JavaScript\
  \ Resources 包（`spring-js-resources.jar`）包含了 Dojo Toolkit（一个流行的 JavaScript 库）以及 Spring\
  \ 提供的支持与 Dojo Toolkit 集成的 JavaScript 库。\n*   *Spring Binding* (`spring-binding`)：顾名思义，Spring\
  \ Binding 模块负责将视图状态绑定到底层模型。从版本 2.1 开始，Spring Web Flow 在绑定过程中使用 Spring 3 的类型转换和格式化系统。此外，Spring\
  \ Web Flow 2.3 还增加了对 JSR-303 Bean 验证的支持。\n\n#### Spring Web Flow 特性\n\nSpring Web\
  \ Flow 是 MVC 模式的扩展；它提供了对开发基于流程的应用程序的支持，并支持更细粒度的 bean 作用域。Spring Web Flow 的架构围绕以下三个主要概念构建：\n\
  \n*   *流程*：流程是一个代表用例的业务过程。在 Spring Web Flow 中，流程由一系列称为*状态*的步骤组成。每个状态通常通过视图呈现给用户（还有其他与视图无关的状态；例如，决策状态根据运行时条件确定流程的下一个状态）。在视图中，会发生由状态处理的用户事件。这些事件可以触发到其他状态的转换，从而导致整个流程内的视图导航。Spring\
  \ Web Flow 提供了一种领域特定语言（DSL），可用于为您的应用程序实现非常复杂的流程。\n*   *视图*：与 MVC 模式相同，视图是向用户呈现模型状态并提供用户交互的用户界面，支持\
  \ Ajax 和部分视图更新。\n*   *会话*：在 Web 应用程序中，就 bean 作用域而言，有三种类型，即请求、会话和应用程序。请求和会话作用域被密集地用于表示层。然而，在许多\
  \ Web 应用程序中，尤其是基于流程的应用程序，模型 bean 应该在多个请求之间保持其状态，直到流程完成。在这种情况下，请求作用域是不够的。但是，使用会话作用域会过度，因为状态将在整个会话期间保存在用户的\
  \ `HttpSession` 中。为了解决这个问题，Spring Web Flow 引入了会话的概念，它在流程完成之前保存数据。这样做的主要目的是避免将过多数据放入会话作用域，这会在有大量并发用户时导致内存消耗问题。使用\
  \ Spring Web Flow 时，理解其维护的 bean 和变量的作用域非常重要。表 18-1 显示了可用的作用域及其用途。\n\n![images](img/t1801.jpg)\n\
  \n有关 Spring Web Flow 的详细描述，请参考项目文档站点 ([`http://static.springsource.org/spring-webflow/docs/2.3.x/reference/html/index.html`](http://static.springsource.org/spring-webflow/docs/2.3.x/reference/html/index.html))\
  \ 和书籍 *Pro Spring MVC with Web Flow* (Apress, 2012)。\n\n### 介绍 JSF\n\nJavaServer\
  \ Faces (JSF) 是另一种用于开发企业应用程序表示层的流行视图技术。一般来说，JSF 是一个基于组件驱动 UI 设计模型的请求驱动型 MVC Web\
  \ 框架。\n\n然而，第一代 JSF（称为 JSF 1）因其陡峭的学习曲线、构建自定义组件的复杂性以及缺乏对 Ajax 的支持而受到批评。JSF 2 极大地简化了模型，并提供了开箱即用的\
  \ Ajax 支持。\n\nJSF 是 JEE 堆栈中的标准视图技术，因此每个主要的 JEE 应用服务器供应商（例如，JBoss、IBM、Oracle 等）都支持\
  \ JSF，并附带自己的 JSF 组件库。此外，还有许多开源和商业项目提供 JSF 组件库，例如 JBoss RichFaces、PrimeFaces、ICEfaces\
  \ 等。\n\nJSF 主要由四个组件组成：视图、模型交互、导航和生命周期。这四个组件将在以下各节中讨论。\n\n#### 视图\n\n在 JSF 中，与 MVC\
  \ 模式一样，视图是向用户呈现数据的页面。然而，由于 JSF 是一个基于组件的框架，视图由 UI 组件树表示，这些组件在视图中以标记标签的形式公开。UI 组件层次结构通过嵌套标签来表示。\n\
  \n从 JSF 2 开始，Facelets 是所有 JSF 页面的标准技术。Facelets 采用 XHTML 语法，提供了对页面模板的内置支持，无需其他模板框架（如\
  \ Apache Tiles）。\n\n#### 模型交互\n\n在 JSF 中，视图存储了一个带有值和用户交互的 UI 组件树。当用户执行操作时，请求将被提交到服务器进行处理。在服务器端，UI\
  \ 组件树中的值将被转换回模型进行处理。此过程代表了 UI 组件和底层模型之间的操作。\n\n在 JSF 2 中，JSF 2.0 表达式语言（EL）用于从 UI\
  \ 组件引用模型对象。当响应呈现给用户时，UI 组件从关联的模型属性中获取其值。在交互过程中，类型安全的转换和服务器端验证会自动发生。\n\n为了支持 JSF\
  \ 中高度交互的 Web 页面，模型对象通常按页面实现为“支持 bean”。在这种情况下，模型对象表示视图存储的模型属性的状态。在管理这些 bean 时，JSF\
  \ 也采用了 IoC 的概念，它们被称为 JSF 托管 Bean，可以在 JSF 配置文件（称为 `faces-config.xml`）中定义，或使用注解定义。然而，JSF\
  \ 的 EL 允许与 JSF 外部的技术集成。例如，当将 JSF 与 Spring Web Flow 一起使用时，标准的 Spring bean 可以作为 JSF\
  \ 托管 Bean，使用 Spring 框架提供的标准 DI 机制。\n\n#### 导航\n\nJSF 提供了一个定义页面导航规则的框架。例如，在视图中，当用户执行操作时，请求被提交到服务器。在服务器端，“操作控制器”将通过与服务层交互来处理请求，然后根据结果和\
  \ `faces-config.xml` 文件中定义的导航规则，向用户显示相应的视图。\n\n然而，当使用 Spring Web Flow 时，不需要 JSF\
  \ 导航机制。如本章前面“Spring Web Flow 特性”部分所述，Spring Web Flow 提供了对流程定义的内置支持，可以替代 JSF 提供的导航模型。\n\
  \n#### 应用程序生命周期\n\n理解 JSF 最关键的部分是其应用程序生命周期。整个生命周期从运行 JSF 的 Web 应用程序接收请求开始，经过六个阶段，然后呈现响应并显示给用户。这六个阶段如下：\n\
  \n1.  *恢复视图*：在 JSF 应用程序中，每个视图都与一个视图 ID 关联，并存储在 `FacesContext`（位于包 `javax.faces.context`\
  \ 下）的会话对象中。在 JSF 中，视图是与其当前状态关联的组件集合，可以存储在服务器端或客户端（由 Web 部署描述符中的参数 `javax.faces.STATE_SAVING_METHOD`\
  \ 控制）。当用户在视图中执行操作并向服务器发送请求时，JSF 的第一个阶段是从其状态恢复视图。\n2.  *应用请求*：组件树恢复后，树中的每个组件通过使用其解码方法从请求参数中提取其新值。\n\
  3.  *处理验证*：在此阶段，JSF 实现处理在树中组件上注册的所有验证器。它检查指定验证规则的组件属性，并将这些规则与为组件存储的本地值进行比较。JSF 2\
  \ 完全支持使用 JSR-303 Bean 验证进行验证。\n4.  *更新模型值*：验证完成后，JSF 实现将遍历组件树，并将相应的服务器端对象属性设置为组件的本地值。只有输入组件的\
  \ value 属性指向的 bean 属性才会被更新。在此绑定过程中，也会发生类型转换和格式化，如果转换失败，生命周期将直接进入呈现响应阶段，以便重新呈现页面并显示错误。\n\
  5.  *调用应用程序*：在此阶段，JSF 实现调用应用程序来处理表单提交。此时，组件值已被转换、验证并应用于模型对象，因此它们可用于执行应用程序的业务逻辑。在执行期间，JSF\
  \ 实现将处理任何应用程序级事件，例如提交表单或链接到另一个页面。此外，如果正在处理的视图是从先前请求的状态信息重建的，并且某个组件触发了事件，则这些事件将被广播给感兴趣的监听器。\n\
  6.  *呈现响应*：在此最后阶段，结果视图以其所有组件的当前状态显示。\n\n您可以通过创建一个实现 `javax.faces.event.PhaseListener`\
  \ 接口的类，将其安装到生命周期中，以便在每个或每个阶段之前或之后执行您想要的任何操作。阶段监听器可以完全访问整个 JSF 框架，包括操作视图。\n\n图 18-6\
  \ 显示了生命周期。\n\n![images](img/9781430241072_Fig18-06.jpg)\n\n***图 18-6.** JSF 应用程序生命周期，突出显示了执行和呈现部分*\n\
  \n此描述仅涵盖了 JSF 的最基础知识。有关更详细的描述，可以在 [`www.coreservlets.com/JSF-Tutorial/jsf2`](http://swww.coreservlets.com/JSF-Tutorial/jsf2)\
  \ 找到优秀的 JSF 2 在线教程。\n\n### 示例 Spring Web Flow 应用程序\n\n在本章中，为了演示将 Spring Web Flow\
  \ 和 JSF 结合用于基于流程的应用程序，我们将开发一个简单的流程来实现创建新联系人的功能。\n\n在以下各节中，我们将讨论创建新联系人的整体流程设计以及本章示例的项目结构。\n\
  \n#### 示例流程的设计\n\n如本章前面所述，一个联系人包含用户的基本信息（名字、姓氏、出生日期）以及他们的爱好。在创建新联系人时，将使用类似向导的方法，允许用户在不同的页面中输入信息，查看整体信息，然后通过提交信息进行处理来确认。这个过程很像在许多网站上注册。\n\
  \n图 18-7 显示了创建联系人及其关联视图的整体流程，我们需要实现这些视图。在图中，箭头标签代表页面上的按钮。例如，每个页面都有一个“返回”按钮，而“添加”过程中的页面都有一个“退出”按钮。\n\
  \n![images](img/9781430241072_Fig18-07.jpg)\n\n***图 18-7.** 新建联系人的流程*\n\n如图 18-7\
  \ 所示，用户将看到的第一个页面是所有联系人的列表。当用户选择一行并单击“查看选中项”按钮时，将显示联系人视图。在显示联系人视图中，用户可以通过单击“返回”按钮导航回列表联系人页面。\n\
  \n当用户单击“添加联系人”按钮时，会触发添加联系人流程。第一步是输入基本信息。单击“下一步”按钮将导航到选择爱好的视图。下一步是审查页面，用户在其中审查输入的所有信息。当用户确认信息后，联系人被持久化，并显示完成视图。\n\
  \n在流程中的任何页面，用户都可以通过单击“返回”按钮导航到上一页，或通过单击“退出”按钮结束流程并返回到列表联系人视图。\n\n#### 项目结构\n\n在实现添加联系人流程之前，让我们先看一下项目文件夹结构。\n\
  \n图 18-8 显示了本章将要开发的示例 Web 流程应用程序的文件夹结构。表 18-2 列出了每个文件夹（位于根文件夹 `/src/main/webapp`\
  \ 下）的用途。\n\n![images](img/9781430241072_Fig18-08.jpg)\n\n***图 18-8.** Spring Web\
  \ Flow 项目结构*\n\n![images](img/t1802.jpg)\n\n![images](img/t1802a.jpg)\n\n### Spring\
  \ Web Flow 和 JSF 配置\n\n本节讨论在 Spring Web Flow、JSF 2 和 PrimeFaces 上运行的 Web 应用程序所需的必要配置。\n\
  \n#### 添加所需的依赖项\n\n对于使用 Spring Web Flow 和 JSF 2 以及 PrimeFaces 开发应用程序，所需的相应依赖项如表\
  \ 18-3 所示。将它们添加到您的项目中。\n\n![images](img/t1803.jpg)\n\n#### 配置 JSF\n\n对于 JSF 应用程序，我们需要指定一个\
  \ JSF 专用的配置文件（`/WEB-INF` 文件夹下的 `faces-config.xml` 文件）。此文件通常存储一般的 JSF 配置、托管 Bean\
  \ 的信息（如果使用注解风格则不需要）以及导航规则。但是，我们将使用 Spring Web Flow，它与 Spring 框架的 IoC 集成用于 DI，因此此文件中所需的配置是最少的。清单\
  \ 18-1 显示了该文件（`WEB-INF/faces-config.xml`）的内容。\n\n***清单 18-1.** JSF 配置文件*\n\n`<?xml\
