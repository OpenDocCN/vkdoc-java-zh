  \ – <Complete execution of async. task>`\n\n从输出中可以看到，所有调用都在同一时间启动。三个带返回值的调用首先完成，并显示在控制台输出中。最后，调用的五个\
  \ `asyncTask()` 方法也完成了。\n\n### 示例应用中的任务调度\n\n在 SpringBlog 应用中，我们将存储博客文章和评论的历史记录，用于审计目的。然而，我们也决定只保留这些历史记录\
  \ 30 天，以免消耗过多数据库存储空间。为满足此需求，我们将采用 Spring 3 的 `TaskScheduler` 抽象支持，实现一个定时任务，用于清除超过\
  \ 30 天的审计记录。该任务将在每天午夜运行。\n\n我们将使用注解风格进行任务调度。首先，为维护任务定义一个接口。清单 15-17 展示了该接口。\n\n\
  ***清单 15-17.** `HousekeepingService` 接口*\n\n`package com.apress.prospring3.springblog.service;`\n\
  \n`public interface HousekeepingService {`\n\n`    /**`\n`    * 用于清除审计记录的定时任务。`\n\
  `    */`\n`    public void auditPurgeJob();`\n\n`}`\n\n该接口定义了用于审计记录维护任务的 `auditPurgeJob()`\
  \ 方法。清单 15-18 展示了应用了 `@Scheduled` 注解的实现类。\n\n***清单 15-18.** `HousekeepingServiceImpl`\
  \ 类*\n\n`package com.apress.prospring3.springblog.service.jpa;`\n\n`import org.springframework.beans.factory.annotation.Value;`\n\
  `import org.springframework.scheduling.annotation.Scheduled;`\n`import org.springframework.stereotype.Repository;`\n\
  `import org.springframework.stereotype.Service;`\n`import org.springframework.transaction.annotation.Transactional;`\n\
  \n`import com.apress.prospring3.springblog.service.HousekeepingService;`\n\n`@Service(\"\
  housekeepingService\")`\n`@Repository`\n`@Transactional`\n`public class HousekeepingServiceImpl\
  \ implements HousekeepingService {`\n\n`    @Value(\"${audit.record.history.days}\"\
  )`\n`    private int auditHistoryDays;`\n\n`    @Scheduled(cron=\"0 0 0 * * ?\"\
  )`\n`    public void auditPurgeJob() {`\n`        // 清除审计记录的逻辑在此处`\n`    }`\n`}`\n\
  \n从清单 15-18 中可以看到，`@Scheduled` 注解被应用于 `auditPurgeJob()` 方法，并带有一个 `cron` 表达式。该 `cron`\
  \ 表达式表示任务应在每天午夜运行。对于审计记录保留的天数，我们将其外部化到属性文件中，以便于维护。为了启用注解风格的任务调度，我们将在根 `WebApplicationContext`\
  \ 中定义 `<task:annotation-driven>` 标签。\n\n更多详情，请参考第 21 章。\n\n### 本章小结\n\n在本章中，我们介绍了\
  \ Spring 对任务调度的支持。我们重点讲解了 Spring 内置的 `TaskScheduler` 抽象，并通过一个示例批量数据更新任务演示了如何使用它来满足任务调度需求。我们还介绍了\
  \ Spring 3 如何支持通过注解来异步执行任务。\n\n## 第 16 章\n\n\n\n## 使用 Spring 远程调用\n\n企业级应用通常需要与其他应用进行通信。例如，一家销售产品的公司：当客户下订单时，订单处理系统会处理订单并生成交易。在订单处理过程中，会向库存系统发起查询，以检查产品是否有库存。订单确认后，会向履约系统发送通知，以便将产品交付给客户。最后，信息会被发送到会计系统；系统会生成发票并处理付款。\n\
  \n大多数情况下，这一业务流程并非由单个应用完成，而是由多个应用协同工作。有些应用可能是内部开发的，另一些则可能从外部供应商处购买。此外，这些应用可能运行在不同地点的不同机器上，并采用不同的技术和编程语言（例如\
  \ Java、.NET、C++ 等）实现。在架构和实现应用时，为了构建高效的业务流程，在应用之间进行握手始终是一项关键任务。因此，应用需要通过各种协议和技术的远程调用支持，才能在企业环境中良好地运作。\n\
  \n在 Java 世界中，远程调用支持自其诞生之初就已存在。早期（Java 1.*x* 版本），大多数远程调用需求都是通过传统的 TCP 套接字或 Java 远程方法调用（RMI）来实现的。J2EE\
  \ 出现后，EJB 和 JMS 成为应用服务器间通信的常见选择。XML 和互联网的快速发展催生了基于 HTTP 传输 XML 的远程支持，包括用于基于 XML\
  \ 的 RPC 的 Java API（JAX-RPC）、用于 XML Web 服务的 Java API（JAX-WS），以及基于 HTTP 的技术（例如 Hessian、Burlap\
  \ 等）。Spring 也提供了自己的基于 HTTP 的远程调用支持，称为 Spring HTTP invoker。近年来，为了应对互联网的爆炸式增长和更具响应性的\
  \ Web 应用需求（例如通过 Ajax），更轻量级、更高效的远程调用支持对于企业的成功变得至关重要。因此，用于 RESTful Web 服务的 Java API（JAX-RS）应运而生并迅速普及。其他协议，如\
  \ Comet 和 HTML5 WebSocket，也吸引了许多开发者。毋庸置疑，远程调用技术正在快速演进。\n\n在远程调用方面，如前所述，Spring 既提供了自己的支持（例如\
  \ Spring HTTP invoker），也支持前面提到的许多技术（例如 RMI、EJB、JMS、Hessian、Burlap、JAX-RPC、JAX-WS、JAX-RS\
  \ 等）。本章无法涵盖所有内容。因此，我们将重点介绍最常用的那些。具体来说，本章将涵盖以下主题：\n\n*   *Spring HTTP invoker*：如果需要进行通信的两个应用都是基于\
  \ Spring 的，那么 Spring HTTP invoker 提供了一种简单高效的方式来调用其他应用暴露的服务。我们将展示如何使用 Spring HTTP\
  \ invoker 在其服务层中暴露服务，以及如何调用远程应用提供的服务。\n*   *在 Spring 中使用 JMS*：Java 消息服务（JMS）提供了另一种在应用之间进行异步、松散耦合的消息交换方式。我们将展示\
  \ Spring 如何通过 JMS 简化应用开发。\n*   *在 Spring 中使用 RESTful Web 服务*：RESTful Web 服务专门围绕\
  \ HTTP 协议设计，是为应用提供远程支持以及使用 Ajax 支持高度交互式 Web 应用前端的最常用技术。我们将展示 Spring 3 MVC 如何为使用\
  \ JAX-RS 暴露服务提供全面支持，以及如何使用 `RestTemplate` 类调用服务。我们还将讨论如何保护服务以防止未经授权的访问。\n\n### 在\
