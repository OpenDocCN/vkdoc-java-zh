  \ 的 JPA 实现，默认的加载策略仍然是懒加载。因此，在使用 Hibernate 的 JPA 实现时，你无需显式地将关联定义为懒加载。Hibernate 的默认加载策略与\
  \ JPA 规范不同。\n\n接下来，我们来看 `findAllWithDetail()` 方法，它将获取所有关联的电话详情和爱好。清单 10-8 展示了其实现。\n\
