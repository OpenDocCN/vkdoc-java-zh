  \ bean 类等。\n\n#### 定义流程定义\n\n让我们从定义联系人应用程序流程开始，该流程在图 18-7 中进行了说明。正如在配置部分所讨论的，流程定义文件是\
  \ `/WEB-INF/flows/contacts/flow.xml`。在 STS 中，有一种方便的方法来创建 Web 流程定义文件。只需右键单击 `contacts`\
  \ 文件夹，选择 New，然后选择 Spring Web Flow Definition File。清单 18-5 显示了流程定义。\n\n***清单 18-5.**\
  \ Web 流程定义*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>` `<flow xmlns=http://www.springframework.org/schema/webflow`\
