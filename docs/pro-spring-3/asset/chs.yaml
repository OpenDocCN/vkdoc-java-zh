  \n`Contact - Id: 2, First name: Scott, Last name: Tiger, Birthday: 1990-11-02`\n\
  \n`Contact - Id: 3, First name: John, Last name: Smith, Birthday: 1964-02-28`\n\n\
  #### 使用 ResultSetExtractor 检索嵌套领域对象\n\n接下来我们看一个稍微复杂的例子，在这个例子中，我们需要通过连接查询从父表（`CONTACT`）和子表（`CONTACT_TEL_DETAIL`）中检索数据，并相应地将数据转换回嵌套对象（`Contact`\
  \ 中的 `ContactTelDetail`）。\n\n前面提到的 `RowMapper<T>` 仅适用于将行映射到单个领域对象。对于更复杂的对象结构，我们需要使用\
  \ `ResultSetExtractor` 接口。为了演示其用法，让我们在 `ContactDao` 接口中再添加一个方法 `findAllWithDetail()`。该方法应填充包含电话详情的联系人列表。\n\
  \n`public List<Contact> findAllWithDetail();`\n\n清单 8-30 展示了使用 `ResultSetExtractor`\
  \ 实现 `findAllWithDetail()` 方法。\n\n***清单 8-30.** 使用 `ResultSetExtractor` 查询领域对象*\n\
  \n`package com.apress.prospring3.ch8.dao.jdbc.xml;`\n\n`// 导入语句已省略`\n`public class\
  \ JdbcContactDao implements ContactDao, InitializingBean {`\n\n`    public List<Contact>\
  \ findAllWithDetail() {`\n`        String sql = \"select c.id, c.first_name, c.last_name,\
  \ c.birth_date\" +`\n`\", t.id as contact_tel_id, t.tel_type, t.tel_number from\
  \ contact c \" +`\n`\"left join contact_tel_detail t on c.id = t.contact_id\";`\n\
  `        return jdbcTemplate.query(sql, new ContactWithDetailExtractor());`\n`    }`\n\
  \n`    private static final class ContactWithDetailExtractor implements ResultSetExtractor<List<Contact>>\
  \ {`\n\n`        public List<Contact> extractData(ResultSet rs) throws SQLException,`\n\
  `DataAccessException {`\n\n`            Map<Long, Contact> map = new HashMap<Long,\
  \ Contact>();`\n`            Contact contact = null;`\n`            while (rs.next())\
  \ {`\n`                Long id = rs.getLong(\"id\");`\n`                contact\
  \ = map.get(id);`\n`                if (contact == null) {  // 新的联系人记录`\n`                    contact\
  \ = new Contact();`\n`                    contact.setId(id);`\n`                    contact.setFirstName(rs.getString(\"\
  first_name\"));`\n`                    contact.setLastName(rs.getString(\"last_name\"\
  ));`\n`                    contact.setBirthDate(rs.getDate(\"birth_date\"));`\n\
  `                    contact.setContactTelDetails(new ArrayList<ContactTelDetail>());`\n\
  `                    map.put(id, contact);`\n`                }`\n`                //\
  \ 处理联系人电话详情（如果存在）`\n`                Long contactTelDetailId = rs.getLong(\"contact_tel_id\"\
  );`\n`                if (contactTelDetailId > 0) {`\n`                    ContactTelDetail\
  \ contactTelDetail = new ContactTelDetail();`\n`                    contactTelDetail.setId(contactTelDetailId);`\n\
  `                    contactTelDetail.setContactId(id);`\n`                    contactTelDetail.setTelType(rs.getString(\"\
  tel_type\"));`\n`                    contactTelDetail.setTelNumber(rs.getString(\"\
  tel_number\"));`\n`                    contact.getContactTelDetails().add(contactTelDetail);`\n\
  `                }`\n`            }`\n`            return new ArrayList<Contact>\
  \ (map.values());`\n`        }`\n`    }`\n`}`\n\n这段代码看起来与 `RowMapper` 示例非常相似，但这次我们声明了一个实现\
  \ `ResultSetExtractor` 的内部类。然后我们实现了 `extractData()` 方法，将结果集相应地转换为 `Contact` 对象列表。对于\
  \ `findAllWithDetail()` 方法，查询使用了左连接来连接两个表，这样没有电话的联系人也会被检索到。结果是两个表的笛卡尔积。最后，我们使用 `JdbcTemplate.query()`\
  \ 方法，传入查询字符串和结果集提取器。\n\n让我们将以下代码片段（清单 8-31）添加到测试程序（`JdbcContactDaoSample` 类）中。\n\
  \n***清单 8-31.** 列出联系人的代码片段*\n\n\n\n`        // 查找并列出所有联系人及其详细信息`\n`        List<Contact>\
  \ contactsWithDetail = contactDao.findAllWithDetail();`\n`        for (Contact contact:\
  \ contactsWithDetail) {`\n`            System.out.println(contact);`\n`        \
  \    if (contact.getContactTelDetails() != null) {`\n`                for (ContactTelDetail\
  \ contactTelDetail: contact.getContactTelDetails()) {`\n`                    System.out.println(\"\
