  \ in thread \"main\" org.springframework.web.client.HttpClientErrorException: 400\
  \ Bad Request`\n\n当验证失败时，Spring MVC 会自动返回 HTTP 状态码 400，这表示请求体中的数据出错。如果你查看服务器输出控制台，你将看到以下输出（其他输出已省略）：\n\
  \n`DEBUG: org.springframework.web.servlet.mvc.support.DefaultHandlerExceptionResolver\
