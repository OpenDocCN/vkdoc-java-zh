  \n该配置与清单 13-9 中的注解配置非常相似（差异部分以粗体显示）。基本上，移除了 `<tx:annotation-driven>` 标签，并修改了 `<context:component-scan>`\
  \ 标签中的包名，以用于声明式事务管理。最重要的标签是 `<aop:config>` 和 `<tx:advice>`。\n\n在 `<aop:config>`\
  \ 标签下，为服务层内的所有操作（即 `com.apress.prospring3.ch13.service.declarative` 包下的所有实现类）定义了一个切点。该通知引用了\
  \ ID 为 `txAdvice` 的 Bean，该 Bean 由 `<tx:advice>` 标签定义。在 `<tx:advice>` 标签中，我们为希望参与事务的各种方法配置了事务属性。如标签所示，我们指定所有查找方法（即前缀为\
  \ `find` 的方法）为只读，并指定计数方法（即前缀为 `count` 的方法）不参与事务。对于其余方法，将应用默认的事务行为。此配置与我们在注解示例中所做的配置相同。清单\
  \ 13-19 展示了用于 XML 声明式事务管理的实现类。\n\n***清单 13-19.** 用于 XML 事务配置的 `ContactServiceImpl`\
