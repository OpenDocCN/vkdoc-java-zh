  代码清单 11-21 展示了修改后的 `ContactMapper.xml` 文件，其中包含了 `Contact` 和 `ContactTelDetail` 对象之间的一对多关联，以及使用嵌套结果定义的与\
  \ `Hobby` 对象的多对多关联。\n\n***代码清单 11-21.** MyBatis XML 映射定义中的嵌套结果*\n\n`<mapper namespace=\"\
  com.apress.prospring3.ch11.persistence.ContactMapper\">`\n\n`    <!-- 其他代码已省略 -->`\n\
  \n`    <resultMap id=\"contactResultDetailMap\" type=\"Contact\">`\n`        <id\
  \ property=\"id\" column=\"ID\" />`\n`        <result property=\"firstName\" column=\"\
  FIRST_NAME\" />`\n`        <result property=\"lastName\" column=\"LAST_NAME\" />`\n\
  `        <result property=\"birthDate\" column=\"BIRTH_DATE\" />`\n`        <collection\
  \ property=\"contactTelDetails\" ofType=\"ContactTelDetail\">`\n`            <id\
  \ property=\"id\" column=\"CONTACT_TEL_ID\"/>`\n`            <result property=\"\
  telType\" column=\"TEL_TYPE\"/>`\n`            <result property=\"telNumber\" column=\"\
  TEL_NUMBER\"/>`\n`        </collection>`\n`        <collection property=\"hobbies\"\
  \ ofType=\"Hobby\">`\n`            <result property=\"hobbyId\" column=\"HOBBY_ID\"\
  />`\n`        </collection>`\n`    </resultMap>`\n\n`    <select id=\"findAllWithDetail\"\
  \ resultMap=\"contactResultDetailMap\">`\n`        SELECT`\n`        C.ID,`\n`        C.FIRST_NAME,`\n\
  `        C.LAST_NAME,`\n`        C.BIRTH_DATE,`\n`        T.ID AS CONTACT_TEL_ID,`\n\
  `        T.TEL_TYPE,`\n`        T.TEL_NUMBER,`\n`        H.HOBBY_ID`\n`        FROM\
  \ CONTACT C`\n`        LEFT OUTER JOIN CONTACT_TEL_DETAIL T ON C.ID = T.CONTACT_ID`\n\
  `        LEFT OUTER JOIN CONTACT_HOBBY_DETAIL H ON C.ID = H.CONTACT_ID`\n`    </select>`\n\
  `<mapper>`\n\n如代码清单 11-21 所示，`findAllWithDetail` 的 select 查询首先被修改为对 `CONTACT_TEL_DETAIL`\
  \ 和 `CONTACT_HOBBY_DETAIL` 表进行外连接，以检索详细信息。\n\n然后，结果映射 `contactResultDetailMap` 也被修改，以将结果集列直接映射到关联中嵌套对象的属性。例如，对于\
  \ `contactTelDetails` 属性，`ContactTelDetail` 对象的每个属性都被映射到 select 语句中的相应列。类似地，`hobbies`\
  \ 属性的多对多映射也是如此。然而，该查询连接了 `CONTACT_HOBBY_DETAIL` 表（该表存储了 `CONTACT` 和 `HOBBY` 表之间的映射），并且结果被映射到\
  \ `hobbies` 属性底层的 `Hobby` 对象。\n\n\n\n为了再次测试`findAllWithDetail()`方法，我们需要修改`listContactsWithDetail()`方法，使其也能显示`hobbies`属性。清单\
