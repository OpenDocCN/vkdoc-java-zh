  \ 19-3.** 示例联系人 Web 应用程序*\n\n至此，示例应用程序设置完成，因此我们可以继续实现测试用例。\n\n### 介绍企业测试框架\n\n*企业测试框架*指的是整个应用程序生命周期中的测试活动。在不同的阶段，将执行不同的测试活动，以验证应用程序的功能是否根据定义的业务和技术要求按预期工作。\n\
  \n在每个阶段，将执行不同的测试用例。有些将是自动化的，而有些将手动执行。在每种情况下，结果将由相应的人员（例如，业务分析师、应用程序用户等）验证。\n\n图\
  \ 19-4 显示了一个典型的企业测试框架。\n\n![images](img/9781430241072_Fig19-04.jpg)\n\n***图 19-4.**\
  \ 企业测试框架*\n\n表 19-1 描述了每种测试类型的特征和目标，以及用于实现测试用例的常用工具和库。\n\n![images](img/t1901.jpg)\n\
  \n![images](img/t1901a.jpg)\n\n![images](img/t1901b.jpg)\n\n在本章中，我们将重点介绍三种单元测试（逻辑单元测试、集成单元测试和前端单元测试）的实现，并了解\
  \ Spring `TestContext` 框架以及其他支持工具和库如何帮助开发这些测试用例。\n\n我们不会提供 Spring 框架在测试领域提供的类的完整细节和列表，而是在实现本章的示例测试用例时，讨论\
  \ Spring `TestContext` 框架中最常用模式以及支持接口和类的用法。\n\n### 实现逻辑单元测试\n\n如前所述，逻辑单元测试是最细粒度的测试级别。目标是验证单个类的行为，该类的所有依赖项都被“模拟”为预期的行为。\n\
  \n在本节中，我们将通过为 `ContactController` 类实现测试用例来演示逻辑单元测试，其中服务层被“模拟”为预期的行为。\n\n为了帮助模拟服务层的行为，我们将使用\
  \ Mockito ([`http://code.google.com/p/mockito`](http://code.google.com/p/mockito))，这是一个流行的模拟框架。\n\
  \n#### 添加所需的依赖项\n\n首先，我们需要将 Mockito 的依赖项添加到项目中，如表 19-2 所示。\n\n![images](img/t1902.jpg)\n\
  \n将表 19-2 中的依赖项添加到 STS 中的项目中。\n\n#### 单元测试 Spring MVC 控制器\n\n在我们在第 17 章中实现的联系人 Web\
  \ 应用程序中，Spring MVC 被用作表示层。在表示层中，控制器类提供了用户界面和服务层之间的集成。\n\n控制器类中的方法将被映射到 HTTP 请求。在该方法内部，将处理请求，绑定到模型对象，并与服务层（通过\
  \ Spring 的 DI 注入到控制器类中）交互以处理数据。完成后，根据结果，控制器类将更新模型和视图状态（例如，用户消息等），并返回逻辑视图（或模型与视图一起），供\
  \ Spring MVC 解析要显示给用户的视图。\n\n对于单元测试控制器类，主要目标是确保控制器方法正确更新模型和其他视图状态，并返回正确的视图。此外，当发生错误时，测试确保抛出正确的异常，并将错误消息保存到状态中以供显示给用户。由于我们只想测试控制器类的行为，我们需要用正确的行为来“模拟”服务层。\n\
  \n对于示例应用程序中的 `ContactController` 类，我们希望为 `list()` 和 `create()` 方法开发测试用例。在以下各节中，我们将讨论这些步骤，包括开发一些支持控制器类测试的通用基础设施类以及测试用例的实现。\n\
  \n##### 实现基础设施类\n\n对于一组常见的测试（例如，控制器类的测试用例、服务层测试类等），开发一个具有正确设置的强制性测试基础设施的通用抽象父类始终是最佳实践。\n\
  \n在本章中，我们将使用 Java 类来配置 Spring 的 `TestContext`。此外，我们将使用 Spring 3.1 中的 profile 功能来配置特定于测试环境的组件。\n\
  \n让我们实现 Spring 的 `ApplicationContext` 的 Java 类（`ControllerTestConfig` 类），如清单 19-1\
  \ 所示。请注意，测试类和资源文件应分别放置在文件夹 `/src/test/java` 和 `/src/test/resources` 中。\n\n***清单\
  \ 19-1.** `ControllerTestConfig` 类*\n\n`package com.apress.prospring3.ch19.test.config;`\
  \  `import org.springframework.context.annotation.Configuration;` `import org.springframework.context.annotation.Profile;`\
  \  `@Configuration` `@Profile(\"test\")` `public class ControllerTestConfig {` \
  \ `}`\n\n在清单 19-1 中，我们通过将 `@Configuration` 注解应用于该类，向 Spring 指示它是一个 `ApplicationContext`\
  \ 配置类。然后，将 `@Profile` 注解应用于该类，以指示此类中配置的 bean 所属的 profile（在本例中为 `test` profile）。\n\
  \n目前我们不需要任何 bean。但是，维护一个配置类始终是一个好习惯，这样当将来需要时（例如，Spring MVC 层需要与外部 FTP 服务器集成），可以在该配置类中定义\
  \ FTP 服务器的模拟 bean。\n\n下一步是实现控制器类测试用例的抽象基类（`AbstractControllerTest` 类），如清单 19-2 所示。\n\
  \n***清单 19-2.** `AbstractControllerTest` 类*\n\n`package com.apress.prospring3.ch19.web.controller;`\
  \  `import org.junit.runner.RunWith;` `import org.springframework.test.context.ActiveProfiles;`\
  \ `import org.springframework.test.context.ContextConfiguration;` `import org.springframework.test.context.junit4.SpringJUnit4ClassRunner;`\
  \  `import com.apress.prospring3.ch19.test.config.ControllerTestConfig;`  `@RunWith(SpringJUnit4ClassRunner.class)`\
  \ `@ContextConfiguration(classes = {ControllerTestConfig.class})` `@ActiveProfiles(\"\
  test\")` `public class AbstractControllerTest {`  `}`\n\n在清单 19-2 中，我们将几个注解应用于抽象基类。首先，`@RunWith`\
  \ 注解属于 JUnit 库（在本章中，我们使用 JUnit 版本 4.10），它指示用于执行测试用例的运行器类。在该注解中，提供了 Spring 的 `SpringJUnit4ClassRunner`，这是\
  \ Spring 的 JUnit 支持类，用于在 Spring 的 `ApplicationContext` 环境中运行测试用例。\n\n其次，`@ContextConfiguration`\
  \ 向 Spring JUnit 运行器指示要加载的配置。在该注解中，我们指定了 `classes` 属性，该属性指示配置是在提供的 Java 类中定义的。也可以通过提供\
  \ `locations` 属性从 XML 文件加载上下文，但不能同时提供 `locations` 和 `classes` 属性。\n\n最后，应用了 `@ActiveProfiles`\
  \ 注解，传入 profile 名称 `test` 作为属性。这向 Spring 指示应加载属于 `test` profile 的 bean。\n\n#####\
  \ 测试 list() 方法\n\n有了基础设施类，让我们为 `ContactController.list()` 方法创建第一个测试用例。在此测试用例中，我们想确保当调用该方法时，在从服务层检索到联系人列表后，信息被正确保存到模型中，并且返回了正确的逻辑视图名称。清单\
  \ 19-3 显示了测试用例。\n\n***清单 19-3.** 测试 `list()` 方法*\n\n`package com.apress.prospring3.ch19.web.controller;`\
  \  `import static org.junit.Assert.assertEquals;` `import static org.junit.Assert.assertNotNull;`\
  \ `import static org.mockito.Mockito.mock;` `import static org.mockito.Mockito.when;`\
  \  `import java.util.ArrayList;` `import java.util.List;`  `import org.junit.Before;`\
  \ `import org.junit.Test;` `import org.springframework.test.util.ReflectionTestUtils;`\
  \ `import org.springframework.ui.ExtendedModelMap;`  `import com.apress.prospring3.ch19.domain.Contact;`\
  \ `import com.apress.prospring3.ch19.service.ContactService;`  `public class ContactControllerTest\
  \ extends AbstractControllerTest {`  `    private final List<Contact> contacts =\
  \ new ArrayList<Contact>();`  `    private ContactService contactService;`  `    @Before`\
  \ `    public void initContacts() {` `        // Initialize list of contacts for\
  \ mocked ContactService` `        Contact contact = new Contact();` `        contact.setId(1l);`\
  \ `        contact.setFirstName(\"Clarence\");` `        contact.setLastName(\"\
  Ho\");` `        contacts.add(contact);` `    }`  `    @Test` `    public void testList()\
  \ throws Exception {`  `        contactService = mock(ContactService.class);` `        when(contactService.findAll()).thenReturn(contacts);`\
  \  `        ContactController contactController = new ContactController();`  `        ReflectionTestUtils.setField(contactController,\
  \ \"contactService\",` `            contactService);`  `        ExtendedModelMap\
  \ uiModel = new ExtendedModelMap();`  `        String result = contactController.list(uiModel);`\
  \  `        assertNotNull(result);` `        assertEquals(result, \"contacts/list\"\
  );`  `        List<Contact> modelContacts = (List<Contact>) uiModel.get(\"contacts\"\
  );`  `        assertEquals(1, modelContacts.size());` `    }` `}`\n\n在清单 19-3 中，首先该类扩展了\
  \ `AbstractControllerTest`，它继承了测试控制器类所需的所有基础设施。然后，在测试用例中，`initContacts()` 方法应用了\
  \ `@Before` 注解，这向 JUnit 指示该方法应在运行每个测试用例之前运行（如果您想在运行整个测试类之前运行一些逻辑，请使用 `@BeforeClass`\
  \ 注解）。在该方法中，使用硬编码信息初始化了一个联系人列表。\n\n其次，`testList()` 方法应用了 `@Test` 注解，这向 JUnit 指示它是一个\
  \ JUnit 应该运行的测试用例。在测试用例中，私有变量 `contactService`（类型为 `ContactService`）通过使用 Mockito\
  \ 的 `Mockito.mock()` 方法进行模拟（注意 `import static` 语句）。`when()` 方法也由 Mockito 提供，用于模拟\
  \ `ContactService.findAll()` 方法，该方法将被 `ContactController` 类使用。\n\n第三，创建了 `ContactController`\
  \ 类的一个实例，然后其 `contactService` 变量（在正常情况下将由 Spring 注入）通过使用 Spring 提供的 `ReflectionTestUtils`\
  \ 类的 `setField()` 方法设置为模拟实例。`ReflectionTestUtils` 提供了一组基于反射的实用方法，用于单元测试和集成测试场景。此外，还构造了一个\
  \ `ExtendedModelMap` 类的实例（它实现了 `org.springframework.ui.Model` 接口）。\n\n接下来，调用 `ContactController.list()`\
  \ 方法，传入 `ExtendedModelMap` 类的实例。调用后，通过调用各种 assert 方法（由 JUnit 提供）来验证结果，以确保返回了正确的逻辑视图名称，并且联系人列表信息被正确保存在模型中供视图使用。\n\
