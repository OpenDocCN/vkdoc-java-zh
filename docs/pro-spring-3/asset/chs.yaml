  \n###### 使用嵌套结果映射关联\n\n在 MyBatis 中建模关联的另一种方法是使用嵌套结果。基本上，无需为每个父对象提交单独的查询，而是将查询重写为表连接。然后，在结果映射中，嵌套对象的属性被相应地映射，MyBatis\
  \ 会为您正确地填充对象图。\n\n为了节省一点篇幅，我们同时也对 `Contact` 和 `Hobby` 对象之间的多对多关系进行建模。代码清单 11-19\
  \ 和 11-20 展示了修改后的 `Contact` 和 `Hobby` 领域对象。\n\n***代码清单 11-19.** `Contact` 类中的 `hobbies`\
  \ 属性*\n\n`package com.apress.prospring3.ch11.domain;`\n\n`import java.io.Serializable;`\n\
  `import java.util.*;`\n\n`public class Contact implements Serializable {`\n\n`    //\
  \ 其他代码已省略`\n\n`    private Set<Hobby> hobbies = new HashSet<Hobby>();`\n`}`\n\n\
  ***代码清单 11-20.** `Hobby` 类*\n\n`package com.apress.prospring3.ch11.domain;`\n\n\
  `import java.io.Serializable;`\n\n`public class Hobby implements Serializable {`\n\
  \n`    private String hobbyId;`\n\n`    // Getter/setter 方法已省略`\n\n`    public String\
