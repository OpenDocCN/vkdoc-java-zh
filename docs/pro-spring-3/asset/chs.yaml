  \ 插入数据并检索生成的主键\n\n对于插入数据，我们也使用 `SqlUpdate` 类。然而，这里一个有趣的点是关于主键，即 `id` 列，它只有在插入语句完成后才可用，此时\
  \ RDBMS 已经为该记录生成了标识值。`ID` 列被声明为具有 `AUTO_INCREMENT` 属性并且是主键，这意味着该值是在插入操作期间由 RDBMS\
  \ 分配的。\n\n如果你使用的是 Oracle，你可能会先从 Oracle 序列中获取一个唯一 ID，然后使用该查询执行插入语句。但是，对于我们的情况，如何在记录插入后检索由\
  \ RDBMS 生成的键呢？\n\n在旧版本的 JDBC 中，方法有点棘手。例如，如果我们使用 MySQL，我们需要执行 SQL `select last_insert_id()`，而对于\
  \ Microsoft SQL Server 则需要执行 `select @@IDENTITY`。\n\n幸运的是，从 JDBC 3.0 版本开始，增加了一项新功能，允许以统一的方式检索\
  \ RDBMS 生成的键。清单 8-37 展示了 `insert()` 方法的实现，该方法还会为插入的联系人记录检索生成的键。它适用于大多数（如果不是全部）数据库；只需确保你使用的是兼容\
  \ JDBC 3.0 或更新版本的 JDBC 驱动程序。\n\n我们首先为插入操作创建 `InsertContact` 类，它扩展了 `SqlUpdate` 类。清单\
  \ 8-44 展示了这个类。\n\n***清单 8-44.** `InsertContact` 类*\n\n`package com.apress.prospring3.ch8.dao.jdbc.annotation;`\n\
  \n`import java.sql.Types;`\n\n`import javax.sql.DataSource;`\n\n`import org.springframework.jdbc.core.SqlParameter;`\n\
  `import org.springframework.jdbc.object.SqlUpdate;`\n\n`public class InsertContact\
  \ extends SqlUpdate {`\n\n`    private static final String SQL_INSERT_CONTACT =`\n\
  `        \"insert into contact (first_name,`\n`last_name, birth_date) values (:first_name,\
  \ :last_name, :birth_date)\";`\n\n`    public InsertContact(DataSource dataSource)\
  \ {`\n`        super(dataSource, SQL_INSERT_CONTACT);`\n`        super.declareParameter(new\
  \ SqlParameter(\"first_name\", Types.VARCHAR));`\n`        super.declareParameter(new\
  \ SqlParameter(\"last_name\", Types.VARCHAR));`\n`        super.declareParameter(new\
  \ SqlParameter(\"birth_date\", Types.DATE));`\n`        super.setGeneratedKeysColumnNames(new\
  \ String[] {\"id\"});`\n`        super.setReturnGeneratedKeys(true);`\n`    }`\n\
  \n`}`\n\n`InsertContact` 类与 `UpdateContact` 类几乎相同。我们只需要多做两件事。在构造 `InsertContact`\
  \ 类时，我们调用 `SqlUpdate.setGeneratedKeysColumnNames()` 方法来声明 ID 列的名称。`SqlUpdate.setReturnGeneratedKeys()`\
  \ 方法指示底层 JDBC 驱动程序检索生成的键。\n\n清单 8-45 展示了 `JdbcContactDao` 类中 `insert()` 方法的实现。\n\
  \n***清单 8-45.** 使用 `SqlUpdate` 进行插入操作*\n\n`package com.apress.prospring3.ch8.dao.jdbc.annotation;`\n\
  \n`// 导入语句已省略`\n`@Repository(\"contactDao\")`\n`public class JdbcContactDao implements\
  \ ContactDao {`\n**`    private InsertContact insertContact;`**\n\n`    @Resource(name=\"\
  dataSource\")`\n`    public void setDataSource(DataSource dataSource) {`\n`        this.dataSource\
  \ = dataSource;`\n\n`        selectAllContacts = new SelectAllContacts(dataSource);`\n\
  `        selectContactByFirstName = new SelectContactByFirstName(dataSource);`\n\
  `        updateContact = new UpdateContact(dataSource);`\n**`insertContact = new\
  \ InsertContact(dataSource);`**\n`    }`\n\n\n\n`    public void insert(Contact\
  \ contact) {`\n`        Map<String, Object> paramMap = new HashMap<String, Object>();`\n\
  `        paramMap.put(\"first_name\", contact.getFirstName());`\n`        paramMap.put(\"\
  last_name\", contact.getLastName());`\n`        paramMap.put(\"birth_date\", contact.getBirthDate());`\n\
  `        KeyHolder keyHolder = new GeneratedKeyHolder();`\n`        insertContact.updateByNamedParam(paramMap,\
  \ keyHolder);`\n`        contact.setId(keyHolder.getKey().longValue());`\n`        log.info(\"\
  New contact inserted with id: \" + contact.getId());`\n`    }`\n\n`// 其他代码已省略`\n\
  `}`\n\n来自清单 8-45，在数据源注入后，构造了一个 `InsertContact` 实例（注意加粗的行）。在 `insert()` 方法中，我们还使用了\
  \ `SqlUpdate.updateByNamedParam()` 方法。不过，我们还向该方法传入了一个 `KeyHolder` 实例，生成的 ID 将存储在其中。数据插入后，我们就可以从\
  \ `KeyHolder` 中检索生成的键。\n\n要测试该操作，请将清单 8-46 中的代码片段添加到 `AnnotationJdbcDaoSample` 类中。\n\
  \n***清单 8-46.** 测试 `insert()` 方法*\n\n`        // 插入联系人`\n`        contact = new\
  \ Contact();`\n`        contact.setFirstName(\"Rod\");`\n`        contact.setLastName(\"\
  Johnson\");`\n`        contact.setBirthDate(new Date((new GregorianCalendar(2001,\
  \ 10,`\n`1)).getTime().getTime()));`\n`        contactDao.insert(contact);`\n`        contacts\
  \ = contactDao.findAll();`\n`        listContacts(contacts);`\n\n运行程序，最后一个 `listContacts()`\
  \ 方法将产生以下输出：\n\n`11:36:08,871  INFO 3.ch8.dao.jdbc.annotation.JdbcContactDao:  88\
  \ - New contact inserted with`\n`id: 4`\n`Contact - Id: 1, First name: Clarence,\
  \ Last name: Peter, Birthday: 1977-11-01`\n\n`Contact - Id: 2, First name: Scott,\
