  \ Tiles 的联系人列表视图*\n\n### 实现联系人信息的视图\n\n现在我们可以继续实现允许用户查看联系人详细信息、创建新联系人或更新现有联系人信息的视图。\n\
  \n在以下各节中，我们将讨论 URL 到各种视图的映射，以及视图是如何实现的。我们还将讨论如何在 Spring MVC 中为编辑视图启用 JSR-303 验证支持。\n\
  \n#### URL 到视图的映射\n\n首先，我们需要设计如何将各种 URL 映射到相应的视图。在 Spring MVC 中，最佳实践之一是遵循 RESTful\
  \ 风格的 URL 来映射视图。表 17-5 展示了 URL 到视图的映射，以及将处理该操作的控制器方法名称。\n\n![images](img/t1705.jpg)\n\
