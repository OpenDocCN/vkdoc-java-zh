  \ 11-3.** 数据填充脚本*\n\n`insert into contact (first_name, last_name, birth_date)`\n\
  `    values ('Clarence', 'Ho', '1980-07-30');`\n`insert into contact (first_name,\
  \ last_name, birth_date)`\n`    values ('Scott', 'Tiger', '1990-11-02');`\n`insert\
  \ into contact (first_name, last_name, birth_date)`\n`    values ('John', 'Smith',\
  \ '1964-02-28');`\n\n`insert into contact_tel_detail (contact_id, tel_type, tel_number)`\n\
