  \ – <已刷新：0 次（重新）创建，0 次更新，0 次移除，涉及 0 个集合>`\n**`Hibernate: update contact set BIRTH_DATE=?,\
  \ FIRST_NAME=?, LAST_NAME=?, VERSION=? where ID=? and VERSION=?`**\n`DEBUG [org.hibernate.transaction.JDBCTransaction]\
  \ - <正在重新启用自动提交>`\n**`DEBUG [org.hibernate.transaction.JDBCTransaction] - <已提交 JDBC\
  \ 连接>`**\n`DEBUG [org.hibernate.jdbc.ConnectionManager] –<正在主动释放 JDBC 连接>`\n`DEBUG\
  \ [org.hibernate.jdbc.ConnectionManager] – <正在释放 JDBC 连接 [ (打开的 PreparedStatements:\
  \ 0, 全局: 0) (打开的 ResultSets: 0, 全局: 0)]>`\n`DEBUG [org.springframework.orm.jpa.JpaTransactionManager]\
  \ - <事务结束后正在关闭 JPA EntityManager [org.hibernate.ejb.EntityManagerImpl@396c75ed]>`\n\
