  `      http://www.springframework.org/schema/context`\n`      http://www.springframework.org/schema/context/spring-context-3.1.xsd\"\
  >`\n\n`    <jdbc:embedded-database id=\"dataSource\" type=\"H2\">`\n`        <jdbc:script\
  \ location=\"classpath:schema.sql\"/>`\n`        <jdbc:script location=\"classpath:test-data.sql\"\
  />`\n`    </jdbc:embedded-database>`\n\n`    <bean id=\"transactionManager\"`\n\
  `       class=\"org.springframework.orm.hibernate3.HibernateTransactionManager\"\
  >`\n`       <property name=\"sessionFactory\" ref=\"sessionFactory\"/>`\n`    </bean>    `\n\
  \n`    <tx:annotation-driven/>`\n\n`    <context:component-scan base-package=\"\
  com.apress.prospring3.ch9\" />`\n\n`    <bean id=\"sessionFactory\"`\n`class=\"\
  org.springframework.orm.hibernate3.annotation.AnnotationSessionFactoryBean\">`\n\
  `        <property name=\"dataSource\" ref=\"dataSource\"/>`\n`        <property\
  \ name=\"packagesToScan\"`\n`            value=\"com.apress.prospring3.ch9.domain\"\
  />`\n`        <property name=\"hibernateProperties\">`\n`            <props>`\n\
  `                <prop key=\"hibernate.dialect\">org.hibernate.dialect.H2Dialect</prop>`\n\
  `                <prop key=\"hibernate.max_fetch_depth\">3</prop>`\n`                <prop\
  \ key=\"hibernate.jdbc.fetch_size\">50</prop>`\n`                <prop key=\"hibernate.jdbc.batch_size\"\
  >10</prop>`\n`                <prop key=\"hibernate.show_sql\">true</prop>`\n`            </props>`\n\
  `        </property>        `\n`    </bean>`\n`</beans>`\n\n在上述配置中，声明了几个 Bean 以支持\
  \ Hibernate 的会话工厂。主要配置如下：\n\n\n\n*   ***dataSource bean***：我们使用 H2 声明了一个带有嵌入式数据库的数据源。\n\
  *   ***transactionManager bean***：Hibernate 会话工厂需要一个事务管理器来实现事务性数据访问。Spring 专门为 Hibernate\
  \ 3 提供了一个事务管理器（`org.springframework.orm.hibernate3.HibernateTransactionManager`）。该\
  \ bean 被声明并分配了 ID `transactionManager`。默认情况下，每当需要事务管理时，Spring 都会在其 `ApplicationContext`\
  \ 中查找名为 `transactionManager` 的 bean。我们将在第 13 章中详细讨论事务。此外，我们声明了标签 `<tx:annotation-driven>`\
  \ 以支持使用注解声明事务边界需求。\n*   ***组件扫描***：这个标签你应该很熟悉。我们指示 Spring 扫描 `com.apress.prospring3.ch9`\
  \ 包下的组件。\n*   ***Hibernate SessionFactory bean***：`sessionFactory` bean 是最重要的部分。因为我们使用了\
  \ Hibernate 的注解支持，所以我们使用了 `AnnotationSessionFactoryBean`。在该 bean 中，提供了几个属性。首先，正如你所料，我们需要将数据源\
  \ bean 注入到会话工厂中。其次，我们指示 Hibernate 扫描 `com.apress.prospring3.ch9.domain` 包下带有 ORM\
  \ 注解的领域对象。最后，`hibernateProperties` 属性为 Hibernate 提供了配置细节。有许多配置参数，我们只定义了每个应用程序都应提供的几个重要属性。表\
  \ 9-1 列出了 Hibernate 会话工厂的主要配置参数。\n\n![images](img/t0901.jpg)\n\n![images](img/t0901a.jpg)\n\
  \n有关 Hibernate 支持的完整属性列表，请参考 Hibernate 参考手册（[`http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/session-configuration.html`](http://docs.jboss.org/hibernate/core/3.6/reference/en-US/html/session-configuration.html)）。\n\
  \n### 使用 Hibernate 注解进行 ORM 映射\n\n配置完成后，下一步是建模 Java POJO 实体类及其与底层关系型数据结构的映射。\n\n\
  映射有两种方法。第一种是先设计对象模型，然后基于对象模型生成数据库脚本。例如，对于会话工厂配置，你可以传入 Hibernate 属性 `hibernate.hbm2ddl.auto`，让\
  \ Hibernate 自动将模式 DDL 导出到数据库。第二种方法是先从数据模型开始，然后使用所需的映射来建模 POJO。我们更倾向于后一种方法，因为我们可以对数据模型有更多的控制，这对于优化数据访问性能非常有用。基于数据模型，图\
  \ 9-5 使用类图展示了相应的 OO 模型。\n\n![images](img/9781430241072_Fig09-05.jpg)\n\n***图 9-5.**\
  \ 示例数据模型的类图*\n\n你可以看到 `Contact` 和 `ContactTelDetail` 之间存在一对多关系，而 `Contact` 和 `Hobby`\
  \ 对象之间存在多对多关系。\n\n#### 简单映射\n\n让我们先从简单属性的映射开始。从类图中可以看出，所有三个类中都存在简单属性。我们逐一来看。清单 9-5\
  \ 展示了带有映射注解的 `Contact` 类。\n\n***清单 9-5.** `Contact` 类*\n\n`package com.apress.prospring3.ch9.domain;`\n\
  \n`import static javax.persistence.GenerationType.IDENTITY;`\n\n`import java.io.Serializable;`\n\
  `import java.util.Date;`\n`import java.util.HashSet;`\n`import java.util.Set;`\n\
  `import javax.persistence.*;`\n\n`@Entity`\n`@Table(name = \"contact\")`\n`public\
