  `            System.out.println();`\n`        }`\n`    }`\n`}`\n\n在清单 10-45 中，我们分别在新联系人插入后以及后续更新后列出了联系人审计信息。运行程序将产生以下输出：\n\
  \n`添加新联系人`\n`列出联系人（不含详细信息）：`\n`Contact - Id: 1, First name: Michael, Last name:\
  \ Jackson, Birthday: 2011-10-21, Create by:`\n`prospring3,`\n`Create date: 2011-10-21T10:45:52.483+08:00,\
