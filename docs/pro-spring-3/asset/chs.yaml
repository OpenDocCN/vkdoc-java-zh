  \ {`\n\n`    // 其他代码已省略`\n`    public Contact save(Contact contact) {`\n`        sessionFactory.getCurrentSession().saveOrUpdate(contact);`\n\
  `        log.info(\"Contact saved with id: \" + contact.getId());`\n`        return\
  \ contact;`\n`    }`\n`}`\n\n我们只需调用 `Session.saveOrUpdate()` 方法，该方法可用于插入和更新操作。我们还记录了已保存联系人对象的\
  \ ID，该 ID 将在对象持久化后由 Hibernate 填充。让我们测试插入操作。清单 9-23 展示了插入新联系人记录的代码片段。将代码片段添加到 `SpringHibernateSample`\
