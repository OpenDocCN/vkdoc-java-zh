  \ 示例方法那样。\n\n\n\n#### 使用 SqlUpdate 更新数据\n\n对于更新数据，Spring 提供了 `SqlUpdate` 类。清单 8-41\
  \ 展示了用于更新操作的 `UpdateContact` 类，它扩展了 `SqlUpdate` 类。\n\n***清单 8-41.** `UpdateContact`\
  \ 类*\n\n`package com.apress.prospring3.ch8.dao.jdbc.annotation;`\n\n`import java.sql.Types;`\n\
  \n`import javax.sql.DataSource;`\n\n`import org.springframework.jdbc.core.SqlParameter;`\n\
  `import org.springframework.jdbc.object.SqlUpdate;`\n\n`public class UpdateContact\
  \ extends SqlUpdate {`\n\n`    private static final String SQL_UPDATE_CONTACT =`\n\
  `        \"update contact set first_name=:first_name, last_name=:last_name, birth_date=:birth_date\
  \ where id=:id\";`\n\n`    public UpdateContact(DataSource dataSource) {`\n`        super(dataSource,\
  \ SQL_UPDATE_CONTACT);`\n`        super.declareParameter(new SqlParameter(\"first_name\"\
  , Types.VARCHAR));`\n`        super.declareParameter(new SqlParameter(\"last_name\"\
  , Types.VARCHAR));`\n`        super.declareParameter(new SqlParameter(\"birth_date\"\
  , Types.DATE));`\n`        super.declareParameter(new SqlParameter(\"id\", Types.INTEGER));`\n\
  `    }`\n\n`}`\n\n现在你应该对清单 8-41 很熟悉了。我们使用查询语句构造了一个 `SqlUpdate` 类的实例，并且也声明了命名参数。\n\
