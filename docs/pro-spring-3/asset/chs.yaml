  \ 类的新实例，并将其存储为流程作用域变量。这使得该变量可用于添加联系人流程中的所有步骤。清单 18-15 显示了 `ContactBean` 类，它存储了在流程中输入的信息，并包含通过使用\
  \ PrimeFaces 组件促进用户交互的属性。\n\n***清单 18-15.** `ContactBean` 类*\n\n`package com.apress.prospring3.ch18.web.view;`\
