  \ - Id: 1, First name: Clarence, Last name: Ho, Birthday: 1980-07-30`\n`Contact\
  \ Tel Detail - Id: 1, Contact id: 1, Type: Mobile, Number: 1234567890`\n`Contact\
  \ Tel Detail - Id: 2, Contact id: 1, Type: Home, Number: 1234567890`\n`Hobby :Swimming`\n\
  `Hobby :Movies`\n\n`Contact - Id: 4, First name: Michael, Last name: Jackson, Birthday:\
  \ 2011-10-13`\n`Contact Tel Detail - Id: 4, Contact id: 4, Type: Mobile, Number:\
  \ 2222222222`\n`Contact Tel Detail - Id: 5, Contact id: 4, Type: Home, Number: 1111111111`\n\
