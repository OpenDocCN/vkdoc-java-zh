  org.springframework.orm.jpa.JpaTransactionManager\">`\n`        <property name=\"\
  entityManagerFactory\" ref=\"emf\"/>`\n`    </bean>`\n\n`    <tx:annotation-driven\
  \ transaction-manager=\"transactionManager\" />`\n\n`    <bean id=\"emf\" class=\"\
