  \ Setter methods omitted`\n`}`\n\n如清单 17-3 所示，使用了标准的 JPA 注解。我们还使用了 JodaTime 的 `DateTime`\
  \ 类来表示 `birthDate` 属性。另请注意以下几点：\n\n*   添加了一个新的瞬态属性（通过对 getter 方法应用 `@Transient`\
  \ 注解）`birthDateString`，它将在后续示例中用于前端展示。\n*   对于 `photo` 属性，我们使用字节数组作为 Java 数据类型，这与关系数据库中的\
