  \n清单 11-45 和 11-46 分别展示了`ContactHobbyDetailMapper`接口（包含新的`deleteHobbyDetailForContact()`方法）和用于更新操作的`ContactHobbyDetailMapper.xml`映射文件。\n\
  \n***清单 11-45.** `ContactHobbyDetailMapper`接口*\n\n`package com.apress.prospring3.ch11.persistence;`\n\
  \n`import com.apress.prospring3.ch11.domain.ContactHobbyDetail;`\n\n`public interface\
  \ ContactHobbyDetailMapper {`\n\n`    public void insertContactHobbyDetail(ContactHobbyDetail\
  \ contactHobbyDetail);`\n\n`    public void deleteHobbyDetailForContact(Long contactId);`\n\
  \n`}`\n\n***清单 11-46.** `ContactHobbyDetailMapper.xml`映射文件*\n\n`    <!-- 其他代码已省略\
  \ -->`\n\n`    <delete id=\"deleteHobbyDetailForContact\" parameterType=\"long\"\
  >`\n`        DELETE FROM CONTACT_HOBBY_DETAIL WHERE CONTACT_ID = #{contactId}`\n\
  `    </delete>`\n\n现在我们可以继续在`ContactServiceImpl`类中实现`update()`方法。清单 11-47 展示了代码片段。\n\
  \n***清单 11-47.** 实现`update`操作*\n\n`    // 其他代码已省略`\n`    public Contact save(Contact\
  \ contact) {`\n`        if (contact.getId() == null) {`\n`            insert(contact);`\n\
  `        } else {`\n`            update(contact);`\n`        }`\n`        return\
  \ contact;`\n`    }`\n\n`    private Contact update(Contact contact) {`\n`        contactMapper.updateContact(contact);`\n\
  `        Long contactId = contact.getId();`\n`        ContactHobbyDetail contactHobbyDetail;`\n\
  \n`        // 存储联系人电话详情中孤立 ID 的列表`\n`        List<Long> ids = new ArrayList<Long>();`\n\
  `        // 检索联系人现有的电话`\n`        List<ContactTelDetail> oldContactTelDetails =`\n\
  `            contactTelDetailMapper.selectTelDetailForContact(contactId);`\n`        for\
  \ (ContactTelDetail contactTelDetail: oldContactTelDetails) {`\n`            ids.add(contactTelDetail.getId());`\n\
  `        }`\n\n`        // 更新电话详情`\n`        if (contact.getContactTelDetails()\
  \ != null) {`\n`            for (ContactTelDetail contactTelDetail:`\n`                contact.getContactTelDetails())\
  \ {`\n`                if (contactTelDetail.getId() == null) {`\n`                    contactTelDetailMapper.insertContactTelDetail(contactTelDetail);`\n\
  `                } else {`\n`                    contactTelDetailMapper.updateContactTelDetail(contactTelDetail);`\n\
  `                    ids.remove(contactTelDetail.getId());`\n`                }`\n\
  `            }`\n`            if (ids.size() > 0) {`\n`                contactTelDetailMapper.deleteOrphanContactTelDetail(ids);`\n\
  `            }`\n`        }`\n\n`        // 更新爱好详情`\n`        contactHobbyDetailMapper.deleteHobbyDetailForContact(contact.getId());`\n\
  `        if (contact.getHobbies() != null) {`\n`            for (Hobby hobby: contact.getHobbies())\
  \ {`\n`                contactHobbyDetail = new ContactHobbyDetail();`\n`                contactHobbyDetail.setContactId(contactId);`\n\
  `                contactHobbyDetail.setHobbyId(hobby.getHobbyId());`\n`                contactHobbyDetailMapper.insertContactHobbyDetail(contactHobbyDetail);`\n\
  `            }`\n`        }`\n\n`        return contact;`\n`    }`\n\n在清单 11-47\
  \ 中，更新逻辑按照本节开头描述的顺序实现。为了测试更新操作，将清单 11-48 中的代码片段添加到`MyBatisSample`类的`main()`方法中。\n\
  \n***清单 11-48.** 测试用于更新操作的`save()`方法实现*\n\n`        // 更新联系人`\n`        System.out.println(\"\
