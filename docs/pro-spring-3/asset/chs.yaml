  \n### 使用 jQuery 和 jQuery UI\n\n尽管我们的联系人应用程序的视图运行良好，但用户界面相当原始。例如，对于出生日期字段，如果能在用户输入联系人的出生日期时添加一个日期选择器，而不是手动输入日期字符串，那将会好得多。\n\
  \n为了为 Web 应用程序的用户提供更丰富的界面，除非您使用需要 Web 浏览器客户端上特殊运行时的富互联网应用程序（RIA）技术（例如，Adobe Flex\
  \ 需要 Flash，JavaFX 需要 JRE，Microsoft Silverlight 需要 Silverlight 等），否则您需要使用 JavaScript\
  \ 来实现这些功能。\n\n然而，使用原生 JavaScript 开发 Web 前端并不容易。其语法与 Java 非常不同，而且您还需要处理跨浏览器兼容性问题。因此，有许多开源\
  \ JavaScript 库可以使这个过程更容易，例如 jQuery、Dojo Toolkit 等。\n\n在以下各节中，我们将讨论如何使用 jQuery 和\
  \ jQuery UI 开发更具响应性和交互性的用户界面。我们还将讨论一些用于特定目的的常用 jQuery 插件，例如富文本编辑支持，并讨论一些用于浏览数据的基于网格的组件。\n\
  \n#### 介绍 jQuery 和 jQuery UI\n\njQuery ([`http://jquery.org`](http://jquery.org))\
  \ 是用于 Web 前端开发的最流行的 JavaScript 库之一。jQuery 为主要功能提供了全面的支持，包括用于选择文档中 DOM 元素的强大的“选择器”语法、复杂的事件模型、强大的\
  \ Ajax 支持等。\n\njQuery UI 库 ([`http://jqueryui.com`](http://jqueryui.com)) 构建在 jQuery\
  \ 之上，提供了丰富的窗口小部件和效果集。主要功能包括常用用户界面组件的窗口小部件（日期选择器、自动完成、手风琴等）、拖放、效果和动画、主题化等。\n\n还有许多由\
  \ jQuery 社区开发的用于特定目的的 jQuery 插件，我们将在本章中讨论其中的两个。\n\n我们在这里介绍的内容只是 jQuery 的皮毛。有关使用\
  \ jQuery 的更多详细信息，我们推荐书籍 *jQuery Recipes* : *A Problem-Solution Approach* (Apress,\
  \ 2010) 和 *jQuery in Action*, Second Edition (Manning, 2010)。\n\n#### 在视图中启用 jQuery\
  \ 和 jQuery UI\n\n为了能够在我们的视图中使用 jQuery 和 jQuery UI 组件，我们需要包含所需的样式表和 JavaScript 文件。\n\
  \n如果您阅读了本章前面的“Spring MVC 项目结构概述”部分，所需的文件应该已经复制到项目中。我们需要在视图中包含的主要文件如下：\n\n*   `/src/main/webapp/scripts/jquery-1.7.1.js`：这是核心的\
