  \ 删除所有存在于数据库中但在持久化时对象中不再存在的孤立记录。\n\n`@OneToMany(mappedBy = \"contact\", cascade=CascadeType.ALL,\
  \ orphanRemoval=true)`\n\n#### 删除数据\n\n删除数据也很简单。只需调用 `Session.delete()` 方法并传入联系人对象即可。清单\
