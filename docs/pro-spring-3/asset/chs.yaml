  \ Serializable>` 接口。清单 13-7 展示了 `ContactRepository` 接口。\n\n***清单 13-7.** `ContactRepository`\
  \ 类*\n\n`package com.apress.prospring3.ch13.repository;`\n\n`import org.springframework.data.repository.CrudRepository;`\n\
  \n`import com.apress.prospring3.ch13.domain.Contact;`\n\n`public interface ContactRepository\
  \ extends CrudRepository<Contact, Long> {`\n\n`}`\n\n如清单 13-7 所示，无需额外方法，因为 `CrudRepository`\
  \ 接口提供的方法已足以满足本章示例的需求。\n\n最后，让我们看看 `ContactService` 接口，它定义了与 `Contact` 实体类相关的所有业务逻辑。清单\
  \ 13-8 展示了 `ContactService` 接口。\n\n***清单 13-8.** `ContactService` 接口*\n\n`package\
  \ com.apress.prospring3.ch13.service;`\n\n`import java.util.List;`\n\n`import com.apress.prospring3.ch13.domain.Contact;`\n\
  \n`public interface ContactService {`\n\n`    public List<Contact> findAll();`\n\
  \n`    public Contact findById(Long id);`\n\n`    public Contact save(Contact contact);`\n\
  \n`    public long countAll();`\n`}`\n\n所有方法均不言自明。在下一节中，我们将讨论如何通过实现 `ContactService`\
  \ 接口，以多种方式实现事务管理。\n\n### 使用 Spring 进行声明式与编程式事务管理\n\n在 Spring 中，事务管理有三种选择。其中两种用于声明式事务管理，一种使用\
  \ Java 注解，另一种使用 XML 配置。第三种选择是编程式事务管理。我们将在以下各节中逐一介绍这三种方式。\n\n\n\n#### 使用注解进行事务管理\n\
  \n目前，在 Spring 中使用注解是定义事务需求最常见的方式。其主要优势在于，事务需求以及详细的事务属性（超时时间、隔离级别、传播行为等）都定义在代码本身中，这使得应用程序更易于跟踪和维护。\n\
  \n要在 Spring 中启用对事务管理的注解支持，我们需要在 XML 配置文件中添加 `<tx:annotation-driven>` 标签。清单 13-9\
  \ 展示了配置文件 (`tx-annotation-app-context.xml`)。\n\n***清单 13-9.** 支持注解事务的 Spring 配置*\n\
  \n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"\
  http://www.springframework.org/schema/jdbc`\n`        http://www.springframework.org/schema/jdbc/spring-jdbc-3.1.xsd`\n\
  `        http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n\
  `        http://www.springframework.org/schema/tx`\n`        http://www.springframework.org/schema/tx/spring-tx-3.1.xsd`\n\
  `        http://www.springframework.org/schema/data/jpa`\n`        http://www.springframework.org/schema/data/jpa/spring-jpa-1.0.xsd`\n\
  `        http://www.springframework.org/schema/context`\n`        http://www.springframework.org/schema/context/spring-context-3.1.xsd\"\
  >`\n\n`    <jdbc:embedded-database id=\"dataSource\" type=\"H2\">`\n`        <jdbc:script\
  \ location=\"classpath:schema.sql\"/>`\n`        <jdbc:script location=\"classpath:test-data.sql\"\
  />    `\n`    </jdbc:embedded-database>`\n\n`    <bean id=\"transactionManager\"\
  \ class=\"org.springframework.orm.jpa.JpaTransactionManager\">`\n`        <property\
  \ name=\"entityManagerFactory\" ref=\"emf\"/>`\n`    </bean>`\n\n`    <tx:annotation-driven/>`\n\
  \n`    <bean id=\"emf\" class=\"org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean\"\
  >`\n`        <property name=\"dataSource\" ref=\"dataSource\" />`\n`        <property\
  \ name=\"jpaVendorAdapter\">`\n`            <bean class=\"org.springframework.orm.jpa.vendor.HibernateJpaVendorAdapter\"\
  \ />`\n`        </property>        `\n`        <property name=\"packagesToScan\"\
  \ value=\"com.apress.prospring3.ch13.domain\"/>`\n`        <property name=\"jpaProperties\"\
  >`\n`            <props>`\n`                <prop key=\"hibernate.dialect\">`\n\
  `                    org.hibernate.dialect.H2Dialect`\n`                </prop>`\n\
  `                <prop key=\"hibernate.max_fetch_depth\">3</prop>`\n`                <prop\
  \ key=\"hibernate.jdbc.fetch_size\">50</prop>`\n`                <prop key=\"hibernate.jdbc.batch_size\"\
  >10</prop>`\n`                <prop key=\"hibernate.show_sql\">true</prop>`\n`            </props>`\n\
  `        </property>`\n`    </bean>    `\n\n`    <context:component-scan`\n`        base-package=\"\
  com.apress.prospring3.ch13.service.annotation\" />`\n\n`    <jpa:repositories base-package=\"\
  com.apress.prospring3.ch13.repository\"`\n`        entity-manager-factory-ref=\"\
  emf\"`\n`        transaction-manager-ref=\"transactionManager\"/>`\n\n`</beans>`\n\
  \n如果你已经阅读过第 10 章，那么前面的配置应该很熟悉。首先，定义了一个嵌入式 H2 数据库，并附带了数据库创建和数据填充脚本。然后，因为我们使用的是 JPA，所以定义了\
  \ `JpaTransactionManager` bean。`<tx:annotation-driven>` 指定了我们使用注解进行事务管理。接着定义了 `EntityManagerFactory`\
  \ bean，随后是 `<context:component-scan>` 用于扫描服务层类。最后，使用 `<jpa:repositories>` 标签来启用\
  \ Spring Data JPA 的仓库抽象。\n\n对于 `ContactService` 接口的实现类 `com.apress.prospring3.ch13.service.annotation.ContactServiceImpl`，我们首先创建该类，并为其\
  \ `ContactService` 接口中的所有方法提供空实现。在 STS 中，这非常容易实现。详情请参考第 8 章。\n\n我们先来实现 `ContactService.findAll()`\
  \ 方法。清单 13-10 展示了实现了 `findAll()` 方法的 `ContactServiceImpl` 类。\n\n***清单 13-10.** 实现了\
  \ `findAll()` 方法的 `ContactServiceImpl` 类*\n\n`package com.apress.prospring3.ch13.service.annotation;`\n\
  \n`// 导入语句已省略`\n`@Service(\"contactService\")`\n`@Repository`\n`@Transactional`\n\
  `public class ContactServiceImpl implements ContactService {`\n\n`    @Autowired`\n\
  `    private ContactRepository contactRepository;`\n\n`    @Transactional(readOnly=true)`\n\
  `    public List<Contact> findAll() {`\n`        return Lists.newArrayList(contactRepository.findAll());`\n\
  `    }`\n\n`}`\n\n当使用基于注解的事务管理时，我们唯一需要处理的注解就是 `@Transactional`。从清单 13-10 可以看出，`@Transactional`\
  \ 注解被应用在类级别，这意味着默认情况下，Spring 会确保在该类中每个方法执行之前都存在一个事务。`@Transactional` 注解支持多个属性，你可以通过它们来覆盖默认行为。表\
  \ 13-4 列出了可用的属性及其可能值和默认值。\n\n![images](img/t1304.jpg)\n\n因此，根据表 13-4，不带任何属性的 `@Transactional`\
  \ 注解意味着事务传播行为为 required，隔离级别为默认值，超时时间为默认值，并且模式为读写。\n\n对于清单 13-10 中的 `findAll()`\
  \ 方法，该方法使用了 `@Transactional(readOnly=true)` 注解。这将覆盖在类级别应用的默认注解，所有其他属性保持不变，但事务被设置为只读。\n\
  \n清单 13-11 展示了 `findAll()` 方法的测试程序。\n\n***清单 13-11.** 测试 `findAll()` 方法*\n\n`package\
  \ com.apress.prospring3.ch13;`\n\n`import java.util.List;`\n\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  \n`import com.apress.prospring3.ch13.domain.Contact;`\n`import com.apress.prospring3.ch13.service.ContactService;`\n\
  \n`public class TxAnnotationSample {`\n\n`    public static void main(String[] args)\
  \ {`\n\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:tx-annotation-app-context.xml\");`\n`        ctx.refresh();`\n\
  \n`        ContactService contactService = ctx.getBean(\"contactService\",`\n`            ContactService.class);`\n\
  \n`        List<Contact> contacts = contactService.findAll();`\n\n`        for (Contact\
  \ contactTemp: contacts) {`\n`            System.out.println(contactTemp);`\n`        }`\n\
  `    }`\n`}`\n\n运行该程序将产生以下输出：\n\n\n\n**`DEBUG [org.springframework.orm.jpa.JpaTransactionManager]\
  \ – <正在创建新事务，名称为 [com.apress.prospring3.ch13.service.annotation.ContactServiceImpl.findAll]：PROPAGATION_REQUIRED,ISOLATION_DEFAULT,readOnly;\
