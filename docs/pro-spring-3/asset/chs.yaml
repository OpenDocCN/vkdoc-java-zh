  \ new Hobby();`\n`        hobby.setHobbyId(\"Jogging\");`\n`        contact.getHobbies().add(hobby);`\n\
  `        contactService.save(contact);`\n`        contacts = contactService.findAllWithDetail();`\n\
  `        listContactsWithDetail(contacts);`\n\n在清单 11-48 中，首先检索 ID 为 1 的联系人。然后，更新名字，删除家庭电话记录，并添加一个新的爱好。接着，调用`save()`方法保存联系人。运行程序将产生以下输出（其他输出已省略）：\n\
  \n`Contact - Id: 1, First name: Kim Fung, Last name: Ho, Birthday: Wed Jul 30 00:00:00\
  \ CST 1980`\n`Contact Tel Detail - Id: 1, Contact id: 1, Type: Mobile, Number: 1234567890`\n\
  `Hobby :Movies`\n`Hobby :Swimming`\n`Hobby :Jogging`\n\n可以看到联系人已正确更新。\n\n\n\n####\
  \ 删除数据\n\n删除数据要简单得多。我们只需要实现操作，分别删除 `CONTACT` 表中的联系人，以及 `CONTACT_TEL_DETAIL` 和 `CONTACT_HOBBY_DETAIL`\
  \ 表中的底层记录。清单 11-49 和 11-50 展示了 `ContactMapper` 接口的新方法 `deleteContact()`，以及 `ContactMapper.xml`\
  \ 文件中对应的查询映射。\n\n***清单 11-49.** ContactMapper 的 `deleteContact` 操作*\n\n`package\
  \ com.apress.prospring3.ch11.persistence;`\n\n`import java.util.List;`\n\n`import\
  \ com.apress.prospring3.ch11.domain.*;`\n\n`public interface ContactMapper {`\n\n\
  `    public List<Contact> findAll();`\n\n`    public List<Contact> findAllWithDetail();`\n\
  \n`    public Contact findById(Long id);`\n\n`    public List<Contact> findByFirstNameAndLastName(SearchCriteria\
  \ criteria);`\n\n`    public void insertContact(Contact contact);`\n\n`    public\
  \ void updateContact(Contact contact);`\n\n`    void deleteContact(Long id);`\n\n\
  `}`\n\n***清单 11-50.** `ContactMapper.xml` 文件的 `deleteContact` 操作*\n\n`    <delete\
  \ id=\"deleteContact\" parameterType=\"long\">`\n`        DELETE FROM CONTACT WHERE\
  \ ID = #{id}`\n`    </delete>`\n\n这里只有一处新内容，即使用了 `<delete>` 标签来表示删除操作。\n\n清单 11-51\
  \ 和 11-52 分别展示了 `ContactTelDetailMapper` 接口（包含新方法 `deleteTelDetailForContact()`）和\
  \ `ContactTelDetailMapper.xml` 映射文件。\n\n***清单 11-51.** `ContactTelDetailMapper`\
  \ 接口*\n\n`package com.apress.prospring3.ch11.persistence;`\n\n`import java.util.List;`\n\
  \n`import com.apress.prospring3.ch11.domain.ContactTelDetail;`\n\n`public interface\
  \ ContactTelDetailMapper {`\n\n`    public List<ContactTelDetail> selectTelDetailForContact(Long\
