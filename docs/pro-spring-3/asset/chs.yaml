  First name for contact id 1 is: \" +    `\n`            contactDao.findFirstNameById(1l));`\n\
  \n`    }`\n`}`\n\n正如预期，运行程序将产生以下输出：\n\n`First name for contact id 1 is: Clarence`\n\
  \n#### 使用 NamedParameterJdbcTemplate 的命名参数\n\n在前面的示例中，我们使用普通的占位符（`?` 字符）作为查询参数。正如你所见，我们需要将参数作为\
  \ `Object` 数组传递。当使用普通占位符时，顺序非常重要，你放入数组中的参数顺序应与查询中参数的顺序相同。\n\n一些开发者（比如我）更喜欢使用命名参数来确保参数被精确地绑定到期望的位置。在\
  \ Spring 中，`JdbcTemplate` 的一个变体，称为 `NamedParameterJdbcTemplate`（位于 `org.springframework.jdbc.core.namedparam`\
  \ 包下），提供了对此的支持。让我们看看它是如何工作的。\n\n例如，这次我们想添加另一个方法来根据 ID 查找姓氏，那么让我们在 `ContactDao` 接口中添加该方法：\n\
  \n`public String findLastNameById(Long id);`\n\n`NamedParameterJdbcTemplate` 的初始化与\
  \ `JdbcTemplate` 相同，所以我们只需要声明一个类型为 `NamedParameterJdbcTemplate` 的变量，并在 DAO 类的 `setDataSource()`\
  \ 方法中添加以下代码行：\n\n`this.namedParameterJdbcTemplate = new NamedParameterJdbcTemplate(dataSource);`\n\
  \n现在让我们看看如何实现该方法。清单 8-26 展示了实现。\n\n***清单 8-26.** 使用 `NamedParameterJdbcTemplate`\
  \ 检索单值*\n\n`package com.apress.prospring3.ch8.dao.jdbc.xml;`\n\n`// 导入语句已省略`\n\n\
  `public class JdbcContactDao implements ContactDao, InitializingBean {`\n\n`    //\
  \ 其他方法已省略`\n\n`    public String findLastNameById(Long id) {`\n`         String\
  \ sql = \"select last_name from contact where id = :contactId\";`\n\n`        SqlParameterSource\
  \ namedParameters =`\n`            new MapSqlParameterSource(\"contactId\", id);`\n\
  `        return namedParameterJdbcTemplate.queryForObject(sql,`\n`            namedParameters,\
  \ String.class);`\n`    }`\n`}`\n\n首先，你会看到这里使用了命名参数（以冒号为前缀）来代替 `?` 占位符。其次，初始化了一个\
  \ `SqlParameterSource`，这是一个基于 `Map` 的 SQL 参数源，其中键是命名参数的名称，值是参数的值。除了 `SqlParameterSource`，你也可以简单地构造一个\
  \ `Map` 来存储命名参数。清单 8-27 是前一个方法的变体。\n\n***清单 8-27.** 使用 `NamedParameterJdbcTemplate`\
  \ 检索单值*\n\n`package com.apress.prospring3.ch8.dao.jdbc.xml;`\n\n`// 导入语句已省略`\n\n\
  `public class JdbcContactDao implements ContactDao, InitializingBean {`\n\n`    //\
  \ 其他方法已省略`\n\n`    public String findLastNameById(Long id) {`\n`    String sql =\
  \ \"select last_name from contact where id = :contactId\";`\n\n`    Map<String,\
  \ Object> namedParameters = new HashMap<String, Object>();`\n`    namedParameters.put(\"\
  contactId\", id);`\n`    return namedParameterJdbcTemplate.queryForObject(sql,`\n\
  `        namedParameters, String.class);`\n`    }`\n`}`\n\n要测试这段代码，只需将方法添加到清单 8-25\
  \ 的主测试类中并运行即可。这里我将跳过这一步。\n\n\n\n#### 使用 RowMapper<T> 检索领域对象\n\n大多数情况下，你不仅需要检索单个值，而是希望查询一行或多行数据，然后将每一行转换为对应的领域对象。\n\
  \nSpring 的 `RowMapper<T>` 接口（位于 `org.springframework.jdbc.core` 包下）提供了一种简单的方式，让你能够将\
  \ JDBC 结果集映射到 POJO。让我们通过使用 `RowMapper<T>` 接口实现 `ContactDao` 接口的 `findAll()` 方法来实际演示一下。清单\
  \ 8-28 展示了 `findAll()` 方法的实现。\n\n***清单 8-28.** 使用 `RowMapper<T>` 查询领域对象*\n\n`package\
  \ com.apress.prospring3.ch8.dao.jdbc.xml;`\n\n`// 导入语句已省略`\n`public class JdbcContactDao\
  \ implements ContactDao, InitializingBean {`\n\n`    // 其他方法已省略`\n\n`    public\
  \ List<Contact> findAll() {`\n`        String sql = \"select id, first_name, last_name,\
  \ birth_date from contact\";`\n`        return jdbcTemplate.query(sql, new ContactMapper());`\n\
  `    }`\n\n`    private static final class ContactMapper implements RowMapper<Contact>\
  \ {`\n\n`        public Contact mapRow(ResultSet rs, int rowNum) throws SQLException\
  \ {`\n\n`            Contact contact = new Contact();`\n`            contact.setId(rs.getLong(\"\
  id\"));`\n`            contact.setFirstName(rs.getString(\"first_name\"));`\n`            contact.setLastName(rs.getString(\"\
  last_name\"));`\n`            contact.setBirthDate(rs.getDate(\"birth_date\"));`\n\
  `            return contact;`\n`        }`\n\n`    }`\n`}`\n\n在上面的清单中，我们定义了一个名为\
  \ `ContactMapper` 的静态内部类，它实现了 `RowMapper<T>` 接口。该类需要提供 `mapRow()` 的实现，该方法将结果集中特定记录的值转换为你想要的领域对象。将其设为静态内部类，可以让你在多个查找方法之间共享\
  \ `RowMapper<T>`。\n\n之后，`findAll()` 方法只需调用 `query` 方法，并传入查询字符串和行映射器即可。如果查询需要参数，`query()`\
  \ 方法还提供了一个接受查询参数的重载版本。\n\n让我们将以下代码片段（清单 8-29）添加到测试程序（`JdbcContactDaoSample` 类）中。\n\
  \n***清单 8-29.** 列出联系人的代码片段*\n\n`        // 查找并列出所有联系人`\n`        List<Contact> contacts\
