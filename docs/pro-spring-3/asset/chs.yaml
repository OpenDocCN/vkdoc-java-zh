  `DEBUG [org.hibernate.transaction.JDBCTransaction] - <commit>`**\n`DEBUG [org.hibernate.transaction.JDBCTransaction]\
  \ - <正在重新启用自动提交>`\n`DEBUG [org.hibernate.transaction.JDBCTransaction] - <已提交 JDBC\
  \ 连接>`\n`DEBUG [org.hibernate.jdbc.ConnectionManager] - <正在主动释放 JDBC 连接>`\n`DEBUG\
  \ [org.hibernate.jdbc.ConnectionManager] - <正在释放 JDBC 连接 [ (打开的 PreparedStatements:\
  \ 0, 全局: 0) (打开的 ResultSets: 0, 全局: 0)]>`\n`DEBUG [org.springframework.orm.jpa.JpaTransactionManager]\
  \ - <事务结束后正在关闭 JPA EntityManager [org.hibernate.ejb.EntityManagerImpl@5b62f030]>`\n\
  `Contact - Id: 1, First name: Clarence, Last name: Ho, Birthday: 1980-07-30`\n`Contact\
  \ - Id: 2, First name: Scott, Last name: Tiger, Birthday: 1990-11-02`\n`Contact\
  \ - Id: 3, First name: John, Last name: Smith, Birthday: 1964-02-28`\n\n如上输出所示，为清晰起见，已移除无关的输出语句。与事务处理相关的显著日志消息以粗体显示。在第一行中，在运行\
  \ `findAll()` 方法之前，Spring 的 `JpaTransactionManager` 使用默认属性创建了一个新事务（其名称等于包含方法名的完全限定类名），但该事务被设置为只读，正如在方法级别的\
  \ `@Transactional` 注解中所定义的那样。然后，提交查询，在查询完成且没有任何错误后，事务被提交。事务的创建和提交操作由 `JpaTransactionManager`\
  \ 处理。\n\n接下来我们继续实现更新操作。我们需要在 `ContactService` 接口中实现 `findById()` 和 `save()` 方法。清单\
  \ 13-12 展示了其实现。\n\n***清单 13-12.** 实现了 `findById()` 和 `save()` 方法的 `ContactServiceImpl`\
  \ 类*\n\n`package com.apress.prospring3.ch13.service.annotation;`\n\n`// 导入语句已省略`\n\
  `@Service(\"contactService\")`\n`@Repository`\n`@Transactional`\n`public class ContactServiceImpl\
  \ implements ContactService {`\n\n`    // 代码已省略`\n`    @Transactional(readOnly=true)`\n\
  `    public Contact findById(Long id) {`\n`        return contactRepository.findOne(id);`\n\
  `    }`\n\n`    public Contact save(Contact contact) {`\n`        return contactRepository.save(contact);`\n\
  `    }`\n`}`\n\n如清单 13-12 所示，`findById()` 方法也使用了 `@Transactional(readOnly=true)`\
  \ 注解。通常，`readOnly=true` 属性应应用于所有查找器方法。主要原因是大多数持久化提供程序会对只读事务执行一定程度的优化。例如，Hibernate\
  \ 在启用只读模式时，不会维护从数据库检索到的受管实例的快照。\n\n对于 `save()` 方法，我们简单地调用了 `CrudRepository.save()`\
  \ 方法，并且没有提供任何注解。这意味着将使用类级别的注解，即一个读写事务。\n\n让我们修改 `TxAnnotationSample` 类来测试 `save()`\
  \ 方法，如清单 13-13 所示。\n\n***清单 13-13.** 测试 `save()` 方法*\n\n`package com.apress.prospring3.ch13;`\n\
  \n`// 导入语句已省略`\n`public class TxAnnotationSample {`\n\n`    public static void main(String[]\
  \ args) {`\n\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:tx-annotation-app-context.xml\");`\n`        ctx.refresh();`\n\
  \n`        ContactService contactService = ctx.getBean(\"contactService\",    `\n\
  `            ContactService.class);`\n\n`        Contact contact = contactService.findById(1l);`\n\
  `        contact.setFirstName(\"Peter\");`\n`        contactService.save(contact);`\n\
  `        System.out.println(\"联系人保存成功\");`\n`    }`\n\n`}`\n\n如清单 13-13 所示，检索了 `id`\
  \ 为 1 的 `Contact` 对象，然后更新了名字并将其保存到数据库。运行代码会产生以下输出：\n\n**`DEBUG [org.springframework.orm.jpa.JpaTransactionManager]\
  \ –<正在创建新事务，名称为 [com.apress.prospring3.ch13.service.annotation.ContactServiceImpl.findById]\
  \ :PROPAGATION_REQUIRED,ISOLATION_DEFAULT,readOnly; ''>`**\n`DEBUG [org.hibernate.transaction.JDBCTransaction]\
  \ - <begin>`\n**`Hibernate: select contact0_.ID as ID0_0_, contact0_.BIRTH_DATE\
  \ as BIRTH2_0_0_, contact0_.FIRST_NAME as FIRST3_0_0_, contact0_.LAST_NAME as LAST4_0_0_,\
  \ contact0_.VERSION as VERSION0_0_ from contact contact0_ where contact0_.ID=?`**\n\
  `DEBUG [org.springframework.orm.jpa.JpaTransactionManager] –` **`<正在创建新事务，名称为 [com.apress.prospring3.ch13.service.annotation.ContactServiceImpl.save]:\
