  2.0\">`  `   <application>` `      <locale-config>` `         <default-locale>en</default-locale>`\
  \ `         <supported-locale>en</supported-locale>` `      </locale-config>` `      <message-bundle>MessageResources</message-bundle>`\
  \ `      <resource-bundle>` `         <base-name>MessageResources</base-name>` `         <var>msg</var>`\
