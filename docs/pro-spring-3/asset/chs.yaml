  \n在创建好模板项目并准备好示例数据模型和脚本后，我们就可以开始为本章示例实现并配置服务层了。\n\n在接下来的章节中，我们将讨论使用 JPA 2、Spring\
  \ Data JPA 和 Hibernate 作为持久化服务提供者来实现 `ContactService`。然后，我们将介绍如何在 Spring 项目中配置服务层。\n\
  \n##### 实现 ContactService\n\n在示例中，我们将向远程客户端公开用于对联系人信息执行各种操作的服务。首先，我们需要创建 `Contact`\
  \ 实体类，如清单 16-3 所示。\n\n***清单 16-3.** `Contact` 实体类*\n\n`package com.apress.prospring3.ch16.domain;`\n\
  \n`import static javax.persistence.GenerationType.IDENTITY;`\n\n`import java.io.Serializable;`\n\
  \n`import javax.persistence.*;`\n\n`import org.hibernate.annotations.Type;`\n`import\
  \ org.joda.time.DateTime;`\n\n`@Entity`\n`@Table(name = \"contact\")`\n`public class\
  \ Contact implements Serializable {`\n\n`    private Long id;`\n`    private int\
  \ version;`\n`    private String firstName;`\n`    private String lastName;`\n`    private\
  \ DateTime birthDate;`\n\n`    @Id`\n`    @GeneratedValue(strategy = IDENTITY)`\n\
  `    @Column(name = \"ID\")`\n`    public Long getId() {`\n`        return id;`\n\
  `    }`\n\n`    @Version`\n`    @Column(name = \"VERSION\")`\n`    public int getVersion()\
  \ {`\n`        return version;`\n`    }`\n\n`    @Column(name = \"FIRST_NAME\")`\n\
  `    public String getFirstName() {`\n`        return firstName;`\n`    }`\n\n`    @Column(name\
  \ = \"LAST_NAME\")`\n`    public String getLastName() {`\n`        return lastName;`\n\
  `    }`\n\n`    @Column(name = \"BIRTH_DATE\")`\n`    @Type(type=\"org.joda.time.contrib.hibernate.PersistentDateTime\"\
  )`\n`    public DateTime getBirthDate() {`\n`        return birthDate;`\n`    }`\n\
  \n`    // 省略了 Setter 方法`\n`    public String toString() {`\n`        return \"Contact\
  \ - Id: \" + id + \", First name: \" + firstName`\n`            + \", Last name:\
  \ \" + lastName + \", Birthday: \" + birthDate;`\n`    }`\n`}`\n\n如清单 16-3 所示，使用了标准的\
  \ JPA 注解。我们还使用了 JodaTime 的 `DateTime` 类来表示 `birthDate` 属性。\n\n接下来进入服务层；清单 16-4 展示了\
  \ `ContactService` 接口，以及我们想要公开的服务。\n\n***清单 16-4.** `ContactService` 接口*\n\n`package\
  \ com.apress.prospring3.ch16.service;`\n\n`import java.util.List;`\n\n`import com.apress.prospring3.ch16.domain.Contact;`\n\
  \n`public interface ContactService {`\n\n`    public List<Contact> findAll();`\n\
  \n`    public List<Contact> findByFirstName(String firstName);`\n\n`    public Contact\
  \ findById(Long id);`\n\n`    public Contact save(Contact contact);`\n\n`    public\
  \ void delete(Contact contact);`\n`}`\n\n这些方法的作用不言自明。由于我们将使用 Spring Data JPA 的仓库支持，因此我们将实现\
  \ `ContactRepository` 接口，如清单 16-5 所示。\n\n***清单 16-5.** `ContactRepository` 接口*\n\
  \n`package com.apress.prospring3.ch16.repository;`\n\n`import java.util.List;`\n\
  \n`import org.springframework.data.repository.CrudRepository;`\n\n`import com.apress.prospring3.ch16.domain.Contact;`\n\
  \n`public interface ContactRepository extends CrudRepository<Contact, Long> {`\n\
  \n`    public List<Contact> findByFirstName(String firstName);`\n`}`\n\n如第 10 章所述，通过扩展\
  \ `CrudRepository<T,ID extends Serializable>` 接口，对于 `ContactService` 中的方法，我们只需要显式声明\
  \ `findByFirstName()` 方法。\n\n清单 16-6 展示了 `ContactService` 接口的实现类。\n\n***清单 16-6.**\
  \ `ContactServiceImpl` 类*\n\n`package com.apress.prospring3.ch16.service.jpa;`\n\
  \n`import java.util.List;`\n\n`import org.springframework.beans.factory.annotation.Autowired;`\n\
  `import org.springframework.stereotype.Repository;`\n`import org.springframework.stereotype.Service;`\n\
  `import org.springframework.transaction.annotation.Transactional;`\n\n`import com.apress.prospring3.ch16.domain.Contact;`\n\
  `import com.apress.prospring3.ch16.repository.ContactRepository;`\n`import com.apress.prospring3.ch16.service.ContactService;`\n\
  `import com.google.common.collect.Lists;`\n\n`@Service(\"contactService\")`\n`@Repository`\n\
  `@Transactional`\n`public class ContactServiceImpl implements ContactService {`\n\
  \n`    @Autowired`\n`    private ContactRepository contactRepository;`\n\n`    @Transactional(readOnly=true)`\n\
  `    public List<Contact> findAll() {`\n`        return Lists.newArrayList(contactRepository.findAll());`\n\
  `    }`\n\n`    @Transactional(readOnly=true)`\n`    public List<Contact> findByFirstName(String\
  \ firstName) {`\n`        return contactRepository.findByFirstName(firstName);`\n\
  `    }`\n\n`    @Transactional(readOnly=true)`\n`    public Contact findById(Long\
  \ id) {`\n`        return contactRepository.findOne(id);`\n`    }`\n\n`    public\
  \ Contact save(Contact contact) {`\n`        return contactRepository.save(contact);`\n\
  `    }`\n\n`    public void delete(Contact contact) {`\n`        contactRepository.delete(contact);`\n\
  `    }`\n`}`\n\n如果您对理解清单 16-6 有任何疑问，请参阅第 10 章，其中详细描述了如何使用 JPA 作为持久化提供者来实现服务层。实现基本完成，下一步是在\
  \ Web 项目的 Spring `ApplicationContext` 中配置该服务，这将在下一节中讨论。\n\n\n\n##### 配置 ContactService\n\
  \n为了在 Spring MVC 项目中搭建服务层，我们在 `/src/main/resource` 文件夹下创建了一个名为 `datasource-tx-jpa.xml`\
  \ 的独立配置文件。清单 16-7 展示了该配置文件。\n\n***清单 16-7.** `datasource-tx-jpa.xml` 配置文件*\n\n`<?xml\
  \ version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n\
  `        http://www.springframework.org/schema/context`\n`        http://www.springframework.org/schema/context/spring-context-3.1.xsd`\n\
  `        http://www.springframework.org/schema/jdbc`\n`        http://www.springframework.org/schema/jdbc/spring-jdbc-3.1.xsd`\n\
  `        http://www.springframework.org/schema/data/jpa`\n`        http://www.springframework.org/schema/data/jpa/spring-jpa-1.0.xsd`\n\
  `        http://www.springframework.org/schema/tx`\n`        http://www.springframework.org/schema/tx/spring-tx-3.1.xsd\"\
