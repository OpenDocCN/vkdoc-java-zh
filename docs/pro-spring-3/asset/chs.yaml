  \ 17-13 中，与先前版本的不同之处已用粗体标出。首先，添加了 `p` 命名空间，并修订了资源定义以反映表 17-3 中展示的新文件夹结构。`<resources>`\
  \ 标签属于 `mvc` 命名空间，是在 Spring 3 中引入的。此标签定义了静态资源文件的位置，使 Spring MVC 能够高效地处理这些文件夹内的文件。在该标签内，`location`\
  \ 属性定义了静态资源的文件夹。第一个路径 `/` 表示 Web 应用程序的根文件夹，即 `/src/main/webapp`；第二个路径 `classpath:/META-INF/web-resources/`\
  \ 表示所包含库的资源文件。如果您包含了 Spring JavaScript 模块（该模块在 `/META-INF/web-resources` 文件夹中包含支持资源文件），这将非常有用。`mapping`\
  \ 属性定义了用于映射到静态资源的 URL；例如，对于 URL [`http://localhost:8080/ch17/resources/styles/standard.css`](http://localhost:8080/ch17/resources/styles/standard.css)，Spring\
  \ MVC 将从文件夹 `/src/main/webapp/styles` 中检索文件 `standard.css`。`<default-servlet-handler/>`\
  \ 标签启用了将 `DispatcherServlet` 映射到 Web 应用程序根上下文 URL 的功能，同时仍允许静态资源请求由容器的默认 servlet\
  \ 处理。\n\n其次，定义了一个类为 `LocaleChangeInterceptor` 的 Spring MVC 拦截器，它会拦截所有发往 `DispatcherServlet`\
  \ 的请求。该拦截器支持通过一个可配置的请求参数进行区域设置切换。从拦截器配置中，定义了一个名为 `lang` 的 URL 参数，用于更改应用程序的区域设置。\n\
  \n然后，定义了一个类为 `ReloadableResourceBundleMessageSource` 的 bean。如第 5 章所述，`ReloadableResourceBundleMessageSource`\
  \ 类实现了 `MessageSource` 接口，该接口从定义的文件（在本例中，是 `/WEB-INF/i18n` 文件夹中的 `messages*.properties`\
  \ 和 `application*.properties` 文件）加载消息，以支持国际化（i18n）。请注意属性 `fallbackToSystemLocale`。此属性指示\
  \ Spring MVC，当未找到客户端区域设置的特殊资源包时，是否回退到应用程序运行所在系统的区域设置。\n\n最后，定义了一个类为 `CookieLocaleResolver`\
  \ 的 bean。此类支持从用户浏览器的 cookie 中存储和检索区域设置。\n\n#### 修改联系人列表视图以支持国际化\n\n现在我们可以修改 JSPX\
  \ 页面以显示国际化消息。清单 17-14 展示了修订后的联系人列表视图（`list.jspx`）。\n\n***清单 17-14.** 为支持国际化而修订的联系人列表视图*\n\
