  \ parameterType=\"long\"  `\n`        resultMap=\"contactTelDetailResultMap\">`\n\
  `        SELECT`\n`        ID,`\n`        TEL_TYPE,`\n`        TEL_NUMBER`\n`        FROM\
  \ CONTACT_TEL_DETAIL WHERE CONTACT_ID = #{contactId}`\n`    </select>`\n\n`    <update\
