  \ org.hibernate.transaction.synchronization.HibernateSynchronizationImpl@45c81ac0>`\n\
  `INFO [atomikos] - <rollback() 已完成事务 192.168.11.8.tm0000100002>`\n`线程 \"main\" 中出现异常\
  \ org.springframework.orm.jpa.JpaSystemException: 嵌套异常为 javax.persistence.PersistenceException`\n\
  `...`\n`由以下原因引起: javax.persistence.PersistenceException`\n\n如前面的输出所示，第一个联系人被持久化了（注意\
  \ `insert` 语句）。然而，当保存到第二个数据源时，由于抛出了异常，Atomikos 将回滚整个事务。你可以查看模式 `prospring3_ch13a`\
  \ 来确认新的联系人没有被保存。\n\n#### 关于使用 JTA 事务管理器的注意事项\n\n是否使用 JTA 进行全局事务管理是一个激烈争论的话题。例如，Spring\
  \ 开发团队通常不推荐使用 JTA 进行全局事务，SpringSource 的 David Syer 博士发表了一篇文章，描述了实现分布式事务的七种方法，其中四种不使用\
  \ JTA（[`www.javaworld.com/javaworld/jw-01-2009/jw-01-spring-transactions.html`](http://www.javaworld.com/javaworld/jw-01-2009/jw-01-spring-transactions.html)）。\n\
  \n作为一般原则，当你的应用程序部署到功能完备的 JEE 应用服务器时，没有理由不使用 JTA，因为主流 JEE 应用服务器的所有供应商都针对其平台优化了 JTA\
  \ 实现。这是你付费购买的主要功能之一。\n\n对于独立部署或 Web 容器部署，让应用程序需求驱动你的决策，并尽早执行负载测试，以验证使用 JTA 不会影响性能。\n\
  \n一个好消息是，Spring 在大多数主流 Web 和 JEE 容器中都能与本地事务和全局事务无缝协作，因此当你在不同的事务管理策略之间切换时，通常不需要修改代码。\n\
  \n如果你决定在应用程序中使用 JTA，请确保使用 Spring 的 `JtaTransactionManager`。Spring 团队还有一篇关于使用 Spring\
  \ 和 JTA 的优秀文章（[`http://blog.springsource.org/2011/08/15/configuring-spring-and-jta-without-full-java-ee`](http://blog.springsource.org/2011/08/15/configuring-spring-and-jta-without-full-java-ee)）。\n\
  \n\n\n### 摘要\n\n事务管理是确保几乎所有类型应用程序中数据完整性的关键部分。在本章中，我们讨论了如何使用 Spring 来管理事务，且几乎不影响你的源代码。你还学习了如何使用本地事务和全局事务。\n\
  \n我们提供了多种事务实现的示例，包括使用 XML 配置和注解的声明式方式，以及编程式方法。\n\n本地事务在 JEE 应用服务器内部/外部均受支持，并且只需简单配置即可在\
  \ Spring 中启用本地事务支持。然而，设置全局事务环境涉及更多工作，并且很大程度上取决于你的应用程序需要与哪个 JTA 提供程序及相应的后端资源进行交互。\n\
  \n## 第 14 章\n\n## 使用类型转换与格式化的验证\n\n在企业级应用中，验证至关重要。验证的目的是确保正在处理的数据满足所有预定义的业务需求，并确保数据在其他应用层中的完整性和可用性。\n\
  \n在应用开发中，数据验证总是与转换和格式化一同被提及。原因在于，数据源的格式很可能与应用服务器中使用的格式不同。例如，在 Web 应用中，用户在 Web 浏览器前端输入信息。当用户保存数据时，数据（在本地验证完成后）被发送到服务器。在服务器端，将执行数据绑定过程，在此过程中，来自\
  \ HTTP 请求的数据将被提取、转换，并根据为每个属性定义的格式化规则（例如，日期格式模式为`yyyy-MM-dd`）绑定到相应的领域对象（例如，用户在 HTML\
  \ 表单中输入的联系信息将被绑定到服务器端的`Contact`对象）。当数据绑定完成时，验证规则被应用于领域对象以检查是否存在任何约束违规。如果一切顺利，数据将被持久化，并向用户显示成功消息。否则，将填充并向用户显示验证错误消息。\n\
  \n在本章的第一部分，你将学习 Spring 如何为类型转换、字段格式化和验证提供复杂支持。具体来说，本章将涵盖以下主题：\n\n*   *Spring 类型转换系统和格式化器服务提供者接口（SPI）*：我们将讨论\
  \ Spring 3 中引入的新通用类型转换系统和格式化器 SPI。我们将展示如何使用这些新服务来替代之前的`PropertyEditor`支持，以及它们如何在任何\
  \ Java 类型之间进行转换。\n*   *Spring 中的验证*：我们将讨论 Spring 如何支持领域对象验证。首先，我们将简要介绍 Spring 自己的`Validator`接口。然后，我们将重点介绍自\
  \ Spring 3 以来提供的 JSR-303 Bean 验证支持。\n\n### 在 STS 中为示例创建项目\n\n让我们为本章的示例创建项目。在 STS\
  \ 中，创建一个新的 Spring 模板项目，并选择 Simple Spring Utility Project。\n\n此外，在创建项目时，添加其他必需的依赖项，如表\
  \ 14-1 所示。同时，确认项目使用的是 Spring 3.1 和 JDK 6。\n\n![images](img/t1401.jpg)\n\n### Spring\
  \ 类型转换系统\n\n在 Spring 3 中，引入了一个新的类型转换系统，为在 Spring 驱动的应用程序中的任何 Java 类型之间进行转换提供了强大的方式。在本节中，我们将讨论这个新服务如何执行之前`PropertyEditor`支持所提供的相同功能，以及它如何支持任何\
  \ Java 类型之间的转换。我们还将演示如何使用 Converter SPI 实现自定义类型转换器。\n\n#### 使用 PropertyEditors 从字符串进行转换\n\
  \n在第 5 章中，我们介绍了 Spring 如何通过支持`PropertyEditor`来处理从属性文件中的`String`到 POJO 属性的转换。让我们在这里快速回顾一下，然后我们将介绍\
  \ Spring 的 Converter SPI（自 3.0 起可用）如何提供更强大的替代方案。\n\n考虑一个具有几个属性的`Contact`类，如清单 14-1\
  \ 所示。\n\n***清单 14-1.** `Contact`类*\n\n`package com.apress.prospring3.ch14.domain;`\n\
  \n`import java.net.URL;`\n\n`import org.joda.time.DateTime;`\n\n`public class Contact\
  \ {`\n\n`    private String firstName;`\n\n`    private String lastName;`\n\n`    private\
  \ DateTime birthDate;`\n\n`    private URL personalSite;`\n\n`    // Getter/setter\
  \ methods omitted`\n\n`    public String toString() {`\n`        return \"First\
  \ name: \" + getFirstName()`\n`            + \" - Last name: \" + getLastName()`\n\
  `            + \" - Birth date: \" + getBirthDate()`\n`            + \" - Personal\
  \ site: \" + getPersonalSite();`\n`    }`\n`}`\n\n如清单 14-1 所示，对于出生日期属性，我们使用了 JodaTime\
  \ 的`DateTime`类。此外，还有一个 URL 类型的字段，用于指示联系人的个人网站（如果适用）。\n\n现在假设我们想要在 Spring 的`ApplicationContext`中构造`Contact`对象，其值存储在\
  \ Spring 的配置文件或属性文件中。清单 14-2 显示了 Spring XML 配置文件（`prop-editor-app-context.xml`）。\n\
  \n***清单 14-2.** 属性编辑器的 Spring 配置*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n\
  `<beans`\n\n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n\
  `        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n`        http://www.springframework.org/schema/context`\n\
  `        http://www.springframework.org/schema/context/spring-context-3.1.xsd\"\
  >`\n\n`    <context:annotation-config/>`\n\n`    <context:property-placeholder`\n\
  `        location=\"classpath:application.properties\"/>`\n\n`    <bean id=\"dateTimeEditor\"\
  `\n`        class=\"com.apress.prospring3.ch14.pe.editor.DateTimeEditor\">`\n`        <constructor-arg\
  \ value=\"${date.format.pattern}\"/>`\n`    </bean>  `\n\n`    <bean class=\"org.springframework.beans.factory.config.CustomEditorConfigurer\"\
  >`\n`        <property name=\"customEditors\">`\n`            <map>`\n`                <entry\
  \ key=\"org.joda.time.DateTime\">`\n`                    <ref local=\"dateTimeEditor\"\
  \ />`\n`                </entry>`\n`            </map>`\n`        </property>`\n\
  `    </bean>`\n\n`    <bean id=\"clarence\" class=\"com.apress.prospring3.ch14.domain.Contact\"\
  `\n`        p:firstName=\"Clarence\"`\n`        p:lastName=\"Ho\"`\n`        p:birthDate=\"\
  1970-12-31\"`\n`        p:personalSite=\"http://www.clarence.com\"`\n`    />`\n\n\
  `    <bean id=\"myContact\" class=\"com.apress.prospring3.ch14.domain.Contact\"\
  `\n`        p:firstName=\"${myContact.firstName}\"`\n`        p:lastName=\"${myContact.lastName}\"\
  `\n`        p:birthDate=\"${myContact.birthDate}\"`\n`        p:personalSite=\"\
  ${myContact.personalSite}\"`\n`    />`\n\n`</beans>`\n\n如清单 14-2 所示，我们构造了两个不同的`Contact`类\
  \ Bean。`clarence` Bean 使用配置文件中提供的值构造，而`myContact` Bean 的属性则外部化到属性文件中。此外，定义了一个自定义编辑器，用于从`String`转换为\
  \ JodaTime 的`DateTime`类型，并且日期时间格式模式也外部化在属性文件中。清单 14-3 显示了属性文件（`application.properties`）。\n\
  \n***清单 14-3.** `application.properties`文件*\n\n`date.format.pattern=yyyy-MM-dd`\n\
  \n`myContact.firstName=Scott`\n`myContact.lastName=Tiger`\n`myContact.birthDate=1984-6-30`\n\
  `myContact.personalSite=http://www.somedomain.com`\n\n\n\n清单 14-4 展示了用于将`String`值转换为\
  \ JodaTime `DateTime`类型的自定义编辑器。\n\n***清单 14-4.** JodaTime `DateTime`的自定义编辑器*\n\n\
  `package com.apress.prospring3.ch14.pe.editor;`\n\n`import java.beans.PropertyEditorSupport;`\n\
  \n`import org.joda.time.DateTime;`\n`import org.joda.time.format.DateTimeFormat;`\n\
  `import org.joda.time.format.DateTimeFormatter;`\n\n`public class DateTimeEditor\
  \ extends PropertyEditorSupport {`\n\n`    private DateTimeFormatter dateTimeFormatter;`\n\
  \n`    public DateTimeEditor(String dateFormatPattern) {`\n`        dateTimeFormatter\
  \ = DateTimeFormat.forPattern(dateFormatPattern);`\n`    }`\n\n`    public void\
  \ setAsText(String text) throws IllegalArgumentException {`\n`        setValue(DateTime.parse(text,\
  \ dateTimeFormatter));`\n`    }`\n`}`\n\n清单 14-4 不言自明。我们来测试一下。清单 14-5 展示了测试程序。\n\
  \n***清单 14-5.** 测试属性编辑器*\n\n`package com.apress.prospring3.ch14.pe;`\n\n`import\
  \ org.springframework.context.support.GenericXmlApplicationContext;`\n\n`import\
  \ com.apress.prospring3.ch14.domain.Contact;`\n\n`public class PropEditorExample\
  \ {`\n\n`    public static void main(String[] args) {`\n\n`        GenericXmlApplicationContext\
  \ ctx = new GenericXmlApplicationContext();`\n`        ctx.load(\"classpath:prop-editor-app-context.xml\"\
  );`\n`        ctx.refresh();`\n\n`        Contact clarence = ctx.getBean(\"clarence\"\
  , Contact.class);`\n`        System.out.println(\"Clarence info: \" + clarence);`\n\
  \n`        Contact myContact = ctx.getBean(\"myContact\", Contact.class);`\n`        System.out.println(\"\
  My contact info: \" + myContact);`\n`    }`\n`}`\n\n如清单 14-5 所示，从`ApplicationContext`中检索出两个不同的`Contact`\
  \ Bean 并打印出来。运行该程序将产生以下输出：\n\n`Clarence info: First name: Clarence - Last name:\
  \ Ho - Birth date: 1970-12-`\n`31T00:00:00.000+08:00 – Personal site: http://www.clarence.com`\n\
  `My contact info: First name: Scott - Last name: Tiger - Birth date: 1984-06-`\n\
  `30T00:00:00.000+08:00 – Personal site: http://www.somedomain.com`\n\n如输出所示，属性已被转换并应用到`Contact`\
  \ Bean 中。图 14-1 展示了`PropertyEditor`完成转换的逻辑视图。\n\n![images](img/9781430241072_Fig14-01.jpg)\n\
  \n***图 14-1.** Spring 对`PropertyEditor`的支持*\n\n#### 介绍 Spring 3 类型转换\n\n在 Spring\
  \ 3.0 中，引入了一个通用的类型转换系统，它位于`org.springframework.core.convert`包下。除了提供`PropertyEditor`支持的替代方案外，类型转换系统还可以配置为在任何\
  \ Java 类型和 POJO 之间进行转换（而`PropertyEditor`专注于将属性文件中的`String`表示形式转换为 Java 类型）。\n\n\
  ##### 实现自定义转换器\n\n为了了解类型转换系统的实际应用，让我们重新审视前面的示例，并使用相同的`Contact`类。假设这次我们想使用类型转换系统将`String`格式的日期转换为`Contact`的`birthDate`属性，该属性是\
  \ JodaTime 的`DateTime`类型。为了支持转换，我们不创建自定义的`PropertyEditor`，而是通过实现`org.springframework.core.convert.converter.Converter<S,T>`接口来创建一个自定义转换器。清单\
  \ 14-6 展示了自定义转换器。\n\n***清单 14-6.** 自定义`DateTime`转换器*\n\n`package com.apress.prospring3.ch14.converter;`\n\
  \n`import javax.annotation.PostConstruct;`\n\n`import org.joda.time.DateTime;`\n\
  `import org.joda.time.format.DateTimeFormat;`\n`import org.joda.time.format.DateTimeFormatter;`\n\
  `import org.springframework.beans.factory.annotation.Autowired;`\n`import org.springframework.core.convert.converter.Converter;`\n\
  \n`public class StringToDateTimeConverter`\n`    implements Converter<String, DateTime>\
  \ {`\n\n`    private static final String DEFAULT_DATE_PATTERN = \"yyyy-MM-dd\";`\n\
  \n`    private DateTimeFormatter dateFormat;`\n\n`    private String datePattern\
  \ = DEFAULT_DATE_PATTERN;`\n\n`    public String getDatePattern() {`\n`        return\
  \ datePattern;`\n`    }`\n\n`    @Autowired(required=false)`\n`    public void setDatePattern(String\
  \ datePattern) {`\n`        this.datePattern = datePattern;`\n`    }`\n\n`    @PostConstruct`\n\
  `    public void init() {`\n`        dateFormat = DateTimeFormat.forPattern(datePattern);`\n\
  `    }`\n\n`    public DateTime convert(String dateString) {`\n`        return dateFormat.parseDateTime(dateString);`\n\
  `    }`\n`}`\n\n如清单 14-6 所示，我们实现了`Converter<String, DateTime>`接口，这意味着该转换器负责将`String`（源类型`S`）转换为`DateTime`类型（目标类型`T`）。日期时间模式的注入是可选的，通过使用`@Autowired(required=false)`注解实现。如果未注入，则使用默认模式`yyyy-MM-dd`。然后，在初始化方法（使用`@PostConstruct`注解的`init()`方法）中，构造一个\
  \ JodaTime 的`DateTimeFormat`类实例，它将根据指定的模式执行转换。最后，实现`convert()`方法以提供转换逻辑。\n\n\n\n\
  ##### 配置 ConversionService\n\n为了使用转换服务替代 `PropertyEditor`，我们需要在 Spring 的 `ApplicationContext`\
  \ 中配置一个 `org.springframework.core.convert.ConversionService` 接口的实例。清单 14-7 展示了配置文件\
  \ (`conv-service-app-context.xml`)。\n\n***清单 14-7.** `ConversionService` 的配置*\n\n\
  `<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n\
  `        http://www.springframework.org/schema/context`\n`        http://www.springframework.org/schema/context/spring-context-3.1.xsd\"\
  >`\n\n`    <context:annotation-config/>`\n\n`    <bean id=\"conversionService\"\
  \ class=\"org.springframework.context.support.ConversionServiceFactoryBean\">`\n\
  `        <property name=\"converters\">`\n`            <list>`\n`                <bean\
  \ class=\"com.apress.prospring3.ch14.converter.StringToDateTimeConverter\"/>`\n\
  `            </list>`\n`        </property>`\n`    </bean>`\n\n`    <bean id=\"\
  clarence\" class=\"com.apress.prospring3.ch14.domain.Contact\"`\n`        p:firstName=\"\
  Clarence\"`\n`        p:lastName=\"Ho\"`\n`        p:birthDate=\"1978-08-09\"`\n\
  `        p:personalSite=\"http://www.clarence.com\"`\n`    />`\n`</beans>`\n\n如清单\
  \ 14-7 所示，我们通过声明一个类为 `ConversionServiceFactoryBean` 的 `conversionService` bean，来指示\
  \ Spring 使用类型转换系统。如果没有定义转换服务 bean，Spring 将使用基于 `PropertyEditor` 的系统。\n\n默认情况下，类型转换服务支持常见类型之间的转换，包括字符串、数字、枚举、集合、映射等。此外，也支持在基于\
  \ `PropertyEditor` 的系统中从 `String` 到 Java 类型的转换。\n\n对于 `conversionService` bean，我们配置了一个自定义转换器，用于将\
  \ `String` 转换为 `DateTime`。清单 14-8 展示了一个测试程序。\n\n***清单 14-8.** 测试 `ConversionService`*\n\
  \n`package com.apress.prospring3.ch14.convserv;`\n\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  \n`import com.apress.prospring3.ch14.domain.Contact;`\n\n`public class ConvServExample\
  \ {`\n\n`    public static void main(String[] args) {`\n\n`        GenericXmlApplicationContext\
  \ ctx = new GenericXmlApplicationContext();`\n`        ctx.load(\"classpath:conv-service-app-context.xml\"\
  );`\n`        ctx.refresh();`\n\n`        Contact clarence = ctx.getBean(\"clarence\"\
  , Contact.class);`\n\n`        System.out.println(\"Contact info: \" + clarence);`\n\
  \n`    }`\n`}`\n\n运行测试程序会产生以下输出：\n\n`Contact info: First name: Clarence - Last name:\
  \ Ho - Birth date: 1978-08-09T00:00:00.000+08:00`\n`– Personal site: http://www.clarence.com`\n\
  \n如你所见，`clarence` bean 的属性转换结果与我们使用 `PropertyEditor` 时相同。\n\n##### 在任意类型之间转换\n\n\
  类型转换系统的真正优势在于能够在任意类型之间进行转换。为了演示其实际应用，假设我们有另一个类，名为 `AnotherContact`，它与 `Contact`\
  \ 类相同。清单 14-9 展示了这个类。\n\n***清单 14-9.** `AnotherContact` 类*\n\n`package com.apress.prospring3.ch14.domain;`\n\
  \n`import java.net.URL;`\n\n`import org.joda.time.DateTime;`\n\n`public class AnotherContact\
  \ {`\n\n`    private String firstName;`\n\n`    private String lastName;`\n\n`    private\
  \ DateTime birthDate;`\n\n`    private URL personalSite;`\n\n`    // 其他代码已省略`\n\
  `}`\n\n我们希望能够将 `Contact` 类的任何实例转换为 `AnotherContact` 类，但 `Contact` 的 `firstName`\
  \ 和 `lastName` 将分别成为 `AnotherContact` 的 `lastName` 和 `firstName`。让我们实现另一个自定义转换器来执行此转换。清单\
  \ 14-10 展示了这个自定义转换器。\n\n***清单 14-10.** `AnotherContact` 类*\n\n`package com.apress.prospring3.ch14.converter;`\n\
  \n`import org.springframework.core.convert.converter.Converter;`\n\n`import com.apress.prospring3.ch14.domain.AnotherContact;`\n\
  `import com.apress.prospring3.ch14.domain.Contact;`\n\n`public class ContactToAnotherContactConverter`\n\
  `    implements Converter<Contact, AnotherContact> {`\n\n`    public AnotherContact\
  \ convert(Contact contact) {`\n`        AnotherContact anotherContact = new AnotherContact();`\n\
  `        anotherContact.setFirstName(contact.getLastName());`\n`        anotherContact.setLastName(contact.getFirstName());`\n\
  `        anotherContact.setBirthDate(contact.getBirthDate());`\n`        anotherContact.setPersonalSite(contact.getPersonalSite());`\n\
  \n`        return anotherContact;`\n`    }`\n`}`\n\n这个类很简单；只是在 `Contact` 和 `AnotherContact`\
  \ 类之间交换了 `firstName` 和 `lastName` 属性。为了将自定义转换器注册到 `ApplicationContext`，请将文件 (`conv-service-app-context.xml`)\
  \ 中的 `conversionService` bean 定义替换为清单 14-11 中的代码片段。\n\n***清单 14-11.** 将转换器添加到转换服务*\n\
  \n`    <bean id=\"conversionService\"`\n`class=\"org.springframework.context.support.ConversionServiceFactoryBean\"\
  >`\n`        <property name=\"converters\">`\n`            <list>`\n`                <bean\
  \ class=\"com.apress.prospring3.ch14.converter.StringToDateTimeConverter\"/>`\n\
  `                <bean`\n`class=\"com.apress.prospring3.ch14.converter.ContactToAnotherContactConverter\"\
  />`\n`            </list>`\n`        </property>`\n`    </bean>`\n\n`converters`\
  \ 属性中 bean 的顺序并不重要。\n\n为了测试转换，我们使用与前一个示例相同的测试程序，即 `ConvServExample` 类。清单 14-12 展示了修改后的\
  \ `main()` 方法。\n\n***清单 14-12.** 测试转换服务*\n\n`package com.apress.prospring3.ch14.convserv;`\n\
  \n`// 导入语句已省略`\n`public class ConvServExample {`\n\n`    public static void main(String[]\
  \ args) {`\n\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:conv-service-app-context.xml\");`\n`        ctx.refresh();`\n\
  \n`        Contact clarence = ctx.getBean(\"clarence\", Contact.class);`\n\n`        System.out.println(\"\
  Contact info: \" + clarence);`\n\n**`        ConversionService conversionService\
  \ = ctx.getBean(ConversionService.class);`**\n\n`        // 从 Contact 转换为 AnotherContact`\n\
  `        AnotherContact anotherContact =`\n`            conversionService.convert(clarence,\
  \ AnotherContact.class);`\n`        System.out.println(\"Another contact info: \"\
  \ + anotherContact);`\n\n\n\n`        // 从字符串转换为数组`\n`        String[] stringArray\
  \ = conversionService.convert(`\n`            \"a,b,c\", String[].class);`\n`  \
  \      System.out.println(\"字符串数组: \" + stringArray[0] +`\n`            stringArray[1]\
  \ + stringArray[2]);`\n\n`        // 从列表转换为集合`\n`        List<String> listString\
  \ = new ArrayList<String>();`\n`        listString.add(\"a\");`\n`        listString.add(\"\
  b\");`\n`        listString.add(\"c\");`\n`        Set<String> setString = conversionService.convert(`\n\
  `            listString, HashSet.class);`\n`        for (String string: setString)`\n\
  `        System.out.println(\"集合: \" + string);`\n`    }`\n`}`\n\n在清单 14-12 中，请查看粗体行，该行从\
  \ `ApplicationContext` 获取了 `ConversionService` 接口的句柄。由于我们已经在 `ApplicationContext`\
  \ 中使用自定义转换器注册了 `ConversionService`，因此我们可以使用它来转换 `Contact` 对象，以及在转换服务已支持的其他类型之间进行转换。如清单所示，为了演示目的，还添加了从\
  \ `String`（以逗号分隔）转换为 `Array` 以及从 `List` 转换为 `Set` 的示例。\n\n运行程序将产生以下输出：\n\n`联系人信息：名字：Clarence\
  \ - 姓氏：Ho - 出生日期：1978-08-09T00:00:00.000+08:00`\n`– 个人网站：http://www.clarence.com`\n\
  `另一个联系人信息：名字：Ho - 姓氏：Clarence - 出生日期：1978-08-`\n`09T00:00:00.000+08:00 – 个人网站：http://www.clarence.com`\n\
  `字符串数组：abc`\n`集合：b`\n`集合：c`\n`集合：a`\n\n如输出所示，您将看到 `Contact` 和 `AnotherContact` 被正确转换，同时\
  \ `String` 到 `Array` 以及 `List` 到 `Set` 的转换也正确完成。借助 Spring 的类型转换服务，您可以轻松创建自定义转换器，并在应用程序的任何层执行转换。一个可能的用例是，您有两个不同的系统，它们包含需要更新的相同联系人信息，但数据库结构不同（例如，系统\
  \ A 中的姓氏在系统 B 中表示名字，等等）。您可以在将对象持久化到各个系统之前，使用类型转换系统来转换这些对象。\n\n从 Spring 3.0 开始，Spring\
  \ MVC 大量使用了转换服务（以及我们将在下一节讨论的格式化程序 SPI）。在 Web 应用程序上下文配置中，声明标签 `<mvc:annotation-driven/>`\
  \ 将自动注册所有默认转换器（例如，`StringToArrayConverter`、`StringToBooleanConverter` 和 `StringToLocaleConverter`，它们都位于\
  \ `org.springframework.core.convert.support` 包下）和格式化程序（例如，`CurrencyFormatter`、`DateFormatter`\
  \ 和 `NumberFormatter`，它们都位于 `org.springframework.format` 包下的各个子包中）。更多内容将在第 17 章和第\
  \ 18 章中讨论 Spring Web 应用程序开发时介绍。\n\n### Spring 3 中的字段格式化\n\n除了类型转换系统之外，Spring 为开发者带来的另一个重要特性是\
  \ Formatter SPI。正如您所料，这个 SPI 可以帮助配置字段格式化方面的问题。\n\n在 Formatter SPI 中，实现格式化程序的主要接口是\
  \ `org.springframework.format.Formatter<T>` 接口。Spring 提供了一些常用类型的实现，包括 `CurrencyFormatter`、`DateFormatter`、`NumberFormatter`\
  \ 和 `PercentFormatter`。\n\n#### 实现自定义格式化程序\n\n实现自定义格式化程序也很容易。我们将使用相同的 `Contact`\
  \ 类，并实现一个自定义格式化程序，用于将 `birthDate` 属性的 `DateTime` 类型与 `String` 相互转换。\n\n然而，这次我们将采用不同的方法；我们将扩展\
  \ Spring 的 `org.springframework.format.support.FormattingConversionServiceFactoryBean`\
  \ 类，并提供我们自己的自定义格式化程序。`FormattingConversionServiceFactoryBean` 类是一个工厂类，它提供了对底层 `FormattingConversionService`\
  \ 类的便捷访问，该类既支持类型转换系统，也支持根据为每个字段类型定义的格式化规则进行字段格式化。\n\n清单 14-13 展示了一个自定义类，它扩展了 `FormattingConversionServiceFactoryBean`\
  \ 类，并定义了一个用于格式化 JodaTime 的 `DateTime` 类型的自定义格式化程序。\n\n***清单 14-13.** `ApplicationConversionServiceFactoryBean`\
  \ 类*\n\n`package com.apress.prospring3.ch14.convserv.factory;`\n\n`import java.text.ParseException;`\n\
  `import java.util.HashSet;`\n`import java.util.Locale;`\n`import java.util.Set;`\n\
  \n`import javax.annotation.PostConstruct;`\n\n`import org.joda.time.DateTime;`\n\
  `import org.joda.time.format.DateTimeFormat;`\n`import org.joda.time.format.DateTimeFormatter;`\n\
  `import org.slf4j.Logger;`\n`import org.slf4j.LoggerFactory;`\n`import org.springframework.beans.factory.annotation.Autowired;`\n\
  `import org.springframework.format.Formatter;`\n`import org.springframework.format.support.FormattingConversionServiceFactoryBean;`\n\
  \n`public class ApplicationConversionServiceFactoryBean extends`\n`    FormattingConversionServiceFactoryBean\
  \ {`\n\n`    final Logger logger =`\n`        LoggerFactory.getLogger(ApplicationConversionServiceFactoryBean.class);`\n\
  \n`    private static final String DEFAULT_DATE_PATTERN = \"yyyy-MM-dd\";`\n\n`\
  \    private DateTimeFormatter dateFormat;`\n\n`    private String datePattern =\
  \ DEFAULT_DATE_PATTERN;`\n\n`    private Set<Formatter<?>> formatters = new HashSet<Formatter<?>>();`\n\
  \n`    public String getDatePattern() {`\n`        return datePattern;`\n`    }`\n\
  \n`    @Autowired(required=false)`\n`    public void setDatePattern(String datePattern)\
  \ {`\n`        this.datePattern = datePattern;`\n`    }`\n\n`    @PostConstruct`\n\
  `    public void init() {`\n`        dateFormat = DateTimeFormat.forPattern(datePattern);`\n\
  `        formatters.add(getDateTimeFormatter());`\n`        setFormatters(formatters);`\n\
  `    }`\n\n**`    public Formatter<DateTime> getDateTimeFormatter() {`**\n**`  \
  \      return new Formatter<DateTime>() {`**\n**`            public DateTime parse(String\
  \ dateTimeString, Locale locale) throws ParseException {`**\n**`               \
  \ logger.info(\"解析日期字符串: \" + dateTimeString);`**\n**`                return dateFormat.parseDateTime(dateTimeString);`**\n\
  **`            }`**\n**`            public String print(DateTime dateTime, Locale\
  \ locale) {`**\n**`                logger.info(\"格式化日期时间: \" + dateTime);`**\n**`\
  \                return dateFormat.print(dateTime);`**\n**`            }`**\n**`\
  \        };`**\n**`    }`**\n`}`\n\n在清单 14-13 中，自定义格式化程序以粗体显示。它实现了 `Formatter<DateTime>`\
  \ 接口，并实现了该接口定义的两个方法。`parse()` 方法将 `String` 格式解析为 `DateTime` 类型（同时传递了区域设置以支持本地化），而\
  \ `print()` 方法用于将 `DateTime` 实例格式化为 `String`。日期模式可以注入到 Bean 中（否则将使用默认值 `yyyy-MM-dd`）。此外，在\
  \ `init()` 方法中，通过调用 `setFormatters()` 方法注册了自定义格式化程序。您可以根据需要添加任意数量的格式化程序。\n\n\n\n\
  #### 配置 ConversionServiceFactoryBean\n\n要在 Spring 的 `ApplicationContext` 中配置 `ApplicationConversionServiceFactoryBean`，我们只需声明一个以该类为提供者的\
  \ bean。清单 14-14 展示了该配置（`conv-format-service-app-context.xml`）。\n\n***清单 14-14.**\
  \ `conv-format-service-app-context.xml` 文件*\n\n`<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n\
  `        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n`        http://www.springframework.org/schema/context`\n\
  `        http://www.springframework.org/schema/context/spring-context-3.1.xsd\"\
  >`\n\n`    <context:annotation-config/>`\n\n`    <bean id=\"conversionService\"\
  `\n`class=\"com.apress.prospring3.ch14.convserv.factory.ApplicationConversionServiceFactoryBean\"\
  />`\n\n`    <bean id=\"clarence\" class=\"com.apress.prospring3.ch14.domain.Contact\"\
  `\n`        p:firstName=\"Clarence\"`\n`        p:lastName=\"Ho\"`\n`        p:birthDate=\"\
  1978-08-09\"`\n`        p:personalSite=\"http://www.clarence.com\"`\n`    />`\n\
  `</beans>`\n\n清单 14-15 展示了测试程序。\n\n***清单 14-15.** 测试自定义格式化器*\n\n`package com.apress.prospring3.ch14.convserv;`\n\
  \n`import org.springframework.context.support.GenericXmlApplicationContext;`\n`import\
  \ org.springframework.core.convert.ConversionService;`\n\n`import com.apress.prospring3.ch14.domain.Contact;`\n\
  \n`public class ConvFormatServExample {`\n\n`    public static void main(String[]\
  \ args) {`\n\n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:conv-format-service-app-context.xml\");`\n`        ctx.refresh();`\n\
  \n`        Contact clarence = ctx.getBean(\"clarence\", Contact.class);`\n\n`        System.out.println(\"\
  Contact info: \" + clarence);`\n\n`        ConversionService conversionService =\
  \ ctx.getBean(`\n`            \"conversionService\", ConversionService.class);`\n\
  `        System.out.println(\"Birthdate of contact is : \" +`\n`        conversionService.convert(clarence.getBirthDate(),\
  \ String.class));`\n`    }`\n`}`\n\n运行该程序将产生以下输出：\n\n`INFO [com.apress.prospring3.ch14.convserv.factory.ApplicationConversionServiceFactoryBean]\
  \ –`\n`<Parsing date string: 1978-08-09>`\n`Contact info: First name: Clarence -\
  \ Last name: Ho - Birth date: 1978-08-09T00:00:00.000+08:00`\n`– Personal site:\
  \ http://www.clarence.com`\n`INFO [com.apress.prospring3.ch14.convserv.factory.ApplicationConversionServiceFactoryBean]\
  \ –`\n`<Formatting datetime: 1978-08-09T00:00:00.000+08:00>`\n`Birthdate of contact\
  \ is : 1978-08-09`\n\n在输出中，你可以看到 Spring 使用了我们自定义格式化器的 `parse()` 方法，将 `birthDate`\
  \ 属性的值从 `String` 类型转换为 `DateTime` 类型。当我们调用 `ConversionService.convert()` 方法并传入 `birthDate`\
  \ 属性时，Spring 会调用 `print()` 方法来格式化输出。\n\n### Spring 中的验证\n\n验证是任何应用程序的关键部分。应用于领域对象的验证规则确保所有业务数据结构良好，并满足所有业务定义。理想情况下，所有验证规则都维护在一个中心位置，并且同一组规则应用于同一类型的数据，无论数据来自何种来源（例如，通过\
  \ Web 应用程序的用户输入、通过 Web 服务来自远程应用程序、来自 JMS 消息、来自文件等）。\n\n谈到验证时，转换和格式化也很重要，因为在数据被验证之前，应根据为每种类型定义的格式化规则将其转换为所需的\
  \ POJO。\n\n例如，用户通过浏览器中的 Web 应用程序输入一些联系信息，然后将数据提交到服务器。在服务器端，如果 Web 应用程序是使用 Spring\
  \ MVC 开发的，Spring 将从 HTTP 请求中提取数据，并根据格式化规则（例如，表示日期的 `String` 将根据格式化规则 `yyyy-MM-dd`\
  \ 转换为 `Date` 字段）执行从 `String` 到所需类型的转换。这个过程称为*数据绑定*。当数据绑定完成且领域对象构建完成后，将对该对象进行验证，任何错误都将返回并显示给用户。如果验证成功，该对象将被持久化到数据库中。\n\
  \n图 14-2 展示了该过程。\n\n![images](img/9781430241072_Fig14-02.jpg)\n\n***图 14-2.** 验证、转换和格式化之间的关系*\n\
  \nSpring 支持两种主要的验证类型。第一种由 Spring 自身提供，可以通过实现 `org.springframework.validation.Validator`\
  \ 接口来创建自定义验证器。另一种是通过 Spring 对 JSR-303（Bean 验证 API）的支持来实现。我们将在接下来的章节中逐一介绍这两种方式。\n\
  \n\n\n#### 使用 Spring Validator 接口\n\n通过 Spring 的 `Validator` 接口，我们可以创建一个实现该接口的类来开发验证逻辑。\n\
  \n让我们看看它是如何工作的。对于之前使用的 `Contact` 类，假设名字（firstName）不能为空。为了根据此规则验证 `Contact` 对象，我们可以创建一个自定义验证器。清单\
  \ 14-16 展示了该验证器类。\n\n***清单 14-16.** `ContactValidator` 类*\n\n`package com.apress.prospring3.ch14.validator;`\n\
  \n`import org.springframework.stereotype.Component;`\n`import org.springframework.validation.Errors;`\n\
  `import org.springframework.validation.ValidationUtils;`\n`import org.springframework.validation.Validator;`\n\
  \n`import com.apress.prospring3.ch14.domain.Contact;`\n\n`@Component(\"contactValidator\"\
  )`\n`public class ContactValidator implements Validator {`\n\n`    public boolean\
  \ supports(Class<?> clazz) {`\n`        return Contact.class.equals(clazz);`\n`    }`\n\
  \n`    public void validate(Object obj, Errors e) {`\n`        ValidationUtils.rejectIfEmpty(e,\
  \ \"firstName\", \"firstName.empty\");`\n`    }`\n`}`\n\n如清单 14-16 所示，验证器类实现了 `Validator`\
  \ 接口并实现了两个方法。`supports()` 方法指示验证器是否支持对传入的类类型进行验证。`validate()` 方法对传入的对象执行验证，结果将存储在\
  \ `org.springframework.validation.Errors` 接口的实例中。在 `validate()` 方法中，我们仅对 `firstName`\
  \ 属性进行检查，并使用便捷的 `ValidationUtils.rejectIfEmpty()` 方法来确保联系人的名字不为空。最后一个参数是错误代码，可用于从资源包中查找验证消息，以显示本地化的错误信息。\n\
  \n清单 14-17 展示了 Spring 配置文件（`spring-validator-app-context.xml`）。\n\n***清单 14-17.**\
  \ Spring Validator 的配置*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\
  \n`    xsi:schemaLocation=\"http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n\
  `        http://www.springframework.org/schema/context`\n`        http://www.springframework.org/schema/context/spring-context-3.1.xsd\"\
  >`\n\n`    <context:annotation-config/>`\n\n`    <context:component-scan base-package=\"\
  com.apress.prospring3.ch14.validator\"/>`\n`</beans>`\n\n清单 14-18 展示了验证器类的测试程序。\n\
  \n***清单 14-18.** 测试 Spring Validator*\n\n`package com.apress.prospring3.ch14.validator;`\n\
  \n`import java.util.List;`\n\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  `import org.springframework.validation.BeanPropertyBindingResult;`\n`import org.springframework.validation.ObjectError;`\n\
  `import org.springframework.validation.ValidationUtils;`\n`import org.springframework.validation.Validator;`\n\
  \n`import com.apress.prospring3.ch14.domain.Contact;`\n\n`public class SpringValidatorSample\
  \ {`\n\n`    public static void main(String[] args) {`\n\n`        GenericXmlApplicationContext\
  \ ctx = new GenericXmlApplicationContext();`\n`        ctx.load(\"classpath:spring-validator-app-context.xml\"\
  );`\n`        ctx.refresh();`\n\n`        Contact contact = new Contact();`\n`        contact.setFirstName(null);`\n\
  `        contact.setLastName(\"Ho\");`\n\n`        Validator contactValidator =\
  \ ctx.getBean(`\n`            \"contactValidator\", Validator.class);`\n\n`        BeanPropertyBindingResult\
  \ result =`\n`            new BeanPropertyBindingResult(contact, \"Clarence\");`\n\
  \n`        ValidationUtils.invokeValidator(contactValidator, contact, result);`\n\
  \n`        List<ObjectError> errors = result.getAllErrors();`\n`        System.out.println(\"\
  No of validation errors: \" + errors.size());`\n\n`        for (ObjectError error:\
  \ errors) {`\n`            System.out.println(error.getCode());`\n`        }`\n\
  `    }`\n`}`\n\n如清单 14-18 所示，构造了一个 `Contact` 对象，其名字（firstName）被设置为 `null`。然后，从 `ApplicationContext`\
  \ 中获取验证器。为了存储验证结果，构造了一个 `BeanPropertyBindingResult` 类的实例。为了执行验证，调用了 `ValidationUtils.invokeValidator()`\
  \ 方法。然后我们检查验证错误。\n\n运行该程序将产生以下输出：\n\n`No of validation errors: 1`\n`firstName.empty`\n\
  \n验证产生了一个错误，并且错误代码被正确显示。\n\n#### 使用 JSR-303 Bean 验证\n\n在 Spring 3 中，引入了对 JSR-303\
  \ Bean 验证 API 的全面支持。Bean 验证 API 在 `javax.validation.constraints` 包下定义了一组以 Java 注解形式（例如\
  \ `@NotNull`）存在的约束，这些注解可以应用于领域对象。此外，还可以使用注解来开发和应用自定义验证器（例如，类级别的验证器）。\n\n使用 Bean\
  \ 验证 API 可以使您免于与特定的验证服务提供者耦合。通过使用 Bean 验证 API，您可以使用标准注解和 API 为领域对象实现验证逻辑，而无需了解底层的验证服务提供者。例如，Hibernate\
  \ Validator（[`http://hibernate.org/subprojects/validator`](http://hibernate.org/subprojects/validator)）是一个流行的符合\
  \ JSR-303 标准的验证服务提供者。如果您在第 10 章中创建了简单的 Spring JPA 实用项目，那么对 Hibernate Validator 的依赖已经为您添加好了。\n\
  \nSpring 为 Bean 验证 API 提供了无缝支持。主要特性包括：支持用于定义验证约束的 JSR-303 标准注解、自定义验证器，以及在 Spring\
  \ 的 `ApplicationContext` 中配置 JSR-303 验证。让我们在以下各节中逐一介绍它们。\n\n\n\n##### 在对象属性上定义验证约束\n\
  \n首先，我们将验证约束应用于领域对象的属性。清单 14-19 展示了一个 `Customer` 类，其中对 `firstName` 和 `customerType`\
  \ 属性应用了验证约束。\n\n***清单 14-19.** `Customer` 类*\n\n`package com.apress.prospring3.ch14.domain;`\n\
  \n`import javax.validation.constraints.NotNull;`\n`import javax.validation.constraints.Size;`\n\
  \n`public class Customer {`\n\n**`    @NotNull`**\n**`    @Size(min=2, max=60)`**\n\
  `    private String firstName;`\n\n`    private String lastName;`\n\n**`    @NotNull`**\n\
  `    private CustomerType customerType;`\n\n`    private Gender gender;`\n\n`    //\
  \ Getter/setter methods omitted`\n\n`    public boolean isIndividualCustomer() {`\n\
  `        return this.customerType.equals(CustomerType.INDIVIDUAL);`\n`    }`\n`}`\n\
  \n在清单 14-19 中，应用的验证约束以粗体显示。对于 `firstName` 属性，应用了两个约束。第一个由 `@NotNull` 注解控制，表示该值不应为\
  \ null。此外，`@Size` 注解控制了 `firstName` 属性的长度。`@NotNull` 约束也应用于 `customerType` 属性。清单\
  \ 14-20 和 14-21 分别展示了 `CustomerType` 和 `Gender` 类。\n\n***清单 14-20.** `CustomerType`\
  \ 类*\n\n`package com.apress.prospring3.ch14.domain;`\n\n`public enum CustomerType\
  \ {`\n\n`    INDIVIDUAL(\"I\"), CORPORATE(\"C\");`\n\n`    private String code;`\n\
  \n`    private CustomerType(String code) {`\n`        this.code = code;`\n`    }`\n\
  \n`    public String toString() {`\n`        return this.code;`\n`    }`\n`}`\n\n\
  ***清单 14-21.** `Gender` 类*\n\n`package com.apress.prospring3.ch14.domain;`\n\n`public\
  \ enum Gender {`\n\n`    MALE(\"M\"), FEMALE(\"F\");`\n\n`    private String code;`\n\
  \n`    private Gender(String code) {`\n`        this.code = code;`\n`    }`\n\n\
  `    public String toString() {`\n`        return this.code;`\n`    }`\n`}`\n\n\
  客户类型表示客户是个人还是公司，而性别应仅适用于个人客户。对于公司，性别应为 `null`。\n\n##### 在 Spring 中配置 Bean 验证支持\n\
  \n为了在 Spring `ApplicationContext` 中配置对 Bean Validation API 的支持，我们在 Spring 的配置中定义了一个\
  \ `org.springframework.validation.beanvalidation.LocalValidatorFactoryBean` 类的实例。清单\
  \ 14-22 展示了该配置（`jsr303-app-context.xml`）。\n\n***清单 14-22.** 在 Spring 中配置 Bean Validation\
  \ API*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"\
  http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n\
  `        http://www.springframework.org/schema/context`\n`        http://www.springframework.org/schema/context/spring-context-3.1.xsd\"\
  >`\n\n`    <context:annotation-config/>`\n\n`    <context:component-scan`\n`        base-package=\"\
  com.apress.prospring3.ch14.jsr303.service\"/>`\n\n`    <bean id=\"validator\"`\n\
  `class=\"org.springframework.validation.beanvalidation.LocalValidatorFactoryBean\"\
  />`\n\n`</beans>`\n\n如清单 14-22 所示，只需声明一个类为 `LocalValidatorFactoryBean` 的 bean。默认情况下，Spring\
  \ 会在类路径中搜索 Hibernate Validator 库。现在，让我们创建一个为 `Customer` 类提供验证服务的服务类。清单 14-23 展示了其内容。\n\
  \n***清单 14-23.** `MyBeanValidationService` 类*\n\n`package com.apress.prospring3.ch14.jsr303.service;`\n\
  \n`import java.util.Set;`\n\n`import javax.validation.ConstraintViolation;`\n`import\
  \ javax.validation.Validator;`\n\n`import org.springframework.beans.factory.annotation.Autowired;`\n\
  `import org.springframework.stereotype.Service;`\n\n`import com.apress.prospring3.ch14.domain.Customer;`\n\
  \n`@Service(\"myBeanValidationService\")`\n`public class MyBeanValidationService\
  \ {`\n\n`    @Autowired`\n`    private Validator validator;`\n\n`    public Set<ConstraintViolation<Customer>>\
  \ validateCustomer(Customer customer) {`\n`        return validator.validate(customer);`\n\
  `    }`\n`}`\n\n如清单 14-23 所示，注入了一个 `javax.validation.Validator` 实例（注意与 Spring 提供的\
  \ `Validator` 接口 `org.springframework.validation.Validator` 的区别）。一旦定义了 `LocalValidatorFactoryBean`，你就可以在应用程序的任何地方创建对\
  \ `Validator` 接口的引用。要对 POJO 执行验证，需要调用 `Validator.validate()` 方法。验证结果将作为 `ConstraintViolation<T>`\
  \ 接口的 `List` 返回。\n\n清单 14-24 展示了测试程序。\n\n***清单 14-24.** `Jsr303Sample` 类*\n\n`package\
  \ com.apress.prospring3.ch14.jsr303;`\n\n`import java.util.HashSet;`\n`import java.util.Set;`\n\
  \n`import javax.validation.ConstraintViolation;`\n\n`import org.springframework.context.support.GenericXmlApplicationContext;`\n\
  \n`import com.apress.prospring3.ch14.domain.Customer;`\n`import com.apress.prospring3.ch14.domain.CustomerType;`\n\
  `import com.apress.prospring3.ch14.jsr303.service.MyBeanValidationService;`\n\n\
  `public class Jsr303Sample {`\n\n`    public static void main(String[] args) {`\n\
  \n`        GenericXmlApplicationContext ctx = new GenericXmlApplicationContext();`\n\
  `        ctx.load(\"classpath:jsr303-app-context.xml\");`\n`        ctx.refresh();`\n\
  \n`        MyBeanValidationService myBeanValidationService =`\n`            ctx.getBean(\"\
  myBeanValidationService\",`\n`                MyBeanValidationService.class);`\n\
  \n`        Customer customer = new Customer();`\n\n`        // Test basic constraints`\n\
  `        customer.setFirstName(\"C\");`\n`        customer.setLastName(\"Ho\");`\n\
  `        customer.setCustomerType(null);`\n`        customer.setGender(null);`\n\
  \n`        validateCustomer(customer, myBeanValidationService);`\n\n`    }`\n\n\
  `    private static void validateCustomer(Customer customer,`\n`        MyBeanValidationService\
  \ myBeanValidationService) {`\n\n`        Set<ConstraintViolation<Customer>> violations\
  \ =`\n`            new HashSet<ConstraintViolation<Customer>>();`\n`        violations\
  \ = myBeanValidationService.validateCustomer(customer);`\n\n`        listViolations(violations);`\n\
  `    }`\n\n`    private static void listViolations(Set<ConstraintViolation<Customer>>\
  \ violations) {`\n\n`        System.out.println(\"No. of violations: \" + violations.size());`\n\
  \n`        for (ConstraintViolation<Customer> violation: violations) {`\n`            System.out.println(\"\
  Validation error for property: \" +`\n`                violation.getPropertyPath()`\n\
  `                + \" with value: \" + violation.getInvalidValue()`\n`                +\
  \ \" with error message: \" + violation.getMessage());`\n`        }`\n`    }`\n\
  `}`\n\n如清单 14-24 所示，构造了一个 `Customer` 对象，其中 `firstName` 和 `customerType` 违反了约束。在\
  \ `validateCustomer()` 方法中，调用了 `MyBeanValidationService.validateCustomer()` 方法，该方法进而会调用\
  \ JSR-303 Bean Validation API。\n\n运行该程序将产生以下输出：\n\n`No. of violations: 2`\n`Validation\
  \ error for property: firstName with value: C with error message: size must be`\n\
  `between 2 and 60`\n`Validation error for property: customerType with value: null\
  \ with error message: may not be`\n`null`\n\n如你所见，存在两个违规项，并显示了相应的消息。在输出中，你还会看到 Hibernate\
  \ Validator 已经根据注解构建了默认的验证错误消息。你也可以提供自己的验证错误消息，我们将在下一节中演示。\n\n\n\n##### 创建自定义校验器\n\
  \n除了属性级别的校验，我们还可以应用类级别的校验。例如，对于 `Customer` 类，针对个人客户，我们希望确保 `lastName` 和 `gender`\
  \ 属性不为空。在这种情况下，我们可以开发一个自定义校验器来执行检查。在 Bean Validation API 中，开发自定义校验器分为两步。首先为校验器创建一个\
  \ `Annotation` 类型，如清单 14-25 所示。第二步是开发实现校验逻辑的类。\n\n***清单 14-25.** `CheckIndividualCustomer`\
  \ 注解*\n\n`package com.apress.prospring3.ch14.jsr303.validator;`\n\n`import java.lang.annotation.Documented;`\n\
  `import java.lang.annotation.ElementType;`\n`import java.lang.annotation.Retention;`\n\
  `import java.lang.annotation.RetentionPolicy;`\n`import java.lang.annotation.Target;`\n\
  \n`import javax.validation.Constraint;`\n`import javax.validation.Payload;`\n\n\
  `@Retention(RetentionPolicy.RUNTIME)`\n`@Target(ElementType.TYPE)`\n`@Constraint(validatedBy=IndividualCustomerValidator.class)`\n\
  `@Documented`\n`public @interface CheckIndividualCustomer {`\n\n`    String message()\
  \ default \"Individual customer should have gender and last name defined\";`\n`    Class<?>[]\
  \ groups() default {};`\n`    Class<? extends Payload>[] payload() default {};`\n\
  \n`}`\n\n在清单 14-25 中，`@Target(ElementType.TYPE)` 表示该注解仅应用于类级别。`@Constraint` 注解表明这是一个校验器，并且\
  \ `validatedBy` 属性指定了提供校验逻辑的类。在注解体内，定义了三个属性（以方法的形式），如下所示：\n\n*   `message` 属性定义了当约束被违反时要返回的消息（或错误码）。也可以在注解中提供默认消息。\n\
  *   `groups` 属性指定了适用的校验组。可以将校验器分配到不同的组，并对特定组执行校验。\n*   `payload` 属性指定了额外的负载对象（属于实现\
  \ `javax.validation.Payload` 接口的类）。它允许你向约束附加额外信息（例如，负载对象可以指示约束违反的严重程度）。\n\n清单 14-26\
  \ 展示了提供校验逻辑的 `IndividualCustomerValidator` 类。\n\n***清单 14-26.** `IndividualCustomerValidator`\
  \ 类*\n\n`package com.apress.prospring3.ch14.jsr303.validator;`\n\n`import javax.validation.ConstraintValidator;`\n\
  `import javax.validation.ConstraintValidatorContext;`\n\n`import com.apress.prospring3.ch14.domain.Customer;`\n\
  \n`public class IndividualCustomerValidator implements`\n`    ConstraintValidator<CheckIndividualCustomer,\
  \ Customer> {`\n\n`    public void initialize(CheckIndividualCustomer constraintAnnotation)\
  \ {`\n`    }`\n\n`    public boolean isValid(Customer customer,`\n`        ConstraintValidatorContext\
  \ context) {`\n\n`        boolean result = true;`\n\n`        if (customer.getCustomerType()\
  \ != null &&  `\n`            (customer.isIndividualCustomer()`\n`            &&\
  \ (customer.getLastName() == null ||`\n`                customer.getGender() ==\
  \ null))`\n`        ) {`\n`            result = false;`\n`        }`\n\n`        return\
  \ result;`\n`    }`\n\n`}`\n\n在清单 14-26 中，`IndividualCustomerValidator` 实现了 `ConstraintValidator<CheckIndividualCustomer,\
  \ Customer>` 接口，这意味着该校验器检查 `Customer` 类上的 `CheckIndividualCustomer` 注解。`isValid()`\
  \ 方法被实现，底层的校验服务提供者（例如 Hibernate Validator）会将正在校验的实例传递给该方法。在该方法中，我们验证如果客户是个人，那么 `lastName`\
  \ 和 `gender` 属性不应为空。结果是一个布尔值，指示校验结果。\n\n要启用校验，请将 `@CheckIndividualCustomer` 注解应用于\
  \ `Customer` 类，如清单 14-27 所示。\n\n***清单 14-27.** 将自定义校验应用于 `Customer` 类*\n\n`package\
  \ com.apress.prospring3.ch14.domain;`\n\n`// 导入语句已省略`\n`@CheckIndividualCustomer`\n\
  `public class Customer {`\n\n`    // 其他代码已省略`\n`}`\n\n要测试自定义校验，请将清单 14-28 中的代码片段添加到清单\
  \ 14-24 中测试类（`Jsr303Sample`）的 `main()` 方法中。\n\n***清单 14-28.** 将自定义校验应用于 `Customer`\
  \ 类*\n\n`        // 测试自定义约束`\n`        customer.setFirstName(\"Clarence\");`\n`        customer.setLastName(\"\
  Ho\");`\n`        customer.setCustomerType(CustomerType.INDIVIDUAL);`\n`        customer.setGender(null);`\n\
  \n`        validateCustomer(customer, myBeanValidationService);`\n\n运行程序会产生以下输出（其他输出已省略）：\n\
  \n`No. of violations: 1`\n`Validation error for property:  with value: com.apress.prospring3.ch14.domain.Customer@d3f136e`\n\
  `with error message: Individual customer should have gender and last name defined`\n\
  \n在输出中，您可以看到被检查的值（即 `Customer` 对象）违反了个人客户的校验规则，因为 `gender` 属性为空。另请注意，在输出中，属性路径为空，因为这是一个类级别的校验错误。\n\
  \n##### 使用 AssertTrue 进行自定义校验\n\n除了实现自定义校验器之外，在 Bean Validation API 中应用自定义校验的另一种方法是使用\
  \ `@AssertTrue` 注解。让我们看看它是如何工作的。\n\n对于 `Customer` 类，移除 `@CheckIndividualCustomer`\
  \ 注解，并将清单 14-29 中的代码片段添加到 `Customer` 类中。\n\n***清单 14-29.** 将 `@AssertTrue` 应用于 `Customer`\
  \ 类*\n\n`package com.apress.prospring3.ch14.domain;`\n\n`// 导入语句已省略`\n`public class\
  \ Customer {`\n\n`    // 代码已省略`\n`    @AssertTrue(message=\"Individual customer\
  \ should have gender and last name defined\")`\n`    private boolean isValidIndividualCustomer()\
  \ {`\n\n`        boolean result = true;`\n\n`        if (getCustomerType() != null\
  \ &&`\n`            (isIndividualCustomer() && (gender == null || lastName == null)))`\n\
  `            result = false;`\n\n`        return result;`\n`    }`\n`}`\n\n如清单 14-29\
  \ 所示，`isValidIndividualCustomer()` 方法被添加到 `Customer` 类中，并使用 `@AssertTrue` 注解（位于\
  \ `javax.validation.constraints` 包下）。当调用校验时，提供者将调用检查并确保结果为 true。JSR-303 还提供了 `@AssertFalse`\
  \ 注解，用于检查某些应为 false 的条件。现在再次运行测试程序（`Jsr303Sample`），您将得到与自定义校验器相同的输出。\n\n##### 自定义校验的考量\n\
  \n那么，对于 JSR-303 中的自定义校验，您应该使用哪种方法？自定义校验器还是 `@AssertTrue` 注解？通常，`@AssertTrue` 方法实现起来更简单，并且您可以直接在领域对象的代码中看到校验规则。\n\
  \n然而，对于逻辑更复杂的校验器（例如，您需要注入一个服务类、访问数据库并检查某些有效值），那么实现自定义校验器是可行的方法，因为您永远不希望将服务层对象注入到您的领域对象中。此外，自定义校验器可以在相似的领域对象之间重用。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n#### 应该使用哪种验证 API？\n\
  \n在讨论了 Spring 自带的 `Validator` 接口和 Bean Validation API 之后，您应该在应用程序中使用哪一种呢？JSR-303\
  \ 绝对是首选。主要原因如下：\n\n*   JSR-303 是 JEE 标准，被许多前端/后端框架广泛支持（例如，Spring、JPA 2、Spring MVC、GWT\
  \ 等）。\n*   JSR-303 提供了一个标准的验证 API，它隐藏了底层提供者，因此您不会受限于特定的提供者。\n*   从 3.0 版本开始，Spring\
  \ 与 JSR-303 紧密集成。例如，在 Spring MVC Web 控制器中，您可以使用 `@Valid`（位于 `javax.validation` 包下）注解来标注方法参数，Spring\
  \ 将在数据绑定过程中自动调用 JSR-303 验证。此外，在 Spring MVC Web 应用程序上下文配置中，一个名为 `<mvc:annotation-driven/>`\
  \ 的简单标签将配置 Spring 自动启用 Spring 3 类型转换系统和字段格式化，以及对 JSR-303 Bean Validation 的支持。\n\
  *   如果您使用 JPA 2，提供者会在持久化之前自动对实体执行 JSR-303 验证，从而提供另一层保护。\n\n关于使用 Hibernate Validator\
  \ 作为实现提供者的 JSR-303 Bean Validation 的详细信息，请参考 Hibernate Validator 的文档页面（[`http://docs.jboss.org/hibernate/validator/4.2/reference/en-US/html`](http://docs.jboss.org/hibernate/validator/4.2/reference/en-US/html)）。\n\
  \n### 示例应用程序中的类型转换、格式化和验证\n\n在 SpringBlog 应用程序中，将采用 Spring 3 新的类型转换和格式化系统。对于验证，将使用\
  \ JSR-303 Bean Validation API，并以 Hibernate Validator 作为底层验证服务提供者。\n\n为了了解如何采用这些技术，让我们以主要的实体类\
  \ `AbstractBlogPosting` 类为例，它是博客文章条目和评论的基类。该类存储了诸如主题、正文和发布日期等公共属性。\n\n`AbstractBlogPosting`\
  \ 实体类中属性的主要验证和格式化规则如下：\n\n*   `subject` 字段是必填项，字符数应在 10 到 50 之间。\n*   `body` 字段是必填项，字符数应在\
  \ 10 到 200 之间。\n*   `postDate` 字段将由应用程序自动填充，当显示给前端时，我们将使用 `yyyy-MM-dd` 格式（ISO 定义的默认日期模式）。\n\
  *   创建日期和最后修改日期将由应用程序自动填充，当显示给前端时，我们将使用 `yyyy-MM-dd'T'HH:mm:ss.SSSZZ` 格式（ISO 定义的默认日期时间模式）。\n\
  \n为了在 `AbstractBlogPosting` 类中定义验证和格式化规则，将使用标准的 JSR-303 注解并将其应用于相应的属性。代码清单 14-30\
  \ 展示了应用了验证和格式化注解的 `AbstractBlogPosting` 类的代码片段。\n\n***代码清单 14-30.** `AbstractBlogPosting`\
  \ 类*\n\n`package com.apress.prospring3.springblog.domain;`\n\n`import static javax.persistence.GenerationType.IDENTITY;`\n\
  \n`import java.io.Serializable;`\n\n`import javax.persistence.*;`\n`import javax.validation.constraints.*;`\n\
  \n`import org.hibernate.annotations.Type;`\n`import org.joda.time.DateTime;`\n`import\
  \ org.springframework.data.domain.Auditable;`\n`import org.springframework.format.annotation.DateTimeFormat;`\n\
  `import org.springframework.format.annotation.DateTimeFormat.ISO;`\n\n`@MappedSuperclass`\n\
  `public abstract class AbstractBlogPosting`\n`    implements BlogPosting, Auditable<String,\
  \ Long>, Serializable {`\n\n`    // 其他代码已省略`\n\n`    @NotNull`\n`    @Size(min=10,\
  \ max=2000, message=\"{validation.posting.body.Size.message}\")`\n`    @Column(name\
  \ = \"BODY\")`\n`    public String getBody() {`\n`        return body;`\n`    }`\n\
  \n`    @Column(name = \"POST_DATE\")`\n`    @Type(type=\"org.joda.time.contrib.hibernate.PersistentDateTime\"\
  )`\n`    @DateTimeFormat(iso=ISO.DATE)`\n`    public DateTime getPostDate() {`\n\
  `        return postDate;`\n`    }`\n\n`    @NotNull`\n`    @Size(min=10, max=50,\
  \ message=\"{validation.posting.subject.Size.message}\")`\n`    @Column(name = \"\
  SUBJECT\")`\n`    public String getSubject() {`\n`        return subject;`\n`    }`\n\
  \n`    @Column(name = \"CREATED_DATE\")`\n`    @Type(type=\"org.joda.time.contrib.hibernate.PersistentDateTime\"\
  )`\n`    @DateTimeFormat(iso=ISO.DATE_TIME)`\n`    public DateTime getCreatedDate()\
  \ {`\n`        return this.createdDate;`\n`    }`\n\n`    @Column(name = \"LAST_MODIFIED_DATE\"\
  )`\n`    @Type(type=\"org.joda.time.contrib.hibernate.PersistentDateTime\")`\n`    @DateTimeFormat(iso=ISO.DATE_TIME)`\n\
  `    public DateTime getLastModifiedDate() {`\n`        return this.lastModifiedDate;`\n\
  `    }`\n`}`\n\n在代码清单 14-30 中，您可以看到 `@NotNull` 和 `@Size` JSR-303 注解被应用于 `body` 和\
  \ `subject` 属性。对于 `@Size` 注解，我们没有将消息文本硬编码到 `message` 属性中，而是提供了消息的键，Hibernate Validator\
  \ 将从消息资源包（消息包属性文件的默认名称是 `ValidationMessages.properties`）中检索相应的消息模板文本，以支持 i18n（国际化）。代码清单\
  \ 14-31 展示了在代码清单 14-30 中定义的两条消息。\n\n***代码清单 14-31.** `ValidationMessages.properties`\
  \ 文件*\n\n`validation.posting.body.Size.message=body must be between {min} and {max}\
  \ characters`\n`validation.posting.subject.Size.message=subject must be between\
  \ {min} and {max} characters`\n\n在代码清单 14-31 中，您可以看到消息模板中定义了变量 `min` 和 `max`，它们将被自动替换为\
  \ `@Size` 注解中的相应属性。通过这种方式定义消息，可以轻松实现国际化。例如，要支持香港繁体中文（语言环境代码为 `zh_HK`），我们只需要准备一个包含繁体中文消息的\
  \ `ValidationMessages_zh_HK.properties` 文件。\n\n此外，如代码清单 14-30 所示，`@DateTimeFormat`\
  \ 注解被应用于 `postDate`、`createdDate` 和 `lastModifiedDate` 属性。这些注解属于 Spring 3 的类型转换和格式化系统。对于\
  \ `postDate`，模式定义为 `ISO.DATE`，它代表模式 `yyyy-MM-dd`。对于 `createdDate` 和 `LastModifiedDate`，模式定义为\
  \ `ISO.DATE_TIME`，它代表模式 `yyyy-MM-dd'T'HH:mm:ss.SSSZZ`。\n\n为 Spring 3 启用验证、类型转换和格式化支持非常简单。在示例应用程序中，我们将在表示层使用\
  \ Spring MVC，即在调度程序 servlet 的 `WebApplicationContext` 中，因此我们只需要定义 `<mvc:annotation-driven>`，Spring\
  \ 将为我们处理其余的事情。在第 17 章讨论开发 Web 应用程序中的数据验证时，您将了解更多相关信息。\n\n有关在示例应用程序中使用验证、类型转换和格式化的更多详细信息，请参考第\
  \ 21 章。\n\n### 本章小结\n\n在本章中，我们介绍了 Spring 3 类型转换系统以及字段格式化程序 SPI。您了解了除了 `PropertyEditor`\
  \ 支持之外，新的类型转换系统如何用于任意类型转换。\n\n此外，我们还介绍了 Spring 中的验证支持、Spring 的 `Validator` 接口，以及\
  \ Spring 3 中推荐的 JSR-303 Bean Validation 支持。\n\n## 第 15 章\n\n\n\n## Spring 中的任务调度\n\
  \n任务调度是企业应用中的常见功能。任务调度主要由三部分组成：任务（即需要在特定时间或定期运行的业务逻辑）、触发器（指定任务执行的条件）以及调度器（根据触发器的信息执行任务）。\n\
  \n具体来说，本章将涵盖以下主题：\n\n*   *Spring 中的任务调度：* 我们将讨论 Spring 如何支持任务调度，重点关注 Spring 3 中引入的\
  \ `TaskScheduler` 抽象。我们还将介绍固定间隔调度和 `cron` 表达式等调度场景。\n*   *异步任务执行：* 我们将讨论如何使用 Spring\
  \ 3 中新增的 `@Async` 注解来异步执行任务。\n\n### 在 STS 中为示例项目创建项目\n\n让我们创建本章的示例项目。在 STS 中，通过选择\
  \ Simple Spring JPA Utility Project 来创建一个新的 Spring 模板项目。选择此项目模板的原因是我们将开发一个示例作业，用于更新后端关系型数据库管理系统（RDBMS）中的数据。\n\
  \n创建项目后，还需要其他依赖项，如表 15-1 所示。将它们添加到你的项目中。同时，请确认项目使用的是 Spring 3.1 和 JDK 6。\n\n![images](img/t1501.jpg)\n\
  \n![images](img/t1501a.jpg)\n\n### Spring 中的任务调度\n\n企业应用通常需要调度任务。在许多应用中，各种任务（例如向客户发送电子邮件通知、运行日终作业、进行数据清理、批量更新数据等）需要按固定间隔（例如每小时）或特定时间表（例如，周一至周五，每晚\
  \ 8 点）定期运行。如前所述，任务调度由三部分组成：调度定义（触发器）、任务执行（调度器）和任务本身。\n\n在 Spring 应用中，有多种方式可以触发任务的执行。一种方式是从应用部署环境中已有的调度系统外部触发作业。例如，许多企业使用商业系统（如\
  \ Ctrl-M 或 CA Autosys）进行任务调度。如果应用运行在 Linux/Unix 平台上，则可以使用 crontab 调度器。可以通过向 Spring\
  \ 应用发送 RESTful-WS 请求，并由 Spring 的 MVC 控制器触发任务来实现作业触发。\n\n另一种方式是使用 Spring 中的任务调度支持。Spring\
  \ 在任务调度方面提供了三种选择：\n\n*   *支持 JDK Timer*：Spring 支持使用 JDK 的 `Timer` 对象进行任务调度。\n* \
  \  *集成 Quartz*：Quartz 调度器（[`www.quartz-scheduler.org`](http://www.quartz-scheduler.org)）是一个流行的开源调度库。\n\
  *   *Spring 自身的 TaskScheduler 抽象*：Spring 3 引入了 `TaskScheduler` 抽象，它提供了一种简单的任务调度方式，并支持大多数典型需求。\n\
  \n在本节中，我们将重点介绍如何使用 Spring 的 `TaskScheduler` 抽象进行任务调度。\n\n#### 介绍 Spring TaskScheduler\
  \ 抽象\n\n在 Spring 的 `TaskScheduler` 抽象中，主要有三个参与者：\n\n*   *Trigger 接口*：`org.springframework.scheduling.Trigger`\
  \ 接口提供了定义触发机制的支持。Spring 提供了两个 `Trigger` 实现。`CronTrigger` 类支持基于 `cron` 表达式的触发，而 `PeriodicTrigger`\
  \ 类支持基于初始延迟和固定间隔的触发。\n*   *任务*：任务是需要被调度的业务逻辑片段。在 Spring 中，任务可以指定为任何 Spring Bean\
  \ 中的一个方法。\n*   *TaskScheduler 接口*：`org.springframework.scheduling.TaskScheduler`\
  \ 接口提供了任务调度的支持。Spring 提供了三个 `TaskScheduler` 接口的实现类。`TimerManagerTaskScheduler` 类（位于\
  \ `org.springframework.scheduling.commonj` 包下）包装了 CommonJ 的 `commonj.timers.TimerManager`\
  \ 接口，该接口常用于商业 JEE 应用服务器，如 WebSphere、WebLogic 等。`ConcurrentTaskScheduler` 和 `ThreadPoolTaskScheduler`\
  \ 类（均位于 `org.springframework.scheduling.concurrent` 包下）包装了 `java.util.concurrent.ScheduledThreadPoolExecutor`\
  \ 类。这两个类都支持从共享线程池执行任务。\n\n图 15-1 展示了 `Trigger` 接口、`TaskScheduler` 接口以及任务（实现了 `java.lang.Runnable`\
  \ 接口）之间的关系。\n\n![images](img/9781430241072_Fig15-01.jpg)\n\n***图 15-1.** 触发器、任务和调度器之间的关系*\n\
  \n要使用 Spring 的 `TaskScheduler` 抽象来调度任务，你有两种选择。一种是使用 Spring XML 配置中的 `task-namespace`，另一种是使用注解。让我们逐一介绍它们。\n\
