  `联系人保存成功`\n\n主要的日志消息以粗体显示。你可以看到，对于 `save()` 方法的事务，默认属性继承自类级别的 `@Transactional` 注解。更新操作完成后，Spring\
  \ 的 `JpaTransactionManager` 触发事务提交，这导致 Hibernate 刷新持久化上下文，并将底层的 JDBC 连接提交到数据库。\n\
  \n\n\n最后，让我们来看看 `countAll()` 方法。我们将为此方法研究两种不同的事务配置。虽然 `CrudRepository.count()` 方法可以实现目的，但我们不会使用该方法。相反，我们将实现另一个方法用于演示。这主要是因为\
  \ Spring Data 中 `CrudRepository` 接口定义的方法已经标记了适当的事务属性。\n\n清单 13-14 展示了在 `ContactRepository`\
  \ 接口中定义的新方法 `countAllContacts()`。\n\n***清单 13-14.** 包含 `countAllContacts()` 方法的\
  \ `ContactRepository` 接口*\n\n`package com.apress.prospring3.ch13.repository;`\n\n\
  `import org.springframework.data.jpa.repository.Query;`\n`import org.springframework.data.repository.CrudRepository;`\n\
  \n`import com.apress.prospring3.ch13.domain.Contact;`\n\n`public interface ContactRepository\
  \ extends CrudRepository<Contact, Long> {`\n\n`    @Query(\"select count(c) from\
  \ Contact c\")`\n`    public Long countAllContacts();`\n`}`\n\n如清单 13-14 所示，对于新的\
  \ `countAllContacts()` 方法，应用了 `@Query` 注解，其值等于统计联系人数量的 JPQL 语句。清单 13-15 展示了 `ContactServiceImpl`\
  \ 类中 `countAll()` 方法的实现。\n\n***清单 13-15.** 实现了 `countAll()` 方法的 `ContactServiceImpl`\
  \ 类*\n\n`package com.apress.prospring3.ch13.service.annotation;`\n\n`// 导入语句已省略`\n\
  `@Service(\"contactService\")`\n`@Repository`\n`@Transactional`\n`public class ContactServiceImpl\
  \ implements ContactService {`\n\n`    // 代码已省略`\n`    @Transactional(readOnly=true)`\n\
  `    public long countAll() {`\n`        return contactRepository.countAllContacts();`\n\
  `    }`\n`}`\n\n该注解与其他查找方法相同。清单 13-16 展示了测试代码片段。\n\n***清单 13-16.** 测试 `countAll()`\
  \ 方法*\n\n`package com.apress.prospring3.ch13;`\n\n`public class TxAnnotationSample\
  \ {`\n\n`    public static void main(String[] args) {`\n\n`        GenericXmlApplicationContext\
  \ ctx = new GenericXmlApplicationContext();`\n`        ctx.load(\"classpath:tx-annotation-app-context.xml\"\
  );`\n`        ctx.refresh();`\n\n`        ContactService contactService = ctx.getBean(\"\
  contactService\",`\n`            ContactService.class);`\n\n`        // 测试 countAll()\
  \ 方法`\n`        System.out.println(\"联系人数量: \" + contactService.countAll());`\n\
  `    }`\n`}`\n\n运行程序将产生以下输出：\n\n**`DEBUG [org.springframework.orm.jpa.JpaTransactionManager]\
  \ –`![images](img/U002.jpg)**\n**`<Creating new transaction with name` ![images](img/U002.jpg)**\n\
  **`[com.apress.prospring3.ch13.service.annotation.ContactServiceImpl.countAll]:`**\n\
  `PROPAGATION_REQUIRED,ISOLATION_DEFAULT,readOnly; ''>`\n`DEBUG [org.hibernate.transaction.JDBCTransaction]\
  \ - <begin>`\n`Hibernate: select count(*) as col_0_0_ from contact contact0_ limit\
  \ ?`\n`DEBUG [org.hibernate.transaction.JDBCTransaction] - <commit>`\n`DEBUG [org.hibernate.transaction.JDBCTransaction]\
  \ - <re-enabling autocommit>`\n`DEBUG [org.hibernate.transaction.JDBCTransaction]\
  \ - <committed JDBC Connection>`\n`DEBUG [org.springframework.orm.jpa.JpaTransactionManager]\
  \ - <Closing JPA EntityManager [org.hibernate.ejb.EntityManagerImpl@4a005364] after\
  \ transaction>`\n`DEBUG [org.springframework.orm.jpa.EntityManagerFactoryUtils]\
  \ - <Closing JPA EntityManager>`\n`联系人数量: 3`\n\n如上述输出所示，您可以看到 `countAll()` 的事务已按预期创建，且\
  \ readOnly 属性等于 true。\n\n但对于 `countAll()` 函数，我们根本不想让它参与事务。原因是我们不需要结果由底层的 JPA `EntityManager`\
  \ 管理。相反，我们只想获取计数结果然后不再关心它。在这种情况下，我们可以将事务传播行为覆盖为 `Propagation.NEVER`。清单 13-17 展示了修改后的\
  \ `countAll()` 方法。\n\n***清单 13-17.** 实现了修改后 `countAll()` 方法的 `ContactServiceImpl`\
  \ 类*\n\n`package com.apress.prospring3.ch13.service.annotation;`\n\n`// 导入语句已省略`\n\
  `@Service(\"contactService\")`\n`@Repository`\n`@Transactional`\n`public class ContactServiceImpl\
  \ implements ContactService {`\n\n`    // 代码已省略`\n`    @Transactional(propagation=Propagation.NEVER)`\n\
  `    public long countAll() {`\n`        return contactRepository.count();`\n`    }`\n\
  `}`\n\n再次运行清单 13-16 中的测试代码，您会发现 `countAll()` 方法将不会创建事务。\n\n本节涵盖了在日常处理事务时您将遇到的一些主要配置。对于特殊情况，您可能需要定义超时时间、隔离级别、针对特定异常的回滚（或不回滚）等。\n\
  \n![images](img/square.jpg) **注意**  Spring 的 `JpaTransactionManager` 不支持自定义隔离级别。相反，它将始终使用底层数据存储的默认隔离级别。如果您使用\
  \ Hibernate 作为 JPA 服务提供者，可以通过扩展 `HibernateJpaDialect` 类来支持自定义隔离级别（有关详细信息，请参阅 [`http://amitstechblog.wordpress.com/2011/05/31/supporting-custom-isolation-levels-with-jpa`](http://amitstechblog.wordpress.com/2011/05/31/supporting-custom-isolation-levels-with-jpa)\
  \ 上的文章）。\n\n\n\n#### 使用 XML 配置进行事务管理\n\n另一种常见的声明式事务管理方法是使用 Spring 的 AOP 支持。在 Spring\
  \ 2 版本之前，我们需要使用 `TransactionProxyFactoryBean` 类来为 Spring Bean 定义事务需求。然而，自版本 2 以来，Spring\
  \ 通过引入 `aop-namespace` 并使用通用的 AOP 配置技术来定义事务需求，提供了一种更简单的方式。\n\n在本节中，我们将使用的示例与注解示例相同。我们只需将其修改为\
  \ XML 配置风格。清单 13-18 展示了事务管理的 XML 配置文件（`tx-declarative-app-context.xml`）。\n\n***清单\
