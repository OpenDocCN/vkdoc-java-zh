  \n\n\n#### 使用编程式事务\n\n第三种选择是以编程方式控制事务行为。在这种情况下，我们有两种方案。第一种是将 `PlatformTransactionManager`\
  \ 的实例注入到 Bean 中，并直接与事务管理器交互。另一种方案是使用 Spring 提供的 `TransactionTemplate` 类，它能大大简化你的工作。在本节中，我们将演示如何使用\
  \ `TransactionTemplate` 类。为简单起见，我们将只关注实现 `ContactService.countAll()` 方法。\n\n清单 13-21\
  \ 展示了使用编程式事务的 XML 配置（`tx-programmatic-app-context.xml`）。\n\n***清单 13-21.** 编程式事务管理的\
  \ Spring 配置*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<beans`\n\n`    xsi:schemaLocation=\"\
  http://www.springframework.org/schema/jdbc`\n`        http://www.springframework.org/schema/jdbc/spring-jdbc-3.1.xsd`\n\
  `        http://www.springframework.org/schema/beans`\n`        http://www.springframework.org/schema/beans/spring-beans-3.1.xsd`\n\
  `        http://www.springframework.org/schema/tx`\n`        http://www.springframework.org/schema/tx/spring-tx-3.1.xsd`\n\
  `        http://www.springframework.org/schema/data/jpa`\n`        http://www.springframework.org/schema/data/jpa/spring-jpa-1.0.xsd`\n\
  `        http://www.springframework.org/schema/context`\n`        http://www.springframework.org/schema/context/spring-context-3.1.xsd\"\
  >`\n\n`    <jdbc:embedded-database id=\"dataSource\" type=\"H2\">`\n`        <jdbc:script\
  \ location=\"classpath:schema.sql\"/>`\n`        <jdbc:script location=\"classpath:test-data.sql\"\
  />    `\n`    </jdbc:embedded-database>`\n\n**`    <bean id=\"transactionTemplate\"\
  `**\n**`        class=\"org.springframework.transaction.support.TransactionTemplate\"\
  >`**\n**`        <property name=\"propagationBehaviorName\" value=\"PROPAGATION_NEVER\"\
  />`**\n**`        <property name=\"timeout\" value=\"30\"/>`**\n**`        <property\
  \ name=\"transactionManager\" ref=\"transactionManager\"/>`**\n**`    </bean>`**\n\
  \n`    <bean id=\"transactionManager\" class=\"org.springframework.orm.jpa.JpaTransactionManager\"\
  >`\n`        <property name=\"entityManagerFactory\" ref=\"emf\"/>`\n`    </bean>`\n\
  \n`    <bean id=\"emf\" class=\"org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean\"\
  >`\n`        <property name=\"dataSource\" ref=\"dataSource\" />`\n`        <property\
  \ name=\"jpaVendorAdapter\">`\n`            <bean class=\"org.springframework.orm.jpa.vendor.HibernateJpaVendorAdapter\"\
  \ />`\n`        </property>        `\n`        <property name=\"packagesToScan\"\
  `\n`            value=\"com.apress.prospring3.ch13.domain\"/>`\n`        <property\
  \ name=\"jpaProperties\">`\n`            <props>`\n`                <prop key=\"\
  hibernate.dialect\">`\n`                    org.hibernate.dialect.H2Dialect`\n`                </prop>`\n\
  `                <prop key=\"hibernate.max_fetch_depth\">3</prop>`\n`                <prop\
  \ key=\"hibernate.jdbc.fetch_size\">50</prop>`\n`                <prop key=\"hibernate.jdbc.batch_size\"\
  >10</prop>`\n`                <prop key=\"hibernate.show_sql\">true</prop>`\n`            </props>`\n\
  `        </property>`\n`    </bean>      `\n\n`    <context:component-scan`\n`        base-package=`**`\"\
  com.apress.prospring3.ch13.service.programmatic\"`** `/>`\n\n`    <jpa:repositories\
