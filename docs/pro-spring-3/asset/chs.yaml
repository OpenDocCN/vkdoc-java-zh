  \n#### 使用 jqGrid 实现带分页的数据网格\n\n如果系统中只有少数几个联系人，当前的联系人列表视图是可以的。但是，随着数据增长到数千甚至更多记录，性能将成为一个问题。\n\
  \n一个常见的解决方案是实现一个数据网格组件，并支持分页，用于数据浏览，这样用户只需浏览一定数量的记录，从而避免浏览器和 Web 容器之间的大量数据传输。在本节中，我们将演示如何使用\
  \ jqGrid ([`http://www.trirand.com/blog`](http://www.trirand.com/blog)) 实现数据网格，jqGrid\
  \ 是一个流行的基于 JavaScript 的数据网格组件。我们使用的版本是 4.3.1。\n\n对于分页支持，我们将使用 jqGrid 内置的 Ajax 分页支持，它为每个页面触发一个\
  \ `XMLHttpRequest`，并接受 JSON 数据格式作为页面数据。因此，我们需要将 JSON 库依赖项添加到我们的项目中，如表 17-6 所示。\n\
  \n![images](img/t1706.jpg)\n\n在以下各节中，我们将讨论如何在服务器端和客户端实现分页支持。首先，我们将介绍在联系人列表视图中实现\
  \ jqGrid 组件。然后，我们将讨论如何使用 Spring Data Commons 模块的全面分页支持在服务器端实现分页。\n\n##### 在联系人列表视图中启用\
