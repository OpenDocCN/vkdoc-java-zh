  虽然你可以通过显式提交和回滚 JDBC 连接来管理事务，但为此所需的代码是样板代码，你必须在不同的方法中重复编写。此外，这段代码是 JDBC 特有的，因此一旦你选择了另一种数据访问技术，它也需要更改。Spring
  的事务支持提供了一套与技术无关的工具，包括事务管理器（例如 `org.springframework.transaction.PlatformTransactionManager`）、事务模板（例如
  `org.springframework.transaction.support.TransactionTemplate`）以及事务声明支持，以简化你的事务管理任务。


  ## 7-2. 选择事务管理器实现


  ### 问题


  通常，如果你的应用只涉及单一数据源，你可以简单地通过调用数据库连接上的 `commit()` 和 `rollback()` 方法来管理事务。然而，如果你的事务跨越多个数据源，或者你更倾向于利用
  Java EE 应用服务器提供的事务管理能力，你可以选择 Jakarta 事务 API（JTA）。此外，对于不同的对象/关系映射框架（如 Hibernate 和
  JPA），你可能需要调用不同的专有事务 API。


  因此，你必须为不同的技术处理不同的事务 API。这会使你很难从一套 API 切换到另一套。




  ### 解决方案


  Spring 从不同的事务管理 API 中抽象出了一套通用的事务设施。作为应用程序开发者，你可以直接使用 Spring 的事务设施，而无需深入了解底层的事务 API。借助这些设施，你的事务管理代码将与任何特定的事务技术无关。


  Spring 核心的事务管理抽象基于 `PlatformTransactionManager` 接口。它封装了一组与技术无关的事务管理方法。请记住，无论你在 Spring
  中选择哪种事务管理策略（编程式或声明式），都需要一个事务管理器。`PlatformTransactionManager` 接口提供了三个用于处理事务的方法：


  *   `TransactionStatus getTransaction(TransactionDefinition definition) throws TransactionException`


  *   `void commit(TransactionStatus status) throws TransactionException;`


  *   `void rollback(TransactionStatus status) throws TransactionException;`


  Spring 的响应式事务管理抽象基于 `ReactiveTransactionManager` 接口，该接口与常规的 `PlatformTransactionManager`
  非常相似，但采用了响应式风格。`ReactiveTransactionManager` 接口提供了三个用于处理事务的方法：


  *   `Mono<ReactiveTransaction> getReactiveTransaction(TransactionDefinition definition)
  throws TransactionException;`


  *   `Mono<Void> commit(ReactiveTransaction transaction) throws TransactionException;`


  *   `Mono<Void> rollback(ReactiveTransaction transaction) throws TransactionException;`


  ### 工作原理


  `PlatformTransactionManager` 和 `ReactiveTransactionManager` 是所有 Spring 事务管理器的通用接口。Spring
  为这些接口提供了几个内置实现，用于配合不同的事务管理 API：


  *   如果你的应用程序只需要处理单个数据源，并通过 JDBC 访问它，那么 `DataSourceTransactionManager` 就能满足你的需求。


  *   如果你在 Jakarta EE 应用服务器上使用 JTA 进行事务管理，则应使用 `JtaTransactionManager` 从应用服务器查找事务。此外，`JtaTransactionManager`
  也适用于分布式事务（跨多个资源的事务）。请注意，虽然通常使用 JTA 事务管理器来集成应用服务器的事务管理器，但你也可以使用独立的 JTA 事务管理器，例如 Atomikos。


  *   如果你使用对象/关系映射框架来访问数据库，则应为此框架选择相应的事务管理器，例如 `HibernateTransactionManager` 或 `JpaTransactionManager`。


  *   当使用 R2DBC 时，你需要 `R2dbcTransactionManager`。


