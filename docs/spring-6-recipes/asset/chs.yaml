  } catch (DatatypeConfigurationException e) {\nthrow new IllegalStateException(e);\n\
  }\n});\nreturn request;\n}\n}\n清单 10-79\n带编组功能的天气服务代理\n```\n\n当使用 XML 编组时，`WebServiceTemplate`\
