  ```\n\n首先，注意移除了构建 `RedisVehicleRepository` 的 `@Bean` 方法。其次，注意添加了 `@EnableRedisRepositories`\
  \ 注解。这启用了对扩展 Spring Data `Repository` 接口（或其子接口之一）并用于领域对象的接口的检测。\n\nSpring Data 需要知道\
  \ `Vehicle` 的哪个字段用作键。默认情况下，它会查找名为 `id` 的字段或使用 `org.springframework.data.annotation.Id`\
  \ 注解的字段。对于 `Vehicle`，我们添加一个名为 `id` 的额外字段。要定义键空间（之前使用的哈希），可以在类上添加 `@RedisHash` 注解。默认情况下，它会使用类名\
  \ `Vehicle` 作为键空间。我们想使用 `vehicles`，因此需要显式添加它。最后，`vehicleNo` 字段需要添加 `@Indexed` 注解；没有这个注解，该字段将无法在查询中使用。这将为该字段生成一个二级索引，以便在查询中使用。\n\
  \n```\npackage com.apress.spring6recipes.nosql;\nimport java.util.UUID;\nimport\
  \ org.springframework.data.annotation.Id;\nimport org.springframework.data.redis.core.RedisHash;\n\
  import org.springframework.data.redis.core.index.Indexed;\n@RedisHash(\"vehicles\"\
  )\npublic record Vehicle (String id, @Indexed String vehicleNo, String color, int\
