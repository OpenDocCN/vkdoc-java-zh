  \ Java Flight Recorder 调查应用程序启动\n\n### 问题\n\n你想调查基于 Spring 的应用程序的启动过程，并使用 Java Flight\
  \ Recorder (JFR) 确定哪些方面可以改进。Java Flight Recorder 是一种用于记录 JVM 上运行应用程序的诊断和性能分析信息的工具。它几乎不会带来性能开销，这使得它在几乎所有环境中都很有用。JFR\
  \ 将收集有关其运行的 JVM 以及其运行的应用程序的数据。\n\n### 解决方案\n\n核心 Spring 容器提供了一个 API 来监控应用程序上下文的设置和启动。这个\
  \ API，即 `ApplicationStartup` 接口，有一个实现 `FlightRecorderApplicationStartup`，可用于发布 JFR\
  \ 事件。但是，默认情况下 `ApplicationStartup` 是一个空操作，不执行任何操作，因此你需要激活它。\n\n启用 `FlightRecorderApplicationStartup`\
  \ 后，你还需要指示 JDK 记录 JFR 事件。最后，要调查这些事件，你需要一个像 [Java Mission Control](https://jdk.java.net/jmc/)\
  \ 这样的工具。\n\n### 工作原理\n\n首先，我们需要设置要使用的正确的 `ApplicationStartup` 实现。接下来，我们将使用正确的命令行属性启动，最后我们将能够检查这些事件。\n\
  \n\n\n#### 启用 JFR 事件处理\n\n要启用 JFR 事件发布，我们需要使用 `FlightRecorderApplicationStartup`\
  \ 类来配置应用程序上下文，而不是默认的无操作实现。你可以通过调用 `setApplicationStartup` 方法来实现这一点，该方法定义在大多数（并非所有）应用程序上下文实现所使用的一个基类中。注册之后，调用\
  \ `refresh` 来启动加载应用程序上下文。\n\n```\npackage com.apress.spring6recipes.replicator;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import org.springframework.core.metrics.jfr.FlightRecorderApplicationStartup;\n\
  public class Main {\npublic static void main(String[] args) throws Exception {\n\
  var cfg = \"com.apress.spring6recipes.replicator.config\";\ntry (var ctx = new AnnotationConfigApplicationContext())\
  \ {\nctx.setApplicationStartup(new FlightRecorderApplicationStartup());\nctx.scan(cfg);\n\
  ctx.refresh();\nSystem.in.read();\n}\n}\n}\n清单 10-81\n包含 ApplicationStartup 配置的\
  \ Main 类\n```\n\n然而，仅凭这些配置，事件并不会被记录。为此，你需要在 JVM 中添加 `StartFlightRecording` 属性。\n\
  \n```\njava -XX:StartFlightRecording:filename=recording.jfr,duration=30s -jar recipe_10_10_i.jar\n\
  清单 10-82\nJava 启动命令\n```\n\n这将启动应用程序并启用飞行记录。它会将事件写入名为 `recording.jfr` 的文件中，并记录 30\
  \ 秒的数据。\n\n另一种选择是在运行中启用飞行记录，即在正在运行的应用程序中启用。你可以使用 `jcmd` 命令来实现。通过进程资源管理器（Windows）或基于\
  \ Unix 系统上的 `ps` 命令，你需要确定要启用飞行记录的 Java 进程的进程 ID。假设进程 ID 是 4321。那么以下命令将启用飞行记录。\n\n\
  ```\njcmd 4321 JFR.start duration=30s filename=recording.jfr\n清单 10-83\nJCMD 启动命令\n\
  ```\n\n启动飞行记录时，你会在控制台中看到一些输出，表明已启动。\n\n```\n[0.462s][info][jfr,startup] Started\
  \ recording 1\\. The result will be written to:\n[0.462s][info][jfr,startup]\n[0.462s][info][jfr,startup]\
  \ /Users/marten/Repositories/apress/spring-6-recipes/code/recording.jfr\n[0.481s][info][jfr,startup]\
  \ Started recording 2\\. The result will be written to:\n[0.481s][info][jfr,startup]\n\
  [0.481s][info][jfr,startup] /Users/marten/Repositories/apress/spring-6-recipes/code/recording.jfr\n\
  清单 10-84\n已启用飞行记录的输出\n```\n\n停止应用程序后，你可以在 Java Mission Control 中打开 `recording.jfr`\
  \ 文件来观察事件（参见图 10-7）。\n\n![](img/314861_5_En_10_Fig7_HTML.jpg)\n\nAzul Mission Control\
  \ 窗口的截图。一个 recording.jfr 选项卡已打开，显示事件浏览器。在中央窗格中，选中了 startup step 22 选项卡。\n\n图 10-7\n\
