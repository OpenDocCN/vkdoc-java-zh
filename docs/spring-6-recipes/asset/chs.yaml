  ```


  `access()` 表达式可用于编写非常强大的表达式。上述代码片段使用了 URL 中的路径参数 `{user}`，如果当前用户是实际用户或拥有 `ADMIN`
  权限，则允许访问。`AuthorizationContext` 包含解析后的变量，你可以用它来比较 URI 中的名称。`Authentication` 包含 `GrantedAuthorities`
  集合，你可以检查其中是否包含 `ROLE_ADMIN`。当然，你可以根据需要编写任意数量的复杂表达式。你可以检查 IP 地址、请求头等。


  ## 5-9\. 总结


  在本章中，你学习了如何使用 Spring Security 保护应用程序。它可以用于保护任何 Java 应用程序，但主要用于 Web 应用程序。认证、授权和访问控制的概念在安全领域至关重要，因此你应该对它们有清晰的理解。


  你通常需要保护关键 URL，防止未经授权的访问。Spring Security 可以帮助你以声明式方式实现这一点。它通过应用 Servlet 过滤器来处理安全性，这些过滤器可以通过简单的基于
  Java 的配置进行配置。Spring Security 会自动为你配置基本的安全服务，并默认尽可能确保安全。


  Spring Security 支持多种用户登录 Web 应用程序的方式，例如基于表单的登录和 HTTP 基本认证。它还提供了一个匿名登录服务，允许你将匿名用户像普通用户一样处理。记住我功能允许应用程序在多个浏览器会话中记住用户的身份。


  Spring Security 支持多种用户认证方式，并为此内置了提供者实现。例如，它支持针对内存定义、关系数据库和 LDAP 仓库进行用户认证。你应该始终在用户仓库中存储加密后的密码，因为明文密码容易受到黑客攻击。Spring
  Security 还支持在本地缓存用户详细信息，以节省执行远程查询的开销。


  判断用户是否有权访问给定资源的决策由访问决策管理器做出。Spring Security 内置了三个基于投票方法的访问决策管理器。它们都需要配置一组投票者来对访问控制决策进行投票。


  Spring Security 使你能够以声明式方式保护方法调用，可以通过在 Bean 定义中嵌入安全拦截器，或者使用 AspectJ 切入点表达式或注解匹配多个方法。Spring
  Security 还允许你在 JSP 视图中显示用户的认证信息，并根据用户的权限有条件地渲染视图内容。


  Spring Security 提供了一个 ACL 模块，允许每个领域对象拥有一个用于控制访问的 ACL。你可以使用 Spring Security 的高性能
  API（通过 JDBC 实现）来读取和维护每个领域对象的 ACL。Spring Security 还提供了诸如访问决策投票者和 JSP 标签等工具，使你能够将
  ACL 与其他安全工具一致地使用。


  Spring Security 还支持保护基于 Spring WebFlux 的应用程序。在最后一个配方中，你探索了如何为此类应用程序添加安全性。




