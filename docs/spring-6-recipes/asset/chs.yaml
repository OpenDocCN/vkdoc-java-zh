- '# 8. Spring Batch


  批处理已经存在了几十年。最早用于信息管理的技术（信息技术）的广泛应用就是批处理应用。这些环境没有交互式会话，通常也无法在内存中加载多个应用程序。计算机价格昂贵，与今天的服务器毫无相似之处。通常，机器是多用户共享的，并在白天使用（分时）。然而，到了晚上，机器就会闲置，这造成了巨大的浪费。企业开始投资于利用非工作时间来处理白天积累的工作的方法。这种做法催生了批处理。


  批处理解决方案通常离线运行，对系统中的事件无动于衷。过去，批处理进程是出于必要而离线运行的。然而，如今大多数批处理进程之所以离线运行，是因为在可预测的时间完成工作以及完成批量工作，是许多架构的需求。批处理解决方案通常不响应请求，尽管没有理由不能因为消息或请求而启动它。批处理解决方案往往用于大型数据集，在这些数据集中，处理时长是其架构和实现中的关键因素。一个进程可能运行几分钟、几小时甚至几天！作业可能没有时间限制（即，一直运行直到所有工作完成，即使这意味着要运行几天），也可能有严格的时间限制（作业必须在恒定时间内进行，每一行花费相同的时间，无论限制如何，这让你可以预测某个作业将在特定时间窗口内完成）。


  批处理有着悠久的历史，甚至影响着现代的批处理解决方案。


  大型机应用程序使用批处理，而当今最大的批处理环境之一——z/OS 上的 CICS，从根本上来说仍然是一个大型机操作系统。客户信息控制系统（CICS）非常适合特定类型的任务：获取输入、处理输入、写入输出。CICS
  是一个事务服务器，主要用于金融机构和政府机构，可以运行多种语言（COBOL、C、PLI 等）的程序。它可以轻松支持每秒数千笔交易。CICS 是最早的容器之一，这个概念对于
  Spring 和 Jakarta EE 用户来说很熟悉，尽管 CICS 本身于 1969 年首次亮相！CICS 的安装成本非常昂贵，尽管 IBM 仍在销售和安装
  CICS，但自那以后已经出现了许多其他解决方案。这些解决方案通常特定于特定环境：大型机上的 COBOL/CICS、Unix 上的 C，以及如今各种环境上的 Java。问题在于，处理这类批处理解决方案的标准化基础设施非常少。很少有人意识到他们错过了什么，因为
  Java 平台对批处理的原生支持非常少。需要解决方案的企业通常最终会自行编写，导致代码脆弱且特定于领域。


  然而，各个组件都已就位：事务支持、快速 I/O、诸如 Quartz 之类的调度器、可靠的线程支持，以及 Jakarta EE 和 Spring 中非常强大的应用程序容器概念。Dave
  Syer 和他的团队自然而然地构建了 [Spring Batch](https://spring.io/projects/spring-batch)，这是一个面向
  Spring 平台的批处理解决方案。


  在深入细节之前，思考这个框架解决了哪些类型的问题非常重要。一项技术由其解决方案空间定义。一个典型的 Spring Batch 应用程序通常会读取大量数据，然后以修改后的形式将其写回。关于事务边界、输入大小、并发性和处理步骤顺序的决策，都是典型集成的各个方面。


  一个常见的需求是从逗号分隔值（CSV）文件加载数据，可能是作为企业对企业（B2B）交易，也可能是作为与旧版遗留应用程序的集成技术。另一个常见的应用是对数据库中的记录进行非平凡处理。也许输出是数据库记录本身的更新。一个例子可能是调整文件系统上图像的尺寸，这些图像的元数据存储在数据库中，或者需要根据某些条件触发另一个进程。


  ![](img/314861_5_En_8_Figa_HTML.gif)一个带阴影圆圈内字母 i 的图标，表示信息符号。  固定宽度数据是一种行和单元格的格式，与
  CSV 文件非常相似。然而，CSV 文件单元格由逗号或制表符分隔，而固定宽度数据则通过假定每个值具有特定长度来工作。第一个值可能是前九个字符，第二个值是其后的四个字符，依此类推。


  固定宽度数据通常用于遗留系统或嵌入式系统，是批处理的绝佳候选。处理本质上非事务性资源（例如，Web 服务或文件）的处理过程非常适合批处理，因为批处理提供了大多数
  Web 服务不会提供的重试/跳过/失败功能。


  理解 Spring Batch 不做什么也很重要。Spring Batch 是一个灵活但并非包罗万象的解决方案。正如 Spring 在可以避免的情况下不会重新发明轮子一样，Spring
  Batch 将一些重要的部分留给实现者自行决定。例如：Spring Batch 提供了一种通用机制来启动作业，无论是通过命令行、Unix cron、操作系统服务、Quartz（在第
  10 章中讨论），还是响应企业服务总线（ESB）上的事件（例如，Mule ESB 或 Spring 自己的类 ESB 解决方案 Spring Integration，在第
  12 章中讨论）。另一个例子是 Spring Batch 管理批处理进程状态的方式。Spring Batch 需要一个持久化存储。JobRepository（Spring
  Batch 提供的用于存储运行时数据的接口）唯一有用的实现需要数据库，因为数据库是事务性的，并且无需重新发明。然而，你应该部署到哪个数据库在很大程度上未指定，尽管当然为你提供了有用的默认值。




  ## 8-1\. 运行时元数据模型


  Spring Batch 与 `JobRepository` 协同工作，该仓库负责存储每个作业的所有知识与元数据（包括 `JobInstances`、`JobExecution`
  和 `StepExecution` 等组件部分）。每个 `Job` 由一个或多个按顺序执行的 `Step` 组成。在 Spring Batch 中，一个 `Step`
  可以有条件地跟随另一个 `Step`，从而实现基本的工作流。


  这些步骤也可以并发执行：两个步骤可以同时运行。


  当作业运行时，它通常与 `JobParameters` 结合，以参数化 `Job` 本身的行为。例如，一个作业可能接受一个日期参数来决定处理哪些记录。这种结合被称为
  `JobInstance`。由于关联的 `JobParameters` 不同，每个 `JobInstance` 都是唯一的。每次运行同一个 `JobInstance`（即相同的
  `Job` 和 `JobParameters`）时，都称为一次 `JobExecution`。这是该 `Job` 某个版本的运行时上下文。理想情况下，每个 `JobInstance`
  只应有一个 `JobExecution`：即该 `JobInstance` 首次运行时创建的 `JobExecution`。然而，如果出现任何错误，`JobInstance`
  应被重启；后续运行将创建另一个 `JobExecution`。对于原始作业中的每个步骤，`JobExecution` 中都有一个对应的 `StepExecution`。


  因此，你可以看到 Spring Batch 拥有一个镜像对象图，一个反映作业的设计/构建时视图，另一个反映作业的运行时视图。这种原型与实例之间的分离，与许多工作流引擎（包括
  jBPM）的工作方式非常相似。


  例如，假设每日报告在凌晨 2 点生成。作业的参数将是日期（很可能是前一天的日期）。在这种情况下，作业将包含一个加载步骤、一个汇总步骤和一个输出步骤。每天运行作业时，都会创建一个新的
  `JobInstance` 和 `JobExecution`。如果同一个 `JobInstance` 有任何重试，理论上会创建多个 `JobExecution`。


  ## 8-2\. 设置 Spring Batch 的基础设施


  ### 问题


  Spring Batch 为你的应用程序提供了极大的灵活性和保障，但它无法在真空中运行。为了完成其工作，`JobRepository` 需要一个数据库。此外，Spring
  Batch 还需要多个协作者才能正常工作。这些配置大多是样板代码。


  ### 解决方案


  在本方案中，你将设置 Spring Batch 数据库，并创建一个可供后续解决方案导入的 Spring 应用程序配置。这种配置重复且基本无趣。它还将告诉 Spring
  Batch 使用哪个数据库来存储其元数据。




  ### 工作原理


  `JobRepository` 接口是你在设置 Spring Batch 流程时首先要处理的内容。通常你不会在代码中直接操作它，但在 Spring 配置中，它是让其他一切正常工作的关键。`JobRepository`
  接口只有一个真正有用的实现，名为 `SimpleJobRepository`，它将批处理流程的状态信息存储在数据库中。其创建是通过 `JobRepositoryFactoryBean`
  完成的。另一个标准工厂 `MapJobRepositoryFactoryBean` 主要用于测试，因为它的状态不是持久的——它是一个内存实现。这两个工厂都会创建
  `SimpleJobRepository` 的实例。


  由于这个 `JobRepository` 实例在你的数据库上工作，你需要为 Spring Batch 设置好模式。不同数据库的模式文件位于 Spring Batch
  发行版中。初始化数据库最简单的方法是在 Java 配置中使用 `DataSourceInitializer`。这些文件可以在 `org/springframework/batch/core`
  目录中找到。其中有几个 `.sql` 文件，每个文件都包含所选数据库所需模式的数据定义语言（DDL，用于定义和检查数据库结构的 SQL 子集）。在这些示例中，我们将使用
  H2，因此我们将使用 H2 的 DDL：`schema-h2.sql`。请确保按照以下配置对其进行配置，并告知 Spring Batch。


  ```

  @ComponentScan("com.apress.spring6recipes.springbatch")

  @PropertySource("classpath:batch.properties")

  public class BatchConfiguration {

  @Bean

  public DataSource dataSource(Environment env) {

  var dataSource = new DriverManagerDataSource();

  dataSource.setUrl(env.getRequiredProperty("datasource.url"));

  dataSource.setUsername(env.getRequiredProperty("datasource.username"));

  dataSource.setPassword(env.getRequiredProperty("datasource.password"));

  return dataSource;

  }

  @Bean

  public DataSourceInitializer dataSourceInitializer(

  DataSource dataSource,

  DatabasePopulator databasePopulator) {

  var initializer = new DataSourceInitializer();

  initializer.setDataSource(dataSource);

  initializer.setDatabasePopulator(databasePopulator);

  return initializer;

  }

  @Bean

  public DatabasePopulator databasePopulator() {

  var databasePopulator = new ResourceDatabasePopulator();

  databasePopulator.setContinueOnError(true);

  databasePopulator.addScript(

  new ClassPathResource("org/springframework/batch/core/schema-h2.sql"));

  databasePopulator.addScript(

  new ClassPathResource("sql/reset_user_registration.sql"));

  return databasePopulator;

  }

  @Bean

  public DataSourceTransactionManager transactionManager(DataSource dataSource) {

  return new DataSourceTransactionManager(dataSource);

  }

  @Bean

  public JobRepositoryFactoryBean jobRepository(

  DataSource dataSource,

  PlatformTransactionManager transactionManager) {

  var jobRepositoryFactoryBean = new JobRepositoryFactoryBean();

  jobRepositoryFactoryBean.setDataSource(dataSource);

  jobRepositoryFactoryBean.setTransactionManager(transactionManager);

  return jobRepositoryFactoryBean;

  }

  @Bean

  public TaskExecutorJobLauncher jobLauncher(JobRepository jobRepository) {

  var jobLauncher = new TaskExecutorJobLauncher();

  jobLauncher.setJobRepository(jobRepository);

  return jobLauncher;

  }

  @Bean

  public JobRegistryBeanPostProcessor jobRegistryBeanPostProcessor(

  JobRegistry jobRegistry) {

  var jobRegistryBeanPostProcessor = new JobRegistryBeanPostProcessor();

  jobRegistryBeanPostProcessor.setJobRegistry(jobRegistry);

  return jobRegistryBeanPostProcessor;

  }

