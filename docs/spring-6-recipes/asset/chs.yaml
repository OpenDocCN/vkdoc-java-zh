- "# 6. 数据访问\n\n在本章中，你将学习 Spring 如何简化你的数据库访问任务（Spring 也能简化 NoSQL 和大数据任务，这将在第 9 章中介绍）。数据访问是大多数企业应用程序的常见需求，这些应用通常需要访问存储在关系数据库中的数据。作为\
  \ Java SE 的重要组成部分，Java 数据库连接（JDBC）定义了一套标准 API，让你能够以与供应商无关的方式访问关系数据库。\n\nJDBC 的目的是提供一套\
  \ API，通过这些 API 你可以针对数据库执行 SQL 语句。然而，在使用 JDBC 时，你必须自行管理数据库相关资源，并显式处理数据库异常。为了让 JDBC\
  \ 更易于使用，Spring 提供了一个用于与 JDBC 交互的抽象框架。作为 Spring JDBC 框架的核心，JDBC 模板旨在为不同类型的 JDBC 操作提供模板方法。每个模板方法负责控制整体流程，并允许你覆盖流程中的特定任务。\n\
  \n如果原始的 JDBC 无法满足你的需求，或者你认为你的应用程序可以从更高级别的抽象中受益，那么 Spring 对 ORM 解决方案的支持将会引起你的兴趣。在本章中，你还将学习如何将对象/关系映射（ORM）框架集成到你的\
  \ Spring 应用程序中。Spring 支持大多数流行的 ORM（或数据映射器）框架，包括 Hibernate 和 Java 持久化 API（JPA）。本章的重点将放在\
  \ Hibernate 和 JPA 上。不过，Spring 对 ORM 框架的支持是一致的，因此你可以轻松地将本章中的技术应用于其他 ORM 框架。\n\nORM\
  \ 是一种将对象持久化到关系数据库中的技术。ORM 框架根据你提供的映射元数据（基于 XML 或注解）来持久化对象，例如类与表、属性与列之间的映射等。它在运行时生成用于对象持久化的\
  \ SQL 语句，因此除非你想利用数据库特定的功能或提供自己优化的 SQL 语句，否则你无需编写特定于数据库的 SQL 语句。与直接使用 JDBC 相比，ORM\
  \ 框架可以显著减少应用程序的数据访问工作量。\n\nHibernate 是 Java 社区中一个流行的开源高性能 ORM 框架。Hibernate 支持大多数符合\
  \ JDBC 标准的数据库，并且可以使用特定的方言来访问特定的数据库。除了基本的 ORM 功能外，Hibernate 还支持更高级的功能，如缓存、级联和延迟加载。它还定义了一种名为\
  \ Hibernate 查询语言（HQL）的查询语言，让你能够编写简单但功能强大的对象查询。\n\nJPA 为 Java SE 和 Java EE 平台中的对象持久化定义了一套标准的注解和\
  \ API。JPA 被定义为 [Jakarta Persistence](https://jakarta.ee/specifications/persistence/)\
  \ 规范。JPA 只是一套标准 API，需要一个符合 JPA 规范的引擎来提供持久化服务。你可以将 JPA 与 JDBC API 进行比较，将 JPA 引擎与\
  \ JDBC 驱动程序进行比较。Hibernate 可以通过一个名为 Hibernate EntityManager 的扩展模块配置为符合 JPA 规范的引擎。本章将主要演示以\
  \ Hibernate 作为底层引擎的 JPA。\n\n## 6-1. 直接使用 JDBC 的问题\n\n假设你要开发一个车辆注册应用程序，其主要功能是对车辆记录进行基本的创建、读取、更新和删除（CRUD）操作。这些记录将存储在关系数据库中，并通过\
  \ JDBC 进行访问。首先，你设计了以下 `Vehicle` 类，它在 Java 中表示一辆车。\n\n```\npackage com.apress.spring6recipes.vehicle;\n\
  public class Vehicle {\nprivate String vehicleNo;\nprivate String color;\nprivate\
  \ int wheel;\nprivate int seat;\n// 构造方法、Getter 和 Setter\n...\n}\n清单 6-1\nVehicle\
  \ 类\n```\n\n## 6-2. 设置应用程序数据库\n\n你将使用的数据库是 PostgreSQL。\n\n![](img/314861_5_En_6_Figa_HTML.gif)一个带阴影圆圈内字母\
  \ i 的图标，表示信息符号。 本章的示例代码在 `bin` 目录中提供了用于启动和连接到基于 Docker 的 PostgreSQL 实例的脚本。要启动该实例并创建数据库，请按照以下步骤操作：\n\
  \n1.  执行 `bin\\postgres.sh`；这将下载并启动 Postgres Docker 容器。\n\n2.  执行 `bin\\psql.sh`；这将连接到正在运行的\
  \ Postgres 容器。\n\n3.  执行 `CREATE DATABASE vehicle;` 来创建用于示例的数据库。\n\n4.  接下来，你必须使用以下\
  \ SQL 语句创建 `VEHICLE` 表来存储车辆记录。默认情况下，此表将在 APP 数据库的 APP 数据库模式中创建：\n\n```\nCREATE TABLE\
  \ VEHICLE (\nVEHICLE_NO    VARCHAR(10)    NOT NULL,\nCOLOR         VARCHAR(10),\n\
  WHEEL         INT,\nSEAT          INT,\nPRIMARY KEY (VEHICLE_NO)\n);\n```\n\n表 6-1\n\
  \n用于连接应用程序数据库的 JDBC 属性\n\n| 属性 | 值 |\n| --- | --- |\n| 驱动类 | `org.postgresql.Driver`\
  \ |\n| URL | `jdbc:postgresql://localhost:5432/vehicle` |\n| 用户名 | `postgres` |\n\
  | 密码 | `password` |\n\n### 理解数据访问对象设计模式\n\n一个典型的设计错误是将不同类型的逻辑（例如，表示逻辑、业务逻辑和数据访问逻辑）混合在单个大型模块中。这降低了模块的可重用性和可维护性，因为它引入了紧密耦合。数据访问对象（DAO）模式的总体目标是通过将数据访问逻辑与业务逻辑和表示逻辑分离来避免这些问题。该模式建议将数据访问逻辑封装在称为数据访问对象的独立模块中。\n\
  \n对于你的车辆注册应用程序，你可以抽象出插入、更新、删除和查询车辆的数据访问操作。这些操作应在 DAO 接口中声明，以允许使用不同的 DAO 实现技术。\n\n\
  ```\npackage com.apress.spring6recipes.vehicle;\nimport java.util.Collection;\n\
  import java.util.List;\npublic interface VehicleDao {\nvoid insert(Vehicle vehicle);\n\
  void update(Vehicle vehicle);\nvoid delete(Vehicle vehicle);\nVehicle findByVehicleNo(String\
  \ vehicleNo);\nList findAll();\ndefault void insert(Collection vehicles) {\nvehicles.forEach(this::insert);\n\
  }\n}\n清单 6-2\nVehicleDao 接口\n```\n\nJDBC API 的大部分内容都声明抛出 `java.sql.SQLException`。但由于此接口旨在仅抽象数据访问操作，因此它不应依赖于实现技术。因此，这个通用接口声明抛出\
  \ JDBC 特定的 `SQLException` 是不明智的。实现 DAO 接口时的一种常见做法是将此类异常包装在运行时异常中（可以是自定义的业务 Exception\
  \ 子类，也可以是通用的异常）。\n\n\n\n### 使用 JDBC 实现 DAO\n\n要使用 JDBC 访问数据库，你需要为该 DAO 接口创建一个实现（例如\
  \ `JdbcVehicleDao`）。由于你的 DAO 实现必须连接数据库以执行 SQL 语句，你可以通过指定驱动类名、数据库 URL、用户名和密码来建立数据库连接。不过，你也可以从一个预先配置好的\
  \ `javax.sql.DataSource` 对象中获取数据库连接，而无需了解连接细节。\n\n```\npackage com.apress.spring6recipes.vehicle;\n\
  import javax.sql.DataSource;\nimport java.sql.PreparedStatement;\nimport java.sql.ResultSet;\n\
  import java.sql.SQLException;\nimport java.util.ArrayList;\nimport java.util.List;\n\
  public class PlainJdbcVehicleDao implements VehicleDao {\nprivate static final String\
  \ INSERT_SQL = \"INSERT INTO VEHICLE (COLOR, WHEEL, SEAT, VEHICLE_NO) VALUES (?,\
  \ ?, ?, ?)\";\nprivate static final String UPDATE_SQL = \"UPDATE VEHICLE SET COLOR=?,WHEEL=?,SEAT=?\
  \ WHERE VEHICLE_NO=?\";\nprivate static final String SELECT_ALL_SQL = \"SELECT *\
  \ FROM VEHICLE\";\nprivate static final String SELECT_ONE_SQL = \"SELECT * FROM\
  \ VEHICLE WHERE VEHICLE_NO = ?\";\nprivate static final String DELETE_SQL = \"DELETE\
  \ FROM VEHICLE WHERE VEHICLE_NO=?\";\nprivate final DataSource dataSource;\npublic\
  \ PlainJdbcVehicleDao(DataSource dataSource) {\nthis.dataSource = dataSource;\n\
  }\n@Override\npublic void insert(Vehicle vehicle) {\ntry (var conn = dataSource.getConnection();\n\
  var ps = conn.prepareStatement(INSERT_SQL)) {\nprepareStatement(ps, vehicle);\n\
  ps.executeUpdate();\n} catch (SQLException e) {\nthrow new RuntimeException(e);\n\
  }\n}\n@Override\npublic Vehicle findByVehicleNo(String vehicleNo) {\ntry (var conn\
  \ = dataSource.getConnection();\nvar ps = conn.prepareStatement(SELECT_ONE_SQL))\
  \ {\nps.setString(1, vehicleNo);\nVehicle vehicle = null;\ntry (var rs = ps.executeQuery())\
  \ {\nif (rs.next()) {\nvehicle = toVehicle(rs);\n}\n}\nreturn vehicle;\n} catch\
  \ (SQLException e) {\nthrow new RuntimeException(e);\n}\n}\n@Override\npublic void\
  \ update(Vehicle vehicle) {\ntry (var conn = dataSource.getConnection();\nvar ps\
  \ = conn.prepareStatement(UPDATE_SQL)) {\nprepareStatement(ps, vehicle);\nps.executeUpdate();\n\
  } catch (SQLException e) {\nthrow new RuntimeException(e);\n}\n}\n@Override\npublic\
  \ void delete(Vehicle vehicle) {\ntry (var conn = dataSource.getConnection();\n\
  var ps = conn.prepareStatement(DELETE_SQL)) {\nps.setString(1, vehicle.getVehicleNo());\n\
  ps.executeUpdate();\n} catch (SQLException e) {\nthrow new RuntimeException(e);\n\
  }\n}\nprivate Vehicle toVehicle(ResultSet rs) throws SQLException {\nreturn new\
  \ Vehicle(rs.getString(\"VEHICLE_NO\"), rs.getString(\"COLOR\"), rs.getInt(\"WHEEL\"\
  ), rs.getInt(\"SEAT\"));\n}\nprivate void prepareStatement(PreparedStatement ps,\
  \ Vehicle vehicle) throws SQLException {\nps.setString(1, vehicle.getColor());\n\
  ps.setInt(2, vehicle.getWheel());\nps.setInt(3, vehicle.getSeat());\nps.setString(4,\
  \ vehicle.getVehicleNo());\n}\n}\n清单 6-3\n纯 JDBC VehicleDao 实现\n```\n\n车辆插入操作是一个典型的\
  \ JDBC 更新场景。每次调用此方法时，你都会从数据源获取一个连接，并在此连接上执行 SQL 语句。你的 DAO 接口没有声明抛出任何受检异常，因此如果发生\
  \ `SQLException`，你必须将其包装成一个非受检的 `RuntimeException`。（本章稍后会详细讨论如何在 DAO 中处理异常。）此处展示的代码使用了所谓的\
  \ try-with-resources 机制，该机制会自动关闭已使用的资源（即 `Connection`、`PreparedStatement` 和 `ResultSet`）。如果你不使用\
  \ try-with-resources 块，则必须记得正确关闭已使用的资源。否则会导致连接泄漏。\n\n这里将跳过 `update` 和 `delete` 操作，因为从技术角度来看，它们与插入操作非常相似。对于查询操作，除了执行\
  \ SQL 语句外，你还需要从返回的结果集中提取数据以构建车辆对象。`toVehicle` 方法是一个简单的辅助方法，用于复用映射逻辑，而 `prepareStatement`\
  \ 方法则帮助为插入和更新方法设置参数。\n\n\n### 在 Spring 中配置数据源\n\n`javax.sql.DataSource` 接口是 JDBC\
  \ 规范定义的一个标准接口，用于工厂化生产 `Connection` 实例。不同供应商和项目提供了多种数据源实现：HikariCP 和 Apache Commons\
  \ DBCP 是流行的开源选择，大多数应用服务器也会提供自己的实现。由于它们都实现了通用的 `DataSource` 接口，因此在不同数据源实现之间切换非常容易。作为\
  \ Java 应用框架，Spring 也提供了几个便捷但功能较弱的数据源实现。最简单的是 `DriverManagerDataSource`，它会在每次请求连接时打开一个新连接。\n\
  \n```\npackage com.apress.spring6recipes.vehicle.config;\nimport javax.sql.DataSource;\n\
  import org.postgresql.Driver;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jdbc.datasource.SimpleDriverDataSource;\n\
  import com.apress.spring6recipes.vehicle.PlainJdbcVehicleDao;\nimport com.apress.spring6recipes.vehicle.VehicleDao;\n\
  @Configuration\npublic class VehicleConfiguration {\n@Bean\npublic VehicleDao vehicleDao(DataSource\
  \ dataSource) {\nreturn new PlainJdbcVehicleDao(dataSource);\n}\n@Bean\npublic DataSource\
  \ dataSource() {\nvar dataSource = new SimpleDriverDataSource();\ndataSource.setDriverClass(Driver.class);\n\
  dataSource.setUrl(\"jdbc:postgresql://localhost:5432/vehicle\");\ndataSource.setUsername(\"\
  postgres\");\ndataSource.setPassword(\"password\");\nreturn dataSource;\n}\n}\n\
  清单 6-4\n车辆 JDBC 配置\n```\n\n`SimpleDriverDataSource`（及其同类 `DriverManagerDataSource`）并不是高效的数据源实现，因为它每次请求都会为客户端打开一个新连接。Spring\
  \ 提供的另一个数据源实现是 `SingleConnectionDataSource`（`DriverManagerDataSource` 的子类）。顾名思义，它只维护一个单一连接，该连接始终被重用且从不关闭。显然，它不适用于多线程环境。\n\
  \nSpring 自身的数据源实现主要用于测试目的。然而，许多生产环境的数据源实现都支持连接池。例如，[HikariCP](https://github.com/brettwooldridge/HikariCP)\
  \ 提供了 `HikariDataSource`，它接受与 `DriverManagerDataSource` 相同的连接属性，并允许你指定连接池的最小池大小和最大活动连接数等参数。\n\
  \n```\n@Bean\npublic DataSource dataSource() {\nvar dataSource = new HikariDataSource();\n\
  dataSource.setDataSourceClassName(\"org.postgresql.ds.PGSimpleDataSource\");\ndataSource.setJdbcUrl(\"\
  jdbc:postgresql://localhost:5432/vehicle\");\ndataSource.setUsername(\"postgres\"\
  );\ndataSource.setPassword(\"password\");\ndataSource.setMinimumIdle(2);\ndataSource.setMaximumPoolSize(5);\n\
  return dataSource;\n}\n清单 6-5\n使用连接池的车辆 JDBC 配置\n```\n\n![](img/314861_5_En_6_Figb_HTML.gif)一个带阴影圆圈内字母\
  \ i 的图标，代表信息符号。 要使用 HikariCP 提供的数据源实现，你必须将它们添加到你的 CLASSPATH 中。\n\n*Gradle 依赖*\n\n\
  ```\nimplementation 'com.zaxxer:HikariCP:5.0.1'\n```\n\n*Maven 依赖*\n\n```\n<dependency>\n\
  \    <groupId>com.zaxxer</groupId>\n    <artifactId>HikariCP</artifactId>\n    <version>5.0.1</version>\n\
  </dependency>\n```\n\n许多 Jakarta EE 应用服务器都内置了数据源实现，你可以通过服务器控制台或配置文件进行配置。如果你在应用服务器中配置了一个数据源并暴露给\
  \ JNDI 查找，你可以使用 `JndiDataSourceLookup` 来查找它。\n\n```\n@Bean\npublic DataSource dataSource()\
  \ {\nreturn new JndiDataSourceLookup().getDataSource(\"jdbc/VehicleDS\");\n}\n清单\
  \ 6-6\nJNDI 查找\n```\n\n### 运行 DAO\n\n下面的 `Main` 类通过使用 DAO 向数据库插入一辆新车来测试它。如果成功，你可以立即从数据库中查询该车辆。\n\
  \n```\npackage com.apress.spring6recipes.vehicle;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import com.apress.spring6recipes.vehicle.config.VehicleConfiguration;\npublic class\
  \ Main {\npublic static void main(String[] args) throws Exception {\nvar cfg = VehicleConfiguration.class;\n\
  try (var ctx = new AnnotationConfigApplicationContext(cfg)) {\nvar vehicleDao =\
  \ ctx.getBean(VehicleDao.class);\nvar vehicle = new Vehicle(\"TEM0001\", \"Red\"\
  , 4, 4);\nvehicleDao.insert(vehicle);\nvehicle = vehicleDao.findByVehicleNo(\"TEM0001\"\
  );\nSystem.out.println(vehicle);\n}\n}\n}\n清单 6-7\n主类\n```\n\n现在你可以直接使用 JDBC 实现一个\
  \ DAO。然而，从上面的 DAO 实现可以看出，大部分 JDBC 代码都是相似的，并且每次数据库操作都需要重复编写。这种冗余代码会使你的 DAO 方法变得冗长且可读性差。\n\
  \n### 更进一步\n\n另一种方法是使用 ORM（对象/关系映射）工具，它允许你专门编写将领域模型中的实体映射到数据库表的逻辑。ORM 会反过来找出如何编写逻辑，以有效地将类的数据持久化到数据库中。这可以非常解放：你突然只需要关注你的业务和领域模型，而不必受数据库\
  \ SQL 解析器的摆布。当然，另一面是，你也放弃了对你客户端和数据库之间通信的完全控制——你必须信任 ORM 层会做正确的事情。\n\n## 6-3\\. 使用\
  \ JDBC 模板操作数据库\n\n### 问题\n\n使用 JDBC 既繁琐又充满了冗余的 API 调用，其中许多调用本可以为你管理。要实现一个 JDBC 更新操作，你必须执行以下任务，其中大部分是冗余的：\n\
  \n1.  从数据源获取数据库连接。\n2.  从连接创建 PreparedStatement 对象。\n3.  将参数绑定到 PreparedStatement\
  \ 对象。\n4.  执行 PreparedStatement 对象。\n5.  处理 SQLException。\n\nJDBC 是一个低级 API，但使用\
  \ JDBC 模板后，你需要处理的 API 表面区域会变得更具表现力（你花在细节上的时间更少，花在应用程序逻辑上的时间更多），并且更易于安全地使用。\n\n###\
  \ 解决方案\n\n`org.springframework.jdbc.core.JdbcTemplate` 类声明了许多重载的 `update()` 模板方法，以控制整个更新过程。不同版本的\
  \ `update()` 方法允许你覆盖默认过程中不同的任务子集。Spring JDBC 框架预定义了多个回调接口来封装不同的任务子集。你可以实现其中一个回调接口，并将其实例传递给相应的\
  \ `update()` 方法以完成该过程。\n\n### 工作原理\n\n\n\n#### 使用语句创建器更新数据库\n\n首先要介绍的回调接口是 `PreparedStatementCreator`。实现此接口是为了覆盖整个更新过程中的语句创建任务（任务\
  \ 2）和参数绑定任务（任务 3）。要将车辆插入数据库，可以按如下方式实现 `PreparedStatementCreator` 接口。\n\n```\npackage\
  \ com.apress.spring6recipes.vehicle;\nimport java.sql.Connection;\nimport java.sql.PreparedStatement;\n\
  import java.sql.ResultSet;\nimport java.sql.SQLException;\nimport java.util.ArrayList;\n\
  import java.util.List;\nimport javax.sql.DataSource;\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  import org.springframework.jdbc.core.PreparedStatementCreator;\npublic class JdbcVehicleDao\
  \ implements VehicleDao {\nprivate void prepareStatement(PreparedStatement ps, Vehicle\
  \ vehicle)\nthrows SQLException {\nps.setString(1, vehicle.getColor());\nps.setInt(2,\
  \ vehicle.getWheel());\nps.setInt(3, vehicle.getSeat());\nps.setString(4, vehicle.getVehicleNo());\n\
  }\nprivate class InsertVehicleStatementCreator implements PreparedStatementCreator\
