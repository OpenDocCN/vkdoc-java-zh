  \ JDBC 模板创建\n\n### 问题\n\n每次需要 `JdbcTemplate` 时都创建一个新实例效率不高，因为你必须重复编写创建语句，并且会产生创建新对象的开销。\n\
  \n### 解决方案\n\n`JdbcTemplate` 类被设计为线程安全的，因此你可以在 IoC 容器中声明它的单个实例，并将此实例注入到所有 DAO 实例中。此外，Spring\
