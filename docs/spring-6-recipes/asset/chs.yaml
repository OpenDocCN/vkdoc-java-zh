  \ 的实现。该类声明了一个 `jdbcTemplate` 属性，该属性可以从 IoC 容器注入，或者从数据源自动创建，例如 `JdbcTemplate jdbcTemplate\
  \ = new JdbcTemplate(dataSource)`。你的 DAO 可以继承此类以继承此属性。\n\n### 工作原理\n\n#### 注入 JDBC\
  \ 模板\n\n到目前为止，你在每个 DAO 方法中都创建了一个新的 `JdbcTemplate` 实例。实际上，你可以在类级别注入它，并在所有 DAO 方法中使用这个注入的实例。为简单起见，以下代码仅显示对\
  \ `insert()` 方法的更改。\n\n```\npackage com.apress.spring6recipes.vehicle;\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  public class JdbcVehicleDao implements VehicleDao {\nprivate final JdbcTemplate\
  \ jdbcTemplate;\npublic JdbcVehicleDao(JdbcTemplate jdbcTemplate) {\nthis.jdbcTemplate\
  \ = jdbcTemplate;\n}\n@Override\npublic void insert(Vehicle vehicle) {\njdbcTemplate.update(INSERT_SQL,\
  \ vehicle.getColor(), vehicle.getWheel(),\nvehicle.getSeat(), vehicle.getVehicleNo());\n\
  }\n}\n清单 6-29\n在类级别注入 JdbcTemplate\n```\n\nJDBC 模板需要设置一个数据源。你可以通过 setter 方法或构造函数参数注入此属性。然后，你可以将此\
  \ JDBC 模板注入到你的 DAO 中。\n\n```\npackage com.apress.spring6recipes.vehicle.config;\n\
  import javax.sql.DataSource;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  import com.apress.spring6recipes.vehicle.JdbcVehicleDao;\nimport com.apress.spring6recipes.vehicle.VehicleDao;\n\
  import com.zaxxer.hikari.HikariDataSource;\n@Configuration\npublic class VehicleConfiguration\
  \ {\n@Bean\npublic VehicleDao vehicleDao(JdbcTemplate jdbcTemplate) {\nreturn new\
  \ JdbcVehicleDao(jdbcTemplate);\n}\n@Bean\npublic JdbcTemplate jdbcTemplate(DataSource\
  \ dataSource) {\nreturn new JdbcTemplate(dataSource);\n}\n@Bean\npublic DataSource\
  \ dataSource() {\nvar dataSource = new HikariDataSource();\ndataSource.setDataSourceClassName(\"\
  org.postgresql.ds.PGSimpleDataSource\");\ndataSource.setJdbcUrl(\"jdbc:postgresql://localhost:5432/vehicle\"\
  );\ndataSource.setUsername(\"postgres\");\ndataSource.setPassword(\"password\");\n\
  dataSource.setMinimumIdle(2);\ndataSource.setMaximumPoolSize(5);\nreturn dataSource;\n\
  }\n}\n清单 6-30\nVehicleDao 配置\n```\n\n#### 扩展 JdbcDaoSupport 类\n\n`org.springframework.jdbc.core.support.JdbcDaoSupport`\
  \ 类具有 `setDataSource()` 方法和 `setJdbcTemplate()` 方法。你的 DAO 类可以继承此类以继承这些方法。然后，你可以直接注入\
  \ JDBC 模板，或者注入一个数据源供其创建 JDBC 模板。\n\n在你的 DAO 方法中，你可以简单地调用 `getJdbcTemplate()` 方法来获取\
  \ JDBC 模板。你还必须从 DAO 类中删除 `dataSource` 和 `jdbcTemplate` 属性及其 setter 方法，因为它们已经被继承了。同样，为简单起见，仅显示对\
  \ `insert()` 方法的更改。\n\n```\npackage com.apress.spring6recipes.vehicle;\npublic class\
  \ JdbcVehicleDao implements VehicleDao {\nprivate static final String INSERT_SQL\
  \ = \"INSERT INTO VEHICLE (COLOR, WHEEL, SEAT, VEHICLE_NO) VALUES (?, ?, ?, ?)\"\
  ;\npublic JdbcVehicleDao(JdbcTemplate jdbcTemplate) {\nthis.jdbcTemplate = jdbcTemplate;\n\
  }\n@Override\npublic void insert(Vehicle vehicle) {\njdbcTemplate.update(INSERT_SQL,\
  \ vehicle.getColor(), vehicle.getWheel(),\nvehicle.getSeat(), vehicle.getVehicleNo());\n\
  }\n清单 6-31\n基于 Spring JdbcDaoSupport 的 VehicleDao 实现\n```\n\n通过扩展 `JdbcDaoSupport`，你的\
  \ DAO 类继承了 `setDataSource()` 方法。你可以将数据源注入到 DAO 实例中，供其创建 JDBC 模板。\n\n```\n@Configuration\n\
  public class VehicleConfiguration {\n...\n@Bean\npublic VehicleDao vehicleDao(DataSource\
  \ dataSource) {\nvar vehicleDao = new JdbcVehicleDao();\nvehicleDao.setDataSource(dataSource);\n\
  return vehicleDao;\n}\n}\n清单 6-32\nVehicleDao 配置\n```\n\n## 6-6\\. 在 JDBC 模板中使用命名参数\n\
  \n### 问题\n\n在经典的 JDBC 用法中，SQL 参数由占位符 `?` 表示，并按位置绑定。位置参数的问题在于，只要参数顺序发生变化，就必须同时更改参数绑定。对于包含许多参数的\
  \ SQL 语句，按位置匹配参数非常繁琐。\n\n### 解决方案\n\n在 Spring JDBC 框架中绑定 SQL 参数时的另一种选择是使用命名参数。顾名思义，命名\
  \ SQL 参数按名称（以冒号开头）指定，而不是按位置。命名参数更易于维护，并且还能提高可读性。在运行时，框架类会用占位符替换命名参数。`NamedParameterJdbcTemplate`\
  \ 支持命名参数。\n\n\n\n### 工作原理\n\n在 SQL 语句中使用命名参数时，你可以将参数值以映射（Map）的形式提供，其中参数名作为键。\n\n\
  ```\npackage com.apress.spring6recipes.vehicle;\n...\nimport org.springframework.jdbc.core.namedparam.NamedParameterJdbcDaoSupport;\n\
  public class JdbcVehicleDao extends NamedParameterJdbcDaoSupport\nimplements VehicleDao\
  \ {\nprivate static final String INSERT_SQL = \"INSERT INTO VEHICLE (COLOR, WHEEL,\
  \ SEAT, VEHICLE_NO) VALUES (:color, :wheel, :seat, :vehicleNo)\";\npublic void insert(Vehicle\
  \ vehicle) {\ngetNamedParameterJdbcTemplate().update(INSERT_SQL, toParameterMap(vehicle));\n\
  }\nprivate Map toParameterMap(Vehicle vehicle) {\nvar parameters = new HashMap();\n\
  parameters.put(\"vehicleNo\", vehicle.getVehicleNo());\nparameters.put(\"color\"\
  , vehicle.getColor());\nparameters.put(\"wheel\", vehicle.getWheel());\nparameters.put(\"\
  seat\", vehicle.getSeat());\nreturn parameters;\n}\n...\n}\n清单 6-33\n基于 Spring NamedParameterJdbcDaoSupport\
  \ 的 VehicleDao 实现——使用 Map\n```\n\n你也可以提供一个 SQL 参数源，其职责是为命名 SQL 参数提供 SQL 参数值。`SqlParameterSource`\
  \ 接口有三种实现。最基本的是 `MapSqlParameterSource`，它将一个 Map 包装为其参数源。在本例中，与上一个示例相比，这反而增加了开销，因为我们引入了一个额外的对象——`SqlParameterSource`。\n\
  \n```\npackage com.apress.spring6recipes.vehicle;\n...\nimport org.springframework.jdbc.core.namedparam.MapSqlParameterSource;\n\
  import org.springframework.jdbc.core.namedparam.SqlParameterSource;\nimport org.springframework.jdbc.core.namedparam.NamedParameterJdbcDaoSupport;\n\
  public class JdbcVehicleDao extends NamedParameterJdbcDaoSupport\nimplements VehicleDao\
  \ {\npublic void insert(Vehicle vehicle) {\nvar parameterSource = new MapSqlParameterSource(toParameterMap(vehicle));\n\
  getNamedParameterJdbcTemplate().update(INSERT_SQL, parameterSource);\n}\n...\n}\n\
  清单 6-34\n基于 Spring NamedParameterJdbcDaoSupport 的 VehicleDao 实现——使用 MapSqlParameterSource\n\
  ```\n\n当我们需要在传递给 update 方法的参数与其值的来源之间增加一层间接性时，它的威力就显现出来了。例如，如果我们想从 JavaBean 中获取属性呢？这正是\
  \ `SqlParameterSource` 中介开始发挥作用的地方！`SqlParameterSource` 是 `BeanPropertySqlParameterSource`，它将一个普通的\
  \ Java 对象包装为 SQL 参数源。对于每个命名参数，同名的属性将被用作参数值。\n\n```\npackage com.apress.spring6recipes.vehicle;\n\
  import org.springframework.jdbc.core.namedparam.BeanPropertySqlParameterSource;\n\
  import org.springframework.jdbc.core.namedparam.SqlParameterSource;\nimport org.springframework.jdbc.core.namedparam.NamedParameterJdbcDaoSupport;\n\
  public class JdbcVehicleDao extends NamedParameterJdbcDaoSupport\nimplements VehicleDao\
  \ {\npublic void insert(Vehicle vehicle) {\nvar parameterSource = new BeanPropertySqlParameterSource(vehicle);\n\
  getNamedParameterJdbcTemplate ().update(INSERT_SQL, parameterSource);\n}\n}\n清单\
  \ 6-35\n基于 Spring NamedParameterJdbcDaoSupport 的 VehicleDao 实现——使用 BeanPropertySqlParameterSource\n\
  ```\n\n命名参数也可以用于批量更新。你可以提供一个 `Map`、一个数组或一个 `SqlParameterSource` 数组作为参数值。\n\n```\n\
  package com.apress.spring6recipes.vehicle;\n...\nimport org.springframework.jdbc.core.namedparam.BeanPropertySqlParameterSource;\n\
  import org.springframework.jdbc.core.namedparam.SqlParameterSource;\nimport org.springframework.jdbc.core.namedparam.NamedParameterJdbcDaoSupport;\n\
  public class JdbcVehicleDao extends NamedParameterJdbcDaoSupport implements VehicleDao\
  \ {\n...\n@Override\npublic void insert(Collection vehicles) {\nvar sources = vehicles.stream()\n\
  .map(BeanPropertySqlParameterSource::new)\n.toArray(SqlParameterSource[]::new);\n\
  getNamedParameterJdbcTemplate().batchUpdate(INSERT_SQL, sources);\n}\n}\n清单 6-36\n\
  基于 Spring NamedParameterJdbcDaoSupport 的 VehicleDao 实现——批量更新\n```\n\n## 6-7\\. 处理\
  \ Spring JDBC 框架中的异常\n\n### 问题\n\n许多 JDBC API 声明会抛出 `java.sql.SQLException`，这是一个必须捕获的受检异常。每次执行数据库操作时都要处理这类异常非常麻烦。你通常需要定义自己的策略来处理这类异常。否则可能导致异常处理不一致。\n\
  \n### 解决方案\n\nSpring 框架为其数据访问模块（包括 JDBC 框架）提供了一致的数据访问异常处理机制。通常，Spring JDBC 框架抛出的所有异常都是\
  \ `org.springframework.dao.DataAccessException` 的子类，这是一种 `RuntimeException`，你不必强制捕获它。它是\
  \ Spring 数据访问模块中所有异常的根异常类。\n\n图 6-1 仅展示了 Spring 数据访问模块中 `DataAccessException` 层次结构的一部分。总共定义了\
  \ 30 多个异常类，用于不同类别的数据访问异常。\n\n![](img/314861_5_En_6_Fig1_HTML.png)\n\n数据访问异常流程图。1，运行时异常来自\
  \ 2 个嵌套的运行时异常。2，数据完整性违规、无效的数据访问资源使用、数据访问资源失败以及未分类的数据访问异常。错误的 SQL 语法、类型不匹配的数据访问属于无效的\
  \ DA，未分类的 SQL 属于未分类的 DA。\n\n图 6-1\nDataAccessException 层次结构中的常见异常类\n\n### 工作原理\n\
  \n\n\n#### 理解 Spring JDBC 框架中的异常处理\n\n到目前为止，在使用 JDBC 模板或 JDBC 操作对象时，你还没有显式地处理过 JDBC\
  \ 异常。为了帮助你理解 Spring JDBC 框架的异常处理机制，让我们看看 `Main` 类中的以下代码片段，该片段用于插入一辆车。如果插入一辆车牌号重复的车辆会发生什么？\n\
  \n```\npackage com.apress.spring6recipes.vehicle;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import com.apress.spring6recipes.vehicle.config.VehicleConfiguration;\npublic class\
  \ Main {\npublic static void main(String[] args) throws Exception {\nvar cfg = VehicleConfiguration.class;\n\
  try (var context = new AnnotationConfigApplicationContext(cfg)) {\nvar vehicleDao\
  \ = context.getBean(VehicleDao.class);\nvar vehicle = new Vehicle(\"EX0001\", \"\
  Green\", 4, 4);\nvehicleDao.insert(vehicle);\n}\n}\n}\n代码清单 6-37\nMain 类\n```\n\n\
  如果你运行该方法两次，或者该车辆已插入数据库，它将抛出一个 `DuplicateKeyException`，这是 `DataAccessException` 的间接子类。在你的\
  \ DAO 方法中，你既不需要用 `try/catch` 块包围代码，也不需要在该方法签名中声明抛出异常。这是因为 `DataAccessException`（以及它的子类，包括\
  \ `DuplicateKeyException`）是一个非受检异常，你无需强制捕获它。`DataAccessException` 的直接父类是 `NestedRuntimeException`，这是一个核心的\
  \ Spring 异常类，它将另一个异常包装在 `RuntimeException` 中。\n\n当你使用 Spring JDBC 框架的类时，它们会为你捕获\
  \ `SQLException`，并将其包装为 `DataAccessException` 的某个子类。由于此异常是 `RuntimeException`，你不需要捕获它。\n\
  \n但是，Spring JDBC 框架如何知道应该抛出 `DataAccessException` 层次结构中的哪个具体异常呢？它是通过查看捕获到的 `SQLException`\
  \ 的 `errorCode` 和 `SQLState` 属性来判断的。由于 `DataAccessException` 将底层的 `SQLException`\
  \ 包装为根本原因，你可以使用以下 catch 块来检查 `errorCode` 和 `SQLState` 属性。\n\n```\npackage com.apress.spring6recipes.vehicle;\n\
  ...\nimport java.sql.SQLException;\nimport org.springframework.dao.DataAccessException;\n\
  public class Main {\npublic static void main(String[] args) {\n...\nvar vehicleDao\
  \ = context.getBean(VehicleDao.class);\nvar vehicle = new Vehicle(\"EX0001\", \"\
  Green\", 4, 4);\ntry {\nvehicleDao.insert(vehicle);\n} catch (DataAccessException\
  \ e) {\nvar sqle = (SQLExcption) e.getCause();\nSystem.out.println(\"Error code:\
  \ \" + sqle.getErrorCode());\nSystem.out.println(\"SQL state: \" + sqle.getSQLState());\n\
  }\n}\n}\n代码清单 6-38\nMain 类\n```\n\n当你再次插入重复的车辆时，请注意 PostgreSQL 返回了以下错误码和 SQL 状态：\n\
  \n```\nError code : 0\nSQL state : 23505\n```\n\n如果你查阅 PostgreSQL 参考手册，你会找到表 6-2\
  \ 中所示的错误码描述。\n\n表 6-2\n\nPostgreSQL 错误码描述\n\n| SQL 状态 | 消息文本 |\n| --- | --- |\n\
  | 23505 | unique_violation |\n\nSpring JDBC 框架如何知道状态 23505 应映射到 `DuplicateKeyException`？错误码和\
  \ SQL 状态是数据库特定的，这意味着不同的数据库产品可能为同一种错误返回不同的代码。此外，某些数据库产品会在 `errorCode` 属性中指定错误，而其他数据库产品（如\
  \ PostgreSQL）则会在 `SQLState` 属性中指定。\n\n作为一个开放的 Java 应用框架，Spring 理解大多数流行数据库产品的错误码。然而，由于错误码数量庞大，它只能维护最常遇到的错误的映射。该映射定义在位于\
  \ `org.springframework.jdbc.support` 包中的 `sql-error-codes.xml` 文件中。以下是该文件中针对 PostgreSQL\
  \ 的片段。\n\n```\n\n...\n\ntrue\n\n03000,42000,42601,42602,42622,42804,42P01\n\n23000,23502,23503,23514\n\
  \n53000,53100,53200,53300\n\n55P03\n\n40P01\n\n...\n\n代码清单 6-39\n来自 sql-error-codes.xml\
  \ 文件的片段\n```\n\n`useSqlStateForTranslation` 属性意味着应使用 `SQLState` 属性（而非 `errorCode`\
  \ 属性）来匹配错误码。最后，`SQLErrorCodes` 类定义了多个类别供你映射数据库错误码。代码 23505 属于 `dataIntegrityViolationCodes`\
  \ 类别。\n\n#### 自定义数据访问异常处理\n\nSpring JDBC 框架仅映射众所周知的错误码。有时，你可能希望自己自定义映射。例如，你可能决定向现有类别添加更多代码，或为特定错误码定义自定义异常。\n\
  \n在表 6-2 中，错误码 23505 表示 PostgreSQL 中的重复键错误。它默认映射到 `DataIntegrityViolationException`。假设你想为此类错误创建一个自定义异常类型\
  \ `MyDuplicateKeyException`。它应该扩展 `DataIntegrityViolationException`，因为它也是一种数据完整性违反错误。请记住，要使异常能被\
  \ Spring JDBC 框架抛出，它必须与根异常类 `DataAccessException` 兼容。\n\n```\npackage com.apress.spring6recipes.vehicle;\n\
  import org.springframework.dao.DataIntegrityViolationException;\npublic class MyDuplicateKeyException\
  \ extends DataIntegrityViolationException {\npublic MyDuplicateKeyException(String\
  \ msg) {\nsuper(msg);\n}\npublic MyDuplicateKeyException(String msg, Throwable cause)\
  \ {\nsuper(msg, cause);\n}\n}\n代码清单 6-40\n自定义异常类\n```\n\n默认情况下，Spring 会从位于 `org.springframework.jdbc.support`\
  \ 包中的 `sql-error-codes.xml` 文件中查找异常。但是，你可以通过在类路径根目录下提供一个同名文件来覆盖某些映射。如果 Spring 能找到你的自定义文件，它将首先从你的映射中查找异常。但是，如果在那里没有找到合适的异常，Spring\
  \ 将查找默认映射。\n\n例如，假设你想将自定义的 `DuplicateKeyException` 类型映射到错误码 23505。你需要通过 `CustomSQLErrorCodesTranslation`\
  \ bean 添加绑定，然后将此 bean 添加到 `customTranslations` 类别中。\n\n```\n\ntrue\n\ncom.apress.spring6recipes.vehicle.MyDuplicateKeyException\n\
  \n代码清单 6-41\n自定义 sql-error-codes.xml 文件\n```\n\n现在，如果你移除包围车辆插入操作的 try/catch 块并插入一辆重复的车辆，Spring\
  \ JDBC 框架将抛出 `MyDuplicateKeyException`。\n\n但是，如果你对 `SQLErrorCodes` 类使用的基本代码到异常映射策略不满意，你可以进一步实现\
  \ `SQLExceptionTranslator` 接口，并通过 `setExceptionTranslator()` 方法将其实例注入到 JDBC 模板中。\n\
  \n## 6-8\\. 直接使用 ORM 框架的问题\n\n### 问题\n\n你决定进入下一个层次——你有一个足够复杂的领域模型，手动为每个实体编写所有代码变得繁琐，因此你开始研究一些替代方案，比如\
  \ Hibernate。你惊讶地发现，虽然它们功能强大，但可能一点也不简单！\n\n### 解决方案\n\n让 Spring 来帮忙；它拥有处理 ORM 层的工具，其能力可与用于普通\
  \ JDBC 访问的工具相媲美。\n\n\n\n### 工作原理\n\n假设你正在为一家培训中心开发课程管理系统。你为该系统创建的第一个类是 `Course`。这个类被称为实体类或持久化类，因为它代表现实世界中的一个实体，并且其实例将被持久化到数据库中。请记住，对于每个要由\
  \ ORM 框架持久化的实体类，都需要一个无参的默认构造函数。\n\n```\npackage com.apress.spring6recipes.course;\n\
  public class Course {\nprivate Long id;\nprivate String title;\nprivate LocalDate\
  \ beginDate;\nprivate LocalDate endDate;\nprivate int fee;\n}\n清单 6-42\nCourse 类\n\
  ```\n\n对于每个实体类，你必须定义一个标识符属性来唯一标识一个实体。最佳实践是定义一个自动生成的标识符，因为它没有业务含义，因此在任何情况下都不会被更改。此外，ORM\
  \ 框架将使用此标识符来确定实体的状态。如果标识符值为 `null`，则该实体将被视为一个新的、未保存的实体。当此实体被持久化时，将执行一条 insert SQL\
  \ 语句；否则，将执行一条 update 语句。为了允许标识符为 `null`，请为标识符选择原始包装类型，例如 `java.lang.Integer` 和 `java.lang.Long`。\n\
  \n在你的课程管理系统中，你需要一个 DAO 接口来封装数据访问逻辑。让我们在 `CourseDao` 接口中定义以下操作。\n\n```\npackage com.apress.spring6recipes.course;\n\
  import java.util.List;\npublic interface CourseDao {\nCourse store(Course course);\n\
  void delete(Long courseId);\nCourse findById(Long courseId);\nList findAll();\n\
  }\n清单 6-43\nCourseDao 接口\n```\n\n通常，在使用 ORM 持久化对象时，插入和更新操作会合并为一个操作（例如，store）。这是为了让\
  \ ORM 框架（而不是你）决定一个对象应该被插入还是更新。为了让 ORM 框架将你的对象持久化到数据库，它必须知道实体类的映射元数据。你必须以其支持的格式向它提供映射元数据。历史上，Hibernate\
  \ 使用 XML 来提供映射元数据。然而，由于每个 ORM 框架可能有自己定义映射元数据的格式，JPA 定义了一组持久化注解，让你以标准格式定义映射元数据，这种格式更有可能在其他\
  \ ORM 框架中重用。\n\nHibernate 也支持使用 JPA 注解来定义映射元数据，因此，使用 Hibernate 和 JPA 映射和持久化对象基本上有三种不同的策略：\n\
  \n*   使用 Hibernate API 配合 Hibernate XML 映射来持久化对象\n*   使用 Hibernate API 配合 JPA 注解来持久化对象\n\
  *   使用 JPA 配合 JPA 注解来持久化对象\n\nHibernate、JPA 和其他 ORM 框架的核心编程元素与 JDBC 类似。它们总结在表 6-3\
  \ 中。\n\n表 6-3\n\n不同数据访问策略的核心编程元素\n\n| 概念 | JDBC | Hibernate | JPA |\n| --- | ---\
  \ | --- | --- |\n| 资源 | `Connection` | `Session` | `EntityManager` |\n| 资源工厂 | `DataSource`\
  \ | `SessionFactory` | `EntityManagerFactory` |\n| 异常 | `SQLException` | `HibernateException`\
  \ | `PersistenceException` |\n\n在 Hibernate 中，对象持久化的核心接口是 `Session`，其实例可以从 `SessionFactory`\
  \ 实例获取。在 JPA 中，对应的接口是 `EntityManager`，其实例可以从 `EntityManagerFactory` 实例获取。Hibernate\
  \ 抛出的异常类型为 `HibernateException`，而 JPA 抛出的异常可能是 `PersistenceException` 类型，或其他 Java\
  \ SE 异常，如 `IllegalArgumentException` 和 `IllegalStateException`。请注意，所有这些异常都是 `RuntimeException`\
  \ 的子类，你不必强制捕获和处理它们。\n\n#### 使用 Hibernate API 配合 JPA 注解持久化对象\n\nJPA 注解由 [Jakarta\
  \ Persistence](https://jakarta.ee/specifications/persistence/) 规范标准化，因此所有符合 JPA\
