  ## 8-4. 编写自定义 ItemWriter 和 ItemReader


  ### 问题


  你想要与 Spring Batch 不知道如何连接的资源（可以想象是 RSS 源或任何其他自定义数据格式）进行通信。


  ### 解决方案


  你可以轻松编写自己的 `ItemWriter` 或 `ItemReader`。这些接口非常简单，并且对实现的要求很少。




  ### 工作原理


  尽管这个过程执行起来简单且微不足道，但它仍然不如直接复用众多现成选项中的任何一个来得方便。如果你仔细查找，很可能会找到合适的方案。Spring Batch 支持写入
  JMS（`JmsItemWriter`）、JPA（`JpaItemWriter`）、JDBC（`JdbcBatchItemWriter`）、文件（`FlatFileItemWriter`）、Hibernate（`HibernateItemWriter`）等。甚至还支持通过调用
  Bean 上的方法（`PropertyExtractingDelegatingItemWriter`）并将待写入条目的属性作为参数传递给它！其中一个非常有用的写入器允许你写入一组带编号的文件。这个实现——`MultiResourceItemWriter<T>`——将实际工作委托给其他合适的
  `ItemWriter<T>` 实现，但允许你写入多个文件，而不仅仅是一个非常大的文件。`ItemReader` 的实现集虽然略小，但也令人印象深刻。如果找不到现成的，请再仔细找找。如果仍然找不到，可以考虑自己编写一个。在本节中，我们将进行这样的实践。


  #### 编写自定义 ItemReader


  `ItemReader` 的示例很简单。这里创建了一个 `ItemReader`，它知道如何从远程过程调用（RPC）端点检索 `UserRegistration`
  对象。


  ```

  package com.apress.spring6recipes.springbatch;

  import org.springframework.batch.item.ItemReader;

  import java.time.LocalDate;

  public class UserRegistrationItemReader implements ItemReader {

  private final UserRegistrationService usr;

  public UserRegistrationItemReader(UserRegistrationService usr) {

  this.usr = usr;

  }

  public UserRegistration read() throws Exception {

  var today = LocalDate.now();

  var registrations = usr.getOutstandingUserRegistrationBatchForDate(1, today);

  var iter = registrations.iterator();

  return iter.hasNext() ? iter.next() : null;

  }

  }

