  ## 5-4\. 做出访问控制决策


  ### 问题


  在身份验证过程中，应用程序会为成功通过身份验证的用户授予一组权限。当该用户尝试访问应用程序中的资源时，应用程序必须根据所授予的权限或其他特征来决定该资源是否可访问。


  ### 解决方案


  决定用户是否被允许访问应用程序中资源的过程称为授权决策。该决策基于用户的身份验证状态以及资源的性质和访问属性。在 Spring Security 中，授权决策由授权管理器做出，这些管理器必须实现
  `AuthorizationManager` 接口。你可以通过实现此接口自由创建自己的授权管理器，但 Spring Security 已经提供了几种实现。其中大多数可以通过
  `http.authorizeHttpRequest` 或使用方法安全（参见 5-5 节）进行配置。



  ### 工作原理


  我们已经在不知不觉中使用了这些 `AuthorizationManager` 实例。在表达式 `.requestMatchers("/todos", "/todos/*").hasAuthority("USER")`
  中，`hasAuthority` 部分实际上使用了 `AuthorizationManager`，准确来说是 `AuthorityAuthorizationManager`。然而，这只是一个单一的实例。我们可以使用
  `access` 方法来应用更多或特定的实例。例如，我们可以创建一个 `AuthorizationManager`，它只允许来自 localhost 的访问，而不是针对每个
  URL。


  ```

  package com.apress.spring6recipes.board.security;

  import org.springframework.security.authorization.AuthorizationDecision;

  import org.springframework.security.authorization.AuthorizationManager;

  import org.springframework.security.core.Authentication;

  import org.springframework.security.web.authentication.WebAuthenticationDetails;

  import java.util.function.Supplier;

  public class LocalhostAuthorizationManager implements AuthorizationManager {

  @Override

  public AuthorizationDecision check(Supplier authentication, T object) {

  var auth = authentication.get();

  var granted = false;

  if (auth.getDetails() instanceof WebAuthenticationDetails details) {

  String address = details.getRemoteAddress();

  granted = address.equals("127.0.0.1") || address.equals("0:0:0:0:0:0:0:1");

  }

  return new AuthorizationDecision(granted);

  }

  }

  清单 5-32

  自定义 AuthorizationManager 实现

  ```


  如果用户是一个 Web 客户端，其 IP 地址等于 `127.0.0.1` 或 `0:0:0:0:0:0:0:1`，则其投票者将决定允许访问；否则，访问将被拒绝。如果当前已认证的用户（通过
  `Authentication` 对象表示）不是 Web 客户端，则访问也会被拒绝。


  接下来，您必须定义一个自定义访问规则来包含此授权管理器。


  ```

  .requestMatchers(HttpMethod.DELETE, "/todos/*").access(

  AuthorizationManagers.allOf(

  AuthorityAuthorizationManager.hasAuthority("ADMIN"),

  new LocalhostAuthorizationManager()))

  清单 5-33

  Todo 安全配置——使用自定义授权管理器

  ```


  有一个辅助类 `AuthorizationManagers`，可以更轻松地以“全部满足”或“任一满足”的方式组合多个授权管理器。这里我们希望两者都适用，因此我们使用
  `allOf` 辅助方法来组合两者。现在也显式配置了 `AuthorityAuthorizationManager`，因为我们希望同时检查权限和 IP 地址。


  #### 使用表达式做出访问控制决策


  尽管授权管理器提供了一定程度的灵活性，但有时人们需要更复杂的访问控制规则或更高的灵活性。使用 Spring Security，还可以使用 Spring 表达式语言
  (SpEL) 来创建强大的访问控制规则。Spring Security 开箱即用地支持一些表达式（参见表 5-7 的列表）。使用诸如 `and`、`or` 和
  `not` 之类的结构，可以创建非常强大且灵活的表达式。


  表 5-7


  Spring Security 内置表达式


  | 表达式 | 描述 |

  | --- | --- |

  | `hasRole(''role'')` 或 `hasAuthority(''authority'')` | 如果当前用户具有给定的角色/权限，则返回 true
  |

  | `hasAnyRole(''role1'',''role2'')` / `hasAnyAuthority(''auth1'',''auth2'')` | 如果当前用户至少具有给定的角色之一，则返回
  true |

  | `hasIpAddress(''ip-address'')` | 如果当前用户具有给定的 IP 地址，则返回 true |

  | `principal` | 当前用户 |

  | `authentication` | 访问 Spring Security 认证对象 |

  | `permitAll` | 始终评估为 true |

  | `denyAll` | 始终评估为 false |

  | `isAnonymous()` | 如果当前用户是匿名用户，则返回 true |

  | `isRememberMe()` | 如果当前用户通过“记住我”功能登录，则返回 true |

  | `isAuthenticated()` | 如果这不是匿名用户，则返回 true |

  | `isFullyAuthenticated()` | 如果用户既不是匿名用户也不是“记住我”用户，则返回 true |


  ![](img/314861_5_En_5_Figh_HTML.gif)火焰图标插图。尽管角色和权限几乎相同，但它们的处理方式存在细微但重要的差异。使用 `hasRole`
  时，将检查传入的角色值是否以 `ROLE_`（默认角色前缀）开头；如果不是，则在检查权限之前会添加此前缀。因此，`hasRole(''ADMIN'')` 实际上会检查当前用户是否具有
  `ROLE_ADMIN` 权限。使用 `hasAuthority` 时，它将按原样检查该值。


  ```

  auth

  .requestMatchers(HttpMethod.DELETE, "/todos/*").access(

  new WebExpressionAuthorizationManager("hasRole(''ROLE_ADMIN'') and

  (hasIpAddress(''127.0.0.1'') or hasIpAddress(''0:0:0:0:0:0:0:1''))"))

