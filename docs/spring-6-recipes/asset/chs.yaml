  \ Main 类\n```\n\n主类构造了一个 `MongoClient` 实例（通过使用 `MongoClients` 辅助类），该实例将尝试连接到本地主机上\
  \ MongoDB 实例的 `27017` 端口。如果需要其他端口或主机，还有一个 `create` 方法，它接受连接字符串或 `MongoClientSettings`\
