  \ 启动。Mac 用户也可以使用 Homebrew（[`https://brew.sh`](https://brew.sh/)）通过 `brew install\
  \ neo4j` 来安装 Neo4j；然后可以在命令行中使用 `neo4j start` 启动。\n\n在命令行启动后，输出应该类似于清单 9-36 所示。\n\
