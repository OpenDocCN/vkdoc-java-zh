  ## 13-2. 创建单元测试和集成测试\n\n### 问题\n\n一种常见的测试技术是，先独立测试应用程序的每个模块，然后再将它们组合起来测试。你希望将此技巧应用于\
  \ Java 应用程序的测试中。\n\n### 解决方案\n\n单元测试用于测试单个编程单元。在面向对象语言中，一个单元通常是一个类或一个方法。单元测试的范围是单个单元，但在现实世界中，大多数单元无法独立工作。它们通常需要与其他单元协作才能完成任务。当测试一个依赖于其他单元的单元时，你可以应用的一种常见技术是使用桩（stub）和模拟对象（mock\
  \ object）来模拟这些依赖关系。这两者都可以降低由依赖关系引起的单元测试复杂性。\n\n桩是一个对象，它用测试所需的最少方法数量来模拟一个依赖对象。这些方法以预定的方式实现，通常使用硬编码的数据。桩还公开了一些方法，供测试验证桩的内部状态。与桩相反，模拟对象通常知道其方法在测试中应如何被调用。然后，模拟对象会验证实际调用的方法是否与预期一致。在\
  \ Java 中，有几个库可以帮助创建模拟对象，例如 Mockito、EasyMock 和 jMock。桩和模拟对象的主要区别在于，桩通常用于状态验证，而模拟对象用于行为验证。\n\
  \n相比之下，集成测试用于将多个单元作为一个整体进行组合测试。它们测试单元之间的集成和交互是否正确。这些单元中的每一个都应该已经通过单元测试进行了测试，因此集成测试通常在单元测试之后进行。\n\
  \n最后，请注意，使用接口与实现分离原则以及依赖注入模式开发的应用程序，无论是单元测试还是集成测试，都易于测试。这是因为该原则和模式可以降低应用程序不同单元之间的耦合度。\n\
  \n### 工作原理\n\n#### 为隔离的类创建单元测试\n\n银行系统的核心功能应围绕客户账户进行设计。首先，你创建以下领域类 `Account`，并带有自定义的\
  \ `equals()` 和 `hashCode()` 方法。\n\n```\npackage com.apress.spring6recipes.bank;\n\
  import java.util.Objects;\npublic class Account {\nprivate final String accountNo;\n\
  private double balance;\npublic Account(String accountNo, double balance) {\nthis.accountNo\
  \ = accountNo;\nthis.balance = balance;\n}\npublic String getAccountNo() {\nreturn\
  \ accountNo;\n}\npublic double getBalance() {\nreturn balance;\n}\npublic void setBalance(double\
  \ balance) {\nthis.balance = balance;\n}\n@Override\npublic boolean equals(Object\
  \ o) {\nif (this == o)\nreturn true;\nif (o instanceof Account account)\nreturn\
  \ Objects.equals(accountNo, account.accountNo);\nreturn false;\n}\n@Override\npublic\
  \ int hashCode() {\nreturn Objects.hash(accountNo);\n}\n@Override\npublic String\
  \ toString() {\nreturn String.format(\"Account [accountNo='%s', balance=%d]\", accountNo,\
  \ balance);\n}\n}\n清单 13-7\nAccount 类\n```\n\n接下来，你定义以下 DAO 接口，用于在银行系统的持久化层中持久化账户对象。\n\
  \n```\npackage com.apress.spring6recipes.bank;\npublic interface AccountDao {\n\
  void createAccount(Account account);\nvoid updateAccount(Account account);\nvoid\
  \ removeAccount(Account account);\nAccount findAccount(String accountNo);\n}\n清单\
  \ 13-8\nAccountDao 接口\n```\n\n为了演示单元测试的概念，我们通过使用 `java.util.Map` 来存储账户对象，从而实现此接口。`AccountNotFoundException`\
  \ 和 `DuplicateAccountException` 类是 `RuntimeException` 的子类，你应该能够自己创建它们。\n\n```\n\
  package com.apress.spring6recipes.bank;\nimport java.util.Map;\nimport java.util.concurrent.ConcurrentHashMap;\n\
  class InMemoryAccountDao implements AccountDao {\nprivate final Map accounts = new\
  \ ConcurrentHashMap();\nboolean accountExists(String accountNo) {\nreturn accounts.containsKey(accountNo);\n\
  }\n@Override\npublic void createAccount(Account account) {\nif (accountExists(account.getAccountNo()))\
  \ {\nthrow new DuplicateAccountException();\n}\naccounts.put(account.getAccountNo(),\
  \ account);\n}\n@Override\npublic void updateAccount(Account account) {\nif (!accountExists(account.getAccountNo()))\
  \ {\nthrow new AccountNotFoundException();\n}\naccounts.put(account.getAccountNo(),\
  \ account);\n}\n@Override\npublic void removeAccount(Account account) {\nif (!accountExists(account.getAccountNo()))\
  \ {\nthrow new AccountNotFoundException();\n}\naccounts.remove(account.getAccountNo());\n\
  }\n@Override\npublic Account findAccount(String accountNo) {\nvar account = accounts.get(accountNo);\n\
  if (account == null) {\nthrow new AccountNotFoundException();\n}\nreturn account;\n\
  }\n}\n清单 13-9\n内存中的 AccountDao 实现\n```\n\n现在，让我们使用 JUnit 为这个 DAO 实现创建单元测试。由于此类不直接依赖于其他类，因此很容易测试。为了确保此类在异常情况和正常情况下的都能正常工作，你还应该为其创建异常测试用例。通常，异常测试用例期望抛出异常。\n\
  \n\n\n```\npackage com.apress.spring6recipes.bank;\nimport org.junit.jupiter.api.BeforeEach;\n\
  import org.junit.jupiter.api.Test;\nimport static org.junit.jupiter.api.Assertions.*;\n\
  class InMemoryAccountDaoTests {\nprivate static final String EXISTING_ACCOUNT_NO\
  \ = \"1234\";\nprivate static final String NEW_ACCOUNT_NO = \"5678\";\nprivate Account\
  \ existingAccount;\nprivate Account newAccount;\nprivate InMemoryAccountDao accountDao;\n\
  @BeforeEach\nvoid init() {\nexistingAccount = new Account(EXISTING_ACCOUNT_NO, 100);\n\
  newAccount = new Account(NEW_ACCOUNT_NO, 200);\naccountDao = new InMemoryAccountDao();\n\
  accountDao.createAccount(existingAccount);\n}\n@Test\nvoid accountExists() {\nassertTrue(accountDao.accountExists(EXISTING_ACCOUNT_NO));\n\
  assertFalse(accountDao.accountExists(NEW_ACCOUNT_NO));\n}\n@Test\nvoid createNewAccount()\
  \ {\naccountDao.createAccount(newAccount);\nassertEquals(newAccount, accountDao.findAccount(NEW_ACCOUNT_NO));\n\
  }\n@Test\nvoid createDuplicateAccount() {\nassertThrows(DuplicateAccountException.class,\n\
  () -> accountDao.createAccount(existingAccount));\n}\n@Test\nvoid updateExistedAccount()\
  \ {\nexistingAccount.setBalance(150);\naccountDao.updateAccount(existingAccount);\n\
  assertEquals(existingAccount, accountDao.findAccount(EXISTING_ACCOUNT_NO));\n}\n\
  @Test\nvoid updateNotExistedAccount() {\nassertThrows(AccountNotFoundException.class,\n\
  () ->accountDao.updateAccount(newAccount));\n}\n@Test\nvoid removeExistedAccount()\
  \ {\naccountDao.removeAccount(existingAccount);\nassertFalse(accountDao.accountExists(EXISTING_ACCOUNT_NO));\n\
  }\n@Test\nvoid removeNotExistedAccount() {\nassertThrows(AccountNotFoundException.class,\n\
  () -> accountDao.removeAccount(newAccount));\n}\n@Test\nvoid findExistedAccount()\
  \ {\nvar account = accountDao.findAccount(EXISTING_ACCOUNT_NO);\nassertEquals(existingAccount,\
  \ account);\n}\n@Test\nvoid findNotExistedAccount() {\nassertThrows(AccountNotFoundException.class,\n\
  () -> accountDao.findAccount(NEW_ACCOUNT_NO));\n}\n}\n清单 13-10\n内存 AccountDao 的\
  \ JUnit Jupiter 测试\n```\n\n#### 使用桩对象和模拟对象为依赖类创建单元测试\n\n测试一个独立的类很容易，因为你无需考虑其依赖项如何工作以及如何正确设置它们。然而，测试一个依赖于其他类或服务（例如数据库服务和网络服务）结果的类会稍微困难一些。例如，让我们考虑服务层中的以下\
  \ `AccountService` 接口。\n\n```\npackage com.apress.spring6recipes.bank;\npublic interface\
  \ AccountService {\nvoid createAccount(String accountNo);\nvoid removeAccount(String\
  \ accountNo);\nvoid deposit(String accountNo, double amount);\nvoid withdraw(String\
  \ accountNo, double amount);\ndouble getBalance(String accountNo);\n}\n清单 13-11\n\
  AccountService 接口\n```\n\n该服务接口的实现必须依赖于持久层中的 `AccountDao` 对象来持久化账户对象。`InsufficientBalanceException`\
  \ 类也是你需要创建的 `RuntimeException` 的子类。\n\n```\npackage com.apress.spring6recipes.bank;\n\
  class SimpleAccountService implements AccountService {\nprivate final AccountDao\
  \ accountDao;\npublic SimpleAccountService(AccountDao accountDao) {\nthis.accountDao\
  \ = accountDao;\n}\n@Override\npublic void createAccount(String accountNo) {\naccountDao.createAccount(new\
  \ Account(accountNo, 0));\n}\n@Override\npublic void removeAccount(String accountNo)\
  \ {\nvar account = accountDao.findAccount(accountNo);\naccountDao.removeAccount(account);\n\
  }\n@Override\npublic void deposit(String accountNo, double amount) {\nvar account\
  \ = accountDao.findAccount(accountNo);\naccount.setBalance(account.getBalance()\
  \ + amount);\naccountDao.updateAccount(account);\n}\n@Override\npublic void withdraw(String\
  \ accountNo, double amount) {\nvar account = accountDao.findAccount(accountNo);\n\
  if (account.getBalance() < amount) {\nthrow new InsufficientBalanceException();\n\
  }\naccount.setBalance(account.getBalance() - amount);\naccountDao.updateAccount(account);\n\
  }\n@Override\npublic double getBalance(String accountNo) {\nreturn accountDao.findAccount(accountNo).getBalance();\n\
  }\n}\n清单 13-12\nSimple AccountService 实现\n```\n\n在单元测试中，一种用于降低依赖关系复杂性的常用技术是使用桩对象。桩对象必须实现与目标对象相同的接口，以便它可以替代目标对象。例如，你可以为\
  \ `AccountDao` 创建一个桩对象，该桩对象存储单个客户账户，并且仅实现 `findAccount()` 和 `updateAccount()` 方法，因为\
  \ `deposit()` 和 `withdraw()` 方法需要它们。\n\n```\npackage com.apress.spring6recipes.bank;\n\
  import org.junit.jupiter.api.BeforeEach;\nimport org.junit.jupiter.api.Test;\nimport\
  \ static org.junit.jupiter.api.Assertions.assertEquals;\nimport static org.junit.jupiter.api.Assertions.assertThrows;\n\
  public class SimpleAccountServiceStubTests {\nprivate static final String TEST_ACCOUNT_NO\
  \ = \"1234\";\nprivate AccountDaoStub accountDaoStub;\nprivate SimpleAccountService\
  \ accountService;\n@BeforeEach\npublic void init() {\naccountDaoStub = new AccountDaoStub();\n\
  accountDaoStub.accountNo = TEST_ACCOUNT_NO;\naccountDaoStub.balance = 100;\naccountService\
  \ = new SimpleAccountService(accountDaoStub);\n}\n@Test\nvoid deposit() {\naccountService.deposit(TEST_ACCOUNT_NO,\
  \ 50);\nassertEquals(TEST_ACCOUNT_NO, accountDaoStub.accountNo);\nassertEquals(150,\
  \ accountDaoStub.balance, 0);\n}\n@Test\nvoid withdrawWithSufficientBalance() {\n\
  accountService.withdraw(TEST_ACCOUNT_NO, 50);\nassertEquals(TEST_ACCOUNT_NO, accountDaoStub.accountNo);\n\
  assertEquals(50, accountDaoStub.balance, 0);\n}\n@Test\nvoid withdrawWithInsufficientBalance()\
  \ {\nassertThrows(InsufficientBalanceException.class, () ->\naccountService.withdraw(TEST_ACCOUNT_NO,\
  \ 150));\n}\n/**\n* 针对 {@code AccountDao} 的部分实现桩对象\n*/\nprivate static class AccountDaoStub\
  \ implements AccountDao {\nprivate String accountNo;\nprivate double balance;\n\
  public void createAccount(Account account) {}\npublic void removeAccount(Account\
  \ account) {}\npublic Account findAccount(String accountNo) {\nreturn new Account(this.accountNo,\
  \ this.balance);\n}\npublic void updateAccount(Account account) {\nthis.accountNo\
  \ = account.getAccountNo();\nthis.balance = account.getBalance();\n}\n}\n}\n清单 13-13\n\
  使用测试桩对象的 AccountService JUnit Jupiter 测试\n```\n\n然而，自己编写桩对象需要大量编码。一种更高效的技术是使用模拟对象。Mockito\
  \ 库能够动态创建模拟对象，这些对象以记录/回放机制工作。\n\n![](img/314861_5_En_13_Figf_HTML.gif)一个带阴影圆圈的字母\
  \ i 图标，代表信息符号。 要使用 [Mockito](https://mockito.org/) 进行测试，你必须将其添加到你的 CLASSPATH 中。如果你使用\
  \ Maven，请将以下依赖项添加到你的项目中：\n\n```\norg.mockito\nmockito-core\n4.10.0\ntest\n\n```\n\
  \n或者在使用 Gradle 时添加以下内容：\n\n`testImplementation 'org.mockito:mockito-core:4.10.0'`\n\
  \n\n\n```\npackage com.apress.spring6recipes.bank;\nimport org.junit.jupiter.api.BeforeEach;\n\
  import org.junit.jupiter.api.Test;\nimport static org.junit.jupiter.api.Assertions.assertThrows;\n\
  import static org.mockito.Mockito.any;\nimport static org.mockito.Mockito.mock;\n\
  import static org.mockito.Mockito.times;\nimport static org.mockito.Mockito.verify;\n\
  import static org.mockito.Mockito.when;\nclass SimpleAccountServiceMockTests {\n\
  private static final String TEST_ACCOUNT_NO = \"1234\";\nprivate AccountDao accountDao;\n\
  private SimpleAccountService accountService;\n@BeforeEach\npublic void init() {\n\
  accountDao = mock(AccountDao.class);\naccountService = new SimpleAccountService(accountDao);\n\
  }\n@Test\nvoid deposit() {\nvar account = new Account(TEST_ACCOUNT_NO, 100);\nwhen(accountDao.findAccount(TEST_ACCOUNT_NO)).thenReturn(account);\n\
  accountService.deposit(TEST_ACCOUNT_NO, 50);\nverify(accountDao, times(1)).findAccount(any(String.class));\n\
  verify(accountDao, times(1)).updateAccount(account);\n}\n@Test\nvoid withdrawWithSufficientBalance()\
  \ {\nvar account = new Account(TEST_ACCOUNT_NO, 100);\nwhen(accountDao.findAccount(TEST_ACCOUNT_NO)).thenReturn(account);\n\
  accountService.withdraw(TEST_ACCOUNT_NO, 50);\nverify(accountDao, times(1)).findAccount(any(String.class));\n\
  verify(accountDao, times(1)).updateAccount(account);\n}\n@Test\npublic void testWithdrawWithInsufficientBalance()\
  \ {\nvar account = new Account(TEST_ACCOUNT_NO, 100);\nwhen(accountDao.findAccount(TEST_ACCOUNT_NO)).thenReturn(account);\n\
  assertThrows(InsufficientBalanceException.class, () ->\naccountService.withdraw(TEST_ACCOUNT_NO,\
  \ 150));\n}\n}\n清单 13-14\n使用 Mockito 的 AccountService JUnit Jupiter 测试\n```\n\n\
  使用 Mockito，你可以为任意接口或类动态创建模拟对象。可以指示这个模拟对象在方法调用时具有特定行为，并且你可以用它来选择性地验证某些事情是否已经发生。在你的测试中，你希望\
  \ `findAccount` 方法返回一个特定的 `Account` 对象。为此，你使用 `Mockito.when` 方法，然后你可以返回一个值、抛出一个异常，或者使用\
  \ `Answer` 执行更复杂的操作。模拟对象的默认行为是返回 `null`。你使用 `Mockito.verify` 方法对已发生的事情进行选择性验证。你需要确保我们的\
  \ `findAccount` 方法被调用，并且账户被更新。\n\n除了手动调用 `Mockito.mock` 来创建要使用的模拟对象之外，还可以使用 Mockito\
  \ 的 JUnit Jupiter 扩展。为此，你需要用 `@ExtendWith(MockitoExtension.class)` 注解测试类，并用 `@Mock`\
  \ 注解模拟对象的字段。接收模拟对象的类的字段可以用 `@InjectMocks` 注解。有了这些设置，你现在可以移除 `@BeforeEach` 方法，因为所有设置现在都由\
  \ Mockito 扩展完成。\n\n```\npackage com.apress.spring6recipes.bank;\nimport org.junit.jupiter.api.Test;\n\
  import org.junit.jupiter.api.extension.ExtendWith;\nimport org.mockito.InjectMocks;\n\
  import org.mockito.Mock;\nimport org.mockito.junit.jupiter.MockitoExtension;\nimport\
  \ static org.junit.jupiter.api.Assertions.assertThrows;\nimport static org.mockito.Mockito.any;\n\
  import static org.mockito.Mockito.times;\nimport static org.mockito.Mockito.verify;\n\
  import static org.mockito.Mockito.when;\n@ExtendWith(MockitoExtension.class)\nclass\
  \ SimpleAccountServiceMockTests {\nprivate static final String TEST_ACCOUNT_NO =\
  \ \"1234\";\n@Mock\nprivate AccountDao accountDao;\n@InjectMocks\nprivate SimpleAccountService\
  \ accountService;\n@Test\nvoid deposit() {\nvar account = new Account(TEST_ACCOUNT_NO,\
  \ 100);\nwhen(accountDao.findAccount(TEST_ACCOUNT_NO)).thenReturn(account);\naccountService.deposit(TEST_ACCOUNT_NO,\
  \ 50);\nverify(accountDao, times(1)).findAccount(any(String.class));\nverify(accountDao,\
  \ times(1)).updateAccount(account);\n}\n@Test\nvoid withdrawWithSufficientBalance()\
  \ {\nvar account = new Account(TEST_ACCOUNT_NO, 100);\nwhen(accountDao.findAccount(TEST_ACCOUNT_NO)).thenReturn(account);\n\
  accountService.withdraw(TEST_ACCOUNT_NO, 50);\nverify(accountDao, times(1)).findAccount(any(String.class));\n\
  verify(accountDao, times(1)).updateAccount(account);\n}\n@Test\npublic void testWithdrawWithInsufficientBalance()\
  \ {\nvar account = new Account(TEST_ACCOUNT_NO, 100);\nwhen(accountDao.findAccount(TEST_ACCOUNT_NO)).thenReturn(account);\n\
  assertThrows(InsufficientBalanceException.class,\n() -> accountService.withdraw(TEST_ACCOUNT_NO,\
  \ 150));\n}\n}\n清单 13-15\n使用 MockitoExtension 的 AccountService JUnit Jupiter 测试\n\
  ```\n\n#### 创建集成测试\n\n集成测试用于组合测试多个单元，以确保这些单元正确集成并能正确交互。例如，你可以创建一个集成测试，使用 `InMemoryAccountDao`\
  \ 作为 DAO 实现来测试 `SimpleAccountService`。\n\n```\npackage com.apress.spring6recipes.bank;\n\
  import org.junit.jupiter.api.AfterEach;\nimport org.junit.jupiter.api.BeforeEach;\n\
  import org.junit.jupiter.api.Test;\nimport static org.junit.jupiter.api.Assertions.assertEquals;\n\
  public class SimpleAccountServiceTests {\nprivate static final String TEST_ACCOUNT_NO\
  \ = \"1234\";\nprivate AccountService accountService;\n@BeforeEach\nvoid init()\
  \ {\naccountService = new SimpleAccountService(new InMemoryAccountDao());\naccountService.createAccount(TEST_ACCOUNT_NO);\n\
  accountService.deposit(TEST_ACCOUNT_NO, 100);\n}\n@Test\npublic void deposit() {\n\
  accountService.deposit(TEST_ACCOUNT_NO, 50);\nassertEquals(150, accountService.getBalance(TEST_ACCOUNT_NO),\
  \ 0);\n}\n@Test\npublic void withDraw() {\naccountService.withdraw(TEST_ACCOUNT_NO,\
  \ 50);\nassertEquals(50, accountService.getBalance(TEST_ACCOUNT_NO), 0);\n}\n@AfterEach\n\
  public void cleanup() {\naccountService.removeAccount(TEST_ACCOUNT_NO);\n}\n}\n\
  清单 13-16\n基于 JUnit Jupiter 的 AccountService 集成测试\n```\n\n## 13-3\\. 在集成测试中管理应用上下文\n\
  \n### 问题\n\n在为 Spring 应用创建集成测试时，你必须访问在应用上下文中声明的 bean。如果没有 Spring 的测试支持，你必须在测试的初始化方法（JUnit\
  \ 中带有 `@BeforeEach` 或 `@BeforeAll` 的方法）中手动加载应用上下文。然而，由于初始化方法在每个测试方法或测试类之前被调用，相同的应用上下文可能会被多次重新加载。在一个包含许多\
  \ bean 的大型应用中，加载应用上下文可能需要大量时间，这会导致你的测试运行缓慢。\n\n\n### 解决方案\n\nSpring 的测试支持设施可以帮助你管理测试中的应用上下文，包括从一个或多个\
  \ Bean 配置文件加载上下文，并在多次测试执行之间缓存它。应用上下文将在单个 JVM 内的所有测试中被缓存，并使用配置文件位置作为键。因此，你的测试可以运行得更快，无需多次重新加载相同的应用上下文。\n\
  \nTestContext 框架提供了几个默认注册的测试执行监听器（见表 13-1）。\n\n表 13-1\n\n默认测试执行监听器\n\n| TestExecutionListener\
  \ | 描述 |\n| --- | --- |\n| `ApplicationEventsTestExecutionListener` | 通过使用 `ApplicationEvents`\
  \ 辅助工具，增加对测试应用事件的支持。仅当测试类本身使用 `@RecordApplicationEvents` 注解时才有效。 |\n| `DependencyInjectionTestExecutionListener`\
  \ | 将依赖项（包括托管的应用上下文）注入到你的测试中。 |\n| `DirtiesContextTestExecutionListener`、`DirtiesContextBeforeModesTestExecutionListener`\
  \ | 处理 `@DirtiesContext` 注解，并在必要时重新加载应用上下文。 |\n| `EventPublishingTestExecutionListener`\
  \ | 通过 Spring 应用事件基础设施发布测试执行事件。 |\n| `SqlScriptsTestExecutionListener` | 检测测试中的\
  \ `@Sql` 注解，并在测试开始前执行 SQL。 |\n| `TransactionalTestExecutionListener` | 处理测试用例中的\
  \ `@Transactional` 注解，并在测试结束时执行回滚。 |\n| `ServletTestExecutionListener` | 当检测到 `@WebAppConfiguration`\
  \ 注解时，处理 Web 应用上下文的加载。 |\n\n为了让 TestContext 框架管理应用上下文，你的测试类需要在内部与测试上下文管理器集成。为了方便起见，TestContext\
  \ 框架提供了执行此操作的支持类，如表 13-2 所示。这些类与测试上下文管理器集成，并实现了 `ApplicationContextAware` 接口，因此它们可以通过受保护的字段\
  \ `applicationContext` 提供对托管应用上下文的访问。\n\n你的测试类可以直接扩展相应的 TestContext 支持类，或者为你的测试框架使用\
  \ TestContext 集成类。\n\n表 13-2\n\n用于上下文管理的 TestContext 支持类\n\n| 测试框架 | TestContext\
  \ 支持类 | TestContext 集成类 |\n| --- | --- | --- |\n| JUnit 4 | `AbstractJUnit4SpringContextTests`\
  \ | `SpringRunner` |\n| JUnit Jupiter |   | `SpringExtension` |\n| TestNG | `AbstractTestNGSpringContextTests`\
  \ |   |\n\n如果你使用 JUnit 或 TestNG，你可以自行将测试类与测试上下文管理器集成，并直接实现 `ApplicationContextAware`\
  \ 接口，而无需扩展 TestContext 支持类。这样，你的测试类就不会绑定到 TestContext 框架的类层次结构，因此你可以扩展自己的基类。在 JUnit\
  \ Jupiter 中，你可以简单地使用扩展 `SpringExtension` 来运行测试，从而集成测试上下文管理器。然而，在 TestNG 中，你必须手动与测试上下文管理器集成。\n\
  \n### 工作原理\n\n首先，使用 `@Service` 注解 `SimpleAccountService`。这样你就可以使用组件扫描来检测它。接下来，创建一个配置来启用该组件扫描，并将\
  \ `InMemoryAccountDao` 添加为 `@Bean` 方法。\n\n```\npackage com.apress.spring6recipes.bank;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  @Configuration\npublic class BankConfiguration {\n@Bean\npublic InMemoryAccountDao\
  \ accountDao() {\nreturn new InMemoryAccountDao();\n}\n}\n清单 13-17\n配置类\n```\n\n\
  ![](img/314861_5_En_13_Figg_HTML.gif)一个带阴影圆圈的字母 i 图标，表示信息符号。 我们为 `InMemoryAccountDao`\
  \ 创建了一个 `@Bean`，因为在本章后面我们将添加一个额外的实现。如果我们使用注解并检测它，Spring 会检测到两个实例并感到困惑，因此对服务使用组件扫描，对\
  \ `InMemoryAccountDao` 使用 Bean 方法。\n\n#### 在 JUnit 中使用 TestContext 框架访问 ApplicationContext\n\
  \n如果你使用 JUnit 通过 TestContext 框架创建测试，你将有两个选项来访问托管的应用上下文：通过实现 `ApplicationContextAware`\
  \ 接口，或者在 `ApplicationContext` 类型的字段上使用 `@Autowired`。对于后一种选项，你必须显式指定一个 Spring 特定的测试扩展来运行你的测试，即\
  \ `SpringExtension`。你可以在类级别的 `@ExtendWith` 注解中指定它。\n\n```\npackage com.apress.spring6recipes.bank;\n\
  import org.junit.jupiter.api.AfterEach;\nimport org.junit.jupiter.api.BeforeEach;\n\
  import org.junit.jupiter.api.Test;\nimport org.junit.jupiter.api.extension.ExtendWith;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.context.ApplicationContext;\n\
  import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.junit.jupiter.SpringExtension;\n\
  import static org.junit.jupiter.api.Assertions.assertEquals;\n@ExtendWith(SpringExtension.class)\n\
  @ContextConfiguration(classes = BankConfiguration.class)\nclass AccountServiceContextTests\
  \ {\nprivate static final String TEST_ACCOUNT_NO = \"1234\";\n@Autowired\nprivate\
  \ ApplicationContext applicationContext;\nprivate AccountService accountService;\n\
  @BeforeEach\npublic void init() {\naccountService = applicationContext.getBean(AccountService.class);\n\
  accountService.createAccount(TEST_ACCOUNT_NO);\naccountService.deposit(TEST_ACCOUNT_NO,\
  \ 100);\n}\n@Test\npublic void deposit() {\naccountService.deposit(TEST_ACCOUNT_NO,\
  \ 50);\nassertEquals(150.0, accountService.getBalance(TEST_ACCOUNT_NO), 0);\n}\n\
  @Test\npublic void withDraw() {\naccountService.withdraw(TEST_ACCOUNT_NO, 50);\n\
  assertEquals(50, accountService.getBalance(TEST_ACCOUNT_NO), 50);\n}\n@AfterEach\n\
  public void cleanup() {\naccountService.removeAccount(TEST_ACCOUNT_NO);\n}\n}\n\
  清单 13-18\nSpring 驱动的 AccountService JUnit Jupiter 测试\n```\n\n\n\n#### 在 TestNG 中使用\
  \ TestContext 框架访问 ApplicationContext\n\n要在 TestNG 中使用 TestContext 框架访问受管理的应用上下文，你可以继承\
  \ TestContext 支持类 `AbstractTestNGSpringContextTests`。该类也实现了 `ApplicationContextAware`\
  \ 接口。\n\n```\npackage com.apress.spring6recipes.bank;\nimport org.springframework.test.context.ContextConfiguration;\n\
  import org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
  import org.testng.annotations.AfterMethod;\nimport org.testng.annotations.BeforeMethod;\n\
  import org.testng.annotations.Test;\nimport static org.testng.Assert.assertEquals;\n\
  @ContextConfiguration(classes = BankConfiguration.class)\npublic class AccountServiceContextTests\
  \ extends AbstractTestNGSpringContextTests {\nprivate static final String TEST_ACCOUNT_NO\
  \ = \"1234\";\nprivate AccountService accountService;\n@BeforeMethod\npublic void\
  \ init() {\naccountService = applicationContext.getBean(AccountService.class);\n\
  accountService.createAccount(TEST_ACCOUNT_NO);\naccountService.deposit(TEST_ACCOUNT_NO,\
  \ 100);\n}\n@Test\npublic void deposit() {\naccountService.deposit(TEST_ACCOUNT_NO,\
  \ 50);\nassertEquals(accountService.getBalance(TEST_ACCOUNT_NO), 150, 0);\n}\n@Test\n\
  public void withDraw() {\naccountService.withdraw(TEST_ACCOUNT_NO, 50);\nassertEquals(accountService.getBalance(TEST_ACCOUNT_NO),\
  \ 50, 0);\n}\n@AfterMethod\npublic void cleanup() {\naccountService.removeAccount(TEST_ACCOUNT_NO);\n\
  }\n}\n清单 13-19\nSpring 驱动的 AccountService TestNG 测试\n```\n\n除了手动从 `ApplicationContext`\
  \ 获取 bean，你也可以使用 `@Autowired` 来获取测试所需的依赖。\n\n如果你不希望你的 TestNG 测试类继承 TestContext 支持类，你可以像在\
  \ JUnit 中那样实现 `ApplicationContextAware` 接口。但是，你需要自行集成测试上下文管理器。详情请参考 `AbstractTestNGSpringContextTests`\
  \ 的源代码。\n\n## 13-4. 向集成测试注入测试夹具\n\n### 问题\n\nSpring 应用集成测试的测试夹具大多是应用上下文中声明的 bean。你可能希望\
  \ Spring 通过依赖注入自动注入测试夹具，从而省去手动从应用上下文中检索它们的麻烦。\n\n### 解决方案\n\nSpring 的测试支持设施可以自动将受管理应用上下文中的\
  \ bean 作为测试夹具注入到你的测试中。你可以简单地在测试的 setter 方法或字段上使用 Spring 的 `@Autowired` 注解或 JSR-250\
  \ 的 `@Resource` 注解，让夹具自动注入。对于 `@Autowired`，夹具将按类型注入；对于 `@Resource`，则按名称注入（另请参阅关于依赖注入的第\
  \ 1 章；此处适用相同规则）。\n\n### 实现原理\n\n#### 在 JUnit 中使用 TestContext 框架注入测试夹具\n\n当使用 TestContext\
  \ 框架创建测试时，你可以通过在字段或 setter 方法上标注 `@Autowired` 或 `@Resource` 注解，从受管理的应用上下文中注入测试夹具。在\
  \ JUnit 中，你可以将 `SpringExtension` 指定为测试扩展。\n\n```\npackage com.apress.spring6recipes.bank;\n\
  import org.junit.jupiter.api.AfterEach;\nimport org.junit.jupiter.api.BeforeEach;\n\
  import org.springframework.test.context.junit.jupiter.SpringExtension;\nimport static\
  \ org.junit.jupiter.api.Assertions.assertEquals;\n@ExtendWith(SpringExtension.class)\n\
  @ContextConfiguration(classes = BankConfiguration.class)\nclass AccountServiceContextTests\
  \ {\n@Autowired\nprivate AccountService accountService;\n@BeforeEach\nvoid init()\
  \ {\naccountService.createAccount(TEST_ACCOUNT_NO);\naccountService.deposit(TEST_ACCOUNT_NO,\
  \ 100);\n}\n}\n清单 13-20\n带有注入测试夹具的 JUnit Jupiter 测试\n```\n\n如果你在测试的字段或 setter 方法上标注了\
  \ `@Autowired`，它将通过按类型自动装配的方式注入。你还可以通过在 `@Qualifier` 注解中提供 bean 的名称来指定自动装配的候选 bean。但是，如果你希望按名称自动装配字段或\
  \ setter 方法，可以使用 `@Resource` 注解。\n\n#### 在 TestNG 中使用 TestContext 框架注入测试夹具\n\n在\
  \ TestNG 中，你可以继承 TestContext 支持类 `AbstractTestNGSpringContextTests`，从受管理的应用上下文中注入测试夹具。\n\
  \n```\npackage com.apress.spring6recipes.bank;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
  import org.testng.annotations.BeforeMethod;\nimport static org.testng.Assert.assertEquals;\n\
  @ContextConfiguration(classes = BankConfiguration.class)\npublic class AccountServiceContextTests\
  \ extends AbstractTestNGSpringContextTests {\nprivate static final String TEST_ACCOUNT_NO\
  \ = \"1234\";\n@Autowired\nprivate AccountService accountService;\n@BeforeMethod\n\
  public void init() {\naccountService.createAccount(TEST_ACCOUNT_NO);\naccountService.deposit(TEST_ACCOUNT_NO,\
  \ 100);\n}\n}\n清单 13-21\n带有注入测试夹具的 TestNG 测试\n```\n\n## 13-5. 在集成测试中管理事务\n\n###\
  \ 问题\n\n为访问数据库的应用创建集成测试时，你通常会在初始化方法中准备测试数据。每个测试方法运行后，可能会修改数据库中的数据。因此，你必须清理数据库，以确保下一个测试方法能从一致的状态开始运行。结果，你需要开发许多数据库清理任务。\n\
  \n### 解决方案\n\nSpring 的测试支持设施可以为每个测试方法创建并回滚一个事务，这样你在一个测试方法中所做的更改就不会影响下一个测试方法。这也能省去你开发清理任务来清理数据库的麻烦。\n\
  \nTestContext 框架提供了一个与事务管理相关的测试执行监听器。如果你没有显式指定自己的监听器，默认情况下它会注册到测试上下文管理器中。\n\n`TransactionalTestExecutionListener`：它处理类级别或方法级别的\
  \ `@Transactional` 注解，并让方法自动在事务中运行。\n\n你的测试类可以继承对应测试框架的 TestContext 支持类，如表 13-3\
  \ 所示，以便其测试方法在事务中运行。这些类集成了测试上下文管理器，并在类级别启用了 `@Transactional`。请注意，bean 配置文件中也需要一个事务管理器。\n\
  \n表 13-3\n\n用于事务管理的 TestContext 支持类\n\n| 测试框架 | TestContext 支持类* |\n| --- | ---\
  \ |\n| JUnit | `AbstractTransactionalJUnit4SpringContextTests` |\n| TestNG | `AbstractTransactionalTestNGSpringContextTests`\
  \ |\n\n这些 TestContext 支持类除了启用 `DependencyInjectionTestExecutionListener` 和 `DirtiesContextTestExecutionListener`\
  \ 之外，还启用了 `TransactionalTestExecutionListener` 和 `SqlScriptsTestExecutionListener`。\n\
  \n在 JUnit 和 JUnit Jupiter 中，你也可以简单地在类级别或方法级别标注 `@Transactional`，让测试方法在事务中运行，而无需继承\
  \ TestContext 支持类。但是，为了集成测试上下文管理器，你必须使用测试运行器 `SpringRunner`（针对 JUnit 4）和 `SpringExtension`（针对\
  \ JUnit Jupiter）来运行测试。\n\n\n\n### 工作原理\n\n假设我们要将银行系统的账户信息存储在关系型数据库中。你可以选择任何支持事务且符合\
  \ JDBC 规范的数据库引擎，然后在其上执行以下 SQL 语句来创建 `ACCOUNT` 表。为了测试，我们将使用一个内存中的 H2 数据库。\n\n```\n\
  CREATE TABLE ACCOUNT (\nACCOUNT_NO    VARCHAR(10)    NOT NULL,\nBALANCE       NUMERIC(20,2)\
  \  NOT NULL,\nPRIMARY KEY (ACCOUNT_NO)\n);\n清单 13-22\n银行 SQL 文件\n```\n\n接下来，你需要创建一个新的\
  \ DAO 实现，该实现使用 JDBC 来访问数据库。你可以利用 `JdbcTemplate` 来简化操作。有关 `JdbcTemplate` 和一般数据访问的更多信息，请参见第\
  \ 6 章。\n\n```\npackage com.apress.spring6recipes.bank;\nimport org.springframework.jdbc.core.JdbcTemplate;\n\
  import org.springframework.jdbc.core.support.JdbcDaoSupport;\nimport org.springframework.stereotype.Repository;\n\
  class JdbcAccountDao implements AccountDao {\nprivate final JdbcTemplate jdbcTemplate;\n\
  JdbcAccountDao(JdbcTemplate jdbcTemplate) {\nthis.jdbcTemplate=jdbcTemplate;\n}\n\
  @Override\npublic void createAccount(Account account) {\nvar sql = \"INSERT INTO\
  \ ACCOUNT (ACCOUNT_NO, BALANCE) VALUES (?, ?)\";\nthis.jdbcTemplate.update(sql,\
  \ account.getAccountNo(), account.getBalance());\n}\n@Override\npublic void updateAccount(Account\
  \ account) {\nvar sql = \"UPDATE ACCOUNT SET BALANCE = ? WHERE ACCOUNT_NO = ?\"\
  ;\nthis.jdbcTemplate.update(sql, account.getBalance(), account.getAccountNo());\n\
  }\n@Override\npublic void removeAccount(Account account) {\nvar sql = \"DELETE FROM\
  \ ACCOUNT WHERE ACCOUNT_NO = ?\";\nthis.jdbcTemplate.update(sql, account.getAccountNo());\n\
  }\n@Override\npublic Account findAccount(String accountNo) {\nvar sql = \"SELECT\
  \ BALANCE FROM ACCOUNT WHERE ACCOUNT_NO = ?\";\nvar balance = this.jdbcTemplate.queryForObject(sql,\
  \ Double.class, accountNo);\nreturn new Account(accountNo, balance);\n}\n}\n清单 13-23\n\
  基于 JDBC 的 AccountDao 实现\n```\n\n在创建集成测试来测试使用此 DAO 持久化账户对象的 `AccountService` 实例之前，你需要在配置类中将\
  \ `InMemoryAccountDao` 替换为此 DAO，并同时配置目标数据源和 `JdbcTemplate`：\n\n```\npackage com.apress.spring6recipes.bank;\n\
  import org.h2.Driver;\nimport org.springframework.context.annotation.Bean;\nimport\
  \ org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.jdbc.core.JdbcTemplate;\nimport org.springframework.jdbc.datasource.DataSourceTransactionManager;\n\
  import org.springframework.jdbc.datasource.SimpleDriverDataSource;\nimport org.springframework.transaction.annotation.EnableTransactionManagement;\n\
  import javax.sql.DataSource;\n@Configuration\n@EnableTransactionManagement\n@ComponentScan\n\
  public class BankConfiguration {\n@Bean\npublic SimpleDriverDataSource dataSource()\
  \ {\nvar dataSource = new SimpleDriverDataSource();\ndataSource.setDriverClass(Driver.class);\n\
  dataSource.setUrl(\"jdbc:h2:mem:bank-testing\");\ndataSource.setUsername(\"sa\"\
  );\ndataSource.setPassword(\"\");\nreturn dataSource;\n}\n@Bean\npublic DataSourceTransactionManager\
  \ transactionManager(DataSource dataSource) {\nreturn new DataSourceTransactionManager(dataSource);\n\
  }\n@Bean\npublic JdbcTemplate jdbcTemplate(DataSource dataSource) {\nreturn new\
  \ JdbcTemplate(dataSource);\n}\n@Bean\npublic JdbcAccountDao accountDao(JdbcTemplate\
  \ jdbcTemplate) {\nreturn new JdbcAccountDao(jdbcTemplate);\n}\n}\n```\n\n![](img/314861_5_En_13_Figh_HTML.gif)一个带阴影圆圈内字母\
  \ i 的图标，代表信息符号。 要使用 H2，你必须将其作为依赖项添加到类路径中。\n\n*H2 的 Maven 依赖*\n\n```\n<dependency>\n\
  \    <groupId>com.h2database</groupId>\n    <artifactId>h2</artifactId>\n    <version>2.1.214</version>\n\
  </dependency>\n```\n\n*H2 的 Gradle 依赖*\n\n`testImplementation 'com.h2database:h2:2.1.214'`\n\
  \n#### 在 JUnit 中使用 TestContext 框架管理事务\n\n当使用 TestContext 框架创建测试时，你可以通过在类或方法级别上标注\
  \ `@Transactional` 来让测试方法在事务内运行。对于 JUnit Jupiter，你可以为测试类指定 `SpringExtension`，这样它就不需要继承支持类了。\n\
  \n```\npackage com.apress.spring6recipes.bank;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.junit.jupiter.SpringExtension;\n\
  import org.springframework.transaction.annotation.Transactional;\n@ExtendWith(SpringExtension.class)\n\
  @ContextConfiguration(classes = BankConfiguration.class)\n@Transactional\nclass\
  \ AccountServiceContextTests {\nprivate static final String TEST_ACCOUNT_NO = \"\
  1234\";\n@Autowired\nprivate AccountService accountService;\n@BeforeEach\nvoid init()\
  \ {\naccountService.createAccount(TEST_ACCOUNT_NO);\naccountService.deposit(TEST_ACCOUNT_NO,\
  \ 100);\n}\n}\n清单 13-24\n支持事务的 JUnit Jupiter AccountService 测试\n```\n\n如果你用 `@Transactional`\
  \ 标注了一个测试类，那么它的所有测试方法都将在事务内运行。另一种选择是仅用 `@Transactional` 标注单个方法，而不是整个类。\n\n默认情况下，测试方法的事务会在结束时回滚。你可以使用\
  \ `@Rollback` 注解来覆盖这个类级别的回滚行为，该注解需要一个 `Boolean` 值；这可以在整个类级别或每个方法级别上指定。\n\n![](img/314861_5_En_13_Figi_HTML.gif)一个带阴影圆圈内字母\
  \ i 的图标，代表信息符号。 带有 `@BeforeEach` 或 `@AfterEach` 注解的方法将与测试方法在同一个事务内执行。如果你有需要在事务之前或之后执行初始化或清理任务的方法，则必须使用\
  \ `@BeforeTransaction` 或 `@AfterTransaction` 来标注它们。\n\n最后，你还需要在 Bean 配置文件中配置一个事务管理器。默认情况下，会使用类型为\
  \ `PlatformTransactionManager` 的 Bean，但你可以在 `@Transactional` 注解的 `transactionManager`\
  \ 属性中通过指定名称来指定另一个事务管理器。\n\n#### 在 TestNG 中使用 TestContext 框架管理事务\n\n要创建在事务内运行的 TestNG\
  \ 测试，你的测试类可以继承 TestContext 支持类 `AbstractTransactionalTestNGSpringContextTests`，以便其方法在事务内运行。\n\
  \n```\npackage com.apress.spring6recipes.bank;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.testng.AbstractTransactionalTestNGSpringContextTests;\n\
  import org.testng.annotations.BeforeMethod;\nimport org.testng.annotations.Test;\n\
  import static org.testng.Assert.assertEquals;\n@ContextConfiguration(classes = BankConfiguration.class)\n\
  public class AccountServiceContextTests\nextends AbstractTransactionalTestNGSpringContextTests\
  \ {\nprivate static final String TEST_ACCOUNT_NO = \"1234\";\n@Autowired\nprivate\
  \ AccountService accountService;\n@BeforeMethod\npublic void init() {\naccountService.createAccount(TEST_ACCOUNT_NO);\n\
  accountService.deposit(TEST_ACCOUNT_NO, 100);\n}\n}\n清单 13-25\n支持事务的 TestNG AccountService\
  \ 测试\n```\n\n## 13-6\\. 集成测试 Spring MVC 控制器\n\n### 问题\n\n在 Web 应用程序中，你希望对使用 Spring\
  \ MVC 框架开发的 Web 控制器进行集成测试。\n\n\n\n### 解决方案\n\nSpring MVC 控制器由 `DispatcherServlet`\
  \ 通过 HTTP 请求对象调用。处理完请求后，控制器将其返回给 `DispatcherServlet` 以渲染视图。对 Spring MVC 控制器以及其他\
  \ Web 应用框架中的 Web 控制器进行集成测试的主要挑战在于：在测试环境中模拟 HTTP 请求对象和响应对象，以及为测试搭建模拟环境。幸运的是，Spring\
  \ 在 Spring 测试支持中提供了 Mock MVC 部分。这使得搭建模拟 Servlet 环境变得简单。\n\nSpring Mock MVC 将根据你的配置设置一个\
  \ `WebApplicationContext`。接着，你可以使用 `MockMvc` API 来模拟 HTTP 请求并验证结果。\n\n### 工作原理\n\
  \n在我们的银行应用中，我们希望对 `DepositController`（清单 13-26）进行集成测试。在开始测试之前，我们需要创建一个配置类来配置与 Web\
  \ 相关的 Bean（清单 13-27）。\n\n```\npackage com.apress.spring6recipes.bank.web.config;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.web.servlet.ViewResolver;\n\
  import org.springframework.web.servlet.config.annotation.EnableWebMvc;\nimport org.springframework.web.servlet.view.InternalResourceViewResolver;\n\
  @Configuration\n@EnableWebMvc\n@ComponentScan(basePackages = \"com.apress.spring6recipes.bank.web\"\
  )\npublic class BankWebConfiguration {\n@Bean\npublic ViewResolver viewResolver()\
  \ {\nvar viewResolver = new InternalResourceViewResolver();\nviewResolver.setPrefix(\"\
  /WEB-INF/views/\");\nviewResolver.setSuffix(\".jsp\");\nreturn viewResolver;\n}\n\
  }\n清单 13-27\n银行 Web 配置\n```\n\n```\npackage com.apress.spring6recipes.bank.web;\n\
  import com.apress.spring6recipes.bank.AccountService;\nimport org.springframework.stereotype.Controller;\n\
  import org.springframework.ui.Model;\nimport org.springframework.ui.ModelMap;\n\
  import org.springframework.web.bind.annotation.PostMapping;\nimport org.springframework.web.bind.annotation.RequestMapping;\n\
  import org.springframework.web.bind.annotation.RequestParam;\n@Controller\npublic\
  \ class DepositController {\nprivate final AccountService accountService;\npublic\
  \ DepositController(AccountService accountService) {\nthis.accountService = accountService;\n\
  }\n@PostMapping(\"/deposit\")\npublic String deposit(@RequestParam(\"accountNo\"\
  ) String accountNo,\n@RequestParam(\"amount\") double amount,\nModel model) {\n\
  accountService.deposit(accountNo, amount);\nmodel.addAttribute(\"accountNo\", accountNo);\n\
  model.addAttribute(\"balance\", accountService.getBalance(accountNo));\nreturn \"\
  success\";\n}\n}\n清单 13-26\nDepositController 类\n```\n\n该配置通过使用 `@EnableWebMvc`\
  \ 注解启用了基于注解的控制器。接着，你希望使用 `@ComponentScan` 注解自动拾取带有 `@Controller` 注解的 Bean。最后，有一个\
  \ `InternalResourceViewResolver`，它将视图名称转换为通常由浏览器渲染的 URL，你现在将在控制器中对此进行验证。\n\n现在基于\
  \ Web 的配置已经就绪，我们可以开始创建集成测试了。该测试必须加载我们的 `BankWebConfiguration` 类，并且还必须使用 `@WebAppConfiguration`\
  \ 进行注解，以告知 TestContext 框架我们需要一个 `WebApplicationContext` 而不是常规的 `ApplicationContext`。\n\
  \n#### 使用 JUnit 对 Spring MVC 控制器进行集成测试\n\n在 JUnit Jupiter 中，使用 `SpringExtension`\
  \ 来运行测试是最简单的方法。\n\n```\npackage com.apress.spring6recipes.bank.web;\nimport static\
  \ org.springframework.test.web.servlet.request.MockMvcRequestBuilders.post;\nimport\
  \ static org.springframework.test.web.servlet.result.MockMvcResultMatchers.forwardedUrl;\n\
  import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.status;\n\
  import org.junit.jupiter.api.BeforeEach;\nimport org.junit.jupiter.api.Test;\nimport\
  \ org.junit.jupiter.api.extension.ExtendWith;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.test.context.ContextConfiguration;\nimport org.springframework.test.context.junit.jupiter.SpringExtension;\n\
  import org.springframework.test.context.web.WebAppConfiguration;\nimport org.springframework.test.web.servlet.MockMvc;\n\
  import org.springframework.test.web.servlet.setup.MockMvcBuilders;\nimport org.springframework.web.context.WebApplicationContext;\n\
  import com.apress.spring6recipes.bank.Account;\nimport com.apress.spring6recipes.bank.AccountDao;\n\
  import com.apress.spring6recipes.bank.BankConfiguration;\nimport com.apress.spring6recipes.bank.web.config.BankWebConfiguration;\n\
  @ExtendWith(SpringExtension.class)\n@ContextConfiguration(classes = {\nBankWebConfiguration.class,\n\
  BankConfiguration.class })\n@WebAppConfiguration\nclass DepositControllerContextTests\
  \ {\nprivate static final String ACCOUNT_PARAM = \"accountNo\";\nprivate static\
  \ final String AMOUNT_PARAM = \"amount\";\nprivate static final String TEST_ACCOUNT_NO\
  \ = \"1234\";\nprivate static final String TEST_AMOUNT = \"50.0\";\n@Autowired\n\
  private WebApplicationContext webApplicationContext;\n@Autowired\nprivate AccountDao\
  \ accountDao;\nprivate MockMvc mockMvc;\n@BeforeEach\npublic void init() {\naccountDao.createAccount(new\
  \ Account(TEST_ACCOUNT_NO, 100));\nmockMvc = MockMvcBuilders\n.webAppContextSetup(webApplicationContext)\n\
  .build();\n}\n@Test\nvoid deposit() throws Exception {\nmockMvc.perform(\npost(\"\
  /deposit\")\n.param(ACCOUNT_PARAM, TEST_ACCOUNT_NO)\n.param(AMOUNT_PARAM, TEST_AMOUNT))\n\
  .andExpect(forwardedUrl(\"/WEB-INF/views/success.jsp\"))\n.andExpect(status().isOk());\n\
  }\n}\n清单 13-28\nJUnit Jupiter DepositController 测试类\n```\n\n在 `init` 方法中，你通过使用便捷的\
  \ `MockMvcBuilders` 来准备 `MockMvc` 对象。使用工厂方法 `webAppContextSetup`，我们可以利用已加载的 `WebApplicationContext`\
  \ 来初始化 `MockMvc` 对象。`MockMvc` 对象基本上模拟了 `DispatcherServlet` 的行为，而 `DispatcherServlet`\
  \ 是你将在基于 Spring MVC 的应用中使用的。它将使用传入的 `WebApplicationContext` 来配置处理器映射和视图解析策略，并且还会应用任何已配置的拦截器。\n\
  \n此外，还设置了一个测试账户，以便我们有一些数据可以操作。\n\n在 `deposit` 测试方法中，使用初始化后的 `MockMvc` 对象来模拟一个带有两个请求参数\
  \ `accountNo` 和 `amount` 的 POST 请求，发送到 `/deposit` URL。`MockMvcRequestBuilders.get`\
  \ 工厂方法会生成一个 `RequestBuilder` 实例，该实例被传递给 `MockMvc.perform` 方法。\n\n`perform` 方法返回一个\
  \ `ResultActions` 对象，该对象可用于对返回结果进行断言和某些操作。最后，有两个断言用于验证一切是否按预期工作。`DepositController`\
  \ 返回 `success` 作为视图名称，由于 `ViewResolver` 的配置，这应该会导致转发到 `/WEB-INF/views/success.jsp`。请求的返回码应为\
  \ 200（OK），可以通过 `status().isOk()` 或 `status().is(200)` 进行测试。\n\n\n\n#### 使用 TestNG\
  \ 对 Spring MVC 控制器进行集成测试\n\nSpring Mock MVC 也可以与 TestNG 一起使用。扩展适当的基类 `AbstractTransactionalTestNGSpringContextTests`\
  \ 并添加 `@WebAppConfiguration` 注解。\n\n```\npackage com.apress.spring6recipes.bank.web;\n\
  import com.apress.spring6recipes.bank.Account;\nimport com.apress.spring6recipes.bank.AccountDao;\n\
  import com.apress.spring6recipes.bank.BankConfiguration;\nimport com.apress.spring6recipes.bank.web.config.BankWebConfiguration;\n\
  import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.test.context.ContextConfiguration;\n\
  import org.springframework.test.context.testng.AbstractTestNGSpringContextTests;\n\
  import org.springframework.test.context.web.WebAppConfiguration;\nimport org.springframework.test.web.servlet.MockMvc;\n\
  import org.springframework.test.web.servlet.result.MockMvcResultMatchers;\nimport\
  \ org.springframework.test.web.servlet.setup.MockMvcBuilders;\nimport org.springframework.web.context.WebApplicationContext;\n\
  import org.testng.annotations.BeforeMethod;\nimport org.testng.annotations.Test;\n\
  import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.get;\n\
  import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.post;\n\
  import static org.springframework.test.web.servlet.result.MockMvcResultHandlers.print;\n\
  import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.forwardedUrl;\n\
  import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.status;\n\
  @ContextConfiguration(classes = {\nBankWebConfiguration.class,\nBankConfiguration.class\
  \ })\n@WebAppConfiguration\npublic class DepositControllerContextTests extends AbstractTestNGSpringContextTests\
  \ {\nprivate static final String ACCOUNT_PARAM = \"accountNo\";\nprivate static\
  \ final String AMOUNT_PARAM = \"amount\";\nprivate static final String TEST_ACCOUNT_NO\
  \ = \"1234\";\nprivate static final String TEST_AMOUNT = \"50.0\";\n@Autowired\n\
  private WebApplicationContext webApplicationContext;\n@Autowired\nprivate AccountDao\
  \ accountDao;\nprivate MockMvc mockMvc;\n@BeforeMethod\npublic void init() {\naccountDao.createAccount(new\
  \ Account(TEST_ACCOUNT_NO, 100));\nmockMvc = MockMvcBuilders\n.webAppContextSetup(webApplicationContext)\n\
  .build();\n}\n@Test\npublic void deposit() throws Exception {\nmockMvc.perform(post(\"\
  /deposito\")\n.param(ACCOUNT_PARAM, TEST_ACCOUNT_NO)\n.param(AMOUNT_PARAM, TEST_AMOUNT))\n\
  .andExpect(forwardedUrl(\"/WEB-INF/views/success.jsp\"))\n.andExpect(status().isOk());\n\
  }\n}\n清单 13-29\nJUnit Jupiter DepositController 测试类\n```\n\n## 13-7\\. REST 客户端的集成测试\n\
  \n### 问题\n\n你想为基于 `RestTemplate` 的客户端编写一个集成测试。\n\n### 解决方案\n\n在编写基于 REST 的客户端的集成测试时，你不想依赖外部服务的可用性。你可以使用模拟服务器编写一个集成测试，让它返回预期结果，而不是调用真实的端点。\n\
  \n### 工作原理\n\n在银行工作时，你需要验证人们输入的账号。你可以实现自己的验证逻辑，也可以重用现有的验证逻辑。你将实现一个 IBAN 验证服务，该服务将使用\
  \ [`https://openiban.com`](https://openiban.com/) 上提供的 API。\n\n首先，编写一个定义契约的接口。\n\
  \n```\npackage com.apress.spring6recipes.bank.web;\npublic interface IBANValidationClient\
  \ {\nIBANValidationResult validate(String iban);\n}\n清单 13-30\nIBAN 验证客户端接口\n```\n\
  \n`IBANValidationResult` 包含对验证端点的调用结果。\n\n```\npackage com.apress.spring6recipes.bank.web;\n\
  import java.util.ArrayList;\nimport java.util.HashMap;\nimport java.util.List;\n\
  import java.util.Map;\npublic record IBANValidationResult(\nboolean valid,\nList\
  \ messages,\nString iban,\nMap bankData) {\n}\n清单 13-31\nIBAN 验证结果 DTO\n```\n\n\
  接下来，编写 `OpenIBANValidationClient`，它将使用 `RestTemplate` 与 API 通信。为了便于访问 `RestTemplate`，你可以扩展\
  \ `RestGatewaySupport`。\n\n```\npackage com.apress.spring6recipes.bank.web;\nimport\
  \ org.springframework.stereotype.Service;\nimport org.springframework.web.client.support.RestGatewaySupport;\n\
  @Service\nclass OpenIBANValidationClient extends RestGatewaySupport\nimplements\
  \ IBANValidationClient {\nprivate static final String URL_TEMPLATE =\n\"https://openiban.com/validate/{IBAN_NUMBER}?getBIC=true&validateBankCode=true\"\
  ;\n@Override\npublic IBANValidationResult validate(String iban) {\nreturn getRestTemplate()\n\
  .getForObject(URL_TEMPLATE, IBANValidationResult.class, iban);\n}\n}\n清单 13-32\n\
  IBAN 验证客户端 RestTemplate 实现\n```\n\n接下来，你将创建一个测试，为 `OpenIBANValidationClient` 构建一个\
  \ `MockRestServiceServer`，并将其配置为针对预期请求返回特定的 JSON 结果。\n\n```\npackage com.apress.spring6recipes.bank.web;\n\
  import org.junit.jupiter.api.BeforeEach;\nimport org.junit.jupiter.api.Test;\nimport\
  \ org.springframework.core.io.ClassPathResource;\nimport org.springframework.http.MediaType;\n\
  import org.springframework.test.web.client.MockRestServiceServer;\nimport static\
  \ org.junit.jupiter.api.Assertions.assertFalse;\nimport static org.junit.jupiter.api.Assertions.assertTrue;\n\
  import static org.springframework.test.web.client.match.MockRestRequestMatchers.requestTo;\n\
  import static org.springframework.test.web.client.response.MockRestResponseCreators.withSuccess;\n\
  public class OpenIBANValidationClientTest {\nprivate final OpenIBANValidationClient\
  \ client = new OpenIBANValidationClient();\nprivate MockRestServiceServer mockRestServiceServer;\n\
  @BeforeEach\npublic void init() {\nmockRestServiceServer = MockRestServiceServer.createServer(client);\n\
  }\n@Test\npublic void validIban() {\nvar json = new ClassPathResource(\"NL87TRIO0396451440-result.json\"\
  );\nvar expectedUri = \"https://openiban.com/validate/NL87TRIO0396451440?getBIC=true&validateBankCode=true\"\
  ;\nmockRestServiceServer\n.expect(requestTo(expectedUri))\n.andRespond(withSuccess(json,\
  \ MediaType.APPLICATION_JSON));\nvar result = client.validate(\"NL87TRIO0396451440\"\
  );\nassertTrue(result.valid());\n}\n@Test\npublic void invalidIban() {\nvar expectedUri\
  \ = \"https://openiban.com/validate/NL28XXXX389242218?getBIC=true&validateBankCode=true\"\
  ;\nvar json = new ClassPathResource(\"NL28XXXX389242218-result.json\");\nmockRestServiceServer\n\
  .expect(requestTo(expectedUri))\n.andRespond(withSuccess(json, MediaType.APPLICATION_JSON));\n\
  var result = client.validate(\"NL28XXXX389242218\");\nassertFalse(result.valid());\n\
  }\n}\n清单 13-33\nIBAN 验证客户端测试\n```\n\n测试类包含两个测试方法，它们非常相似。在 `init` 方法中，你使用 `OpenIBANValidationClient`\
  \ 创建一个 `MockRestServiceServer`（这是可行的，因为它扩展了 `RestGatewaySupport`）。另一种选择是使用接受 `RestTemplate`\
  \ 的 `create` 方法；然后传入你的客户端正在使用的 `RestTemplate`。在测试方法中，你使用一个 URL 设置预期，现在当该 URL 被调用时，将返回来自类路径的\
  \ JSON 响应作为答案（清单 13-34 和 13-35）。\n\n```\n{\n\"valid\": false,\n\"messages\": [\n\
  \"Validation failed.\",\n\"Invalid bank code: XXXX\",\n\"No BIC found for bank code:\
  \ XXXX\"\n],\n\"iban\": \"NL28XXXX0389242218\",\n\"bankData\": {\n\"bankCode\":\
  \ \"\",\n\"name\": \"\"\n},\n\"checkResults\": {\n\"bankCode\": false\n}\n}\n清单\
  \ 13-35\nJSON 响应文件（无效）\n```\n\n```\n{\n\"valid\": true,\n\"messages\": [\n\"Bank\
  \ code valid: TRIO\"\n],\n\"iban\": \"NL87TRIO0396451440\",\n\"bankData\": {\n\"\
  bankCode\": \"TRIO\",\n\"name\": \"TRIODOS BANK NV\",\n\"bic\": \"TRIONL2U\"\n},\n\
  \"checkResults\": {\n\"bankCode\": true\n}\n}\n清单 13-34\nJSON 响应文件（有效）\n```\n\n\
  为了进行测试，你可能希望使用服务器的一些已知响应，为此你可以使用来自真实系统的一些记录结果，或者它们可能已经提供了用于测试的结果。\n\n\n\n## 13-8\\\
  . 使用 Testcontainers 进行集成测试\n\n### 问题\n\n你希望使用真实的数据库进行测试，而不是像 H2 这样的内存数据库。\n\n###\
  \ 解决方案\n\n使用 Testcontainers 启动一个 Docker 化的数据库版本用于测试。\n\n### 工作原理\n\n配方 13-5 解释了如何执行依赖事务和数据库的测试。在那个配方中，你使用了\
  \ H2 作为数据库实现。然而，在实际环境中，你可能会使用更健壮的数据库，如 PostgreSQL、DB2 或 MySQL 等。对于大多数数据库，都有 Docker\
  \ 化的版本可供使用，例如用于测试。借助 [Testcontainers](https://testcontainers.org/) 及其与测试库的集成，现在可以使用真实的数据库进行测试。\n\
  \n#### 将 Testcontainers 与 JUnit Jupiter 结合使用\n\n首先，需要添加一些依赖项，包括要使用的容器类型以及 JUnit\
  \ Jupiter 的集成库。\n\n*Maven 依赖*\n\n```\norg.testcontainers\njunit-jupiter\n1.17.3\n\
  \norg.testcontainers\npostgresql\n1.17.3\n\n```\n\n*Gradle 依赖*\n\n```\ntestImplementation\
  \ 'org.testcontainers:junit-jupiter:1.17.3'\ntestImplementation 'org.testcontainers:postgresql:1.17.3'\n\
  ```\n\n要将 Testcontainers 与 JUnit Jupiter 结合使用，有一个测试扩展，可以通过在测试上添加 `@Testcontainers`\
  \ 注解来启用。接下来，你需要指定要使用的容器；对于这个测试，我们使用 `PostgreSQLContainer`，因为它用于数据库驱动的测试。不过，还有许多其他容器可用于不同的数据库、消息传递实现等。你甚至可以通过使用\
  \ `GenericContainer` 来指定自己的容器。\n\n```\npackage com.apress.spring6recipes.bank;\n\
  import org.junit.jupiter.api.BeforeEach;\nimport org.junit.jupiter.api.Test;\nimport\
  \ org.junit.jupiter.api.extension.ExtendWith;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.test.context.ActiveProfiles;\nimport org.springframework.test.context.ContextConfiguration;\n\
  import org.springframework.test.context.DynamicPropertyRegistry;\nimport org.springframework.test.context.DynamicPropertySource;\n\
  import org.springframework.test.context.jdbc.Sql;\nimport org.springframework.test.context.junit.jupiter.SpringExtension;\n\
  import org.springframework.transaction.annotation.Transactional;\nimport org.testcontainers.containers.PostgreSQLContainer;\n\
  import org.testcontainers.junit.jupiter.Container;\nimport org.testcontainers.junit.jupiter.Testcontainers;\n\
  import static org.junit.jupiter.api.Assertions.assertEquals;\n@ExtendWith(SpringExtension.class)\n\
  @Testcontainers\n@ContextConfiguration(classes = BankConfiguration.class)\n@Transactional\n\
  @ActiveProfiles(\"jdbc\")\n@Sql(scripts = { \"classpath:/bank.sql\" })\nclass AccountServiceContextTests\
  \ {\n@Container\nprivate static final PostgreSQLContainer POSTGRES =\nnew PostgreSQLContainer(\"\
  postgres:14.5\");\nprivate static final String TEST_ACCOUNT_NO = \"1234\";\n@Autowired\n\
  private AccountService accountService;\n@DynamicPropertySource\nstatic void registerPgProperties(DynamicPropertyRegistry\
  \ registry) {\nregistry.add(\"jdbc.driver\",   POSTGRES::getDriverClassName);\n\
  registry.add(\"jdbc.url\",      POSTGRES::getJdbcUrl);\nregistry.add(\"jdbc.username\"\
  , POSTGRES::getUsername);\nregistry.add(\"jdbc.password\", POSTGRES::getPassword);\n\
  }\n@BeforeEach\npublic void init() {\naccountService.createAccount(TEST_ACCOUNT_NO);\n\
  accountService.deposit(TEST_ACCOUNT_NO, 100);\n}\n@Test\nvoid deposit() {\naccountService.deposit(TEST_ACCOUNT_NO,\
  \ 50);\nassertEquals(150, accountService.getBalance(TEST_ACCOUNT_NO), 0);\n}\n@Test\n\
  void withDraw() {\naccountService.withdraw(TEST_ACCOUNT_NO, 50);\nassertEquals(50,\
  \ accountService.getBalance(TEST_ACCOUNT_NO), 0);\n}\n}\n清单 13-36 使用 Testcontainers\
  \ 的 JUnit Jupiter AccountService 测试\n```\n\n注意 `PostgreSQLContainer` 上的 `static`\
  \ 关键字；这将使容器在整个测试类中启动一次，并在所有测试运行后关闭。也可以移除 `static`，这样做的话，容器将在每个要运行的测试中启动和停止。使用哪种方式取决于用例和测试内容。使用\
  \ `static` 容器具有容器复用的优势，因此速度更快。\n\n启动容器后，由于端口是动态的，我们需要将这些信息提供给应用程序。Spring TestContext\
  \ 框架为此提供了一个动态属性源。（有关外部配置的更多信息，请参见第 1 章。）要使用它，请在测试类中用一个 `static` 方法标注 `@DynamicPropertySource`，并向应用程序注册所需的配置（参见\
  \ `registerPgProperties` 方法）。\n\n此处设置的属性将覆盖应用程序中通过常规 `@PropertySource` 加载的属性。\n\n\
  类的其余部分可以与配方 13-5 保持一致，因为你正在执行的测试是相同的。现在运行测试时，将启动一个 PostgreSQL 实例（如果需要，会先下载），创建模式（得益于\
  \ `@Sql` 注解），然后运行测试。\n\n\n\n#### 将 Testcontainers 与 TestNG 结合使用\n\nTestcontainers\
  \ 没有为 TestNG 提供支持库，因此需要一些手动操作。需要使用 TestNG 的生命周期方法 `@BeforeSuite` 和 `@AfterSuite`\
  \ 来启动和停止容器。由于 Spring Test 需要与 TestNG 集成的方式，`@BeforeMethod` 或 `@BeforeClass` 将无法正常工作。\n\
  \n```\npackage com.apress.spring6recipes.bank;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
  import org.springframework.test.context.ActiveProfiles;\nimport org.springframework.test.context.ContextConfiguration;\n\
  import org.springframework.test.context.DynamicPropertyRegistry;\nimport org.springframework.test.context.DynamicPropertySource;\n\
  import org.springframework.test.context.jdbc.Sql;\nimport org.springframework.test.context.testng.AbstractTransactionalTestNGSpringContextTests;\n\
  import org.testcontainers.containers.PostgreSQLContainer;\nimport org.testng.annotations.AfterSuite;\n\
  import org.testng.annotations.BeforeMethod;\nimport org.testng.annotations.BeforeSuite;\n\
  import org.testng.annotations.Test;\nimport static org.testng.Assert.assertEquals;\n\
  @ContextConfiguration(classes = BankConfiguration.class)\n@ActiveProfiles(\"jdbc\"\
  )\n@Sql(scripts = { \"classpath:/bank.sql\" })\npublic class AccountServiceContextTests\
  \ extends AbstractTransactionalTestNGSpringContextTests {\nprivate static final\
  \ PostgreSQLContainer POSTGRES =\nnew PostgreSQLContainer(\"postgres:14.5\");\n\
  private static final String TEST_ACCOUNT_NO = \"1234\";\n@Autowired\nprivate AccountService\
  \ accountService;\n@DynamicPropertySource\nstatic void registerPgProperties(DynamicPropertyRegistry\
  \ registry) {\nregistry.add(\"jdbc.driver\",   POSTGRES::getDriverClassName);\n\
  registry.add(\"jdbc.url\",      POSTGRES::getJdbcUrl);\nregistry.add(\"jdbc.username\"\
  , POSTGRES::getUsername);\nregistry.add(\"jdbc.password\", POSTGRES::getPassword);\n\
  }\n@BeforeSuite\npublic static void start() {\nPOSTGRES.start();\n}\n@AfterSuite\n\
  public static void stop() {\nPOSTGRES.stop();\n}\n@BeforeMethod\npublic void init()\
  \ {\naccountService.createAccount(TEST_ACCOUNT_NO);\naccountService.deposit(TEST_ACCOUNT_NO,\
  \ 100);\n}\n@Test\npublic void deposit() {\naccountService.deposit(TEST_ACCOUNT_NO,\
  \ 50);\nassertEquals(accountService.getBalance(TEST_ACCOUNT_NO), 150, 0);\n}\n@Test\n\
  public void withDraw() {\naccountService.withdraw(TEST_ACCOUNT_NO, 50);\nassertEquals(accountService.getBalance(TEST_ACCOUNT_NO),\
  \ 50, 0);\n}\n}\n代码清单 13-37\n使用 Testcontainers 的 TestNG AccountService 测试\n```\n\
  \n启动容器后，由于端口是动态的，我们需要将这些信息提供给应用程序。Spring TestContext 框架为此提供了动态属性源。（有关外部配置的更多信息，请参见第\
  \ 1 章。）要使用它，请使用 `@DynamicPropertySource` 注解一个 `static` 方法，并向应用程序注册所需的配置（参见 `registerPgProperties`\
  \ 方法）。\n\n此处设置的属性将覆盖从应用程序中使用的常规 `@PropertySource` 加载的属性。\n\n类的其余部分可以与配方 13-5 中的相同，因为您要执行的测试是相同的。现在，运行测试时，将启动一个\
  \ PostgreSQL 实例（如果需要，会先下载），创建模式，然后运行测试。\n\n## 13-9\\. 本章小结\n\n在本章中，您学习了测试 Java 应用程序中使用的基本概念和技术。JUnit\
  \ Jupiter 和 TestNG 是 Java 平台上最流行的测试框架。单元测试用于测试单个编程单元，在面向对象语言中通常是一个类或方法。当测试依赖于其他单元的单元时，您可以使用桩和模拟对象来模拟其依赖项，从而使测试更简单。相比之下，集成测试用于将多个单元作为一个整体进行测试。\n\
  \n在 Web 层，控制器通常难以测试。Spring 为 Servlet API 提供了模拟对象，以便您可以轻松模拟 Web 请求和响应对象来测试 Web 控制器。还有\
  \ Spring Mock MVC 可用于轻松地对控制器进行集成测试。适用于控制器的内容也适用于基于 REST 的客户端。为了帮助您测试这些客户端，Spring\
  \ 提供了 `MockRestServiceServer`，您可以使用它来模拟外部系统。\n\nSpring 的测试支持工具可以通过从 Bean 配置文件加载应用程序上下文并在多次测试执行之间缓存它们来管理测试的应用程序上下文。您可以在测试中访问受管理的应用程序上下文，并且测试夹具会自动从应用程序上下文中注入。此外，如果您的测试涉及数据库更新，Spring\
  \ 可以为它们管理事务，以便在一个测试方法中所做的更改将被回滚，从而不会影响下一个测试方法。这也适用于使用 Testcontainers 运行以使用真实数据存储或消息传递解决方案的测试。\n\
  \n# 14. 缓存\n\n当程序中执行繁重的计算、数据检索速度缓慢或检索到的数据几乎从不更改时，应用缓存可能会很有用。缓存是一种透明地存储和检索数据的能力，以便可以更快地向客户端提供数据。\n\
  \n在 Java 生态系统中，有多种缓存实现，从使用简单的 `Map` 实现到完全分布式缓存解决方案（例如 [Coherence](https://docs.oracle.com/en/middleware/fusion-middleware/coherence/)）。此外，还有久经考验且值得信赖的\
  \ Ehcache 和 [Caffeine](https://github.com/ben-manes/caffeine)。\n\n还有一个名为 JCache\
  \ 的通用缓存 API（[JSR-107](https://www.jcp.org/en/jsr/detail%253Fid%253D107)）；该规范有多种实现（例如\
  \ Apache JCS 和 Hazelcast）。此外，Oracle Coherence 也符合 JCache 规范。\n\nSpring 提供了一个缓存抽象，以便更轻松地使用这些实现中的任何一个，这使得向应用程序添加缓存变得非常容易。对于测试，您可以使用基于简单映射的实现，而您的实际系统将使用\
  \ Oracle Coherence 集群进行缓存。\n\n在本章中，您将探索 Spring 的缓存抽象，并了解将缓存应用于应用程序的不同策略。\n\n## 14-1\\\
  . 使用 Caffeine 进行缓存\n\n### 问题\n\n您有一个包含一些繁重计算任务的应用程序。您希望缓存结果并重复使用它。\n\n### 解决方案\n\
  \n使用 [Caffeine](https://github.com/ben-manes/caffeine) 存储计算结果。对于每次计算，检查结果是否已存在。如果存在，则返回缓存的值，否则进行计算并将其放入缓存。\n\
  \n您需要将 Caffeine 作为依赖项添加到您的类路径中。\n\n```\ncom.github.ben-manes.caffeine\ncaffeine\n\
  3.1.2\n\n代码清单 14-2\nMaven 依赖\n```\n\n```\nimplementation group: 'com.github.ben-manes.caffeine',\
  \ name: 'caffeine', version: '3.1.2'\n代码清单 14-1\nGradle 依赖\n```\n\n\n\n### 工作原理\n\
  \n首先，我们创建一个 `CalculationService`，通过休眠来模拟繁重的计算。\n\n```\npackage com.apress.spring6recipes.caching;\n\
  import com.apress.spring6recipes.utils.Utils;\nimport java.math.BigDecimal;\nclass\
  \ PlainCalculationService implements CalculationService {\n@Override\npublic BigDecimal\
  \ heavyCalculation(BigDecimal base, int power) {\nreturn calculate(base, power);\n\
  }\nprivate BigDecimal calculate(BigDecimal base, int power) {\nUtils.sleep(500);\n\
  return base.pow(power);\n}\n}\n清单 14-3\nPlainCalculationService\n```\n\n可以看出，幂运算是一项非常繁重的计算。创建一个\
  \ `Main` 类，通过几次迭代来运行此程序。\n\n```\npackage com.apress.spring6recipes.caching;\nimport\
  \ java.math.BigDecimal;\npublic class Main {\npublic static final void main(String[]\
  \ args) throws Exception {\nvar calculationService = new PlainCalculationService();\n\
  for (int i = 0; i < 5; i++) {\nvar start = System.currentTimeMillis();\nvar result\
  \ = calculationService.heavyCalculation(BigDecimal.valueOf(2L), 16);\nvar duration\
  \ = System.currentTimeMillis() - start;\nSystem.out.printf(\"Result: %.0f, Took:\
  \ %dms%n\", result, duration);\n}\n}\n}\n清单 14-4\nMain 类\n```\n\n主类将运行五次计算，并输出结果以及计算所花费的时间。运行时，你会看到每次计算的时间大约为\
  \ 500 毫秒，这主要是由于 `Thread.sleep()` 造成的。\n\n```\nResult: 65536, Took: 513ms\nResult:\
  \ 65536, Took: 504ms\nResult: 65536, Took: 504ms\nResult: 65536, Took: 501ms\nResult:\
  \ 65536, Took: 504ms\n清单 14-5\n控制台输出\n```\n\n#### 在无 Spring 环境下使用 Caffeine\n\n让我们通过引入缓存来改进系统。为此，你将使用纯\
  \ Caffeine。修改后的服务如下所示。\n\n```\npackage com.apress.spring6recipes.caching;\nimport\
  \ com.apress.spring6recipes.utils.Utils;\nimport com.github.benmanes.caffeine.cache.Cache;\n\
  import java.math.BigDecimal;\nclass PlainCachingCalculationService implements CalculationService\
  \ {\nprivate final Cache cache;\npublic PlainCachingCalculationService(Cache cache)\
  \ {\nthis.cache = cache;\n}\n@Override\npublic BigDecimal heavyCalculation(BigDecimal\
  \ base, int power) {\nvar key = base + \"^\" + power;\nreturn cache.get(key, k ->\
  \ this.calculate(base, power));\n}\nprivate BigDecimal calculate(BigDecimal base,\
  \ int power) {\nUtils.sleep(500);\nreturn base.pow(power);\n}\n}\n清单 14-6\n带缓存的\
  \ PlainCalculationService\n```\n\n首先，注意服务中新增了一个 `cache` 变量。这个缓存通过构造函数注入。让我们看看更新后的\
  \ `heavyCalculation` 方法。首先，它根据方法参数生成一个唯一键；这个键用于从缓存中查找结果。如果找到，则返回该结果。如果没有缓存结果，则正常进行计算，计算后将值添加到缓存中，最后返回该值。所有这些都封装在\
  \ `cache.get` 方法中，该方法允许传入一个 `java.util.function.Function` 来生成值。在这个例子中，我们以 lambda\
  \ 表达式的形式传入该函数。\n\n由于需要 Caffeine 缓存，`Main` 类需要修改，以便在构造服务之前引导一个 Caffeine 缓存。更新后的 `Main`\
  \ 类如下所示。\n\n```\npackage com.apress.spring6recipes.caching;\nimport com.github.benmanes.caffeine.cache.Cache;\n\
  import com.github.benmanes.caffeine.cache.Caffeine;\nimport java.math.BigDecimal;\n\
  import java.time.Duration;\npublic class Main {\npublic static final void main(String[]\
  \ args) throws Exception {\nCache cache = Caffeine.newBuilder()\n.maximumSize(1000)\n\
  .expireAfterWrite(Duration.ofMinutes(5)).build();\nvar calculationService = new\
  \ PlainCachingCalculationService(cache);\nfor (int i = 0; i < 5; i++) {\nvar start\
  \ = System.currentTimeMillis();\nvar result = calculationService.heavyCalculation(BigDecimal.valueOf(2L),\
  \ 16);\nvar duration = System.currentTimeMillis() - start;\nSystem.out.printf(\"\
  Result: %.0f, Took: %dms%n\", result, duration);\n}\n}\n}\n清单 14-7\nMain 类\n```\n\
  \n我们使用 `Caffeine` 构建器来生成一个缓存。有多个选项，但现在我们创建一个简单的缓存，它可以容纳 1000 个条目（`maximumSize`），并且每个条目在\
  \ 5 分钟后过期（`expireAfterWrite`）。创建的 `Cache` 随后被注入到 `PlainCachingCalculationService`\
  \ 中。\n\n运行主类时，第一次计算大约需要 500 毫秒，而后续的计算则少得多，大约在 0 到 1 毫秒之间。\n\n```\nResult: 65536,\
  \ Took: 529ms\nResult: 65536, Took: 0ms\nResult: 65536, Took: 0ms\nResult: 65536,\
  \ Took: 0ms\nResult: 65536, Took: 0ms\n清单 14-8\n控制台输出\n```\n\n#### 在 Spring 环境下使用\
  \ Caffeine 进行配置\n\n应用程序与 Spring 集成，并将利用 Spring 来配置 `Cache` 和构建服务。为此，你需要进行一些 Spring\
  \ 配置，并使用 `ApplicationContext` 来加载所有内容。配置如下。\n\n```\npackage com.apress.spring6recipes.caching.config;\n\
  import com.apress.spring6recipes.caching.CalculationService;\nimport com.apress.spring6recipes.caching.PlainCachingCalculationService;\n\
  import com.github.benmanes.caffeine.cache.Cache;\nimport com.github.benmanes.caffeine.cache.Caffeine;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import java.math.BigDecimal;\nimport java.time.Duration;\n@Configuration\npublic\
  \ class CalculationConfiguration {\n@Bean\npublic Cache calculationsCache() {\n\
  return Caffeine.newBuilder()\n.maximumSize(1000)\n.expireAfterWrite(Duration.ofMinutes(5)).build();\n\
  }\n@Bean\npublic CalculationService calculationService(Cache cache) {\nreturn new\
  \ PlainCachingCalculationService(cache);\n}\n}\n清单 14-9\n配置\n```\n\n你还需要一个修改后的 `Main`\
  \ 类，用于加载配置并从上下文中获取 `CalculationService`。\n\n```\npackage com.apress.spring6recipes.caching;\n\
  import com.apress.spring6recipes.caching.config.CalculationConfiguration;\nimport\
  \ org.springframework.context.annotation.AnnotationConfigApplicationContext;\nimport\
  \ java.math.BigDecimal;\npublic class Main {\npublic static final void main(String[]\
  \ args) {\nvar cfg = CalculationConfiguration.class;\ntry (var context = new AnnotationConfigApplicationContext(cfg))\
  \ {\nvar calculationService = context.getBean(CalculationService.class);\nfor (int\
  \ i = 0; i < 5; i++) {\nvar start = System.currentTimeMillis();\nvar result = calculationService.heavyCalculation(BigDecimal.valueOf(2L),\
  \ 16);\nvar duration = System.currentTimeMillis() - start;\nSystem.out.printf(\"\
  Result: %.0f, Took: %dms%n\", result, duration);\n}\n}\n}\n}\n清单 14-10\nMain 类\n\
  ```\n\n虽然这减少了引导代码中对 Caffeine 的直接引用，但 `CalculationService` 的实现中仍然充斥着对 Caffeine 的引用。更不用说手动缓存相当繁琐且容易出错，会污染代码。如果能像事务一样，通过\
  \ AOP 简单地应用缓存，那就太好了。\n\n## 14-2\\. 使用 Spring 的缓存抽象进行缓存\n\n### 问题\n\n你有一个包含一些繁重计算任务的应用程序。你希望缓存结果并重用，但同时不想绑定到单一的缓存实现。\n\
  \n### 解决方案\n\n使用 Caffeine 通过 Spring 的缓存抽象来存储计算结果。对于每次计算，检查结果是否已存在。如果存在，则返回缓存的值；如果不存在，则进行计算并将其放入缓存。\n\
  \n\n\n### 工作原理\n\n首先，使用 Spring 的 `Cache` 抽象为你的应用程序添加缓存。其次，使用 `get()` 方法检查结果是否已存在。如果存在，则返回；如果不存在，则继续执行程序。计算完成后，该值会被添加到缓存中。\n\
  \n```\npackage com.apress.spring6recipes.caching;\nimport com.apress.spring6recipes.utils.Utils;\n\
  import org.springframework.cache.Cache;\nimport java.math.BigDecimal;\npublic class\
  \ PlainCachingCalculationService implements CalculationService {\nprivate final\
  \ Cache cache;\npublic PlainCachingCalculationService(Cache cache) {\nthis.cache\
  \ = cache;\n}\n@Override\npublic BigDecimal heavyCalculation(BigDecimal base, int\
  \ power) {\nvar key = base + \"^\" + power;\nvar result = cache.get(key, BigDecimal.class);\n\
  if (result != null) {\nreturn result;\n}\nUtils.sleep(500);\nvar calculatedResult\
  \ = base.pow(power);\ncache.putIfAbsent(key, calculatedResult);\nreturn calculatedResult;\n\
  }\n}\n清单 14-11\n使用 Spring 缓存抽象的 CalculationService\n```\n\n接下来，需要配置 `CacheManager`。首先，通过使用\
  \ `ConcurrentMapCacheManager` 配置一个基于简单 `java.util.Map` 的缓存，顾名思义，它在底层使用 `java.util.concurrent.ConcurrentMap`\
  \ 进行缓存。\n\n```\npackage com.apress.spring6recipes.caching.config;\nimport com.apress.spring6recipes.caching.CalculationService;\n\
  import com.apress.spring6recipes.caching.PlainCachingCalculationService;\nimport\
  \ org.springframework.cache.CacheManager;\nimport org.springframework.cache.concurrent.ConcurrentMapCacheManager;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  @Configuration\npublic class CalculationConfiguration {\n@Bean\npublic CacheManager\
  \ cacheManager() {\nreturn new ConcurrentMapCacheManager();\n}\n@Bean\npublic CalculationService\
  \ calculationService(CacheManager cacheManager) {\nvar cache = cacheManager.getCache(\"\
  calculations\");\nreturn new PlainCachingCalculationService(cache);\n}\n}\n清单 14-12\n\
  使用 ConcurrentMap 作为缓存的 CalculationConfiguration\n```\n\n`PlainCachingCalculationService`\
  \ 需要一个 `Cache` 实例来运行。可以通过调用 `CacheManager` 的 `getCache` 方法来获取要使用的 `Cache` 实例。这里，我们获取名为\
  \ `calculations` 的缓存并将其注入到 `PlainCachingCalculationService` 中。\n\n`Main` 类可以保持不变。\n\
  \n#### 将 Caffeine 与 Spring 的缓存抽象结合使用\n\n尽管 `ConcurrentMapCacheManager` 看起来能完成工作，但它并不是一个完整的缓存实现。它只会向缓存中添加内容；没有缓存驱逐或缓存溢出功能。而\
  \ Caffeine 则具备所有这些功能。使用 Caffeine（或其他缓存实现，如 Ehcache 或 Hazelcast）只是一个配置问题。\n\n要使用\
  \ Caffeine，请使用 `CaffeineCacheManager` 将其与 Spring 的缓存抽象连接起来。`PlainCachingCalculationService`\
  \ 可以保持不变，因为它已经使用 Spring 的缓存抽象来使用缓存。默认情况下，Spring 会在请求时动态创建缓存。\n\n```\npackage com.apress.spring6recipes.caching.config;\n\
  import com.apress.spring6recipes.caching.CalculationService;\nimport com.apress.spring6recipes.caching.PlainCachingCalculationService;\n\
  import com.github.benmanes.caffeine.cache.Caffeine;\nimport org.springframework.cache.CacheManager;\n\
  import org.springframework.cache.caffeine.CaffeineCacheManager;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport java.time.Duration;\n\
  @Configuration\npublic class CalculationConfiguration {\n@Bean\npublic CacheManager\
  \ cacheManager() {\nvar caffeine = Caffeine.newBuilder()\n.maximumSize(1000)\n.expireAfterWrite(Duration.ofMinutes(5));\n\
  var cacheManager = new CaffeineCacheManager();\ncacheManager.setCaffeine(caffeine);\n\
  return cacheManager;\n}\n@Bean\npublic CalculationService calculationService(CacheManager\
  \ cacheManager) {\nvar cache = cacheManager.getCache(\"calculations\");\nreturn\
  \ new PlainCachingCalculationService(cache);\n}\n}\n清单 14-13\n使用 Caffeine 作为缓存的\
  \ CalculationConfiguration\n```\n\n## 14-3\\. 使用 AOP 进行声明式缓存\n\n### 问题\n\n缓存是一种横切关注点。手动应用缓存可能既繁琐又容易出错。更简单的方法是声明式地指定你期望的行为，而不是规定如何实现该行为。\n\
  \n### 解决方案\n\nSpring 提供了一个缓存通知，可以通过 `@EnableCaching` 启用。\n\n### 工作原理\n\n要启用声明式缓存，你必须在配置类上添加\
  \ `@EnableCaching`。这将注册一个 `CacheInterceptor` 或 `AnnotationCacheAspect`（取决于模式），它们会检测\
  \ `@Cacheable` 等注解。注册的通知会替换用于缓存的代码，因为这些代码主要是样板代码，并且需要在每个我们想要引入缓存的方法中重复。当移除样板代码后，剩下的代码如下所示。\n\
  \n```\n@Override\npublic BigDecimal heavyCalculation(BigDecimal base, int power)\
  \ {\nreturn calculate(base, power);\n}\nprivate BigDecimal calculate(BigDecimal\
  \ base, int power) {\nUtils.sleep(500);\nreturn base.pow(power);\n}\n清单 14-14\n\
  没有缓存的 PlainCalculationService\n```\n\n要为此方法启用缓存，你需要在方法上放置 `@Cacheable` 注解。此注解需要指定要使用的缓存名称（通过使用注解的\
  \ `value` 属性）。\n\n```\n@Override\n@Cacheable(\"calculations\")\npublic BigDecimal\
  \ heavyCalculation(BigDecimal base, int power) {\n}\n清单 14-15\n带有 @Cacheable 的 PlainCalculationService\n\
  ```\n\n此注解还有另外三个属性：`key`、`condition` 和 `unless`。这些属性中的每一个都接受一个 SpEL 表达式，该表达式在运行时求值。`key`\
  \ 属性指定使用哪些方法参数来计算用于缓存的键；默认是使用所有方法参数。`condition` 属性可用于定义应用缓存的条件；默认是始终缓存，并在实际方法调用之前调用。`unless`\
  \ 属性的工作方式与 `condition` 属性类似；但是，它是在方法调用完成后用于确定是否应缓存结果（例如跳过 `null` 值）。\n\n#### 使用\
  \ Spring AOP\n\n`@EnableCaching` 注解的默认操作模式是使用普通的 Spring AOP。这意味着将为 `CalculationService`\
  \ 创建一个代理。配置如下所示。\n\n```\npackage com.apress.spring6recipes.caching.config;\nimport\
  \ com.apress.spring6recipes.caching.CalculationService;\nimport com.apress.spring6recipes.caching.PlainCalculationService;\n\
  import com.github.benmanes.caffeine.cache.Caffeine;\nimport org.springframework.cache.CacheManager;\n\
  import org.springframework.cache.annotation.EnableCaching;\nimport org.springframework.cache.caffeine.CaffeineCacheManager;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import java.time.Duration;\n@Configuration\n@EnableCaching\npublic class CalculationConfiguration\
