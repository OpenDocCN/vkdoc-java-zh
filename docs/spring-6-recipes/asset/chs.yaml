  \ static final String COUNT = \"车辆数量: %d%n\";\npublic static void main(String[]\
  \ args) {\ntry (var mongo = MongoClients.create()) {\nvar repository = new MongoVehicleRepository(mongo,\
  \ DB_NAME, \"vehicles\");\nSystem.out.printf(COUNT, repository.count());\nrepository.save(new\
