  #### 使用 CSRF 保护


  通常建议保留 CSRF 的默认启用状态，因为这能降低跨站请求伪造攻击的风险。Spring Security 默认启用该功能，配置中的 `csrf().disable()`
  代码行可以移除。当 CSRF 保护启用时，Spring Security 会将 `CsrfWebFilter` 添加到其用于保护的过滤器列表中。该过滤器进而使用
  `ServerCsrfTokenRepository` 的实现来生成和存储令牌。默认情况下使用的是 `WebSessionServerCsrfTokenRepository`，顾名思义，它将生成的令牌存储在
  `Websession` 中。此外还有一个 `CookieServerCsrfTokenRepository`，它将令牌信息存储在 cookie 中。如果你想切换
  `ServerCsrfTokenRepository`，可以使用 `csrfTokenRepository()` 配置方法进行更改。你也可以通过此方法配置显式定义的
  `WebSessionServerCsrfTokenRepository`、`CookieServerCsrfTokenRepository`，或者你自己实现的
  `ServerCsrfTokenRepository` 接口。目前我们将使用默认的 `WebSessionServerCsrfTokenRepository`。


  当 CSRF 启用后，登录状态下，如果没有 CSRF 令牌，尝试完成或删除待办事项将会失败。要解决此问题，你需要在修改内容的请求中将 CSRF 令牌传回服务器。当使用受支持的视图技术（如
  Thymeleaf）时，这通常可以借助 `CsrfRequestDataValueProcessor` 自动完成，它会将令牌暴露在已知位置。然而，要实现这一点，我们需要将
  CSRF 令牌复制到特定的属性中。我们可以使用 `HandlerFilterFunction` 和 `@ControllerAdvice` 来以正确的名称暴露
  `CsrfToken`。


  ```

  @Bean

  public RouterFunction securityPages() {

  return RouterFunctions

  .route().filter(csrfToken())

  .GET("/login", (req) -> ServerResponse.ok().render("login")).build();

  }

  public HandlerFilterFunction csrfToken() {

  var name = CsrfToken.class.getName();

  return (req, next) -> req.exchange()

  .getAttributeOrDefault(name, Mono.empty().ofType(CsrfToken.class))

  .flatMap(token -> {

  req.exchange()

  .getAttributes()

  .put(CsrfRequestDataValueProcessor.DEFAULT_CSRF_ATTR_NAME, token);

  return next.handle(req);

  });

  }

