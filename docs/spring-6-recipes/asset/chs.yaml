  ```\n\n在 `Main` 类中，首先创建一个任务映射。本例中只有一个任务，其中键是一个描述性名称，值是该任务的对象引用。接着，在 `JobDetail`\
  \ 对象中定义文件复制任务的详细信息，并在其 `jobDataMap` 属性中准备任务数据。然后，创建一个 `SimpleTrigger` 对象来配置调度属性。最后，创建一个调度器，使用此触发器来运行任务。\n\
  \nQuartz 支持多种调度类型，以便在不同时间间隔运行任务。调度作为触发器的一部分进行定义。在最新版本中，Quartz 的调度包括 `SimpleScheduleBuilder`、`CronScheduleBuilder`、`CalendarIntervalScheduleBuilder`\
  \ 和 `DailyTimeIntervalScheduleBuilder`。`SimpleScheduleBuilder` 允许你通过设置开始时间、结束时间、重复间隔和重复次数等属性来调度任务。`CronScheduleBuilder`\
  \ 接受一个 Unix cron 表达式，用于指定任务的运行时间。例如，你可以用以下 `CronScheduleBuilder` 替换之前的 `SimpleScheduleBuilder`，以便在每天\
  \ 17:30 运行任务：`.withSchedule(CronScheduleBuilder.cronSchedule(\"0 30 17 * * ?\"))`。一个\
  \ cron 表达式由七个字段组成（最后一个字段可选），字段之间用空格分隔。表 10-1 展示了 cron 表达式的字段说明。\n\n表 10-1\nCron\
  \ 表达式的字段说明\n\n| 位置 | 字段名 | 范围 |\n| --- | --- | --- |\n| 1 | 秒 | 0–59 |\n| 2 | 分钟\
  \ | 0–59 |\n| 3 | 小时 | 0–23 |\n| 4 | 月份中的日期 | 1–31 |\n| 5 | 月份 | 1–12 或 JAN–DEC\
  \ |\n| 6 | 星期中的日期 | 1–7 或 SUN–SAT |\n| 7 | 年份（可选） | 1970–2099 |\n\ncron 表达式的每个部分可以指定一个具体值（例如\
  \ 3）、一个范围（例如 1–5）、一个列表（例如 1, 3, 5）、一个通配符（* 匹配所有值）或一个问号（? 用于“月份中的日期”和“星期中的日期”字段之一，以匹配其中一个字段，但不同时匹配两者）。`CalendarIntervalScheduleBuilder`\
  \ 允许你基于日历时间（日、周、月、年）来调度任务，而 `DailyTimeIntervalScheduleBuilder` 则提供了便捷工具来设置任务的结束时间（例如\
  \ `endingDailyAt()` 和 `endingDailyAfterCount()` 等方法）。\n\n\n\n#### 在 Spring 的支持下使用\
  \ Quartz\n\n使用 Quartz 时，你可以通过实现 `Job` 接口来创建任务，并通过 `JobExecutionContext` 从任务数据映射中获取数据。为了将任务类与\
  \ Quartz API 解耦，Spring 提供了 `QuartzJobBean`，你可以通过扩展它来使用 setter 方法获取任务数据。`QuartzJobBean`\
  \ 会将任务数据映射转换为属性，并通过 setter 方法注入这些属性。\n\n```\npackage com.apress.spring6recipes.replicator;\n\
