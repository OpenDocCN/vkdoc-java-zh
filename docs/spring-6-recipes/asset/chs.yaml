  ## 8-6\. 通过事务实现更好的运行


  ### 问题


  您希望读取和写入操作是健壮的。理想情况下，它们应在适当的地方使用事务，并正确响应异常。


  ### 解决方案


  事务能力建立在核心 Spring 框架已提供的一流支持之上。在相关的地方，Spring Batch 会暴露配置以便您可以控制它。在面向块处理的上下文中，它还提供了对提交频率、回滚语义等方面的许多控制。


  ### 工作原理




  #### 事务


  Spring 的核心框架为事务提供了一流的支持。你只需像在任何常规的 `JdbcTemplate` 或 `HibernateTemplate` 解决方案中那样，配置一个
  `PlatformTransactionManager` 并将其引用提供给 Spring Batch 即可。在构建 Spring Batch 解决方案时，你将有机会控制步骤在事务中的行为。你已经看到了一些内建的事务支持。


  所有这些示例中使用的配置都建立了一个 `DriverManagerDataSource` 和一个 `DataSourceTransactionManager`
  bean。然后，`PlatformTransactionManager` 和 `DataSource` 被注入到 `JobRepositoryFactoryBean`
  中，而 `JobRepositoryFactoryBean` 又被注入到 `JobLauncher` 中，你正是使用 `JobLauncher` 来启动到目前为止的所有作业。这使得你的作业创建的所有元数据都能以事务方式写入数据库。


  如果你看过前面的示例，你已经注意到对 `chunk` 方法的调用同时包含一个数字和一个事务管理器。还有一个只接受数字的 `chunk` 方法，但该方法已被弃用，并将在未来的
  Spring Batch 版本中移除。如果你在步骤中使用了不带事务管理器的 `chunk` 方法，Spring Batch 默认会尝试从上下文中获取名为 `transactionManager`
  的 `PlatformTransactionManager` 并使用它。如果你想显式配置，可以指定 `transactionManager` 属性。一个用于 JDBC
  工作的简单事务管理器可能如下所示。


  ```

  @Bean

  protected Step step1(PlatformTransactionManager txManager) {

  var name = "step1";

  var builder = new StepBuilder(name, jobRepository);

  return builder

  .chunk(5)

  .reader(csvFileReader())

  .processor(userRegistrationValidationItemProcessor())

  .writer(jdbcItemWriter())

  .transactionManager(txManager)

  .build();

  }

  清单 8-21

  使用 PlatformTransactionManager 的步骤配置

  ```


  然而，由于 `chunk(5)` 已被弃用，你应该优先使用 `chunk(5, transactionManager)`，而不是通过 `transactionManager`
  属性再次设置。


  从 `ItemReader` 读取的项目通常会被聚合。如果对 `ItemWriter` 的提交失败，聚合的项目会被保留并重新提交。这个过程是高效的，并且在大多数情况下都能正常工作。但在从事务性资源（如
  JMS 队列或数据库）读取时，它会破坏语义。如果参与的事务（在此例中，是写入器的事务）失败，从消息队列的读取操作可以并且应该被回滚。


  ```

  @Bean

  protected Step step1(PlatformTransactionManager txManager) {

  var name = "step1";

  var builder = new StepBuilder(name, jobRepository);

  return builder

  .chunk(5, txManager)

  .reader(csvFileReader()).readerIsTransactionalQueue()

  .processor(userRegistrationValidationItemProcessor())

  .writer(jdbcItemWriter())

  .build();

  }

  清单 8-22

  使用事务性队列的步骤配置

  ```


  #### 回滚


  处理简单情况（“读取 X 个项目，每 Y 个项目提交一次数据库事务”）很容易。Spring Batch 擅长于其鲁棒性，这种鲁棒性通过简单的配置选项来应对边界情况和失败情况。


  如果对 `ItemWriter` 的写入失败，或者在处理过程中发生其他异常，Spring Batch 将回滚事务。这在大多数情况下是有效的处理方式。在某些场景下，你可能希望控制哪些异常情况会导致事务回滚。


  使用基于 Java 的配置来启用回滚时，首先，该步骤需要是一个容错步骤，然后才能用它来指定不回滚的异常。首先，使用 `faultTolerant()` 获取一个容错步骤。接下来，可以使用
  `skipLimit()` 方法指定在实际停止作业执行之前忽略的回滚次数。最后，可以使用 `noRollback()` 方法指定不会触发回滚的异常。要指定多个异常，你可以简单地链式调用
  `noRollback()` 方法。


  ```

  @Bean

  protected Step step1(PlatformTransactionManager txManager) {

  var name = "step1";

  var builder = new StepBuilder(name, jobRepository);

  return builder

  .chunk(10, txManager)

  .faultTolerant()

  .noRollback(com.yourdomain.exceptions.YourBusinessException.class)

  .reader(csvFileReader())

  .processor(userRegistrationValidationItemProcessor())

  .writer(jdbcItemWriter())

  .build();

  }

