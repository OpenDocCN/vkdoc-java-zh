  ## 1-25. 以函数式方式创建和注册 Bean


  ### 问题


  自 Java 8 起，Java 中可以实现一些函数式编程。Java 的更新版本对此进行了改进，在日常 Java 编程中使用 lambda 表达式和方法引用等已成为常见做法。现在，你也希望将这种方式与
  Spring 结合使用，以创建配置文件，而不是使用注解。


  ### 解决方案


  Spring 的 `GenericApplicationContext`（它是许多 `ApplicationContext` 实现类的基类）提供了多种变体的 `registerBean`
  方法。其中最有趣且最实用的变体是那些接受 `Supplier` 或 `BeanDefinitionCustomizer` 参数的方法。这些方法可用于将 Bean
  注册到上下文中，使其参与容器和 Bean 的生命周期，或作为其他 Bean 的依赖项。


  ### 工作原理


  让我们以配方 1-1 和配方 1-3 中的代码为例，将其重写为更具函数式风格的代码。




  #### 以函数式方式创建简单 Bean


  要注册一个 Bean，你需要创建一个 `ApplicationContext` 的实例。这里我们可以使用之前用过的同一个 `AnnotationConfigApplicationContext`，但无需任何配置。接下来，我们调用
  `registerBean` 方法来注册某个特定类型（第一个参数）的 Bean，然后提供最终将创建该 Bean 的 `Supplier`。


  完成 Bean 注册后，你需要在上下文中调用 `refresh`，它将创建所有需要的 Bean 实例：


  ```

  package com.apress.spring6recipes.sequence;

  import org.springframework.context.annotation.AnnotationConfigApplicationContext;

  public class Main {

  public static void main(String[] args) {

  try (var ctx = new AnnotationConfigApplicationContext()) {

  ctx.registerBean(Sequence.class, () -> new Sequence("30", "A", 10000));

  ctx.refresh();

  var generator = ctx.getBean(Sequence.class);

  System.out.println(generator.nextValue());

  System.out.println(generator.nextValue());

  }

  }

  }

  ```


  #### 以函数式方式创建具有依赖关系的多个 Bean


  之前我们只注册了一个不引用其他 Bean 的简单 Bean。要获取对其他 Bean 的引用，你可以访问 `ApplicationContext` 并调用 `getBean`，或者更好的方式是调用
  `getBeanProvider`（另请参阅配方 1-3），以根据需求获取可选的 Bean 或 Bean 列表。


  我们仍然需要创建要使用的 `ApplicationContext` 类型，并为两个 Bean 调用 `registerBean` 方法。`Sequence` 的注册现在稍微复杂一些，因为我们需要获取所需
  Bean 的引用。为此，我们使用 `getBeanProvider` 方法，该方法返回一个 `ObjectProvider`（参见配方 1-3），我们可以用它来获取所需的引用：


  ```

  package com.apress.spring6recipes.sequence;

  import org.springframework.context.annotation.AnnotationConfigApplicationContext;

  public class Main {

  public static void main(String[] args) {

  try (var ctx = new AnnotationConfigApplicationContext()) {

  ctx.registerBean(PrefixGenerator.class, () ->

  new DatePrefixGenerator("yyyyMMdd"));

  ctx.registerBean(Sequence.class, () -> {

  var seq = new Sequence("A", 100000);

  ctx.getBeanProvider(PrefixGenerator.class)

  .ifUnique(seq::setPrefixGenerator);

  return seq;

  });

  ctx.refresh();

  var generator = ctx.getBean(Sequence.class);

  System.out.println(generator.getSequence());

  System.out.println(generator.getSequence());

  }

  }

  }

  ```


  #### 修改函数式注册 Bean 的 BeanDefinition


  到目前为止，我们只是简单地注册了 Bean。但是如何将 Bean 定义为主要 Bean，或者更改作用域、顺序等呢？为此，我们可以传入一个 `BeanDefinitionCustomizer`（或多个，因为它是可变参数）来修改最终创建的
  `BeanDefinition`。`BeanDefinition` 是用于创建 Bean 的配方，它保存了 Bean 的 `scope`、是否为主要 Bean
  等信息。有关可设置的属性列表，请参见表 1-3。


  表 1-3


  BeanDefinition 的属性


  | 属性 | 描述 |

  | --- | --- |

  | `autowireCandidate` | 此 Bean 是否应被用于自动装配场景。默认值为 `true`。 |

  | `dependsOn` | 此 Bean 所依赖的 Bean 名称，与 `@DependsOn` 相同。 |

  | `description` | Bean 的附加描述。 |

  | `destroyMethodName` | 当 `ApplicationContext` 关闭并停止时，用作销毁回调的方法名称。类似于方法上的 `@PreDestroy`。
  |

  | `initMethodName` | 当 `ApplicationContext` 启动时，用作初始化回调的方法名称。类似于方法上的 `@PostConstruct`。
  |

  | `lazyInit` | Bean 是否应被延迟创建，即首次使用时创建。默认值为 `false`。 |

  | `primary` | 当找到多个 Bean 时，此 Bean 是否为主要使用的 Bean。默认值为 `true`。 |

  | `scope` | Bean 的作用域名称，与 `@Scope` 相同。 |


  让我们添加一个 `BeanDefinitionCustomizer`，使 `Sequence` Bean 既延迟加载又具有原型作用域。创建一个类 `SequenceBeanDefinitionCustomizer`，它修改
  `BeanDefinition`，将 `lazyInit` 设置为 `true`，并将 `scope` 设置为 `prototype`：


  ```

  package com.apress.spring6recipes.sequence;

  import org.springframework.beans.factory.config.BeanDefinition;

  import org.springframework.beans.factory.config.BeanDefinitionCustomizer;

  import org.springframework.context.annotation.AnnotationConfigApplicationContext;

  public class Main {

  public static void main(String[] args) {

  try (var ctx = new AnnotationConfigApplicationContext()) {

  ctx.registerBean(PrefixGenerator.class, () ->

  new DatePrefixGenerator("yyyyMMdd"));

  ctx.registerBean(Sequence.class, () -> {

  var seq = new Sequence("A", 100000);

  ctx.getBeanProvider(PrefixGenerator.class)

  .ifUnique(seq::setPrefixGenerator);

  return seq;

  }, new SequenceBeanDefinitionCustomizer());

  ctx.refresh();

  var generator = ctx.getBean(Sequence.class);

  System.out.println(generator.getSequence());

  System.out.println(generator.getSequence());

  }

  }

  }

  class SequenceBeanDefinitionCustomizer implements BeanDefinitionCustomizer {

  @Override

  public void customize(BeanDefinition bd) {

  bd.setScope(BeanDefinition.SCOPE_PROTOTYPE);

  bd.setLazyInit(true);

  }

  }

  ```


