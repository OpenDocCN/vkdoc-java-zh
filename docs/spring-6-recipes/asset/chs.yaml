  一个本地主机窗口中标题为“John Doe 的待办事项”的 5x4 表格截图。列包括：所有者（包含电子邮件 ID 列表）、待办事项（需要完成的工作）、已完成（包含
  true 或 false），最后一列有 2 个表示完成状态的图标。


