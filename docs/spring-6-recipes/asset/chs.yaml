  ## 2-1\. 使用 Spring MVC 开发一个简单的 Web 应用程序


  ### 问题


  你想使用 Spring MVC 开发一个简单的 Web 应用程序，以学习该框架的基本概念和配置。




  ### 解决方案


  Spring MVC 的核心组件是一个前端控制器。在最简单的 Spring MVC 应用中，这个控制器是你需要在 Java Web 部署描述符（即 `ServletContainerInitializer`）中配置的唯一
  Servlet。Spring MVC 控制器——通常被称为 DispatcherServlet——充当 Spring MVC 框架的前端控制器，每个 Web 请求都必须经过它，以便它能够管理整个请求处理过程。


  当 Web 请求发送到 Spring MVC 应用时，控制器首先接收该请求。然后，它会组织在 Spring 的 Web 应用上下文中配置的不同组件，或控制器自身存在的注解，所有这些组件都是处理请求所必需的。图
  2-1 展示了 Spring MVC 中请求处理的主要流程。


  ![](img/314861_5_En_2_Fig1_HTML.jpg)


  从 Dispatcher Servlet 到 Spring MVC Web 应用的流程示意图。1. 请求被发送到处理器映射，并接收到控制器。2. 请求被发送到控制器，并接收到模型和视图。3.
  视图名称被发送到视图解析器，并接收到视图。4. 模型被发送到视图，并接收到响应。


  图 2-1


  Spring MVC 中请求处理的主要流程


  要在 Spring 中定义一个控制器类，该类必须使用 `@Controller` 或 `@RestController` 注解进行标记。


  当一个使用 `@Controller` 注解的类（即控制器类）接收到请求时，它会寻找合适的处理器方法来处理该请求。这要求控制器类通过一个或多个处理器映射将每个请求映射到一个处理器方法。为此，控制器类的方法需要使用
  `@RequestMapping` 注解进行修饰，使其成为处理器方法。


  这些处理器方法的签名——正如你对任何标准类所期望的那样——是开放式的。你可以为处理器方法指定任意名称，并定义各种方法参数。同样，处理器方法可以返回一系列值中的任意一种（例如字符串或
  void），具体取决于它所实现的应用程序逻辑。随着本书内容的深入，你将遇到使用 `@RequestMapping` 注解的处理器方法中可以使用的各种方法参数。以下是一个有效参数类型的部分列表，仅供你了解：


  *   `HttpServletRequest` 或 `HttpServletResponse`

  *   任意类型的请求参数，使用 `@RequestParam` 注解

  *   任意类型的请求属性，使用 `@RequestAttribute` 注解

  *   任意类型的模型属性，使用 `@ModelAttribute` 注解

  *   传入请求中包含的 Cookie 值，使用 `@CookieValue` 注解

  *   `Map` 或 `ModelMap`，用于处理器方法向模型添加属性

  *   `Errors` 或 `BindingResult`，用于处理器方法访问命令对象的绑定和验证结果

  *   `SessionStatus`，用于处理器方法通知其会话处理完成


  一旦控制器类选择了合适的处理器方法，它就会使用该请求调用处理器方法的逻辑。通常，控制器的逻辑会调用后端服务来处理请求。此外，处理器方法的逻辑可能会向众多输入参数（例如
  `HttpServletRequest`、`Map`、`Errors` 或 `SessionStatus`）中添加或移除信息，这些参数将成为正在进行的 Spring
  MVC 流程的一部分。


  处理器方法完成请求处理后，它会将控制权委托给一个视图，该视图表示为处理器方法的返回值。为了提供灵活的方法，处理器方法的返回值并不代表视图的具体实现（例如 `user.jsp`
  或 `report.pdf`），而是代表一个逻辑视图（例如 `user` 或 `report`）——注意没有文件扩展名。


  处理器方法的返回值可以是表示逻辑视图名称的 `String`，也可以是 void，在这种情况下，将根据处理器方法或控制器的名称确定默认的逻辑视图名称。


  为了将信息从控制器传递到视图，处理器方法返回的是逻辑视图名称（`String` 或 `void`）并不重要，因为处理器方法的输入参数将对视图可用。例如，如果处理器方法将
  `Map` 和 `SessionStatus` 对象作为输入参数——并在处理器方法的逻辑中修改它们的内容——那么处理器方法返回的视图将可以访问这些相同的对象。


  当控制器类接收到视图时，它会通过视图解析器将逻辑视图名称解析为特定的视图实现（例如 `user.jsp`、`todos.html` 或 `report.pdf`）。视图解析器是在
  Web 应用上下文中配置的一个 bean，它实现了 `ViewResolver` 接口。其职责是为逻辑视图名称返回特定的视图实现（HTML、JSP、PDF 或其他）。


  一旦控制器类将视图名称解析为视图实现，根据视图实现的设计，它会渲染由控制器处理器方法传递的对象（例如 `HttpServletRequest`、`Map`、`Errors`
  或 `SessionStatus`）。视图的职责是向用户显示在处理器方法逻辑中添加的对象。




