  ## 5-7\. 处理领域对象安全


  ### 问题


  有时，你可能遇到复杂的安全需求，需要在领域对象级别处理安全问题。这意味着你必须允许每个领域对象针对不同的主体拥有不同的访问属性。


  ### 解决方案


  Spring Security 提供了一个名为 ACL 的模块，允许每个领域对象拥有自己的访问控制列表（ACL）。一个 ACL 包含一个领域对象的对象标识，用于与该对象关联，同时还包含多个访问控制条目（ACE），每个
  ACE 包含以下两个核心部分：


  *   **权限**：ACE 的权限由特定的位掩码表示，每个位值对应一种特定的权限类型。`BasePermission` 类预定义了五种基本权限作为常量供你使用：READ（位
  0 或整数 1）、WRITE（位 1 或整数 2）、CREATE（位 2 或整数 4）、DELETE（位 3 或整数 8）和 ADMINISTRATION（位
  4 或整数 16）。你也可以使用其他未使用的位来定义自己的权限。


  *   **安全标识（SID）**：每个 ACE 包含针对特定 SID 的权限。SID 可以是主体（`PrincipalSid`）或权限（`GrantedAuthoritySid`），用于与权限关联。除了定义
  ACL 对象模型外，Spring Security 还定义了用于读取和维护该模型的 API，并为这些 API 提供了高性能的 JDBC 实现。为了简化 ACL
  的使用，Spring Security 还提供了诸如访问决策投票器和表达式等工具，使你能够在应用程序中一致地使用 ACL 与其他安全工具。


  ### 工作原理


  #### 设置 ACL 服务


  Spring Security 提供了内置支持，用于将 ACL 数据存储在关系数据库中，并通过 JDBC 访问。首先，你需要在数据库中创建以下表来存储 ACL
  数据。


  ```

  CREATE TABLE ACL_SID(

  ID         BIGINT        NOT NULL GENERATED BY DEFAULT AS IDENTITY,

  PRINCIPAL  SMALLINT      NOT NULL,

  SID        VARCHAR(100)  NOT NULL,

  PRIMARY KEY (ID),

  UNIQUE (SID, PRINCIPAL)

  );

  CREATE TABLE ACL_CLASS(

  ID              BIGINT        NOT NULL GENERATED BY DEFAULT AS IDENTITY,

  CLASS           VARCHAR(100)  NOT NULL,

  CLASS_ID_TYPE   VARCHAR(100),

  PRIMARY KEY (ID),

  UNIQUE (CLASS)

  );

  CREATE TABLE ACL_OBJECT_IDENTITY(

  ID                  BIGINT    NOT NULL GENERATED BY DEFAULT AS IDENTITY,

  OBJECT_ID_CLASS     BIGINT    NOT NULL,

  OBJECT_ID_IDENTITY  BIGINT    NOT NULL,

  PARENT_OBJECT       BIGINT,

  OWNER_SID           BIGINT,

  ENTRIES_INHERITING  SMALLINT  NOT NULL,

  PRIMARY KEY (ID),

  UNIQUE (OBJECT_ID_CLASS, OBJECT_ID_IDENTITY),

  FOREIGN KEY (PARENT_OBJECT)   REFERENCES ACL_OBJECT_IDENTITY,

  FOREIGN KEY (OBJECT_ID_CLASS) REFERENCES ACL_CLASS,

  FOREIGN KEY (OWNER_SID)       REFERENCES ACL_SID

  );

  CREATE TABLE ACL_ENTRY(

  ID                  BIGINT    NOT NULL GENERATED BY DEFAULT AS IDENTITY,

  ACL_OBJECT_IDENTITY BIGINT    NOT NULL,

  ACE_ORDER           INT       NOT NULL,

  SID                 BIGINT    NOT NULL,

  MASK                INTEGER   NOT NULL,

  GRANTING            SMALLINT  NOT NULL,

  AUDIT_SUCCESS       SMALLINT  NOT NULL,

  AUDIT_FAILURE       SMALLINT  NOT NULL,

  PRIMARY KEY (ID),

  UNIQUE (ACL_OBJECT_IDENTITY, ACE_ORDER),

  FOREIGN KEY (ACL_OBJECT_IDENTITY) REFERENCES ACL_OBJECT_IDENTITY,

  FOREIGN KEY (SID)                 REFERENCES ACL_SID

  );

