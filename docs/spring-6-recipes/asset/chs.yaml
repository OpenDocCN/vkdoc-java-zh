  \ 注解，构造函数接收一个 `Neo4jTemplate`。两个 `save` 方法都直接调用了 `Neo4jTemplate` 上的 `save` 方法。`findAll`\
  \ 方法也委托给了 `Neo4jTemplate.findAll` 方法。该方法接受一个类型参数，并返回一个 `FluentFindOperation.ExecutableQuery`。我们可以通过使用该对象的\
  \ `matching` 方法来限制结果，但由于我们需要所有结果，因此直接调用 `all()`。\n\n最后，我们需要修改 `StarwarsConfig`，以包含一个\
