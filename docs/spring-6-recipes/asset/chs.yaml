  ## 8-5\. 在写入前处理输入


  ### 问题


  虽然直接从电子表格或 CSV 转储传输数据可能很有用，但可以想象，在数据写入之前，你可能需要对其进行某种处理。CSV 文件中的数据，更广泛地说，来自任何源的数据，通常并不完全符合你的预期，或者不适合直接写入。仅仅因为
  Spring Batch 可以将其强制转换为 POJO，并不意味着数据的状态是正确的。在数据适合写入之前，可能还需要从其他服务推断或填充额外的数据。


  ### 解决方案


  Spring Batch 允许你对读取器的输出进行处理。在处理过程中，几乎可以对输出进行任何操作，然后再将其传递给写入器，包括更改数据的类型。




  ### 工作原理


  Spring Batch 允许实现者从读取器读取数据后执行任何自定义逻辑。块配置中的 `processor` 属性期望引用一个 `org.springframework.batch.item.ItemProcessor`
  接口的 Bean。因此，上一个配方中的作业定义修改后如下所示。


  ```

  @Bean

  public Step step1(ItemReader reader,

  ItemProcessor processor,

  ItemWriter writer,

  PlatformTransactionManager txManager) {

  var name = "用户注册 CSV 转数据库步骤";

  var builder = new StepBuilder(name, jobRepository);

  return builder

  .chunk(5, txManager)

  .reader(reader)

  .processor(processor)

  .writer(writer)

  .build();

  }

