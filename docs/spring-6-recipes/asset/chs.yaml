  \ -jar recipe_14_3_ii-6.0.0-all.jar`（从本配方的 `build/libs` 目录执行）。\n\n## 14-4. 配置自定义\
  \ KeyGenerator\n\n### 问题\n\n默认的 `KeyGenerator` 基于方法参数生成键。您希望修改此行为。\n\n### 解决方案\n\
  \n使用所需的策略实现一个自定义的 `KeyGenerator`，并配置缓存支持以使用此自定义的 `KeyGenerator`。\n\n### 工作原理\n\n\
  缓存抽象使用 `KeyGenerator` 接口作为键生成的回调机制。默认情况下，它使用 `SimpleKeyGenerator` 类进行键生成。该类获取所有方法参数并为其计算哈希码，此哈希值用作键。\n\
  \n您可以实现自己的生成策略并用它来生成键。为此，创建一个实现 `KeyGenerator` 接口并实现 `generate` 方法的类。\n\n```\npackage\
  \ com.apress.spring6recipes.caching;\nimport org.springframework.cache.interceptor.KeyGenerator;\n\
  import java.lang.reflect.Method;\npublic class CustomKeyGenerator implements KeyGenerator\
  \ {\n@Override\npublic Object generate(Object target, Method method, Object... params)\
  \ {\nreturn params[0] + \"^\" + params[1];\n}\n}\n清单 14-18\n自定义键生成器实现\n```\n\n`CustomKeyGenerator`\
  \ 获取第一个和第二个参数，并在它们之间用 `^` 连接（与之前示例中为缓存生成自定义键时的做法相同）。\n\n接下来，将自定义实现与 Spring 中的缓存支持进行连接。为此，使用\
  \ `CachingConfigurer` 接口，该接口用于进一步配置 Spring 中的缓存支持。您只需实现想要覆盖的配置部分。在这里，您将覆盖 `keyGenerator`\
  \ 和 `cacheManager`。\n\n![](img/314861_5_En_14_Figa_HTML.gif)一个带阴影圆圈内字母 i 的图标，代表信息符号。 \
  \ 不要忘记在被覆盖的方法上添加 `@Bean`；否则，创建的实例将不会被 Spring 容器管理。\n\n```\npackage com.apress.spring6recipes.caching.config;\n\
  import com.apress.spring6recipes.caching.CalculationService;\nimport com.apress.spring6recipes.caching.CustomKeyGenerator;\n\
  import com.apress.spring6recipes.caching.PlainCalculationService;\nimport com.github.benmanes.caffeine.cache.Caffeine;\n\
  import org.springframework.cache.CacheManager;\nimport org.springframework.cache.annotation.CachingConfigurer;\n\
  import org.springframework.cache.annotation.EnableCaching;\nimport org.springframework.cache.caffeine.CaffeineCacheManager;\n\
  import org.springframework.cache.interceptor.KeyGenerator;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport java.time.Duration;\n\
  @Configuration\n@EnableCaching\npublic class CalculationConfiguration implements\
  \ CachingConfigurer {\n@Bean\n@Override\npublic CacheManager cacheManager() {\n\
  var caffeine = Caffeine.newBuilder()\n.maximumSize(1000)\n.expireAfterWrite(Duration.ofMinutes(5));\n\
  var cacheManager = new CaffeineCacheManager();\ncacheManager.setCaffeine(caffeine);\n\
  return cacheManager;\n}\n@Bean\n@Override\npublic KeyGenerator keyGenerator() {\n\
  return new CustomKeyGenerator();\n}\n@Bean\npublic CalculationService calculationService()\
  \ {\nreturn new PlainCalculationService();\n}\n}\n清单 14-19\n使用自定义键生成器的缓存配置\n```\n\
  \n请注意 `CachingConfigurer` 中两个被覆盖的方法。第一个是 `cacheManager`，用于将我们的 `CacheManager` 注册到缓存基础设施中。如果没有显式定义，缓存基础设施将尝试自动检测默认的\
  \ `CacheManager`（上下文中唯一的 `CacheManager` 或标记为 primary 的那个）。接下来是被覆盖的 `keyGenerator`\
  \ 方法，它将提供用于我们缓存的 `KeyGenerator`。\n\n## 14-5. 向缓存添加对象和从缓存中移除对象\n\n### 问题\n\n您希望在对象被创建、更新或移除时使用缓存逐出和缓存放入。\n\
  \n### 解决方案\n\n在您想要更新或使缓存中对象失效的方法上使用 `@CachePut` 和 `@CacheEvict` 注解。\n\n\n\n### 工作原理\n\
  \n除了 `@Cacheable` 之外，Spring 还提供了 `@CachePut` 和 `@CacheEvict` 注解，分别用于向缓存中添加和移除对象（或使整个缓存失效）。\n\
  \n使用缓存时，你不仅希望缓存被填满，还希望它能与应用程序内部的操作保持同步，包括对象的更新和移除。对于结果会更新缓存的方法，请添加 `@CachePut` 注解；对于使缓存中对象失效的方法，请使用\
  \ `@CacheEvict` 注解。\n\n有一个 `CustomerRepository`，从底层数据源获取客户信息非常耗时。因此决定为该仓库添加缓存。首先，创建\
  \ `CustomerRepository` 接口。\n\n```\npackage com.apress.spring6recipes.caching;\n\
  public interface CustomerRepository {\nCustomer find(long customerId);\nCustomer\
  \ create(String name);\nvoid update(Customer customer);\nvoid remove(long customerId);\n\
  }\n清单 14-20\nCustomerRepository 接口\n```\n\n还需要一个 `Customer` 记录。\n\n```\npackage\
  \ com.apress.spring6recipes.caching;\npublic record Customer(long id, String name)\
  \ { }\n清单 14-21\nCustomer 类\n```\n\n最后，`CustomerRepository` 接口的实现基于 `ConcurrentHashMap`，因为这仅用于测试目的。通过调用\
  \ `sleep()` 来模拟缓慢的检索过程。\n\n```\npackage com.apress.spring6recipes.caching;\nimport\
  \ com.apress.spring6recipes.utils.Utils;\nimport org.springframework.cache.annotation.Cacheable;\n\
  import java.util.Map;\nimport java.util.concurrent.ConcurrentHashMap;\nimport java.util.concurrent.atomic.AtomicLong;\n\
  public class MapBasedCustomerRepository implements CustomerRepository {\nprivate\
  \ final AtomicLong idGenerator = new AtomicLong();\nprivate final Map customers\
  \ = new ConcurrentHashMap();\n@Override\n@Cacheable(value = \"customers\")\npublic\
  \ Customer find(long customerId) {\nUtils.sleep(500);\nreturn customers.get(customerId);\n\
  }\n@Override\npublic Customer create(String name) {\nvar id = idGenerator.incrementAndGet();\n\
  return customers.computeIfAbsent(id, key -> new Customer(key, name));\n}\n@Override\n\
  public void update(Customer customer) {\ncustomers.put(customer.id(), customer);\n\
  }\n@Override\npublic void remove(long customerId) {\ncustomers.remove(customerId);\n\
