  `@Profile` 注解修饰了整个 Java 配置类，因此所有 `@Bean` 实例都属于同一个 profile。要指定 `@Profile` 名称，只需将名称放在双引号内即可。请注意，也可以使用花括号
  `{}` 包围的逗号分隔值（CSV）语法（例如 `{"summer","winter"}`）来指定多个 `@Profile` 名称。`ShopConfigurationGlobal`
  没有 `@Profile` 注解，因为它是我们的主配置类，它将检测其他 `@Configuration` 类。


  #### 将 Profile 加载到环境中


  要将某个 profile 中的 bean 加载到应用程序中，你需要激活该 profile。你可以一次加载多个 profile，也可以通过 Java 运行时标志，甚至作为
  Web 归档（WAR）文件的初始化参数以编程方式加载 profile。


  要以编程方式加载 profile（即通过应用程序上下文），你可以获取上下文环境，然后通过 `setActiveProfiles()` 方法加载 profile：


  ```

  var context = new AnnotationConfigApplicationContext();

  context.getEnvironment().setActiveProfiles("winter");

  context.register(ShopConfigurationGlobal.class);

  context.refresh();

  ```


  也可以通过 Java 运行时标志来指示要加载哪个 Spring profile。通过这种方式，你可以传递以下运行时标志来加载属于全局和冬季 profile 的所有
  bean：


  ```

  -Dspring.profiles.active=winter

  ```


  #### 设置默认 Profile


  为了避免因没有将任何 profile 加载到应用程序中而可能出现的错误，你可以定义默认 profile。默认 profile 仅在 Spring 无法检测到任何活动
  profile 时使用——这些活动 profile 是通过之前提到的任何方法定义的：编程方式、Java 运行时标志或 Web 应用程序初始化参数。


  要设置默认 profile，你也可以使用设置活动 profile 的三种方法中的任何一种。以编程方式，你使用 `setDefaultProfiles()` 方法代替
  `setActiveProfiles()`；通过 Java 运行时标志或 Web 应用程序初始化参数，你可以使用 `spring.profiles.default`
  参数代替 `spring.profiles.active`。


  ## 1-12\. 使 POJO 感知 Spring 的 IoC 容器资源


  ### 问题


  尽管一个设计良好的组件不应直接依赖 Spring 的 IoC 容器，但有时 bean 需要感知容器的资源。



  ### 解决方案


  你的 Bean 可以通过实现特定的“感知”接口来感知 Spring IoC 容器的资源。最常见的接口如表 1-2 所示。Spring 会通过这些接口中定义的 setter
  方法，将相应的资源注入到实现了这些接口的 Bean 中。


  表 1-2


  Spring 中常见的感知接口


  | 感知接口 | 目标资源类型 |

  | --- | --- |

  | `BeanNameAware` | 其在 IoC 容器中配置的实例的 Bean 名称 |

  | `BeanFactoryAware` | 当前的 Bean 工厂，通过它可以调用容器的服务 |

  | `ApplicationContextAware` | 当前的应用上下文，通过它可以调用容器的服务 |

  | `MessageSourceAware` | 消息源，通过它可以解析文本消息 |

  | `ApplicationEventPublisherAware` | 应用事件发布器，通过它可以发布应用事件 |

  | `ResourceLoaderAware` | 资源加载器，通过它可以加载外部资源 |

  | `EnvironmentAware` | 与 `ApplicationContext` 关联的 `org.springframework.core.env.Environment`
  实例 |

  | `EmbeddedValueResolverAware` | 用于解析内嵌值（即 Spring 值表达式）的 `StringValueResolver` |

  | `LoadTimeWeaverAware` | 在启用加载时织入（LTW）时使用的 `LoadTimeWeaver` 实例 |

  | `ApplicationStartupAware` | 与 `ApplicationContext` 关联的 `org.springframework.core.metrics.ApplicationStartup`
  |


  ![](img/314861_5_En_1_Figh_HTML.gif)一个带阴影圆圈的字母 i 图标，表示信息符号。  `ApplicationContext`
  接口实际上扩展了 `MessageSource`、`ApplicationEventPublisher` 和 `ResourcePatternResolver`
  接口，因此你只需感知应用上下文即可访问所有这些服务。然而，最佳实践是选择范围最小且能满足你需求的感知接口。


  感知接口中的 setter 方法由 Spring 在设置 Bean 属性之后、初始化回调方法之前调用，如下列表所示：


  *   通过构造函数或工厂方法创建 Bean 实例。

  *   为 Bean 属性设置值和 Bean 引用。

  *   调用感知接口中定义的 setter 方法。

  *   将 Bean 实例传递给每个 Bean 后处理器的 `postProcessBeforeInitialization()` 方法。

  *   调用初始化回调方法。

  *   将 Bean 实例传递给每个 Bean 后处理器的 `postProcessAfterInitialization()` 方法。

  *   Bean 已准备好可供使用。

  *   当容器关闭时，调用销毁回调方法。


  请记住，一旦 Bean 实现了感知接口，它就会与 Spring 绑定，并且在 Spring IoC 容器之外将无法正常工作。因此，请仔细考虑是否有必要实现此类专有接口。


  ![](img/314861_5_En_1_Figi_HTML.gif)一个带阴影圆圈的字母 i 图标，表示信息符号。  在较新版本的 Spring 中，并非严格需要实现感知接口。你也可以使用
  `@Autowired` 来获取，例如，访问 `ApplicationContext`。但是，如果你正在编写一个框架/库，那么实现这些接口可能会更好。


  ### 工作原理


  例如，你可以通过实现 `BeanNameAware` 接口，让购物应用中 `Cashier` 类的 POJO 实例感知其对应的 Bean 名称。通过实现该接口，Spring
  会自动将 Bean 名称注入到 POJO 实例中。除了实现接口外，你还需要添加必要的 setter 方法来处理 Bean 名称：


  ```

  package com.apress.spring6recipes.shop;

  import org.springframework.beans.factory.BeanNameAware;

  public class Cashier implements BeanNameAware {

  private final String path;

  private String fileName;

  @Override

  public void setBeanName(String name) {

  this.fileName = name;

  }

  }

  ```


  当 Bean 名称被注入后，你可以使用该值来执行需要 Bean 名称的相关 POJO 任务。例如，你可以使用该值来设置文件名，以记录收银员的结账数据。通过这种方式，你可以省去
  `fileName` 构造函数参数的配置：


  ```

  @Bean(initMethod = "openFile", destroyMethod = "closeFile")

  public Cashier cashier() {

  var path = System.getProperty("java.io.tmpdir") + "cashier";

  var cashier = new Cashier(path);

