  \ `SimpleMailMessage` 类只能发送简单的纯文本邮件。要发送包含 HTML 内容、内嵌图片或附件的邮件，你需要构建并发送 MIME 消息。Jakarta\
  \ Mail 通过 `jakarta.mail.internet.MimeMessage` 类支持 MIME。\n\n首先，你必须使用 `JavaMailSender`\
  \ 接口，而不是其父接口 `MailSender`。你注入的 `JavaMailSenderImpl` 实例确实实现了这个接口，因此无需修改 bean 配置。以下通知器将\
  \ Spring 的 bean 配置文件作为邮件附件发送给管理员。\n\n```\npackage com.apress.spring6recipes.replicator;\n\
  import jakarta.mail.MessagingException;\nimport jakarta.mail.internet.MimeMessage;\n\
  import org.springframework.core.io.ClassPathResource;\nimport org.springframework.mail.MailParseException;\n\
  import org.springframework.mail.SimpleMailMessage;\nimport org.springframework.mail.javamail.JavaMailSender;\n\
  import org.springframework.mail.javamail.MimeMessageHelper;\npublic class EmailErrorNotifier\
  \ implements ErrorNotifier {\nprivate final JavaMailSender mailSender;\nprivate\
  \ final SimpleMailMessage template;\npublic EmailErrorNotifier(JavaMailSender mailSender,\n\
  SimpleMailMessage template) {\nthis.mailSender = mailSender;\nthis.template = template;\n\
  }\n@Override\npublic void notifyCopyError(String srcDir, String destDir, String\
  \ filename) {\nvar message = mailSender.createMimeMessage();\ntry {\nvar helper\
  \ = new MimeMessageHelper(message, true);\nhelper.setFrom(template.getFrom());\n\
  helper.setTo(template.getTo());\nhelper.setSubject(template.getSubject());\nhelper.setText(String.format(\n\
  template.getText(), srcDir, destDir, filename));\nhelper.addAttachment(\"beans.xml\"\
  , new ClassPathResource(\"beans.xml\"));\n} catch (MessagingException e) {\nthrow\
  \ new MailParseException(e);\n}\nmailSender.send(message);\n}\n}\n清单 10-43\n发送 MIME\
  \ 消息的 EmailErrorNotifier\n```\n\n与 `SimpleMailMessage` 不同，`MimeMessage` 类由 Jakarta\
  \ Mail 定义，因此你只能通过调用 `mailSender.createMimeMessage()` 来实例化它。Spring 提供了辅助类 `MimeMessageHelper`\
