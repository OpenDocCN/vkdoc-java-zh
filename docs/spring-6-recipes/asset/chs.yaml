  这些导入启用了最简单的调度支持。前面的注解确保 `com.apress.spring6recipes.springbatch` 包下的任何 bean 都会根据需要被配置和调度。我们的调度器
  bean 如下所示。


  ```

  package com.apress.spring6recipes.springbatch.scheduler;

  import org.springframework.batch.core.Job;

  import org.springframework.batch.core.JobParametersBuilder;

  import org.springframework.batch.core.launch.JobLauncher;

  import org.springframework.scheduling.annotation.Scheduled;

  import org.springframework.stereotype.Component;

  import java.time.LocalDate;

  import java.time.LocalDateTime;

  import java.time.ZoneId;

  import java.util.Date;

  @Component

  public class JobScheduler {

  private final JobLauncher jobLauncher;

  private final Job job;

  public JobScheduler(JobLauncher jobLauncher, Job job) {

  this.jobLauncher = jobLauncher;

  this.job = job;

  }

  public void runRegistrationsJob(LocalDateTime date) throws Exception{

  System.out.println("Starting job at " + date.toString());

  var jobParametersBuilder = new JobParametersBuilder();

  jobParametersBuilder.addLocalDateTime("date", date);

  jobParametersBuilder.addString("input.file", "registrations");

  var jobParameters = jobParametersBuilder.toJobParameters();

  var jobExecution = jobLauncher.run(job, jobParameters);

  var exitcode = jobExecution.getExitStatus().getExitCode();

  System.out.printf("jobExecution finished, exit code: %s%n", exitcode);

  }

  @Scheduled(fixedDelay = 10_0000)

  public void runRegistrationsJobOnASchedule() throws Exception {

  runRegistrationsJob(LocalDateTime.now());

  }

  }

  清单 8-46

  JobScheduler 类

  ```


  这里没有什么特别新奇的地方；这是一个很好的研究，展示了 Spring 框架的不同组件如何很好地协同工作。由于 `@Component` 注解，该 bean 被识别并成为应用程序上下文的一部分，我们在配置类中通过
  `@ComponentScan` 注解启用了该功能。`UserJob` 类中只有一个 `Job`，也只有一个 `JobLauncher`，因此我们只需将它们自动装配到我们的
  bean 中。最后，启动批处理运行的逻辑位于 `runRegistrationsJob(java.time.LocalDateTime date)` 方法内部。可以从任何地方调用此方法。我们此功能的唯一客户端是计划方法
  `runRegistrationsJobOnASchedule`。框架将根据 `@Scheduled` 注解规定的时间线为我们调用此方法。


  对于此类事情还有其他选择；传统上，在 Java 和 Spring 世界中，这类问题非常适合使用 Quartz。现在可能仍然如此，因为 Spring 的调度支持在设计上不如
  Quartz 那样可扩展。如果你所处的环境需要更传统、对运维友好的调度工具，当然还有像 cron、autosys 和 BMC 这样的老牌工具。


  ## 8-10. 参数化作业


  ### 问题


  前面的示例运行得足够好，但在灵活性方面还有所欠缺。要将批处理代码应用于其他文件，你必须编辑配置并将文件名硬编码进去。能够对批处理解决方案进行参数化将非常有帮助。


  ### 解决方案


  使用 `JobParameters` 对作业进行参数化，然后通过 Spring Batch 的表达式语言或 API 调用，这些参数即可供你的步骤使用。


  ### 工作原理


  #### 使用参数启动作业


  一个作业是 `JobInstance` 的原型。`JobParameters` 用于提供一种标识作业唯一运行（一个 `JobInstance`）的方式。这些 `JobParameters`
  允许你向批处理进程提供输入，就像在 Java 中使用方法定义一样。你在前面的示例中已经见过 `JobParameters`，但未深入了解。`JobParameters`
  对象是在你使用 `JobLauncher` 启动作业时创建的。要启动一个名为 `dailySalesFigures` 的作业，并为其提供作业要处理的日期，你可以编写如下代码。


  ```

  package com.apress.spring6recipes.springbatch;

  import java.time.LocalDateTime;

  import org.springframework.batch.core.Job;

  import org.springframework.batch.core.JobParametersBuilder;

  import org.springframework.batch.core.launch.JobLauncher;

  import org.springframework.context.annotation.AnnotationConfigApplicationContext;

  import com.apress.spring6recipes.springbatch.config.BatchConfiguration;

  public class Main {

  public static void main(String[] args) throws Throwable {

  var cfg = BatchConfiguration.class;

  try (var ctx = new AnnotationConfigApplicationContext(cfg)) {

  var jobLauncher = ctx.getBean(JobLauncher.class);

  var job = ctx.getBean("dailySalesFigures", Job.class);

  var builder = new JobParametersBuilder();

  var parameters = builder.addLocalDateTime("date", LocalDateTime.now())

  .toJobParameters();

  jobLauncher.run(job, parameters);

  }}

  }

  清单 8-47

  Main 类

  ```




  #### 访问 JobParameters


  从技术上讲，你可以通过任意一个 `ExecutionContexts`（步骤级或作业级）来获取 `JobParameters`。获取后，你可以通过调用 `getLong()`、`getString()`
  等方法，以类型安全的方式访问这些参数。一个简单的方法是在 `@BeforeStep` 事件中进行绑定，保存 `StepExecution`，然后通过它遍历参数。由此，你可以检查参数并对其进行任何操作。下面我们结合之前编写的
  `ItemProcessor` 来看一下具体实现。


  ```

  // ...

  private StepExecution stepExecution;

  @BeforeStep

  public void saveStepExecution(StepExecution stepExecution) {

  this.stepExecution = stepExecution;

  }

  public UserRegistration process(UserRegistration input) throws Exception {

  var params =  stepExecution.getJobParameters().getParameters();

  // 遍历所有参数

  for (var key : params.keySet()) {

  var value = params.get(key).getValue().toString();

  System.out.printf("%s=%s%n", key, value);

  ));

  }

  // 以类型安全的方式访问特定参数

  var date = stepExecution.getJobParameters().getDate("date");

  // 等等 ...

  }

  清单 8-48

  通过 StepExecution 访问 JobParameters

  ```


  事实证明，这种方法的价值有限。在 80% 的情况下，你需要将作业启动时的参数绑定到应用上下文中的 Spring Bean 上。这些参数仅在运行时可用，而应用上下文中的步骤是在设计时配置的。这种情况在很多地方都会出现。之前的示例展示了带有硬编码路径的
  `ItemWriter` 和 `ItemReader` 实例。除非你想让文件名参数化，否则这样工作得很好。但如果你打算只使用一次作业，这几乎不可接受！


  Spring 框架的核心特性包含一个增强的表达式语言，Spring Batch 利用它来将参数的绑定推迟到正确的时间——或者，在这种情况下，推迟到 Bean 处于正确的作用域时。Spring
  Batch 为此提供了“步骤”作用域。让我们看看如何重写之前的示例，为 `ItemReader` 的资源使用参数化的文件名：


  ```

  @Bean

  @StepScope

  public ItemReader csvFileReader(

  @Value("file:${user.home}/batches/#{jobParameters[''input.fileName'']}.csv")

  Resource input) { ... }

  ```


  你所做的只是将 Bean（即 `FlatFileItemReader`）的作用域限定为步骤的生命周期（此时那些 `JobParameters` 将正确解析），然后使用
  EL 语法将路径参数化以使其生效。


  ## 8-11\. 总结


  本章向你介绍了批处理的概念、其部分历史，以及它为何适用于现代架构。你学习了 Spring Batch（Spring 的批处理框架），以及如何在批处理作业中使用
  `ItemReader` 和 `ItemWriter` 实现进行读写操作。你根据需要编写了自己的 `ItemReader` 和 `ItemWriter` 实现，并了解了如何控制作业内步骤的执行。


