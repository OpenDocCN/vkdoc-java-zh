  #### 设置 Spring MVC 应用


  接下来，你需要创建一个 Spring MVC 应用布局。通常，使用 Spring MVC 开发的 Web 应用与标准 Java Web 应用的设置方式相同，只是你需要额外添加一些
  Spring MVC 特有的配置文件和所需库。


  Jakarta EE 规范定义了 Java Web 应用的有效目录结构，该结构由 Web 归档文件（WAR 文件）组成。例如，你需要在 `WEB-INF` 根目录下提供
  Web 部署描述符，或者提供一个或多个实现 `ServletContainerInitializer` 的类。该 Web 应用的类文件和 JAR 文件应分别放在
  `WEB-INF/classes` 和 `WEB-INF/lib` 目录中。


  对于场地预订系统，请创建以下目录结构。请注意，高亮显示的文件是 Spring 特有的配置文件。


  ![](img/314861_5_En_2_Figb_HTML.gif)一个带字母 i 的图标，位于阴影圆圈内，表示信息符号。 要使用 Spring MVC 开发
  Web 应用，你需要在 CLASSPATH 中添加所有常规的 Spring 依赖项（更多信息请参见第 1 章）以及 Spring Web 和 Spring MVC
  依赖项。如果你使用 Maven，请将以下依赖项添加到 Maven 项目中：


  **<dependency>**


    **<groupId>**`org.springframework`**</groupId>**


    **<artifactId>**`spring-webmvc`**</artifactId>**


    **<version>**`6.0.3`**</version>**


  **</dependency>**


  或者，在使用 Gradle 时添加以下依赖项：


  `dependencies {`


    `implementation "org.springframework:spring-webmvc:6.0.3"`


  `}`


  `WEB-INF` 目录之外的文件可以通过 URL 直接供用户访问，因此 CSS 文件和图像文件必须放在那里。使用 Spring MVC 时，JSP 文件充当模板。框架会读取它们以生成动态内容，因此
  JSP 文件应放在 `WEB-INF` 目录内，以防止直接访问。然而，某些应用服务器不允许 Web 应用内部读取 `WEB-INF` 内的文件。在这种情况下，你只能将它们放在
  `WEB-INF` 目录之外。




  #### 创建配置文件


  Web 部署描述符（`web.xml` 或 `ServletContainerInitializer`）是 Java Web 应用程序的基本配置文件。在此文件中，您需要定义应用程序的
  Servlet，以及 Web 请求如何映射到这些 Servlet。对于 Spring MVC 应用程序，您只需定义一个 `DispatcherServlet`
  实例，它充当 Spring MVC 的前端控制器，当然，如果需要，您也可以定义多个。


  在大型应用程序中，使用多个 `DispatcherServlet` 实例会很方便。这允许将 `DispatcherServlet` 实例指定给特定的 URL，从而使代码管理更轻松，并让各个团队成员能够处理应用程序的逻辑而不会相互干扰：


  ```

  package com.apress.spring6recipes.court.web;

  import com.apress.spring6recipes.court.config.CourtConfiguration;

  import jakarta.servlet.ServletContainerInitializer;

  import jakarta.servlet.ServletContext;

  import jakarta.servlet.ServletException;

  import org.springframework.web.context.support.AnnotationConfigWebApplicationContext;

  import org.springframework.web.servlet.DispatcherServlet;

  import java.util.Set;

  public class CourtServletContainerInitializer implements ServletContainerInitializer
  {

  public static final String MSG = "启动 Court Web 应用程序";

  @Override

  public void onStartup(Set> c, ServletContext ctx) throws ServletException {

  ctx.log(MSG);

  var applicationContext = new AnnotationConfigWebApplicationContext();

  applicationContext.register(CourtConfiguration.class);

  var dispatcherServlet = new DispatcherServlet(applicationContext);

  var courtRegistration = ctx.addServlet("court", dispatcherServlet);

  courtRegistration.addMapping("/");

  courtRegistration.setLoadOnStartup(1);

  }

  }

  ```


  在这个 `CourtServletContainerInitializer` 中，您定义了一个类型为 `DispatcherServlet` 的 Servlet。这是
  Spring MVC 中的核心 Servlet 类，它接收 Web 请求并将其分派给适当的处理器。您将此 Servlet 的名称设置为 `court`，并使用
  `/`（斜杠）映射所有 URL，斜杠代表根目录。请注意，URL 模式可以设置为更精细的模式。在较大的应用程序中，将模式委托给不同的 Servlet 可能更有意义，但为简单起见，应用程序中的所有
  URL 都委托给单个 `court` Servlet。


  为了让 `CourtServletContainerInitializer` 被检测到，您还需要在 `META-INF/services` 目录中添加一个名为
  `jakarta.servlet.ServletContainerInitializer` 的文件。该文件的内容应为 `CourtServletContainerInitializer`
  的全名。此文件由 Servlet 容器加载，并用于引导应用程序：


  ```

  com.apress.spring6recipes.court.web.CourtServletContainerInitializer

  ```


  最后，添加 `CourtConfiguration` 类，这是一个非常简单的 `@Configuration` 类：


  ```

  package com.apress.spring6recipes.court.config;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.ComponentScan;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.web.servlet.config.annotation.EnableWebMvc;

  import org.springframework.web.servlet.view.InternalResourceViewResolver;

  @Configuration

  @ComponentScan("com.apress.spring6recipes.court")

  @EnableWebMvc

  public class CourtConfiguration {

  }

  ```


  它定义了一个 `@ComponentScan` 注解，该注解将扫描 `com.apress.spring6recipes.court` 包（及其子包）并注册所有检测到的
  Bean（在本例中为 `InMemoryReservationService` 和尚未创建的带有 `@Controller` 注解的类）。它还指定了 `@EnableWebMvc`
  注解，表明我们想要配置 Spring MVC。`@EnableWebMvc` 为 Spring MVC 应用程序进行了一些额外的设置（尽管 `DispatcherServlet`
  本身也有一些默认设置），并允许通过使用 `WebMvcConfigurer` 实例来修改其配置（有关信息，请参阅后续的配方）。


  #### 创建 Spring MVC 控制器


  基于注解的控制器类可以是任意类，无需实现特定接口或扩展特定基类。您可以使用 `@Controller` 注解对其进行注解。控制器中可以定义一个或多个处理器方法来处理单个或多个操作。处理器方法的签名足够灵活，可以接受一系列参数。


  `@RequestMapping` 注解可以应用于类级别或方法级别。第一种映射策略是将特定的 URL 模式映射到控制器类，然后将特定的 HTTP 方法映射到每个处理器方法：


  ```

  package com.apress.spring6recipes.court.web;

  import org.springframework.stereotype.Controller;

  import org.springframework.ui.Model;

  import org.springframework.web.bind.annotation.RequestMapping;

  import org.springframework.web.bind.annotation.RequestMethod;

  import java.time.LocalDate;

  @Controller

  @RequestMapping("/welcome")

  public class WelcomeController {

  @RequestMapping(method = RequestMethod.GET)

  public String welcome(Model model) {

  model.addAttribute("today", LocalDate.now());

  return "/WEB-INF/jsp/welcome.jsp";

  }

  }

  ```


  此控制器创建一个 `java.time.LocalDate` 对象来检索当前日期，然后将其作为属性添加到输入的 `Model` 对象中，以便目标视图可以显示它。


  由于您已经在 `com.apress.spring6recipes.court` 包上激活了注解扫描，因此在部署时会检测到控制器类的注解。


  `@Controller` 注解将类定义为 Spring MVC 控制器。`@RequestMapping` 注解更有趣，因为它包含属性，并且可以在类或处理器方法级别声明。此类中使用的第一个值
  `("/welcome")` 用于指定控制器可操作的 URL，这意味着任何在 `/welcome` URL 上接收到的请求都由 `WelcomeController`
  类处理。


  一旦请求由控制器类处理，它会将调用委托给控制器中声明的默认 HTTP GET 处理器方法。这种行为的原因是，对 URL 发出的每个初始请求都是 HTTP GET
  类型。因此，当控制器处理 `/welcome` URL 上的请求时，它会随后委托给默认的 HTTP GET 处理器方法进行处理。


  注解 `@RequestMapping(method = RequestMethod.GET)` 用于将 `welcome` 方法装饰为控制器的默认 HTTP
  GET 处理器方法。值得一提的是，如果没有声明默认的 HTTP GET 处理器方法，则会抛出 `ServletException`，因此 Spring MVC
  控制器至少需要有一个 URL 路由和默认的 HTTP GET 处理器方法，这一点很重要。


  这种方法的另一种变体是在方法级别使用的 `@RequestMapping` 注解中同时声明两个值——URL 路由和默认的 HTTP GET 处理器方法。下面说明了这种声明方式：


  ```

  package com.apress.spring6recipes.court.web;

  import org.springframework.stereotype.Controller;

  import org.springframework.ui.Model;

  import org.springframework.web.bind.annotation.RequestMapping;

  import org.springframework.web.bind.annotation.RequestMethod;

  import java.time.LocalDate;

  @Controller

  public class WelcomeController {

  @RequestMapping(path = "/welcome", method = RequestMethod.GET)

  public String welcome(Model model) {

  model.addAttribute("today", LocalDate.now());

  return "/WEB-INF/jsp/welcome.jsp";

  }

  }

  ```


  最后这种声明方式与之前的等效。`path`（或 `value`）属性指示处理器方法映射到的 URL，`method` 属性将处理器方法定义为控制器的默认 HTTP
  GET 方法。最后，还有一些方便的注解，如 `@GetMapping`、`@PostMapping` 等，以最小化配置。以下映射将执行与前面提到的声明相同的操作：




  ```

  package com.apress.spring6recipes.court.web;

  import org.springframework.stereotype.Controller;

  import org.springframework.ui.Model;

  import org.springframework.web.bind.annotation.GetMapping;

  import java.time.LocalDate;

  @Controller

  public class WelcomeController {

  @GetMapping("/welcome")

  public String welcome(Model model) {

  model.addAttribute("today", LocalDate.now());

  return "/WEB-INF/jsp/welcome.jsp";

  }

  }

  ```


  `@GetMapping` 让这个类变得更简洁，或许也更容易阅读。


  最后一个控制器展示了 Spring MVC 的基本原理。然而，一个典型的控制器可能会调用后端服务进行业务处理。例如，你可以创建一个用于查询特定球场预订信息的控制器，如下所示：


  ```

  package com.apress.spring6recipes.court.web;

  import com.apress.spring6recipes.court.domain.Reservation;

  import com.apress.spring6recipes.court.service.ReservationService;

  import org.springframework.stereotype.Controller;

  import org.springframework.ui.Model;

  import org.springframework.web.bind.annotation.GetMapping;

  import org.springframework.web.bind.annotation.PostMapping;

  import org.springframework.web.bind.annotation.RequestMapping;

  import org.springframework.web.bind.annotation.RequestParam;

  @Controller

  @RequestMapping("/reservationQuery")

  public class ReservationQueryController {

  private final ReservationService reservationService;

  public ReservationQueryController(ReservationService reservationService) {

  this.reservationService = reservationService;

  }

  @GetMapping

  public void setupForm() {}

  @PostMapping

  public String sumbitForm(@RequestParam("courtName") String courtName, Model model)
  {

  var reservations = java.util.Collections.emptyList();

  if (courtName != null) {

  reservations = reservationService.query(courtName);

  }

  model.addAttribute("reservations", reservations);

  return "/WEB-INF/jsp/reservationQuery.jsp";

  }

  }

  ```


  如前所述，控制器接下来会寻找一个默认的 HTTP GET 处理方法。由于公共的 `setupForm()` 方法为此目的分配了必要的 `@RequestMapping`
  注解，因此接下来会调用它。


  与之前的默认 HTTP GET 处理方法不同，请注意此方法没有输入参数，没有逻辑，并且返回值为 void。这意味着两件事。由于没有输入参数和逻辑，视图仅显示在实现模板（例如
  JSP）中硬编码的数据，因为控制器没有添加任何数据。由于返回值为 void，将使用基于请求 URL 的默认视图名称。因此，由于请求 URL 是 `/reservationQuery`，因此假定返回一个名为
  `reservationQuery` 的视图。


  剩下的处理方法用 `@PostMapping` 注解修饰。乍一看，有两个处理方法只有类级别的 `/reservationQuery` URL 声明可能会令人困惑，但实际上非常简单。一个方法在
  HTTP GET 请求发送到 `/reservationQuery` URL 时被调用，另一个方法在 HTTP POST 请求发送到同一个 URL 时被调用。


  Web 应用中的大多数请求都是 HTTP GET 类型，而 HTTP POST 类型的请求通常在用户提交 HTML 表单时发出。因此，为了揭示更多应用的视图（我们稍后将描述），一个方法在
  HTML 表单初始加载时（即 HTTP GET）被调用，而另一个方法在 HTML 表单提交时（即 HTTP POST）被调用。


  仔细查看 HTTP POST 默认处理方法，注意两个输入参数。首先是 `@RequestParam("courtName") String courtName`
  声明，用于提取名为 `courtName` 的请求参数。在这种情况下，HTTP POST 请求以 `/reservationQuery?courtName=<value>`
  的形式到来。此声明使得该值在方法中可通过变量名 `courtName` 使用。其次，`Model` 声明用于定义一个对象，以便将数据传递到返回的视图中。


  处理方法执行的逻辑包括使用控制器的 `reservationService`，利用 `courtName` 变量执行查询。从该查询获得的结果被分配给 `Model`
  对象，该对象稍后将可供返回的视图用于显示。


  最后，请注意该方法返回一个名为 `reservationQuery` 的视图。此方法也可以像默认的 HTTP GET 一样返回 `void`，并且由于请求 URL
  的原因，会被分配到同一个 `reservationQuery` 默认视图。两种方法是一样的。


  现在你已经了解了 Spring MVC 控制器的构成方式，是时候探索控制器处理方法将其结果委托给的视图了。


  #### 创建 JSP 视图


  Spring MVC 支持多种类型的视图，用于不同的表示技术。这些包括 JSP、HTML、PDF、Excel 工作表 (XLS)、XML、JSON（JavaScript
  对象表示法）、Atom 和 RSS 源、JasperReports 以及其他第三方视图实现。


  在 Spring MVC 应用中，视图大多使用模板语言编写；Jakarta EE 服务器默认提供的是使用 JSTL 编写的 JSP 模板。当 `DispatcherServlet`
  接收到从处理方法返回的视图名称时，它会将逻辑视图名称解析为用于渲染的视图实现（另请参见配方 2-6）。例如，你可以在 Web 应用上下文的 `CourtConfiguration`
  中配置 `InternalResourceViewResolver` bean，以将视图名称解析为 `/WEB-INF/jsp/` 目录中的 JSP 文件：


  ```

  @Bean

  public InternalResourceViewResolver internalResourceViewResolver() {

  var viewResolver = new InternalResourceViewResolver();

  viewResolver.setPrefix("/WEB-INF/jsp/");

  viewResolver.setSuffix(".jsp");

  return viewResolver;

  }

  ```


  通过使用这最后的配置，名为 `reservationQuery` 的逻辑视图被委托给位于 `/WEB-INF/jsp/reservationQuery.jsp`
  的视图实现。了解这一点后，你可以为欢迎控制器创建以下 JSP 模板，将其命名为 `welcome.jsp` 并放在 `/WEB-INF/jsp/` 目录中：


  ```


  欢迎


  欢迎使用球场预订系统

  今天是 ${today}。


  ```


  接下来，你可以为预订查询控制器创建另一个 JSP 模板，并将其命名为 `reservationQuery.jsp` 以匹配视图名称：


  ```


  预订查询


  球场名称


  球场名称

  日期

  小时

  玩家


  ${reservation.courtName}

  ${reservation.date}

  ${reservation.hour}

  ${reservation.player.name}


  ```


  在这个 JSP 模板中，你包含了一个供用户输入要查询的球场名称的表单，然后使用 `<c:forEach>` 标签循环遍历预订模型属性以生成结果表格。


  #### 部署 Web 应用


  在 Web 应用的开发过程中，我们强烈建议安装一个本地 Jakarta EE 应用服务器，该服务器附带一个用于测试和调试的 Web 容器。为了便于配置和部署，我们选择了
  Apache Tomcat 10.1.x 作为 Web 容器。


  此 Web 容器的部署目录位于 webapps 目录下。默认情况下，Tomcat 监听 8080 端口，并将应用部署到与应用 WAR 同名的上下文中。因此，如果你将应用打包成一个名为
  `court.war` 的 WAR 文件，则可以通过以下 URL 访问欢迎控制器和预订查询控制器：


  ```

  http://localhost:8080/court/welcome

  http://localhost:8080/court/reservationQuery

  ```


  ![](img/314861_5_En_2_Figc_HTML.gif)灯泡图标表示提示信息。  该项目还可以创建一个包含应用的 Docker 容器：运行 `../../gradlew
  build docker` 来获取一个包含 Tomcat 和应用的容器。然后你可以启动一个 Docker 容器来测试应用（`../../gradlew dockerRun`
  或手动使用 Docker 启动它）。




  #### 使用 WebApplicationInitializer 引导应用程序


  在上一节中，你创建了一个 `CourtServletContainerInitializer`，并在 `META-INF/services` 目录下添加了一个文件来引导应用程序。


  现在，我们不再自行实现，而是利用 Spring 提供的便捷实现：`SpringServletContainerInitializer`。这个类实现了 `ServletContainerInitializer`
  接口，并扫描类路径以查找 `WebApplicationInitializer` 接口的实现。幸运的是，Spring 提供了该接口的一些便捷实现，你可以将其用于应用程序。其中之一是
  `AbstractAnnotationConfigDispatcherServletInitializer`：


  ```

  package com.apress.spring6recipes.court.web;

  import com.apress.spring6recipes.court.config.CourtConfiguration;

  import org.springframework.web.servlet.support.AbstractAnnotationConfigDispatcherServletInitializer;

  public class CourtWebApplicationInitializer

  extends AbstractAnnotationConfigDispatcherServletInitializer {

  @Override

  protected Class[] getRootConfigClasses() {

  return null;

  }

  @Override

  protected Class[] getServletConfigClasses() {

  return new Class[] { CourtConfiguration.class };

  }

  @Override

  protected String[] getServletMappings() {

  return new String[] { "/" };

  }

  }

  ```


  新引入的 `CourtWebApplicationInitializer` 已经创建了一个 `DispatcherServlet`，因此你唯一需要做的就是在 `getServletMappings`
  方法中配置映射，并在 `getServletConfigClasses` 中配置要加载的配置类。除了 Servlet 之外，还会可选地创建另一个组件，即 `ContextLoaderListener`；这是一个
  `ServletContextListener`，它也会创建一个 `ApplicationContext`，该上下文将作为 `DispatcherServlet`
  的父级 `ApplicationContext`。如果你有多个 Servlet 需要访问相同的 Bean（服务、数据源等），这将非常方便。


  ## 2-2\. 使用 @RequestMapping 映射请求


  ### 问题


  当 `DispatcherServlet` 接收到 Web 请求时，它会尝试将请求分派给那些使用 `@Controller` 注解声明的各种控制器类。分派过程取决于控制器类及其处理方法中声明的各种
  `@RequestMapping` 注解。你需要定义一种使用 `@RequestMapping` 注解映射请求的策略。


  ### 解决方案


  在 Spring MVC 应用程序中，Web 请求通过控制器类中声明的一个或多个 `@RequestMapping` 注解映射到处理器。


  处理器映射根据 URL 相对于上下文路径（即 Web 应用程序上下文的部署路径）和 Servlet 路径（即映射到 `DispatcherServlet` 的路径）的路径来匹配
  URL。因此，例如，在 URL `http://localhost:8080/court/welcome` 中，要匹配的路径是 `/welcome`，因为上下文路径是
  `/court`，并且没有 Servlet 路径——回想一下，在 `CourtWebApplicationInitializer` 中，Servlet 路径被声明为
  `/`。


  ### 工作原理


  #### 按方法映射请求


  使用 `@RequestMapping` 注解的最简单策略是直接修饰处理方法。要使此策略生效，你必须使用包含 URL 模式的 `@RequestMapping`
  注解来声明每个处理方法。如果处理器的 `@RequestMapping` 注解与请求的 URL 匹配，`DispatcherServlet` 就会将请求分派给该处理器来处理：


  ```

  package com.apress.spring6recipes.court.web;

  import com.apress.spring6recipes.court.domain.Member;

  import com.apress.spring6recipes.court.service.MemberService;

  import org.springframework.stereotype.Controller;

  import org.springframework.ui.Model;

  import org.springframework.web.bind.annotation.RequestMapping;

  import org.springframework.web.bind.annotation.RequestMethod;

  import org.springframework.web.bind.annotation.RequestParam;

  @Controller

  public class MemberController {

  private MemberService memberService;

  public MemberController(MemberService memberService) {

  this.memberService = memberService;

  }

  @RequestMapping("/member/add")

  public String addMember(Model model) {

  model.addAttribute("member", new Member());

  model.addAttribute("guests", memberService.list());

  return "memberList";

  }

  @RequestMapping(value = { "/member/remove", "/member/delete" },

  method = RequestMethod.GET)

  public String removeMember(@RequestParam("memberName") String memberName) {

  memberService.remove(memberName);

  return "redirect:";

  }

  }

  ```


  上面的代码清单展示了如何使用 `@RequestMapping` 注解将每个处理方法映射到特定的 URL。第二个处理方法演示了如何分配多个 URL，因此 `/member/remove`
  和 `/member/delete` 都会触发该处理方法的执行。当未指定 `method` 时，它将匹配所有传入的 HTTP 方法类型（GET、POST、PUT
  等）；可以通过指定用于映射的 `method` 来缩小匹配范围。




  #### 按类映射请求


  `@RequestMapping` 注解也可用于装饰控制器类。这使得处理器方法可以像配方 2-1 中的 `ReservationQueryController`
  所示那样，放弃使用 `@RequestMapping` 注解，或者使用带有自身 `@RequestMapping` 注解的更细粒度 URL。为了实现更广泛的 URL
  匹配，`@RequestMapping` 注解还支持使用通配符（即 `*`）。


  以下列表展示了在 `@RequestMapping` 注解中使用 URL 通配符，以及在处理器方法的 `@RequestMapping` 注解上进行更细粒度 URL
  匹配的示例：


  ```

  package com.apress.spring6recipes.court.web;

  import com.apress.spring6recipes.court.domain.Member;

  import com.apress.spring6recipes.court.service.MemberService;

  import org.springframework.stereotype.Controller;

  import org.springframework.ui.Model;

  import org.springframework.web.bind.annotation.PathVariable;

  import org.springframework.web.bind.annotation.RequestMapping;

  import org.springframework.web.bind.annotation.RequestMethod;

  import org.springframework.web.bind.annotation.RequestParam;

  @Controller

  @RequestMapping("/member/*")

  public class MemberController {

  private MemberService memberService;

  public MemberController(MemberService memberService) {

  this.memberService = memberService;

  }

  @RequestMapping("/add")

  public String addMember(Model model) {

  model.addAttribute("member", new Member());

  model.addAttribute("guests", memberService.list());

  return "memberList";

  }

  @RequestMapping(path = { "/remove", "/delete" }, method = RequestMethod.GET)

  public String removeMember(@RequestParam("memberName") String memberName) {

  memberService.remove(memberName);

  return "redirect:";

  }

  @RequestMapping("/display/{member}")

  public String displayMember(@PathVariable("member") String member, Model model)
  {

  model.addAttribute("member", memberService.find(member).orElse(null));

  return "member";

  }

  @RequestMapping

  public void memberList() {}

  public void memberLogic(String memberName) {}

  }

  ```


  注意，类级别的 `@RequestMapping` 注解使用了 URL 通配符：`/member/*`。这会将所有对 `/member/` URL 的请求委托给该控制器的处理器方法。


  前两个处理器方法使用了 `@RequestMapping` 注解。当对 `/member/add` URL 发起 HTTP GET 请求时，会调用 `addMember()`
  方法；而当对 `/member/remove` 或 `/member/delete` URL 发起 HTTP GET 请求时，则会调用 `removeMember()`
  方法。


  第三个处理器方法使用特殊符号 `{path_variable}` 来指定其 `@RequestMapping` 的值。通过这种方式，URL 中的值可以作为输入传递给处理器方法。注意，该处理器方法声明了
  `@PathVariable("member") String member`。这样一来，如果收到形如 `member/display/jdoe` 的请求，处理器方法就能访问到值为
  `jdoe` 的 `member` 变量。这主要是一种让你无需处理处理器请求对象的便利机制，并且在设计 RESTful Web 服务时尤其有用。


  第四个处理器方法也使用了 `@RequestMapping` 注解，但这次缺少了 URL 值。由于类级别使用了 `/member/*` URL 通配符，该处理器方法会作为“兜底”方法执行。因此，任何
  URL 请求（例如 `/member/abcdefg` 或 `/member/randomroute`）都会触发此方法。注意其 `void` 返回值，这会使处理器方法默认按其名称（即
  `memberList`）解析视图。


  最后一个方法——`memberLogic`——没有任何 `@RequestMapping` 注解；这意味着该方法只是该类的一个工具方法，对 Spring MVC
  没有影响。


  #### 按 HTTP 请求类型映射请求


  默认情况下，`@RequestMapping` 注解处理所有类型的传入请求。然而，在大多数情况下，我们不希望同一个方法同时处理 GET 和 POST 请求。为了区分
  HTTP 请求，需要在 `@RequestMapping` 注解中明确指定请求类型，如下所示：


  ```

  @RequestMapping(value= "processUser", method =  RequestMethod.POST)

  public String submitForm(@ModelAttribute("member") Member member,

  BindingResult result, Model model) {

  }

  ```


  你需要指定处理器方法 HTTP 类型的程度，取决于与控制器交互的内容和方式。大多数情况下，Web 浏览器主要使用 HTTP `GET` 和 HTTP `POST`
  请求执行操作。然而，其他设备或应用程序（例如 RESTful Web 服务）可能需要支持其他 HTTP 请求类型。总共有九种不同的 HTTP 请求类型：`HEAD`、`GET`、`POST`、`PUT`、`DELETE`、`PATCH`、`TRACE`、`OPTIONS`
  和 `CONNECT`。然而，支持处理所有这些请求类型超出了 MVC 控制器的范围，因为 Web 服务器和请求方需要支持这些 HTTP 请求类型。考虑到绝大多数
  HTTP 请求都是 `GET` 或 `POST` 类型，你很少（甚至永远不会）需要实现对其他 HTTP 请求类型的支持。


  对于最常用的请求方法，Spring MVC 提供了专门的注解。


  *请求方法到注解的映射*


  | 请求方法 | 注解 |

  | --- | --- |

  | POST | `@PostMapping` |

  | GET | `@GetMapping` |

  | DELETE | `@DeleteMapping` |

  | PUT | `@PutMapping` |

  | PATCH | `@PatchMapping` |


  这些便捷注解都是专门的 `@RequestMapping` 注解，使得编写请求处理方法更加简洁：


  ```

  @PostMapping("processUser")

  public String submitForm(@ModelAttribute("member") Member member,

  BindingResult result, Model model) {

  }

  ```


  像 .HTML 和 .JSP 这样的 URL 扩展名在哪里？


  你可能已经注意到，在 `@RequestMapping` 注解中指定的所有 URL 中，都没有像 `.html` 或 `.jsp` 这样的文件扩展名。尽管这种做法并未被广泛采用，但它是符合
  MVC 设计原则的良好实践。


  控制器不应与任何指示视图技术（如 HTML 或 JSP）的扩展名绑定。这就是为什么控制器返回逻辑视图，并且匹配的 URL 应该声明时不带扩展名的原因。


  在应用程序通常需要以不同格式（如 XML、JSON、PDF 或 XLS（Excel））提供相同内容的时代，应该由视图解析器来检查请求中提供的扩展名（如果有的话），并决定使用哪种视图技术。


  在这个简短的介绍中，你已经看到了如何在 MVC 配置类中配置解析器，将逻辑视图映射到 JSP 文件，而全程无需使用像 `.jsp` 这样的 URL 文件扩展名。


  在后续的配方中，你将学习 Spring MVC 如何使用这种无扩展名的 URL 方法，通过不同的视图技术来提供内容。


  ## 2-3. 使用处理器拦截器拦截请求


  ### 问题


  Servlet API 定义的 Servlet 过滤器可以在每个 Web 请求被 Servlet 处理之前和之后进行预处理和后处理。你希望在 Spring 的
  Web 应用上下文中配置具有类似过滤器功能的东西，以利用容器的特性。


  此外，有时你可能希望对由 Spring MVC 处理器处理的 Web 请求进行预处理和后处理，并在这些处理器返回的模型属性传递给视图之前对其进行操作。




  ### 解决方案


  Spring MVC 允许你通过处理器拦截器（handler interceptor）拦截 Web 请求，进行预处理和后处理。处理器拦截器在 Spring 的
  Web 应用上下文中配置，因此它们可以利用任何容器特性，并引用容器中声明的任何 Bean。可以为特定的 URL 映射注册处理器拦截器，这样它只会拦截映射到特定
  URL 的请求。


  每个处理器拦截器都必须实现 `HandlerInterceptor` 接口，该接口包含三个需要你实现的回调方法：`preHandle()`、`postHandle()`
  和 `afterCompletion()`。你只需要实现你需要用到的回调方法。第一个和第二个方法分别在处理器处理请求之前和之后被调用。第二个方法还允许你访问返回的
  `ModelAndView` 对象，因此你可以操作其中的模型属性。最后一个方法在所有请求处理完成之后（即视图渲染之后）被调用。


  ### 工作原理


  假设你要测量每个请求处理器处理每个 Web 请求的时间，并允许视图向用户显示这个时间。你可以为此创建一个自定义的处理器拦截器：


  ```

  package com.apress.spring6recipes.court.web;

  import jakarta.servlet.http.HttpServletRequest;

  import jakarta.servlet.http.HttpServletResponse;

  import org.springframework.util.StopWatch;

  import org.springframework.web.servlet.HandlerInterceptor;

  import org.springframework.web.servlet.ModelAndView;

  public class MeasurementInterceptor implements HandlerInterceptor {

  private static final String NAME = "MeasurementInterceptor.TIMER";

  @Override

  public boolean preHandle(HttpServletRequest request, HttpServletResponse response,

  Object handler) {

  var sw = new StopWatch();

  sw.start();

  request.setAttribute(NAME, sw);

  return true;

  }

  @Override

  public void postHandle(HttpServletRequest request, HttpServletResponse response,

  Object handler, ModelAndView modelAndView) {

  var timer = (StopWatch) request.getAttribute(NAME);

  timer.stop();

  modelAndView.addObject("processingTime", timer.getTotalTimeMillis());

  }

  }

  ```


  在这个拦截器的 `preHandle()` 方法中，你创建一个 `StopWatch` 并启动它，然后将其保存到请求属性中。此方法应返回 `true`，以允许
  `DispatcherServlet` 继续处理请求。否则，`DispatcherServlet` 会假定此方法已经处理了请求，因此 `DispatcherServlet`
  会直接将响应返回给用户。然后，在 `postHandle()` 方法中，你检索 `StopWatch`，停止它，并获取总处理时间。


  要注册一个拦截器，你需要使用 `WebMvcConfigurer`。这是一个接口，包含几个由 Spring Web MVC 配置使用的回调方法，用于执行一些特定的设置。你可以在现有的
  `CourtConfiguration` 上实现此接口，或者为此提供一个单独的配置类。无论哪种方式，你都需要重写 `addInterceptors` 方法。该方法让你能够访问
  `InterceptorRegistry`，你可以使用它来添加拦截器：


  ```

  package com.apress.spring6recipes.court.config;

  import com.apress.spring6recipes.court.web.MeasurementInterceptor;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.web.servlet.config.annotation.InterceptorRegistry;

  import org.springframework.web.servlet.config.annotation.WebMvcConfigurer;

  @Configuration

  public class InterceptorConfiguration implements WebMvcConfigurer {

  @Override

  public void addInterceptors(InterceptorRegistry registry) {

  registry.addInterceptor(measurementInterceptor());

  }

  @Bean

  public MeasurementInterceptor measurementInterceptor() {

  return new MeasurementInterceptor();

  }

  }

  ```


  现在，你可以在 `welcome.jsp` 中显示这个时间，以验证此拦截器的功能。由于 `WelcomeController` 没有太多事情要做，你可能会看到处理时间为
  0 毫秒。如果是这种情况，你可以在此类中添加一个 sleep 语句，以看到更长的处理时间：


  ```


  Welcome


  Welcome to Court Reservation System

  Today is ${today}.


  Processing time : ${processingTime}ms.


  ```


  默认情况下，`HandlerInterceptor` 应用于所有 `@Controller`。然而，有时你想要区分拦截器应用于哪些控制器。命名空间和基于 Java
  的配置允许将拦截器映射到特定的 URL。这只是一个配置问题。以下是此功能的 Java 配置：


  ```

  package com.apress.spring6recipes.court.config;

  import com.apress.spring6recipes.court.web.ExtensionInterceptor;

  import com.apress.spring6recipes.court.web.MeasurementInterceptor;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.web.servlet.config.annotation.InterceptorRegistry;

  import org.springframework.web.servlet.config.annotation.WebMvcConfigurer;

  @Configuration

  public class InterceptorConfiguration implements WebMvcConfigurer {

  @Override

  public void addInterceptors(InterceptorRegistry registry) {

  registry.addInterceptor(measurementInterceptor());

  registry.addInterceptor(summaryReportInterceptor())

  .addPathPatterns("/reservationSummary*");

  }

  @Bean

  public MeasurementInterceptor measurementInterceptor() {

  return new MeasurementInterceptor();

  }

  @Bean

  public ExtensionInterceptor summaryReportInterceptor() {

  return new ExtensionInterceptor(cnm);

  }

  }

  ```


  首先，新增了拦截器 Bean `summaryReportInterceptor`。此 Bean 的后备类的结构与 `measurementInterceptor`
  相同（即它实现了 `HandlerInterceptor` 接口）。但是，此拦截器执行的逻辑应仅限于映射到 `/reservationSummary` URI
  的特定控制器。在注册拦截器时，我们可以指定它映射到哪些 URL；默认情况下，这采用 ANT 风格的表达式。我们将此模式传递给 `addPathPatterns`
  方法。还有一个 `excludePathPatterns` 方法，你可以使用它来排除某些 URL 的拦截器。


  ## 2-4. 解析用户区域设置


  ### 问题


  为了使你的 Web 应用程序支持国际化，你必须识别每个用户的首选区域设置，并根据此区域设置显示内容。


  ### 解决方案


  在 Spring MVC 应用程序中，用户的区域设置由区域设置解析器（locale resolver）识别，该解析器必须实现 `LocaleResolver`
  接口。Spring MVC 提供了几个 `LocaleResolver` 实现，供你根据不同的标准解析区域设置。或者，你也可以通过实现此接口来创建自己的自定义区域设置解析器。


  你可以通过在 Web 应用上下文中注册一个类型为 `LocaleResolver` 的 Bean 来定义区域设置解析器。你必须将区域设置解析器的 Bean 名称设置为
  `localeResolver`，以便 `DispatcherServlet` 自动检测。请注意，每个 `DispatcherServlet` 只能注册一个区域设置解析器。


  ### 工作原理


  #### 通过 HTTP 请求头解析区域设置


  Spring 使用的默认区域设置解析器是 `AcceptHeaderLocaleResolver`。它通过检查 HTTP 请求的 `accept-language`
  头来解析区域设置。此标头由用户的 Web 浏览器根据底层操作系统的区域设置进行设置。请注意，此区域设置解析器无法更改用户的区域设置，因为它无法修改用户操作系统的区域设置。




  #### 通过会话属性解析区域设置


  另一种解析区域设置的方式是使用 `SessionLocaleResolver`。它通过检查用户会话中的预定义属性来解析区域设置。如果会话属性不存在，此区域设置解析器会根据
  `accept-language` HTTP 标头确定默认区域设置：


  ```

  @Bean

  public LocaleResolver localeResolver () {

  var localeResolver = new SessionLocaleResolver();

  localeResolver.setDefaultLocale(Locale.of("en"));

  return localeResolver;

  }

  ```


  如果会话属性不存在，你可以为此解析器设置 `defaultLocale` 属性。请注意，此区域设置解析器能够通过修改存储区域设置的会话属性来更改用户的区域设置。


  #### 通过 Cookie 解析区域设置


  你也可以使用 `CookieLocaleResolver`，通过检查用户浏览器中的 Cookie 来解析区域设置。如果 Cookie 不存在，此区域设置解析器会根据
  `accept-language` HTTP 标头确定默认区域设置：


  ```

  @Bean

  public LocaleResolver localeResolver() {

  return new CookieLocaleResolver();

  }

  ```


  此区域设置解析器使用的 Cookie 可以通过构造函数提供 Cookie 名称来自定义。`cookieMaxAge` 属性指示此 Cookie 应持久保存多少秒；推荐的做法是传递一个
  `Duration`（如示例所示）。值为 `-1` 表示此 Cookie 将在浏览器关闭后失效：


  ```

  @Bean

  public LocaleResolver localeResolver() {

  var cookieLocaleResolver = new CookieLocaleResolver("language");

  cookieLocaleResolver.setCookieMaxAge(Duration.ofHours(1));

  cookieLocaleResolver.setDefaultLocale(Locale.of("en"));

  return cookieLocaleResolver;

  }

  ```


  如果用户浏览器中不存在 Cookie，你也可以为此解析器设置 `defaultLocale` 属性。此区域设置解析器能够通过修改存储区域设置的 Cookie 来更改用户的区域设置。


  #### 更改用户的区域设置


  除了显式调用 `LocaleResolver.setLocale()` 来更改用户的区域设置外，你还可以将 `LocaleChangeInterceptor`
  应用到你的处理器映射中。此拦截器会检测当前 HTTP 请求中是否存在一个特殊参数。该参数名称可以通过此拦截器的 `paramName` 属性进行自定义。如果当前请求中存在这样的参数，此拦截器会根据参数值更改用户的区域设置：


  ```

  package com.apress.spring6recipes.court.config;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.web.servlet.config.annotation.InterceptorRegistry;

  import org.springframework.web.servlet.config.annotation.WebMvcConfigurer;

  import org.springframework.web.servlet.i18n.CookieLocaleResolver;

  import org.springframework.web.servlet.i18n.LocaleChangeInterceptor;

  import java.time.Duration;

  import java.util.Locale;

  @Configuration

  public class I18NConfiguration implements WebMvcConfigurer {

  @Override

  public void addInterceptors(InterceptorRegistry registry) {

  registry.addInterceptor(localeChangeInterceptor());

  }

  @Bean

  public LocaleChangeInterceptor localeChangeInterceptor() {

  var localeChangeInterceptor = new LocaleChangeInterceptor();

  localeChangeInterceptor.setParamName("language");

  return localeChangeInterceptor;

  }

  @Bean

  public CookieLocaleResolver localeResolver() {

  var cookieLocaleResolver = new CookieLocaleResolver("language");

  cookieLocaleResolver.setCookieMaxAge(Duration.ofHours(1));

  cookieLocaleResolver.setDefaultLocale(Locale.of("en"));

  return cookieLocaleResolver;

  }

  }

  ```


  现在，任何带有 `language` 参数的 URL 都可以更改用户的区域设置。例如，以下两个 URL 分别将用户的区域设置更改为美国英语和德语：


  ```

  http://localhost:8080/court/welcome?language=en_US

  http://localhost:8080/court/welcome?language=de

  ```


  然后，你可以在 `welcome.jsp` 中显示 HTTP 响应对象的区域设置，以验证区域设置拦截器的配置：


  ```


  Welcome


  Welcome to Court Reservation System

  Today is ${today}.


  Processing time : ${processingTime}ms.


  Locale : ${pageContext.response.locale}


  ```


  ## 2-5\. 外部化区域设置敏感的文本消息


  ### 问题


  在开发国际化 Web 应用程序时，你必须以用户偏好的区域设置来显示网页。你不想为不同的区域设置创建同一页面的不同版本。


  ### 解决方案


  为了避免为不同区域设置创建页面的不同版本，你应该通过外部化区域设置敏感的文本消息，使你的网页独立于区域设置。Spring 能够通过使用消息源（必须实现 `MessageSource`
  接口）为你解析文本消息。然后，你的 JSP 文件可以使用 Spring 标签库中定义的 `<spring:message>` 标签，根据给定的代码解析消息。


  ### 工作原理


  你可以通过在 Web 应用程序上下文中注册一个类型为 `MessageSource` 的 Bean 来定义消息源。你必须将消息源的 Bean 名称设置为 `messageSource`，以便
  `DispatcherServlet` 自动检测。请注意，每个 `DispatcherServlet` 只能注册一个消息源。`ResourceBundleMessageSource`
  实现会根据不同的区域设置，从不同的资源包中解析消息。例如，你可以在 `WebConfiguration` 中注册它，以加载基本名称为 `messages` 的资源包：


  ```

  @Bean

  public MessageSource messageSource() {

  var messageSource = new ResourceBundleMessageSource();

  messageSource.setBasename("messages");

  return messageSource;

  }

  ```


  然后，你创建两个资源包，`messages.properties` 和 `messages_de.properties`，分别存储默认区域设置和德语区域设置的消息。这些资源包应放在类路径的根目录下。在项目中，合适的位置是
  `src/main/resources` 文件夹：


  ```

  welcome.title=Welcome

  welcome.message=Welcome to Court Reservation System

  ```


  ```

  welcome.title=Willkommen

  welcome.message=Willkommen zum Spielplatz-Reservierungssystem

  ```


  现在，在诸如 `welcome.jsp` 的 JSP 文件中，你可以使用 `<spring:message>` 标签根据给定的代码解析消息。此标签会根据用户当前的区域设置自动解析消息。请注意，此标签定义在
  Spring 的标签库中，因此你必须在 JSP 文件的顶部声明它：


  ```


  Today is ${today}.


  Processing time : ${processingTime}ms.


  Locale : ${pageContext.response.locale}


  ```


  在 `<spring:message>` 中，你可以指定当无法解析给定代码的消息时要输出的默认文本。


  ## 2-6\. 按名称解析视图


  ### 问题


  处理器完成请求处理后，会返回一个逻辑视图名称。在这种情况下，`DispatcherServlet` 必须将控制权委托给视图模板，以便渲染信息。你希望为 `DispatcherServlet`
  定义一个策略，使其能够根据逻辑名称解析视图。


  ### 解决方案


  在 Spring MVC 应用程序中，视图由在 Web 应用程序上下文中声明的一个或多个视图解析器 Bean 来解析。这些 Bean 必须实现 `ViewResolver`
  接口，以便 `DispatcherServlet` 自动检测它们。Spring MVC 提供了几种 `ViewResolver` 实现，供你使用不同的策略来解析视图。


  ### 工作原理




  #### 基于模板名称和位置解析视图


  解析视图的基本策略是将其直接映射到模板的名称和位置。视图解析器 `InternalResourceViewResolver` 通过 `prefix` 和 `suffix`
  声明，将每个视图名称映射到应用程序的目录。要注册 `InternalResourceViewResolver`，你可以在 Web 应用程序上下文中声明一个此类型的
  Bean：


  ```

  package com.apress.spring6recipes.court.config;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.web.servlet.view.InternalResourceViewResolver;

  @Configuration

  public class ViewResolverConfiguration {

  @Bean

  public InternalResourceViewResolver internalResourceViewResolver() {

  var viewResolver = new InternalResourceViewResolver();

  viewResolver.setPrefix("/WEB-INF/jsp/");

  viewResolver.setSuffix(".jsp");

  return viewResolver;

  }

  }

  ```


  例如，`InternalResourceViewResolver` 会按以下方式解析视图名称 `welcome` 和 `reservationQuery`：


  ```

  welcome --> /WEB-INF/jsp/welcome.jsp

  reservationQuery --> /WEB-INF/jsp/reservationQuery.jsp

  ```


  解析后的视图类型可以通过 `viewClass` 属性指定。默认情况下，如果类路径中存在 JSTL 库（即 `jstl.jar`），`InternalResourceViewResolver`
  会将视图名称解析为 `JstlView` 类型的视图对象。因此，如果你的视图是包含 JSTL 标签的 JSP 模板，则可以省略 `viewClass` 属性。


  `InternalResourceViewResolver` 很简单，但它只能解析可通过 Servlet API 的 `RequestDispatcher` 转发的内部资源视图（例如，内部
  JSP 文件或 Servlet）。至于 Spring MVC 支持的其他视图类型，你必须使用其他 `ViewResolver` 实现来解析它们。Spring 本身支持以下技术。


  表 2-1


  支持的视图技术


  | 视图技术 | ViewResolver |

  | --- | --- |

  | FreeMarker | `org.springframework.web.servlet.view.freemarker.FreeMarkerViewResolver`
  |

  | Groovy 标记 | `org.springframework.web.servlet.view.groovy.GroovyMarkupViewResolver`
  |

  | 脚本模板 (JSR-223) | `org.springframework.web.servlet.view.script.ScriptTemplateViewResolver`
  |

  | XSLT | `org.springframework.web.servlet.view.xslt.XsltViewResolver` |

  | Bean 名称 | `org.springframework.web.servlet.view.BeanNameViewResolver` |


  使用 `BeanNameViewResolver`，你可以在配置中定义视图，并由该 `ViewResolver` 进行解析。这样，你还可以添加对 PDF、Excel、Atom
  和 RSS 的支持。


  #### 使用 ViewResolverRegistry 注册 ViewResolver


  除了手动添加 Bean 并进行配置之外，另一种选择是使用 `ViewResolverRegistry` 来注册一个或多个 `ViewResolver`。这样做的好处是，对于开箱即用的支持技术（参见表
  2-1），其上提供了一些有助于配置的工厂方法。这让你无需了解具体使用哪个 `ViewResolver`：


  ```

  package com.apress.spring6recipes.court.config;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.web.servlet.config.annotation.ViewResolverRegistry;

  import org.springframework.web.servlet.config.annotation.WebMvcConfigurer;

  @Configuration

  public class ViewResolverConfiguration implements WebMvcConfigurer {

  @Override

  public void configureViewResolvers(ViewResolverRegistry registry) {

  registry.jsp()

  .prefix("/WEB-INF/jsp/")

  .suffix(".jsp");

  }

  }

  ```


  #### 重定向前缀


  如果你在 Web 应用程序上下文中配置了 `InternalResourceViewResolver`（实际上任何 `UrlBasedViewResolver`
  都支持 `redirect:` 前缀），它可以通过在视图名称中使用 `redirect:` 前缀来解析重定向视图。然后，视图名称的其余部分被视为重定向 URL。例如，视图名称
  `redirect:welcome` 会触发对相对 URL `welcome` 的重定向。你也可以在视图名称中指定一个绝对 URL。


  ## 2-7\. 视图与内容协商


  ### 问题


  你在控制器中依赖无扩展名的 URL——例如 `welcome`，而不是 `welcome.html` 或 `welcome.pdf`。你希望设计一种策略，以便为所有请求返回正确的内容和类型。


  ### 解决方案


  当收到对 Web 应用程序的请求时，该请求包含一系列属性，允许处理框架（此处为 Spring MVC）确定要返回给请求方的正确内容和类型。Spring 支持的默认策略列于表
  2-2 中。


  表 2-2


  内容协商策略


  | 策略 | 描述 | 默认启用 | 属性 |

  | --- | --- | --- | --- |

  | HTTP `Accept` 头 | 检查 HTTP 请求的 `Accept` 头以确定要使用的媒体类型 | 是 | `ignoreAcceptHeader`
  |

  | 文件/URL 扩展名 | 使用扩展名（`.pdf`、`.html` 等）来确定媒体类型 | 否 | `favorPathExtension` |

  | 参数 | 使用请求中的参数来确定媒体类型 | 否 | `favorParameter` |


  例如，如果对形如 `/reservationSummary.xml` 的 URL 发出请求，控制器能够检查扩展名并将其委托给代表 XML 视图的逻辑视图。然而，也可能出现对形如
  `/reservationSummary` 的 URL 发出请求的情况。此请求应被委托给 XML 视图还是 HTML 视图？或者可能是其他类型的视图？通过 URL
  无法判断。但是，与其为这类请求决定一个默认视图，不如检查请求的 HTTP Accept 头，以决定哪种类型的视图更合适。


  在控制器中检查 HTTP Accept 头可能是一个混乱的过程。因此，Spring MVC 通过 `ContentNegotiatingViewResolver`
  支持对头的检查，允许根据 URL 文件扩展名或 HTTP Accept 头值进行视图委托。




  ### 工作原理


  关于 Spring MVC 内容协商，你首先需要了解的是，它被配置为一个解析器，就像配方 2-6 中展示的那些一样。Spring MVC 的内容协商解析器基于
  `ContentNegotiatingViewResolver` 类。但在描述其工作原理之前，我们将先说明如何配置它并将其与其他解析器集成：


  ```

  package com.apress.spring6recipes.court.config;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.http.MediaType;

  import org.springframework.web.servlet.config.annotation.ContentNegotiationConfigurer;

  import org.springframework.web.servlet.config.annotation.ViewResolverRegistry;

  import org.springframework.web.servlet.config.annotation.WebMvcConfigurer;

  @Configuration

  public class ViewResolverConfiguration implements WebMvcConfigurer {

  @Override

  public void configureContentNegotiation(ContentNegotiationConfigurer configurer)
  {

  configurer.mediaType("html", MediaType.TEXT_HTML);

  configurer.mediaType("xls", MediaType.valueOf("application/vnd.ms-excel"));

  configurer.mediaType("pdf", MediaType.APPLICATION_PDF);

  configurer.mediaType("xml", MediaType.APPLICATION_XML);

  configurer.mediaType("json", MediaType.APPLICATION_JSON);

  configurer.favorPathExtension(true);

  }

  @Override

  public void configureViewResolvers(ViewResolverRegistry registry) {

  registry.enableContentNegotiation();

  registry.jsp("/WEB-INF/jsp/", ".jsp");

  }

  }

  ```


  首先，我们需要配置内容协商。默认配置会添加一个 `ContentNegotiationManager`，可以通过重写 `configureContentNegotiation`
  方法来配置它。通过 `mediaType` 方法，我们可以将支持的媒体类型添加到 `ContentNegotiationManager` 中。我们还启用了路径扩展，因为默认情况下它们是禁用的。


  ![](img/314861_5_En_2_Figd_HTML.gif)一个带有感叹号图标的阴影三角形。  `favorPathExtension` 已被弃用，并最终将从
  Spring MVC 中移除。这是因为无扩展名的 URL 更受青睐，同时应使用 `Accept` 头来确定返回的内容类型。


  要启用 `ContentNegotiatingViewResolver`，你还需要重写 `configureViewResolvers` 方法并调用 `enableContentNegotiation`
  方法。这将把 `ContentNegotiatingViewResolver` 设置为在所有解析器中具有最高优先级，这是使内容协商解析器正常工作所必需的。该解析器具有最高优先级的原因在于，它本身并不解析视图，而是将解析工作委托给其他视图解析器（它会自动检测这些解析器）。由于一个不解析视图的解析器可能会让人困惑，我们将通过一个示例来详细说明。


  假设一个控制器接收到对 `/reservationSummary.xml` 的请求。一旦处理方法完成，它会将控制权交给一个名为 `reservation` 的逻辑视图。此时，Spring
  MVC 的解析器开始发挥作用，其中第一个就是 `ContentNegotiatingViewResolver`，因为它具有最高优先级。


  `ContentNegotiatingViewResolver` 首先根据以下标准确定请求的媒体类型：


  如果启用了路径扩展，它会将请求路径扩展名（例如 `.html`、`.xml` 或 `.pdf`）与 `ContentNegotiationManager` Bean
  配置中 `mediaTypes` 映射指定的默认媒体类型（例如 `text/html`）进行比对。如果请求路径有扩展名但在默认的 `mediaTypes` 部分中找不到匹配项，则会尝试使用
  JavaBeans 激活框架中的 `FileTypeMap` 来确定扩展名的媒体类型。如果请求路径中没有扩展名，则使用请求的 HTTP `Accept` 头。对于对
  `/reservationSummary.xml` 发出的请求，媒体类型在步骤 1 中被确定为 `application/xml`。然而，对于像 `/reservationSummary`
  这样的 URL 发出的请求，媒体类型要到步骤 3 才能确定。


  HTTP `Accept` 头包含诸如 `Accept: text/html` 或 `Accept: application/pdf` 之类的值；这些值有助于解析器在请求
  URL 中没有扩展名的情况下，确定请求方期望的媒体类型。


  此时，`ContentNegotiatingViewResolver` 拥有一个媒体类型和一个名为 `reservation` 的逻辑视图。基于此信息，它会根据剩余解析器的顺序进行迭代，以确定哪个视图能根据检测到的媒体类型最佳匹配该逻辑名称。


  这个过程允许你拥有多个同名的逻辑视图，每个视图支持不同的媒体类型（例如 HTML、PDF 或 XLS），并由 `ContentNegotiatingViewResolver`
  解析出最佳匹配项。在这种情况下，控制器的设计可以进一步简化，因为无需硬编码创建特定媒体类型所需的逻辑视图（例如 `pdfReservation`、`xlsReservation`
  或 `htmlReservation`），而只需使用一个单一的视图（例如 `reservation`），让 `ContentNegotiatingViewResolver`
  来决定最佳匹配。


  此过程可能产生的一系列结果如下：


  *   媒体类型被确定为 `application/pdf`。如果优先级最高（顺序值较小）的解析器包含一个映射到名为 `reservation` 的逻辑视图，但该视图不支持
  `application/pdf` 类型，则不会匹配——查找过程会继续到剩余的解析器。


  *   媒体类型被确定为 `application/pdf`。匹配到优先级最高（顺序值较小）且包含映射到名为 `reservation` 的逻辑视图并支持 `application/pdf`
  的解析器。


  *   媒体类型被确定为 `text/html`。有四个解析器包含名为 `reservation` 的逻辑视图，但映射到两个优先级最高解析器的视图不支持 `text/html`。最终匹配到剩余的那个包含名为
  `reservation` 的视图映射且支持 `text/html` 的解析器。


  这种视图搜索过程会自动在应用程序中配置的所有解析器上进行。如果你不希望回退到 `ContentNegotiatingViewResolver` 之外的配置，还可以在
  `ContentNegotiatingViewResolver` Bean 中配置默认视图和解析器。


  配方 2-11 将展示一个依赖 `ContentNegotiatingViewResolver` 来确定应用程序视图的控制器。


  ## 2-8. 将异常映射到视图


  ### 问题


  当发生未知异常时，你的应用服务器通常会向用户显示令人不快的异常堆栈跟踪。你的用户与此堆栈跟踪无关，并会抱怨你的应用程序不够友好。此外，这也是一种潜在的安全风险，因为你可能会向用户暴露内部方法调用层次结构。虽然可以在
  Web 应用程序的 `web.xml` 中配置在发生 HTTP 错误或类异常时显示友好的 JSP 页面，但 Spring MVC 支持一种更健壮的方法来管理类异常的视图。


  ### 解决方案


  在 Spring MVC 应用程序中，你可以在 Web 应用程序上下文中注册一个或多个异常解析器 Bean 来解析未捕获的异常。这些 Bean 必须实现 `HandlerExceptionResolver`
  接口，以便 `DispatcherServlet` 能够自动检测到它们。Spring MVC 自带了一个简单的异常解析器，用于将每一类异常映射到一个视图。




  ### 工作原理


  假设您的预订服务因无法预订而抛出以下异常：


  ```

  package com.apress.spring6recipes.court.service;

  import java.time.LocalDate;

  public class ReservationNotAvailableException extends RuntimeException {

  public static final long serialVersionUID = 1L;

  private final String courtName;

  private final LocalDate date;

  private final int hour;

  public ReservationNotAvailableException(String courtName, LocalDate date, int hour)
  {

  this.courtName = courtName;

  this.date = date;

  this.hour = hour;

  }

  public String getCourtName() {

  return courtName;

  }

  public LocalDate getDate() {

  return date;

  }

  public int getHour() {

  return hour;

  }

  }

  ```


  要处理未捕获的异常，您可以通过实现 `HandlerExceptionResolver` 接口来编写自定义异常解析器。通常，您需要将不同类别的异常映射到不同的错误页面。Spring
  MVC 提供了异常解析器 `SimpleMappingExceptionResolver`，供您在 Web 应用程序上下文中配置异常映射。例如，您可以在配置中注册以下异常解析器：


  ```

  package com.apress.spring6recipes.court.config;

  import com.apress.spring6recipes.court.service.ReservationNotAvailableException;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.web.servlet.HandlerExceptionResolver;

  import org.springframework.web.servlet.config.annotation.WebMvcConfigurer;

  import org.springframework.web.servlet.handler.SimpleMappingExceptionResolver;

  import java.util.List;

  import java.util.Properties;

  @Configuration

  public class ErrorHandlingConfiguration implements WebMvcConfigurer {

  @Override

  public void configureHandlerExceptionResolvers(List resolvers) {

  resolvers.add(handlerExceptionResolver());

  }

  @Bean

  public HandlerExceptionResolver handlerExceptionResolver() {

  var mappings = new Properties();

  mappings.setProperty(ReservationNotAvailableException.class.getName(), "reservationNotAvailable");

  var resolver = new SimpleMappingExceptionResolver();

  resolver.setExceptionMappings(mappings);

  resolver.setDefaultErrorView("error");

  return resolver;

  }

  }

  ```


  在这个异常解析器中，您为 `ReservationNotAvailableException` 定义了逻辑视图名称 `reservationNotAvailable`。您可以使用
  `exceptionMappings` 属性添加任意数量的异常类，一直向下到更通用的异常类 `java.lang.Exception`。通过这种方式，根据异常类的类型，用户将看到与异常对应的视图。


  属性 `defaultErrorView` 用于定义一个名为 error 的默认视图，当抛出的异常类未在 `exceptionMappings` 元素中映射时，将使用该视图。


  处理相应的视图时，如果在您的 Web 应用程序上下文中配置了 `InternalResourceViewResolver`，则在无法预订时会显示以下 `reservationNotAvailable.jsp`
  页面：


  ```


  Reservation Not Available


  Your reservation for ${exception.courtName} is not available on ${exception.date}
  at ${exception.hour}:00.


  ```


  在错误页面中，可以通过变量 `${exception}` 访问异常实例，因此您可以向用户显示有关此异常的更多详细信息。


  为任何未知异常定义一个默认错误页面是一个好习惯。您可以使用属性 `defaultErrorView` 定义一个默认视图，或者将页面映射到键 `java.lang.Exception`
  作为映射的最后一项，这样如果之前没有匹配到其他条目，就会显示该页面。然后您可以按如下方式创建此视图的 JSP——`error.jsp`：


  ```


  Error


  An error has occurred. Please contact our administrator for details.


  ```


  #### 使用 @ExceptionHandler 映射异常


  除了配置 `HandlerExceptionResolver`，我们还可以使用 `@ExceptionHandler` 注解方法。它的工作方式与 `@RequestMapping`
  注解类似：


  ```

  @Controller

  @RequestMapping("/reservationForm")

  public class ReservationFormController {

  @ExceptionHandler(ReservationNotAvailableException.class)

  public String handle(ReservationNotAvailableException ex) {

  return "reservationNotAvailable";

  }

  @ExceptionHandler

  public String handleDefault(Exception e) {

  return "error";

  }

  }

  ```


  这里我们有两个使用 `@ExceptionHandler` 注解的方法。第一个用于处理特定的 `ReservationNotAvailableException`；第二个是通用的（捕获所有）异常处理方法。您也不再需要在
  WebConfiguration 中指定 `HandlerExceptionResolver`。


  使用 `@ExceptionHandler` 注解的方法可以有多种返回类型（类似于 `@RequestMapping` 方法）。这里我们只返回需要渲染的视图名称，但我们也可以返回
  `ModelAndView`、`View` 等。


  尽管使用 `@ExceptionHandler` 注解的方法非常强大且灵活，但当您将它们放在控制器中时，存在一个缺点。这些方法仅适用于它们所定义的控制器，因此如果异常发生在另一个控制器中（例如
  `WelcomeController`），这些方法将不会被调用。通用的异常处理方法必须移到单独的类中，并且该类必须使用 `@ControllerAdvice`
  注解：


  ```

  package com.apress.spring6recipes.court.web;

  import com.apress.spring6recipes.court.service.ReservationNotAvailableException;

  import org.springframework.web.bind.annotation.ControllerAdvice;

  import org.springframework.web.bind.annotation.ExceptionHandler;

  @ControllerAdvice

  public class ExceptionHandlingAdvice {

  @ExceptionHandler(ReservationNotAvailableException.class)

  public String handle(ReservationNotAvailableException ex) {

  return "reservationNotAvailable";

  }

  @ExceptionHandler

  public String handleDefault(Exception ex) {

  return "error";

  }

  }

  ```


  此类将应用于应用程序上下文中的所有控制器，因此得名 `@ControllerAdvice`。


  ## 2-9\. 使用控制器处理表单


  ### 问题


  在 Web 应用程序中，您经常需要处理表单。表单控制器必须向用户显示表单，同时处理表单提交。表单处理可能是一项复杂且多变的任务。


  ### 解决方案


  当用户与表单交互时，需要控制器支持两个操作。首先，当表单被初始请求时，它要求控制器通过 HTTP GET 请求显示表单，该请求将表单视图渲染给用户。然后，当表单提交时，会发出
  HTTP POST 请求来处理表单中数据的验证和业务处理等事项。如果表单处理成功，则向用户渲染成功视图。否则，它会再次渲染带有错误的表单视图。


  ### 工作原理


  假设您希望允许用户通过填写表单来进行球场预订。为了让您更好地了解控制器处理的数据，我们将首先介绍控制器的视图（即表单）。




  #### 创建表单视图


  让我们创建表单视图 `reservationForm.jsp`。该表单依赖于 Spring 的表单标签库，因为它简化了表单的数据绑定、错误消息的显示，以及在出现错误时重新显示用户输入的原始值：


  ```


  Reservation Form


  .error {

  color: #ff0000;

  font-weight: bold;

  }


  Court Name


  Date


  Hour


  ```


  Spring 的 `<form:form>` 声明了两个属性：`method="post"` 属性用于指示表单在提交时执行 HTTP POST 请求，以及 `modelAttribute="reservation"`
  属性用于指示表单数据绑定到名为 reservation 的模型。第一个属性你应该很熟悉，因为它用于大多数 HTML 表单。第二个属性在我们描述处理该表单的控制器时会变得更加清晰。


  请记住，`<form:form>` 标签在发送给用户之前会被渲染成标准的 HTML，因此 `modelAttribute="reservation"` 并非对浏览器有用；该属性是作为生成实际
  HTML 表单的一种工具。


  接下来，你可以找到 `<form:errors>` 标签，用于定义在表单不符合控制器设定的规则时放置错误信息的位置。属性 `path="*"` 用于指示显示所有错误——鉴于通配符
  *——而属性 `cssClass="error"` 用于指示用于显示错误的 CSS 格式化类。


  接下来，你可以找到表单的各种 `<form:input>` 标签，以及另一组对应的 `<form:errors>` 标签。这些标签利用属性 `path` 来指示表单的字段，在本例中为
  `courtName`、`date` 和 `hour`。


  `<form:input>` 标签通过使用 `path` 属性绑定到与 `modelAttribute` 对应的属性。它们向用户显示字段的原始值，该值要么是绑定的属性值，要么是由于绑定错误而被拒绝的值。它们必须用在
  `<form:form>` 标签内部，该标签定义了一个通过名称绑定到 `modelAttribute` 的表单。


  最后，你可以找到标准的 HTML 标签 `<input type="submit" />`，它生成一个“提交”按钮并触发向服务器发送数据，随后是关闭表单的 `</form:form>`
  标签。如果表单及其数据被正确处理，你需要创建一个成功视图来通知用户预约成功。下面展示的 `reservationSuccess.jsp` 就用于此目的：


  ```


  Reservation Success


  Your reservation has been made successfully.


  ```


  由于表单中提交了无效值，也可能发生错误。例如，如果日期格式无效，或者 `hour` 字段出现了字母字符，控制器会设计为拒绝这些字段值。然后控制器会为每个错误生成一系列选择性错误代码，这些代码将返回给表单视图，并放置在
  `<form:errors>` 标签内。


  例如，对于 `date` 字段输入的无效值，控制器会生成以下错误代码：


  ```

  typeMismatch.command.date

  typeMismatch.date

  typeMismatch.java.time.LocalDate

  typeMismatch

  ```


  如果你定义了 `ResourceBundleMessageSource`，可以在资源包中为相应的区域设置（例如，默认区域设置的 `messages.properties`）包含以下错误消息：


  ```

  typeMismatch.date=无效的日期格式

  typeMismatch.hour=无效的小时格式

  ```


  如果处理表单数据时发生失败，相应的错误代码及其值就是返回给用户的内容。


  现在你已经了解了与表单相关的视图结构，以及表单处理的数据，让我们来看看处理表单中提交的数据（即预约）的逻辑。


  #### 创建表单的服务处理


  这不是控制器，而是控制器用来处理表单数据的服务。首先，在 `ReservationService` 接口中定义一个 `make()` 方法：


  ```

  package com.apress.spring6recipes.court.service;

  import com.apress.spring6recipes.court.domain.Reservation;

  public interface ReservationService {

  void make(Reservation reservation) throws ReservationNotAvailableException;

  }

  ```


  然后，通过向存储预约的列表中添加一个 `Reservation` 项来实现这个 `make()` 方法。如果出现重复预约，则抛出 `ReservationNotAvailableException`：


  ```

  package com.apress.spring6recipes.court.service;

  @Service

  class InMemoryReservationService implements ReservationService {

  private final List reservations =

  Collections.synchronizedList(new ArrayList());

  @Override

  public void make(Reservation res) throws ReservationNotAvailableException {

  long cnt = reservations.stream()

  .filter((r) -> Objects.equals(r.getCourtName(), res.getCourtName()))

  .filter((r) -> Objects.equals(r.getDate(), res.getDate()))

  .filter((r) -> r.getHour() == res.getHour()).count();

  if (cnt > 0) {

  throw new ReservationNotAvailableException(res.getCourtName(), res.getDate(),

  res.getHour());

  } else {

  reservations.add(res);

  }

  }

  }

  ```


  现在你已经更好地理解了与控制器交互的两个元素——表单视图和预约服务类——让我们创建一个控制器来处理球场预约表单。




  #### 创建表单控制器


  用于处理表单的控制器，实际上使用了你在之前示例中已经用过的相同注解。那么，我们直接来看代码：


  ```

  package com.apress.spring6recipes.court.web;

  import com.apress.spring6recipes.court.domain.Reservation;

  import com.apress.spring6recipes.court.service.ReservationService;

  import org.springframework.stereotype.Controller;

  import org.springframework.ui.Model;

  import org.springframework.web.bind.annotation.GetMapping;

  import org.springframework.web.bind.annotation.ModelAttribute;

  import org.springframework.web.bind.annotation.PostMapping;

  import org.springframework.web.bind.annotation.RequestMapping;

  import org.springframework.web.bind.annotation.SessionAttributes;

  @Controller

  @RequestMapping("/reservationForm")

  @SessionAttributes("reservation")

  public class ReservationFormController {

  private final ReservationService reservationService;

  public ReservationFormController(ReservationService reservationService) {

  this.reservationService = reservationService;

  }

  @GetMapping

  public String setupForm(Model model) {

  var reservation = new Reservation();

  model.addAttribute("reservation", reservation);

  return "reservationForm";

  }

  @PostMapping

  public String submitForm(@ModelAttribute("reservation") Reservation reservation)
  {

  reservationService.make(reservation);

  return "redirect:reservationSuccess";

  }

  }

  ```


  该控制器首先使用了标准的 `@Controller` 注解，以及 `@RequestMapping` 注解，通过以下 URL 即可访问该控制器：


  ```

  http://localhost:8080/court/reservationForm

  ```


  当你在浏览器中输入此 URL 时，它会向你的 Web 应用发送一个 HTTP GET 请求。这进而会触发 `setupForm` 方法的执行，该方法根据其 `@RequestMapping`
  注解被指定用于处理此类请求。


  `setupForm` 方法定义了一个 `Model` 对象作为输入参数，该对象用于将模型数据发送到视图（即表单）。在该处理方法内部，创建了一个空的 `Reservation`
  对象，并将其作为属性添加到控制器的 `Model` 对象中。然后，控制器将执行流程返回给 `reservationForm` 视图，在此处该视图被解析为 `reservationForm.jsp`（即表单）。


  这最后一个方法最重要的方面是添加了一个空的 `Reservation` 对象。如果你分析 `reservationForm.jsp` 表单，你会注意到 `<form:form>`
  标签声明了一个属性 `modelAttribute="reservation"`。这意味着在渲染视图时，表单期望有一个名为 `reservation` 的对象可用，而这一点正是通过将其放入处理方法的
  `Model` 中来实现的。事实上，进一步检查会发现，每个 `<form:input>` 标签的 `path` 值都对应于 `Reservation` 对象的字段名。由于表单是首次加载，显然应该提供一个空的
  `Reservation` 对象。


  在分析另一个控制器处理方法之前，另一个至关重要的方面是 `@SessionAttributes("reservation")` 注解——它在控制器类的顶部声明。由于表单可能包含错误，每次后续提交时丢失用户已经提供的任何有效数据可能会带来不便。为了解决这个问题，`@SessionAttributes`
  被用来将预约字段保存到用户的会话中，这样无论表单被提交两次还是更多次，未来对预约字段的任何引用实际上都是在同一个引用上进行的。这也是在整个控制器中只创建一个 `Reservation`
  对象并将其赋值给预约字段的原因。一旦在 HTTP GET 处理方法内部创建了空的 `Reservation` 对象，所有操作都在同一个对象上进行，因为它被分配给了用户的会话。


  现在让我们把注意力转向首次提交表单。在你填写完表单字段后，提交表单会触发一个 HTTP POST 请求，该请求进而调用 `submitForm` 方法——因为该方法的
  `@RequestMapping` 值与之匹配。`submitForm` 方法声明的输入参数有三个。`@ModelAttribute("reservation")
  Reservation reservation` 用于引用预约对象。`BindingResult` 对象包含用户新提交的数据。以及 `SessionStatus`
  对象，用于在需要访问用户会话时使用。


  在此阶段，该处理方法尚未整合验证或执行对用户会话的访问，而这正是 `BindingResult` 对象和 `SessionStatus` 对象的用途——我稍后会描述并整合它们。


  该处理方法执行的唯一操作是 `reservationService.make(reservation);`。此操作使用预约对象的当前状态来调用预约服务。通常，在执行此类操作之前，会先对控制器对象进行验证。最后，请注意该处理方法返回一个名为
  `redirect:reservationSuccess` 的视图。此例中视图的实际名称是 `reservationSuccess`，它会被解析为你之前创建的
  `reservationSuccess.jsp` 页面。


  视图名称中的 `redirect:` 前缀用于避免一个称为重复表单提交的问题。


  当你在表单成功视图页面刷新网页时，你刚刚提交的表单会被再次提交。为了避免这个问题，你可以应用 post/redirect/get 设计模式，该模式建议在表单提交成功处理后重定向到另一个
  URL，而不是直接返回一个 HTML 页面。这就是在视图名称前加上 `redirect:` 前缀的目的。




  #### 初始化模型属性对象并预填充表单值


  该表单旨在让用户进行预约。然而，如果你分析一下 `Reservation` 领域类，就会发现表单仍缺少两个字段才能创建完整的预约对象。其中一个字段是 `player`
  字段，它对应一个 `Player` 对象。根据 `Player` 类定义，`Player` 对象同时包含 `name` 和 `phone` 字段。


  那么，能否将 player 字段整合到表单视图和控制器中呢？我们先来分析表单视图：


  ```

  Player Name


  Player Phone


  ```


  采用直接的方法，你可以添加两个额外的 `<form:input>` 标签，用于表示 `Player` 对象的字段。虽然这些表单声明很简单，但你也需要对控制器进行修改。回想一下，通过使用
  `<form:input>` 标签，视图期望能够访问由控制器传递的、与 `<form:input>` 标签路径值匹配的模型对象。


  尽管控制器的 HTTP GET 处理方法向最后一个视图返回了一个空的预约 `Reservation` 对象，但 `player` 属性为 `null`，因此在渲染表单时会引发异常。为了解决这个问题，你必须初始化一个空的
  `Player` 对象，并将其赋值给返回给视图的 `Reservation` 对象：


  ```

  @GetMapping

  public String setupForm(@RequestParam(required = false, value = "username")

  String username, Model model) {

  var reservation = new Reservation();

  reservation.setPlayer(new Player(username));

  model.addAttribute("reservation", reservation);

  return "reservationForm";

  }

  ```


  在这种情况下，创建空的 `Reservation` 对象后，使用 `setPlayer` 方法为其分配一个空的 `Player` 对象。此外，请注意 `Player`
  对象的创建依赖于 `username` 值。这个特定值是从 `@RequestParam` 输入值中获取的，该参数也已添加到处理方法中。通过这种方式，可以使用作为请求参数传入的特定
  `username` 值来创建 `Player` 对象，从而使表单的 `username` 字段预填充该值。


  因此，举例来说，假设对表单的请求是通过以下方式发出的：


  ```

  http://localhost:8080/court/reservationForm?username=Roger

  ```


  这使得处理方法能够提取 `username` 参数来创建 `Player` 对象，进而将表单的用户名字段预填充为 `Roger` 值。值得注意的是，`username`
  参数的 `@RequestParam` 注解使用了属性 `required=false`；这允许即使请求中不存在该参数，也能处理表单请求。


  #### 提供表单参考数据


  当请求表单控制器渲染表单视图时，它可能需要向表单提供某些类型的参考数据（例如，HTML 选择框中要显示的选项）。现在假设你希望允许用户在预订场地时选择运动类型——这是
  `Reservation` 类中最后一个未处理的字段：


  ```

  Sport Type


  ```


  `<form:select>` 标签提供了一种生成下拉列表的方式，该列表包含由控制器传递给视图的值。因此，表单将 `sportType` 字段表示为一组 HTML
  `<select>` 元素，而不是之前需要用户输入文本值的开放式字段 `<input>`。


  接下来，让我们看看控制器如何将 `sportType` 字段分配为模型属性。这个过程与之前的字段略有不同。


  首先，让我们在 `ReservationService` 接口中定义 `getAllSportTypes()` 方法，用于检索所有可用的运动类型：


  ```

  package com.apress.spring6recipes.court.service;

  import com.apress.spring6recipes.court.domain.SportType;

  import java.util.List;

  public interface ReservationService {

  List getAllSportTypes();

  }

  ```


  然后，你可以通过返回一个硬编码列表来实现此方法：


  ```

  package com.apress.spring6recipes.court.service;

  import com.apress.spring6recipes.court.domain.SportType;

  import java.util.List;

  @Service

  class InMemoryReservationService implements ReservationService {

  private static final SportType TENNIS = new SportType(1, "Tennis");

  private static final SportType SOCCER = new SportType(2, "Soccer");

  @Override

  public List getAllSportTypes() {

  return List.of(TENNIS, SOCCER);

  }

  }

  ```


  现在你已经有了一个返回硬编码 `SportType` 对象列表的实现，让我们看看控制器如何关联此列表，以便将其返回给表单视图：


  ```

  package com.apress.spring6recipes.court.web;

  import com.apress.spring6recipes.court.domain.Player;

  import com.apress.spring6recipes.court.domain.Reservation;

  import com.apress.spring6recipes.court.domain.SportType;

  import com.apress.spring6recipes.court.service.ReservationService;

  import org.springframework.stereotype.Controller;

  import org.springframework.ui.Model;

  import org.springframework.web.bind.annotation.GetMapping;

  import org.springframework.web.bind.annotation.RequestMapping;

  import org.springframework.web.bind.annotation.RequestParam;

  import org.springframework.web.bind.annotation.SessionAttributes;

  import java.util.List;

  @Controller

  @RequestMapping("/reservationForm")

  @SessionAttributes("reservation")

  public class ReservationFormController {

  private final ReservationService reservationService;

  public ReservationFormController(ReservationService reservationService) {

  this.reservationService = reservationService;

  }

  @ModelAttribute("sportTypes")

  public List populateSportTypes() {

  return reservationService.getAllSportTypes();

  }

  @GetMapping

  public String setupForm(@RequestParam(required = false, value = "username")

  String username, Model model) {

  var reservation = new Reservation();

  reservation.setPlayer(new Player(username));

  model.addAttribute("reservation", reservation);

  return "reservationForm";

  }

  }

  ```


  请注意，负责向表单视图返回空 `Reservation` 对象的 `setupForm` 处理方法保持不变。


  新增的部分，也是负责将 `SportType` 列表作为模型属性传递给表单视图的部分，是使用 `@ModelAttribute("sportTypes")` 注解修饰的方法。`@ModelAttribute`
  注解用于定义全局模型属性，这些属性可供处理方法中使用的任何返回视图访问，其方式与处理方法声明 `Model` 对象作为输入参数并分配可在返回视图中访问的属性相同。


  由于使用 `@ModelAttribute("sportTypes")` 注解修饰的方法的返回类型为 `List<SportType>`，并且调用了 `reservationService.getAllSportTypes()`，因此硬编码的
  `TENNIS` 和 `SOCCER SportType` 对象被赋值给名为 `sportTypes` 的模型属性。最后一个模型属性在表单视图中用于填充下拉列表（即
  `<form:select>` 标签）。




  #### 自定义类型的绑定属性


  当表单提交时，控制器会将表单字段值绑定到同名模型对象的属性上，在本例中即`Reservation`对象。然而，对于自定义类型的属性，除非你为其指定相应的属性编辑器，否则控制器无法进行转换。


  例如，运动类型选择字段仅提交所选运动类型的 ID——这是 HTML `<select>` 字段的运作方式。因此，你必须通过属性编辑器将此 ID 转换为`SportType`对象。首先，你需要在`ReservationService`中提供`getSportType()`方法，以便通过
  ID 检索`SportType`对象：


  ```

  package com.apress.spring6recipes.court.service;

  import com.apress.spring6recipes.court.domain.SportType;

  public interface ReservationService {

  SportType getSportType(int sportTypeId);

  }

  ```


  出于测试目的，你可以使用 switch/case 语句实现此方法：


  ```

  package com.apress.spring6recipes.court.service;

  import com.apress.spring6recipes.court.domain.SportType;

  import org.springframework.stereotype.Service;

  import java.util.List;

  @Service

  class InMemoryReservationService implements ReservationService {

  private static final SportType TENNIS = new SportType(1, "Tennis");

  private static final SportType SOCCER = new SportType(2, "Soccer");

  @Override

  public SportType getSportType(int sportTypeId) {

  return switch (sportTypeId) {

  case 1 -> TENNIS;

  case 2 -> SOCCER;

  default -> null;

  };

  }

  }

  ```


  然后，你创建`SportTypeConverter`类，将运动类型 ID 转换为`SportType`对象。此转换器需要`ReservationService`来执行查找：


  ```

  package com.apress.spring6recipes.court.domain;

  import com.apress.spring6recipes.court.service.ReservationService;

  import org.springframework.core.convert.converter.Converter;

  import org.springframework.stereotype.Component;

  @Component

  public class SportTypeConverter implements Converter {

  private final ReservationService reservationService;

  public SportTypeConverter(ReservationService reservationService) {

  this.reservationService = reservationService;

  }

  @Override

  public SportType convert(String source) {

  var sportTypeId = Integer.parseInt(source);

  return reservationService.getSportType(sportTypeId);

  }

  }

  ```


  现在你已经拥有了将表单属性绑定到`SportType`等自定义类所需的支持类`SportTypeConverter`，接下来需要将其与控制器关联。为此，我们可以使用`WebMvcConfigurer`中的`addFormatters`方法。


  通过在配置类中重写此方法，可以将自定义类型与控制器关联。这包括`SportTypeConverter`类以及`Date`等其他自定义类型。虽然我们之前没有提到`date`字段，但它与运动类型选择字段存在相同的问题。用户以文本值形式输入日期字段。为了让控制器将这些文本值分配给`Reservation`对象的日期字段，需要将日期字段与`Date`对象关联。鉴于`Date`类是
  Java 语言的一部分，无需为此创建像`SportTypeConverter`这样的特殊类。Spring 框架已经为此包含了自定义类。


  既然知道需要将`SportTypeConverter`类绑定到底层控制器，以下清单展示了配置类的修改内容：


  ```

  package com.apress.spring6recipes.court.config;

  import com.apress.spring6recipes.court.domain.SportTypeConverter;

  import org.springframework.context.annotation.ComponentScan;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.format.FormatterRegistry;

  import org.springframework.web.servlet.config.annotation.EnableWebMvc;

  import org.springframework.web.servlet.config.annotation.WebMvcConfigurer;

  @Configuration

  @ComponentScan("com.apress.spring6recipes.court")

  @EnableWebMvc

  public class CourtConfiguration implements WebMvcConfigurer {

  private final SportTypeConverter sportTypeConverter;

  public CourtConfiguration(SportTypeConverter sportTypeConverter) {

  this.sportTypeConverter = sportTypeConverter;

  }

  @Override

  public void addFormatters(FormatterRegistry registry) {

  registry.addConverter(sportTypeConverter);

  }

  }

  ```


  最后一个类中唯一的字段是`sportTypeConverter`，用于访问应用程序的`SportTypeConverter` bean。接下来，你可以看到用于绑定`SportTypeConverter`类的`addFormatters`方法。该方法属于`FormatterRegistry`对象，该对象作为输入参数传递给`addFormatters`方法。通过这种方式，每个基于注解的控制器（即使用@Controller
  注解的类）都可以在其处理方法中访问相同的自定义转换器和格式化器。




  #### 验证表单数据


  当表单提交时，标准做法是在提交成功之前验证用户提供的数据。Spring MVC 通过实现 `Validator` 接口的验证器对象来支持验证。你可以编写以下验证器来检查必填表单字段是否已填写，以及预约时间在节假日和工作日是否有效：


  ```

  package com.apress.spring6recipes.court.domain;

  import org.springframework.stereotype.Component;

  import org.springframework.validation.Errors;

  import org.springframework.validation.ValidationUtils;

  import org.springframework.validation.Validator;

  import java.time.DayOfWeek;

  @Component

  public class ReservationValidator implements Validator {

  @Override

  public boolean supports(Class clazz) {

  return Reservation.class.isAssignableFrom(clazz);

  }

  @Override

  public void validate(Object target, Errors errors) {

  ValidationUtils.rejectIfEmptyOrWhitespace(errors, "courtName", "required.courtName",
  "Court name is required.");

  ValidationUtils.rejectIfEmpty(errors, "date", "required.date", "Date is required.");

  ValidationUtils.rejectIfEmpty(errors, "hour", "required.hour", "Hour is required.");

  ValidationUtils.rejectIfEmptyOrWhitespace(errors, "player.name", "required.playerName",

  "Player name is required.");

  ValidationUtils.rejectIfEmpty(errors, "sportType", "required.sportType", "Sport
  type is required.");

  var reservation = (Reservation) target;

  var date = reservation.getDate();

  var hour = reservation.getHour();

  if (date != null) {

  if (date.getDayOfWeek() == DayOfWeek.SUNDAY) {

  if (hour  22) {

  errors.reject("invalid.holidayHour", "Invalid holiday hour.");

  }

  } else {

  if (hour  21) {

  errors.reject("invalid.weekdayHour", "Invalid weekday hour.");

  }

  }

  }

  }

  }

  ```


  在这个验证器中，你使用了 `ValidationUtils` 类中的工具方法，例如 `rejectIfEmptyOrWhitespace()` 和 `rejectIfEmpty()`，来验证必填表单字段。如果这些表单字段中的任何一个为空，这些方法将创建一个字段错误并将其绑定到该字段。这些方法的第二个参数是属性名称，而第三个和第四个参数分别是错误代码和默认错误消息。


  你还需要检查预约时间在节假日和工作日是否有效。如果无效，应使用 `reject()` 方法创建一个对象错误，并将其绑定到预约对象，而不是某个字段。


  由于验证器类使用了 `@Component` 注解进行标注，Spring 会尝试根据类名将该类实例化为一个 Bean，在本例中为 `reservationValidator`。


  由于验证器在验证过程中可能会产生错误，因此你应该为错误代码定义消息，以便向用户显示。如果你定义了 `ResourceBundleMessageSource`，则可以在资源包中为相应的区域设置（例如，默认区域设置的
  `messages.properties`）包含以下错误消息：


  ```

  required.courtName=Court name is required

  required.date=Date is required

  required.hour=Hour is required

  required.playerName=Player name is required

  required.sportType=Sport type is required

  invalid.holidayHour=Invalid holiday hour

  invalid.weekdayHour=Invalid weekday hour

  ```


  要应用此验证器，你需要对控制器进行以下修改：


  ```

  package com.apress.spring6recipes.court.web;

  import com.apress.spring6recipes.court.domain.Reservation;

  import com.apress.spring6recipes.court.domain.ReservationValidator;

  import org.springframework.stereotype.Controller;

  import org.springframework.ui.Model;

  import org.springframework.validation.BindingResult;

  import org.springframework.validation.annotation.Validated;

  import org.springframework.web.bind.WebDataBinder;

  import org.springframework.web.bind.annotation.GetMapping;

  import org.springframework.web.bind.annotation.InitBinder;

  import org.springframework.web.bind.annotation.ModelAttribute;

  import org.springframework.web.bind.annotation.PostMapping;

  import org.springframework.web.bind.annotation.RequestMapping;

  import org.springframework.web.bind.annotation.RequestParam;

  import org.springframework.web.bind.annotation.SessionAttributes;

  import org.springframework.web.bind.support.SessionStatus;

  import java.util.List;

  @Controller

  @RequestMapping("/reservationForm")

  public class ReservationFormController {

  private final ReservationService reservationService;

  private final ReservationValidator reservationValidator;

  public ReservationFormController(ReservationService reservationService,

  ReservationValidator reservationValidator) {

  this.reservationService = reservationService;

  this.reservationValidator = reservationValidator;

  }

  @PostMapping

  public String submitForm(@ModelAttribute("reservation") @Validated

  Reservation reservation, BindingResult result,

  SessionStatus status) {

  if (result.hasErrors()) {

  return "reservationForm";

  } else {

  reservationService.make(reservation);

  return "redirect:reservationSuccess";

  }

  }

  @InitBinder

  public void initBinder(WebDataBinder binder) {

  binder.setValidator(reservationValidator);

  }

  }

  ```


  对控制器的第一个新增内容是 `ReservationValidator` 字段，它使控制器能够访问验证器 Bean 的实例。


  下一个修改发生在 HTTP POST 处理方法中，该方法在用户提交表单时始终被调用。在 `@ModelAttribute` 注解旁边，现在有一个 `@Validated`
  注解；该注解会触发对象的验证。验证之后，`BindingResult` 参数对象包含验证过程的结果。因此，接下来会根据 `result.hasErrors()`
  的值进行条件判断。如果验证类检测到错误，则该值为 `true`。


  如果在验证过程中检测到错误，处理方法会返回视图 `reservationForm`，该视图对应同一个表单，以便用户可以重新提交信息。如果在验证过程中未检测到错误，则会调用
  `reservationService.make(reservation);` 来执行预约，然后重定向到成功视图 `reservationSuccess`。


  验证器的注册是在带有 `@InitBinder` 注解的方法中完成的。验证器被设置在 `WebDataBinder` 上，以便在绑定后使用。要注册验证器，需要使用
  `setValidator` 方法。你也可以使用 `addValidators` 方法注册多个验证器；该方法接受一个可变参数，用于传入一个或多个 `Validator`
  实例。


  ![](img/314861_5_En_2_Fige_HTML.gif)一个带阴影圆圈的字母 i 图标，代表信息符号。 `WebDataBinder` 也可用于注册额外的
  `PropertyEditor`、`Converter` 和 `Formatter` 实例，以进行类型转换。这可以替代注册全局的 PropertyEditor、Converter
  或 Formatter。




  #### 使控制器会话数据过期


  为了支持表单可能被多次提交且不会丢失用户在提交之间提供的数据，控制器依赖于使用`@SessionAttributes`注解。通过这样做，以`Reservation`对象表示的预订字段的引用会在请求之间保存。


  然而，一旦表单成功提交并完成预订，就没有必要在用户的会话中保留`Reservation`对象了。实际上，如果用户在短时间内重新访问表单，若不及时移除，旧`Reservation`对象的残留数据可能会重新出现。


  使用`@SessionAttributes`注解分配的值可以通过`SessionStatus`对象移除，该对象可作为输入参数传递给处理器方法。以下清单展示了如何使控制器的会话数据过期：


  ```

  package com.apress.spring6recipes.court.web;

  import com.apress.spring6recipes.court.domain.ReservationValidator;

  import org.springframework.stereotype.Controller;

  import org.springframework.ui.Model;

  import org.springframework.validation.BindingResult;

  import org.springframework.validation.annotation.Validated;

  import org.springframework.web.bind.WebDataBinder;

  import org.springframework.web.bind.annotation.GetMapping;

  import org.springframework.web.bind.annotation.InitBinder;

  import org.springframework.web.bind.annotation.ModelAttribute;

  import org.springframework.web.bind.annotation.PostMapping;

  import org.springframework.web.bind.annotation.RequestMapping;

  import org.springframework.web.bind.annotation.RequestParam;

  import org.springframework.web.bind.annotation.SessionAttributes;

  import org.springframework.web.bind.support.SessionStatus;

  import java.util.List;

  @Controller

  @RequestMapping("/reservationForm")

  @SessionAttributes("reservation")

  public class ReservationFormController {

  private final ReservationService reservationService;

  private final ReservationValidator reservationValidator;

  public ReservationFormController(ReservationService reservationService,

  ReservationValidator reservationValidator) {

  this.reservationService = reservationService;

  this.reservationValidator = reservationValidator;

  }

  }

  @PostMapping

  public String submitForm(@ModelAttribute("reservation") @Validated

  Reservation reservation, BindingResult result,

  SessionStatus status) {

  if (result.hasErrors()) {

  return "reservationForm";

  } else {

  reservationService.make(reservation);

  status.setComplete();

  return "redirect:reservationSuccess";

  }

  }

  @InitBinder

  public void initBinder(WebDataBinder binder) {

  binder.setValidator(reservationValidator);

  }

  }

  ```


  一旦处理器方法通过调用`reservationService.make(reservation);`执行预订，并在用户被重定向到成功页面之前，这正是使控制器会话数据过期的理想时机。这通过调用`SessionStatus`对象的`setComplete()`方法实现。就是这么简单。


  ## 2-10\. 使用注解进行 Bean 验证（Jakarta Bean Validation API）


  ### 问题


  你希望在使用基于[Jakarta Bean Validation API](https://jakarta.ee/specifications/bean-validation/)的注解的
  Web 应用程序中验证 Java Bean。


  ### 解决方案


  Bean Validation 是一项规范，其目标是通过注解标准化 Java Bean 的验证。


  在前面的示例中，你看到了 Spring 框架如何支持一种临时技术来验证 Bean。这要求你扩展 Spring 框架的某个类，为特定类型的 Java Bean 创建验证器类。


  该标准的目标是直接在 Java Bean 类中使用注解。这样，验证规则可以直接指定在它们要验证的代码中，而不是像之前使用 Spring 框架类那样在单独的类中创建验证规则。




  ### 工作原理


  首先，你需要使用必要的注解来修饰一个 Java Bean。要使用这些注解，需要在类路径中同时包含该 API 及其实现。最常用的是 Hibernate Validator
  项目，它也是该 API 的参考实现。


  *Jakarta Bean Validation 的 Gradle 依赖*


  ```

  implementation group: ''jakarta.validation'', name: ''jakarta.validation-api'',
  version: ''3.0.2''

  runtimeOnly group: ''org.hibernate.validator'', name: ''hibernate-validator'', version:
  ''8.0.0.Final''

  ```


  *Jakarta Bean Validation 的 Maven 依赖*


  ```

  jakarta.validation

  jakarta.validation-api

  3.0.2


  org.hibernate.validation

  hibernate-validator

  8.0.0.Final

  runtime


  ```


  以下清单展示了（部分）用于球场预约应用程序的 `Reservation` 领域类，该类使用了 Jakarta Bean Validation 注解进行修饰：


  ```

  package com.apress.spring6recipes.court.domain;

  import jakarta.validation.Valid;

  import jakarta.validation.constraints.Max;

  import jakarta.validation.constraints.Min;

  import jakarta.validation.constraints.NotNull;

  import jakarta.validation.constraints.Size;

  import java.time.LocalDate;

  public class Reservation {

  @NotNull

  @Size(min = 4)

  private String courtName;

  @NotNull

  private LocalDate date;

  @Min(8)

  @Max(22)

  private int hour;

  @Valid

  private Player player;

  @NotNull

  private SportType sportType;

  }

  ```


  `courtName` 字段被分配了两个注解：`@NotNull` 注解表示该字段不能为空，`@Size` 注解用于表示该字段至少需要包含四个字符。


  `date` 和 `sportType` 字段使用 `@NotNull` 注解，因为这些字段是必填项。


  `hour` 字段使用 `@Min` 和 `@Max` 注解，因为它们是 `hour` 字段的下限和上限。


  `Player` 领域类中的两个字段都使用了 `@NotNull` 注解；为了同时触发相关对象的验证，我们使用 `@Valid` 对其进行了注解。


  现在你已经了解了如何使用 Jakarta Bean Validation 的注解来修饰 Java Bean 类，接下来让我们看看这些验证器注解是如何在控制器中生效的：


  ```

  package com.apress.spring6recipes.court.web;

  import jakarta.validation.Valid;

  import org.springframework.stereotype.Controller;

  import org.springframework.ui.Model;

  import org.springframework.validation.BindingResult;

  import org.springframework.web.bind.annotation.GetMapping;

  import org.springframework.web.bind.annotation.ModelAttribute;

  import org.springframework.web.bind.annotation.PostMapping;

  import org.springframework.web.bind.annotation.RequestMapping;

  import org.springframework.web.bind.annotation.RequestParam;

  import org.springframework.web.bind.annotation.SessionAttributes;

  import org.springframework.web.bind.support.SessionStatus;

  @Controller

  @RequestMapping("/reservationForm")

  @SessionAttributes("reservation")

  public class ReservationFormController {

  private final ReservationService reservationService;

  public ReservationFormController(ReservationService reservationService) {

  this.reservationService = reservationService;

  }

  @PostMapping

  public String submitForm(@ModelAttribute("reservation") @Valid

  Reservation reservation, BindingResult result,

  SessionStatus status) {

  if (result.hasErrors()) {

  return "reservationForm";

  } else {

  reservationService.make(reservation);

  status.setComplete();

  return "redirect:reservationSuccess";

  }

  }

  }

  ```


  该控制器与配方 2-9 中的控制器几乎相同。唯一的区别是缺少了 `@InitBinder` 注解的方法。如果类路径中存在 `jakarta.validation.Validator`，Spring
  MVC 会自动检测到它。我们在类路径中添加了 `hibernate-validator`，它就是一个实现。


  接下来，你可以找到控制器的 HTTP POST 处理方法，用于处理用户数据的提交。由于该处理方法期望接收一个 `Reservation` 对象的实例（你已经用
  JSR-303 注解对其进行了修饰），因此可以验证其数据。


  `submitForm` 方法的其余部分与配方 2-9 完全相同。


  ## 2-11. 创建 Excel 和 PDF 视图


  ### 问题


  尽管 HTML 是显示 Web 内容最常用的方法，但有时你的用户可能希望以 Excel 或 PDF 格式从 Web 应用程序中导出内容。在 Java 中，有几个库可以帮助生成
  Excel 和 PDF 文件。然而，要在 Web 应用程序中直接使用这些库，你需要在后台生成文件，并以二进制附件的形式返回给用户。为此，你必须处理 HTTP 响应头和输出流。


  ### 解决方案


  Spring 将 Excel 和 PDF 文件的生成集成到了其 MVC 框架中。你可以将 Excel 和 PDF 文件视为特殊类型的视图，因此可以在控制器中一致地处理
  Web 请求，并将数据添加到模型中，以便传递给 Excel 和 PDF 视图。这样，你就不需要处理 HTTP 响应头和输出流了。Spring MVC 支持使用
  [Apache POI 库](https://poi.apache.org/) 生成 Excel 文件。相应的视图类是 `AbstractXlsView`、`AbstractXlsxView`
  和 `AbstractXlsxStreamingView`。PDF 文件由 [iText API](https://itext.com/) 生成，相应的视图类是
  `AbstractPdfView`。




  ### 工作原理


  假设您的用户希望生成某一天的预约摘要报告。他们希望报告能以 Excel、PDF 或基本 HTML 格式生成。对于此报告生成功能，您需要在服务层声明一个方法，该方法返回指定日期的所有预约：


  ```

  package com.apress.spring6recipes.court.service;

  import com.apress.spring6recipes.court.domain.Reservation;

  import java.time.LocalDate;

  import java.util.List;

  public interface ReservationService {

  List findByDate(LocalDate summaryDate);

  }

  ```


  然后，通过遍历所有已创建的预约，为该方法提供一个简单的实现：


  ```

  package com.apress.spring6recipes.court.service;

  import com.apress.spring6recipes.court.domain.Reservation;

  import java.time.LocalDate;

  import java.util.Objects;

  import java.util.stream.Collectors;

  @Service

  class InMemoryReservationService implements ReservationService {

  @Override

  public List findByDate(LocalDate summaryDate) {

  return reservations.stream()

  .filter( (r) -> Objects.equals(r.getDate(), summaryDate))

  }

  ```


  现在，您可以编写一个简单的控制器，从 URL 中获取日期参数。日期参数被格式化为日期对象，并传递给服务层进行预约查询。该控制器依赖于配方 2-7 中描述的内容协商解析器；因此，控制器返回单个逻辑视图，并让解析器决定报告应以
  Excel、PDF 还是默认的 HTML 网页格式生成：


  ```

  package com.apress.spring6recipes.court.web;

  import com.apress.spring6recipes.court.service.ReservationService;

  import org.springframework.format.annotation.DateTimeFormat;

  import org.springframework.stereotype.Controller;

  import org.springframework.ui.Model;

  import org.springframework.web.bind.ServletRequestBindingException;

  import org.springframework.web.bind.annotation.ExceptionHandler;

  import org.springframework.web.bind.annotation.RequestMapping;

  import org.springframework.web.bind.annotation.RequestMethod;

  import org.springframework.web.bind.annotation.RequestParam;

  import java.text.ParseException;

  import java.time.LocalDate;

  @Controller

  @RequestMapping("/reservationSummary*")

  public class ReservationSummaryController {

  private final ReservationService reservationService;

  public ReservationSummaryController(ReservationService reservationService) {

  this.reservationService = reservationService;

  }

  @RequestMapping(method = RequestMethod.GET)

  public String generateSummary(

  @RequestParam(value = "date") @DateTimeFormat(pattern = "yyyy-MM-dd") LocalDate
  selectedDate,

  Model model) {

  var reservations = reservationService.findByDate(selectedDate);

  model.addAttribute("reservations", reservations);

  return "reservationSummary";

  }

  @ExceptionHandler

  public void handle(ServletRequestBindingException ex) {

  if (ex.getRootCause() instanceof ParseException) {

  throw new ReservationWebException("预约摘要的日期格式无效", ex);

  }

  }

  }

  ```


  该控制器仅包含一个默认的 HTTP GET 处理方法。该方法调用 `ReservationService` 上的 `findByDate` 方法，以获取该日期的
  `Reservation` 对象列表。您还可以看到一个 `@ExceptionHandler`，用于处理日期参数中的错误。如果 `LocalDate` 的解析失败，则会抛出一个名为
  `ReservationWebException` 的自定义异常。


  如果没有引发错误，`Reservation` 列表将被放入控制器的 `Model` 对象中。完成后，该方法将控制权返回给 `reservationSummary`
  视图。


  请注意，尽管控制器支持 PDF、XLS 和 HTML 视图，但它只返回单个视图。这得益于 `ContentNegotiatingViewResolver`，它根据这个单一的视图名称决定使用多个视图中的哪一个。有关此解析器的更多信息，请参阅配方
  2-7。


  #### 创建 Excel 视图


  可以通过扩展 `AbstractXlsView` 或 `AbstractXlsxView` 类来创建 Excel 视图。这里以 `AbstractXlsxView`
  为例。在 `buildExcelDocument`() 方法中，您可以访问从控制器传递过来的模型以及一个预先创建的 Excel 工作簿。您的任务是用模型中的数据填充工作簿。


  ![](img/314861_5_En_2_Figf_HTML.gif)一个带阴影圆圈的字母 i 图标表示信息符号。 要在 Web 应用程序中使用 Apache
  POI 生成 Excel 文件，您必须在 CLASSPATH 中包含 Apache POI 依赖项。


  *Apache POI 的 Gradle 依赖项*


  `implementation group: ''org.apache.poi'', name: ''poi-ooxml'', version: ''5.2.3''`


  *Apache POI 的 Maven 依赖项*


  **<dependency>**


    **<groupId>**`org.apache.poi`**</groupId>**


    **<artifactId>**`poi-ooxml`**</artifactId>**


    **<version>**`5.2.3`**</version>**


  **</dependency>**


  ```

  package com.apress.spring6recipes.court.web.view;

  import com.apress.spring6recipes.court.domain.Reservation;

  import jakarta.servlet.http.HttpServletRequest;

  import jakarta.servlet.http.HttpServletResponse;

  import org.apache.poi.ss.usermodel.Sheet;

  import org.apache.poi.ss.usermodel.Workbook;

  import org.springframework.web.servlet.view.document.AbstractXlsxView;

  import java.time.format.DateTimeFormatter;

  import java.util.List;

  import java.util.Map;

  public class ExcelReservationSummary extends AbstractXlsxView {

  private static final DateTimeFormatter DATE_FORMAT = DateTimeFormatter.ofPattern("yyyy-MM-dd");

  @Override

  protected void buildExcelDocument(Map model, Workbook workbook,

  HttpServletRequest request, HttpServletResponse response) {

  @SuppressWarnings({ "unchecked" })

  var reservations = (List) model.get("reservations");

  var sheet = workbook.createSheet();

  addHeaderRow(sheet);

  reservations.forEach(reservation -> createRow(sheet, reservation));

  }

  private void addHeaderRow(Sheet sheet) {

  var header = sheet.createRow(0);

  header.createCell(0).setCellValue("场地名称");

  header.createCell(1).setCellValue("日期");

  header.createCell(2).setCellValue("小时");

  header.createCell(3).setCellValue("玩家姓名");

  header.createCell(4).setCellValue("玩家电话");

  }

  private void createRow(Sheet sheet, Reservation reservation) {

  var row = sheet.createRow(sheet.getLastRowNum() + 1);

  row.createCell(0).setCellValue(reservation.getCourtName());

  row.createCell(1).setCellValue(DATE_FORMAT.format(reservation.getDate()));

  row.createCell(2).setCellValue(reservation.getHour());

  row.createCell(3).setCellValue(reservation.getPlayer().getName());

  row.createCell(4).setCellValue(reservation.getPlayer().getPhone());

  }

  }

  ```


  在前面的 Excel 视图中，您首先在工作簿中创建一个工作表。在此工作表中，您在第一行显示此报告的标题。然后，您遍历预约列表，为每个预约创建一行。


  由于您在控制器中配置了 `@RequestMapping("/reservationSummary*")`，并且处理方法需要日期作为请求参数，因此您可以通过以下
  URL 访问此 Excel 视图：


  `http://localhost:8080/court/reservationSummary.xlsx?date=2022-01-14`




  #### 创建 PDF 视图


  PDF 视图通过扩展 `AbstractPdfView` 类来创建。在 `buildPdfDocument()` 方法中，你可以访问从控制器传递过来的模型，以及一个预先创建的
  PDF 文档。你的任务是用模型中的数据填充该文档。


  ![](img/314861_5_En_2_Figg_HTML.gif)一个带阴影圆圈内的字母 i 图标，代表信息符号。 要在 Web 应用程序中使用 iText
  生成 PDF 文件，你必须在 CLASSPATH 中包含 iText 或 LibrePDF 库。


  *OpenPDF 的 Gradle 依赖*


  `implementation group: ''com.github.librepdf'', name: ''openpdf'', version: ''1.3.30''`


  *OpenPDF 的 Maven 依赖*


  **<dependency>**


    **<groupId>**`com.github.librepdf`**</groupId>**


    **<artifactId>**`openpdf`**</artifactId>**


    **<version>**`1.3.30`**</version>**


  **</dependency>**


  ```

  package com.apress.spring6recipes.court.web.view;

  import com.apress.spring6recipes.court.domain.Reservation;

  import com.lowagie.text.BadElementException;

  import com.lowagie.text.Document;

  import com.lowagie.text.Table;

  import com.lowagie.text.pdf.PdfWriter;

  import org.springframework.web.servlet.view.document.AbstractPdfView;

  import jakarta.servlet.http.HttpServletRequest;

  import jakarta.servlet.http.HttpServletResponse;

  import java.time.format.DateTimeFormatter;

  import java.util.List;

  import java.util.Map;

  public class PdfReservationSummary extends AbstractPdfView {

  private static final DateTimeFormatter DATE_FORMAT = DateTimeFormatter.ISO_LOCAL_DATE;

  @Override

  protected void buildPdfDocument(Map model, Document document,

  PdfWriter writer, HttpServletRequest request,

  HttpServletResponse response) {

  @SuppressWarnings("unchecked")

  var reservations = (List) model.get("reservations");

  var table = new Table(5);

  addTableHeader(table);

  reservations.forEach(reservation -> addContent(table, reservation));

  document.add(table);

  }

  private void addContent(Table tab, Reservation res) throws BadElementException {

  tab.addCell(res.getCourtName());

  tab.addCell(DATE_FORMAT.format(res.getDate()));

  tab.addCell(Integer.toString(res.getHour()));

  tab.addCell(res.getPlayer().getName());

  tab.addCell(res.getPlayer().getPhone());

  }

  private void addTableHeader(Table table) throws BadElementException {

  table.addCell("Court Name");

  table.addCell("Date");

  table.addCell("Hour");

  table.addCell("Player Name");

  table.addCell("Player Phone");

  }

  }

  ```


  由于你在控制器中配置了 `@RequestMapping("/reservationSummary*")`，并且处理器方法需要将日期作为请求参数，你可以通过以下
  URL 访问此 PDF 视图：


  ```

  http://localhost:8080/court/reservationSummary.pdf?date=2022-10-14

  ```


  #### 为 Excel 和 PDF 视图创建解析器


  在配方 2-6 中，你学习了将逻辑视图名称解析为特定视图实现的不同策略。其中一种策略是通过 bean 名称解析视图。`ContentNegotiatingViewResolver`
  有一个小技巧，可以针对不同的内容类型解析多个同名的视图。它会尝试使用添加了前缀的名称来解析视图。因此，在我们的案例中，它将尝试解析 `reservationSummary.xls`
  或 `reservationSummary.pdf`。我们需要确保已配置 `BeanNameViewResolver`，并且在 `ApplicationContext`
  中使用正确的名称注册了这两个视图。


  这导致了如下列表所示的配置：


  ```

  package com.apress.spring6recipes.court.config;

  import com.apress.spring6recipes.court.web.view.ExcelReservationSummary;

  import com.apress.spring6recipes.court.web.view.PdfReservationSummary;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.http.MediaType;

  import org.springframework.web.servlet.config.annotation.ContentNegotiationConfigurer;

  import org.springframework.web.servlet.config.annotation.ViewResolverRegistry;

  import org.springframework.web.servlet.config.annotation.WebMvcConfigurer;

  import org.springframework.web.servlet.view.BeanNameViewResolver;

  @Configuration

  public class ViewResolverConfiguration implements WebMvcConfigurer {

  public static final MediaType APPLICATION_EXCEL = MediaType.valueOf("application/vnd.ms-excel");

  @Override

  public void configureContentNegotiation(ContentNegotiationConfigurer configurer)
  {

  configurer.mediaType("html", MediaType.TEXT_HTML);

  configurer.mediaType("pdf", MediaType.APPLICATION_PDF);

  configurer.mediaType("xls", APPLICATION_EXCEL);

  configurer.favorPathExtension(true);

  }

  @Override

  public void configureViewResolvers(ViewResolverRegistry registry) {

  registry.enableContentNegotiation();

  registry.jsp("/WEB-INF/jsp/", ".jsp");

  registry.viewResolver(new BeanNameViewResolver());

  }

  @Bean(name = "reservationSummary.pdf")

  public PdfReservationSummary pdfReservationSummaryView() {

  return new PdfReservationSummary();

  }

  @Bean(name = "reservationSummary.xls")

  public ExcelReservationSummary excelReservationSummaryView() {

  return new ExcelReservationSummary();

  }

  }

  ```


  要请求 PDF 或 XLS 文件，你必须传递正确的 `Accept` 头（`application/pdf` 或 `application/vnd.ms-excel`）。然而，在不借助
  JavaScript 的浏览器中，这很难实现。使用 cURL 或 HTTPie 等工具则相当容易。也可以选择基于 URL 路径启用内容协商，但不推荐这样做。要启用，请将
  `ContentNegotiationConfigurer` 上的 `favorPathExtension` 属性设置为 `true`：


  ```

  $ http http://localhost:8080/court/reservationSummary.pdf date==2022-10-18 Accept:application/pdf

  ```


  现在，当请求 PDF 或 XLS 文件时，它将解析为正确的视图，并渲染 PDF 或 Excel 文档。




  #### 创建基于日期的 PDF 和 XLS 文件名


  浏览器应向用户弹出提示，例如“另存为 reservationSummary.pdf？”或“另存为 reservationSummary.xls？”。此约定基于用户请求资源的文件类型。然而，考虑到用户还在
  URL 中提供了日期，一个很好的功能是可以自动弹出“另存为 ReservationSummary_2022_10_24.xlsx？”或“另存为 ReservationSummary_2022_10_14.pdf？”这样的提示。这可以通过应用一个拦截器来重写返回的
  URL 来实现。以下清单展示了这个拦截器：


  ```

  package com.apress.spring6recipes.court.web;

  import jakarta.servlet.http.HttpServletRequest;

  import jakarta.servlet.http.HttpServletResponse;

  import org.springframework.web.servlet.HandlerInterceptor;

  import org.springframework.web.servlet.ModelAndView;

  public class ExtensionInterceptor implements HandlerInterceptor {

  public void postHandle(HttpServletRequest request, HttpServletResponse response,

  Object handler, ModelAndView modelAndView) throws Exception {

  String reportName = null;

  var reportDate = request.getParameter("date").replace("-", "_");

  var path = request.getServletPath();

  if (path.endsWith(".pdf")) {

  reportName = "ReservationSummary_" + reportDate + ".pdf";

  } else if (path.endsWith(".xlsx")) {

  reportName = "ReservationSummary_" + reportDate + ".xlsx";

  }

  if (reportName != null) {

  response.setHeader("Content-Disposition", "attachment; filename=" + reportName);

  }

  }

  }

  ```


  该拦截器会提取整个 URL，如果它包含 `.pdf` 或 `.xlsx` 扩展名。如果检测到此类扩展名，它会以 `ReservationSummary_<report_date>.<.pdf|.xlsx>`
  的形式为返回的文件名创建一个值。为了确保用户收到这种形式的下载提示，HTTP 头 `Content-Disposition` 会被设置为这种文件名格式。


  为了部署此拦截器，并使其仅应用于负责生成 PDF 和 XLS 文件的控制器对应的 URL，我们建议您查阅配方 2-3，其中包含了此特定配置以及关于拦截器类的更多细节。


  在拦截器中进行内容协商和设置 HTTP 头


  尽管此应用程序使用 `ContentNegotiatingViewResolver` 来选择适当的视图，但修改返回 URL 的过程超出了视图解析器的范围。因此，有必要使用拦截器来手动检查请求扩展名，并设置必要的
  HTTP 头来修改传出的 URL。


  ## 2-12. 使用控制器进行异步请求处理


  ### 问题


  为了减少 Servlet 容器的负载，您希望异步处理请求。


  ### 解决方案


  当请求到来时，它会被同步处理，这会阻塞 HTTP 请求处理线程。您可以使用像 `Callable` 或 `DeferredResult` 这样的异步返回类型来解除该线程的阻塞。响应保持打开状态，并且可以写入。当某个调用需要一些时间才能完成时，这非常有用，您可以在后台处理它，而不是阻塞线程，并在完成后向用户返回一个值。


  ### 工作原理


  #### 编写异步控制器


  编写一个控制器并让它异步处理请求，只需更改控制器处理方法的返回类型即可。假设对 `ReserverationService.make` 的调用需要相当长的时间，但我们不想因此锁定服务器：


  ```

  package com.apress.spring6recipes.court.web;

  import com.apress.spring6recipes.court.domain.Player;

  import com.apress.spring6recipes.court.domain.Reservation;

  import com.apress.spring6recipes.court.domain.SportType;

  import com.apress.spring6recipes.court.service.ReservationService;

  import com.apress.spring6recipes.utils.Utils;

  import jakarta.validation.Valid;

  import org.springframework.stereotype.Controller;

  import org.springframework.ui.Model;

  import org.springframework.validation.BindingResult;

  import org.springframework.web.bind.annotation.GetMapping;

  import org.springframework.web.bind.annotation.ModelAttribute;

  import org.springframework.web.bind.annotation.PostMapping;

  import org.springframework.web.bind.annotation.RequestMapping;

  import org.springframework.web.bind.annotation.RequestParam;

  import org.springframework.web.bind.annotation.SessionAttributes;

  import org.springframework.web.bind.support.SessionStatus;

  import java.time.Duration;

  import java.util.List;

  import java.util.concurrent.Callable;

  import java.util.concurrent.ThreadLocalRandom;

  @Controller

  @RequestMapping("/reservationForm")

  @SessionAttributes("reservation")

  public class ReservationFormController {

  @PostMapping

  public Callable submitForm(@ModelAttribute("reservation") @Valid

  Reservation reservation,

  BindingResult result, SessionStatus status) {

  return () -> {

  if (result.hasErrors()) {

  return "reservationForm";

  } else {

  // 模拟一个慢速服务调用

  Utils.sleep(Duration.ofMillis(ThreadLocalRandom.current().nextInt(1000)));

  reservationService.make(reservation);

  status.setComplete();

  return "redirect:reservationSuccess";

  }

  };

  }

  }

  ```


  如果您查看 `submitForm` 方法，它现在返回一个 `Callable<String>`，而不是直接返回一个 `String`。在新构建的 `Callable<String>`
  内部，有一个 `Thread.sleep()` 来模拟在调用 `make` 方法之前的延迟。


  Spring MVC 支持多种将以异步方式处理的返回类型：


  *   `java.util.concurrent.Callable`


  *   `org.springframework.web.context.request.async.DeferredResult;`


  *   `java.util.concurrent.CompletionStage / java.util.concurrent.CompletableFuture`


  *   `org.springframework.web.context.request.async.WebAsyncTask`


  *   来自 Project Reactor、RxJava 3、SmallRye Mutiny 和 Kotlin 协程的响应式类型




  #### 配置异步处理


  要使用 Spring MVC 的异步处理功能，首先需要启用它。为此，你可以在注册过滤器或 Servlet 时调用 `setAsyncSupported()` 方法。


  在编写 `WebApplicationInitializer` 时，你需要执行以下操作：


  ```

  public class CourtWebApplicationInitializer implements WebApplicationInitializer
  {

  public void onStartup(ServletContext ctx) {

  var servlet = new DispatcherServlet();

  var registration = ctx.addServlet("dispatcher", servlet);

  registration.setAsyncSupported(true);

  }

  }

  ```


  ![](img/314861_5_En_2_Figh_HTML.gif)一个带阴影圆圈的字母 i 图标，代表信息符号。 在进行异步处理时，应用中所有的 Servlet
  过滤器和 Servlet 都应将此属性设置为 `true`；否则，它将无法正常工作！


  幸运的是，Spring 在这方面为我们提供了帮助。当使用 `AbstractAnnotationConfigDispatcherServletInitializer`
  作为超类时，已注册的 `DispatcherServlet` 和过滤器的此属性默认会被设置为 `true`。要更改它，请重写 `isAsyncSupported()`
  方法并实现逻辑以确定其应开启还是关闭。


  接下来，你还需要配置一个 `AsyncTaskExecutor` 并将其注入到 MVC 配置中：


  ```

  package com.apress.spring6recipes.court.config;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.core.task.AsyncTaskExecutor;

  import org.springframework.scheduling.concurrent.ThreadPoolTaskExecutor;

  import org.springframework.web.servlet.config.annotation.AsyncSupportConfigurer;

  import org.springframework.web.servlet.config.annotation.WebMvcConfigurer;

  import java.time.Duration;

  @Configuration

  public class AsyncConfiguration implements WebMvcConfigurer {

  @Override

  public void configureAsyncSupport(AsyncSupportConfigurer configurer) {

  configurer.setDefaultTimeout(Duration.ofSeconds(5).toMillis());

  configurer.setTaskExecutor(mvcTaskExecutor());

  }

  @Bean

  public AsyncTaskExecutor mvcTaskExecutor() {

  var taskExecutor = new ThreadPoolTaskExecutor();

  taskExecutor.setThreadGroupName("mvcTaskExecutor");

  return taskExecutor;

  }

  }

  ```


  要配置异步处理，你需要重写 `WebMvcConfigurationSupport` 的 `configureAsyncSupport` 方法。重写此方法使你可以访问
  `AsyncSupportConfigurer`，并允许你设置 `defaultTimeout` 和要使用的 `AsyncTaskExecutor`。超时时间设置为
  5 秒，并且你将使用 `ThreadPoolTaskExecutor` 作为执行器（另请参阅配方 1-23）。


  现在，当进行预订时，你将在日志中看到类似以下内容：


  ```

  2022-10-31 19:15:03.077 [http-nio-8080-exec-3] [DEBUG] WebAsyncManager - Started
  async request

  2022-10-31 19:15:03.079 [http-nio-8080-exec-3] [DEBUG] DispatcherServlet - Exiting
  but response remains open for further handling

  2022-10-31 19:15:03.970 [mvcTaskExecutor-1] [DEBUG] WebAsyncManager - Async result
  set, dispatch to /court/reservationForm

  2022-10-31 19:15:03.972 [http-nio-8080-exec-4] [DEBUG] DispatcherServlet - "ASYNC"
  dispatch for POST "/court/reservationForm", parameters={masked}

  2022-10-31 19:15:03.974 [http-nio-8080-exec-4] [DEBUG] RequestMappingHandlerAdapter
  - Resume with async result ["redirect:reservationSuccess"]

  ```


  你会注意到，一个请求在某个线程上被处理，当该线程被释放后，另一个线程会继续处理并返回结果。


  ## 2-13\. 总结


  在本章中，你学习了如何使用 Spring MVC 框架开发 Java Web 应用程序。Spring MVC 的核心组件是 `DispatcherServlet`，它充当一个前端控制器，将请求分派给适当的处理器来处理这些请求。在
  Spring MVC 中，控制器是使用 `@Controller` 注解修饰的标准 Java 类。通过各个配方，你学习了如何利用 Spring MVC 控制器中使用的其他注解，其中包括用于指示访问
  URL 的 `@RequestMapping`、用于自动注入 Bean 引用的 `@Autowired`，以及用于在用户会话中维护对象的 `@SessionAttributes`
  等。你还学习了如何将拦截器集成到应用程序中，这允许你修改控制器中的请求和响应对象。此外，你探索了 Spring MVC 如何支持表单处理，包括使用 Spring
  验证器和 Jakarta Bean Validation API 进行数据验证。你还探索了 Spring MVC 如何整合 SpEL 以简化某些配置任务，以及
  Spring MVC 如何为不同的表示技术支持不同类型的视图。最后，你学习了如何利用 Servlet 异步 API 来处理请求。


  '
- "# 3. Spring MVC：REST 服务\n\n在本章中，你将学习 Spring 如何处理表述性状态转移（通常以其缩写 REST 著称）。自 2000\
  \ 年 [Roy Fielding](https://en.wikipedia.org/wiki/Roy_Fielding) 提出该术语以来，REST 对 Web\
  \ 应用程序产生了重要影响。\n\n基于 Web 协议（超文本传输协议，HTTP）的基础，REST 所提出的架构在 Web 服务的实现中变得越来越流行。Web\
  \ 服务本身已成为 Web 上许多机器间通信的基石。许多组织做出的碎片化技术选择（例如 Java、Python、Ruby、.NET）使得需要一种能够弥合这些不同环境之间差距的解决方案。如何让一个基于\
  \ Java 的应用程序中的信息被一个用 Python 编写的应用程序访问？Java 应用程序如何从一个用 .NET 编写的应用程序获取信息？Web 服务填补了这一空白。\n\
  \n实现 Web 服务有多种方法，但 RESTful Web 服务已成为 Web 应用程序中最常见的选择。它们被一些最大的互联网门户网站（例如 Google 和\
  \ Yahoo）用来提供对其信息的访问，用于支持浏览器发出的 Ajax 调用，此外还为新闻提要（例如 RSS）等信息的分发提供了基础。\n\n在本章中，你将学习\
  \ Spring 应用程序如何使用 REST，以便你可以使用这种流行的方法来访问和提供信息。\n\n## 3-1\\. 使用 REST 服务发布 XML\n\n\
  ### 问题\n\n你想使用 Spring 发布一个基于 XML 的 REST 服务。\n\n### 解决方案\n\n在 Spring 中设计 REST 服务有两种可能性。一种涉及将应用程序的数据作为\
  \ REST 服务发布；另一种涉及从第三方 REST 服务访问数据以在应用程序中使用。本配方描述了如何将应用程序的数据作为 REST 服务发布。配方 3-4 描述了如何从第三方\
  \ REST 服务访问数据。将应用程序的数据作为 REST 服务发布主要围绕使用 Spring MVC 注解 `@RequestMapping` 和 `@PathVariable`。通过使用这些注解来修饰\
  \ Spring MVC 处理器方法，Spring 应用程序能够将其数据作为 REST 服务发布。\n\n此外，Spring 支持一系列生成 REST 服务负载的机制。本配方将探讨最简单的机制，即使用\
  \ Spring 的 `MarshallingView` 类。随着本章配方的深入，你将了解 Spring 支持的更高级的生成 REST 服务负载的机制。\n\n\
  ### 工作原理\n\n将 Web 应用程序的数据作为 REST 服务发布，或者用 Web 服务术语更技术性地称为“创建端点”，与你在第 4 章中探索的 Spring\
  \ MVC 紧密相关。由于 Spring MVC 依赖 `@RequestMapping` 注解来修饰处理器方法并定义访问点（即 URL），因此它是定义 REST\
  \ 服务端点的首选方式。\n\n\n\n#### 使用 MarshallingView 生成 XML\n\n以下示例展示了一个 Spring MVC 控制器类，其中包含一个定义\
  \ REST 服务端点的处理方法：\n\n```\npackage com.apress.spring6recipes.court.web;\nimport com.apress.spring6recipes.court.domain.Members;\n\
  import com.apress.spring6recipes.court.service.MemberService;\nimport org.springframework.stereotype.Controller;\n\
  import org.springframework.ui.Model;\nimport org.springframework.web.bind.annotation.GetMapping;\n\
  @Controller\npublic class RestMemberController {\nprivate final MemberService memberService;\n\
  public RestMemberController(MemberService memberService) {\nthis.memberService =\
  \ memberService;\n}\n@GetMapping(\"/members\")\npublic String getRestMembers(Model\
  \ model) {\nvar members = new Members();\nmembers.addMembers(memberService.findAll());\n\
  model.addAttribute(\"members\", members);\nreturn \"membertemplate\";\n}\n}\n```\n\
  \n通过使用 `@GetMapping(\"/members\")` 装饰控制器的处理方法，REST 服务端点可通过 http://[host_name]/[app-name]/members\
  \ 访问。你可以观察到控制权被移交给一个名为 membertemplate 的逻辑视图。以下示例展示了用于定义名为 `membertemplate` 的逻辑视图的声明：\n\
  \n```\npackage com.apress.spring6recipes.court.web.config;\nimport com.apress.spring6recipes.court.domain.Member;\n\
  import com.apress.spring6recipes.court.domain.Members;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.oxm.Marshaller;\nimport org.springframework.oxm.jaxb.Jaxb2Marshaller;\n\
  import org.springframework.web.servlet.config.annotation.EnableWebMvc;\nimport org.springframework.web.servlet.view.BeanNameViewResolver;\n\
  import org.springframework.web.servlet.view.xml.MarshallingView;\nimport java.util.Map;\n\
  import static jakarta.xml.bind.Marshaller.JAXB_FORMATTED_OUTPUT;\n@Configuration\n\
  @EnableWebMvc\n@ComponentScan(basePackages = \"com.apress.spring6recipes.court\"\
  )\npublic class CourtRestConfiguration {\n@Bean\npublic MarshallingView membertemplate(Marshaller\
  \ marshaller) {\nreturn new MarshallingView(marshaller);\n}\n@Bean\npublic Jaxb2Marshaller\
  \ jaxb2Marshaller() {\nvar marshaller = new Jaxb2Marshaller();\nmarshaller.setClassesToBeBound(Member.class,\
  \ Members.class);\nmarshaller.setMarshallerProperties(Map.of(JAXB_FORMATTED_OUTPUT,\
  \ Boolean.TRUE));\nreturn marshaller;\n}\n@Bean\npublic BeanNameViewResolver viewResolver()\
  \ {\nreturn new BeanNameViewResolver();\n}\n}\n```\n\n`membertemplate` 视图被定义为 `MarshallingView`\
  \ 类型，这是一个通用类，允许使用 marshaller 来渲染响应。编组（Marshalling）是将对象的内存表示转换为数据格式的过程。因此，在这个特定案例中，marshaller\
  \ 负责将 Members 和 Member 对象转换为 XML 数据格式。`MarshallingView` 使用的 marshaller 属于 Spring\
  \ 提供的一系列 XML marshaller 之一。\n\nMarshaller 本身也需要配置。我们选择使用 `Jaxb2Marshaller`，因为它简单且基于\
  \ Java 架构的 XML 绑定（JAXB）基础。但是，如果你更习惯使用 XStream 框架，你可能会发现使用 `XStreamMarshaller` 更容易。\n\
  \n`Jaxb2Marshaller` 需要配置一个名为 `classesToBeBound` 或 `contextPath` 的属性。对于 `classesToBeBound`，分配给此属性的类指示将要转换为\
  \ XML 的类（即对象）结构。以下示例展示了分配给 `Jaxb2Marshaller` 的 `Member` 和 `Members` 类：\n\n```\n\
  package com.apress.spring6recipes.court.domain;\nimport jakarta.xml.bind.annotation.XmlRootElement;\n\
  @XmlRootElement\npublic class Member {\nprivate String name;\nprivate String email;\n\
  private String phone;\npublic Member() {}\npublic Member(String name, String phone,\
  \ String email) {\nthis.name=name;\nthis.phone=phone;\nthis.email=email;\n}\npublic\
  \ String getEmail() {\nreturn email;\n}\npublic String getName() {\nreturn name;\n\
  }\npublic String getPhone() {\nreturn phone;\n}\npublic void setEmail(String email)\
  \ {\nthis.email = email;\n}\npublic void setName(String name) {\nthis.name = name;\n\
  }\npublic void setPhone(String phone) {\nthis.phone = phone;\n}\n}\n```\n\n*Members*\
  \ *类*\n\n```\npackage com.apress.spring6recipes.court.domain;\nimport jakarta.xml.bind.annotation.XmlAccessType;\n\
  import jakarta.xml.bind.annotation.XmlAccessorType;\nimport jakarta.xml.bind.annotation.XmlElement;\n\
  import jakarta.xml.bind.annotation.XmlRootElement;\nimport java.util.ArrayList;\n\
  import java.util.List;\n@XmlRootElement\n@XmlAccessorType(XmlAccessType.FIELD)\n\
  public class Members {\n@XmlElement(name = \"member\")\nprivate List members = new\
  \ ArrayList();\npublic List getMembers() {\nreturn members;\n}\npublic void setMembers(List\
  \ members) {\nthis.members = members;\n}\npublic void addMembers(Iterable members)\
  \ {\nmembers.forEach(member -> this.members.add(member));\n}\n}\n```\n\n注意 `Members`\
  \ 类是一个用 `@XmlRootElement` 注解修饰的 POJO。此注解允许 `Jaxb2Marshaller` 检测类的（即对象的）字段并将其转换为\
  \ XML 数据（例如，`name=John` 转换为 `<name>john</name>`，`email=``john@doe.com` 转换为 `<email>``john@doe.com``</email>`）。\n\
  \n回顾一下所描述的内容，这意味着当向形如 `http://[host_name]//app-name]/members` 的 URL 发出请求时，相应的处理器负责创建一个\
  \ Members 对象，然后将其传递给名为 membertemplate 的逻辑视图。根据后一个视图的定义，使用 marshaller 将 `Members`\
  \ 对象转换为 XML 负载，并返回给 REST 服务的请求方。REST 服务返回的 XML 负载如下例所示：\n\n```\n\nmarten@deinum.biz\n\
  Marten Deinum\n00-31-1234567890\n\njohn@doe.com\nJohn Doe\n1-800-800-800\n\njane@doe.com\n\
  Jane Doe\n1-801-802-803\n\n```\n\n这最后一个 XML 负载代表了一种生成 REST 服务响应的非常简单的方法。随着本章内容的深入，你将学习到更复杂的方法，例如能够创建广泛使用的\
  \ REST 服务负载，如 RSS、Atom 和 JSON。\n\n由于 REST 服务请求通常带有形如 `Accept: application/xml` 的\
  \ HTTP 头，配置了内容协商的 Spring MVC 可以决定为此类请求提供 XML（REST）负载，即使请求没有扩展名。这也允许无扩展名的请求以 HTML、PDF\
  \ 和 XLS 等格式进行，所有这些都仅基于 HTTP 头。\n\n\n\n#### 使用 @ResponseBody 生成 XML\n\n使用 `MarshallingView`\
  \ 生成 XML 是产生结果的一种方式。然而，当你希望为同一数据（例如 `Member` 对象列表）提供多种表示形式（如 JSON）时，添加另一个视图会变得繁琐。相反，我们可以依赖\
  \ Spring MVC 的 `HttpMessageConverter` 实现，将对象转换为用户请求的表示形式。以下清单展示了 `RestMemberController`\
  \ 所做的修改：\n\n```\npackage com.apress.spring6recipes.court.web;\nimport com.apress.spring6recipes.court.domain.Members;\n\
  import com.apress.spring6recipes.court.service.MemberService;\nimport org.springframework.stereotype.Controller;\n\
  import org.springframework.web.bind.annotation.GetMapping;\nimport org.springframework.web.bind.annotation.ResponseBody;\n\
  @Controller\npublic class RestMemberController {\nprivate final MemberService memberService;\n\
  public RestMemberController(MemberService memberService) {\nthis.memberService =\
  \ memberService;\n}\n@GetMapping(\"/members\")\n@ResponseBody\npublic Members getRestMembers()\
  \ {\nvar members = new Members();\nmembers.addMembers(memberService.findAll());\n\
  return members;\n}\n}\n```\n\n第一个变化是，我们现在额外使用 `@ResponseBody` 注解了控制器方法。这个注解告诉 Spring\
  \ MVC，该方法的结果应作为响应的主体。由于我们需要 XML，这个编组工作由 Spring 提供的 `Jaxb2RootElementHttpMessageConverter`\
  \ 完成。第二个变化是，由于使用了 `@ResponseBody` 注解，我们不再需要视图名称，而可以直接返回 `Members` 对象。\n\n![](img/314861_5_En_3_Figa_HTML.gif)一个灯泡轮廓图标，代表提示。 \
  \ 除了在方法上使用 `@ResponseBody` 注解，你也可以用 `@RestController` 代替 `@Controller` 来注解你的控制器，这会产生相同的结果。如果你的单个控制器有多个方法，这种方式尤其方便。\n\
  \n这些修改也允许我们清理配置，因为我们不再需要 `MarshallingView` 和 `Jaxb2Marshaller`：\n\n```\npackage\
  \ com.apress.spring6recipes.court.web.config;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.web.servlet.config.annotation.EnableWebMvc;\n\
  @Configuration\n@EnableWebMvc\n@ComponentScan(basePackages = \"com.apress.spring6recipes.court\"\
  )\npublic class CourtRestConfiguration { }\n```\n\n当应用部署后，你从 `http://localhost:8080/court/members`\
  \ 请求成员信息时，将得到与之前相同的结果：\n\n```\n\nmarten@deinum.biz\nMarten Deinum\n00-31-1234567890\n\
  \njohn@doe.com\nJohn Doe\n1-800-800-800\n\njane@doe.com\nJane Doe\n1-801-802-803\n\
  \n```\n\n#### 使用 @PathVariable 限制结果\n\nREST 服务请求带有参数是很常见的。这样做是为了限制或过滤服务的负载。例如，形如\
  \ `http://[host_name]/[app-name]/members/353/` 的请求可用于专门检索成员 353 的信息。另一种变体可以是像 `http://[host_name]/[app-name]/reservations/07-07-2010/`\
  \ 这样的请求，用于检索在日期 `07-07-2010` 所做的预订。\n\n为了在 Spring 中使用参数构建 REST 服务，你需要使用 `@PathVariable`\
  \ 注解。根据 Spring MVC 的约定，`@PathVariable` 注解作为输入参数添加到处理器方法中，以便在处理器方法体内使用。以下代码片段展示了使用\
  \ `@PathVariable` 注解的 REST 服务处理器方法：\n\n```\n@GetMapping(\"/members/{memberid}\"\
  )\npublic Member getMember(@PathVariable(\"memberid\") long memberID) {\nreturn\
  \ memberService.findById(memberID).orElse(null);\n}\n```\n\n注意 `@RequestMapping`\
  \ 的值包含 `{memberid}`。被 `{ }` 包围的值用于表示 URL 参数是变量。此外，注意处理器方法定义了一个输入参数 `@PathVariable(\"\
  memberid\") long memberID`。这个最后的声明将 URL 中的任何 `memberid` 值关联起来，并将其赋值给一个名为 `memberID`\
  \ 的变量，该变量可在处理器方法内部访问。因此，形如 `/members/353/` 和 `/members/777/` 的 REST 端点将由这个最后的处理器方法处理，`memberID`\
  \ 变量分别被赋值为 `353` 和 `777`。在处理器方法内部，可以通过 `memberID` 变量对成员 353 和 777 进行适当的查询，并将其作为\
  \ REST 服务的负载返回。\n\n对 `http://localhost:8080/court/members/2` 的请求将返回 ID 为 2 的成员的\
  \ XML 表示：\n\n```\n\njohn@doe.com\nJohn Doe\n1-800-800-800\n\n```\n\n#### 使用 ResponseEntity\
  \ 通知客户端\n\n用于检索单个 `Member` 实例的端点要么返回一个有效的成员，要么什么都不返回。这两种情况都会导致请求向客户端发送 HTTP 响应码\
  \ 200，这意味着请求成功。然而，这可能不是用户所期望的。在处理资源时，我们应该告知用户资源无法找到的事实。理想情况下，我们希望返回 HTTP 响应码 404，表示未找到。以下代码片段展示了修改后的\
  \ getMember 方法：\n\n```\n@GetMapping(\"/members/{memberid}\")\npublic ResponseEntity\
  \ getMember(@PathVariable(\"memberid\") long memberID) {\nreturn memberService.findById(memberID)\n\
  .map(ResponseEntity::ok)\n.orElseGet(() -> ResponseEntity.notFound().build());\n\
  }\n```\n\n方法的返回值已更改为 `ResponseEntity<Member>`。`ResponseEntity` 是 Spring MVC 中的一个类，它充当对象的包装器，将对象作为结果的主体，并附带一个\
  \ HTTP 状态码。当我们找到一个 `Member` 时，它会与 `HttpStatus.OK` 一起返回；后者对应 HTTP 状态码 200。当没有结果时，我们返回\
  \ `HttpStatus.NOT_FOUND`，对应 HTTP 状态码 404，表示未找到。\n\n由于这是一个非常常见的模式，有一种更简单的方法可以实现这一点，即使用\
  \ `ResponseEntity.of`，它接受一个 `Optional` 方法，该方法已经包含了这种模式。这使得代码更简洁、更易读：\n\n```\n@GetMapping(\"\
  /members/{memberid}\")\npublic ResponseEntity getMember(@PathVariable(\"memberid\"\
  ) long memberID) {\nreturn ResponseEntity.of(memberService.findById(memberID));\n\
  }\n```\n\n## 3-2\\. 使用 REST 服务发布 JSON\n\n### 问题\n\n你想使用 Spring 发布一个基于 JSON（JavaScript\
  \ 对象表示法）的 REST 服务。\n\n\n\n### 解决方案\n\nJSON 已成为 REST 服务最常用的负载格式。然而，与大多数依赖 XML 标记的\
  \ REST 服务负载不同，JSON 的特殊之处在于其内容是基于 JavaScript 语言的一种特殊表示法。在本方案中，除了依赖 Spring 的 REST\
  \ 支持外，我们还将使用 Spring 自带的 `MappingJackson2JsonView` 类来简化 JSON 内容的发布。\n\n![](img/314861_5_En_3_Figb_HTML.gif)一个信息符号，由阴影圆圈内的字母\
  \ i 图标表示。  `MappingJackson2JsonView` 类依赖于 Jackson JSON 处理器库（版本 2）的存在。\n\n*Jackson\
  \ 2 的 Gradle 依赖*\n\n```\nimplementation group:'com.fasterxml.jackson.core', name:\
  \ 'jackson-databind', version: '2.14.1'\n```\n\n*Jackson 2 的 Maven 依赖*\n\n```\n\
  com.fasterxml.jackson.core\njackson-databind\n2.14.1\n\n```\n\n*示例 1. 为何发布 JSON？*\n\
  \n你很可能需要设计以 JSON 作为负载的 REST 服务。这主要是因为浏览器的处理能力有限。虽然浏览器可以处理并提取发布 XML 负载的 REST 服务中的信息，但效率不高。而通过交付基于浏览器原生解释语言（JavaScript）的\
  \ JSON 负载，数据的处理和提取效率会更高。与 RSS 和 Atom 这类标准格式不同，JSON 除了其语法（稍后你将了解）外，无需遵循特定的结构。因此，JSON\
  \ 元素的负载结构通常需要与负责应用程序设计的团队成员共同确定。\n\n### 工作原理\n\n首先，你需要确定要作为 JSON 负载发布的信息。这些信息可以存储在关系型数据库（RDBMS）或文本文件中，通过\
  \ JDBC 或对象/关系映射（ORM）访问，甚至可以是 Spring Bean 或其他类型构造的一部分。描述如何获取这些信息超出了本方案的范围，因此我们假设你将采用任何你认为合适的方式来访问它。如果你不熟悉\
  \ JSON，以下代码片段展示了这种格式的一个示例：\n\n```\n{\n\"members\" : {\n\"members\" : [ {\n\"name\"\
  \ : \"Marten Deinum\",\n\"phone\" : \"00-31-1234567890\",\n\"email\" : \"marten@deinum.biz\"\
  \n}, {\n\"name\" : \"John Doe\",\n\"phone\" : \"1-800-800-800\",\n\"email\" : \"\
  john@doe.com\"\n}, {\n\"name\" : \"Jane Doe\",\n\"phone\" : \"1-801-802-803\",\n\
  \"email\" : \"jane@doe.com\"\n} ]\n}\n}\n```\n\n如你所见，JSON 负载由文本和分隔符（如 {、}、[、]、:\
  \ 和 \"）组成。我们不会详细讨论使用哪种分隔符，但可以说，这种语法使得 JavaScript 引擎访问和操作数据比处理 XML 格式的数据更加容易。\n\n\
  #### 使用 MappingJackson2JsonView 生成 JSON\n\n由于你已经在方案 3-1 中了解了如何使用 REST 服务发布数据，我们将直奔主题，展示在\
  \ Spring MVC 控制器中实现此过程所需的实际处理方法：\n\n```\n@GetMapping(\"/members\")\npublic String\
  \ getRestMembersJson(Model model) {\nvar members = new Members();\nmembers.addMembers(memberService.findAll());\n\
  model.addAttribute(\"members\", members);\nreturn \"jsonmembertemplate\";\n}\n```\n\
  \n你可能注意到，这与方案 3-1 中提到的控制器方法非常相似。唯一的区别是我们返回了不同的视图名称。我们返回的视图名称 `jsonmembertemplate`\
  \ 映射到一个 `MappingJackson2JsonView`。我们需要在配置类中配置此视图：\n\n```\npackage com.apress.spring6recipes.court.web.config;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.web.servlet.config.annotation.EnableWebMvc;\n\
  import org.springframework.web.servlet.view.BeanNameViewResolver;\nimport org.springframework.web.servlet.view.json.MappingJackson2JsonView;\n\
  @Configuration\n@EnableWebMvc\n@ComponentScan(basePackages = \"com.apress.spring6recipes.court\"\
  )\npublic class CourtRestConfiguration {\n@Bean\npublic MappingJackson2JsonView\
  \ jsonmembertemplate() {\nvar view = new MappingJackson2JsonView();\nview.setPrettyPrint(true);\n\
  return view;\n}\n@Bean\npublic BeanNameViewResolver viewResolver() {\nreturn new\
  \ BeanNameViewResolver();\n}\n}\n```\n\n`MappingJackson2JsonView` 使用 Jackson2 库在对象和\
  \ JSON 之间进行转换。它使用一个 Jackson `ObjectMapper` 实例进行转换。当向 `http://localhost:8080/court/members`\
  \ 发起请求时，控制器方法将被调用，并返回一个 JSON 表示：\n\n```\n{\n\"members\" : {\n\"members\" : [ {\n\
  \"name\" : \"Marten Deinum\",\n\"phone\" : \"00-31-1234567890\",\n\"email\" : \"\
  marten@deinum.biz\"\n}, {\n\"name\" : \"John Doe\",\n\"phone\" : \"1-800-800-800\"\
  ,\n\"email\" : \"john@doe.com\"\n}, {\n\"name\" : \"Jane Doe\",\n\"phone\" : \"\
  1-801-802-803\",\n\"email\" : \"jane@doe.com\"\n} ]\n}\n}\n```\n\n现在，让我们将方案 3-1\
  \ 中的方法和视图添加到我们的控制器中：\n\n```\npackage com.apress.spring6recipes.court.web;\nimport\
  \ com.apress.spring6recipes.court.domain.Members;\nimport com.apress.spring6recipes.court.service.MemberService;\n\
  import org.springframework.http.MediaType;\nimport org.springframework.stereotype.Controller;\n\
  import org.springframework.ui.Model;\nimport org.springframework.web.bind.annotation.GetMapping;\n\
  @Controller\npublic class RestMemberController {\nprivate final MemberService memberService;\n\
  public RestMemberController(MemberService memberService) {\nthis.memberService =\
  \ memberService;\n}\n@GetMapping(value = \"/members\", produces = MediaType.APPLICATION_XML_VALUE)\n\
  public String getRestMembersXml(Model model) {\nprepareModel(model);\nreturn \"\
  xmlmembertemplate\";\n}\n@GetMapping(value = \"/members\", produces = MediaType.APPLICATION_JSON_VALUE)\n\
  public String getRestMembersJson(Model model) {\nprepareModel(model);\nreturn \"\
  jsonmembertemplate\";\n}\nprivate void prepareModel(Model model) {\nvar members\
  \ = new Members();\nmembers.addMembers(memberService.findAll());\nmodel.addAttribute(\"\
  members\", members);\n}\n}\n```\n\n现在我们有了 `getRestMembersXml` 和 `getRestMembersJson`\
  \ 方法；两者基本相同，区别在于它们返回不同的视图名称。注意 `@GetMapping` 注解上的 `produces` 属性；它用于确定调用哪个方法。带有 XML\
  \ 接受头的 `/members` 请求将生成 XML，而带有 JSON 接受头的 `/members` 请求将生成 JSON。然而，这种方法需要为每种支持的视图类型复制所有方法，对于企业级应用来说并非可行的解决方案。\n\
  \n\n\n#### 使用 @ResponseBody 生成 JSON\n\n使用 `MappingJackson2JsonView` 生成 JSON 是产生结果的一种方式。然而，正如上一节所述，这可能会带来麻烦，尤其是在支持多种视图类型的情况下。相反，我们可以依赖\
  \ Spring MVC 的 `HttpMessageConverter` 实现，将对象转换为用户请求的表示形式。以下列表展示了 `RestMemberController`\
  \ 所做的更改：\n\n```\n@Controller\npublic class RestMemberController {\n@GetMapping(\"\
  /members\")\n@ResponseBody\npublic Members getRestMembers() {\nvar members = new\
  \ Members();\nmembers.addMembers(memberService.findAll());\nreturn members;\n}\n\
  }\n```\n\n第一个变化是，我们现在额外使用 `@ResponseBody` 注解了控制器方法。这个注解告诉 Spring MVC，该方法的结果应作为响应的主体。由于我们需要\
  \ JSON，这个编组工作由 Spring 提供的 `MappingJackson2HttpMessageConverter` 完成。第二个变化是，由于使用了\
  \ `@ResponseBody` 注解，我们不再需要视图名称，而可以直接返回 Members 对象。\n\n![](img/314861_5_En_3_Figc_HTML.gif)一个灯泡轮廓的图标，代表提示。 \
  \ 除了使用 `@ResponseBody` 注解方法，你也可以使用 `@RestController` 注解你的控制器，而不是 `@Controller`，这会产生相同的结果。如果你有一个包含多个方法的单一控制器，这尤其方便。\n\
  \n这些更改也允许我们清理配置，因为我们不再需要 `MappingJackson2JsonView`：\n\n```\npackage com.apress.spring6recipes.court.web.config;\n\
  import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.web.servlet.config.annotation.EnableWebMvc;\n@Configuration\n\
  @EnableWebMvc\n@ComponentScan(basePackages = \"com.apress.spring6recipes.court\"\
  )\npublic class CourtRestConfiguration { }\n```\n\n当应用程序部署后，你从 `http://localhost:8080/court/members`\
  \ 请求成员，并使用 JSON 的 `Accept` 头（`application/json`），它将给出与之前相同的结果：\n\n```\n{\n\"members\"\
  \ : {\n\"members\" : [ {\n\"name\" : \"Marten Deinum\",\n\"phone\" : \"00-31-1234567890\"\
  ,\n\"email\" : \"marten@deinum.biz\"\n}, {\n\"name\" : \"John Doe\",\n\"phone\"\
  \ : \"1-800-800-800\",\n\"email\" : \"john@doe.com\"\n}, {\n\"name\" : \"Jane Doe\"\
  ,\n\"phone\" : \"1-801-802-803\",\n\"email\" : \"jane@doe.com\"\n} ]\n}\n}\n```\n\
  \n你可能已经注意到，`RestMemberController` 和 `CourtRestConfiguration` 现在与配方 3-1 中的完全相同。当调用\
  \ `http://localhost:8080/court/members` 并且 `Accept` 头是 XML（`application/xml`）时，你将获得\
  \ XML。\n\n在没有额外配置的情况下，这是如何实现的？Spring MVC 会检测类路径中的内容；它会自动检测 JAXB2、Jackson/GSON 和\
  \ Rome（参见配方 3-4）。它会为可用的技术注册相应的 `HttpMessageConverter`。\n\n#### 使用 GSON 生成 JSON\n\
  \n到目前为止，你一直在使用 Jackson 从我们的对象生成 JSON。另一个流行的库是 GSON，Spring 对其提供了开箱即用的支持。要使用 GSON，你需要将其添加到类路径中（代替\
  \ Jackson），然后它将被用来生成 JSON。\n\n添加以下依赖项。\n\n*GSON 的 Gradle 依赖项*\n\n```\nimplementation\
  \  group: 'com.google.code.gson', name: 'gson', version: '2.10'\n```\n\n*GSON 的\
  \ Maven 依赖项*\n\n```\n<dependency>\n<groupId>com.google.code.gson</groupId>\n<artifactId>gson</artifactId>\n\
  <version>2.10</version>\n</dependency>\n```\n\n就像使用 Jackson 一样，这就是使用 GSON 进行 JSON\
  \ 序列化所需的全部操作。如果你启动应用程序并调用 `http://localhost:8080/court/members`，你仍然会收到 JSON，但现在是通过\
  \ GSON 实现的。\n\n## 3-3\\. 使用 REST 控制器接收负载\n\n### 问题\n\n你希望在控制器中接收 JSON、XML 或其他类型的受支持负载，以便向系统添加新记录。\n\
  \n### 解决方案\n\n在控制器中接收 HTTP 负载是通过使用 `@RequestBody` 注解其中一个参数来实现的。`@RequestBody` 注解指示\
  \ Spring 将传入的 HTTP 负载反序列化到被注解的类型上。通常，你注解的参数是你想要存储到系统中的类型。除了仅接收负载外，还可以通过在 `@ResponseBody`\
  \ 旁边添加 `@Valid` 注解来验证它。更多关于验证的信息可以在配方 2-10 中找到。\n\n### 工作原理\n\n通常，接收负载是在一个可以处理 POST\
  \ 请求的方法中进行的，因此是一个使用 `@PostMapping` 注解的方法。该方法随后接收一个对象，这里是一个 `Member`，用于添加到数据库中。由于这是一个\
  \ `Member`，在接收单个 `Member` 以添加它时，我们可以使用相同的 XML 或 JSON 片段。\n\n#### 使用 @RequestBody\
  \ 接收并处理请求\n\n*POST 请求的 JSON 示例*\n\n```\n{\n\"name\" : \"Nick Fury\",\n\"phone\"\
  \ : \"secret\",\n\"email\" : \"nick.fury@shield.org\"\n}\n```\n\n*POST 请求的 XML 示例*\n\
  \n```\n<member>\n<name>Nick Fury</name>\n<phone>secret</phone>\n<email>nick.fury@shield.org</email>\n\
  </member>\n```\n\n现在数据结构已知，可以修改控制器来接收它：\n\n```\n@PostMapping\npublic ResponseEntity\
  \ newMember(@RequestBody Member newMember) {\nreturn ResponseEntity.ok(memberService.save(newMember));\n\
  }\n```\n\n`newMember` 方法已添加到控制器中。它通过 `@PostMapping` 注解与 POST 请求绑定。注意，`Member` 参数使用了\
  \ `@RequestBody` 注解；这会将请求体反序列化为该对象。最后，返回一个包含新创建实体的响应。\n\n#### 验证请求负载\n\nSpring 有一个验证抽象，可用于自动验证传入的请求。虽然你可以编写自己的\
  \ Spring 验证器实现，但最常见的用例是使用 Jakarta Bean Validation API（另请参见配方 2-10）。要启用验证支持，首先，你需要添加一个\
  \ Jakarta Bean Validation 提供者，例如 `hibernate-validator`。在 `@RequestBody` 注解旁边，在方法参数上添加一个额外的\
  \ `jakarta.validation.@Valid`：\n\n```\n@PostMapping\npublic ResponseEntity newMember(@Valid\
  \ @RequestBody Member newMember) {\nreturn ResponseEntity.ok(memberService.save(newMember));\n\
  }\n```\n\n在这段代码中，注意方法参数上添加了 `@Valid` 注解。这指示 Spring MVC 对 `Member` 对象应用验证。现在让我们向\
  \ `Member` 对象添加一些验证。`name` 和 `email` 字段是必需的；为此我们可以使用 `@NotBlank` 注解。`email` 字段还需要是一个有效的电子邮件地址，因此我们额外添加\
  \ `@Email` 来验证它。\n\n![](img/314861_5_En_3_Figd_HTML.gif)一个信息符号，由阴影圆圈内的字母 i 图标表示。 \
  \ 要验证基于文本的字段中的内容，你可以使用 `@NotNull`、`@NotEmpty` 和 `@NotBlank`，但应该使用哪一个？`@NotNull`\
  \ 仅检查字段是否不为 null，`@NotEmpty` 检查字段是否不为 null 且不是空字符串，而 `@NotBlank` 检查是否不为 null 且不是仅包含空格/控制字符的字符串。使用哪一个取决于你的需求。这里我们使用\
  \ `@NotBlank`，因为仅包含空格的名称并不是真正的名称。\n\n*带有验证注解的 Member*\n\n```\npackage com.apress.spring6recipes.court.domain;\n\
  import jakarta.validation.constraints.Email;\nimport jakarta.validation.constraints.NotBlank;\n\
  import jakarta.xml.bind.annotation.XmlRootElement;\n@XmlRootElement\npublic class\
  \ Member {\n@NotBlank\nprivate String name;\n@NotBlank\n@Email\nprivate String email;\n\
  private String phone;\n}\n```\n\n现在，当发送一个没有 `name` 或 `email` 或包含无效 `email` 的请求时，该请求将不会被处理，而是返回\
  \ HTTP 状态码 400（错误请求）。\n\n\n\n#### 使用 Spring MVC 进行错误处理\n\nSpring MVC 注册的默认错误处理器是\
  \ `ExceptionHandlerExceptionResolver` 和 `ResponseStatusExceptionResolver`。`ExceptionHandlerExceptionResolver`\
  \ 会尝试查找带有 `@ExceptionHandler` 注解的方法，该方法可以处理抛出的异常；而 `ResponseStatusExceptionResolver`\
  \ 则会使用抛出异常上的 `@ResponseStatus` 注解（如果存在）来确定响应状态码。\n\n在我们的案例中，`ResponseStatusExceptionResolver`\
  \ 正在解析错误，因为没有能够处理所抛出异常的 `@ExceptionHandler` 方法。让我们通过添加这样一个方法来改进错误处理。我们将返回一个更好的响应，指明请求的问题所在。\n\
  \n为此，让我们在 `RestMemberController` 中添加一个能够处理 `MethodArgumentNotValidException` 的 `@ExceptionHandler`\
  \ 方法。`MethodArgumentNotValidException` 是在验证过程出现验证错误时抛出的异常。该异常本身包含错误消息以及更多信息：\n\n\
  ```\n@ExceptionHandler\n@ResponseStatus(HttpStatus.BAD_REQUEST)\npublic Map handle(MethodArgumentNotValidException\
  \ ex) {\nreturn ex.getFieldErrors().stream()\n.collect(\nCollectors.toMap(FieldError::getField,\n\
  FieldError::getDefaultMessage));\n}\n```\n\n该方法接收 `MethodArgumentNotValidException`，并将字段错误（包含验证错误）转换为由字段和错误消息组成的\
  \ `Map`。同时还有 `@ResponseStatus` 注解来指示要返回的状态码；在本例中，我们使用 HTTP 400 错误码。\n\n编写 `@ExceptionHandler`\
  \ 方法时，它可以接收多种不同类型的对象。其中一个是抛出的异常，但也可以包含许多请求处理方法所支持的内容。有关支持的最常用属性，请参见表 3-1。\n\n**表\
  \ 3-1**\n\n**@ExceptionHandler 方法最常用的方法参数**\n\n| 方法参数 | 描述 |\n| --- | --- |\n| 异常类型\
  \ | 将要处理的 `Exception` |\n| `jakarta.servlet.ServletRequest``jakarta.servlet.ServletResponse`\
  \ | 获取对请求和/或响应的访问权限 |\n| `jakarta.servlet.http.HttpSession` | HTTP 会话（如果有） |\n|\
  \ `java.security.Principal` | 当前主体，即当前已认证的用户 |\n| `java.util.Map``org.springframework.ui.Model``org.springframework.ui.ModelMap`\
  \ | 用于错误响应的模型，始终为空。可用于向响应添加数据 |\n\n这些是异常处理方法最常用的方法参数。\n\n修改后的方法现在将处理错误情况并返回更友好的结果（参见图\
  \ 3-1）。\n\n![](img/314861_5_En_3_Fig1_HTML.jpg)\n\n一段代码片段。H T T P 转发斜杠 1 点 1 400。连接，关闭。内容类型，application\
  \ j son。日期 2022 年 11 月 25 日。传输编码，分块。结果，必须是格式正确的电子邮件地址，名称不能为空。\n\n**图 3-1**\n\n错误结果\n\
  \n#### 使用 Spring MVC 和 RFC-7807 进行错误处理\n\n随着 JSON 成为 Web 通信的事实标准，现在也有了一个（目前仍处于提议阶段）用于向客户端返回错误响应的标准。这就是\
  \ [RFC-7807](https://www.rfc-editor.org/rfc/rfc7807)，它可能更广为人知的名字是 HTTP 问题详情 API。该标准描述了一种响应，可以告知传入请求的问题所在或服务器上发生了什么。\n\
  \n该响应由几个包含信息的字段组成；所有字段都是可选的。此外，还可以用额外的字段和信息来扩展此响应。\n\n| 字段 | 类型 | 描述 |\n| --- |\
  \ --- | --- |\n| `type` | 字符串 | 表示错误的 URI，通常是一个描述状态码的链接 |\n| `title` | 字符串 | 对问题所在的简短可读解释\
  \ |\n| `status` | 数字 | HTTP 状态码 |\n| `detail` | 字符串 | 对问题的可读解释 |\n| `instance` |\
  \ 字符串 | 指向导致问题的实际实例的 URI 引用，通常是调用的 URL |\n\n除了这些字段，还可以有自己的扩展。\n\nSpring 支持此标准，但默认未启用。该支持以可扩展的专用异常处理器的形式提供。\n\
  \n让我们重写上一节中的异常处理代码，以使用这种标准方法。为此，我们可以扩展 `org.springframework.web.servlet.mvc.method.annotation.ResponseEntityExceptionHandler`\
  \ 类，并重写 `handleMethodArgumentNotValid` 方法来添加我们自己的自定义逻辑：\n\n```\npackage com.apress.spring6recipes.court.web;\n\
  import org.springframework.context.i18n.LocaleContextHolder;\nimport org.springframework.http.HttpHeaders;\n\
  import org.springframework.http.HttpStatusCode;\nimport org.springframework.http.ResponseEntity;\n\
  import org.springframework.validation.FieldError;\nimport org.springframework.validation.ObjectError;\n\
  import org.springframework.web.bind.MethodArgumentNotValidException;\nimport org.springframework.web.bind.annotation.ControllerAdvice;\n\
  import org.springframework.web.context.request.WebRequest;\nimport org.springframework.web.servlet.mvc.method.annotation.ResponseEntityExceptionHandler;\n\
  import java.util.stream.Collectors;\n@ControllerAdvice\npublic class CourtExceptionHandlers\
  \ extends ResponseEntityExceptionHandler {\n@Override\nprotected ResponseEntity\
  \ handleMethodArgumentNotValid(MethodArgumentNotValidException ex,\nHttpHeaders\
  \ headers, HttpStatusCode status,\nWebRequest request) {\nvar errors = ex.getAllErrors().stream()\n\
  .collect(Collectors.toMap(this::getKey, this::resolveMessage));\nex.getBody().setProperty(\"\
  errors\", errors);\nreturn super.handleExceptionInternal(ex, null, headers, status,\
  \ request);\n}\nprivate String getKey(ObjectError error) {\nreturn (error instanceof\
  \ FieldError fe) ? fe.getCode() : error.getObjectName();\n}\nprivate String resolveMessage(ObjectError\
  \ error) {\nreturn getMessageSource() != null\n? getMessageSource().getMessage(error,\
  \ LocaleContextHolder.getLocale())\n: error.getDefaultMessage();\n}\n}\n```\n\n\
  `CourtExceptionHandlers` 类本身带有 `@ControllerAdvice` 注解。带有 `@ControllerAdvice` 的类包含适用于所有控制器的逻辑，是放置异常处理代码的理想位置。该类还扩展了\
  \ `ResponseEntityExceptionHandler`，并且我们重写了 `handleMethodArgumentNotValid` 方法。\n\n\
  我们使用基类中的 `createProblemDetail` 辅助方法来创建初始的 `ProblemDetail` 对象。之前创建的错误映射仍然会被创建，并作为属性添加到\
  \ `ProblemDetail` 对象中。最后，我们使用另一个辅助方法来创建包含 `ProblemDetail` 对象的 `ResponseEntity`。完成此设置后，错误处理将返回符合\
  \ RFC-7807 的结果（参见图 3-2）。\n\n![](img/314861_5_En_3_Fig2_HTML.jpg)\n\n一组带有合规结果的代码。包含针对电子邮件和名称的验证错误，以及实例为\
  \ court slash members，状态为 400，标题为 bad request，类型为 about colon blank。\n\n**图 3-2**\n\
  \n问题详情错误响应\n\n## 3-4. 使用 Spring 访问 REST 服务\n\n### 问题\n\n您希望从第三方（例如 Google、Yahoo、其他业务合作伙伴）访问\
  \ REST 服务，并在 Spring 应用程序中使用其负载。\n\n\n\n### 解决方案\n\n在 Spring 应用程序中访问第三方 REST 服务主要围绕使用\
  \ Spring 的 `RestTemplate` 类。`RestTemplate` 类的设计原则与许多其他 Spring *模板类（例如 `JdbcTemplate`、`JmsTemplate`）相同，通过提供默认行为来简化执行耗时任务的方法。这意味着在\
  \ Spring 应用程序中，调用 REST 服务和使用其返回的负载的过程得到了简化。\n\n### 工作原理\n\n在描述 `RestTemplate` 类的特性之前，有必要先探讨一下\
  \ REST 服务的生命周期，以便了解 `RestTemplate` 类实际执行的工作。最好通过浏览器来探索 REST 服务的生命周期，因此请在您的工作站上打开您常用的浏览器开始操作。首先需要一个\
  \ REST 服务端点。我们将重用我们在配方 3-2 中创建的端点。该端点应可通过 `http://localhost:8080/court/members.xml`（或\
  \ `.json`）访问。当您在浏览器中加载这个 REST 服务端点时，浏览器会执行一个 GET 请求，这是 REST 服务支持的最流行的 HTTP 请求之一。加载\
  \ REST 服务后，浏览器会显示类似如下的响应负载：\n\n```\n\nmarten@deinum.biz\nMarten Deinum\n00-31-1234567890\n\
  \njohn@doe.com\nJohn Doe\n1-800-800-800\n\njane@doe.com\nJane Doe\n1-801-802-803\n\
  \n```\n\n上述负载代表一个格式良好的 XML 片段，这与大多数 REST 服务的响应一致。负载的实际含义高度依赖于具体的 REST 服务。在此例中，XML\
  \ 标签（`<members>`、`<member>` 等）是我们自己定义的，而每个 XML 标签中包含的字符数据则代表与 REST 服务请求相关的信息。\n\n\
  REST 服务消费者（即您）的任务是了解 REST 服务的负载结构（有时称为词汇表），以便正确处理其信息。尽管上述 REST 服务依赖于一种可被视为自定义词汇表的结构，但许多\
  \ REST 服务通常依赖于标准化词汇表（例如 RSS），这使得 REST 服务负载的处理方式更加统一。此外，还值得注意的是，一些 REST 服务会提供 Web\
  \ 应用程序描述语言（WADL）契约，以方便负载的发现和使用。\n\n现在您已经通过浏览器熟悉了 REST 服务的生命周期，我们可以看看如何使用 Spring\
  \ 的 `RestTemplate` 类，以便将 REST 服务的负载整合到 Spring 应用程序中。鉴于 `RestTemplate` 类是为调用 REST\
  \ 服务而设计的，因此其主要方法与 REST 的基础——即 HTTP 方法：`HEAD`、`GET`、`POST`、`PUT`、`DELETE` 和 `OPTIONS`——紧密相关也就不足为奇了。表\
  \ 3-2 包含了 `RestTemplate` 类支持的主要方法。\n\n**表 3-2** 基于 HTTP 请求方法的 RestTemplate 类方法\n\
  \n| 方法 | 描述 |\n| --- | --- |\n| `headForHeaders` | 执行 HTTP HEAD 操作 |\n| `getForObject`\
  \ | 执行 HTTP GET 操作，并将结果作为给定类的类型返回 |\n| `getForEntity` | 执行 HTTP GET 操作，并返回一个 `ResponseEntity`\
  \ |\n| `patchForObject` | 执行 HTTP PATCH 操作，并将结果作为给定类的类型返回 |\n| `postForLocation`\
  \ | 执行 HTTP POST 操作，并返回 location 头的值 |\n| `postForObject` | 执行 HTTP POST 操作，并将结果作为给定类的类型返回\
  \ |\n| `postForEntity` | 执行 HTTP POST 操作，并返回一个 `ResponseEntity` |\n| `put` | 执行\
  \ HTTP PUT 操作 |\n| `delete` | 执行 HTTP DELETE 操作 |\n| `optionsForAllow` | 执行 HTTP\
  \ OPTIONS 操作 |\n| `execute` | 可以执行除 CONNECT 之外的任何 HTTP 操作 |\n\n正如您在表 3-2 中所见，`RestTemplate`\
  \ 类的方法以一系列 HTTP 方法为前缀，包括 HEAD、GET、POST、PUT、DELETE 和 OPTIONS。此外，`execute` 方法作为一个通用方法，可以执行任何\
  \ HTTP 操作，包括更冷门的 HTTP TRACE 方法，但不包括 CONNECT 方法，因为 `execute` 方法底层使用的 `HttpMethod`\
  \ 枚举不支持 CONNECT 方法。\n\n![](img/314861_5_En_3_Fige_HTML.gif)一个带阴影圆圈内字母 i 图标的信息符号。 \
  \ 到目前为止，REST 服务中最常用的 HTTP 方法是 GET，因为它代表一种获取信息的安全操作（即不会修改任何数据）。另一方面，诸如 `PUT`、`POST`\
  \ 和 `DELETE` 等 HTTP 方法旨在修改提供者的信息，这使得它们不太可能被 REST 服务提供者支持。对于需要进行数据修改的情况，许多提供者会选择\
  \ SOAP，这是一种替代 REST 服务的机制。\n\n现在您已经了解了 `RestTemplate` 类的方法，我们可以继续调用您之前用浏览器调用的同一个\
  \ REST 服务了，只不过这次使用的是 Spring 框架的 Java 代码。下面的清单展示了一个访问 REST 服务并将其内容输出到 `System.out`\
  \ 的类：\n\n```\npackage com.apress.spring6recipes.court;\nimport org.springframework.web.client.RestTemplate;\n\
  public class Main {\npublic static void main(String[] args) {\nvar uri = \"http://localhost:8080/court/members\"\
  ;\nvar restTemplate = new RestTemplate();\nvar result = restTemplate.getForObject(uri,\
  \ String.class);\nSystem.out.println(result);\n}\n}\n```\n\n![](img/314861_5_En_3_Figf_HTML.gif)一个火焰图标。 \
  \ 某些 REST 服务提供者会根据请求方限制对其数据源的访问。通常，拒绝访问是基于请求中存在的数据（例如 HTTP 头或 IP 地址）。因此，根据具体情况，即使数据源在另一种媒介中看起来工作正常（例如，您可能可以在浏览器中访问某个\
  \ REST 服务，但在尝试从 Spring 应用程序访问同一数据源时却收到拒绝访问的响应），提供者也可能返回拒绝访问的响应。这取决于 REST 提供者设定的使用条款。\n\
  \n第一行声明了在类体内访问 `RestTemplate` 类所需的导入语句。首先，我们需要创建一个 `RestTemplate` 的实例。接下来，您会看到对\
  \ `RestTemplate` 类的 `getForObject` 方法的调用，如表 3-2 所述，该方法用于执行 HTTP GET 操作——就像浏览器获取\
  \ REST 服务负载时执行的操作一样。关于这个方法，有两个重要的方面：它的响应和它的参数。\n\n调用 `getForObject` 方法的响应被赋值给一个\
  \ `String` 对象。这意味着您在浏览器中看到的该 REST 服务的相同输出（即 XML 结构）被赋值给了一个字符串。即使您从未在 Java 中处理过 XML，您也可能意识到，将数据作为\
  \ Java 字符串进行提取和操作并非易事。换句话说，有些类比 `String` 对象更适合处理 XML 数据，以及随之而来的 REST 服务负载。目前请先记住这一点；本章的其他配方将说明如何更好地提取和操作从\
  \ REST 服务获得的数据。\n\n传递给 `getForObject` 方法的参数包括实际的 REST 服务端点。第一个参数对应 URL（即端点）声明。请注意，该\
  \ URL 与您使用浏览器调用时使用的 URL 完全相同。\n\n执行时，输出将与浏览器中的输出相同，只不过现在它被打印在控制台中。\n\n\n\n#### 从参数化\
  \ URL 中检索数据\n\n上一节展示了如何调用 URI 来检索数据，但如果 URI 需要参数该怎么办？我们不想将参数硬编码到 URL 中。借助 `RestTemplate`，我们可以使用带有占位符的\
  \ URL；这些占位符将在执行时被实际值替换。占位符使用 `{` 和 `}` 定义，与请求映射的方式相同（参见配方 3-1 和 3-2）。\n\nURI `http://localhost:8080/court/members/{memberId}`\
  \ 就是这样一个参数化 URI 的示例。为了能够调用此方法，我们需要为占位符传入一个值。我们可以通过使用 `Map` 并将其作为第三个参数传递给 `RestTemplate`\
  \ 的 `getForObject` 方法来实现这一点：\n\n```\npackage com.apress.spring6recipes.court;\n\
  import org.springframework.web.client.RestTemplate;\nimport java.util.Map;\npublic\
  \ class Main {\npublic static void main(String[] args) {\nvar uri = \"http://localhost:8080/court/members/{memberId}\"\
  ;\nvar params = Map.of(\"memberId\", \"1\");\nvar restTemplate = new RestTemplate();\n\
  var result = restTemplate.getForObject(uri, String.class, params);\nSystem.out.println(result);\n\
  }\n}\n```\n\n最后这段代码使用了 `Map` 类，创建了一个包含相应 REST 服务参数的实例，随后将其传递给 `RestTemplate` 类的\
  \ `getForObject` 方法。通过向各种 `RestTemplate` 方法传递一系列 `String` 参数或单个 `Map` 参数所获得的结果是相同的。\n\
  \n#### 以映射对象形式检索数据\n\n除了返回一个字符串供应用程序使用外，我们还可以（重复）使用 `Members` 和 `Member` 类来映射结果。无需将\
  \ `String.class` 作为第二个参数传入，而是传入 `Members.class`，响应结果将被映射到该类上：\n\n```\npackage com.apress.spring6recipes.court;\n\
  import com.apress.spring6recipes.court.domain.Members;\nimport org.springframework.web.client.RestTemplate;\n\
  public class Main {\npublic static void main(String[] args) {\nvar uri = \"http://localhost:8080/court/members\"\
  ;\nvar restTemplate = new RestTemplate();\nvar result = restTemplate.getForObject(uri,\
  \ Members.class);\nSystem.out.println(result);\n}\n}\n```\n\n`RestTemplate` 使用了与带有\
  \ `@ResponseBody` 标记方法的控制器相同的 `HttpMessageConverter` 基础设施。由于 JAXB2（以及 Jackson）会被自动检测到，因此映射到\
  \ JAXB 映射对象相当容易。\n\n## 3-5. 发布 RSS 和 Atom 订阅源\n\n### 问题\n\n你希望在 Spring 应用程序中发布 RSS\
  \ 或 Atom 订阅源。\n\n### 解决方案\n\nRSS 和 Atom 订阅源已成为发布信息的流行方式。对这些类型订阅源的访问是通过 REST 服务提供的，这意味着构建\
  \ REST 服务是发布 RSS 和 Atom 订阅源的前提条件。除了依赖 Spring 的 REST 支持外，依赖一个专门设计用于处理 RSS 和 Atom\
  \ 订阅源特性的第三方库也很方便。这使得 REST 服务更容易发布这种类型的 XML 负载。为此，我们将使用 [Project Rome](https://rometools.github.io/rome/)。\n\
  \n![](img/314861_5_En_3_Figg_HTML.gif)一个灯泡轮廓图标，代表提示。  尽管 RSS 和 Atom 订阅源通常被归类为新闻订阅源，但它们已经超越了最初仅提供新闻的使用场景。如今，RSS\
  \ 和 Atom 订阅源被用于以跨平台方式（即使用 XML）发布与博客、天气、旅行以及许多其他内容相关的信息。因此，如果你需要以跨平台方式发布任何类型的信息，鉴于\
  \ RSS 和 Atom 订阅源的广泛采用（例如，许多应用程序支持它们，并且许多开发者了解它们的结构），将其作为 RSS 或 Atom 订阅源发布可能是一个极佳的选择。\n\
  \n\n\n### 工作原理\n\n首先，你需要确定希望发布为 RSS 或 Atom 新闻源的信息。这些信息可以存储在关系数据库或文本文件中，通过 JDBC 或\
  \ ORM 访问，也可以作为 Spring Bean 或其他类型构造的一部分。描述如何获取这些信息超出了本教程的范围，因此我们假设你将使用任何你认为合适的方式来访问它。一旦确定了要发布的信息，就需要将其结构化为\
  \ RSS 或 Atom 源，这正是 Project Rome 发挥作用的地方。\n\n如果你不熟悉 Atom 源的结构，以下代码片段展示了该格式的一个示例：\n\
  \n```\n\nExample Feed\n\n2010-08-31T18:30:02Z\n\nJohn Doe\n\nurn:uuid:60a76c80-d399-11d9-b93C-0003939e0af6\n\
  \nAtom-Powered Robots Run Amok\n\nurn:uuid:1225c695-cfb8-4ebb-aaaa-80da344efa6a\n\
  2010-08-31T18:30:02Z\nSome text.\n\n```\n\n以下代码片段展示了 RSS 源结构的一个示例：\n\n```\n\nRSS\
  \ Example\nThis is an example of an RSS feed\nhttp://www.example.org/link.htm\n\
  Mon, 28 Aug 2006 11:12:55 -0400 \nTue, 31 Aug 2010 09:00:00 -0400\n\nItem Example\n\
  This is an example of an Item\nhttp://www.example.org/link.htm\n\nTue, 31 Aug 2010\
  \ 09:00:00 -0400\n\n```\n\n从最后两个片段可以看出，RSS 和 Atom 源只是依赖一系列元素来发布信息的 XML 负载。虽然深入探讨\
  \ RSS 或 Atom 源结构的细节需要一本书的篇幅，但这两种格式都有一系列共同特征；其中最主要的是：\n\n*   它们都有一个元数据部分来描述源的内容（例如，Atom\
  \ 格式的 `<Author>` 和 `<title>` 元素，以及 RSS 格式的 `<description>` 和 `<pubDate>` 元素）。\n\
  *   它们都有重复的元素来描述信息（例如，Atom 源格式的 `<entry>` 元素和 RSS 源格式的 `<item>` 元素）。此外，每个重复元素也都有自己的元素集来进一步描述信息。\n\
  *   它们有多个版本。RSS 版本包括 0.90、0.91 Netscape、0.91 Userland、0.92、0.93、0.94、1.0 和 2.0。Atom\
  \ 版本包括 0.3 和 1.0。Project Rome 允许你根据 Java 代码（例如 `String`、`Map` 或其他此类构造）中的可用信息，创建源的元数据部分、重复元素以及前面提到的任何版本。\n\
  \n要使用 Rome 类，你需要将依赖项添加到类路径中。\n\n*Project Rome 的 Gradle 依赖项*\n\n```\nimplementation\
  \ group: 'com.rometools', name: 'rome', version: '1.18.0'\n```\n\n*Project Rome\
  \ 的 Maven 依赖项*\n\n```\ncom.rometools\nrome\n1.18.0\n\n```\n\n既然你已经了解了 RSS 或 Atom\
  \ 源的结构，以及 Project Rome 在本教程中的作用，让我们来看一个负责向最终用户呈现源的 Spring MVC 控制器：\n\n```\npackage\
  \ com.apress.spring6recipes.court.web;\nimport com.apress.spring6recipes.court.feeds.TournamentContent;\n\
  import org.springframework.stereotype.Controller;\nimport org.springframework.ui.Model;\n\
  import org.springframework.web.bind.annotation.GetMapping;\nimport java.time.LocalDate;\n\
  import java.util.List;\n@Controller\npublic class FeedController {\n@GetMapping(\"\
  /atomfeed\")\npublic String getAtomFeed(Model model) {\nvar date = LocalDate.now();\n\
  var tournaments = List.of(\nTournamentContent.of(\"ATP\", date, \"Australian Open\"\
  , \"www.australianopen.com\"),\nTournamentContent.of(\"ATP\", date, \"Roland Garros\"\
  , \"www.rolandgarros.com\"),\nTournamentContent.of(\"ATP\", date, \"Wimbledon\"\
  , \"www.wimbledon.org\"),\nTournamentContent.of(\"ATP\", date, \"US Open\", \"www.usopen.org\"\
  ));\nmodel.addAttribute(\"feedContent\", tournaments);\nreturn \"atomfeedtemplate\"\
  ;\n}\n@GetMapping(\"/rssfeed\")\npublic String getRSSFeed(Model model) {\nprepareModel(model);\n\
  return \"rssfeedtemplate\";\n}\nprivate void prepareModel(Model model) {\nvar date\
  \ = LocalDate.now();\nvar tournaments = List.of(\nTournamentContent.of(\"FIFA\"\
  , date, \"World Cup\", \"www.fifa.com/worldcup/\"),\nTournamentContent.of(\"FIFA\"\
  , date, \"U-20 World Cup\", \"www.fifa.com/u20worldcup/\"),\nTournamentContent.of(\"\
  FIFA\", date, \"U-17 World Cup\", \"www.fifa.com/u17worldcup/\"),\nTournamentContent.of(\"\
  FIFA\", date, \"Confederations Cup\", \"www.fifa.com/confederationscup/\"));\nmodel.addAttribute(\"\
  feedContent\", tournaments);\n}\n}\n```\n\n最后一个 Spring MVC 控制器有两个处理方法：一个名为 `getAtomFeed()`，映射到形如\
  \ `http://[host_name]/[app-name]/atomfeed` 的 URL；另一个名为 `getRSSFeed()`，映射到形如 `http://[host_name]/[app-name]/rssfeed`\
  \ 的 URL。\n\n每个处理方法都定义了一个 `TournamentContent` 对象的 `List`，其中 `TournamentContent` 对象的支持类是一个\
  \ POJO。然后，这个 `List` 被分配给处理方法的模型对象，以便返回的视图可以访问它。每个处理方法的返回逻辑视图分别是 `atomfeedtemplate`\
  \ 和 `rssfeedtemplate`。这些逻辑视图在 Spring 配置类中以如下方式定义：\n\n```\npackage com.apress.spring6recipes.court.web.config;\n\
  import com.apress.spring6recipes.court.feeds.AtomFeedView;\nimport com.apress.spring6recipes.court.feeds.RSSFeedView;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.web.servlet.config.annotation.EnableWebMvc;\n\
  import org.springframework.web.servlet.view.BeanNameViewResolver;\n@Configuration\n\
  @EnableWebMvc\n@ComponentScan(basePackages = \"com.apress.spring6recipes.court\"\
  )\npublic class CourtRestConfiguration {\n@Bean\npublic AtomFeedView atomfeedtemplate()\
  \ {\nreturn new AtomFeedView();\n}\n@Bean\npublic RSSFeedView rssfeedtemplate()\
  \ {\nreturn new RSSFeedView();\n}\n}\n```\n\n如你所见，每个逻辑视图都映射到一个类。每个类负责实现构建 Atom 或\
  \ RSS 视图所需的逻辑。如果你还记得第 2 章，我们使用了相同的方法（即使用类）来实现 PDF 和 Excel 视图。\n\n对于 Atom 和 RSS 视图，Spring\
  \ 提供了两个专门构建在 Project Rome 基础上的类。这些类是 `AbstractAtomFeedView` 和 `AbstractRssFeedView`。这些类提供了构建\
  \ Atom 或 RSS 源的基础，而无需处理每种格式的细节。\n\n以下列表展示了 `AtomFeedView` 类，它实现了 `AbstractAtomFeedView`\
  \ 类，并用于支持 `atomfeedtemplate` 逻辑视图：\n\n```\npackage com.apress.spring6recipes.court.feeds;\n\
  import com.rometools.rome.feed.atom.Content;\nimport com.rometools.rome.feed.atom.Entry;\n\
  import com.rometools.rome.feed.atom.Feed;\nimport jakarta.servlet.http.HttpServletRequest;\n\
  import jakarta.servlet.http.HttpServletResponse;\nimport org.springframework.web.servlet.view.feed.AbstractAtomFeedView;\n\
  import java.time.LocalDate;\nimport java.time.ZoneId;\nimport java.time.format.DateTimeFormatter;\n\
  import java.util.Date;\nimport java.util.List;\nimport java.util.Map;\nimport java.util.stream.Collectors;\n\
  public class AtomFeedView extends AbstractAtomFeedView {\n@Override\nprotected void\
  \ buildFeedMetadata(Map model, Feed feed,\nHttpServletRequest request) {\nfeed.setId(\"\
  tag:tennis.org\");\nfeed.setTitle(\"Grand Slam Tournaments\");\n@SuppressWarnings({\
  \ \"unchecked\" })\nvar tournaments = (List) model.get(\"feedContent\");\nvar updated\
  \ = tournaments.stream()\n.map(TournamentContent::publicationDate).sorted().findFirst()\n\
  .map(this::toDate).orElse(null);\nfeed.setUpdated(updated);\n}\n@Override\nprotected\
  \ List buildFeedEntries(Map model,\nHttpServletRequest request,\nHttpServletResponse\
  \ response) {\n@SuppressWarnings({ \"unchecked\" })\nvar tournaments = (List) model.get(\"\
  feedContent\");\nreturn tournaments.stream().map(this::toEntry).collect(Collectors.toList());\n\
  }\nprivate Entry toEntry(TournamentContent tc) {\nvar summary = new Content();\n\
  summary.setValue(String.format(\"%s - %s\", tc.name(), tc.link()));\nvar entry =\
  \ new Entry();\nvar date = DateTimeFormatter.ISO_DATE.format(tc.publicationDate());\n\
  entry.setId(String.format(\"tag:tennis.org,%s:%d\", date, tc.id()));\nentry.setTitle(String.format(\"\
  %s - Posted by %s\", tc.name(), tc.author()));\nentry.setUpdated(toDate(tc.publicationDate()));\n\
  entry.setSummary(summary);\nreturn entry;\n}\nprivate Date toDate(LocalDate in)\
  \ {\nreturn Date.from(in.atStartOfDay(ZoneId.systemDefault()).toInstant());\n}\n\
  }\n```\n\n关于这个类，首先要注意的是，除了实现 Spring 框架提供的 `AbstractAtomFeedView` 类之外，它还从 `com.sun.syndication.feed.atom`\
  \ 包中导入了几个 Project Rome 类。这样做之后，接下来唯一需要做的就是为从 `AbstractAtomFeedView` 类继承的两个方法提供源的实现细节：`buildFeedMetadata`\
  \ 和 `buildFeedEntries`。\n\n`buildFeedMetadata` 方法有三个输入参数：一个 `Map` 对象，表示用于构建源的数据（即在处理方法内部分配的数据，本例中是一个\
  \ `TournamentContent` 对象的 `List`）；一个基于 Project Rome 类的 `Feed` 对象，用于操作源本身；以及一个 `HttpServletRequest`\
  \ 对象，以防需要操作 HTTP 请求。\n\n在 `buildFeedMetadata` 方法内部，你可以看到对 `Feed` 对象的 setter 方法（例如\
  \ `setId`、`setTitle`、`setUpdated`）进行了多次调用。其中两次调用使用了硬编码字符串，而另一次调用则使用了在遍历源数据（即 Map\
  \ 对象）后确定的值。所有这些调用都代表了对 Atom 源元数据信息的赋值。\n\n![](img/314861_5_En_3_Figh_HTML.gif)一个信息符号，由带阴影圆圈内的字母\
  \ i 图标表示。  如果你想为 Atom 源的元数据部分分配更多值，并指定特定的 Atom 版本，请查阅 Project Rome 的 API。默认版本是 Atom\
  \ 1.0。\n\n`buildFeedEntries` 方法也有三个输入参数：一个 `Map` 对象，表示用于构建源的数据（即在处理方法内部分配的数据，本例中是一个\
  \ `TournamentContent` 对象的 `List`）；一个 `HttpServletRequest` 对象，以防需要操作 HTTP 请求；以及一个\
  \ `HttpServletResponse` 对象，以防需要操作 HTTP 响应。同样重要的是要注意，`buildFeedEntries` 方法返回一个对象的\
  \ `List`，在本例中，它对应于一个基于 Project Rome 类的 `Entry` 对象的 `List`，并包含 Atom 源的重复元素。\n\n在\
  \ `buildFeedEntries` 方法内部，你可以看到访问了 `Map` 对象以获取在处理方法内部分配的 `feedContent` 对象。完成后，创建一个空的\
  \ `Entry` 对象 `List`。接下来，对包含 `TournamentContent` 对象 `List` 的 `feedContent` 对象执行循环，并为每个元素创建一个\
  \ `Entry` 对象，将其分配给顶层的 `Entry` 对象 `List`。循环结束后，该方法返回一个填充好的 `Entry` 对象 `List`。\n\n\
  ![](img/314861_5_En_3_Figi_HTML.gif)一个信息符号，由带阴影圆圈内的字母 i 图标表示。  如果你想为 Atom 源的重复元素部分分配更多值，请查阅\
  \ Project Rome 的 API。\n\n在部署最后一个类以及前面提到的 Spring MVC 控制器后，访问形如 `http://[host_name]/[app-name]/atomfeed.atom`\
  \ 的 URL 将产生以下响应：\n\n```\nGrand Slam Tournaments\ntag:tennis.org\n2022-12-23T00:00:00Z\n\
  \nAustralian Open - Posted by ATP\ntag:tennis.org,2022-12-23:9\n2022-12-23T00:00:00Z\n\
  Australian Open - www.australianopen.com\n\nRoland Garros - Posted by ATP\ntag:tennis.org,2022-12-23:10\n\
  2022-12-23T00:00:00Z\nRoland Garros - www.rolandgarros.com\n\nWimbledon - Posted\
  \ by ATP\ntag:tennis.org,2022-12-23:11\n2022-12-23T00:00:00Z\nWimbledon - www.wimbledon.org\n\
  \nUS Open - Posted by ATP\ntag:tennis.org,2022-12-23:12\n2022-12-23T00:00:00Z\n\
  US Open - www.usopen.org\n\nGrand Slam Tournaments\ntag:tennis.org\n2017-05-19T01:32:52Z\n\
  \nAustralian Open - Posted by ATP\ntag:tennis.org,2017-05-19:5\n2017-05-19T01:32:52Z\n\
  Australian Open - www.australianopen.com\n\nRoland Garros - Posted by ATP\ntag:tennis.org,2017-05-19:6\n\
  2017-05-19T01:32:52Z\nRoland Garros - www.rolandgarros.com\n\nWimbledon - Posted\
  \ by ATP\ntag:tennis.org,2017-05-19:7\n2017-05-19T01:32:52Z\nWimbledon - www.wimbledon.org\n\
  \nUS Open - Posted by ATP\ntag:tennis.org,2017-05-19:8\n2017-05-19T01:32:52Z\nUS\
  \ Open - www.usopen.org\n\n```\n\n现在将注意力转向前面负责构建 RSS 源的 Spring MVC 控制器中的另一个处理方法——`getRSSFeed`，你会看到该过程与刚刚描述的构建\
  \ Atom 源的过程类似。该处理方法也创建了一个 `TournamentContent` 对象的 `List`，然后将其分配给处理方法的模型对象，以便返回的视图可以访问它。不过，本例中返回的逻辑视图现在对应于名为\
  \ `rssfeedtemplate` 的视图。如前所述，此逻辑视图映射到一个名为 `RssFeedView` 的类。\n\n以下列表展示了 `RssFeedView`\
  \ 类，它实现了 `AbstractRssFeedView` 类：\n\n```\npackage com.apress.spring6recipes.court.feeds;\n\
  import com.rometools.rome.feed.rss.Channel;\nimport com.rometools.rome.feed.rss.Item;\n\
  import jakarta.servlet.http.HttpServletRequest;\nimport jakarta.servlet.http.HttpServletResponse;\n\
  import org.springframework.web.servlet.view.feed.AbstractRssFeedView;\nimport java.time.LocalDate;\n\
  import java.time.ZoneId;\nimport java.util.Date;\nimport java.util.List;\nimport\
  \ java.util.Map;\nimport java.util.stream.Collectors;\npublic class RSSFeedView\
  \ extends AbstractRssFeedView {\n@Override\nprotected void buildFeedMetadata(Map\
  \ model, Channel feed,\nHttpServletRequest request) {\nfeed.setTitle(\"World Soccer\
  \ Tournaments\");\nfeed.setDescription(\"FIFA World Soccer Tournament Calendar\"\
  );\nfeed.setLink(\"fifa.com\");\n@SuppressWarnings({ \"unchecked\" })\nvar tournaments\
  \ = (List) model.get(\"feedContent\");\nvar lastBuildDate = tournaments.stream()\n\
  .map(TournamentContent::publicationDate).sorted().findFirst()\n.map(this::toDate).orElse(null);\n\
  feed.setLastBuildDate(lastBuildDate);\n}\n@Override\nprotected List buildFeedItems(Map\
  \ model,\nHttpServletRequest request,\nHttpServletResponse response) {\n@SuppressWarnings({\
  \ \"unchecked\" })\nvar tournamentList = (List) model.get(\"feedContent\");\nreturn\
  \ tournamentList.stream().map(this::toItem).collect(Collectors.toList());\n}\nprivate\
  \ Item toItem(TournamentContent tc) {\nvar item = new Item();\nitem.setAuthor(tc.author());\n\
  item.setTitle(String.format(\"%s - Posted by %s\", tc.name(), tc.author()));\nitem.setPubDate(toDate(tc.publicationDate()));\n\
  item.setLink(tc.link());\nreturn item;\n}\nprivate Date toDate(LocalDate in) {\n\
  return Date.from(in.atStartOfDay(ZoneId.systemDefault()).toInstant());\n}\n}\n```\n\
  \n关于这个类，首先要注意的是，除了实现 Spring 框架提供的 `AbstractRssFeedView` 类之外，它还从 `com.sun.syndication.feed.rss`\
  \ 包中导入了几个 Project Rome 类。这样做之后，接下来唯一需要做的就是为从 `AbstractRssFeedView` 类继承的两个方法提供源的实现细节：`buildFeedMetadata`\
  \ 和 `buildFeedItems`。`buildFeedMetadata` 方法在本质上与用于构建 Atom 源的同名方法类似。注意，`buildFeedMetadata`\
  \ 方法操作的是一个基于 Project Rome 类的 `Channel` 对象（用于构建 RSS 源），而不是用于构建 Atom 源的 `Feed` 对象。对\
  \ `Channel` 对象进行的 setter 方法调用（例如 `setTitle`、`setDescription`、`setLink`）代表了对 RSS\
  \ 源元数据信息的赋值。`buildFeedItems` 方法，其名称与 Atom 对应的 `buildFeedEntries` 不同，之所以如此命名，是因为\
  \ Atom 源的重复元素称为 entries，而 RSS 源的重复元素称为 items。除了命名约定之外，它们的逻辑是相似的。\n\n在 `buildFeedItems`\
  \ 方法内部，你可以看到访问了 `Map` 对象以获取在处理方法内部分配的 `feedContent` 对象。完成后，创建一个空的 `Item` 对象 `List`。接下来，对包含\
  \ `TournamentContent` 对象 `List` 的 `feedContent` 对象执行循环，并为每个元素创建一个 `Item` 对象，将其分配给顶层的\
  \ `Item` 对象 `List`。循环结束后，该方法返回一个填充好的 `Item` 对象 `List`。\n\n![](img/314861_5_En_3_Figj_HTML.gif)一个信息符号，由带阴影圆圈内的字母\
  \ i 图标表示。  如果你想为 RSS 源的元数据和重复元素部分分配更多值，并指定特定的 RSS 版本，请查阅 Project Rome 的 API。默认版本是\
  \ RSS 2.0。\n\n当你部署最后一个类以及前面提到的 Spring MVC 控制器后，访问形如 `http://[host_name]/rssfeed.rss`（或\
  \ `http://[host_name]/rssfeed.xml`）的 URL 将产生以下响应：\n\n```\n\nWorld Soccer Tournaments\n\
  fifa.com\nFIFA World Soccer Tournament Calendar\nFri, 23 Dec 2022 00:00:00 GMT\n\
  \nWorld Cup - Posted by FIFA\nwww.fifa.com/worldcup/\nFri, 23 Dec 2022 00:00:00\
  \ GMT\nFIFA\n\nU-20 World Cup - Posted by FIFA\nwww.fifa.com/u20worldcup/\nFri,\
  \ 23 Dec 2022 00:00:00 GMT\nFIFA\n\nU-17 World Cup - Posted by FIFA\nwww.fifa.com/u17worldcup/\n\
  Fri, 23 Dec 2022 00:00:00 GMT\nFIFA\n\nConfederations Cup - Posted by FIFA\nwww.fifa.com/confederationscup/\n\
  Fri, 23 Dec 2022 00:00:00 GMT\nFIFA\n\n```\n\n\n\n## 3-6\\. 响应写入器\n\n### 问题\n\n\
  你有一个服务或多次调用，并希望将响应分块发送给客户端。\n\n### 解决方案\n\n使用 `ResponseBodyEmitter`（或其同类 `SseEmitter`）来分块发送响应。\n\
  \n### 工作原理\n\n#### 在响应中发送多个结果\n\nSpring MVC 有一个名为 `ResponseBodyEmitter` 的类，当你希望向客户端返回多个对象，而不是单个结果（如视图名称或\
  \ `ModelAndView`）时，它特别有用。发送对象时，会使用 `HttpMessageConverter` 将其转换为结果。要使用 `ResponseBodyEmitter`，你需要以异步方式从请求处理方法中返回它（有关异步控制器的更多信息，请参见配方\
  \ 2-12）。\n\n修改 `RestMemberController` 的 `getRestMembers` 方法，使其返回一个 `ResponseBodyEmitter`，并将结果逐个发送给客户端：\n\
  \n```\npackage com.apress.spring6recipes.court.web;\nimport com.apress.spring6recipes.court.domain.Member;\n\
  import com.apress.spring6recipes.court.service.MemberService;\nimport com.apress.spring6recipes.utils.Utils;\n\
  import org.springframework.core.task.TaskExecutor;\nimport org.springframework.web.bind.annotation.GetMapping;\n\
  import org.springframework.web.bind.annotation.RequestMapping;\nimport org.springframework.web.bind.annotation.RestController;\n\
  import org.springframework.web.servlet.mvc.method.annotation.ResponseBodyEmitter;\n\
  import java.io.IOException;\nimport java.time.Duration;\n@RestController\n@RequestMapping(\"\
  /members\")\npublic class RestMemberController {\nprivate final MemberService memberService;\n\
  private final TaskExecutor taskExecutor;\npublic RestMemberController(MemberService\
  \ memberService, TaskExecutor taskExecutor) {\nthis.memberService = memberService;\n\
  this.taskExecutor = taskExecutor;\n}\n@GetMapping\npublic ResponseBodyEmitter getRestMembers()\
  \ {\nvar emitter = new ResponseBodyEmitter();\ntaskExecutor.execute(() -> {\nvar\
  \ members = memberService.findAll();\ntry {\nfor (var member : members) {\nemitter.send(member);\n\
  Utils.sleep(Duration.ofMillis(25));\n}\nemitter.complete();\n} catch (IOException\
  \ ex) {\nemitter.completeWithError(ex);\n}\n});\nreturn emitter;\n}\n}\n```\n\n\
  首先，创建一个 `ResponseBodyEmitter`，并在方法末尾返回它。接着，执行一个任务，该任务将使用 `MemberService.findAll`\
  \ 方法查找所有成员。该调用的所有结果都通过 `ResponseBodyEmitter` 的 `send` 方法逐个返回（我们在元素之间添加了一个小延迟）。当所有对象都发送完毕后，需要调用\
  \ `complete()` 方法，以便负责发送响应的线程可以完成请求并释放出来处理下一个响应。当发生异常并且你想通知用户时，可以调用 `completeWithError`；该异常将通过\
  \ Spring MVC 的正常异常处理流程（另请参见配方 2-8），之后响应完成。\n\n当使用 HTTPie 或 cURL 等工具时，调用 URL `http://localhost:8080/court/members`\
  \ 将产生类似以下的结果。结果将被分块，状态码为 200（OK）（图 3-3）。\n\n![](img/314861_5_En_3_Fig3_HTML.jpg)\n\
  \n截图包含：H T T P 斜杠 1 点 1 200。连接为 keep alive，日期，Keep-Alive 为超时 20，传输编码为 chunked。分块结果包含以段落形式书写的\
  \ 3 个人的详细信息。\n\n图 3-3\n\n分块结果\n\n如果你想更改状态码或添加自定义标头，也可以将 `ResponseBodyEmitter` 包装在\
  \ `ResponseEntity` 中，这样可以自定义返回码、标头等：\n\n```\n@GetMapping\npublic ResponseEntity\
  \ getRestMembers() {\nvar emitter = new ResponseBodyEmitter();\n....\nreturn ResponseEntity.status(HttpStatus.I_AM_A_TEAPOT)\n\
  .header(\"Custom-Header\", \"Custom-Value\")\n.body(emitter);\n}\n```\n\n现在状态码将更改为\
  \ `418`，并且会包含一个自定义标头（见图 3-4）。\n\n![](img/314861_5_En_3_Fig4_HTML.jpg)\n\n截图包含：H\
  \ T T P 斜杠 1 点 1 418。连接为 keep alive，自定义标头为 custom value，日期，Keep-Alive 为超时 20，传输编码为\
  \ chunked。结果包含以段落形式书写的 3 个人的详细信息。\n\n图 3-4\n\n修改后的分块结果\n\n\n\n#### 以事件形式发送多个结果\n\
  \n`ResponseBodyEmitter` 有一个同类组件叫 `SseEmitter`，它能够将事件从服务器推送给客户端。这利用了服务器发送事件（Server-Sent\
  \ Events）技术。服务器发送事件是从服务器端发往客户端的消息，其内容类型标头为 `text/event-stream`。它们非常轻量，允许定义四个字段（参见表\
  \ 3-3）。\n\n表 3-3\n\n服务器发送事件允许的字段\n\n| 字段 | 描述 |\n| --- | --- |\n| `id` | 事件的 ID\
  \ |\n| `event` | 事件的类型 |\n| `data` | 事件数据 |\n| `retry` | 事件流的重新连接时间 |\n\n要从请求处理方法发送事件，你需要创建一个\
  \ `SseEmitter` 实例，并将其从请求处理方法中返回。然后使用 `send` 方法向客户端发送单个元素：\n\n```\n@GetMapping\n\
  public ResponseBodyEmitter getRestMembers() {\nvar emitter = new SseEmitter();\n\
  taskExecutor.execute(() -> {\nvar members = memberService.findAll();\ntry {\nfor\
  \ (var member : members) {\nemitter.send(member);\nUtils.sleep(Duration.ofMillis(50));\n\
  }\nemitter.complete();\n} catch (IOException ex) {\nemitter.completeWithError(ex);\n\
  }\n});\nreturn emitter;\n}\n```\n\n![](img/314861_5_En_3_Figk_HTML.gif)一个信息符号，由阴影圆圈内字母\
  \ i 的图标表示。 向客户端发送每个项目时会有延迟，这样你才能看到不同的事件依次传入。在实际代码中你不会这样做。\n\n现在，当你使用 cURL 或 HTTPie\
  \ 之类的工具调用 URL `http://localhost:8080/court/members` 时，你会看到事件一个接一个地传入（图 3-5）。\n\n\
  ![](img/314861_5_En_3_Fig5_HTML.jpg)\n\n截图内容包括：HTTP/1.1 200。连接方式为 keep-alive，内容类型为\
  \ text/event-stream，日期，Keep-Alive 超时时间为 20，传输编码为 chunked。数据结果分为 3 段。\n\n图 3-5\n\n\
  服务器发送事件的结果\n\n注意 `Content-Type` 标头；其值为 `text/event-stream`，表示我们获取的是一个事件流。我们可以保持流打开状态，持续接收事件通知。你还会注意到，每个写入的对象都会被转换为\
  \ JSON；这是通过 `HttpMessageConverter` 完成的，就像普通的 `ResponseBodyEmitter` 一样。每个对象都作为事件数据写入\
  \ `data` 标签中。\n\n如果你想向事件添加更多信息（填写表 3-3 中提到的其他字段），可以使用 `SseEventBuilder`；要获取其实例，可以调用\
  \ `SseEmitter` 上的 `event()` 工厂方法。让我们用它来用 `Member` 的哈希码填充 `id` 字段：\n\n```\n@GetMapping\n\
  public ResponseBodyEmitter getRestMembers() {\nvar emitter = new SseEmitter();\n\
  taskExecutor.execute(() -> {\nvar members = memberService.findAll();\ntry {\nfor\
  \ (var member : members) {\nvar data = SseEmitter.event()\n.id(String.valueOf(member.hashCode()))\n\
  .data(member);\nemitter.send(data);\nUtils.sleep(Duration.ofMillis(50));\n}\nemitter.complete();\n\
  } catch (IOException ex) {\nemitter.completeWithError(ex);\n}\n});\nreturn emitter;\n\
  }\n```\n\n现在，当你使用 cURL 之类的工具调用 URL `http://localhost:8080/court/members` 时，你会看到事件一个接一个地传入，并且现在它们同时包含\
  \ `id` 和 `data` 字段（参见图 3-6）。\n\n![](img/314861_5_En_3_Fig6_HTML.jpg)\n\n截图内容包括：HTTP/1.1\
  \ 200。连接方式为 keep-alive，内容类型为 text/event-stream，日期，Keep-Alive 超时时间为 20，传输编码为 chunked。结果包含以段落形式书写的\
  \ 3 个人的详细信息。数据结果分为 3 段，并附有 ID。\n\n图 3-6\n\n服务器发送事件的结果\n\n## 3-7\\. 总结\n\n在本章中，你学习了如何使用\
  \ Spring 开发和访问 REST 服务。REST 服务与 Spring MVC 紧密相关，控制器负责分发对 REST 服务的请求，以及访问第三方 REST\
  \ 服务以获取信息用于应用程序内容。\n\n你学习了 REST 服务如何利用 Spring MVC 控制器中使用的注解，包括用于指示服务端点的 @RequestMapping，以及用于指定过滤服务负载的访问参数的\
  \ `@PathVariable`。此外，你还了解了 Spring 的 XML 编组器，例如 `Jaxb2Marshaller`，它允许将应用程序对象转换为 XML\
  \ 并作为 REST 服务的负载输出。你还学习了 Spring 的 `RestTemplate` 类，以及它如何支持一系列 HTTP 方法，包括 HEAD、GET、POST、PUT\
  \ 和 DELETE——所有这些方法都允许你直接从 Spring 应用程序的上下文中访问第三方 REST 服务并对其执行操作。\n\n接下来，你探索了如何通过利用\
  \ Project Rome API 在 Spring 应用程序中发布 Atom 和 RSS 提要。\n\n最后，你快速了解了用于向客户端异步发送内容的 `ResponseBodyEmitter`\
  \ 和 `SseEmitter`。\n\n"
- "# 4. Spring WebFlux\n\n当 Servlet API 最初发布时，大多数实现容器都采用每个请求一个线程的模式，这意味着线程会被阻塞，直到请求处理完成并将响应发送给客户端。然而，在早期，连接到互联网的设备远没有现在这么多。由于设备数量的增加，处理的\
  \ HTTP 请求数量也显著增长。由于这种增长，对于许多 Web 应用程序来说，保持线程阻塞已不再可行。在过去几年中，响应式编程兴起，借助 Spring，可以编写响应式\
  \ Web 应用程序。为了实现响应式，Spring 利用 [Project Reactor](https://projectreactor.io/) 作为 Reactive\
  \ Streams API 的实现。深入探讨响应式编程超出了本书的范围，但简而言之，它是一种进行非阻塞函数式编程的方式。\n\n传统上，在使用 Web 应用程序时，会有一个请求，HTML\
  \ 在服务器端渲染，然后发送回客户端。在过去几年中，HTML 的渲染转移到了客户端，通信不再通过 HTML 进行，而是通过向客户端返回 JSON、XML 或其他表示形式。这传统上仍然是一个请求和响应周期，尽管是通过客户端通过\
  \ `XmlHttpRequest` 进行的异步调用来驱动的。然而，客户端和服务器之间还有其他通信方式。可以利用服务器发送事件实现从服务器到客户端的单向通信，而对于全双工通信，则可以使用\
  \ WebSocket。\n\n## 4-1\\. 使用 Spring WebFlux 开发响应式应用程序\n\n### 问题\n\n你想使用 Spring WebFlux\
  \ 开发一个简单的响应式 Web 应用程序，以学习该框架的基本概念和配置。\n\n\n\n### 解决方案\n\nSpring WebFlux 最底层的组件是\
  \ `org.springframework.http.server.reactive.HttpHandler`；这是一个包含单个 `handle` 方法的接口：\n\
  \n```\npackage org.springframework.http.server.reactive;\nimport reactor.core.publisher.Mono;\n\
  public interface HttpHandler {\nMono handle(ServerHttpRequest request, ServerHttpResponse\
  \ response);\n}\n```\n\n`handle` 方法返回一个 `reactor.core.publisher.Mono<Void>`，这是响应式编程中表示返回\
  \ `void` 的方式。它接收两个参数：`ServerHttpRequest` 和 `ServerHttpResponse`，两者均来自 `org.springframework.http.server.reactive`\
  \ 包。这些同样是接口，根据运行时所使用的容器，会创建接口的实例。为此，存在多个针对容器的适配器或桥接器。当在 Servlet 容器（支持非阻塞 IO）上运行时，会使用\
  \ `ServletHttpHandlerAdapter`（或其子类之一）将普通 Servlet 世界适配到响应式世界。当在原生响应式引擎（如 [Netty](https://projectreactor.io/docs/netty/release/reference/index.html)）上运行时，则会使用\
  \ `ReactorHttpHandlerAdapter`。\n\n当 Web 请求发送到 Spring WebFlux 应用程序时，`HandlerAdapter`\
  \ 首先接收该请求。然后，它会组织 Spring 应用上下文中配置的、处理请求所需的各种组件。\n\n要在 Spring WebFlux 中定义控制器类，必须使用\
  \ `@Controller` 或 `@RestController` 注解标记该类（与 Spring MVC 相同——请参阅第 3 章和第 4 章），或者你也可以使用\
  \ `RouterFunction` 以函数式方式编写它们。\n\n当带有 `@Controller` 注解的类（即控制器类）接收到请求时，它会寻找合适的处理方法（handler\
  \ method）来处理该请求。这要求控制器类通过一个或多个处理器映射（handler mappings）将每个请求映射到一个处理方法。为此，控制器类的方法会使用\
  \ `@RequestMapping` 注解进行修饰，使其成为处理方法。\n\n这些处理方法的签名——正如你对任何标准类所期望的那样——是开放式的。你可以为处理方法指定任意名称，并定义各种方法参数。同样，处理方法可以根据其实现的应用程序逻辑，返回一系列值中的任何一种（例如，字符串或\
  \ void）。以下仅是有效参数类型的部分列表，旨在让你有所了解：\n\n*   `ServerHttpRequest` 或 `ServerHttpResponse`\n\
  *   来自 URL 的任意类型的请求参数，使用 `@RequestParam` 注解\n*   任意类型的模型属性，使用 `@ModelAttribute`\
  \ 注解\n*   传入请求中包含的 Cookie 值，使用 `@CookieValue` 注解\n*   任意类型的请求头值，使用 `@RequestHeader`\
  \ 注解\n*   任意类型的请求属性，使用 `@RequestAttribute` 注解\n*   `Map` 或 `ModelMap`，供处理方法向模型添加属性\n\
  *   `WebSession`，用于会话\n\n一旦控制器类选定了合适的处理方法，它就会使用该请求调用处理方法的逻辑。通常，控制器的逻辑会调用后端服务来处理请求。此外，处理方法的逻辑可能会向众多输入参数（例如\
  \ `ServerHttpRequest`、`Map` 或 `Errors`）中添加或移除信息，这些参数将构成后续流程的一部分。\n\n在处理方法完成请求处理后，它会向客户端返回一个值。通常，该值会被序列化为\
  \ JSON 或 XML（参见配方 4-2）以供客户端消费。但它也可以是待渲染视图的名称（参见配方 4-4）。\n\n### 工作原理\n\n让我们创建一个简单的控制器，它可选地接受一个名称，并向客户端返回一条消息。\n\
  \n首先，我们需要 Spring WebFlux 的配置，然后是引导 Netty 并将配置传递给它所需的代码。最后，我们将编写控制器以响应式方式向客户端返回消息。\n\
  \n#### 设置 Spring WebFlux 应用程序\n\n在能够使用和操作 Spring WebFlux 之前，你需要在类路径中添加一些依赖项，最明显的是\
  \ `spring-webflux`。为了充分利用应用程序的响应式特性，你还需要一个响应式运行时。这里我们选择使用 Project Reactor Netty。\n\
  \n*WebFlux 和 Netty 的 Gradle 依赖项*\n\n```\nimplementation group: 'org.springframework',\
  \ name: 'spring-webflux', version: '6.0.3'\nimplementation group: 'io.projectreactor.netty',\
  \ name: 'reactor-netty-http', version: '1.1.0'\n```\n\n*WebFlux 和 Netty 的 Maven\
  \ 依赖项*\n\n```\n<dependency>\n    <groupId>org.springframework</groupId>\n    <artifactId>spring-webflux</artifactId>\n\
  \    <version>6.0.3</version>\n</dependency>\n<dependency>\n    <groupId>io.projectreactor.netty</groupId>\n\
  \    <artifactId>reactor-netty-http</artifactId>\n    <version>1.1.0</version>\n\
  </dependency>\n```\n\n为了能够以响应式方式处理请求，你需要启用 WebFlux。这可以通过在 `@Configuration` 类上添加\
  \ `@EnableWebFlux` 来实现：\n\n```\npackage com.apress.spring6recipes.reactive.court;\n\
  import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.web.reactive.config.EnableWebFlux;\nimport org.springframework.web.reactive.config.WebFluxConfigurer;\n\
  @Configuration\n@EnableWebFlux\n@ComponentScan\npublic class WebFluxConfiguration\
  \ implements WebFluxConfigurer { }\n```\n\n`@EnableWebFlux` 注解正是开启响应式处理的关键。为了进一步配置\
  \ WebFlux，你可以实现 `WebFluxConfigurer` 并添加额外的转换器、视图解析器、编解码器等。\n\n\n\n#### 引导应用程序\n\n\
  如何引导应用程序在一定程度上取决于你选择运行的运行时环境。对于所有受支持的容器（见表 4-1），都有不同的处理器适配器，以便运行时能够与 Spring WebFlux\
  \ 的 `HttpHandler` 抽象协同工作。所有适配器类都位于 `org.springframework.http.server.reactive` 包中。\n\
  \n表 4-1\n\n受支持的运行时环境与处理器适配器\n\n| 运行时环境 | 适配器 |\n| --- | --- |\n| 任何 Servlet 容器 |\
  \ `ServletHttpHandlerAdapter` |\n| Tomcat | `TomcatHttpHandlerAdapter` |\n| Jetty\
  \ | `ServletHttpHandlerAdapter` |\n| Reactor Netty | `ReactorHttpHandlerAdapter`\
  \ |\n| Reactor Netty 5 | `ReactorNetty2HttpHandlerAdapter` |\n| Undertow | `UndertowHttpHandlerAdapter`\
  \ |\n\n![](img/314861_5_En_4_Figa_HTML.gif)一个带阴影圆圈的字母 i 图标，代表信息符号。 对于 Tomcat 和 Jetty，都可以使用常规的\
  \ `ServletHttpHandlerAdapter`；但为了更好的集成，建议使用特定于该容器的适配器。\n\n在适配到运行时环境之前，你需要使用 `AnnotationConfigApplicationContext`\
  \ 来引导应用程序，并用它来配置一个 `HttpHandler`。为了更轻松地配置 `HttpHandler`，可以使用 `HttpWebHandlerAdapter`\
  \ 为给定的 `ApplicationContext` 进行配置：\n\n```\nvar context = new AnnotationConfigApplicationContext(WebFluxConfiguration.class);\n\
  var handler = WebHttpHandlerBuilder.applicationContext(context).build();\n```\n\n\
  接下来，你需要将 `HttpHandler` 适配到运行时环境。\n\n对于 Reactor Netty，代码大致如下：\n\n```\nvar adapter\
  \ = new ReactorHttpHandlerAdapter(handler);\nHttpServer.create().host(\"0.0.0.0\"\
  ).port(8080).handle(adapter).bind().block();\nSystem.in.read();\n```\n\n首先，创建一个\
  \ `ReactorHttpHandlerAdapter`，该组件知道如何将 Reactor Netty 的处理方式适配到内部的 `HttpHandler`。接着，将此适配器作为处理器注册到新创建的\
  \ Reactor Netty 服务器上。\n\n当将应用程序部署到 Servlet 容器时，你可以创建一个实现 `WebApplicationInitializer`\
  \ 的类，并手动进行设置：\n\n```\npackage com.apress.spring6recipes.reactive.court;\nimport\
  \ jakarta.servlet.ServletContext;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import org.springframework.http.server.reactive.ServletHttpHandlerAdapter;\nimport\
  \ org.springframework.web.WebApplicationInitializer;\nimport org.springframework.web.server.adapter.WebHttpHandlerBuilder;\n\
  public class WebFluxInitializer implements WebApplicationInitializer {\n@Override\n\
  public void onStartup(ServletContext servletContext) {\nvar context = new AnnotationConfigApplicationContext(WebFluxConfiguration.class);\n\
  var httpHandler = WebHttpHandlerBuilder.applicationContext(context).build();\nvar\
  \ adapter = new ServletHttpHandlerAdapter(httpHandler);\nvar registration = servletContext.addServlet(\"\
  dispatcher-handler\", adapter);\nregistration.setLoadOnStartup(1);\nregistration.addMapping(\"\
  /\");\nregistration.setAsyncSupported(true);\n}\n}\n```\n\n首先，创建一个 `AnnotationConfigApplicationContext`，因为你希望使用注解进行配置，并将你的\
  \ `WebFluxConfiguration` 类传递给它。接着，你需要一个 `HttpHandler` 来处理和分发请求；为此，你使用了 `WebHttpHandlerBuilder`\
  \ 类。这个 `HttpHandler` 需要作为 `Servlet` 注册到你正在使用的 Servlet 容器中；因此，你需要将其包装在 `ServletHttpHandlerAdapter`\
  \ 中。为了能够进行响应式处理，`asyncSupported` 需要设置为 `true`。\n\n为了使这个配置更简单，Spring WebFlux 提供了一个便捷的实现，你可以继承\
  \ `AbstractReactiveWebInitializer`。现在的配置如下所示：\n\n```\npackage com.apress.spring6recipes.reactive.court;\n\
  import org.springframework.web.server.adapter.AbstractReactiveWebInitializer;\n\
  public class WebFluxInitializer extends AbstractReactiveWebInitializer {\n@Override\n\
  protected Class[] getConfigClasses() {\nreturn new Class[] { WebFluxConfiguration.class\
  \ };\n}\n}\n```\n\n唯一需要实现的是 `getConfigClasses` 方法。所有其他活动部件现在都由 Spring WebFlux 提供的基础配置来处理。\n\
  \n现在，你已经准备好将应用程序运行在常规的 Servlet 容器上了。\n\n![](img/314861_5_En_4_Figb_HTML.gif)一个带阴影圆圈的字母\
  \ i 图标，代表信息符号。 当在常规的 Servlet 容器上运行时，你不会获得完全的响应式能力。它只会利用 Servlet API 的异步特性和非阻塞 I/O；它不会提供诸如背压和弹性之类的特性（因为它仍然使用\
  \ Tomcat 底层的线程池/阻塞特性）。\n\n\n\n#### 创建 Spring WebFlux 控制器\n\n基于注解的控制器类可以是任意类，无需实现特定接口或继承特定基类。你可以使用\
  \ `@Controller` 或 `@RestController` 注解对其进行标注。一个控制器中可以定义一个或多个处理器方法来处理单个或多个操作。处理器方法的签名足够灵活，可以接受多种参数。（关于请求映射的更多信息，请参见配方\
  \ 2-2。）\n\n`@RequestMapping` 注解可以应用于类级别或方法级别。第一种映射策略是将特定的 URL 模式映射到控制器类，然后将特定的 HTTP\
  \ 方法映射到每个处理器方法：\n\n```\npackage com.apress.spring6recipes.reactive.court.web;\n\
  import org.springframework.web.bind.annotation.GetMapping;\nimport org.springframework.web.bind.annotation.RequestMapping;\n\
  import org.springframework.web.bind.annotation.RequestParam;\nimport org.springframework.web.bind.annotation.RestController;\n\
  import reactor.core.publisher.Mono;\n@RestController\n@RequestMapping(\"/welcome\"\
  )\npublic class WelcomeController {\n@GetMapping\npublic Mono welcome(@RequestParam(defaultValue\
  \ = \"World\") String name) {\nreturn Mono.just(\"Hello \" + name+\" from Spring\
  \ WebFlux!\");\n}\n}\n```\n\n该控制器接收一个可选的 `name` 参数（如果未提供，则默认为 `World`），并向客户端返回一条简单的消息。请注意返回类型\
  \ `Mono<String>`。这是 Project Reactor 中的响应式类型，表示单个返回值（或无返回值）。除了 Project Reactor，你还可以使用\
  \ [RxJava 3](https://reactivex.io/) 或 [Mutiny](https://smallrye.io/smallrye-mutiny/2.0.0/)\
  \ 中的返回类型。\n\n由于你已经使用 `@ComponentScan` 在 `com.apress.spring6recipes.reactive.court`\
  \ 包上激活了注解扫描，因此在部署时会检测到控制器类的注解。\n\n`@RestController` 注解将类定义为控制器。`@RequestMapping`\
  \ 注解更有趣，因为它包含属性，并且可以在类或处理器方法级别声明。该类中使用的第一个值 `(\"/welcome\")` 用于指定控制器可响应的 URL，这意味着任何发送到\
  \ `/welcome` URL 的请求都将由 `WelcomeController` 类处理。\n\n一旦控制器类处理请求，它会将调用委托给控制器中声明的默认\
  \ HTTP GET 处理器方法。之所以如此，是因为对 URL 的每个初始请求都是 HTTP GET 类型。因此，当控制器处理 `/welcome` URL 上的请求时，它会随后委托给默认的\
  \ HTTP GET 处理器方法进行处理。\n\n`@GetMapping` 注解用于将 welcome 方法装饰为控制器的默认 HTTP GET 处理器方法。值得一提的是，如果未声明默认的\
  \ HTTP GET 处理器方法，则会抛出 `ResponseStatusException`，因此 Spring WebFlux 控制器至少需要具备一个 URL\
  \ 路由和默认的 HTTP GET 处理器方法，这一点至关重要。\n\n这种方法的另一种变体是在方法级别使用的 `@GetMapping` 注解中同时声明 URL\
  \ 路由和默认的 HTTP GET 处理器方法。如下所示：\n\n```\n@RestController\npublic class WelcomeController\
  \ {\n@GetMapping(\"/welcome\")\npublic String welcome(Model model) { ... }\n}\n\
  ```\n\n最后一个控制器说明了 Spring WebFlux 的基本原理。\n\n#### 运行 Web 应用程序\n\n根据运行时环境，你可以直接通过执行\
  \ `main` 方法来运行应用程序，或者构建一个 Web 归档文件（WAR）并将其部署到 Servlet 容器中。这里我们将使用响应式运行时并启动 `main`\
  \ 方法。启动后，你可以使用浏览器或 cURL、HTTPie 等工具向 `http://localhost:8080/welcome` 发送请求，并获取问候信息（参见图\
  \ 4-1）。\n\n![](img/314861_5_En_4_Fig1_HTML.jpg)\n\n一个 zsh 输出页面的截图。它显示 HTTP/1.1 200\
  \ OK，内容长度为 33，内容类型为 text/plain，以及一条问候消息：Hello Reader from spring web flux。\n\n图\
  \ 4-1\n\n欢迎控制器的调用与输出\n\n![](img/314861_5_En_4_Figc_HTML.gif)灯泡图标表示提示信息。 该项目还可以使用应用程序创建一个\
  \ Docker 容器：运行 `gradle docker` 即可获得一个包含 Tomcat 和应用程序的容器。然后你可以启动 Docker 容器来测试应用程序（`gradle\
  \ dockerRun`）。\n\n## 4-2\\. 使用响应式 REST 服务发布和消费 JSON\n\n### 问题\n\n你想使用 Spring WebFlux\
  \ 开发一个简单的基于响应式 REST 的应用程序。\n\n### 解决方案\n\n使用 `@RestController` 注解和 Jackson 库，Spring\
  \ WebFlux 可以发送和接收 JSON。要接收数据到对象中，请使用 `@RequestBody` 注解，它会将 JSON 反序列化为 Java 对象。\n\
  \n### 工作原理\n\n首先，编写以下领域类，这是一个普通的类，目前还没有响应式特性。这里使用的类与配方 4-1 中常规 Servlet 版本的类相同：\n\
  \n```\npackage com.apress.spring6recipes.reactive.court.domain;\npublic record Member(String\
  \ name, String email, String phone) { }\n```\n\n然后，定义以下服务接口，为表示层提供成员服务：\n\n```\n\
  package com.apress.spring6recipes.reactive.court.service;\nimport com.apress.spring6recipes.reactive.court.domain.Member;\n\
  import reactor.core.publisher.Flux;\nimport reactor.core.publisher.Mono;\npublic\
  \ interface MemberService {\nFlux findAll();\nMono findById(long id);\nMono save(Member\
  \ member);\n}\n```\n\n注意 `findAll` 方法的返回类型，它返回一个 `Flux<Member>`，这意味着零个或多个成员。\n\n\
  在生产应用程序中，你应该使用数据存储持久化来实现此接口，并且最好支持响应式编程。但为了简单起见，你可以将成员存储在一个映射中，并硬编码几个成员用于测试目的：\n\
  \n```\npackage com.apress.spring6recipes.reactive.court.service;\nimport com.apress.spring6recipes.reactive.court.domain.Member;\n\
  import jakarta.annotation.PostConstruct;\nimport org.springframework.stereotype.Service;\n\
  import reactor.core.publisher.Flux;\nimport reactor.core.publisher.Mono;\nimport\
  \ java.util.Map;\nimport java.util.concurrent.ConcurrentHashMap;\nimport java.util.concurrent.atomic.AtomicLong;\n\
  @Service\nclass InMemoryMemberService implements MemberService {\nprivate final\
  \ AtomicLong sequence = new AtomicLong(1);\nprivate final Map members = new ConcurrentHashMap();\n\
  @PostConstruct\npublic void init() {\nFlux.just(\nnew Member(\"Marten Deinum\",\
  \ \"00-31-1234567890\", \"marten@deinum.biz\"),\nnew Member(\"John Doe\", \"1-800-800-800\"\
  , \"john@doe.com\"),\nnew Member(\"Jane Doe\", \"1-801-802-803\", \"jane@doe.com\"\
  ))\n.flatMap(this::save)\n.subscribe();\n}\n@Override\npublic Flux findAll() {\n\
  return Flux.fromIterable(members.values());\n}\n@Override\npublic Mono findById(long\
  \ id) {\nreturn Mono.justOrEmpty(members.get(id));\n}\n@Override\npublic Mono save(Member\
  \ member) {\nvar id = sequence.getAndIncrement();\nthis.members.put(id, member);\n\
  return Mono.just(member);\n}\n}\n```\n\n`findById` 方法返回一个包含 `Member` 的 `Mono`，如果未找到\
  \ `Member`，则返回一个空的 `Mono`。\n\n\n\n#### 发布 JSON\n\n通过在请求处理方法上添加 `@ResponseBody` 注解，输出将根据请求返回类型和类路径中可用的库，以\
  \ JSON、XML 或任何表示形式返回。除了在方法上使用 `@ResponseBody` 注解外，你还可以在类级别使用 `@RestController` 注解，它会自动为所有请求处理方法隐含\
  \ `@ResponseBody`。\n\n让我们编写一个 REST 控制器，返回系统中的所有成员。为此，你需要使用 `@RestController` 注解一个类，并为其提供一个带有\
  \ `@GetMapping` 注解的方法，该方法返回一个 `Flux<Member>`：\n\n```\npackage com.apress.spring6recipes.reactive.court.web;\n\
  import com.apress.spring6recipes.reactive.court.domain.Member;\nimport com.apress.spring6recipes.reactive.court.service.MemberService;\n\
  import org.springframework.web.bind.annotation.GetMapping;\nimport org.springframework.web.bind.annotation.RequestMapping;\n\
  import org.springframework.web.bind.annotation.RestController;\nimport reactor.core.publisher.Flux;\n\
  import reactor.core.publisher.Mono;\n@RestController\n@RequestMapping(\"/members\"\
  )\npublic class MemberController {\nprivate final MemberService memberService;\n\
  public MemberController(MemberService memberService) {\nthis.memberService = memberService;\n\
  }\n@GetMapping\npublic Flux list() {\nreturn memberService.findAll();\n}\n}\n```\n\
  \n为了能够生成 JSON，Jackson JSON 库必须位于类路径中。Spring WebFlux 会检测其存在，并为此配置相应的消息 `Encoder`/`Decoder`。然后，这个\
  \ `Encoder`/`Decoder` 实现会被 `HttpMessageWriter`/`HttpMessageReader` 用来写入或读取 HTTP\
  \ 消息（请求或响应的主体）。\n\n当返回像这样的响应式类型时，它将以流式 JSON/XML 或服务器发送事件（参见配方 3-6）的形式流式传输到客户端。结果取决于客户端的\
  \ `Accept` 头。使用 HTTPie 并执行 `http http://localhost:8080/members` 将获得 JSON。当添加 `--stream`\
  \ 时，结果将以服务器发送事件的形式发布。\n\n#### 消费 JSON\n\n除了生成 JSON，你还可以消费 JSON。为此，添加一个方法参数并使用 `@RequestBody`\
  \ 对其进行注解。传入的请求体将被映射到该对象上。对于响应式控制器，你可以将其包装在 `Mono` 或 `Flux` 中，分别对应单个结果或多个结果：\n\n\
  ```\n@PostMapping\npublic Mono create(@RequestBody Member member) {\nreturn memberService.save(member);\n\
  }\n```\n\n新方法已使用 `@PostMapping` 注解，以便它绑定到 POST HTTP 方法。它可以接收一个 `Member` 对象，并最终使用服务保存它。新创建的\
  \ `Member` 将返回给用户。\n\n现在，当带有 JSON 主体的请求进来时，它将被反序列化为 `Member` 对象。为此，Spring WebFlux\
  \ 与 Spring MVC 一样，使用转换器。转换委托给 `HttpMessageReader` 的实例，在本例中是 `DecoderHttpMessageReader`；该类将响应式流解码为对象。这又委托给一个\
  \ `Decoder`。由于我们希望使用 JSON（并且类路径中有 Jackson 2 JSON 库），它将为此使用 `Jackson2JsonDecoder`。`HttpMessageReader`\
  \ 和 `Decoder` 实现是常规 Spring MVC 使用的 `HttpMessageConverter` 的响应式对应物。\n\n使用 HTTPie\
  \ 并发出以下请求 `http POST http://localhost:8080/members/ name=\"Josh Long\" email=\"\
  josh@example.com\"` 将添加一个新成员。现在，当检索所有成员时，它将成为结果的一部分。\n\n#### 验证传入的有效载荷\n\n当接收有效载荷时，人们想知道它是否有效。使用\
  \ Spring WebFlux 时，可以通过使用 [Jakarta Bean Validation API](https://jakarta.ee/specifications/bean-validation/)\
  \ 来实现这一点。这允许注解不同的字段以防止无效值。对于我们的成员，我们希望 `name` 和 `email` 是必需的（非空），并且 email 也必须是有效的电子邮件格式。为此，我们可以分别使用\
  \ `@NotBlank` 和 `@Email` 注解：\n\n```\npackage com.apress.spring6recipes.reactive.court.domain;\n\
  import jakarta.validation.constraints.Email;\nimport jakarta.validation.constraints.NotBlank;\n\
  public record Member(@NotBlank String name,\n@NotBlank @Email String email,\nString\
  \ phone) { }\n```\n\n为了使 Jakarta Bean Validation API 正常工作，我们还需要在类路径中有一个实现。Spring\
  \ 支持 Hibernate Validator 项目。这需要作为依赖项添加到我们的应用程序中。默认情况下，Hibernate Validator 还需要一个\
  \ EL（表达式语言）实现。\n\n*Gradle 依赖*\n\n```\nimplementation group: 'jakarta.validation',\
  \ name: 'jakarta.validation-api', version: '3.0.2'\nruntimeOnly group: 'org.hibernate.validator',\
  \ name: 'hibernate-validator', version: '8.0.0.Final'\nruntimeOnly group: 'org.glassfish',\
  \ name: 'jakarta.el', version: '4.0.2'\n```\n\n*Maven 依赖*\n\n```\njakarta.validation\n\
  jakarta.validation-api\n3.0.2\n\norg.hibernate.validator\nhibernate-validator\n\
  8.0.0.Final\nruntime\n\norg.glassfish\njakarta.el\n4.0.2\nruntime\n\n```\n\n最后，我们需要指示我们的控制器验证传入的有效载荷。为此，在\
  \ `@RequestBody` 注解旁边添加 `@Valid`：\n\n```\n@PostMapping\npublic Mono create(@Valid\
  \ @RequestBody Member member) {\nreturn memberService.save(member);\n}\n```\n\n\
  现在，当我们发送一个无效请求时，我们将收到一个 HTTP 状态码为 400（错误请求）的响应。然而，该响应并没有说明具体哪里出了问题（哪个字段或字段有什么问题）。为此，我们可以使用更详细的异常处理（参见配方\
  \ 4-3）。\n\n## 4-3\\. 使用响应式控制器进行异常处理\n\n### 问题\n\nWeb 应用程序必须处理异常，例如来自验证错误或数据库的一些技术错误。你希望向用户展示友好的错误信息并解释哪里出了问题。\n\
  \n### 解决方案\n\n在 Spring WebFlux 中，你可以使用异常处理器将异常转换为有意义的错误响应。你可以在控制器中使用注解方法，或者使用控制器通知采用更全局的方法，使其适用于所有（或部分）控制器。\n\
  \n### 工作原理\n\n配方 4-2 解释了如何接收请求体并对其进行验证。为了将验证异常转换为对客户端有意义的响应，你需要实现一个方法并使用 `@ExceptionHandler`\
  \ 对其进行注解。与 `@RequestMapping` 注解的方法一样，`@ExceptionHandler` 注解的方法可以使用不同类型的对象来帮助编写有意义的错误信息。其中之一是被处理的\
  \ `Exception`。表 4-2 列出了另一组（有限的）可能性。\n\n表 4-2\n\n@ExceptionHandler 方法最常用的方法参数\n\n\
  | 方法参数 | 描述 |\n| --- | --- |\n| 异常类型 | 将被处理的 `Exception` |\n| `ServerHttpRequest``ServerHttpResponse`\
  \ | 获取对请求和/或响应的访问权限 |\n| `ServerWebExchange` | 完整的当前 `ServerWebExchange`。包含所有 HTTP\
  \ 相关信息（方法、请求、响应、会话等）的容器 |\n| `java.security.Principal` | 当前主体，即当前已认证的用户 |\n| `java.util.Map``org.springframework.ui.Model``org.springframework.ui.ModelMap`\
  \ | 用于错误响应的模型，始终为空。可用于向响应添加数据 |\n| `Errors``BindingResult` | 访问来自命令对象的验证和绑定结果的错误\
  \ |\n\n\n\n#### 为验证错误创建异常处理器\n\n`@ExceptionHandler` 注解可以应用于 `@Controller`/`@RestController`\
  \ 注解的类中的方法，或者 `@ControllerAdvice` 注解的类中的方法。在第一种情况下，它仅处理来自该特定控制器的错误；在第二种情况下，它可以作为全局错误处理器，处理所有或部分控制器的错误。\n\
  \n在本节中，你将创建一个全局异常处理器，用于处理所有验证/绑定错误。为此，创建一个类并使用 `@ControllerAdvice` 注解。然后，添加一个方法。\n\
  \n![](img/314861_5_En_4_Figd_HTML.gif)灯泡图标表示提示信息。 除了 `@ControllerAdvice`，还有 `@RestControllerAdvice`。在本节中，你可以使用其中任意一个。主要区别在于\
  \ `@ControllerAdvice` 适用于所有控制器，而 `@RestControllerAdvice` 仅限于使用 `@RestController`\
  \ 注解的控制器。\n\n```\npackage com.apress.spring6recipes.reactive.court.web;\nimport\
  \ org.springframework.validation.FieldError;\nimport org.springframework.web.bind.annotation.ControllerAdvice;\n\
  import org.springframework.web.bind.annotation.ExceptionHandler;\nimport org.springframework.web.bind.annotation.ResponseBody;\n\
  import org.springframework.web.bind.support.WebExchangeBindException;\nimport reactor.core.publisher.Flux;\n\
  @ControllerAdvice\npublic class GlobalErrorHandler {\n@ExceptionHandler(WebExchangeBindException.class)\n\
  @ResponseBody\npublic Flux handleValidationErrors(WebExchangeBindException ex) {\n\
  return Flux.fromIterable(ex.getFieldErrors())\n.map(this::toErrorMessage);\n}\n\
  private ErrorMessage toErrorMessage(FieldError fe) {\nreturn new ErrorMessage(fe.getField(),\
  \ fe.getDefaultMessage());\n}\nrecord ErrorMessage(String field, String message)\
  \ { }\n}\n```\n\n使用 `@ExceptionHandler` 注解的方法将处理应用程序中发生的所有 `WebExchangeBindException`。它接收异常，获取字段错误，并将其转换为一个标识哪个字段出错以及具体错误信息的小对象。该方法还使用了\
  \ `@ResponseBody` 注解，表示我们希望将响应内容写入输出。支持多种返回类型；请参见表 4-3。\n\n表 4-3\n\n部分支持的返回类型\n\n\
  | 响应类型 | 描述 |\n| --- | --- |\n| 支持的响应式类型 | 支持 `Flux`/`Mono` 等类型，以及其他支持的响应式库中的类型\
  \ |\n| `String` | 解释为要渲染的视图名称 |\n| `java.util.Map``org.springframework.ui.Model`\
  \ | 错误响应的模型——将根据 URL 渲染视图 |\n| `View` | 要渲染的实际 `View` |\n| `ErrorResponse``ProblemDetail`\
  \ | 渲染 RFC-7807 响应，并在正文中包含详细信息 |\n\n现在，当向 `http://localhost:8080/members` 提交一个空成员时，我们将收到状态码\
  \ 400，表示响应无效（见图 4-2）。\n\n![](img/314861_5_En_4_Fig2_HTML.jpg)\n\n一个来自 zsh 的输出页面截图。它显示\
  \ HTTP/1.1 400 错误请求，内容长度为 0。\n\n图 4-2\n\n异常输出\n\n虽然 HTTP 状态码 400 是正确的，但它没有提供更多关于错误原因的详细信息。这时，问题详情\
  \ API（RFC-7807）可以通过标准化的方式提供更多信息来提供帮助。\n\n#### 在 Spring WebFlux 中使用问题详情（RFC-7808）\n\
  \nSpring WebFlux 也像 Spring Web 一样，支持 HTTP API 的问题详情（[RFC-7807](https://www.rfc-editor.org/rfc/rfc7807)）。使用此功能有两种选择：你可以从\
  \ `@ExceptionHandler` 方法返回一个 `ProblemDetail`/`ErrorResponse`，或者扩展提供的 `ResponseEntityExceptionHandler`\
  \ 以简化操作。\n\n最简单的起点是扩展 `ResponseEntityExceptionHandler`。让我们修改 `GlobalErrorHandler`，使其扩展\
  \ `ResponseEntityExceptionHandler`：\n\n```\npackage com.apress.spring6recipes.reactive.court.web;\n\
  import org.springframework.web.bind.annotation.ControllerAdvice;\nimport org.springframework.web.reactive.result.method.annotation.ResponseEntityExceptionHandler;\n\
  @ControllerAdvice\npublic class GlobalErrorHandler extends ResponseEntityExceptionHandler\
  \ { }\n```\n\n现在，该类只是一个带有 extends 和 `@ControllerAdvice` 注解的类。这足以让 Spring WebFlux\
  \ 返回包含问题详情信息的响应（见图 4-3）。\n\n![](img/314861_5_En_4_Fig3_HTML.jpg)\n\n一个输出页面的截图。它显示\
  \ HTTP/1.1 400 错误请求，内容长度为 114。花括号内显示了一组 5 个输出：detail（详细信息）、invalid request content（无效请求内容）、instance（实例，/members）、status（状态，400）、title（标题，bad\
  \ request）和 type（类型，about:blank）。\n\n图 4-3\n\n默认问题详情异常输出\n\n然而，对于 `WebExchangeBindException`，信息仍然非常稀疏。如果它能包含哪些字段无效的信息就更好了。由于问题详情\
  \ RFC 允许扩展默认构建块，因此这非常容易实现。\n\n由于我们已经扩展了 `ResponseEntityExceptionHandler`，我们可以重写\
  \ `handleWebExchangeBindException` 方法，并用所需信息丰富响应：\n\n```\npackage com.apress.spring6recipes.reactive.court.web;\n\
  import java.util.Map;\nimport org.springframework.http.HttpHeaders;\nimport org.springframework.http.HttpStatusCode;\n\
  import org.springframework.http.ResponseEntity;\nimport org.springframework.web.bind.annotation.ControllerAdvice;\n\
  import org.springframework.web.bind.support.WebExchangeBindException;\nimport org.springframework.web.reactive.result.method.annotation.ResponseEntityExceptionHandler;\n\
  import org.springframework.web.server.MissingRequestValueException;\nimport org.springframework.web.server.ServerWebExchange;\n\
  import org.springframework.web.server.ServerWebInputException;\nimport reactor.core.publisher.Mono;\n\
  @ControllerAdvice\npublic class GlobalErrorHandler extends ResponseEntityExceptionHandler\
  \ {\n@Override\nprotected Mono> handleWebExchangeBindException(\nWebExchangeBindException\
  \ ex, HttpHeaders headers,\nHttpStatusCode status, ServerWebExchange exchange) {\n\
  var locale = exchange.getLocaleContext().getLocale();\nvar errors = ex.resolveErrorMessages(getMessageSource(),\
  \ locale);\nex.getBody().setProperty(\"errors\", errors.values());\nreturn super.handleExceptionInternal(ex,\
  \ null, headers, status, exchange);\n}\n}\n```\n\n首先，我们解析可能存在的错误消息。为此，我们可以从父类获取\
  \ `MessageSource`，并从 `ServerWebExchange` 获取 `Locale`。我们将解析后的消息作为名为 `errors` 的新属性添加到问题详情响应中。我们可以这样做，因为\
  \ `WebExchangeBindException` 是 `ErrorResponse` 接口的实现，该接口允许这样做。为了方便起见，Spring 的 Web\
  \ 处理部分抛出的所有异常都实现了该接口。\n\n现在，当我们在请求中出错时，会得到一个漂亮的错误列表，解释请求中的问题（见图 4-4）。\n\n![](img/314861_5_En_4_Fig4_HTML.jpg)\n\
  \n一个输出页面的截图。它显示 HTTP/1.1 400 错误请求，内容长度为 183。花括号内显示了一组输出：detail（详细信息，invalid request\
  \ content）、errors（错误，email 和 name 不能为空）、instance（实例，/members）、status（状态，400）、title（标题，bad\
  \ request）、type（类型，about:blank）。\n\n图 4-4\n\n扩展的问题详情异常输出\n\n## 4-4\\. 使用响应式控制器处理表单\n\
  \n\n\n### 问题\n\n在 Web 应用中，你经常需要处理表单。表单控制器既要向用户展示表单，也要处理表单提交。表单处理可能是一项复杂且多变的任务。\n\
  \n### 解决方案\n\n当用户与表单交互时，需要控制器支持两个操作。首先，当表单被初次请求时，控制器通过 HTTP GET 请求向用户渲染表单视图。然后，当表单提交时，会发起\
  \ HTTP POST 请求来处理表单数据的验证和业务逻辑。如果表单处理成功，则向用户渲染成功视图；否则，重新渲染表单视图并显示错误信息。\n\n### 工作原理\n\
  \n假设你想让用户通过填写表单来注册成为会员。为了更好地理解控制器处理的数据，我们将首先介绍控制器的视图（即表单）。\n\n#### 创建表单视图\n\n让我们创建表单视图\
  \ `member.html`。该表单依赖于 Thymeleaf 库，因为它能简化表单的数据绑定、错误消息的显示，以及在出错时重新显示用户输入的原始值。将此文件放置在\
  \ `src/main/resources/templates` 目录下，Thymeleaf 将从该目录读取模板（稍后会在本教程中配置）：\n\n```\n\n\
  会员注册表单\n\n.error {\ncolor: #ff0000;\nfont-weight: bold;\n}\n\n姓名\n\n邮箱\n\n电话\n\n\
  ```\n\n该表单使用 Thymeleaf，通过 `form` 标签上的 `th:object=${member}` 将所有表单字段绑定到名为 `member`\
  \ 的模型属性上。每个字段都会绑定并显示 `Member` 对象中对应字段的值，这正是 `th:field` 标签的作用。当字段存在错误时，通过 `th:errors`\
  \ 标签显示这些错误。\n\n最后，你可以看到标准的 HTML 标签 `<input type=\"submit\" />`，它生成一个“提交”按钮，并触发数据发送到服务器。\n\
  \n如果表单及其数据被正确处理，你需要创建一个成功视图来通知用户注册成功。下面展示的 `member-success.html` 就用于此目的：\n\n```\n\
  \n会员注册成功\n\n您的注册已成功提交。\n\n```\n\n由于表单中提交了无效值，也可能发生错误。例如，如果 `email` 格式无效或缺少必填字段，控制器会拒绝这些字段值。然后控制器会为每个错误生成一系列错误代码，并通过\
  \ `th:errors` 标签将这些值返回给表单视图。\n\n例如，对于 `email` 字段输入的无效值，数据绑定会生成以下错误代码：\n\n```\ntypeMismatch.command.email\n\
  typeMismatch.email\ntypeMismatch.java.time.LocalDate\ntypeMismatch\n```\n\n如果你定义了\
  \ `ResourceBundleMessageSource`，可以在资源包中为相应区域设置添加以下错误消息（例如，默认区域设置的 `messages.properties`）（关于如何外部化本地化配置，请参见教程\
  \ 2-5）：\n\n```\ntypeMismatch.date=日期格式无效\ntypeMismatch.hour=小时格式无效\n```\n\n如果处理表单数据时发生失败，相应的错误代码及其值将返回给用户。\n\
  \n现在你已经了解了表单相关视图的结构以及表单处理的数据，让我们来看看处理表单中提交数据（即会员信息）的逻辑。\n\n#### 创建表单的服务处理\n\n我们可以复用之前教程中的\
  \ `MemberService`，为其定义一个接口和一个内存实现：\n\n```\npackage com.apress.spring6recipes.reactive.court.service;\n\
  import com.apress.spring6recipes.reactive.court.domain.Member;\nimport reactor.core.publisher.Flux;\n\
  import reactor.core.publisher.Mono;\npublic interface MemberService {\nFlux findAll();\n\
  Mono findById(long id);\nMono save(Member member);\n}\n```\n\n```\npackage com.apress.spring6recipes.reactive.court.service;\n\
  import com.apress.spring6recipes.reactive.court.domain.Member;\nimport jakarta.annotation.PostConstruct;\n\
  import org.springframework.stereotype.Service;\nimport reactor.core.publisher.Flux;\n\
  import reactor.core.publisher.Mono;\nimport java.util.Map;\nimport java.util.concurrent.ConcurrentHashMap;\n\
  import java.util.concurrent.atomic.AtomicLong;\n@Service\nclass InMemoryMemberService\
  \ implements MemberService {\nprivate final AtomicLong sequence = new AtomicLong(1);\n\
  private final Map members = new ConcurrentHashMap();\n@PostConstruct\npublic void\
  \ init() {\nFlux.just(\nnew Member(\"Marten Deinum\", \"00-31-1234567890\", \"marten@deinum.biz\"\
  ),\nnew Member(\"John Doe\", \"1-800-800-800\", \"john@doe.com\"),\nnew Member(\"\
  Jane Doe\", \"1-801-802-803\", \"jane@doe.com\"))\n.flatMap(this::save)\n.subscribe();\n\
  }\n@Override\npublic Flux findAll() {\nreturn Flux.fromIterable(members.values());\n\
  }\n@Override\npublic Mono findById(long id) {\nreturn Mono.justOrEmpty(members.get(id));\n\
  }\n@Override\npublic Mono save(Member member) {\nvar id = sequence.getAndIncrement();\n\
  this.members.put(id, member);\nreturn Mono.just(member);\n}\n}\n```\n\n现在你已经更好地理解了与控制器交互的两个要素——表单视图和会员服务类——接下来让我们创建一个控制器来处理会员注册表单。\n\
  \n\n\n#### 创建表单的控制器\n\n用于处理表单的控制器，实际上使用了你在之前示例中已经见过的那些注解。因此，我们直接来看代码：\n\n```\npackage\
  \ com.apress.spring6recipes.reactive.court.web;\nimport com.apress.spring6recipes.reactive.court.domain.Member;\n\
  import com.apress.spring6recipes.reactive.court.service.MemberService;\nimport org.springframework.stereotype.Controller;\n\
  import org.springframework.ui.Model;\nimport org.springframework.validation.BindingResult;\n\
  import org.springframework.web.bind.annotation.GetMapping;\nimport org.springframework.web.bind.annotation.ModelAttribute;\n\
  import org.springframework.web.bind.annotation.PostMapping;\nimport org.springframework.web.bind.annotation.RequestMapping;\n\
  import reactor.core.publisher.Mono;\n@Controller\n@RequestMapping(\"/members\")\n\
  public class MemberController {\nprivate final MemberService memberService;\npublic\
  \ MemberController(MemberService memberService) {\nthis.memberService = memberService;\n\
  }\n@GetMapping\npublic Mono add(Model model) {\nmodel.addAttribute(\"member\", new\
  \ Member(null, null, null));\nreturn Mono.just(\"member\");\n}\n@PostMapping\npublic\
  \ Mono create(@ModelAttribute(\"member\") Member member,\nBindingResult bindingResult)\
  \ {\nreturn Mono.just(member)\n.map(memberService::save)\n.then(Mono.just(\"redirect:member-success\"\
  ));\n}\n}\n```\n\n该控制器首先使用了标准的 `@Controller` 注解，以及 `@RequestMapping` 注解，允许通过以下 URL\
  \ 访问该控制器：\n\n```\nhttp://localhost:8080/members\n```\n\n当你在浏览器中输入此 URL 时，它会向你的 Web\
  \ 应用发送一个 HTTP GET 请求。这进而会触发 `add` 方法的执行，该方法根据其 `@GetMapping` 注解被指定用于处理此类请求。\n\n\
  `add` 方法定义了一个 `Model` 对象作为输入参数，该对象用于将模型数据发送到视图（即表单）。在处理器方法内部，创建了一个空的 `Member` 对象，并将其作为属性添加到控制器的\
  \ `Model` 对象中。然后，控制器将执行流程返回到 `member` 视图，在此处该视图被解析为 `member.html`（即表单）。\n\n这最后一个方法最重要的方面是添加了一个空的\
  \ `Member` 对象。如果你分析 `member.html` 中的表单，你会注意到 `form` 标签声明了一个属性 `th:object=\"${member}\"\
  `。这意味着在渲染视图时，表单期望存在一个名为 `member` 的对象，这通过将其放置在处理器方法的 `Model` 中来实现。事实上，进一步检查会发现，每个\
  \ `input` 标签的 `th:field=*{expression}` 值对应于 `Member` 对象的字段名。由于表单是首次加载，显然期望的是一个空的\
  \ `Member` 对象。\n\n现在，让我们将注意力转向首次提交表单。在你填写完表单字段后，提交表单会触发一个 HTTP POST 请求，该请求进而调用 `create`\
  \ 方法——这是基于该方法的 `@PostMapping` 值。\n\n为 `create` 方法声明的输入字段是 `@ModelAttribute(\"member\"\
  ) Member member`，用于引用 member 对象，以及 `BindingResult` 对象，该对象包含用户新提交的数据。\n\n此时，处理器方法尚未包含验证，而这正是\
  \ `BindingResult` 对象的用途。\n\n处理器方法执行的唯一操作是 `memberService.save(member);`。此操作使用 member\
  \ 对象的当前状态来调用 member 服务。\n\n通常，在执行此类操作之前，会先对控制器对象进行验证。\n\n最后，请注意处理器方法返回一个名为 `redirect:member-success`\
  \ 的视图。此例中视图的实际名称是 `member-success`，它被解析为你之前创建的 `member-success.html` 页面。\n\n视图名称中的\
  \ `redirect:` 前缀用于避免一个称为重复表单提交的问题。\n\n当你在表单成功视图刷新网页时，刚刚提交的表单会被再次提交。为了避免这个问题，你可以应用\
  \ post/redirect/get 设计模式，该模式建议在表单提交成功处理后重定向到另一个 URL，而不是直接返回一个 HTML 页面。这就是在视图名称前加上\
  \ `redirect:` 前缀的目的。\n\n#### 初始化模型属性对象并预填充表单值\n\n该表单旨在注册新成员。然而，如果我们用一个现有成员预填充 `member`\
  \ 变量，我们也可以使用该表单来编辑成员信息。\n\n让我们向控制器添加一个方法，该方法将重用同一个视图，但会用现有的 `Member` 对象预填充模型：\n\n\
  ```\n@GetMapping(\"/{id}\")\npublic Mono add(@PathVariable(\"id\") long id, Model\
  \ model) {\nreturn memberService.findById(id)\n.defaultIfEmpty(new Member(null,\
  \ null, null))\n.doOnNext( (member) -> model.addAttribute(\"member\", member))\n\
  .then(Mono.just(\"member\"));\n}\n```\n\n该方法接收路径中的 `id` 变量，并使用它来检索现有成员。如果未找到任何内容，它将初始化一个空的\
  \ `Member` 实例，以便表单仍然可以渲染。`member.html` 无需更改。\n\n现在，当调用 `http://localhost:8080/members/1`\
  \ 时，它将打开一个表单字段已预填充的表单。这是由于在 HTML 中使用了 `th:object` 和 `th:field` 标签。这些标签由 Thymeleaf\
  \ 处理，其值从模型（已在控制器方法中填充）中获取。\n\n\n\n#### 提供表单参考数据\n\n当表单控制器被请求渲染表单视图时，它可能需要向表单提供某些类型的参考数据（例如，在\
  \ HTML 选择框中显示的选项）。现在假设您希望允许会员选择他们通常注册的运动类型：\n\n```\npackage com.apress.spring6recipes.reactive.court.domain;\n\
  public record SportType(int id, String name) { }\n```\n\n我们需要修改 `Member`，以便能够向其传递一个\
  \ `SportType`：\n\n```\npackage com.apress.spring6recipes.reactive.court.domain;\n\
  public record Member(String name, String email,\nString phone, SportType preferredType)\
  \ {\npublic Member(String name, String email, String phone) {\nthis(name, email,\
  \ phone, null);\n}\n}\n```\n\n请注意新增的构造函数。这是为了让我们的 `InMemoryMemberService` 仍然能够正常运行；否则，它会因找不到正确的构造函数而报错。\n\
  \n现在，在 `member.html` 中添加一个下拉菜单，以便能够从列表中选择一个 `SportType`。`SportType` 的列表将被添加到控制器中的模型里：\n\
  \n```\n\nPreferred Sport\n\n```\n\n`<select>` 标签提供了一种生成下拉列表的方式，该列表的值由控制器传递给视图。因此，表单将\
  \ `preferredType` 字段表示为一组 HTML `<select>` 元素，而不是之前需要用户输入文本值的开放式字段——`<input>`。\n\n\
  接下来，让我们看看控制器如何将 `sportType` 字段作为模型属性进行赋值。这个过程与之前的字段略有不同。\n\n为简单起见，我们添加一个简单的 `SportTypeRepository`，它持有一个内部运动类型列表，并公开一个列出所有类型以及查找特定类型的方法：\n\
  \n```\npackage com.apress.spring6recipes.reactive.court.web;\nimport com.apress.spring6recipes.reactive.court.domain.SportType;\n\
  import org.springframework.stereotype.Repository;\nimport reactor.core.publisher.Flux;\n\
  import java.util.List;\nimport java.util.Optional;\n@Repository\npublic class SportTypeRepository\
  \ {\nprivate final List sportTypes = List.of(\nnew SportType(1, \"Tennis\"),\nnew\
  \ SportType(2, \"Soccer\"),\nnew SportType(3, \"Swimming\"));\npublic Flux findAll()\
  \ {\nreturn Flux.fromIterable(this.sportTypes);\n}\npublic Optional findById(int\
  \ id) {\nreturn sportTypes.stream().filter( (type) -> type.id() == id).findFirst();\n\
  }\n}\n```\n\n现在您已经有了一个返回硬编码 `SportType` 对象列表的实现，让我们看看控制器如何关联这个列表，以便将其返回给表单视图：\n\n\
  ```\npackage com.apress.spring6recipes.reactive.court.web;\nimport com.apress.spring6recipes.reactive.court.service.MemberService;\n\
  import org.springframework.stereotype.Controller;\nimport org.springframework.web.bind.annotation.GetMapping;\n\
  import org.springframework.web.bind.annotation.ModelAttribute;\nimport org.springframework.web.bind.annotation.PathVariable;\n\
  import org.springframework.web.bind.annotation.RequestMapping;\nimport reactor.core.publisher.Flux;\n\
  import reactor.core.publisher.Mono;\n@Controller\n@RequestMapping(\"/members\")\n\
  public class MemberController {\nprivate final MemberService memberService;\nprivate\
  \ final SportTypeRepository sportTypeRepository;\npublic MemberController(MemberService\
  \ memberService,\nSportTypeRepository sportTypeRepository) {\nthis.memberService\
  \ = memberService;\nthis.sportTypeRepository = sportTypeRepository;\n}\n@ModelAttribute(\"\
  sportTypes\")\npublic Flux sportTypes() {\nreturn sportTypeRepository.findAll();\n\
  }\n@GetMapping(\"/{id}\")\npublic Mono add(@PathVariable(\"id\") long id, Model\
  \ model) {\nreturn memberService.findById(id)\n.defaultIfEmpty(new Member(null,\
  \ null, null, null))\n.doOnNext( (member) -> model.addAttribute(\"member\", member))\n\
  .then(Mono.just(\"member\"));\n}\n}\n```\n\n请注意，负责将 `Member` 对象返回给表单视图的 `add` 处理方法保持不变。\n\
  \n新增的部分，以及负责将 `SportType` 列表作为模型属性传递给表单视图的部分，是使用 `@ModelAttribute(\"sportTypes\"\
  )` 注解修饰的方法。`@ModelAttribute` 注解用于定义全局模型属性，这些属性可供处理程序方法中使用的任何返回视图访问，其方式与处理程序方法声明\
  \ `Model` 对象作为输入参数并分配可在返回视图中访问的属性相同。这最后一个模型属性在表单视图中用于填充下拉列表（即 `<select>` 标签）。生成的页面应类似于图\
  \ 4-5 所示。\n\n![](img/314861_5_En_4_Fig5_HTML.jpg)\n\n一个完整的会员注册表单页面截图，包含三个文本框（姓名、电子邮件和电话），以及一个用于选择偏好运动的下拉框。下方有一个外语按钮。\n\
  \n图 4-5\n\n完整的会员表单\n\n\n\n#### 自定义类型的绑定属性\n\n当表单提交时，控制器会将表单字段值绑定到同名模型对象的属性上，此处为\
  \ `Member` 对象。然而，对于自定义类型的属性，除非你为其指定相应的属性编辑器，否则控制器无法进行转换。\n\n例如，运动类型选择字段仅提交所选运动类型的\
  \ ID——这是 HTML `<select>` 字段的运作方式。因此，你需要通过属性编辑器将此 ID 转换为 `SportType` 对象。首先，我们需要确保有一个\
  \ `findById` 方法（或另一个根据输入返回请求对象的方法）：\n\n```\npublic Optional findById(int id) {\n\
  return sportTypes.stream().filter( (type) -> type.id() == id).findFirst();\n}\n\
  ```\n\n然后，创建 `SportTypeConverter` 类，将运动类型 ID 转换为 `SportType` 对象。此转换器需要 `SportTypeRepository`\
  \ 来执行查找：\n\n```\npackage com.apress.spring6recipes.reactive.court.web;\nimport com.apress.spring6recipes.reactive.court.domain.SportType;\n\
  import org.springframework.core.convert.converter.Converter;\nimport org.springframework.stereotype.Component;\n\
  @Component\npublic class SportTypeConverter implements Converter {\nprivate final\
  \ SportTypeRepository repository;\npublic SportTypeConverter(SportTypeRepository\
  \ repository) {\nthis.repository = repository;\n}\n@Override\npublic SportType convert(String\
  \ source) {\nvar sportTypeId = Integer.parseInt(source);\nreturn repository.findById(sportTypeId).orElse(null);\n\
  }\n}\n```\n\n现在，你已拥有将表单属性绑定到 `SportType` 等自定义类所需的支持类 `SportTypeConverter`，接下来需要将其与控制器关联。为此，我们可以使用\
  \ `WebFluxConfigurer` 中的 `addFormatters` 方法。\n\n通过在配置类中重写此方法，自定义类型（如通过 `SportTypeConverter`\
  \ 类的 `SportType`）即可与控制器关联：\n\n```\npackage com.apress.spring6recipes.reactive.court;\n\
  import com.apress.spring6recipes.reactive.court.web.SportTypeConverter;\nimport\
  \ org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.format.FormatterRegistry;\n\
  import org.springframework.web.reactive.config.EnableWebFlux;\n@Configuration\n\
  @EnableWebFlux\n@ComponentScan\npublic class WebFluxConfiguration implements WebFluxConfigurer\
  \ {\nprivate final SportTypeConverter sportTypeConverter;\npublic WebFluxConfiguration(SportTypeConverter\
  \ sportTypeConverter) {\nthis.sportTypeConverter = sportTypeConverter;\n}\n@Override\n\
  public void addFormatters(FormatterRegistry registry) {\nregistry.addConverter(this.sportTypeConverter);\n\
  }\n}\n```\n\n最后一个类中唯一的字段对应 `sportTypeConverter`，用于访问应用程序的 `SportTypeConverter` bean。此转换器通过调用\
  \ `registry.addConverter` 在 `addFormatters` 方法中被添加到注册表中。通过这种方式，每个基于注解的控制器（即使用 `@Controller`\
  \ 注解的类）都可以在其处理方法中访问相同的自定义转换器和格式化器。\n\n#### 验证表单数据\n\n当表单提交时，标准做法是在提交成功之前验证用户提供的数据。与\
  \ Spring MVC 类似，Spring WebFlux 通过实现 `Validator` 接口的验证器对象来支持验证。你可以编写自己的实现，但最常用的方法是使用\
  \ [Jakarta Bean Validation API](https://jakarta.ee/specifications/bean-validation/)。通过它，你可以向模型对象添加注解，Spring\
  \ WebFlux 将自动为你验证它们。\n\n为此，让我们向 `Member` 对象添加一些验证约束：\n\n```\npackage com.apress.spring6recipes.reactive.court.domain;\n\
  import jakarta.validation.constraints.Email;\nimport jakarta.validation.constraints.NotBlank;\n\
  import jakarta.validation.constraints.NotNull;\npublic record Member(@NotBlank String\
  \ name,\n@NotBlank @Email String email,\nString phone,\n@NotNull SportType preferredType)\
  \ {\n}\n```\n\n`Member` 类现在定义了一些验证约束。`name` 字段是必填的（不允许空白值，如全空格或 `null`）；`email`\
  \ 字段需要是有效的电子邮件地址且为必填项。最后，我们还需要一个 `preferredType`。\n\n下一个修改发生在 HTTP POST 处理方法中，该方法在用户提交表单时始终被调用。在\
  \ `@ModelAttribute` 注解旁边，现在有一个 `@Valid` 注解；此注解会触发对象的验证。验证之后，结果参数 `BindingResult`\
  \ 对象包含验证过程的结果。因此，接下来会基于 `result.hasErrors()` 的值进行条件判断。如果验证类检测到错误，此值为 `true`。\n\n\
  如果在验证过程中检测到错误，处理方法会返回视图 `member`，该视图对应同一个表单，以便用户可以重新提交信息。如果在验证过程中未检测到错误，流程则按之前的方式继续：\n\
  \n```\n@PostMapping\npublic Mono create(@Valid @ModelAttribute(\"member\") Member\
  \ member,\nBindingResult bindingResult) {\nif (bindingResult.hasErrors()) {\nreturn\
  \ Mono.just(\"member\");\n}\nreturn Mono.just(member)\n.map(memberService::save)\n\
  .then(Mono.just(\"redirect:member-success\"));\n}\n```\n\n## 4-5\\. 异步 Web 客户端\n\
  \n### 问题\n\n你想从第三方（例如 Google、Yahoo、其他业务合作伙伴）访问 REST 服务，并在 Spring 应用程序中使用其负载。\n\n\
  ### 解决方案\n\n在 Spring 应用程序中访问第三方 REST 服务主要围绕使用 Spring `WebClient` 抽象。`WebClient`\
  \ 的设计原则与许多其他 Spring *Template 类（例如 `JdbcTemplate`、`JmsTemplate`）相同，提供了一种简化的方法，并带有执行耗时任务的默认行为。\n\
  \n这意味着在 Spring 应用程序中，调用 REST 服务和使用其返回负载的过程得到了简化。\n\n\n\n### 工作原理\n\n在描述 `WebClient`\
  \ 的特殊性之前，有必要先探究一下 REST 服务的生命周期，以便了解 `WebClient` 类实际执行的工作（参见技巧 3-4）。探究 REST 服务的生命周期最好通过浏览器进行，因此请在工作站上打开你常用的浏览器开始操作。\n\
  \n首先需要一个 REST 服务端点。我们将复用技巧 4-2 中创建的端点。该端点应位于 `http://localhost:8080/members`。如果你在浏览器中加载这个\
  \ REST 服务端点，浏览器会执行一个 GET 请求，这是 REST 服务支持的最流行的 HTTP 请求之一。加载 REST 服务后，浏览器会显示一个响应负载，如图\
  \ 4-6 所示。\n\n![](img/314861_5_En_4_Fig6_HTML.jpg)\n\n一个 JSON 网页输出页面的截图。输出显示三组参数，每组包含三个参数，分别用花括号括起来，名称为\
  \ name、email 和 phone。名称分别为 Marten Deinum、John Doe 和 Jane Doe。\n\n图 4-6\n结果 JSON\n\
  \nREST 服务消费者（即你）的任务是了解 REST 服务的负载结构（有时称为词汇表），以便正确处理其信息。虽然上述 REST 服务依赖于可被视为自定义词汇表的内容，但许多\
  \ REST 服务通常依赖标准化词汇表（例如 RSS），这使得 REST 服务负载的处理更加统一。此外，还值得注意的是，一些 REST 服务提供 Web 应用描述语言（WADL）契约，以方便负载的发现和消费。\n\
  \n现在你已经熟悉了使用浏览器进行 REST 服务的生命周期，我们可以看看如何使用 Spring 的 `WebClient` 类将 REST 服务的负载整合到\
  \ Spring 应用程序中。鉴于 `WebClient` 旨在调用 REST 服务，其主要方法与 REST 的基础——HTTP 方法紧密相关，这并不令人意外：`HEAD`、`GET`、`POST`、`PUT`、`DELETE`\
  \ 和 `OPTIONS`。表 4-4 列出了 `WebClient` 类支持的主要方法。\n\n表 4-4\n基于 HTTP 请求方法的 WebClient\
  \ 类方法\n\n| 方法 | 描述 |\n| --- | --- |\n| create | 创建一个 `WebClient`（可选地，你可以提供一个默认 URL）\
  \ |\n| `head()` | 准备一个 HTTP HEAD 操作 |\n| `get()` | 准备一个 HTTP GET 操作 |\n| `post()`\
  \ | 准备一个 HTTP POST 操作 |\n| `put()` | 准备一个 HTTP PUT 操作 |\n| `options()` | 准备一个 HTTP\
  \ OPTIONS 操作 |\n| `patch()` | 准备一个 HTTP PATCH 操作 |\n| `delete()` | 准备一个 HTTP DELETE\
  \ 操作 |\n\n正如你在表 4-4 中所见，`WebClient` 的构建器方法模仿了 HTTP 方法，包括 HEAD、GET、POST、PUT、DELETE\
  \ 和 OPTIONS。\n\n![](img/314861_5_En_4_Fige_HTML.gif)一个带阴影圆圈的字母 i 图标，表示信息符号。 到目前为止，REST\
  \ 服务中最常用的 HTTP 方法是 GET，因为它代表一种获取信息的安全操作（即它不会修改任何数据）。另一方面，诸如 `PUT`、`POST` 和 `DELETE`\
  \ 之类的 HTTP 方法旨在修改提供者的信息，这使得它们不太可能被 REST 服务提供者支持。对于需要进行数据修改的情况，许多提供者选择使用 SOAP，这是一种替代\
  \ REST 服务的机制。\n\n现在你已经了解了 `WebClient` 的基本构建器方法，我们可以继续调用之前用浏览器调用的同一个 REST 服务，只不过这次使用\
  \ Spring 框架的 Java 代码。以下清单展示了一个访问 REST 服务并将其内容返回给 `System.out` 的类：\n\n```\npackage\
  \ com.apress.spring6recipes.reactive.court;\nimport org.springframework.http.MediaType;\n\
  import org.springframework.web.reactive.function.client.WebClient;\nimport java.io.IOException;\n\
  public class Main {\npublic static void main(String[] args) throws IOException {\n\
  var url = \"http://localhost:8080/\";\nWebClient.create(url).get().uri(\"/members\"\
  )\n.accept(MediaType.APPLICATION_JSON)\n.exchangeToFlux( (cr) -> cr.bodyToFlux(String.class))\n\
  .subscribe(System.out::println);\nSystem.in.read();\n}\n}\n```\n\n![](img/314861_5_En_4_Figf_HTML.gif)一个火焰图标的插图。 一些\
  \ REST 服务提供者根据请求方限制对其数据源的访问。通常，访问被拒绝是基于请求中存在的数据（例如 HTTP 头或 IP 地址）。因此，根据具体情况，即使数据源在另一种媒介中似乎正常工作（例如，你可能能够在浏览器中访问\
  \ REST 服务，但在尝试从 Spring 应用程序访问同一数据源时却收到访问被拒绝的响应），提供者也可能返回访问被拒绝的响应。这取决于 REST 提供者设定的使用条款。\n\
  \n前几行声明了在类主体中访问 `WebClient` 所需的导入语句。首先，我们需要使用 `WebClient.create` 创建一个 `WebClient`\
  \ 实例。接下来，你可以看到对属于 `WebClient` 的 `get()` 方法的调用，如表 4-4 所述，该方法用于准备一个 HTTP GET 操作——就像浏览器为获取\
  \ REST 服务负载所执行的操作一样。接着，我们扩展基本 URL 以调用我们想要调用的 `http://localhost:8080/members`，并且我们希望获得\
  \ JSON，因此使用 `accept(MediaType.APPLICATION_JSON)`。\n\n接下来，调用 `exchangeToFlux()` 会将配置从设置请求切换到定义响应处理。由于我们可能获得零个或多个元素，我们需要将\
  \ `ClientResponse` 主体转换为 `Flux`，因此使用 `exchangeToFlux`。如果你需要一个 `Mono`，请使用 `exchangeToMono`\
  \ 转换为单元素结果。我们希望将每个元素写入 `System.out`，因此我们订阅它。\n\n执行时，输出将与浏览器中的输出相同，只不过现在打印在控制台中。\n\
  \n#### 从参数化 URL 检索数据\n\n上一节展示了如何调用 URI 来检索数据，但需要参数的 URI 呢？我们不想将参数硬编码到 URL 中。使用 `WebClient`，我们可以使用带有占位符的\
  \ URL；这些占位符将在执行时被实际值替换。占位符使用 { 和 } 定义，就像请求映射和路径变量一样。\n\nURI `http://localhost:8080/members/{id}`\
  \ 就是这样一个参数化 URI 的例子。为了能够调用此方法，我们需要为占位符传递一个值。我们可以通过将参数作为参数传递给 `WebClient` 的 `uri`\
  \ 方法来实现：\n\n```\npublic class Main {\npublic static void main(String[] args) throws\
  \ Exception {\nWebClient.create(url)\n.get()\n.uri(\"/members/{id}\", \"1\")\n.accept(MediaType.APPLICATION__JSON)\n\
  .exchangeToFlux( (cr) -> cr.bodyToFlux(String.class))\n.subscribe(System.out::println);\n\
  System.in.read();    }\n}\n```\n\n\n\n#### 以映射对象形式检索数据\n\n除了返回一个在应用中使用的 `String`，我们也可以（重新）利用\
  \ `Member` 类来映射结果。无需将 `String.class` 作为参数传递给 `bodyToFlux` 方法，而是传递 `Member.class`，响应将被映射到这个类上：\n\
  \n```\npackage com.apress.spring6recipes.reactive.court;\nimport com.apress.spring6recipes.reactive.court.domain.Member;\n\
  import org.springframework.http.MediaType;\nimport org.springframework.web.reactive.function.client.WebClient;\n\
  import java.io.IOException;\npublic class ClientWithMapping {\npublic static void\
  \ main(String[] args) throws IOException {\nvar url = \"http://localhost:8080/\"\
  ;\nWebClient.create(url).get().uri(\"/members\")\n.accept(MediaType.APPLICATION_JSON)\n\
  .exchangeToFlux( (cr) -> cr.bodyToFlux(Member.class))\n.subscribe(System.out::println);\n\
  System.in.read();\n}\n}\n```\n\n`WebClient` 使用了与带有 `@ResponseBody` 标记方法的控制器相同的 `HttpMessageReader`\
  \ 基础设施。由于 JAXB2（以及 Jackson）会被自动检测到，映射到对象变得相当容易。\n\n## 4-6\\. 编写响应式处理函数\n\n### 问题\n\
  \n你想要编写能够响应传入请求的函数。\n\n### 解决方案\n\n你可以编写一个接受 `ServerRequest` 并返回 `Mono<ServerResponse>`\
  \ 的方法，并将其映射为路由函数。\n\n### 工作原理\n\n除了使用 `@RequestMapping` 将请求映射到方法之外，你还可以编写本质上遵循 `HandlerFunction`\
  \ 接口的函数：\n\n```\npackage org.springframework.web.reactive.function.server;\nimport\
  \ reactor.core.publisher.Mono;\n@FunctionalInterface\npublic interface HandlerFunction\
  \ {\nMono handle(ServerRequest request);\n}\n```\n\n如上代码所示，`HandlerFunction` 基本上是一个接受\
  \ `ServerRequest` 作为参数并返回 `Mono<ServerResponse>` 的方法。`ServerRequest` 和 `ServerResponse`\
  \ 都通过将其各个部分暴露为 `Mono` 或 `Flux` 流，提供了对底层请求和响应的完全响应式访问。\n\n编写好函数后，可以使用 `RouterFunctions`\
  \ 类将其映射到传入的请求。映射可以基于 URL、请求头、方法或自定义编写的实现 `RequestPredicate` 接口的类进行。默认可用的请求谓词可以通过\
  \ `RequestPredicates` 类访问。\n\n#### 编写处理函数\n\n让我们将 `MemberController` 重写为简单的请求处理函数，而不是一个控制器。\n\
  \n为此，请移除所有请求映射注解，并向该类添加一个简单的 `@Component`。虽然 `@Controller` 也能工作，但它实际上不再是一个控制器了。接下来，重写这些方法，使其符合\
  \ `HandlerFunction` 接口所定义的签名：\n\n```\npackage com.apress.spring6recipes.reactive.court.web;\n\
  import com.apress.spring6recipes.reactive.court.domain.Member;\nimport com.apress.spring6recipes.reactive.court.service.MemberService;\n\
  import org.springframework.stereotype.Component;\nimport org.springframework.web.reactive.function.server.ServerRequest;\n\
  import org.springframework.web.reactive.function.server.ServerResponse;\nimport\
  \ reactor.core.publisher.Mono;\n@Component\npublic class MemberController {\nprivate\
  \ final MemberService memberService;\npublic MemberController(MemberService memberService)\
  \ {\nthis.memberService = memberService;\n}\npublic Mono list(ServerRequest request)\
  \ {\nreturn ServerResponse\n.ok()\n.body(memberService.findAll(), Member.class);\n\
  }\npublic Mono create(ServerRequest request) {\nvar member = request.bodyToMono(Member.class)\n\
  .flatMap(memberService::save);\nreturn ServerResponse.ok().body(member, Member.class);\n\
  }\n}\n```\n\n该类仍然需要将 `MemberService` 作为依赖项。注意 `list` 和 `create` 方法的变化。它们现在都返回一个\
  \ `Mono<ServerResponse>` 并接受一个 `ServerRequest` 作为输入。由于我们希望返回 HTTP 状态码 OK (200)，我们可以使用\
  \ `ServerResponse.ok()` 来构建该响应。我们需要添加一个 body，在本例中是 `Flux<Member>`，并且需要指定元素的类型 `Member.class`。由于响应式和泛型的特性，在组合函数时无法读取类型信息，因此需要后者。\n\
  \n在 `create` 方法中，发生了类似的事情，但首先我们使用 `bodyToMono` 将传入请求的 body 映射到一个 `Member`。然后使用这个结果最终调用\
  \ `MemberService` 上的 `save` 方法。\n\n访问应用程序时，结果应与配方 4-4 中的相同（见图 4-5）。\n\n#### 将请求路由到处理函数\n\
  \n由于我们现在拥有的是简单的函数，而不是基于注解的请求处理方法，因此需要以不同的方式进行路由。你可以使用 `RouterFunctions` 来进行映射：\n\
  \n```\n@Bean\npublic RouterFunction membersRouter(MemberController handler) {\n\
  return RouterFunctions.route()\n.GET(\"/members\", handler::list)\n.POST(\"/members\"\
  , handler::create)\n.build();\n}\n```\n\n当 HTTP GET 请求到达 `/members` 时，将调用 `list`\
  \ 方法；对于 HTTP POST 请求，将调用 `create` 方法。\n\n`RequestPredicates.GET` 等同于编写 `RequestPredicates.method(HttpMethod.GET).and(RequestPredicates.path(\"\
  /members\"))`。你可以根据需要组合任意数量的 `RequestPredicate` 语句。以下是通过 `RequestPredicates` 类暴露的默认谓词（见表\
  \ 4-5）。\n\n表 4-5\n\n默认可用的 RequestPredicates\n\n| 方法 | 描述 |\n| --- | --- |\n| `method`\
  \ | 用于 HTTP 方法的 RequestPredicate |\n| `path` | 用于 URL 或 URL 部分的 RequestPredicate\
  \ |\n| `accept` | 用于 Accept 请求头以匹配请求的媒体类型的 RequestPredicate |\n| `queryParam` |\
  \ 用于检查查询参数是否存在的 RequestPredicate |\n| `headers` | 用于检查请求头是否存在的 RequestPredicate\
  \ |\n\n`RequestPredicates` 辅助类还提供了 `GET`、`POST`、`PUT`、`DELETE`、`HEAD`、`PATCH` 和\
  \ `OPTIONS` 的简写方法。这让你无需组合两个表达式。\n\n## 4-7\\. 总结\n\n在本章中，你学习了如何编写响应式控制器，这与前几章和配方中学到的内容并没有太大不同。这也展示了\
  \ Spring 抽象的强大之处。你可以对完全不同的技术使用几乎相同的编程模型。在编写了响应式控制器之后，你了解了如何编写响应式处理函数，这些函数可以以更函数式编程的方式完成响应式控制器所能完成的许多相同工作。\n\
  \n在此期间，你还了解了如何使用 `WebClient` 来异步消费 REST API。\n\n\n\n"
- '# 5. Spring Security


  在本章中，你将学习如何使用 Spring Security 框架保护应用程序安全。Spring Security 最初被称为 Acegi Security，但在加入
  Spring 项目组合后已更名。Spring Security 可用于保护任何 Java 应用程序，但主要用于基于 Web 的应用程序。Web 应用程序，尤其是那些可通过互联网访问的应用程序，如果未得到妥善保护，则容易受到黑客攻击。


  如果你从未在应用程序中处理过安全问题，那么首先必须理解几个术语和概念。**认证**是验证主体身份是否与其声称的身份相符的过程。主体可以是用户、设备或系统，但最常见的是用户。主体必须提供身份证据才能通过认证。这种证据称为**凭证**，当目标主体是用户时，凭证通常是一个密码。


  **授权**是向已认证用户授予权限的过程，以便该用户能够访问目标应用程序的特定资源。授权过程必须在认证过程之后执行。通常，权限是以角色的形式授予的。


  **访问控制**意味着控制对应用程序资源的访问。它需要决定是否允许用户访问某个资源。这个决定称为访问控制决策，通过将资源的访问属性与用户被授予的权限或其他特征进行比较来做出。


  完成本章后，你将理解基本的安全概念，并知道如何在 URL 访问级别、方法调用级别、视图渲染级别和领域对象级别保护你的 Web 应用程序。


