  为了配置步骤，我们给它命名为 `User Registration CSV To DB Step`。我们使用基于块的处理，并且需要告诉它我们想要块大小为 5。接下来，我们为其提供一个读取器和一个写入器，最后告诉构建器构建该步骤。配置好的步骤最终被连接为作业的起点，该作业名为
  `User Registration Import Job`，仅包含这一个步骤。


  #### 简化 ItemReader 和 ItemWriter 配置


  配置 `ItemReader` 和 `ItemWriter` 可能是一项艰巨的任务。你需要了解相当多的 Spring Batch 内部原理（使用哪些类等）。从
  Spring Batch 4 开始，配置读取器和写入器变得更加容易，因为现在针对不同的读取器和写入器有了专门的构建器。


  要配置 `FlatFileItemReader`，可以使用 `FlatFileItemReaderBuilder`，并且无需配置四个独立的 Bean，现在只需六行代码（主要是由于示例中的格式）。


  ```

  @Bean

  public FlatFileItemReader csvFileReader() {

  var names = new String[] {

  "firstName", "lastName", "company", "address", "city",

  "state", "zip", "county", "url", "phoneNumber", "fax"

  };

  return new FlatFileItemReaderBuilder()

  .name(ClassUtils.getShortName(FlatFileItemReader.class))

  .resource(input)

  .targetType(UserRegistration.class)

  .delimited()

  .names(names)

  .build();

  }

