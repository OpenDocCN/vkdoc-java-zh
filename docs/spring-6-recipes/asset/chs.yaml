  在此屏幕中，您可以创建一个存储桶并配置其设置。对于本教程，我们将保留默认设置，这已经足够了。名称选择 `vehicles`，因为您将在此存储车辆数据。填写完必填字段并根据需要配置设置（或保留默认设置）后，点击\
  \ **添加存储桶** 按钮。这将创建一个存储桶，其中包含一个默认的作用域和集合，两者均恰当地命名为 `_default`。\n\n\n\n#### 使用 Couchbase\
  \ 存储与检索文档\n\n要在 Couchbase 中存储对象，你需要创建一个能够容纳多种类型内容的文档，例如 `Serializable` 对象、JSON、`String`\
  \ 日期，或是以 Netty `ByteBuf` 形式存在的二进制数据。不过，主要的内容类型是 JSON。这样你也能将其与其他技术配合使用。如果使用二进制内容，则只能局限于基于\
  \ Java 的解决方案。在本篇食谱中，我们将使用 JSON 内容。\n\n在 Couchbase 中存储对象之前，你需要先连接到集群。要连接 Couchbase，我们需要一个\
  \ `Cluster` 才能访问你在设置 Couchbase 时创建的 `Bucket`。你可以使用 `Cluster` 类来建立与之前设置的集群的连接。得到的\
  \ `Cluster` 可用于通过 `bucket()` 方法打开一个 `Bucket`。在本篇食谱中，我们将使用 `default` 桶和最简单的集群设置。\n\
  \n首先，创建一个 `Vehicle` 类（或复用食谱 9-1 中的类），你将把它存储到 Couchbase 中。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  public record Vehicle(String vehicleNo, String color, int wheel, int seat) { }\n\
  列表 9-65\nVehicle 类\n```\n\n为了与 Couchbase 通信，你将创建一个仓库。首先，定义接口。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  public interface VehicleRepository {\nvoid save(Vehicle vehicle);\nvoid delete(Vehicle\
  \ vehicle);\nVehicle findByVehicleNo(String vehicleNo);\n}\n列表 9-66\nVehicleRepository\
  \ 接口\n```\n\n接下来是实现部分，它将处理 Couchbase 中的 `Vehicle`。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  import com.couchbase.client.java.Bucket;\nclass CouchbaseVehicleRepository implements\
  \ VehicleRepository {\nprivate final Bucket bucket;\npublic CouchbaseVehicleRepository(Bucket\
  \ bucket) {\nthis.bucket = bucket;\n}\n@Override\npublic void save(Vehicle vehicle)\
  \ {\nbucket.defaultCollection()\n.upsert(vehicle.vehicleNo(), vehicle);\n}\n@Override\n\
  public void delete(Vehicle vehicle) {\nbucket.defaultCollection().remove(vehicle.vehicleNo());\n\
  }\n@Override\npublic Vehicle findByVehicleNo(String vehicleNo) {\nreturn bucket.defaultCollection().get(vehicleNo).contentAs(Vehicle.class);\n\
  }\n}\n列表 9-67\nCouchbase VehicleRepository 实现\n```\n\n仓库需要一个 `Bucket` 来存储文档。它类似于数据库中的表（`Bucket`\
  \ 就像表，而 `Cluster` 更像整个数据库）。存储 `Vehicle` 时，它会被转换为 JSON，并且 `vehicleNo` 被用作 ID。之后会调用\
  \ `upsert` 方法。该方法会根据文档是否已存在来执行 `update` 或 `insert` 操作。Couchbase 自带了自己的 JSON 编组框架（Jackson\
  \ 的重新打包版本），因此在存储 Java 对象时，它会使用该框架将其转换为 JSON（读取时则会将其转换回 Java 对象）。\n\n让我们创建一个 `Main`\
  \ 类，用于在桶中存储和检索 `Vehicle` 的数据。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  import com.couchbase.client.java.Cluster;\npublic class Main {\npublic static void\
  \ main(String[] args) {\ntry (var cluster = Cluster.connect(\"couchbase://127.0.0.1\"\
  , \"s6r-user\", \"s6r-password\")){\nvar bucket = cluster.bucket(\"vehicles\");\n\
  var vehicleRepository = new CouchbaseVehicleRepository(bucket);\nvehicleRepository.save(new\
  \ Vehicle(\"TEM0001\", \"GREEN\", 3, 1));\nvehicleRepository.save(new Vehicle(\"\
  TEM0004\", \"RED\", 4, 2));\nvar v1 = vehicleRepository.findByVehicleNo(\"TEM0001\"\
  );\nvar v2 = vehicleRepository.findByVehicleNo(\"TEM0004\");\nSystem.out.println(\"\
  Vehicle: \" + v1);\nSystem.out.println(\"Vehicle: \" + v2);\nvehicleRepository.delete(v1);\n\
  vehicleRepository.delete(v2);\n}\n}\n}\n列表 9-68\nMain 类\n```\n\n首先，使用 `CouchbaseCluster.connect()`\
  \ 方法建立与 `Cluster` 的连接。这将根据给定的 URL、用户名和密码连接到集群。在生产环境中使用 Couchbase 时，你可能希望使用其他 `connect`\
  \ 方法，传入要连接的主机列表，或者使用 `ClusterOptions` 和 `ClusterEnvironment` 设置更多属性（例如 `queryTimeout`、`searchTimeout`\
  \ 等）。对于本篇食谱，使用默认设置就足够了。接下来，你需要指定用于存储和检索文档的 `Bucket`（即最初创建的名为 `vehicles` 的桶）；使用 `cluster.bucket(\"\
  vehicles\")` 即可。\n\n`Bucket` 用于创建 `CouchbaseVehicleRepository` 的实例。之后，存储、检索并再次删除两个\
  \ `Vehicles`（以免本篇食谱留下杂乱数据）。最后，关闭连接。\n\n![](img/314861_5_En_9_Fign_HTML.gif)一个信息符号，由阴影圆圈内的字母\
  \ i 图标表示。  需要将 Spring Data Couchbase 的相关依赖添加到类路径中。使用 Maven 时，添加以下依赖：\n\n```\norg.springframework.data\n\
  spring-data-couchbase\n5.0.0\n\n```\n\n或者使用 Gradle 时添加以下内容：\n\n`implementation group:\
  \ 'org.springframework.data', name: 'spring-data-couchbase', version: '5.0.0'`\n\
  \n#### 使用 Spring\n\n目前所有配置都在 `Main` 类中。让我们将配置部分移至 `CouchbaseConfiguration` 类，并使用它来引导应用程序。\n\
  \n```\npackage com.apress.spring6recipes.nosql;\nimport com.couchbase.client.java.Bucket;\n\
  import com.couchbase.client.java.Cluster;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\n@Configuration\npublic\
  \ class CouchbaseConfiguration {\n@Bean\npublic Cluster cluster() {\nreturn Cluster.connect(\"\
  couchbase://127.0.0.1\", \"s6r-user\", \"s6r-password\");\n}\n@Bean\npublic Bucket\
  \ bucket(Cluster cluster) {\nreturn cluster.bucket(\"vehicles\");\n}\n@Bean\npublic\
  \ CouchbaseVehicleRepository vehicleRepository(Bucket bucket) {\nreturn new CouchbaseVehicleRepository(bucket);\n\
  }\n}\n列表 9-69\nCouchbase 配置类\n```\n\n`Cluster` 上的 `close` 方法会被自动调用，因为它是预定义的 `destroyMethods`\
  \ 之一，会被自动检测到。`CouchbaseVehicleRepository` 的构造方式仍然相同，但现在你向它传递的是一个 Spring 管理的 bean。\n\
  \n修改 `Main` 类以使用 `CouchbaseConfiguration`。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class Main {\npublic static void main(String[] args) {\nvar cfg = CouchbaseConfiguration.class;\n\
  try (var ctx = new AnnotationConfigApplicationContext(cfg)) {\nVehicleRepository\
  \ vehicleRepository = ctx.getBean(VehicleRepository.class);\nvehicleRepository.save(new\
  \ Vehicle(\"TEM0001\", \"GREEN\", 3, 1));\nvehicleRepository.save(new Vehicle(\"\
  TEM0004\", \"RED\", 4, 2));\nvar v1 = vehicleRepository.findByVehicleNo(\"TEM0001\"\
  );\nvar v2 = vehicleRepository.findByVehicleNo(\"TEM0004\");\nSystem.out.println(\"\
  Vehicle: \" + v1);\nSystem.out.println(\"Vehicle: \" + v2);\nvehicleRepository.delete(v1);\n\
  vehicleRepository.delete(v2);\n}\n}\n}\n列表 9-70\nMain 类\n```\n\n`VehicleRepository`\
  \ 从构建的 `ApplicationContext` 中获取，并且仍然有 `Vehicle` 实例在 Couchbase 集群中被存储、检索和删除。\n\n\n\
  \n#### 使用 Spring Data CouchbaseTemplate\n\n虽然通过 Java 和 Jackson 将 JSON 映射到 Couchbase\
  \ 相当直接，但在处理较大存储库或使用特定索引和 N1QL 查询时，会变得相当繁琐。更不用说，如果你想将其集成到也使用其他数据存储方式的应用程序中。Spring\
  \ Data Couchbase 项目包含一个 `CouchbaseTemplate`，它接管了你目前在存储库中执行的部分管道工作，例如与 JSON 之间的映射，以及将异常转换为\
  \ `DataAccessException`，这将使其更容易与 Spring 使用的其他数据访问技术集成。\n\n首先，重写存储库以使用 `CouchbaseTemplate`。\n\
  \n```\npackage com.apress.spring6recipes.nosql;\nimport org.springframework.data.couchbase.core.CouchbaseTemplate;\n\
  public class CouchbaseVehicleRepository implements VehicleRepository {\nprivate\
  \ final CouchbaseTemplate couchbase;\npublic CouchbaseVehicleRepository(CouchbaseTemplate\
  \ couchbase) {\nthis.couchbase = couchbase;\n}\n@Override\npublic void save(Vehicle\
  \ vehicle) {\ncouchbase.upsertById(Vehicle.class).one(vehicle);\n}\n@Override\n\
  public void delete(Vehicle vehicle) {\ncouchbase.removeById(Vehicle.class).one(vehicle.getVehicleNo());\n\
  }\n@Override\npublic Vehicle findByVehicleNo(String vehicleNo) {\nreturn couchbase.findById(Vehicle.class).one(vehicleNo);\n\
  }\n}\n清单 9-71\n使用 CouchbaseTemplate 的 VehicleRepository\n```\n\n现在，存储库缩减为仅几行代码。为了能够存储\
  \ `Vehicle`，你需要对 `Vehicle` 对象进行注解，因为它需要知道使用哪个字段作为 ID。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  import org.springframework.data.annotation.Id;\nimport org.springframework.data.couchbase.core.mapping.Field;\n\
  public record Vehicle(@Id String vehicleNo,\n@Field String color,\n@Field int wheel,\n\
  @Field int seat) { }\n清单 9-72\n带有注解的 Vehicle 类\n```\n\n字段 `vehicleNo` 已使用 `@Id`\
  \ 注解进行标注，其他字段则使用了 `@Field`。虽然后者并非必需，但建议指定它。你还可以使用 `@Field` 注解为 JSON 属性的名称指定一个不同的名称，这在需要将现有文档映射到\
  \ Java 对象时会很方便。\n\n最后，你需要在配置类中配置一个 `CouchbaseTemplate`。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  import com.couchbase.client.java.Cluster;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.data.couchbase.CouchbaseClientFactory;\n\
  import org.springframework.data.couchbase.SimpleCouchbaseClientFactory;\nimport\
  \ org.springframework.data.couchbase.core.CouchbaseTemplate;\nimport org.springframework.data.couchbase.core.convert.CouchbaseConverter;\n\
  import org.springframework.data.couchbase.core.convert.MappingCouchbaseConverter;\n\
  @Configuration\npublic class CouchbaseConfiguration {\n@Bean\npublic Cluster cluster()\
  \ {\nreturn Cluster.connect(\"couchbase://127.0.0.1\", \"s6r-user\", \"s6r-password\"\
  );\n}\n@Bean\npublic CouchbaseClientFactory couchbaseClientFactory(Cluster cluster)\
  \ {\nreturn new SimpleCouchbaseClientFactory(cluster, \"vehicles\", null);\n}\n\
  @Bean\npublic CouchbaseConverter couchbaseConverter() {\nreturn new MappingCouchbaseConverter();\n\
  }\n@Bean\npublic CouchbaseTemplate couchbaseTemplate(CouchbaseClientFactory ccf,\n\
  CouchbaseConverter couchbaseConverter) {\nreturn new CouchbaseTemplate(ccf, couchbaseConverter);\n\
  }\n@Bean\npublic CouchbaseVehicleRepository vehicleRepository(CouchbaseTemplate\
  \ template) {\nreturn new CouchbaseVehicleRepository(template);\n}\n}\n清单 9-73\n\
  Couchbase 配置\n```\n\n一个 `CouchbaseTemplate` 需要一个 `CouchebaseClientFactory` 和一个 `CouchebaseConverter`。`CouchebaseClientFactory`\
  \ 是一个 Spring Data Couchbase 组件，负责处理与 Couchbase 集群的连接（因此，我们将 `Cluster` 传递给它）。`MappingCouchebaseConverter`\
  \ 用于在对象与 Couchbase 之间进行映射，并处理 Couchbase 不直接支持的类型。\n\n当运行 `Main` 类时，访问仍然可用，并且存储、检索和删除操作仍然有效。\n\
  \n为了使配置更简单，Spring Data Couchbase 提供了一个基础配置类 `AbstractCouchbaseConfiguration`，你可以继承它。这样，你就不再需要配置\
  \ Spring Data Couchbase 特定的组件了。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.data.couchbase.config.AbstractCouchbaseConfiguration;\n\
  import org.springframework.data.couchbase.core.CouchbaseTemplate;\n@Configuration\n\
  public class CouchbaseConfiguration extends AbstractCouchbaseConfiguration {\n@Override\n\
  public String getConnectionString() {\nreturn \"couchbase://127.0.0.1\";\n}\n@Override\n\
  public String getUserName() {\nreturn \"s6r-user\";\n}\n@Override\npublic String\
  \ getPassword() {\nreturn \"s6r-password\";\n}\n@Override\npublic String getBucketName()\
  \ {\nreturn \"vehicles\";\n}\n@Bean\npublic CouchbaseVehicleRepository vehicleRepository(CouchbaseTemplate\
  \ template) {\nreturn new CouchbaseVehicleRepository(template);\n}\n}\n清单 9-74\n\
  使用基础类的 Couchbase 配置\n```\n\n现在，配置继承了 `AbstractCouchbaseConfiguration` 基础类，你只需要提供存储桶的连接\
  \ URL、用户名和密码。基础配置类提供了 `CouchbaseTemplate` 及其所需的所有对象。\n\n#### 使用 Spring Data Couchbase\
  \ 存储库\n\n与其他技术一样，Spring Data Couchbase 也提供了指定接口并在运行时拥有实际存储库实现的功能。这样，你只需要创建一个接口，而无需创建具体的实现。为此，与其他\
  \ Spring Data 项目一样，你需要继承 `CrudRepository`。请注意，如果你需要 `CouchbaseRepository` 的功能，也可以继承它。在本示例中，我们将使用\
  \ `CrudRepository`。\n\n```\npackage com.apress.spring6recipes.nosql;\nimport org.springframework.data.repository.CrudRepository;\n\
  public interface VehicleRepository extends CrudRepository { }\n清单 9-75\n基于 Spring\
  \ Data Couchbase 的 VehicleRepository 接口\n```\n\n如你所见，该接口不再有方法，因为所有 CRUD 方法都已提供。\n\
  \n接下来，需要在配置类上添加 `@EnableCouchbaseRepositories` 注解。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.data.couchbase.config.AbstractCouchbaseConfiguration;\n\
  import org.springframework.data.couchbase.repository.config.EnableCouchbaseRepositories;\n\
  @Configuration\n@EnableCouchbaseRepositories\npublic class CouchbaseConfiguration\
  \ extends AbstractCouchbaseConfiguration {\n}\n清单 9-76\nSpring Data Couchbase 配置\n\
  ```\n\n最后，`Main` 类需要稍作修改，因为你需要使用 `findById` 方法代替 `findByVehicleNo`。\n\n```\npackage\
  \ com.apress.spring6recipes.nosql;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class Main {\npublic static void main(String[] args) {\ntry (var context\
  \ = new AnnotationConfigApplicationContext(CouchbaseConfiguration.class)) {\nVehicleRepository\
  \ vehicleRepository = context.getBean(VehicleRepository.class);\nvehicleRepository.save(new\
  \ Vehicle(\"TEM0001\", \"GREEN\", 3, 1));\nvehicleRepository.save(new Vehicle(\"\
  TEM0004\", \"RED\", 4, 2));\nvehicleRepository.findById(\"TEM0001\").ifPresent(System.out::println);\n\
  vehicleRepository.findById(\"TEM0004\").ifPresent(System.out::println);\nvehicleRepository.deleteById(\"\
  TEM0001\");\nvehicleRepository.deleteById(\"TEM0004\");\n}\n}\n}\n清单 9-77\nMain\
  \ 类\n```\n\n`findById` 方法返回一个 `java.util.Optional`，因此你可以使用 `ifPresent` 方法将其打印到控制台。\n\
  \n\n\n#### 使用 Spring Data Reactive Couchbase 仓库\n\n除了阻塞式仓库，还可以使用 `ReactiveCouchbaseRepository`\
  \ 来获得响应式仓库。现在，对于返回零个或一个元素的方法（如 `findById`），它将返回一个 `Mono`；对于返回零个或多个元素的方法（如 `findAll`），它将返回一个\
  \ `Flux`。默认的 Couchbase 驱动已经内置了响应式支持。要使用此功能，你需要在类路径中包含 RxJava 和 RxJava Reactive Streams。要使用\
  \ `ReactiveCouchbaseRepository` 中的响应式类型，你还需要在类路径中包含 Project Reactor。\n\n要为 Couchbase\
  \ 配置响应式仓库，请修改 `CouchbaseConfiguration`。使用 `@EnableReactiveCouchbaseRepositories`\
  \ 代替 `@EnableCouchbaseRepositories`。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.data.couchbase.config.AbstractCouchbaseConfiguration;\n\
  import org.springframework.data.couchbase.repository.config.EnableReactiveCouchbaseRepositories;\n\
  @Configuration\n@EnableReactiveCouchbaseRepositories\npublic class CouchbaseConfiguration\
  \ extends AbstractCouchbaseConfiguration {\n清单 9-78\n响应式 Couchbase 配置\n```\n\n配置的其余部分与常规的\
  \ Couchbase 配置保持一致。我们仍然需要连接到同一个 Couchbase 服务器并使用同一个存储桶。\n\n接下来，对于 `VehicleRepository`，让它扩展\
  \ `ReactiveCrudRepository` 而不是 `CrudRepository`。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  import org.springframework.data.couchbase.repository.ReactiveCouchbaseRepository;\n\
  public interface VehicleRepository\nextends ReactiveCouchbaseRepository { }\n清单\
  \ 9-79\n响应式 Spring Data VehicleRepository 接口\n```\n\n这基本上就是获得一个响应式仓库所需的全部操作。为了能够进行测试，你还需要修改\
  \ `Main` 类。\n\n```\npackage com.apress.spring6recipes.nosql;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import reactor.core.publisher.Flux;\nimport java.util.concurrent.CountDownLatch;\n\
  public class Main {\npublic static void main(String[] args) throws InterruptedException\
  \ {\ntry (var ctx = new AnnotationConfigApplicationContext(CouchbaseConfiguration.class))\
  \ {\nvar repository = ctx.getBean(VehicleRepository.class);\nvar countDownLatch\
  \ = new CountDownLatch(1);\nrepository.saveAll(Flux.just(new Vehicle(\"TEM0001\"\
  , \"GREEN\", 3, 1), //\nnew Vehicle(\"TEM0004\", \"RED\", 4, 2)))\n.last()\n.then(repository.findById(\"\
  TEM0001\")).doOnSuccess(System.out::println)\n.then(repository.findById(\"TEM0004\"\
  )).doOnSuccess(System.out::println)\n.then(repository.deleteById(Flux.just(\"TEM0001\"\
  , \"TEM00004\")))\n.doOnTerminate(countDownLatch::countDown)\n.subscribe();\ncountDownLatch.await();\n\
  }\n}\n}\n清单 9-80\nMain 类\n```\n\n创建 `ApplicationContext` 和获取 `VehicleRepository`\
  \ 的方式并无不同。然而，在此之后，我们有一个依次执行的方法调用链。首先，你向数据存储中添加两个 `Vehicle` 实例。当 `last()` 一个被保存后，你将查询仓库以获取每个实例。完成后，所有内容再次被删除。为了让所有操作都能完成，你可以选择\
  \ `block()` 或自行等待。通常，在响应式系统中应避免使用 `block()`，因此这里使用了 `CountDownLatch`。当 `deleteById`\
  \ 方法完成时，`CountDownLatch` 会递减。`countDownLatch.await()` 会等待计数器归零，然后结束程序。\n\n## 9-5.\
  \ 总结\n\n在本节中，你初步了解了不同类型的数据存储，包括如何使用它们，以及如何利用 Spring Data 系列的不同模块简化使用过程。你首先以 MongoDB\
  \ 的形式了解了文档型存储，以及 Spring Data MongoDB 模块的使用。接下来，你了解了键值存储，其中使用 Redis 作为实现，并使用了 Spring\
  \ Data Redis 模块。随后，你简要了解了基于图的数据存储，本例中为 Neo4j 与 Spring Data Neo4j，并构建了一个用于存储实体的仓库。你最后了解的数据存储是\
  \ Couchbase 与 Spring Data Couchbase。对于所有数据存储，你都了解了其基本用法，以及 Spring Data 如何帮助简化配置和数据存储的使用。由于响应式编程也非常流行，我们还深入探讨了使用\
  \ Spring Data 和各种数据存储（在需要时使用响应式驱动）以及 Project Reactor 进行响应式编程。\n\n# 10. Spring Java\
  \ 企业服务与远程调用技术\n\n在本章中，你将学习 Spring 对最常见 Java 企业服务的支持：Java 管理扩展（JMX）、使用 Jakarta Mail\
  \ 发送电子邮件，以及使用或不使用 Quartz 进行任务调度。此外，你还将学习 Spring 对 SOAP Web 服务的支持。\n\nJMX 是 Java\
  \ SE 的一部分，是一种用于管理和监控系统资源（如设备、应用程序、对象和服务驱动网络）的技术。这些资源被表示为托管 Bean（MBean）。Spring 支持\
  \ JMX，可以将任何 Spring Bean 导出为模型 MBean，而无需针对 JMX API 进行编程。此外，Spring 可以轻松访问远程 MBean。\n\
  \nJakarta Mail 是在 Java 中发送电子邮件的标准 API 和实现。Spring 进一步提供了一个抽象层，以独立于实现的方式发送电子邮件。\n\n\
  在 Java 平台上调度任务主要有两种选择：JDK Timer 和 Quartz Scheduler。JDK Timer 提供了与 JDK 捆绑的简单任务调度功能。与\
  \ JDK Timer 相比，Quartz 提供了更强大的作业调度功能。对于这两种选择，Spring 都提供了实用类，可以在 Bean 配置文件中配置调度任务，而无需直接使用任一\
  \ API。\n\n你将学习如何使用 Spring Web Services（Spring-WS）创建和使用 SOAP Web 服务。\n\n最后几节将介绍如何使用\
  \ [Java Flight Recorder](https://www.oracle.com/java/technologies/jdk-mission-control.html)\
  \ (JFR) 以及 [Micrometer API](https://micrometer.io/) 来深入了解应用程序的行为和用法。\n\n## 10-1.\
  \ 将 Spring POJO 注册为 JMX MBean\n\n### 问题\n\n你想将 Java 应用程序中的对象注册为 JMX MBean，以便能够查看正在运行的服务并在运行时操纵其状态。这将允许你执行以下任务：重新运行批处理作业、调用方法以及更改配置元数据。\n\
  \n### 解决方案\n\nSpring 支持 JMX，允许你将其 IoC 容器中的任何 Bean 导出为模型 MBean。这可以通过简单地声明一个 `MBeanExporter`\
  \ 实例来完成。借助 Spring 的 JMX 支持，你无需直接处理 JMX API。此外，Spring 允许你声明 [JSR-160](https://www.jcp.org/en/jsr/detail%253Fid%253D160)（Java\
  \ 管理扩展远程 API）连接器，通过使用工厂 Bean，在特定协议上暴露 MBean 以供远程访问。Spring 为服务器和客户端都提供了工厂 Bean。\n\
  \nSpring 的 JMX 支持还提供了其他机制，你可以通过这些机制来组装 MBean 的管理接口。这些选项包括使用方法名称、接口和注解来导出 Bean。Spring\
  \ 还可以自动检测并导出 IoC 容器中声明的、并使用 Spring 定义的 JMX 特定注解进行注解的 Bean 作为 MBean。\n\n\n\n### 工作原理\n\
  \n假设你正在开发一个用于将文件从一个目录复制到另一个目录的工具。让我们来设计这个工具的接口。\n\n```\npackage com.apress.spring6recipes.replicator;\n\
  import java.io.IOException;\npublic interface FileReplicator {\nString getSrcDir();\n\
  void setSrcDir(String srcDir);\nString getDestDir();\nvoid setDestDir(String destDir);\n\
  void replicate() throws IOException;\n}\n代码清单 10-1\nFileReplicator 接口\n```\n\n源目录和目标目录被设计为复制器对象的属性，而不是方法参数。这意味着每个文件复制器实例仅针对特定的源目录和目标目录复制文件。你可以在应用程序中创建多个复制器实例。\n\
  \n但在实现这个复制器之前，让我们先创建另一个接口，该接口根据文件名将文件从一个目录复制到另一个目录。\n\n```\npackage com.apress.spring6recipes.replicator;\n\
  import java.nio.file.Path;\npublic interface FileCopier {\nvoid copyFile(Path srcFile,\
  \ Path destDir);\n}\n代码清单 10-2\nFileCopier 接口\n```\n\n实现这个文件复制器有多种策略。例如，你可以利用 Java\
  \ NIO 类。\n\n```\npackage com.apress.spring6recipes.replicator;\nimport java.io.IOException;\n\
  import java.nio.file.Files;\nimport java.nio.file.Path;\npublic class NioFileCopier\
  \ implements FileCopier {\n@Override\npublic void copyFile(Path srcFile, Path destDir)\
  \ {\nvar destFile = destDir.resolve(srcFile.getFileName());\ntry {\nFiles.copy(srcFile,\
  \ destFile);\n} catch (IOException ex) {\nthrow new IllegalStateException(\"Cannot\
  \ copy file.\", ex);\n}\n}\n}\n代码清单 10-3\nFileCopier 实现\n```\n\n借助文件复制器，你可以实现文件复制器，如下面的代码示例所示。\n\
  \n```\npackage com.apress.spring6recipes.replicator;\nimport java.io.IOException;\n\
  import java.nio.file.Files;\nimport java.nio.file.Path;\npublic class JMXFileReplicator\
  \ implements FileReplicator {\nprivate String srcDir;\nprivate String destDir;\n\
  private FileCopier fileCopier;\npublic String getSrcDir() {\nreturn srcDir;\n}\n\
  public void setSrcDir(String srcDir) {\nthis.srcDir = srcDir;\n}\npublic String\
  \ getDestDir() {\nreturn destDir;\n}\npublic void setDestDir(String destDir) {\n\
  this.destDir = destDir;\n}\npublic FileCopier getFileCopier() {\nreturn fileCopier;\n\
  }\npublic void setFileCopier(FileCopier fileCopier) {\nthis.fileCopier = fileCopier;\n\
  }\n@Override\npublic synchronized void replicate() throws IOException {\nvar files\
  \ = Path.of(srcDir);\ntry (var fileList = Files.list(files)) {\nfileList.filter(Files::isRegularFile)\n\
  .forEach(it -> fileCopier.copyFile(it, Path.of(destDir)));\n}\n}\n}\n代码清单 10-4\n\
  文件复制实现\n```\n\n每次调用 `replicate()` 方法时，源目录中的所有文件都会被复制到目标目录。为了避免并发复制引起的意外问题，将此方法声明为\
  \ `synchronized`。\n\n现在，你可以在一个 Java 配置类中配置一个或多个文件复制器实例。`documentReplicator` 实例需要引用两个目录：一个用于读取文件的源目录，以及一个用于备份文件的目标目录。此示例中的代码尝试从操作系统用户主目录中名为\
  \ `docs` 的目录读取文件，然后复制到操作系统用户主目录中名为 `docs_backup` 的文件夹。\n\n当这个 Bean 启动时，如果这两个目录不存在，则会创建它们。\n\
  \n![](img/314861_5_En_10_Figa_HTML.gif)一个灯泡的轮廓示意图。  “主目录”因操作系统而异，但在 Unix 系统上，它通常是\
  \ `~` 所解析到的目录。在 Linux 机器上，该文件夹可能是 `/home/user`。在 Mac OS X 上，该文件夹可能是 `/Users/user`，而在\
  \ Windows 上，它可能类似于 `C:\\Documents and Settings\\user`。\n\n```\npackage com.apress.spring6recipes.replicator.config;\n\
  import com.apress.spring6recipes.replicator.FileCopier;\nimport com.apress.spring6recipes.replicator.JMXFileReplicator;\n\
  import com.apress.spring6recipes.replicator.NioFileCopier;\nimport jakarta.annotation.PostConstruct;\n\
  import org.springframework.beans.factory.annotation.Value;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport java.io.IOException;\n\
  import java.nio.file.Files;\nimport java.nio.file.Path;\n@Configuration\npublic\
  \ class FileReplicatorConfig {\n@Value(\"#{systemProperties['user.home']}/docs\"\
  )\nprivate String srcDir;\n@Value(\"#{systemProperties['user.home']}/docs_backup\"\
  )\nprivate String destDir;\n@Bean\npublic NioFileCopier fileCopier() {\nreturn new\
  \ NioFileCopier();\n}\n@Bean\npublic JMXFileReplicator documentReplicator(FileCopier\
  \ fileCopier) {\nvar fRep = new JMXFileReplicator();\nfRep.setSrcDir(srcDir);\n\
  fRep.setDestDir(destDir);\nfRep.setFileCopier(fileCopier);\nreturn fRep;\n}\n@PostConstruct\n\
  public void verifyDirectoriesExist() throws IOException {\nFiles.createDirectories(Path.of(srcDir));\n\
  Files.createDirectories(Path.of(destDir));\n}\n}\n代码清单 10-5\n文件复制器配置\n```\n\n首先，使用\
  \ `@Value` 注解声明了两个字段，以获取用户主目录的访问权限，并定义源目录和目标目录。接着，使用 `@Bean` 注解创建了两个 Bean 实例。注意\
  \ `verifyDirectoriesExist()` 方法上的 `@PostConstruct` 注解，它确保了源目录和目标目录的存在。\n\n现在我们已经有了应用程序的核心\
  \ Bean，接下来让我们看看如何将 Bean 注册为 MBean 并进行访问。\n\n\n\n#### 无需 Spring 支持注册 MBean\n\n首先，我们来看看如何直接使用\
  \ JMX API 注册一个模型 MBean。在下面的主类中，你从 IoC 容器中获取 `FileReplicator` Bean，并将其注册为一个用于管理和监控的\
  \ MBean。所有属性和方法都包含在该 MBean 的管理接口中。\n\n```\npackage com.apress.spring6recipes.replicator;\n\
  import com.apress.spring6recipes.replicator.config.FileReplicatorConfig;\nimport\
  \ org.springframework.context.annotation.AnnotationConfigApplicationContext;\nimport\
  \ javax.management.JMException;\nimport javax.management.ObjectName;\nimport javax.management.modelmbean.DescriptorSupport;\n\
  import javax.management.modelmbean.InvalidTargetObjectTypeException;\nimport javax.management.modelmbean.ModelMBeanAttributeInfo;\n\
  import javax.management.modelmbean.ModelMBeanInfoSupport;\nimport javax.management.modelmbean.ModelMBeanOperationInfo;\n\
  import javax.management.modelmbean.RequiredModelMBean;\nimport java.io.IOException;\n\
  import java.lang.management.ManagementFactory;\npublic class Main {\npublic static\
  \ void main(String[] args) throws IOException {\nvar cfg = FileReplicatorConfig.class;\n\
  try (var ctx = new AnnotationConfigApplicationContext(cfg)) {\nvar documentReplicator\
  \ = ctx.getBean(FileReplicator.class);\ntry {\nvar mbeanServer = ManagementFactory.getPlatformMBeanServer();\n\
  var objectName = new ObjectName(\"bean:name=documentReplicator\");\nvar mbean =\
  \ new RequiredModelMBean();\nmbean.setManagedResource(documentReplicator, \"objectReference\"\
  );\nvar srcDirDescriptor = new DescriptorSupport(\n\"name=SrcDir\", \"descriptorType=attribute\"\
  ,\n\"getMethod=getSrcDir\", \"setMethod=setSrcDir\");\nvar srcDirInfo = new ModelMBeanAttributeInfo(\n\
  \"SrcDir\", \"java.lang.String\", \"Source directory\",\ntrue, true, false, srcDirDescriptor);\n\
  var destDirDescriptor = new DescriptorSupport(\n\"name=DestDir\", \"descriptorType=attribute\"\
  ,\n\"getMethod=getDestDir\", \"setMethod=setDestDir\");\nvar destDirInfo = new ModelMBeanAttributeInfo(\n\
  \"DestDir\", \"java.lang.String\", \"Destination directory\",\ntrue, true, false,\
  \ destDirDescriptor);\nvar getSrcDirInfo = new ModelMBeanOperationInfo(\n\"Get source\
  \ directory\",\nFileReplicator.class.getMethod(\"getSrcDir\"));\nvar setSrcDirInfo\
  \ = new ModelMBeanOperationInfo(\n\"Set source directory\",\nFileReplicator.class.getMethod(\"\
  setSrcDir\", String.class));\nvar getDestDirInfo = new ModelMBeanOperationInfo(\n\
  \"Get destination directory\",\nFileReplicator.class.getMethod(\"getDestDir\"));\n\
  var setDestDirInfo = new ModelMBeanOperationInfo(\n\"Set destination directory\"\
  ,\nFileReplicator.class.getMethod(\"setDestDir\", String.class));\nvar replicateInfo\
  \ = new ModelMBeanOperationInfo(\n\"Replicate files\",\nFileReplicator.class.getMethod(\"\
  replicate\"));\nvar mbeanInfo = new ModelMBeanInfoSupport(\n\"FileReplicator\",\
  \ \"File replicator\",\nnew ModelMBeanAttributeInfo[]{srcDirInfo, destDirInfo},\n\
  null,\nnew ModelMBeanOperationInfo[]{getSrcDirInfo, setSrcDirInfo,\ngetDestDirInfo,\
  \ setDestDirInfo, replicateInfo},\nnull\n);\nmbean.setModelMBeanInfo(mbeanInfo);\n\
  mbeanServer.registerMBean(mbean, objectName);\n} catch (JMException | InvalidTargetObjectTypeException\
  \ |\nNoSuchMethodException ex) {\nSystem.err.println(ex);\n}\n}\nSystem.in.read();\n\
  }\n}\n清单 10-6\n主类\n```\n\n要注册一个 MBean，你需要一个 `javax.managment.MBeanServer`。你可以调用静态方法\
  \ `ManagementFactory.getPlatformMBeanServer()` 来定位一个平台 MBean 服务器。如果不存在 MBean 服务器，它会创建一个，然后注册该服务器实例以供将来使用。每个\
  \ MBean 都需要一个包含域名的 MBean 对象名称。上述 MBean 在域 `bean` 下以名称 `documentReplicator` 注册。\n\
  \n从上述代码可以看出，对于每个 MBean 属性和 MBean 操作，你需要创建一个 `ModelMBeanAttributeInfo` 对象和一个 `ModelMBeanOperationInfo`\
  \ 对象来描述它。之后，你必须通过组装上述信息来创建一个 `ModelMBeanInfo` 对象，用于描述 MBean 的管理接口。关于这些类型使用的详细信息，你可以查阅它们的\
  \ Javadocs。此外，在调用 JMX API 时，你必须处理 JMX 特有的异常。这些异常是必须处理的受检异常。请注意，在使用 JMX 客户端工具查看应用程序内部状态之前，必须防止应用程序终止。使用\
  \ `System.in.read()` 从控制台请求一个按键是一个不错的选择。\n\n最后，你必须添加 VM 参数 `-Dcom.sun.management.jmxremote`\
  \ 来启用对此应用程序的本地监控。如果你使用的是本书的源代码，可以使用以下命令。\n\n```\njava -Dcom.sun.management.jmxremote\
  \ -jar  recipe_10_1_i-6.0.0.jar\n清单 10-7\n运行 Shell 命令\n```\n\n现在，你可以使用任何 JMX 客户端工具在本地监控你的\
  \ MBean。最简单的工具是 JConsole，它随 JDK 一起提供。要启动 JConsole，请执行位于 JDK 安装目录 `bin` 目录下的 `jconsole`\
  \ 可执行文件。\n\n当 JConsole 启动时，你可以在连接窗口的“本地进程”选项卡中看到已启用 JMX 的应用程序列表。选择与正在运行的 Spring\
  \ 应用程序相对应的进程（即 `recipe_10_1_i-1.0-6.0.0.jar`）。如图 10-1 所示。\n\n![](img/314861_5_En_10_Fig1_HTML.jpg)\n\
  \nJConsole 新建连接窗口的截图。它列出了正在运行的本地进程的名称。它有一个未激活的远程进程字段，以及用户名和密码字段。\n\n图 10-1\n\nJConsole\
  \ 启动窗口\n\n![](img/314861_5_En_10_Figb_HTML.gif)火焰燃烧的图标。  如果你使用的是 Windows 系统，你可能在\
  \ JConsole 中看不到任何进程。这是一个已知的 bug，即 JConsole 无法检测到正在运行的 Java 进程。要解决此问题，你需要确保用户在临时文件夹中有一个\
  \ `hsperfdata` 文件夹。Java 和 JConsole 使用此文件夹来跟踪正在运行的进程，但它可能不存在。例如，如果你以用户 John.Doe 身份运行应用程序，请确保以下路径存在：`C:\\\
  Users\\John.Doe\\AppData\\Local\\Temp\\hsperfdata_John.Doe\\`。\n\n连接到复制器应用程序后，转到\
  \ **MBeans** 选项卡。接下来，单击左侧树中的 **bean** 文件夹，选择 `documentReplicator`，然后选择“操作”部分。在主屏幕上，你将看到一系列用于调用\
  \ Bean 操作的按钮。要调用 `replicate()`，只需单击“replicate”按钮。此屏幕如图 10-2 所示。\n\n![](img/314861_5_En_10_Fig2_HTML.jpg)\n\
  \n一个名为“pid recipe snapshot dot jar”的窗口截图，其中突出显示了 replicate 操作和 MBeans 选项卡。窗口内打开了一个标题为“info”的对话框，消息为“method\
  \ successfully invoked”。下方有一个“OK”按钮。\n\n图 10-2\n\nJConsole 模拟 Spring Bean 操作\n\n\
  你将看到一个“Method successfully invoked”弹出窗口。通过此操作，源文件夹中的所有文件都将与目标文件夹中的文件进行复制/同步。\n\n\
  \n\n#### 使用 Spring 支持注册 MBean\n\n之前的应用程序直接使用了 JMX API。正如你在主应用程序类中所见，其中包含大量难以编写、管理和有时难以理解的代码。要将\
  \ Spring IoC 容器中配置的 Bean 导出为 MBean，你只需创建一个 `MBeanExporter` 实例，并指定要导出的 Bean，以它们的\
  \ MBean 对象名称作为键。这可以通过添加以下配置类来实现。请注意，`beansToExport` 映射中的键被用作对应条目值所引用的 Bean 的 `ObjectName`。\n\
  \n```\npackage com.apress.spring6recipes.replicator.config;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jmx.export.MBeanExporter;\n\
  import java.util.Map;\n@Configuration\npublic class JmxConfig {\n@Bean\npublic MBeanExporter\
  \ mbeanExporter() {\nvar beansToExport = Map.of(\n\"bean:name=documentReplicator\"\
  , \"documentReplicator\");\nvar mbeanExporter = new MBeanExporter();\nmbeanExporter.setBeans(beansToExport);\n\
  return mbeanExporter;\n}\n}\n清单 10-8\nJMX 配置\n```\n\n上述配置将 `FileReplicator` Bean\
  \ 导出为 MBean，位于域 bean 下，名称为 `documentReplicator`。默认情况下，所有公共属性都作为属性包含在内，所有公共方法（`java.lang.Object`\
  \ 中的方法除外）都作为操作包含在 MBean 的管理接口中。借助 Spring JMX，应用程序中的主类可以缩减为以下几行。\n\n```\npackage\
  \ com.apress.spring6recipes.replicator;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import java.io.IOException;\npublic class Main {\npublic static void main(String[]\
  \ args) throws IOException {\nvar cfg = \"com.apress.spring6recipes.replicator.config\"\
  ;\ntry (var ctx = new AnnotationConfigApplicationContext(cfg)) {\nSystem.in.read();\n\
  }\n}\n}\n清单 10-9\n主类\n```\n\n#### 处理多个 MBean 服务器实例\n\nSpring 的 `MBeanExporter` 方法可以隐式定位\
  \ MBean 服务器实例并向其注册 MBean。JDK 在你首次定位 MBean 服务器时创建它，因此无需显式创建 MBean 服务器。如果应用程序在提供 MBean\
  \ 服务器的环境（例如 Java 应用服务器）中运行，情况也是如此。\n\n但是，如果你有多个 MBean 服务器在运行，则需要告诉 `mbeanServer`\
  \ Bean 它应该绑定到哪个服务器。你可以通过指定服务器的 `agentId` 来实现。例如，要在 JConsole 中找出给定服务器的 `agentId`，请转到\
  \ MBeans 选项卡，然后在左侧树中转到 JMImplementation ➤ MBeanServerDelegate ➤ Attributes ➤ MBeanServerId。在那里，你将看到字符串值（参见图\
  \ 10-3）。\n\n![](img/314861_5_En_10_Fig3_HTML.jpg)\n\n一个 Java 监控与管理控制台窗口内打开了一个所有点\
  \ jar 窗口的快照。属性名称和值被高亮显示，并用轮廓线框出。在左侧窗格中，M bean server I D 被选中。\n\n图 10-3\n\n代理 ID\
  \ 属性\n\n在我们的本地机器上，该值为 `macbook-pro-9.home_1672140145269`。要启用它，请配置 MBeanServer 的\
  \ `agentId` 属性。\n\n```\n@Bean\npublic MBeanServerFactoryBean mbeanServer() {\nvar\
  \ mbeanServer = new MBeanServerFactoryBean();\nmbeanServer.setLocateExistingServerIfPossible(true);\n\
  mbeanServer.setAgentId(\"macbook-pro-9.home_1672140145269\");\nreturn mbeanServer;\n\
  }\n清单 10-10\n代理 ID 配置\n```\n\n如果你的上下文中存在多个 MBean 服务器实例，你可以显式地为 `MBeanExporter` 指定一个特定的\
  \ MBean 服务器来导出你的 MBean。在这种情况下，`MBeanExporter` 将不会定位 MBean 服务器；它将使用指定的 MBean 服务器实例。此属性用于在存在多个\
  \ MBean 服务器时指定一个特定的 MBean 服务器。\n\n```\n@Bean\npublic MBeanExporter mbeanExporter(MBeanServer\
  \ server) {\nvar mbeanExporter = new MBeanExporter();\nmbeanExporter.setBeans(beansToExport());\n\
  mbeanExporter.setServer(server);\nreturn mbeanExporter;\n}\n@Bean\npublic MBeanServerFactoryBean\
  \ mbeanServer() {\nvar mbeanServer = new MBeanServerFactoryBean();\nmbeanServer.setLocateExistingServerIfPossible(true);\n\
  return mbeanServer;\n}\n清单 10-11\n带有显式 MBeanServer 的 MBeanExporter\n```\n\n####\
  \ 组装 MBean 的管理接口\n\n默认情况下，Spring 的 `MBeanExporter` 将 Bean 的所有公共属性导出为 MBean 属性，所有公共方法导出为\
  \ MBean 操作。但你可以使用 MBean 汇编器来组装 MBean 的管理接口。Spring 中最简单的 MBean 汇编器是 `MethodNameBasedMBeanInfoAssembler`，它允许你指定要导出的方法名称。\n\
  \n```\npackage com.apress.spring6recipes.replicator.config;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jmx.export.MBeanExporter;\n\
  import org.springframework.jmx.export.assembler.MBeanInfoAssembler;\nimport org.springframework.jmx.export.assembler.MethodNameBasedMBeanInfoAssembler;\n\
  import java.util.Map;\n@Configuration\npublic class JmxConfig {\n@Bean\npublic MBeanExporter\
  \ mbeanExporter(MBeanInfoAssembler assembler) {\nvar mbeanExporter = new MBeanExporter();\n\
  mbeanExporter.setBeans(Map.of(\"bean:name=documentReplicator\", \"documentReplicator\"\
  ));\nmbeanExporter.setAssembler(assembler);\nreturn mbeanExporter;\n}\n@Bean\npublic\
  \ MBeanInfoAssembler assembler() {\nvar assembler = new MethodNameBasedMBeanInfoAssembler();\n\
  assembler.setManagedMethods(\"getSrcDir\", \"setSrcDir\", \"getDestDir\", \"setDestDir\"\
  , \"replicate\");\nreturn assembler;\n}\n}\n清单 10-12\nJMX 配置 - MethodNameBasedMBeanInfoAssembler\n\
  ```\n\n另一个 MBean 汇编器是 `InterfaceBasedMBeanInfoAssembler`，它导出你指定接口中定义的所有方法。\n\n```\n\
  @Bean\npublic MBeanInfoAssembler assembler() {\nvar assembler = new InterfaceBasedMBeanInfoAssembler();\n\
  assembler.setManagedInterfaces(FileReplicator.class);\nreturn assembler;\n}\n清单\
  \ 10-13\nJMX 配置 - InterfaceBasedMBeanInfoAssembler\n```\n\nSpring 还提供了 `MetadataMBeanInfoAssembler`，用于根据\
  \ Bean 类中的元数据来组装 MBean 的管理接口。对于使用 JDK 注解标注的 Bean 类，你需要指定一个 `AnnotationJmxAttributeSource`\
  \ 实例作为 `MetadataMBeanInfoAssembler` 的属性源。\n\n```\n@Bean\npublic MBeanInfoAssembler\
  \ assembler() {\nvar assembler = new MetadataMBeanInfoAssembler();\nassembler.setAttributeSource(new\
  \ AnnotationJmxAttributeSource());\nreturn assembler;\n}\n清单 10-14\nJMX 配置 - MetadataMBeanInfoAssembler\n\
  ```\n\n然后，你使用 `@ManagedResource`、`@ManagedAttribute` 和 `@ManagedOperation` 注解来标注你的\
  \ Bean 类和方法，以便 `MetadataMBeanInfoAssembler` 为此 Bean 组装管理接口。这些注解很容易理解。它们会暴露它们所标注的元素。如果你有一个符合\
  \ JavaBean 规范的属性，JMX 将使用术语“属性”。类本身被称为“资源”。在 JMX 中，方法被称为“操作”。了解这些后，很容易看出以下代码的作用。\n\
  \n\n\n```\npackage com.apress.spring6recipes.replicator;\nimport org.springframework.jmx.export.annotation.ManagedAttribute;\n\
  import org.springframework.jmx.export.annotation.ManagedOperation;\nimport org.springframework.jmx.export.annotation.ManagedResource;\n\
  import java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Path;\n\
  @ManagedResource(description = \"文件复制器\")\npublic class JMXFileReplicator implements\
  \ FileReplicator {\nprivate String srcDir;\nprivate String destDir;\nprivate FileCopier\
  \ fileCopier;\n@ManagedAttribute(description = \"获取源目录\")\npublic String getSrcDir()\
  \ {\nreturn srcDir;\n}\n@ManagedAttribute(description = \"设置源目录\")\npublic void\
  \ setSrcDir(String srcDir) {\nthis.srcDir = srcDir;\n}\n@ManagedAttribute(description\
  \ = \"获取目标目录\")\npublic String getDestDir() {\nreturn destDir;\n}\n@ManagedAttribute(description\
  \ = \"设置目标目录\")\npublic void setDestDir(String destDir) {\nthis.destDir = destDir;\n\
  }\npublic FileCopier getFileCopier() {\nreturn fileCopier;\n}\npublic void setFileCopier(FileCopier\
  \ fileCopier) {\nthis.fileCopier = fileCopier;\n}\n@ManagedOperation(description\
  \ = \"复制文件\")\npublic synchronized void replicate() throws IOException {\nvar files\
  \ = Path.of(srcDir);\ntry (var fileList = Files.list(files)) {\nfileList.filter(Files::isRegularFile)\n\
  .forEach(it -> fileCopier.copyFile(it, Path.of(destDir)));\n}\n}\n}\n清单 10-15\n\
  带有 JMX 注解的 FileReplicator\n```\n\n#### 使用注解注册 MBean\n\n除了使用 `MBeanExporter` 显式导出\
  \ bean 之外，你还可以简单地配置其子类 `AnnotationMBeanExporter`，使其自动检测 IoC 容器中声明的 bean 中的 MBean。你无需为此导出器配置\
  \ MBean 装配器，因为它默认使用带有 `AnnotationJmxAttributeSource` 的 `MetadataMBeanInfoAssembler`。你可以删除之前用于此注册的\
  \ bean 和装配器属性，只保留以下内容。\n\n```\npackage com.apress.spring6recipes.replicator.config;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.jmx.export.MBeanExporter;\nimport org.springframework.jmx.export.annotation.AnnotationMBeanExporter;\n\
  @Configuration\npublic class JmxConfig {\n@Bean\npublic MBeanExporter mbeanExporter()\
  \ {\nreturn new AnnotationMBeanExporter();\n}\n}\n清单 10-16\nJMX 配置 - AnnotationMBeanExporter\n\
  ```\n\n`AnnotationMBeanExporter` 会检测 IoC 容器中任何使用 `@ManagedResource` 注解配置的 bean，并将其导出为\
  \ MBean。默认情况下，此导出器会将 bean 导出到与其包名同名的域中。此外，它使用 bean 在 IoC 容器中的名称作为其 MBean 名称，并使用\
  \ bean 的短类名作为其类型。因此，`documentReplicator` bean 将在以下 MBean 对象名称下导出：`com.apress.spring6recipes.replicator:name=documentReplicator,\
  \ type=JMXFileReplicator`。\n\n如果你不想使用包名作为域名，可以通过添加 `defaultDomain` 属性为导出器设置默认域。\n\
  \n```\npackage com.apress.spring6recipes.replicator.config;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jmx.export.MBeanExporter;\n\
  import org.springframework.jmx.export.annotation.AnnotationMBeanExporter;\n@Configuration\n\
  public class JmxConfig {\n@Bean\npublic MBeanExporter mbeanExporter() {\nvar mbeanExporter\
  \ = new AnnotationMBeanExporter();\nmbeanExporter.setDefaultDomain(\"bean\");\n\
  return mbeanExporter;\n}\n}\n清单 10-17\nJMX 配置 - 带有默认域的 AnnotationMBeanExporter\n\
  ```\n\n将默认域设置为 bean 后，`documentReplicator` bean 将在以下 MBean 对象名称下导出：\n\n```\nbean:name=documentReplicator,type=JMXFileReplicator\n\
  ```\n\n此外，你可以在 `@ManagedResource` 注解的 `objectName` 属性中指定 bean 的 MBean 对象名称。例如，你可以通过使用以下注解来将文件复制器作为\
  \ MBean 导出。\n\n```\npackage com.apress.spring6recipes.replicator;\nimport org.springframework.jmx.export.annotation.ManagedAttribute;\n\
  import org.springframework.jmx.export.annotation.ManagedOperation;\nimport org.springframework.jmx.export.annotation.ManagedResource;\n\
  import java.io.IOException;\nimport java.nio.file.Files;\nimport java.nio.file.Path;\n\
  @ManagedResource(\ndescription = \"文件复制器\",\nobjectName = \"bean:name=fileCopier,type=JMXFileReplicator\"\
  )\npublic class JMXFileReplicator implements FileReplicator {\n}\n清单 10-18\n设置了\
  \ objectName 的 JMX 文件复制器\n```\n\n然而，以这种方式指定对象名称仅适用于你将在 IoC 容器中创建单个实例的类（例如，文件复制器），而不适用于你可能创建多个实例的类（例如，文件复制器）。这是因为你只能为一个类指定一个对象名称。因此，你不应该在不更改名称的情况下尝试多次运行同一个服务器。\n\
  \n最后，另一种可能性是依赖 Spring 来导出使用 `@ManagedResource` 装饰的 MBean。为此，你需要在配置类中添加 `@EnableMBeanExport`。这会告诉\
  \ Spring 导出任何使用 `@ManagedResource` 装饰的 bean。\n\n```\npackage com.apress.spring6recipes.replicator.config;\n\
  import java.io.IOException;\npublic class FileReplicatorConfig {\n@Value(\"#{systemProperties['user.home']}/docs\"\
  )\n清单 10-19\n带有 @EnableMBeanExport 的配置\n```\n\n由于存在 `@EnableMBeanExport`，bean `documentReplicator`\
  \ 会被导出为 MBean，因为它使用了 `@ManagedResource` 注解进行装饰。\n\n## 10-2\\. 发布和监听 JMX 通知\n\n###\
  \ 问题\n\n你希望从你的 MBean 发布 JMX 通知，并使用 JMX 通知监听器来监听它们。\n\n### 解决方案\n\nSpring 允许你的 bean\
  \ 通过 `NotificationPublisher` 接口发布 JMX 通知。你还可以在 IoC 容器中注册标准的 JMX 通知监听器来监听 JMX 通知。\n\
  \n### 工作原理\n\n\n\n#### 发布 JMX 通知\n\nSpring IoC 容器支持将要导出为 MBean 的 Bean 发布 JMX 通知。这些\
  \ Bean 必须实现 `NotificationPublisherAware` 接口，以获取 `NotificationPublisher` 的访问权限，从而能够发布通知。\n\
  \n```\npackage com.apress.spring6recipes.replicator;\nimport org.springframework.jmx.export.notification.NotificationPublisher;\n\
  import org.springframework.jmx.export.notification.NotificationPublisherAware;\n\
  @ManagedResource(description = \"文件复制器\")\npublic class JMXFileReplicator implements\
  \ FileReplicator, NotificationPublisherAware {\nprivate final AtomicInteger sequenceNumber\
  \ = new AtomicInteger();\nprivate NotificationPublisher notificationPublisher;\n\
  @ManagedOperation(description = \"复制文件\")\npublic synchronized void replicate()\
  \ throws IOException {\nvar files = Path.of(srcDir);\ntry (var fileList = Files.list(files))\
  \ {\nfileList.filter(Files::isRegularFile)\n.forEach(it -> fileCopier.copyFile(it,\
  \ Path.of(destDir)));\n}\nvar seqNumber = sequenceNumber.incrementAndGet();\nvar\
  \ notification =new Notification(\"replication.complete\", this, seqNumber);\nnotificationPublisher.sendNotification(notification);\n\
  }\n@Override\npublic void setNotificationPublisher(NotificationPublisher notificationPublisher)\
  \ {\nthis.notificationPublisher = notificationPublisher;\n}\n}\n清单 10-20\nFileReplicator——发布通知\n\
  ```\n\n在这个文件复制器中，每当复制开始或完成时，你都会发送一条 JMX 通知。该通知既可以在控制台的标准输出中看到，也可以在 MBean 选项卡的 JConsole\
  \ 通知菜单中看到，如图 10-4 所示。\n\n![](img/314861_5_En_10_Fig4_HTML.jpg)\n\n一个名为“spring recipes\
  \ dot replicator dot main”的窗口截图，其中选中了 M Bean 选项卡。左侧窗格中选中了“操作”下的“通知 2”。右侧是一个通知缓冲区屏幕，显示时间戳、类型、序列号、事件和来源。\n\
  \n图 10-4\n\nJConsole 中报告的 MBean 事件\n\n要在 JConsole 中查看通知，你必须首先点击底部出现的“订阅”按钮，如图 10-4\
  \ 所示。然后，当使用 MBean“操作”部分中的 JConsole 按钮调用 `replicate()` 方法时，你将看到两条新通知到达。通知构造函数中的第一个参数是通知类型，第二个参数是通知来源，最后一个参数是序列号。\n\
  \n#### 监听 JMX 通知\n\n现在，让我们创建一个通知监听器来监听 JMX 通知。由于监听器会收到多种不同类型的通知，例如当 MBean 的属性发生更改时会收到\
  \ `javax.management.AttributeChangeNotification`，因此你必须过滤出那些你感兴趣处理的通知。\n\n```\npackage\
  \ com.apress.spring6recipes.replicator;\nimport javax.management.Notification;\n\
  import javax.management.NotificationListener;\npublic class ReplicationNotificationListener\
  \ implements NotificationListener {\npublic void handleNotification(Notification\
  \ not, Object handback) {\nif (not.getType().startsWith(\"replication\")) {\nSystem.out.printf(\"\
  %s %s #%d%n\",\nnot.getSource(), not.getType(), not.getSequenceNumber());\n}\n}\n\
  }\n清单 10-21\nNotificationListener 实现\n```\n\n然后，你可以将此通知监听器注册到你的 MBean 导出器中，以监听来自特定\
  \ MBean 发出的通知。\n\n```\n@Bean\npublic ReplicationNotificationListener replicationNotificationListener()\
  \ {\nreturn new ReplicationNotificationListener();\n}\n@Bean\npublic AnnotationMBeanExporter\
  \ mbeanExporter(NotificationListener nl) {\nvar mbeanExporter = new AnnotationMBeanExporter();\n\
  mbeanExporter.setDefaultDomain(\"bean\");\nmbeanExporter.setNotificationListenerMappings(\n\
  Map.of(\"bean:name=documentReplicator,type=JMXFileReplicator\", nl));\nreturn mbeanExporter;\n\
  }\n清单 10-22\nJMX 配置\n```\n\n## 10-3\\. 在 Spring 中暴露和访问远程 JMX MBean\n\n### 问题\n\n\
  你想要访问运行在由 JMX 连接器暴露的远程 MBean 服务器上的 JMX MBean。当直接使用 JMX API 访问远程 MBean 时，你必须编写复杂的\
  \ JMX 特定代码。\n\n### 解决方案\n\nSpring 提供了两种方法来简化远程 MBean 的访问。首先，它提供了一个工厂 Bean，用于以声明方式创建\
  \ MBean 服务器连接。通过此服务器连接，你可以查询和更新 MBean 的属性，以及调用其操作。其次，Spring 提供了另一个工厂 Bean，允许你为远程\
  \ MBean 创建代理。通过此代理，你可以像操作本地 Bean 一样操作远程 MBean。\n\n### 工作原理\n\n#### 通过 JMX 连接器服务器暴露\
  \ MBean\n\n如果你希望你的 MBean 能够被远程访问，你需要为 JMX 启用一个远程协议。JSR-160 定义了通过 JMX 连接器进行 JMX 远程处理的标准。Spring\
  \ 允许你通过 `ConnectorServerFactoryBean` 创建一个 JMX 连接器服务器。默认情况下，`ConnectorServerFactoryBean`\
  \ 会创建并启动一个绑定到服务 URL `service:jmx:jmxmp://localhost:9875` 的 JMX 连接器服务器，该服务器通过 JMX\
  \ 消息协议（JMXMP）暴露 JMX 连接器。然而，大多数 JMX 实现并不支持 JMXMP。因此，你应该为你的 JMX 连接器选择一个广泛支持的远程协议，例如\
  \ RMI。要通过特定协议暴露你的 JMX 连接器，你需要为其提供服务 URL。\n\n```\npackage com.apress.spring6recipes.replicator.config;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.context.annotation.Import;\nimport org.springframework.jmx.support.ConnectorServerFactoryBean;\n\
  @Configuration\n@Import(FileReplicatorConfig.class)\npublic class JmxServerConfiguration\
  \ {\n@Bean\npublic ConnectorServerFactoryBean connectorServerFactoryBean() {\nvar\
  \ url =\"service:jmx:rmi://localhost/jndi/rmi://localhost:1099/replicator\";\nvar\
  \ connectorServer = new ConnectorServerFactoryBean();\nconnectorServer.setServiceUrl(url);\n\
  return connectorServer;\n}\n}\n清单 10-23\nJMX 服务器配置\n```\n\n![](img/314861_5_En_10_Figc_HTML.gif)一个带阴影圆圈的字母\
  \ i 图标。  为了能够通过 RMI 暴露 Bean，你需要一个 RMI 注册表。通常，在使用应用服务器时，这是默认可用的。在独立运行时，你需要在命令行上运行\
  \ Java 提供的 `rmiregistry`。本示例假定该注册表正在运行。\n\n你指定上述 URL 是为了将你的 JMX 连接器绑定到监听 localhost\
  \ 的 1099 端口的 RMI 注册表。该注册表的默认端口是 1099，但你可以在其端口属性中指定另一个端口。\n\n现在，你的 MBean 可以通过 RMI\
  \ 进行远程访问了。请注意，无需像之前的应用那样使用 JMX 标志 `-Dcom.sun.management.jmxremote` 来启动启用 RMI 的应用。当\
  \ JConsole 启动时，你可以在连接窗口的“远程进程”部分的服务 URL 中输入 `service:jmx:rmi://localhost/jndi/rmi://localhost:1099/replicator`。如图\
  \ 10-5 所示。\n\n![](img/314861_5_En_10_Fig5_HTML.jpg)\n\n一个 J Console 新建连接窗口的截图。它列出了正在运行的本地进程的名称。它有一个选中的远程进程字段，以及用户名和密码字段。\n\
  \n图 10-5\n\n连接到 `service:jmx:rmi://localhost/jndi/rmi://localhost:1099/replicator`\n\
  \n一旦连接建立，你就可以像之前的示例一样调用 Bean 的方法了。\n\n\n\n#### 通过 MBean 服务器连接访问远程 MBean\n\nJMX 客户端需要\
  \ MBean 服务器连接才能访问在远程 MBean 服务器上运行的 MBean。Spring 提供了 `org.springframework.jmx.support.MBeanServerConnectionFactoryBean`，供你以声明方式创建与远程支持\
  \ JSR-160 的 MBean 服务器的连接。你需要提供服务 URL 供其定位 MBean 服务器。现在，让我们在你的客户端 Bean 配置类中声明这个工厂\
  \ Bean。\n\n```\npackage com.apress.spring6recipes.replicator.config;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jmx.support.MBeanServerConnectionFactoryBean;\n\
  import java.net.MalformedURLException;\n@Configuration\npublic class JmxClientConfiguration\
  \ {\n@Bean\npublic MBeanServerConnectionFactoryBean mbeanServerConnection()\nthrows\
  \ MalformedURLException {\nvar url = \"service:jmx:rmi://localhost/jndi/rmi://localhost:1099/replicator\"\
  ;\nvar mBeanServerConnectionFactoryBean = new MBeanServerConnectionFactoryBean();\n\
  mBeanServerConnectionFactoryBean.setServiceUrl(url);\nreturn mBeanServerConnectionFactoryBean;\n\
  }\n}\n清单 10-24\nJMX 客户端配置 - MBean 服务器连接\n```\n\n通过此工厂 Bean 创建的 MBean 服务器连接，你可以访问和操作在端口\
  \ 1099 上运行的 RMI 服务器中的 MBean。\n\n在两端建立连接后，你可以通过 `getAttribute()` 和 `setAttribute()`\
  \ 方法查询和更新 MBean 的属性，只需提供 MBean 的对象名称和属性名称。你还可以使用 `invoke()` 方法调用 MBean 的操作。\n\n\
  ```\npackage com.apress.spring6recipes.replicator;\nimport com.apress.spring6recipes.replicator.config.JmxClientConfiguration;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import javax.management.Attribute;\nimport javax.management.MBeanServerConnection;\n\
  import javax.management.ObjectName;\npublic class Client {\npublic static void main(String[]\
  \ args) throws Exception {\nvar cfg = JmxClientConfiguration.class;\ntry (var context\
  \ = new AnnotationConfigApplicationContext(cfg)) {\nvar mbeanServerConnection =\
  \ context.getBean(MBeanServerConnection.class);\nvar srcDir = (String) mbeanServerConnection.getAttribute(mbeanName,\
  \ \"SrcDir\");\nvar destDir = new Attribute(\"DestDir\", srcDir + \"_backup\");\n\
  mbeanServerConnection.setAttribute(mbeanName, destDir);\nmbeanServerConnection.invoke(mbeanName,\
  \ \"replicate\", null, null);\n}\n清单 10-25\nJMX 客户端 - MBean 服务器连接\n```\n\n此外，让我们创建一个\
  \ JMX 通知监听器，以便监听文件复制通知。\n\n```\npackage com.apress.spring6recipes.replicator;\n\
  import javax.management.Notification;\nimport javax.management.NotificationListener;\n\
  public class ReplicationNotificationListener implements NotificationListener {\n\
  public void handleNotification(Notification notification, Object handback) {\nif\
  \ (notification.getType().startsWith(\"replication\")) {\nSystem.out.println(\n\
  notification.getSource() + \" \" +\nnotification.getType() + \" #\" +\nnotification.getSequenceNumber());\n\
  }\n}\n}\n清单 10-26\n复制通知监听器\n```\n\n你可以将此通知监听器注册到 MBean 服务器连接，以监听从此 MBean 服务器发出的通知。\n\
  \n```\nvar name = \"bean:name=documentReplicator,type=JMXFileReplicator\";\nvar\
  \ mbeanName = new ObjectName(name);\nvar listener = new ReplicationNotificationListener();\n\
  mbeanServerConnection.addNotificationListener(mbeanName, listener, null, null);\n\
  清单 10-27\n监听器的创建与注册\n```\n\n运行此应用程序客户端后，请检查 RMI 服务器应用程序的 JConsole——使用“远程进程”，地址为\
  \ `service:jmx:rmi://localhost/jndi/rmi://localhost:1099/replicator`。在 MBeans 选项卡的“通知”菜单下，你将看到类型为\
  \ `jmx.attribute.change` 的新通知，如图 10-6 所示。\n\n![](img/314861_5_En_10_Fig6_HTML.jpg)\n\
  \n一个显示 spring recipes replicator 主窗口的截图，已选中 M Beans 选项卡。左侧窗格中选中了“操作”下的“通知 1”。右侧是一个通知缓冲区屏幕，显示时间戳、类型、消息、事件和来源。\n\
  \n图 10-6\n\n通过 RMI 调用的 JConsole 通知事件\n\n#### 通过 MBean 代理访问远程 MBean\n\nSpring 提供的另一种远程\
  \ MBean 访问方法是通过 MBeanProxy，它可以通过 `MBeanProxyFactoryBean` 创建。\n\n```\npackage com.apress.spring6recipes.replicator.config;\n\
  import com.apress.spring6recipes.replicator.FileReplicator;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jmx.access.MBeanProxyFactoryBean;\n\
  @Configuration\npublic class JmxClientConfiguration {\n@Bean\npublic MBeanProxyFactoryBean\
  \ fileReplicatorProxy() throws Exception {\nvar url = \"service:jmx:rmi://localhost/jndi/rmi://localhost:1099/replicator\"\
