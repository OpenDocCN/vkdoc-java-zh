  ```


  此 ACL 配置文件中的核心 Bean 定义是 ACL 服务，它是一个 `JdbcMutableAclService` 实例，允许你维护 ACL。该类需要三个构造函数参数。第一个参数是用于创建连接到存储
  ACL 数据的数据库的数据源。你应该事先定义一个数据源，以便在此处直接引用它（假设你已在同一数据库中创建了 ACL 表）。第三个构造函数参数是与 ACL 一起使用的缓存实例，你可以使用
  Spring Cache 实现作为后端缓存实现来配置它。


  Spring Security 提供的唯一实现是 `BasicLookupStrategy`，它使用标准且兼容的 SQL 语句执行基本查找。如果你想利用高级数据库功能来提高查找性能，可以通过实现
  `LookupStrategy` 接口来创建自己的查找策略。`BasicLookupStrategy` 实例也需要一个数据源和一个缓存实例。此外，它还需要一个类型为
  `AclAuthorizationStrategy` 的构造函数参数。该对象通过为每个属性类别指定所需的权限，来确定主体是否有权更改 ACL 的某些属性。对于上述配置，只有拥有
  `ADMIN` 权限的用户才能分别更改 ACL 的所有权、ACE 的审计细节或其他 ACL 和 ACE 细节。最后，它需要一个类型为 `PermissionGrantingStrategy`
  的构造函数参数。该对象的职责是检查 ACL 是否授予给定 `Sid` 其拥有的权限的访问权限。


  最后，`JdbcMutableAclService` 嵌入了用于在关系数据库中维护 ACL 数据的标准 SQL 语句。然而，这些 SQL 语句可能并非与所有数据库产品兼容。例如，你必须为
  Apache Derby 自定义标识查询语句。



  #### 维护领域对象的 ACL


  在后端服务和 DAO 中，你可以通过依赖注入，使用之前定义的 ACL 服务来维护领域对象的 ACL。对于你的待办事项服务，你需要在待办事项发布时为其创建 ACL，并在该待办事项被删除时删除对应的
  ACL。


  ```

  package com.apress.spring6recipes.board;

  import org.springframework.security.access.prepost.PreAuthorize;

  import org.springframework.security.acls.domain.GrantedAuthoritySid;

  import org.springframework.security.acls.domain.ObjectIdentityImpl;

  import org.springframework.security.acls.domain.PrincipalSid;

  import org.springframework.security.acls.model.MutableAclService;

  import org.springframework.stereotype.Service;

  import org.springframework.transaction.annotation.Transactional;

  import static org.springframework.security.acls.domain.BasePermission.DELETE;

  import static org.springframework.security.acls.domain.BasePermission.READ;

  import static org.springframework.security.acls.domain.BasePermission.WRITE;

  @Service

  @Transactional

  class TodoServiceImpl implements TodoService {

  private final TodoRepository todoRepository;

  private final MutableAclService mutableAclService;

  TodoServiceImpl(TodoRepository todoRepository, MutableAclService mutableAclService)
  {

  this.todoRepository = todoRepository;

  this.mutableAclService = mutableAclService;

  }

  @PreAuthorize("hasAuthority(''USER'')")

  public void save(Todo todo) {

  this.todoRepository.save(todo);

  var oid = new ObjectIdentityImpl(Todo.class, todo.getId());

  var acl = mutableAclService.createAcl(oid);

  var principalSid = new PrincipalSid(todo.getOwner());

  var authoritySid = new GrantedAuthoritySid("ADMIN");

  acl.insertAce(0, READ, principalSid, true);

  acl.insertAce(1, WRITE, principalSid, true);

  acl.insertAce(2, DELETE, principalSid, true);

  acl.insertAce(3, READ, authoritySid, true);

  acl.insertAce(4, WRITE, authoritySid, true);

  acl.insertAce(5, DELETE, authoritySid, true);

  }

  @PreAuthorize("hasPermission(#id, ''com.apress.springrecipes.board.Todo'', ''delete'')")

  public void remove(long id) {

  todoRepository.remove(id);

  var oid = new ObjectIdentityImpl(Todo.class, id);

  mutableAclService.deleteAcl(oid, false);

  }

  }

