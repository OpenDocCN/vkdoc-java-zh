  \ Data Redis 仓库\n\n除了创建传统的 Redis 仓库，也可以创建响应式仓库。然而，由于在撰写本文时，Spring Data Redis 还没有针对仓库风格的响应式对应实现，只有\
  \ `ReactiveRedisTemplate`，这意味着我们需要自己实现仓库。要使用 `ReactiveRedisTemplate`，我们还必须使用响应式驱动程序实现并相应地修改配置。\n\
  \n```\npackage com.apress.spring6recipes.nosql.config;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.data.redis.connection.ReactiveRedisConnectionFactory;\n\
  import org.springframework.data.redis.connection.RedisConnectionFactory;\nimport\
  \ org.springframework.data.redis.connection.jedis.JedisConnectionFactory;\nimport\
  \ org.springframework.data.redis.connection.lettuce.LettuceConnectionFactory;\n\
  import org.springframework.data.redis.core.ReactiveRedisTemplate;\nimport org.springframework.data.redis.core.RedisTemplate;\n\
  import org.springframework.data.redis.serializer.GenericJackson2JsonRedisSerializer;\n\
  import org.springframework.data.redis.serializer.Jackson2JsonRedisSerializer;\n\
  import org.springframework.data.redis.serializer.RedisSerializationContext;\nimport\
  \ org.springframework.data.redis.serializer.RedisSerializer;\nimport org.springframework.data.redis.serializer.StringRedisSerializer;\n\
  import com.apress.spring6recipes.nosql.RedisVehicleRepository;\nimport com.apress.spring6recipes.nosql.Vehicle;\n\
  @Configuration\npublic class RedisConfig {\n@Bean\npublic ReactiveRedisTemplate\
  \ redisTemplate(\nReactiveRedisConnectionFactory connectionFactory) {\nRedisSerializationContext.RedisSerializationContextBuilder\
  \ builder =\nRedisSerializationContext.newSerializationContext(new StringRedisSerializer());\n\
  var serializer = new Jackson2JsonRedisSerializer(Vehicle.class);\nRedisSerializationContext\
  \ context = builder.hashValue(serializer).build();\nreturn new ReactiveRedisTemplate(connectionFactory,\
  \ context);\n}\n@Bean\npublic ReactiveRedisConnectionFactory redisConnectionFactory()\
  \ {\nreturn new LettuceConnectionFactory(\"localhost\", 6379);\n}\n@Bean\npublic\
  \ RedisVehicleRepository vehicleRepository(ReactiveRedisTemplate redis) {\nreturn\
  \ new RedisVehicleRepository(redis);\n}\n}\n清单 9-33\n响应式 Redis 配置\n```\n\n为了能够使用响应式仓库实现，首先必须使用\
  \ Redis 驱动程序的响应式实现。由于 Jedis 驱动程序不是响应式的，我们需要切换到 [Lettuce](https://lettuce.io/) 驱动程序。该驱动程序由\
  \ `LettuceConnectionFactory` 使用（它可以以常规方式使用，并且既是阻塞式也是非阻塞式驱动程序）。需要 `ReactiveRedisConnectionFactory`\
  \ 来创建 `ReactiveRedisTemplate`。除了 `RedisSerializationContext` 之外，它还保存了如何序列化键和值（包括常规值和哈希值）的信息。由于我们想使用常规的\
  \ `String`，我们使用 `StringRedisSerializer` 作为默认序列化器，而对于 `hashValue`，我们想使用 Jackson JSON\
  \ 库，因此使用 `Jackson2JsonRedisSerializer`。通过这种方式，我们构建了 `ReactiveRedisTemplate` 并将其注入到我们的\
  \ `RedisVehicleRepository` 中。\n\n接下来，将 `VehicleRepository` 改为使用 `ReactiveRedisTemplate`，使其成为响应式的。你还需要将方法的返回类型改为\
  \ `Mono`（零个或一个值）或 `Flux`（零个或多个值）。我们也可以使用其他支持的响应式类型，如 RxJava3 或 Mutiny Rye。但这里我们使用\
  \ Project Reactor。\n\n```\npackage com.apress.spring6recipes.nosql;\nimport java.util.Map;\n\
  import org.springframework.data.redis.core.ReactiveRedisTemplate;\nimport org.springframework.data.redis.core.ScanOptions;\n\
  import jakarta.annotation.PreDestroy;\nimport reactor.core.publisher.Flux;\nimport\
  \ reactor.core.publisher.Mono;\npublic class RedisVehicleRepository implements VehicleRepository{\n\
  private static final String DB_NAME = \"vehicles\";\nprivate final ReactiveRedisTemplate\
  \ redis;\npublic RedisVehicleRepository(ReactiveRedisTemplate redis) {\nthis.redis\
  \ = redis;\n}\n@Override\npublic Mono count() {\nreturn redis.opsForHash().size(DB_NAME);\n\
  }\n@Override\npublic Mono save(Vehicle vehicle) {\nreturn redis.opsForHash().put(DB_NAME,\
  \ vehicle.vehicleNo(), vehicle).then();\n}\n@Override\npublic Mono delete(Vehicle\
  \ vehicle) {\nreturn redis.opsForHash().remove(DB_NAME, vehicle.vehicleNo()).then();\n\
  }\n@Override\npublic Flux findAll() {\nreturn redis.opsForHash().scan(DB_NAME, ScanOptions.NONE)\n\
  .map(Map.Entry::getValue)\n.cast(Vehicle.class);\n}\n@Override\npublic Mono findByVehicleNo(String\
  \ vehicleNo) {\nreturn redis.opsForHash().get(DB_NAME, vehicleNo).cast(Vehicle.class);\n\
  }\n@PreDestroy\npublic void cleanUp() {\nfindAll().map(this::delete).subscribe();\n\
  }\n}\n清单 9-34\n基于响应式 Spring Data 的 VehicleRepository 接口\n```\n\n最后一个需要更改的部分是用于测试所有这些功能的\
  \ `Main` 类。我们不使用阻塞调用，而是希望使用一个方法流来调用。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  import java.util.concurrent.CountDownLatch;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import com.apress.spring6recipes.nosql.config.RedisConfig;\nimport reactor.core.publisher.Flux;\n\
  public class Main {\nprivate static final String COUNT = \"Number of Vehicles: %d%n\"\
  ;\npublic static void main(String[] args) throws Exception {\nvar cfg = RedisConfig.class;\n\
  try (var ctx = new AnnotationConfigApplicationContext(cfg)) {\nvar repository =\
  \ ctx.getBean(VehicleRepository.class);\nvar countDownLatch = new CountDownLatch(1);\n\
  var vehicles = Flux.just(\nnew Vehicle(\"TEM0001\", \"RED\", 4, 4),\nnew Vehicle(\"\
  TEM0002\", \"RED\", 4, 4));\nrepository.count().doOnSuccess(cnt -> System.out.printf(COUNT,\
  \ cnt))\n.thenMany(vehicles.flatMap(repository::save))\n.then(repository.count()).doOnSuccess(cnt\
  \ -> System.out.printf(COUNT, cnt))\n.then(repository.findByVehicleNo(\"TEM0001\"\
  )).doOnSuccess(System.out::println)\n.doOnTerminate(countDownLatch::countDown)\n\
  .then(repository.count()).subscribe(cnt -> System.out.printf(COUNT, cnt));\ncountDownLatch.await();\n\
  }\n}\n}\n清单 9-35\n运行代码的 Main 类\n```\n\n流程从计数开始，当计数成功时，`Vehicle` 实例被放入 Redis。当车辆被添加后，再次进行计数，然后进行查询。所有这些方法都以响应式方式一个接一个地调用，由事件触发。因为我们不想使用\
  \ `block()` 方法进行阻塞，所以我们使用 `CountDownLatch` 等待代码执行；在所有记录删除后，计数器递减，之后程序将继续执行。诚然，这仍然是阻塞的，当在完整的响应式堆栈中使用时，你可能会从最后一个\
  \ `then` 返回 `Mono` 并进行进一步组合，或者将输出交给 Spring WebFlux 控制器（参见第 4 章）。\n\n## 9-3\\. 使用\
  \ Neo4j\n\n### 问题\n\n你想在应用程序中使用 Neo4j。\n\n### 解决方案\n\n使用 Spring Data Neo4j 库来访问\
  \ Neo4j。\n\n### 工作原理\n\n\n\n#### 下载并运行 Neo4j\n\nNeo4j 可以从 Neo4j 官网（[`https://neo4j.com/download/`](https://neo4j.com/download/)）下载。对于本教程，下载社区版就足够了；不过，它也应该能与\
