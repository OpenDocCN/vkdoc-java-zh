  前几个 Bean 严格与配置相关——对于 Spring Batch 来说，没有什么特别新奇或独特之处：一个数据源、一个事务管理器和一个数据源初始化器。


  最终，我们声明了一个 `MapJobRegistry` 实例。这很关键——它是存储给定作业信息的中央仓库，并控制系统中所有作业的“全局视图”。其他所有内容都与此实例协同工作。


  接下来，我们有一个 `TaskExecutorJobLauncher`，其唯一目的是为你提供一种启动批处理作业的机制，这里的“作业”指的是我们的批处理解决方案。`jobLauncher`
  用于指定要运行的批处理解决方案的名称以及所需的任何参数。我们将在下一个配方中进一步讨论这一点。


  接着，你定义了一个 `JobRegistryBeanPostProcessor`。这个 Bean 会扫描你的 Spring 上下文文件，并将所有已配置的作业与
  `MapJobRegistry` 关联起来。


  最后，我们得到了 `SimpleJobRepository`（它又由 `JobRepositoryFactoryBean` 创建）。`JobRepository`
  是“仓库”的一种实现（从企业应用架构模式的意义上讲）：它处理围绕步骤、作业等领域的持久化和检索。


  `@PropertySource` 注解将指示 Spring 加载我们的 `batch.properties` 文件。我们将使用 `Environment` 类来检索所需的属性。`batch.properties`
