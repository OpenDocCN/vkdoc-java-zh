  \ Java Mission Control 中。\n\n\n\n## 10-11\\. 使用 Micrometer 观测应用程序\n\n在技巧 10-10 中，我们探讨了\
  \ Java Flight Recorder。虽然它是一个强大的工具，但对于 Spring 应用程序而言，它主要用于监控应用程序的启动。它无法替代 Java 分析器或像\
  \ [Micrometer](https://micrometer.io/) 这样的指标库。然而，当需要时，Spring 也内置了与 Micrometer 的集成，Spring\
  \ 投资组合中的许多项目（如 Spring Security、Spring Data 等）也同样如此。\n\n近年来，Micrometer API 已成为记录指标和对应用程序进行追踪的事实标准。Micrometer\
  \ 可以与许多不同的监控系统集成，例如 [Prometheus](https://prometheus.io/)、[Influx](https://www.influxdata.com/)\
  \ 和 [New Relic](https://newrelic.com/)。\n\n为了提供更好的集成，Spring 在其内部嵌入了对 Micrometer\
  \ API 的支持，默认使用一个无操作注册表，但可以配置为将数据发送到受支持的监控系统之一。\n\n### 问题\n\n你正在使用 Prometheus 来收集应用程序的指标，并且希望你的基于\
  \ Spring 的应用程序也能将指标发送到这个 Prometheus 实例。\n\n### 解决方案\n\nMicrometer 定义了 `Observation`（观测）的概念，它允许你的应用程序同时支持指标和追踪。指标包括计时器、仪表和计数器，它们提供了一种收集应用程序运行时行为统计数据的方法，例如，正在处理的\
  \ HTTP 请求数量及其相应的结果。指标有助于分析性能、应用程序使用模式和错误率。追踪则提供了对应用程序整体架构的更全面视图，使你能够跟踪整个系统中的请求（HTTP、消息等）。\n\
  \n#### Micrometer 概念\n\n以下是 Micrometer 观测概念的快速概览：\n\n*   `Observation` 是对应用程序中发生事件的真实记录。`Observation`\
  \ 由 `ObservationHandler` 处理，以提供指标和/或追踪。\n\n*   每个观测都有一个 `ObservationContext` 实现，它保存了该\
  \ `Observation` 的所有相关元数据。例如，对于 HTTP 请求，它将保存 HTTP 方法、响应状态等。\n\n*   每个 `Observation`\
  \ 由一个或多个 `KeyValues` 组成。在 HTTP 请求的情况下，这些将是 HTTP 方法、响应状态、处理时间等。`KeyValues` 被提供给一个\
  \ `ObservationConvention` 实现（有很多种），该实现与特定的 `ObservationContext` 实现相关联。\n\n*   当\
  \ `KeyValue` 的可能值数量有限且可数时（例如，HTTP 方法只有少数几种），`KeyValues` 被称为“低基数”。低基数值仅贡献给指标。\n\n\
  *   当 `KeyValue` 的可能值数量（可能）无限时（例如 URL），`KeyValues` 被称为“高基数”。高基数值仅贡献给追踪。\n\n*   最后，还有一个\
  \ `ObservationDocumentation`，它记录了一个领域内所有可能的观测，描述了预期的键名及其含义。\n\n为了记录指标，我们需要配置一个 `MeterRegistry`，以便\
  \ `Observation` 实例可以使用它来创建计数器、计时器等。不同的技术有不同的 `MeterRegistry` 实现。这里我们将使用 JMX 版本，即\
  \ `JmxMeterRegistry`。\n\n### 工作原理\n\n要将指标发布到 JMX，我们需要在类路径中包含相应的实现。为此，我们需要添加一个依赖项。\n\
  \n```\nio.micrometer\nmicrometer-registry-jmx\n1.10.2\n\n代码清单 10-88\nMaven 依赖\n\
  ```\n\n```\nimplementation group: 'io.micrometer', name: 'micrometer-registry-jmx',\
  \ version: '1.10.2'\n代码清单 10-87\nGradle 依赖\n```\n\n添加依赖后，我们可以配置应用程序来记录和发送指标。让我们重用技巧\
  \ 3-3 和 3-4 中的应用程序，以在服务器和客户端上启用指标。\n\n#### 客户端的 Micrometer 配置\n\n让我们从客户端开始。首先，我们需要配置一个\
  \ `JmxMeterRegistry`。使用这个 `MeterRegistry`，我们可以构造一个 `ObservationHandler`，与 `ObservationRegistry`\
  \ 一起使用，通过 JMX 创建和发布指标。\n\n```\n@Bean\npublic JmxMeterRegistry meterRegistry() {\n\
  return new JmxMeterRegistry(JmxConfig.DEFAULT, Clock.SYSTEM);\n}\n@Bean\npublic\
  \ ObservationRegistry observationRegistry(MeterRegistry meterRegistry) {\nvar registry\
  \ = ObservationRegistry.create();\nvar handler = new DefaultMeterObservationHandler(meterRegistry);\n\
  registry.observationConfig().observationHandler(handler);\nreturn registry;\n}\n\
  @Bean\npublic RestTemplate restTemplate(ObservationRegistry observationRegistry)\
  \ {\nvar restTemplate = new RestTemplate();\nrestTemplate.setObservationRegistry(observationRegistry);\n\
  return restTemplate;\n}\n代码清单 10-89\n客户端指标配置\n```\n\n然后，我们可以使用 `MeterRegistry` 通过提供一个\
  \ `ObservationHandler` 来配置 `ObservationRegistry`。为此，我们可以使用 `DefaultMeterObservationHandler`。你可以看到，我们使用\
  \ `ObservationRegistry` 上的工厂方法 `create` 来为我们创建一个实例，而不是使用默认的无操作实现。可以通过调用 `observationConfig`\
  \ 方法来获取和修改配置。通过它，我们可以将 `DefaultMeterObservationHandler` 添加到处理程序列表中。这样，就实现了 Micrometer\
  \ 与发布到 JMX 的集成。剩下的就是配置 `RestTemplate` 以使用 `ObservationRegistry` 来创建指标。为此，我们只需将已创建的\
  \ `ObservationRegistry` 设置到 `RestTemplate` 中即可。完成所有这些设置后，我们现在可以执行请求并同时收集指标。这些指标可以通过\
  \ JMX 访问（参见图 10-9）。\n\n![](img/314861_5_En_10_Fig9_HTML.jpg)\n\n一个显示 PID Spring\
  \ 6 Recipes dot court dot member client 窗口的截图，其中 M Beans 选项卡被选中。左侧窗口选中了 Attributes\
  \ 选项，右侧窗口显示了 17 个属性值。\n\n图 10-9\n\n通过 JMX 查看的客户端指标\n\n现在指标已通过 JMX 发布；然而，同样的方法也适用于\
  \ Prometheus、Ganglia、New Relic 等，只需提供正确的 `MeterRegistry` 并将其暴露给 `ObservationRegistry`\
  \ 即可。你甚至可以通过多次调用 `observationHandler` 来添加多个实现。例如，你可以结合 JMX 和 Prometheus 来暴露指标。\n\
  \n\n\n#### 服务器的 Micrometer 配置\n\n要配置服务器，我们需要相同的 `MeterRegistry` 和 `ObservationRegistry`，但无需将\
  \ `ObservationRegistry` 添加到 `RestTemplate`（除非你在服务器应用中使用它），而是注册一个 Servlet 过滤器来创建指标。`org.springframework.web.filter.ServerHttpObservationFilter`\
  \ 在收到 HTTP 请求时就会开始创建指标。\n\n```\n@Bean\npublic JmxMeterRegistry meterRegistry() {\n\
  return new JmxMeterRegistry(JmxConfig.DEFAULT, Clock.SYSTEM);\n}\n@Bean\npublic\
  \ ObservationRegistry observationRegistry(MeterRegistry meterRegistry) {\nvar registry\
  \ = ObservationRegistry.create();\nvar handler = new DefaultMeterObservationHandler(meterRegistry);\n\
  registry.observationConfig().observationHandler(handler);\nreturn registry;\n}\n\
  @Bean\npublic ServerHttpObservationFilter metricsFilter(ObservationRegistry or)\
  \ {\nreturn new ServerHttpObservationFilter(or);\n}\n清单 10-90\n服务器指标配置\n```\n\n\
  `MeterRegistry` 和 `ObservationRegistry` 的注册方式完全相同。但请注意，这里添加了 `ServerHttpObservationFilter`，它将为服务器创建\
  \ HTTP 指标。\n\n由于我们在应用程序上下文中配置了过滤器，这对 Tomcat 来说并非直接可见。为此，我们可以使用 `DelegatingFilterProxy`。顾名思义，它会将请求委托给另一个过滤器。在这种情况下，它会在应用程序上下文中查找一个与我们传入的名称相匹配的\
  \ Bean，并且该 Bean 必须是一个 Servlet 过滤器。然后，它会将调用委托给这个由 Spring 管理的过滤器。通过这种方法，你可以在应用程序上下文中配置过滤器，但仍然可以在\
  \ Servlet 容器中使用它们。Spring Security（参见第 5 章）也使用了相同的方法。\n\n在 `CourtRestApplicationInitializer`\
  \ 中，我们需要添加这个 `DelegatingFilterProxy`。这可以通过重写 `getServletFilters` 方法来实现。\n\n```\n\
  package com.apress.spring6recipes.court.web;\nimport org.springframework.web.filter.DelegatingFilterProxy;\n\
  import org.springframework.web.servlet.support.AbstractAnnotationConfigDispatcherServletInitializer;\n\
  import jakarta.servlet.Filter;\npublic class CourtRestApplicationInitializer extends\
  \ AbstractAnnotationConfigDispatcherServletInitializer {\n@Override\nprotected Filter[]\
  \ getServletFilters() {\nreturn new Filter[] {\nnew DelegatingFilterProxy(\"metricsFilter\"\
  )\n};\n}\n}\n清单 10-91\nServlet 过滤器配置\n```\n\n部署应用程序并启动客户端（以便有一些传入和已处理的请求）后，你可以将\
  \ JConsole 连接到 Tomcat 实例并查看指标（参见图 10-10）。\n\n![](img/314861_5_En_10_Fig10_HTML.jpg)\n\
  \n一个显示 org.apache.bootstrap.start 窗口的截图，其中选中了 MBeans 选项卡。左侧窗口选中了 Attributes 选项，右侧窗口显示了\
  \ 17 个属性值。\n\n图 10-10\n通过 JMX 查看服务器指标\n\n#### 通过 MeterBinder 暴露额外指标\n\n除了通过 `Observation`\
  \ 为 `RestTemplate`、`WebClient` 或 Servlet 过滤器创建指标外，你还可以使用 `MeterBinder` 来暴露系统中特定部分的指标。例如，显示缓存使用情况、JVM\
  \ 运行时间或 JVM 内存统计信息的指标。为此，你可以使用 `MeterBinder` 并实现它以暴露所需的指标。\n\nMicrometer 已经提供了相当多的\
  \ `MeterBinder` 实现供你使用。表 10-3 列出了其中一部分。\n\n表 10-3\nMicrometer MeterBinder 实现\n\n\
  | 名称 | 描述 |\n| --- | --- |\n| `DiskSpaceMetrics` | 暴露系统磁盘空间使用情况的指标 |\n| `HibernateMetrics`\
  \ | 来自 Hibernate 的指标，如查询统计、实体、缓存命中率等 |\n| `JvmGcMetrics` | GC 指标 |\n| `JvmMemoryMetrics`\
  \ | 各种内存指标和缓冲池 |\n| `JvmThreadMetrics` | 线程指标，包括总数、守护线程数、存活数等 |\n| `ProcessorMetrics`\
  \ | CPU 使用率指标 |\n| `TomcatMetrics` | Tomcat 指标，如 HTTP 会话数、线程数等 |\n| `UptimeMetrics`\
  \ | 系统运行时间的计时器 |\n\n使用这些实现最简单的方法是将所有你想要的 `MeterBinder` 实现注册为应用程序上下文中的 Bean，然后让一个额外的组件从上下文中获取所有这些\
  \ Bean（参见第 1 章），遍历它们并调用 `MeterBinder.bindTo` 方法。`bindTo` 方法需要之前注册的 `MeterRegistry`\
  \ 才能正常工作。\n\n使用以下组件，你可以轻松配置要使用的 `MeterBinder`。\n\n```\npackage com.apress.spring6recipes.court;\n\
  import org.springframework.beans.factory.ObjectProvider;\nimport org.springframework.stereotype.Component;\n\
  import io.micrometer.core.instrument.MeterRegistry;\nimport io.micrometer.core.instrument.binder.MeterBinder;\n\
  import jakarta.annotation.PostConstruct;\n@Component\npublic class MeterBinderRegistrar\
  \ {\nprivate final MeterRegistry registry;\nprivate final ObjectProvider binders;\n\
  public MeterBinderRegistrar(MeterRegistry registry,\nObjectProvider binders) {\n\
  this.registry = registry;\nthis.binders = binders;\n}\n@PostConstruct\npublic void\
  \ register() {\nthis.binders\n.forEach( (b) -> b.bindTo(this.registry));\n}\n}\n\
  清单 10-92\nMeterBinderRegistrar 类\n```\n\n对于每个检测到的 `MeterBinder`，它会在构造后调用 `bindTo`\
  \ 方法。这里优先使用 `ObjectProvider`，因为它会延迟 `MeterBinder` 实现的构造。如果使用集合，则可能会强制进行急切初始化。有关核心任务和容器的更多信息，请参见第\
  \ 1 章。\n\n现在，你可以创建一个配置，注册一些 `MeterBinder` 实例来暴露指标。让我们暴露内存、线程和运行时间指标（参见清单 10-93）。\n\
  \n```\n@Configuration\nclass MeterBindersConfiguration {\n@Bean\npublic UptimeMetrics\
  \ uptimeMetrics() {\nreturn new UptimeMetrics();\n}\n@Bean\npublic JvmThreadMetrics\
  \ jvmThreadMetrics() {\nreturn new JvmThreadMetrics();\n}\n@Bean\npublic JvmMemoryMetrics\
  \ jvmMemoryMetrics() {\nreturn new JvmMemoryMetrics();\n}\n}\n清单 10-93\nMeterBinder\
  \ 配置类\n```\n\n现在，当重启客户端（或服务器，如果你将配置放在服务器中）时，你可以看到暴露了额外的指标（参见图 10-11）。\n\n![](img/314861_5_En_10_Fig11_HTML.jpg)\n\
  \n一个显示 spring 6 recipes.court.member.client 窗口的截图，其中选中了 MBeans 选项卡。左侧窗格选中了 jvm threads\
  \ live 下的 Attributes 选项，右侧窗格显示了 2 个参数的属性值。\n\n图 10-11\n通过 JMX 查看额外指标\n\n## 10-12\\\
  . 总结\n\n本章讨论了 JMX 及其一些相关规范。你学习了如何将 Spring Bean 导出为 JMX MBeans，以及如何从客户端（无论是远程还是本地）使用这些\
  \ MBeans，这通过 Spring 的代理实现。你还在 Spring 中发布和监听了 JMX 服务器上的通知事件。你还学习了如何在 Spring 的帮助下执行邮件任务，包括如何创建邮件模板和发送带附件的邮件（MIME\
  \ 消息）。你还学习了如何使用 Quartz 调度器以及 Spring 的任务命名空间来调度任务。\n\n虽然 REST 在基于 Web 的应用程序之间的通信中已占据主导地位，但\
  \ SOAP 仍然是一个有效的选择。我们讨论了契约优先的 SOAP Web 服务，以及如何利用 Spring-WS 创建和使用这类服务。\n\n最后，我们探讨了\
  \ Spring 中一些可观测性支持，包括 Java Flight Recorder 以及与 Micrometer API 集成的可能性。\n\n\n\n# 11.\
  \ Spring 消息\n\n在本章中，你将了解 Spring 对消息传递的支持。消息传递是一种非常强大的技术，可用于扩展应用程序。它允许将原本可能压垮服务的工作排队处理，同时也鼓励采用解耦架构。例如，一个组件可能只消费基于\
  \ `java.util.Map` 键值对的单一消息。这种松散的契约使其成为多个不同系统之间可行的通信枢纽。\n\n在本章中，我们会频繁提及“主题”和“队列”。消息传递解决方案旨在解决两种架构需求：从应用程序中的一个已知点向另一个已知点传递消息，以及从应用程序中的一个点向多个未知点传递消息。这些模式分别相当于中间件中的面对面交谈和通过扩音器对一屋子人说话。\n\
  \n如果你希望将消息队列中的消息广播给一组正在“监听”该消息的未知客户端（就像扩音器的比喻），那么请将消息发送到“主题”。如果你希望将消息发送给单个已知客户端，那么请通过“队列”发送。\n\
  \n到本章结束时，你将能够使用 Spring 创建和访问基于消息的中间件。本章还将为你提供消息传递的一般实用知识，这将有助于你理解下一章关于 Spring Integration\
  \ 的内容。\n\n我们将研究消息抽象，以及如何使用它与 JMS、AMQP 和 Apache Kafka 协同工作。对于每种技术，Spring 都通过基于模板的方法简化了使用，便于轻松发送和接收消息。此外，Spring\
  \ 还允许在其 IoC 容器中声明的 Bean 监听消息并对其做出响应。它对每种技术都采用了相同的方法。\n\n![](img/314861_5_En_11_Figa_HTML.gif)一个信息符号，由带阴影圆圈内的字母\
  \ i 图标表示。 在 `bin` 目录中，有几个脚本用于启动不同消息提供者的 Docker 化版本：用于 JMS 的 ActiveMQ Artemis、用于\
  \ AMQP 的 RabbitMQ，以及最后的 Apache Kafka。\n\n## 11-1. 使用 Spring 发送和接收 JMS 消息\n\n###\
  \ 问题\n\n要发送或接收 JMS 消息，你必须执行以下任务：\n\n1.  在消息代理上创建 JMS 连接工厂。\n2.  创建 JMS 目标，可以是队列或主题。\n\
  3.  从连接工厂打开 JMS 上下文。\n4.  使用消息生产者或消费者发送或接收 JMS 消息。\n5.  处理 `JMSException`，这是一个必须处理的受检异常。\n\
  6.  关闭 JMS 连接工厂和 JMS 上下文。\n\n如你所见，发送或接收一条简单的 JMS 消息需要编写大量代码。事实上，这些任务大多是样板代码，每次处理\
  \ JMS 时都需要重复执行。\n\n### 解决方案\n\nSpring 提供了一种基于模板的解决方案来简化 JMS 代码。使用 JMS 模板（Spring\
  \ 框架类 `JmsTemplate`），你可以用更少的代码发送和接收 JMS 消息。该模板处理样板任务，并将 JMS API 的 `JMSException`\
  \ 层次结构转换为 Spring 的运行时异常 `org.springframework.jms.JmsException` 层次结构。\n\n### 工作原理\n\
  \n假设你正在开发一个邮局系统，该系统包含两个子系统：前台子系统和后台子系统。当前台收到邮件时，它会将邮件传递给后台进行分类和投递。同时，前台子系统会向后台子系统发送一条\
  \ JMS 消息，通知其有新邮件。邮件信息由以下记录表示。\n\n```\npackage com.apress.spring6recipes.post;\n\
  public record Mail(String mailId, String country, double weight) { }\n清单 11-1\n\
  Mail 类\n```\n\n发送和接收邮件信息的方法定义在 `FrontDesk` 和 `BackOffice` 接口中，如下所示。\n\n```\npackage\
  \ com.apress.spring6recipes.post;\npublic interface BackOffice {\nMail receiveMail();\n\
  }\n清单 11-3\nBackOffice 接口\n```\n\n```\npackage com.apress.spring6recipes.post;\n\
  public interface FrontDesk {\nvoid sendMail(Mail mail);\n}\n清单 11-2\nFrontDesk 接口\n\
  ```\n\n\n\n#### 不使用 Spring 的 JMS 模板支持发送和接收消息\n\n首先，我们来看看如何在不使用 Spring 的 JMS 模板支持的情况下发送和接收\
  \ JMS 消息。下面的 `FrontDeskImpl` 类直接使用 JMS API 发送 JMS 消息。\n\n```\npackage com.apress.spring6recipes.post;\n\
  import jakarta.jms.Session;\nimport org.apache.activemq.artemis.jms.client.ActiveMQConnectionFactory;\n\
  import org.apache.activemq.artemis.jms.client.ActiveMQQueue;\nimport java.util.Map;\n\
  public class FrontDeskImpl implements FrontDesk {\npublic void sendMail(Mail mail)\
  \ {\ntry (var cf = new ActiveMQConnectionFactory(\"tcp://localhost:61616\");\nvar\
  \ ctx = cf.createContext(Session.AUTO_ACKNOWLEDGE)) {\nvar destination = new ActiveMQQueue(\"\
  mail.queue\");\nvar mapContext = Map.of(\n\"mailId\", mail.mailId(),\n\"country\"\
  , mail.country(),\n\"weight\", mail.weight());\nctx.createProducer().send(destination,\
  \ mapContext);\n}\n}\n}\nListing 11-4\nPlain JMS FrontDesk implementation\n```\n\
  \n在上述 `sendMail()` 方法中，你首先使用 ActiveMQ 提供的类创建了 JMS 特定的 `ConnectionFactory`（即 `ActiveMQConnectionFactory`）和\
  \ `Destination`（即 `ActiveMQQueue`）对象。如果你在 localhost 上运行，消息代理 URL 是 ActiveMQ 的默认地址。在\
  \ JMS 中，有两种类型的目标地址：队列（queue）和主题（topic）。\n\n正如本章开头所述，队列用于点对点通信模型，而主题用于发布-订阅通信模型。由于你是从前台向后台以点对点方式发送\
  \ JMS 消息，因此应该使用消息队列。你也可以使用 `ActiveMQTopic` 类轻松创建一个主题作为目标地址。\n\n接下来，在发送消息之前，你必须创建一个上下文和消息生产者。JMS\
  \ API 中定义了多种消息类型，包括 `TextMessage`、`MapMessage`、`BytesMessage`、`ObjectMessage` 和\
  \ `StreamMessage`。`MapMessage` 以键/值对的形式包含消息内容，类似于一个映射。所有这些类型都是接口，它们都实现了 `Message`\
  \ 接口。`JMSProducer` 提供了多个 `send` 方法，这些方法接受不同类型，例如 `java.util.Map`、`byte[]` 等。每个 `send`\
  \ 方法都对应 JMS 提供的一种消息类型。同时，有时你需要处理 JMS API 可能抛出的 `JMSException`。最后，你必须记得关闭会话和连接以释放系统资源。使用\
  \ try-with-resources 有助于自动关闭它们。\n\n另一方面，下面的 `BackOfficeImpl` 类直接使用 JMS API 接收 JMS\
  \ 消息。\n\n```\npackage com.apress.spring6recipes.post;\nimport jakarta.jms.JMSException;\n\
  import jakarta.jms.JMSRuntimeException;\nimport jakarta.jms.MapMessage;\nimport\
  \ jakarta.jms.Message;\nimport jakarta.jms.Session;\nimport org.apache.activemq.artemis.jms.client.ActiveMQConnectionFactory;\n\
  import org.apache.activemq.artemis.jms.client.ActiveMQQueue;\npublic class BackOfficeImpl\
  \ implements BackOffice {\npublic Mail receiveMail() {\ntry (var cf = new ActiveMQConnectionFactory(\"\
  tcp://localhost:61616\");\nvar ctx = cf.createContext(Session.AUTO_ACKNOWLEDGE))\
  \ {\nvar destination = new ActiveMQQueue(\"mail.queue\");\nvar consumer = ctx.createConsumer(destination);\n\
  var message = consumer.receive();\nreturn convert(message);\n} catch (JMSException\
  \ ex) {\nthrow new RuntimeException(ex.getMessage(), ex);\n}\n}\nprivate Mail convert(Message\
  \ msg) throws JMSException {\nvar message = (MapMessage) msg;\nreturn new Mail(message.getString(\"\
  mailId\"),\nmessage.getString(\"country\"),\nmessage.getDouble(\"weight\"));\n}\n\
  }\nListing 11-5\nPlain JMS BackOffice implementation\n```\n\n此方法中的大部分代码与发送 JMS 消息的代码类似，区别在于你创建了一个消息消费者，并从中接收\
  \ JMS 消息。\n\n当使用 `JMSConsumer` 接收消息时，你可以调用它提供的某个 `receive` 方法。有些方法允许指定超时时间，另一些方法则用于获取特定类型消息的特定负载（例如\
  \ `java.util.Map`、`byte[]` 等）。这里我们期望收到一个 `MapMessage`，因此可以直接通过调用 `receiveBody(Map.class)`\
  \ 来获取负载。然而，这里我们选择使用简单的 `receive()` 方法，它会返回一个 `MapMessage`。\n\n最后，让我们为前台子系统（例如 `FrontOfficeConfiguration`）和后台子系统（例如\
  \ `BackOfficeConfiguration`）创建两个配置类。\n\n```\npackage com.apress.spring6recipes.post.config;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import com.apress.spring6recipes.post.BackOfficeImpl;\n@Configuration\npublic class\
  \ BackOfficeConfiguration {\n@Bean\npublic BackOfficeImpl backOffice() {\nreturn\
  \ new BackOfficeImpl();\n}\n}\nListing 11-7\nBackOffice configuration\n```\n\n```\n\
  package com.apress.spring6recipes.post.config;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport com.apress.spring6recipes.post.FrontDeskImpl;\n\
  @Configuration\npublic class FrontOfficeConfiguration {\n@Bean\npublic FrontDeskImpl\
  \ frontDesk() {\nreturn new FrontDeskImpl();\n}\n}\nListing 11-6\nFrontDesk configuration\n\
  ```\n\n现在，前台和后台子系统已经基本准备好发送和接收 JMS 消息了。但在进行最后一步之前，请先启动 ActiveMQ 消息代理（如果尚未启动）。\n\n\
  ![](img/314861_5_En_11_Figb_HTML.gif)一个带有轮廓的灯泡图标，表示信息提示。  你可以轻松监控 ActiveMQ Artemis\
  \ 消息代理的活动。在默认安装中，你可以打开 http://localhost:8161/console 查看 `mail.queue`（这些示例中使用的队列）的情况。\n\
  \n接下来，让我们创建几个主类来运行消息系统：一个用于前台子系统——`FrontDeskMain` 类，另一个用于后台子系统——`BackOfficeMain`\
  \ 类。\n\n```\npackage com.apress.spring6recipes.post;\nimport com.apress.spring6recipes.post.config.BackOfficeConfiguration;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class BackOfficeMain {\npublic static void main(String[] args) {\nvar cfg\
  \ = BackOfficeConfiguration.class;\ntry (var context = new AnnotationConfigApplicationContext(cfg))\
  \ {\nvar backOffice = context.getBean(BackOffice.class);\nvar mail = backOffice.receiveMail();\n\
  System.out.printf(\"Recieved: %s%n\", mail);\n}\n}\n}\nListing 11-9\nMain class—BackOffice\n\
  ```\n\n```\npackage com.apress.spring6recipes.post;\nimport com.apress.spring6recipes.post.config.FrontOfficeConfiguration;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class FrontDeskMain {\npublic static void main(String[] args) {\nvar cfg\
  \ = FrontOfficeConfiguration.class;\ntry (var context = new AnnotationConfigApplicationContext(cfg))\
  \ {\nvar frontDesk = context.getBean(FrontDesk.class);\nfrontDesk.sendMail(new Mail(\"\
  1234\", \"US\", 1.5));\n}\n}\n}\nListing 11-8\nMain class—FrontDesk\n```\n\n每次你使用上述\
  \ `FrontDeskMain` 类运行前台应用程序时，都会向代理发送一条消息；每次你使用上述 `BackOfficeMain` 类运行后台应用程序时，都会尝试从代理获取一条消息。\n\
  \n\n\n#### 使用 Spring 的 JMS 模板发送和接收消息\n\nSpring 提供了 `JmsTemplate`，可以简化你的 JMS 代码。要使用此模板发送\
  \ JMS 消息，你只需调用 `send()` 方法并提供消息目的地，以及一个 `MessageCreator` 对象，该对象用于创建你要发送的 JMS 消息。`MessageCreator`\
  \ 对象通常实现为匿名内部类。\n\n```\npackage com.apress.spring6recipes.post;\nimport jakarta.jms.Destination;\n\
  import org.springframework.jms.core.JmsTemplate;\npublic class FrontDeskImpl implements\
  \ FrontDesk {\nprivate final JmsTemplate jmsTemplate;\nprivate final Destination\
  \ destination;\npublic FrontDeskImpl(JmsTemplate jmsTemplate, Destination destination)\
  \ {\nthis.jmsTemplate = jmsTemplate;\nthis.destination = destination;\n}\npublic\
  \ void sendMail(Mail mail) {\njmsTemplate.send(destination, session -> {\nvar message\
  \ = session.createMapMessage();\nmessage.setString(\"mailId\", mail.mailId());\n\
  message.setString(\"country\", mail.country());\nmessage.setDouble(\"weight\", mail.weight());\n\
  return message;\n});\n}\n}\n清单 11-10\nJMS 模板 FrontDesk 实现\n```\n\n请注意，内部类只能访问封闭方法中实际上是\
  \ final 的参数或变量。`MessageCreator` 接口只声明了一个 `createMessage()` 方法供你实现。在此方法中，你使用提供的 JMS\
  \ 会话创建并返回你的 JMS 消息。\n\nJMS 模板帮助你获取和释放 JMS 连接和会话，并发送由你的 `MessageCreator` 对象创建的 JMS\
  \ 消息。此外，它还将 JMS API 的 `JMSException` 层次结构转换为 Spring 的 JMS 运行时异常层次结构，其基类异常是 `org.springframework.jms.JmsException`。你可以捕获从\
  \ `send` 方法及其变体抛出的 `JmsException`，然后根据需要在 catch 块中采取行动。\n\n在前台子系统的 bean 配置文件中，你声明了一个\
  \ JMS 模板，该模板引用 JMS 连接工厂来打开连接。然后，你将此模板以及消息目的地注入到你的前台 bean 中。\n\n```\npackage com.apress.spring6recipes.post.config;\n\
  import com.apress.spring6recipes.post.FrontDeskImpl;\nimport jakarta.jms.ConnectionFactory;\n\
  import jakarta.jms.Queue;\nimport org.apache.activemq.artemis.jms.client.ActiveMQConnectionFactory;\n\
  import org.apache.activemq.artemis.jms.client.ActiveMQQueue;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jms.core.JmsTemplate;\n\
  @Configuration\npublic class FrontOfficeConfiguration {\n@Bean\npublic ConnectionFactory\
  \ connectionFactory() {\nreturn new ActiveMQConnectionFactory(\"tcp://localhost:61616\"\
  );\n}\n@Bean\npublic Queue mailDestination() {\nreturn new ActiveMQQueue(\"mail.queue\"\
  );\n}\n@Bean\npublic JmsTemplate jmsTemplate(ConnectionFactory cf) {\nreturn new\
  \ JmsTemplate(cf);\n}\n@Bean\npublic FrontDeskImpl frontDesk(JmsTemplate jms, Queue\
  \ destination) {\nreturn new FrontDeskImpl(jms, destination);\n}\n}\n清单 11-11\n\
  FrontDesk 配置\n```\n\n要使用 JMS 模板接收 JMS 消息，你可以通过提供消息目的地来调用 `receive()` 方法。此方法返回一个\
  \ JMS 消息 `javax.jms.Message`，其类型是基础的 JMS 消息类型（即一个接口），因此你必须在进一步处理之前将其转换为适当的类型。\n\n\
  ```\npackage com.apress.spring6recipes.post;\nimport jakarta.jms.Destination;\n\
  import jakarta.jms.JMSException;\nimport jakarta.jms.MapMessage;\nimport jakarta.jms.Message;\n\
  import org.springframework.jms.core.JmsTemplate;\nimport org.springframework.jms.support.JmsUtils;\n\
  public class BackOfficeImpl implements BackOffice {\nprivate final JmsTemplate jmsTemplate;\n\
  private final Destination destination;\npublic BackOfficeImpl(JmsTemplate jmsTemplate,\
  \ Destination destination) {\nthis.jmsTemplate = jmsTemplate;\nthis.destination\
  \ = destination;\n}\npublic Mail receiveMail() {\nvar message = jmsTemplate.receive(destination);\n\
  try {\nreturn message != null ? convert(message) : null;\n} catch (JMSException\
  \ e) {\nthrow JmsUtils.convertJmsAccessException(e);\n}\n}\nprivate Mail convert(Message\
  \ msg) throws JMSException {\nvar message = (MapMessage) msg;\nreturn new Mail(message.getString(\"\
  mailId\"),\nmessage.getString(\"country\"),\nmessage.getDouble(\"weight\"));\n}\n\
  }\n清单 11-12\nJMS 模板 BackOffice 实现\n```\n\n然而，在从接收到的 `MapMessage` 对象中提取信息时，你仍然需要处理\
  \ JMS API 的 `JMSException`。这与框架的默认行为形成鲜明对比，在调用 `JmsTemplate` 上的方法时，框架会自动为你映射异常。为了使此方法抛出的异常类型保持一致，你必须调用\
  \ `JmsUtils.convertJmsAccessException()` 将 JMS API 的 `JMSException` 转换为 Spring 的\
  \ `JmsException`。\n\n在后端子系统的 bean 配置文件中，你声明了一个 JMS 模板，并将其与消息目的地一起注入到你的后台 bean 中。\n\
  \n```\npackage com.apress.spring6recipes.post.config;\nimport com.apress.spring6recipes.post.BackOfficeImpl;\n\
  import jakarta.jms.ConnectionFactory;\nimport jakarta.jms.Queue;\nimport org.apache.activemq.artemis.jms.client.ActiveMQConnectionFactory;\n\
  import org.apache.activemq.artemis.jms.client.ActiveMQQueue;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.jms.core.JmsTemplate;\n\
  @Configuration\npublic class BackOfficeConfiguration {\n@Bean\npublic ConnectionFactory\
  \ connectionFactory() {\nreturn new ActiveMQConnectionFactory(\"tcp://localhost:61616\"\
  );\n}\n@Bean\npublic Queue mailDestination() {\nreturn new ActiveMQQueue(\"mail.queue\"\
  );\n}\n@Bean\npublic JmsTemplate jmsTemplate(ConnectionFactory cf) {\nvar jmsTemplate\
  \ = new JmsTemplate();\njmsTemplate.setConnectionFactory(cf);\njmsTemplate.setReceiveTimeout(10000);\n\
  return jmsTemplate;\n}\n@Bean\npublic BackOfficeImpl backOffice(JmsTemplate jms,\
  \ Queue destination) {\nreturn new BackOfficeImpl(jms, destination);\n}\n}\n清单 11-13\n\
  BackOffice 配置\n```\n\n请特别注意 JMS 模板的 `receiveTimeout` 属性；它指定了等待的毫秒数。默认情况下，此模板会在目的地无限期等待\
  \ JMS 消息，同时调用线程会被阻塞。为了避免长时间等待消息，你应该为此模板指定一个接收超时时间。如果在指定时间内目的地没有可用消息，JMS 模板的 `receive()`\
  \ 方法将返回 `null` 消息。\n\n在你的应用程序中，接收消息的主要用途可能是你期望对某事做出响应，或者希望按时间间隔检查消息，处理消息，然后暂停直到下一个时间间隔。如果你打算接收消息并作为服务响应它们，你很可能希望使用本章后面描述的消息驱动\
  \ POJO 功能。在那里，我们讨论了一种机制，该机制将持续等待消息，并在消息到达时通过回调你的应用程序来处理它们。\n\n\n\n#### 向默认目标发送和接收消息\n\
  \n无需为每个 JMS 模板的 `send()` 和 `receive()` 方法调用指定消息目标，你可以为 JMS 模板指定一个默认目标。这样，你就不再需要将其注入到消息发送者和接收者\
  \ Bean 中。以下清单展示了 `FrontOfficeConfiguration` 的修改；同样的修改也适用于 `BackOfficeConfiguration`。\n\
  \n```\npackage com.apress.spring6recipes.post.config;\n@Configuration\npublic class\
  \ FrontOfficeConfiguration {\n@Bean\npublic JmsTemplate jmsTemplate(ConnectionFactory\
  \ cf, Queue destination) {\nvar jmsTemplate = new JmsTemplate();\njmsTemplate.setConnectionFactory(cf);\n\
  jmsTemplate.setDefaultDestination(destination);\nreturn jmsTemplate;\n}\n@Bean\n\
  public FrontDeskImpl frontDesk(JmsTemplate jms) {\nreturn new FrontDeskImpl(jms);\n\
  }\n}\n清单 11-14\n配置了默认目标的 FrontDesk 配置\n```\n\n为 JMS 模板指定默认目标后，你可以从消息发送者和接收者类中删除消息目标的构造函数参数。现在，当你调用\
  \ `send()` 和 `receive()` 方法时，不再需要指定消息目标。\n\n此外，除了为 JMS 模板指定 `Destination` 接口的实例，你还可以指定目标名称，让\
  \ JMS 模板为你解析它，这样你就可以从两个 Bean 配置类中删除目标属性声明。这通过设置 `defaultDestinationName` 属性来实现。\n\
  \n```\npackage com.apress.spring6recipes.post.config;\n@Configuration\npublic class\
  \ FrontOfficeConfiguration {\n@Bean\npublic JmsTemplate jmsTemplate(ConnectionFactory\
  \ cf) {\nvar jmsTemplate = new JmsTemplate();\njmsTemplate.setConnectionFactory(cf);\n\
  jmsTemplate.setDefaultDestinationName(\"mail.queue\");\nreturn jmsTemplate;\n}\n\
  }\n清单 11-15\n配置了默认目标名称的 FrontDesk 配置\n```\n\n#### 扩展 JmsGatewaySupport 类\n\nJMS\
  \ 发送者和接收者类也可以扩展 `JmsGatewaySupport` 来获取 JMS 模板。对于扩展 `JmsGatewaySupport` 以创建其 JMS\
  \ 模板的类，你有以下两种选择：\n\n*   为 `JmsGatewaySupport` 注入一个 JMS 连接工厂，使其自动创建一个 JMS 模板。但是，如果这样做，你将无法配置\
  \ JMS 模板的详细信息。\n\n*   为 `JmsGatewaySupport` 注入一个由你创建和配置的 JMS 模板。\n\n其中，如果你必须自己配置\
  \ JMS 模板，第二种方法更合适。你可以从发送者和接收者类中删除私有字段 `jmsTemplate` 及其构造函数参数。当你需要访问 JMS 模板时，只需调用\
  \ `getJmsTemplate()` 即可。\n\n```\npackage com.apress.spring6recipes.post;\nimport\
  \ jakarta.jms.JMSException;\nimport jakarta.jms.MapMessage;\nimport jakarta.jms.Message;\n\
  import org.springframework.jms.core.support.JmsGatewaySupport;\nimport org.springframework.jms.support.JmsUtils;\n\
  public class BackOfficeImpl extends JmsGatewaySupport implements BackOffice {\n\
  public Mail receiveMail() {\nvar message = getJmsTemplate().receive();\ntry {\n\
  return message != null ? convert(message) : null;\n} catch (JMSException e) {\n\
  throw JmsUtils.convertJmsAccessException(e);\n}\n}\nprivate Mail convert(Message\
  \ msg) throws JMSException {\nvar message = (MapMessage) msg;\nreturn new Mail(message.getString(\"\
  mailId\"),\nmessage.getString(\"country\"),\nmessage.getDouble(\"weight\"));\n}\n\
  }\n清单 11-17\n扩展 JmsGatewaySupport 的 BackOffice 实现\n```\n\n```\npackage com.apress.spring6recipes.post;\n\
  import org.springframework.jms.core.support.JmsGatewaySupport;\npublic class FrontDeskImpl\
  \ extends JmsGatewaySupport implements FrontDesk {\npublic void sendMail(final Mail\
  \ mail) {\ngetJmsTemplate().send(session -> {\nvar message = session.createMapMessage();\n\
  message.setString(\"mailId\", mail.mailId());\nmessage.setString(\"country\", mail.country());\n\
  message.setDouble(\"weight\", mail.weight());\nreturn message;\n});\n}\n}\n清单 11-16\n\
  扩展 JmsGatewaySupport 的 FrontDesk 实现\n```\n\n## 11-2\\. 转换 JMS 消息\n\n### 问题\n\n你的应用程序从消息队列接收消息，但需要将这些消息从\
  \ JMS 特定类型转换为业务特定类。\n\n### 解决方案\n\nSpring 提供了 `SimpleMessageConverter` 的实现，用于处理将接收到的\
  \ JMS 消息转换为业务对象，以及将业务对象转换为 JMS 消息。你可以利用默认转换器，也可以提供自己的转换器。\n\n\n\n### 工作原理\n\n前面的示例处理了原始的\
  \ JMS 消息。Spring 的 JMS 模板可以通过消息转换器，帮助你在 Java 对象与 JMS 消息之间进行转换。默认情况下，JMS 模板使用 `SimpleMessageConverter`\
  \ 来将 `TextMessage` 与字符串相互转换、将 `BytesMessage` 与字节数组相互转换、将 `MapMessage` 与映射（Map）相互转换，以及将\
  \ `ObjectMessage` 与可序列化对象相互转换。\n\n对于上一个示例中的前台和后台类，你可以使用 `convertAndSend()` 和 `receiveAndConvert()`\
  \ 方法来发送和接收映射，其中映射会被转换为 `MapMessage` 或从 `MapMessage` 转换回来。\n\n```\npackage com.apress.spring6recipes.post;\n\
  import jakarta.jms.JMSException;\nimport org.springframework.jms.core.support.JmsGatewaySupport;\n\
  import org.springframework.jms.support.JmsUtils;\nimport java.util.Map;\npublic\
  \ class BackOfficeImpl extends JmsGatewaySupport implements BackOffice {\npublic\
  \ Mail receiveMail() {\nvar message = (Map) getJmsTemplate().receiveAndConvert();\n\
  try {\nreturn message != null ? convert(message) : null;\n} catch (JMSException\
  \ e) {\nthrow JmsUtils.convertJmsAccessException(e);\n}\n}\nprivate Mail convert(Map\
  \ msg) throws JMSException {\nreturn new Mail(\n(String) msg.get(\"mailId\"),\n\
  (String) msg.get(\"country\"),\n(Double) msg.get(\"weight\"));\n}\n}\n清单 11-19\n\
  使用 receiveAndConvert 的后台实现\n```\n\n```\npackage com.apress.spring6recipes.post;\n\
  import org.springframework.jms.core.support.JmsGatewaySupport;\nimport java.util.Map;\n\
  public class FrontDeskImpl extends JmsGatewaySupport implements FrontDesk {\npublic\
  \ void sendMail(final Mail mail) {\nvar map = Map.of(\n\"mailId\", mail.mailId(),\n\
  \"country\", mail.country(),\n\"weight\", mail.weight());\ngetJmsTemplate().convertAndSend(map);\n\
  }\n}\n清单 11-18\n使用 convertAndSend 的前台实现\n```\n\n你也可以通过实现 `MessageConverter` 接口来创建自定义消息转换器，用于转换邮件对象。\n\
  \n```\npackage com.apress.spring6recipes.post;\nimport jakarta.jms.JMSException;\n\
  import jakarta.jms.MapMessage;\nimport jakarta.jms.Message;\nimport jakarta.jms.Session;\n\
  import org.springframework.jms.support.converter.MessageConversionException;\nimport\
  \ org.springframework.jms.support.converter.MessageConverter;\npublic class MailMessageConverter\
  \ implements MessageConverter {\npublic Object fromMessage(Message message) throws\
  \ JMSException,\nMessageConversionException {\nvar mapMessage = (MapMessage) message;\n\
  return new Mail(\nmapMessage.getString(\"mailId\"),\nmapMessage.getString(\"country\"\
  ),\nmapMessage.getDouble(\"weight\"));\n}\npublic Message toMessage(Object object,\
  \ Session session) throws JMSException,\nMessageConversionException {\nvar mail\
  \ = (Mail) object;\nvar message = session.createMapMessage();\nmessage.setString(\"\
  mailId\", mail.mailId());\nmessage.setString(\"country\", mail.country());\nmessage.setDouble(\"\
  weight\", mail.weight());\nreturn message;\n}\n}\n清单 11-20\nMessageConverter 实现\n\
  ```\n\n要应用此消息转换器，你需要将其注入到 JMS 模板中。\n\n```\n@Configuration\npublic class BackOfficeConfiguration\
  \ {\n...\n@Bean\npublic JmsTemplate jmsTemplate() {\nJmsTemplate jmsTemplate = new\
  \ JmsTemplate();\njmsTemplate.setMessageConverter(new MailMessageConverter());\n\
  ...\nreturn jmsTemplate;\n}\n}\n清单 11-21\n使用 MessageConverter 的 JmsTemplate 配置\n\
  ```\n\n当你为 JMS 模板显式设置消息转换器时，它将覆盖默认的 `SimpleMessageConverter`。现在，你可以调用 JMS 模板的 `convertAndSend()`\
  \ 和 `receiveAndConvert()` 方法来发送和接收 `Mail` 对象。\n\n```\npackage com.apress.spring6recipes.post;\n\
  ...\npublic class BackOfficeImpl extends JmsGatewaySupport implements BackOffice\
  \ {\npublic Mail receiveMail() {\nreturn (Mail) getJmsTemplate().receiveAndConvert();\n\
  }\n}\n清单 11-23\n使用 receiveAndConvert 和 MessageConverter 的后台实现\n```\n\n```\npackage\
  \ com.apress.spring6recipes.post;\n...\npublic class FrontDeskImpl extends JmsGatewaySupport\
  \ implements FrontDesk {\npublic void sendMail(Mail mail) {\ngetJmsTemplate().convertAndSend(mail);\n\
  }\n}\n清单 11-22\n使用 convertAndSend 和 MessageConverter 的前台实现\n```\n\n## 11-3\\. 管理\
  \ JMS 事务\n\n### 问题\n\n你希望参与 JMS 事务，以便消息的接收和发送具有事务性。\n\n### 解决方案\n\n你可以使用与任何 Spring\
  \ 组件相同的事务策略。根据需要利用 Spring 的 `TransactionManager` 实现，并将行为注入到 Bean 中。\n\n### 工作原理\n\
  \n当在单个方法中生成或消费多个 JMS 消息时，如果中间发生错误，目标位置生成或消费的 JMS 消息可能会处于不一致状态。你必须用事务包围该方法以避免此问题。（有关事务的更多信息，请参见第\
  \ 7 章。）\n\n在 Spring 中，JMS 事务管理与其他数据访问策略保持一致。例如，你可以使用 `@Transactional` 注解来标注需要事务管理的方法。\n\
  \n```\npackage com.apress.spring6recipes.post;\nimport org.springframework.jms.core.support.JmsGatewaySupport;\n\
  import org.springframework.transaction.annotation.Transactional;\npublic class BackOfficeImpl\
  \ extends JmsGatewaySupport implements BackOffice {\n@Transactional\npublic Mail\
  \ receiveMail() {\nreturn (Mail) getJmsTemplate().receiveAndConvert();\n}\n}\n清单\
  \ 11-25\n支持事务的后台实现\n```\n\n```\npackage com.apress.spring6recipes.post;\nimport\
  \ org.springframework.jms.core.support.JmsGatewaySupport;\nimport org.springframework.transaction.annotation.Transactional;\n\
  public class FrontDeskImpl extends JmsGatewaySupport implements FrontDesk {\n@Transactional\n\
  public void sendMail(final Mail mail) {\ngetJmsTemplate().convertAndSend(mail);\n\
  }\n}\n清单 11-24\n支持事务的前台实现\n```\n\n然后，在两个 Java 配置类中，添加 `@EnableTransactionManagement`\
  \ 并声明一个事务管理器。本地 JMS 事务对应的事务管理器是 `JmsTransactionManager`，它需要引用 JMS 连接工厂。\n\n```\n\
  package com.apress.spring6recipes.post.config;\nimport org.springframework.jms.connection.JmsTransactionManager;\n\
  import org.springframework.transaction.annotation.EnableTransactionManagement;\n\
  @Configuration\n@EnableTransactionManagement\npublic class FrontOfficeConfiguration\
  \ {\n@Bean\npublic ConnectionFactory connectionFactory() {\n}\n@Bean\npublic JmsTransactionManager\
  \ transactionManager(ConnectionFactory cf) {\nreturn new JmsTransactionManager(cf);\n\
  }\n}\n清单 11-26\n支持事务的前台配置\n```\n\n如果你需要跨多个资源（例如数据源和 ORM 资源工厂）进行事务管理，或者需要分布式事务管理，则必须在应用服务器中配置\
  \ JTA 事务并使用 `JtaTransactionManager`。请注意，为了支持多资源事务，JMS 连接工厂必须符合 XA 标准（即必须支持分布式事务）。\n\
  \n## 11-4\\. 在 Spring 中创建消息驱动的 POJO\n\n### 问题\n\n当你在 JMS 消息消费者上调用 `receive()` 方法来接收消息时，调用线程会被阻塞，直到有消息可用。该线程除了等待什么也做不了。这种消息接收方式称为同步接收，因为应用程序必须等待消息到达才能完成其工作。你可以创建一个消息驱动的\
  \ POJO（MDP）来支持 JMS 消息的异步接收。MDP 使用 `@JmsListener` 注解进行装饰。\n\n![](img/314861_5_En_11_Figc_HTML.gif)一个由带阴影圆圈内字母\
  \ i 图标表示的信息符号。  在本示例的上下文中，消息驱动的 POJO 或 MDP 指的是一个能够监听 JMS 消息且无需任何特定运行时要求的 POJO。它并不指代符合\
  \ EJB 规范、需要 EJB 容器的消息驱动 Bean（MDB）。\n\n\n\n### 解决方案\n\nSpring 允许在其 IoC 容器中声明的 Bean\
  \ 像基于 EJB 规范的 MDB 一样监听 JMS 消息。由于 Spring 为 POJO 添加了消息监听能力，因此它们被称为消息驱动 POJO（MDP）。\n\
  \n### 工作原理\n\n假设你想在邮局的后台办公室添加一块电子板，以便实时显示从前台到达的邮件信息。当前台发送一条包含邮件信息的 JMS 消息时，后台子系统可以监听这些消息并将其显示在电子板上。为了获得更好的系统性能，你应该采用异步\
  \ JMS 接收方式，以避免阻塞接收这些 JMS 消息的线程。\n\n#### 使用消息监听器监听 JMS 消息\n\n首先，创建一个消息监听器来监听 JMS\
  \ 消息。该消息监听器提供了与之前食谱中 `BackOfficeImpl` 使用 `JmsTemplate` 的方法不同的替代方案。监听器也可以从代理中消费消息。例如，以下\
  \ `MailListener` 监听包含邮件信息的 JMS 消息。\n\n```\npackage com.apress.spring6recipes.post;\n\
  import jakarta.jms.JMSException;\nimport jakarta.jms.MapMessage;\nimport jakarta.jms.Message;\n\
  import jakarta.jms.MessageListener;\nimport org.springframework.jms.support.JmsUtils;\n\
  public class MailListener implements MessageListener {\npublic void onMessage(Message\
  \ message) {\ntry {\nvar mail = convert(message);\ndisplayMail(mail);\n} catch (JMSException\
  \ e) {\nthrow JmsUtils.convertJmsAccessException(e);\n}\n}\nprivate Mail convert(Message\
  \ msg) throws JMSException {\nvar message = (MapMessage) msg;\nreturn new Mail(message.getString(\"\
  mailId\"),\nmessage.getString(\"country\"),\nmessage.getDouble(\"weight\"));\n}\n\
  private void displayMail(Mail mail) {\nSystem.out.printf(\"Received: %s%n\", mail);\n\
  }\n}\n清单 11-27\n邮件监听器实现\n```\n\n消息监听器必须实现 `jakarta.jms.MessageListener` 接口。当 JMS\
  \ 消息到达时，`onMessage()` 方法将被调用，并将消息作为方法参数传入。在此示例中，你只需将邮件信息输出到控制台。请注意，从 `MapMessage`\
  \ 对象中提取消息信息时，需要处理 JMS API 的 `JMSException`。你可以调用 `JmsUtils.convertJmsAccessException()`\
  \ 将其转换为 Spring 的运行时异常 `JmsException`。\n\n接下来，你需要在后台办公室的配置中配置此监听器。仅声明此监听器不足以监听 JMS\
  \ 消息。你需要一个消息监听器容器来监控消息目标上的 JMS 消息，并在消息到达时触发你的消息监听器。\n\n```\npackage com.apress.spring6recipes.post.config;\n\
  import com.apress.spring6recipes.post.MailListener;\nimport jakarta.jms.ConnectionFactory;\n\
  import org.apache.activemq.artemis.jms.client.ActiveMQConnectionFactory;\nimport\
  \ org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.jms.listener.SimpleMessageListenerContainer;\n@Configuration\n\
  public class BackOfficeConfiguration {\n@Bean\npublic ConnectionFactory connectionFactory()\
  \ {\nreturn new ActiveMQConnectionFactory(\"tcp://localhost:61616\");\n}\n@Bean\n\
  public MailListener mailListener() {\nreturn new MailListener();\n}\n@Bean\npublic\
  \ Object container(ConnectionFactory cf, MailListener msgListener) {\nvar smlc =\
  \ new SimpleMessageListenerContainer();\nsmlc.setConnectionFactory(cf);\nsmlc.setDestinationName(\"\
  mail.queue\");\nsmlc.setMessageListener(msgListener);\nreturn smlc;\n}\n}\n清单 11-28\n\
  后台办公室配置\n```\n\nSpring 在 `org.springframework.jms.listener` 包中提供了多种类型的消息监听器容器供你选择，其中\
  \ `SimpleMessageListenerContainer` 和 `DefaultMessageListenerContainer` 是最常用的。`SimpleMessageListenerContainer`\
  \ 是最简单的，不支持事务。如果你在接收消息时有事务需求，则必须使用 `DefaultMessageListenerContainer`。\n\n现在，你可以启动消息监听器了。由于我们不需要调用\
  \ Bean 来触发消息消费——监听器会为我们完成——因此以下仅启动 Spring IoC 容器的主类就足够了。\n\n```\npackage com.apress.spring6recipes.post;\n\
  import com.apress.spring6recipes.post.config.BackOfficeConfiguration;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class BackOfficeMain {\npublic static void main(String[] args) throws Exception\
  \ {\nvar cfg = BackOfficeConfiguration.class;\ntry (var ctx = new AnnotationConfigApplicationContext(cfg))\
  \ {\nSystem.in.read();\n}\n}\n}\n清单 11-29\n后台办公室主类\n```\n\n当你启动此 BackOffice 应用程序时，它将监听消息代理（即\
  \ ActiveMQ）上的消息。一旦 FrontDesk 应用程序向代理发送消息，BackOffice 应用程序就会做出反应并将消息显示到控制台。\n\n\n\n\
  #### 使用 POJO 监听 JMS 消息\n\n虽然实现 `MessageListener` 接口的监听器可以监听消息，但在 Spring IoC 容器中声明的任意\
  \ bean 同样可以做到。这意味着 bean 既与 Spring 框架接口解耦，也与 JMS 的 `MessageListener` 接口解耦。要使该 bean\
  \ 的方法在消息到达时被触发，它可以使用以下类型作为其方法参数。\n\n表 11-1\n\n支持的方法参数\n\n| 类型 | 描述 |\n| --- | ---\
  \ |\n| `jakarta.jms.Session` | 获取基于 JMS 的会话。 |\n| `jakarta.jms.Message``jakarta.jms.BytesMessage``jakarta.jms.MapMessage``jakarta.jms.ObjectMessage``jakarta.jms.TextMessage`\
  \ | 用于访问原始 JMS 消息。 |\n| `org.springframework.messaging.Message` | 用于访问 Spring Messaging\
  \ 抽象消息。 |\n| 带有 `@Payload` 注解的参数 | 用于获取消息的有效载荷，包括通过 `@Valid` 进行验证和类型转换。 |\n| `@Header`\
  \ | 用于提取特定的标头值，包括标准的 JMS 标头。 |\n| `@Headers` | 用于提取所有标头；类型必须是 `java.util.Map`。 |\n\
  | `org.springframework.messaging.MessageHeaders` | 用于访问所有标头。 |\n| `org.springframework.messaging.support.MessageHeaderAccessor``org.springframework.jms.support.JmsMessageHeaderAccessor`\
  \ | 以类型安全的方式便捷地访问所有标头。 |\n\n例如，你声明一个接受 `Map<String, ?>` 作为参数的方法，并用 `@JmsListener`\
  \ 注解它。这个类不再需要实现 `MessageListener` 接口。\n\n```\npackage com.apress.spring6recipes.post;\n\
  import org.springframework.jms.annotation.JmsListener;\nimport java.util.Map;\n\
  public class MailListener {\n@JmsListener(destination = \"mail.queue\")\npublic\
  \ void displayMail(Map map) {\nvar mail = convert(map);\ndisplayMail(mail);\n}\n\
  private Mail convert(Map msg) {\nreturn new Mail(\n(String) msg.get(\"mailId\"),\n\
  (String) msg.get(\"country\"),\n(Double) msg.get(\"weight\"));\n}\nprivate void\
  \ displayMail(Mail mail) {\nSystem.out.printf(\"Received: %s%n\", mail);\n}\n}\n\
  清单 11-30\n使用 @JmsListener 的邮件监听器实现\n```\n\n为了检测 `@JmsListener` 注解，你需要在配置类上添加 `@EnableJms`\
  \ 注解，并且需要注册一个 `JmsListenerContainerFactory`，默认情况下它会以名称 `jmsListenerContainerFactory`\
  \ 被检测到。\n\nPOJO 通过 `JmsListenerContainerFactory` 注册到监听器容器。这个工厂创建并配置一个 `MessageListenerContainer`，并将注解的方法作为消息监听器注册到其中。你可以实现自己的\
  \ `JmsListenerContainerFactory` 版本，但通常使用提供的类之一就足够了：`SimpleJmsListenerContainerFactory`\
  \ 和 `DefaultJmsListenerContainerFactory`。前者创建 `SimpleMessageListenerContainer` 的实例，而后者创建\
  \ `DefaultMessageListenerContainer`。\n\n目前我们将使用 `SimpleJmsListenerContainerFactory`。如果需要，我们可以轻松切换到\
  \ `DefaultMessageListenerContainer`，例如，当需要事务或使用 `TaskExecutor` 进行异步处理时。\n\n```\n\
  package com.apress.spring6recipes.post.config;\nimport com.apress.spring6recipes.post.MailListener;\n\
  import jakarta.jms.ConnectionFactory;\nimport org.apache.activemq.artemis.jms.client.ActiveMQConnectionFactory;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.jms.annotation.EnableJms;\nimport org.springframework.jms.config.SimpleJmsListenerContainerFactory;\n\
  import org.springframework.jms.connection.CachingConnectionFactory;\n@Configuration\n\
  @EnableJms\npublic class BackOfficeConfiguration {\n@Bean\npublic ConnectionFactory\
  \ connectionFactory() {\nreturn new ActiveMQConnectionFactory(\"tcp://localhost:61616\"\
  );\n}\n@Bean\npublic MailListener mailListener() {\nreturn new MailListener();\n\
  }\n@Bean\npublic SimpleJmsListenerContainerFactory jmsListenerContainerFactory(ConnectionFactory\
  \ cf) {\nvar listenerContainerFactory = new SimpleJmsListenerContainerFactory();\n\
  listenerContainerFactory.setConnectionFactory(cf);\nreturn listenerContainerFactory;\n\
  }\n}\n清单 11-31\n后台办公室配置\n```\n\n#### 转换 JMS 消息\n\n你也可以创建一个消息转换器，用于从包含邮件信息的 JMS 消息中转换邮件对象。由于消息监听器只接收消息，`toMessage()`\
  \ 方法不会被调用，因此你可以简单地为其返回 `null`。但是，如果你也使用此消息转换器发送消息，则必须实现此方法。以下示例重印了之前编写的 `MailMessageConverter`\
  \ 类。\n\n```\npackage com.apress.spring6recipes.post;\nimport jakarta.jms.JMSException;\n\
  import jakarta.jms.MapMessage;\nimport jakarta.jms.Message;\nimport jakarta.jms.Session;\n\
  import org.springframework.jms.support.converter.MessageConversionException;\nimport\
  \ org.springframework.jms.support.converter.MessageConverter;\npublic class MailMessageConverter\
  \ implements MessageConverter {\npublic Object fromMessage(Message message)\nthrows\
  \ JMSException, MessageConversionException {\nvar mapMessage = (MapMessage) message;\n\
  return new Mail(\nmapMessage.getString(\"mailId\"),\nmapMessage.getString(\"country\"\
  ),\nmapMessage.getDouble(\"weight\"));\n}\npublic Message toMessage(Object object,\
  \ Session session)\nthrows JMSException, MessageConversionException {\nvar mail\
  \ = (Mail) object;\nvar message = session.createMapMessage();\nmessage.setString(\"\
  mailId\", mail.mailId());\nmessage.setString(\"country\", mail.country());\nmessage.setDouble(\"\
  weight\", mail.weight());\nreturn message;\n}\n}\n清单 11-32\nMessageConverter 实现\n\
  ```\n\n消息转换器应应用于监听器容器工厂，以便在调用你的 POJO 方法之前将消息转换为对象。\n\n```\npackage com.apress.spring6recipes.post.config;\n\
  import com.apress.spring6recipes.post.MailListener;\nimport com.apress.spring6recipes.post.MailMessageConverter;\n\
  import jakarta.jms.ConnectionFactory;\nimport org.apache.activemq.artemis.jms.client.ActiveMQConnectionFactory;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.jms.annotation.EnableJms;\nimport org.springframework.jms.config.SimpleJmsListenerContainerFactory;\n\
  @Configuration\n@EnableJms\npublic class BackOfficeConfiguration {\n@Bean\npublic\
  \ ConnectionFactory connectionFactory() {\nreturn new ActiveMQConnectionFactory(\"\
  tcp://localhost:61616\");\n}\n@Bean\npublic MailListener mailListener() {\nreturn\
  \ new MailListener();\n}\n@Bean\npublic SimpleJmsListenerContainerFactory jmsListenerContainerFactory(ConnectionFactory\
  \ cf) {\nvar listenerContainerFactory = new SimpleJmsListenerContainerFactory();\n\
  listenerContainerFactory.setConnectionFactory(cf);\nlistenerContainerFactory.setMessageConverter(new\
  \ MailMessageConverter());\nreturn listenerContainerFactory;\n}\n}\n清单 11-33\n后台办公室配置\n\
  ```\n\n使用此消息转换器，你的 POJO 的监听器方法可以接受一个邮件对象作为方法参数。\n\n```\npackage com.apress.spring6recipes.post;\n\
  import org.springframework.jms.annotation.JmsListener;\npublic class MailListener\
  \ {\n@JmsListener(destination = \"mail.queue\")\npublic void displayMail(Mail mail)\
  \ {\nSystem.out.printf(\"Received: %s%n\", mail);\n}\n}\n清单 11-34\n后台办公室配置\n```\n\
  \n\n\n#### 管理 JMS 事务\n\n如前所述，`SimpleMessageListenerContainer` 不支持事务。因此，如果你需要为消息监听器方法提供事务管理，则必须改用\
  \ `DefaultMessageListenerContainer`。对于本地 JMS 事务，你只需启用其 `sessionTransacted` 属性，你的监听器方法就会在本地\
  \ JMS 事务（相对于 XA 事务）中运行。要使用 `DefaultMessageListenerContainer`，请将 `SimpleJmsListenerContainerFactory`\
  \ 更改为 `DefaultJmsListenerContainerFactory`，并配置 `sessionTransacted` 属性。\n\n```\n\
  @Bean\npublic DefaultJmsListenerContainerFactory jmsListenerContainerFactory(ConnectionFactory\
  \ cf) {\nvar listenerContainerFactory = new DefaultJmsListenerContainerFactory();\n\
  listenerContainerFactory.setConnectionFactory(cf);\nlistenerContainerFactory.setMessageConverter(new\
  \ MailMessageConverter());\nlistenerContainerFactory.setSessionTransacted(true);\n\
  return listenerContainerFactory;\n}\n清单 11-35\n后台办公室配置\n```\n\n然而，如果你希望监听器参与 JTA\
  \ 事务，则需要声明一个 `JtaTransactionManager` 实例，并将其注入到你的监听器容器工厂中。\n\n## 11-5\\. 缓存和池化 JMS\
  \ 连接\n\n### 问题\n\n在本章中，为简单起见，我们一直使用 `org.apache.activemq.artemis.jms.client.ActiveMQConnectionFactory`\
  \ 实例作为连接工厂来探索 Spring 的 JMS 支持。这在实践中并非最佳选择。与所有事物一样，这里也存在性能方面的考量。\n\n问题的关键在于 `JmsTemplate`\
  \ 在每次调用时都会关闭会话和消费者。这意味着它会销毁所有这些对象并释放内存。这种做法是“安全的”，但性能不佳，因为某些创建的对象（如消费者）本应是长期存在的。这种行为源于在应用服务器环境中使用\
  \ `JmsTemplate`，在这种环境中，通常使用应用服务器的连接工厂，并且该工厂在内部提供了连接池。在这种环境下，恢复所有对象只是将它们归还到池中，这才是理想的行为。\n\
  \n### 解决方案\n\n对此没有“一刀切”的解决方案。你需要权衡你所追求的特性，并做出相应的反应。\n\n### 工作原理\n\n通常，当你使用 `JmsTemplate`\
  \ 发布消息时，需要一个提供某种池化和缓存功能的连接工厂。寻找池化连接工厂的首选位置可能是你的应用服务器。它很可能默认就提供了一个。\n\n就像 JDBC 有\
  \ HikariCP 这样的连接池一样，JMS 也有一个连接池解决方案。[Pooled-JMS](https://github.com/messaginghub/pooled-jms)\
  \ 项目，顾名思义，提供了一个 JMS 连接池，无论使用哪种 JMS 实现，它都能工作。我们可以用它来处理连接、会话、消费者和生产者的缓存。以下配置在独立配置中池化了一个连接工厂。在发布消息时，它可以作为之前示例的直接替代品。\n\
  \n```\n@Bean\npublic ConnectionFactory connectionFactory() {\nreturn new ActiveMQConnectionFactory(\"\
  tcp://localhost:61616\");\n}\n@Bean\n@Primary\npublic JmsPoolConnectionFactory pooledConnectionFactory(ConnectionFactory\
  \ cf) {\nvar pooledCf = new JmsPoolConnectionFactory();\npooledCf.setConnectionFactory(cf);\n\
  return pooledCf;\n}\n清单 11-36\n使用 Pooled-JMS 的后台办公室配置\n```\n\n![](img/314861_5_En_11_Figd_HTML.gif)一个信息符号，由字母\
  \ i 的图标表示，位于阴影圆圈内。  由于我们声明了两个 `ConnectionFactory` 实例，我们需要将用于注入的那个声明为 `@Primary`。另请参阅第\
  \ 1 章。\n\n如果你正在接收消息，你仍然可以追求更高的效率，因为 `JmsTemplate` 每次也会构造一个新的 `jakarta.jms.MessageConsumer`。在这种情况下，你有几种替代方案：使用\
  \ Spring 的各种 `org.springframework.jms.listener.MessageListenerContainer` 实现（MDP），因为它们能正确地缓存消费者；或者使用\
  \ Spring 的 `ConnectionFactory` 实现。第一个实现 `org.springframework.jms.connection.SingleConnectionFactory`\
  \ 每次返回相同的底层 JMS 连接（根据 JMS API，这是线程安全的），并忽略对 `close()` 方法的调用。\n\n通常，这个实现与 JMS API\
  \ 配合良好。一个较新的替代方案是 `org.springframework.jms.connection.CachingConnectionFactory`。首先，其明显优势在于能够缓存多个实例。其次，它缓存了所使用的\
  \ `jakarta.jms.Session`、`jakarta.jms.MessageProducer` 和 `jakarta.jms.MessageConsumer`\
  \ 实例。最后，它不依赖于你的 JMS 连接工厂实现。\n\n```\n@Bean\n@Primary\npublic ConnectionFactory cachingConnectionFactory(ConnectionFactory\
  \ cf) {\nreturn new CachingConnectionFactory(cf);\n}\n清单 11-37\nCachingConnectionFactory\
  \ Bean\n```\n\n## 11-6\\. 使用 Spring 发送和接收 AMQP 消息\n\n### 问题\n\n你想使用 RabbitMQ 发送和接收消息。\n\
  \n### 解决方案\n\n[Spring AMQP 项目](http://projects.spring.io/spring-amqp/) 提供了对 AMQP\
  \ 的便捷访问和使用。它拥有与 Spring JMS 类似的支持。它附带了一个 `RabbitTemplate`，提供了基本的发送和接收选项。它还附带了一个 `org.springframework.amqp.rabbit.listener.MessageListenerContainer`\
  \ 选项，该选项模仿了 Spring JMS。\n\n### 工作原理\n\n首先，看看如何使用 `RabbitTemplate` 发送消息。要访问 `RabbitTemplate`，最简单的方法是扩展\
  \ `RabbitGatewaySupport`。以下部分是使用 `RabbitTemplate` 的 `FrontDeskImpl`。为了能够使用这些类，请将以下依赖项添加到类路径中。\n\
  \n```\norg.springframework.amqp\nspring-rabbit\n3.0.0\n\ncom.rabbitmq\namqp-client\n\
  5.16.0\n\n清单 11-39\nMaven 依赖项\n```\n\n```\nimplementation group: 'org.springframework.amqp',\
  \ name: 'spring-rabbit', version: '3.0.0'\nimplementation group: 'com.rabbitmq',\
  \ name: 'amqp-client', version: '5.16.0'\n清单 11-38\nGradle 依赖项\n```\n\n\n\n####\
  \ 无需 Spring 模板支持即可收发消息\n\n首先，我们来看看如何在不使用 Spring 模板支持的情况下发送和接收消息。下面的`FrontDeskImpl`类使用原生\
  \ API 向 RabbitMQ 发送消息。\n\n```\npackage com.apress.spring6recipes.post;\nimport java.io.IOException;\n\
  import java.nio.charset.StandardCharsets;\nimport java.util.concurrent.TimeoutException;\n\
  import com.fasterxml.jackson.databind.ObjectMapper;\nimport com.rabbitmq.client.ConnectionFactory;\n\
  public class FrontDeskImpl implements FrontDesk {\nprivate static final String QUEUE_NAME\
  \ = \"mail.queue\";\npublic void sendMail(final Mail mail) {\nvar connectionFactory\
  \ = new ConnectionFactory();\nconnectionFactory.setHost(\"localhost\");\nconnectionFactory.setUsername(\"\
  guest\");\nconnectionFactory.setPassword(\"guest\");\nconnectionFactory.setPort(5672);\n\
  try (var connection = connectionFactory.newConnection();\nvar channel = connection.createChannel())\
  \ {\nchannel.queueDeclare(QUEUE_NAME, true, false, false, null);\nvar message =\
  \ new ObjectMapper().writeValueAsString(mail);\nchannel.basicPublish(\"\", QUEUE_NAME,\
  \ null, message.getBytes(StandardCharsets.UTF_8));\nSystem.out.printf(\"Send: %s%n\"\
  , message);\n} catch (IOException | TimeoutException ex) {\nthrow new RuntimeException(ex);\n\
  }\n}\n}\n清单 11-40\n原生 AMQP FrontDesk 实现\n```\n\n首先，创建一个`com.rabbitmq.client.ConnectionFactory`来获取与\
  \ RabbitMQ 的`com.rabbitmq.client.Connection`连接；我们将其配置为连接`localhost`，并提供了用户名/密码组合。接着，需要获取一个`com.rabbitmq.client.Channel`来最终声明一个队列。然后，传入的`Mail`消息会使用\
  \ Jackson 的`ObjectMapper`转换为 JSON 格式，最后发送到队列。发送时需要指定交换机；我们使用默认交换机，因此提供空字符串。路由键则使用队列名称。我们不需要在消息上设置任何额外属性，最后为要发送的消息正文创建一个`byte[]`。\n\
  \n在创建连接和发送消息时，需要处理可能出现的各种异常，发送完成后还需要正确关闭并释放`Connection`，这同样可能抛出异常。\n\n在能够发送和接收 AMQP\
  \ 消息之前，需要先安装一个 AMQP 消息代理。\n\n![](img/314861_5_En_11_Fige_HTML.gif)一个由带阴影圆圈内的字母 i\
  \ 图标表示的信息符号。  在`bin`目录中有一个`rabbitmq.sh`脚本，它会下载并在 Docker 容器中启动一个 RabbitMQ 代理。\n\n\
  下面的`BackOfficeImpl`使用原生 RabbitMQ API 接收消息。\n\n```\npackage com.apress.spring6recipes.post;\n\
  import com.fasterxml.jackson.databind.ObjectMapper;\nimport com.rabbitmq.client.AMQP;\n\
  import com.rabbitmq.client.ConnectionFactory;\nimport com.rabbitmq.client.DefaultConsumer;\n\
  import com.rabbitmq.client.Envelope;\nimport java.io.IOException;\nimport java.util.concurrent.TimeoutException;\n\
  public class BackOfficeImpl implements BackOffice {\nprivate static final String\
  \ QUEUE_NAME = \"mail.queue\";\nprivate MailListener mailListener = new MailListener();\n\
  @Override\npublic Mail receiveMail() {\nvar connectionFactory = new ConnectionFactory();\n\
  connectionFactory.setHost(\"localhost\");\nconnectionFactory.setUsername(\"guest\"\
  );\nconnectionFactory.setPassword(\"guest\");\nconnectionFactory.setPort(5672);\n\
  try (var connection = connectionFactory.newConnection();\nvar channel = connection.createChannel()\
  \ ) {\nchannel.queueDeclare(QUEUE_NAME, true, false, false, null);\nvar consumer\
  \ = new DefaultConsumer(channel) {\n@Override\npublic void handleDelivery(String\
  \ consumerTag, Envelope envelope, AMQP.BasicProperties properties, byte[] body)\n\
  throws IOException {\nvar mail = new ObjectMapper().readValue(body, Mail.class);\n\
  mailListener.displayMail(mail);\n}\n};\nchannel.basicConsume(QUEUE_NAME, true, consumer);\n\
  } catch (IOException | TimeoutException e) {\nthrow new RuntimeException(e);\n}\n\
  return null;\n}\n}\n清单 11-41\n原生 AMQP BackOffice 实现\n```\n\n这段代码与`FrontDeskImpl`大致相同，区别在于我们现在注册了一个`com.rabbitmq.client.Consumer`来检索消息。无需实现完整的`Consumer`接口，我们可以利用`com.rabbitmq.client.DefaultConsumer`。在这个`Consumer`中，我们再次使用\
  \ Jackson 将消息映射为`Mail`对象，并将其传递给`MailListener`，后者会将转换后的消息打印到控制台。使用`Channel`时，可以添加一个`Consumer`，当收到消息时该消费者会被调用。一旦通过`basicConsume`方法将消费者注册到`Channel`，它就会立即就绪。\n\
  \n如果你已经运行了`FrontDeskImpl`，你会看到消息很快被接收进来。\n\n\n\n#### 使用 Spring 的模板支持发送消息\n\n`FrontDeskImpl`\
  \ 类继承了 `RabbitGatewaySupport`；该类会根据我们传入的配置来配置一个 `RabbitTemplate`。要发送消息，我们使用 `getRabbitOperations`\
  \ 方法来获取模板。接着，为了转换并发送消息，我们使用 `convertAndSend` 方法。该方法会先使用 `MessageConverter` 将消息转换为\
  \ JSON，然后将其发送到我们已配置的队列中。\n\n```\npackage com.apress.spring6recipes.post;\nimport\
  \ org.springframework.amqp.rabbit.core.RabbitGatewaySupport;\npublic class FrontDeskImpl\
  \ extends RabbitGatewaySupport implements FrontDesk {\npublic void sendMail(final\
  \ Mail mail) {\ngetRabbitOperations().convertAndSend(mail);\n}\n}\n清单 11-42\nSpring\
  \ AMQP FrontDesk 实现\n```\n\n让我们来看一下配置。\n\n```\npackage com.apress.spring6recipes.post.config;\n\
  import org.springframework.amqp.rabbit.connection.CachingConnectionFactory;\nimport\
  \ org.springframework.amqp.rabbit.connection.ConnectionFactory;\nimport org.springframework.amqp.rabbit.core.RabbitTemplate;\n\
  import org.springframework.amqp.support.converter.Jackson2JsonMessageConverter;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import com.apress.spring6recipes.post.FrontDeskImpl;\n@Configuration\npublic class\
  \ FrontOfficeConfiguration {\n@Bean\npublic ConnectionFactory connectionFactory()\
  \ {\nvar connectionFactory = new CachingConnectionFactory(\"127.0.0.1\");\nconnectionFactory.setUsername(\"\
  guest\");\nconnectionFactory.setPassword(\"guest\");\nconnectionFactory.setPort(5672);\n\
  return connectionFactory;\n}\n@Bean\npublic RabbitTemplate rabbitTemplate(ConnectionFactory\
  \ cf) {\nvar rabbitTemplate = new RabbitTemplate();\nrabbitTemplate.setConnectionFactory(cf);\n\
  rabbitTemplate.setMessageConverter(new Jackson2JsonMessageConverter());\nrabbitTemplate.setRoutingKey(\"\
  mail.queue\");\nreturn rabbitTemplate;\n}\n@Bean\npublic FrontDeskImpl frontDesk(RabbitTemplate\
  \ amqp) {\nvar frontDesk = new FrontDeskImpl();\nfrontDesk.setRabbitOperations(amqp);\n\
  return frontDesk;\n}\n}\n清单 11-43\nSpring AMQP FrontDesk 配置\n```\n\n该配置与 JMS 配置非常相似。我们需要一个\
  \ `ConnectionFactory` 来连接到我们的 RabbitMQ 代理。我们使用 `CachingConnectionFactory`，以便可以重用连接。接下来是\
  \ `RabbitTemplate`，它使用该连接并拥有一个 `MessageConverter` 来转换消息。消息会使用 Jackson2 库转换为 JSON，因此配置了\
  \ `Jackson2JsonMessageConverter`。最后，`RabbitTemplate` 被传入 `FrontDeskImpl`，以便其可供使用。\n\
  \n![](img/314861_5_En_11_Figf_HTML.gif)一个信息符号，由字母 i 的图标表示，位于带阴影的圆圈内。  我们在此处配置了一个\
  \ `RabbitTemplate`，而不是将 `ConnectionFactory` 传递给 `FrontDeskImpl`，因为我们也想修改所使用的 `MessageConverter`。`RabbitGatewaySupport`\
  \ 只允许注入 `ConnectionFactory` 或 `RabbitTemplate`。\n\n```\npackage com.apress.spring6recipes.post;\n\
  import com.apress.spring6recipes.post.config.FrontOfficeConfiguration;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class FrontDeskMain {\npublic static void main(String[] args) throws Exception\
  \ {\nvar cfg = FrontOfficeConfiguration.class;\ntry (var context = new AnnotationConfigApplicationContext(cfg))\
  \ {\nvar frontDesk = context.getBean(FrontDesk.class);\nfrontDesk.sendMail(new Mail(\"\
  1234\", \"US\", 1.5));\nSystem.in.read();\n}\n}\n}\n清单 11-44\nFrontDesk 主类\n```\n\
  \n#### 使用消息监听器监听 AMQP 消息\n\nSpring AMQP 支持 `MessageListenerContainer` 来检索消息，其方式与\
  \ Spring JMS 对 JMS 的支持相同。Spring AMQP 提供了 `@RabbitListener` 注解，用于指示基于 AMQP 的消息监听器。\n\
  \n让我们来看一下所使用的 `MessageListener`。\n\n```\npackage com.apress.spring6recipes.post;\n\
  import org.springframework.amqp.rabbit.annotation.RabbitListener;\npublic class\
  \ MailListener {\n@RabbitListener(queues = \"mail.queue\")\npublic void displayMail(Mail\
  \ mail) {\nSystem.out.printf(\"Received: %s%n\", mail);\n}\n}\n清单 11-45\nMailListener\
  \ 实现\n```\n\n`MailListener` 与配方 11-4 中为接收 JMS 消息而创建的监听器几乎相同。不过，这里使用了 `@RabbitListener`\
  \ 注解。\n\n```\npackage com.apress.spring6recipes.post.config;\nimport com.apress.spring6recipes.post.MailListener;\n\
  import org.springframework.amqp.rabbit.annotation.EnableRabbit;\nimport org.springframework.amqp.rabbit.config.SimpleRabbitListenerContainerFactory;\n\
  import org.springframework.amqp.rabbit.connection.CachingConnectionFactory;\nimport\
  \ org.springframework.amqp.rabbit.connection.ConnectionFactory;\nimport org.springframework.amqp.support.converter.Jackson2JsonMessageConverter;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  @Configuration\n@EnableRabbit\npublic class BackOfficeConfiguration {\n@Bean\npublic\
  \ SimpleRabbitListenerContainerFactory rabbitListenerContainerFactory(ConnectionFactory\
  \ cf) {\nvar containerFactory = new SimpleRabbitListenerContainerFactory();\ncontainerFactory.setConnectionFactory(cf);\n\
  containerFactory.setMessageConverter(new Jackson2JsonMessageConverter());\nreturn\
  \ containerFactory;\n}\n@Bean\npublic ConnectionFactory connectionFactory() {\n\
  var connectionFactory = new CachingConnectionFactory(\"127.0.0.1\");\nconnectionFactory.setUsername(\"\
  guest\");\nconnectionFactory.setPassword(\"guest\");\nconnectionFactory.setPort(5672);\n\
  return connectionFactory;\n}\n@Bean\npublic MailListener mailListener() {\nreturn\
  \ new MailListener();\n}\n}\n清单 11-46\nSpring AMQP BackOffice 配置\n```\n\n要启用基于 AMQP\
  \ 注解的监听器，需要在配置类上添加 `@EnableRabbit` 注解。由于每个监听器都需要一个 `MessageListenerContainer`，我们需要配置一个\
  \ `RabbitListenerContainerFactory`，它负责创建这些容器。默认情况下，`@EnableRabbit` 逻辑会查找名为 `rabbitListenerContainerFactory`\
  \ 的 Bean。\n\n`RabbitListenerContainerFactory` 需要一个 `ConnectionFactory`；为此我们使用了 `CachingConnectionFactory`。在\
  \ `MessageListenerContainer` 调用 `MailListener.displayMail` 方法之前，它需要使用 `Jackson2JsonMessageConverter`\
  \ 将 JSON 格式的消息负载转换为 `Mail` 对象。\n\n要监听消息，请创建一个包含 main 方法的类，该方法只需构建应用程序上下文即可。\n\n\
  ```\npackage com.apress.spring6recipes.post;\nimport com.apress.spring6recipes.post.config.BackOfficeConfiguration;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class BackOfficeMain {\npublic static void main(String[] args) throws Exception\
  \ {\nvar cfg = BackOfficeConfiguration.class;\ntry (var context = new AnnotationConfigApplicationContext(cfg))\
  \ {\nSystem.in.read();\n}\n}\n}\n清单 11-47\nBackOffice 主类\n```\n\n## 11-7\\. 使用 Spring\
  \ Kafka 发送和接收消息\n\n### 问题\n\n你想使用 Apache Kafka 发送和接收消息。\n\n### 解决方案\n\n[Spring for\
  \ Apache Kafka](http://projects.spring.io/spring-kafka/) 项目提供了对 Apache Kafka 的便捷访问和使用。它使用\
  \ Spring Messaging 抽象，提供了与 Spring JMS 类似的支持。它附带了一个 `KafkaTemplate`，提供了基本的发送选项。它还附带了一个\
  \ `org.springframework.kafka.listener.MessageListenerContainer` 选项，该选项模仿了 Spring\
  \ JMS，可以通过 `@EnableKafka` 启用。\n\n\n\n### 工作原理\n\n首先，需要在项目中添加必要的依赖项。\n\n```\norg.apache.kafka\n\
  kafka-clients\n3.3.1\n\norg.apache.kafka\nkafka-clients\n3.3.1\n\n清单 11-49\nMaven\
  \ 依赖\n```\n\n```\nimplementation group: 'org.springframework.kafka', name: 'spring-kafka',\
  \ version: '3.0.1'\nimplementation group: 'org.apache.kafka', name: 'kafka-clients',\
  \ version: '3.3.1'\n清单 11-48\nGradle 依赖\n```\n\n#### 使用 Spring 的模板支持发送消息\n\n让我们从重写\
  \ `FrontDeskImpl` 开始，使用 `KafkaTemplate` 发送消息。为此，我们实际上需要一个实现了 `KafkaOperations` 接口的对象，而\
  \ `KafkaTemplate` 正是该接口的实现。\n\n```\npackage com.apress.spring6recipes.post;\nimport\
  \ com.fasterxml.jackson.core.JsonProcessingException;\nimport com.fasterxml.jackson.databind.ObjectMapper;\n\
  import org.springframework.kafka.core.KafkaOperations;\npublic class FrontDeskImpl\
  \ implements FrontDesk {\nprivate final KafkaOperations kafkaOperations;\npublic\
  \ FrontDeskImpl(KafkaOperations kafkaOperations) {\nthis.kafkaOperations = kafkaOperations;\n\
  }\npublic void sendMail(final Mail mail) {\nvar result = kafkaOperations.send(\"\
  mails\", convertToJson(mail));\nresult.whenComplete((sendResult, ex) -> {\nif (ex\
  \ == null) {\nSystem.out.println(\"结果（成功）: \" + sendResult.getRecordMetadata());\n\
  } else {\nex.printStackTrace();\n}\n});\n}\nprivate String convertToJson(Mail mail)\
  \ {\ntry {\nreturn new ObjectMapper().writeValueAsString(mail);\n} catch (JsonProcessingException\
  \ ex) {\nthrow new IllegalArgumentException(ex);\n}\n}\n}\n清单 11-50\nKafka FrontDesk\
  \ 实现\n```\n\n请注意 `kafkaOperations` 字段，它接受一个 `KafkaOperations<Integer, String>` 类型的参数。这意味着我们发送的消息，其键（在发送消息时生成）是\
  \ `Integer` 类型，而消息体是 `String` 类型。因此，我们需要将传入的 `Mail` 实例转换为 `String`。这个转换工作由 `convertToJson`\
  \ 方法使用 Jackson2 的 `ObjectMapper` 完成。消息将被发送到 `mails` 主题，该主题是 `send` 方法的第一个参数；第二个参数是要发送的有效载荷（即转换后的\
  \ `Mail` 消息）。\n\n使用 Kafka 发送消息通常是一个异步操作，`KafkaOperations.send` 方法通过返回一个 `CompletableFuture`\
  \ 来体现这一点。它是一个普通的 `Future`，因此你可以调用 `get()` 方法使其变为阻塞操作，或者注册一个回调来获知操作的成功或失败。\n\n接下来，我们需要创建一个配置类，用于配置\
  \ `FrontDeskImpl` 中使用的 `KafkaTemplate`。\n\n```\npackage com.apress.spring6recipes.post.config;\n\
  import com.apress.spring6recipes.post.FrontDeskImpl;\nimport org.apache.kafka.clients.producer.ProducerConfig;\n\
  import org.apache.kafka.common.serialization.IntegerSerializer;\nimport org.apache.kafka.common.serialization.StringSerializer;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.kafka.core.DefaultKafkaProducerFactory;\nimport org.springframework.kafka.core.KafkaTemplate;\n\
  import org.springframework.kafka.core.ProducerFactory;\nimport java.util.Map;\n\
  @Configuration\npublic class FrontOfficeConfiguration {\n@Bean\npublic KafkaTemplate\
  \ kafkaTemplate(ProducerFactory pf) {\nreturn new KafkaTemplate(pf);\n}\n@Bean\n\
  public ProducerFactory producerFactory() {\nreturn new DefaultKafkaProducerFactory(producerFactoryProperties());\n\
  }\n@Bean\npublic Map producerFactoryProperties() {\nvar properties = Map.of(\nProducerConfig.BOOTSTRAP_SERVERS_CONFIG,\
  \ \"localhost:9092\",\nProducerConfig.KEY_SERIALIZER_CLASS_CONFIG, IntegerSerializer.class,\n\
  ProducerConfig.VALUE_SERIALIZER_CLASS_CONFIG, StringSerializer.class);\nreturn properties;\n\
  }\n@Bean\npublic FrontDeskImpl frontDesk(KafkaTemplate kafka) {\nreturn new FrontDeskImpl(kafka);\n\
  }\n}\n清单 11-51\n前台配置\n```\n\n上述配置创建了一个基本配置的 `KafkaTemplate`。我们需要配置 `KafkaTemplate`\
  \ 所使用的 `ProducerFactory`；它至少需要指定要连接的 URL，并且需要告知它我们想要将消息序列化为哪种键和值类型。URL 通过 `ProducerConfig.BOOTSTRAP_SERVERS_CONFIG`\
  \ 指定；该配置可以接受一个或多个要连接的服务器。`ProducerConfig.KEY_SERIALIZER_CLASS_CONFIG` 和 `ProducerConfig.VALUE_SERIALIZER_CLASS_CONFIG`\
  \ 分别配置了所使用的键序列化器和值序列化器。由于我们想要使用 `Integer` 作为键、`String` 作为值，因此分别配置了 `IntegerSerializer`\
  \ 和 `StringSerializer`。\n\n最后，构建好的 `KafkaTemplate` 被传递给 `FrontDeskImpl`。要运行前台应用程序，以下主类就足够了。\n\
  \n```\npackage com.apress.spring6recipes.post;\nimport com.apress.spring6recipes.post.config.FrontOfficeConfiguration;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class FrontDeskMain {\npublic static void main(String[] args) throws Exception\
  \ {\nvar cfg = FrontOfficeConfiguration.class;\ntry (var context = new AnnotationConfigApplicationContext(cfg))\
  \ {\nvar frontDesk = context.getBean(FrontDesk.class);\nfrontDesk.sendMail(new Mail(\"\
  1234\", \"US\", 1.5));\nSystem.in.read();\n}\n}\n}\n清单 11-52\nFrontDesk 主类\n```\n\
  \n这将启动前台并通过 Kafka 发送一条消息。\n\n\n\n#### 使用 Spring Kafka 监听消息\n\nSpring Kafka 也提供了消息监听容器，用于监听主题上的消息，这与\
  \ Spring JMS 和 Spring AMQP 类似。要启用这些容器的使用，我们需要在配置类上添加 `@EnableKafka`，并使用 `@KafkaListener`\
  \ 创建和配置 Kafka 消费者。\n\n首先，我们来创建监听器，这只需在带有单个参数的方法上标注 `@KafkaListener` 即可。\n\n```\n\
  package com.apress.spring6recipes.post;\nimport org.springframework.kafka.annotation.KafkaListener;\n\
  public class MailListener {\n@KafkaListener(topics = \"mails\")\npublic void displayMail(String\
  \ mail) {\nSystem.out.printf(\" Received: %s%n\", mail);\n}\n}\n清单 11-53\nKafka\
  \ 的 MailListener\n```\n\n目前我们关注的是原始的基于 `String` 的有效载荷，因为这是将要发送的内容。\n\n接下来，我们需要配置监听器容器。\n\
  \n```\npackage com.apress.spring6recipes.post.config;\nimport com.apress.spring6recipes.post.MailListener;\n\
  import org.apache.kafka.clients.consumer.ConsumerConfig;\nimport org.apache.kafka.common.serialization.IntegerDeserializer;\n\
  import org.apache.kafka.common.serialization.StringDeserializer;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.kafka.annotation.EnableKafka;\n\
  import org.springframework.kafka.config.ConcurrentKafkaListenerContainerFactory;\n\
  import org.springframework.kafka.config.KafkaListenerContainerFactory;\nimport org.springframework.kafka.core.ConsumerFactory;\n\
  import org.springframework.kafka.core.DefaultKafkaConsumerFactory;\nimport org.springframework.kafka.listener.ConcurrentMessageListenerContainer;\n\
  import java.util.Map;\n@Configuration\n@EnableKafka\npublic class BackOfficeConfiguration\
  \ {\n@Bean\npublic KafkaListenerContainerFactory> kafkaListenerContainerFactory(\n\
  ConsumerFactory cf) {\nvar factory = new ConcurrentKafkaListenerContainerFactory();\n\
  factory.setConsumerFactory(cf);\nreturn factory;\n}\n@Bean\npublic ConsumerFactory\
  \ consumerFactory() {\nreturn new DefaultKafkaConsumerFactory(consumerConfiguration());\n\
  }\n@Bean\npublic Map consumerConfiguration() {\nreturn Map.of(\nConsumerConfig.BOOTSTRAP_SERVERS_CONFIG,\
  \ \"localhost:9092\",\nConsumerConfig.KEY_DESERIALIZER_CLASS_CONFIG, IntegerDeserializer.class,\n\
  ConsumerConfig.VALUE_DESERIALIZER_CLASS_CONFIG, StringDeserializer.class,\nConsumerConfig.GROUP_ID_CONFIG,\
  \ \"group1\");\n}\n@Bean\npublic MailListener mailListener() {\nreturn new MailListener();\n\
  }\n}\n清单 11-54\n后台办公室配置\n```\n\n该配置与客户端非常相似。我们需要传递用于连接 Apache Kafka 的 URL，并且由于我们要反序列化消息，因此需要指定键和值的反序列化器。最后，我们还需要添加一个组\
  \ ID；否则，我们将无法连接到 Kafka。URL 通过 `ConsumerConfig.BOOTSTRAP_SERVERS_CONFIG` 传递，使用的键和值反序列化器分别是用于键（因为键是整数）的\
  \ `IntegerDeserializer` 和用于有效载荷（因为有效载荷是 `String`）的 `StringDeserializer`。最后，设置组属性。\n\
  \n有了这些属性，我们就可以配置 `KafkaListenerContainerFactory`，这是一个用于创建基于 Kafka 的 `MessageListenerContainer`\
  \ 的工厂。该容器由添加 `@EnableKafka` 注解所启用的功能在内部使用。对于每个标注了 `@KafkaListener` 的方法，都会创建一个 `MessageListenerContainer`。\n\
  \n要运行后台办公室应用程序，我们需要加载此配置并让其开始监听。\n\n```\npackage com.apress.spring6recipes.post;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import com.apress.spring6recipes.post.config.BackOfficeConfiguration;\npublic class\
  \ BackOfficeMain {\npublic static void main(String[] args) throws Exception {\n\
  var cfg = BackOfficeConfiguration.class;\ntry (var ctx = new AnnotationConfigApplicationContext(cfg))\
  \ {\nSystem.in.read();\n}\n}\n}\n清单 11-55\n后台办公室主程序\n```\n\n现在，当前台应用程序启动时，`Mail`\
  \ 消息将被转换为 `String` 并通过 Kafka 发送到后台办公室，产生如下输出：\n\n```\nReceived: {\"mailId\":\"1234\"\
  ,\"country\":\"US\",\"weight\":1.5}\n```\n\n#### 使用 MessageConverter 将有效载荷转换为对象\n\
  \n我们的监听器现在接收一个 `String`，但如果能自动将其转换回 `Mail` 对象就更好了。通过对配置进行一些调整，这很容易实现。这里使用的 `KafkaListenerContainerFactory`\
  \ 接受一个 `MessageConverter`，为了自动将 `String` 转换为我们想要的对象，我们可以向其传递一个 `StringJsonMessageConverter`。这将获取\
  \ `String` 并将其转换为在标注了 `@KafkaListener` 的方法中作为参数指定的对象。\n\n首先，更新配置。\n\n```\npackage\
  \ com.apress.spring6recipes.post.config;\nimport org.springframework.kafka.support.converter.StringJsonMessageConverter;\n\
  import java.util.Map;\n@Configuration\n@EnableKafka\npublic class BackOfficeConfiguration\
  \ {\n@Bean\npublic KafkaListenerContainerFactory> kafkaListenerContainerFactory(\n\
  ConsumerFactory cf) {\nvar factory = new ConcurrentKafkaListenerContainerFactory();\n\
  factory.setConsumerFactory(cf);\nfactory.setMessageConverter(new StringJsonMessageConverter());\n\
  return factory;\n}\n}\n清单 11-56\n后台办公室配置\n```\n\n接下来，我们需要修改 `MailListener`，使其使用\
