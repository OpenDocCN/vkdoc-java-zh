  `org.springframework.batch.core.launch.support.CommandLineJobRunner` 甚至会返回系统错误代码（0
  表示成功，1 表示失败，2 表示加载批处理作业时出现问题），以便 shell（例如大多数系统调度器使用的 shell）能够对失败做出反应或采取相应措施。通过创建并声明一个实现
  `ExitCodeMapper` 接口的顶层 bean，可以返回更复杂的返回代码，在该 bean 中，你可以指定将退出状态消息转换为基于整数的错误代码（shell
  在进程退出时会看到这些代码）的更实用的转换方式。


  #### 按计划运行


  Spring 支持调度框架（另请参阅配方 10-5 和 10-6）。该框架非常适合运行 Spring Batch。首先，让我们修改现有的应用程序上下文配置，通过
  `@EnableScheduling` 注解并添加 `ThreadPoolTaskScheduler` 来启用调度。


  ```

  package com.apress.springrecipes.springbatch.config;

  @Configuration

  @EnableBatchProcessing

  @ComponentScan("com.apress.springrecipes.springbatch")

  @PropertySource("classpath:/batch.properties")

  @EnableScheduling

  @EnableAsync

  public class BatchConfiguration {

  @Bean

  public ThreadPoolTaskScheduler taskScheduler() {

  var taskScheduler = new ThreadPoolTaskScheduler();

  taskScheduler.setThreadGroupName("batch-scheduler");

  taskScheduler.setPoolSize(10);

  return taskScheduler;

  }

  }

