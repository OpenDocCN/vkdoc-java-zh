  ## 8-9. 启动作业


  ### 问题


  Spring Batch 支持哪些部署场景？Spring Batch 如何启动？Spring Batch 如何与系统调度器（如 cron 或 autosys）或
  Web 应用程序协同工作？


  ### 解决方案


  Spring Batch 在 Spring 运行的所有环境中都能良好工作：你的 `public static void main` 方法、Web 应用程序，任何地方！不过，某些用例具有独特的挑战性：例如，将
  Spring Batch 与 HTTP 响应放在同一个线程中运行很少是可行的，因为这可能会导致执行停滞。Spring Batch 正是针对这种情况支持异步执行。Spring
  Batch 还提供了一个便捷类，可以轻松地与 cron 或 autosys 配合使用，以支持启动作业。此外，Spring 优秀的调度器命名空间为调度作业提供了很好的机制。


  ### 工作原理


  在开始创建解决方案之前，了解有哪些选项可用于部署和运行这些解决方案非常重要。所有解决方案至少需要一个作业和一个 `JobLauncher`。你已经在之前的配方中配置了这些组件。作业在你的
  Spring 应用上下文中配置，稍后你将看到。从 Java 代码启动 Spring Batch 解决方案的最简单示例大约需要五行 Java 代码，如果你已经获得了
  `ApplicationContext` 的句柄，则只需要三行！


  ```

  package com.apress.spring6recipes.springbatch;

  public class Main {

  public static void main(String[] args) throws Throwable {

  var context = new AnnotationConfigApplicationContext(BatchConfiguration.class)

  var jobLauncher = ctx.getBean("jobLauncher", JobLauncher.class);

  var job = ctx.getBean("myJobName". Job.class);

  var jobExecution = jobLauncher.run(job, new JobParameters());

  }

  }

