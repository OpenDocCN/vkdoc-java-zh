  配置在与 Web 层和服务层相同的配置类中，但最好将安全配置隔离在一个单独的类中（例如 `TodoSecurityConfig`）。


  由于用于 HTTP 的 Spring Security 通过 Servlet 过滤器工作，我们也需要注册它。这可以通过继承 `AbstractSecurityWebApplicationInitializer`
  轻松完成（参见以下清单）。


  ```

  package com.apress.spring6recipes.board.security;

  import org.springframework.security.web.context.AbstractSecurityWebApplicationInitializer;

  public class TodoSecurityInitializer extends AbstractSecurityWebApplicationInitializer
  { }

