  ## 7-6\. 设置传播事务属性


  ### 问题


  当一个事务性方法被另一个方法调用时，有必要指定事务应如何传播。例如，该方法可以继续在现有事务内运行，或者它可以启动一个新事务并在其自身的事务内运行。


  ### 解决方案


  事务的传播行为可以通过传播事务属性来指定。Spring 定义了七种传播行为，如表 7-5 所示。这些行为定义在 `org.springframework.transaction.TransactionDefinition`
  接口中。请注意，并非所有类型的事务管理器都支持所有这些传播行为。它们的行为取决于底层资源。例如，数据库可能支持不同的隔离级别，这限制了事务管理器可以支持的传播行为。


  表 7-5


  Spring 支持的传播行为


  | 传播行为 | 描述 |

  | --- | --- |

  | REQUIRED | 如果当前存在一个正在进行的事务，则当前方法应在此事务内运行。否则，它应启动一个新事务并在其自身的事务内运行。 |

  | REQUIRES_NEW | 当前方法必须启动一个新事务并在其自身的事务内运行。如果当前存在一个正在进行的事务，则应将其挂起。 |

  | SUPPORTS | 如果当前存在一个正在进行的事务，则当前方法可以在此事务内运行。否则，不必在事务内运行。 |

  | NOT_SUPPORTED | 当前方法不应在事务内运行。如果当前存在一个正在进行的事务，则应将其挂起。 |

  | MANDATORY | 当前方法必须在事务内运行。如果当前没有正在进行的事务，则会抛出异常。 |

  | NEVER | 当前方法不应在事务内运行。如果当前存在一个正在进行的事务，则会抛出异常。 |

  | NESTED | 如果当前存在一个正在进行的事务，则当前方法应在此事务的嵌套事务内运行。否则，它应启动一个新事务并在其自身的事务内运行。此功能是 Spring
  独有的（而之前的传播行为在 Jakarta EE 事务传播中有对应的实现）。此行为适用于诸如批处理等情况，其中你有一个长时间运行的过程（想象一下处理 100 万条记录），并且你希望将提交分块处理。因此，你每处理
  10,000 条记录提交一次。如果出现问题，你回滚嵌套事务，并且只丢失了 10,000 条记录的工作量（而不是整个 100 万条）。 |




