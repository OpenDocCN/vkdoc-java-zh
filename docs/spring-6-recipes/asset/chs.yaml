  ## 7-3\. 使用事务管理器 API 以编程方式管理事务


  ### 问题


  你需要在业务方法中精确控制何时提交和回滚事务，但又不想直接处理底层的事务 API。


  ### 解决方案


  Spring 的事务管理器提供了一个与技术无关的 API，允许你通过调用 `getTransaction()` 方法启动一个新事务（或获取当前活动的事务），并通过调用
  `commit()` 和 `rollback()` 方法来管理它。由于 `PlatformTransactionManager` 是事务管理的抽象单元，因此你调用的事务管理方法保证是与技术无关的。


  ### 工作原理


  尽管 `PlatformTransactionManager` 和 `ReactiveTransactionManager` 本质相似，但它们的编程模型不同。不过，对于两者，你都需要在应用上下文中声明一个
  Bean，并将其注入到要使用它的类中。首先，我们将展示如何使用 `PlatformTransactionManager`，然后再展示如何使用 `ReactiveTransactionManager`。




  #### 使用与配置 PlatformTransactionManager


  为了演示如何使用事务管理器 API，让我们创建一个新类 `TransactionalJdbcBookShop`，它将使用 Spring JDBC 模板。由于该类需要处理事务管理器，因此需要添加一个
  `PlatformTransactionManager` 类型的字段，并允许通过构造函数进行注入。


  ```

  package com.apress.spring6recipes.bookshop;

  import org.springframework.dao.DataAccessException;

  import org.springframework.jdbc.core.support.JdbcDaoSupport;

  import org.springframework.transaction.PlatformTransactionManager;

  import org.springframework.transaction.TransactionDefinition;

  import org.springframework.transaction.TransactionStatus;

  import org.springframework.transaction.support.DefaultTransactionDefinition;

  import javax.sql.DataSource;

  public class TransactionalJdbcBookShop extends JdbcDaoSupport implements BookShop
  {

  private final PlatformTransactionManager transactionManager;

  public TransactionalJdbcBookShop(PlatformTransactionManager transactionManager,
  DataSource dataSource) {

  this.transactionManager = transactionManager;

  setDataSource(dataSource);

  }

  public void purchase(String isbn, String username) {

  var def = new DefaultTransactionDefinition();

  var status = transactionManager.getTransaction(def);

  try {

  var BOOK_SQL = "SELECT PRICE FROM BOOK WHERE ISBN = ?";

  var price = getJdbcTemplate().queryForObject(BOOK_SQL, Integer.class, isbn);

  var STOCK_SQL = "UPDATE BOOK_STOCK SET STOCK = STOCK - 1 WHERE ISBN = ?";

  getJdbcTemplate().update(STOCK_SQL, isbn);

  var BALANCE_SQL = "UPDATE ACCOUNT SET BALANCE = BALANCE - ? WHERE USERNAME = ?";

  getJdbcTemplate().update(BALANCE_SQL, price, username);

  transactionManager.commit(status);

  }

  catch (DataAccessException e) {

  transactionManager.rollback(status);

  throw e;

  }

  }

  }

