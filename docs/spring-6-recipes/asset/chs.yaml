  #### 输出


  下一个要执行工作的组件是写入器，它负责接收从读取器读取的聚合项目集合。在本例中，你可以想象每次当集合超过块元素上的提交间隔属性时，就会创建一个新的集合（`java.util.List<UserRegistration>`），然后写入，再重置。由于我们要写入数据库，因此使用
  Spring Batch 的 `org.springframework.batch.item.database.JdbcBatchItemWriter`。该类支持接收输入并将其写入数据库。由开发者提供输入并指定应对输入执行哪些
  SQL。它将运行由 `sql` 属性指定的 SQL，本质上是从数据库中读取，次数由块元素的提交间隔指定，然后提交整个事务。这里，我们执行一个简单的插入操作。命名参数的名和值由为
  `itemSqlParameterSourceProvider` 属性配置的 Bean 创建，该属性是一个 `BeanPropertyItemSqlParameterSourceProvider`
  实例，其唯一职责是获取 JavaBean 属性，并将其作为与 JavaBean 上属性名称对应的命名参数提供出来。


