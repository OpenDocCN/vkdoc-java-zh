  \n### 问题\n\n您希望您的缓存能够感知事务。\n\n\n\n### 解决方案\n\n部分 Spring 提供的 `CacheManager` 实现能够感知它们运行在事务上下文中。`JCacheCacheManager`\
  \ 就是其中之一。要启用事务感知，请将 `transactionAware` 属性设置为 `true`。对于那些默认不支持事务感知的实现，你可以将它们包装在 `TransactionAwareCacheManagerProxy`\
  \ 中，使其具备事务感知能力。\n\n### 工作原理\n\n首先，创建一个 `CustomerRepository` 的事务性实现，例如，使用 `JdbcTemplate`（更多信息请参见第\
  \ 6 章）。\n\n```\npackage com.apress.spring6recipes.caching;\nimport org.springframework.cache.annotation.CacheEvict;\n\
  import org.springframework.cache.annotation.CachePut;\nimport org.springframework.cache.annotation.Cacheable;\n\
  import org.springframework.jdbc.core.JdbcTemplate;\nimport org.springframework.jdbc.support.GeneratedKeyHolder;\n\
  import org.springframework.stereotype.Repository;\nimport org.springframework.transaction.annotation.Transactional;\n\
  import javax.sql.DataSource;\nimport java.sql.Statement;\n@Repository\n@Transactional\n\
  public class JdbcCustomerRepository implements CustomerRepository {\nprivate final\
  \ JdbcTemplate jdbc;\npublic JdbcCustomerRepository(JdbcTemplate jdbc) {\nthis.jdbc\
  \ = jdbc;\n}\n@Override\n@Cacheable(value = \"customers\")\npublic Customer find(long\
  \ customerId) {\nvar sql = \"SELECT id, name FROM customer WHERE id=?\";\nreturn\
  \ jdbc.queryForObject(sql, (rs, rowNum) ->\nnew Customer(rs.getLong(1), rs.getString(2)));\n\
  }\n@Override\n@CachePut(value = \"customers\", key = \"#result.id\")\npublic Customer\
  \ create(String name) {\nvar sql = \"INSERT INTO customer (name) VALUES (?);\";\n\
  var keyHolder = new GeneratedKeyHolder();\njdbc.update(con -> {\nvar ps = con.prepareStatement(sql,\
  \ Statement.RETURN_GENERATED_KEYS);\nps.setString(1, name);\nreturn ps;\n}, keyHolder);\n\
  return new Customer(keyHolder.getKey().longValue(), name);\n}\n@Override\n@CacheEvict(value\
  \ = \"customers\", key = \"#customer.id\")\npublic void update(Customer customer)\
  \ {\nvar sql = \"UPDATE customer SET name=? WHERE id=?\";\njdbc.update(sql, customer.name(),\
  \ customer.id());\n}\n@Override\n@CacheEvict(value = \"customers\")\npublic void\
  \ remove(long customerId) {\nvar sql = \"DELETE FROM customer WHERE id=?\";\njdbc.update(sql,\
  \ customerId);\n}\n}\n清单 14-29\nCustomerRepository JDBC 实现\n```\n\n现在，你需要在配置中添加\
  \ `DataSource`、`JdbcTemplate`、`DataSourceTransactionManager`，当然还有 `JdbcCustomerRepository`。\n\
  \n```\n@Bean\npublic CustomerRepository customerRepository(JdbcTemplate jdbc) {\n\
  return new JdbcCustomerRepository(jdbc);\n}\n@Bean\npublic DataSourceTransactionManager\
  \ transactionManager(DataSource dataSource) {\nreturn new DataSourceTransactionManager(dataSource);\n\
  }\n@Bean\npublic DataSource dataSource() {\nreturn new EmbeddedDatabaseBuilder()\n\
  .setType(EmbeddedDatabaseType.H2)\n.setName(\"customers\")\n.addScript(\"classpath:/schema.sql\"\
  ).build();\n}\n@Bean\npublic JdbcTemplate jdbcTemplate(DataSource ds) {\nreturn\
  \ new JdbcTemplate(ds);\n}\n清单 14-30\nCustomerRepository JDBC 配置\n```\n\n`CUSTOMER`\
  \ 表在以下 `schema.sql` 中定义。\n\n```\nCREATE TABLE customer (\nid bigint AUTO_INCREMENT\
  \ PRIMARY KEY,\nname VARCHAR(255) NOT NULL\n);\n清单 14-31\nCustomer 表\n```\n\n最后，我们需要将\
  \ `CaffeineCacheManager` 包装在 `TransactionAwareCacheManagerProxy` 中。这样做会将实际的 `Cache`\
  \ 实例包装在一个 `TransactionAwareCacheDecorator` 中，该装饰器会将缓存操作注册到当前正在进行的事务中（如果没有可用事务，则直接执行）。\n\
  \n```\n@Bean\npublic CacheManager cacheManager() {\nvar caffeine = Caffeine.newBuilder()\n\
  .maximumSize(1000)\n.expireAfterWrite(Duration.ofMinutes(5));\nvar cacheManager\
  \ = new CaffeineCacheManager();\ncacheManager.setCaffeine(caffeine);\nreturn new\
  \ TransactionAwareCacheManagerProxy(cacheManager);\n}\n清单 14-32\n包装在事务感知代理中的 CaffeineCacheManager\n\
  ```\n\n现在，当你运行时，一切看起来应该仍然正常，但所有缓存操作现在都绑定到事务的成功执行上。因此，如果删除操作因异常而失败，`Customer` 仍将保留在缓存中。\n\
  \n## 14-7\\. 使用 Redis 作为缓存提供者\n\n### 问题\n\n你想使用 Redis 作为缓存提供者。\n\n### 解决方案\n\n使用\
  \ [Spring Data Redis](https://spring.io/projects/spring-data-redis) 并配置一个 `RedisCacheManager`\
  \ 来连接到 Redis 实例。有关 Redis 和 Spring Data Redis 的更多信息，另请参见第 9 章。\n\n你需要在类路径中包含 Redis\
  \ 和 Spring Data Redis 的依赖项。\n\n```\nredis.clients\njedis\n4.3.1\n\norg.springframework.data\n\
  spring-data-redis\n3.0.0\n\n清单 14-34\nMaven 依赖项\n```\n\n```\nimplementation group:\
  \ 'redis.clients', name: 'jedis', version: '4.3.1'\nimplementation group: 'org.springframework.data',\
  \ name: 'spring-data-redis', version: '3.0.0'\n清单 14-33\nGradle 依赖项\n```\n\n###\
  \ 工作原理\n\n首先，确保 Redis 已启动并正在运行。\n\n![](img/314861_5_En_14_Figb_HTML.gif)一个带阴影圆圈内字母\
  \ i 的图标，表示信息符号。  `bin` 目录中有一个 `redis.sh` 脚本，用于启动 Docker 化的 Redis 版本。\n\n#### 配置\
  \ RedisCacheManager\n\n为了能够使用 Redis 进行缓存，你需要设置 `RedisCacheManager`，它将把缓存委托给 Redis。而\
  \ `RedisCacheManager` 又需要一个 `RedisConnectionFactory` 来执行其操作。还可以更改所使用的 `Serializer`，例如使用\
  \ `Jackson` 来存储 JSON 而不是 `byte[]`。\n\n```\npackage com.apress.spring6recipes.caching.config;\n\
  import com.apress.spring6recipes.caching.CustomerRepository;\nimport com.apress.spring6recipes.caching.MapBasedCustomerRepository;\n\
  import org.springframework.cache.annotation.EnableCaching;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.data.redis.cache.RedisCacheManager;\n\
  import org.springframework.data.redis.connection.RedisConnectionFactory;\nimport\
  \ org.springframework.data.redis.connection.jedis.JedisConnectionFactory;\n@Configuration\n\
  @EnableCaching\npublic class CustomerConfiguration {\n@Bean\npublic RedisCacheManager\
  \ cacheManager(RedisConnectionFactory connectionFactory) {\nreturn RedisCacheManager.create(connectionFactory);\n\
  }\n@Bean\npublic RedisConnectionFactory redisConnectionFactory() {\nreturn new JedisConnectionFactory();\n\
  }\n@Bean\npublic CustomerRepository customerRepository() {\nreturn new MapBasedCustomerRepository();\n\
  }\n}\n清单 14-35\n使用 Redis 的配置\n```\n\n要连接到 Redis，你需要设置 `JedisConnectionFactory`，它本身用于配置\
  \ `RedisCacheManager`。使用默认配置时，我们存储的对象需要实现 `Serializable`，因此我们的 `Customer` 记录也需要实现此接口。\n\
  \n其余代码可以保持不变。运行主程序时，它将显示向缓存添加和从缓存移除对象等操作。\n\n\n\n## 14-8\\. 总结\n\n首先，你发现了如何为应用程序添加缓存，以及这样做相当繁琐，尤其是当你想在代码的多个部分引入缓存时。你探索了纯\
  \ Caffeine 缓存 API 和 Spring 的缓存抽象。在完成手动缓存后，你探索了使用 AOP 应用缓存，包括使用代理的纯 Spring AOP 和使用加载时织入的\
  \ AspectJ。\n\n接下来，你了解了不同的注解：`@Cacheable`、`@CacheEvict` 和 `@CachePut`，以及它们如何影响应用程序的缓存行为。你还学习了如何使用\
  \ SpEL 表达式来检索用于缓存或缓存失效的正确键，以及如何影响 `@Cacheable` 注解的缓存行为。\n\n最后一个方案介绍了 Redis 作为缓存解决方案，并探讨了如何将其用作本地或远程缓存解决方案。\n\
