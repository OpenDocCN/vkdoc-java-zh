  #### 做出访问控制决策


  判断用户是否有权访问应用程序中的资源，这一决策被称为授权决策。它基于用户的认证状态以及资源的性质和访问属性来做出。在 Spring Security 中，授权决策由授权管理器做出，这些管理器必须实现
  `ReactiveAuthorizationManager` 接口。你可以通过实现此接口自由创建自己的授权管理器，但 Spring Security 已经内置了多个实现。其中大部分可以通过
  `http.authorizeExchange` 或使用方法安全性进行配置（参见配方 5-5）。


  我们其实已经在不知不觉中使用这些授权管理器了。在表达式 `.pathMatchers("/login").permitAll()` 中，`permitAll`
  部分实际上使用了一个 `ReactiveAuthorizationManager`，这是一个简单的管理器，始终返回 true 以允许访问。但这只是一个实例。我们可以通过便捷方法（参见表
  5-8）或使用 `access` 方法应用更多此类管理器，以使用更复杂的函数来判断是否允许访问。


  **表 5-8** Spring Security WebFlux 内置表达式


  | 表达式 | 描述 |

  | --- | --- |

  | `hasRole(''role'')` 或 `hasAuthority(''authority'')` | 如果当前用户拥有指定角色，则返回 true |

  | `hasAnyRole(''role'')` 或 `hasAnyAuthority(''authority'')` | 如果当前用户拥有指定角色之一，则返回
  true |

  | `permitAll()` | 始终评估为 `true` |

  | `denyAll()` | 始终评估为 `false` |

  | `authenticated()` | 如果用户已认证，则返回 `true` |

  | `hasIpAddress()` | 如果用户拥有指定的 IP 地址（或范围），则返回 true |

  | `access()` | 使用函数判断是否授予访问权限 |


  ![](img/314861_5_En_5_Figl_HTML.gif)一个火焰图标插图。尽管角色和权限几乎相同，但它们在处理方式上存在细微但重要的区别。使用
  `hasRole` 时，会检查传入的角色值是否以 `ROLE_`（默认角色前缀）开头；如果不是，则在检查权限之前添加此前缀。因此，`hasRole(''ADMIN'')`
  实际上会检查当前用户是否拥有 `ROLE_ADMIN` 权限。而使用 `hasAuthority` 时，则会按原样检查该值。


  ```

  @Bean

  public SecurityWebFilterChain springWebFilterChain(ServerHttpSecurity http) {

  return http

  .formLogin( (formLogin) -> formLogin.loginPage("/login"))

  .csrf( (csrf) -> csrf.csrfTokenRepository(new CookieServerCsrfTokenRepository()))

  .authorizeExchange( (auth) -> {

  auth.pathMatchers("/login").permitAll();

  auth.pathMatchers("/todos").hasAuthority("USER");

  auth.pathMatchers(HttpMethod.DELETE, "/todos").access(this::todoRemoveAllowed);

  }

  )

  .build();

  }

  private Mono todoRemoveAllowed(Mono authentication, AuthorizationContext context)
  {

  return authentication

  .map ( (auth) -> auth.getAuthorities().contains(new SimpleGrantedAuthority("ADMIN"))
  || isOwner(auth, context))

  .map(AuthorizationDecision::new);

  }

  private boolean isOwner(Authentication auth, AuthorizationContext context) {

  var id = Long.valueOf(context.getVariables().getOrDefault("id", "-1").toString());

  return todoService.findById(id)

  .map( (todo) -> Objects.equals(todo.getOwner(), auth.getName())).defaultIfEmpty(false).block();

  }

