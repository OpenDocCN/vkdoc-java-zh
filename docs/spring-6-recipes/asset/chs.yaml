  \ JSON 进行相互转换。在写入时，使用`writeValueAsString`方法将对象转换为 JSON 字符串。然后，这个`String`被存储在 Redis\
  \ 中。接着，再次读取该字符串并将其传递给`ObjectMapper`的`readValue`方法。根据类型参数（此处为`Vehicle.class`），构造一个对象，并将\
  \ JSON 映射到给定类的实例。\n\n在使用 Redis 时存储对象并非易事，有些人认为这不是 Redis 的预期用途（即存储复杂的对象结构）。\n\n####\
  \ 配置和使用 RedisTemplate\n\n根据用于连接 Redis 的客户端库，使用 Redis API 可能会更困难。为了统一这一点，可以使用`RedisTemplate`。它可以与大多数现有的\
  \ Redis Java 客户端配合使用。除了提供统一的方法外，它还负责将任何异常转换为 Spring 的`DataAccessException`层次结构。这使其能够与任何现有的数据访问很好地集成，并允许使用\
  \ Spring 的事务支持。\n\n![](img/314861_5_En_9_Figg_HTML.gif)一个信息符号，由带阴影圆圈内的字母 i 图标表示。 \
  \ 在使用[Spring Data Redis](https://spring.io/projects/spring-data-redis)之前，需要将相关的\
  \ jar 包添加到类路径中。使用 Maven 时，添加以下依赖：\n\n```\norg.springframework.data\nspring-data-redis\n\
  3.0.0\n\n```\n\n或者在使用 Gradle 时添加以下内容：\n\n`compile 'org.springframework.data:spring-data-redis:3.0.0'`\n\
  \n`RedisTemplate`需要一个`RedisConnectionFactory`来获取连接。`RedisConnectionFactory`是一个接口，有多个实现可用。在这种情况下，需要`JedisConnectionFactory`。\n\
  \n```\npackage com.apress.spring6recipes.nosql.config;\nimport com.apress.spring6recipes.nosql.RedisVehicleRepository;\n\
  import com.apress.spring6recipes.nosql.Vehicle;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.data.redis.connection.RedisConnectionFactory;\n\
  import org.springframework.data.redis.connection.jedis.JedisConnectionFactory;\n\
  import org.springframework.data.redis.core.RedisTemplate;\n@Configuration\npublic\
  \ class RedisConfig {\n@Bean\npublic RedisTemplate redisTemplate(\nRedisConnectionFactory\
  \ connectionFactory) {\nvar template = new RedisTemplate();\ntemplate.setConnectionFactory(connectionFactory);\n\
  return template;\n}\n@Bean\npublic RedisConnectionFactory redisConnectionFactory()\
  \ {\nreturn new JedisConnectionFactory();\n}\n@Bean\npublic RedisVehicleRepository\
  \ vehicleRepository(RedisTemplate redis) {\nreturn new RedisVehicleRepository(redis);\n\
  }\n}\n代码清单 9-26\nRedisTemplate 配置\n```\n\n注意`redisTemplate` bean 方法的返回类型。`RedisTemplate`是一个泛型类，需要指定键和值的类型。在这种情况下，`key`的类型是字符串，`value`的类型是`Vehicle`。在存储和检索对象时，`RedisTemplate`会负责转换。转换是通过`RedisSerializer`完成的，这是一个接口，有多个实现可用（见表\
  \ 9-1）。默认的`RedisSerializer`，即`JdkSerializationRedisSerializer`，使用标准的 Java 序列化将对象转换为`byte[]`并还原。\n\
  \n表 9-1\n\n默认的 RedisSerializer 实现\n\n| 名称 | 描述 |\n| --- | --- |\n| `ByteArrayRedisSerializer`\
  \ | 按原样存储`byte[]`并返回相同内容。 |\n| `GenericToStringSerializer` | `String`到`byte[]`的序列化器，在转换为`byte[]`之前，使用\
  \ Spring 的`ConversionService`将对象转换为`String`。 |\n| `GenericJackson2ToStringSerializer`\
  \ | 使用 Jackson 2 ObjectMapper 通过动态类型读写 JSON。 |\n| `Jackson2JsonRedisRedisSerializer`\
  \ | 使用 Jackson 2 ObjectMapper 通过静态类型读写 JSON（每种对象类型需要一个序列化器）。 |\n| `JdkSerializationRedisSerializer`\
  \ | 使用默认的 Java 序列化和反序列化，是默认使用的实现。 |\n| `OxmSerializer` | 使用 Spring 的`Marshaller`和`Unmarshaller`读写\
  \ XML。 |\n| `StringRedisSerializer` | 简单的`String`到`byte[]`转换器。 |\n\n为了能够使用`RedisTemplate`，需要修改`RedisVehicleRepository`类。我们之前使用的`Main`类可以保持不变。\n\
  \n\n```\n```\npackage com.apress.spring6recipes.nosql;\nimport java.util.List;\n\
  import java.util.Map;\nimport org.springframework.dao.DataAccessException;\nimport\
