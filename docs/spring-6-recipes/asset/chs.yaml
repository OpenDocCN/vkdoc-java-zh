  \ JSON 格式存储。当 Redis 在事务中使用时，它也可以参与同一事务。为此，需要将 `RedisTemplate` 上的 `enableTransactionSupport`\
  \ 属性设置为 `true`。这将在事务提交时，确保在事务内部执行 Redis 操作。\n\n#### 创建 Spring Data Redis 仓库\n\n\
  使用 `RedisTemplate` 的仓库简化了 Redis 的操作。然而，对于许多用例来说，还可以进一步简化。与 JPA 类似，Spring Data Redis\
  \ 也提供了通过扩展 Spring Data 基类来编写仓库的选项，然后使用开箱即用的方法。为此，需要扩展 Spring Data 的 `Repository`\
  \ 接口（或其子接口之一）。\n\n底层仍会使用 `RedisTemplate`，但代码会更加简洁。实际上，整个 `RedisVehicleRepository`\
  \ 可以被移除，而 `VehicleRepository` 可以直接扩展 `CrudRepository` 接口。\n\n首先，可以修改配置。\n\n```\n\
  package com.apress.spring6recipes.nosql.config;\nimport com.apress.spring6recipes.nosql.Vehicle;\n\
