  public Mono save(Vehicle vehicle) {\nreturn prepareStatement(client.sql(INSERT_SQL),\
  \ vehicle)\n.fetch()\n.rowsUpdated().doOnNext((cnt) -> System.out.printf(\"Rows\
  \ inserted: %d%n\", cnt))\n.then(this.findByVehicleNo(vehicle.getVehicleNo()));\n\
