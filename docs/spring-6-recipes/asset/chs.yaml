  ## 5-2\. 登录 Web 应用程序


  ### 问题


  一个安全的应用程序要求用户在访问某些安全功能之前先登录。这对于运行在开放互联网上的 Web 应用程序尤其重要，因为黑客可以轻易访问它们。大多数 Web 应用程序必须提供一种方式，让用户输入其凭据进行登录。


  ### 解决方案


  Spring Security 支持多种用户登录 Web 应用程序的方式：


  *   基于表单的登录


  *   HTTP 基本认证


  *   HTTP 摘要认证


  *   OAuth2 认证


  *   基于证书的认证 (X.509)


  *   J2EE 认证（委托给底层的 Jakarta 容器）


  你应用程序的某些部分可能允许匿名访问（例如，访问欢迎页面）。Spring Security 提供了一个匿名登录服务，可以为匿名用户分配一个主体并授予权限，这样你在定义安全策略时就可以像处理普通用户一样处理匿名用户。


  Spring Security 还支持“记住我”登录，它能够在多个浏览器会话中记住用户的身份，这样用户在首次登录后无需再次登录。


  ### 工作原理


  为了帮助你更好地单独理解各种登录机制，让我们首先研究一下默认的 Spring Security 配置。


  ```

  @Bean(HTTPSECURITY_BEAN_NAME)

  @Scope("prototype")

  HttpSecurity httpSecurity() throws Exception {

  // 移除了 http 元素的设置

  http

  .csrf(withDefaults())

  .addFilter(webAsyncManagerIntegrationFilter)

  .exceptionHandling(withDefaults())

  .headers(withDefaults())

  .sessionManagement(withDefaults())

  .securityContext(withDefaults())

  .requestCache(withDefaults())

  .anonymous(withDefaults())

  .servletApi(withDefaults())

  .apply(new DefaultLoginPageConfigurer());

  http.logout(withDefaults());

  applyDefaultConfigurers(http);

  return http;

  }

  清单 5-7

  HttpSecurityConfiguration 中的 HttpSecurity Bean 方法

  ```


  上述清单（清单 5-7）来自 `HttpSecurityConfiguration` 类，是提供给 `HttpSecurity` bean 的默认配置。每个需要
  `HttpSecurity` 实例的方法都会收到自己的实例，因为它被定义为原型作用域（有关作用域的更多信息，请参见第 1 章）。


  在 Spring Security 的工作中，`securityContext` 和 `exceptionHandling` 非常重要。没有这些基础，Spring
  Security 将无法在用户登录后存储用户信息，也无法对安全相关的异常进行适当的异常转换（这些异常会直接向上冒泡，可能会将你的一些内部信息暴露给外部世界）。


  由于这是 `HttpSecurity`，因此它依赖于 Servlet API，通过 `servletApi()` 方法自动启用了与 Servlet API 的集成。


  Spring Security 还会向响应中添加特定的头部，以禁用浏览器中的某些功能，例如添加 `X-Frame` 头部以禁止使用框架，添加 `X-Content-Type-Options`
  以禁用内容嗅探等。


  开箱即用，Spring Security 假设信息可以存储在 HTTP 会话中，因此它会设置基本的会话管理，以防止会话劫持，或至少使其更加困难。如配方 5-1
  所述，`csrf` 保护也默认启用，并且通过 `HttpSessionCsrfTokenRepository` 将信息存储在 HTTP 会话中，这体现在 `csrf`
  方法中。`requestCache` 用于将 HTTP Servlet 请求存储在缓存中，以便在登录后可以重新发出原始请求。同样，默认情况下，这存储在 HTTP
  会话中。




  #### HTTP 基本认证


  HTTP 基本认证支持可通过 `httpBasic()` 方法进行配置。当需要 HTTP 基本认证时，浏览器通常会显示一个登录对话框或特定的登录页面供用户登录。


  ```

  package com.apress.spring6recipes.board.security;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.http.HttpMethod;

  import org.springframework.security.config.Customizer;

  import org.springframework.security.config.annotation.web.builders.HttpSecurity;

  import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;

  import org.springframework.security.web.SecurityFilterChain;

  @Configuration

  @EnableWebSecurity

  public class TodoSecurityConfig {

  @Bean

  public SecurityFilterChain securityFilterChain(HttpSecurity http) throws Exception
  {

  http.formLogin().disable();

  http.httpBasic(Customizer.withDefaults());

  http.authorizeHttpRequests(

  auth -> auth

  .requestMatchers(HttpMethod.DELETE, "/todos/*").hasAuthority("ADMIN")

  .requestMatchers("/todos", "/todos/*").hasAuthority("USER"));

  return http.build();

  }

  }

