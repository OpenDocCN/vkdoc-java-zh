  ## 7-10\. 使用加载时织入管理事务


  ### 问题


  默认情况下，Spring 的声明式事务管理是通过其 AOP 框架启用的。然而，由于 Spring AOP 只能通知 IoC 容器中声明的 bean 的公共方法，因此你只能在此范围内使用
  Spring AOP 管理事务。有时，你可能希望管理非公共方法或在 Spring IoC 容器外部创建的对象（例如领域对象）的事务。


  ### 解决方案


  Spring 提供了一个名为 `AnnotationTransactionAspect` 的 AspectJ 切面，它可以管理任何对象的任何方法的事务，即使这些方法是非公共的，或者对象是在
  Spring IoC 容器外部创建的。该切面将管理任何带有 `@Transactional` 注解的方法的事务。你可以选择 AspectJ 的编译时织入或加载时织入来启用此切面。


  ### 工作原理


  要在加载时将切面织入到你的领域类中，你必须在配置类上添加 `@EnableLoadTimeWeaving` 注解。要启用 Spring 的 `AnnotationTransactionAspect`
  进行事务管理，你只需定义 `@EnableTransactionManagement` 注解并将其 `mode` 属性设置为 `ASPECTJ`。`@EnableTransactionManagement`
  注解的 mode 属性接受两个值：`ASPECTJ` 和 `PROXY`。`ASPECTJ` 规定容器应使用加载时或编译时织入来启用事务通知。这需要 `spring-instrument`
  jar 包位于 classpath 中，并在加载时或编译时进行适当的配置。


  或者，`PROXY` 规定容器应使用 Spring AOP 机制。需要注意的是，`ASPECTJ` 模式不支持在接口上配置 `@Transactional` 注解。然后事务切面将自动启用。你还必须为此切面提供一个事务管理器。默认情况下，它将查找一个名为
  `transactionManager` 的事务管理器。


  ```

  package com.apress.spring6recipes.bookshop;

  @Configuration

  @EnableTransactionManagement(mode = AdviceMode.ASPECTJ)

  @EnableLoadTimeWeaving

  public class BookstoreConfiguration { ... }

