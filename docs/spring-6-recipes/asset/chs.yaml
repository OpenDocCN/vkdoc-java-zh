  \ - 使用代理\n```\n\n## 10-4\\. 使用 Spring 的邮件支持发送邮件\n\n### 问题\n\n许多应用程序需要发送邮件。在 Java\
  \ 应用程序中，你可以使用 [Jakarta Mail API](https://jakarta.ee/specifications/mail/) 发送邮件。但是，使用\
  \ Jakarta Mail 时，你必须处理特定的邮件会话和异常。因此，应用程序会变得依赖 Jakarta Mail，并且难以切换到其他邮件 API。\n\n\
  ### 解决方案\n\nSpring 的邮件支持通过提供一个抽象且与实现无关的 API 来发送邮件，从而简化了邮件发送过程。Spring 邮件支持的核心接口是\
  \ `MailSender`。`Jakarta MailSender` 接口是 `MailSender` 的子接口，它包含了专门的 Jakarta Mail 特性，例如多用途互联网邮件扩展（MIME）消息支持。要发送包含\
  \ HTML 内容、内嵌图片或附件的邮件，你必须将其作为 MIME 消息发送。\n\n\n\n### 工作原理\n\n假设您希望前面食谱中的文件复制应用程序在发生任何错误时通知管理员。首先，您需要创建以下\
  \ `ErrorNotifier` 接口，其中包含一个用于通知文件复制错误的方法。\n\n```\npackage com.apress.spring6recipes.replicator;\n\
  public interface ErrorNotifier {\nvoid notifyCopyError(String srcDir, String destDir,\
  \ String filename);\n}\n清单 10-30\nErrorNotifier 接口\n```\n\n![](img/314861_5_En_10_Figd_HTML.gif)一个带阴影圆圈的字母\
  \ i 图标。  在发生错误时调用此通知器的任务留给您来完成。由于您可以将错误处理视为一个横切关注点，因此 AOP 将是解决此问题的理想方案。您可以编写一个异常通知（after\
  \ throwing advice）来调用此通知器。\n\n接下来，您可以实现此接口，以您选择的方式发送通知。最常见的方式是发送电子邮件。在以这种方式实现接口之前，您可能需要一个支持简单邮件传输协议（SMTP）的本地邮件服务器用于测试目的。我们推荐安装\
  \ [GreenMail](https://greenmail-mail-test.github.io/greenmail/)，它非常易于安装和配置。您也可以运行\
  \ `greenmail.sh` 脚本来启动一个 Docker 容器。默认情况下，GreenMail 使用偏移量为 3000 的邮件端口，因此 SMTP 端口不是\
  \ 25 而是 3025，POP3 端口不是 110 而是 3110。\n\n#### 使用 Jakarta Mail API 发送电子邮件\n\n现在，让我们看看如何使用\
