  . 使用 Spring-WS 和 XML 编组技术开发 SOAP Web 服务\n\n### 问题\n\n在使用契约优先的方法开发 Web 服务时，你必须处理请求和响应的\
  \ XML 消息。如果直接使用 XML 解析 API 来解析 XML 消息，你将不得不使用底层 API 逐个处理 XML 元素，这是一项繁琐且低效的任务。\n\n\
  ### 解决方案\n\nSpring-WS 支持使用 XML 编组技术，将对象编组和解组为 XML 文档，或从 XML 文档解组为对象。通过这种方式，你可以处理对象属性，而不是\
  \ XML 元素。这项技术也被称为对象/XML 映射（OXM），因为你实际上是在对象和 XML 文档之间进行映射。要使用 XML 编组技术实现端点，你可以为其配置一个\
  \ XML 编组器。表 10-2 列出了 Spring 为不同 XML 编组 API 提供的编组器。\n\n表 10-2\n\n不同 XML 编组 API 的编组器\n\
  \n| API | 编组器 |\n| --- | --- |\n| JAXB | `org.springframework.oxm.jaxb.Jaxb2Marshaller`\
  \ |\n| XStream | `org.springframework.oxm.xstream.XStreamMarshaller` |\n\nSpring-WS\
  \ 客户端可以使用这种编组和解组技术来简化 XML 数据处理。\n\n### 工作原理\n\n\n\n#### 使用 XML 编组创建服务端点\n\nSpring-WS\
  \ 支持多种 XML 编组 API，包括 JAXB 和 XStream。作为示例，你将使用 JAXB 作为编组器创建一个服务端点。使用其他 XML 编组 API\
  \ 的方法非常相似。使用 XML 编组的第一步是根据 XML 消息格式创建对象模型。这个模型通常可以由编组 API 生成。对于某些编组 API，对象模型必须由它们生成，以便它们可以插入编组特定的信息。使用\
  \ JAXB 时，你通常从 XSD 开始，并基于它生成 Java 类。\n\n要从 XSD 生成 Java 类，你需要一个名为 `xjc` 的工具，它将 XSD\
  \ 转换为 Java 对象（或从 Java 对象生成模式）。JAXB 的 XJC 可以从 [Jakarta EE 主页](https://eclipse-ee4j.github.io/jaxb-ri/3.0.0/docs/ch04.html)下载。下载并解压后，`xjc`\
  \ 启动脚本位于 `bin` 目录中。\n\n要生成类，请执行以下命令（从你下载 `xjc` 程序的目录）。\n\n```\nxjc /spring-6-recipes/code/ch10/recipe_10_9_SpringWS_Server/src/main/resources/META-INF/xsd/temperature.xsd\n\
  清单 10-75\nXJC 命令行\n```\n\n这将生成四个 Java 类，你可以将它们复制到项目的源代码中。\n\n![](img/314861_5_En_10_Figg_HTML.gif)一个灯泡的轮廓插图。 \
