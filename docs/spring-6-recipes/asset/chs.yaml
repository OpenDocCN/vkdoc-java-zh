  #### 简化 Spring Neo4j 配置\n\n目前，`StarwarsConfig` 手动配置了所有活动部件：`Neo4jClient`、`Neo4jTemplate`\
  \ 等。虽然你已经了解到所有这些组件都在 Spring Data Neo4j 仓库底层被使用，但这并不意味着你想要手动配置它们。通常，不同应用之间唯一变化的是\
  \ `Driver` 的配置。Spring Data Neo4j 认识到了这一点，并提供了一个基础配置类 `AbstractNeo4jConfig`，你可以继承它。继承此类时，你只需实现\
  \ `driver` 方法并用 `@Bean` 注解标记，其他所有部分都会自动配置。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  import org.neo4j.driver.Driver;\nimport org.neo4j.driver.GraphDatabase;\nimport\
  \ org.springframework.beans.factory.annotation.Value;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.ComponentScan;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.context.annotation.PropertySource;\nimport org.springframework.context.support.PropertySourcesPlaceholderConfigurer;\n\
  import org.springframework.data.neo4j.config.AbstractNeo4jConfig;\nimport org.springframework.data.neo4j.repository.config.EnableNeo4jRepositories;\n\
  import org.springframework.transaction.annotation.EnableTransactionManagement;\n\
  @Configuration\n@PropertySource(\"classpath:/application.properties\")\n@EnableTransactionManagement\n\
  @ComponentScan\n@EnableNeo4jRepositories\npublic class StarwarsConfig extends AbstractNeo4jConfig\
  \ {\n@Value(\"${neo4j.url}\")\nprivate String url;\n@Override\n@Bean\npublic Driver\
  \ driver() {\nreturn GraphDatabase.driver(url);\n}\n@Bean\npublic static PropertySourcesPlaceholderConfigurer\
  \ pspc() {\nreturn new PropertySourcesPlaceholderConfigurer();\n}\n}\n代码清单 9-58\n\
  使用基础类的 StarwarsConfig\n```\n\n\n\n#### 使用 Spring Data Neo4j 响应式仓库\n\n除了阻塞式仓库，也可以使用响应式仓库。对于返回零个或一个元素的方法（如\
  \ `findById`），它将返回一个 `Mono`；对于返回零个或多个元素的方法（如 `findAll`），它将返回一个 `Flux`。默认的 Neo4j\
  \ Java 驱动程序已内置响应式支持。要使用响应式编程方式，你需要在类路径中包含 RxJava3 或 Project Reactor，并使用相应的仓库 `RxJava3CrudRepository`\
  \ 或 `ReactiveCrudRepository`（或 Neo4j 专用的 `ReactiveNeo4jRepository`）。我们将使用 `ReactiveCrudRepository`\
  \ 来启用响应式访问。\n\n首先，修改仓库，使其继承 `ReactiveCrudRepository` 而非普通的 `CrudRepository`。\n\n\
  ```\npackage com.apress.spring6recipes.nosql;\nimport org.springframework.data.repository.reactive.ReactiveCrudRepository;\n\
  public interface PlanetRepository extends ReactiveCrudRepository { }\n清单 9-60\n\
  响应式 PlanetRepository\n```\n\n```\npackage com.apress.spring6recipes.nosql;\nimport\
  \ org.springframework.data.repository.reactive.ReactiveCrudRepository;\npublic interface\
  \ CharacterRepository extends ReactiveCrudRepository { }\n清单 9-59\n响应式 CharacterRepository\n\
  ```\n\n接下来，我们需要修改 `StarwarsService`（清单 9-61）和 `Neo4jStarwarsService`（清单 9-62）的实现，使其也变为响应式。\n\
  \n```\npackage com.apress.spring6recipes.nosql;\nimport jakarta.annotation.PreDestroy;\n\
  import org.springframework.stereotype.Service;\nimport org.springframework.transaction.annotation.Transactional;\n\
  import reactor.core.publisher.Mono;\n@Service\n@Transactional\nclass Neo4jStarwarsService\
  \ implements StarwarsService {\nprivate final PlanetRepository planetRepository;\n\
  private final CharacterRepository characterRepository;\nNeo4jStarwarsService(PlanetRepository\
  \ planetRepository,\nCharacterRepository characterRepository) {\nthis.planetRepository\
  \ = planetRepository;\nthis.characterRepository = characterRepository;\n}\n@Override\n\
  public Mono save(Planet planet) {\nreturn planetRepository.save(planet);\n}\n@Override\n\
  public Mono save(Character character) {\nreturn characterRepository.save(character);\n\
  }\n@Override\npublic Mono printAll() {\nreturn planetRepository.findAll().doOnNext(System.out::println)\n\
  .thenMany(characterRepository.findAll().doOnNext(System.out::println)).then();\n\
  }\n@PreDestroy\npublic Mono deleteAll() {\nreturn characterRepository.deleteAll()\n\
  .then(planetRepository.deleteAll());\n}\n}\n清单 9-62\n响应式 StarwarsService 实现\n```\n\
  \n```\npackage com.apress.spring6recipes.nosql;\nimport reactor.core.publisher.Mono;\n\
  public interface StarwarsService {\nMono save(Planet planet);\nMono save(Character\
  \ charachter);\nMono printAll();\nMono deleteAll();\n}\n清单 9-61\n响应式 StarwarsService\n\
  ```\n\n由于我们现在使用了 Spring Data Neo4j 的响应式部分，配置也需要相应调整。我们可以继承 `AbstractReactiveNeo4jConfig`\
  \ 类来帮助设置相关部分，并只需实现 `driver` 方法。同时，我们需要将 `@EnableNeo4jRepositories` 替换为 `@EnableReactiveNeo4jRepositories`。参见清单\
  \ 9-63。\n\n```\npackage com.apress.spring6recipes.nosql;\nimport org.neo4j.driver.Driver;\n\
  import org.neo4j.driver.GraphDatabase;\nimport org.springframework.beans.factory.annotation.Value;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.context.annotation.PropertySource;\n\
  import org.springframework.context.support.PropertySourcesPlaceholderConfigurer;\n\
  import org.springframework.data.neo4j.config.AbstractReactiveNeo4jConfig;\nimport\
  \ org.springframework.data.neo4j.repository.config.EnableReactiveNeo4jRepositories;\n\
  import org.springframework.transaction.annotation.EnableTransactionManagement;\n\
  @Configuration\n@PropertySource(\"classpath:/application.properties\")\n@EnableTransactionManagement\n\
  @ComponentScan\n@EnableReactiveNeo4jRepositories\npublic class StarwarsConfig extends\
  \ AbstractReactiveNeo4jConfig {\n@Value(\"${neo4j.url}\")\nprivate String url;\n\
  @Override\n@Bean\npublic Driver driver() {\nreturn GraphDatabase.driver(url);\n\
  }\n@Bean\npublic static PropertySourcesPlaceholderConfigurer pspc() {\nreturn new\
  \ PropertySourcesPlaceholderConfigurer();\n}\n}\n清单 9-63\n响应式 Neo4j 配置\n```\n\n\
  最后，我们的 `Main` 类需要修改，以便在响应式管道中调用方法。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import reactor.core.publisher.Flux;\nimport reactor.core.publisher.Mono;\nimport\
  \ java.util.concurrent.CountDownLatch;\npublic class Main {\npublic static void\
  \ main(String[] args) throws Exception {\ntry (var ctx = new AnnotationConfigApplicationContext(StarwarsConfig.class))\
  \ {\nvar service = ctx.getBean(StarwarsService.class);\n// 行星\nvar dagobah = new\
  \ Planet(\"Dagobah\");\nvar alderaan = new Planet(\"Alderaan\");\nvar tatooine =\
  \ new Planet(\"Tatooine\");\nvar planets = Flux.just(dagobah, alderaan, tatooine);\n\
  // 角色\nvar han = new Character(\"Han Solo\");\nvar leia = new Character(\"Leia Organa\"\
  );\nvar luke = new Character(\"Luke Skywalker\");\nvar yoda = new Character(\"Yoda\"\
  );\nleia.setLocation(alderaan);\nleia.addFriend(han);\nluke.setLocation(tatooine);\n\
  luke.addFriend(han);\nluke.addFriend(leia);\nyoda.setLocation(dagobah);\nyoda.setApprentice(luke);\n\
  var characters = Flux.just(han, luke, leia, yoda);\nvar countDownLatch = new CountDownLatch(1);\n\
  planets.flatMap(service::save)\n.thenMany(characters.concatMap(service::save))\n\
  .then(service.printAll())\n.then(service.deleteAll())\n.doOnTerminate(countDownLatch::countDown).subscribe();\n\
  countDownLatch.await();\n}\n}\n}\n清单 9-64\n响应式主类\n```\n\n现在，主类对行星和角色使用了 `Flux` 而非\
  \ `Stream`。当行星保存后，角色被保存，完成后，我们像之前一样打印所有内容。因为我们不想使用 `block()` 方法阻塞，所以我们使用 `CountDownLatch`\
  \ 等待代码执行；在所有记录删除后计数器递减，之后程序将继续执行。诚然，这仍然是阻塞的，但在完整的响应式栈中使用时，你可能会从最后一个 `then` 返回 `Mono`，并进行进一步组合，或将输出交给\
  \ Spring WebFlux 控制器（参见第 4 章）。\n\n## 9-4\\. 使用 Couchbase\n\n### 问题\n\n你想在应用程序中使用\
  \ Couchbase 来存储文档。\n\n### 解决方案\n\n首先，下载、安装并设置 Couchbase。然后使用 [Spring Data Couchbase](https://spring.io/projects/spring-data-couchbase)\
  \ 项目在数据存储中存储和检索文档。\n\n### 工作原理\n\n#### 下载并安装 Couchbase\n\nCouchbase 可以从 [`www.Couchbase.com/downloads`](http://www.couchbase.com/downloads)\
  \ 下载，支持包括 Windows 在内的多种操作系统。在撰写本文时，7.1 版本是最新版本，也是本食谱所使用的版本。\n\n![](img/314861_5_En_9_Figl_HTML.gif)一个灯泡轮廓图标，表示信息提示。 \
  \ `bin` 目录还包含一个 `Couchbase.sh` 脚本，可在 Docker 容器中启动 Couchbase，省去安装步骤。\n\n\n\n####\
  \ 设置 Couchbase\n\n下载并启动 Couchbase 后，打开浏览器并访问 http://localhost:8091，您将看到一个类似于图 9-4\
  \ 的页面。您可以启动一个新集群，也可以加入一个现有集群。本教程中，您将启动一个新集群。因此，请点击 **设置新集群** 按钮。\n\n![](img/314861_5_En_9_Fig4_HTML.jpg)\n\
