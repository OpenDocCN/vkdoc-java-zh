  \ `VehicleRepository` bean 并用于执行操作。当运行上下文的代码关闭时，会触发 `MongoVehicleRepository` 中的\
  \ `cleanUp` 方法。\n\n#### 使用 MongoTemplate 简化 MongoDB 代码\n\n目前，`MongoVehicleRepository`\
