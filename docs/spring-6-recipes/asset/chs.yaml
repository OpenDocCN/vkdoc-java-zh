  ```\n\n为了启用注解驱动的事务，我们添加了 `@EnableTransactionManagement`，这需要一个 `PlatformTransactionManager`，在本例中为\
  \ `Neo4jTransactionManager`。`Neo4jClient` 是对所使用的 Neo4j 驱动程序的封装，是 Spring Data Neo4j\
