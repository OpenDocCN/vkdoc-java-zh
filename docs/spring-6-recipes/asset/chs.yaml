  `@EnableWebFluxSecurity` 配置会注册一个 `WebFluxConfigurer`（参见技巧 5-5），用于添加 `AuthenticationPrincipalArgumentResolver`，从而允许你将
  `Authentication` 注入到 Spring WebFlux 处理器方法中。它还会注册 Spring Security 中的 `WebFluxSecurityConfiguration`
  类，该类会检测 `SecurityWebFilterChain` 的实例（包含安全配置），并将其包装为一个 `WebFilter`（类似于常规的 Servlet
  过滤器），Spring WebFlux 会使用这个 `WebFilter` 来为传入的请求添加行为（就像普通的 Servlet 过滤器一样）。


  在不进行任何额外配置的情况下，Spring Security 将使用一些默认设置运行，这些设置包括写入某些 HTTP 头，并启用 `/logout` 的登出功能。接下来，它将同时启用
  HTTP 基本认证和表单登录。出于安全考虑，现在所有被访问的 URL 都需要经过身份验证的用户。


  `org.springframework.security.config.web.server.ServerHttpSecurity` 应该看起来很熟悉（参见技巧
  5-1），它用于添加安全规则并进行进一步配置（例如添加/删除头以及配置登录方法）。通过 `authorizeExchange` 可以编写规则。这里我们保护 URL：`/welcome`
  允许所有人访问，而 `/reservation` URL 仅对具有 `USER` 角色的用户可用。对于其他请求，则必须进行身份验证。最后，你需要调用 `build()`
  来实际构建 `SecurityWebFilterChain`。


  除了 `authorizeExchange`，还可以使用 `headers()` 配置方法为请求添加安全头（另请参见技巧 5-2），例如跨站脚本保护、缓存头等。


  #### 用户身份验证


  在基于 Spring WebFlux 的应用程序中进行用户身份验证是通过 `ReactiveAuthenticationManager` 完成的；这是一个包含单个
  `authenticate` 方法的接口。你可以提供自己的实现，也可以使用提供的实现之一。第一个是 `UserDetailsRepositoryReactiveAuthenticationManager`，它包装了一个
  `ReactiveUserDetailsService` 的实例。另一个实现 `ReactiveAuthenticationManagerAdapter` 是对常规
  `AuthenticationManager` 的包装（参见技巧 5-3）。它会包装一个常规实例，这允许你以响应式的方式使用阻塞式实现。但这并不会使它们变成响应式；它们仍然会阻塞，但可以以这种方式重用。通过这种方式，你也可以为你的响应式应用程序使用
  JDBC、LDAP 等。


  在 Spring WebFlux 应用程序中配置 Spring Security 时，你可以将 `ReactiveAuthenticationManager`
  的实例或 `ReactiveUserDetailsService` 添加到你的 Java 配置类中。当检测到后者时，它会自动被包装在 `UserDetailsRepositoryReactiveAuthenticationManager`
  中。


