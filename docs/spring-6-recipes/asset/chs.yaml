  \ Data R2DBC，可以使其变得简单得多，复杂度也更低。\n\n"
- '# 7. Spring 事务管理


  在本章中，你将学习事务的基本概念以及 Spring 在事务管理方面的能力。事务管理是企业应用中确保数据完整性和一致性的关键技术。Spring 作为一个企业应用框架，在不同的事务管理
  API 之上提供了一个抽象层。作为应用程序开发者，你可以使用 Spring 的事务管理工具，而无需深入了解底层的事务管理 API。


  与 EJB 中的 Bean 管理事务（BMT）和容器管理事务（CMT）方法类似，Spring 同时支持编程式事务管理和声明式事务管理。Spring 事务支持的目标是通过向
  POJO 添加事务能力，提供一种 EJB 事务的替代方案。


  编程式事务管理是通过在业务方法中嵌入事务管理代码来实现的，以控制事务的提交和回滚。通常，如果方法正常完成，则提交事务；如果方法抛出特定类型的异常，则回滚事务。使用编程式事务管理，你可以定义自己的规则来提交和回滚事务。


  然而，当以编程方式管理事务时，你必须在每个事务性操作中包含事务管理代码。因此，样板式的事务代码会在每个此类操作中重复出现。此外，你很难为不同的应用程序启用或禁用事务管理。如果你对
  AOP 有扎实的理解，可能已经注意到事务管理是一种横切关注点。


  在大多数情况下，声明式事务管理优于编程式事务管理。它是通过声明将事务管理代码与业务方法分离来实现的。事务管理作为一种横切关注点，可以通过 AOP 方法进行模块化。Spring
  通过 Spring AOP 框架支持声明式事务管理。这可以帮助你更轻松地为应用程序启用事务，并定义一致的事务策略。声明式事务管理的灵活性不如编程式事务管理。


  编程式事务管理允许你通过代码控制事务——根据你的需要显式地启动、提交和加入事务。你可以指定一组事务属性，以精细的粒度定义事务。Spring 支持的事务属性包括传播行为、隔离级别、回滚规则、事务超时以及事务是否为只读。这些属性允许你进一步自定义事务的行为。


  完成本章后，你将能够在应用程序中应用不同的事务管理策略。此外，你将熟悉不同的事务属性，以便精细地定义事务。


  在某些情况下，当你认为添加 Spring 代理不值得麻烦或可以忽略其性能损失时，编程式事务管理是一个好主意。此时，你可以自行访问原生事务并手动控制事务。一个更便捷的选择是使用
  `TransactionTemplate` 类，它提供了一个模板方法，围绕该方法启动一个事务边界，然后提交事务，从而避免了 Spring 代理的开销。




  ## 7-1\. 事务管理的问题


  事务管理是企业应用开发中确保数据完整性和一致性的关键技术。没有事务管理，你的数据和资源可能会被破坏，并处于不一致的状态。在并发和分布式环境中，事务管理对于从意外错误中恢复尤为重要。


  简单来说，事务是一系列被视为单个工作单元的操作。这些操作要么全部完成，要么完全不生效。如果所有操作都顺利，事务应被永久提交。相反，如果其中任何一个操作出错，事务应回滚到初始状态，就像什么都没发生过一样。


  事务的概念可以用四个关键属性来描述——原子性（Atomicity）、一致性（Consistency）、隔离性（Isolation）和持久性（Durability），即
  ACID：


  *   **原子性**：事务是由一系列操作组成的原子操作。事务的原子性确保这些操作要么全部完成，要么完全不生效。


  *   **一致性**：一旦事务的所有操作完成，事务即被提交。此时，你的数据和资源将处于符合业务规则的一致状态。


  *   **隔离性**：由于可能有许多事务同时处理同一数据集，每个事务应与其他事务隔离，以防止数据损坏。


  *   **持久性**：一旦事务完成，其结果应是持久的，能够承受任何系统故障（想象一下，如果在事务提交过程中机器突然断电）。通常，事务的结果会被写入持久化存储。


  为了理解事务管理的重要性，我们先从一个从在线书店购买书籍的例子开始。首先，你需要在数据库中为这个应用创建一个新的模式。我们选择使用 PostgreSQL 作为这些示例的数据库。本章的源代码包含一个
  `bin` 目录，其中有两个脚本：一个（`postgres.sh`）用于下载 Docker 容器并启动一个默认的 Postgres 实例，另一个（`psql.sh`）用于连接到正在运行的
  Postgres 实例。连接数据库所需的属性可以在表 7-1 中找到。


