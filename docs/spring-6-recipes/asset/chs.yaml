  如果你不太理解这个 LDIF 文件，不必担心。你可能不需要经常使用这种文件格式来定义 LDAP 数据，因为大多数 LDAP 服务器都支持基于图形界面的配置。这个
  `users.ldif` 文件包含以下内容：


  *   默认的 LDAP 域：`dc=spring6recipes,dc=com`

  *   用于存储组和用户的 groups 和 people 组织单元

  *   密码分别为 `secret` 和 `1111` 的 `admin` 和 `user1` 用户

  *   admin 组（包含 admin 用户）和 user 组（包含 `admin` 和 `user1` 用户）


  为了测试，你可以在本地机器上安装一个 LDAP 服务器来托管这个用户仓库。为了方便安装和配置，我们推荐安装 [OpenDS](http://www.opends.org/)，这是一个基于
  Java 的开源目录服务引擎，支持 LDAP。


  ![](img/314861_5_En_5_Figg_HTML.gif)带轮廓的灯泡图标表示一条提示信息。 在 `bin` 目录中，有一个 `ldap.sh`
  脚本，它将启动一个 Docker 化的 OpenDS 版本，并导入前面提到的 `users.ldif`。请注意，此 LDAP 服务器的根用户和密码分别是 `cn=Directory
  Manager` 和 `ldap`。稍后，你将需要使用此用户来连接该服务器。


  LDAP 服务器启动后，你可以配置 Spring Security 来针对其仓库验证用户身份。


  使用 LDAP 有两种选择：一种是使用绑定认证，即使用给定的用户名/密码在 LDAP 服务器上对用户进行身份验证。另一种是使用密码认证，即从 LDAP 检索用户信息，但由
  Spring Security 进行密码验证。后一种方法的缺点是你需要拥有一个对 LDAP 具有访问权限的只读用户，以便能够检索用户信息。使用 LDAP 最常见的方式是绑定认证。要启用此功能，你需要配置一个
  `BindAuthenticator`。为了帮助完成设置，Spring Security 提供了 `LdapBindAuthenticationManagerFactory`。


  在配置 `BindAuthenticator` 之前，我们需要与 LDAP 建立连接；为此，我们使用 `ContextSource`。Spring Security
  提供了一个 `DefaultSpringSecurityContextSource` 来简化此操作。它的构造函数接受一个参数，即 LDAP 服务器 URL；基于此
  URL，它将连接到我们的 LDAP 服务器。


  `ContextSource` 被传递给 `authenticationManager` 方法，并用于配置 `BindAuthenticator` 和 `DefaultLdapAuthoritiesPopulator`。后者用于检索用户所属的组，并将其转换为
  Spring Security 可用的权限。默认情况下，使用的是 `NullLdapAuthoritiesPopulator`，它可以对用户进行身份验证，但不会设置任何权限。


  为了能够在 LDAP 中找到正确的用户，我们需要设置一个或多个 `userDnPatterns` 或一个 `userSearchFilter`。对于我们的应用程序，指定模式
  `uid={0},ou=people` 就足够了，因为我们的所有用户都在 `people` 单元中。`{0}` 将被替换为从登录表单传入的用户名。对于 `DefaultLdapAuthoritiesPopulator`，我们需要一个
  `groupSearchBase`，因此我们指定 `ou=groups`，因为这是包含组的单元。通过这种方式，该填充器将获取用户所属的组，并将其转换为权限。


  ```

  @Configuration

  @EnableWebSecurity

  public class TodoSecurityConfig implements WebMvcConfigurer {

  @Bean

  public DefaultSpringSecurityContextSource contextSource() {

  var url = "ldap://ldap-server:389/dc=spring6recipes,dc=com";

  return new DefaultSpringSecurityContextSource(url);

  }

  @Bean

  public AuthenticationManager authenticationManager(

  DefaultSpringSecurityContextSource contextSource) {

  var populator = new DefaultLdapAuthoritiesPopulator(contextSource, "ou=groups");

  populator.setRolePrefix("");

  var factory = new LdapBindAuthenticationManagerFactory(contextSource);

  factory.setUserDnPatterns("uid={0},ou=people");

  factory.setLdapAuthoritiesPopulator(populator);

  return factory.createAuthenticationManager();

  }

  }

