  Main 类\n```\n\n## 10-6\\. 使用 Spring 的调度功能安排任务\n\n### 问题\n\n你希望以一致的方式安排方法调用，可以使用\
  \ cron 表达式、固定间隔或固定速率，并且不希望仅仅为了这个目的而使用 Quartz。\n\n### 解决方案\n\nSpring 支持配置 `TaskExecutor`\
  \ 和 `TaskScheduler`。这种能力，加上使用 `@Scheduled` 注解安排方法执行的功能，使得 Spring 的调度支持能够以最少的麻烦工作：你只需要一个方法、一个注解，并启用注解扫描器即可。\n\
  \n\n\n### 工作原理\n\n让我们回顾一下上一个示例中的例子：我们想要使用 cron 表达式在 Bean 上调度对复制方法的调用。我们的配置类如下所示。\n\
  \n```\npackage com.apress.spring6recipes.replicator.config;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.scheduling.TaskScheduler;\n\
  import org.springframework.scheduling.annotation.EnableScheduling;\nimport org.springframework.scheduling.concurrent.ThreadPoolTaskScheduler;\n\
  @Configuration\n@EnableScheduling\npublic class SchedulingConfiguration {\n@Bean\n\
  public TaskScheduler taskScheduler() {\nvar taskScheduler = new ThreadPoolTaskScheduler();\n\
  taskScheduler.setThreadNamePrefix(\"s6r-scheduler-\");\ntaskScheduler.setPoolSize(10);\n\
  return taskScheduler;\n}\n}\n清单 10-54\n调度配置\n```\n\n我们通过指定 `@EnableScheduling` 来启用注解驱动的调度支持。这将注册一个\
  \ Bean，用于扫描应用程序上下文中的 Bean，查找 `@Scheduled` 注解。我们还配置了一个名为 `taskScheduler` 的 `ThreadPoolTaskScheduler`，因为我们希望为线程名称设置前缀，并且希望同时调度十个任务。我们将池大小设置为\
  \ 10。调度支持会自动检测单个 `TaskScheduler`，或者通过名称 `taskScheduler` 检测它。\n\n```\npackage com.apress.spring6recipes.replicator;\n\
  import org.springframework.scheduling.annotation.Scheduled;\nimport java.io.IOException;\n\
  import java.nio.file.Files;\nimport java.nio.file.Path;\npublic class SimpleFileReplicator\
  \ implements FileReplicator {\n@Scheduled(fixedDelay = 60_000)\npublic synchronized\
  \ void replicate() throws IOException {\nvar files = Path.of(srcDir);\ntry (var\
  \ fileList = Files.list(files)) {\nfileList.filter(Files::isRegularFile)\n.forEach(it\
  \ -> fileCopier.copyFile(it, Path.of(destDir)));\n}\n}\n}\n清单 10-55\n带有调度的 Simple\
  \ FileReplicator 实现\n```\n\n请注意，我们已经在 `replicate()` 方法上使用了 `@Scheduled` 注解。在这里，我们告诉调度器每\
  \ 60 秒执行一次该方法。或者，我们也可以为 `@Scheduled` 注解指定一个 `fixedRate` 值，该值将测量连续启动之间的时间，然后触发下一次运行。\n\
  \n```\n@Scheduled(fixedRate = 60_000)\npublic synchronized void replicate() throws\
  \ IOException { ... }\n清单 10-56\n带有 fixedRate 的 Simple FileReplicator 实现\n```\n\n\
  最后，我们可能希望对方法的执行进行更复杂的控制。在这种情况下，我们可以使用 cron 表达式，就像我们在 Quartz 示例中所做的那样。\n\n```\n@Scheduled(\
  \ cron = \"0/60 * * * * ? \" )\npublic synchronized void replicate() throws IOException\
  \ { ... }\n清单 10-57\n带有 cron 表达式的 Simple FileReplicator 实现\n```\n\n在 Java 中也支持配置所有这些内容。如果你不想或无法向现有的\
  \ Bean 方法添加注解，这可能会很有用。下面展示了我们如何使用 Spring 的 `ScheduledTaskRegistrar` 重新创建上述以注解为中心的示例。你可以通过让配置类（或其他\
  \ Spring 组件）实现 `SchedulingConfigurer` 接口并实现 `configureTasks` 方法来访问 `ScheduledTaskRegistrar`。\n\
  \n```\npackage com.apress.spring6recipes.replicator.config;\nimport com.apress.spring6recipes.replicator.FileReplicator;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.scheduling.TaskScheduler;\nimport org.springframework.scheduling.annotation.EnableScheduling;\n\
  import org.springframework.scheduling.annotation.SchedulingConfigurer;\nimport org.springframework.scheduling.concurrent.ThreadPoolTaskScheduler;\n\
  import org.springframework.scheduling.config.ScheduledTaskRegistrar;\nimport java.io.IOException;\n\
  import java.time.Duration;\n@Configuration\n@EnableScheduling\npublic class SchedulingConfiguration\
  \ implements SchedulingConfigurer {\nprivate final FileReplicator fileReplicator;\n\
  public SchedulingConfiguration(FileReplicator fileReplicator) {\nthis.fileReplicator\
  \ = fileReplicator;\n}\n@Override\npublic void configureTasks(ScheduledTaskRegistrar\
  \ taskRegistrar) {\ntaskRegistrar.addFixedDelayTask(() -> {\ntry {\nfileReplicator.replicate();\n\
  } catch (IOException e) {\ne.printStackTrace();\n}\n}, Duration.ofSeconds(60));\n\
  }\n@Bean\npublic TaskScheduler taskScheduler() {\nvar taskScheduler = new ThreadPoolTaskScheduler();\n\
  taskScheduler.setThreadNamePrefix(\"s6r-scheduler-\");\ntaskScheduler.setPoolSize(10);\n\
  return taskScheduler;\n}\n}\n清单 10-58\n调度配置 - 手动配置任务\n```\n\n## 10-7\\. 契约优先的 SOAP\
  \ Web 服务简介\n\n### 问题\n\n你想要开发一个契约优先的 SOAP Web 服务。\n\n### 解决方案\n\n有两种开发 SOAP Web\
  \ 服务的方法。一种称为“代码优先”，这意味着你从一个 Java 类开始，然后逐步构建出 WSDL 契约。另一种方法称为“契约优先”，这意味着你从一个 XML\
  \ 数据契约（比 WSDL 更简单的东西）开始，然后向内构建一个 Java 类来实现该服务。要为“契约优先”的 SOAP Web 服务创建数据契约，你需要一个\
  \ XSD 文件或 XML 模式文件，用于描述服务支持的操作和数据。需要 XSD 文件的原因是，在“底层”，SOAP 服务客户端和服务器之间的通信是以 XSD\
  \ 文件中定义的 XML 形式进行的。然而，由于正确编写 XSD 文件可能很困难，最好先创建示例 XML 消息，然后从中生成 XSD 文件。然后，利用 XSD\
  \ 文件，你可以借助 Spring-WS 之类的工具，从 XSD 文件出发构建 SOAP Web 服务。\n\n### 工作原理\n\n#### 创建示例 XML\
  \ 消息\n\n让我们使用 SOAP“契约优先”方法创建一个天气服务。因此，你需要编写一个 SOAP 服务，该服务能够根据城市和日期传达天气信息，返回最低温度、最高温度和平均温度。与其一头扎进去编写代码来支持该功能，不如使用“契约优先”方法，用如下所示的\
