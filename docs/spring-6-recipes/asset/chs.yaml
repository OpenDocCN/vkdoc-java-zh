  \ fileReplicator) {\nthis.fileReplicator = fileReplicator;\n}\n@Override\npublic\
  \ void configureTasks(ScheduledTaskRegistrar taskRegistrar) {\nvar step = applicationStartup.start(\"\
  s6r.register-task\");\ntaskRegistrar.addFixedDelayTask(() -> {\ntry {\nfileReplicator.replicate();\n\
  } catch (IOException e) {\ne.printStackTrace();\n}\n}, Duration.ofSeconds(60));\n\
  step.end();\n}\n...\n@Override\npublic void setApplicationStartup(ApplicationStartup\
  \ applicationStartup) {\nthis.applicationStartup=applicationStartup;\n}\n}\n清单 10-85\n\
  包含事件的调度配置\n```\n\n现在，当你使用适当的设置（参见清单 10-83）运行应用程序时，你将看到此事件也被注册（参见图 10-8）。\n\n![](img/314861_5_En_10_Fig8_HTML.jpg)\n\
  \nAzul Mission Control 窗口的截图。一个 recording2.jfr 选项卡已打开，显示事件浏览器。在中央窗格中，选中了 startup\
  \ step 23 选项卡。事件浏览器中的最后一条结果被高亮显示。\n\n图 10-8\n\nJava Mission Control——已注册的事件\n\n\
  注册事件相对容易。你还可以使用额外的标签来丰富事件（就像 `spring.*` 命名空间中的那些一样）。例如，你可以添加一个包含你注册的任务/作业名称的标签。\n\
  \n```\npublic void configureTasks(ScheduledTaskRegistrar taskRegistrar) {\nvar step\
  \ = applicationStartup.start(\"s6r.register-task\");\nstep.tag(\"task\", \"file-replicator\"\
  );\ntaskRegistrar.addFixedDelayTask(() -> {\ntry {\nfileReplicator.replicate();\n\
