  ## 5-1. 保护 URL 访问


  ### 问题


  许多 Web 应用程序都有一些特别重要且私密的特定 URL。你必须通过防止未经授权的访问来保护这些 URL。


  ### 解决方案


  Spring Security 使你能够通过简单的配置，以声明式的方式保护 Web 应用程序的 URL 访问。它通过将 Servlet 过滤器应用于 HTTP
  请求来处理安全问题。为了注册此过滤器并检测配置，Spring Security 提供了一个方便的基类 `AbstractSecurityWebApplicationInitializer`
  供你继承。


  Spring Security 允许你通过在 `@Bean` 方法中使用 `HttpSecurity` 类和 `WebSecurity` 类来配置 Web 应用程序安全，这些方法将（重新）配置
  Spring Security 的部分功能。如果你的 Web 应用程序的安全需求简单且典型，你可以保持配置不变，并使用默认启用的安全设置，包括以下内容：


  *   **基于表单的登录服务**：提供一个默认页面，其中包含供用户登录此应用程序的登录表单。


  *   **HTTP 基本认证**：可以处理 HTTP 请求头中提供的基本认证凭据。它也可用于认证通过远程协议和 Web 服务发出的请求。


  *   **注销服务**：提供一个映射到 URL 的处理程序，供用户注销此应用程序。


  *   **匿名登录**：为匿名用户分配一个主体并授予权限，以便你可以像处理普通用户一样处理匿名用户。


  *   **Servlet API 集成**：允许你通过标准 Servlet API（例如 `HttpServletRequest.isUserInRole()`
  和 `HttpServletRequest.getUserPrincipal()`）访问 Web 应用程序中的安全信息。


  *   **CSRF**：跨站请求伪造保护。它将创建一个令牌并将其放入 `HttpSession` 中。


  *   **安全头**：例如禁用受保护包的缓存、XSS 保护、传输安全和 X-Frame 安全。


  注册了这些安全服务后，你可以指定需要特定权限才能访问的 URL 模式。Spring Security 将根据你的配置执行安全检查。用户必须先登录应用程序才能访问安全的
  URL，除非这些 URL 已开放匿名访问。Spring Security 提供了一组认证提供者供你选择。认证提供者负责认证用户并返回授予该用户的权限。


  ### 工作原理


  首先，你需要在 `@Configuration` 类上应用 `@EnableWebSecurity` 注解来启用安全功能。由于我们的应用程序已设置组件扫描，因此会自动检测到此
  `@Configuration` 类，并将安全功能应用于我们的应用程序。


  ```

  package com.apress.spring6recipes.board.security;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;

  @Configuration

  @EnableWebSecurity

  public class TodoSecurityConfig { }

  清单 5-1

  简单的安全配置

  ```


