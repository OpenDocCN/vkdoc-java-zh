  ## 5-5. 保护方法调用


  ### 问题


  作为保护 Web 层中 URL 访问的替代或补充，有时您可能需要保护服务层中的方法调用。例如，在单个控制器必须调用服务层中的多个方法的情况下，您可能希望对这些方法实施细粒度的安全控制。


  ### 解决方案


  Spring Security 使您能够以声明方式保护方法调用。您可以使用 `@Secured`、`@PreAuthorize`/`@PostAuthorize`
  或 `@PreFilter`/`@PostFilter` 注解来注解在 bean 接口或实现类中声明的方法，然后使用 `@EnableGlobalMethodSecurity`
  注解为它们启用安全性。


  ### 工作原理




  #### 使用注解保护方法


  保护方法的方式是通过使用 `@Secured` 注解。例如，你可以在 `TodoServiceImpl` 中的每个方法上添加 `@Secured` 注解，并指定访问属性作为其值，该属性的类型为
