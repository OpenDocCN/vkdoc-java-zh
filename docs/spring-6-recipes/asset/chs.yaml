- '# 2. Spring MVC


  MVC 是 Spring 框架的一个重要模块。它构建在强大的 Spring IoC 容器之上，并广泛利用容器的特性来简化其配置。


  *模型-视图-控制器*（MVC）是 UI 设计中常见的设计模式。它通过分离应用程序中模型、视图和控制器的作用，将业务逻辑与 UI 解耦。*模型*负责封装应用程序数据以供视图呈现。*视图*应仅呈现这些数据，而不包含任何业务逻辑。*控制器*负责接收来自用户的请求，并调用后端服务进行业务处理。处理完成后，后端服务可能会返回一些数据供视图呈现。控制器收集这些数据并准备模型以供视图呈现。MVC
  模式的核心思想是将业务逻辑与 UI 分离，使它们能够独立更改而互不影响。


  在 Spring MVC 应用程序中，模型通常由服务层处理并由持久层持久化的对象组成。视图通常是使用 Java Server Pages、[Thymeleaf](https://thymeleaf.org/)
  或 [FreeMarker](https://freemarker.apache.org/)（仅举几例）编写的模板。然而，也可以将视图定义为 PDF 文件、Excel
  文件或 RESTful Web 服务。


  完成本章后，你将能够使用 Spring MVC 开发 Java Web 应用程序。你还将了解 Spring MVC 的常见控制器和视图类型，包括已成为创建控制器事实标准的注解用法。此外，你将理解
  Spring MVC 的基本原理，这将为后续章节中更高级的主题奠定基础。有关 Spring MVC 及其响应式对应物 Spring WebFlux 的全面深入解释，我们推荐《Pro
  Spring MVC with WebFlux》（Apress, 2021）。


