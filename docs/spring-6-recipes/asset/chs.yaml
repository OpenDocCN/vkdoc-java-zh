  \ null ? this.location.getName() : \"\");\n}\n代码清单 9-48\n带有映射注解的 Character 类\n```\n\
  \n让我们通过使用 Spring 管理的事务和 `Neo4jTemplate` 来清理 `Neo4jStarwarsRepository`，同时新增两个方法，用于从\
  \ Neo4j 中查找所有 `Planet` 和 `Character` 实例。\n\n\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  import jakarta.annotation.PreDestroy;\nimport org.springframework.data.neo4j.core.Neo4jTemplate;\n\
