  ## 5-3\. 认证用户


  ### 问题


  当用户尝试登录你的应用程序以访问其安全资源时，你必须对用户的主体进行认证，并向该用户授予权限。


  ### 解决方案


  在 Spring Security 中，认证由一个或多个 `AuthenticationProvider` 执行，它们以链式方式连接。如果这些提供者中的任何一个成功认证了用户，该用户将能够登录到应用程序。如果任何提供者报告用户已被禁用或锁定，或者凭据不正确，或者没有提供者能够认证该用户，那么该用户将无法登录此应用程序。


  Spring Security 支持多种用户认证方式，并包含针对这些方式的内置提供者实现。你可以使用内置的 XML 元素轻松配置这些提供者。最常见的认证提供者会根据存储用户详细信息的用户仓库（例如，在应用程序的内存、关系数据库或
  LDAP 仓库中）来认证用户。


  在用户仓库中存储用户详细信息时，应避免以明文形式存储用户密码，因为这会使它们容易受到黑客攻击。相反，你应该始终在仓库中存储加密后的密码。一种典型的密码加密方式是使用单向哈希函数对密码进行编码。当用户输入密码登录时，你对该密码应用相同的哈希函数，并将结果与仓库中存储的结果进行比较。Spring
  Security 支持多种用于编码密码的算法（包括 MD5 和 SHA），并为这些算法提供了内置的密码编码器。


  如果每次用户尝试登录时都从用户仓库中检索用户详细信息，你的应用程序可能会受到性能影响。这是因为用户仓库通常存储在远程，并且它必须执行某种查询来响应请求。因此，Spring
  Security 支持在本地内存和存储中缓存用户详细信息，以节省执行远程查询的开销。


  ### 工作原理


  #### 使用内存定义认证用户


  如果你的应用程序中只有少量用户，并且很少修改他们的详细信息，你可以考虑在 Spring Security 的配置文件中定义用户详细信息，这样它们将被加载到应用程序的内存中。


  ```

  @Configuration

  @EnableWebSecurity

  public class TodoSecurityConfig implements WebMvcConfigurer {

  @Bean

  public UserDetailsManager userDetailsService() {

  var user1 = User.withDefaultPasswordEncoder()

  .username("marten@deinum.biz").password("user").authorities("USER").build();

  var user2 = User.withDefaultPasswordEncoder()

  .username("jdoe@does.net").password("unknown").disabled(true).authorities("USER").build();

  var admin = User.withDefaultPasswordEncoder()

  .username("admin@ya2do.io").password("admin").authorities("USER", "ADMIN").build();

  return new InMemoryUserDetailsManager(user1, user2, admin);

  }

  }

  代码清单 5-23

  包含用户的 InMemoryUserDetailsManager

  ```


  你可以使用 `User` 类和不同的 `with*` 方法来定义用户详细信息。这里我们使用 `withDefaultPasswordEncoder`，因为我们希望能够提供明文密码，但仍然对它们进行编码。对于每个用户，你可以指定
  `username`、`password`、禁用状态以及一组授予的 `authorities`。被禁用的用户无法登录应用程序。




  #### 针对数据库进行用户身份验证


  更常见的情况是，用户详细信息应存储在数据库中以便于维护。Spring Security 内置了从数据库查询用户详细信息的功能。默认情况下，它会使用以下 SQL
  语句查询包含权限在内的用户详细信息。


  ```

  SELECT username, password, enabled

  FROM   users

  WHERE  username = ?

  SELECT username, authority

  FROM   authorities

  WHERE  username = ?

  清单 5-24

  Spring Security 默认的 SQL 查询语句

  ```


  为了让 Spring Security 使用这些 SQL 语句查询用户详细信息，你需要在数据库中创建相应的表。例如，你可以使用以下 SQL 语句在 `todo`
  模式中创建它们。


  ```

  -- Spring Security 用户/权限设置

  -- 另请参阅 Spring Security 中的 users.ddl

  CREATE TABLE USERS

  (

  USERNAME VARCHAR(50) NOT NULL,

  PASSWORD VARCHAR(60) NOT NULL,

  ENABLED  SMALLINT    NOT NULL DEFAULT 0,

  PRIMARY KEY (USERNAME)

  );

  CREATE TABLE AUTHORITIES

  (

  USERNAME  VARCHAR(50) NOT NULL,

