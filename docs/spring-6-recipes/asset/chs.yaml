- "# 9. 使用 NoSQL 进行 Spring 数据访问\n\n大多数应用程序使用关系型数据库，如 Oracle、MySQL 或 PostgreSQL；然而，数据存储不仅仅局限于\
  \ SQL 数据库。还有：\n\n1.  关系型数据库（Oracle、MySQL、PostgreSQL 等）\n2.  文档存储（MongoDB、Couchbase）\n\
  3.  键值存储（Redis、Voldemort）\n4.  列存储（Cassandra）\n5.  图存储（Neo4j、Apache Giraph）\n\n\
  尽管这些不同的技术（甚至不同的实现）各有其用途，但它们也可能难以使用或配置。此外，有时你可能会觉得编写了大量重复的样板代码来处理事务和错误转换。\n\nSpring\
  \ Data 项目可以帮助简化工作；它可以帮助配置不同技术的样板代码。每个集成模块都将支持异常转换到 Spring 一致的 `DataAccessException`\
  \ 层次结构，并支持使用 Spring 的模板方法。Spring Data 还为某些技术提供了跨存储解决方案，这意味着你的模型的一部分可以存储在关系型数据库中（使用\
  \ JPA），而另一部分可以存储在图存储或文档存储中。\n\n![](img/314861_5_En_9_Figa_HTML.gif)一个灯泡轮廓图标，代表信息提示。 \
  \ 尽管每个部分都描述了如何下载和安装所需的持久化存储，但 `bin` 目录中包含的脚本可以为每种持久化存储设置 Docker 容器。\n\n## 9-1\\\
  . 使用 MongoDB\n\n### 问题\n\n你想使用 MongoDB 来存储和检索文档。\n\n### 解决方案\n\n下载并配置 MongoDB。\n\
  \n### 工作原理\n\n#### 下载并启动 MongoDB\n\n首先，从 [`www.mongodb.org`](http://www.mongodb.org)\
  \ 下载 MongoDB。选择适用于当前系统的版本，并按照手册中的安装说明进行操作（[`https://docs.mongodb.org/manual/installation/`](https://docs.mongodb.org/manual/installation/)）。安装完成后，即可启动\
  \ MongoDB。要启动 MongoDB，请在命令行中执行 `mongodb` 命令（见图 9-1）。这将在端口 27017 上启动一个 MongoDB 服务器。如果需要使用不同的端口，可以在启动服务器时在命令行中指定\
  \ `--port` 选项。\n\n![](img/314861_5_En_9_Fig1_HTML.jpg)\n\n一张显示 mongo d b 命令执行后输出的截图。该行以“mongo\
  \ D B starting”开头，以“waiting for connections on port 27017”结尾。\n\n图 9-1\n\nMongoDB\
  \ 初始启动后的输出\n\n存储数据的默认位置是 `\\data\\db`（对于 Windows 用户，这是从安装 MongoDB 的磁盘根目录开始计算的！）。要更改路径，请在命令行中使用\
  \ `--dbpath` 选项。请确保该目录存在并且 MongoDB 对其具有写入权限。\n\n\n\n#### 连接到 MongoDB\n\n要连接到 MongoDB，需要一个\
  \ `Mongo` 实例。该实例可用于获取要使用的数据库以及实际的底层集合。让我们创建一个使用 MongoDB 的小型系统。首先，创建一个用于存储的对象。\n\n\
  ```\npackage com.apress.spring6recipes.nosql;\npublic record Vehicle(String vehicleNo,\
  \ String color, int wheel, int seat) { }\n清单 9-1\nVehicle 记录\n```\n\n为了操作这个对象，创建一个仓库接口。\n\
  \n```\npackage com.apress.spring6recipes.nosql;\nimport java.util.List;\npublic\
  \ interface VehicleRepository {\nlong count();\nvoid save(Vehicle vehicle);\nvoid\
  \ delete(Vehicle vehicle);\nList findAll();\nVehicle findByVehicleNo(String vehicleNo);\n\
  }\n清单 9-2\nVehicleRepository 接口\n```\n\n针对 MongoDB，创建 `VehicleRepository` 的实现 `MongoVehicleRepository`。\n\
  \n```\npackage com.apress.spring6recipes.nosql;\nimport com.mongodb.client.MongoClient;\n\
  import com.mongodb.client.MongoCollection;\nimport org.bson.Document;\nimport java.util.List;\n\
  import java.util.stream.Collectors;\nimport java.util.stream.StreamSupport;\nimport\
  \ static com.mongodb.client.model.Filters.eq;\npublic class MongoVehicleRepository\
  \ implements VehicleRepository {\nprivate final MongoClient mongo;\nprivate final\
  \ String collectionName;\nprivate final String databaseName;\npublic MongoVehicleRepository(MongoClient\
  \ mongo, String databaseName,\nString collectionName) {\nthis.mongo = mongo;\nthis.databaseName\
  \ = databaseName;\nthis.collectionName = collectionName;\n}\n@Override\npublic long\
  \ count() {\nreturn getCollection().countDocuments();\n}\n@Override\npublic void\
  \ save(Vehicle vehicle) {\nvar dbVehicle = transform(vehicle);\ngetCollection().insertOne(dbVehicle);\n\
  }\n@Override\npublic void delete(Vehicle vehicle) {\ngetCollection().deleteOne(eq(\"\
  vehicleNo\", vehicle.vehicleNo()));\n}\n@Override\npublic List findAll() {\nreturn\
  \ StreamSupport.stream(getCollection().find().spliterator(), false)\n.map(this::transform)\n\
  .collect(Collectors.toList());\n}\n@Override\npublic Vehicle findByVehicleNo(String\
  \ vehicleNo) {\nreturn transform(getCollection().find(eq(\"vehicleNo\", vehicleNo)).first());\n\
  }\nprivate MongoCollection getCollection() {\nreturn mongo.getDatabase(databaseName).getCollection(collectionName);\n\
  }\nprivate Vehicle transform(Document dbVehicle) {\nif (dbVehicle == null) {\nreturn\
  \ null;\n}\nreturn new Vehicle(\ndbVehicle.getString(\"vehicleNo\"),\ndbVehicle.getString(\"\
  color\"),\ndbVehicle.getInteger(\"wheel\"),\ndbVehicle.getInteger(\"seat\"));\n\
  }\nprivate Document transform(Vehicle vehicle) {\nreturn new Document(\"vehicleNo\"\
  , vehicle.vehicleNo())\n.append(\"color\", vehicle.color())\n.append(\"wheel\",\
  \ vehicle.wheel())\n.append(\"seat\", vehicle.seat());\n}\n}\n清单 9-3\nVehicleRepository\
  \ 的 MongoDB 实现\n```\n\n首先，注意构造函数；它接受三个参数。第一个是实际的 MongoDB 客户端，第二个是要使用的数据库名称，最后一个是存储对象的集合名称。MongoDB\
  \ 中的文档存储在集合中，而集合属于某个数据库。\n\n为了便于访问所使用的 `MongoCollection`，提供了 `getCollection` 方法，该方法获取与数据库的\
  \ `connection` 并返回配置好的 `MongoCollection`。然后可以使用这个 `MongoCollection` 来执行诸如存储、删除或更新文档等操作。\n\
  \n`save` 方法会首先尝试更新现有文档。如果失败，则会为给定的 `Vehicle` 创建一个新文档。为了存储对象，首先将领域对象 `Vehicle` 转换为\
  \ `Document`。`Document` 接受我们 `Vehicle` 对象不同属性的键/值对。当查询文档时，会使用相同的 `Document`。给定对象上存在的键/值对用于查找文档。可以在仓库的\
  \ `findByVehicleNo` 方法中找到一个示例。与车辆对象之间的转换通过两个 `transform` 方法完成。\n\n要使用这个类，创建以下 `Main`\
