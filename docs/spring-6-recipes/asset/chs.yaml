  ## 7-4\. 使用事务模板以编程方式管理事务


  ### 问题


  假设你有一个代码块（并非整个业务方法体），它有以下事务需求：


  *   在代码块开始时启动一个新事务。


  *   在代码块成功完成后提交事务。


  *   如果代码块中抛出异常，则回滚事务。


  如果你直接调用 Spring 的事务管理器 API，事务管理代码可以以与技术无关的方式进行通用化。然而，你可能不希望为每个类似的代码块重复编写样板代码。




  ### 解决方案


  Spring 为常规数据访问和响应式数据访问都提供了一种模板方法来管理事务。对于常规数据访问，你可以使用 `TransactionTemplate`；对于响应式数据访问，则有
  `TransactionalOperator`。这两个类都简化了编程式事务管理。它们以一种你无需显式启动、提交或回滚事务的方式简化了操作。传递给任一 `execute`
  方法的 `TransactionCallback` 中的代码就是事务单元。事务将在执行时启动，并在结束时提交（或回滚）。


  Spring 提供的模板对象是轻量级的，通常可以丢弃或重新创建而不会影响性能。例如，JDBC 模板可以通过 `DataSource` 引用即时重新创建，同样，`TransactionTemplate`
  也可以通过提供事务管理器引用来重新创建。当然，你也可以直接在 Spring 应用上下文中创建一个。


  ### 工作原理


  #### 使用 TransactionTemplate


  与 JDBC 模板类似，Spring 也提供了 `TransactionTemplate` 来帮助你控制整个事务管理流程和事务异常处理。你只需将代码块封装在实现
  `TransactionCallback` 接口的回调类中，并将其传递给 `TransactionTemplate` 的 execute 方法执行即可。这样，你就不需要为这个代码块重复编写样板式的事务管理代码了。


  `TransactionTemplate` 是基于事务管理器创建的，就像 JDBC 模板是基于数据源创建的一样。事务模板执行一个封装了事务代码块的事务回调对象。你可以将回调接口实现为单独的类或内部类。如果实现为内部类，则必须将方法参数声明为
  final 才能访问。


  ```

  package com.apress.spring6recipes.bookshop;

  import org.springframework.jdbc.core.support.JdbcDaoSupport;

  import org.springframework.transaction.PlatformTransactionManager;

  import org.springframework.transaction.TransactionStatus;

  import org.springframework.transaction.support.TransactionCallbackWithoutResult;

  import org.springframework.transaction.support.TransactionTemplate;

  import javax.sql.DataSource;

  public class TransactionalJdbcBookShop extends JdbcDaoSupport implements BookShop
  {

  private final PlatformTransactionManager transactionManager;

  public TransactionalJdbcBookShop(PlatformTransactionManager txManager, DataSource
  ds) {

  this.transactionManager = txManager;

  setDataSource(ds);

  }

  public void purchase(final String isbn, final String username) {

  var txTemplate = new TransactionTemplate(transactionManager);

  txTemplate.execute(new TransactionCallbackWithoutResult() {

  protected void doInTransactionWithoutResult(TransactionStatus ts) {

  var BOOK_SQL = "SELECT PRICE FROM BOOK WHERE ISBN = ?";

  int price = getJdbcTemplate().queryForObject(BOOK_SQL, Integer.class, isbn);

  var STOCK_SQL = "UPDATE BOOK_STOCK SET STOCK = STOCK - 1 WHERE ISBN = ?";

  getJdbcTemplate().update(STOCK_SQL, isbn);

  var BALANCE_SQL = "UPDATE ACCOUNT SET BALANCE = BALANCE - ? WHERE USERNAME = ?";

  getJdbcTemplate().update(BALANCE_SQL, price, username);

  }

  });

  }

  }

  清单 7-12

  使用 TransactionTemplate 的 Bookstore JDBC 实现 - 注入 PlatformTransactionManager

  ```


  `TransactionTemplate` 可以接受一个事务回调对象，该对象实现 `TransactionCallback` 接口，或者是该接口的一个框架提供的实现类
  `TransactionCallbackWithoutResult` 的实例。对于 `purchase()` 方法中用于扣除图书库存和账户余额的代码块，没有返回值，因此使用
  `TransactionCallbackWithoutResult` 即可。对于任何有返回值的代码块，则应使用 `TransactionCallback<T>`
  接口。回调对象的返回值最终将由模板的 `T execute()` 方法返回。其主要好处是，启动、回滚或提交事务的责任已被移除。


  在回调对象执行期间，如果它抛出了非受检异常（例如，`RuntimeException` 和 `DataAccessException` 属于此类），或者你在 `doInTransactionWithoutResult`
  方法中显式调用了 `TransactionStatus` 参数的 `setRollbackOnly()` 方法，则事务将被回滚。否则，事务将在回调对象完成后提交。


  在 Bean 配置文件中，bookshop Bean 仍然需要一个事务管理器来创建 `TransactionTemplate`。


  ```

