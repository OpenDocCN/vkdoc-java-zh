  ```


  当用户创建待办事项时，你同时为该消息创建一个新的 ACL，并使用其 ID 作为 ACL 的对象标识。当用户删除待办事项时，你也需要删除相应的 ACL。对于一个新待办事项，你需要在它的
  ACL 中插入以下 ACE：


  *   待办事项的所有者可以对该待办事项执行 READ、WRITE 和 DELETE 操作。

  *   拥有 ADMIN 权限的用户也可以对待办事项执行 READ、WRITE 和 DELETE 操作。


  `JdbcMutableAclService` 要求调用它的方法启用事务，以便其 SQL 语句能够在事务内运行。关于如何启用事务，请参阅第 7 章的食谱。


  #### 使用表达式进行访问控制决策


  有了每个领域对象的 ACL，你就可以在涉及该对象的方法上，使用该对象的 ACL 来做出访问控制决策。例如，当用户尝试删除一个待办事项时，你可以查询该消息的 ACL，以确定该用户是否被允许删除此待办事项。


  配置 ACL 可能是一项艰巨的任务。幸运的是，你可以使用注解和表达式来简化工作。我们可以使用 `@PreAuthorize` 和 `@PreFilter` 注解来检查某人是否被允许执行该方法或使用某些方法参数。`@PostAuthorize`
  和 `@PostFilter` 可用于检查用户是否有权访问结果，或根据 ACL 过滤结果。要启用这些注解的处理，你需要将 `@EnableMethodSecurity`
  注解的 `prePostEnabled` 属性设置为 `true`（这也是默认值）。


  此外，你需要配置基础设施组件以使其能够做出决策。你需要设置一个 `AclPermissionEvaluator`，它用于评估对象的权限。由于你想使用 ACL 通过表达式来保护方法，因此需要自定义的权限评估器。`AclPermissionEvaluator`
  需要一个 `AclService` 来获取它需要检查的对象的 ACL。当使用基于 Java 的配置时，这就足够了，因为 `PermissionEvaluator`
  会被自动检测并连接到 `DefaultMethodSecurityExpressionHandler`。


  现在，一切就绪，可以使用注解和表达式来控制我们的访问了。


  ```

