  \ Spring-WS。\n\n## 10-8\\. 使用 Spring-WS 暴露和调用 SOAP Web 服务\n\n### 问题\n\n你有一个 XSD\
  \ 文件，想要开发一个“契约优先”的 SOAP Web 服务，但不知道如何或使用什么来实现该“契约优先”的 SOAP 服务。\n\nSpring-WS 从设计之初就支持“契约优先”的\
  \ SOAP Web 服务。然而，这并不意味着 Spring-WS 是在 Java 中创建 SOAP Web 服务的唯一方式。像 CXF 这样的 JAX-WS\
  \ 实现也支持这种技术。尽管如此，在 Spring 应用程序的上下文中，Spring-WS 是实现“契约优先”SOAP Web 服务更成熟、更自然的方法。描述其他\
  \ Java 的“契约优先”SOAP 技术将超出 Spring 框架的范围。\n\n### 解决方案\n\nSpring-WS 提供了一套用于开发“契约优先”SOAP\
  \ Web 服务的工具。构建 Spring-WS Web 服务的基本任务包括：\n\n*   为 Spring-WS 设置并配置一个 Spring MVC 应用程序。\n\
  \n*   将 Web 服务请求映射到端点。\n\n*   创建服务端点来处理请求消息并返回响应消息。\n\n*   为 Web 服务发布 WSDL 文件。\n\
  \n### 工作原理\n\n#### 设置 Spring-WS 应用程序\n\n要使用 Spring-WS 实现 Web 服务，首先创建一个 Web 应用程序初始化器类，以引导一个包含\
  \ SOAP Web 服务的 Web 应用程序。你需要配置 `MessageDispatcherServlet`，它是 Spring-WS 的一部分。该 Servlet\
  \ 专门负责将 Web 服务消息分派到适当的端点，并检测 Spring-WS 的框架设施。\n\n```\npackage com.apress.spring6recipes.weather.config;\n\
  import org.springframework.ws.transport.http.support.AbstractAnnotationConfigMessageDispatcherServletInitializer;\n\
  public class Initializer extends AbstractAnnotationConfigMessageDispatcherServletInitializer\
  \ {\n@Override\nprotected Class[] getRootConfigClasses() {\nreturn null;\n}\n@Override\n\
  protected Class[] getServletConfigClasses() {\nreturn new Class[]{SpringWsConfiguration.class};\n\
  }\n}\n代码清单 10-67\nSpring-WS 的 WebApplicationInitializer\n```\n\n为了简化配置，你可以继承 `AbstractAnnotationConfigMessageDispatcherServletInitializer`\
  \ 基类。你需要为其提供构成 `rootConfig` 和 `servletConfig` 的配置类；前者可以为 `null`，而后者是必需的。\n\n上述配置将使用\
  \ `SpringWsConfiguration` 类引导一个 `MessageDispatcherServlet`，并默认将其注册到 `/services/`\
  \ **和** `.wsdl` URL。\n\n```\npackage com.apress.spring6recipes.weather.config;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.core.io.ClassPathResource;\n\
