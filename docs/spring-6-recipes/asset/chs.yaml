  包含回滚规则的示例配置

  ```


  ## 8-7\. 重试


  ### 问题


  你正在处理一个功能需求，该功能可能会失败，但并非事务性的。或者它可能是事务性的但不可靠。你想要操作一个在尝试读取或写入时可能失败的资源。它可能因为网络连接问题、端点宕机或任何其他原因而失败。然而，你知道它很可能很快就会恢复，并且应该重试。


  ### 解决方案


  使用 Spring Batch 的重试能力来系统地重试读取或写入操作。


  ### 工作原理


  正如你在上一个技巧中看到的，使用 Spring Batch 处理事务性资源很容易。当涉及到瞬时或不可靠的资源时，需要采用不同的策略。这类资源通常是分布式的，或者表现出最终会自行解决的问题。有些资源（如
  Web 服务）由于其分布式特性，本质上无法参与事务。有些产品可以在一个服务器上启动事务，并将事务上下文传播到分布式服务器并在那里完成它，尽管这非常罕见且效率低下。或者，如果你能使用分布式（“全局”或
  XA）事务，也有很好的支持。然而，有时你可能正在处理一个不属于上述任何一种的资源。一个常见的例子可能是对远程服务的调用，例如 RMI 服务或 REST 端点。某些调用会失败，但在事务场景中重试后有可能成功。例如，导致
  `org.springframework.dao.DeadlockLoserDataAccessException` 的数据库更新可能值得重试。


  #### 配置步骤


  最简单的例子是在步骤的配置中。在这里，你可以指定需要重试操作的异常类。与回滚异常一样，你可以用换行符或逗号分隔这个异常列表。


  使用基于 Java 的配置来启用重试时，首先，该步骤需要是一个容错步骤，然后才能用它来指定重试限制和可重试的异常。首先，使用 `faultTolerant()`
  获取一个容错步骤。接下来，可以使用 `retryLimit()` 方法指定重试尝试的次数。最后，可以使用 `retry` 方法指定触发重试的异常。要指定多个异常，你可以简单地链式调用
  `retry` 方法。


  ```

  @Bean

  public Step step1(ItemReader reader,

  ItemWriter writer,

  PlatformTransactionManager txManager) {

  var name = "User Registration CSV To DB Step";

  var builder = new StepBuilder(name, jobRepository);

  return builder

  .chunk(5, txManager)

  .faultTolerant()

  .retryLimit(3).retry(DeadlockLoserDataAccessException.class)

  .reader(reader)

  .writer(writer)

  .build();

  }

  清单 8-24

  用于重试的步骤配置

  ```




  #### 重试模板


  或者，你也可以在自己的代码中利用 [Spring Retry](https://github.com/spring-projects/spring-retry)
  对重试和恢复的支持。例如，你可以创建一个自定义的 `ItemWriter`，在其中实现重试功能，甚至可以为整个服务接口添加重试支持。


  Spring Batch 通过 `RetryTemplate` 支持这些场景（与其众多其他模板类类似），它将你的逻辑与重试的细节隔离开来，让你可以像只尝试一次那样编写代码。让
  Spring Batch 通过声明式配置来处理其他一切。


  `RetryTemplate` 支持多种用例，其便捷的 API 可以将原本繁琐的重试/失败/恢复循环封装成简洁的单方法调用。


  让我们看看来自配方 8-3 中关于如何编写自定义 ItemWriter 的简单 `ItemWriter` 的修改版本。该解决方案足够简单，理想情况下应该始终有效。然而，它未能处理服务的错误情况。在处理
  RPC 时，始终要假设事情几乎不可能顺利进行；服务本身可能会暴露语义或系统违规。例如，重复的数据库键、无效的信用卡号等。无论服务是分布式的还是在虚拟机内，情况都是如此。


  接下来，系统底层的 RPC 层也可能出错。以下是重写的代码，这次允许重试。


  ```

  package com.apress.spring6recipes.springbatch;

  import org.springframework.batch.item.Chunk;

  import org.springframework.batch.item.ItemWriter;

  import org.springframework.retry.RetryCallback;

  import org.springframework.retry.support.RetryTemplate;

  public class RetryableUserRegistrationServiceItemWriter

  implements ItemWriter {

  private final UserRegistrationService userRegistrationService;

  private final RetryTemplate retryTemplate;

  public RetryableUserRegistrationServiceItemWriter(UserRegistrationService usr,

  RetryTemplate retryTemplate) {

  this.userRegistrationService = usr;

  this.retryTemplate = retryTemplate;

  }

  public void write(Chunk items)

  throws Exception {

  for (var userRegistration : items) {

  retryTemplate.execute(context ->

  userRegistrationService.registerUser(userRegistration));

  }

  }

  }

  清单 8-25

  RetryableUserRegistrationServiceItemWriter 实现

  ```


  如你所见，代码改动不大，但结果更加健壮。`RetryTemplate` 本身是在 Spring 上下文中配置的，尽管在代码中创建它也很简单。我之所以在 Spring
  上下文中声明它，是因为创建对象时有一些配置空间，并且我尽量让 Spring 来处理配置。


  `RetryTemplate` 最有用的设置之一是使用的 `BackOffPolicy`。`BackOffPolicy` 决定了 `RetryTemplate`
  在重试之间应该等待多长时间。实际上，它还支持在每次失败尝试后增加重试间隔，以避免与其他尝试相同调用的客户端发生锁步。这在多个客户端可能同时尝试访问同一资源并可能引发竞态条件的情况下非常有用。还有其他
  `BackOffPolicy`，包括一种以固定时间延迟重试的策略，称为 `FixedBackOffPolicy`。


  ```

  @Bean

  public RetryTemplate retryTemplate(BackOffPolicy backOffPolicy) {

  var retryTemplate = new RetryTemplate();

  retryTemplate.setBackOffPolicy(backOffPolicy);

  return retryTemplate;

  }

  @Bean

  public ExponentialBackOffPolicy backOffPolicy() {

  var backOffPolicy = new ExponentialBackOffPolicy();

  backOffPolicy.setInitialInterval(1000);

  backOffPolicy.setMaxInterval(10000);

  backOffPolicy.setMultiplier(2);

  return backOffPolicy;

  }

  清单 8-26

  RetryTemplate 配置

  ```


  你已经配置了 `RetryTemplate` 的 `BackOffPolicy`，使得 `BackOffPolicy` 在首次重试前等待 1 秒（1000 毫秒）。后续尝试将加倍该值（增长受乘数影响）。它会一直持续到达到
  `maxInterval`，之后所有后续重试间隔将趋于稳定，以一致的间隔进行重试。


  #### 基于 AOP 的重试


  另一种方法是使用 Spring Batch 提供的 AOP 通知器，它将包装那些成功无法保证的方法调用，就像你使用 `RetryTemplate` 所做的那样。在前面的示例中，你重写了
  `ItemWriter<T>` 以使用该模板。另一种方法可能只是用这个重试逻辑来通知整个 `userRegistrationService` 代理。在这种情况下，代码可以恢复到原始示例中的方式，无需
  `RetryTemplate`！


  为此，你需要使用 `@Retryable` 注解来标记要重试的方法。要实现与显式使用 `RetryTemplate` 相同的效果，你需要添加以下内容。


  ```

  @Retryable(backoff = @Backoff(delay = 1000, maxDelay = 10000, multiplier = 2))

  public UserRegistration registerUser(UserRegistration registration) { ... }

