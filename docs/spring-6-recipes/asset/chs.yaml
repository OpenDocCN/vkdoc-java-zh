  \ 实现\n```\n\n这里最大的优势在于可以直接使用对象，而模板负责处理对象与存储格式之间的转换工作。请注意 `set` 方法如何接受 `String` 和\
  \ `Vehicle` 作为参数，而不仅仅是 `String` 或 `byte[]`。这使得代码更易读且更易于维护。默认情况下使用 JDK 序列化。若要使用 Jackson，则需要配置不同的\
  \ `RedisSerializer`。\n\n```\npackage com.apress.spring6recipes.nosql.config;\n@Configuration\n\
