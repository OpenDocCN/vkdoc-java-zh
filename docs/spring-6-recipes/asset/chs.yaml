  )\npublic Object[][] createIllegalInterestParameters() {\nreturn new Object[][]\
  \ {\nnew Object[] { -10000, 2 },\nnew Object[] { 10000, -2 },\nnew Object[] { -10000,\
  \ -2 } };\n}\n@Test(dataProvider = \"legal\")\npublic void calculate(double amount,\
  \ double year, double result) {\ndouble interest = interestCalculator.calculate(amount,\
  \ year);\nassertEquals(interest, result);\n}\n@Test(dataProvider = \"illegal\",\
  \ expectedExceptions = IllegalArgumentException.class)\npublic void illegalCalculate(double\
