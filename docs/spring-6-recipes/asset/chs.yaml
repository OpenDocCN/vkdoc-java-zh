  #### 保护 URL 访问


  默认配置是 `org.springframework.security.config.annotation.web.configuration.HttpSecurityConfiguration`
  类的一部分。该配置提供了一个类型为 `HttpSecurity` 的 bean，并带有默认配置。`org.springframework.security.config.annotation.web.configuration.WebSecurityConfiguration`
  负责处理 Web 部分（设置用于应用安全性的过滤器链），并对该默认配置做出贡献。如果你查看后一个类，它会创建一个名为 `springSecurityFilterChain`
  的 bean。在这里，你会看到它包含了 `anyRequest().authenticated()` 调用。这告诉 Spring Security，对于每一个传入的请求，你都必须通过系统进行身份验证。你还会看到，默认情况下启用了
  HTTP 基本认证和基于表单的登录。基于表单的登录还包含一个默认的登录页面创建器，如果你没有显式指定登录页面，就会使用它。


  ```

  @Bean(name = AbstractSecurityWebApplicationInitializer.DEFAULT_FILTER_NAME)

  public Filter springSecurityFilterChain() throws Exception {

  boolean hasFilterChain = !this.securityFilterChains.isEmpty();

  if (!hasFilterChain) {

  this.webSecurity.addSecurityFilterChainBuilder(() -> {

  this.httpSecurity.authorizeHttpRequests((authorize) -> authorize.anyRequest().authenticated());

  this.httpSecurity.formLogin(Customizer.withDefaults());

  this.httpSecurity.httpBasic(Customizer.withDefaults());

  return this.httpSecurity.build();

  });

  }

  for (SecurityFilterChain securityFilterChain : this.securityFilterChains) {

  this.webSecurity.addSecurityFilterChainBuilder(() -> securityFilterChain);

  }

  for (WebSecurityCustomizer customizer : this.webSecurityCustomizers) {

  customizer.customize(this.webSecurity);

  }

  return this.webSecurity.build();

  }

  清单 5-3

  来自 WebSecurityConfiguration 类的配置方法

  ```


  让我们自己编写一些安全规则。除了仅仅需要登录之外，你还可以为 URL 编写一些强大的访问规则。为此，你需要创建一个方法，该方法接受 `HttpSecurityConfiguration`
  提供的 `HttpSecurity` bean，并返回一个 `SecurityFilterChain`。当你自己提供 `SecurityFilterChain`
  时，`WebSecurityConfiguration` 中的默认配置将不再适用，并且你还需要指定身份验证机制。


  ```

  package com.apress.spring6recipes.board.security;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.http.HttpMethod;

  import org.springframework.security.config.Customizer;

  import org.springframework.security.config.annotation.web.builders.HttpSecurity;

  import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;

  import org.springframework.security.core.userdetails.User;

  import org.springframework.security.provisioning.InMemoryUserDetailsManager;

  import org.springframework.security.provisioning.UserDetailsManager;

  import org.springframework.security.web.SecurityFilterChain;

  @Configuration

  @EnableWebSecurity

  public class TodoSecurityConfig {

  @Bean

  public UserDetailsManager userDetailsService() {

  var user = User.withDefaultPasswordEncoder()

  .username("user").password("user").authorities("USER").build();

  var admin = User.withDefaultPasswordEncoder()

  .username("admin").password("admin").authorities("USER", "ADMIN").build();

  return new InMemoryUserDetailsManager(user, admin);

  }

  @Bean

  public SecurityFilterChain securityFilterChain(HttpSecurity http) throws Exception
  {

  http.csrf().disable();

  http.formLogin(Customizer.withDefaults());

  http.authorizeHttpRequests( auth ->

  auth

  .requestMatchers(HttpMethod.DELETE, "/todos/*").hasAuthority("ADMIN")

  .requestMatchers("/todos", "/todos/*").hasAuthority("USER"));

  return http.build();

  }

  }

  清单 5-4

  Todo 安全配置

  ```


  使用 `authorizeHttpRequests()` 你开始保护你的 URL。然后你可以使用其中一个匹配器——这里你使用了 `requestMatchers`——来定义匹配规则以及用户需要拥有的权限。你已经将对
  `/todos` 的所有访问权限限制为拥有 `USER` 权限的用户。要能够使用 DELETE 请求调用 `/todos`，你需要是具有 `ADMIN` 角色的用户。


  大多数身份验证机制会使用 `UserDetailsService` 来查找用户。这是一个带有单个方法 `loadByUsername` 的接口，用于加载用户详细信息。在本示例中，我们将使用一个
  `InMemoryUserDetailsManager`，它会在内部将用户存储在一个 `java.util.Map` 中。我们使用 `User.UserBuilder`
  来创建一些用于测试目的的用户。通常，你不希望在生产应用程序中使用这种方法，而是使用数据库、LDAP 甚至令牌之类的东西来存储用户信息。


  ![](img/314861_5_En_5_Figc_HTML.gif)一个带有字母 i 的图标，位于带阴影的圆圈内，表示信息符号。 这里调用了禁用 CSRF
  保护，目前这样做是为了避免禁用表单的正常工作。关于如何启用它，请参阅本示例的后续部分。


  你可以将身份验证服务配置为常规 bean。Spring Security 支持多种用户身份验证方式，包括针对数据库或 LDAP 存储库进行身份验证。它还支持为简单的安全需求直接定义用户详细信息。你可以为每个用户指定一个
  `username`、一个 `password` 以及一组 `authorities`。


  现在，你可以重新部署此应用程序来测试其安全配置。你必须使用正确的用户名和密码登录此应用程序才能查看待办事项。最后，要删除一个待办事项，你必须以管理员身份登录。




  #### 使用 CSRF 保护


  通常建议保持 CSRF 的默认启用状态，因为这能降低跨站请求伪造攻击的风险。Spring Security 默认启用该功能，配置中的 `csrf().disable()`
  代码行可以移除。当 CSRF 保护启用时，Spring Security 会将 `CsrfFilter` 添加到其用于保护的过滤器列表中。该过滤器转而使用 `CsrfTokenRepository`
  的实现来生成和存储令牌。默认情况下，使用的是 `HttpSessionCsrfTokenRepository`，顾名思义，它将生成的令牌存储在 `HttpSession`
  中。此外还有一个 `CookieCsrfTokenRepository`，它将令牌信息存储在 cookie 中。如果你想切换 `CsrfTokenRepository`，可以使用
  `csrfTokenRepository()` 配置方法进行更改。你也可以使用此方法来配置显式定义的 `HttpSessionCsrfTokenRepository`、`CookieCsrfTokenRepository`，或者你自己实现的
  `CsrfTokenRepository` 接口。目前我们将使用 `CookieCsrfTokenRepository`。


  ```

  @Bean

  public SecurityFilterChain securityFilterChain(HttpSecurity http)

  throws Exception {

  http.csrf().csrfTokenRepository(csrfTokenRepository());

  }

  private CookieCsrfTokenRepository csrfTokenRepository() {

  return new CookieCsrfTokenRepository();

  }

