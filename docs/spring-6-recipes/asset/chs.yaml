  ## 8-3\. 读取与写入


  ### 问题


  你希望将文件中的数据插入到数据库中。这个解决方案将是最简单的方案之一，并让你有机会探索典型解决方案中的各个移动组件。


  ### 解决方案


  你将构建一个解决方案，该方案在作为该技术可行应用的同时，仅需完成最少量的工作。该方案将读取一个任意长度的文件，并将数据写入数据库。最终结果几乎可以做到零代码。你将依赖一个现有的模型类，并编写一个类（包含
  `public static void main(String [] args())` 方法的类）来完成这个示例。模型类完全可以是一个 Hibernate 类或来自你
  DAO 层的某个类，尽管在本例中它只是一个简单的 POJO。此解决方案将使用我们在配方 8-1 中配置的组件。


  ### 工作原理


  本示例演示了 Spring Batch 最简单的用途：提供可扩展性。该程序仅从 CSV 文件中读取数据，字段以逗号分隔，行以换行符分隔。然后它将记录插入到一张表中。你利用了
  Spring Batch 提供的智能基础设施，从而无需担心扩展问题。这个应用程序手动实现也很容易。你不会利用任何可用的智能事务功能，暂时也不会考虑重试机制。


  这个解决方案是 Spring Batch 解决方案中最简单的一种。Spring Batch 使用 XML 模式对解决方案进行建模。其抽象概念和术语遵循经典批处理解决方案的精神，因此可以从前代技术移植，也可能适用于后续技术。Spring
  Batch 提供了有用的默认类，你可以覆盖或有选择地调整它们。在下面的示例中，你将使用 Spring Batch 提供的许多实用工具实现。从根本上说，大多数解决方案看起来都差不多，并且都使用了同一组接口的组合。通常只需要挑选合适的接口即可。


  当我运行这个程序时，它既能处理包含 20,000 行的文件，也能处理包含 100 万行的文件。我没有发现内存增长，这表明没有内存泄漏。当然，处理时间要长得多！（插入
  100 万行的应用程序运行了几个小时。）


