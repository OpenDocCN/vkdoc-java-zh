  \ 工作原理\n\n要使用上下文会话方法，你的 DAO 方法需要能够访问会话工厂，这可以通过 setter 方法或构造函数参数进行注入。然后，在每个 DAO 方法中，你从会话工厂获取上下文会话，并使用它进行对象持久化。\n\
  \n```\npackage com.apress.spring6recipes.course.hibernate;\nimport java.util.List;\n\
