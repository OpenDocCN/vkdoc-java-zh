  import org.springframework.core.io.ClassPathResource;\nimport org.springframework.mail.SimpleMailMessage;\n\
  import org.springframework.mail.javamail.JavaMailSender;\nimport org.springframework.mail.javamail.MimeMessageHelper;\n\
  import org.springframework.mail.javamail.MimeMessagePreparator;\npublic class EmailErrorNotifier\
  \ implements ErrorNotifier {\nprivate final JavaMailSender mailSender;\nprivate\
  \ final SimpleMailMessage template;\npublic EmailErrorNotifier(JavaMailSender mailSender,\n\
  SimpleMailMessage template) {\nthis.mailSender = mailSender;\nthis.template = template;\n\
  }\n@Override\npublic void notifyCopyError(\nfinal String srcDir, final String destDir,\
  \ final String filename) {\nMimeMessagePreparator preparator = (mimeMessage) ->\
  \ {\nvar helper = new MimeMessageHelper(mimeMessage, true);\nhelper.setFrom(template.getFrom());\n\
  helper.setTo(template.getTo());\nhelper.setSubject(template.getSubject());\nhelper.setText(String.format(\n\
  template.getText(), srcDir, destDir, filename));\nhelper.addAttachment(\"beans.xml\"\
  , new ClassPathResource(\"beans.xml\"));\n};\nmailSender.send(preparator);\n}\n\
  }\n清单 10-44\n使用 MimeMessagePreparator 的 EmailErrorNotifier\n```\n\n在 `prepare()`\
  \ 方法中，你可以准备 `MimeMessage` 对象，该对象是为 `Jakarta MailSender` 预先创建的。如果抛出任何异常，它将被自动转换为\
  \ Spring 的邮件运行时异常。\n\n![](img/314861_5_En_10_Fige_HTML.gif)一个灯泡的轮廓示意图。  由于它是一个函数式接口，你可以将其编写为\
  \ lambda 表达式。\n\n## 10-5\\. 使用 Spring 的 Quartz 支持调度任务\n\n### 问题\n\n你的应用程序有一个高级调度需求，希望使用\
  \ Quartz 调度器来实现。这种需求可能看似复杂，例如能够在任意时间或奇怪的间隔运行（“每隔一个周四，但仅在上午 10 点到下午 2 点之间”）。此外，你希望以声明式的方式配置调度作业。\n\
  \n### 解决方案\n\nSpring 为 Quartz 提供了实用类，使你无需针对 Quartz API 进行编程即可调度作业。\n\n### 工作原理\n\
  \n\n\n#### 使用不带 Spring 支持的 Quartz\n\n要使用 Quartz 进行任务调度，首先需要实现 `Job` 接口来创建一个任务。例如，以下任务执行了之前食谱中设计的文件复制器的\
  \ `replicate()` 方法。它通过 `JobExecutionContext` 对象获取一个任务数据映射——这是 Quartz 中用于定义任务的概念。\n\
  \n```\npackage com.apress.spring6recipes.replicator;\nimport org.quartz.Job;\nimport\
  \ org.quartz.JobExecutionContext;\nimport org.quartz.JobExecutionException;\nimport\
  \ java.io.IOException;\npublic class FileReplicationJob implements Job {\n@Override\n\
  public void execute(JobExecutionContext context)\nthrows JobExecutionException {\n\
  var dataMap = context.getJobDetail().getJobDataMap();\nvar fileReplicator = (FileReplicator)\
  \ dataMap.get(\"fileReplicator\");\ntry {\nfileReplicator.replicate();\n} catch\
  \ (IOException e) {\nthrow new JobExecutionException(e);\n}\n}\n}\n清单 10-45\n用于文件复制的\
  \ Quartz 任务\n```\n\n创建任务后，你需要使用 Quartz API 对其进行配置和调度。例如，以下调度器每 60 秒运行一次文件复制任务，首次执行延迟\
  \ 5 秒。\n\n```\npackage com.apress.spring6recipes.replicator;\nimport com.apress.spring6recipes.replicator.config.FileReplicatorConfig;\n\
  import org.quartz.JobBuilder;\nimport org.quartz.JobDataMap;\nimport org.quartz.SimpleScheduleBuilder;\n\
  import org.quartz.TriggerBuilder;\nimport org.quartz.impl.StdSchedulerFactory;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import java.util.Date;\npublic class Main {\npublic static void main(String[] args)\
  \ throws Exception {\nvar cfg = FileReplicatorConfig.class;\ntry (var ctx = new\
  \ AnnotationConfigApplicationContext(cfg)) {\nvar documentReplicator = ctx.getBean(FileReplicator.class);\n\
  var jobDataMap = new JobDataMap();\njobDataMap.put(\"fileReplicator\", documentReplicator);\n\
  var job = JobBuilder.newJob(FileReplicationJob.class)\n.withIdentity(\"documentReplicationJob\"\
  )\n.storeDurably()\n.usingJobData(jobDataMap)\n.build();\nvar trigger = TriggerBuilder.newTrigger()\n\
  .withIdentity(\"documentReplicationTrigger\")\n.startAt(new Date(System.currentTimeMillis()\
  \ + 5000))\n.forJob(job)\n.withSchedule(SimpleScheduleBuilder.simpleSchedule()\n\
  .withIntervalInSeconds(60)\n.repeatForever())\n.build();\nvar scheduler = new StdSchedulerFactory().getScheduler();\n\
