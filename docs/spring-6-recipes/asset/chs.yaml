  $3\", vehicle.getSeat())\n.bind(\"$4\", vehicle.getVehicleNo());\n}\nprivate Vehicle\
  \ toVehicle(Row row) {\nreturn new Vehicle(row.get(\"VEHICLE_NO\", String.class),\n\
  row.get(\"COLOR\", String.class),\nrow.get(\"WHEEL\", Integer.class),\nrow.get(\"\
  SEAT\", Integer.class));\n}\n}\n清单 6-78\n基于 DatabaseClient 的 VehicleDao 实现\n```\n\
  \n`DatabaseClient` 使得使用 R2DBC 更加容易。我们现在不再需要管理连接；所有这些都由它替我们完成。执行查询（即使是修改查询）都是通过调用\
  \ `fetch` 方法完成的。执行 select 查询时，我们可以映射结果，并根据需要，通过调用 `all` 返回一个 `Flux`，或通过调用 `one`\
