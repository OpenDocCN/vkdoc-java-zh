  \ `MongoTemplate` 可以大大简化该仓库。\n\n![](img/314861_5_En_9_Figb_HTML.gif)一个信息符号，由带阴影圆圈内的字母\
  \ i 图标表示。  在使用 [Spring Data MongoDB](https://spring.io/projects/spring-data-mongodb)\
  \ 之前，需要将相关的 jar 包添加到类路径中。使用 Maven 时，添加以下依赖：\n\n```\norg.springframework.data\nspring-data-mongodb\n\
  4.0.0\n\n```\n\n或者在使用 Gradle 时添加以下内容：\n\n`compile 'org.springframework.data:spring-data-mongodb:4.0.0'`\n\
  \n```\npackage com.apress.spring6recipes.nosql;\nimport jakarta.annotation.PreDestroy;\n\
  import org.springframework.data.mongodb.core.MongoTemplate;\nimport org.springframework.data.mongodb.core.query.Query;\n\
  import java.util.List;\nimport static org.springframework.data.mongodb.core.query.Criteria.where;\n\
  public class MongoVehicleRepository implements VehicleRepository {\nprivate final\
  \ MongoTemplate mongo;\nprivate final String collectionName;\npublic MongoVehicleRepository(MongoTemplate\
  \ mongo, String collectionName) {\nthis.mongo = mongo;\nthis.collectionName = collectionName;\n\
  }\n@Override\npublic long count() {\nreturn mongo.count(new Query(), collectionName);\n\
  }\n@Override\npublic void save(Vehicle vehicle) {\nmongo.save(vehicle, collectionName);\n\
  }\n@Override\npublic void delete(Vehicle vehicle) {\nmongo.remove(vehicle, collectionName);\n\
  }\n@Override\npublic List findAll() {\nreturn mongo.findAll(Vehicle.class, collectionName);\n\
  }\n@Override\npublic Vehicle findByVehicleNo(String vehicleNo) {\nvar query = new\
  \ Query(where(\"vehicleNo\").is(vehicleNo));\nreturn mongo.findOne(query, Vehicle.class,\
  \ collectionName);\n}\n@PreDestroy\npublic void cleanUp() {\nmongo.execute(db ->\
  \ {\ndb.drop();\nreturn null;\n});\n}\n}\n清单 9-8\n使用 MongoTemplate 的 MongoVehicleRepository\n\
  ```\n\n使用 `MongoTemplate` 后，代码看起来简洁得多。它几乎为所有操作提供了便捷方法：`save`、`update` 和 `delete`。此外，它还拥有一个非常出色的查询构建器方法（参见\
  \ `findByVehicleNo` 方法）。不再需要与 Mongo 类进行映射，因此也无需再创建 `Document`。这个负担现在由 `MongoTemplate`\
  \ 处理。为了将 `Vehicle` 对象转换为 MongoDB 类，会使用 `MongoConverter`。默认情况下，使用的是 `MappingMongoConverter`。该映射器将属性映射到属性名称，反之亦然，同时还会尝试进行正确的数据类型转换。如果需要特定的映射，可以编写自己的\
  \ `MongoConverter` 实现，并将其注册到 `MongoTemplate` 中。\n\n由于使用了 `MongoTemplate`，配置也需要进行修改。\n\
  \n```\npackage com.apress.spring6recipes.nosql.config;\nimport com.apress.spring6recipes.nosql.MongoVehicleRepository;\n\
  import com.mongodb.client.MongoClient;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.data.mongodb.core.MongoClientFactoryBean;\n\
  import org.springframework.data.mongodb.core.MongoTemplate;\n@Configuration\npublic\
  \ class MongoConfiguration {\nprivate static final String DB_NAME = \"vehicledb\"\
  ;\nprivate static final String COLLECTION_NAME = \"vehicles\";\n@Bean\npublic MongoTemplate\
  \ mongo(MongoClient mongo) throws Exception {\nreturn new MongoTemplate(mongo, DB_NAME);\n\
  }\n@Bean\npublic MongoClientFactoryBean mongoFactoryBean() {\nreturn new MongoClientFactoryBean();\n\
  }\n@Bean\npublic MongoVehicleRepository vehicleRepository(MongoTemplate mongo) {\n\
  return new MongoVehicleRepository(mongo, COLLECTION_NAME);\n}\n}\n清单 9-9\n为 MongoTemplate\
  \ 修改后的 MongoConfiguration 类\n```\n\n注意 `MongoClientFactoryBean` 的使用。它使得 `MongoClient`\
  \ 的设置变得简单。虽然这不是使用 `MongoTemplate` 的强制要求，但它让客户端的配置更加容易。\n\n`MongoTemplate` 有多个构造函数。这里使用的构造函数接受一个\
  \ `MongoClient` 实例和要使用的数据库名称。为了解析数据库，会使用 `MongoDatabaseFactory` 的实例，默认是 `SimpleMongoClientDatabaseFactory`。在大多数情况下这已经足够，但如果出现特殊情况，例如加密连接，扩展默认实现也相当容易。最后，`MongoTemplate`\
  \ 连同集合名称一起被注入到 `MongoVehicleRepository` 中。\n\n还需要对 `Vehicle` 对象进行最后的补充。需要有一个字段来存储生成的\
  \ ID。这可以是一个名为 `id` 的字段，也可以是一个带有 Spring Data `@Id` 注解的字段。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  public record Vehicle(String id, String vehicleNo, String color, int wheel, int\
  \ seat) { }\n清单 9-10\n包含 id 字段的 Vehicle 记录\n```\n\n\n\n#### 使用注解指定映射信息\n\n目前，`MongoVehicleRepository`\
  \ 需要知道我们要访问的集合名称。如果能在要存储的对象（此处为 `Vehicle`）上指定该信息，将会更简单、更灵活。借助 Spring Data Mongo，可以使用\
  \ `@Document` 注解实现这一点，就像 JPA 的 `@Table` 注解一样。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  import org.springframework.data.mongodb.core.mapping.Document;\n@Document(collection\
  \ = \"vehicles\")\npublic record Vehicle(String id, String vehicleNo, String color,\
  \ int wheel, int seat) { }\n代码清单 9-11\n带有 @Document 注解的 Vehicle 记录\n```\n\n`@Document`\
  \ 注解可以接受三个属性：`collection`、`language` 和 `collation`。`collection` 属性用于指定要使用的集合名称；`language`\
  \ 属性用于指定此对象的语言。`collation` 属性可用于指定字符串比较的语言特定规则，例如字母大小写和重音符号的规则。现在映射信息已位于 `Vehicle`\
  \ 类上，可以从 `MongoVehicleRepository` 中移除集合名称。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  import jakarta.annotation.PreDestroy;\nimport org.springframework.data.mongodb.core.MongoTemplate;\n\
  import org.springframework.data.mongodb.core.query.Query;\nimport java.util.List;\n\
  import static org.springframework.data.mongodb.core.query.Criteria.where;\npublic\
  \ class MongoVehicleRepository implements VehicleRepository {\nprivate final MongoTemplate\
  \ mongo;\npublic MongoVehicleRepository(MongoTemplate mongo) {\nthis.mongo = mongo;\n\
  }\n@Override\npublic long count() {\nreturn mongo.count(new Query(), Vehicle.class);\n\
  }\n@Override\npublic void save(Vehicle vehicle) {\nmongo.save(vehicle);\n}\n@Override\n\
  public void delete(Vehicle vehicle) {\nmongo.remove(vehicle);\n}\n@Override\npublic\
  \ List findAll() {\nreturn mongo.findAll(Vehicle.class);\n}\n@Override\npublic Vehicle\
  \ findByVehicleNo(String vehicleNo) {\nvar query = new Query(where(\"vehicleNo\"\
  ).is(vehicleNo));\nreturn mongo.findOne(query, Vehicle.class);\n}\n@PreDestroy\n\
  public void cleanUp() {\nmongo.execute(db -> {\ndb.drop();\nreturn null;\n});\n\
  }\n}\n代码清单 9-12\n修改后的 MongoVehicleRepository（不含集合名称）\n```\n\n当然，集合名称也可以从 `MongoVehicleRepository`\
  \ 的配置中移除。配置的其余部分（`MongoTemplate` 等）可以保持不变。\n\n```\npackage com.apress.spring6recipes.nosql.config;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  @Configuration\npublic class MongoConfiguration {\n@Bean\npublic MongoVehicleRepository\
  \ vehicleRepository(MongoTemplate mongo) {\nreturn new MongoVehicleRepository(mongo);\n\
  }\n}\n代码清单 9-13\n修改后的 MongoVehicleRepository 配置\n```\n\n运行 `Main` 类时，结果应与之前相同。\n\
  \n#### 创建 Spring Data MongoDB 仓库\n\n尽管代码已经大幅减少，不再需要与 MongoDB 类进行映射，也不再需要传递集合名称，但它还可以进一步精简。利用\
  \ Spring Data Mongo 的另一个特性，可以完全移除 `MongoVehicleRepository` 的完整实现。\n\n首先，需要修改配置。\n\
  \n```\npackage com.apress.spring6recipes.nosql.config;\nimport com.mongodb.client.MongoClient;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.data.mongodb.core.MongoClientFactoryBean;\nimport org.springframework.data.mongodb.core.MongoTemplate;\n\
  import org.springframework.data.mongodb.repository.config.EnableMongoRepositories;\n\
  @Configuration\n@EnableMongoRepositories(basePackages = \"com.apress.spring6recipes.nosql\"\
  )\npublic class MongoConfiguration {\npublic static final String DB_NAME = \"vehicledb\"\
  ;\n@Bean\npublic MongoTemplate mongoTemplate(MongoClient mongo) {\nreturn new MongoTemplate(mongo,\
  \ DB_NAME);\n}\n@Bean\npublic MongoClientFactoryBean mongoFactoryBean() {\nreturn\
  \ new MongoClientFactoryBean();\n}\n}\n代码清单 9-14\nMongoDB 配置\n```\n\n首先，注意移除了构造\
  \ `MongoVehicleRepository` 的 `@Bean` 方法。其次，注意添加了 `@EnableMongoRepositories` 注解。这启用了对扩展\
  \ Spring Data `Repository` 接口（或其子接口之一）且用于带有 `@Document` 注解的领域对象的接口的检测。\n\n为了让 Spring\
  \ Data 检测到我们的 `VehicleRepository`，我们需要让它扩展 `CrudRepository` 或其子接口之一，例如 `MongoRepository`。\n\
  \n```\npackage com.apress.spring6recipes.nosql;\nimport org.springframework.data.mongodb.repository.MongoRepository;\n\
  public interface VehicleRepository extends MongoRepository {\nVehicle findByVehicleNo(String\
  \ vehicleNo);\n}\n代码清单 9-15\n基于 Spring Data 的 VehicleRepository 接口\n```\n\n你可能想知道所有方法都去哪了。它们已经在父接口中定义好了，因此可以从这个接口中移除。`findByVehicleNo`\
  \ 方法仍然保留。此方法仍将用于通过 `vehicleNo` 属性查找 `Vehicle`。所有 `findBy` 方法都会被转换为 MongoDB 查询。`findBy`\
  \ 之后的部分被解释为属性名称。还可以使用不同的运算符（如 `and`、`or` 和 `between`）编写更复杂的查询。\n\n现在再次运行 `Main`\
  \ 类，结果应该仍然相同；然而，实际编写的用于与 MongoDB 交互的代码已经最小化了。\n\n\n\n#### 创建响应式 Spring Data MongoDB\
  \ 仓库\n\n除了创建传统的 MongoDB 仓库，也可以创建响应式仓库。这可以通过继承 `ReactiveMongoRepository`（或其他响应式仓库接口）来实现。这将把返回单个值以及零个或多个元素的方法的返回类型分别改为\
  \ `Mono` 和 `Flux`。\n\n![](img/314861_5_En_9_Figc_HTML.gif)一个信息符号，由带阴影圆圈内的字母 i 图标表示。 \
  \ 如果你想使用 RxJava 而不是 Project Reactor，请继承 `RxJava3*Repository` 接口之一，并使用 `Single` 或\
  \ `Observable` 代替 `Mono` 或 `Flux`。\n\n要能够使用响应式仓库实现，首先必须使用 MongoDB 驱动程序的响应式实现，并配置\
  \ Spring Data 使用该驱动程序。为简化操作，你可以继承 `AbstractReactiveMongoConfiguration` 并实现两个必需的方法：`getDatabaseName`\
  \ 和 `reactiveMongoClient`。\n\n```\npackage com.apress.spring6recipes.nosql.config;\n\
  import com.mongodb.reactivestreams.client.MongoClient;\nimport com.mongodb.reactivestreams.client.MongoClients;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.data.mongodb.config.AbstractReactiveMongoConfiguration;\n\
  import org.springframework.data.mongodb.repository.config.EnableReactiveMongoRepositories;\n\
  @Configuration\n@EnableReactiveMongoRepositories(basePackages = \"com.apress.spring6recipes.nosql\"\
  )\npublic class MongoConfiguration extends AbstractReactiveMongoConfiguration {\n\
  private static final String DB_NAME = \"vehicledb\";\n@Bean\n@Override\npublic MongoClient\
  \ reactiveMongoClient() {\nreturn MongoClients.create();\n}\n@Override\nprotected\
  \ String getDatabaseName() {\nreturn DB_NAME;\n}\n}\n代码清单 9-16\n响应式 MongoDB 配置\n\
  ```\n\n另一个变化是使用了 `@EnableReactiveMongoRepositories` 而不是 `@EnableMongoRepositories`。仍然需要数据库名称，并且需要使用响应式驱动程序连接到\
  \ MongoDB 实例。为此，你可以使用 `MongoClients.create` 方法之一；这里可以直接使用默认方法。\n\n接下来，修改 `VehicleRepository`\
  \ 以继承 `ReactiveMongoRepository`，使其变为响应式。你还需要将 `findByVehicleNo` 方法的返回类型改为 `Mono<Vehicle>`，而不是普通的\
  \ `Vehicle`。\n\n```\npackage com.apress.spring6recipes.nosql;\nimport org.springframework.data.mongodb.repository.ReactiveMongoRepository;\n\
  import reactor.core.publisher.Mono;\npublic interface VehicleRepository extends\
  \ ReactiveMongoRepository {\nMono findByVehicleNo(String vehicleNo);\n}\n代码清单 9-17\n\
  基于响应式 Spring Data 的 VehicleRepository 接口\n```\n\n最后一个需要修改的部分是用于测试这一切的 `Main` 类。我们不希望使用阻塞调用，而是希望使用一系列待调用的方法。\n\
  \n```\npackage com.apress.spring6recipes.nosql;\nimport com.apress.spring6recipes.nosql.config.MongoConfiguration;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import reactor.core.publisher.Flux;\nimport java.util.concurrent.CountDownLatch;\n\
  public class Main {\nprivate static final String COUNT = \"车辆数量: %d%n\";\npublic\
  \ static void main(String[] args) throws Exception {\nvar cfg = MongoConfiguration.class;\n\
  try (var ctx = new AnnotationConfigApplicationContext(cfg)) {\nvar repository =\
  \ ctx.getBean(VehicleRepository.class);\nvar countDownLatch = new CountDownLatch(1);\n\
  repository.count().doOnSuccess(cnt -> System.out.printf(COUNT, cnt))\n.thenMany(repository.saveAll(\n\
  Flux.just(\nnew Vehicle(null, \"TEM0001\", \"RED\", 4, 4),\nnew Vehicle(null, \"\
  TEM0002\", \"RED\", 4, 4))))\n.last()\n.then(repository.count()).doOnSuccess(cnt\
  \ -> System.out.printf(COUNT, cnt))\n.then(repository.findByVehicleNo(\"TEM0001\"\
  )).doOnSuccess(System.out::println)\n.then(repository.deleteAll())\n.doOnTerminate(countDownLatch::countDown)\n\
  .then(repository.count()).subscribe(cnt -> System.out.printf(COUNT, cnt));\ncountDownLatch.await();\n\
  }\n}\n}\n代码清单 9-18\n运行代码的 Main 类\n```\n\n流程从计数开始，成功后，将 `Vehicle` 实例放入 MongoDB。当添加完\
  \ `last()` 车辆后，再次进行计数，接着执行查询，随后执行 `deleteAll`。所有这些方法都以响应式方式一个接一个地调用，由事件触发。因为我们不想使用\
  \ `block()` 方法进行阻塞，所以使用 `CountDownLatch` 等待代码执行；在所有记录删除后计数器递减，之后程序将继续执行。诚然，这仍然是阻塞的，但在完整的响应式栈中使用时，你可能会从最后一个\
  \ `then` 返回 `Mono` 并进行进一步组合，或者将输出交给 Spring WebFlux 控制器（参见第 4 章）。\n\n## 9-2\\. 使用\
  \ Redis\n\n### 问题\n\n你想要利用 Redis 存储数据。\n\n### 解决方案\n\n下载并安装 Redis，然后使用 Spring 和\
  \ Spring Data 访问 Redis 实例。\n\n### 工作原理\n\nRedis 是一种内存数据结构存储，可用作数据库、缓存（参见第 14 章）、消息代理或流式引擎。这里我们将探讨其数据存储能力。为此，Redis\
  \ 提供了列表、（有序）集合、哈希、字符串、位图、地理空间索引和流。为了获得高性能，Redis 使用内存数据集。根据你的情况，你可以定期将其存储到磁盘，或者持续追加提交日志。\n\
  \n#### 下载并启动 Redis\n\nRedis 可以从 [`https://redis.io/download`](https://redis.io/download)\
  \ 下载。在撰写本文时，7.0 版本是最近发布的稳定版本。安装说明可查阅 [`https://redis.io/docs/getting-started/installation/`](https://redis.io/docs/getting-started/installation/)，其中包含大多数操作系统的说明。\n\
  \n下载并安装 Redis 后，在命令行中使用 `redis-server` 命令启动它。启动后，输出应类似于图 9-2 所示。它将输出进程 ID（PID）和其监听的端口号（默认\
  \ 6379）。\n\n![](img/314861_5_En_9_Fig2_HTML.jpg)\n\n一张标题为“redis-server 双反斜杠星号. 6379”的截图，展示了执行\
  \ redis-server 命令后的输出。结尾显示：服务器已初始化，准备接受连接。\n\n图 9-2\n启动 Redis 后的输出\n\n\n\n#### 连接\
  \ Redis\n\n要连接 Redis，需要一个客户端，就像连接数据库需要 JDBC 驱动一样。有多种客户端可供选择。完整的列表可以在 Redis 网站上找到（[`https://redis.io/clients`](https://redis.io/clients)）。本方案将使用\
  \ Jedis 客户端，因为它非常活跃，并且得到了 Redis 团队的推荐。\n\n![](img/314861_5_En_9_Figd_HTML.gif)一个信息符号，由阴影圆圈内的字母\
  \ i 图标表示。  需要将 Jedis 的相关依赖添加到类路径中。使用 Maven 时，添加以下依赖：\n\n```\nredis.clients\njedis\n\
  4.3.1\n\n```\n\n或者，使用 Gradle 时添加以下内容：\n\n`compile 'redis.clients:jedis:4.3.1'`\n\
  \n让我们从一个简单的 Hello World 示例开始，看看是否能够连接到 Redis。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  import redis.clients.jedis.Jedis;\nimport static redis.clients.jedis.Protocol.DEFAULT_PORT;\n\
  public class Main {\npublic static void main(String[] args) {\ntry (var jedis =\
  \ new Jedis(\"localhost\", DEFAULT_PORT)) {\njedis.set(\"msg\", \"Hello World, from\
  \ Redis!\");\nSystem.out.println(jedis.get(\"msg\"));\n}\n}\n}\n代码清单 9-19\n使用 Jedis\
  \ 客户端\n```\n\n创建一个 Jedis 客户端，并传入要连接的主机名和端口，本例中为 `localhost` 和默认端口（6379）。Jedis 客户端的\
  \ `set` 方法会将一条消息存入存储中，而 `get` 方法则用于再次检索该消息。除了简单的对象，你还可以让 Redis 模拟 `List` 或 `Map`。\n\
  \n```\npackage com.apress.spring6recipes.nosql;\nimport redis.clients.jedis.Jedis;\n\
  import static redis.clients.jedis.Protocol.DEFAULT_PORT;\npublic class Main {\n\
  public static void main(String[] args) {\ntry (var jedis = new Jedis(\"localhost\"\
  , DEFAULT_PORT)) {\njedis.rpush(\"authors\", \"Marten Deinum\", \"Josh Long\", \"\
  Daniel Rubio\", \"Gary Mak\");\nSystem.out.println(\"Authors: \" + jedis.lrange(\"\
  authors\", 0, -1));\njedis.hset(\"sr_5\", \"authors\", \"Josh Long, Marten Deinum\"\
  );\njedis.hset(\"sr_5\", \"published\", \"2019\");\njedis.hset(\"sr_6\", \"authors\"\
  , \"Josh Long, Marten Deinum\");\njedis.hset(\"sr_6\", \"published\", \"2023\");\n\
  System.out.println(\"Spring 5 Recipes \" + jedis.hgetAll(\"sr_5\"));\nSystem.out.println(\"\
  Spring 6 Recipes \" + jedis.hgetAll(\"sr_6\"));\n}\n}\n}\n代码清单 9-20\n运行代码的主类\n```\n\
  \n使用 `rpush` 和 `lpush` 可以向列表中添加元素。`rpush` 将元素添加到列表末尾，`lpush` 则将元素添加到列表开头。要检索它们，可以使用\
  \ `lrange` 和 `rrange` 方法。`lrange` 从左侧开始，并接受起始索引和结束索引。示例中使用了 `-1`，表示所有元素。\n\n要向映射（map）中添加元素，请使用\
  \ `hset`；它接受一个 `key`、一个 `field` 和一个 `value`。另一种选择是使用 `hmset`（多重设置），它接受一个 `Map<String,\
  \ String>` 或 `Map<byte[], byte[]>` 作为参数。\n\n#### 使用 Redis 存储对象\n\nRedis 是一个键值存储，只能处理\
  \ `String` 或 `byte[]` 类型。键也是如此。因此，在 Redis 中存储对象并不像其他技术那样直接。对象在存储之前需要序列化为 `String`\
  \ 或 `byte[]`。\n\n让我们复用方案 9-1 中的 `Vehicle` 记录，并使用 Jedis 客户端进行存储和检索。\n\n```\npackage\
  \ com.apress.spring6recipes.nosql;\nimport java.io.Serializable;\npublic record\
  \ Vehicle (String vehicleNo, String color, int wheel, int seat)\nimplements Serializable\
  \ {\n}\n代码清单 9-21\nVehicle 记录\n```\n\n我们还要声明一个 `VehicleRepository` 接口（与方案 9-1 中\
  \ MongoDB 的接口相同）。\n\n```\npackage com.apress.spring6recipes.nosql;\nimport java.util.List;\n\
  public interface VehicleRepository {\nlong count();\nvoid save(Vehicle vehicle);\n\
  void delete(Vehicle vehicle);\nList findAll();\nVehicle findByVehicleNo(String vehicleNo);\n\
  }\n代码清单 9-22\nVehicleRepository 接口\n```\n\n最后，是 Redis 的 `VehicleRepository` 实现。\n\
  \n```\npackage com.apress.spring6recipes.nosql;\nimport java.util.List;\nimport\
  \ org.springframework.util.SerializationUtils;\nimport jakarta.annotation.PreDestroy;\n\
  import redis.clients.jedis.Jedis;\npublic class RedisVehicleRepository implements\
  \ VehicleRepository {\nprivate static final String DB_NAME = \"vehicles\";\nprivate\
  \ final Jedis jedis;\npublic RedisVehicleRepository(Jedis jedis) {\nthis.jedis =\
  \ jedis;\n}\n@Override\npublic long count() {\nreturn jedis.hkeys(DB_NAME.getBytes()).size();\n\
  }\n@Override\npublic void save(Vehicle vehicle) {\nvar key = vehicle.vehicleNo();\n\
  var vehicleArray = SerializationUtils.serialize(vehicle);\njedis.hset(DB_NAME.getBytes(),\
  \ key.getBytes(), vehicleArray);\n}\n@Override\npublic void delete(Vehicle vehicle)\
  \ {\njedis.hdel(DB_NAME.getBytes(), vehicle.vehicleNo().getBytes());\n}\n@Override\n\
  public List findAll() {\nreturn jedis.hkeys(DB_NAME).stream()\n.map(this::findByVehicleNo).toList();\n\
  }\n@Override\npublic Vehicle findByVehicleNo(String vehicleNo) {\nvar vehicleArray\
  \ = jedis.hget(DB_NAME.getBytes(), vehicleNo.getBytes());\nreturn (Vehicle) SerializationUtils.deserialize(vehicleArray);\n\
  }\n@PreDestroy\npublic void cleanUp() {\nfindAll().forEach(this::delete);\n}\n}\n\
  代码清单 9-23\nRedis VehicleRepository 实现\n```\n\n该仓库需要使用我们之前用过的 `Jedis` 客户端来存储我们想要的对象。由于\
  \ Redis 中并没有真正的表，我们可以使用哈希类型，它类似于一种分布式映射。我们将使用 `vehicles` 作为哈希的键，这样我们就可以将车辆添加到生成的哈希中。哈希键被转换为\
  \ `byte[]`，并且由于我们的 `Vehicle` 是 `Serializable` 的，我们也可以将其转换为 `byte[]`。\n\n![](img/314861_5_En_9_Fige_HTML.gif)一个信息符号，由阴影圆圈内的字母\
  \ i 图标表示。  使用 Java 序列化时，需要实现 `java.io.Serializable` 接口。这是为了使对象对 Java 可序列化。在存储对象之前，需要将其转换为\
  \ `byte[]`。在 Java 中，`ObjectOutputStream` 可以写入对象，`ByteArrayOutputStream` 可以写入 `byte[]`。要将\
  \ `byte[]` 再次转换回对象，`ObjectInputStream` 和 `ByteArrayInputStream` 会有所帮助。Spring 为此提供了一个辅助类\
  \ `org.springframework.util.SerializationUtils`，它提供了 `serialize` 和 `deserialize`\
  \ 辅助方法。\n\n![](img/314861_5_En_9_Figf_HTML.gif)一个带有倒置 i 的阴影三角形图标。  该实现并非基于 Redis\
  \ 的仓库的最优化实现；它仅作为本方案的示例。\n\n现在，在主类中，让我们创建一些 `Vehicle` 实例，并使用我们的仓库进行存储和检索。\n\n\n\n\
  ```\npackage com.apress.spring6recipes.nosql;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import com.apress.spring6recipes.nosql.config.RedisConfig;\npublic class Main {\n\
  private static final String COUNT = \"Number of Vehicles: %d%n\";\npublic static\
  \ void main(String[] args) {\nvar cfg = RedisConfig.class;\ntry (var ctx = new AnnotationConfigApplicationContext(cfg))\
  \ {\nvar repository = ctx.getBean(VehicleRepository.class);\nSystem.out.printf(COUNT,\
  \ repository.count());\nrepository.save(new Vehicle(\"TEM0001\", \"RED\", 4, 4));\n\
  repository.save(new Vehicle(\"TEM0002\", \"RED\", 4, 4));\nSystem.out.printf(COUNT,\
  \ repository.count());\nvar v = repository.findByVehicleNo(\"TEM0001\");\nSystem.out.println(v);\n\
  var vehicleList = repository.findAll();\nSystem.out.printf(COUNT, vehicleList.size());\n\
  vehicleList.forEach(System.out::println);\nSystem.out.printf(COUNT, repository.count());\n\
