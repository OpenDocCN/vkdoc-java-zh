  #### 从 Web 应用程序启动


  从 Web 应用程序启动作业需要稍微不同的方法，因为客户端线程（通常是一个 HTTP 请求）通常无法等待批处理作业完成。理想的解决方案是，当从 Web 层的控制器或操作中启动时，作业能够异步执行，而无需客户端线程等待。Spring
  Batch 通过使用 Spring 的 `TaskExecutor` 来支持这种场景。这需要对 `JobLauncher` 的配置进行简单的更改，尽管 Java
  代码可以保持不变。在这里，我们将使用一个 `SimpleAsyncTaskExecutor`，它将生成一个执行线程并管理该线程而不会阻塞。


