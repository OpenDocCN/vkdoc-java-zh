  的应用程序（另请查看 `recipe_5_shared` 的共享代码）。这是本章将使用的初始未受保护的应用程序。它是一个基本的待办事项应用，你可以在其中列出、创建和标记待办事项为已完成。部署应用程序后，你将看到如图
  5-1 所示的内容。


