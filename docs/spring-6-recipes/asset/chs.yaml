  清单 9-36\nNeo4j 启动输出\n```\n\n#### 启动 Neo4j\n\n让我们从为 Neo4j 创建一个简单的“Hello World”开始。创建一个\
  \ `Main` 类，该类连接到服务器，向 Neo4j 添加一些数据，然后再次检索这些数据。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  import org.neo4j.driver.GraphDatabase;\nimport java.util.stream.Collectors;\nimport\
  \ static org.neo4j.driver.Values.parameters;\npublic class Main {\nprivate static\
  \ final String URL = \"bolt://localhost:7687\";\nprivate static final String CREATE_QUERY\
  \ = \"CREATE (:Greetings {msg: $msg})\";\nprivate static final String MATCH_QUERY\
  \ = \"MATCH (g) RETURN g.msg\";\nprivate static final String DELETE_ALL_QUERY =\
  \ \"MATCH (n) DETACH DELETE n\";\npublic static void main(String[] args) {\ntry\
  \ (var driver = GraphDatabase.driver(URL)) {\ntry (var session = driver.session())\
  \ {\nsession.writeTransaction(tx -> {\ntx.run(CREATE_QUERY, parameters(\"msg\",\
  \ \"Hello\"));\ntx.run(CREATE_QUERY, parameters(\"msg\", \"World\"));\nreturn null;\n\
  });\nvar readResult = session.readTransaction(tx -> {\nvar res = tx.run(MATCH_QUERY);\n\
  return res.stream().map(it -> it.get(0).asString()).collect(Collectors.joining(\"\
  \ \"));\n});\nSystem.out.println(\"After Read: \\n\\t\" + readResult);\nsession.run(DELETE_ALL_QUERY);\n\
  }\n}\n}\n}\n清单 9-37\nMain 类\n```\n\n这个 main 方法将使用 Bolt 协议连接到 Neo4j 服务器。接着，它将启动一个事务并创建两个节点。然后，检索所有节点，并将\
  \ `msg` 属性的值打印到控制台。Neo4j 擅长遍历节点之间的关系。它为此进行了特别优化（就像其他图数据存储一样）。\n\n![](img/314861_5_En_9_Figi_HTML.gif)一个信息符号，由带阴影圆圈内的字母\
  \ i 图标表示。 需要将 Neo4j 的相关依赖添加到类路径中。使用 Maven 时，添加以下依赖：\n\n```\norg.neo4j\nneo4j\n5.3.0\n\
  \norg.neo4j.driver\nneo4j-java-driver\n5.3.1\n\n```\n\n或者，使用 Gradle 时添加以下内容：\n\n\
  ```\nimplementation group: 'org.neo4j', name: 'neo4j', version: '5.3.0'\nimplementation\
  \ group: 'org.neo4j.driver', name: 'neo4j-java-driver', version: '5.3.1'\n```\n\n\
  让我们创建一些彼此之间存在关系的节点。\n\n```\npackage com.apress.spring6recipes.nosql;\nimport org.neo4j.driver.GraphDatabase;\n\
  import java.util.Map;\npublic class Main {\nprivate static final String URL = \"\
  bolt://localhost:7687\";\nprivate static final String CREATE_CHARACTER_QUERY = \"\
  CREATE (:Character {name: $name})\";\nprivate static final String CREATE_PLANET_QUERY\
  \ = \"CREATE (:Planet {name: $name})\";\nprivate static final String CREATE_PLANET_REL_QUERY\
  \ = \"MATCH (a:Character), (b:Planet) WHERE a.name=$cname AND b.name=$pname CREATE\
  \ (a)-[r:LOCATION]->(b)\";\nprivate static final String CREATE_FRIENDS_REL_QUERY\
  \ = \"MATCH (a:Character), (b:Character) WHERE a.name=$aname AND b.name=$bname CREATE\
  \ (a)-[r:FRIENDS_WITH]->(b)\";\nprivate static final String CREATE_MASTER_REL_QUERY\
  \ = \"MATCH (a:Character), (b:Character) WHERE a.name=$aname AND b.name=$bname CREATE\
  \ (a)-[r:MASTER_OF]->(b)\";\nprivate static final String DELETE_ALL_QUERY = \"MATCH\
  \ (n) DETACH DELETE n\";\npublic static void main(String[] args) {\ntry (var driver\
  \ = GraphDatabase.driver(URL)) {\ntry (var session = driver.session()) {\n// 角色\n\
  session.run(CREATE_CHARACTER_QUERY, Map.of(\"name\", \"Yoda\"));\nsession.run(CREATE_CHARACTER_QUERY,\
  \ Map.of(\"name\", \"Luke Skywalker\"));\nsession.run(CREATE_CHARACTER_QUERY, Map.of(\"\
  name\", \"Leia Organa\"));\nsession.run(CREATE_CHARACTER_QUERY, Map.of(\"name\"\
  , \"Han Solo\"));\n// 星球\nsession.run(CREATE_PLANET_QUERY, Map.of(\"name\", \"Dagobah\"\
  ));\nsession.run(CREATE_PLANET_QUERY, Map.of(\"name\", \"Tatooine\"));\nsession.run(CREATE_PLANET_QUERY,\
  \ Map.of(\"name\", \"Alderaan\"));\n// 关系\nsession.run(CREATE_PLANET_REL_QUERY,\
  \ Map.of(\"cname\", \"Yoda\", \"pname\", \"Dagobah\"));\nsession.run(CREATE_PLANET_REL_QUERY,\
  \ Map.of(\"cname\", \"Leia Organa\", \"pname\", \"Alderaan\"));\nsession.run(CREATE_PLANET_REL_QUERY,\
  \ Map.of(\"cname\", \"Luke Skywalker\", \"pname\", \"Tatooine\"));\nsession.run(CREATE_FRIENDS_REL_QUERY,\
  \ Map.of(\"aname\", \"Luke Skywalker\", \"bname\", \"Han Solo\"));\nsession.run(CREATE_FRIENDS_REL_QUERY,\
  \ Map.of(\"aname\", \"Leia Organa\", \"bname\", \"Han Solo\"));\nsession.run(CREATE_FRIENDS_REL_QUERY,\
  \ Map.of(\"aname\", \"Leia Organa\", \"bname\", \"Luke Skywalker\"));\nsession.run(CREATE_MASTER_REL_QUERY,\
  \ Map.of(\"aname\", \"Yoda\", \"bname\", \"Luke Skywalker\"));\n}\ntry (var session\
  \ = driver.session()) {\nvar result = session.run(\"MATCH (n) RETURN n.name as name\"\
  );\nresult.stream()\n.flatMap(m -> m.fields().stream())\n.map(row -> row.key() +\
  \ \" : \" + row.value().asString())\n.forEach(System.out::println);\nsession.run(DELETE_ALL_QUERY);\n\
  }\n}\n}\n}\n清单 9-38\nMain 类\n```\n\n这段代码反映了《星球大战》宇宙的一小部分。它包含了角色及其所在地点（实际上是星球）。人物之间也存在关系（关系图见图\
  \ 9-3）。\n\n![](img/314861_5_En_9_Fig3_HTML.jpg)\n\n一个关系图，展示了《星球大战》宇宙中的角色和地点。卢克·天行者，与汉·索罗是朋友，是莱娅·奥加纳的兄弟姐妹，所在地点是奥德兰和塔图因。顶部是尤达，他是卢克·天行者的师父，所在地点是达戈巴。\n\
  \n图 9-3\n\n示例中的关系\n\n这些关系是通过将角色与另一个角色或星球进行匹配（取决于关系类型）来创建的。插入所有数据后，它将执行 Cypher 查询\
  \ `MATCH (n) RETURN n.name as name`。这将选择所有节点并返回所有节点的 name 属性。\n\n\n\n#### 使用 Neo4j\
  \ 映射对象\n\n到目前为止的代码都处于相当低的层级，并且局限于使用纯 Neo4j 和 Cypher 查询。创建和操作节点非常繁琐。理想情况下，我们应该使用\
  \ `Planet` 和 `Character` 类，并让这些类能够从 Neo4j 中存储/检索。\n\n首先，创建 `Planet` 和 `Character`\
  \ 类。\n\n```\npackage com.apress.spring6recipes.nosql;\nimport java.util.ArrayList;\n\
  import java.util.Collections;\nimport java.util.List;\npublic class Character {\n\
  private final String name;\nprivate final List friends = new ArrayList();\nprivate\
  \ String id;\nprivate Planet location;\nprivate Character apprentice;\npublic Character(String\
  \ name) {\nthis.name=name;\n}\npublic String getId() {\nreturn id;\n}\nvoid setId(String\
  \ id) {\nthis.id=id;\n}\npublic String getName() {\nreturn name;\n}\npublic Planet\
  \ getLocation() {\nreturn location;\n}\npublic void setLocation(Planet location)\
  \ {\nthis.location = location;\n}\npublic Character getApprentice() {\nreturn apprentice;\n\
  }\npublic void setApprentice(Character apprentice) {\nthis.apprentice = apprentice;\n\
  }\npublic List getFriends() {\nreturn Collections.unmodifiableList(friends);\n}\n\
  public void addFriend(Character friend) {\nfriends.add(friend);\n}\n}\n代码清单 9-40\n\
  Character 类\n```\n\n```\npackage com.apress.spring6recipes.nosql;\npublic class\
  \ Planet {\nprivate final String name;\nprivate String id;\npublic Planet(String\
  \ name) {\nthis.name = name;\n}\npublic String getId() {\nreturn id;\n}\nvoid setId(String\
  \ id) {\nthis.id=id;\n}\npublic String getName() {\nreturn name;\n}\n}\n代码清单 9-39\n\
  Planet 类\n```\n\n`Planet` 类非常简单。它有一个 `id` 属性和一个 `name` 属性。`Character` 类则稍微复杂一些。它同样拥有\
  \ `id` 和 `name` 属性，但还包含一些用于表示关系的额外属性。其中包括用于 `LOCATION` 关系的 `location` 属性、用于 `FRIENDS_WITH`\
  \ 关系的 `Characters` 集合，以及用于 `MASTER_OF` 关系的 `apprentice` 属性。\n\n为了能够存储这些类，让我们创建一个\
  \ `StarwarsRepository` 接口来封装保存操作。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  public interface StarwarsRepository {\nPlanet save(Planet planet);\nCharacter save(Character\
  \ charachter);\n}\n代码清单 9-41\nStarwarsRepository 接口\n```\n\n以下是针对 Neo4j 的实现。\n\n\
  ```\npackage com.apress.spring6recipes.nosql;\nimport org.neo4j.driver.Driver;\n\
  import java.util.Map;\nclass Neo4jStarwarsRepository implements StarwarsRepository\
  \ {\nprivate static final String CREATE_PLANET_QUERY = \"CREATE (a:Planet {id: randomUUID(),\
  \ name: $name}) RETURN a.id\";\nprivate static final String CREATE_CHARACTER_QUERY\
  \ = \"CREATE (a:Character {id: randomUUID(), name: $name}) RETURN a.id\";\nprivate\
  \ static final String CREATE_PLANET_REL_QUERY = \"MATCH (a:Character), (b:Planet)\
  \ WHERE a.id=$aid AND b.id=$bid CREATE (a)-[r:LOCATION]->(b)\";\nprivate static\
  \ final String CREATE_FRIENDS_REL_QUERY = \"MATCH (a:Character), (b:Character) WHERE\
  \ a.id=$aid AND b.id=$bid CREATE (a)-[r:FRIENDS_WITH]->(b)\";\nprivate static final\
  \ String CREATE_MASTER_REL_QUERY = \"MATCH (a:Character), (b:Character) WHERE a.id=$aid\
  \ AND b.id=$bid CREATE (a)-[r:MASTER_OF]->(b)\";\nprivate final Driver db;\nNeo4jStarwarsRepository(Driver\
  \ db) {\nthis.db = db;\n}\n@Override\npublic Planet save(Planet planet) {\nif (planet.getId()\
  \ != null) {\nreturn planet;\n}\ntry (var session = db.session()) {\nvar res = session.run(CREATE_PLANET_QUERY,\
  \ Map.of(\"name\", planet.getName()));\nplanet.setId(res.single().get(0).asString());\n\
  return planet;\n}\n}\n@Override\npublic Character save(Character charr) {\nif (charr.getId()\
  \ != null) {\nreturn charr;\n}\ntry (var session = db.session()) {\nsession.executeWrite(tx\
  \ -> {\nvar res = tx.run(CREATE_CHARACTER_QUERY, Map.of( \"name\", charr.getName()));\n\
  charr.setId(res.single().get(0).asString());\nif (charr.getLocation() != null) {\n\
  var location = save(charr.getLocation());\ntx.run(CREATE_PLANET_REL_QUERY, Map.of(\"\
  aid\", charr.getId(),\n\"bid\", location.getId()));\n}\nfor (var friend : charr.getFriends())\
  \ {\nfriend = save(friend);\ntx.run(CREATE_FRIENDS_REL_QUERY, Map.of(\"aid\", charr.getId(),\n\
  \"bid\", friend.getId()));\n}\nif (charr.getApprentice() != null) {\nvar apprentice\
  \ = save(charr.getApprentice());\ntx.run(CREATE_MASTER_REL_QUERY, Map.of(\"aid\"\
  , charr.getId(),\n\"bid\", apprentice.getId()));\n}\nreturn null;\n});\n}\nreturn\
  \ charr;\n}\n}\n代码清单 9-42\nNeo4j StarwarsRepository 实现类\n```\n\n为了将对象存储到 Neo4j 中，这里做了很多工作。对于\
  \ `Planet` 来说相当简单。首先，检查它是否已经被持久化（在这种情况下 id 不为 null）；如果没有，则启动一个事务，创建一个节点，设置 `name`\
  \ 属性，并将 `id` 传回给 `Planet` 对象。然而，对于 `Character` 类来说，情况稍微复杂一些，因为需要考虑所有关系。\n\n![](img/314861_5_En_9_Figj_HTML.gif)一个灯泡轮廓的图标，代表一个信息提示。 \
  \ 不建议使用 Neo4j 生成的技术 ID，因此我们在 Neo4j 中生成了 `id`。你也可以创建自己的 ID 生成器（或使用客户端生成的 UUID）并直接存储它们。这里我们选择让\
  \ Neo4j 处理 ID 并将其复制回对象。\n\n需要修改 `Main` 类以反映对类的更改。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  import org.neo4j.driver.GraphDatabase;\nimport java.util.stream.Stream;\npublic\
  \ class Main {\nprivate static final String URL = \"bolt://localhost:7687\";\nprivate\
  \ static final String DELETE_ALL_QUERY = \"MATCH (n) DETACH DELETE n\";\npublic\
  \ static void main(String[] args) {\ntry (var driver = GraphDatabase.driver(URL))\
  \ {\nvar repository = new Neo4jStarwarsRepository(driver);\n// 行星\nvar dagobah =\
  \ new Planet(\"Dagobah\");\nvar alderaan = new Planet(\"Alderaan\");\nvar tatooine\
  \ = new Planet(\"Tatooine\");\nStream.of(dagobah, alderaan, tatooine).forEach(repository::save);\n\
  // 角色\nvar han = new Character(\"Han Solo\");\nvar leia = new Character(\"Leia Organa\"\
  );\nleia.setLocation(alderaan);\nleia.addFriend(han);\nvar luke = new Character(\"\
  Luke Skywalker\");\nluke.setLocation(tatooine);\nluke.addFriend(han);\nluke.addFriend(leia);\n\
  var yoda = new Character(\"Yoda\");\nyoda.setLocation(dagobah);\nyoda.setApprentice(luke);\n\
  Stream.of(han, luke, leia, yoda).forEach(repository::save);\ntry(var session = driver.session())\
  \ {\nvar result = session.run(\"MATCH (n) RETURN n.name as name\");\nresult.stream()\n\
  .flatMap(m -> m.fields().stream())\n.map(row -> row.key() + \" : \" + row.value()\
  \ + \";\")\n.forEach(System.out::println);\nsession.run(DELETE_ALL_QUERY);\n}\n\
  }\n}\n}\n代码清单 9-43\nMain 类\n```\n\n执行结果应该仍然与之前相同。然而，主要区别在于，现在的代码使用的是领域对象，而不是直接操作节点。\n\
  \n\n\n#### 使用 Spring 配置 Neo4j\n\n目前尚未引入 Spring。现在我们将 `Driver` 和 `Neo4JstarwarsRepository`\
  \ 迁移至 Spring 配置类中。为此，需要创建一个 `StarwarsConfig` 类。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  import org.neo4j.driver.Driver;\nimport org.neo4j.driver.GraphDatabase;\nimport\
  \ org.springframework.beans.factory.annotation.Value;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.context.annotation.PropertySource;\n\
  import org.springframework.context.support.PropertySourcesPlaceholderConfigurer;\n\
  @Configuration\n@PropertySource(\"classpath:/application.properties\")\npublic class\
  \ StarwarsConfig {\n@Bean\npublic Driver driver(@Value(\"${neo4j.url}\") String\
  \ url) {\nreturn GraphDatabase.driver(url);\n}\n@Bean\npublic Neo4jStarwarsRepository\
  \ starwarsRepository(Driver driver) {\nreturn new Neo4jStarwarsRepository(driver);\n\
  }\n@Bean\npublic static PropertySourcesPlaceholderConfigurer pspc() {\nreturn new\
  \ PropertySourcesPlaceholderConfigurer();\n}\n}\n代码清单 9-44\nStarwarsConfig\n```\n\
  \n`Driver` 和 `Neo4JStarwarsRepository` 的创建已移至配置类中。`url` 的配置已移至属性文件 `application.properties`，该文件通过添加的\
  \ `@PropertySource` 加载，并通过 `PropertySourcesPlaceholderConfigurer` 进行转换。这样，针对不同环境配置不同的\
  \ URL 就更加方便了。\n\n```\nneo4j.url=bolt://localhost:7687\n代码清单 9-45\n应用程序属性\n```\n\n\
  配置创建完成后，还需要对 `Main` 类进行一些微调。我们需要启动 Spring 上下文，并从中获取所需的 Bean。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  import org.neo4j.driver.Driver;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import java.util.stream.Stream;\npublic class Main {\npublic static void main(String[]\
  \ args) {\nvar cfg = StarwarsConfig.class;\ntry (var ctx = new AnnotationConfigApplicationContext(cfg))\
  \ {\nvar repository = ctx.getBean(StarwarsRepository.class);\nvar driver = ctx.getBean(Driver.class);\n\
  try(var session = driver.session()) {\nvar result = session.run(\"MATCH (n) RETURN\
  \ n.name as name\");\nresult.stream()\n.flatMap(m -> m.fields().stream())\n.map(row\
  \ -> row.key() + \" : \" + row.value() + \";\")\n.forEach(System.out::println);\n\
  }\n}\n}\n代码清单 9-46\nMain 类\n```\n\n#### 使用 Spring Data Neo4j 的 Neo4jTemplate\n\n\
  为了更便捷地使用 Neo4j，[Spring Data Neo4j 项目](https://spring.io/projects/spring-data-neo4j)应运而生。除了提供\
  \ `Neo4jTemplate` 和 `Neo4jTransactionManager` 等辅助工具外，它还是一个对象映射框架。它允许使用 `@Node` 注解标记类，使其能够作为\
  \ Neo4j 的领域对象使用，这与 JPA 中的 `@Entity` 注解类似。如果要使用 Spring Data Neo4j 提供的类和辅助工具，我们需要从注解领域对象开始。\n\
  \n![](img/314861_5_En_9_Figk_HTML.gif)一个信息符号，由带阴影圆圈内的字母 i 图标表示。  需要将 Spring Data\
  \ Neo4j 的相关依赖添加到类路径中。使用 Maven 时，添加以下依赖：\n\n```\norg.springframework.data\nspring-data-neo4j\n\
  7.0.0\n\n```\n\n或者使用 Gradle 时，添加以下内容：\n\n```\nimplementation group: 'org.springframework.data',\
  \ name: 'spring-data-neo4j', version: '7.0.0'\n```\n\n`Character` 和 `Planet` 类需要添加\
  \ `@Node` 注解。这会将它们标记为 Neo4j 的节点。接下来，我们需要使用 `@Id` 注解指定要用作标识符的字段。最后，由于我们要生成 UUID，因此使用\
  \ `@GeneratedValue` 注解。我们还指定了 `UUIDStringGenerator` 作为生成 ID 的类。代码清单 9-47 展示了 `Planet`\
  \ 类的修改。其余部分可与代码清单 9-39 保持一致。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  import org.springframework.data.neo4j.core.schema.GeneratedValue;\nimport org.springframework.data.neo4j.core.schema.Id;\n\
  import org.springframework.data.neo4j.core.schema.Node;\nimport org.springframework.data.neo4j.core.support.UUIDStringGenerator;\n\
  @Node\npublic class Planet {\nprivate final String name;\n@Id\n@GeneratedValue(UUIDStringGenerator.class)\n\
  private String id;\n}\n代码清单 9-47\n带有映射注解的 Planet 类\n```\n\n`Character` 类需要更多注解来映射其中的关系。这时就需要用到\
  \ `@Relationship` 注解。朋友列表对应 **FRIENDS_WITH** 关系，`apprentice` 字段对应 **MASTER_OF**\
  \ 关系，最后 `location` 字段对应 **LOCATION** 关系。在 `FRIENDS_WITH` 关系上还需要一个额外的 `@AccessType`\
  \ 注解；由于我们没有 `setFriends` 方法，因此需要指示 Spring Data 对此使用基于字段的访问。最后，添加了一个 `toString` 方法，以便我们可以用它来向控制台打印信息。\n\
  \n```\npackage com.apress.spring6recipes.nosql;\nimport org.springframework.data.annotation.AccessType;\n\
