  安全初始化器

  ```


  `AbstractSecurityWebApplicationInitializer` 将自动检测包含安全配置的 `ApplicationContext`，并使用它来设置过滤器。如果在没有
  Spring 的情况下使用 Spring Security（例如在 JAX-RS 应用程序中），你可以通过构造函数将配置传递给 `AbstractSecurityWebApplicationInitializer`（有一个接受配置类的构造函数）。


  构建并部署应用程序后，尝试访问 `http://localhost:8080/todos/todos`，你现在将看到默认的 Spring Security 登录页面（参见图
  5-2）。


  ![](img/314861_5_En_5_Fig2_HTML.jpg)


  一个本地主机下的登录页面截图，显示消息“请登录”，两个用于输入用户名和密码的文本框，以及一个“登录”选项。


