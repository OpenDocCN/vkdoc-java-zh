  \n#### 发布 JFR 事件\n\n除了发布标准事件之外，还可以发布/写入你自己的事件。要实现这一点，你需要获取正在使用的 `ApplicationStartup`\
  \ 实例，并使用其 `start` 方法来创建一个 `StartupStep`。完成后，你可以在提供的 `StartupStep` 上调用 `end` 来记录该事件。要获取在此上下文中使用的\
  \ `ApplicationStartup` 的引用，你可以实现 `ApplicationStartupAware` 接口以使其被注入。使用 `@Autowired`\
  \ 可能不起作用，因为基于注解的处理可能尚未完全初始化。\n\n让我们在通过 `ScheduledTaskRegistrar` 注册任务时发布一个事件。\n\n\
  ```\npackage com.apress.spring6recipes.replicator.config;\nimport com.apress.spring6recipes.replicator.FileReplicator;\n\
