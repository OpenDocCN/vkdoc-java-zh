  ## 8-8\. 控制步骤执行


  ### 问题


  你想控制步骤的执行方式，也许是为了通过引入并发或仅在条件为真时执行步骤来消除不必要的时间浪费。


  ### 解决方案


  有多种方法可以改变作业的运行时配置文件，主要是通过控制步骤的执行方式：并发步骤、决策和顺序步骤。


  ### 工作原理


  到目前为止，你已经探索了在作业中运行一个步骤。然而，几乎任何复杂程度的典型作业都会有多个步骤。步骤为其包含的 Bean 和逻辑提供了边界（事务性或非事务性）。一个步骤可以有自己的读取器、写入器和处理器。每个步骤都有助于决定下一步是什么。步骤是隔离的，并提供集中的功能，可以使用
  Spring Batch 中更新的模式和配置选项，以非常复杂的工作流进行组装。事实上，如果你对业务流程管理（BPM）系统和工作流感兴趣，你即将看到的一些概念和模式会非常熟悉。BPM
  提供了许多用于流程或作业控制的构造，与你在这里看到的类似。当你在纸上勾勒作业定义时，一个步骤通常对应一个要点。例如，一个用于加载每日销售数据并生成报告的批处理作业可能如下所示。


  #### 每日销售报告作业


  1.  将客户从 CSV 文件加载到数据库中。


  2.  计算每日统计数据，并写入报告文件。


  3.  向消息队列发送消息，通知外部系统每个新加载的客户已成功注册。


  #### 顺序步骤


  在前面的示例中，前两个步骤之间存在隐含的顺序：只有在所有注册完成后才能写入审计文件。这种关系是两个步骤之间的默认关系。一个步骤在另一个步骤之后发生。每个步骤都使用自己的执行上下文执行，并且仅共享一个父作业执行上下文和顺序。


  ```

  @Bean

  public Job nightlyRegistrationsJob () {

  var name = "nightlyRegistrationsJob";

  var builder = new JobBuilder(name, jobRegistry);

  return builder

  .start(loadRegistrations())

  .next(reportStatistics())

  .next(...)

  .build();

  }

  }

  清单 8-29

  包含多个步骤的作业

  ```




  #### 并发


  Spring Batch 的第一个版本面向的是同一线程内的批处理，经过一些修改后，或许也能在虚拟机内部运行。当然，当时也有一些变通方法，但情况并不理想。


  在这个示例作业的概要中，第一步必须在第二和第三步之前执行，因为后两步依赖于第一步。然而，后两步之间并不存在任何此类依赖关系。没有理由不能在发送 JMS 消息的同时写入审计日志。Spring
  Batch 提供了分支处理的能力，正是为了实现这种安排。


  ```

  @Bean

  public Job insertIntoDbFromCsvJob() {

  var name = "insertIntoDbFromCsvJob";

  var builder = new JobBuilder(name, jobRegistry);

  return builder

  .start(loadRegistrations())

  .split(taskExecutor())

  .add(

  builder.flow(reportStatistics()),

  builder.flow(sendJmsNotifications()))

  .build();

  }

  清单 8-30

  包含多个步骤并带有分支的作业

  ```


  你可以在作业构建器上使用 `split()` 方法。要将一个步骤转换为一个流程，可以使用作业构建器的 `flow()` 方法。然后，要向流程中添加更多步骤，可以使用
  `next()` 方法。`split()` 方法需要设置一个 `TaskExecutor`。有关调度和并发的更多信息，请参见技巧 1-23。


  在这个例子中，没有任何限制阻止你在流程元素中包含多个步骤，也没有任何限制阻止你在分支元素之后添加更多步骤。分支元素，如同步骤元素一样，也接受一个 next 属性。


  Spring Batch 提供了一种将处理任务卸载到另一个进程的机制。这种分布式处理需要某种持久、可靠的连接。这正好是 JMS 的完美应用场景，因为它极其稳定、支持事务、快速且可靠。Spring
  Batch 的支持是在一个稍高的层次上建模的，它基于 Spring Integration 的抽象层，用于 Spring Integration 通道。此支持并不在主
  Spring Batch 代码库中；它可以在 `spring-batch-integration` 项目中找到。远程分块允许各个步骤像往常一样在主线程中读取和聚合项目。这个步骤被称为主节点。读取的项目被发送到运行在另一个进程中的
  `ItemProcessor`/`ItemWriter`（这被称为从节点）。如果从节点是一个积极消费者，你就拥有了一种简单、通用的扩展机制：工作会立即被分发给尽可能多的
  JMS 客户端。积极消费者模式指的是多个 JMS 客户端都消费同一个队列消息的配置。如果一个客户端消费了一条消息并正在忙于处理，其他空闲的客户端将获取该消息。只要有一个客户端空闲，消息就会被立即处理。


  此外，Spring Batch 还支持使用一种称为分区（partitioning）的特性进行隐式扩展。这个特性很有趣，因为它是内置的，并且通常非常灵活。你可以将步骤实例替换为一个子类
  `PartitionStep`，它知道如何协调分布式执行器，并维护步骤执行的元数据，从而消除了像“远程分块”技术那样需要持久通信媒介的需求。


  这里的功能也非常通用。可以想象，它可以与任何类型的网格结构技术一起使用，例如 GridGain 或 Hadoop。Spring Batch 仅附带了一个 `TaskExecutorPartitionHandler`，它使用
  `TaskExecutor` 策略在多个线程中执行步骤。这个简单的改进本身就足以成为使用此功能的理由！但是，如果你确实有更高的需求，也可以对其进行扩展。


  #### 带状态的条件步骤


  使用给定作业或步骤的 `ExitStatus` 来决定下一步是最简单的条件流程示例。Spring Batch 通过使用 `stop`、`next`、`fail`
  和 `end` 元素来促进这一点。默认情况下，假设没有干预，一个步骤的 `ExitStatus` 将与其 `BatchStatus` 匹配，`BatchStatus`
  是一个属性，其值定义为一个枚举（前面提到的 `BatchStatus`），可以是以下任意一个：`COMPLETED`、`STARTING`、`STARTED`、`STOPPING`、`STOPPED`、`FAILED`、`ABANDONED`
  或 `UNKNOWN`。


  让我们看一个示例，该示例根据前一步骤的成功与否来执行两个步骤中的一个。


  ```

  @Bean

  public Job insertIntoDbFromCsvJob() {

  var name = "User Registration Import Job";

  var builder = new JobBuilder(name, jobRegistry);

  return builder

  .start(step1())

  .on("COMPLETED").to(step2())

  .on("FAILED").to(failureStep())

  .build();

  }

