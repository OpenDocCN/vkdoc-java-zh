  ## 7-11\. 总结


  本章讨论了事务以及为什么应该使用它们。你探讨了 Jakarta EE 历史上采用的事务管理方法，然后了解了 Spring 框架提供的方法有何不同。你探索了在代码中显式使用事务以及通过注解驱动的切面隐式使用事务。你设置了一个数据库，并使用事务来强制数据库保持有效状态。


