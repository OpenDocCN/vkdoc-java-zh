  数据库连接的自动提交行为可以通过调用 `setAutoCommit()` 方法来改变。默认情况下，自动提交是开启的，会在每个 SQL 语句执行后立即提交。要启用事务管理，你必须关闭此默认行为，并且仅当所有
  SQL 语句都成功执行后才提交连接。如果任何语句出错，你必须回滚此连接所做的所有更改。


