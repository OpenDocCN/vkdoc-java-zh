  `ItemWriter`。


  #### 编写自定义 ItemWriter


  `ItemWriter` 的示例也很简单。想象一下，你想通过使用 Spring 提供的众多远程调用选项之一来调用远程服务进行写入。`ItemWriter` 接口通过你期望写入的条目类型进行参数化。在这里，你期望从
  `ItemReader` 接收一个 `UserRegistration` 对象。该接口包含一个方法，该方法期望接收一个该类的参数化类型的 `Chunk`。这些对象是从
  `ItemReader` 读取并聚合而来的。如果你的提交间隔是十，那么你可能会在 `Chunk` 中看到十个或更少的条目。


