  public class FrontDeskImpl implements FrontDesk {\nprivate final KafkaOperations\
  \ kafkaOperations;\npublic FrontDeskImpl(KafkaOperations kafkaOperations) {\nthis.kafkaOperations\
  \ = kafkaOperations;\n}\npublic void sendMail(final Mail mail) {\nvar result = kafkaOperations.send(\"\
  mails\", mail);\nresult.whenComplete((sendResult, ex) -> {\nif (ex == null) {\n\
  System.out.println(\"结果（成功）: \" + sendResult.getRecordMetadata());\n} else {\nex.printStackTrace();\n\
  }\n});\n}\n}\n清单 11-59\n前台实现\n```\n\n## 11-8\\. 总结\n\n本章探讨了 Spring 的消息支持以及如何使用它来构建面向消息的架构。你学习了如何使用不同的消息解决方案来生产和消费消息。针对不同的消息解决方案，你了解了如何使用\
  \ `MessageListenerContainer` 构建消息驱动的 POJO。\n\n我们研究了 JMS 和 AMQP 与 ActiveMQ（一个可靠的开源消息队列）的结合，并简要了解了\
  \ Apache Kafka。\n\n下一章将探讨 Spring Integration，这是一个类似 ESB 的框架，用于构建应用程序集成解决方案，类似于 Mule\
  \ ESB。你将能够利用本章获得的知识，借助 Spring Integration 将你的面向消息的应用程序提升到新的高度。\n\n# 12. Spring Integration\n\
  \n在本章中，你将学习企业应用集成（EAI）背后的原理，许多现代应用程序都使用它来解耦组件之间的依赖关系。Spring 框架提供了一个强大且可扩展的框架，称为\
  \ [Spring Integration](https://spring.io/projects/spring-integration)。Spring Integration\
  \ 为不同系统和数据提供的解耦级别，与核心 Spring 框架为应用程序内部组件提供的解耦级别相同。本章旨在为你提供所有必要的知识，以理解 EAI 中涉及的模式，理解什么是企业服务总线（ESB），并最终理解如何使用\
  \ Spring Integration 构建解决方案。如果你使用过 EAI 服务器或 ESB，你会发现 Spring Integration 明显比你以前可能使用过的任何东西都简单。\n\
  \n完成本章后，你将能够编写相当复杂的 Spring Integration 解决方案来集成应用程序，让它们共享服务和数据。你还将学习 Spring Integration\
  \ 的多种配置选项。如果你愿意，Spring Integration 可以完全在标准 XML 命名空间中进行配置，但你可能会发现使用注解和 XML 的混合方法更自然。你还将了解为什么对于具有经典企业应用集成背景的人来说，Spring\
  \ Integration 是一个非常有吸引力的替代方案。如果你以前使用过 ESB，例如 Mule 或 ServiceMix，或者经典的 EAI 服务器，例如\
  \ Axway Integrator 或 TIBCO ActiveMatrix，那么这里解释的习语应该很熟悉，并且配置会非常直接。\n\n## 12-1\\.\
  \ 使用 EAI 将一个系统与另一个系统集成\n\n### 问题\n\n你有两个需要通过外部接口相互通信的应用程序。你需要在应用程序的服务和/或它们的数据之间建立连接。\n\
  \n### 解决方案\n\n你需要采用 EAI，这是一门使用一组众所周知的模式来集成应用程序和数据的学科。这些模式在一本名为 *Enterprise Integration\
  \ Patterns*（Gregor Hohpe、Bobby Woolf 及其同事著）的里程碑式书籍中得到了有用的总结和体现。如今，这些模式已成为标准，是现代\
  \ ESB 的通用语言。\n\n### 工作原理\n\n\n\n#### 选择集成风格\n\n存在多种集成风格，每种风格都最适合特定类型的应用和需求。基本前提很简单：你的应用无法使用某个系统的原生机制直接与另一个系统通信。因此，你可以设计一种桥接连接，在现有系统之上构建、抽象或绕过其某些特性，从而为调用系统带来优势。每个应用需要抽象的内容各不相同。有时是位置，有时是调用的同步或异步特性，有时是消息传递协议。选择集成风格有许多标准，涉及你希望应用与服务器之间的耦合程度、消息格式的要求等。从某种意义上说，TCP/IP\
  \ 是所有集成技术中最著名的，因为它将一个应用与另一个应用的服务器解耦。\n\n你可能已经构建过使用以下部分或全部集成风格的应用（而且很可能使用了 Spring！）。例如，共享数据库可以轻松通过\
  \ Spring 的 JDBC 支持实现。\n\n四种集成风格如下：\n\n*   **文件传输**：让每个应用生成包含共享数据的文件供其他应用消费，同时消费其他应用生成的文件。\n\
  \n*   **共享数据库**：让应用将需要共享的数据存储在公共数据库中。这通常表现为一个可供不同应用访问的数据库。这通常不是首选方法，因为它意味着将数据暴露给可能不尊重你已设定（但未成文）约束的不同客户端。使用视图和存储过程有时可以让这种方案成为可能，但并不理想。与数据库通信本身并没有特别的支持，但你可以构建一个端点，将\
  \ SQL 数据库中的新结果作为消息负载处理。与数据库的集成往往不是细粒度或面向消息的，而是面向批处理的。毕竟，数据库中新增加的一百万行数据与其说是一个事件，不如说是一个批处理！因此，毫不奇怪，Spring\
  \ Batch（在第 8 章中讨论）为面向 JDBC 的输入和输出提供了出色的支持。\n\n*   **远程过程调用**：让每个应用暴露其部分过程，以便可以远程调用它们，并让其他应用调用这些过程以启动行为并交换数据。Spring\
  \ Integration 提供了对优化 RPC（远程过程调用，如 SOAP 和 RMI）交换的特定支持。\n\n*   **消息传递**：让每个应用连接到一个公共消息系统，并使用消息交换数据和调用行为。这种风格也描述了其他异步或多播发布/订阅架构。从某种意义上说，ESB\
  \ 或 EAI 容器（如 Spring Integration）让你能够像处理消息队列一样处理大多数其他风格：请求进入一个队列，被管理、响应或转发到另一个队列。\n\
  \n#### 基于 ESB 解决方案构建\n\n现在你已经知道了如何处理集成，接下来就是实际实现它。在当今世界，你有很多选择。如果需求足够常见，大多数中间件或框架都会以某种方式满足它。JEE、.NET\
  \ 和其他平台能很好地处理常见情况：SOAP、XML-RPC、EJB 或二进制远程调用等二进制层、JMS 或 MQ 抽象。然而，如果需求有些特殊，或者你需要进行大量配置，那么可能就需要\
  \ ESB。ESB 是一种中间件，它遵循 EAI 描述的模式精神，提供了一种高级方法来建模集成。ESB 提供了一种可管理的配置格式，用于以简单的高级格式编排集成的不同部分。\n\
  \nSpring Integration 是 SpringSource 产品组合中的一个 API，它为建模许多与 Spring 良好配合的集成场景提供了强大的机制。与许多其他\
  \ ESB 相比，Spring Integration 具有许多优势，尤其是其框架的轻量级特性。新兴的 ESB 市场充满了选择。有些是经过改造的旧版 EAI 服务器，以适应以\
  \ ESB 为中心的架构。有些是真正的 ESB，从一开始就为此而构建。还有一些则不过是带有适配器的消息队列。\n\n事实上，如果你正在寻找一个极其强大的 EAI\
  \ 服务器（与 JEE 平台集成且价格不菲），你可以考虑 Axway Integrator。它几乎无所不能。TIBCO 和 webMethods 等供应商因其提供了处理企业集成的出色工具而声名鹊起（并随后被收购）。这些选项虽然强大，但通常非常昂贵且以中间件为中心：你的集成被部署到中间件上。\n\
  \n标准化尝试，例如 Java 业务集成（JBI），已在某种程度上被证明是成功的，并且存在基于这些标准的优秀兼容 ESB（例如 OpenESB 和 ServiceMix）。ESB\
  \ 市场的思想领袖之一是 Mule ESB，它享有良好声誉；它是免费/开源的、社区友好且轻量级。这些特性也使 Spring Integration 具有吸引力。通常，你只需要与另一个开放系统通信，而不想为比某些房子还贵的中间件申请采购批准！\n\
  \n每个 Spring Integration 应用都是完全嵌入式的，不需要服务器基础设施。事实上，你可以将集成部署在另一个应用内部，也许是在你的 Web 应用端点中。Spring\
  \ Integration 颠覆了大多数 ESB 的部署范式：你将 Spring Integration 部署到你的应用中，而不是将你的应用部署到 Spring\
  \ Integration 中。没有启动和停止脚本，也没有需要守护的端口。最简单的可运行 Spring Integration 应用就是一个简单的 Java `public\
  \ static void main()` 方法来启动 Spring 上下文。\n\n```\npackage com.apress.spring6recipes.springintegration;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  public class Main {\npublic static void main(String [] args){\nvar cfg = IntegrationConfiguration.class;\n\
  try (var ctx = new AnnotationConfigApplicationContext(cfg)) {}\n}\n}\n清单 12-1\n\
  Main 类\n```\n\n你创建了一个标准的 Spring 应用上下文并启动了它。Spring 应用上下文的内容将在后续的配方中讨论，但了解它有多么简单是有帮助的。你可以决定将上下文提升到\
  \ Web 应用、EJB 容器或任何其他你想要的环境中。事实上，你可以使用 Spring Integration 来驱动 Swing/JavaFX 应用中的电子邮件轮询功能！它可以根据你的需要做到尽可能轻量。\n\
  \n## 12-2\\. 使用 JMS 集成两个系统\n\n### 问题\n\n你希望构建一个集成，使用 JMS 将一个应用连接到另一个应用。JMS 为 Java\
  \ 应用在现代中间件上提供了位置和时间上的解耦。你希望应用更复杂的路由，并希望将代码与消息来源（在本例中为 JMS 队列或主题）的具体细节隔离开来。\n\n\n\
  \n### 解决方案\n\n虽然你可以通过常规的 JMS 代码、EJB 对消息驱动 Bean（MDB）的支持，或使用核心 Spring 的消息驱动 POJO（MDP）支持来实现这一点，但这些方法都必然是为处理特定来自\
  \ JMS 的消息而编写的。你的代码与 JMS 紧密耦合。使用 ESB 可以让你对处理消息的代码隐藏消息的来源。你将使用此解决方案作为了解如何构建 Spring\
  \ Integration 解决方案的简便途径。Spring Integration 提供了一种处理 JMS 的简便方法，就像你在核心 Spring 容器中使用\
  \ MDP 一样。然而在这里，你可以设想将 JMS 中间件替换为电子邮件，而响应消息的代码可以保持不变。\n\n### 工作原理\n\n\n\n#### 使用\
  \ Spring Integration 构建消息驱动 POJO (MDP)\n\n你可能还记得第 11 章的内容，Spring 可以通过使用消息驱动 POJO\
  \ 来替代消息驱动 Bean 的功能。对于任何想要构建处理消息队列中消息的应用程序的人来说，这是一个强大的解决方案。你将构建一个 MDP，但会使用 Spring\
  \ Integration 更简洁的配置来配置它，并提供一个非常基础的集成示例。这个集成所做的全部工作就是接收一个入站 JMS 消息（其负载类型为 `Map<String,Object>`）并将其写入日志。\n\
  \n与标准的 MDP 一样，需要配置 `ConnectionFactory`。下面是一个配置类。你可以在创建 Spring `ApplicationContext`\
  \ 时将其作为参数传入（就像你在上一个示例的 `Main` 类中所做的那样）。\n\n```\npackage com.apress.spring6recipes.springintegration;\n\
  import jakarta.jms.ConnectionFactory;\nimport org.apache.activemq.artemis.jms.client.ActiveMQConnectionFactory;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.integration.config.EnableIntegration;\n\
  import org.springframework.integration.dsl.IntegrationFlow;\nimport org.springframework.integration.jms.dsl.Jms;\n\
  import org.springframework.jms.connection.CachingConnectionFactory;\nimport org.springframework.jms.core.JmsTemplate;\n\
  @Configuration\n@EnableIntegration\npublic class IntegrationConfiguration {\n@Bean\n\
  public CachingConnectionFactory connectionFactory() {\nvar connectionFactory = new\
  \ ActiveMQConnectionFactory(\"tcp://localhost:61616\");\nreturn new CachingConnectionFactory(connectionFactory);\n\
  }\n@Bean\npublic JmsTemplate jmsTemplate(ConnectionFactory connectionFactory) {\n\
  return new JmsTemplate(connectionFactory);\n}\n@Bean\npublic InboundHelloWorldJMSMessageProcessor\
  \ messageProcessor() {\nreturn new InboundHelloWorldJMSMessageProcessor();\n}\n\
  @Bean\npublic IntegrationFlow jmsInbound(ConnectionFactory connectionFactory,\n\
  InboundHelloWorldJMSMessageProcessor messageProcessor) {\nreturn IntegrationFlow\n\
  .from(Jms.messageDrivenChannelAdapter(connectionFactory).extractPayload(true).destination(\"\
  recipe-12-2\"))\n.handle(messageProcessor)\n.get();\n}\n}\n清单 12-2\nSpring Integration\
  \ 配置\n```\n\n请注意 `@EnableIntegration`；这将引入 Spring Integration 运行所需的组件，并在配置类中检测所需的\
  \ Bean 和配置。其余部分则是一个相当普通的 Java 配置类。你定义 `connectionFactory` 的方式与配置标准 MDP 时完全相同。`JmsTemplate`\
  \ 也存在，因此我们可以使用它从主类发送消息。\n\n然后，你定义此解决方案特有的任何 Bean：在本例中，是一个响应来自消息队列的消息的 Bean，即 `messageProcessor`。服务激活器是\
  \ Spring Integration 中的一个通用端点，用于调用功能——无论是服务中的操作、常规 POJO 中的某个例程，还是你想要的任何其他功能——以响应输入通道上发送的消息。虽然这将在后面详细讨论，但这里之所以有趣，仅仅是因为你用它来响应消息。这些\
  \ Bean 共同构成了解决方案中的协作者，这个示例相当具有代表性，展示了大多数集成的样子：你定义协作组件，然后使用 Spring Integration Java\
  \ DSL 定义流程，从而配置解决方案本身。\n\n![](img/314861_5_En_12_Figa_HTML.gif)一个灯泡轮廓图标。  此外，还有\
  \ Spring Integration Groovy DSL。\n\n配置从 `IntegrationFlow` 开始，它用于定义消息如何在系统中流动。流程从定义\
  \ `messageDrivenChannelAdapter` 开始，它基本上从 `recipe-12-2` 目标接收消息，并将它们传递给 Spring Integration\
  \ 通道。由于我们只想要负载（请参阅下一部分），因此我们指定了 `extractPayload(true)`。顾名思义，`messageDrivenChannelAdapter`\
  \ 是一个适配器。适配器是一个知道如何与特定类型的子系统通信，并将该子系统上的消息转换为可在 Spring Integration 总线中使用的消息的组件。适配器也反向执行相同操作，即接收\
  \ Spring Integration 总线上的消息，并将其转换为特定子系统能够理解的消息。这与服务激活器（将在后面介绍）不同，因为它旨在作为总线与外部端点之间的通用连接。而服务激活器仅帮助你在收到消息时调用应用程序的业务逻辑。你在业务逻辑中做什么（是否连接到另一个系统）完全取决于你。\n\
  \n下一个组件是服务激活器，它监听进入该通道的消息，并通过 `handle` 方法调用所引用的 Bean，在本例中就是之前定义的 `messageProcessor`\
  \ Bean。由于组件的方法上带有 `@ServiceActivator` 注解，Spring Integration 知道要调用哪个方法。\n\n```\n\
  package com.apress.spring6recipes.springintegration;\nimport org.slf4j.Logger;\n\
  import org.slf4j.LoggerFactory;\nimport org.springframework.integration.annotation.ServiceActivator;\n\
  import org.springframework.messaging.Message;\nimport java.util.Map;\npublic class\
  \ InboundHelloWorldJMSMessageProcessor {\nprivate final Logger logger = LoggerFactory.getLogger(getClass());\n\
  @ServiceActivator\npublic void handleIncomingJmsMessage(\nMessage> inboundJmsMessage)\
  \ {\nvar payload = inboundJmsMessage.getPayload();\nlogger.info(\"Received: {}\"\
  , payload);\n}\n}\n清单 12-3\n服务激活器\n```\n\n请注意，有一个注解 `@ServiceActivator`，它告诉 Spring\
  \ 将此组件及其方法配置为来自通道的消息负载的接收者，该负载作为 `Message<Map<String, Object>> inboundJmsMessage`\
  \ 传递给该方法。在前面的配置中，`extractPayload(true)` 告诉 Spring Integration 从 JMS 队列中获取消息的负载（在本例中为\
  \ `Map<String,Object>`），将其提取出来，并作为正在通过 Spring Integration 通道移动的消息的负载（类型为 `org.springframework.messaging.Message`）进行传递。不要将\
  \ Spring 的 `Message` 与 JMS 的 `Message` 接口混淆，尽管它们有一些相似之处。如果你没有指定 `extractPayload`\
  \ 选项，那么 Spring `Message` 接口上的负载类型将是 `jakarta.jms.Message`。提取负载的责任将落在你（开发者）身上，但有时访问该信息是有用的。如果重写以处理解包\
  \ `jakarta.jms.Message`，该示例看起来会略有不同。\n\n```\npackage com.apress.spring6recipes.springintegration;\n\
  import jakarta.jms.JMSException;\nimport jakarta.jms.MapMessage;\nimport org.slf4j.Logger;\n\
  import org.slf4j.LoggerFactory;\nimport org.springframework.integration.annotation.ServiceActivator;\n\
  import org.springframework.messaging.Message;\nimport java.util.Map;\npublic class\
  \ InboundHelloWorldJMSMessageProcessor {\nprivate final Logger logger = LoggerFactory.getLogger(getClass());\n\
  @ServiceActivator\npublic void handleIncomingJmsMessageWithPayloadNotExtracted(\n\
  Message msgWithJmsMessageAsPayload) throws Throwable {\nvar payload = (MapMessage)\
  \ msgWithJmsMessageAsPayload.getPayload();\nlogger.debug(\"Received: {}\", convert(payload));\n\
  }\nprivate Map convert(MapMessage msg) throws JMSException {\nreturn Map.of(\n\"\
  firstName\", msg.getString(\"firstName\"),\n\"lastName\", msg.getString(\"lastName\"\
  ),\n\"id\", msg.getLong(\"id\"));\n}\n}\n清单 12-4\n服务激活器 - 未提取负载\n```\n\n你可以将负载类型指定为方法参数的类型。例如，如果来自\
  \ JMS 的消息负载类型是 `Cat`，那么方法原型同样可以是 `public void handleIncomingJmsMessageWithPayloadNotExtracted(Cat\
  \ inboundJmsMessage) throws Throwable`。Spring Integration 会找出正确的处理方式。在本例中，我们更倾向于访问\
  \ Spring 的 `Message`，因为它包含可用于检查的有用标头值。\n\n另请注意，你不需要指定 `throws Throwable`。在 Spring\
  \ Integration 中，错误处理可以像你想要的那样通用或具体。\n\n在示例中，你使用 `@ServiceActivator` 来调用集成结束时的功能。但是，你可以通过从方法返回值，将激活的响应转发到下一个通道。返回值的类型将用于确定系统中发送的下一条消息。如果你返回一个\
  \ `Message`，它将直接被发送。如果你返回的不是 `Message`，则该值将被包装为 `Message` 实例中的负载，并成为最终发送到处理管道中下一个组件的下一条\
  \ `Message`。此 `Message` 将在服务激活器上配置的输出通道上发送。不要求输出通道上发送的消息与输入通道上来的消息具有相同的类型；这是一种转换消息类型的有效方式。服务激活器是一个非常灵活的组件，可用于挂接到你的系统并帮助塑造集成。\n\
  \n这个解决方案相当直接，就单个 JMS 队列的配置而言，它并不比直接的 MDP 更有优势，因为需要克服一个额外的间接层。Spring Integration\
  \ 的功能使得构建复杂的集成比 Spring Core 更容易，因为配置是集中式的。你可以鸟瞰整个集成，路由和处理都集中在一起，因此你可以更好地重新定位集成中的组件。然而，正如你将看到的，Spring\
  \ Integration 并非旨在与 EJB 和 Spring Core 竞争；它在那些无法使用 EJB3 或 Spring Core 自然构建的解决方案中大放异彩。\n\
  \n\n\n## 12-3\\. 查询 Spring Integration 消息以获取上下文信息\n\n### 问题\n\n你希望获取进入 Spring Integration\
  \ 处理管道的消息的更多信息，而不仅仅是消息类型隐含提供的内容。\n\n### 解决方案\n\n查询 Spring Integration 的 `Message`\
  \ 以获取该消息特有的标头信息。这些值以映射（类型为 `Map<String,Object>`）中的标头值形式枚举。\n\n### 工作原理\n\n\n\n####\
  \ 妙用 MessageHeaders：乐趣与收益\n\nSpring 的 `Message` 接口是一个通用包装器，它包含一个指向消息实际载荷的指针，以及提供上下文消息元数据的标头。你可以操作或扩充这些元数据，以启用/增强下游组件的功能；例如，通过电子邮件发送消息时，指定\
  \ TO/FROM 标头会非常有用。\n\n当你向框架暴露一个类来处理某些需求（例如为服务激活器组件或转换器组件提供的逻辑）时，总会有机会与 `Message`\
  \ 和消息标头进行交互。请记住，Spring Integration 会通过处理管道推送 `Message`。每个与 `Message` 实例交互的组件都必须对其执行操作、进行处理或将其转发。向这些组件提供信息，以及获取关于组件中到目前为止发生的情况的信息的一种方法，就是查询\
  \ `MessageHeaders`。\n\n在使用 Spring Integration 时，有几个值你应该了解（见表 12-1 和 12-2）。这些常量在\
  \ `org.springframework.messaging.MessageHeaders` 和 `org.springframework.integration.IntegrationMessageHeaderAccessor`\
  \ 类中公开。\n\n表 12-1\n\n核心 Spring Messaging 中的常见标头\n\n| 常量 | 描述 |\n| --- | --- |\n\
  | `ID` | 这是由 Spring Integration 引擎分配给消息的唯一值。 |\n| `TIMESTAMP` | 分配给消息的时间戳。 |\n|\
  \ `REPLY_CHANNEL` | 当前组件的输出应发送到的通道的字符串名称。此值可被覆盖。 |\n| `ERROR_CHANNEL` | 如果异常冒泡到运行时，当前组件的输出应发送到的通道的字符串名称。此值可被覆盖。\
  \ |\n| `CONTENT_TYPE` | 消息的内容类型（MIME 类型），主要用于 WebSocket 消息。 |\n\n除了 Spring Messaging\
  \ 定义的标头之外，Spring Integration 中还有一些常用的标头。这些标头定义在 `org.springframework.integration.IntegrationMessageHeaderAccessor`\
  \ 类中（见表 12-2）。\n\n表 12-2\n\nSpring Integration 中的常见标头\n\n| 常量 | 描述 |\n| --- | ---\
  \ |\n| `CORRELATION_ID` | 这是可选的。某些组件（如聚合器）使用它来在某种处理管道中将消息分组在一起。 |\n| `EXPIRATION_DATE`\
  \ | 某些组件将其用作处理的时间阈值，超过该时间后组件将不再等待处理。 |\n| `PRIORITY` | 消息的优先级；数字越大表示优先级越高。 |\n|\
  \ `SEQUENCE_NUMBER` | 消息排序的顺序，通常与排序器一起使用。 |\n| `SEQUENCE_SIZE` | 序列的大小，以便聚合器知道何时停止等待更多消息并继续前进。这在实现“连接”功能时非常有用。\
  \ |\n| `DUPLICATE_MESSAGE` | 如果幂等接收器检测到消息是重复的，则为 `true`。 |\n| `DELIVERY_ATTEMPT`\
  \ | 当消息驱动适配器支持重试时，此标头包含当前的传递尝试次数。 |\n| `CLOSEABLE_RESOURCE` | 如果消息附加到可关闭的资源（如 FTP\
  \ 会话或文件资源）。 |\n\n某些标头值特定于源消息载荷的类型；例如，来自文件系统上文件的载荷与来自 JMS 队列的载荷不同，而后者又与来自电子邮件系统的消息不同。这些不同的组件通常打包在自己的\
  \ JAR 中，并且通常有一些类提供用于访问这些标头的常量。组件特定标头的一个示例是在 `org.springframework.integration.file.FileHeaders`\
  \ 上为文件定义的常量：`FILENAME` 和 `PREFIX`。当然，如果有疑问，你可以手动枚举这些值，因为标头只是一个 `java.util.Map` 实例。\n\
  \n```\npackage com.apress.spring6recipes.springintegration;\nimport org.slf4j.Logger;\n\
  import org.slf4j.LoggerFactory;\nimport org.springframework.integration.annotation.ServiceActivator;\n\
  import org.springframework.messaging.Message;\nimport java.io.File;\npublic class\
  \ InboundFileMessageServiceActivator {\nprivate final Logger logger = LoggerFactory.getLogger(getClass());\n\
  @ServiceActivator\npublic void interrogateMessage(Message message) {\nvar headers\
  \ = message.getHeaders();\nheaders.forEach( (k,v) -> logger.debug(\"{} : {}\", k,\
  \ v));\n}\n}\n清单 12-5\n通过 Message 访问标头\n```\n\n这些标头允许你查询这些消息的特定功能，而无需在不需要时将它们作为具体的接口依赖暴露出来。它们还可以用于帮助处理，并允许你向下游组件指定自定义元数据。为下游组件提供额外数据的行为称为消息富化。消息富化是指你获取给定\
  \ `Message` 的标头并向其中添加内容，通常是为了处理管道中下游组件的好处。你可以想象处理一条消息，将客户添加到客户关系管理（CRM）系统中，该系统会调用第三方网站来建立信用评级。此信用信息被添加到标头中，以便负责添加客户或拒绝客户的下游组件可以做出决策。\n\
  \n另一种访问标头元数据的方法是简单地将它们作为参数传递给组件的方法。你只需使用 `@Header` 注解标注该参数，Spring Integration 就会处理其余部分。\n\
  \n```\npackage com.apress.spring6recipes.springintegration;\nimport org.slf4j.Logger;\n\
  import org.slf4j.LoggerFactory;\nimport org.springframework.integration.annotation.ServiceActivator;\n\
  import org.springframework.integration.file.FileHeaders;\nimport org.springframework.messaging.MessageHeaders;\n\
  import org.springframework.messaging.handler.annotation.Header;\nimport java.io.File;\n\
  public class InboundFileMessageServiceActivator {\nprivate final Logger logger =\
  \ LoggerFactory.getLogger(getClass());\n@ServiceActivator\npublic void interrogateMessage(\n\
  @Header(MessageHeaders.ID) String uuid,\n@Header(FileHeaders.FILENAME) String fileName,\
  \ File file) {\nvar msg = \"the id of the message is {}, and name of the file payload\
  \ is {}\";\nlogger.debug(msg, uuid, fileName);\n}\n}\n清单 12-6\n通过 @Header 访问单个标头\n\
  ```\n\n你还可以让 Spring Integration 传递 `Map<String,Object>`，方法是用 `@Headers` 注解该类型的参数。\n\
  \n```\npackage com.apress.spring6recipes.springintegration;\nimport org.slf4j.Logger;\n\
  import org.slf4j.LoggerFactory;\nimport org.springframework.integration.annotation.ServiceActivator;\n\
  import org.springframework.integration.file.FileHeaders;\nimport org.springframework.messaging.MessageHeaders;\n\
  import org.springframework.messaging.handler.annotation.Headers;\nimport java.io.File;\n\
  import java.util.Map;\npublic class InboundFileMessageServiceActivator {\nprivate\
  \ final Logger logger = LoggerFactory.getLogger(InboundFileMessageServiceActivator.class);\n\
  @ServiceActivator\npublic void interrogateMessage(\n@Headers Map headers, File file)\
  \ {\nvar msg = \"the id of the message is {}, and name of the file payload is {}\"\
  ;\nvar id = headers.get(MessageHeaders.ID);\nvar filename = headers.get(FileHeaders.FILENAME);\n\
  logger.debug(msg, id, filename);\n}\n}\n清单 12-7\n通过 @Headers 访问标头\n```\n\n## 12-4\\\
  . 使用文件系统集成两个系统\n\n\n\n### 问题\n\n你希望构建一个解决方案，能够获取知名共享文件系统中的文件，并将其作为与另一个系统集成的通道。例如，你的应用程序每小时生成一个包含所有新增客户的逗号分隔值（CSV）转储文件。公司的第三方财务系统通过一个进程来更新这些销售数据，该进程会检查挂载在网络文件系统上的共享文件夹，并处理\
  \ CSV 记录。这里需要一种方法，将新文件的出现视为总线上的一个事件。\n\n### 解决方案\n\n你大致知道如何使用标准技术来构建这个方案，但你想要更优雅的实现。让\
  \ Spring Integration 将你从文件系统的事件驱动特性以及文件输入/输出需求中解放出来，转而专注于编写处理 `java.io.File` 有效载荷本身的代码。通过这种方式，你可以编写可进行单元测试的代码，该代码接收输入并通过将客户添加到财务系统来做出响应。功能完成后，你可以在\
  \ Spring Integration 管道中对其进行配置，并让 Spring Integration 在文件系统上识别到新文件时调用你的功能。这是事件驱动架构（EDA）的一个示例。EDA\
  \ 让你忽略事件是如何生成的，而专注于对事件做出反应，这与事件驱动的 GUI 让你将代码的关注点从控制用户如何触发动作，转移到实际对调用本身做出反应的方式非常相似。Spring\
  \ Integration 使其成为构建松耦合解决方案的自然方法。事实上，这段代码看起来应该与你为 JMS 队列构建的解决方案非常相似，因为它只是另一个接受参数（一个\
  \ Spring Integration `Message<T>`，一个与消息有效载荷类型相同的参数等）的类。\n\n### 工作原理\n\n#### 处理文件系统时需关注的问题\n\
  \n构建一个与 JMS 通信的解决方案已是老生常谈。相反，让我们考虑一下使用共享文件系统构建解决方案可能是什么样子。想象一下，在没有 ESB 解决方案的情况下如何构建它。你需要某种机制来定期轮询文件系统并检测新文件。也许需要\
  \ Quartz 和某种缓存？你需要快速读取这些文件，然后将有效载荷高效地传递给处理逻辑。最后，你的系统需要处理该有效载荷。\n\nSpring Integration\
  \ 将你从所有这些基础设施代码中解放出来；你只需要进行配置。然而，处理基于文件系统的集成存在一些问题需要你自己解决。在幕后，Spring Integration\
  \ 仍然在处理轮询文件系统和检测新文件。它不可能为你的应用程序提供一个语义上完全正确的关于文件何时“完全”写入的判断，因此，提供一种规避方法是你自己的责任。\n\
  \n有几种方法可供选择。你可以先写入一个文件，然后再写入另一个零字节文件。该文件的存在意味着可以安全地假设实际的有效载荷已就绪。配置 Spring Integration\
  \ 来查找该文件。如果找到它，就知道还有另一个文件（可能具有相同的名称但不同的文件扩展名？），并且可以开始读取/处理它。另一个类似的解决方案是让客户端（“生产者”）使用\
  \ Spring Integration 用于轮询目录的 glob 模式无法检测到的名称将文件写入目录。然后，在写入完成后，如果你信任你的文件系统能正确处理，就执行\
  \ `mv` 命令。\n\n让我们重新审视第一个解决方案，但这次使用基于文件的适配器。配置在概念上与之前相同，只是适配器的配置发生了变化，并且随之而来的是 JMS\
  \ 适配器的大量配置（如连接工厂）消失了。相反，你告诉 Spring Integration 消息将来自另一个源：文件系统。\n\n```\npackage com.apress.spring6recipes.springintegration;\n\
  import org.springframework.beans.factory.annotation.Value;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.integration.config.EnableIntegration;\n\
  import org.springframework.integration.dsl.IntegrationFlow;\nimport org.springframework.integration.dsl.Pollers;\n\
  import org.springframework.integration.file.dsl.Files;\nimport java.io.File;\nimport\
  \ java.time.Duration;\n@Configuration\n@EnableIntegration\npublic class IntegrationConfiguration\
  \ {\n@Bean\npublic InboundHelloWorldFileMessageProcessor messageProcessor() {\n\
  return new InboundHelloWorldFileMessageProcessor();\n}\n@Bean\npublic IntegrationFlow\
  \ inboundFileFlow(\n@Value(\"${user.home}/inboundFiles/new/\") File directory) {\n\
  return IntegrationFlow\n.from(\nFiles.inboundAdapter(directory).patternFilter(\"\
  *.csv\"),\nc -> c.poller(Pollers.fixedRate(Duration.ofSeconds(10))))\n.handle(messageProcessor())\n\
  .get();\n}\n}\n清单 12-8\n集成配置\n```\n\n这实际上并不是你从未见过的东西。`Files.inboundAdapter` 的代码是唯一的新元素。`@ServiceActivator`\
  \ 的代码已更改，以反映你期望接收类型为 `Message<java.io.File>` 的消息。\n\n```\npackage com.apress.spring6recipes.springintegration;\n\
  import java.io.File;\nimport org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\n\
  import org.springframework.integration.annotation.ServiceActivator;\nimport org.springframework.messaging.Message;\n\
  public class InboundHelloWorldFileMessageProcessor {\nprivate final Logger logger\
  \ = LoggerFactory.getLogger(getClass());\n@ServiceActivator\npublic void handleIncomingFileMessage(Message\
  \ inbound) {\nvar filePayload = inbound.getPayload();\nlogger.debug(\"absolute path:\
  \ {}, size: {}\",\nfilePayload.getAbsolutePath(), filePayload.length());\n}\n}\n\
  清单 12-9\n修改后的服务激活器\n```\n\n## 12-5\\. 将消息从一种类型转换为另一种类型\n\n### 问题\n\n你希望将消息发送到总线，并在进一步处理之前对其进行转换。通常，这样做是为了使消息适应下游组件的需求。你可能还希望通过丰富消息来转换它——添加额外的头部或扩充有效载荷，以便处理管道中的下游组件能够从中受益。\n\
  \n### 解决方案\n\n使用转换器组件接收一个具有某种有效载荷类型的 `Message<T>`，并输出一个具有不同有效载荷类型的 `Message<T>`。你还可以使用转换器为下游处理管道中的组件添加额外的头部或更新头部的值。\n\
  \n### 工作原理\n\nSpring Integration 提供了一个转换器消息端点，以允许扩充消息头部或转换消息本身。在 Spring Integration\
  \ 中，组件被链接在一起，一个组件的输出通过为该组件调用的方法返回。该方法的返回值通过组件的“回复通道”传递给下一个组件，下一个组件将其作为输入参数接收。转换器组件允许你更改返回对象的类型或添加额外的头部，并且这个更新后的对象会被传递给链中的下一个组件。\n\
  \n\n\n#### 修改消息的有效载荷\n\n转换器组件的配置与你目前所见到的内容非常一致。\n\n```\npackage com.apress.spring6recipes.springintegration;\n\
  import org.springframework.integration.annotation.Transformer;\nimport org.springframework.messaging.Message;\n\
  import java.util.Map;\npublic class InboundJMSMessageToCustomerTransformer {\n@Transformer\n\
  public Customer transformJMSMapToCustomer(Message> inboundSprignIntegrationMessage)\
  \ {\nvar jmsPayload = inboundSprignIntegrationMessage.getPayload();\nreturn convert(jmsPayload);\n\
  }\nprivate Customer convert(Map payload) {\nreturn new Customer(\n(Long) payload.get(\"\
  id\"),\n(String) payload.get(\"firstName\"),\n(String) payload.get(\"lastName\"\
  ),\n(String) payload.getOrDefault(\"telephone\", null),\n(Float) payload.getOrDefault(\"\
  creditScore\", 0f));\n}\n}\n清单 12-10\n消息转换器\n```\n\n这里并没有发生什么特别复杂的事情：传入了一个类型为 `Map<String,Object>`\
  \ 的 `Message`。手动提取这些值，并用它们来构建一个 `Customer` 类型的对象。返回 `Customer` 对象，其效果是将其传递到该组件的回复通道上。配置中的下一个组件将接收此对象作为其类型为\
  \ `Customer` 的输入 `Message`。\n\n```\npackage com.apress.spring6recipes.springintegration;\n\
  public record Customer(\nlong id, String firstName, String lastName,\nString telephone,\
  \ float creditScore) {\n}\n清单 12-11\nCustomer 类\n```\n\n解决方案与你之前看到的大致相同，但有一个新的转换器方法。\n\
  \n```\npackage com.apress.spring6recipes.springintegration;\nimport jakarta.jms.ConnectionFactory;\n\
  import org.apache.activemq.artemis.jms.client.ActiveMQConnectionFactory;\nimport\
  \ org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.ComponentScan;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.integration.config.EnableIntegration;\n\
  import org.springframework.integration.dsl.IntegrationFlow;\nimport org.springframework.integration.jms.dsl.Jms;\n\
  import org.springframework.jms.connection.CachingConnectionFactory;\nimport org.springframework.jms.core.JmsTemplate;\n\
  @Configuration\n@EnableIntegration\npublic class IntegrationConfiguration {\n@Bean\n\
  public CachingConnectionFactory connectionFactory() {\nvar connectionFactory = new\
  \ ActiveMQConnectionFactory(\"tcp://localhost:61616\");\nreturn new CachingConnectionFactory(connectionFactory);\n\
  }\n@Bean\npublic JmsTemplate jmsTemplate(ConnectionFactory connectionFactory) {\n\
  return new JmsTemplate(connectionFactory);\n}\n@Bean\npublic InboundJMSMessageToCustomerTransformer\
  \ customerTransformer() {\nreturn new InboundJMSMessageToCustomerTransformer();\n\
  }\n@Bean\npublic InboundCustomerServiceActivator customerServiceActivator() {\n\
  return new InboundCustomerServiceActivator();\n}\n@Bean\npublic IntegrationFlow\
  \ jmsInbound(ConnectionFactory connectionFactory) {\nreturn IntegrationFlow\n.from(Jms.messageDrivenChannelAdapter(connectionFactory)\n\
  .extractPayload(true).destination(\"recipe-12-5\"))\n.transform(customerTransformer())\n\
  .handle(customerServiceActivator())\n.get();\n}\n}\n清单 12-12\n包含转换器的集成配置\n```\n\n\
  在这里，你指定了一个 `messageDrivenChannelAdapter`，它将传入的内容移动到 `InboundJMSMessageToCustomerTransformer`，后者将其转换为一个\
  \ `Customer`。然后，该 `Customer` 被发送到 `InboundCustomerServiceActivator`。\n\n现在，下一个组件中的代码可以毫无顾虑地声明对\
  \ `Customer` 类的依赖。通过转换器，你可以从任意数量的源接收消息并将其转换为 `Customer`，从而可以重用 `InboundCustomerServiceActivator`。\n\
  \n```\npackage com.apress.spring6recipes.springintegration;\nimport org.slf4j.Logger;\n\
  import org.slf4j.LoggerFactory;\nimport org.springframework.integration.annotation.ServiceActivator;\n\
  import org.springframework.messaging.Message;\npublic class InboundCustomerServiceActivator\
  \ {\nprivate final Logger logger = LoggerFactory.getLogger(getClass());\n@ServiceActivator\n\
  public void doSomethingWithCustomer(Message customerMessage) {\nvar customer = customerMessage.getPayload();\n\
  logger.debug(\"Received: {}\", customer);\n}\n}\n清单 12-13\n接收客户的服务激活器\n```\n\n####\
  \ 修改消息的标头\n\n有时仅更改消息的有效载荷是不够的。有时你需要同时更新有效载荷和标头。这样做会稍微有趣一些，因为它涉及到使用 `MessageBuilder`\
  \ 类，该类允许你使用任何指定的有效载荷和任何指定的标头数据来创建新的 `Message` 对象。在这种情况下，配置是相同的。\n\n```\npackage\
  \ com.apress.spring6recipes.springintegration;\nimport org.springframework.integration.annotation.Transformer;\n\
  import org.springframework.integration.support.MessageBuilder;\nimport org.springframework.messaging.Message;\n\
  import java.util.Map;\npublic class InboundJMSMessageToCustomerTransformer {\n@Transformer\n\
  public Message transformJMSMapToCustomer(\nMessage> inboundSprignIntegrationMessage)\
  \ {\nvar jmsPayload = inboundSprignIntegrationMessage.getPayload();\nvar customer\
  \ = convert(jmsPayload);\nreturn MessageBuilder.withPayload(customer)\n.copyHeadersIfAbsent(inboundSprignIntegrationMessage.getHeaders())\n\
  .setHeaderIfAbsent(\"randomlySelectedForSurvey\", Math.random() > .5)\n.build();\n\
  }\nprivate Customer convert(Map payload) {\nreturn new Customer(\n(Long) payload.get(\"\
  id\"),\n(String) payload.get(\"firstName\"),\n(String) payload.get(\"lastName\"\
  ),\n(String) payload.getOrDefault(\"telephone\", null),\n(Float) payload.getOrDefault(\"\
  creditScore\", 0f));\n}\n}\n清单 12-14\n使用 MessageBuilder 的消息转换器\n```\n\n和之前一样，这段代码只是一个带有输入和输出的方法。输出是使用\
  \ `MessageBuilder` 动态构建的，用于创建一条消息，该消息具有与输入消息相同的有效载荷，同时复制现有的标头并添加一个额外的标头：`randomlySelectedForSurvey`。我们不能重用现有的消息，因为在\
  \ Spring Messaging 和 Spring Integration 中，消息默认是不可变的，因此需要创建新消息并复制标头。\n\n## 12-6\\\
  . 使用 Spring Integration 进行错误处理\n\n### 问题\n\nSpring Integration 将分布在不同节点、计算机、服务、协议和语言栈上的系统整合在一起。实际上，一个\
  \ Spring Integration 解决方案甚至可能无法在与启动时大致相同的时间段内完成。因此，对于任何具有异步行为的组件，异常处理永远不可能像单线程中的语言级\
  \ try/catch 块那样简单。这意味着，对于你可能构建的许多类型的解决方案（使用任何类型的通道和队列），都需要一种向创建错误的组件发出错误信号的方式，这种方式是分布式的且自然的。因此，错误可能会通过\
  \ JMS 队列发送到另一个大洲，或者在同一进程内通过不同线程的队列发送。\n\n### 解决方案\n\n使用 Spring Integration 对错误通道的支持，既可以通过代码隐式实现，也可以显式实现。\n\
  \n### 工作原理\n\nSpring Integration 提供了捕获异常并将其发送到你选择的错误通道的能力。默认情况下，它是一个名为 `errorChannel`\
  \ 的全局通道。默认情况下，Spring Integration 会向此通道注册一个 `LoggingHandler`，它除了记录异常和堆栈跟踪之外什么也不做。为了使其工作，我们必须告诉消息驱动通道适配器，我们希望将错误发送到\
  \ `errorChannel`。我们可以通过配置错误通道属性来实现这一点。\n\n```\n@Bean\npublic IntegrationFlow jmsInbound(ConnectionFactory\
  \ connectionFactory) {\nreturn IntegrationFlow\n.from(Jms.messageDrivenChannelAdapter(connectionFactory)\n\
  .extractPayload(true).destination(\"recipe-12-6\")\n.errorChannel(\"errorChannel\"\
  ))\n.transform(customerTransformer())\n.handle(customerServiceActivator())\n.get();\n\
  }\n清单 12-15\n用于错误通道的集成配置\n```\n\n\n\n#### 自定义处理器处理异常\n\n当然，你也可以让组件订阅此通道的消息，以覆盖异常处理行为。你可以创建一个类，每当\
  \ `errorChannel` 上有消息传入时，该类就会被调用。\n\n```\n@Bean\npublic DefaultErrorHandlingServiceActivator\
  \ errorHandlingServiceActivator() {\nreturn new DefaultErrorHandlingServiceActivator();\n\
  }\n@Bean\npublic IntegrationFlow errorFlow() {\nreturn IntegrationFlow\n.from(\"\
  errorChannel\")\n.handle(errorHandlingServiceActivator())\n.get();\n}\n清单 12-16\n\
  自定义处理器的集成配置\n```\n\n这段 Java 代码与你预期完全一致。当然，从 `errorChannel` 接收错误消息的组件不一定是服务激活器。我们在这里使用它只是为了方便。以下服务激活器的代码展示了为\
  \ `errorChannel` 构建处理器时可能用到的一些机制。\n\n```\npackage com.apress.spring6recipes.springintegration;\n\
  import org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\nimport org.springframework.integration.annotation.ServiceActivator;\n\
  import org.springframework.messaging.Message;\nimport org.springframework.messaging.MessagingException;\n\
  public class DefaultErrorHandlingServiceActivator {\nprivate final Logger logger\
  \ = LoggerFactory.getLogger(getClass());\n@ServiceActivator\npublic void handleThrowable(Message\
  \ errorMessage) {\nvar throwable = errorMessage.getPayload();\nlogger.error(\"Message:\
  \ {}\", throwable.getMessage(), throwable);\nif (throwable instanceof MessagingException\
  \ me) {\nMessage failedMessage = me.getFailedMessage();\nif (failedMessage != null)\
  \ {\n// 对原始消息进行处理\n}\n} else {\n// 这是在你创建的某个组件的代码执行过程中抛出的异常\n}\n}\n}\n清单 12-17\n\
  用于错误处理的服务激活器\n```\n\n所有从 Spring Integration 组件抛出的错误都是 `MessagingException` 的子类。`MessagingException`\
  \ 携带了一个指向导致错误的原始 `Message` 的指针，你可以通过分析它来获取更多上下文信息。在示例中，你使用了 `instanceof` 判断。显然，能够根据异常类型委托给自定义异常处理器会非常有用。\n\
  \n#### 根据异常类型路由到自定义处理器\n\n有时，需要更具体的错误处理。在以下代码中，该路由器被配置为异常类型路由器，它监听 `errorChannel`。然后，它根据异常类型作为判断条件，决定将结果发送到哪个通道。\n\
  \n```\n@Bean\npublic ErrorMessageExceptionTypeRouter exceptionTypeRouter() {\nvar\
  \ mappings = Map.of(\nMyCustomException.class.getName(), \"customExceptionChannel\"\
  ,\nRuntimeException.class.getName(), \"runtimeExceptionChannel\",\nMessageHandlingException.class.getName(),\
  \ \"messageHandlingExceptionChannel\"\n);\nvar router = new ErrorMessageExceptionTypeRouter();\n\
  router.setChannelMappings(mappings);\nreturn router;\n}\n@Bean\npublic IntegrationFlow\
  \ errorFlow() {\nreturn IntegrationFlow\n.from(\"errorChannel\")\n.route(exceptionTypeRouter())\n\
  .get();\n}\n清单 12-18\n包含异常路由的集成配置\n```\n\n#### 构建包含多个错误通道的解决方案\n\n前面的示例对于简单情况可能效果不错，但不同的集成通常需要不同的错误处理方法，这意味着将所有错误发送到同一个通道最终会导致一个包含大量\
  \ switch 语句的类，过于复杂而难以维护。相反，更好的做法是将错误消息有选择地路由到每个集成最合适的错误通道。这避免了将所有错误处理集中化。一种实现方法是显式指定给定集成错误的去向通道。以下示例展示了一个组件（服务激活器），它在收到消息后，会添加一个指示错误通道名称的消息头。Spring\
  \ Integration 将使用该消息头，并将处理此消息过程中遇到的错误转发到该通道。\n\n```\npackage com.apress.springrecipes.springintegration;\n\
  import org.springframework.integration.annotation.ServiceActivator;\nimport org.springframework.integration.core.Message;\n\
  import org.springframework.integration.core.MessageHeaders;\nimport org.springframework.integration.message.MessageBuilder;\n\
  public class ServiceActivatorThatSpecifiesErrorChannel {\n@ServiceActivator\npublic\
  \ Message startIntegrationFlow(Message firstMessage)\nthrows Throwable {\nreturn\
  \ MessageBuilder.fromMessage(firstMessage).\nsetHeaderIfAbsent( MessageHeaders.ERROR_CHANNEL,\n\
  \"errorChannelForMySolution\").build();\n}\n}\n清单 12-19\n将错误通道作为消息头添加的服务激活器\n```\n\
  \n因此，所有来自使用此组件的集成的错误都将被定向到 `errorChannelForMySolution`，你可以将任何你喜欢的组件订阅到该通道。\n\n##\
  \ 12-7. 分支集成控制：拆分器与聚合器\n\n### 问题\n\n你希望将流程从一个组件分支到多个组件，可以是同时分发，也可以根据条件分发到单个组件。\n\
  \n### 解决方案\n\n你可以使用拆分器组件，以及它的搭档——聚合器组件，来分别实现流程的分支与合并控制。\n\n### 工作原理\n\nESB 的基本基石之一是路由。你已经看到组件如何串联起来形成序列，其中流程大多是线性的。某些解决方案需要将一条消息拆分成多个组成部分。一个可能的原因是，有些问题本质上是并行的，并且彼此之间不依赖对方来完成。你应该尽可能追求并行化带来的效率提升。\n\
  \n\n\n#### 使用拆分器\n\n将大型负载拆分为具有独立处理流程的单独消息通常非常有用。在 Spring Integration 中，这是通过使用拆分器组件来实现的。拆分器接收一条输入消息，并询问你（组件的使用者）应根据什么依据来拆分该\
  \ `Message`：你需要负责提供拆分功能。一旦你告诉 Spring Integration 如何拆分 `Message`，它就会将每个结果转发到拆分器组件的输出通道上。在某些情况下，Spring\
  \ Integration 自带了一些无需自定义即可使用的实用拆分器。一个例子是用于沿 XPath 查询（`XPathMessageSplitter`）对 XML\
  \ 负载进行分区的拆分器。\n\n拆分器的一个实用应用示例可能是包含多行数据的文本文件，每一行都需要被处理。你的目标是能够将每一行提交给一个负责处理的服务。所需的是提取每一行并将每一行作为新的\
  \ `Message` 转发的方法。此类解决方案的配置如下所示。\n\n```\npackage com.apress.spring6recipes.springintegration;\n\
  import org.springframework.beans.factory.annotation.Value;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.integration.config.EnableIntegration;\n\
  import org.springframework.integration.dsl.IntegrationFlow;\nimport org.springframework.integration.dsl.Pollers;\n\
  import org.springframework.integration.file.dsl.Files;\nimport java.io.File;\nimport\
  \ java.time.Duration;\n@Configuration\n@EnableIntegration\npublic class IntegrationConfiguration\
  \ {\n@Bean\npublic CustomerBatchFileSplitter splitter() {\nreturn new CustomerBatchFileSplitter();\n\
  }\n@Bean\npublic CustomerDeletionServiceActivator customerDeletionServiceActivator()\
  \ {\nreturn new CustomerDeletionServiceActivator();\n}\n@Bean\npublic IntegrationFlow\
  \ fileSplitAndDelete(\n@Value(\"file:${user.home}/customerstoremove/new/\") File\
  \ inputDirectory) {\nvar poller = Pollers.fixedRate(Duration.ofSeconds(1));\nreturn\
  \ IntegrationFlow.from(\nFiles.inboundAdapter(inputDirectory)\n.patternFilter(\"\
  customerstoremove-*.txt\"), c -> c.poller(poller))\n.split(splitter())\n.handle(customerDeletionServiceActivator())\n\
  .get();\n}\n}\n清单 12-20\n集成配置\n```\n\n此配置与之前的解决方案并没有太大区别。Java 代码也几乎相同，只是由 `@Splitter`\
  \ 注解标注的方法的返回类型是 `java.util.Collection`。\n\n```\npackage com.apress.spring6recipes.springintegration;\n\
  import org.springframework.integration.annotation.Splitter;\nimport java.io.File;\n\
  import java.io.IOException;\nimport java.nio.file.Files;\nimport java.util.Collection;\n\
  public class CustomerBatchFileSplitter {\n@Splitter\npublic Collection splitAFile(File\
  \ file) throws IOException {\nSystem.out.printf(\"正在读取 %s....%n\", file.getAbsolutePath());\n\
  return Files.readAllLines(file.toPath());\n}\n}\n清单 12-21\n拆分器示例\n```\n\n消息负载以 `java.io.File`\
  \ 的形式传入，并读取其内容。返回结果（一个集合或数组值——在本例中为 `Collection<String>`）。Spring Integration 对结果执行一种\
  \ for-each 循环，将集合中的每个值发送到拆分器的输出通道（在本例中为隐式通道，因为未显式提供任何通道）。通常，你拆分消息是为了让各个部分能够被转发到更专注的处理流程中。由于消息更易于管理，处理需求也随之降低。这在许多不同的架构中都是如此：在\
  \ map/reduce 解决方案中，任务被拆分然后并行处理；在 BPM 系统中，fork/join 结构允许控制流并行进行，从而可以更快地完成整体工作成果。\n\
  \n\n\n#### 使用聚合器\n\n在某些时候，你需要执行反向操作：将多条消息合并为一条，并创建一个可以返回到输出通道的单一结果。`@Aggregator`\
  \ 会收集一系列消息（基于你帮助 Spring Integration 在消息之间建立的某种关联性），然后向下游组件发布一条单一消息。假设你知道系统中有 22\
  \ 个参与者会发送 22 条不同的消息，但你不知道它们何时到达。这类似于一家公司拍卖合同，在选定最终供应商之前，会收集所有不同供应商的投标。公司不能在收到所有公司的投标之前接受任何一份投标，否则，就有过早签订一份不符合公司最佳利益合同的风险。聚合器非常适合构建此类逻辑。\n\
  \nSpring Integration 有多种关联传入消息的方式。为了确定需要读取多少条消息才能停止，它使用了 `SimpleSequenceSizeReleaseStrategy`\
  \ 类，该类会读取一个众所周知的标头值（参见表 12-2）来计算需要查找的消息数量，并记录消息相对于预期总数的索引（例如，3/22）。（聚合器通常在分割器之后使用。因此，默认的标头值由分割器提供，但你完全可以自己创建标头参数。）\n\
  \n对于你可能不知道消息数量，但知道在已知时间内会收到共享某个公共标头值的消息的情况，Spring Integration 提供了 `HeaderAttributeCorrelationStrategy`。通过这种方式，它知道所有具有该值的消息都来自同一组，就像你的姓氏标识你是某个更大群体的一部分一样。\n\
  \n让我们重新审视上一个示例。假设文件已被分割（按行分割，每行属于一个新客户）并随后进行了处理。现在，你想要重新聚合这些客户，并同时对所有人进行一些清理工作。在此示例中，你使用了默认的完成策略和关联策略，因此你可以在集成流配置中使用默认的\
  \ `aggregate()`。结果被传递给另一个服务激活器，该激活器将打印一个小摘要。\n\n```\npackage com.apress.spring6recipes.springintegration;\n\
  import java.io.File;\nimport java.time.Duration;\nimport java.util.concurrent.TimeUnit;\n\
  import org.springframework.beans.factory.annotation.Value;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.context.annotation.Configuration;\nimport org.springframework.integration.config.EnableIntegration;\n\
  import org.springframework.integration.dsl.IntegrationFlow;\nimport org.springframework.integration.dsl.Pollers;\n\
  import org.springframework.integration.file.dsl.Files;\n@Configuration\n@EnableIntegration\n\
  public class IntegrationConfiguration {\n@Bean\npublic CustomerBatchFileSplitter\
  \ splitter() {\nreturn new CustomerBatchFileSplitter();\n}\n@Bean\npublic CustomerDeletionServiceActivator\
  \ customerDeletionServiceActivator() {\nreturn new CustomerDeletionServiceActivator();\n\
  }\n@Bean\npublic SummaryServiceActivator summaryServiceActivator() {\nreturn new\
  \ SummaryServiceActivator();\n}\n@Bean\npublic IntegrationFlow fileSplitAndDelete(\n\
  @Value(\"file:${user.home}/customerstoremove/new/\") File inputDirectory) throws\
  \ Exception {\nvar poller = Pollers.fixedRate(Duration.ofSeconds(1));\nreturn IntegrationFlow.from(\n\
  Files.inboundAdapter(\ninputDirectory).patternFilter(\"customerstoremove-*.txt\"\
  ),c -> c.poller(poller)).split(splitter())\n.handle(customerDeletionServiceActivator())\n\
  .aggregate().handle(summaryServiceActivator()).get();\n}\n}\n清单 12-22\n集成配置\n```\n\
  \n`SummaryServiceActivator` 的 Java 代码非常简单。\n\n```\npackage com.apress.spring6recipes.springintegration;\n\
  import org.springframework.integration.annotation.ServiceActivator;\nimport java.util.Collection;\n\
  public class SummaryServiceActivator {\n@ServiceActivator\npublic void summary(Collection\
  \ customers) {\nSystem.out.printf(\"Removed %s customers.%n\", customers.size());\n\
  }\n}\n清单 12-23\n摘要服务激活器\n```\n\n## 12-8\\. 使用路由器进行条件路由\n\n### 问题\n\n你希望根据某些标准有条件地将消息路由到不同的处理流程。这相当于企业应用集成（EAI）中的\
  \ if/else 分支。\n\n### 解决方案\n\n你可以使用路由器组件根据某些谓词来改变处理流程。你也可以使用路由器将一条消息多播给多个订阅者（就像你使用分割器所做的那样）。\n\
  \n### 工作原理\n\n使用路由器，你可以指定一个已知的通道列表，传入的 `Message` 应该被传递到这些通道上。这具有一些强大的含义。这意味着你可以有条件地改变流程，也意味着你可以将\
  \ `Message` 转发到你想要的任意多（或少）个通道。有一些方便的默认路由器可用于满足常见需求，例如基于负载类型的路由（`PayloadTypeRouter`）和路由到一组或一个通道列表（`RecipientListRouter`）。\n\
  \n例如，想象一个处理管道，它将信用评分高的客户路由到一个服务，而将信用评分较低的客户路由到另一个流程，在该流程中，信息被排队等待人工审计和验证周期。配置一如既往地非常简单。在下面的示例中，我们展示了配置。一个路由器元素\
  \ `CustomerCreditScoreRouter` 将路由逻辑委托给一个类。\n\n```\n@Bean\npublic IntegrationFlow\
  \ fileSplitAndDelete(@Value\n(\"file:${user.home}/customerstoimport/new/\") File\
  \ inputDirectory) throws Exception {\nreturn IntegrationFlow.from(\nFiles.inboundAdapter(inputDirectory)\n\
  .patternFilter(\"customers-*.txt\"), c -> c.poller(Pollers.fixedRate(Duration.ofSeconds(1))))\n\
  .split(splitter())\n.transform(transformer())\n.route(c -> c.getCreditScore() >\
  \ 770,\nm -> m\n.channelMapping(Boolean.TRUE, \"safeCustomerChannel\")\n.channelMapping(Boolean.FALSE,\
  \ \"riskyCustomerChannel\").applySequence(false)\n).get();\n}\n清单 12-24\n集成配置——内联路由器\n\
  ```\n\n或者，你也可以使用一个带有 `@Router` 注解方法的类。它感觉很像工作流引擎的条件元素，甚至像 JSF 的后台 bean 方法，因为它将路由逻辑从代码中分离到\
  \ XML 配置中，将决策延迟到运行时。在示例中，返回的字符串是 `Message` 应该通过的通道名称。\n\n```\npackage com.apress.spring6recipes.springintegration;\n\
  import org.springframework.integration.annotation.Router;\npublic class CustomerCreditScoreRouter\
  \ {\n@Router\npublic String routeByCustomerCreditScore(Customer customer) {\nif\
  \ (customer.creditScore() > 770) {\nreturn \"safeCustomerChannel\";\n} else {\n\
  return \"riskyCustomerChannel\";\n}\n}\n}\n清单 12-25\n集成配置——专用路由器\n```\n\n如果你决定不让\
  \ `Message` 通过并希望停止处理，可以返回 `null` 而不是 `String`。\n\n## 12-9\\. 使用 Spring Batch 进行事件分阶段处理\n\
  \n### 问题\n\n你有一个包含一百万条记录的文件。这个文件太大，无法作为一个事件来处理；将每一行作为一个事件来响应要自然得多。\n\n### 解决方案\n\
  \nSpring Batch（参见第 8 章）非常适合这类解决方案。它允许你获取一个输入文件或负载，并可靠地、系统地将它分解为企业服务总线（ESB）可以处理的事件。\n\
  \n\n\n### 工作原理\n\nSpring Integration 确实支持将文件读取到总线中，而 Spring Batch 也支持为数据提供自定义的、唯一的端点。然而，就像妈妈常说的：“能做不代表应该做。”尽管看起来两者有很多重叠之处，但实际上它们是有区别的（尽管很细微）。虽然两个系统都能处理文件、消息队列或任何你能想到的、通过编写代码与之通信的对象，但\
  \ Spring Integration 并不擅长处理大型负载，因为将像包含百万行数据、可能需要数小时处理的大型文件作为事件来处理是非常困难的。这对 ESB 来说负担太重了。在这一点上，*事件*一词已失去意义。CSV\
  \ 文件中的百万条记录不是总线上的一个事件；它是一个包含百万条记录的文件，而每条记录本身可能才是事件。这是一个微妙的区别。\n\n一个包含百万行数据的文件需要被分解成更小的事件。Spring\
  \ Batch 可以在这方面提供帮助：它允许你系统地读取、应用验证，并可选择跳过和重试无效记录。处理过程可以在 Spring Integration 这样的 ESB\
  \ 上启动。Spring Batch 和 Spring Integration 可以结合使用，构建真正可扩展的解耦系统。\n\n阶段式事件驱动架构（SEDA）是一种处理此类处理场景的架构风格。在\
  \ SEDA 中，你通过将负载分阶段放入队列来减轻架构组件的负担，并且只允许下游组件能够处理的部分继续前进。换句话说，想象一下视频处理。如果你运营一个拥有百万用户上传视频的网站，这些视频需要被转码，而你只有十台服务器，那么如果你的系统试图在收到上传视频后立即处理每个视频，系统就会崩溃。转码可能需要数小时，并且在工作时会占用一个\
  \ CPU（或多个 CPU！）。最明智的做法是存储文件，然后根据容量允许，逐个处理。这样，处理转码的节点上的负载就得到了管理。总是只有足够的工作量让机器保持高效运转，但不会过载。\n\
  \n同样，没有任何处理系统（如 ESB）能够一次高效地处理百万条记录。要努力将更大的事件和消息分解成更小的。让我们设想一个假设的解决方案，旨在处理代表每小时销售数据的批处理文件，这些文件用于订单履行。批处理文件被放置到一个挂载点上，Spring\
  \ Integration 正在监控该挂载点。Spring Integration 一看到新文件就会启动处理。Spring Integration 将文件信息告知\
  \ Spring Batch，并异步启动一个 Spring Batch 作业。\n\nSpring Batch 读取文件，将记录转换为对象，并将输出写入一个 JMS\
  \ 主题，同时使用一个键将原始批处理与 JMS 消息关联起来。自然，这需要半天时间才能完成，但确实能完成。Spring Integration 完全不知道它半天前启动的作业现在已经完成，它开始逐个从主题中取出消息。处理记录以进行履行的过程将开始。涉及多个组件的简单处理可以在\
  \ ESB 上启动。\n\n如果履行是一个长期运行的过程，涉及许多参与者的长期对话状态，那么也许每个记录的履行可以交给 BPM 引擎处理。BPM 引擎会将不同的参与者和工作列表串联起来，并允许工作持续数天，而不是\
  \ Spring Integration 更擅长的毫秒级时间框架。在这个例子中，我们讨论了使用 Spring Batch 作为跳板来减轻下游组件的负载。在这种情况下，下游组件又是一个\
  \ Spring Integration 进程，它接收工作并将其设置为流入 BPM 引擎，在那里可以开始最终处理。Spring Integration 可以使用目录轮询作为启动批处理作业的触发器，并开始提供要处理的文件名。为了从\
  \ Spring Integration 启动作业，Spring Batch 提供了 `JobLaunchingMessageHandler`。这个类接收一个\
  \ `JobLaunchRequest` 来确定启动哪个作业以及使用哪些参数。你必须创建一个转换器，将传入的 `Message<File>` 转换为 `JobLaunchRequest`。\n\
  \n转换器可能如下所示。\n\n```\npackage com.apress.spring6recipes.springintegration;\nimport\
  \ org.springframework.batch.core.Job;\nimport org.springframework.batch.core.JobParametersBuilder;\n\
  import org.springframework.batch.integration.launch.JobLaunchRequest;\nimport org.springframework.integration.annotation.Transformer;\n\
  import java.io.File;\npublic class FileToJobLaunchRequestTransformer {\nprivate\
  \ final Job job;\nprivate final String fileParameterName;\npublic FileToJobLaunchRequestTransformer(Job\
  \ job, String fileParameterName) {\nthis.job=job;\nthis.fileParameterName=fileParameterName;\n\
  }\n@Transformer\npublic JobLaunchRequest transform(File file) {\nvar builder = new\
  \ JobParametersBuilder();\nbuilder.addString(fileParameterName, file.getAbsolutePath());\n\
  return new JobLaunchRequest(job, builder.toJobParameters());\n}\n}\n清单 12-26\nJobLaunchRequest\
  \ 的转换器\n```\n\n转换器需要一个 `Job` 和一个 `filename` 参数来构造。该参数在 Spring Batch 作业中用于确定需要加载哪个文件。传入的消息被转换为\
  \ `JobLaunchRequest`，并使用文件的完整路径作为参数值。此请求可用于启动批处理作业。\n\n为了将所有内容连接起来，可以使用以下配置（注意，此处省略了\
  \ Spring Batch 的设置；有关设置 Spring Batch 的信息，请参见第 8 章）。\n\n```\npackage com.apress.spring6recipes.springintegration;\n\
  import org.springframework.batch.core.Job;\nimport org.springframework.batch.core.launch.JobLauncher;\n\
  import org.springframework.batch.integration.launch.JobLaunchingMessageHandler;\n\
  import org.springframework.beans.factory.annotation.Value;\nimport org.springframework.context.annotation.Bean;\n\
  import org.springframework.integration.dsl.IntegrationFlow;\nimport org.springframework.integration.dsl.Pollers;\n\
  import org.springframework.integration.file.dsl.Files;\nimport java.io.File;\nimport\
  \ java.time.Duration;\npublic class IntegrationConfiguration {\n@Bean\npublic FileToJobLaunchRequestTransformer\
  \ transformer(Job job) {\nreturn new FileToJobLaunchRequestTransformer(job, \"filename\"\
  );\n}\n@Bean\npublic JobLaunchingMessageHandler jobLaunchingMessageHandler(JobLauncher\
  \ launcher) {\nreturn new JobLaunchingMessageHandler(launcher);\n}\n@Bean\npublic\
  \ IntegrationFlow fileToBatchFlow(\n@Value(\"file:${user.home}/customerstoimport/new/\"\
  ) File directory,\nFileToJobLaunchRequestTransformer transformer,\nJobLaunchingMessageHandler\
  \ handler) {\nreturn IntegrationFlow\n.from(\nFiles.inboundAdapter(directory)\n\
  .patternFilter(\"customers-*.txt\"),\nc -> c.poller(Pollers.fixedRate(Duration.ofSeconds(1))))\n\
  .transform(transformer)\n.handle(handler)\n.get();\n}\n}\n清单 12-27\n集成配置——Spring\
  \ Batch 集成\n```\n\n`FileToJobLaunchRequestTransformer` 和 `JobLaunchingMessageHandler`\
  \ 都已配置好。使用文件入站通道适配器来轮询文件。当检测到文件时，一条消息会被放置到通道上。配置了一个链来监听该通道。当收到消息时，首先进行转换，然后传递给 `JobLaunchingMessageHandler`。\n\
  \n现在，将启动一个批处理作业来处理该文件。一个典型的作业可能会使用 `FlatFileItemReader` 来实际读取通过 `filename` 参数传递的文件。可以使用\
  \ `JmsItemWriter` 将每读取一行的消息写入主题。在 Spring Integration 中，可以使用 JMS 入站通道适配器来接收消息并进行处理。\n\
  \n## 12-10\\. 使用网关\n\n\n\n### 问题\n\n你希望向服务的客户端暴露一个接口，同时隐藏服务是基于消息中间件实现的事实。\n\n###\
  \ 解决方案\n\n使用网关（gateway）——这一模式源自经典著作《企业集成模式》（*Enterprise Integration Patterns*，Gregor\
  \ Hohpe 与 Bobby Woolf 合著，Addison-Wesley 出版社，2004 年），并在 Spring Integration 中得到了广泛支持。\n\
  \n### 工作原理\n\n网关是一种独特的模式，虽然与许多其他模式相似，但最终因其独特性而值得单独探讨。在前面的示例中，你使用了适配器（adapter）来让两个系统通过外部的、松散耦合的中间件组件进行通信。这个外部组件可以是任何东西：文件系统、JMS\
  \ 队列/主题、Twitter 等等。\n\n你也了解外观模式（façade），它通过一个精简的接口来抽象其他组件的功能，以提供更粗粒度的功能。例如，你可以使用外观模式构建一个面向假期规划的接口，该接口进一步抽象了租车、酒店预订和机票预订系统的繁琐细节。\n\
  \n而构建网关的目的，则是为你的系统提供一个接口，使客户端与系统中的中间件或消息传递机制隔离开来，从而让客户端不依赖于 JMS 或 Spring Integration\
  \ 等 API。网关允许你对系统的输入和输出表达编译时的约束。\n\n你可能有多个理由这样做。首先，它更清晰。如果你有权限要求客户端遵循某个接口，那么网关是提供该接口的好方法。你对中间件的使用可以成为一个实现细节。也许你的架构中的消息中间件是为了利用异步消息传递带来的性能提升，但你并不希望这些性能提升以牺牲精确、明确的外部接口为代价。\n\
  \n这一特性——将消息传递隐藏在 POJO 接口背后的能力——非常有趣，并且一直是其他几个项目的关注焦点。Lingo 是来自 [Codehaus.​org](http://codehaus.org)\
  \ 的一个项目（目前已不再活跃开发），它曾拥有一个专门针对 JMS 和 Java EE 连接器架构（JCA——最初用于讨论 Java 加密架构，但现在更常用于指代\
  \ Java EE 连接器架构）的特性。此后，其开发者已转向 Apache Camel 项目。\n\n在本方案中，你将探索 Spring Integration\
  \ 对消息网关的核心支持，并了解其对消息交换模式的支持。然后，你将看到如何从面向客户端的接口中完全移除实现细节。\n\n#### MessagingGatewaySupport\n\
  \n对网关最基础的支持来自 Spring Integration 的 `MessagingGatewaySupport` 类。该类提供了指定请求发送通道和响应接收通道的能力。最后，还可以指定回复发送的通道。这使你能够在现有消息系统之上表达“输入-输出”和“仅输入”模式。该类支持以负载（payload）为单位进行工作，使你免于处理消息发送和接收的繁琐细节。这已经是一个抽象层次。可以想象，你可以使用\
  \ `MessagingGatewaySupport` 和 Spring Integration 的通道概念来与文件系统、JMS、电子邮件或任何其他系统交互，并仅处理负载和通道。Spring\
  \ Integration 已经为你提供了一些实现，以支持诸如 Web 服务和 JMS 等常见端点。\n\n让我们来看一个使用通用消息网关的示例。在这个示例中，你将向一个服务激活器发送消息，然后接收响应。你将手动与\
  \ `MessagingGatewaySupport` 交互，以便了解它有多么便捷。\n\n由于 `MessagingGatewaySupport` 是一个抽象类，我们定义一个小的子类来利用该类提供的支持。\n\
  \n```\npackage com.apress.spring6recipes.springintegration;\nimport org.springframework.integration.gateway.MessagingGatewaySupport;\n\
  public class SimpleMessagingGateway extends MessagingGatewaySupport {\n@SuppressWarnings(\"\
  unchecked\")\npublic  T convertSendAndReceive(Object payload) {\nreturn (T) super.sendAndReceive(payload);\n\
  }\n}\n列表 12-28\n简单消息网关\n```\n\n该类继承自 `MessagingGatewaySupport`，并添加了一个 `convertSendAndReceive`\
  \ 方法，该方法调用父类提供的 `sendAndReceive` 方法，并将响应转换为适当的类型。\n\n```\npackage com.apress.spring6recipes.springintegration;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import org.springframework.integration.gateway.GatewayProxyFactoryBean;\nimport\
  \ org.springframework.messaging.MessageChannel;\npublic class Main {\npublic static\
  \ void main(String[] args) {\nvar cfg = AdditionConfiguration.class;\ntry (var ctx\
  \ = new AnnotationConfigApplicationContext(cfg)) {\nvar request = ctx.getBean(\"\
  request\", MessageChannel.class);\nvar response = ctx.getBean(\"response\", MessageChannel.class);\n\
  var gateway = new GatewayProxyFactoryBean();\ngateway.setDefaultRequestChannel(request);\n\
  gateway.setDefaultReplyChannel(response);\ngateway.setBeanFactory(ctx);\ngateway.afterPropertiesSet();;\n\
  gateway.start();\nvar msgGateway = new SimpleMessagingGateway();\nmsgGateway.setRequestChannel(request);\n\
  msgGateway.setReplyChannel(response);\nmsgGateway.setBeanFactory(ctx);\nmsgGateway.afterPropertiesSet();\n\
  msgGateway.start();\nNumber result = msgGateway.convertSendAndReceive(new Operands(22,\
  \ 4));\nSystem.out.printf(\"Result: %f%n\", result.floatValue());\n}\n}\n}\n列表 12-29\n\
  主类\n```\n\n接口交互非常直接。`SimpleMessagingGateway` 需要一个请求通道和一个响应通道，其余工作由它协调完成。在这个例子中，你只是将请求转发给一个服务激活器，该激活器对操作数进行加法运算，并将结果发送到回复通道。配置非常精简，因为大部分工作都在那五行\
  \ Java 代码中完成了。\n\n```\npackage com.apress.spring6recipes.springintegration;\nimport\
  \ org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.integration.config.EnableIntegration;\nimport org.springframework.integration.dsl.IntegrationFlow;\n\
  @Configuration\n@EnableIntegration\npublic class AdditionConfiguration {\n@Bean\n\
  public AdditionService additionService() {\nreturn new AdditionService();\n}\n@Bean\n\
  public IntegrationFlow additionFlow() {\nreturn IntegrationFlow.from(\"request\"\
  )\n.handle(additionService(), \"add\")\n.channel(\"response\").get();\n}\n}\n列表\
  \ 12-30\n集成配置\n```\n\n该配置使用了 `request` 通道；任何接收到的内容都会被传递给 `AdditionService` 并调用其\
  \ `add` 方法。`add` 方法的结果随后被放置到 `response` 通道上，以便感兴趣的各方获取。由于我们的 `SimpleMessagingGateway`\
  \ 将 `Operands` 对象放入了 `request` 通道，它将从 `response` 通道返回结果（参见列表 12-29 中的主类）。\n\n\n\n\
  #### 打破接口依赖\n\n前面的示例展示了后台发生的情况。你只与 Spring Integration 接口打交道，并与端点的细微差别隔离开来。然而，仍然存在大量推断出的约束，客户端可能很容易违反这些约束。最简单的解决方案是将消息传递隐藏在接口后面。让我们来看一个虚构的酒店预订搜索引擎的构建。搜索酒店可能需要很长时间，理想情况下，处理过程应卸载到单独的服务器上。JMS\
  \ 是一个理想的解决方案，因为你可以实现积极的消费者模式，并通过简单地添加更多消费者来进行扩展。在此示例中，客户端仍然会阻塞等待结果，但服务器不会过载或处于阻塞状态。\n\
  \n你将构建两个 Spring Integration 解决方案：一个用于客户端（其中将包含网关），另一个用于服务本身，该服务很可能位于一个独立的主机上，仅通过已知的消息队列与客户端连接。\n\
  \n让我们先来看客户端配置。客户端配置首先声明了一个 `ConnectionFactory`。然后，你声明了一个流程，该流程从 `VacationService`\
  \ 接口的网关开始。网关元素的存在仅仅是为了标识组件和接口，代理将转换为该接口并使其对客户端可用。JMS 出站网关是完成大部分工作的组件。它接收你创建的消息，并将其发送到请求\
  \ JMS 目的地，同时设置回复头等。最后，你声明了一个通用的网关元素，它完成了大部分魔法般的工作。\n\n```\npackage com.apress.spring6recipes.springintegration;\n\
  import com.apress.spring6recipes.springintegration.myholiday.VacationService;\n\
  import org.apache.activemq.artemis.jms.client.ActiveMQConnectionFactory;\nimport\
  \ org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.integration.config.EnableIntegration;\nimport org.springframework.integration.dsl.IntegrationFlow;\n\
  import org.springframework.integration.jms.dsl.Jms;\nimport org.springframework.jms.connection.CachingConnectionFactory;\n\
  @Configuration\n@EnableIntegration\npublic class ClientIntegrationConfig {\n@Bean\n\
  public CachingConnectionFactory connectionFactory() {\nvar connectionFactory = new\
  \ ActiveMQConnectionFactory(\"tcp://localhost:61616\");\nreturn new CachingConnectionFactory(connectionFactory);\n\
  }\n@Bean\npublic IntegrationFlow vacationGatewayFlow() {\nreturn IntegrationFlow\n\
  .from(VacationService.class)\n.handle(\nJms.outboundGateway(connectionFactory())\n\
  .requestDestination(\"inboundHotelReservationSearchDestination\")\n.replyDestination(\"\
  outboundHotelReservationSearchResultsDestination\"))\n.get();\n}\n}\n清单 12-31\n\
  集成配置——客户端\n```\n\n为了能够将 `VacationService` 本身用作网关，需要使用 `@MessagingGateway` 注解对其进行标注，并且作为入口点的方法需要使用\
  \ `@Gateway` 进行标注。\n\n```\npackage com.apress.spring6recipes.springintegration.myholiday;\n\
  import org.springframework.integration.annotation.Gateway;\nimport org.springframework.integration.annotation.MessagingGateway;\n\
  import java.util.List;\n@MessagingGateway\npublic interface VacationService {\n\
  @Gateway\nList findHotels(HotelReservationSearch search);\n}\n清单 12-32\n度假服务接口\n\
  ```\n\n这是面向客户端的接口。通过网关组件暴露的面向客户端的接口与最终处理消息的服务的接口之间没有耦合。我们为服务和客户端使用相同的接口，以简化理解所有内容所需的名称。这与传统的同步远程处理不同，在传统的同步远程处理中，服务接口和客户端接口是匹配的。\n\
  \n在此示例中，我们使用了两个非常简单的对象进行演示：`HotelReservationSearch` 和 `HotelReservation`。这些对象本身毫无特别之处；它们是简单的\
  \ POJO，实现了 `Serializable` 接口，并包含一些访问器/修改器来充实示例领域。\n\n```\npackage com.apress.spring6recipes.springintegration.myholiday;\n\
  import java.io.Serializable;\nimport java.time.LocalDate;\npublic record HotelReservationSearch\
  \ (\nint roomsDesired, LocalDate start,\nLocalDate stop, double maxPrice) implements\
  \ Serializable {\n}\npackage com.apress.spring6recipes.springintegration.myholiday;\n\
  import java.io.Serializable;\nimport java.util.Objects;\nimport java.util.UUID;\n\
  public record HotelReservation(String id, String hotelName, double price)\nimplements\
  \ Serializable {\npublic HotelReservation(String hotelName, double price) {\nthis(UUID.randomUUID().toString(),\
  \ hotelName, price);\n}\n}\n清单 12-33\nHotelReservationSearch 和 HotelReservation\n\
  ```\n\n客户端 Java 代码演示了这一切是如何结合在一起的：\n\n```\npackage com.apress.spring6recipes.springintegration;\n\
  import java.time.LocalDate;\nimport org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
  import com.apress.spring6recipes.springintegration.myholiday.HotelReservationSearch;\n\
  import com.apress.spring6recipes.springintegration.myholiday.VacationService;\n\
  public class Main {\npublic static void main(String[] args) throws Throwable {\n\
  try (var serverCtx = new AnnotationConfigApplicationContext(ServerIntegrationContext.class);\n\
  var clientCtx = new AnnotationConfigApplicationContext(ClientIntegrationConfig.class))\
  \ {\nvar vacationService = clientCtx.getBean(VacationService.class);\nvar now =\
  \ LocalDate.now();\nvar start = now.plusDays(1);\nvar stop = now.plusDays(8);\n\
  var hotelReservationSearch = new HotelReservationSearch(2, start, stop, 200f);\n\
  var results = vacationService.findHotels(hotelReservationSearch);\nSystem.out.printf(\"\
  Found %s results.%n\", results.size());\nresults.forEach(r -> System.out.printf(\"\
  \\t%s%n\", r));\n}\n}\n}\n```\n\n没有比这更简洁的了！完全没有 Spring Integration 接口。你发出请求，搜索完成，处理完成后你就能得到结果。此设置的服务实现很有趣，不是因为添加了什么，而是因为缺少了什么：\n\
  \n```\npackage com.apress.spring6recipes.springintegration;\nimport org.apache.activemq.artemis.jms.client.ActiveMQConnectionFactory;\n\
  import org.springframework.context.annotation.Bean;\nimport org.springframework.context.annotation.Configuration;\n\
  import org.springframework.integration.config.EnableIntegration;\nimport org.springframework.integration.dsl.IntegrationFlow;\n\
  import org.springframework.integration.jms.dsl.Jms;\nimport org.springframework.jms.connection.CachingConnectionFactory;\n\
  import com.apress.spring6recipes.springintegration.myholiday.VacationServiceImpl;\n\
  @Configuration\n@EnableIntegration\npublic class ServerIntegrationContext {\n@Bean\n\
  public CachingConnectionFactory connectionFactory() {\nvar url = \"tcp://localhost:61616\"\
  ;\nvar connectionFactory = new ActiveMQConnectionFactory(url);\nreturn new CachingConnectionFactory(connectionFactory);\n\
  }\n@Bean\npublic VacationServiceImpl vacationService() {\nreturn new VacationServiceImpl();\n\
  }\n@Bean\npublic IntegrationFlow serverIntegrationFlow() {\nreturn IntegrationFlow.from(\n\
  Jms.inboundGateway(connectionFactory())\n.requestDestination(\"inboundHotelReservationSearchDestination\"\
  ))\n.handle(vacationService()).get();\n}\n}\n```\n\n\n\n在这里，你定义了一个入站 JMS 网关。来自入站\
  \ JMS 网关的消息被放置到一个通道上，该通道的消息会按预期转发给服务激活器。服务激活器负责处理实际业务。有趣的是，这里没有为服务激活器或入站 JMS 网关提及任何响应通道。服务激活器会查找回复通道，但找不到，因此它使用了由入站\
  \ JMS 网关组件创建的回复通道，而该网关组件又是根据入站 JMS 消息中的标头元数据创建了回复通道。因此，一切无需显式指定即可正常工作。\n\n该实现是该接口的一个简单且无实际用途的实现：\n\
  \n```\npackage com.apress.spring6recipes.springintegration.myholiday;\nimport com.apress.spring6recipes.utils.Utils;\n\
  import jakarta.annotation.PostConstruct;\nimport org.springframework.integration.annotation.ServiceActivator;\n\
  import java.util.List;\nimport java.util.concurrent.TimeUnit;\npublic class VacationServiceImpl\
  \ implements VacationService {\nprivate List hotelReservations;\n@PostConstruct\n\
  public void afterPropertiesSet() {\nhotelReservations = List.of(\nnew HotelReservation(\"\
  Bilton\", 243.200F),\nnew HotelReservation(\"East Western\", 75.0F),\nnew HotelReservation(\"\
  Thairfield Inn\", 70F),\nnew HotelReservation(\"Park In The Inn\", 200.00F));\n\
  }\n@ServiceActivator\npublic List findHotels(HotelReservationSearch search) {\n\
  Utils.sleep(1, TimeUnit.SECONDS);\nreturn this.hotelReservations.stream()\n.filter((hr)\
  \ -> hr.price() <= search.maxPrice())\n.toList();\n}\n}\n```\n\n## 12-11\\. 总结\n\
  \n本章讨论了如何使用 Spring Integration 构建集成解决方案，Spring Integration 是一个构建在 Spring 框架之上的、类似\
  \ ESB 的框架。你了解了企业应用集成（EAI）的核心概念。你学习了如何处理几种集成场景，包括 JMS 和文件轮询。\n\n在下一章中，你将探索 Spring\
  \ 在测试领域的能力。\n\n# 13. Spring 测试\n\n在本章中，你将学习用于测试 Java 应用程序的基本技术，以及 Spring 框架提供的测试支持特性。这些特性可以使你的测试任务更轻松，并引导你实现更好的应用程序设计。通常，使用\
  \ Spring 框架和依赖注入模式开发的应用程序易于测试。\n\n测试是确保软件开发质量的关键活动。测试有多种类型，包括单元测试、集成测试、功能测试、系统测试、性能测试和验收测试。Spring\
  \ 的测试支持侧重于单元测试和集成测试，但它也可以帮助进行其他类型的测试。测试可以手动执行，也可以自动执行。然而，由于自动化测试可以在开发过程的不同阶段重复且持续地运行，因此强烈推荐使用，尤其是在敏捷开发过程中。Spring\
  \ 框架是一个适合此类过程的敏捷框架。\n\nJava 平台上有许多可用的测试框架。目前，[JUnit](https://junit.org/junit5/)\
  \ 和 [TestNG](https://testng.org/doc/) 是最流行的。JUnit 在 Java 社区中历史悠久，用户群体庞大。TestNG 是另一个流行的\
  \ Java 测试框架。\n\nSpring 的测试支持特性由 Spring TestContext 框架提供。该框架通过以下概念抽象了底层测试框架：\n\n\
  *   测试上下文：它封装了测试执行时的上下文，包括应用程序上下文、测试类、当前测试实例、当前测试方法和当前测试异常。\n\n*   测试上下文管理器：它为测试管理测试上下文，并在预定义的测试执行点触发测试执行监听器，这些点包括：准备测试实例时、执行测试方法之前（在任何特定于框架的初始化方法之前）以及执行测试方法之后（在任何特定于框架的清理方法之后）。\n\
  \n*   测试执行监听器：它定义了一个监听器接口；通过实现该接口，你可以监听测试执行事件。TestContext 框架为常见的测试特性提供了几个测试执行监听器，但你也可以自由创建自己的监听器。\n\
  \nSpring 为 JUnit、JUnit Jupiter 和 TestNG 提供了便捷的 TestContext 支持类，这些类预先注册了特定的测试执行监听器。你可以简单地继承这些支持类来使用\
  \ TestContext 框架，而无需了解太多框架细节。\n\n完成本章后，你将理解测试的基本概念和技术，以及流行的 Java 测试框架 JUnit 和 TestNG。你还将能够使用\
  \ Spring TestContext 框架创建单元测试和集成测试。\n\n## 13-1\\. 使用 JUnit 和 TestNG 创建测试\n\n###\
  \ 问题\n\n你想为你的 Java 应用程序创建自动化测试，以便可以重复运行它们来确保应用程序的正确性。\n\n### 解决方案\n\nJava 平台上最流行的测试框架是\
  \ JUnit 和 TestNG。JUnit 和 TestNG 都允许你使用 `@Test` 注解来标注测试方法，这样任意方法都可以作为测试用例运行。\n\n\
  ### 实现原理\n\n假设你要为一家银行开发一个系统。为了确保系统的质量，你必须测试它的每个部分。首先，让我们考虑一个利息计算器，其接口定义如下。\n\n```\n\
  package com.apress.spring6recipes.bank;\npublic interface InterestCalculator {\n\
  void setRate(double rate);\ndouble calculate(double amount, double year);\n}\n清单\
  \ 13-1\nInterestCalculator 接口\n```\n\n每个利息计算器都需要设置一个固定的利率。现在，你可以使用一个简单的利息公式来实现这个计算器。\n\
  \n```\npackage com.apress.spring6recipes.bank;\npublic class SimpleInterestCalculator\
  \ implements InterestCalculator {\nprivate double rate;\n@Override\npublic void\
  \ setRate(double rate) {\nthis.rate = rate;\n}\n@Override\npublic double calculate(double\
  \ amount, double year) {\nif (amount < 0 || year < 0) {\nthrow new IllegalArgumentException(\"\
  Amount or year must be positive\");\n}\nreturn amount * year * rate;\n}\n}\n清单 13-2\n\
  InterestCalculator 实现\n```\n\n接下来，你将使用流行的测试框架 JUnit Jupiter 和 TestNG 来测试这个简单的利息计算器。\n\
  \n![](img/314861_5_En_13_Figa_HTML.gif)一个带有灯泡轮廓的图标。 通常，测试及其目标类位于同一个包中，但测试的源文件与其他类的源文件（例如\
  \ `src`）存储在不同的目录中（例如 `test`）。\n\n\n\n#### 使用 JUnit 进行测试\n\n测试用例是带有 `@Test` 注解的方法。要设置数据，你可以使用\
  \ `@BeforeEach` 注解一个方法。要清理资源，你可以使用 `@AfterEach` 注解一个方法。你还可以使用 `@BeforeAll` 或 `@AfterAll`\
  \ 注解一个 `static` 方法，使其在类中所有测试用例之前或之后运行一次。\n\n你需要直接调用 `org.junit.jupiter.api.Assertions`\
  \ 类中声明的 `static` 断言方法。不过，你可以通过 `static` 导入语句导入所有断言方法。你可以创建以下 JUnit Jupiter 测试用例来测试你的简单利息计算器。\n\
  \n![](img/314861_5_En_13_Figb_HTML.gif)一个带有灯泡轮廓的图标。 另一个流行的选择是使用 [AssertJ](https://assertj.github.io/doc/)\
  \ 库来编写清晰简洁的断言。\n\n![](img/314861_5_En_13_Figc_HTML.gif)一个带有字母 i 的图标，位于阴影圆圈内，代表信息符号。 要编译和运行为\
  \ JUnit Jupiter 创建的测试用例，你需要在 CLASSPATH 中包含 JUnit Jupiter。如果你使用 Maven，请将以下依赖项添加到你的项目中：\n\
  \n```\norg.junit.jupiter\njunit-jupiter\n5.9.1\n\n```\n\n或者，为 Gradle 添加以下内容：\n\n\
  `testImplementation 'org.junit.jupiter:junit-jupiter:5.9.1'`\n\n```\npackage com.apress.spring6recipes.bank;\n\
  import org.junit.jupiter.api.BeforeEach;\nimport org.junit.jupiter.api.Test;\nimport\
  \ static org.junit.jupiter.api.Assertions.assertEquals;\nimport static org.junit.jupiter.api.Assertions.assertThrows;\n\
  class SimpleInterestCalculatorTests {\nprivate InterestCalculator interestCalculator;\n\
  @BeforeEach\nvoid init() {\ninterestCalculator = new SimpleInterestCalculator();\n\
  interestCalculator.setRate(0.05);\n}\n@Test\nvoid calculate() {\nvar interest =\
  \ interestCalculator.calculate(10000, 2);\nassertEquals(1000.0,interest, 0);\n}\n\
  @Test\nvoid illegalCalculate() {\nassertThrows(IllegalArgumentException.class,\n\
  () -> interestCalculator.calculate(-10000, 2));\n}\n}\n清单 13-3\nJUnit Jupiter InterestCalculator\
  \ 测试\n```\n\nJUnit Jupiter 提供了一个强大的功能，允许你在测试用例中预期抛出异常。你可以使用 `Assertions` 类中的 `assertThrows`\
  \ 方法来编写对预期异常结果的期望。\n\n#### 使用 JUnit 进行数据驱动测试\n\nJUnit Jupiter 的另一个特性是你可以轻松编写数据驱动的测试。为此，需要一个参数源。JUnit\
  \ Jupiter 提供了几个开箱即用的参数源，例如 `@CsvSource`（使用内联 CSV 作为源）和 `@MethodSource`（使用方法作为源）。该机制是可扩展的，因此你也可以编写自己的参数源。\n\
  \n我们可以扩展之前的测试，使用带有 `@MethodSource` 注解的方法来生成参数。测试方法需要修改以接收这些参数，以便它们可以被使用。通过这些更改，为不同的数据变体编写测试变得更加容易。\n\
  \n```\npackage com.apress.spring6recipes.bank;\nimport org.junit.jupiter.api.BeforeEach;\n\
  import org.junit.jupiter.params.ParameterizedTest;\nimport org.junit.jupiter.params.provider.Arguments;\n\
  import org.junit.jupiter.params.provider.MethodSource;\nimport java.util.stream.Stream;\n\
