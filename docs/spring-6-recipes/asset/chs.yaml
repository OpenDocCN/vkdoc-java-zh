- '# 1. Spring 核心任务


  在本章中，你将学习与 Spring 相关的核心任务。Spring 框架的核心是 Spring 控制反转（IoC）容器。IoC 容器用于管理和配置 POJO（Plain
  Old Java Objects，普通 Java 对象）。由于 Spring 框架的主要吸引力之一在于使用 POJO 构建 Java 应用程序，因此 Spring
  的许多核心任务都涉及在 IoC 容器中管理和配置 POJO。


  因此，无论你计划将 Spring 框架用于 Web 应用程序、企业集成还是其他类型的项目，使用 POJO 和 IoC 容器都是使用 Spring 框架的第一步。本章中的大部分示例涵盖了你在本书中以及日常开发
  Spring 应用程序时都会用到的任务。


  ![](img/314861_5_En_1_Figa_HTML.gif)带阴影圆圈内字母 i 的图标代表信息符号。  在本书和 Spring 文档中，“bean”一词与
  POJO 实例互换使用。两者均指由 Java 类创建的对象实例。“组件”一词在本书和 Spring 文档中与 POJO 类互换使用。两者均指创建对象实例的实际
  Java 类。


  ## 1-1. 使用 Java 配置来配置 POJO


  ### 问题


  你想使用 Spring 的 IoC 容器通过注解来管理 POJO。


  ### 解决方案


  设计一个 POJO 类。然后，创建一个带有 `@Configuration` 和 `@Bean` 注解的 Java 配置类来配置 POJO 实例值，或者使用 `@Component`、`@Repository`、`@Service`
  或 `@Controller` 注解设置 Java 组件，以便后续创建 POJO 实例值。接着，实例化 Spring IoC 容器以扫描带有注解的 Java 类。然后，POJO
  实例或 bean 实例即可作为应用程序的一部分进行组装和访问。


  ### 工作原理


  假设你要开发一个生成序列号的应用程序，并且需要为不同目的生成多个序列号系列。每个序列都有自己的前缀、后缀和初始值。因此，你必须为应用程序创建并维护多个生成器实例。


  #### 创建要实例化为 Bean 的类


  根据需求，你创建一个具有三个属性（`prefix`、`suffix` 和 `initial`）的 `Sequence` 类。你还创建一个私有字段 `counter`
  来存储每个生成器的数值。每次在生成器实例上调用 `nextValue()` 方法时，你都会得到带有前缀和后缀拼接的最后一个序列号。


  *Sequence 类*


  ```

  package com.apress.spring6recipes.sequence;

  import java.util.concurrent.atomic.AtomicInteger;

  public class Sequence {

  private final AtomicInteger counter = new AtomicInteger();

  private String prefix;

  private String suffix;

  public void setPrefix(String prefix) {

  this.prefix = prefix;

  }

  public void setSuffix(String suffix) {

  this.suffix = suffix;

  }

  public void setInitial(int initial) {

  this.counter.set(initial);

  }

  public String nextValue() {

  return prefix + counter.getAndIncrement() + suffix;

  }

  }

  ```


  #### 使用 `@Configuration` 和 `@Bean` 创建 Java 配置以创建 POJO


  要在 Spring IoC 容器中定义 POJO 类的实例，你可以创建一个带有实例化值的 Java 配置类。包含 POJO 或 bean 定义的 Java 配置类如下所示。


  *SequenceConfiguration*


  ```

  package com.apress.spring6recipes.sequence.config;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  import com.apress.spring6recipes.sequence.Sequence;

  @Configuration

  public class SequenceConfiguration {

  @Bean

  public Sequence sequence() {

  var seqgen = new Sequence();

  seqgen.setPrefix("30");

  seqgen.setSuffix("A");

  seqgen.setInitial(100000);

  return seqgen;

  }

  }

  ```


  请注意，`SequenceConfiguration` 类使用了 `@Configuration` 注解进行修饰。这告诉 Spring 这是一个配置类。当 Spring
  遇到带有 `@Configuration` 注解的类时，它会在该类中查找 bean 实例定义，这些定义是使用 `@Bean` 注解修饰的 Java 方法。这些
  Java 方法创建并返回一个 bean 实例。


  任何使用 `@Bean` 注解修饰的方法定义都会根据方法名称生成一个 bean 名称。或者，你也可以在 `@Bean` 注解中使用 name 属性显式指定 bean
  名称（例如，`@Bean(name="mys1")` 使该 bean 以 `mys1` 名称可用；如果你显式指定了 bean 名称，则方法名称在 bean 创建过程中将被忽略）。




  #### 实例化 Spring IoC 容器以扫描注解


  你必须实例化 Spring IoC 容器，以便扫描包含注解的 Java 类。在此过程中，Spring 会检测到 `@Configuration` 和 `@Bean`
  注解，这样你之后就可以从 IoC 容器本身获取 bean 实例。


  Spring 提供了两种类型的 IoC 容器实现。基础的一种称为 bean 工厂。更高级的一种称为应用上下文，它与 bean 工厂兼容。请注意，这两种 IoC
  容器的配置文件是相同的。


  应用上下文在保持与 bean 工厂基本功能兼容的同时，提供了更高级的特性。因此，我们强烈建议为每个应用程序使用应用上下文，除非应用程序的资源受限（例如，在为小程序或移动设备运行
  Spring 时）。bean 工厂和应用上下文的接口分别是 `BeanFactory` 和 `ApplicationContext`。`ApplicationContext`
  接口是 `BeanFactory` 的子接口，以保持兼容性。


  由于 `ApplicationContext` 是一个接口，你必须实例化它的一个实现。Spring 有多个应用上下文实现。我们建议你使用 `AnnotationConfigApplicationContext`，它是最新且最灵活的实现。使用这个类，你可以加载
  Java 配置文件：


  ```

  var context = new AnnotationConfigApplicationContext(SequenceConfiguration.class);

  ```


  一旦应用上下文被实例化，对象引用（在此例中为 context）就提供了一个访问 POJO 实例或 bean 的入口点。


  #### 从 IoC 容器获取 POJO 实例或 Bean


  要从 bean 工厂或应用上下文获取一个已声明的 bean，你可以使用 `getBean()` 方法并传入唯一的 bean 名称。`getBean()` 方法的返回类型是
  `java.lang.Object`，因此在使用前必须将其强制转换为其实际类型：


  ```

  var generator = (Sequence) context.getBean("sequence");

  ```


  `getBean()` 方法还支持另一种变体，你可以提供 bean 的类名以避免进行强制转换：


  ```

  var generator = context.getBean("sequence", Sequence.class);

  ```


  或者，如果只有一个 bean，你可以省略 bean 名称：


  ```

  var generator = context.getBean(Sequence.class);

  ```


  一旦完成这一步，你就可以像使用 Spring 外部通过构造函数创建的任何对象一样使用 POJO 或 bean。


  用于运行序列生成器应用程序的 `Main` 类如下所示。


  *用于运行序列生成器应用程序的 Main.java*


  ```

  package com.apress.spring6recipes.sequence;

  import com.apress.spring6recipes.sequence.config.SequenceConfiguration;

  import org.springframework.context.annotation.AnnotationConfigApplicationContext;

  public class Main {

  public static void main(String[] args) {

  var cfg = SequenceConfiguration.class;

  try (var ctx = new AnnotationConfigApplicationContext(cfg)) {

  var generator = ctx.getBean(Sequence.class);

  System.out.println(generator.nextValue());

  System.out.println(generator.nextValue());

  }

  }

  }

  ```


  如果 Java 类路径中一切就绪（`Sequence` 类和 Spring JAR 依赖项），你应该会看到以下输出，以及一些日志消息：


  ```

  30100000A

  30100001A

  ```


  #### 使用 `@Component` 注解创建 POJO 类，通过 DAO 创建 Bean


  到目前为止，Spring bean 的实例化都是通过在 Java 配置类中硬编码值来完成的。这是简化 Spring 示例的首选方法。


  然而，大多数应用程序的 POJO 实例化过程要么来自数据库，要么来自用户输入。所以现在是时候向前迈进，使用更贴近真实世界的场景了。在本节中，我们将使用一个领域类和一个数据访问对象（DAO）类来创建
  POJO。你仍然不需要设置数据库——我们实际上会在 DAO 类中硬编码值——但熟悉这种类型的应用程序结构很重要，因为它是大多数真实世界应用程序和未来食谱的基础。


  假设你被要求开发一个类似于上一节中的序列生成器应用程序。我们需要稍微修改类结构以适应领域类和 DAO 模式。首先，创建一个包含 `id`、`prefix` 和
  `suffix` 属性的领域类 `Sequence`。


  *修改后的 Sequence 类*


  ```

  package com.apress.spring6recipes.sequence;

  public class Sequence {

  private final String id;

  private final String prefix;

  private final String suffix;

  public Sequence(String id, String prefix, String suffix) {

  this.id = id;

  this.prefix = prefix;

  this.suffix = suffix;

  }

  public String getId() {

  return id;

  }

  public String getPrefix() {

  return prefix;

  }

  public String getSuffix() {

  return suffix;

  }

  }

  ```


  然后，你为数据访问对象（DAO）创建一个接口，该接口负责从数据库访问数据。`getSequence()` 方法通过 ID 从数据库表中加载一个 POJO 或 Sequence
  对象，而 `getNextValue()` 方法检索特定数据库序列的下一个值。


  *SequenceDao 接口*


  ```

  package com.apress.spring6recipes.sequence;

  public interface SequenceDao {

  Sequence getSequence(String sequenceId);

  int getNextValue(String sequenceId);

  }

  ```


  在生产应用程序中，你会实现这个 DAO 接口以使用某种数据访问技术。但为了简化这个示例，我们将实现一个 DAO，在 map 中硬编码值来存储序列实例和值。


  *基于 Map 的 SequenceDao 接口实现*


  ```

  package com.apress.spring6recipes.sequence;

  import org.springframework.stereotype.Component;

  import java.util.Map;

  import java.util.concurrent.ConcurrentHashMap;

  import java.util.concurrent.atomic.AtomicInteger;

  @Component("sequenceDao")

  class SimpleSequenceDao implements SequenceDao {

  private final Map sequences = new ConcurrentHashMap();

  private final Map values = new ConcurrentHashMap();

  SimpleSequenceDao() {

  sequences.put("IT", new Sequence("IT", "30", "A"));

  values.put("IT", new AtomicInteger(10000));

  }

  @Override

  public Sequence getSequence(String sequenceId) {

  return sequences.get(sequenceId);

  }

  @Override

  public int getNextValue(String sequenceId) {

  var value = values.get(sequenceId);

  return value.getAndIncrement();

  }

  }

  ```


  注意 `SimpleSequenceDao` 类是如何用 `@Component("sequenceDao")` 注解修饰的。这标记了该类，以便 Spring
  可以为其创建一个 bean。`@Component` 注解中的值定义了 bean 实例的 id，在此例中为 `sequenceDao`。如果在 `@Component`
  注解中没有提供 bean 值名称，默认情况下 bean 名称会被分配为未大写的非限定类名（例如，对于 `SimpleSequenceDao` 类，默认的 bean
  名称将是 `simpleSequenceDao`）。


  对 `getSequence` 方法的调用返回给定 `sequenceID` 的值。而对 `getNextValue` 方法的调用则基于给定 `sequenceID`
  的值创建一个新值并返回该新值。


  @COMPONENT、@REPOSITORY、@SERVICE 还是 @CONTROLLER？


  POJO 在应用程序层中进行分类。在 Spring 中，这些层有三层：持久层、服务层和表示层。`@Component` 是一个通用注解，用于修饰 POJO 以便
  Spring 检测，而 `@Repository`、`@Service` 和 `@Controller` 是 `@Component` 的特化，用于与持久层、服务层和表示层相关联的更具体的
  POJO 场景。


  如果你不确定 POJO 的用途，可以使用 `@Component` 注解来修饰它。但是，最好尽可能使用特化注解，因为这些注解基于 POJO 的用途提供了额外的功能（例如，`@Repository`
  会导致异常被包装为 `DataAccessExceptions`，这使得调试更容易）。




  #### 使用过滤器实例化 Spring IoC 容器以扫描注解


  默认情况下，Spring 会检测所有带有 `@Configuration`、`@Component`、`@Repository`、`@Service` 和 `@Controller`
  等注解的类。你可以自定义扫描过程，包含一个或多个包含/排除过滤器。当 Java 包中有数十个或数百个类时，这非常有用。对于某些 Spring 应用上下文，可能需要排除或包含带有特定注解的
  POJO。


  ![](img/314861_5_En_1_Figc_HTML.gif)一个带阴影三角形内感叹号的图标。  扫描每个包中的类可能会不必要地减慢启动过程。


  Spring 支持四种类型的过滤器表达式。`annotation` 和 `assignable` 类型用于指定注解类型和用于过滤的类/接口。`regex` 和
  `aspectj` 类型允许你指定正则表达式和 AspectJ 切入点表达式来匹配类。你还可以使用 `use-default-filters` 属性禁用默认过滤器。


  例如，以下组件扫描包含 `com.apress.spring6recipes.sequence` 包中名称包含单词 `Dao` 或 `Service` 的所有类，并排除带有
  `@Controller` 注解的类：


  ```

  @ComponentScan(

  includeFilters = {

  @ComponentScan.Filter(

  type = FilterType.REGEX,

  pattern = {

  "com.apress.spring6recipes.sequence.*Dao",

  "com.apress.spring6recipes.sequence.*Service"})},

  excludeFilters = {

  @ComponentScan.Filter(

  type = FilterType.ANNOTATION,

  classes = {org.springframework.stereotype.Controller.class})})

  ```


  当应用包含过滤器来检测名称包含单词 Dao 或 Service 的所有类时，即使是没有注解的类也会被自动检测到。


  #### 从 IoC 容器获取 POJO 实例或 Bean


  然后，你可以使用以下 Main 类测试上述组件：


  *用于运行应用程序的 Main.java*


  ```

  package com.apress.spring6recipes.sequence;

  import org.springframework.context.annotation.AnnotationConfigApplicationContext;

  public class Main {

  public static void main(String[] args) {

  var basePackages = "com.apress.spring6recipes.sequence";

  try (var context = new AnnotationConfigApplicationContext(basePackages)) {

  var sequenceDao = context.getBean(SequenceDao.class);

  System.out.println(sequenceDao.getNextValue("IT"));

  System.out.println(sequenceDao.getNextValue("IT"));

  }

  }

  }

  ```


  ## 1-2\. 通过调用构造函数创建 POJO


  ### 问题


  你希望通过调用其构造函数在 Spring IoC 容器中创建 POJO 实例或 bean，这是创建 bean 最常见且最直接的方式。它相当于在 Java 中使用
  new 运算符创建对象。


  ### 解决方案


  定义一个带有一个或多个构造函数的 POJO 类。接着，创建一个 Java 配置类，通过构造函数为 Spring IoC 容器配置 POJO 实例值。然后，实例化
  Spring IoC 容器以扫描带有注解的 Java 类。POJO 实例或 bean 实例变得可访问，并可作为应用程序的一部分组合在一起。


  ### 工作原理


  假设你要开发一个在线销售产品的商店应用程序。首先，你创建 `Product` 类，它有几个属性，例如产品名称和价格。由于你的商店中有多种类型的产品，你将 `Product`
  类设为抽象类，以便为不同的产品子类进行扩展。


  *Product 基类*


  ```

  package com.apress.spring6recipes.shop;

  public abstract class Product {

  private final String name;

  private final double price;

  public Product(String name, double price) {

  this.name = name;

  this.price = price;

  }

  public String getName() {

  return name;

  }

  public double getPrice() {

  return price;

  }

  @Override

  public String toString() {

  return String.format("%s: name=%s, price=$%.2f",

  getClass().getSimpleName(), name, price);

  }

  }

  ```


  #### 创建带构造函数的 POJO 类


  然后你创建两个产品子类，`Battery` 和 `Disc`。每个子类都有自己的属性。


  *Battery 类*


  ```

  package com.apress.spring6recipes.shop;

  public class Battery extends Product {

  private final boolean rechargeable;

  public Battery(String name, double price, boolean rechargeable) {

  super(name, price);

  this.rechargeable = rechargeable;

  }

  public boolean isRechargeable() {

  return rechargeable;

  }

  @Override

  public String toString() {

  var msg = super.toString() + ", rechargeable=%b";

  return String.format(msg, this.rechargeable);

  }

  }

  ```


  *Disc 类*


  ```

  package com.apress.spring6recipes.shop;

  public class Disc extends Product {

  private final int capacity;

  public Disc(String name, double price, int capacity) {

  super(name, price);

  this.capacity = capacity;

  }

  public int getCapacity() {

  return capacity;

  }

  @Override

  public String toString() {

  var msg = super.toString() + ", capacity=%dMB";

  return String.format(msg, this.capacity);

  }

  }

  ```


  #### 为你的 POJO 创建 Java 配置


  要在 Spring IoC 容器中定义类的实例，你必须创建一个带有实例化值的配置类。一个通过调用构造函数来定义 bean 的配置类如下所示。


  *商店应用程序的配置*


  ```

  package com.apress.spring6recipes.shop.config;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  import com.apress.spring6recipes.shop.Disc;

  import com.apress.spring6recipes.shop.Battery;

  import com.apress.spring6recipes.shop.Product;

  @Configuration

  public class ShopConfiguration {

  @Bean

  public Product aaa() {

  return new Battery("AAA", 2.5, true);

  }

  @Bean

  public Product cdrw() {

  return new Disc("CD-RW", 1.5, 700);

  }

  }

  ```


  接下来，你可以编写以下类，通过从 Spring IoC 容器中检索产品来测试它们。


  *用于运行应用程序的 Main.java*


  ```

  package com.apress.spring6recipes.shop;

  import org.springframework.context.annotation.AnnotationConfigApplicationContext;

  import com.apress.spring6recipes.shop.config.ShopConfiguration;

  public class Main {

  public static void main(String[] args) {

  var cfg = ShopConfiguration.class;

  try (var ctx = new AnnotationConfigApplicationContext(cfg)) {

  var aaa = ctx.getBean("aaa", Product.class);

  var cdrw = ctx.getBean("cdrw", Product.class);

  System.out.println(aaa);

  System.out.println(cdrw);

  }

  }

  }

  ```


  ### 问题


  构成应用程序的 bean 通常需要相互协作以完成应用程序的功能。你想使用注解来实现引用和自动装配。


  ### 解决方案


  对于在配置类中定义的实例，你可以使用标准 Java 代码在 bean 之间创建引用。要自动装配引用，你可以使用 `@Autowired` 注解标记字段、setter
  方法、构造函数，甚至是任意方法。


  ### 工作原理




  #### 在 Java 配置类中引用 POJO


  当 Bean 实例在配置类中定义时——如食谱 1-1 和食谱 1-2 所示——引用使用起来非常直接，因为所有内容都是 Java 代码。例如，当一个 Bean 属性引用另一个
  Bean 时：


  ```

  package com.apress.spring6recipes.sequence.config;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  import com.apress.spring6recipes.sequence.PrefixGenerator;

  import com.apress.spring6recipes.sequence.DatePrefixGenerator;

  import com.apress.spring6recipes.sequence.Sequence;

  @Configuration

  public class SequenceConfiguration {

  @Bean

  public DatePrefixGenerator datePrefixGenerator() {

  return new DatePrefixGenerator("yyyyMMdd");

  }

  @Bean

  public Sequence sequenceGenerator(PrefixGenerator prefixGenerator) {

  var generator = new Sequence("A", 100000);

  generator.setPrefixGenerator(prefixGenerator);

  return generator;

  }

  }

  ```


  `Sequence` 类的 `prefixGenerator` 属性是 `DatePrefixGenerator` Bean 的一个实例。


  第一个 Bean 声明创建了一个 `DatePrefixGenerator` Bean。按照惯例，该 Bean 可通过 Bean 名称 `datePrefixGenerator`（即方法名）访问。但由于
  Bean 实例化逻辑也是一个标准的 Java 方法，因此也可以通过标准的 Java 调用来访问该 Bean。当在第二个 Bean 中通过 setter 设置 `prefixGenerator`
  属性时，会进行一个标准的 Java 调用，即调用 `datePrefixGenerator()` 方法来引用该 Bean。


  #### 使用 @Autowired 注解自动装配 POJO 字段


  接下来，让我们对食谱 1-1 第二部分中引入的 DAO 类 `SimpleSequenceDao` 的 `SequenceDao` 字段使用自动装配。我们将在应用程序中添加一个服务类，以演示与
  DAO 类的自动装配。


  用于生成服务对象的服务类是另一个实际应用的最佳实践，它充当访问 DAO 对象的门面——而不是直接访问 DAO 对象。在内部，服务对象与 DAO 交互以处理序列生成请求：


  ```

  package com.apress.spring6recipes.sequence;

  import org.springframework.beans.factory.annotation.Autowired;

  import org.springframework.stereotype.Service;

  @Service

  public class SequenceService {

  @Autowired

  private SequenceDao sequenceDao;

  public String generate(String sequenceId) {

  var sequence = sequenceDao.getSequence(sequenceId);

  var value = sequenceDao.getNextValue(sequenceId);

  return sequence.prefix() + value + sequence.suffix();

  }

  }

  ```


  `SequenceService` 类使用了 `@Service` 注解进行修饰。这使得 Spring 能够检测到该类。由于 `@Service` 注解没有指定名称，因此默认的
  Bean 名称为 `sequenceService`，该名称基于类名。


  `SequenceService` 类的 `SequenceDao` 字段使用了 `@Autowired` 注解进行修饰。这使得 Spring 能够使用 `sequenceDao`
  Bean（即 `SimpleSequenceDao` 类）自动装配该字段。


  `@Autowired` 注解也可以应用于数组类型的字段，以便 Spring 自动装配所有匹配的 Bean。例如，你可以使用 `@Autowired` 注解一个
  `PrefixGenerator[]` 字段。然后，Spring 将一次性自动装配所有类型与 `PrefixGenerator` 兼容的 Bean：


  ```

  package com.apress.spring6recipes.sequence;

  import org.springframework.beans.factory.annotation.Autowired;

  public class Sequence {

  @Autowired

  private PrefixGenerator[] prefixGenerators;

  ...

  }

  ```


  如果你在 IoC 容器中定义了多个类型与 `PrefixGenerator` 兼容的 Bean，它们将被自动添加到 `prefixGenerators` 数组中。


  类似地，你也可以将 `@Autowired` 注解应用于类型安全的集合。Spring 可以读取该集合的类型信息，并自动装配所有类型兼容的 Bean：


  ```

  package com.apress.spring6recipes.sequence;

  import org.springframework.beans.factory.annotation.Autowired;

  public class Sequence {

  @Autowired

  private List prefixGenerators;

  ...

  }

  ```


  如果 Spring 注意到 `@Autowired` 注解应用于一个类型安全的 `java.util.Map`，且其键类型为 `String`，那么它会将所有兼容类型的
  Bean（以 Bean 名称作为键）添加到该 Map 中：


  ```

  package com.apress.spring6recipes.sequence;

  import org.springframework.beans.factory.annotation.Autowired;

  public class Sequence {

  @Autowired

  private Map prefixGenerators;

  ...

  }

  ```


  ![](img/314861_5_En_1_Figd_HTML.gif)一个带阴影圆圈内字母 i 的图标，表示信息符号。  在字段上使用 `@Autowired`
  并非推荐做法。经验法则是：对于必需字段使用构造器注入，对于可选字段使用 setter 注入。




  #### 使用 @Autowired 注解实现方法和构造器的自动装配，并使其可选


  `@Autowired` 注解也可以直接应用于类的方法（通常是 setter 方法）。例如，你可以使用 `@Autowired` 注解 `prefixGenerator`
  属性的 setter 方法。然后，Spring 会尝试装配一个与 `prefixGenerator` 类型兼容的 bean：


  ```

  package com.apress.spring6recipes.sequence;

  import org.springframework.beans.factory.annotation.Autowired;

  public class Sequence {

  ...

  @Autowired

  public void setPrefixGenerator(PrefixGenerator prefixGenerator) {

  this.prefixGenerator = prefixGenerator;

  }

  }

  ```


  默认情况下，所有带有 `@Autowired` 的属性都是必需的。当 Spring 找不到匹配的 bean 进行装配时，会抛出异常。如果你希望某个属性是可选的，可以使用
  `@Autowired` 的 `required` 属性并将其设置为 `false`。这样，当 Spring 找不到匹配的 bean 时，会保持该属性未设置状态：


  ```

  package com.apress.spring6recipes.sequence;

  import org.springframework.beans.factory.annotation.Autowired;

  public class Sequence {

  ...

  @Autowired(required=false)

  public void setPrefixGenerator(PrefixGenerator prefixGenerator) {

  this.prefixGenerator = prefixGenerator;

  }

  }

  ```


  另一种选择是使用 `java.util.Optional`，顾名思义，它可以使注入变为可选。然后，你可以设置检测到的值，或者使用 `orElseGet` 提供一个默认实例。使用
  `java.util.Optional` 还会使注入变为惰性；依赖项只有在需要被获取时才会被检索，即在使用 `Optional.get` 等方法时。`java.util.Optional`
  也可用于字段或构造器注入：


  ```

  package com.apress.spring6recipes.sequence;

  import org.springframework.beans.factory.annotation.Autowired;

  public class Sequence {

  ...

  @Autowired

  public void setPrefixGenerator(Optional prefixGenerator) {

  this.prefixGenerator = prefixGenerator.orElse(null);

  }

  }

  ```


  除了 Optional，你还可以使用 `org.springframework.beans.factory.ObjectProvider`，这是 Spring
  的一个接口，允许你可选地获取 bean。它的 `getIfUnique()` 方法的行为类似于 `Optional.orElse`。它只会在存在唯一一个实例时返回该实例；如果没有或有多个，则返回
  `null`。`ObjectProvider` 有多种方法，可以根据需要获取一个或多个 bean 实例。这在构建库、框架或基于插件的系统时的配置类中非常有用：


  ```

  package com.apress.spring6recipes.sequence;

  import org.springframework.beans.factory.ObjectProvider;

  import org.springframework.beans.factory.annotation.Autowired;

  public class Sequence {

  ...

  @Autowired

  public void setPrefixGenerator(ObjectProvider prefixGeneratorProvider) {

  this.prefixGenerator = prefixGeneratorProvider.getIfUnique();

  }

  }

  ```


  你也可以将 `@Autowired` 注解应用于具有任意名称和任意数量参数的方法，在这种情况下，Spring 会尝试为每个方法参数装配一个类型兼容的 bean：


  ```

  package com.apress.spring6recipes.sequence;

  import org.springframework.beans.factory.annotation.Autowired;

  public class Sequence {

  ...

  @Autowired

  public void myOwnCustomInjectionName(PrefixGenerator prefixGenerator) {

  this.prefixGenerator = prefixGenerator;

  }

  }

  ```


  最后，你也可以将 `@Autowired` 注解应用于你希望用于自动装配的构造器。该构造器可以有任意数量的参数，Spring 会尝试为每个构造器参数装配一个类型兼容的
  bean：


  ```

  @Service

  public class SequenceService {

  private final SequenceDao sequenceDao;

  @Autowired

  public SequenceService(SequenceDao sequenceDao) {

  this.sequenceDao=sequenceDao;

  }

  public String generate(String sequenceId) {

  var sequence = sequenceDao.getSequence(sequenceId);

  var value = sequenceDao.getNextValue(sequenceId);

  return sequence.getPrefix() + value + sequence.getSuffix();

  }

  }

  ```


  ![](img/314861_5_En_1_Fige_HTML.gif)一个带有灯泡轮廓的图标。  如果你只有一个构造器，Spring 会自动使用该构造器进行自动装配。在这种情况下，你可以省略
  `@Autowired` 注解。


  #### 使用 @Primary 和 @Qualifier 注解解决自动装配歧义


  默认情况下，当 IoC 容器中存在多个类型兼容的 bean，且属性不是组类型（例如数组、列表、映射）时，按类型自动装配将无法工作，如前所述。然而，如果存在多个相同类型的
  bean，有两种解决按类型自动装配问题的方法：`@Primary` 注解和 `@Qualifier` 注解。


  ##### 使用 `@Primary` 注解解决自动装配歧义


  Spring 允许你通过使用 `@Primary` 注解修饰候选 bean 来按类型指定一个候选 bean。当多个候选 bean 都有资格自动装配单值依赖项时，`@Primary`
  注解会优先选择该 bean：


  ```

  package com.apress.spring6recipes.sequence;

  import org.springframework.context.annotation.Primary;

  import org.springframework.stereotype.Component;

  @Component

  @Primary

  public class DatePrefixGenerator implements PrefixGenerator {

  ```


  注意，前面的类实现了 `PrefixGenerator` 接口，并使用 `@Primary` 注解进行了修饰。如果你尝试自动装配一个 `PrefixGenerator`
  类型的 bean，即使 Spring 有多个具有相同 `PrefixGenerator` 类型的 bean 实例，Spring 也会自动装配 `DatePrefixGenerator`，因为它被标记了
  `@Primary` 注解。


  ##### 使用 `@Qualifier` 注解解决自动装配歧义


  Spring 还允许你通过在 `@Qualifier` 注解中提供 bean 的名称来按类型指定候选 bean：


  ```

  package com.apress.spring6recipes.sequence;

  import org.springframework.beans.factory.annotation.Autowired;

  import org.springframework.beans.factory.annotation.Qualifier;

  public class Sequence {

  @Autowired

  @Qualifier("datePrefixGenerator")

  private PrefixGenerator prefixGenerator;

  }

  ```


  完成此操作后，Spring 会尝试在 IoC 容器中查找具有该名称的 bean，并将其装配到属性中。


  `@Qualifier` 注解也可以应用于方法参数以实现自动装配：


  ```

  package com.apress.spring6recipes.sequence;

  import org.springframework.beans.factory.annotation.Autowired;

  import org.springframework.beans.factory.annotation.Qualifier;

  import java.util.concurrent.atomic.AtomicInteger;

  public class Sequence {

  private PrefixGenerator prefixGenerator;

  @Autowired

  public void setPrefixGenerator(

  @Qualifier("datePrefixGenerator") PrefixGenerator prefixGenerator) {

  this.prefixGenerator = prefixGenerator;

  }

  }

  ```


  如果你想按名称自动装配 bean 属性，可以使用 JSR-250 的 `@Resource` 注解（在下一个配方中描述）来注解 setter 方法、构造器或字段。


  ## 1-4. 使用 @Resource 和 @Inject 注解自动装配 POJO


  ### 问题


  你想使用 Java 标准的 `@Resource` 和 `@Inject` 注解通过自动装配来引用 POJO，而不是使用 Spring 特有的 @Autowired
  注解。


  ### 解决方案


  JSR-250（即 Java 平台的通用注解）定义了 `@Resource` 注解，用于按名称自动装配 POJO 引用。JSR-330（即注入的标准注解）定义了
  `@Inject` 注解，用于按类型自动装配 POJO 引用。




  ### 工作原理


  上一节中描述的 `@Autowired` 注解属于 Spring 框架，具体位于 `org.springframework.beans.factory.annotation`
  包中。这意味着它只能在 Spring 框架的上下文中使用。


  在 Spring 为 `@Autowired` 注解提供支持后不久，Java 语言本身也标准化了多种注解，以实现与 `@Autowired` 注解相同的功能。这些注解包括属于
  `jakarta.annotation` 包的 `@Resource` 注解，以及属于 `jakarta.inject` 包的 `@Inject` 注解。


  #### 使用 @Resource 注解自动装配 POJO


  默认情况下，`@Resource` 注解的工作方式类似于 Spring 的 `@Autowired` 注解，会尝试按类型进行自动装配。例如，以下 POJO 属性使用了
  `@Resource` 注解进行修饰，因此 Spring 会尝试定位一个与 `PrefixGenerator` 类型匹配的 POJO：


  ```

  package com.apress.spring6recipes.sequence;

  import jakarta.annotation.Resource;

  public class Sequence {

  @Resource

  private PrefixGenerator prefixGenerator;

  ...

  }

  ```


  然而，与 `@Autowired` 注解需要配合 `@Qualifier` 注解才能按名称自动装配 POJO 不同，如果存在多个相同类型的 POJO，`@Resource`
  注解的歧义性会被消除。本质上，`@Resource` 注解提供了与组合使用 `@Autowired` 和 `@Qualifier` 注解相同的功能。


  #### 使用 @Inject 注解自动装配 POJO


  与 `@Resource` 和 `@Autowired` 注解类似，`@Inject` 注解也尝试按类型进行自动装配。例如，以下 POJO 属性使用了 `@Inject`
  注解进行修饰，因此 Spring 会尝试定位一个与 `PrefixGenerator` 类型匹配的 POJO：


  ```

  package com.apress.spring6recipes.sequence;

  import jakarta.inject.Inject;

  public class Sequence {

  @Inject

  private PrefixGenerator prefixGenerator;

  ...

  }

  ```


  但与 `@Resource` 和 `@Autowired` 注解一样，如果存在多个相同类型的 POJO，则需要采用不同的方法来按名称匹配 POJO 或避免歧义。使用
  `@Inject` 注解进行按名称自动装配的第一步是创建一个自定义注解，以标识 POJO 注入类和 POJO 注入点：


  ```

  package com.apress.spring6recipes.sequence;

  import java.lang.annotation.Documented;

  import java.lang.annotation.ElementType;

  import java.lang.annotation.Retention;

  import java.lang.annotation.RetentionPolicy;

  import java.lang.annotation.Target;

  import jakarta.inject.Qualifier;

  @Qualifier

  @Target({ElementType.TYPE, ElementType.FIELD, ElementType.PARAMETER})

  @Documented

  @Retention(RetentionPolicy.RUNTIME)

  public @interface DatePrefixAnnotation {

  }

  ```


  请注意，这个自定义注解使用了 `@Qualifier` 注解。此注解与 Spring 的 `@Qualifier` 注解不同，因为后者与 `@Inject` 注解属于同一个
  Java 包（即 `jakarta.inject`）。


  自定义注解完成后，需要修饰生成 bean 实例的 POJO 注入类，在本例中为 `DatePrefixGenerator` 类：


  ```

  package com.apress.spring6recipes.sequence;

  ...

  @DatePrefixAnnotation

  public class DatePrefixGenerator implements PrefixGenerator {

  ...

  }

  ```


  最后，使用相同的自定义注解修饰 POJO 属性或注入点，以限定 POJO 并消除任何歧义：


  ```

  package com.apress.spring6recipes.sequence;

  import jakarta.inject.Inject;

  public class Sequence {

  @Inject @DataPrefixAnnotation

  private PrefixGenerator prefixGenerator;

  ...

  }

  ```


  @AUTOWIRED、@RESOURCE 还是 @INJECT？


  正如你在配方 1-3 和 1-4 中所见，`@Autowired`、`@Resource` 和 `@Inject` 这三个注解可以实现相同的结果。`@Autowired`
  注解是基于 Spring 的解决方案，而 `@Resource` 和 `@Inject` 注解是基于 Java 标准（即 JSR）的解决方案。如果你要进行基于名称的自动装配，`@Resource`
  注解提供了最简单的语法。对于按类类型进行自动装配，这三个注解使用起来都很直接，因为它们都只需要一个注解。


  ## 1-5\. 使用 @Scope 注解设置 POJO 的作用域


  ### 问题


  当你使用 `@Component` 等注解声明一个 POJO 实例时，实际上是在定义一个用于创建 bean 的模板，而不是一个实际的 bean 实例。当通过 `getBean()`
  方法或其他 bean 的引用请求一个 bean 时，Spring 会根据 bean 的作用域决定返回哪个 bean 实例。有时，你必须为 bean 设置一个除默认作用域之外的合适作用域。


  ### 解决方案


  bean 的作用域通过 `@Scope` 注解设置。默认情况下，Spring 为 IoC 容器中声明的每个 bean 只创建一个实例，并且该实例在整个 IoC
  容器范围内共享。所有后续的 `getBean()` 调用和 bean 引用都会返回这个唯一的 bean 实例。这种作用域称为 `singleton`，是所有 bean
  的默认作用域。表 1-1 列出了 Spring 中所有有效的 bean 作用域。


  表 1-1


  Spring 中有效的 Bean 作用域


  | 作用域 | 描述 |

  | --- | --- |

  | `singleton` | 每个 Spring IoC 容器创建一个单一的 bean 实例 |

  | `prototype` | 每次请求时创建一个新的 bean 实例 |

  | `request` | 每个 HTTP 请求创建一个单一的 bean 实例，仅在 Web 应用程序上下文中有效 |

  | `session` | 每个 HTTP 会话创建一个单一的 bean 实例，仅在 Web 应用程序上下文中有效 |

  | `application` | 类似于 `singleton`，但会将 bean 注册到 `ServletContext` 中，以便在多个 servlet
  之间共享 |

  | `websocket` | 将 bean 的引用存储在 websocket 相关的会话属性中 |




  ### 工作原理


  为了演示 Bean 作用域的概念，我们以购物应用中的购物车为例。首先，按如下方式创建 `ShoppingCart` 类：


  ```

  package com.apress.spring6recipes.shop;

  import org.springframework.stereotype.Component;

  import java.util.ArrayList;

  import java.util.Collections;

  import java.util.List;

  @Component

  public class ShoppingCart {

  private final List items = new ArrayList();

  public void addItem(Product item) {

  this.items.add(item);

  }

  public List getItems() {

  return Collections.unmodifiableList(this.items);

  }

  }

  ```


  然后，在 Java 配置文件中声明产品 Bean，以便稍后将其添加到购物车中：


  ```

  package com.apress.spring6recipes.shop.config;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.ComponentScan;

  import org.springframework.context.annotation.Configuration;

  import com.apress.spring6recipes.shop.Disc;

  import com.apress.spring6recipes.shop.Battery;

  import com.apress.spring6recipes.shop.Product;

  @Configuration

  @ComponentScan("com.apress.spring6recipes.shop")

  public class ShopConfiguration {

  @Bean

  public Product aaa() {

  return new Battery("AAA", 2.5, true);

  }

  @Bean

  public Product cdrw() {

  return new Disc("CD-RW", 1.5, 700);

  }

  @Bean

  public Product dvdrw() {

  return new Disc("DVD-RW", 3.0, 4900);

  }

  }

  ```


  完成上述步骤后，你可以定义一个 Main 类，通过向购物车添加一些商品来测试它。假设同时有两位顾客在你的商店中浏览。第一位顾客通过 `getBean()` 方法获取一个购物车，并向其中添加了两件商品。接着，第二位顾客也通过
  `getBean()` 方法获取一个购物车，并向其中添加了另一件商品：


  ```

  package com.apress.spring6recipes.shop;

  import com.apress.spring6recipes.shop.config.ShopConfiguration;

  import org.springframework.context.annotation.AnnotationConfigApplicationContext;

  public class Main {

  public static void main(String[] args) {

  var cfg = ShopConfiguration.class;

  try (var context = new AnnotationConfigApplicationContext(cfg)) {

  var aaa = context.getBean("aaa", Product.class);

  var cdrw = context.getBean("cdrw", Product.class);

  var dvdrw = context.getBean("dvdrw", Product.class);

  var cart1 = context.getBean(ShoppingCart.class);

  cart1.addItem(aaa);

  cart1.addItem(cdrw);

  System.out.println("购物车 1 包含 " + cart1.getItems());

  var cart2 = context.getBean(ShoppingCart.class);

  cart2.addItem(dvdrw);

  System.out.println("购物车 2 包含 " + cart2.getItems());

  }

  }

  }

  ```


  根据上述 Bean 声明，你可以看到两位顾客获取到的是同一个购物车实例：


  ```

  购物车 1 包含 [AAA 2.5, CD-RW 1.5]

  购物车 2 包含 [AAA 2.5, CD-RW 1.5, DVD-RW 3.0]

  ```


  这是因为 Spring 的默认 Bean 作用域是 `singleton`。这意味着 Spring 为每个 IoC 容器只创建一个购物车实例。


  在你的商店应用中，你期望每次调用 `getBean()` 方法时，每位顾客都能获取到不同的购物车实例。为了确保这种行为，需要将 `shoppingCart` Bean
  的作用域设置为 `prototype`。这样，Spring 就会为每次 `getBean()` 方法调用创建一个新的 Bean 实例：


  ```

  package com.apress.spring6recipes.shop;

  import java.util.ArrayList;

  import java.util.Collections;

  import java.util.List;

  import org.springframework.context.annotation.Scope;

  import org.springframework.stereotype.Component;

  @Component

  @Scope("prototype")

  public class ShoppingCart {

  }

  ```


  现在，如果你再次运行 Main 类，可以看到两位顾客获取到了不同的购物车实例：


  ```

  购物车 1 包含 [AAA 2.5, CD-RW 1.5]

  购物车 2 包含 [DVD-RW 3.0]

  ```


  ## 1-6\. 使用外部资源中的数据（文本文件、XML 文件、属性文件或图像文件）


  ### 问题


  有时，应用程序需要从不同位置（例如文件系统、类路径或 URL）读取外部资源（例如文本文件、XML 文件、属性文件或图像文件）。通常，你必须使用不同的 API 来从不同位置加载资源。


  ### 解决方案


  Spring 提供了 `@PropertySource` 注解，作为一种加载属性文件内容（即键值对）以设置 Bean 属性的工具。


  Spring 还拥有一个资源加载器机制，它提供了一个统一的 `Resource` 接口，可以通过资源路径检索任何类型的外部资源。你可以为此路径指定不同的前缀，以使用
  `@Value` 注解从不同位置加载资源。要从文件系统加载资源，请使用 `file` 前缀。要从类路径加载资源，请使用 `classpath` 前缀。你也可以在资源路径中指定一个
  URL。


  ### 工作原理


  要读取属性文件的内容（即键值对）以设置 Bean 属性，你可以将 Spring 的 `@PropertySource` 注解与 `PropertySourcesPlaceholderConfigurer`
  结合使用。如果你想读取任何文件的内容，可以使用 Spring 的 Resource 机制，并配合 `@Value` 注解。




  #### 使用属性文件数据设置 POJO 实例化值


  假设你有一个属性文件，其中包含一系列你想用来设置 Bean 属性的值。通常，这可能是数据库的配置属性，或其他由键值对组成的应用程序值。例如，以下键值对存储在一个名为
  `discounts.properties` 的文件中：


  ```

  specialcustomer.discount=0.1

  summer.discount=0.15

  endofyear.discount=0.2

  ```


  ![](img/314861_5_En_1_Figf_HTML.gif)一个带阴影圆圈的字母 i 图标，表示信息符号。  关于为国际化（i18n）目的读取属性文件，请参阅下一个技巧。


  为了使 `discounts.properties` 文件的内容可用于设置其他 Bean，你可以使用 `@PropertySource` 注解将键值对转换为 Java
  Config 类中的一个 Bean：


  ```

  package com.apress.spring6recipes.shop.config;

  import org.springframework.beans.factory.annotation.Value;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.ComponentScan;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.context.annotation.PropertySource;

  import org.springframework.context.support.PropertySourcesPlaceholderConfigurer;

  import com.apress.spring6recipes.shop.Disc;

  import com.apress.spring6recipes.shop.Battery;

  import com.apress.spring6recipes.shop.Product;

  @Configuration

  @PropertySource("classpath:discounts.properties")

  @ComponentScan("com.apress.spring6recipes.shop")

  public class ShopConfiguration {

  @Value("${endofyear.discount:0}")

  private double specialEndofyearDiscountField;

  @Bean

  public static PropertySourcesPlaceholderConfigurer pspc() {

  return new PropertySourcesPlaceholderConfigurer();

  }

  @Bean

  public Product dvdrw() {

  return new Disc("DVD-RW", 1.5, 4700, specialEndofyearDiscountField);

  }

  }

  ```


  你定义了一个值为 `classpath:discounts.properties` 的 `@PropertySource` 注解来修饰 Java Config
  类。`classpath:` 前缀告诉 Spring 在 Java 类路径中查找 `discounts.properties` 文件。


  一旦你定义了 `@PropertySource` 注解来加载属性文件，你还需要使用 `@Bean` 注解定义一个 `PropertySourcesPlaceholderConfigurer`
  Bean。Spring 会自动连接 `@PropertySource discounts.properties` 文件，使其属性可作为 Bean 属性访问。


  接下来，你需要定义 Java 变量来从 `discounts.properties` 文件中获取值。要使用这些值来定义 Java 变量值，你需要使用带有占位符表达式的
  `@Value` 注解。


  其语法是 `@Value("${key:default_value}")`。Spring 会在所有已加载的应用程序属性中搜索该键值。如果在属性文件中找到匹配的键，则相应的值会被赋给
  Bean 属性。如果在已加载的应用程序属性中未找到匹配的键，则 `default_value`（值表达式中冒号后面的部分）会被赋给 Bean 属性。


  一旦 Java 变量被设置为某个折扣值，你就可以用它来设置 Bean 实例的折扣属性。


  如果你希望将属性文件数据用于设置 Bean 属性之外的其他目的，则应使用 Spring 的资源（Resource）机制，该机制将在下一节中介绍。




  #### 在 POJO 中使用任何外部资源文件的数据


  假设你想在应用程序启动时显示一个横幅。该横幅由以下字符组成，并存储在名为 `banner.txt` 的文本文件中。该文件可以放在应用程序的类路径中：


  ```

  *************************

  *  Welcome to My Shop!  *

  *************************

  ```


  接下来，让我们编写一个 `BannerLoader` POJO 类来加载横幅并将其输出到控制台：


  ```

  package com.apress.spring6recipes.shop;

  import jakarta.annotation.PostConstruct;

  import org.springframework.core.io.Resource;

  import java.io.IOException;

  import java.nio.charset.StandardCharsets;

  import java.nio.file.Files;

  import java.nio.file.Path;

  public class BannerLoader {

  private final Resource banner;

  public BannerLoader(Resource banner) {

  this.banner = banner;

  }

  @PostConstruct

  public void showBanner() throws IOException {

  var path = Path.of(banner.getURI());

  try (var lines = Files.lines(path, StandardCharsets.UTF_8)) {

  lines.forEachOrdered(System.out::println);

  }

  }

  }

  ```


  请注意，POJO 的 `banner` 字段是 Spring 的 `Resource` 类型。当 bean 实例被创建时，该字段的值将通过构造函数注入来填充——稍后将对此进行说明。`showBanner`
  方法调用 `getURI()` 方法从 `Resource` 中检索 [java.​net](http://java.net)`.URI`。一旦你有了这个 URI，就可以使用
  Java NIO 读取内容并将其打印到控制台。


  还要注意，`showBanner()` 方法使用了 `@PostConstruct` 注解。因为你希望在启动时显示横幅，所以使用此注解告诉 Spring 在创建后自动调用该方法。这保证了
  `showBanner()` 方法是应用程序最早运行的方法之一，从而确保横幅在启动时出现。


  接下来，POJO `BannerLoader` 需要被初始化为一个实例。此外，`BannerLoader` 的 `banner` 字段也需要被注入。因此，让我们创建一个
  Java Config 类来完成这些任务：


  ```

  package com.apress.spring6recipes.shop.config;

  import org.springframework.beans.factory.annotation.Value;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.ComponentScan;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.context.annotation.PropertySource;

  import org.springframework.context.support.PropertySourcesPlaceholderConfigurer;

  import org.springframework.core.io.Resource;

  import com.apress.spring6recipes.shop.BannerLoader;

  import com.apress.spring6recipes.shop.Battery;

  import com.apress.spring6recipes.shop.Disc;

  import com.apress.spring6recipes.shop.Product;

  @Configuration

  @PropertySource("classpath:discounts.properties")

  @ComponentScan("com.apress.spring6recipes.shop")

  public class ShopConfiguration {

  @Value("classpath:banner.txt")

  private Resource banner;

  @Bean

  public BannerLoader bannerLoader() {

  return new BannerLoader(banner);

  }

  ```


  看看 `banner` 属性是如何使用 `@Value("classpath:banner.txt")` 注解进行修饰的。这告诉 Spring 在类路径中搜索
  `banner.txt` 文件并将其注入。Spring 使用预先注册的属性编辑器 `ResourceEditor` 将文件定义转换为 `Resource` 对象，然后再将其注入到
  bean 中。


  一旦 `banner` 属性被注入，它就会通过构造函数注入被赋值给 `BannerLoader` bean 实例。


  由于横幅文件位于 Java 类路径中，资源路径以 `classpath:` 前缀开头。前面的资源路径指定了文件系统相对路径中的资源。你也可以指定绝对路径：


  ```

  file:c:/shop/banner.txt

  ```


  当资源位于 Java 的类路径中时，你必须使用 classpath 前缀。如果没有提供路径信息，它将从类路径的根目录加载：


  ```

  classpath:banner.txt

  ```


  如果资源位于特定的包中，你可以指定从类路径根目录开始的绝对路径：


  ```

  classpath:com/apress/spring6recipes/shop/banner.txt

  ```


  除了支持从文件系统路径或类路径加载外，还可以通过指定 URL 来加载资源：


  ```

  http://springrecipes.apress.com/shop/banner.txt

  ```


  由于 bean 类在 `showBanner()` 方法上使用了 `@PostConstruct` 注解，因此在 IoC 容器设置完成后，横幅就会被发送到输出。因此，无需修改应用程序的上下文或显式调用
  bean 来输出横幅。然而，有时可能需要访问外部资源以与应用程序的上下文进行交互。现在假设你想在应用程序结束时显示一个图例。该图例由之前在 `discounts.properties`
  文件中描述的折扣组成。要访问属性文件的内容，你也可以利用 Spring 的 Resource 机制。


  接下来，让我们使用 Spring 的 Resource 机制，但这次直接在应用程序的 Main 类中使用，以便在应用程序结束时输出图例：


  ```

  package com.apress.spring6recipes.shop;

  import org.springframework.context.annotation.AnnotationConfigApplicationContext;

  import org.springframework.core.io.ClassPathResource;

  import org.springframework.core.io.support.PropertiesLoaderUtils;

  import com.apress.spring6recipes.shop.config.ShopConfiguration;

  public class Main {

  public static void main(String[] args) throws Exception {

  var resource = new ClassPathResource("discounts.properties");

  var props = PropertiesLoaderUtils.loadProperties(resource);

  System.out.println("And don''t forget our discounts!");

  System.out.println(props);

  }

  }

  ```


  Spring 的 `ClassPathResource` 类用于访问 `discounts.properties` 文件，该文件将文件内容转换为 Resource
  对象。接下来，使用 Spring 的 `PropertiesLoaderUtils` 类将 `Resource` 对象处理成 `Properties` 对象。最后，`Properties`
  对象的内容作为应用程序的最终输出发送到控制台。


  由于图例文件（即 `discounts.properties`）位于 Java 类路径中，因此使用 Spring 的 `ClassPathResource` 类来访问该资源。如果外部资源位于文件系统路径中，则将使用
  Spring 的 `FileSystemResource` 加载该资源：


  ```

  var resource = new FileSystemResource("c:/shop/banner.txt")

  ```


  如果外部资源位于 URL 上，则将使用 Spring 的 `UrlResource` 加载该资源：


  ```

  var resource = new UrlResource("https://www.apress.com/")

  ```


  ## 1-7. 在属性文件中为不同区域设置解析国际化文本消息


  ### 问题


  你希望应用程序通过注解支持国际化（I18N）。


  ### 解决方案


  `MessageSource` 是一个接口，它定义了多种用于在资源包中解析消息的方法。`ResourceBundleMessageSource` 是最常见的 `MessageSource`
  实现，它从不同区域设置的资源包中解析消息。在声明了 `ResourceBundleMessageSource` POJO 之后，你可以在 Java Config
  文件中使用 `@Bean` 注解，使 I18N 数据在应用程序中可用。




  ### 工作原理


  举例来说，为美国英语创建以下资源包文件 `messages_en_US.properties`。资源包从类路径的根目录加载，因此请确保它们在 Java 类路径中可用。将以下键值对放入文件中：


  ```

  alert.checkout=A shopping cart has been checked out.

  alert.inventory.checkout=A shopping cart with {0} has been checked out at {1}.

  ```


  为了从资源包中解析消息，我们创建一个包含 `ReloadableResourceBundleMessageSource` bean 的 Java 配置文件：


  ```

  package com.apress.spring6recipes.shop.config;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.context.support.ReloadableResourceBundleMessageSource;

  @Configuration

  public class ShopConfiguration {

  @Bean

  public ReloadableResourceBundleMessageSource messageSource() {

  var messageSource = new ReloadableResourceBundleMessageSource();

  messageSource.setBasenames("classpath:messages");

  messageSource.setCacheSeconds(1);

  return messageSource;

  }

  }

  ```


  为了让应用上下文能够检测到该 bean 实例，其名称必须为 `messageSource`。在 bean 定义中，通过 `setBasenames` 方法声明一个
  `String` 列表，用于定位 `ResourceBundleMessageSource` 的包。在此例中，我们仅指定了默认约定，即查找位于 Java 类路径中、以
  messages 开头的文件。此外，`setCacheSeconds` 方法将值设置为 1，以避免读取过时的消息。请注意，刷新尝试在实际重新加载之前，会先检查属性文件的最后修改时间戳；因此，如果文件没有变化，`setCacheSeconds`
  的间隔可以设置得相当短，因为刷新尝试实际上并不会重新加载。


  对于此 `MessageSource` 定义，如果你查找美国区域（首选语言为英语）的文本消息，会首先考虑资源包 `messages_en_US.properties`。如果不存在这样的资源包或找不到该消息，则会考虑匹配该语言的
  `messages_en.properties` 文件。如果仍然找不到资源包，则会选择适用于所有区域的默认 `messages.properties` 文件。有关资源包加载的更多信息，你可以参考
  `java.util.ResourceBundle` 类的 Javadoc。


  接下来，你可以配置应用上下文，使用 `getMessage()` 方法解析消息。第一个参数是消息对应的键，第三个参数是目标区域：


  ```

  package com.apress.spring6recipes.shop;

  import com.apress.spring6recipes.shop.config.ShopConfiguration;

  import org.springframework.context.annotation.AnnotationConfigApplicationContext;

  import java.time.LocalDateTime;

  import java.util.Locale;

  public class Main {

  private static final String MSG = "The I18N message for %s is: %s%n";

  public static void main(String[] args) {

  var cfg = ShopConfiguration.class;

  try (var context = new AnnotationConfigApplicationContext(cfg)) {

  var alert = context.getMessage("alert.checkout", null, Locale.US);

  var alert_inventory = context.getMessage("alert.inventory.checkout",

  new Object[] { "[DVD-RW 3.0]", LocalDateTime.now() }, Locale.US);

  System.out.printf(MSG, "alert.checkout", alert);

  System.out.printf(MSG, "alert.inventory.checkout", alert_inventory);

  }

  }

  }

  ```


  `getMessage()` 方法的第二个参数是一个消息参数数组。在第一个 `String` 语句中，该值为 `null`。在第二个 `String` 语句中，使用了一个对象数组来填充消息参数。


  在 `Main` 类中，你可以解析文本消息，因为你可以直接访问应用上下文。但对于一个 bean 来说，要解析文本消息，你必须将一个 `MessageSource`
  实现注入到需要解析文本消息的 bean 中。让我们为购物应用实现一个 `Cashier` 类，演示如何解析消息：


  ```

  package com.apress.spring6recipes.shop;

  ...

  @Component

  public class Cashier {

  @Autowired

  private MessageSource messageSource;

  public void checkout(ShoppingCart cart) throws IOException {

  var alert = messageSource.getMessage("alert.inventory.checkout",

  new Object[] { cart.getItems(), new Date() }, Locale.US);

  System.out.println(alert);

  }

  }

  ```


  请注意，POJO 字段 `messageSource` 是 Spring 的 `MessageSource` 类型。该字段使用了 `@Autowired` 注解进行标注，因此在创建
  bean 实例时，会通过注入来填充它。然后，`checkout` 方法可以访问 `messageSource` 字段，这使得该 bean 能够访问 `getMessage`
  方法，从而根据 I18N 标准获取文本消息。


  ## 1-8. 使用注解自定义 POJO 的初始化和销毁


  ### 问题


  某些 POJO 在使用前必须执行特定类型的初始化任务。这些任务可能包括打开文件、打开网络/数据库连接、分配内存等。此外，这些相同的 POJO 还必须在其生命周期结束时执行相应的销毁任务。因此，有时需要在
  Spring IoC 容器中自定义 bean 的初始化和销毁。


  ### 解决方案


  Spring 可以通过在 Java 配置类的 `@Bean` 定义中设置 `initMethod` 和 `destroyMethod` 属性来识别初始化和销毁回调方法。或者，如果
  POJO 的方法分别使用了 `@PostConstruct` 和 `@PreDestroy` 注解进行修饰，Spring 也能识别初始化和销毁回调方法。Spring
  还可以使用 `@Lazy` 注解将 bean 的创建延迟到需要时——这个过程称为延迟初始化。Spring 还可以使用 `@DependsOn` 注解确保某些 bean
  在其他 bean 之前初始化。


  ### 工作原理




  #### 使用 @Bean 定义 POJO 初始化和销毁前运行的方法


  我们以购物应用为例，考虑一个涉及结账功能的示例。让我们修改 `Cashier` 类，将购物车的商品和结账时间记录到一个文本文件中：


  ```

  package com.apress.spring6recipes.shop;

  import java.io.BufferedWriter;

  import java.io.IOException;

  import java.nio.charset.StandardCharsets;

  import java.nio.file.Files;

  import java.nio.file.Path;

  import java.nio.file.StandardOpenOption;

  import java.time.LocalDateTime;

  public class Cashier {

  private final String filename;

  private final String path;

  private BufferedWriter writer;

  public Cashier(String filename, String path) {

  this.filename = filename;

  this.path = path;

  }

  public void openFile() throws IOException {

  var checkoutPath = Path.of(path, filename + ".txt");

  if (Files.notExists(checkoutPath.getParent())) {

  Files.createDirectories(checkoutPath.getParent());

  }

  this.writer = Files.newBufferedWriter(checkoutPath, StandardCharsets.UTF_8,

  StandardOpenOption.CREATE, StandardOpenOption.APPEND);

  }

  public void checkout(ShoppingCart cart) throws IOException {

  writer.write(LocalDateTime.now() + "\t" + cart.getItems() + "\r\n");

  writer.flush();

  }

  public void closeFile() throws IOException {

  writer.close();

  }

  }

  ```


  在 `Cashier` 类中，`openFile()` 方法首先验证目标目录和要写入数据的文件是否存在。然后，它在指定的系统路径中打开文本文件，并将其赋值给 writer
  字段。之后，每次调用 `checkout()` 方法时，日期和购物车商品都会被追加到文本文件中。最后，`closeFile()` 方法关闭文件以释放其系统资源。


  接下来，让我们探讨如何在 Java 配置类中设置这个 bean 定义，以便在 bean 创建之前执行 `openFile()` 方法，并在 bean 销毁之前执行
  `closeFile()` 方法：


  ```

  @Bean(initMethod = "openFile", destroyMethod = "closeFile")

  public Cashier cashier() {

  var path = System.getProperty("java.io.tmpdir") + "/cashier";

  return new Cashier("checkout", path);

  }

  ```


  请注意，POJO 的初始化和销毁任务是通过 `@Bean` 注解的 `initMethod` 和 `destroyMethod` 属性定义的。通过在 bean
  声明中设置这两个属性，当创建 `Cashier` 类时，它会首先触发 `openFile()` 方法——验证目标目录和要写入数据的文件是否存在，并打开文件以追加记录——而当
  bean 被销毁时，它会触发 `closeFile()` 方法，确保文件引用被关闭以释放系统资源。


  #### 使用 @PostConstruct 和 @PreDestroy 定义 POJO 初始化和销毁前运行的方法


  如果你要在 Java 配置类之外定义 POJO 实例（例如，使用 `@Component` 注解），另一种选择是直接在 POJO 类中使用 `@PostConstruct`
  和 `@PreDestroy` 注解：


  ```

  package com.apress.spring6recipes.shop;

  import jakarta.annotation.PostConstruct;

  import jakarta.annotation.PreDestroy;

  import java.nio.charset.StandardCharsets;

  import java.nio.file.Files;

  import java.nio.file.Paths;

  import java.nio.file.StandardOpenOption;

  public class Cashier {

  @PostConstruct

  public void openFile() throws IOException {

  var checkoutPath = Paths.get(path, filename + ".txt");

  if (Files.notExists(checkoutPath.getParent())) {

  Files.createDirectories(checkoutPath.getParent());

  }

  this.writer = Files.newBufferedWriter(checkoutPath, StandardCharsets.UTF_8,

  StandardOpenOption.CREATE, StandardOpenOption.APPEND);

  }

  @PreDestroy

  public void closeFile() throws IOException {

  writer.close();

  }

  }

  ```


  `openFile()` 方法使用了 `@PostConstruct` 注解，这告诉 Spring 在 bean 构造完成后立即执行该方法。`closeFile()`
  方法使用了 `@PreDestroy` 注解，这告诉 Spring 在 bean 销毁之前立即执行该方法。


  #### 使用 @Lazy 定义 POJO 的延迟初始化


  默认情况下，Spring 对所有 POJO 执行**急切初始化**。这意味着 POJO 在启动时就被初始化。然而，在某些情况下，将 POJO 的初始化过程延迟到需要
  bean 时再进行可能会更方便。延迟初始化被称为“**懒加载**”。


  懒加载有助于限制启动时的资源消耗峰值，并节省整体系统资源。懒加载对于执行重量级操作（例如，网络连接、文件操作）的 POJO 尤其相关。要标记一个 bean 为懒加载，你可以使用
  `@Lazy` 注解装饰该 bean：


  ```

  package com.apress.spring6recipes.shop;

  import org.springframework.context.annotation.Lazy;

  import org.springframework.context.annotation.Scope;

  import org.springframework.stereotype.Component;

  @Component

  @Scope("prototype")

  @Lazy

  public class ShoppingCart {

  ```


  在上述声明中，由于 POJO 使用了 `@Lazy` 注解，如果该 POJO 从未被应用程序需要或被其他 POJO 引用，那么它将永远不会被实例化。


  ![](img/314861_5_En_1_Figg_HTML.gif)一个带阴影圆圈内字母 i 的图标，代表信息符号。  `@Lazy` 注解也可以与 `@Autowired`
  一起用于字段或构造函数，以实现延迟注入。


  #### 使用 @DependsOn 定义 POJO 在其他 POJO 之前初始化


  随着应用程序中 POJO 数量的增长，POJO 初始化的数量也随之增加。如果 POJO 相互引用并且分布在不同的 Java 配置类中，这可能会产生**竞态条件**。如果
  bean “C” 需要 bean “B” 和 bean “F” 中的逻辑，但 bean “C” 首先被检测到，而 Spring 尚未初始化 bean “B” 和
  bean “F”，那么你将得到一个错误，并且这个错误可能难以发现。为了确保某些 POJO 在其他 POJO 之前被初始化，并在初始化过程失败时获得更具描述性的错误信息，Spring
  提供了 `@DependsOn` 注解。`@DependsOn` 注解确保给定的 bean 在另一个 bean 之前被初始化：


  ```

  package com.apress.spring6recipes.sequence.config;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.context.annotation.DependsOn;

  import com.apress.spring6recipes.sequence.Sequence;

  @Configuration

  public class SequenceConfiguration {

  @Bean

  @DependsOn("datePrefixGenerator")

  public Sequence sequenceGenerator() {

  return new Sequence("A", 100000);

  }

  }

  ```


  在上面的代码片段中，声明 `@DependsOn("datePrefixGenerator")` 确保了 `datePrefixGenerator` bean
  在 `sequenceGenerator` bean 之前被创建。


  ## 1-9\. 创建后处理器以验证和修改 POJO


  ### 问题


  你希望在构造期间对所有 bean 实例或特定类型的实例应用任务，以根据特定标准验证或修改 bean 属性。


  ### 解决方案


  **Bean 后处理器**允许在初始化回调方法（即分配给 `@Bean` 注解的 `initMethod` 属性的方法或使用 `@PostConstruct`
  注解装饰的方法）之前和之后处理 bean。Bean 后处理器的主要特点是它处理 IoC 容器中的所有 bean 实例，而不仅仅是单个 bean 实例。通常，bean
  后处理器用于检查 bean 属性的有效性、根据特定标准更改 bean 属性，或对所有 bean 实例应用某些任务。


  ### 工作原理


  假设你想要审计每个 bean 的创建。你可能出于调试应用程序、验证每个 bean 的属性或其他场景而这样做。Bean 后处理器是实现此功能的理想选择，因为你无需修改任何预先存在的
  POJO 代码。




  #### 创建一个 POJO 来处理每个 Bean 实例


  要编写一个 Bean 后处理器，类必须实现 `BeanPostProcessor`。当 Spring 检测到实现了该接口的 Bean 时，它会将 `postProcessBeforeInitialization()`
  和 `postProcessAfterInitialization()` 方法应用于 Spring 管理的所有 Bean 实例。你可以在这些方法中实现任何逻辑，以检查、修改或验证
  Bean 的状态：


  ```

  package com.apress.spring6recipes.shop;

  import org.springframework.beans.BeansException;

  import org.springframework.beans.factory.config.BeanPostProcessor;

  import org.springframework.stereotype.Component;

  @Component

  public class AuditCheckBeanPostProcessor implements BeanPostProcessor {

  @Override

  public Object postProcessBeforeInitialization(Object bean, String beanName)

  throws BeansException {

  var msg = "In AuditCheckBeanPostProcessor.postProcessBeforeInitialization, processing
  bean type: %s%n";

  System.out.printf(msg, bean.getClass().getName());

  return bean;

  }

  @Override

  public Object postProcessAfterInitialization(Object bean, String beanName)

  throws BeansException {

  return bean;

  }

  }

  ```


  请注意，即使你在方法中不执行任何操作，`postProcessBeforeInitialization()` 和 `postProcessAfterInitialization()`
  方法也必须返回原始的 Bean 实例。


  要在应用上下文中注册一个 Bean 后处理器，请使用 `@Component` 注解标注该类。应用上下文能够检测哪个 Bean 实现了 `BeanPostProcessor`
  接口，并将其注册，以处理容器中的所有其他 Bean 实例。


  #### 创建一个 POJO 来处理选定的 Bean 实例


  在 Bean 构造期间，Spring IoC 容器会将所有 Bean 实例逐个传递给 Bean 后处理器。这意味着，如果你只想将 Bean 后处理器应用于特定类型的
  Bean，则必须通过检查其实例类型来过滤 Bean。这允许你更有选择性地跨 Bean 应用逻辑。


  假设你现在想应用一个 Bean 后处理器，但仅针对 `Product` Bean 实例。以下示例是另一个仅执行此操作的 Bean 后处理器：


  ```

  package com.apress.spring6recipes.shop;

  import org.springframework.beans.BeansException;

  import org.springframework.beans.factory.config.BeanPostProcessor;

  public class ProductCheckBeanPostProcessor implements BeanPostProcessor {

  private static final String MSG =

  "In ProductCheckBeanPostProcessor.%s, processing Product: %s%n";

  public Object postProcessBeforeInitialization(Object bean, String beanName)

  throws BeansException {

  if (bean instanceof Product product) {

  var productName = product.getName();

  System.out.printf(MSG, "postProcessBeforeInitialization", productName);

  }

  return bean;

  }

  public Object postProcessAfterInitialization(Object bean, String beanName)

  throws BeansException {

  if (bean instanceof Product product) {

  var productName = product.getName();

  System.out.printf(MSG, "postProcessAfterInitialization", productName);

  }

  return bean;

  }

  }

  ```


  `postProcessBeforeInitialization()` 和 `postProcessAfterInitialization()` 方法都必须返回正在处理的
  Bean 的实例。然而，这也意味着你甚至可以在 Bean 后处理器中用全新的实例替换原始的 Bean 实例。


  ## 1-10. 使用工厂创建 POJO（静态方法、实例方法、Spring 的 FactoryBean）


  ### 问题


  你想通过调用静态工厂方法或实例工厂方法在 Spring IoC 容器中创建 POJO 实例。此方法的目的是将对象创建过程分别封装在静态方法或另一个对象实例的方法中。请求对象的客户端只需调用此方法，而无需了解创建细节。你想使用
  Spring 的工厂 Bean 在 Spring IoC 容器中创建 POJO 实例。工厂 Bean 是一个用作工厂的 Bean，用于在 IoC 容器内创建其他
  Bean。从概念上讲，工厂 Bean 与工厂方法非常相似，但它是 Spring 特定的 Bean，可以在 Bean 构造期间被 Spring IoC 容器识别。


  ### 解决方案


  要在 Java 配置类的 `@Bean` 定义中通过调用静态工厂方法来创建 POJO，你可以使用标准 Java 语法来调用静态工厂方法。要在 Java 配置类的
  `@Bean` 定义中通过调用实例工厂方法来创建 POJO，你需要创建一个 POJO 来实例化工厂值，并创建另一个 POJO 作为访问工厂的门面。


  为了方便起见，Spring 提供了一个名为 `AbstractFactoryBean` 的抽象模板类，用于扩展 Spring 的 `FactoryBean` 接口。


  ### 工作原理


  #### 通过调用静态工厂方法创建 POJO


  例如，你可以编写以下 `createProduct` 静态工厂方法，根据预定义的产品 ID 创建产品。根据产品 ID，此方法决定实例化哪个具体产品类。如果没有匹配此
  ID 的产品，它会抛出 `IllegalArgumentException`：


  ```

  package com.apress.spring6recipes.shop;

  public class ProductCreator {

  public static Product createProduct(String productId) {

  return switch (productId) {

  case "aaa" -> new Battery("AAA", 2.5, true);

  case "cdrw" -> new Disc("CD-RW", 1.5, 700);

  case "dvdrw" -> new Disc("DVD-RW", 3.0, 4700);

  default -> {

  var msg = "Unknown product ''" + productId + "''";

  throw new IllegalArgumentException(msg);

  }

  };

  }

  }

  ```


  要在 Java 配置类的 `@Bean` 定义中使用静态工厂方法创建 POJO，你可以使用常规 Java 语法调用工厂方法：


  ```

  package com.apress.spring6recipes.shop.config;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.ComponentScan;

  import org.springframework.context.annotation.Configuration;

  import com.apress.spring6recipes.shop.Product;

  import com.apress.spring6recipes.shop.ProductCreator;

  @Configuration

  @ComponentScan("com.apress.spring6recipes.shop")

  public class ShopConfiguration {

  @Bean

  public Product aaa() {

  return ProductCreator.createProduct("aaa");

  }

  @Bean

  public Product cdrw() {

  return ProductCreator.createProduct("cdrw");

  }

  @Bean

  public Product dvdrw() {

  return ProductCreator.createProduct("dvdrw");

  }

  }

  ```




  #### 通过调用实例工厂方法创建 POJO


  例如，你可以编写以下 `ProductCreator` 类，通过使用可配置的 Map 来存储预定义的产品。`createProduct()` 实例工厂方法通过在
  Map 中查找提供的 `productId` 来寻找产品。如果没有匹配此 ID 的产品，它将抛出一个 `IllegalArgumentException`：


  ```

  package com.apress.spring6recipes.shop;

  import java.util.Map;

  public class ProductCreator {

  private final Map products;

  public ProductCreator(Map products) {

  this.products = products;

  }

  public Product createProduct(String productId) {

  Product product = products.get(productId);

  if (product != null) {

  return product;

  }

  var msg = "Unknown product ''" + productId + "''";

  throw new IllegalArgumentException(msg);

  }

  }

  ```


  要从这个 `ProductCreator` 创建产品，首先声明一个 `@Bean` 来实例化工厂值。接着，声明第二个 Bean 作为访问工厂的门面。最后，你可以调用工厂并执行
  `createProduct()` 方法来实例化其他 Bean：


  ```

  package com.apress.spring6recipes.shop.config;

  import com.apress.spring6recipes.shop.Battery;

  import com.apress.spring6recipes.shop.Disc;

  import com.apress.spring6recipes.shop.Product;

  import com.apress.spring6recipes.shop.ProductCreator;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.ComponentScan;

  import org.springframework.context.annotation.Configuration;

  import java.util.Map;

  @Configuration

  @ComponentScan("com.apress.spring6recipes.shop")

  public class ShopConfiguration {

  @Bean

  public ProductCreator productCreatorFactory() {

  var products = Map.of(

  "aaa", new Battery("AAA", 2.5, true),

  "cdrw", new Disc("CD-RW", 1.5, 700),

  "dvdrw", new Disc("DVD-RW", 3.0, 4700));

  return new ProductCreator(products);

  }

  @Bean

  public Product aaa(ProductCreator productCreator) {

  return productCreator.createProduct("aaa");

  }

  @Bean

  public Product cdrw(ProductCreator productCreator) {

  return productCreator.createProduct("cdrw");

  }

  @Bean

  public Product dvdrw(ProductCreator productCreator) {

  return productCreator.createProduct("dvdrw");

  }

  }

  ```


  #### 使用 Spring 的工厂 Bean 创建 POJO


  虽然你很少需要编写自定义工厂 Bean，但通过一个示例来理解其内部机制可能会有所帮助。例如，你可以编写一个工厂 Bean，用于创建应用了折扣价格的产品。它接受一个
  `product` 属性和一个 `discount` 属性，将折扣应用于产品，并将其作为新 Bean 返回：


  ```

  package com.apress.spring6recipes.shop;

  import org.springframework.beans.factory.config.AbstractFactoryBean;

  public class DiscountFactoryBean extends AbstractFactoryBean {

  private Product product;

  private double discount;

  public void setProduct(Product product) {

  this.product = product;

  }

  public void setDiscount(double discount) {

  this.discount = discount;

  }

  @Override

  public Class getObjectType() {

  return product.getClass();

  }

  @Override

  protected Product createInstance() throws Exception {

  product.setPrice(product.getPrice() * (1 - discount));

  return product;

  }

  }

  ```


  通过扩展 `AbstractFactoryBean` 类，工厂 Bean 只需重写 `createInstance()` 方法即可创建目标 Bean 实例。此外，你必须在
  `getObjectType()` 方法中返回目标 Bean 的类型，以便自动装配功能正常工作。


  接下来，你可以使用常规的 `@Bean` 注解声明产品实例，以应用 `DiscountFactoryBean`：


  ```

  package com.apress.spring6recipes.shop.config;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.ComponentScan;

  import org.springframework.context.annotation.Configuration;

  import com.apress.spring6recipes.shop.Battery;

  import com.apress.spring6recipes.shop.DiscountFactoryBean;

  import com.apress.spring6recipes.shop.Disc;

  @Configuration

  @ComponentScan("com.apress.spring6recipes.shop")

  public class ShopConfiguration {

  @Bean

  public Battery aaa() {

  return new Battery("AAA", 2.5, true);

  }

  @Bean

  public Disc cdrw() {

  return new Disc("CD-RW", 1.5, 700);

  }

  @Bean

  public Disc dvdrw() {

  return new Disc("DVD-RW", 3.0, 4700);

  }

  @Bean

  public DiscountFactoryBean discountFactoryBeanAAA(Battery aaa) {

  var factory = new DiscountFactoryBean();

  factory.setProduct(aaa);

  factory.setDiscount(0.2);

  return factory;

  }

  @Bean

  public DiscountFactoryBean discountFactoryBeanCDRW(Disc cdrw) {

  var factory = new DiscountFactoryBean();

  factory.setProduct(cdrw);

  factory.setDiscount(0.1);

  return factory;

  }

  @Bean

  public DiscountFactoryBean discountFactoryBeanDVDRW(Disc dvdrw) {

  var factory = new DiscountFactoryBean();

  factory.setProduct(dvdrw);

  factory.setDiscount(0.1);

  return factory;

  }

  }

  ```


  ## 1-11. 使用 Spring 环境和 Profile 加载不同的 POJO 集合


  ### 问题


  你希望使用同一组 POJO 实例或 Bean，但针对不同的应用场景（例如“生产”、“开发”和“测试”）使用不同的实例化值。


  ### 解决方案


  创建多个 Java 配置类，并将 POJO 实例或 Bean 分组到这些类中。根据分组的目的，使用 `@Profile` 注解为 Java 配置类分配一个 Profile
  名称。获取应用程序上下文的 Environment，并设置 Profile 以加载特定的 POJO 组。


  ### 工作原理


  POJO 的实例化值可能因不同的应用场景而异。例如，一个常见场景是应用程序从开发阶段进入测试阶段，再到生产阶段。在每个场景中，某些 Bean 的属性可能会略有不同，以适应环境变化（例如，数据库用户名/密码、文件路径等）。


  你可以创建多个 Java 配置类，每个类包含不同的 POJO（例如 `ShopConfigurationGlobal`、`ShopConfigurationSpr`
  和 `ShopConfigurationSumWin`）。在应用程序上下文中，仅根据场景加载给定的配置类文件。没有 `@Profile` 注解的 Bean 始终会被加载，因为它们不绑定到特定的
  Profile。




  #### 使用 @Profile 注解创建 Java 配置类


  让我们为之前食谱中介绍的购物应用创建多个带有 `@Profile` 注解的 Java 配置类：


  ```

  package com.apress.spring6recipes.shop.config;

  import com.apress.spring6recipes.shop.Cashier;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.ComponentScan;

  import org.springframework.context.annotation.Configuration;

  @Configuration

  @ComponentScan("com.apress.spring6recipes.shop")

  public class ShopConfigurationGlobal {

  @Bean(initMethod = "openFile", destroyMethod = "closeFile")

  public Cashier cashier() {

  var path = System.getProperty("java.io.tmpdir") + "/cashier";

  return new Cashier("checkout", path);

  }

  }

  ```


  ```

  package com.apress.spring6recipes.shop.config;

  import org.springframework.context.annotation.Bean;

  import org.springframework.context.annotation.Configuration;

  import org.springframework.context.annotation.Profile;

  import com.apress.spring6recipes.shop.Battery;

  import com.apress.spring6recipes.shop.Disc;

