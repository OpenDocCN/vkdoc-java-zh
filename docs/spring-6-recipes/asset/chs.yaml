  \ 方法仍然保留。该方法将继续用于通过 `vehicleNo` 属性查找 `Vehicle` 对象。所有 `findBy` 方法都被转换成了 Redis 查询。`findBy`\
  \ 之后的部分会被解释为属性名。还可以使用不同的运算符（如 `and`、`or` 和 `between`）编写更复杂的查询。\n\n![](img/314861_5_En_9_Figh_HTML.gif)一个信息符号，由带阴影圆圈内的字母\
  \ i 图标表示。  为了方便，我们继承了 `ListCrudRepository`。现在 `findAll` 返回的是 `List` 而不是 `Iterable`。\n\
  \n现在再次运行 `Main` 类，应该仍能得到相同的输出。不过，实际编写的用于操作 Redis 的代码已经被精简到最少。\n\n```\npackage com.apress.spring6recipes.nosql;\n\
  import org.springframework.context.annotation.AnnotationConfigApplicationContext;\n\
