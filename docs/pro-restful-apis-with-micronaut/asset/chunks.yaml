- fmt: "You never see the access token; it will be stored by the website (in session,\
    \ for example). Server also sends other information with the access token, such\
    \ as the token lifetime and eventually a refresh token.\n\n**Sequence diagram:**\n\
    \nFigure [9-2](#427457_3_En_9_Chapter.xhtml#Fig2) shows sequence diagram for authorization\
    \ code grant flow.\n\n![](images/427457_3_En_9_Chapter/427457_3_En_9_Fig2_HTML.jpg)\n\
    \nDiagram illustrating the Authorization Code Grant Flow in OAuth 2.0. It involves\
    \ four entities: Resource Owner, Client, Authorization Server, and Resource Server.\
    \ The process starts with the Client requesting an authorization code from the\
    \ Authorization Server, requiring parameters like `client_id` and `redirect_uri`.\
    \ After login and consent, the Authorization Server responds with an authorization\
    \ code. The Client exchanges this code for an access token, needing `client_id`,\
    \ `client_secret`, and `redirect_uri`. The access token, possibly with a refresh\
    \ token, is used to call an API on the Resource Server, which responds with data.\
    \ The flow includes a loop for repeated API calls using the access token.\n\n\
    **Figure 9-2** Authorization code grant flow\n\n## Implicit Grant Flow\n\nWe will\
    \ review implicit grant and its flow in this section.\n\n### When Should It Be\
    \ Used?\n\nIt is typically used when the client is running in a browser using\
    \ a scripting language such as JavaScript. This grant type does not allow the\
    \ issuance of a refresh token.\n\n**Example**:\n- **Resource owner**: You\n- **Resource\
    \ server**: A server\n- **Client**: A website using AngularJS, for example\n-\
    \ **Authorization server**: A server\n\n**Scenario**:\n\n1.  The client (AngularJS)\
    \ wants to obtain information about your Facebook profile.\n2.  You are redirected\
    \ by the browser to the authorization server (Facebook).\n3.  If you authorize\
    \ access, the authorization server redirects you to the website with the access\
    \ token in the URI fragment (not sent to the web server). Example of callback:\
    \ `http://example.com/oauthcallback#access_token=MzJmNDc3M2VjMmQzN`.\n4.  This\
    \ access token can now be retrieved and used by the client (AngularJS) to query\
    \ the resource server (Facebook). Example of query: `https://graph.facebook.com/me?access_token=MzJmNDc3M2VjMmQz`.\n\
    \nMaybe you wonder how the client can make a call to the Facebook API with JavaScript\
    \ without being blocked because of the same origin policy? Well, this cross-domain\
    \ request is possible because Facebook authorizes it, thanks to a header called\
    \ `Access-Control-Allow-Origin` present in the response.\n\n> **Note**  \n> This\
    \ type of authorization should only be used if no other type of authorization\
    \ is available. Indeed, it is the least secure because the access token is exposed\
    \ (and therefore vulnerable) on the client side.\n\n**Sequence diagram**\n\nFigure\
    \ [9-3](#427457_3_En_9_Chapter.xhtml#Fig3) shows the sequence diagram for implicit\
    \ grant flow.\n\n![](images/427457_3_En_9_Chapter/427457_3_En_9_Fig3_HTML.jpg)\n\
    \nDiagram illustrating the Implicit Grant Flow in OAuth 2.0. It shows interactions\
    \ between four entities: Resource Owner, JavaScript Application, Authorization\
    \ Server, and Resource Server. The flow includes steps like Access Token Request,\
    \ Login & Consent, and Access Token Info Request. The JavaScript Application requests\
    \ an access token from the Authorization Server, which requires client ID, redirect\
    \ URI, and response type. Upon successful validation, the application calls an\
    \ API with the access token, and the Resource Server responds with data. Cross-Origin\
    \ Resource Sharing (CORS) must be implemented for cross-domain requests.\n\n**Figure\
    \ 9-3** Sequence diagram for implicit grant flow\n\n## Resource Owner Password\
    \ Credentials Grant\n\nWe will review resource owner password credentials grant\
    \ and its flow in this section.\n\n### When Should It Be Used?\n\nWith this type\
    \ of authorization, the credentials (and thus the password) are sent to the client\
    \ and then to the authorization server. It is therefore imperative that there\
    \ is absolute trust between these two entities. It is mainly used when the client\
    \ has been developed by the same authority as the authorization server. For example,\
    \ we could imagine a website named `example.com` seeking access to protected resources\
    \ of its own subdomain `api.example.com`. The user would not be surprised to type\
    \ his login/password on the site `example.com` since his account was created on\
    \ it.\n\n**Example**:\n- **Resource owner**: You have an account on the `acme.com`\
    \ website of the Acme company.\n- **Resource server**: Acme company exposes its\
    \ API at `api.acme.com`.\n- **Client**: `acme.com` website from Acme company.\n\
    - **Authorization server**: An Acme server.\n\n**Scenario**:\n\n1.  The Acme company,\
    \ doing things well, thought to make available a RESTful API to third-party applications.\n\
    2.  This company thinks it would be convenient to use its own API to avoid reinventing\
    \ the wheel.\n3.  The company needs an access token to call the methods of its\
    \ own API.\n4.  For this, the company asks you to enter your login credentials\
    \ via a standard HTML form as you normally would.\n5.  The server-side application\
    \ (website `acme.com`) will exchange your credentials against an access token\
    \ from the authorization server (if your credentials are valid, of course).\n\
    6.  This application can now use the access token to query its own resource server\
    \ (`api.acme.com`).\n\n**Sequence diagram**\n\nFigure [9-4](#427457_3_En_9_Chapter.xhtml#Fig4)\
    \ shows the sequence diagram for this flow.\n\n![](images/427457_3_En_9_Chapter/427457_3_En_9_Fig4_HTML.jpg)\n\
    \nDiagram of the Resource Owner Password Credentials Grant Flow. It shows interactions\
    \ between four entities: Resource Owner, Client, Authorization Server, and Resource\
    \ Server. The flow begins with the Resource Owner authenticating with credentials\
    \ to the Client. The Client sends an Access Token Request to the Authorization\
    \ Server, requiring `client_id`, `client_secret`, `redirect_uri`, `grant_type=password`,\
    \ `username`, and `password`. The Authorization Server responds with an Access\
    \ Token and optional Refresh Token. The Client enters a loop, calling the API\
    \ with the Access Token and receiving a Response with Data from the Resource Server.\n\
    \n**Figure 9-4** Resource owner password credentials grant flow\n\n## Client Credentials\
    \ Grant\n\nThis type of authorization is used when the client is himself the resource\
    \ owner. There is no authorization to obtain from the end user.\n\n**Example**:\n\
    - **Resource owner**: Any website\n- **Resource server**: Google Cloud Storage\n\
    - **Client**: The resource owner\n- **Authorization server**: A Google server\n\
    \n**Scenario**:\n\n1.  A website stores its files of any kind on Google Cloud\
    \ Storage.\n2.  The website must go through the Google API to retrieve or modify\
    \ files and must authenticate with the authorization server.\n3.  Once authenticated,\
    \ the website obtains an access token that can now be used for querying the resource\
    \ server (Google Cloud Storage).\n\nHere, the end user does not have to give his\
    \ authorization for accessing the resource server.\n\n**Sequence diagram**\n\n\
    Figure [9-5](#427457_3_En_9_Chapter.xhtml#Fig5) shows the sequence diagram for\
    \ this flow.\n\n![](images/427457_3_En_9_Chapter/427457_3_En_9_Fig5_HTML.jpg)\n\
    \nDiagram illustrating the Client Credentials Grant Flow in OAuth 2.0. The process\
    \ involves a client (resource owner) sending an access token request to the authorization\
    \ server, which requires client ID, client secret, and grant type. The authorization\
    \ server responds with an access token. The client then uses this token to call\
    \ an API on the resource server, which returns a response with data. The diagram\
    \ includes a note that refresh tokens are not recommended in this flow.\n\n**Figure\
    \ 9-5** Client credentials grant flow"
