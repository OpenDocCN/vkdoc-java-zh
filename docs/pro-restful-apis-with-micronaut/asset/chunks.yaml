- fmt: "# Web Architectural Style\n\nAccording to Fielding, there are two ways to\
    \ define a system.\n\n- One is to start from a blank slate—an empty whiteboard—with\
    \ no initial knowledge of the system being built or the use of familiar components\
    \ until the needs are satisfied.\n- A second approach is to start with the full\
    \ set of needs for the system, and constraints are added to individual components\
    \ until the forces that influence the system are able to interact in harmony with\
    \ each other.\n\n`REST` follows the second approach. In order to define a `REST`\
    \ architecture, a null-state is initially defined—a system that has no constraints\
    \ whatsoever and where component differentiation is nothing but a myth—and constraints\
    \ are added one by one. The following subsections cover web architectural style\
    \ constraints. Each of these constrains defines how the framework for `REST APIs`\
    \ should be architected and designed. Security is another aspect which needs to\
    \ be considered independently as part of this framework when rolling out `RESTful\
    \ APIs` to the end users.\n\n## Client-Server\n\nThe separation of concerns is\
    \ the core theme of the Web’s client-server constraints.\n\nThe Web is a client-server-based\
    \ system, in which clients and servers have distinct parts to play.\n\nThey may\
    \ be implemented and deployed independently, using any language or technology,\
    \ so long as they conform to the Web’s uniform interface.\n\n## Uniform Resource\
    \ Interface\n\nThe interactions between the Web’s components—meaning its clients,\
    \ servers, and network-based intermediaries—depend on the uniformity of their\
    \ interfaces.\n\nWeb components interoperate consistently within the uniform interface’s\
    \ four constraints, which Fielding identified as\n\n- Identification of resources\n\
    - Manipulation of resources through representations\n- Self-descriptive messages\n\
    - Hypermedia as the engine of application state (`HATEOAS`)\n\n## Layered System\n\
    \nGenerally speaking, a network-based intermediary will intercept client-server\
    \ communication for a specific purpose.\n\nNetwork-based intermediaries are commonly\
    \ used for enforcement of security, response caching, and load balancing.\n\n\
    The layered system constraints enable network-based intermediaries such as proxies\
    \ and gateways to be transparently deployed between a client and server using\
    \ the Web’s uniform interface.\n\n## Caching\n\nCaching is one of web architecture’s\
    \ most important constraints. The cache constraints instruct a web server to declare\
    \ the cache ability of each response’s data.\n\nCaching response data can help\
    \ to reduce client-perceived latency, increase the overall availability and reliability\
    \ of an application, and control a web server’s load. In a word, caching reduces\
    \ the overall cost of the Web.\n\n## Stateless\n\nThe stateless constraint dictates\
    \ that a web server is not required to memorize the state of its client applications.\
    \ As a result, each client must include all of the contextual information that\
    \ it considers relevant in each interaction with the web server.\n\nWeb servers\
    \ ask clients to manage the complexity of communicating their application state\
    \ so that the web server can service a much larger number of clients. This trade-off\
    \ is a key contributor to the scalability of the Web’s architectural style.\n\n\
    ## Code-on-Demand\n\nThe Web makes heavy use of code-on-demand, a constraint which\
    \ enables web servers to temporarily transfer executable programs, such as scripts\
    \ or plug-ins, to clients.\n\nCode-on-demand tends to establish a technology coupling\
    \ between web servers and their clients, since the client must be able to understand\
    \ and execute the code that it downloads on-demand from the server. For this reason,\
    \ code-on-demand is the only constraint of the Web’s architectural style that\
    \ is considered optional.\n\n## HATEOAS\n\nThe final principle of `REST` is the\
    \ idea of using hypermedia as the engine of application state (`HATEOAS`). When\
    \ developing a client-server solution using `HATEOAS`, the logic on the server\
    \ side might change independently of the clients.\n\nHypermedia is a document-centric\
    \ approach with the added support for embedding links to other services and information\
    \ within the document format.\n\nOne of the uses of hypermedia and hyperlinks\
    \ is composing complex sets of information from disparate sources. The information\
    \ could be within a company private cloud or within a public cloud from disparate\
    \ sources.\n\nExample:\n\n```\nhttp://customers.myintranet.com/customers/1\nhttp://podcast.com/myfirstpodcast\n\
    This is my first podcast \n```\n\nEach of these web architecture styles adds beneficial\
    \ properties to the web system.\n\nBy adopting these constraints, teams can build\
    \ simple, visible, usable, accessible, evolvable, flexible, maintainable, reliable,\
    \ scalable, and performant systems as shown in Table [1-2](#427457_3_En_1_Chapter.xhtml#Tab2).\n\
    \n**Table 1-2** Constraint and system property\n\n| By following the constraint\
    \ | Gain the following system property |\n| --- | --- |\n| Client-server interactions\
    \ | Simple, evolvable, and scalable |\n| Stateless communications | Simple, visible,\
    \ maintainable, evolvable, and reliable |\n| Cacheable data | Visible, scalable,\
    \ and performant |\n| Uniform interfaces | Simple, usable, visible, accessible,\
    \ evolvable, and reliable |\n| Layered system | Flexible, scalable, reliable,\
    \ and performant |\n| Code-on-demand | Evolvable |\n\n**Note**\n\nI have not covered\
    \ security in this chapter as part of `REST` fundamentals, but security is very\
    \ important for rolling out `RESTful APIs`.\n\n# What Is REST?\n\nWe have briefly\
    \ introduced `REST` with `REST API` fundamentals in the previous section. This\
    \ section has further introductory details about `REST` concepts.\n\n“`REST`”\
    \ was coined by Roy Fielding in his Ph.D. dissertation to describe a design pattern\
    \ for implementing networked systems. `REST` is Representational State Transfer,\
    \ an architectural style for designing distributed systems. It’s not a standard,\
    \ but rather a set of constraints. It’s not tied to `HTTP`, but is associated\
    \ most commonly with it.\n\n## REST Basics\n\nUnlike `SOAP` and `XML-RPC`, `REST`\
    \ does not really require a new message format. The `HTTP API` is `CRUD` (create,\
    \ retrieve, update, and delete).\n\n- `GET`: “Give me some info” (retrieve).\n\
    - `POST`: “Here’s some update info” (update).\n- `PUT`: “Here’s some new info”\
    \ (create).\n- `DELETE`: “Delete some info” (delete).\n- And more….\n- `PATCH`:\
    \ The `HTTP` method `PATCH` can be used to update partial resources. For instance,\
    \ when you only need to update one field of the resource, `PUT`ting a complete\
    \ resource representation might be cumbersome and utilizes more bandwidth.\n-\
    \ `HEAD`: The `HEAD` method is identical to the `GET` method, except that the\
    \ server must not return a message body in the response. This method is often\
    \ used for testing hypertext links for validity, accessibility, and recent modification.\n\
    - `OPTIONS`: This method allows the client to determine the options and/or requirements\
    \ associated with a resource, or the capabilities of a server, without implying\
    \ a resource action or initiating a resource retrieval.\n- **Notion of “idempotency”**:\
    \ The idea that when sending a `GET`, `DELETE`, or `PUT` to the system, the effect\
    \ should be the same whether the command is sent one or more times, but `POST`\
    \ creates an entity in the collection and therefore is not idempotent."
