    \ |\n\n|\n 参考链接 |\n [`http://raml.org`](http://raml.org) |\n [`https://apiblueprint.org`](https://apiblueprint.org)\
    \ |\n [`http://swagger.io`](http://swagger.io) |\n\n|\n 设计理念 |\n API 优先 |\n 设计优先\
