    ### Injectable Parameter Types


    In addition to the supported JAX-RS annotations, you can use the following JAX-RS
    types as parameter types to resources or client definitions:


    *   [jakarta.​ws.​rs.​core.​HttpHeaders](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/HttpHeaders.html)

    *   [jakarta.​ws.​rs.​core.​CacheControl](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/CacheControl.html)

    *   [jakarta.​ws.​rs.​core.​Cookie](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/Cookie.html)

    *   [jakarta.​ws.​rs.​core.​EntityTag](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/EntityTag.html)

    *   [jakarta.​ws.​rs.​core.​Link](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/Link.html)

    *   [jakarta.​ws.​rs.​core.​MediaType](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/MediaType.html)

    *   [jakarta.​ws.​rs.​core.​SecurityContext](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/SecurityContext.html)


    You can also use the `@Context` annotation to inject any bean into a resource
    type’s method parameter.


    ### SecurityContext and Micronaut Security


    When injecting the `SecurityContext` by default, the injected instance is not
    aware of Micronaut Security and methods like `isUserInRole` always return `false`.


    To integrate the JAX-RS support with Micronaut Security, add the following dependency:


    ```

    io.micronaut.jaxrs

    micronaut-jaxrs-server-security

    ```


    With the above dependency in place, the `SecurityContext.isUserInRole` method
    will return `true` if the role is found within Micronaut Security’s `Authentication.getRoles()`
    method. See [Retrieving the authenticated user](https://micronaut-projects.github.io/micronaut-security/latest/guide/#retrievingAuthenticatedUser)
    for more information.


    ### Summary


    We reviewed JAX-RS, a POJO-based, annotation-driven framework for building web
    services that comply with RESTful principles and its implementation in Micronaut.


    ## 6. API Portfolio and Framework


    This chapter starts with the API portfolio architecture and then gets into the
    framework for API development. An overview of the API framework starting from
    the client to data is discussed, and then, the focus is shifted to review the
    services layer with an exercise implementing the services layer.


    ### API Portfolio Architecture


    Usually, an organization does not have one API but several APIs. All the APIs
    in the portfolio need to be consistent with each other, reusable, discoverable,
    and customizable.


    ### Requirements


    API portfolio design is a concern for different API stakeholders. Both API consumers
    and producers have significant advantages over a properly designed API portfolio,
    and both parties formulate requirements for an API portfolio regarding consistency,
    reuse, customization, discoverability, and longevity.


    #### Consistency


    An API solution, such as a mobile app, may use several APIs from the portfolio,
    and the output of one API is the input of another. So consistency is required
    about data structures, representations, URIs, error messages, and behavior of
    the APIs. API consumers find it easier to work with if it behaves similar to the
    last one and delivers similar error messages.


    #### Reuse


    A consistent portfolio consists of many commonalities among the APIs. These commonalities
    can be factored out, shared, and reused. Reuse leads to a speedup in the development.
    By reusing common elements, the wheel is not reinvented each time an API is built.
    Instead, a common library of patterns and know-how is shared and reused. Reuse
    can be realized in several ways:


    *   Reuse of an API by several apps

    *   Reuse of an API by multiple APIs

    *   Reuse of parts of an API


    APIs should not be developed for a specific consumer. APIs should always be used
    by several consumers, solutions, or projects.


    #### Customization


    There might be consumers who might have specific requirements from the APIs, if
    the consumers of APIs are not a homogenous group. In such a scenario, customizations
    are required to the APIs to meet a consumer’s individual needs. This contradicts
    with reuse requirements, but both can be realized at the same time.


    #### Discoverability


    To expand the usage of APIs, it should be easy for the API consumer to find and
    discover all APIs in an API portfolio. An API portfolio design needs to ensure
    that APIs can be found and all the information necessary for proper usage is available.


    #### Longevity


    This means that important aspects of the API do not change and stay stable for
    a long time. What needs to be stable is the signature of the API, the client-facing
    interface. A change in signature will break the apps built by the API consumer.
    For example, with IoT on “h/w devices,” it is not easy to change.


    ### How Do We Enforce These Requirements—Governance?


    An API initiative is often regarded as an innovation lab of an enterprise. Imposing
    governance can contradict innovation. So to manage these conflicting requirements,
    an API portfolio may be split in two portfolios. One portfolio is dedicated to
    innovation and experiment. This portfolio requires lightweight governance processes.
    Another portfolio is dedicated to stable, productive APIs, which are offered to
    external API consumers.


    #### Consistency


    Each enterprise may implement its own set of consistency rules. When consistency
    rules are defined, consistency checks can be realized as manual or automated.
    Lightweight consistency checks can be realized by manual quality checks or review
    by a colleague. A complementary approach is by automated code generation based
    upon API description.


    #### Reuse


    There are two types of building blocks that are offered by an API Platform like
    security, logging, and error handler. Any other functional commonality or reusable
    solution pattern can be realized as a composition of building blocks. You could
    have your “own” API or third-party APIs. Third-party APIs could be integrated
    in an API Platform by creating an API Proxy on its “own” platform. This helps
    the consumer with homogenous security. API Proxy and API Platform architectures
    are discussed in the next chapter.


    #### Customization


    An API consumer is interested in data formatting and data delivery. Data gathering
    is, however, no concern to the API consumer. So these could be separated into
    two parts: one API we call “utility API” covers the data gathering; the other
    API, which delivers data and formats to the consumer requirements, is called “consumer
    API.” Utility APIs cannot be called directly by a consumer; only consumer APIs
    can call these.


    #### Discoverability


    This could be manual or automated. Manual: Discover by API catalog or yellow pages.
    Automated: SOAP based through UDDI and WSDL. REST: Limited with the `OPTIONS`
    verb of HTTP.


