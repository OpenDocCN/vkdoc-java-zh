  raw: "Smart TV Solutions\nSmart TV offers\nnot only TV channels, but provides interaction\
    \ capabilities. These are\nall implemented by API calls to the servers.\n\nInternet\
    \ of Things\nThe Internet of Things is made up of physical\ndevices with an Internet\
    \ connection. The device connects to smart\nfunctions (e.g., sensors, scanners,\
    \ etc.) which are exposed on the\nInternet via APIs.\n\nStakeholders in API Solutions\n\
    In API solutions, stakeholders are API\nproviders, API consumers, and end users.\
    \ We will discuss the roles of\neach here in this section.\n\nAPI Providers\n\
    API providers develop, design, deploy, and manage APIs. API providers\ndefine\
    \ the API portfolio, road map, and product mode. It is the\nresponsibility of\
    \ an API provider to decide which functionality is\nexposed by the API. In the\
    \ solution-driven approach, only those APIs are\nbuilt which are required by the\
    \ consumer. In the top-down approach, API\nproviders provide APIs which are good\
    \ from an internal perspective, for\nexample, from a reusability perspective.\n\
    \nAPI Consumers\nConsumers need to know how to call an API and build an API client.\n\
    API providers should provide a demo app to consume their API for the\nconsumers.\n\
    \nEnd Users\nEnd users do\nnot call the API directly, but use the app developed\
    \ by API\nconsumers.\n\nAPI Modeling\n\nOpenAPI (Swagger)\nA screenshot of MICRONAUT\
    \ LAUNCH page. It has four headers:\napplication type, Java version, name, and\
