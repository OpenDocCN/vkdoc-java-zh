    ```\n\n**总结**\n在本章中，我们从 API 平台架构入手，然后深入探讨了用于将 RESTful API 与实际数据源集成的数据处理器模式。在练习中，我们演示了如何使用\
    \ JPA 实现数据处理器。\n\n**8. API 管理与 CORS**\n\n在本章中，我们将从外观模式入手，回顾可用的 API 管理需求/解决方案。\n\
    \n**外观模式**\n在本节中，我们将首先回顾外观设计模式，然后在第二部分中详细探讨外观模式如何应用于 API。\n\n**外观模式**\n在讨论外观模式之前，我们先思考一下现实世界中的外观是什么。最明显的例子是建筑物，它们都有外部结构来保护和装饰，隐藏内部的运作机制。这个外部结构就是外观。\n\
    现在，我们可以通过考虑操作系统来更贴近 API。就像建筑物一样，操作系统为计算机的内部功能提供了一个外部外壳。这个简化的接口使操作系统更易于使用，并保护核心免受粗心用户的干扰。\n\
    \n这正是设计模式中外观模式定义的精髓所在：\n\n*为子系统中的一组接口提供一个统一的接口。外观定义了一个更高级别的接口，使子系统更易于使用。*"
- fmt: 'Consider Figure [8-1](#427457_3_En_8_Chapter.xhtml#Fig1); you can see how
    the façade pattern puts an intermediate layer between the packages of the application
    and any client that wants to interact with them.


    ![](images/427457_3_En_8_Chapter/427457_3_En_8_Fig1_HTML.jpg)


    Diagram illustrating a facade design pattern. The top box labeled "Facade" connects
    with dashed arrows labeled "includes" to two lower boxes labeled "Package1" and
    "Package2," indicating that the facade includes both packages.


    **Figure 8-1** Façade pattern


    A diagram illustrates the facade pattern. The facade includes two packages which
    are package 1 and package 2.


    ## API Façade


    Like all implementations of the façade pattern, an API façade is a simple interface
    to a complex problem. Figure [8-2](#427457_3_En_8_Chapter.xhtml#Fig2) shows internal
    subsystems in an enterprise. As shown, each internal subsystem is complex in itself:
    for example, `JDBC` hides the inner workings of database connectivity.


    ![](images/427457_3_En_8_Chapter/427457_3_En_8_Fig2_HTML.jpg)


    The image displays a series of colorful 3D blocks representing different technological
    components. From left to right, the blocks are labeled: "Big System" in blue,
    "DB" in purple, "Content Management" in orange, "SOAP" in green, "JDBC" in red,
    and "RSS" in teal. Each block symbolizes a distinct system or protocol used in
    technology infrastructure.


    **Figure 8-2** Internal subsystems


    A chart of internal subsystems consists of layers of a big system, DB, content
    management, SOAP, JDBC, and RSS.


    Figure [8-3](#427457_3_En_8_Chapter.xhtml#Fig3) shows an API façade layer on the
    top of internal subsystems of the enterprise, providing a unified interface to
    apps.


    ![](images/427457_3_En_8_Chapter/427457_3_En_8_Fig3_HTML.jpg)


    Diagram illustrating an API facade architecture. At the top, icons represent an
    app and an app developer. Below, a horizontal bar labeled "API Facade" connects
    to various backend systems, including Big System, DB, Content Management, SOAP,
    JDBC, and RSS, each depicted as colorful blocks. This setup demonstrates how the
    API facade acts as an intermediary between applications and diverse backend services.


    **Figure 8-3** API façade—high level


    An illustration of the API process. At the top are the app and app developer.
    In the middle is the API facade. At the bottom are the layers of big system, DB,
    content management, SOAP, JDBC, and RSS.


    Implementing an API façade pattern involves three basic steps:


    *   **Design the API**: Identify the URLs, request parameters and responses, payloads,
    headers, query parameters, and so on.

    *   **Implement the design with mock data**: App developers can then test the
    API before the API is connected to internal subsystems, with all the complications
    that entail.

    *   **Connect the façade with the internal systems** to create the live API.


    Figure [8-4](#427457_3_En_8_Chapter.xhtml#Fig4) shows these layers.


    ![](images/427457_3_En_8_Chapter/427457_3_En_8_Fig4_HTML.jpg)


    Diagram illustrating an API architecture. At the top, a red arrow labeled "Ideal
    Design" points towards "App Developer." Below, an orange layer labeled "API Facade"
    sits above a green layer labeled "Mediate." At the bottom, various systems are
    depicted, including "Big System," "DB," "Content Management," "SOAP," "JDBC,"
    and "RSS," representing backend components.


    **Figure 8-4** API façade—layers


    The API process for development includes app developer at the top, followed by
    a double headed arrow labeled ideal design and two rectangular pyramids labeled
    API facade and meditate. The bottom consists of layers of big system, DB, content
    management, SOAP, JDBC, and RSS.


    ## API Management


    An API management tool provides the means to expose your API to external developers
    in an easy and affordable manner.


    Here are the features of an API management service:


    *   Documentation

    *   Analytics and statistics

    *   Deployment

    *   Developer engagement

    *   Sandbox environment

    *   Traffic management and caching abilities

    *   Security

    *   Availability

    *   Monetization

    *   API life cycle management


    API management vendors implement their solution in three different ways:


    *   **Proxy**: All traffic goes through the API management tool, which is placed
    as a layer between the application and users.

    *   **Agents**: These are plug-ins for servers. They do not intercept API calls
    like proxies.

    *   **Hybrid**: This approach picks features of proxies and agents and integrates
    them. You can then pick which features you need.


    ## API Life Cycle


    The default API life cycle has the following stages:


    *   **Analysis**: The API is analyzed, and mock responses are created for a limited
    set of consumers to try out the API and provide feedback. It’s also analyzed for
    monetization, as discussed in the following section.

    *   **Being created/development**: The API is being created: designed, developed,
    and secured. The API metadata is saved, but it is not visible yet nor deployed.

    *   **Published/operations**: The API is visible and eventually published and
    is now in the maintenance stage, where it is scaled and monitored.


    In addition, there are two more stages:


    *   **Deprecated**: The API is still deployed (available at runtime to existing
    users), but is not visible to new users. An API is automatically deprecated when
    a new version is published.

    *   **Retired**: The API is unpublished and deleted.


    These are discussed in the next section.


    Figure [8-5](#427457_3_En_8_Chapter.xhtml#Fig5) shows an API life cycle.


    ![](images/427457_3_En_8_Chapter/427457_3_En_8_Fig5_HTML.jpg)


    A circular diagram illustrating a software development lifecycle with seven stages.
    Starting from the top and moving clockwise: Design with a hammer and wrench icon,
    Develop with gear icons, Secure with a padlock icon, Publish with an arrow icon,
    Scale with a graph icon, Monitor with a chart icon, and Analyze with a bar graph
    icon. The final stage is Monetize, represented by a dollar sign icon. Each stage
    is marked by an orange circle with a relevant icon.


    **Figure 8-5** API life cycle


    The API life cycle includes design, develop, secure, publish, scale, monitor,
    analyze, and monetize.


    ## API Retirement


    As old age comes, we get to retire, and the same is true with APIs. With time
    and due to the following reasons, an API is retired or deprecated:


    *   Lack of partner or third-party developer innovation

    *   Losing market share due to exposure of data by APIs

    *   Changes in the technology stack, for example, REST replacing SOAP

    *   **Security concern**: Making public APIs private due to security requirement
    of the information or data exposed by APIs

    *   **Versioning**: Most common reason due to functionality changes


    Some of the examples of API retirement are Netflix, Google Earth, Twitter V1.0,
    etc.


    ## API Monetization


    Digital assets or services provide real value to customers, partners, and end
    users, and hence, they should be a source of revenue for your company, as well
    as an important part of your business model.


    There are three business models for monetizing APIs:


    *   The revenue share model, where the API consumer gets paid for the incremental
    business they trigger for the API provider.

    *   The fee-based model, where the API consumer pays the provider for API usage.

    *   The third and final business model is freemium. Freemium models can be based
    on a variety of factors such as volume, time, or some combination; they can be
    implemented as standalone or hybrid models (in conjunction with the revenue share
    or fee-based).'
