  raw: "API Security—JSON Web Token\nJWT stands for JSON Web Token, and it is a commonly\n\
    used stateless user authentication standard used to securely transmit\ninformation\
    \ between the client and server in a JSON format. A JWT is\nencoded and not encrypted\
    \ by default. It is digitally signed using a\nsecret key known only to the server.\n\
    A JSON Web Token consists of three parts\nseparated by a period: the header, the\
    \ payload, and the signature. Each\nsection is base64 encoded.\n\nThe steps involved\
    \ in a typical JWT authorization flow are as follows:\n\n1.  **Authentication**:\
    \ The user signs in using username and\n    password, or using, for example, Google\
    \ or Facebook. The server verifies\n    the provided credentials.\n\n2.  **Token\
    \ generation and sending token to the client**:\n    The server will generate\
    \ the JWT and send it to the client, which stores\n    it for future use.\n\n\
    3.  **Sending the token to the server**: When the client\n    wants to access\
    \ a protected resource on the server, it sends the JWT in\n    the Authorization\
    \ header of the HTTP request.\n\n4.  **Verifying the token**: The server receives\
    \ the request\n    and verifies the JWT by checking its\n    signature using the\
    \ secret key that was used to sign it. If the JWT is\n    valid, the server extracts\
    \ the information contained in it and uses it\n    to determine what actions the\
    \ user is authorized to perform.\n\n5.  **Authorizing the request**: If the user\
    \ is authorized\n    to access the resource, the server returns the requested\
    \ data. If the\n    user is not authorized, the server returns an error message.\n\
    \n**Advantages**\n\n*   Lightweight.\n\n*   **Portable**: Can be processed on\
    \ multiple\n    platforms, web and mobile.\n\n*   JSON parsers are common in most\
    \ programming languages.\n\n*   Protected against tampering because of the secret\
    \ key stored on\n    server side.\n\n*   The server does not need to store any\
    \ session information,\n    because of the stateless nature of the JWT token.\n\
    \n**Disadvantages**\n\n*   Can provide full access if intercepted. That’s why\
    \ JWTs on client\n    side should be stored somewhere secure, for example, in\
    \ the browser in\n    an HttpOnly cookie.\n\n*   On server side, should manually\
    \ mark nonexpired JWT as invalid on\n    logout. A JWT can still be valid even\n\
    \    after it has been deleted from the client.\n\nEXERCISE—BASIC SECURITY\n\n\
    Create an application using the\n[Micronaut Command Line Interface](https://docs.micronaut.io/latest/guide/%2523cli)\
