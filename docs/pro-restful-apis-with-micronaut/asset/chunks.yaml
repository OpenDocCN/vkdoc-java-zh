    \ in existing architecture in\nthe enterprise. Firewall is used to improve security.\
    \ Load balancers are\nused to improve performance and are usually placed between\
    \ the Internet\nand the API Platform. IAM (Identity and Access Management) systems\
    \ are\nfor managing identity information and LDAP or Active Directory as shown\n\
    in Figure [7-2](#427457_3_En_7_Chapter.xhtml#Fig2).\n\n![](images/427457_3_En_7_Chapter/427457_3_En_7_Fig2_HTML.jpg)\n\
    \nDiagram illustrating an API architecture. At the top, API Clients,\nFirewalls,\
    \ and Load Balancers are shown. Below, the API Platform\nincludes API Development,\
    \ Runtime, and Engagement Platforms. At the\nbottom, back-end components include\
    \ IAM Systems, Enterprise Service Bus,\nDatabases, Legacy System, and Cloud Service.\n\
    \nFigure 7-2\nAPI architecture in an enterprise\n\nA process diagram of the API\
    \ implementation in an enterprise. It\nbegins with API clients, firewalls, load\
    \ balancers, and API platform\nwhich has three stages. The final process is the\
    \ back ends which\nconsists of databases, enterprise service bus, legacy system,\
    \ and cloud\nservice.\nBack-end\nsystems for providing the core functionality\
    \ of the enterprise:\nBack ends may be databases, applications, enterprise service\
    \ buses, web\nservices using SOAP, message queues, and REST services.\n\nData\
    \ Handler\nAs mentioned in the previous section, we use an existing database as\n\
    a platform. A data handler, a data access object\n(DAO), and a command query responsibility\n\
    segregation (CQRS) all provide an abstract interface to some type\nof database\
    \ or any other persistence mechanism. A data handler is a layer\nwhich handles\
    \ data in the framework. A data access object is a design\npattern used to implement\
    \ the access from the database inside the data\nhandler. The CQRS pattern, on\
    \ the other hand, provides a mechanism to\nsegment query and transactional data\
    \ in the data handler."
  trans: '

    API 开发平台为 API 提供商中的 API 开发者提供了一套用于 API 设计与开发的工具箱。该工具箱包含经过验证、可复用且可配置的 API 构建模块。在构建
    API 时，某些功能会反复用到，这些功能可以通过构建模块来实现。构建模块可以复用，且经过测试，因此没有缺陷，并且它们是可配置的，能够适应多种用途。API 开发平台提供的构建模块至少涵盖以下功能：


    *   处理 HTTP 请求和响应


    *   标头


    *   查询


    *   **HTTP**：状态码


    *   方法


    *   **安全**：基于 IP 的访问限制、基于位置的访问限制、基于时间的访问限制、前端认证与授权、OAuth、基本授权、API 密钥、后端认证与授权（使用
    LDAP 和 SAML）


    *   **前端协议**：HTTP (REST)、SOAP、RPC 和 RMI


    *   **数据格式转换**：XML 转 JSON 和 JSON 转 XML


    *   **结构转换**：XLST 和 XPATH


    *   **数据完整性与保护**：加密


    *   路由到一个或多个后端


    *   聚合多个 API 和/或多个后端


    *   限流以保护后端速率限制和吞吐量限制


    *   对发往 API 平台的入站请求和发往后端的出站请求进行负载均衡


    *   用于日志记录的钩子


    *   用于分析的钩子


    *   货币化能力


    *   **实现 API 的语言**：Java、JavaScript 等（Jersey、Restlet 和 Spring）


    *   **用于 API 开发的 IDE（包含编辑器、调试器和部署工具）**：Eclipse、JDeveloper 和 NetBeans


    *   **设计 API 的语言**：YAML、RAML 等


    *   **用于创建 API 接口设计的设计工具**：RAML、Swagger 和 Blueprint


    *   **用于根据设计生成文档和 API 代码骨架的工具**：RAML 和 Swagger


    API 运行时平台


    API 运行时平台主要负责执行 API。它使 API 能够接收来自 API 消费者的入站请求并返回响应。


    *   它应提供非功能性属性，例如


    *   高可用性、高安全性和高吞吐量


    *   为满足这些属性，该平台提供


    *   负载均衡


    *   连接池


    *   缓存


    *   它还应为 API 监控、日志记录和分析提供能力，以检查所需的非功能性属性是否得到满足。


    API 参与平台


    API 提供商使用 API 参与平台与其 API 消费者社区进行互动。API 提供商使用 API 参与平台的以下能力：


    *   **API 管理**：无需部署即可配置和重新配置 API


    *   **API 发现**：客户端获取 API 信息的机制


    *   **消费者入驻**：应用密钥生成和 API 控制台


    *   **社区管理**：博客


    *   文档


    *   版本管理


    *   货币化管理和服务级别 SLA 管理


    API 消费者使用参与平台进行：


    *   API 组合概览


    *   API 文档


    *   交互式试用 API 的可能性


    *   用于集成的示例源代码


    *   自助获取 API 访问权限


    *   客户端工具，例如客户端的代码生成


    API 平台是如何组织的？API 平台的架构是什么？


    通常，API 不仅部署在生产系统上，还需要部署在不同成熟度的阶段。这些阶段有时也称为环境。每个阶段都有特定的目的，并与其他阶段隔离以隔离潜在的错误：


    *   **模拟**：用于尝试接口设计，提供 API 的模拟或仿真


    *   **开发**：用于开发，最终将进入生产环境


    *   **测试**：用于手动黑盒测试和集成测试


    *   **预生产**：用作生产演练和验收测试


    *   **生产**：用作消费者的真实系统


    如图 7-1 所示，API 开发平台用于设计和开发。API 运行时平台用于部署。API 参与平台用于发布 API。


    ![](img/427457_3_En_7_Fig1_HTML.jpg)


    图示说明 API 平台生命周期包含三个阶段：API 开发平台、API 运行时平台和 API 参与平台。每个阶段用一个图标表示：开发用扳手，运行时用电源按钮，参与用带光线的人。下方箭头指示顺序流程：开发、部署和发布。


    图 7-1

    API 平台架构


    流程图说明了 API 平台的工作方式。第一步是在 API 开发平台上进行开发。第二步是在 API 运行时平台上进行部署。最后一步是在 API 参与平台上进行发布。


    API 架构如何融入企业的周边技术架构？


    API 平台并非孤立存在，它需要集成到企业现有的架构中。防火墙用于提高安全性。负载均衡器用于提高性能，通常放置在互联网和 API 平台之间。IAM（身份与访问管理）系统用于管理身份信息以及
    LDAP 或 Active Directory，如图 7-2 所示。


    ![](img/427457_3_En_7_Fig2_HTML.jpg)


    图示说明 API 架构。顶部显示 API 客户端、防火墙和负载均衡器。下方，API 平台包括 API 开发平台、运行时平台和参与平台。底部，后端组件包括 IAM
    系统、企业服务总线、数据库、遗留系统和云服务。


    图 7-2

    企业中的 API 架构


    企业内 API 实施的流程示意图。从 API 客户端、防火墙、负载均衡器和包含三个阶段的 API 平台开始。最终流程是后端，由数据库、企业服务总线、遗留系统和云服务组成。

    提供企业核心功能的后端系统：后端可以是数据库、应用程序、企业服务总线、使用 SOAP 的 Web 服务、消息队列和 REST 服务。


    数据处理器


    如前所述，我们使用现有数据库作为平台。数据处理器、数据访问对象 (DAO) 和命令查询职责分离 (CQRS) 都为某种类型的数据库或任何其他持久化机制提供了抽象接口。数据处理器是框架中处理数据的层。数据访问对象是一种设计模式，用于在数据处理器内部实现从数据库的访问。另一方面，CQRS
    模式提供了一种机制，用于在数据处理器中分离查询数据和事务数据。

    '
- fmt: '# Data Access Object


    By mapping application calls to the persistence layer, a `DAO` provides some specific
    data operations without exposing details of the database. The advantage of using
    data access objects is the relative simplicity, and it provides separation between
    two important parts of an application that can but should not know anything about
    each other and which can be expected to evolve frequently and independently. Changing
    business logic can rely on the same `DAO` interface, while changes to persistence
    logic do not affect `DAO` clients as long as the interface remains correctly implemented.
    All details of storage are hidden from the rest of the application (see information
    hiding). Thus, possible changes to the persistence mechanism can be implemented
    by just modifying one `DAO` implementation while the rest of the application isn’t
    affected. `DAO`s act as an intermediary between the application and the database.
    `DAO`s move data back and forth between objects and database records.


    For accessing databases, there are different APIs available (e.g., `JPA`, which
    will be used in the class lab).


    # Command Query Responsibility Segregation (CQRS)


    New demands are being put on IT organizations every day to deliver agile, high-performance
    integrated mobile and web applications. In the meantime, the technology landscape
    is getting complex every day with the advent of new technologies like `REST`,
    `NoSQL`, and the cloud, while existing technologies like `SOAP` and `SQL` still
    rule everyday work. Rather than taking a religious side of the debate, `NoSQL`
    can successfully coexist with `SQL` in this “polyglot” of data storage and formats.
    However, this integration also adds another layer of complexity both in architecture
    and implementation. We will talk about the following.


    ## SQL Development Process


    The application development life cycle means changes to the database schema first,
    followed by the bindings, then internal schema mapping, and finally the `SOAP`
    or `JSON` services, and eventually the client code. This all costs the project
    time and money. It also means that the “code” (pick your language here) and the
    business logic would also need to be modified to handle the changes to the model.
    Figure [7-3](#427457_3_En_7_Chapter.xhtml#Fig3) shows the traditional `CRUD` architecture.


    ![](images/427457_3_En_7_Chapter/427457_3_En_7_Fig3_HTML.jpg)


    Diagram illustrating a software architecture model. At the top is the "Presentation"
    layer, followed by "Validation," "Business logic," and "Data access" layers. The
    "Data access" layer interacts with a "Data store" through "Updates" and "Queries"
    arrows, indicating data flow between the components.


    **Figure 7-3** Traditional `CRUD` architecture


    An illustration of the `CRUD` architecture has a presentation that consists of
    validation, business logic, and data access. Data access updates to the data store,
    and data store queries back to data access.


    ## NoSQL Process


    `NoSQL` is gaining supporters among many `SQL` shops for various reasons, including
    low cost, the ability to handle unstructured data, scalability, and performance.
    The first thing database folks notice is that there is no schema. These document-style
    storage engines can handle huge volumes of structured, semistructured, and unstructured
    data. The very nature of schemaless documents allows change to a document structure
    without having to go through the formal change management process (or data architect).


    ## Do I Have to Choose Between SQL and NoSQL?


    The bottom line is both have their place and are suited for certain types of data—`SQL`
    for structured data and `NoSQL` for unstructured data. `NoSQL` databases are more
    scalable than `SQL` databases. So why not have the capability to mix and match
    this data depending on the application? This can be done by creating a single
    `REST API` across both `SQL` and `NoSQL` databases.


    ### Why a Single REST API?


    The answer is simple—the new agile and mobile world demands this “mash-up” of
    data into a document-style `JSON` response.'
