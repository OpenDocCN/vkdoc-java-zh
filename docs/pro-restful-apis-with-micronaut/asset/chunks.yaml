  trans: '

    数据访问对象（DAO）

    通过将应用程序调用映射到持久化层，DAO 提供了特定的数据操作，同时隐藏了数据库的细节。使用数据访问对象的优势在于其相对简单性，并且它实现了应用程序中两个重要部分之间的分离——这两部分彼此不应了解对方，且预计会频繁且独立地演变。业务逻辑的变更可以依赖同一个
    DAO 接口，而持久化逻辑的变更只要接口实现正确，就不会影响 DAO 的客户端。所有存储细节对应用程序的其他部分都是隐藏的（参见信息隐藏）。因此，对持久化机制的潜在变更只需修改一个
    DAO 实现即可完成，而应用程序的其他部分不受影响。DAO 充当应用程序与数据库之间的中介，在对象与数据库记录之间来回传输数据。

    在访问数据库时，有多种可用的 API（例如，JPA，将在课堂实验中使用）。


    命令查询职责分离（CQRS）

    每天都有新的需求摆在 IT 组织面前，要求交付敏捷、高性能的集成移动和 Web 应用程序。与此同时，随着 REST、NoSQL 和云等新技术的出现，技术格局日益复杂，而
    SOAP 和 SQL 等现有技术仍在日常工作中占据主导地位。与其在争论中偏执一方，NoSQL 可以在这个数据存储和格式的“`多语言`”环境中与 SQL 成功共存。然而，这种集成也在架构和实现层面增加了另一层复杂性。我们将讨论以下内容。


    SQL 开发流程


    应用程序开发生命周期意味着首先更改数据库模式，然后是绑定，接着是内部模式映射，最后是 SOAP 或 JSON 服务，以及最终的客户端代码。这一切都会耗费项目的时间和金钱。这也意味着“代码”（在此处选择你的语言）和业务逻辑也需要修改，以处理模型的变化。图
    7-3 展示了传统的 CRUD 架构。


    ![](img/427457_3_En_7_Fig3_HTML.jpg)


    图示说明了一个软件架构模型。顶部是“表示层”，其后依次是“验证层”、“业务逻辑层”和“数据访问层”。“数据访问层”通过“更新”和“查询”箭头与“数据存储”交互，表示组件之间的数据流。


    图 7-3

    传统 CRUD 架构


    CRUD 架构的图示包含一个由验证、业务逻辑和数据访问组成的表示层。数据访问向数据存储进行更新，数据存储则向数据访问返回查询结果。


    NoSQL 流程

    出于多种原因，NoSQL 正在许多 SQL 商店中赢得支持者，这些原因包括低成本、处理非结构化数据的能力、可扩展性和性能。数据库人员首先注意到的是没有模式。这些文档式存储引擎可以处理海量的结构化、半结构化和非结构化数据。无模式文档的本质允许在不经过正式变更管理流程（或数据架构师）的情况下更改文档结构。


    我必须在 SQL 和 NoSQL 之间做出选择吗？

    关键在于，两者各有其用武之地，并适用于特定类型的数据——SQL 适用于结构化数据，NoSQL 适用于非结构化数据。NoSQL 数据库比 SQL 数据库更具可扩展性。那么，为什么不能根据应用程序来混合搭配这些数据呢？这可以通过在
    SQL 和 NoSQL 数据库之上创建一个统一的 REST API 来实现。


    为什么需要一个统一的 REST API？

    答案很简单——新的敏捷和移动世界要求将数据“混搭”成文档风格的 JSON 响应。

    '
- fmt: "Martin Fowler 描述了一种名为“`CQRS`”的模式，该模式在当今“多语言”（`polyglot`）的服务器、数据、服务和连接环境中更具相关性（图\
    \ [7-4](#427457_3_En_7_Chapter.xhtml#Fig4)）。\n\n![](images/427457_3_En_7_Chapter/427457_3_En_7_Fig4_HTML.jpg)\n\
    \n图 7-4 展示了基本 CQRS 架构。该架构的图示包含一个“表示层”（Presentation），由验证（Validation）、命令（Commands）、领域逻辑（Domain\
    \ Logic）和数据持久化（Data Persistence）组成。数据持久化将数据写入数据存储（Data Store）。在读取数据存储时，数据流向查询（Queries），查询生成数据传输对象（DTO）。\n\
    \n在这种设计模式中，REST API 请求（`GET`）从多个来源（例如，混搭应用）返回文档。在更新过程中，数据会经历业务逻辑推导、验证、事件处理和数据库事务。然后，这些数据可能通过异步事件被推送回\
    \ NoSQL 数据库。NoSQL 数据库在此方面优于 SQL 数据库的优势在于，NoSQL 对非结构化数据具有动态模式。此外，NoSQL 数据库是水平可扩展的，这意味着可以通过增加资源池中的数据库服务器数量来扩展\
    \ NoSQL 数据库以减轻负载，而 SQL 数据库则是通过增加托管数据库的服务器的性能来进行扩展。图 [7-5](#427457_3_En_7_Chapter.xhtml#Fig5)\
    \ 展示了具有独立读写存储的 CQRS 架构。当您有非常、非常大的数据量需求时，您会选择独立的存储。\n\n![](images/427457_3_En_7_Chapter/427457_3_En_7_Fig5_HTML.jpg)\n\
    \n图 7-5 展示了具有独立读写存储的 CQRS 架构。该架构的图示包含一个“表示层”（Presentation），由验证（Validation）、命令（Commands）、领域逻辑（Domain\
    \ Logic）和数据持久化（Data Persistence）组成。数据持久化将数据写入数据存储。在读取数据存储时，数据流向查询（Queries），查询生成数据传输对象（DTO）。\n\
    \n## 框架：数据处理器\n\n本练习将使用 Java 持久化 API（JPA）为报价领域对象实现一个数据处理器或数据访问对象。JPA 是一个 Java\
    \ 规范，用于在 Java 对象/类和关系数据库之间访问、持久化和管理数据。我们将使用领域对象消息，并在 DAO 中使用 JPA 实现 CRUD 操作。\n\
    \n### `Pom.xml`\n\n使用以下依赖项更新 `pom.xml`：\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<project xmlns=\"http://maven.apache.org/POM/4.0.0\"\n         xmlns:xsi=\"\
    http://www.w3.org/2001/XMLSchema-instance\"\n         xsi:schemaLocation=\"http://maven.apache.org/POM/4.0.0\
    \ http://maven.apache.org/xsd/maven-4.0.0.xsd\">\n    <modelVersion>4.0.0</modelVersion>\n\
    \    <groupId>com.rest</groupId>\n    <artifactId>quote</artifactId>\n    <version>0.1</version>\n\
    \    <packaging>${packaging}</packaging>\n\n    <parent>\n        <groupId>io.micronaut</groupId>\n\
