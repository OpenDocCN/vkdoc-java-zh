- fmt: '# API Security—JSON Web Token


    JWT stands for JSON Web Token, and it is a commonly used stateless user authentication
    standard used to securely transmit information between the client and server in
    a JSON format. A JWT is encoded and not encrypted by default. It is digitally
    signed using a secret key known only to the server.


    A JSON Web Token consists of three parts separated by a period: the header, the
    payload, and the signature. Each section is base64 encoded.


    The steps involved in a typical JWT authorization flow are as follows:


    1. **Authentication**: The user signs in using username and password, or using,
    for example, Google or Facebook. The server verifies the provided credentials.


    2. **Token generation and sending token to the client**: The server will generate
    the JWT and send it to the client, which stores it for future use.


    3. **Sending the token to the server**: When the client wants to access a protected
    resource on the server, it sends the JWT in the `Authorization` header of the
    HTTP request.


    4. **Verifying the token**: The server receives the request and verifies the JWT
    by checking its signature using the secret key that was used to sign it. If the
    JWT is valid, the server extracts the information contained in it and uses it
    to determine what actions the user is authorized to perform.


    5. **Authorizing the request**: If the user is authorized to access the resource,
    the server returns the requested data. If the user is not authorized, the server
    returns an error message.


    **Advantages**


    - Lightweight.

    - **Portable**: Can be processed on multiple platforms, web and mobile.

    - JSON parsers are common in most programming languages.

    - Protected against tampering because of the secret key stored on server side.

    - The server does not need to store any session information, because of the stateless
    nature of the JWT token.


    **Disadvantages**


    - Can provide full access if intercepted. That’s why JWTs on client side should
    be stored somewhere secure, for example, in the browser in an `HttpOnly` cookie.

    - On server side, should manually mark nonexpired JWT as invalid on logout. A
    JWT can still be valid even after it has been deleted from the client.


    ## EXERCISE—BASIC SECURITY


    Create an application using the [Micronaut Command Line Interface](https://docs.micronaut.io/latest/guide/%2523cli)
    or with [Micronaut Launch](https://launch.micronaut.io/).


    ```

    mn create-app example.micronaut.micronautguide \

    --features=security,graalvm \

    --build=maven \

    --lang=java \

    --test=junit

    ```


    To keep this simple, create a naive `AuthenticationProvider` to simulate user’s
    authentication.


    ```

    src/main/java/example/micronaut/AuthenticationProviderUserPassword.java

    package example.micronaut;

    import io.micronaut.core.annotation.NonNull;

    import io.micronaut.core.annotation.Nullable;

    import io.micronaut.http.HttpRequest;

    import io.micronaut.security.authentication.AuthenticationFailureReason;

    import io.micronaut.security.authentication.AuthenticationRequest;

    import io.micronaut.security.authentication.AuthenticationResponse;

    import io.micronaut.security.authentication.provider.HttpRequestAuthenticationProvider;

    import jakarta.inject.Singleton;

    @Singleton

    class AuthenticationProviderUserPassword implements HttpRequestAuthenticationProvider
