- fmt: "# JSON 数据类型图解\n\n图解展示了“值”类别下的 JSON 数据类型。这些类型包括`string`、`number`、`object`、`array`、`true`、`false`和`null`，每种类型通过线条连接到顶层的“值”标签。\n\
    \n**图 3-1 基本数据类型**\n\n图示展示了可用于各种数据类型的值。数据类型包括`string`、`number`、`object`、`array`、`true`、`false`和`null`。\n\
    \n## 字符串\n\n字符串用双引号括起来，可以包含常见的转义字符序列。\n\n## 数字\n\n数字采用常见的 C/C++/Java 语法，包括指数（E）表示法。所有数字都是十进制——不支持八进制或十六进制。\n\
    \n## 对象\n\n对象是一组无序的名称/值对。这些对用花括号（`{ }`）括起来。\n\n示例：\n\n```\n{ \"name\": \"html\"\
    , \"years\": 5 }\n```\n\n对之间用逗号分隔。名称和值之间有一个冒号。\n\nJSON 对象的语法如图 [3-2](#427457_3_En_3_Chapter.xhtml#Fig2)\
    \ 所示。\n\n![](images/427457_3_En_3_Chapter/427457_3_En_3_Fig2_HTML.jpg)\n\n图解展示了\
    \ JSON 对象的结构。它以左花括号开始，后跟一系列键值对。每个键值对由一个`string`键、一个冒号和一个`value`组成。多个对之间用逗号分隔。对象以右花括号结束。\n\
    \n**图 3-2 JSON 对象**\n\n图示描绘了 JSON 的对象、字符串和值结构。\n\n## 数组\n\n数组是有序的值集合。这些值用方括号括起来。JSON\
    \ 数组的语法如图 [3-3](#427457_3_En_3_Chapter.xhtml#Fig3) 所示。\n\n![](images/427457_3_En_3_Chapter/427457_3_En_3_Fig3_HTML.jpg)\n\
    \n图解展示了带有循环的数组结构。数组在左侧标记，一个循环连接两个标记为“i”和“j”的点，中间有一个标记为“value”的框。该循环表示对数组元素的迭代。\n\
    \n**图 3-3 JSON 数组**\n\n图示描绘了 JSON 的数组和值结构。\n\n## 布尔值\n\n它可以具有`true`或`false`值。\n\
    \n## Null\n\n该值为空。\n\n# 为什么 JSON 很重要？\n\nJSON 作为一种数据交换格式变得越来越流行（比它比 XML 更简洁更重要）是有原因的：程序员厌倦了编写解析器！但“等等，”你说。“肯定有可用的\
    \ XML 解析器供你使用，这样你就不必自己编写了。”是的，有。但是，虽然 XML 解析器处理 XML 标签、属性等的底层语法解析，你仍然需要遍历 DOM\
    \ 树，或者更糟的是，仅凭 SAX 解析器自己构建一个（说的就是你，Objective-C iPhone SDK！）。而你编写的代码当然取决于你需要理解的\
    \ XML 看起来像这样：\n\n```\n\n```\n\n还是这样：\n\n```\n<person>\n  <name>John</name>\n \
    \ <age>25</age>\n</person>\n```\n\n或者这样：\n\n```\n<person name=\"John\" age=\"\
    25\" />\n```\n\n或者任何其他无数种表达相同概念的方式（而且有很多）。标准的 XML 解析器在这方面帮不了你。你仍然需要对解析树做一些工作。\n\
    \n使用 JSON 是一种不同且更优越的体验。首先，更简单的语法帮助你避免在多种表示数据的方式之间做决定（正如我们之前看到的 XML），更不用说选择哪种方式会让自己陷入困境了。通常，只有一种直接的方式来表示某些内容：\n\
    \n```\n{\n  \"first-name\": \"John\",\n  \"last-name\": \"Smith\"\n}\n```\n\n\
    # 如何使用 JSON？\n\n以下讨论如何使用 JSON：\n\n- 用于编写基于 JavaScript 的应用程序，包括浏览器扩展和网站。\n- JSON\
    \ 格式用于通过网络连接序列化和传输结构化数据。它主要用于在服务器和 Web 应用程序之间传输数据。\n- Web 服务和 API 使用 JSON 格式提供公共数据。\n\
    \n# JSON 的优缺点\n\n以下是 JSON 的优缺点：\n\n## 优点\n\n- 易于读/写/解析\n- 相当简洁（例如，与 XML 相比）\n\
    - 通用的“标准”，有许多可用的库\n\n## 缺点\n\n- 不如二进制格式轻量\n- 不能使用注释\n- 它是“封装的”，意味着你不能轻易地流式传输/追加数据，而必须将其分解为单个对象。XML\
    \ 也有同样的问题，而 CSV 则没有。\n- 难以描述你呈现的数据（XML 更容易）\n- 无法强制执行或验证结构/模式\n\n# XML 与 JSON\
    \ 比较\n\n本节基于不同属性比较 XML 和 JSON。\n\n**表 3-1 XML 与 JSON 比较**\n\n| 属性 | XML | JSON\
    \ |\n| --- | --- | --- |\n| 简单性 | XML 简单且人类可读 | JSON 比 XML 更简单，且人类可读 |\n| 自描述性\
    \ | 是 | 是 |\n| 处理 | XML 易于处理 | JSON 更易于处理，因为其结构更简单 |\n| 性能 | 由于标签，未针对性能优化 | 由于体积小，比\
    \ XML 更快 |\n| 开放性 | XML 是开放的 | JSON 至少与 XML 一样开放，甚至可能更开放，因为它不在企业/政治标准化斗争的中心 |\n\
    | 面向对象 | XML 面向文档 | JSON 面向数据。JSON 可以更容易地映射到面向对象系统 |\n| 互操作性 | XML 可互操作 | JSON\
    \ 具有与 XML 相同的互操作性潜力 |\n| 国际化 | 支持 Unicode | 支持 Unicode |\n| 可扩展性 | XML 可扩展 | JSON\
    \ 不可扩展，因为它不需要扩展。JSON 不是文档标记语言，因此无需定义新标签或属性来表示数据 |\n| 采用率 | XML 被业界广泛采用 | JSON\
    \ 刚刚开始为人所知。其简单性以及将 XML 转换为 JSON 的便利性使得 JSON 最终更易于被采用 |\n\n# 实现返回 XML 和 JSON 消息的\
    \ API\n\n[`https://micronaut.io/launch/`](https://micronaut.io/launch/)\n\n根据屏幕显示，选择：\n\
    - 应用程序类型：Micronaut Application\n- Java 版本：21\n- 名称：message\n- 包：com.rest\n- 构建工具：maven\n\
    \n点击“Generate Project”\n\nMicronaut 应用程序的图片。Java 版本为 21，名称为`message`，基础包为`com.rest`。Micronaut\
    \ 版本为 4.7.1，语言为 Java，构建工具为 Maven，测试框架为 JUnit。\n\n![](images/427457_3_En_3_Chapter/427457_3_En_3_Fig4_HTML.jpg)\n\
    \n该图片显示了使用 CLI 创建 Micronaut 应用程序的用户界面。显示的命令是`mn create-app --build=maven --jdk=21\
    \ --lang=java --test=junit com.rest.message`。选择的选项包括 Micronaut Application 类型、Java\
    \ 版本 21、应用程序名称`message`和基础包`com.rest`。Micronaut 版本为 4.7.1，语言选项包括 Java、Groovy 和\
    \ Kotlin。选择的构建工具是 Maven，测试框架是 JUnit。底部的按钮包括 Features、Diff、Preview 和 Generate Project。\n\
    \n**图 3-4 创建应用程序代码的命令行选项截图**\n\n代码生成后，切换到`message`文件夹。以下代码创建了一个带有属性`message`的域对象`Message`。\n\
    \n```\npackage com.rest.model;\nimport javax.validation.constraints.NotNull;\n\
    public class Message {\n    @NotNull\n    private String message;\n    public\
    \ String getMessage() {\n        return message;\n    }\n    public void setMessage(String\
    \ message) {\n        this.message = message;\n    }\n}\n```\n\n现在，在导航到 Micronaut\
    \ 生成的`message`代码后，在`src/main/java/com/rest`文件夹中创建一个新的`controller`文件夹。\n\n以下代码暴露了两个端点：\n\
    \n1. `message/xml`：用于以 XML 格式获取`message`属性值\n2. `message/json`：用于以 JSON 格式获取`message`属性值"
