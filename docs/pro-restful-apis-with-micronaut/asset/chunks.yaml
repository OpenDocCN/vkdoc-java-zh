- fmt: "# Diagram illustrating the process of generating API documentation from a\
    \ RESTful web service\n\nThe REST client and server source generate an API specification\
    \ in JSON or YAML format. This specification is used to generate client and server\
    \ source code, as well as API documentation in HTML format. Arrows indicate the\
    \ flow from client and server source to API specification, and from API specification\
    \ to API documentation.\n\n**Figure 4-3** API modeling\n\nCreating this model\
    \ before starting development helps you to ensure that the API you create will\
    \ meet the needs described by the use cases you’ve identified. The three schema\
    \ modeling systems and the markup languages they use are as follows:\n\n- **RAML**:\
    \ Markdown, relatively new. Good online modeling tool: RESTful API modeling language\n\
    - **OpenAPI (Swagger)**: JSON, large community\n- **Blueprint**: Markdown, low\
    \ adoption\n\nThe OpenAPI (Swagger) exercise in this chapter shows the modeling\
    \ done for the podcast resource. Each of the schema modeling languages has tools\
    \ available to automate testing or code creation based on the schema model you’ve\
    \ created, but even without this functionality, the schema model helps you to\
    \ have a solid understanding of the API before a single line of code is written.\n\
    \nFigure [4-4](#427457_3_En_4_Chapter.xhtml#Fig4) shows the API modeling tool.\n\
    \n![](images/427457_3_En_4_Chapter/427457_3_En_4_Fig4_HTML.jpg)\n\nThe image features\
    \ a dark background with the phrase \"Write once. Use many. Creative laziness\
    \ encouraged.\" at the top. Below, there are five hexagonal icons, each representing\
    \ a different stage of a process: Design (with a code symbol), Build (with a wrench),\
    \ Test (with a laboratory flask), Document (with a checklist), and Share (with\
    \ a network diagram). Each icon is outlined in a distinct color.\n\n**Figure 4-4**\
    \ API modeling tool\n\n## Comparison of API Modeling\n\n**Table 4-2** Comparison\
    \ of API modeling tools\n\n| Category | Property | RAML | API Blueprint | Swagger\
    \ |\n| --- | --- | --- | --- | --- |\n| What is behind name? | Format | YAML |\
    \ Markdown (MOSN) | JSON |\n| | Available at | GitHub | GitHub | GitHub |\n| |\
    \ Sponsored by | MuleSoft | Apiary | SmartBear |\n| | Initial commit | Sep 2013\
    \ | Apr 2013 | Jul 2011 |\n| | Commercial offering | Yes | Yes | Yes |\n| How\
    \ does it model REST? | Resources | X | X | X (`\"api\"`) |\n| | Methods/actions\
    \ | X (`\"methods\"`) | X (`\"actions\"`) | X (`\"operations\"`) |\n| | Query\
    \ parameters | X | X | X |\n| | Path/URL parameters | X | X | X |\n| | Representation\
    \ | X | X | X |\n| | Header parameters | X | X | X |\n| | Documentation | X |\
    \ X | X |\n| | References | [`http://raml.org`](http://raml.org) | [`https://apiblueprint.org`](https://apiblueprint.org)\
    \ | [`http://swagger.io`](http://swagger.io) |\n| | Design | API first | Design\
    \ first | Existing API |\n| | Code generation | X | | X |\n| Who are the customers?\
    \ | | | | Apigee, Microsoft, PayPal |\n\n### In Summary\n\n- Swagger has a very\
    \ strong modeling language for defining exactly what’s expected of the system—very\
    \ useful for testing and creating coding stubs for a set of APIs.\n- RAML is designed\
    \ to support a design-first development flow and focuses on consistency.\n- API\
    \ Blueprint is more documentation focused, with user-readable models and documentation\
    \ as its first priority.\n\nEach project brings different strengths and weaknesses\
    \ to the table, and in the end, it’s really about what strengths you need and\
    \ which weaknesses you cannot afford. Overall, RAML fared the best in these different\
    \ categories, and while the developer community is not as large as the others,\
    \ I think it’s safe to say it will keep growing. The overall winner is RAML.\n\
    \n## Best Practices\n\nREST is an architectural style and not a strict standard;\
    \ it allows for a lot of flexibility. Because of that flexibility and freedom\
    \ of structure, there is also a big appetite for design best practices. These\
    \ best practices are discussed here in this section.\n\n### Keep Your Base URL\
    \ Simple and Intuitive\n\nThe base URL is the most important design affordance\
    \ of your API. A simple and intuitive base URL design makes using your API easy.\
    \ Affordance is a design property that communicates how something should be used\
    \ without requiring documentation. A door handle’s design should communicate whether\
    \ you pull or push. For web API design, there should be only two base URLs per\
    \ resource. Let’s model an API around a simple object or resource (a customer)\
    \ and create a web API for it. The first URL is for a collection; the second is\
    \ for a specific element in the collection:\n\n- `/customers`: Collection\n- `/customers/1`:\
    \ Specific element\n\nBoiling it down to this level will also force the verbs\
    \ out of your base URLs. Keep verbs out of your URLs as shown in Table [4-3](#427457_3_En_4_Chapter.xhtml#Tab3).\n\
    \n**Table 4-3** Nouns and verbs\n\n| Resource | POST create | GET read | PUT update\
    \ | DELETE delete |\n| --- | --- | --- | --- | --- |\n| `/customers` | New customer\
    \ | List customers | Bulk update | Delete all |\n| `/customers/12` | – | Show\
    \ customer 12 | If exists, update. If not, error | Delete customer 12 |\n\n###\
    \ In Summary\n\n- Use two base URLs per resource. Keep verbs out of your base\
    \ URLs. Use HTTP verbs to operate on the collections and elements.\n- The level\
    \ of abstraction depends on your scenario. You also want to expose a manageable\
    \ number of resources.\n- Aim for concrete naming and to keep the number of resources\
    \ between 12 and 24.\n- An intuitive API uses plural rather than singular nouns\
    \ and concrete rather than abstract nouns.\n- Resources almost always have relationships\
    \ to other resources. What’s a simple way to express these relationships in a\
    \ web API? Let’s look again at the API we modeled in nouns are good, verbs are\
    \ bad—the API that interacts with our podcast resource. Remember, we had two base\
    \ URLs: `/podcasts` and `/podcasts/1234`. We’re using HTTP verbs to operate on\
    \ the resources and collections. Our podcasts belong to customers. To get all\
    \ the podcasts belonging to a specific customer or to create a new podcast for\
    \ that customer, do a GET or a POST:\n  - `GET /customers/5678/podcasts`\n  -\
    \ `POST /customers/5678/podcasts`\n- Sweep complexity under the “?”. Make it simple\
    \ for developers to use the base URL by putting optional states and attributes\
    \ behind the HTTP question mark. To get all customers in `sfo` city of `ca` state\
    \ of `usa` country, use a GET:\n  - `GET /customers?country=usa&state=ca&city=so`\n\
    \n## Error Handling\n\nMany software developers, including myself, don’t always\
    \ like to think about exceptions and error handling, but it is a very important\
