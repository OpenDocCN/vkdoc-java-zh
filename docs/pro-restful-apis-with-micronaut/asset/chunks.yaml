    为播客订阅设计了一个简单的 API，然后使用 OpenAPI 进行建模。\n\nAPI 设计策略\n\n正如 UI 之于 UX（用户体验），API 之于\n\
    APX（应用程序编程体验）。在 APX 中，回答以下问题至关重要：\n\n*   应该暴露什么？\n\n*   暴露数据的最佳方式是什么？\n\n*   应如何调整和改进\
    \ API？\n\n此外，我们来讨论一下为什么应该开发良好的应用程序编程体验。\n良好的 API 会鼓励开发者使用它并与他人分享，\n从而形成一个良性循环：每一次额外的成功实施都会带来更多的参与和来自开发者的更多贡献，\n\
    这些开发者会为你的服务增加价值。首先我要说的是，API 设计\n很难。\n同时，良好的 API 将有助于发展一个由员工、客户和合作伙伴组成的生态系统，他们能够使用你的\
    \ API 并以互惠互利的方式帮助其持续演进。\n\nAPI 设计有四种策略：\n\n![](img/427457_3_En_4_Fig1_HTML.jpg)\n\
    \n说明后端系统架构的图表。顶部块标记为\n\"后端系统\"，下方连接到三个块：\"API\"、\"主要产品\"以及两个较小的块，标记为\"移动\"和\"\
    集成\"。该布局暗示了一种层次结构，后端系统支持各种组件。\n\n图 4-1\n附加策略\n\n*   **附加策略**：这是指你拥有一个\n    现有应用程序，并在事后添加\
    \ API。这利用了现有代码和系统的优势（图 4-1）。\n\n![](img/427457_3_En_4_Fig2_HTML.jpg)\n\n说明系统架构的图表。后端系统\n\
    连接到 API，API 分支到三个组件：主要产品、移动设备和集成。\n\n图 4-2\n绿地策略\n\n*   **绿地策略**：这是另一个极端。\n  \
    \  这是\"API 优先\"或\"移动优先\"背后的策略，也是开发 API 最简单的情况。由于你是从零开始，\n    你可以利用以前可能没有的技术和概念（图\
    \ 4-2）。\n\n绿地或 API 优先策略是一种基于模拟的设计实现。\n\n后端系统的模拟是在无需完全实现的后端系统的情况下开发后端系统。通过 API\
    \ 的模拟，消费者可以在没有完全开发的 API 的情况下开始应用程序的开发。\n\n*   **敏捷设计策略**：敏捷性基于\n    这样一个前提：你可以在没有完整规格的情况下开始。你总是可以\n\
    \    在后续过程中，随着学习和了解的深入，调整和更改规格。通过\n    多次迭代，架构设计可以收敛到正确的解决方案。敏捷方法只应在 API 发布之前应用。\n\
    \n*   最后，还有外观策略，这是绿地策略和附加策略之间的中间地带。\n    在这种情况下，你可以利用现有的业务系统，同时根据你的偏好和需求对其进行塑造。这使你能够在保持现有工作系统正常运行的同时，改进底层架构。\n\
    \nAPI 创建过程与方法论\n在本节中，我们将回顾 API 创建过程和方法论。为了交付优秀的 API，设计必须成为首要关注点。正如优化 UX（用户体验）已成为\
    \ UI 开发的主要关注点一样，优化 APX（API 用户体验）也应成为 API 开发的主要关注点。\n\n过程\n首先，确定你的业务价值。在思考业务价值时，请考虑关于为什么需要\
    \ API 的\"电梯演讲\"。开发者参与度不是一个很好的目标；你需要一个切实的目标：提高用户参与度，将活动从主要产品转移到 API，吸引并留住合作伙伴等。\n\
    \n选择你的指标，例如：\n\n*   正在使用的开发者密钥数量\n\n*   开发的应用程序数量\n\n*   通过 API 进行交互的用户数量\n\n\
    *   合作伙伴集成数量\n\n*   API 如何增强公司的整体目标，而不仅仅是确定有多少人开始集成\n\nAPI 方法论\n\n在敏捷策略的情况下，它包含五个阶段：\n\
    \n*   领域分析或 API 描述\n\n*   架构设计\n\n*   原型设计\n\n*   构建用于生产的 API\n\n*   发布 API\n\n\
    领域分析或 API 描述\n为领域分析定义你的用例。参与者是谁？他们是外部还是内部？消费者希望使用 API 构建哪些 API 解决方案？使用该 API 还可能实现哪些其他\
    \ API 解决方案？\n消费者想要使用的 API 应该是什么样子？消费者想要构建什么应用程序？消费者希望在其应用程序中使用哪些数据或领域对象？\n\n将活动分解为步骤或写下使用场景：\n\
    \n*   依赖资源不能脱离另一个资源而存在。\n\n*   例如，播客与其消费者的关联无法确定，除非播客及其消费者已被创建。\n\n*   独立资源可以脱离另一个资源而存在。\n\
    \n*   例如，播客资源可以存在而没有任何依赖关系。\n\n*   关联资源独立存在，但仍具有某种关系，即，它可能通过引用连接。\n\n*   如前所述\n"
- fmt: 'The next step is to identify possible transitions between resource states.
    Transitions between states provide an indicator of the HTTP method that needs
    to be supported. For the example of the podcast which could be added to a playlist,
    let’s analyze different states (Table [4-1](#427457_3_En_4_Chapter.xhtml#Tab1)).


    **Table 4-1** Domain analysis example


    | State | Operation | Domain object | Description |

    | --- | --- | --- | --- |

    | CREATE | `POST` | `PODCAST` | Creates podcast |

    | READ | `GET` | `PODCAST` | Reads podcast |

    | READ | `GET/{podcast_id}` | `PODCAST` | Reads podcast |

    | UPDATE | `PUT/{playlist_id}` | `PODCAST` | Updates podcast |


    Also, verify by building a simple demo app. More than `curl` calls, this demo
    app provides a showcase for the API and can be reused in later stages.


    ## Architecture Design


    In this phase, the API description or analysis phase is further redefined. Architecture
    design should make decisions about:


    - Protocol

    - Endpoints

    - URI design

    - Security

    - Performance or availability


    Detail design description:


    - Resources

    - Representations

    - Content types

    - Parameters

    - HTTP methods

    - HTTP status codes

    - Consistent naming


    In addition, look into reusability by looking at common APIs in the API portfolio.
    Design decisions should be consistent with the API in the API portfolio. The API
    portfolio is a collection of APIs in an enterprise, as discussed in Chapter [5](#427457_3_En_5_Chapter.xhtml).


    As part of the design verification, the demo app can be further extended here
    with design decisions. Issues to be verified are as follows:


    - The API is still easy to use.

    - The API is simple and supports use cases.

    - The API follows an architectural style.


    ## Prototyping


    Prototyping is the preparation for the production implementation. Take complex
    use cases and implement end to end with high fidelity. The prototype is incomplete
    and uses shortcuts. It can have a simulation of the API if the back-end functionality
    is not available at the time of building the prototype. Once the prototype is
    made, then there is the acceptance test with pilot consumers as verification of
    the API. Pilot consumers are internal customers from the API provider’s team.


    ## Implementation


    The implementation needs to conform to the API description and needs to be delivered
    as soon as possible. In addition, the API is fully integrated into the back-end
    system and API portfolio. This should have all the desired functionality as well
    as nonfunctional aspects of the API, like performance, security, and availability.
    At this stage, the API description should be stable since it has gone through
    multiple iterations. For verification, handpicked API consumers could be identified
    at this stage.


    ## Publish


    Publishing of the API does not require a lot of work, but this is a big milestone
    for the API. From an organizational perspective, the responsibility of the API
    is transferred from development to the operational unit. After publishing, there
    is no agility in the development process. Any change requires a traditional change
    management process. As part of the verification, there is analysis on successful
    vs. failed API calls and documentation gaps which are supported by the maintenance
    team.


    ## API Modeling


    Modeling the schema for your API means creating a design document that can be
    shared with other teams, customers, or executives. A schema model is a contract
    between your organization and the clients who will be using it. A schema model
    is essentially a contract describing what the API is, how it works, and exactly
    what the endpoints are going to be. Think of it as a map of the API, a user-readable
    description of each endpoint, which can be used to discuss the API before any
    code is written. Figure [4-3](#427457_3_En_4_Chapter.xhtml#Fig3) shows the API
    modeling framework where you have API specifications defined and generate API
    documentation. Also, generate server and client source code.


    ![](images/427457_3_En_4_Chapter/427457_3_En_4_Fig3_HTML.jpg)'
