    :2,\"message\":\"test2\",\"from\":\"test\",\"to\":\"test\",\"creationDate\":\"\
    12/12//2012\"}\ncurl http://localhost:8080/message\n[{\"id\":1,\"message\":\"\
    test\",\"from\":\"test\",\"to\":\"test\",\"creationDate\":\"12/12//2012\"},{\"\
    id\":2,\"message\":\"test2\",\"from\":\"test\",\"to\":\"test\",\"creationDate\"\
    :\"12/12//2012}\ncurl http://localhost:8080/message/1\n{\"id\":1,\"message\":\"\
    test\",\"from\":\"test\",\"to\":\"test\",\"creationDate\":\"12/12//2012\"}\ncurl\
    \ http://localhost:8080/message/2\n{\"id\":2,\"message\":\"test2\",\"from\":\"\
    test\",\"to\":\"test\",\"creationDate\":\"12/12//2012\"}\ncurl -X \"DELETE\" http://localhost:8080/message/2\n\
    curl http://localhost:8080/message/2\n{\"message\":\"Not Found\",\"_links\":{\"\
    self\":{\"href\":\"/message/2\",\"templated\":false}},\"_embedded\":{\"errors\"\
    :[{\"message\":\"Page Not Found\"}]}}\ncurl http://localhost:8080/message\n[{\"\
    id\":1,\"message\":\"test\",\"from\":\"test\",\"to\":\"test\",\"creationDate\"\
    :\"12/12//2012\"}]\n```\n\n## Summary\n\nNow, we have two APIs in our portfolio:\
    \ one is for the messaging and the other for flight passengers. The flight status\
    \ API implements the relationship of two objects `Flight` and `Passenger`, whereas\
    \ the message service allows the creation and deletion of messages in addition\
    \ to read. It is important to follow the same design for both the APIs.\n\n##\
    \ 7. API Platform and Data Handler\n\nThis chapter starts with API Platform architecture\
    \ and then gets into the data handler pattern for the integration of RESTful APIs\
    \ with actual data sources within an enterprise to make it more meaningful to\
    \ the consumers through APIs.\n\n### API Platform Architecture\n\nAPI Platforms\
    \ are used by API providers to realize APIs efficiently. We will review the following:\n\
    \n- Why do we need an API Platform?\n- What is an API Platform?\n- Which capabilities\
    \ does an API Platform have?\n- How is an API Platform organized? What is the\
    \ architecture of the API Platform?\n- How does the API architecture fit in the\
    \ surrounding technical architecture of an enterprise?\n\n#### Why Do We Need\
    \ an API Platform?\n\nIt is certainly technically feasible to build APIs without\
    \ any platform or framework. But why would you? For a moment, let’s think about\
    \ databases, which provide a platform for building applications. You could certainly\
    \ build your application without a database and write your own data storage library.\
    \ But we typically do not do that. We use an existing database as a platform.\
    \ And this is the best practice for good reasons. It allows us to focus on building\
    \ an application that serves the business case, because we can reuse existing,\
    \ proven components and build the application quicker. The same augmentation applies\
    \ to API Platforms: API Platforms allow us to focus on building APIs that consumers\
    \ love, since we can reuse existing, proven API building blocks and build APIs\
    \ quicker.\n\n#### So What Is an API Platform?\n\nAn API Platform consists of\
    \ one of the following three components:\n\n- **API development platform**\n \
    \   - It offers tools to design and develop APIs quicker.\n    - It offers building\
    \ blocks, which are proven, reusable, and configurable.\n- **API runtime platform**\n\
    \    - This primarily executes APIs.\n    - It serves API responses for incoming\
    \ API requests of the consumers with nonfunctional properties like high throughput\
    \ and low latency.\n- **API engagement platform**\n    - This platform allows\
    \ API providers to manage their interaction with API consumers. It offers API\
    \ documentation, credentials, and rate plans for the consumers.\n\n#### So Which\
    \ Capabilities Does the API Platform Have?\n\nThe following are the capabilities\
    \ offered by the three components of the API Platform.\n\n##### API Development\
    \ Platform"
