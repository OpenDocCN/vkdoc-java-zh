  trans: "\n智能电视解决方案\n智能电视不仅提供电视频道，还具备交互功能。这些功能均通过向服务器发送 API 调用来实现。\n\n物联网\n物联网由具备互联网连接的物理设备组成。设备连接至通过\
    \ API 暴露在互联网上的智能功能（例如传感器、扫描仪等）。\n\nAPI 解决方案中的利益相关者\n在 API 解决方案中，利益相关者包括 API 提供者、API\
    \ 消费者和最终用户。本节将讨论各方的角色。\n\nAPI 提供者\nAPI 提供者负责开发、设计、部署和管理 API。他们定义 API 组合、路线图和产品模式。API\
    \ 提供者的职责是决定 API 暴露哪些功能。在解决方案驱动的方法中，仅构建消费者所需的 API。在自上而下的方法中，API 提供者从内部视角（例如可复用性角度）提供有益的\
    \ API。\n\nAPI 消费者\n消费者需要了解如何调用 API 并构建 API 客户端。API 提供者应为消费者提供演示应用以使用其 API。\n\n\
    最终用户\n最终用户不直接调用 API，而是使用由 API 消费者开发的应用。\n\nAPI 建模\n\nOpenAPI（Swagger）\nMICRONAUT\
    \ LAUNCH 页面截图，包含四个标题：应用类型、Java 版本、名称和基础包。\n本教程将引导您完成使用 Swagger（针对航班乘客 API 的 Micronaut）创建\
    \ OpenAPI 规范的步骤：\n切换到项目目录。\n创建模型文件夹。\n创建控制器文件夹。\n创建服务文件夹。\n在模型文件夹中使用您选择的编辑器创建\
    \ Flight 类。粘贴以下 Flight 类属性的定义，然后选中粘贴的代码并生成 getter 和 setter 方法。\n\n在模型文件夹中创建 Passenger\
    \ 类。粘贴乘客属性代码，然后生成 getter 和 setter 方法：\n\n```\npackage com.rest.domain;\nimport\
    \ io.swagger.v3.oas.annotations.media.Schema;\n@Schema(description=\"Passenger\"\
    )\npublic class Passenger {\nprivate String id;\nprivate String name;\npublic\
    \ String getId() {\nreturn id;\n}\npublic void setId(String id) {\nthis.id = id;\n\
    }\npublic String getName() {\nreturn name;\n}\npublic void setName(String name)\
    \ {\nthis.name = name;\n}\n}\n```\n\n在服务文件夹中创建 FlightService 类并粘贴以下代码。在此代码中，我们创建\
    \ flightRepo 用于在内存中存储航班。将实现 get 方法以获取航班详情和所有航班列表。\n\n```\npackage com.rest.service;\n\
    import com.rest.domain.Flight;\nimport java.util.Map;\nimport java.util.List;\n\
    import java.util.ArrayList;\nimport java.util.HashMap;\nimport java.util.concurrent.atomic.AtomicInteger;\n\
    public class FlightService {\nstatic private Map flightRepo = new HashMap();\n\
    static private AtomicInteger idCounter = new AtomicInteger();\npublic Flight getFlight(String\
    \ id) {\nFlight flight = flightRepo.get(id);\nreturn flight;\n}\npublic  List\
    \ getFlightsByPassenger(String passengerId) {\nreturn new ArrayList(flightRepo.values());\n\
    }\n}\n```\n\n在服务文件夹中创建 PassengerService 类并粘贴以下代码：\n\n```\npackage com.rest.service;\n\
    import com.rest.domain.Passenger;\nimport java.util.Map;\nimport java.util.List;\n\
    import java.util.ArrayList;\nimport java.util.HashMap;\nimport java.util.concurrent.atomic.AtomicInteger;\n\
    public class PassengerService {\nstatic private Map passengerRepo = new HashMap();\n\
    static private AtomicInteger idCounter = new AtomicInteger();\npublic Passenger\
    \ getPassenger(int id) {\nPassenger passenger = passengerRepo.get(id);\nreturn\
    \ passenger;\n}\npublic  List getPassengers() {\nreturn new ArrayList(passengerRepo.values());\n\
    }\n}\n```\n\n在控制器文件夹中创建 FlightController 类并粘贴以下代码：\n\n```\npackage com.rest.controller;\n\
    import com.rest.domain.Flight;\nimport com.rest.service.FlightService;\nimport\
    \ io.micronaut.http.annotation.Get;\nimport io.micronaut.http.annotation.Controller;\n\
    import io.micronaut.http.HttpHeaders;\nimport io.micronaut.http.HttpResponse;\n\
    import io.micronaut.http.MediaType;\nimport io.micronaut.http.annotation.Produces;\n\
    import io.micronaut.http.annotation.Controller;\nimport io.micronaut.http.annotation.Delete;\n\
    import io.micronaut.http.annotation.Get;\nimport io.micronaut.http.annotation.Post;\n\
    import io.micronaut.http.annotation.Put;\nimport io.micronaut.http.annotation.Body;\n\
    import java.util.List;\n@Controller(\"/flight\")  // \npublic class FlightController\
    \ {\nFlightService flightService;\npublic FlightController(FlightService flightService)\
    \ { // \nthis.flightService = flightService;\n}\n@Get(\"/{id}\")\npublic Flight\
    \ getFlight(String id)    {\nFlight flight = flightService.getFlight(id);\nreturn\
    \ flight;\n}\n@Get(\"/passenger/{id}\")\npublic List getFlightsByPassenger(String\
    \ id) {\nList flights = flightService.getFlightsByPassenger(id);\nreturn flights;\n\
    }\n}\n```\n\n使用 VSC 在控制器文件夹中创建 PassengerController 类并粘贴以下代码：\n\n```\npackage com.rest.controller;\n\
    import com.rest.domain.Passenger;\nimport com.rest.service.PassengerService;\n\
    import io.micronaut.http.annotation.Get;\nimport io.micronaut.http.annotation.Controller;\n\
    import io.micronaut.http.HttpHeaders;\nimport io.micronaut.http.HttpResponse;\n\
    import io.micronaut.http.MediaType;\nimport io.micronaut.http.annotation.Produces;\n\
    import io.micronaut.http.annotation.Controller;\nimport io.micronaut.http.annotation.Delete;\n\
    import io.micronaut.http.annotation.Get;\nimport io.micronaut.http.annotation.Post;\n\
    import io.micronaut.http.annotation.Put;\nimport io.micronaut.http.annotation.Body;\n\
    import java.util.List;\n@Controller(\"/passenger\")  // \npublic class PassengerController\
    \ {\nPassengerService passengerService;\npublic PassengerController(PassengerService\
    \ passengerService) { // \nthis.passengerService = passengerService;\n}\n@Get(\"\
    /{id}\")\npublic Passenger getPassenger (int id)    {\nPassenger passenger = passengerService.getPassenger(id);\n\
    return passenger;\n}\n@Get\npublic List getPassengers() {\nList passengers = passengerService.getPassengers();\n\
    return passengers;\n}\n}\n```\n\n首先，将 Micronaut 的 OpenAPI 添加到 pom.xml 文件中构建配置的注解处理器作用域：\n\
    \n```\nio.micronaut.openapi\nmicronaut-openapi\n${micronaut.version}\n\n```\n\n\
    对于 Swagger 注解，将以下内容添加到 pom.xml 文件：\n\n```\nio.swagger.core.v3\nswagger-annotations\n\
    \n```\n\n配置依赖项后，最低要求是将以下内容添加到 Application 类：\n\n```\nimport io.swagger.v3.oas.annotations.OpenAPIDefinition;\n\
    import io.swagger.v3.oas.annotations.info.Contact;\nimport io.swagger.v3.oas.annotations.info.Info;\n\
    import io.swagger.v3.oas.annotations.info.License;\n@OpenAPIDefinition(\ninfo\
    \ = @Info(\ntitle = “Flight\",\nversion = \"0.1\",\ndescription = \"Flight API\"\
    ,\nlicense = @License(name = \"Apache 2.0\", url = \"https://foo.bar\"),\ncontact\
    \ = @Contact(url = \"https://gigantic-server.com\", name = \"Fred\", email = \"\
    Fred@gigagantic-server.com\")\n))\n使用命令\"mvn package\"编译应用程序。\ncd target/classes/META-INF/swagger\n\
    在文件 flight-0.1.yml 中生成 OpenAPI YAML。\n```\n\n完成 API 建模后，您可以生成文档并与 API 消费者共享。Swagger\
    \ 允许在浏览器中更易读地访问 API。接下来，我们将配置 Swagger。\n\n在 application.yml 文件中配置以下内容以启用 Swagger。您可以在\
    \ src/main/resources 文件夹中找到 application.yml 文件：\n\n```\nmicronaut:\nrouter:\n\
    static-resources:\nswagger:\npaths: classpath:META-INF/swagger\nmapping: /swagger/**\n\
    ```\n\n完成上述配置后，运行应用程序时，您可以通过`http://localhost:8080/swagger/flight-0.1.yml`访问 Swagger\
    \ 文档。\n"
- fmt: '# Summary


    In this chapter, we started with API design strategies and then looked into the
    API creation process and modeling. Best practices for REST API design are discussed,
    followed by the API solution architecture. We compared API modeling tools and
    then developed an API for flight passenger using Micronaut.


    ## 5. Introduction to JAX-RS


    This chapter introduces basic concepts about JAX-RS and its implementation in
    Micronaut.


    ### JAX-RS Introduction


    Java API for RESTful web services (JAX-RS) is a Java programming language API
    spec that provides support in creating web services according to the REST architectural
    pattern. What exactly is JAX-RS? JAX-RS is a POJO-based, annotation-driven framework
    for building web services that comply with RESTful principles. Imagine writing
    all the low-level code to parse an HTTP request and the logic just to wire these
    requests to appropriate Java classes/methods. The beauty of the JAX-RS API is
    that it insulates developers from that complexity and allows them to concentrate
    on business logic. That’s precisely where the use of POJOs and annotations come
    into play! JAX-RS has annotations to bind specific URI patterns and HTTP operations
    to individual methods of your Java class. JAX-RS is a collection of interfaces
    and Java annotations that simplifies development of server-side REST applications.
    By using JAX-RS technology, REST applications are easier to develop and easier
    to consume when compared to other types of distributed systems. The following
    are salient features provided by JAX-RS:


    - POJO-based resource classes

    - HTTP-centric programming model

    - Entity format independence

    - Container independence

    - Included in Java EE

    - Is a standardized API for building and consuming RESTful web services

    - **Application**: Specifies which Java classes service which requests

    - **Resources**: Base Java code and annotations for building RESTful services

    - **Providers**: Facilitates for marshaling and un-marshaling of data (`POJO Customer`)

    - **Client API**: Base Java code and annotations for building RESTful service
    clients

    - **Filters and interceptors**: Facilities for inserting code to execute throughout
    the request-response invocation chain

    - **Validation**: Provides annotation-based validation for incoming data. For
    example:


    ```

    @NotNull @FormParam("firstname") String firstname, @NotNull @FormParam("lastname")
    String lastname, @Email @FormParam("email") String email

    ```


    - **Asynchronous processing**: Facilities for client- and provider-side asynchronous
    requests for long-running requests (`@Suspended`)

    - **@Context**: Provides client and provider implementation classes with access
    to useful objects from the runtime environment, for example, header


    ### Input and Output Content Type


    The following are media types supported by JAX-RS. These should be used in request
    and response annotations for contents produced or consumed by a REST resource.


    - **APPLICATION_JSON**: `application/json`

    - **APPLICATION_XML**: `application/xml` (encoding is used)

    - **TEXT_HTML**: `text/html`

    - **TEXT_PLAIN**: `text/plain`

    - **TEXT_XML**: `text/xml`

    - The difference between application and text media types is the internationalization.
    The application supports encoding for internationalization.


    Examples: `@Produces("application/json")`, `@Consumes("text/xml")`


    ### JAX-RS Injection


    A lot of JAX-RS involves pulling information from an HTTP request and injecting
    it into a Java method. You may be interested in only a fragment of the incoming
    URI. You might be interested in a URI query string value. The client might be
    sending critical HTTP headers or cookie values that your service needs to process
    the request. JAX-RS lets you grab this information as you need it through a set
    of injection annotations and APIs.


    There are a lot of different things JAX-RS annotations can inject. Here is a list
    of those provided by the specification:'
