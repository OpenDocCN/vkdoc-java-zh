    id\":1,\"message\":\"test\",\"from\":\"test\",\"to\":\"test\",\"creationDate\"\
    :\"12/12//2012\"}]\n```\n\n总结\n现在，我们的产品组合中有两个 API：一个用于消息服务，另一个用于航班乘客。航班状态 API\
    \ 实现了 Flight 和 Passenger 两个对象之间的关系，而消息服务除了读取功能外，还支持消息的创建和删除。两个 API 遵循相同的设计非常重要。\n\
    \n7. API 平台与数据处理程序\n\n本章从 API 平台架构开始，然后深入探讨数据处理程序模式，该模式用于将 RESTful API 与企业内部的实际数据源集成，从而通过\
    \ API 为消费者提供更有意义的价值。\n\nAPI 平台架构\n\nAPI 提供者使用 API 平台来高效地实现 API。我们将探讨以下内容：\n\n\
    *   为什么需要 API 平台？\n*   什么是 API 平台？\n*   API 平台具备哪些能力？\n*   API 平台是如何组织的？其架构是怎样的？\n\
    *   API 架构如何融入企业周边的技术架构？\n\n为什么需要 API 平台？\n当然，在没有平台或框架的情况下构建 API 在技术上是可行的。但何必如此呢？让我们暂时思考一下数据库，它为构建应用程序提供了平台。你当然可以在没有数据库的情况下构建应用程序，并编写自己的数据存储库。但我们通常不会这样做。我们使用现有的数据库作为平台。这是有充分理由的最佳实践。它使我们能够专注于构建服务于业务场景的应用程序，因为我们可以重用现有的、经过验证的组件，从而更快地构建应用程序。同样的道理也适用于\
    \ API 平台：API 平台使我们能够专注于构建消费者喜爱的 API，因为我们可以重用现有的、经过验证的 API 构建块，从而更快地构建 API。\n\n\
    那么什么是 API 平台？\n\nAPI 平台由以下三个组件之一组成：\n\n*   **API 开发平台**\n    *   它提供工具，以便更快地设计和开发\
    \ API。\n    *   它提供经过验证、可重用且可配置的构建块。\n*   **API 运行时平台**\n    *   它主要负责执行 API。\n\
    \    *   它处理消费者的传入 API 请求，并以高吞吐量和低延迟等非功能性属性返回 API 响应。\n*   **API 交互平台**\n    *\
    \   该平台允许 API 提供者管理与 API 消费者的交互。它为消费者提供 API 文档、凭证和费率计划。\n\n那么 API 平台具备哪些能力？\n\n\
    以下是 API 平台的三个组件所提供的能力。\n\nAPI 开发平台"
- fmt: "# API Platform Architecture\n\n## API Development Platform\n\nThe API development\
    \ platform offers a toolbox for API design and development targeted for API developers\
    \ who work for API providers. The toolbox contains API building blocks, which\
    \ are proven, reusable, and configurable. When building APIs, certain functionality\
    \ is needed over and over again. This can be accomplished by building blocks.\
    \ Building blocks can be reused. Building blocks are tested so bugs are not there,\
    \ and these are configurable so they can be adopted for many purposes. The building\
    \ blocks offered by the API development platform span the following features at\
    \ the minimum:\n\n- Processing of HTTP requests and responses\n- Header\n- Query\n\
    - **HTTP**: Status code\n- Methods\n- **Security**: IP-based access limitation,\
    \ location-based access limitation, time-based access limitation, front-end authentication\
    \ and authorization, OAuth, basic authorization, API key, back-end authentication,\
    \ and authorization (with LDAP and SAML)\n- **Front-end protocols**: HTTP (REST),\
    \ SOAP, RPC, and RMI\n- **Data format transformation**: XML to JSON and JSON to\
    \ XML\n- **Structural transformation**: XLST and XPATH\n- **Data integrity and\
    \ protection**: Encryption\n- Routing to one or more back ends\n- Aggregation\
    \ of multiple APIs and/or multiple back ends\n- Throttling to protect back-end\
    \ rate limitation and throughput limitation\n- Load balancing for incoming requests\
    \ to the API Platform and outgoing requests to the back ends\n- Hooks for logging\n\
    - Hooks for analytics\n- Monetization capabilities\n- **Language for implementing\
    \ APIs**: Java, JavaScript, etc. (Jersey, Restlet, and Spring)\n- **IDE for API\
    \ development with editor, debugger, and deployment tools**: Eclipse, JDeveloper,\
    \ and NetBeans\n- **Language for designing APIs**: YAML, RAML, etc.\n- **Design\
    \ tools for creating API interface designs**: RAML, Swagger, and Blueprint\n-\
    \ **Tools for generating documentation and API code skeletons based upon design**:\
    \ RAML and Swagger\n\n## API Runtime Platform\n\nThe API runtime platform primarily\
    \ executes APIs. It enables the APIs to accept incoming requests from API consumers\
    \ and serve responses.\n\n- It should deliver nonfunctional properties like:\n\
    \  - High availability, high security, and high throughput\n- To meet these properties,\
    \ the platform offers:\n  - Load balancing\n  - Connection pooling\n  - Caching\n\
    - It should also offer capabilities for monitoring of APIs, logging, and analytics\
    \ to check desired nonfunctional properties are met.\n\n## API Engagement Platform\n\
    \nThe API engagement platform is used by API providers to interact with its community\
    \ of API consumers. API providers use the following capabilities of the API engagement\
    \ platform:\n\n- **API management**: Configuration and reconfiguration of APIs\
    \ without the need for deployment\n- **API discovery**: A mechanism for clients\
    \ to obtain information about APIs\n- **Consumer onboarding**: App key generation\
    \ and API Console\n- **Community management**: Blogs\n- Documentation\n- Version\
    \ management\n- Management of monetization and service-level SLAs\n\nAPI consumers\
    \ use the engagement platform for:\n\n- Overview of an API portfolio\n- Documentation\
    \ of APIs\n- Possibility of trying APIs interactively\n- Example source code for\
    \ integration\n- Self-service to get access to APIs\n- Client tooling, such as\
    \ code generation for clients\n\n## How Is an API Platform Organized? What Is\
    \ the Architecture of the API Platform?\n\nUsually, APIs are not only deployed\
    \ on the production system, but need to be deployed on different stages of increasing\
    \ maturity. The stages are also sometimes called environments. Each of the stages\
    \ has a specific purpose and is separated from the other stages to isolate potential\
    \ errors:\n\n- **Simulation**: Used for playing with interface design, provides\
    \ mocks or simulation of an API\n- **Development**: Used for development, which\
    \ will eventually go to production\n- **Testing**: Used for manual black box testing\
    \ and integration testing\n- **Preproduction**: Used as a practice for production\
    \ and for acceptance testing\n- **Production**: Used as a real system for consumers\n\
    \nAs shown in Figure [7-1](#427457_3_En_7_Chapter.xhtml#Fig1), the API development\
    \ platform is used for design and development. The API runtime platform is used\
    \ for deployment. The API engagement platform is used for publishing the API.\n\
    \n![](images/427457_3_En_7_Chapter/427457_3_En_7_Fig1_HTML.jpg)\n\nDiagram illustrating\
    \ an API platform lifecycle with three stages: API Development Platform, API Runtime\
    \ Platform, and API Engagement Platform. Each stage is represented by an icon:\
    \ a wrench for development, a power button for runtime, and a person with rays\
    \ for engagement. Below, arrows indicate the sequential process: Develop, Deploy,\
    \ and Publish.\n\n**Figure 7-1** API Platform architecture\n\nA flow diagram illustrates\
    \ how the API platform works. The first step is to develop on the API development\
    \ platform. The second step is to deploy on the API runtime platform. The last\
    \ step is to publish on the API engagement platform.\n\n## How Does the API Architecture\
    \ Fit in the Surrounding Technical Architecture of an Enterprise?\n\nAn API Platform\
    \ is not isolated, but it needs to be integrated in existing architecture in the\
    \ enterprise. Firewall is used to improve security. Load balancers are used to\
    \ improve performance and are usually placed between the Internet and the API\
    \ Platform. IAM (Identity and Access Management) systems are for managing identity\
    \ information and LDAP or Active Directory as shown in Figure [7-2](#427457_3_En_7_Chapter.xhtml#Fig2).\n\
    \n![](images/427457_3_En_7_Chapter/427457_3_En_7_Fig2_HTML.jpg)\n\nDiagram illustrating\
    \ an API architecture. At the top, API Clients, Firewalls, and Load Balancers\
    \ are shown. Below, the API Platform includes API Development, Runtime, and Engagement\
    \ Platforms. At the bottom, back-end components include IAM Systems, Enterprise\
    \ Service Bus, Databases, Legacy System, and Cloud Service.\n\n**Figure 7-2**\
    \ API architecture in an enterprise\n\nA process diagram of the API implementation\
    \ in an enterprise. It begins with API clients, firewalls, load balancers, and\
    \ API platform which has three stages. The final process is the back ends which\
    \ consists of databases, enterprise service bus, legacy system, and cloud service.\n\
    \nBack-end systems for providing the core functionality of the enterprise: Back\
    \ ends may be databases, applications, enterprise service buses, web services\
    \ using SOAP, message queues, and REST services.\n\n## Data Handler\n\nAs mentioned\
    \ in the previous section, we use an existing database as a platform. A data handler,\
    \ a data access object (DAO), and a command query responsibility segregation (CQRS)\
    \ all provide an abstract interface to some type of database or any other persistence\
    \ mechanism. A data handler is a layer which handles data in the framework. A\
    \ data access object is a design pattern used to implement the access from the\
    \ database inside the data handler. The CQRS pattern, on the other hand, provides\
    \ a mechanism to segment query and transactional data in the data handler."
