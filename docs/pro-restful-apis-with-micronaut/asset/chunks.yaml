    \ developers depend on well-designed errors at the critical times when they are\
    \ troubleshooting and resolving issues after the applications they’ve built using\
    \ your API are in the hands of their users.\n\n**Handling errors**: Let’s take\
    \ a look at how three top APIs approach:\n\n- **Facebook**\n\nHTTP Status Code:\
    \ 200\n\n```\n{\"type\" : \"OauthException\", \"message\":\"(#803) Some of the\
