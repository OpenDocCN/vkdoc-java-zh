    \n|\n 获取地址 |\n GitHub |\n GitHub |\n GitHub |\n\n|\n 赞助方 |\n MuleSoft |\n Apiary\
    \ |\n SmartBear |\n\n|\n 初始提交 |\n 2013 年 9 月 |\n 2013 年 4 月 |\n 2011 年 7 月 |\n\
    \n|\n 商业产品 |\n 是 |\n 是 |\n 是 |\n\n如何建模 REST？ |\n 资源 |\n X |\n X |\n X (“api”)\
    \ |\n\n|\n 方法/动作 |\n X (“methods”) |\n X (“actions”) |\n X (“operations”) |\n\n\
    |\n 查询参数 |\n X |\n X |\n X |\n\n|\n 路径/URL 参数 |\n X |\n X |\n X |\n\n|\n 表示 |\n\
