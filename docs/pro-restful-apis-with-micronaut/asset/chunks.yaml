    \ JSON 格式提供公共数据。\n\nJSON 的优缺点\n以下是 JSON 的优缺点：\n\n优点\n\n*   易于读/写/解析\n\n*   相当简洁（例如，与\
    \ XML 相比）\n\n*   通用的“标准”，有许多可用的库\n\n缺点\n\n*   不如二进制格式轻量。\n\n*   不能使用注释。\n\n* \
    \  它是“封装的”，意味着你不能轻易地流式传输/追加数据，而必须将其分解成单个对象。XML 也有同样的问题，而 CSV 则没有。\n\n*   难以描述你正在呈现的数据（使用\
    \ XML 更容易）。\n\n*   无法强制执行或验证结构/模式。\n\nXML 与 JSON 比较\n\n本节基于不同属性比较 XML 和 JSON。\n\
    \n表 3-1\nXML 与 JSON 比较\n\n属性 |\n XML |\n JSON |\n\n| --- | --- | --- | --- | ---\
    \ | --- | --- |\n\n简单性 |\n XML 简单且人类可读 |\n JSON 比 XML 更简单，且人类可读 |\n\n自描述性 |\n\
    \ 是 |\n 是 |\n\n处理 |\n XML 易于处理 |\n JSON 更易于处理，因为其结构更简单 |\n\n性能 |\n 由于标签，未针对性能进行优化\
    \ |\n 由于体积小，比 XML 更快 |\n\n开放性 |\n XML 是开放的 |\n JSON 至少与 XML 一样开放，甚至可能更开放，因为它不在企业/政治标准化斗争的中心\
    \ |\n\n面向对象 |\n XML 面向文档 |\n JSON 面向数据。JSON 可以更容易地映射到面向对象系统 |\n\n互操作性 |\n XML\
    \ 可互操作 |\n JSON 具有与 XML 相同的互操作性潜力 |\n\n国际化 |\n 支持 Unicode |\n 支持 Unicode |\n\n\
    可扩展性 |\n XML 是可扩展的 |\n JSON 不可扩展，因为它不需要扩展。JSON 不是文档标记语言，因此无需定义新标签或属性来表示其中的数据 |\n\
    \n采用率 |\n XML 被业界广泛采用 |\n JSON 刚刚开始为人所知。其简单性以及将 XML 转换为 JSON 的便利性使得 JSON 最终更易于被采用\
    \ |\n\n实现返回 XML 和 JSON 消息的 API\n[`https://micronaut.io/launch/`](https://micronaut.io/launch/)\n\
    根据屏幕显示，选择：\n应用程序类型：Micronaut Application\nJava 版本：21\n名称：message\n包：com.rest\n\
    构建工具：maven\n点击“Generate Project”\n一张 Micronaut 应用程序的图片。Java 版本为 21，名称为 message，基础包为\
