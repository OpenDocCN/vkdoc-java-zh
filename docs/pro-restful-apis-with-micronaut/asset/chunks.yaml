- fmt: '# Cross-Origin Resource Sharing (CORS)


    “Cross-Origin Resource Sharing” (CORS) is a mechanism that allows `TypeScript`
    or `JavaScript` on a web page to make `XMLHttpRequests` to another domain, not
    the domain the `JavaScript` originated from. Such “cross-domain” requests would
    otherwise be forbidden by web browsers, per the same origin security policy. CORS
    defines a way in which the browser and the server can interact to determine whether
    or not to allow the cross-origin request. It is more useful than only allowing
    same-origin requests, but it is more secure than simply allowing all such cross-origin
    requests. The Cross-Origin Resource Sharing standard works by adding new HTTP
    headers that allow servers to describe the set of origins that are permitted to
    read that information using a web browser.


    ## How to implement CORS?


    For example:


    ```java

    return Response.ok() //200

    .entity(quote)

    .header("Access-Control-Allow-Origin", "*")

    .header("Access-Control-Allow-Methods", "GET, POST, DELETE, PUT").

    allow("OPTIONS").build();

    ```


    ## Summary


    In this chapter, we reviewed API management requirements/solutions and discussed
    Cross-Origin Resource Sharing (CORS) to support client implementation.


    # 9. API Security


    In this chapter, we will start with the review of the OAuth 2 standard for securing
    RESTful APIs, then review JWT implementation, and do an exercise on implementing
    basic security with Micronaut.


    ## API Security—OAuth 2


    OAuth 2 is a standard for delegating authorization for accessing resources by
    HTTP. With OAuth, we can give access rights to the mobile apps without giving
    a password. Instead, a token is handed over to the application. A token represents
    access rights for the subset of data for a short time frame. Please refer to [`https://oauth.net/2/`](https://oauth.net/2/)
    for general information about OAuth 2.


    To obtain a token, the user first logs onto the website of the OAuth server. The
    generated token can be an authorization code, access token, or refresh code. OAuth
    is used under the hood of a number of modern clouds.


    List of OAuth providers: [`https://en.wikipedia.org/wiki/List_of_OAuth_providers`](https://en.wikipedia.org/wiki/List_of_OAuth_providers)


    OAuth is specified and standardized by IETF in RFC6749 [`http://tools.ietf.org/html/rfc6749`](http://tools.ietf.org/html/rfc6749).
    OAuth 1 is outdated.


    There are two terms: authentication and authorization.


    - **Authentication** is a concept that answers the question: Who are you?

    - **Authorization** is a concept that answers the question: What are you allowed
    to do?


    ### Roles


    OAuth 2 defines four roles:


    - **Resource owner**: Generally yourself.

    - **Resource server**: Server hosting protected data (e.g., Google hosting your
    profile and personal information).

    - **Client**: Application requesting access to a resource server (it can be your
    PHP website, a JavaScript application, or a mobile application).

    - **Authorization server**: Server issuing an access token to the client. This
    token will be used for the client to request the resource server. This server
    can be the same as the authorization server (the same physical server and the
    same application), and it is often the case.


    ### Tokens


    Tokens are random strings generated by the authorization server and are issued
    when the client requests them.


    There are two types of tokens:


    - **Access token**: This is the most important because it allows the user data
    from being accessed by a third-party application. This token is sent by the client
    as a parameter or as a header in the request to the resource server. It has a
    limited lifetime, which is defined by the authorization server. It must be kept
    confidential as soon as possible, but we will see that this is not always possible,
    especially when the client is a web browser that sends requests to the resource
    server via JavaScript. In general access, a token will be designed to be opaque
    to the client, but when it’s used as a user authentication, the client will be
    needed to be able to derive some information from the token.


    - **Refresh token**: This token is issued with the access token, but unlike the
    latter, it is not sent in each request from the client to the resource server.
    It merely serves to be sent to the authorization server for renewing the access
    token when it has expired. For security reasons, it is not always possible to
    obtain this token. We will see later in what circumstances.


    Figure [9-1](#427457_3_En_9_Chapter.xhtml#Fig1) shows OAuth-based interactions.


    ![](images/427457_3_En_9_Chapter/427457_3_En_9_Fig1_HTML.jpg)


    Diagram illustrating the OAuth 2.0 authorization flow. The "Resource Owner" accesses
    resources via the "Client Application," which in turn accesses resource data from
    the "Resource Server." The "OAuth Server" authenticates and authorizes the client,
    issuing tokens and delegating authorization to the resource server. Arrows indicate
    the direction of data and authorization flow between components.


    *Figure 9-1 OAuth-based interactions*


    ### Register as a Client


    Since you want to retrieve data from a resource server using OAuth 2, you have
    to register as a client of the authorization server.


    Each provider is free to allow this by the method of his choice. The protocol
    only defines the parameters that must be specified by the client and those to
    be returned by the authorization server.


    Here are the parameters (they may differ depending on the providers):


    **Client Registration**


    - **Application name**: The application name

    - **Redirect URLs**: URLs of the client for receiving authorization code and access
    token

    - **Grant type(s)**: Authorization types that will be used by the client

    - **JavaScript origin (optional)**: The hostname that will be allowed to request
    the resource server via `XMLHttpRequest`


    **Authorization Server Response**


    - **Client Id**: Unique random string

    - **Client secret**: Secret key that must be kept confidential

    - **More information**: RFC 6749—Client Registration


    ### Authorization Grant Types


    OAuth 2 defines four grant types depending on the location and the nature of the
    client involved in obtaining an access token.


    #### Authorization Code Grant


    We will review authorization code grant and its flow in this section. This type
    of grant is used to sign in to Google and Facebook.


    **When Should It Be Used?**


    It should be used when the client is a web server or website. It allows you to
    obtain a long-lived access token since it can be renewed with a refresh token
    (if the authorization server enables it).


    **Example**:


    - **Resource owner**: You

    - **Resource server**: A server

    - **Client**: Any website

    - **Authorization server**: A server


    **Scenario:**


    1. A website wants to obtain information about your profile.

    2. You are redirected by the client (the website) to the authorization server.

    3. If you authorize access, the authorization server sends an authorization code
    to the client (the website) in the callback response.

    4. Then, this code is exchanged against an access token between the client and
    the authorization server.

    5. The website is now able to use this access token to query the resource server
    and retrieve your profile data.'
