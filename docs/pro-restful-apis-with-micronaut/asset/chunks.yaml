    \ by considering operating systems. Just like in buildings, an operating system\
    \ provides an exterior shell to the interior functionality of a computer. This\
    \ simplified interface makes an OS easier to use and protects the core from clumsy\
    \ users.\n\nThis is where the definition of the façade pattern in on design patterns\
    \ comes in handy:\n\n> *Provide a unified interface to a set of interfaces in\
    \ a subsystem. Façade defines a higher-level interface that makes the subsystem\
    \ easier to use.*"
