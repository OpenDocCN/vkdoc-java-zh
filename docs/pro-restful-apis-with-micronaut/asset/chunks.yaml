- fmt: '# 1. Fundamentals of RESTful APIs


    APIs are not new. They’ve served as interfaces that enable applications to communicate
    with each other for decades. But the role of APIs has changed dramatically in
    the last few years. Innovative companies have discovered that APIs can be used
    as an interface to the business, allowing them to monetize digital assets, extend
    their value proposition with partner-delivered capabilities, and connect to customers
    across channels and devices. When you create an API, you are allowing others within
    or outside of your organization to make use of your service or product to create
    new applications, attract customers, or expand their business. Internal APIs enhance
    the productivity of development teams by maximizing reusability and enforcing
    consistency in new applications. Public APIs can add value to your business by
    allowing third-party developers to enhance your services or bring their customers
    to you. As developers find new applications for your services and data, a network
    effect occurs, delivering significant bottom-line business impact. For example,
    Expedia opened up their travel booking services to partners through an API to
    launch the Expedia Affiliate Network, building a new revenue stream that now contributes
    $2B in annual revenue. Salesforce released APIs to enable partners to extend the
    capabilities of their platform and now generates half of their annual revenue
    through those APIs, which could be SOAP-based (`JAX-WS`) and, more recently, RESTful
    (`JAX-RS`), Spring Boot, and now Micronaut.


    SOAP web service depends upon a number of technologies (such as UDDI, WSDL, SOAP,
    and HTTP) and protocols to transport and transform data between a service provider
    and the consumer and can be created with `JAX-WS`.


    Later, Roy Fielding (in the year 2000) presented his doctoral dissertation, “Architectural
    Styles and the Design of Network-based Software Architecture.” He coined the term
    “REST,” an architectural style for distributed hypermedia systems. Put simply,
    REST (short for Representational State Transfer) is an architectural style defined
    to help create and organize distributed systems. The key word from that definition
    should be “style,” because an important aspect of REST (and which is one of the
    main reasons books like this one exist) is that it is an architectural style—not
    a guideline, not a standard, or anything that would imply that there are a set
    of hard rules to follow in order to end up having a RESTful architecture.


    In this chapter, I’ll be covering REST fundamentals, SOAP vs. REST, and web architectural
    style to provide a solid foundation and better prepare you for what you’ll see
    in later chapters.


    The main idea behind REST is that a distributed system, organized RESTfully, will
    improve in the following areas:


    * **Performance**: The communication style proposed by REST is meant to be efficient
    and simple, allowing a performance boost on systems that adopt it.

    * **Scalability of component interaction**: Any distributed system should be able
    to handle this aspect well enough, and the simple interaction proposed by REST
    greatly allows for this.

    * **Simplicity of interface**: A simple interface allows for simpler interactions
    between systems, which in turn can grant benefits like the ones previously mentioned.

    * **Modifiability of components**: The distributed nature of the system, and the
    separation of concerns proposed by REST (more on this in a bit), allows for components
    to be modified independently of each other at a minimum cost and risk.

    * **Portability**: REST is technology- and language-agnostic, meaning that it
    can be implemented and consumed by any type of technology (there are some constraints
    that I’ll go over in a bit, but no specific technology is enforced).

    * **Reliability**: The stateless constraint proposed by REST (more on this later)
    allows for the easier recovery of a system after failure.

    * **Visibility**: Again, the stateless constraint proposed has the added full
    state of said request (this will become clear once I talk about the constraints
    in a bit). From this list, some direct benefits can be extrapolated. A component-centric
    design allows you to make systems that are very fault-tolerant. Having the failure
    of one component not affecting the entire stability of the system is a great benefit
    for any system. Interconnecting components is quite easy, minimizing the risks
    when adding new features or scaling up or down. A system designed with REST in
    mind will be accessible to a wider audience, thanks to its portability (as described
    earlier). With a generic interface, the system can be used by a wider range of
    developers. In order to achieve these properties and benefits, a set of constraints
    were added to REST to help define a uniform connector interface. REST is not suggested
    to be used when you need to enforce a strict contract between the client and server
    and when performing transactions that involve multiple calls.


    ## SOAP vs. REST


    Table [1-1](#427457_3_En_1_Chapter.xhtml#Tab1) provides a comparison between SOAP
    and REST with an example of use cases each can support.


    **Table 1-1** SOAP vs. REST comparison


    | Topic | SOAP | REST |

    | --- | --- | --- |

    | Origin | SOAP (Simple Object Access Protocol) was created in 1998 by Dave Winer
    et al. in collaboration with Microsoft. Developed by a large software company,
    this protocol addresses the goal of addressing the needs of the enterprise market
    | REST (Representational State Transfer) was created in 2000 by Roy Fielding at
    UC, Irvine. Developed in an academic environment, this protocol embraces the philosophy
    of the Open Web |

    | Basic concept | Makes data available as services (verb + noun), for example,
    “getUser” or “PayInvoice” | Makes data available as resources (nouns), for example,
    “user” or “invoice” |

    | Pros | Follows a formal enterprise approachWorks on top of any communication
    protocol, even asynchronouslyInformation about objects is communicated to clientsSecurity
    and authorization are part of the protocolCan be fully described using WSDL |
    Follows the philosophy of the Open WebRelatively easy to implement and maintainClearly
    separates client and server implementationsCommunication isn’t controlled by a
    single entityInformation can be stored by the client to prevent multiple callsCan
    return data in multiple formats (JSON, XML, etc.) |

    | Cons | Spends a lot of bandwidth communicating metadataHard to implement and
    is unpopular among Web and mobile developers | Only works on top of the HTTP protocolHard
    to enforce authorization and security on top of it |

    | When to use | When clients need to have access to objects available on serversWhen
    you want to enforce a formal contract between the client and server | When clients
    and servers operate on a web environmentWhen information about objects doesn’t
    need to be communicated to the client |

    | When not to use | When you want the majority of developers to easily use your
    APIWhen your bandwidth is very limited | When you need to enforce a strict contract
    between the client and serverWhen performing transactions that involve multiple
    calls |

    | Use cases | Financial servicesPayment gatewaysTelecommunication services | Social
    media servicesSocial networksWeb chat servicesMobile services |

    | Examples | [`https://www.salesforce.com/developer/docs/api/`](https://www.salesforce.com/developer/docs/api/)
    - Salesforce SOAP API[`https://developer.paypal.com/docs/classic/api/PayPalSOAPAPIArchitecture/`](https://developer.paypal.com/docs/classic/api/PayPalSOAPAPIArchitecture/)
    -Paypal SOAP API | [`https://dev.twitter.com/`](https://dev.twitter.com/)[`https://developer.linkedin.com/apis`](https://developer.linkedin.com/apis)
    |

    | Conclusion | Use SOAP if you are dealing with transactional operations and you
    already have an audience that is satisfied with this technology | Use REST if
    you’re focused on wide-scale API adoption or if your API is targeted at mobile
    apps |'
