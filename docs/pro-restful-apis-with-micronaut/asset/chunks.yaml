    \ Apigee, Microsoft, PayPal |\n\n总结\n\n*   Swagger 拥有非常强大的建模语言，可以精确定义系统的预期行为——对于测试和为一系列\
    \ API 创建代码存根非常有用。\n\n*   RAML 旨在支持设计优先的开发流程，并专注于一致性。\n\n*   API Blueprint 更侧重于文档，其首要任务是提供用户可读的模型和文档。\n\
    \n每个项目都带来了不同的优势和劣势，最终，这取决于您需要哪些优势，以及您无法容忍哪些劣势。总体而言，RAML 在这些不同类别中表现最佳，虽然其开发者社区不如其他社区庞大，但我认为可以肯定地说它将继续增长。总体赢家是\
    \ RAML。\n\n最佳实践\nREST 是一种架构风格而非严格标准；它允许很大的灵活性。由于这种灵活性和结构自由，对设计最佳实践的需求也很大。本节将讨论这些最佳实践。\n\
    \n保持基础 URL 简单直观\n\n基础 URL 是 API 最重要的设计启示。简单直观的基础 URL 设计使您的 API 易于使用。启示是一种设计属性，它无需文档就能传达应如何使用某物。门把手的设计应传达是拉还是推。对于\
    \ Web API 设计，每个资源应只有两个基础 URL。让我们围绕一个简单的对象或资源（客户）来建模一个 API，并为其创建一个 Web API。第一个\
    \ URL 用于集合；第二个用于集合中的特定元素：\n\n*   **/customers**：集合\n\n*   **/customers/1**：特定元素\n\
    \n将其简化到这一层也将迫使动词从您的基础 URL 中消失。如表 4-3 所示，请将动词排除在 URL 之外。\n\n表 4-3\n名词与动词\n\n资源\
    \ |\n POST 创建 |\n GET 读取 |\n PUT 更新 |\n DELETE 删除 |\n\n| --- | --- | --- | ---\
    \ | --- | --- | --- | --- | --- | --- | --- |\n\n`/customers` |\n 新客户 |\n 客户列表\
    \ |\n 批量更新 |\n 删除所有 |\n\n`/customers/12` |\n – |\n 显示客户 12 |\n 如果存在则更新\n如果不存在则报错\
    \ |\n 删除客户 12 |\n\n总结\n\n*   每个资源使用两个基础 URL。将动词排除在基础 URL 之外。使用 HTTP 动词对集合和元素进行操作。\n\
    \n*   抽象级别取决于您的场景。您还需要公开数量可控的资源。\n\n*   力求具体命名，并将资源数量保持在 12 到 24 个之间。\n\n*   直观的\
    \ API 使用复数名词而非单数名词，使用具体名词而非抽象名词。\n\n*   资源几乎总是与其他资源存在关系。在 Web API 中表达这些关系的简单方法是什么？让我们再次看看我们建模的\
    \ API——名词是好东西，动词是坏东西——即与我们的播客资源交互的 API。记住，我们有两个基础 URL：/podcasts 和 /podcasts/1234。我们使用\
    \ HTTP 动词对资源和集合进行操作。我们的播客属于客户。要获取属于特定客户的所有播客或为该客户创建新播客，请执行 GET 或 POST：\n\n*  \
    \ GET /customers/5678/podcasts\n\n*   POST /customers/5678/podcasts\n\n*   将复杂性隐藏在“?”后面。通过将可选状态和属性放在\
    \ HTTP 问号后面，使开发人员能够轻松使用基础 URL。要获取`usa`国家`ca`州`sfo`城市的所有客户，请使用 GET：\n\n*   GET\
    \ /customers?country=usa&state=ca&city=so\n\n错误处理\n许多软件开发人员（包括我自己）并不总是喜欢考虑异常和错误处理，但对于任何软件开发人员，尤其是\
    \ API 设计者来说，这是拼图中非常重要的一块。为什么良好的错误设计对 API 设计者尤其重要？从使用您 Web API 的开发者的角度来看，该接口另一侧的一切都是一个黑盒。因此，错误成为提供上下文和了解如何使用\
    \ API 的关键工具。首先，开发者通过错误来学习编写代码。极限编程模型中的“测试优先”概念以及较新的“测试驱动开发”模型代表了一套不断演变的最佳实践，因为这是开发者工作的一种重要且自然的方式。其次，除了在开发应用程序时，开发者在关键时期（即当他们使用您的\
    \ API 构建的应用程序交付给用户后，需要进行故障排除和解决问题时）也依赖于设计良好的错误。\n\n**处理错误**：让我们看看三个顶级 API 是如何处理的\n\
    \n*   Facebook\n\nHTTP 状态码：200\n\n```\n    {\"type\" : \"OauthException\", \"\
    message\":\"(#803) 您请求的某些别名不存在: foo.bar\"}\n    ```\n\n*   Twilio\n\nHTTP 状态码：401\n"
- fmt: "```json\n{\"status\" : \"401\", \"message\":\"Authenticate\",\"code\": 20003,\
    \ \"more info\": \"http://www.twilio.com/docs/errors/20003\"}\n```\n\nAnother\
    \ example of error messaging from SimpleGeo:\n\nHTTP Status Code: 401\n\n```json\n\
    {\"code\" : 401, \"message\": \"Authentication Required\"}\n```\n\nWhen you boil\
    \ it down, there are really only three outcomes in the interaction between an\
    \ app and an API:\n\n- **Everything worked**: Success\n- **The application did\
    \ something wrong**: Client error\n- **The API did something wrong**: Server error\n\
    \n## Error Code\n\nStart by using the following three codes which should map to\
    \ the three outcomes earlier. If you need more, add them. But you shouldn’t need\
    \ to go beyond:\n\n- **200**: OK\n- **400**: Bad request\n- **500**: Internal\
    \ server error\n\nIf you’re not comfortable reducing all your error conditions\
    \ to these three, try picking among these additional five:\n\n- **201**: Created\n\
    - **304**: Not modified\n- **404**: Not found\n- **401**: Unauthorized\n- **403**:\
    \ Forbidden\n\nCheck out this good Wikipedia entry for all HTTP status codes:\
    \ [`https://en.wikipedia.org/wiki/List_of_HTTP_status_codes`](https://en.wikipedia.org/wiki/List_of_HTTP_status_codes).\n\
    \n## Versioning\n\nNever release an API without a version.\n\n- Make the version\
    \ mandatory.\n- Specify the version with a \"`v`\" prefix. Move it all the way\
    \ to the left in the URL so that it has the highest scope (e.g., `/v1/dogs`).\n\
    - Use a simple ordinal number. Don’t use the dot notation like `v1.2`, because\
    \ it implies a granularity of versioning that doesn’t work well with APIs—it’s\
    \ an interface, not an implementation. Stick with `v1`, `v2`, and so on.\n- How\
    \ many versions should you maintain? Maintain at least one version back.\n- For\
    \ how long should you maintain a version? Give developers at least one cycle to\
    \ react before obsoleting a version.\n- There is a strong school of thought about\
    \ putting format (XML or JSON) and version in the header. Simple rules we follow:\
    \ If it changes the logic you write to handle the response, put it in the URL\
    \ so you can see it easily. If it doesn’t change the logic for each response (like\
    \ OAuth information), put it in the header.\n\n## Partial Response\n\nPartial\
    \ response allows you to give developers just the information they need. Take,\
    \ for example, a request for a tweet on the Twitter API. You’ll get much more\
    \ than a typical Twitter app often needs, including the name of the person, the\
    \ text of the tweet, a timestamp, how often the message was retweeted, and a lot\
    \ of metadata. Let’s look at how several leading APIs handle giving developers\
    \ just what they need in responses, including Google, who pioneered the idea of\
    \ partial response:\n\n- **LinkedIn**\n\n```\n/people:(id,first-name,last-name,industry)\n\
    ```\n\nThis request on a person returns the ID, first name, last name, and the\
    \ industry.\n\n- **Facebook**\n\n- **Google**\n\n```\n/joe.smith/friends?fields=id,name,picture\n\
    ```\n\n```\n?fields=title,media\n```\n\nGoogle and Facebook have a similar approach,\
    \ which works well. They each have an optional parameter called \"`fields`\" after\
    \ which you put the names of fields you want to be returned. As you can see in\
    \ this example, you can also put subobjects in responses to pull in other information\
    \ from additional resources.\n\n## Pagination\n\nMake it easy for developers to\
    \ paginate objects in a database. Let’s look at how Facebook, Twitter, and LinkedIn\
    \ handle pagination. Facebook uses `offset` and `limit`. Twitter uses `page` and\
    \ `rpp` (records per page). LinkedIn uses `start` and `count` semantically. Facebook\
    \ and LinkedIn do the same thing, that is, the LinkedIn `start` and `count`.\n\
    \nTo get records 50 through 75 from each system, you would use the following:\n\
    \n- **Facebook**: `offset` 50 and `limit` 25\n- **Twitter**: `page` 3 and `rpp`\
    \ 25 (records per page)\n- **LinkedIn**: `start` 50 and `count` 25\n\n## Multiple\
    \ Formats\n\nWe recommend that you support more than one format—that you push\
    \ things out in one format and accept as many formats as necessary. You can usually\
    \ automate the mapping from format to format. Here’s what the syntax looks like\
    \ for a few key APIs:\n\n- **Google Data**: `?alt=json`\n- **Foursquare**: `/venue.json`\n\
    - **LinkedIn**: `Accept: application/json`\n\n## API Façade\n\nUse the façade\
    \ pattern when you want to provide a simple interface to a complex subsystem.\
    \ Subsystems often get more complex as they evolve.\n\nImplementing an API façade\
    \ pattern involves three basic steps:\n\n1. Design the ideal API—design the URLs,\
    \ request parameters and responses, headers, query parameters, and so on. The\
    \ API design should be self-consistent. This means you give the developers the\
    \ information they need.\n2. Implement the design with data stubs. This allows\
    \ application developers to use your API and give you feedback even before your\
    \ API is connected to internal systems.\n3. Mediate or integrate between the façade\
    \ and the systems.\n\n## API Solution Architecture\n\nDevelopers and architects\
    \ often think of APIs as a continuation of the integration-based architectures\
    \ that have long been in use within enterprise IT. But this is a narrow view.\
    \ To understand the demands and requirements on APIs, let’s discuss typical solutions\
    \ that are enabled by APIs.\n\nFigure [4-5](#427457_3_En_4_Chapter.xhtml#Fig5)\
    \ shows the API solution architecture.\n\n![](images/427457_3_En_4_Chapter/427457_3_En_4_Fig5_HTML.jpg)\n\
    \nDiagram illustrating an API as a central hub connecting various solutions: Cloud\
    \ Solution, Mobile Solution, Integration Solution, Smart TV Solution, Internet\
    \ of Things, Web Application, and Multi Channel Solution. These are linked to\
    \ Company Backends, highlighting the API's role in integrating diverse technologies.\n\
    \n**Figure 4-5** API solution architecture\n\nAPI solutions typically consist\
    \ of two components:\n\n- **Exposes the API**\n  - An exposed API resides on the\
    \ server side, for example, in the cloud or on premise.\n- **Consumes the API**\n\
    \  - Web or mobile apps and embedded devices on IoT\n\n### Mobile Solutions\n\n\
    Mobile apps need to connect to the servers on the Internet to be usable at all\
    \ or at least to be usable to their full potential—some business logic on the\
    \ app and heavy-duty processing logic on servers in the cloud. Functionality hosted\
    \ on these servers can be reached by API calls. Data captured on mobile devices\
    \ is sent to servers by API calls, which hand the data to services and then to\
    \ databases. Data delivered by APIs needs to be lightweight. This ensures APIs\
    \ can be consumed by devices with limited processing power. Typically, the mobile\
    \ app provider provides the APIs for the mobile app.\n\n### Cloud Solutions\n\n\
    SaaS cloud solutions typically consist of a web application and APIs. The web\
    \ application is visible for the consumers. Under the hood, cloud solutions usually\
    \ offer an API as well, for example, Dropbox, Salesforce, Workday, and Oracle\
    \ Cloud.\n\n### Web Solutions\n\nWeb applications display dynamic web pages based\
    \ upon user requests; web pages are created on the fly with data available from\
    \ the back end. The web application pulls raw data from the APIs, processes the\
    \ data (JSON, XML), and displays in HTML, for example, podcast or customer API.\n\
    \n### Integration Solutions\n\nAPIs provide capabilities which are essential for\
    \ connecting, extending, and integrating software. By integrating software APIs,\
    \ businesses can connect with other businesses. The business of an enterprise\
    \ can be expanded by linking the business to a partner. Integration not only makes\
    \ sense externally but also internally for integrating internal systems.\n\n###\
    \ Multichannel Solutions\n\nToday, an ecommerce system offers customers shopping\
    \ on multiple platforms—mobile, web, and tablet. It is required to provide a seamless\
    \ experience when a consumer moves from one platform to another. This can be accomplished\
    \ by providing a common API, which supports a multichannel maintaining state of\
    \ user experience."
  raw: "```\n    {\"status\" : \"401\", \"message\":\"Authenticate\",\"code\": 20003,\
    \ \"more info\": \"http://www.twilio.com/docs/errors/20003\"}\n    ```\n\n*  \
    \ Another example of error messaging from SimpleGeo\n\nHTTP Status Code: 401\n\
    \n```\n{\"code\" : 401, \"message\": \"Authentication Required\"}\n```\n\nWhen\
    \ you boil it down, there are really only three outcomes in the\ninteraction between\
    \ an app and an API:\n\n*   **Everything worked**: Success\n\n*   **The application\
    \ did something wrong**: Client\n    error\n\n*   **The API did something wrong**:\
    \ Server\n    error\n\nError Code\n\nStart by using the following three codes\
    \ which should map\nto the three outcomes earlier. If you need more, add them.\
    \ But you\nshouldn’t need to go beyond:\n\n*   **200**: OK\n\n*   **400**: Bad\
    \ request\n\n*   **500**: Internal server error\n\nIf you’re not comfortable reducing\
    \ all your error conditions to these\nthree, try picking among these additional\
    \ five:\n\n*   **201**: Created\n\n*   **304**: Not modified\n\n*   **404**: Not\
    \ found\n\n*   **401**: Unauthorized\n\n*   **403**: Forbidden\n\nCheck out this\
    \ good Wikipedia entry for all HTTP status codes: [`https://en.wikipedia.org/wiki/List_of_HTTP_status_codes`](https://en.wikipedia.org/wiki/List_of_HTTP_status_codes).\n\
    \nVersioning\n\nNever release an API without a version.\n\n*   Make the version\
    \ mandatory.\n\n*   Specify the version with a “`v`” prefix. Move it\n    all\
    \ the way to the left in the URL so that it has the highest scope\n    (e.g.,\
    \ `/v1/dogs`).\n\n*   Use a simple ordinal number. Don’t use the dot notation\
    \ like\n    v1.2, because it implies a granularity of versioning that doesn’t\
    \ work\n    well with APIs—it’s an interface, not an implementation. Stick with\n\
    \    `v1`, `v2`, and so\n    on.\n\n*   How many versions should you maintain?\
    \ Maintain at least one\n    version back.\n\n*   For how long should you maintain\
    \ a version? Give developers at\n    least one cycle to react before obsoleting\
    \ a version.\n\n*   There is a strong school of thought about putting format (XML\
    \ or\n    JSON) and version in the header. Simple rules we follow: If it changes\n\
    \    the logic you write to handle the response, put it in the URL so you can\n\
    \    see it easily. If it doesn’t change the logic for each response (like\n \
    \   OAuth information), put it in the header.\n\nPartial Response\n\nPartial response\n\
    allows you to give developers just the information they need. Take, for\nexample,\
    \ a request for a tweet on the Twitter API. You’ll get much more\nthan a typical\
    \ Twitter app often needs, including the name of the\nperson, the text of the\
    \ tweet, a timestamp, how often the message was\nretweeted, and a lot of metadata.\
    \ Let’s look at how several leading APIs\nhandle giving developers just what they\
    \ need in responses, including\nGoogle, who pioneered the idea of partial response:\n\
    \n*   LinkedIn\n\n```\n    /people:(id,first-name,last-name,industry)This request\
    \ on a person returns the ID, first name, last name, and the industry\n    ```\n\
    \n*   Facebook\n\n*   Google\n\n```\n/joe.smith/friends?fields=id,name,picture\n\
    ```\n\n```\n?fields=title,media\n```\n\nGoogle and Facebook have a similar approach,\
    \ which works well. They\neach have an optional parameter called “fields” after\
    \ which you put the\nnames of fields you want to be returned. As you can see in\
    \ this example,\nyou can also put subobjects in responses to pull in other information\n\
    from additional resources.\n\nPagination\nMake it easy for developers to paginate\
    \ objects in a\ndatabase. Let’s look at how Facebook, Twitter, and LinkedIn handle\n\
    pagination. Facebook uses offset and limit. Twitter uses page and rpp\n(records\
    \ per page). LinkedIn uses start and count semantically. Facebook\nand LinkedIn\
    \ do the same thing, that is, the LinkedIn start and\ncount.\n\nTo get records\
    \ 50 through 75 from each system, you would use the\nfollowing:\n\n*   **Facebook**:\
    \ `offset` 50 and `limit` 2\n\n*   **Twitter**: `page` 3 and `rpp` 25 (records\
    \ per\n    page)\n\n*   **LinkedIn**: `start` 50 and `count` 25\n\nMultiple Formats\n\
    \nWe recommend that you support more than one format—that you push things\nout\
    \ in one format and accept as many formats as necessary.\nYou can usually automate\
    \ the mapping from format to format. Here’s what\nthe syntax looks like for a\
    \ few key APIs:\n\n*   **Google Data**: `?alt=json`\n\n*   **Foursquare**: `/venue.json`\n\
    \n*   **LinkedIn**: `Accept: application/json`\n\nAPI Façade\nUse the façade\n\
    pattern when you want to provide a simple interface to a complex\nsubsystem. Subsystems\
    \ often get more complex as they evolve.\n\nImplementing an API façade pattern\
    \ involves three basic steps:\n\n1.  Design the ideal API—design the URLs, request\
    \ parameters and\n    responses, headers, query parameters, and so on. The API\
    \ design should\n    be self-consistent. This means you give the developers the\
    \ information\n    they need.\n\n2.  Implement the design with data stubs. This\
    \ allows application\n    developers to use your API and give you feedback even\
    \ before your API is\n    connected to internal systems.\n\n3.  Mediate or integrate\
    \ between the façade and the systems.\n\nAPI Solution Architecture\nDevelopers\
    \ and\narchitects often think of APIs as a continuation of the\nintegration-based\
    \ architectures that have long been in use within\nenterprise IT. But this is\
    \ a narrow view.\nTo understand the demands and requirements on APIs, let’s discuss\n\
    typical solutions that are enabled by APIs.\n\nFigure [4-5](#427457_3_En_4_Chapter.xhtml#Fig5)\
    \ shows the API\nsolution\narchitecture.\n\n![](images/427457_3_En_4_Chapter/427457_3_En_4_Fig5_HTML.jpg)\n\
    \nDiagram illustrating an API as a central hub connecting various\nsolutions:\
    \ Cloud Solution, Mobile Solution, Integration Solution, Smart\nTV Solution, Internet\
    \ of Things, Web Application, and Multi Channel\nSolution. These are linked to\
    \ Company Backends, highlighting the API's\nrole in integrating diverse technologies.\n\
    \nFigure 4-5\nAPI solution\narchitecture\n\nAPI solutions typically consist of\
    \ two components:\n\n*   Exposes the API\n\n*   An exposed API resides on the\
    \ server side, for example, in the\n        cloud or on premise.\n\n*   Consumes\
    \ the API\n\n*   Web or mobile apps and embedded devices on IoT\n\nMobile Solutions\n\
    Mobile\napps need\nto connect to the servers on the Internet to be usable at all\
    \ or at\nleast to be usable to their full potential—some business logic on the\n\
    app and heavy-duty processing logic on servers in the cloud.\nFunctionality hosted\
    \ on these servers can be reached by API calls. Data\ncaptured on mobile devices\
    \ is sent to servers by API calls, which hand\nthe data to services and then to\
    \ databases. Data delivered by APIs needs\nto be lightweight. This ensures APIs\
    \ can be consumed by\ndevices with limited processing power. Typically, the mobile\
    \ app\nprovider provides the APIs for the mobile app.\n\nCloud Solutions\nSaaS\
    \ cloud\nsolutions typically consist of a web application and APIs. The\nweb application\
    \ is\nvisible for the consumers. Under the hood, cloud solutions usually offer\n\
    an API as well, for example, Dropbox, Salesforce, Workday, and Oracle\nCloud.\n\
    \nWeb Solutions\nWeb\napplications display dynamic web\npages based upon user\
    \ requests; web pages are created on the fly with\ndata available from the back\
    \ end. The web application pulls raw data\nfrom the APIs, processes the data (JSON,\
    \ XML), and displays in HTML, for\nexample, podcast or customer API.\n\nIntegration\
    \ Solutions\nAPIs provide capabilities which are essential for connecting,\nextending,\
    \ and integrating software. By\nintegrating software APIs, businesses can connect\
    \ with other businesses.\nThe business of an enterprise can be expanded by linking\
    \ the business to\na partner. Integration not only makes sense externally but\
    \ also\ninternally for integrating internal systems.\n\nMultichannel Solutions\n\
    Today, an ecommerce system offers customers shopping on multiple\nplatforms—mobile,\
    \ web, and tablet. It is required to provide a seamless\nexperience when a consumer\
    \ moves from one platform to another. This can\nbe accomplished by providing a\
    \ common API, which supports a multichannel maintaining\nstate of user experience."
  trans: "\n```\n    {\"status\" : \"401\", \"message\":\"Authenticate\",\"code\"\
    : 20003, \"more info\": \"http://www.twilio.com/docs/errors/20003\"}\n    ```\n\
    \n*   SimpleGeo 提供的另一个错误消息示例\n\nHTTP 状态码：401\n\n```\n{\"code\" : 401, \"message\"\
    : \"Authentication Required\"}\n```\n\n归根结底，应用与 API 之间的交互实际上只有三种结果：\n\n*   **一切正常**：成功\n\
    \n*   **应用操作有误**：客户端错误\n\n*   **API 操作有误**：服务器错误\n\n错误码\n\n首先使用以下三个与上述三种结果对应的状态码。如果需要更多，可以添加，但通常不需要超出以下范围：\n\
    \n*   **200**：OK（成功）\n\n*   **400**：Bad request（错误请求）\n\n*   **500**：Internal\
    \ server error（服务器内部错误）\n\n如果你觉得将所有错误情况缩减为这三种不太合适，可以尝试从以下五个额外状态码中选择：\n\n*   **201**：Created（已创建）\n\
    \n*   **304**：Not modified（未修改）\n\n*   **404**：Not found（未找到）\n\n*   **401**：Unauthorized（未授权）\n\
    \n*   **403**：Forbidden（禁止访问）\n\n查看维基百科上关于所有 HTTP 状态码的优质条目：[`https://en.wikipedia.org/wiki/List_of_HTTP_status_codes`](https://en.wikipedia.org/wiki/List_of_HTTP_status_codes)。\n\
    \n版本管理\n\n切勿发布不带版本的 API。\n\n*   强制要求版本号。\n\n*   使用“`v`”前缀指定版本。将其放在 URL 的最左侧，使其具有最高作用域（例如，`/v1/dogs`）。\n\
    \n*   使用简单的序数。不要使用像 v1.2 这样的点分表示法，因为它暗示了 API 无法良好支持的版本粒度——API 是接口，而非实现。坚持使用 `v1`、`v2`\
    \ 等。\n\n*   应该维护多少个版本？至少维护一个旧版本。\n\n*   一个版本应该维护多久？在废弃一个版本之前，至少给开发者一个周期来做出反应。\n\
    \n*   有一种主流观点认为应将格式（XML 或 JSON）和版本放在请求头中。我们遵循的简单规则是：如果它改变了你处理响应的逻辑，就将其放在 URL 中以便于查看；如果它不改变每个响应的逻辑（如\
    \ OAuth 信息），则将其放在请求头中。\n\n部分响应\n\n部分响应允许你只向开发者提供他们所需的信息。例如，向 Twitter API 请求一条推文。你得到的数据通常比一个典型的\
    \ Twitter 应用所需的要多得多，包括用户名、推文文本、时间戳、转发次数以及大量元数据。让我们看看几个主流 API 如何仅向开发者提供他们所需的响应信息，包括率先提出部分响应概念的\
    \ Google：\n\n*   LinkedIn\n\n```\n    /people:(id,first-name,last-name,industry)此请求针对一个人返回其\
    \ ID、名字、姓氏和行业\n    ```\n\n*   Facebook\n\n*   Google\n\n```\n/joe.smith/friends?fields=id,name,picture\n\
    ```\n\n```\n?fields=title,media\n```\n\nGoogle 和 Facebook 采用了类似的方法，效果很好。它们都有一个名为“fields”的可选参数，后面跟上你想要返回的字段名称。如本例所示，你还可以在响应中包含子对象，以从其他资源中获取更多信息。\n\
    \n分页\n\n让开发者能够轻松地对数据库中的对象进行分页。让我们看看 Facebook、Twitter 和 LinkedIn 如何处理分页。Facebook\
    \ 使用 offset 和 limit。Twitter 使用 page 和 rpp（每页记录数）。LinkedIn 在语义上使用 start 和 count。Facebook\
    \ 和 LinkedIn 的做法本质相同，即 LinkedIn 的 start 和 count。\n\n要从每个系统中获取第 50 到第 75 条记录，你可以使用以下参数：\n\
    \n*   **Facebook**：`offset` 为 50，`limit` 为 25\n\n*   **Twitter**：`page` 为 3，`rpp`\
    \ 为 25（每页记录数）\n\n*   **LinkedIn**：`start` 为 50，`count` 为 25\n\n多种格式\n\n我们建议你支持多种格式——以一种格式输出，并尽可能多地接受其他格式。你通常可以自动完成格式之间的映射。以下是几个关键\
    \ API 的语法示例：\n\n*   **Google Data**：`?alt=json`\n\n*   **Foursquare**：`/venue.json`\n\
    \n*   **LinkedIn**：`Accept: application/json`\n\nAPI 外观模式\n\n当你希望为复杂的子系统提供简单接口时，可以使用外观模式。子系统在演进过程中通常会变得越来越复杂。\n\
    \n实现 API 外观模式包含三个基本步骤：\n\n1.  设计理想的 API——设计 URL、请求参数和响应、请求头、查询参数等。API 设计应保持自洽。这意味着你要向开发者提供他们所需的信息。\n\
    \n2.  使用数据桩实现该设计。这允许应用开发者在你的 API 连接到内部系统之前就能使用它并提供反馈。\n\n3.  在外观与系统之间进行中介或集成。\n\
    \nAPI 解决方案架构\n\n开发者和架构师通常将 API 视为企业 IT 中长期使用的基于集成架构的延续。但这种观点是狭隘的。为了理解 API 的需求和要求，让我们讨论一下由\
    \ API 实现的典型解决方案。\n\n图 4-5 展示了 API 解决方案架构。\n\n![](img/427457_3_En_4_Fig5_HTML.jpg)\n\
    \n图示：API 作为连接各种解决方案的中心枢纽：云解决方案、移动解决方案、集成解决方案、智能电视解决方案、物联网、Web 应用和多渠道解决方案。这些解决方案连接到公司后端，突显了\
    \ API 在集成不同技术中的作用。\n\n图 4-5\nAPI 解决方案架构\n\nAPI 解决方案通常包含两个组成部分：\n\n*   暴露 API\n\
    \n*   暴露的 API 位于服务器端，例如云端或本地。\n\n*   消费 API\n\n*   Web 或移动应用以及物联网上的嵌入式设备。\n\n\
    移动解决方案\n\n移动应用需要连接到互联网上的服务器才能使用，或者至少才能充分发挥其潜力——应用上运行部分业务逻辑，云端服务器上运行繁重的处理逻辑。这些服务器上托管的功能可以通过\
    \ API 调用来访问。移动设备上捕获的数据通过 API 调用发送到服务器，API 再将数据交给服务，最后存入数据库。API 提供的数据需要轻量化。这确保了处理能力有限的设备也能消费\
    \ API。通常，移动应用提供商为其移动应用提供 API。\n\n云解决方案\n\nSaaS 云解决方案通常包含一个 Web 应用和 API。Web 应用对消费者可见。在底层，云解决方案通常也提供\
    \ API，例如 Dropbox、Salesforce、Workday 和 Oracle Cloud。\n\nWeb 解决方案\n\nWeb 应用根据用户请求显示动态网页；网页是使用后端提供的数据实时创建的。Web\
    \ 应用从 API 中提取原始数据，处理数据（JSON、XML），并以 HTML 格式显示，例如播客或客户 API。\n\n集成解决方案\n\nAPI 提供了连接、扩展和集成软件所必需的功能。通过集成软件\
    \ API，企业可以与其他企业建立连接。企业可以通过与合作伙伴建立联系来扩展业务。集成不仅在外部有意义，在内部集成系统也同样重要。\n\n多渠道解决方案\n\
    \n如今，电子商务系统为客户提供在多个平台（移动端、Web 端、平板端）上购物的体验。当消费者从一个平台切换到另一个平台时，需要提供无缝的体验。这可以通过提供一个支持多渠道并维护用户体验状态的通用\
    \ API 来实现。\n"
- fmt: "# Smart TV Solutions\n\nSmart TV offers not only TV channels, but provides\
    \ interaction capabilities. These are all implemented by API calls to the servers.\n\
    \n# Internet of Things\n\nThe Internet of Things is made up of physical devices\
    \ with an Internet connection. The device connects to smart functions (e.g., sensors,\
    \ scanners, etc.) which are exposed on the Internet via APIs.\n\n# Stakeholders\
    \ in API Solutions\n\nIn API solutions, stakeholders are API providers, API consumers,\
    \ and end users. We will discuss the roles of each here in this section.\n\n##\
    \ API Providers\n\nAPI providers develop, design, deploy, and manage APIs. API\
    \ providers define the API portfolio, road map, and product mode. It is the responsibility\
    \ of an API provider to decide which functionality is exposed by the API. In the\
    \ solution-driven approach, only those APIs are built which are required by the\
    \ consumer. In the top-down approach, API providers provide APIs which are good\
    \ from an internal perspective, for example, from a reusability perspective.\n\
    \n## API Consumers\n\nConsumers need to know how to call an API and build an API\
    \ client. API providers should provide a demo app to consume their API for the\
    \ consumers.\n\n## End Users\n\nEnd users do not call the API directly, but use\
    \ the app developed by API consumers.\n\n# API Modeling\n\n## OpenAPI (Swagger)\n\
    \nA screenshot of MICRONAUT LAUNCH page. It has four headers: application type,\
    \ Java version, name, and base package. This tutorial walks you through the steps\
    \ for creating OpenAPI specs using Swagger (Micronaut for a flight passenger API):\n\
    \n- Change directory into project.\n- Create a model folder.\n- Create a controllers\
    \ folder.\n- Create a service folder.\n- Create a `Flight` class in the model\
    \ folder using editor of your choice. Paste the following definition of the attributes\
    \ of the `Flight` class and then select pasted code and generate getter and setter\
    \ methods.\n\n- Create a `Passenger` class in the model folder. Paste the passenger\
    \ attributes’ code and then generate getter and setter methods:\n\n```java\npackage\
    \ com.rest.domain;\nimport io.swagger.v3.oas.annotations.media.Schema;\n@Schema(description=\"\
    Passenger\")\npublic class Passenger {\nprivate String id;\nprivate String name;\n\
    public String getId() {\nreturn id;\n}\npublic void setId(String id) {\nthis.id\
    \ = id;\n}\npublic String getName() {\nreturn name;\n}\npublic void setName(String\
    \ name) {\nthis.name = name;\n}\n}\n```\n\n- Create a `FlightService` class in\
    \ the service folder and paste the following code. In this code, we are creating\
    \ `flightRepo` for storing flights in memory. Get methods will be implemented\
    \ to fetch details of a flight and list of all flights.\n\n```java\npackage com.rest.service;\n\
    import com.rest.domain.Flight;\nimport java.util.Map;\nimport java.util.List;\n\
    import java.util.ArrayList;\nimport java.util.HashMap;\nimport java.util.concurrent.atomic.AtomicInteger;\n\
    public class FlightService {\nstatic private Map flightRepo = new HashMap();\n\
    static private AtomicInteger idCounter = new AtomicInteger();\npublic Flight getFlight(String\
    \ id) {\nFlight flight = flightRepo.get(id);\nreturn flight;\n}\npublic  List\
    \ getFlightsByPassenger(String passengerId) {\nreturn new ArrayList(flightRepo.values());\n\
    }\n}\n```\n\n- Create a `PassengerService` class in the service and paste the\
    \ following code:\n\n```java\npackage com.rest.service;\nimport com.rest.domain.Passenger;\n\
    import java.util.Map;\nimport java.util.List;\nimport java.util.ArrayList;\nimport\
    \ java.util.HashMap;\nimport java.util.concurrent.atomic.AtomicInteger;\npublic\
    \ class PassengerService {\nstatic private Map passengerRepo = new HashMap();\n\
