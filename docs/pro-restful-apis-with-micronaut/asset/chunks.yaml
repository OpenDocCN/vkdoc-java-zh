- fmt: "# What Is XML?\n\n**E**xtensible **M**arkup **L**anguage (XML) is a text-based\
    \ markup language which is a standard for data interchange on the Web. As with\
    \ HTML, you identify data using [tag](https://www2.informatik.hu-berlin.de/~xing/Lib/Docs/jaxp/docs/tutorial/glossary.html%25252525252525252525252525252525252525252525252525252523tag)s\
    \ (identifiers enclosed in angle brackets, like this: `<...>`). Collectively,\
    \ the tags are known as “markup.” It puts a label on a piece of data that identifies\
    \ it (e.g., `<message>...</message>`). In the same way that you define the field\
    \ names for a data structure, you are free to use any XML tags that make sense\
    \ for a given application. Naturally, though, for multiple applications to use\
    \ the same XML data, they have to agree on the tag names they intend to use.\n\
    \nHere is an example of some XML data you might use for a messaging application:\n\
    \n```\nyou@yourAddress.com\nme@myAddress.com\nXML Is Really Cool>\n\nHow many\
    \ ways is XML cool? Let me count the ways...\n\n```\n\nTags can also contain [attributes](https://www2.informatik.hu-berlin.de/~xing/Lib/Docs/jaxp/docs/tutorial/glossary.html%25252525252525252525252525252525252525252525252525252523attribute)\
    \ (additional information included as part of the tag itself) within the tag’s\
    \ angle brackets. If you consider the information in question to be part of the\
    \ essential material that is being expressed or communicated in the XML, put it\
    \ in an element. For human-readable documents, this generally means the core content\
    \ that is being communicated to the reader. For machine-oriented record formats,\
    \ this generally means the data that comes directly from the problem domain. If\
    \ you consider the information to be peripheral or incidental to the main communication,\
    \ or purely intended to help applications process the main communication, use\
    \ attributes. The following example shows an email message structure that uses\
    \ attributes for the `to`, `from`, and `subject` fields:\n\n```\n\nHow many ways\
    \ is XML cool? Let me count the ways...\n\n```\n\nOne really big difference between\
    \ XML and HTML is that an XML document is always constrained to be [well formed](https://www2.informatik.hu-berlin.de/~xing/Lib/Docs/jaxp/docs/tutorial/overview/4_design.html).\
    \ There are several rules that determine when a document is well formed, but one\
    \ of the most important is that every tag has a closing tag. So, in XML, the `</to>`\
    \ tag is not optional. The `<to>` element is never terminated by any tag other\
    \ than `</to>`.\n\n**Note**\n\nAnother important aspect of a well-formed document\
    \ is that all tags are completely nested. So you can have `<message>..<to>..</to>..</message>`,\
    \ but never `<message>..<to>..</message>..</to>`.\n\nAn XML Schema is a language\
    \ for expressing constraints about XML documents. There are several different\
    \ schema languages in widespread use, but the main ones are Document Type Definitions\
    \ (DTDs). It defines the legal building blocks of an XML document. It also defines\
    \ the document structure with a list of legal elements and attributes.\n\n## XML\
    \ Comments\n\nXML comments look just like HTML comments:\n\n```\n\nHow many ways\
    \ is XML cool? Let me count the ways...\n\n```\n\nTo complete this introduction\
    \ to XML, note that an XML file always starts with a [prolog](https://www2.informatik.hu-berlin.de/~xing/Lib/Docs/jaxp/docs/tutorial/glossary.html%25252525252525252525252525252525252525252525252525252523prolog).\
    \ The minimal prolog contains a [declaration](https://www2.informatik.hu-berlin.de/~xing/Lib/Docs/jaxp/docs/tutorial/glossary.html%25252525252525252525252525252525252525252525252525252523declaration)\
    \ that identifies the document as an XML document, like this:\n\n```\n\nThe declaration\
    \ may also contain additional information, like this:\n\n- **Version**: Identifies\
    \ the version of the XML markup language used in the data. This attribute is not\
    \ optional.\n- **Encoding**: Identifies the character set used to encode the data.\
    \ “ISO-8859-1” is “Latin-1,” the Western European and English language character\
    \ set. (The default is compressed Unicode: UTF-8.)\n- **Standalone**: Tells whether\
    \ or not this document references an external entity or an external data type\
    \ specification. If there are no external references, then “yes” is appropriate.\n\
    \n```\n\n## Why Is XML Important?\n\nIt is important because it allows the flexible\
    \ development of user-defined document types, which means that it provides a persistent,\
    \ robust, nonproprietary, and verifiable file format which can be used for the\
    \ storage and transmission of data for both on and off the Web. In addition, XML:\n\
    \n- **Provides plain text**: Plain text makes it readable.\n- **Provides data\
    \ identification**: By use of tags, data can be identified.\n- **Provides styleability**:\
    \ Using XSLT (Extensible Stylesheet Language Transformations), data can be made\
    \ in a presentable form.\n- Is easily processed (XML parsers, as well as well-formed\
    \ parsers).\n- Is hierarchical (through nested tags).\n\n## How Can You Use XML?\n\
    \nThere are several basic ways to make use of XML:\n\n- **Document-driven programming**:\
    \ Where XML documents are containers that build interfaces and applications from\
    \ existing components\n- **Archiving**: The foundation for document-driven programming,\
    \ where the customized version of a component is saved (archived) so it can be\
    \ used later\n- **Binding**: Where the DTD or schema that defines an XML data\
    \ structure is used to automatically generate a significant portion of the application\
    \ that will eventually process that data\n\n## Pros and Cons of XML\n\nSome of\
    \ the pros and cons of XML are explained as follows:\n\n- **Pros**\n  - Readable\
    \ and editable by developers.\n  - Error checking by means of schema and DTDs.\n\
    \  - Can represent complex hierarchies of data.\n  - Unicode gives flexibility\
    \ for international operation.\n  - Plenty of tools in all computer languages\
    \ for both creation and parsing.\n- **Cons**\n  - Bulky text with low payload/formatting\
    \ ratio (but can be compressed).\n  - Both creation and client-side parsing are\
    \ CPU intensive.\n  - Common word processing characters are illegal (MS Word “smart”\
    \ punctuation, for example).\n  - Images and other binary data require extra encoding.\n\
    \n## What Is JSON?\n\nJSON or JavaScript Object Notation is a lightweight text-based\
    \ open standard designed for human-readable data interchange. Conventions used\
    \ by JSON are known to programmers, which include those with knowledge of C, C++,\
    \ Java, Python, Perl, etc.\n\n- The format was specified by Douglas Crockford.\n\
    - It was designed for human-readable data interchange.\n- It has been extended\
    \ from the JavaScript scripting language.\n- The filename extension is `.json`.\n\
    - The JSON Internet media type is `application/json`.\n- JSON is easy to read\
    \ and write.\n- JSON is language independent.\n\n## JSON Syntax\n\nIn this section,\
    \ we will discuss what JSON’s basic data types are and their syntax. Figure [3-1](#427457_3_En_3_Chapter.xhtml#Fig1)\
    \ shows the basic data types of JSON.\n\n![](images/427457_3_En_3_Chapter/427457_3_En_3_Fig1_HTML.jpg)"
