    ## Summary\n\nIn this chapter, we reviewed messaging using XML and JSON formats\
    \ and compared them. Then, we developed APIs to return XML and JSON responses\
    \ from a Micronaut app.\n\n# 4. API Design and Modeling\n\nThis chapter starts\
    \ with API design strategies and then goes into API creation process and modeling.\
    \ Best practices for REST API design are discussed, followed by API solution architecture.\
    \ In the exercises, a simple API is designed for podcast subscription and then\
    \ modeling using OpenAPI.\n\n## API Design Strategies\n\nAs the UI is to UX (user\
    \ experience), the API is to APX (Application Programming Experience). In APX,\
    \ it is important to answer the following questions:\n\n- What should be exposed?\n\
    - What is the best way to expose the data?\n- How should the API be adjusted and\
    \ improved?\n\nIn addition, let’s discuss why we should develop a nice Application\
    \ Programming Experience. A nice API will encourage the developers to use it and\
    \ share it with others, creating a virtuous cycle where each additional successful\
    \ implementation leads to more engagement and more contributions from developers\
    \ who add value to your service. I’ll start by saying that API design is hard.\
    \ Also, a nice API will help to grow an ecosystem of employees, customers, and\
    \ partners who can use and help to continue to evolve your API in ways that are\
    \ mutually beneficial.\n\nThere are four strategies for API design:\n\n![](images/427457_3_En_4_Chapter/427457_3_En_4_Fig1_HTML.jpg)\n\
    \nDiagram illustrating a backend system architecture. The top block is labeled\
    \ `\"Backend System\"`, connected below to three blocks: `\"API\"`, `\"Main Product\"\
    `, and two smaller blocks labeled `\"Mobile\"` and `\"Integration\"`. The layout\
    \ suggests a hierarchical structure, with the backend system supporting various\
    \ components.\n\n**Figure 4-1.** Bolt-on strategy.\n\n- **Bolt-on strategy**:\
    \ This is when you have an existing application and add an API after the fact.\
    \ This takes advantage of existing code and systems (Figure [4-1](#427457_3_En_4_Chapter.xhtml#Fig1)).\n\
    \n![](images/427457_3_En_4_Chapter/427457_3_En_4_Fig2_HTML.jpg)\n\nDiagram illustrating\
    \ a system architecture. The backend system connects to an API, which branches\
    \ out to three components: `Main Product`, `Mobile Device`, and `Integrations`.\n\
    \n**Figure 4-2.** Greenfield strategy.\n\n- **Greenfield strategy**: This is the\
    \ other extreme. This is a strategy behind `\"API first\"` or `\"mobile first\"\
    ` and is the easiest scenario to develop an API. Since you’re starting from scratch,\
    \ you can make use of technologies and concepts that may not have been available\
    \ before (Figure [4-2](#427457_3_En_4_Chapter.xhtml#Fig2)).\n\nA greenfield or\
    \ API-first strategy is a simulation-based design implementation. The simulation\
    \ of a back-end system is the development of a back-end system without needing\
    \ fully implemented back-end systems. With the simulation of APIs, consumers can\
    \ start the development of apps without fully developed APIs.\n\n- **Agile design\
    \ strategy**: Agility is based on the premise that you can start without a full\
    \ set of specs. You can always adapt and change the specs later, as you go and\
    \ learn more. Through multiple iterations, architectural design can converge to\
    \ the right solution. An agile approach should only be applied until the API is\
    \ published.\n\n- Finally, you have the **façade strategy**, which is the middle\
    \ ground between greenfield and bolt-on. In this case, you can take advantage\
    \ of existing business systems, yet shape them to what you prefer and need. This\
    \ gives them the ability to keep working systems in place while making the underlying\
    \ architecture better.\n\n## API Creation Process and Methodology\n\nIn this section,\
    \ we are going to review the API creation process and methodology. In order to\
    \ deliver great APIs, the design must be a first-order concern. Like optimizing\
    \ for UX (user experience) has become a primary concern in UI development, also\
    \ optimizing for APX (API user experience) should be a primary concern in API\
    \ development.\n\n### Process\n\nFirst, determine your business value. When thinking\
    \ about business value, think of the `\"elevator pitch\"` about why you need an\
    \ API. Developer engagement is not a great goal; you need a tangible goal: increase\
    \ user engagement, move activity off the main product to the API, engage and retain\
    \ partners, and so on.\n\nChoose your metrics, for example:\n\n- Number of developer\
    \ keys in use\n- Number of applications developed\n- Number of users interacting\
    \ via the API\n- Number of partner integrations\n- How the API is enhancing goals\
    \ of the company as a whole rather than simply determining how many people have\
    \ begun to integrate\n\n### API Methodology\n\nIt consists of five phases in the\
    \ case of the agile strategy:\n\n- Domain analysis or API description\n- Architecture\
    \ design\n- Prototyping\n- Building an API for production\n- Publishing the API\n\
    \n#### Domain Analysis or API Description\n\nDefine your use cases for domain\
    \ analysis. Who are the participants? Are they external or internal? Which API\
    \ solutions do consumers want to build with the API? Which other API solutions\
    \ would be possible with the API? What would the API that the consumer wants to\
    \ use look like? What apps does the consumer want to build? What data or domain\
    \ objects does the consumer want to use in their app?\n\nBreak activities into\
    \ steps or write down the usage scenario:\n\n- A dependent resource cannot exist\
    \ without another.\n  - For example, the association of a podcast and its consumer\
    \ cannot be determined unless the podcast and its consumer are created.\n- An\
    \ independent resource can exist without another.\n  - For example, a podcast\
    \ resource can exist without any dependency.\n- An associative resource exists\
    \ independently but still has some kind of relation, that is, it may be connected\
    \ by reference.\n  - As mentioned earlier."
