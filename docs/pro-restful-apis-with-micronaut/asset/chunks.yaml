    \ for an API portfolio regarding\nconsistency, reuse, customization, discoverability,\
    \ and longevity.\n\nConsistency\nAn API solution, such as a mobile app, may use\
    \ several APIs from the\nportfolio, and the output of one API is the input of\
    \ another. So consistency is required\nabout data structures, representations,\
    \ URIs, error messages, and\nbehavior of the APIs. API consumers find it easier\
    \ to work with if it\nbehaves similar to the last one and delivers similar error\
    \ messages.\n\nReuse\n\nA consistent portfolio consists of many commonalities\
    \ among the APIs.\nThese commonalities can be factored out, shared, and reused.\
    \ Reuse leads to a speedup\nin the development. By reusing common elements, the\
    \ wheel is not\nreinvented each time an API is built. Instead, a common library\
    \ of\npatterns and know-how is shared and reused. Reuse can be realized in\nseveral\
    \ ways:\n\n*   Reuse of an API by several apps\n\n*   Reuse of an API by multiple\
    \ APIs\n\n*   Reuse of parts of an API\n\nAPIs should not be developed for a specific\
    \ consumer. APIs should\nalways be used by several consumers, solutions, or projects.\n\
    \nCustomization\nThere might be consumers who might have specific requirements\
    \ from\nthe APIs, if the consumers of APIs are not a homogenous group. In such\
    \ a\nscenario, customizations are\nrequired to the APIs to meet a consumer’s individual\
    \ needs. This\ncontradicts with reuse requirements, but both can be realized at\
    \ the\nsame time.\n\nDiscoverability\nTo expand the usage of APIs, it should be\
    \ easy for the API consumer\nto find and discover all APIs in an\nAPI portfolio.\
    \ An API portfolio design needs to ensure that APIs can be\nfound and all the\
    \ information necessary for proper usage is\navailable.\n\nLongevity\nThis means\
    \ that important aspects of the API do not change and stay\nstable for a long\
    \ time. What needs to be\nstable is the signature of the API, the client-facing\
    \ interface. A\nchange in signature will break the apps built by the API consumer.\
    \ For\nexample, with IoT on “h/w devices,” it is not easy to change.\n\nHow Do\
    \ We Enforce These\nRequirements—Governance?\nAn API initiative is often regarded\
    \ as an innovation lab of an\nenterprise. Imposing governance can contradict innovation.\
    \ So to manage\nthese conflicting requirements, an API portfolio may be split\
    \ in two\nportfolios. One portfolio is dedicated to innovation and experiment.\n\
    This portfolio requires lightweight governance processes.\nAnother portfolio is\
    \ dedicated to stable, productive APIs, which are\noffered to external API consumers.\n\
    \nConsistency\nEach enterprise may implement its own set of consistency rules.\
    \ When\nconsistency rules\nare defined, consistency checks can be realized as\
    \ manual or automated.\nLightweight consistency checks can be realized by manual\
    \ quality checks\nor review by a colleague. A complementary approach is by automated\
    \ code\ngeneration based\nupon API description.\n\nReuse\nThere are two types\
    \ of building blocks that are offered by an API\nPlatform like security, logging,\
    \ and error handler. Any other functional\ncommonality or reusable solution\n\
    pattern can be realized as a composition of building blocks. You could\nhave your\
    \ “own” API or third-party APIs. Third-party APIs could be\nintegrated in an API\
    \ Platform by creating an API Proxy on its “own”\nplatform. This helps the consumer\
    \ with homogenous security. API Proxy\nand API Platform architectures are discussed\
    \ in the next chapter.\n\nCustomization\nAn API consumer\nis interested in data\
    \ formatting and data delivery. Data gathering is,\nhowever, no concern to the\
    \ API consumer. So these could be separated\ninto two parts: one API we call “utility\
    \ API” covers the data gathering;\nthe other API, which delivers data and formats\
    \ to the consumer\nrequirements, is called “consumer API.” Utility APIs cannot\
    \ be called\ndirectly by a consumer; only consumer APIs can call these.\n\nDiscoverability\n\
    This could be manual or automated. Manual: Discover by API catalog\nor yellow\
    \ pages. Automated: SOAP based through UDDI and WSDL. REST:\nLimited with the\
    \ OPTIONS verb of HTTP.\n\nChange Management"
  trans: "\n[**@Context**](https://jakarta.ee/specifications/restful-ws/3.0/apidocs/jakarta/ws/rs/core/Context.html)\
    \ |\n 无等效项。将 Bean 注入参数 |\n `@Context` |\n\n可注入参数类型\n\n除了受支持的 JAX-RS 注解外，你还可以使用以下\
    \ JAX-RS 类型作为资源或客户端定义的参数类型：\n\n*   [jakarta.​ws.​rs.​core.​HttpHeaders](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/HttpHeaders.html)\n\
    \n*   [jakarta.​ws.​rs.​core.​CacheControl](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/CacheControl.html)\n\
    \n*   [jakarta.​ws.​rs.​core.​Cookie](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/Cookie.html)\n\
    \n*   [jakarta.​ws.​rs.​core.​EntityTag](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/EntityTag.html)\n\
    \n*   [jakarta.​ws.​rs.​core.​Link](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/Link.html)\n\
    \n*   [jakarta.​ws.​rs.​core.​MediaType](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/MediaType.html)\n\
    \n*   [jakarta.​ws.​rs.​core.​SecurityContext](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/SecurityContext.html)\n\
    \n你还可以使用 [@Context](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/Context.html)\
    \ 注解将任何 Bean 注入到资源类型的方法参数中。\n\nSecurityContext 与 Micronaut Security\n默认情况下，当注入\
    \ [SecurityContext](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/SecurityContext.html)\
    \ 时，注入的实例无法感知 [Micronaut Security](https://micronaut-projects.github.io/micronaut-security/latest/guide/)，并且像\
    \ `isUserInRole` 这样的方法始终返回 false。\n\n要将 JAX-RS 支持与 Micronaut Security 集成，请添加以下依赖项：\n\
    \n```\nio.micronaut.jaxrs\nmicronaut-jaxrs-server-security\n\n```\n\n添加上述依赖项后，如果在\
    \ Micronaut Security 的 [Authentication.​getRoles()](https://micronaut-projects.github.io/micronaut-security/latest/api/io/micronaut/security/authentication/Authentication.html#getRoles%252D%252D)\
    \ 方法中找到了该角色，则 `SecurityContext.isUserInRole` 方法将返回 true。更多信息请参阅[检索已认证用户](https://micronaut-projects.github.io/micronaut-security/latest/guide/#retrievingAuthenticatedUser)。\n\
    \n总结\n我们回顾了 JAX-RS，这是一个基于 POJO、注解驱动的框架，用于构建符合 RESTful 原则的 Web 服务，并介绍了其在 Micronaut\
    \ 中的实现。\n\n6. API 组合与框架\n\n本章首先介绍 API 组合架构，然后深入探讨 API 开发的框架。讨论了从客户端到数据的 API 框架概述，然后重点转向通过一个实现服务层的练习来审视服务层。\n\
    \nAPI 组合架构\n通常，一个组织不会只有一个 API，而是有多个 API。组合中的所有 API 需要彼此保持一致、可重用、可发现且可定制。\n\n需求\n\
    API 组合设计是不同 API 利益相关者关注的问题。设计良好的 API 组合对 API 消费者和生产者都有显著优势，双方都会就一致性、重用性、定制性、可发现性和长期稳定性提出对\
    \ API 组合的需求。\n\n一致性\n一个 API 解决方案（例如移动应用）可能会使用组合中的多个 API，并且一个 API 的输出是另一个 API 的输入。因此，在数据结构、表示形式、URI、错误消息和\
    \ API 行为方面需要保持一致性。如果 API 的行为与上一个类似，并传递类似的错误消息，API 消费者会更容易使用。\n\n重用性\n\n一个一致的组合包含\
    \ API 之间的许多共性。这些共性可以被提取、共享和重用。重用可以加快开发速度。通过重用公共元素，每次构建 API 时无需重新发明轮子。相反，可以共享和重用通用的模式和知识库。重用可以通过以下几种方式实现：\n\
    \n*   多个应用重用同一个 API\n*   多个 API 重用同一个 API\n*   重用 API 的某些部分\n\nAPI 不应为特定消费者开发。API\
    \ 应始终被多个消费者、解决方案或项目使用。\n\n定制性\n如果 API 的消费者不是一个同质群体，那么可能会有消费者对 API 有特定需求。在这种情况下，需要对\
    \ API 进行定制以满足消费者的个性化需求。这与重用需求相矛盾，但两者可以同时实现。\n\n可发现性\n为了扩大 API 的使用范围，API 消费者应该能够轻松地找到并发现\
    \ API 组合中的所有 API。API 组合设计需要确保 API 能够被找到，并且所有正确使用所需的信息都是可用的。\n\n长期稳定性\n这意味着 API\
    \ 的重要方面不会改变，并在很长一段时间内保持稳定。需要稳定的是 API 的签名，即面向客户端的接口。签名的更改将破坏 API 消费者构建的应用。例如，对于“硬件设备”上的物联网，更改并不容易。\n\
    \n我们如何强制执行这些需求——治理？\nAPI 计划通常被视为企业的创新实验室。施加治理可能会与创新相矛盾。因此，为了管理这些相互冲突的需求，API 组合可以拆分为两个组合。一个组合专门用于创新和实验。该组合需要轻量级的治理流程。另一个组合专门用于稳定、生产级的\
    \ API，这些 API 提供给外部 API 消费者。\n\n一致性\n每个企业都可以实现自己的一套一致性规则。定义一致性规则后，一致性检查可以手动或自动执行。轻量级的一致性检查可以通过手动质量检查或同事审查来实现。一种补充方法是基于\
    \ API 描述进行自动代码生成。\n\n重用性\nAPI 平台提供两种类型的构建块，例如安全、日志记录和错误处理程序。任何其他功能共性或可重用的解决方案模式都可以作为构建块的组合来实现。你可以拥有“自己的”API\
    \ 或第三方 API。第三方 API 可以通过在其“自己的”平台上创建 API 代理来集成到 API 平台中。这有助于消费者实现同质化的安全。API 代理和\
    \ API 平台架构将在下一章讨论。\n\n定制性\nAPI 消费者关心的是数据格式化和数据交付。然而，数据收集不是 API 消费者关心的问题。因此，这些可以分成两部分：一个我们称之为“工具\
    \ API”的 API 负责数据收集；另一个根据消费者需求交付数据和格式的 API 称为“消费者 API”。消费者不能直接调用工具 API；只有消费者 API\
    \ 才能调用它们。\n\n可发现性\n这可以是手动的或自动的。手动：通过 API 目录或黄页发现。自动：基于 SOAP 的通过 UDDI 和 WSDL 发现。REST：通过\
    \ HTTP 的 OPTIONS 动词实现有限的可发现性。\n\n变更管理\n"
- fmt: "# API Publishing and Compatibility\n\nFrom an innovation or business perspective,\
    \ there are forces to publish APIs as early as possible. From an IT governance\
    \ perspective, APIs are published as late as possible. In a compromise solution,\
    \ APIs are published early but only to pilot consumers, with the expectation that\
    \ there will be changes, and APIs will break the app. Changes are classified into\
    \ three groups: backward compatible, forward compatible, and not compatible.\n\
    \n`Backward compatibility` is given if the old client can interact with the new\
    \ API (adding query, header, or form parameter as long as they are optional; adding\
    \ new fields in JSON or XML as long as they are optional; adding endpoint, e.g.,\
    \ new REST resource; adding new operations to existing endpoints, e.g., in SOAP;\
    \ adding optional fields to request interface; changing mandatory fields to optional\
    \ fields in an existing API). `Forward compatibility` is given if a new client\
    \ can interact with an old API. It’s hard to achieve, and generally, it is nice\
    \ to have it.\n\n- **Incompatible changes**: If a change in the API breaks the\
    \ client, the change was incompatible.\n- **Removing**: Renaming fields in data\
    \ structures or parameters in a request or response.\n- **Changing URI**: For\
    \ example, hostname and port.\n- **Changing data structure**: Making a field the\
    \ child of some other. Adding a new mandatory field in a data structure.\n\n#\
    \ API Framework\n\nAs we have discussed, there are multiple solutions to an API,\
    \ for example, web applications, mobile applications, etc. Each of these solutions\
    \ talks to an API which is implemented through a multilayered architecture using\
    \ design patterns. A **design pattern** is a general reusable solution to a commonly\
    \ occurring problem within a given context in software **design**. A **design\
    \ pattern** is not a finished **design** that can be transformed directly into\
    \ source or machine code.\n\nThe multilayered framework is shown in Figure [6-1](#427457_3_En_6_Chapter.xhtml#Fig1).\n\
    \n![](images/427457_3_En_6_Chapter/427457_3_En_6_Fig1_HTML.jpg)\n\nDiagram illustrating\
    \ a layered API architecture. The top layer is \"Experience APIs,\" which adapt\
    \ process and system APIs for microservices tailored to apps. The middle layer\
    \ is \"Process APIs,\" composing system APIs through orchestration and choreography.\
    \ The bottom layer is \"System APIs,\" encapsulating core business capabilities.\
    \ On the left, a vertical arrow indicates increasing accessibility and ownership\
    \ from \"Central IT\" to \"App Dev.\" Icons represent various technologies, including\
    \ SaaS apps, mainframe, FTP files, databases, web services, legacy systems, and\
    \ applications.\n\n**Figure 6-1** API multilayered framework\n\nA framework depicts\
    \ the types of API and their components. App development has experienced API.\
    \ LoB dev and IT have process API. Central IT has system API. The accessibility\
    \ and ownership have SaaS apps, mainframe, FTP files, databases, web services,\
    \ legacy systems, and applications.\n\n- Process APIs implemented by a services\
    \ design pattern\n- System APIs implemented by a data access object design pattern\n\
    - Experience APIs implemented by an API façade layer design pattern\n\nEach layer\
    \ is implemented using software engineering design patterns.\n\n## Process APIs:\
    \ Services Layer\n\nThe services layer implements the business logic of the application:\
    \ the reusable logic, process-specific logic, and the logic that interfaces with\
    \ system APIs through orchestration and choreography. Orchestration (direct calls)\
    \ in this sense is about aligning the line of business dev/IT request with the\
    \ applications, data, and infrastructure. Choreography, in contrast, does not\
    \ rely on a central coordinator. Rather, each API involved in the choreography\
    \ knows exactly when to execute its operations and with whom to interact.\n\n\
    ## System APIs: Data Access Object\n\nThese system APIs or system-level services\
    \ are in line with the concept of an autonomous service which has been designed\
    \ with enough abstraction to hide the underlying systems of record, for example,\
    \ databases, legacy systems, and SaaS applications.\n\nTypically, a data access\
    \ object (DAO) is an [object](https://en.wikipedia.org/wiki/Object_(computer_science)%25252525252525252525252525252525252525252525252525252523Object%252525252525252525252525252525252525252525252525252525252520(computer%252525252525252525252525252525252525252525252525252525252520science))\
    \ that provides an abstract [interface](https://en.wikipedia.org/wiki/Interface_(computer_science)%25252525252525252525252525252525252525252525252525252523Interface%252525252525252525252525252525252525252525252525252525252520(computer%252525252525252525252525252525252525252525252525252525252520science))\
    \ to some type of [database](https://en.wikipedia.org/wiki/Database%25252525252525252525252525252525252525252525252525252523Database)\
    \ or other persistence mechanism. By mapping application calls to the persistence\
    \ layer, DAO provides some specific data operations without exposing details of\
    \ the system.\n\n## Experience APIs: API Façade\n\nBoth process and system APIs\
    \ should be tailored and exposed to suit the needs of each business channel and\
    \ digital touchpoint of solution architectures. The adaption is shaped by the\
    \ desired digital experience and is what we call the experience API. This is implemented\
    \ by API façade. The goal of an API façade pattern is to articulate internal systems\
    \ and make them useful for the app developer providing a good APX (API experience).\n\
    \n# Services Layer Implementation\n\nThe services layer implements the business\
    \ logic of the application: the reusable logic, process-specific logic, and logic\
    \ that interfaces with the legacy system. In the implementation of the services\
    \ layer, a design pattern dependency injection is used. The general concept between\
    \ dependency injections is called inversion of control. A class `A` has a dependency\
    \ to class `B` if class A uses class `B` as a variable. If dependency injection\
    \ is used, then the class `B` is given to class `A` via the constructor of the\
    \ class `A`. This is then called \"construction injection.\" If a setter is used,\
    \ this is then called \"setter injection.\"\n\nA class should not configure itself\
    \ but should be configured from outside. A design based on independent classes/components\
    \ increases the reusability. A software design based on dependency injection is\
    \ possible with standard Java. The Micronaut framework, which is used for the\
    \ implementation in the exercises, just simplifies the use of dependency injection\
    \ by providing a standard way of providing the configuration and by managing the\
    \ reference to the created objects. The fundamental functionality provided by\
    \ the Micronaut is dependency injection. Micronaut provides a lightweight container\
    \ for dependency injection (DI). This container lets you inject required objects\
    \ into other objects. This results in a design in which the Java classes are not\
    \ hard-coupled.\n\n# FRAMEWORK: SERVICES\n\nIn the previous chapter, we implemented\
    \ a flight passenger API for READ operations. This exercise uses a message domain\
    \ object to implement CRUD (create, read, update, and delete) operations. The\
    \ message domain object structure is pretty simple. There is an id, which identifies\
    \ a message, and several other fields that we can see in the following JSON representation:\n\
    \n```json\n{\n  \"id\": 1,\n  \"message\": \"Welcome\",\n  \"from\": \"James\"\
    ,\n  \"to\": \"John\",\n  \"creationDate\": 1388213547000\n}\n```\n\n## `Pom.xml`\n\
    \nAdd the following to `pom.xml`:\n\n```xml\n<dependency>\n    <groupId>javax.inject</groupId>\n\
    \    <artifactId>javax.inject</artifactId>\n</dependency>\n```\n\n## `Message`\n\
    \nHere is a POJO defining properties of the message:"
