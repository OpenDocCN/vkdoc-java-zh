  trans: '

    摘要

    本章从 API 设计策略入手，接着探讨了 API 的创建流程与建模。讨论了 REST API 设计的最佳实践，随后介绍了 API 解决方案架构。我们对比了多种
    API 建模工具，并使用 Micronaut 为航班乘客开发了一个 API。


    5. JAX-RS 简介


    本章介绍 JAX-RS 的基本概念及其在 Micronaut 中的实现。


    JAX-RS 概述


    Java API for RESTful Web Services（JAX-RS）是一个 Java 编程语言 API 规范，为按照 REST 架构模式创建
    Web 服务提供支持。JAX-RS 究竟是什么？JAX-RS 是一个基于 POJO、注解驱动的框架，用于构建符合 RESTful 原则的 Web 服务。想象一下，需要编写所有底层代码来解析
    HTTP 请求，并编写逻辑将这些请求连接到相应的 Java 类/方法。JAX-RS API 的精妙之处在于，它将开发者从这种复杂性中解放出来，使其能够专注于业务逻辑。这正是
    POJO 和注解发挥作用的地方！JAX-RS 提供了注解，用于将特定的 URI 模式和 HTTP 操作绑定到 Java 类的各个方法上。JAX-RS 是一组接口和
    Java 注解的集合，简化了服务端 REST 应用程序的开发。与其他类型的分布式系统相比，使用 JAX-RS 技术开发的 REST 应用程序更易于开发和消费。以下是
    JAX-RS 提供的主要特性：


    *   基于 POJO 的资源类

    *   以 HTTP 为中心的编程模型

    *   实体格式无关性

    *   容器无关性

    *   包含在 Java EE 中

    *   是用于构建和消费 RESTful Web 服务的标准化 API

    *   **Application**：指定哪些 Java 类处理哪些请求

    *   **Resources**：用于构建 RESTful 服务的基础 Java 代码和注解

    *   **Providers**：用于数据编组和解组（POJO Customer）的工具

    *   **Client API**：用于构建 RESTful 服务客户端的基础 Java 代码和注解

    *   **Filters and interceptors**：用于在请求-响应调用链中插入执行代码的工具

    *   **Validation**：为传入数据提供基于注解的验证。例如：


    @NotNull @FormParam ( “firstname” ) String firstname, @NotNull

    @FormParam ( “lastname” ) String lastname, @Email @FormParam ( “email” )

    String email)


    *   **Asynchronous processing**：为客户端和服务端处理长时间运行的请求提供异步请求支持（@Suspended）

    *   **@Context**：为客户端和提供者实现类提供访问运行时环境中有用对象的途径，例如，header


    输入与输出内容类型


    以下是 JAX-RS 支持的媒体类型。这些类型应在 REST 资源生成或消费内容的请求和响应注解中使用。


    *   **APPLICATION_JSON**：application/json

    *   **APPLICATION_XML**：application/xml（使用编码）

    *   **TEXT_HTML**：text/html

    *   **TEXT_PLAIN**：text/plain

    *   **TEXT_XML**：text/xml

    *   application 和 text 媒体类型的区别在于国际化。application 类型支持国际化编码。


    示例：@Produces(“application/json”), @Consumes(“text/xml”)


    JAX-RS 注入

    JAX-RS 的许多功能涉及从 HTTP 请求中提取信息并将其注入到 Java 方法中。你可能只对传入 URI 的某一部分感兴趣。你可能对 URI 查询字符串的值感兴趣。客户端可能正在发送你的服务处理请求所需的关键
    HTTP 头或 cookie 值。JAX-RS 允许你通过一组注入注解和 API 按需获取这些信息。


    JAX-RS 注解可以注入许多不同的内容。以下是规范提供的列表：

    '
- fmt: "*   你需要使用 JAX-RS 中的 `@Path` 注解来定义传入 HTTP 请求的 URI 匹配模式。你可以将其放在类或一个或多个方法上。如果你希望一个类接收\
    \ HTTP 请求，你必须至少使用 `@Path(\"/\")` 对其进行注解。这个被注解的类随后被称为 JAX-RS 根资源。\n*   要使用 `@Path`\
    \ 注解，你需要提供一个相对于 JAX-RS 应用程序上下文根的 URI 表达式。\n\n`@javax.ws.rs.Path`\n\n*   `@PathParam`\
    \ 允许你从 URI 模板参数中提取值。\n\n`@javax.ws.rs.PathParam`\n\n*   `@QueryParam` 允许你从 URI\
    \ 查询参数中提取值。\n\n`@javax.ws.rs.QueryParam`\n\n*   `@FormParam` 允许你从提交的表单数据中提取值。\n\
    \n`@javax.ws.rs.FormParam`\n\n*   `@HeaderParam` 允许你从 HTTP 请求头中提取值。\n\n`@javax.ws.rs.HeaderParam`\n\
    \n*   `@CookieParam` 允许你从客户端设置的 HTTP Cookie 中提取值。\n\n`@javax.ws.rs.CookieParam`\n\
    \n*   `@MatrixParam` 允许你从 URI 矩阵参数中提取值。\n\n`@javax.ws.rs.MatrixParam`\n\n*   `@Context`\
    \ 类是一个通用注入注解。它允许你注入由 JAX-RS API 提供的各种辅助和信息对象。\n\n`@javax.ws.rs.core.Context`\n\
    \n以下是 JAX-RS 注入的几个示例。\n\n### 路径参数\n\n单个参数：\n\n```java\n@Path(\"/customers/{id}\"\
    )\npublic String getCustomer(@PathParam(\"id\") int id);\n```\n\n多个参数：\n\n```java\n\
    @Path(\"/products/{name}-{version}\")\npublic String getProduct(@PathParam(\"\
    name\") String name, @PathParam(\"version\") String version)\n```\n\n### 查询参数\n\
    \n通过查询参数限定来请求子集：\n\n```java\nhttp://restapi/products?start=0&count=10\n@GET\n\
    @Produces(\"application/json\")\npublic String getProducts(@QueryParam(\"start\"\
    ) int start, @QueryParam(\"count\") int count);\npublic String getProducts(@Context\
    \ Uriinfo info)\nString info.getQueryParameters().getFirst(\"start\");\n```\n\n\
    ### Cookie 参数\n\n使用 `@CookieParam` 来检索单个值：\n\n```java\npublic string get(@CookieParam(\"\
    userId\") String userId)\n```\n\n### 请求头参数\n\n用于注入 HTTP 请求头值：\n\n```java\npublic\
    \ String get(@HeaderParam(\"Accept\") String accept)\n```\n\n### 表单参数\n\n`@FormParam`\
    \ 用于从 HTML 的请求体中检索信息：\n\n```java\n@Path(\"/product\")\n@POST\ncreateProduct( @FormParam(\"\
    name\") String productName, @FormParam(\"description\") String description,..)\n\
    ```\n\n### 矩阵参数\n\n矩阵参数用于限定单个路径段，而不是完整的 URI：\n\n```java\nResponse getBooks(@PathParam(\"\
    year\") String year, @MatrixParam(\"author\") String author, @MatrixParam(\"country\"\
    ) String country) {\nConsider the following request that is asking for all the\
    \ books published in year 2016 by author bill in country usa.\n\"/books/2016;author=bill;country=usa\"\
    \ngetBooks is called with year set to 2016, author set to bill, and country set\
    \ to usa.\n```\n\n## Micronaut 对 JAX-RS 的实现\n\n默认情况下，Micronaut 用户使用 Micronaut\
    \ 的 `@Controller` 注解和其他内置的[路由注解](https://docs.micronaut.io/latest/guide/#_routing_annotations)来定义他们的\
    \ [HTTP 路由](https://docs.micronaut.io/latest/guide/#routing)。然而，[Micronaut JAX-RS](https://micronaut-projects.github.io/micronaut-jaxrs/latest/guide/)\
    \ 允许你使用 JAX-RS 注解来定义你的 Micronaut 端点。Micronaut JAX-RS 增加了在 Micronaut 应用程序中使用 JAX-RS\
    \ 注解和类型的支持，旨在帮助迁移现有的 JAX-RS 应用程序或支持偏好 JAX-RS 注解的团队。该项目并非 JAX-RS 规范的实现，旨在让熟悉 JAX-RS\
    \ API 的用户能够在 Micronaut 应用程序的上下文中使用该 API 最常用的部分。\n\n要使用此项目，你需要将以下注解处理器添加到任何 Micronaut\
    \ 项目中：\n\n```xml\n<dependency>\n    <groupId>io.micronaut.jaxrs</groupId>\n  \
    \  <artifactId>micronaut-jaxrs-processor</artifactId>\n</dependency>\n```\n\n\
    Micronaut JAX-RS 支持使用 JAX-RS 注解来定义控制器。\n\n包含以下服务器依赖：\n\n```xml\n<dependency>\n\
    \    <groupId>io.micronaut.jaxrs</groupId>\n    <artifactId>micronaut-jaxrs-server</artifactId>\n\
    </dependency>\n```\n\n## 支持的注解\n\nMicronaut JAX-RS 的工作原理是在编译时将 JAX-RS 注解定义转换为等效的\
    \ Micronaut 版本。\n\n**表 5-1 支持的 JAX-RS 注解**\n\n| JAX-RS 注解 | 目标注解 | 示例 |\n| :---\
    \ | :--- | :--- |\n| [`@Path`](https://jakarta.ee/specifications/restful-ws/3.0/apidocs/jakarta/ws/rs/Path.html)\
    \ | [`@Controller`](https://docs.micronaut.io/latest/api/io/micronaut/http/annotation/Controller.html)\
