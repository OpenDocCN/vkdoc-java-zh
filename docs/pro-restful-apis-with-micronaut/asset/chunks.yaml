    iPhone SDK I’m looking at you!). And that code you write will of course\ndepend\
    \ on whether the XML you need to make sense of looks like this:\n\n```\n\n```\n\
    \nor this:\n\n```\n\n2 John\n3 Smith\n\n```\n\nor this:\n\n```\n\n2 John\n3 Smith\n\
    \n```\n\nor any of the myriad of other ways one can conceive of expressing the\n\
    same concept (and there are many). The standard XML parser does not help\nyou\
    \ in this regard. You still need to do some work with the parse\ntree.\n\nWorking\
    \ with JSON is a different, and superior, experience. First, the\nsimpler syntax\
    \ helps you avoid the need to decide between many different\nways of representing\
    \ your data (as we saw earlier with XML), much less\nwhich rope to hang yourself\
    \ with. Usually, there is only one\nstraightforward way to represent something:\n\
    \n```\n1 { \"first-name\" : \"John\",\n2 \"last-name\" : \"Smith\" }\n```\n\n\
    How Can You Use JSON?\n\nThe following discusses how you can use JSON:\n\n*  \
    \ It is used while writing JavaScript-based applications that\n    include browser\
    \ extensions and websites.\n\n*   JSON format is used for serializing and transmitting\
    \ structured\n    data over a network connection. It is primarily used to transmit\
    \ data\n    between a server and web applications.\n\n*   Web services and APIs\
    \ use JSON format to provide public\n    data.\n\nPros and Cons of JSON\nThe following\
    \ are pros\nand cons of JSON:\n\nPros\n\n*   Easy to read/write/parse\n\n*   Reasonably\
    \ succinct (compared with XML, for instance)\n\n*   Common “standard” with many\
    \ libraries available\n\nCons\n\n*   Not as light as binary formats.\n\n*   Can’t\
    \ use comments.\n\n*   It’s “encapsulated,” meaning that you can’t readily stream/append\n\
    \    data, but have to break it up into individual objects. XML has the same\n\
    \    problem, whereas CSV does not.\n\n*   Difficult to describe the data you’re\
    \ presenting (easier with\n    XML).\n\n*   Unable to enforce, or validate against,\
    \ a\n    structure/schema.\n\nXML and JSON Comparison\n\nThis section compares\
    \ XML and JSON based upon\ndifferent properties.\n\nTable 3-1\nXML and JSON comparison\n\
    \nProperty |\n XML |\n JSON |\n\n| --- | --- | --- | --- | --- | --- | --- |\n\
    \nSimplicity |\n XML is simple and human-readable |\n JSON is much simpler than\
    \ XML as well as human-readable |\n\nSelf-describing |\n Yes |\n Yes |\n\nProcessing\
    \ |\n XML is processed easily |\n JSON is processed more easily because its structure\
    \ is simpler |\n\nPerformance |\n Not optimized for performance due to tags |\n\
    \ Faster than XML because of size |\n\nOpenness |\n XML is open |\n JSON is at\
    \ least as open as XML, perhaps more so because it is not in the center of\na\
    \ corporate/political standardization struggle |\n\nObject-oriented |\n XML is\
    \ document oriented |\n JSON is data oriented. JSON can be mapped more easily\
    \ to object-oriented\nsystems |\n\nInteroperability |\n XML is interoperable |\n\
    \ JSON has the same interoperability potential as XML |\n\nInternationalization\
    \ |\n Supports Unicode |\n Supports Unicode |\n\nExtendability |\n XML is extensible\
    \ |\n JSON is not extensible because it does not need to be. JSON is not a document\
    \ markup\nlanguage, so it is not necessary to define new tags or attributes to\n\
    represent data in it |\n\nAdoption |\n XML is widely adopted by the industry |\n\
    \ JSON is just beginning to become known. Its simplicity and the ease of converting\
    \ XML to JSON make JSON\nultimately more adoptable |\n\nImplementing APIs to Return\
    \ XML and JSON\nMessages\n[`https://micronaut.io/launch/`](https://micronaut.io/launch/)\n\
