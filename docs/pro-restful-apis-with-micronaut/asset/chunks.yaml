    # 1. RESTful API 基础


    API 并非新鲜事物。几十年来，它们一直作为接口，使应用程序能够相互通信。但在过去几年中，API 的角色发生了巨大变化。创新型公司发现，API 可以作为业务接口，使其能够将数字资产货币化，通过合作伙伴交付的能力扩展其价值主张，并跨渠道和设备与客户建立连接。当你创建一个
    API 时，你是在允许组织内外的其他人利用你的服务或产品来创建新的应用程序、吸引客户或拓展业务。内部 API 通过最大化可重用性并在新应用程序中强制执行一致性，从而提升开发团队的生产力。公共
    API 可以通过允许第三方开发者增强你的服务或将他们的客户引荐给你，从而为你的业务增加价值。当开发者为你的服务和数据找到新的应用时，会产生网络效应，带来显著的底线业务影响。例如，Expedia
    通过 API 向合作伙伴开放其旅行预订服务，推出了 Expedia 联盟网络，建立了一个新的收入流，目前每年贡献 20 亿美元的收入。Salesforce
    发布了 API，使合作伙伴能够扩展其平台功能，现在其年收入的一半是通过这些 API 产生的，这些 API 可以是基于 SOAP 的（JAX-WS），以及更近期的
    RESTful（JAX-RS）、Spring Boot，以及现在的 Micronaut。


    SOAP Web 服务依赖于多种技术（如 UDDI、WSDL、SOAP 和 HTTP）和协议来在服务提供者和消费者之间传输和转换数据，并且可以使用 JAX-WS
    创建。


    后来，Roy Fielding（在 2000 年）发表了他的博士论文《架构风格与基于网络的软件架构设计》。他创造了术语“REST”，这是一种用于分布式超媒体系统的架构风格。简单来说，REST（Representational
    State Transfer 的缩写）是一种被定义用来帮助创建和组织分布式系统的架构风格。该定义中的关键词应该是“风格”，因为 REST 的一个重要方面（这也是像本书这样的书籍存在的主要原因之一）在于它是一种架构风格——不是指南，不是标准，也不是任何暗示存在一套硬性规则需要遵循才能最终拥有
    RESTful 架构的东西。


    在本章中，我将介绍 REST 基础、SOAP 与 REST 的对比以及 Web 架构风格，以提供坚实的基础，并让你为后续章节的内容做好更充分的准备。


    REST 背后的主要思想是，一个以 RESTful 方式组织的分布式系统将在以下方面得到改进：


    *   **性能**：REST 提出的通信风格旨在高效且简单，从而允许采用该风格的系统提升性能。


    *   **组件交互的可扩展性**：任何分布式系统都应能很好地处理这一方面，而 REST 提出的简单交互极大地促进了这一点。


    *   **接口的简单性**：简单的接口允许系统之间进行更简单的交互，这反过来又可以带来诸如前面提到的那些好处。


    *   **组件的可修改性**：系统的分布式特性以及 REST 提出的关注点分离（稍后会详细介绍），允许组件以最小的成本和风险相互独立地进行修改。


    *   **可移植性**：REST 与技术无关且与语言无关，这意味着它可以被任何类型的技术实现和消费（有一些约束我稍后会介绍，但不强制使用特定技术）。


    *   **可靠性**：REST 提出的无状态约束（稍后会详细介绍）允许系统在故障后更容易恢复。


    *   **可见性**：同样，所提出的无状态约束具有所述请求的完整状态（一旦我谈到约束，这一点就会变得清晰）。从这个列表中，可以推断出一些直接的好处。以组件为中心的设计允许你构建容错性很强的系统。一个组件的故障不会影响整个系统的稳定性，这对任何系统来说都是一个巨大的好处。互连组件非常容易，从而在添加新功能或进行扩展或缩减时最大限度地降低风险。由于
    REST 的可移植性（如前所述），以 REST 为理念设计的系统将能够被更广泛的受众访问。通过通用接口，该系统可以被更广泛的开发者使用。为了实现这些属性和好处，REST
    添加了一组约束来帮助定义统一的连接器接口。当你需要在客户端和服务器之间强制执行严格的契约，以及执行涉及多个调用的事务时，不建议使用 REST。


    ## SOAP 与 REST 对比


    表 1-1 提供了 SOAP 和 REST 之间的对比，并附带了各自支持的用例示例。


    **表 1-1**


    **SOAP 与 REST 对比**


    | 主题 | SOAP | REST |

    | --- | --- | --- |

    | 起源 | SOAP（简单对象访问协议）由 Dave Winer 等人于 1998 年与微软合作创建。由一家大型软件公司开发，该协议旨在满足企业市场的需求
    | REST（表述性状态传递）由 Roy Fielding 于 2000 年在加州大学尔湾分校创建。在学术环境中开发，该协议秉承开放网络的理念 |

    | 基本概念 | 将数据作为服务提供（动词 + 名词），例如，“getUser”或“PayInvoice” | 将数据作为资源提供（名词），例如，“user”或“invoice”
    |

    | 优点 | 遵循正式的企业方法<br>可在任何通信协议之上工作，甚至异步工作<br>对象信息会传达给客户端<br>安全性和授权是协议的一部分<br>可以使用
    WSDL 完全描述 | 秉承开放网络的理念<br>相对易于实现和维护<br>清晰分离客户端和服务器实现<br>通信不受单一实体控制<br>信息可由客户端存储以防止多次调用<br>可以以多种格式返回数据（JSON、XML
    等） |

    | 缺点 | 在通信元数据上消耗大量带宽<br>难以实现，在 Web 和移动开发者中不受欢迎 | 仅能在 HTTP 协议之上工作<br>难以在其上强制执行授权和安全性
    |

    | 何时使用 | 当客户端需要访问服务器上的对象时<br>当你想在客户端和服务器之间强制执行正式契约时 | 当客户端和服务器在 Web 环境中运行时<br>当对象信息不需要传达给客户端时
    |

    | 何时不使用 | 当你希望大多数开发者能轻松使用你的 API 时<br>当你的带宽非常有限时 | 当你需要在客户端和服务器之间强制执行严格契约时<br>当执行涉及多个调用的事务时
    |

    | 用例 | 金融服务<br>支付网关<br>电信服务 | 社交媒体服务<br>社交网络<br>网络聊天服务<br>移动服务 |

    | 示例 | [`https://www.salesforce.com/developer/docs/api/`](https://www.salesforce.com/developer/docs/api/)
    - Salesforce SOAP API<br>[`https://developer.paypal.com/docs/classic/api/PayPalSOAPAPIArchitecture/`](https://developer.paypal.com/docs/classic/api/PayPalSOAPAPIArchitecture/)
    -Paypal SOAP API | [`https://dev.twitter.com/`](https://dev.twitter.com/)<br>[`https://developer.linkedin.com/apis`](https://developer.linkedin.com/apis)
    |

    | 结论 | 如果你正在处理事务性操作，并且你的受众已经对该技术感到满意，请使用 SOAP | 如果你专注于大规模 API 采用，或者你的 API 面向移动应用，请使用
    REST |

