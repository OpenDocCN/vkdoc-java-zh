    helped me work on this book. A huge thanks goes to my father, Ajit Kumar Patni,
    and my mother, late Basantidevi, for their selfless support that helped me reach
    where I am today.*


    Introduction


    Databases, websites, and business applications need to exchange data. This is
    accomplished by defining standard data formats such as Extensible Markup Language
    (XML) or JavaScript Object Notation (JSON), as well as transfer protocols or web
    services such as the Simple Object Access Protocol (SOAP) or the more popular
    Representational State Transfer (REST). Developers often have to design their
    own Application Programming Interfaces (APIs) to make applications work while
    integrating specific business logic around operating systems or servers. This
    book introduces these concepts with a focus on RESTful APIs.


    This book introduces the data exchange mechanism and common data formats. For
    web exchange, you will learn the HTTP protocol, including how to use XML. This
    book compares SOAP and REST and then covers the concepts of stateless transfer.
    It introduces software API design and best design practices. The second half of
    the book focuses on RESTful API design and implementations that follow the Micronaut
    and Java API for RESTful web services. You will learn how to build and consume
    Micronaut services using JSON and XML and integrate RESTful APIs with different
    data sources like relational databases and NoSQL databases through hands-on exercises.
    You will apply these best practices to complete a design review of publicly available
    APIs with a small-scale software system in order to design and implement RESTful
    APIs.


    This book is intended for software developers who use data in projects. It is
    also useful for data professionals who need to understand the methods of data
    exchange and how to interact with business applications. Java programming experience
    is required for the exercises.


    Topics covered in this book include


    *   Data exchange and web services


    *   SOAP vs. REST, state vs. stateless


    *   XML vs. JSON


    *   Introduction to API design: REST and Micronaut


    *   API design practices


    *   Designing RESTful APIs


    *   Building RESTful APIs


    *   Interacting with RDBMS (MySQL)


    *   Consuming RESTful APIs (i.e., JSON and XML)


    About the Author About the Technical Reviewer'
