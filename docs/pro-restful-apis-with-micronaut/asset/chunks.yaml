    \ REST by ProgrammableWeb.com in 2016. REST is resource-based architecture. A\
    \ resource is accessed via a common interface based on the HTTP standard methods.\
    \ REST asks developers to use HTTP methods explicitly and in a way that’s consistent\
    \ with the protocol definition. Each resource is identified by a URL. Every resource\
    \ should support the HTTP common operations, and REST allows that resource to\
    \ have different representations, for example, text, XML, and JSON. The rest client\
    \ can ask for specific representation via the HTTP protocol (content negotiation).\
    \ Table [1-3](#427457_3_En_1_Chapter.xhtml#Tab3) describes data elements used\
    \ in REST.\n\n**Table 1-3** Structures of REST\n\n| Data element | Description\
    \ |\n| --- | --- |\n| Resource | Conceptual target of a hypertext reference, for\
    \ example, `customer/order` |\n| Resource identifier | A uniform resource locator\
    \ (URL) or uniform resource name (URN) identifying a specific resource, for example,\
    \ `http://myrest.com/customer/3435` |\n| Resource metadata | Information describing\
    \ the resource, for example, tag, author, source link, alternate location, and\
    \ alias names |\n| Representation | The resource content—JSON message, HTML document,\
    \ JPEG image |\n| Representation metadata | Information describing how to process\
    \ the representation, for example, media type and last-modified time |\n| Control\
    \ data | Information describing how to optimize response processing, for example,\
    \ `if-modified-since` and `cache-control-expiry` |\n\nLet’s look at some examples.\n\
    \n## Resources\n\nFirst, a REST resource to GET a list of podcasts:\n\n*   `http://prorest/podcasts`\n\
    \nNext, a REST resource to GET details of podcast id 1:\n\n*   `http://prorest/podcasts/1`\n\
    \n## Representations\n\nHere is an XML representation of a response—GET customer\
    \ for an id.\n\n```xml\n<Customer>\n  <id>123</id>\n  <name>John</name>\n</Customer>\n\
    ```\n\nNext, a JSON representation of a response—GET customer for an id:\n\n```json\n\
    {\"Customer\":{\"id\":\"123\",\"name\":\"John\"}}\n```\n\n## Content Negotiation\n\
    \nHTTP natively supports a mechanism based on headers to tell the server about\
    \ the content you expect and you’re able to handle. Based on these hints, the\
    \ server is responsible for returning the corresponding content in the correct\
    \ format. Figure [1-1](#427457_3_En_1_Chapter.xhtml#Fig1) shows an example.\n\n\
    ![](images/427457_3_En_1_Chapter/427457_3_En_1_Fig1_HTML.jpg)\n\nDiagram illustrating\
    \ a communication issue between a client and server. The client only supports\
    \ JSON format and requests JSON content. The server only supports XML format,\
    \ resulting in a 406 status code due to incompatible content types.\n\n**Figure\
    \ 1-1** Content negotiation\n\nIf the server doesn’t support the requested format,\
    \ it will send back a 406 status code (not acceptable) to notify the client that\
    \ made the request (“The requested resource is only capable of generating content\
    \ not acceptable according to the Accept headers sent in the request”) according\
    \ to the specification.\n\n# Summary\n\nREST identifies the key architectural\
    \ principles of why the Web is prevalent and scalable. The next step in the education\
    \ of the Web is to apply these principles to the semantics Web and the world of\
    \ web services. REST offers a simple, interoperable, and flexible way of writing\
    \ web services that can be very different than the WS-* that so many of you had\
    \ training in. In the next chapter, we will introduce `Micronaut`—a modern, JVM-based,\
    \ full-stack framework for building modular, easily testable microservice and\
    \ serverless applications. We will also compare it with similar framework Spring\
    \ Boot.\n\n# 2. Micronaut\n\n`Micronaut` is a JVM-based modern full-stack microservice\
    \ framework. This new framework has been developed by the Grails team with an\
    \ intention to solve problems which have been identified over the years while\
    \ building the real-world microservices applications.\n\nOne of the most exciting\
    \ features of `Micronaut` is its compile-time dependency injection mechanism.\
    \ Most frameworks use reflection and proxies to perform dependency injection at\
    \ runtime. `Micronaut`, however, builds its dependency injection data at compile\
    \ time. The result is faster application startup and smaller memory footprints.\n\
    \nI think it is not an exaggeration if I say we are living in the age of microservices.\
    \ Microservices became the de facto architecture pattern for every new enterprise-scale\
    \ application that is being implemented, and many existing monolithic applications\
    \ are getting migrated into microservices. In the case of the Java world, Spring\
    \ Boot turned out to be the standard framework to develop microservices. There\
    \ were some other frameworks like DropWizard, Apache Karaf, and Jersey. But they\
    \ were not able to give tough competition to Spring Boot, and slowly their usage\
    \ percentage came down and became insignificant over a period of time. If you\
    \ observe the evolution of Spring Boot, initially it was not proposed as a microservices\
    \ solution from Spring. It was initially proposed and implemented as the containerless\
    \ web application, and the developer community started using it for microservices\
    \ implementation. But Spring Boot got its own limitations like:\n\n*   Fixed single\
    \ language\n*   Lack of built-in support for data accessing\n*   Lack of simpler\
    \ unit testing\n*   Lack of built-in service discovery\n*   Lack of built-in load\
    \ balancing\n\nWe need explicit configuration which can be achieved through the\
    \ cloud services instead of having the built-in support within the framework itself.\n\
    \nHere comes `Micronaut` which contains the aforementioned built-in features and\
    \ is designed with single and primary intent to serve as the vehicle for microservices\
    \ development.\n\n## Comparison of Micronaut with Spring Boot\n\n### Ease of Installation\n\
    \nBoth Spring Boot and `Micronaut` won’t be complex for installation and can be\
    \ installed easily by following the installation instructions. Both frameworks\
    \ need the following prerequisites:\n\n*   A favorite text editor or IDE\n*  \
    \ JDK 1.8 or later\n*   Gradle or Maven latest versions\n\nThe code which has\
    \ been generated through the CLI tool can be directly imported into your IDE:\n\
    \n*   **Spring Tool Suite (STS)**: Spring Boot\n*   **Visual Studio Code**: `Micronaut`\n\
    \n### Natively Cloud Enabled\n\nWhen it comes to Spring Boot, to support the previously\
    \ discussed cloud-specific features, we need to depend on the third-party cloud\
    \ services or libraries; it doesn’t support any of the above-listed features by\
    \ default, so `Micronaut` has an advantage here.\n\nThe following list of cloud-specific\
    \ features is directly integrated into the `Micronaut` runtime:\n\n*   Service\
    \ discovery.\n*   Eureka, Consul, or ZooKeeper service discovery servers are being\
    \ supported.\n*   The Kubernetes container runtime is supported by default.\n\
    *   Client-side load balancing.\n*   Netflix Ribbon can be used for load balancing.\n\
    *   Distributed configuration.\n*   Distributed tracing.\n*   Serverless functions.\n\
    \n### Serverless Functions\n\nServerless architecture, where developers will deploy\
    \ the function. From there onward, they are completely managed by the cloud environment,\
    \ that is, invocation, execution, and control. But `Micronaut`’s fast startup\
    \ time, compile-time approach, and low-memory footprint make this framework a\
    \ great candidate for developing functions, and in fact, `Micronaut` features\
    \ have the dedicated support for implementing and deploying functions to the AWS\
    \ Lambda and any FaaS system that supports running functions as containers."
  raw: '### REST Fundamentals


    Just to remind you, about 8,356 APIs were written in REST by ProgrammableWeb.com
    in 2016\. REST is resource-based architecture. A resource is accessed via a common
    interface based on the HTTP standard methods. REST asks developers to use HTTP
    methods explicitly and in a way that’s consistent with the protocol definition.
    Each resource is identified by a URL. Every resource should support the HTTP common
    operations, and REST allows that resource to have different representations, for
    example, text, XML, and JSON. The rest client can ask for specific representation
    via the HTTP protocol (content negotiation). Table [1-3](#427457_3_En_1_Chapter.xhtml#Tab3)
    describes data elements used in REST.


    Table 1-3


    Structures of REST


    | Data element | Description |

    | --- | --- |

    | Resource | Conceptual target of a hypertext reference, for example, customer/order
    |

    | Resource identifier | A uniform resource locator (URL) or uniform resource name
    (URN) identifying a specific resource, for example, [`http://myrest.com/customer/3435`](http://myrest.com/customer/3435)
    |

    | Resource metadata | Information describing the resource, for example, tag, author,
    source link, alternate location, and alias names |

    | Representation | The resource content—JSON message, HTML document, JPEG image
    |

    | Representation metadata | Information describing how to process the representation,
    for example, media type and last-modified time |

    | Control data | Information describing how to optimize response processing, for
    example, if-modified-since and cache-control-expiry |


    Let’s look at some examples.


    #### Resources


    First, a REST resource to GET a list of podcasts:


    *   `http://prorest/podcasts`


    Next, a REST resource to GET details of podcast id 1:


    *   `http://prorest/podcasts/1`


    #### Representations


    Here is an XML representation of a response—GET customer for an id.


    ```


    John


    ```


    Next, a JSON representation of a response—GET customer for an id:


    ```

    {"Customer":{"id":"123","name":"John"}}

    ```


    #### Content Negotiation


    HTTP natively supports a mechanism based on headers to tell the server about the
    content you expect and you’re able to handle. Based on these hints, the server
    is responsible for returning the corresponding content in the correct format.
    Figure [1-1](#427457_3_En_1_Chapter.xhtml#Fig1) shows an example.


    ![](images/427457_3_En_1_Chapter/427457_3_En_1_Fig1_HTML.jpg)


    Diagram illustrating a communication issue between a client and server. The client
    only supports JSON format and requests JSON content. The server only supports
    XML format, resulting in a 406 status code due to incompatible content types.


    Figure 1-1


    Content negotiation


    If the server doesn’t support the requested format, it will send back a 406 status
    code (not acceptable) to notify the client that made the request (“The requested
    resource is only capable of generating content not acceptable according to the
    Accept headers sent in the request”) according to the specification.


    ## Summary


    REST identifies the key architectural principles of why the Web is prevalent and
    scalable. The next step in the education of the Web is to apply these principles
    to the semantics Web and the world of web services. REST offers a simple, interoperable,
    and flexible way of writing web services that can be very different than the WS-*
    that so many of you had training in. In the next chapter, we will introduce **Micronaut**—a
    modern, JVM-based, full-stack framework for building modular, easily testable
    microservice and serverless applications. We will also compare it with similar
    framework Spring Boot.


    # 2. Micronaut


    Micronaut is a JVM-based modern full-stack microservice framework. This new framework
    has been developed by the Grails team with an intention to solve problems which
    have been identified over the years while building the real-world microservices
    applications.


    One of the most exciting features of Micronaut is its compile-time dependency
    injection mechanism. Most frameworks use reflection and proxies to perform dependency
    injection at runtime. Micronaut, however, builds its dependency injection data
    at compile time. The result is faster application startup and smaller memory footprints.


    I think it is not an exaggeration if I say we are living in the age of microservices.
    Microservices became the de facto architecture pattern for every new enterprise-scale
    application that is being implemented, and many existing monolithic applications
    are getting migrated into microservices. In the case of the Java world, Spring
    Boot turned out to be the standard framework to develop microservices. There were
    some other frameworks like DropWizard, Apache Karaf, and Jersey. But they were
    not able to give tough competition to Spring Boot, and slowly their usage percentage
    came down and became insignificant over a period of time. If you observe the evolution
    of Spring Boot, initially it was not proposed as a microservices solution from
    Spring. It was initially proposed and implemented as the containerless web application,
    and the developer community started using it for microservices implementation.
    But Spring Boot got its own limitations like


    *   Fixed single language


    *   Lack of built-in support for data accessing


    *   Lack of simpler unit testing


    *   Lack of built-in service discovery


    *   Lack of built-in load balancing


    We need explicit configuration which can be achieved through the cloud services
    instead of having the built-in support within the framework itself.


    Here comes Micronaut which contains the aforementioned built-in features and is
    designed with single and primary intent to serve as the vehicle for microservices
    development.


    ## Comparison of Micronaut with Spring Boot


    ### Ease of Installation


    Both Spring Boot and Micronaut won’t be complex for installation and can be installed
    easily by following the installation instructions. Both frameworks need the following
    prerequisites:


    *   A favorite text editor or IDE


    *   JDK 1.8 or later


    *   Gradle or Maven latest versions


    The code which has been generated through the CLI tool can be directly imported
    into your IDE:


    *   **Spring Tool Suite (STS)**: Spring Boot


    *   **Visual Studio Code**: Micronaut


    ### Natively Cloud Enabled


    When it comes to Spring Boot, to support the previously discussed cloud-specific
    features, we need to depend on the third-party cloud services or libraries; it
    doesn’t support any of the above-listed features by default, so Micronaut has
    an advantage here.


    The following list of cloud-specific features is directly integrated into the
    Micronaut runtime:


    *   Service discovery.


    *   Eureka, Consul, or ZooKeeper service discovery servers are being supported.


    *   The Kubernetes container runtime is supported by default.


    *   Client-side load balancing.


    *   Netflix Ribbon can be used for load balancing.


    *   Distributed configuration.


    *   Distributed tracing.


    *   Serverless functions.


    ### Serverless Functions


    Serverless architecture, where developers will deploy the function. From there
    onward, they are completely managed by the cloud environment, that is, invocation,
    execution, and control. But Micronaut’s fast startup time, compile-time approach,
    and low-memory footprint make this framework a great candidate for developing
    functions, and in fact, Micronaut features have the dedicated support for implementing
    and deploying functions to the AWS Lambda and any FaaS system that supports running
    functions as containers.'
  trans: '

    ### REST 基础


    提醒一下，根据 ProgrammableWeb.com 的数据，2016 年约有 8,356 个 API 是使用 REST 编写的。REST 是一种基于资源的架构。资源通过基于
    HTTP 标准方法的通用接口进行访问。REST 要求开发者显式地使用 HTTP 方法，并且使用方式要与协议定义保持一致。每个资源都由一个 URL 标识。每个资源都应支持
    HTTP 的常见操作，并且 REST 允许资源拥有不同的表示形式，例如文本、XML 和 JSON。REST 客户端可以通过 HTTP 协议（内容协商）请求特定的表示形式。表
    1-3 描述了 REST 中使用的数据元素。


    表 1-3


    REST 的结构


    | 数据元素 | 描述 |

    | --- | --- |

    | 资源 | 超文本引用的概念目标，例如，customer/order |

    | 资源标识符 | 用于标识特定资源的统一资源定位符 (URL) 或统一资源名称 (URN)，例如，[`http://myrest.com/customer/3435`](http://myrest.com/customer/3435)
    |

    | 资源元数据 | 描述资源的信息，例如，标签、作者、来源链接、备用位置和别名 |

    | 表示形式 | 资源内容——JSON 消息、HTML 文档、JPEG 图像 |

    | 表示形式元数据 | 描述如何处理表示形式的信息，例如，媒体类型和最后修改时间 |

    | 控制数据 | 描述如何优化响应处理的信息，例如，if-modified-since 和 cache-control-expiry |


    让我们看一些例子。


    #### 资源


    首先，一个用于获取播客列表的 REST 资源：


    *   `http://prorest/podcasts`


    接下来，一个用于获取 id 为 1 的播客详细信息的 REST 资源：


    *   `http://prorest/podcasts/1`


    #### 表示形式


    这是一个响应的 XML 表示形式——根据 id 获取客户信息。


    ```


    John


    ```


    接下来，一个响应的 JSON 表示形式——根据 id 获取客户信息：


    ```

    {"Customer":{"id":"123","name":"John"}}

    ```


    #### 内容协商


    HTTP 原生支持一种基于头部（headers）的机制，用于告知服务器你期望并能处理的内容。基于这些提示，服务器负责以正确的格式返回相应的内容。图 1-1
    展示了一个例子。


    ![](img/427457_3_En_1_Fig1_HTML.jpg)


    图示说明了客户端和服务器之间的通信问题。客户端仅支持 JSON 格式并请求 JSON 内容。服务器仅支持 XML 格式，由于内容类型不兼容，导致返回 406
    状态码。


    图 1-1


    内容协商


    如果服务器不支持请求的格式，它将根据规范返回一个 406 状态码（不可接受），以通知发起请求的客户端（“请求的资源只能生成根据请求中发送的 Accept 头部不可接受的内容”）。


    ## 总结


    REST 指出了 Web 为何如此普及且可扩展的关键架构原则。Web 发展的下一步是将这些原则应用于语义网和 Web 服务领域。REST 提供了一种简单、可互操作且灵活的方式来编写
    Web 服务，这与你们许多人接受过培训的 WS-* 方式可能大相径庭。在下一章中，我们将介绍 **Micronaut**——一个现代的、基于 JVM 的全栈框架，用于构建模块化、易于测试的微服务和无服务器应用。我们还将把它与类似的框架
    Spring Boot 进行比较。


    # 2. Micronaut


    Micronaut 是一个基于 JVM 的现代全栈微服务框架。这个新框架由 Grails 团队开发，旨在解决多年来在构建实际微服务应用过程中发现的问题。


    Micronaut 最令人兴奋的特性之一是其编译时依赖注入机制。大多数框架使用反射和代理在运行时执行依赖注入。然而，Micronaut 在编译时构建其依赖注入数据。其结果是更快的应用启动速度和更小的内存占用。


    我认为，如果说我们生活在微服务的时代，这并不夸张。微服务已成为每个正在实施的新企业级应用的事实上的架构模式，并且许多现有的单体应用正在迁移到微服务。在 Java
    领域，Spring Boot 已成为开发微服务的标准框架。还有其他一些框架，如 DropWizard、Apache Karaf 和 Jersey。但它们无法与
    Spring Boot 展开激烈竞争，其使用率逐渐下降，并在一段时间后变得微不足道。如果你观察 Spring Boot 的演变，最初它并非作为 Spring
    的微服务解决方案提出的。它最初是作为无容器 Web 应用提出并实现的，开发者社区随后开始将其用于微服务实现。但 Spring Boot 有其自身的局限性，例如：


    *   固定的单一语言


    *   缺乏对数据访问的内置支持


    *   缺乏更简单的单元测试


    *   缺乏内置的服务发现


    *   缺乏内置的负载均衡


    我们需要显式配置，这可以通过云服务实现，而不是在框架本身中内置支持。


    这时，Micronaut 出现了，它包含了上述内置特性，并且其单一且主要的设计意图是作为微服务开发的载体。


    ## Micronaut 与 Spring Boot 的比较


    ### 安装便捷性


    Spring Boot 和 Micronaut 的安装都不复杂，可以按照安装说明轻松完成安装。两个框架都需要以下先决条件：


    *   一个喜欢的文本编辑器或 IDE


    *   JDK 1.8 或更高版本


    *   Gradle 或 Maven 的最新版本


    通过 CLI 工具生成的代码可以直接导入到你的 IDE 中：


    *   **Spring Tool Suite (STS)**：Spring Boot


    *   **Visual Studio Code**：Micronaut


    ### 原生云支持


    对于 Spring Boot，要支持前面讨论的云特定特性，我们需要依赖第三方云服务或库；它默认不支持上述任何特性，因此 Micronaut 在这方面具有优势。


    以下云特定特性列表直接集成到了 Micronaut 运行时中：


    *   服务发现。


    *   支持 Eureka、Consul 或 ZooKeeper 服务发现服务器。


    *   默认支持 Kubernetes 容器运行时。


    *   客户端负载均衡。


    *   可以使用 Netflix Ribbon 进行负载均衡。


    *   分布式配置。


    *   分布式追踪。


    *   无服务器函数。


    ### 无服务器函数


    无服务器架构，开发者部署函数。从那时起，它们完全由云环境管理，即调用、执行和控制。但 Micronaut 的快速启动时间、编译时方法和低内存占用使其成为开发函数的绝佳选择。事实上，Micronaut
    特性为在 AWS Lambda 和任何支持将函数作为容器运行的 FaaS 系统上实现和部署函数提供了专门支持。

    '
- fmt: '### Application Configuration


    Micronaut is inspired from both Grails and Spring Boot in integrating configuration
    properties from different sources directly into the core IoC container. Configurations
    can be provided by default in either YAML, JSON, Java properties, or Groovy files.
    The convention is to search for a file called `application.yml`, `application.properties`,
    `application.json`, or `application.groovy`.


    - Command-line arguments

    - Properties from `SPRING_APPLICATION_JSON` (only if there is any Spring dependency)

    - Properties from `MICRONAUT_APPLICATION_JSON`

    - Java system properties

    - OS environment variables

    - Each environment-specific properties like `application-{environment}.{extension}`
    (could be `.properties`, `.json`, `.yml`, or `.groovy`)

    - Application-specific properties from the `application.{extension}` (could be
    `.properties`, `.json`, `.yml`, or `.groovy`)

    - Special properties (random values)


    Spring Boot supports all the preceding property locations; in addition, it also
    supports other property locations:


    - Spring Boot devtools global settings properties

    - `@TestPropertySource` annotations on your tests

    - `@SpringBootTest#properties` annotation attribute on your tests

    - `ServletConfig` init parameters

    - `ServletContext` init parameters

    - JNDI attributes from `java:comp/env`

    - `@PropertySource` annotations on your `@Configuration` classes

    - Default properties (specified by setting `SpringApplication.setDefaultProperties`)


    “Spring Boot provided more ways to handle with properties when we compared it
    against Micronaut.”


    ### Messaging System Support


    Spring Boot supports the integration of external messaging systems, such as:


    - RabbitMQ

    - Apache Kafka

    - ActiveMQ

    - Artemis


    Micronaut also supports the popular messaging systems, such as:


    - RabbitMQ

    - Apache Kafka


    “Micronaut has the embedded support for the Apache Kafka.” “Both frameworks have
    the support of the popular messaging systems but Spring Boot supports more tools.”


    ### Security


    Spring Boot supports the following security mechanisms by default:


    - MVC security

    - WebFlux security

    - OAuth 2

    - Actuator security


    Micronaut supports the following security mechanisms by default:


    - Authentication providers

    - Security rules

    - IP pattern rule

    - `@Secured` annotation

    - Intercept URL map

    - Built-in endpoints security

    - Authentication strategies

    - Basic auth

    - Session authentication

    - JSON Web Token

    - Built-in security controllers

    - Retrieve the authenticated user

    - Security events


    ### Caching


    Spring Boot supports the following caching providers:


    - Redis

    - Couchbase

    - Generic

    - JCache (JSR-107)

    - EhCache 2.x

    - Hazelcast

    - Infinispan

    - Caffeine


    Micronaut supports the following list of caching providers:


    - Caffeine (by default, Micronaut supports it)

    - Redis


    “Obviously, Spring Boot is leading in supporting caching providers.”


    ### Management and Monitoring


    Micronaut inspired by the Grails, Spring Boot, and Micronaut management dependency
    adds support to monitor your applications via endpoints, the special URIs that
    return details about the state of your application and health:


    - Creating endpoints

    - Built-in endpoints


    ## API Portfolio


    This book will take three business domain problems and build a portfolio of APIs.


    ### Online Flight


    To illustrate features of Micronaut, this book will take an example of an “online
    flight” application. The application will enable passengers to view flight they
    are traveling on. You will define two component classes:


    | Object | Field | Type |

    | --- | --- | --- |

    | Passenger | Name | String |

    | Flight | Origin | String |

    | | Destination | String |

    | | Departure | Datetime |

    | | Flight# | int |


    1. A service component that lets a passenger see what flights they are booked
    in.

    2. A repository component that stores passengers for a flight. Initially, you
    will store passengers in memory for simplicity.


    ### Message


    This API will enable sending messages to the users in the system.


    | Object | Fields | Type |

    | --- | --- | --- |

    | Message | Message | String |

    | | From | String |

    | | To | String |

    | | Creation Date | Date |


    #### Quote


    To illustrate features of Micronaut data, this book will take an example of an
    “online quote” application. The application will enable buyers to create and view
    quotes including products they want to buy. You will define three component classes:


    | Object | Field | Type |

    | --- | --- | --- |

    | Product | Name | String |

    | | Description | String |

    | | Unit Price | Float |

    | Quote | Customer | String |

    | | Quote Date | Date |

    | | Address | Object |

    | | Quote Line | Object |

    | | Total Price | Float |

    | Quote Line | Product | Object |

    | | Quantity | Long |

    | | Unit Price | Float |


    1. Catalog to list products with their price

    2. Quote for a customer including line items of the products with total price

    3. Quote line item including products with unit price and quantity


    ## Software


    This book will use the following software for the coding problems.


    ### Micronaut


    [`https://micronaut.io/download/`](https://micronaut.io/download/)


    INSTALLING WITH SDKMAN!


    This tool makes installing the Micronaut framework on any Unix-based platform
    (Mac OSX, Linux, Cygwin, Solaris, or FreeBSD) easy.


    Simply open a new terminal and enter:


    ```

    $ curl -s https://get.sdkman.io | bash

    ```


    Follow the on-screen instructions to complete installation. Open a new terminal
    or type the following command:


    ```

    $ source "$HOME/.sdkman/bin/sdkman-init.sh"

    ```


    Then install the latest stable version of the framework:


    ```

    $ sdk install micronaut

    ```


    If prompted, make this your default version.


    After installation is complete, it can be tested with:


    ```

    $ mn --version

    ```


    That’s all there is to it!


    Now let’s create “hello from Micronaut.”


    It is assumed that latest Micronaut, Gradle, and JDK 21 are installed.


    ```

    mn create-app hello-world

    ```


    ### JDK 21


    [`https://jdk.java.net/archive/`](https://jdk.java.net/archive/)


    ### POSTMAN


    [`www.postman.com/downloads/`](https://www.postman.com/downloads/)


    ### CURL


    [`https://curl.se/download.html`](https://curl.se/download.html)


    ### IDE


    You have two choices to use the IDE.


    #### Visual Studio Code


    [`https://code.visualstudio.com/download`](https://code.visualstudio.com/download)


    #### IntelliJ


    [`www.jetbrains.com/idea/download/`](https://www.jetbrains.com/idea/download/)


    ### Maven


    [`https://maven.apache.org/download.cgi`](https://maven.apache.org/download.cgi)


    The application created in the previous section contains a “main class” located
    in `src/main/java` that looks like the following:


    ```

    package hello.world;

    import io.micronaut.runtime.Micronaut;

    public class Application {

    public static void main(String[] args) {

    Micronaut.run(Application.class);

    }

    }

    ```


    This is the class that is run when running the application via Gradle or via deployment.


    Using any text editor of your choice, create the following file in the same folder
    where `Application` class is created.


    ```

    package hello.world;

    import io.micronaut.http.MediaType;

    import io.micronaut.http.annotation.Controller;

    import io.micronaut.http.annotation.Get;

    @Controller("/hello") public class HelloController {

    @Get(produces = MediaType.TEXT_PLAIN)

    public String index() {

    return "Hello from Micronaut";

    }

    }

    ```


    Save the file as `HelloController.java`. Files will look like the preceding example.
    Now to run from the command prompt:


    ```

    cd ~/hello-world

    ./gradlew run

    curl http://localhost:8080/hello

    ```


    ## Summary


    In this chapter, we reviewed the features of Micronaut and compared those with
    Spring Boot. We also analyzed sample domains—flight status message and quote to
    create a portfolio of APIs using Micronaut.


    # 3. Introduction: XML and JSON


    This chapter introduces basic concepts about XML and JSON. At the end of this
    chapter, there is an exercise to demonstrate XML and JSON responses from a Micronaut
    app.'
