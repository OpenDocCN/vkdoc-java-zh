    从创新或业务角度来看，存在尽早发布 API 的驱动力。从 IT 治理角度来看，API 则应尽可能晚发布。作为一种折衷方案，API 可以早期发布，但仅限试点消费者使用，并预期会存在变更，且
    API 将导致应用中断。变更分为三类：向后兼容、向前兼容和不兼容。如果旧客户端能够与新 API 交互，则视为向后兼容（例如，添加可选的查询参数、标头参数或表单参数；在
    JSON 或 XML 中添加可选的新字段；添加端点，如新的 REST 资源；为现有端点添加新操作，如在 SOAP 中；向请求接口添加可选字段；将现有 API
    中的必填字段改为可选字段）。如果新客户端能够与旧 API 交互，则视为向前兼容。这很难实现，通常属于锦上添花的功能。


    *   **不兼容的变更**：如果 API 的变更导致客户端中断，则该变更为不兼容变更。


    *   **移除**：重命名数据结构中的字段或请求/响应中的参数。


    *   **更改 URI**：例如，主机名和端口。


    *   **更改数据结构**：将一个字段设为另一个字段的子字段。在数据结构中添加新的必填字段。


    API 框架

    正如我们所讨论的，API 有多种解决方案，例如，Web 应用程序、移动应用程序等。每种解决方案都与通过使用设计模式的多层架构实现的 API 进行通信。**设计模式**是针对软件**设计**中特定上下文中常见问题的通用可重用解决方案。**设计模式**并非可以直接转换为源代码或机器代码的成品**设计**。


    多层框架如图 6-1 所示。


    ![](img/427457_3_En_6_Fig1_HTML.jpg)


    图示说明分层 API 架构。顶层是“体验 API”，它将流程和系统 API 适配为针对应用程序定制的微服务。中间层是“流程 API”，通过编排和编舞组合系统
    API。底层是“系统 API”，封装了核心业务能力。左侧的垂直箭头表示从“中央 IT”到“应用开发”的可访问性和所有权逐渐增加。图标代表各种技术，包括 SaaS
    应用、大型机、FTP 文件、数据库、Web 服务、遗留系统和应用程序。


    图 6-1

    API 多层框架


    该框架描述了 API 的类型及其组件。应用开发拥有体验 API。业务线开发和 IT 拥有流程 API。中央 IT 拥有系统 API。可访问性和所有权涵盖 SaaS
    应用、大型机、FTP 文件、数据库、Web 服务、遗留系统和应用程序。


    *   流程 API 通过服务设计模式实现

    *   系统 API 通过数据访问对象设计模式实现

    *   体验 API 通过 API 外观层设计模式实现


    每一层都使用软件工程设计模式实现。


    流程 API：服务层

    服务层实现应用程序的业务逻辑：可重用逻辑、特定于流程的逻辑，以及通过编排和编舞与系统 API 交互的逻辑。此处的编排（直接调用）涉及将业务线开发/IT 请求与应用程序、数据和基础设施对齐。相比之下，编舞不依赖中央协调器。相反，参与编舞的每个
    API 都确切知道何时执行其操作以及与谁交互。


    系统 API：数据访问对象

    这些系统 API 或系统级服务符合自治服务的概念，该服务经过设计，具有足够的抽象性，以隐藏底层记录系统，例如，数据库、遗留系统和 SaaS 应用程序。

    通常，数据访问对象 (DAO) 是一个[对象](https://en.wikipedia.org/wiki/Object_(computer_science)%25252525252525252525252525252525252525252525252525252523Object%252525252525252525252525252525252525252525252525252525252520(computer%252525252525252525252525252525252525252525252525252525252520science))，它为某种类型的[数据库](https://en.wikipedia.org/wiki/Database%25252525252525252525252525252525252525252525252525252523Database)或其他持久化机制提供抽象[接口](https://en.wikipedia.org/wiki/Interface_(computer_science)%25252525252525252525252525252525252525252525252525252523Interface%252525252525252525252525252525252525252525252525252525252520(computer%252525252525252525252525252525252525252525252525252525252520science))。通过将应用程序调用映射到持久化层，DAO
    提供特定的数据操作，而无需暴露系统的细节。


    体验 API：API 外观

    流程 API 和系统 API 都应进行定制和公开，以满足解决方案架构的每个业务渠道和数字接触点的需求。这种适配由期望的数字体验塑造，我们称之为体验 API。这通过
    API 外观实现。API 外观模式的目标是阐明内部系统，并通过提供良好的 APX（API 体验）使其对应用开发者有用。


    服务层实现

    服务层实现应用程序的业务逻辑：可重用逻辑、特定于流程的逻辑以及与遗留系统交互的逻辑。在服务层的实现中，使用了依赖注入设计模式。依赖注入背后的通用概念称为控制反转。如果类
    `A` 将类 `B` 用作变量，则类 `A` 依赖于类 `B`。如果使用依赖注入，则类 `B` 通过类 `A` 的构造函数提供给类 `A`。这称为“构造器注入”。如果使用
    setter，则称为“setter 注入”。

    一个类不应自行配置，而应从外部进行配置。基于独立类/组件的设计可提高可重用性。基于依赖注入的软件设计可以使用标准 Java 实现。用于练习实现的 Micronaut
    框架通过提供标准的配置方式和管理对已创建对象的引用来简化依赖注入的使用。Micronaut 提供的基本功能是依赖注入。Micronaut 为依赖注入 (DI)
    提供了一个轻量级容器。此容器允许您将所需的对象注入到其他对象中。这导致了一种 Java 类非硬耦合的设计。


