  raw: "*   You need to use the Path annotation in JAX-RS to define a URI\n    matching\
    \ pattern for incoming HTTP requests. You can place it on a class\n    or on one\
    \ or more methods. If you want a class to receive HTTP requests,\n    you must\
    \ annotate it with at least @Path(“/”). This annotated class is\n    then called\
    \ a JAX-RS root resource.\n\n*   To use the @Path annotation, you provide a URI\
    \ expression that is\n    relative to the context root of your JAX-RS application.\n\
    \n@javax.ws.rs.Path\n\n*   PathParam allows you to extract values from URI template\n\
    \    parameters.\n\n@javax.ws.rs.PathParam\n\n*   QueryParam allows you to extract\
    \ values from URI query\n    parameters.\n\n@javax.ws.rs.QueryParam\n\n*   FormParam\
    \ allows you to extract values from posted form\n    data.\n\n@javax.ws.rs.FormParam\n\
    \n*   HeaderParam allows you to extract values from HTTP request\n    headers.\n\
    \n@javax.ws.rs.HeaderParam\n\n*   CookieParam allows you to extract values from\
    \ HTTP cookies set by\n    the client.\n\n@javax.ws.rs.CookieParam\n\n*   MatrixParam\
    \ allows you to extract values from URI matrix\n    parameters.\n\n@javax.ws.rs.MatrixParam\n\
    \n*   The Context class is the all-purpose\n    injection annotation. It allows\
    \ you to inject various helper and\n    informational objects that are provided\
    \ by the JAX-RS API.\n\n@javax.ws.rs.core.Context\nThe following are a few examples\
    \ of JAX-RS injections.\n\nPath Parameter\n\nOne parameter:\n\n```\n@Path(\"/customers/{id}\"\
    )\npublic String getCustomer(@PathParam(\"id\") int id);\n```\n\nMultiple parameters:\n\
    \n```\n@Path(\"/products/{name}-{version}\")\npublic String getProduct(@PathParam(\"\
    name) String name, @PathParam(\"version\") String version)\n```\n\nQuery Parameter\n\
    \nRequesting subset by qualifying with query parameter:\n\n```\nhttp://restapi/products?start=0&count=10\n\
    @GET\n@Produces(\"application/json\")\npublic String getProducts(@QueryParam(\"\
    start\") int start, @QueryParam(\"count\") int count);\npublic String getProducts(@Context\
    \ Uriinfo info)\nString info.getQueryParameters().getFirst(\"start\");\n```\n\n\
    Cookie Parameter\n\nUse @CookieParam\nto retrieve individual value:\n\n```\npublic\
    \ string get(@CookieParm(\"userId\" String userId)\n```\n\nHeader Parameter\n\n\
    Used for injecting HTTP header values:\n\n```\npublic String get(@HeaderParam(\"\
    Accept\") String accept)\n```\n\nForm Parameter\n\n@FormParam is used\nto retrieve\
    \ information from the request body of HTML:\n\n```\n@Path(\"/product\")\n@POST\n\
    createProduct( @FormParm(\"name\") String, productName, @FormParm(\"description\"\
    ) String description,..\n```\n\nMatrix Parameter\n\nMatrix parameters\nare used\
    \ to qualify individual path segments, not the complete URI:\n\n```\nResponse\
    \ getBooks(@PathParam(\"year\") String year, @MatrixParam(\"author\") String author,\
    \ @MatrixParam(\"country\") String country) {\nConsider the following request\
    \ that is asking for all the books published in year 2016 by author bill in country\
    \ usa.\n\"/books/2016;author=bill;country=usa\"\ngetBooks is called with year\
    \ set to 2016, author set to bill, and country set to usa.\n```\n\nMicronaut Implementation\
    \ of JAX-RS\nBy default, Micronaut users define their\n[HTTP Routing](https://docs.micronaut.io/latest/guide/#routing)\
    \ using the Micronaut\n@Controller annotation and other built-in [Routing Annotations](https://docs.micronaut.io/latest/guide/#_routing_annotations).\
    \ However, [Micronaut JAX-RS](https://micronaut-projects.github.io/micronaut-jaxrs/latest/guide/)\
    \ allows you to\ndefine your Micronaut endpoints with JAX-RS annotations. Micronaut\n\
    JAX-RS adds support for using JAX-RS annotations and types in a\nMicronaut application\
    \ with the aim of helping migrate existing JAX-RS\napplications or support teams\
    \ who prefer the JAX-RS annotations.\nThis project is not an implementation of\
    \ the JAX-RS specification and\nis designed to allow users familiar with the JAX-RS\
    \ API to use the most\ncommon parts of the API within the context of a Micronaut\n\
    application.\n\nTo use this project, you add the following annotation processor\
    \ to any\nMicronaut project:\n\n```\n\nio.micronaut.jaxrs\nmicronaut-jaxrs-processor\n\
