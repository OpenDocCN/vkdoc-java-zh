    总结

    在本章中，我们回顾了用于保护 RESTful API 安全的 OAuth 2 标准，并完成了一个关于实现基本 Spring Security 的练习。我们还回顾了有关
    HTTP、服务器和 JWT 实现的概念。

    总而言之，本书从架构、设计和编码三个层面回顾了 REST API 的概念。

    架构方面涵盖的主题包括：Web 架构风格、API 解决方案架构、API 组合架构、API 平台架构、API 管理和 Security-OAuth。

    设计方面涵盖的主题包括：REST API 基础、数据交换格式、SOAP 与 REST 对比、XML 与 JSON 对比、API 设计简介（REST 和 JAX-RS）、API
    设计最佳实践、建模 RESTful API、构建 RESTful API 框架、与 RDBMS（MySQL）和 NoSQL 数据库交互、消费 RESTful
    API（即 JSON 和 XML）以及安全性。

    我们还在编码方面完成了练习，以理解每个概念如何在每章末尾实现。


