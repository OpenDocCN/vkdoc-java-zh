  \n-Amicronaut.processing.group=com.rest\n-Amicronaut.processing.module=quote\n\n\
  ```\n\n**产品**\n\n这是一个定义产品或目录属性的 POJO：\n\n```java\npackage com.rest.domain;\nimport\
  \ io.swagger.v3.oas.annotations.media.Schema;\nimport javax.persistence.*;\nimport\
  \ javax.validation.constraints.Size;\n@Schema(description=\"Product\")\n@Entity\n\
  public class Product {\n@Id\n@GeneratedValue(strategy = GenerationType.IDENTITY)\n\
  @Column(name=\"ID\")\nprivate Long id;\n@Column(name=\"NAME\")\n@Size(max = 20)\n\
  private String name;\n@Column(name=\"DESCRIPTION\")\n@Size(max = 50)\nprivate String\
  \ description;;\n@Column(name=\"CREATE_DATE\")\n@Size(max = 40)\nprivate String\
  \ createDate;;\n@Column(name=\"CHANGE_DATE\")\n@Size(max = 40)\nprivate String changeDate;;\n\
  @Column(name=\"UNIT_PRICE\")\n@Size(max = 20)\nprivate float unitPrice;;\n@Column(name=\"\
  CREATOR\")\nprivate String creator;\npublic Long getId() {\nreturn id;\n}\npublic\
  \ void setId(Long id) {\nthis.id = id;\n}\npublic String getName() {\nreturn name;\n\
  }\npublic void setName(String name) {\nthis.name = name;\n}\npublic String getDescription()\
  \ {\nreturn description;\n}\npublic void setDescription(String description) {\n\
  this.description = description;\n}\npublic String getCreateDate() {\nreturn createDate;\n\
  }\npublic void setCreateDate(String createDate) {\nthis.createDate = createDate;\n\
  }\npublic String getChangeDate() {\nreturn changeDate;\n}\npublic void setChangeDate(String\
  \ changeDate) {\nthis.changeDate = changeDate;\n}\npublic float getUnitPrice() {\n\
  return unitPrice;\n}\npublic void setUnitPrice(float unitPrice) {\nthis.unitPrice\
  \ = unitPrice;\n}\npublic String getCreator() {\nreturn creator;\n}\npublic void\
  \ setCreator(String creator) {\nthis.creator = creator;\n};\n}\n```\n\n**报价**\n\n\
  这是一个报价 POJO，包含报价属性并映射到报价行：\n\n\n```java\npackage com.rest.domain;\nimport io.swagger.v3.oas.annotations.media.Schema;\n\
  import javax.persistence.*;\nimport javax.validation.constraints.Size;\nimport java.util.List;\n\
  @Schema(description=\"报价单\")\n@Entity\npublic class Quote {\n@Id\n@GeneratedValue(strategy\
  \ = GenerationType.IDENTITY)\n@Column(name=\"ID\")\nprivate Long id;\n@Column(name=\"\
  CUSTOMER_ID\")\nprivate Long customerId;\n@Column(name=\"QUOTE_DATE\")\n@Size(max\
  \ = 50)\nprivate String quoteDate;;\n@Column(name=\"BILLING_ADDRESS\")\n@Size(max\
  \ = 20)\nprivate String billingAddress;\n@Column(name=\"BILLING_CITY\")\n@Size(max\
  \ = 20)\nprivate String billingCity;;\n@Column(name=\"BILLING_STATE\")\n@Size(max\
  \ = 20)\nprivate String billingState;;\n@Column(name=\"BILLING_COUNTRY\")\n@Size(max\
  \ = 20)\nprivate String billingCountry;;\n@Column(name=\"BILLING_POSTAL_CODE\")\n\
  @Size(max = 20)\nprivate String billingPostalCode;;\n@Column(name=\"TOTAL\")\n@Size(max\
  \ = 20)\nprivate float total;\n@OneToMany (fetch = FetchType.EAGER, cascade = CascadeType.ALL)\n\
  @JoinTable(name = \"Quote_Line_Mapping\",\njoinColumns = @JoinColumn(name = \"quote_id\"\
  ),\ninverseJoinColumns = @JoinColumn(name = \"id\"))\nprivate List quoteLines;\n\
  public void setQuoteLines(List quoteLines) {\nthis.quoteLines = quoteLines;\n}\n\
  public List getQuoteLines() {\nreturn quoteLines;\n}\npublic Long getId() {\nreturn\
  \ id;\n}\npublic void setId(Long id) {\nthis.id = id;\n}\npublic Long getCustomerId()\
  \ {\nreturn customerId;\n}\npublic void setCustomerId(Long customerId) {\nthis.customerId\
  \ = customerId;\n}\npublic String getQuoteDate() {\nreturn quoteDate;\n}\npublic\
  \ void setQuoteDate(String quoteDate) {\nthis.quoteDate = quoteDate;\n}\npublic\
  \ String getBillingAddress() {\nreturn billingAddress;\n}\npublic void setBillingAddress(String\
  \ billingAddress) {\nthis.billingAddress = billingAddress;\n}\npublic String getBillingCity()\
  \ {\nreturn billingCity;\n}\npublic void setBillingCity(String billingCity) {\n\
  this.billingCity = billingCity;\n}\npublic String getBillingState() {\nreturn billingState;\n\
  }\npublic void setBillingState(String billingState) {\nthis.billingState = billingState;\n\
  }\npublic String getBillingCountry() {\nreturn billingCountry;\n}\npublic void setBillingCountry(String\
  \ billingCountry) {\nthis.billingCountry = billingCountry;\n}\npublic String getBillingPostalCode()\
  \ {\nreturn billingPostalCode;\n}\npublic void setBillingPostalCode(String billingPostalCode)\
