- "# 3. 引言：XML 与 JSON\n\n本章介绍 XML 和 JSON 的基本概念。在本章末尾，有一个练习，演示如何从 Micronaut 应用返回 XML\
  \ 和 JSON 响应。\n\n\n\n## 什么是 XML？\n\n可**扩**展**标**记**语**言（XML）是一种基于文本的标记语言，是 Web 上数据交换的标准。与\
  \ HTML 类似，你可以使用[标签](https://www2.informatik.hu-berlin.de/~xing/Lib/Docs/jaxp/docs/tutorial/glossary.html%25252525252525252525252525252525252525252525252525252523tag)（用尖括号括起来的标识符，例如：`<...>`）来标识数据。这些标签统称为“标记”。它给一段数据贴上标签以标识其身份（例如：`<message>...</message>`）。就像你可以为数据结构定义字段名一样，你也可以自由使用任何对特定应用有意义的\
  \ XML 标签。当然，为了让多个应用能使用同一份 XML 数据，它们必须就打算使用的标签名称达成一致。以下是一个你可能用于消息传递应用的 XML 数据示例：\n\
  \n```\nyou@yourAddress.com\nme@myAddress.com\nXML 真的很酷>\n\n让我数数 XML 酷在哪些方面...\n\n\
  ```\n\n标签还可以在其尖括号内包含[属性](https://www2.informatik.hu-berlin.de/~xing/Lib/Docs/jaxp/docs/tutorial/glossary.html%25252525252525252525252525252525252525252525252525252523attribute)（作为标签本身一部分的附加信息）。如果你认为所讨论的信息是\
  \ XML 中表达或传达的核心内容的一部分，则应将其放入元素中。对于人类可读的文档，这通常意味着向读者传达的核心内容。对于面向机器的记录格式，这通常意味着直接来自问题领域的数据。如果你认为该信息是主要通信内容的次要或附带信息，或者纯粹是为了帮助应用程序处理主要通信内容，则应使用属性。以下示例展示了一个电子邮件消息结构，其中对\
  \ `to`、`from` 和 `subject` 字段使用了属性：\n\n```\n\n让我数数 XML 酷在哪些方面...\n\n```\n\nXML 与\
  \ HTML 的一个重大区别在于，XML 文档始终必须保持[格式良好](https://www2.informatik.hu-berlin.de/~xing/Lib/Docs/jaxp/docs/tutorial/overview/4_design.html)。有若干规则决定文档是否格式良好，但其中最重要的一条是每个标签都有对应的结束标签。因此，在\
  \ XML 中，`</to>` 标签是不可省略的。`<to>` 元素绝不会被除 `</to>` 之外的任何标签终止。\n\n注意\n\n格式良好文档的另一个重要方面是所有标签必须完全嵌套。因此，你可以有\
  \ `<message>..<to>..</to>..</message>`，但绝不能出现 `<message>..<to>..</message>..</to>`。\n\
  \nXML Schema 是一种用于表达对 XML 文档约束的语言。目前有几种广泛使用的不同模式语言，但最主要的是文档类型定义（DTD）。它定义了 XML 文档的合法构建块。它还通过一系列合法的元素和属性来定义文档结构。\n\
  \n### XML 注释\n\nXML 注释看起来与 HTML 注释完全相同：\n\n```\n\n让我数数 XML 酷在哪些方面...\n\n```\n\n\
  为了完成对 XML 的简要介绍，请注意 XML 文件总是以[序言](https://www2.informatik.hu-berlin.de/~xing/Lib/Docs/jaxp/docs/tutorial/glossary.html%25252525252525252525252525252525252525252525252525252523prolog)开头。最小的序言包含一个[声明](https://www2.informatik.hu-berlin.de/~xing/Lib/Docs/jaxp/docs/tutorial/glossary.html%25252525252525252525252525252525252525252525252525252523declaration)，用于标识该文档为\
  \ XML 文档，如下所示：\n\n```\n\n该声明还可能包含附加信息，如下所示：\n\n*   **版本**：标识数据中使用的 XML 标记语言的版本。此属性不可省略。\n\
  \n*   **编码**：标识用于编码数据的字符集。“ISO-8859-1”即“Latin-1”，是西欧和英语语言字符集。（默认是压缩的 Unicode：UTF-8。）\n\
  \n*   **独立**：告知此文档是否引用了外部实体或外部数据类型规范。如果没有外部引用，则使用“yes”。\n\n```\n\n为什么 XML 很重要？\n\
  \n它之所以重要，是因为它允许灵活地开发用户自定义的文档类型，这意味着它提供了一种持久、健壮、非专有且可验证的文件格式，可用于在 Web 上及 Web 之外存储和传输数据。此外，XML\n\
  \n*   **提供纯文本**：纯文本使其具有可读性。\n\n*   **提供数据标识**：通过使用标签，可以标识数据。\n\n*   **提供样式化能力**：使用\
  \ XSLT（可扩展样式表语言转换），数据可以呈现为可展示的形式。\n\n*   易于处理（XML 解析器以及格式良好的解析器）。\n\n*   是层次化的（通过嵌套标签）。\n\
  \n如何使用 XML？\n\n有几种基本方式可以利用 XML：\n\n*   **文档驱动编程**：其中 XML 文档是容器，用于从现有组件构建界面和应用程序。\n\
  \n*   **归档**：文档驱动编程的基础，其中组件的定制版本被保存（归档）以便以后使用。\n\n*   **绑定**：其中定义 XML 数据结构的 DTD\
  \ 或模式被用于自动生成最终将处理该数据的应用程序的很大一部分。\n\nXML 的优缺点\n\nXML 的一些优缺点说明如下：\n\n*   优点\n\n* \
  \  开发者可读可编辑。\n\n*   通过 schema 和 DTD 进行错误检查。\n\n*   可以表示复杂的数据层次结构。\n\n*   Unicode\
  \ 为国际化操作提供了灵活性。\n\n*   所有计算机语言中都有大量用于创建和解析的工具。\n\n*   缺点\n\n*   文本冗长，有效载荷/格式比率低（但可以压缩）。\n\
  \n*   创建和客户端解析都需要大量 CPU 资源。\n\n*   常见的文字处理字符是非法的（例如 MS Word 的“智能”标点）。\n\n*   图像和其他二进制数据需要额外编码。\n\
  \n什么是 JSON？\n\nJSON 或 JavaScript 对象表示法是一种轻量级的基于文本的开放标准，专为人类可读的数据交换而设计。JSON 使用的约定为程序员所熟知，包括那些了解\
  \ C、C++、Java、Python、Perl 等语言的程序员。\n\n*   该格式由 Douglas Crockford 制定。\n\n*   它专为人类可读的数据交换而设计。\n\
  \n*   它从 JavaScript 脚本语言扩展而来。\n\n*   文件扩展名是 `.json`。\n\n*   JSON 的互联网媒体类型是 `application/json`。\n\
  \n*   JSON 易于读写。\n\n*   JSON 与语言无关。\n\nJSON 语法\n\n在本节中，我们将讨论 JSON 的基本数据类型及其语法。图\
  \ 3-1 展示了 JSON 的基本数据类型。\n\n![](img/427457_3_En_3_Fig1_HTML.jpg)\n\n\n\n图示说明“值”类别下的\
  \ JSON 数据类型。这些类型包括字符串、数字、对象、数组、true、false 和 null，每种类型都通过线条与顶层的“值”标签相连。\n\n图 3-1\n\
  基本数据类型\n\n该图展示了可在各种数据类型中使用的值。这些数据类型包括字符串、数字、对象、数组、true、false 和 null。\n\n字符串\n字符串用双引号括起来，可以包含常见的转义字符序列。\n\
  \n数字\n数字采用常见的 C/C++/Java 语法，包括指数（E）表示法。所有数字都是十进制——没有八进制或十六进制。\n\n对象\n对象是一个无序的名称/值对集合。这些值对用花括号（`{\
  \ }`）括起来。\n\n示例：\n\n```\n{ \"name\": \"html\", \"years\": 5 }\n```\n\n值对之间用逗号分隔。名称和值之间有一个冒号。\n\
  \nJSON 对象的语法如图 3-2 所示。\n\n![](img/427457_3_En_3_Fig2_HTML.jpg)\n\n图示说明 JSON 对象的结构。它以左花括号开始，后跟一系列键值对。每个键值对由一个“字符串”键、一个冒号和一个“值”组成。多个值对之间用逗号分隔。对象以右花括号结束。\n\
  \n图 3-2\nJSON 对象\n\n该图描绘了 JSON 的对象、字符串和值结构。\n\n数组\n\n数组是一个有序的值集合。这些值用方括号括起来。JSON\
  \ 数组的语法如图 3-3 所示。\n\n![](img/427457_3_En_3_Fig3_HTML.jpg)\n\n图示说明带有循环的数组结构。数组在左侧标记，一个循环连接标记为“i”和“j”的两个点，中间有一个标记为“值”的方框。该循环表示对数组元素的迭代。\n\
  \n图 3-3\nJSON 数组\n\n该图描绘了 JSON 的数组和值结构。\n\n布尔值\n它可以有 true 或 false 值。\n\nNull\n其值为空。\n\
  \n为什么 JSON 很重要？\n\nJSON 作为一种数据交换格式正变得非常流行（比它比 XML 更简洁更重要），这是有原因的：程序员厌倦了编写解析器！但“等等，”你可能会说。“肯定有现成的\
  \ XML 解析器可供使用，这样你就不必自己动手了。”是的，确实有。但是，虽然 XML 解析器处理 XML 标签、属性等的底层语法解析，你仍然需要遍历 DOM\
  \ 树，或者更糟的是，仅凭一个 SAX 解析器自己构建一个 DOM 树（说的就是你，Objective-C iPhone SDK！）。而你编写的代码当然取决于你需要理解的\
  \ XML 看起来像这样：\n\n```\n\n```\n\n还是这样：\n\n```\n\n2 John\n3 Smith\n\n```\n\n或者这样：\n\
  \n```\n\n2 John\n3 Smith\n\n```\n\n或者任何其他无数种表达同一概念的方式（而且有很多）。标准的 XML 解析器在这方面帮不了你。你仍然需要对解析树做一些工作。\n\
  \n使用 JSON 是一种不同的、更优越的体验。首先，更简单的语法帮助你避免在多种不同的数据表示方式之间做选择（就像我们之前看到的 XML 那样），更不用说选择哪种方式会让自己陷入困境了。通常，只有一种直接的方式来表示某些内容：\n\
  \n```\n1 { \"first-name\" : \"John\",\n2 \"last-name\" : \"Smith\" }\n```\n\n如何使用\
  \ JSON？\n\n以下讨论如何使用 JSON：\n\n*   在编写包含浏览器扩展和网站的基于 JavaScript 的应用程序时使用。\n\n*   JSON\
  \ 格式用于通过网络连接序列化和传输结构化数据。它主要用于在服务器和 Web 应用程序之间传输数据。\n\n*   Web 服务和 API 使用 JSON 格式提供公共数据。\n\
  \nJSON 的优缺点\n以下是 JSON 的优缺点：\n\n优点\n\n*   易于读/写/解析\n\n*   相当简洁（例如，与 XML 相比）\n\n*\
  \   通用的“标准”，有许多可用的库\n\n缺点\n\n*   不如二进制格式轻量。\n\n*   不能使用注释。\n\n*   它是“封装的”，意味着你不能轻易地流式传输/追加数据，而必须将其分解成单个对象。XML\
  \ 也有同样的问题，而 CSV 则没有。\n\n*   难以描述你正在呈现的数据（使用 XML 更容易）。\n\n*   无法强制执行或验证结构/模式。\n\n\
  XML 与 JSON 比较\n\n本节基于不同属性比较 XML 和 JSON。\n\n表 3-1\nXML 与 JSON 比较\n\n属性 |\n XML |\n\
  \ JSON |\n\n| --- | --- | --- | --- | --- | --- | --- |\n\n简单性 |\n XML 简单且人类可读 |\n\
  \ JSON 比 XML 更简单，且人类可读 |\n\n自描述性 |\n 是 |\n 是 |\n\n处理 |\n XML 易于处理 |\n JSON 更易于处理，因为其结构更简单\
  \ |\n\n性能 |\n 由于标签，未针对性能进行优化 |\n 由于体积小，比 XML 更快 |\n\n开放性 |\n XML 是开放的 |\n JSON 至少与\
  \ XML 一样开放，甚至可能更开放，因为它不在企业/政治标准化斗争的中心 |\n\n面向对象 |\n XML 面向文档 |\n JSON 面向数据。JSON\
  \ 可以更容易地映射到面向对象系统 |\n\n互操作性 |\n XML 可互操作 |\n JSON 具有与 XML 相同的互操作性潜力 |\n\n国际化 |\n\
  \ 支持 Unicode |\n 支持 Unicode |\n\n可扩展性 |\n XML 是可扩展的 |\n JSON 不可扩展，因为它不需要扩展。JSON\
  \ 不是文档标记语言，因此无需定义新标签或属性来表示其中的数据 |\n\n采用率 |\n XML 被业界广泛采用 |\n JSON 刚刚开始为人所知。其简单性以及将\
  \ XML 转换为 JSON 的便利性使得 JSON 最终更易于被采用 |\n\n实现返回 XML 和 JSON 消息的 API\n[`https://micronaut.io/launch/`](https://micronaut.io/launch/)\n\
