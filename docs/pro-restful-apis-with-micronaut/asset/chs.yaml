  \n图 3-4\n创建应用程序代码的命令行选项截图\n\n代码生成后，切换到 message 文件夹。以下代码创建了一个带有属性 message 的域对象 Message。\n\
  \n```\npackage com.rest.model;\nimport javax.validation.constraints.NotNull;\npublic\
  \ class Message {\n@NotNull\nprivate String message;\npublic String getMessage()\
  \ {\nreturn message;\n}\npublic void setMessage(String message) {\nthis.message\
  \ = message;\n}\n}\n~\n```\n\n现在，在导航到 Micronaut 生成的 message 代码后，在 src/main/java/com/rest\
  \ 文件夹中创建一个新的控制器文件夹。\n\n以下代码暴露了两个端点：\n\n1.  message/xml 用于以 XML 格式获取消息属性值\n\n2. \
  \ message/json 用于以 JSON 格式获取消息属性值\n\n\n\n```\npackage com.rest.controllers;\nimport\
  \ com.rest.model.Message;\nimport io.micronaut.http.annotation.Get;\nimport io.micronaut.http.annotation.Controller;\n\
  import io.micronaut.http.HttpResponse;\nimport io.micronaut.http.MediaType;\nimport\
  \ io.micronaut.http.annotation.Produces;\n@Controller(\"/message\")  // \npublic\
  \ class MessageController {\n@Produces(MediaType.TEXT_XML)\n@Get(\"/xml\")\npublic\
  \ HttpResponse messageXml() {\nMessage message = new Message();\nmessage.setMessage(\"\
  Hello from Micronaut\");\nfinal String xml = encodeAsXml(message);\nreturn HttpResponse.ok(xml).contentType(MediaType.APPLICATION_XML_TYPE);\n\
  }\n@Produces(MediaType.TEXT_JSON)\n@Get(\"/json\")\npublic HttpResponse messageJson()\
  \ {\nMessage message = new Message();\nmessage.setMessage(\"Hello from Micronaut\"\
  );\nreturn HttpResponse.ok(message);\n}\nprivate String encodeAsXml(final Message\
  \ message) {\nreturn String.format(\"%s\", message.getMessage());\n}\n}\n```\n\n\
  你可以使用以下命令在 `message` 文件夹中运行代码：\n\n```\n./mvnw mn:run\n```\n\n*使用* *POSTMAN* *按照截图查看消息的\
  \ JSON 和 XML 响应*\n\n![](img/427457_3_En_3_Fig5_HTML.jpg)\n\nREST 客户端界面中 GET 请求的截图。URL\
  \ 为\n\"http://localhost:8080/message/json\"。Headers 选项卡处于激活状态，显示\n两个标头：\"Accept\"\
