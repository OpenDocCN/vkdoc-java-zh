  引言


  数据库、网站和业务应用程序需要交换数据。这通过定义标准数据格式（如可扩展标记语言（XML）或 JavaScript 对象表示法（JSON））以及传输协议或 Web
  服务（如简单对象访问协议（SOAP）或更流行的表述性状态转移（REST））来实现。开发人员通常需要设计自己的应用程序编程接口（API），以便在集成围绕操作系统或服务器的特定业务逻辑时使应用程序正常工作。本书将介绍这些概念，并重点关注
  RESTful API。


  本书介绍了数据交换机制和常见数据格式。对于 Web 交换，您将学习 HTTP 协议，包括如何使用 XML。本书比较了 SOAP 和 REST，然后介绍了无状态传输的概念。它介绍了软件
  API 设计和最佳设计实践。本书后半部分重点介绍遵循 Micronaut 和用于 RESTful Web 服务的 Java API 的 RESTful API
  设计与实现。您将学习如何使用 JSON 和 XML 构建和使用 Micronaut 服务，并通过动手练习将 RESTful API 与关系数据库和 NoSQL
  数据库等不同数据源集成。您将应用这些最佳实践，通过一个小型软件系统对公开可用的 API 完成设计审查，以设计和实现 RESTful API。


  本书面向在项目中使用数据的软件开发人员。它对于需要了解数据交换方法以及如何与业务应用程序交互的数据专业人员也很有用。练习需要具备 Java 编程经验。


  本书涵盖的主题包括


  *   数据交换与 Web 服务


  *   SOAP 与 REST 对比，有状态与无状态对比


  *   XML 与 JSON 对比


  *   API 设计简介：REST 与 Micronaut


  *   API 设计实践


  *   设计 RESTful API


  *   构建 RESTful API


  *   与 RDBMS（MySQL）交互


  *   使用 RESTful API（即 JSON 和 XML）


