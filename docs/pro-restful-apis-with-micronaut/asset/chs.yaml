  \ 版本为 4.7.1，语言为 Java，构建工具为 Maven，测试框架为 JUnit。\n\n![](img/427457_3_En_3_Fig4_HTML.jpg)\n\
  \n该图片显示了一个使用 CLI 创建 Micronaut 应用程序的用户界面。显示的命令是 \"mn create-app --build=maven --jdk=21\
  \ --lang=java --test=junit com.rest.message\"。选择的选项包括 Micronaut Application 类型、Java\
