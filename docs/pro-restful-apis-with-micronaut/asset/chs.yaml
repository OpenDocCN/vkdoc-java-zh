  micronaut-reactor-http-client\ncompile\n\nio.micronaut.sql\nmicronaut-jdbc-hikari\n\
  compile\n\nio.micronaut.data\nmicronaut-data-hibernate-jpa\n\nio.micronaut.sql\n\
  micronaut-hibernate-jpa\n\nio.swagger.core.v3\nswagger-annotations\n\njakarta.annotation\n\
  jakarta.annotation-api\ncompile\n\nch.qos.logback\nlogback-classic\nruntime\n\n\
  com.h2database\nh2\nruntime\n\nio.micronaut.build\nmicronaut-maven-plugin\n\norg.apache.maven.plugins\n\
  maven-compiler-plugin\n\nfalse -->\n\nio.micronaut\nmicronaut-http-validation\n\
