  import io.swagger.v3.oas.annotations.info.Contact;\nimport io.swagger.v3.oas.annotations.info.Info;\n\
  import io.swagger.v3.oas.annotations.info.License;\n@OpenAPIDefinition(\ninfo =\
  \ @Info(\ntitle = “Flight\",\nversion = \"0.1\",\ndescription = \"Flight API\",\n\
