  \ |\n 无等效项。将 Bean 注入参数 |\n `@Context` |\n\n可注入参数类型\n\n除了受支持的 JAX-RS 注解外，你还可以使用以下\
  \ JAX-RS 类型作为资源或客户端定义的参数类型：\n\n*   [jakarta.​ws.​rs.​core.​HttpHeaders](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/HttpHeaders.html)\n\
  \n*   [jakarta.​ws.​rs.​core.​CacheControl](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/CacheControl.html)\n\
  \n*   [jakarta.​ws.​rs.​core.​Cookie](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/Cookie.html)\n\
  \n*   [jakarta.​ws.​rs.​core.​EntityTag](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/EntityTag.html)\n\
  \n*   [jakarta.​ws.​rs.​core.​Link](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/Link.html)\n\
  \n*   [jakarta.​ws.​rs.​core.​MediaType](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/MediaType.html)\n\
  \n*   [jakarta.​ws.​rs.​core.​SecurityContext](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/SecurityContext.html)\n\
  \n你还可以使用 [@Context](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/Context.html)\
  \ 注解将任何 Bean 注入到资源类型的方法参数中。\n\nSecurityContext 与 Micronaut Security\n默认情况下，当注入 [SecurityContext](https://jakarta.ee/specifications/restful-ws/3.0/apidocs//jakarta/ws/rs/core/SecurityContext.html)\
  \ 时，注入的实例无法感知 [Micronaut Security](https://micronaut-projects.github.io/micronaut-security/latest/guide/)，并且像\
  \ `isUserInRole` 这样的方法始终返回 false。\n\n要将 JAX-RS 支持与 Micronaut Security 集成，请添加以下依赖项：\n\
  \n```\nio.micronaut.jaxrs\nmicronaut-jaxrs-server-security\n\n```\n\n添加上述依赖项后，如果在\
  \ Micronaut Security 的 [Authentication.​getRoles()](https://micronaut-projects.github.io/micronaut-security/latest/api/io/micronaut/security/authentication/Authentication.html#getRoles%252D%252D)\
  \ 方法中找到了该角色，则 `SecurityContext.isUserInRole` 方法将返回 true。更多信息请参阅[检索已认证用户](https://micronaut-projects.github.io/micronaut-security/latest/guide/#retrievingAuthenticatedUser)。\n\
  \n总结\n我们回顾了 JAX-RS，这是一个基于 POJO、注解驱动的框架，用于构建符合 RESTful 原则的 Web 服务，并介绍了其在 Micronaut\
  \ 中的实现。\n\n6. API 组合与框架\n\n本章首先介绍 API 组合架构，然后深入探讨 API 开发的框架。讨论了从客户端到数据的 API 框架概述，然后重点转向通过一个实现服务层的练习来审视服务层。\n\
  \nAPI 组合架构\n通常，一个组织不会只有一个 API，而是有多个 API。组合中的所有 API 需要彼此保持一致、可重用、可发现且可定制。\n\n需求\n\
  API 组合设计是不同 API 利益相关者关注的问题。设计良好的 API 组合对 API 消费者和生产者都有显著优势，双方都会就一致性、重用性、定制性、可发现性和长期稳定性提出对\
  \ API 组合的需求。\n\n一致性\n一个 API 解决方案（例如移动应用）可能会使用组合中的多个 API，并且一个 API 的输出是另一个 API 的输入。因此，在数据结构、表示形式、URI、错误消息和\
  \ API 行为方面需要保持一致性。如果 API 的行为与上一个类似，并传递类似的错误消息，API 消费者会更容易使用。\n\n重用性\n\n一个一致的组合包含\
  \ API 之间的许多共性。这些共性可以被提取、共享和重用。重用可以加快开发速度。通过重用公共元素，每次构建 API 时无需重新发明轮子。相反，可以共享和重用通用的模式和知识库。重用可以通过以下几种方式实现：\n\
  \n*   多个应用重用同一个 API\n*   多个 API 重用同一个 API\n*   重用 API 的某些部分\n\nAPI 不应为特定消费者开发。API\
  \ 应始终被多个消费者、解决方案或项目使用。\n\n定制性\n如果 API 的消费者不是一个同质群体，那么可能会有消费者对 API 有特定需求。在这种情况下，需要对\
  \ API 进行定制以满足消费者的个性化需求。这与重用需求相矛盾，但两者可以同时实现。\n\n可发现性\n为了扩大 API 的使用范围，API 消费者应该能够轻松地找到并发现\
  \ API 组合中的所有 API。API 组合设计需要确保 API 能够被找到，并且所有正确使用所需的信息都是可用的。\n\n长期稳定性\n这意味着 API 的重要方面不会改变，并在很长一段时间内保持稳定。需要稳定的是\
  \ API 的签名，即面向客户端的接口。签名的更改将破坏 API 消费者构建的应用。例如，对于“硬件设备”上的物联网，更改并不容易。\n\n我们如何强制执行这些需求——治理？\n\
  API 计划通常被视为企业的创新实验室。施加治理可能会与创新相矛盾。因此，为了管理这些相互冲突的需求，API 组合可以拆分为两个组合。一个组合专门用于创新和实验。该组合需要轻量级的治理流程。另一个组合专门用于稳定、生产级的\
  \ API，这些 API 提供给外部 API 消费者。\n\n一致性\n每个企业都可以实现自己的一套一致性规则。定义一致性规则后，一致性检查可以手动或自动执行。轻量级的一致性检查可以通过手动质量检查或同事审查来实现。一种补充方法是基于\
  \ API 描述进行自动代码生成。\n\n重用性\nAPI 平台提供两种类型的构建块，例如安全、日志记录和错误处理程序。任何其他功能共性或可重用的解决方案模式都可以作为构建块的组合来实现。你可以拥有“自己的”API\
  \ 或第三方 API。第三方 API 可以通过在其“自己的”平台上创建 API 代理来集成到 API 平台中。这有助于消费者实现同质化的安全。API 代理和 API\
  \ 平台架构将在下一章讨论。\n\n定制性\nAPI 消费者关心的是数据格式化和数据交付。然而，数据收集不是 API 消费者关心的问题。因此，这些可以分成两部分：一个我们称之为“工具\
  \ API”的 API 负责数据收集；另一个根据消费者需求交付数据和格式的 API 称为“消费者 API”。消费者不能直接调用工具 API；只有消费者 API\
  \ 才能调用它们。\n\n可发现性\n这可以是手动的或自动的。手动：通过 API 目录或黄页发现。自动：基于 SOAP 的通过 UDDI 和 WSDL 发现。REST：通过\
  \ HTTP 的 OPTIONS 动词实现有限的可发现性。\n\n变更管理\n\n\n\n从创新或业务角度来看，存在尽早发布 API 的驱动力。从 IT 治理角度来看，API\
  \ 则应尽可能晚发布。作为一种折衷方案，API 可以早期发布，但仅限试点消费者使用，并预期会存在变更，且 API 将导致应用中断。变更分为三类：向后兼容、向前兼容和不兼容。如果旧客户端能够与新\
  \ API 交互，则视为向后兼容（例如，添加可选的查询参数、标头参数或表单参数；在 JSON 或 XML 中添加可选的新字段；添加端点，如新的 REST 资源；为现有端点添加新操作，如在\
  \ SOAP 中；向请求接口添加可选字段；将现有 API 中的必填字段改为可选字段）。如果新客户端能够与旧 API 交互，则视为向前兼容。这很难实现，通常属于锦上添花的功能。\n\
  \n*   **不兼容的变更**：如果 API 的变更导致客户端中断，则该变更为不兼容变更。\n\n*   **移除**：重命名数据结构中的字段或请求/响应中的参数。\n\
  \n*   **更改 URI**：例如，主机名和端口。\n\n*   **更改数据结构**：将一个字段设为另一个字段的子字段。在数据结构中添加新的必填字段。\n\
  \nAPI 框架\n正如我们所讨论的，API 有多种解决方案，例如，Web 应用程序、移动应用程序等。每种解决方案都与通过使用设计模式的多层架构实现的 API\
  \ 进行通信。**设计模式**是针对软件**设计**中特定上下文中常见问题的通用可重用解决方案。**设计模式**并非可以直接转换为源代码或机器代码的成品**设计**。\n\
  \n多层框架如图 6-1 所示。\n\n![](img/427457_3_En_6_Fig1_HTML.jpg)\n\n图示说明分层 API 架构。顶层是“体验\
  \ API”，它将流程和系统 API 适配为针对应用程序定制的微服务。中间层是“流程 API”，通过编排和编舞组合系统 API。底层是“系统 API”，封装了核心业务能力。左侧的垂直箭头表示从“中央\
  \ IT”到“应用开发”的可访问性和所有权逐渐增加。图标代表各种技术，包括 SaaS 应用、大型机、FTP 文件、数据库、Web 服务、遗留系统和应用程序。\n\
  \n图 6-1\nAPI 多层框架\n\n该框架描述了 API 的类型及其组件。应用开发拥有体验 API。业务线开发和 IT 拥有流程 API。中央 IT 拥有系统\
  \ API。可访问性和所有权涵盖 SaaS 应用、大型机、FTP 文件、数据库、Web 服务、遗留系统和应用程序。\n\n*   流程 API 通过服务设计模式实现\n\
  *   系统 API 通过数据访问对象设计模式实现\n*   体验 API 通过 API 外观层设计模式实现\n\n每一层都使用软件工程设计模式实现。\n\n\
  流程 API：服务层\n服务层实现应用程序的业务逻辑：可重用逻辑、特定于流程的逻辑，以及通过编排和编舞与系统 API 交互的逻辑。此处的编排（直接调用）涉及将业务线开发/IT\
  \ 请求与应用程序、数据和基础设施对齐。相比之下，编舞不依赖中央协调器。相反，参与编舞的每个 API 都确切知道何时执行其操作以及与谁交互。\n\n系统 API：数据访问对象\n\
  这些系统 API 或系统级服务符合自治服务的概念，该服务经过设计，具有足够的抽象性，以隐藏底层记录系统，例如，数据库、遗留系统和 SaaS 应用程序。\n通常，数据访问对象\
  \ (DAO) 是一个[对象](https://en.wikipedia.org/wiki/Object_(computer_science)%25252525252525252525252525252525252525252525252525252523Object%252525252525252525252525252525252525252525252525252525252520(computer%252525252525252525252525252525252525252525252525252525252520science))，它为某种类型的[数据库](https://en.wikipedia.org/wiki/Database%25252525252525252525252525252525252525252525252525252523Database)或其他持久化机制提供抽象[接口](https://en.wikipedia.org/wiki/Interface_(computer_science)%25252525252525252525252525252525252525252525252525252523Interface%252525252525252525252525252525252525252525252525252525252520(computer%252525252525252525252525252525252525252525252525252525252520science))。通过将应用程序调用映射到持久化层，DAO\
  \ 提供特定的数据操作，而无需暴露系统的细节。\n\n体验 API：API 外观\n流程 API 和系统 API 都应进行定制和公开，以满足解决方案架构的每个业务渠道和数字接触点的需求。这种适配由期望的数字体验塑造，我们称之为体验\
  \ API。这通过 API 外观实现。API 外观模式的目标是阐明内部系统，并通过提供良好的 APX（API 体验）使其对应用开发者有用。\n\n服务层实现\n\
  服务层实现应用程序的业务逻辑：可重用逻辑、特定于流程的逻辑以及与遗留系统交互的逻辑。在服务层的实现中，使用了依赖注入设计模式。依赖注入背后的通用概念称为控制反转。如果类\
  \ `A` 将类 `B` 用作变量，则类 `A` 依赖于类 `B`。如果使用依赖注入，则类 `B` 通过类 `A` 的构造函数提供给类 `A`。这称为“构造器注入”。如果使用\
  \ setter，则称为“setter 注入”。\n一个类不应自行配置，而应从外部进行配置。基于独立类/组件的设计可提高可重用性。基于依赖注入的软件设计可以使用标准\
  \ Java 实现。用于练习实现的 Micronaut 框架通过提供标准的配置方式和管理对已创建对象的引用来简化依赖注入的使用。Micronaut 提供的基本功能是依赖注入。Micronaut\
  \ 为依赖注入 (DI) 提供了一个轻量级容器。此容器允许您将所需的对象注入到其他对象中。这导致了一种 Java 类非硬耦合的设计。\n\n框架：服务\n\n\
  在上一章中，我们实现了一个用于读取操作的航班乘客 API。本练习使用消息域对象来实现 CRUD（创建、读取、更新和删除）操作。消息域对象结构非常简单。有一个标识消息的\
  \ id，以及我们可以在以下 JSON 表示中看到的其他几个字段：\n\n```\n{ \"id\":1,\n\"message\":\"Welcome\",\n\
  \"from\":\"James\",\n\"to\":\"John\",\n\"creationDate\":1388213547000\n}\n```\n\n\
  **Pom.xml**\n\n将以下内容添加到 pom.xml：\n\n```\njavax.inject\njavax.inject\n\n```\n\n**消息**\n\
  \n以下是定义消息属性的 POJO：\n\n\n\n```\npackage com.rest.model;\npublic class Message {\n\
  private int id;\nprivate String message;\nprivate String from;\nprivate String to;\n\
  private String creationDate;\npublic String getMessage() {\nreturn message;\n}\n\
  public void setMessage(String message) {\nthis.message = message;\n}\npublic String\
  \ getFrom() {\nreturn from;\n}\npublic void setFrom(String from) {\nthis.from =\
  \ from;\n}\npublic String getTo() {\nreturn to;\n}\npublic void setTo(String to)\
  \ {\nthis.to = to;\n}\npublic String getCreationDate() {\nreturn creationDate;\n\
  }\npublic void setCreationDate(String creationDate) {\nthis.creationDate = creationDate;\n\
  }\npublic int getId() {\nreturn id;\n}\npublic void setId(int id) {\nthis.id = id;\n\
  }\n}\n```\n\n**MessageController**\n\n在消息控制器中，我们实现了消息的 CRUD 操作：\n\n```\npackage\
  \ com.rest.controller;\nimport com.rest.model.Message;\nimport com.rest.service.MessageService;\n\
  import io.micronaut.http.annotation.Get;\nimport io.micronaut.http.annotation.Controller;\n\
  import io.micronaut.http.HttpHeaders;\nimport io.micronaut.http.HttpResponse;\n\
  import io.micronaut.http.MediaType;\nimport io.micronaut.http.annotation.Produces;\n\
  import io.micronaut.http.annotation.Controller;\nimport io.micronaut.http.annotation.Delete;\n\
  import io.micronaut.http.annotation.Get;\nimport io.micronaut.http.annotation.Post;\n\
  import io.micronaut.http.annotation.Put;\nimport io.micronaut.http.annotation.Body;\n\
  import java.util.List;\n@Controller(\"/message\")  // \npublic class MessageController\
  \ {\nMessageService messageService;\npublic MessageController(MessageService messageService)\
  \ { // \nthis.messageService = messageService;\n}\n@Produces(MediaType.TEXT_XML)\n\
  @Get(\"/xml\")\npublic HttpResponse messageXml() {\nMessage message = new Message();\n\
  message.setMessage(\"Hello from Micronaut\");\nfinal String xml = encodeAsXml(message);\n\
  return HttpResponse.ok(xml).contentType(MediaType.APPLICATION_XML_TYPE);\n}\n@Produces(MediaType.TEXT_JSON)\n\
  @Get(\"/json\")\npublic Message messageJson() {\nMessage message = new Message();\n\
  message.setMessage(\"Hello from Micronaut\");\nreturn message;\n}\nprivate String\
  \ encodeAsXml(final Message message) {\nreturn String.format(\"%s\", message.getMessage());\n\
  }\n@Post\npublic Message createMessage(@Body Message message) {\nmessageService.createMessage(message);\n\
  return message;\n}\n@Get(\"/{id}\")\npublic Message getMessage (int id)    {\nMessage\
  \ message = messageService.getMessage(id);\nreturn message;\n}\n@Get\npublic List\
  \ getMessages() {\nList messages = messageService.getMessages();\nreturn messages;\n\
  }\n@Put(\"/{id}\")\npublic void updateMessage (int id, @Body Message update) {\n\
  messageService.updateMessage(id, update);\n}\n@Delete(\"/{id}\")\npublic void deleteMessage(int\
  \ id) {\nmessageService.deleteMessage(id);\n}\n}\n```\n\n**MessageService**\n\n\
  所有用于 CRUD（创建、读取、更新和删除）操作的方法，这些操作在内存中处理消息，都被移到了这里：\n\n```\npackage com.rest.service;\n\
  import com.rest.model.Message;\nimport java.util.Map;\nimport java.util.List;\n\
  import java.util.ArrayList;\nimport java.util.HashMap;\nimport java.util.concurrent.atomic.AtomicInteger;\n\
  Import javax.inject.Singleton;\n@Singleton\npublic class MessageService {\nstatic\
  \ private Map messageRepo = new HashMap();\nstatic private AtomicInteger idCounter\
  \ = new AtomicInteger();\npublic Message getMessage(int id) {\nMessage message =\
  \ messageRepo.get(id);\nreturn message;\n}\n// 添加消息\npublic void createMessage(Message\
  \ message) {\nmessage.setId(idCounter.incrementAndGet());\nmessageRepo.put(message.getId(),\
  \ message);\n}\n// 更新消息\npublic void updateMessage(int id, Message update) {\nMessage\
  \ current = messageRepo.get(id);\ncurrent.setMessage(update.getMessage());\ncurrent.setFrom(update.getFrom());\n\
  current.setTo(update.getTo());\ncurrent.setCreationDate(update.getCreationDate());\n\
  messageRepo.put(current.getId(), current);\n}\n// 删除消息\npublic void deleteMessage(int\
  \ id) {\nMessage current = messageRepo.remove(id);\n}\npublic  List getMessages()\
  \ {\nreturn new ArrayList(messageRepo.values());\n}\n```\n\n**API 测试（Curl）**\n\n\
  \n```curl -d '{ \"id\":1, \"message\":\"test\", \"from\":\"test\", \"to\":\"test\"\
  , \"creationDate\":\"12/12//2012\" }' -H 'Content-Type: application/json' http://localhost:8080/message\n\
  {\"id\":1,\"message\":\"test\",\"from\":\"test\",\"to\":\"test\",\"creationDate\"\
  :\"12/12//2012\"}\ncurl -d '{ \"id\":2, \"message\":\"test2\", \"from\":\"test\"\
  , \"to\":\"test\", \"creationDate\":\"12/12//2012\" }' -H 'Content-Type: application/json'\
  \ http://localhost:8080/message\n{\"id\":2,\"message\":\"test2\",\"from\":\"test\"\
  ,\"to\":\"test\",\"creationDate\":\"12/12//2012\"}\ncurl http://localhost:8080/message\n\
  [{\"id\":1,\"message\":\"test\",\"from\":\"test\",\"to\":\"test\",\"creationDate\"\
  :\"12/12//2012\"},{\"id\":2,\"message\":\"test2\",\"from\":\"test\",\"to\":\"test\"\
  ,\"creationDate\":\"12/12//2012}\ncurl http://localhost:8080/message/1\n{\"id\"\
  :1,\"message\":\"test\",\"from\":\"test\",\"to\":\"test\",\"creationDate\":\"12/12//2012\"\
  }\ncurl http://localhost:8080/message/2\n{\"id\":2,\"message\":\"test2\",\"from\"\
  :\"test\",\"to\":\"test\",\"creationDate\":\"12/12//2012\"}\ncurl -X \"DELETE\"\
  \ http://localhost:8080/message/2\ncurl http://localhost:8080/message/2\n{\"message\"\
  :\"Not Found\",\"_links\":{\"self\":{\"href\":\"/message/2\",\"templated\":false}},\"\
  _embedded\":{\"errors\":[{\"message\":\"Page Not Found\"}]}}\ncurl http://localhost:8080/message\n\
  [{\"id\":1,\"message\":\"test\",\"from\":\"test\",\"to\":\"test\",\"creationDate\"\
  :\"12/12//2012\"}]\n```\n\n总结\n现在，我们的产品组合中有两个 API：一个用于消息服务，另一个用于航班乘客。航班状态 API 实现了\
  \ Flight 和 Passenger 两个对象之间的关系，而消息服务除了读取功能外，还支持消息的创建和删除。两个 API 遵循相同的设计非常重要。\n\n\
  7. API 平台与数据处理程序\n\n本章从 API 平台架构开始，然后深入探讨数据处理程序模式，该模式用于将 RESTful API 与企业内部的实际数据源集成，从而通过\
  \ API 为消费者提供更有意义的价值。\n\nAPI 平台架构\n\nAPI 提供者使用 API 平台来高效地实现 API。我们将探讨以下内容：\n\n* \
  \  为什么需要 API 平台？\n*   什么是 API 平台？\n*   API 平台具备哪些能力？\n*   API 平台是如何组织的？其架构是怎样的？\n\
  *   API 架构如何融入企业周边的技术架构？\n\n为什么需要 API 平台？\n当然，在没有平台或框架的情况下构建 API 在技术上是可行的。但何必如此呢？让我们暂时思考一下数据库，它为构建应用程序提供了平台。你当然可以在没有数据库的情况下构建应用程序，并编写自己的数据存储库。但我们通常不会这样做。我们使用现有的数据库作为平台。这是有充分理由的最佳实践。它使我们能够专注于构建服务于业务场景的应用程序，因为我们可以重用现有的、经过验证的组件，从而更快地构建应用程序。同样的道理也适用于\
  \ API 平台：API 平台使我们能够专注于构建消费者喜爱的 API，因为我们可以重用现有的、经过验证的 API 构建块，从而更快地构建 API。\n\n那么什么是\
  \ API 平台？\n\nAPI 平台由以下三个组件之一组成：\n\n*   **API 开发平台**\n    *   它提供工具，以便更快地设计和开发 API。\n\
  \    *   它提供经过验证、可重用且可配置的构建块。\n*   **API 运行时平台**\n    *   它主要负责执行 API。\n    *  \
  \ 它处理消费者的传入 API 请求，并以高吞吐量和低延迟等非功能性属性返回 API 响应。\n*   **API 交互平台**\n    *   该平台允许\
  \ API 提供者管理与 API 消费者的交互。它为消费者提供 API 文档、凭证和费率计划。\n\n那么 API 平台具备哪些能力？\n\n以下是 API 平台的三个组件所提供的能力。\n\
  \nAPI 开发平台\n\n\nAPI 开发平台为 API 提供商中的 API 开发者提供了一套用于 API 设计与开发的工具箱。该工具箱包含经过验证、可复用且可配置的\
  \ API 构建模块。在构建 API 时，某些功能会反复用到，这些功能可以通过构建模块来实现。构建模块可以复用，且经过测试，因此没有缺陷，并且它们是可配置的，能够适应多种用途。API\
  \ 开发平台提供的构建模块至少涵盖以下功能：\n\n*   处理 HTTP 请求和响应\n\n*   标头\n\n*   查询\n\n*   **HTTP**：状态码\n\
  \n*   方法\n\n*   **安全**：基于 IP 的访问限制、基于位置的访问限制、基于时间的访问限制、前端认证与授权、OAuth、基本授权、API 密钥、后端认证与授权（使用\
  \ LDAP 和 SAML）\n\n*   **前端协议**：HTTP (REST)、SOAP、RPC 和 RMI\n\n*   **数据格式转换**：XML\
  \ 转 JSON 和 JSON 转 XML\n\n*   **结构转换**：XLST 和 XPATH\n\n*   **数据完整性与保护**：加密\n\n* \
  \  路由到一个或多个后端\n\n*   聚合多个 API 和/或多个后端\n\n*   限流以保护后端速率限制和吞吐量限制\n\n*   对发往 API 平台的入站请求和发往后端的出站请求进行负载均衡\n\
  \n*   用于日志记录的钩子\n\n*   用于分析的钩子\n\n*   货币化能力\n\n*   **实现 API 的语言**：Java、JavaScript\
  \ 等（Jersey、Restlet 和 Spring）\n\n*   **用于 API 开发的 IDE（包含编辑器、调试器和部署工具）**：Eclipse、JDeveloper\
  \ 和 NetBeans\n\n*   **设计 API 的语言**：YAML、RAML 等\n\n*   **用于创建 API 接口设计的设计工具**：RAML、Swagger\
  \ 和 Blueprint\n\n*   **用于根据设计生成文档和 API 代码骨架的工具**：RAML 和 Swagger\n\nAPI 运行时平台\n\n\
  API 运行时平台主要负责执行 API。它使 API 能够接收来自 API 消费者的入站请求并返回响应。\n\n*   它应提供非功能性属性，例如\n\n* \
  \  高可用性、高安全性和高吞吐量\n\n*   为满足这些属性，该平台提供\n\n*   负载均衡\n\n*   连接池\n\n*   缓存\n\n*   它还应为\
  \ API 监控、日志记录和分析提供能力，以检查所需的非功能性属性是否得到满足。\n\nAPI 参与平台\n\nAPI 提供商使用 API 参与平台与其 API\
  \ 消费者社区进行互动。API 提供商使用 API 参与平台的以下能力：\n\n*   **API 管理**：无需部署即可配置和重新配置 API\n\n*  \
  \ **API 发现**：客户端获取 API 信息的机制\n\n*   **消费者入驻**：应用密钥生成和 API 控制台\n\n*   **社区管理**：博客\n\
  \n*   文档\n\n*   版本管理\n\n*   货币化管理和服务级别 SLA 管理\n\nAPI 消费者使用参与平台进行：\n\n*   API 组合概览\n\
  \n*   API 文档\n\n*   交互式试用 API 的可能性\n\n*   用于集成的示例源代码\n\n*   自助获取 API 访问权限\n\n* \
  \  客户端工具，例如客户端的代码生成\n\nAPI 平台是如何组织的？API 平台的架构是什么？\n\n通常，API 不仅部署在生产系统上，还需要部署在不同成熟度的阶段。这些阶段有时也称为环境。每个阶段都有特定的目的，并与其他阶段隔离以隔离潜在的错误：\n\
  \n*   **模拟**：用于尝试接口设计，提供 API 的模拟或仿真\n\n*   **开发**：用于开发，最终将进入生产环境\n\n*   **测试**：用于手动黑盒测试和集成测试\n\
  \n*   **预生产**：用作生产演练和验收测试\n\n*   **生产**：用作消费者的真实系统\n\n如图 7-1 所示，API 开发平台用于设计和开发。API\
  \ 运行时平台用于部署。API 参与平台用于发布 API。\n\n![](img/427457_3_En_7_Fig1_HTML.jpg)\n\n图示说明 API\
  \ 平台生命周期包含三个阶段：API 开发平台、API 运行时平台和 API 参与平台。每个阶段用一个图标表示：开发用扳手，运行时用电源按钮，参与用带光线的人。下方箭头指示顺序流程：开发、部署和发布。\n\
  \n图 7-1\nAPI 平台架构\n\n流程图说明了 API 平台的工作方式。第一步是在 API 开发平台上进行开发。第二步是在 API 运行时平台上进行部署。最后一步是在\
  \ API 参与平台上进行发布。\n\nAPI 架构如何融入企业的周边技术架构？\n\nAPI 平台并非孤立存在，它需要集成到企业现有的架构中。防火墙用于提高安全性。负载均衡器用于提高性能，通常放置在互联网和\
  \ API 平台之间。IAM（身份与访问管理）系统用于管理身份信息以及 LDAP 或 Active Directory，如图 7-2 所示。\n\n![](img/427457_3_En_7_Fig2_HTML.jpg)\n\
  \n图示说明 API 架构。顶部显示 API 客户端、防火墙和负载均衡器。下方，API 平台包括 API 开发平台、运行时平台和参与平台。底部，后端组件包括 IAM\
  \ 系统、企业服务总线、数据库、遗留系统和云服务。\n\n图 7-2\n企业中的 API 架构\n\n企业内 API 实施的流程示意图。从 API 客户端、防火墙、负载均衡器和包含三个阶段的\
  \ API 平台开始。最终流程是后端，由数据库、企业服务总线、遗留系统和云服务组成。\n提供企业核心功能的后端系统：后端可以是数据库、应用程序、企业服务总线、使用\
  \ SOAP 的 Web 服务、消息队列和 REST 服务。\n\n数据处理器\n\n如前所述，我们使用现有数据库作为平台。数据处理器、数据访问对象 (DAO)\
  \ 和命令查询职责分离 (CQRS) 都为某种类型的数据库或任何其他持久化机制提供了抽象接口。数据处理器是框架中处理数据的层。数据访问对象是一种设计模式，用于在数据处理器内部实现从数据库的访问。另一方面，CQRS\
  \ 模式提供了一种机制，用于在数据处理器中分离查询数据和事务数据。\n\n\n\n数据访问对象（DAO）\n通过将应用程序调用映射到持久化层，DAO 提供了特定的数据操作，同时隐藏了数据库的细节。使用数据访问对象的优势在于其相对简单性，并且它实现了应用程序中两个重要部分之间的分离——这两部分彼此不应了解对方，且预计会频繁且独立地演变。业务逻辑的变更可以依赖同一个\
  \ DAO 接口，而持久化逻辑的变更只要接口实现正确，就不会影响 DAO 的客户端。所有存储细节对应用程序的其他部分都是隐藏的（参见信息隐藏）。因此，对持久化机制的潜在变更只需修改一个\
  \ DAO 实现即可完成，而应用程序的其他部分不受影响。DAO 充当应用程序与数据库之间的中介，在对象与数据库记录之间来回传输数据。\n在访问数据库时，有多种可用的\
  \ API（例如，JPA，将在课堂实验中使用）。\n\n命令查询职责分离（CQRS）\n每天都有新的需求摆在 IT 组织面前，要求交付敏捷、高性能的集成移动和\
  \ Web 应用程序。与此同时，随着 REST、NoSQL 和云等新技术的出现，技术格局日益复杂，而 SOAP 和 SQL 等现有技术仍在日常工作中占据主导地位。与其在争论中偏执一方，NoSQL\
  \ 可以在这个数据存储和格式的“`多语言`”环境中与 SQL 成功共存。然而，这种集成也在架构和实现层面增加了另一层复杂性。我们将讨论以下内容。\n\nSQL\
  \ 开发流程\n\n应用程序开发生命周期意味着首先更改数据库模式，然后是绑定，接着是内部模式映射，最后是 SOAP 或 JSON 服务，以及最终的客户端代码。这一切都会耗费项目的时间和金钱。这也意味着“代码”（在此处选择你的语言）和业务逻辑也需要修改，以处理模型的变化。图\
  \ 7-3 展示了传统的 CRUD 架构。\n\n![](img/427457_3_En_7_Fig3_HTML.jpg)\n\n图示说明了一个软件架构模型。顶部是“表示层”，其后依次是“验证层”、“业务逻辑层”和“数据访问层”。“数据访问层”通过“更新”和“查询”箭头与“数据存储”交互，表示组件之间的数据流。\n\
  \n图 7-3\n传统 CRUD 架构\n\nCRUD 架构的图示包含一个由验证、业务逻辑和数据访问组成的表示层。数据访问向数据存储进行更新，数据存储则向数据访问返回查询结果。\n\
  \nNoSQL 流程\n出于多种原因，NoSQL 正在许多 SQL 商店中赢得支持者，这些原因包括低成本、处理非结构化数据的能力、可扩展性和性能。数据库人员首先注意到的是没有模式。这些文档式存储引擎可以处理海量的结构化、半结构化和非结构化数据。无模式文档的本质允许在不经过正式变更管理流程（或数据架构师）的情况下更改文档结构。\n\
  \n我必须在 SQL 和 NoSQL 之间做出选择吗？\n关键在于，两者各有其用武之地，并适用于特定类型的数据——SQL 适用于结构化数据，NoSQL 适用于非结构化数据。NoSQL\
  \ 数据库比 SQL 数据库更具可扩展性。那么，为什么不能根据应用程序来混合搭配这些数据呢？这可以通过在 SQL 和 NoSQL 数据库之上创建一个统一的 REST\
  \ API 来实现。\n\n为什么需要一个统一的 REST API？\n答案很简单——新的敏捷和移动世界要求将数据“混搭”成文档风格的 JSON 响应。\n\n\
  \n\nMartin Fowler 描述了一种名为“`CQRS`”的模式，该模式在当今由服务器、数据、服务和连接构成的“`多语言`”环境中更具相关性（图 7-4）。\n\
  \n![](img/427457_3_En_7_Fig4_HTML.jpg)\n\n图示说明了一个软件架构模型。左侧列出了四个组件：验证、命令、领域逻辑和数据持久化。这些组件连接到一个中央“数据存储”圆柱体，该圆柱体包含一个由眼镜图标表示的“读取模型”和一个由铅笔图标表示的“写入模型”。从读取模型出发，有一个箭头指向标有“查询（生成\
  \ DTO）”的圆圈。顶部区域标有“表示层”。\n\n图 7-4\n基本 CQRS 架构\n\nCQRS 架构的示意图包含一个表示层，该层由验证、命令、领域逻辑和数据持久化组成。数据持久化将数据写入数据存储。在读取数据存储时，数据流向查询，查询生成\
  \ DTO。\n\n在这种设计模式中，REST API 请求（GET）从多个来源（例如，混搭应用）返回文档。在更新过程中，数据会经历业务逻辑推导、验证、事件处理和数据库事务。然后，这些数据可能会通过异步事件被推送回\
  \ NoSQL 数据库。在这方面，NoSQL 数据库相对于 SQL 的优势在于，NoSQL 为非结构化数据提供了动态模式。此外，NoSQL 数据库是水平可扩展的，这意味着可以通过增加资源池中的数据库服务器数量来扩展\
  \ NoSQL 数据库以减轻负载，而 SQL 数据库则是通过增加托管数据库的服务器的性能来进行扩展。图 7-5 展示了具有独立读取和写入存储的 CQRS 架构。当您需要处理非常、非常大量的数据时，您会选择使用独立的存储。\n\
  \n![](img/427457_3_En_7_Fig5_HTML.jpg)\n\n图示说明了一个数据处理流程。顶部显示了一个“表示层”。下方列出了四个垂直步骤：验证、命令、领域逻辑和数据持久化。一个箭头从这些步骤指向一个带有铅笔图标的圆柱体，代表“写入数据存储”。随后是另一个标有“读取数据存储”并带有眼镜图标的圆柱体。一个箭头从读取数据存储指向标有“查询（生成\
  \ DTO）”的圆圈。\n\n图 7-5\n具有独立读取和写入存储的 CQRS 架构\n\nCQRS 架构的示意图包含一个表示层，该层由验证、命令、领域逻辑和数据持久化组成。数据持久化将数据写入数据存储。在读取数据存储时，数据流向查询，查询生成\
  \ DTO。\n\n框架：数据处理器\n\n本练习将使用 Java 持久化 API (JPA) 为报价领域对象实现一个数据处理器或数据访问对象。JPA 是一个\
  \ Java 规范，用于在 Java 对象/类和关系数据库之间访问、持久化和管理数据。我们将使用我们的领域对象消息，并在 DAO 中使用 JPA 实现 CRUD\
  \ 操作。\n**Pom.xml**\n\n使用以下依赖项更新 `pom.xml`：\n\n```xml\n\n4.0.0\ncom.rest\nquote\n\
  0.1\n${packaging}\n\nio.micronaut\nmicronaut-parent\n3.4.3\n\njar\n\n3.4.3\n3.3.0\n\
  com.rest.Application\nnetty\n\ncentral\nhttps://repo.maven.apache.org/maven2\n\n\
  io.micronaut\nmicronaut-inject\ncompile\n\nio.micronaut\nmicronaut-validation\n\
  compile\n\norg.junit.jupiter\njunit-jupiter-api\ntest\n\norg.junit.jupiter\njunit-jupiter-engine\n\
  test\n\nio.micronaut.test\nmicronaut-test-junit5\ntest\n\nio.micronaut\nmicronaut-http-client\n\
  compile\n\nio.micronaut\nmicronaut-http-server-netty\ncompile\n\nio.micronaut\n\
  micronaut-jackson-databind\ncompile\n\nio.micronaut\nmicronaut-http-server-netty\n\
  compile\n\nio.micronaut\nmicronaut-jackson-databind\ncompile\n\nio.micronaut\nmicronaut-runtime\n\
  compile\n\nio.micronaut.data\nmicronaut-data-jdbc\ncompile\n\nio.micronaut.reactor\n\
