  \n总结\n在本章中，我们回顾了使用 XML 和 JSON 格式的消息传递，并对它们进行了\n比较。然后，我们开发了 API，用于从 Micronaut 应用返回\
  \ XML 和 JSON 响应。\n\n4. API 设计与建模\n\n本章从 API 设计策略开始，然后进入 API\n创建过程和建模。讨论了 REST API\
  \ 设计的最佳实践，随后是 API 解决方案架构。在练习中，\n为播客订阅设计了一个简单的 API，然后使用 OpenAPI 进行建模。\n\nAPI 设计策略\n\
  \n正如 UI 之于 UX（用户体验），API 之于\nAPX（应用程序编程体验）。在 APX 中，回答以下问题至关重要：\n\n*   应该暴露什么？\n\n\
  *   暴露数据的最佳方式是什么？\n\n*   应如何调整和改进 API？\n\n此外，我们来讨论一下为什么应该开发良好的应用程序编程体验。\n良好的 API\
  \ 会鼓励开发者使用它并与他人分享，\n从而形成一个良性循环：每一次额外的成功实施都会带来更多的参与和来自开发者的更多贡献，\n这些开发者会为你的服务增加价值。首先我要说的是，API\
  \ 设计\n很难。\n同时，良好的 API 将有助于发展一个由员工、客户和合作伙伴组成的生态系统，他们能够使用你的 API 并以互惠互利的方式帮助其持续演进。\n\
  \nAPI 设计有四种策略：\n\n![](img/427457_3_En_4_Fig1_HTML.jpg)\n\n说明后端系统架构的图表。顶部块标记为\n\"\
  后端系统\"，下方连接到三个块：\"API\"、\"主要产品\"以及两个较小的块，标记为\"移动\"和\"集成\"。该布局暗示了一种层次结构，后端系统支持各种组件。\n\
  \n图 4-1\n附加策略\n\n*   **附加策略**：这是指你拥有一个\n    现有应用程序，并在事后添加 API。这利用了现有代码和系统的优势（图 4-1）。\n\
  \n![](img/427457_3_En_4_Fig2_HTML.jpg)\n\n说明系统架构的图表。后端系统\n连接到 API，API 分支到三个组件：主要产品、移动设备和集成。\n\
  \n图 4-2\n绿地策略\n\n*   **绿地策略**：这是另一个极端。\n    这是\"API 优先\"或\"移动优先\"背后的策略，也是开发 API\
  \ 最简单的情况。由于你是从零开始，\n    你可以利用以前可能没有的技术和概念（图 4-2）。\n\n绿地或 API 优先策略是一种基于模拟的设计实现。\n\
  \n后端系统的模拟是在无需完全实现的后端系统的情况下开发后端系统。通过 API 的模拟，消费者可以在没有完全开发的 API 的情况下开始应用程序的开发。\n\n\
  *   **敏捷设计策略**：敏捷性基于\n    这样一个前提：你可以在没有完整规格的情况下开始。你总是可以\n    在后续过程中，随着学习和了解的深入，调整和更改规格。通过\n\
  \    多次迭代，架构设计可以收敛到正确的解决方案。敏捷方法只应在 API 发布之前应用。\n\n*   最后，还有外观策略，这是绿地策略和附加策略之间的中间地带。\n\
  \    在这种情况下，你可以利用现有的业务系统，同时根据你的偏好和需求对其进行塑造。这使你能够在保持现有工作系统正常运行的同时，改进底层架构。\n\nAPI\
  \ 创建过程与方法论\n在本节中，我们将回顾 API 创建过程和方法论。为了交付优秀的 API，设计必须成为首要关注点。正如优化 UX（用户体验）已成为 UI\
  \ 开发的主要关注点一样，优化 APX（API 用户体验）也应成为 API 开发的主要关注点。\n\n过程\n首先，确定你的业务价值。在思考业务价值时，请考虑关于为什么需要\
  \ API 的\"电梯演讲\"。开发者参与度不是一个很好的目标；你需要一个切实的目标：提高用户参与度，将活动从主要产品转移到 API，吸引并留住合作伙伴等。\n\
  \n选择你的指标，例如：\n\n*   正在使用的开发者密钥数量\n\n*   开发的应用程序数量\n\n*   通过 API 进行交互的用户数量\n\n* \
  \  合作伙伴集成数量\n\n*   API 如何增强公司的整体目标，而不仅仅是确定有多少人开始集成\n\nAPI 方法论\n\n在敏捷策略的情况下，它包含五个阶段：\n\
  \n*   领域分析或 API 描述\n\n*   架构设计\n\n*   原型设计\n\n*   构建用于生产的 API\n\n*   发布 API\n\n\
  领域分析或 API 描述\n为领域分析定义你的用例。参与者是谁？他们是外部还是内部？消费者希望使用 API 构建哪些 API 解决方案？使用该 API 还可能实现哪些其他\
  \ API 解决方案？\n消费者想要使用的 API 应该是什么样子？消费者想要构建什么应用程序？消费者希望在其应用程序中使用哪些数据或领域对象？\n\n将活动分解为步骤或写下使用场景：\n\
  \n*   依赖资源不能脱离另一个资源而存在。\n\n*   例如，播客与其消费者的关联无法确定，除非播客及其消费者已被创建。\n\n*   独立资源可以脱离另一个资源而存在。\n\
  \n*   例如，播客资源可以存在而没有任何依赖关系。\n\n*   关联资源独立存在，但仍具有某种关系，即，它可能通过引用连接。\n\n*   如前所述\n\n\
  \n\n下一步是识别资源状态之间可能的转换。状态之间的转换提供了需要支持的 HTTP 方法的指示。以可以添加到播放列表的播客为例，我们来分析不同的状态（表 4-1）。\n\
  \n表 4-1\n领域分析示例\n\n状态 | 操作 | 领域对象 | 描述\n--- | --- | --- | ---\nCREATE | POST | PODCAST\
  \ | 创建播客\nREAD | GET | PODCAST | 读取播客\nREAD | GET/{podcast_id} | PODCAST | 读取播客\n\
  UPDATE | PUT/{playlist_id} | PODCAST | 更新播客\n\n此外，通过构建一个简单的演示应用进行验证。这个演示应用不仅仅是 curl\
  \ 调用，它还为 API 提供了一个展示平台，并可在后续阶段重复使用。\n\n**架构设计**\n\n在此阶段，API 描述或分析阶段被进一步细化。架构设计应就以下方面做出决策：\n\
  \n*   协议\n*   端点\n*   URI 设计\n*   安全性\n*   性能或可用性\n\n详细设计描述：\n\n*   资源\n*   表示\n\
  *   内容类型\n*   参数\n*   HTTP 方法\n*   HTTP 状态码\n*   一致的命名\n\n此外，通过查看 API 组合中的通用 API\
  \ 来关注可重用性。设计决策应与 API 组合中的 API 保持一致。API 组合是企业中 API 的集合，如第 5 章所述。\n\n作为设计验证的一部分，可以在此处根据设计决策进一步扩展演示应用。需要验证的问题如下：\n\
  \n*   API 仍然易于使用。\n*   API 简单且支持用例。\n*   API 遵循架构风格。\n\n**原型设计**\n原型设计是为生产实现做准备。选取复杂的用例，并以高保真度端到端地实现。原型是不完整的，并且使用了捷径。如果在构建原型时后端功能不可用，它可以包含\
  \ API 的模拟。原型制作完成后，会与试点消费者进行验收测试，作为对 API 的验证。试点消费者是来自 API 提供方团队的内部客户。\n\n**实现**\n\
  实现需要符合 API 描述，并需要尽快交付。此外，API 需要完全集成到后端系统和 API 组合中。这应具备所有期望的功能以及 API 的非功能性方面，如性能、安全性和可用性。在此阶段，由于已经历多次迭代，API\
  \ 描述应保持稳定。为了进行验证，可以在本阶段挑选出特定的 API 消费者。\n\n**发布**\nAPI 的发布不需要大量工作，但这对 API 来说是一个重要的里程碑。从组织的角度来看，API\
  \ 的责任从开发部门转移到运维部门。发布后，开发过程不再具有敏捷性。任何变更都需要传统的变更管理流程。作为验证的一部分，需要对成功与失败的 API 调用进行分析，并识别由维护团队支持的文档缺口。\n\
  \n**API 建模**\n\n为你的 API 建模模式意味着创建一个设计文档，该文档可以与其他团队、客户或高管共享。模式模型是你的组织与将要使用它的客户端之间的契约。模式模型本质上是一个契约，描述了\
  \ API 是什么、它如何工作以及端点具体是什么。可以将其视为 API 的地图，是对每个端点的用户可读描述，可以在编写任何代码之前用于讨论 API。图 4-3\
  \ 展示了 API 建模框架，在该框架中，你定义了 API 规范并生成 API 文档。同时，还会生成服务器和客户端源代码。\n\n![](img/427457_3_En_4_Fig3_HTML.jpg)\n\
  \n\n\n此图展示了从 RESTful Web 服务生成 API 文档的流程。REST 客户端和服务器源码生成 JSON 或 YAML 格式的 API 规范。该规范用于生成客户端和服务器端源码，以及\
  \ HTML 格式的 API 文档。箭头指示了从客户端和服务器源码到 API 规范，以及从 API 规范到 API 文档的流向。\n\n图 4-3\nAPI 建模\n\
  \n在开始开发之前创建此模型，有助于确保您创建的 API 能够满足已识别用例所描述的需求。所使用的三种模式建模系统及其标记语言如下：\n\n*   **RAML**：Markdown，相对较新。优秀的在线建模工具：RESTful\
  \ API 建模语言\n\n*   **OpenAPI (Swagger)**：JSON，社区庞大\n\n*   **Blueprint**：Markdown，采用率低\n\
  \n本章中的 OpenAPI (Swagger)练习展示了为播客资源完成的建模。\n每种模式建模语言都有可用的工具，用于根据您创建的模式自动进行测试或代码生成，但即使没有此功能，模式模型也能帮助您在编写一行代码之前就对\
  \ API 有扎实的理解。\n\n图 4-4 展示了 API 建模工具。\n\n![](img/427457_3_En_4_Fig4_HTML.jpg)\n\n\
  该图像采用深色背景，顶部写着“一次编写。多次使用。鼓励创造性懒惰。”下方有五个六边形图标，每个代表流程的不同阶段：设计（带代码符号）、构建（带扳手）、测试（带实验室烧瓶）、文档（带清单）和共享（带网络图）。每个图标都用不同的颜色勾勒出轮廓。\n\
