  \ 中生成 OpenAPI YAML。\n```\n\n完成 API 建模后，您可以生成文档并与 API 消费者共享。Swagger 允许在浏览器中更易读地访问\
  \ API。接下来，我们将配置 Swagger。\n\n在 application.yml 文件中配置以下内容以启用 Swagger。您可以在 src/main/resources\
  \ 文件夹中找到 application.yml 文件：\n\n```\nmicronaut:\nrouter:\nstatic-resources:\nswagger:\n\
  paths: classpath:META-INF/swagger\nmapping: /swagger/**\n```\n\n完成上述配置后，运行应用程序时，您可以通过`http://localhost:8080/swagger/flight-0.1.yml`访问\
  \ Swagger 文档。\n\n\n\n摘要\n本章从 API 设计策略入手，接着探讨了 API 的创建流程与建模。讨论了 REST API 设计的最佳实践，随后介绍了\
  \ API 解决方案架构。我们对比了多种 API 建模工具，并使用 Micronaut 为航班乘客开发了一个 API。\n\n5. JAX-RS 简介\n\n\
  本章介绍 JAX-RS 的基本概念及其在 Micronaut 中的实现。\n\nJAX-RS 概述\n\nJava API for RESTful Web Services（JAX-RS）是一个\
  \ Java 编程语言 API 规范，为按照 REST 架构模式创建 Web 服务提供支持。JAX-RS 究竟是什么？JAX-RS 是一个基于 POJO、注解驱动的框架，用于构建符合\
  \ RESTful 原则的 Web 服务。想象一下，需要编写所有底层代码来解析 HTTP 请求，并编写逻辑将这些请求连接到相应的 Java 类/方法。JAX-RS\
  \ API 的精妙之处在于，它将开发者从这种复杂性中解放出来，使其能够专注于业务逻辑。这正是 POJO 和注解发挥作用的地方！JAX-RS 提供了注解，用于将特定的\
  \ URI 模式和 HTTP 操作绑定到 Java 类的各个方法上。JAX-RS 是一组接口和 Java 注解的集合，简化了服务端 REST 应用程序的开发。与其他类型的分布式系统相比，使用\
  \ JAX-RS 技术开发的 REST 应用程序更易于开发和消费。以下是 JAX-RS 提供的主要特性：\n\n*   基于 POJO 的资源类\n*   以\
  \ HTTP 为中心的编程模型\n*   实体格式无关性\n*   容器无关性\n*   包含在 Java EE 中\n*   是用于构建和消费 RESTful\
  \ Web 服务的标准化 API\n*   **Application**：指定哪些 Java 类处理哪些请求\n*   **Resources**：用于构建\
  \ RESTful 服务的基础 Java 代码和注解\n*   **Providers**：用于数据编组和解组（POJO Customer）的工具\n*   **Client\
  \ API**：用于构建 RESTful 服务客户端的基础 Java 代码和注解\n*   **Filters and interceptors**：用于在请求-响应调用链中插入执行代码的工具\n\
  *   **Validation**：为传入数据提供基于注解的验证。例如：\n\n@NotNull @FormParam ( “firstname” ) String\
  \ firstname, @NotNull\n@FormParam ( “lastname” ) String lastname, @Email @FormParam\
  \ ( “email” )\nString email)\n\n*   **Asynchronous processing**：为客户端和服务端处理长时间运行的请求提供异步请求支持（@Suspended）\n\
  *   **@Context**：为客户端和提供者实现类提供访问运行时环境中有用对象的途径，例如，header\n\n输入与输出内容类型\n\n以下是 JAX-RS\
  \ 支持的媒体类型。这些类型应在 REST 资源生成或消费内容的请求和响应注解中使用。\n\n*   **APPLICATION_JSON**：application/json\n\
  *   **APPLICATION_XML**：application/xml（使用编码）\n*   **TEXT_HTML**：text/html\n*  \
  \ **TEXT_PLAIN**：text/plain\n*   **TEXT_XML**：text/xml\n*   application 和 text 媒体类型的区别在于国际化。application\
  \ 类型支持国际化编码。\n\n示例：@Produces(“application/json”), @Consumes(“text/xml”)\n\nJAX-RS\
  \ 注入\nJAX-RS 的许多功能涉及从 HTTP 请求中提取信息并将其注入到 Java 方法中。你可能只对传入 URI 的某一部分感兴趣。你可能对 URI\
  \ 查询字符串的值感兴趣。客户端可能正在发送你的服务处理请求所需的关键 HTTP 头或 cookie 值。JAX-RS 允许你通过一组注入注解和 API 按需获取这些信息。\n\
  \nJAX-RS 注解可以注入许多不同的内容。以下是规范提供的列表：\n\n\n\n*   你需要使用 JAX-RS 中的 `@Path` 注解来为传入的 HTTP\
  \ 请求定义 URI 匹配模式。你可以将其放在类上或一个或多个方法上。如果你希望一个类接收 HTTP 请求，你必须至少使用 `@Path(“/”)` 对其进行注解。这个被注解的类随后被称为\
  \ JAX-RS 根资源。\n\n*   要使用 `@Path` 注解，你需要提供一个相对于 JAX-RS 应用上下文根的 URI 表达式。\n\n`@javax.ws.rs.Path`\n\
  \n*   `@PathParam` 允许你从 URI 模板参数中提取值。\n\n`@javax.ws.rs.PathParam`\n\n*   `@QueryParam`\
  \ 允许你从 URI 查询参数中提取值。\n\n`@javax.ws.rs.QueryParam`\n\n*   `@FormParam` 允许你从提交的表单数据中提取值。\n\
  \n`@javax.ws.rs.FormParam`\n\n*   `@HeaderParam` 允许你从 HTTP 请求头中提取值。\n\n`@javax.ws.rs.HeaderParam`\n\
  \n*   `@CookieParam` 允许你从客户端设置的 HTTP Cookie 中提取值。\n\n`@javax.ws.rs.CookieParam`\n\
  \n*   `@MatrixParam` 允许你从 URI 矩阵参数中提取值。\n\n`@javax.ws.rs.MatrixParam`\n\n*   `@Context`\
  \ 类是一个通用的注入注解。它允许你注入由 JAX-RS API 提供的各种辅助和信息对象。\n\n`@javax.ws.rs.core.Context`\n\
  以下是 JAX-RS 注入的几个示例。\n\n路径参数\n\n单个参数：\n\n```\n@Path(\"/customers/{id}\")\npublic\
  \ String getCustomer(@PathParam(\"id\") int id);\n```\n\n多个参数：\n\n```\n@Path(\"\
  /products/{name}-{version}\")\npublic String getProduct(@PathParam(\"name\") String\
  \ name, @PathParam(\"version\") String version)\n```\n\n查询参数\n\n通过查询参数限定来请求子集：\n\
  \n```\nhttp://restapi/products?start=0&count=10\n@GET\n@Produces(\"application/json\"\
  )\npublic String getProducts(@QueryParam(\"start\") int start, @QueryParam(\"count\"\
  ) int count);\npublic String getProducts(@Context Uriinfo info)\nString info.getQueryParameters().getFirst(\"\
  start\");\n```\n\nCookie 参数\n\n使用 `@CookieParam` 来检索单个值：\n\n```\npublic string get(@CookieParam(\"\
  userId\") String userId)\n```\n\n请求头参数\n\n用于注入 HTTP 请求头的值：\n\n```\npublic String\
  \ get(@HeaderParam(\"Accept\") String accept)\n```\n\n表单参数\n\n`@FormParam` 用于从 HTML\
  \ 的请求体中检索信息：\n\n```\n@Path(\"/product\")\n@POST\ncreateProduct( @FormParam(\"name\"\
  ) String productName, @FormParam(\"description\") String description,...\n```\n\n\
  矩阵参数\n\n矩阵参数用于限定单个路径段，而不是完整的 URI：\n\n```\nResponse getBooks(@PathParam(\"year\"\
  ) String year, @MatrixParam(\"author\") String author, @MatrixParam(\"country\"\
  ) String country) {\n考虑以下请求，该请求要求获取 2016 年由作者 bill 在美国出版的所有书籍。\n\"/books/2016;author=bill;country=usa\"\
  \ngetBooks 被调用时，year 设置为 2016，author 设置为 bill，country 设置为 usa。\n```\n\nMicronaut\
  \ 对 JAX-RS 的实现\n默认情况下，Micronaut 用户使用 Micronaut 的 `@Controller` 注解和其他内置的[路由注解](https://docs.micronaut.io/latest/guide/#_routing_annotations)来定义他们的\
  \ [HTTP 路由](https://docs.micronaut.io/latest/guide/#routing)。然而，[Micronaut JAX-RS](https://micronaut-projects.github.io/micronaut-jaxrs/latest/guide/)\
  \ 允许你使用 JAX-RS 注解来定义你的 Micronaut 端点。Micronaut JAX-RS 增加了在 Micronaut 应用中使用 JAX-RS\
  \ 注解和类型的支持，旨在帮助迁移现有的 JAX-RS 应用或支持偏好 JAX-RS 注解的团队。该项目并非 JAX-RS 规范的实现，旨在让熟悉 JAX-RS\
  \ API 的用户能够在 Micronaut 应用的上下文中使用该 API 最常用的部分。\n\n要使用此项目，你需要将以下注解处理器添加到任何 Micronaut\
  \ 项目中：\n\n```\nio.micronaut.jaxrs\nmicronaut-jaxrs-processor\n```\n\nMicronaut JAX-RS\
  \ 支持使用 JAX-RS 注解来定义控制器。\n\n包含以下服务器依赖：\n\n```\nio.micronaut.jaxrs\nmicronaut-jaxrs-server\n\
  ```\n\n支持的注解\n\nMicronaut JAX-RS 的工作原理是在编译时将 JAX-RS 注解定义转换为等效的 Micronaut 版本。\n\n\
  表 5-1\n支持的 JAX-RS 注解\n\nJAX-RS 注解 | 目标注解 | 示例\n\n| --- | --- | --- |\n\n[**@Path**](https://jakarta.ee/specifications/restful-ws/3.0/apidocs/jakarta/ws/rs/Path.html)\
  \ | [**@Controller**](https://docs.micronaut.io/latest/api/io/micronaut/http/annotation/Controller.html)\
  \ | `@Path(\"/foo\")` // 在类型上\n\n[**@Path**](https://jakarta.ee/specifications/restful-ws/3.0/apidocs/jakarta/ws/rs/Path.html)\
