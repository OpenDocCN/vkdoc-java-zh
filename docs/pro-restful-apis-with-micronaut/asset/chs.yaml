  在本章中，我们从 API 平台架构入手，然后深入探讨了用于将 RESTful API 与实际数据源集成的数据处理器模式。在练习中，我们演示了如何使用 JPA 实现数据处理器。\n\
  \n**8. API 管理与 CORS**\n\n在本章中，我们将从外观模式入手，回顾可用的 API 管理需求/解决方案。\n\n**外观模式**\n在本节中，我们将首先回顾外观设计模式，然后在第二部分中详细探讨外观模式如何应用于\
  \ API。\n\n**外观模式**\n在讨论外观模式之前，我们先思考一下现实世界中的外观是什么。最明显的例子是建筑物，它们都有外部结构来保护和装饰，隐藏内部的运作机制。这个外部结构就是外观。\n\
  现在，我们可以通过考虑操作系统来更贴近 API。就像建筑物一样，操作系统为计算机的内部功能提供了一个外部外壳。这个简化的接口使操作系统更易于使用，并保护核心免受粗心用户的干扰。\n\
  \n这正是设计模式中外观模式定义的精髓所在：\n\n*为子系统中的一组接口提供一个统一的接口。外观定义了一个更高级别的接口，使子系统更易于使用。*\n\n\n\
  请参考图 8-1；你可以看到外观模式如何在应用程序的各个包与任何想要与之交互的客户端之间放置一个中间层。\n\n![](img/427457_3_En_8_Fig1_HTML.jpg)\n\
  \n说明外观设计模式的图表。顶部标有“外观”的框通过标有“包含”的虚线箭头连接到下方标有“包 1”和“包 2”的两个框，表示外观包含了这两个包。\n\n图 8-1\n\
  外观模式\n\n该图说明了外观模式。外观包含两个包，即包 1 和包 2。\n\nAPI 外观\n\n与所有外观模式的实现一样，API 外观是面向复杂问题的简单接口。图\
  \ 8-2 展示了企业中的内部子系统。如图所示，每个内部子系统本身都很复杂：例如，JDBC 隐藏了数据库连接的内在机制。\n\n![](img/427457_3_En_8_Fig2_HTML.jpg)\n\
  \n该图展示了一系列代表不同技术组件的彩色 3D 方块。从左到右，方块依次标记为：蓝色的“大型系统”、紫色的“数据库”、橙色的“内容管理”、绿色的“SOAP”、红色的“JDBC”和青色的“RSS”。每个方块代表技术基础设施中使用的不同系统或协议。\n\
  \n图 8-2\n内部子系统\n\n内部子系统图表由大型系统、数据库、内容管理、SOAP、JDBC 和 RSS 等层级组成。\n\n图 8-3 展示了位于企业内部子系统顶层的\
  \ API 外观层，为应用程序提供了统一的接口。\n\n![](img/427457_3_En_8_Fig3_HTML.jpg)\n\n说明 API 外观架构的图表。顶部是代表应用程序和应用程序开发者的图标。下方，一个标有“API\
  \ 外观”的水平条连接到各种后端系统，包括大型系统、数据库、内容管理、SOAP、JDBC 和 RSS，每个系统都用彩色方块表示。此设置展示了 API 外观如何充当应用程序与各种后端服务之间的中介。\n\
  \n图 8-3\nAPI 外观——高层视图\n\nAPI 过程的图示。顶部是应用程序和应用程序开发者。中间是 API 外观。底部是大型系统、数据库、内容管理、SOAP、JDBC\
  \ 和 RSS 的层级。\n\n实现 API 外观模式涉及三个基本步骤：\n\n*   **设计 API**：确定 URL、请求参数和响应、负载、头部、查询参数等。\n\
  \n*   **使用模拟数据实现设计**：这样，在 API 连接到内部子系统（及其所有随之而来的复杂性）之前，应用程序开发者就可以测试 API。\n\n*  \
  \ 将外观与内部系统连接起来，以创建实时的 API。\n\n图 8-4 展示了这些层级。\n\n![](img/427457_3_En_8_Fig4_HTML.jpg)\n\
  \n说明 API 架构的图表。顶部，一个标有“理想设计”的红色箭头指向“应用程序开发者”。下方，一个橙色的“API 外观”层位于一个绿色的“中介”层之上。底部描绘了各种系统，包括“大型系统”、“数据库”、“内容管理”、“SOAP”、“JDBC”和“RSS”，代表后端组件。\n\
  \n图 8-4\nAPI 外观——层级\n\n用于开发的 API 过程包括顶部的应用程序开发者，接着是一个标有“理想设计”的双向箭头，以及两个标有“API 外观”和“中介”的矩形金字塔。底部由大型系统、数据库、内容管理、SOAP、JDBC\
  \ 和 RSS 的层级组成。\n\nAPI 管理\nAPI 管理工具提供了一种以简单且经济的方式向外部开发者公开你的 API 的方法。\n\n以下是 API 管理服务的特性：\n\
  \n*   文档\n\n*   分析与统计\n\n*   部署\n\n*   开发者参与\n\n*   沙盒环境\n\n*   流量管理与缓存能力\n\n* \
  \  安全性\n\n*   可用性\n\n*   货币化\n\n*   API 生命周期管理\n\n*   API 管理供应商通过三种不同的方式实现其解决方案：\n\
  \n*   **代理**：所有流量都经过 API 管理工具，该工具作为一层放置在应用程序和用户之间。\n\n*   **代理程序**：这些是服务器的插件。它们不像代理那样拦截\
  \ API 调用。\n\n*   **混合**：此方法选取代理和代理程序的特性并将其集成。然后你可以选择你需要的特性。\n\nAPI 生命周期\n\n默认的 API\
  \ 生命周期包含以下阶段：\n\n*   **分析**：对 API 进行分析，并为有限的消费者群体创建模拟响应，以便他们试用 API 并提供反馈。同时，还会对其货币化潜力进行分析，如下一节所述。\n\
  \n*   **创建/开发中**：正在创建 API：设计、开发和保护。API 元数据已保存，但尚不可见也未部署。\n\n*   **已发布/运维中**：API\
  \ 可见并最终发布，现在进入维护阶段，在此阶段进行扩展和监控。\n\n此外，还有两个阶段：\n\n*   **已弃用**：API 仍处于部署状态（对现有用户在运行时可用），但对新用户不可见。当新版本发布时，API\
  \ 会自动弃用。\n\n*   **已退役**：API 被取消发布并删除。\n\n这些将在下一节讨论。\n\n图 8-5 展示了 API 生命周期。\n\n![](img/427457_3_En_8_Fig5_HTML.jpg)\n\
  \n一个说明软件开发生命周期的循环图，包含七个阶段。从顶部开始顺时针方向：设计（带锤子和扳手图标）、开发（带齿轮图标）、安全（带挂锁图标）、发布（带箭头图标）、扩展（带图表图标）、监控（带图表图标）和分析（带条形图图标）。最后一个阶段是货币化，由美元符号图标表示。每个阶段都由一个带有相关图标的橙色圆圈标记。\n\
  \n图 8-5\nAPI 生命周期\n\nAPI 生命周期包括设计、开发、安全、发布、扩展、监控、分析和货币化。\n\nAPI 退役\n\n如同人到暮年需要退休一样，API\
  \ 也是如此。随着时间的推移，由于以下原因，API 会被退役或弃用：\n\n*   缺乏合作伙伴或第三方开发者的创新\n\n*   因 API 暴露数据而失去市场份额\n\
  \n*   技术栈的变化，例如 REST 取代 SOAP\n\n*   **安全问题**：由于 API 所暴露信息或数据的安全要求，将公共 API 变为私有\n\
  \n*   **版本管理**：因功能变更而最常见的原因\n\nAPI 退役的一些例子包括 Netflix、Google Earth、Twitter V1.0 等。\n\
  \nAPI 货币化\n数字资产或服务为客户、合作伙伴和最终用户提供了真正的价值，因此，它们应该成为你公司的收入来源，以及你商业模式的重要组成部分。\n\n有三种用于\
  \ API 货币化的商业模式：\n\n*   收入分成模式，即 API 消费者因其为 API 提供商带来的增量业务而获得报酬。\n\n*   收费模式，即 API\
  \ 消费者向提供商支付 API 使用费用。\n\n*   第三种也是最后一种商业模式是免费增值模式。免费增值模式可以基于多种因素，例如数量、时间或某种组合；它们可以作为独立模式或混合模式（与收入分成或收费模式结合）实施。\n\
  \n\n\n跨域资源共享（CORS）\n“跨域资源共享”（CORS）是一种机制，允许网页上的 TypeScript 或 JavaScript 向另一个域（而非\
  \ JavaScript 来源域）发起 XMLHttpRequest 请求。根据同源安全策略，此类“跨域”请求通常会被网页浏览器禁止。CORS 定义了一种浏览器与服务器交互的方式，以决定是否允许跨域请求。它比仅允许同源请求更有用，但比简单允许所有此类跨域请求更安全。跨域资源共享标准通过添加新的\
  \ HTTP 头部来工作，这些头部允许服务器描述允许使用网页浏览器读取该信息的源集合。\n\n如何实现 CORS？例如：\n\n```\nreturn Response.ok()\
  \ //200\n.entity(quote)\n.header(\"Access-Control-Allow-Origin\", \"*\")\n.header(\"\
  Access-Control-Allow-Methods\", \"GET, POST, DELETE, PUT\").\nallow(\"OPTIONS\"\
  ).build();\n```\n\n总结\n在本章中，我们回顾了 API 管理需求/解决方案，并讨论了跨域资源共享（CORS）以支持客户端实现。\n\n9.\
  \ API 安全\n\n在本章中，我们将首先回顾用于保护 RESTful API 安全的 OAuth 2 标准，然后回顾 JWT 实现，并练习使用 Micronaut\
  \ 实现基本安全。\n\nAPI 安全——OAuth 2\nOAuth 2 是一种通过 HTTP 委托资源访问授权的标准。\n使用 OAuth，我们可以授予移动应用访问权限，而无需提供密码。取而代之的是，一个令牌被移交给应用程序。令牌代表对部分数据在短时间内的访问权限。有关\
  \ OAuth 2 的通用信息，请参考 [`https://oauth.net/2/`](https://oauth.net/2/)。\n要获取令牌，用户首先登录\
  \ OAuth 服务器的网站。生成的令牌可以是授权码、访问令牌或刷新令牌。OAuth 被许多现代云服务在底层使用。\nOAuth 提供商列表：[`https://en.wikipedia.org/wiki/List_of_OAuth_providers`](https://en.wikipedia.org/wiki/List_of_OAuth_providers)\n\
  OAuth 由 IETF 在 RFC6749 [`http://tools.ietf.org/html/rfc6749`](http://tools.ietf.org/html/rfc6749)\
  \ 中规定并标准化。\nOAuth 1 已过时。\n\n有两个术语：身份验证和授权。\n\n*   **身份验证**是一个概念，回答的问题是：你是谁？\n\n\
  *   **授权**是一个概念，回答的问题是：你被允许做什么？\n\n角色\n\nOAuth 2 定义了四个角色：\n\n*   **资源所有者**：通常是你自己。\n\
  \n*   **资源服务器**：托管受保护数据的服务器（例如，托管你的个人资料和个人信息的 Google）。\n\n*   **客户端**：请求访问资源服务器的应用程序（可以是你的\
  \ PHP 网站、JavaScript 应用程序或移动应用程序）。\n\n*   **授权服务器**：向客户端颁发访问令牌的服务器。此令牌将用于客户端请求资源服务器。该服务器可以与授权服务器相同（同一物理服务器和同一应用程序），这通常是常见情况。\n\
  \n令牌\n令牌是由授权服务器生成的随机字符串，并在客户端请求时颁发。\n\n有两种类型的令牌：\n\n*   **访问令牌**：这是最重要的，因为它允许第三方应用程序访问用户数据。此令牌由客户端作为参数或请求头发送给资源服务器。它具有由授权服务器定义的有限生命周期。它必须尽快保密，但我们会看到这并不总是可能的，尤其是当客户端是通过\
  \ JavaScript 向资源服务器发送请求的网页浏览器时。通常，访问令牌被设计为对客户端不透明，但当它用于用户身份验证时，客户端需要能够从令牌中推导出一些信息。\n\
  \n*   **刷新令牌**：此令牌与访问令牌一起颁发，但与后者不同，它不会在客户端向资源服务器的每个请求中发送。它仅用于在访问令牌过期时发送给授权服务器以续期访问令牌。出于安全原因，并不总是能够获取此令牌。我们稍后将讨论在什么情况下。\n\
  \n图 9-1 展示了基于 OAuth 的交互。\n\n![](img/427457_3_En_9_Fig1_HTML.jpg)\n\n说明 OAuth 2.0\
  \ 授权流程的图表。“资源所有者”通过“客户端应用程序”访问资源，而“客户端应用程序”又从“资源服务器”访问资源数据。“OAuth 服务器”对客户端进行身份验证和授权，颁发令牌并将授权委托给资源服务器。箭头指示组件之间数据和授权流程的方向。\n\
  \n图 9-1\n基于 OAuth 的交互\n\n注册为客户端\n由于你想使用 OAuth 2 从资源服务器检索数据，你必须注册为授权服务器的客户端。\n每个提供商都可以自由选择其方法来实现这一点。该协议仅定义了客户端必须指定的参数以及授权服务器必须返回的参数。\n\
  以下是参数（可能因提供商而异）：\n\n客户端注册\n**应用程序名称**：应用程序名称\n**重定向 URL**：用于接收授权码和访问令牌的客户端 URL\n\
  **授权类型**：客户端将使用的授权类型\n**JavaScript 源（可选）**：将被允许通过 `XMLHttpRequest` 请求资源服务器的主机名\n\
  \n授权服务器响应\n**客户端 ID**：唯一的随机字符串\n**客户端密钥**：必须保密的密钥\n**更多信息**：RFC 6749——客户端注册\n\n\
  授权授权类型\nOAuth 2 定义了四种授权类型，具体取决于获取访问令牌所涉及的客户端的位置和性质。\n\n授权码授权\n我们将在本节中回顾授权码授权及其流程。这种授权类型用于登录\
  \ Google 和 Facebook。\n\n何时使用？\n当客户端是 Web 服务器或网站时，应使用此类型。它允许你获取长期有效的访问令牌，因为可以使用刷新令牌续期（如果授权服务器启用）。\n\
  **示例**：\n**资源所有者**：你\n**资源服务器**：一个服务器\n**客户端**：任何网站\n**授权服务器**：一个服务器\n\n**场景：**\n\
  \n1.  一个网站想要获取关于你个人资料的信息。\n2.  你被客户端（该网站）重定向到授权服务器。\n3.  如果你授权访问，授权服务器会在回调响应中向客户端（该网站）发送一个授权码。\n\
  4.  然后，客户端和授权服务器之间用此授权码交换访问令牌。\n5.  该网站现在可以使用此访问令牌查询资源服务器并检索你的个人资料数据。\n\n\n\n你永远不会看到访问令牌；它会被网站存储（例如，存储在会话中）。服务器还会随访问令牌发送其他信息，例如令牌的生命周期，以及可能的刷新令牌。\n\
  **序列图：**\n\n图 9-2 展示了授权码许可流程的序列图。\n\n![](img/427457_3_En_9_Fig2_HTML.jpg)\n\n该图展示了\
  \ OAuth 2.0 中的授权码许可流程。它涉及四个实体：资源所有者、客户端、授权服务器和资源服务器。流程从客户端向授权服务器请求授权码开始，需要提供 client_id\
  \ 和 redirect_uri 等参数。在登录和同意授权后，授权服务器会响应一个授权码。客户端用此授权码交换访问令牌，需要提供 client_id、client_secret\
  \ 和 redirect_uri。访问令牌（可能附带刷新令牌）用于调用资源服务器上的 API，资源服务器则响应数据。该流程包含一个使用访问令牌重复调用 API\
  \ 的循环。\n\n图 9-2\n授权码许可流程\n\n隐式许可流程\n在本节中，我们将回顾隐式许可及其流程。\n\n何时使用？\n它通常用于客户端在浏览器中运行并使用诸如\
  \ JavaScript 等脚本语言的情况。此授权类型不允许颁发刷新令牌。\n**示例**：\n**资源所有者**：你\n**资源服务器**：一个服务器\n**客户端**：例如，一个使用\
  \ AngularJS 的网站\n**授权服务器**：一个服务器\n\n**场景**：\n\n1.  客户端（AngularJS）想要获取关于你 Facebook\
  \ 个人资料的信息。\n\n2.  浏览器将你重定向到授权服务器（Facebook）。\n\n3.  如果你授权访问，授权服务器会将你重定向到网站，并在 URI\
  \ 片段中附带访问令牌（不会发送到 Web 服务器）。回调示例：[`http://example.com/oauthcallback#access_token=MzJmNDc3M2VjMmQzN`](http://example.com/oauthcallback%252523access_token=MzJmNDc3M2VjMmQzN)。\n\
  \n4.  现在，客户端（AngularJS）可以检索并使用此访问令牌来查询资源服务器（Facebook）。查询示例：[`https://graph.facebook.com/me?access_token=MzJmNDc3M2VjMmQz`](https://graph.facebook.com/me?access_token=MzJmNDc3M2VjMmQz)。\n\
  \n也许你会好奇，客户端如何能够使用 JavaScript 调用 Facebook API 而不被同源策略阻止？嗯，这种跨域请求之所以可能，是因为 Facebook\
  \ 通过在其响应中包含一个名为 `Access-Control-Allow-Origin` 的头部来授权它。\n**注意**\n只有在没有其他授权类型可用时，才应使用此授权类型。实际上，它是最不安全的，因为访问令牌在客户端侧是暴露的（因此是脆弱的）。\n\
  **序列图**\n\n图 9-3 展示了隐式许可流程的序列图。\n\n![](img/427457_3_En_9_Fig3_HTML.jpg)\n\n该图展示了\
  \ OAuth 2.0 中的隐式许可流程。它展示了四个实体之间的交互：资源所有者、JavaScript 应用程序、授权服务器和资源服务器。流程包括访问令牌请求、登录与同意以及访问令牌信息请求等步骤。JavaScript\
  \ 应用程序向授权服务器请求访问令牌，需要提供客户端 ID、重定向 URI 和响应类型。验证成功后，应用程序使用访问令牌调用 API，资源服务器则响应数据。对于跨域请求，必须实现跨源资源共享（CORS）。\n\
  \n图 9-3\n隐式许可流程的序列图\n\n资源所有者密码凭据许可\n在本节中，我们将回顾资源所有者密码凭据许可及其流程。\n\n何时使用？\n使用这种授权类型时，凭据（以及密码）会被发送到客户端，然后再发送到授权服务器。因此，这两个实体之间必须存在绝对的信任。它主要用于客户端与授权服务器由同一机构开发的情况。例如，我们可以设想一个名为“example.com”的网站，它需要访问其子域名“api.example.com”上的受保护资源。用户在“example.com”网站上输入其登录名/密码并不会感到意外，因为他的账户就是在这个网站上创建的。\n\
  **示例**：\n**资源所有者**：你在 Acme 公司的 acme.com 网站上拥有一个账户。\n**资源服务器**：Acme 公司在 api.acme.com\
  \ 上公开其 API。\n**客户端**：Acme 公司的 acme.com 网站。\n**授权服务器**：一个 Acme 服务器。\n\n**场景**：\n\n\
  1.  Acme 公司做事周到，考虑向第三方应用程序提供一个 RESTful API。\n\n2.  该公司认为使用自己的 API 会很方便，可以避免重复造轮子。\n\
  \n3.  该公司需要一个访问令牌来调用其自身 API 的方法。\n\n4.  为此，该公司要求你像往常一样通过标准的 HTML 表单输入你的登录凭据。\n\n\
  5.  服务器端应用程序（网站“acme.com”）将用你的凭据向授权服务器交换一个访问令牌（当然，前提是你的凭据是有效的）。\n\n6.  现在，该应用程序可以使用访问令牌来查询其自身的资源服务器（api.acme.com）。\n\
  \n**序列图**\n\n图 9-4 展示了此流程的序列图。\n\n![](img/427457_3_En_9_Fig4_HTML.jpg)\n\n资源所有者密码凭据许可流程图。它展示了四个实体之间的交互：资源所有者、客户端、授权服务器和资源服务器。流程从资源所有者向客户端提供凭据进行身份验证开始。客户端向授权服务器发送访问令牌请求，需要提供\
  \ client_id、client_secret、redirect_uri、grant_type=password、username 和 password。授权服务器响应一个访问令牌和可选的刷新令牌。客户端进入一个循环，使用访问令牌调用\
  \ API，并从资源服务器接收包含数据的响应。\n\n图 9-4\n资源所有者密码凭据许可流程\n\n客户端凭据许可\n这种授权类型在客户端本身就是资源所有者时使用。无需从最终用户那里获取授权。\n\
  **示例**：\n**资源所有者**：任何网站\n**资源服务器**：Google Cloud Storage\n**客户端**：资源所有者\n**授权服务器**：一个\
  \ Google 服务器\n\n**场景**：\n\n1.  一个网站将其各种类型的文件存储在 Google Cloud Storage 上。\n\n2.  该网站必须通过\
  \ Google API 来检索或修改文件，并且必须向授权服务器进行身份验证。\n\n3.  一旦通过身份验证，该网站就会获得一个访问令牌，现在可以用它来查询资源服务器（Google\
  \ Cloud Storage）。\n\n在这里，最终用户无需为访问资源服务器而提供授权。\n**序列图**\n\n图 9-5 展示了此流程的序列图。\n\n\
  ![](img/427457_3_En_9_Fig5_HTML.jpg)\n\n该图展示了 OAuth 2.0 中的客户端凭据许可流程。该过程涉及客户端（资源所有者）向授权服务器发送访问令牌请求，需要提供客户端\
  \ ID、客户端密钥和授权类型。授权服务器响应一个访问令牌。然后，客户端使用此令牌调用资源服务器上的 API，资源服务器返回包含数据的响应。该图包含一个注释，说明在此流程中不建议使用刷新令牌。\n\
  \n图 9-5\n客户端凭据许可流程\n\n\n\nAPI 安全——JSON Web Token\nJWT 是 JSON Web Token 的缩写，它是一种常用的无状态用户认证标准，用于在客户端和服务器之间以\
  \ JSON 格式安全地传输信息。JWT 默认是编码而非加密的。它使用仅服务器知晓的密钥进行数字签名。\n\n一个 JSON Web Token 由三部分组成，各部分以句点分隔：头部、载荷和签名。每个部分都经过\
  \ base64 编码。\n\n典型的 JWT 授权流程包含以下步骤：\n\n1.  **认证**：用户使用用户名和密码登录，或通过 Google 或 Facebook\
  \ 等方式登录。服务器验证所提供的凭据。\n\n2.  **生成令牌并发送给客户端**：服务器生成 JWT 并将其发送给客户端，客户端将其存储以备将来使用。\n\
  \n3.  **将令牌发送给服务器**：当客户端想要访问服务器上的受保护资源时，它会在 HTTP 请求的 Authorization 头部中发送 JWT。\n\n\
  4.  **验证令牌**：服务器接收请求，并使用签署 JWT 时所用的密钥检查其签名来验证 JWT。如果 JWT 有效，服务器会提取其中包含的信息，并据此确定用户有权执行哪些操作。\n\
  \n5.  **授权请求**：如果用户有权访问该资源，服务器将返回请求的数据。如果用户未获授权，服务器将返回一条错误消息。\n\n**优点**\n\n*   轻量级。\n\
  \n*   **可移植性**：可在多种平台（Web 和移动端）上处理。\n\n*   JSON 解析器在大多数编程语言中都很常见。\n\n*   由于密钥存储在服务器端，因此可防止篡改。\n\
  \n*   由于 JWT 令牌的无状态特性，服务器无需存储任何会话信息。\n\n**缺点**\n\n*   如果被截获，可能提供完全访问权限。这就是为什么客户端上的\
  \ JWT 应存储在安全位置，例如浏览器中的 HttpOnly cookie 中。\n\n*   在服务器端，应在注销时手动将未过期的 JWT 标记为无效。即使\
  \ JWT 已从客户端删除，它仍然可能有效。\n\n练习——基础安全\n\n使用 [Micronaut 命令行界面](https://docs.micronaut.io/latest/guide/%2523cli)\
  \ 或 [Micronaut Launch](https://launch.micronaut.io/) 创建一个应用程序。\n\n```\nmn create-app\
  \ example.micronaut.micronautguide \\\n--features=security,graalvm \\\n--build=maven\
  \ \\\n--lang=java \\\n--test=junit\n```\n\n为简单起见，创建一个简单的 AuthenticationProvider\
  \ 来模拟用户认证。\n\n```\nsrc/main/java/example/micronaut/AuthenticationProviderUserPassword.java\n\
  package example.micronaut;\nimport io.micronaut.core.annotation.NonNull;\nimport\
  \ io.micronaut.core.annotation.Nullable;\nimport io.micronaut.http.HttpRequest;\n\
  import io.micronaut.security.authentication.AuthenticationFailureReason;\nimport\
  \ io.micronaut.security.authentication.AuthenticationRequest;\nimport io.micronaut.security.authentication.AuthenticationResponse;\n\
  import io.micronaut.security.authentication.provider.HttpRequestAuthenticationProvider;\n\
  import jakarta.inject.Singleton;\n@Singleton\nclass AuthenticationProviderUserPassword\
  \ implements HttpRequestAuthenticationProvider {\npublic AuthenticationResponse\
  \ authenticate(\n@Nullable HttpRequest httpRequest,\n@NonNull AuthenticationRequest\
  \ authenticationRequest\n) {\nreturn authenticationRequest.getIdentity().equals(\"\
  sherlock\") && authenticationRequest.getSecret().equals(\"password\")\n? AuthenticationResponse.success(authenticationRequest.getIdentity())\n\
  : AuthenticationResponse.failure(AuthenticationFailureReason.CREDENTIALS_DO_NOT_MATCH);\n\
  }\n}\n```\n\n创建解析根 URL / 的 HomeController：\n\n\n\n```\npackage example.micronaut;\n\
  import io.micronaut.http.MediaType;\nimport io.micronaut.http.annotation.Controller;\n\
  import io.micronaut.http.annotation.Get;\nimport io.micronaut.http.annotation.Produces;\n\
  import io.micronaut.security.annotation.Secured;\nimport io.micronaut.security.rules.SecurityRule;\n\
  import java.security.Principal;\n@Secured(SecurityRule.IS_AUTHENTICATED)\n@Controller\n\
  public class HomeController {\n@Produces(MediaType.TEXT_PLAIN)\n@Get\nString index(Principal\
  \ principal) {\nreturn principal.getName();\n}\n}\n```\n\n运行应用程序\n\n```\ncurl -v\
  \ -u sherlock:password localhost:8080\n```\n\n如果在浏览器中打开 http://localhost:8080，由于\
  \ `WWW-Authenticate` 标头，会弹出一个登录对话框。\n详情请参考以下内容：\n[`https://guides.micronaut.io/latest/micronaut-security-basicauth-maven-java.html`](https://guides.micronaut.io/latest/micronaut-security-basicauth-maven-java.html)\n\
  **练习——JSON Web 令牌**\n有关 Micronaut 中 JWT 的实现，请参考以下内容：\n[`https://guides.micronaut.io/latest/micronaut-security-jwt-gradle-java.html`](https://guides.micronaut.io/latest/micronaut-security-jwt-gradle-java.html)\n\
  \n总结\n在本章中，我们回顾了用于保护 RESTful API 安全的 OAuth 2 标准，并完成了一个关于实现基本 Spring Security 的练习。我们还回顾了有关\
  \ HTTP、服务器和 JWT 实现的概念。\n总而言之，本书从架构、设计和编码三个层面回顾了 REST API 的概念。\n架构方面涵盖的主题包括：Web 架构风格、API\
  \ 解决方案架构、API 组合架构、API 平台架构、API 管理和 Security-OAuth。\n设计方面涵盖的主题包括：REST API 基础、数据交换格式、SOAP\
  \ 与 REST 对比、XML 与 JSON 对比、API 设计简介（REST 和 JAX-RS）、API 设计最佳实践、建模 RESTful API、构建 RESTful\
  \ API 框架、与 RDBMS（MySQL）和 NoSQL 数据库交互、消费 RESTful API（即 JSON 和 XML）以及安全性。\n我们还在编码方面完成了练习，以理解每个概念如何在每章末尾实现。\n\
