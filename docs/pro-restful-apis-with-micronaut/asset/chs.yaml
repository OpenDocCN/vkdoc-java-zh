  \ getQuote (Long id)    {\nQuote quote = quoteRepo.findById(id).get();\nreturn quote;\n\
  }\n@Get\npublic List getQuotes() {\nIterable quotes =  quoteRepo.findAll();\nList\
  \ result = new ArrayList();\nquotes.forEach(result::add);\nreturn result;\n}\n@Put(\"\
