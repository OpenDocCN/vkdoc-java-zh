  \ | `@Path(\"/foo\")` // 在方法上\n\n[**@HttpMethod**](https://jakarta.ee/specifications/restful-ws/3.0/apidocs/jakarta/ws/rs/HttpMethod.html)\
  \ | [**@HttpMethodMapping**](https://docs.micronaut.io/latest/api/io/micronaut/http/annotation/HttpMethodMapping.html)\
