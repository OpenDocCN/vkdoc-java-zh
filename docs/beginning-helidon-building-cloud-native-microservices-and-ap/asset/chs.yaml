  如果没有，请安装 JDK 和 Maven。关于如何安装的详细说明可以在网上找到。


  现在，我们来安装 CLI。安装命令取决于你使用的操作系统。


  如果你使用 macOS，请执行以下命令。


  ```

  curl -O https://helidon.io/cli/latest/darwin/helidon

  chmod +x ./helidon

  sudo mv ./helidon /usr/local/bin/

  ```


  如果你使用 Linux，请执行以下命令。


