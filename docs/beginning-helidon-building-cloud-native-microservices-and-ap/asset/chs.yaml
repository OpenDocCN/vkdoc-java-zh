  \ 创建连接\n\n*   ③ 创建语句\n\n*   ④ 执行 `SELECT` 查询，获取 `ResultSet` 并处理它\n\n*   ⑤ 关闭连接\n\
  \n*   ⑥ 处理异常\n\n```\ntry {\nString url = \"jdbc:h2:mem:sample\";               ①\n\
