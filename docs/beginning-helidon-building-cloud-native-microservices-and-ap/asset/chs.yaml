  引言


  Helidon 是一个用于开发云原生微服务的 Java 框架。其高性能、轻量化方案和便捷的 API 迅速在 Java 社区流行起来。本书是你入门 Helidon
  所需的一切，并将教你如何高效使用它。本书由 Helidon 的开发者撰写，他们最清楚该框架的设计使用方式。书中相当大的篇幅致力于对 MicroProfile API
  和规范进行详细讲解。


  阅读本书后，你将能够做到以下几点。


  *   创建和消费 RESTful 服务


  *   将应用打包并部署到 Kubernetes


  *   开发可观测应用，并利用健康检查、指标和追踪能力


  *   使用 OpenID Connect 保护你的服务


  *   处理数据


  *   提升应用的韧性


  *   理解并使用响应式消息和响应式流


  ## 本书适合谁阅读


  本书适合希望使用 Helidon 开始开发云原生应用的开发者和架构师，适合有兴趣使用 MicroProfile 和 Jakarta EE 开发可移植应用的开发者，也适合正在寻找
  Oracle Helidon Microservices Developer Professional 认证备考资料的人群。


  ## Helidon 认证


  Oracle 宣布了 Helidon Microservices Developer Professional 认证及其配套课程，用于证明微服务开发技能。本书作者参与了考试与课程开发。本书被设计为该认证考试的补充备考材料。尽管本书覆盖的是
  Helidon 3.x 版本，而考试基于较早版本的 Helidon（2.x）编制，但本书涵盖了所有认证主题，提供了额外信息，并从不同角度解释相关技术。


  你可以在官方页面获取更多信息：[`https://mylearn.oracle.com/ou/learning-path/become-a-helidon-microservices-developer-professional/114512`](https://mylearn.oracle.com/ou/learning-path/become-a-helidon-microservices-developer-professional/114512)。


  ## 本书内容概览


  第 1 章介绍 Helidon 并解释其关键优势。该章还讨论了 Helidon 的两种形态，并说明它们之间的差异。


  第 2 章介绍了用于引导创建 Helidon 应用的多种工具，例如 Helidon CLI、Project Starter 和 Maven Archetypes；讲解如何创建第一个应用、使用不同构建配置（可执行
  jar、JLink 镜像和 GraalVM 原生镜像）进行构建、创建 Docker 镜像并部署到 Kubernetes。


  第 3 章讲解如何配置 Helidon 应用，介绍 MicroProfile Config 规范；解释配置源、默认值和配置档案等概念；演示与 Kubernetes
  config map 的集成。


  第 4 章讲解可观测性及其对微服务的重要性，涵盖健康检查、指标、追踪和日志等概念，以及相应的 MicroProfile 规范。


  第 5 章讲解如何在 Helidon 应用中调用其他服务。内容涵盖 MicroProfile Rest Client 和跨域资源共享（CORS）。


  第 6 章讲解如何使用 JDBC 和 Jakarta Persistence 与数据库交互、查询及更新数据。


  第 7 章讨论如何使用 MicroProfile Fault Tolerance API 提升应用韧性，并解释超时、重试、回退、舱壁和断路器等概念。


  第 8 章讲解如何保护你的应用。内容涵盖 OpenID Connect 和 MicroProfile JWT RBAC 规范。


  第 9 章讲解如何使用 OpenAPI 为 API 编写文档，以及如何基于该文档自动生成客户端。


  第 10 章讲解如何使用 JUnit 测试应用，因为 Helidon 与该框架集成良好。


  第 11 章讲解如何在 Helidon 应用中调度任务。


  第 12 章讲解 Helidon 与其他技术（如 Neo4j、Verrazzano、Coherence CE 以及 Kotlin 编程语言）的集成程度。


  第 13 章讲解如何在 Helidon 应用中使用部分响应式功能。内容涵盖 MicroProfile Reactive Stream Operators、MicroProfile
  Reactive Messaging 规范以及与 Kafka 的集成。


  第 14 章讲解如何在 Helidon 应用中使用分布式事务。内容涵盖 Saga 模式和 MicroProfile LRA 规范。


  第 15 章介绍 Helidon SE——Helidon 的响应式形态。本章将引导你创建第一个 Helidon SE 应用，使用不同构建配置（可执行 jar、JLink
  镜像、GraalVM 原生镜像）并将其部署到 Kubernetes。


