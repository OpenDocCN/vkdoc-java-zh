  这里有三个选项。


  *   **Quickstart** 会生成一个 Maven 项目，包含所有依赖、Dockerfile、Kubernetes 应用描述文件，以及一个简单的问候服务应用，其中包含
  RESTful 服务示例和所需的全部引导代码。如果你计划开发 RESTful 服务，这是个不错的选择。


  *   **Database** 是当你的应用与数据库交互时的最佳选项。生成的项目包含所需的全部第三方依赖、配置文件和引导代码。




