  ### 消息（Message）


  由 `JMSConnector` 提供的响应式消息通过特殊的 JMS 特定方法进行了扩展。为了创建出站消息，可以使用一个便捷的 JMS 消息构建器。


  *   ① JMS 连接产生标准响应式消息传递 `Message` 的扩展


  *   ② `JmsMessage` 提供 JMS 特定功能；您可以访问原始的 `JMSMessage` 对象


  *   ③ JMS 属性是泛型类型的


  *   ④ 链式确认，当出站消息被 Ack 时，对入站消息进行 Ack


  ```

  @Incoming("from-jms")

  @Outgoing("to-jms")

  public Message process(JmsMessage incomingMsg) {  ①

  jakarta.jms.Message original = incomingMsg.getJmsMessage();  ②

  jakarta.jms.Session session = incomingMsg.getJmsSession();

  String propertyValue = incomingMsg.getProperty("my-jms-property");  ③

  return JmsMessage.builder(incomingMsg.getPayload())

  .property("my-jms-property", propertyValue.toUpperCase())

  .onAck(incomingMsg::ack)  ④

  .build();

  }

  清单 13-64

  从入站 JMS 消息创建新的 JMS 消息

  ```




  ### javax 与 jakarta JMS


  2017 年，Oracle 决定将 Java EE 移交给 Eclipse Foundation。经过漫长的过渡过程，最终演进为如今所知的 Jakarta EE
  更名。随着名称变更，Jakarta EE 9 还将包名从 `javax` 更新为 `jakarta`。这一过程被称为“jakartification”，它打破了与旧版基于
  `javax` 实现的向后兼容性。Helidon 3 已完全“jakartified”；不再暴露任何 `javax` 命名空间。


  对于 JMS API，这意味着 Helidon 3 使用的是 `jakarta.jms.Message`，而不是 `javax.jms.Message`。


  不过不用担心：实现 `javax` API 的旧版 JMS 客户端依然可以很好地与 jakarta 化后的 Helidon 协作。Helidon 3.0 为遗留的基于
  `javax` 的 JMS 实现提供了一个特殊的 shim 层，并会在后台隐式使用。你甚至可以手动将它作为两个 API 之间的适配器来使用。


  ```

  jakarta.jms.ConnectionFactory cf =

  JakartaJms.create(new ActiveMQConnectionFactory("tcp://127.0.0.1:61616"));

  Listing 13-65

  Manual Usage of JMS Shim As an Adapter Between Javax and Jakarta APIs

  ```


  ## WebLogic JMS 连接器


  WebLogic Server 拥有自己的企业级消息系统，简称 WebLogic JMS。WebLogic 集群成员可以充当 JMS Broker，实现 JMS
  规范，并提供多种扩展特性，例如分布式目的地、负载均衡、SAF（存储转发）服务等。


  在用于连接 WebLogic 的某些专用客户端库中，需要用到 JMS。其中最常见的是 `wlthint3client.jar`，它随 WebLogic Server
  安装一起分发，通常位于 `/u01/oracle/wlserver/server/lib` 目录。


  在 Helidon 2 中可以使用任意 thin client JAR，但随着 Helidon 3 的 jakarta 化，这个过程变得相当复杂：来自旧版 WebLogic
  Server 安装的遗留 javax-based thin client 会与 Helidon 已 jakarta 化的服务加载器发生冲突。


  Helidon 3 提供了一个专用的 WebLogic JMS 连接器，可简化对任意遗留 thin client 库的使用，这些库会在由 jakarta shim
  层适配的自定义 classloader 中运行。


