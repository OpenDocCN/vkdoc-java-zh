  \n## 使用 JDBC 进行底层数据访问\n\n关系型数据库管理系统（RDBMS）和 NoSQL 数据库都是外部软件程序，通过数据库*驱动*并借助某种连接方式（通常是\
  \ TCP 连接）进行访问。通常，*数据库引擎*充当*服务端*，而我们的代码充当客户端。也可以将其称为*数据库服务器*。\n\nJava Database Connectivity（JDBC）是\
  \ Java 编程语言的一个 API，规定了客户端如何访问数据库。它自 1997 年起就被使用，是最古老的 Java 技术之一。\n\n该 API 用于动态加载合适的驱动程序，并将它们注册到\
  \ JDBC DriverManager 中。`DriverManager` 充当连接工厂，用于创建 JDBC 连接。\n\nJDBC 连接用于创建并执行*语句*，语句有多种类型。\n\
  \n*   **Statement** 是发送到数据库以读取或修改数据的常规语句。\n\n*   **PreparedStatement** 是缓存语句；其执行路径会在数据库服务器上预先确定，因此可以以高效方式重复执行。\n\
  \n*   **CallableStatement** 用于在数据库上执行存储过程。\n\n*查询*语句（例如 `SELECT`）会返回 JDBC 行结果集。它们表示表格型数据。行结果集带有元数据，用于描述列名及其类型。\n\
  \n*更新*语句（例如 `INSERT`、`UPDATE` 和 `DELETE`）会修改数据库中的数据，并返回更新计数，以表示受影响的行数。\n\nHelidon\
  \ MP 不包含任何数据库驱动；因此，我们需要根据所用数据库及供应商自行选择合适的驱动，并在应用的 `pom.xml` 文件中手动添加其依赖。\n\n让我们来看一些代码。为保持简单，我们使用\
  \ H2——一个小型内存数据库，主要用于单元测试。清单 6-1 是它的依赖。\n\n*   ① `scope` 是 `runtime`，因为 JDBC 驱动是运行时组件，编译时不需要。\n\
