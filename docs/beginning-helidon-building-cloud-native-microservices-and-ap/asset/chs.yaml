  ```


  系统会询问你希望生成的项目信息。第一个问题是项目要使用哪种 Helidon 风味。


  ```

  | Helidon Flavor

  Select a Flavor

  (1) se | Helidon SE

  (2) mp | Helidon MP

  Enter selection (default: 1):2

  ```


  你要使用 MP 风味，因此在命令提示符中输入 **2**。


  下一个问题是要生成哪种类型的项目。


  ```

  | Application Type

  Select an Application Type

  (1) quickstart | Quickstart

