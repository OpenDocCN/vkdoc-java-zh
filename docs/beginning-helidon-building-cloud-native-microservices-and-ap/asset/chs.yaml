  ## 在线影院订票系统


  我们假设的影院需要一个在线预订系统。让我们将其拆分为两个可扩展的服务：一个用于预订座位，另一个用于支付。这两个服务完全分离，仅通过 REST API 调用进行集成。


  预订服务将首先预留座位。预订服务启动一个新的 LRA 事务，并作为第一个事务参与者加入。所有与 LRA 协调器的通信都在后台完成，并且可以通过分配给新事务的 LRA
  ID 在我们的 JAX-RS 方法中作为请求头 `Long-Running-Action` 进行访问。请注意，LRA 在 JAX-RS 方法结束后仍保持活动状态，因为
  `Lra#end` 被设置为 `false`。


  ![](img/600147_1_En_14_Fig5_HTML.jpg)


  标题为“Helidon 影院预订”的截图，展示了编号从 11 到 49 的座位，排列成 3 行。座位 11 已被选中。下方文字显示：预订座位 11。


  图 14-5


  创建新的座位预订


  *   ① 创建新的 LRA 事务，该事务在此 JAX-RS 方法结束后不会终止

  *   ② 新 LRA 的时间限制为 30 秒

  *   ③ 协调器分配的 LRA ID 作为一个人工请求头提供


  ```

  @PUT

  @Path("/create/{id}")

  @LRA(value = LRA.Type.REQUIRES_NEW, end = false, timeLimit = 30)  ① ②

  public Response createBooking(@HeaderParam(LRA.LRA_HTTP_CONTEXT_HEADER) URI lraId,

  @PathParam("id") long id,

  Booking booking) {

  booking.setLraId(lraId.toASCIIString());  ③

  if (repository.createBooking(booking, id)) {

  LOG.info("Creating booking for " + id);

  return Response.ok().build();

  } else {

  LOG.info("Seat " + id + " already booked!");

  return Response

  .status(Response.Status.CONFLICT)

  .entity(JSON.createObjectBuilder()

  .add("error", "Seat " + id + " is already reserved!")

  .add("seat", id)

  .build())

  .build();

  }

  }

  清单 14-21

  在 LRA 事务中使用 JAX-RS 资源创建预订

  ```


  一旦座位成功预订，将在同一个 LRA 事务下调用支付服务。响应中包含一个人工头 `Long-Running-Action`，以便客户端可以访问它。


  *   ① 注意即使在客户端也能访问 LRA ID

  *   ② 并保存 LRA 上下文以供后续使用


  ```

  reserveButton.click(function () {

  selectionView.hide();

  createBooking(selectedSeat.html())

  .then(res => {

  if (res.ok) {

  let lraId = res.headers.get("Long-Running-Action");  ①

  paymentView.attr("data-lraId", lraId);  ②

  paymentView.show();

  } else {

  res.json().then(json => {

  showError(json.error);

  });

  }

  });

  });

  清单 14-22

  调用创建预订的 JAX-RS 资源

  ```


  您可以通过再次设置 `Long-Running-Action` 头，使用同一个 LRA 事务调用其他后端资源。


  ![](img/600147_1_En_14_Fig6_HTML.jpg)


  支付信息表单的截图，文字显示：为座位支付 20 美元。下方字段包括：姓名（Frank）、12 位虚拟卡号以及金额（20）。下方是“支付”按钮。


  图 14-6


  支付表单


  *   ① 使用之前保存的 LRA ID 在正确的 LRA 上下文中调用 JAX-RS 资源


  ```

  function makePayment(cardNumber, amount, lraId) {

  return fetch(''/booking/payment'', {

  method: ''PUT'',

  headers: {

  ''Content-Type'': ''application/json'',

  ''Long-Running-Action'': lraId  ①

  },

  body: JSON.stringify({"cardNumber": cardNumber, "amount": amount})

  })

  }

  清单 14-23

  从客户端调用支付 JAX-RS 资源

  ```


  后端通过 JAX-RS 客户端调用不同的服务，因此您无需设置 `Long-Running-Action` 头来传播 LRA 事务。与所有 JAX-RS 客户端一样，LRA
  实现会自动为您完成此操作。


  *   ① 需要在 LRA 事务上下文中调用

  *   ② 不结束 LRA 事务

  *   ③ 使用 JAX-RS 客户端时无需传播 LRA 头——LRA 头会自动传播




  ```

  @PUT

  @Path("/payment")

  @LRA(value = LRA.Type.MANDATORY, end = false)  ① ②

  public Response makePayment(@HeaderParam(LRA.LRA_HTTP_CONTEXT_HEADER) URI lraId,

  JsonObject jsonObject) {

  LOG.info("Payment " + jsonObject.toString());

  ClientBuilder.newClient()  ③

  .target("http://payment-service:7002")

  .path("/payment/confirm")

  .request()

  .rx()

  .put(Entity.entity(jsonObject, MediaType.APPLICATION_JSON))

  .whenComplete((res, t) -> {

  if (res != null) {

  LOG.info(res.getStatus() + " " + res.getStatusInfo().getReasonPhrase());

  res.close();

  }

  });

  return Response.accepted().build();

  }

  Listing 14-24

  Call Payment Service with Implicit LRA Context

  ```


  支付服务作为另一个参与者加入此事务。除 `0000-0000-0000` 之外的任何银行卡号都会取消 LRA 事务。由于 Lra#end 被设置为 `true`，资源方法执行结束将完成
  LRA 事务。


  *   ① 此资源方法会结束/提交已成功完成的 LRA 事务


  ```

  @PUT

  @Path("/confirm")

  @LRA(value = LRA.Type.MANDATORY, end = true)  ①

  public Response confirmPayment(@HeaderParam(LRA.LRA_HTTP_CONTEXT_HEADER) URI lraId,

  Payment p) {

  if (!p.cardNumber.equals("0000-0000-0000")) {

  LOG.warning("Payment " + p.cardNumber);

  throw new IllegalStateException("Card " + p.cardNumber + " is not valid! "+lraId);

  }

  LOG.info("Payment " + p.cardNumber+ " " +lraId);

  return Response.ok(JSON.createObjectBuilder().add("result", "success").build()).build();

  }

  Listing 14-25

  Payment Service Within LRA Context

  ```


  如果支付操作失败或超时，LRA 事务将被取消，所有参与者都会通过其加入时提供的补偿链接收到通知。LRA 协调器将调用带有 `@Compensate` 注解的方法，并将
  LRA ID 作为参数传入。这正是我们的预订服务所需的全部内容：清除座位预订，并使其可供其他客户使用。


  ![](img/600147_1_En_14_Fig7_HTML.jpg)


  一张示意图展示了编号从 11 到 49 的座位，分为 3 排。没有任何座位被选中。底部文字为：已预订座位 11 的支付失败。


  图 14-7


  支付失败通知


  *   ① 通过清除已预订座位进行补偿


  *   ② 通过 SSE 通知客户端有新座位可供预订


  ```

  @Compensate

  public Response paymentFailed(URI lraId) {

  LOG.info("Payment failed! " + lraId);

  repository.clearBooking(lraId)  ①

  .ifPresent(booking -> {

  LOG.info("Booking for seat " + booking.getSeat().getId() + "cleared!");

  Optional.ofNullable(sseBroadcaster)  ②

  .ifPresent(b -> b.broadcast(new OutboundEvent.Builder()

  .data(booking.getSeat())

  .mediaType(MediaType.APPLICATION_JSON_TYPE)

  .build())

  );

  });

  return Response.ok(ParticipantStatus.Completed.name()).build();

  }

  Listing 14-26

  Compensation if Payment Fails

  ```


  在分布式系统中通过补偿逻辑维护一致性并不是新想法，但如果没有专门工具，实现起来会相当复杂。LRA 就是这样一种工具，它隐藏了这些复杂性，让你可以专注于业务逻辑。


  ## 小结


  *   分布式事务需要牺牲隔离性，以保持微服务环境的响应式特征。


  *   基于补偿的逻辑将数据一致性的责任委托给开发者。


  *   LRA 事务上下文可以通过非 LRA 感知的资源进行传播。


  '
- '# 15. Helidon SE


  本章涵盖以下主题。


  *   理解 Helidon SE 与 Helidon MP 的差异与相似点


  *   创建一个简单的 Helidon SE 应用


  *   使用路由、配置、健康检查与指标


  *   本书未涵盖的其他 Helidon SE 特性


  正如你在第 1 章中学到的，Helidon 有两个版本：Helidon MP 和 Helidon SE。整本书主要围绕 Helidon MP 展开，但我们决定将最后一章献给
  Helidon SE。至此，本书内容才算完整。Helidon SE 是一个庞大的主题，很难在一章中讲完。因此，本章信息会更精炼、密度更高，但会覆盖 Helidon
  SE 的大多数特性，并提供实践方案与最佳实践。让我们开始吧。


  ## Helidon SE 基础


  在第 1 章中，我们已经将 Helidon SE 与 Helidon MP 做过比较。这里快速回顾一下，以建立上下文。


  *   Helidon SE 是 Helidon 的响应式、非阻塞版本。


  *   它构建在 Netty 之上。


  *   Helidon SE API 基于 Java Flow API。


  *   不使用反射 API、注解和依赖注入。


  *   Helidon SE 天然适配 GraalVM Native Image。


  *   Helidon SE 尝试充分利用 JDK 功能，并尽量减少对第三方依赖的使用。


  解释响应式编程的基础超出了本书范围。我们假设你已经了解背压（backpressure）、发布者/消费者、调度器等概念。如果你想使用 Helidon SE 进行开发，这些知识是必需的。


  ## 生成 Helidon SE 应用


  生成 Helidon SE 应用与生成 Helidon MP 应用遵循相同理念，这一点已在第 2 章说明。本节将引导你完成这个过程，并创建 Helidon SE
  Quickstart 应用。Quickstart 应用是一个简单的 RESTful 服务，非常适合演示 Helidon SE 概念。要生成它，你可以使用 Project
  Starter 或 Helidon CLI。


  ### 使用 Project Starter


  在浏览器地址栏输入 [`https://helidon.io/starter`](https://helidon.io/starter) 以打开 Helidon
  Project Starter（见图 15-1）。


  ![](img/600147_1_En_15_Fig1_HTML.jpg)


  Helidon 项目启动页截图。顶部选中了 starter 选项卡。在“generate your project”标题下选择了 Helidon 版本，其中启用了
  Helidon S E 单选按钮，下方有 next 按钮。


  图 15-1


  Project Starter


  Helidon SE 是创建新应用的默认选项。Quickstart 应用同样也是默认选项，因此你可以直接点击 Download，下载包含 Helidon SE
  项目的 zip 文件。


  注意


  Project Starter 提供了许多选项，允许你选择要添加到项目中的特性。你可以通过应用创建向导进行探索。*Custom* 应用类型是一条包含所有可定制项的路径。


  ### 使用 CLI


  Helidon CLI 是生成 Helidon SE 应用的另一种便捷方式。CLI 的安装及其基础功能已在第 2 章中说明。


  要生成 Helidon SE Quickstart 应用，请使用 CLI 的 `init` 命令。


  ```

  $ helidon init

  ```


  在第一个 Helidon Flavor 界面中，输入 **1** 以选择 Helidon SE，或者直接按 Enter，因为这是默认选项。


  ```

  | Helidon Flavor

  Select a Flavor

  (1) se | Helidon SE

  (2) mp | Helidon MP

  Enter selection (default: 1):

  ```


  如果你按默认选项操作，CLI 和 Project Starter 生成 Helidon SE Quickstart 应用的方式是一致的。与 Project Starter
  不同，CLI 没有跳过步骤的方式。因此，在所有步骤中按 Enter 即可生成你的应用。




  ## 分析生成的项目


  生成的 Helidon SE 快速启动应用与第 2 章描述的 Helidon MP 快速启动应用非常相似。它包含一个 Maven 项目、用于构建 jar 的 Dockerfile、jlink
  镜像、GraalVM 原生镜像以及 Kubernetes 的 app.yaml。它实现了相同的问候服务，但其源代码和概念与 Helidon MP 有显著不同。本章将在解释
  Helidon SE 应用工作原理的同时，讨论这些差异。


  现在，让我们看看生成了哪些内容。


  *   ① Kubernetes 部署描述符


  *   ② 用于构建 Docker 镜像的 Dockerfile，该镜像在标准 Java 运行时上运行你的应用


  *   ③ 用于构建 Docker 镜像的 Dockerfile，该镜像在自定义 Java 运行时（jlink 镜像）上运行你的应用


  *   ④ 用于构建 Docker 镜像的 Dockerfile，该镜像包含你的应用的原生镜像


  *   ⑤ Maven 项目


  *   ⑥ Greet RESTful 服务


  *   ⑦ 包含 `main` 方法和 Web 服务器初始化代码的主类


  *   ⑧ 应用配置


  *   ⑨ JUnit 测试示例


  *   ⑩ 测试配置


