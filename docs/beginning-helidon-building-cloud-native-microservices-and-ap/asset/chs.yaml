  ## Helidon 安全


  每个 HTTP 服务器都需要一种方式来限制对其资源的访问，使其仅对具备特定权限的特定用户开放。我们开发者构建自己的堡垒与城堡，用城墙和大门把未受邀请的用户挡在珍贵数据和内部功能之外。让我们想象一下这座属于我们的城堡。在中世纪城堡里，不是所有人都能打开主城门；否则任何人都可以进入。如果大门不受限制，那高墙又有什么意义呢？我们有必要知道谁是谁（身份认证）以及谁拥有什么权限（授权）。在我们的中世纪城堡中，守卫当然能够识别（认证）城堡居民。比如，如果他们认出守门人
  Gyles，就已经知道他因守门人的角色而可以操作城门。监狱长同样为守卫所熟知，几乎无所不能，也可以控制城门。在他的诸多角色中，也包括守门人角色。


  Helidon 不使用持剑披甲的守卫，而是提供了一套用于身份认证、授权和角色映射的安全提供者系统。每一项都可以作为独立依赖添加，并配置为协同工作。


  ![](img/600147_1_En_8_Fig4_HTML.png)


