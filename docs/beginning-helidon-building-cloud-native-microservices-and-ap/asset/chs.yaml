  前言




  ## 关于本书


  我们所处的云时代对应用程序提出了一些要求。本书介绍的是 Helidon——一个专为开发云原生应用而设计的 Java 框架。Helidon 汇集了创建云原生应用所需的全部功能，应用启动快、磁盘镜像占用小、内存消耗低。Helidon
  支持 MicroProfile 等现代标准，并部分支持 Jakarta EE，这为你的应用增加了可移植性，使其能够运行在不同厂商支持的运行时环境上。


  读完本书后，你将了解如何使用 Helidon 构建 Java 云原生应用，理解将应用打包进 Docker 容器的不同方案，并将其部署到 Kubernetes。你还将学习如何使用
  MicroProfile API 和 Helidon Reactive API。


  本书围绕各个主题提供了许多实用的配方、最佳实践和方法论。书中附带示例来演示 Helidon 的不同功能，可作为动手实践参考。内容按照复杂度递增的顺序展开，从创建一个简单的
  RESTful 服务开始，最终到 OpenID Connect 和分布式事务等复杂场景。


  ### 前置条件


  你需要了解 Java 语言的语法、语义，以及 Java 函数式编程基础，包括 lambda 函数。


  本书的部分章节需要你对依赖注入设计模式和 Jakarta EE CDI 规范有一些基础理解。


  本书的部分章节需要你理解响应式编程概念，包括背压（backpressure）、观察者（observers）和调度器（schedulers）。


  要运行示例，你必须安装 JDK 17 和 Maven 3.8.4。示例在更新版本的 Maven 上通常也能正常运行，但我们使用该版本构建，并可保证一切可用。推荐环境是带有
  bash shell 的 Linux 或 macOS。如果你使用 Windows，我们建议使用 Windows Subsystem for Linux（WSL）。


