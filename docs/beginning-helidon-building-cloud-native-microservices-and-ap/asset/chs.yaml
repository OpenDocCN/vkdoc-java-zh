  private String brokerUrl;  ①

  @Produces  ②

  @ApplicationScoped  ③

  @Named("activemq-cf")  ④

  public ConnectionFactory connectionFactory() {

  return new ActiveMQConnectionFactory(brokerUrl);

  }

