  \n## 使用 JPA 进行数据访问\n\n前面的章节讨论了如何使用 `DataSource` 缓解繁琐的数据库连接管理工作。然而，处理底层结果集的挑战仍然存在。数据库中的数据处于一个完全不同的领域中；对于关系型数据库而言，数据以彼此关联的表形式存储，并不是对象。因此，手动将这种表格数据转换为\
  \ Java 对象、再从 Java 对象转换回表格数据，是一个耗时的过程。为简化这一流程，出现了多种对象关系映射（ORM）框架。本质上，它们作为 `DataSource`\
  \ 与用户代码之间的中间层，将数据库中的关系型数据转换为 Java 对象，反之亦然，从而减少所需时间。\n\n但这些框架各自都有自己的 API 和使用模型。由于这是大多数企业应用中的共性问题，因此制定了一个通用规范。它叫作\
  \ [Jakarta Persistence API](https://jakarta.ee/specifications/persistence/)。这并不是一个开箱即用的解决方案；它是一份文档和一组\
  \ API，不同厂商需要对其进行实现。这些实现通常被称为 *JPA 提供者*。\n\nJPA 描述了（除其他内容外）其实现方式。\n\n*   将 Java 对象映射到关系数据库表。\n\
  \n*   管理这类持久化 Java 对象。\n\n*   与事务交互（这里指 Jakarta Transactions）。\n\n*   与命名数据源交互。\n\
  \n你只需在 POJO 上添加少量注解，JPA 提供者就会为你完成其余“魔法”。这些带注解的对象通过专门的 `EntityManager` 和 `EntityManagerFactory`\
  \ 类进行管理，而这些类会由 Helidon 自动配置和实例化。使用 JPA 编写的代码具有可移植性。这意味着当你切换提供者时，它仍以相同方式工作（本章后续会讨论）。\n\
  \nJPA 有两种运行模式。\n\n*   在**容器管理型**实体管理器中，JPA 管理由容器完全处理；在这里就是 Helidon。\n\n*   在**应用管理型**实体管理器中，JPA\
