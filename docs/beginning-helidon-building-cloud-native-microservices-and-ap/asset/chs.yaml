  ## 构建与运行


  要构建该项目，你必须切换到 `pom.xml` 所在目录并运行以下命令。


  ```

  mvn package

  ```


  提示


  你也可以使用 CLI 命令 `helidon build` 来构建项目。


  Helidon 默认构建一个*可执行 JAR*。不同的打包选项将在本章后续讨论。现在你只需知道，这个 JAR 位于 `target/quickstart-mp.jar`，并且可执行。让我们运行它。


  ```

  $ java -jar target/quickstart-mp.jar

  ```


  当服务器启动后，你可以在输出中看到一些有用信息，例如它运行的端口以及启用了哪些功能。


  ```

  ... Server started on http://localhost:8080 (and all other host addresses) in 1742
  milliseconds (since JVM startup).

  ... Helidon MP 3.0.0 features: [CDI, Config, Health, JAX-RS, Metrics, Open API,
  Server]

  ```


  现在让我们触发几个问候应用端点，验证应用是否正常运行。你需要保持服务器持续运行，因此必须打开另一个终端窗口或标签页。


  先测试默认问候。


  ```

  $ curl -X GET localhost:8080/greet

  {"message":"Hello World!"}

  ```


  下面是个性化问候。


  ```

  $ curl -X GET localhost:8080/greet/Reader

  {"message":"Hello Reader!"}

  ```


  你也可以尝试修改问候语。`curl` 命令列在表 2-2 中。


  ## 打包


  一个 Helidon 应用有三种打包选项。


  *   **可执行 JAR** 是 Java 应用的默认打包方式，并针对 Docker 分层进行了优化。


  *   **jlink 镜像** 是一个定制的 Java 运行时环境（JRE），只包含应用所需模块。


  *   **原生镜像** 是原生编译的二进制可执行文件，启动速度极快。


  ### 可执行 JAR


  使用 Maven 构建项目时，默认打包产物是可执行 JAR 文件。如果未指定额外 profile，则会启用该方式。


  ```

  mvn package

  ```


  提示


  你也可以使用 CLI 命令 `helidon build` 来构建项目。


  我们使用 *Hollow JAR* 方案。这意味着 JAR 文件只包含你的应用代码。所有第三方运行时依赖会被收集到应用 JAR 产出目录下的 `lib` 子目录中。


  在我们的 Quickstart 应用中，JAR 构建在 `target` 目录下，而所有第三方依赖会被收集到 `target/libs`。


  Hollow JAR 方案与 Docker 分层配合得非常好。一个 Dockerfile（在项目创建时自动生成）会为应用 JAR 创建单独层，而所有应用依赖存储在
  `libs` 目录中。相较于应用本身，这些依赖通常不常变化，因此这一层可以构建一次后重复使用，不必在每次创建 Docker 镜像时重建。此外，包含应用的层会非常小，有助于减少网络流量并缩短应用部署时间。


  要构建 Docker 镜像，请运行以下命令。


  ```

  docker build -t quickstart-mp .

  ```


  这会创建一个 `quickstart-mp` Docker 镜像。要运行它，使用以下命令。


  ```

  docker run --rm -p 8080:8080 quickstart-mp:latest

  ```


  ### jlink 镜像


  JRE 发行版体积通常较大。你的应用很可能并不会使用所有 Java 功能。有一种方法可以创建一个定制（更小）的 Java 运行时镜像，仅包含应用所需功能。这可以通过
  JDK 自带的 `jlink` 工具实现。


  警告


  并非所有 Java 发行版都提供生成定制 JRE 所需的 JDK 模块。在使用 Helidon JLink profile 之前，请先运行 `ls $JAVA_HOME/jmods`
  确认这些模块存在。如果没有任何输出，则说明未安装。基于 RPM 的发行版会在单独的 `java-*-openjdk-jmods` 包中提供 `*.jmod` 文件。基于
  Debian 的发行版仅在 `openjdk-*-jdk-headless` 包中提供 `*.jmod` 文件。


  Helidon 提供了一个特殊的构建 profile 来简化这一过程。它使用 Java 平台模块系统（JPMS）和一些高级分析，使其即使面对自动模块也能工作，而默认情况下并非如此。你可以使用以下命令调用它。


  ```

  mvn package -Pjlink-image

  ```


  提示


  你也可以使用 CLI 构建 jlink 镜像：`helidon build --mode JLINK`。


  执行该命令后，结果位于 `target/quickstart-mp-jri` 目录。该目录包含应用的自包含定制镜像，其中包括应用本身、运行时依赖以及它依赖的 JDK
  模块。你可以使用以下命令启动它。


  ```

  ./target/quickstart-mp-jri/bin/start

  ```


  该镜像还包含一个类数据共享（CDS）归档，它可以提升启动性能并减少内存占用，但不会减小磁盘占用。为了获得这些性能优化，磁盘占用会增加，而且增加可能相当明显——可达数
  MB。CDS 归档大小总会在构建输出末尾显示。


  Helidon 提供了一个选项来禁用 CDS 归档创建。如果你的目标是尽可能减小磁盘占用，这样做是有意义的。


  ```

  mvn package -Pjlink-image -Djlink.image.addClassDataSharingArchive=false

  ```


  要构建一个包含定制 JRE 的 Docker 镜像，请使用 Quickstart 附带的 `Dockerfile.jlink`。


  ```

  docker build -t quickstart-mp-jri -f Dockerfile.jlink .

  ```


  这会在 Docker 容器内执行完整构建。下载某些 Maven 依赖可能需要一些时间。完成后，你将在本地 Docker 仓库中获得一个 `quickstart-mp-jri`
  Docker 镜像。


  以下命令用于启动应用。


  ```

  docker run --rm -p 8080:8080 quickstart-mp-jri:latest

  ```




  ### 原生镜像


  当你运行 Java 应用程序时，必须安装 Java 运行时环境（JRE）。你的应用程序会被编译为可由 JRE 执行的字节码。JRE 是你所使用平台上的原生应用程序。它有
  Linux、Windows、macOS 以及其他操作系统的版本。


  GraalVM 是一种 Java 运行时，附带许多额外特性。其中一个特性是能够将 Java 字节码编译为原生可执行文件。这个特性称为 Native Image（原生镜像）。


  使用原生镜像时，用户可以获得多个优势。


  *   原生应用几乎可以瞬时启动。


  *   磁盘占用小于 JRE 加上你的编译后应用。而且它只是一个文件，传输起来也很简单。


  *   内存占用也更低，因为对于完全原生代码，运行时不需要大量元数据。


  这些优势并非没有代价，同时也存在一些限制。


  *   GraalVM 原生编译器必须了解所有允许你在运行时读取或修改类信息的功能调用。这包括 Reflection API 的所有用法、字节码操作、以及 `sun.misc.Unsafe`
  的使用等。这可能会让你的工作变复杂，尤其是在你的应用所依赖的第三方依赖中也使用了这些功能时。


  *   构建需要显著的时间。


  *   原生镜像是静态编译的，不使用任何运行时优化。对于长时间运行的服务，使用 HotSpot VM 可能更有意义，因为它会在运行时优化你的应用。借助这些优化，你的应用最终会超过以原生镜像方式运行的同一应用的性能。


  Helidon 支持两种构建原生镜像的方法。


  *   使用本地安装的 GraalVM 进行本地构建


  *   使用 Docker


  #### 本地原生镜像构建


  这种方式使用本地安装的 GraalVM。在构建之前，你需要确保 GraalVM 和 native image 组件已安装，并且 `GRAALVM_HOME` 变量指向
  GraalVM 安装目录内的 `Contents/Home/` 目录。应该类似如下。


  ```

  export GRAALVM_HOME=/opt/graalvm-ce-21.3.0/Contents/Home/

  ```


  要验证 GraalVM 是否正确安装，请运行以下命令。


  ```

  $GRAALVM_HOME/bin/native-image --version

  ```


  它应当显示 GraalVM 版本。如果没有显示，你必须继续排查和调整 GraalVM 安装。


  现在让我们构建一个原生镜像。


  ```

  mvn package -Pnative-image

  ```


  提示


  你也可以使用 CLI 构建原生镜像：`helidon build --mode NATIVE`。


  构建可能需要几分钟。完成后，你可以在 `target` 目录中找到原生可执行文件，并像平常运行原生应用那样运行它。


  ```

  ./target/quickstart-mp

  ```


  #### Docker 原生镜像构建


  该方法在 Docker 容器内构建原生镜像。结果是一个基于 *scratch* 且仅包含原生二进制文件的 Docker 镜像。你不需要在本地安装 GraalVM，但需要安装
  Docker。


  要构建它，运行以下命令。


  ```

  docker build -t quickstart-mp-native -f Dockerfile.native .

  ```


  第一次运行时会花一些时间，因为它会下载所有 Maven 依赖并将其缓存到 Docker 层中。后续构建会快得多。


  构建结果是 `quickstart-mp-native` Docker 镜像。你可以使用 `docker images` 命令进行验证。


  ```

  $ sudo docker images

  REPOSITORY             TAG      IMAGE ID       CREATED         SIZE

  quickstart-mp-native   latest   18a7c74dd257   47 seconds ago  95.6MB

  ```


  使用以下命令在 Docker 中启动你的原生应用。


  ```

  docker run --rm -p 8080:8080 quickstart-mp-native:latest

  ```


  ## 部署到 Kubernetes


  现在让我们看看如何将你的应用部署到 Kubernetes。如果你没有云端 Kubernetes 集群，你可以在本地计算机上安装 minikube 或 Docker
  Desktop。对于部署我们的 Quickstart 应用来说，这已经足够。


  Kubernetes 部署描述文件 `app.yaml` 在项目创建时就已生成。所以现在，你需要做的就是部署应用。


  首先，确保你的集群已经启动并正在运行。


  ```

  kubectl cluster-info

  kubectl get nodes

  ```


  如果你在屏幕上看到任何错误，说明你的集群不可用。你需要花些时间修复它。


  现在让我们确认你已经构建了包含应用的 Docker 镜像。


  ```

  docker images

  ```


  确保命令输出中存在 `quickstart-mp`。如果没有，你应按照“Executable JAR”章节中的说明构建 Docker 镜像。


  提示


  如果你想部署 jlink 或原生镜像容器，请将 `app.yaml` 中的 `image` 属性相应改为 `quickstart-mp-jri` 或 `quickstart-mp-native`。


  运行以下命令来部署你的应用。


  ```

  kubectl create -f app.yaml

  ```


  部署可能需要一些时间，但通常不会太久。持续执行 `kubectl get pods`，直到你看到 `quickstart-mp` Pod 的状态为 RUNNING。


  你需要找到它运行的端口来测试应用是否正常。查看以下命令的结果，并注意 PORT(S)。你需要使用的是第二个端口号。


  ```

  kubectl get service quickstart-mp

  NAME          TYPE     CLUSTER-IP    EXTERNAL-IP PORT(S)         AGE

  quickstart-mp NodePort 10.108.202.98       8080:30324/TCP  3m50s

  ```


  例如，如果端口是 30324，运行以下命令。


  ```

  curl -X GET http://localhost:30324/greet

  ```


  要从 Kubernetes 中移除你的应用，运行以下命令。


  ```

  kubectl delete -f app.yaml

  ```


  ## 总结


  *   Helidon 提供了便捷方式，可通过 Project Starter、CLI 和 Maven Archetypes 快速引导你的应用开发。


  *   你可以构建可执行 JAR、自定义 jlink 镜像以及 GraalVM Native Image。


  *   Helidon MP 应用已为 CDI 做好支持。


  *   得益于提供的 Dockerfile，构建包含你应用的 Docker 镜像非常容易。


  *   Kubernetes 部署描述文件会在项目创建时自动生成。




  '
- '# 3. 配置


  本章涵盖以下主题。


  *   在基于 Helidon 的微服务中使用 MicroProfile Config


  *   理解配置源（config sources）的概念


  *   与 Kubernetes ConfigMap 集成


  *   配置数组或集合


  *   使用默认值、Profile 和表达式


  你的微服务需要可配置。为什么？因为任何依赖硬编码值的部署都会让你的服务失去可移植性。想象一下魔法师游戏里的一个角色。当你想派他去执行任务时，你会为他配备最适合该任务的各种药水和武器。但如果做不到呢？如果这个魔法师的背包是硬编码的，那他可能只适合某些任务。一个配置良好的服务也是同样道理；你可以把它部署到任何地方，而不必仅仅因为数据库名称不同就去重新构建和重新打包。那当你把服务从测试环境迁移到生产环境时怎么办？你肯定不想只为了改连接凭据就重建应用，对吧？Java
  自身就有配置工具。你知道 `System.getProperties()` 和 `System.getenv()`。这些属性是通过命令行提供配置的一种很好的方式。


  通过 `java -DorcSlayingPotions=5 -jar mySorcerer.jar` 启动 Java 应用时，你可以设置属性，并在应用内部通过简单调用
  `System.getProperty("orcSlayingPotions")` 取回该值。在你只需要这些功能时它很好用；但一旦你希望它做得更多，比如覆盖默认值、解析占位符，或者基于环境
  profile 快速切换时，就不够了。那么，如果有一个工具能做到这些，还能把你的属性映射为正确类型并在最需要的地方注入它们，会怎样？下面介绍 Helidon MicroProfile
  的配置实现。下文我们称它为“Config”。它也被 Helidon 的许多其他特性使用，并且在本书后续会经常提到。


  由于 Helidon MP 提供了 CDI，你可以轻松地将配置属性直接注入到 Bean 中；不需要任何特殊设置。


  *   ① 默认值始终以字符串定义。用于配置源中值的转换器同样会应用到默认值上。


  *   ② 这里通过 CDI 将配置属性注入到 Bean 构造函数中。


  ```

  @ApplicationScoped

  public class SorcererBean {

  @Inject

  public SorcererBean(

  @ConfigProperty(name="sorcerer.orcSlayingPotions",

  defaultValue = "0")   ①

  Integer orcSlayingPotions){           ②

  Listing 3-1

  Default Value Definition with the @ConfigProperty Annotation

  ```


  如果你在注入属性时没有提供默认值，并且在任何可用配置源中都找不到该属性，那么在部署期间会抛出 `NoSuchElementException` 错误。不过别担心，对于可选属性，你可以使用下面这些可空数据类型之一。


  *   `org.eclipse.microprofile.config.ConfigValue`


  *   `Optional<TheType>`


  ## 表达式


  有时，同一个值需要被多个配置属性使用，或者需要由多个值拼接而成。在这种情况下，表达式就非常有帮助，它可以用其他属性值来组合当前属性值。表达式可以帮助你避免配置重复，并定义与上下文相关的默认值。


  *   ① 注意 `sorcerer.level` 表达式的默认值是 `15`。


  ```

  sorcerer.level=30

  sorcerer.name=Merlin

  sorcerer.title=${sorcerer.name}_${sorcerer.level:15}   ①

  Listing 3-2

  Expression with a Default Value in a Properties File

  ```


  在清单 3-2 中，魔法师的头衔是 `Merlin_30`。但是，如果缺少 `sorcerer.level` 属性，就会使用表达式中的默认值，头衔将变为 `Merlin_15`。表达式在直接于配置文件中拼接数据库连接字符串或
  JAAS 配置时非常实用。


  ## 编程式 API


  当 CDI 注入不可用时，编程式 API 就能派上用场。它的所有优点与注入配置属性时的行为一致。你可以以单例方式访问 `org.eclipse.microprofile.config.Config`。


  ```

  Integer orcSlayingPotions =

  ConfigProvider.getConfig()

  .getValue("sorcerer.orcSlayingPotions", Integer.class);

  Listing 3-3

  Obtaining a Configuration Property over the Programmatic API

  ```


  或者，直接通过 `@Inject Config` 将 config 注入你的 Bean。该方式允许你手动访问所有配置源中的可用属性。那么这个 Config 源到底是什么？它就是属性值的来源！


  ## 配置源


  MicroProfile Config 首先会查找可用的配置源。配置源提供了应用中可检索的属性。每个配置源都有一个特殊的序号（ordinal），用于定义属性解析顺序。如果多个配置源包含同一属性，则使用序号更高的那个。这个特性提供了一种优雅的方式，在需要时覆盖属性。规范定义了以下三个默认配置源。


  *   类路径上所有 `META-INF/microprofile-config.properties` 文件，默认优先级序号为 `100`。


  *   环境变量，默认优先级序号为 `300`，会覆盖属性文件中的同名属性。环境变量键名不区分大小写，非字母数字字符可与下划线互换。例如，当 `sorcerer.orcSlayingPotions`
  在环境变量中没有候选项时，会解析 `SORCERER_ORCSLAYINGPOTIONS` 这个键。


  *   系统属性（我们的 `-Dsorcerer.orcSlayingPotions=5` 在这里同样适用，默认优先级序号为 `400`）。因此，它会覆盖所有其他默认配置源中的同名属性。


  图 3-1 显示了多个默认配置源为 `sorcerer.orcSlayingPotions` 属性提供不同值。你已经知道，会注入来自序号最高配置源的属性。在我们的例子中，`SorcererBean`
  得到五瓶 `orcSlayingPotions`，没有隐形斗篷，武器则是一把斧头和一把剑。所有配置源的属性会被合并，重复项按源序号来解析。


  ![](img/600147_1_En_3_Fig1_HTML.png)


  三个矩形块包含一组代码。来自 c l i 和 micro profile config properties 块的、标注为 ordinal 100、ordinal
  400 和 ordinal 300 的箭头，指向 Sorcerer Bean dot Java 块中的代码。


  图 3-1


  从各种配置源注入配置属性，优先级由 ordinal 表示。若键相同，则注入来自 ordinal 最高配置源的属性


  默认配置源的优先级并非一成不变。你可以通过一个特殊配置键 `config_ordinal` 来调整优先级。例如，如果你需要在类路径中再加入一个 JAR，并让其中的属性文件覆盖主
  JAR 中的属性文件，你可以借助这个特殊键提高该文件优先级，比如：`config_ordinal=105`。


  查看图 3-1 中的武器配置，你会很快认出那是一个数组。默认情况下，数组使用逗号分隔。一个配置数组可以作为列表、集合（set）或目标类型数组来注入。


  *   ① 以数组形式注入的武器


  *   ② 字符串列表


  *   ③ 字符串集合


  ```

  @Inject

  public SorcererBean(

  @ConfigProperty(name="sorcerer.weapons")

  String[] weaponsArray,   ①

  @ConfigProperty(name="sorcerer.weapons")

  List weaponsList,   ②

  @ConfigProperty(name="sorcerer.weapons")

  Set weaponsSet{   ③

  Listing 3-4

  Configuration Properties Injected into a Bean Constructor

  ```




  ## 转换器


  每个配置值都会被当作纯文本处理，并通过一组内置或自定义转换器转换为目标类型，无论该值来自哪个配置源。转换器会根据目标属性类型进行选择，如图 3-2 所示。


  ![](img/600147_1_En_3_Fig2_HTML.jpg)


  包含文本的三个区块展示了配置值到目标属性类型的转换。使用的转换器是 Java dot lang dot integer。


  图 3-2


  用于解析给定属性文本值的转换器由注入点的类型决定


  内置转换器覆盖了你能想到的所有基础类型——数字、布尔值、字符、类引用、日期和模式。


  *   布尔值：`true`、`1`、`YES`、`Y` 和 `ON` 会被转换为 `true`；其他所有值都会被转换为 `false`。


  *   数字：基本上，所有表示数字的 Java 原始类型和装箱类型都受支持；点号会被解析为小数分隔符。


  *   日期和时间：支持 `LocalDate`、`Duration`、`Period`、`Instant` 以及许多其他类型。


  *   其他：支持 `Path`、`File`、`URL`、`URI`、`Charset`、`Pattern` 以及许多其他类型。


  这样就够了吗？因为你才刚刚开始！


  ### 自动转换器


  如果自定义类型提供以下任意一种能力，那么任何自定义类型都可以通过自动转换器自动完成转换：


  *   拥有方法 `public static T of(String val)`


  *   拥有方法 `public static T valueOf(String val)`


  *   拥有方法 `public static T parse(CharSequence val)`


  *   拥有一个带单个 `String` 参数的公共构造函数


  如果没有为该自定义类型注册自定义转换器，就会应用自动转换器。


  ## 聚合属性


  你可以在逻辑上对属性进行分组。这样的配置更容易理解和使用。对于扁平结构的配置文件（例如 properties 文件），你可以基于公共前缀来实现分组。


  ```

  sorcerer.orcSlayingPotions=68

  sorcerer.invisibilityCloak=false

  sorcerer.weapons=axe,sword

  Listing 3-5

  Properties with a Common Prefix

  ```


  在 YAML 这类树形结构格式中，分组会容易得多。我们用 *readable* 这个词来形容它，但在没完没了的 YAML 论战中保持中立。


  ```

  sorcerer:

  orcSlayingPotions: 68

  invisibilityCloak: false

  weapons: axe,sword

  Listing 3-6

  YAML Properties with a Common Prefix

  ```


  将这类分组属性逐个注入，会让我们的兽人猎杀业务代码显得相当杂乱。


  ```

  @Inject

  public SorcererBean(

  @ConfigProperty(name="sorcerer.orcSlayingPotions")

  int potions,

  @ConfigProperty(name="sorcerer.invisibilityCloak")

  boolean cloak,

  @ConfigProperty(name="sorcerer.weapons")

  List weapons)

  Listing 3-7

  Injection of Each Separate Property To a Bean Constructor

  ```


  在这段代码中，你无论如何都会把这些属性归到同一个 Java 对象下；例如 `SorcererProperties` 这个名字就不错。你可以把向对象填充属性的工作交给
  config 来完成。


  ```

  @ConfigProperties(prefix="sorcerer")

  public class SorcererProperties {

  @ConfigProperty(name="orcSlayingPotions") int potions;

  boolean cloak;

  List weapons;

  }

  Listing 3-8

  Properties with a Common Prefix Grouped to a Common Bean

  ```


  请注意这个 CDI 配置 Bean；属性名默认从字段名派生，除非通过注解覆盖。我们的 `SorcererProperties` 可以像标准 CDI Bean 一样被注入，因此你可以在任何需要的地方注入它，并访问其中所有分组属性。


  ```

  @Inject

  public SorcererBean(@ConfigProperties SorcererProperties

  sorcererProperties)

  Listing 3-9

  Properties Bean Injected to a Bean Constructor

  ```


  ### 自定义转换器


  如果到目前为止提到的所有转换器都不能满足你的使用场景，你仍然可以创建自己的自定义 Config 转换器，并通过服务定位器进行注册。


  你可以创建一个转换器，把保存为属性值的 JSON 转换出来。假设在我们的示例中，兽人是这样配置的。


  ```

  app.jsonOrc={"orcName":"Scullcrack", "level":"34"}

  Listing 3-10

  Property with a Raw JSON Value

  ```


  但你希望将属性值直接注入为 `jakarta.json.JsonObject`，这样业务代码就不会被 JSON 解析逻辑弄得杂乱。让我们为此创建一个自定义转换器；它只是一个实现了
  `org.eclipse.microprofile.config.spi.Converter` 的类。


  *   ① 如果同一类型有多个可用转换器，则使用优先级最高的那个；`100` 是默认优先级。


  ```

  @Priority(101)   ①

  public class JsonConverter implements Converter{

  private static final JsonReaderFactory JSON =

  Json.createReaderFactory(Collections.emptyMap());

  @Override

  public JsonObject convert(String value) {

  return JSON.createReader(new StringReader(value))

  .readObject();

  }

  }

  Listing 3-11

  Custom JSON Converter for Parsing Properties with JSON as the Value

  ```


  注意


  转换器会作为服务提供者进行注册。如果你正在开发基于 classpath 的项目，请创建一个提供者配置文件，内容为 `my.package.JsonConverter`。


  `META-INF/services/org.eclipse.microprofile.config.spi.Converter`


  Config 运行时会通过服务加载机制找到你的转换器。


  在基于 JPMS 模块的项目中注册服务提供者时，别忘了使用 `module-info.java`。只需在 `module-info.java` 中添加 `provides`
  `org.eclipse.microprofile.config.spi.Converter` with `my.package.JsonConverter`;
  子句。


  你可以直接在 JAX-RS 资源中测试我们崭新的自定义转换器。你会看到，直接在需要的地方注入转换后的值是多么容易。


  ```

  @Path("/jsonOrc")

  public class OrcResource {

  private JsonObject jsonOrc;

  @Inject

  public OrcResource(@ConfigProperty(name = "app.jsonOrc")

  JsonObject jsonOrc) {

  this.jsonOrc=jsonOrc;

  }

  @GET

  @Produces(MediaType.APPLICATION_JSON)

  public JsonObject getJsonOrc() {

  return jsonOrc;

  }

  }

  Listing 3-12

  JAX-RS Resource with the Directly Injected Converted Property

  ```


  配置转换器是强大的工具，可将样板配置代码与法师业务逻辑清晰分离。


  ## 配置档案（Profiles）


  是否生产环境，这是个问题！当你同时有测试环境和生产环境时，这是非常典型的场景。


  你还记得 Dieselgate（柴油门）排放丑闻吗？这是配置档案的一个很好的例子。汽车控制单元被编程为在实验室测试时以更低排放运行发动机。对控制单元而言，当车辆处于实验室还是高速公路时，整套参数都必须切换。让我们尝试用
  Helidon Config 实现这一点。


  第一步是通过 `mp.config.profile` 属性设置档案本身。你可以通过任何已使用的配置源设置该属性。例如，将其作为环境变量 `export MP_CONFIG_PROFILE=TEST`，或者使用
  `-Dmp.config.profile=TEST` 属性。


  ```

  java -Dmp.config.profile=TEST -jar myCarControlUnit.jar

  Listing 3-13

  Running Helidon with Profile TEST

  ```


  配置档案既可在配置源级别使用（切换整个配置文件），也可在属性级别使用（通过带前缀的属性）。


  ### 属性级别


  在属性级别，以 `%` 加档案名为前缀的属性，会比其他具有相同键的属性拥有更高优先级。


  *   ① 当 `PROD` 档案激活时，`false` 生效


  *   ② 当 `TEST` 档案激活时，`true` 生效


  *   ③ 当没有激活档案时，`false` 生效


  ```

  %PROD.engine.emission.control=false    ①

  %TEST.engine.emission.control=true     ②

  engine.emission.control=false          ③

  Listing 3-14

  Properties Specific for a Given Profile

  ```




  ### 配置源级别


  在配置源级别，如果文件名匹配所选的 profile，则会包含整个配置文件。如果类路径中 `META-INF` 文件夹下存在配置文件 `microprofile-config-<PROFILE
  NAME>.properties`，并且相应 profile 处于激活状态，则这些属性会被合并。当两个文件中存在相同属性时，文件名中带有激活 profile 的文件中的值具有更高优先级。


  ```

  META-INF/

  microprofile-config.properties

  microprofile-config-TEST.properties

  Listing 3-15

  Property file specific for a given profile

  ```


  不过让我们回到 Orc 狩猎冒险的示例。你可能会决定使用不同的配置源设置来部署我们已经构建好的游戏制品。为此，你需要更强大的能力：元配置。


  ## 元配置


  打包在 JAR 文件内部的配置文件实际上几乎是不可变的。你在这些配置源中的所有设置都已板上钉钉。你可以用系统属性或环境变量覆盖它们的值，但你必须依赖于 JAR
  包深处某处已经定义好的优先级。Helidon 提供了一个额外特性，用于在制品外部重新定义配置，称为元配置。它是一个可以按你希望的方式配置配置源的位置，并会覆盖任何现有的隐式或显式设置（通过编程式
  API 创建的设置除外）。


  注意


  这是 Helidon 特有功能。


  当在类路径、当前目录中找到 `mp-meta-config.yaml` 或 `mp-meta-config.properties` 文件，或者在外部指定位置发现它后，配置源将按其内容进行组织。你可以通过
  `io.helidon.config.mp.meta-config` 属性或 `HELIDON_MP_META_CONFIG` 环境变量来指定元配置文件位置。


  元配置支持 YAML 和 properties 文件格式。让我们看看 YAML 示例 `mp-meta-config.yaml`。


  *   ① 包含或排除隐式源或转换器。


  *   ② 显式定义配置源。


  *   ③ 定义配置源优先级。


  ```

  add-discovered-sources: true   ①

  add-discovered-converters: true

  add-default-sources: true

  sources:

  - type: "environment-variables"

  - type: "system-properties"

  - type: "properties"         ②

  classpath: "weapons.properties"

  ordinal: 50                ③

  optional: true

  - type: "yaml"

  path: "/config/orc-army.yaml"

  Listing 3-16

  Meta Configuration

  ```


  你可以更改优先级序号（ordinal），并选择使用默认源或自定义源。甚至还可以排除自定义转换器，或添加一些可选配置源。


  ## YAML 配置源


  除了 MP 规范要求的内置配置源之外，Helidon 还提供了其他便捷的配置源。例如，有人喜爱也有人“深恶痛绝”的 YAML 配置。


  注意


  这是 Helidon 特有功能。


  与 MP 默认属性文件不同，Helidon 会在类路径根目录下查找名为 `application.yaml` 的文件。其默认优先级 `200` 会覆盖 MP 默认属性文件中的属性，但会被系统属性和环境变量覆盖。


  ```

  sorcerer:

  invisibilityCloak: false

  orcSlayingPotions: 2

  weapons:

  - "axe"

  - "sword"

  Listing 3-17

  YAML Configuration File

  ```


  与 properties 相比，YAML 格式中最显著的特性是 *序列（sequences）*。你可以在 YAML 中用流式（flow style）或块式（block
  style）来表示序列。


  *   ① 流式序列


  *   ② 块式序列


  ```

  amulets: ["Hearth of Zeard", "Spider''s eye"]   ①

  weapons:    ②

  - "axe"

  - "sword"

  Listing 3-18

  Sequence Styles in YAML Files

  ```


  Helidon 的 YAML 配置源会将序列映射为配置数组。尽管所有配置源也都可以用逗号分隔值来声明数组，你仍然可以用简单文本值声明数组：`weapons: "axe,sword".`


  YAML 的 `null` 值会被转换为缺失属性。当直接注入这类属性时会抛出 `NoSuchElementException`。这一特性与默认 properties
  配置源很好地保持一致：后者只能通过缺失属性或空值来表示 `null`。


  *   ① properties 文件中没有 `null`。空值或缺失属性的行为类似 null 值。


  ```

  sorcerer.invisibilityCloak=    ①

  #sorcerer.invisibilityCloak=2

  Listing 3-19

  Empty Property in YAML File

  ```


  *   ① YAML 有专门的 `null` 值


  ```

  sorcerer:

  invisibilityCloak: null   ①

  orcSlayingPotions:

  #ghoulSlayingPotions: 2

  Listing 3-20

  Null Property in YAML File

  ```


  但请记住，你始终可以指定默认值，或注入可选值 `@ConfigProperty(name = "sorcerer.invisibilityCloak") Optional<Boolean>
  cloak`，然后在运行时决定如何处理 null。


  要使用 YAML 配置源，你需要以下依赖，它已经包含在 Helidon MicroProfile bundle 中。


  ```

  io.helidon.config

  helidon-config-yaml-mp


  Listing 3-21

  Maven Dependency for the YAML Configuration Support

  ```


  ## 自定义配置源


  总会有一些场景是 YAML 或 properties 不够用的。无论你需要从某种“异域”数据库、超安全二进制文件，还是非常复杂的 XML 文档中获取配置，你都可以创建自己的配置源。这个新配置源只需要根据键提供属性值、提供可用键列表、用于优先级解析的
  ordinal 数值，以及配置源名称。所有逻辑都可以放进一个实现单一接口 `org.eclipse.microprofile.config.spi.ConfigSource`
  的类中。


  我们来尝试一个简单的配置源：把硬编码 map 中的条目作为配置属性提供。为了更有意思一些，把其中一个属性设为 JSON 值，这样就可以让配置源和本章前面创建的自定义
  JsonConverter 配合使用。


  *   ① 新的自定义配置源优先级。


  *   ② 排序逻辑使用的源名称。


  ```

  public class CustomConfigSource implements ConfigSource {

  private static final Map props = Map.of(

  "sorcerer.orcSlayingPotions", "55",

  "app.jsonOrc",

  """

  {"orcName":"Bonecrash", "level":"28"}

  """

  );

  @Override

  public int getOrdinal() {return 105;}   ①

  @Override

  public Set getPropertyNames() {

  return props.keySet();

  }

  @Override

  public String getValue(String key) {

  return props.get(key);

  }

  @Override

  public String getName() {

  return "custom-sorcerer-map";   ②

  }

  }

  Listing 3-22

  Custom Config Source

  ```


  注册流程与自定义转换器非常类似。你需要把我们的实现注册为服务提供者。


  注意


  如果你使用的是基于 classpath 的项目，请创建 provider-configuration 文件，并将 `my.package.CustomConfigSource`
  作为其内容。


  `META-INF/services/org.eclipse.microprofile.config.spi.ConfigSource`


  配置运行时会通过 service loader 机制找到你的转换器。


  如果你在基于 JPMS 模块的项目中注册服务提供者，别忘了使用 `module-info.java`。只需在 `module-info.java` 中添加 `provides`
  子句即可。


  `provides org.eclipse.microprofile.config.spi.ConfigSource with my.package.CustomConfigSource;`




  ## 动态配置源


  到目前为止，你看到的配置都是不可变数据源。想要用新值重新注入配置属性，唯一的方法是重启 Helidon 应用程序。但配置源也可以提供可变属性。大多数内置的基于文件的配置源都支持可变性。对于基于文件的配置源，你可以使用内置的变更监听器，或者使用自定义间隔进行轮询。


  你可以结合前面创建的自定义 `JsonConverter` 来尝试动态配置源，这样就能确认它们能够很好地协同工作。首先，在文件系统上创建一个配置文件。


  *   ① 动态源需要注册监听器或使用轮询。首次加载时，使用变更监听器。


  *   ② `app.jsonOrc` 属性需要通过自定义转换器进行转换。


  ```

  helidon.config.watcher.enabled: true   ①

  app.jsonOrc: ''{"orcName":"Scullcrack", "level":"37"}''   ②

  Listing 3-23

  Dynamically Loaded Configuration

  ```


  由于动态配置文件位于文件系统中的某处，你必须在元配置中注册它，这样 Helidon 才知道去哪里查找。让我们在工作目录中创建 `mp-meta-config.yaml`
  文件。


  *   ① 使用自定义 JsonConverter


  *   ② 动态变化配置文件的路径


  ```

  add-discovered-converters: true   ①

  sources:

  - type: "yaml"

  path: "./dynamic-config.yaml"   ②

  optional: false

  Listing 3-24

  Meta Configuration for the Dynamic Config Source

  ```


  现在你只需要注入配置值即可。不过，单例 bean 中的注入只会执行一次，对吧？这对于动态变化的配置并不实用。你需要注入 `java.util.function.Supplier`，而不是实际值本身。


  ```

  @ConfigProperty(name = "app.jsonOrc") Supplier jsonOrc

  Listing 3-25

  Injecting a Dynamically Loaded Configuration Property

  ```


  这样一来，每次调用 `jsonOrc.get()` 时，你都可以拿到实际值。每当配置源发生变化，变更监听器都会重新加载配置源，并缓存新值。无需担心每次调用 supplier
  都会去读取文件。另一种方式是轮询。你只需配置希望配置源重新加载的时间间隔。


  *   ① 使用轮询进行动态源重载。


  *   ② 每五秒轮询一次。时长采用 ISO-8601 格式表示。


  ```

  helidon.config.polling.enabled: true   ①

  helidon.config.polling.duration: PT5S  ②

  app.jsonOrc: ''{"orcName":"Scullcrack", "level":"37"}''

  Listing 3-26

  Dynamically Polled Configuration

  ```


  用于启用变更监听或轮询的属性，尽管是动态重载配置的一部分，但并不会被动态解释。你不能动态更改轮询间隔。


  注意


  虽然动态配置源是 MicroProfile 规范的一部分，但轮询和变更监听是 Helidon 的功能特性。


  ## Kubernetes ConfigMap


  Kubernetes ConfigMap 是在 Kubernetes 集群中分发配置的便捷工具。来自 ConfigMap 的属性可以通过映射到容器环境变量，或者直接作为配置文件挂载到文件系统的方式，供
  Pod 访问。


  ### 环境变量


  将 Kubernetes ConfigMap 传递给应用程序最简单的方法是通过环境变量。由于 Helidon Config 默认将这些变量作为配置源，你在应用侧几乎不需要做任何事。Kubernetes
  在 Pod 的操作系统层完成映射，Helidon Config 会从那里接管。


  *   ① `SORCERER_ORCSLAYINGPOTIONS` 环境变量会被传递到 my-sorcerer-app 配置中，作为 `sorcerer.orcSlayingPotions`
  配置属性。


  *   ② `APP_JSONORC` 环境变量会被传递到 my-sorcerer-app 配置中，作为 `app.jsonOrc`。


  *   ③ 这是将 ConfigMap 作为环境变量来源的引用。


  ```

  apiVersion: v1

  kind: ConfigMap

  metadata:

  name: my-sorcerer-config

  data:

  SORCERER_ORCSLAYINGPOTIONS: 68   ①

  APP_JSONORC: ''{"orcName":"Sharpteeth","level":"22"}''   ②


  apiVersion: v1

  kind: Pod

  metadata:

  name: my-sorcerer-pod

  spec:

  containers:

  - name: my-sorcerer-container

  image: my-sorcerer-app

  envFrom:

  - configMapRef:

  name: my-sorcerer-config   ③

  Listing 3-27

  K8s ConfigMap Propagated to Helidon As Environment Variables

  ```


  ### 挂载卷


  有时环境变量的扁平结构并不足够。Kubernetes ConfigMap 可以指定要作为配置文件挂载到容器文件系统中的配置。你可以把你喜欢的配置格式（无论是 properties
  文件、YAML 还是 JSON）挂载到你选择的目录。


  *   ① 生成的配置文件名称


  *   ② 挂载目录路径，其中包含生成的 `my-sorcerer-app-config.yaml` 文件


  ```

  apiVersion: v1

  kind: ConfigMap

  metadata:

  name: my-sorcerer-config

  data:

  my-sorcerer-app-config.yaml: |   ①

  app.jsonOrc: ''{"orcName":"Sharpteeth", "level":"22"}''

  sorcerer:

  orcSlayingPotions: 68

  invisibilityCloak: false

  weapons: axe,sword


  apiVersion: v1

  kind: Pod

  metadata:

  name: my-sorcerer-pod

  spec:

  containers:

  - name: my-sorcerer-container

  image: my-sorcerer-app

  volumeMounts:

  - mountPath: /config   ②

  name: config-volume

  volumes:

  - name: config-volume

  configMap:

  name: my-sorcerer-config

  Listing 3-28

  K8s ConfigMap Propagated to Helidon over the Configuration File on the Mounted Volume

  ```


  在 `my-sorcerer-app` 中，你需要设置元配置文件 `mp-meta-config.yaml`，以指定挂载配置文件的位置。


  *   ① 挂载配置文件的路径。


  *   ② 相对于 classpath 上默认配置文件的优先级。


  *   ③ 该值是可选的，因此在需要时你可以在没有挂载文件的情况下运行应用程序。


  ```

  sources:

  - type: "yaml"

  path: "/config/my-sorcerer-app-config.yaml"   ①

  ordinal: 250   ②

  optional: true   ③

  Listing 3-29

  Mounted Configuration File Usage with Meta Config

  ```


  从一开始，Helidon 配置就是为微服务环境而设计的。你可以看到，每个特性都汇聚到同一个目标：尽量减少微服务应用中与配置相关的样板代码。


  ## 总结


  *   微服务需要可配置性。


  *   配置源可满足各种场景需求。


  *   在配置源中使用序数（ordinal）以支持覆盖。


  *   不必局限于 YAML；你可以创建自己的配置源。


  *   转换器可用于解析或反序列化。


  *   无需重启服务即可处理动态变化的配置。


  *   与 Kubernetes ConfigMap 的集成使你的应用真正实现云原生。


  '
- "# 4. 可观测性\n\n本章涵盖以下主题。\n\n*   理解可观测性\n\n*   理解健康检查\n\n*   为 Helidon 应用添加指标支持\n\n\
  *   在 Helidon 应用中使用追踪\n\n*   在 Helidon 中配置日志\n\n你可能已经多次听到这个词，也知道它对微服务很重要。你也明白它与监控或遥测有关。本章将解释可观测性的含义、它与监控和遥测的区别、Helidon\
  \ 包含哪些可观测性特性，以及如何使用它们。\n\n\n\n## 什么是可观测性？\n\n*可观测性*这一术语来自控制理论。控制理论研究的是如何利用传感器数据，通过算法将一个动态系统以最优方式驱动到期望状态。若一个动态系统在任意时刻的状态都能通过分析外部传感器的输出被确定，则该系统是可观测的。若外部传感器采集的数据无法完整反映系统状态，或这些数据存在歧义，则系统不可观测。防抱死制动系统（ABS）就是一个很好的例子。它通过传感器检测车轮抱死，并由专用算法反复释放车轮，以实现最高效的制动。\n\
  \n对于计算机系统，这一定义如下：“可观测性是指一个服务能够向外部暴露可反映其内部行为的数据的能力。”\n\n这意味着服务需要提供足够的数据，使管理员能够理解正在发生什么。有人可能会说，这正是*监控*在做的事情。通常认为二者的区别在于：可观测性为所有可能的使用场景提供数据；而监控仅使用预定义的数据集，并且只监控已知场景。因此，可观测性被视为高于监控的一个层级。\n\
  \n遥测（Telemetry）是为监控而从系统远程采集的全部数据。这个词由两个希腊词根组成：*tele*，意为“远程”；*metron*，意为“测量”。因此，它就是“远程测量”。例如，一级方程式车队会在比赛中采集赛车的遥测数据，以检测某些发动机故障。从技术角度看，遥测仅假定数据的采集与传输；数据分析则由监控工具完成。也可以说，过去的监控工具同样在做某种远程数据采集，只是从未使用“遥测”这个词。是的，确实如此。遥测之所以成为流行词，要归功于\
  \ OpenTelemetry 项目，它对云系统的指标采集进行了标准化。OpenTelemetry 的目标是提供完整的跨平台、云原生可观测性技术栈。而困惑也由此而来：OpenTelemetry\
  \ 项目关注的是*可观测性*，而*遥测*本身只负责远程数据采集。\n\n可观测性主要有四个领域。\n\n*   **健康（Health）**：通过返回 true\
  \ 或 false 的简单请求，判断服务是否已启动、是否可提供服务以及是否按预期响应。\n\n*   **指标（Metrics）**：采集用于监控的数据，例如方法调用次数、平均执行时间等。\n\
  \n*   **追踪（Tracing）**：采集每个请求处理过程中的步骤及附加细节，如调用耗时。\n\n*   **日志（Logging）**：存储有关服务内部运行机制的重要信息。\n\
  \n## 健康（Health）\n\n健康检查的主要目的是提供一个 API，使外部自动化管理系统能够检查你的应用是否可用且已准备好处理请求。管理系统会基于返回数据决定：是将请求转发到该节点，还是将其下线并替换为其他节点。\n\
  \n健康检查对于保证整个系统平稳运行至关重要。请求不应被转发到无法处理请求的节点；否则，用户可能会看到请求失败或卡住。\n\n注意\n\n健康检查的设计目标是供自动化系统使用。人工运维人员也可以使用它，但这不是其典型使用方式。\n\
  \n### Kubernetes 探针\n\n为了获取应用状态，Kubernetes 节点代理会向应用中定义的某些端点发送*探针（probes）*，这些端点返回\
  \ UP（状态 2xx）或 DOWN（状态 5xx）。它还可以选择性返回一些附加信息，以帮助定位问题。\n\n应用可能会执行多个检查来判定自身状态。每个检查返回\
  \ UP 或 DOWN，最终响应通过将所有检查结果使用逻辑 AND 运算符合并得出。这意味着只要有任意一个检查返回 DOWN，最终响应就是 DOWN。\n\n\
  表 4-1\n\nKubernetes 探针\n\n| 探针 | 描述 |\n| --- | --- |\n| Startup | 判断应用是否已启动。如果配置了该探针，节点代理仅在*startup*探针成功后才会触发其他探针。\
  \ |\n| Readiness | 判断应用是否已准备好处理请求。只有当*readiness*检查成功时，请求才会被转发到你的应用。 |\n| Liveness\
  \ | 判断应用是否出现了诸如内存耗尽、线程死锁等严重问题，并且是否必须重启或下线。 |\n\n### MicroProfile Health\n\nHelidon\
  \ 实现了 MicroProfile Health 规范，该规范定义了在 Java 应用中使用健康检查的 API 与 REST 端点。Helidon 实现的规范版本会随\
  \ Helidon 版本而变化。Helidon 3.x 支持 MicroProfile Health 3.1。\n\nMicroprofile Health\n\
  \nMicroProfile Health 是由 MicroProfile 工作组开发的开源规范。其目标是标准化微服务通过 REST 端点上报健康状态的方式。你可以从规范[文档](https://download.eclipse.org/microprofile/microprofile-health-3.1/microprofile-health-spec-3.1.html)或[规范\
  \ API 源码](https://github.com/eclipse/microprofile-health)获取更多信息。\n\n该规范定义了四个 REST\
  \ 端点（见表 4-2）。\n\n表 4-2\n\nMicroProfile Health REST API\n\n| 探针 | URI | 方法 | 状态 |\n\
  | --- | --- | --- | --- |\n| Startup | /health/started | GET | 200 - UP503 - DOWN500\
  \ - ERROR |\n| Readiness | /health/ready | GET | 200 - UP503 - DOWN500 - ERROR |\n\
  | Liveness | /health/live | GET | 200 - UP503 - DOWN500 - ERROR |\n| Startup + Readiness\
  \ + Liveness | /health | GET | 200 - UP503 - DOWN500 - ERROR |\n\n探针 URL 必须在你的应用\
  \ Kubernetes 部署描述文件 *app.yaml* 的 *container* 部分进行配置（见清单 4-1）。\n\n*   ① Liveness\
  \ 探针配置\n\n*   ② Liveness 探针 URL\n\n*   ③ Readiness 探针配置\n\n*   ④ Readiness 探针 URL\n\
  \n*   ⑤ Startup 探针配置\n\n*   ⑥ Startup 探针 URL\n\n```\nlivenessProbe:            \
  \   ①\nhttpGet:\npath: /health/live       ②\nport: 8080\nperiodSeconds: 3\nreadinessProbe:\
  \              ③\nhttpGet:\npath: /health/ready      ④\nport: 8080\nperiodSeconds:\
  \ 3\nstartupProbe:                ⑤\nhttpGet:\npath: /health/started    ⑥\nport:\
  \ 8080\nperiodSeconds: 3\nListing 4-1\nConfiguring Health Probes in app.yaml\n```\n\
  \n现在我们来看看 MicroProfile Health REST API 端点会返回什么。它们以 JSON 格式返回应用健康状态。所有类型的探针都使用相同的模式。例如，清单\
  \ 4-2 展示了一个由 liveness 检查返回的 JSON 实体，其状态为 200（UP）。\n\n*   ① 探针状态。若所有检查均为 UP 或未定义检查，则为\
  \ UP；否则为 DOWN\n\n*   ② 该探针下所有检查的数组（可以为空）\n\n*   ③ 第一个检查的名称\n\n*   ④ 第一个健康检查的状态，可为\
  \ UP 或 DOWN\n\n*   ⑤ 包含该检查附加数据的可选对象\n\n*   ⑥ 第二个健康检查的名称\n\n*   ⑦ 第二个健康检查的状态\n\n\
  ```\n{\n\"status\": \"UP\",              ①\n\"checks\": [                  ②\n{\n\
  \"name\": \"firstCheck\",    ③\n\"status\": \"UP\",          ④\n\"data\": {    \
  \            ⑤\n\"key\": \"foo\",\n\"foo\": \"bar\"\n}\n},\n{\n\"name\": \"secondCheck\"\
  ,   ⑥\n\"status\": \"UP\"           ⑦\n}\n]\n}\nListing 4-2\nA Sample Health Check\
  \ Status\n```\n\nMicroProfile 规范还定义了一个 API，用于向应用添加自定义健康检查，本章稍后会进行说明。现在，我们先看看如何在\
  \ Helidon 应用中启用 MicroProfile Health 支持。\n\n### 向你的 Helidon 应用添加健康检查\n\n如果你希望在现有项目中加入健康检查支持，请手动向\
  \ Maven 项目添加依赖。\n\n\n\n#### 使用 Project Starter\n\n最简单的方法是使用 Project Starter 生成一个带有健康检查支持的项目。\n\
  \n以下说明了你需要执行的操作。\n\n1.  在[`https://helidon.io/starter`](https://helidon.io/starter)打开\
  \ Project Starter。\n\n2.  在 Helidon Flavor 页面选择 Helidon MP，然后点击 Next。\n\n3.  在 Application\
  \ Type 页面选择 Custom，然后点击 Next。\n\n4.  在 Media Support 页面，保持 Jackson 被选中；如果你希望符合 MicroProfile\
  \ 平台，也可以选择 JSON-B。点击 Next。\n\n5.  在 Observability 页面，选择 Health Checks。你也可以选择其他提供的选项，例如\
  \ Metrics 和 Tracing。\n\n6.  点击 Download 以生成你的项目，或者继续完成其余步骤以继续配置。\n\n#### 使用 CLI\n\
  \n你需要先安装 Helidon CLI，具体说明见第 2 章。\n\n使用`helidon init`命令开始生成新项目。CLI 和 Project Starter\
  \ 使用同一个配置向导。请按照前文说明回答问题。完成配置向导后，你将得到一个已启用健康检查支持的项目。\n\n#### 手动添加依赖\n\n如果你想为现有项目添加健康检查支持，请在你的\
  \ Maven 项目中手动添加依赖。\n\n最简单的方式是使用`helidon-microprofile`包，其中通过传递依赖包含了`helidon-microprofile-health`。\n\
  \n```\nio.helidon.microprofile.bundles\nhelidon-microprofile\n\n```\n\n如果你不想依赖较大的`helidon-microprofile`包，也可以通过在`pom.xml`中添加以下依赖来手动启用\
  \ Health 支持。\n\n*   ① MicroProfile Core 依赖\n\n*   ② MicroProfile Health\n\n*   ③\
  \ 可选内置检查\n\n```\nio.helidon.microprofile.bundles\nhelidon-microprofile-core   ①\n\
  \nio.helidon.microprofile.health\nhelidon-microprofile-health ②\n\nio.helidon.health\n\
  helidon-health-checks       ③\n\n```\n\n### 内置检查\n\nHelidon 提供了内置健康检查，可帮助判断每个应用都可能遇到的一般性问题。\n\
  \n表 4-3\n\n内置检查\n\n| 内置检查 | 描述 |\n| --- | --- |\n| Deadlock | 存活性检查，借助`ThreadMXBean`查找线程死锁。如果检测到死锁则返回\
  \ DOWN。 |\n| Disk space | 存活性检查：当已用磁盘空间超过阈值时返回 DOWN。该阈值由配置属性`helidon.health.diskSpace.thresholdPercent`设定，默认值为\
  \ 99.99。用户还可以使用配置属性`helidon.health.diskSpace.path`配置要检查可用空间的文件系统路径。返回的 JSON 实体还包含额外的磁盘空间信息，例如总卷大小和可用空间。\
  \ |\n| Heap memory | 存活性检查：当已用堆内存超过阈值时返回 DOWN。该阈值由配置属性`helidon.health.heapMemory.thresholdPercent`设定，默认值为\
  \ 98。返回的 JSON 实体还包含额外信息，例如内存总量和可用内存。 |\n\n清单 4-3 演示了在未配置任何自定义检查时，Helidon 存活性健康检查（`/health/live`）的响应。\n\
  \n*   ① 总体状态\n\n*   ② Deadlock 检查\n\n*   ③ Disk space 检查\n\n*   ④ Heap memory 检查\n\
  \n```\n{\n\"status\" : \"UP\",                         ①\n\"checks\" : [\n{\n\"\
  name\" : \"deadlock\",               ②\n\"status\" : \"UP\"\n},\n{\n\"name\" : \"\
  diskSpace\",              ③\n\"status\" : \"UP\",\n\"data\" : {\n\"free\" : \"428.01\
  \ GB\",\n...\n}\n},\n{\n\"name\" : \"heapMemory\",             ④\n\"status\" : \"\
  UP\"\n}\n]\n}\nListing 4-3\nBuilt-in Health Checks\n```\n\n### 自定义检查\n\n虽然内置健康检查为所有应用提供了通用基础，但你可能希望通过添加应用特定的健康检查来扩展覆盖范围。例如，如果你使用数据库，可以添加数据库连接检查；如果你依赖第三方系统，可以添加第三方系统检查。\n\
  \n要创建自定义健康检查，请添加一个实现`org.eclipse.microprofile.health.HealthCheck`接口的 CDI Bean，并使用以下注解之一来定义检查类型。\n\
  \n*   用于存活性检查的`@Liveness`\n\n*   用于就绪性检查的`@Readiness`\n\n*   用于启动检查的`@Startup`\n\
  \n清单 4-4 是一个简单的存活性检查：仅在工作时间被调用时返回 UP。\n\n*   ① 将此 Bean 标记为存活性健康检查\n\n*   ② 使该类成为应用作用域的\
  \ CDI Bean\n\n*   ③ 定义`call()`方法的接口，该方法会在每次探测健康检查时被调用\n\n*   ④ 状态计算\n\n```\n@Liveness\
  \                                               ①\n@ApplicationScoped          \
  \                            ②\npublic class WorkingHoursCheck implements HealthCheck\
  \ { ③\n@Override\npublic HealthCheckResponse call() {\nreturn HealthCheckResponse.builder()\n\
  .name(\"working-hours-check\")\n.withData(\"time\", LocalDateTime.now()\n.toString())\n\
  .status(getStatus())                    ④\n.build();\n}\nprivate boolean getStatus()\
  \ {\nint hour = LocalDateTime.now().getHour();\nreturn hour >= 9 && hour <= 17;\n\
  }\n}\nListing 4-4\nWorking Hours Liveness Custom Check\n```\n\n注意\n\n你可以在 GitHub\
  \ 仓库中找到示例应用源码：[`https://github.com/apress/beginning-helidon`](https://github.com/apress/beginning-helidon)。\n\
  \n当你的本地时间在 9:00 到 18:00 之间运行时，你会看到类似清单 4-5 所示的输出。\n\n```\n{\n\"status\": \"UP\"\
  ,\n\"checks\": [\n...\n{\n\"name\": \"working-hours-check\",\n\"status\": \"UP\"\
  ,\n\"data\": {\n\"time\": \"2022-05-29T14:00:09.119199400\"\n}\n}\n]\n}\nListing\
  \ 4-5\nWorking Hours Health Check Output\n```\n\n\n\n## 指标\n\n如果健康指标提供的是服务当前状态的信息，那么指标（Metrics）则给出服务在一段时间内运行表现的一些聚合统计数据。它可以是某个端点收到的请求数量、平均请求处理时间等等。服务管理员可以利用这些信息来提升服务性能、调优扩缩容策略、优化业务逻辑，并收集用于报告的数据。健康检查与指标都旨在与监控系统协同工作。监控栈由一个用于采集和存储数据的数据库，以及一个以图形和图表展示数据的\
  \ UI 系统组成。\n\nPrometheus 和 Grafana 是常用的指标数据采集与展示系统。\n\n注意\n\nPrometheus 是一个开源系统，用于从不同应用中采集并存储指标数据。它不用于查看数据。你可以把它理解为一个专用于存储指标数据的数据库。Prometheus\
  \ 为多种编程语言提供了客户端库，包括 Java。\n\nGrafana 是一个面向用户展示指标数据的可视化工具。它通过美观的图表展示仪表盘，并实时更新。它还支持定义告警，以便在出现异常时通知管理员。它可与\
  \ Prometheus 这类指标存储系统集成，并从中获取数据。\n\n你的 Helidon 应用会提供一组用户希望跟踪的指标。Prometheus 会轮询你的应用，采集指标数据并在内部存储。Grafana\
  \ 会向 Prometheus 查询特定的数据子集，并使用图形和图表在网页上展示。用户加载 Grafana UI 后，就可以在浏览器中查看 Helidon 应用的指标。图\
  \ 4-1 展示了这些概念。\n\n![](img/600147_1_En_4_Fig1_HTML.jpg)\n\n该框图包含如下流程：用户火柴人、view、Grafana\
  \ UI、query、Prometheus database、collect，以及包含 UI、database 和 application's descriptions\
  \ 的 Helidon application。\n\n图 4-1\n\n指标栈的工作方式与组件\n\n接下来的问题是，Helidon 如何收集并向 Prometheus\
  \ 提供指标数据。答案是 Helidon 实现了 MicroProfile Metrics 规范。更具体地说，Helidon 3.0 实现的是 MicroProfile\
  \ Metrics 4.0。\n\nMicroprofile Metrics\n\nMicroProfile Metrics 是由 MicroProfile 工作组开发的开源规范。其目标是标准化微服务定义和暴露指标数据的方式。你可以在规范文档中获取更多信息：[`https://download.eclipse.org/microprofile/microprofile-metrics-4.0/microprofile-metrics-spec-4.0.pdf`](https://download.eclipse.org/microprofile/microprofile-metrics-4.0/microprofile-metrics-spec-4.0.pdf)。\n\
  \nMicroProfile Metrics 规范定义了 RESTful API，使 Prometheus 之类的系统能够采集指标数据（参见“MicroProfile\
  \ Metrics REST API”一节）。入口点是 `/metrics`。\n\n下面我们来看 Helidon 应用如何处理指标请求。图 4-2 对此进行了说明。\n\
  \n1.  请求到达 `/metrics` 端点，或 MicroProfile Metrics REST API 中定义的其他任意端点。\n\n2.  Helidon\
  \ 收集 *base* 和 *vendor* 指标的数据。这些指标由 MicroProfile 规范定义，并由 Helidon 开箱即用提供（参见“Metric\
  \ Scopes”一节）。\n\n3.  Helidon 处理开发者在 Helidon 应用中定义的所有指标。要定义指标，开发者可以使用注解或编程式 API。\n\
  \n4.  Helidon 聚合来自步骤 2 和 3 的指标数据，并生成 Prometheus 或 JSON 格式的响应。\n\n![](img/600147_1_En_4_Fig2_HTML.png)\n\
  \n该图展示了当用户发起 get /metrics 请求时，Helidon 应用处理请求的 4 个步骤。图左下方还在虚线边框内给出了 base、vendor 和\
  \ application 的代码。\n\n图 4-2\n\nHelidon 应用对指标请求的处理流程\n\n现在你已经熟悉了指标栈架构以及 Helidon 应用内部的指标请求工作流。接下来正是解释“什么是指标、它们如何表示、以及如何向应用添加自定义指标”的好时机。不过在进入理论之前，我们先讨论如何为你的\
  \ Helidon 应用添加 MicroProfile 指标支持。等你理解了这些（别担心，很简单），我们再用一个简单的 Helidon 应用来演示指标。通过示例学习会更容易。\n\
  \n### 为你的 Helidon 应用添加 MicroProfile Metrics 支持\n\n#### 使用 Project Starter\n\n最简单的方法是使用\
  \ Project Starter 生成一个带有指标支持的项目。\n\n下面说明你需要做什么。\n\n1.  打开 Project Starter：[`https://helidon.io/starter`](https://helidon.io/starter)。\n\
  \n2.  在 Helidon Flavor 页面选择 Helidon MP，然后点击 Next。\n\n3.  在 Application Type 页面，选择\
  \ Custom 并点击 Next。\n\n4.  在 Media Support 页面，保持 Jackson 选中；如果你希望符合 MicroProfile\
  \ 平台，也可以选择 JSON-B。然后点击 Next。\n\n5.  在 Observability 页面，勾选 Metrics，并选择 MicroProfile\
  \ 作为 Metrics Provider。你也可以选择其他可用选项，例如 Health Checks 和 Tracing。\n\n6.  点击 Download\
  \ 生成项目，或者继续后续步骤完成更多配置。\n\n#### 使用 CLI\n\n你需要先安装 Helidon CLI，如第 2 章所述。\n\n使用 `helidon\
  \ init` 命令开始生成新项目。CLI 与 Project Starter 使用的是同一套配置向导。按照前文说明回答问题。完成配置向导后，你将获得一个已生成并带有指标支持的项目。\n\
  \n#### 手动添加依赖\n\n最简单的方法是使用 `helidon-microprofile` 聚合包，它通过传递依赖包含了 `helidon-microprofile-metrics`。\n\
  \n```\nio.helidon.microprofile.bundles\nhelidon-microprofile\n\n```\n\n如果你不想依赖更大的\
  \ `helidon-microprofile`，也可以通过在 `pom.xml` 文件中添加以下依赖来手动启用 Metrics 支持。\n\n*   ① MicroProfile\
  \ Core 依赖\n\n*   ② MicroProfile Metrics\n\n```\nio.helidon.microprofile.bundles\n\
  helidon-microprofile-core   ①\n\nio.helidon.microprofile.metrics\nhelidon-microprofile-metrics②\n\
  \n```\n\n### 示例应用\n\n让我们创建一个示例应用，演示 MicroProfile 指标注解和编程式 API 的用法。它以 Project Starter\
  \ 生成的 Quickstart 应用为基础，并添加了覆盖规范支持的所有指标类型的 JAX-RS 资源。后续讨论 MicroProfile API 时会使用这些资源中的代码片段。\n\
  \n该示例应用名为 *ch04-metrics*，可在本书的 GitHub 仓库中获取：[`https://github.com/apress/beginning-helidon`](https://github.com/apress/beginning-helidon)。\n\
  \n项目根目录下的 README.md 文件包含了构建和运行项目的说明。出于篇幅考虑，书中提供了这些命令。另外，我们也不希望与示例相关的 bash 命令分散你的注意力；我们希望你专注于指标这一主题。\n\
  \n\n\n### MicroProfile Metrics REST API\n\nMicroProfile 规范定义了用于访问指标数据的 REST API。它是图\
  \ 4-2 中的第一步。该 API 允许用户以及像 Prometheus 这样的系统从你的应用中获取指标数据和元数据。\n\n表 4-4\n\nMicroProfile\
  \ Metrics REST API\n\n| URL | 请求类型 | 描述 |\n| --- | --- | --- |\n| `/metrics` | GET\
  \ | 以 JSON 或 OpenMetrics 格式返回所有已注册指标。 |\n| `/metrics/<scope>` | GET | 以 JSON 或 OpenMetrics\
  \ 格式返回给定作用域下注册的所有指标（见“指标作用域”一节）。 |\n| `/metrics/<scope>/<metric_name>` | GET | 以\
  \ JSON 或 OpenMetrics 格式返回给定作用域下与指标名称匹配的指标（见“指标作用域”一节）。 |\n| `/metrics` | OPTIONS\
  \ | 返回所有已注册指标的元数据。 |\n| `/metrics/<scope>` | OPTIONS | 返回给定作用域下注册的指标元数据（见“指标作用域”一节）。\
  \ |\n| `/metrics/<scope>/<metric_name>` | OPTIONS | 返回给定作用域下与指标名称匹配的指标元数据（见“指标作用域”一节）。\
  \ |\n\nOpenmetrics\n\nOpenMetrics 是一个构建于 Prometheus 暴露格式之上并进行了谨慎扩展的规范，且几乎 100% 向后兼容。它定义了一种协议和一种文件格式，文件中包含可被\
  \ Prometheus 等系统接收的指标数据。该文件本质上是文本格式。\n\nMicroProfile Metrics 支持 JSON 和 OpenMetrics\
  \ 数据格式。默认使用 OpenMetrics，仅仅因为这是 Prometheus 可接受的格式。使用以下命令获取 OpenMetrics 格式的指标数据。\n\
  \n```\ncurl http://localhost:8080/metrics\n```\n\n结果是以 OpenMetrics 格式输出的完整指标数据。\n\
  \n```\n# TYPE base_classloader_loadedClasses_count gauge\n# HELP base_classloader_loadedClasses_count\
  \ Displays the number of classes that are currently loaded in the Java virtual machine.\n\
  base_classloader_loadedClasses_count 8008\n# TYPE base_gc_total counter\n# HELP\
  \ base_gc_total Displays the total number of collections that have occurred. This\
  \ attribute lists -1 if the collection count is undefined for this collector.\n\
  base_gc_total{name=\"G1 Old Generation\"} 0\nbase_gc_total{name=\"G1 Young Generation\"\
  } 7\n...\n```\n\nOpenMetrics 是一种同时包含指标数据和元数据的文本格式。你会在以 `#` 开头的行中看到元数据。指标数据位于不以 `#`\
  \ 开头的行中。这些行包含指标名称（例如 `base_classloader_loadedClasses_count`）和数值（例如 `8008`）。\n\n\
  要切换到 JSON 格式，请在 REST 请求中指定 `Accept: application/json` 请求头。\n\n```\ncurl -H 'Accept:\
  \ application/json' http://localhost:8080/metrics\n```\n\n结果是 JSON 格式的完整指标数据。\n\n\
  ```\n{\n\"base\": {\n\"classloader.loadedClasses.count\": 8008,\n\"classloader.loadedClasses.total\"\
  : 8008,\n...\n},\n...\n}\n```\n\n这只是一个片段。实际输出要长得多。JSON 格式只包含指标数据（不含元数据）。要获取元数据，应使用\
  \ `OPTIONS` 请求类型。\n\n```\ncurl -X OPTIONS http://localhost:8080/metrics\n```\n\n\
  ### 指标模型\n\n每个指标都有一个唯一 ID、作用域、MicroProfile Metrics 规范支持的七种类型之一，以及元数据。让我们更仔细地看看这些特性。\n\
  \n#### 指标标识\n\n指标的*名称*应反映其测量内容（例如 `http_requests_total`），并可带有一组可选的键值对集合，称为*标签*（tags）。标签用于构建*维度数据模型*，从而支持查询和聚合数据。这两者（名称\
  \ + 标签）共同构成唯一的指标标识。可以把它看作数据库表中的主键。\n\n```\n{=, ...}\n```\n\n前面的一个示例展示了以 OpenMetrics\
  \ 格式调用 `/metrics` 端点的响应。其中包含带有两个标签的指标。\n\n```\n# TYPE base_gc_total counter\n# HELP\
  \ base_gc_total Displays the total number of collections that have occurred. This\
  \ attribute lists -1 if the collection count is undefined for this collector.\n\
  base_gc_total{name=\"G1 Old Generation\"} 0\nbase_gc_total{name=\"G1 Young Generation\"\
  } 7\n```\n\n你可以看到一个名为 ‘name’ 的标签，用来指定该指标使用的是哪个垃圾回收器。因此，“G1 Young Generation”使用了\
  \ 7 次，而 “G1 Old Generation” 从未使用。\n\n#### 指标作用域\n\n可以将作用域理解为逻辑上分隔指标目录的分类。MicroProfile\
  \ Metrics 规范定义了三个指标作用域：*base*、*vendor* 和 *application*（见表 4-5）。\n\n表 4-5\n\nMicroProfile\
  \ Metrics 作用域\n\n| 作用域 | 描述 | URL |\n| --- | --- | --- |\n| Base | 每个符合 MicroProfile\
  \ Metrics 的实现都必须提供的一组指标。 | `/metrics/base` |\n| Vendor | Helidon 特有的开箱即用指标。 | `/metrics/vendor`\
  \ |\n| Application | 你的应用特定指标。 | `/metrics/application` |\n\n下面分别详细看看它们。\n\n#####\
  \ Base 作用域\n\n每个符合 MicroProfile Metrics 的实现都必须提供基础指标集合。规范定义了大约 18 个基础指标，其中 5 个是可选的。它包含内存消耗、垃圾回收和类加载相关数据。Helidon\
  \ 仅实现必需的基础指标。\n\n注意\n\n你可以在规范文档中找到基础指标的完整列表：[`https://download.eclipse.org/microprofile/microprofile-metrics-4.0/microprofile-metrics-spec-4.0.pdf`](https://download.eclipse.org/microprofile/microprofile-metrics-4.0/microprofile-metrics-spec-4.0.pdf)。\n\
  \n使用以下命令以 OpenMetrics 格式获取基础指标。\n\n```\ncurl http://localhost:8080/metrics/base\n\
  ```\n\n使用以下命令以 JSON 格式获取基础指标。\n\n```\ncurl -H 'Accept: application/json' http://localhost:8080/metrics/base\n\
  ```\n\n##### Vendor 作用域\n\nVendor 作用域是 MicroProfile Metrics 实现开箱即用提供的一组指标。不同实现提供的指标集合不同。Helidon\
  \ 提供线程池执行器指标，以及已接收请求的总数和速率。\n\n使用以下命令以 OpenMetrics 格式获取 vendor 指标。\n\n```\ncurl\
  \ http://localhost:8080/metrics/vendor\n```\n\n使用以下命令以 JSON 格式获取 vendor 指标。\n\n\
  ```\ncurl -H 'Accept: application/json' http://localhost:8080/metrics/vendor\n```\n\
  \n##### Application 作用域\n\nApplication Scope 是包含应用特定指标的作用域。除非你在应用源码中添加指标，否则它是空的（见“使用\
  \ MicroProfile Metrics API”一节）。\n\n你可以使用以下命令列出所有已注册的 application 作用域指标。\n\n```\n\
  curl -H 'Accept: application/json' http://localhost:8080/metrics/application\n```\n\
  \n#### 指标元数据\n\n*指标元数据*是汇总指标全部信息的地方。所有元数据字段列于表 4-6。虽然*描述*和*显示名称*是可选的，但提供它们是一个良好实践。这有助于理解指标的上下文和说明。多个指标实例可以共享同一份元数据。\n\
  \n表 4-6\n\nMicroProfile Metrics 元数据\n\n| 元数据字段 | 必需 | 描述 |\n| --- | --- | --- |\n\
  | name | 是 | 指标名称 |\n| type | 是 | 七种指标类型之一（（见“指标类型”一节） |\n| description | 否 | 指标作用的人类可读描述\
  \ |\n| display name | 否 | 指标的人类可读名称 |\n| units | 是 | 度量单位（毫秒、分钟等） |\n\n\n\n####\
  \ 指标类型\n\nMicroProfile Metrics 规范定义了七种指标类型（见表 4-7）。\n\n表 4-7\n\nMicroProfile 指标类型\n\
  \n| 指标类型 | 描述 |\n| --- | --- |\n| Counter | 一种简单的单调递增计数器（例如，随时间处理的 HTTP 请求数量；更多信息见“Counter”小节）\
  \ |\n| Gauge | 一种可增可减的简单数值（例如，并发进程数、可用 RAM；更多信息见“Gauge”小节） |\n| ConcurrentGauge\
  \ | 随时间变化的并发调用次数，以及前一个完整分钟内的最小/最大值（更多信息见“Concurrent Gauge”小节）。 |\n| Meter | 带速率的吞吐量（更多信息见“Meter”小节）\
  \ |\n| Histogram | long 值的分布（更多信息见“Histogram”小节） |\n| SimpleTimer | 总耗时和样本计数（更多信息见“Simple\
  \ Timer”小节） |\n| Timer | Meter 加上样本时间直方图（更多信息见“Timer”小节） |\n\n### 使用 MicroProfile\
  \ Metrics API\n\nMicroProfile metrics 提供了 API，使你可以快速为应用添加指标支持。它包含*注解*和*编程式 API*。你可以二选一，也可以同时使用。这些是用途不同的工具。编程式\
  \ API 功能更强大。相比注解，你可以用它完成更多事情。但注解更易用，并且在大多数场景下功能已足够。\n\n#### Counter\n\nCounter 是一个简单的单调递增值。它的名字已经很好地说明了用途。你可以用它来计数，并观察这个数字如何随时间增长。需要理解的重要一点是，Counter\
  \ 不能减少。\n\n在一架准备起飞的飞机上，乘务员会走遍机舱统计乘客人数。他们会使用计数器来简化计数。按一下这个设备上的按钮，计数器就加一。咔哒、咔哒、咔哒，乘客总数就显示出来了。这个计数器就是现实生活中\
  \ Counter 的绝佳示例。\n\n另一个例子是电子计步器。你一移动，它就统计你的步数。这个数字不会减少。\n\n在编程中最常见的用例是统计某个方法被调用的次数。如果这个方法是一个\
  \ JAX-RS 处理器，你可以统计这个端点收到了多少请求。你也可以计算业务方法被调用了多少次。\n\n##### 使用注解\n\nMicroProfile Metrics\
  \ API 定义了 `@Counted` 注解，它会引入一个 Counter 来统计被注解方法被调用的次数。它可以放在方法、构造函数或类上。当它标注在类上时，会作用于该类所有构造函数和非私有方法。\n\
  \n`@Counted` 注解可以不带任何参数使用。最简单的用法如下。\n\n```\n@GET\n@Counted\npublic void counter()\
  \ {\n// Some logic is here\n}\n```\n\n上面代码片段中的 `@GET` 注解不是必需的，它仅表明该方法是一个 JAX-RS\
  \ 资源处理器。你可以把 `@Counted` 和其他 MicroProfile Metrics 注解放在非私有方法上。唯一要求是：你的类必须是一个 CDI bean，并且你要通过它的\
  \ CDI 代理来调用该方法。\n\n此外，用户还可以在注解参数中指定指标元数据，例如*name*、*tags*、*displayName*、*description*\
  \ 和 *unit*。\n\n为了演示这一点，我们来创建一个稍复杂一点的示例：一个返回自身被调用次数的方法。复杂之处在于，我们必须在一个被 `@Counted`\
  \ 注解的方法内部访问对应的 Counter。\n\n一种解决方案是把同一个 Counter 注入到类字段中，并用它获取调用次数。获取所有已注册指标有很多方式，本章会介绍其中多种。下一个示例使用\
  \ `@Metric` 注解。它会从 MetricRegistry application 中注入一个指标，注入字段的类型要与 `@Metric` 注解参数匹配。如果找不到该指标，就会自动注册。\n\
  \n注意\n\n`@Metric` 注解可用于 Meter、Timer、SimpleTimer、Counter 和 Histogram 类型的字段。\n\n为了注入与\
  \ `@Counted` 中相同的指标，清单 4-6 为 `@Metric` 注解提供了相同参数。\n\n```\n@Inject\n@Metric(name=\"\
  cntr1\", absolute=true)\nCounter counter;\n@GET\n@Counted(name=\"cntr1\", absolute=true,\n\
  description = \"Simple annotation-based counter\")\npublic Long count() {\nreturn\
  \ counter.getCount();\n}\nListing 4-6\nCreating a Counter Using Annotations\n```\n\
  \n运行示例应用并多次触发其端点后，OpenMetrics 格式的指标数据如下所示。\n\n```\n# TYPE application_cntr1_total\
  \ counter\n# HELP application_cntr1_total Simple annotation-based counter\napplication_cntr1_total\
  \ 5\n```\n\n##### 使用编程式 API\n\nMicroProfile Metrics 拥有丰富的编程式 API，既可单独使用，也可与注解结合使用。前面的示例中已经使用了\
  \ `Counter` 类。清单 4-7 展示了如何仅使用编程式 API 复现相同功能。\n\n编程式 API 的关键类是 `MetricRegistry`。它归属于某个指标作用域，并保存该作用域中的所有指标。共有三个\
  \ `MetricRegistry` 对象：base、vendor 和 application 作用域。你最常用的是 application 作用域的 `MetricRegistry`。`MetricRegistry`\
  \ 用于注册和获取指标。它为此提供了多种“一体两用”方法。例如，重载的 `counter(...)` 方法会在注册表中获取 Counter；如果不存在则注册一个。\n\
  \n获取 `MetricRegistry` 的唯一方式是注入。默认会注入 application 注册表。如果你想注入其他作用域的注册表，请使用 `@RegistryType`\
  \ 注解并指定所需作用域。\n\n```\n@Inject\n@RegistryType(type = Type.VENDOR)\nMetricRegistry\
  \ metricRegistry;\n```\n\n回到我们的示例，逻辑如下。\n\n1.  使用构造函数注入 `MetricRegistry`。\n\n2.\
  \  将注入的注册表传给 `createCounter` 方法，该方法会创建 Counter 并将其注册到指标注册表中。\n\n3.  `GET` 处理器通过\
  \ `counter.inc()` 增加计数器，并通过 `counter.getCount()` 返回当前值。\n\n*   ① 保存 Counter 的类字段\n\
  \n*   ② 使用构造函数注入 `MetricRegistry`\n\n*   ③ 创建一个 tag\n\n*   ④ 创建 metadata\n\n*  \
  \ ⑤ 注册 Counter 并将其赋给类字段\n\n*   ⑥ 增加计数器\n\n*   ⑦ 返回当前计数器值\n\n```\nprivate Counter\
  \ counter;                                ①\n@Inject                           \
  \                      ②\npublic CounterProgrammaticResource(MetricRegistry\nmetricRegistry)\
  \ {\ncreateCounter(metricRegistry);\n}\nprivate void createCounter(MetricRegistry\n\
  metricRegistry) {\nTag tag = new Tag(\"method\", \"programmatic\");        ③\nMetadata\
  \ metadata = Metadata.builder()              ④\n.withName(\"cntr2\")\n.build();\n\
  counter = metricRegistry.counter(metadata, tag);    ⑤\n}\n@GET\npublic Long counterProgrammatic()\
  \ {\ncounter.inc();                                      ⑥\nreturn counter.getCount();\
  \                          ⑦\n}\nListing 4-7\nCreating a Counter Using Programmatic\
  \ API\n```\n\n#### Gauge\n\n*Gauge* 是一种可增可减的简单数值。这一点不同于只能递增的 Counter。Gauge 的一个典型示例是室内温度，它会在一天中上下波动。更技术化的例子包括可用\
  \ RAM 或并发进程数。\n\nGauge 是唯一一种不会存储、聚合或处理测量值的指标类型。它只是获取应用中可用的一个值，并将其传递给 Prometheus\
  \ 或其他外部指标处理系统。\n\n\n\n##### 使用注解\n\nMicroProfile Metrics API 定义了 `@Gauge` 注解。它只能放在方法上。它根据该方法返回的值定义一个\
  \ gauge。该值可以是任意类型，但 Prometheus 只接受 gauge 的数值类型，因此如果你计划使用 Prometheus 进行数据采集，就必须使用数值类型。\n\
  \n`@Gauge` 注解不会为 *unit* 提供默认值。用户必须显式指定它。\n\n从技术上讲，`@Gauge` 注解只是告诉系统：gauge 的值是通过被注解方法的返回值获取的。\n\
  \n清单 4-8 展示了一个返回某些测量值的方法。在这个例子中，它只是一个 0 到 100 之间的随机数，但也可以是更有意义的内容。这个方法使用名称为 `gauge1`\
  \ 的 `@Gauge` 进行了注解。当你获取指标时，该 gauge 会返回一个新的随机数。\n\n```\n@Gauge(name = \"gauge1\"\
  ,\nabsolute = true,\ndescription = \"Simple annotation-based gauge\",\nunit = MetricUnits.NONE)\n\
  public Integer measurement() {\nreturn random.nextInt(100);\n}\nListing 4-8\nCreating\
  \ a Gauge Using Annotations\n```\n\n##### 使用编程式 API\n\n以编程方式使用 gauge 指标的步骤与前面介绍\
  \ counter 的方式类似。不过有一点不同：当你在指标注册表中注册 gauge 时，必须指定一个 lambda 引用、Supplier 或 Function，用于提供\
  \ gauge 的值。\n\n下面是一个使用编程式 API 实现随机 gauge 的示例。\n\n*   ① 通过构造器注入 `MetricRegistry`\n\
  \n*   ② 创建一个 gauge\n\n*   ③ 返回测量值的方法\n\n```\nprivate Random random = new Random();\n\
  @Inject                                                 ①\npublic GaugeProgrammaticResource(\n\
  MetricRegistry metricRegistry) {\nmetricRegistry.gauge(\"gauge2\", this::measurement);\
  \  ②\n}\npublic Integer measurement() {                          ③\nreturn random.nextInt(100);\n\
  }\nListing 4-9\nCreating a Gauge Using Programmatic API\n```\n\n#### 并发 Gauge\n\n\
  并发 gauge 指标用于统计方法的并行调用次数。也就是说，它表示在某一时刻有多少个并发线程正在执行该方法。它是我们目前学习到的第一个多值指标。除了当前并发调用数之外，它还包含上一个完整分钟内的最高值和最低值。\n\
  \n注意\n\n上一个完整分钟与最近 60 秒不同。用例子更容易说明：如果采样时间是 8:32:36（上午 8 点 32 分 36 秒），那么上一个完整分钟是从\
  \ 8:31:00 到 8:32:00（不包含 8:32:00）的时间区间。\n\n表 4-8\n\n并发 Gauge 指标数据\n\n| 描述 | OpenMetrics\
  \ 后缀 | JSON 格式字段 | ConcurrentGauge 类方法 |\n| --- | --- | --- | --- |\n| 并发调用次数 |\
  \ current | current | getCount( ) |\n| 上一个完整分钟的并发调用最高值 | max | max | getMax( ) |\n\
  | 上一个完整分钟的并发调用最低值 | min | min | getMin( ) |\n\n##### 使用注解\n\nMicroProfile Metrics\
  \ API 定义了 `@ConcurrentGauge` 注解。它可以放在方法、构造函数和类上。放在类上时，会作用于该类的所有构造函数和非私有方法。\n\n`@ConcurrentGauge`\
  \ 注解没有任何必填参数。清单 4-10 添加了一些元数据，使其在输出文件中更易读。\n\n它创建了一个除了休眠 20 秒外什么都不做的方法。要得到一些结果，你必须在\
  \ 20 秒内使用不同的 *curl* 实例调用它的 REST 端点。你可以通过在终端应用中打开新标签页来实现。\n\n```\n@GET\n@ConcurrentGauge(name=\"\
  cgauge1\",\nabsolute=true,\ndescription = \"Simple annotation-based concurrent gauge\"\
  )\npublic void concurrentGauge() throws InterruptedException {\nThread.sleep(20\
  \ * 1000);\n}\nListing 4-10\nCreating a Concurrent Gauge Using Annotations\n```\n\
  \n在 OpenMetrics 格式中，`cgauge1` 的输出如下所示。\n\n```\n# TYPE application_cgauge1_current\
  \ gauge\n# HELP application_cgauge1_current Simple annotation-based concurrent gauge\n\
  application_cgauge1_current 1\n# TYPE application_cgauge1_min gauge\napplication_cgauge1_min\
  \ 0\n# TYPE application_cgauge1_max gauge\napplication_cgauge1_max 2\n```\n\n#####\
  \ 使用编程式 API\n\n现在让我们学习如何通过编程式 API 使用并发 gauge。MicroProfile Metrics 提供了 `ConcurrentGauge`\
  \ 类，用于处理并发 gauge。它在内部维护并发调用计数，并提供 `inc()` 和 `dec()` 方法用于增加和减少计数。它还提供了获取并发 gauge\
  \ 全部指标数据的方法。\n\n*   ① 通过构造器注入 `MetricRegistry`\n\n*   ② 创建并发 gauge\n\n*   ③ 在开始要测量的操作前增加\
  \ gauge 值\n\n*   ④ 被测业务逻辑（本例中是休眠）\n\n*   ⑤ 在被测操作完成后减少 gauge 值（这一步放在 finally 块中，因此无论操作成功与否都会减少\
  \ gauge。）\n\n```\n@ApplicationScoped\n@Path(\"/concurrentgauge/programmatic\")\n\
  public class CGaugeProgrammaticResource {\nConcurrentGauge concurrentGauge;\n@Inject\n\
  public CGaugeProgrammaticResource(MetricRegistry registry) {                   \
  \                         ①\nconcurrentGauge = registry\n.concurrentGauge(\"cgauge\"\
  , new Tag(\"method\", \"programmatic\"));                           ②\n}\n@GET\n\
  public void concurrentGauge() {\nconcurrentGauge.inc();                        \
  \  ③\ntry {\nThread.sleep(20 * 1000);                    ④\n} catch (InterruptedException\
  \ e) {\nthrow new RuntimeException(e);\n} finally {\nconcurrentGauge.dec();    \
  \                  ⑤\n}\n}\n}\nListing 4-11\nCreating a Concurrent Gauge Using Programmatic\
  \ API\n```\n\n\n\n#### 直方图\n\n*直方图*是一种复杂指标，用于展示测量值如何分布在特定区间（通常称为桶）中。这里的关键词是*分布*。直方图的使用场景是：当你对绝对值本身只稍微关注，但希望看到这些值是如何分布的时候。\n\
  \n从图形上看，直方图类似柱状图。每个柱子代表一个桶。柱子越高，落入该范围的测量值就越多。\n\n图 4-3 是一个直方图示例，展示了参加某会议人群的年龄分布。\n\
  \n![](img/600147_1_En_4_Fig3_HTML.jpg)\n\n一个展示 10 到 90 岁年龄段人数分布的直方图。30 到 40 岁组的人数最多，而\
  \ 60 到 70 岁组的人数最少。\n\n图 4-3\n\n直方图示例\n\n另一个示例来自摄影。直方图直接用于相机中，以显示照片的亮度。每一种色调都以一个柱子表示。柱子越高，该色调在图像中出现得越频繁。它是查看照片曝光情况的理想工具。\n\
  \n在我们的领域中，直方图的使用场景例如请求时长分布或响应大小分布。\n\n直方图指标包含 12 个字段，包括分布中的最小值、最大值和中位值，数值的标准差，所有数值的总和，以及第\
  \ 50、75、95、98、99 和 99.9 百分位数的值（见表 4-9）。\n\n表 4-9\n\n直方图指标数据\n\n| 描述 | OpenMetrics\
  \ 后缀 | JSON 格式字段 | Histogram 类方法 |\n| --- | --- | --- | --- |\n| 分布中的最小值 | min_<units>\
  \ | min | getSnapshot( ).getMin( ) |\n| 分布中的最大值 | max_<units> | max | getSnapshot( ).getMax( )\
  \ |\n| 分布中的中位值 | mean_<units> | mean | getSnapshot( ).getMean( ) |\n| 数值的标准差 | stddev_<units>\
  \ | stddev | getSnapshot( ).getStdDev( ) |\n| 分布中的数值个数 | <units>_count | count |\
  \ getCount( ) |\n| 所有数值之和 | <units>_sum | sum | getSum( ) |\n| 分布中第 50 百分位的值 | <units>{quantile=\"\
  0.5\"} | p50 | getSnapshot( ).getMedian( ) |\n| 分布中第 75 百分位的值 | <units>{quantile=\"\
  0.75\"} | p75 | getSnapshot( ).get75thPercentile( ) |\n| 分布中第 95 百分位的值 | <units>{quantile=\"\
  0.95\"} | p95 | getSnapshot( ).get95thPercentile( ) |\n| 分布中第 98 百分位的值 | <units>{quantile=\"\
  0.98\"} | p98 | getSnapshot( ).get98thPercentile( ) |\n| 分布中第 99 百分位的值 | <units>{quantile=\"\
  0.99\"} | p99 | getSnapshot( ).get99thPercentile( ) |\n| 分布中第 99.9 百分位的值 | <units>{quantile=\"\
  0.999\"} | p999 | getSnapshot( ).get999thPercentile( ) |\n\n注意\n\n百分位数是指在一组观测值中，某一给定百分比观测值低于它的那个数值。例如，第\
  \ 70 百分位数就是有 70% 观测值低于该值的位置。\n\nMicroProfile Metrics 仅提供以编程方式操作直方图的 API。\n\n#####\
  \ 使用编程式 API\n\nMicroProfile Metrics API 提供了 `Histogram` 类，用于处理直方图。与其他指标类一样，它可以通过\
  \ `MetricRegistry` 类中重载的 `histogram` 方法之一获取。\n\n为了演示直方图，清单 4-12 展示了一个简单服务，它会将传入的值注册到直方图中。\n\
  \n```\n@ApplicationScoped\n@Path(\"/histogram\")\npublic class HistogramProgrammaticResource\
  \ {\nprivate Histogram histogram;\n@Inject\npublic HistogramProgrammaticResource(MetricRegistry\
  \ metricRegistry) {\ncreateHistogram(metricRegistry);\n}\n@GET\n@Path(\"/{value}\"\
  )\npublic void histogram(@PathParam(\"value\") Long value) {\nhistogram.update(value);\n\
  }\nprivate void createHistogram(MetricRegistry metricRegistry) {\nMetadata metadata\
  \ = Metadata.builder()\n.withName(\"histogram\")\n.withDescription(\"Histogram programmatic\"\
  )\n.withType(MetricType.HISTOGRAM)\n.build();\nhistogram = metricRegistry.histogram(metadata);\n\
  }\n}\nListing 4-12\nCreating a Histogram Using Programmatic API\n```\n\nOpenMetrics\
  \ 格式的示例输出如清单 4-13 所示。\n\n```\n# TYPE application_histogram_mean gauge\napplication_histogram_programmatic_mean\
  \ 3.0688587149767783\n# TYPE application_histogram_max gauge\napplication_histogram_programmatic_max\
  \ 5\n# TYPE application_histogram_min gauge\napplication_histogram_programmatic_min\
  \ 1\n# TYPE application_histogram_stddev gauge\napplication_histogram_programmatic_stddev\
  \ 1.4120173733941095\n# TYPE application_histogram summary\n# HELP application_histogram\
  \ Histogram programmatic\napplication_histogram_programmatic_count 5\napplication_histogram_programmatic_sum\
  \ 15\napplication_histogram_programmatic{quantile=\"0.5\"} 3\napplication_histogram_programmatic{quantile=\"\
  0.75\"} 4\napplication_histogram_programmatic{quantile=\"0.95\"} 5\napplication_histogram_programmatic{quantile=\"\
  0.98\"} 5\napplication_histogram_programmatic{quantile=\"0.99\"} 5\napplication_histogram_programmatic{quantile=\"\
  0.999\"} 5\nListing 4-13\nHistogram Metric Output in OpenMetrics Format\n```\n\n\
  #### 计量器\n\n规范将 *计量器* 定义为一种指标，用于跟踪平均吞吐率，以及按每秒命中数衡量的 1 分钟、5 分钟和 15 分钟指数加权移动平均吞吐率。计量器提供的所有数据列于表\
  \ 4-10。\n\n*指数加权移动平均*是一种统计度量，在金融领域被广泛用于股票技术分析和波动率建模。它在完整数据集的一个子集上计算加权平均，并被设计为让较早的观测值权重更低。旧观测值的权重按指数方式递减。\n\
  \n计量器的主要用途是监控 RESTful 服务端点或数据访问组件上的流量。Helidon 提供了一个用于监控服务总吞吐量的供应商指标，它就是一个计量器。\n\n\
  表 4-10\n\n计量器指标数据\n\n| 描述 | OpenMetrics 后缀 | JSON 格式字段 | Meter 类方法 |\n| --- | ---\
  \ | --- | --- |\n| 观测总数 | total | count | getCount( ) |\n| 每秒平均速率 | rate_per_second\
  \ | meanRate | getMeanRate( ) |\n| 最近 1 分钟的指数加权移动平均 | one_min_rate_per_second |\
  \ oneMinRate | getOneMinuteRate( ) |\n| 最近 5 分钟的指数加权移动平均 | five_min_rate_per_second\
  \ | fiveMinRate | getFiveMinuteRate( ) |\n| 最近 15 分钟的指数加权移动平均 | fifteen_min_rate_per_second\
  \ | fifteenMinRate | getFifteenMinuteRate( ) |\n\nMicroProfile Metrics 规范允许用户通过注解和编程式\
  \ API 使用计量器。\n\n\n\n##### 使用注解\n\nMicroProfile Metrics API 定义了 `@Metered` 注解来配合\
  \ meter 使用。它可以放在方法、构造函数和类上。当它放在类上时，会作用于该类的所有构造函数和非私有方法。\n\n对于每个使用 `@Metered` 注解的方法/构造函数，都会在应用指标注册表中创建并注册一个指标。每次调用该方法时，meter\
  \ 都会被标记一次。\n\n清单 4-14 是一个返回随机数的简单示例。它使用了 `@Metered` 注解，因此 `mtr1` 指标会收集该方法的吞吐量。\n\
  \n```\n@GET\n@Metered(name = \"mtr1\",\nabsolute = true,\ndescription = \"Simple\
  \ annotation-based meter\")\npublic String meteredMethod() {\n...\n}\nListing 4-14\n\
  Creating a Meter Using Annotations\n```\n\n在多次触发该 metered 方法后，`mtr1` 指标会产生如下类似输出。\n\
  \n```\n# TYPE application_mtr1_total counter\n# HELP application_mtr1_total Simple\
  \ annotation-based meter\napplication_mtr1_total 15\n# TYPE application_mtr1_rate_per_second\
  \ gauge\napplication_mtr1_rate_per_second 0.13889050670608735\n# TYPE application_mtr1_one_min_rate_per_second\
  \ gauge\napplication_mtr1_one_min_rate_per_second 0.22974035264337553\n# TYPE application_mtr1_five_min_rate_per_second\
  \ gauge\napplication_mtr1_five_min_rate_per_second 0.049149433089204296\n# TYPE\
  \ application_mtr1_fifteen_min_rate_per_second gauge\napplication_mtr1_fifteen_min_rate_per_second\
  \ 0.016571380739795517\n```\n\n##### 使用编程式 API\n\nMicroProfile Metrics API 包含 `Meter`\
  \ 类，用于处理 meter。它提供 `mark()` 和 `mark(long)` 方法，分别将命中次数增加 1 和增加指定值。它还包含用于获取所有已计算速率的方法。\n\
  \n`MetricRegistry` 类包含 `meter(String)` 和 `meter(Metadata)` 方法，用于注册并获取 meter。\n\n\
  清单 4-15 演示了如何创建名为 `mtr2` 的 meter，以及一个用于标记一次命中并返回该 meter 平均速率的方法。\n\n```\n@ApplicationScoped\n\
  @Path(\"/meter/programmatic\")\npublic class MeterProgrammaticResource {\nprivate\
  \ Meter meter;\n@Inject\npublic MeterProgrammaticResource(MetricRegistry metricRegistry)\
  \ {\nmeter = metricRegistry.meter(\"mtr2\");\n}\n@GET\npublic double meterProgrammatic()\
  \ {\nmeter.mark();\nreturn meter.getMeanRate();\n}\n}\nListing 4-15\nCreating a\
  \ Meter Using Programmatic API\n```\n\n#### 简单计时器\n\n简单计时器是一种记录方法执行时间的指标。它是一个复合指标，包含执行总次数、已耗时间，以及最近一个完整自然分钟内的最高和最低耗时。\n\
  \n表 4-11\n\n简单计时器指标数据\n\n| 描述 | OpenMetrics 后缀 | JSON 格式字段 | SimpleTimer 类方法 |\n\
  | --- | --- | --- | --- |\n| 执行次数 | total | count | getCount( ) |\n| 已耗时间 | elapsedTime_seconds\
  \ | elapsedTime | getElapsedTime( ) |\n| 最近一个完整自然分钟内的最高耗时 | maxTimeDuration_seconds\
  \ | maxTimeDuration | getMaxTimeDuration( ) |\n| 最近一个完整自然分钟内的最低耗时 | minTimeDuration_seconds\
  \ | minTimeDuration | getMinTimeDuration( ) |\n\n注意\n\n在 OpenMetrics 格式中，*elapsedTime*、*maxTimeDuration*\
  \ 和 *minTimeDuration* 指标以秒为单位；在 JSON 格式中则以纳秒为单位。\n\nMicroProfile Metric 提供了注解和编程式\
  \ API 来处理简单计时器指标。\n\n##### 使用注解\n\nMicroProfile Metrics API 定义了 `@SimplyTimed` 注解。它可以放在方法、构造函数和类上。当它放在类上时，会作用于该类的所有构造函数和非私有方法。`@SimplyTimed`\
  \ 注解没有任何必填参数。\n\n清单 4-16 展示了一个在 0 到 5 秒之间随机休眠的方法，并使用了 `@SimplyTimed` 注解。\n\n```\n\
  @GET\n@SimplyTimed(name=\"stmr1\",\nabsolute=true,\ndescription = \"Simple timer\
  \ using annotations\")\npublic void simpleTimer() throws InterruptedException {\n\
  Thread.sleep(random.nextInt(5000));\n}\nListing 4-16\nCreating a Simple Timer Using\
  \ Annotations\n```\n\nOpenMetrics 格式的输出类似如下。\n\n```\n# TYPE application_stmr1_total\
  \ counter\n# HELP application_stmr1_total Simple timer using annotations\napplication_stmr1_total\
  \ 4\n# TYPE application_stmr1_elapsedTime_seconds gauge\napplication_stmr1_elapsedTime_seconds\
  \ 5.011884846\n# TYPE application_stmr1_maxTimeDuration_seconds gauge\napplication_stmr1_maxTimeDuration_seconds\
  \ 2\n# TYPE application_stmr1_minTimeDuration_seconds gauge\napplication_stmr1_minTimeDuration_seconds\
  \ 0\n```\n\n##### 使用编程式 API\n\nMicroProfile Metrics API 提供了 `SimpleTimer` 类，用于处理简单计时器。与其他指标类一样，它可以通过\
  \ `MetricRegistry` 类中重载的 `simpleTimer` 方法之一获取。\n\n以编程方式使用简单计时器指标有多种方法。\n\n*   将你要计时的方法改为\
  \ `Callable`，并使用 `SimpleTimer.time(Callable)` 来执行并计时。\n\n*   将你要计时的方法改为 `Runnable`，并使用\
  \ `SimpleTimer.time(Runnable)` 来执行并计时。\n\n*   手动为方法计时，并使用 `SimpleTimer.update(Duration)`\
  \ 更新你的简单计时器。\n\n*   使用 `Context context = SimpleTimer.time()` 启动方法计时，执行所有需要计时的逻辑，并在结束时调用\
  \ `context.close()` 以更新指标。\n\n清单 4-17 演示了如何将 `Runnable` 对象与简单计时器一起使用。\n\n```\n@ApplicationScoped\n\
  @Path(\"/simpletimer/programmatic\")\npublic class SimpleTimerProgrammaticResource\
  \ {\nprivate Random random = new Random();\nprivate SimpleTimer simpleTimer;\n@Inject\n\
  public SimpleTimerProgrammaticResource(MetricRegistry metricRegistry) {\ncreateSimpleTimer(metricRegistry);\n\
  }\n@GET\npublic void simpleTimer() {\nRunnable runnable = () -> {\ntry {\nThread.sleep(random.nextInt(5000));\n\
  } catch (InterruptedException e) {\nthrow new RuntimeException(e);\n}\n};\nsimpleTimer.time(runnable);\n\
  }\nprivate void createSimpleTimer(MetricRegistry metricRegistry) {\nMetadata metadata\
  \ = Metadata.builder()\n.withName(\"stmr2\")\n.withDescription(\"Simple timer programmatic\"\
  )\n.withType(MetricType.SIMPLE_TIMER)\n.build();\nsimpleTimer = metricRegistry.simpleTimer(metadata);\n\
  }\n}\nListing 4-17\nUsing Programmatic API to Create a Simple Timer\n```\n\n\n\n\
  #### 计时器\n\n计时器（timer）指标是上一节介绍的简单计时器（simple timer）的增强版。除了跟踪方法执行时间外，它还包含一个用于跟踪吞吐率的\
  \ meter，以及一个记录时间统计分布的 histogram。表 4-12 包含了计时器指标的全部数据、访问方法，以及在 OpenMetrics 和 JSON\
  \ 格式中的对应字段。\n\n如果你需要这些附加数据，使用计时器是合理的。如果你只需要跟踪耗时，请使用简单计时器。\n\n表 4-12\n\n计时器指标数据\n\
  \n| 描述 | OpenMetrics 后缀 | JSON 格式字段 | Timer 类方法 |\n| --- | --- | --- | --- |\n|\
  \ 每秒平均速率 | rate_per_second | meanRate | getMeanRate( ) |\n| 最近 1 分钟的指数加权移动平均值 |\
  \ one_min_rate_per_second | oneMinRate | getOneMinuteRate( ) |\n| 最近 5 分钟的指数加权移动平均值\
  \ | five_min_rate_per_second | fiveMinRate | getFiveMinuteRate( ) |\n| 最近 15 分钟的指数加权移动平均值\
  \ | fifteen_min_rate_per_second | fifteenMinRate | getFifteenMinuteRate( ) |\n|\
  \ 最短持续时间 | min_seconds | min | getSnapshot( ).getMin( ) |\n| 最长持续时间 | max_seconds\
  \ | max | getSnapshot( ).getMax( ) |\n| 平均持续时间 | mean_seconds | mean | getSnapshot( ).getMean( )\
  \ |\n| 持续时间的标准差 | stddev_seconds | stddev | getSnapshot( ).getStdDev( ) |\n| 命中次数\
  \ | seconds_count | count | getCount( ) |\n| 累计耗时 | seconds_sum | elapsedTime |\
  \ getElapsedTime( ) |\n| 第 50 百分位的值 | seconds{quantile=\"0.5\"} | p50 | getSnapshot( ).getMedian( )\
  \ |\n| 第 75 百分位的值 | seconds{quantile=\"0.75\"} | p75 | getSnapshot( ).get75thPercentile( )\
  \ |\n| 第 95 百分位的值 | seconds{quantile=\"0.95\"} | p95 | getSnapshot( ).get95thPercentile( )\
  \ |\n| 第 98 百分位的值 | seconds{quantile=\"0.98\"} | p98 | getSnapshot( ).get98thPercentile( )\
  \ |\n| 第 99 百分位的值 | seconds{quantile=\"0.99\"} | p99 | getSnapshot( ).get99thPercentile( )\
  \ |\n| 第 99.9 百分位的值 | seconds{quantile=\"0.999\"} | p999 | getSnapshot( ).get999thPercentile( )\
  \ |\n\n要使用计时器，MicroProfile Metrics 提供了注解方式和编程式 API。\n\n##### 使用注解\n\nMicroProfile\
  \ Metrics API 定义了 `@Timed` 注解。它可以放在方法、构造函数和类上。当放在类上时，它会作用于该类的所有构造函数和非私有方法。\n\n虽然\
  \ `@Timed` 注解没有必填参数，但为了清晰起见，添加一些元数据是有意义的。清单 4-18 演示了一个计时方法，该方法会随机阻塞一段不超过 5 秒的时间。\n\
  \n```\n@GET\n@Timed(name=\"tmr1\",\nabsolute=true,\ndescription = \"Timer using\
  \ annotations\")\npublic void timer() throws InterruptedException {\nThread.sleep(random.nextInt(5000));\n\
  }\nListing 4-18\nCreating a Timer Using Annotations\n```\n\n清单 4-19 展示了在多次触发该计时方法后生成的\
  \ OpenMetrics 格式示例输出。\n\n```\n# TYPE application_tmr1_rate_per_second gauge\napplication_tmr1_rate_per_second\
  \ 0.14116614752306147\n# TYPE application_tmr1_one_min_rate_per_second gauge\napplication_tmr1_one_min_rate_per_second\
  \ 0.07122550418795522\n# TYPE application_tmr1_five_min_rate_per_second gauge\n\
  application_tmr1_five_min_rate_per_second 0.018664201095054796\n# TYPE application_tmr1_fifteen_min_rate_per_second\
  \ gauge\napplication_tmr1_fifteen_min_rate_per_second 0.00651434969860056\n# TYPE\
  \ application_tmr1_mean_seconds gauge\napplication_tmr1_mean_seconds 3.2017328639808618\n\
  # TYPE application_tmr1_max_seconds gauge\napplication_tmr1_max_seconds 4.0069105\n\
  # TYPE application_tmr1_min_seconds gauge\napplication_tmr1_min_seconds 2.0115542\n\
  # TYPE application_tmr1_stddev_seconds gauge\napplication_tmr1_stddev_seconds 0.6872868729178253\n\
  # TYPE application_tmr1_seconds summary\n# HELP application_tmr1_seconds Timer using\
  \ annotations\napplication_tmr1_seconds_count 6\napplication_tmr1_seconds_sum 19\n\
  application_tmr1_seconds{quantile=\"0.5\"} 3.0055081\napplication_tmr1_seconds{quantile=\"\
  0.75\"} 4.0027326\napplication_tmr1_seconds{quantile=\"0.95\"} 4.0069105\napplication_tmr1_seconds{quantile=\"\
  0.98\"} 4.0069105\napplication_tmr1_seconds{quantile=\"0.99\"} 4.0069105\napplication_tmr1_seconds{quantile=\"\
  0.999\"} 4.0069105\nListing 4-19\nTimer Metric Data in OpenMetrics Format\n```\n\
  \n##### 使用编程式 API\n\nMicroProfile Metrics API 提供了用于处理计时器的 `Timer` 类。和其他指标类一样，它可以通过\
  \ `MetricRegistry` 类中重载的 `timer` 方法之一获取。`Timer` 包含了所有计时器指标字段的 getter（见表 4-12）。\n\
  \n它的工作方式与 `SimpleTimer` 类似，就像前面使用简单计时器演示 `Runnable` 那样。清单 4-20 则使用 `Callable` 来进行对比演示。\n\
  \n```\n@ApplicationScoped\n@Path(\"/timer/programmatic\")\npublic class TimerProgrammaticResource\
  \ {\nprivate Random random = new Random();\nprivate Timer timer;\n@Inject\npublic\
  \ TimerProgrammaticResource(MetricRegistry metricRegistry) {\ntimer = metricRegistry.timer(\"\
  tmr2\");\n}\n@GET\npublic Integer timer() throws Exception {\nCallable callable\
  \ = () -> {\nint sleepSec = random.nextInt(5000);\nThread.sleep(sleepSec);\nreturn\
  \ sleepSec;\n};\nreturn timer.time(callable);\n}\n}\nListing 4-20\nCreating a Timer\
  \ Using Programmatic API\n```\n\n## 链路追踪\n\n微服务的故障排查是一项复杂任务。每个请求都可能穿过位于不同地点、不同环境、不同主机上的多个微服务实例。\n\
  \n如果你的服务处理请求太慢怎么办？按理不该如此，但它确实发生了。你需要找出原因。你知道请求会根据某些业务条件经过多个服务。你无法访问这些服务，也不知道它们托管在哪里，因此不能简单地运行调试器来查看发生了什么。这正是分布式链路追踪能够帮助你的典型场景。\n\
  \n\n\n### 分布式追踪\n\n注意\n\n分布式追踪是一种用于跟踪请求在分布式系统各组件间传递路径的方法。\n\n本章使用*追踪*（tracing）一词，而不是*分布式跟踪*（distributed\
  \ tracking），因为它更简短。\n\n*Trace*（追踪）是请求在分布式系统组件中流转的完整路径。Trace 包含一个由 spans 组成的树结构。\n\
  \n*Span* 是一个工作单元，表示工作流中的一个片段，例如一次方法调用。树中的第一个 span 称为 *root span*（根 span）。它可能包含表示子操作的\
  \ *child spans*（子 spans）。每个 span 都有名称，并记录操作的开始时间、持续时间，以及可选的其他数据。\n\n![](img/600147_1_En_4_Fig4_HTML.jpg)\n\
  \n分布式追踪系统的框图。它包含一个管理员和存储，并连接到分布式追踪系统；该系统通过 trace、span 1、span 2 和 span 3，跟踪服务 1、2、3\
  \ 之间的请求与响应。\n\n图 4-4\n\n分布式追踪\n\nHelidon 实现了 MicroProfile OpenTracing API。\n\nMicroprofile\
  \ Opentracing\n\n[MicroProfile OpenTracing](https://download.eclipse.org/microprofile/microprofile-opentracing-3.0/microprofile-opentracing-spec-3.0.html)\
  \ 是一个基于 [OpenTracing](https://opentracing.io) 标准的开放规范。它提供了一个中立的追踪 API，可与 Zipkin\
  \ 和 Jaeger 等追踪系统平滑集成。\n\nMicroProfile OpenTracing 支持完全自动化的追踪，无需开发者执行任何操作。开发者只需选择想要使用的集成方式，并将相应库添加到项目依赖中。\n\
  \n在请求处理的每一步中，Helidon 都会调用追踪 API，在 span 中标记 Helidon 处理流程的关键点。开发者也可以（但不是必须）在应用处理的关键点调用同一个中立\
  \ API。追踪实现库会收集并传输追踪信息到对应的分布式追踪系统，后者接收并保存到其存储中。分布式追踪系统通常会提供 Web UI 来查看应用追踪。追踪通常使用瀑布图进行可视化（见图\
  \ 4-5）。\n\n![](img/600147_1_En_4_Fig5_HTML.jpg)\n\n该图包含 trace、span 1、span 2、span\
  \ 3 的块，以及一条从上到下的时间箭头。\n\n图 4-5\n\n追踪图\n\n### 将追踪添加到你的 Helidon 应用\n\n#### 使用 Project\
  \ Starter\n\n最简单的方法是使用 Project Starter 生成一个带追踪支持的项目。\n\n下面说明你需要执行的操作。\n\n1.  在 [`https://helidon.io/starter`](https://helidon.io/starter)\
  \ 打开 Project Starter。\n\n2.  在 Helidon Flavor 页面选择 Helidon MP，然后点击 Next。\n\n3. \
  \ 在 Application Type 页面，选择 Custom 并点击 Next。\n\n4.  在 Media Support 页面，保持 Jackson\
  \ 被选中；如果你希望符合 MicroProfile 平台规范，也可以选择 JSON-B。点击 Next。\n\n5.  在 Observability 页面，勾选\
  \ Tracing 并选择你希望使用的 Tracing Providers。若你希望在应用中使用 Health Checks 和 Metrics，也可以一并选择。\n\
  \n6.  点击 Download 生成你的项目，或者继续完成其余步骤以继续配置。\n\n#### 使用 CLI\n\n你需要先安装 Helidon CLI，如第\
  \ 2 章所述。\n\n使用 `helidon init` 命令开始生成新项目。CLI 和 Project Starter 使用的是同一个配置向导。按照前一节说明回答问题。完成配置向导后，你将得到一个已启用追踪支持的项目。\n\
  \n#### 手动添加依赖\n\n你需要添加对厂商中立的 MicroProfile OpenTracing API 的依赖，以及对你想使用的分布式追踪系统的依赖。\n\
  \n第一种方式是使用 `helidon-microprofile` bundle，其中以传递依赖方式包含了 `helidon-microprofile-tracing`。\n\
  \n```\nio.helidon.microprofile.bundles\nhelidon-microprofile\n\n```\n\n如果你不想使用 `helidon-microprofile`\
  \ bundle 带来的全部 MicroProfile 依赖，也可以使用更细粒度的配置：`helidon-microprofile-core`。它只引入必需依赖，再加上\
  \ `helidon-microprofile-tracing` 构件以启用 MicroProfile OpenTracing。\n\n```\nio.helidon.microprofile.bundles\n\
  helidon-microprofile-core\n\nio.helidon.microprofile.tracing\nhelidon-microprofile-tracing\n\
  \n```\n\n除此之外，你还必须添加你想使用的追踪提供方依赖。Helidon 开箱即用支持 Jaeger 和 Zipkin。\n\n对于 Jaeger，添加以下依赖。\n\
  \n```\nio.helidon.tracing\nhelidon-tracing-jaeger\nruntime\n\n```\n\n对于 Zipkin，添加如下依赖。\n\
  \n```\nio.helidon.tracing\nhelidon-tracing-zipkin\nruntime\n\n```\n\n### Helidon\
  \ 追踪实现\n\n作为 MicroProfile OpenTracing 的兼容实现，Helidon 提供自动化（“免代码”）追踪。其工作方式如下。\n\n\
  *   对于每个进入服务端点的 JAX-RS 入站请求\n    *   从请求中提取父 span 信息\n\n    *   启动一个 span 或子 span（完整\
  \ span 列表见表 4-13）\n\n    *   在请求完成时结束该 span\n\n*   对于每个发往其他服务的 JAX-RS 出站请求\n   \
  \ *   将当前 span 信息注入请求中\n\n    *   在请求发送时启动一个 span 或子 span（完整 span 列表见表 4-13）\n\n\
  \    *   在请求完成时结束该 span\n\n*   当调用某些 Helidon 内部组件时，例如 *security*\n    *   添加一个 span\
  \ 或子 span（完整 span 列表见表 4-13）\n\n    *   可选地将一些有用信息记录到 span 中\n\n*   实现了一个厂商中立的追踪\
  \ API，开发者可调用它来显式操作 spans\n\n\n\n#### Helidon 内置 Span\n\n当 Helidon 添加一个 span 时，它会是表\
  \ 4-13 中列出的 span 之一。每个 span 都属于 web server、security 或 JAX-RS 组件。为节省空间，组件名称放在描述列中。这些\
  \ span 具有很高的可定制性。你可以修改它们的名称并启用/禁用它们。更多信息请参阅 tracing 配置章节。\n\n每个 span 可选地包含 *日志*\
  \ 和 *标签*。*日志* 是键值对，包含一些额外的 span 特定信息。*标签* 是用于标记、查询和过滤数据的键值对。表 4-13 仅列出了一部分日志和标签。详细说明请参阅\
  \ [Helidon 文档](https://helidon.io/docs/v3/%2523/mp/tracing)。\n\n表 4-13\n\nHelidon\
  \ 内置 Span\n\n| Span 名称 | 描述 | Span 日志 | 标签 |\n| --- | --- | --- | --- |\n| HTTP\
  \ Request | 覆盖从请求到达到响应发送的整体 span。组件：*web-server* | handler.class | component, http.method,\
  \ http.status_code, http.url, error |\n| content-read | 读取请求实体。组件：*web-server* |\
  \ N/A | requested.type |\n| content-write | 写入响应实体。组件：*web-server* | N/A | response.type\
  \ |\n| security | 覆盖安全处理的整体 span。组件：*security* | status | security.id |\n| security:atn\
  \ | 对客户端进行认证。组件：*security* | security.user, security.service, status | N/A |\n|\
  \ security:atz | 对客户端进行授权。组件：*security* | status | N/A |\n| security:response |\
  \ 响应的安全处理。组件：*security* | N/A | N/A |\n| security:outbound | 出站请求的安全处理。组件：*security*\
  \ | status | N/A |\n| generated name | 端点方法调用：name = HTTP method + class name +\
  \ method name。组件：*jax-rs* | N/A | N/A |\n| jersey-client-call | 出站请求。组件：*jax-rs*\
  \ | N/A | http.method, http.status_code, http.url |\n\n### MicroProfile OpenTracing\
  \ API\n\nMicroProfile OpenTracing 可以“无代码”工作。但如果开发者希望显式地操作 spans，它也提供了 API。这个 API\
  \ 非常简单，由 `@Traced` 注解和 `Tracer` 类组成。\n\n`@Traced` 注解可以放在方法或类上。放在类上时，它会影响该类的所有公共方法。该注解会为方法的每次调用创建一个新的子\
  \ span。\n\n`@Traced` 注解使用拦截器，因此该类必须是 CDI bean，并且方法必须通过 CDI 调用。对通过 `new` 创建的实例进行普通\
  \ Java 方法调用不会触发 tracing！此外，类型内部的方法调用也无效。如果你从另一个资源方法调用 JAX-RS 资源上的某个方法，则目标方法上的任何注解都会被忽略。\n\
  \n`@Traced` 注解有两个可选参数。\n\n*   **value=[true|false]**\n\n    默认值为 true。启用或禁用对应方法的\
  \ tracing（如果放在类上，则是该类所有公共方法）。\n\n*   **operationName=<span name>**\n\n    默认值为 “”\
  \ 。如果指定空字符串，则会基于类名和方法名自动生成名称。\n\n*   ① 被追踪的方法\n\n*   ② 不被追踪的方法\n\n```\n@Traced \
  \        ①\npublic String getMessage() {\nreturn message.get();\n}\n@Traced(false)\
  \  ②\npublic String getMessageWithNoTraces() {\nreturn message.get();\n}\nListing\
  \ 4-21\nUsing the @Traced Annotation\n```\n\nOpenTracing 的 `Tracer` 对象提供了对 spans\
  \ 更精细的控制。它允许你构建 spans、设置标签、记录事件等。Helidon 会自动创建并初始化一个 OpenTracing Tracer 对象。开发者只需要将其注入\
  \ bean 类并调用其方法。\n\n```\n@Inject\nio.opentracing.Tracer tracer;\npublic void importantWork()\
  \ {\nSpan span = tracer.buildSpan(\"important-work\").start();\nspan.setTag(...);\n\
  span.log(...);\n// Do some important work\n...\nspan.finish();\n}\nListing 4-22\n\
  Using the Tracer Object\n```\n\n### 配置\n\nHelidon 允许用户配置其内部 tracing 组件、为指定组件或端点完全启用或禁用\
  \ tracing，并重命名内置 spans。\n\n#### 启用/禁用 Tracing\n\nMicroProfile OpenTracing 规范允许通过配置禁用\
  \ JAX-RS 资源的 tracing。你需要在 `mp.opentracing.server.skip-pattern` 配置属性中指定一个匹配资源 URI\
  \ 的正则表达式。该属性通常位于 `/META-INF/microprofile-config.properties` 文件中（配置属性的使用方式见第 3 章）。\n\
  \n注意\n\nMicroProfile Health、MicroProfile Metrics 和 OpenAPI 规范中定义的端点总是被排除在 tracing\
  \ 之外。\n\n以下配置会禁用所有 tracing。\n\n```\nmp.opentracing.server.skip-pattern=.*\n```\n\
  \n禁用 `/foo` 端点以及任何以 `/bar` 开头的端点的 tracing。\n\n```\nmp.opentracing.server.skip-pattern=/foo|/bar.*\n\
  ```\n\nHelidon 提供了自己的 tracing 配置方式。配置可以定义在 *application.yaml* 中。除可为某些端点启用/禁用 tracing\
  \ 外，你还可以启用/禁用 Helidon 内置 spans。\n\n*   ① 要配置的路径（它使用一种特殊的模式匹配格式。更多信息可参阅 Helidon 文档。）\n\
  \n*   ② *true* 表示启用 tracing，*false* 表示禁用\n\n*   ③ 被配置组件的名称（*web-server*、*security*、*jax-rs*\
  \ 之一）\n\n*   ④ span 的名称（所有可用 span 名称见表 4-13）\n\n*   ⑤ 启用或禁用该 span\n\n*   ⑥ 日志名称（见表\
  \ 4-13 中指定 span 的可选项）\n\n*   ⑦ 启用或禁用该日志\n\n```\ntracing:\npaths:\n- path: \"/favicon.ico\"\
  \              ①\nenabled: false                    ②\n- path: \"/somepath\"\nenabled:\
  \ false\ncomponents:\nweb-server:                         ③\nspans:\n- name: \"\
  HTTP Request\"          ④\nenabled: true                 ⑤\nlogs:\n- name: \"content-write\"\
  \     ⑥\nenabled: false            ⑦\nListing 4-23\nExample of Tracing Configuration\
  \ in application.yaml\n```\n\n如果你不喜欢 YAML，也可以将其内容扁平化为 properties 格式，并放入 `META-INF/microprofile-config.properties`。\n\
  \n```\ntracing.paths.0.path=\"/favicon.ico\"\ntracing.paths.0.enabled=false\ntracing.paths.1.path=\"\
  /somepath\"\ntracing.paths.1.enabled=false\ncomponents.web-server.spans.0.name=\"\
  HTTP Request\"\ncomponents.web-server.spans.0.enabled=true\ncomponents.web-server.spans.0.logs.0.name=\"\
  content-write\"\ncomponents.web-server.spans.0.logs.0.enabled=false\nListing 4-24\n\
  Example of Tracing Configuration in microprofile-config.properties\n```\n\n####\
  \ 重命名顶层 Span\n\n在某些情况下，重命名顶层 HTTP request span 有助于更好地满足用户需求。Helidon 提供了这一能力。\n\n\
  注意\n\n这仅支持 web server 组件中的 HTTP request span。不支持其他 span。\n\n如以下示例所示，在 `new-name`\
  \ 配置属性中提供一个新名称。\n\n```\ntracing.components.web-server.spans.0.name=\"HTTP Request\"\
  \ntracing.components.web-server.spans.0.new-name: \"HTTP %1$s %2$s\"\n```\n\n你可以使用以下参数。\n\
  \n*   **method** 表示 HTTP 方法。\n\n*   **path** 表示请求路径（例如 `/greet`）。\n\n*   **query**\
  \ 表示请求查询串（可能为 null）。\n\n\n\n## 日志\n\n日志是本章最后一个（也是最短的）部分。与健康检查、指标和追踪相比，日志是开发者最常使用的内容。你们中的大多数人都熟悉日志，知道它是什么以及为什么要使用它；但如果你还不了解，我们会尽量解释清楚。\n\
  \n日志会告诉你：在一个服务内部，各个独立软件组件正在发生什么。\n\n用于回答这个问题的信息会被写入日志中。\n\n注意\n\n*日志*是按时间戳排列的一系列记录（消息），用于描述服务中的组件正在做什么，在某些情况下还会说明原因。\n\
  \n大多数情况下，日志会写入日志文件。日志文件是带有*.log*扩展名的普通文本文件。但有时日志也会写入数据库，甚至写入专门的日志收集系统。\n\n日志对于调试和发现应用中的问题非常有用。开发者会在源码中手动添加日志代码，以记录有助于追踪代码执行过程的信息，并对那些本不应发生的情况发出警告。\n\
  \n日志中的每条记录都有一个*日志级别*。\n\n注意\n\n*日志级别*用于衡量日志记录的重要性（越高 = 越重要）。\n\nJava 标准日志（`java.util.logging`）有七个日志级别。\n\
  \n*   SEVERE（最高级）\n\n*   WARNING\n\n*   INFO\n\n*   CONFIG\n\n*   FINE\n\n*   FINER\n\
  \n*   FINEST（最低级）\n\n为日志记录选择合适的日志级别是开发者的责任。应用会配置一个最小日志级别，因此低于该级别的记录不会写入日志。启用所有日志级别（FINEST\
  \ 级别）会使日志过大且过于冗长，导致难以找到所需信息。另一方面，启用更低的日志级别有助于定位问题。\n\n清单 4-25 演示了如何创建 logger 并使用不同的日志级别。\n\
  \n*   ① Logger 初始化\n\n*   ② 记录一条 severe 消息\n\n*   ③ 记录 severe 消息的另一种方式\n\n*   ④\
  \ 记录一条 warning 消息\n\n*   ⑤ 记录 warning 消息的另一种方式\n\n*   ⑥ 记录一条 info 消息\n\n*   ⑦ 记录\
  \ info 消息的另一种方式\n\n```\nprivate static final Logger LOGGER =\nLogger.getLogger(Main.class.getName());\
  \           ①\npublic void loggingDemo() {\nLOGGER.severe(\"Severe message\"); \
  \                 ②\nLOGGER.log(Level.SEVERE,\n\"Another severe message\");    \
  \                ③\nLOGGER.warning(\"Warning message\");                ④\nLOGGER.log(Level.WARNING,\n\
  \"Another warning message\");                   ⑤\nLOGGER.info(\"Info message\"\
  );                      ⑥\nLOGGER.log(Level.INFO,\n\"Another info message\");  \
  \                    ⑦\n}\nListing 4-25\nUsing Different Logging Levels\n```\n\n\
  ### Helidon 中的日志\n\nHelidon 组件使用`java.util.logging`（JUL）API 提供了大量日志能力。要在你的应用中使用它，不需要任何额外的第三方依赖。\n\
  \n开发者并不限于 JUL。Helidon 还支持其他流行日志框架，如 Log4j 和 SLF4J（Simple Logging Facade for Java）。这种情况下需要额外的第三方依赖。\n\
  \n下面是 Log4j 所需依赖。\n\n```\nio.helidon.logging\nhelidon-logging-log4j\n\norg.apache.logging.log4j\n\
  log4j-api\n\norg.apache.logging.log4j\nlog4j-core\n\norg.apache.logging.log4j\n\
  log4j-jul\n\n```\n\n对于 SLF4J。\n\n```\norg.slf4j\nslf4j-api\n\nio.helidon.logging\n\
  helidon-logging-slf4j\n\norg.slf4j\njul-to-slf4j\n\nch.qos.logback\nlogback-classic\n\
  \n```\n\n#### 映射诊断上下文（MDC）\n\n映射诊断上下文（MDC）是现代日志框架的一项特性，它允许你在日志消息中注册并使用当前日志作用域中不可直接获得的信息。典型示例包括当前登录用户\
  \ ID、追踪 ID、事务 ID，或任何其他与上下文相关的信息。\n\n如果你想使用这个特性，除了添加第三方依赖外，还需要进行一些额外配置。\n\n#####\
  \ JUL 中的 MDC\n\n对于 JUL，你需要添加一个 Helidon 模块依赖，用于为 JUL 启用 MDC。\n\n```\nio.helidon.logging\n\
  helidon-logging-jul\n\n```\n\n并在你的`logging.properties`文件中按如下或类似方式配置 handlers。\n\n\
  ```\n# Send messages to the console\nhandlers=io.helidon.logging.jul.HelidonConsoleHandler\n\
  # !thread! is replaced by Helidon with the thread name\n# any %X{...} is replaced\
  \ by a value from MDC\njava.util.logging.SimpleFormatter.format=%1$tY.%1$tm.%1$td\
  \ %1$tH:%1$tM:%1$tS %4$s %3$s !thread!: %5$s%6$s \"%X{name}\"%n\n# Global logging\
  \ level. Can be overridden by specific loggers\n.level=INFO\n```\n\n使用`HelidonConsoleHandler`很重要。`%X{name}`会打印\
  \ MDC 中的`name`属性。\n\n现在我们来看一下如何在你的应用中使用 MDC。在应用的某个部分，你需要设置一个 MDC 属性，使其在所有日志消息中都能打印出来，如下所示。\n\
  \n```\nimport io.helidon.logging.common.HelidonMdc;\npublic class Foo {\n...\npublic\
  \ SetupMdcLogging() {\nHelidonMdc.set(\"name\", \"Falco\");\n}\n}\n```\n\n在另一个类中，你初始化\
  \ logger 并记录一些消息。\n\n```\nimport java.util.logging.Logger;\nprivate static final\
  \ Logger LOGGER = Logger.getLogger(Main.class.getName());\npublic class Bar {\n\
  ...\npublic TestLogging() {\nLOGGER.info(\"It comes from MDC:\");\n}\n}\n```\n\n\
  以下是将会记录的日志内容。\n\n```\n2022.11.01 2:00:00 INFO Main Thread[main,5,main]: It comes\
  \ from MDC: \"Falco\"\n```\n\n##### Log4j 中的 MDC\n\nLog4j 允许你使用基于文件的配置或编程式配置。基于文件的配置对\
  \ GraalVM native-image 不太友好。这里两种方式都提供了示例，你可以根据自己的环境选择使用。\n\n清单 4-26 展示了如何在标准 Log4j\
  \ 2.x 配置文件`log4j2.xml`中配置 MDC。\n\n```\n\nListing 4-26\nExample of MDC Configuration\
  \ in log4j2.xml\n```\n\n清单 4-27 提供了相同配置的编程式写法。\n\n```\nimport org.apache.logging.log4j.core.appender.ConsoleAppender;\n\
  import org.apache.logging.log4j.core.config.Configurator;\nimport org.apache.logging.log4j.core.config.builder.api.ConfigurationBuilderFactory;\n\
  ...\nprivate static void configureLog4J() {\nvar builder = ConfigurationBuilderFactory.newConfigurationBuilder();\n\
  builder.setStatusLevel(Level.INFO);\nvar appenderComponentBuilder = builder.newAppender(\"\
  stdout\", \"CONSOLE\")\n.addAttribute(\"target\", ConsoleAppender.Target.SYSTEM_OUT);\n\
  appenderComponentBuilder.add(builder.newLayout(\"PatternLayout\")\n.addAttribute(\"\
  pattern\", \"%d{HH:mm:ss.SSS} %-5level [%t] %logger{36} - %msg %X{name}%n\"));\n\
  builder.add(appenderComponentBuilder);\nbuilder.add(builder.newRootLogger(Level.INFO)\n\
  .add(builder.newAppenderRef(\"stdout\")));\nConfigurator.initialize(builder.build());\n\
  }\nListing 4-27\nExample of Programmatic MDC Configuration in Log4j\n```\n\n同样，MDC\
  \ 相关配置中最重要的部分是`%X{name}`，它会打印 MDC 上下文中的`name`属性，该属性可按如下方式设置。\n\n```\nimport org.apache.logging.log4j.ThreadContext;\n\
  ...\nThreadContext.put(\"name\", \"Cassidy\");\n```\n\n你可以在本章示例代码中找到完整示例。\n\n#####\
  \ SLF4J 中的 MDC\n\n要在 SLF4J 中配置 MDC，请在你的`logback.xml`文件中添加如下或类似配置。\n\n```\n\n%d{HH:mm:ss.SSS}\
  \ %-5level [%thread] %logger{36} - %msg %X{name}%n\n\nListing 4-28\nExample of MDC\
  \ Configuration in SLF4J\n```\n\n与 JUL 和 Log4j 一样，`%X{name}`会打印 MDC 上下文中的`name`属性。\n\
  \n现在你可以按如下方式设置 MDC 属性。\n\n```\nimport org.slf4j.MDC;\n...\nMDC.put(\"name\", \"\
  Jaspis\");\n```\n\n它的值会在每条日志消息中打印出来。\n\n\n\n## 总结\n\n*   可观测性是指服务能够对外暴露反映其内部行为的数据的能力。\n\
  \n*   可观测性主要包含四个领域：健康检查、指标、链路追踪和日志。\n\n*   Helidon 实现了 MicroProfile Health、MicroProfile\
  \ Metrics 和 MicroProfile OpenTracing 规范。\n\n*   健康检查对于保障整个系统的平稳运行至关重要。健康检查使外部自动化管理系统能够检查你的应用是否可用并已准备好处理请求。\n\
  \n*   Helidon 提供了内置健康检查，用于判断每个应用可能面临的通用问题，同时也支持创建自定义健康检查。\n\n*   MicroProfile Metrics\
  \ 提供关于服务随时间表现的聚合统计信息。它可用于提升服务性能、调优扩缩容策略、优化业务逻辑，以及收集报表数据。\n\n*   像微服务这样的分布式系统由于其分布式特性而难以调试。分布式追踪是一种在请求穿越分布式系统各组件时跟踪其路径的方法。它有助于调试和性能调优你的分布式系统。\n\
  \n*   Helidon 提供自动化“免代码”的分布式追踪支持，并且也支持显式地处理 tracing span。\n\n*   日志能够告诉你服务中各个独立软件组件内部正在发生什么。\n\
  \n*   Helidon 支持 MDC（映射诊断上下文），允许你在日志消息中注册并使用当前日志作用域中不可用的信息。\n\n"
- '# 5. 与其他服务通信


  本章涵盖以下主题。


  *   理解 MicroProfile Rest Client API


  *   MicroProfile Rest Client 中的异常处理与过滤器


  *   使用 JAX-RS Client API 调用 RESTful 服务


  *   使用 JAX-RS Client API 的 Providers 与异步调用


  *   为 Helidon 应用添加 CORS 支持


  微服务不仅提供数据，也会消费数据。有时一个业务动作可能包含多个 REST 调用，甚至可以形成一个分布式事务。


  注意


  服务会调用其他服务！


  而且这些*服务调用层级*可能会广泛分布在许多服务之间。


  在 Helidon 中调用 RESTful 服务有多种方式。设想一个“魔法部”，它管理所有巫师及其施法许可证。该部门从两个服务获取这些信息：巫师服务提供巫师信息，许可服务提供许可证信息。这两个服务都通过各自的
  REST 端点提供数据。因此，魔法部是这些服务的客户端。


  ![](img/600147_1_En_5_Fig1_HTML.jpg)


  一个流程图。魔法部服务有两个 REST 调用。1. 巫师服务。2\. 许可服务。


  图 5-1


  服务调用其他服务：不同的微服务客户端选项


  *   **MicroProfile Rest Client** 是 MicroProfile 生态中的标准 REST 客户端。


  *   **JAX-RS Client** API 是一种遵循构建器模式的流行 REST 客户端。


  下面我们分别来了解它们。


  注意


  在 Helidon SE 中，有一个专门设计的响应式 Helidon WebClient。它在第 15 章中介绍。


  ## MicroProfile Rest Client


  MicroProfile Rest Client 提供了一种通过 HTTP 调用 RESTful 服务的类型安全方式。它旨在扩展 Jakarta REST（JAX-RS）规范。MicroProfile
  Rest Client 是 MicroProfile 体系下的一项[规范](https://download.eclipse.org/microprofile/microprofile-rest-client-3.0/microprofile-rest-client-spec-3.0.pdf)，Helidon
  MP 对其进行了实现。


  让我们直接进入实际代码，创建一个小型 REST 客户端，从我们的巫师服务（所有巫师的仓库）中消费数据。


  巫师服务很直观。它只有三个端点：按名称提供巫师，以及获取最强大的巫师。


  *   ① 一个持有并提供巫师数据的类


  *   ② 一个以 JSON 格式提供最强巫师的端点


  *   ③ 一个以 JSON 格式按名称提供巫师的端点


  *   ④ 一个用于新增巫师的 `POST` 端点，消费 JSON 格式数据


  ```

  @Path("/wizard")

  @RequestScoped

  public class WizardResource {

  private final WizardProvider wizardProvider;

  @Inject

  public WizardResource(WizardProvider wizardProvider) {   ①

  this.wizardProvider = wizardProvider;

  }

  @GET

  @Produces(MediaType.APPLICATION_JSON)

  public Wizard getMostMightyWizard() {                    ②

  return wizardProvider.getWizard();

  }

  @Path("/{name}")

  @GET

  @Produces(MediaType.APPLICATION_JSON)

  public Wizard getWizard(@PathParam("name") String name) {   ③

  return wizardProvider.getWizardByName(name);

  }

  @Path("/add")

  @POST

  @Produces(MediaType.APPLICATION_JSON)

  @Consumes(MediaType.APPLICATION_JSON)

  public Response addWizard(JsonObject jsonObject) {        ④

  if (!jsonObject.containsKey("name")) {

  JsonObject entity = JSON.createObjectBuilder()

  .add("error", "No name provided")

  .build();

  return Response.status(Response

  .Status.BAD_REQUEST).entity(entity).build();

  }

  String name = jsonObject.getString("name");

  Wizard wizard = new Wizard();

  wizard.setName(name);

  wizardProvider.addWizard(wizard);

  return Response.noContent().build();

  }

  }

  Listing 5-1

  Wizard Resource

  ```


  注意


  巫师服务的 MicroProfile Rest 示例可在本书示例仓库中找到。


  这个资源用于参考服务端发生了什么。它运行在 localhost 的 8080 端口。


  现在让我们看客户端侧。


  MicroProfile Rest Client 已经包含在完整的 `helidon-microprofile` 包中。要将 REST 客户端与其他所有 MicroProfile
  选项一起使用，请在 `pom.xml` 文件中包含清单 5-2。


  ```

  io.helidon.microprofile

  helidon-microprofile


  Listing 5-2

  MicroProfile Full Bundle

  ```


  如果需要更细粒度的控制，并且使用 `helidon-microprofile-core`，请在项目的 `pom.xml` 文件中添加清单 5-3 的依赖。


  *   ① MicroProfile Core 依赖


  *   ② MicroProfile Rest Client 依赖


  ```

  io.helidon.microprofile.bundles

  helidon-microprofile-core        ①


  io.helidon.microprofile.rest-client

  helidon-microprofile-rest-client   ②


  Listing 5-3

  MicroProfile Core Bundle

  ```


  现在让我们为魔法部使用的巫师服务创建客户端接口。


  由于它处于*受管环境*中，让 CDI 来负责创建 REST 客户端。REST 客户端接口必须使用 `@RegisterRestClient` 注解，才能自动注册到
  CDI 中。


  你需要创建一个包含所需方法的接口，并正确为其添加注解。我们使用带 `baseUrl` 的 `@RegisterRestClient` 来声明客户端应连接到指定端点。然后添加
  `getMostMightyWizard()` 方法，并使用 `@GET` 注解，这表示客户端会对基础 URI 执行 `GET` 请求，并将结果映射为 wizard。要按名称获取巫师，再添加一个方法并使用
  `@GET` 与 `@Path("/{name})` 注解。该方法包含一个带 `@PathParam("name")` 注解的参数，表示 name 来自该参数，并以生成的路径调用端点。


  *   ① 这会将 REST 客户端注册到基础 URI `http://localhost:8080/wizard`。`.`




  *   ② 这个方法声明了一个客户端，用于对*基础 URI*执行`GET`请求，并将结果映射到向导对象。


  *   ③ 这个方法对基础 URI 执行带有路径参数`name`的`GET`请求。


  ```

  @RegisterRestClient(baseUri="http://localhost:8080/wizard") ①

  interface WizardRestClient {

  @GET                                                  ②

  Wizard getMostMightyWizard();

  @Path("/{name}")                                      ③

  @GET

  Wizard getWizardByName(@PathParam("name") String name);

  }

  Listing 5-4

  REST Client Interface

  ```


  你可以看到，这里使用了熟悉的注解，例如`@GET`和`@Path`。这种统一性让人很容易上手。


  让我们在类中使用`WizardRestClient`，如清单 5-5 所示。


  *   ① 它必须是一个 CDI Bean。


  *   ② `@RestClient`注解会注入一个自动生成的代理来实现 REST 客户端。


  *   ③ 这是不带任何参数的 MicroProfile Rest Client 的简单用法。


  *   ④ 这里展示了带有`name`参数的 MicroProfile Rest Client 用法。


  ```

  @ApplicationScoped                                       ①

  @Path("/wizardClient")

  public class SorceryMinistryResource {

  @Inject

  @RestClient                                          ②

  private WizardRestClient restClient;

  @GET

  @Produces(MediaType.APPLICATION_JSON)

  public Wizard getMostMightyWizard() {

  return restClient.getMostMightyWizard();         ③

  }

  @GET

  @Path("/{name}")

  @Produces(MediaType.APPLICATION_JSON)

  public Wizard getWizardByName

  (@PathParam("name")String name) {

  return restClient.getWizardByName(name);         ④

  }

  }

  Listing 5-5

  Resource with REST Endpoints

  ```


  调用`client.getWizardByName(name)`会到达 Helidon 向导服务的端点。你可能会注意到并没有`WizardRestClient`接口的实现。代理会被自动创建并注入。


  注意


  REST 客户端实现允许我们通过基于构建器模式的编程 API、注解和配置来配置其参数。所有配置参数在 MicroProfile 中都是标准且可移植的，可在官方[文档](https://download.eclipse.org/microprofile/microprofile-rest-client-3.0/microprofile-rest-client-spec-3.0.pdf)中找到。


  ### 与 MicroProfile Config 集成


  也可以使用 MicroProfile Config 属性来覆盖 REST 接口中`@RegisterRestClient`注解指定的值。


  清单 5-6 在*microprofile-config.properties*中覆盖了`baseUri`。


  ```

  io.helidon.book.ch05.WizardRestClient/mp-rest/uri=http://someotheruri:8080/wizard

  Listing 5-6

  URI Properties

  ```


  REST 客户端要求提供`baseUri`注解属性（或在外部配置中指定为`*/mp-rest/uri`）。不过，实现可能还有其他方式来定义这些 URL/URI。如果在*microprofile-config.properties*中指定，它会覆盖使用`@RegisterRestClient`注解的接口上的任何
  baseUri 值。


  还可以按照*<class>/mp-rest/<property>*模式指定其他属性，例如`scope`、`providers`、`connectTimeout`、`readTimeout`、`followRedirects`和`proxyAddress`。


  如果客户端在代理后工作并且需要跟随重定向，清单 5-7 展示了如何以这种方式指定。


  *   ① 将 MicroProfile Rest Client 设置为使用代理


  *   ② 将 MicroProfile Rest Client 设置为跟随重定向


  ```

  io.helidon.book.ch05.WizardRestClient/mp-rest/proxyAddress="http://someobscureproxy.com:9999"  ①

  io.helidon.book.ch05.WizardRestClient/mp-rest/followRedirects=true                                   ②

  Listing 5-7

  Proxy and Redirect Properties

  ```


  由于 MicroProfile Rest Client 支持 SSL，因此在 CDI 环境中可通过属性轻松完成 trust store 配置。


  *   `io.helidon.book.ch05.WizardRestClient/mp-rest/trustStore`设置 trust store 位置。可以指向
  classpath 资源或文件。


  *   `io.helidon.book.ch05.WizardRestClient/mp-rest/trustStorePassword`指定 keystore
  密码。


  *   `io.helidon.book.ch05.WizardRestClient/mp-rest/trustStoreType`是 trust store
  类型。默认值是`"JKS"`。


  对于 key store 也是同样的方式。


  *   `io.helidon.book.ch05.WizardRestClient/mp-rest/keyStore`是 key store 位置。它可以指向
  classpath 资源或文件。


  *   `io.helidon.book.ch05.WizardRestClient/mp-rest/keyStorePassword`指定 keystore
  密码。


  *   `io.helidon.book.ch05.WizardRestClient/mp-rest/keyStoreType`是 key store 类型。默认值是`"JKS"`。


  ### 异常处理


  在理想世界中，所有服务器都始终在线运行，线路始终畅通且零延迟；但现实中服务器宕机或断连很常见。数据也可能出现阻塞，或序列化/反序列化不正确。你必须为此做好准备，我们的
  Helidon 应用应当优雅地处理这些情况。MicroProfile Rest Client 为此提供了解决方案：`ResponseExceptionMapper`。该映射器接收通过客户端调用获得的`Response`对象，检查其状态，并根据我们的需求将其转换为异常。


  让我们为向导客户端创建一个简单的异常映射器。首先，创建一个实现`ResponseExceptionMapper<T>`的类，并将对应异常作为模板参数。然后重写`public
  T toThrowable(Response response) {}`函数，在其中可以针对不同响应定义不同的行为。在本例中，根据`Response`状态码返回带有不同描述的`RuntimeException`。


  *   ① 该类实现了`ResponseExceptionMapper<RuntimeException>`。


  *   ② 如果 Response 状态为`404`，则返回带有“Resource not found”消息的`RuntimeException`。


  *   ③ 如果 Response 状态为`500`，则返回带有“Server bad response”消息的`RuntimeException`。


  *   ④ 否则，返回带有“Something went terribly wrong”消息的`RuntimeException`。


  ```

  public class WizardExceptionMapper

  implements ResponseExceptionMapper {                                               ①

  @Override

  public RuntimeException toThrowable(Response response) {

  if (response.getStatus() ==

  Response.Status.NOT_FOUND.getStatusCode()) {                                   ②

  return new RuntimeException("Resource not found");

  } else if (response.getStatus() ==

  Response.Status.INTERNAL_SERVER_ERROR.getStatusCode()) {                  ③

  return new RuntimeException("Server bad response");

  } else {

  return new RuntimeException("Something went terribly wrong: " + response);              ④

  }

  }

  }

  Listing 5-8

  Exception Mapping

  ```


  既然这个异常映射器已经准备好了，你需要做的就是把它注册到 REST 客户端接口上。可以使用`@RegisterProvider`注解进行注册，如清单 5-9 所示。


  *   ① 为`WizardRestClient`注册`WizardExceptionMapper`。


  ```

  @RegisterRestClient(baseUri="http://localhost:8080/wizard")

  @RegisterProvider(WizardExceptionMapper.class)              ①

  interface WizardRestClient {

  ...

  }

  Listing 5-9

  Register Exception Mapper

  ```


  服务执行过程中可能发生的每个异常都将被优雅地处理。




  ### 修改请求与响应


  你可能已经注意到，`@RegisterProvider` 被用来注册异常映射器。它同样也用于注册不同的过滤器和修改器。


  你可以在请求和响应周围使用过滤器。


  *   当从远程服务接收到响应时，会按顺序调用 **ClientResponseFilter**。


  *   当向远程服务发出请求时，会按顺序调用 **ClientRequestFilter**。


  例如，如果你想记录发出了什么请求，你应该创建一个实现 `ClientRequestFilter` 的类。通过重写 `filter(ClientRequestContext
  requestContext)` 函数，你可以使用当前请求的任何信息，例如请求头、URL 等。你可以从作为参数传入的 `ClientRequestContext`
  对象中获取这些信息。


  *   ① 实现 `ClientRequestFilter`。


  *   ② 重写 `filter(...)`，并从 `ClientRequestContext` 获取信息。


  ```

  public class WizardRequestFilter implements ClientRequestFilter {                  ①

  private static final Logger log =

  Logger.getLogger(String.valueOf(WizardRequestFilter.class));

  @Override

  public void filter(ClientRequestContext requestContext) {              ②

  log.info("Request intercepted: " + requestContext.getHeaders());

  }

  }

  Listing 5-10

  Request Filter

  ```


  对响应过滤器也可以做同样的事情。你应该创建一个实现 `ClientResponceFilter` 的类。在这种情况下，记录响应状态。


  *   ① 实现 `ClientResponseFilter`。


  *   ② 重写 `filter(`⋯`)`，并从 `ClientResponseContext` 获取信息。


  ```

  public class WizardResponseFilter implements ClientResponseFilter {        ①

  private static final Logger log =

  Logger.getLogger(String.valueOf(WizardResponseFilter.class));

  @Override

  public void filter(ClientRequestContext requestContext,

  ClientResponseContext responseContext) { ②

  log.info("Intercepted response status"

  + responseContext.getHeaders());

  }

  }

  Listing 5-11

  Response Filter

  ```


  最后，你必须将这些过滤器注册到 `WizardRestClient` 中，和异常映射器一样简单，使用 `@RegisterProvider` 注解，如清单 5-12
  所示。


  *   ① 注册 `WizardRequestFilter`。


  *   ② 注册 `WizardResponseFilter`。


  ```

  @RegisterRestClient(baseUri="http://localhost:8080/wizard")

  @RegisterProvider(WizardExceptionMapper.class)

  @RegisterProvider(WizardRequestFilter.class)               ①

  @RegisterProvider(WizardResponseFilter.class)              ②

  interface WizardRestClient {

  ...

  }

  Listing 5-12

  Register Filters

  ```


  现在，如果你运行 sorcery ministry 应用并调用 `/wizardClient` 端点，你会在日志输出中看到清单 5-13。


  ```

  {Accept=[application/json], Magic-Header=[Custom header magic value]}

  {content-length=[13], connection=[keep-alive], Date=[Wed, 28 Jan 2023 16:14:24 +0300],
  Content-Type=[application/json]}

  Listing 5-13

  Sample Output

  ```


  这些过滤器正在按预期工作，并返回了请求头信息。


  其他拦截器和修改器也可以用同样的方式应用。


  *   **MessageBodyReader** 用于在调用之后，需要从 API 响应中读取实体时。


  *   **MessageBodyWriter** 用于在 `@POST` 和 `@PUT` 操作以及其他支持请求体的 HTTP 方法中，将请求体写入请求。


  *   **ParamConverter** 用于将资源方法中的参数转换为请求或响应所需的格式。


  *   **ReaderInterceptor** 是一个监听器，当对远程服务调用收到的响应进行读取时触发。


  *   **WriterInterceptor** 是一个监听器，当在远程服务调用时向待发送流进行写入时触发。


  可以控制 Provider 的调用优先级。当你想设置显式优先级值时，可以使用 `@Priority`，例如 `@Priority(1000)`。这意味着被注解的
  Provider 会在较后阶段之一被使用。无论是以编程方式还是通过注解方式，都可以使用构建器模式来注册 Provider。包含 `@RegisterProvider`
  注解的 Provider 从属于使用构建器注册的 Provider。类上的 `@Priority` 注解从属于 `@RegisterProvider` 注解。


  Provider 的优先级可以通过各种 `Configurable` 方法被覆盖，这些方法可以接收 `Provider` 类、`Provider` 实例、优先级以及这些优先级的映射。




  ### 处理请求头


  HTTP 头用于在发送 HTTP 请求或响应时，在客户端与服务器之间传输补充信息。一个头由一个不区分大小写的名称、一个冒号 (:) 以及对应的值组成。头对于实现各种安全、认证、追踪及其他机制至关重要。


  要为服务调用指定请求头，可以在方法参数上使用 `@HeaderParam` 注解。


  *   ① 注入 *Custom-Header* 请求头。


  *   ② 注入一个聚合 Bean，其中字段使用 *…​Param* 注解标注。


  *   ③ 从 Cookie 中注入 `AuthToken`。


  *   ④ 这是一个类，包含 `@HeaderParam` 和 `@PathParam` 标注的字段，并在 <2> 中使用。


  ```

  @Path("/wizard")

  public interface WizardRestClient {

  //.. other methods omitted

  @POST

  Response createWizard(@HeaderParam("Custom-Header")

  String customHeader,    ①

  Wizard wizard);

  @PUT

  @Path("/{name}")

  Response updateWizard(@BeanParam PutWizard putWizard,

  Wizard wizard);②

  @DELETE

  @Path("/{name}")

  Response deleteWizard(@CookieParam("AuthToken")

  String token, ③

  @PathParam("name") String name);

  }

  public class PutWizard {                                 ④

  @HeaderParam("Custom-Header")

  private String custom;

  @PathParam("name")

  private String name;

  // ...

  }

  Listing 5-14

  Header Parameters

  ```


  但是，如果你需要在不修改客户端接口方法签名的情况下指定 HTTP 头，应使用 `@ClientHeaderParam` 注解。它有三个参数。


  *   **name** 是请求头名称。


  *   **value** 是请求头的值，必须是 `String` 或 `string[]`，或者是一个用于计算该值的方法引用。


  *   **required** 是一个布尔值，用于决定当计算方法抛出异常时，请求是否应失败。


  *   ① 为客户端方法设置一个自定义请求头。


  ```

  @Path("/wizard")

  public interface WizardRestClient {

  //.. other methods omitted

  @POST

  @ClientHeaderParam(name="Magic-Header",

  value="Custom header magic value", required=false)     ①

  Response postWizardCustomHeader(Wizard wizard) {...}

  }

  Listing 5-15

  Client Header Parameters

  ```


  要批量添加或分发请求头，可以使用 `ClientHeadersFactory`。该工厂仅包含一个方法，接收两个只读的 `MultivaluedMap` 参数。如果客户端运行在
  JAX-RS 环境中，第一个 map 表示来自传入 JAX-RS 请求的请求头，第二个 map 包含通过 `@ClientHeaderParam`、`@HeaderParam`、`@BeanParam`
  等方式指定并将被发送的请求头。返回结果是一个 `MultivaluedMap`，表示在出站处理流程中要传输的“最终”请求头集合。


  注意


  最终的请求头 map 在 HTTP 请求发送之前仍可能被提供者（如过滤器、拦截器和消息体写入器）修改。


  要添加自定义请求头，你应实现 `ClientHeadersFactory` 并重写 `update` 方法。在这里你可以拿到所有传入和传出的请求头。最终，你应返回一个包含所需请求头的
  map。


  *   ① 实现 `ClientHeadersFactory`。


  *   ② 重写 `update` 方法，返回包含目标请求头的 `MultivaluedHashMap`。


  ```

  public class WizardHeaderHandler implements ClientHeadersFactory {                                     ①

  @Override

  public MultivaluedMap

  update(MultivaluedMap incomingHeaders,

  MultivaluedMap clientOutgoingHeaders) {

  return new MultivaluedHashMap() {{

  put("Magic-Header",

  List.of("Custom header magic value"));   ②

  }};

  }

  }

  Listing 5-16

  Client Headers Factory

  ```


  与 `Provider` 遵循相同范式，`WizardHeaderHandler` 必须在 REST 客户端接口中注册。这可以通过 `@RegisterClientHeaders`
  注解实现。


  *   ① 注册 `WizardHeaderHandler`


  ```

  ...

  @RegisterClientHeaders(WizardHeaderHandler.class)  ①

  interface WizardRestClient {

  ...

  }

  Listing 5-17

  Register Header Handler

  ```


  现在，请求头中就有一个“magic header”了。


  ### 异步操作


  MicroProfile Rest Client 是一个非常强大的工具。如果你必须消费高负载或长时间运行的请求，可以将它们改为异步，这样这些调用就不会阻塞你的服务。实现起来非常简单：方法应返回
  `CompletionStage<>`。在我们的 wizard 客户端中，按清单 5-18 所示替换返回类型。


  *   ① `getMostMightyWizard` 方法的异步版本


  *   ② `getWizardByName` 方法的异步版本


  ```

  interface WizardAsyncRestClient {

  @GET

  CompletionStage getMostMightyWizard();      ①

  @Path("/{name}")

  @GET

  CompletionStage

  getWizardByName(@PathParam("name") String name); ②

  }

  Listing 5-18

  Asynchronous Operations

  ```


  现在，你可以使用标准 Java 语言特性来异步处理客户端请求。


  如果你需要拦截和操作异步调用，请参考 MicroProfile Rest Client [文档](https://download.eclipse.org/microprofile/microprofile-rest-client-3.0/microprofile-rest-client-spec-3.0.html%2523_asyncinvocationinterceptors)。


  ### 编程式 API


  MicroProfile Rest Client 也可以通过编程式 API 创建，即使用 `RestClientBuilder.newBuilder()` 获取构建器。这是在受管
  CDI 环境之外使用 MicroProfile RestClients 的方式。`RestClientBuilder` 提供了用于配置客户端细节并定义目标 REST
  客户端接口的方法。


  *   ① 使用构建器模式创建客户端。


  *   ② 设置 `baseUrl`。


  *   ③ 将 `followRedirects` 设置为 `true`。


  *   ④ 配置代理。


  ```

  WizardRestClient client =

  RestClientBuilder.newBuilder()                      ①

  .baseUri(URI.create("http://localhost:8080/wizard"))    ②

  .followRedirects(true)                         ③

  .proxyAddress("http://someobscureproxy.com:9000")  ④

  .build(WizardRestClient.class);

  Wizard wizard = client.getMostMightyWizard();

  Listing 5-19

  Programmatic Operations

  ```


  你可以以编程方式设置所有属性。对于 SSL 配置，有对应的 `trustStore` 和 `keyStore` 对象。


  注意


  使用构建器创建的 MicroProfile Rest Client 实例不可注入，因为这种用法是为在 CDI 容器之外运行而设计的。因此，如果你以这种方式创建客户端实例，它对
  CDI 容器不可见。


  ### MicroProfile Rest Client 总结


  如前所述，MicroProfile Rest Client 是一个非常强大的工具。本章涵盖了它的主要使用场景。但它还能做得更多，比如服务端事件处理、与 MicroProfile
  Config 和容错机制的集成，以及其他很酷的特性。


  所有细节请参考官方[文档](https://github.com/eclipse/microprofile-rest-client/releases/tag/3.0)。




  ## JAX-RS 客户端 API


  在 Helidon 中调用其他 RESTful 服务的另一种方式是使用 JAX-RS 客户端 API。JAX-RS 是一个较早但仍被广泛使用的名称，对应的 Jakarta
  EE 规范是 [Jakarta RESTful Web Services Specification](https://jakarta.ee/specifications/restful-ws/)。它还具备非常出色的内置客户端能力。


  JAX-RS 客户端 API 旨在支持流式编程模型，在 Helidon 中由 Jersey 实现。该编程模型与 MicroProfile Rest Client
  所采用的模型不同。JAX-RS 客户端 API 大量使用构建器模式来简化配置与执行。此外，与 MicroProfile Rest Client 不同，JAX-RS
  客户端缺少注解 API。


  如果你使用完整的 `helidon-microprofile` bundle*,* 所有依赖都可开箱即用。如果你选择使用 `helidon-microprofile-core`，为确保
  JSON 到对象映射正确，你应当在项目的 `pom.xml` 文件中加入 JSON-B 支持，如清单 5-20 所示。


  *   ① MicroProfile Core 依赖


  *   ② Jersey 中的 JSON-B 支持


  *   ③ Jersey 绑定支持依赖


  ```

  io.helidon.microprofile.bundles

  helidon-microprofile-core ①


  jakarta.json.bind

  jakarta.json.bind-api     ②


  org.glassfish.jersey.media

  jersey-media-json-binding ③


  Listing 5-20

  MicroProfile Dependencies

  ```


  注意


  JAX-RS 客户端 API 是一个非常强大且通用的工具。它可用于许多提供 XML、纯文本和二进制流的服务。本书仅聚焦于提供 JSON 数据的 RESTful
  服务，这些数据会自动编组/反编组为 Java 对象。


  要创建并使用 JAX-RS 客户端 API，应执行以下步骤：调用 `ClientBuilder.newClient()` 静态方法创建一个新的 `Client`。然后在获取到的客户端实例上使用
  `target()` 方法，返回一个 `WebTarget`。接着，在第二步得到的 `WebTarget` 实例上通过 `target.request()` 方法获取
  `Invocation.Builder`。最后，执行 `invocationBuilder.get()`、`put()`、`post()` 或 `delete()`
  方法来发起对应的 REST 调用。


  让我们按照前面的四个步骤来创建并使用客户端。首先，创建一个指向 `http://localhost:8080` 的 `WebTarget`。如前所述，使用 `ClientBuilder.newClient()`
  完成。接下来，使用创建好的 `client` 将路径设置为 `/wizard` 端点，将 `MediaType` 设置为 `APPLICATION_JSON`（因为我们处理的是
  JSON 数据），并调用带有 `Wizard.class` 参数的 `get` 方法。这样，JAX-RS 客户端 API 会对指定的基础 URI 和端点执行一次
  `GET` 调用，并自动将结果映射到 `Wizard` 类。


  *   ① 使用 `ClientBuilder` 创建 `Client` 并设置目标，从而创建 `WebTarget`。这是资源开销较大的操作。（这就是为什么我们只做一次并将其缓存在类字段中。）


  *   ② 将路径设置为 `/wizard`。


  *   ③ 使用 `MediaType.APPLICATION_JSON` 构建调用。


  *   ④ 将 JSON 结果映射到 `Wizard` 类。


  ```

  @ApplicationScoped

  @Path("/wizardClient")

  public class SorceryMinistryResource {

  private final WebTarget target =

  ClientBuilder.newClient()

  .target("http://localhost:8080"); ①

  @GET

  @Path("/jaxrs")

  @Produces(MediaType.APPLICATION_JSON)

  public Wizard getWizardFromJaxrsClient() {

  return target

  .path("/wizard")                       ②

  .request(MediaType.APPLICATION_JSON)   ③

  .get(Wizard.class);                    ④

  }

  }

  Listing 5-21

  Resource with Endpoints

  ```


  就是这么简单。只需使用静态构建器创建一个客户端。之后，你就可以在 `Invocation.Builder` 上使用 `get()`、`put()`、`post()`
  或 `delete()` 方法调用服务。这段代码实现了与 MicroProfile Rest Client 相同的结果。请记住，上述请求是阻塞式的。这意味着在客户端调用期间，线程会被阻塞，无法做其他有用的工作。本章稍后将讨论异步与响应式执行。


  另外，请记住，`WebTarget` 实例在 URI 方面是不可变的。然而，`they` 在配置方面是可变的。因此，配置一个 `WebTarget` 实例不会创建新实例。创建
  `WebTarget` 实例被认为是一个高开销操作。


  `Invocation` 是一个已经准备好、可执行的请求。你不需要知道该调用是如何准备的，只需要知道应如何执行它——*同步*或*异步*。


  `Client`、`ClientBuilder` 和 `WebTarget` 都是可配置的，因为它们都实现了 `Configurable` 接口，该接口支持以下配置。


  *   **属性（Properties）** 是用于附加配置的名称-值对。


  *   **特性（Features）** 是实现了 `Feature` 接口的特殊 provider 类型，可用于配置 JAX-RS 实现。本书不涵盖特性相关内容。


  *   **提供者（Providers）** 是实现了一个或多个*实体提供者*、*上下文提供者*和*异常映射提供者*接口的类或类实例。提供者可以是消息过滤器、上下文解析器、异常映射器等。本章稍后将演示
  *provider* 的用法。


  让我们通过向端点提交一个新的 wizard 实例来做一个更复杂的演示。为此，我们使用在 MicroProfile Rest Client 中创建的 wizard
  服务。它有一个 */*`wizard/add` POST 端点，接收 JSON 数据。


  为了将新的 wizard 发送到 POST 端点，我们使用 `post()` 请求执行方法。该方法期望接收 `Entity` 类实例才能正常工作。`Entity`
  对象保存了通过网络发送 wizard 实体所需的元数据。负载可以是任何类型：XML 数据、文本数据或自定义二进制流。在本例中，创建一个 `Entity` 实例，将
  wizard 实例标记为按 JSON 文档处理。可以通过 `Entity.json(wizard)` 方法完成。


  *   ① 创建一个示例 wizard。


  *   ② 使用 `Entity.json()` 方法将新 wizard 编组为 JSON，并在 *post* 请求中发送数据。


  *   ③ 以同步方式查询服务中的新 wizard 并返回它。


  ```

  // other methods omitted

  @GET

  @Path("/jaxrs/add")

  @Produces(MediaType.APPLICATION_JSON)

  public Wizard addWizardAndCheck() {

  Wizard wizard = new Wizard();

  wizard.setName("NewWizard");                         ①

  client.path("/wizard/add")

  .request(MediaType.APPLICATION_JSON)

  .post(Entity.json(wizard);

  return client                                        ③

  .path("/wizard/NewWizard")

  .request(MediaType.APPLICATION_JSON)

  .get(Wizard.class);

  }

  Listing 5-22

  JAX-RS Client Usage

  ```


  当你调用此方法时，它会返回新的 `wizard` 对象，该对象已保存在 wizard 服务中。


  *   ① 创建一个新的 `Wizard` 对象并将其查询返回。


  ```

  curl -X GET http://localhost:8081/wizardClient/jaxrs/add

  {"name":"NewWizard"}                                     ①

  Listing 5-23

  Call the Client

  ```




  ### 提供者（Providers）


  JAX-RS 及其客户端中的提供者负责各种横切关注点，例如过滤请求、将表示形式转换为 Java 对象，以及将异常映射为响应。提供者可以预打包在 JAX-RS 运行时中，也可以由应用程序提供。


  让我们实现与“MicroProfile Rest Client”一节中相同的日志过滤器。为此，JAX-RS Client API 提供了一个概念上非常接近的方式。


  *   创建一个实现 `ClientRequestFilter` 和/或 `ClientResponseFilter` 的类


  *   使用 `.register(...`​`)` 方法，在 `Client` 或 `WebTarget` 中注册该/这些类


  如果你在 `Client` 中注册过滤器，它会被所有 `WebTarget` 实例继承。在当前实例中注册则意味着不会影响其他 `WebTarget` 实例。


  为简化日志过滤器的创建，我们来创建一个同时实现这两个接口的单个类。为 `ClientRequestFilter` 重写 `filter(ClientRequestContext
  requestContext)`，为 `ClientResponseFilter` 重写 `filter(ClientRequestContext requestContext,
  ClientResponseContext responseContext)`。该类应如清单 5-24 所示。


  *   ① 实现 `ClientRequestFilter` 和 `ClientResponseFilter` 的类。


  *   ② 重写 `filter(ClientRequestContext requestContext)` 以记录请求头。


  *   ③ 重写 `filter(ClientRequestContext requestContext, ClientResponseContext responseContext)`
  以记录响应头。


  ```

  public class LoggerFilter implements

  ClientRequestFilter, ClientResponseFilter {    ①

  private final Logger logger =

  Logger.getLogger(LoggerFilter.class.getName());

  @Override

  public void filter(ClientRequestContext requestContext) { ②

  logger.info(requestContext.getHeaders().toString());

  }

  @Override

  public void filter(ClientRequestContext requestContext,

  ClientResponseContext responseContext) { ③

  logger.info(responseContext.getHeaders().toString());

  }

  }

  Listing 5-24

  Request and Response Filters

  ```


  只需在 `Client` 中注册这个类，因为我们希望由该 `Client` 创建的所有 `WebTarget` 都注册日志过滤器。


  *   ① 在 `WebTarget` 中注册 `LoggerFilter`。


  ```

  WebTarget target = ClientBuilder.newClient()

  .register(new LoggerFilter())        ①

  .target("http://localhost:8080");

  Listing 5-25

  Register Filter

  ```


  现在，所有请求和响应中的头信息都会被记录。


  让我们运行 sorcery ministry 应用，并在日志输出中调用 `/wizardClient/jaxrs` 端点，如清单 5-26 所示。


  ```

  {Accept=[application/json]}

  {content-length=[13], connection=[keep-alive], Date=[Wed, 28 Sep 2022 16:26:55 +0300],

  Content-Type=[application/json]}

  Listing 5-26

  Sample Output

  ```


  非常好，正如预期！


  还有许多其他用于媒体类型实体处理、上下文操作和异常处理的提供者。更多细节请参考官方[文档](https://jakarta.ee/specifications/restful-ws/3.0/jakarta-restful-ws-spec-3.0.html%2523providers)。


  ### 异步操作（Asynchronous Operations）


  JAX-RS 提供了一种调用其他服务的*异步*方式。只需调用 `.async()` 方法即可实现。因此，该函数会立即返回一个 `Future` 实例，一旦收到响应，它就会包含响应结果。


  *   ① 调用异步客户端请求。


  ```

  public Future getAsyncWizardFromJaxrsClient() {

  return target

  .path("/wizard")

  .request(MediaType.APPLICATION_JSON)

  .async()                                  ①

  .get(Wizard.class);

  }

  Listing 5-27

  Asynchronous Operations

  ```


  不仅如此，请求还可以以*响应式*方式处理。这同样可以非常轻松地通过调用客户端的 `.rx()` 方法实现。该函数返回 `CompletableStage` 作为结果。


  *   ① 调用一个*响应式*客户端请求


  ```

  public CompletableStage

  getAsyncWizardFromJaxrsClient() {

  return client

  .path("/wizard")

  .request(MediaType.APPLICATION_JSON)

  .rx()                                     ①

  .get(Wizard.class);

  }

  Listing 5-28

  Reactive Operations

  ```


  请求执行会立即返回 `CompletionStage`，其中在响应处理完成后包含一个 `Wizard` 实例。之后可以使用标准 Java 语言特性，以*响应式*方式继续处理它。


  这些方法适用于高负载或长时间运行的调用，以避免阻塞服务线程。


  ### JAX-RS Client API 结论


  本章仅触及了 JAX-RS Client API 所提供能力的表面。仅其用法本身就值得写成一本厚书，因为它是一个非常强大的工具。


  更多信息请参考官方[文档](https://jakarta.ee/specifications/restful-ws/3.0/jakarta-restful-ws-spec-3.0.html)。




  ## CORS


  出于安全原因，浏览器只允许从与页面加载来源相同的源加载资源。以前，浏览器允许从任何位置加载资源，这也是大量数据被窃取的原因之一。


  不过，有时你需要允许来自源之外特定位置的请求。CORS 正是为此而生。


  *跨源资源共享*（CORS）协议允许服务器识别除自身源之外的来源，并决定浏览器是否应允许从这些来源加载资源。它基于 HTTP 头工作。


  Helidon 可以使用 Helidon CORS API 以编程方式定义你服务的 CORS 行为。你也可以通过外部配置来完成。三个内置端点——health、metrics（见第
  4 章）和 OpenAPI（见第 9 章）——都已集成 CORS。多个注解和配置选项可让你轻松控制资源如何跨源暴露。有关其全部功能的更多信息，请参阅[Helidon
  官方文档](https://helidon.io/docs/v3/%2523/mp/cors/cors)。


  将清单 5-29 中的依赖添加到 Helidon MP 项目的`pom.xml`文件中以启用 CORS。


  ```

  io.helidon.microprofile

  helidon-microprofile-cors


  Listing 5-29

  CORS Dependency

  ```


  在这个示例中，让我们以巫师服务为例。


  位于*sorceryministry.com*的“魔法部”托管了一个管理巫师的应用。一个巫师服务——所有巫师的存储库——运行在*helidonserver.com/wizard*。


  ![](img/600147_1_En_5_Fig2_HTML.png)


  浏览器与 helidonserver.com 之间的流程图。Sorcery Ministry、C O R S、Helidon server dot com 的
  C O R S，以及 Helidon 应用。


  图 5-2


  巫师服务与魔法部应用的调用层级


  1.  浏览器从*sorceryministry.com*加载魔法部应用，这就是 CORS 的源。


  2.  该应用请求`GET`[*http://helidonserver.com/wizard*](http://helidonserver.com/wizard)。*helidonserver.com*是主机。浏览器的
  CORS 实现会在请求中添加 Host 和 Origin 头。


  3.  Helidon CORS 会检查 Helidon 应用是否允许*sorceryministry.com*通过`GET`共享*/wizard*。如果允许，则放行请求到达目标；否则，以“403
  – Forbidden”状态拒绝请求。


  4.  Helidon CORS 会使用*Access-Control-Allow-Origin**: **更新响应（取决于你如何为 Helidon 应用配置
  CORS）。


  现在，让我们把 CORS 添加到巫师应用。目标是允许返回巫师列表的资源可被不受限制地共享，并限制获取某个巫师的资源共享，使得只有源[*http://sorceryministry.com*](http://sorceryministry.com)可以获取该信息。


  *   ① 声明 CORS 属性。


  ```

  @GET

  @Produces(MediaType.APPLICATION_JSON)

  @CrossOrigin(allowMethods = {"GET"},

  allowOrigins = {"http://sorceryministry.com"})   ①

  public JsonObject getWizard() { }

  Listing 5-30

  CORS Annotations Usage

  ```


  使用`@CrossOrigin`注解，并指定`allowMethods`和`allowOrigins`参数。


  你也可以使用外部配置实现相同效果。将清单 5-31 添加到`microprofile-config.properties`文件中。


  ```

  cors.paths.0.path-pattern=/wizard

  cors.paths.0.allow-methods=GET

  cors.paths.0.allow-origins=http://sorceryministry.com

  Listing 5-31

  CORS Configuration

  ```


  该配置为`/wizard`资源启用了所需的 CORS 设置。


  Helidon 还让我们可以轻松地在 Helidon 应用中包含 health、metrics（见第 4 章）和 OpenAPI（见第 9 章）服务。这些服务会为应用添加端点，以便客户端检索各类遥测与文档信息。与您创建的应用端点一样，这些端点也是可跨源共享的资源。


  默认情况下，这三个服务中的集成 CORS 支持允许任何源通过 GET、HEAD 和 OPTIONS HTTP 请求共享其资源。你可以通过配置覆盖这些端点的默认
  CORS 行为。它们与已创建的服务相互独立。例如，将内置组件提供的`/health`端点和`/metrics`端点限制为仅允许源[*http://sorceryministry.com*](http://sorceryministry.com)。


  *   ① 允许`/health`仅可被唯一来源[`http://sorceryministry.com`](http://sorceryministry.com)访问


  *   ② 允许`/metrics`仅可被唯一来源[`http://sorceryministry.com`](http://sorceryministry.com)访问


  ```

  ...

  health:

  cors:

  allow-origins: [http://sorceryministry.com]  ①

  metrics:

  cors:

  allow-origins: [http://sorceryministry.com]   ②

  ...

  Listing 5-32

  Health and Metrics Configuration

  ```


