  ### WebLogic 目的地 CDI 语法


  当通过 Helidon JMS 或 WebLogic 消息连接器连接到 WebLogic 集群时，可使用 `destination` 配置属性提供的 WebLogic
  CDI 语法来配置目的地。


  WebLogic CDI（Create Destination Identifier，不要与上下文依赖注入混淆）是 WebLogic 厂商特定语法，用于通过 JMS
  API 方法 `Session.createTopic(String name)` 和 `Session.createQueue(String name)`，结合实际
  MBean 名称（通常是 WLS 控制台中的 name 属性）来定位队列和主题。


  #### 非分布式目的地


  访问非分布式队列/主题时，需要指定 JMS 服务器名、JMS 模块名以及队列或主题名：`jms-server-name/jms-module-name!destination-name`。语法如下：服务器名
  + 斜杠 + 模块名 + 感叹号 + 目的地名，其中目的地名即 WebLogic Server 中的 MBean 名称。


  如果你确定要访问的队列或主题与正在使用的 JMS Connection Factory 位于同一服务器上，则可以使用当前服务器别名 `./` 来代替完整服务器名。


  ```

  ./jms-module-name!destination-name

  Listing 13-68

  Non-Distributed Queue CDI Identifier

  ```


  #### 统一分布式目的地（UDD）


  分布式队列/主题是逻辑目的地，充当物理队列/主题之间的负载均衡器，通常位于不同的 JMS 服务器/集群节点（UDD 成员）上。访问 UDD 时，可在同一集群的任意服务器上使用
  `jms-module-name!udd-name` 语法。


  警告


  UDD 目的地*不得*包含 `./` 或 `/`，否则可能导致间歇性问题。


  若要直接访问某个 UDD 成员队列或主题，需要使用非分布式目的地语法：`jms-server-name/jms-module-name!member-name`。


