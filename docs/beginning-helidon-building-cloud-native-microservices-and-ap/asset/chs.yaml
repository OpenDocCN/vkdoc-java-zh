  ### Maven 项目


  Maven `pom.xml` 会在生成 Quickstart 应用时自动创建。它简洁明了。它可以被所有支持 Maven 项目的 IDE 打开。作为 IntelliJ
  Idea 的重度用户（本书就是在 IntelliJ 中编写的！），我们可以确认它能无问题打开。


  构建 MicroProfile 应用只需要一个依赖项。


  ```

  io.helidon.microprofile.bundles

  helidon-microprofile


  ```


  这是一个包含 MicroProfile 平台所需全部依赖的 bundle。在应用开发阶段使用它是合理的。


  如果你不会使用全部 MicroProfile 功能，可以精简依赖，从而减小应用体积。在这种情况下，你可以使用 helidon-microprofile-core
  bundle，它只包含最小依赖集合，其它依赖由你手动添加。


  ```

  io.helidon.microprofile.bundles

  helidon-microprofile-core


  ```


  ### CDI


  Jakarta 上下文与依赖注入（CDI）是所有 MicroProfile 应用的关键部分。它将所有组件连接在一起，并在用户应用中启用注入。Helidon MP
  是一个大型 CDI 容器，会在你的应用启动时自动启动。


  Jakarta 上下文与依赖注入（CDI）


  CDI 是一个依赖注入（DI）规范。它是 Jakarta EE 的一部分，早期属于 Java EE。CDI 高度依赖注解。它允许用户定义 Bean、通过上下文管理其生命周期，并使用构造器注入、字段注入或
  setter 注入将其注入到其他受管 Bean 中。除此之外，CDI 还提供了其他有价值的功能，比如拦截器、装饰器和事件通知。它具有高度可定制性，并且易于集成。CDI
  提供了与 Spring Dependency Injection（Spring DI）类似的功能。市场上有多个 CDI 实现。Helidon MP 使用的是 Weld（[`https://weld.cdi-spec.org`](https://weld.cdi-spec.org)）。


  学习 CDI 的最佳方式是阅读规范本身。你可以在这里找到它：[`https://jakarta.ee/specifications/cdi/3.0/jakarta-cdi-spec-3.0.html`](https://jakarta.ee/specifications/cdi/3.0/jakarta-cdi-spec-3.0.html)。


  注入仅对 CDI 管理的 Bean 生效。如果你的类不由 CDI 管理，你将无法注入它。


  让你的类成为 CDI 管理 Bean 的最简单方式，是通过 `@RequestScoped`、`@ApplicationScoped` 或 `@Dependent`
  为它声明作用域。


  `@RequestScoped` Bean 的生命周期与 HTTP 请求生命周期绑定。它在每个请求内是单例。每个 HTTP 请求都会创建一个新对象，并在该请求生命周期内与其他对象共享。


  `@ApplicationScoped` Bean 是单例。它们只创建一次，并在你的应用中与其他对象共享。


  `@Dependent` Bean 的生命周期与注入它的 Bean 绑定。这类 Bean 不是单例。每个注入点都会创建一个新实例，且从不共享。


  清单 2-2 展示了在我们的 Quickstart 应用中如何使用注入。


  *   ① 它使这个类成为单例。它只会被创建一次，并且该实例会被注入到其他对象中。


  *   ② 这是一个*构造器注入*示例。一个配置属性被注入到构造器中。配置将在第 3 章讨论。


  ```

  @ApplicationScoped                  ①

  public class GreetingProvider {

  ...

  @Inject                         ②

  public GreetingProvider(

  @ConfigProperty(name = "app.greeting") String message) {

  ...

  }

  ...

  }

  Listing 2-2

  CDI Usage in GreetingProvider.java

  ```


  *   ① 这个类会在每个 HTTP 请求上实例化（不同请求 == 不同实例）。


  *   ② 这是另一个*构造器注入*示例。`GreetingProvider` 的实例作为构造器参数被注入。记住 `GreetingProvider` 是应用作用域，因此在创建新的
  `GreetResource` 实例时，注入的是同一个实例。


  ```

  @RequestScoped                    ①

  public class GreetResource {

  ...

  @Inject                        ②

  public GreetResource(GreetingProvider greetingConfig) {

  ...

  }

  ...

  }

