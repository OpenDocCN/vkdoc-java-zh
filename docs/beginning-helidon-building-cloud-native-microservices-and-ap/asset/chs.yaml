  如果你需要在应用启动时运行某些代码，可以在某个受管 Bean 中创建一个观察者，监听应用作用域的初始化。应用作用域初始化的时机正是你的应用启动之时。


  ```

  void onAppStart(@Observes @Initialized(ApplicationScoped.class) Object ignoredEvent)
  {

