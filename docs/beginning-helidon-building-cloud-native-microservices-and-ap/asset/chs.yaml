  当你已经了解如何通过连接器将其配置为入站通道的发布者或出站通道的订阅者后，剩下的就只是配置连接器特定属性的问题了。


  ## Kafka 连接器（Kafka Connector）


  Kafka 是由 Apache 软件基金会开发的一种流行的分布式消息系统。Kafka 具备高可扩展性、容错性和持久性，能够处理高吞吐数据，并针对低延迟消息投递进行了优化。在
  Kafka 消息模型中，消息被组织在主题（topic）中，这些主题会分区并分布在称为 broker 的服务器集群上。每个分区都可以在多个 broker 之间复制，以实现冗余和容错。Kafka
  被广泛用于大数据和流式数据应用，以实时处理和分析海量数据。


  为了从 Kafka broker 消费消息以及向其发布消息，Helidon 提供了一个响应式消息连接器。


  ```

  io.helidon.messaging.kafka

  helidon-messaging-kafka


  Listing 13-54

  Kafka Connector Dependency

  ```


  Kafka 通过同一个 Kafka topic 同时支持点对点（queue）和发布-订阅（topic）两种范式。Kafka topic 本质上是一个分区队列，消费者组会共享已读取消息的偏移量（offset）。每个消费者都可以选择作为已有组的一部分进行订阅（行为类似队列），或使用仅包含单个消费者的新组进行订阅（行为类似主题）。


  *   ① Zookeeper 或 Kafka broker 地址


  *   ② 消息序列化器


  *   ③ 消息反序列化器


  *   ④ Topic 名称


  *   ⑤ 当以当前组 ID 首次启动时，只读取新消息


  *   ⑥ 关闭自动提交，offset 由确认机制提交


  *   ⑦ 该组下 topic 的行为类似队列，索引（offset）共享


  ```

  serializer.pkg: org.apache.kafka.common.serialization

  mp.messaging:

  connector:

  helidon-kafka:

  bootstrap.servers: localhost:9092  ①

  key.serializer: ${serializer.pkg}.StringSerializer  ②

  value.serializer: ${serializer.pkg}.StringSerializer

  key.deserializer: ${serializer.pkg}.StringDeserializer  ③

  value.deserializer: ${serializer.pkg}.StringDeserializer

  incoming.from-kafka:

  connector: helidon-kafka

  topic: messaging-test-topic-1  ④

  auto.offset.reset: latest  ⑤

  enable.auto.commit: false   ⑥

  group.id: example-group-1  ⑦

  outgoing.to-kafka:

  connector: helidon-kafka

  topic: messaging-test-topic-1

  Listing 13-55

  Kafka Connector Configuration

  ```


  在关闭自动提交的情况下，响应式消息确认会有效地为当前消费者组提交分区 offset。这意味着当消息未被确认时，offset 不会被提交。当消息通道在未 ack
  某条消息时终止，且微服务重启后，该消息会被重新投递。这并不总是理想行为，因此 Kafka 连接同样支持响应式消息的 nacking：`Message.nack(Throwable
  t)`。




  ### Nack 策略


  Kafka 连接器支持多种 Nack 策略。


  *   **终止通道（Kill channel）** 是默认策略；当消息被 Nack 时，整个通道会被终止。


  *   **死信队列（DLQ）** 会将消息重新发送到预配置的死信队列，然后进行 Ack。


  *   **仅记录日志（Log）** 仅记录错误并 Ack 该消息。


  默认情况下，通道会因 Nack 消息而被终止。当需要重新投递时，这是理想的行为。消息健康探针可以检测到被终止的通道，K8s 会重启 Pod。如果重启的 Pod
  没有定义消费者组 ID（主题）且 `auto.offset.reset` 设置为 `latest`，或者它是使用该组 ID 的单个 Pod，那么它会从同一条消息开始恢复。当多个
  Pod 使用相同的消费者组 ID 时，在重平衡后，该消息会立即被重新投递给具有相同组 ID 的其中一个 Pod。


  当需要将未处理的消息发送到死信队列时，可以使用 DLQ Nack 策略。


  *   ① 用于在同一 Broker 上发送错误消息的 DLQ 主题


  ```

  mp.messaging:

  incoming:

  from-kafka:

  nack-dlq: my-dlq-topic  ①

  清单 13-56

  DLQ Nack 策略配置

  ```


  当仅配置了 DLQ 主题的名称时，将使用与接收消息时相同的 Broker 配置（包括序列化器）。序列化器根据传入连接的*反序列化器*按以下模式派生：在反序列化器的简单类名中，将
  `Deserializer` 替换为 `Serializer`。当此类存在时，无需为 DLQ 配置序列化器。


  *   ① 自定义 DLQ Kafka Broker 的配置


  *   ② DLQ 的自定义序列化器


  ```

  serializer.pkg: org.apache.kafka.common.serialization

  mp.messaging:

  incoming:

  from-kafka:

  nack-dlq:

  topic: my-dlq-topic-on-other-broker

  bootstrap.servers: localhost:9092  ①

  key.serializer: ${serializer.pkg}.StringSerializer  ②

  value.serializer: ${serializer.pkg}.StringSerializer

  清单 13-57

  DLQ Nack 策略高级配置

  ```


  仅记录日志的 Nack 策略会简单地记录异常并对被 Nack 的消息进行 Ack。被 Nack 的消息会被丢弃，偏移量被提交，通道可以继续消费后续消息。


  ```

  mp.messaging:

  incoming:

  from-kafka:

  nack-log-only: true

  清单 13-58

  仅记录日志的 Nack 策略配置

  ```


  ## JMS 连接器


  JMS 代表 Java 消息服务（Java Message Service），是一个基于 Java 的消息传递 API，用于创建、发送和接收消息。JMS 提供了消息传递的高级抽象，允许多个供应商通过相同的
  API 提供消息传递服务。JMS 已成为企业界广泛采用的消息传递标准，包括 Oracle WebLogic、Oracle AQ、IBM MQ、Apache ActiveMQ
  和 JBoss Messaging 在内的许多消息传递产品都实现了 JMS API。基于 JMS 的这种多功能性，用于响应式消息传递的连接器同时为许多消息代理打开了大门。


  ```

  io.helidon.messaging.jms

  helidon-messaging-jms


