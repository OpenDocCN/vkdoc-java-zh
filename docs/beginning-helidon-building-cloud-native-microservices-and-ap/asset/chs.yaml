  *   ② 提供者专属配置


  *   ③ 所有 Web 资源的默认配置


  *   ④ 按资源路径自定义的安全配置


  ```

  security:

  providers:

  - : ①

  ②

  - :


  web-server:

  defaults: ③


  paths:

  - path: "/greeting[/{*}]" ④


  - path: "/helloworld[/{*}]"


