  '
- '# 14. 长时间运行操作（LRA）


  本章涵盖以下主题。


  *   基于 MicroProfile 的 SAGA 分布式事务简介


  *   将 JAX-RS 资源设置为 LRA 事务参与者


  *   理解参与者状态工作流


  *   在电影院订票示例项目中使用 MicroProfile LRA


  分布式事务是用于在由各种业务需求塑造而成的复杂系统中保持一致性的一种非常重要的工具。多年来，二阶段提交（2PC）一直用于解决这个问题。但在微服务架构中，由许多彼此独立且通常通过异步方式通信的服务进行细粒度组合，2PC
  会成为瓶颈。由于隔离性要求，资源会被锁定过久，最终破坏了原本实现的响应能力。这个问题早在几十年前就已为人所知，并且已经通过 [SAGA 模式](https://en.wikipedia.org/wiki/Long-running_transaction)
  得到解决。Saga 是一系列本地事务，并定义了相应的补偿动作。你不再依赖提交与回滚，而是定义为保持系统一致状态所需执行的一般动作。


  受 SAGA 启发，MicroProfile Long Running Actions（LRA）应运而生。这是一项期待已久的规范，提供了一种无锁、因此也是松耦合的方式，以在微服务环境中实现一致性。它通过异步补偿来维持最终数据完整性，而无需引入代价高昂的隔离。由于
  LRA 是 Java Transactions API（JTA）的替代方案，你可以用类似思路理解它，但两者有一些细微差异。你得到的不再是 JTA 的事务性 Bean
  方法，而是事务性 JAX-RS 资源。


  ## LRA 事务


  每个 LRA 事务都可以有多个参与者。参与者由带有 LRA 专用注解的 JAX-RS 方法来承接调用。`@LRA` 注解用于标记某个 JAX-RS 方法，表示该方法在被调用时应加入
  LRA。是启动一个新的 LRA 事务，还是加入现有事务上下文，都可以通过特定的 LRA 类型来配置。对曾使用过 JTA 注解的人来说，这会非常熟悉。


  以下是 LRA 类型。


  *   **REQUIRES_NEW**：始终创建新的 LRA 事务上下文，忽略任何已有上下文


  *   **REQUIRED**：创建新的 LRA 事务上下文，或使用已有上下文


  *   **MANDATORY**：若在没有 LRA 上下文时被调用，则返回 `412 Precondition Failed`


  *   **SUPPORTS**：若在没有 LRA 上下文时被调用，则按普通 JAX-RS 方法继续执行


  *   **NOT_SUPPORTED**：始终在不加入 LRA 的情况下执行


  *   **NEVER**：若在带有 LRA 上下文时被调用，返回 `412 Precondition Failed HTTP;`；否则按普通 JAX-RS 方法执行


  *   **NESTED**：创建新的 LRA 事务，并将现有 LRA 上下文作为父级


  LRA 参与不仅仅是业务方法本身。还需要定义额外的 JAX-RS 方法用于补偿动作：失败事务使用 `@Compensate`，成功事务使用 `@Complete`。


  *   ① 在新 LRA 事务作用域内执行


  *   ② 当 `buyTicket` 方法成功完成时由 LRA 协调器调用


  *   ③ 当 `buyTicket` 方法抛出异常或在时限前未完成时由 LRA 协调器调用


  ```

  @Path("/example")

  @ApplicationScoped

  public class LRAExampleResource {

  @PUT

  @LRA(value = LRA.Type.REQUIRES_NEW, timeLimit = 500, timeUnit = ChronoUnit.MILLIS)

  @Path("start-example")

  public Response buyTicket(@HeaderParam(LRA_HTTP_CONTEXT_HEADER) URI lraId,

  String data) {

  ...  ①

  return Response.ok().build();

  }

  @PUT

  @Complete

  @Path("complete-example")  ②

  public Response success(@  HeaderParam(LRA_HTTP_CONTEXT_HEADER) URI lraId) {

  return LRAResponse.completed();

  }

  @PUT

  @Compensate

  @Path("compensate-example")  ③

  public Response failure(@HeaderParam(LRA_HTTP_CONTEXT_HEADER) URI lraId) {

  return LRAResponse.compensated();

  }

  }

  Listing 14-1

  JAX-RS Resource with LRA

  ```


  每个加入 LRA 事务的参与者都需要提供自己的补偿链接，这些 URL 指向带有 `@Compensate`、`@Complete`、`@AfterLRA` 等注解的资源。LRA
  协调器会跟踪当 LRA 事务状态变化时应调用哪些资源。当 JAX-RS 资源方法使用 `@LRA(REQUIRES_NEW)` 注解时，每次被拦截的调用都会先在协调器中启动一个新的
  LRA 事务，并在执行资源方法主体之前作为新参与者加入其中。创建出的 LRA 事务 ID 可通过资源方法中的 `Long-Running-Action` 请求头作为新的
  LRA 上下文来访问。当资源方法调用成功完成后，该 LRA 事务会被上报给协调器并标记为关闭。若某个参与者拥有 `@Complete` 方法，协调器最终会再次携带相应
  LRA ID 请求头调用它，并调用同一 LRA 事务中其他所有参与者的 `@Complete` 方法。


  ![](img/600147_1_En_14_Fig1_HTML.png)


  示意图。服务模块由 pod 1 和 pod 2 组成，包含参与者 A 和 B。在 pod 1 中，参与者 A 通过 start L R A、join A 和 close
  与 L R A 协调器通信，参与者 B 通过 join B 通信。协调器通过负载均衡器在 pod 2 中对参与者 A 和 B 执行 complete。


  图 14-1


  负载均衡器之后的参与者


  警告


  补偿方法是 JAX-RS 方法，会像其他 JAX-RS 资源一样被负载均衡。请记住，complete 方法不一定会在启动 LRA 的同一个 pod 上被调用。


  当资源方法以异常结束时，LRA 会被上报给协调器并标记为取消，随后协调器会对该事务下注册的所有参与者调用 `@Compensate` 方法。


  ![](img/600147_1_En_14_Fig2_HTML.png)


  L R A 事务参与者取消的示意图。参与者 A 通过 start L R A、join A 和 cancel 与 L R A 协调器通信，参与者 B 通过 join
  B 通信。L R A 协调器对 A 和 B 执行补偿。


  图 14-2


  参与者取消


  当事务在超时到达前仍未关闭时，协调器会取消该事务，并调用该超时事务所有参与者的补偿端点。


  ![](img/600147_1_En_14_Fig3_HTML.png)


  L R A 事务参与者超时的示意图。参与者 A 通过 start L R A 和 join A 与带有计时器图标的 L R A 协调器通信，参与者 B 通过 join
  B 通信。L R A 协调器对 A 和 B 执行补偿。


  图 14-3


  参与者超时


  ## 上下文传播


  在 JAX-RS 资源之间传播上下文，还有什么方式会比 HTTP 请求头更好呢？每个 LRA 都由协调器在启动新 LRA 时分配的 ID 标识。该 ID 通过
  `Long-Running-Action` HTTP 请求头在资源之间分发。当请求中存在该请求头时，启用了 LRA 的 JAX-RS 资源会将其视为现有 LRA
  上下文的一部分。这使得即便经过不了解 LRA 的中间方，也能中继上下文。MicroProfile LRA 规范不仅利用服务端 JAX-RS，也利用客户端能力。当调用发生在
  LRA 上下文中时，JAX-RS 客户端会自动中继 LRA ID。


  *   ① 使用 JAX-RS 客户端时不需要手动传播 LRA 请求头。LRA 请求头会自动传播。


  ```

