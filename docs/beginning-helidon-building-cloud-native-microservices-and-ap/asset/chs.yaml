  ## JSON Web 令牌


  基于令牌的身份验证是最简单且非常安全的身份验证方法之一。身份验证令牌（通常称为 bearer token）是唯一且短时有效的文本字符串，可验证其由真实的身份管理器签发。服务可以传递此类令牌，而无需重复进行身份验证。你可以想象我们示例王国中的一位骑士，持有城堡守卫官的通行令，允许他在旅途中穿行王国的任何区域。该通行令带有印章，因此任何人都能验证它确由守卫官签发。它仅在特定任务所需的短时间内有效，并且只对被签发的那位骑士有效。上述这些骑士通行令具备的特性以及更多能力，正是
  JWT 所提供的。


  这里有几个看起来有些神秘的缩写。我们来逐一拆解，避免你迷失其中。


  *   [JWT](https://jwt.io) 是 JSON Web Token 的缩写。


  *   [JWS](https://www.rfc-editor.org/rfc/rfc7515) 是 JSON Web Signature 的缩写。它是用于验证而签名的
  JWT base64 格式；其内容未加密。


  *   [JWE](https://www.rfc-editor.org/rfc/rfc7516) 是 JSON Web Encryption 的缩写，是另一种
  JWT 格式，其中负载被安全加密。


  *   [JWK](https://www.rfc-editor.org/rfc/rfc7517) 是 JSON Web Key 的缩写，即一种密码学密钥表示形式。


  *   JWKS 是 JSON Web Key Set 的缩写。它是一种用于处理多个 JWK 密钥的简单 JSON 格式。Keycloak 在 `/realms/my-realm/protocol/openid-connect/certs.`
  提供这些密钥。


  *   [OIDC](https://openid.net/connect/) 是 OpenID Connect 的缩写。


  *   [OpenID Connect Discovery](https://openid.net/specs/openid-connect-discovery-1_0.html)
  是一种用于获取 OIDC 身份提供方元数据的机制，例如用于获取 JWT 令牌或 JWKS 公钥集合的 REST 资源。Keycloak 在 `/realms/my-realm/.well-known/openid-configuration`
  提供这些信息。


  JWT 是一种简单的标准化 JSON 结构，被编码为 base64 令牌，携带身份声明映射，通常由签发方的私有证书签名（JWS）或被完全加密（JWE）。在 JWS
  格式中，你只需要签发方的公钥（JWK）即可检查 JWT 令牌的有效性。根据所使用的安全提供方，密钥可以在本地提供给 Helidon 服务，或在 Helidon
  服务启动时通过 OpenID Connect Discovery 协议从身份提供方下载 JWKS（除非已配置自定义公钥）。当 JWT 令牌被签名后，Helidon
  安全机制可以轻松检查是否由正确的身份权威创建。只要 Helidon 拥有签发方公钥，就不再需要与身份管理器进行额外通信。JWT 令牌有效性检查可以快速且本地化地完成。


  JWT 令牌签发方可以是专门的身份提供方（例如本章示例中的 Keycloak 服务器），也可以是 Helidon 服务。令牌负载中携带的数据以 JSON 格式组织为
  claims（声明）。尽管有许多具有既定结构的 [IANA 权威机构注册声明](https://www.iana.org/assignments/jwt/jwt.xhtml%2523claims)，JWT
  令牌也可以携带自定义声明，因此 JWT 令牌具有很高的可定制性。


  *   ① 令牌过期时间


  *   ② 令牌签发时间


  *   ③ 令牌唯一标识符


  *   ④ 签发方标识


  *   ⑤ 用于验证令牌是否为该特定资源组签发的受众（Audience）


  *   ⑥ 主体唯一标识符


  *   ⑦ 首选用户名


  *   ⑧ 由 `microprofile-jwt` scope mapper 在 Keycloak 中添加角色后承载这些角色的 groups 声明


  ```

  {

  "exp": 1671647530, ①

  "iat": 1671647230, ②

  "jti": "2bfdb114-2dfd-4696-a8ac-0ffcf9dc4257", ③

  "iss": "http://localhost:8979/realms/beginning-helidon", ④

  "aud": ["kingdom-audience", ...], ⑤

  "sub": "14515518-1856-4564-855f-3d44814c5ba4", ⑥

  "typ": "Bearer",

  "azp": "beginning-helidon-client",

  "nonce": "9a358080-a589-4b47-a870-7e8e5e8ae145",

  "session_state": "4b7307f6-5e69-47e3-9af1-00921adb6181",

  "acr": "1",

  "allowed-origins": ["http://localhost:8080"],

  "realm_access": {"roles": ["warden", ...]},

  "scope": "openid microprofile-jwt profile email kingdom-jwt-scope",

  "sid": "4b7307f6-5e69-47e3-9af1-00921adb6181",

  "upn": "joel", ⑦

  "name": "Joel Driffin",

  "groups": ["warden", ...],⑧

  "preferred_username": "joel",

  "given_name": "Joel",

  "family_name": "Driffin"

  }

  Listing 8-11

  JWT Token Payload Claims Issued by Keycloak

  ```


  JWT 对于服务间通信尤其方便，因为每个服务都不必能够访问 JWT 令牌签发方，也可以在本地验证（JWS）或解密（JWE）JWT 令牌。


  警告


  尽管 JWS 格式下的 JWT 负载可验证其真实性，但它不像 JWE 格式那样经过加密！


  JWT 令牌通常通过 `SESSIONID` cookie、参数或 `Authorization` 请求头进行传递。支持 JWT 的 Helidon 安全提供方不仅会处理入站令牌，Helidon
  还提供出站安全特性，以便在调用其他服务时携带 JWT 令牌。




  ## MicroProfile JWT RBAC


  [MicroProfile JWT 规范](https://download.eclipse.org/microprofile/microprofile-jwt-auth-2.1/microprofile-jwt-auth-spec-2.1.html)为你的
  JAX-RS 资源带来了对 CDI 友好的官方 API。让我们使用 cURL 手动调用 JAX-RS watchtower 服务。


  ```

  curl -d "http://localhost:8080" \

  -H "Authorization: Bearer $JWT_TOKEN" \

  localhost:8082/watchtower/signal

  Listing 8-12

  Calling MicroProfile JWT Enabled JAX-RS Resource with cURL

  ```


  ![](img/600147_1_En_8_Fig6_HTML.png)


  一幅城堡大门与瞭望塔的示意图标注了 castle service 和 watchtower service。它们通过 keycloak J W S token
  以及 J W T 签发者的公钥 J W K 或 P E M 相互连接，从而在服务之间自动授权进行信息交换。


  图 8-6


  使用 JWT 的服务间通信


  Watchtower 服务无需联系任何其他服务来验证 JWS 令牌。它所需要的只是 JWT 令牌签发者的公钥。公钥内容可以通过 `mp.jwt.verify.publickey`
  直接提供，或者通过 `mp.jwt.verify.publickey.location` 提供其位置链接。该位置可以是文件路径、classpath 或 URL。MicroProfile
  JWT 支持以下格式。


  *   JWK


  *   JWKS


  *   PKCS#8 base64 编码的 PEM 格式


  例如，Keycloak 在 `/realms/my-realm/protocol/openid-connect/certs` 暴露 JWKS 密钥。配置完成后，Helidon
  MP JWT 实现会在需要时惰性且自动地下载该密钥集；此后无需其他调用。


  *   ① 用于校验 issuer 声明的值


  *   ② 用于校验 audiences 声明的值


  *   ③ 通过 JWKS 直接从 Keycloak 加载用于校验 JWS 的公钥


  ```

  mp.jwt.verify:

  issuer: "http://${keycloak.host}:${keycloak.port}/realms/beginning-helidon" ①

  audiences: "kingdom-audience" ②

  publickey:

  location: ${mp.jwt.verify.issuer}/protocol/openid-connect/certs ③

  Listing 8-13

  Configuration of MP JWT

  ```


  MicroProfile JWT 会解码 bearer JWT 令牌，并将其声明注入到你的 JAX-RS 资源中。当你更仔细地检查 JWT 时，会发现它实现了
  `java.security.Principal`。这是因为 JsonWebToken 是可通过 JAX-RS `SecurityContext.getUserPrincipal()`
  访问的 principal。除其他功能外，MP JWT 支持在 [RFC-7643](https://www.rfc-editor.org/rfc/rfc7643)
  中定义的 `groups` 声明，以便随 JWT 令牌的主体身份传播授权数据。是的，你可以访问角色。这正是该规范名称中包含 RBAC 的原因！`SecurityContext.isUserInRole`
  会根据 JWT 令牌中的实际 groups 进行检查，`@RolesAllowed` 也同样有效。


  大多数身份提供商都必须进行配置，以便将 MP JWT 声明添加到 JWT 令牌中。例如，Keycloak 提供了预置的 `microprofile-jwt` 内建
  scope，启用后会添加 MicroProfile JWT 所需的 `upn` 和 `groups` scope。


  注意


  你可以在业务代码中继续使用相同的注解，并轻松在不同安全提供商之间切换。


  *   ① 注入 JWT 令牌声明


  *   ② 注入当前请求使用的完整 JWT 令牌


  *   ③ 默认情况下，`RolesAllowed` 会映射到 groups 声明


  *   ④ JWT 声明会映射到 Jakarta WS 安全上下文；用户属于 JWT 中的所有 groups


  ```

