  ### RESTful Web 服务


  问候服务是一个 RESTful Web 服务。Helidon MP 是 MicroProfile 的一个实现，而 MicroProfile 依赖 Jakarta
  RESTful Web Services 规范来创建 RESTful 服务。


  Jakarta Restful Web Services（JAX-RS）


  JAX-RS 是 Jakarta EE 的一项规范，定义了使用表述性状态转移（REST）架构模式处理 Web 服务的 API。它高度依赖注解，并且与 CDI 深度集成。目前市面上有许多
  JAX-RS 实现，排名前三的是 Jersey、RESTeasy 和 Apache CXF。Helidon MP 使用的是 Jersey。


  要了解更多 JAX-RS 信息，请访问 [`https://jakarta.ee/specifications/restful-ws`](https://jakarta.ee/specifications/restful-ws)。你可以在那里找到规范文档的链接。


  JAX-RS 使用注解来配置请求路径（`@Path`）和 HTTP 方法（`@GET`、`@POST`、`@PUT` 等）。如果传入请求匹配成功，就会执行带注解的方法。可用的变体和组合非常多，因此你拥有很高的灵活性。


  *   ① 这是一个请求作用域的 CDI Bean，用于处理 `/greet` URI 上的请求。


  *   ② 该方法在 `GET /greet` 端点被调用，并返回 JSON。


  *   ③ 该方法在 `GET /greet/{name}` 端点被调用，并返回 JSON。有效 URI 包括 `/greet/Dmitry`、`/greet/Daniel`。


  *   ④ 该方法在 `PUT /greet/greeting` 端点被调用。它接收并返回 JSON。它还包含两个用于 REST API 文档的 OpenAPI
  注解：`@RequestBody` 和 `@APIResponses`。OpenAPI 在第 9 章中介绍。


  ```

  @Path("/greet")

  @RequestScoped

  public class GreetResource {                             ①

  ...

  @GET

  @Produces(MediaType.APPLICATION_JSON)

  public Message getDefaultMessage() {                 ②

  ...

  }

  @Path("/{name}")

  @GET

  @Produces(MediaType.APPLICATION_JSON)                ③

  public Message getMessage(@PathParam("name") String name) {

  ...

  }

  @Path("/greeting")

  @PUT

  @Consumes(MediaType.APPLICATION_JSON)

  @Produces(MediaType.APPLICATION_JSON)

  @RequestBody(...)

  @APIResponses(...)

  public Response updateGreeting(Message jsonObject) {  ④

  ...

  }

  ...

  }

