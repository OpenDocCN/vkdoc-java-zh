  ### 注入的 ConnectionFactory


  虽然 JMS 规范严重依赖 JNDI，但 Helidon 连接器支持无 JNDI 的方法，可以直接将 `ConnectionFactory` 作为 CDI Bean
  提供。Helidon MP 是一个符合 [CDI 3.​0](https://jakarta.ee/specifications/cdi/3.0/jakarta-cdi-spec-3.0.html)
  规范的注入框架。通过 CDI 生产者方法或字段，从实例化的连接工厂创建 Bean 非常简单。


