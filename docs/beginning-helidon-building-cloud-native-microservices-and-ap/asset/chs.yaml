  security:

  providers:

  - abac: ①

  - http-basic-auth: ②

  realm: "beginning-helidon"

  users: ③

  - login: "gyles"

  password: "gyles"

  roles: ["gate-keeper"]

  - login: "alad"

  password: "alad"

  roles: ["flag-keeper"]

  - login: "joel"

  password: "joel"

  roles: ["warden"]

