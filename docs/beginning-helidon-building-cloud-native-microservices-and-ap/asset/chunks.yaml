    helidon-integrations-neo4j


    Listing 12-1

    Neo4j Helidon Integration Dependency

    ```


    After that, you should specify all the connection details in the `microprofile-config.properties`
    file.


    *   ① Neo4j server URI using *Bolt* protocol


    *   ② Server username


    *   ③ Server password


    ```

    neo4j.uri=bolt://localhost:7687        ①

    neo4j.authentication.username=neo4j    ②

    neo4j.authentication.password=secret   ③

    Listing 12-2

    Neo4j Configuration

    ```


    Now you can simply inject the driver into the code.


    *   ① Injects Neo4j driver


    ```

    @Inject

    public WizardsRepository(Driver driver) {             ①

    this.driver = driver;

    }

    Listing 12-3

    Inject Neo4j Driver

    ```


    Here it is done using the constructor. So, when Helidon starts, the driver is
    automatically injected into our class.


    As the driver is set up and injected, you can do [Cypher](https://neo4j.com/developer/cypher/)
    queries to the Neo4j database, as shown in Listing [12-4](#600147_1_En_12_Chapter.xhtml#PC4).


    *   ① Sample Neo4j Cypher query


    *   ② Initializes a session using `driver`


    *   ③ Executes a Cypher query and gets the result


    ```

    public List findAllWizards() {      ①

    var session = driver.session()                ②

    var result = session.run("MATCH (Wizard) RETURN wizard").list()                               ③

    return result;

    }

    Listing 12-4

    Example of a Cypher Request

    ```


    This data can then be processed and returned using a typical Helidon endpoint.


    To play more with Helidon and Neo4j, please check out a full-scaled Helidon Neo4j
    example based on a Movie database in [Helidon Official GitHub Repository](https://github.com/helidon-io/helidon/tree/helidon-3.x/examples/integrations/neo4j).


    ### Enabling Metrics and Health Checks


    The extent of Neo4j’s support goes beyond the driver configuration and initialization.
    You can include two additional dependencies if you require greater insight into
    the database’s performance.


    Listing [12-5](#600147_1_En_12_Chapter.xhtml#PC5) is the code for health checks.


    *   ① Neo4j health checks dependency


    ```

    io.helidon.integrations.neo4j     ①

    helidon-integrations-neo4j-health


    Listing 12-5

    Neo4j Health Checks

    ```


    Listing [12-6](#600147_1_En_12_Chapter.xhtml#PC6) is the code for metrics.


    *   ① Neo4j metrics dependency


    ```

    io.helidon.integrations.neo4j    ①

    helidon-integrations-neo4j-metrics


    Listing 12-6

    Neo4j Metrics Dependency

    ```


    By adding them, the observability data from Neo4j is injected into Helidon standard
    `/health` and `/metrics` endpoints output.


    Note


    Metrics on the server side should be enabled by setting the `neo4j.pool.metricsEnabled`
    to `true` in the Helidon config.


    Now, run the following in the command line.


    ```

    > curl -X GET http://localhost:8080/metrics

    ```


    Neo4j metrics information is printed.


    And the following shows available Neo4j health check information.


    ```

    > curl -X GET http://localhost:8080/health

    ```'
  trans: '

    ## Kubernetes 中的调度


    如果你是在一台裸金属机器上运行单个实例的单个微服务，那么在 Helidon 中进行调度是可行的。但如今这是一种少见情况。大多数微服务都运行在云端某处的 *Kubernetes*
    环境中，具有多个 *副本*，并配置了 *负载均衡器*。


    每当你在代码或配置中调度一个 CronJob 时，这段被调度的代码会在应用的*所有*副本上运行。这通常不是你想要的行为。通常，你只希望由一个应用实例来执行该定时任务。


    不过这可以在 Kubernetes 层面轻松解决。Kubernetes 提供了 CronJob 支持。并且和 Kubernetes 中的其他事物一样，你只需要创建一个
    `yaml` 文件。


    注意


    这里我们假设你已经熟悉 Kubernetes 和 `kubectl` 命令行工具；否则，请参阅[Kubernetes 官方文档](https://kubernetes.io/docs/home/)。


    假设你希望每天凌晨 2 点运行一次“魔法清理”任务。和 Kubernetes 中的其他事物一样，你应该创建如清单 11-8 所示的 `yaml` 规范。


    *   ① 文档 `kind` 为 `CronJob`


    *   ② 任务名称


    *   ③ 任务执行计划：每天凌晨 2 点


    *   ④ 包含 Helidon 应用的镜像


    ```

    apiVersion: batch/v1

    kind: CronJob                                  ①

    metadata:

    name: CleanSomeMagic                         ②

    spec:

    schedule: "* 10 5 * *"                       ③

    jobTemplate:

    spec:

    template:

    spec:

    containers:

    - name: CleanSomeMagic

    image: wizardCleaningApp:latest    ④

    Listing 11-8

    CronJob Configuration

    ```


    “魔法清理任务”是一个假设的 Helidon 应用，被打包为 Docker 镜像并发布到 Docker 镜像仓库中。


    应用该描述文件后，你可以 *监控* 任务执行状态。


    ```

    > kubectl get jobs --watch

    NAME               COMPLETIONS   DURATION   AGE

    CleanSomeMagic     0/1                      0s

    CleanSomeMagic     1/1           12s        12s

    Listing 11-9

    Monitor the Job

    ```


    或者，你也可以直接调用 `describe` 来查看任务的全部信息。输出中还包含运行历史。


    当你不再需要某个 CronJob 时，直接删除即可。


    有关如何构建 CronJob 规范的完整说明，请参阅[官方文档。​](https://kubernetes.io/docs/tasks/job/automated-tasks-with-cron-jobs/)


    确实，虽然调度这个主题看起来很简单，但它对许多企业应用的成功至关重要。幸运的是，Helidon 让复杂任务管理与流程调度变得容易。


    此外，如果你将 Helidon 应用部署到 Kubernetes，还可以使用 Kubernetes 内置的调度能力。Kubernetes 允许我们为应用定义和管理复杂调度，包括对
    cron 表达式及其他高级调度特性的支持。


    无论你使用 Helidon 内置的调度框架，还是利用 Kubernetes 的调度能力，你都可以确信应用能够轻松处理最复杂的调度场景。


    ## 总结


    *   只需两个注解——`@Scheduled` 或 `@FixedRate`——你就可以为任务设置简单或复杂的调度计划。


    *   你既可以使用注解，也可以使用配置来调度任务。


    *   要在 Kubernetes 的一个 Pod 上调度任务，请使用其内置的 cron 能力。


    # 12. 与其他技术集成


    本章涵盖以下主题。


    *   将 Helidon 与其他知名技术集成


    *   使用 Neo4j 创建由图数据库支撑的微服务


    *   在需要快速、可扩展且持久化缓存时与 Coherence CE 集成


    *   使用 Verrazzano 将微服务部署到云端


    ## Neo4j


    Neo4j 是由 [Neo4j](https://neo4j.com/) 公司开发的图数据库管理系统。Neo4j 原生的图存储和处理能力，使其成为管理数据点之间复杂关系的应用的理想选择。


    将 Neo4j 与 Helidon 结合使用的一个关键优势，是能够同时发挥两种技术的长处。Helidon 轻量且模块化的架构让构建和部署微服务变得容易，而
    Neo4j 的图数据库能力使你可以管理复杂数据关系。这种优势组合使得构建强大、可扩展且高性能的应用变得简单，即使面对最复杂的数据挑战也能胜任。


    与 Neo4j 的集成通过从标准 Helidon 配置中配置并初始化 Neo4j 驱动来实现。


    要开始使用它，请将以下依赖添加到项目的 `pom.xml` 文件中。


    *   ① Neo4j Helidon 依赖


    ```

    io.helidon.integrations.neo4j       ①

    helidon-integrations-neo4j


    Listing 12-1

    Neo4j Helidon Integration Dependency

    ```


    之后，你应在 `microprofile-config.properties` 文件中指定所有连接详情。


    *   ① 使用 *Bolt* 协议的 Neo4j 服务器 URI


    *   ② 服务器用户名


    *   ③ 服务器密码


    ```

    neo4j.uri=bolt://localhost:7687        ①

    neo4j.authentication.username=neo4j    ②

    neo4j.authentication.password=secret   ③

    Listing 12-2

    Neo4j Configuration

    ```


    现在你可以直接将驱动注入到代码中。


    *   ① 注入 Neo4j 驱动


    ```

    @Inject

    public WizardsRepository(Driver driver) {             ①

    this.driver = driver;

    }

    Listing 12-3

    Inject Neo4j Driver

    ```


    这里是通过构造函数完成注入的。因此，当 Helidon 启动时，驱动会自动注入到我们的类中。


    当驱动配置并注入完成后，你就可以向 Neo4j 数据库执行 [Cypher](https://neo4j.com/developer/cypher/) 查询，如清单
    12-4 所示。


    *   ① Neo4j Cypher 查询示例


    *   ② 使用 `driver` 初始化会话


    *   ③ 执行 Cypher 查询并获取结果


    ```

    public List findAllWizards() {      ①

    var session = driver.session()                ②

    var result = session.run("MATCH (Wizard) RETURN wizard").list()                               ③

    return result;

    }

    Listing 12-4

    Example of a Cypher Request

    ```


    随后，这些数据可以通过典型的 Helidon 端点进行处理并返回。


    若想进一步体验 Helidon 与 Neo4j，请查看 [Helidon 官方 GitHub 仓库](https://github.com/helidon-io/helidon/tree/helidon-3.x/examples/integrations/neo4j)中基于电影数据库的完整规模
    Helidon Neo4j 示例。


    ### 启用指标与健康检查


    Neo4j 的支持范围不仅限于驱动配置和初始化。如果你需要更深入地了解数据库性能，可以额外引入两个依赖。


    清单 12-5 是健康检查代码。


    *   ① Neo4j 健康检查依赖


    ```

    io.helidon.integrations.neo4j     ①

    helidon-integrations-neo4j-health


    Listing 12-5

    Neo4j Health Checks

    ```


    清单 12-6 是指标相关代码。


    *   ① Neo4j 指标依赖


    ```

    io.helidon.integrations.neo4j    ①

    helidon-integrations-neo4j-metrics


    Listing 12-6

    Neo4j Metrics Dependency

    ```


    添加它们后，来自 Neo4j 的可观测性数据会被注入到 Helidon 标准 `/health` 和 `/metrics` 端点输出中。


    注意


    应在 Helidon 配置中将 `neo4j.pool.metricsEnabled` 设置为 `true`，以启用服务端指标。


    现在，在命令行中运行以下命令。


    ```

    > curl -X GET http://localhost:8080/metrics

    ```


    将会输出 Neo4j 指标信息。


    下面的命令则会显示可用的 Neo4j 健康检查信息。


    ```

    > curl -X GET http://localhost:8080/health

    ```

