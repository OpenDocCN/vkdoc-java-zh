    for more information.'
  trans: '

    ### 提供者（Providers）


    JAX-RS 及其客户端中的提供者负责各种横切关注点，例如过滤请求、将表示形式转换为 Java 对象，以及将异常映射为响应。提供者可以预打包在 JAX-RS
    运行时中，也可以由应用程序提供。


    让我们实现与“MicroProfile Rest Client”一节中相同的日志过滤器。为此，JAX-RS Client API 提供了一个概念上非常接近的方式。


    *   创建一个实现 `ClientRequestFilter` 和/或 `ClientResponseFilter` 的类


    *   使用 `.register(...`​`)` 方法，在 `Client` 或 `WebTarget` 中注册该/这些类


    如果你在 `Client` 中注册过滤器，它会被所有 `WebTarget` 实例继承。在当前实例中注册则意味着不会影响其他 `WebTarget` 实例。


    为简化日志过滤器的创建，我们来创建一个同时实现这两个接口的单个类。为 `ClientRequestFilter` 重写 `filter(ClientRequestContext
    requestContext)`，为 `ClientResponseFilter` 重写 `filter(ClientRequestContext requestContext,
    ClientResponseContext responseContext)`。该类应如清单 5-24 所示。


    *   ① 实现 `ClientRequestFilter` 和 `ClientResponseFilter` 的类。


    *   ② 重写 `filter(ClientRequestContext requestContext)` 以记录请求头。


    *   ③ 重写 `filter(ClientRequestContext requestContext, ClientResponseContext responseContext)`
    以记录响应头。


    ```

    public class LoggerFilter implements

    ClientRequestFilter, ClientResponseFilter {    ①

    private final Logger logger =

    Logger.getLogger(LoggerFilter.class.getName());

    @Override

    public void filter(ClientRequestContext requestContext) { ②

    logger.info(requestContext.getHeaders().toString());

    }

    @Override

    public void filter(ClientRequestContext requestContext,

    ClientResponseContext responseContext) { ③

    logger.info(responseContext.getHeaders().toString());

    }

    }

    Listing 5-24

    Request and Response Filters

    ```


    只需在 `Client` 中注册这个类，因为我们希望由该 `Client` 创建的所有 `WebTarget` 都注册日志过滤器。


    *   ① 在 `WebTarget` 中注册 `LoggerFilter`。


    ```

    WebTarget target = ClientBuilder.newClient()

    .register(new LoggerFilter())        ①

    .target("http://localhost:8080");

    Listing 5-25

    Register Filter

    ```


    现在，所有请求和响应中的头信息都会被记录。


    让我们运行 sorcery ministry 应用，并在日志输出中调用 `/wizardClient/jaxrs` 端点，如清单 5-26 所示。


    ```

    {Accept=[application/json]}

    {content-length=[13], connection=[keep-alive], Date=[Wed, 28 Sep 2022 16:26:55
    +0300],

    Content-Type=[application/json]}

    Listing 5-26

    Sample Output

    ```


    非常好，正如预期！


    还有许多其他用于媒体类型实体处理、上下文操作和异常处理的提供者。更多细节请参考官方[文档](https://jakarta.ee/specifications/restful-ws/3.0/jakarta-restful-ws-spec-3.0.html%2523providers)。


    ### 异步操作（Asynchronous Operations）


    JAX-RS 提供了一种调用其他服务的*异步*方式。只需调用 `.async()` 方法即可实现。因此，该函数会立即返回一个 `Future` 实例，一旦收到响应，它就会包含响应结果。


    *   ① 调用异步客户端请求。


    ```

    public Future getAsyncWizardFromJaxrsClient() {

    return target

    .path("/wizard")

    .request(MediaType.APPLICATION_JSON)

    .async()                                  ①

    .get(Wizard.class);

    }

    Listing 5-27

    Asynchronous Operations

    ```


    不仅如此，请求还可以以*响应式*方式处理。这同样可以非常轻松地通过调用客户端的 `.rx()` 方法实现。该函数返回 `CompletableStage`
    作为结果。


    *   ① 调用一个*响应式*客户端请求


    ```

    public CompletableStage

    getAsyncWizardFromJaxrsClient() {

    return client

    .path("/wizard")

    .request(MediaType.APPLICATION_JSON)

    .rx()                                     ①

    .get(Wizard.class);

    }

    Listing 5-28

    Reactive Operations

    ```


    请求执行会立即返回 `CompletionStage`，其中在响应处理完成后包含一个 `Wizard` 实例。之后可以使用标准 Java 语言特性，以*响应式*方式继续处理它。


    这些方法适用于高负载或长时间运行的调用，以避免阻塞服务线程。


    ### JAX-RS Client API 结论


    本章仅触及了 JAX-RS Client API 所提供能力的表面。仅其用法本身就值得写成一本厚书，因为它是一个非常强大的工具。


    更多信息请参考官方[文档](https://jakarta.ee/specifications/restful-ws/3.0/jakarta-restful-ws-spec-3.0.html)。

    '
- fmt: '## CORS


    Due to security reasons, browsers allow loading resources only from the same origin
    as the page was loaded. Previously, browsers allowed loading resources from any
    location, and this was a reason for much data to be stolen.


    Still, sometimes, you need to allow requests from specific locations other than
    the origin. And CORS is made for this.


    The cross-origin resource sharing (CORS) protocol allows the server to identify
    origins other than its own from which a browser should permit loading resources.
    It works based on HTTP headers.


    Helidon can programmatically define the CORS behavior of your services using the
    Helidon CORS API. You can also configure it externally. Three built-in endpoints—health,
    metrics (see Chapter [4](#600147_1_En_4_Chapter.xhtml)), and OpenAPI (see Chapter
    [9](#600147_1_En_9_Chapter.xhtml))—are integrated with CORS. Several annotations
    and configuration options allow you to easily control how our resources are exposed
    across origins. Please explore the [Helidon official documentation](https://helidon.io/docs/v3/%2523/mp/cors/cors)
    for more information on all its features.


    Add the Listing [5-29](#600147_1_En_5_Chapter.xhtml#PC29) dependency to the Helidon
    MP project’s `pom.xml` file to enable CORS.


    ```

    io.helidon.microprofile

    helidon-microprofile-cors


    Listing 5-29

    CORS Dependency

    ```


    In this example, let’s refer to our wizard service.


    The “sorcery ministry” at sorceryministry.com hosts an app that regulates wizards.
    A wizard service—a repo of all wizards—runs at helidonserver.com/wizard.


    ![](images/600147_1_En_5_Chapter/600147_1_En_5_Fig2_HTML.png)


    A flow diagram between the browser and `helidonserver.com`. Sorcery Ministry,
    C O R S, C O R S of Helidon `server dot com`, and Helidon app.


    Figure 5-2


    Call hierarchy of the wizard service and the sorcery ministry application


    1. The browser loads the sorcery ministry app from sorceryministry.com, which
    is the origin of CORS.

    2. The app requests `GET` [http://helidonserver.com/wizard](http://helidonserver.com/wizard).
    helidonserver.com is the host. The browser’s CORS implementation adds Host and
    Origin headers to the request.

    3. Helidon CORS checks that the Helidon application permits sharing of `/wizard`
    via `GET` with sorceryministry.com. If so, it permits the request to reach the
    destination; if not, it rejects the request with “403 – Forbidden” status.

    4. Helidon CORS updates the response with `Access-Control-Allow-Origin: *` (depending
    on how you have configured CORS for the Helidon application).


    Now, let’s add CORS to our wizard application. The goal is to permit unrestricted
    sharing of the resource that returns wizards and restrict sharing of the resource
    that gets the wizard so that only the origins [http://sorceryministry.com](http://sorceryministry.com)
    can get the information.


    - ① Declare CORS properties.


    ```

    @GET

    @Produces(MediaType.APPLICATION_JSON)

    @CrossOrigin(allowMethods = {"GET"},

    allowOrigins = {"http://sorceryministry.com"})   ①

    public JsonObject getWizard() { }

    Listing 5-30

    CORS Annotations Usage

    ```


    Use the `@CrossOrigin` annotation with the `allowMethods` and `allowOrigins` parameters
    specified.


    You can do the same using an external configuration. Add Listing [5-31](#600147_1_En_5_Chapter.xhtml#PC31)
    to the `microprofile-config.properties` file.


    ```

    cors.paths.0.path-pattern=/wizard

    cors.paths.0.allow-methods=GET

    cors.paths.0.allow-origins=http://sorceryministry.com

    Listing 5-31

    CORS Configuration

    ```


    This configuration enables the required CORS settings for the `/wizard` resource.


    Helidon also lets us easily include health, metrics (see Chapter [4](#600147_1_En_4_Chapter.xhtml)),
    and OpenAPI (see Chapter [9](#600147_1_En_9_Chapter.xhtml)) services in our Helidon
    application. These services add endpoints to our application so clients can retrieve
    various telemetry and documentation information. As with the application endpoints
    you create, these endpoints represent resources that can be shared across origins.


    By default, the integrated CORS support in all three services permits any origin
    to share their resources using `GET`, `HEAD`, and `OPTIONS` HTTP requests. You
    can override the default CORS behavior to those endpoints using the configuration.
    They are independent of the services created. For example, restrict the `/health`
    endpoint and the `/metrics` endpoint, provided by built-in components, to only
    the origin [http://sorceryministry.com](http://sorceryministry.com).


    - ① Allows `/health` to be accessible to the only origin [`http://sorceryministry.com`](http://sorceryministry.com)

    - ② Allows `/metrics` to be accessible to the only origin, [`http://sorceryministry.com`](http://sorceryministry.com)


    ```

    ...

    health:

    cors:

    allow-origins: [http://sorceryministry.com]  ①

    metrics:

    cors:

    allow-origins: [http://sorceryministry.com]   ②

    ...

    Listing 5-32

    Health and Metrics Configuration

    ```


    Now, if you try to access the `/health` endpoint, it rejects requests from origins
    that are not approved, as shown in Listing [5-33](#600147_1_En_5_Chapter.xhtml#PC33).


    ```

    curl -i -H "Origin: http://sorceryministry.com" http://helidonserver.com/health

    HTTP/1.1 403 Forbidden

    Date: Mon, 11 Jan 2023 12:06:55 +3:00

    transfer-encoding: chunked

    connection: keep-alive

    Listing 5-33

    Sample Output

    ```


    And responds successfully only to cross-origin requests from [http://sorceryministry.com](http://sorceryministry.com).


    ```

    curl -i -H "Origin: http://sorceryministry.com" http://helidonserver.com/health

    HTTP/1.1 200 OK

    Access-Control-Allow-Origin: http://sorceryministry.com

    Content-Type: application/json

    Date: Mon, 11 Jan 2023 12:09:05 +3:00

    Vary: Origin

    connection: keep-alive

    content-length: 461

    {"outcome":"UP",...}

    Listing 5-34

    Sample Output

    ```


    ## Summary


    - Services call other services. Some services provide data, while others consume
    it.

    - Helidon has multiple ways to communicate with other Microservices with REST.

    - MicroProfile Rest Client and the JAX-RS Client API provide different programming
    models. Declarative for MicroProfile Rest Client and the builder pattern based
    on the JAX-RS Client API.

    - Advanced header manipulations, filtering, and asynchronous operations can be
    done in MicroProfile Rest Client and the JAX-RS Client API.

    - To ensure correct Cross-origin work, consider setting up CORS for your microservices.
    This is easily done using a few annotations in Helidon MP or external configuration.

    - You can control the accessibility of built-in endpoints like `/health`, `/metrics`,
    and `/openapi` using external configuration.'
