    \ extension of standard reactive messaging `Message`\n- ② `JmsMessage` provides\
    \ `JMS`-specific features; you can access original `JMSMessage` object\n- ③ `JMS`\
    \ properties are generically typed\n- ④ Chaining acknowledgment to ack incoming\
    \ when outgoing message is acked\n\n```java\n@Incoming(\"from-jms\")\n@Outgoing(\"\
    to-jms\")\npublic Message process(JmsMessage incomingMsg) {  // ①\n    jakarta.jms.Message\
