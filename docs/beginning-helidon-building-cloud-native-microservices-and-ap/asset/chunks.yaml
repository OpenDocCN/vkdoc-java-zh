    ### findFirst


    The `findFirst` operator is a terminal operator, it returns the first item coming
    with `onNext` signal from upstream if any. When `onComplete` is received before
    any `onNext` signal, `findFirst` returns an empty optional.


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig23_HTML.png)


    A diagram has 4 color gradient circles numbered 1 to 4 with a short vertical line
    on an arrow, and a block of the function dot find first below it.


    Figure 13-23


    findFirst operator


    `findFirst` sends a `cancel` signal immediately after the first `onNext` signal
    is received, ignoring any subsequent `onNext` signals.


    *   ① Stream with first item 1


    *   ② Result is Optional[1]


    *   ③ Empty stream has no first item


    *   ④ Result is Optional.empty


    ```

    ReactiveStreams.of(1, 2, 3, 4)  ①

    .findFirst()  ②

    .run()

    ReactiveStreams.empty()  ③

    .findFirst()  ④

    .run()

    Listing 13-29

    findFirst Operator Returning First Item or Empty Optional

    ```


    ### forEach


    The `forEach` operator is a terminal operator, it executes provided supplier function
    for each `onNext` signal with the item as its parameter. `forEach` sends a `request(Long.MAX_VALUE)`
    signal upstream right after the `onSubscribe` signal is received, requesting the
    unbounded data, with no backpressure applied.


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig24_HTML.png)


    A diagram has 4 color gradient circles numbered 1 to 4 with a short vertical line
    on an arrow, and a block of the function dot for each below it. It also has 4
    texts at the bottom that read got 1, 2, 3, and 4.


    Figure 13-24


    ForEach operator


    When an exception is thrown in the supplier function, forEach sends a `cancel`
    signal upstream, and the resulting `CompletionStage` is completed exceptionally.


    *   ① Each item is logged


    *   ② Resulting `CompletionStage` is `[Completed exceptionally: java.lang.RuntimeException:
    BOOM!]`


    ```

    ReactiveStreams.of(1, 2, 3, 4)

    .forEach(i -> log("Got " + i))  ①

    .run()

    ReactiveStreams.of(1, 2, 3, 4)

    .forEach(i -> {

    throw new RuntimeException("BOOM!");

    })

    .run()  ②

    Listing 13-30

    forEach Operator Executing Consumer for Each Item

    ```


    ### ignore


    The `ignore` operator is a terminal operator; it works like the `forEach` operator
    with a loop function. The `ignore` operator ignores each `onNext` signal separately
    and completes the resulting `CompletionStage` when the `onComplete` signal is
    received.


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig25_HTML.png)


    A diagram has 4 color gradient circles numbered 1 to 4 with a short vertical line
    on an arrow, and a block of the function dot ignore below it.


    Figure 13-25


    The ignore operator


    ### toList


    The `toList` operator is a terminal operator, it collects all the items from stream
    to `java.util.List` and returns `CompletionStage<List<T>>` completed when `onComplete`
    signal is received.


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig26_HTML.png)


    A diagram has 4 color gradient circles numbered 1 to 4 with a short vertical line
    on an arrow, and a block of the function dot to list below it.


    Figure 13-26


    toList operator


    ```

    List result =

    ReactiveStreams.of(1, 2, 3, 4)

    .toList()

    .run()

    .toCompletableFuture()

    .join();

    Listing 13-31

    The toList Operator Collects All Items to List

    ```


    ### to


    `to` is a composition and terminal operator that allows connection of prepared
    subscriber graphs to a publisher or processor graph builder.


    *   ① Prepared subscriber graph


    *   ② Connecting prepared subscriber to a builder


    ```

    SubscriberBuilder subscriberGraph =  ①

    ReactiveStreams.builder()

    .forEach(i -> log("Got " + i));

    ReactiveStreams.of(1, 2, 3)

    .to(subscriberGraph)  ②

    .run()

    Listing 13-32

    to Operator Connect Subscriber Graph to a Builder

    ```'
