    ## JMS Connector


    JMS stands for Java Message Service, a Java-based messaging API for creating,
    sending, and receiving messages. JMS provides a high-level abstraction of messaging
    allowing multiple vendors to provide messaging over the same API. JMS has become
    a widely adopted messaging standard in the enterprise world, and many messaging
    products, including Oracle WebLogic, Oracle AQ, IBM MQ, Apache ActiveMQ, and JBoss
    Messaging, implement the JMS API. Over this versatility of JMS, the connector
    for reactive messaging opens the door to many messaging brokers at once.


    ```

    io.helidon.messaging.jms

    helidon-messaging-jms


    Listing 13-59

    JMS Connector Dependency

    ```


    ### Injected ConnectionFactory


    While JMS specification heavily relies on the JNDI, Helidon connector supports
    JNDI-less approach for supplying `ConnectionFactory` directly as a CDI bean. Helidon
    MP is a [CDI 3.​0](https://jakarta.ee/specifications/cdi/3.0/jakarta-cdi-spec-3.0.html)
    compliant injection framework. Creating a bean from an instantiated connection
    factory is simple with a CDI producer method or field.


    *   ① Injecting custom configured broker URL


    *   ② Marking method as a bean producer


    *   ③ ConnectionFactory bean must be named to allow referencing from messaging
    configuration


    ```

    @Inject

    @ConfigProperty(name = "jms.broker-url")

    private String brokerUrl;  ①

    @Produces  ②

    @ApplicationScoped  ③

    @Named("activemq-cf")  ④

    public ConnectionFactory connectionFactory() {

    return new ActiveMQConnectionFactory(brokerUrl);

    }

    Listing 13-60

    Supplying JMS ConnectionFactory As a Bean

    ```


    When you have created a ConnectionFactory bean named `activemq-cf`, you can simply
    reference it from messaging configuration.


    *   ① ConnectionFactory initialization needs to configured manually


    *   ② Use named bean `activemq-cf` as JMS ConnectionFactory


    *   ③ User name and password used for JMS connection creation


    ```

    jms.broker-url: tcp://localhost:61616  ①

    mp.messaging:

    connector:

    helidon-jms:

    named-factory: activemq-cf  ②

    user: frank  ③

    password: secret1234

    Listing 13-61

    Use ConnectionFactory Bean in JMS Connector

    ```


    ### Lookup ConnectionFactory over JNDI


    Supplying ConnectionFactory over JNDI lookup is possible, initial JNDI environment
    properties can be configured with `jndi.env-properties`. The JNDI name of the
    actual connection factory needs to be configured with `jndi.jms-factory`.


    *   ① User name and password used for JMS connection creation


    *   ② JNDI name of `ConnectionFactory`


    *   ③ Environment properties used for JNDI initial context creation


    ```

    mp.messaging:

    connector:

    helidon-jms:

    user: frank  ①

    password: secret123

    jndi:

    jms-factory: ConnectionFactory  ②

    env-properties:  ③

    java.naming:

    factory.initial: org.apache.activemq.jndi.ActiveMQInitialContextFactory

    provider.url: tcp://localhost:61616

    Listing 13-62

    Configure Helidon Messaging Connector

    ```


    ### Destination


    To select a queue or topic to publish or consume from, you must configure the
    vendor-specific destination name with `destination` configuration property or
    the JNDI destination identifier with `jndi.destination`. While vendor-specific
    destination works for both injected connection factory and JNDI looked up connection
    factory, JNDI destination configuration works only for JNDI looked up connection
    factory.


    Vendor-specific destination name is a way of identifying destination over JMS
    API without JNDI usage. All JMS vendors provide their own syntax for selecting
    proper queue or topic, for example ArtemisMQ has its own [address model](https://activemq.apache.org/components/artemis/documentation/2.1.0/address-model.html)
    with FQQN (Fully Qualified Queue Names), WebLogic JMS has CDI (Create Destination
    Identifier) and IBM MQ is using [URI (Uniform Resource Identifier)](https://www.ibm.com/docs/en/ibm-mq/9.3%253Ftopic%253Dapplications-creating-destinations-in-jms-application).


    *   ① ActiveMQ specific JNDI queue registration


    *   ② Vendor-specific destination identifier


    *   ③ JNDI destination identifier


    ```

    activemq-cf: org.apache.activemq.jndi.ActiveMQInitialContextFactory

    mp.messaging:

    connector.helidon-jms:

    jndi:

    jms-factory: ConnectionFactory

    env-properties:

    java.naming.factory.initial: ${activemq-cf}

    java.naming.provider.url: tcp://127.0.0.1:61616

    queue.TestQueue1: TestQueue1  ①

    outgoing:

    toJms:

    connector: helidon-jms

    destination: TestQueue1  ②

    type: queue

    incoming:

    fromJms:

    connector: helidon-jms

    jndi.destination: queue.TestQueue1  ③

    type: queue

    Listing 13-63

    Configure Destination with or Without JNDI

    ```


    ### Message


    Reactive messages provided by JMSConnector are extended with special JMS-specific
    methods. For creation of the outgoing message, a handy JMS message builder is
    available.


    *   ① JMS connection produces an extension of standard reactive messaging Message


    *   ② `JmsMessage` provides JMS-specific features; you can access original `JMSMessage`
    object


    *   ③ JMS properties are generically typed


    *   ④ Chaining acknowledgment to ack incoming when outgoing message is acked


    ```

    @Incoming("from-jms")

    @Outgoing("to-jms")

    public Message process(JmsMessage incomingMsg) {  ①

    jakarta.jms.Message original = incomingMsg.getJmsMessage();  ②

    jakarta.jms.Session session = incomingMsg.getJmsSession();

    String propertyValue = incomingMsg.getProperty("my-jms-property");  ③

    return JmsMessage.builder(incomingMsg.getPayload())

    .property("my-jms-property", propertyValue.toUpperCase())

    .onAck(incomingMsg::ack)  ④

    .build();

    }

    Listing 13-64

    Create New JMS Message from Incoming JMS Message

    ```'
