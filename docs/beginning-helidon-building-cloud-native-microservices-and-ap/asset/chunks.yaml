    Listing 4-5  \nWorking Hours Health Check Output"
  raw: '#### Using Project Starter


    The easiest way is to use Project Starter to generate a project with health support.


    The following explains what you need to do.


    1.  Open Project Starter at [`https://helidon.io/starter`](https://helidon.io/starter).


    2.  Select Helidon MP on the Helidon Flavor screen and click Next.


    3.  On the Application Type screen, select Custom and click Next.


    4.  On the Media Support screen, keep Jackson selected or select JSON-B if you
    want to comply with the MicroProfile platform. Click Next.


    5.  On the Observability screen, select Health Checks. You may also select other
    offered options like Metrics and Tracing.


    6.  Click Download to generate your project, or go through the rest of the steps
    to continue configuration.


    #### Using CLI


    You need to have Helidon CLI installed, as explained in Chapter [2](#600147_1_En_2_Chapter.xhtml).


    Start new project generation using the `helidon init` command. CLI and Project
    Starter use the same configuration wizard. Answer questions as explained earlier.
    Once you finish the configuration wizard, and you get a project with health check
    support generated.


    #### Adding Dependencies Manually


    If you want to add health checks support to your existing project, manually add
    dependencies to your Maven project.


    The easiest option is using the `helidon-microprofile` bundle, which contains
    `helidon-microprofile-health` as a transitive dependency.


    ```

    io.helidon.microprofile.bundles

    helidon-microprofile


    ```


    If you don’t want to depend on the bigger `helidon-microprofile` bundle, you can
    add Health support manually by adding the following dependencies to your `pom.xml`.


    *   ① MicroProfile Core dependency


    *   ② MicroProfile Health


    *   ③ Optional built-in checks


    ```

    io.helidon.microprofile.bundles

    helidon-microprofile-core   ①


    io.helidon.microprofile.health

    helidon-microprofile-health ②


    io.helidon.health

    helidon-health-checks       ③


    ```


    ### Built-in Checks


    Helidon comes with built-in health checks that help determine general issues each
    application can face.


    Table 4-3


    Built-in Checks


    | Built-in Check | Description |

    | --- | --- |

    | Deadlock | Liveness check which looks for thread deadlocks with the help of
    `ThreadMXBean`. Returns DOWN if a deadlock is detected. |

    | Disk space | Liveness check returning DOWN if used disk space exceeds the threshold.
    The threshold is configured by the `helidon.health.diskSpace.thresholdPercent`
    configuration property and has a value of 99.99 by default. Users can also configure
    a file system path to check available space using the `helidon.health.diskSpace.path`
    configuration property. Returned JSON entity contains additional disk space information,
    such as total volume size, and available space. |

    | Heap memory | Liveness check returning DOWN if used heap memory goes beyond
    the threshold. The threshold is configured by the `helidon.health.heapMemory.thresholdPercent`
    configuration property and has a value of 98 by default. Returned JSON entity
    contains additional information, such as total memory size, and available memory.
    |


    Listing [4-3](#600147_1_En_4_Chapter.xhtml#PC5) demonstrates the response of Helidon
    liveness health check (`/health/live`) if no custom checks are configured.


    *   ① Overall status


    *   ② Deadlock check


    *   ③ Disk space check


    *   ④ Heap memory check


    ```

    {

    "status" : "UP",                         ①

    "checks" : [

    {

    "name" : "deadlock",               ②

    "status" : "UP"

    },

    {

    "name" : "diskSpace",              ③

    "status" : "UP",

    "data" : {

    "free" : "428.01 GB",

    ...

    }

    },

    {

    "name" : "heapMemory",             ④

    "status" : "UP"

    }

    ]

    }

    Listing 4-3

    Built-in Health Checks

    ```


    ### Custom Checks


    Although built-in health checks provide a basis suitable for all applications,
    you may want to extend its coverage by adding application-specific health checks.
    For example, add database connectivity checks if you are dealing with databases
    or third-party systems checks if you use third-party systems.


    To create your custom health check, add a CDI bean implementing the `org.eclipse.microprofile.health.HealthCheck`
    interface and annotate it with one of the following annotations defining the check
    type.


    *   `@Liveness` for a liveness check


    *   `@Readiness` for a readiness check


    *   `@Startup` for a startup check


    Listing [4-4](#600147_1_En_4_Chapter.xhtml#PC6) is a simple liveness check that
    returns UP only if invoked during working hours.


    *   ① Marks this bean as a liveness health check


    *   ② Makes this class an application-scoped CDI bean


    *   ③ Interface defining `call()` method invoked every time a health check is
    probed


    *   ④ Status computation


    ```

    @Liveness                                               ①

    @ApplicationScoped                                      ②

    public class WorkingHoursCheck implements HealthCheck { ③

    @Override

    public HealthCheckResponse call() {

    return HealthCheckResponse.builder()

    .name("working-hours-check")

    .withData("time", LocalDateTime.now()

    .toString())

    .status(getStatus())                    ④

    .build();

    }

    private boolean getStatus() {

    int hour = LocalDateTime.now().getHour();

    return hour >= 9 && hour <= 17;

    }

    }

    Listing 4-4

    Working Hours Liveness Custom Check

    ```


    Note


    You can find sample application sources in the GitHub repository at: [`https://github.com/apress/beginning-helidon`](https://github.com/apress/beginning-helidon).


    When running between 9:00 and 18:00 your local time, you see an output like the
    one listed in Listing [4-5](#600147_1_En_4_Chapter.xhtml#PC7).


    ```

    {

    "status": "UP",

    "checks": [

    ...

    {

    "name": "working-hours-check",

    "status": "UP",

    "data": {

    "time": "2022-05-29T14:00:09.119199400"

    }

    }

    ]

    }

    Listing 4-5

    Working Hours Health Check Output

    ```'
  trans: '

    #### 使用 Project Starter


    最简单的方法是使用 Project Starter 生成一个带有健康检查支持的项目。


    以下说明了你需要执行的操作。


    1.  在[`https://helidon.io/starter`](https://helidon.io/starter)打开 Project Starter。


    2.  在 Helidon Flavor 页面选择 Helidon MP，然后点击 Next。


    3.  在 Application Type 页面选择 Custom，然后点击 Next。


    4.  在 Media Support 页面，保持 Jackson 被选中；如果你希望符合 MicroProfile 平台，也可以选择 JSON-B。点击
    Next。


    5.  在 Observability 页面，选择 Health Checks。你也可以选择其他提供的选项，例如 Metrics 和 Tracing。


    6.  点击 Download 以生成你的项目，或者继续完成其余步骤以继续配置。


    #### 使用 CLI


    你需要先安装 Helidon CLI，具体说明见第 2 章。


    使用`helidon init`命令开始生成新项目。CLI 和 Project Starter 使用同一个配置向导。请按照前文说明回答问题。完成配置向导后，你将得到一个已启用健康检查支持的项目。


    #### 手动添加依赖


    如果你想为现有项目添加健康检查支持，请在你的 Maven 项目中手动添加依赖。


    最简单的方式是使用`helidon-microprofile`包，其中通过传递依赖包含了`helidon-microprofile-health`。


    ```

    io.helidon.microprofile.bundles

    helidon-microprofile


    ```


    如果你不想依赖较大的`helidon-microprofile`包，也可以通过在`pom.xml`中添加以下依赖来手动启用 Health 支持。


    *   ① MicroProfile Core 依赖


    *   ② MicroProfile Health


    *   ③ 可选内置检查


    ```

    io.helidon.microprofile.bundles

    helidon-microprofile-core   ①


    io.helidon.microprofile.health

    helidon-microprofile-health ②


    io.helidon.health

    helidon-health-checks       ③


    ```


    ### 内置检查


    Helidon 提供了内置健康检查，可帮助判断每个应用都可能遇到的一般性问题。


    表 4-3


    内置检查


    | 内置检查 | 描述 |

    | --- | --- |

    | Deadlock | 存活性检查，借助`ThreadMXBean`查找线程死锁。如果检测到死锁则返回 DOWN。 |

    | Disk space | 存活性检查：当已用磁盘空间超过阈值时返回 DOWN。该阈值由配置属性`helidon.health.diskSpace.thresholdPercent`设定，默认值为
    99.99。用户还可以使用配置属性`helidon.health.diskSpace.path`配置要检查可用空间的文件系统路径。返回的 JSON 实体还包含额外的磁盘空间信息，例如总卷大小和可用空间。
    |

    | Heap memory | 存活性检查：当已用堆内存超过阈值时返回 DOWN。该阈值由配置属性`helidon.health.heapMemory.thresholdPercent`设定，默认值为
    98。返回的 JSON 实体还包含额外信息，例如内存总量和可用内存。 |


    清单 4-3 演示了在未配置任何自定义检查时，Helidon 存活性健康检查（`/health/live`）的响应。


    *   ① 总体状态


    *   ② Deadlock 检查


    *   ③ Disk space 检查


    *   ④ Heap memory 检查


    ```

    {

    "status" : "UP",                         ①

    "checks" : [

    {

    "name" : "deadlock",               ②

    "status" : "UP"

    },

    {

    "name" : "diskSpace",              ③

    "status" : "UP",

    "data" : {

    "free" : "428.01 GB",

    ...

    }

    },

    {

    "name" : "heapMemory",             ④

    "status" : "UP"

    }

    ]

    }

    Listing 4-3

    Built-in Health Checks

    ```


    ### 自定义检查


    虽然内置健康检查为所有应用提供了通用基础，但你可能希望通过添加应用特定的健康检查来扩展覆盖范围。例如，如果你使用数据库，可以添加数据库连接检查；如果你依赖第三方系统，可以添加第三方系统检查。


    要创建自定义健康检查，请添加一个实现`org.eclipse.microprofile.health.HealthCheck`接口的 CDI Bean，并使用以下注解之一来定义检查类型。


    *   用于存活性检查的`@Liveness`


    *   用于就绪性检查的`@Readiness`


    *   用于启动检查的`@Startup`


    清单 4-4 是一个简单的存活性检查：仅在工作时间被调用时返回 UP。


    *   ① 将此 Bean 标记为存活性健康检查


    *   ② 使该类成为应用作用域的 CDI Bean


    *   ③ 定义`call()`方法的接口，该方法会在每次探测健康检查时被调用


    *   ④ 状态计算


    ```

    @Liveness                                               ①

    @ApplicationScoped                                      ②

    public class WorkingHoursCheck implements HealthCheck { ③

    @Override

    public HealthCheckResponse call() {

    return HealthCheckResponse.builder()

    .name("working-hours-check")

    .withData("time", LocalDateTime.now()

    .toString())

    .status(getStatus())                    ④

    .build();

    }

    private boolean getStatus() {

    int hour = LocalDateTime.now().getHour();

    return hour >= 9 && hour <= 17;

    }

    }

    Listing 4-4

    Working Hours Liveness Custom Check

    ```


    注意


    你可以在 GitHub 仓库中找到示例应用源码：[`https://github.com/apress/beginning-helidon`](https://github.com/apress/beginning-helidon)。


    当你的本地时间在 9:00 到 18:00 之间运行时，你会看到类似清单 4-5 所示的输出。


    ```

    {

    "status": "UP",

    "checks": [

    ...

    {

    "name": "working-hours-check",

    "status": "UP",

    "data": {

    "time": "2022-05-29T14:00:09.119199400"

    }

    }

    ]

    }

    Listing 4-5

    Working Hours Health Check Output

    ```

