    \        jms-factory: ConnectionFactory  # ②\n        env-properties:  # ③\n \
    \         java.naming:\n            factory.initial: org.apache.activemq.jndi.ActiveMQInitialContextFactory\n\
    \            provider.url: tcp://localhost:61616\n```\n\nListing 13-62  \nConfigure\
    \ Helidon Messaging Connector\n\n### Destination\n\nTo select a queue or topic\
    \ to publish or consume from, you must configure the vendor-specific destination\
    \ name with `destination` configuration property or the `JNDI` destination identifier\
    \ with `jndi.destination`. While vendor-specific destination works for both injected\
    \ connection factory and `JNDI` looked up connection factory, `JNDI` destination\
    \ configuration works only for `JNDI` looked up connection factory.\n\nVendor-specific\
    \ destination name is a way of identifying destination over `JMS` API without\
    \ `JNDI` usage. All `JMS` vendors provide their own syntax for selecting proper\
    \ queue or topic, for example ArtemisMQ has its own address model with `FQQN`\
    \ (`Fully Qualified Queue Names`), WebLogic `JMS` has `CDI` (`Create Destination\
    \ Identifier`) and IBM MQ is using `URI` (`Uniform Resource Identifier`)。\n\n\
    - ① ActiveMQ specific `JNDI` queue registration\n- ② Vendor-specific destination\
    \ identifier\n- ③ `JNDI` destination identifier\n\n```yaml\nactivemq-cf: org.apache.activemq.jndi.ActiveMQInitialContextFactory\n\
    mp.messaging:\n  connector.helidon-jms:\n    jndi:\n      jms-factory: ConnectionFactory\n\
    \      env-properties:\n        java.naming.factory.initial: ${activemq-cf}\n\
    \        java.naming.provider.url: tcp://127.0.0.1:61616\n        queue.TestQueue1:\
    \ TestQueue1  # ①\n  outgoing:\n    toJms:\n      connector: helidon-jms\n   \
    \   destination: TestQueue1  # ②\n      type: queue\n  incoming:\n    fromJms:\n\
    \      connector: helidon-jms\n      jndi.destination: queue.TestQueue1  # ③\n\
    \      type: queue\n```\n\nListing 13-63  \nConfigure Destination with or Without\
    \ JNDI\n\n### Message\n\nReactive messages provided by `JMSConnector` are extended\
    \ with special `JMS`-specific methods. For creation of the outgoing message, a\
