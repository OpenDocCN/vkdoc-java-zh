  raw: '### Which Flavor Should You Use?


    Note


    Your application must be either a Helidon MP application or a Helidon SE application.


    You can use Helidon SE functionality in your Helidon MP applications, but not
    vice versa. It’s a consequence of Helidon’s design. Helidon SE belongs to a lower
    layer and isn’t aware of Helidon MP’s existence. Also, most Helidon MP features
    require an initialized CDI container which doesn’t exist in Helidon SE by design.
    Referring to my game example, you cannot play with two characters simultaneously.
    But your sorcerer can use a dagger sometimes when magic is not efficient enough.


    A good example of using Helidon SE functionality in Helidon MP is reactive messaging
    (covered in Chapter [13](#600147_1_En_13_Chapter.xhtml)).


    So which flavor should you use in your application? When in doubt, use Helidon
    MP.


    Tip


    If you don’t know which flavor to use, use Helidon MP.


    Table [1-2](#600147_1_En_1_Chapter.xhtml#Tab2) is a collection of recommendations.


    Table 1-2


    Helidon Flavors Recommendations


    | Use Helidon MP | Use Helidon SE |

    | --- | --- |

    | • You don’t know what flavor to choose.• You want to use CDI and other MicroProfile
    or Jakarta EE APIs.• You are migrating from the existing Java EE/Jakarta EE application.• You
    are a Spring Boot or Java EE developer and want a similar development experience.
    | • Performance achieved by heavy usage of concurrency is your primary goal.• You
    want to have complete control of your application.• You have experience with reactive
    programming.• Your application deals with uploading files.• Your application is
    not CDI based, and you are not planning to use any MicroProfile and Jakarta EE
    APIs. |


    This book is mainly about Helidon MP, but Helidon SE is briefly covered in Chapter
    [15](#600147_1_En_15_Chapter.xhtml).


    ## Summary


    *   Applications designed to operate in a cloud environment utilizing all cloud
    benefits are called *cloud native*.


    *   Helidon is a set of Java libraries for developing cloud-native services.


    *   Helidon comes in two flavors: Helidon MP (declarative style APIs implementing
    MicroProfile and some Jakarta EE specifications) and Helidon SE (reactive, non-blocking
    APIs).


    If you don’t know which flavor to use, use Helidon MP.


    # 2. Your First Application


    This chapter covers the following topics.


    *   Creating a Helidon application using Project Starter, a command-line interface
    (CLI), or Maven archetypes


    *   Building an executable JAR, jlink-optimized JVM, and GraalVM Native Image


    *   Making a Docker image and deploying it to Kubernetes


    This is the first practical chapter offering hands-on coding. It’s interesting
    how book-writing methods have evolved. In the early 1990s, technical books were
    quite boring to read. The authors didn’t care much about making the book entertaining.
    Studying is work, and work is challenging. Reading books requires thinking about
    every sentence and understanding the author’s words. It was difficult, but it
    forced your brain to work. Now it’s changed. Technical books try to be easy and
    fun to read while delivering the same amount of pure knowledge. These books are
    also easier and more fun to write. We want to make our book easy to read; this
    short introduction is part of “making it fun.”


    ## Generating Your First Application


    What’s the first thing a developer starting with Helidon should do? Create a project
    and start coding, of course. Let’s do that now.


    Tip


    There are three ways to create a new Helidon project: a command-line interface
    (CLI), Project Starter, or Maven archetypes.


    ### Helidon CLI


    Helidon CLI is a command-line utility that simplifies your work with Helidon.
    Using CLI, you can create a project based on provided templates. It also has a
    feature called developer loop. When a source code change is detected, it automatically
    recompiles and restarts your application. We’ll take a deeper look at it later.
    Now, let’s install CLI and generate our first project.


    First, you must ensure that JDK 17 and the latest version of Maven are installed.
    To check it, type **java -version** and **mvn -version** in your terminal. You
    should have an output similar to the following.


    ```

    $ java -version

    java version "17.0.2" 2022-01-18 LTS

    Java(TM) SE Runtime Environment (build 17.0.2+8-LTS-86)

    Java HotSpot(TM) 64-Bit Server VM (build 17.0.2+8-LTS-86, mixed mode, sharing)

    $ mvn -version

    Apache Maven 3.8.6 (84538c9988a25aec085021c365c560670ad80f63)

    Maven home: /usr/local/Cellar/maven/3.8.6/libexec

    Java version: 18.0.1.1, vendor: Homebrew, runtime: /usr/local/Cellar/openjdk/18.0.1.1/libexec/openjdk.jdk/Contents/Home

    Default locale: en_RU, platform encoding: UTF-8

    OS name: "mac os x", version: "12.5", arch: "x86_64", family: "mac"

    ```


    If not, please install JDK and Maven. Detailed instructions on how to do this
    can be found on the Internet.


    Now, let’s install CLI. Installation commands depend on the operating system you
    are using.


    Use the following if you are on macOS.


    ```

    curl -O https://helidon.io/cli/latest/darwin/helidon

    chmod +x ./helidon

    sudo mv ./helidon /usr/local/bin/

    ```


    Use the following if you are on Linux.


    ```

    curl -O https://helidon.io/cli/latest/linux/helidon

    chmod +x ./helidon

    sudo mv ./helidon /usr/local/bin/

    ```


    If you are on Windows, you must run PowerShell as administrator and execute the
    following command.


    ```

    PowerShell -Command Invoke-WebRequest -Uri "https://helidon.io/cli/latest/windows/helidon.exe"
    -OutFile "C:\Windows\system32\helidon.exe"

    ```


    Type **helidon** in your command prompt to test that CLI has been installed. A
    screen with short instructions should confirm the successful CLI setup.


    ```

    $ helidon

    Helidon command line tool

    Usage: helidon [OPTIONS] COMMAND

    Options

    -D=    Define a system property

    --verbose           Produce verbose output

    --debug             Produce debug output

    --plain             Do not use color or styles in output

    Commands

    build               Build the application

    dev                 Continuous application development

    info                Print project information

    init                Generate a new project

    version             Print version information

    Run helidon COMMAND --help for more information on a command.

    ```


    When CLI is installed, it’s time to generate your first project and see what’s
    been generated. Use the `init` command to initiate the process.


    ```

    $ helidon init

    ```


    You are asked questions about a project you want to generate. The first question
    is about a Helidon flavor to use in your project.


    ```

    | Helidon Flavor

    Select a Flavor

    (1) se | Helidon SE

    (2) mp | Helidon MP

    Enter selection (default: 1):2

    ```


    You want to use the MP flavor, so type **2** in the command prompt.


    The next question is about the type of project to generate.


    ```

    | Application Type

    Select an Application Type

    (1) quickstart | Quickstart

    (2) database   | Database

    (3) custom     | Custom

    Enter selection (default: 1):1

    ```


    There are three options.


    *   **Quickstart** generates a Maven project with all dependencies, Dockerfiles,
    Kubernetes application descriptors, and a simple greeting service application
    containing a sample of a RESTful service and all needed bootstrap code. If you
    plan to develop a RESTful service, it’s a good option.


    *   **Database** is the best option if your application works with databases.
    The generated project contains all needed third-party dependencies, configuration
    files, and bootstrap code.'
  trans: '

    ### 你应该使用哪种风味？


    注意


    你的应用必须是 Helidon MP 应用或 Helidon SE 应用之一。


    你可以在 Helidon MP 应用中使用 Helidon SE 的功能，但反过来不行。这是 Helidon 设计带来的结果。Helidon SE 属于更底层，不知道
    Helidon MP 的存在。此外，大多数 Helidon MP 特性都需要已初始化的 CDI 容器，而 Helidon SE 按设计并不存在该容器。借用我的游戏示例，你不能同时操控两个角色。但你的法师在魔法不够高效时，偶尔可以使用匕首。


    在 Helidon MP 中使用 Helidon SE 功能的一个很好的例子是响应式消息（见第 13 章）。


    那么你的应用应该使用哪种风味？如果拿不准，就用 Helidon MP。


    提示


    如果你不知道该使用哪种风味，就使用 Helidon MP。


    表 1-2 汇总了一些建议。


    表 1-2


    Helidon 风味使用建议


    | 使用 Helidon MP | 使用 Helidon SE |

    | --- | --- |

    | • 你不知道该选哪种风味。• 你想使用 CDI 以及其他 MicroProfile 或 Jakarta EE API。• 你正在从现有 Java EE/Jakarta
    EE 应用迁移。• 你是 Spring Boot 或 Java EE 开发者，并希望获得类似的开发体验。 | • 通过大量并发使用获得性能是你的首要目标。• 你希望完全掌控应用。• 你有响应式编程经验。• 你的应用涉及文件上传。• 你的应用不是基于
    CDI，且你不打算使用任何 MicroProfile 和 Jakarta EE API。 |


    本书主要讲 Helidon MP，但第 15 章也会简要介绍 Helidon SE。


    ## 总结


    *   在云环境中运行并充分利用云能力而设计的应用，被称为*云原生*。


    *   Helidon 是一组用于开发云原生服务的 Java 库。


    *   Helidon 有两种风味：Helidon MP（声明式风格 API，实现了 MicroProfile 以及部分 Jakarta EE 规范）和 Helidon
    SE（响应式、非阻塞 API）。


    如果你不知道该使用哪种风味，就使用 Helidon MP。


    # 2. 你的第一个应用


    本章涵盖以下主题。


    *   使用 Project Starter、命令行界面（CLI）或 Maven 原型创建 Helidon 应用


    *   构建可执行 JAR、jlink 优化的 JVM，以及 GraalVM Native Image


    *   制作 Docker 镜像并将其部署到 Kubernetes


    这是第一章实践内容，提供了动手编码环节。很有意思的是，写书的方法也在演进。20 世纪 90 年代早期，技术书读起来相当枯燥。作者并不太在意让书更有趣。学习是工作，而工作是有挑战的。读书需要思考每一句话并理解作者表达的内容。这很难，但会迫使你的大脑运转。现在情况变了。技术书在传递同等“纯知识”量的同时，努力做到更易读、更有趣。这类书写起来也更轻松、更有趣。我们希望这本书易于阅读；这段简短的引言就是“让它更有趣”的一部分。


    ## 生成你的第一个应用


    刚开始接触 Helidon 的开发者第一件事应该做什么？当然是创建项目并开始编码。我们现在就来做。


    提示


    创建新的 Helidon 项目有三种方式：命令行界面（CLI）、Project Starter 或 Maven 原型。


    ### Helidon CLI


    Helidon CLI 是一个命令行工具，可简化你使用 Helidon 的工作。借助 CLI，你可以基于提供的模板创建项目。它还有一个叫做开发者循环（developer
    loop）的功能：当检测到源代码变化时，会自动重新编译并重启应用。我们稍后会深入了解。现在，先安装 CLI 并生成第一个项目。


    首先，你必须确保已安装 JDK 17 和最新版本的 Maven。要检查，请在终端输入 **java -version** 和 **mvn -version**。你应看到类似如下输出。


    ```

    $ java -version

    java version "17.0.2" 2022-01-18 LTS

    Java(TM) SE Runtime Environment (build 17.0.2+8-LTS-86)

    Java HotSpot(TM) 64-Bit Server VM (build 17.0.2+8-LTS-86, mixed mode, sharing)

    $ mvn -version

    Apache Maven 3.8.6 (84538c9988a25aec085021c365c560670ad80f63)

    Maven home: /usr/local/Cellar/maven/3.8.6/libexec

    Java version: 18.0.1.1, vendor: Homebrew, runtime: /usr/local/Cellar/openjdk/18.0.1.1/libexec/openjdk.jdk/Contents/Home

    Default locale: en_RU, platform encoding: UTF-8

    OS name: "mac os x", version: "12.5", arch: "x86_64", family: "mac"

    ```


    如果没有，请安装 JDK 和 Maven。关于如何安装的详细说明可以在网上找到。


    现在，我们来安装 CLI。安装命令取决于你使用的操作系统。


    如果你使用 macOS，请执行以下命令。


    ```

    curl -O https://helidon.io/cli/latest/darwin/helidon

    chmod +x ./helidon

    sudo mv ./helidon /usr/local/bin/

    ```


    如果你使用 Linux，请执行以下命令。


    ```

    curl -O https://helidon.io/cli/latest/linux/helidon

    chmod +x ./helidon

    sudo mv ./helidon /usr/local/bin/

    ```


    如果你使用 Windows，必须以管理员身份运行 PowerShell，并执行以下命令。


    ```

    PowerShell -Command Invoke-WebRequest -Uri "https://helidon.io/cli/latest/windows/helidon.exe"
    -OutFile "C:\Windows\system32\helidon.exe"

    ```


    在命令提示符中输入 **helidon**，测试 CLI 是否安装成功。若出现带有简短说明的界面，即表示 CLI 配置成功。


    ```

    $ helidon

    Helidon command line tool

    Usage: helidon [OPTIONS] COMMAND

    Options

    -D=    Define a system property

    --verbose           Produce verbose output

    --debug             Produce debug output

    --plain             Do not use color or styles in output

    Commands

    build               Build the application

    dev                 Continuous application development

    info                Print project information

    init                Generate a new project

    version             Print version information

    Run helidon COMMAND --help for more information on a command.

    ```


    安装好 CLI 后，就该生成你的第一个项目，并看看生成了什么。使用 `init` 命令启动该过程。


    ```

    $ helidon init

    ```


    系统会询问你希望生成的项目信息。第一个问题是项目要使用哪种 Helidon 风味。


    ```

    | Helidon Flavor

    Select a Flavor

    (1) se | Helidon SE

    (2) mp | Helidon MP

    Enter selection (default: 1):2

    ```


    你要使用 MP 风味，因此在命令提示符中输入 **2**。


    下一个问题是要生成哪种类型的项目。


    ```

    | Application Type

    Select an Application Type

    (1) quickstart | Quickstart

    (2) database   | Database

    (3) custom     | Custom

    Enter selection (default: 1):1

    ```


    这里有三个选项。


    *   **Quickstart** 会生成一个 Maven 项目，包含所有依赖、Dockerfile、Kubernetes 应用描述文件，以及一个简单的问候服务应用，其中包含
    RESTful 服务示例和所需的全部引导代码。如果你计划开发 RESTful 服务，这是个不错的选择。


    *   **Database** 是当你的应用与数据库交互时的最佳选项。生成的项目包含所需的全部第三方依赖、配置文件和引导代码。

