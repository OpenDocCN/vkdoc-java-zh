    Deployment of Helidon applications to Verrazzano is really easy. When you create
    a new Helidon project using CLI or [http://​helidon.​io/​starter](http://helidon.io/starter),
    you can specify that you need a docker file and a Verrazzano descriptor. Two files
    are generated: `component.yaml` and `application.yaml`. Apply them with the `kubectl`
