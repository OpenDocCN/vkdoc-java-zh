    ### 事务


    有时，一个重要操作需要与数据库进行多次交互。这些交互会被归为一个*事务*。这意味着要么所有交互都执行，要么一个都不执行。数据库绝不能处于损坏状态，比如部分数据已被修改而其他数据未被触及。这是数据库引擎的关键特性之一——确保
    ACID（原子性、一致性、隔离性、持久性）。这些事务特性对于在发生错误或故障时保证数据准确性至关重要。


    为此，JPA 要求使用事务引擎，而通常使用 Jakarta Transactions API（或 JTA）。它使我们能够以与资源无关的方式启动、提交和回滚事务。与
    JPA 一样，JTA 不是工具或框架，而是一个应由其他供应商实现的开放标准规范。Helidon MP 使用 Narayana 事务引擎作为 JTA 的实现。它使我们可以在
    Java 代码中使用 `@jakarta.transaction.Transactional` 来声明 JTA 事务。你只需用前述注解标注一个方法，该方法中所有对数据库的调用都会在一个事务中执行。如果出现问题，数据不会损坏，也不会以中间状态保存。JTA
    并不仅限于数据库场景。它可以以一致且协调的方式管理多种不同类型的资源（例如消息系统）。


    让我们在 Pokemon 管理服务中加入一些事务方法。首先，你需要一些 Maven 依赖，如清单 6-13 所示。


    *   ① Jakarta Transactions API 核心依赖


    *   ② Helidon Narayana CDI 扩展


    ```

    jakarta.transaction

    jakarta.transaction-api    ①


    io.helidon.integrations.cdi

    helidon-integrations-cdi-jta-weld                                       ②

    runtime


    Listing 6-13

    Transaction Dependencies

    ```


    事务方法最合适的候选是 `DELETE` 和 `CREATE` 方法。


    对于 `DELETE` 方法，第一步是验证 `Pokemon` 是否存在。这需要先从数据库中取回它。随后执行删除 `Pokemon` 并保存状态，整个过程应当是一个原子操作。比如说，即使在第一步中成功取回了
    `Pokemon`，在同一方法中执行 `remove(pokemon)` 之前（但在另一个线程中），它也有可能已经被修改或删除。


    对于 `CREATE` 方法，你必须先从数据库中获取 `PokemonType`，然后将其赋给新创建的 `Pokemon` 实例。和前一种情况一样，你必须确保这个
    `PokemonType` 存在。因此，这一系列操作必须作为单个活动执行。你不会希望在 `PokemonType` 分配给新 `Pokemon` 之前，它就被删除或修改。


    *   ① 方法应当属于一个新事务的一部分


    *   ② 使用 `entityManager` 的 `remove` 方法从数据库删除一个 Pokemon


    *   ③ 所有与数据库的交互都应在事务中进行


    *   ④ 将 `PokemonType` 分配给给定的 `Pokemon`，调用 `entityManager` 执行 `getPokemonTypeById`
    命名查询以查找类型，将该类型设置给给定的 `pokemon`，并使用 `entityManager` 将数据持久化到数据库中


    ```

    @Path("pokemon")

    public class PokemonResource {

    //.. previous methods omitted

    @DELETE

    @Path("{id}")

    @Produces(MediaType.APPLICATION_JSON)

    @Transactional(Transactional.TxType.REQUIRED)        ①

    public void deletePokemon(@PathParam("id") String id) {

    Pokemon pokemon = getPokemonById(id);

    entityManager.remove(pokemon);                   ②

    }

    @POST

    @Consumes(MediaType.APPLICATION_JSON)

    @Transactional(Transactional.TxType.REQUIRED)        ③

    public void createPokemon(Pokemon pokemon) {

    try {

    PokemonType pokemonType = entityManager

    .createNamedQuery("getPokemonTypeById", PokemonType.class)                       ④

    .setParameter("id", pokemon.getType()).getSingleResult();

    pokemon.setPokemonType(pokemonType);

    entityManager.persist(pokemon);

    } catch (Exception e) {

    throw new BadRequestException("Unable to " +

    "create pokemon with ID " + pokemon.getId());

    }

    }

    }

    Listing 6-14

    Pokemon Resource

    ```


    事务这个主题相当复杂，在计算机科学中占据了很大篇幅。本书不会深入讲解如何以及在何处使用事务，因为这在专门讲事务的书籍中已有很好的阐述。JPA 及其提供者——Hibernate
    和 EclipseLink——也是如此。


    本章只是浅尝了 JPA 的能力，以及它通过处理所有 ORM 工作能为你节省多少时间。但如果你需要将复杂对象结构映射到复杂关系模型，请查阅该主题的专门书籍。


    这一部分的核心信息是让我们熟悉 JPA 和 JTA，并了解 Helidon 在容器管理模式下为 JPA 和 JTA 提供了完整支持。


    ## 总结


    *   微服务通过数据库进行数据持久化，而 Helidon 提供了多种访问和持久化数据的方式。


    *   Helidon 支持 JDBC 和 DataSource，可用于基于 JDBC 支持的数据库进行底层操作。


    *   Helidon 支持使用 JPA 的标准数据访问方式，并可选择 Hibernate 或 EclipseLink 作为提供者。它几乎可以像常规 Jakarta/Java
    EE 应用程序一样无明显限制地使用。


    # 7. 弹性


    本章涵盖以下主题。


    *   使用重试机制


    *   定义回退方法


    *   异步调用方法


    *   限制方法执行时间


    *   控制并行执行数量


    *   组合使用故障容错特性


    服务发生故障是不可避免的！听起来很严峻，但对任何开发者来说都不应意外：在程序生命周期的某个阶段，总会有事情无法按预期运行。系统越复杂，故障发生的概率越高。就像汽车制造商需要安装安全气囊一样，你也必须通过合适的对策让代码为故障做好准备。网络有问题？重试调用。并发调用太多？限制争用。业务方法执行太久？使用超时。消息发送失败？将其存入错误队列。听起来很简单，对吧？用几轮
    try/catch，启动一个监控线程，再管理一个额外线程池。


    好吧，事情没那么简单，而且你并不需要每次都重复造轮子。这里可能有大量*关键任务代码*需要被正确实现。


    当你意识到这些用例不断重复，而且相关功能可以在幕后为你完成时，这一切“魔法”就会变成模板化能力。Helidon 提供了 MicroProfile Fault
    Tolerance 的实现，你只需用合适的注解标注 bean 方法，就能在你预期代码可能失败的场景中获得帮助。


    Fault Tolerance 提供了以下注解，以帮助应对各种用例*。*


    *   **重试（Retry）**：当抛出异常时，按配置次数重试被注解的 bean 方法。


    *   **回退（Fallback）**：如果被注解的方法抛出异常，则调用配置的处理器或方法。


    *   **异步（Asynchronous）**：在新线程上执行被注解的方法。


    *   **超时（Timeout）**：监控被注解方法的执行时间，运行过久时中断它。


    *   **熔断器（Circuit Breaker）**：跟踪被注解方法执行失败比例，达到阈值时拒绝新的调用。


    *   **舱壁（Bulkhead）**：监控被注解方法上的争用情况，当争用过高时阻塞或拒绝其他线程。

