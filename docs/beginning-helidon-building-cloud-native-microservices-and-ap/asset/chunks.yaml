    *This is for my mother.*


    *I miss you…*


    *—Dmitry Kornilov*


    *To my extraordinary wife, who somehow managed to put up with my endless late-night
    writing sessions. I love you.*


    *—Daniel Kec*


    *To my parents. They are the real heroes.*


    *—Dmitry Aleksandrov*


    Introduction


    Helidon is a Java framework for developing cloud-native microservices. Its performance,
    lightweight approach, and convenient APIs quickly became popular in the Java community.
    This book is all you need to get started with Helidon, and it will teach you how
    to use it effectively. It’s written by the Helidon developers, who know best how
    the framework is designed to be used. A significant part of the book is dedicated
    to MicroProfile APIs and specifications which are explained in detail.


    After reading this book, you will be able to do the following.


    *   Create and consume RESTful services


    *   Package and deploy your applications to Kubernetes


    *   Develop observable applications and utilize health checks, metrics, and tracing


    *   Secure your services using OpenID Connect


    *   Work with data


    *   Make your applications resilient


    *   Understand and use reactive messaging and reactive streams


    ## Who This Book Is For


    This book is for developers and architects who want to start developing cloud-native
    applications using Helidon, for developers interested in developing portable applications
    using MicroProfile and Jakarta EE, and those who are looking for preparation materials
    for Oracle Helidon Microservices Developer Professional certification.


    ## Helidon Certification


    Oracle announced the Helidon Microservices Developer Professional certification
    and the corresponding course to prove microservices development skills. The book
    authors participated in the exam and the course development. The book is designed
    as an additional preparation material for the certification test. Although the
    book covers Helidon version 3.x and the exam is created from the previous version
    of Helidon (2.x), it covers all certification topics, provides additional information,
    and explains technologies from a different angle.


    You can find more information on the official page at [`https://mylearn.oracle.com/ou/learning-path/become-a-helidon-microservices-developer-professional/114512`](https://mylearn.oracle.com/ou/learning-path/become-a-helidon-microservices-developer-professional/114512).


    ## What This Book Covers


    Chapter [1](#600147_1_En_1_Chapter.xhtml) introduces Helidon and explains its
    key advantages. It also discusses two Helidon flavors and explains the differences
    between them.


    Chapter [2](#600147_1_En_2_Chapter.xhtml) introduces various tools for bootstrapping
    creating Helidon applications such as Helidon CLI, Project Starter, and Maven
    Archetypes; explains how to create your first application, build it using different
    profiles (executable jars, JLink images, and GraalVM native images), create a
    docker image and deploy it to Kubernetes.


    Chapter [3](#600147_1_En_3_Chapter.xhtml) explains how to configure Helidon applications,
    introduces MicroProfile Config specification; explains concepts of config sources,
    defaults, and profiles; demonstrates integration with Kubernetes config maps.


    Chapter [4](#600147_1_En_4_Chapter.xhtml) explains observability and why it’s
    important for microservices, covers concepts of health checks, metrics, tracing,
    and logging, as well as the corresponding MicroProfile specifications.


    Chapter [5](#600147_1_En_5_Chapter.xhtml) explains how to call other services
    in your Helidon application. It covers MicroProfile Rest Client and cross-origin
    resource sharing (CORS).


    Chapter [6](#600147_1_En_6_Chapter.xhtml) explains how to work with databases,
    query, and update data using JDBC and Jakarta Persistence.


    Chapter [7](#600147_1_En_7_Chapter.xhtml) discusses how to make your application
    resilient using MicroProfile Fault Tolerance APIs and explains timeout, retry,
    fallback, bulkhead, and circuit breaker concepts.


    Chapter [8](#600147_1_En_8_Chapter.xhtml) explains how to secure your applications.
    It covers OpenID Connect and MicroProfile JWT RBAC specifications.


    Chapter [9](#600147_1_En_9_Chapter.xhtml) explains how to document your APIs using
    OpenAPI and how to automatically generate clients based on it.


    Chapter [10](#600147_1_En_10_Chapter.xhtml) explains how to test your applications
    using JUnit since Helidon integrates well with this framework.


    Chapter [11](#600147_1_En_11_Chapter.xhtml) explains how you can schedule tasks
    in your Helidon applications.


    Chapter [12](#600147_1_En_12_Chapter.xhtml) explains how well Helidon is integrated
    with other technologies like Neo4j, Verrazzano, Coherence CE, and the Kotlin programming
    language.


    Chapter [13](#600147_1_En_13_Chapter.xhtml) explains how to use some reactive
    functionality in your Helidon applications. It covers MicroProfile Reactive Stream
    Operators, MicroProfile Reactive Messaging specifications and integration with
    Kafka.


    Chapter [14](#600147_1_En_14_Chapter.xhtml) explains how to use distributed transactions
    in Helidon applications. It covers the Saga pattern and MicroProfile LRA specification.


    Chapter [15](#600147_1_En_15_Chapter.xhtml) introduces Helidon SE - the reactive
    flavor of Helidon. It guides you through creating the first Helidon SE application,
    using different build profiles (executable jars, JLink images, GraalVM native
    images), and deploying it to Kubernetes.


    ## Sample Code


    You can access sources of all book samples in the book’s official GitHub repository
    at [`https://github.com/Apress/Beginning-Helidon`](https://github.com/Apress/Beginning-Helidon).


    To compile samples, you need the following tools installed:


    *   Linux or macOS environment. On Windows we recommend using Windows Subsystem
    for Linux (WSL).


    *   JDK 17


    *   Maven 3.9.0


    *   Some samples rely on using utilities like cURL


    If you found issues with the sample code, please file it in the issues tracker
    at [`https://github.com/Apress/Beginning-Helidon/issues`](https://github.com/Apress/Beginning-Helidon/issues).


    Preface'
