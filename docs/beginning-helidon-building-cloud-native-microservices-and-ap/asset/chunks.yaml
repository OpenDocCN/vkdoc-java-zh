  raw: '# 13. Going Reactive


    This chapter covers the following topics.


    *   Using Reactive Streams instead of simple callbacks on asynchronous APIs


    *   Understanding the inner structure of Reactive Streams


    *   Connecting streams together


    *   Using Helidon’s reactive stream operators, producing and consuming data


    The last few years have seen emerging technological trends in the never-ending
    chase after better performance. APIs started to change from a *here is my thread—block
    it until things are ready* blocking manner to less intuitive asynchronous promises,
    futures, or callbacks, providing means for *my thread time is precious–call me
    back through this callback on your own thread when things are ready*.


    It has had huge performance advantages as switching the thread contexts during
    all the blocking and yielding is expensive. But it is more difficult to orient
    yourself in all the callbacks and futures not mentioning loss of natural backpressure
    of the blocking APIs. The need for setting a standard was obvious.


    ## Reactive Streams


    Reactive Streams is a standard for asynchronous communication with built-in flow
    control, known as *backpressure*. We can describe it as two parallel pipes through
    which messages flow under very strict conditions. Let’s call the sending side
    of the pipes *upstream* and the receiving side *downstream*. While one pipe is
    used for requesting the exact amount of the data or canceling by the downstream,
    the other one is used for sending the actual data by the upstream.


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig1_HTML.png)


    A flow diagram of the transfer of r e q 3, cancel, and on next data between the
    sending and receiving blocks, upstream and downstream, respectively.


    Figure 13-1


    Simplified reactive stream


    Upstream or the publishing side usually implements `Publisher` while downstream,
    the consuming side implements `Subscriber`. Every publisher has a method `void
    subscribe(Subscriber<? super T> subscriber)` which registers the subscriber, it’s
    downstream. Publisher signals the subscriber with `onSubscribe` and gives him
    the subscription to request more data or cancel the stream. Publishers can never
    send more data than what was requested; that way, downstream regulates the volume
    and not get overwhelmed, this mechanism is known as a *backpressure*.


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig2_HTML.png)


    A block diagram has 2 blocks upstream and downstream with 15-line and 13-line
    codes of class, void, for, and this, among others. The upstream block sends data
    and subscriptions, while the downstream block requests more data over subscriptions.


    Figure 13-2


    Reactive Streams API


    Reactive Streams API is available in two packages for Java nowadays, older but
    still widely used `org.reactivestreams` available as stand-alone library and newer
    `java.util.concurrent.Flow` added to JDK in version 9\. Despite that both are
    semantically identical, package names differ. Until all reactive libraries are
    migrated to JDK’s Flow variant, simple conversion between the two is possible
    with `org.reactivestreams.FlowAdapters`.


    The API itself isn’t very practical except for connecting reactive streams together.
    It gets much more practical with tooling built around those APIs, providing specialized
    publishers, subscribers and operators provided by specialized reactive libraries.
    Operators are intermediate operations you can define to augment the stream of
    the data coming through the pipe.


    Caution


    Implementation of the Reactive Streams interfaces can be tricky, while interfaces
    look simple, rules they need to comply with are complex and require advanced knowledge
    of Java concurrent programming.


    ## Reactive Operators


    Reactive streams can operate with an infinite amount of data. When you want to
    work with potentially huge amounts of items flowing down the stream without blocking,
    you need to create some kind of intermediate operation which is applied on every
    item coming down the stream. Helidon has its own implementation of the various
    operators you can chain together with a builder like API, that is part of Helidon’s
    reactive engine with API built on top of the new `java.util.concurrent.Flow` interfaces.


    *   ① Defines finite reactive stream of four string values


    *   ② Limits operator canceling when three items are passed


    *   ③ Maps operator parsing every string item to integer


    *   ④ Terminal operator, subscriber of the stream


    ```

    Multi.just("1", "2", "3", "4")                                 ①

    .limit(3)                                              ②

    .map(Integer::parseInt)                                ③

    .forEach(i -> System.out.println("Received: " + i));   ④

    Listing 13-1

    Reactive Operators in Helidon

    ```


    Helidon operators are used on all the Helidon SE APIs, even so Helidon MP leverages
    mainly imperative coding approach, there is reactive streams abstraction defined
    by the MicroProfile Reactive Streams Operators specification. That is clever abstraction
    over an actual implementation of the operators, so you can switch implementation
    without changing your business code.


    ```

    ReactiveStreams.of("1", "2", "3", "4")

    .limit(3)

    .map(Integer::parseInt)

    .forEach(i -> System.out.println("Received: " + i))

    .run();

    Listing 13-2

    MicroProfile Reactive Streams Operators

    ```


    MicroProfile Reactive Streams are used mainly with another MicroProfile Reactive
    Messaging specification, as discussed later. Let’s look at the operators first.
    Describing which operator does what can be complicated, so there is a special
    kind of diagram used for such a description.


    ### Marble Diagrams


    As little marbles on an arrow are depicted items in the stream on a marble diagram.


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig3_HTML.png)


    A diagram has 4 color gradient circles numbered 1 to 4 and a short vertical line
    on an arrow.


    Figure 13-3


    Marble diagram: stream


    While marbles are representing subscriber `onNext` calls, error is represented
    by `X` mark and stream completion by `|`.


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig4_HTML.png)


    A diagram has a color gradient circle, a short vertical line, and a cross symbol
    labeled on next, on complete, and on error, respectively.


    Figure 13-4


    Marble diagram legend


    The stream above the operator depicted in Figure [13-4](#600147_1_En_13_Chapter.xhtml#Fig4)
    is upstream, the source of the data. The stream under the operator is downstream,
    the result of operation.


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig5_HTML.png)


    A diagram has 2 sets of 4 color gradient circles numbered 1 to 4 and 11 to 14
    with a short vertical line each on the arrows at the top and bottom, and a block
    of the function multi dot map at the center. The arrows are labeled upstream and
    downstream, respectively.


    Figure 13-5


    Marble diagram: map


    On the map operator marble diagram, you can see immediately what happens to each
    item coming through the operator. You can see that the number of the items is
    not affected, only the value is. Also, the complete signal `|` is not affected
    by the operator and passes downstream as is.'
