- fmt: "## Summary\n\n- Observability is the ability of a service to expose data externally\
    \ that reflects its internal behavior.\n- There are four main areas of observability:\
    \ health, metrics, tracing, and logging.\n- Helidon implements MicroProfile Health,\
    \ MicroProfile Metrics, and MicroProfile OpenTracing specifications.\n- Health\
    \ checking is essential for guaranteeing your whole system’s smooth operation.\
    \ Health checks allow external automated management systems to check if your application\
    \ is available and ready to serve requests.\n- Helidon comes with built-in health\
    \ checks, which help in determining general issues each application can face,\
    \ as well as an ability to create custom health checks.\n- MicroProfile Metrics\
    \ gives aggregated statistics about how your service is performing over time.\
    \ It can be used to improve service performance, tune upscaling strategies, optimize\
    \ business logic, and collect data for reporting.\n- Distributed systems like\
    \ microservices are difficult to debug because of their distributed nature. Distributed\
    \ tracing is a method to track a request journey as it travels across components\
    \ of a distributed system. It helps in debugging and performance tuning your distributed\
    \ system.\n- Helidon provides automatic “code-free” distributed tracing support\
    \ and an ability to explicitly work with tracing spans.\n- Logging tells you what\
    \ is happening inside individual software components within a service.\n- Helidon\
    \ supports `MDC` (`Mapped Diagnostic Context`), allowing registering and using\
    \ in your logging messages information that is not available in the current logging\
    \ scope.\n\n# 5. Communicating with Other Services\n\nThis chapter covers the\
    \ following topics:\n\n- Understanding MicroProfile Rest Client APIs\n- Exception\
    \ handling and filters in MicroProfile Rest Client\n- Calling RESTful services\
    \ using the JAX-RS Client API\n- Providers and asynchronous calls using the JAX-RS\
    \ Client API\n- Adding `CORS` support to Helidon applications\n\nMicroservices\
    \ not only provide data but also consume it. Sometimes one business action can\
    \ contain multiple REST calls, which can even form a distributed transaction.\n\
    \n> Note  \n> Services call other services!\n\nAnd these `service call hierarchies`\
    \ can be widely spread across many services.\n\nThere are multiple ways to call\
    \ a RESTful service in Helidon. Imagine a “sorcery ministry” that manages all\
    \ wizards and their licenses to do magic. This ministry retrieves this information\
    \ from two services: a wizard service for wizards and a licensing service for\
    \ the licenses. Both these services provide data using their REST endpoints. Thus,\
    \ the sorcery ministry is a client for those services.\n\n![](images/600147_1_En_5_Chapter/600147_1_En_5_Fig1_HTML.jpg)\n\
    \nA flow chart. The sorcery ministry service has two rest calls. `1. Wizard service.\
    \ 2. Licensing Service.`\n\nFigure 5-1  \nServices calling other services Different\
    \ microservice client options\n\n- `MicroProfile Rest Client` is a standard REST\
    \ client in MicroProfile Ecosystem.\n- `JAX-RS Client` API is a popular REST client\
    \ following the builder pattern model.\n\nLet’s get acquainted with each of them.\n\
    \n> Note  \n> In Helidon SE, there is a specially designed reactive Helidon `WebClient`.\
    \ It is described in Chapter [15](#600147_1_En_15_Chapter.xhtml).\n\n## MicroProfile\
    \ Rest Client\n\nThe MicroProfile Rest Client provides a type-safe approach to\
    \ invoke RESTful services over HTTP. It is designed to extend the Jakarta REST\
    \ (`JAX-RS`) specification. MicroProfile Rest Client is a [specification](https://download.eclipse.org/microprofile/microprofile-rest-client-3.0/microprofile-rest-client-spec-3.0.pdf)\
    \ under the MicroProfile umbrella, and Helidon MP implements it.\n\nLet’s directly\
    \ jump into the real code and create a small REST client, which consumes data\
    \ from our wizard service—a repository of all wizards.\n\nThe wizard service is\
    \ straightforward. Just three endpoints for providing a wizard by name and getting\
    \ the mightiest wizard.\n\n- ① A class that holds and provides wizards\n- ② An\
    \ endpoint that provides the mightiest wizard in JSON format\n- ③ An endpoint\
    \ that provides a wizard by name in JSON format\n- ④ A `POST` endpoint to add\
    \ a new wizard, which consumes in JSON format\n\n```java\n@Path(\"/wizard\")\n\
    @RequestScoped\npublic class WizardResource {\nprivate final WizardProvider wizardProvider;\n\
    @Inject\npublic WizardResource(WizardProvider wizardProvider) {   ①\nthis.wizardProvider\
    \ = wizardProvider;\n}\n@GET\n@Produces(MediaType.APPLICATION_JSON)\npublic Wizard\
    \ getMostMightyWizard() {                    ②\nreturn wizardProvider.getWizard();\n\
    }\n@Path(\"/{name}\")\n@GET\n@Produces(MediaType.APPLICATION_JSON)\npublic Wizard\
    \ getWizard(@PathParam(\"name\") String name) {   ③\nreturn wizardProvider.getWizardByName(name);\n\
    }\n@Path(\"/add\")\n@POST\n@Produces(MediaType.APPLICATION_JSON)\n@Consumes(MediaType.APPLICATION_JSON)\n\
    public Response addWizard(JsonObject jsonObject) {        ④\nif (!jsonObject.containsKey(\"\
    name\")) {\nJsonObject entity = JSON.createObjectBuilder()\n.add(\"error\", \"\
    No name provided\")\n.build();\nreturn Response.status(Response\n.Status.BAD_REQUEST).entity(entity).build();\n\
    }\nString name = jsonObject.getString(\"name\");\nWizard wizard = new Wizard();\n\
    wizard.setName(name);\nwizardProvider.addWizard(wizard);\nreturn Response.noContent().build();\n\
    }\n}\nListing 5-1\nWizard Resource\n```\n\n> Note  \n> The wizard service MicroProfile\
    \ Rest example can be found in the Book Samples repository.\n\nThis resource is\
    \ a reference for what is happening on the server side. It runs on `localhost`\
    \ port `8080`.\n\nNow let’s look at the client side.\n\nMicroProfile Rest Client\
    \ is already included in the full `helidon-microprofile` bundle. To use a REST\
    \ client with all other MicroProfile options, include Listing [5-2](#600147_1_En_5_Chapter.xhtml#PC2)\
    \ in the `pom.xml` file.\n\n```xml\nio.helidon.microprofile\nhelidon-microprofile\n\
    \nListing 5-2\nMicroProfile Full Bundle\n```\n\nIf more fine-grained control is\
    \ required, and `helidon-microprofile-core` is used, add the dependency in Listing\
    \ [5-3](#600147_1_En_5_Chapter.xhtml#PC3) to our project’s `pom.xml` file.\n\n\
    - ① MicroProfile Core dependency\n- ② MicroProfile Rest Client dependency\n\n\
    ```xml\nio.helidon.microprofile.bundles\nhelidon-microprofile-core        ①\n\n\
    io.helidon.microprofile.rest-client\nhelidon-microprofile-rest-client   ②\n\n\
    Listing 5-3\nMicroProfile Core Bundle\n```\n\nLet’s now create the client interface\
    \ for the wizard service used by the sorcery ministry.\n\nSince it is in a `managed\
    \ environment`, let `CDI` take care of the REST client creation. A REST client\
    \ interface must be annotated with `@RegisterRestClient` to automatically register\
    \ it with `CDI`.\n\nYou must create an interface with the desired methods and\
    \ properly annotate them. Let’s use `@RegisterRestClient` with `baseUrl` to declare\
    \ that our client should connect to a specific endpoint. Then add the `getMostMightyWizard()`\
    \ method and annotate it with `@GET`, which means the client performs a `GET`\
    \ request to the base URI and map the result to the wizard. To get a wizard by\
    \ name, add another method and annotate it with `@GET` and `@Path(\"/{name})`.\
    \ The method has a parameter annotated with `@PathParam(\"name\")` which means\
    \ the name is provided from the parameter and the endpoint is invoked with the\
    \ resulting path.\n\n- ① This registers the REST client with a `http://localhost:8080/wizard`\
    \ base URI`.`"
  raw: '## Summary


    *   Observability is the ability of a service to expose data externally that reflects
    its internal behavior.


    *   There are four main areas of observability: health, metrics, tracing, and
    logging.


    *   Helidon implements MicroProfile Health, MicroProfile Metrics, and MicroProfile
    OpenTracing specifications.


    *   Health checking is essential for guaranteeing your whole system’s smooth operation.
    Health checks allow external automated management systems to check if your application
    is available and ready to serve requests.


    *   Helidon comes with built-in health checks, which help in determining general
    issues each application can face, as well as an ability to create custom health
    checks.


    *   MicroProfile Metrics gives aggregated statistics about how your service is
    performing over time. It can be used to improve service performance, tune upscaling
    strategies, optimize business logic, and collect data for reporting.


    *   Distributed systems like microservices are difficult to debug because of their
    distributed nature. Distributed tracing is a method to track a request journey
    as it travels across components of a distributed system. It helps in debugging
    and performance tuning your distributed system.


    *   Helidon provides automatic “code-free” distributed tracing support and an
    ability to explicitly work with tracing spans.


    *   Logging tells you what is happening inside individual software components
    within a service.


    *   Helidon supports MDC (Mapped Diagnostic Context), allowing registering and
    using in your logging messages information that is not available in the current
    logging scope.


    # 5. Communicating with Other Services


    This chapter covers the following topics.


    *   Understanding MicroProfile Rest Client APIs


    *   Exception handling and filters in MicroProfile Rest Client


    *   Calling RESTful services using the JAX-RS Client API


    *   Providers and asynchronous calls using the JAX-RS Client API


    *   Adding CORS support to Helidon applications


    Microservices not only provide data but also consume it. Sometimes one business
    action can contain multiple REST calls, which can even form a distributed transaction.


    Note


    Services call other services!


    And these *service call hierarchies* can be widely spread across many services.


    There are multiple ways to call a RESTful service in Helidon. Imagine a “sorcery
    ministry” that manages all wizards and their license*s* to do magic. This ministry
    retrieves this information from two services: a wizard service for wizards and
    a licensing service for the licenses. Both these services provide data using their
    REST endpoints. Thus, the sorcery ministry is a client for those services.


    ![](images/600147_1_En_5_Chapter/600147_1_En_5_Fig1_HTML.jpg)


    A flow chart. The sorcery ministry service has two rest calls. 1. Wizard service.
    2\. Licensing Service.


    Figure 5-1


    Services calling other services Different microservice client options


    *   **MicroProfile Rest Client** is a standard REST client in MicroProfile Ecosystem.


    *   **JAX-RS Client** API is a popular REST client following the builder pattern
    model.


    Let’s get acquainted with each of them.


    Note


    In Helidon SE, there is a specially designed reactive Helidon WebClient. It is
    described in Chapter [15](#600147_1_En_15_Chapter.xhtml).


    ## MicroProfile Rest Client


    The MicroProfile Rest Client provides a type-safe approach to invoke RESTful services
    over HTTP. It is designed to extend the Jakarta REST (JAX-RS) specification. MicroProfile
    Rest Client is a [specification](https://download.eclipse.org/microprofile/microprofile-rest-client-3.0/microprofile-rest-client-spec-3.0.pdf)
    under the MicroProfile umbrella, and Helidon MP implements it.


    Let’s directly jump into the real code and create a small REST client, which consumes
    data from our wizard service—a repository of all wizards.


    The wizard service is straightforward. Just three endpoints for providing a wizard
    by name and getting the mightiest wizard.


    *   ① A class that holds and provides wizards


    *   ② An endpoint that provides the mightiest wizard in JSON format


    *   ③ An endpoint that provides a wizard by name in JSON format


    *   ④ A `POST` endpoint to add a new wizard, which consumes in JSON format


    ```

    @Path("/wizard")

    @RequestScoped

    public class WizardResource {

    private final WizardProvider wizardProvider;

    @Inject

    public WizardResource(WizardProvider wizardProvider) {   ①

    this.wizardProvider = wizardProvider;

    }

    @GET

    @Produces(MediaType.APPLICATION_JSON)

    public Wizard getMostMightyWizard() {                    ②

    return wizardProvider.getWizard();

    }

    @Path("/{name}")

    @GET

    @Produces(MediaType.APPLICATION_JSON)

    public Wizard getWizard(@PathParam("name") String name) {   ③

    return wizardProvider.getWizardByName(name);

    }

    @Path("/add")

    @POST

    @Produces(MediaType.APPLICATION_JSON)

    @Consumes(MediaType.APPLICATION_JSON)

    public Response addWizard(JsonObject jsonObject) {        ④

    if (!jsonObject.containsKey("name")) {

    JsonObject entity = JSON.createObjectBuilder()

    .add("error", "No name provided")

    .build();

    return Response.status(Response

    .Status.BAD_REQUEST).entity(entity).build();

    }

    String name = jsonObject.getString("name");

    Wizard wizard = new Wizard();

    wizard.setName(name);

    wizardProvider.addWizard(wizard);

    return Response.noContent().build();

    }

    }

    Listing 5-1

    Wizard Resource

    ```


    Note


    The wizard service MicroProfile Rest example can be found in the Book Samples
    repository.


    This resource is a reference for what is happening on the server side. It runs
    on localhost port 8080.


    Now let’s look at the client side.


    MicroProfile Rest Client is already included in the full `helidon-microprofile`
    bundle. To use a REST client with all other MicroProfile options, include Listing
    [5-2](#600147_1_En_5_Chapter.xhtml#PC2) in the `pom.xml` file.


    ```

    io.helidon.microprofile

    helidon-microprofile


    Listing 5-2

    MicroProfile Full Bundle

    ```


    If more fine-grained control is required, and `helidon-microprofile-core` is used,
    add the dependency in Listing [5-3](#600147_1_En_5_Chapter.xhtml#PC3) to our project’s
    `pom.xml` file.


    *   ① MicroProfile Core dependency


    *   ② MicroProfile Rest Client dependency


    ```

    io.helidon.microprofile.bundles

    helidon-microprofile-core        ①


    io.helidon.microprofile.rest-client

    helidon-microprofile-rest-client   ②


    Listing 5-3

    MicroProfile Core Bundle

    ```


    Let’s now create the client interface for the wizard service used by the sorcery
    ministry.


    Since it is in a *managed environment*, let CDI take care of the REST client creation.
    A REST client interface must be annotated with `@RegisterRestClient` to automatically
    register it with CDI.


    You must create an interface with the desired methods and properly annotate them.
    Let’s use `@RegisterRestClient` with `baseUrl` to declare that our client should
    connect to a specific endpoint. Then add the `getMostMightyWizard()` method and
    annotate it with `@GET`, which means the client performs a `GET` request to the
    base URI and map the result to the wizard. To get a wizard by name, add another
    method and annotate it with `@GET` and `@Path("/{name})`. The method has a parameter
    annotated with `@PathParam("name")` which means the name is provided from the
    parameter and the endpoint is invoked with the resulting path.


    *   ① This registers the REST client with a `http://localhost:8080/wizard` base
    URI`.`'
