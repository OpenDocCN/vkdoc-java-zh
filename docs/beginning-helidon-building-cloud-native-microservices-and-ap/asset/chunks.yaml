    在配置源级别，如果文件名匹配所选的 profile，则会包含整个配置文件。如果类路径中 `META-INF` 文件夹下存在配置文件 `microprofile-config-<PROFILE
    NAME>.properties`，并且相应 profile 处于激活状态，则这些属性会被合并。当两个文件中存在相同属性时，文件名中带有激活 profile
    的文件中的值具有更高优先级。


    ```

    META-INF/

    microprofile-config.properties

    microprofile-config-TEST.properties

    Listing 3-15

    Property file specific for a given profile

    ```


    不过让我们回到 Orc 狩猎冒险的示例。你可能会决定使用不同的配置源设置来部署我们已经构建好的游戏制品。为此，你需要更强大的能力：元配置。


    ## 元配置


    打包在 JAR 文件内部的配置文件实际上几乎是不可变的。你在这些配置源中的所有设置都已板上钉钉。你可以用系统属性或环境变量覆盖它们的值，但你必须依赖于 JAR
    包深处某处已经定义好的优先级。Helidon 提供了一个额外特性，用于在制品外部重新定义配置，称为元配置。它是一个可以按你希望的方式配置配置源的位置，并会覆盖任何现有的隐式或显式设置（通过编程式
    API 创建的设置除外）。


    注意


    这是 Helidon 特有功能。


    当在类路径、当前目录中找到 `mp-meta-config.yaml` 或 `mp-meta-config.properties` 文件，或者在外部指定位置发现它后，配置源将按其内容进行组织。你可以通过
    `io.helidon.config.mp.meta-config` 属性或 `HELIDON_MP_META_CONFIG` 环境变量来指定元配置文件位置。


    元配置支持 YAML 和 properties 文件格式。让我们看看 YAML 示例 `mp-meta-config.yaml`。


    *   ① 包含或排除隐式源或转换器。


    *   ② 显式定义配置源。


    *   ③ 定义配置源优先级。


    ```

    add-discovered-sources: true   ①

    add-discovered-converters: true

    add-default-sources: true

    sources:

    - type: "environment-variables"

    - type: "system-properties"

    - type: "properties"         ②

    classpath: "weapons.properties"

    ordinal: 50                ③

    optional: true

    - type: "yaml"

    path: "/config/orc-army.yaml"

    Listing 3-16

    Meta Configuration

    ```


    你可以更改优先级序号（ordinal），并选择使用默认源或自定义源。甚至还可以排除自定义转换器，或添加一些可选配置源。


    ## YAML 配置源


    除了 MP 规范要求的内置配置源之外，Helidon 还提供了其他便捷的配置源。例如，有人喜爱也有人“深恶痛绝”的 YAML 配置。


    注意


    这是 Helidon 特有功能。


    与 MP 默认属性文件不同，Helidon 会在类路径根目录下查找名为 `application.yaml` 的文件。其默认优先级 `200` 会覆盖 MP
    默认属性文件中的属性，但会被系统属性和环境变量覆盖。


    ```

    sorcerer:

    invisibilityCloak: false

    orcSlayingPotions: 2

    weapons:

    - "axe"

    - "sword"

    Listing 3-17

    YAML Configuration File

    ```


    与 properties 相比，YAML 格式中最显著的特性是 *序列（sequences）*。你可以在 YAML 中用流式（flow style）或块式（block
    style）来表示序列。


    *   ① 流式序列


    *   ② 块式序列


    ```

    amulets: ["Hearth of Zeard", "Spider''s eye"]   ①

    weapons:    ②

    - "axe"

    - "sword"

    Listing 3-18

    Sequence Styles in YAML Files

    ```


    Helidon 的 YAML 配置源会将序列映射为配置数组。尽管所有配置源也都可以用逗号分隔值来声明数组，你仍然可以用简单文本值声明数组：`weapons:
    "axe,sword".`


    YAML 的 `null` 值会被转换为缺失属性。当直接注入这类属性时会抛出 `NoSuchElementException`。这一特性与默认 properties
    配置源很好地保持一致：后者只能通过缺失属性或空值来表示 `null`。


    *   ① properties 文件中没有 `null`。空值或缺失属性的行为类似 null 值。


    ```

    sorcerer.invisibilityCloak=    ①

    #sorcerer.invisibilityCloak=2

    Listing 3-19

    Empty Property in YAML File

    ```


    *   ① YAML 有专门的 `null` 值


    ```

    sorcerer:

    invisibilityCloak: null   ①

    orcSlayingPotions:

    #ghoulSlayingPotions: 2

    Listing 3-20

    Null Property in YAML File

    ```


    但请记住，你始终可以指定默认值，或注入可选值 `@ConfigProperty(name = "sorcerer.invisibilityCloak") Optional<Boolean>
    cloak`，然后在运行时决定如何处理 null。


    要使用 YAML 配置源，你需要以下依赖，它已经包含在 Helidon MicroProfile bundle 中。


    ```

    io.helidon.config

    helidon-config-yaml-mp


    Listing 3-21

    Maven Dependency for the YAML Configuration Support

    ```


    ## 自定义配置源


    总会有一些场景是 YAML 或 properties 不够用的。无论你需要从某种“异域”数据库、超安全二进制文件，还是非常复杂的 XML 文档中获取配置，你都可以创建自己的配置源。这个新配置源只需要根据键提供属性值、提供可用键列表、用于优先级解析的
    ordinal 数值，以及配置源名称。所有逻辑都可以放进一个实现单一接口 `org.eclipse.microprofile.config.spi.ConfigSource`
    的类中。


    我们来尝试一个简单的配置源：把硬编码 map 中的条目作为配置属性提供。为了更有意思一些，把其中一个属性设为 JSON 值，这样就可以让配置源和本章前面创建的自定义
    JsonConverter 配合使用。


    *   ① 新的自定义配置源优先级。


    *   ② 排序逻辑使用的源名称。


    ```

    public class CustomConfigSource implements ConfigSource {

    private static final Map props = Map.of(

    "sorcerer.orcSlayingPotions", "55",

    "app.jsonOrc",

    """

    {"orcName":"Bonecrash", "level":"28"}

    """

    );

    @Override

    public int getOrdinal() {return 105;}   ①

    @Override

    public Set getPropertyNames() {

    return props.keySet();

    }

    @Override

    public String getValue(String key) {

    return props.get(key);

    }

    @Override

    public String getName() {

    return "custom-sorcerer-map";   ②

    }

    }

    Listing 3-22

    Custom Config Source

    ```


    注册流程与自定义转换器非常类似。你需要把我们的实现注册为服务提供者。


    注意


    如果你使用的是基于 classpath 的项目，请创建 provider-configuration 文件，并将 `my.package.CustomConfigSource`
    作为其内容。


    `META-INF/services/org.eclipse.microprofile.config.spi.ConfigSource`


    配置运行时会通过 service loader 机制找到你的转换器。


    如果你在基于 JPMS 模块的项目中注册服务提供者，别忘了使用 `module-info.java`。只需在 `module-info.java` 中添加
    `provides` 子句即可。


    `provides org.eclipse.microprofile.config.spi.ConfigSource with my.package.CustomConfigSource;`

    '
- fmt: "## Dynamic Config Source\n\nSo far, you have looked at configuration as it\
    \ is an immutable data source. The only way to re-inject your config property\
    \ with a new value would be to restart the Helidon application. But config sources\
    \ can provide mutable properties. Most of the built-in file-based config sources\
    \ support mutability. With the file-based config sources, you can use a built-in\
    \ change watcher or polling with custom intervals.\n\nYou can try out the dynamic\
    \ config source with the custom `JsonConverter` created earlier so you know for\
    \ sure it all works together nicely. First, let’s create a configuration file\
    \ on the file system.\n\n- ① The dynamic source needs to register a watcher or\
    \ use polling. When it is first loaded, use a change watcher.\n- ② The `app.jsonOrc`\
    \ property requires a conversion with the custom converter.\n\n```yaml\nhelidon.config.watcher.enabled:\
    \ true   ①\napp.jsonOrc: '{\"orcName\":\"Scullcrack\", \"level\":\"37\"}'   ②\n\
    ```\n\n`Listing 3-23`  \nDynamically Loaded Configuration\n\nAs the dynamic config\
    \ file is somewhere on the file system, you must register it with meta config,\
    \ so Helidon knows where to look for it. Let’s create the `mp-meta-config.yaml`\
    \ file in the working directory.\n\n- ① Uses the custom `JsonConverter`\n- ② The\
    \ path to the dynamically changing config file\n\n```yaml\nadd-discovered-converters:\
    \ true   ①\nsources:\n- type: \"yaml\"\npath: \"./dynamic-config.yaml\"   ②\n\
    optional: false\n```\n\n`Listing 3-24`  \nMeta Configuration for the Dynamic Config\
    \ Source\n\nNow, you just need to inject the config value. However, injection\
    \ is done only once in a singleton bean, right? It’s not very practical for a\
    \ dynamically changing configuration. You have to inject `java.util.function.Supplier`\
    \ instead of the actual value.\n\n```java\n@ConfigProperty(name = \"app.jsonOrc\"\
    ) Supplier jsonOrc\n```\n\n`Listing 3-25`  \nInjecting a Dynamically Loaded Configuration\
    \ Property\n\nThis way, you can get the actual value each time you call `jsonOrc.get()`.\
    \ The change watcher reloads the config source each time it changes, and new values\
    \ are cached. There is no need to worry about supplier invocation reading the\
    \ file each time. The second possibility is polling. You can just configure the\
    \ interval you want the config source to reload.\n\n- ① Use polling for dynamic\
    \ source reloading.\n- ② Poll every five seconds. The duration is expressed in\
    \ the ISO-8601 format.\n\n```yaml\nhelidon.config.polling.enabled: true   ①\n\
    helidon.config.polling.duration: PT5S  ②\napp.jsonOrc: '{\"orcName\":\"Scullcrack\"\
    , \"level\":\"37\"}'\n```\n\n`Listing 3-26`  \nDynamically Polled Configuration\n\
    \nThe properties used for enabling change watching or polling are not dynamically\
    \ interpreted, despite being a part of the dynamically reloaded config. You can’t\
    \ change the polling interval dynamically.\n\n> Note  \n> While the dynamic config\
    \ sources are part of the MicroProfile specification, polling and change watching\
    \ are Helidon features.\n\n## Kubernetes ConfigMap\n\nKubernetes ConfigMap is\
    \ a convenient tool for distributing configuration in the Kubernetes cluster.\
    \ Properties from the ConfigMap can be made accessible from the pod by mapping\
    \ them to the container environment variables or mounting them as configuration\
    \ files directly to the file system.\n\n### Environment Variables\n\nThe easiest\
    \ way to propagate Kubernetes ConfigMap to your application is over environment\
    \ variables. As Helidon Config uses these variables as a default config source,\
    \ you do practically nothing from the application side. Kubernetes maps to the\
    \ pod’s OS level, and Helidon Config takes over from there.\n\n- ① The `SORCERER_ORCSLAYINGPOTIONS`\
    \ environment variable is propagated to the `my-sorcerer-app` config as the `sorcerer.orcSlayingPotions`\
    \ config property.\n- ② The environment variable `APP_JSONORC` is propagated to\
    \ the `my-sorcerer-app` config as `app.jsonOrc`.\n- ③ This is a reference to `ConfigMap`\
    \ as the environment variables source.\n\n```yaml\napiVersion: v1\nkind: ConfigMap\n\
    metadata:\nname: my-sorcerer-config\ndata:\nSORCERER_ORCSLAYINGPOTIONS: 68   ①\n\
    APP_JSONORC: '{\"orcName\":\"Sharpteeth\",\"level\":\"22\"}'   ②\n\napiVersion:\
    \ v1\nkind: Pod\nmetadata:\nname: my-sorcerer-pod\nspec:\ncontainers:\n- name:\
    \ my-sorcerer-container\nimage: my-sorcerer-app\nenvFrom:\n- configMapRef:\nname:\
    \ my-sorcerer-config   ③\n```\n\n`Listing 3-27`  \nK8s ConfigMap Propagated to\
    \ Helidon As Environment Variables\n\n### Mounted Volume\n\nSometimes the flat\
    \ structure of the environment variables is just not enough. Kubernetes ConfigMap\
    \ can specify the configuration that should be mounted to the container’s file\
    \ system as a config file. You can mount your favorite configuration format, whether\
    \ it’s a properties file, YAML, or JSON, to the folder of your choice.\n\n- ①\
    \ The name of the resulting config file\n- ② The path of the mounted folder containing\
    \ the resulting `my-sorcerer-app-config.yaml` file\n\n```yaml\napiVersion: v1\n\
    kind: ConfigMap\nmetadata:\nname: my-sorcerer-config\ndata:\nmy-sorcerer-app-config.yaml:\
    \ |   ①\napp.jsonOrc: '{\"orcName\":\"Sharpteeth\", \"level\":\"22\"}'\nsorcerer:\n\
    orcSlayingPotions: 68\ninvisibilityCloak: false\nweapons: axe,sword\n\napiVersion:\
    \ v1\nkind: Pod\nmetadata:\nname: my-sorcerer-pod\nspec:\ncontainers:\n- name:\
    \ my-sorcerer-container\nimage: my-sorcerer-app\nvolumeMounts:\n- mountPath: /config\
    \   ②\nname: config-volume\nvolumes:\n- name: config-volume\nconfigMap:\nname:\
    \ my-sorcerer-config\n```\n\n`Listing 3-28`  \nK8s ConfigMap Propagated to Helidon\
    \ over the Configuration File on the Mounted Volume\n\nIn `my-sorcerer-app`, you\
    \ need to set up the meta config `mp-meta-config.yaml` file to specify the location\
    \ of the mounted configuration file.\n\n- ① The path to the mounted config file.\n\
    - ② The priority over the default config file on the classpath.\n- ③ This value\
    \ is optional, so you can run the application without the mounted file when required.\n\
    \n```yaml\nsources:\n- type: \"yaml\"\npath: \"/config/my-sorcerer-app-config.yaml\"\
    \   ①\nordinal: 250   ②\noptional: true   ③\n```\n\n`Listing 3-29`  \nMounted\
    \ Configuration File Usage with Meta Config\n\nFrom the start, the Helidon config\
    \ is designed for use in the microservice environment. You can see how every feature\
    \ converges to the same goal of minimizing the needed boilerplate code related\
    \ to the configuration in your microservice application.\n\n## Summary\n\n- Microservices\
    \ need to be configurable.\n- Config sources are available for every occasion.\n\
    - Use ordinals in the config sources to make overriding possible.\n- No need to\
    \ stick with YAML; create your own config source.\n- Converters solve parsing\
    \ or deserializing.\n- Work with dynamically changing configuration without restarting\
    \ your service.\n- Integration with Kubernetes ConfigMap makes your application\
    \ truly cloud-native.\n\n## 4. Observability\n\nThis chapter covers the following\
    \ topics.\n\n- Understanding observability\n- Understanding health checks\n- Adding\
    \ metrics support to Helidon applications\n- Using tracing in Helidon applications\n\
    - Configuring logging in Helidon\n\nYou’ve possibly heard this word many times\
    \ and already know it has some importance for microservices. You also understand\
    \ that it’s somehow related to monitoring or telemetry. This chapter explains\
    \ what observability means, how it differs from monitoring and telemetry, which\
    \ observability features are included in Helidon, and how to use them."
  raw: '## Dynamic Config Source


    So far, you have looked at configuration as it is an immutable data source. The
    only way to re-inject your config property with a new value would be to restart
    the Helidon application. But config sources can provide mutable properties. Most
    of the built-in file-based config sources support mutability. With the file-based
    config sources, you can use a built-in change watcher or polling with custom intervals.


    You can try out the dynamic config source with the custom `JsonConverter` created
    earlier so you know for sure it all works together nicely. First, let’s create
    a configuration file on the file system.


    *   ① The dynamic source needs to register a watcher or use polling. When it is
    first loaded, use a change watcher.


    *   ② The `app.jsonOrc` property requires a conversion with the custom converter.


    ```

    helidon.config.watcher.enabled: true   ①

    app.jsonOrc: ''{"orcName":"Scullcrack", "level":"37"}''   ②

    Listing 3-23

    Dynamically Loaded Configuration

    ```


    As the dynamic config file is somewhere on the file system, you must register
    it with meta config, so Helidon knows where to look for it. Let’s create the `mp-meta-config.yaml`
    file in the working directory.


    *   ① Uses the custom JsonConverter


    *   ② The path to the dynamically changing config file


    ```

    add-discovered-converters: true   ①

    sources:

    - type: "yaml"

    path: "./dynamic-config.yaml"   ②

    optional: false

    Listing 3-24

    Meta Configuration for the Dynamic Config Source

    ```


    Now, you just need to inject the config value. However, injection is done only
    once in a singleton bean, right? It’s not very practical for a dynamically changing
    configuration. You have to inject `java.util.function.Supplier` instead of the
    actual value.


    ```

    @ConfigProperty(name = "app.jsonOrc") Supplier jsonOrc

    Listing 3-25

    Injecting a Dynamically Loaded Configuration Property

    ```


    This way, you can get the actual value each time you call `jsonOrc.get()`. The
    change watcher reloads the config source each time it changes, and new values
    are cached. There is no need to worry about supplier invocation reading the file
    each time. The second possibility is polling. You can just configure the interval
    you want the config source to reload.


    *   ① Use polling for dynamic source reloading.


    *   ② Poll every five seconds. The duration is expressed in the ISO-8601 format.


    ```

    helidon.config.polling.enabled: true   ①

    helidon.config.polling.duration: PT5S  ②

    app.jsonOrc: ''{"orcName":"Scullcrack", "level":"37"}''

    Listing 3-26

    Dynamically Polled Configuration

    ```


    The properties used for enabling change watching or polling are not dynamically
    interpreted, despite being a part of the dynamically reloaded config. You can’t
    change the polling interval dynamically.


    Note


    While the dynamic config sources are part of the MicroProfile specification, polling
    and change watching are Helidon features.


    ## Kubernetes ConfigMap


    Kubernetes ConfigMap is a convenient tool for distributing configuration in the
    Kubernetes cluster. Properties from the ConfigMap can be made accessible from
    the pod by mapping them to the container environment variables or mounting them
    as configuration files directly to the file system.


    ### Environment Variables


    The easiest way to propagate Kubernetes ConfigMap to your application is over
    environment variables. As Helidon Config uses these variables as a default config
    source, you do practically nothing from the application side. Kubernetes maps
    to the pod’s OS level, and Helidon Config takes over from there.


    *   ① The `SORCERER_ORCSLAYINGPOTIONS` environment variable is propagated to the
    my-sorcerer-app config as the `sorcerer.orcSlayingPotions` config property.


    *   ② The environment variable `APP_JSONORC` is propagated to the my-sorcerer-app
    config as `app.jsonOrc`.


    *   ③ This is a reference to ConfigMap as the environment variables source.


    ```

    apiVersion: v1

    kind: ConfigMap

    metadata:

    name: my-sorcerer-config

    data:

    SORCERER_ORCSLAYINGPOTIONS: 68   ①

    APP_JSONORC: ''{"orcName":"Sharpteeth","level":"22"}''   ②


    apiVersion: v1

    kind: Pod

    metadata:

    name: my-sorcerer-pod

    spec:

    containers:

    - name: my-sorcerer-container

    image: my-sorcerer-app

    envFrom:

    - configMapRef:

    name: my-sorcerer-config   ③

    Listing 3-27

    K8s ConfigMap Propagated to Helidon As Environment Variables

    ```


    ### Mounted Volume


    Sometimes the flat structure of the environment variables is just not enough.
    Kubernetes ConfigMap can specify the configuration that should be mounted to the
    container’s file system as a config file. You can mount your favorite configuration
    format, whether it’s a properties file, YAML, or JSON, to the folder of your choice.


    *   ① The name of the resulting config file


    *   ② The path of the mounted folder containing the resulting `my-sorcerer-app-config.yaml`
    file


    ```

    apiVersion: v1

    kind: ConfigMap

    metadata:

    name: my-sorcerer-config

    data:

    my-sorcerer-app-config.yaml: |   ①

    app.jsonOrc: ''{"orcName":"Sharpteeth", "level":"22"}''

    sorcerer:

    orcSlayingPotions: 68

    invisibilityCloak: false

    weapons: axe,sword


    apiVersion: v1

    kind: Pod

    metadata:

    name: my-sorcerer-pod

    spec:

    containers:

    - name: my-sorcerer-container

    image: my-sorcerer-app

    volumeMounts:

    - mountPath: /config   ②

    name: config-volume

    volumes:

    - name: config-volume

    configMap:

    name: my-sorcerer-config

    Listing 3-28

    K8s ConfigMap Propagated to Helidon over the Configuration File on the Mounted
    Volume

    ```


    In `my-sorcerer-app`, you need to set up the meta config `mp-meta-config.yaml`
    file to specify the location of the mounted configuration file.


    *   ① The path to the mounted config file.


    *   ② The priority over the default config file on the classpath.


    *   ③ This value is optional, so you can run the application without the mounted
    file when required.


    ```

    sources:

    - type: "yaml"

    path: "/config/my-sorcerer-app-config.yaml"   ①

    ordinal: 250   ②

    optional: true   ③

    Listing 3-29

    Mounted Configuration File Usage with Meta Config

    ```


    From the start, the Helidon config is designed for use in the microservice environment.
    You can see how every feature converges to the same goal of minimizing the needed
    boilerplate code related to the configuration in your microservice application.


    ## Summary


    *   Microservices need to be configurable.


    *   Config sources are available for every occasion.


    *   Use ordinals in the config sources to make overriding possible.


    *   No need to stick with YAML; create your own config source.


    *   Converters solve parsing or deserializing.


    *   Work with dynamically changing configuration without restarting your service.


    *   Integration with Kubernetes ConfigMap makes your application truly cloud-native.


    # 4. Observability


    This chapter covers the following topics.


    *   Understanding observability


    *   Understanding health checks


    *   Adding metrics support to Helidon applications


    *   Using tracing in Helidon applications


    *   Configuring logging in Helidon


    You’ve possibly heard this word many times and already know it has some importance
    for microservices. You also understand that it’s somehow related to monitoring
    or telemetry. This chapter explains what observability means, how it differs from
    monitoring and telemetry, which observability features are included in Helidon,
    and how to use them.'
  trans: '

    ## 动态配置源


    到目前为止，你看到的配置都是不可变数据源。想要用新值重新注入配置属性，唯一的方法是重启 Helidon 应用程序。但配置源也可以提供可变属性。大多数内置的基于文件的配置源都支持可变性。对于基于文件的配置源，你可以使用内置的变更监听器，或者使用自定义间隔进行轮询。


    你可以结合前面创建的自定义 `JsonConverter` 来尝试动态配置源，这样就能确认它们能够很好地协同工作。首先，在文件系统上创建一个配置文件。


    *   ① 动态源需要注册监听器或使用轮询。首次加载时，使用变更监听器。


    *   ② `app.jsonOrc` 属性需要通过自定义转换器进行转换。


    ```

    helidon.config.watcher.enabled: true   ①

    app.jsonOrc: ''{"orcName":"Scullcrack", "level":"37"}''   ②

    Listing 3-23

    Dynamically Loaded Configuration

    ```


    由于动态配置文件位于文件系统中的某处，你必须在元配置中注册它，这样 Helidon 才知道去哪里查找。让我们在工作目录中创建 `mp-meta-config.yaml`
    文件。


    *   ① 使用自定义 JsonConverter


    *   ② 动态变化配置文件的路径


    ```

    add-discovered-converters: true   ①

    sources:

    - type: "yaml"

    path: "./dynamic-config.yaml"   ②

    optional: false

    Listing 3-24

    Meta Configuration for the Dynamic Config Source

    ```


    现在你只需要注入配置值即可。不过，单例 bean 中的注入只会执行一次，对吧？这对于动态变化的配置并不实用。你需要注入 `java.util.function.Supplier`，而不是实际值本身。


    ```

    @ConfigProperty(name = "app.jsonOrc") Supplier jsonOrc

    Listing 3-25

    Injecting a Dynamically Loaded Configuration Property

    ```


    这样一来，每次调用 `jsonOrc.get()` 时，你都可以拿到实际值。每当配置源发生变化，变更监听器都会重新加载配置源，并缓存新值。无需担心每次调用
    supplier 都会去读取文件。另一种方式是轮询。你只需配置希望配置源重新加载的时间间隔。


    *   ① 使用轮询进行动态源重载。


    *   ② 每五秒轮询一次。时长采用 ISO-8601 格式表示。


    ```

    helidon.config.polling.enabled: true   ①

    helidon.config.polling.duration: PT5S  ②

    app.jsonOrc: ''{"orcName":"Scullcrack", "level":"37"}''

    Listing 3-26

    Dynamically Polled Configuration

    ```


    用于启用变更监听或轮询的属性，尽管是动态重载配置的一部分，但并不会被动态解释。你不能动态更改轮询间隔。


    注意


    虽然动态配置源是 MicroProfile 规范的一部分，但轮询和变更监听是 Helidon 的功能特性。


    ## Kubernetes ConfigMap


    Kubernetes ConfigMap 是在 Kubernetes 集群中分发配置的便捷工具。来自 ConfigMap 的属性可以通过映射到容器环境变量，或者直接作为配置文件挂载到文件系统的方式，供
    Pod 访问。


    ### 环境变量


    将 Kubernetes ConfigMap 传递给应用程序最简单的方法是通过环境变量。由于 Helidon Config 默认将这些变量作为配置源，你在应用侧几乎不需要做任何事。Kubernetes
    在 Pod 的操作系统层完成映射，Helidon Config 会从那里接管。


    *   ① `SORCERER_ORCSLAYINGPOTIONS` 环境变量会被传递到 my-sorcerer-app 配置中，作为 `sorcerer.orcSlayingPotions`
    配置属性。


    *   ② `APP_JSONORC` 环境变量会被传递到 my-sorcerer-app 配置中，作为 `app.jsonOrc`。


    *   ③ 这是将 ConfigMap 作为环境变量来源的引用。


    ```

    apiVersion: v1

    kind: ConfigMap

    metadata:

    name: my-sorcerer-config

    data:

    SORCERER_ORCSLAYINGPOTIONS: 68   ①

    APP_JSONORC: ''{"orcName":"Sharpteeth","level":"22"}''   ②


    apiVersion: v1

    kind: Pod

    metadata:

    name: my-sorcerer-pod

    spec:

    containers:

    - name: my-sorcerer-container

    image: my-sorcerer-app

    envFrom:

    - configMapRef:

    name: my-sorcerer-config   ③

    Listing 3-27

    K8s ConfigMap Propagated to Helidon As Environment Variables

    ```


    ### 挂载卷


    有时环境变量的扁平结构并不足够。Kubernetes ConfigMap 可以指定要作为配置文件挂载到容器文件系统中的配置。你可以把你喜欢的配置格式（无论是
    properties 文件、YAML 还是 JSON）挂载到你选择的目录。


    *   ① 生成的配置文件名称


    *   ② 挂载目录路径，其中包含生成的 `my-sorcerer-app-config.yaml` 文件


    ```

    apiVersion: v1

    kind: ConfigMap

    metadata:

    name: my-sorcerer-config

    data:

    my-sorcerer-app-config.yaml: |   ①

    app.jsonOrc: ''{"orcName":"Sharpteeth", "level":"22"}''

    sorcerer:

    orcSlayingPotions: 68

    invisibilityCloak: false

    weapons: axe,sword


    apiVersion: v1

    kind: Pod

    metadata:

    name: my-sorcerer-pod

    spec:

    containers:

    - name: my-sorcerer-container

    image: my-sorcerer-app

    volumeMounts:

    - mountPath: /config   ②

    name: config-volume

    volumes:

    - name: config-volume

    configMap:

    name: my-sorcerer-config

    Listing 3-28

    K8s ConfigMap Propagated to Helidon over the Configuration File on the Mounted
    Volume

    ```


    在 `my-sorcerer-app` 中，你需要设置元配置文件 `mp-meta-config.yaml`，以指定挂载配置文件的位置。


    *   ① 挂载配置文件的路径。


    *   ② 相对于 classpath 上默认配置文件的优先级。


    *   ③ 该值是可选的，因此在需要时你可以在没有挂载文件的情况下运行应用程序。


    ```

    sources:

    - type: "yaml"

    path: "/config/my-sorcerer-app-config.yaml"   ①

    ordinal: 250   ②

    optional: true   ③

    Listing 3-29

    Mounted Configuration File Usage with Meta Config

    ```


    从一开始，Helidon 配置就是为微服务环境而设计的。你可以看到，每个特性都汇聚到同一个目标：尽量减少微服务应用中与配置相关的样板代码。


    ## 总结


    *   微服务需要可配置性。


    *   配置源可满足各种场景需求。


    *   在配置源中使用序数（ordinal）以支持覆盖。


    *   不必局限于 YAML；你可以创建自己的配置源。


    *   转换器可用于解析或反序列化。


    *   无需重启服务即可处理动态变化的配置。


    *   与 Kubernetes ConfigMap 的集成使你的应用真正实现云原生。


    # 4. 可观测性


    本章涵盖以下主题。


    *   理解可观测性


    *   理解健康检查


    *   为 Helidon 应用添加指标支持


    *   在 Helidon 应用中使用追踪


    *   在 Helidon 中配置日志


    你可能已经多次听到这个词，也知道它对微服务很重要。你也明白它与监控或遥测有关。本章将解释可观测性的含义、它与监控和遥测的区别、Helidon 包含哪些可观测性特性，以及如何使用它们。

