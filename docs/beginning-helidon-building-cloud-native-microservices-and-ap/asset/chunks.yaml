    World!"}` |

    | `GET /greet/{user}` | Greets the specified user`curl -X GET http://localhost:8080/greet/Dmitry``{"message":"Hello
    Dmitry!"}` |

    | `PUT /greet/greeting` | Changes the greeting`curl -X PUT -H "Content-Type: application/json"
    -d ''{"greeting" : "Hola"}'' http://localhost:8080/greet/greeting``curl -X GET
    http://localhost:8080/greet/Dmitry``{"message":"Hola Dmitry!"}` |

    | `GET /health` | Health check`curl -s -X GET http://localhost:8080/health` |

