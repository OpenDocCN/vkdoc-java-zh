    `flatMap` 操作符会对每个元素执行给定函数，并期望返回另一个响应式流作为结果。`flatMap` 会将结果流中的所有元素内联展开，把其中每个元素分别发送到下游。


    ![](img/600147_1_En_13_Fig16_HTML.png)


    图中有 3 个颜色渐变的圆，编号为 1 到 3；以及 6 个圆，编号为 1、10、2、20、3 和 30，在顶部和底部箭头上各有一条短竖线。中央是一个 dot
