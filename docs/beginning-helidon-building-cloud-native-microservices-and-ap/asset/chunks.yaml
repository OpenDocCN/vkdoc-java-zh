    A `channel` is a reactive stream with a publisher and single subscriber constructed
    from reactive streams stages. Channels are identified by names, either in annotations
    (see Listing [13-40](#600147_1_En_13_Chapter.xhtml#PC40)) or in the configuration
    (see Listing [13-41](#600147_1_En_13_Chapter.xhtml#PC41)).


    - ① Named channel with channel-specific configuration


    ```yaml

    mp.messaging:

    incoming:

    channel-1:       ①

    connector: helidon-jms

    destination: ./TestJMSModule!TestQueue

    Listing 13-41

    Messaging Channel Configuration

    ```


    ```java

    @Incoming("channel-1")

    ...

    @Channel("channel-1")

    Listing 13-40

    Messaging Annotations Channel Names

    ```


    Every channel, since it’s in fact a reactive stream, needs to have both publisher
    and subscriber. When it doesn’t, the container won’t start successfully.


    The simplest possible channel is a combination of `@Incoming` and `@Outgoing`
    annotated methods.


    ```java

    @Outgoing("channel-1")

    public PublisherBuilder registerPublisher() {

    return ReactiveStreams.of("first", "second", "third");

    }

    @Incoming("channel-1")

    public void consume(String payload) {

    System.out.println(">" + payload);

    }

    >first

    >second

    >third

    Listing 13-42

    Simple Reactive Messaging Channel

    ```


    Listing [13-42](#600147_1_En_13_Chapter.xhtml#PC42) shows the publisher is supplied
    with MicroProfile Reactive Streams operator’s `PublisherBuilder`, which is a prepared
    chain of reactive operators called a `stage`.


    The consuming method still looks like it was taken from a message-driven bean;
    but behind the scenes, it is a hidden terminal `forEach` operator. You can tweak
    the example to supply a `SubscriberStage` doing the same.


    ```java

    @Outgoing("channel-1")

    public PublisherBuilder registerPublisher() {

    return ReactiveStreams.of("first", "second", "third");

    }

    @Incoming("channel-1")

    public SubscriberBuilder consume() {

    return ReactiveStreams.builder()

    .forEach(payload -> {

    System.out.println(">" + payload);

    });

    }

    >first

    >second

    >third

    Listing 13-43

    Incoming Method with Explicit forEach

    ```


    When the reactive stream is no longer hidden, you can construct more advanced
    reactive pipelines and employ more operators, such as `.map()` to transform payloads
    to uppercase.


    ```java

    @Incoming("channel-1")

    public SubscriberBuilder consume() {

    return ReactiveStreams.builder()

    .map(payload -> payload.toUpperCase())

    .forEach(payload -> {

    System.out.println(">" + payload);

    });

    }

    >FIRST

    >SECOND

    >THIRD

    Listing 13-44

    Incoming Method with Reactive Operators

    ```


    For consuming, instead of providing a subscriber with the incoming method, you
    can also access the channel’s publisher directly by letting messaging inject it
    into your bean’s field or constructor parameter.


    ### Note


    Since MicroProfile Reactive Messaging 2.0


    ```java

    @Inject

    @Channel("channel-1")

    Publisher channelOnePublisher;

    Listing 13-45

    Injected Publisher

    ```


    Channels can be connected with processor methods; processor method can combine
    both `@Incoming` and `@Outgoing` annotations. It can work like a map operator
    when a method with one parameter is invoked for each stream item; or it can provide
    a reactive streams graph with operators to be aligned as a processor between the
    two channels.


    ```java

    @Incoming("channel-1")

    @Outgoing("channel-2")

    public ProcessorBuilder processor() {

    return ReactiveStreams.builder()

    .map(payload -> payload.toUpperCase());

    }

    @Incoming("channel-2")

    public void consume(String payload) {

    System.out.println(">" + payload);

    }

