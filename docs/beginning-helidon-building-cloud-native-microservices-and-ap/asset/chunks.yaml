    Maintaining integrity in distributed systems with compensation logic isn’t a new
    idea, but it can be quite complicated to achieve without special tooling. LRA
    is tooling that hides the complexities, so you can focus on business logic.


    ## Summary


    *   Distributed transactions need to sacrifice isolation to keep the microservice
    environment reactive.


    *   Compensation-based logic delegates responsibility for data consistency to
    the developer.


    *   LRA transactional context can be propagated through non-LRA-aware resources.


    # 15. Helidon SE


    This chapter covers the following topics.


    *   Understanding Helidon SE and Helidon MP differences and similarities


    *   Creating a simple Helidon SE application


    *   Using routing, configuration, health checks, and metrics


    *   Other Helidon SE features not covered in this book


    As you learned in Chapter [1](#600147_1_En_1_Chapter.xhtml), Helidon has two flavors:
    Helidon MP and Helidon SE. The entire book has been about Helidon MP, but we decided
    to dedicate the last chapter to Helidon SE. With it, the book is complete. Helidon
    SE is a big topic. It’s challenging to fit it into one chapter. So, the information
    is less detailed and compressed but covers most Helidon SE features and provides
    recipes and best practices. Let’s get started.


    ## Helidon SE Basics


    Helidon SE was compared with Helidon MP in Chapter [1](#600147_1_En_1_Chapter.xhtml).
    Let’s quickly go over it to set up the context.


    *   Helidon SE is a reactive, non-blocking flavor of Helidon.


    *   It’s built on top of Netty.


    *   Helidon SE APIs are based on Java Flow APIs.


    *   Reflection API, annotations, and dependency injection are not used.


    *   Helidon SE is a natural fit for GraalVM Native Image.


    *   Helidon SE tries to fully leverage JDK functionality and minimize the usage
    of third-party dependencies.


    Explaining the basics of reactive programming is out of this book’s scope. We
    assume that you know the concepts of backpressure, publisher/consumer, schedulers,
    and so forth. It’s required if you want to develop using Helidon SE.


    ## Generating Helidon SE Application


    Generating a Helidon SE application follows the same concepts as generating a
    Helidon MP application, explained in Chapter [2](#600147_1_En_2_Chapter.xhtml).
    This section guides you through this process, and you create the Helidon SE Quickstart
    application. The Quickstart application is a simple RESTful service ideal for
    demonstrating Helidon SE concepts. To generate it, you can use Project Starter
    or Helidon CLI.


    ### Using Project Starter


    Type [`https://helidon.io/starter`](https://helidon.io/starter) in your browser
    address bar to open Helidon Project Starter (see Figure [15-1](#600147_1_En_15_Chapter.xhtml#Fig1)).


    ![](images/600147_1_En_15_Chapter/600147_1_En_15_Fig1_HTML.jpg)


