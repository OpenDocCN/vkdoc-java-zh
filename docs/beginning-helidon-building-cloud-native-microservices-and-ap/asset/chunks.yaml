- fmt: '## Helidon Security


    Every HTTP server needs a way to limit access to its resources to specific users
    with specific rights. We developers build our own fortresses and castles with
    walls and gates to keep uninvited users away from the precious data and functionalities
    that are hidden inside. Let’s imagine this castle of ours. Not everyone in a medieval
    castle can open the main gate; otherwise, anyone can access it. And what point
    would those high walls have if the gate is unrestricted? It’s necessary to know
    who is who (authentication) and who has what rights (authorization). In our medieval
    castle, guards surely can recognize (authenticate) its residents. For example,
    if they recognize Gyles, the gatekeeper, they already know he can operate the
    gate because of his role as the gatekeeper. The warden, also well known to the
    guards, who can do almost anything, can control the gate. Among many others, he
    has the gatekeeper role too.


    Helidon, instead of guards with swords and armor, provides a system of security
    providers for authentication, authorization, and role-mapping. Each can be added
    as a stand-alone dependency and configured to work together.


    ![](images/600147_1_En_8_Chapter/600147_1_En_8_Fig4_HTML.png)


    An illustration of 3 puzzle pieces has the labels O I D C, helidon security, and
    A B A C.


    Figure 8-4


    Helidon security providers


    Security providers are designed to work together, configured by a common configuration
    structure.


    - ① Enabled providers (e.g., `abac`, `http-basic-auth,` or `oidc`)

    - ② Provider-specific configuration

    - ③ Default configuration for all web resources

    - ④ Custom security configuration per resource path


    ```yaml

    security:

    providers:

    - : ①

    ②

    - :


    web-server:

    defaults: ③


    paths:

    - path: "/greeting[/{*}]" ④


    - path: "/helloworld[/{*}]"


    Listing 8-6

    Security Configuration Structure

    ```


    For securing JAX-RS resources in Helidon, a combination of security-related [Jakarta
    Annotations](https://jakarta.ee/specifications/annotations/2.0/annotations-spec-2.0.html)
    ([JSR-250](https://jcp.org/en/jsr/detail%253Fid%253D250)) and Helidon security
    annotations can be used.


    - `io.helidon.security.annotations.Authenticated` enables or disables authentication
    on JAX-RS classes or methods.

    - `io.helidon.security.annotations.Authorized` enables or disables authorization
    on JAX-RS classes or methods.

    - `jakarta.annotation.security.RolesAllowed` defines the list of roles to be authorized
    for this resource.

    - `jakarta.annotation.security.PermitAll` signifies that all roles are authorized
    for this resource.

    - `jakarta.annotation.security.DenyAll` signifies that no roles are authorized
    for this resource.

    - `io.helidon.security.abac.policy.PolicyValidator.PolicyStatement` validates
    security attributes with the ABAC provider’s Java EE policy expression language
    (EL).

    - `io.helidon.security.abac.role.RoleValidator.Roles` validates roles with the
    ABAC provider.

    - `io.helidon.security.abac.scope.ScopeValidator.Scope` validates scopes with
    the ABAC provider.


    Most typical use cases can be solved with only `@RolesAllowed` and `@Authenticated`.
    Let’s look at how to secure the gate of our castle so only users with `gatekeeper`
    and `warden` roles can open it.


    - ① Enables authentication for this endpoint; can also be enabled at class level

    - ② Defines roles with access to this method


    ```java

    @PUT

    @Path("/gate/open")

    @Authenticated    ①

    @RolesAllowed({"gate-keeper", "warden"})    ②

    public Response openGate() {

    if (gateOpened.compareAndSet(false, true)) {

    return Response.ok().build();

    } else {

    return Response.notModified().build();

    }

    }

    Listing 8-7

    JAX-RS Method with Authentication and Authorization

    ```


    Listing [8-7](#600147_1_En_8_Chapter.xhtml#PC7) defines needed roles and authentication
    for specific JAX-RS methods. JAX-RS endpoint security can be disabled with `security.jersey.enabled`
    security key.


    Security annotations don’t set your security in stone. Security settings can be
    overridden by Helidon configuration mapped to the actual path in the following
    manner.


    - ① Properties applied to all paths

    - ② Path with wildcards to apply security configuration to


    ```yaml

    security:

    web-server:

    defaults:    ①

    authenticate: false

    paths:

    - path: "/castle/gate[/{*}]" ②

    authenticate: true

    roles-allowed: [ "gate-keeper", "warden" ]

    - path: "/castle[/{*}]"

    methods: [ "get" ]

    authenticate: true

    roles-allowed: "warden"

    Listing 8-8

    JAX-RS Methods Secured by Configuration

    ```


    One more thing that is needed is an actual security provider to make it work.


    ## Basic Authentication


    Basic authentication is the simplest but not very practical or secure approach
    to enable authentication and authorization in production. A weak part of the basic
    access authentication is providing an unencrypted password over the authorization
    HTTP header in the form of a base64 encoded username and password delimited by
    a colon. For example, a `Basic am9lbDpqb2Vs` authorization header can be easily
    decoded as `joel:joel`.


    When used without TLS, anyone can easily intercept our password. When accessed
    without this header, the endpoint returns `401 Unauthorized` with `WWW-Authenticate`
    header populated by `Basic realm="beginning-helidon"`. The client knows then that
    basic authentication is required. The browser typically shows a simple login dialog
    and retries the request with an authorization header populated by provided username
    and password.


    ![](images/600147_1_En_8_Chapter/600147_1_En_8_Fig5_HTML.jpg)


    A screenshot of the sign-in dialog box. It has the local host U R L with input
    boxes for username and password, and the cancel and sign-in buttons at the bottom
    right.


    Figure 8-5


    Basic authentication dialog in the browser


    - ① Enable ABAC provider

    - ② Enable basic auth provider

    - ③ User store from configuration


    ```yaml

    security:

    providers:

    - abac: ①

    - http-basic-auth: ②

    realm: "beginning-helidon"

    users: ③

    - login: "gyles"

    password: "gyles"

    roles: ["gate-keeper"]

    - login: "alad"

    password: "alad"

    roles: ["flag-keeper"]

    - login: "joel"

    password: "joel"

    roles: ["warden"]

    Listing 8-9

    Basic Authentication Configuration

    ```


    Users with roles and passwords are provided by user stores. The configuration
    shown in Listing [8-9](#600147_1_En_8_Chapter.xhtml#PC9) provides the simplest
    user store. Another way to supply a custom user store is to implement `io.helidon.security.providers.httpauth.spi.UserStoreService`
    over service locator.


    ### Note


    A user store is registered as a service provider. If you are working on a classpath-based
    project, create a provider-configuration file with `my.package.MyCustomUserStoreService`
    as its content.


    `META-INF/services/io.helidon.security.providers.httpauth.spi.UserStoreService`


    Config runtime finds your converter over the service loader facility.


    Don’t forget to use `module-info.java` when registering a service provider in
    a JPMS module-based project. Just add the `provides` `io.helidon.security.providers.httpauth.spi.UserStoreService`
    with `my.package.MyCustomUserStoreService`; clause to `module-info.java`.


    Only one simple dependency is needed for basic auth support in Helidon MP with
    no other third-party transitive dependency.


    ```text

    io.helidon.security.providers

    helidon-security-providers-http-auth


    Listing 8-10

    Dependency Needed for Basic Authentication Provider

    ```'
