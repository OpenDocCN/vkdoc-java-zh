  raw: '# 3. Configuration


    This chapter covers the following topics.


    *   Using MicroProfile Config in Helidon-based microservices


    *   Understanding the concept of config sources


    *   Integrating with Kubernetes config maps


    *   Configuring arrays or collections


    *   Using defaults, profiles, and expressions


    Your microservice needs to be configurable. Why? Because any deployment depending
    on hard-coded values makes your service non-portable. Imagine a character from
    the sorcerer game. When you want to send him for a quest, you equip him with various
    potions and weapons most suitable for the quest he is being sent for. But if you
    couldn’t? If the sorcerer has hard-coded inventory, he is probably only good for
    some quests. It’s the same with a well configurable service; you can deploy it
    anywhere without rebuilding and repackaging it just because the name of the database
    differs. And what would you do when moving your service from the test environment
    to production? You would not want to rebuild the application just to change connection
    credentials, right? Java has its own tooling for configuration. You know about
    `System.getProperties()` and `System.getenv()`. These properties are a great way
    for providing configuration over the command line.


    By invoking the Java application with `java -DorcSlayingPotions=5 -jar mySorcerer.jar`,
    you can set the property and retrieve the value inside the application with the
    simple call `System.getProperty("orcSlayingPotions")`. It works great until you
    want it to do more, such as overriding the default values, resolving placeholders,
    or switching quickly, based on the environment profile. But what if there is a
    tool to do that, which can map your properties to the right type and inject them
    where you need them the most? Let’s introduce you to the Helidon MicroProfile
    configuration implementation. Let’s call it “Config” from now on. It’s used by
    many other Helidon features and is mentioned quite often later in this book.


    As Helidon MP provides CDI, you can effortlessly inject the config properties
    directly into your beans; no special setup is required.


    *   ① The default values are always defined as strings. The converter used for
    values coming from a config source is also applied to defaults.


    *   ② This injects the config property to the bean constructor with CDI.


    ```

    @ApplicationScoped

    public class SorcererBean {

    @Inject

    public SorcererBean(

    @ConfigProperty(name="sorcerer.orcSlayingPotions",

    defaultValue = "0")   ①

    Integer orcSlayingPotions){           ②

    Listing 3-1

    Default Value Definition with the @ConfigProperty Annotation

    ```


    If you inject the property without providing a default value and if the property
    is not found in any of the available config sources, the `NoSuchElementException`
    error is thrown during deployment. But don’t worry, for optional properties, you
    can use one of the following nullable data types.


    *   `org.eclipse.microprofile.config.ConfigValue`


    *   `Optional<TheType>`


    ## Expressions


    Sometimes, the same value needs to be used by several configuration properties
    or compiled from several others. In such cases, expressions become helpful for
    composing property values from other property values. Expressions help you avoid
    duplicities in the configuration and define context related defaults.


    *   ① Notice the default value of `15` for the `sorcerer.level` expression.


    ```

    sorcerer.level=30

    sorcerer.name=Merlin

    sorcerer.title=${sorcerer.name}_${sorcerer.level:15}   ①

    Listing 3-2

    Expression with a Default Value in a Properties File

    ```


    In Listing [3-2](#600147_1_En_3_Chapter.xhtml#PC2), the sorcerer’s title is `Merlin_30`.
    However, if the `sorcerer.level` property is missing, the default expression value
    is used, and the title becomes `Merlin_15`. Expressions are extremely handy for
    composing database connection strings or JAAS configs directly in a config file.


    ## Programmatic API


    When CDI injection is not available, programmatic API saves the day. All the goodness
    works the same way as with the injected config properties. You can access `org.eclipse.microprofile.config.Config`
    as a singleton.


    ```

    Integer orcSlayingPotions =

    ConfigProvider.getConfig()

    .getValue("sorcerer.orcSlayingPotions", Integer.class);

    Listing 3-3

    Obtaining a Configuration Property over the Programmatic API

    ```


    Or, simply inject the config to your bean with `@Inject Config`. This method allows
    you to manually access the available properties from all config sources. And what
    is that Config source? That is the place where property values come from!


    ## Config Sources


    The first thing MicroProfile Config does is it looks for the available config
    sources. Config sources provide properties that are retrievable in your application.
    Each config source has a special ordinal number that defines the order in which
    a property is resolved. If the config sources contain the same property, the one
    with the higher ordinal number is used. This feature provides an elegant way to
    override the properties when required. The following three default config sources
    are defined by the specification.


    *   All `META-INF/microprofile-config.properties` files on the classpath with
    the default priority ordinal number `100`.


    *   Environment variables with the default priority ordinal number `300` override
    the same properties in the property files. The environment variable key names
    are not case-sensitive, non-alphanumeric, and interchangeable with underscores.
    For example, the `SORCERER_ORCSLAYINGPOTIONS` key is resolved when `sorcerer.orcSlayingPotions`
    has no candidate in environment variables.


    *   System properties (our `-Dsorcerer.orcSlayingPotions=5` also works here and
    has a default priority ordinal number `400)`. So, it overrides the same properties
    from all the other default config sources.


    Figure [3-1](#600147_1_En_3_Chapter.xhtml#Fig1) shows that multiple default config
    sources supply the `sorcerer.orcSlayingPotions` property with different values.
    You already know that the property from the config source with the highest ordinal
    is injected. In our example, `SorcererBean` gets five `orcSlayingPotions`, no
    invisibility cloak, and as weapons—an axe and a sword. Properties from all the
    config sources are merged, and duplicities are resolved according to the source
    ordinal.


    ![](images/600147_1_En_3_Chapter/600147_1_En_3_Fig1_HTML.png)


    Three rectangular blocks contain a set of codes. Arrows labeled ordinal 100, ordinal
    400, and ordinal 300 from the blocks of c l i and micro profile config properties,
    point to the code in the Sorcerer Bean dot Java block.


    Figure 3-1


    Injecting config properties from various config sources with priority expressed
    by ordinals. The property with the same key from the config source with the highest
    ordinal is injected


    Priorities of the default config sources aren’t set in stone. You can change the
    priority from within with a special config key `config_ordinal`. For example,
    if you need to add another JAR on the classpath with the properties file overriding
    the one in the main JAR, you can make the file’s priority higher with the help
    of this special key, like this: `config_ordinal=105`.


    Looking at the weapons configuration in Figure [3-1](#600147_1_En_3_Chapter.xhtml#Fig1),
    you quickly recognize an array. By default, arrays are delimited with commas.
    A config array can be injected as a list, set, or an array of the desired type.


    *   ① Weapons injected as an array


    *   ② A list of strings


    *   ③ A set of strings


    ```

    @Inject

    public SorcererBean(

    @ConfigProperty(name="sorcerer.weapons")

    String[] weaponsArray,   ①

    @ConfigProperty(name="sorcerer.weapons")

    List weaponsList,   ②

    @ConfigProperty(name="sorcerer.weapons")

    Set weaponsSet{   ③

    Listing 3-4

    Configuration Properties Injected into a Bean Constructor

    ```'
