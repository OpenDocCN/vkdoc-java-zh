    2. Select Helidon MP on the Helidon Flavor screen and click Next.\n3. On the Application\
    \ Type screen, select Custom and click Next.\n4. On the Media Support screen,\
    \ keep Jackson selected or select JSON-B if you want to comply with the MicroProfile\
    \ platform. Click Next.\n5. On the Observability screen, select Health Checks.\
    \ You may also select other offered options like Metrics and Tracing.\n6. Click\
    \ Download to generate your project, or go through the rest of the steps to continue\
    \ configuration.\n\n## Using CLI\n\nYou need to have Helidon CLI installed, as\
    \ explained in Chapter [2](#600147_1_En_2_Chapter.xhtml).\n\nStart new project\
    \ generation using the `helidon init` command. CLI and Project Starter use the\
    \ same configuration wizard. Answer questions as explained earlier. Once you finish\
    \ the configuration wizard, you get a project with health check support generated.\n\
    \n## Adding Dependencies Manually\n\nIf you want to add health checks support\
    \ to your existing project, manually add dependencies to your Maven project.\n\
    \nThe easiest option is using the `helidon-microprofile` bundle, which contains\
    \ `helidon-microprofile-health` as a transitive dependency.\n\n```\nio.helidon.microprofile.bundles\n\
    helidon-microprofile\n```\n\nIf you don’t want to depend on the bigger `helidon-microprofile`\
    \ bundle, you can add Health support manually by adding the following dependencies\
    \ to your `pom.xml`.\n\n- ① MicroProfile Core dependency\n- ② MicroProfile Health\n\
    - ③ Optional built-in checks\n\n```\nio.helidon.microprofile.bundles\nhelidon-microprofile-core\
    \   ①\n\nio.helidon.microprofile.health\nhelidon-microprofile-health ②\n\nio.helidon.health\n\
    helidon-health-checks       ③\n```\n\n## Built-in Checks\n\nHelidon comes with\
    \ built-in health checks that help determine general issues each application can\
    \ face.\n\nTable 4-3\n\nBuilt-in Checks\n\n| Built-in Check | Description |\n\
    | --- | --- |\n| Deadlock | Liveness check which looks for thread deadlocks with\
    \ the help of `ThreadMXBean`. Returns DOWN if a deadlock is detected. |\n| Disk\
    \ space | Liveness check returning DOWN if used disk space exceeds the threshold.\
    \ The threshold is configured by the `helidon.health.diskSpace.thresholdPercent`\
    \ configuration property and has a value of 99.99 by default. Users can also configure\
    \ a file system path to check available space using the `helidon.health.diskSpace.path`\
    \ configuration property. Returned JSON entity contains additional disk space\
    \ information, such as total volume size, and available space. |\n| Heap memory\
    \ | Liveness check returning DOWN if used heap memory goes beyond the threshold.\
    \ The threshold is configured by the `helidon.health.heapMemory.thresholdPercent`\
    \ configuration property and has a value of 98 by default. Returned JSON entity\
    \ contains additional information, such as total memory size, and available memory.\
    \ |\n\nListing [4-3](#600147_1_En_4_Chapter.xhtml#PC5) demonstrates the response\
    \ of Helidon liveness health check (`/health/live`) if no custom checks are configured.\n\
    \n- ① Overall status\n- ② Deadlock check\n- ③ Disk space check\n- ④ Heap memory\
    \ check\n\n```json\n{\n  \"status\" : \"UP\",                         ①\n  \"\
    checks\" : [\n    {\n      \"name\" : \"deadlock\",               ②\n      \"\
    status\" : \"UP\"\n    },\n    {\n      \"name\" : \"diskSpace\",            \
    \  ③\n      \"status\" : \"UP\",\n      \"data\" : {\n        \"free\" : \"428.01\
    \ GB\",\n        ...\n      }\n    },\n    {\n      \"name\" : \"heapMemory\"\
    ,             ④\n      \"status\" : \"UP\"\n    }\n  ]\n}\n```\n\nListing 4-3\
    \  \nBuilt-in Health Checks\n\n## Custom Checks\n\nAlthough built-in health checks\
    \ provide a basis suitable for all applications, you may want to extend its coverage\
    \ by adding application-specific health checks. For example, add database connectivity\
    \ checks if you are dealing with databases or third-party systems checks if you\
    \ use third-party systems.\n\nTo create your custom health check, add a CDI bean\
    \ implementing the `org.eclipse.microprofile.health.HealthCheck` interface and\
    \ annotate it with one of the following annotations defining the check type.\n\
    \n- `@Liveness` for a liveness check\n- `@Readiness` for a readiness check\n-\
    \ `@Startup` for a startup check\n\nListing [4-4](#600147_1_En_4_Chapter.xhtml#PC6)\
    \ is a simple liveness check that returns UP only if invoked during working hours.\n\
    \n- ① Marks this bean as a liveness health check\n- ② Makes this class an application-scoped\
    \ CDI bean\n- ③ Interface defining `call()` method invoked every time a health\
    \ check is probed\n- ④ Status computation\n\n```java\n@Liveness              \
    \                                 ①\n@ApplicationScoped                      \
    \                ②\npublic class WorkingHoursCheck implements HealthCheck { ③\n\
    \    @Override\n    public HealthCheckResponse call() {\n        return HealthCheckResponse.builder()\n\
    \            .name(\"working-hours-check\")\n            .withData(\"time\", LocalDateTime.now()\n\
    \                .toString())\n            .status(getStatus())              \
    \      ④\n            .build();\n    }\n\n    private boolean getStatus() {\n\
    \        int hour = LocalDateTime.now().getHour();\n        return hour >= 9 &&\
    \ hour <= 17;\n    }\n}\n```\n\nListing 4-4  \nWorking Hours Liveness Custom Check\n\
    \n### Note\n\nYou can find sample application sources in the GitHub repository\
