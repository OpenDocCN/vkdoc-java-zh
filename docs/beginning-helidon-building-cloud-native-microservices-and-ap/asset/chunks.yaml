    ## Kafka Connector


    Kafka is a popular, distributed messaging system developed by the Apache Software
    Foundation. Designed to be highly scalable, fault-tolerant, and durable, Kafka
    can handle high volumes of data and is optimized for low-latency message delivery.
    In Kafka messaging, messages are organized into topics, which are partitioned
    across a cluster of servers called brokers. Each partition can be replicated across
    multiple brokers for redundancy and fault tolerance. Kafka is widely used in big
    data and streaming data applications for processing and analyzing large amounts
    of data in real-time.


    For consuming and publishing messages from and to Kafka brokers, Helidon provides
    a connector for reactive messaging.


    ```text

    io.helidon.messaging.kafka

    helidon-messaging-kafka


    Listing 13-54

    Kafka Connector Dependency

    ```


    Kafka supports both point-to-point(queue) and publish-subscribe (topic) paradigms,
    by the same Kafka topic. Kafka topic is basically a partitioned queue, for which
    consumers share offset of the messages already read among groups. Each consumer
    can either subscribe as a part of an existing group (behaves like a queue) or
    a new group exclusive to a single consumer (works like a topic).


    - ① Zookeeper or Kafka broker location

    - ② Message serializers

    - ③ Message deserializers

    - ④ Topic name

    - ⑤ When starting for the first time with current group ID, read only the new
    messages

    - ⑥ Turn off auto commit, offset is committed by acknowledge mechanism

    - ⑦ Group for which the topic behaves like a queue, index is shared


    ```yaml

    serializer.pkg: org.apache.kafka.common.serialization

    mp.messaging:

    connector:

    helidon-kafka:

    bootstrap.servers: localhost:9092  ①

    key.serializer: ${serializer.pkg}.StringSerializer  ②

    value.serializer: ${serializer.pkg}.StringSerializer

    key.deserializer: ${serializer.pkg}.StringDeserializer  ③

    value.deserializer: ${serializer.pkg}.StringDeserializer

    incoming.from-kafka:

    connector: helidon-kafka

    topic: messaging-test-topic-1  ④

    auto.offset.reset: latest  ⑤

    enable.auto.commit: false   ⑥

    group.id: example-group-1  ⑦

    outgoing.to-kafka:

    connector: helidon-kafka

    topic: messaging-test-topic-1

    Listing 13-55

    Kafka Connector Configuration

    ```


    With disabled auto commit, reactive messaging acknowledgment effectively commits
    the partition offset for the current consumer group. This means that when a message
    is not acknowledged, an offset is not committed. When the messaging channel dies
    without acking a message and the microservice gets restarted, the message gets
    redelivered. This may not be always desirable so Kafka connection also supports
    reactive messaging nacking `Message.nack(Throwable t)`.'
