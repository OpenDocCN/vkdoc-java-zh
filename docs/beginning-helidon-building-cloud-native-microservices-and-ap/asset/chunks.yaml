    \ enrolled in the transaction, is removed from the transaction. Other compensation\
    \ methods like `@Complete` won’t be called in this transaction context as the\
    \ participant is no longer tracked by the coordinator for this transaction.\n\n\
    - ① ID of the LRA transaction participant needs to leave\n- ② Method is executed\
    \ after the coordinator has been asked to remove the participant from the LRA\
    \ transaction\n\n```java\n@Leave\n@PUT\n@Path(\"/leave\")\npublic Response leave(@HeaderParam(LRA_HTTP_CONTEXT_HEADER)\
    \ URI lraId) {  ①\n    return Response.ok();  ②\n}\n```\n\nListing 14-8  \nJAX-RS\
    \ Leave Resource, Used for Removing Participant from LRA Transaction\n\n**Note**\n\
    \nThe `leave` method is contrary to the other participant’s methods, meant to\
    \ be called directly.\n\n## Non-JAX-RS Participant Methods\n\nYou have already\
    \ learned all the participant methods LRA JAX-RS resources can have. The spec\
    \ strictly defines each method, so there is no need to define it as a JAX-RS method.\
    \ When the method has LRA participant annotation and conforms to a specified signature,\
    \ LRA Helidon implementation creates a surrogate JAX-RS endpoint and wires it\
    \ together behind the scenes.\n\nLet’s look at the JAX-RS `@Compensate` method\
    \ again.\n\n```java\n@PUT\n@Compensate\n@Path(\"compensate-example\")\npublic\
    \ Response failure(@HeaderParam(LRA_HTTP_CONTEXT_HEADER) URI lraId) {\n    return\
    \ LRAResponse.compensated();\n}\n```\n\nListing 14-9  \nJAX-RS Compensate Resource\n\
    \nSame participant method can be expressed with non-JAX-RS notation.\n\n```java\n\
    @Compensate\npublic ParticipantStatus failure(URI lraId) {\n    return ParticipantStatus.Compensated;\n\
    }\n```\n\nListing 14-10  \nNon-JAX-RS Compensate Resource\n\nThe only difference\
    \ between the participant methods is that the compensation link sent to the coordinator\
    \ will have a slightly different pattern because it targets the surrogate JAX-RS\
    \ resource instead of our direct resource.\n\n## Asynchronous Compensation\n\n\
    Compensations can take a long time, and complicated clean-up jobs running for\
    \ 5 minutes can be a reality. Blocking the `@Compensate` method for that long\
    \ is not right, so you need to respond to the coordinator and continue asynchronously.\
    \ What if an asynchronous compensation batch job fails? LRA has just the right\
    \ API for such a situation. There are two options. The first option is to return\
    \ `ParticipantStatus.Compensating` to inform the coordinator about the need to\
    \ check the current compensation status via the `@Status` method later. Each coordinator\
    \ has a retry strategy to retrieve the status eventually.\n\n```java\nprivate\
    \ Map myStatusMap = new ConcurrentHashMap();\n\n@Compensate\npublic ParticipantStatus\
    \ failure(URI lraId) {\n    ourWizardService.compensateAsync(lraId)\n        .whenComplete((u,\
    \ t) -> {\n            if (t != null) {\n                myStatusMap.put(lraId,\
    \ ParticipantStatus.FailedToCompensate);\n            } else {\n             \
    \   myStatusMap.put(lraId, ParticipantStatus.Compensated);\n            }\n  \
    \      });\n    return ParticipantStatus.Compensating;\n}\n\n@Status\npublic ParticipantStatus\
    \ status(URI lraId) {\n    return myStatusMap.get(lraId);\n}\n\n@Forget\npublic\
    \ void forget(URI lraId) {\n    myStatusMap.remove(lraId);\n}\n```\n\nListing\
    \ 14-11  \nAsynchronous Compensation with Status Reporting\n\nYou can leverage\
    \ the `@Forget` method to clean up status references when the coordinator calls\
    \ it to inform you it is not needed anymore.\n\nThe second option is even easier,\
    \ as non-JAX-RS compensation methods support returning `CompletionStage` promises.\
    \ The only setback is that the connection is kept open, but no thread is blocked.\n\
    \n```java\n@Compensate\npublic CompletionStage failure(URI lraId) {\n    return\
