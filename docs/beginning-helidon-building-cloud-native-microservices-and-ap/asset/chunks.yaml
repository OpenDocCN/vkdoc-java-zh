    ### 修改请求与响应


    你可能已经注意到，`@RegisterProvider` 被用来注册异常映射器。它同样也用于注册不同的过滤器和修改器。


    你可以在请求和响应周围使用过滤器。


    *   当从远程服务接收到响应时，会按顺序调用 **ClientResponseFilter**。


    *   当向远程服务发出请求时，会按顺序调用 **ClientRequestFilter**。


    例如，如果你想记录发出了什么请求，你应该创建一个实现 `ClientRequestFilter` 的类。通过重写 `filter(ClientRequestContext
    requestContext)` 函数，你可以使用当前请求的任何信息，例如请求头、URL 等。你可以从作为参数传入的 `ClientRequestContext`
    对象中获取这些信息。


    *   ① 实现 `ClientRequestFilter`。


    *   ② 重写 `filter(...)`，并从 `ClientRequestContext` 获取信息。


    ```

    public class WizardRequestFilter implements ClientRequestFilter {                  ①

    private static final Logger log =

    Logger.getLogger(String.valueOf(WizardRequestFilter.class));

    @Override

    public void filter(ClientRequestContext requestContext) {              ②

    log.info("Request intercepted: " + requestContext.getHeaders());

    }

    }

    Listing 5-10

    Request Filter

    ```


    对响应过滤器也可以做同样的事情。你应该创建一个实现 `ClientResponceFilter` 的类。在这种情况下，记录响应状态。


    *   ① 实现 `ClientResponseFilter`。


    *   ② 重写 `filter(`⋯`)`，并从 `ClientResponseContext` 获取信息。


    ```

    public class WizardResponseFilter implements ClientResponseFilter {        ①

    private static final Logger log =

    Logger.getLogger(String.valueOf(WizardResponseFilter.class));

    @Override

    public void filter(ClientRequestContext requestContext,

    ClientResponseContext responseContext) { ②

    log.info("Intercepted response status"

    + responseContext.getHeaders());

    }

    }

    Listing 5-11

    Response Filter

    ```


    最后，你必须将这些过滤器注册到 `WizardRestClient` 中，和异常映射器一样简单，使用 `@RegisterProvider` 注解，如清单
    5-12 所示。


    *   ① 注册 `WizardRequestFilter`。


    *   ② 注册 `WizardResponseFilter`。


    ```

    @RegisterRestClient(baseUri="http://localhost:8080/wizard")

    @RegisterProvider(WizardExceptionMapper.class)

    @RegisterProvider(WizardRequestFilter.class)               ①

    @RegisterProvider(WizardResponseFilter.class)              ②

    interface WizardRestClient {

    ...

    }

    Listing 5-12

    Register Filters

    ```


    现在，如果你运行 sorcery ministry 应用并调用 `/wizardClient` 端点，你会在日志输出中看到清单 5-13。


    ```

    {Accept=[application/json], Magic-Header=[Custom header magic value]}

    {content-length=[13], connection=[keep-alive], Date=[Wed, 28 Jan 2023 16:14:24
    +0300], Content-Type=[application/json]}

    Listing 5-13

    Sample Output

    ```


    这些过滤器正在按预期工作，并返回了请求头信息。


    其他拦截器和修改器也可以用同样的方式应用。


    *   **MessageBodyReader** 用于在调用之后，需要从 API 响应中读取实体时。


    *   **MessageBodyWriter** 用于在 `@POST` 和 `@PUT` 操作以及其他支持请求体的 HTTP 方法中，将请求体写入请求。


    *   **ParamConverter** 用于将资源方法中的参数转换为请求或响应所需的格式。


    *   **ReaderInterceptor** 是一个监听器，当对远程服务调用收到的响应进行读取时触发。


    *   **WriterInterceptor** 是一个监听器，当在远程服务调用时向待发送流进行写入时触发。


    可以控制 Provider 的调用优先级。当你想设置显式优先级值时，可以使用 `@Priority`，例如 `@Priority(1000)`。这意味着被注解的
    Provider 会在较后阶段之一被使用。无论是以编程方式还是通过注解方式，都可以使用构建器模式来注册 Provider。包含 `@RegisterProvider`
    注解的 Provider 从属于使用构建器注册的 Provider。类上的 `@Priority` 注解从属于 `@RegisterProvider` 注解。


    Provider 的优先级可以通过各种 `Configurable` 方法被覆盖，这些方法可以接收 `Provider` 类、`Provider` 实例、优先级以及这些优先级的映射。

    '
- fmt: '## Handling Headers


    HTTP headers are designed to enable the transfer of supplementary details between
    the client and server when sending an HTTP request or response. A header comprises
    a name that is not case-sensitive, followed by a colon (`:`) and its corresponding
    value. Headers are crucial for implementing various security, authentication,
    tracing, and other mechanisms.


    To specify headers for service calls, annotate a method parameter with the `@HeaderParam`
    annotation.


    - ① Injects `Custom-Header` header.

    - ② Injects an aggregate bean with fields annotated using the `…​Param` annotation.

    - ③ Injects `AuthToken` from a cookie.

    - ④ This is a class with `@HeaderParam` and `@PathParam` annotated fields used
    in `<2>`.


    ```java

    @Path("/wizard")

    public interface WizardRestClient {

    //.. other methods omitted

    @POST

    Response createWizard(@HeaderParam("Custom-Header")

    String customHeader,    ①

    Wizard wizard);

    @PUT

    @Path("/{name}")

    Response updateWizard(@BeanParam PutWizard putWizard,

    Wizard wizard);②

    @DELETE

    @Path("/{name}")

    Response deleteWizard(@CookieParam("AuthToken")

    String token, ③

    @PathParam("name") String name);

    }

    public class PutWizard {                                 ④

    @HeaderParam("Custom-Header")

    private String custom;

    @PathParam("name")

    private String name;

    // ...

    }

    Listing 5-14

    Header Parameters

    ```


    But if you need to specify an HTTP Header without altering the client interface
    method signature, you should use `@ClientHeaderParam` annotation. It has three
    parameters.


    - `name` is the header name.

    - `value` is the header value, which must be `String` or `string[]`, or a reference
    to a method that computes the value.

    - `required` is a boolean value that determines whether a request should fail
    if the compute method throws an exception.

    - ① Set a custom header to the client method.


    ```java

    @Path("/wizard")

    public interface WizardRestClient {

    //.. other methods omitted

    @POST

    @ClientHeaderParam(name="Magic-Header",

    value="Custom header magic value", required=false)     ①

    Response postWizardCustomHeader(Wizard wizard) {...}

    }

    Listing 5-15

    Client Header Parameters

    ```


    To add or distribute headers in bulk, `ClientHeadersFactory` is utilized. This
    factory contains only one method that accepts two read-only `MultivaluedMap` parameters.
    If the client is operating in a JAX-RS environment, the first map represents headers
    from the incoming JAX-RS request, whereas the second map includes headers specified
    using `@ClientHeaderParam`, `@HeaderParam`, `@BeanParam`, and so on that are sent.
    The returned result is `MultivaluedMap`, representing the “final” set of headers
    to be transmitted in the outbound processing flow.


    ### Note


    The final map of headers could still be changed by providers, such as filters,
    interceptors, and message body writers before the HTTP request is sent.


    To add custom headers, you should implement `ClientHeadersFactory` and override
    the `update` method. There you have all the incoming and outgoing headers. As
    a result, you should return a map with the headers you want.


    - ① Implements `ClientHeadersFactory`.

    - ② Overrides `update` method returning a `MultivaluedHashMap` with the header
    desired.


    ```java

    public class WizardHeaderHandler implements ClientHeadersFactory {                                     ①

    @Override

    public MultivaluedMap

    update(MultivaluedMap incomingHeaders,

    MultivaluedMap clientOutgoingHeaders) {

    return new MultivaluedHashMap() {{

    put("Magic-Header",

    List.of("Custom header magic value"));   ②

    }};

    }

    }

    Listing 5-16

    Client Headers Factory

    ```


    Following the same paradigm as `Provider`, `WizardHeaderHandler` must be registered
    with the REST client interface. It is achieved with the `@RegisterClientHeaders`
    annotation.


    - ① Registers the `WizardHeaderHandler`.


    ```java

    ...

    @RegisterClientHeaders(WizardHeaderHandler.class)  ①

    interface WizardRestClient {

    ...

    }

    Listing 5-17

    Register Header Handler

    ```


    Now there is a “magic header” in the headers.


    ## Asynchronous Operations


    MicroProfile Rest Client is a very powerful tool. If you must consume heavy or
    long-running requests, you can make them asynchronous so that these calls won’t
    block your service. It is achieved very easily: a method should return `CompletionStage<>`.
    In our particular wizard client, replace the return type, as shown in Listing
    `[5-18](#600147_1_En_5_Chapter.xhtml#PC18)`.


    - ① Asynchronous version of the `getMostMightyWizard` method.

    - ② Asynchronous version of the `getWizardByName` method.


    ```java

    interface WizardAsyncRestClient {

    @GET

    CompletionStage getMostMightyWizard();      ①

    @Path("/{name}")

    @GET

    CompletionStage

    getWizardByName(@PathParam("name") String name); ②

    }

    Listing 5-18

    Asynchronous Operations

    ```


    Now you can asynchronously process client requests using standard Java language
    features.


    If you need to intercept and manipulate asynchronous calls, please consult the
    MicroProfile Rest Client [documentation](https://download.eclipse.org/microprofile/microprofile-rest-client-3.0/microprofile-rest-client-spec-3.0.html%2523_asyncinvocationinterceptors).


    ## Programmatic APIs


    MicroProfile Rest Client can also be created using a programmatic API via a builder
    obtained from `RestClientBuilder.newBuilder()`. This is the way to use MicroProfile
    RestClients outside the managed CDI environment. `RestClientBuilder` provides
    methods to configure client details and define the desired REST client interface.


    - ① Uses a builder pattern to create the client.

    - ② Sets `baseUrl`.

    - ③ Sets `followRedirects` to `true`.

    - ④ Configures the proxy.


    ```java

    WizardRestClient client =

    RestClientBuilder.newBuilder()                      ①

    .baseUri(URI.create("http://localhost:8080/wizard"))    ②

    .followRedirects(true)                         ③

    .proxyAddress("http://someobscureproxy.com:9000")  ④

    .build(WizardRestClient.class);

    Wizard wizard = client.getMostMightyWizard();

    Listing 5-19

    Programmatic Operations

    ```


    You can set all the properties programmatically. For SSL setup, there are corresponding
    `trustStore` and `keyStore` objects.


    ### Note


    MicroProfile Rest Client instances created using builder are not injectable, as
    this usage is designed for operating outside the CDI container. So, if you create
    a client instance this way, it is not visible to the CDI container.


    ## MicroProfile Rest Client Conclusion


    As mentioned, MicroProfile Rest Client is a very powerful tool. This chapter covers
    the main usage cases of it. But it can do much more, like server-side events handling,
    its integrations with MicroProfile Config and fault tolerance, and other cool
    features.


    Please refer to the official [documentation](https://github.com/eclipse/microprofile-rest-client/releases/tag/3.0)
    for all details.'
