    \ string is specified, the name is automatically generated based on the class\
    \ name and method name.\n\n*   ① Traced method\n\n*   ② Not traced method\n\n\
    ```\n@Traced         ①\npublic String getMessage() {\nreturn message.get();\n\
    }\n@Traced(false)  ②\npublic String getMessageWithNoTraces() {\nreturn message.get();\n\
    }\nListing 4-21\nUsing the @Traced Annotation\n```\n\nThe OpenTracing `Tracer`\
    \ object provides more precise control over spans. It allows you to build spans,\
    \ set tags, log events, and so on. Helidon automatically creates and initializes\
    \ an OpenTracing Tracer object. The developer only needs to inject it into a bean\
    \ class and invoke its methods.\n\n```\n@Inject\nio.opentracing.Tracer tracer;\n\
    public void importantWork() {\nSpan span = tracer.buildSpan(\"important-work\"\
    ).start();\nspan.setTag(...);\nspan.log(...);\n// Do some important work\n...\n\
    span.finish();\n}\nListing 4-22\nUsing the Tracer Object\n```\n\n### Configuration\n\
    \nHelidon allows users to configure its internal tracing components, enable and\
    \ disable tracing completely for specified components or endpoints, and rename\
    \ built-in spans.\n\n#### Enabling/Disabling Tracing\n\nMicroProfile OpenTracing\
    \ specification allows disabling tracing for JAX-RS resources using configuration.\
    \ You should specify a regular expression matching resources URIs in the `mp.opentracing.server.skip-pattern`\
    \ configuration property, which usually sits in `/META-INF/microprofile-config.properties`\
    \ file (see how to use configuration properties in Chapter [3](#600147_1_En_3_Chapter.xhtml)).\n\
    \nNote\n\nThe endpoints defined in MicroProfile Health, MicroProfile Metrics,\
    \ and OpenAPI specifications are always excluded from tracing.\n\nThe following\
    \ disables all tracing.\n\n```\nmp.opentracing.server.skip-pattern=.*\n```\n\n\
    Disabling tracing for the `/foo` endpoint and any endpoint starting with `/bar`.\n\
    \n```\nmp.opentracing.server.skip-pattern=/foo|/bar.*\n```\n\nHelidon provides\
    \ its own way of configuring tracing. Configuration can be defined in *application.yaml*.\
    \ In addition to enabling/disabling tracing for some endpoints, you can enable/disable\
    \ Helidon built-in spans.\n\n*   ① Path to configure (It uses a special format\
    \ for pattern matching. You can read more about it in the Helidon documentation.)\n\
    \n*   ② *true* to enable tracing and *false* to disable\n\n*   ③ Name of the configured\
    \ component (one of *web-server*, *security*, *jax-rs*)\n\n*   ④ Name of a span\
    \ (see Table [4-13](#600147_1_En_4_Chapter.xhtml#Tab13) for all available span\
    \ names)\n\n*   ⑤ Enables or disables the span\n\n*   ⑥ Log name (see options\
    \ for the specified span in Table [4-13](#600147_1_En_4_Chapter.xhtml#Tab13))\n\
    \n*   ⑦ Enables or disables the log\n\n```\ntracing:\npaths:\n- path: \"/favicon.ico\"\
    \              ①\nenabled: false                    ②\n- path: \"/somepath\"\n\
    enabled: false\ncomponents:\nweb-server:                         ③\nspans:\n-\
    \ name: \"HTTP Request\"          ④\nenabled: true                 ⑤\nlogs:\n\
    - name: \"content-write\"     ⑥\nenabled: false            ⑦\nListing 4-23\nExample\
    \ of Tracing Configuration in application.yaml\n```\n\nIf you don’t like YAML,\
    \ its content can be flattened into properties format and placed into `META-INF/microprofile-config.properties`.\n\
    \n```\ntracing.paths.0.path=\"/favicon.ico\"\ntracing.paths.0.enabled=false\n\
    tracing.paths.1.path=\"/somepath\"\ntracing.paths.1.enabled=false\ncomponents.web-server.spans.0.name=\"\
    HTTP Request\"\ncomponents.web-server.spans.0.enabled=true\ncomponents.web-server.spans.0.logs.0.name=\"\
    content-write\"\ncomponents.web-server.spans.0.logs.0.enabled=false\nListing 4-24\n\
    Example of Tracing Configuration in microprofile-config.properties\n```\n\n####\
    \ Renaming a Top-Level Span\n\nIn some situations, renaming the top-level HTTP\
    \ request span makes sense to better suit users’ needs. Helidon provides this\
    \ ability.\n\nNote\n\nThis is supported only for the HTTP request span of the\
    \ web server component. It’s not supported for other spans.\n\nProvide a new name\
    \ in the `new-name` configuration property, as shown in the following sample.\n\
    \n```\ntracing.components.web-server.spans.0.name=\"HTTP Request\"\ntracing.components.web-server.spans.0.new-name:\
    \ \"HTTP %1$s %2$s\"\n```\n\nYou can use the following parameters.\n\n*   A **method**\
    \ is an HTTP method.\n\n*   A **path** is a path of the request (such as `/greet`).\n\
    \n*   A **query** is the request (may be null)."
  trans: "\n#### Helidon 内置 Span\n\n当 Helidon 添加一个 span 时，它会是表 4-13 中列出的 span 之一。每个\
    \ span 都属于 web server、security 或 JAX-RS 组件。为节省空间，组件名称放在描述列中。这些 span 具有很高的可定制性。你可以修改它们的名称并启用/禁用它们。更多信息请参阅\
    \ tracing 配置章节。\n\n每个 span 可选地包含 *日志* 和 *标签*。*日志* 是键值对，包含一些额外的 span 特定信息。*标签*\
    \ 是用于标记、查询和过滤数据的键值对。表 4-13 仅列出了一部分日志和标签。详细说明请参阅 [Helidon 文档](https://helidon.io/docs/v3/%2523/mp/tracing)。\n\
    \n表 4-13\n\nHelidon 内置 Span\n\n| Span 名称 | 描述 | Span 日志 | 标签 |\n| --- | --- |\
    \ --- | --- |\n| HTTP Request | 覆盖从请求到达到响应发送的整体 span。组件：*web-server* | handler.class\
    \ | component, http.method, http.status_code, http.url, error |\n| content-read\
    \ | 读取请求实体。组件：*web-server* | N/A | requested.type |\n| content-write | 写入响应实体。组件：*web-server*\
    \ | N/A | response.type |\n| security | 覆盖安全处理的整体 span。组件：*security* | status\
    \ | security.id |\n| security:atn | 对客户端进行认证。组件：*security* | security.user, security.service,\
    \ status | N/A |\n| security:atz | 对客户端进行授权。组件：*security* | status | N/A |\n|\
    \ security:response | 响应的安全处理。组件：*security* | N/A | N/A |\n| security:outbound\
    \ | 出站请求的安全处理。组件：*security* | status | N/A |\n| generated name | 端点方法调用：name =\
    \ HTTP method + class name + method name。组件：*jax-rs* | N/A | N/A |\n| jersey-client-call\
    \ | 出站请求。组件：*jax-rs* | N/A | http.method, http.status_code, http.url |\n\n###\
    \ MicroProfile OpenTracing API\n\nMicroProfile OpenTracing 可以“无代码”工作。但如果开发者希望显式地操作\
    \ spans，它也提供了 API。这个 API 非常简单，由 `@Traced` 注解和 `Tracer` 类组成。\n\n`@Traced` 注解可以放在方法或类上。放在类上时，它会影响该类的所有公共方法。该注解会为方法的每次调用创建一个新的子\
    \ span。\n\n`@Traced` 注解使用拦截器，因此该类必须是 CDI bean，并且方法必须通过 CDI 调用。对通过 `new` 创建的实例进行普通\
    \ Java 方法调用不会触发 tracing！此外，类型内部的方法调用也无效。如果你从另一个资源方法调用 JAX-RS 资源上的某个方法，则目标方法上的任何注解都会被忽略。\n\
    \n`@Traced` 注解有两个可选参数。\n\n*   **value=[true|false]**\n\n    默认值为 true。启用或禁用对应方法的\
    \ tracing（如果放在类上，则是该类所有公共方法）。\n\n*   **operationName=<span name>**\n\n    默认值为\
    \ “” 。如果指定空字符串，则会基于类名和方法名自动生成名称。\n\n*   ① 被追踪的方法\n\n*   ② 不被追踪的方法\n\n```\n@Traced\
    \         ①\npublic String getMessage() {\nreturn message.get();\n}\n@Traced(false)\
    \  ②\npublic String getMessageWithNoTraces() {\nreturn message.get();\n}\nListing\
    \ 4-21\nUsing the @Traced Annotation\n```\n\nOpenTracing 的 `Tracer` 对象提供了对 spans\
    \ 更精细的控制。它允许你构建 spans、设置标签、记录事件等。Helidon 会自动创建并初始化一个 OpenTracing Tracer 对象。开发者只需要将其注入\
    \ bean 类并调用其方法。\n\n```\n@Inject\nio.opentracing.Tracer tracer;\npublic void importantWork()\
    \ {\nSpan span = tracer.buildSpan(\"important-work\").start();\nspan.setTag(...);\n\
    span.log(...);\n// Do some important work\n...\nspan.finish();\n}\nListing 4-22\n\
    Using the Tracer Object\n```\n\n### 配置\n\nHelidon 允许用户配置其内部 tracing 组件、为指定组件或端点完全启用或禁用\
    \ tracing，并重命名内置 spans。\n\n#### 启用/禁用 Tracing\n\nMicroProfile OpenTracing 规范允许通过配置禁用\
    \ JAX-RS 资源的 tracing。你需要在 `mp.opentracing.server.skip-pattern` 配置属性中指定一个匹配资源 URI\
    \ 的正则表达式。该属性通常位于 `/META-INF/microprofile-config.properties` 文件中（配置属性的使用方式见第 3\
    \ 章）。\n\n注意\n\nMicroProfile Health、MicroProfile Metrics 和 OpenAPI 规范中定义的端点总是被排除在\
    \ tracing 之外。\n\n以下配置会禁用所有 tracing。\n\n```\nmp.opentracing.server.skip-pattern=.*\n\
    ```\n\n禁用 `/foo` 端点以及任何以 `/bar` 开头的端点的 tracing。\n\n```\nmp.opentracing.server.skip-pattern=/foo|/bar.*\n\
    ```\n\nHelidon 提供了自己的 tracing 配置方式。配置可以定义在 *application.yaml* 中。除可为某些端点启用/禁用 tracing\
    \ 外，你还可以启用/禁用 Helidon 内置 spans。\n\n*   ① 要配置的路径（它使用一种特殊的模式匹配格式。更多信息可参阅 Helidon\
    \ 文档。）\n\n*   ② *true* 表示启用 tracing，*false* 表示禁用\n\n*   ③ 被配置组件的名称（*web-server*、*security*、*jax-rs*\
    \ 之一）\n\n*   ④ span 的名称（所有可用 span 名称见表 4-13）\n\n*   ⑤ 启用或禁用该 span\n\n*   ⑥ 日志名称（见表\
    \ 4-13 中指定 span 的可选项）\n\n*   ⑦ 启用或禁用该日志\n\n```\ntracing:\npaths:\n- path: \"/favicon.ico\"\
    \              ①\nenabled: false                    ②\n- path: \"/somepath\"\n\
    enabled: false\ncomponents:\nweb-server:                         ③\nspans:\n-\
    \ name: \"HTTP Request\"          ④\nenabled: true                 ⑤\nlogs:\n\
    - name: \"content-write\"     ⑥\nenabled: false            ⑦\nListing 4-23\nExample\
    \ of Tracing Configuration in application.yaml\n```\n\n如果你不喜欢 YAML，也可以将其内容扁平化为\
    \ properties 格式，并放入 `META-INF/microprofile-config.properties`。\n\n```\ntracing.paths.0.path=\"\
    /favicon.ico\"\ntracing.paths.0.enabled=false\ntracing.paths.1.path=\"/somepath\"\
    \ntracing.paths.1.enabled=false\ncomponents.web-server.spans.0.name=\"HTTP Request\"\
    \ncomponents.web-server.spans.0.enabled=true\ncomponents.web-server.spans.0.logs.0.name=\"\
    content-write\"\ncomponents.web-server.spans.0.logs.0.enabled=false\nListing 4-24\n\
    Example of Tracing Configuration in microprofile-config.properties\n```\n\n####\
    \ 重命名顶层 Span\n\n在某些情况下，重命名顶层 HTTP request span 有助于更好地满足用户需求。Helidon 提供了这一能力。\n\
    \n注意\n\n这仅支持 web server 组件中的 HTTP request span。不支持其他 span。\n\n如以下示例所示，在 `new-name`\
    \ 配置属性中提供一个新名称。\n\n```\ntracing.components.web-server.spans.0.name=\"HTTP Request\"\
    \ntracing.components.web-server.spans.0.new-name: \"HTTP %1$s %2$s\"\n```\n\n\
    你可以使用以下参数。\n\n*   **method** 表示 HTTP 方法。\n\n*   **path** 表示请求路径（例如 `/greet`）。\n\
    \n*   **query** 表示请求查询串（可能为 null）。\n"
- fmt: "## Logging\n\nLogging is the final (and shortest) section of this chapter.\
    \ Logging is what developers use the most compared to health checks, metrics,\
    \ and tracing. Most of you are familiar with logging and know what it is and why\
    \ it should be used, but if you are not, we’ll try to explain it.\n\nLogging tells\
    \ you what is happening inside individual software components within a service.\n\
    \nThe information answering this question gets written in a log.\n\n**Note**\n\
    \nA `log` is a sequence of timestamped records (messages) describing what the\
    \ components of a service are doing and, in some cases, why.\n\nMost often, logs\
    \ are written to log files. Log files are normal text files with the `.log` extension.\
    \ But sometimes logs are written to databases or even special logs collecting\
    \ systems.\n\nLogs are very useful for debugging and detecting problems in your\
    \ application. Developers are manually adding logging code to their sources to\
    \ log records which would help track code execution and warn about situations\
    \ that are not supposed to happen.\n\nEach record in the log has a `logging level`.\n\
    \n**Note**\n\nA `logging level` measures the logging record importance (higher\
    \ = more important).\n\nStandard Java logging (`java.util.logging`) has seven\
    \ logging levels:\n\n- `SEVERE` (highest value)\n- `WARNING`\n- `INFO`\n- `CONFIG`\n\
    - `FINE`\n- `FINER`\n- `FINEST` (lowest value)\n\nIt’s a developer’s responsibility\
    \ to choose the appropriate logging level for his logging record. A minimum logging\
    \ level is configured for the application, so records with a lower logging level\
    \ are not written to the log. Enabling all logging levels (`FINEST` level) makes\
    \ logs too big and verbose. It makes it difficult to find needed information.\
    \ On the other hand, enabling lower logging levels may help find problems.\n\n\
    Listing [4-25](#600147_1_En_4_Chapter.xhtml#PC54) demonstrates creating a logger\
    \ and using different logging levels.\n\n- ① Logger initialization\n- ② Logging\
    \ a severe message\n- ③ Another way of logging a severe message\n- ④ Logging a\
    \ warning message\n- ⑤ Another way of logging a warning message\n- ⑥ Logging an\
    \ info message\n- ⑦ Another way of logging an info message\n\n```java\nprivate\
    \ static final Logger LOGGER =\nLogger.getLogger(Main.class.getName());      \
    \     ①\npublic void loggingDemo() {\nLOGGER.severe(\"Severe message\");     \
    \             ②\nLOGGER.log(Level.SEVERE,\n\"Another severe message\");      \
    \              ③\nLOGGER.warning(\"Warning message\");                ④\nLOGGER.log(Level.WARNING,\n\
    \"Another warning message\");                   ⑤\nLOGGER.info(\"Info message\"\
    );                      ⑥\nLOGGER.log(Level.INFO,\n\"Another info message\");\
    \                      ⑦\n}\n```\n\nListing 4-25  \nUsing Different Logging Levels\n\
    \n## Logging in Helidon\n\nHelidon components contain extensive logging using\
    \ the `java.util.logging` (JUL) API. To use it in your applications, you don’t\
    \ need any extra third-party dependencies.\n\nDevelopers are not limited to JUL.\
    \ Helidon also supports other popular logging frameworks such as Log4j and SLF4J\
    \ (Simple Logging Facade for Java). In this case, extra third-party dependencies\
    \ are needed.\n\nThe following is for Log4j.\n\n```text\nio.helidon.logging\n\
    helidon-logging-log4j\n\norg.apache.logging.log4j\nlog4j-api\n\norg.apache.logging.log4j\n\
    log4j-core\n\norg.apache.logging.log4j\nlog4j-jul\n```\n\nFor SLF4J.\n\n```text\n\
    org.slf4j\nslf4j-api\n\nio.helidon.logging\nhelidon-logging-slf4j\n\norg.slf4j\n\
    jul-to-slf4j\n\nch.qos.logback\nlogback-classic\n```\n\n### Mapped Diagnostic\
    \ Context (MDC)\n\nMapped Diagnostic Context (MDC) is a feature of modern logging\
    \ framework allowing registering and using in your logging messages information\
    \ that is not available in the current logging scope. Good samples are an ID of\
    \ the currently logged-in user, tracing id, transaction id, or any other context-related\
    \ information.\n\nIf you want to use this feature, some additional configuration\
    \ is required in addition to adding third-party dependencies.\n\n#### MDC with\
    \ JUL\n\nFor JUL, you need to add a dependency to a Helidon module that enables\
    \ MDC for JUL.\n\n```text\nio.helidon.logging\nhelidon-logging-jul\n```\n\nAnd\
    \ configure handlers in your `logging.properties` file this way or similar.\n\n\
    ```properties\n# Send messages to the console\nhandlers=io.helidon.logging.jul.HelidonConsoleHandler\n\
    # !thread! is replaced by Helidon with the thread name\n# any %X{...} is replaced\
    \ by a value from MDC\njava.util.logging.SimpleFormatter.format=%1$tY.%1$tm.%1$td\
    \ %1$tH:%1$tM:%1$tS %4$s %3$s !thread!: %5$s%6$s \"%X{name}\"%n\n# Global logging\
    \ level. Can be overridden by specific loggers\n.level=INFO\n```\n\nIt’s important\
    \ to use `HelidonConsoleHandler`. `%X{name}` prints the `name` property from MDC.\n\
    \nNow let’s take a look at how MDC can be used in your application. In one part\
    \ of your application, you need to set an MDC property you want to be printed\
    \ out in all your log messages as follows.\n\n```java\nimport io.helidon.logging.common.HelidonMdc;\n\
    public class Foo {\n...\npublic SetupMdcLogging() {\nHelidonMdc.set(\"name\",\
    \ \"Falco\");\n}\n}\n```\n\nIn another class, you initialize your logger and log\
    \ some messages.\n\n```java\nimport java.util.logging.Logger;\nprivate static\
    \ final Logger LOGGER = Logger.getLogger(Main.class.getName());\npublic class\
    \ Bar {\n...\npublic TestLogging() {\nLOGGER.info(\"It comes from MDC:\");\n}\n\
    }\n```\n\nHere is what’s going to be logged.\n\n```text\n2022.11.01 2:00:00 INFO\
    \ Main Thread[main,5,main]: It comes from MDC: \"Falco\"\n```\n\n#### MDC with\
    \ Log4j\n\nLog4j allows you to use file-based configuration or programmatic configuration.\
    \ File-based configuration is not friendly with GraalVM `native-image`. Samples\
    \ are provided for both, but you choose which to use based on your setup.\n\n\
    Listing [4-26](#600147_1_En_4_Chapter.xhtml#PC62) shows how to configure MDC `log4j2.xml`\
    \ standard Log4j `2.x` configuration file.\n\n```text\nListing 4-26\nExample of\
    \ MDC Configuration in log4j2.xml\n```\n\nListing [4-27](#600147_1_En_4_Chapter.xhtml#PC63)\
    \ provides the same configuration but in a programmatic way.\n\n```java\nimport\
    \ org.apache.logging.log4j.core.appender.ConsoleAppender;\nimport org.apache.logging.log4j.core.config.Configurator;\n\
    import org.apache.logging.log4j.core.config.builder.api.ConfigurationBuilderFactory;\n\
    ...\nprivate static void configureLog4J() {\nvar builder = ConfigurationBuilderFactory.newConfigurationBuilder();\n\
    builder.setStatusLevel(Level.INFO);\nvar appenderComponentBuilder = builder.newAppender(\"\
    stdout\", \"CONSOLE\")\n.addAttribute(\"target\", ConsoleAppender.Target.SYSTEM_OUT);\n\
    appenderComponentBuilder.add(builder.newLayout(\"PatternLayout\")\n.addAttribute(\"\
    pattern\", \"%d{HH:mm:ss.SSS} %-5level [%t] %logger{36} - %msg %X{name}%n\"));\n\
    builder.add(appenderComponentBuilder);\nbuilder.add(builder.newRootLogger(Level.INFO)\n\
    .add(builder.newAppenderRef(\"stdout\")));\nConfigurator.initialize(builder.build());\n\
    }\nListing 4-27\nExample of Programmatic MDC Configuration in Log4j\n```\n\nAgain,\
    \ the important MDC-related configuration part is `%X{name}`, which prints the\
    \ `name` property from your MDC context, which can be set as follows.\n\n```java\n\
    import org.apache.logging.log4j.ThreadContext;\n...\nThreadContext.put(\"name\"\
    , \"Cassidy\");\n```\n\nYou can find the full sample as part of this chapter sample\
    \ code.\n\n#### MDC with SLF4J\n\nTo configure MDC with SLF4J, add the following\
    \ or a similar configuration to your `logback.xml` file.\n\n```text\n%d{HH:mm:ss.SSS}\
    \ %-5level [%thread] %logger{36} - %msg %X{name}%n\n\nListing 4-28\nExample of\
    \ MDC Configuration in SLF4J\n```\n\nAs with JUL and Log4j, `%X{name}` prints\
    \ the `name` property from your MDC context.\n\nNow you can set your MDC property\
    \ as follows.\n\n```java\nimport org.slf4j.MDC;\n...\nMDC.put(\"name\", \"Jaspis\"\
    );\n```\n\nIts value is printed in each log message."
  raw: '## Logging


    Logging is the final (and shortest) section of this chapter. Logging is what developers
    use the most compared to health checks, metrics, and tracing. Most of you are
    familiar with logging and know what it is and why it should be used, but if you
    are not, we’ll try to explain it.


    Logging tells you what is happening inside individual software components within
    a service.


    The information answering this question gets written in a log.


    Note


    A *log* is a sequence of timestamped records (messages) describing what the components
    of a service are doing and, in some cases, why.


    Most often, logs are written to log files. Log files are normal text files with
    the *.log* extension. But sometimes logs are written to databases or even special
    logs collecting systems.


    Logs are very useful for debugging and detecting problems in your application.
    Developers are manually adding logging code to their sources to log records which
    would help track code execution and warn about situations that are not supposed
    to happen.


    Each record in the log has a *logging level*.


    Note


    A *logging level* measures the logging record importance (higher = more important).


    Standard Java logging (`java.util.logging`) has seven logging levels.


    *   SEVERE (highest value)


    *   WARNING


    *   INFO


    *   CONFIG


    *   FINE


    *   FINER


    *   FINEST (lowest value)


    It’s a developer’s responsibility to choose the appropriate logging level for
    his logging record. A minimum logging level is configured for the application,
    so records with a lower logging level are not written to the log. Enabling all
    logging levels (FINEST level) makes logs too big and verbose. It makes it difficult
    to find needed information. On the other hand, enabling lower logging levels may
    help find problems.


    Listing [4-25](#600147_1_En_4_Chapter.xhtml#PC54) demonstrates creating a logger
    and using different logging levels.


    *   ① Logger initialization


    *   ② Logging a severe message


    *   ③ Another way of logging a severe message


    *   ④ Logging a warning message


    *   ⑤ Another way of logging a warning message


    *   ⑥ Logging an info message


    *   ⑦ Another way of logging an info message


    ```

    private static final Logger LOGGER =

    Logger.getLogger(Main.class.getName());           ①

    public void loggingDemo() {

    LOGGER.severe("Severe message");                  ②

    LOGGER.log(Level.SEVERE,

    "Another severe message");                    ③

    LOGGER.warning("Warning message");                ④

    LOGGER.log(Level.WARNING,

    "Another warning message");                   ⑤

    LOGGER.info("Info message");                      ⑥

    LOGGER.log(Level.INFO,

    "Another info message");                      ⑦

    }

    Listing 4-25

    Using Different Logging Levels

    ```


    ### Logging in Helidon


    Helidon components contain extensive logging using the `java.util.logging` (JUL)
    API. To use it in your applications, you don’t need any extra third-party dependencies.


    Developers are not limited to JUL. Helidon also supports other popular logging
    frameworks such as Log4j and SLF4J (Simple Logging Facade for Java). In this case,
    extra third-party dependencies are needed.


    The following is for Log4j.


    ```

    io.helidon.logging

    helidon-logging-log4j


    org.apache.logging.log4j

    log4j-api


    org.apache.logging.log4j

    log4j-core


    org.apache.logging.log4j

    log4j-jul


    ```


    For SLF4J.


    ```

    org.slf4j

    slf4j-api


    io.helidon.logging

    helidon-logging-slf4j


    org.slf4j

    jul-to-slf4j


    ch.qos.logback

    logback-classic


    ```


    #### Mapped Diagnostic Context (MDC)


    Mapped Diagnostic Context (MDC) is a feature of modern logging framework allowing
    registering and using in your logging messages information that is not available
    in the current logging scope. Good samples are an ID of the currently logged-in
    user, tracing id, transaction id, or any other context-related information.


    If you want to use this feature, some additional configuration is required in
    addition to adding third-party dependencies.


    ##### MDC with JUL


    For JUL, you need to add a dependency to a Helidon module that enables MDC for
    JUL.


    ```

    io.helidon.logging

    helidon-logging-jul


    ```


    And configure handlers in your `logging.properties` file this way or similar.


    ```

    # Send messages to the console

    handlers=io.helidon.logging.jul.HelidonConsoleHandler

    # !thread! is replaced by Helidon with the thread name

    # any %X{...} is replaced by a value from MDC

    java.util.logging.SimpleFormatter.format=%1$tY.%1$tm.%1$td %1$tH:%1$tM:%1$tS %4$s
    %3$s !thread!: %5$s%6$s "%X{name}"%n

    # Global logging level. Can be overridden by specific loggers

    .level=INFO

    ```


    It’s important to use `HelidonConsoleHandler`. `%X{name}` prints the `name` property
    from MDC.


    Now let’s take a look at how MDC can be used in your application. In one part
    of your application, you need to set an MDC property you want to be printed out
    in all your log messages as follows.


    ```

    import io.helidon.logging.common.HelidonMdc;

    public class Foo {

    ...

    public SetupMdcLogging() {

    HelidonMdc.set("name", "Falco");

    }

    }

    ```


    In another class, you initialize your logger and log some messages.


    ```

    import java.util.logging.Logger;

    private static final Logger LOGGER = Logger.getLogger(Main.class.getName());

    public class Bar {

    ...

    public TestLogging() {

    LOGGER.info("It comes from MDC:");

    }

    }

    ```


    Here is what’s going to be logged.


    ```

    2022.11.01 2:00:00 INFO Main Thread[main,5,main]: It comes from MDC: "Falco"

    ```


    ##### MDC with Log4j


    Log4j allows you to use file-based configuration or programmatic configuration.
    File-based configuration is not friendly with GraalVM native-image. Samples are
    provided for both, but you choose which to use based on your setup.


    Listing [4-26](#600147_1_En_4_Chapter.xhtml#PC62) shows how to configure MDC `log4j2.xml`
    standard Log4j 2.x configuration file.


    ```


    Listing 4-26

    Example of MDC Configuration in log4j2.xml

    ```


    Listing [4-27](#600147_1_En_4_Chapter.xhtml#PC63) provides the same configuration
    but in a programmatic way.


    ```

    import org.apache.logging.log4j.core.appender.ConsoleAppender;

    import org.apache.logging.log4j.core.config.Configurator;

    import org.apache.logging.log4j.core.config.builder.api.ConfigurationBuilderFactory;

    ...

    private static void configureLog4J() {

    var builder = ConfigurationBuilderFactory.newConfigurationBuilder();

    builder.setStatusLevel(Level.INFO);

    var appenderComponentBuilder = builder.newAppender("stdout", "CONSOLE")

    .addAttribute("target", ConsoleAppender.Target.SYSTEM_OUT);

    appenderComponentBuilder.add(builder.newLayout("PatternLayout")

    .addAttribute("pattern", "%d{HH:mm:ss.SSS} %-5level [%t] %logger{36} - %msg %X{name}%n"));

    builder.add(appenderComponentBuilder);

    builder.add(builder.newRootLogger(Level.INFO)

    .add(builder.newAppenderRef("stdout")));

    Configurator.initialize(builder.build());

    }

    Listing 4-27

    Example of Programmatic MDC Configuration in Log4j

    ```


    Again, the important MDC-related configuration part is `%X{name}`, which prints
    the `name` property from your MDC context, which can be set as follows.


    ```

    import org.apache.logging.log4j.ThreadContext;

    ...

    ThreadContext.put("name", "Cassidy");

    ```


    You can find the full sample as part of this chapter sample code.


    ##### MDC with SLF4J


    To configure MDC with SLF4J, add the following or a similar configuration to your
    `logback.xml` file.


    ```


    %d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg %X{name}%n


    Listing 4-28

    Example of MDC Configuration in SLF4J

    ```


    As with JUL and Log4j, the `%X{name}` prints the `name` property from your MDC
    context.


    Now you can set your MDC property as follows.


    ```

    import org.slf4j.MDC;

    ...

    MDC.put("name", "Jaspis");

    ```


    Its value is printed in each log message.'
