  raw: '## Configuration of Secrets


    Did you ever wonder how secure it is to leave your database passwords, usernames,
    and other sensitive data in the configuration file? It is secure as long as you
    can protect your configuration files. Configuration tends to be shared, copied,
    transformed, and distributed a lot, and not all passwords can be or need to be
    externalized to specialized vaults or as K8s secrets. Helidon provides encryption
    capability for configuration values to keep your secret values safely encrypted.
    It doesn’t matter if you store your passwords in the config file, vault, or database.
    Only a Helidon application with the right master password or decryption key can
    use your configured secrets.


    Two encryption options are available.


    *   **AES-GCM encryption** is symmetric; both the encrypting and decrypting sides
    need the same master password.


    *   **RSA encryption** is asymmetric; the value is encrypted with a public key
    and decrypted with a private key.


    ### AES-GCM Encryption


    AES encryption uses a single master password for encryption and decryption; no
    keys are required. Encryption can be done with the `helidon-config-encryption`
    artifact, which is conveniently copied to the `target/lib` directory when you
    build your Helidon application. Encrypt any text value from CLI by providing an
    AES cipher, the password needed for eventual decryption, and the actual value
    to be encrypted as arguments.


    ```

    java -jar ./target/libs/helidon-config-encryption-3.0.2.jar aes masterPassword
    superSecretPassword

    ```


    Output in the format `${GCM=`⋯`}` can be used as a value in Helidon Config. Helidon
    Config encryption knows it should use AES-GCM for decryption when the actual value
    is needed.


    ```

    app.pass: ${GCM=AL0sq65u5NkJ3VlQTPeBrD4piMMD+zTaYxt0tAHFGnvnnFStcIuOnILUj0fNVANr+tH7+VPIZfSRrGn1QprX}

    Listing 8-23

    AES Encrypted Config Value in YAML Configuration File

    ```


    To allow Helidon to decrypt encrypted configuration values, the master password
    used for encryption needs to be provided via the environment variable `SECURE_CONFIG_AES_MASTER_PWD`.


    ```

    apiVersion: v1

    kind: ConfigMap

    metadata:

    name: castle-config

    data:

    SECURE_CONFIG_AES_MASTER_PWD: masterPassword

    Listing 8-24

    Master Password Env Variable Provided via K8s Config Map

    ```


    In your Helidon application, you get the decrypted value since it would be a plain
    text config value.


    ### RSA Encryption


    RSA encryption makes it possible to encrypt value by a public key and later let
    Helidon decrypt it via a private key from the same pair. Helidon configuration
    encryption tool can load keys directly from a key store.


    ```

    java -jar ./libs/helidon-config-encryption-3.0.2.jar rsa ./server.p12 password
    1 superSecretPassword

    ```


    The generated encrypted form of our secret value can be placed directly in the
    Helidon configuration.


    ```

    app.pass: ${RSA-P=cU2cL/j......YmwwLudo=}

    Listing 8-25

    RSA Encrypted Config Value in YAML Configuration File

    ```


    Once again Helidon config encryption feature knows it should use RSA for decryption
    when the actual value is needed, thanks to the `RSA-P` prefix. Helidon application
    needs to know where to find the private key for decryption. You can provide the
    location, alias, and password for the keystore containing the private key.


    ```

    apiVersion: v1

    kind: ConfigMap

    metadata:

    name: castle-config

    data:

    SECURE_CONFIG_RSA_PRIVATE_KEY: /helidon/server.p12

    SECURE_CONFIG_PRIVATE_KEY_ALIAS: 1

    SECURE_CONFIG_PRIVATE_KEYSTORE_PASSPHRASE: password

    Listing 8-26

    Keystore Location env Variable Provided via K8s Config Map

    ```


    ### Plain Text Password Detection


    Encryption of secret configuration values is practical for production use but
    may be too demanding and unnecessary in a test environment. Simply replacing the
    encrypted value with plain text value in a test environment is an obvious solution,
    but it brings the danger of accidentally leaking such value to actual production.


    To avoid this danger, you can define a special unencrypted value detectable by
    the Helidon Config encryption feature.


    ```

    app.pass: ${CLEAR=superSecretPassword}

    Listing 8-27

    Detectable Unencrypted Config Value in YAML Configuration File

    ```


    By default, when the Helidon application requests such a config value, an exception
    is thrown.


    ```

    ConfigEncryptionException: Key "app.pass" is a clear text password, yet encryption
    is required

    ```


    In a test environment, the check can be disabled.


    ```

    security.config.require-encryption: false

    Listing 8-28

    Encryption Check Turned Off in Testing Environment

    ```


    This ensures that no sensitive test configuration is used in production by accident.


    Configuration encryption adds another security layer. You can provide secret values
    to your application over various, less secure channels. You can even send configuration
    examples to a friend without the need for tedious checks if you are not sharing
    any secrets by doing so.


    ```

    io.helidon.config

    helidon-config-encryption


    Listing 8-29

    Dependency Needed for Config Encryption

    ```


    In this chapter, you learned how to secure the Helidon web server with TLS 1.3
    and what annotations, regardless of the security provider, can be used for authentication
    and authorization. You also learned to set up basic authorization for test cases
    and OpenID Connect for production. This chapter covered a very popular part of
    OIDC, JWT tokens, and took a tour of MicroProfile JWT tooling to use JWT tokens
    in modern DI applications built on top of Helidon MP.


    Don’t forget to check out the security examples accompanying this book, where
    you can start Keycloak identity provider with an already configured realm and
    experiment with our OIDC and MicroProfile JWT–secured castle application.


    ## Summary


    *   Use TLS to avoid man-in-the-middle attacks.


    *   Use different security providers without changing the business code.


    *   JWT is easy to use with MicroProfile API.


    *   Service doesn’t have to call the JWT issuer to verify JWS or decode JWE.


    *   OIDC security provider supports JWT token propagation.


    *   Configuration secrets can be encrypted right in the configuration source.


    # 9. Using OpenAPI


    This chapter covers the following topics.


    *   Documenting your code using OpenAPI


    *   Reading generated API information using out-of-the-box endpoints


    *   Generating clients using OpenAPI Generator'
  trans: '

    ## 密钥配置


    你是否曾想过，把数据库密码、用户名以及其他敏感数据放在配置文件中到底有多安全？只要你能保护好配置文件，这就是安全的。配置通常会被大量共享、复制、转换和分发，而且并不是所有密码都能够或都需要外置到专门的密钥库或
    K8s secrets 中。Helidon 提供了对配置值的加密能力，以确保你的密钥值始终保持安全加密状态。无论你将密码存储在配置文件、密钥库还是数据库中，都没有关系。只有拥有正确主密码或解密密钥的
    Helidon 应用才能使用你配置的密钥。


    有两种加密选项可用。


    *   **AES-GCM 加密**是对称加密；加密端和解密端都需要相同的主密码。


    *   **RSA 加密**是非对称加密；使用公钥加密值，并使用私钥解密值。


    ### AES-GCM 加密


    AES 加密使用单一主密码进行加密和解密；不需要密钥。可以使用 `helidon-config-encryption` 工件执行加密，在构建 Helidon
    应用时，该工件会方便地复制到 `target/lib` 目录中。你可以通过 CLI 对任意文本值进行加密，参数包括 AES 密码器、最终解密所需的密码，以及实际要加密的值。


    ```

    java -jar ./target/libs/helidon-config-encryption-3.0.2.jar aes masterPassword
    superSecretPassword

    ```


    输出为 `${GCM=`⋯`}` 格式的结果可作为 Helidon Config 中的值使用。当需要实际值时，Helidon Config 加密功能会识别出应使用
    AES-GCM 进行解密。


    ```

    app.pass: ${GCM=AL0sq65u5NkJ3VlQTPeBrD4piMMD+zTaYxt0tAHFGnvnnFStcIuOnILUj0fNVANr+tH7+VPIZfSRrGn1QprX}

    Listing 8-23

    AES Encrypted Config Value in YAML Configuration File

    ```


    为了让 Helidon 能解密已加密的配置值，需要通过环境变量 `SECURE_CONFIG_AES_MASTER_PWD` 提供用于加密的主密码。


    ```

    apiVersion: v1

    kind: ConfigMap

    metadata:

    name: castle-config

    data:

    SECURE_CONFIG_AES_MASTER_PWD: masterPassword

    Listing 8-24

    Master Password Env Variable Provided via K8s Config Map

    ```


    在你的 Helidon 应用中，你将获取到解密后的值，因为它会作为明文配置值提供。


    ### RSA 加密


    RSA 加密可以使用公钥对值进行加密，随后让 Helidon 通过同一密钥对中的私钥进行解密。Helidon 配置加密工具可以直接从密钥库加载密钥。


    ```

    java -jar ./libs/helidon-config-encryption-3.0.2.jar rsa ./server.p12 password
    1 superSecretPassword

    ```


    生成的密钥值加密形式可以直接放入 Helidon 配置中。


    ```

    app.pass: ${RSA-P=cU2cL/j......YmwwLudo=}

    Listing 8-25

    RSA Encrypted Config Value in YAML Configuration File

    ```


    同样地，借助 `RSA-P` 前缀，当需要实际值时，Helidon 配置加密功能会识别应使用 RSA 进行解密。Helidon 应用需要知道到哪里查找用于解密的私钥。你可以提供包含私钥的密钥库的位置、别名和密码。


    ```

    apiVersion: v1

    kind: ConfigMap

    metadata:

    name: castle-config

    data:

    SECURE_CONFIG_RSA_PRIVATE_KEY: /helidon/server.p12

    SECURE_CONFIG_PRIVATE_KEY_ALIAS: 1

    SECURE_CONFIG_PRIVATE_KEYSTORE_PASSPHRASE: password

    Listing 8-26

    Keystore Location env Variable Provided via K8s Config Map

    ```


    ### 明文密码检测


    对机密配置值进行加密在生产环境中非常实用，但在测试环境中可能过于繁琐且没有必要。在测试环境中直接将加密值替换为明文值是一个显而易见的方案，但这会带来将此类值意外泄露到真实生产环境的风险。


    为避免这种风险，你可以定义一种特殊的未加密值，让 Helidon Config 加密功能能够检测到它。


    ```

    app.pass: ${CLEAR=superSecretPassword}

    Listing 8-27

    Detectable Unencrypted Config Value in YAML Configuration File

    ```


    默认情况下，当 Helidon 应用请求此类配置值时，会抛出异常。


    ```

    ConfigEncryptionException: Key "app.pass" is a clear text password, yet encryption
    is required

    ```


    在测试环境中，可以禁用该检查。


    ```

    security.config.require-encryption: false

    Listing 8-28

    Encryption Check Turned Off in Testing Environment

    ```


    这样可以确保敏感的测试配置不会被意外用于生产环境。


    配置加密增加了另一层安全防护。你可以通过各种相对不安全的通道向应用提供密钥值。你甚至可以把配置示例发送给朋友，而不必繁琐地检查是否泄露密钥——只要你确实没有共享任何密钥即可。


    ```

    io.helidon.config

    helidon-config-encryption


    Listing 8-29

    Dependency Needed for Config Encryption

    ```


    在本章中，你学习了如何使用 TLS 1.3 保护 Helidon Web 服务器，以及无论使用何种安全提供方都可用于认证与授权的注解。你还学习了如何为测试用例设置基础授权，以及如何在生产环境中配置
    OpenID Connect。本章还介绍了 OIDC 中非常流行的一部分——JWT 令牌，并带你了解了 MicroProfile JWT 工具链，以便在基于
    Helidon MP 构建的现代 DI 应用中使用 JWT 令牌。


    别忘了查看本书配套的安全示例，其中你可以启动一个已配置好 realm 的 Keycloak 身份提供方，并对我们使用 OIDC 和 MicroProfile
    JWT 保护的 castle 应用进行实验。


    ## 总结


    *   使用 TLS 以避免中间人攻击。


    *   无需修改业务代码即可使用不同的安全提供方。


    *   JWT 与 MicroProfile API 结合使用非常简单。


    *   服务无需调用 JWT 签发方即可验证 JWS 或解码 JWE。


    *   OIDC 安全提供方支持 JWT 令牌传播。


    *   配置密钥可以直接在配置源中加密。


    # 9. 使用 OpenAPI


    本章涵盖以下主题。


    *   使用 OpenAPI 为你的代码编写文档


    *   使用开箱即用的端点读取生成的 API 信息


    *   使用 OpenAPI Generator 生成客户端

    '
- fmt: '## About OpenAPI


    In today’s technological landscape, it is of utmost importance for modern applications
    to have APIs, and RESTful APIs are at the forefront of the API economy. With the
    ability to transform any application into a language-independent service that
    can be accessed from any location and with any language, RESTful APIs have become
    an integral part of software development.


    MicroProfile provides the OpenAPI `3.x` specification to facilitate the development
    of RESTful APIs. This specification offers Java developers diverse programming
    models and interfaces that enable them to natively generate OpenAPI documents
    from their REST services. By simplifying the process of creating OpenAPI documents,
    MicroProfile empowers developers to streamline their API development workflows
    and rapidly create high-quality, interoperable APIs that clients can easily consume.


    Helidon implements [OpenAPI 3.​0](https://download.eclipse.org/microprofile/microprofile-open-api-3.0/microprofile-openapi-spec-3.0.pdf)
    out of the box. It is already included in the full `helidon-microprofile` bundle.
    To use OpenAPI with all other MicroProfile options, our `pom.xml` file should
    include the code in Listing [9-1](#600147_1_En_9_Chapter.xhtml#PC1).


    ```

    io.helidon.microprofile

    helidon-microprofile


    Listing 9-1

    MicroProfile Bundle Dependency

    ```


    If more fine-grained control is preferred and `helidon-microprofile-core` is used,
    add the dependency shown in Listing [9-2](#600147_1_En_9_Chapter.xhtml#PC2) to
    the project’s `pom.xml` file.


    - ① MicroProfile OpenAPI annotations dependency

    - ② Helidon MP OpenAPI runtime support dependency


    ```

    ①

    org.eclipse.microprofile.openapi

    microprofile-openapi-api


    ②

    io.helidon.microprofile.openapi

    helidon-microprofile-openapi

    runtime


    Listing 9-2

    OpenAPI Dependencies

    ```


    ## Basic Usage


    To generate a precise OpenAPI document that effectively describes an application’s
    API, the primary approach is to use OpenAPI standard annotations to annotate the
    relevant functions. These annotations provide crucial metadata that helps create
    an accurate and complete OpenAPI document.


    Once the application is started, the Helidon MP runtime automatically identifies
    the annotated endpoints and utilizes the provided metadata to create the OpenAPI
    document. This streamlined process eliminates the need for manual documentation
    and ensures that the API documentation remains up-to-date and in sync with the
    application’s implementation. Additionally, by adhering to the OpenAPI standard,
    the resulting API documentation is easily shareable. It can be consumed by many
    tools and platforms, enabling easy integration with other systems.


    Listing [9-3](#600147_1_En_9_Chapter.xhtml#PC3) is an example.


    - ① `@Operation` gives information about this endpoint.

    - ② `@APIResponse` describes the HTTP response and declares its media type and
    contents.


    ```

    @GET

    @Operation(summary = "Returns a Wizard", ①

    description = "General Wizard Name and Licence information ")

    @APIResponse(description = "Simple JSON containing Wizard name and license information",
    ②

    content = @Content(mediaType = "application/json",

    schema = @Schema(implementation = Wizard.class)))

    @Produces(MediaType.APPLICATION_JSON)

    public JsonObject getWizard() {...}

    Listing 9-3

    OpenAPI Annotations in Use

    ```


    The Helidon application creates an additional `/openapi` endpoint, and it returns
    the OpenAPI document describing the endpoints in our application. According to
    the MicroProfile OpenAPI spec, the OpenAPI document’s default format is YAML.
    `application/vnd.oai.openapi` is a suggested media type for OpenAPI documents
    that has some support but has not yet been adopted by the IANA YAML standard.


    Listing [9-4](#600147_1_En_9_Chapter.xhtml#PC4) calls an `/openapi` endpoint.


    ```

    curl -X GET http://localhost:8080/openapi

    Listing 9-4

    Retrieve OpenAPI Information with cURL

    ```


    Listing [9-5](#600147_1_En_9_Chapter.xhtml#PC5) shows the output.


    ```

    components:

    schemas:

    Wizard:

    properties:

    message:

    type: object

    type: object

    info:

    title: Generated API

    version: ''1.0''

    openapi: 3.0.3

    paths:

    /wizard:

    get:

    description: ''General Wizard Name and Licence information''

    responses:

    default:

    content:

    application/json:

    schema:

    $ref: ''#/components/schemas/Wizard''

    description: Simple JSON containing Wizard name and license information

    summary: Returns Wizard Information

    Listing 9-5

    Result Output with OpenAPI Data

    ```


    ### Note


    A client can specify `Accept` as either `application/vnd.oai.openapi+json` or
    `application/json` to request JSON.


    Here are some of the main annotations used to describe your code.


    - `@Schema` allows you to define inputs and outputs.

    - `@Operation` describes an operation or usually an HTTP method for a particular
    path.

    - `@Content` provides schema and examples for a specific media type.

    - `@Link` represents a possible design-time link for the answer.

    - `@Parameter` represents a single parameter in an OpenAPI operation.

    - `@Callback` describes a set of requests.

    - `@RequestBody` represents the request body in an operation.

    - `@APIResponse` represents the response in an activity.

    - `@Tag` represents tags for an operation or an OpenAPI definition.

    - `@Server` represents the servers for an operation or an OpenAPI definition.


    Please consult [the official specification](https://download.eclipse.org/microprofile/microprofile-open-api-3.0/microprofile-openapi-spec-3.0.pdf)
    for more information.


    ### Static OpenAPI Files


    In addition to using OpenAPI annotations to generate an API’s documentation, Helidon
    MP also offers the option of utilizing a static file to provide the API’s description.
    This static file—named `openapi.yml`, `openapi.yaml`, or `openapi.json`—can be
    added to the application’s `/META-INF` folder. Helidon’s OpenAPI implementation
    automatically picks up this file and incorporates its contents into the resulting
    document.


    To make creating this static file easier, tools such as Swagger can generate the
    OpenAPI document. Once the document is created, it can be added to the application’s
    `/META-INF` folder, and Helidon’s OpenAPI implementation handles the rest.


    It’s worth noting that Helidon MP OpenAPI can incorporate data from all the sources
    mentioned, including annotations, static files, and programmatic configuration.
    This allows for flexibility in documenting the API and enables developers to choose
    the best approach for their needs. Ultimately, the goal is to generate an accurate
    and comprehensive OpenAPI document that effectively describes the API’s functionality
    and can be easily consumed by other systems.'
