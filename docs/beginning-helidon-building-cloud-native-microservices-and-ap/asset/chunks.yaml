    ### onTerminate


    `onTerminate` 操作符从不扩充流。它为流中通过的 `onComplete` 或 `onError` 信号执行提供的可运行任务。`onTerminate`
    可运行任务在 `onComplete` 或 `onError` 信号继续向下游传递之前执行。


    ### cancel


    `cancel` 是一个终端操作符，意味着它会向上游订阅，并且其后不能跟随其他操作符。`cancel` 操作符在接收到 `onSubscribe` 信号后，向上游发送取消信号。无法更早执行此操作，因为
    `onSubscribe` 信号携带了向上游发送 `cancel` 信号所需的订阅信息。


    *   ① `peek` 不会被执行，因为 `cancel` 信号已发送给发布者，且没有 `request` 信号

    *   ② `cancel` 在 `onSubscribe` 信号向上游发出后，立即发送 `cancel` 信号


    ```

    ReactiveStreams.of(1, 2, 3)

    .peek(i -> log("This is never executed"))  ①

    .cancel()  ②

    .run()

    清单 13-26

    cancel 操作符：取消整个流

    ```


    ### reduce


    `reduce` 是一个终端操作符，其参数是一个累加器双函数，该函数接受两个参数。第一个参数是首次执行时的第一个项目，或者是上一次累加器执行的结果。第二个参数始终是下一个项目。


