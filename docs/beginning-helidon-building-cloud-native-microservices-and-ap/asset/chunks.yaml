    >SECOND

    >THIRD

    Listing 13-46

    Processor Method

    ```


    ## Emitter


    ### Note


    Since MicroProfile Reactive Messaging 2.0


    Publishing messages from imperative code to reactive stream can be technically
    quite challenging. There is a convenient `SubmissionPublisher` shipped with JDK
    since version 9 and newer, you can just register it as a publisher with the `@Outgoing`
    messaging method, and you are good to go.


    While it is a working solution, `SubmissionPublisher` is a big gun covering much
    more ground than you need by spinning up unnecessary threads, ready to serve multiple
    subscribers.


    To ease this frequent use case, an injectable emitter is available in messaging.
    With lightweight single-thread implementation, configurable buffering strategies,
    and the ability to automatically connect to messaging channels, the emitter bridges
    the gaps from the first version of the Reactive Messaging specification.


    ```java

    @Inject

    @Channel("channel-1")

    Emitter emitter;

    @POST

    @Consumes("text/plain")

    public void push(String payload) {

    emitter.send(payload);

    }

    Listing 13-47

    Sending Messages from JAX-RS Endpoint

    ```


    Emitter sends messages asynchronously, backpressure from reactive stream is not
    propagated by blocking. Instead, overflow strategy can be configured with annotation
    `@OnOverflow` to indicate what should happen when downstream demand is lower than
    the number of sent messages.


    ## Message


    Reactive messaging is able to inject to your messaging methods either directly
    the payload, or a wrapper with metadata extending the `org.eclipse.microprofile.reactive.messaging.Message`.
    Every message has `getPayload()` and `ack()` methods for accessing payload and
    acknowledgment of successful reception in case of manual acknowledgment.


    ```java

    @Incoming("channel-1")

    public CompletionStage consume(Message msg) {

    System.out.println(">" + msg.getPayload());

    return msg.ack();

    }

    Listing 13-48

    Consuming Message

    ```


    A message wrapper can be extended and customized to carry more specific metadata.
    For example, when connecting to Kafka connector you can let messaging directly
    inject `KafkaMessage` to gain access to headers, partition, topic, offset and
    more.


    ## Acknowledgment


    Acknowledgment is an important feature for achieving resiliency in case of some
    catastrophic failure. Without the acknowledgment, if a consuming module crashes
    during processing of a consumed message, the producing side has no way to know
    if the crashed module was successful with message processing or not.


    With the consuming side acknowledging successful consumption, the producing side
    can decide if the message needs to be resent to another consumer or not.


    MicroProfile Reactive Messaging supports multiple acknowledge strategies for various
    messaging methods. Acknowledge strategy can be configured with `@Acknowledgment`
    annotation. There are multiple options to choose from.


    - `POST_PROCESSING` is an automatic acknowledgment after the messaging method
    or supplied operator is invoked.

    - `PRE_PROCESSING` is an automatic acknowledgment right before the method or operator
    is invoked.

    - `MANUAL` means no automatic acknowledgment is performed.

    - `NONE` means no automatic acknowledgment, and no manual acknowledgment is expected.


    ### Caution


    There are different default acknowledgment strategies for different messaging
    method signatures. Consult MicroProfile Reactive Messaging Specification for more
    information.


    Manual acknowledgment makes the developer responsible for calling the `Message.ack()`,
    because the developer knows the best when business code processed the message
    successfully.


    Listing [13-49](#600147_1_En_13_Chapter.xhtml#PC49) demonstrates monitoring an
    acknowledged callback.


    ```java

    @Outgoing("channel-1")

    public PublisherBuilder> registerPublisher() {

    return ReactiveStreams.of("first", "second", "third")

    .map(payload -> Message.of(payload, () -> {

    return CompletableFuture.completedStage("Message " + payload + " acked!")

    .thenAccept(System.out::println);

    }));

    }

    @Incoming("channel-1")

    @Acknowledgment(Acknowledgment.Strategy.MANUAL)

    public CompletionStage consume(Message msg) {

    System.out.println(">" + msg.getPayload());

    return msg.ack();

    }

    >first

    Message first acked!

    >second

    Message second acked!

    >third

    Message third acked!

    Listing 13-49

    Acknowledge Callbacks

    ```


    `Ack` callback is observed manually in the example. If there would be Kafka connector
    configured as a publisher for `channel-1`, Kafka connector would commit offset.
    With the JMS connector the original JMS message would be acknowledged.'
