  trans: '

    ## 使用 JUnit 5 进行测试


    Helidon 提供了扩展功能，支持你使用 [JUnit 5](https://junit.org/junit5/) 测试应用程序。只需添加清单 10-1。


    *   ① Helidon JUnit 5 集成依赖


    ```

    io.helidon.microprofile.tests ①

    helidon-microprofile-tests-junit5

    test


    Listing 10-1

    Helidon JUint5 Dependency

    ```


    这样你就能获得一组扩展注解，轻松测试应用程序。让我们直接进入代码。


    第一步是在测试类中加入 `@HelidonTest` 注解。这个自定义注解会自动完成多项任务，例如在随机端口启动 Helidon 服务器，并配置环境以模拟实际的
    Helidon 使用场景。借助该注解，Helidon 测试框架会在创建测试类之前初始化容器，并在最后一个测试结束后将其关闭。


    通常，测试的主要目标是调用服务器并验证输出。Helidon 还提供了额外便利：注入一个已配置为当前运行服务器的 `WebTarget`。你可以利用这个预配置目标来调用端点并确认结果。


    清单 10-2 测试了第 5 章讨论的 wizard 应用。


    *   ① 使用 `@HelidonTest` 标注测试类以启动容器。


    *   ② 注入由 JUnit 扩展自动配置的 `WebTarget`。


    *   ③ 使用 `WebTarget` 调用端点。


    *   ④ 验证结果。


    *   ⑤ 复用同一个 `webTarget` 调用另一个端点。


    ```

    @HelidonTest                                           ①

    public class WizardResourceTest {

    @Inject

    private WebTarget webTarget;                       ②

    @Test

    void testWizard() {

    JsonObject jsonObject = webTarget.path("/wizard") ③

    .request()

    .get(JsonObject.class);

    validateWizard(jsonObject, "Oz");              ④

    }

    @Test

    void testWizardByName() {

    JsonObject jsonObject = webTarget.path("/wizard/Skylar")                       ⑤

    .request()

    .get(JsonObject.class);

    validateWizard(jsonObject, "Skylar");

    }

    private void validateWizard(JsonObject jsonObject,

    String nameExpected){

    String actual = jsonObject.getString("name");

    assertEquals(nameExpected, actual,

    nameExpected + " is expected");

    }

    }

    Listing 10-2

    @HelidonTest Annotation Usage

    ```


    除了前面提到的好处外，这种在开始时启动 Helidon 容器并保持其运行直到最后一个测试完成的方法，还有其他几个优势。


    首先，它减少了总体测试时间，因为不需要为每个测试用例反复启动和停止容器。这在测试大型复杂应用时尤其节省时间。


    其次，它支持在不同测试用例之间复用资源和依赖，从而提升测试流程的整体效率。通过保持容器活跃，应用所需的资源和依赖可以被加载后在多个测试中共享，避免重复加载和初始化。


    这种方式在用户中非常常见，适用于大多数测试场景，覆盖了 90% 以上的测试。


    但如果你需要测试一些在启动时初始化的特性，而且这些特性需要不同的配置怎么办？需要为它们单独写一个测试类吗？答案是不需要。如果在 `@HelidonTest`
    中设置 `resetPerTest = true` 参数，框架就会在每个测试上重启 Helidon 容器。而且还有更多特性：你可以直接在测试方法级别应用不同注解，并将
    `WebTarget` 直接作为方法参数注入。让我们再创建一个测试：


    *   ① 启用 `resetPerTest`。


    *   ② 将 `WebTarget` 作为方法参数注入。


    *   ③ 使用 `@AddConfig` 注解为特定测试覆盖 `app.title` 属性。


    ```

    @HelidonTest(resetPerTest = true)                      ①

    class WizardTitleTest {

    @Test

    void testDefaultTitle(WebTarget webTarget) {        ②

    String result = webTarget.path("wizard/title")

    .request()

    .get(String.class);

    assertEquals("The Greatest!", result);

    }

    @Test

    @AddConfig(key = "app.title", value = "The Mighty!") ③

    void testModifiedTitle(WebTarget webTarget) {

    String result = webTarget.path("wizard/title")

    .request()

    .get(String.class);

    assertEquals("The Mighty!", result);

    }

    }

    Listing 10-3

    Wizard Test

    ```


    这里 Helidon 容器会在每个测试方法执行时重置。由于它运行在随机端口上，会使用新容器参数重新配置一个新的 `WebTarget`，并将其作为方法参数注入。


    对于第二个测试，要覆盖 *microprofile-config.properties* 文件中的 `app.title` 配置值。通过在方法上应用 `@AddConfig(key
    = "app.title", value = "The Mighty!")` 注解即可轻松实现。因此，当 Helidon 容器为新测试启动时，它会读取该注解中的配置。


    `@AddConfig` 注解也可以应用在类级别，从而影响所有测试方法。


    ### 高级用法


    Helidon 测试框架还支持一些额外注解，可对测试配置与执行进行更细粒度控制。


    *   **@DisableDiscovery** 注解：当所需测试类需要与其余 CDI 环境隔离时使用。


    *   **@AddBean(SomeBean.class)** 注解：如果禁用了 Bean Discovery，或当前 CDI 环境中没有某个特定 bean，可使用该注解将其手动添加到当前测试中。默认会作为
    ApplicationScoped bean 添加，但也可以通过参数指定作用域，例如 `scope = Dependent.class`。通常与 `@DisableDiscovery`
    注解配合使用，以创建一组非常特定、可测试的 CDI bean。


    *   **@AddExtension(SomeCdiExtension.class)** 注解：如果需要用特定 CDI Extension 扩展当前测试，可通过此注解轻松实现。


    *   **@Configuration(configSources = “some-test-config.properties”)** 注解：如果当前测试需要一整套特定配置（无论在
    classpath 上还是绝对路径上），可通过此注解进行设置。


    清单 10-4 使用上述部分特性创建了一个更复杂的测试。


    *   ① 对该特定测试禁用 Bean Discovery。


    *   ② 添加 CDI Extension。


    *   ③ 将内部类添加为受管 bean。


    *   ④ `WebTarget` 应指向 `MiniWizard` 资源。


    *   ⑤ 检查端点是否正确响应。


    ```

    @HelidonTest

    @DisableDiscovery                                       ①

    @AddExtension(ServerCdiExtension.class)                 ②

    @AddExtension(JaxRsCdiExtension.class)

    @AddExtension(CdiComponentProvider.class)

    @AddBean(WizardNoDiscoveryTest.MiniWizard.class)        ③

    class WizardNoDiscoveryTest {

    @Inject

    private WebTarget injected;                         ④

    @Test

    void testSpell() {

    String response = injected.path("/spell")       ⑤

    .request().get(String.class);

    Assertions.assertEquals(response,"I put a spell on you!");

    }

    @Path("/spell")

    public static class MiniWizard {                    ⑥

    @GET

    public String saySpell() {

    return "I put a spell on you!";

    }

    }

    }

    Listing 10-4

    Advanced Test

    ```


    这里针对该测试禁用了 CDI Bean discovery。内部类 `MiniWizard` 是一个子资源，只有一个功能：“施放咒语”。使用 `@AddBean`
    注解可将该类作为 bean 添加到当前测试中。同时，使用 `@AddExtension` 注解可让端点正确工作，并正确注入到 `WebTarget`，从而被正确测试。


    Helidon 测试框架提供了丰富功能，既能覆盖最常见的用例，也能支持一些非常复杂的场景。这使开发者能够根据具体需求定制测试，确保应用在各种条件下都能得到充分验证。

    '
- fmt: '## Testing with TestNG


    This part is concise. It has the same functionality described earlier but with
    [TestNG](https://testng.org/doc/). The annotation set is absolutely the same!
    Just add the Listing [10-5](#600147_1_En_10_Chapter.xhtml#PC5) Maven dependency.


    - ① Helidon TestNG support dependency.


    ```text

    io.helidon.microprofile.tests

    helidon-microprofile-tests-testng               ①

    test


    Listing 10-5

    Helidon TestNG Dependency

    ```


    ## Work with Testcontainers


    Testcontainers is a Java library that supports JUnit tests, automating the management
    and life cycle of different applications, databases, and testing environments
    provided as containers.


    The Testcontainers for Java [website](https://www.testcontainers.org/) says it
    is perfect for the following tests.


    - Data access layer integration tests running MySQL, PostgreSQL, or Oracle database
    in a container to test your data access layer code for complete compatibility.
    No complex local installation and configuration are required. Everything is in
    an isolated container.

    - Application integration tests run your application in a container as a black
    box.

    - UI/Acceptance tests use containerized web browsers compatible with Selenium
    for conducting automated UI tests.


    And it’s hard to argue with that. Testcontainers are widely used beyond the Java
    world.


    ### Note


    To use the Testcontainers library, you need Docker installed on your machine.
    For more information, go to [`https://www.docker.com`](https://www.docker.com).


    Testcontainers bring integration testing to another level. You can test Helidon
    running inside a container running as a black box.


    ![](images/600147_1_En_10_Chapter/600147_1_En_10_Fig1_HTML.png)


    A flow diagram. Regular unit tests, test N O to test containers.


    Figure 10-1


    Unit tests work with Helidon applications as a black box.


    First, you need to build an image of the application. As you generate your project
    using CLI with `helidon init` or download the generated project from [`https://helidon.io/starter`](https://helidon.io/starter),
    a `Dockerfile` is generated (if the corresponding checkboxes are selected).


    To prepare an image of the application, run the Listing [10-6](#600147_1_En_10_Chapter.xhtml#PC6)
    command in the project’s root.


    ```bash

    docker build -t wizard-app .

    Listing 10-6

    Build Docker Image

    ```


    Then try to run the app locally.


    ```bash

    docker run --rm -p 8080:8080 wizard-app:latest

    Listing 10-7

    Run the Created Container

    ```


    Now, you can use our Helidon application with Testcontainers. In our tests, you
    can create a generic testcontainer that uses the image with the application.


    - ① Create a Generic Container with the Wizard Helidon application.

    - ② Configure the container to expose port `8080`.

    - ③ Start the container and wait for it to be ready.


    ```java

    static final GenericContainer APPLICATION

    = new GenericContainer("wizard-app:latest")                  ①

    .withExposedPorts(8080)

    .withNetwork(Network.newNetwork())

    .withNetworkAliases("HelidonWizardApplication")

    .waitingFor(Wait.forHealthcheck());                  ②

    static {

    APPLICATION.start();                           ③

    }

    Listing 10-8

    Testcontainers Setup

    ```


    Using the `@HelidonTest` annotation on your test class is no longer necessary
    to perform tests on this container. Because the application is now operating inside
    a docker container, you can regard it as a “black box” and test it. To accomplish
    this, you must establish a `WebTarget` that directs to `localhost` utilizing the
    indicated open port.


    - ① No need to run the Helidon container; it is already in a container

    - ② Creates `WebTarget` with BaseURL configured as with Docker container

    - ③ Calls the desired endpoint.

    - ④ Verifies the result


    ```java

    public class WizardTest {                            ①

    WebTarget webTarget = ClientBuilder

    .newClient()

    .baseURL("http://localhost:8080") ②

    @Test

    void testWizard() {

    JsonObject jsonObject = webTarget.path("/wizard")     ③

    .request()

    .get(JsonObject.class);

    String actual = jsonObject.getString("name");

    assertEquals("Oz", actual, "Should be Oz");     ④

    }

    }

    Listing 10-9

    Wizard Test

    ```


    This way, you can do a “black box” interrogation testing the application. For
    the test, it is just a service running on localhost on some port. Testcontainers
    automates bringing this service up and shutting it down after test execution.
    Every time the service starts brand new with no trailing artifacts, which can
    pollute the environment.


    ### The Other Way Around


    Helidon can be configured to use resources from external services running inside
    Testcontainers to perform integration testing.


    For instance, you would want to check if Kafka is being properly used for communications
    and if MySQL is working correctly as the database for your application. For testing
    purposes, they run within Testcontainers. To make your application use the database
    and messaging in Testcontainers, you merely need to change the configuration.
    Use standard `@HelidonTest` annotation to set up and run the application on your
    local machine. But since the database and message broker are now running in containers,
    the configuration has to be overridden. This is easily done using the annotation
    `@Configuration(useExisting = true)`.


    Prepare containers and run Listing [10-10](#600147_1_En_10_Chapter.xhtml#PC10).


    - ① Defines and sets up MySQL testcontainer

    - ② Defines Kafka container

    - ③ Starts Kafka container and provides configuration as properties to Helidon


