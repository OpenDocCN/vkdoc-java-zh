    Kafka connector supports multiple nack strategies.


    *   **Kill channel** is the default strategy; when a message is nacked, the whole
    channel is killed.


    *   **DLQ** resends the message to pre-configured dead-letter queue, then ack.


    *   **Log** only means log error and ack the message.


    By default, the channel is killed by a nack message. This is desirable when redelivery
    is required. A messaging health probe can detect a killed channel and K8s restarts
    the pod. The restarted pod resumes with the same message if it has no consumer
    group ID defined (topic) and `auto.offset.reset` is set to latest or is a single
    pod using the group ID. When multiple pods are using the same consumer group ID,
    the message is redelivered to one of the pods with the same group ID right after
    rebalance.


    When sending the unprocessed message to the dead-letter queue is required, DLQ
    nack strategy is available.


    *   ① DLQ topic to send errored messages to on the same broker


    ```

    mp.messaging:

    incoming:

    from-kafka:

    nack-dlq: my-dlq-topic  ①

    Listing 13-56

    DLQ Nack Strategy Configuration

    ```


    When only the name of DLQ topic is configured, the same broker configuration including
    serializers is used as the one used for receiving the message. Serializers are
    derived from the incoming connection deserializers with following pattern, in
    the deserializer simple class name is replaced `Deserializer` by `Serializer`,
    when such class exists there is no need to configure serializer for DLQ.


    *   ① Configuration for custom DLQ Kafka broker


    *   ② Custom serializer for DLQ


    ```

    serializer.pkg: org.apache.kafka.common.serialization

    mp.messaging:

    incoming:

    from-kafka:

    nack-dlq:

    topic: my-dlq-topic-on-other-broker

    bootstrap.servers: localhost:9092  ①

    key.serializer: ${serializer.pkg}.StringSerializer  ②

    value.serializer: ${serializer.pkg}.StringSerializer

    Listing 13-57

    DLQ Nack Strategy Advanced Configuration

