    \        .exceptionally(t -> ParticipantStatus.FailedToCompensate);\n}\n```\n\n\
    Listing 14-12  \nAsynchronous Compensation with `CompletionStage`\n\n## LRA Coordinator\n\
    \nThe Long Running Actions implementation in Helidon requires the LRA coordinator\
    \ to orchestrate LRA across the cluster. This is an extra service you need to\
    \ enable the LRA functionality in your cluster. The LRA coordinator tracks which\
