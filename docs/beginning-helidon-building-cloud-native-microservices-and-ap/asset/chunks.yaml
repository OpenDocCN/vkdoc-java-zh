- fmt: "## Nack Strategies\n\nKafka connector supports multiple nack strategies。\n\
    \n- `Kill channel` is the default strategy; when a message is nacked, the whole\
    \ channel is killed。\n- `DLQ` resends the message to pre-configured dead-letter\
    \ queue, then ack。\n- `Log` only means log error and ack the message。\n\nBy default,\
    \ the channel is killed by a nack message. This is desirable when redelivery is\
    \ required. A messaging health probe can detect a killed channel and `K8s` restarts\
    \ the pod. The restarted pod resumes with the same message if it has no consumer\
    \ group ID defined (topic) and `auto.offset.reset` is set to latest or is a single\
    \ pod using the group ID. When multiple pods are using the same consumer group\
    \ ID, the message is redelivered to one of the pods with the same group ID right\
    \ after rebalance.\n\nWhen sending the unprocessed message to the dead-letter\
    \ queue is required, `DLQ` nack strategy is available.\n\n- ① `DLQ` topic to send\
    \ errored messages to on the same broker\n\n```yaml\nmp.messaging:\n  incoming:\n\
    \    from-kafka:\n      nack-dlq: my-dlq-topic  # ①\n```\n\nListing 13-56  \n\
    DLQ Nack Strategy Configuration\n\nWhen only the name of `DLQ` topic is configured,\
    \ the same broker configuration including serializers is used as the one used\
    \ for receiving the message. Serializers are derived from the incoming connection\
    \ deserializers with following pattern, in the deserializer simple class name\
    \ is replaced `Deserializer` by `Serializer`, when such class exists there is\
    \ no need to configure serializer for `DLQ`。\n\n- ① Configuration for custom `DLQ`\
    \ Kafka broker\n- ② Custom serializer for `DLQ`\n\n```yaml\nserializer.pkg: org.apache.kafka.common.serialization\n\
    mp.messaging:\n  incoming:\n    from-kafka:\n      nack-dlq:\n        topic: my-dlq-topic-on-other-broker\n\
