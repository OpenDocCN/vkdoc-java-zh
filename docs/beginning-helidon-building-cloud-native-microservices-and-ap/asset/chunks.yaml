  trans: '

    # 6. 访问数据


    本章涵盖以下主题。


    *   在 Helidon 中，以多种方式很好地支持了微服务与数据库的交互


    *   在 Helidon 中使用 JDBC、JTA 和 JPA 处理 SQL 与 NoSQL


    *   在 Helidon 中使用 Micronaut Data 访问数据


    我们在许多会议上听到过、也在许多文章中读到过：最好的微服务是无状态的，我们应当保持其无状态。尽管如此，现实世界的实践表明，大多数微服务必须保存状态，因此必须与数据库交互。这就是
    Helidon 提供便捷数据库操作方式的原因。Helidon 提供了多种数据库操作方式，从使用 JDBC 的底层数据访问，到复杂的 Jakarta Persistence
    API 及其实现：Hibernate 和 EclipseLink。如果你曾经使用过 Enterprise Java，学习这些几乎不费力。像你过去那样使用即可。只需记住，Helidon
    并不是一个完整的 Jakarta EE 容器。


    从底层到复杂，以下是在 Helidon 中使用数据库的主要选项。


    *   数据库交互最底层的是 JDBC，在这一层处理物理连接。


    *   **DataSource** 在 JDBC 之上提供抽象层，便于连接管理与连接池化。


    *   **Jakarta Persistence API** 是对象关系映射规范，可通过 Hibernate 和 EclipseLink 实现。


    本章将逐一介绍它们，并说明各自的优缺点。


    ## 使用 JDBC 进行底层数据访问


    关系型数据库管理系统（RDBMS）和 NoSQL 数据库都是外部软件程序，通过数据库*驱动*并借助某种连接方式（通常是 TCP 连接）进行访问。通常，*数据库引擎*充当*服务端*，而我们的代码充当客户端。也可以将其称为*数据库服务器*。


    Java Database Connectivity（JDBC）是 Java 编程语言的一个 API，规定了客户端如何访问数据库。它自 1997 年起就被使用，是最古老的
    Java 技术之一。


    该 API 用于动态加载合适的驱动程序，并将它们注册到 JDBC DriverManager 中。`DriverManager` 充当连接工厂，用于创建 JDBC
    连接。


    JDBC 连接用于创建并执行*语句*，语句有多种类型。


    *   **Statement** 是发送到数据库以读取或修改数据的常规语句。


    *   **PreparedStatement** 是缓存语句；其执行路径会在数据库服务器上预先确定，因此可以以高效方式重复执行。


    *   **CallableStatement** 用于在数据库上执行存储过程。


    *查询*语句（例如 `SELECT`）会返回 JDBC 行结果集。它们表示表格型数据。行结果集带有元数据，用于描述列名及其类型。


    *更新*语句（例如 `INSERT`、`UPDATE` 和 `DELETE`）会修改数据库中的数据，并返回更新计数，以表示受影响的行数。


    Helidon MP 不包含任何数据库驱动；因此，我们需要根据所用数据库及供应商自行选择合适的驱动，并在应用的 `pom.xml` 文件中手动添加其依赖。


    让我们来看一些代码。为保持简单，我们使用 H2——一个小型内存数据库，主要用于单元测试。清单 6-1 是它的依赖。


    *   ① `scope` 是 `runtime`，因为 JDBC 驱动是运行时组件，编译时不需要。


    ```

    com.h2database

    h2

    runtime             ①


    Listing 6-1

    H2 Driver Dependency

    ```


    现在你已经有了数据库驱动，让我们在代码中使用它。


    *   ① 设置数据库连接 URL


    *   ② 使用 `DriverManager` 创建连接


    *   ③ 创建语句


    *   ④ 执行 `SELECT` 查询，获取 `ResultSet` 并处理它


    *   ⑤ 关闭连接


    *   ⑥ 处理异常


    ```

    try {

    String url = "jdbc:h2:mem:sample";               ①

    Connection connetion = DriverManager.getConnection(url,"sa","");                ②

    Statement stmt = conn.createStatement();         ③

    ResultSet rs = stmt.executeQuery("SELECT * FROM Wizards);      ④

    while ( rs.next() ) {

    String name = rs.getString("Name");

    System.out.println(name);

    }

    connections.close();                             ⑤

    } catch (Exception e) {

    e.printStacktrace();                             ⑥

    }

    Listing 6-2

    JDBC Example

    ```


    这是一种非常直接且底层的数据库数据访问方式。它效率并不高。创建连接是资源开销很大的操作，而手动解析数据也并非最佳选择。


    这就是为什么会创建 `DataSource` 接口来管理连接。

    '
- fmt: "## Working with `DataSource`\n\n`DataSource` is an interface with only two\
    \ methods: `getConnection()` and `getConnection(String username, String password)`，which\
    \ is in the `javax.sql` package. Database vendors offer various implementations\
    \ of this interface to provide distinct database functionality. Generally, these\
    \ implementation classes contain methods that enable us to supply the database\
    \ server particulars and user credentials.\n\nThe following are other common features\
    \ provided by `DataSource` implementations:\n\n- Connection pooling\n- Caching\
    \ `PreparedStatement`\n- Connection timeouts\n- Logging features\n\nHelidon provides\
    \ integration mechanisms to set up and inject `DataSource` into our code. The\
    \ flow is easy: describe connection details in the `microprofile-config.properties`\
    \ file and inject the `DataSource` using `@Inject` and `@Named` annotations. Helidon\
    \ MP’s named data source integration requires a connection pool implementation.\n\
    \nTwo primary ones are currently supported: HikariCP and Oracle Universal Connection\
    \ Pool (OCP). You can choose to use either, but not both. Just add the corresponding\
    \ dependency for the selected option.\n\nListing [6-3](#600147_1_En_6_Chapter.xhtml#PC3)\
    \ is for HikariCP.\n\n```\nio.helidon.integrations.cdi\nhelidon-integrations-cdi-datasource-hikaricp\n\
    runtime\n\nListing 6-3\nHikariCP Dependency\n```\n\nListing [6-4](#600147_1_En_6_Chapter.xhtml#PC4)\
    \ is for OCP.\n\n```\nio.helidon.integrations.cdi\nhelidon-integrations-cdi-datasource-ucp\n\
    runtime\n\nListing 6-4\nOCP Dependency\n```\n\n### Note\n\nDo not forget to add\
    \ the database driver dependency to the `pom.xml` file. Connection pools can work\
    \ with different database vendors, and drivers for them are not included in the\
    \ dependencies.\n\nNow that you have the required dependencies, let’s configure\
    \ `DataSource` in `microprofile-config.properties`.\n\n```\njavax.sql.DataSource.wizardSource.dataSourceClassName=org.h2.jdbcx.JdbcDataSource\n\
    javax.sql.DataSource.wizardSource.dataSource.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1\n\
    javax.sql.DataSource.wizardSource.dataSource.user=db_user\njavax.sql.DataSource.wizardSource.dataSource.password=user_password\n\
    Listing 6-5\nTypical Configuration\n```\n\nProperty names have a common pattern:\n\
    \n- `<objecttype>` is the fully qualified Java class name of the configured object.\
    \ In our case, it is is.`javax.sql.DataSource`. It is followed by a period (`.`)\
    \ as a separator.\n- `<datasourcename>` is the name of the data source. It cannot\
    \ contain a period “ . ” In this case, it is `wizardSource`. A period (`.`) is\
    \ a separator for the next part.\n- `<propertyname>` supplies the connection pool\
    \ or vendor-supplied `DataSource`-specific configuration property name. It may\
    \ contain periods (`.`), such as `.url` (`.user` in our case).\n\n```\n..\n```\n\
    \nHelidon reads this configuration and creates and configures the desired `DataSource`.\
    \ To use it in our Java code, inject it with the `@Named` annotation.\n\n- ① Inject\
    \ named `DataSource` “wizardSource”\n\n```\n@Inject\n@Named(\"wizardSource\")\
    \                             ①\nprivate DataSource wizardSource;\nListing 6-6\n\
    Inject DataSource\n```\n\nListing [6-7](#600147_1_En_6_Chapter.xhtml#PC8) uses\
    \ a constructor.\n\n- ① Defines the `DataSource` variable\n- ② Injects the named\
    \ `DataSource` to a constructor parameter\n\n```\nprivate final DataSource wizardSource;\
    \             ①\n@Inject\npublic SomeObject(@Named(\"wizardSource\")\nDataSource\
    \ wizardSource) {  ②\nthis.dswizardSource = wizardSource;\n}\nListing 6-7\nInject\
    \ DataSource via Constructor\n```\n\nNow you can get a connection from the managed\
    \ `DataSource` and use it in our code. This is a much more resource-friendly way\
    \ to get a JDBC connection.\n\n## Data Access with JPA\n\nThe preceding sections\
    \ discussed how the laborious task of managing database connections could be alleviated\
    \ using `DataSource`. However, the challenge of dealing with low-level result\
    \ sets remains. The data in a database exists in a completely different realm\
    \ and is stored in tables with interrelations for relational databases. It does\
    \ not consist of objects. As a result, manually converting this tabular data to\
    \ Java objects and back is a time-consuming process. Various object-relational\
    \ mapping (ORM) frameworks were developed to simplify this process. Essentially,\
    \ they serve as an intermediary layer between the `DataSource` and user code,\
    \ transforming the relational data stored in a database into Java objects and\
    \ vice versa, thus reducing the required time.\n\nBut each of these frameworks\
    \ provided its own API and usage model. A common specification was created since\
    \ this is a typical problem in most enterprise applications. It is called the\
    \ [Jakarta Persistence API](https://jakarta.ee/specifications/persistence/). This\
    \ is not a ready-to-use solution; it is a document and a set of APIs that different\
    \ vendors should implement. These implementations are usually called `JPA providers`.\n\
    \nJPA describes, among other things, how its implemented:\n\n- Map Java objects\
    \ to relational database tables.\n- Manage such persistent Java objects.\n- Interact\
    \ with transactions (in this case, Jakarta Transactions).\n- Interact with named\
    \ data sources.\n\nYou must put a few annotations to our POJOs, and the JPA provider\
    \ does all the magic for you. Those annotated objects are managed using special\
    \ `EntityManager` and `EntityManagerFactory` classes, which are automatically\
    \ configured and instantiated by Helidon. The code written with JPA is portable.\
    \ This means it works the same way when you switch the provider, discussed later\
    \ in the chapter.\n\nJPA has two operation modes:\n\n- In a container-managed\
    \ entity manager, JPA management is handled entirely by the container; Helidon,\
    \ in our case.\n- In an application-managed entity manager, JPA management is\
    \ handled by the application (better say, the developer).\n\nThis book talks only\
    \ about the container-managed JPA, which means you learn how to tell Helidon to\
    \ properly configure and run a JPA provider for you. Helidon takes of error handling,\
    \ thread safety, and transaction management on behalf of the user, making the\
    \ developer experience much better.\n\nJPA providers are supported in Hibernate\
    \ ORM and EclipseLink. You should choose one of them, but not both.\n\n### Note\n\
    \nThis chapter only acquaints you with JPA in the context of Helidon. JPA is a\
    \ vast topic. Please check other books about JPA for more details about this specification\
    \ and its usage.\n\nAll of this may sound a little scary, but let’s jump into\
    \ the code, and you will see that it is quite easy.\n\nMicroservices working with\
    \ a database is a common use case; there is a special Helidon QuickStart. It can\
    \ be used as a template for our next Helidon service. Let’s now generate a Quickstart\
    \ database example at [`https://helidon.io/starter`](https://helidon.io/starter).\n\
    \n1. Select the Helidon MP flavor.\n2. Select Database.\n3. Choose Jackson or\
    \ JSON-B for Media Support.\n4. Select the following:\n   - Hibernate as the JPA\
    \ Implementation\n   - `HipariCP` for Connection Pool\n   - H2 for the Database\
    \ Server\n   - Auto DDL for Automatic schema initialization\n5. Click the Download\
    \ button.\n\nAlternatively, you can go to [`https://helidon.io/starter/3.2.0?flavor=mp&step=5&app-type=database`](https://helidon.io/starter/3.2.0%253Fflavor%253Dmp%2526step%253D5%2526app-type%253Ddatabase),\
    \ unzip the `myproject.zip` download, and open the folder in your favorite IDE.\n\
    \n### Note\n\nWhen this book was written, Helidon’s latest version was `3.2.0`.\
    \ You may replace the version number with the latest version available to you.\n\
    \nLet’s explore the generated project. It is a Pokemon repository service."
