- fmt: "## What Is Observability?\n\nThe term `observability` comes from control theory.\
    \ Control theory deals with algorithms driving a dynamic system to a desired state\
    \ optimally using sensor data. A dynamic system is observable if its state at\
    \ every moment in time can be determined by analyzing the outputs of external\
    \ sensors. The system is not observable if data collection from external sensors\
    \ doesn’t give a complete picture of the state or if this data is ambiguous. The\
    \ anti-lock braking system (ABS) is a good sample. It detects a wheel lock using\
    \ a sensor, and a special algorithm unlocks the wheel repeatedly to provide the\
    \ most efficient brake.\n\nFor computer systems, this definition is as follows:\
    \ “Observability is the ability of a service to expose data externally that reflects\
    \ its internal behavior.”\n\nIt means that the service provides enough data for\
    \ admins to understand what’s happening. One may say that it’s precisely what\
    \ `monitoring` does. It’s considered that the difference is that, unlike observability\
    \ which provides data for all possible use cases, monitoring operates with only\
    \ a predefined set of data and monitors only known use cases. It places observability\
    \ at a level higher than monitoring.\n\nTelemetry is all remotely collected data\
    \ from the system for monitoring. The word combines two Greek roots: `tele`, meaning\
    \ “remote,” and `metron`, meaning “measure.” So, it’s a remote measurement. For\
    \ example, Formula 1 teams are collecting telemetry data from the cars in the\
    \ race to detect some engine failures. Technically, telemetry assumes only gathering\
    \ and transferring the data. Monitoring tools do data analysis. One can say that\
    \ monitoring tools in the past were also doing some remote data collection, and\
    \ telemetry word was never used. Yes, that’s right. Telemetry became a buzzword\
    \ thanks to the OpenTelemetry project, which standardizes collecting metrics from\
    \ cloud-based systems. OpenTelemetry aims to provide the full cross-platform,\
    \ cloud-native observability stack. And here comes the confusion. The OpenTelemetry\
    \ project is about `observability`, and `telemetry` only collects remote data.\n\
    \nThere are four main areas of observability:\n\n- **Health** determines that\
    \ the service is on, ready to serve requests, and reacting as expected using simple\
    \ requests returning true or false.\n- **Metrics** collects data for monitoring,\
    \ such as the number of times a method is called, average execution time, and\
    \ so forth.\n- **Tracing** collects the steps of each request processing with\
    \ additional details such as call durations.\n- **Logging** stores important information\
    \ about internal service machinery.\n\n## Health\n\nThe primary purpose of health\
    \ checks is to provide an API allowing external automated management systems to\
    \ check if your application is available and ready to serve requests. Based on\
    \ returned data, the management system decides whether it should forward requests\
    \ to this node or decommission and replace it with another node.\n\nHealth checking\
    \ is essential to guarantee that your whole system operates smoothly. Requests\
    \ should not be forwarded to nodes that cannot process them; otherwise, your users\
    \ could see failing or hanging requests.\n\n> Note  \n> Health checks are designed\
    \ to be used by automated systems. Human operators could use it, but it’s not\
    \ the typical use.\n\n### Kubernetes Probes\n\nTo get the application status,\
    \ the Kubernetes node agent sends `probes` to some defined application endpoints,\
    \ which return UP (status `2xx`) or DOWN (status `5xx`). It may also optionally\
    \ return some additional information to help identify the issue.\n\nThe application\
    \ may perform multiple checks to define its state. Each check returns UP or DOWN,\
    \ and the final response is determined by combining all checks results with a\
    \ logical AND operator. Meaning that the response is DOWN if at least one check\
    \ returns DOWN.\n\n**Table 4-1. Kubernetes Probes**\n\n| Probe | Description |\n\
    | --- | --- |\n| Startup | Determines whether your application has started. If\
    \ configured, the node agent only triggers other probes once the `startup` probe\
    \ succeeds. |\n| Readiness | Determines whether your application is ready to serve\
    \ requests. Requests are only forwarded to your application if the `readiness`\
    \ check succeeds. |\n| Liveness | Determines whether your application faced some\
    \ critical issue like out of memory or threads deadlock and must be restarted\
    \ or decommissioned. |\n\n### MicroProfile Health\n\nHelidon implements MicroProfile\
    \ Health specification, which defines APIs and REST endpoints to work with health\
    \ checks in Java applications. The spec version implemented by Helidon may vary\
    \ depending on the Helidon version. Helidon `3.x` supports MicroProfile Health\
    \ `3.1`.\n\n#### MicroProfile Health\n\nMicroProfile Health is an open-source\
    \ specification developed by the MicroProfile working group. Its goal is to standardize\
    \ how microservices report their health status using REST endpoints. You can get\
    \ more information from the spec [document](https://download.eclipse.org/microprofile/microprofile-health-3.1/microprofile-health-spec-3.1.html)\
    \ or [the spec API sources](https://github.com/eclipse/microprofile-health).\n\
    \nThe spec defines four REST endpoints (see Table `4-2`).\n\n**Table 4-2. MicroProfile\
    \ Health REST API**\n\n| Probe(s) | URI | Method | Status |\n| --- | --- | ---\
    \ | --- |\n| Startup | `/health/started` | `GET` | `200 - UP` `503 - DOWN` `500\
    \ - ERROR` |\n| Readiness | `/health/ready` | `GET` | `200 - UP` `503 - DOWN`\
    \ `500 - ERROR` |\n| Liveness | `/health/live` | `GET` | `200 - UP` `503 - DOWN`\
    \ `500 - ERROR` |\n| Startup + Readiness + Liveness | `/health` | `GET` | `200\
    \ - UP` `503 - DOWN` `500 - ERROR` |\n\nThe probe URLs must be configured in the\
    \ `container` section in your application Kubernetes deployment descriptor `app.yaml`\
    \ (see Listing `4-1`).\n\n- ① Liveness probe configuration\n- ② Liveness probe\
    \ URL\n- ③ Readiness probe configuration\n- ④ Readiness probe URL\n- ⑤ Startup\
    \ probe configuration\n- ⑥ Startup probe URL\n\n```yaml\nlivenessProbe:      \
    \         ①\nhttpGet:\npath: /health/live       ②\nport: 8080\nperiodSeconds:\
    \ 3\nreadinessProbe:              ③\nhttpGet:\npath: /health/ready      ④\nport:\
    \ 8080\nperiodSeconds: 3\nstartupProbe:                ⑤\nhttpGet:\npath: /health/started\
    \    ⑥\nport: 8080\nperiodSeconds: 3\nListing 4-1\nConfiguring Health Probes in\
    \ app.yaml\n```\n\nNow let’s look at what MicroProfile Health REST API endpoints\
    \ return. They return your application health status in JSON format. It has the\
    \ same schema for all types of probes. For example, Listing `4-2` depicts a JSON\
    \ entity returned by a liveness check, returning status `200` (UP).\n\n- ① Probe\
    \ status. UP if all checks return UP or no checks defined, DOWN otherwise\n- ②\
    \ An array with all checks for this probe (It can be empty)\n- ③ Name of the first\
    \ check\n- ④ Status of the first health check. It can be UP or DOWN\n- ⑤ Optional\
    \ object containing additional data for this check\n- ⑥ Name of the second health\
    \ check\n- ⑦ Status of the second health check status\n\n```json\n{\n\"status\"\
    : \"UP\",              ①\n\"checks\": [                  ②\n{\n\"name\": \"firstCheck\"\
    ,    ③\n\"status\": \"UP\",          ④\n\"data\": {                ⑤\n\"key\"\
    : \"foo\",\n\"foo\": \"bar\"\n}\n},\n{\n\"name\": \"secondCheck\",   ⑥\n\"status\"\
    : \"UP\"           ⑦\n}\n]\n}\nListing 4-2\nA Sample Health Check Status\n```\n\
    \nMicroProfile specification also defines an API for adding custom health checks\
    \ to your application, which is explained later in this chapter. Now, let’s look\
    \ at how to enable MicroProfile Health support in your Helidon application.\n\n\
    ### Adding Health Checks to Your Helidon Application\n\nIf you want to add health\
    \ checks support to your existing project, manually add dependencies to your Maven\
    \ project."
  raw: '## What Is Observability?


    The term *observability* comes from control theory. Control theory deals with
    algorithms driving a dynamic system to a desired state optimally using sensor
    data. A dynamic system is observable if its state at every moment in time can
    be determined by analyzing the outputs of external sensors. The system is not
    observable if data collection from external sensors doesn’t give a complete picture
    of the state or if this data is ambiguous. The anti-lock braking system (ABS)
    is a good sample. It detects a wheel lock using a sensor, and a special algorithm
    unlocks the wheel repeatedly to provide the most efficient brake.


    For computer systems, this definition is as follows: “Observability is the ability
    of a service to expose data externally that reflects its internal behavior.”


    It means that the service provides enough data for admins to understand what’s
    happening. One may say that it’s precisely what *monitoring* does. It’s considered
    that the difference is that, unlike observability which provides data for all
    possible use cases, monitoring operates with only a predefined set of data and
    monitors only known use cases. It places observability at a level higher than
    monitoring.


    Telemetry is all remotely collected data from the system for monitoring. The word
    combines two Greek roots: *tele*, meaning “remote,” and *metron*, meaning “measure.”
    So, it’s a remote measurement. For example, Formula 1 teams are collecting telemetry
    data from the cars in the race to detect some engine failures. Technically, telemetry
    assumes only gathering and transferring the data. Monitoring tools do data analysis.
    One can say that monitoring tools in the past were also doing some remote data
    collection, and telemetry word was never used. Yes, that’s right. Telemetry became
    a buzzword thanks to the OpenTelemetry project, which standardizes collecting
    metrics from cloud-based systems. OpenTelemetry aims to provide the full cross-platform,
    cloud-native observability stack. And here comes the confusion. The OpenTelemetry
    project is about *observability,* and *telemetry* only collects remote data.


    There are four main areas of observability.


    *   **Health** determines that the service is on, ready to serve requests, and
    reacting as expected using simple requests returning true or false.


    *   **Metrics** collects data for monitoring, such as the number of times a method
    is called, average execution time, and so forth.


    *   **Tracing** collects the steps of each request processing with additional
    details such as call durations.


    *   **Logging** stores important information about internal service machinery.


    ## Health


    The primary purpose of health checks is to provide an API allowing external automated
    management systems to check if your application is available and ready to serve
    requests. Based on returned data, the management system decides whether it should
    forward requests to this node or decommission and replace it with another node.


    Health checking is essential to guarantee that your whole system operates smoothly.
    Requests should not be forwarded to nodes that cannot process them; otherwise,
    your users could see failing or hanging requests.


    Note


    Health checks are designed to be used by automated systems. Human operators could
    use it, but it’s not the typical use.


    ### Kubernetes Probes


    To get the application status, the Kubernetes node agent sends *probes* to some
    defined application endpoints, which return UP (status 2xx) or DOWN (status 5xx).
    It may also optionally return some additional information to help identify the
    issue.


    The application may perform multiple checks to define its state. Each check returns
    UP or DOWN, and the final response is determined by combining all checks results
    with a logical AND operator. Meaning that the response is DOWN if at least one
    check returns DOWN.


    Table 4-1


    Kubernetes Probes


    | Probe | Description |

    | --- | --- |

    | Startup | Determines whether your application has started. If configured, the
    node agent only triggers other probes once the *startup* probe succeeds. |

    | Readiness | Determines whether your application is ready to serve requests.
    Requests are only forwarded to your application if the *readiness* check succeeds.
    |

    | Liveness | Determines whether your application faced some critical issue like
    out of memory or threads deadlock and must be restarted or decommissioned. |


    ### MicroProfile Health


    Helidon implements MicroProfile Health specification, which defines APIs and REST
    endpoints to work with health checks in Java applications. The spec version implemented
    by Helidon may vary depending on the Helidon version. Helidon 3.x supports MicroProfile
    Health 3.1.


    Microprofile Health


    MicroProfile Health is an open-source specification developed by the MicroProfile
    working group. Its goal is to standardize how microservices report their health
    status using REST endpoints. You can get more information from the spec [document](https://download.eclipse.org/microprofile/microprofile-health-3.1/microprofile-health-spec-3.1.html)
    or [the spec API sources](https://github.com/eclipse/microprofile-health).


    The spec defines four REST endpoints (see Table [4-2](#600147_1_En_4_Chapter.xhtml#Tab2)).


    Table 4-2


    MicroProfile Health REST API


    | Probe(s) | URI | Method | Status |

    | --- | --- | --- | --- |

    | Startup | /health/started | GET | 200 - UP503 - DOWN500 - ERROR |

    | Readiness | /health/ready | GET | 200 - UP503 - DOWN500 - ERROR |

    | Liveness | /health/live | GET | 200 - UP503 - DOWN500 - ERROR |

    | Startup + Readiness + Liveness | /health | GET | 200 - UP503 - DOWN500 - ERROR
    |


    The probe URLs must be configured in the *container* section in your application
    Kubernetes deployment descriptor *app.yaml* (see Listing [4-1](#600147_1_En_4_Chapter.xhtml#PC1)).


    *   ① Liveness probe configuration


    *   ② Liveness probe URL


    *   ③ Readiness probe configuration


    *   ④ Readiness probe URL


    *   ⑤ Startup probe configuration


    *   ⑥ Startup probe URL


    ```

    livenessProbe:               ①

    httpGet:

    path: /health/live       ②

    port: 8080

    periodSeconds: 3

    readinessProbe:              ③

    httpGet:

    path: /health/ready      ④

    port: 8080

    periodSeconds: 3

    startupProbe:                ⑤

    httpGet:

    path: /health/started    ⑥

    port: 8080

    periodSeconds: 3

    Listing 4-1

    Configuring Health Probes in app.yaml

    ```


    Now let’s look at what MicroProfile Health REST API endpoints return. They return
    your application health status in JSON format. It has the same schema for all
    types of probes. For example, Listing [4-2](#600147_1_En_4_Chapter.xhtml#PC2)
    depicts a JSON entity returned by a liveness check, returning status 200 (UP).


    *   ① Probe status. UP if all checks return UP or no checks defined, DOWN otherwise


    *   ② An array with all checks for this probe (It can be empty)


    *   ③ Name of the first check


    *   ④ Status of the first health check. It can be UP or DOWN


    *   ⑤ Optional object containing additional data for this check


    *   ⑥ Name of the second health check


    *   ⑦ Status of the second health check status


    ```

    {

    "status": "UP",              ①

    "checks": [                  ②

    {

    "name": "firstCheck",    ③

    "status": "UP",          ④

    "data": {                ⑤

    "key": "foo",

    "foo": "bar"

    }

    },

    {

    "name": "secondCheck",   ⑥

    "status": "UP"           ⑦

    }

    ]

    }

    Listing 4-2

    A Sample Health Check Status

    ```


    MicroProfile specification also defines an API for adding custom health checks
    to your application, which is explained later in this chapter. Now, let’s look
    at how to enable MicroProfile Health support in your Helidon application.


    ### Adding Health Checks to Your Helidon Application


    If you want to add health checks support to your existing project, manually add
    dependencies to your Maven project.'
  trans: '

    ## 什么是可观测性？


    *可观测性*这一术语来自控制理论。控制理论研究的是如何利用传感器数据，通过算法将一个动态系统以最优方式驱动到期望状态。若一个动态系统在任意时刻的状态都能通过分析外部传感器的输出被确定，则该系统是可观测的。若外部传感器采集的数据无法完整反映系统状态，或这些数据存在歧义，则系统不可观测。防抱死制动系统（ABS）就是一个很好的例子。它通过传感器检测车轮抱死，并由专用算法反复释放车轮，以实现最高效的制动。


    对于计算机系统，这一定义如下：“可观测性是指一个服务能够向外部暴露可反映其内部行为的数据的能力。”


    这意味着服务需要提供足够的数据，使管理员能够理解正在发生什么。有人可能会说，这正是*监控*在做的事情。通常认为二者的区别在于：可观测性为所有可能的使用场景提供数据；而监控仅使用预定义的数据集，并且只监控已知场景。因此，可观测性被视为高于监控的一个层级。


    遥测（Telemetry）是为监控而从系统远程采集的全部数据。这个词由两个希腊词根组成：*tele*，意为“远程”；*metron*，意为“测量”。因此，它就是“远程测量”。例如，一级方程式车队会在比赛中采集赛车的遥测数据，以检测某些发动机故障。从技术角度看，遥测仅假定数据的采集与传输；数据分析则由监控工具完成。也可以说，过去的监控工具同样在做某种远程数据采集，只是从未使用“遥测”这个词。是的，确实如此。遥测之所以成为流行词，要归功于
    OpenTelemetry 项目，它对云系统的指标采集进行了标准化。OpenTelemetry 的目标是提供完整的跨平台、云原生可观测性技术栈。而困惑也由此而来：OpenTelemetry
    项目关注的是*可观测性*，而*遥测*本身只负责远程数据采集。


    可观测性主要有四个领域。


    *   **健康（Health）**：通过返回 true 或 false 的简单请求，判断服务是否已启动、是否可提供服务以及是否按预期响应。


    *   **指标（Metrics）**：采集用于监控的数据，例如方法调用次数、平均执行时间等。


    *   **追踪（Tracing）**：采集每个请求处理过程中的步骤及附加细节，如调用耗时。


    *   **日志（Logging）**：存储有关服务内部运行机制的重要信息。


    ## 健康（Health）


    健康检查的主要目的是提供一个 API，使外部自动化管理系统能够检查你的应用是否可用且已准备好处理请求。管理系统会基于返回数据决定：是将请求转发到该节点，还是将其下线并替换为其他节点。


    健康检查对于保证整个系统平稳运行至关重要。请求不应被转发到无法处理请求的节点；否则，用户可能会看到请求失败或卡住。


    注意


    健康检查的设计目标是供自动化系统使用。人工运维人员也可以使用它，但这不是其典型使用方式。


    ### Kubernetes 探针


    为了获取应用状态，Kubernetes 节点代理会向应用中定义的某些端点发送*探针（probes）*，这些端点返回 UP（状态 2xx）或 DOWN（状态
    5xx）。它还可以选择性返回一些附加信息，以帮助定位问题。


    应用可能会执行多个检查来判定自身状态。每个检查返回 UP 或 DOWN，最终响应通过将所有检查结果使用逻辑 AND 运算符合并得出。这意味着只要有任意一个检查返回
    DOWN，最终响应就是 DOWN。


    表 4-1


    Kubernetes 探针


    | 探针 | 描述 |

    | --- | --- |

    | Startup | 判断应用是否已启动。如果配置了该探针，节点代理仅在*startup*探针成功后才会触发其他探针。 |

    | Readiness | 判断应用是否已准备好处理请求。只有当*readiness*检查成功时，请求才会被转发到你的应用。 |

    | Liveness | 判断应用是否出现了诸如内存耗尽、线程死锁等严重问题，并且是否必须重启或下线。 |


    ### MicroProfile Health


    Helidon 实现了 MicroProfile Health 规范，该规范定义了在 Java 应用中使用健康检查的 API 与 REST 端点。Helidon
    实现的规范版本会随 Helidon 版本而变化。Helidon 3.x 支持 MicroProfile Health 3.1。


    Microprofile Health


    MicroProfile Health 是由 MicroProfile 工作组开发的开源规范。其目标是标准化微服务通过 REST 端点上报健康状态的方式。你可以从规范[文档](https://download.eclipse.org/microprofile/microprofile-health-3.1/microprofile-health-spec-3.1.html)或[规范
    API 源码](https://github.com/eclipse/microprofile-health)获取更多信息。


    该规范定义了四个 REST 端点（见表 4-2）。


    表 4-2


    MicroProfile Health REST API


    | 探针 | URI | 方法 | 状态 |

    | --- | --- | --- | --- |

    | Startup | /health/started | GET | 200 - UP503 - DOWN500 - ERROR |

    | Readiness | /health/ready | GET | 200 - UP503 - DOWN500 - ERROR |

    | Liveness | /health/live | GET | 200 - UP503 - DOWN500 - ERROR |

    | Startup + Readiness + Liveness | /health | GET | 200 - UP503 - DOWN500 - ERROR
    |


    探针 URL 必须在你的应用 Kubernetes 部署描述文件 *app.yaml* 的 *container* 部分进行配置（见清单 4-1）。


    *   ① Liveness 探针配置


    *   ② Liveness 探针 URL


    *   ③ Readiness 探针配置


    *   ④ Readiness 探针 URL


    *   ⑤ Startup 探针配置


    *   ⑥ Startup 探针 URL


    ```

    livenessProbe:               ①

    httpGet:

    path: /health/live       ②

    port: 8080

    periodSeconds: 3

    readinessProbe:              ③

    httpGet:

    path: /health/ready      ④

    port: 8080

    periodSeconds: 3

    startupProbe:                ⑤

    httpGet:

    path: /health/started    ⑥

    port: 8080

    periodSeconds: 3

    Listing 4-1

    Configuring Health Probes in app.yaml

    ```


    现在我们来看看 MicroProfile Health REST API 端点会返回什么。它们以 JSON 格式返回应用健康状态。所有类型的探针都使用相同的模式。例如，清单
    4-2 展示了一个由 liveness 检查返回的 JSON 实体，其状态为 200（UP）。


    *   ① 探针状态。若所有检查均为 UP 或未定义检查，则为 UP；否则为 DOWN


    *   ② 该探针下所有检查的数组（可以为空）


    *   ③ 第一个检查的名称


    *   ④ 第一个健康检查的状态，可为 UP 或 DOWN


    *   ⑤ 包含该检查附加数据的可选对象


    *   ⑥ 第二个健康检查的名称


    *   ⑦ 第二个健康检查的状态


    ```

    {

    "status": "UP",              ①

    "checks": [                  ②

    {

    "name": "firstCheck",    ③

    "status": "UP",          ④

    "data": {                ⑤

    "key": "foo",

    "foo": "bar"

    }

    },

    {

    "name": "secondCheck",   ⑥

    "status": "UP"           ⑦

    }

    ]

    }

    Listing 4-2

    A Sample Health Check Status

    ```


    MicroProfile 规范还定义了一个 API，用于向应用添加自定义健康检查，本章稍后会进行说明。现在，我们先看看如何在 Helidon 应用中启用 MicroProfile
    Health 支持。


    ### 向你的 Helidon 应用添加健康检查


    如果你希望在现有项目中加入健康检查支持，请手动向 Maven 项目添加依赖。

