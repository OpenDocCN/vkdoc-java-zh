    ### onTerminate


    The `onTerminate` operator never augments the stream. It executes provided runnable
    for the `onComplete` or `onError` signal coming through the stream. The `onTerminate`
    runnable is executed before the `onComplete` or `onError` signal continues downstream.


    ### cancel


    `cancel` is a terminal operator, meaning it subscribes upstream, and no other
    operators follow. The cancel operator sends the cancel signal upstream after the
    `onSubscribe` signal is received. It is not possible to do it earlier because
    the `onSubscribe` signal carries the subscription needed to send the `cancel`
    signal upstream.


    *   ① `peek` is not executed as the `cancel` signal is sent to the publisher and
    no `request` signal


    *   ② `cancel` sends `cancel` signal as soon as `onSubscribe` is signaled upstream


    ```

    ReactiveStreams.of(1, 2, 3)

    .peek(i -> log("This is never executed"))  ①

    .cancel()  ②

    .run()

    Listing 13-26

    cancel Operator Canceling the Whole Stream

    ```


