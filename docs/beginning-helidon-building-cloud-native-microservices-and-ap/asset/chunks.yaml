    ## Helidon 安全


    每个 HTTP 服务器都需要一种方式来限制对其资源的访问，使其仅对具备特定权限的特定用户开放。我们开发者构建自己的堡垒与城堡，用城墙和大门把未受邀请的用户挡在珍贵数据和内部功能之外。让我们想象一下这座属于我们的城堡。在中世纪城堡里，不是所有人都能打开主城门；否则任何人都可以进入。如果大门不受限制，那高墙又有什么意义呢？我们有必要知道谁是谁（身份认证）以及谁拥有什么权限（授权）。在我们的中世纪城堡中，守卫当然能够识别（认证）城堡居民。比如，如果他们认出守门人
    Gyles，就已经知道他因守门人的角色而可以操作城门。监狱长同样为守卫所熟知，几乎无所不能，也可以控制城门。在他的诸多角色中，也包括守门人角色。


    Helidon 不使用持剑披甲的守卫，而是提供了一套用于身份认证、授权和角色映射的安全提供者系统。每一项都可以作为独立依赖添加，并配置为协同工作。


    ![](img/600147_1_En_8_Fig4_HTML.png)


    一幅由 3 块拼图组成的示意图，标签分别为 O I D C、helidon security 和 A B A C。


    图 8-4


    Helidon 安全提供者


    安全提供者被设计为可协同工作，并通过统一的配置结构进行配置。


    *   ① 启用的提供者（例如 `abac`、`http-basic-auth,` 或 `oidc`）


    *   ② 提供者专属配置


    *   ③ 所有 Web 资源的默认配置


    *   ④ 按资源路径自定义的安全配置


    ```

    security:

    providers:

    - : ①

    ②

    - :


    web-server:

    defaults: ③


    paths:

    - path: "/greeting[/{*}]" ④


    - path: "/helloworld[/{*}]"


    Listing 8-6

    Security Configuration Structure

    ```


    在 Helidon 中保护 JAX-RS 资源时，可以结合使用与安全相关的 [Jakarta 注解](https://jakarta.ee/specifications/annotations/2.0/annotations-spec-2.0.html)（[JSR-250](https://jcp.org/en/jsr/detail%253Fid%253D250)）和
    Helidon 安全注解。


    *   `io.helidon.security.annotations.Authenticated` 在 JAX-RS 类或方法上启用或禁用身份认证。


    *   `io.helidon.security.annotations.Authorized` 在 JAX-RS 类或方法上启用或禁用授权。


    *   `jakarta.annotation.security.RolesAllowed` 定义被授权访问此资源的角色列表。


    *   `jakarta.annotation.security.PermitAll` 表示所有角色都被授权访问此资源。


    *   `jakarta.annotation.security.DenyAll` 表示没有任何角色被授权访问此资源。


    *   `io.helidon.security.abac.policy.PolicyValidator.PolicyStatement` 使用 ABAC
    提供者的 Java EE 策略表达式语言（EL）校验安全属性。


    *   `io.helidon.security.abac.role.RoleValidator.Roles` 使用 ABAC 提供者校验角色。


    *   `io.helidon.security.abac.scope.ScopeValidator.Scope` 使用 ABAC 提供者校验作用域。


    大多数典型用例仅使用 `@RolesAllowed` 和 `@Authenticated` 就可以解决。让我们看看如何保护城堡大门，使只有具备 `gatekeeper`
    和 `warden` 角色的用户可以打开它。


    *   ① 为该端点启用身份认证；也可在类级别启用


    *   ② 定义可访问该方法的角色


    ```

    @PUT

    @Path("/gate/open")

    @Authenticated    ①

    @RolesAllowed({"gate-keeper", "warden"})    ②

    public Response openGate() {

    if (gateOpened.compareAndSet(false, true)) {

    return Response.ok().build();

    } else {

    return Response.notModified().build();

    }

    }

    Listing 8-7

    JAX-RS Method with Authentication and Authorization

