- fmt: '## `iterate`


    `iterate`操作符会先发出提供的种子项，然后执行提供的函数；在后续每次发出时，都会以上一次发出的项作为参数生成下一项。


    - ① 结果列表包含`[10, 12, 14]`


    ```java

    ReactiveStreams.iterate(10, i -> i + 2)

    .limit(3)

    .toList()  ①

    .run()

    Listing 13-12

    iterate Operator Generates Subsequent Items from Previous One

    ```


    ## `fromCompletionStage`


    `fromCompletionStage`操作符可从`CompletionStage`承诺创建响应式流。当提供的完成阶段以某个值完成时，该值会作为`onNext`项立即向下游发出，随后紧接着发送`onComplete`信号。


    - ① 项之后会立即发送`onComplete`信号

    - ② 当`CompletionStage`完成时拦截到该项

    - ③ 没有拦截到`onError`信号


    ```java

    ReactiveStreams.fromCompletionStage(CompletableFuture.completedStage(1))

    .onComplete(() -> log("Completed!"))  ①

    .peek(i -> log("Got " + i))  ②

    .onError(t -> log("Not executed!"))  ③

    .ignore()

    .run()

    Listing 13-13

    fromCompletionStage Operator Creates Reactive Stream from Completion Stage

    ```


    当`CompletionStage`以异常完成时，会向下游发送`onError`信号，并以原始`Throwable`作为原因。


    - ① 不执行，因为没有`onComplete`信号

    - ② 不执行，因为没有`onNext`信号

    - ③ 拦截到失败的`CompletionStage`错误


    ```java

    CompletionStage cs = CompletableFuture.failedStage(new Exception("BOOM!"));

    ReactiveStreams.fromCompletionStage(cs)

    .onComplete(() -> log("Not executed!"))  ①

    .peek(i -> log("Not executed!"))  ②

    .onError(t -> log("Failed with " + t.getMessage()))  ③

    .ignore()

    .run()

    Listing 13-14

    fromCompletionStage Operator Creates Reactive Stream from Failed Completion Stage

    ```


    ## `fromCompletionStageNullable`


    虽然`CompletionStage`允许`null`值，但响应式流不允许。`null`不能作为响应式流中的`onNext`项传递。当`fromCompletionStage`操作符接收到一个由`null`完成的`CompletionStage`时，流会因`onError`信号失败，原因是`NullPointerException`。


    `fromCompletionStageNullable`操作符会丢弃`null`项并立即发出`onComplete`。


    ## `fromPublisher`


    `fromPublisher`操作符可以从原始响应式发布者构建流。这在将响应式流连接到其他响应式 API 时非常实用。


    - ① Java `Flow.Publisher`

    - ② 适配后的 Reactive Stream Publisher

    - ③ 使用`Flow.Publisher`发出项

    - ④ 使用`Flow.Publisher`完成流

    - ⑤ 结果列表包含所有发出的项`[1, 2, 3]`


    ```java

    SubmissionPublisher sp = new SubmissionPublisher();  ①

    Publisher rawPublisher = FlowAdapters.toPublisher(sp);  ②

    CompletionStage> resultCs =

    ReactiveStreams.fromPublisher(rawPublisher)

    .toList()

    .run();

    sp.submit(1);  ③

    sp.submit(2);

    sp.submit(3);

    sp.close();  ④

    List list = resultCs.toCompletableFuture().join();  ⑤

    Listing 13-15

    fromCompletionStage Operator Creates Reactive Stream from Publisher

    ```


    ## `concat`


    `concat`操作符将两个发布者图连接在一起：当第一个流完成后，第二个流继续发布。


    - ① 结果列表按正确顺序包含两个流的项`[1, 2, 3, 4]`


    ```java

    ReactiveStreams.concat(

    ReactiveStreams.of(1, 2),

    ReactiveStreams.of(3, 4)

    )

    .toList()  ①

    .run();

    Listing 13-16

    concat Connecting Two Streams to One

    ```


    ## `map`


    `map`操作符是响应式工具箱中最著名的工具之一。其参数是一个函数，会对流中经过的每个`onNext`信号执行。输入值作为函数参数传入，返回值被发送到下游的下一个操作符。


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig9_HTML.png)


    A diagram has 2 sets of 4 color gradient circles numbered 1 to 4 and 11 to 14
    with a short vertical line each on the arrows at the top and bottom. It has a
    block of the function dot map at the center.


    Figure 13-9


    Map operator


    返回值的类型决定了下一个下游操作符的入站类型。


    - ① 上游发送字符串项

    - ② 映射函数将类型从字符串改为整数

    - ③ 终止操作符`toList`已收集字符串


    ```java

    List upstreamData = List.of("1", "2", "3", "4");

    CompletionStage> resultFuture =

    ReactiveStreams.fromIterable(upstreamData)  ①

    .map(Integer::parseInt)  ②

    .toList()  ③

    .run();

    Listing 13-17

    map Operator Changing Type of Outbound Value

    ```


    ## `peek`


    `peek`操作符不会增强或修改流数据。它会对流中经过的每个`onNext`信号执行提供的消费者。


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig10_HTML.png)


    A diagram has 2 sets of 4 color gradient circles numbered 1 to 4 with a short
    vertical line each on the arrows at the top and bottom. It has a block of the
    function dot peek at the center.


    Figure 13-10


    Limit operator


    每个项都会被该消费者消费，并且该消费者绝不会并行执行。`onNext`信号只有在`peek`消费者函数执行完成后，才会把该项发送到下一个操作符。`peek`影响流的唯一方式是其消费者函数抛出异常；此时上游会被取消，并向下游发送`onError`信号，异常原因作为`Throwable`参数传递。


    与 Java 的`Stream.peek`可能因下游优化而被忽略不同，Reactive Streams 的`peek`保证对每个`onNext`信号执行。它可用于创建有意的副作用。


    ## `filter`


    `filter`操作符允许丢弃流中选定的项。其谓词函数会对每个`onNext`信号执行，并以该项作为参数。只有当`filter`谓词函数返回`true`时，`onNext`信号才会继续发送到下游。


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig11_HTML.png)


    A diagram has 4 color gradient circles numbered 1 to 4 and 2 circles numbered
    3 and 4 with a short vertical line each on the arrows at the top and bottom. It
    has a block of the function dot filter at the center.


    Figure 13-11


    The filter operator


    `filter`函数始终串行执行，和所有操作符函数一样。


    - ① 只有大于`2`的数字才能传到下游

    - ② 结果列表为`[3, 4]`，因为`1`和`2`被过滤掉了


    ```java

    ReactiveStreams.of(1, 2, 3, 4)

    .filter(i -> i > 2)  ①

    .toList()  ②

    .run()

    Listing 13-18

    filter Operator Letting Through Only Selected Items

    ```


    ## `limit`


    `limit`操作符限制发送到下游的项数量；其唯一参数是可通过`limit`操作符的项数（`long`）。`limit`操作符会统计通过的`onNext`信号。当达到限制数量时，`limit`会通过取消上游并向下游发送`onComplete`信号来完成流。


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig12_HTML.png)


    A diagram has 4 color gradient circles numbered 1 to 4 and 3 circles numbered
    1 to 3 with a short vertical line each on the arrows at the top and bottom. It
    has a block of the function dot limit at the center.


    Figure 13-12


    The limit operator


    `limit`参数只能是正数或`0`。当提供负数时，会抛出`IllegalArgumentException`。'
