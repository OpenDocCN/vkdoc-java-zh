    ### fromCompletionStage


    The `fromCompletionStage` operator creates a reactive stream from the `CompletionStage`
    promise. When the supplied completion stage is completed with a value, it is emitted
    downstream as an `onNext` item immediately followed by an `onComplete` signal.


    *   ① An `onComplete` signal is sent right after the item


    *   ② Item is intercepted when CompletionStage is completed


    *   ③ No `onError` signal intercepted


    ```

    ReactiveStreams.fromCompletionStage(CompletableFuture.completedStage(1))

    .onComplete(() -> log("Completed!"))  ①

    .peek(i -> log("Got " + i))  ②

    .onError(t -> log("Not executed!"))  ③

    .ignore()

    .run()

    Listing 13-13

    fromCompletionStage Operator Creates Reactive Stream from Completion Stage

    ```


    When `CompletionStage` is completed exceptionally, an `onError` signal is emitted
    downstream with the original `Throwable` as a cause.


    *   ① Not executed as there is no `onComplete` signal


    *   ② Not executed as there is no `onNext` signal


    *   ③ Error from failed CompletionStage intercepted


    ```

    CompletionStage cs = CompletableFuture.failedStage(new Exception("BOOM!"));

    ReactiveStreams.fromCompletionStage(cs)

    .onComplete(() -> log("Not executed!"))  ①

    .peek(i -> log("Not executed!"))  ②

    .onError(t -> log("Failed with " + t.getMessage()))  ③

    .ignore()

    .run()

    Listing 13-14

    fromCompletionStage Operator Creates Reactive Stream from Failed Completion Stage

    ```


    ### fromCompletionStageNullable


    While `CompletionStage` allows null values, reactive streams do not. Null cannot
    be carried as the `onNext` item within the reactive stream. When the `fromCompletionStage`
    operator is supplied with `CompletionStage` completed by null, the stream gets
    failed by the `onError` signal with `NullPointerException` as the cause.


    The `fromCompletionStageNullable` operator drops null items and emits `onComplete`
    immediately.


    ### fromPublisher


    The `fromPublisher` operator can construct a stream from a raw reactive publisher.
    This is very practical when connecting reactive streams to other reactive APIs.


    *   ① Java Flow.Publisher


    *   ② Adapted Reactive Stream Publisher


    *   ③ Emitting items with Flow.Publisher


    *   ④ Completing stream with Flow.Publisher


    *   ⑤ Result list contains all emitted items [1, 2, 3]


    ```

    SubmissionPublisher sp = new SubmissionPublisher();  ①

    Publisher rawPublisher = FlowAdapters.toPublisher(sp);  ②

    CompletionStage> resultCs =

    ReactiveStreams.fromPublisher(rawPublisher)

    .toList()

    .run();

    sp.submit(1);  ③

    sp.submit(2);

    sp.submit(3);

    sp.close();  ④

    List list = resultCs.toCompletableFuture().join();  ⑤

    Listing 13-15

    fromCompletionStage Operator Creates Reactive Stream from Publisher

    ```


    ### concat


    The `concat` operator connects two publisher graphs together the way that when
    first stream completes, the second one continues to publish instead.


    *   ① Result list contains items from both streams in the correct order [1, 2,
    3, 4]


    ```

    ReactiveStreams.concat(

    ReactiveStreams.of(1, 2),

    ReactiveStreams.of(3, 4)

    )

    .toList()  ①

    .run();

    Listing 13-16

    concat Connecting Two Streams to One

    ```


    ### map


    The `map` operator is a notoriously known wrench in your reactive toolbox. Its
    parameter is a function executed for each `onNext` signal coming through the stream.
    Incoming value is provided to the function, and the returned value is sent downstream
    to the next operator.


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig9_HTML.png)


    A diagram has 2 sets of 4 color gradient circles numbered 1 to 4 and 11 to 14
    with a short vertical line each on the arrows at the top and bottom. It has a
    block of the function dot map at the center.


    Figure 13-9


    Map operator


    The type of the returned value decides the inbound type of the next downstream
    operator.


    *   ① Upstream sends string items


    *   ② Mapping function changes the type from string to integer


    *   ③ Terminal operator `toList` already collects strings


    ```

    List upstreamData = List.of("1", "2", "3", "4");

    CompletionStage> resultFuture =

    ReactiveStreams.fromIterable(upstreamData)  ①

    .map(Integer::parseInt)  ②

    .toList()  ③

    .run();

    Listing 13-17

    map Operator Changing Type of Outbound Value

    ```


    ### peek


    The `peek` operator never augments the stream data. It executes the provided consumer
    for each `onNext` signal coming through the stream.


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig10_HTML.png)


    A diagram has 2 sets of 4 color gradient circles numbered 1 to 4 with a short
    vertical line each on the arrows at the top and bottom. It has a block of the
    function dot peek at the center.


    Figure 13-10


    Limit operator


    Each item is consumed by the consumer which is never executed in parallel. The
    `onNext` signal sends the item to the next operator only after the peek consumer
    function is executed. The only way `peek` can affect the stream is when an exception
    is thrown in its consumer function, then upstream is canceled, and the `onError`
    signal is sent downstream with exception cause as a `Throwable` parameter.


    Unlike Java’s `Stream.peek` which may get ignored because of downstream optimization,
    Reactive Streams `peek` is guaranteed to be executed for each `onNext` signal.
    It can be used for creating intentional side effects.


    ### filter


    The `filter` operator allows throwing away selected items coming down the stream.
    Its predicate function gets executed for each `onNext` signal with item as its
    parameter. The `onNext` signal is sent downstream only when the filter’s predicate
    function returns true.


