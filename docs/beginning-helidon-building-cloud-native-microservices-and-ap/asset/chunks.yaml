- fmt: '## Timer


    The timer metric is a big brother of the simple timer, covered in the previous
    section. In addition to tracking a method execution time, it contains a meter
    tracking throughput rate and a histogram with the statistical distribution of
    recorded times. Table [4-12](#600147_1_En_4_Chapter.xhtml#Tab12) contains all
    timer metric data, access methods, and the corresponding field in OpenMetrics
    and JSON formats.


    It makes sense to use a timer if you need this additional data. If you need to
    track only elapsed time, use a simple timer.


    ### Table 4-12 Timer Metric Data


    | Description | OpenMetrics Suffix | JSON Format Field | Timer Class Method |

    | --- | --- | --- | --- |

    | The average rate per second | `rate_per_second` | `meanRate` | `getMeanRate()`
    |

    | The exponentially-weighted moving average for the last minute | `one_min_rate_per_second`
    | `oneMinRate` | `getOneMinuteRate()` |

    | The exponentially-weighted moving average for the last five minutes | `five_min_rate_per_second`
    | `fiveMinRate` | `getFiveMinuteRate()` |

    | The exponentially-weighted moving average for the last fifteen minutes | `fifteen_min_rate_per_second`
    | `fifteenMinRate` | `getFifteenMinuteRate()` |

    | The minimum duration | `min_seconds` | `min` | `getSnapshot().getMin()` |

    | The maximum duration | `max_seconds` | `max` | `getSnapshot().getMax()` |

    | The mean duration | `mean_seconds` | `mean` | `getSnapshot().getMean()` |

    | The standard deviation of duration | `stddev_seconds` | `stddev` | `getSnapshot().getStdDev()`
    |

    | Number of hits | `seconds_count` | `count` | `getCount()` |

    | Elapsed time | `seconds_sum` | `elapsedTime` | `getElapsedTime()` |

    | The value at the 50th percentile | `seconds{quantile="0.5"}` | `p50` | `getSnapshot().getMedian()`
    |

    | The value at the 75th percentile | `seconds{quantile="0.75"}` | `p75` | `getSnapshot().get75thPercentile()`
    |

    | The value at the 95th percentile | `seconds{quantile="0.95"}` | `p95` | `getSnapshot().get95thPercentile()`
    |

    | The value at the 98th percentile | `seconds{quantile="0.98"}` | `p98` | `getSnapshot().get98thPercentile()`
    |

    | The value at the 99th percentile | `seconds{quantile="0.99"}` | `p99` | `getSnapshot().get99thPercentile()`
    |

    | The value at the 99,9th percentile | `seconds{quantile="0.999"}` | `p999` |
    `getSnapshot().get999thPercentile()` |


    To work with timers, MicroProfile Metrics provides annotations and programmatic
    APIs.


    ### Using Annotations


    MicroProfile Metrics API defines the `@Timed` annotation. It can be placed on
    a method, constructor, and class. While placed on a class, it affects all its
    constructors and non-private methods.


    Although the `@Timed` annotation doesn’t have any required parameters, it makes
    sense to add some metadata for clarity. Listing [4-18](#600147_1_En_4_Chapter.xhtml#PC40)
    demonstrates a timed method, which blocks for some random time not longer than
    five seconds.


    ```

    @GET

    @Timed(name="tmr1",

    absolute=true,

    description = "Timer using annotations")

    public void timer() throws InterruptedException {

    Thread.sleep(random.nextInt(5000));

    }

    Listing 4-18

    Creating a Timer Using Annotations

    ```


    Listing [4-19](#600147_1_En_4_Chapter.xhtml#PC41) shows a sample output in OpenMetrics
    format produced after triggering the timed method several times.


    ```

    # TYPE application_tmr1_rate_per_second gauge

    application_tmr1_rate_per_second 0.14116614752306147

    # TYPE application_tmr1_one_min_rate_per_second gauge

    application_tmr1_one_min_rate_per_second 0.07122550418795522

    # TYPE application_tmr1_five_min_rate_per_second gauge

    application_tmr1_five_min_rate_per_second 0.018664201095054796

    # TYPE application_tmr1_fifteen_min_rate_per_second gauge

    application_tmr1_fifteen_min_rate_per_second 0.00651434969860056

    # TYPE application_tmr1_mean_seconds gauge

    application_tmr1_mean_seconds 3.2017328639808618

    # TYPE application_tmr1_max_seconds gauge

    application_tmr1_max_seconds 4.0069105

    # TYPE application_tmr1_min_seconds gauge

    application_tmr1_min_seconds 2.0115542

    # TYPE application_tmr1_stddev_seconds gauge

    application_tmr1_stddev_seconds 0.6872868729178253

    # TYPE application_tmr1_seconds summary

    # HELP application_tmr1_seconds Timer using annotations

    application_tmr1_seconds_count 6

    application_tmr1_seconds_sum 19

    application_tmr1_seconds{quantile="0.5"} 3.0055081

    application_tmr1_seconds{quantile="0.75"} 4.0027326

    application_tmr1_seconds{quantile="0.95"} 4.0069105

    application_tmr1_seconds{quantile="0.98"} 4.0069105

    application_tmr1_seconds{quantile="0.99"} 4.0069105

    application_tmr1_seconds{quantile="0.999"} 4.0069105

    Listing 4-19

    Timer Metric Data in OpenMetrics Format

    ```


    ### Using Programmatic API


    MicroProfile Metrics API has a `Timer` class that works with timers. It can be
    obtained the same way as other metric classes using one of the overloaded `timer`
    methods of the `MetricRegistry` class. `Timer` contains getters for all timer
    metric fields (see Table [4-12](#600147_1_En_4_Chapter.xhtml#Tab12)).


    It operates similarly to the `SimpleTimer`, as demonstrated using `Runnable` with
    a simple timer. Listing [4-20](#600147_1_En_4_Chapter.xhtml#PC42) demonstrates
    this using `Callable` as a contrast.


    ```

    @ApplicationScoped

    @Path("/timer/programmatic")

    public class TimerProgrammaticResource {

    private Random random = new Random();

    private Timer timer;

    @Inject

    public TimerProgrammaticResource(MetricRegistry metricRegistry) {

    timer = metricRegistry.timer("tmr2");

    }

    @GET

    public Integer timer() throws Exception {

    Callable callable = () -> {

    int sleepSec = random.nextInt(5000);

    Thread.sleep(sleepSec);

    return sleepSec;

    };

    return timer.time(callable);

    }

    }

    Listing 4-20

    Creating a Timer Using Programmatic API

    ```


    ## Tracing


    Troubleshooting microservices is a complicated task. Each request may travel through
    different instances of microservices working on different hosts in different locations
    and environments.


    What if your service is handling requests too slowly? It shouldn’t be, but it
    is. You need to find out what’s going on. You know that it goes through multiple
    services depending on some business conditions. You don’t have access to these
    services and don’t know where they are hosted, so you cannot simply run your debugger
    and see what’s happening. It’s a use case where distributed tracing helps you.'
