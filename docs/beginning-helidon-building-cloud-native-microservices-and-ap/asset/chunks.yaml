    ## 超时


    有些任务可能会比预期耗时更久，甚至永远卡住。为了有效保护我们的应用免受这种情况影响，故障容错提供了 `@Timeout` 注解。带有该注解的方法运行时会被监控，一旦达到超时时间，线程会被中断，并且方法会抛出
    `TimeoutException`。


    不过这里有一个问题：当在同一个发起线程上监控超时时，超时后停止它的唯一方式就是中断该线程。而中断不一定足以让线程停止。线程可能在某处循环，却没有检查中断状态。在这种情况下，异常会在超时发生很久之后才抛出。在同一线程上没有任何保证。另一方面，将
    `@Timeout` 与 `@Asynchronous` 结合使用会提供更多控制能力。监控新线程是否超时的同时，我们的原始线程无需等待异步方法执行完成。


    ![](img/600147_1_En_7_Fig1_HTML.png)


    通过箭头展示了相互关联的原始线程、异步阶段、可完成阶段、超时以及超时异常的示意图。


    图 7-1


    通过 CompletionStage 传播异常的异步超时


    当发生超时时，封装在 `ExecutionException` 中的 `TimeoutException` 会立即通过返回的 `Future` 或 `CompletionStage`
    提供出来，无论中断是否成功。


    *   ① 在不同线程上运行方法，以立即获得超时结果。


    *   ② 将超时设置为 500 毫秒。


    *   ③ 定义一个回退方法，以便在超时时进行补偿。


    *   ④ 仅在超时的情况下使用回退。


    *   ⑤ 延迟一定毫秒数，以检查是否触发了超时。


    ```

    @Asynchronous                                  ①

    @Timeout(500)                                  ②

    @Fallback(

    fallbackMethod = "longTaskFallback",   ③

    applyOn = TimeoutException.class)      ④

    public CompletionStage timeConsumingTask(Long mls)

    throws InterruptedException {

    Thread.sleep(mls);                         ⑤

    return CompletableFuture

    .completedFuture(mls + " in time!");

    }

    private CompletionStage longTaskFallback(Long p) {

    return CompletableFuture

    .completedFuture(p + " timeout!");

    }

    Listing 7-8

    Asynchronous Timeout with Fallback

    ```


    *   ① 使用 `CompletionStage.get()` 阻塞当前线程，直到结果就绪


    *   ② 设置较小的延迟以避免超时


    *   ③ 设置较大的延迟以触发超时


    ```

    timeConsumingTask(490).get();    ① ②

    timeConsumingTask(520).get();    ③

    > 490 in time!

    > 520 timeout!

    Listing 7-9

    Call Timeout

    ```


    ## 熔断器


    你已经学会了在失败时如何进行重试与回退，以及如何监控超时。现在你已经具备了应对一定程度间歇性故障的基础工具。另一个用于防护间歇性故障实际比例的工具是熔断器（Circuit
    Breaker）。


    不同于你家里只有开/关两种状态的断路器，这个要聪明得多。故障容错中的 Circuit Breaker 功能有三种状态。


    *   **关闭（Closed）** 表示失败率较低，允许所有执行。


    *   **打开（Open）** 表示失败率过高，Circuit Breaker 会通过 `CircuitBreakerOpenException` 拒绝执行。


    *   **半开（Half-open）** 表示允许配置数量的测试执行，以判断 Circuit Breaker 是否可以切回 `Closed` 状态。


    你地下室里的断路器一旦发现故障就会立刻断开电路，并保持该状态，直到你打着手电去把它重新合上；而 Circuit Breaker 则会在一个滚动窗口中分析失败率，以将服务质量维持在配置水平。*滚动窗口（rolling
    window）* 听起来很高级，其实就是用于计算成功率的历史执行尝试数量。所谓“20 的滚动窗口”，就是 Circuit Breaker 逻辑会记住最近 20
    次执行结果，并比较其中失败的数量。如果记录到的失败过多，Circuit Breaker 会从 `Closed` 切换到 `Open` 状态，并通过抛出 `CircuitBreakerOpenException`
    拒绝后续执行。你不需要再打着手电去手动恢复，经过配置的延迟后，Circuit Breaker 会切换到第三种状态：`Half-open`。在 `Half-open`
    状态下，会允许可配置数量的执行来测试情况是否改善，以及是否可以安全切回 `Closed` 状态。如果 `Half-open` 状态下有任何一次执行失败，Circuit
    Breaker 会返回 `Open` 状态。


    ![](img/600147_1_En_7_Fig2_HTML.png)


    该流程图包含如下流程：关闭、失败率上限是否达到的判定框、打开、半开，以及“所有试运行是否成功”的判定框。


    图 7-2


    熔断器状态


    Circuit Breaker 可以与其他故障容错注解组合使用。例如，`@Retry` 的重试会被计为执行尝试，而 `@Fallback` 可以在因 `CircuitBreakerOpenException`
    被拒绝执行时进行补偿。

    '
- fmt: '## Bulkhead


    Bulkhead functionality is best explained in a famous movie about the sinking of
    the `RMS Titanic` cruise ship. The `Titanic` had a known flood protection system:
    bulkheads. Waterproof bulkheads partitioned the ship’s interior under the sea
    level so that possible hull breach would flood only the damaged compartments.
    The bulkheads would protect all the other compartments, as in Figure [7-3](#600147_1_En_7_Chapter.xhtml#Fig3).


    ![](images/600147_1_En_7_Chapter/600147_1_En_7_Fig3_HTML.png)


    A cropped illustration of a ship has the water level, flooded partitions, and
    the breach in the hull.


    Figure 7-3


    Bulkheads isolating the flooded compartments


    Fault tolerance bulkheads work similarly, with a small difference that instead
    of stopping the flood of water, it stops the flood of concurrent requests.


    Too many concurrent requests can be a problem, not only for our application but
    also for other services being invoked subsequently. Resources or services can
    be shared only by a limited number of contesting concurrent consumers. It’s great
    when our service can survive a huge request peak, but what if it needs to call
    subsequent service multiple times per request? Such a situation could lead to
    cascading failure, and that’s what bulkhead is for. It can effectively limit concurrent
    invocations of the annotated method.


    In the same way that a ship’s bulkhead needs to let sailors pass between the compartments,
    a fault tolerance bulkhead lets a configured number of threads through. It’s like
    a valve in Figure [7-4](#600147_1_En_7_Chapter.xhtml#Fig4), letting through only
    configured number of threads at a time. When the bulkhead limit of threads currently
    executing our method is reached, any new thread trying to execute the method ends
    up with `BulkheadException`.


    ![](images/600147_1_En_7_Chapter/600147_1_En_7_Fig4_HTML.png)


    An illustration of a cylindrical bulkhead with openings on both sides has threads
    1 and 2 that pass through to the other side, while thread 3 is met with a bulkhead
    exception.


    Figure 7-4


    Bulkheads regulating concurrent requests


    Bulkhead can be combined with `@Asynchronous`, which enables the `waitingTaskQueue`
    parameter. Since the bulkhead no longer works with simple semaphores but operates
    a thread pool, it is possible to keep threads in the queue until previous executions
    finish. When the queue is full, `BulkheadException` is thrown for any additional
    thread.


    - ① Only two concurrent executions at a time are allowed.

    - ② Three threads can wait in a queue until previous executions finish.

    - ③ Invoke the fallback method instead in case execution is rejected by `@Bulkhead`.

    - ④ Spend some time on the method. Bulkhead ensures there are always at most two
    threads sleeping here at once.


    ```java

    @Asynchronous

    @Bulkhead(value = 2, waitingTaskQueue = 3)    ① ②

    @Fallback(fallbackMethod = "bulkheadTaskFallback",

    applyOn = BulkheadException.class)    ③

    public CompletionStage bulkheadTask(int task) {

    System.out.println("Executing - " + task);

    Thread.sleep(200);                           ④

    System.out.println("Finishing - " + task);

    return CompletableFuture.completedFuture(null);

    }

    private CompletionStage bulkheadTaskFallback(int t) {

    System.out.println("BulkheadException fallback - " + t);

    return CompletableFuture.completedFuture(null);

    }

    Listing 7-10

    Bulkhead with Asynchronous

    ```


    - ① Only two tasks are allowed concurrently.

    - ② Notice how tasks 3 to 5 are waiting in the queue.

    - ③ Tasks 6 and 7 are rejected because the queue is full already.

    - ④ Let in task 3 as one of the previous tasks finished.


    ```text

    for(int i = 1; i Executing - 1

    >Executing - 2                     ①

    >BulkheadException fallback - 6    ② ③

    >BulkheadException fallback - 7

    >Finishing - 1

    >Executing - 3                      ④

    >Finishing - 2

    >Executing - 4

    ...

    Listing 7-11

    Call Method with Bulkhead

    ```


    ### Note


    All Fault Tolerance annotation parameter values can be overridden with configuration
    for each method, class, or whole service.


    - `my.package.WizardBean/callWizardService/Retry/maxRetries=10`

    - `my.package.WizardBean/Retry/maxRetries=10`

    - `Retry/maxRetries=10`

    - `Retry/enabled=false`


    ## Fault Tolerance and CDI


    MicroProfile Fault Tolerance uses CDI interceptors to intercept CDI bean method
    calls. CDI injects a proxy class instance instead of the actual instance of your
    bean class. This makes it possible to intercept method calls and enables other
    cool CDI features.


    ![](images/600147_1_En_7_Chapter/600147_1_En_7_Fig5_HTML.png)


    A screenshot of the bean proxy, fault tolerance interceptor, and actual method
    windows has several lines of code. They include the functions of `public`, `for`,
    `at retry`, `at fallback`, `return`, `catch`, and `return`, among others.


    Figure 7-5


    Intercepting Fault Tolerance methods


    You need to remember to call the Fault Tolerance enabled method on the bean proxy,
    not the class itself. Calling a method from the same bean with `this` won’t work.
    The method is executed, but Fault Tolerance has no chance to kick in.


    ```java

    public String otherBeanMethod() {

    return this.callWizardService();

    }

    Listing 7-12

    Direct Method Call

    ```


    You can, however, inject the bean inside itself, like in Listing [7-13](#600147_1_En_7_Chapter.xhtml#PC16),
    and use the reference for calling the method. This time the Fault Tolerance interceptor
    works.


    ```java

    @Inject

    private WizardBean self;              ①

    public String otherBeanMethod() {

    return self.callWizardService();   ②

    }

    Listing 7-13

    Self Bean Method Call

    ```


    CDI injects proxy to the `self` field instead of the actual bean instance, making
    it possible to intercept method executions. The bean method called over the proxy
    instance has all the Fault Tolerance goodies.


    ### Note


    Don’t call bean methods from the same class over `this` reference. It breaks CDI
    features as it misses the CDI proxy.


    ## Summary


    - Always invoke Fault Tolerance enabled methods over CDI proxy.

    - The fallback method must have the same parameters and return type.

    - Asynchronous methods must return `CompletionStage` or `Future`.

    - All Fault Tolerance annotation arguments can be overridden with configuration.


    # 8. Security


    This chapter covers the following topics.


    - Using HTTPS encrypted with TLS 1.3

    - Jakarta Security

    - Using MicroProfile JWT tokens

    - Authentication and authorization with OpenID Connect

    - Encrypting secrets in configuration


    Securing your application is a step that is often perceived as a very complicated
    task that requires security specialists with deep knowledge of all sorts of encryption
    mechanisms and black magic. Modern frameworks like Helidon provide tooling to
    simplify this task, even for developers with a basic understanding of this very
    important field. Since Helidon is a web server, let’s start with setting up HTTPS
    so that you learn how to set up and use a server certificate. Then let’s look
    at authentication and authorization by managing role-based access (RBAC) with
    the help of security annotations. Use OpenID Connect as a security provider. And
    finally, let’s discuss how to use JSON Web Token (JWT) as a bearer token for easier
    communication between the applications and how to leverage the MicroProfile JWT
    extension to distribute roles within the JWT bearer token.'
  raw: '## Bulkhead


    Bulkhead functionality is best explained in a famous movie about the sinking of
    the *RMS Titanic* cruise ship. The *Titanic* had a known flood protection system:
    bulkheads. Waterproof bulkheads partitioned the ship’s interior under the sea
    level so that possible hull breach would flood only the damaged compartments.
    The bulkheads would protect all the other compartments, as in Figure [7-3](#600147_1_En_7_Chapter.xhtml#Fig3).


    ![](images/600147_1_En_7_Chapter/600147_1_En_7_Fig3_HTML.png)


    A cropped illustration of a ship has the water level, flooded partitions, and
    the breach in the hull.


    Figure 7-3


    Bulkheads isolating the flooded compartments


    Fault tolerance bulkheads work similarly, with a small difference that instead
    of stopping the flood of water, it stops the flood of concurrent requests.


    Too many concurrent requests can be a problem, not only for our application but
    also for other services being invoked subsequently. Resources or services can
    be shared only by a limited number of contesting concurrent consumers. It’s great
    when our service can survive a huge request peak, but what if it needs to call
    subsequent service multiple times per request? Such a situation could lead to
    cascading failure, and that’s what bulkhead is for. It can effectively limit concurrent
    invocations of the annotated method.


    In the same way that a ship’s bulkhead needs to let sailors pass between the compartments,
    a fault tolerance bulkhead lets a configured number of threads through. It’s like
    a valve in Figure [7-4](#600147_1_En_7_Chapter.xhtml#Fig4), letting through only
    configured number of threads at a time. When the bulkhead limit of threads currently
    executing our method is reached, any new thread trying to execute the method ends
    up with `BulkheadException`.


    ![](images/600147_1_En_7_Chapter/600147_1_En_7_Fig4_HTML.png)


    An illustration of a cylindrical bulkhead with openings on both sides has threads
    1 and 2 that pass through to the other side, while thread 3 is met with a bulkhead
    exception.


    Figure 7-4


    Bulkheads regulating concurrent requests


    Bulkhead can be combined with `@Asynchronous`, which enables the `waitingTaskQueue`
    parameter. Since the bulkhead no longer works with simple semaphores but operates
    a thread pool, it is possible to keep threads in the queue until previous executions
    finish. When the queue is full, `BulkheadException` is thrown for any additional
    thread.


    *   ① Only two concurrent executions at a time are allowed.


    *   ② Three threads can wait in a queue until previous executions finish.


    *   ③ Invoke the fallback method instead in case execution is rejected by `@Bulkhead`.


    *   ④ Spend some time on the method. Bulkhead ensures there are always at most
    two threads sleeping here at once.


    ```

    @Asynchronous

    @Bulkhead(value = 2, waitingTaskQueue = 3)    ① ②

    @Fallback(fallbackMethod = "bulkheadTaskFallback",

    applyOn = BulkheadException.class)    ③

    public CompletionStage bulkheadTask(int task) {

    System.out.println("Executing - " + task);

    Thread.sleep(200);                           ④

    System.out.println("Finishing - " + task);

    return CompletableFuture.completedFuture(null);

    }

    private CompletionStage bulkheadTaskFallback(int t) {

    System.out.println("BulkheadException fallback - " + t);

    return CompletableFuture.completedFuture(null);

    }

    Listing 7-10

    Bulkhead with Asynchronous

    ```


    *   ① Only two tasks are allowed concurrently.


    *   ② Notice how tasks 3 to 5 are waiting in the queue.


    *   ③ Tasks 6 and 7 are rejected because the queue is full already.


    *   ④ Let in task 3 as one of the previous tasks finished.


    ```

    for(int i = 1; i Executing - 1

    >Executing - 2                     ①

    >BulkheadException fallback - 6    ② ③

    >BulkheadException fallback - 7

    >Finishing - 1

    >Executing - 3                      ④

    >Finishing - 2

    >Executing - 4

    ...

    Listing 7-11

    Call Method with Bulkhead

    ```


    Note


    All Fault Tolerance annotation parameter values can be overridden with configuration
    for each method, class, or whole service.


    *   `my.package.WizardBean/callWizardService/Retry/maxRetries=10`


    *   `my.package.WizardBean/Retry/maxRetries=10`


    *   `Retry/maxRetries=10`


    *   `Retry/enabled=false`


    ## Fault Tolerance and CDI


    MicroProfile Fault Tolerance uses CDI interceptors to intercept CDI bean method
    calls. CDI injects a proxy class instance instead of the actual instance of your
    bean class. This makes it possible to intercept method calls and enables other
    cool CDI features.


    ![](images/600147_1_En_7_Chapter/600147_1_En_7_Fig5_HTML.png)


    A screenshot of the bean proxy, fault tolerance interceptor, and actual method
    windows has several lines of code. They include the functions of public, for,
    at retry, at fallback, return, catch, and return, among others.


    Figure 7-5


    Intercepting Fault Tolerance methods


    You need to remember to call the Fault Tolerance enabled method on the bean proxy,
    not the class itself. Calling a method from the same bean with `this` won’t work.
    The method is executed, but Fault Tolerance has no chance to kick in.


    ```

    public String otherBeanMethod() {

    return this.callWizardService();

    }

    Listing 7-12

    Direct Method Call

    ```


    You can, however, inject the bean inside itself, like in Listing [7-13](#600147_1_En_7_Chapter.xhtml#PC16),
    and use the reference for calling the method. This time the Fault Tolerance interceptor
    works.


    ```

    @Inject

    private WizardBean self;              ①

    public String otherBeanMethod() {

    return self.callWizardService();   ②

    }

    Listing 7-13

    Self Bean Method Call

    ```


    CDI injects proxy to the `self` field instead of the actual bean instance, making
    it possible to intercept method executions. The bean method called over the proxy
    instance has all the Fault Tolerance goodies.


    Note


    Don’t call bean methods from the same class over `this` reference. It breaks CDI
    features as it misses the CDI proxy.


    ## Summary


    *   Always invoke Fault Tolerance enabled methods over CDI proxy.


    *   The fallback method must have the same parameters and return type.


    *   Asynchronous methods must return `CompletionStage` or `Future.`


    *   All Fault Tolerance annotation arguments can be overridden with configuration.


    # 8. Security


    This chapter covers the following topics.


    *   Using HTTPS encrypted with TLS 1.3


    *   Jakarta Security


    *   Using MicroProfile JWT tokens


    *   Authentication and authorization with OpenID Connect


    *   Encrypting secrets in configuration


    Securing your application is a step that is often perceived as a very complicated
    task that requires security specialists with deep knowledge of all sorts of encryption
    mechanisms and black magic. Modern frameworks like Helidon provide tooling to
    simplify this task, even for developers with a basic understanding of this very
    important field. Since Helidon is a web server, let’s start with setting up HTTPS
    so that you learn how to set up and use a server certificate. Then let’s look
    at authentication and authorization by managing role-based access (RBAC) with
    the help of security annotations. Use OpenID Connect as a security provider. And
    finally, let’s discuss how to use JSON Web Token (JWT) as a bearer token for easier
    communication between the applications and how to leverage the MicroProfile JWT
    extension to distribute roles within the JWT bearer token.'
