- fmt: '## Metrics


    If the health metric provides information about the current state of the service,
    Metrics gives some aggregated statistics about how your service is performing
    over time. It can be the number of requests an endpoint gets, the average request
    processing time, and so on. Service administrators can use this information to
    improve service performance, tune upscaling strategies, optimize business logic,
    and collect some data for reporting. Health and metrics are designed to work with
    monitoring systems. The monitoring stack consists of a database collecting and
    storing data and a UI system displaying the data as graphics and diagrams.


    Prometheus and Grafana are popular systems for collecting and displaying metrics
    data.


    ### Note


    Prometheus is an open-source system to collect and store metrics data from different
    applications. It’s not used to view the data. You can think about it as a single-purpose
    database for storing metrics data. Prometheus provides client libraries for many
    programming languages, including Java.


    Grafana is a visualization tool for presenting metrics data to users. It shows
    a dashboard with nice graphs and updates them in real-time. It also allows defining
    alerts to notify administrators in case something goes wrong. It’s integrated
    with metrics storing systems like Prometheus, where it gets the data.


    Your Helidon application provides a set of metrics the user wants to track. Prometheus
    polls your application, collects metrics data, and stores them internally. Grafana
    is querying Prometheus for a specific subset of data and displaying them on a
    web page using graphs and diagrams. A user loads Grafana UI and views the Helidon
    application metrics in his browser. Figure [4-1](#600147_1_En_4_Chapter.xhtml#Fig1)
    illustrates these concepts.


    ![](images/600147_1_En_4_Chapter/600147_1_En_4_Fig1_HTML.jpg)


    A block diagram has the following flow, stick figure of a user, view, Grafana
    U I, query, Prometheus database, collect, and Helidon application with the U I,
    database, and application''s descriptions.


    Figure 4-1


    Metrics stack operation and components


    The next question is how Helidon gathers and provides metrics data to Prometheus.
    And the answer is that Helidon implements the MicroProfile Metrics specification.
    To be more specific, Helidon 3.0 implements MicroProfile Metrics 4.0.


    ### Microprofile Metrics


    MicroProfile Metrics is an open-source specification developed by the MicroProfile
    working group. Its goal is to standardize the way microservices define and expose
    metrics data. You can get more information from the specification document at
    [`https://download.eclipse.org/microprofile/microprofile-metrics-4.0/microprofile-metrics-spec-4.0.pdf`](https://download.eclipse.org/microprofile/microprofile-metrics-4.0/microprofile-metrics-spec-4.0.pdf).


    MicroProfile Metrics specification defines RESTful API allowing systems like Prometheus
    collecting metrics data (see the “MicroProfile Metrics REST API” section). The
    entry point is `/metrics`.


    Let’s look at how the Helidon application processes metrics requests. It’s illustrated
    in Figure [4-2](#600147_1_En_4_Chapter.xhtml#Fig2).


    1. Request comes to the `/metrics` endpoint or any other endpoint defined in MicroProfile
    Metrics REST API.

    2. Helidon gathers data for `base` and `vendor` metrics. Its metrics are defined
    by the MicroProfile specification and provided by Helidon out of the box (see
    the “Metric Scopes” section).

    3. Helidon processes all metrics defined in the Helidon application by developers.
    To define metrics, developers can use annotations or programmatic APIs.

    4. Helidon aggregates metrics data from 2 and 3 and produces a response in Prometheus
    or JSON format.


    ![](images/600147_1_En_4_Chapter/600147_1_En_4_Fig2_HTML.png)


    An illustration of the 4 steps of the request processed by the Helidon application
    when the user gives a `get /metrics` request. It also has codes for `base`, `vendor`,
    and `application` inside a dashed border on the bottom left.


    Figure 4-2


    Metrics requests processing by Helidon application


    Now you are familiar with the metrics stack architecture and metrics request workflow
    inside the Helidon application. So, it’s a good time to explain what metrics are,
    how they’re represented, and how to add custom metrics to your application. But
    before jumping to a theory, let’s discuss how to add MicroProfile metrics support
    to your Helidon application. After you understand that (don’t worry, it’s easy),
    let’s use a simple Helidon application for metrics demonstration. It’s easier
    to learn by example.


    ## Adding MicroProfile Metrics Support to Your Helidon Application


    ### Using Project Starter


    The easiest way is to use Project Starter to generate a project with metrics support.


    The following explains what you need to do.


    1. Open Project Starter at [`https://helidon.io/starter`](https://helidon.io/starter).

    2. Select Helidon MP on the Helidon Flavor screen and click Next.

    3. On the Application Type screen, select Custom and click Next.

    4. On the Media Support screen, keep Jackson selected or select JSON-B if you
    want to comply with the MicroProfile platform. Click Next.

    5. On the Observability screen, check Metrics and choose MicroProfile as Metrics
    Provider. You may also select other offered options, like Health Checks and Tracing.

    6. Click Download to generate your project, or go through the rest of the steps
    to continue configuration.


    ### Using CLI


    You need Helidon CLI installed, as explained in Chapter [2](#600147_1_En_2_Chapter.xhtml).


    Start new project generation using the `helidon init` command. CLI and Project
    Starter are using the same configuration wizard. Answer questions as explained
    earlier. Finish the configuration wizard, and you get a project with metrics support
    generated.


    ### Adding Dependencies Manually


    The easiest way is using the `helidon-microprofile` bundle, which contains `helidon-microprofile-metrics`
    as a transitive dependency.


    ```

    io.helidon.microprofile.bundles

    helidon-microprofile

    ```


    If you don’t want to depend on the bigger `helidon-microprofile`, you can add
    Metrics support manually by adding the following dependencies to your `pom.xml`
    file.


    - ① MicroProfile Core dependency

    - ② MicroProfile Metrics


    ```

    io.helidon.microprofile.bundles

    helidon-microprofile-core   ①


    io.helidon.microprofile.metrics

    helidon-microprofile-metrics②

    ```


    ## Sample Application


    Let’s create a sample application demonstrating the usage of MicroProfile metrics
    annotations and programmatic APIs. It uses the generated Project Starter Quickstart
    application as the base and added JAX-RS resources for all metric types supported
    by the specification. Snippets from these resources are used later when discussing
    MicroProfile APIs.


    The sample application is called `ch04-metrics` and is available in the book GitHub
    repository at [`https://github.com/apress/beginning-helidon`](https://github.com/apress/beginning-helidon).


    The `README.md` file in the project’s root directory contains instructions for
    building and running the project. These commands are provided in the book for
    the sake of space. Also, we don’t want to drag your attention to the sample-related
    bash commands; we want you to concentrate on the metrics topic.'
  raw: '## Metrics


    If the health metric provides information about the current state of the service,
    Metrics gives some aggregated statistics about how your service is performing
    over time. It can be the number of requests an endpoint gets, the average request
    processing time, and so on. Service administrators can use this information to
    improve service performance, tune upscaling strategies, optimize business logic,
    and collect some data for reporting. Health and metrics are designed to work with
    monitoring systems. The monitoring stack consists of a database collecting and
    storing data and a UI system displaying the data as graphics and diagrams.


    Prometheus and Grafana are popular systems for collecting and displaying metrics
    data.


    Note


    Prometheus is an open-source system to collect and store metrics data from different
    applications. It’s not used to view the data. You can think about it as a single-purpose
    database for storing metrics data. Prometheus provides client libraries for many
    programming languages, including Java.


