    This small application includes everything you need to build a fully functional
    RESTful web service, test it, package it as a Docker image, and deploy it to Kubernetes.
    This chapter explains how to do it, starting with analyzing the `GreetingResource`
    class representing a RESTful web service.


    ### Maven Project


    The Maven `pom.xml` is created automatically as part of Quickstart application
    generation. It’s clean and straightforward. It can be opened with all IDEs supporting
    Maven projects. As heavy IntelliJ Idea users (this book is written in IntelliJ!),
    we can confirm that it opens without problems.


    There is only one dependency required to build a MicroProfile application.


    ```

    io.helidon.microprofile.bundles

    helidon-microprofile


    ```


    It’s a bundle containing all dependencies required by the MicroProfile platform.
    It makes sense to use it during your application development phase.


    If you don’t use all MicroProfile features, you can minimize the dependencies,
    decreasing your application footprint. In this case, you can use the helidon-microprofile-core
    bundle, which contains only a minimal set of dependencies, and add all other dependencies
    manually.


    ```

    io.helidon.microprofile.bundles

    helidon-microprofile-core


    ```


    ### CDI


    Jakarta Contexts and Dependency Injection (CDI) is a key part of all MicroProfile
    applications. It wires all components altogether and enables injection in users''
    applications. Helidon MP is a big CDI container that starts automatically when
    your application starts.


    Jakarta Contexts and Dependency Injection (CDI)


    CDI is a dependency injection (DI) specification. It’s a part of Jakarta EE and
    used to be a part of Java EE earlier. CDI is heavily annotation based. It allows
    users to define beans, manage their life cycle using contexts, and inject them
    to other managed beans using constructor injection, field injection, or setter
    injection. In addition to that, CDI offers other valuable features such as interceptors,
    decorators, and event notifications. It’s highly customizable and integration-friendly.
    CDI provides functionality similar to what Spring Dependency Injection (Spring
    DI) does. There are several CDI implementations on the market. Helidon MP is using
    Weld ([`https://weld.cdi-spec.org`](https://weld.cdi-spec.org)).


    The best way to learn about CDI is to read the specification itself. You can find
    it here: [`https://jakarta.ee/specifications/cdi/3.0/jakarta-cdi-spec-3.0.html`](https://jakarta.ee/specifications/cdi/3.0/jakarta-cdi-spec-3.0.html).


    The injection works only with CDI-managed beans. If CDI does not manage your class,
    you won’t be able to inject it.


    The easiest way to make your class a CDI-managed bean is to assign it a scope
    by annotating it with `@RequestScoped`, `@ApplicationScoped`, or `@Dependent`.


    A `@RequestScoped` bean’s life cycle is tied to an HTTP request life cycle. It’s
    a singleton per request. A new object is created for each HTTP request and shared
    with other objects within this request life cycle.


    `@ApplicationScoped` beans are singletons. They are created once and shared with
    other objects in your application.


    A `@Dependent` bean’s life cycle is tied to the bean it is injected into. These
    beans are not singletons. A new instance is created for every injection point
    and never shared.


    Listing [2-2](#600147_1_En_2_Chapter.xhtml#PC17) shows how the injection is used
    in our Quickstart application.


    *   ① It makes this class a singleton. It’s created only once, and this instance
    gets injected into other objects.


    *   ② It’s an example of *constructor injection*. A configuration property gets
    injected into the constructor. The configuration is discussed in Chapter [3](#600147_1_En_3_Chapter.xhtml).


    ```

    @ApplicationScoped                  ①

    public class GreetingProvider {

    ...

    @Inject                         ②

    public GreetingProvider(

    @ConfigProperty(name = "app.greeting") String message) {

    ...

    }

    ...

    }

    Listing 2-2

    CDI Usage in GreetingProvider.java

    ```


    *   ① This class is instantiated on every HTTP request (different requests ==
    different instances).


    *   ② It is another example of *constructor injection*. An instance of `GreetingProvider`
    is injected as a constructor parameter. Remember that `GreetingProvider` is an
    application scoped, so the same instance is injected when a new instance of `GreetResource`
    is created.


    ```

    @RequestScoped                    ①

    public class GreetResource {

    ...

    @Inject                        ②

    public GreetResource(GreetingProvider greetingConfig) {

    ...

    }

    ...

    }

    Listing 2-3

    CDI usage in GreetingResource.java

    ```


    Tip


    If you need to run some code when your application starts, you can create an observer
    in one of your managed beans that observes the initialization of the application
    scope. Initialization of the application scope is exactly when your application
    starts.


    ```

    void onAppStart(@Observes @Initialized(ApplicationScoped.class) Object ignoredEvent)
    {

    ...

    }

    ```'
