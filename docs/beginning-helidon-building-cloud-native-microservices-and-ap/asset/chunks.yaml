    filter Operator Letting Through Only Selected Items

    ```


    ### limit


    The `limit` operator limits the number of items sent downstream; its only parameter
    is a long number of items that can pass the `limit` operator. Limit operator counts
    `onNext` signals passing through. When limit number is reached, limit completes
    the stream by canceling upstream and sending the `onComplete` signal downstream.


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig12_HTML.png)


    A diagram has 4 color gradient circles numbered 1 to 4 and 3 circles numbered
    1 to 3 with a short vertical line each on the arrows at the top and bottom. It
    has a block of the function dot limit at the center.


    Figure 13-12


    The limit operator


    The `limit` parameter can be only a positive number or 0\. When a negative number
    is supplied, `IllegalArgumentException` is raised.'
