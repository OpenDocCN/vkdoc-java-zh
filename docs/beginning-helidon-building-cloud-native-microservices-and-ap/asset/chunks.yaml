  raw: '### Config Source Level


    At the Config source level, whole config files are included if the file name matches
    the selected profile. If the config file `microprofile-config-<PROFILE NAME>.properties`
    exists on the classpath in the `META-INF` folder and the proper profile is active,
    the properties are merged. When the same properties are present in both files,
    values from the file with an active profile in its name take precedence.


    ```

    META-INF/

    microprofile-config.properties

    microprofile-config-TEST.properties

    Listing 3-15

    Property file specific for a given profile

    ```


    But let’s get back to our example of the Orc hunting adventure. You may decide
    to deploy our already built game artifact with a different config source setup.
    For that, you need something more powerful: meta configuration.


    ## Meta Configuration


    Configuration files packed inside your JAR file are practically immutable. All
    your settings in those config sources are written in stone. You can override its
    values with system properties or environment variables, but you must rely on the
    priorities already defined somewhere deep in your JAR package. Helidon has an
    extra feature for redefining configuration outside the artifact, called the meta
    configuration. It’s one place to configure the config sources in the way you want,
    which overrides any existing implicit or explicit setting except the one created
    with the programmatic API.


    Note


    This is a Helidon-specific feature.


    After the `mp-meta-config.yaml` or the `mp-meta-config.properties` file is found
    on the classpath, in the current directory, or discovered in an externally specified
    location, configuration sources are organized according to it. You can specify
    the location of the meta config file either with the `io.helidon.config.mp.meta-config`
    property or the `HELIDON_MP_META_CONFIG` environment variable.


    Meta configuration supports YAML and the properties file formats. Let’s take a
    look at the YAML example `mp-meta-config.yaml`.


    *   ① Include or exclude implicit sources or converters.


    *   ② Explicitly define the sources.


    *   ③ Define the config source priority.


    ```

    add-discovered-sources: true   ①

    add-discovered-converters: true

    add-default-sources: true

    sources:

    - type: "environment-variables"

    - type: "system-properties"

    - type: "properties"         ②

    classpath: "weapons.properties"

    ordinal: 50                ③

    optional: true

    - type: "yaml"

    path: "/config/orc-army.yaml"

    Listing 3-16

    Meta Configuration

    ```


    You can change the priority ordinals and choose to use the default sources or
    the custom sources. Even excluding custom converters or adding some optional config
    sources is possible.


    ## YAML Config Source


    On top of the built-in config sources mandated by the MP specification, Helidon
    provides other convenient config sources. For example, loved by many and cursed
    by many others: the YAML configuration.


    Note


    This is a Helidon-specific feature.


    Unlike with the MP default property file, Helidon looks for files named `application.yaml`
    in the root of the classpath. The default priority `200` overrides the properties
    in the MP default property file but gets overridden by the system properties and
    the environment variables.


    ```

    sorcerer:

    invisibilityCloak: false

    orcSlayingPotions: 2

    weapons:

    - "axe"

    - "sword"

    Listing 3-17

    YAML Configuration File

    ```


    The *sequences* feature is the most notable in the YAML format when you compare
    it with properties. You can express sequences in YAML either in the flow style
    or the block style.


    *   ① Flow style sequence


    *   ② Block style sequence


    ```

    amulets: ["Hearth of Zeard", "Spider''s eye"]   ①

    weapons:    ②

    - "axe"

    - "sword"

    Listing 3-18

    Sequence Styles in YAML Files

    ```


    The Helidon YAML config source maps sequences as a config array. Even though all
    config sources can also declare arrays with comma-separated values, you can still
    declare an array with a simple text value: `weapons: "axe,sword".`


    The YAML `null` value is converted as a missing property. The `NoSuchElementException`
    is thrown when such a property is injected directly. This feature aligns nicely
    with the default properties config source, which can define a `null` value only
    with a missing property or an empty value.


    *   ① There is no `null` in the properties file. An empty value or a missing property
    behaves like a null value.


    ```

    sorcerer.invisibilityCloak=    ①

    #sorcerer.invisibilityCloak=2

    Listing 3-19

    Empty Property in YAML File

    ```


    *   ① YAML has a special `null` value


    ```

    sorcerer:

    invisibilityCloak: null   ①

    orcSlayingPotions:

    #ghoulSlayingPotions: 2

    Listing 3-20

    Null Property in YAML File

    ```


    But remember, you can always specify the default value or inject optional `@ConfigProperty(name
    = "sorcerer.invisibilityCloak") Optional<Boolean> cloak`, and then decide what
    to do with the null during runtime.


    To use the YAML config source, you need the following dependency, which is already
    part of the Helidon MicroProfile bundle.


    ```

    io.helidon.config

    helidon-config-yaml-mp


    Listing 3-21

    Maven Dependency for the YAML Configuration Support

    ```


    ## Custom Config Source


    There is always a use case when YAML or properties are just not enough. Whether
    you need to get your configuration from some exotic database, a super secure binary
    file, or a very complicated XML document, you can always create your own config
    source. This new config source only needs to provide the property values based
    on the key, a list of available keys, an ordinal number for priority resolution,
    and the config source name. All the logic can fit in one class implementing a
    single interface `org.eclipse.microprofile.config.spi.ConfigSource`.


    Let’s try it with a simple config source providing entries of the hard-coded map
    as configuration properties. To make it more interesting, set one of the properties
    as a JSON value, so let’s try our config source with the custom JsonConverter
    created earlier in this chapter.


    *   ① Priority of the new custom config source.


    *   ② Source name used by the ordering logic.


    ```

    public class CustomConfigSource implements ConfigSource {

    private static final Map props = Map.of(

    "sorcerer.orcSlayingPotions", "55",

    "app.jsonOrc",

    """

    {"orcName":"Bonecrash", "level":"28"}

    """

    );

    @Override

    public int getOrdinal() {return 105;}   ①

    @Override

    public Set getPropertyNames() {

    return props.keySet();

    }

    @Override

    public String getValue(String key) {

    return props.get(key);

    }

    @Override

    public String getName() {

    return "custom-sorcerer-map";   ②

    }

    }

    Listing 3-22

    Custom Config Source

    ```


    The process of registration is very similar to that used for custom converters.
    You need to register our implementation as a service provider.


    Note


    If you are working on a classpath-based project, create the provider-configuration
    file with `my.package.CustomConfigSource` as its content.


    `META-INF/services/org.eclipse.microprofile.config.spi.ConfigSource`


    The config runtime finds your converter over the service loader facility.


    Don’t forget to use `module-info.java` when registering a service provider in
    a JPMS module-based project. Just add the `provides` clause to `module-info.java`.


    `provides org.eclipse.microprofile.config.spi.ConfigSource with my.package.CustomConfigSource;`'
