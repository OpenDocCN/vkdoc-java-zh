    \ ActiveMQ, and JBoss Messaging, implement the `JMS` API. Over this versatility\
    \ of `JMS`, the connector for reactive messaging opens the door to many messaging\
    \ brokers at once.\n\n```text\nio.helidon.messaging.jms\nhelidon-messaging-jms\n\
    ```\n\nListing 13-59  \nJMS Connector Dependency\n\n### Injected ConnectionFactory\n\
    \nWhile `JMS` specification heavily relies on the `JNDI`, Helidon connector supports\
    \ `JNDI`-less approach for supplying `ConnectionFactory` directly as a `CDI` bean.\
    \ Helidon MP is a `CDI 3.0` compliant injection framework. Creating a bean from\
    \ an instantiated connection factory is simple with a `CDI` producer method or\
    \ field.\n\n- ① Injecting custom configured broker URL\n- ② Marking method as\
    \ a bean producer\n- ③ `ConnectionFactory` bean must be named to allow referencing\
    \ from messaging configuration\n\n```java\n@Inject\n@ConfigProperty(name = \"\
    jms.broker-url\")\nprivate String brokerUrl;  // ①\n\n@Produces  // ②\n@ApplicationScoped\
    \  // ③\n@Named(\"activemq-cf\")  // ④\npublic ConnectionFactory connectionFactory()\
    \ {\n    return new ActiveMQConnectionFactory(brokerUrl);\n}\n```\n\nListing 13-60\
    \  \nSupplying JMS ConnectionFactory As a Bean\n\nWhen you have created a `ConnectionFactory`\
    \ bean named `activemq-cf`, you can simply reference it from messaging configuration.\n\
    \n- ① `ConnectionFactory` initialization needs to configured manually\n- ② Use\
