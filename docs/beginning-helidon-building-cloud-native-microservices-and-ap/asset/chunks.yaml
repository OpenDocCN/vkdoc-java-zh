- fmt: '## 模板与选项说明


    `Custom` offers more choices and allows fine-grained customization of your project.
    It asks about the media support you want and whether you want to enable metrics,
    health checks, and tracing. Also, it asks about database support and allows you
    to choose between Hibernate and EclipseLink.


    Let’s use the Quickstart template. Type `2` in the command prompt.


    The next question concerns a JSON library you want to use in your project. There
    are two options:


    - [Jackson](https://github.com/FasterXML/jackson) is a popular library for binding
    Java classes to JSON objects. It’s the default choice.

    - [JSON-B](https://jakarta.ee/specifications/jsonb/2.0/) is Jakarta JSON Binding
    specification implementation. To be more specific, [Yasson](https://github.com/eclipse-ee4j/yasson)
    is used. Choose this option if you want to be fully standards-compliant.


    Let’s use JSON-B for this sample application.


    ```

    Select a JSON library

    (1) jackson | Jackson

    (2) jsonb   | JSON-B

    Enter selection (default: 1): 2

    ```


    And the last series of questions is about the Maven coordinates and Java package
    names to use. Feel free to use defaults for this sample. You should change it
    to a real application.


    ```

    Project groupId (default: me.dmitry-helidon):

    Project artifactId (default: quickstart-mp):

    Project version (default: 1.0-SNAPSHOT):

    Java package name (default: me.dmitry.mp.quickstart):

    Switch directory to /Users/dmitry/quickstart-mp to use CLI

    Start development loop? (default: n):

    ```


    ## Tip


    Development Loop is a CLI mode that keeps your application running and observes
    its source code for changes. When changes are detected, your application is automatically
    recompiled and restarted.


    Use the CLI `helidon dev` command to start the development loop.


    You can use batch mode if you want one command to generate your project. In batch
    mode, you answer all questions in the `init` command parameters.


    You can use the following command to generate the same project:


    ```

    helidon init --batch --flavor MP --archetype quickstart

    ```


    A complete list of parameters can be found on the help page for the `helidon init`
    command.


    ```

    helidon init --help

    ```


    ## Project Starter


    Project Starter is a web application allowing the generation of Helidon projects
    (see Figure [2-1](#600147_1_En_2_Chapter.xhtml#Fig1)). It has the same features
    as the CLI described in the previous section.


    To open the Project Starter, open [`https://helidon.io/starter`](https://helidon.io/starter)
    in your browser or press the Starter button at the top of the Helidon home page
    at [`https://helidon.io`](https://helidon.io).


    ![](images/600147_1_En_2_Chapter/600147_1_En_2_Fig1_HTML.jpg)


    A screenshot titled PROJECT STARTER contains 4 options under generate your project.
    Helidon flavor with Helidon S E radio button enabled and a next button below,
    application type, media support, and customize project.


    Figure 2-1


    Project Starter


    Project Starter guides you through multiple steps where you should select an option/feature
    you want to include in your project. The number of steps can vary depending on
    your previous choices. Still, you can click Download at any stage to fill all
    unvisited pages with defaults and download a zip file containing the generated
    project.


    ## Helidon Maven Archetypes


    Another method of generating a Helidon project is using Maven archetypes. Helidon
    provides Maven archetypes for all options offered by CLI.


    The following shows how to generate the same Quickstart application using CLI.


    ```

    mvn -U archetype:generate -DinteractiveMode=false \

    -DarchetypeGroupId=io.helidon.archetypes \

    -DarchetypeArtifactId=helidon-quickstart-mp \

    -DarchetypeVersion=3.0.0 \

    -DgroupId=me.dmitry-helidon \

    -DartifactId=quickstart-mp \

    -Dpackage=me.dmitry.mp.quickstart

    ```


    A complete list of Maven archetypes and corresponding CLI options are in Table
    [2-1](#600147_1_En_2_Chapter.xhtml#Tab1).


    Table 2-1


    Helidon Maven Archetypes and Corresponding CLI Options


    | Maven Archetype | CLI Option | Description |

    | --- | --- | --- |

    | `helidon-bare-mp` | `--flavor MP --archetype bare` | Helidon MP application
    with minimum dependencies |

    | `helidon-quickstart-mp` | `--flavor MP --archetype quickstart` | Sample Helidon
    MP project that includes multiple REST operations (greeting service) (It is analyzed
    later in this chapter.) |

    | `helidon-database-mp` | `--flavor MP --archetype database` | Helidon MP application
    that uses JPA with in-memory H2 database |

    | `helidon-bare-se` | `--flavor SE --archetype bare` | Minimal Helidon SE project
    suitable to start from scratch |

    | `helidon-quickstart-se` | `--flavor SE --archetype quickstart` | Sample Helidon
    SE project that includes multiple REST operations (greeting service) |

    | `helidon-database-se` | `--flavor SE --archetype database` | Helidon SE application
    that uses Helidon DBClient with in-memory H2 database |


    ## Analyzing Generated Project'
