  raw: '## Analyzing the Generated Project


    The generated Helidon SE Quickstart application is very similar to the Helidon
    MP Quickstart application described in Chapter [2](#600147_1_En_2_Chapter.xhtml).
    It contains a Maven project, Dockerfiles to build a jar, a jlink image, a GraalVM
    native image, and Kubernetes app.yaml. It implements the same greeting service,
    but the source code and concepts significantly differ from Helidon MP. This chapter
    discusses the differences while explaining how the Helidon SE application works.


    Now, let’s see what’s been generated.


    *   ① Kubernetes deployment descriptor


    *   ② Dockerfile to build a docker image with your application running on standard
    Java runtime


    *   ③ Dockerfile to build a Docker image with your application running on custom
    Java runtime (jlink image)


    *   ④ Dockerfile to build a Docker image with your application’s native image


    *   ⑤ Maven project


    *   ⑥ Greet RESTful service


    *   ⑦ Main class with `main` method and web server initialization code


    *   ⑧ Application configuration


    *   ⑨ Example JUnit test


    *   ⑩ Configuration for testing


    ```

    $ tree quickstart-se/

    quickstart-se

    app.yaml                                         ①

    Dockerfile                                       ②

    Dockerfile.jlink                                 ③

    Dockerfile.native                                ④

    pom.xml                                          ⑤

    README.md

    src

    main

    java

    com

    example

    myproject

    GreetService.java         ⑥

    Main.java                 ⑦

    package-info.java

    SimpleGreetService.java

    resources

    application.yaml                      ⑧

    logging.properties

    test

    java

    com

    example

    myproject

    MainTest.java                 ⑨

    resources

    application.yaml                     ⑩

    Listing 15-1

    Helidon SE Generated Quickstart Application Source Code Tree

    ```


    ### Main Method


    Helidon SE application is a standard Java application. It must have a `public
    static void main(String[] args)`, an application entry point. Note that there
    is no requirement to write the `main` method in Helidon MP. The framework provides
    it.


    In the Quickstart application, the `main` method is implemented in `Main.java`.


    ```

    public static void main(String[] args) {

    startServer();

    }

    ```


    The `main` method creates and starts the web server. It differs from Helidon MP,
    where the same web server automatically starts under the hood. It’s convenient
    but gives users less control over how the web server starts and gets configured.


    To properly run your application, specify your class containing the `main` method
    in Maven `pom.xml`.


    ```

    com.example.myproject.Main


    ```


    ### Creating and Starting a Web Server


    Before creating a server, you need to create and initialize the resources it uses.
    It includes creating a configuration, initializing logging, creating routing,
    instantiating internal services you plan to use, such as health checks or metrics,
    and creating and initializing user services, such as `GreetService`. And here
    comes another difference from Helidon MP, where all of these are done automatically
    by the framework.


    Now let’s see how the web server is created and started in the Quickstart application
    (see Listing [15-2](#600147_1_En_15_Chapter.xhtml#PC6)).


    *   ① Initializing logging


    *   ② Loading configuration (By default, it loads `application.yaml` from the
    classpath.)


    *   ③ Creating a web server using `WebServer.builder`


    *   ④ Creating routing and passing it to the web server


    *   ⑤ Passing `server` configuration section to the web server


    *   ⑥ Adding Json Processing (JSON-P) support


    *   ⑦ Starting the server


    ```

    static Single startServer() {

    LogConfig.configureRuntime();                    ①

    Config config = Config.create();                 ②

    WebServer server = WebServer.builder(            ③

    createRouting(config))                     ④

    .config(config.get("server"))                  ⑤

    .addMediaSupport(JsonpSupport.create())        ⑥

    .build();

    Single webserver = server.start();    ⑦

    ...

    return webserver;

    }

    Listing 15-2

    Initializing and Starting the Web Server

    ```


    ### Configuration


    Helidon SE configuration is a core Helidon SE component. The following briefly
    describes its features and the differences between it and Helidon MP configuration.


    *   No annotations are used, only programmatic APIs (By comparison, Helidon MP
    uses MicroProfile Config, which contains annotations and programmatic APIs)


    *   Uses a tree structure (By comparison, Helidon MP uses a flat structure)


    *   Immutable by design but supports change listeners


    *   Supports configuration sources such as environment variables, system properties,
    directory, property files, YAML, JSON, and HOCON (extensible with custom configuration
    sources)


    *   Filters, references, and substitutions


    *   Configuration profiles (e.g., dev/test/prod)


    *   Conversion to simple and complex types, custom converters


    Quickstart application configuration sits in the `application.yaml` file and contains
    server host, port, and default greeting properties.


    ```

    server:

    port: 8080

    host: 0.0.0.0

    app:

    greeting: "Hello"

    ```


    ### Routing


    The next step of the application initialization is creating routing. It’s done
    in the `createRouting` method. It uses a builder to register pairs of the path
    and the corresponding service instance, which handles requests coming to this
    path. Note that in Helidon MP, routes are managed by JAX-RS `@Path` annotation.


    *   Helidon SE routing is configured programmatically in the `Routing` class instance.


    *   For convenience, the `Routing` class provides a builder (`Routing.builder()`),
    which supports several ways of creating mappings.


    *   Mappings can be defined using HTTP methods, routing, path matching, and request
    predicates.


    *   Users can organize code into services to logically separate routes related
    to specific parts of your application functionality.


    *   Routing is immutable. It’s not possible to change routes after the web server
    has started.


    There are two user services in the Quickstart application: `SimpleGreetService`
    and `GreetService`. Requests coming to `/simple-greet` are handled by `SimpleGreetService`,
    and requests coming to `/greet` are handled by `GreedService`.


    ```

    private static Routing createRouting(Config config) {

    ...

    Routing.Builder builder = Routing.builder()

    .register("/simple-greet", new SimpleGreetService(config))

    .register("/greet",  new GreetService(config));

    return builder.build();

    }

    ```


    ### RESTful Services


    User services implement the `Service` interface to manage route mappings and encapsulate
    handlers in one class. It’s done by implementing `update(Routing.Rules)`.


    *   ① `SimpleGreetService` must implement the `Service` interface


    *   ② `update(`⋯`)` method updates global routing rules


    *   ③ Register the `getDefaultMessageHandler()` method to be called when a GET
    request comes to the `/` path


    *   ④ `getDefaultMessageHandler()` returns the default greeting message


    ```

    public class SimpleGreetService implements Service {     ①

    ...

    @Override

    public void update(Routing.Rules rules) {            ②

    rules.get("/", this::getDefaultMessageHandler);  ③

    ...

    }

    private void getDefaultMessageHandler(ServerRequest request,                                             ④

    ServerResponse response) {

    String msg = String.format("%s %s!", greeting, "World");

    JsonObject returnObject = JSON.createObjectBuilder()

    .add("message", msg)

    .build();

    response.send(returnObject);

    }

    }

    ```'
