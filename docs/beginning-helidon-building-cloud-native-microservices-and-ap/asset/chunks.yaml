    \  \nUse ConnectionFactory Bean in JMS Connector\n\n### Lookup ConnectionFactory\
    \ over JNDI\n\nSupplying `ConnectionFactory` over `JNDI` lookup is possible, initial\
    \ `JNDI` environment properties can be configured with `jndi.env-properties`.\
    \ The `JNDI` name of the actual connection factory needs to be configured with\
