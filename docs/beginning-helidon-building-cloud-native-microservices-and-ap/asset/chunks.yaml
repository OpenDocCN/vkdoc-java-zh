  trans: '

    ### 处理请求头


    HTTP 头用于在发送 HTTP 请求或响应时，在客户端与服务器之间传输补充信息。一个头由一个不区分大小写的名称、一个冒号 (:) 以及对应的值组成。头对于实现各种安全、认证、追踪及其他机制至关重要。


    要为服务调用指定请求头，可以在方法参数上使用 `@HeaderParam` 注解。


    *   ① 注入 *Custom-Header* 请求头。


    *   ② 注入一个聚合 Bean，其中字段使用 *…​Param* 注解标注。


    *   ③ 从 Cookie 中注入 `AuthToken`。


    *   ④ 这是一个类，包含 `@HeaderParam` 和 `@PathParam` 标注的字段，并在 <2> 中使用。


    ```

    @Path("/wizard")

    public interface WizardRestClient {

    //.. other methods omitted

    @POST

    Response createWizard(@HeaderParam("Custom-Header")

    String customHeader,    ①

    Wizard wizard);

    @PUT

    @Path("/{name}")

    Response updateWizard(@BeanParam PutWizard putWizard,

    Wizard wizard);②

    @DELETE

    @Path("/{name}")

    Response deleteWizard(@CookieParam("AuthToken")

    String token, ③

    @PathParam("name") String name);

    }

    public class PutWizard {                                 ④

    @HeaderParam("Custom-Header")

    private String custom;

    @PathParam("name")

    private String name;

    // ...

    }

    Listing 5-14

    Header Parameters

    ```


    但是，如果你需要在不修改客户端接口方法签名的情况下指定 HTTP 头，应使用 `@ClientHeaderParam` 注解。它有三个参数。


    *   **name** 是请求头名称。


    *   **value** 是请求头的值，必须是 `String` 或 `string[]`，或者是一个用于计算该值的方法引用。


    *   **required** 是一个布尔值，用于决定当计算方法抛出异常时，请求是否应失败。


    *   ① 为客户端方法设置一个自定义请求头。


    ```

    @Path("/wizard")

    public interface WizardRestClient {

    //.. other methods omitted

    @POST

    @ClientHeaderParam(name="Magic-Header",

    value="Custom header magic value", required=false)     ①

    Response postWizardCustomHeader(Wizard wizard) {...}

    }

    Listing 5-15

    Client Header Parameters

    ```


    要批量添加或分发请求头，可以使用 `ClientHeadersFactory`。该工厂仅包含一个方法，接收两个只读的 `MultivaluedMap` 参数。如果客户端运行在
    JAX-RS 环境中，第一个 map 表示来自传入 JAX-RS 请求的请求头，第二个 map 包含通过 `@ClientHeaderParam`、`@HeaderParam`、`@BeanParam`
    等方式指定并将被发送的请求头。返回结果是一个 `MultivaluedMap`，表示在出站处理流程中要传输的“最终”请求头集合。


    注意


    最终的请求头 map 在 HTTP 请求发送之前仍可能被提供者（如过滤器、拦截器和消息体写入器）修改。


    要添加自定义请求头，你应实现 `ClientHeadersFactory` 并重写 `update` 方法。在这里你可以拿到所有传入和传出的请求头。最终，你应返回一个包含所需请求头的
    map。


    *   ① 实现 `ClientHeadersFactory`。


    *   ② 重写 `update` 方法，返回包含目标请求头的 `MultivaluedHashMap`。


    ```

    public class WizardHeaderHandler implements ClientHeadersFactory {                                     ①

    @Override

    public MultivaluedMap

    update(MultivaluedMap incomingHeaders,

    MultivaluedMap clientOutgoingHeaders) {

    return new MultivaluedHashMap() {{

    put("Magic-Header",

    List.of("Custom header magic value"));   ②

    }};

    }

    }

    Listing 5-16

    Client Headers Factory

    ```


    与 `Provider` 遵循相同范式，`WizardHeaderHandler` 必须在 REST 客户端接口中注册。这可以通过 `@RegisterClientHeaders`
    注解实现。


    *   ① 注册 `WizardHeaderHandler`


    ```

    ...

    @RegisterClientHeaders(WizardHeaderHandler.class)  ①

    interface WizardRestClient {

    ...

    }

    Listing 5-17

    Register Header Handler

    ```


    现在，请求头中就有一个“magic header”了。


    ### 异步操作


    MicroProfile Rest Client 是一个非常强大的工具。如果你必须消费高负载或长时间运行的请求，可以将它们改为异步，这样这些调用就不会阻塞你的服务。实现起来非常简单：方法应返回
    `CompletionStage<>`。在我们的 wizard 客户端中，按清单 5-18 所示替换返回类型。


    *   ① `getMostMightyWizard` 方法的异步版本


    *   ② `getWizardByName` 方法的异步版本


    ```

    interface WizardAsyncRestClient {

    @GET

    CompletionStage getMostMightyWizard();      ①

    @Path("/{name}")

    @GET

    CompletionStage

    getWizardByName(@PathParam("name") String name); ②

    }

    Listing 5-18

    Asynchronous Operations

    ```


    现在，你可以使用标准 Java 语言特性来异步处理客户端请求。


    如果你需要拦截和操作异步调用，请参考 MicroProfile Rest Client [文档](https://download.eclipse.org/microprofile/microprofile-rest-client-3.0/microprofile-rest-client-spec-3.0.html%2523_asyncinvocationinterceptors)。


    ### 编程式 API


    MicroProfile Rest Client 也可以通过编程式 API 创建，即使用 `RestClientBuilder.newBuilder()`
    获取构建器。这是在受管 CDI 环境之外使用 MicroProfile RestClients 的方式。`RestClientBuilder` 提供了用于配置客户端细节并定义目标
    REST 客户端接口的方法。


    *   ① 使用构建器模式创建客户端。


    *   ② 设置 `baseUrl`。


    *   ③ 将 `followRedirects` 设置为 `true`。


    *   ④ 配置代理。


    ```

    WizardRestClient client =

    RestClientBuilder.newBuilder()                      ①

    .baseUri(URI.create("http://localhost:8080/wizard"))    ②

    .followRedirects(true)                         ③

    .proxyAddress("http://someobscureproxy.com:9000")  ④

    .build(WizardRestClient.class);

    Wizard wizard = client.getMostMightyWizard();

    Listing 5-19

    Programmatic Operations

    ```


    你可以以编程方式设置所有属性。对于 SSL 配置，有对应的 `trustStore` 和 `keyStore` 对象。


    注意


    使用构建器创建的 MicroProfile Rest Client 实例不可注入，因为这种用法是为在 CDI 容器之外运行而设计的。因此，如果你以这种方式创建客户端实例，它对
    CDI 容器不可见。


    ### MicroProfile Rest Client 总结


    如前所述，MicroProfile Rest Client 是一个非常强大的工具。本章涵盖了它的主要使用场景。但它还能做得更多，比如服务端事件处理、与 MicroProfile
    Config 和容错机制的集成，以及其他很酷的特性。


    所有细节请参考官方[文档](https://github.com/eclipse/microprofile-rest-client/releases/tag/3.0)。

    '
- fmt: '## JAX-RS Client API


    Another way to call other RESTful services in Helidon is to use the JAX-RS Client
    API. JAX-RS is an old but commonly used name for Jakarta EE specification called
    [Jakarta RESTful Web Services Specification](https://jakarta.ee/specifications/restful-ws/).
    It also has excellent inbuilt client capabilities.


    The JAX-RS Client API is intended to facilitate a fluent programming model, and
    in Helidon, it is implemented using Jersey. This programming model differs from
    the one employed in the MicroProfile Rest Client. The JAX-RS Client API heavily
    employs the builder pattern to simplify configuration and execution. Additionally,
    unlike the MicroProfile Rest Client, the JAX-RS client lacks an annotations API.


    If you use the full `helidon-microprofile` bundle, all the dependencies are available
    out of the box. If you chose to use the `helidon-microprofile-core`, to ensure
    correct JSON to Object mapping, you should include JSON-B support in our project
    `pom.xml` file, as shown in Listing [5-20](#600147_1_En_5_Chapter.xhtml#PC20).


    - ① MicroProfile Core dependency

    - ② JSON-B support in Jersey

    - ③ Jersey binding support dependency


    ```

    io.helidon.microprofile.bundles

    helidon-microprofile-core ①


    jakarta.json.bind

    jakarta.json.bind-api     ②


    org.glassfish.jersey.media

    jersey-media-json-binding ③


    Listing 5-20

    MicroProfile Dependencies

    ```


    ### Note


    The JAX-RS Client API is a very powerful and versatile tool. It can be used with
    many services delivering XML, plain text, and binary streams. This book focuses
    only on RESTful services delivering JSON data, which is automatically marshaled/unmarshaled
    to Java objects.


    To create and use the JAX-RS Client API, the following steps should be done: call
    `ClientBuilder.newClient()` static method to create a new `Client`. Then use `target()`
    method on the obtained client instance. A `WebTarget` is returned. Next, get `Invocation.Builder`
    using `target.request()` method on `WebTarget` instance obtained in the second
    step. Finally, execute `invocationBuilder.get()`, `put()`, `post()` or `delete()`
    methods to invoke corresponding REST calls.


    Let’s create and use the client by following the earlier four steps. First, create
    a `WebTarget` pointing to `http://localhost:8080`. Let’s use `ClientBuilder.newClient()`
    for that as described. Next, use the created `client` to set the path to the `/wizard`
    endpoint, set `MediaType` to `APPLICATION_JSON` since we are working with JSON
    data, and call the `get` method with the `Wizard.class` parameter. This way, the
    JAX-RS Client API performs a `GET` call to the specified base URI and endpoint
    and automatically maps the result to the `Wizard` class.


    - ① Creates a `WebTarget` by using a `ClientBuilder` for creating a `Client` and
    setting a target. This is a resource-heavy operation. (This is why we do it once
    and cache it in a class field.)

    - ② Sets the path to `/wizard`.

    - ③ Builds an invocation with `MediaType.APPLICATION_JSON`.

    - ④ Maps the JSON result to the `Wizard` class.


    ```

    @ApplicationScoped

    @Path("/wizardClient")

    public class SorceryMinistryResource {

    private final WebTarget target =

    ClientBuilder.newClient()

    .target("http://localhost:8080"); ①

    @GET

    @Path("/jaxrs")

    @Produces(MediaType.APPLICATION_JSON)

    public Wizard getWizardFromJaxrsClient() {

    return target

    .path("/wizard")                       ②

    .request(MediaType.APPLICATION_JSON)   ③

    .get(Wizard.class);                    ④

    }

    }

    Listing 5-21

    Resource with Endpoints

    ```


    As simple as that. Just create a client using a static builder. After this, you
    can call the service using `get()`, `put()`, `post()`, or `delete()` methods on
    `Invocation.Builder`. This code achieves the same result as using the MicroProfile
    Rest Client. Bear in mind that the requests above are blocking. This means during
    the client call, the thread is blocked, and nothing useful can be done. Asynchronous
    and reactive execution is discussed later in this chapter.


    Also, remember that `WebTarget` instances are immutable in terms of their URI.
    However, `they` are mutable in terms of configuration. Thus, configuring a `WebTarget`
    instance does not create new instances. Creating a `WebTarget` instance is considered
    a heavy operation.


    An `Invocation` is a request that has been prepared and is ready for execution.
    You do not need to know how the invocation was prepared, but only how it should
    be executed—`synchronously` or `asynchronously`.


    `Client`, `ClientBuilder`, and `WebTarget` are configurable, as they all implement
    a `Configurable` interface that supports the configuration of the following.


    - `Properties` are name-value pairs for additional configuration.

    - `Features` are special types of providers that implement the `Feature` interface
    and can be used to configure a JAX-RS implementation. Features are not covered
    in this book.

    - `Providers` are classes or instances of classes that implement one or more interfaces
    of `entity providers`, `context providers`, and `exception mapping providers`.
    A provider can be a message filter, a context resolver, an exception mapper, and
    so forth. The usage of a `provider` is demonstrated later in this chapter.


    Let’s make a more complex demonstration by posting a new wizard instance to the
    endpoint. To demonstrate this, let’s use the wizard service that was created in
    MicroProfile Rest Client. It has a `/wizard/add` `POST` endpoint, accepting JSON
    data.


    To send our new wizard to the `POST` endpoint, let’s use the `post()` request
    execution method. This method expects to receive `Entity` class instances to work
    properly. The `Entity` object holds metadata for sending the wizard entity over
    the network. The payload can be of any kind: XML data, text data, or a custom
    binary stream. In this case, create an `Entity` instance, which marks the wizard
    instance to be processed as a JSON document. It can be done using the `Entity.json(wizard)`
    method.


    - ① Creates a sample wizard.

    - ② Marshals the new wizard to JSON using `Entity.json()` method and send data
    in a `post` request.

    - ③ Synchronously queries the service for a new wizard and returns it.


    ```

    // other methods omitted

    @GET

    @Path("/jaxrs/add")

    @Produces(MediaType.APPLICATION_JSON)

    public Wizard addWizardAndCheck() {

    Wizard wizard = new Wizard();

    wizard.setName("NewWizard");                         ①

    client.path("/wizard/add")

    .request(MediaType.APPLICATION_JSON)

    .post(Entity.json(wizard);

    return client                                        ③

    .path("/wizard/NewWizard")

    .request(MediaType.APPLICATION_JSON)

    .get(Wizard.class);

    }

    Listing 5-22

    JAX-RS Client Usage

    ```


    When you call this method, it returns the new `wizard` object, which is saved
    in the wizard service.


    - ① Create a new `Wizard` object and query it back.


    ```

    curl -X GET http://localhost:8081/wizardClient/jaxrs/add

    {"name":"NewWizard"}                                     ①

    Listing 5-23

    Call the Client

    ```'
  raw: '## JAX-RS Client API


    Another way to call other RESTful services in Helidon is to use the JAX-RS Client
    API. JAX-RS is an old but commonly used name for Jakarta EE specification called
    [Jakarta RESTful Web Services Specification](https://jakarta.ee/specifications/restful-ws/).
    It also has excellent inbuilt client capabilities.


    The JAX-RS Client API is intended to facilitate a fluent programming model, and
    in Helidon, it is implemented using Jersey. This programming model differs from
    the one employed in the MicroProfile Rest Client. The JAX-RS Client API heavily
    employs the builder pattern to simplify configuration and execution. Additionally,
    unlike the MicroProfile Rest Client, the JAX-RS client lacks an annotations API.


    If you use the full `helidon-microprofile` bundle*,* all the dependencies are
    available out of the box. If you chose to use the `helidon-microprofile-core`,
    to ensure correct JSON to Object mapping, you should include JSON-B support in
    our project `pom.xml` file, as shown in Listing [5-20](#600147_1_En_5_Chapter.xhtml#PC20).


    *   ① MicroProfile Core dependency


    *   ② JSON-B support in Jersey


    *   ③ Jersey binding support dependency


    ```

    io.helidon.microprofile.bundles

    helidon-microprofile-core ①


    jakarta.json.bind

    jakarta.json.bind-api     ②


    org.glassfish.jersey.media

    jersey-media-json-binding ③


    Listing 5-20

    MicroProfile Dependencies

    ```


    Note


    The JAX-RS Client API is a very powerful and versatile tool. It can be used with
    many services delivering XML, plain text, and binary streams. This book focuses
    only on RESTful services delivering JSON data, which is automatically marshaled/unmarshaled
    to Java objects.


    To create and use the JAX-RS Client API, the following steps should be done: call
    `ClientBuilder.newClient()` static method to create a new `Client`. Then use `target()`
    method on the obtained client instance. A `WebTarget` is returned. Next, get `Invocation.Builder`
    using `target.request()` method on `WebTarget` instance obtained in the second
    step. Finally, execute `invocationBuilder.get()`, `put()`, `post()` or `delete()`
    methods to invoke corresponding REST calls.


    Let’s create and use the client by following the earlier four steps. First, create
    a `WebTarget` pointing to `http://localhost:8080`. Let’s use `ClientBuilder.newClient()`
    for that as described. Next, use the created `client` to set the path to the `/wizard`
    endpoint, set `MediaType` to `APPLICATION_JSON` since we are working with JSON
    data, and call the `get` method with the `Wizard.class` parameter. This way, the
    JAX-RS Client API performs a `GET` call to the specified base URI and endpoint
    and automatically maps the result to the `Wizard` class.


    *   ① Creates a `WebTarget` by using a `ClientBuilder` for creating a `Client`
    and setting a target. This is a resource-heavy operation. (This is why we do it
    once and cache it in a class field.)


    *   ② Sets the path to `/wizard`.


    *   ③ Builds an invocation with `MediaType.APPLICATION_JSON`.


    *   ④ Maps the JSON result to the `Wizard` class.


    ```

    @ApplicationScoped

    @Path("/wizardClient")

    public class SorceryMinistryResource {

    private final WebTarget target =

    ClientBuilder.newClient()

    .target("http://localhost:8080"); ①

    @GET

    @Path("/jaxrs")

    @Produces(MediaType.APPLICATION_JSON)

    public Wizard getWizardFromJaxrsClient() {

    return target

    .path("/wizard")                       ②

    .request(MediaType.APPLICATION_JSON)   ③

    .get(Wizard.class);                    ④

    }

    }

    Listing 5-21

    Resource with Endpoints

    ```


    As simple as that. Just create a client using a static builder. After this, you
    can call the service using `get()`, `put()`, `post()`, or `delete()` methods on
    `Invocation.Builder`. This code achieves the same result as using the MicroProfile
    Rest Client. Bear in mind that the requests above are blocking. This means during
    the client call, the thread is blocked, and nothing useful can be done. Asynchronous
    and reactive execution is discussed later in this chapter.


    Also, remember that `WebTarget` instances are immutable in terms of their URI.
    However, `they` are mutable in terms of configuration. Thus, configuring a `WebTarget`
    instance does not create new instances. Creating a `WebTarget` instance is considered
    a heavy operation.


    An `Invocation` is a request that has been prepared and is ready for execution.
    You do not need to know how the invocation was prepared, but only how it should
    be executed—*synchronously* or *asynchronously*.


    `Client`, `ClientBuilder`, and `WebTarget` are configurable, as they all implement
    a `Configurable` interface that supports the configuration of the following.


    *   **Properties** are name-value pairs for additional configuration.


    *   **Features** are special types of providers that implement the `Feature` interface
    and can be used to configure a JAX-RS implementation. Features are not covered
    in this book.


    *   **Providers** are classes or instances of classes that implement one or more
    interfaces of *entity providers*, *context providers*, and *exception mapping
    providers*. A provider can be a message filter, a context resolver, an exception
    mapper, and so forth. The usage of a *provider* is demonstrated later in this
    chapter.


    Let’s make a more complex demonstration by posting a new wizard instance to the
    endpoint. To demonstrate this, let’s use the wizard service that was created in
    MicroProfile Rest Client. It has a */*`wizard/add` POST endpoint, accepting JSON
    data.


    To send our new wizard to the POST endpoint, let’s use the `post()` request execution
    method. This method expects to receive `Entity` class instances to work properly.
    The `Entity` object holds metadata for sending the wizard entity over the network.
    The payload can be of any kind: XML data, text data, or a custom binary stream.
    In this case, create an `Entity` instance, which marks the wizard instance to
    be processed as a JSON document. It can be done using the `Entity.json(wizard)`
    method.


    *   ① Creates a sample wizard.


    *   ② Marshals the new wizard to JSON using `Entity.json()` method and send data
    in a *post* request.


    *   ③ Synchronously queries the service for a new wizard and returns it.


    ```

    // other methods omitted

    @GET

    @Path("/jaxrs/add")

    @Produces(MediaType.APPLICATION_JSON)

    public Wizard addWizardAndCheck() {

    Wizard wizard = new Wizard();

    wizard.setName("NewWizard");                         ①

    client.path("/wizard/add")

    .request(MediaType.APPLICATION_JSON)

    .post(Entity.json(wizard);

    return client                                        ③

    .path("/wizard/NewWizard")

    .request(MediaType.APPLICATION_JSON)

    .get(Wizard.class);

    }

    Listing 5-22

    JAX-RS Client Usage

    ```


    When you call this method, it returns the new `wizard` object, which is saved
    in the wizard service.


    *   ① Create a new `Wizard` object and query it back.


    ```

    curl -X GET http://localhost:8081/wizardClient/jaxrs/add

    {"name":"NewWizard"}                                     ①

    Listing 5-23

    Call the Client

    ```'
  trans: '

    ## JAX-RS 客户端 API


    在 Helidon 中调用其他 RESTful 服务的另一种方式是使用 JAX-RS 客户端 API。JAX-RS 是一个较早但仍被广泛使用的名称，对应的
    Jakarta EE 规范是 [Jakarta RESTful Web Services Specification](https://jakarta.ee/specifications/restful-ws/)。它还具备非常出色的内置客户端能力。


    JAX-RS 客户端 API 旨在支持流式编程模型，在 Helidon 中由 Jersey 实现。该编程模型与 MicroProfile Rest Client
    所采用的模型不同。JAX-RS 客户端 API 大量使用构建器模式来简化配置与执行。此外，与 MicroProfile Rest Client 不同，JAX-RS
    客户端缺少注解 API。


    如果你使用完整的 `helidon-microprofile` bundle*,* 所有依赖都可开箱即用。如果你选择使用 `helidon-microprofile-core`，为确保
    JSON 到对象映射正确，你应当在项目的 `pom.xml` 文件中加入 JSON-B 支持，如清单 5-20 所示。


    *   ① MicroProfile Core 依赖


    *   ② Jersey 中的 JSON-B 支持


    *   ③ Jersey 绑定支持依赖


    ```

    io.helidon.microprofile.bundles

    helidon-microprofile-core ①


    jakarta.json.bind

    jakarta.json.bind-api     ②


    org.glassfish.jersey.media

    jersey-media-json-binding ③


    Listing 5-20

    MicroProfile Dependencies

    ```


    注意


    JAX-RS 客户端 API 是一个非常强大且通用的工具。它可用于许多提供 XML、纯文本和二进制流的服务。本书仅聚焦于提供 JSON 数据的 RESTful
    服务，这些数据会自动编组/反编组为 Java 对象。


    要创建并使用 JAX-RS 客户端 API，应执行以下步骤：调用 `ClientBuilder.newClient()` 静态方法创建一个新的 `Client`。然后在获取到的客户端实例上使用
    `target()` 方法，返回一个 `WebTarget`。接着，在第二步得到的 `WebTarget` 实例上通过 `target.request()`
    方法获取 `Invocation.Builder`。最后，执行 `invocationBuilder.get()`、`put()`、`post()` 或 `delete()`
    方法来发起对应的 REST 调用。


    让我们按照前面的四个步骤来创建并使用客户端。首先，创建一个指向 `http://localhost:8080` 的 `WebTarget`。如前所述，使用
    `ClientBuilder.newClient()` 完成。接下来，使用创建好的 `client` 将路径设置为 `/wizard` 端点，将 `MediaType`
    设置为 `APPLICATION_JSON`（因为我们处理的是 JSON 数据），并调用带有 `Wizard.class` 参数的 `get` 方法。这样，JAX-RS
    客户端 API 会对指定的基础 URI 和端点执行一次 `GET` 调用，并自动将结果映射到 `Wizard` 类。


    *   ① 使用 `ClientBuilder` 创建 `Client` 并设置目标，从而创建 `WebTarget`。这是资源开销较大的操作。（这就是为什么我们只做一次并将其缓存在类字段中。）


    *   ② 将路径设置为 `/wizard`。


    *   ③ 使用 `MediaType.APPLICATION_JSON` 构建调用。


    *   ④ 将 JSON 结果映射到 `Wizard` 类。


    ```

    @ApplicationScoped

    @Path("/wizardClient")

    public class SorceryMinistryResource {

    private final WebTarget target =

    ClientBuilder.newClient()

    .target("http://localhost:8080"); ①

    @GET

    @Path("/jaxrs")

    @Produces(MediaType.APPLICATION_JSON)

    public Wizard getWizardFromJaxrsClient() {

    return target

    .path("/wizard")                       ②

    .request(MediaType.APPLICATION_JSON)   ③

    .get(Wizard.class);                    ④

    }

    }

    Listing 5-21

    Resource with Endpoints

    ```


    就是这么简单。只需使用静态构建器创建一个客户端。之后，你就可以在 `Invocation.Builder` 上使用 `get()`、`put()`、`post()`
    或 `delete()` 方法调用服务。这段代码实现了与 MicroProfile Rest Client 相同的结果。请记住，上述请求是阻塞式的。这意味着在客户端调用期间，线程会被阻塞，无法做其他有用的工作。本章稍后将讨论异步与响应式执行。


    另外，请记住，`WebTarget` 实例在 URI 方面是不可变的。然而，`they` 在配置方面是可变的。因此，配置一个 `WebTarget` 实例不会创建新实例。创建
    `WebTarget` 实例被认为是一个高开销操作。


    `Invocation` 是一个已经准备好、可执行的请求。你不需要知道该调用是如何准备的，只需要知道应如何执行它——*同步*或*异步*。


    `Client`、`ClientBuilder` 和 `WebTarget` 都是可配置的，因为它们都实现了 `Configurable` 接口，该接口支持以下配置。


    *   **属性（Properties）** 是用于附加配置的名称-值对。


    *   **特性（Features）** 是实现了 `Feature` 接口的特殊 provider 类型，可用于配置 JAX-RS 实现。本书不涵盖特性相关内容。


    *   **提供者（Providers）** 是实现了一个或多个*实体提供者*、*上下文提供者*和*异常映射提供者*接口的类或类实例。提供者可以是消息过滤器、上下文解析器、异常映射器等。本章稍后将演示
    *provider* 的用法。


    让我们通过向端点提交一个新的 wizard 实例来做一个更复杂的演示。为此，我们使用在 MicroProfile Rest Client 中创建的 wizard
    服务。它有一个 */*`wizard/add` POST 端点，接收 JSON 数据。


    为了将新的 wizard 发送到 POST 端点，我们使用 `post()` 请求执行方法。该方法期望接收 `Entity` 类实例才能正常工作。`Entity`
    对象保存了通过网络发送 wizard 实体所需的元数据。负载可以是任何类型：XML 数据、文本数据或自定义二进制流。在本例中，创建一个 `Entity` 实例，将
    wizard 实例标记为按 JSON 文档处理。可以通过 `Entity.json(wizard)` 方法完成。


    *   ① 创建一个示例 wizard。


    *   ② 使用 `Entity.json()` 方法将新 wizard 编组为 JSON，并在 *post* 请求中发送数据。


    *   ③ 以同步方式查询服务中的新 wizard 并返回它。


    ```

    // other methods omitted

    @GET

    @Path("/jaxrs/add")

    @Produces(MediaType.APPLICATION_JSON)

    public Wizard addWizardAndCheck() {

    Wizard wizard = new Wizard();

    wizard.setName("NewWizard");                         ①

    client.path("/wizard/add")

    .request(MediaType.APPLICATION_JSON)

    .post(Entity.json(wizard);

    return client                                        ③

    .path("/wizard/NewWizard")

    .request(MediaType.APPLICATION_JSON)

    .get(Wizard.class);

    }

    Listing 5-22

    JAX-RS Client Usage

    ```


    当你调用此方法时，它会返回新的 `wizard` 对象，该对象已保存在 wizard 服务中。


    *   ① 创建一个新的 `Wizard` 对象并将其查询返回。


    ```

    curl -X GET http://localhost:8081/wizardClient/jaxrs/add

    {"name":"NewWizard"}                                     ①

    Listing 5-23

    Call the Client

    ```

    '
- fmt: '## Providers


    Providers in JAX-RS and its Client are responsible for various cross-cutting concerns
    such as filtering requests, converting representations into Java objects, and
    mapping exceptions to responses. A provider can be pre-packaged in the JAX-RS
    runtime or supplied by an application.


    Let’s implement the same logging filter used in the “MicroProfile Rest Client”
    section. For that, the JAX-RS Client API provides a conceptually close approach.


    - Creates a class implementing `ClientRequestFilter` and/or `ClientResponseFilter`

    - Registers this/these class(s) within `Client` or `WebTarget`, using `.register(...)`
    method


    If you register a filter in `Client`, it is inherited by all `WebTarget` instances.
    Registering it within the current instance means no other `WebTarget` instance
    is affected.


    To simplify the logging filter creation, let’s create a single class implementing
    both interfaces. Override `filter(ClientRequestContext requestContext)` for `ClientRequestFilter`,
    and `filter(ClientRequestContext requestContext, ClientResponseContext responseContext)`
    for `ClientResponseFilter`. The class should look like Listing [5-24](#600147_1_En_5_Chapter.xhtml#PC24).


    - ① Class implementing `ClientRequestFilter` and `ClientResponseFilter`.

    - ② Override `filter(ClientRequestContext requestContext)` to log request headers.

    - ③ Override `filter(ClientRequestContext requestContext, ClientResponseContext
    responseContext)` to log response headers.


    ```java

    public class LoggerFilter implements

    ClientRequestFilter, ClientResponseFilter {    ①

    private final Logger logger =

    Logger.getLogger(LoggerFilter.class.getName());

    @Override

    public void filter(ClientRequestContext requestContext) { ②

    logger.info(requestContext.getHeaders().toString());

    }

    @Override

    public void filter(ClientRequestContext requestContext,

    ClientResponseContext responseContext) { ③

    logger.info(responseContext.getHeaders().toString());

    }

    }

    Listing 5-24

    Request and Response Filters

    ```


    Only register this class in `Client`, since we want all `WebTargets` created by
    this `Client` to have a logging filter registered.


    - ① Register `LoggerFilter` in the `WebTarget`.


    ```java

    WebTarget target = ClientBuilder.newClient()

    .register(new LoggerFilter())        ①

    .target("http://localhost:8080");

    Listing 5-25

    Register Filter

    ```


    Now all the headers from the requests and responses will be logged.


    Let’s run the sorcery ministry app and call the `/wizardClient/jaxrs` endpoint
    in the log output, as shown in Listing [5-26](#600147_1_En_5_Chapter.xhtml#PC26).


    ```text

    {Accept=[application/json]}

    {content-length=[13], connection=[keep-alive], Date=[Wed, 28 Sep 2022 16:26:55
    +0300],

    Content-Type=[application/json]}

    Listing 5-26

    Sample Output

    ```


    Excellent, as expected!


    There are many other providers of entity manipulation for media type, working
    with contexts and exceptions. Please refer to the official [documentation](https://jakarta.ee/specifications/restful-ws/3.0/jakarta-restful-ws-spec-3.0.html%2523providers)
    for more details.


    ## Asynchronous Operations


    JAX-RS provides an asynchronous way of calling other services. It is achieved
    just by calling `.async()` method. Thus, the function immediately returns a `Future`
    instance, which contains a response once it is received.


    - ① Invokes an asynchronous client call.


    ```java

    public Future getAsyncWizardFromJaxrsClient() {

    return target

    .path("/wizard")

    .request(MediaType.APPLICATION_JSON)

    .async()                                  ①

    .get(Wizard.class);

    }

    Listing 5-27

    Asynchronous Operations

    ```


    And even more than this. The requests can be processed reactively. And this is
    also achieved quite easily by calling the client’s `.rx()` method. The function
    returns `CompletableStage` as a result.


    - ① Invokes a reactive client call


    ```java

    public CompletableStage

    getAsyncWizardFromJaxrsClient() {

    return client

    .path("/wizard")

    .request(MediaType.APPLICATION_JSON)

    .rx()                                     ①

    .get(Wizard.class);

    }

    Listing 5-28

    Reactive Operations

    ```


    The request execution immediately returns `CompletionStage`, which contains a
    `Wizard` instance once it processes the response. It can later be processed in
    a reactive means using standard Java language features.


    These methods are suitable for heavy or long-running calls to avoid blocking the
    service thread.


    ## JAX-RS Client API Conclusion


    This chapter only scratched the surface of all the possibilities the JAX-RS Client
    API provides. The usage itself is worthy of its own thick book since it is a very
    powerful tool.


    Please refer to the official [documentation](https://jakarta.ee/specifications/restful-ws/3.0/jakarta-restful-ws-spec-3.0.html)
    for more information.'
