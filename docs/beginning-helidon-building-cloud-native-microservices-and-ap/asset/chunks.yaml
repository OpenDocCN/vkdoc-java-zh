    ### findFirst


    `findFirst` 操作符是一个终端操作符，如果上游有 `onNext` 信号，则返回第一个项目。如果在任何 `onNext` 信号之前接收到 `onComplete`，则
    `findFirst` 返回一个空的 `Optional`。


