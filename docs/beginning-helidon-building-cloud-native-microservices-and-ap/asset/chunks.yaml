    ```java

    @PUT

    @Path("/payment")

    @LRA(value = LRA.Type.MANDATORY, end = false)  ① ②

    public Response makePayment(@HeaderParam(LRA.LRA_HTTP_CONTEXT_HEADER) URI lraId,

    JsonObject jsonObject) {

