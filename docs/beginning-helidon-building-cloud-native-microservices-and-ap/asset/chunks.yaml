- fmt: '## MicroProfile Metrics REST API


    MicroProfile specification defines REST API for accessing metrics data. It’s the
    first step in Figure [4-2](#600147_1_En_4_Chapter.xhtml#Fig2). This API allows
    users and systems like Prometheus to get metrics data and metadata from your application.


    Table 4-4


    MicroProfile Metrics REST API


    | URL | Request Type | Description |

    | --- | --- | --- |

    | `/metrics` | GET | Returns all registered metrics in JSON or OpenMetrics formats.
    |

    | `/metrics/<scope>` | GET | Returns all metrics registered for the given scope
    (see the “Metric Scopes” section) in JSON or OpenMetrics formats. |

    | `/metrics/<scope>/<metric_name>` | GET | Returns the metric that matches the
    metric name for the given scope (see the “Metric Scopes” section) in JSON or OpenMetrics
    formats. |

    | `/metrics` | OPTIONS | Returns all registered metrics'' metadata. |

    | `/metrics/<scope>` | OPTIONS | Returns metrics’ metadata registered for the
    given scope (see the “Metric Scopes” section). |

    | `/metrics/<scope>/<metric_name>` | OPTIONS | Returns the metric’s metadata that
    matches the metric name for the given scope (see the “Metric Scopes” section).
    |


    ## Openmetrics


    OpenMetrics is a specification built upon and carefully extends the Prometheus
    exposition format in almost 100% backward-compatible ways. It defines a protocol
    and a file format containing metrics data accepted by systems like Prometheus.
    The file is text by nature.


    MicroProfile Metrics supports JSON and OpenMetrics data formats. By default, it
    uses OpenMetrics simply because it’s the format Prometheus accepts. Use the following
    command to get metrics data in OpenMetrics format.


    ```bash

    curl http://localhost:8080/metrics

    ```


    The result is the full metrics data produced in OpenMetrics format.


    ```text

    # TYPE base_classloader_loadedClasses_count gauge

    # HELP base_classloader_loadedClasses_count Displays the number of classes that
    are currently loaded in the Java virtual machine.

    base_classloader_loadedClasses_count 8008

    # TYPE base_gc_total counter

    # HELP base_gc_total Displays the total number of collections that have occurred.
    This attribute lists -1 if the collection count is undefined for this collector.

    base_gc_total{name="G1 Old Generation"} 0

    base_gc_total{name="G1 Young Generation"} 7

    ...

    ```


    OpenMetrics is a text format containing both metrics data and metadata. You see
    metadata in lines starting with `#`. Metrics data is in lines which are not start
    with `#`. These lines contain metric names (e.g., `base_classloader_loadedClasses_count`)
    and values (e.g., `8008`).


    To switch to JSON format, specify the `Accept: application/json` header to your
    REST request.


    ```bash

    curl -H ''Accept: application/json'' http://localhost:8080/metrics

    ```


    The result is full metrics data in JSON format.


    ```json

    {

    "base": {

    "classloader.loadedClasses.count": 8008,

    "classloader.loadedClasses.total": 8008,

    ...

    },

    ...

    }

    ```


    It’s just a fragment. The actual output is much lengthy. JSON format includes
    only metrics data (no metadata). To get metadata, you should use the `OPTIONS`
    request type.


    ```bash

    curl -X OPTIONS http://localhost:8080/metrics

    ```


    ## Metrics Model


    Each metric has a unique ID, scope, and one of the seven types supported by the
    MicroProfile Metrics specification and metadata. Let’s take a closer look at these
    characteristics.


    ### Metric Identity


    The metric’s name should reflect what’s measured (like `http_requests_total`)
    and an optional collection of key-value pairs called tags. Tags are used to build
    a dimensional data model which allows querying and aggregating data. These two
    (name + tags) form the unique metric identity. Think of it as a primary key in
    a database table.


    ```text

    {=, ...}

    ```


    One of the earlier samples showed a response of calling the `/metrics` endpoint
    in OpenMetrics format. It contains metrics with two tags.


    ```text

    # TYPE base_gc_total counter

    # HELP base_gc_total Displays the total number of collections that have occurred.
    This attribute lists -1 if the collection count is undefined for this collector.

    base_gc_total{name="G1 Old Generation"} 0

    base_gc_total{name="G1 Young Generation"} 7

    ```


    You see a tag `name` specifying which garbage collector was used in this metric.
    So, “G1 Young Generation” was used seven times, and “G1 Old Generation” was never
    used.


    ### Metric Scopes


    Think about scopes as categories logically separating your metrics catalog. MicroProfile
    Metrics specification defines three metrics scopes: base, vendor and application
    (see Table [4-5](#600147_1_En_4_Chapter.xhtml#Tab5)).


    Table 4-5


    MicroProfile Metrics Scopes


    | Scope | Description | URL |

    | --- | --- | --- |

    | Base | A set of metrics each MicroProfile Metrics compliant implementation must
    provide. | `/metrics/base` |

    | Vendor | Helidon-specific metrics that are provided out of the box. | `/metrics/vendor`
    |

    | Application | Your application-specific metrics. | `/metrics/application` |


    Let’s take a closer look at each of them.


    #### Base Scope


    The base set of metrics each MicroProfile Metrics compliant implementation must
    provide. There are about 18 base metrics defined by the spec, and five are optional.
    It includes data about memory consumption, garbage collection, and class loading.
    Helidon implements only the required base metrics.


    Note


    You can find a complete list of base metrics in the specification document at
    [`https://download.eclipse.org/microprofile/microprofile-metrics-4.0/microprofile-metrics-spec-4.0.pdf`](https://download.eclipse.org/microprofile/microprofile-metrics-4.0/microprofile-metrics-spec-4.0.pdf).


    Use this command to retrieve base metrics in OpenMetrics format.


    ```bash

    curl http://localhost:8080/metrics/base

    ```


    Use this command to retrieve base metrics in JSON format.


    ```bash

    curl -H ''Accept: application/json'' http://localhost:8080/metrics/base

    ```


    #### Vendor Scope


    Vendor scope is a set of metrics provided by MicroProfile Metrics implementation
    out of the box. Different implementations offer different sets of metrics. Helidon
    provides thread pool executor metrics and the total count and rate of received
    requests.


    Use this command to retrieve vendor metrics in OpenMetrics format.


    ```bash

    curl http://localhost:8080/metrics/vendor

    ```


    Use this command to retrieve vendor metrics in JSON format.


    ```bash

    curl -H ''Accept: application/json'' http://localhost:8080/metrics/vendor

    ```


    #### Application Scope


    Application Scope is a scope that contains metrics specific to your application.
    It’s empty unless you add metrics in your application source code (see the “Using
    MicroProfile Metrics API” section).


    You can list all application scope metrics registered using the following command.


    ```bash

    curl -H ''Accept: application/json'' http://localhost:8080/metrics/application

    ```


    ### Metric Metadata


    Metric metadata is where all information about the metric is collected. All metadata
    fields are listed in Table [4-6](#600147_1_En_4_Chapter.xhtml#Tab6). Although
    description and display name are optional, providing them is a good practice.
    It helps to get a context and an explanation of the metric. Multiple metric instances
    can share the same metadata.


    Table 4-6


    MicroProfile Metrics Metadata


    | Metadata Field | Required | Description |

    | --- | --- | --- |

    | `name` | Yes | Metric name |

    | `type` | Yes | One of the seven metrics types ((see the “Metric Types” section)
    |

    | `description` | No | Human-readable description of what the metric does |

    | `display name` | No | Human-readable name of the metric |

    | `units` | Yes | Measurement units (milliseconds, minutes, etc.) |'
  raw: '### MicroProfile Metrics REST API


    MicroProfile specification defines REST API for accessing metrics data. It’s the
    first step in Figure [4-2](#600147_1_En_4_Chapter.xhtml#Fig2). This API allows
    users and systems like Prometheus to get metrics data and metadata from your application.


    Table 4-4


    MicroProfile Metrics REST API


    | URL | Request Type | Description |

    | --- | --- | --- |

    | `/metrics` | GET | Returns all registered metrics in JSON or OpenMetrics formats.
    |

    | `/metrics/<scope>` | GET | Returns all metrics registered for the given scope
    (see the “Metric Scopes” section) in JSON or OpenMetrics formats. |

    | `/metrics/<scope>/<metric_name>` | GET | Returns the metric that matches the
    metric name for the given scope (see the “Metric Scopes” section) in JSON or OpenMetrics
    formats. |

    | `/metrics` | OPTIONS | Returns all registered metrics'' metadata. |

    | `/metrics/<scope>` | OPTIONS | Returns metrics’ metadata registered for the
    given scope (see the “Metric Scopes” section). |

    | `/metrics/<scope>/<metric_name>` | OPTIONS | Returns the metric’s metadata that
    matches the metric name for the given scope (see the “Metric Scopes” section).
    |


    Openmetrics


    OpenMetrics is a specification built upon and carefully extends the Prometheus
    exposition format in almost 100% backward-compatible ways. It defines a protocol
    and a file format containing metrics data accepted by systems like Prometheus.
    The file is text by nature.


    MicroProfile Metrics supports JSON and OpenMetrics data formats. By default, it
    uses OpenMetrics simply because it’s the format Prometheus accepts. Use the following
    command to get metrics data in OpenMetrics format.


    ```

    curl http://localhost:8080/metrics

    ```


    The result is the full metrics data produced in OpenMetrics format.


    ```

    # TYPE base_classloader_loadedClasses_count gauge

    # HELP base_classloader_loadedClasses_count Displays the number of classes that
    are currently loaded in the Java virtual machine.

    base_classloader_loadedClasses_count 8008

    # TYPE base_gc_total counter

    # HELP base_gc_total Displays the total number of collections that have occurred.
    This attribute lists -1 if the collection count is undefined for this collector.

    base_gc_total{name="G1 Old Generation"} 0

    base_gc_total{name="G1 Young Generation"} 7

    ...

    ```


    OpenMetrics is a text format containing both metrics data and metadata. You see
    metadata in lines starting with `#`. Metrics data is in lines which are not start
    with `#`. These lines contain metric names (e.g., `base_classloader_loadedClasses_count`)
    and values (e.g., `8008`).


    To switch to JSON format, specify the `Accept: application/json` header to your
    REST request.


    ```

    curl -H ''Accept: application/json'' http://localhost:8080/metrics

    ```


    The result is full metrics data in JSON format.


    ```

    {

    "base": {

    "classloader.loadedClasses.count": 8008,

    "classloader.loadedClasses.total": 8008,

    ...

    },

    ...

    }

    ```


    It’s just a fragment. The actual output is much lengthy. JSON format includes
    only metrics data (no metadata). To get metadata, you should use the `OPTIONS`
    request type.


    ```

    curl -X OPTIONS http://localhost:8080/metrics

    ```


    ### Metrics Model


    Each metric has a unique ID, scope, and one of the seven types supported by the
    MicroProfile Metrics specification and metadata. Let’s take a closer look at these
    characteristics.


    #### Metric Identity


    The metric’s *name* should reflect what’s measured (like `http_requests_total`)
    and an optional collection of key-value pairs called *tags*. Tags are used to
    build a *dimensional data model* which allows querying and aggregating data. These
    two (name + tags) form the unique metric identity. Think of it as a primary key
    in a database table.


    ```

    {=, ...}

    ```


    One of the earlier samples showed a response of calling the `/metrics` endpoint
    in OpenMetrics format. It contains metrics with two tags.


    ```

    # TYPE base_gc_total counter

    # HELP base_gc_total Displays the total number of collections that have occurred.
    This attribute lists -1 if the collection count is undefined for this collector.

    base_gc_total{name="G1 Old Generation"} 0

    base_gc_total{name="G1 Young Generation"} 7

    ```


    You see a tag ‘name’ specifying which garbage collector was used in this metric.
    So, “G1 Young Generation” was used seven times, and “G1 Old Generation” was never
    used.


    #### Metric Scopes


    Think about scopes as categories logically separating your metrics catalog. MicroProfile
    Metrics specification defines three metrics scopes: *base*, *vendor* and *application*
    (see Table [4-5](#600147_1_En_4_Chapter.xhtml#Tab5)).


    Table 4-5


    MicroProfile Metrics Scopes


    | Scope | Description | URL |

    | --- | --- | --- |

    | Base | A set of metrics each MicroProfile Metrics compliant implementation must
    provide. | `/metrics/base` |

    | Vendor | Helidon-specific metrics that are provided out of the box. | `/metrics/vendor`
    |

    | Application | Your application-specific metrics. | `/metrics/application` |


    Let’s take a closer look at each of them.


    ##### Base Scope


    The base set of metrics each MicroProfile Metrics compliant implementation must
    provide. There are about 18 base metrics defined by the spec, and five are optional.
    It includes data about memory consumption, garbage collection, and class loading.
    Helidon implements only the required base metrics.


    Note


    You can find a complete list of base metrics in the specification document at
    [`https://download.eclipse.org/microprofile/microprofile-metrics-4.0/microprofile-metrics-spec-4.0.pdf`](https://download.eclipse.org/microprofile/microprofile-metrics-4.0/microprofile-metrics-spec-4.0.pdf).


    Use this command to retrieve base metrics in OpenMetrics format.


    ```

    curl http://localhost:8080/metrics/base

    ```


    Use this command to retrieve base metrics in JSON format.


    ```

    curl -H ''Accept: application/json'' http://localhost:8080/metrics/base

    ```


    ##### Vendor Scope


    Vendor scope is a set of metrics provided by MicroProfile Metrics implementation
    out of the box. Different implementations offer different sets of metrics. Helidon
    provides thread pool executor metrics and the total count and rate of received
    requests.


    Use this command to retrieve vendor metrics in OpenMetrics format.


    ```

    curl http://localhost:8080/metrics/vendor

    ```


    Use this command to retrieve vendor metrics in JSON format.


    ```

    curl -H ''Accept: application/json'' http://localhost:8080/metrics/vendor

    ```


    ##### Application Scope


    Application Scope is a scope that contains metrics specific to your application.
    It’s empty unless you add metrics in your application source code (see the “Using
    MicroProfile Metrics API” section).


    You can list all application scope metrics registered using the following command.


    ```

    curl -H ''Accept: application/json'' http://localhost:8080/metrics/application

    ```


    #### Metric Metadata


    *Metric metadata* is where all information about the metric is collected. All
    metadata fields are listed in Table [4-6](#600147_1_En_4_Chapter.xhtml#Tab6).
    Although *description* and *display name* are optional, providing them is a good
    practice. It helps to get a context and an explanation of the metric. Multiple
    metric instances can share the same metadata.


    Table 4-6


    MicroProfile Metrics Metadata


    | Metadata Field | Required | Description |

    | --- | --- | --- |

    | name | Yes | Metric name |

    | type | Yes | One of the seven metrics types ((see the “Metric Types” section)
    |

    | description | No | Human-readable description of what the metric does |

    | display name | No | Human-readable name of the metric |

    | units | Yes | Measurement units (milliseconds, minutes, etc.) |'
  trans: '

    ### MicroProfile Metrics REST API


    MicroProfile 规范定义了用于访问指标数据的 REST API。它是图 4-2 中的第一步。该 API 允许用户以及像 Prometheus 这样的系统从你的应用中获取指标数据和元数据。


    表 4-4


    MicroProfile Metrics REST API


    | URL | 请求类型 | 描述 |

    | --- | --- | --- |

    | `/metrics` | GET | 以 JSON 或 OpenMetrics 格式返回所有已注册指标。 |

    | `/metrics/<scope>` | GET | 以 JSON 或 OpenMetrics 格式返回给定作用域下注册的所有指标（见“指标作用域”一节）。
    |

    | `/metrics/<scope>/<metric_name>` | GET | 以 JSON 或 OpenMetrics 格式返回给定作用域下与指标名称匹配的指标（见“指标作用域”一节）。
    |

    | `/metrics` | OPTIONS | 返回所有已注册指标的元数据。 |

    | `/metrics/<scope>` | OPTIONS | 返回给定作用域下注册的指标元数据（见“指标作用域”一节）。 |

    | `/metrics/<scope>/<metric_name>` | OPTIONS | 返回给定作用域下与指标名称匹配的指标元数据（见“指标作用域”一节）。
    |


    Openmetrics


    OpenMetrics 是一个构建于 Prometheus 暴露格式之上并进行了谨慎扩展的规范，且几乎 100% 向后兼容。它定义了一种协议和一种文件格式，文件中包含可被
    Prometheus 等系统接收的指标数据。该文件本质上是文本格式。


    MicroProfile Metrics 支持 JSON 和 OpenMetrics 数据格式。默认使用 OpenMetrics，仅仅因为这是 Prometheus
    可接受的格式。使用以下命令获取 OpenMetrics 格式的指标数据。


    ```

    curl http://localhost:8080/metrics

    ```


    结果是以 OpenMetrics 格式输出的完整指标数据。


    ```

    # TYPE base_classloader_loadedClasses_count gauge

    # HELP base_classloader_loadedClasses_count Displays the number of classes that
    are currently loaded in the Java virtual machine.

    base_classloader_loadedClasses_count 8008

    # TYPE base_gc_total counter

    # HELP base_gc_total Displays the total number of collections that have occurred.
    This attribute lists -1 if the collection count is undefined for this collector.

    base_gc_total{name="G1 Old Generation"} 0

    base_gc_total{name="G1 Young Generation"} 7

    ...

    ```


    OpenMetrics 是一种同时包含指标数据和元数据的文本格式。你会在以 `#` 开头的行中看到元数据。指标数据位于不以 `#` 开头的行中。这些行包含指标名称（例如
    `base_classloader_loadedClasses_count`）和数值（例如 `8008`）。


    要切换到 JSON 格式，请在 REST 请求中指定 `Accept: application/json` 请求头。


    ```

    curl -H ''Accept: application/json'' http://localhost:8080/metrics

    ```


    结果是 JSON 格式的完整指标数据。


    ```

    {

    "base": {

    "classloader.loadedClasses.count": 8008,

    "classloader.loadedClasses.total": 8008,

    ...

    },

    ...

    }

    ```


    这只是一个片段。实际输出要长得多。JSON 格式只包含指标数据（不含元数据）。要获取元数据，应使用 `OPTIONS` 请求类型。


    ```

    curl -X OPTIONS http://localhost:8080/metrics

    ```


    ### 指标模型


    每个指标都有一个唯一 ID、作用域、MicroProfile Metrics 规范支持的七种类型之一，以及元数据。让我们更仔细地看看这些特性。


    #### 指标标识


    指标的*名称*应反映其测量内容（例如 `http_requests_total`），并可带有一组可选的键值对集合，称为*标签*（tags）。标签用于构建*维度数据模型*，从而支持查询和聚合数据。这两者（名称
    + 标签）共同构成唯一的指标标识。可以把它看作数据库表中的主键。


    ```

    {=, ...}

    ```


    前面的一个示例展示了以 OpenMetrics 格式调用 `/metrics` 端点的响应。其中包含带有两个标签的指标。


    ```

    # TYPE base_gc_total counter

    # HELP base_gc_total Displays the total number of collections that have occurred.
    This attribute lists -1 if the collection count is undefined for this collector.

    base_gc_total{name="G1 Old Generation"} 0

    base_gc_total{name="G1 Young Generation"} 7

    ```


    你可以看到一个名为 ‘name’ 的标签，用来指定该指标使用的是哪个垃圾回收器。因此，“G1 Young Generation”使用了 7 次，而 “G1
    Old Generation” 从未使用。


    #### 指标作用域


    可以将作用域理解为逻辑上分隔指标目录的分类。MicroProfile Metrics 规范定义了三个指标作用域：*base*、*vendor* 和 *application*（见表
    4-5）。


    表 4-5


    MicroProfile Metrics 作用域


    | 作用域 | 描述 | URL |

    | --- | --- | --- |

    | Base | 每个符合 MicroProfile Metrics 的实现都必须提供的一组指标。 | `/metrics/base` |

    | Vendor | Helidon 特有的开箱即用指标。 | `/metrics/vendor` |

    | Application | 你的应用特定指标。 | `/metrics/application` |


    下面分别详细看看它们。


    ##### Base 作用域


    每个符合 MicroProfile Metrics 的实现都必须提供基础指标集合。规范定义了大约 18 个基础指标，其中 5 个是可选的。它包含内存消耗、垃圾回收和类加载相关数据。Helidon
    仅实现必需的基础指标。


    注意


    你可以在规范文档中找到基础指标的完整列表：[`https://download.eclipse.org/microprofile/microprofile-metrics-4.0/microprofile-metrics-spec-4.0.pdf`](https://download.eclipse.org/microprofile/microprofile-metrics-4.0/microprofile-metrics-spec-4.0.pdf)。


    使用以下命令以 OpenMetrics 格式获取基础指标。


    ```

    curl http://localhost:8080/metrics/base

    ```


    使用以下命令以 JSON 格式获取基础指标。


    ```

    curl -H ''Accept: application/json'' http://localhost:8080/metrics/base

    ```


    ##### Vendor 作用域


    Vendor 作用域是 MicroProfile Metrics 实现开箱即用提供的一组指标。不同实现提供的指标集合不同。Helidon 提供线程池执行器指标，以及已接收请求的总数和速率。


    使用以下命令以 OpenMetrics 格式获取 vendor 指标。


    ```

    curl http://localhost:8080/metrics/vendor

    ```


    使用以下命令以 JSON 格式获取 vendor 指标。


    ```

    curl -H ''Accept: application/json'' http://localhost:8080/metrics/vendor

    ```


    ##### Application 作用域


    Application Scope 是包含应用特定指标的作用域。除非你在应用源码中添加指标，否则它是空的（见“使用 MicroProfile Metrics
    API”一节）。


    你可以使用以下命令列出所有已注册的 application 作用域指标。


    ```

    curl -H ''Accept: application/json'' http://localhost:8080/metrics/application

    ```


    #### 指标元数据


    *指标元数据*是汇总指标全部信息的地方。所有元数据字段列于表 4-6。虽然*描述*和*显示名称*是可选的，但提供它们是一个良好实践。这有助于理解指标的上下文和说明。多个指标实例可以共享同一份元数据。


    表 4-6


    MicroProfile Metrics 元数据


    | 元数据字段 | 必需 | 描述 |

    | --- | --- | --- |

    | name | 是 | 指标名称 |

    | type | 是 | 七种指标类型之一（（见“指标类型”一节） |

    | description | 否 | 指标作用的人类可读描述 |

    | display name | 否 | 指标的人类可读名称 |

    | units | 是 | 度量单位（毫秒、分钟等） |

