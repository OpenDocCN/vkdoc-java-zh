    ## Messaging Health


    When a messaging channel fails, and it can fail for many reasons, it can’t be
    revived. A channel can fail for example because the connector lost connection
    to the messaging broker or because an exception was thrown in the messaging method.
    Since Helidon is a microservice framework, the obvious solution for reestablishing
    the connection is to restart the pod. To let K8s know that restarting of the pod
    is needed, you need a health probe. Reactive messaging has its own special health
    probe.


    ```text

    io.helidon.microprofile.messaging

    helidon-microprofile-messaging-health


    Listing 13-51

    Messaging Health Dependency

    ```


    Messaging health liveness check simply reports your channel DOWN if either of
    `onError`, `onComplete` or `cancel` signal has been detected in it.


    ```json

    {

    "name": "messaging",

    "state": "UP",

    "status": "UP",

    "data": {

    "channel-1": "UP",

    "channel-2": "UP"

    }

    }

    Listing 13-52

    Messaging Health Liveness Check

    ```


    Similarly, readiness check reports channel UP when `onSubscribe` signal has been
    detected.


    ## Messaging Connectors


    Helidon provides a variety of connectors for reactive messaging with the most
    used remote brokers. The connector is just an application scoped bean acting as
    a factory for creating publishers or subscribers from provided configuration.


    Configuration is straightforward. The connector expects a global config under
    the property `mp.messaging.connector.CONNECTOR_NAME`. The global config can be
    overridden or extended with configuration of every specific channel. While incoming
    channels can reference connector as its publisher with property `connector`, outgoing
    channels use the same property for referencing connector as its subscriber.


    - ① Incoming channel configuration

    - ② Connector is responsible for providing publisher to this channel

    - ③ Channel-specific config for connector

    - ④ Outgoing channel configuration

    - ⑤ Connector’s global config can be overridden or extended with channel-specific
    config


    ```yaml

    mp.messaging:

    incoming.from-jms:  ①

    connector: helidon-jms  ②

    destination: queue-1  ③

    type: queue

    outgoing.to-jms:  ④

    connector: helidon-jms

    destination: messaging-test-queue-1

    type: queue

    connector:

    helidon-jms: ⑤

    user: frank

    password: secret1234

    jndi:

    jms-factory: ConnectionFactory

    env-properties:

    java.naming:

    factory.initial: org.apache.activemq.jndi.ActiveMQInitialContextFactory

    provider.url: tcp://localhost:61616

    Listing 13-53

    Configure Helidon Messaging Connector

    ```


    Figure `[13-27](#600147_1_En_13_Chapter.xhtml#Fig27)` shows how the connector
    applies configuration to construct the channel’s publisher or subscriber. Notice
    how the channel’s config is enriched with global config; this way, you don’t need
    to repeat common properties for every channel. Global connector’s config can be
    overridden by channel property of the same name.


