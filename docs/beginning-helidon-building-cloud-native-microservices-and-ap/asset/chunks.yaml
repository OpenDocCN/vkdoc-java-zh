    are those for *persistence*.


    *   ① Jakarta Persistence API main dependency


    *   ② JPA CDI extensions


    *   ③ Since Hibernate was chosen as the JPA provider, Helidon integrates with
    it


    *   ④ Uses HikariCP for database connections management


    ```

    jakarta.persistence

