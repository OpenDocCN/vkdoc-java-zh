- fmt: "## MicroProfile JWT RBAC\n\n[MicroProfile JWT specification](https://download.eclipse.org/microprofile/microprofile-jwt-auth-2.1/microprofile-jwt-auth-spec-2.1.html)\
    \ brings CDI-friendly official API for your JAX-RS resources. Let’s manually call\
    \ the JAX-RS watchtower service with cURL.\n\n```bash\ncurl -d \"http://localhost:8080\"\
    \ \\\n-H \"Authorization: Bearer $JWT_TOKEN\" \\\nlocalhost:8082/watchtower/signal\n\
    \nListing 8-12\nCalling MicroProfile JWT Enabled JAX-RS Resource with cURL\n```\n\
    \n![](images/600147_1_En_8_Chapter/600147_1_En_8_Fig6_HTML.png)\n\nAn illustration\
    \ of a castle gate and a watchtower has the labels castle service and watchtower\
    \ service. They are interconnected via keycloak J W S token and J W T issuer's\
    \ public key J W K or P E M that is authorized automatically for information exchange\
    \ between the services.\n\nFigure 8-6\n\nService-to-service communication with\
    \ JWT\n\nWatchtower service doesn’t have to contact any other service to validate\
    \ the JWS token. All it needs is a public key of the JWT token issuer. Public\
    \ key content can be provided directly with `mp.jwt.verify.publickey` or via link\
    \ to its location with `mp.jwt.verify.publickey.location`. Location can be a file\
    \ path, classpath, or URL. MicroProfile JWT supports the following formats.\n\n\
    - JWK\n- JWKS\n- PKCS#8 base64 encoded PEM format\n\nKeycloak exposes JWKS keys\
    \ at `/realms/my-realm/protocol/openid-connect/certs`, for example. When configured,\
    \ Helidon MP JWT implementation lazily and automatically downloads the key set\
    \ when needed; no other calls are needed since.\n\n- ① Value to verify issuer\
    \ claim\n- ② Value to verify audiences claim\n- ③ Load public key for verifying\
    \ JWS directly from Keycloak as JWKS\n\n```yaml\nmp.jwt.verify:\n  issuer: \"\
    http://${keycloak.host}:${keycloak.port}/realms/beginning-helidon\" ①\n  audiences:\
    \ \"kingdom-audience\" ②\n  publickey:\n    location: ${mp.jwt.verify.issuer}/protocol/openid-connect/certs\
    \ ③\n\nListing 8-13\nConfiguration of MP JWT\n```\n\nMicroProfile JWT decodes\
    \ the bearer JWT token and injects its claims into your JAX-RS resource. When\
    \ you inspect JWT more carefully, you find it implements `java.security.Principal`.\
    \ That is because `JsonWebToken` is principal accessible with JAX-RS `SecurityContext.getUserPrincipal()`.\
    \ Among others, MP JWT supports `groups` claims, as defined in [RFC-7643](https://www.rfc-editor.org/rfc/rfc7643),\
    \ to propagate authorization data with the JWT token’s principal identity. Yes,\
    \ you can access roles. That is why the specification has RBAC in its name! `SecurityContext.isUserInRole`\
    \ is checked against actual groups from the JWT token, and `@RolesAllowed` works\
    \ too.\n\nMost identity providers must be configured to add MP JWT claims to the\
    \ JWT token. Keycloak, for example, provides prepared `microprofile-jwt` built-in\
    \ scope, which, when enabled, adds MicroProfile JWT–required `upn` and `groups`\
    \ scopes.\n\n### Note\n\nYou can stick to the same annotations in the business\
    \ code and easily switch between security providers.\n\n- ① Injecting JWT token\
    \ claim\n- ② Injecting whole JWT token used for actual request\n- ③ `RolesAllowed`\
    \ is mapped to the groups claim by default\n- ④ JWT claims are mapped to Jakarta\
    \ WS security context; the user is in all the JWT groups\n\n```java\n@Inject\n\
    @Claim(standard = Claims.iss)\nprivate ClaimValue issuer;①\n@Inject\nprivate JsonWebToken\
    \ jwt; ②\n@POST @Path(\"/signal\")\n@RolesAllowed({\"warden\"}) ③\npublic void\
    \ signal(@Context SecurityContext securityContext, String msg) {\n    String user\
    \ = securityContext.getUserPrincipal().getName();\n    jwt.getGroups().forEach(s\
    \ -> {\n        if (securityContext.isUserInRole(s))\n            System.out.println(user\
    \ + \" is in role \" + s); ④\n    });\n}\n\nListing 8-14\nJAX-RS Resource with\
    \ MP JWT RBAC Support\n```\n\n### Warning\n\nKeep in mind that each request has\
    \ its own bearer JWT token. Always inject `Instance` or `ClaimValue` when working\
    \ with the `@ApplicationScoped` JAX-RS bean.\n\nTo enable MicroProfile JWT support\
    \ in a JAX-RS application, `@LoginConfig` annotation is needed with the `authMethod`\
    \ value, `MP-JWT`.\n\n```java\n@LoginConfig(authMethod = \"MP-JWT\")\n@ApplicationScoped\n\
    public class ProtectedApplication extends Application {\n\nListing 8-15\nJAX-RS\
    \ Enabled to Use MicroProfile JWT RBAC\n```\n\nOnce again, only one simple dependency\
    \ is needed for MP JWT support in Helidon MP with no other third-party transitive\
    \ dependency except the actual MicroProfile API.\n\n```text\nio.helidon.microprofile.jwt\n\
    helidon-microprofile-jwt-auth\n\nListing 8-16\nDependency Needed for MicroProfile\
    \ JWT Authentication Provider\n```"
  raw: '## MicroProfile JWT RBAC


    [MicroProfile JWT specification](https://download.eclipse.org/microprofile/microprofile-jwt-auth-2.1/microprofile-jwt-auth-spec-2.1.html)
    brings CDI-friendly official API for your JAX-RS resources. Let’s manually call
    the JAX-RS watchtower service with cURL.


    ```

    curl -d "http://localhost:8080" \

    -H "Authorization: Bearer $JWT_TOKEN" \

    localhost:8082/watchtower/signal

    Listing 8-12

    Calling MicroProfile JWT Enabled JAX-RS Resource with cURL

    ```


    ![](images/600147_1_En_8_Chapter/600147_1_En_8_Fig6_HTML.png)


    An illustration of a castle gate and a watchtower has the labels castle service
    and watchtower service. They are interconnected via keycloak J W S token and J
    W T issuer''s public key J W K or P E M that is authorized automatically for information
    exchange between the services.


    Figure 8-6


    Service-to-service communication with JWT


    Watchtower service doesn’t have to contact any other service to validate the JWS
    token. All it needs is a public key of the JWT token issuer. Public key content
    can be provided directly with `mp.jwt.verify.publickey` or via link to its location
    with `mp.jwt.verify.publickey.location`. Location can be a file path, classpath,
    or URL. MicroProfile JWT supports the following formats.


    *   JWK


    *   JWKS


    *   PKCS#8 base64 encoded PEM format


    Keycloak exposes JWKS keys at `/realms/my-realm/protocol/openid-connect/certs`,
    for example. When configured, Helidon MP JWT implementation lazily and automatically
    downloads the key set when needed; no other calls are needed since.


    *   ① Value to verify issuer claim


    *   ② Value to verify audiences claim


    *   ③ Load public key for verifying JWS directly from Keycloak as JWKS


    ```

    mp.jwt.verify:

    issuer: "http://${keycloak.host}:${keycloak.port}/realms/beginning-helidon" ①

    audiences: "kingdom-audience" ②

    publickey:

    location: ${mp.jwt.verify.issuer}/protocol/openid-connect/certs ③

    Listing 8-13

    Configuration of MP JWT

    ```


    MicroProfile JWT decodes the bearer JWT token and injects its claims into your
    JAX-RS resource. When you inspect JWT more carefully, you find it implements `java.security.Principal`.
    That is because JsonWebToken is principal accessible with JAX-RS `SecurityContext.getUserPrincipal()`.
    Among others, MP JWT supports `groups` claims, as defined in [RFC-7643](https://www.rfc-editor.org/rfc/rfc7643),
    to propagate authorization data with the JWT token’s principal identity. Yes,
    you can access roles. That is why the specification has RBAC in its name! `SecurityContext.isUserInRole`
    is checked against actual groups from the JWT token, and `@RolesAllowed` works
    too.


    Most identity providers must be configured to add MP JWT claims to the JWT token.
    Keycloak, for example, provides prepared `microprofile-jwt` built-in scope, which,
    when enabled, adds MicroProfile JWT–required `upn` and `groups` scopes.


    Note


    You can stick to the same annotations in the business code and easily switch between
    security providers.


    *   ① Injecting JWT token claim


    *   ② Injecting whole JWT token used for actual request


    *   ③ `RolesAllowed` is mapped to the groups claim by default


    *   ④ JWT claims are mapped to Jakarta WS security context; the user is in all
    the JWT groups


    ```

    @Inject

    @Claim(standard = Claims.iss)

    private ClaimValue issuer;①

    @Inject

    private JsonWebToken jwt; ②

    @POST @Path("/signal")

    @RolesAllowed({"warden"}) ③

    public void signal(@Context SecurityContext securityContext, String msg) {

    String user = securityContext.getUserPrincipal().getName();

    jwt.getGroups().forEach(s -> {

    if (securityContext.isUserInRole(s))

    System.out.println(user + " is in role " + s); ④

    });

    Listing 8-14

    JAX-RS Resource with MP JWT RBAC Support

    ```


    Warning


    Keep in mind that each request has its own bearer JWT token. Always inject `Instance`
    or `ClaimValue` when working with the `@ApplicationScoped` JAX-RS bean.


    To enable MicroProfile JWT support in a JAX-RS application, `@LoginConfig` annotation
    is needed with the `authMethod` value, `MP-JWT`.


    ```

    @LoginConfig(authMethod = "MP-JWT")

    @ApplicationScoped

    public class ProtectedApplication extends Application {

    Listing 8-15

    JAX-RS Enabled to Use MicroProfile JWT RBAC

    ```


    Once again, only one simple dependency is needed for MP JWT support in Helidon
    MP with no other third-party transitive dependency except the actual MicroProfile
    API.


    ```

    io.helidon.microprofile.jwt

    helidon-microprofile-jwt-auth


    Listing 8-16

    Dependency Needed for MicroProfile JWT Authentication Provider

    ```'
  trans: '

    ## MicroProfile JWT RBAC


    [MicroProfile JWT 规范](https://download.eclipse.org/microprofile/microprofile-jwt-auth-2.1/microprofile-jwt-auth-spec-2.1.html)为你的
    JAX-RS 资源带来了对 CDI 友好的官方 API。让我们使用 cURL 手动调用 JAX-RS watchtower 服务。


    ```

    curl -d "http://localhost:8080" \

    -H "Authorization: Bearer $JWT_TOKEN" \

    localhost:8082/watchtower/signal

    Listing 8-12

    Calling MicroProfile JWT Enabled JAX-RS Resource with cURL

    ```


    ![](img/600147_1_En_8_Fig6_HTML.png)


    一幅城堡大门与瞭望塔的示意图标注了 castle service 和 watchtower service。它们通过 keycloak J W S token
    以及 J W T 签发者的公钥 J W K 或 P E M 相互连接，从而在服务之间自动授权进行信息交换。


    图 8-6


    使用 JWT 的服务间通信


    Watchtower 服务无需联系任何其他服务来验证 JWS 令牌。它所需要的只是 JWT 令牌签发者的公钥。公钥内容可以通过 `mp.jwt.verify.publickey`
    直接提供，或者通过 `mp.jwt.verify.publickey.location` 提供其位置链接。该位置可以是文件路径、classpath 或 URL。MicroProfile
    JWT 支持以下格式。


    *   JWK


    *   JWKS


    *   PKCS#8 base64 编码的 PEM 格式


    例如，Keycloak 在 `/realms/my-realm/protocol/openid-connect/certs` 暴露 JWKS 密钥。配置完成后，Helidon
    MP JWT 实现会在需要时惰性且自动地下载该密钥集；此后无需其他调用。


    *   ① 用于校验 issuer 声明的值


    *   ② 用于校验 audiences 声明的值


    *   ③ 通过 JWKS 直接从 Keycloak 加载用于校验 JWS 的公钥


    ```

    mp.jwt.verify:

    issuer: "http://${keycloak.host}:${keycloak.port}/realms/beginning-helidon" ①

    audiences: "kingdom-audience" ②

    publickey:

    location: ${mp.jwt.verify.issuer}/protocol/openid-connect/certs ③

    Listing 8-13

    Configuration of MP JWT

    ```


    MicroProfile JWT 会解码 bearer JWT 令牌，并将其声明注入到你的 JAX-RS 资源中。当你更仔细地检查 JWT 时，会发现它实现了
    `java.security.Principal`。这是因为 JsonWebToken 是可通过 JAX-RS `SecurityContext.getUserPrincipal()`
    访问的 principal。除其他功能外，MP JWT 支持在 [RFC-7643](https://www.rfc-editor.org/rfc/rfc7643)
    中定义的 `groups` 声明，以便随 JWT 令牌的主体身份传播授权数据。是的，你可以访问角色。这正是该规范名称中包含 RBAC 的原因！`SecurityContext.isUserInRole`
    会根据 JWT 令牌中的实际 groups 进行检查，`@RolesAllowed` 也同样有效。


    大多数身份提供商都必须进行配置，以便将 MP JWT 声明添加到 JWT 令牌中。例如，Keycloak 提供了预置的 `microprofile-jwt`
    内建 scope，启用后会添加 MicroProfile JWT 所需的 `upn` 和 `groups` scope。


    注意


    你可以在业务代码中继续使用相同的注解，并轻松在不同安全提供商之间切换。


    *   ① 注入 JWT 令牌声明


    *   ② 注入当前请求使用的完整 JWT 令牌


    *   ③ 默认情况下，`RolesAllowed` 会映射到 groups 声明


    *   ④ JWT 声明会映射到 Jakarta WS 安全上下文；用户属于 JWT 中的所有 groups


    ```

    @Inject

    @Claim(standard = Claims.iss)

    private ClaimValue issuer;①

    @Inject

    private JsonWebToken jwt; ②

    @POST @Path("/signal")

    @RolesAllowed({"warden"}) ③

    public void signal(@Context SecurityContext securityContext, String msg) {

    String user = securityContext.getUserPrincipal().getName();

    jwt.getGroups().forEach(s -> {

    if (securityContext.isUserInRole(s))

    System.out.println(user + " is in role " + s); ④

    });

    Listing 8-14

    JAX-RS Resource with MP JWT RBAC Support

    ```


    警告


    请记住，每个请求都有其自己的 bearer JWT 令牌。在使用 `@ApplicationScoped` 的 JAX-RS Bean 时，务必始终注入 `Instance`
    或 `ClaimValue`。


    要在 JAX-RS 应用程序中启用 MicroProfile JWT 支持，需要使用 `@LoginConfig` 注解，并将 `authMethod` 值设为
    `MP-JWT`。


    ```

    @LoginConfig(authMethod = "MP-JWT")

    @ApplicationScoped

    public class ProtectedApplication extends Application {

    Listing 8-15

    JAX-RS Enabled to Use MicroProfile JWT RBAC

    ```


    再次强调，在 Helidon MP 中启用 MP JWT 支持只需要一个简单依赖，除实际的 MicroProfile API 外，不需要任何其他第三方传递依赖。


    ```

    io.helidon.microprofile.jwt

    helidon-microprofile-jwt-auth


    Listing 8-16

    Dependency Needed for MicroProfile JWT Authentication Provider

    ```

