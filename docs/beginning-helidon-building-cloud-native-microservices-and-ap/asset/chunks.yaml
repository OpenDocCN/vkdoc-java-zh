    MicroProfile Metrics specification defines seven metric types (see Table [4-7](#600147_1_En_4_Chapter.xhtml#Tab7)).


    Table 4-7


    MicroProfile Metric Types


    | Metric Type | Description |

    | --- | --- |

    | Counter | A simple monotonically increasing counter (e.g., number of HTTP requests
    processed over time; see the “Counter” section for more information) |

    | Gauge | A simple numeric value that can increase or decrease (e.g., number of
    concurrent processes, available RAM; see the “Gauge” section for more information)
    |

    | ConcurrentGauge | The number of concurrent invocations over time plus min/max
    over the previous completed minute (see the “Concurrent Gauge” section for more
    information). |

    | Meter | Throughput with rates (see the “Meter” section for more information)
    |

    | Histogram | Distribution of long values (see the “Histogram” section for more
    information) |

    | SimpleTimer | Total elapsed time and a count of samples (see the “Simple Timer”
    section for more information) |

    | Timer | Meter plus histogram of sample times (see the “Timer” section for more
    information) |


    ### Using MicroProfile Metrics API


    MicroProfile metrics provides APIs allowing you to quickly add metrics support
    to your application. It includes *annotations* and *programmatic APIs*. You can
    use either or both. These are different tools with different purposes. The programmatic
    APIs are more powerful. You can do more things with it than with the annotations.
    But the annotations are easier to use and provide enough functionality for most
    cases.


    #### Counter


    The counter is a simple, monotonically increasing value. Its name is self-explanatory.
    Use it to count something and see how this number grows over time. Important to
    understand that the counter cannot decrease.


    On a plane preparing to take off, flight attendants go across the plane and count
    passengers. They are using counting machines to simplify counting. Pressing a
    button on this machine increases the counter by one. Click, click, click, and
    the total number of passengers is displayed. This counting machine is an excellent
    real-life sample of the counter.


    Another sample is an electronic steps counter. You move; it counts your steps.
    This number cannot decrease.


    The most common use case in programming is to count how often your method was
    called. If this method is a JAX-RS handler, you count how many requests were made
    to this endpoint. You can also calculate how many times your business method was
    called.


    ##### Using Annotations


    The MicroProfile Metrics API defines `@Counted` annotation, which introduces a
    counter counting how many times the annotated method has been called. It can be
    placed on a method, a constructor, or a class. While seated on a class, it affects
    all its constructors and non-private methods.


    The `@Counted` annotation can be used without any arguments. The simplest use
    case looks as follows.


    ```

    @GET

    @Counted

    public void counter() {

    // Some logic is here

    }

    ```


    The `@GET` annotation in the snippet is not required and only indicates that the
    method is a JAX-RS resource handler. You can put `@Counted` and other MicroProfile
    Metrics annotations on non-private methods. The only requirement is that your
    class must be a CDI bean, and you invoke this method via its CDI proxy.


    Optionally, users can specify metric metadata such as *name*, *tags*, *displayName*,
    *description*, and *unit* in the annotation parameters.


    To demonstrate it let’s create a slightly more complicated example: a method that
    returns the number of times it’s been called. A complication is that we must access
    our counter inside a method annotated with `@Counted`.


    A solution is to inject the same counter into a class field and use it to get
    the number of calls. There are many ways to get access to all registered metrics.
    Many are covered in this chapter. The next example uses the `@Metric` annotation.
    It injects a metric from the MetricRegistry application with a type of annotated
    field that matches the `@Metric` annotation parameters. If such a metric is not
    found, it gets registered.


    Note


    The `@Metric` annotation can be used on type Meter, Timer, SimpleTimer, Counter,
    and Histogram fields.


    To inject the same metric as used in `@Counted`, Listing [4-6](#600147_1_En_4_Chapter.xhtml#PC23)
    provides the same parameters to `@Metric` annotations.


    ```

    @Inject

    @Metric(name="cntr1", absolute=true)

    Counter counter;

    @GET

    @Counted(name="cntr1", absolute=true,

    description = "Simple annotation-based counter")

    public Long count() {

    return counter.getCount();

    }

    Listing 4-6

    Creating a Counter Using Annotations

    ```


    After running the sample application and triggering its endpoint several times,
    the metric data in OpenMetrics format looks as follows.


    ```

    # TYPE application_cntr1_total counter

    # HELP application_cntr1_total Simple annotation-based counter

    application_cntr1_total 5

    ```


    ##### Using Programmatic API


    MicroProfile Metrics has a rich programmatic API that can be used stand-alone
    or in combination with annotations. The `Counter` class was used in the previous
    example. Listing [4-7](#600147_1_En_4_Chapter.xhtml#PC26) demonstrates how to
    reproduce the same functionality using pure programmatic API.


    The key class in the programmatic API is `MetricRegistry`. It belongs to a metric
    scope and holds all metrics of this scope. There are three `MetricRegistry` objects:
    for base, vendor, and application scopes. You’ll use the application scope `MetricRegistry`
    the most. `MetricRegistry` is used to register and retrieve metrics. It has a
    variety of double-purpose methods for it. For example, overloaded `counter(...)`
    methods retrieve or register a counter if it doesn’t exist in the registry.


    The only way to obtain `MetricRegistry` is by injecting it. By default, the application
    registry is injected. If you want to inject a registry of another scope, use the
    `@RegistryType` annotation specifying a desired scope.


    ```

    @Inject

    @RegistryType(type = Type.VENDOR)

    MetricRegistry metricRegistry;

    ```


    Let’s come back to our sample. The logic is as follows.


    1.  Use constructor injection to inject `MetricRegistry`.


    2.  Pass injected registry to the `createCounter` method, which creates a counter
    and registers it in the metric registry.


    3.  The `GET` handler increases the counter using `counter.inc()` and returns
    its current value using `counter.getCount()`.


    *   ① Class field holding the counter


    *   ② Using constructor injection to inject `MetricRegistry`


    *   ③ Creating a tag


    *   ④ Creating metadata


    *   ⑤ Registering the counter and assigning it to a class field


    *   ⑥ Increasing the counter


    *   ⑦ Returning the current counter value


    ```

    private Counter counter;                                ①

    @Inject                                                 ②

    public CounterProgrammaticResource(MetricRegistry

    metricRegistry) {

    createCounter(metricRegistry);

    }

    private void createCounter(MetricRegistry

    metricRegistry) {

    Tag tag = new Tag("method", "programmatic");        ③

    Metadata metadata = Metadata.builder()              ④

    .withName("cntr2")

    .build();

    counter = metricRegistry.counter(metadata, tag);    ⑤

    }

    @GET

    public Long counterProgrammatic() {

    counter.inc();                                      ⑥

    return counter.getCount();                          ⑦

    }

    Listing 4-7

    Creating a Counter Using Programmatic API

    ```


    #### Gauge


    *Gauge* is a simple numeric value that can increase or decrease. It’s different
    from the counter, which can only increase. A good sample of the gauge is the temperature
    in the room. It changes up and down during the day. A more technical example is
    available RAM or the number of concurrent processes.


    Gauge is the only metric type that doesn’t store, aggregate, or process the measurement.
    It only takes a value available in your application and passes it to Prometheus
    or any other external metrics processing system.'
