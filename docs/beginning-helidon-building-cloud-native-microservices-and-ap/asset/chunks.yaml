- fmt: '## Using Annotations


    MicroProfile Metrics API defines `@Gauge` annotation. It can be placed only on
    methods. It defines a gauge based on the value this method returns. The value
    can be any type, but Prometheus accepts only numeric values for gauges, so you
    must use numeric types if you plan to use Prometheus for data collection.


    `@Gauge` annotation doesn’t provide the default value for `unit`. Users are required
    to specify it explicitly.


    Technically, the `@Gauge` annotation only tells the system that the gauge value
    is obtained as a return value of the annotated method.


    Listing [4-8](#600147_1_En_4_Chapter.xhtml#PC27) is a method returning some measurements.
    In this case, it’s just a random number between 0 and 100, but it can be something
    more meaningful. This method is annotated with `@Gauge` with the name `gauge1`.
    When you obtain metrics, the gauge returns a new random number.


    ```java

    @Gauge(name = "gauge1",

    absolute = true,

    description = "Simple annotation-based gauge",

    unit = MetricUnits.NONE)

    public Integer measurement() {

    return random.nextInt(100);

    }

    Listing 4-8

    Creating a Gauge Using Annotations

    ```


    ## Using Programmatic APIs


    There are similar steps for working with gauge metric programmatically, as described
    earlier on how it works with counters. There is one difference, though. When registering
    a gauge in your metric registry, you must specify a lambda reference, `Supplier`,
    or `Function` responsible for providing the gauge value.


    Here is an implementation of a random gauge using programmatic API.


    - ① Injecting `MetricRegistry` using constructor injection

    - ② Creating a gauge

    - ③ Method returning the measurement


    ```java

    private Random random = new Random();

    @Inject                                                 ①

    public GaugeProgrammaticResource(

    MetricRegistry metricRegistry) {

    metricRegistry.gauge("gauge2", this::measurement);  ②

    }

    public Integer measurement() {                          ③

    return random.nextInt(100);

    }

    Listing 4-9

    Creating a Gauge Using Programmatic API

    ```


    ## Concurrent Gauge


    The concurrent gauge metric is used to count parallel invocations of methods.
    It means how many concurrent threads are executing this method at a single moment.
    It’s the first multi-value metric from what we’ve studied so far. Besides the
    current number of concurrent invocations, it also contains its highest and lowest
    values from the previous full completed minute.


    ### Note


    The previous full completed minute is different from the last 60 seconds. It’s
    better to explain it by example. If the sample time is `8:32:36` (`8 a.m., 32
    minutes, 36 seconds`), the last full completed minute is an interval from `8:31:00`
    until (but not including) `8:32:00`.


    ### Table 4-8


    Concurrent Gauge Metric Data


    | Description | OpenMetrics Suffix | JSON Format Field | `ConcurrentGauge` Class
    Method |

    | --- | --- | --- | --- |

    | Number of concurrent invocations | `current` | `current` | `getCount()` |

    | Highest concurrent invocations number for the last complete full minute | `max`
    | `max` | `getMax()` |

    | Lowest concurrent invocations number for the last complete full minute | `min`
    | `min` | `getMin()` |


    ## Using Annotations


    MicroProfile Metrics API defines the `@ConcurrentGauge` annotation. It can be
    placed on a method, constructor, and class. While placed on a class, it affects
    all its constructors and non-private methods.


    `@ConcurrentGauge` annotations don’t have any required parameters. Listing [4-10](#600147_1_En_4_Chapter.xhtml#PC29)
    adds some metadata to make it more readable in the output file.


    It creates a method that does nothing but sleeps for 20 seconds. To get some results,
    you must call its REST endpoint within 20 seconds using different instances of
    `curl`. You can do it by opening new tabs in your terminal application.


    ```java

    @GET

    @ConcurrentGauge(name="cgauge1",

    absolute=true,

    description = "Simple annotation-based concurrent gauge")

    public void concurrentGauge() throws InterruptedException {

    Thread.sleep(20 * 1000);

    }

    Listing 4-10

    Creating a Concurrent Gauge Using Annotations

    ```


    In OpenMetrics format, the output for `cgauge1` looks as follows.


    ```text

    # TYPE application_cgauge1_current gauge

    # HELP application_cgauge1_current Simple annotation-based concurrent gauge

    application_cgauge1_current 1

    # TYPE application_cgauge1_min gauge

    application_cgauge1_min 0

    # TYPE application_cgauge1_max gauge

    application_cgauge1_max 2

    ```


    ## Using Programmatic API


    Now let’s learn how to use the concurrent gauge using programmatic APIs. MicroProfile
    Metrics has a class `ConcurrentGauge`, which is used to work with concurrent gauges.
    It holds a count of concurrent invocation internally and has methods `inc()` and
    `dec()` to increase and decrease it. It also has methods to retrieve all concurrent
    gauge metrics data.


    - ① Constructor injection of `MetricRegistry`

    - ② Creating concurrent gauge

    - ③ Increasing the gauge before starting the operation to measure

    - ④ Measured business logic (`sleeping` in our case)

    - ⑤ Decreasing the gauge value when the measured operation is completed (It is
    done in the final block, so the gauge is decreased regardless of the operation’s
    success.)


    ```java

    @ApplicationScoped

    @Path("/concurrentgauge/programmatic")

    public class CGaugeProgrammaticResource {

    ConcurrentGauge concurrentGauge;

    @Inject

    public CGaugeProgrammaticResource(MetricRegistry registry) {                                            ①

    concurrentGauge = registry

    .concurrentGauge("cgauge", new Tag("method", "programmatic"));                           ②

    }

    @GET

    public void concurrentGauge() {

    concurrentGauge.inc();                          ③

    try {

    Thread.sleep(20 * 1000);                    ④

    } catch (InterruptedException e) {

    throw new RuntimeException(e);

    } finally {

    concurrentGauge.dec();                      ⑤

    }

    }

    }

    Listing 4-11

    Creating a Concurrent Gauge Using Programmatic API

    ```'
