- fmt: '## Using Annotations


    MicroProfile Metrics API defines `@Metered` annotation to work with meters. It
    can be placed on a method, constructor, and class. While placed on a class, it
    affects all its constructors and non-private methods.


    For each method/constructor annotated with `@Metered`, a metric is created and
    registered in the application metric registry. Each time the method is invoked,
    the meter is marked.


    Listing [4-14](#600147_1_En_4_Chapter.xhtml#PC34) is a simple sample that returns
    a random number. It’s annotated with `@Metered`, so the `mtr1` metric collects
    this method throughput.


    ```

    @GET

    @Metered(name = "mtr1",

    absolute = true,

    description = "Simple annotation-based meter")

    public String meteredMethod() {

    ...

    }

    Listing 4-14

    Creating a Meter Using Annotations

    ```


    After triggering the metered method several times, the `mtr1` metric produces
    an output similar to the following.


    ```

    # TYPE application_mtr1_total counter

    # HELP application_mtr1_total Simple annotation-based meter

    application_mtr1_total 15

    # TYPE application_mtr1_rate_per_second gauge

    application_mtr1_rate_per_second 0.13889050670608735

    # TYPE application_mtr1_one_min_rate_per_second gauge

    application_mtr1_one_min_rate_per_second 0.22974035264337553

    # TYPE application_mtr1_five_min_rate_per_second gauge

    application_mtr1_five_min_rate_per_second 0.049149433089204296

    # TYPE application_mtr1_fifteen_min_rate_per_second gauge

    application_mtr1_fifteen_min_rate_per_second 0.016571380739795517

    ```


    ## Using Programmatic APIs


    MicroProfile Metrics API contains the `Meter` class, which is used to work with
    meters. It has methods `mark()` and `mark(long)`, which increase the number of
    hits by one and by a specified value accordingly. It also contains methods to
    retrieve all calculated rates.


    The `MetricRegistry` class contains methods `meter(String)` and `meter(Metadata)`,
    which are used to register and retrieve meters.


    Listing [4-15](#600147_1_En_4_Chapter.xhtml#PC36) demonstrates creating a meter
    named `mtr2` and a method that marks a hit and returns the meter’s mean rate.


    ```

    @ApplicationScoped

    @Path("/meter/programmatic")

    public class MeterProgrammaticResource {

    private Meter meter;

    @Inject

    public MeterProgrammaticResource(MetricRegistry metricRegistry) {

    meter = metricRegistry.meter("mtr2");

    }

    @GET

    public double meterProgrammatic() {

    meter.mark();

    return meter.getMeanRate();

    }

    }

    Listing 4-15

    Creating a Meter Using Programmatic API

    ```


    ## Simple Timer


    The simple timer is a metric recording method execution times. It’s a complex
    metric that includes the total number of executions, elapsed time, and highest
    and lowest time for the last complete full minute.


    Table 4-11


    Simple Timer Metric Data


    | Description | OpenMetrics Suffix | JSON Format Field | SimpleTimer Class Method
    |

    | --- | --- | --- | --- |

    | Number of executions | `total` | `count` | `getCount()` |

    | Elapsed time | `elapsedTime_seconds` | `elapsedTime` | `getElapsedTime()` |

    | Highest time for the last complete full minute | `maxTimeDuration_seconds` |
    `maxTimeDuration` | `getMaxTimeDuration()` |

    | Lowest time for the last complete full minute | `minTimeDuration_seconds` |
    `minTimeDuration` | `getMinTimeDuration()` |


    ### Note


    In OpenMetrics format, `elapsedTime`, `maxTimeDuration`, and `minTimeDuration`
    metrics are produced in seconds and JSON format in nanoseconds.


    MicroProfile Metric provides annotations and programmatic APIs to work with simple
    timer metrics.


    ### Using Annotations


    MicroProfile Metrics API defines the `@SimplyTimed` annotation. It can be placed
    on a method, constructor, and class. While placed on a class, it affects all its
    constructors and non-private methods. The `@SimplyTimed` annotation doesn’t have
    any required parameters.


    Listing [4-16](#600147_1_En_4_Chapter.xhtml#PC37) is a method that sleeps a random
    time between 0 and 5 seconds and uses the `@SimplyTimed` annotation.


    ```

    @GET

    @SimplyTimed(name="stmr1",

    absolute=true,

    description = "Simple timer using annotations")

    public void simpleTimer() throws InterruptedException {

    Thread.sleep(random.nextInt(5000));

    }

    Listing 4-16

    Creating a Simple Timer Using Annotations

    ```


    The output in OpenMetrics format looks similar to the following.


    ```

    # TYPE application_stmr1_total counter

    # HELP application_stmr1_total Simple timer using annotations

    application_stmr1_total 4

    # TYPE application_stmr1_elapsedTime_seconds gauge

    application_stmr1_elapsedTime_seconds 5.011884846

    # TYPE application_stmr1_maxTimeDuration_seconds gauge

    application_stmr1_maxTimeDuration_seconds 2

    # TYPE application_stmr1_minTimeDuration_seconds gauge

    application_stmr1_minTimeDuration_seconds 0

    ```


    ### Using Programmatic API


    MicroProfile Metrics API has a class `SimpleTimer`, which is used to work with
    simple timers. It can be obtained the same way as other metric classes using one
    of the overloaded `simpleTimer` methods of the `MetricRegistry` class.


    There are several ways how to use simple timer metric programmatically.


    - Make the method you want to time `Callable` and use `SimpleTimer.time(Callable)`
    to run and time it.

    - Make the method you want to time `Runnable` and use `SimpleTimer.time(Runnable)`
    to run and time it.

    - Time your method manually and update your simple timer using `SimpleTimer.update(Duration)`.

    - Use `Context context = SimpleTimer.time()` to start timing your method, execute
    all logic that needs to be timed and call `context.close()` when it’s finished
    to update your metric.


    Listing [4-17](#600147_1_En_4_Chapter.xhtml#PC39) demonstrates using a `Runnable`
    object with a simple timer.


    ```

    @ApplicationScoped

    @Path("/simpletimer/programmatic")

    public class SimpleTimerProgrammaticResource {

    private Random random = new Random();

    private SimpleTimer simpleTimer;

    @Inject

    public SimpleTimerProgrammaticResource(MetricRegistry metricRegistry) {

    createSimpleTimer(metricRegistry);

    }

    @GET

    public void simpleTimer() {

    Runnable runnable = () -> {

    try {

    Thread.sleep(random.nextInt(5000));

    } catch (InterruptedException e) {

    throw new RuntimeException(e);

    }

    };

    simpleTimer.time(runnable);

    }

    private void createSimpleTimer(MetricRegistry metricRegistry) {

    Metadata metadata = Metadata.builder()

    .withName("stmr2")

    .withDescription("Simple timer programmatic")

    .withType(MetricType.SIMPLE_TIMER)

    .build();

    simpleTimer = metricRegistry.simpleTimer(metadata);

    }

    }

    Listing 4-17

    Using Programmatic API to Create a Simple Timer

    ```'
