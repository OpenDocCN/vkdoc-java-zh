    ### Nack 策略


    Kafka 连接器支持多种 Nack 策略。


    *   **终止通道（Kill channel）** 是默认策略；当消息被 Nack 时，整个通道会被终止。


    *   **死信队列（DLQ）** 会将消息重新发送到预配置的死信队列，然后进行 Ack。


    *   **仅记录日志（Log）** 仅记录错误并 Ack 该消息。


    默认情况下，通道会因 Nack 消息而被终止。当需要重新投递时，这是理想的行为。消息健康探针可以检测到被终止的通道，K8s 会重启 Pod。如果重启的 Pod
    没有定义消费者组 ID（主题）且 `auto.offset.reset` 设置为 `latest`，或者它是使用该组 ID 的单个 Pod，那么它会从同一条消息开始恢复。当多个
    Pod 使用相同的消费者组 ID 时，在重平衡后，该消息会立即被重新投递给具有相同组 ID 的其中一个 Pod。


    当需要将未处理的消息发送到死信队列时，可以使用 DLQ Nack 策略。


    *   ① 用于在同一 Broker 上发送错误消息的 DLQ 主题


    ```

    mp.messaging:

    incoming:

    from-kafka:

    nack-dlq: my-dlq-topic  ①

    清单 13-56

    DLQ Nack 策略配置

    ```


    当仅配置了 DLQ 主题的名称时，将使用与接收消息时相同的 Broker 配置（包括序列化器）。序列化器根据传入连接的*反序列化器*按以下模式派生：在反序列化器的简单类名中，将
    `Deserializer` 替换为 `Serializer`。当此类存在时，无需为 DLQ 配置序列化器。


    *   ① 自定义 DLQ Kafka Broker 的配置


    *   ② DLQ 的自定义序列化器


    ```

    serializer.pkg: org.apache.kafka.common.serialization

    mp.messaging:

    incoming:

    from-kafka:

    nack-dlq:

    topic: my-dlq-topic-on-other-broker

    bootstrap.servers: localhost:9092  ①

    key.serializer: ${serializer.pkg}.StringSerializer  ②

    value.serializer: ${serializer.pkg}.StringSerializer

    清单 13-57

    DLQ Nack 策略高级配置

    ```


    仅记录日志的 Nack 策略会简单地记录异常并对被 Nack 的消息进行 Ack。被 Nack 的消息会被丢弃，偏移量被提交，通道可以继续消费后续消息。


    ```

    mp.messaging:

    incoming:

    from-kafka:

    nack-log-only: true

    清单 13-58

    仅记录日志的 Nack 策略配置

    ```


    ## JMS 连接器


    JMS 代表 Java 消息服务（Java Message Service），是一个基于 Java 的消息传递 API，用于创建、发送和接收消息。JMS 提供了消息传递的高级抽象，允许多个供应商通过相同的
    API 提供消息传递服务。JMS 已成为企业界广泛采用的消息传递标准，包括 Oracle WebLogic、Oracle AQ、IBM MQ、Apache
    ActiveMQ 和 JBoss Messaging 在内的许多消息传递产品都实现了 JMS API。基于 JMS 的这种多功能性，用于响应式消息传递的连接器同时为许多消息代理打开了大门。


    ```

    io.helidon.messaging.jms

    helidon-messaging-jms


    清单 13-59

    JMS 连接器依赖

    ```


    ### 注入的 ConnectionFactory


    虽然 JMS 规范严重依赖 JNDI，但 Helidon 连接器支持无 JNDI 的方法，可以直接将 `ConnectionFactory` 作为 CDI
    Bean 提供。Helidon MP 是一个符合 [CDI 3.​0](https://jakarta.ee/specifications/cdi/3.0/jakarta-cdi-spec-3.0.html)
    规范的注入框架。通过 CDI 生产者方法或字段，从实例化的连接工厂创建 Bean 非常简单。


    *   ① 注入自定义配置的 Broker URL


    *   ② 将方法标记为 Bean 生产者


    *   ③ `ConnectionFactory` Bean 必须命名，以便在消息传递配置中引用


    ```

    @Inject

    @ConfigProperty(name = "jms.broker-url")

    private String brokerUrl;  ①

    @Produces  ②

    @ApplicationScoped  ③

    @Named("activemq-cf")  ④

    public ConnectionFactory connectionFactory() {

    return new ActiveMQConnectionFactory(brokerUrl);

    }

    清单 13-60

    将 JMS ConnectionFactory 作为 Bean 提供

    ```


    当你创建了一个名为 `activemq-cf` 的 `ConnectionFactory` Bean 后，你可以简单地在消息传递配置中引用它。


    *   ① `ConnectionFactory` 初始化需要手动配置


    *   ② 使用名为 `activemq-cf` 的 Bean 作为 JMS `ConnectionFactory`


    *   ③ 用于创建 JMS 连接的用户名和密码


    ```

    jms.broker-url: tcp://localhost:61616  ①

    mp.messaging:

    connector:

    helidon-jms:

    named-factory: activemq-cf  ②

    user: frank  ③

    password: secret1234

    清单 13-61

    在 JMS 连接器中使用 ConnectionFactory Bean

    ```


    ### 通过 JNDI 查找 ConnectionFactory


    可以通过 JNDI 查找提供 `ConnectionFactory`，初始的 JNDI 环境属性可以通过 `jndi.env-properties` 配置。实际连接工厂的
    JNDI 名称需要通过 `jndi.jms-factory` 配置。


    *   ① 用于创建 JMS 连接的用户名和密码


    *   ② `ConnectionFactory` 的 JNDI 名称


    *   ③ 用于创建 JNDI 初始上下文的环境属性


    ```

    mp.messaging:

    connector:

    helidon-jms:

    user: frank  ①

    password: secret123

    jndi:

    jms-factory: ConnectionFactory  ②

    env-properties:  ③

    java.naming:

    factory.initial: org.apache.activemq.jndi.ActiveMQInitialContextFactory

    provider.url: tcp://localhost:61616

    清单 13-62

    配置 Helidon 消息传递连接器

    ```


    ### 目标（Destination）


    要选择要发布或消费的队列或主题，您必须使用 `destination` 配置属性配置供应商特定的目标名称，或者使用 `jndi.destination` 配置
    JNDI 目标标识符。供应商特定的目标既适用于注入的连接工厂，也适用于 JNDI 查找的连接工厂，而 JNDI 目标配置仅适用于 JNDI 查找的连接工厂。


    供应商特定的目标名称是一种无需使用 JNDI 即可通过 JMS API 识别目标的方式。所有 JMS 供应商都提供自己的语法来选择适当的队列或主题，例如 ArtemisMQ
    有自己的[地址模型](https://activemq.apache.org/components/artemis/documentation/2.1.0/address-model.html)（包含
    FQQN，即完全限定队列名称），WebLogic JMS 有 CDI（创建目标标识符），IBM MQ 使用 [URI（统一资源标识符）](https://www.ibm.com/docs/en/ibm-mq/9.3%253Ftopic%253Dapplications-creating-destinations-in-jms-application)。


    *   ① ActiveMQ 特定的 JNDI 队列注册


    *   ② 供应商特定的目标标识符


    *   ③ JNDI 目标标识符


    ```

    activemq-cf: org.apache.activemq.jndi.ActiveMQInitialContextFactory

    mp.messaging:

    connector.helidon-jms:

    jndi:

    jms-factory: ConnectionFactory

    env-properties:

    java.naming.factory.initial: ${activemq-cf}

    java.naming.provider.url: tcp://127.0.0.1:61616

    queue.TestQueue1: TestQueue1  ①

    outgoing:

    toJms:

    connector: helidon-jms

    destination: TestQueue1  ②

    type: queue

    incoming:

    fromJms:

    connector: helidon-jms

    jndi.destination: queue.TestQueue1  ③

    type: queue

    清单 13-63

    使用或不使用 JNDI 配置目标

    ```


    ### 消息（Message）


    由 `JMSConnector` 提供的响应式消息通过特殊的 JMS 特定方法进行了扩展。为了创建出站消息，可以使用一个便捷的 JMS 消息构建器。


    *   ① JMS 连接产生标准响应式消息传递 `Message` 的扩展


    *   ② `JmsMessage` 提供 JMS 特定功能；您可以访问原始的 `JMSMessage` 对象


    *   ③ JMS 属性是泛型类型的


    *   ④ 链式确认，当出站消息被 Ack 时，对入站消息进行 Ack


    ```

    @Incoming("from-jms")

    @Outgoing("to-jms")

    public Message process(JmsMessage incomingMsg) {  ①

    jakarta.jms.Message original = incomingMsg.getJmsMessage();  ②

    jakarta.jms.Session session = incomingMsg.getJmsSession();

    String propertyValue = incomingMsg.getProperty("my-jms-property");  ③

    return JmsMessage.builder(incomingMsg.getPayload())

    .property("my-jms-property", propertyValue.toUpperCase())

    .onAck(incomingMsg::ack)  ④

    .build();

    }

    清单 13-64

    从入站 JMS 消息创建新的 JMS 消息

    ```

