    清单 8-7 为特定 JAX-RS 方法定义了所需角色和身份认证。可以通过安全键 `security.jersey.enabled` 禁用 JAX-RS 端点安全。


    安全注解并不会把你的安全配置“写死”。可以通过映射到实际路径的 Helidon 配置来覆盖安全设置，方式如下。


    *   ① 应用于所有路径的属性


    *   ② 应用安全配置的通配路径


    ```

    security:

    web-server:

    defaults:    ①

    authenticate: false

    paths:

    - path: "/castle/gate[/{*}]" ②

    authenticate: true

    roles-allowed: [ "gate-keeper", "warden" ]

    - path: "/castle[/{*}]"

    methods: [ "get" ]

    authenticate: true

    roles-allowed: "warden"

    Listing 8-8

    JAX-RS Methods Secured by Configuration

    ```


    还需要一个实际的安全提供者才能让它运行起来。


    ## 基本认证


    基本认证是最简单的方式，但在生产环境中并不十分实用或安全。基本访问认证的薄弱点在于：它通过授权 HTTP 头以 base64 编码的“用户名:密码”形式传递未加密密码。例如，`Basic
    am9lbDpqb2Vs` 这样的授权头可以很容易被解码为 `joel:joel`。


    在不使用 TLS 的情况下，任何人都可以轻易截获我们的密码。当访问请求未携带该请求头时，端点会返回 `401 Unauthorized`，并在 `WWW-Authenticate`
    头中填充 `Basic realm="beginning-helidon"`。客户端随后就知道需要基本认证。浏览器通常会显示一个简单的登录对话框，并在用户提供用户名和密码后，带着填充好的授权头重试请求。


    ![](img/600147_1_En_8_Fig5_HTML.jpg)


    登录对话框截图。包含 localhost URL、用户名和密码输入框，右下角有取消和登录按钮。


    图 8-5


    浏览器中的基本认证对话框


    *   ① 启用 ABAC 提供者


    *   ② 启用 basic auth 提供者


    *   ③ 从配置读取用户存储


    ```

    security:

    providers:

    - abac: ①

    - http-basic-auth: ②

    realm: "beginning-helidon"

    users: ③

    - login: "gyles"

    password: "gyles"

    roles: ["gate-keeper"]

    - login: "alad"

    password: "alad"

    roles: ["flag-keeper"]

    - login: "joel"

    password: "joel"

    roles: ["warden"]

    Listing 8-9

    Basic Authentication Configuration

    ```


    带有角色和密码的用户由用户存储提供。清单 8-9 中展示的是最简单的用户存储。另一种提供自定义用户存储的方法是通过服务定位器实现 `io.helidon.security.providers.httpauth.spi.UserStoreService`。


    注意


    用户存储会注册为服务提供者。如果你使用的是基于 classpath 的项目，请创建一个提供者配置文件，内容为 `my.package.MyCustomUserStoreService`。


    `META-INF/services/io.helidon.security.providers.httpauth.spi.UserStoreService`


    配置运行时会通过服务加载器机制找到你的转换器。


    在基于 JPMS 模块的项目中注册服务提供者时，别忘了使用 `module-info.java`。只需在 `module-info.java` 中添加 `provides`
    `io.helidon.security.providers.httpauth.spi.UserStoreService` with `my.package.MyCustomUserStoreService`;
    子句即可。


    在 Helidon MP 中启用 basic auth 支持只需要一个简单依赖，不需要其他第三方传递依赖。


    ```

    io.helidon.security.providers

    helidon-security-providers-http-auth


    Listing 8-10

    Dependency Needed for Basic Authentication Provider

    ```

