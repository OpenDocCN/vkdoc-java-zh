- fmt: "## OpenID Connect\n\nLet’s look at a more serious approach to solve authentication\
    \ and authorization to make our castle security more professional and production\
    \ ready. Our example uses the Keycloak identity manager with single sign-on (`SSO`).\
    \ Identity managers are stand-alone services for managing users and their attributes,\
    \ like roles. Identity managers usually provide authentication and authorization\
    \ services over protocols like old-timer XML-based `SAML` (`Security Assertion\
    \ Markup Language`) or modern and popular `OIDC`.\n\nJSON-based `OIDC` is an extension\
    \ of `OAuth 2.0`, adding the means of authentication. `OIDC` is a protocol over\
    \ which authentication and authorization are realized with JSON-based REST API.\
    \ When a client doesn’t have a proper identity `JWT` token, the Helidon application\
    \ with `OIDC` support redirects the call to the Keycloak `SSO` page. Users can\
    \ sign in with their credentials to obtain the authorization code needed by the\
    \ Helidon application and the client ID and client secret to obtain a `JWT` identity\
    \ token.\n\n![](images/600147_1_En_8_Chapter/600147_1_En_8_Fig7_HTML.png)\n\n\
    A diagram of the steps between a client laptop and a program server with a keycloak\
    \ manager. It includes get slash protected, `307 temporary redirect`, `S S O login`,\
    \ `302 found authorization code`, get slash `o i d c` slash redirect, post slash\
    \ realms, access and `i d tokens`, set cookie, and `200 OK`.\n\n### Figure 8-7\n\
    \nHelidon with Keycloak as identity manager\n\n- ① Accesses protected resources\
    \ without `JWT ID`\n- ② Helidon redirects the unauthenticated request to the Keycloak\
    \ `SSO` login page with `307`\n- ③ After a successful `SSO` login, the client\
    \ obtains an authorization code\n- ④ Client is redirected back to Helidon special\
    \ resource`/oidc/redirect` with authorization code\n- ⑤ Helidon uses the authorization\
    \ code, client ID, and client secret to obtain `JWT` identity token\n- ⑥ Client\
    \ uses `JWT` identity token as `JSESSIONID` for subsequent calls\n\nWhile the\
    \ authorization code is obtained by `SSO` login, the client ID and secret are\
    \ configured with the application’s `OIDC` configuration and used for basic authorization\
    \ during token requests.\n\nLet’s use Keycloak as an identity manager for our\
    \ castle example. All you need to do is configure the `OIDC` security provider\
    \ with the client secret, the Keycloak URL, and the client ID. Notice that we\
    \ have added `RBAC` capability by adding a `microprofile-jwt` scope mapper for\
    \ the `groups` claim in the Keycloak. You don’t need any special support for MicroProfile\
    \ `JWT RBAC` on the Helidon side because the `groups` claim is used for fetching\
    \ subject groups by default if available (can be disabled with `oidc.use-jwt-groups:\
    \ false`).\n\n- ① Adds `abac` provider\n- ② Audience to compare with the one inside\
    \ the `JWT` token so the issuer’s certificate can be reused\n- ③ Identifies the\
    \ client for identity manager\n- ④ Uses as password for basic authorization when\
    \ requesting `JWT` token from `OIDC` identity manager\n- ⑤ Where should the identity\
    \ manager redirect back from the `SSO` page\n\n``` \nkeycloak:\nhost: localhost\n\
    port: 8979\nsecurity:\nproviders:\n- abac: ①\n- oidc:\naudience: \"kingdom-audience\"\
    \ ②\nclient-id: \"beginning-helidon-client\" ③\nredirect: true\n# Client secret\
    \ is updated by startKeycloak.sh\nclient-secret: pYSJjHAymzLqw61x7bsePp4AR6GVdC1s\
    \ ④\nidentity-uri: \"${keycloak.url}/realms/beginning-helidon\"\nfrontend-uri:\
    \ \"http://localhost:${server.port}\" ⑤\nlogout-enabled: true\npost-logout-uri:\
    \ /\nListing 8-17\nKeycloak OIDC Configuration\n```\n\nYou can switch security\
    \ providers by changing configuration and dependency, while the annotated example\
    \ resource stays the same. Business code doesn’t need to change between the test\
    \ and production environment.\n\n```\nio.helidon.microprofile\nhelidon-microprofile-oidc\n\
    \nListing 8-18\nDependency Needed for OIDC Support\n```\n\n## Token Propagation\n\
    \nAfter learning about the `JWT` bearer token and how to authenticate and even\
    \ authorize against it with our web server, the next logical step is sending it\
    \ with a client call. Most of the security providers in Helidon support outbound\
    \ security. Unlike inbound, which secures web resources, outbound helps with client\
    \ calls to other services. When discussing clients in Helidon MP, `JAX-RS` client\
    \ or MicroProfile Rest client should be the first and best choice. But how do\
    \ you propagate the `JWT` token you have received in our `JAX-RS` resource? You\
    \ can most certainly access the bearer token. It can come within the `Authorize`\
    \ header or `JSSESSIONID` cookie.\n\n```\n@POST\n@Path(\"/send-signal\")\npublic\
    \ Response signalToWatchTower(@CookieParam(\"JSESSIONID\") Cookie cookie) {\n\
    Response res = ClientBuilder.newBuilder()\n.register(OAuth2ClientSupport.feature(cookie.getValue()))\n\
    ...\nListing 8-19\nRaw JWT Token from Cookies Propagated Manually to Jersey JAX-RS\
    \ Client\n```\n\nAnother more elegant approach is to use the MicroProfile `JWT`\
    \ support in Helidon and access raw `JWT` tokens over injected API. Remember that\
    \ the `JWT` token is request-specific, but `CDI` injected `JsonWebToken` proxy\
    \ is updated according to your request context on the fly.\n\n```\n@Inject\nJsonWebToken\
    \ jwt;\n@POST\n@Path(\"/send-signal\")\npublic Response signalToWatchTower() {\n\
    Response res = ClientBuilder.newBuilder()\n.register(OAuth2ClientSupport.feature(jwt.getRawToken()))\n\
    ...\nListing 8-20\nInjected JWT Token Propagated Manually to Jersey JAX-RS Client\n\
    ```\n\nSuch approaches are very explicit, but must you repeat this every time\
    \ you use a `JAX-RS` client? You don’t because Helidon provides an implicit configurable\
    \ solution in the shape of outbound security of relevant security providers.\n\
    \n- ① Enables `JWT` token propagation to the clients\n- ② Arbitrary name for the\
    \ outbound configuration; choose any application-wide unique name\n- ③ Filters\
    \ target hosts to propagate to; supports wildcards\n\n```\nsecurity:\nproviders:\n\
    - abac:\n- oidc:\naudience: \"kingdom-audience\"\nclient-id: \"beginning-helidon-client\"\
    \nredirect: true\nclient-secret: 9rnQEI3gV6FuBMk41UeYqYfNlCutgaN1\nidentity-uri:\
    \ \"${keycloak.url}/realms/beginning-helidon\"\nfrontend-uri: \"${app.castle-url}\"\
    \nlogout-enabled: true\npost-logout-uri: /\npropagate: true ①\noutbound:\n- name:\
    \ \"propagate-token\" ②\nhosts: [\"watchtower.local\"] ③\nListing 8-21\nEnabled\
    \ JWT Token Propagation with OIDC Security Provider\n```\n\nThe bearer token is\
    \ used automatically for specified hosts whenever you use a `JAX-RS` client from\
    \ a secured context with propagation. Outbound propagates a token to all hosts\
    \ when the `hosts` config is missing. Host filtering supports wildcards to match\
    \ subdomains easily `hosts: [\"*.local\"]` allow `JWT` token propagation to both\
    \ `watchtower.local` and `castle.local` hosts.\n\n- ① No need to provide `JWT`\
    \ token manually with `OIDC` provider outbound propagation\n- ② Hosts `watchtower.local`\
    \ matches to allow hosts for propagation\n\n```\n@POST\n@Path(\"/send-signal\"\
    )\npublic Response signalToWatchTower() {\nResponse res = ClientBuilder.newBuilder()\
    \ ①\n.target(\"http://watchtower.local:8082/watchtower\") ②\n.path(\"/signal\"\
    )\n...\nListing 8-22\nAutomatic JWT Propagation with JAX-RS Client and OIDC Provider\
    \ Outbound\n```\n\n`OIDC` token flow gets easy with Helidon because you can control\
    \ service-to-service token propagation simply by configuration. There is much\
    \ more than a security provider’s outbound feature can do. It is not only good\
    \ for `JWT` token propagation. You can define your headers or create and sign\
    \ a brand-new `JWT` token!"
  raw: '## OpenID Connect


    Let’s look at a more serious approach to solve authentication and authorization
    to make our castle security more professional and production ready. Our example
    uses the Keycloak identity manager with single sign-on (SSO). Identity managers
    are stand-alone services for managing users and their attributes, like roles.
    Identity managers usually provide authentication and authorization services over
    protocols like old-timer XML-based SAML (Security Assertion Markup Language) or
    modern and popular OIDC.


    JSON-based OIDC is an extension of OAuth 2.0, adding the means of authentication.
    OIDC is a protocol over which authentication and authorization are realized with
    JSON-based REST API. When a client doesn’t have a proper identity JWT token, the
    Helidon application with OIDC support redirects the call to the Keycloak SSO page.
    Users can sign in with their credentials to obtain the authorization code needed
    by the Helidon application and the client ID and client secret to obtain a JWT
    identity token.


    ![](images/600147_1_En_8_Chapter/600147_1_En_8_Fig7_HTML.png)


    A diagram of the steps between a client laptop and a program server with a keycloak
    manager. It includes get slash protected, 307 temporary redirect, S S O login,
    302 found authorization code, get slash o i d c slash redirect, post slash realms,
    access and i d tokens, set cookie, and 200 OK.


    Figure 8-7


    Helidon with Keycloak as identity manager


    *   ① Accesses protected resources without JWT ID


    *   ② Helidon redirects the unauthenticated request to the Keycloak SSO login
    page with 307


    *   ③ After a successful SSO login, the client obtains an authorization code


    *   ④ Client is redirected back to Helidon special resource `/oidc/redirect` with
    authorization code


    *   ⑤ Helidon uses the authorization code, client ID, and client secret to obtain
    JWT identity token


    *   ⑥ Client uses JWT identity token as `JSESSIONID` for subsequent calls


    While the authorization code is obtained by SSO login, the client ID and secret
    are configured with the application’s OIDC configuration and used for basic authorization
    during token requests.


    Let’s use Keycloak as an identity manager for our castle example. All you need
    to do is configure the OIDC security provider with the client secret, the Keycloak
    URL, and the client ID. Notice that we have added RBAC capability by adding a
    `microprofile-jwt` scope mapper for the `groups` claim in the Keycloak. You don’t
    need any special support for MicroProfile JWT RBAC on the Helidon side because
    the `groups` claim is used for fetching subject groups by default if available
    (can be disabled with `oidc.use-jwt-groups: false`).


    *   ① Adds abac provider


    *   ② Audience to compare with the one inside the JWT token so the issuer’s certificate
    can be reused


    *   ③ Identifies the client for identity manager


    *   ④ Uses as password for basic authorization when requesting JWT token from
    OIDC identity manager


    *   ⑤ Where should the identity manager redirect back from the SSO page


    ```

    keycloak:

    host: localhost

    port: 8979

    security:

    providers:

    - abac: ①

    - oidc:

    audience: "kingdom-audience" ②

    client-id: "beginning-helidon-client" ③

    redirect: true

    # Client secret is updated by startKeycloak.sh

    client-secret: pYSJjHAymzLqw61x7bsePp4AR6GVdC1s ④

    identity-uri: "${keycloak.url}/realms/beginning-helidon"

    frontend-uri: "http://localhost:${server.port}" ⑤

    logout-enabled: true

    post-logout-uri: /

    Listing 8-17

    Keycloak OIDC Configuration

    ```


    You can switch security providers by changing configuration and dependency, while
    the annotated example resource stays the same. Business code doesn’t need to change
    between the test and production environment.


    ```

    io.helidon.microprofile

    helidon-microprofile-oidc


    Listing 8-18

    Dependency Needed for OIDC Support

    ```


    ## Token Propagation


    After learning about the JWT bearer token and how to authenticate and even authorize
    against it with our web server, the next logical step is sending it with a client
    call. Most of the security providers in Helidon support outbound security. Unlike
    inbound, which secures web resources, outbound helps with client calls to other
    services. When discussing clients in Helidon MP, JAX-RS client or MicroProfile
    Rest client should be the first and best choice. But how do you propagate the
    JWT token you have received in our JAX-RS resource? You can most certainly access
    the bearer token. It can come within the `Authorize` header or `JSSESSIONID` cookie.


    ```

    @POST

    @Path("/send-signal")

    public Response signalToWatchTower(@CookieParam("JSESSIONID") Cookie cookie) {

    Response res = ClientBuilder.newBuilder()

    .register(OAuth2ClientSupport.feature(cookie.getValue()))

    ...

    Listing 8-19

    Raw JWT Token from Cookies Propagated Manually to Jersey JAX-RS Client

    ```


    Another more elegant approach is to use the MicroProfile JWT support in Helidon
    and access raw JWT tokens over injected API. Remember that the JWT token is request-specific,
    but CDI injected `JsonWebToken` proxy is updated according to your request context
    on the fly.


    ```

    @Inject

    JsonWebToken jwt;

    @POST

    @Path("/send-signal")

    public Response signalToWatchTower() {

    Response res = ClientBuilder.newBuilder()

    .register(OAuth2ClientSupport.feature(jwt.getRawToken()))

    ...

    Listing 8-20

    Injected JWT Token Propagated Manually to Jersey JAX-RS Client

    ```


    Such approaches are very explicit, but must you repeat this every time you use
    a JAX-RS client? You don’t because Helidon provides an implicit configurable solution
    in the shape of outbound security of relevant security providers.


    *   ① Enables JWT token propagation to the clients


    *   ② Arbitrary name for the outbound configuration; choose any application-wide
    unique name


    *   ③ Filters target hosts to propagate to; supports wildcards


    ```

    security:

    providers:

    - abac:

    - oidc:

    audience: "kingdom-audience"

    client-id: "beginning-helidon-client"

    redirect: true

    client-secret: 9rnQEI3gV6FuBMk41UeYqYfNlCutgaN1

    identity-uri: "${keycloak.url}/realms/beginning-helidon"

    frontend-uri: "${app.castle-url}"

    logout-enabled: true

    post-logout-uri: /

    propagate: true ①

    outbound:

    - name: "propagate-token" ②

    hosts: ["watchtower.local"] ③

    Listing 8-21

    Enabled JWT Token Propagation with OIDC Security Provider

    ```


    The bearer token is used automatically for specified hosts whenever you use a
    JAX-RS client from a secured context with propagation. Outbound propagates a token
    to all hosts when the `hosts` config is missing. Host filtering supports wildcards
    to match subdomains easily `hosts: ["*.local"]` allow JWT token propagation to
    both `watchtower.local` and `castle.local` hosts.


    *   ① No need to provide JWT token manually with OIDC provider outbound propagation


    *   ② Hosts `watchtower.local` matches to allow hosts for propagation


    ```

    @POST

    @Path("/send-signal")

    public Response signalToWatchTower() {

    Response res = ClientBuilder.newBuilder() ①

    .target("http://watchtower.local:8082/watchtower") ②

    .path("/signal")

    ...

    Listing 8-22

    Automatic JWT Propagation with JAX-RS Client and OIDC Provider Outbound

    ```


    OIDC token flow gets easy with Helidon because you can control service-to-service
    token propagation simply by configuration. There is much more than a security
    provider’s outbound feature can do. It is not only good for JWT token propagation.
    You can define your headers or create and sign a brand-new JWT token!'
  trans: '

    ## OpenID Connect


    让我们看一种更严谨的方法来解决身份认证与授权问题，使我们的城堡安全体系更加专业并具备生产可用性。我们的示例使用带有单点登录（SSO）的 Keycloak 身份管理器。身份管理器是用于管理用户及其属性（如角色）的独立服务。身份管理器通常通过协议提供认证与授权服务，例如老牌的基于
    XML 的 SAML（安全断言标记语言），或现代且流行的 OIDC。


    基于 JSON 的 OIDC 是 OAuth 2.0 的扩展，增加了认证能力。OIDC 是一种协议，通过基于 JSON 的 REST API 实现认证与授权。当客户端没有合适的身份
    JWT 令牌时，支持 OIDC 的 Helidon 应用会将调用重定向到 Keycloak SSO 页面。用户可以使用其凭据登录，以获取 Helidon 应用所需的授权码，以及用于获取
    JWT 身份令牌的客户端 ID 和客户端密钥。


    ![](img/600147_1_En_8_Fig7_HTML.png)


    一个展示客户端笔记本电脑、程序服务器与 Keycloak 管理器之间步骤的图。它包括 get slash protected、307 temporary redirect、S
    S O login、302 found authorization code、get slash o i d c slash redirect、post slash
    realms、access and i d tokens、set cookie，以及 200 OK。


    图 8-7


    使用 Keycloak 作为身份管理器的 Helidon


    *   ① 在没有 JWT ID 的情况下访问受保护资源


    *   ② Helidon 将未认证请求通过 307 重定向到 Keycloak SSO 登录页


    *   ③ SSO 登录成功后，客户端获得授权码


    *   ④ 客户端携带授权码被重定向回 Helidon 的特殊资源 `/oidc/redirect`


    *   ⑤ Helidon 使用授权码、客户端 ID 和客户端密钥获取 JWT 身份令牌


    *   ⑥ 客户端将 JWT 身份令牌作为 `JSESSIONID` 用于后续调用


    当授权码通过 SSO 登录获得时，客户端 ID 和密钥则在应用的 OIDC 配置中设置，并在令牌请求期间用于基础授权。


    让我们在城堡示例中使用 Keycloak 作为身份管理器。你需要做的就是配置 OIDC 安全提供器，填入客户端密钥、Keycloak URL 和客户端 ID。请注意，我们通过在
    Keycloak 中为 `groups` 声明添加 `microprofile-jwt` scope mapper，加入了 RBAC 能力。在 Helidon
    侧你不需要任何针对 MicroProfile JWT RBAC 的特殊支持，因为如果可用，`groups` 声明默认会用于获取主体组（可通过 `oidc.use-jwt-groups:
    false` 禁用）。


    *   ① 添加 abac 提供器


    *   ② 与 JWT 令牌中的 audience 进行比较，以便复用签发者证书


    *   ③ 为身份管理器标识客户端


    *   ④ 在向 OIDC 身份管理器请求 JWT 令牌时，作为基础授权的密码使用


    *   ⑤ 身份管理器应从 SSO 页面重定向回哪里


    ```

    keycloak:

    host: localhost

    port: 8979

    security:

    providers:

    - abac: ①

    - oidc:

    audience: "kingdom-audience" ②

    client-id: "beginning-helidon-client" ③

    redirect: true

    # Client secret is updated by startKeycloak.sh

    client-secret: pYSJjHAymzLqw61x7bsePp4AR6GVdC1s ④

    identity-uri: "${keycloak.url}/realms/beginning-helidon"

    frontend-uri: "http://localhost:${server.port}" ⑤

    logout-enabled: true

    post-logout-uri: /

    Listing 8-17

    Keycloak OIDC Configuration

    ```


    你可以通过修改配置和依赖来切换安全提供器，而带注解的示例资源保持不变。业务代码在测试环境与生产环境之间无需变更。


    ```

    io.helidon.microprofile

    helidon-microprofile-oidc


    Listing 8-18

    Dependency Needed for OIDC Support

    ```


    ## 令牌传播


    在了解了 JWT bearer 令牌以及如何在我们的 Web 服务器中基于它进行认证乃至授权之后，下一步顺理成章就是在客户端调用中发送它。Helidon 中的大多数安全提供器都支持出站安全。与保护
    Web 资源的入站安全不同，出站安全用于调用其他服务的客户端场景。在讨论 Helidon MP 中的客户端时，JAX-RS 客户端或 MicroProfile
    Rest 客户端应当是首选且最佳选择。但如何传播你在 JAX-RS 资源中收到的 JWT 令牌呢？你当然可以访问 bearer 令牌。它可能来自 `Authorize`
    请求头，也可能来自 `JSSESSIONID` Cookie。


    ```

    @POST

    @Path("/send-signal")

    public Response signalToWatchTower(@CookieParam("JSESSIONID") Cookie cookie) {

    Response res = ClientBuilder.newBuilder()

    .register(OAuth2ClientSupport.feature(cookie.getValue()))

    ...

    Listing 8-19

    Raw JWT Token from Cookies Propagated Manually to Jersey JAX-RS Client

    ```


    另一种更优雅的方法是使用 Helidon 中的 MicroProfile JWT 支持，并通过注入的 API 访问原始 JWT 令牌。请记住，JWT 令牌是请求级别的，但
    CDI 注入的 `JsonWebToken` 代理会根据你的请求上下文动态更新。


    ```

    @Inject

    JsonWebToken jwt;

    @POST

    @Path("/send-signal")

    public Response signalToWatchTower() {

    Response res = ClientBuilder.newBuilder()

    .register(OAuth2ClientSupport.feature(jwt.getRawToken()))

    ...

    Listing 8-20

    Injected JWT Token Propagated Manually to Jersey JAX-RS Client

    ```


    这些方法都很显式，但每次使用 JAX-RS 客户端时都必须重复吗？不需要，因为 Helidon 以相关安全提供器的出站安全形式，提供了隐式且可配置的解决方案。


    *   ① 启用向客户端传播 JWT 令牌


    *   ② 出站配置的任意名称；可选择任意应用范围内唯一的名称


    *   ③ 过滤要传播到的目标主机；支持通配符


    ```

    security:

    providers:

    - abac:

    - oidc:

    audience: "kingdom-audience"

    client-id: "beginning-helidon-client"

    redirect: true

    client-secret: 9rnQEI3gV6FuBMk41UeYqYfNlCutgaN1

    identity-uri: "${keycloak.url}/realms/beginning-helidon"

    frontend-uri: "${app.castle-url}"

    logout-enabled: true

    post-logout-uri: /

    propagate: true ①

    outbound:

    - name: "propagate-token" ②

    hosts: ["watchtower.local"] ③

    Listing 8-21

    Enabled JWT Token Propagation with OIDC Security Provider

    ```


    只要你在带传播能力的安全上下文中使用 JAX-RS 客户端，bearer 令牌就会在指定主机上自动使用。当 `hosts` 配置缺失时，出站会向所有主机传播令牌。主机过滤支持通配符，便于匹配子域名；`hosts:
    ["*.local"]` 允许将 JWT 令牌传播到 `watchtower.local` 和 `castle.local` 两个主机。


    *   ① 使用 OIDC 提供器出站传播时，无需手动提供 JWT 令牌


    *   ② 主机 `watchtower.local` 匹配允许传播的主机列表


    ```

    @POST

    @Path("/send-signal")

    public Response signalToWatchTower() {

    Response res = ClientBuilder.newBuilder() ①

    .target("http://watchtower.local:8082/watchtower") ②

    .path("/signal")

    ...

    Listing 8-22

    Automatic JWT Propagation with JAX-RS Client and OIDC Provider Outbound

    ```


    借助 Helidon，OIDC 令牌流会变得简单，因为你可以仅通过配置就控制服务到服务的令牌传播。安全提供器的出站功能远不止于此。它不仅适用于 JWT 令牌传播。你还可以定义自己的请求头，或创建并签名一个全新的
    JWT 令牌！

