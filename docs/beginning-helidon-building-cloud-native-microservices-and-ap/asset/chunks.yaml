- fmt: "## Configuration of Secrets\n\nDid you ever wonder how secure it is to leave\
    \ your database passwords, usernames, and other sensitive data in the configuration\
    \ file? It is secure as long as you can protect your configuration files. Configuration\
    \ tends to be shared, copied, transformed, and distributed a lot, and not all\
    \ passwords can be or need to be externalized to specialized vaults or as K8s\
    \ secrets. Helidon provides encryption capability for configuration values to\
    \ keep your secret values safely encrypted. It doesn’t matter if you store your\
    \ passwords in the config file, vault, or database. Only a Helidon application\
    \ with the right master password or decryption key can use your configured secrets.\n\
    \nTwo encryption options are available:\n\n- `AES-GCM` encryption is symmetric;\
    \ both the encrypting and decrypting sides need the same master password.\n- `RSA`\
    \ encryption is asymmetric; the value is encrypted with a public key and decrypted\
    \ with a private key.\n\n### AES-GCM Encryption\n\nAES encryption uses a single\
    \ master password for encryption and decryption; no keys are required. Encryption\
    \ can be done with the `helidon-config-encryption` artifact, which is conveniently\
    \ copied to the `target/lib` directory when you build your Helidon application.\
    \ Encrypt any text value from CLI by providing an AES cipher, the password needed\
    \ for eventual decryption, and the actual value to be encrypted as arguments.\n\
    \n```bash\njava -jar ./target/libs/helidon-config-encryption-3.0.2.jar aes masterPassword\
    \ superSecretPassword\n```\n\nOutput in the format `${GCM=⋯}` can be used as a\
    \ value in Helidon Config. Helidon Config encryption knows it should use `AES-GCM`\
    \ for decryption when the actual value is needed.\n\n```yaml\napp.pass: ${GCM=AL0sq65u5NkJ3VlQTPeBrD4piMMD+zTaYxt0tAHFGnvnnFStcIuOnILUj0fNVANr+tH7+VPIZfSRrGn1QprX}\n\
    ```\n\nTo allow Helidon to decrypt encrypted configuration values, the master\
    \ password used for encryption needs to be provided via the environment variable\
    \ `SECURE_CONFIG_AES_MASTER_PWD`.\n\n```yaml\napiVersion: v1\nkind: ConfigMap\n\
    metadata:\n  name: castle-config\ndata:\n  SECURE_CONFIG_AES_MASTER_PWD: masterPassword\n\
    ```\n\nIn your Helidon application, you get the decrypted value since it would\
    \ be a plain text config value.\n\n### RSA Encryption\n\nRSA encryption makes\
    \ it possible to encrypt value by a public key and later let Helidon decrypt it\
    \ via a private key from the same pair. Helidon configuration encryption tool\
    \ can load keys directly from a key store.\n\n```bash\njava -jar ./libs/helidon-config-encryption-3.0.2.jar\
    \ rsa ./server.p12 password 1 superSecretPassword\n```\n\nThe generated encrypted\
    \ form of our secret value can be placed directly in the Helidon configuration.\n\
    \n```yaml\napp.pass: ${RSA-P=cU2cL/j......YmwwLudo=}\n```\n\nOnce again Helidon\
    \ config encryption feature knows it should use `RSA` for decryption when the\
    \ actual value is needed, thanks to the `RSA-P` prefix. Helidon application needs\
    \ to know where to find the private key for decryption. You can provide the location,\
    \ alias, and password for the keystore containing the private key.\n\n```yaml\n\
    apiVersion: v1\nkind: ConfigMap\nmetadata:\n  name: castle-config\ndata:\n  SECURE_CONFIG_RSA_PRIVATE_KEY:\
    \ /helidon/server.p12\n  SECURE_CONFIG_PRIVATE_KEY_ALIAS: 1\n  SECURE_CONFIG_PRIVATE_KEYSTORE_PASSPHRASE:\
    \ password\n```\n\n### Plain Text Password Detection\n\nEncryption of secret configuration\
    \ values is practical for production use but may be too demanding and unnecessary\
    \ in a test environment. Simply replacing the encrypted value with plain text\
    \ value in a test environment is an obvious solution, but it brings the danger\
    \ of accidentally leaking such value to actual production.\n\nTo avoid this danger,\
    \ you can define a special unencrypted value detectable by the Helidon Config\
    \ encryption feature.\n\n```yaml\napp.pass: ${CLEAR=superSecretPassword}\n```\n\
    \nBy default, when the Helidon application requests such a config value, an exception\
    \ is thrown.\n\n```text\nConfigEncryptionException: Key \"app.pass\" is a clear\
    \ text password, yet encryption is required\n```\n\nIn a test environment, the\
    \ check can be disabled.\n\n```yaml\nsecurity.config.require-encryption: false\n\
    ```\n\nThis ensures that no sensitive test configuration is used in production\
    \ by accident.\n\nConfiguration encryption adds another security layer. You can\
    \ provide secret values to your application over various, less secure channels.\
    \ You can even send configuration examples to a friend without the need for tedious\
    \ checks if you are not sharing any secrets by doing so.\n\n```text\nio.helidon.config\n\
    helidon-config-encryption\n```\n\nIn this chapter, you learned how to secure the\
    \ Helidon web server with `TLS 1.3` and what annotations, regardless of the security\
    \ provider, can be used for authentication and authorization. You also learned\
    \ to set up basic authorization for test cases and `OpenID Connect` for production.\
    \ This chapter covered a very popular part of `OIDC`, `JWT` tokens, and took a\
    \ tour of `MicroProfile JWT` tooling to use `JWT` tokens in modern `DI` applications\
    \ built on top of Helidon MP.\n\nDon’t forget to check out the security examples\
