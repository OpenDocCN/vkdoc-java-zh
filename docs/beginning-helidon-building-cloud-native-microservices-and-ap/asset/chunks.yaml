    path.


    *   **@Content** provides schema and examples for a specific media type.


    *   **@Link** represents a possible design-time link for the answer.


    *   **@Parameter** represents a single parameter in an OpenAPI operation.


    *   **@Callback** describes a set of requests.


    *   **@RequestBody** represents the request body in an operation.


    *   **@APIResponse** represents the response in an activity.


    *   **@Tag** represents tags for an operation or an OpenAPI definition.


    *   **@Server** represents the servers for an operation or an OpenAPI definition.


    Please consult [the official specification](https://download.eclipse.org/microprofile/microprofile-open-api-3.0/microprofile-openapi-spec-3.0.pdf)
    for more information.


    ### Static OpenAPI Files


    In addition to using OpenAPI annotations to generate an API’s documentation, Helidon
    MP also offers the option of utilizing a static file to provide the API’s description.
    This static file—named `openapi.yml`, `openapi.yaml`, or `openapi.json`—can be
    added to the application’s `/META-INF` folder. Helidon’s OpenAPI implementation
    automatically picks up this file and incorporates its contents into the resulting
    document.


    To make creating this static file easier, tools such as Swagger can generate the
    OpenAPI document. Once the document is created, it can be added to the application’s
    `/META-INF` folder, and Helidon’s OpenAPI implementation handles the rest.


    It’s worth noting that Helidon MP OpenAPI can incorporate data from all the sources
    mentioned, including annotations, static files, and programmatic configuration.
    This allows for flexibility in documenting the API and enables developers to choose
    the best approach for their needs. Ultimately, the goal is to generate an accurate
    and comprehensive OpenAPI document that effectively describes the API’s functionality
    and can be easily consumed by other systems.'
  trans: '

    ## 关于 OpenAPI


    在当今的技术环境中，现代应用拥有 API 至关重要，而 RESTful API 处于 API 经济的前沿。RESTful API 能够将任何应用转换为与语言无关的服务，并可在任何地点通过任何语言进行访问，因此它已成为软件开发中不可或缺的一部分。


    MicroProfile 提供了 OpenAPI 3.x 规范，以促进 RESTful API 的开发。该规范为 Java 开发者提供了多样的编程模型和接口，使他们能够从其
    REST 服务原生生成 OpenAPI 文档。通过简化 OpenAPI 文档创建流程，MicroProfile 使开发者能够精简 API 开发工作流，并快速创建高质量、可互操作、且客户端可轻松消费的
    API。


    Helidon 开箱即用地实现了 [OpenAPI 3.0](https://download.eclipse.org/microprofile/microprofile-open-api-3.0/microprofile-openapi-spec-3.0.pdf)。它已经包含在完整的
    `helidon-microprofile` 包中。若要将 OpenAPI 与其他所有 MicroProfile 选项一起使用，我们的 `pom.xml`
    文件应包含清单 9-1 中的代码。


    ```

    io.helidon.microprofile

    helidon-microprofile


    Listing 9-1

    MicroProfile Bundle Dependency

    ```


    如果更倾向于更细粒度的控制并使用 `helidon-microprofile-core`，请将清单 9-2 所示依赖添加到项目的 `pom.xml` 文件中。


    *   ① MicroProfile OpenAPI 注解依赖


    *   ② Helidon MP OpenAPI 运行时支持依赖


    ```

    ①

    org.eclipse.microprofile.openapi

    microprofile-openapi-api


    ②

    io.helidon.microprofile.openapi

    helidon-microprofile-openapi

    runtime


    Listing 9-2

    OpenAPI Dependencies

    ```


    ## 基本用法


    要生成精确且能够有效描述应用 API 的 OpenAPI 文档，主要方法是使用 OpenAPI 标准注解来标注相关函数。这些注解提供关键元数据，有助于创建准确且完整的
    OpenAPI 文档。


    应用启动后，Helidon MP 运行时会自动识别已注解的端点，并利用提供的元数据创建 OpenAPI 文档。这个精简流程消除了手动编写文档的需要，并确保
    API 文档保持最新且与应用实现同步。此外，通过遵循 OpenAPI 标准，生成的 API 文档也便于共享。它可被许多工具和平台消费，从而便于与其他系统集成。


    清单 9-3 是一个示例。


    *   ① `@Operation` 提供该端点的信息。


    *   ② `@APIResponse` 描述 HTTP 响应并声明其媒体类型和内容。


    ```

    @GET

    @Operation(summary = "Returns a Wizard", ①

    description = "General Wizard Name and Licence information ")

    @APIResponse(description = "Simple JSON containing Wizard name and license information",
    ②

    content = @Content(mediaType = "application/json",

    schema = @Schema(implementation = Wizard.class)))

    @Produces(MediaType.APPLICATION_JSON)

    public JsonObject getWizard() {...}

    Listing 9-3

    OpenAPI Annotations in Use

    ```


    Helidon 应用会创建一个额外的 `/openapi` 端点，并返回描述应用中各端点的 OpenAPI 文档。根据 MicroProfile OpenAPI
    规范，OpenAPI 文档的默认格式是 YAML。`application/vnd.oai.openapi` 是 OpenAPI 文档建议使用的媒体类型，已获得一定支持，但尚未被
    IANA YAML 标准采纳。


    清单 9-4 调用了 `/openapi` 端点。


    ```

    curl -X GET http://localhost:8080/openapi

    Listing 9-4

    Retrieve OpenAPI Information with cURL

    ```


    清单 9-5 展示了输出结果。


    ```

    components:

    schemas:

    Wizard:

    properties:

    message:

    type: object

    type: object

    info:

    title: Generated API

    version: ''1.0''

    openapi: 3.0.3

    paths:

    /wizard:

    get:

    description: ''General Wizard Name and Licence information''

    responses:

    default:

    content:

    application/json:

    schema:

    $ref: ''#/components/schemas/Wizard''

    description: Simple JSON containing Wizard name and license information

    summary: Returns Wizard Information

    Listing 9-5

    Result Output with OpenAPI Data

    ```


    注意


    客户端可以将 *Accept* 指定为 `application/vnd.oai.openapi+json` 或 `application/json` 来请求
    JSON。


    以下是一些用于描述代码的主要注解。


    *   **@Schema** 允许你定义输入和输出。


    *   **@Operation** 描述某个操作，通常是特定路径上的 HTTP 方法。


    *   **@Content** 为特定媒体类型提供 schema 和示例。


    *   **@Link** 表示响应的一个可能的设计时链接。


    *   **@Parameter** 表示 OpenAPI 操作中的单个参数。


    *   **@Callback** 描述一组请求。


    *   **@RequestBody** 表示操作中的请求体。


    *   **@APIResponse** 表示操作中的响应。


    *   **@Tag** 表示操作或 OpenAPI 定义中的标签。


    *   **@Server** 表示操作或 OpenAPI 定义中的服务器。


    更多信息请参阅[官方规范](https://download.eclipse.org/microprofile/microprofile-open-api-3.0/microprofile-openapi-spec-3.0.pdf)。


    ### 静态 OpenAPI 文件


    除了使用 OpenAPI 注解生成 API 文档之外，Helidon MP 还提供了使用静态文件来提供 API 描述的选项。这个静态文件——名为 `openapi.yml`、`openapi.yaml`
    或 `openapi.json`——可以添加到应用的 `/META-INF` 文件夹中。Helidon 的 OpenAPI 实现会自动识别该文件，并将其内容合并到最终文档中。


    为了更轻松地创建该静态文件，可使用 Swagger 等工具生成 OpenAPI 文档。文档创建完成后，可将其添加到应用的 `/META-INF` 文件夹中，剩下的工作由
    Helidon 的 OpenAPI 实现处理。


    值得注意的是，Helidon MP OpenAPI 可以整合上述所有来源的数据，包括注解、静态文件和编程式配置。这使 API 文档编写更具灵活性，并让开发者能够根据需求选择最佳方式。最终目标是生成准确且全面的
    OpenAPI 文档，有效描述 API 功能，并可被其他系统轻松消费。

    '
- fmt: "## Automatic Client Generation\n\nOpenAPI can also be used for automatic client\
    \ generation. Once an OpenAPI document is available for an API, a client can be\
    \ generated for that API in a variety of programming languages. It can significantly\
    \ reduce the time and effort required to create a client for the API and ensure\
    \ that the client is generated accurately and consistently.\n\nAdditionally, using\
    \ an OpenAPI-generated client can provide a standardized way of interacting with\
    \ the API, making it easier for developers to consume the API from other applications.\
    \ It can help to improve interoperability and reduce the likelihood of errors\
    \ caused by inconsistencies in how different clients interact with the API.\n\n\
    Full information about the tool can be found on the official website at [`https://openapi-generator.tech/`](https://openapi-generator.tech/).\n\
    \nUsing OpenAPI Generator, clients in many languages and frameworks can be generated,\
    \ like Helidon, Jersey, MicroProfile, and many more.\n\nOpenAPI Generator is distributed\
    \ as a single JAR file. But there are also many “native” distributions for different\
    \ operating systems, which can be installed using appropriate packet managers\
    \ or simply by downloading the executables.\n\nThe most generic version is just\
    \ the executable JAR. You download it and then run the following command with\
    \ the wizard application running.\n\n- ① Checks that `http://localhost:8080/openapi`\
    \ has started and is running\n\n```bash\n> java - jar openapi-generator.jar generate\
    \ -g java --library microprofile -i http://localhost:8080/openapi ①\n```\n\nSince\
    \ the `microprofile` option is specified as a parameter, the generated code is\
    \ based on the MicroProfile Rest Client spec and looks close to one written by\
    \ hand in Listing [9-6](#600147_1_En_9_Chapter.xhtml#PC7).\n\n- ① Generated code\
    \ based on working microservice\n\n```java\n@RegisterRestClient\n@RegisterProvider(ApiExceptionMapper.class)\n\
    @Path(\"/wizard\")\npublic interface DefaultApi{\n@GET\n@Produces({ \"application/json\"\
    \ })\npublic Object wizardGet() throws ApiException, ProcessingException; ①\n\
    }\n```\n\nListing 9-6  \nGenerated Code Based on OpenAPI Document\n\nThe generated\
    \ code can provide a ready-to-use API client communicating with the target API.\
    \ This can significantly reduce the amount of manual coding required to consume\
    \ the API. Additionally, since the client code is generated directly from the\
    \ OpenAPI document, it ensures that the client code is always in sync with the\
    \ API documentation.\n\nUsing this plugin, developers can automate the code generation\
    \ process during the build phase of their projects. This can save significant\
    \ time and effort in the development process and help ensure the client code is\
    \ consistent with the API.\n\n### Note\n\nSome generated code is fully ready for\
    \ execution, like this one generated with target `jaxrs`. Some others are not,\
    \ like the one in Listing [9-6](#600147_1_En_9_Chapter.xhtml#PC7).\n\nA Maven\
    \ plugin named `openapi-maven-plugin` can generate client code based on the OpenAPI\
    \ document. The plugin generates a client interface and a set of data models that\
    \ represent the data structures used in the API. The generated code can be easily\
    \ customized using templates provided by the plugin or by creating custom templates.\n\
    \n## Summary\n\n- With only a few annotations, you can easily document our API.\n\
    - Another way is to create a separate YAML/JSON file and keep it separate from\
    \ the code.\n- You can generate clients out of the `openapi` information provided\
    \ automatically by Helidon.\n- Generated clients may have different flavors, libraries,\
    \ and even programming languages.\n\n# 10. Testing Your Helidon Application\n\n\
    This chapter covers the following topics.\n\n- Testing your application with Helidon\
    \ infrastructure based on JUnit and TestNG\n- Creating highly customizable test\
    \ fixtures using a rich set of annotations\n- Testcontainers for integration testing\n\
    \n## Testing in Helidon\n\nSoftware testing is undeniably crucial, yet motivating\
    \ ourselves to create those tests can be challenging. However, as soon as you\
    \ begin incorporating tests, you’ll quickly discover that the quality of your\
    \ application improves as well. By running automated tests, you can identify potential\
    \ issues and bugs before they cause major problems, which saves time and resources\
    \ in the long run.\n\nThankfully, Helidon offers excellent support for testing\
    \ with both JUnit 5 and TestNG. These testing frameworks provide many features\
    \ that make it easy to test different code aspects and identify potential issues.\
    \ With Helidon’s support, you can create and run tests with minimal effort, ensuring\
    \ that your application is of the highest quality and is free of bugs or errors.\
    \ Testing with Helidon can help you build more robust, reliable, and maintainable\
    \ applications."
  raw: '## Automatic Client Generation


    OpenAPI can also be used for automatic client generation. Once an OpenAPI document
    is available for an API, a client can be generated for that API in a variety of
    programming languages. It can significantly reduce the time and effort required
    to create a client for the API and ensure that the client is generated accurately
    and consistently.


    Additionally, using an OpenAPI-generated client can provide a standardized way
    of interacting with the API, making it easier for developers to consume the API
    from other applications. It can help to improve interoperability and reduce the
    likelihood of errors caused by inconsistencies in how different clients interact
    with the API.


    Full information about the tool can be found on the official website at [`https://openapi-generator.tech/`](https://openapi-generator.tech/).


    Using OpenAPI Generator, clients in many languages and frameworks can be generated,
    like Helidon, Jersey, MicroProfile, and many more.


    OpenAPI Generator is distributed as a single JAR file. But there are also many
    “native” distributions for different operating systems, which can be installed
    using appropriate packet managers or simply by downloading the executables.


    The most generic version is just the executable JAR. You download it and then
    run the following command with the wizard application running.


    *   ① Checks that `http://localhost:8080/openapi` has started and is running


    ```

    > java - jar openapi-generator.jar generate -g java --library microprofile -i
    http://localhost:8080/openapi ①

    ```


    Since the `microprofile` option is specified as a parameter, the generated code
    is based on the MicroProfile Rest Client spec and looks close to one written by
    hand in Listing [9-6](#600147_1_En_9_Chapter.xhtml#PC7).


    *   ① Generated code based on working microservice


    ```

    @RegisterRestClient

    @RegisterProvider(ApiExceptionMapper.class)

    @Path("/wizard")

    public interface DefaultApi{

    @GET

    @Produces({ "application/json" })

    public Object wizardGet() throws ApiException, ProcessingException; ①

    }

    Listing 9-6

    Generated Code Based on OpenAPI Document

    ```


    The generated code can provide a ready-to-use API client communicating with the
    target API. This can significantly reduce the amount of manual coding required
    to consume the API. Additionally, since the client code is generated directly
    from the OpenAPI document, it ensures that the client code is always in sync with
    the API documentation.


    Using this plugin, developers can automate the code generation process during
    the build phase of their projects. This can save significant time and effort in
    the development process and help ensure the client code is consistent with the
    API.


    Note


    Some generated code is fully ready for execution, like this one generated with
    target `jaxrs`. Some others are not, like the one in Listing [9-6](#600147_1_En_9_Chapter.xhtml#PC7).


    A Maven plugin named `openapi-maven-plugin` can generate client code based on
    the OpenAPI document. The plugin generates a client interface and a set of data
    models that represent the data structures used in the API. The generated code
    can be easily customized using templates provided by the plugin or by creating
    custom templates.


    ## Summary


    *   With only a few annotations, you can easily document our API.


    *   Another way is to create a separate YAML/JSON file and keep it separate from
    the code.


    *   You can generate clients out of the `openapi` information provided automatically
    by Helidon.


    *   Generated clients may have different flavors, libraries, and even programming
    languages.


    # 10. Testing Your Helidon Application


    This chapter covers the following topics.


    *   Testing your application with Helidon infrastructure based on JUnit and TestNG


    *   Creating highly customizable test fixtures using a rich set of annotations


    *   Testcontainers for integration testing


    ## Testing in Helidon


    Software testing is undeniably crucial, yet motivating ourselves to create those
    tests can be challenging. However, as soon as you begin incorporating tests, you’ll
    quickly discover that the quality of your application improves as well. By running
    automated tests, you can identify potential issues and bugs before they cause
    major problems, which saves time and resources in the long run.


    Thankfully, Helidon offers excellent support for testing with both JUnit 5 and
    TestNG. These testing frameworks provide many features that make it easy to test
    different code aspects and identify potential issues. With Helidon’s support,
    you can create and run tests with minimal effort, ensuring that your application
    is of the highest quality and is free of bugs or errors. Testing with Helidon
    can help you build more robust, reliable, and maintainable applications.'
  trans: '

    ## 自动生成客户端


    OpenAPI 也可用于自动生成客户端。一旦某个 API 拥有了 OpenAPI 文档，就可以用多种编程语言为该 API 生成客户端。这能显著减少为 API
    创建客户端所需的时间和精力，并确保客户端生成过程准确且一致。


    此外，使用由 OpenAPI 生成的客户端，还可以提供一种与 API 交互的标准化方式，使开发者更容易在其他应用程序中使用该 API。这有助于提升互操作性，并降低因不同客户端与
    API 交互方式不一致而导致错误的可能性。


    关于该工具的完整信息可在其官方网站查看：[`https://openapi-generator.tech/`](https://openapi-generator.tech/)。


    使用 OpenAPI Generator，可以生成适用于多种语言和框架的客户端，例如 Helidon、Jersey、MicroProfile 等等。


    OpenAPI Generator 以单个 JAR 文件的形式发布。但它也提供了适用于不同操作系统的许多“原生”发行版，可通过相应的包管理器安装，或直接下载可执行文件。


    最通用的版本就是可执行 JAR。下载后，在向导应用运行的情况下执行以下命令。


    *   ① 检查 `http://localhost:8080/openapi` 已启动并正在运行


    ```

    > java - jar openapi-generator.jar generate -g java --library microprofile -i
    http://localhost:8080/openapi ①

    ```


    由于参数中指定了 `microprofile` 选项，生成的代码基于 MicroProfile Rest Client 规范，看起来与清单 9-6 中手写的代码非常接近。


    *   ① 基于运行中的微服务生成的代码


    ```

    @RegisterRestClient

    @RegisterProvider(ApiExceptionMapper.class)

    @Path("/wizard")

    public interface DefaultApi{

    @GET

    @Produces({ "application/json" })

    public Object wizardGet() throws ApiException, ProcessingException; ①

    }

    Listing 9-6

    Generated Code Based on OpenAPI Document

    ```


    生成的代码可以提供一个可直接使用的 API 客户端来与目标 API 通信。这能够显著减少使用 API 时所需的手动编码量。此外，由于客户端代码是直接从 OpenAPI
    文档生成的，还能确保客户端代码始终与 API 文档保持同步。


    使用这个插件，开发者可以在项目构建阶段自动化代码生成过程。这能在开发过程中节省大量时间和精力，并有助于确保客户端代码与 API 保持一致。


    注意


    有些生成的代码可以直接运行，比如以 `jaxrs` 为目标生成的代码；另一些则不行，比如清单 9-6 中的示例。


    名为 `openapi-maven-plugin` 的 Maven 插件可基于 OpenAPI 文档生成客户端代码。该插件会生成客户端接口以及一组数据模型，用于表示
    API 中使用的数据结构。生成的代码可以通过插件提供的模板轻松定制，或通过创建自定义模板进行定制。


    ## 总结


    *   只需少量注解，你就可以轻松为我们的 API 编写文档。


    *   另一种方式是创建独立的 YAML/JSON 文件，并将其与代码分离维护。


    *   你可以根据 Helidon 自动提供的 `openapi` 信息生成客户端。


    *   生成的客户端可能有不同的风格、库，甚至编程语言。


    # 10. 测试你的 Helidon 应用程序


    本章涵盖以下主题。


    *   使用基于 JUnit 和 TestNG 的 Helidon 基础设施测试你的应用程序


    *   使用丰富的注解集创建高度可定制的测试夹具


    *   用于集成测试的 Testcontainers


    ## Helidon 中的测试


    软件测试毫无疑问至关重要，但激励自己去编写这些测试却可能很有挑战性。不过，一旦你开始引入测试，很快就会发现应用程序质量也随之提升。通过运行自动化测试，你可以在潜在问题和缺陷引发重大故障前及时发现它们，从而在长期节省时间和资源。


    值得庆幸的是，Helidon 对 JUnit 5 和 TestNG 的测试都提供了出色支持。这些测试框架具备许多特性，使你能够轻松测试代码的不同方面并识别潜在问题。在
    Helidon 的支持下，你可以以极小的成本创建并运行测试，确保应用程序达到最高质量，并且没有缺陷或错误。借助 Helidon 进行测试，可以帮助你构建更健壮、更可靠、也更易维护的应用程序。

    '
- fmt: '## Testing with JUnit 5


    Helidon provides extended functionality to test your applications with [JUnit
    5](https://junit.org/junit5/). Just add Listing [10-1](#600147_1_En_10_Chapter.xhtml#PC1).


    - ① Helidon JUnit 5 integration dependency


    ```

    io.helidon.microprofile.tests ①

    helidon-microprofile-tests-junit5

    test


    Listing 10-1

    Helidon JUint5 Dependency

    ```


    And you get an extended set of annotations to easily test your applications. Let’s
    dive directly into the code.


    The first step is to include the `@HelidonTest` annotation in the test class.
    This custom annotation automates various tasks, such as launching the Helidon
    server on a random port and configuring the environment to mimic actual Helidon
    usage. Thanks to this annotation, the Helidon testing framework initializes the
    container before creating the test class and shuts it down after the final test.


    Usually, the primary goal of testing is to call the server and verify the output.
    Helidon offers additional convenience by injecting a `WebTarget` configured to
    the currently running server. You can leverage this preconfigured target to call
    the endpoint and confirm the result.


    Listing [10-2](#600147_1_En_10_Chapter.xhtml#PC2) tests the wizard app discussed
    in Chapter [5](#600147_1_En_5_Chapter.xhtml).


    - ① Annotate a Test class with `@HelidonTest` to start the container.

    - ② Inject a `WebTarget` automatically configured by JUnit Extension.

    - ③ Use `WebTarget` to call an endpoint.

    - ④ Validate the result.

    - ⑤ Reuse the same `webTarget` to call another endpoint.


    ```

    @HelidonTest                                           ①

    public class WizardResourceTest {

    @Inject

    private WebTarget webTarget;                       ②

    @Test

    void testWizard() {

    JsonObject jsonObject = webTarget.path("/wizard") ③

    .request()

    .get(JsonObject.class);

    validateWizard(jsonObject, "Oz");              ④

    }

    @Test

    void testWizardByName() {

    JsonObject jsonObject = webTarget.path("/wizard/Skylar")                       ⑤

    .request()

    .get(JsonObject.class);

    validateWizard(jsonObject, "Skylar");

    }

    private void validateWizard(JsonObject jsonObject,

    String nameExpected){

    String actual = jsonObject.getString("name");

    assertEquals(nameExpected, actual,

    nameExpected + " is expected");

    }

    }

    Listing 10-2

    @HelidonTest Annotation Usage

    ```


    In addition to the benefits mentioned, this approach of launching the Helidon
    container at the beginning and keeping it active until the completion of the final
    test also offers several other advantages.


    First, it reduces the overall testing time as the container is not repeatedly
    started and stopped for each test case. This can save time, especially when testing
    large and complex applications.


    Second, it enables the reuse of resources and dependencies across different test
    cases, improving the overall efficiency of the testing process. By keeping the
    container active, the resources and dependencies required by the application can
    be loaded and shared among multiple tests, eliminating the need for redundant
    loading and initialization.


    This approach is commonly used among users and applies to most testing situations,
    covering more than 90% of all tests.


    But what if you need to test some features, which are initialized at the startup
    time, and there is a different setup for these features? Should you write a separate
    test class for them? The answer is no. If you set `resetPerTest = true` parameter
    in `@HelidonTest`, the framework restarts the Helidon container on each test.
    And there are even more features. You can apply different annotations directly
    on the test method level and inject `WebTarget` directly into the method as a
    parameter. Let’s create another test:


    - ① Enable `resetPerTest`.

    - ② Inject `WebTarget` as a method parameter.

    - ③ Use `@AddConfig` annotation to override the `app.title` property for the specific
    test.


    ```

    @HelidonTest(resetPerTest = true)                      ①

    class WizardTitleTest {

    @Test

    void testDefaultTitle(WebTarget webTarget) {        ②

    String result = webTarget.path("wizard/title")

    .request()

    .get(String.class);

    assertEquals("The Greatest!", result);

    }

    @Test

    @AddConfig(key = "app.title", value = "The Mighty!") ③

    void testModifiedTitle(WebTarget webTarget) {

    String result = webTarget.path("wizard/title")

    .request()

    .get(String.class);

    assertEquals("The Mighty!", result);

    }

    }

    Listing 10-3

    Wizard Test

    ```


    Here the Helidon container reset on each test method execution. Since it runs
    on a random port, a new `WebTarget` is configured with the new container parameters
    and injected as a method parameter.


    For the second test, override the `app.title` config value, which is present in
    the `microprofile-config.properties` file. This is easily achievable using `@AddConfig(key
    = "app.title", value = "The Mighty!")` annotation applied to the method. Thus,
    when the Helidon container starts for the new test, it reads the configuration
    from this annotation.


    `@AddConfig` annotation can also be applied on the class level, thus affecting
    all test methods.


    ### Advanced Usage


    The Helidon testing framework supports a few additional annotations that allow
    more fine control of the test configuration and execution.


    - `@DisableDiscovery` annotation: This is used when a required test class is isolated
    from the rest of the CDI environment.

    - `@AddBean(SomeBean.class)` annotation: If the Bean Discovery is disabled or
    a specific bean is not available in the current CDI environment, it can be manually
    added to the current test with this annotation. It is added as an `ApplicationScoped`
    bean by default, but the scope can be specified as a parameter. For example, `scope
    = Dependent.class`. Usually used together with `@DisableDiscovery` annotation
    to create a very specific set of CDI beans to be tested.

    - `@AddExtension(SomeCdiExtension.class)` annotation: If there is a need to extend
    the current test with a specific CDI Extension, it can easily be done using this
    annotation.

    - `@Configuration(configSources = “some-test-config.properties”)` annotation:
    If a whole specific configuration, either on a classpath or on an absolute path,
    is required for the current test, it can be set using this annotation.


    Listing [10-4](#600147_1_En_10_Chapter.xhtml#PC4) creates a more sophisticated
    test using some of the features mentioned.


    - ① Disable Bean Discovery for this particular test.

    - ② Add CDI Extensions.

    - ③ Add an internal class as a managed bean.

    - ④ `WebTarget` should point to the `MiniWizard` resource.

    - ⑤ Check if the endpoint responds correctly.


    ```

    @HelidonTest

    @DisableDiscovery                                       ①

    @AddExtension(ServerCdiExtension.class)                 ②

    @AddExtension(JaxRsCdiExtension.class)

    @AddExtension(CdiComponentProvider.class)

    @AddBean(WizardNoDiscoveryTest.MiniWizard.class)        ③

    class WizardNoDiscoveryTest {

    @Inject

    private WebTarget injected;                         ④

    @Test

    void testSpell() {

    String response = injected.path("/spell")       ⑤

    .request().get(String.class);

    Assertions.assertEquals(response,"I put a spell on you!");

    }

    @Path("/spell")

    public static class MiniWizard {                    ⑥

    @GET

    public String saySpell() {

    return "I put a spell on you!";

    }

    }

    }

    Listing 10-4

    Advanced Test

    ```


    Here CDI Bean discovery is disabled for the particular test. The internal class
    `MiniWizard` is a subresource with only one function: “Say a spell.” Using `@AddBean`
    annotation, add this class as a bean to the current test. Also, use `@AddExtension`
    annotation to make the endpoint work correctly and be correctly injected to `WebTarget`,
    to be tested correctly.


    The Helidon testing framework provides a wide range of features to test the most
    typical use cases and some very sophisticated scenarios. This allows developers
    to tailor their tests to suit their specific needs, ensuring their applications
    are thoroughly tested under all conditions.'
