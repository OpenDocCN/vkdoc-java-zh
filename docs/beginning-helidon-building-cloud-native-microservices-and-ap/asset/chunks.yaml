    ## MicroProfile 响应式流操作符


    MicroProfile 响应式流操作符是一种受规范约束的抽象，它允许你在不修改任何代码的情况下移植业务逻辑。使用响应式流，你可以在不更改代码的情况下，从
    RxJava 切换到 Mutiny 或 Helidon 操作符。


    可移植性远非其唯一特性，MP 响应式流 API 围绕称为*阶段*的操作符单元构建器进行组织。


    ![](img/600147_1_En_13_Fig6_HTML.png)


    一个框图包含三个模块：发布者阶段、处理器阶段和订阅者阶段，分别对应 `.of`、`.map` 和 `.forEach` 函数。


    图 13-6


    封闭图中的响应式流阶段


    阶段构建器创建响应式流的发布者、处理器或订阅者。你可以使用*阶段*将流结构化为更大的可重用部分，称为*图*。图可以像玩具积木套件一样组合成更大的图。


    *   ① 发布者阶段 `.of`


    *   ② 处理器阶段 `.map`


    *   ③ 订阅者/终端阶段 `.forEach`


    *   ④ 在阶段之间调用订阅


    ```

    ReactiveStreams

    .of(1, 2, 3, 4)                       ①

    .map(i -> i * 10)                     ②

    .filter(i -> i  log("Got " + i))        ③

    .run();                               ④

    清单 13-3

    封闭图中的 RS 阶段

    ```


    图是阶段的组合，根据阶段类型，图可以分为四种类型。


    *   发布者图以发布者阶段开始，并可选择以处理器阶段结束。

    *   处理器图仅包含处理器阶段。

    *   订阅者图可选择以处理器阶段开始，并始终以订阅者阶段结束。

    *   封闭图以发布者阶段开始，以订阅者阶段结束，并且中间可选择包含处理器阶段。


    ![](img/600147_1_En_13_Fig7_HTML.png)


    发布者图和处理器图的两组框图各包含两个模块。发布者图包含发布者和处理器阶段两个模块，分别具有 `.of` 和 `.map` 函数。处理器图包含处理器阶段的两个模块，分别具有
    `.map` 和 `.filter` 函数。


    图 13-7


    发布者图和处理器图


    单独的发布者和处理器阶段可以通过 `.via(processor)` 组合成更大的图。


    ```

    var publisherStage =

    ReactiveStreams.of(1, 2, 3, 4);

    var processorStage =

    ReactiveStreams.builder()

    .map(i -> i * 10);

    var publisherGraph =

    publisherStage.via(processorStage);

    清单 13-4

    在图中组合 RS 阶段

    ```


    对于创建订阅者图或封闭图，使用 `.to(subscriber)` 方法。当发布者图通过 `.to()` 方法与订阅者图连接时，会创建一个封闭图；而处理器与订阅者图连接则创建订阅者图。只有封闭图是可运行的，通过
    `run()` 方法完成实际订阅，整个流开始执行。


    ![](img/600147_1_En_13_Fig8_HTML.png)


    订阅者图和封闭图的两组框图分别包含 2 个和 3 个模块。订阅者图包含处理器和订阅者阶段两个模块，分别具有 `.map` 和 `.forEach` 函数。封闭图包含发布者、处理器和订阅者阶段三个模块，具有三个函数。


    图 13-8


    订阅者图和封闭图


    MP 响应式流这种细粒度的特性允许重用整个操作符链。以下流示例重复了整个操作符序列。


    *   ① 重复的操作符


    ```

    ReactiveStreams

    .of(1, 2, 3, 4, 5)

    .filter(i -> i  i > 2)

    .map(i -> i * 10).map(i -> i - 5)

    .map(i -> i * 10).map(i -> i - 5)  ①

    .map(String::valueOf)

    .forEach(i -> log("Got " + i))

    .run();

    清单 13-5

    具有重复阶段的封闭图

    ```


    你可以将同一个响应式流分解为多个图，组合它们，并重用重复的图。


    *   ① 将同一个图与重复操作符连接两次


    *   ② 使用订阅者关闭图


    *   ③ 调用实际订阅


    ```

    var publisherGraph =

    ReactiveStreams.of(1, 2, 3, 4, 5)

    .filter(i -> i  i > 2);

    var processor1Graph =

    ReactiveStreams.builder()

    .map(i -> i * 10)

    .map(i -> i - 5);

    var processor2Graph =

    ReactiveStreams.builder()

    .map(String::valueOf);

    var subscriberGraph =

    ReactiveStreams.builder()

    .forEach(i -> log("Got " + i));

    publisherGraph

    .via(processor1Graph)

    .via(processor1Graph)  ①

    .via(processor2Graph)

    .to(subscriberGraph)  ②

    .run();  ③

    清单 13-6

    组合图

    ```


    运行流不会立即产生结果，也不会阻塞当前线程，因为流的完成可能是（也可能不是）异步的。Java 的 `CompletionStage` 会作为承诺回调返回，而不是实际值，该回调将在未来成功完成，并携带终端操作符的结果值，或者在
    `onError` 信号终止响应式流时异常完成并携带 `Throwable`。


    `CompletionStage` 有自己的操作符，你可以用来响应异步完成，例如 `whenComplete`、`thenApply` 等。也可以阻塞当前线程直到异步操作完成，但在任何响应式环境中这样做都是非常危险的。当你确定当前线程可以被阻塞时，无论是虚拟线程还是你控制的物理线程；可以使用转换后的
    `CompletableFuture` 上的 `.join()` 方法，或者 Helidon 专有的 `Single` 上的 `.await()` 方法。


    *   ① 使用 `CompletableFuture.join()` 阻塞的方式


    *   ② 使用 `Single.await()` 阻塞的方式


    ```

    CompletionStage> cf =

    ReactiveStreams.of("1", "2", "3", "4")

    .toList()

    .run();

    List resultJoin = cf.toCompletableFuture()

    .join();  ①

    List resultAwait = Single.create(cf, true)

    .await();  ②

    清单 13-7

    阻塞当前线程直到流完成

    ```


    警告


    请记住，在响应式上下文中阻塞总是有害的，并且会迅速导致死锁或事件池耗尽。


    ### of


    `of` 操作符是一个发布者，它会向下游发送通过 `vararg` 参数提供的给定项。


    *   ① 结果列表包含 [1, 2, 3, 4]


    ```

    ReactiveStreams.of(1, 2, 3, 4)

    .toList()    ①

    .run()

    清单 13-8

    发布给定项的 of 操作符

    ```


    ### empty


    `empty` 操作符在订阅发生后向下游发送 `onComplete` 信号。


    *   ① `peek` 永远不会执行，因为没有 `onNext` 信号到来。


    *   ② `OnComplete` 立即执行。


    ```

    ReactiveStreams.empty()

    .peek(i -> log("This is never executed"))  ①

    .onComplete(() -> log("Completed immediately"))  ②

    .toList()

    .run()

    清单 13-9

    立即完成流的 empty 操作符

    ```


    ### failed


    `failed` 操作符在订阅发生后向下游发送 `onError` 信号，并将提供的 `Throwable` 作为原因。


    *   ① 没有发送 `onNext` 信号


    *   ② 没有发生 `onComplete`


    *   ③ 流以 `onError` 信号结束


    ```

    ReactiveStreams.failed(new Exception("BOOM!"))

    .peek(i -> log("This is never executed"))  ①

    .onComplete(() -> log("This is never executed"))  ②

    .onError(t -> log("Stream failed because of " + t.getMessage()))  ③

    .toList()

    .run()

    清单 13-10

    立即失败的 failed 操作符

    ```


    ### generate


    `generate` 操作符为每个请求的项执行一次提供的供应商，返回的项作为 `onNext` 信号向下游发出。


    *   ① 恰好记录三次


    *   ② 结果列表包含 [1, 2, 3]，因为请求的项限制为三个


    ```

    AtomicLong seq = new AtomicLong();

    ReactiveStreams.generate(() -> {

    log("Generating " + seq.incrementAndGet());  ①

    return seq.get();

    })

    .limit(3)

    .toList()  ②

    .run();

    清单 13-11

    为每个请求的项调用供应商的 generate 操作符

    ```

