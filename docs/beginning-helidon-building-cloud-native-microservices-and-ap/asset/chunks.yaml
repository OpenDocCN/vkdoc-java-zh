    ```

    io.helidon.book.ch05.WizardRestClient/mp-rest/proxyAddress="http://someobscureproxy.com:9999"  ①

    io.helidon.book.ch05.WizardRestClient/mp-rest/followRedirects=true                                   ②

    Listing 5-7

    Proxy and Redirect Properties

    ```


    As MicroProfile Rest Client supports SSL, the trust store setup in the CDI environment
    is easily done using properties.


    *   `io.helidon.book.ch05.WizardRestClient/mp-rest/trustStore` sets the trust
    store location. Can point to a classpath resource or a file.


    *   `io.helidon.book.ch05.WizardRestClient/mp-rest/trustStorePassword` specifies
    the keystore password.


    *   `io.helidon.book.ch05.WizardRestClient/mp-rest/trustStoreType` is the trust
    store type. The default is `"JKS"`.


    The same is achieved for the key store.


    *   `io.helidon.book.ch05.WizardRestClient/mp-rest/keyStore` is the key store
    location. It can point to a classpath resource or a file.


    *   `io.helidon.book.ch05.WizardRestClient/mp-rest/keyStorePassword` specifies
    the keystore password.


    *   `io.helidon.book.ch05.WizardRestClient/mp-rest/keyStoreType` is the key store
    type. The default is `"JKS"`.


    ### Exception Handling


    In a perfect world, all the servers are always up and running, and the line is
    always free with zero latency, but it is typical that a server is down or disconnected.
    The data may be somehow jammed or incorrectly marshaled/unmarshaled. You must
    be prepared for that, and our Helidon app should handle these situations gracefully.
    MicroProfile Rest Client provides a solution for that: `ResponseExceptionMapper`.
    This mapper takes a `Response` object retrieved via an invocation of a client,
    checks its status, and converts it to an exception according to our needs.


    Let’s create a simple exception mapper for our wizard client. First, create a
    class that implements `ResponseExceptionMapper<T>` with the corresponding exception
    as a template parameter. Then override `public T toThrowable(Response response)
    {}` function where you can define different behavior on different responses. In
    this case, return `RuntimeException` with another description depending on the
    `Response` status code.


    *   ① This class implements `ResponseExceptionMapper<RuntimeException>`.


    *   ② If the Response has `404` status, a `RuntimeException` with a “Resource
    not found” message is returned.


    *   ③ If the Response has `500` status, a `RuntimeException` with a “Server bad
    response” message is returned.


    *   ④ Otherwise, a `RuntimeException` with a “Something went terribly wrong” message
    is returned.


    ```

    public class WizardExceptionMapper

    implements ResponseExceptionMapper {                                               ①

    @Override

    public RuntimeException toThrowable(Response response) {

    if (response.getStatus() ==

    Response.Status.NOT_FOUND.getStatusCode()) {                                   ②

    return new RuntimeException("Resource not found");

    } else if (response.getStatus() ==

    Response.Status.INTERNAL_SERVER_ERROR.getStatusCode()) {                  ③

    return new RuntimeException("Server bad response");

    } else {

    return new RuntimeException("Something went terribly wrong: " + response);              ④

    }

    }

    }

    Listing 5-8

    Exception Mapping

    ```


    Since this exception mapper is ready, all you need to do is to register it to
    the REST client interface. Otherwise, it is registered using the `@RegisterProvider`
    annotation, as shown in Listing [5-9](#600147_1_En_5_Chapter.xhtml#PC9).


    *   ① Register `WizardExceptionMapper` for `WizardRestClient`.


    ```

    @RegisterRestClient(baseUri="http://localhost:8080/wizard")

    @RegisterProvider(WizardExceptionMapper.class)              ①

    interface WizardRestClient {

    ...

    }

    Listing 5-9

    Register Exception Mapper

    ```


    Every exception that may occur during the service execution is handled gracefully.'
  trans: '

    *   ② 这个方法声明了一个客户端，用于对*基础 URI*执行`GET`请求，并将结果映射到向导对象。


    *   ③ 这个方法对基础 URI 执行带有路径参数`name`的`GET`请求。


