    ## 分析生成的项目


    生成的 Helidon SE 快速启动应用与第 2 章描述的 Helidon MP 快速启动应用非常相似。它包含一个 Maven 项目、用于构建 jar 的
    Dockerfile、jlink 镜像、GraalVM 原生镜像以及 Kubernetes 的 app.yaml。它实现了相同的问候服务，但其源代码和概念与
    Helidon MP 有显著不同。本章将在解释 Helidon SE 应用工作原理的同时，讨论这些差异。


    现在，让我们看看生成了哪些内容。


    *   ① Kubernetes 部署描述符


    *   ② 用于构建 Docker 镜像的 Dockerfile，该镜像在标准 Java 运行时上运行你的应用


    *   ③ 用于构建 Docker 镜像的 Dockerfile，该镜像在自定义 Java 运行时（jlink 镜像）上运行你的应用


    *   ④ 用于构建 Docker 镜像的 Dockerfile，该镜像包含你的应用的原生镜像


    *   ⑤ Maven 项目


    *   ⑥ Greet RESTful 服务


    *   ⑦ 包含 `main` 方法和 Web 服务器初始化代码的主类


    *   ⑧ 应用配置


    *   ⑨ JUnit 测试示例


    *   ⑩ 测试配置


    ```

    $ tree quickstart-se/

    quickstart-se

    app.yaml                                         ①

    Dockerfile                                       ②

    Dockerfile.jlink                                 ③

    Dockerfile.native                                ④

    pom.xml                                          ⑤

    README.md

    src

    main

    java

    com

    example

    myproject

    GreetService.java         ⑥

    Main.java                 ⑦

    package-info.java

    SimpleGreetService.java

    resources

    application.yaml                      ⑧

    logging.properties

    test

    java

    com

    example

    myproject

    MainTest.java                 ⑨

    resources

    application.yaml                     ⑩

    Listing 15-1

    Helidon SE 生成的快速启动应用源代码树

    ```


    ### Main 方法


    Helidon SE 应用是一个标准的 Java 应用。它必须有一个 `public static void main(String[] args)` 作为应用入口点。请注意，在
    Helidon MP 中并不要求编写 `main` 方法，框架会提供它。


    在快速启动应用中，`main` 方法实现在 `Main.java` 中。


    ```

    public static void main(String[] args) {

    startServer();

    }

    ```


    `main` 方法创建并启动 Web 服务器。这与 Helidon MP 不同，在 Helidon MP 中，同一个 Web 服务器会在后台自动启动。这虽然方便，但用户对
    Web 服务器如何启动和配置的控制权较少。


    为了正确运行你的应用，需要在 Maven 的 `pom.xml` 中指定包含 `main` 方法的类。


    ```

    com.example.myproject.Main


    ```


    ### 创建并启动 Web 服务器


    在创建服务器之前，你需要创建并初始化它所使用的资源。这包括创建配置、初始化日志记录、创建路由、实例化你计划使用的内部服务（如健康检查或指标），以及创建并初始化用户服务（如
    `GreetService`）。这又是与 Helidon MP 的一个不同之处，在 Helidon MP 中，所有这些都由框架自动完成。


    现在，让我们看看在快速启动应用中是如何创建并启动 Web 服务器的（参见清单 15-2）。


    *   ① 初始化日志记录


    *   ② 加载配置（默认情况下，从类路径加载 `application.yaml`）


    *   ③ 使用 `WebServer.builder` 创建 Web 服务器


    *   ④ 创建路由并将其传递给 Web 服务器


    *   ⑤ 将 `server` 配置部分传递给 Web 服务器


    *   ⑥ 添加 JSON 处理（JSON-P）支持


    *   ⑦ 启动服务器


    ```

    static Single startServer() {

    LogConfig.configureRuntime();                    ①

    Config config = Config.create();                 ②

    WebServer server = WebServer.builder(            ③

    createRouting(config))                     ④

    .config(config.get("server"))                  ⑤

    .addMediaSupport(JsonpSupport.create())        ⑥

    .build();

    Single webserver = server.start();    ⑦

    ...

    return webserver;

    }

    Listing 15-2

    初始化和启动 Web 服务器

    ```


    ### 配置


    Helidon SE 配置是 Helidon SE 的核心组件。以下简要描述其特性以及它与 Helidon MP 配置之间的差异。


    *   不使用注解，仅使用编程式 API（相比之下，Helidon MP 使用 MicroProfile Config，其中包含注解和编程式 API）


    *   使用树形结构（相比之下，Helidon MP 使用扁平结构）


    *   设计上不可变，但支持变更监听器


    *   支持多种配置源，如环境变量、系统属性、目录、属性文件、YAML、JSON 和 HOCON（可通过自定义配置源扩展）


    *   支持过滤器、引用和替换


    *   支持配置概要文件（例如 dev/test/prod）


    *   支持转换为简单和复杂类型，以及自定义转换器


    快速启动应用的配置位于 `application.yaml` 文件中，包含服务器主机、端口和默认问候属性。


    ```

    server:

    port: 8080

    host: 0.0.0.0

    app:

    greeting: "Hello"

    ```


    ### 路由


    应用初始化的下一步是创建路由。这是在 `createRouting` 方法中完成的。它使用构建器注册路径与相应服务实例的配对，该服务实例处理发往此路径的请求。请注意，在
    Helidon MP 中，路由由 JAX-RS 的 `@Path` 注解管理。


    *   Helidon SE 的路由在 `Routing` 类实例中以编程方式配置。


    *   为方便起见，`Routing` 类提供了一个构建器（`Routing.builder()`），它支持多种创建映射的方式。


    *   映射可以使用 HTTP 方法、路由、路径匹配和请求谓词来定义。


    *   用户可以将代码组织到服务中，以逻辑上分离与应用功能特定部分相关的路由。


    *   路由是不可变的。Web 服务器启动后，无法更改路由。


    快速启动应用中有两个用户服务：`SimpleGreetService` 和 `GreetService`。发往 `/simple-greet` 的请求由 `SimpleGreetService`
    处理，发往 `/greet` 的请求由 `GreetService` 处理。


    ```

    private static Routing createRouting(Config config) {

    ...

    Routing.Builder builder = Routing.builder()

    .register("/simple-greet", new SimpleGreetService(config))

    .register("/greet",  new GreetService(config));

    return builder.build();

    }

    ```


    ### RESTful 服务


    用户服务实现 `Service` 接口，以在一个类中管理路由映射并封装处理器。这是通过实现 `update(Routing.Rules)` 来完成的。


    *   ① `SimpleGreetService` 必须实现 `Service` 接口


    *   ② `update(`⋯`)` 方法更新全局路由规则


    *   ③ 注册 `getDefaultMessageHandler()` 方法，以便在 GET 请求到达 `/` 路径时调用


    *   ④ `getDefaultMessageHandler()` 返回默认问候消息


    ```

    public class SimpleGreetService implements Service {     ①

    ...

    @Override

    public void update(Routing.Rules rules) {            ②

    rules.get("/", this::getDefaultMessageHandler);  ③

    ...

    }

    private void getDefaultMessageHandler(ServerRequest request,                                             ④

    ServerResponse response) {

    String msg = String.format("%s %s!", greeting, "World");

    JsonObject returnObject = JSON.createObjectBuilder()

    .add("message", msg)

    .build();

    response.send(returnObject);

    }

    }

    ```

    '
- fmt: '## Health Checks


    Due to different design concepts, Helidon SE cannot implement MicroProfile Metrics
    specifications (see Chapter [4](#600147_1_En_4_Chapter.xhtml)). However, it contains
    health check support, which provides the same functionality as Helidon MP but
    uses the Helidon SE programming model.


    You need to add the `helidon-health` dependency to your Maven project to use health
    checks.


    ```

    io.helidon.health

    helidon-health

    ```


    You may also add a dependency to the `helidon-health-checks` module, which contains
    optional built-in checks such as deadlock detection, available disk space, and
    available heap memory.


    ```

    io.helidon.health

    helidon-health-checks

    ```


    To use health checks, you need to create the `HealthSupport` class instance and
    register the built-in checks and your custom health checks. The following shows
    how it’s done in the Quickstart application (the snippet is taken from the `createRouting`
    method).


    ```

    HealthSupport health = HealthSupport.builder()

    .addLiveness(HealthChecks.healthChecks())

    .build();

    ```


    To expose your service health on the `/health` endpoint, register your `HealthSupport`
    in the web server routings.


    ```

    Routing.Builder builder = Routing.builder()

    .register(health)

    ...

    ```


    Now you can request your service health status using this command.


    ```

    curl http://localhost:8080/health

    ```


    ## Metrics


    Helidon SE provides a way to collect and expose metrics. As with health checks,
    functionality is very similar to Helidon MP. The difference is that Helidon SE
    has only programmatic API, which differs from what Helidon MP provides.


    You must add the `helidon-metrics` dependency to your project’s `pom.xml` file
    to use metrics.


    ```

    io.helidon.metrics

    helidon-metrics

    ```


    When added, you can use the `MetricRegistry` class instance to register the metrics
    you want to track. Helidon SE supports the same metric types as Helidon MP: counter,
    concurrent gauge, gauge, histogram, meter, timer, and simple timer.


    The Quickstart application contains a sample of using a counter in the `SimpleGreetService`
    class.


    ```

    private final MetricRegistry registry = RegistryFactory.getInstance()

    .getRegistry(MetricRegistry.Type.APPLICATION);

    private final Counter accessCtr = registry.counter("accessctr");

    ```


    After registering a counter, you can use its `inc()` method to increase its value.
    The Quickstart application counts how many requests were received by the `/greet-count`
    endpoint. To do it, a chain of request handlers is registered to process this
    path.


    ```

    public void update(Routing.Rules rules) {

    ...

    rules.get("/greet-count", this::countAccess, this::getDefaultMessageHandler);

    }

    ```


    The handler increases the counter, and calls `request.next()` to continue processing
    on the next registered handler.


    ```

    private void countAccess(ServerRequest request, ServerResponse response) {

    accessCtr.inc();

    request.next();

    }

    ```


    To expose your metrics on the `/metrics` endpoint, create the `MetricsSupport`
    class instance and add it to your routes. In the Quickstart application, it’s
    done in the `Main.createRouting` method.


    ```

    Routing.Builder builder = Routing.builder()

    .register(MetricsSupport.create())

    ...

    ```


    Now users can access metrics data at the following endpoints.


    - `/metrics/base` means base metrics.

    - `/metrics/vendor` means vendor-specific metrics.

    - `/metrics/application` means application metrics. It’s where `accessctr` is
    located.


    Like Helidon MP, users can get metrics data in OpenMetrics and JSON formats. For
    example, use the following command to get the `accessctr` metric in OpenMetrics
    format.


    ```

    curl http://localhost:8080/metrics/application/accessctr

    ```


    You get a response similar to the following.


    ```

    # TYPE application_accessctr_total counter

    # HELP application_accessctr_total

    application_accessctr_total 42

    # EOF

    ```


    To get it in JSON format, add the `Accept: application/json` header, as follows.


    ```

    curl -H ''Accept: application/json'' -X GET http://localhost:8080/metrics/application/accessctr

    ```


    RESTful API is the same as in Helidon MP. Please refer to Chapter [4](#600147_1_En_4_Chapter.xhtml)
    for more details.


    ## Building and Packaging


    Build and packaging commands are identical for Helidon SE and Helidon MP applications.


    To build your project, use the following Maven command.


    ```

    mvn package

    ```


    To run your application, use the following.


    ```

    java -jar target/myproject.jar

    ```


    You see an output similar to Listing [15-3](#600147_1_En_15_Chapter.xhtml#PC25)
    if your application has been started successfully and is ready to serve requests.
    You also see enabled features (Config, Fault Tolerance, Health, Metrics, Tracing,
    and WebServer).


    ```

    $ java -jar .\target\myproject.jar

    2022.12.28 08:42:51 INFO io.helidon.common.LogConfig Thread[#1,main,5,main]: Logging
    at initialization configured using classpath: /logging.properties

    2022.12.28 08:42:52 INFO io.helidon.common.HelidonFeatures Thread[#38,features-thread,5,main]:
    Helidon SE 3.1.0 features: [Config, Fault Tolerance, Health, Metrics, Tracing,
    WebServer]

    2022.12.28 08:42:52 INFO io.helidon.webserver.NettyWebServer Thread[#39,nioEventLoopGroup-2-1,10,main]:
    Channel ''@default'' started: [id: 0x02e402f0, L:/[0:0:0:0:0:0:0:0]:8080]

    WEB server is up! http://localhost:8080/greet

    Listing 15-3

    Running Your Project

    ```


    You can also build a `jlink` image and a GraalVM native image. The commands are
    the same as in Helidon MP. See Chapter [2](#600147_1_En_2_Chapter.xhtml) for a
    detailed description.


    ## Other Helidon SE Features


    The Quickstart application is only a small application demonstrating basic Helidon
    SE functionality. Helidon SE provides a much more comprehensive set of features
    not covered in this book. The following lists the complete set of Helidon SE features.


    - Reactive Web Server

    - RESTful web services

    - Configuration

    - Security

    - Observability: health checks, metrics, tracing, logging

    - Fault Tolerance

    - `gRPC`

    - `WebClient`

    - `DBClient`

    - Reactive Stream Operators

    - Reactive Messaging

    - `CORS`

    - `GraphQL`

    - `OpenAPI`

    - `WebSockets`

    - Integrations with OCI, Neo4j, HashiCorp Vault


    For more information, please refer to Helidon documentation on the official website
    at [`https://helidon.io`](https://helidon.io).


    ## Summary


    - Helidon SE is a reactive, non-blocking flavor of Helidon.

    - Helidon SE programming model differs from the Helidon MP programming model.

    - Helidon SE doesn’t support dependency injection.

    - You must implement the `main` method in your Helidon SE application.'
  raw: '### Health Checks


    Due to different design concepts, Helidon SE cannot implement MicroProfile Metrics
    specifications (see Chapter [4](#600147_1_En_4_Chapter.xhtml)). However, it contains
    health check support, which provides the same functionality as Helidon MP but
    uses the Helidon SE programming model.


    You need to add the `helidon-health` dependency to your Maven project to use health
    checks.


    ```

    io.helidon.health

    helidon-health


    ```


    You may also add a dependency to the `helidon-health-checks` module, which contains
    optional built-in checks such as deadlock detection, available disk space, and
    available heap memory.


    ```

    io.helidon.health

    helidon-health-checks


    ```


    To use health checks, you need to create the `HealthSupport` class instance and
    register the built-in checks and your custom health checks. The following shows
    how it’s done in the Quickstart application (the snippet is taken from the `createRouting`
    method).


    ```

    HealthSupport health = HealthSupport.builder()

    .addLiveness(HealthChecks.healthChecks())

    .build();

    ```


    To expose your service health on the `/health` endpoint, register your `HealthSupport`
    in the web server routings.


    ```

    Routing.Builder builder = Routing.builder()

    .register(health)

    ...

    ```


    Now you can request your service health status using this command.


    ```

    curl http://localhost:8080/health

    ```


    ### Metrics


    Helidon SE provides a way to collect and expose metrics. As with health checks,
    functionality is very similar to Helidon MP. The difference is that Helidon SE
    has only programmatic API, which differs from what Helidon MP provides.


    You must add the `helidon-metrics` dependency to your project’s `pom.xml` file
    to use metrics.


    ```

    io.helidon.metrics

    helidon-metrics


    ```


    When added, you can use the `MetricRegistry` class instance to register the metrics
    you want to track. Helidon SE supports the same metric types as Helidon MP: counter,
    concurrent gauge, gauge, histogram, meter, timer, and simple timer.


    The Quickstart application contains a sample of using a counter in the `SimpleGreetService`
    class.


    ```

    private final MetricRegistry registry = RegistryFactory.getInstance()

    .getRegistry(MetricRegistry.Type.APPLICATION);

    private final Counter accessCtr = registry.counter("accessctr");

    ```


    After registering a counter, you can use its `inc()` method to increase its value.
    The Quickstart application counts how many requests were received by the `/greet-count`
    endpoint. To do it, a chain of request handlers is registered to process this
    path.


    ```

    public void update(Routing.Rules rules) {

    ...

    rules.get("/greet-count", this::countAccess, this::getDefaultMessageHandler);

    }

    ```


    The handler increases the counter, and calls `request.next()` to continue processing
    on the next registered handler.


    ```

    private void countAccess(ServerRequest request, ServerResponse response) {

    accessCtr.inc();

    request.next();

    }

    ```


    To expose your metrics on the `/metrics` endpoint, create the `MetricsSupport`
    class instance and add it to your routes. In the Quickstart application, it’s
    done in the `Main.createRouting` method.


    ```

    Routing.Builder builder = Routing.builder()

    .register(MetricsSupport.create())

    ...

    ```


    Now users can access metrics data at the following endpoints.


    *   `/metrics/base` means base metrics.


    *   `/metrics/vendor` means vendor-specific metrics.


    *   `/metrics/application` means application metrics. It’s where `accessctr` is
    located.


    Like Helidon MP, users can get metrics data in OpenMetrics and JSON formats. For
    example, use the following command to get the `accessctr` metric in OpenMetrics
    format.


    ```

    curl http://localhost:8080/metrics/application/accessctr

    ```


    You get a response similar to the following.


    ```

    # TYPE application_accessctr_total counter

    # HELP application_accessctr_total

    application_accessctr_total 42

    # EOF

    ```


    To get it in JSON format, add the `Accept: application/json` header, as follows.


    ```

    curl -H ''Accept: application/json'' -X GET http://localhost:8080/metrics/application/accessctr

    ```


    RESTful API is the same as in Helidon MP. Please refer to Chapter [4](#600147_1_En_4_Chapter.xhtml)
    for more details.


    ### Building and Packaging


    Build and packaging commands are identical for Helidon SE and Helidon MP applications.


    To build your project, use the following Maven command.


    ```

    mvn package

    ```


    To run your application, use the following.


    ```

    java -jar target/myproject.jar

    ```


    You see an output similar to Listing [15-3](#600147_1_En_15_Chapter.xhtml#PC25)
    if your application has been started successfully and is ready to serve requests.
    You also see enabled features (Config, Fault Tolerance, Health, Metrics, Tracing,
    and WebServer).


    ```

    $ java -jar .\target\myproject.jar

    2022.12.28 08:42:51 INFO io.helidon.common.LogConfig Thread[#1,main,5,main]: Logging
    at initialization configured using classpath: /logging.properties

    2022.12.28 08:42:52 INFO io.helidon.common.HelidonFeatures Thread[#38,features-thread,5,main]:
    Helidon SE 3.1.0 features: [Config, Fault Tolerance, Health, Metrics, Tracing,
    WebServer]

    2022.12.28 08:42:52 INFO io.helidon.webserver.NettyWebServer Thread[#39,nioEventLoopGroup-2-1,10,main]:
    Channel ''@default'' started: [id: 0x02e402f0, L:/[0:0:0:0:0:0:0:0]:8080]

    WEB server is up! http://localhost:8080/greet

    Listing 15-3

    Running Your Project

    ```


    You can also build a jlink image and a GraalVM native image. The commands are
    the same as in Helidon MP. See Chapter [2](#600147_1_En_2_Chapter.xhtml) for a
    detailed description.


    ## Other Helidon SE Features


    The Quickstart application is only a small application demonstrating basic Helidon
    SE functionality. Helidon SE provides a much more comprehensive set of features
    not covered in this book. The following lists the complete set of Helidon SE features.


    *   Reactive Web Server


    *   RESTful web services


    *   Configuration


    *   Security


    *   Observability: health checks, metrics, tracing, logging


    *   Fault Tolerance


    *   gRPC


    *   WebClient


    *   DBClient


    *   Reactive Stream Operators


    *   Reactive Messaging


    *   CORS


    *   GraphQL


    *   OpenAPI


    *   WebSockets


    *   Integrations with OCI, Neo4j, HashiCorp Vault


    For more information, please refer to Helidon documentation on the official website
    at [`https://helidon.io`](https://helidon.io).


    ## Summary


    *   Helidon SE is a reactive, non-blocking flavor of Helidon.


    *   Helidon SE programming model differs from the Helidon MP programming model.


    *   Helidon SE doesn’t support dependency injection.


    *   You must implement the `main` method in your Helidon SE application.'
  trans: '

    ### 健康检查


    由于设计理念不同，Helidon SE 无法实现 MicroProfile Metrics 规范（见第 4 章）。不过，它包含了健康检查支持，提供了与 Helidon
    MP 相同的功能，但使用的是 Helidon SE 编程模型。


    你需要在 Maven 项目中添加 `helidon-health` 依赖才能使用健康检查。


    ```

    io.helidon.health

    helidon-health


    ```


    你还可以添加 `helidon-health-checks` 模块依赖，其中包含可选的内置检查，例如死锁检测、可用磁盘空间和可用堆内存。


    ```

    io.helidon.health

    helidon-health-checks


    ```


    要使用健康检查，你需要创建 `HealthSupport` 类实例，并注册内置检查和自定义健康检查。下面展示了在 Quickstart 应用中如何实现（该代码片段取自
    `createRouting` 方法）。


    ```

    HealthSupport health = HealthSupport.builder()

    .addLiveness(HealthChecks.healthChecks())

    .build();

    ```


    要在 `/health` 端点暴露你的服务健康状态，请在 Web 服务器路由中注册 `HealthSupport`。


    ```

    Routing.Builder builder = Routing.builder()

    .register(health)

    ...

    ```


    现在你可以使用以下命令请求服务健康状态。


    ```

    curl http://localhost:8080/health

    ```


    ### 指标


    Helidon SE 提供了一种收集并暴露指标的方式。与健康检查类似，其功能与 Helidon MP 非常相近。不同之处在于，Helidon SE 仅提供编程式
    API，这与 Helidon MP 提供的方式不同。


    你必须在项目的 `pom.xml` 文件中添加 `helidon-metrics` 依赖才能使用指标功能。


    ```

    io.helidon.metrics

    helidon-metrics


    ```


    添加后，你可以使用 `MetricRegistry` 类实例注册你希望跟踪的指标。Helidon SE 支持与 Helidon MP 相同的指标类型：counter、concurrent
    gauge、gauge、histogram、meter、timer 和 simple timer。


    Quickstart 应用在 `SimpleGreetService` 类中包含了一个使用 counter 的示例。


    ```

    private final MetricRegistry registry = RegistryFactory.getInstance()

    .getRegistry(MetricRegistry.Type.APPLICATION);

    private final Counter accessCtr = registry.counter("accessctr");

    ```


    注册 counter 后，你可以使用它的 `inc()` 方法增加其值。Quickstart 应用会统计 `/greet-count` 端点接收到的请求数量。为此，会注册一组请求处理器链来处理该路径。


    ```

    public void update(Routing.Rules rules) {

    ...

    rules.get("/greet-count", this::countAccess, this::getDefaultMessageHandler);

    }

    ```


    该处理器会递增 counter，并调用 `request.next()` 继续由下一个已注册处理器处理。


    ```

    private void countAccess(ServerRequest request, ServerResponse response) {

    accessCtr.inc();

    request.next();

    }

    ```


    要在 `/metrics` 端点暴露指标，请创建 `MetricsSupport` 类实例并将其添加到路由中。在 Quickstart 应用中，这是在 `Main.createRouting`
    方法里完成的。


    ```

    Routing.Builder builder = Routing.builder()

    .register(MetricsSupport.create())

    ...

    ```


    现在用户可以通过以下端点访问指标数据。


    *   `/metrics/base` 表示基础指标。


    *   `/metrics/vendor` 表示供应商特定指标。


    *   `/metrics/application` 表示应用指标。`accessctr` 就位于这里。


    与 Helidon MP 一样，用户可以获取 OpenMetrics 和 JSON 格式的指标数据。例如，使用以下命令以 OpenMetrics 格式获取
    `accessctr` 指标。


    ```

    curl http://localhost:8080/metrics/application/accessctr

    ```


    你将得到类似如下的响应。


    ```

    # TYPE application_accessctr_total counter

    # HELP application_accessctr_total

    application_accessctr_total 42

    # EOF

    ```


    要获取 JSON 格式，请添加 `Accept: application/json` 请求头，如下所示。


    ```

    curl -H ''Accept: application/json'' -X GET http://localhost:8080/metrics/application/accessctr

    ```


    RESTful API 与 Helidon MP 相同。更多细节请参见第 4 章。


    ### 构建与打包


    Helidon SE 和 Helidon MP 应用的构建与打包命令完全一致。


    要构建项目，请使用以下 Maven 命令。


    ```

    mvn package

    ```


    要运行应用，请使用以下命令。


    ```

    java -jar target/myproject.jar

    ```


    如果应用已成功启动并准备好提供请求服务，你将看到与清单 15-3 类似的输出。你还会看到已启用的功能（Config、Fault Tolerance、Health、Metrics、Tracing
    和 WebServer）。


    ```

    $ java -jar .\target\myproject.jar

    2022.12.28 08:42:51 INFO io.helidon.common.LogConfig Thread[#1,main,5,main]: Logging
    at initialization configured using classpath: /logging.properties

    2022.12.28 08:42:52 INFO io.helidon.common.HelidonFeatures Thread[#38,features-thread,5,main]:
    Helidon SE 3.1.0 features: [Config, Fault Tolerance, Health, Metrics, Tracing,
    WebServer]

    2022.12.28 08:42:52 INFO io.helidon.webserver.NettyWebServer Thread[#39,nioEventLoopGroup-2-1,10,main]:
    Channel ''@default'' started: [id: 0x02e402f0, L:/[0:0:0:0:0:0:0:0]:8080]

    WEB server is up! http://localhost:8080/greet

    Listing 15-3

    Running Your Project

    ```


    你还可以构建 jlink 镜像和 GraalVM 原生镜像。命令与 Helidon MP 相同。详细说明见第 2 章。


    ## 其他 Helidon SE 特性


    Quickstart 应用只是一个用于演示 Helidon SE 基本功能的小型应用。Helidon SE 提供了更完整、更全面的特性集，本书未全部覆盖。以下列出了
    Helidon SE 的完整特性集。


    *   响应式 Web 服务器


    *   RESTful Web 服务


    *   配置


    *   安全


    *   可观测性：健康检查、指标、追踪、日志


    *   容错


    *   gRPC


    *   WebClient


    *   DBClient


    *   响应式流操作符


    *   响应式消息


    *   CORS


    *   GraphQL


    *   OpenAPI


    *   WebSockets


    *   与 OCI、Neo4j、HashiCorp Vault 的集成


    更多信息请参阅 Helidon 官方网站文档：[`https://helidon.io`](https://helidon.io)。


    ## 总结


    *   Helidon SE 是 Helidon 的响应式、非阻塞版本。


    *   Helidon SE 编程模型与 Helidon MP 编程模型不同。


    *   Helidon SE 不支持依赖注入。


    *   在 Helidon SE 应用中，你必须实现 `main` 方法。

    '
