    ### MicroTx


    与臭名昭著的 [Tuxedo](https://en.wikipedia.org/wiki/Tuxedo_%28software%29)（Unix 事务处理系统，扩展分布式操作）出自同一团队的全新事务管理器
    [MicroTx](https://www.oracle.com/database/transaction-manager-for-microservices)（Oracle
    微服务事务管理器）现已问世。MicroTx LRA 协调器提供了额外功能，例如与协调器之间受 Bearer 令牌保护的通信。您可以从 Oracle 的镜像仓库
    container-registry.oracle.com 获取 MicroTx。


    ```

    docker pull container-registry.oracle.com/database/otmm:latest

    清单 14-16

    MicroTx 协调器本地安装

    ```


    MicroTx 需要进行配置。清单 14-17 是本地开发所需的最低配置。


    *   ① 用于构建 LRA ID，请使用参与者可访问的 k8s 服务名称或 DNS 名称

    *   ② 事务日志的存储位置

    *   ③ 建议在与 Helidon 配合使用时启用 Narayana 兼容模式


    ```

    tmmConfiguration:

    listenAddr: 0.0.0.0:8070

    internalAddr: http://127.0.0.1:8070

    externalUrl: http://127.0.0.1:8070  ①

    serveTLS:

    enabled: false

    storage:

    type: memory  ②

    narayanaLraCompatibilityMode:

    enabled: true  ③

    清单 14-17

    MicroTx 最低配置文件

    ```


    运行 Docker 镜像时，别忘了将配置文件挂载到 /app/config 文件夹。请记住，协调器需要能够访问参与者在 LRA 启动请求期间提供的补偿链接上的
    JAX-RS 资源。


    ```

    docker run --network="host" -it \

    -v `pwd`:/app/config -w /app/config \

    --env CONFIG_FILE=tcs.yaml \

    container-registry.oracle.com/database/otmm:latest

    清单 14-18

    在 Docker 中运行 MicroTx

    ```


    MicroTx LRA 协调器资源可通过上下文路径 `/api/v1/lra-coordinator` 访问。需要配置 Helidon，使其在启动新的 LRA
    时知道如何访问该协调器。


    *   ① 用于首次调用协调器，请使用参与者可访问的 k8s 服务名称或 DNS 名称

    *   ② 用于构建补偿链接，请使用协调器可访问的 k8s 服务名称或 DNS 名称


