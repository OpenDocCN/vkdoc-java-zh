- fmt: "# 11. Scheduling Tasks\n\nThis chapter covers the following topics:\n\n- Scheduling\
    \ is essential for enterprise microservices, and it is easily done in Helidon.\n\
    - Scheduling using annotations in code and external configuration.\n- Scheduling\
    \ with Kubernetes.\n\nIn the enterprise environment, scheduling plays a critical\
    \ role in ensuring that various tasks and processes are executed promptly and\
    \ efficiently. With Helidon, scheduling is easy thanks to its built-in implementation\
    \ of scheduling functionality, based on the open source [cron-utils](https://github.com/jmrozanec/cron-utils)\
    \ library.\n\n`cron-utils` is a powerful Java library that allows us to define,\
    \ parse, validate, and migrate cron expressions. It provides a simple and intuitive\
    \ way to work with crons, commonly used in scheduling tasks. Additionally, `cron-utils`\
    \ can generate human-readable descriptions of cron expressions, making it easier\
    \ for developers to understand and modify them as needed.\n\nWith Helidon’s scheduling\
    \ functionality, you can leverage the power of `cron-utils` to create scheduled\
    \ tasks and processes in our enterprise applications. This allows us to automate\
    \ various tasks and ensure that they are executed on time, leading to increased\
    \ efficiency and productivity.\n\nScheduling can also be configured in the Kubernetes\
    \ environment because it has full `CronJob` support. This is discussed later in\
    \ the chapter.\n\n## Scheduling in Helidon\n\nAdd the Maven dependency shown in\
    \ Listing [11-1](#600147_1_En_11_Chapter.xhtml#PC1) to enable scheduling.\n\n\
    - ① Helidon scheduling support dependency\n\n```text\nio.helidon.microprofile.scheduling\n\
    helidon-microprofile-scheduling  ①\n\nListing 11-1\nHelidon Scheduling Dependency\n\
    ```\n\nIn Helidon, a function can be configured to run with a certain schedule\
    \ using `@Scheduled` annotation. This annotation receives a value of a string\
    \ with a cron expression. The word cron originates from the Greek word chronos,\
    \ meaning “time.” `cron` is a preeminent command-line tool for scheduling jobs\
    \ on Unix-like operating systems.\n\nIn Unix-based systems, it is customary to\
    \ write a `CronJob` in files such as `crontab`. Each line in these files comprises\
    \ a schedule definition and the corresponding command to be executed. The first\
    \ five characters, each separated by a space, is the schedule definition.\n\n\
    ![](images/600147_1_En_11_Chapter/600147_1_En_11_Fig1_HTML.jpg)\n\nAn illustration\
    \ of the cron expressions of minute, hour, day in month, month, and day in week\
    \ are represented in star signs. The command is given at the end.\n\nFigure 11-1\n\
    \nCron expression definition\n\nIn Helidon, you don’t have a command after the\
    \ expression; you just use the scheduling expression in the annotation `@Scheduled`,\
    \ which is put on a method that should run with a certain schedule.\n\n```java\n\
    @Scheduled(\"0 5 1 * *\", concurrentExecution = false)\npublic void magicJob()\
    \ { ... }\n\nListing 11-2\nScheduled Task Example\n```\n\nThis method is executed\
    \ “At 05:00 on day-of-month 1.” No concurrent execution is allowed. The string\
    \ follows the cron model to describe the scheduled calls.\n\n### Note\n\nEnsure\
    \ that the method annotated with `@Scheduled` is in an `ApplicationScoped` bean.\n\
    \nCron expressions are really powerful. Just with a few symbols, you can describe\
    \ quite a complex schedule. In Helidon, you can do even more complex scheduling\
    \ scenarios, as the `cron-utils` library enables them. For example, instead of\
    \ writing `0 0 1 * * ? *`, `0 0 10 * * ? *`, `0 15 3 * * ? *` and `0 0 7 * * ?\
    \ *`, you can wrap it into `0 0|0|15|0 1|10|3|7 * * ? *`.\n\nIf you need more\
    \ metadata about each `cron` invocation, it is available through the `CronInvocation`\
    \ object, injected as a method parameter.\n\n- ① Injects `CronInvocation` as a\
    \ parameter\n- ② Uses invocation data\n\n```java\n@Scheduled(\"0 11 4 * *\")\n\
    public void magicJob(CronInvocation inv) {                ①\n    String description\
    \ = invocation.description();         ②\n}\n\nListing 11-3\nScheduled Task Invocation\
    \ Details Injection\n```\n\nThis data can be used for logging or debugging purposes.\n\
    \n`@Scheduled` annotation properties can be overridden using `application.yaml`\
    \ properties.\n\n- ① Fully qualified class name on which to define scheduled execution\n\
    - ② cron expression\n- ③ Concurrent execution (set it to `false`)\n\n```yaml\n\
    fully.qualified.ClassName.methodName:   ①\n  schedule:\n    cron: \"* * * * *\"\
    \                   ②\n    concurrent: false                   ③\n\nListing 11-4\n\
    Scheduled Task Configuration\n```\n\nThe following configuration properties are\
    \ available:\n\n- `property` (description)\n- `cron` (string containing cron setup)\n\
    - `concurrent` (boolean, equivalent `concurrentExecution` property of `@Scheduled`,\
    \ default `true`)\n\nNow you know how to create and configure scheduled tasks\
    \ with Helidon!\n\n## Simple Scheduling in Helidon\n\nWhile Cron expressions can\
    \ be useful for handling more complex scheduling scenarios, there are situations\
    \ when a simpler solution is needed. For instance, when a fixed rate invocation\
    \ interval is sufficient, using the `@FixedRate` annotation is often the easiest\
    \ way to schedule a recurring task invocation. Just annotate a method with what\
    \ is shown in Listing [11-5](#600147_1_En_11_Chapter.xhtml#PC5).\n\n```java\n\
    @FixedRate(initialDelay = 2, value = 15, timeUnit = TimeUnit.SECONDS)\n\nListing\
    \ 11-5\nFixed Rate Task\n```\n\nA method annotated this way is executed every\
    \ 15 seconds with an initial delay of 2 seconds.\n\n### Note\n\nEnsure that the\
    \ function annotated with `@FixedRate` is in an `ApplicationScoped` bean.\n\n\
    The same functionality can be achieved with external configuration. As with `@Scheduled`,\
    \ all values defined with the annotation can be overridden from the config.\n\n\
    - ① Fully qualified class name on which to define scheduled execution\n- ② Initial\
    \ delay\n- ③ Delay between calls\n- ④ Time unit\n\n```yaml\nfully.qualified.ClassName.methodName:\
    \ ①\n  schedule:\n    initial-delay: 0                  ②\n    delay: 30     \
    \                    ③\n    time-unit: MINUTES                ④\n\nListing 11-6\n\
    Configuration Example\n```\n\nThe `FixedRateInvocation` injected method parameter\
    \ provides access to metadata such as interval descriptions that are easy for\
    \ humans to read and configured values.\n\n- ① Injects `FixedRateInvocation` as\
    \ a parameter\n- ② Uses invocation data\n\n```java\n@FixedRate(initialDelay =\
    \ 5, value = 10, timeUnit = TimeUnit.MINUTES)\npublic void magicJob(FixedRateInvocation\
    \ invocation) {      ①\n    String description = invocation.description();   \
    \       ②\n}\n\nListing 11-7\nInvocation Details Injection\n```\n\nThis data can\
    \ be used for debugging or logging purposes."
  raw: '# 11. Scheduling Tasks


    This chapter covers the following topics.


    *   Scheduling is essential for enterprise microservices, and it is easily done
    in Helidon


    *   Scheduling using annotations in code and external configuration


    *   Scheduling with Kubernetes


    In the enterprise environment, scheduling plays a critical role in ensuring that
    various tasks and processes are executed promptly and efficiently. With Helidon,
    scheduling is easy thanks to its built-in implementation of scheduling functionality,
    based on the open source [cron-utils](https://github.com/jmrozanec/cron-utils)
    library.


    cron-utils is a powerful Java library that allows us to define, parse, validate,
    and migrate cron expressions. It provides a simple and intuitive way to work with
    crons, commonly used in scheduling tasks. Additionally, cron-utils can generate
    human-readable descriptions of cron expressions, making it easier for developers
    to understand and modify them as needed.


    With Helidon’s scheduling functionality, you can leverage the power of cron-utils
    to create scheduled tasks and processes in our enterprise applications. This allows
    us to automate various tasks and ensure that they are executed on time, leading
    to increased efficiency and productivity.


    Scheduling can also be configured in the Kubernetes environment because it has
    full CronJob support. This is discussed later in the chapter.


    ## Scheduling in Helidon


    Add the Maven dependency shown in Listing [11-1](#600147_1_En_11_Chapter.xhtml#PC1)
    to enable scheduling.


    *   ① Helidon scheduling support dependency


    ```

    io.helidon.microprofile.scheduling

    helidon-microprofile-scheduling  ①


    Listing 11-1

    Helidon Scheduling Dependency

    ```


    In Helidon, a function can be configured to run with a certain schedule using
    `@Scheduled` annotation. This annotation receives a value of a string with a *cron
    expression*. The word *cron* originates from the Greek word *chronos*, meaning
    “time.” cron is a preeminent command-line tool for scheduling jobs on Unix-like
    operating systems.


    In Unix-based systems, it is customary to write a CronJob in files such as *crontab*.
    Each line in these files comprises a schedule definition and the corresponding
    command to be executed. The first five characters, each separated by a space,
    is the schedule definition.


    ![](images/600147_1_En_11_Chapter/600147_1_En_11_Fig1_HTML.jpg)


    An illustration of the cron expressions of minute, hour, day in month, month,
    and day in week are represented in star signs. The command is given at the end.


    Figure 11-1


    Cron expression definition


    In Helidon, you don’t have a command after the expression; you just use the scheduling
    expression in the annotation `@Scheduled`, which is put on a method that should
    run with a certain schedule.


    ```

    @Scheduled("0 5 1 * *", concurrentExecution = false)

    public void magicJob() { ... }

    Listing 11-2

    Scheduled Task Example

    ```


    This method is executed “At 05:00 on day-of-month 1.” No concurrent execution
    is allowed. The string follows the cron model to describe the scheduled calls.


    Note


    Ensure that the annotated with `@Scheduled` method is in an `ApplicationScoped`
    bean.


    Cron expressions are really powerful. Just with a few symbols, you can describe
    quite a complex schedule. In Helidon, you can do even more complex scheduling
    scenarios, as the `cron-utils` library enables them. For example, instead of,
    writing `0 0 1 * * ? *`, `0 0 10 * * ? *`, `0 15 3 * * ? *` and `0 0 7 * * ? *`
    you can wrap it into `0 0|0|15|0 1|10|3|7 * * ? *`


    If you need more metadata about each `cron` invocation, it is available through
    the `CronInvocation` object, injected as a method parameter.


    *   ① Injects `CronInvocation` as a parameter


    *   ② Uses invocation data


    ```

    @Scheduled("0 11 4 * *")

    public void magicJob(CronInvocation inv) {                ①

    String description = invocation.description();        ②

    }

    Listing 11-3

    Scheduled Task Invocation Details Injection

    ```


    This data can be used for logging or debugging purposes.


    `@Scheduled` annotation properties can be overridden using `application.yaml`
    properties.


    *   ① Fully qualified class name on which to define scheduled execution


    *   ② cron expression


    *   ③ Concurrent execution (set it to `false`)


    ```

    fully.qualified.ClassName.methodName:   ①

    schedule:

    cron: "* * * * *"                   ②

    concurrent: false                   ③

    Listing 11-4

    Scheduled Task Configuration

    ```


    The following configuration properties are available.


    *   **property** (description)


    *   **cron** (string containing cron setup)


    *   **concurrent** (boolean, equivalent `concurrentExecution` property of `@Scheduled`,
    default `true`)


    Now you know how to create and configure *scheduled tasks* with Helidon!


    ## Simple Scheduling in Helidon


    While Cron expressions can be useful for handling more complex scheduling scenarios,
    there are situations when a simpler solution is needed. For instance, when a fixed
    rate invocation interval is sufficient, using the `@FixedRate` annotation is often
    the easiest way to schedule a recurring task invocation. Just annotate a method
    with what is shown in Listing [11-5](#600147_1_En_11_Chapter.xhtml#PC5).


    ```

    @FixedRate(initialDelay = 2, value = 15, timeUnit = TimeUnit.SECONDS)

    Listing 11-5

    Fixed Rate Task

    ```


    A method annotated this way is executed every 15 seconds with an initial delay
    of 2 seconds.


    Note


    Ensure that the annotated with `@FixedRate` function is in an `ApplicationScoped`
    bean.


    The same functionality can be achieved with external configuration. As with `@Scheduled`,
    all values defined with the annotation can be overridden from the config.


    *   ① Fully qualified class name on which to define scheduled execution


    *   ② Initial delay


    *   ③ Delay between calls


    *   ④ Time unit


    ```

    fully.qualified.ClassName.methodName: ①

    schedule:

    initial-delay: 0                  ②

    delay: 30                         ③

    time-unit: MINUTES                ④

    Listing 11-6

    Configuration Example

    ```


    The `FixedRateInvocation` injected method parameter provides access to metadata
    such as interval descriptions that are easy for humans to read and configured
    values.


    *   ① Injects `FixedRateInvocation` as a parameter


    *   ② Uses invocation data


    ```

    @FixedRate(initialDelay = 5, value = 10, timeUnit = TimeUnit.MINUTES)

    public void magicJob(FixedRateInvocation invocation) {      ①

    String description = invocation.description();          ②

    }

    Listing 11-7

    Invocation Details Injection

    ```


    This data can be used for debugging or logging purposes.'
  trans: '

    # 11. 任务调度


    本章涵盖以下主题。


    *   调度对企业级微服务至关重要，并且在 Helidon 中很容易实现


    *   在代码中使用注解和通过外部配置进行调度


    *   使用 Kubernetes 进行调度


    在企业环境中，调度在确保各种任务和流程能够及时且高效执行方面起着关键作用。借助 Helidon，调度非常简单，这得益于其内置的调度功能实现，该实现基于开源的
    [cron-utils](https://github.com/jmrozanec/cron-utils) 库。


    cron-utils 是一个强大的 Java 库，允许我们定义、解析、校验和迁移 cron 表达式。它提供了一种简单直观的方式来处理 cron（常用于任务调度）。此外，cron-utils
    还能生成人类可读的 cron 表达式描述，使开发者更容易理解并按需修改它们。


    借助 Helidon 的调度功能，你可以利用 cron-utils 的强大能力，在企业应用中创建定时任务和流程。这使我们能够自动化各种任务并确保它们按时执行，从而提高效率和生产力。


    调度也可以在 Kubernetes 环境中进行配置，因为它完整支持 CronJob。本章稍后将讨论这一点。


    ## Helidon 中的调度


    添加清单 11-1 所示的 Maven 依赖以启用调度。


    *   ① Helidon 调度支持依赖


    ```

    io.helidon.microprofile.scheduling

    helidon-microprofile-scheduling  ①


    Listing 11-1

    Helidon Scheduling Dependency

    ```


    在 Helidon 中，可以使用 `@Scheduled` 注解将某个函数配置为按特定计划运行。该注解接收一个字符串值，即 *cron 表达式*。*cron*
    一词源自希腊语 *chronos*，意为“时间”。cron 是类 Unix 操作系统中用于调度作业的代表性命令行工具。


    在基于 Unix 的系统中，通常会在 *crontab* 等文件中编写 CronJob。这些文件中的每一行都包含一个调度定义及对应要执行的命令。前五个由空格分隔的字段即为调度定义。


    ![](img/600147_1_En_11_Fig1_HTML.jpg)


    一个示意图：分钟、小时、月中的日、月份、周中的日等 cron 表达式字段以星号表示。命令位于末尾。


    图 11-1


    Cron 表达式定义


    在 Helidon 中，表达式后面不需要命令；你只需在 `@Scheduled` 注解中使用调度表达式，并将其标注在应按特定计划运行的方法上。


    ```

    @Scheduled("0 5 1 * *", concurrentExecution = false)

    public void magicJob() { ... }

    Listing 11-2

    Scheduled Task Example

    ```


    该方法会在“每月 1 日 05:00”执行。不允许并发执行。该字符串遵循 cron 模型来描述调度调用。


    注意


    请确保使用 `@Scheduled` 注解的方法位于 `ApplicationScoped` Bean 中。


    Cron 表达式非常强大。仅用少量符号，你就可以描述相当复杂的调度。在 Helidon 中，你甚至可以实现更复杂的调度场景，因为 `cron-utils`
    库支持它们。例如，你无需分别编写 `0 0 1 * * ? *`、`0 0 10 * * ? *`、`0 15 3 * * ? *` 和 `0 0 7 *
    * ? *`，可以将其合并为 `0 0|0|15|0 1|10|3|7 * * ? *`


    如果你需要每次 `cron` 调用的更多元数据，可以通过将 `CronInvocation` 对象注入为方法参数来获取。


    *   ① 将 `CronInvocation` 作为参数注入


    *   ② 使用调用数据


    ```

    @Scheduled("0 11 4 * *")

    public void magicJob(CronInvocation inv) {                ①

    String description = invocation.description();        ②

    }

    Listing 11-3

    Scheduled Task Invocation Details Injection

    ```


    这些数据可用于日志记录或调试。


    `@Scheduled` 注解属性可以通过 `application.yaml` 属性进行覆盖。


    *   ① 用于定义调度执行的完全限定类名


    *   ② cron 表达式


    *   ③ 并发执行（将其设置为 `false`）


    ```

    fully.qualified.ClassName.methodName:   ①

    schedule:

    cron: "* * * * *"                   ②

    concurrent: false                   ③

    Listing 11-4

    Scheduled Task Configuration

    ```


    可用的配置属性如下。


    *   **property**（描述）


    *   **cron**（包含 cron 配置的字符串）


    *   **concurrent**（布尔值，对应 `@Scheduled` 的 `concurrentExecution` 属性，默认 `true`）


    现在你已经知道如何使用 Helidon 创建和配置*定时任务*了！


    ## Helidon 中的简单调度


    虽然 Cron 表达式可用于处理更复杂的调度场景，但在某些情况下需要更简单的解决方案。例如，当固定频率调用间隔已足够时，使用 `@FixedRate` 注解通常是调度重复任务调用最简单的方法。只需像清单
    11-5 所示那样注解一个方法。


    ```

    @FixedRate(initialDelay = 2, value = 15, timeUnit = TimeUnit.SECONDS)

    Listing 11-5

    Fixed Rate Task

    ```


    以这种方式注解的方法会每 15 秒执行一次，初始延迟为 2 秒。


    注意


    请确保使用 `@FixedRate` 注解的函数位于 `ApplicationScoped` Bean 中。


    同样的功能也可以通过外部配置实现。与 `@Scheduled` 一样，注解中定义的所有值都可以被配置覆盖。


    *   ① 用于定义调度执行的完全限定类名


    *   ② 初始延迟


    *   ③ 调用间隔


    *   ④ 时间单位


    ```

    fully.qualified.ClassName.methodName: ①

    schedule:

    initial-delay: 0                  ②

    delay: 30                         ③

    time-unit: MINUTES                ④

    Listing 11-6

    Configuration Example

    ```


    注入的方法参数 `FixedRateInvocation` 可用于访问元数据，例如人类易读的间隔描述以及配置值。


    *   ① 将 `FixedRateInvocation` 作为参数注入


    *   ② 使用调用数据


    ```

    @FixedRate(initialDelay = 5, value = 10, timeUnit = TimeUnit.MINUTES)

    public void magicJob(FixedRateInvocation invocation) {      ①

    String description = invocation.description();          ②

    }

    Listing 11-7

    Invocation Details Injection

    ```


    这些数据可用于调试或日志记录。

    '
- fmt: '## Scheduling in Kubernetes


    Scheduling in Helidon is fine if you use a single microservice with a single instance
    running on a bare metal machine. This is a rare case nowadays. Most microservices
    are executed in a Kubernetes environment somewhere in the clouds, with multiple
    replicas and a load balancer set.


    Whenever you schedule a CronJob in our code or configuration, this scheduled code
    runs, and all replicas of the application. This is often not the behavior you
    want. Usually, you want only application to make a scheduled job.


    But this can be easily solved on a Kubernetes level itself. Kubernetes provides
    CronJob support. And as with everything in Kubernetes, you just need to create
    a `yaml` file.


    ### Note


    Here we assume that you are familiar with Kubernetes and the `kubectl` CLI utility;
    otherwise, please consult the [official Kubernetes documentation](https://kubernetes.io/docs/home/).


    Imagine you want to run a “magic cleanup” job every morning at 2 a.m. As with
    everything in Kubernetes, you should create the `yaml` spec shown in Listing [11-8](#600147_1_En_11_Chapter.xhtml#PC8).


    - ① Document `kind` is `CronJob`

    - ② Name of the job

    - ③ Job execution schedule: every day at 2 a.m.

    - ④ An image with Helidon application


    ```yaml

    apiVersion: batch/v1

    kind: CronJob                                  ①

    metadata:

    name: CleanSomeMagic                         ②

    spec:

    schedule: "* 10 5 * *"                       ③

    jobTemplate:

    spec:

    template:

    spec:

    containers:

    - name: CleanSomeMagic

    image: wizardCleaningApp:latest    ④

    Listing 11-8

    CronJob Configuration

    ```


    The Magic Cleanup Job is a hypothetical Helidon application packaged as a Docker
    image and published in a Docker image registry.


    As the descriptor is applied, you can watch the status of the job executions.


    ```bash

    > kubectl get jobs --watch

    NAME               COMPLETIONS   DURATION   AGE

    CleanSomeMagic     0/1                      0s

    CleanSomeMagic     1/1           12s        12s

    Listing 11-9

    Monitor the Job

    ```


    Alternatively, you can simply call `describe` to see all the information about
    the job. The output also includes the run history.


    When you no longer need a CronJob, you simply delete it.


    A full description of how to construct CronJob specifications is available in
    the [official documentation.​](https://kubernetes.io/docs/tasks/job/automated-tasks-with-cron-jobs/)


    Indeed, while the topic of scheduling may seem simple, it is critical to the success
    of many enterprise applications. Fortunately, Helidon makes it easy to manage
    complex tasks and process scheduling.


    In addition, if you are deploying your Helidon application to Kubernetes, you
    can use Kubernetes’ built-in scheduling capabilities. Kubernetes allows us to
    define and manage complex schedules for your applications, including support for
    cron expressions and other advanced scheduling features.


    Whether you’re using Helidon’s built-in scheduling framework or leveraging Kubernetes’
    scheduling capabilities, you can be sure that your application can handle even
    the most complex scheduling scenarios with ease.


    ## Summary


    - With only two annotations—`@Scheduled` or `@FixedRate`—you can schedule a task
    with an easy or complex schedule.

    - You can schedule tasks both with annotations or with configuration.

    - To schedule a job on one Pod in Kubernetes, use its built-in cron capabilities.


    ## 12. Integration with Other Technologies


    This chapter covers the following topics.


    - Integrating Helidon with other famous technologies

    - Creating graph database-backed microservices with Neo4j

    - Integrating with Coherence CE whenever fast, scalable, and persistent caching
    is required

    - Deploying microservices to the clouds with Verrazzano


    ## Neo4j


    Neo4j is a graph database management system developed by [Neo4j](https://neo4j.com/),
    Inc. Neo4j’s native graph storage and processing capabilities make it an ideal
    choice for applications that manage complex relationships between data points.


    One of the key benefits of using Neo4j with Helidon is the ability to take advantage
    of both technologies’ strengths. Helidon’s lightweight and modular architecture
    makes building and deploying microservices easy, while Neo4j’s graph database
    capabilities allow you to manage complex data relationships. This combination
    of strengths makes it easy to build powerful, scalable, and highly performant
    applications that can handle even the most complex data challenges.


    The integration with Neo4j is ensured by configuring and initializing Neo4j driver
    from the standard Helidon configuration.


    Add the following dependency to the project’s `pom.xml` file to start using it.


    - ① Neo4j Helidon dependency


    ```text

    io.helidon.integrations.neo4j       ①

    helidon-integrations-neo4j


    Listing 12-1

    Neo4j Helidon Integration Dependency

    ```


    After that, you should specify all the connection details in the `microprofile-config.properties`
    file.


    - ① Neo4j server URI using Bolt protocol

    - ② Server username

    - ③ Server password


    ```properties

    neo4j.uri=bolt://localhost:7687        ①

    neo4j.authentication.username=neo4j    ②

    neo4j.authentication.password=secret   ③

    Listing 12-2

    Neo4j Configuration

    ```


    Now you can simply inject the driver into the code.


    - ① Injects Neo4j driver


    ```java

    @Inject

    public WizardsRepository(Driver driver) {             ①

    this.driver = driver;

    }

    Listing 12-3

    Inject Neo4j Driver

    ```


    Here it is done using the constructor. So, when Helidon starts, the driver is
    automatically injected into our class.


    As the driver is set up and injected, you can do [Cypher](https://neo4j.com/developer/cypher/)
    queries to the Neo4j database, as shown in Listing [12-4](#600147_1_En_12_Chapter.xhtml#PC4).


    - ① Sample Neo4j Cypher query

    - ② Initializes a session using `driver`

    - ③ Executes a Cypher query and gets the result


    ```java

    public List findAllWizards() {      ①

    var session = driver.session()                ②

    var result = session.run("MATCH (Wizard) RETURN wizard").list()                               ③

    return result;

    }

    Listing 12-4

    Example of a Cypher Request

    ```


    This data can then be processed and returned using a typical Helidon endpoint.


    To play more with Helidon and Neo4j, please check out a full-scaled Helidon Neo4j
    example based on a Movie database in [Helidon Official GitHub Repository](https://github.com/helidon-io/helidon/tree/helidon-3.x/examples/integrations/neo4j).


    ### Enabling Metrics and Health Checks


    The extent of Neo4j’s support goes beyond the driver configuration and initialization.
    You can include two additional dependencies if you require greater insight into
    the database’s performance.


    Listing [12-5](#600147_1_En_12_Chapter.xhtml#PC5) is the code for health checks.


    - ① Neo4j health checks dependency


    ```text

    io.helidon.integrations.neo4j     ①

    helidon-integrations-neo4j-health


    Listing 12-5

    Neo4j Health Checks

    ```


    Listing [12-6](#600147_1_En_12_Chapter.xhtml#PC6) is the code for metrics.


    - ① Neo4j metrics dependency


    ```text

    io.helidon.integrations.neo4j    ①

    helidon-integrations-neo4j-metrics


    Listing 12-6

    Neo4j Metrics Dependency

    ```


    By adding them, the observability data from Neo4j is injected into Helidon standard
    `/health` and `/metrics` endpoints output.


    ### Note


    Metrics on the server side should be enabled by setting the `neo4j.pool.metricsEnabled`
    to `true` in the Helidon config.


    Now, run the following in the command line.


    ```bash

    > curl -X GET http://localhost:8080/metrics

    ```


    Neo4j metrics information is printed.


    And the following shows available Neo4j health check information.


    ```bash

    > curl -X GET http://localhost:8080/health

    ```'
