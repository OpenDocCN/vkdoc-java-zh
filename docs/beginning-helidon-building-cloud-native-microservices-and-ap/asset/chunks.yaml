    io.helidon.integrations.cdi

    helidon-integrations-cdi-jpa②

    runtime


    io.helidon.integrations.cdi

    helidon-integrations-cdi-hibernate ③

    runtime


    io.helidon.integrations.cdi

    helidon-integrations-cdi-datasource-hikaricp                                    ④

    runtime


    Listing 6-8

    Persistence Dependencies

