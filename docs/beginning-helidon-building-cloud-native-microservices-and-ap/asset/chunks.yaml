    ### 退出 LRA


    最后，我们来讲讲特殊方法 `@Leave`。你可以使用这个方法将参与者从其已加入的 LRA 中移除。除了 `@LRA` 之外，它是你应该直接调用的唯一参与者
    JAX-RS 方法。调用时若携带 LRA 上下文请求头，则该参与者如果已加入该事务，将从事务中移除。在这个事务上下文中，像 `@Complete` 这样的其他补偿方法将不会再被调用，因为协调器不再为该事务跟踪此参与者。


    *   ① 需要退出的 LRA 事务参与者 ID


    *   ② 在协调器被请求将参与者从 LRA 事务中移除后执行该方法


    ```

    @Leave

    @PUT

    @Path("/leave")

    public Response leave(@HeaderParam(LRA_HTTP_CONTEXT_HEADER) URI lraId) {  ①

    return Response.ok();  ②

    }

    Listing 14-8

    JAX-RS Leave Resource, Used for Removing Participant from LRA Transaction

    ```


    注意


    leave 方法与其他参与者方法相反，它是设计为可被直接调用的。


    ## 非 JAX-RS 参与者方法


    你已经了解了 LRA JAX-RS 资源可具备的所有参与者方法。规范对每个方法都有严格定义，因此并不一定要把它定义成 JAX-RS 方法。当方法带有 LRA
    参与者注解并符合指定签名时，LRA Helidon 实现会创建一个代理 JAX-RS 端点，并在幕后将其连接起来。


    我们再看一下 JAX-RS `@Compensate` 方法。


    ```

    @PUT

    @Compensate

    @Path("compensate-example")

    public Response failure(@HeaderParam(LRA_HTTP_CONTEXT_HEADER) URI lraId) {

    return LRAResponse.compensated();

    }

    Listing 14-9

    JAX-RS Compensate Resource

    ```


    同样的参与者方法也可以用非 JAX-RS 形式来表达。


    ```

    @Compensate

    public ParticipantStatus failure(URI lraId) {

    return ParticipantStatus.Compensated;

    }

    Listing 14-10

    Non-JAX-RS Compensate Resource

    ```


    参与者方法之间唯一的区别是：发送给协调器的补偿链接模式会略有不同，因为它指向的是代理 JAX-RS 资源，而不是我们的直接资源。


    ## 异步补偿


    补偿可能耗时很长，运行 5 分钟的复杂清理任务在现实中并不少见。让 `@Compensate` 方法阻塞这么久并不合适，因此你需要先响应协调器，再异步继续执行。如果异步补偿批处理任务失败怎么办？LRA
    正好为这种情况提供了合适的 API。有两种选择。第一种是返回 `ParticipantStatus.Compensating`，告知协调器稍后通过 `@Status`
    方法检查当前补偿状态。每个协调器都有重试策略，最终会获取到状态。


    ```

    private Map myStatusMap = new ConcurrentHashMap();

    @Compensate

    public ParticipantStatus failure(URI lraId) {

    ourWizardService.compensateAsync(lraId)

    .whenComplete((u, t) -> {

    if (t != null) {

    myStatusMap.put(lraId, ParticipantStatus.FailedToCompensate);

    } else {

    myStatusMap.put(lraId, ParticipantStatus.Compensated);

    }

    });

    return ParticipantStatus.Compensating;

    }

    @Status

    public ParticipantStatus status(URI lraId) {

    return myStatusMap.get(lraId);

    }

    @Forget

    public void forget(URI lraId) {

    myStatusMap.remove(lraId);

    }

    Listing 14-11

    Asynchronous Compensation with Status Reporting

    ```


    当协调器调用 `@Forget` 通知你不再需要这些信息时，你可以利用该方法清理状态引用。


    第二种方式更简单，因为非 JAX-RS 补偿方法支持返回 `CompletionStage` Promise。唯一的不足是连接会保持打开，但不会阻塞线程。


    ```

    @Compensate

    public CompletionStage failure(URI lraId) {

    return ourWizardService.compensateAsync(lraId)

    .thenApply(s -> ParticipantStatus.Compensated)

    .exceptionally(t -> ParticipantStatus.FailedToCompensate);

    }

    Listing 14-12

    Asynchronous Compensation with CompletionStage

    ```


    ## LRA 协调器


    Helidon 中的长时运行操作（Long Running Actions）实现需要 LRA 协调器在集群中统一编排 LRA。这是你在集群中启用 LRA 功能所需的额外服务。LRA
    协调器会跟踪哪个参与者加入了哪个 LRA 事务，并在 LRA 事务完成或取消时调用参与者的 LRA 补偿资源。


    补偿链接始终伴随参与者加入现有 LRA 事务的请求一起发送。补偿链接是指向参与者补偿 JAX-RS 方法的 URL，例如带有 `@Complete`、`@Compensate`
    等注解的方法，协调器正是据此知道如何调用参与者。补偿链接由你的 JAX-RS 资源上下文路径以及通过 `mp.lra,participant.url` 配置键配置的地址构建而成。


    *   ① 用于首次调用协调器，使用参与者可访问的 k8s 服务名或 DNS 名称


    *   ② 用于构建补偿链接，使用协调器可访问的 k8s 服务名或 DNS 名称


    ```

    mp.lra:

    coordinator.url: http://coordinator.service/lra-coordinator ①

    participant.url: http://participant.service  ②

    Listing 14-13

    Configure Helidon to Use a Coordinator

    ```


    Helidon 支持以下协调器。


    *   Narayana LRA 协调器


    *   MicroTx LRA 协调器


    *   实验性 Helidon LRA 协调器


    ### Narayana LRA 协调器


    Narayana 是一款知名事务管理器，围绕 Arjuna 内核构建，在分布式事务可靠性方面有着悠久历史。Narayana LRA 协调器支持 Long Running
    Actions，并且是市场上最早的 LRA 协调器。


    ```

    VER=5.13.0.Final && \

    FILENAME=lra-coordinator-quarkus-$VER-runner.jar && \

    FILEPATH=org/jboss/narayana/rts/lra-coordinator-quarkus/$VER/$FILENAME && \

    wget https://search.maven.org/remotecontent?filepath=$FILEPATH \

    -O narayana-coordinator.jar \

    && java -Dquarkus.http.port=8070 -jar narayana-coordinator.jar

    Listing 14-14

    Narayana Local Installation

    ```


    Narayana LRA 协调器资源可通过上下文 `/lra-coordinator` 访问。Helidon 需要进行配置，以便在启动新的 LRA 时知道去哪里访问它。


    *   ① 用于首次调用协调器，使用参与者可访问的 k8s 服务名或 DNS 名称


    *   ② 用于构建补偿链接，使用协调器可访问的 k8s 服务名或 DNS 名称


    ```

    mp.lra:

    coordinator.url: http://127.0.0.1:8070/lra-coordinator  ①

    participant.url: http://127.0.0.1:7002  ②

    propagation.active: true

    Listing 14-15

    Configure Helidon to Use Narayana

    ```

    '
- fmt: '## MicroTx


    From the very same kitchen as the notoriously famous [Tuxedo](https://en.wikipedia.org/wiki/Tuxedo_%2528software%2529)
    (Transactions for Unix, Extended for Distributed Operations) came the brand-new
    transaction manager [MicroTx](https://www.oracle.com/database/transaction-manager-for-microservices)
    (Oracle Transaction Manager for Microservices). MicroTx LRA coordinator offers
    additional features, such as bearer token-protected communication with the coordinator.
    You can obtain MicroTx from Oracle’s image registry at `container-registry.oracle.com`.


    ```bash

    docker pull container-registry.oracle.com/database/otmm:latest

    Listing 14-16

    MicroTx Coordinator Local Installation

    ```


    MicroTx needs to be configured. Listing [14-17](#600147_1_En_14_Chapter.xhtml#PC17)
    is the minimal configuration needed for local development.


    - ① Used for LRA ID construction, use `k8s` service name or DNS name accessible
    from participant

    - ② Where to store transaction log

    - ③ Narayana compatibility mode is recommended for usage with Helidon


    ```yaml

    tmmConfiguration:

    listenAddr: 0.0.0.0:8070

    internalAddr: http://127.0.0.1:8070

    externalUrl: http://127.0.0.1:8070  ①

    serveTLS:

    enabled: false

    storage:

    type: memory  ②

    narayanaLraCompatibilityMode:

    enabled: true  ③

    Listing 14-17

    MicroTx Minimal Configuration File

    ```


    Don’t forget to mount the configuration file to the `/app/config` folder when
    running the docker image. Remember that the coordinator needs to be able to reach
    participants’ JAX-RS resources on compensation links provided during the LRA start
    request.


    ```bash

    docker run --network="host" -it \

    -v `pwd`:/app/config -w /app/config \

    --env CONFIG_FILE=tcs.yaml \

    container-registry.oracle.com/database/otmm:latest

    Listing 14-18

    Run MicroTx in Docker

    ```


    MicroTx LRA coordinator resources are accessible under the context ``/api/v1/lra-coordinator``.
    Helidon needs to be configured to know where to reach it when starting a new LRA.


    - ① Used for the very first call to coordinator, use `k8s` service name or DNS
    name accessible from participant

    - ② Used for construction of compensation links, use `k8s` service name or DNS
    name accessible from coordinator


    ```yaml

    mp.lra:

    coordinator.url: http://127.0.0.1:8070/api/v1/lra-coordinator  ①

    participant.url: http://127.0.0.1:7002  ②

    propagation.active: true

    Listing 14-19

    Configure Helidon to Use MicroTx

    ```


    ## Experimental Helidon LRA Coordinator


    Helidon now has its own experimental coordinator that is easy to set up for development
    and testing purposes. While it is not recommended in production environments,
    it is a great lightweight solution for testing your LRA resources.


    ```bash

    docker build -t helidon/lra-coordinator https://github.com/oracle/helidon.git#:lra/coordinator/server

    docker run -dp 8070:8070 --name lra-coordinator --network="host" helidon/lra-coordinator

    Listing 14-20

    Helidon Coordinator Local installation

    ```


    ## Online Cinema Booking System


    Our hypothetical cinema needs an online reservation system. Let’s split it into
    two scalable services: one for booking the seat and another for paying. Services
    are completely separated and integrated only through the REST API calls.


    The booking service is going to reserve the seat first. The reservation service
    starts a new LRA transaction and joins it as a first transaction participant.
    All communication with the LRA coordinator is done behind the scenes and can be
    accessed through the LRA ID assigned to the new transaction in our JAX-RS method
    as a request header `Long-Running-Action`. Note that LRA stays active after the
    JAX-RS method finishes because `Lra#end` is set to `false`.


    ![](images/600147_1_En_14_Chapter/600147_1_En_14_Fig5_HTML.jpg)


    A screenshot titled, Helidon Cinema Reservation, with an illustration of seats
    numbered from 11 to 49, arranged in 3 rows. Seat 11 is selected. A text below
    reads, reserve seat 11.


    Figure 14-5


    Create new seat booking


    - ① Create new LRA transaction which won’t end after this JAX-RS method end

    - ② Time limit for new LRA is 30 sec

    - ③ LRA ID assigned by the coordinator is provided as an artificial request header


    ```java

    @PUT

    @Path("/create/{id}")

    @LRA(value = LRA.Type.REQUIRES_NEW, end = false, timeLimit = 30)  ① ②

    public Response createBooking(@HeaderParam(LRA.LRA_HTTP_CONTEXT_HEADER) URI lraId,

    @PathParam("id") long id,

    Booking booking) {

    booking.setLraId(lraId.toASCIIString());  ③

    if (repository.createBooking(booking, id)) {

    LOG.info("Creating booking for " + id);

    return Response.ok().build();

    } else {

    LOG.info("Seat " + id + " already booked!");

    return Response

    .status(Response.Status.CONFLICT)

    .entity(JSON.createObjectBuilder()

    .add("error", "Seat " + id + " is already reserved!")

    .add("seat", id)

    .build())

    .build();

    }

    }

    Listing 14-21

    Create Booking with JAX-RS Resource Within LRA Transaction

    ```


    Once a seat is successfully reserved, payment service will be called under the
    same LRA transaction. An artificial header, `Long-Running-Action`, is present
    in the response so the client can access it.


    - ① Notice how you can access LRA ID even on the client side

    - ② And save the LRA context for later


    ```javascript

    reserveButton.click(function () {

    selectionView.hide();

    createBooking(selectedSeat.html())

    .then(res => {

    if (res.ok) {

    let lraId = res.headers.get("Long-Running-Action");  ①

    paymentView.attr("data-lraId", lraId);  ②

    paymentView.show();

    } else {

    res.json().then(json => {

    showError(json.error);

    });

    }

    });

    });

    Listing 14-22

    Call Create Booking JAX-RS Resource

    ```


    You can call other backend resources with the same LRA transaction by setting
    the `Long-Running-Action` header again.


    ![](images/600147_1_En_14_Chapter/600147_1_En_14_Fig6_HTML.jpg)


    A screenshot of the payment information form, with text, make a $ 20 payment for
    the seat. The fields are listed below. Name as Frank, fake card number with 12
    digits, and amount as `20\`. Pay button is below.


    Figure 14-6


    Payment form


    - ① Using previously saved LRA ID to invoke JAX-RS resource under the right LRA
    context


    ```javascript

    function makePayment(cardNumber, amount, lraId) {

    return fetch(''/booking/payment'', {

    method: ''PUT'',

    headers: {

    ''Content-Type'': ''application/json'',

    ''Long-Running-Action'': lraId  ①

    },

    body: JSON.stringify({"cardNumber": cardNumber, "amount": amount})

    })

    }

    Listing 14-23

    Call Payment JAX-RS Resource from Client

    ```


    The backend calls a different service over the JAX-RS client, so you don’t need
    to set the `Long-Running-Action` header to propagate the LRA transaction. As with
    all JAX-RS clients, LRA implementation does that for you automatically.


    - ① Needs to be called within LRA transaction context

    - ② Doesn’t end LRA transaction

    - ③ No need to propagate LRA header when using JAX-RS client—LRA header is propagated
    automatically'
