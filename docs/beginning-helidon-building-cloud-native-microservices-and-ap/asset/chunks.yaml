    \ a request journey as it travels across components of a distributed system.\n\
    \nThis chapter uses the word *tracing* instead of *distributed tracking* because\
    \ it’s shorter.\n\n*Trace* is a full route of a request as it goes through components\
    \ in a distributed system. Trace includes a tree of spans.\n\n*Span* is a unit\
    \ of work representing a piece of the workflow like a method call. The first span\
    \ in the tree is called the *root span*. It may include *child spans* representing\
    \ sub-operations. Each span has a name and records the starting time of the operation,\
    \ its duration, and, optionally, some more data.\n\n![](images/600147_1_En_4_Chapter/600147_1_En_4_Fig4_HTML.jpg)\n\
    \nA block diagram of the distributed tracing system. It includes an admin and\
    \ storage connected to the distributed tracing system that tracks the requests\
    \ and responses through services 1, 2, and 3 over the trace, span 1, span 2, and\
    \ span 3.\n\nFigure 4-4\n\nDistributed tracing\n\nHelidon implements MicroProfile\
    \ OpenTracing APIs.\n\nMicroprofile Opentracing\n\n[MicroProfile OpenTracing](https://download.eclipse.org/microprofile/microprofile-opentracing-3.0/microprofile-opentracing-spec-3.0.html)\
    \ is an open specification based on the [OpenTracing](https://opentracing.io)\
    \ standard. It provides a neutral tracing API that smoothly integrates with tracing\
    \ systems like Zipkin and Jaeger.\n\nMicroProfile OpenTracing enables completely\
    \ automatic tracing without any actions needed from the developer. Developer chooses\
    \ the integration he wants to use and adds the corresponding library to the project\
    \ dependencies.\n\nOn each step of the request processing, Helidon invokes the\
    \ tracing API to mark key points of Helidon’s processing in the span. The developer\
    \ can (but does not have to) invoke the same neutral API at key points in the\
    \ application’s processing. The tracing implementation library collects and transmits\
    \ tracing information to the corresponding distributed tracing system, which accepts\
    \ it and saves it to its storage. Distributed tracing systems usually provide\
    \ a web UI to view application traces. Traces are usually visualized using waterfall\
    \ diagrams (see Figure [4-5](#600147_1_En_4_Chapter.xhtml#Fig5)).\n\n![](images/600147_1_En_4_Chapter/600147_1_En_4_Fig5_HTML.jpg)\n\
    \nA diagram includes blocks of trace, span 1, span 2 and span 3, and an arrow\
    \ of time from top to bottom.\n\nFigure 4-5\n\nTrace diagram\n\n### Adding Tracing\
    \ to Your Helidon Application\n\n#### Using Project Starter\n\nThe easiest way\
    \ is to use Project Starter to generate a project with tracing support.\n\nThe\
    \ following explains what you need to do.\n\n1.  Open Project Starter at [`https://helidon.io/starter`](https://helidon.io/starter).\n\
    \n2.  Select Helidon MP on the Helidon Flavor screen and click Next.\n\n3.  On\
    \ the Application Type screen, select Custom and click Next.\n\n4.  On the Media\
    \ Support screen, keep Jackson selected or select JSON-B if you want to be compliant\
    \ with the MicroProfile platform. Click Next.\n\n5.  On the Observability screen,\
    \ check Tracing and choose Tracing Providers you want to use. You may also select\
    \ Health Checks and Metrics if you want to use them in your application.\n\n6.\
    \  Click Download to generate your project, or go through the rest of the steps\
    \ to continue configuration.\n\n#### Using CLI\n\nYou need to have Helidon CLI\
    \ installed, as explained in Chapter [2](#600147_1_En_2_Chapter.xhtml).\n\nStart\
    \ new project generation using the `helidon init` command. CLI and Project Starter\
    \ are using the same configuration wizard. Answer questions as explained in the\
    \ preceding section. Finish the configuration wizard, and you get a project with\
    \ tracing support generated.\n\n#### Adding Dependencies Manually\n\nYou need\
    \ to add a dependency to vendor-neutral MicroProfile OpenTracing API as well as\
    \ a dependency on a distributed tracing system you would like to use.\n\nThe first\
    \ option uses the `helidon-microprofile` bundle, which contains `helidon-microprofile-tracing`\
    \ as a transitive dependency.\n\n```\nio.helidon.microprofile.bundles\nhelidon-microprofile\n\
    \n```\n\nIf you don’t want to use all the MicroProfile dependencies that the `helidon-microprofile`\
    \ bundle brings, you can use a more fine-grained configuration using the `helidon-microprofile-core`,\
    \ which brings only required dependencies plus the `helidon-microprofile-tracing`\
    \ artifact to enable MicroProfile OpenTracing.\n\n```\nio.helidon.microprofile.bundles\n\
    helidon-microprofile-core\n\nio.helidon.microprofile.tracing\nhelidon-microprofile-tracing\n\
    \n```\n\nIn addition to that, you must add a dependency to a tracing provider\
    \ you want to use. Helidon supports Jaeger and Zipkin out of the box.\n\nFor Jaeger,\
    \ add this dependency.\n\n```\nio.helidon.tracing\nhelidon-tracing-jaeger\nruntime\n\
    \n```\n\nFor Zipkin, add the following.\n\n```\nio.helidon.tracing\nhelidon-tracing-zipkin\n\
    runtime\n\n```\n\n### Helidon Tracing Implementation\n\nHelidon, as a compliant\
    \ implementation of MicroProfile OpenTracing, provides automatic (“code-free”)\
    \ tracing. It works the following way.\n\n*   For each incoming JAX-RS request\
    \ to a service endpoint\n    *   Extracts parent span information from the request\n\
    \n    *   Starts a span or a child span (see the full list of spans in Table [4-13](#600147_1_En_4_Chapter.xhtml#Tab13))\n\
    \n    *   Ends the span when the request completes\n\n*   For each outgoing JAX-RS\
    \ request to another service\n    *   Injects current span information into the\
    \ request\n\n    *   Starts a span or a child span when the request is sent (see\
    \ the full list of spans in Table [4-13](#600147_1_En_4_Chapter.xhtml#Tab13))\n\
    \n    *   Ends the span when the request completes\n\n*   When some internal Helidon\
    \ component is called, such as *security*\n    *   Adds a span or a child span\
    \ (see the full list of spans in Table [4-13](#600147_1_En_4_Chapter.xhtml#Tab13))\n\
    \n    *   Optionally logs some useful information to the span\n\n*   Implements\
    \ a vendor-neutral tracing API which developers can invoke to work with spans\
    \ explicitly"
  trans: "\n### 分布式追踪\n\n注意\n\n分布式追踪是一种用于跟踪请求在分布式系统各组件间传递路径的方法。\n\n本章使用*追踪*（tracing）一词，而不是*分布式跟踪*（distributed\
    \ tracking），因为它更简短。\n\n*Trace*（追踪）是请求在分布式系统组件中流转的完整路径。Trace 包含一个由 spans 组成的树结构。\n\
    \n*Span* 是一个工作单元，表示工作流中的一个片段，例如一次方法调用。树中的第一个 span 称为 *root span*（根 span）。它可能包含表示子操作的\
    \ *child spans*（子 spans）。每个 span 都有名称，并记录操作的开始时间、持续时间，以及可选的其他数据。\n\n![](img/600147_1_En_4_Fig4_HTML.jpg)\n\
    \n分布式追踪系统的框图。它包含一个管理员和存储，并连接到分布式追踪系统；该系统通过 trace、span 1、span 2 和 span 3，跟踪服务 1、2、3\
    \ 之间的请求与响应。\n\n图 4-4\n\n分布式追踪\n\nHelidon 实现了 MicroProfile OpenTracing API。\n\n\
    Microprofile Opentracing\n\n[MicroProfile OpenTracing](https://download.eclipse.org/microprofile/microprofile-opentracing-3.0/microprofile-opentracing-spec-3.0.html)\
    \ 是一个基于 [OpenTracing](https://opentracing.io) 标准的开放规范。它提供了一个中立的追踪 API，可与 Zipkin\
    \ 和 Jaeger 等追踪系统平滑集成。\n\nMicroProfile OpenTracing 支持完全自动化的追踪，无需开发者执行任何操作。开发者只需选择想要使用的集成方式，并将相应库添加到项目依赖中。\n\
    \n在请求处理的每一步中，Helidon 都会调用追踪 API，在 span 中标记 Helidon 处理流程的关键点。开发者也可以（但不是必须）在应用处理的关键点调用同一个中立\
    \ API。追踪实现库会收集并传输追踪信息到对应的分布式追踪系统，后者接收并保存到其存储中。分布式追踪系统通常会提供 Web UI 来查看应用追踪。追踪通常使用瀑布图进行可视化（见图\
    \ 4-5）。\n\n![](img/600147_1_En_4_Fig5_HTML.jpg)\n\n该图包含 trace、span 1、span 2、span\
    \ 3 的块，以及一条从上到下的时间箭头。\n\n图 4-5\n\n追踪图\n\n### 将追踪添加到你的 Helidon 应用\n\n#### 使用 Project\
    \ Starter\n\n最简单的方法是使用 Project Starter 生成一个带追踪支持的项目。\n\n下面说明你需要执行的操作。\n\n1.  在\
    \ [`https://helidon.io/starter`](https://helidon.io/starter) 打开 Project Starter。\n\
    \n2.  在 Helidon Flavor 页面选择 Helidon MP，然后点击 Next。\n\n3.  在 Application Type 页面，选择\
    \ Custom 并点击 Next。\n\n4.  在 Media Support 页面，保持 Jackson 被选中；如果你希望符合 MicroProfile\
    \ 平台规范，也可以选择 JSON-B。点击 Next。\n\n5.  在 Observability 页面，勾选 Tracing 并选择你希望使用的 Tracing\
    \ Providers。若你希望在应用中使用 Health Checks 和 Metrics，也可以一并选择。\n\n6.  点击 Download 生成你的项目，或者继续完成其余步骤以继续配置。\n\
    \n#### 使用 CLI\n\n你需要先安装 Helidon CLI，如第 2 章所述。\n\n使用 `helidon init` 命令开始生成新项目。CLI\
    \ 和 Project Starter 使用的是同一个配置向导。按照前一节说明回答问题。完成配置向导后，你将得到一个已启用追踪支持的项目。\n\n####\
    \ 手动添加依赖\n\n你需要添加对厂商中立的 MicroProfile OpenTracing API 的依赖，以及对你想使用的分布式追踪系统的依赖。\n\
    \n第一种方式是使用 `helidon-microprofile` bundle，其中以传递依赖方式包含了 `helidon-microprofile-tracing`。\n\
    \n```\nio.helidon.microprofile.bundles\nhelidon-microprofile\n\n```\n\n如果你不想使用\
    \ `helidon-microprofile` bundle 带来的全部 MicroProfile 依赖，也可以使用更细粒度的配置：`helidon-microprofile-core`。它只引入必需依赖，再加上\
    \ `helidon-microprofile-tracing` 构件以启用 MicroProfile OpenTracing。\n\n```\nio.helidon.microprofile.bundles\n\
    helidon-microprofile-core\n\nio.helidon.microprofile.tracing\nhelidon-microprofile-tracing\n\
    \n```\n\n除此之外，你还必须添加你想使用的追踪提供方依赖。Helidon 开箱即用支持 Jaeger 和 Zipkin。\n\n对于 Jaeger，添加以下依赖。\n\
    \n```\nio.helidon.tracing\nhelidon-tracing-jaeger\nruntime\n\n```\n\n对于 Zipkin，添加如下依赖。\n\
    \n```\nio.helidon.tracing\nhelidon-tracing-zipkin\nruntime\n\n```\n\n### Helidon\
    \ 追踪实现\n\n作为 MicroProfile OpenTracing 的兼容实现，Helidon 提供自动化（“免代码”）追踪。其工作方式如下。\n\n\
    *   对于每个进入服务端点的 JAX-RS 入站请求\n    *   从请求中提取父 span 信息\n\n    *   启动一个 span 或子 span（完整\
    \ span 列表见表 4-13）\n\n    *   在请求完成时结束该 span\n\n*   对于每个发往其他服务的 JAX-RS 出站请求\n \
    \   *   将当前 span 信息注入请求中\n\n    *   在请求发送时启动一个 span 或子 span（完整 span 列表见表 4-13）\n\
    \n    *   在请求完成时结束该 span\n\n*   当调用某些 Helidon 内部组件时，例如 *security*\n    *   添加一个\
    \ span 或子 span（完整 span 列表见表 4-13）\n\n    *   可选地将一些有用信息记录到 span 中\n\n*   实现了一个厂商中立的追踪\
    \ API，开发者可调用它来显式操作 spans\n"
- fmt: "## Helidon Built-in Spans\n\nWhen Helidon adds a span, it’s one of the spans\
    \ listed in Table [4-13](#600147_1_En_4_Chapter.xhtml#Tab13). Each span belongs\
    \ to a web server, security, or JAX-RS component. The component name is in the\
    \ description column to save space. The spans are highly customizable. You can\
    \ change their names and enable/disable them. Read more about it in the tracing\
    \ configuration section.\n\nEach span optionally contains `logs` and `tags`. `logs`\
    \ are key-value pairs that contain some additional span-specific information.\
    \ `tags` are key-value pairs used for labeling, querying, and filtering data.\
    \ Table [4-13](#600147_1_En_4_Chapter.xhtml#Tab13) only lists some of the logs\
    \ and tags. Refer to [Helidon’s documentation](https://helidon.io/docs/v3/%2523/mp/tracing)\
    \ for the detailed descriptions.\n\n### Table 4-13 Helidon Built-In Spans\n\n\
    | Span Name | Description | Span Logging | Tags |\n| --- | --- | --- | --- |\n\
    | HTTP Request | Overall span covering from request arrival to response transmission.\
    \ Component: `web-server` | `handler.class` | `component`, `http.method`, `http.status_code`,\
    \ `http.url`, `error` |\n| `content-read` | Reading the request entity. Component:\
    \ `web-server` | `N/A` | `requested.type` |\n| `content-write` | Writing the response\
    \ entity. Component: `web-server` | `N/A` | `response.type` |\n| `security` |\
    \ Overall span covering security processing. Component: `security` | `status`\
    \ | `security.id` |\n| `security:atn` | Authenticating the client. Component:\
    \ `security` | `security.user`, `security.service`, `status` | `N/A` |\n| `security:atz`\
    \ | Authorizing the client. Component: `security` | `status` | `N/A` |\n| `security:response`\
    \ | Security processing of the response. Component: `security` | `N/A` | `N/A`\
    \ |\n| `security:outbound` | Security processing of an outbound request. Component:\
    \ `security` | `status` | `N/A` |\n| generated name | Endpoint method invocation:\
    \ name = HTTP method + class name + method name. Component: `jax-rs` | `N/A` |\
    \ `N/A` |\n| `jersey-client-call` | Outbound request. Component: `jax-rs` | `N/A`\
    \ | `http.method`, `http.status_code`, `http.url` |\n\n## MicroProfile OpenTracing\
    \ API\n\nMicroProfile OpenTracing works “code free.” But it also contains APIs\
    \ if developers want to work with spans explicitly. This API is very simple. It\
    \ consists of the `@Traced` annotation and `Tracer` class.\n\n`@Traced` annotation\
    \ can be placed on a method or a class. While placed in a class, it affects all\
    \ its public methods. The annotation creates a new child span covering each invocation\
    \ of the method.\n\n`@Traced` annotation uses interceptors, so the class must\
    \ be a CDI bean, and the method must be invoked via CDI. Simple Java method invocations\
    \ on instances created with `new` do not trigger tracing! Also, method calls within\
    \ a type do not work. Any annotations on the target method are ignored if you\
    \ call a method on a JAX-RS resource from another resource method.\n\nThe `@Traced`\
    \ annotation has two optional arguments:\n\n- `value=[true|false]`  \n  The default\
    \ value is true. Enables or disables tracing of the corresponding methods (all\
    \ public methods if placed on a class).\n- `operationName=<span name>`  \n  The\
    \ default value is `\"\"`. If an empty string is specified, the name is automatically\
    \ generated based on the class name and method name.\n\n- ① Traced method\n- ②\
    \ Not traced method\n\n```java\n@Traced         ①\npublic String getMessage()\
    \ {\n    return message.get();\n}\n@Traced(false)  ②\npublic String getMessageWithNoTraces()\
    \ {\n    return message.get();\n}\nListing 4-21\nUsing the @Traced Annotation\n\
    ```\n\nThe OpenTracing `Tracer` object provides more precise control over spans.\
    \ It allows you to build spans, set tags, log events, and so on. Helidon automatically\
    \ creates and initializes an OpenTracing Tracer object. The developer only needs\
    \ to inject it into a bean class and invoke its methods.\n\n```java\n@Inject\n\
    io.opentracing.Tracer tracer;\npublic void importantWork() {\n    Span span =\
    \ tracer.buildSpan(\"important-work\").start();\n    span.setTag(...);\n    span.log(...);\n\
    \    // Do some important work\n    ...\n    span.finish();\n}\nListing 4-22\n\
    Using the Tracer Object\n```\n\n## Configuration\n\nHelidon allows users to configure\
    \ its internal tracing components, enable and disable tracing completely for specified\
    \ components or endpoints, and rename built-in spans.\n\n### Enabling/Disabling\
    \ Tracing\n\nMicroProfile OpenTracing specification allows disabling tracing for\
    \ JAX-RS resources using configuration. You should specify a regular expression\
    \ matching resources URIs in the `mp.opentracing.server.skip-pattern` configuration\
    \ property, which usually sits in `/META-INF/microprofile-config.properties` file\
    \ (see how to use configuration properties in Chapter [3](#600147_1_En_3_Chapter.xhtml)).\n\
    \nNote\n\nThe endpoints defined in MicroProfile Health, MicroProfile Metrics,\
    \ and OpenAPI specifications are always excluded from tracing.\n\nThe following\
    \ disables all tracing.\n\n```properties\nmp.opentracing.server.skip-pattern=.*\n\
    ```\n\nDisabling tracing for the `/foo` endpoint and any endpoint starting with\
    \ `/bar`.\n\n```properties\nmp.opentracing.server.skip-pattern=/foo|/bar.*\n```\n\
    \nHelidon provides its own way of configuring tracing. Configuration can be defined\
    \ in `application.yaml`. In addition to enabling/disabling tracing for some endpoints,\
    \ you can enable/disable Helidon built-in spans.\n\n- ① Path to configure (It\
    \ uses a special format for pattern matching. You can read more about it in the\
    \ Helidon documentation.)\n- ② `true` to enable tracing and `false` to disable\n\
    - ③ Name of the configured component (one of `web-server`, `security`, `jax-rs`)\n\
    - ④ Name of a span (see Table [4-13](#600147_1_En_4_Chapter.xhtml#Tab13) for all\
    \ available span names)\n- ⑤ Enables or disables the span\n- ⑥ Log name (see options\
    \ for the specified span in Table [4-13](#600147_1_En_4_Chapter.xhtml#Tab13))\n\
    - ⑦ Enables or disables the log\n\n```yaml\ntracing:\n  paths:\n    - path: \"\
    /favicon.ico\"              ①\n      enabled: false                    ②\n   \
    \ - path: \"/somepath\"\n      enabled: false\n  components:\n    web-server:\
    \                         ③\n      spans:\n        - name: \"HTTP Request\"  \
    \        ④\n          enabled: true                 ⑤\n          logs:\n     \
    \       - name: \"content-write\"     ⑥\n              enabled: false        \
    \    ⑦\nListing 4-23\nExample of Tracing Configuration in application.yaml\n```\n\
    \nIf you don’t like YAML, its content can be flattened into properties format\
    \ and placed into `META-INF/microprofile-config.properties`.\n\n```properties\n\
    tracing.paths.0.path=\"/favicon.ico\"\ntracing.paths.0.enabled=false\ntracing.paths.1.path=\"\
    /somepath\"\ntracing.paths.1.enabled=false\ncomponents.web-server.spans.0.name=\"\
    HTTP Request\"\ncomponents.web-server.spans.0.enabled=true\ncomponents.web-server.spans.0.logs.0.name=\"\
    content-write\"\ncomponents.web-server.spans.0.logs.0.enabled=false\nListing 4-24\n\
    Example of Tracing Configuration in microprofile-config.properties\n```\n\n###\
    \ Renaming a Top-Level Span\n\nIn some situations, renaming the top-level HTTP\
    \ request span makes sense to better suit users’ needs. Helidon provides this\
    \ ability.\n\nNote\n\nThis is supported only for the HTTP request span of the\
    \ web server component. It’s not supported for other spans.\n\nProvide a new name\
    \ in the `new-name` configuration property, as shown in the following sample.\n\
    \n```properties\ntracing.components.web-server.spans.0.name=\"HTTP Request\"\n\
    tracing.components.web-server.spans.0.new-name: \"HTTP %1$s %2$s\"\n```\n\nYou\
    \ can use the following parameters:\n\n- A `method` is an HTTP method.\n- A `path`\
    \ is a path of the request (such as `/greet`).\n- A `query` is the request (may\
    \ be null)."
