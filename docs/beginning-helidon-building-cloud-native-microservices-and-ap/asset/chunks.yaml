    \ status | N/A |\n| security:atz | Authorizing the client. Component: *security*\
    \ | status | N/A |\n| security:response | Security processing of the response.\
    \ Component: *security* | N/A | N/A |\n| security:outbound | Security processing\
    \ of an outbound request. Component: *security* | status | N/A |\n| generated\
    \ name | Endpoint method invocation: name = HTTP method + class name + method\
    \ name. Component: *jax-rs* | N/A | N/A |\n| jersey-client-call | Outbound request.\
    \ Component: *jax-rs* | N/A | http.method, http.status_code, http.url |\n\n###\
    \ MicroProfile OpenTracing API\n\nMicroProfile OpenTracing works “code free.”\
    \ But it also contains APIs if developers want to work with spans explicitly.\
    \ This API is very simple. It consists of the `@Traced` annotation and `Tracer`\
    \ class.\n\n`@Traced` annotation can be placed on a method or a class. While placed\
    \ in a class, it affects all its public methods. The annotation creates a new\
    \ child span covering each invocation of the method.\n\n`@Traced` annotation uses\
    \ interceptors, so the class must be a CDI bean, and the method must be invoked\
    \ via CDI. Simple Java method invocations on instances created with `new` do not\
    \ trigger tracing! Also, method calls within a type do not work. Any annotations\
    \ on the target method are ignored if you call a method on a JAX-RS resource from\
    \ another resource method.\n\nThe `@Traced` annotation has two optional arguments.\n\
    \n*   **value=[true|false]**\n\n    The default value is true. Enables or disables\
    \ tracing of the corresponding methods (all public methods if placed on a class).\n\
