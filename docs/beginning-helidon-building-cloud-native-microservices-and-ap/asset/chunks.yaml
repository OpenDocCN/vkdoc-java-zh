    ## Helidon Reactive Operators


    Helidon has its own set of reactive operators on top of which are all the reactive
    features in Helidon built. Each reactive API in Helidon SE is exposing Helidon
    operators. And because Helidon MP is built on top of Helidon SE, you almost always
    have Helidon reactive operators on the classpath.


    Even under the MicroProfile Reactive Stream Operators implementation in Helidon
    are hidden Helidon operators.


    Helidon operators are constructed by two main classes, `Multi` for streams with
    0–n items and `Single` for streams with only 0–1 items.


    - ① Create a new multistream

    - ② Get only the first item → `Single`

    - ③ Block till single is completed, don’t do this in a reactive context


    ```java

    Single single =

    Multi.range(1, 10)  ①

    .limit(3)

    .map(String::valueOf)

    .first();  ②

    Integer result = single

    .map(Integer::parseInt)

    .await();  ③

    Listing 13-34

    Multi and Single Streams

    ```


    Single is a promise with all the features of reactive stream publisher, but it
    implements publisher and `CompletionStage`.


    ```java

    Single.just(1)

    .whenComplete((i, t) -> log("Complete!"))

    .toCompletableFuture()

    .join();

    Listing 13-35

    Single Is CompletionStage

    ```


    This makes `Single` versatile for usage with other asynchronous but not reactive
    streams compatible APIs.


    - ① Single flat-mapped by unsuspecting MP reactive stream


    ```java

    ReactiveStreams.of(1, 2)

    .flatMapCompletionStage(Single::just)  ①

    .toList()

    .run();

    Listing 13-36

    Single As CompletionStage

    ```


    This dual personality of `Single` has a catch: reactive streams are forbidden
    to have null as an item, and `CompletionStage`s are okay with nulls. `Single`
    overcomes this similarly to MP Reactive Streams `fromCompletionStageNullable`
    by converting null to an empty stream when instructed.


    - ① Null means empty parameter set to true

    - ② Only `onComplete` signal


    ```java

    CompletionStage csWithNull =

    CompletableFuture.completedStage(null);

    Single.create(csWithNull, true)  ①

    .peek(unused -> log("Not invoked"))

    .onComplete(() -> log("Completed!"))  ②

    .ignoreElement();

    Listing 13-37

    Single from Nullable CompletionStage

    ```


    Unlike the MicroProfile Reactive Stream Operators implementing the `org.reactivestreams`
    API, Helidon operators implement Java’s `java.util.concurrent.Flow` reactive stream
    API. These are identical APIs, first in a stand-alone library for pre–Java 9 environments,
    later a part of Java API since version 9.


    Same APIs but in different packages, but don’t worry conversion is quite easy.
    Reactive Streams API library brings with it handy adapter utility `org.reactivestreams.FlowAdapters`.


    - ① Helidon map operator

    - ② Adapter between RS Publisher and `Flow.Publisher`

    - ③ MP Reactive Streams connected to adapted Helidon operator


    ```java

    Flow.Publisher flowPublisher =

    Multi.just(1, 2, 3, 4)

    .map(String::valueOf);  ①

    Publisher rsPublisher = FlowAdapters.toPublisher(flowPublisher);  ②

    ReactiveStreams.fromPublisher(rsPublisher)  ③

    .map(Integer::parseInt)

    .toList()

    .run();

    Listing 13-38

    Converting Helidon Publisher to RS

    ```


    ## Reactive Messaging


    Messaging is an important feature of any runtime, bringing the means for asynchronous
    communication, and a way to loosen strong coupling between the components. On
    the first look MicroProfile messaging strongly resembles well-known messaging
    beans.


    ```java

    @Incoming("channel-1")

    public void receive(String payload) {

    System.out.println("Received payload:" + payload);

    }

    Listing 13-39

    Simple Incoming Message Handler Method

    ```


    The Reactive Messaging API is much richer, and it’s no coincidence the “Reactive”
    has much to do with it.


    Reactive systems are defined in the famous reactive manifesto as responsive, resilient,
    elastic and message-driven. Yes, message-driven messaging makes it easy for the
    system to be easily scalable and fail proof if, and that is important, if it can
    provide feedback to the producing side. Feedback for acknowledging message reception
    and regulating the flow. You already know the concept of acknowledgment from JMS
    or offset committing from Kafka without acknowledgment messages present. When
    one server crashes, another can take over its unacknowledged messages.


    Great approach to regulation of incoming messages flow is known from reactive
    streams, it’s called backpressure. Instead of re-creating reactive APIs, Reactive
    Messaging uses Reactive Streams for constructing channels.'
