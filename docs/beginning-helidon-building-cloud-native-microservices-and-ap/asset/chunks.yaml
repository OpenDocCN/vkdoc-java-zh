    \  # ②\n        value.serializer: ${serializer.pkg}.StringSerializer\n```\n\n\
    Listing 13-57  \nDLQ Nack Strategy Advanced Configuration\n\n`Log` only nack strategy\
    \ simply logs the exception and acks the nacked message. The nacked message is\
    \ discarded, offset committed and the channel can continue consuming the subsequent\
    \ messages.\n\n```yaml\nmp.messaging:\n  incoming:\n    from-kafka:\n      nack-log-only:\
    \ true\n```\n\nListing 13-58  \nLog Only Nack Strategy Configuration\n\n## JMS\
    \ Connector\n\n`JMS` stands for Java Message Service, a Java-based messaging API\
    \ for creating, sending, and receiving messages. `JMS` provides a high-level abstraction\
    \ of messaging allowing multiple vendors to provide messaging over the same API.\
