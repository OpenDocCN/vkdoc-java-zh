    .map(i -> i * 10)

    .map(i -> i - 5);

    ReactiveStreams.of(1, 2, 3)

    .via(processorGraph)  ②

    .forEach(i -> log("Got " + i))

    .run()

    Listing 13-33

    via Operator Connect Processor Graph to a Builder

    ```


    ## Helidon 响应式操作符


    Helidon 拥有自己的一套响应式操作符，Helidon 中所有响应式特性都构建在其之上。Helidon SE 中的每个响应式 API 都会暴露 Helidon
    操作符。并且由于 Helidon MP 构建在 Helidon SE 之上，你几乎总能在类路径中找到 Helidon 响应式操作符。


    即使在 Helidon 的 MicroProfile Reactive Stream Operators 实现之下，也隐藏着 Helidon 操作符。


    Helidon 操作符主要由两个类构成：`Multi`用于包含 0–n 个元素的流，`Single`用于仅包含 0–1 个元素的流。


    *   ① 创建一个新的多元素流


    *   ② 仅获取第一个元素 → Single


    *   ③ 阻塞直到 single 完成，不要在响应式上下文中这样做


    ```

    Single single =

    Multi.range(1, 10)  ①

    .limit(3)

    .map(String::valueOf)

    .first();  ②

    Integer result = single

    .map(Integer::parseInt)

    .await();  ③

    Listing 13-34

    Multi and Single Streams

    ```


    Single 是一个具备响应式流发布者全部特性的 promise，但它同时实现了 publisher 和 `CompletionStage`。


    ```

    Single.just(1)

    .whenComplete((i, t) -> log("Complete!"))

    .toCompletableFuture()

    .join();

    Listing 13-35

    Single Is CompletionStage

    ```


    这使得`Single`在与其他异步但不兼容响应式流的 API 搭配使用时非常灵活。


    *   ① 由未预料到的 MP 响应式流进行 Single 的 flat-map


    ```

    ReactiveStreams.of(1, 2)

    .flatMapCompletionStage(Single::just)  ①

    .toList()

    .run();

    Listing 13-36

    Single As CompletionStage

    ```


    `Single`这种双重特性有一个注意点：响应式流不允许将 null 作为元素，而`CompletionStage`可以接受 null。`Single`通过与
    MP Reactive Streams 的`fromCompletionStageNullable`类似的方式来解决这一点：在被指示时，将 null 转换为空流。


    *   ① 将“null 表示空”的参数设为 true


    *   ② 仅有`onComplete`信号


    ```

    CompletionStage csWithNull =

    CompletableFuture.completedStage(null);

    Single.create(csWithNull, true)  ①

    .peek(unused -> log("Not invoked"))

    .onComplete(() -> log("Completed!"))  ②

    .ignoreElement();

    Listing 13-37

    Single from Nullable CompletionStage

    ```


    与实现`org.reactivestreams` API 的 MicroProfile Reactive Stream Operators 不同，Helidon
    操作符实现的是 Java 的`java.util.concurrent.Flow`响应式流 API。两者是相同的 API：最初作为一个独立库用于 Java
    9 之前的环境，之后从 Java 9 开始成为 Java API 的一部分。


    API 相同但包名不同，不过不用担心，转换非常容易。Reactive Streams API 库提供了实用的适配工具`org.reactivestreams.FlowAdapters`。


    *   ① Helidon 的 map 操作符


    *   ② RS Publisher 与 Flow.Publisher 之间的适配器


    *   ③ 连接到已适配 Helidon 操作符的 MP Reactive Streams


    ```

    Flow.Publisher flowPublisher =

    Multi.just(1, 2, 3, 4)

    .map(String::valueOf);  ①

    Publisher rsPublisher = FlowAdapters.toPublisher(flowPublisher);  ②

    ReactiveStreams.fromPublisher(rsPublisher)  ③

    .map(Integer::parseInt)

    .toList()

    .run();

    Listing 13-38

    Converting Helidon Publisher to RS

    ```


    ## 响应式消息传递


    消息传递是任何运行时的重要特性，它提供异步通信的手段，以及降低组件之间强耦合的方法。乍看之下，MicroProfile 消息传递与常见的消息 bean 非常相似。


    ```

    @Incoming("channel-1")

    public void receive(String payload) {

    System.out.println("Received payload:" + payload);

    }

    Listing 13-39

    Simple Incoming Message Handler Method

    ```


    Reactive Messaging API 要丰富得多，而“Reactive（响应式）”这个词在其中绝非偶然。


    在著名的响应式宣言中，响应式系统被定义为：响应性（responsive）、韧性（resilient）、弹性（elastic）和消息驱动（message-driven）。是的，消息驱动的消息机制使系统更容易扩展、也更具容错性——前提是（这一点很重要）它能够向生产端提供反馈。这里的反馈包括：确认消息已接收，以及调节流量。你已经从
    JMS 中的 acknowledgment，或 Kafka 中在没有显式 acknowledgment 消息时进行 offset 提交，了解过这个概念。当一台服务器崩溃时，另一台可以接管其尚未确认的消息。


    调节入站消息流量的一种优秀方法来自响应式流，称为背压（backpressure）。Reactive Messaging 没有重新造一套响应式 API，而是使用
    Reactive Streams 来构建*通道（channels）*。

