- fmt: '## Transactions


    On occasion, a single significant action necessitates numerous interactions with
    a database. These interactions are grouped as a transaction. This implies that
    either all of the interactions are executed or none of them are. The database
    must not be left in a corrupted state, with some of the data modified and others
    left untouched. This is one of the key characteristics of database engines—to
    ensure ACID (atomicity, consistency, isolation, durability). These transaction
    properties are essential to guarantee data accuracy in the event of errors or
    failures.


    For this, JPA requires a transactional engine to be used, and Jakarta Transactions
    API (or JTA) is used. It allows us to start, commit, and roll back transactions
    in a resource-agnostic way. Like JPA, JTA is not a tool or framework but an open
    standard specification that other vendors should implement. Helidon MP uses the
    Narayana transaction engine as an implementation for JTA. It lets us use `@jakarta.transaction.Transactional`
    to declare JTA transactions in our Java code. You just annotate a method with
    the preceding annotation, and all the calls to the database in this method are
    executed in a transaction. If something goes wrong, the data will not be corrupted
    or saved in an intermediate state. JTA is not bound to work with the database
    only. It can manage multiple resources of different types (like messaging, for
    example) in a consistent and coordinated manner.


    Let’s add some transactional methods to our Pokemon management service. First,
    you need some Maven dependencies, as shown in Listing [6-13](#600147_1_En_6_Chapter.xhtml#PC14).


    - ① Jakarta Transactions API core dependency

    - ② Helidon Narayana CDI extension


    ```

    jakarta.transaction

    jakarta.transaction-api    ①


    io.helidon.integrations.cdi

    helidon-integrations-cdi-jta-weld                                       ②

    runtime


    Listing 6-13

    Transaction Dependencies

    ```


    The best candidates for transactional methods are the `DELETE` and `CREATE` methods.


    To use the `DELETE` method, the initial step involves verifying the existence
    of the `Pokemon`. This entails retrieving it from the database. The subsequent
    action involves deleting the `Pokemon` and saving the state, with the entire process
    being an atomic action. If, for instance, `Pokemon` was retrieved in the first
    step, there is a possibility that it may have already been altered or deleted
    before `remove(pokemon)` is executed in the same method but in another thread.


    For the `CREATE` method, you first must retrieve the `PokemonType` from the database,
    then assign it to the newly created `Pokemon` instance. As in the previous situation,
    you must ensure this `PokemonType` exists. Thus, this sequence has to be performed
    as a single activity. You don’t want a `PokemonType` to be deleted or altered
    before it is assigned to the new `Pokemon`.


    - ① Method should be part of a new transaction

    - ② Uses `entityManager` `remove` method to delete a Pokemon from the database

    - ③ All interaction with the database should be in a transaction

    - ④ Assigns `PokemonType` to a given `Pokemon`, calls `entityManager` to execute
    the `getPokemonTypeById` named query to find a type, sets the type to a given
    `pokemon`, and uses `entityManager` to persist the data into a database


    ```java

    @Path("pokemon")

    public class PokemonResource {

    //.. previous methods omitted

    @DELETE

    @Path("{id}")

    @Produces(MediaType.APPLICATION_JSON)

    @Transactional(Transactional.TxType.REQUIRED)        ①

    public void deletePokemon(@PathParam("id") String id) {

    Pokemon pokemon = getPokemonById(id);

    entityManager.remove(pokemon);                   ②

    }

    @POST

    @Consumes(MediaType.APPLICATION_JSON)

    @Transactional(Transactional.TxType.REQUIRED)        ③

    public void createPokemon(Pokemon pokemon) {

    try {

    PokemonType pokemonType = entityManager

    .createNamedQuery("getPokemonTypeById", PokemonType.class)                       ④

    .setParameter("id", pokemon.getType()).getSingleResult();

    pokemon.setPokemonType(pokemonType);

    entityManager.persist(pokemon);

    } catch (Exception e) {

    throw new BadRequestException("Unable to " +

    "create pokemon with ID " + pokemon.getId());

    }

    }

    }

    Listing 6-14

    Pokemon Resource

    ```


    The topic of transactions is quite complex. It has a big part in computer science.
    This book does not go deep into how and where to use transactions, as this is
    nicely described in books about transactions. The same is about JPA and its providers—`Hibernate`
    and `EclipseLink`.


    This chapter only scratched the surface of what JPA can do and how much time it
    can save you by handling all the ORM jobs. But if you need complex object structures
    to be mapped to complex relational models, please consult specific books on the
    topic.


    The main message of this part is to get us acquainted with JPA and JTA and that
    Helidon provides full support for JPA and JTA in container-managed mode.


    ## Summary


    - Microservices work with the database to persist data, and Helidon provides multiple
    ways of accessing and persisting the data.

    - Helidon supports JDBC and `DataSource` for low-level work with JDBC-supported
    databases.

    - Helidon supports standard ways of accessing data using JPA, with `Hibernate`
    or `EclipseLink` as providers. It can be used with almost no limitations as in
    regular Jakarta/Java EE applications.


    # 7. Resiliency


    This chapter covers the following topics.


    - Using the retry mechanism

    - Defining the fallback method

    - Invoking a method asynchronously

    - Limiting the method execution time

    - Controlling the number of parallel executions

    - Combining Fault Tolerance features


    Failure in your service is inevitable! Sounds grim, but it should be no surprise
    for any developer that something won''t work as expected at some point in the
    program’s life cycle. The more complex the system becomes, the bigger the chance
    is for failure. In the same way a car manufacturer needs to install airbags, you
    must prepare your code for failures with appropriate countermeasures. Network
    issue? Retry the call. Too many concurrent calls? Limit contention. The business
    method takes too long? Use timeout. Sending message fails? Store it in the error
    queue. It sounds easy, right? Use a `try/catch` block for a few cycles, start
    a monitor thread, and manage an extra thread pool.


    Okay, it’s not that easy, and you just don’t need to reinvent the wheel each time.
    There can be a lot of mission-critical code that needs to be done right.


    All this magic becomes a boilerplate when you realize the use cases are repeating
    and functionality can be done for you behind the scenes. There is a Helidon implementation
    of MicroProfile Fault Tolerance, with which you just annotate your bean method
    by appropriate annotation, to help you exactly in such situations when you expect
    your code could fail.


    Fault Tolerance provides the following annotations to help you with various use
    cases.


    - `Retry` retries an annotated bean method with a configured number of times when
    an exception is thrown.

    - `Fallback` calls a configured handler or method if the annotated method throws
    an exception.

    - `Asynchronous` executes an annotated method on a new thread.

    - `Timeout` monitors annotated method execution time and interrupts it if it runs
    too long.

    - `Circuit Breaker` keeps track of the ratio of annotated method execution failures
    and rejects new calls in case it reaches the limit.

    - `Bulkhead` monitors contention on annotated method and blocks or rejects other
    threads when it gets too high.'
