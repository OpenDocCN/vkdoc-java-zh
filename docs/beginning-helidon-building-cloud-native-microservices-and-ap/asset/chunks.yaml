    \ MicroProfile Config in Helidon-based microservices\n- Understanding the concept\
    \ of config sources\n- Integrating with Kubernetes config maps\n- Configuring\
    \ arrays or collections\n- Using defaults, profiles, and expressions\n\nYour microservice\
    \ needs to be configurable. Why? Because any deployment depending on hard-coded\
    \ values makes your service non-portable. Imagine a character from the sorcerer\
    \ game. When you want to send him for a quest, you equip him with various potions\
    \ and weapons most suitable for the quest he is being sent for. But if you couldn’t?\
    \ If the sorcerer has hard-coded inventory, he is probably only good for some\
    \ quests. It’s the same with a well configurable service; you can deploy it anywhere\
    \ without rebuilding and repackaging it just because the name of the database\
    \ differs. And what would you do when moving your service from the test environment\
    \ to production? You would not want to rebuild the application just to change\
    \ connection credentials, right? Java has its own tooling for configuration. You\
    \ know about `System.getProperties()` and `System.getenv()`. These properties\
    \ are a great way for providing configuration over the command line.\n\nBy invoking\
    \ the Java application with `java -DorcSlayingPotions=5 -jar mySorcerer.jar`,\
    \ you can set the property and retrieve the value inside the application with\
    \ the simple call `System.getProperty(\"orcSlayingPotions\")`. It works great\
    \ until you want it to do more, such as overriding the default values, resolving\
    \ placeholders, or switching quickly, based on the environment profile. But what\
    \ if there is a tool to do that, which can map your properties to the right type\
    \ and inject them where you need them the most? Let’s introduce you to the Helidon\
    \ MicroProfile configuration implementation. Let’s call it “Config” from now on.\
    \ It’s used by many other Helidon features and is mentioned quite often later\
    \ in this book.\n\nAs Helidon MP provides CDI, you can effortlessly inject the\
    \ config properties directly into your beans; no special setup is required.\n\n\
    - ① The default values are always defined as strings. The converter used for values\
    \ coming from a config source is also applied to defaults.\n- ② This injects the\
    \ config property to the bean constructor with CDI.\n\n```java\n@ApplicationScoped\n\
    public class SorcererBean {\n    @Inject\n    public SorcererBean(\n        @ConfigProperty(name=\"\
    sorcerer.orcSlayingPotions\",\n        defaultValue = \"0\")   ①\n        Integer\
    \ orcSlayingPotions){           ②\nListing 3-1\nDefault Value Definition with\
    \ the @ConfigProperty Annotation\n```\n\nIf you inject the property without providing\
    \ a default value and if the property is not found in any of the available config\
    \ sources, the `NoSuchElementException` error is thrown during deployment. But\
    \ don’t worry, for optional properties, you can use one of the following nullable\
    \ data types:\n\n- `org.eclipse.microprofile.config.ConfigValue`\n- `Optional<TheType>`\n\
    \n## Expressions\n\nSometimes, the same value needs to be used by several configuration\
    \ properties or compiled from several others. In such cases, expressions become\
    \ helpful for composing property values from other property values. Expressions\
    \ help you avoid duplicities in the configuration and define context related defaults.\n\
    \n- ① Notice the default value of `15` for the `sorcerer.level` expression.\n\n\
    ```properties\nsorcerer.level=30\nsorcerer.name=Merlin\nsorcerer.title=${sorcerer.name}_${sorcerer.level:15}\
    \   ①\nListing 3-2\nExpression with a Default Value in a Properties File\n```\n\
    \nIn Listing `3-2`, the sorcerer’s title is `Merlin_30`. However, if the `sorcerer.level`\
    \ property is missing, the default expression value is used, and the title becomes\
    \ `Merlin_15`. Expressions are extremely handy for composing database connection\
    \ strings or JAAS configs directly in a config file.\n\n## Programmatic API\n\n\
    When CDI injection is not available, programmatic API saves the day. All the goodness\
    \ works the same way as with the injected config properties. You can access `org.eclipse.microprofile.config.Config`\
    \ as a singleton.\n\n```java\nInteger orcSlayingPotions =\n    ConfigProvider.getConfig()\n\
    \        .getValue(\"sorcerer.orcSlayingPotions\", Integer.class);\nListing 3-3\n\
    Obtaining a Configuration Property over the Programmatic API\n```\n\nOr, simply\
    \ inject the config to your bean with `@Inject Config`. This method allows you\
    \ to manually access the available properties from all config sources. And what\
    \ is that Config source? That is the place where property values come from!\n\n\
    ## Config Sources\n\nThe first thing MicroProfile Config does is it looks for\
    \ the available config sources. Config sources provide properties that are retrievable\
    \ in your application. Each config source has a special ordinal number that defines\
    \ the order in which a property is resolved. If the config sources contain the\
    \ same property, the one with the higher ordinal number is used. This feature\
    \ provides an elegant way to override the properties when required. The following\
    \ three default config sources are defined by the specification:\n\n- All `META-INF/microprofile-config.properties`\
    \ files on the classpath with the default priority ordinal number `100`.\n- Environment\
    \ variables with the default priority ordinal number `300` override the same properties\
    \ in the property files. The environment variable key names are not case-sensitive,\
    \ non-alphanumeric, and interchangeable with underscores. For example, the `SORCERER_ORCSLAYINGPOTIONS`\
    \ key is resolved when `sorcerer.orcSlayingPotions` has no candidate in environment\
