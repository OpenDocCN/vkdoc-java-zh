- fmt: "## Native Image\n\nWhen you run your Java application, you must install the\
    \ Java Runtime Environment (`JRE`). Your application is compiled to a byte code\
    \ which is executable by `JRE`. `JRE` is a native application on a platform you\
    \ are using. There are versions for Linux, Windows, macOS, and other operating\
    \ systems.\n\n`GraalVM` is a Java runtime that comes with many additional features.\
    \ One of these features is the ability to compile Java byte code into a native\
    \ executable. This feature is called Native Image.\n\nThere are several advantages\
    \ users get when they use native images:\n\n- Native applications start almost\
    \ instantly.\n- Disk footprint is smaller than `JRE` plus your compiled application.\
    \ Also, it’s just one file that is simple to transfer.\n- Memory footprint is\
    \ also lower as much metadata is not needed at runtime for fully native code.\n\
    \nThese advantages don’t come for free. There are also some limitations:\n\n-\
    \ `GraalVM` native compiler must know about all invocations of functionality allowing\
    \ you to read or modify class information at run time. It includes all usages\
    \ of Reflection API, byte code manipulations, and usages of `sun.misc.Unsafe`,\
    \ and so on. It can complicate your work, especially if this functionality is\
    \ used in third-party dependencies needed by your application.\n- It takes significant\
    \ time to build.\n- Native image is compiled statically and doesn’t use any runtime\
    \ optimizations. For long-running services, it may make more sense to use `HotSpot\
    \ VM`, which optimizes your application at run time. With these optimizations,\
    \ your application will eventually overperform the same application running as\
    \ a native image.\n\n`Helidon` supports two approaches to building a native image:\n\
    \n- Local build using locally installed `GraalVM`\n- Using Docker\n\n### Local\
    \ Native Image Build\n\nThis approach uses locally installed `GraalVM`. Before\
    \ building, you need to ensure that `GraalVM` and native image components are\
    \ installed and the `GRAALVM_HOME` variable points to the `Contents/Home/` directory\
    \ inside your `GraalVM` installation. It should be something like the following:\n\
    \n```bash\nexport GRAALVM_HOME=/opt/graalvm-ce-21.3.0/Contents/Home/\n```\n\n\
    To verify that `GraalVM` is installed correctly, run the following command:\n\n\
    ```bash\n$GRAALVM_HOME/bin/native-image --version\n```\n\nIt should display the\
    \ `GraalVM` version. If it doesn’t, you must play more with your `GraalVM` installation.\n\
    \nNow let’s build a native image:\n\n```bash\nmvn package -Pnative-image\n```\n\
    \n> Tip  \n> You can also build a native image using CLI: `helidon build --mode\
    \ NATIVE`.\n\nThe build may take several minutes. When finished, you can find\
    \ your native executable in the `target` directory and run it as you usually run\
    \ native applications:\n\n```bash\n./target/quickstart-mp\n```\n\n### Docker Native\
    \ Image Build\n\nThis method builds a native image inside a Docker container.\
    \ The result is a Docker image based on `scratch` with just the native binary.\
    \ You don’t need to install `GraalVM` locally, but you need to have Docker installed.\n\
    \nTo build it, run the following command:\n\n```bash\ndocker build -t quickstart-mp-native\
    \ -f Dockerfile.native .\n```\n\nThe first time you run it, it takes a while because\
    \ it downloads all the Maven dependencies and caches them in a Docker layer. Subsequent\
    \ builds are much faster.\n\nThe build result is the `quickstart-mp-native` Docker\
    \ image. You can verify it using the `docker images` command:\n\n```bash\n$ sudo\
    \ docker images\nREPOSITORY             TAG      IMAGE ID       CREATED      \
    \   SIZE\nquickstart-mp-native   latest   18a7c74dd257   47 seconds ago  95.6MB\n\
    ```\n\nStart your native application in Docker using the following command:\n\n\
    ```bash\ndocker run --rm -p 8080:8080 quickstart-mp-native:latest\n```\n\n## Deploying\
    \ to Kubernetes\n\nNow let’s look at deploying your application to Kubernetes.\
    \ If you don’t have a cloud Kubernetes cluster, you can install `minikube` or\
    \ Docker Desktop on your local computer. It would be enough for deploying our\
    \ `Quickstart` application.\n\nKubernetes deployment descriptor `app.yaml` was\
    \ generated as part of the project creation. So now, all you have to do is deploy\
    \ your application.\n\nFirst, let’s make sure that your cluster is up and running:\n\
    \n```bash\nkubectl cluster-info\nkubectl get nodes\n```\n\nIf you see any errors\
    \ on the screen, your cluster is not functional. You need to spend some time fixing\
    \ it.\n\nNow let’s ensure you’ve built a Docker image containing your application:\n\
    \n```bash\ndocker images\n```\n\nMake sure that `quickstart-mp` exists in the\
    \ command output. If not, you should build your Docker image as described in the\
    \ `Executable JAR` section.\n\n> Tip  \n> If you want to deploy `jlink` or native\
    \ image containers, change the `image` property in `app.yaml` to `quickstart-mp-jri`\
    \ or `quickstart-mp-native` accordingly.\n\nRun the following to deploy your application:\n\
    \n```bash\nkubectl create -f app.yaml\n```\n\nDeployment may take some time, but\
    \ it shouldn’t take much. Keep executing `kubectl get pods` until you see the\
    \ `quickstart-mp` pod status as `RUNNING`.\n\nYou need to find the port it’s running\
    \ on to test that the application is functional. Look at the result of the following\
    \ command; note the `PORT(S)`. The second port number is what you need to use:\n\
    \n```bash\nkubectl get service quickstart-mp\nNAME          TYPE     CLUSTER-IP\
    \    EXTERNAL-IP PORT(S)         AGE\nquickstart-mp NodePort 10.108.202.98   \
    \    8080:30324/TCP  3m50s\n```\n\nFor example, if the port is `30324`, run the\
    \ following command:\n\n```bash\ncurl -X GET http://localhost:30324/greet\n```\n\
    \nTo remove your application from Kubernetes, run the following command:\n\n```bash\n\
    kubectl delete -f app.yaml\n```\n\n## Summary\n\n- `Helidon` provides a convenient\
    \ way to bootstrap your application using Project Starter, CLI, and Maven Archetypes.\n\
    - You can build an executable `JAR`, custom `jlink` image, and `GraalVM Native\
    \ Image`.\n- `Helidon MP` application is `CDI`-ready.\n- Building a Docker image\
    \ containing your application is easy, thanks to the provided `Dockerfiles`.\n\
    - Kubernetes deployment descriptor is generated automatically on project creation."
  raw: '### Native Image


    When you run your Java application, you must install the Java Runtime Environment
    (JRE). Your application is compiled to a byte code which is executable by JRE.
    JRE is a native application on a platform you are using. There are versions for
    Linux, Windows, macOS, and other operating systems.


    GraalVM is a Java runtime that comes with many additional features. One of these
    features is the ability to compile Java byte code into a native executable. This
    feature is called Native Image.


    There are several advantages users get when they use native images.


    *   Native applications start almost instantly.


    *   Disk footprint is smaller than JRE plus your compiled application. Also, it’s
    just one file that is simple to transfer.


    *   Memory footprint is also lower as much metadata is not needed at runtime for
    fully native code.


    These advantages don’t come for free. There are also some limitations.


    *   GraalVM native compiler must know about all invocations of functionality allowing
    you to read or modify class information at run time. It includes all usages of
    Reflection API, byte code manipulations, and usages of `sun.misc.Unsafe`, and
    so on. It can complicate your work, especially if this functionality is used in
    third-party dependencies needed by your application.


    *   It takes significant time to build.


    *   Native image is compiled statically and doesn’t use any runtime optimizations.
    For long-running services, it may make more sense to use HotSpot VM, which optimizes
    your application at run time. With these optimizations, your application will
    eventually overperform the same application running as a native image.


    Helidon supports two approaches to building a native image.


    *   Local build using locally installed GraalVM


    *   Using Docker


    #### Local Native Image Build


    This approach uses locally installed GraalVM. Before building, you need to ensure
    that GraalVM and native image components are installed and the `GRAALVM_HOME`
    variable points to the `Contents/Home/` directory inside your GraalVM installation.
    It should be something like the following.


    ```

    export GRAALVM_HOME=/opt/graalvm-ce-21.3.0/Contents/Home/

    ```


    To verify that GraalVM is installed correctly, run the following command.


    ```

    $GRAALVM_HOME/bin/native-image --version

    ```


    It should display the GraalVM version. If it doesn’t, you must play more with
    your GraalVM installation.


    Now let’s build a native image.


    ```

    mvn package -Pnative-image

    ```


    Tip


    You can also build a native image using CLI: `helidon build --mode NATIVE`.


    The build may take several minutes. When finished, you can find your native executable
    in the `target` directory and run it as you usually run native applications.


    ```

    ./target/quickstart-mp

    ```


    #### Docker Native Image Build


    This method builds a native image inside a Docker container. The result is a Docker
    image based on *scratch* with just the native binary. You don’t need to install
    GraalVM locally, but you need to have Docker installed.


    To build it, run the following command.


    ```

    docker build -t quickstart-mp-native -f Dockerfile.native .

    ```


    The first time you run it, it takes a while because it downloads all the Maven
    dependencies and caches them in a Docker layer. Subsequent builds are much faster.


    The build result is the `quickstart-mp-native` Docker image. You can verify it
    using the `docker images` command.


    ```

    $ sudo docker images

    REPOSITORY             TAG      IMAGE ID       CREATED         SIZE

    quickstart-mp-native   latest   18a7c74dd257   47 seconds ago  95.6MB

    ```


    Start your native application in Docker using the following command.


    ```

    docker run --rm -p 8080:8080 quickstart-mp-native:latest

    ```


    ## Deploying to Kubernetes


    Now let’s look at deploying your application to Kubernetes. If you don’t have
    a cloud Kubernetes cluster, you can install minikube or Docker Desktop on your
    local computer. It would be enough for deploying our Quickstart application.


    Kubernetes deployment descriptor `app.yaml` was generated as part of the project
    creation. So now, all you have to do is deploy your application.


    First, let’s make sure that your cluster is up and running.


    ```

    kubectl cluster-info

    kubectl get nodes

    ```


    If you see any errors on the screen, your cluster is not functional. You need
    to spend some time fixing it.


    Now let’s ensure you’ve built a Docker image containing your application.


    ```

    docker images

    ```


    Make sure that `quickstart-mp` exists in the command output. If not, you should
    build your Docker image as described in the “Executable JAR” section.


    Tip


    If you want to deploy jlink or native image containers, change the `image` property
    in `app.yaml` to `quickstart-mp-jri` or `quickstart-mp-native` accordingly.


    Run the following to deploy your application.


    ```

    kubectl create -f app.yaml

    ```


    Deployment may take some time, but it shouldn’t take much. Keep executing `kubectl
    get pods` until you see the `quickstart-mp` pod status as RUNNING.


    You need to find the port it’s running on to test that the application is functional.
    Look at the result of the following command; note the PORT(S). The second port
    number is what you need to use.


    ```

    kubectl get service quickstart-mp

    NAME          TYPE     CLUSTER-IP    EXTERNAL-IP PORT(S)         AGE

    quickstart-mp NodePort 10.108.202.98       8080:30324/TCP  3m50s

    ```


    For example, if the port is 30324, run the following command.


    ```

    curl -X GET http://localhost:30324/greet

    ```


    To remove your application from Kubernetes, run the following command.


    ```

    kubectl delete -f app.yaml

    ```


    ## Summary


    *   Helidon provides a convenient way to bootstrap your application using Project
    Starter, CLI, and Maven Archetypes.


    *   You can build an executable JAR, custom jlink image, and GraalVM Native Image.


    *   Helidon MP application is CDI-ready.


    *   Building a Docker image containing your application is easy, thanks to the
    provided Dockerfiles.


    *   Kubernetes deployment descriptor is generated automatically on project creation.'
