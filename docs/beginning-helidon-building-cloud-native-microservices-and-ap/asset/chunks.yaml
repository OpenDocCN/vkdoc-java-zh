    .target("http://wizard-service")

    .request()

    .get()

    .readEntity(String.class);

    } catch (RuntimeException e) {

    retryError = e;

    }

    }

    throw retryError;

    }

    Listing 7-1

    try/catch Block in the Cycle

    ```


    如果抛出异常，我们将执行一次原始调用外加两次重试。


    ```

    Calling wizard service ...

    Calling wizard service ...

    Calling wizard service ...

    2022.03.25 10:29:10 WARNING ...

    java.net.ConnectException: Connection refused

    ```


    过多样板代码只会让我们的业务代码变得不必要地复杂。给 Bean 方法加上 `@Retry` 注解，就能自动实现与清单 7-1 相同的功能。


    ```

    @Retry(maxRetries = 2)

    public String callWizardService() {

    System.out.println("Calling wizard service ...");

    return ClientBuilder.newClient()

    .target("http://wizard-service")

    .request()

    .get()

    .readEntity(String.class);

    }

    Listing 7-2

    Retry

    ```


    ```

    Calling wizard service ...

    Calling wizard service ...

    Calling wizard service ...

    2022.03.25 10:35:55 WARNING ...

    java.net.ConnectException: Connection refused

    ```


    ## 回退


    你已经学会了如何进行重试。如果重试也无济于事，可能就需要一个默认响应。`@Fallback` 的作用很直接：当 Bean 方法失败时，提供一个可返回的值。这个机制非常简单，所以我们把它结合进来。当
    wizard 服务不可达时，你可以返回默认值。


    ```

    @Retry(maxRetries = 2)

    @Fallback(fallbackMethod = "defaultWizardServiceResponse")

    public String callWizardService() {

    System.out.println("Calling wizard service ...");

    return ClientBuilder.newClient()

    ...

    }

    String defaultWizardServiceResponse(){

    return "Wizard service is offline :-(";

    }

    Listing 7-3

    Fallback Method

    ```


    这一次，方法会被调用三次（记住：一次原始调用加两次重试）。当最后一次重试失败时，会调用回退方法，并由 `callWizardService()` 方法返回其结果，而不是原始的
    wizard 响应。


    ## 异步


    在 DI 应用中启动新线程可能很棘手。你永远不知道容器底层在线程上下文中做了哪些“魔法”。但当你需要执行耗时操作、又无法等待结果时，这种用例非常常见。


    `@Asynchronous` 可用于业务方法，但这次仅有注解还不够。由于异步方法会在未来某个时间点返回值，你必须把返回类型改为回调。Java 在 `java.util.concurrent`
    包中提供了便捷的回调 API。通过 `CompletableFuture,` 你可以创建一个回调，并在成功时调用 `future.complete(value)`，或在异常时调用
    `.completeExceptionally(ex)` 来结束它。另一方面，`CompletionStage,` 是 `CompletableFuture`
    的父类型。它的方法更少，这是有意为之。`CompletionStage` 面向 future 动作的消费者，而 `CompletableFuture` 面向控制完成过程的一方。


    让被注解的方法返回 `CompletionStage<String>` 后，你就能拿到一个回调，并在不阻塞调用线程的情况下监听异步方法完成。如果没有 `@Asynchronous`，我们就得自己创建线程或管理专用线程池；无论哪种方式，都完全不受容器管理，而且线程上下文对服务器而言是未知的。


    ```

    public CompletionStage timeConsumingTask() {

    CompletableFuture futureCallback =

    new CompletableFuture();

    new Thread(() -> {

    try {

    Thread.sleep(2000);

    } catch (InterruptedException e) {

    futureCallback.complete("Long work interrupted!");

    }

    futureCallback.complete("Long work is done!");

    }).start();

    return futureCallback;

    }

    Listing 7-4

    Manual Asynchronous Execution

    ```


    调用该方法时，你得到的是 `CompletionStage` 而不是实际结果。你可以使用 `thenAccept` 方法注册一个 consumer lambda，它会在异步工作完成时被调用。


    ```

    System.out.println("Calling long task!");

    CompletionStage callback = bean.timeConsumingTask();

    callback.thenAccept(s ->

    System.out.println("Task finished with result: " + s)

    );

    System.out.println("We didn''t have to wait " +

    "for task to finish to get here!");

    Listing 7-5

    Long Task Call

    ```


    清单 7-5 的输出表明，父线程会继续执行，而不会等待异步工作完成。


    ```

    Calling long task!

    We didn''t have to wait for task to finish to get here!

    Task finished with result: Long work is done!

    Listing 7-6

    Long Task Call Output

    ```


    Fault Tolerance 的 `@Asynchronous` 会在幕后帮你管理线程。虽然看起来你像是在返回一个已完成的 `Future`，但返回的 `CompletionStage`
    实际上会在异步工作完成时才被完成。


    ```

    @Asynchronous

    public CompletionStage timeConsumingTask() {

    try {

    Thread.sleep(2000);

    } catch (InterruptedException e) {

    return CompletableFuture

    .completedStage("Long work interrupted!");

    }

    return CompletableFuture

    .completedStage("Long work is done!");

    }

    Listing 7-7

    The Same Functionality as Listing 7-4

    ```


    结果会是一样的。


    ```

    Calling long task!

    We didn''t have to wait for task to finish to get here!

    Task finished with result: Long work is done!

    ```


    这一次，异步线程将具有正确的服务器上下文，并且能够与其他 Fault Tolerance 特性（如超时和重试）协同工作。


    注意


    `@Asynchronous` 也可以很方便地与响应式消息方法组合使用。

    '
- fmt: '## Timeout


    Some tasks can take longer than expected or even get stuck forever. To effectively
    defend our application against such a situation, Fault Tolerance provides the
    `@Timeout` annotation. The run-time of the method with the annotation is being
    monitored, and if timeout is reached, the thread is interrupted, and the method
    throws `TimeoutException`.


    There is a catch, however. When timeout is monitored on the same originating thread,
    the only way to stop it after the timeout is by interrupting it. An interruption
    doesn’t have to be enough to stop the thread. The thread may be looping somewhere
    without checking for an interruption. In such cases, an exception is thrown long
    after the timeout is reached. No guarantees are given on the same thread. Combining
    `@Timeout` with `@Asynchronous`, on the other hand, offers much more control.
    While the new thread is monitored for timeout, our original thread doesn’t have
    to wait for the asynchronous method to finish.


    ![](images/600147_1_En_7_Chapter/600147_1_En_7_Fig1_HTML.png)


    A diagram of the interconnected original thread, at asynchronous, completable
    stage, at timeout, and timeout exception via arrows.


    Figure 7-1


    Asynchronous timeout with exception propagated over `CompletionStage`


    `TimeoutException` wrapped in the `ExecutionException` is immediately provided
    through the returned `Future` or `CompletionStage` when the timeout occurs, whether
    the interruption succeeded or not.


    - ① Run the method on a different thread to get the timeout immediately.

    - ② Set the timeout for 500 milliseconds.

    - ③ Define a fallback method to compensate in case of a timeout.

    - ④ Use a fallback only in case of a timeout.

    - ⑤ Delay for a certain number of milliseconds to check if the timeout kicked
    in.


    ```java

    @Asynchronous                                  ①

    @Timeout(500)                                  ②

    @Fallback(

    fallbackMethod = "longTaskFallback",   ③

    applyOn = TimeoutException.class)      ④

    public CompletionStage timeConsumingTask(Long mls)

    throws InterruptedException {

    Thread.sleep(mls);                         ⑤

    return CompletableFuture

    .completedFuture(mls + " in time!");

    }

    private CompletionStage longTaskFallback(Long p) {

    return CompletableFuture

    .completedFuture(p + " timeout!");

    }

    Listing 7-8

    Asynchronous Timeout with Fallback

    ```


    - ① Uses `CompletionStage.get()` to block the current thread until the result
    is ready

    - ② Sets lower delay to avoid timeout

    - ③ Sets a higher delay to reach timeout


    ```java

    timeConsumingTask(490).get();    ① ②

    timeConsumingTask(520).get();    ③

    > 490 in time!

    > 520 timeout!

    Listing 7-9

    Call Timeout

    ```


    ## Circuit Breaker


    You already learned how to do a retry and fallback in case of a failure and how
    to monitor a timeout. You do have basic tools now for coping with a certain degree
    of intermittent failure. Another tool for guarding the actual ratio of intermittent
    failures is Circuit Breaker.


    Unlike the circuit breaker in your house that has only two states—on/off, this
    one is way smarter. Fault Tolerance’s Circuit Breaker feature has three states.


    - `Closed` means the failure ratio is low, and all executions are allowed.

    - `Open` means the failure ratio is too high, and Circuit Breaker denies executions
    with `CircuitBreakerOpenException`.

    - `Half-open` means the configured number of test executions is allowed to test
    if Circuit Breaker can switch back to a `Closed` state.


    While the one in your basement opens the electric circuit with the first evidence
    of trouble and keeps it that way until you come with the flashlight to switch
    it back on again, Circuit Breaker analyzes the failure ratio in a rolling window
    to keep the quality of service at a configured level. A `rolling window` sounds
    fancy, but it’s only the number of past execution attempts from which the success
    ratio is calculated. A “rolling window of 20” is the last 20 execution results
    the Circuit Breaker logic remembers for comparing the number of them that failed.
    If too many failures are registered, Circuit Breaker switches from `Closed` state
    to `Open`, and further executions are denied by throwing `CircuitBreakerOpenException`.
    You don’t have to go there with the flashlight and turn it on again after a configured
    delay. Circuit Breaker switches to the third state: `Half-open`. In the `Half-open`
    state, configurable number executions are allowed to test if the situation improved
    and it''s safe to switch back to the `Closed` state. If any of the executions
    in the `Half-open` state fail, Circuit Breaker returns to the `Open` state.


    ![](images/600147_1_En_7_Chapter/600147_1_En_7_Fig2_HTML.png)


    A flowchart has the following flow, closed, decision box of failure ratio limit
    reached, open, half-open, and decision box of all trial executions succeeded.


    Figure 7-2


    Circuit breaker states


    Circuit Breaker can be combined with other Fault Tolerance annotations. For example,
    `@Retry` retries are counted as execution attempts, and `@Fallback` can compensate
    for denied execution with `CircuitBreakerOpenException`.'
