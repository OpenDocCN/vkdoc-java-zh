    ## Asynchronous


    Spinning up a new thread in a DI application can be tricky. You never know what
    magic is happening in the thread context under the hood of your container. But
    the use case is quite common when you need to do something lengthy but can’t afford
    to wait for the result.


    `@Asynchronous` can be used on the business method, but annotation is not enough
    this time. Since the asynchronous method would return the value sometime in the
    future, you must change the return type to a callback. Java has a convenient API
    for callbacks right in the `java.util.concurrent` package. With `CompletableFuture,`
    you can create a callback and complete it either successfully `future.complete(value)`
    or exceptionally `.completeExceptionally(ex)`. `CompletionStage,` on the other
    side, is a superclass of `CompletableFuture`. It has fewer methods for a reason.
    Whereas `CompletionStage` is meant for the consumer of the future action, `CompletableFuture`
    is for the side controlling the completion.


    By making the annotated method return `CompletionStage<String>`, you get a callback
    that you can listen to for the completion of the asynchronous method without blocking
    the calling thread. Without `@Asynchronous`, we would have to spin up our own
    thread or drive a special thread pool; either way, it is completely unmanaged
    by the container with a thread context unknown to the server.


    ```

    public CompletionStage timeConsumingTask() {

    CompletableFuture futureCallback =

    new CompletableFuture();

    new Thread(() -> {

    try {

    Thread.sleep(2000);

    } catch (InterruptedException e) {

    futureCallback.complete("Long work interrupted!");

    }

    futureCallback.complete("Long work is done!");

    }).start();

    return futureCallback;

    }

    Listing 7-4

    Manual Asynchronous Execution

    ```


