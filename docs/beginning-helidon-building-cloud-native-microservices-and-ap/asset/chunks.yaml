- fmt: "## `javax` vs. `jakarta` JMS\n\nIn 2017, Oracle decided to transfer Java EE\
    \ to Eclipse Foundation. A long transition process eventually progressed to the\
    \ name change to Jakarta EE as it is known today. With the name change came a\
    \ package name update in Jakarta EE 9 from `javax` to `jakarta`. This process,\
    \ known as “jakartification,” breaks the backward compatibility with older, `javax`-based\
    \ implementations. Helidon 3 is fully “jakartified;” no `javax` namespaces are\
    \ exposed anywhere.\n\nFor the JMS API, this means that instead of using `javax.jms.Message`,\
    \ Helidon 3 works with `jakarta.jms.Message`.\n\nBut, no worries: older JMS clients\
    \ implementing the `javax` API work with jakartified Helidon just fine. Helidon\
    \ 3.0 has a special shim layer for legacy `javax`-based JMS implementations, which\
    \ is implicitly used behind the scenes. You can even use it manually as an adapter\
    \ between the two APIs.\n\n```java\njakarta.jms.ConnectionFactory cf =\nJakartaJms.create(new\
    \ ActiveMQConnectionFactory(\"tcp://127.0.0.1:61616\"));\n```\n\nListing 13-65\
    \  \nManual Usage of JMS Shim As an Adapter Between Javax and Jakarta APIs\n\n\
    ## WebLogic JMS Connector\n\nWebLogic Server has its own enterprise-class messaging\
    \ system simply called WebLogic JMS. WebLogic cluster members can act as JMS brokers,\
    \ implementing JMS specifications and providing various extension features like\
    \ distributed destinations, load balancing, SAF (store and forward) service, and\
    \ more.\n\nJMS is needed in one of the specialized client libraries to connect\
    \ to WebLogic. The most popular of those client libraries is `wlthint3client.jar`,\
    \ distributed with WebLogic Server installation, usually in the `/u01/oracle/wlserver/server/lib`\
    \ folder.\n\nWhile it was possible to use any thin client JARs with Helidon 2,\
    \ with the jakartification of Helidon 3, such a process became quite complicated\
    \ with legacy `javax`-based thin clients from older WebLogic Server installations\
    \ clashing with Helidon’s already jakartified service loaders.\n\nHelidon 3 has\
    \ a special WebLogic JMS connector for simplified usage of any legacy thin client\
    \ library operating within a custom classloader adapted by the `jakarta` shim\
    \ layer.\n\n```text\nio.helidon.messaging.wls-jms\nhelidon-messaging-wls-jms\n\
    ```\n\nListing 13-66  \nWebLogic JMS Connector Dependency\n\nWebLogic JMS connector\
    \ can load `wlthint3client.jar` in specialized classloader. Instead of adding\
    \ the thin client JAR as a dependency, the connector is configured with the location\
    \ of the thin client JAR.\n\n### Warning\n\nDon’t add legacy `javax`-based `wlthint3client.jar`\
    \ to the application classpath!\n\n- ① JMS factory configured in WebLogic\n- ②\
    \ Path to the WLS Thin T3 client JAR\n- ③ Path to the WLS Thin T3 client JAR\n\
    - ④ WebLogic CDI syntax\n- ⑤ JNDI destination identifier\n\n```yaml\nmp:\n  messaging:\n\
    \    connector:\n      helidon-weblogic-jms:\n        jms-factory: jms/TestConnectionFactory\
    \  # ①\n        thin-jar: /path/to/wlthint3client.jar   # ②\n        url: t3://localhost:7001\
    \                # ③\n        principal: weblogic\n        credentials: Welcome1\n\
    \    incoming:\n      from-wls:\n        connector: helidon-weblogic-jms\n   \
    \     destination: ./TestJMSModule!TestQueue  # ④\n    outgoing:\n      to-wls:\n\
    \        connector: helidon-weblogic-jms\n        jndi.destination: jms/TestQueue\
    \         # ⑤\n```\n\nListing 13-67  \nConfigure Helidon WebLogic Messaging Connector\n\
    \nDestination lookup is possible with the `destination` configuration key, which\
    \ expects WebLogic-specific destination CDI syntax, or with `jndi.destination`\
    \ using a JNDI identifier.\n\n### WebLogic Destination CDI Syntax\n\nWhen connecting\
    \ to a WebLogic cluster with a Helidon JMS or WebLogic messaging connector, the\
    \ destination can be configured with WebLogic CDI syntax supplied by the `destination`\
    \ configuration property.\n\nWebLogic CDI (Create Destination Identifier; don’t\
    \ confuse with context dependency injection), is WebLogic vendor-specific syntax\
    \ for locating queues and topics over JMS API methods `Session.createTopic(String\
    \ name)` and `Session.createQueue(String name)` with the actual MBean names (usually\
    \ a name property in the WLS console).\n\n#### Non-Distributed Destinations\n\n\
    When accessing a non-distributed queue/topic, you need to specify the JMS server\
    \ name, the JMS module name, and the queue or topic name: `jms-server-name/jms-module-name!destination-name`.\
    \ The syntax is as follows: the server name, a slash, the module name, an exclamation\
    \ mark, and the destination name, which is the MBean name in WebLogic Server.\n\
    \nWhen you know that the queue or topic you want to access is located on the same\
    \ server as the JMS Connection Factory you are using, an alias for the current\
    \ server is possible with `./` instead of the full server name.\n\n```text\n./jms-module-name!destination-name\n\
    ```\n\nListing 13-68  \nNon-Distributed Queue CDI Identifier\n\n#### Uniform Distributed\
    \ Destinations (UDDs)\n\nDistributed queues/topics are logical destinations acting\
    \ as load balancers between physical queues/topics, usually residing on separated\
    \ JMS servers/cluster nodes (UDD members). When accessing UDD, you can use `jms-module-name!udd-name`\
    \ syntax on any server from the same cluster.\n\n### Warning\n\nUDD destinations\
    \ `must not` contain `./` or `/`, which can lead to intermittent issues.\n\nTo\
    \ directly access a UDD member queue or topic, the syntax for a non-distributed\
    \ destination is needed: `jms-server-name/jms-module-name!member-name`.\n\n![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig28_HTML.jpg)\n\
    \nA cropped screenshot of the settings for `udd_queue` window has the Configuration\
    \ and Members tab selected. The member tab has options of New and Delete with\
    \ checkboxes for 2 names of the `TestJmsServer-1` and `TestJmsServer-2`.\n\nFigure\
    \ 13-28\n\nUDD member queues\n\nTo access the member queue `TestJmsServer-1@udd_queue`\
    \ from Figure [13-28](#600147_1_En_13_Chapter.xhtml#Fig28), the CDI syntax shown\
    \ in Listing [13-69](#600147_1_En_13_Chapter.xhtml#PC69) is needed.\n\n```text\n\
    TestJmsServer-1/TestJMSModule!TestJmsServer-1@udd_queue\n```\n\nListing 13-69\
    \  \nUDD Member Queue CDI Identifier\n\n### Warning\n\nDirectly accessing member\
    \ queues is usually a bad practice.\n\n### JNDI Destination\n\nUse `jndi.destination`\
    \ instead of the `destination` configuration key for supplying JNDI (Java Naming\
    \ and Directory Interface) identifiers. It is possible to look up JMS destinations\
    \ over JNDI, which may be easier for destinations with more complicated subdeployment\
    \ targets.\n\n## Oracle AQ Connector\n\nOracle Advance Queueing (AQ) allows you\
    \ to use your Oracle database as a message broker with standard JMS API. This\
    \ makes event sourcing over your relational data possible, leaving out a lot of\
    \ indirect steps otherwise required.\n\n```text\nio.helidon.messaging.aq\nhelidon-messaging-aq\n\
    \nio.helidon.integrations.cdi\nhelidon-integrations-cdi-datasource-ucp\nruntime\n\
    ```\n\nListing 13-70  \nOracle AQ Connector Dependency\n\nHelidon AQ messaging\
    \ connector uses [Oracle AQ JMS](https://docs.oracle.com/en/database/oracle/oracle-database/19/adque/jms-introduction.html)\
    \ API where JMS queue maps to an AQ single-consumer queue, and JMS topic maps\
    \ to a multi-consumer queue."
  raw: '### javax vs. jakarta JMS


    In 2017, Oracle decided to transfer Java EE to Eclipse Foundation. A long transition
    process eventually progressed to the name change to Jakarta EE as it is known
    today. With the name change came a package name update in Jakarta EE 9 from `javax`
    to `jakarta`. This process, known as “jakartification,” breaks the backward compatibility
    with older, `javax`-based implementations. Helidon 3 is fully “jakartified;” no
    `javax` namespaces are exposed anywhere.


    For the JMS API, this means that instead of using `javax.jms.Message`, Helidon
    3 works with `jakarta.jms.Message`.


    But, no worries: older JMS clients implementing the `javax` API work with jakartified
    Helidon just fine. Helidon 3.0 has a special shim layer for legacy `javax`-based
    JMS implementations, which is implicitly used behind the scenes. You can even
    use it manually as an adapter between the two APIs.


    ```

    jakarta.jms.ConnectionFactory cf =

    JakartaJms.create(new ActiveMQConnectionFactory("tcp://127.0.0.1:61616"));

    Listing 13-65

    Manual Usage of JMS Shim As an Adapter Between Javax and Jakarta APIs

    ```


    ## WebLogic JMS Connector


    WebLogic Server has its own enterprise-class messaging system simply called WebLogic
    JMS. WebLogic cluster members can act as JMS brokers, implementing JMS specifications
    and providing various extension features like distributed destinations, load balancing,
    SAF (store and forward) service, and more.


    JMS is needed in one of the specialized client libraries to connect to WebLogic.
    The most popular of those client libraries is `wlthint3client.jar`, distributed
    with WebLogic Server installation, usually in the `/u01/oracle/wlserver/server/lib`
    folder.


    While it was possible to use any thin client JARs with Helidon 2, with the jakartification
    of Helidon 3, such a process became quite complicated with legacy javax-based
    thin clients from older WebLogic Server installations clashing with Helidon’s
    already jakartified service loaders.


    Helidon 3 has a special WebLogic JMS connector for simplified usage of any legacy
    thin client library operating within a custom classloader adapted by the jakarta
    shim layer.


    ```

    io.helidon.messaging.wls-jms

    helidon-messaging-wls-jms


    Listing 13-66

    WebLogic JMS Connector Dependency

    ```


    WebLogic JMS connector can load `wlthint3client.jar` in specialized classloader.
    Instead of adding the thin client JAR as a dependency, the connector is configured
    with the location of the thin client JAR.


    Warning


    Don’t add legacy javax-based *wlthint3client.jar* to the application classpath!


    *   ① JMS factory configured in WebLogic


    *   ② Path to the WLS Thin T3 client JAR


    *   ③ Path to the WLS Thin T3 client JAR


    *   ④ WebLogic CDI syntax


    *   ⑤ JNDI destination identifier


    ```

    mp:

    messaging:

    connector:

    helidon-weblogic-jms:

    jms-factory: jms/TestConnectionFactory  ①

    thin-jar: /path/to/wlthint3client.jar  ②

    url: t3://localhost:7001  ③

    principal: weblogic

    credentials: Welcome1

    incoming:

    from-wls:

    connector: helidon-weblogic-jms

    destination: ./TestJMSModule!TestQueue  ④

    outgoing:

    to-wls:

    connector: helidon-weblogic-jms

    jndi.destination: jms/TestQueue  ⑤

    Listing 13-67

    Configure Helidon WebLogic Messaging Connector

    ```


    Destination lookup is possible with the `destination` configuration key, which
    expects WebLogic-specific destination CDI syntax or with `jndi.destination` with
    a JNDI identifier.


    ### WebLogic Destination CDI Syntax


    When connecting to a WebLogic cluster with a Helidon JMS or WebLogic messaging
    connector, the destination can be configured with WebLogic CDI syntax supplied
    by the `destination` configuration property.


    WebLogic CDI (Create Destination Identifier; don’t confuse with context dependency
    injection), is WebLogic vendor-specific syntax for locating queues and topics
    over JMS API methods `Session.createTopic(String name)` and `Session.createQueue(String
    name)` with the actual MBean names (usually a name property in the WLS console).


    #### Non-Distributed Destinations


    When accessing a non-distributed queue/topic, you need to specify the JMS server
    name, the JMS module name, and the queue or topic name: `jms-server-name/jms-module-name!destination-name`.
    The syntax is as follows: the server name, a slash, the module name, an exclamation
    mark, and the destination name, which is the MBean name in WebLogic Server.


    When you know that the queue or topic you want to access is located on the same
    server as the JMS Connection Factory you are using, an alias for the current server
    is possible with `./` instead of the full server name.


    ```

    ./jms-module-name!destination-name

    Listing 13-68

    Non-Distributed Queue CDI Identifier

    ```


    #### Uniform Distributed Destinations (UDDs)


    Distributed queues/topics are logical destinations acting as load balancers between
    physical queues/topics, usually residing on separated JMS servers/cluster nodes
    (UDD members). When accessing UDD, you can use `jms-module-name!udd-name` syntax
    on any server from the same cluster.


    Warning


    UDD destinations *must not* contain `./` or `/`, which can lead to intermittent
    issues.


    To directly access a UDD member queue or topic, the syntax for a non-distributed
    destination is needed: `jms-server-name/jms-module-name!member-name`.


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig28_HTML.jpg)


    A cropped screenshot of the settings for u d d underscore queue window has the
    configuration and members tab selected. The member tab has options of new and
    delete with checkboxes for 2 names of the test J m s server 1 and 2.


    Figure 13-28


    UDD member queues


    To access the member queue *TestJmsServer-1@udd_queue* from Figure [13-28](#600147_1_En_13_Chapter.xhtml#Fig28),
    the CDI syntax shown in Listing [13-69](#600147_1_En_13_Chapter.xhtml#PC69) is
    needed.


    ```

    TestJmsServer-1/TestJMSModule!TestJmsServer-1@udd_queue

    Listing 13-69

    UDD Member Queue CDI Identifier

    ```


    Warning


    Directly accessing member queues is usually a bad practice.


    ### JNDI Destination


    Use `jndi.destination` instead of the `destination` configuration key for supplying
    JNDI (Java Naming and Directory Interface) identifiers. It is possible to look
    up JMS destinations over JNDI, which may be easier for destinations with more
    complicated subdeployment targets.


    ## Oracle AQ Connector


    Oracle Advance Queueing (AQ) allows you to use your Oracle database as a message
    broker with standard JMS API. This makes event sourcing over your relational data
    possible, leaving out a lot of indirect steps otherwise required.


    ```

    io.helidon.messaging.aq

    helidon-messaging-aq


    io.helidon.integrations.cdi

    helidon-integrations-cdi-datasource-ucp

    runtime


    Listing 13-70

    Oracle AQ Connector Dependency

    ```


    Helidon AQ messaging connector uses [Oracle AQ JMS](https://docs.oracle.com/en/database/oracle/oracle-database/19/adque/jms-introduction.html)
    API where JMS queue maps to an AQ single-consumer queue, and JMS topic maps to
    a multi-consumer queue.'
  trans: '

    ### javax 与 jakarta JMS


    2017 年，Oracle 决定将 Java EE 移交给 Eclipse Foundation。经过漫长的过渡过程，最终演进为如今所知的 Jakarta
    EE 更名。随着名称变更，Jakarta EE 9 还将包名从 `javax` 更新为 `jakarta`。这一过程被称为“jakartification”，它打破了与旧版基于
    `javax` 实现的向后兼容性。Helidon 3 已完全“jakartified”；不再暴露任何 `javax` 命名空间。


    对于 JMS API，这意味着 Helidon 3 使用的是 `jakarta.jms.Message`，而不是 `javax.jms.Message`。


    不过不用担心：实现 `javax` API 的旧版 JMS 客户端依然可以很好地与 jakarta 化后的 Helidon 协作。Helidon 3.0 为遗留的基于
    `javax` 的 JMS 实现提供了一个特殊的 shim 层，并会在后台隐式使用。你甚至可以手动将它作为两个 API 之间的适配器来使用。


    ```

    jakarta.jms.ConnectionFactory cf =

    JakartaJms.create(new ActiveMQConnectionFactory("tcp://127.0.0.1:61616"));

    Listing 13-65

    Manual Usage of JMS Shim As an Adapter Between Javax and Jakarta APIs

    ```


    ## WebLogic JMS 连接器


    WebLogic Server 拥有自己的企业级消息系统，简称 WebLogic JMS。WebLogic 集群成员可以充当 JMS Broker，实现 JMS
    规范，并提供多种扩展特性，例如分布式目的地、负载均衡、SAF（存储转发）服务等。


    在用于连接 WebLogic 的某些专用客户端库中，需要用到 JMS。其中最常见的是 `wlthint3client.jar`，它随 WebLogic Server
    安装一起分发，通常位于 `/u01/oracle/wlserver/server/lib` 目录。


    在 Helidon 2 中可以使用任意 thin client JAR，但随着 Helidon 3 的 jakarta 化，这个过程变得相当复杂：来自旧版
    WebLogic Server 安装的遗留 javax-based thin client 会与 Helidon 已 jakarta 化的服务加载器发生冲突。


    Helidon 3 提供了一个专用的 WebLogic JMS 连接器，可简化对任意遗留 thin client 库的使用，这些库会在由 jakarta shim
    层适配的自定义 classloader 中运行。


    ```

    io.helidon.messaging.wls-jms

    helidon-messaging-wls-jms


    Listing 13-66

    WebLogic JMS Connector Dependency

    ```


    WebLogic JMS 连接器可以在专用 classloader 中加载 `wlthint3client.jar`。无需将 thin client JAR
    作为依赖添加，连接器通过 thin client JAR 的路径进行配置。


    警告


    不要将遗留的基于 javax 的 *wlthint3client.jar* 添加到应用 classpath 中！


    *   ① 在 WebLogic 中配置的 JMS 工厂


    *   ② WLS Thin T3 客户端 JAR 路径


    *   ③ WLS Thin T3 客户端 JAR 路径


    *   ④ WebLogic CDI 语法


    *   ⑤ JNDI 目的地标识符


    ```

    mp:

    messaging:

    connector:

    helidon-weblogic-jms:

    jms-factory: jms/TestConnectionFactory  ①

    thin-jar: /path/to/wlthint3client.jar  ②

    url: t3://localhost:7001  ③

    principal: weblogic

    credentials: Welcome1

    incoming:

    from-wls:

    connector: helidon-weblogic-jms

    destination: ./TestJMSModule!TestQueue  ④

    outgoing:

    to-wls:

    connector: helidon-weblogic-jms

    jndi.destination: jms/TestQueue  ⑤

    Listing 13-67

    Configure Helidon WebLogic Messaging Connector

    ```


    可以通过 `destination` 配置键进行目的地查找，该键期望使用 WebLogic 特定的目的地 CDI 语法；也可以通过 `jndi.destination`
    使用 JNDI 标识符。


    ### WebLogic 目的地 CDI 语法


    当通过 Helidon JMS 或 WebLogic 消息连接器连接到 WebLogic 集群时，可使用 `destination` 配置属性提供的 WebLogic
    CDI 语法来配置目的地。


    WebLogic CDI（Create Destination Identifier，不要与上下文依赖注入混淆）是 WebLogic 厂商特定语法，用于通过
    JMS API 方法 `Session.createTopic(String name)` 和 `Session.createQueue(String name)`，结合实际
    MBean 名称（通常是 WLS 控制台中的 name 属性）来定位队列和主题。


    #### 非分布式目的地


    访问非分布式队列/主题时，需要指定 JMS 服务器名、JMS 模块名以及队列或主题名：`jms-server-name/jms-module-name!destination-name`。语法如下：服务器名
    + 斜杠 + 模块名 + 感叹号 + 目的地名，其中目的地名即 WebLogic Server 中的 MBean 名称。


    如果你确定要访问的队列或主题与正在使用的 JMS Connection Factory 位于同一服务器上，则可以使用当前服务器别名 `./` 来代替完整服务器名。


    ```

    ./jms-module-name!destination-name

    Listing 13-68

    Non-Distributed Queue CDI Identifier

    ```


    #### 统一分布式目的地（UDD）


    分布式队列/主题是逻辑目的地，充当物理队列/主题之间的负载均衡器，通常位于不同的 JMS 服务器/集群节点（UDD 成员）上。访问 UDD 时，可在同一集群的任意服务器上使用
    `jms-module-name!udd-name` 语法。


    警告


    UDD 目的地*不得*包含 `./` 或 `/`，否则可能导致间歇性问题。


    若要直接访问某个 UDD 成员队列或主题，需要使用非分布式目的地语法：`jms-server-name/jms-module-name!member-name`。


    ![](img/600147_1_En_13_Fig28_HTML.jpg)


    一张截取的 u d d underscore queue 窗口设置界面截图，已选中 configuration 和 members 选项卡。member 选项卡中有
    new 和 delete 选项，并带有两个名称为 test J m s server 1 和 2 的复选框。


    图 13-28


    UDD 成员队列


    要访问图 13-28 中的成员队列 *TestJmsServer-1@udd_queue*，需要使用清单 13-69 所示的 CDI 语法。


    ```

    TestJmsServer-1/TestJMSModule!TestJmsServer-1@udd_queue

    Listing 13-69

    UDD Member Queue CDI Identifier

    ```


    警告


    直接访问成员队列通常不是一个好实践。


    ### JNDI 目的地


    若要提供 JNDI（Java Naming and Directory Interface）标识符，请使用 `jndi.destination`，而不是 `destination`
    配置键。可以通过 JNDI 查找 JMS 目的地，对于具有更复杂子部署目标的目的地，这种方式可能更容易。


    ## Oracle AQ 连接器


    Oracle Advance Queueing（AQ）允许你通过标准 JMS API 将 Oracle 数据库用作消息代理。这使得基于关系型数据实现事件溯源成为可能，并省去许多原本需要的间接步骤。


    ```

    io.helidon.messaging.aq

    helidon-messaging-aq


    io.helidon.integrations.cdi

    helidon-integrations-cdi-datasource-ucp

    runtime


    Listing 13-70

    Oracle AQ Connector Dependency

    ```


    Helidon AQ 消息连接器使用 [Oracle AQ JMS](https://docs.oracle.com/en/database/oracle/oracle-database/19/adque/jms-introduction.html)
    API，其中 JMS queue 映射到 AQ 单消费者队列，JMS topic 映射到多消费者队列。

