- fmt: '## Histogram


    `Histogram` is a complex metric showing how measurements are distributed across
    specific ranges, often called buckets. The key word here is `distribution`. The
    use case for the histogram is when you only care a little about the absolute values
    but want to see how these values are distributed.


    Graphically histogram looks like a bar chart. Each bar represents a bucket. The
    higher the bar, the more measurements fall into this range.


    Figure [4-3](#600147_1_En_4_Chapter.xhtml#Fig3) is a sample of a histogram demonstrating
    the age distribution of people participating in a conference.


    ![](images/600147_1_En_4_Chapter/600147_1_En_4_Fig3_HTML.jpg)


    A histogram of the number of people versus age from 10 to 90\. The age group of
    30 to 40 has the highest number of people, while the age group 60 to 70 has the
    lowest number of people.


    Figure 4-3


    Histogram sample


    Another sample is photography. Histograms are used directly in cameras to show
    the brightness of your picture. Each tone is presented as a bar. The higher the
    bar, the more frequently this tone is in your image. It’s a perfect tool to see
    how your picture is exposed.


    In our area, the use cases for the histogram are, for example, request duration
    or response size distributions.


    `Histogram` metric contains 12 fields, including the lowest, highest, and median
    values in the distribution, the standard deviation of the values, and the sum
    of all values and values of the 50th, 75th, 95th, 98th, 99th, and 99.9th percentile
    (see Table [4-9](#600147_1_En_4_Chapter.xhtml#Tab9)).


    Table 4-9


    Histogram Metric Data


    | Description | OpenMetrics Suffix | JSON Format Field | Histogram Class Method
    |

    | --- | --- | --- | --- |

    | The lowest value in the distribution | `min_<units>` | `min` | `getSnapshot().getMin()`
    |

    | The highest value in the distribution | `max_<units>` | `max` | `getSnapshot().getMax()`
    |

    | The median value in the distribution | `mean_<units>` | `mean` | `getSnapshot().getMean()`
    |

    | The standard deviation of the values | `stddev_<units>` | `stddev` | `getSnapshot().getStdDev()`
    |

    | The number of values in the distribution | `<units>_count` | `count` | `getCount()`
    |

    | The sum of all values | `<units>_sum` | `sum` | `getSum()` |

    | The value at the 50th percentile in the distribution | `<units>{quantile="0.5"}`
    | `p50` | `getSnapshot().getMedian()` |

    | The value at the 75th percentile in the distribution | `<units>{quantile="0.75"}`
    | `p75` | `getSnapshot().get75thPercentile()` |

    | The value at the 95th percentile in the distribution | `<units>{quantile="0.95"}`
    | `p95` | `getSnapshot().get95thPercentile()` |

    | The value at the 98th percentile in the distribution | `<units>{quantile="0.98"}`
    | `p98` | `getSnapshot().get98thPercentile()` |

    | The value at the 99th percentile in the distribution | `<units>{quantile="0.99"}`
    | `p99` | `getSnapshot().get99thPercentile()` |

    | The value at the 99,9th percentile in the distribution | `<units>{quantile="0.999"}`
    | `p999` | `getSnapshot().get999thPercentile()` |


    ### Note


    A percentile is a value below which a given percentage of observations in a group
    of observations falls. For example, the 70th percentile is the value below which
    70% of the observations may be found.


    MicroProfile Metrics provides only programmatic APIs to work with the histogram.


    ### Using Programmatic API


    MicroProfile Metrics API has a `Histogram` class, which is used to work with histograms.
    It can be obtained the same way as other metric classes using one of the overloaded
    `histogram` methods of the `MetricRegistry` class.


    To demonstrate a histogram, Listing [4-12](#600147_1_En_4_Chapter.xhtml#PC32)
    is a simple service that registers a passed value in the histogram.


    ```java

    @ApplicationScoped

    @Path("/histogram")

    public class HistogramProgrammaticResource {

    private Histogram histogram;

    @Inject

    public HistogramProgrammaticResource(MetricRegistry metricRegistry) {

    createHistogram(metricRegistry);

    }

    @GET

    @Path("/{value}")

    public void histogram(@PathParam("value") Long value) {

    histogram.update(value);

    }

    private void createHistogram(MetricRegistry metricRegistry) {

    Metadata metadata = Metadata.builder()

    .withName("histogram")

    .withDescription("Histogram programmatic")

    .withType(MetricType.HISTOGRAM)

    .build();

    histogram = metricRegistry.histogram(metadata);

    }

    }

    Listing 4-12

    Creating a Histogram Using Programmatic API

    ```


    The sample output in OpenMetrics format looks like Listing [4-13](#600147_1_En_4_Chapter.xhtml#PC33).


    ```text

    # TYPE application_histogram_mean gauge

    application_histogram_programmatic_mean 3.0688587149767783

    # TYPE application_histogram_max gauge

    application_histogram_programmatic_max 5

    # TYPE application_histogram_min gauge

    application_histogram_programmatic_min 1

    # TYPE application_histogram_stddev gauge

    application_histogram_programmatic_stddev 1.4120173733941095

    # TYPE application_histogram summary

    # HELP application_histogram Histogram programmatic

    application_histogram_programmatic_count 5

    application_histogram_programmatic_sum 15

    application_histogram_programmatic{quantile="0.5"} 3

    application_histogram_programmatic{quantile="0.75"} 4

    application_histogram_programmatic{quantile="0.95"} 5

    application_histogram_programmatic{quantile="0.98"} 5

    application_histogram_programmatic{quantile="0.99"} 5

    application_histogram_programmatic{quantile="0.999"} 5

    Listing 4-13

    Histogram Metric Output in OpenMetrics Format

    ```


    ## Meter


    The specification defines `meter` as a metric that tracks mean throughput and
    one-, five-, and fifteen-minute exponentially-weighted moving average throughput
    measured in hits per second. All data provided by the meter is listed in Table
    [4-10](#600147_1_En_4_Chapter.xhtml#Tab10).


    The `exponentially-weighted moving average` is a statistical measure widely used
    in finance for stock technical analysis and volatility modeling. It calculates
    a weighted average on a subset of the full data set and is designed the way that
    older observations are given lower weights. The weight for older observations
    is decreasing exponentially.


    The primary purpose of the meter is to monitor the traffic on a RESTful service
    endpoint or a data access component. Helidon provides a vendor metric for monitoring
    the total throughput of your service, which is a meter.


    Table 4-10


    Meter Metric Data


    | Description | OpenMetrics Suffix | JSON Format Field | Meter Class Method |

    | --- | --- | --- | --- |

    | The total number of observations | `total` | `count` | `getCount()` |

    | The average rate per second | `rate_per_second` | `meanRate` | `getMeanRate()`
    |

    | The exponentially-weighted moving average for the last minute | `one_min_rate_per_second`
    | `oneMinRate` | `getOneMinuteRate()` |

    | The exponentially-weighted moving average for the last five minutes | `five_min_rate_per_second`
    | `fiveMinRate` | `getFiveMinuteRate()` |

    | The exponentially-weighted moving average for the last fifteen minutes | `fifteen_min_rate_per_second`
    | `fifteenMinRate` | `getFifteenMinuteRate()` |


    MicroProfile Metrics specification allows users to work with meters using annotations
    and programmatic APIs.'
