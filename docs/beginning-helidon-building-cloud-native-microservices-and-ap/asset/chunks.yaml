- fmt: "## JSON Web Token\n\nOne of the easiest yet very secure approaches to authentication\
    \ is token-based authentication. Authentication tokens, often called bearer tokens,\
    \ are unique short-lived text strings, verifiable to be issued by a genuine identity\
    \ manager. Services can pass along such a token without needing to authenticate\
    \ repeatedly. Just imagine a knight in our example kingdom with a decree from\
    \ the castle warden allowing him passage through any part of the kingdom during\
    \ his travels. The decree has a seal, so anyone can verify the warden has issued\
    \ it. It is valid only for a short time necessary for the particular quest and\
    \ only for the knight it has been issued for. All those knightly qualities mentioned\
    \ and more provides JWT.\n\nThere are several enigmatic acronyms. Let’s break\
    \ it down so you don’t get lost.\n\n- [JWT](https://jwt.io) is the acronym for\
    \ JSON Web Token.\n- [JWS](https://www.rfc-editor.org/rfc/rfc7515) is the acronym\
    \ for JSON Web Signature. It is a JWT base64 format signed for verification; the\
    \ content is not encrypted.\n- [JWE](https://www.rfc-editor.org/rfc/rfc7516) is\
    \ the acronym for JSON Web Encryption, another JWT format in which payload is\
    \ safely encrypted.\n- [JWK](https://www.rfc-editor.org/rfc/rfc7517) is the acronym\
    \ for JSON Web Key, a cryptographic key representation.\n- JWKS is the acronym\
    \ for JSON Web Key Set. It is a simple JSON format for handling multiple JWK keys.\
    \ Keycloak provides those at `/realms/my-realm/protocol/openid-connect/certs.`\n\
    - [OIDC](https://openid.net/connect/) is the acronym for OpenID Connect.\n- [OpenID\
    \ Connect Discovery](https://openid.net/specs/openid-connect-discovery-1_0.html)\
    \ is a mechanism for fetching metadata about OIDC identity providers like REST\
    \ resources for obtaining JWT tokens or JWKS public key sets. Keycloak provides\
    \ those at `/realms/my-realm/.well-known/openid-configuration`\n\nJWT is a simple,\
    \ standardized JSON structure encoded as a base64 token carrying an identity claims\
    \ map, usually signed by a private certificate of the issuer (JWS) or fully encrypted\
    \ (JWE). In the JWS format, you need only the issuer’s public key (JWK) to check\
    \ the validity of the JWT token. Keys can be provided to Helidon services locally\
    \ or downloaded at Helidon service startup as JWKS from an identity provider with\
    \ OpenID Connect Discovery protocol unless the custom public key is configured,\
    \ depending on the used security provider. When the JWT token is signed, Helidon\
    \ security can easily check if the correct identity authority created it. No additional\
    \ communication with the identity manager is needed once Helidon has access to\
    \ the issuer’s public key. Checking JWT token validity can be fast and localized.\n\
    \nJWT token issuer can be a specialized identity provider like the Keycloak server\
    \ in this chapter’s examples or the Helidon service. The data carried inside the\
    \ token payload are structured in JSON format in the claims. While there are many\
    \ [IANA authority registered claims](https://www.iana.org/assignments/jwt/jwt.xhtml%2523claims)\
    \ with a given structure, JWT tokens can also carry custom claims, making JWT\
    \ tokens highly customizable.\n\n- ① Token expiration time\n- ② Token issue time\n\
    - ③ Unique identifier of the token\n- ④ Issuer identification\n- ⑤ Audience to\
    \ validate if a token was issued for this particular resource group\n- ⑥ Unique\
    \ identifier of the subject\n- ⑦ Preferred username\n- ⑧ Groups claim to carry\
    \ roles added in Keycloak by the `microprofile-jwt` scope mapper\n\n```json\n\
    {\n  \"exp\": 1671647530, ①\n  \"iat\": 1671647230, ②\n  \"jti\": \"2bfdb114-2dfd-4696-a8ac-0ffcf9dc4257\"\
    , ③\n  \"iss\": \"http://localhost:8979/realms/beginning-helidon\", ④\n  \"aud\"\
    : [\"kingdom-audience\", ...], ⑤\n  \"sub\": \"14515518-1856-4564-855f-3d44814c5ba4\"\
    , ⑥\n  \"typ\": \"Bearer\",\n  \"azp\": \"beginning-helidon-client\",\n  \"nonce\"\
    : \"9a358080-a589-4b47-a870-7e8e5e8ae145\",\n  \"session_state\": \"4b7307f6-5e69-47e3-9af1-00921adb6181\"\
    ,\n  \"acr\": \"1\",\n  \"allowed-origins\": [\"http://localhost:8080\"],\n  \"\
    realm_access\": {\"roles\": [\"warden\", ...]},\n  \"scope\": \"openid microprofile-jwt\
    \ profile email kingdom-jwt-scope\",\n  \"sid\": \"4b7307f6-5e69-47e3-9af1-00921adb6181\"\
    ,\n  \"upn\": \"joel\", ⑦\n  \"name\": \"Joel Driffin\",\n  \"groups\": [\"warden\"\
    , ...],⑧\n  \"preferred_username\": \"joel\",\n  \"given_name\": \"Joel\",\n \
    \ \"family_name\": \"Driffin\"\n}\nListing 8-11\nJWT Token Payload Claims Issued\
    \ by Keycloak\n```\n\nJWT is especially practical for service-to-service communication\
    \ as each service doesn’t have to be able to reach JWT token issuer and can validate\
    \ (JWS) or decrypt (JWE) a JWT token locally.\n\n### Warning\n\nAlthough the JWT\
    \ payload is verifiably genuine in JWS format, it is not encrypted like in the\
    \ JWE format!\n\nJWT tokens are usually carried along over the `SESSIONID` cookie,\
    \ parameters, or the `Authorization` header. Helidon JWT-aware security providers\
    \ take care not only of incoming tokens but Helidon also provides outbound security\
    \ features for calling other services with JWT tokens."
  raw: '## JSON Web Token


    One of the easiest yet very secure approaches to authentication is token-based
    authentication. Authentication tokens, often called bearer tokens, are unique
    short-lived text strings, verifiable to be issued by a genuine identity manager.
    Services can pass along such a token without needing to authenticate repeatedly.
    Just imagine a knight in our example kingdom with a decree from the castle warden
    allowing him passage through any part of the kingdom during his travels. The decree
    has a seal, so anyone can verify the warden has issued it. It is valid only for
    a short time necessary for the particular quest and only for the knight it has
    been issued for. All those knightly qualities mentioned and more provides JWT.


    There are several enigmatic acronyms. Let’s break it down so you don’t get lost.


    *   [JWT](https://jwt.io) is the acronym for JSON Web Token.


    *   [JWS](https://www.rfc-editor.org/rfc/rfc7515) is the acronym for JSON Web
    Signature. It is a JWT base64 format signed for verification; the content is not
    encrypted.


    *   [JWE](https://www.rfc-editor.org/rfc/rfc7516) is the acronym for JSON Web
    Encryption, another JWT format in which payload is safely encrypted.


    *   [JWK](https://www.rfc-editor.org/rfc/rfc7517) is the acronym for JSON Web
    Key, a cryptographic key representation.


    *   JWKS is the acronym for JSON Web Key Set. It is a simple JSON format for handling
    multiple JWK keys. Keycloak provides those at `/realms/my-realm/protocol/openid-connect/certs.`


    *   [OIDC](https://openid.net/connect/) is the acronym for OpenID Connect.


    *   [OpenID Connect Discovery](https://openid.net/specs/openid-connect-discovery-1_0.html)
    is a mechanism for fetching metadata about OIDC identity providers like REST resources
    for obtaining JWT tokens or JWKS public key sets. Keycloak provides those at `/realms/my-realm/.well-known/openid-configuration`


    JWT is a simple, standardized JSON structure encoded as a base64 token carrying
    an identity claims map, usually signed by a private certificate of the issuer
    (JWS) or fully encrypted (JWE). In the JWS format, you need only the issuer’s
    public key (JWK) to check the validity of the JWT token. Keys can be provided
    to Helidon services locally or downloaded at Helidon service startup as JWKS from
    an identity provider with OpenID Connect Discovery protocol unless the custom
    public key is configured, depending on the used security provider. When the JWT
    token is signed, Helidon security can easily check if the correct identity authority
    created it. No additional communication with the identity manager is needed once
    Helidon has access to the issuer’s public key. Checking JWT token validity can
    be fast and localized.


    JWT token issuer can be a specialized identity provider like the Keycloak server
    in this chapter’s examples or the Helidon service. The data carried inside the
    token payload are structured in JSON format in the claims. While there are many
    [IANA authority registered claims](https://www.iana.org/assignments/jwt/jwt.xhtml%2523claims)
    with a given structure, JWT tokens can also carry custom claims, making JWT tokens
    highly customizable.


    *   ① Token expiration time


    *   ② Token issue time


    *   ③ Unique identifier of the token


    *   ④ Issuer identification


    *   ⑤ Audience to validate if a token was issued for this particular resource
    group


    *   ⑥ Unique identifier of the subject


    *   ⑦ Preferred username


    *   ⑧ Groups claim to carry roles added in Keycloak by the `microprofile-jwt`
    scope mapper


    ```

    {

    "exp": 1671647530, ①

    "iat": 1671647230, ②

    "jti": "2bfdb114-2dfd-4696-a8ac-0ffcf9dc4257", ③

    "iss": "http://localhost:8979/realms/beginning-helidon", ④

    "aud": ["kingdom-audience", ...], ⑤

    "sub": "14515518-1856-4564-855f-3d44814c5ba4", ⑥

    "typ": "Bearer",

    "azp": "beginning-helidon-client",

    "nonce": "9a358080-a589-4b47-a870-7e8e5e8ae145",

    "session_state": "4b7307f6-5e69-47e3-9af1-00921adb6181",

    "acr": "1",

    "allowed-origins": ["http://localhost:8080"],

    "realm_access": {"roles": ["warden", ...]},

    "scope": "openid microprofile-jwt profile email kingdom-jwt-scope",

    "sid": "4b7307f6-5e69-47e3-9af1-00921adb6181",

    "upn": "joel", ⑦

    "name": "Joel Driffin",

    "groups": ["warden", ...],⑧

    "preferred_username": "joel",

    "given_name": "Joel",

    "family_name": "Driffin"

    }

    Listing 8-11

    JWT Token Payload Claims Issued by Keycloak

    ```


    JWT is especially practical for service-to-service communication as each service
    doesn’t have to be able to reach JWT token issuer and can validate (JWS) or decrypt
    (JWE) a JWT token locally.


    Warning


    Although the JWT payload is verifiably genuine in JWS format, it is not encrypted
    like in the JWE format!


    JWT tokens are usually carried along over the `SESSIONID` cookie, parameters,
    or the `Authorization` header. Helidon JWT-aware security providers take care
    not only of incoming tokens but Helidon also provides outbound security features
    for calling other services with JWT tokens.'
  trans: '

    ## JSON Web 令牌


    基于令牌的身份验证是最简单且非常安全的身份验证方法之一。身份验证令牌（通常称为 bearer token）是唯一且短时有效的文本字符串，可验证其由真实的身份管理器签发。服务可以传递此类令牌，而无需重复进行身份验证。你可以想象我们示例王国中的一位骑士，持有城堡守卫官的通行令，允许他在旅途中穿行王国的任何区域。该通行令带有印章，因此任何人都能验证它确由守卫官签发。它仅在特定任务所需的短时间内有效，并且只对被签发的那位骑士有效。上述这些骑士通行令具备的特性以及更多能力，正是
    JWT 所提供的。


    这里有几个看起来有些神秘的缩写。我们来逐一拆解，避免你迷失其中。


    *   [JWT](https://jwt.io) 是 JSON Web Token 的缩写。


    *   [JWS](https://www.rfc-editor.org/rfc/rfc7515) 是 JSON Web Signature 的缩写。它是用于验证而签名的
    JWT base64 格式；其内容未加密。


    *   [JWE](https://www.rfc-editor.org/rfc/rfc7516) 是 JSON Web Encryption 的缩写，是另一种
    JWT 格式，其中负载被安全加密。


    *   [JWK](https://www.rfc-editor.org/rfc/rfc7517) 是 JSON Web Key 的缩写，即一种密码学密钥表示形式。


    *   JWKS 是 JSON Web Key Set 的缩写。它是一种用于处理多个 JWK 密钥的简单 JSON 格式。Keycloak 在 `/realms/my-realm/protocol/openid-connect/certs.`
    提供这些密钥。


    *   [OIDC](https://openid.net/connect/) 是 OpenID Connect 的缩写。


    *   [OpenID Connect Discovery](https://openid.net/specs/openid-connect-discovery-1_0.html)
    是一种用于获取 OIDC 身份提供方元数据的机制，例如用于获取 JWT 令牌或 JWKS 公钥集合的 REST 资源。Keycloak 在 `/realms/my-realm/.well-known/openid-configuration`
    提供这些信息。


    JWT 是一种简单的标准化 JSON 结构，被编码为 base64 令牌，携带身份声明映射，通常由签发方的私有证书签名（JWS）或被完全加密（JWE）。在
    JWS 格式中，你只需要签发方的公钥（JWK）即可检查 JWT 令牌的有效性。根据所使用的安全提供方，密钥可以在本地提供给 Helidon 服务，或在 Helidon
    服务启动时通过 OpenID Connect Discovery 协议从身份提供方下载 JWKS（除非已配置自定义公钥）。当 JWT 令牌被签名后，Helidon
    安全机制可以轻松检查是否由正确的身份权威创建。只要 Helidon 拥有签发方公钥，就不再需要与身份管理器进行额外通信。JWT 令牌有效性检查可以快速且本地化地完成。


    JWT 令牌签发方可以是专门的身份提供方（例如本章示例中的 Keycloak 服务器），也可以是 Helidon 服务。令牌负载中携带的数据以 JSON 格式组织为
    claims（声明）。尽管有许多具有既定结构的 [IANA 权威机构注册声明](https://www.iana.org/assignments/jwt/jwt.xhtml%2523claims)，JWT
    令牌也可以携带自定义声明，因此 JWT 令牌具有很高的可定制性。


    *   ① 令牌过期时间


    *   ② 令牌签发时间


    *   ③ 令牌唯一标识符


    *   ④ 签发方标识


    *   ⑤ 用于验证令牌是否为该特定资源组签发的受众（Audience）


    *   ⑥ 主体唯一标识符


    *   ⑦ 首选用户名


    *   ⑧ 由 `microprofile-jwt` scope mapper 在 Keycloak 中添加角色后承载这些角色的 groups 声明


    ```

    {

    "exp": 1671647530, ①

    "iat": 1671647230, ②

    "jti": "2bfdb114-2dfd-4696-a8ac-0ffcf9dc4257", ③

    "iss": "http://localhost:8979/realms/beginning-helidon", ④

    "aud": ["kingdom-audience", ...], ⑤

    "sub": "14515518-1856-4564-855f-3d44814c5ba4", ⑥

    "typ": "Bearer",

    "azp": "beginning-helidon-client",

    "nonce": "9a358080-a589-4b47-a870-7e8e5e8ae145",

    "session_state": "4b7307f6-5e69-47e3-9af1-00921adb6181",

    "acr": "1",

    "allowed-origins": ["http://localhost:8080"],

    "realm_access": {"roles": ["warden", ...]},

    "scope": "openid microprofile-jwt profile email kingdom-jwt-scope",

    "sid": "4b7307f6-5e69-47e3-9af1-00921adb6181",

    "upn": "joel", ⑦

    "name": "Joel Driffin",

    "groups": ["warden", ...],⑧

    "preferred_username": "joel",

    "given_name": "Joel",

    "family_name": "Driffin"

    }

    Listing 8-11

    JWT Token Payload Claims Issued by Keycloak

    ```


    JWT 对于服务间通信尤其方便，因为每个服务都不必能够访问 JWT 令牌签发方，也可以在本地验证（JWS）或解密（JWE）JWT 令牌。


    警告


    尽管 JWS 格式下的 JWT 负载可验证其真实性，但它不像 JWE 格式那样经过加密！


    JWT 令牌通常通过 `SESSIONID` cookie、参数或 `Authorization` 请求头进行传递。支持 JWT 的 Helidon 安全提供方不仅会处理入站令牌，Helidon
    还提供出站安全特性，以便在调用其他服务时携带 JWT 令牌。

