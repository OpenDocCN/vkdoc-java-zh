  raw: '## Converters


    Every config value is treated as plain text and converted to the desired type
    by a set of built-in and custom converters, no matter from which config source
    the value is loaded. The converter is selected according to the target property
    type, as shown in Figure [3-2](#600147_1_En_3_Chapter.xhtml#Fig2).


    ![](images/600147_1_En_3_Chapter/600147_1_En_3_Fig2_HTML.jpg)


    Three blocks with text demonstrate the conversion of config value to the target
    property type. Java dot lang dot integer is the converter used.


    Figure 3-2


    The converter for parsing the text value of a given property is selected by the
    type of the injection point


    The built-in converters cover all the basic types you can think of—numbers, boolean
    values, characters, class references, dates, and patterns.


    *   Boolean: `true`, `1`, `YES`, `Y`, and `ON` are converted as `true`; all other
    values as `false`.


    *   Numbers: Basically, all primitive and boxed Java types that represent numbers
    are supported; a dot is parsed as a decimal separator.


    *   Date and Time: `LocalDate`, `Duration`, `Period`, `Instant`, and many other
    types are supported.


    *   Others: `Path`, `File`, `URL`, `URI`, `Charset`, `Pattern`, and many other
    types are supported.


    Is that enough? Because you have just started!


    ### Automatic Converter


    Any custom type can be automatically converted with the automatic converter, if
    the custom type provides one of the following:


    *   Has the method `public static T of(String val)`


    *   Has the method `public static T valueOf(String val)`


    *   Has the method `public static T parse(CharSequence val)`


    *   Has a public constructor with a single `String` parameter


    An automatic converter is applied if no custom converter is registered for the
    custom type.


    ## Aggregated Properties


    You can group properties logically. It is easier to understand and work with such
    a configuration. In the case of config files with a flat structure, such as the
    properties file, you can achieve grouping based on a common prefix.


    ```

    sorcerer.orcSlayingPotions=68

    sorcerer.invisibilityCloak=false

    sorcerer.weapons=axe,sword

    Listing 3-5

    Properties with a Common Prefix

    ```


    Grouping is much easier in tree-structured formats such as YAML. Let’s use the
    word *readable* but stay neutral in the never-ending YAML flame war.


    ```

    sorcerer:

    orcSlayingPotions: 68

    invisibilityCloak: false

    weapons: axe,sword

    Listing 3-6

    YAML Properties with a Common Prefix

    ```


    Injecting such grouped properties one by one adds quite a clutter to our Orc slaying
    business code.


    ```

    @Inject

    public SorcererBean(

    @ConfigProperty(name="sorcerer.orcSlayingPotions")

    int potions,

    @ConfigProperty(name="sorcerer.invisibilityCloak")

    boolean cloak,

    @ConfigProperty(name="sorcerer.weapons")

    List weapons)

    Listing 3-7

    Injection of Each Separate Property To a Bean Constructor

    ```


    In this code, you would group such properties under the same Java object anyway;
    something such as `SorcererProperties` sounds nice. You can leave the work of
    filling the properties in the object to the config.


    ```

    @ConfigProperties(prefix="sorcerer")

    public class SorcererProperties {

    @ConfigProperty(name="orcSlayingPotions") int potions;

    boolean cloak;

    List weapons;

    }

    Listing 3-8

    Properties with a Common Prefix Grouped to a Common Bean

    ```


    Notice the CDI config bean; the property names are derived from the field names
    unless overridden with annotations. Our `SorcererProperties` can be injected as
    if it was a standard CDI bean, so you can inject it wherever you want and access
    all the grouped properties inside.


    ```

    @Inject

    public SorcererBean(@ConfigProperties SorcererProperties

    sorcererProperties)

    Listing 3-9

    Properties Bean Injected to a Bean Constructor

    ```


    ### Custom Converter


    If all the converters mentioned until now don’t solve your use case, you can still
    create your own custom Config converter and register it over the service locator.


    You can create a converter to convert JSON, which is saved as a property value.
    Let’s say that in our example, Orcs are configured in such a way.


    ```

    app.jsonOrc={"orcName":"Scullcrack", "level":"34"}

    Listing 3-10

    Property with a Raw JSON Value

    ```


    But you would like to inject the property value as `jakarta.json.JsonObject` directly,
    so our business code doesn’t get cluttered with all the JSON parsing. Let’s create
    a custom converter for this purpose; it’s just a class implementing `org.eclipse.microprofile.config.spi.Converter`.


    *   ① If multiple converters for the same type are available, the one with the
    highest priority is used; `100` is the default priority.


    ```

    @Priority(101)   ①

    public class JsonConverter implements Converter{

    private static final JsonReaderFactory JSON =

    Json.createReaderFactory(Collections.emptyMap());

    @Override

    public JsonObject convert(String value) {

    return JSON.createReader(new StringReader(value))

    .readObject();

    }

    }

    Listing 3-11

    Custom JSON Converter for Parsing Properties with JSON as the Value

    ```


    Note


    A converter gets registered as a service provider. If you are working on a classpath-based
    project, create a provider-configuration file with `my.package.JsonConverter`
    as its content.


    `META-INF/services/org.eclipse.microprofile.config.spi.Converter`


    Config runtime finds your converter over the service loader facility.


    Don’t forget to use `module-info.java` when registering a service provider in
    a JPMS module-based project. Just add the `provides` `org.eclipse.microprofile.config.spi.Converter`
    with `my.package.JsonConverter`; clause to `module-info.java`.


    You can test our brand-new custom converter directly within the JAX-RS resource.
    You can see how easy it is to inject our converted value directly where needed.


    ```

    @Path("/jsonOrc")

    public class OrcResource {

    private JsonObject jsonOrc;

    @Inject

    public OrcResource(@ConfigProperty(name = "app.jsonOrc")

    JsonObject jsonOrc) {

    this.jsonOrc=jsonOrc;

    }

    @GET

    @Produces(MediaType.APPLICATION_JSON)

    public JsonObject getJsonOrc() {

    return jsonOrc;

    }

    }

    Listing 3-12

    JAX-RS Resource with the Directly Injected Converted Property

    ```


    Configuration converters are powerful tools for keeping the boilerplate configuration
    code cleanly separated from the sorcerer business.


    ## Profiles


    Production or not that is the question! It’s quite a typical situation when you
    have the test environment and production one.


    Do you remember the Dieselgate emissions scandal? It’s a good example of a configuration
    profile. The car control units have been programmed to operate the engines with
    lower emissions when tested in the laboratory. For the control units, a whole
    set of parameters had to change depending on whether the car was in the laboratory
    or on the highway. Let’s try to achieve that with Helidon Config.


    The first thing is setting the profile itself with the `mp.config.profile` property.
    You can set the property over any of the used config sources. For example, as
    an environment variable `export MP_CONFIG_PROFILE=TEST` or use the `-Dmp.config.profile=TEST`
    property.


    ```

    java -Dmp.config.profile=TEST -jar myCarControlUnit.jar

    Listing 3-13

    Running Helidon with Profile TEST

    ```


    Config profiles can be used at the Config source level by switching whole configuration
    files or at the property level using prefixed properties.


    ### Property Level


    At the property level, the property prefixed with `%` followed by the profile
    name gets precedence over the other properties with the same key.


    *   ① `false` wins if the `PROD` profile is active


    *   ② `true` wins if the `TEST` profile is active


    *   ③ `false` wins if there is no active profile


    ```

    %PROD.engine.emission.control=false    ①

    %TEST.engine.emission.control=true     ②

    engine.emission.control=false          ③

    Listing 3-14

    Properties Specific for a Given Profile

    ```'
  trans: '

    ## 转换器


    每个配置值都会被当作纯文本处理，并通过一组内置或自定义转换器转换为目标类型，无论该值来自哪个配置源。转换器会根据目标属性类型进行选择，如图 3-2 所示。


    ![](img/600147_1_En_3_Fig2_HTML.jpg)


    包含文本的三个区块展示了配置值到目标属性类型的转换。使用的转换器是 Java dot lang dot integer。


    图 3-2


    用于解析给定属性文本值的转换器由注入点的类型决定


    内置转换器覆盖了你能想到的所有基础类型——数字、布尔值、字符、类引用、日期和模式。


    *   布尔值：`true`、`1`、`YES`、`Y` 和 `ON` 会被转换为 `true`；其他所有值都会被转换为 `false`。


    *   数字：基本上，所有表示数字的 Java 原始类型和装箱类型都受支持；点号会被解析为小数分隔符。


    *   日期和时间：支持 `LocalDate`、`Duration`、`Period`、`Instant` 以及许多其他类型。


    *   其他：支持 `Path`、`File`、`URL`、`URI`、`Charset`、`Pattern` 以及许多其他类型。


    这样就够了吗？因为你才刚刚开始！


    ### 自动转换器


    如果自定义类型提供以下任意一种能力，那么任何自定义类型都可以通过自动转换器自动完成转换：


    *   拥有方法 `public static T of(String val)`


    *   拥有方法 `public static T valueOf(String val)`


    *   拥有方法 `public static T parse(CharSequence val)`


    *   拥有一个带单个 `String` 参数的公共构造函数


    如果没有为该自定义类型注册自定义转换器，就会应用自动转换器。


    ## 聚合属性


    你可以在逻辑上对属性进行分组。这样的配置更容易理解和使用。对于扁平结构的配置文件（例如 properties 文件），你可以基于公共前缀来实现分组。


    ```

    sorcerer.orcSlayingPotions=68

    sorcerer.invisibilityCloak=false

    sorcerer.weapons=axe,sword

    Listing 3-5

    Properties with a Common Prefix

    ```


    在 YAML 这类树形结构格式中，分组会容易得多。我们用 *readable* 这个词来形容它，但在没完没了的 YAML 论战中保持中立。


    ```

    sorcerer:

    orcSlayingPotions: 68

    invisibilityCloak: false

    weapons: axe,sword

    Listing 3-6

    YAML Properties with a Common Prefix

    ```


    将这类分组属性逐个注入，会让我们的兽人猎杀业务代码显得相当杂乱。


    ```

    @Inject

    public SorcererBean(

    @ConfigProperty(name="sorcerer.orcSlayingPotions")

    int potions,

    @ConfigProperty(name="sorcerer.invisibilityCloak")

    boolean cloak,

    @ConfigProperty(name="sorcerer.weapons")

    List weapons)

    Listing 3-7

    Injection of Each Separate Property To a Bean Constructor

    ```


    在这段代码中，你无论如何都会把这些属性归到同一个 Java 对象下；例如 `SorcererProperties` 这个名字就不错。你可以把向对象填充属性的工作交给
    config 来完成。


    ```

    @ConfigProperties(prefix="sorcerer")

    public class SorcererProperties {

    @ConfigProperty(name="orcSlayingPotions") int potions;

    boolean cloak;

    List weapons;

    }

    Listing 3-8

    Properties with a Common Prefix Grouped to a Common Bean

    ```


    请注意这个 CDI 配置 Bean；属性名默认从字段名派生，除非通过注解覆盖。我们的 `SorcererProperties` 可以像标准 CDI Bean
    一样被注入，因此你可以在任何需要的地方注入它，并访问其中所有分组属性。


    ```

    @Inject

    public SorcererBean(@ConfigProperties SorcererProperties

    sorcererProperties)

    Listing 3-9

    Properties Bean Injected to a Bean Constructor

    ```


    ### 自定义转换器


    如果到目前为止提到的所有转换器都不能满足你的使用场景，你仍然可以创建自己的自定义 Config 转换器，并通过服务定位器进行注册。


    你可以创建一个转换器，把保存为属性值的 JSON 转换出来。假设在我们的示例中，兽人是这样配置的。


    ```

    app.jsonOrc={"orcName":"Scullcrack", "level":"34"}

    Listing 3-10

    Property with a Raw JSON Value

    ```


    但你希望将属性值直接注入为 `jakarta.json.JsonObject`，这样业务代码就不会被 JSON 解析逻辑弄得杂乱。让我们为此创建一个自定义转换器；它只是一个实现了
    `org.eclipse.microprofile.config.spi.Converter` 的类。


    *   ① 如果同一类型有多个可用转换器，则使用优先级最高的那个；`100` 是默认优先级。


    ```

    @Priority(101)   ①

    public class JsonConverter implements Converter{

    private static final JsonReaderFactory JSON =

    Json.createReaderFactory(Collections.emptyMap());

    @Override

    public JsonObject convert(String value) {

    return JSON.createReader(new StringReader(value))

    .readObject();

    }

    }

    Listing 3-11

    Custom JSON Converter for Parsing Properties with JSON as the Value

    ```


    注意


    转换器会作为服务提供者进行注册。如果你正在开发基于 classpath 的项目，请创建一个提供者配置文件，内容为 `my.package.JsonConverter`。


    `META-INF/services/org.eclipse.microprofile.config.spi.Converter`


    Config 运行时会通过服务加载机制找到你的转换器。


    在基于 JPMS 模块的项目中注册服务提供者时，别忘了使用 `module-info.java`。只需在 `module-info.java` 中添加 `provides`
    `org.eclipse.microprofile.config.spi.Converter` with `my.package.JsonConverter`;
    子句。


    你可以直接在 JAX-RS 资源中测试我们崭新的自定义转换器。你会看到，直接在需要的地方注入转换后的值是多么容易。


    ```

    @Path("/jsonOrc")

    public class OrcResource {

    private JsonObject jsonOrc;

    @Inject

    public OrcResource(@ConfigProperty(name = "app.jsonOrc")

    JsonObject jsonOrc) {

    this.jsonOrc=jsonOrc;

    }

    @GET

    @Produces(MediaType.APPLICATION_JSON)

    public JsonObject getJsonOrc() {

    return jsonOrc;

    }

    }

    Listing 3-12

    JAX-RS Resource with the Directly Injected Converted Property

    ```


    配置转换器是强大的工具，可将样板配置代码与法师业务逻辑清晰分离。


    ## 配置档案（Profiles）


    是否生产环境，这是个问题！当你同时有测试环境和生产环境时，这是非常典型的场景。


    你还记得 Dieselgate（柴油门）排放丑闻吗？这是配置档案的一个很好的例子。汽车控制单元被编程为在实验室测试时以更低排放运行发动机。对控制单元而言，当车辆处于实验室还是高速公路时，整套参数都必须切换。让我们尝试用
    Helidon Config 实现这一点。


    第一步是通过 `mp.config.profile` 属性设置档案本身。你可以通过任何已使用的配置源设置该属性。例如，将其作为环境变量 `export MP_CONFIG_PROFILE=TEST`，或者使用
    `-Dmp.config.profile=TEST` 属性。


    ```

    java -Dmp.config.profile=TEST -jar myCarControlUnit.jar

    Listing 3-13

    Running Helidon with Profile TEST

    ```


    配置档案既可在配置源级别使用（切换整个配置文件），也可在属性级别使用（通过带前缀的属性）。


    ### 属性级别


    在属性级别，以 `%` 加档案名为前缀的属性，会比其他具有相同键的属性拥有更高优先级。


    *   ① 当 `PROD` 档案激活时，`false` 生效


    *   ② 当 `TEST` 档案激活时，`true` 生效


    *   ③ 当没有激活档案时，`false` 生效


    ```

    %PROD.engine.emission.control=false    ①

    %TEST.engine.emission.control=true     ②

    engine.emission.control=false          ③

    Listing 3-14

    Properties Specific for a Given Profile

    ```

