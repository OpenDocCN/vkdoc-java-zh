  raw: '## MicroProfile Reactive Streams Operators


    MicroProfile Reactive Streams Operators is an abstraction bound by specification
    in the way in which you can port your business code without any changes. Using
    reactive streams, you can switch from RxJava to Mutiny or Helidon operators without
    changing your code.


    Portability is not the only feature by far, MP Reactive Streams API is structured
    around builders for units representing operators called *stages*.


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig6_HTML.png)


    A block diagram has 3 blocks the publisher stage, the processor stage, and the
    subscriber stage with functions of the dot of, dot map, and dot for each, respectively.


    Figure 13-6


    Reactive stream stages in a closed graph


    Stage builder creates reactive streams publisher, processor, or subscriber. You
    can structure your streams with *stages* into larger reusable parts called *graphs*.
    Graphs can be composed together into larger graphs like a toy building kit.


    *   ① Publisher stage of


    *   ② Processor stage map


    *   ③ Subscriber/terminal stage


    *   ④ Invoke subscription between the stages


    ```

    ReactiveStreams

    .of(1, 2, 3, 4)                       ①

    .map(i -> i * 10)                     ②

    .filter(i -> i  log("Got " + i))        ③

    .run();                               ④

    Listing 13-3

    RS Stages in a Closed Graph

    ```


    Graph is a combination of stages, depending on stage types, graphs can be distinguished
    to four types.


    *   The publisher graph starts in the publisher stage and optionally ends in the
    processor stage.


    *   The processor graph is only in the processor stages.


    *   The subscriber graph optionally starts with processor stage and always ends
    in the subscriber stage.


    *   The closed graph starts in the publisher stage, ends in the subscriber stage,
    and optionally has processor stages in between.


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig7_HTML.png)


    2 sets of block diagrams of the publisher and processor graphs have 2 blocks each.
    The publisher graph has 2 blocks of the publisher and processor stages with the
    functions dot of and dot map. The processor graph has 2 blocks of the processor
    stages with the functions dot map and dot filter.


    Figure 13-7


    Publisher and processor graphs


    Separate publisher and processor stages can be grouped into larger graphs with
    `.via(processor)`.


    ```

    var publisherStage =

    ReactiveStreams.of(1, 2, 3, 4);

    var processorStage =

    ReactiveStreams.builder()

    .map(i -> i * 10);

    var publisherGraph =

    publisherStage.via(processorStage);

    Listing 13-4

    Combining RS Stages in Graphs

    ```


    For creating subscriber or closed graphs, `.to(subscriber)` method is used. While
    the publisher graph connected with the subscriber graph over the `.to()` method
    creates a closed graph, the processor connected with the subscriber graph creates
    the subscriber graph. Only the closed graph is runnable, with the `run()` method
    actual subscription is done and the whole stream starts.


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig8_HTML.png)


    2 sets of block diagrams of the subscriber and closed graphs have 2 and 3 blocks,
    respectively. The subscriber graph has 2 blocks of the processor and subscriber
    stages with the functions dot map and dot for each. The closed graph has 3 blocks
    of the publisher, processor, and subscriber stages with 3 functions.


    Figure 13-8


    Subscriber and closed graph


    This extensive granularity of MP Reactive Streams allows reusing whole chains
    of operators. Following stream example repeats the whole sequence of operators.


    *   ① Repeated operators


    ```

    ReactiveStreams

    .of(1, 2, 3, 4, 5)

    .filter(i -> i  i > 2)

    .map(i -> i * 10).map(i -> i - 5)

    .map(i -> i * 10).map(i -> i - 5)  ①

    .map(String::valueOf)

    .forEach(i -> log("Got " + i))

    .run();

    Listing 13-5

    Closed Graph with Repeated Stages

    ```


    You can decompose the same reactive stream into multiple graphs, combine them,
    and reuse the repeated graph.


    *   ① Connecting the same graph with repeated operators twice


    *   ② Closing the graph with subscriber


    *   ③ Invoking actual subscription


    ```

    var publisherGraph =

    ReactiveStreams.of(1, 2, 3, 4, 5)

    .filter(i -> i  i > 2);

    var processor1Graph =

    ReactiveStreams.builder()

    .map(i -> i * 10)

    .map(i -> i - 5);

    var processor2Graph =

    ReactiveStreams.builder()

    .map(String::valueOf);

    var subscriberGraph =

    ReactiveStreams.builder()

    .forEach(i -> log("Got " + i));

    publisherGraph

    .via(processor1Graph)

    .via(processor1Graph)  ①

    .via(processor2Graph)

    .to(subscriberGraph)  ②

    .run();  ③

    Listing 13-6

    Combining Graphs

    ```


    Running the stream doesn’t immediately yield the result nor blocks the current
    thread as the completion of the stream may (or may not) be asynchronous. Instead
    of the actual value Java’s `CompletionStage` is returned as a promise callback
    to be completed in the future successfully with the result value from the terminal
    operator or exceptionally with the `Throwable` in case the `onError` signal terminated
    the reactive stream.


    `CompletionStage` has its own operators you can use to react on asynchronous completion
    like `whenComplete`, `thenApply` and many more. It is also possible to block the
    current thread until asynchronous operation completes, but it is a very dangerous
    thing to do in any reactive environment. When you are sure that the current thread
    can be blocked, either because it is a virtual thread or a physical thread you
    have under control; either `.join()` on converted `CompletableFuture` or `.await()`
    on Helidon-proprietary `Single` can be used.


    *   ① Way of blocking with `CompletableFuture.join()`


    *   ② Way of blocking with `Single.await()`


    ```

    CompletionStage> cf =

    ReactiveStreams.of("1", "2", "3", "4")

    .toList()

    .run();

    List resultJoin = cf.toCompletableFuture()

    .join();  ①

    List resultAwait = Single.create(cf, true)

    .await();  ②

    Listing 13-7

    Blocking Current Thread Until Stream Completes

    ```


    Warning


    Keep in mind that blocking in reactive context is always harmful and quickly leads
    to deadlock or event pool exhaustion.


    ### of


    The `of` operator is a publisher emitting downstream given items supplied over
    the `vararg` parameter.


    *   ① Result list contains [1, 2, 3, 4]


    ```

    ReactiveStreams.of(1, 2, 3, 4)

    .toList()    ①

    .run()

    Listing 13-8

    of Operator Publishing Given Items

    ```


    ### empty


    The `empty` operator sends an `onComplete` signal downstream after the subscription
    happens.


    *   ① `peek` is never executed, as no `onNext` signals come.


    *   ② `OnComplete` is executed right away.


    ```

    ReactiveStreams.empty()

    .peek(i -> log("This is never executed"))  ①

    .onComplete(() -> log("Completed immediately"))  ②

    .toList()

    .run()

    Listing 13-9

    empty Operator Immediately Completing the Stream

    ```


    ### failed


    The `failed` operator sends an `onError` signal downstream with the supplied `Throwable`
    as the cause after subscription happens.


    *   ① No `onNext` signals are sent


    *   ② No `onComplete` happens


    *   ③ Stream finishes with `onError` signal


    ```

    ReactiveStreams.failed(new Exception("BOOM!"))

    .peek(i -> log("This is never executed"))  ①

    .onComplete(() -> log("This is never executed"))  ②

    .onError(t -> log("Stream failed because of " + t.getMessage()))  ③

    .toList()

    .run()

    Listing 13-10

    failed Operator Immediately Failing the Stream

    ```


    ### generate


    The `generate` operator executes given supplier once for each requested item,
    returned item is emitted downstream as an `onNext` signal.


    *   ① Logged exactly three times


    *   ② Result list contains [1, 2, 3] as requested items are limited to three


    ```

    AtomicLong seq = new AtomicLong();

    ReactiveStreams.generate(() -> {

    log("Generating " + seq.incrementAndGet());  ①

    return seq.get();

    })

    .limit(3)

    .toList()  ②

    .run();

    Listing 13-11

    generate Operator Invoking Supplier for Each Requested Item

    ```'
