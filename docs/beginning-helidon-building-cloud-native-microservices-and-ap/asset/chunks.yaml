    The `takeWhile` operator lets through items until supplied predicate returns true,
    `takeWhile` functions similarly to the `filter` operator, but completes the stream
    when predicate returns false.


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig13_HTML.png)


    A diagram has 4 color gradient circles numbered 1 to 4 and 2 circles numbered
    1 and 2 with a short vertical line each on the arrows at the top and bottom. It
    has a block of the function dot take while at the center.


    Figure 13-13


    `takeWhile` operator


    - ① Items can pass downstream only until the predicate returns false

    - ② Result list contains `[1, 2]` because `3` caused stream completion


    ```java

    ReactiveStreams.of(1, 2, 3, 4)

    .takeWhile(i -> i != 3)  ①

    .toList() ②

    .run()

    Listing 13-19

    takeWhile Operator Letting Items Through While Predicate Is True

    ```


    ## `dropWhile`


    The `dropWhile` operator drops all items coming with `onNext` signal, not sending
    them to the next operator downstream until its predicate returns false.


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig14_HTML.png)


    A diagram has 4 color gradient circles numbered 1 to 4 and 2 circles numbered
    3 and 4 with a short vertical line each on the arrows at the top and bottom. It
    has a block of the function dot drop while at the center.


    Figure 13-14


    `DropWhile` operator


    Predicate function is executed for each `onNext` signal with item as its parameter
    until first time predicate returns false, after first false result is not executed
    anymore.


    - ① Items can pass downstream only after the predicate returns false for the first
    time

    - ② Result list contains `[3, 4]` because `1` and `2` were dropped


    ```java

    ReactiveStreams.of(1, 2, 3, 4)

    .dropWhile(i -> i != 3)  ①

    .toList()  ②

    .run()

    Listing 13-20

    dropWhile Operator Dropping Items While Predicate Is True

    ```


    ## `skip`


    The `skip` operator drops given number of items, after that all subsequent `onNext`
    signals are allowed to pass downstream.


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig15_HTML.png)


    A diagram has 4 color gradient circles numbered 1 to 4 and a circle numbered 4
    with a short vertical line each on the arrows at the top and bottom. It has a
    block of the function dot skip at the center.


    Figure 13-15


    `Skip` operator


    Skip parameter can be only a positive number or `0`. When a negative number is
    supplied `IllegalArgumentException` is raised.


    ## `flatMap`


    The `flatMap` operator executes a given function for each item, where another
    reactive stream is expected as a result. `flatMap` inlines all items from the
    resulting stream, sending each of its items separately downstream.


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig16_HTML.png)


    A diagram has 3 color gradient circles numbered 1 to 3 and 6 circles numbered
    1, 10, 2, 20, 3, and 30 with a short vertical line each on the arrows at the top
    and bottom. It has a block of the function dot flat map at the center.


    Figure 13-16


    `flatMap` operator


    This ability allows multiplying items based on the provided logic.


    - ① Items are converted to streams containing themselves and their multiple

    - ② Result list contains `[1, 10, 2, 20, 3, 30]` because for each item, its multiple
    was added


    ```java

    ReactiveStreams.of(1, 2, 3)

    .flatMap(i -> ReactiveStreams.of(i, i * 10))  ①

    .toList()  ②

    .run()

    Listing 13-21

    flatMap Operator Multiplying Items

    ```


    Whereas a basic MP Reactive Streams `flatMap` expects a publisher builder, its
    alternative, `flatMapRsPublisher`, behaves the same but expects a `Publisher`
    type.


    ## `flatMapCompletionStage`


    The `flatMapCompletionStage` operator safely aligns `CompletionStage` callbacks
    in the reactive stream so that execution of the next operator happens when a given
    completion stage is completed.


    While normally it is very dangerous to block or obstruct reactive operators, `flatMapCompletionStage`
    provides a way of offloading the blocking or obstructing operation to another
    thread. This approach is necessary in case upstream uses a limited number of threads,
    for example event loop model, otherwise other workers would be deprived of their
    thread time.


    - ① Asynchronous work is done serially; each execution starts only after the previous
    is done

    - ② Result list contains `[1, 2, 3]`

    - ③ Streams `CompletionStage` is completed when all async works are finished and
    results collected


    ```java

    ReactiveStreams.of(1, 2, 3)

    .flatMapCompletionStage(i ->

    CompletableFuture.consumeAsync(() -> {

    workForFewMinutes();  ①

    return i;

    }, executorService))

    .toList()  ②

    .run()  ③

    Listing 13-22

    flatMapCompletionStage Operator Aligning Asynchronous Execution

    ```


    ## `flatMapIterable`


    The `flatMapIterable` serializes supplied iterable’s items downstream as separate
    stream items.


    - ① Items are converted to streams containing themselves and their multiple

    - ② Result list contains `[1, 10, 2, 20, 3, 30]` because for each item, its multiple
    was added


    ```java

    ReactiveStreams.of(1, 2, 3)

    .flatMapIterable(i -> List.of(i, i * 10))  ①

    .toList()  ②

    .run()

    Listing 13-23

    flatMapIterable Operator Multiplying Items

    ```


    ## `onComplete`


    The `onComplete` operator never augments the stream. It executes provided runnable
    for `onComplete` signal coming through the stream.


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig17_HTML.png)


    A diagram has 2 sets of 4 color gradient circles numbered 1 to 4 with a short
    vertical line each on the arrows at the top and bottom. It has a block of the
    function dot on complete at the center. The vertical line on the bottom arrow
    has the label it is done.


    Figure 13-17


    `OnComplete` operator


    The `onComplete` runnable is executed before the `onComplete` signal continues
    downstream.


    ## `onError`


    The `onError` operator never augments the stream. It executes a provided consumer
    for the `onError` signal coming through the stream. The consumer gets a `Throwable`,
    with the cause of the error as a parameter.


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig18_HTML.png)


    A diagram has 2 sets of 4 color gradient circles numbered 1 to 4 with a cross
    symbol each on the arrows at the top and bottom. It has a block of the function
    dot on error at the center. The cross symbol on the bottom arrow has the label
    stream failed.


    Figure 13-18


    `onError` operator


    The `onError` consumer is executed before the `onError` signal continues downstream.


    ## `onErrorResume`


    The `onErrorResume` operator can convert the `onError` signal to a single new
    item and send it downstream as the `onNext` signal.


    ![](images/600147_1_En_13_Chapter/600147_1_En_13_Fig19_HTML.png)


    A diagram has 2 color gradient circles numbered 1 and 2 with a cross symbol, and
    3 circles numbered 1, 2, and 99 with a short vertical line on the arrows at the
    top and bottom. It has a block of the function dot on error resume at the center.


    Figure 13-19


    `OnErrorResume` operator


    The operator function receives a `Throwable` cause if the `onError` signal is
    a parameter. A new item of the same type as the previous is expected to be returned.


    - ① Error is converted to a single item sent downstream as `onNext` instead of
    the `onError` signal

    - ② Result list contains `[1, 2, 99]` because `onError` was converted to a single
    additional item


    ```java

    ReactiveStreams.concat(

    ReactiveStreams.of(1, 2),

    ReactiveStreams.failed(new Exception("BOOM!"))

    )

    .onErrorResume(t -> 99)  ①

    .toList()  ②

    .run()

    Listing 13-24

    onErrorResume Operators Reviving Failed Stream

    ```'
