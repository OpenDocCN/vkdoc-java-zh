- fmt: "# 14. Long Running Actions (LRA)\n\nThis chapter covers the following topics:\n\
    \n- Introduction to SAGA based distributed transactions with MicroProfile\n- Setting\
    \ up JAX-RS resource as LRA transaction participant\n- Understanding of participant\
    \ state workflow\n- Using MicroProfile LRA in an example cinema booking project\n\
    \nDistributed transactions are a very important tool for keeping consistency in\
    \ all the complex systems molded together by various business requirements thrown\
    \ at the developers. For years there was the two-phase commit (`2PC`) solving\
    \ the problem. But with microservice architecture, a granular composition of many\
    \ self-contained services which communicate with each other usually asynchronously,\
    \ `2PC` becomes a bottleneck. Due to the isolation requirement, resources got\
    \ locked for too long, breaking all the achieved reactiveness as a result. It\
    \ is a problem known for decades and has already been solved by the [SAGA pattern](https://en.wikipedia.org/wiki/Long-running_transaction).\
    \ Saga is a series of local transactions with defined compensation actions. Instead\
    \ of commits and rollbacks, you define general actions that need to be done to\
    \ keep the system in a consistent state.\n\nInspired by SAGA came MicroProfile\
    \ Long Running Actions (`LRA`), which is a long-awaited specification that provides\
    \ a lock-free, and consequently loosely-coupled, approach to achieve consistency\
    \ in a microservice environment. Asynchronous compensations are used to maintain\
    \ eventual data integrity without staging expensive isolation. And as `LRA` is\
    \ an alternative to Java Transactions API (`JTA`), you can think about it similarly\
    \ with few subtle differences. Instead of `JTA` transactional bean methods, you\
    \ get transactional JAX-RS resources.\n\n## LRA Transaction\n\nMultiple participants\
    \ can join every `LRA` transaction. A participant is invoked by the JAX-RS method\
    \ annotated with `LRA`-specific annotation. The `@LRA` annotation marks the JAX-RS\
    \ method, which should join `LRA` when called. Whether a new `LRA` transaction\
    \ is started or an existing transaction context is joined, it can be configured\
    \ with a specific `LRA` type. It gets quite familiar for anyone who used `JTA`\
    \ annotations before.\n\nThe following are `LRA` types:\n\n- `REQUIRES_NEW`: Always\
    \ create a new `LRA` transaction context, ignore any existing context\n- `REQUIRED`:\
    \ Create a new `LRA` transaction context or use existing\n- `MANDATORY`: Return\
    \ `412 Precondition Failed` if called without `LRA` context\n- `SUPPORTS`: When\
    \ called without `LRA` context, execution continues as normal JAX-RS method\n\
    - `NOT_SUPPORTED`: Always executed without joining `LRA`\n- `NEVER`: If called\
    \ with `LRA` context, return `412 Precondition Failed HTTP;` otherwise, execute\
    \ as normal JAX-RS method\n- `NESTED`: Create new `LRA` transaction and use existing\
    \ `LRA` context as parent\n\n`LRA` participation isn’t only the business method.\
    \ Additional JAX-RS methods need to be defined for the compensation actions: `@Compensate`\
    \ for failed transactions and `@Complete` for successful ones.\n\n- ① Executed\
    \ in the scope of new `LRA` transaction\n- ② Called by `LRA` coordinator when\
    \ `buyTicket()` method successfully finishes\n- ③ Called by `LRA` coordinator\
    \ when `buyTicket()` method throws exception or don’t finish before time limit\n\
    \n```java\n@Path(\"/example\")\n@ApplicationScoped\npublic class LRAExampleResource\
    \ {\n    @PUT\n    @LRA(value = LRA.Type.REQUIRES_NEW, timeLimit = 500, timeUnit\
    \ = ChronoUnit.MILLIS)\n    @Path(\"start-example\")\n    public Response buyTicket(@HeaderParam(LRA_HTTP_CONTEXT_HEADER)\
    \ URI lraId,\n                              String data) {\n        ...  // ①\n\
    \        return Response.ok().build();\n    }\n\n    @PUT\n    @Complete\n   \
    \ @Path(\"complete-example\")  // ②\n    public Response success(@HeaderParam(LRA_HTTP_CONTEXT_HEADER)\
    \ URI lraId) {\n        return LRAResponse.completed();\n    }\n\n    @PUT\n \
    \   @Compensate\n    @Path(\"compensate-example\")  // ③\n    public Response\
    \ failure(@HeaderParam(LRA_HTTP_CONTEXT_HEADER) URI lraId) {\n        return LRAResponse.compensated();\n\
    \    }\n}\n```\n\nListing 14-1  \nJAX-RS Resource with `LRA`\n\nEvery participant\
    \ joining the `LRA` transaction needs to provide its compensation links, those\
    \ URLs leading to resources annotated with `@Compensate`, `@Complete`, `@AfterLRA`,\
    \ and so on. The `LRA` coordinator tracks which resources to call when the `LRA`\
    \ transaction state changes. When the JAX-RS resource method is annotated with\
    \ `@LRA(REQUIRES_NEW)`, every intercepted call starts a new `LRA` transaction\
    \ within the coordinator and joins it as a new participant before the resource\
    \ method body is executed. The ID of the created `LRA` transaction is accessible\
    \ in the resource method through the `Long-Running-Action` header as a new `LRA`\
    \ context. When the resource method invocation successfully finishes, the `LRA`\
    \ transaction is reported to the coordinator as closed. If a participant has the\
    \ `@Complete` method, the coordinator eventually invokes it again with the appropriate\
    \ `LRA` ID header and the `@Complete` method of all the other participants joined\
    \ within the same `LRA` transaction.\n\n![](images/600147_1_En_14_Chapter/600147_1_En_14_Fig1_HTML.png)\n\
    \nA schematic. Service block consists of pods `1` and `2`, with participants `A`\
    \ and `B`. From pod `1`, participant `A` communicates via start `LRA`, join `A`,\
    \ and close with `LRA` coordinator, and participant `B` via join `B`. It completes\
    \ `A` and `B` with participants `A` and `B` in pod `2` via load balancer.\n\n\
    Figure 14-1  \nParticipants behind load balancer\n\n### Warning\n\nCompensation\
    \ methods are JAX-RS methods that get load balanced as any other JAX-RS resource.\
    \ Remember that the complete method doesn’t have to be invoked on the same pod\
    \ as `LRA` was started.\n\nWhen a resource method finishes exceptionally, `LRA`\
    \ is reported to the coordinator as canceled, and the coordinator calls the `@Compensate`\
    \ method on all the participants registered under that transaction.\n\n![](images/600147_1_En_14_Chapter/600147_1_En_14_Fig2_HTML.png)\n\
    \nA schematic of the `LRA` transaction participant cancels. Participant `A` communicates\
    \ via start `LRA`, join `A`, and cancel with `LRA` coordinator, and participant\
    \ `B` via join `B`. The `LRA` coordinator compensates `A` and `B`.\n\nFigure 14-2\
    \  \nParticipant cancels\n\nWhen a transaction isn’t closed before its timeout\
    \ is reached, the coordinator cancels the transaction and calls the compensate\
    \ endpoints for all participants of the timed-out transaction.\n\n![](images/600147_1_En_14_Chapter/600147_1_En_14_Fig3_HTML.png)\n\
    \nA schematic of the `LRA` transaction participant timeout. Participant `A` communicates\
    \ via start `LRA` and join `A` with `LRA` coordinator that has a timer icon, and\
    \ participant `B` via join `B`. The `LRA` coordinator compensates `A` and `B`.\n\
    \nFigure 14-3  \nParticipant timeout\n\n## Context Propagation\n\nWhat better\
    \ way to use for the context propagation between JAX-RS resources than the HTTP\
    \ header? Every `LRA` is identified by the ID assigned by the coordinator when\
    \ the new `LRA` is started. ID is distributed between resources over the HTTP\
    \ header `Long-Running-Action`. When the header is present in the request, `LRA`\
    \ enabled JAX-RS resource considers it part of the existing `LRA` context. This\
    \ enables relaying the context even through the not `LRA` aware parties. MicroProfile\
    \ `LRA` specification doesn’t leverage only the server side JAX-RS but also the\
    \ client side. JAX-RS client relays `LRA` ID automatically when a call is done\
    \ within the `LRA` context.\n\n- ① You don’t need to propagate the `LRA` header\
    \ using the JAX-RS client. The `LRA` header is propagated automatically.\n\n```java\n\
    @PUT\n@Path(\"/payment\")\n@LRA(value = LRA.Type.MANDATORY, end = false)\npublic\
    \ Response makePayment(@HeaderParam(LRA.LRA_HTTP_CONTEXT_HEADER) URI lraId,\n\
    \                            JsonObject jsonObject) {\n    ClientBuilder.newClient()\
    \  // ①\n        .target(\"http://payment-service:7002\")\n        .path(\"/payment/confirm\"\
    )\n        .request();\n    ...\n}\n```\n\nListing 14-2  \nJAX-RS Client, Context\
    \ Propagation"
  raw: '# 14. Long Running Actions (LRA)


    This chapter covers the following topics.


    *   Introduction to SAGA based distributed transactions with MicroProfile


    *   Setting up JAX-RS resource as LRA transaction participant


    *   Understanding of participant state workflow


    *   Using MicroProfile LRA in an example cinema booking project


    Distributed transactions are a very important tool for keeping consistency in
    all the complex systems molded together by various business requirements thrown
    at the developers. For years there was the two-phase commit (2PC) solving the
    problem. But with microservice architecture, a granular composition of many self-contained
    services which communicate with each other usually asynchronously, 2PC becomes
    a bottleneck. Due to the isolation requirement, resources got locked for too long,
    breaking all the achieved reactiveness as a result. It is a problem known for
    decades and has already been solved by the [SAGA pattern](https://en.wikipedia.org/wiki/Long-running_transaction).
    Saga is a series of local transactions with defined compensation actions. Instead
    of commits and rollbacks, you define general actions that need to be done to keep
    the system in a consistent state.


    Inspired by SAGA came MicroProfile Long Running Actions (LRA), which is a long-awaited
    specification that provides a lock-free, and consequently loosely-coupled, approach
    to achieve consistency in a microservice environment. Asynchronous compensations
    are used to maintain eventual data integrity without staging expensive isolation.
    And as LRA is an alternative to Java Transactions API (JTA), you can think about
    it similarly with few subtle differences. Instead of JTA transactional bean methods,
    you get transactional JAX-RS resources.


    ## LRA Transaction


    Multiple participants can join every LRA transaction. A participant is invoked
    by the JAX-RS method annotated with LRA-specific annotation. The `@LRA` annotation
    marks the JAX-RS method, which should join LRA when called. Whether a new LRA
    transaction is started or an existing transaction context is joined, it can be
    configured with a specific LRA type. It gets quite familiar for anyone who used
    JTA annotations before.


    The following are LRA types.


    *   **REQUIRES_NEW**: Always create a new LRA transaction context, ignore any
    existing context


    *   **REQUIRED**: Create a new LRA transaction context or use existing


    *   **MANDATORY**: Return `412 Precondition Failed` if called without LRA context


    *   **SUPPORTS**: When called without LRA context, execution continues as normal
    JAX-RS method


    *   **NOT_SUPPORTED**: Always executed without joining LRA


    *   **NEVER**: If called with LRA context, return `412 Precondition Failed HTTP;`
    otherwise, execute as normal JAX-RS method


    *   **NESTED**: Create new LRA transaction and use existing LRA context as parent


    LRA participation isn’t only the business method. Additional JAX-RS methods need
    to be defined for the compensation actions: `@Compensate` for failed transactions
    and `@Complete` for successful ones.


    *   ① Executed in the scope of new LRA transaction


    *   ② Called by LRA coordinator when `buyTicket` method successfully finishes


    *   ③ Called by LRA coordinator when `buyTicket` method throws exception or don’t
    finish before time limit


    ```

    @Path("/example")

    @ApplicationScoped

    public class LRAExampleResource {

    @PUT

    @LRA(value = LRA.Type.REQUIRES_NEW, timeLimit = 500, timeUnit = ChronoUnit.MILLIS)

    @Path("start-example")

    public Response buyTicket(@HeaderParam(LRA_HTTP_CONTEXT_HEADER) URI lraId,

    String data) {

    ...  ①

    return Response.ok().build();

    }

    @PUT

    @Complete

    @Path("complete-example")  ②

    public Response success(@  HeaderParam(LRA_HTTP_CONTEXT_HEADER) URI lraId) {

    return LRAResponse.completed();

    }

    @PUT

    @Compensate

    @Path("compensate-example")  ③

    public Response failure(@HeaderParam(LRA_HTTP_CONTEXT_HEADER) URI lraId) {

    return LRAResponse.compensated();

    }

    }

    Listing 14-1

    JAX-RS Resource with LRA

    ```


    Every participant joining the LRA transaction needs to provide its compensation
    links, those URLs leading to resources annotated with `@Compensate`, `@Complete`,
    `@AfterLRA`, and so on. The LRA coordinator tracks which resources to call when
    the LRA transaction state changes. When the JAX-RS resource method is annotated
    with `@LRA(REQUIRES_NEW)`, every intercepted call starts a new LRA transaction
    within the coordinator and joins it as a new participant before the resource method
    body is executed. The ID of the created LRA transaction is accessible in the resource
    method through the `Long-Running-Action` header as a new LRA context. When the
    resource method invocation successfully finishes, the LRA transaction is reported
    to the coordinator as closed. If a participant has the `@Complete` method, the
    coordinator eventually invokes it again with the appropriate LRA ID header and
    the `@Complete` method of all the other participants joined within the same LRA
    transaction.


    ![](images/600147_1_En_14_Chapter/600147_1_En_14_Fig1_HTML.png)


    A schematic. Service block consists of pods 1 and 2, with participants A and B.
    From pod 1, Participant A communicates via start L R A, join A, and close with
    L R A coordinator, and participant B via join B. It completes A and B with participants
    A and B in pod 2 via load balancer.


    Figure 14-1


    Participants behind load balancer


    Warning


    Compensation methods are JAX-RS methods that get load balanced as any other JAX-RS
    resource. Remember that the complete method doesn’t have to be invoked on the
    same pod as LRA was started.


    When a resource method finishes exceptionally, LRA is reported to the coordinator
    as canceled, and the coordinator calls the `@Compensate` method on all the participants
    registered under that transaction.


    ![](images/600147_1_En_14_Chapter/600147_1_En_14_Fig2_HTML.png)


    A schematic of the L R A transaction participant cancels. Participant A communicates
    via start L R A, join A, and cancel with L R A coordinator, and participant B
    via join B. The L R A coordinator compensates A and B.


    Figure 14-2


    Participant cancels


    When a transaction isn’t closed before its timeout is reached, the coordinator
    cancels the transaction and calls the compensate endpoints for all participants
    of the timed-out transaction.


    ![](images/600147_1_En_14_Chapter/600147_1_En_14_Fig3_HTML.png)


    A schematic of the L R A transaction participant timeout. Participant A communicates
    via start L R A and join A with L R A coordinator that has a timer icon, and participant
    B via join B. The L R A coordinator compensates A and B.


    Figure 14-3


    Participant timeout


    ## Context Propagation


    What better way to use for the context propagation between JAX-RS resources than
    the HTTP header? Every LRA is identified by the ID assigned by the coordinator
    when the new LRA is started. ID is distributed between resources over the HTTP
    header `Long-Running-Action`. When the header is present in the request, LRA enabled
    JAX-RS resource considers it part of the existing LRA context. This enables relaying
    the context even through the not LRA aware parties. MicroProfile LRA specification
    doesn’t leverage only the server side JAX-RS but also the client side. JAX-RS
    client relays LRA ID automatically when a call is done within the LRA context.


    *   ① You don’t need to propagate the LRA header using the JAX-RS client. The
    LRA header is propagated automatically.


    ```

    @PUT

    @Path("/payment")

    @LRA(value = LRA.Type.MANDATORY, end = false)

    public Response makePayment(@HeaderParam(LRA.LRA_HTTP_CONTEXT_HEADER) URI lraId,

    JsonObject jsonObject) {

    ClientBuilder.newClient()  ①

    .target("http://payment-service:7002")

    .path("/payment/confirm")

    .request()

    ...

    Listing 14-2

    JAX-RS Client, Context Propagation

    ```'
