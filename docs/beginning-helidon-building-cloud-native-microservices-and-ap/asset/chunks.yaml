- fmt: '## Participant


    When the JAX-RS method supporting LRA is called, it joins new or existing LRA
    transactions as a participant. A participant has a life cycle closely coupled
    with its transaction.


    ![](images/600147_1_En_14_Chapter/600147_1_En_14_Fig4_HTML.png)


    A flow diagram demonstrates the participant states. Begin with the participants
    joining active transactions and progress to the action of compensating or completing.
    Compensating concludes with failed to compensate or compensated. Completing is
    either completed or failed to complete.


    Figure 14-4


    Participant states


    Participant’s state is very important for the LRA coordinator to know which compensation
    actions have been already called and which need to be yet called. Every LRA method
    needs to be accompanied by compensation methods and JAX-RS resources which can
    be called by the LRA coordinator when the LRA transaction is completed or canceled.
    Since compensation can be complicated, other methods for state keeping and additional
    resilience are available, as listed in Table [14-1](#600147_1_En_14_Chapter.xhtml#Tab1).


    Table 14-1


    Compensation Methods


    | Annotation | Method |

    | --- | --- |

    | `@Complete` | `PUT` |

    | `@Compensate` | `PUT` |

    | `@Status` | `GET` |

    | `@Forget` | `DELETE` |

    | `@AfterLRA` | `PUT` |


    ### Caution


    Compensation methods are meant to be called only by the LRA coordinator.


    `@Leave` is a special participant method to remove the participant from the LRA
    transaction. This is discussed later.


    ### Complete


    When the LRA transaction ends successfully, all the participants will be informed
    by the coordinator calling the participant’s method annotated with `@Complete`.
    The `complete` method can answer either by success or by informing the coordinator
    that completion is being realized asynchronously, so the coordinator can attempt
    LRA state retrieval later.


    ```java

    @PUT

    @Complete

    @Path("complete-example")

    public Response success(@HeaderParam(LRA_HTTP_CONTEXT_HEADER) URI lraId) {

    bookingRepository.confirmBooking(lraId);

    return LRAResponse.completed();

    }

    Listing 14-3

    JAX-RS Complete Resource, Called When LRA Successfully Completes

    ```


    The following are expected responses.


    - 200: Success

    - 202: Still completing asynchronously

    - 409: Failed to complete, payload must be actual participant status

    - 410: Unknown LRA ID


    ### Compensate


    When the LRA transaction is canceled, all the participants are informed by the
    coordinator calling the participant’s method annotated with `@Complete`.


    ```java

    @PUT

    @Compensate

    @Path("compensate-example")

    public Response failure(@HeaderParam(LRA_HTTP_CONTEXT_HEADER) URI lraId) {

    return LRAResponse.compensated();

    }

    Listing 14-4

    JAX-RS Compensate Resource, Called When LRA Fails to Finish

    ```


    The following are expected responses.


    - 200: Success

    - 202: Still compensating asynchronously

    - 409: Failed to compensate, payload must be actual participant status

    - 410: Unknown LRA ID


    ### Status


    The `@Compensate` and `@Complete` methods have been discussed, but you are probably
    wondering what happens in case of a network issue. What happens when a call to
    JAX-RS complete or compensate method fails? That could cause inconsistency, which
    we are carefully trying to avoid! Coordinators are well-prepared for that with
    numerous retry strategies. But is that enough? That depends on the fact if the
    method is reentrant or not. The coordinator doesn’t know how the action changed
    the state of your participant. Did the compensation method manage to clear the
    seat booking from the database before it crashed or not?


    You can use the `@Status` method, which is called by the coordinator to retrieve
    the status before the actual retry.


    - ① Compensation was successful. No need to call the `compensate` method again.

    - ② There was a call to compensate? Try again, please.


    ```java

    @GET

    @Path("lra-status")

    @Status

    public Response status(@HeaderParam(LRA_HTTP_CONTEXT_HEADER) URI lraId) {

    if(bookingRepository.isBookingCleared(lraId)){

    return Response.ok(ParticipantStatus.Compensated.name()).build();  ①

    } else {

    return Response.ok(ParticipantStatus.Active.name()).build();  ②

    }

    }

    Listing 14-5

    JAX-RS Status Resource, Called by Coordinator Whenever the State of the Participant
    Is Not Known

    ```


    The following are expected responses.


    - 200: Payload must be actual participant status.

    - 202: Call me later. Getting status is in process.

    - 410: Unknown LRA ID


    The same logic can be applied to the complete action; only participant status
    names would differ.


    The following are participant statuses.


    - `Active`: Participant was not asked to complete or compensate yet

    - `Compensating`: Async compensation in progress

    - `Compensated`: Compensation is done

    - `FailedToCompensate`: Compensation failed, and it shouldn’t be reattempted;
    participant needs to report this status until `@Forget` is called

    - `Completing`: Async completion in progress

    - `Completed`: Completion is done

    - `FailedToComplete`: Completion failed, and it shouldn’t be reattempted; participant
    needs to report this status until `@Forget` is called


    ### Forget


    Compensation can also be a long-running asynchronous process. In such cases, compensation
    methods return `ParticipantStatus.Compensating` and status method needs to report
    the actual state when asked. The coordinator checks the status regularly. The
    actual strategy is implementation specific. Participant needs to be able to report
    the state until the `@Forget` method is called.


    - ① Let’s clear up any metadata related to the state of this particular LRA transaction.


    ```java

    @DELETE

    @Path("/lra-forget")

    @Forget

    public Response forget(@HeaderParam(LRA_HTTP_CONTEXT_HEADER) URI lraId) {

    bookingRepository.clearLraMetadata(lraId)  ①

    return Response.ok().build();

    }

    Listing 14-6

    JAX-RS Forget Resource, Called When the Participant State Is No Longer Needed

    ```


    The following are expected responses.


    - 200: Success

    - 410: Unknown LRA ID


    Coordinator lets you know through the `@Forget` method that a particular LRA transaction
    is considered finished, and no other compensation actions will be attempted.


    ### AfterLRA


    Complicated compensation logic can require action upon the final LRA outcome.
    After the compensation actions of all the LRA’s participants are finished, `AfterLRA`
    methods are notified about the outcome of the LRA. Only the final LRA statuses
    can be reported to the `AfterLRA` method.


    - ① LRA finished, and all participants reported successful completion

    - ② LRA is canceled, and all participants reported successful compensation

    - ③ LRA finished, but one or more participants reported unsuccessful completion

    - ④ LRA finished, but one or more participants reported unsuccessful compensation

    - ⑤ Unexpected status


    ```java

    @AfterLRA

    @Path("/after")

    @PUT

    public Response after(@HeaderParam(LRA_HTTP_ENDED_CONTEXT_HEADER) URI lraId,

    LRAStatus status) {

    switch (status) {

    case Closed ->  ①

    case Cancelled ->  ②

    case FailedToClose ->  ③

    case FailedToCancel ->  ④

    default ->  ⑤

    }

    return Response.ok(ParticipantStatus.Completed.name()).build();

    }

    Listing 14-7

    JAX-RS After LRA Resource, Called When All Participants Are Completed or Compensated

    ```


    The following are expected responses.


    - 200: Success'
