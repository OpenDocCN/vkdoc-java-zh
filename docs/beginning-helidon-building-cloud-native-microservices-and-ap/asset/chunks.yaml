    kubectl scale --replicas=1000 -f spells.yaml

    ```


    This scales the spells app to 1000 nodes and shards and replicates all data across
    these nodes—and all are *stateful*! Another good part is that Coherence CE can
    be configured directly in Helidon’s `microprofile-config.properties` because there
    is full integration.


    ## Verrazzano


    Verrazzano is a comprehensive end-to-end corporate container platform that can
    deploy cloud-native and legacy applications in hybrid and multi-cloud environments.
    It comprises a thoughtfully curated selection of open-source components, some
    familiar and essential, while others are purpose-built to integrate all the parts
    seamlessly into a user-friendly platform.


    ![](images/600147_1_En_12_Chapter/600147_1_En_12_Fig2_HTML.png)


    A diagram of the Verrazzano enterprise container platform with its logo includes
    several applications of Rancher, kubernetes, kiali, Keycloak, Jaeger, elastic
    search, Jakarta E E, Oracle WebLogic and coherence, Graal V M, and Micronaut,
    among others, with their logos.


    Figure 12-2


    Verrazzano Enterprise cloud platform


    Verrazzano offers a lot of capabilities like facilitation of DevOps and GitOps
    practices, out-of-the-box application monitoring; management of hybrid and multi-cluster
    workloads; custom handling of WebLogic, Coherence, and Helidon applications; administration
    of multi-cluster infrastructure; and security handling.


    Helidon is a “first-class citizen” in the Verrazzano world. There is special support
    for Helidon out of the box.


    It is very easy to run a Helidon application in the cloud using Verrazzano. Let’s
    deploy the wizard app in it!'
  trans: '

    ## Coherence


    Oracle 的 [Coherence CE](https://coherence.community/) 是 `java.util.Map` 的一种实现，提供并发、容错的键/值存储。它可以在多个
    JVM、服务器和数据中心之间进行扩展和分布，同时提供自动数据分片、高冗余数据存储以及集成消息传递。此外，它还提供事件机制，可通知数据或集群的任何变化，并提供易于使用的
    API。


    该系统是有状态的，并且能够进行纵向和横向扩展。它可以重新配置以使用更多或更少的 CPU、RAM 和存储，从而实现纵向扩展。在典型场景中，Coherence
    CE 中的数据访问操作通常只需几毫秒；在某些情况下，简单的基于键的操作甚至不到一毫秒。


    ### 与 Helidon 集成


    要开始在 Helidon MP 中使用 Coherence，请包含以下 Maven 依赖。


    *   ① Coherence CDI 集成依赖


    *   ② Coherence Helidon MP 配置集成


    *   ③ Coherence Helidon MP 指标集成


    ```

    com.oracle.coherence.ce        ①

    coherence-cdi-server


    com.oracle.coherence.ce        ②

    coherence-mp-config


    com.oracle.coherence.ce        ③

    coherence-mp-metrics


    Listing 12-7

    Coherence Dependencies

    ```


    核心魔法主要集中在 `NamedMap` 对象中。Coherence CE 的 `NamedMap` 扩展了 `java.util.Map` 接口，并作为一种分布式数据结构运行，其数据会分区到多个
    JVM、机器或数据中心中。上述依赖提供了 Helidon 与 Coherence CE 的完整集成。它们负责完成该 `NamedMap` 所需的一切设置与配置，使其能够在我们的代码中被直接注入。


    *   ① `AbstractRepository` 由 Coherence CE 提供


    *   ② `NamedMap` 通过 Coherence CDI 支持注入到 Helidon 应用中。


    ```

    public class SpellRepository extends AbstractRepository {                                            ①

    @Inject

    private NamedMap spells;         ②

    //omitted for simplicity

    }

    Listing 12-8

    Spell Resource

    ```


    在这个示例中，`Spell` 是一个简单的 POJO，包含两个字段：巫师名称（作为键）和他们的咒语。


    *   ① 简单的 spell POJO 必须可序列化


    ```

    public class Spell implements Serializable { ①

    private String wizardName;

    private String spell;

    // getters and setters omitted

    }

    Listing 12-9

    Spell POJO

    ```


    该 spell POJO 可以以两种不同格式进行序列化：一种是 Java 序列化（Coherence CE 用于存储），另一种是 JSON-B（REST API
    使用）。或者，应用也可以使用 JSON 作为传输格式，并使用 Coherence Portable Object Format（POF）作为存储格式。


    由于已经有了仓库和领域对象，就可以在 Helidon 的典型 REST 端点中使用它们来执行 CRUD 操作。


    *   ① 注入仓库。


    *   ② 使用 `spellRepository.save` 方法创建新咒语。


    *   ③ 使用 `spellRepository.get` 方法按巫师名称查找咒语。


    *   ④ 使用 `spellRepository.getAll` 方法获取所有咒语。


    *   ⑤ 使用 `spellRepository.removeById` 删除咒语。


    *   ⑥ 使用 `spellRepository.get` 更新咒语。


    ```

    @Path("/api/spell")

    @ApplicationScoped

    public class SpellsEndpoint {

    @Inject

    private SpellRepository spellRepository;          ①

    @POST

    @Consumes(APPLICATION_JSON)

    public Spell createSpell(JsonObject spell) {

    Spell result = new Spell(spell.getString("wizardName"),

    spell.getString("spell"));

    return spellRepository.save(result);             ②

    }

    @GET

    @Produces(APPLICATION_JSON)

    @Path("{wizardName}")

    public Spell findSpell(@PathParam("wizardName") String wizardName){                                         ③

    return spellRepository.get(wizardName);

    }

    @GET

    @Produces(APPLICATION_JSON)

    public Collection getSpells() {               ④

    return spellRepository.getAll();

    }

    @DELETE

    @Path("{wizardName}")

    public Spell deleteSpell(@PathParam("wizardName") String wizardName) {                                        ⑤

    return spellRepository.removeById(wizardName, true);

    }

    @PUT

    @Path("{wizardName}")

    @Consumes(APPLICATION_JSON)

    public Spell updateSpell(@PathParam("wizardName")

    String wizardName, Spell spell) {             ⑥

    spellRepository.update(wizardName,

    Spell::setSpell, spell.getSpell());

    return findSpell(wizardName);

    }

    }

    Listing 12-10

    Spell Resource

    ```


    Coherence CE 为仓库提供了 `AbstractRepository` 抽象，简化了在典型 CRUD 操作中对 `NamedMap` 的使用。


    现在运行应用。Helidon 会启动、配置并运行一个 Coherence CE 集群。由于 Coherence CE 只是一个库，因此它运行在应用内部。不需要连接任何外部服务器。


    使用 cURL 调用该端点时，只需如下操作即可获取、创建、更新和删除咒语。


    ```

    curl -X GET "http://localhost:8080/api/spell"

    ```


    上述代码会获取所有咒语。


    ```

    curl -X POST -H "Content-Type: application/json" -d ''{"wizardName" : "Oz", "spell":"Bless
    you!"}'' http://localhost:7001/api/spell

    ```


    这会创建一个新的 `Spell` 条目。


    Coherence CE 具有极强的可扩展性。


    ![](img/600147_1_En_12_Fig1_HTML.png)


    一张云架构图展示了多个 Wizard Spell 应用模块连接到负载均衡器，负载均衡器再连接到用户。


    图 12-1


    云中的 Helidon 与 Coherence CE


    为了展示扩展应用有多么容易，设想它部署在 Kubernetes 管理的云环境中。你可以轻松执行以下操作。


    ```

    kubectl scale --replicas=1000 -f spells.yaml

    ```


    这会将 spells 应用扩展到 1000 个节点，并在这些节点之间对所有数据进行分片和复制——而且全部都是*有状态*的！另一个优点是，由于完整集成，Coherence
    CE 可以直接在 Helidon 的 `microprofile-config.properties` 中进行配置。


    ## Verrazzano


    Verrazzano 是一个全面的端到端企业级容器平台，可在混合云和多云环境中部署云原生与传统应用。它由一组经过精心挑选的开源组件构成，其中一些是常见且关键的组件，另一些则专为将所有部分无缝集成为一个易用平台而设计。


    ![](img/600147_1_En_12_Fig2_HTML.png)


    一张 Verrazzano 企业容器平台示意图（含其 logo）展示了多个应用及其 logo，包括 Rancher、kubernetes、kiali、Keycloak、Jaeger、elastic
    search、Jakarta E E、Oracle WebLogic 与 coherence、Graal V M、Micronaut 等。


    图 12-2


    Verrazzano 企业云平台


    Verrazzano 提供了大量能力，例如促进 DevOps 与 GitOps 实践、开箱即用的应用监控、混合与多集群工作负载管理、对 WebLogic、Coherence
    与 Helidon 应用的定制化处理、多集群基础设施管理以及安全管理。


    在 Verrazzano 世界中，Helidon 是“一级公民（first-class citizen）”。它对 Helidon 提供开箱即用的专门支持。


    通过 Verrazzano 在云中运行 Helidon 应用非常容易。让我们把 wizard 应用部署到其中吧！

    '
- fmt: "# Deploying the Helidon Wizard Application\n\n> Note  \n> First, please install\
    \ Verrazzano by following the [installation instructions](https://verrazzano.io/docs/setup/install/installation/).\n\
    \nWe assume that you are familiar with Kubernetes since the operations in Verrazzano\
    \ are done within a terminal using the `kubectl` command. If not, please learn\
    \ more about Kubernetes on its [official website](https://kubernetes.io/docs/home/).\n\
    \n> Note  \n> The following instructions are applicable for the Kubernetes environment\
    \ like [OKE](https://www.oracle.com/cloud/cloud-native/container-engine-kubernetes/).\n\
    \nLet’s do it!\n\nIt is usually a good idea to create a namespace for the application\
    \ and add a label identifying the namespace as managed by Verrazzano.\n\n- ① Creates\
    \ Helidon namespace\n- ② Labels Helidon namespace\n\n```bash\n$ kubectl create\
    \ namespace wizard-helidon               ①\n$ kubectl label namespace wizard-helidon\
    \ verrazzano-managed=true istio-injection=enabled                    ②\n```\n\n\
    You must create two descriptor files to make the Helidon Wizard app run properly\
    \ in Verrazzano.\n\nFirst, you create the `component wizard-helidon-comp.yaml`\
    \ file, describing the Helidon workload, as shown in Listing [12-11](#600147_1_En_12_Chapter.xhtml#PC17).\n\
    \n- ① Describes a component\n- ② Name and namespace of the component\n- ③ Uses\
    \ special Helidon workload to autoconfigure all service endpoints\n- ④ Docker\
    \ image with the app\n\n```yaml\napiVersion: core.oam.dev/v1alpha2\nkind: Component\
    \                                 ①\nmetadata:\nname: wizard-helidon-component\
    \                ②\nnamespace: wizard-helidon\nspec:\nworkload:\napiVersion: oam.verrazzano.io/v1alpha1\n\
    kind: VerrazzanoHelidonWorkload             ③\nmetadata:\nname: wizard-helidon-workload\n\
    labels:\napp: wizard-helidon\nspec:\ndeploymentTemplate:\nmetadata:\nname: wizard-helidon-deployment\n\
    podSpec:\ncontainers:\n- name: wizard-helidon-container\nimage: \"ghcr.io/verrazzano/wizard-helidon-app\"\
    \                              ④\nports:\n- containerPort: 8080\nname: http\n\
    Listing 12-11\nHelidon Verrazzano Component\n```\n\nHelidon is a “first-class\
    \ citizen” in Verrazzano and has its own workload: `VerrazzanoHelidonWorkload`.\
    \ This means that Verrazzano not only configures, deploys, and runs your Helidon\
    \ application but also configures and deploys other services, such as Prometheus\
    \ and Grafana, to gather metrics and monitor the service activity, for example.\n\
    \n> Note  \n> The `image` property points to the location of the Docker image\
    \ with the wizard app.\n\nThen you need to create the `app wizard-helidon-comp.yaml`\
    \ file, describing the deployment of the workload, as shown in Listing [12-12](#600147_1_En_12_Chapter.xhtml#PC18).\n\
    \n- ① Application configuration config\n- ② Name and metadata of the config\n\
    - ③ Components description\n\n```yaml\napiVersion: core.oam.dev/v1alpha2\nkind:\
    \ ApplicationConfiguration                         ①\nmetadata:\nname: wizard-helidon-appconf\
    \                         ②\nnamespace: wizard-helidon\nannotations:\nversion:\
    \ v1.0.0\ndescription: \"Wizard Helidon application\"\nspec:\ncomponents:\n- componentName:\
    \ wizard-helidon-component          ③\ntraits:\n- trait:\napiVersion: oam.verrazzano.io/v1alpha1\n\
    kind: MetricsTrait\nspec:\nscraper: verrazzano-system/vmi-system-prometheus-0\n\
    - trait:\napiVersion: oam.verrazzano.io/v1alpha1\nkind: IngressTrait\nmetadata:\n\
    name: wizard-helidon-ingress\nspec:\nrules:\n- paths:\n- path: \"/wizard\"\npathType:\
    \ Prefix\nListing 12-12\nHelidon Application Verrazzano Descriptor\n```\n\n> Note\
    \  \n> For more information about each config field, please refer to the official\
    \ Verrazzano documentation.\n\nAnd you just need to apply them with `kubectl`.\n\
    \n- ① Apply component configuration\n- ② Apply application configuration\n\n```bash\n\
    $ kubectl apply -f wizard-helidon-comp.yaml  ①\n$ kubectl apply -f wizard-helidon-app.yaml\
    \   ②\nListing 12-13\nApply Configuration with kubectl\n```\n\n![](images/600147_1_En_12_Chapter/600147_1_En_12_Fig3_HTML.png)\n\
    \nA block diagram has blocks of `component.yaml` with 4 components and a trait,\
    \ plus `app config.yaml` with their application configuration. It equals to Verrazzano\
    \ operators, various UIs and databases, and applications such as Kubernetes, Istio,\
    \ and others.\n\nFigure 12-3\n\nVerrazzano deployment\n\nThe wizard Helidon application\
    \ implements a REST API endpoint `/wizard`, which returns a message `{\"name\"\
    :\"Oz\"}` when invoked.\n\nTo access the application using the command line, type\
    \ Listing [12-14](#600147_1_En_12_Chapter.xhtml#PC20) in the terminal.\n\n- ①\
    \ Uses `curl` to get a response from the application in the cloud\n\n```bash\n\
    $ curl -X GET https://wizard-helidon-appconf.wizard-helidon.11.22.33.44.nip.io/wizard\
    \                 ①\n{\"name\":\"Oz\"}\nListing 12-14\nUse cURL to Access the\
    \ Application\n```\n\nThis means that our wizard application is successfully deployed\
    \ in the cloud and managed by Verrazzano.\n\n> Note  \n> Check the Verrazzano\
    \ documentation on how to obtain the correct URL.\n\nThere is a variety of endpoints\
    \ that get automatically created, deployed, and associated with our application.\
    \ They are available to further explore the logs, metrics, and such. They include\
    \ famous tools like Grafana, Kibana, Prometheus, and ElasticSearch. And they all\
    \ were automatically deployed and set up by Verrazanno, thus saving a lot of DevOps\
    \ work.\n\nYou can get the list of available services with the command shown in\
    \ Listing [12-15](#600147_1_En_12_Chapter.xhtml#PC21).\n\n- ① Gets various Verrazzano\
    \ components’ host and address information\n\n```bash\n$ kubectl get ing -n verrazzano-system\
    \        ①\nNAME                         CLASS    HOSTS                      \
    \                  ADDRESS       PORTS     AGE\nverrazzano-ingress           \
    \   verrazzano.default.11.22.33.44.nip.io  11.22.33.44   80, 443   7d2h\nvmi-system-es-ingest\
    \            elasticsearch.vmi.system.default.11.22.33.44.nip.io  11.22.33.44\
    \   80, 443   7d2h\nvmi-system-grafana              grafana.vmi.system.default.11.22.33.44.nip.io\
    \  11.22.33.44   80, 443   7d2h\nvmi-system-kibana               kibana.vmi.system.default.11.22.33.44.nip.io\
    \  11.22.33.44   80, 443   7d2h\nvmi-system-prometheus           prometheus.vmi.system.default.11.22.33.44.nip.io\
    \  11.22.33.44   80, 443   7d2h\nListing 12-15\nGet Ingress Data\n```\n\nDeployment\
    \ of Helidon applications to Verrazzano is really easy. When you create a new\
    \ Helidon project using CLI or [http://helidon.io/starter](http://helidon.io/starter),\
    \ you can specify that you need a docker file and a Verrazzano descriptor. Two\
    \ files are generated: `component.yaml` and `application.yaml`. Apply them with\
    \ the `kubectl` command, and Verrazzano does all the rest!\n\n![](images/600147_1_En_12_Chapter/600147_1_En_12_Fig4_HTML.png)\n\
    \nA flow diagram has 2 blocks of `component.yaml` and `app config.yaml`. It leads\
    \ to the Verrazzano platform that further leads to wizard namespace and its components,\
    \ `istio-system` namespace and its components, and Verrazzano system namespace\
    \ and its component along with UIs and databases.\n\nFigure 12-4\n\nWhat Verrazzano\
    \ does\n\nTo get all the details of the configuration and deployment of a Helidon\
    \ application, please follow the official [Verrazzano guide](https://verrazzano.io/latest/docs/samples/hello-helidon/).\n\
    \nThis chapter only scratched the surface of all functionalities provided by Verrazzano.\
    \ Please consult [the official website](https://verrazzano.io/) for a full description\
    \ of the functionalities.\n\n## Summary\n\n- Helidon is not a closed ecosystem\
    \ and provides easy integrations with the most famous technologies on the market.\n\
    - Neo4J integration is not just an injection of the driver but also integration\
    \ with health and metrics.\n- Coherence CE provides an easy way to have highly\
    \ scalable cashing and persistence in Helidon.\n- Helidon is a “first-class citizen”\
    \ in Verrazzano. You can easily deploy the services in multi-cloud environments\
    \ with only two YAML files."
  raw: '### Deploying the Helidon Wizard Application


    Note


    First, please install Verrazzano by following the [installation instructions](https://verrazzano.io/docs/setup/install/installation/).


    We assume that you are familiar with Kubernetes since the operations in Verrazzano
    are done within a terminal using the `kubectl` command. If not, please learn more
    about Kubernetes on its [official website](https://kubernetes.io/docs/home/).


    Note


    The following instructions are applicable for the Kubernetes environment like
    [OKE](https://www.oracle.com/cloud/cloud-native/container-engine-kubernetes/).


    Let’s do it!


    It is usually a good idea to create a namespace for the application and add a
    label identifying the namespace as managed by Verrazzano.


    *   ① Creates Helidon namespace


    *   ② Labels Helidon namespace


    ```

    $ kubectl create namespace wizard-helidon               ①

    $ kubectl label namespace wizard-helidon verrazzano-managed=true istio-injection=enabled                    ②

    ```


    You must create two descriptor files to make the Helidon Wizard app run properly
    in Verrazzano.


    First, you create the `component wizard-helidon-comp.yaml` file, describing the
    Helidon workload, as shown in Listing [12-11](#600147_1_En_12_Chapter.xhtml#PC17).


    *   ① Describes a component


    *   ② Name and namespace of the component


    *   ③ Uses special Helidon workload to autoconfigure all service endpoints


    *   ④ Docker image with the app


    ```

    apiVersion: core.oam.dev/v1alpha2

    kind: Component                                 ①

    metadata:

    name: wizard-helidon-component                ②

    namespace: wizard-helidon

    spec:

    workload:

    apiVersion: oam.verrazzano.io/v1alpha1

    kind: VerrazzanoHelidonWorkload             ③

    metadata:

    name: wizard-helidon-workload

    labels:

    app: wizard-helidon

    spec:

    deploymentTemplate:

    metadata:

    name: wizard-helidon-deployment

    podSpec:

    containers:

    - name: wizard-helidon-container

    image: "ghcr.io/verrazzano/wizard-helidon-app"                              ④

    ports:

    - containerPort: 8080

    name: http

    Listing 12-11

    Helidon Verrazzano Component

    ```


    Helidon is a “first-class citizen” in Verrazzano and has its own workload: `VerrazzanoHelidonWorkload`.
    This means that Verrazzano not only configures, deploys, and runs your Helidon
    application but also configures and deploys other services, such as Prometheus
    and Grafana, to gather metrics and monitor the service activity, for example.


    Note


    The `image` property points to the location of the Docker image with the wizard
    app.


    Then you need to create the `app wizard-helidon-comp.yaml` file, describing the
    deployment of the workload, as shown in Listing [12-12](#600147_1_En_12_Chapter.xhtml#PC18).


    *   ① Application configuration config


    *   ② Name and metadata of the config


    *   ③ Components description


    ```

    apiVersion: core.oam.dev/v1alpha2

    kind: ApplicationConfiguration                         ①

    metadata:

    name: wizard-helidon-appconf                         ②

    namespace: wizard-helidon

    annotations:

    version: v1.0.0

    description: "Wizard Helidon application"

    spec:

    components:

    - componentName: wizard-helidon-component          ③

    traits:

    - trait:

    apiVersion: oam.verrazzano.io/v1alpha1

    kind: MetricsTrait

    spec:

    scraper: verrazzano-system/vmi-system-prometheus-0

    - trait:

    apiVersion: oam.verrazzano.io/v1alpha1

    kind: IngressTrait

    metadata:

    name: wizard-helidon-ingress

    spec:

    rules:

    - paths:

    - path: "/wizard"

    pathType: Prefix

    Listing 12-12

    Helidon Application Verrazzano Descriptor

    ```


    Note


    For more information about each config field, please refer to the official Verrazzano
    documentation.


    And you just need to apply them with `kubectl`.


    *   ① Apply component configuration


    *   ② Apply application configuration


    ```

    $ kubectl apply -f wizard-helidon-comp.yaml  ①

    $ kubectl apply -f wizard-helidon-app.yaml   ②

    Listing 12-13

    Apply Configuration with kubectl

    ```


    ![](images/600147_1_En_12_Chapter/600147_1_En_12_Fig3_HTML.png)


    A block diagram has blocks of component dot y a m l with 4 components and a trait,
    plus app config dot y a m l with their application configuration. It equals to
    Verrazzano operators, various U Is and databases, and applications such as kubernetes,
    Istio, and others.


    Figure 12-3


    Verrazzano deployment


    The wizard Helidon application implements a REST API endpoint */wizard*, which
    returns a message `{"name":"Oz"}` when invoked.


    To access the application using the command line, type Listing [12-14](#600147_1_En_12_Chapter.xhtml#PC20)
    in the terminal.


    *   ① Uses `curl` to get a response from the application in the cloud


    ```

    $ curl -X GET https://wizard-helidon-appconf.wizard-helidon.11.22.33.44.nip.io/wizard                 ①

    {"name":"Oz"}

    Listing 12-14

    Use cURL to Access the Application

    ```


    This means that our wizard application is successfully deployed in the cloud and
    managed by Verrazzano.


    Note


    Check the Verrazzano documentation on how to obtain the correct URL.


    There is a variety of endpoints that get automatically created, deployed, and
    associated with our application. They are available to further explore the logs,
    metrics, and such. They include famous tools like Grafana, Kibana, Prometheus,
    and ElasticSearch. And they all were automatically deployed and set up by Verrazanno,
    thus saving a lot of DevOps work.


    You can get the list of available services with the command shown in Listing [12-15](#600147_1_En_12_Chapter.xhtml#PC21).


    *   ① Gets various Verrazzano components’ host and address information


    ```

    $ kubectl get ing -n verrazzano-system        ①

    NAME                         CLASS    HOSTS                                        ADDRESS       PORTS     AGE

    verrazzano-ingress              verrazzano.default.11.22.33.44.nip.io  11.22.33.44   80,
    443   7d2h

