  trans: '

    ## 指标


    如果健康指标提供的是服务当前状态的信息，那么指标（Metrics）则给出服务在一段时间内运行表现的一些聚合统计数据。它可以是某个端点收到的请求数量、平均请求处理时间等等。服务管理员可以利用这些信息来提升服务性能、调优扩缩容策略、优化业务逻辑，并收集用于报告的数据。健康检查与指标都旨在与监控系统协同工作。监控栈由一个用于采集和存储数据的数据库，以及一个以图形和图表展示数据的
    UI 系统组成。


    Prometheus 和 Grafana 是常用的指标数据采集与展示系统。


    注意


    Prometheus 是一个开源系统，用于从不同应用中采集并存储指标数据。它不用于查看数据。你可以把它理解为一个专用于存储指标数据的数据库。Prometheus
    为多种编程语言提供了客户端库，包括 Java。


    Grafana 是一个面向用户展示指标数据的可视化工具。它通过美观的图表展示仪表盘，并实时更新。它还支持定义告警，以便在出现异常时通知管理员。它可与 Prometheus
    这类指标存储系统集成，并从中获取数据。


    你的 Helidon 应用会提供一组用户希望跟踪的指标。Prometheus 会轮询你的应用，采集指标数据并在内部存储。Grafana 会向 Prometheus
    查询特定的数据子集，并使用图形和图表在网页上展示。用户加载 Grafana UI 后，就可以在浏览器中查看 Helidon 应用的指标。图 4-1 展示了这些概念。


    ![](img/600147_1_En_4_Fig1_HTML.jpg)


    该框图包含如下流程：用户火柴人、view、Grafana UI、query、Prometheus database、collect，以及包含 UI、database
    和 application''s descriptions 的 Helidon application。


    图 4-1


    指标栈的工作方式与组件


    接下来的问题是，Helidon 如何收集并向 Prometheus 提供指标数据。答案是 Helidon 实现了 MicroProfile Metrics
    规范。更具体地说，Helidon 3.0 实现的是 MicroProfile Metrics 4.0。


    Microprofile Metrics


    MicroProfile Metrics 是由 MicroProfile 工作组开发的开源规范。其目标是标准化微服务定义和暴露指标数据的方式。你可以在规范文档中获取更多信息：[`https://download.eclipse.org/microprofile/microprofile-metrics-4.0/microprofile-metrics-spec-4.0.pdf`](https://download.eclipse.org/microprofile/microprofile-metrics-4.0/microprofile-metrics-spec-4.0.pdf)。


    MicroProfile Metrics 规范定义了 RESTful API，使 Prometheus 之类的系统能够采集指标数据（参见“MicroProfile
    Metrics REST API”一节）。入口点是 `/metrics`。


    下面我们来看 Helidon 应用如何处理指标请求。图 4-2 对此进行了说明。


    1.  请求到达 `/metrics` 端点，或 MicroProfile Metrics REST API 中定义的其他任意端点。


    2.  Helidon 收集 *base* 和 *vendor* 指标的数据。这些指标由 MicroProfile 规范定义，并由 Helidon 开箱即用提供（参见“Metric
    Scopes”一节）。


    3.  Helidon 处理开发者在 Helidon 应用中定义的所有指标。要定义指标，开发者可以使用注解或编程式 API。


    4.  Helidon 聚合来自步骤 2 和 3 的指标数据，并生成 Prometheus 或 JSON 格式的响应。


    ![](img/600147_1_En_4_Fig2_HTML.png)


    该图展示了当用户发起 get /metrics 请求时，Helidon 应用处理请求的 4 个步骤。图左下方还在虚线边框内给出了 base、vendor 和
    application 的代码。


    图 4-2


    Helidon 应用对指标请求的处理流程


    现在你已经熟悉了指标栈架构以及 Helidon 应用内部的指标请求工作流。接下来正是解释“什么是指标、它们如何表示、以及如何向应用添加自定义指标”的好时机。不过在进入理论之前，我们先讨论如何为你的
    Helidon 应用添加 MicroProfile 指标支持。等你理解了这些（别担心，很简单），我们再用一个简单的 Helidon 应用来演示指标。通过示例学习会更容易。


    ### 为你的 Helidon 应用添加 MicroProfile Metrics 支持


    #### 使用 Project Starter


    最简单的方法是使用 Project Starter 生成一个带有指标支持的项目。


    下面说明你需要做什么。


    1.  打开 Project Starter：[`https://helidon.io/starter`](https://helidon.io/starter)。


    2.  在 Helidon Flavor 页面选择 Helidon MP，然后点击 Next。


    3.  在 Application Type 页面，选择 Custom 并点击 Next。


    4.  在 Media Support 页面，保持 Jackson 选中；如果你希望符合 MicroProfile 平台，也可以选择 JSON-B。然后点击
    Next。


    5.  在 Observability 页面，勾选 Metrics，并选择 MicroProfile 作为 Metrics Provider。你也可以选择其他可用选项，例如
    Health Checks 和 Tracing。


    6.  点击 Download 生成项目，或者继续后续步骤完成更多配置。


    #### 使用 CLI


    你需要先安装 Helidon CLI，如第 2 章所述。


    使用 `helidon init` 命令开始生成新项目。CLI 与 Project Starter 使用的是同一套配置向导。按照前文说明回答问题。完成配置向导后，你将获得一个已生成并带有指标支持的项目。


    #### 手动添加依赖


    最简单的方法是使用 `helidon-microprofile` 聚合包，它通过传递依赖包含了 `helidon-microprofile-metrics`。


    ```

    io.helidon.microprofile.bundles

    helidon-microprofile


    ```


    如果你不想依赖更大的 `helidon-microprofile`，也可以通过在 `pom.xml` 文件中添加以下依赖来手动启用 Metrics 支持。


    *   ① MicroProfile Core 依赖


    *   ② MicroProfile Metrics


    ```

    io.helidon.microprofile.bundles

    helidon-microprofile-core   ①


    io.helidon.microprofile.metrics

    helidon-microprofile-metrics②


    ```


    ### 示例应用


    让我们创建一个示例应用，演示 MicroProfile 指标注解和编程式 API 的用法。它以 Project Starter 生成的 Quickstart
    应用为基础，并添加了覆盖规范支持的所有指标类型的 JAX-RS 资源。后续讨论 MicroProfile API 时会使用这些资源中的代码片段。


    该示例应用名为 *ch04-metrics*，可在本书的 GitHub 仓库中获取：[`https://github.com/apress/beginning-helidon`](https://github.com/apress/beginning-helidon)。


    项目根目录下的 README.md 文件包含了构建和运行项目的说明。出于篇幅考虑，书中提供了这些命令。另外，我们也不希望与示例相关的 bash 命令分散你的注意力；我们希望你专注于指标这一主题。

