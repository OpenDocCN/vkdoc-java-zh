- fmt: '## Modifying Requests and Responses


    You may probably notice that `@RegisterProvider` is used to register the exception
    mapper. It is also used to register different filters and modifiers.


    You can use filters around requests and responses.


    - `ClientResponseFilter` is invoked in order when a response is received from
    a remote service.

    - `ClientRequestFilter` is invoked in order when a request is made to a remote
    service.


    For example, if you want to log what request has been made, you should create
    a class implementing `ClientRequestFilter`. By overriding `filter(ClientRequestContext
    requestContext)` function, you can use any information about the current request,
    like headers, URLs, and so forth. You can get it from the `ClientRequestContext`
    object, which is passed as a parameter.


    - ① Implement `ClientRequestFilter`。

    - ② Override `filter(...)` and get information from `ClientRequestContext`。


    ```java

    public class WizardRequestFilter implements ClientRequestFilter {                  ①

    private static final Logger log =

    Logger.getLogger(String.valueOf(WizardRequestFilter.class));

    @Override

    public void filter(ClientRequestContext requestContext) {              ②

    log.info("Request intercepted: " + requestContext.getHeaders());

    }

    }

    Listing 5-10

    Request Filter

    ```


    The same can be done for Response Filters. You should create a class implementing
    `ClientResponceFilter`. In this case, log the response status.


    - ① Implement `ClientResponseFilter`。

    - ② Override `filter(...)` and get information from `ClientResponseContext`。


    ```java

    public class WizardResponseFilter implements ClientResponseFilter {        ①

    private static final Logger log =

    Logger.getLogger(String.valueOf(WizardResponseFilter.class));

    @Override

    public void filter(ClientRequestContext requestContext,

    ClientResponseContext responseContext) { ②

    log.info("Intercepted response status"

    + responseContext.getHeaders());

    }

    }

    Listing 5-11

    Response Filter

    ```


    Finally, you must register these filters with the `WizardRestClient`, as easy
    as the exception mapper, using the `@RegisterProvider` annotation, as shown in
    Listing [5-12](#600147_1_En_5_Chapter.xhtml#PC12).


    - ① Register `WizardRequestFilter`。

    - ② Register `WizardResponseFilter`。


    ```java

    @RegisterRestClient(baseUri="http://localhost:8080/wizard")

    @RegisterProvider(WizardExceptionMapper.class)

    @RegisterProvider(WizardRequestFilter.class)               ①

    @RegisterProvider(WizardResponseFilter.class)              ②

    interface WizardRestClient {

    ...

    }

    Listing 5-12

    Register Filters

    ```


    Now if you run the sorcery ministry app and call the `/wizardClient` endpoint
    in the log output, you see Listing [5-13](#600147_1_En_5_Chapter.xhtml#PC13).


    ```text

    {Accept=[application/json], Magic-Header=[Custom header magic value]}

    {content-length=[13], connection=[keep-alive], Date=[Wed, 28 Jan 2023 16:14:24
    +0300], Content-Type=[application/json]}

    Listing 5-13

    Sample Output

    ```


    The filters are working and returning header information as intended.


    Other interceptions and modifiers can be applied in the same way.


    - `MessageBodyReader` is used when the entity should be read from the API response
    after invocation.

    - `MessageBodyWriter` is used for a request body to be written in the request
    for `@POST` and `@PUT` operations and other HTTP methods that support bodies.

    - `ParamConverter` is used for a parameter in a resource method to be converted
    to a format for a request or a response.

    - `ReaderInterceptor` is a listener triggered when a read occurs against the response
    received from a remote service call.

    - `WriterInterceptor` is a listener triggered when a write occurs to the stream
    to be sent on the remote service invocation.


    Provider invocation priority can be controlled. `@Priority` is used when you want
    to set an explicit priority value, like `@Priority(1000)`. This means that the
    annotated provider is used as one of the last. Both programmatically and via annotations,
    the builder pattern can be used to register providers. The providers that include
    the `@RegisterProvider` annotation are subordinate to those registered using a
    builder. The class’s `@Priority` annotation is subordinate to the `@RegisterProvider`
    annotation.


    Provider priorities can be overridden by various `Configurable` methods, which
    can take a `Provider` class, a `Provider` instance, and a priority and mappings
    of those priorities.'
