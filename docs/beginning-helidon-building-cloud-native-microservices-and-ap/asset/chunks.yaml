- fmt: '## Coherence


    Oracle [Coherence CE](https://coherence.community/) is an implementation of `java.util.Map`
    that offers a concurrent, fault-tolerant key/value store. It can scale and distribute
    across multiple JVMs, servers, and data centers while providing automatic data
    sharding, highly redundant data storage, and integrated messaging. Moreover, it
    offers events that notify of any changes to the data or the cluster and user-friendly
    APIs.


    This system is stateful and capable of vertical and horizontal scaling. It can
    be reconfigured to utilize more or fewer CPUs, RAM, and storage, allowing for
    vertical scaling. In typical scenarios, data access operations in Coherence CE
    only require a few milliseconds and, in some cases, even less than a millisecond
    for simple key-based operations.


    ### Integrating with Helidon


    To start using Coherence with Helidon MP, include the following Maven dependencies.


    - ① Coherence CDI integration dependency

    - ② Coherence Helidon MP config integration

    - ③ Coherence Helidon MP metrics integration


    ```

    com.oracle.coherence.ce        ①

    coherence-cdi-server


    com.oracle.coherence.ce        ②

    coherence-mp-config


    com.oracle.coherence.ce        ③

    coherence-mp-metrics


    Listing 12-7

    Coherence Dependencies

    ```


    The main magic is concentrated in the `NamedMap` object. Coherence CE’s `NamedMap`
    extends the `java.util.Map` interface and functions as a distributed data structure
    with data partitioned across multiple JVMs, machines, or data centers. The mentioned
    dependencies provide full integration of Helidon with Coherence CE. They care
    for setting up and configuring all necessary for this `NamedMap` to be simply
    injected in our code.


    - ① `AbstractRepository` is provided by Coherence CE

    - ② `NamedMap` injected in Helidon application by Coherence CDI Support.


    ```

    public class SpellRepository extends AbstractRepository {                                            ①

    @Inject

    private NamedMap spells;         ②

    //omitted for simplicity

    }

    Listing 12-8

    Spell Resource

    ```


    For this example, `Spell` is a simple POJO containing two fields: the wizard’s
    name (used as a key) and their spell.


    - ① Simple spell POJO must be serializable


    ```

    public class Spell implements Serializable { ①

    private String wizardName;

    private String spell;

    // getters and setters omitted

    }

    Listing 12-9

    Spell POJO

    ```


    The spell POJO can be serialized in two distinct formats: Java serialization,
    which Coherence CE utilizes for storage purposes, and JSON-B, which is used by
    the REST APIs. Alternatively, the application could have used JSON as a transport
    format and Coherence Portable Object Format (`POF`) for storage instead.


    Since there is a repository and domain objects, they can be used in Helidon’s
    typical REST endpoint, where you can do CRUD operations.


    - ① Inject the repository.

    - ② Create a new spell using `spellRepository.save` method.

    - ③ Find a spell by wizard name using the `spellRepository.get` method.

    - ④ Get all spells using the `spellRepository.getAll` method.

    - ⑤ Delete a spell using `spellRepository.removeById`.

    - ⑥ Update a spell using `spellRepository.get`.


    ```

    @Path("/api/spell")

    @ApplicationScoped

    public class SpellsEndpoint {

    @Inject

    private SpellRepository spellRepository;          ①

    @POST

    @Consumes(APPLICATION_JSON)

    public Spell createSpell(JsonObject spell) {

    Spell result = new Spell(spell.getString("wizardName"),

    spell.getString("spell"));

    return spellRepository.save(result);             ②

    }

    @GET

    @Produces(APPLICATION_JSON)

    @Path("{wizardName}")

    public Spell findSpell(@PathParam("wizardName") String wizardName){                                         ③

    return spellRepository.get(wizardName);

    }

    @GET

    @Produces(APPLICATION_JSON)

    public Collection getSpells() {               ④

    return spellRepository.getAll();

    }

    @DELETE

    @Path("{wizardName}")

    public Spell deleteSpell(@PathParam("wizardName") String wizardName) {                                        ⑤

    return spellRepository.removeById(wizardName, true);

    }

    @PUT

    @Path("{wizardName}")

    @Consumes(APPLICATION_JSON)

    public Spell updateSpell(@PathParam("wizardName")

    String wizardName, Spell spell) {             ⑥

    spellRepository.update(wizardName,

    Spell::setSpell, spell.getSpell());

    return findSpell(wizardName);

    }

    }

    Listing 12-10

    Spell Resource

    ```


    Coherence CE provides an abstraction `AbstractRepository` for a repository, simplifying
    the work with `NamedMap` for typical CRUD operations.


    Now run the application. Helidon starts, configures, and runs a Coherence CE cluster.
    Since Coherence CE is just a library, it runs inside the application. No external
    server connections are required.


    Using `cURL` to call the endpoint, it can get, create, update, and delete the
    spells by simply using the following.


    ```

    curl -X GET "http://localhost:8080/api/spell"

    ```


    The preceding code fetches all the spells.


    ```

    curl -X POST -H "Content-Type: application/json" -d ''{"wizardName" : "Oz", "spell":"Bless
    you!"}'' http://localhost:7001/api/spell

    ```


    This creates a new `Spell` item.


    Coherence CE is extremely scalable.


    ![](images/600147_1_En_12_Chapter/600147_1_En_12_Fig1_HTML.png)


    A diagram of a cloud includes several blocks of the Wizard Spell app connected
    to the load balancer that connects to a user.


    Figure 12-1


    Helidon with Coherence CE in a Cloud


    To demonstrate how easy it is to scale our application, imagine it is deployed
    in the Kubernetes-managed clouds. You can easily do the following.


    ```

    kubectl scale --replicas=1000 -f spells.yaml

    ```


    This scales the spells app to 1000 nodes and shards and replicates all data across
    these nodes—and all are `stateful`! Another good part is that Coherence CE can
    be configured directly in Helidon’s `microprofile-config.properties` because there
    is full integration.


    ## Verrazzano


    Verrazzano is a comprehensive end-to-end corporate container platform that can
    deploy cloud-native and legacy applications in hybrid and multi-cloud environments.
    It comprises a thoughtfully curated selection of open-source components, some
    familiar and essential, while others are purpose-built to integrate all the parts
    seamlessly into a user-friendly platform.


    ![](images/600147_1_En_12_Chapter/600147_1_En_12_Fig2_HTML.png)


    A diagram of the Verrazzano enterprise container platform with its logo includes
    several applications of Rancher, `kubernetes`, kiali, Keycloak, Jaeger, elastic
    search, Jakarta E E, Oracle WebLogic and coherence, Graal V M, and Micronaut,
    among others, with their logos.


    Figure 12-2


    Verrazzano Enterprise cloud platform


    Verrazzano offers a lot of capabilities like facilitation of DevOps and GitOps
    practices, out-of-the-box application monitoring; management of hybrid and multi-cluster
    workloads; custom handling of WebLogic, Coherence, and Helidon applications; administration
    of multi-cluster infrastructure; and security handling.


    Helidon is a “first-class citizen” in the Verrazzano world. There is special support
    for Helidon out of the box.


    It is very easy to run a Helidon application in the cloud using Verrazzano. Let’s
    deploy the wizard app in it!'
