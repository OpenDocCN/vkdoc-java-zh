- fmt: "## Helidon Flavors\n\nHelidon `flavors` are different APIs providing different\
    \ development experiences you can use to develop your application。\n\nFor example,\
    \ imagine that you are playing a computer game. Your goal is to kill the last\
    \ boss and save the planet. When you start playing, you must choose your character,\
    \ and you have several options, like warrior or sorcerer. The gaming mechanics\
    \ of these two are different. Warrior is a melee character with a sword, and a\
    \ sorcerer uses magic and range attacks. Despite that, you can finish the game\
    \ and kill the final boss using any of them。\n\nIn this example, the `game` is\
    \ an application you are developing, and the `characters` you choose to play are\
    \ the different programming approaches you can choose. Helidon offers two characters,\
    \ called `flavors`。\n\n> Helidon has two flavors: Helidon MP and Helidon SE。\n\
    \nTo better understand the differences, let’s look at two snippets of code. Both\
    \ implement a simple RESTful service that returns “Hello World” when a `Get` request\
    \ is sent to the `/hello` endpoint。\n\nListing [1-1](#600147_1_En_1_Chapter.xhtml#PC1)\
    \ shows how it looks in Helidon MP。\n\n```java\n@Path(\"hello\")\n@ApplicationScoped\n\
    public class HelloWorld {\n    @GET\n    public String hello() {\n        return\
    \ \"Hello World\";\n    }\n}\n```\n\nListing 1-1  \nHelidon MP Code-Style Sample\n\
    \nListing [1-2](#600147_1_En_1_Chapter.xhtml#PC2) shows how it can be done in\
    \ Helidon SE。\n\n```java\nRouting routing = Routing.builder()\n    .get(\"/hello\"\
    , (req, res) -> res.send(\"Hello World\"))\n    .build();\nWebServer.create(routing)\n\
    \    .start();\n```\n\nListing 1-2  \nHelidon SE Code-Style Sample\n\nThe differences\
    \ are collected in Table [1-1](#600147_1_En_1_Chapter.xhtml#Tab1)。\n\nTable 1-1\
    \  \nHelidon Flavors Comparison\n\n| Helidon MP | Helidon SE |\n| --- | --- |\n\
    | Declarative style APIs | Functional style APIs |\n| Blocking, synchronous |\
    \ Reactive, non-blocking |\n| Small memory footprint | Tiny memory footprint |\n\
    | Annotations are heavily used | No annotations |\n| Jakarta Contexts and Dependency\
    \ Injection (CDI) | No dependency injection |\n| Full support of MicroProfile\
    \ and partial support of Jakarta EE | No Enterprise Java standards support |\n\
    \nThe flavors are a logical consequence of the Helidon design (see Figure [1-1](#600147_1_En_1_Chapter.xhtml#Fig1))。\n\
    \n![](images/600147_1_En_1_Chapter/600147_1_En_1_Fig1_HTML.jpg)\n\nA Helidon architecture.\
    \ The layers are as follows, from top to bottom. Helidon M P, Helidon S E, and\
    \ Netty。\n\nFigure 1-1  \nHelidon architecture\n\nHelidon SE forms a high-performance\
    \ lower level, and Helidon MP is built on top of it. It explains why both flavors\
    \ pretty much provide the same functionality. A Helidon feature is implemented\
    \ in Helidon SE, and a thin adapter layer is built in Helidon MP. It helps to\
    \ achieve high performance。\n\n## Helidon MP\n\nHelidon MP is a flavor that supports\
    \ modern Enterprise Java standards. It’s designed for ease of use and provides\
    \ a Spring Boot-like development experience with heavy usage of dependency injection,\
    \ annotations, and other magic. As a drawback, you have less control because the\
    \ framework does many things automatically. This drawback should not be considered\
    \ a showstopper. It’s a relatively small limitation, but it’s still worth mentioning\
    \ to make this book fair。\n\nReferring to the game sample, Helidon MP is a sorcerer.\
    \ Magic makes him a powerful opponent. Magical attacks are solid and magical shields\
    \ are effective. It’s easy to play as a sorcerer, even without a complete understanding\
    \ of the nature of magic。\n\n### Modern Enterprise Java Standards\n\n`Jakarta\
    \ EE` is a new name for Java EE since it’s been transferred to its new home at\
    \ the Eclipse Foundation. As of this writing, it contained 40 individual and three\
    \ platform specifications. There are specifications Enterprise Java developers\
    \ use on almost every single project, such as CDI, JAX-RS, and JSON-P/B, as well\
    \ as new specifications, such as Jakarta EE Core Profile and Jakarta Config. Jakarta\
    \ EE is supported by major industry players such as Oracle, IBM, RedHat, Payara,\
    \ and Tomitribe. Jakarta EE always cared about backward compatibility and stability,\
    \ making it a perfect fit for enterprise applications. (See more at [`https://jakarta.ee`](https://jakarta.ee).)\n\
    \n`MicroProfile` is a collection of open source community-driven specifications\
    \ designed to help build cloud-native applications using Enterprise Java. It makes\
    \ it an excellent extension to Jakarta EE. MicroProfile is an Eclipse Foundation\
    \ project using a specification process derived from Eclipse Foundation Specification\
    \ Process (`EFSP`)。Unlike Jakarta EE, MicroProfile has a faster release cadence\
    \ delivering three releases per year: one major and two minor. Fast innovations\
    \ and staying at the edge of modern technologies often mean breaking backward\
    \ compatibility. Although preserving backward compatibility is not a goal, MicroProfile\
    \ tries to minimize the number of backward incompatible changes and follows the\
    \ semantic versioning model to deliver breaking changes only in major releases.\
    \ More information can be found on MicroProfile’s official web page at [`https://microprofile.io`](https://microprofile.io)。\n\
    \nAs shown in Figure [1-2](#600147_1_En_1_Chapter.xhtml#Fig2), Helidon MP supports\
    \ the whole MicroProfile 5.0 platform, which includes ten specifications and eight\
    \ Jakarta EE specifications which include Jakarta CDI and Jakarta RESTful Web\
    \ Services (former JAX-RS). CORS and gRPC are two components not covered by any\
    \ specifications; they are Helidon-specific。\n\n![](images/600147_1_En_1_Chapter/600147_1_En_1_Fig2_HTML.jpg)\n\
    \nA set of 20 blocks in 4 rows of Helidon M P components. It consists of ten specifications,\
    \ eight Jakarta E E specifications, and 2 Helidon specific components. Micro Profile\
    \ config, Micro Profile metrics, Jakarta C D i, Jakarta J S O N binding, and CORS\
    \ are a few of the components。\n\nFigure 1-2  \nHelidon MP components\n\nThere\
    \ are different opinions about what MP in Helidon MP means. Some people think\
    \ that MP comes from MicroProfile. But there is also another opinion that MP means\
    \ Magic Powered。\n\n## Helidon SE\n\nI already said that Helidon is based on the\
    \ reactive web server built on Netty. It forms a reactive, non-blocking flavor\
    \ called `Helidon SE`。Reactive Programming is a big topic that deserves a whole\
    \ book. It is discussed briefly in Chapter [15](#600147_1_En_15_Chapter.xhtml)。\n\
    \nHelidon SE features APIs based on Java SE Flow API. It intensively uses the\
    \ Builder pattern, fluent APIs, and lambdas. Neither annotations nor dependency\
    \ injection is used. We say, “No magic involved.” The produced code is very clean,\
    \ and you have complete control over what the code is doing because the framework\
    \ doesn’t generate any code at a build or run time. It naturally makes Helidon\
    \ SE a perfect fit for GraalVM Native Image. A drawback is that more coding is\
    \ required. Also, reactive programming is not easy to use. Is this drawback big?\
    \ It depends on your programming experience. If you are familiar with reactive\
    \ programming, it’s small. If not, it’s bigger。\n\nThe reactive web server APIs\
    \ are inspired by Express. It makes Helidon SE a good choice for JavaScript developers\
    \ who want to switch to Java。\n\n> Express is a fast, unopinionated, minimalist\
    \ web framework for Node.js. (See more at [`https://expressjs.com`](https://expressjs.com).)\n\
    \nReferring to our game example, Helidon SE is a warrior with fast dual-wield\
    \ short swords and no armor. Light weight allows him to move fast and quickly\
    \ dodge enemy attacks. With the dual-wield weapon, he can hit his enemy twice\
    \ as fast. But to use it effectively, you as a player need to know how to play\
    \ for this character. One wrong move, one slow reaction, and your warrior is dead。"
  raw: '## Helidon Flavors


    Helidon *flavors* are different APIs providing different development experiences
    you can use to develop your application.


    For example, imagine that you are playing a computer game. Your goal is to kill
    the last boss and save the planet. When you start playing, you must choose your
    character, and you have several options, like warrior or sorcerer. The gaming
    mechanics of these two are different. Warrior is a melee character with a sword,
    and a sorcerer uses magic and range attacks. Despite that, you can finish the
    game and kill the final boss using any of them.


    In this example, the *game* is an application you are developing, and the *characters*
    you choose to play are the different programming approaches you can choose. Helidon
    offers two characters, called *flavors*.


    Note


    Helidon has two flavors: Helidon MP and Helidon SE.


    To better understand the differences, let’s look at two snippets of code. Both
    implement a simple RESTful service that returns “Hello World” when a `Get` request
    is sent to the `/hello` endpoint.


    Listing [1-1](#600147_1_En_1_Chapter.xhtml#PC1) shows how it looks in Helidon
    MP.


    ```

    @Path("hello")

    @ApplicationScoped

    public class HelloWorld {

    @GET

    public String hello() {

    return "Hello World";

    }

    }

    Listing 1-1

    Helidon MP Code-Style Sample

    ```


    Listing [1-2](#600147_1_En_1_Chapter.xhtml#PC2) shows how it can be done in Helidon
    SE.


    ```

    Routing routing = Routing.builder()

    .get("/hello", (req, res) -> res.send("Hello World"))

    .build();

    WebServer.create(routing)

    .start();

    Listing 1-2

    Helidon SE Code-Style Sample

    ```


    The differences are collected in Table [1-1](#600147_1_En_1_Chapter.xhtml#Tab1).


    Table 1-1


    Helidon Flavors Comparison


    | Helidon MP | Helidon SE |

    | --- | --- |

    | Declarative style APIs | Functional style APIs |

    | Blocking, synchronous | Reactive, non-blocking |

    | Small memory footprint | Tiny memory footprint |

    | Annotations are heavily used | No annotations |

    | Jakarta Contexts and Dependency Injection (CDI) | No dependency injection |

    | Full support of MicroProfile and partial support of Jakarta EE | No Enterprise
    Java standards support |


    The flavors are a logical consequence of the Helidon design (see Figure [1-1](#600147_1_En_1_Chapter.xhtml#Fig1)).


    ![](images/600147_1_En_1_Chapter/600147_1_En_1_Fig1_HTML.jpg)


    A Helidon architecture. The layers are as follows, from top to bottom. Helidon
    M P, Helidon S E, and Netty.


    Figure 1-1


    Helidon architecture


    Helidon SE forms a high-performance lower level, and Helidon MP is built on top
    of it. It explains why both flavors pretty much provide the same functionality.
    A Helidon feature is implemented in Helidon SE, and a thin adapter layer is built
    in Helidon MP. It helps to achieve high performance.


    ### Helidon MP


    Helidon MP is a flavor that supports modern Enterprise Java standards. It’s designed
    for ease of use and provides a Spring Boot-like development experience with heavy
    usage of dependency injection, annotations, and other magic. As a drawback, you
    have less control because the framework does many things automatically. This drawback
    should not be considered a showstopper. It’s a relatively small limitation, but
    it’s still worth mentioning to make this book fair.


    Referring to the game sample, Helidon MP is a sorcerer. Magic makes him a powerful
    opponent. Magical attacks are solid and magical shields are effective. It’s easy
    to play as a sorcerer, even without a complete understanding of the nature of
    magic.


    Modern Enterprise Java Standards


    **Jakarta EE** is a new name for Java EE since it’s been transferred to its new
    home at the Eclipse Foundation. As of this writing, it contained 40 individual
    and three platform specifications. There are specifications Enterprise Java developers
    use on almost every single project, such as CDI, JAX-RS, and JSON-P/B, as well
    as new specifications, such as Jakarta EE Core Profile and Jakarta Config. Jakarta
    EE is supported by major industry players such as Oracle, IBM, RedHat, Payara,
    and Tomitribe. Jakarta EE always cared about backward compatibility and stability,
    making it a perfect fit for enterprise applications. (See more at [`https://jakarta.ee`](https://jakarta.ee).)


    **MicroProfile** is a collection of open source community-driven specifications
    designed to help build cloud-native applications using Enterprise Java. It makes
    it an excellent extension to Jakarta EE. MicroProfile is an Eclipse Foundation
    project using a specification process derived from Eclipse Foundation Specification
    Process (EFSP). Unlike Jakarta EE, MicroProfile has a faster release cadence delivering
    three releases per year: one major and two minor. Fast innovations and staying
    at the edge of modern technologies often mean breaking backward compatibility.
    Although preserving backward compatibility is not a goal, MicroProfile tries to
    minimize the number of backward incompatible changes and follows the semantic
    versioning model to deliver breaking changes only in major releases. More information
    can be found on MicroProfile’s official web page at [`https://microprofile.io`](https://microprofile.io).


    As shown in Figure [1-2](#600147_1_En_1_Chapter.xhtml#Fig2), Helidon MP supports
    the whole MicroProfile 5.0 platform, which includes ten specifications and eight
    Jakarta EE specifications which include Jakarta CDI and Jakarta RESTful Web Services
    (former JAX-RS). CORS and gRPC are two components not covered by any specifications;
    they are Helidon-specific.


    ![](images/600147_1_En_1_Chapter/600147_1_En_1_Fig2_HTML.jpg)


    A set of 20 blocks in 4 rows of Helidon M P components. It consists of ten specifications,
    eight Jakarta E E specifications, and 2 Helidon specific components. Micro Profile
    config, Micro Profile metrics, Jakarta C D i, Jakarta J S O N binding, and CORS
    are a few of the components.


    Figure 1-2


    Helidon MP components


    There are different opinions about what MP in Helidon MP means. Some people think
    that MP comes from MicroProfile. But there is also another opinion that MP means
    Magic Powered.


    ### Helidon SE


    I already said that Helidon is based on the reactive web server built on Netty.
    It forms a reactive, non-blocking flavor called *Helidon SE*. Reactive Programming
    is a big topic that deserves a whole book. It is discussed briefly in Chapter
    [15](#600147_1_En_15_Chapter.xhtml).


    Helidon SE features APIs based on Java SE Flow API. It intensively uses the Builder
    pattern, fluent APIs, and lambdas. Neither annotations nor dependency injection
    is used. We say, “No magic involved.” The produced code is very clean, and you
    have complete control over what the code is doing because the framework doesn’t
    generate any code at a build or run time. It naturally makes Helidon SE a perfect
    fit for GraalVM Native Image. A drawback is that more coding is required. Also,
    reactive programming is not easy to use. Is this drawback big? It depends on your
    programming experience. If you are familiar with reactive programming, it’s small.
    If not, it’s bigger.


    The reactive web server APIs are inspired by Express. It makes Helidon SE a good
    choice for JavaScript developers who want to switch to Java.


    Note


    Express is a fast, unopinionated, minimalist web framework for Node.js. (See more
    at [`https://expressjs.com`](https://expressjs.com).)


    Referring to our game example, Helidon SE is a warrior with fast dual-wield short
    swords and no armor. Light weight allows him to move fast and quickly dodge enemy
    attacks. With the dual-wield weapon, he can hit his enemy twice as fast. But to
    use it effectively, you as a player need to know how to play for this character.
    One wrong move, one slow reaction, and your warrior is dead.'
  trans: '

    ## Helidon 风格


    Helidon 的 *风格* 是不同的 API，它们提供不同的开发体验，你可以用它们来开发应用程序。


    例如，想象你正在玩一款电脑游戏。你的目标是击败最终 Boss 并拯救星球。开始游戏时，你必须选择角色，而且有多个选项，比如战士或术士。这两者的游戏机制不同。战士是使用剑进行近战的角色，而术士使用魔法和远程攻击。尽管如此，你可以使用其中任意一个通关并击败最终
    Boss。


    在这个例子中，*游戏* 就是你正在开发的应用程序，而你选择游玩的 *角色* 就是你可以选择的不同编程方式。Helidon 提供了两个角色，称为 *风格*。


    注意


    Helidon 有两种风格：Helidon MP 和 Helidon SE。


    为了更好地理解它们之间的差异，我们来看两段代码。两者都实现了一个简单的 RESTful 服务：当向 `/hello` 端点发送 `Get` 请求时，返回 “Hello
    World”。


    清单 1-1 展示了它在 Helidon MP 中的样子。


    ```

    @Path("hello")

    @ApplicationScoped

    public class HelloWorld {

    @GET

    public String hello() {

    return "Hello World";

    }

    }

    Listing 1-1

    Helidon MP Code-Style Sample

    ```


    清单 1-2 展示了在 Helidon SE 中如何实现。


    ```

    Routing routing = Routing.builder()

    .get("/hello", (req, res) -> res.send("Hello World"))

    .build();

    WebServer.create(routing)

    .start();

    Listing 1-2

    Helidon SE Code-Style Sample

    ```


    差异汇总在表 1-1 中。


    表 1-1


    Helidon 风格对比


    | Helidon MP | Helidon SE |

    | --- | --- |

    | 声明式风格 API | 函数式风格 API |

    | 阻塞式、同步 | 响应式、非阻塞 |

    | 较小的内存占用 | 极小的内存占用 |

    | 大量使用注解 | 不使用注解 |

    | Jakarta Contexts and Dependency Injection (CDI) | 无依赖注入 |

    | 完整支持 MicroProfile，部分支持 Jakarta EE | 不支持 Enterprise Java 标准 |


    这些风格是 Helidon 设计的逻辑结果（见图 1-1）。


    ![](img/600147_1_En_1_Fig1_HTML.jpg)


    一个 Helidon 架构。各层从上到下依次为：Helidon MP、Helidon SE 和 Netty。


    图 1-1


    Helidon 架构


    Helidon SE 构成了高性能的底层，Helidon MP 构建在其之上。这解释了为什么两种风格在功能上基本相同。某个 Helidon 特性会先在 Helidon
    SE 中实现，然后在 Helidon MP 中构建一层轻量适配层。这有助于实现高性能。


    ### Helidon MP


    Helidon MP 是一种支持现代 Enterprise Java 标准的风格。它为易用性而设计，提供类似 Spring Boot 的开发体验，重度使用依赖注入、注解和其他“魔法”。其缺点是你的控制力会少一些，因为框架会自动完成很多事情。这个缺点不应被视为致命问题。它是一个相对较小的限制，但仍值得提及，以保证本书的客观性。


    对应游戏示例，Helidon MP 就像术士。魔法使他成为强大的对手。魔法攻击威力十足，魔法护盾也很有效。即使你并不完全理解魔法本质，也很容易上手术士这个角色。


    现代 Enterprise Java 标准


    **Jakarta EE** 是 Java EE 的新名称，因为它已迁移到 Eclipse Foundation 的新家。截至本文写作时，它包含 40 个独立规范和
    3 个平台规范。Enterprise Java 开发者几乎在每个项目中都会使用一些规范，例如 CDI、JAX-RS 和 JSON-P/B；也有一些新规范，如
    Jakarta EE Core Profile 和 Jakarta Config。Jakarta EE 得到 Oracle、IBM、RedHat、Payara
    和 Tomitribe 等主要行业参与者的支持。Jakarta EE 一直重视向后兼容性和稳定性，这使其非常适合企业级应用。（更多信息见 [`https://jakarta.ee`](https://jakarta.ee)。）


    **MicroProfile** 是一组由开源社区驱动的规范集合，旨在帮助使用 Enterprise Java 构建云原生应用。这使它成为 Jakarta
    EE 的绝佳补充。MicroProfile 是 Eclipse Foundation 项目，采用源自 Eclipse Foundation Specification
    Process (EFSP) 的规范流程。与 Jakarta EE 不同，MicroProfile 发布节奏更快，每年发布三次：一次主版本、两次次版本。快速创新并保持在现代技术前沿，往往意味着会打破向后兼容。尽管保持向后兼容不是其目标，MicroProfile
    仍尽量减少不兼容变更的数量，并遵循语义化版本模型，仅在主版本中引入破坏性变更。更多信息可见 MicroProfile 官方网站 [`https://microprofile.io`](https://microprofile.io)。


    如图 1-2 所示，Helidon MP 支持完整的 MicroProfile 5.0 平台，其中包括 10 个规范，以及 8 个 Jakarta EE 规范（包括
    Jakarta CDI 和 Jakarta RESTful Web Services，即原 JAX-RS）。CORS 和 gRPC 是两个未被任何规范覆盖的组件；它们是
    Helidon 特有的。


    ![](img/600147_1_En_1_Fig2_HTML.jpg)


    由 4 行共 20 个区块组成的 Helidon MP 组件集合。它包括 10 个规范、8 个 Jakarta EE 规范和 2 个 Helidon 特有组件。MicroProfile
    Config、MicroProfile Metrics、Jakarta CDI、Jakarta JSON Binding 和 CORS 是其中的一些组件。


    图 1-2


    Helidon MP 组件


    关于 Helidon MP 中 MP 的含义有不同看法。有些人认为 MP 来自 MicroProfile。但也有另一种观点认为 MP 代表 Magic Powered（魔法驱动）。


    ### Helidon SE


    我前面已经说过，Helidon 基于构建在 Netty 之上的响应式 Web 服务器。它形成了一种响应式、非阻塞的风格，称为 *Helidon SE*。响应式编程是一个很大的主题，值得单独写一本书。在第
    15 章会做简要讨论。


    Helidon SE 的 API 基于 Java SE Flow API。它大量使用 Builder 模式、流式 API 和 lambda。既不使用注解，也不使用依赖注入。我们称之为“没有魔法参与”。生成的代码非常干净，而且你可以完全控制代码行为，因为框架不会在构建期或运行期生成任何代码。这也使
    Helidon SE 天然非常适合 GraalVM Native Image。缺点是需要编写更多代码。此外，响应式编程并不容易使用。这个缺点大吗？取决于你的编程经验。如果你熟悉响应式编程，它影响较小；如果不熟悉，影响就更大。


    响应式 Web 服务器 API 的灵感来自 Express。这使 Helidon SE 成为希望转向 Java 的 JavaScript 开发者的不错选择。


    注意


    Express 是一个用于 Node.js 的快速、无强约束、极简主义 Web 框架。（更多信息见 [`https://expressjs.com`](https://expressjs.com)。）


    回到我们的游戏示例，Helidon SE 像一位手持双短剑、没有护甲的战士。轻量让他移动迅速，并能快速闪避敌人攻击。凭借双持武器，他的攻击速度可以达到两倍。但要高效使用它，作为玩家的你需要知道如何操作这个角色。一步走错、反应稍慢，你的战士就会阵亡。

