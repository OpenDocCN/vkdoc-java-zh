    # 13. 响应式编程之路


    本章涵盖以下主题。


    *   在异步 API 中使用 Reactive Streams，而不是简单回调


    *   理解 Reactive Streams 的内部结构


    *   将多个流连接在一起


    *   使用 Helidon 的响应式流操作符，进行数据生产与消费


    过去几年里，在对更高性能永无止境的追求中，涌现出了不少新兴技术趋势。API 也开始从一种 *这是我的线程——在就绪之前一直阻塞它* 的阻塞式模式，转向不那么直观的异步
    promise、future 或 callback，提供了这样一种机制：*我的线程时间很宝贵——当准备就绪时，请在你自己的线程上通过这个回调通知我*。


    这带来了巨大的性能优势，因为在阻塞与让出执行期间进行线程上下文切换代价高昂。但与此同时，在各种回调和 future 中理清逻辑也更困难，更不用说阻塞式 API
    天然背压能力的丢失了。因此，制定统一标准的需求显而易见。


    ## Reactive Streams


    Reactive Streams 是一种带内建流量控制（即 *背压*）的异步通信标准。我们可以把它描述为两条并行的管道，在非常严格的条件下传递消息。把管道的发送端称为
    *上游*（*upstream*），接收端称为 *下游*（*downstream*）。其中一条管道由下游用于请求精确数量的数据或取消订阅，另一条管道由上游用于发送实际数据。


    ![](img/600147_1_En_13_Fig1_HTML.png)


    一个流程图展示了发送与接收模块（分别是上游和下游）之间 `r e q 3`、`cancel` 与 `on next` 数据的传输。


    图 13-1


    简化的响应式流


    上游（发布端）通常实现 `Publisher`，而下游（消费端）实现 `Subscriber`。每个发布者都有一个方法 `void subscribe(Subscriber<?
    super T> subscriber)`，用于注册订阅者（即其下游）。发布者通过 `onSubscribe` 向订阅者发出信号，并把 subscription
    交给订阅者，以便其请求更多数据或取消流。发布者发送的数据量永远不能超过被请求的数量；这样一来，由下游调节数据量、避免被淹没，这一机制就称为 *背压*（*backpressure*）。


    ![](img/600147_1_En_13_Fig2_HTML.png)


    一个框图包含上下游两个模块，分别带有 15 行和 13 行代码，涉及 class、void、for、this 等内容。上游模块发送数据和订阅关系，下游模块通过订阅关系请求更多数据。


    图 13-2


    Reactive Streams API


    如今，Java 中有两个包提供 Reactive Streams API：较早但仍广泛使用的独立库 `org.reactivestreams`，以及在 JDK
    9 中新增的 `java.util.concurrent.Flow`。尽管两者在语义上完全一致，但包名不同。在所有响应式库都迁移到 JDK 的 Flow 版本之前，可以通过
    `org.reactivestreams.FlowAdapters` 在两者之间进行简单转换。


    API 本身除了连接响应式流之外并不算特别实用。围绕这些 API 构建的工具链会让它更实用——这些工具由专门的响应式库提供特定的 publisher、subscriber
    和 operator。操作符是你可以定义的中间操作，用于增强在管道中流经的数据流。


    注意


    实现 Reactive Streams 接口可能很棘手。虽然接口看起来简单，但其必须遵守的规则相当复杂，需要扎实的 Java 并发编程高级知识。


    ## 响应式操作符


    响应式流可以处理无限量数据。当你希望在不阻塞的前提下处理流中可能极其庞大的数据项时，就需要创建某种中间操作，并将其应用到流中的每一个数据项上。Helidon
    提供了自己的一套操作符实现，你可以用类似构建器（builder）的 API 将它们链式组合；这是 Helidon 响应式引擎的一部分，其 API 构建在新的
    `java.util.concurrent.Flow` 接口之上。


    *   ① 定义一个包含四个字符串值的有限响应式流


    *   ② 限制操作符：当传递了三个元素后取消


    *   ③ 映射操作符：将每个字符串元素解析为整数


    *   ④ 终止操作符：流的订阅者


    ```

    Multi.just("1", "2", "3", "4")                                 ①

    .limit(3)                                              ②

    .map(Integer::parseInt)                                ③

    .forEach(i -> System.out.println("Received: " + i));   ④

    Listing 13-1

    Reactive Operators in Helidon

    ```


    Helidon 操作符被用于所有 Helidon SE API。尽管 Helidon MP 主要采用命令式编码方式，但 MicroProfile Reactive
    Streams Operators 规范定义了响应式流抽象。这是一种对具体操作符实现的巧妙抽象，因此你可以在不改动业务代码的情况下切换实现。


    ```

    ReactiveStreams.of("1", "2", "3", "4")

    .limit(3)

    .map(Integer::parseInt)

    .forEach(i -> System.out.println("Received: " + i))

    .run();

    Listing 13-2

    MicroProfile Reactive Streams Operators

    ```


    MicroProfile Reactive Streams 主要与另一个 MicroProfile Reactive Messaging 规范配合使用，后文会讨论。我们先来看操作符。要描述某个操作符“做了什么”可能会比较复杂，因此有一种专门用于此类说明的图示。


    ### 弹珠图（Marble Diagrams）


    在弹珠图中，箭头上的小弹珠表示流中的数据项。


    ![](img/600147_1_En_13_Fig3_HTML.png)


    图中有 4 个渐变色圆点，编号 1 到 4，并在箭头上有一条短竖线。


    图 13-3


    弹珠图：流


    弹珠表示订阅者的 `onNext` 调用；错误用 `X` 标记表示；流完成用 `|` 表示。


    ![](img/600147_1_En_13_Fig4_HTML.png)


    图中有一个渐变色圆点、一条短竖线和一个叉号，分别标注为 on next、on complete 和 on error。


    图 13-4


    弹珠图图例


    在图 13-4 中，操作符上方的流是上游，即数据源；操作符下方的流是下游，即操作结果。


    ![](img/600147_1_En_13_Fig5_HTML.png)


    图中上下两条箭头各有一组 4 个渐变色圆点，分别编号 1 到 4 与 11 到 14，每条箭头上各有一条短竖线，中间是 `multi dot map` 函数块。箭头分别标注为
    upstream 和 downstream。


    图 13-5


    弹珠图：map


    在 map 操作符的弹珠图中，你可以立刻看出每个经过操作符的数据项会发生什么变化。可以看到，数据项数量不受影响，只有值发生变化。此外，完成信号 `|` 也不受操作符影响，会原样向下游传递。

