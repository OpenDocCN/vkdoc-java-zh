    The `iterate` operator first emits provided seed item and executes a provided
    function to generate an item for each subsequent emit with the previously emitted
    item as a parameter.


    *   ① Result list contains [10, 12, 14]


    ```

    ReactiveStreams.iterate(10, i -> i + 2)

