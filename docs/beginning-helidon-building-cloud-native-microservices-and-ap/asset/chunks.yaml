    canceled, and all participants are going to be notified through the compensation
    links provided when they join. The LRA coordinator will call the method annotated
    with `@Compensate` with the LRA ID as a parameter. That is all that is needed
    in our booking service to clear the seat reservation and make it available for
    another customer.


