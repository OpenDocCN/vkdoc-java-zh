  trans: '

    ## CORS


    出于安全原因，浏览器只允许从与页面加载来源相同的源加载资源。以前，浏览器允许从任何位置加载资源，这也是大量数据被窃取的原因之一。


    不过，有时你需要允许来自源之外特定位置的请求。CORS 正是为此而生。


    *跨源资源共享*（CORS）协议允许服务器识别除自身源之外的来源，并决定浏览器是否应允许从这些来源加载资源。它基于 HTTP 头工作。


    Helidon 可以使用 Helidon CORS API 以编程方式定义你服务的 CORS 行为。你也可以通过外部配置来完成。三个内置端点——health、metrics（见第
    4 章）和 OpenAPI（见第 9 章）——都已集成 CORS。多个注解和配置选项可让你轻松控制资源如何跨源暴露。有关其全部功能的更多信息，请参阅[Helidon
    官方文档](https://helidon.io/docs/v3/%2523/mp/cors/cors)。


    将清单 5-29 中的依赖添加到 Helidon MP 项目的`pom.xml`文件中以启用 CORS。


    ```

    io.helidon.microprofile

    helidon-microprofile-cors


    Listing 5-29

    CORS Dependency

    ```


    在这个示例中，让我们以巫师服务为例。


    位于*sorceryministry.com*的“魔法部”托管了一个管理巫师的应用。一个巫师服务——所有巫师的存储库——运行在*helidonserver.com/wizard*。


    ![](img/600147_1_En_5_Fig2_HTML.png)


    浏览器与 helidonserver.com 之间的流程图。Sorcery Ministry、C O R S、Helidon server dot com
    的 C O R S，以及 Helidon 应用。


    图 5-2


    巫师服务与魔法部应用的调用层级


    1.  浏览器从*sorceryministry.com*加载魔法部应用，这就是 CORS 的源。


    2.  该应用请求`GET`[*http://helidonserver.com/wizard*](http://helidonserver.com/wizard)。*helidonserver.com*是主机。浏览器的
    CORS 实现会在请求中添加 Host 和 Origin 头。


    3.  Helidon CORS 会检查 Helidon 应用是否允许*sorceryministry.com*通过`GET`共享*/wizard*。如果允许，则放行请求到达目标；否则，以“403
    – Forbidden”状态拒绝请求。


    4.  Helidon CORS 会使用*Access-Control-Allow-Origin**: **更新响应（取决于你如何为 Helidon 应用配置
    CORS）。


    现在，让我们把 CORS 添加到巫师应用。目标是允许返回巫师列表的资源可被不受限制地共享，并限制获取某个巫师的资源共享，使得只有源[*http://sorceryministry.com*](http://sorceryministry.com)可以获取该信息。


    *   ① 声明 CORS 属性。


    ```

    @GET

    @Produces(MediaType.APPLICATION_JSON)

    @CrossOrigin(allowMethods = {"GET"},

    allowOrigins = {"http://sorceryministry.com"})   ①

    public JsonObject getWizard() { }

    Listing 5-30

    CORS Annotations Usage

    ```


    使用`@CrossOrigin`注解，并指定`allowMethods`和`allowOrigins`参数。


    你也可以使用外部配置实现相同效果。将清单 5-31 添加到`microprofile-config.properties`文件中。


    ```

    cors.paths.0.path-pattern=/wizard

    cors.paths.0.allow-methods=GET

    cors.paths.0.allow-origins=http://sorceryministry.com

    Listing 5-31

    CORS Configuration

    ```


    该配置为`/wizard`资源启用了所需的 CORS 设置。


    Helidon 还让我们可以轻松地在 Helidon 应用中包含 health、metrics（见第 4 章）和 OpenAPI（见第 9 章）服务。这些服务会为应用添加端点，以便客户端检索各类遥测与文档信息。与您创建的应用端点一样，这些端点也是可跨源共享的资源。


    默认情况下，这三个服务中的集成 CORS 支持允许任何源通过 GET、HEAD 和 OPTIONS HTTP 请求共享其资源。你可以通过配置覆盖这些端点的默认
    CORS 行为。它们与已创建的服务相互独立。例如，将内置组件提供的`/health`端点和`/metrics`端点限制为仅允许源[*http://sorceryministry.com*](http://sorceryministry.com)。


    *   ① 允许`/health`仅可被唯一来源[`http://sorceryministry.com`](http://sorceryministry.com)访问


    *   ② 允许`/metrics`仅可被唯一来源[`http://sorceryministry.com`](http://sorceryministry.com)访问


    ```

    ...

    health:

    cors:

    allow-origins: [http://sorceryministry.com]  ①

    metrics:

    cors:

    allow-origins: [http://sorceryministry.com]   ②

    ...

    Listing 5-32

    Health and Metrics Configuration

    ```


    现在，如果你尝试访问`/health`端点，它会拒绝来自未获批准来源的请求，如清单 5-33 所示。


    ```

    curl -i -H "Origin: http://sorceryministry.com" http://helidonserver.com/health

    HTTP/1.1 403 Forbidden

    Date: Mon, 11 Jan 2023 12:06:55 +3:00

    transfer-encoding: chunked

    connection: keep-alive

    Listing 5-33

    Sample Output

    ```


    并且仅对来自[*http://sorceryministry.com*](http://sorceryministry.com)的跨源请求成功响应。


    ```

    curl -i -H "Origin: http://sorceryministry.com" http://helidonserver.com/health

    HTTP/1.1 200 OK

    Access-Control-Allow-Origin: http://sorceryministry.com

    Content-Type: application/json

    Date: Mon, 11 Jan 2023 12:09:05 +3:00

    Vary: Origin

    connection: keep-alive

    content-length: 461

    {"outcome":"UP",...}

    Listing 5-34

    Sample Output

    ```


    ## 总结


    *   服务会调用其他服务。有些服务提供数据，而另一些服务消费数据。


    *   Helidon 提供了多种通过 REST 与其他微服务通信的方式。


    *   MicroProfile Rest Client 和 JAX-RS Client API 提供了不同的编程模型。MicroProfile Rest
    Client 是声明式的，而 JAX-RS Client API 基于构建器模式。


    *   在 MicroProfile Rest Client 和 JAX-RS Client API 中，可以进行高级请求头操作、过滤以及异步操作。


    *   为确保跨源工作正确，请考虑为你的微服务设置 CORS。在 Helidon MP 中通过少量注解或外部配置即可轻松完成。


    *   你可以通过外部配置控制诸如`/health, /metrics,`和`/openapi`等内置端点的可访问性。

    '
- fmt: '# 6. Accessing Data


    This chapter covers the following topics:


    - Microservices interacting with databases are nicely supported in Helidon in
    various ways

    - Working with SQL and NoSQL using JDBC, JTA, and JPA in Helidon

    - Accessing data using Micronaut Data in Helidon


    We have heard at many conferences and read in many articles that the best microservices
    are stateless, and we should keep them stateless. Nevertheless, real-world practices
    have shown that most microservices must keep state and thus must talk to databases.
    That’s why Helidon provides a convenient way to work with databases. Helidon offers
    multiple ways to work with a database, from low-level data access using JDBC to
    the complex Jakarta Persistence API and its implementations: Hibernate and EclipseLink.
    If you have ever worked with Enterprise Java, it takes no effort to learn it.
    Just work with it as you used to before. Just bear in mind that Helidon is not
    a full Jakarta EE container.


    From low-level to complex, these are the main options for working with a database
    in Helidon:


    - At the lowest level of database interaction is JDBC, where physical connections
    are handled.

    - `DataSource` provides an abstraction layer over JDBC, facilitating connection
    management and pooling.

    - The `Jakarta Persistence API` is an object-relational mapping specification
    implemented with Hibernate and EclipseLink.


    This chapter walks through all of them, explaining their pros and cons.


    ## Low-Level Data Access with JDBC


    Relational database management systems (RDBMS) and NoSQL databases are external
    software programs accessed through a database *driver* via some form of connection,
    usually TCP connections. Typically, the *database engine* functions as a *server*,
    with our code serving as the client. It is also acceptable to refer to it as a
    *database server*.


    Java Database Connectivity (JDBC) is an API for the Java programming language
    that specifies how a client can access a database. It has been used since 1997,
    making it one of the oldest Java technologies.


    The API is employed to load the appropriate drivers dynamically and register them
    in the JDBC `DriverManager`. The `DriverManager` functions as a connection factory
    for creating JDBC connections.


    JDBC connections are used to create and execute *statements*, of which there are
    several kinds:


    - `Statement` is a regular statement to read or alter data sent to a database.

    - `PreparedStatement` is a cached statement; subsequently, the execution path
    is predetermined on the database server, enabling it to be executed repeatedly
    in a highly efficient manner.

    - `CallableStatement` is for executing stored procedures on the database.


    *Query* statements (e.g., `SELECT`) return a JDBC row result set. They represent
    the tabular data. The row result set has metadata describing the columns'' names
    and their types.


    *Update* statements (e.g., `INSERT`, `UPDATE`, and `DELETE`) alter data in the
    database and return the count of updates to indicate the number of affected rows.


    Helidon MP does not include any database drivers; hence it is up to us to select
    the appropriate driver for our database and vendor and manually add its dependency
    to the `pom.xml` file of our application.


    Let’s dive into some code. To keep it simple, let’s use H2—a small, in-memory
    database primarily used for unit testing. Listing [6-1](#600147_1_En_6_Chapter.xhtml#PC1)
    is its dependency.


    - ① The `scope` is `runtime` because JDBC drivers are runtime components not needed
    at compile time.


    ```text

    com.h2database

    h2

    runtime             ①


    Listing 6-1

    H2 Driver Dependency

    ```


    Now that you have the database driver, let’s use it in the code.


    - ① Sets a database connection URL

    - ② Creates a connection using `DriverManager`

    - ③ Creates a statement

    - ④ Executes a `SELECT` query, gets the `ResultSet`, and processes it

    - ⑤ Closes the connection

    - ⑥ Handles exceptions


    ```java

    try {

    String url = "jdbc:h2:mem:sample";               ①

    Connection connetion = DriverManager.getConnection(url,"sa","");                ②

    Statement stmt = conn.createStatement();         ③

    ResultSet rs = stmt.executeQuery("SELECT * FROM Wizards);      ④

    while ( rs.next() ) {

    String name = rs.getString("Name");

    System.out.println(name);

    }

    connections.close();                             ⑤

    } catch (Exception e) {

    e.printStacktrace();                             ⑥

    }

    Listing 6-2

    JDBC Example

    ```


    This is a very straightforward and low-level way of accessing the data from a
    database. It is very inefficient. Creating a connection is a resource-heavy operation,
    and manually parsing data is not the best choice.


    That is why the `DataSource` interface was created for managing connections.'
