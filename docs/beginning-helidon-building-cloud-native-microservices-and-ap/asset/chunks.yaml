- fmt: '## About This Book


    The cloud era we are living in dictates some requirements for applications. This
    book is about Helidon—a Java framework designed for developing cloud-native applications.
    Helidon collects all functionality you need to create cloud-native applications
    which start fast, has low disk image footprint, and low memory consumption. Helidon
    supports modern standards such as MicroProfile and partially Jakarta EE, which
    adds a portability aspect to your application, allowing it to be run on supported
    runtimes of different vendors.


    After reading this book, you will know how to build Java cloud-native applications
    using Helidon, understand different options for packaging applications to a docker
    container, and deploy them to Kubernetes. You also learn how to use MicroProfile
    APIs and Helidon Reactive APIs.


    The book contains many useful recipes, best practices, and methodologies around
    each covered topic. It comes with samples demonstrating the different functionality
    of Helidon and can be used as a hands-on reference. The information is given in
    increasing complexity order starting from creating a simple RESTful service and
    ending up in complicated scenarios with OpenID Connect and distributed transactions.


    ### Prerequisites


    You need to know Java language syntax, semantics, and the basics of Java functional
    programming, including lambda functions.


    Some book chapters require some basic understanding of the dependency injection
    design pattern and Jakarta EE CDI specification.


    Some book chapters require understanding reactive programming concepts, including
    backpressure, observers, and schedulers.


    To run samples, you must have JDK 17 and Maven 3.8.4 installed. Samples should
    run fine with the newer versions of Maven, but we used this version to build them
    and can guarantee that everything works. The preferred environment is Linux or
    macOS with a bash shell. We recommend using Windows Subsystem for Linux (`WSL`)
    if you use Windows.


    About the Authors About the Technical Reviewers


    # 1. Introduction


    This chapter covers the following topics:


    - Understanding cloud-native application

    - Introducing Helidon

    - Explaining Helidon flavors

    - Discovering which flavor is suitable for your application


    We live in a cloud computing era, and it dictates its application design requirements.
    This book is about building cloud-native applications.


    ### Note


    Applications designed to operate in a cloud environment utilizing all cloud benefits
    are called `cloud native`.


    The main benefit of the cloud is the ability to scale applications quickly—something
    we didn’t have when we hosted applications in data centers. For example, in the
    cloud, you can scale up your application during working hours when it’s intensively
    used and then scale it down for the rest of the time. Another example is testing.
    You can deploy an extensive testing infrastructure quickly and dispose of it quickly
    when your testing is finished. In both instances, you are not paying extra for
    resources you don’t need. This makes the cloud environment very cost-efficient
    when a good application design is used.


    So, what makes good cloud-native application design? Well, it depends on what
    you want to achieve. The most common scenario is using microservices deployed
    on Kubernetes. Microservices architecture allows you to scale some parts of your
    application independently. Kubernetes is a de facto standard container management
    system. It can be deployed on-premises or in the cloud. All big clouds provide
    managed Kubernetes services. This book does not discuss Kubernetes setup and microservices
    architecture. Instead, it concentrates on the design of individual services.


    And what’s the right design for your service? Cloud-native applications have some
    specific requirements:


    - Your application should be containerized. It’s a requirement to make it run
    in a Kubernetes environment.

    - Your application should be observable. It should provide some telemetry data
    to help identify and quickly fix problems. For example, you want to only redirect
    user requests to a node that has been fully initialized, or you may want to restart
    a node running out of memory. Or you may want to know which operations take more
    time to execute for optimization. Observability is not a requirement, but it makes
    your life much easier.

    - Your application should start fast. The sooner you start your node, the sooner
    it will serve requests. Time is money.

    - Your application should consume the least amount of memory possible. In a typical
    cloud environment, you pay for RAM. The less RAM used, the less you pay.

    - Your application disk image footprint should be as small as possible. You pay
    for disk space. The less disk space used, the less you pay. You are also paying
    for traffic. The smaller your application, the less traffic is used.


    Java EE was an excellent choice for building on-premises, back-end applications
    for years. While it can be used to build cloud-native applications, it could be
    better.


    It’s like using an LTE phone in a 5G network. Will it work? Yes. Will it work
    fast? Indeed. Will it use all the benefits of 5G? No. Will it work as fast as
    devices with native 5G support? Certainly not.


    There was a need for a new Java framework for building cloud-native applications
    to compete with Spring Boot. This is why Oracle started working on the Helidon
    framework.'
  raw: '## About This Book


    The cloud era we are living in dictates some requirements for applications. This
    book is about Helidon—a Java framework designed for developing cloud-native applications.
    Helidon collects all functionality you need to create cloud-native applications
    which start fast, has low disk image footprint, and low memory consumption. Helidon
    supports modern standards such as MicroProfile and partially Jakarta EE, which
    adds a portability aspect to your application, allowing it to be run on supported
    runtimes of different vendors.


    After reading this book, you will know how to build Java cloud-native applications
    using Helidon, understand different options for packaging applications to a docker
    container, and deploy them to Kubernetes. You also learn how to use MicroProfile
    APIs and Helidon Reactive APIs.


    The book contains many useful recipes, best practices, and methodologies around
    each covered topic. It comes with samples demonstrating the different functionality
    of Helidon and can be used as a hands-on reference. The information is given in
    increasing complexity order starting from creating a simple RESTful service and
    ending up in complicated scenarios with OpenID Connect and distributed transactions.


    ### Prerequisites


    You need to know Java language syntax, semantics, and the basics of Java functional
    programming, including lambda functions.


    Some book chapters require some basic understanding of the dependency injection
    design pattern and Jakarta EE CDI specification.


    Some book chapters require understanding reactive programming concepts, including
    backpressure, observers, and schedulers.


    To run samples, you must have JDK 17 and Maven 3.8.4 installed. Samples should
    run fine with the newer versions of Maven, but we used this version to build them
    and can guarantee that everything works. The preferred environment is Linux or
    macOS with a bash shell. We recommend using Windows Subsystem for LInux (WSL)
    if you use Windows.


    About the Authors About the Technical Reviewers


    # 1. Introduction


    This chapter covers the following topics.


    *   Understanding cloud-native application


    *   Introducing Helidon


    *   Explaining Helidon flavors


    *   Discovering which flavor is suitable for your application


    We live in a cloud computing era, and it dictates its application design requirements.
    This book is about building cloud-native applications.


    Note


    Applications designed to operate in a cloud environment utilizing all cloud benefits
    are called *cloud native*.


    The main benefit of the cloud is the ability to scale applications quickly—something
    we didn’t have when we hosted applications in data centers. For example, in the
    cloud, you can scale up your application during working hours when it’s intensively
    used and then scale it down for the rest of the time. Another example is testing.
    You can deploy an extensive testing infrastructure quickly and dispose of it quickly
    when your testing is finished. In both instances, you are not paying extra for
    resources you don’t need. This makes the cloud environment very cost-efficient
    when a good application design is used.


    So, what makes good cloud-native application design? Well, it depends on what
    you want to achieve. The most common scenario is using microservices deployed
    on Kubernetes. Microservices architecture allows you to scale some parts of your
    application independently. Kubernetes is a de facto standard container management
    system. It can be deployed on-premises or in the cloud. All big clouds provide
    managed Kubernetes services. This book does not discuss Kubernetes setup and microservices
    architecture. Instead, it concentrates on the design of individual services.


    And what’s the right design for your service? Cloud-native applications have some
    specific requirements.


    *   Your application should be containerized. It’s a requirement to make it run
    in a Kubernetes environment.


    *   Your application should be observable. It should provide some telemetry data
    to help identify and quickly fix problems. For example, you want to only redirect
    user requests to a node that has been fully initialized, or you may want to restart
    a node running out of memory. Or you may want to know which operations take more
    time to execute for optimization. Observability is not a requirement, but it makes
    your life much easier.


    *   Your application should start fast. The sooner you start your node, the sooner
    it will serve requests. Time is money.


    *   Your application should consume the least amount of memory possible. In a
    typical cloud environment, you pay for RAM. The less RAM used, the less you pay.


    *   Your application disk image footprint should be as small as possible. You
    pay for disk space. The less disk space used, the less you pay. You are also paying
    for traffic. The smaller your application, the less traffic is used.


    Java EE was an excellent choice for building on-premises, back-end applications
    for years. While it can be used to build cloud-native applications, it could be
    better.


    It’s like using an LTE phone in a 5G network. Will it work? Yes. Will it work
    fast? Indeed. Will it use all the benefits of 5G? No. Will it work as fast as
    devices with native 5G support? Certainly not.


    There was a need for a new Java framework for building cloud-native applications
    to compete with Spring Boot. This is why Oracle started working on the Helidon
    framework.'
  trans: '

    ## 关于本书


    我们所处的云时代对应用程序提出了一些要求。本书介绍的是 Helidon——一个专为开发云原生应用而设计的 Java 框架。Helidon 汇集了创建云原生应用所需的全部功能，应用启动快、磁盘镜像占用小、内存消耗低。Helidon
    支持 MicroProfile 等现代标准，并部分支持 Jakarta EE，这为你的应用增加了可移植性，使其能够运行在不同厂商支持的运行时环境上。


    读完本书后，你将了解如何使用 Helidon 构建 Java 云原生应用，理解将应用打包进 Docker 容器的不同方案，并将其部署到 Kubernetes。你还将学习如何使用
    MicroProfile API 和 Helidon Reactive API。


    本书围绕各个主题提供了许多实用的配方、最佳实践和方法论。书中附带示例来演示 Helidon 的不同功能，可作为动手实践参考。内容按照复杂度递增的顺序展开，从创建一个简单的
    RESTful 服务开始，最终到 OpenID Connect 和分布式事务等复杂场景。


    ### 前置条件


    你需要了解 Java 语言的语法、语义，以及 Java 函数式编程基础，包括 lambda 函数。


    本书的部分章节需要你对依赖注入设计模式和 Jakarta EE CDI 规范有一些基础理解。


    本书的部分章节需要你理解响应式编程概念，包括背压（backpressure）、观察者（observers）和调度器（schedulers）。


    要运行示例，你必须安装 JDK 17 和 Maven 3.8.4。示例在更新版本的 Maven 上通常也能正常运行，但我们使用该版本构建，并可保证一切可用。推荐环境是带有
    bash shell 的 Linux 或 macOS。如果你使用 Windows，我们建议使用 Windows Subsystem for Linux（WSL）。


    关于作者 关于技术审校者


    # 1. 简介


    本章涵盖以下主题。


    *   理解云原生应用


    *   介绍 Helidon


    *   解释 Helidon 的不同版本（flavors）


    *   了解哪种版本适合你的应用


    我们生活在云计算时代，这决定了应用设计需求。本书聚焦于构建云原生应用。


    注意


    为在云环境中运行并充分利用云优势而设计的应用，被称为*云原生*。


    云的主要优势是能够快速扩展应用——这是我们过去在数据中心托管应用时不具备的能力。比如，在云环境中，你可以在工作时段应用负载高时进行扩容，然后在其余时间缩容。另一个例子是测试：你可以快速部署大规模测试基础设施，并在测试完成后迅速释放。在这两种情况下，你都不需要为不需要的资源额外付费。如果应用设计得当，云环境的成本效率会非常高。


    那么，什么才是好的云原生应用设计？这取决于你想实现什么。最常见的场景是使用部署在 Kubernetes 上的微服务。微服务架构允许你独立扩展应用的某些部分。Kubernetes
    是事实上的容器管理标准系统。它可以部署在本地或云端。所有大型云厂商都提供托管 Kubernetes 服务。本书不讨论 Kubernetes 搭建和微服务架构，而是专注于单个服务的设计。


    那你的服务应该如何正确设计？云原生应用有一些特定要求。


    *   你的应用应该容器化。这是在 Kubernetes 环境中运行的前提要求。


    *   你的应用应该具备可观测性。它应提供一些遥测数据，以帮助识别并快速修复问题。例如，你可能只希望将用户请求转发到已完全初始化的节点；或者你可能希望重启一个内存耗尽的节点。你也可能想知道哪些操作执行耗时更长，以便优化。可观测性并非硬性要求，但会让你的工作轻松很多。


    *   你的应用应该启动迅速。节点启动越快，就越早能处理请求。时间就是金钱。


    *   你的应用应尽可能少地消耗内存。在典型云环境中，RAM 是按量付费的。用得越少，付得越少。


    *   你的应用磁盘镜像体积应尽可能小。磁盘空间是要付费的。占用越少，成本越低。网络流量同样需要付费。应用越小，流量消耗越少。


    多年来，Java EE 一直是构建本地部署后端应用的优秀选择。虽然它也可以用于构建云原生应用，但并非最佳。


    这就像在 5G 网络中使用 LTE 手机。能用吗？能。会快吗？确实会。能用上 5G 的全部优势吗？不能。会和原生支持 5G 的设备一样快吗？当然不会。


    因此，需要一个新的 Java 框架来构建云原生应用，以与 Spring Boot 竞争。这就是 Oracle 开始研发 Helidon 框架的原因。

    '
- fmt: '## Introducing Helidon


    A product name should reflect its purpose and trigger proper brain associations.
    “Bulldog” or “Elephant” would not be good names. We wanted a name that could convey
    something small, lightweight, and fast, like a bird. “Swallow” would be a perfect
    fit. Wikipedia says it has “a slender, streamlined body and long pointed wings,
    which allows for great maneuverability and… very efficient flight.” Perfect for
    darting through the clouds. We wanted to know how `swallow` sounded in other languages.
    In Greek, for example, it’s Χελιδόνι. We slightly changed it and proposed Helidon
    to the team. There were other options, but Helidon was the clear winner.


    Here is a one-sentence description: Helidon is a set of Java libraries for developing
    cloud-native services. This definition is very general, and it is challenging
    to understand all its nuances. But if someone asks what Helidon is, it’s a good
    answer. It’s clear and doesn’t include any confusing subatomic and supersonic
    concepts.


    Helidon was designed to achieve the following high-level goals:


    - Performance by design

    - Cloud-native

    - Embrace Java SE

    - Compatibility with modern Enterprise Java standards

    - Support GraalVM Native Image


    The first goal is very clean. The whole Helidon design is done with performance
    in mind. The core of Helidon is the reactive web server built on top of Netty.


    ### Note


    Netty is an asynchronous event-driven network application framework for rapidly
    developing maintainable high-performance protocol servers and clients. (See more
    at [`https://netty.io`](https://netty.io).)


    The reactive non-blocking implementation allows Helidon to achieve impressive
    performance numbers. Oracle’s performance tuning team worked closely with us to
    tune Helidon’s performance, and our users are happy with the results.


    The cloud-native goal is listed second, but it’s a primary goal. Helidon is created
    as a tool for developing cloud-native applications. It provides a fast start-up
    time, low memory consumption, a small disk footprint, and all other cloud-native
    application features listed in the previous section.


    The third goal is embracing Java SE. `Embrace` in this context means several things.
    We are trying to quickly adopt the latest Java versions and use new Java features.
    For example, Helidon is fully modularized and leverages `jlink` advantages. We
    heavily use the Flow API and rely on `java.util.logging`. Another advantage is
    minimizing the number of third-party dependencies. We do not use third-party libraries
    if the same functionality is achievable using pure JDK. As a result, we only depend
    on half of the Internet, and the Helidon application footprint becomes reasonably
    tiny. Also, it saves time for our corporate customers who need legal approvals
    for all third-party dependencies used in their applications.


    ### Note


    Helidon keeps the number of third-party dependencies low by design.


    And the fourth goal is compatibility with modern Enterprise Java standards. There
    are two standards in the Enterprise Java world now: Jakarta EE and MicroProfile.
    Helidon fully supports MicroProfile and partially Jakarta EE. Why? Because the
    standards are reducing entropy. Systems built on standards are portable and highly
    maintainable. Developers get APIs, and the development experience they are used
    to, and architects get confidence that the system will be upgradable and supportable.
    Jakarta EE is a successor of Java EE. It makes Helidon a good choice for migrating
    old Java EE-based applications to microservices. All supported specifications
    are covered later in the book.


    GraalVM Native Image creates a native executable from your Java application. With
    GraalVM Native Image, you don’t need JVM anymore. Your application will be compiled
    into one executable file. It starts in milliseconds and consumes less RAM, making
    it perfect for cloud-native applications, mainly functions. Supporting GraalVM
    Native Image became a standard feature for modern microservices frameworks like
    Quarkus and Micronaut. Even Spring, with its runtime nature, now supports it with
    Spring Native. Helidon is not an exception. It supports the native image in all
    flavors. Jumping ahead a bit, it’s worth mentioning that Helidon makes it possible
    to use CDI (including portable extensions) with the native image. Other frameworks
    usually don’t support it because of the runtime nature of CDI extensions.


    The work that ultimately became Helidon started in 2017, but there were several
    prototypes before the main design concepts were shaped. The primary focus was
    made on reactive APIs. It was a popular concept allowing us to achieve excellent
    performance. It was inspired by Netflix—like most other reactive frameworks at
    the time. We wanted to create a lightweight set of libraries that didn’t require
    any application server runtime, allowing your application to be a standard Java
    SE application. These libraries could be used separately from each other, but
    when used together, they would provide everything a developer needs to create
    a cloud-native service.


    ### Note


    Helidon is an open source product hosted on GitHub at [`https://github.com/helidon-io/helidon`](https://github.com/helidon-io/helidon)
    and licensed under the Apache 2.0 license.


    The open source model is now the obvious choice for modern frameworks and libraries.
    It gives users transparency and the ability to check our progress and provide
    contributions.


    ### Note


    Oracle requires all external contributors to sign the Oracle Contributor Agreement
    (OCA) to get their contributions accepted. It’s an easy process. You can find
    more details about it at [`https://oca.opensource.oracle.com/`](https://oca.opensource.oracle.com/).'
