  raw: '### Leaving LRA


    Finally, let’s get to the special method `@Leave`. You can use this method for
    removing the participant from the LRA it’s enrolled in. It is the only participant
    JAX-RS method aside from `@LRA` you are meant to call directly. When called with
    the LRA context header, the participant, if enrolled in the transaction, is removed
    from the transaction. Other compensation methods like `@Complete` won’t be called
    in this transaction context as the participant is no longer tracked by the coordinator
    for this transaction.


    *   ① ID of the LRA transaction participant needs to leave


    *   ② Method is executed after the coordinator has been asked to remove the participant
    from the LRA transaction


    ```

    @Leave

    @PUT

    @Path("/leave")

    public Response leave(@HeaderParam(LRA_HTTP_CONTEXT_HEADER) URI lraId) {  ①

    return Response.ok();  ②

    }

    Listing 14-8

    JAX-RS Leave Resource, Used for Removing Participant from LRA Transaction

    ```


    Note


    The leave method is contrary to the other participant’s methods, meant to be called
    directly.


    ## Non-JAX-RS Participant Methods


    You have already learned all the participant methods LRA JAX-RS resources can
    have. The spec strictly defines each method, so there is no need to define it
    as a JAX-RS method. When the method has LRA participant annotation and conforms
    to a specified signature, LRA Helidon implementation creates a surrogate JAX-RS
    endpoint and wires it together behind the scenes.


    Let’s look at the JAX-RS `@Compensate` method again.


    ```

    @PUT

    @Compensate

    @Path("compensate-example")

    public Response failure(@HeaderParam(LRA_HTTP_CONTEXT_HEADER) URI lraId) {

    return LRAResponse.compensated();

    }

    Listing 14-9

    JAX-RS Compensate Resource

    ```


    Same participant method can be expressed with non-JAX-RS notation.


    ```

    @Compensate

    public ParticipantStatus failure(URI lraId) {

    return ParticipantStatus.Compensated;

    }

    Listing 14-10

    Non-JAX-RS Compensate Resource

    ```


    The only difference between the participant methods is that the compensation link
    sent to the coordinator will have a slightly different pattern because it targets
    the surrogate JAX-RS resource instead of our direct resource.


    ## Asynchronous Compensation


    Compensations can take a long time, and complicated clean-up jobs running for
    5 minutes can be a reality. Blocking the `@Compensate` method for that long is
    not right, so you need to respond to the coordinator and continue asynchronously.
    What if an asynchronous compensation batch job fails? LRA has just the right API
    for such a situation. There are two options. The first option is to return `ParticipantStatus.Compensating`
    to inform the coordinator about the need to check the current compensation status
    via the `@Status` method later. Each coordinator has a retry strategy to retrieve
    the status eventually.


    ```

    private Map myStatusMap = new ConcurrentHashMap();

    @Compensate

    public ParticipantStatus failure(URI lraId) {

    ourWizardService.compensateAsync(lraId)

    .whenComplete((u, t) -> {

    if (t != null) {

    myStatusMap.put(lraId, ParticipantStatus.FailedToCompensate);

    } else {

    myStatusMap.put(lraId, ParticipantStatus.Compensated);

    }

    });

    return ParticipantStatus.Compensating;

    }

    @Status

    public ParticipantStatus status(URI lraId) {

    return myStatusMap.get(lraId);

    }

    @Forget

    public void forget(URI lraId) {

    myStatusMap.remove(lraId);

    }

    Listing 14-11

    Asynchronous Compensation with Status Reporting

    ```


    You can leverage the `@Forget` method to clean up status references when the coordinator
    calls it to inform you it is not needed anymore.


    The second option is even easier, as non-JAX-RS compensation methods support returning
    `CompletionStage` promises. The only setback is that the connection is kept open,
    but no thread is blocked.


    ```

    @Compensate

    public CompletionStage failure(URI lraId) {

    return ourWizardService.compensateAsync(lraId)

    .thenApply(s -> ParticipantStatus.Compensated)

    .exceptionally(t -> ParticipantStatus.FailedToCompensate);

    }

    Listing 14-12

    Asynchronous Compensation with CompletionStage

    ```


    ## LRA Coordinator


    The Long Running Actions implementation in Helidon requires the LRA coordinator
    to orchestrate LRA across the cluster. This is an extra service you need to enable
    the LRA functionality in your cluster. The LRA coordinator tracks which participant
    joined which LRA transaction and calls the participant’s LRA compensation resources
    when the LRA transaction is completed or canceled.


    Compensation links always accompany requests from participants for joining existing
    LRA transactions. Compensation links are URLs pointing to the participant’s compensation
    JAX-RS methods, annotated with `@Complete`, `@Compensate`, and so on, which is
    how the coordinator knows how to call participants. Compensation links are constructed
    from your JAX-RS resource context path and address configured with `mp.lra,participant.url`
    configuration key.


    *   ① Used for the very first call to coordinator, use k8s service name or DNS
    name accessible from participant


    *   ② Used for construction of compensation links, use k8s service name or DNS
    name accessible from coordinator


    ```

    mp.lra:

    coordinator.url: http://coordinator.service/lra-coordinator ①

    participant.url: http://participant.service  ②

    Listing 14-13

    Configure Helidon to Use a Coordinator

    ```


    Helidon supports the following.


    *   Narayana LRA coordinator


    *   MicroTx LRA coordinator


    *   Experimental Helidon LRA coordinator


    ### Narayana LRA Coordinator


    Narayana is a well-known transaction manager with a long history of reliability
    in distributed transactions built around the Arjuna core. The Narayana LRA coordinator
    supports Long Running Actions and was the first LRA coordinator on the market.


    ```

    VER=5.13.0.Final && \

    FILENAME=lra-coordinator-quarkus-$VER-runner.jar && \

    FILEPATH=org/jboss/narayana/rts/lra-coordinator-quarkus/$VER/$FILENAME && \

    wget https://search.maven.org/remotecontent?filepath=$FILEPATH \

    -O narayana-coordinator.jar \

    && java -Dquarkus.http.port=8070 -jar narayana-coordinator.jar

    Listing 14-14

    Narayana Local Installation

    ```


    Narayana LRA coordinator resources are accessible under the context `/lra-coordinator`.
    Helidon needs to be configured to know where to reach it when starting a new LRA.


    *   ① Used for the very first call to coordinator, use k8s service name or DNS
    name accessible from participant


    *   ② Used for construction of compensation links, use k8s service name or DNS
    name accessible from coordinator


    ```

    mp.lra:

    coordinator.url: http://127.0.0.1:8070/lra-coordinator  ①

    participant.url: http://127.0.0.1:7002  ②

    propagation.active: true

    Listing 14-15

    Configure Helidon to Use Narayana

    ```'
