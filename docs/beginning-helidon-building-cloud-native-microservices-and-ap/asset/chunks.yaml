    ### `onTerminate`


    `onTerminate`操作符从不扩充流。它为流中通过的`onComplete`或`onError`信号执行提供的`Runnable`。`onTerminate`的`Runnable`在`onComplete`或`onError`信号继续向下游传播之前执行。


    ### `cancel`


    `cancel`是一个终端操作符，意味着它订阅上游，并且其后没有其他操作符。`cancel`操作符在收到`onSubscribe`信号后向上游发送取消信号。不可能更早地执行此操作，因为`onSubscribe`信号携带了向上游发送`cancel`信号所需的订阅。


    *   ① `peek`不会被执行，因为`cancel`信号已发送给发布者，且没有`request`信号

    *   ② `cancel`在`onSubscribe`信号到达上游时立即发送`cancel`信号


    ```

    ReactiveStreams.of(1, 2, 3)

    .peek(i -> log("This is never executed"))  ①

    .cancel()  ②

    .run()

    ```


    **清单 13-26** `cancel`操作符取消整个流


