    ## Build and Run


    To build the project, you must change the directory to where your `pom.xml` is
    located and run this command.


    ```

    mvn package

    ```


    Tip


    You can also build your project with the CLI `helidon build` command.


    Helidon builds an *executable JAR* by default. The different packaging options
    are discussed later on in this chapter. For now, it’s important to know that the
    JAR is located at `target/quickstart-mp.jar` and it’s executable. Let’s run it.


    ```

    $ java -jar target/quickstart-mp.jar

    ```


    When the server starts, you can find interesting information in the output, like
    which port it runs on or which features are active.


    ```

    ... Server started on http://localhost:8080 (and all other host addresses) in
    1742 milliseconds (since JVM startup).

    ... Helidon MP 3.0.0 features: [CDI, Config, Health, JAX-RS, Metrics, Open API,
    Server]

    ```


    Now let’s trigger some greeting application endpoints to see that the application
    is appropriately functioning. You need to keep the server running, so you must
    open another terminal window or tab.


    Let’s test the default greeting first.


    ```

    $ curl -X GET localhost:8080/greet

    {"message":"Hello World!"}

    ```


    The following is the personalized greeting.


    ```

    $ curl -X GET localhost:8080/greet/Reader

    {"message":"Hello Reader!"}

    ```


    You also try to change the greeting. The `curl` command is listed in Table [2-2](#600147_1_En_2_Chapter.xhtml#Tab2).


    ## Packaging


    A Helidon application has three package options.


    *   An **executable JAR** is the default packaging for Java applications, optimized
    for Docker layers.


    *   A **jlink image** is a custom Java Runtime Environment (JRE) with just the
    modules the application requires.


    *   A **native image** is a binary natively compiled executable for lightning-quick
    startup.


    ### Executable JAR


    An executable JAR file is the default packaging when building a project using
    Maven. It’s activated if no additional profiles are specified.


    ```

    mvn package

    ```


    Tip


    You can also build your project with the CLI `helidon build` command.


    We use the *Hollow JAR* approach. It means that the JAR file contains only your
    application code. All third-party runtime dependencies are collected in the `lib`
    subdirectory of the directory where the application JAR is produced.


    In our Quickstart application, the JAR is built in the `target` directory, and
    all third-party dependencies are collected in `target/libs`.


    The Hollow JAR approach works very well with Docker layering. A Dockerfile (automatically
    generated as part of the project creation) creates a separate layer for the application
    JAR, and all application dependencies are stored in the `libs` directory. Despite
    the application, dependencies are not changing often, allowing the layer to build
    once and not rebuild every time a Docker image is created. Also, a layer with
    the application becomes very small, which helps reduce network traffic and the
    application deployment time.


    To build the Docker image, run the following command.


    ```

    docker build -t quickstart-mp .

    ```


    It creates a `quickstart-mp` Docker image. To run it, use the following command.


    ```

    docker run --rm -p 8080:8080 quickstart-mp:latest

    ```


    ### jlink Image


    JRE distribution is quite big. Your application most probably is not using all
    Java features. There is a way to create a custom (smaller) Java runtime image
    that includes only your application’s functionality. It can be done using the
    `jlink` utility, which is included in JDK.


    Warning


    Not all Java distributions provide JDK modules needed for custom JRE generation.
    Before using the Helidon JLink profile, ensure these modules are present by running
    `ls $JAVA_HOME/jmods`. If nothing is listed, you don’t have it installed. RPM-based
    distributions provide `*.jmod` files in separate `java-*-openjdk-jmods` packages.
    Debian-based distributions only provide `*.jmod` files in the `openjdk-*-jdk-headless`
    packages.


    Helidon provides a special build profile to simplify working with it. It uses
    Java Platform Module System (JPMS) and some advanced analysis to make it work
    even with automatic modules, which is not the case by default. You can invoke
    it using the following command.


    ```

    mvn package -Pjlink-image

    ```


    Tip


    You can also build a jlink image using CLI: `helidon build --mode JLINK`.


    The result of executing this command is the `target/quickstart-mp-jri` directory.
    It contains a self-contained custom image of your application, including your
    application itself, its runtime dependencies, and the JDK modules it depends on.
    You can start it using the following command.


    ```

    ./target/quickstart-mp-jri/bin/start

    ```


    The image also includes a class data sharing (CDS) archive, which improves startup
    performance and in-memory footprint but doesn’t improve the disk footprint. It
    increases it to get these performance optimizations. The increase can be significant—many
    megabytes. The size of the CDS archive is always reported at the end of the build
    output.


    Helidon provides an option to disable CDS archive creation. It makes sense if
    your goal is to keep the disk footprint as small as possible.


    ```

    mvn package -Pjlink-image -Djlink.image.addClassDataSharingArchive=false

    ```


    To build a Docker image containing your custom JRE, use the `Dockerfile.jlink`
    included with the Quickstart.


    ```

    docker build -t quickstart-mp-jri -f Dockerfile.jlink .

    ```


    This does a full build inside the Docker container. It might take time to download
    some Maven dependencies. When finished, you will have a `quickstart-mp-jri` Docker
    image in your local Docker repository.


    The following starts the application.


    ```

    docker run --rm -p 8080:8080 quickstart-mp-jri:latest

    ```'
