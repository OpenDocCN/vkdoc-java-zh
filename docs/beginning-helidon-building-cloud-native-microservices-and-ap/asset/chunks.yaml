    将 Helidon 应用部署到 Verrazzano 非常简单。当你使用 CLI 或 [`​helidon.​io/​starter`](http://helidon.io/starter)
    创建新的 Helidon 项目时，可以指定需要 docker 文件和 Verrazzano 描述符。系统会生成两个文件：`component.yaml` 和
    `application.yaml`。用 `kubectl` 命令应用它们，剩下的都交给 Verrazzano！


    ![](img/600147_1_En_12_Fig4_HTML.png)


    该流程图包含 `component.yaml` 与 `app config.yaml` 两个模块。它们流向 Verrazzano 平台，平台再进一步连接到
    wizard 命名空间及其组件、istio system 命名空间及其组件，以及 Verrazzano system 命名空间及其组件，同时还包括各类 UI
    与数据库。


    图 12-4


    Verrazzano 的作用


    如需了解 Helidon 应用配置与部署的全部细节，请参考官方[Verrazzano 指南](https://verrazzano.io/latest/docs/samples/hello-helidon/)。


    本章仅触及 Verrazzano 所提供功能的冰山一角。完整功能说明请参阅[官方网站](https://verrazzano.io/)。


    ## 总结


    *   Helidon 并非封闭生态，且可与市场上最知名的技术轻松集成。


    *   Neo4J 集成不仅仅是注入驱动，还包括与健康检查和指标系统的集成。


    *   Coherence CE 为 Helidon 提供了实现高可扩展缓存与持久化的简便方式。


    *   Helidon 在 Verrazzano 中是“一级公民（first-class citizen）”。你只需两个 YAML 文件，就能轻松在多云环境中部署服务。

