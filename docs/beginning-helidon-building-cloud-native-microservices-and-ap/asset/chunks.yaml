    A screenshot of a table has columns of number, time, source, destination, protocol,
    length, and info with 10 rows of data. The sixth row is selected from the table.
    It also has the object drop-down tab selected below with hexadecimal values at
    the bottom.


    Figure 8-1


    Eavesdropping on HTTP communication with Wireshark


    As you can see, the payload `{"gate":"false"}` from our endpoint can be extracted
    easily.


    And that’s not even the worst attack you can suffer with HTTP. What if someone
    changes the DNS records, and you connect to a different server that mimics our
    castle service? You would call your service and get a falsified response without
    any way of knowing, leading your knights to the trap instead of the castle with
    an open gate.


    Would you risk the security of your castle by using plain HTTP?


    HTTPS comes to save the day. Not only can you sign server responses with our server
    certificate so nobody else can imitate our server, but you can also encrypt both
    requests and responses.


    ![](images/600147_1_En_8_Chapter/600147_1_En_8_Fig2_HTML.jpg)


    A diagram of a 5 step exchange of data between a client laptop and a program server.
    It includes client hello T L S 1.3, server hello plus public key, encrypted session
    key, and encrypted data.


    Figure 8-2


    HTTPS exchange


    1.  After the initial TCP handshake, the client sends an initial “Hello” with
    the ALPN extension for selecting the proper protocol and the latest TLS version
    the client supports.


    2.  The server responds with its own “Hello” containing the selected protocol,
    TLS version, and server certificate with a public key within.


    3.  The client verifies the server certificate with the list of trusted certification
    authorities, ensuring the server is who it claims to be. Then the client generates
    a one-time session key, encrypts it with the server public key he just got, and
    verifies it is genuine.


    4.  The client sends the encrypted session key to the server, and only the server
    can decrypt the session key with its original private key(the server key). The
    server now has the session key, generated by the client, transferred to the server
    securely, so it can be used for symmetric data encryption from both sides.


    5.  The client can use its session key for data encryption. The server knows how
    to decrypt it and vice versa.


    Enabling HTTPS with TLS 1.3 is not complicated with Helidon. All you need is a
    trusted server certificate. To obtain one, you need a private key that nobody
    else has. You can generate one with [OpenSSL](https://www.openssl.org/).


    ```

    openssl genrsa -des3 -passout pass:''password'' -out server-private.key 4096

    Listing 8-2

    Create Private Key for Server Certificate

    ```


    Next, you need to create a *certificate signing request* (CSR), which is the file
    you can send to the [certification authority](https://en.wikipedia.org/wiki/Certificate_authority)
    (CA) containing the public key from the previously generated server private key
    and subject data identifying our organization and domain name for signing our
    server certificate. Certification authorities are usually commercial companies
    providing the services of physically validating CSR data before actual signing
    by their root CA certificates. For example, around 150 root certificates are [trusted
    by the Mozilla Firefox](https://wiki.mozilla.org/CA/Included_Certificates) web
    browser.


    Note


    You can easily become a CA and sign your certificates yourself (self-signed certificate).
    The only problem is that no one trusts your CA. With cURL, for example, you need
    to use the [-k](https://curl.se/docs/manpage.html%2523-k) option or add your CA
    to the cert store.


    ```

    openssl req -key server-private.key -passin pass:''password'' \

    -subj "/C=CZ/ST=Prague/L=Prague/O=Apress/OU=BeginningHelidon/CN=castle.beginning-helidon.apress.com"
    \

    -new -out server.csr

    Listing 8-3

    Create CSR

    ```


    CA creates a new server certificate for the `castle.beginning-helidon.apress.com`
    domain based on our CSR. To use a newly issued server certificate in a Java environment,
    a conversion to PKCS12 may be needed.


    ```

    openssl pkcs12 -inkey server-private.key \

    -in server.crt -export \

    -passin pass:''password'' \

    -passout pass:''password'' \

    -out server.p12

    Listing 8-4

    Convert CA Issued Server Certificate to PKCS12 Format

    ```


    Finally, the `server.p12` certificate file is used in Helidon with just a simple
    configuration.


    ```

    server.tls.private-key.keystore.resource.resource-path=server.p12

    server.tls.private-key.keystore.passphrase=password

    Listing 8-5

    Configure Helidon to Use TLS 1.3

    ```


    This time it is practically impossible to decode the data exchange between the
    Helidon server and the client without a securely exchanged session key.


    ![](images/600147_1_En_8_Chapter/600147_1_En_8_Fig3_HTML.jpg)


    A screenshot of a table has columns of number, time, source, destination, protocol,
    length, and info with 20 rows of data. The twelfth row is selected from the table.
    It also has the Linux cooked capture drop-down tab selected below with hexadecimal
    values at the bottom.


    Figure 8-3


    Eavesdropping on HTTPS communication with Wireshark'
