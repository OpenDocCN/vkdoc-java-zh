    ## Summary


    *   Helidon is not a closed ecosystem and provides easy integrations with the
    most famous technologies on the market.


    *   Neo4J integration is not just an injection of the driver but also integration
    with health and metrics.


    *   Coherence CE provides an easy way to have highly scalable cashing and persistence
