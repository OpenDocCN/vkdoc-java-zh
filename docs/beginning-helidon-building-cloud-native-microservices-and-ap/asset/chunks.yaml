    \ dependencies.\n\nNow that you have the required dependencies, let’s configure\
    \ `DataSource` in `microprofile-config.properties`.\n\n```\njavax.sql.DataSource.wizardSource.dataSourceClassName=org.h2.jdbcx.JdbcDataSource\n\
    javax.sql.DataSource.wizardSource.dataSource.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1\n\
    javax.sql.DataSource.wizardSource.dataSource.user=db_user\njavax.sql.DataSource.wizardSource.dataSource.password=user_password\n\
    Listing 6-5\nTypical Configuration\n```\n\nProperty names have a common pattern.\n\
    \n*   `<objecttype>` is the fully qualified Java class name of the configured\
    \ object. In our case, it is is.`javax.sql.DataSource`. It is followed by a period\
    \ (`.`) as a separator.\n\n*   `<datasourcename>` is the name of the data source.\
    \ It cannot contain a period “ . ” In this case, it is `wizardSource`. A period\
    \ (`.`) is a separator for the next part.\n\n*   `<propertyname>` supplies the\
    \ connection pool or vendor-supplied `DataSource`-specific configuration property\
    \ name. It may contain periods (`.`), such as `.url` (`.user` in our case).\n\n\
    ```\n..\n```\n\nHelidon reads this configuration and creates and configures the\
    \ desired `DataSource`. To use it in our Java code, inject it with the `@Named`\
    \ annotation.\n\n*   ① Inject named DataSource “wizardSource”\n\n```\n@Inject\n\
    @Named(\"wizardSource\")                             ①\nprivate DataSource wizardSource;\n\
    Listing 6-6\nInject DataSource\n```\n\nListing [6-7](#600147_1_En_6_Chapter.xhtml#PC8)\
    \ uses a constructor.\n\n*   ① Defines the `DataSource` variable\n\n*   ② Injects\
    \ the named `DataSource` to a constructor parameter\n\n```\nprivate final DataSource\
    \ wizardSource;             ①\n@Inject\npublic SomeObject(@Named(\"wizardSource\"\
    )\nDataSource wizardSource) {  ②\nthis.dswizardSource = wizardSource;\n}\nListing\
    \ 6-7\nInject DataSource via Constructor\n```\n\nNow you can get a connection\
    \ from the managed `DataSource` and use it in our code. This is a much more resource-friendly\
    \ way to get a JDBC connection.\n\n## Data Access with JPA\n\nThe preceding sections\
    \ discussed how the laborious task of managing database connections could be alleviated\
    \ using `DataSource`. However, the challenge of dealing with low-level result\
    \ sets remains. The data in a database exists in a completely different realm\
    \ and is stored in tables with interrelations for relational databases. It does\
    \ not consist of objects. As a result, manually converting this tabular data to\
    \ Java objects and back is a time-consuming process. Various object-relational\
    \ mapping (ORM) frameworks were developed to simplify this process. Essentially,\
    \ they serve as an intermediary layer between the `DataSource` and user code,\
    \ transforming the relational data stored in a database into Java objects and\
    \ vice versa, thus reducing the required time.\n\nBut each of these frameworks\
    \ provided its own API and usage model. A common specification was created since\
    \ this is a typical problem in most enterprise applications. It is called the\
    \ [Jakarta Persistence API](https://jakarta.ee/specifications/persistence/). This\
    \ is not a ready-to-use solution; it is a document and a set of APIs that different\
    \ vendors should implement. These implementations are usually called *JPA providers*.\n\
    \nJPA describes, among other things, how its implemented.\n\n*   Map Java objects\
    \ to relational database tables.\n\n*   Manage such persistent Java objects.\n\
    \n*   Interact with transactions (in this case, Jakarta Transactions).\n\n*  \
    \ Interact with named data sources.\n\nYou must put a few annotations to our POJOs,\
    \ and the JPA provider does all the magic for you. Those annotated objects are\
    \ managed using special `EntityManager` and `EntityManagerFactory` classes, which\
    \ are automatically configured and instantiated by Helidon. The code written with\
    \ JPA is portable. This means it works the same way when you switch the provider,\
    \ discussed later in the chapter.\n\nJPA has two operation modes.\n\n*   In a\
    \ **container-managed** entity manager, JPA management is handled entirely by\
    \ the container; Helidon, in our case.\n\n*   In an **application-managed** entity\
    \ manager, JPA management is handled by the application (better say, the developer).\n\
    \nThis book talks only about the container-managed JPA, which means you learn\
    \ how to tell Helidon to properly configure and run a JPA provider for you. Helidon\
    \ takes of error handling, thread safety, and transaction management on behalf\
    \ of the user, making the developer experience much better.\n\nJPA providers are\
    \ supported in Hibernate ORM and EclipseLink. You should choose one of them, but\
    \ not both.\n\nNote\n\nThis chapter only acquaints you with JPA in the context\
    \ of Helidon. JPA is a vast topic. Please check other books about JPA for more\
    \ details about this specification and its usage.\n\nAll of this may sound a little\
    \ scary, but let’s jump into the code, and you will see that it is quite easy.\n\
    \nMicroservices working with a database is a common use case; there is a special\
    \ Helidon QuickStart. It can be used as a template for our next Helidon service.\
    \ Let’s now generate a Quickstart database example at [`https://helidon.io/starter`](https://helidon.io/starter).\n\
    \n1.  Select the **Helidon MP** flavor.\n\n2.  Select **Database**.\n\n3.  Choose\
    \ **Jackson** or **JSON-B** for Media Support.\n\n4.  Select the following.\n\
    \    *   **Hibernate** as the JPA Implementation\n\n*   **HipariCP** for Connection\
    \ Pool\n\n*   **H2** for the Database Server\n\n*   **Auto DDL** for Automatic\
    \ schema initialization\n\n5.  Click the **Download** button.\n\nAlternatively,\
    \ you can go to [`https://helidon.io/starter/3.2.0?flavor=mp&step=5&app-type=database`](https://helidon.io/starter/3.2.0%253Fflavor%253Dmp%2526step%253D5%2526app-type%253Ddatabase),\
    \ unzip the myproject.zip download, and open the folder in your favorite IDE.\n\
    \nNote\n\nWhen this book was written, Helidon’s latest version was 3.2.0\\. You\
    \ may replace the version number with the latest version available to you.\n\n\
    Let’s explore the generated project. It is a Pokemon repository service."
  trans: "\n## 使用 DataSource\n\n`DataSource` 是一个只有两个方法的接口：`getConnection()` 和 `getConnection(String\
    \ username, String password)`，位于 `javax.sql` 包中。数据库供应商提供了该接口的各种实现，以提供不同的数据库功能。通常，这些实现类包含一些方法，使我们能够提供数据库服务器的详细信息和用户凭据。\n\
    \n以下是 `DataSource` 实现通常提供的其他常见特性。\n\n*   连接池\n\n*   `PreparedStatement` 缓存\n\n\
    *   连接超时\n\n*   日志功能\n\nHelidon 提供了集成机制，用于在代码中设置并注入 `DataSource`。流程很简单：在 `microprofile-config.properties`\
    \ 文件中描述连接细节，然后使用 `@Inject` 和 `@Named` 注解注入 `DataSource`。Helidon MP 的命名数据源集成需要一个连接池实现。\n\
    \n目前主要支持两种：HikariCP 和 Oracle Universal Connection Pool（OCP）。你可以二选一使用，但不能同时使用两者。只需为所选方案添加相应依赖即可。\n\
    \n清单 6-3 对应 HikariCP。\n\n```\nio.helidon.integrations.cdi\nhelidon-integrations-cdi-datasource-hikaricp\n\
    runtime\n\nListing 6-3\nHikariCP Dependency\n```\n\n清单 6-4 对应 OCP。\n\n```\nio.helidon.integrations.cdi\n\
    helidon-integrations-cdi-datasource-ucp\nruntime\n\nListing 6-4\nOCP Dependency\n\
    ```\n\n注意\n\n不要忘记在 `pom.xml` 文件中添加数据库驱动依赖。连接池可以与不同数据库厂商配合使用，而这些厂商的驱动并不包含在上述依赖中。\n\
    \n现在你已经有了所需依赖，让我们在 `microprofile-config.properties` 中配置 `DataSource`。\n\n```\n\
    javax.sql.DataSource.wizardSource.dataSourceClassName=org.h2.jdbcx.JdbcDataSource\n\
    javax.sql.DataSource.wizardSource.dataSource.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1\n\
    javax.sql.DataSource.wizardSource.dataSource.user=db_user\njavax.sql.DataSource.wizardSource.dataSource.password=user_password\n\
    Listing 6-5\nTypical Configuration\n```\n\n属性名遵循一个通用模式。\n\n*   `<objecttype>`\
    \ 是被配置对象的 Java 完整限定类名。在我们的例子中，它是 `javax.sql.DataSource`。后面跟一个句点（`.`）作为分隔符。\n\n\
    *   `<datasourcename>` 是数据源名称。它不能包含句点“ . ”。在这里它是 `wizardSource`。后面的句点（`.`）用于分隔下一部分。\n\
    \n*   `<propertyname>` 提供连接池或厂商提供的 `DataSource` 专用配置属性名。它可以包含句点（`.`），例如 `.url`（在我们的例子中还有\
    \ `.user`）。\n\n```\n..\n```\n\nHelidon 读取这些配置并创建、配置所需的 `DataSource`。要在 Java 代码中使用它，可通过\
    \ `@Named` 注解进行注入。\n\n*   ① 注入名为 “wizardSource” 的 DataSource\n\n```\n@Inject\n\
    @Named(\"wizardSource\")                             ①\nprivate DataSource wizardSource;\n\
    Listing 6-6\nInject DataSource\n```\n\n清单 6-7 使用了构造函数。\n\n*   ① 定义 `DataSource`\
    \ 变量\n\n*   ② 将命名的 `DataSource` 注入到构造函数参数中\n\n```\nprivate final DataSource wizardSource;\
    \             ①\n@Inject\npublic SomeObject(@Named(\"wizardSource\")\nDataSource\
    \ wizardSource) {  ②\nthis.dswizardSource = wizardSource;\n}\nListing 6-7\nInject\
    \ DataSource via Constructor\n```\n\n现在你可以从受管理的 `DataSource` 获取连接并在代码中使用。这是一种对资源更友好的\
    \ JDBC 连接获取方式。\n\n## 使用 JPA 进行数据访问\n\n前面的章节讨论了如何使用 `DataSource` 缓解繁琐的数据库连接管理工作。然而，处理底层结果集的挑战仍然存在。数据库中的数据处于一个完全不同的领域中；对于关系型数据库而言，数据以彼此关联的表形式存储，并不是对象。因此，手动将这种表格数据转换为\
    \ Java 对象、再从 Java 对象转换回表格数据，是一个耗时的过程。为简化这一流程，出现了多种对象关系映射（ORM）框架。本质上，它们作为 `DataSource`\
    \ 与用户代码之间的中间层，将数据库中的关系型数据转换为 Java 对象，反之亦然，从而减少所需时间。\n\n但这些框架各自都有自己的 API 和使用模型。由于这是大多数企业应用中的共性问题，因此制定了一个通用规范。它叫作\
    \ [Jakarta Persistence API](https://jakarta.ee/specifications/persistence/)。这并不是一个开箱即用的解决方案；它是一份文档和一组\
    \ API，不同厂商需要对其进行实现。这些实现通常被称为 *JPA 提供者*。\n\nJPA 描述了（除其他内容外）其实现方式。\n\n*   将 Java\
    \ 对象映射到关系数据库表。\n\n*   管理这类持久化 Java 对象。\n\n*   与事务交互（这里指 Jakarta Transactions）。\n\
    \n*   与命名数据源交互。\n\n你只需在 POJO 上添加少量注解，JPA 提供者就会为你完成其余“魔法”。这些带注解的对象通过专门的 `EntityManager`\
    \ 和 `EntityManagerFactory` 类进行管理，而这些类会由 Helidon 自动配置和实例化。使用 JPA 编写的代码具有可移植性。这意味着当你切换提供者时，它仍以相同方式工作（本章后续会讨论）。\n\
    \nJPA 有两种运行模式。\n\n*   在**容器管理型**实体管理器中，JPA 管理由容器完全处理；在这里就是 Helidon。\n\n*   在**应用管理型**实体管理器中，JPA\
    \ 管理由应用程序处理（更准确地说，由开发者处理）。\n\n本书只讨论容器管理型 JPA，这意味着你将学习如何告诉 Helidon 正确地为你配置并运行 JPA\
    \ 提供者。Helidon 会代表用户处理错误处理、线程安全和事务管理，从而显著改善开发体验。\n\nJPA 提供者支持 Hibernate ORM 和 EclipseLink。你应当在二者中选择其一，而不是同时使用两者。\n\
    \n注意\n\n本章仅在 Helidon 语境下帮助你入门 JPA。JPA 是一个非常庞大的主题。有关该规范及其用法的更多细节，请参考其他 JPA 书籍。\n\
    \n这些内容听起来可能有点吓人，但让我们直接进入代码，你会发现它其实很容易。\n\n使用数据库的微服务是一个常见用例；Helidon 为此提供了一个专门的\
    \ QuickStart。它可以作为我们下一个 Helidon 服务的模板。现在让我们在 [`https://helidon.io/starter`](https://helidon.io/starter)\
    \ 生成一个 Quickstart 数据库示例。\n\n1.  选择 **Helidon MP** 风格。\n\n2.  选择 **Database**。\n\
    \n3.  在 Media Support 中选择 **Jackson** 或 **JSON-B**。\n\n4.  选择以下项。\n    *   选择\
    \ **Hibernate** 作为 JPA 实现\n\n*   选择 **HipariCP** 作为连接池\n\n*   选择 **H2** 作为数据库服务器\n\
    \n*   选择 **Auto DDL** 以自动初始化 schema\n\n5.  点击 **Download** 按钮。\n\n或者，你也可以访问 [`https://helidon.io/starter/3.2.0?flavor=mp&step=5&app-type=database`](https://helidon.io/starter/3.2.0%253Fflavor%253Dmp%2526step%253D5%2526app-type%253Ddatabase)，解压下载的\
    \ myproject.zip，并在你喜欢的 IDE 中打开该文件夹。\n\n注意\n\n本书写作时，Helidon 的最新版本是 3.2.0。你可以将版本号替换为你当前可用的最新版本。\n\
    \n让我们来探索一下生成的项目。它是一个 Pokemon 仓库服务。\n"
- fmt: '# Helidon 中的持久化依赖与 JPA 实体配置


    首先，我们来看`pom.xml file`中的依赖项。其中最重要的是持久化相关依赖。


    - ① Jakarta Persistence API 主依赖

    - ② JPA CDI 扩展

    - ③ 由于选择 Hibernate 作为 JPA provider，Helidon 与其集成

    - ④ 使用 HikariCP 管理数据库连接


    ```text

    jakarta.persistence

    jakarta.persistence-api     ①


    io.helidon.integrations.cdi

    helidon-integrations-cdi-jpa②

    runtime


    io.helidon.integrations.cdi

    helidon-integrations-cdi-hibernate ③

    runtime


    io.helidon.integrations.cdi

    helidon-integrations-cdi-datasource-hikaricp                                    ④

    runtime


    Listing 6-8

    Persistence Dependencies

    ```


    在 Helidon 中，你可以像搭乐高一样组合不同技术。在这个场景下，我们将 HikariCP 连接池、JPA（Helidon 使用 CDI 作为扩展机制）以及
    Hibernate（作为 JPA provider）组合在一起。


    ## 实体设计：`Pokemon` 与 `PokemonType`


    接下来看看代码，重点是`Pokemon`和`PokemonType`实体。二者互相依赖：`Pokemon`中有一个`PokemonType`属性。


    - ① 声明名为`"Pokemon"`的实体

    - ② 实体存储在名为`"POKEMON"`的表中

    - ③ 定义多个 named query：查询全部 Pokemon，或按名称查询 Pokemon

    - ④ `Id`列不可为空且不可更新

    - ⑤ 在 getter 上描述的名称列应命名为`"NAME"`且不能为空

    - ⑥ `PokemonType`字段，被描述为多对一依赖


    ```java

    @Entity(name = "Pokemon")                       ①

    @Table(name = "POKEMON")                        ②

    @Access(AccessType.PROPERTY)

    @NamedQueries({                                 ③

    @NamedQuery(name = "getPokemons",

    query = "SELECT p FROM Pokemon p"),

    @NamedQuery(name = "getPokemonByName",

    query = "SELECT p FROM Pokemon p WHERE p.name = :name")

    })

    public class Pokemon {

    private int id;

    private String name;

    private PokemonType pokemonType;

    @Id

    @Column(name = "ID", nullable = false, updatable = false)              ④

    public int getId() {

    return id;

    }

    @Basic(optional = false)

    @Column(name = "NAME", nullable = false)             ⑤

    public String getName() {

    return name;

    }

    @JsonIgnore

    @ManyToOne

    public PokemonType getPokemonType() {                ⑥

    return pokemonType;

    }

    //.. constructor, other getters and setters omitted

    }

    Listing 6-9

    Pokemon Entity

    ```


    - ① 实体名为`"PokemonType"`

    - ② 实体应存储在名为`"POKEMONTYPE"`的表中

    - ③ 定义多个 named query：查询全部`PokemonType`或按 ID 查询`PokemonType`

    - ④ `Id`列不可为空且不可更新

    - ⑤ 在 getter 上描述的名称列应命名为`"NAME"`且不能为空


    ```java

    @Entity(name = "PokemonType")                          ①

    @Table(name = "POKEMONTYPE")                           ②

    @NamedQueries({                                        ③

    @NamedQuery(name = "getPokemonTypes",

    query = "SELECT t FROM PokemonType t"),

    @NamedQuery(name = "getPokemonTypeById",

    query = "SELECT t FROM PokemonType t WHERE t.id = :id")

    })

    public class PokemonType {

    @Id

    @Column(name = "ID", nullable = false, updatable = false)                                                     ④

    private int id;

    @Basic(optional = false)                         ⑤

    @Column(name = "NAME")

    private String name;

    //.. constructor, getters, and setters omitted

    }

    Listing 6-10

    PokemonType Entity

    ```


    以下是数据库中生成的表。


    ![](images/600147_1_En_6_Chapter/600147_1_En_6_Fig1_HTML.png)


    两个表分别为 `POKEMON` 和 `POKEMON TYPE`。`POKEMON` 包含 `I d`、`name` 和 `Pokemon type underscore
    I d` 列；`POKEMON TYPE` 包含 `I d` 和 `name`。在第一个表的 `Pokemon type underscore I d` 行和第二个表的
    `I d` 行之间有一个标注为“many to one”的双向箭头。


    Figure 6-1


    数据库中的 `Pokemon` 与 `PokemonTables` 表示


    Figure `[6-1](#600147_1_En_6_Chapter.xhtml#Fig1)` 显示 `POKEMON` 表有一个 `PokemonType_id`
    列。它用于表示 `Pokemon` 与 `PokemonType` 实体之间的关系。JPA 会负责对象与这些表之间的映射。


    ## 配置：`microprofile-properties.config`


    现在进入配置部分。在`microprofile-properties.config`文件中，你应按照“Working with a DataSource”一节中的模式描述数据库连接属性。


    - ① 使用的驱动类

    - ② 数据库连接 URL

    - ③ 用户名

    - ④ 密码


    ```properties

    javax.sql.DataSource.ds1.dataSourceClassName=org.h2.jdbcx.JdbcDataSource        ①

    javax.sql.DataSource.ds1.dataSource.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1     ②

    javax.sql.DataSource.ds1.dataSource.user=db_user         ③

    javax.sql.DataSource.ds1.dataSource.password=user_password    ④

    Listing 6-11

    DataSource Configuration

    ```


    Helidon 读取该配置后，会准备`DataSource`对象，设置 JPA，并提供可注入的`EntityManager`。下面在`PokemonResource`端点中使用它来执行
    Pokemon 的 CRUD 操作。


    - ① 将`Path`端点设为`/pokemon`

    - ② 使用标准`@PersistenceContext`注解注入`EntityManager`，并将`unitName`参数设为生成器中设置的`"pu1"`

    - ③ 使用`entityManager`执行`getPokemons`查询，将每项映射为`Pokemon`并返回列表

    - ④ 使用`entityManager`执行`getPokemons` named query 按名称查找，将结果映射为`Pokemon`并返回


    ```java

    @Path("pokemon")                                        ①

    public class PokemonResource {

    @PersistenceContext(unitName = "pu1")

    private EntityManager entityManager;

    @GET

    @Produces(MediaType.APPLICATION_JSON)

    public List getPokemons() {

    return entityManager

    .createNamedQuery("getPokemons", Pokemon.class).getResultList();                         ②

    }

    @GET

    @Path("{id}")

    @Produces(MediaType.APPLICATION_JSON)

    public Pokemon getPokemonById(@PathParam("id") String id) {

    Pokemon pokemon = entityManager

    .find(Pokemon.class, Integer.valueOf(id));

    if (pokemon == null) {

    throw new NotFoundException("Unable to find pokemon with ID " + id);                         ③

    }

    return pokemon;

    }

    @GET

    @Path("name/{name}")

    @Produces(MediaType.APPLICATION_JSON)

    public Pokemon getPokemonByName(@PathParam("name") String name) {

    TypedQuery query =

    entityManager.createNamedQuery("getPokemonByName", Pokemon.class);                     ④

    List list = query.setParameter("name", name).getResultList();

    if (list.isEmpty()) {

    throw new NotFoundException("Unable to find pokemon with name " + name);

    }

    return list.get(0);

    }

    // .. more methods to be described later.

    }

    Listing 6-12

    Pokemon Resource

    ```


    从代码可以看到，JPA 负责了所有数据库调用、数据查询，并自动将`relational data`映射为 Java 对象，你可以在代码中像平常一样使用它们。'
