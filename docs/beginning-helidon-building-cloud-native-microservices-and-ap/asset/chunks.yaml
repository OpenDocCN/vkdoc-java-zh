    at the top. Helidon flavor is chosen under title, generate your project, where
    Helidon S E radio button is enabled, with next button below.


    Figure 15-1


    Project Starter


    Helidon SE is the default choice for creating new applications. Quickstart application
    is also a default choice, so you can click Download to download a zip file with
    your Helidon SE project.


    Note


    Project Starter has many options and allows you to select features to add to your
    project. You can explore it by going through the application creating wizard.
    The *Custom* application type is a path containing all possible customizations.


