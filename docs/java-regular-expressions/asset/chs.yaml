- "# 第 5 章：实用示例\n\n## 概述\n\n> *“我参加了一个速读课程，并在 20 分钟内读完了《战争与和平》。这本书是关于俄罗斯的。”*\n> \n\
  > — 伍迪·艾伦\n\n在本章中，我会在解决几个正则表达式问题时边思考边讲解。这应该能让你对构建非平凡正则表达式解决方案的过程有所了解。其中一些示例是我在正则表达式或\
  \ Java 新闻组中遇到的问题，另一些则是为本章专门创建的。\n\n|  | 注意  | 本章中的问题利用了在第 4 章中定义的 `RegexProperties`\
  \ 类。`RegexProperties` 是一个扩展了 `java.util.Properties` 的类，允许你从属性文件中加载正则表达式模式。其主要优势在于模式不必使用\
  \ Java 分隔符。因此，你可以直接使用 ***\\d*** 而不是 ***\\\\d***。有关 `RegexProperties` 类的更多详细信息，请参见第\
  \ 4 章。 |\n\n\n\n## 确认电话号码格式\n\n第一个示例用于确认给定的电话号码是否符合美国电话号码的标准格式。\n\n在正式开始之前，我需要做一个决定：是自行编写正则表达式，还是尝试寻找现成的？通常，我会先查阅一些在线正则表达式资源，例如\
  \ [`www.regexlib.com`](http://www.regexlib.com)，寻找已有的模式。不过，由于这个模式相对简单，而且我想演示编写过程，因此决定自己动手。\n\
  \n既然决定自己编写，我首先需要回答的问题是：什么是电话号码？我从一些示例号码入手，反向推导。这就是第 1 章中描述的“拉取技术”。它要求我获取一些实际数据，并尝试从中提取模式。假设我的样本集如下：\n\
  \n*   614-345-6789\n\n*   345-6789\n\n*   345 6789\n\n*   345.6789\n\n*   3456789\n\
  \n*   (614)345-6789\n\n*   6143456789\n\n我选择列表中的第一个电话号码作为模式模板。通过分析，我发现一个相当明显的结构：三位数字、一个连字符、三位数字、一个连字符，最后是四位数字。由此得出模式\
  \ ***\\d{3}-\\d{3}-\\d{4}***。表 5-1 展示了推导过程。\n\n表 5-1：从 614-345-6789 中提取通用正则表达式模式\n\
  \n| **步骤** | **操作** | **原因** | **说明** | **结果模式** |\n| --- | --- | --- | --- | ---\
  \ |\n| 步骤 1 | 无 | 初始状态 | 不适用 | 614-345-6789 |\n| 步骤 2 | 将数字替换为 ***\\d*** | 获得更通用的描述\
  \ | ***\\d*** 代表任意单个数字 | \\d\\d\\d-\\d\\d\\d-\\d\\d\\d\\d |\n| 步骤 3 | 将 ***\\d\\\
  d\\d*** 替换为 ***\\d{3}*** | 生成更简洁的模式 | ***\\d{3}*** 完全等同于 ***\\d\\d\\d*** | \\d{3}-\\\
  d{3}-\\d\\d\\d\\d |\n| 步骤 4 | 将 ***\\d\\d\\d\\d*** 替换为 ***\\d{4}*** | 生成更简洁的模式 |\
  \ ***\\d{4}*** 完全等同于 ***\\d\\d\\d\\d*** | \\d{3}-\\d{3}-\\d{4} |\n\n当然，该模式还必须能处理仅包含七位数字的号码，例如\
  \ *345-6789*。目前它无法做到，因为它是基于九位数字的数据建模的。调整模式以兼容这种情况，得到 ***(?:\\d{3}-)?\\d{3}-\\d{4}***。表\
  \ 5-2 展示了推导过程。\n\n表 5-2：调整 *\\d{3}-\\d{3}-\\d{4}* 以兼容七位数字\n\n| **步骤** | **操作** |\
  \ **原因** | **说明** | **结果模式** |\n| --- | --- | --- | --- | --- |\n| 步骤 5 | 无 | 初始状态\
  \ | 不适用 | \\d{3}-\\d{3}-\\d{4} |\n| 步骤 6 | 将最左侧的 ***\\d{3}-*** 用括号分组，得到 ***(\\d{3}-)***\
  \ | 将 ***\\d{3}-*** 视为一个可能存在的单一实体 | 模式的任何部分都可以进行子分组 | (\\d{3}-)\\d{3}-\\d{4} |\n\
  | 步骤 7 | 通过添加 ***?*** 使 ***(\\d{3}-)*** 变为可选，得到 ***(\\d{3}-)?*** | 允许用户省略区号 | 在分组后添加\
  \ ***?*** 使其变为可选 | (\\d{3}-)?\\d{3}-\\d{4} |\n| 步骤 8 | 在 ***(\\d{3}-)*** 的左括号内添加\
  \ ***?:***，得到 ***(?:\\d{3}-)?*** | 提高表达式效率，非捕获分组占用更少内存 | 在分组内添加 ***?:*** 使其变为非捕获分组\
  \ | (?:\\d{3}-)?\\d{3}-\\d{4} |\n\n现在，只要数字按三位和四位分组，并用连字符分隔，该模式就能接受任何七位或十位的数字序列。\n\
  \n| **![开始侧边栏](img/_1.gif)** |\n\n**关于在 Java 中使用正则表达式的简要说明**\n\n如果我使用 Perl 编程，下一步自然会是考虑候选字符串中的标点符号，处理可能存在的左括号等等。当然，这很可能直接在模式中解决。\n\
  \n但我用的不是 Perl；我使用的是功能完备的面向对象语言，它旨在处理各种麻烦的同时保持代码清晰。我决定利用这一优势，通过清洗数据来简化问题，更多地依赖程序逻辑，而不是正则表达式的奇技淫巧。\n\
  \n| **![结束侧边栏](img/_1.gif)** |\n\n|  |\n\n接下来，我使用 `String.replaceAll` 移除电话号码中的所有标点符号和空格，如下所示：\n\
  \n```\nString scrubbedPhone = phone.replaceAll(\"\\\\p{Punct}|\\\\s\",\"\"); \n\
  ```\n\n这会将所有标点符号或空格字符替换为空字符串。\n\n|  | 注意 | ***\\p{Punct}*** 是一个 POSIX（美国 ASCII）预定义字符类，匹配任何标点符号。具体来说，它匹配\
  \ ***!\"#$%&'()*+,-./:;<=>?@[\\]^_`{&#124;}~***。该字符类在第 1 章的表 1-12 中介绍过。 |\n\n这样一来，我可以确保电话号码的形式为\
  \ *6143456789* 或 *3456789*。这是个好消息，因为我现在可以进一步简化模式，如表 5-3 所示。通过将处理过程分解为单独的步骤，我降低了给定模式的复杂度。\n\
  \n表 5-3：从 *\\d{3}-\\d{3}-\\d{4}* 中移除连字符引用以适配数据清洗\n\n| **步骤** | **操作** | **原因** |\
  \ **说明** | **结果模式** |\n| --- | --- | --- | --- | --- |\n| 步骤 9 | 无 | 初始状态 | 不适用\
  \ | (?:\\d{3}-)?\\d{3}-\\d{4} |\n| 步骤 10 | 移除所有对字符 - 的引用 | 数据清洗保证我无需再处理电话号码中的标点符号。因此，在模式中期望它存在是错误的。\
  \ | 移除 - 意味着模式不会检查或要求连字符的存在。 | (?:\\d{3})?\\d{3}\\d{4} |\n| 步骤 11 | 将 ***(\\d{3})***\
  \ 视为单一实体，并检查其出现一次或两次；因此，将 ***(?:\\d{3})?\\d{3}*** 替换为 ***(?:\\d{3}){1,2}*** | 使表达式更简洁\
  \ | ***(?:\\d{3})?\\d{3}*** 表示“三位数字或六位数字”。***(?:\\d{3}){1,2}*** 含义完全相同。因此，它们在逻辑上是等价的。\
  \ | (?:\\d{3}){1,2}\\d{4} |\n| 步骤 12 | 回退到使用步骤 10 中的模式 | 尽管步骤 11 的模式更简短，但可读性更差。\
  \ | 参见上一条。 | (?:\\d{3})?\\d{3}\\d{4} |\n\n请注意，我在步骤 12 中撤销了步骤 11 所做的更改。虽然步骤 11 确实使表达式更简洁，但也使其更难阅读。在这种情况下，如果模式能更易于阅读和维护，我宁愿它稍微长一点。因此，我的核心代码由两行组成。第一行是第\
  \ 32 行，用于去除候选字符串中的所有标点符号：\n\n```\nString tmp = phone.replaceAll(\"\\\\p{Punct}|\\\
  \\s\",\"\");\n```\n\n第二行是第 36 行，用于应用模式：\n\n```\nboolean retval = tmp.matches(PHONE_PATTERN)\
  \ // (\\d{3})?\\d{3}\\d{4}\n```\n\n清单 5-1 展示了完整的实现。\n\n清单 5-1：搜索电话号码\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\n01  import java.util.regex.*;\n02  import java.util.logging.Logger;\n\
  \n03  public class MatchPhoneNumber{\n04  private static Logger log = Logger.getAnonymousLogger();\n\
  05     private static final String PHONE_NUMBER_KEY=\"phoneNumber\";\n06     /**\n\
  07     * 确认给定电话号码的格式是否有效。\n08     * @param phone 表示电话号码的字符串。\n09     * @returns\
  \ 如果电话号码格式可接受则返回 true。\n10    */\n11    public static boolean isPhoneValid(String\
  \ phone){\n12       boolean retval=false;\n13           String msg = \"\\r\\nCANDIDATE:\"\
  \ + phone;\n\n\n\n14       //确保候选号码有通过验证的机会\n15       if (phone != null && phone.length()\
  \ > 6)\n16       {\n17           //加载正则表达式属性文件\n18           RegexProperties rb\
  \ = new RegexProperties();\n19           try\n20           {\n21             rb.load(\"\
  ../regex.properties\");\n22           }\n23           catch(Exception e)\n24   \
  \        {\n25                 e.printStackTrace();\n26           }\n\n27      \
  \     //清理电话号码，移除空格\n28           //和标点符号。我们也可以将这个\n29           //模式存储在 regex.property\
  \ 文件中，\n30           //但用 Java 分隔符处理时，它其实并不复杂\n31           //到令人困惑的程度\n32     \
  \      String tmp = phone.replaceAll(\"\\\\p{Punct}|\\\\s\",\"\");\n\n33       \
  \    //提取相应的正则表达式模式并执行检查\n34           //本例中为 (\\d{3})?\\d{3}\\d{4}\n36        \
  \   String phoneNumberPattern=rb.getProperty(PHONE_NUMBER_KEY);\n\n37          \
  \ //执行实际比较\n38           retval= tmp.matches(phoneNumberPattern);\n\n39        \
  \   //记录调试信息\n40           msg += \":\\r\\nREGEX:\" + phoneNumberPattern;\n41  \
  \    }\n42      msg += \"\\r\\nRESULT:\" + retval +\"\\r\\n\";\n43      log.info(msg);\n\
  44      return retval;\n45   }\n46  public static void main(String args[]) throws\
  \ Exception{\n47    if (args != null && args.length == 1)\n48       System.out.println(isPhoneValid(args[0]));\n\
  49    else\n50       System.out.println(\"usage: java MatchPhoneNumber <phoneNumber>\"\
  );\n51   }\n52 }\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n即使完全不懂正则表达式的程序员也能看懂这段代码，这正体现了\
  \ J2SE 正则表达式的优雅之处。\n\n这种冗余的写法是否合理？对于这个特定场景，直接用一行正则表达式是否更好？这类决策需要你根据具体需求逐案判断。在我看来，宁可写得冗余一些，也不要冒险使用过于简洁的代码。\n\
  \n## 验证邮政编码\n\n下一个挑战是提供一个验证美国邮政编码的方法。该方法需要能处理邮政编码五位数和四位数部分之间的标点符号、空格或无分隔符的情况。它还需要能处理只有五位数的邮政编码。突然需求发生了变化：现在还需要验证加拿大、英国、阿根廷、瑞典、日本和荷兰的邮政编码。\n\
  \n我做的第一件事是在网上搜索模式，从[`www.regexlib.com`](http://www.regexlib.com)开始。这个网站提供了前面提到的所有国家的正则表达式。接着，我将这些正则表达式添加到\
  \ regex.properties 文件中，这样我就可以使用第 4 章中的 RegexProperties 类。\n\n这样做的目的，当然是为了将表达式外部化，并避免对特殊字符进行双重转义。我决定为属性键使用有意义的键名。也就是说，我预期能够获取每个正则表达式模式对应的国家代码。因此，我可以根据国家代码来定义属性文件的键。例如，由于日本的国家代码是*JP*，我将日本邮政编码模式的键定义为*zipJP*。清单\
  \ 5-2 总结了添加到 regex.properties 文件中的条目。\n\n清单 5-2：regex.properties 文件中的新条目\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\n#日本邮政编码\nzipJP=^\\d{3}-\\d{4}$\n\n#美国邮政编码\nzipUS=^\\d{5}\\p{Punct}?\\\
  s?(?:\\d{4})?$\n\n#荷兰邮政编码\nzipNL=^[0-9]{4}\\s*[a-zA-Z]{2}$\n\n#阿根廷邮政编码\nzipAR=^\\\
  d{3}-\\d{4}$\n\n#瑞典邮政编码\nzipSE=^(s-|S-){0,1}[0-9]{3}\\s?[0-9]{2}$\n\n#加拿大邮政编码\n\
  zipCA=^([A-Z]\\d[A-Z]\\s\\d[A-Z]\\d)$\n\n#英国邮政编码\nzipUK=^[a-zA-Z]{1,2}[0-9][0-9A-Za-z]{0,1}\
  \ {0,1}[0-9][A-Za-z]{2}$ \n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n最后，我编写代码。算法是根据给定的国家代码查找相应的正则表达式，应用该模式，然后返回\
  \ true 或 false。清单 5-3 展示了实现此功能的代码。\n\n清单 5-3：匹配多个国家的邮政编码\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\n01  import java.io.*;\n02  import java.util.logging.Logger;\n03  import\
  \ java.util.regex.*;\n\n04  /**\n05  *验证给定国家的邮政编码。\n06  *@author M Habibi\n07  */\n\
  08  public class MatchZipCodes{\n09      private static Logger log = Logger.getAnonymousLogger();\n\
  10     private static final String ZIP_PATTERN=\"zip\";\n11     private static RegexProperties\
  \ regexProperties;\n12     //加载正则表达式属性文件\n13     //在类级别执行此操作\n14     static\n15\
  \     {\n16         try\n17         {\n18             regexProperties = new RegexProperties();\n\
  19             regexProperties.load(\"../regex.properties\");\n20         }\n21\
  \         catch(Exception e)\n22         {\n23             e.printStackTrace();\n\
  24         }\n25     }\n\n26     public static void main(String args[]){\n27   \
  \      String msg = \"usage: java MatchZipCodes countryCode Zip\";\n\n28       \
  \  if (args != null && args.length == 2)\n29             msg = \"\"+isZipValid(args[0],args[1]);\n\
  \n30         //输出用法信息，或运行 isZipValid 方法的结果\n31         System.out.println(msg);\n\
  32     }\n33     /**\n34     * 确认给定邮政编码的格式是否有效。\n35     * @param <code>String</code>\
  \ countryCode 国家代码\n36     * @param <code>String</code> zip 邮政编码\n37     * @return\
  \ <code>boolean</code> 布尔值\n38     *\n39     * @author M Habibi\n40     */\n41 \
  \    public static boolean isZipValid(String countryCode, String zip)\n42     {\n\
  43         boolean retval=false;\n44         //使用国家代码在正则表达式属性文件中形成唯一键\n45      \
  \   String zipPatternKey = ZIP_PATTERN + countryCode.toUpperCase();\n\n\n\n48  \
  \       // 根据给定的国家代码提取正则表达式模式\n49         String zipPattern = regexProperties.getProperty(zipPatternKey);\n\
  \n50         // 如果出现某种问题，则无需尝试执行正则表达式\n51         // 直接跳过\n52         if (zipPattern\
  \ != null)\n53             retval = zip.trim().matches(zipPattern);\n54        \
  \ else\n55         {\n56             String msg = \"国家代码 \"+countryCode+\" 的正则表达式\"\
  ;\n57             msg+= \" 未在属性文件中找到 \";\n58             log.warning(msg);\n59 \
  \        }\n60         // 创建日志报告\n61         String msg = \"正则表达式=\"+zipPattern\
  \ +\n62         \"\\n 邮编=\"+zip+\"\\n 国家代码=\"+\n63         countryCode+\"\\n 匹配结果=\"\
  +retval;\n64         log.finest(msg);\n\n65         return retval;\n66     }\n67\
  \ }\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n除去注释等内容，该方法中的实际工作仅在三行代码中完成。第\
  \ 47 行根据国家代码构成正确的键：\n\n```\n47      String zipPatternKey = ZIP_PATTERN + countryCode.toUpperCase();\
  \ \n```\n\n例如，对于国家代码 *US*，zipPatternKey 等于 *zipUS*。接下来，第 49 行根据该键提取相关模式：\n\n```\n\
  49   String zipPattern = regexProperties.getProperty(zipPatternKey);\n```\n\n第 53\
  \ 行实际将模式与键进行比对：\n\n```\n53             retval = zip.trim().matches(zipPattern);\n\
  ```\n\n在本例中，我对正则表达式所做的唯一改动是让实际模式在内存使用上更高效，同时更宽松一些，如表 5-4 所示。具体来说，宽松意味着该模式将接受美国邮政编码前五位数字与后四位数字之间的任意标点符号、空格或完全没有分隔符。该模式也接受仅五位数字作为有效的美国邮政编码。\n\
  \n表 5-4：让邮政编码模式更宽松、更高效\n\n| **步骤** | **我的操作** | **操作原因** | **理由** | **最终模式** |\n\
  | --- | --- | --- | --- | --- |\n| 步骤 1 | 无操作 | 初始状态 | 不适用 | \\d{5}(-\\d{4})? |\n\
  | 步骤 2 | 在捕获组 ***(-\\d{4})*** 内添加 ***?:***，生成 ***(?:-\\d{4})*** | 生成更高效的模式。 | 此处无需捕获。\
  \ | \\d{5}(?:-\\d{4})? |\n| 步骤 3 | 将 - 替换为 ***\\p{Punct}?***，生成 ***(?:\\p{Punct}?\\\
  d{4})?*** | 任意标点符号——或完全没有标点——均可作为分隔符。 | ***\\p{Punct}?*** 是 - 的超集，且为可选，因此正则引擎现在愿意接受任意标点或完全没有标点作为分隔符。\
  \ | \\d{5}(?:\\p{Punct}?\\d{4})? |\n| 步骤 4 | 在美国邮政编码五位数字与四位数字之间的可接受分隔符列表中添加 ***\\\
  s?*** 模式 | 使用空格或空字符串分隔五位数字与四位数字的邮政编码将通过验证。 | 美国邮政编码五位数字与后续四位数字之间的空格是可选的。这仅仅是一种更宽松的解释。\
  \ | \\d{5}(?:\\p{Punct}?\\s?\\d{4})? |\n| 步骤 5 | 将 ***\\p{Punct}?\\s?*** 移出非捕获组\
  \ | 提高可读性。可选非捕获组内的可选子模式可能难以理解。 | 逻辑上两者等价。 | \\d{5}\\p{Punct}?\\s?(?:\\d{4})? |\n\
  | 步骤 6 | 在模式前后添加行首标记 *^* 和行尾标记 *$* | 提高匹配速度。模式越精确，性能越好。 | 所有邮政编码都将作为提取的字符串传入该方法。因此，它们始终具有行首和行尾。\
  \ | ^\\d{5}\\p{Punct}?\\s?(?:\\d{4})?$ |\n\n由于正则表达式模式被外部化，后续可以对其进行调整，以更好地适应不同地区。更棒的是，无需修改代码即可添加更多国家代码：只需在\
  \ `regex.properties` 文件中添加相应条目即可。\n\n这里的要点是，即使使用网上找到的通用正则表达式模式，我仍然让代码带有非常 Java 的风格。它模块化、可适应、可扩展且清晰明了。\n\
  \n\n\n## 确认日期格式\n\n在本例中，我需要一个能够验证日期格式的方法。要求非常明确：各个日期标记之间必须使用某种标点符号分隔，而空格不被视为标点符号。该方法应接受两位或四位数字的年份，以及一位或两位数字的月份和日期。我还需要确保日期不是未来的日期。可以预期第一个日期标记是月份，第二个日期标记是该月的日期，最后一个日期标记是年份。因此，有效的输入可能如下所示：\n\
  \n*   11/30/2002\n\n*   4/25/03\n\n*   03-29/2003\n\n*   11/30/1902\n\n*   2/25-03\n\
  \n*   06#9/2003\n\n同样，首先要做的是在网上搜索。我找到了几个可能适用的模式。第一个模式如下，它被描述为非常健壮，能够处理闰年等情况：***^(?:(?:(?:0?[13578]|1[02])(\\\
  /|-|\\.)31)\\1|(?:(?:0?[1,3-9]|1*** ***[0-2])(\\/|-|\\.)(?:29|30)\\2))(?:(?:1[6-9]|[2-9]\\\
  d)?\\d{2})$|^(?:0?2(\\/|-|\\.)29\\3*** ***(?:(?:(?:1[6-9]|[2-9]\\d)?(?:0[48]|[2468][048]|[13579][26])|(?:(?:16|[2468]***\
  \ ***[048]|[3579][26])00))))$|^(?:(?:0?[1-9])|(?:1[0-2]))(\\/|-|\\.)(?:0?[1-9]|1\\\
  d|2[0-8])*** ***\\4(?:(?:1[6-9]|[2-9]\\d)?\\d{2})$***.\n\n我决定暂时跳过它。\n\n我找到的第二个模式是\
  \ ***^\\d{1,2}\\/\\d{1,2}\\/\\d{4}$***，看起来很有希望，但它只限于四位数的年份。它可能能用，但我需要对其进行调整。接着，我遇到了\
  \ ***((\\d{2})|(\\d))\\/((\\d{2})|(\\d))\\/((\\d{4})|(\\d{2}))***。乍一看，我似乎需要将第二个模式向第三个模式靠拢。\n\
  \n我不喜欢第三个模式现在的样子，因为它使用了大量实际上并不需要的捕获组。非捕获组同样可以胜任，而且效率更高。这立刻让我有些怀疑。它也比我希望的更冗长。当然，表达式冗长的特性可能使其更高效，但我怀疑一个关心效率的作者会留下所有这些无用的捕获组。\n\
  \n无论我选择哪个模式，我可能都想把候选字符串中的所有标点符号替换成一个易于处理的字符。我可以直接去掉所有标点，但那样我就无法知道像 *1111971* 这样的日期是指\
  \ 1971 年 1 月 11 日，还是 1971 年 11 月 1 日。因此，我需要这样一行代码：\n\n```\nString scrubbedDate =\
  \ date.replaceAll(\"\\\\p{Punct}\",\"@\");\n```\n\n这里，我可能会使用 *@* 符号作为替换分隔符。它没有任何特殊的正则表达式含义，因此更容易处理。接下来，我需要编写一个模式来捕获月份、日期和年份，并确保它构成一个有效的日期。\n\
  \n等等——我在想是否有更简单的方法。如果我使用 `String.split` 方法按标点符号分割，并从剩余的数字中提取日期呢？然后我就可以直接用纯 Java\
  \ 代码来验证实际日期了。为此，我需要类似这样的代码：\n\n```\nString[] datetokens = date.split(\"\\\\p{Punct}\"\
  );\n```\n\n这看起来相当简单，所以我决定采用这种方法。\n\n我的算法如下：按标点符号分割日期，用它创建一个 `Calendar` 对象，将其与今天进行比较，如果该\
  \ `Calendar` 对象小于或等于今天，则返回 true。我可以将初步的方法签名写成如下形式：\n\n```\n public static boolean\
  \ isDateValid(String date)\n```\n\n图 5-1 展示了该算法。\n\n![点击展开](img/fig204_01_0.jpg)\n\
  图 5-1：isDateValid 方法的算法\n\n代码清单 5-4 给出了完整的实现。\n\n代码清单 5-4：验证日期\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\n01 import java.util.regex.*;\n02 import java.io.*;\n03 import java.util.logging.Logger;\n\
  04 import java.util.GregorianCalendar;\n05 import java.util.Calendar;\n\n06 /**\n\
  07 *匹配日期\n08 */\n09 public class MatchDates{\n10 private static final String DATE_PATTERN\
  \ = \"date\";\n11 private static final String PROP_FILE = \"../regex.properties\"\
  ;\n12 private static Logger log = Logger.getAnonymousLogger();\n13 public static\
  \ int LOWER_YEAR_LIMIT = -120;\n\n14    public static void main(String args[]) throws\
  \ Exception{\n15       if (args != null && args.length==1)\n16       {\n17     \
  \    boolean b =isDateValid(args[0]);\n18         log.info(\"\"+b);\n19       }\n\
  20       else\n21       {\n22         System.out.println(\"用法: java MatchDates dd/dd/dddd\"\
  );\n23       }\n24    }\n\n25    /**\n26    * 确认给定的日期格式由一个或两位数字\n27    * 后跟一个标点符号，再后跟一个或两位数字\n\
  28    * 后跟一个标点符号，再后跟两位或四位数字组成。此外，\n29    * 它实际验证日期是否小于今天，并且\n30    * 不超过过去 <CODE>LOWER_YEAR_LIMIT</CODE>\
  \ =120 年。\n31    * 此方法甚至考虑了闰年等情况\n32    * @param 要处理的 <code>String</code> 日期\n33\
  \    * @return <code>boolean</code> 如果有效则返回 true\n34    *\n35    * @author M Habibi\n\
  36    */\n\n37    public static boolean isDateValid(String date)\n38    {\n39  \
  \    boolean retval=false;\n40      date = date.trim();\n\n41      //候选字符串是否包含三个数字部分？否则\n\
  42      //下面的月份、日期和年份提取可能会\n43      //抛出数字格式异常。\n44      boolean hasThreeDigitSections\
  \ =\n45       date.matches(\"\\\\d+\\\\p{Punct}\\\\d+\\\\p{Punct}\\\\d+\");\n\n\
  46      if (hasThreeDigitSections)\n47      {\n48         String[] dateTokens =\
  \ date.split(\"\\\\p{Punct}\");\n\n49         if (dateTokens.length == 3)\n50  \
  \       {\n51          //Java 中月份从 0 开始，因此减 1\n52          int month = Integer.parseInt(dateTokens[0])\
  \ -1;\n\n53          int day = Integer.parseInt(dateTokens[1]);\n54          int\
  \ year = Integer.parseInt(dateTokens[2]);\n\n55          //如果输入的是两位数的年份\n56    \
  \      if (year < 100)\n57            year += 2000;\n\n58          //获取边界年份\n59\
  \          GregorianCalendar today = new GregorianCalendar();\n60          //获取比今天早\
  \ LOWER_YEAR_LIMIT 年的下限\n61          GregorianCalendar lowerLimit = new GregorianCalendar();\n\
  62          lowerLimit.add(Calendar.YEAR, LOWER_YEAR_LIMIT);\n\n63          //创建一个代表提议日期的候选对象。\n\
  64          GregorianCalendar candidate =\n65          new GregorianCalendar(year,\
  \ month,day);\n66          //检查日期的有效性\n67          if\n68          (\n69       \
  \      candidate.before(today)\n70           &&\n71             candidate.after(lowerLimit)\n\
  72           &&//月份可能出错，例如用户输入了 55\n73             month == candidate.get(Calendar.MONTH)\n\
  74           &&//日期可能出错，例如用户输入了 55\n75             day == candidate.get(Calendar.DAY_OF_MONTH)\n\
  76          )\n77          {\n78              retval = true;\n79          }\n80\
  \      }\n81     }\n82     return retval;\n83    }\n84 }\n```\n\n| **![结束示例](img/_1.gif)**\
  \ |\n\n|  |\n\n前面的示例将几乎所有繁重的工作都交给了正则表达式。代码清单 5-4 中的代码在 `split` 方法中使用了正则表达式。除此之外，它都是相当常规的\
  \ Java 代码。这并不意味着正则表达式的贡献微不足道——事实上，我认为它至关重要。然而，一旦 `split` 方法中的正则表达式部分被整合进来，你就回到了熟悉的\
  \ Java 世界。\n\n\n\n## 搜索字符串\n\n本示例在给定字符串中搜索某个模式是否存在，并返回所有匹配的字符串。这段代码非常简单，但作为一个实用的小程序，值得在此演示。\n\
  \n首先，我需要明确“返回”的具体含义。返回什么？在这个例子中，我决定返回一个包含匹配字符串的 ArrayList，因为我希望字符串按照被找到的顺序排列，而 ArrayList\
  \ 正好能维护元素的插入顺序。此外，我也倾向于返回一个定义良好的数据结构，以便客户端（例如）可以遍历该结构并进一步检查数据。\n\n我还决定让客户端能够传入 `Pattern.compile`\
  \ 的标志，例如 `Pattern.MULTILINE` 和 `Pattern.DOTALL`。这并不会增加多少额外的复杂性，但对客户端来说却是一个不错的功能。此时，值得先写下初步的方法签名。我得到了以下内容：\n\
  \n```\n public static ArrayList searchString(\n       String content, String searchPattern,\
  \ int flags\n   ) throws IOException\n```\n\n现在，我准备开始编写方法。我的第一个版本如清单 5-5 所示。\n\n\
  **清单 5-5：searchString 方法的第一个版本**\n\n| **![示例开始](img/_1.gif)** |\n\n```\n01     public\
  \ static ArrayList searchString(\n02         String content,\n03         String\
  \ searchPattern,\n04         int flags\n05     )\n06     throws IOException\n07\
  \     {\n08         ArrayList retval = new ArrayList();\n09         Pattern pattern\
  \ = null;\n\n10        //编译模式\n11        if (flags > -1)\n12        {\n13      \
  \      pattern = Pattern.compile(searchPattern, flags);\n14        }\n15       \
  \ else\n16        {\n17            pattern = Pattern.compile(searchPattern);\n18\
  \        }\n\n19        //为模式提取匹配器\n20        Matcher matcher = pattern.matcher(content);\n\
  \n21        //遍历所有匹配项，并将\n22        //所有相关项添加到 ArrayList\n23        while (matcher.find())\n\
  24        {\n25            //提取匹配项及其位置\n26            String tmp = matcher.group();\n\
  27            //将匹配的字符串\n28            //插入到映射中。\n29            retval.add(+ tmp);\n\
  30        }\n\n32        return retval;\n32     } \n```\n\n| **![示例结束](img/_1.gif)**\
  \ |\n\n|  |\n\n清单 5-5 并不算糟糕。它能找到所有相关的匹配子串并按顺序返回。我运行了几个示例测试，发现它按预期工作。但它确实还有改进空间。它没有告诉我字符串是在哪里被找到的，而且如果方法能被重载就更好了，这样客户端在不需要标志时就不必强制传入。\n\
  \n我决定，对于这个版本，客户端可以接受没有重载。不过，我确实认为客户端有权要求知道匹配字符串被找到的位置。因此，我修改了代码，使其返回一个 Map。该 Map\
  \ 将包含一个键/值对，键是每次匹配的字节位置（存储为 String 或 Integer——我还没决定用哪个），值是匹配的子串。修改代码后，我得到了清单 5-6。唯一显著的变化在第\
  \ 7、25 和 29 行。顺便提一下，我在第 8 行决定使用 `LinkedHashMap`，因为我希望保留匹配字符串被找到的顺序。`LinkedHashMap`\
  \ 是 J2SE 1.4 中添加到 Map 家族的新成员，它能保持元素的插入顺序。\n\n**清单 5-6：属于 RegexUtil 类的修改版 searchString\
  \ 方法**\n\n| **![示例开始](img/_1.gif)** |\n\n```\n01  public static Map searchString(\n\
  02      String content,\n03      String searchPattern,\n04      int flags\n05  )\n\
  \n06  {\n07      Map retval = new LinkedHashMap();\n08      Pattern pattern = null;\n\
  \n09      //编译模式\n10      if (flags > -1)\n11      {\n12          pattern = Pattern.compile(searchPattern,\
  \ flags);\n13      }\n14      else\n15      {\n16          pattern = Pattern.compile(searchPattern);\n\
  17      }\n\n18      //为模式提取匹配器\n19      Matcher matcher = pattern.matcher(content);\n\
  20     //遍历所有匹配项，并将\n21     //所有相关项添加到 ArrayList\n22     while (matcher.find())\n\
  23     {\n24         //提取匹配项及其位置\n25         int position = matcher.start();\n26\
  \         String tmp = matcher.group();\n27         //将匹配的字符串和位置\n28         //插入到映射中。\n\
  29         retval.put(position+\"\",tmp);\n30     }\n\n31     return retval;\n32\
  \ }\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n我决定将位置存储为 String，以便更容易地处理输出。我不希望客户端过于小心地处理键，所以目前用\
  \ String 就足够了。\n\n\n\n## 搜索文件\n\n在前一个示例的基础上，我决定提供一个用于搜索文件内容并返回该文件中所有匹配字符串的实用工具。我将使用\
  \ `FileChannel` 进行实际的文件 I/O 操作。虽然对 `FileChannel` 的讨论超出了本书的范围，但在我看来，它们是 Java 中访问文件的最佳方式。\n\
  \n我的策略是使用 `FileChannel` 打开一个文件，将其内容读入一个字符串，释放 `FileChannel`，然后使用 `searchString`\
  \ 方法来解析该字符串。这比逐行读取文件并检查其内容要快，尽管它比较消耗内存。清单 5-7 展示了实现此功能的代码。\n\n**清单 5-7：读取文件内容**\n\
  \n| **![开始示例](img/_1.gif)** |\n\n```\n01     /**\n02     * 提取文件的内容\n03     * @param\
  \ String fileName 要提取的文件名\n04     * @throws IOException\n05     *\n06     * @return\
  \ String 表示文件内容的字符串\n07     */\n08     public static String getFileContent(String\
  \ fileName)\n09     throws IOException{\n10        String retval = null;\n11   \
  \     //获取 FileChannel 的访问权限\n12        FileInputStream fis =\n13          new FileInputStream(fileName);\n\
  14        FileChannel fc = fis.getChannel();\n\n15        //获取文件内容\n16        retval\
  \ = getFileContent(fc);\n\n17        //关闭资源\n18        fc.close();\n19        fc\
  \ = null;\n\n20        return retval;\n21     }\n\n22     /**\n23     * 提取文件的内容\n\
  24     * @param String fileName 要提取的文件名\n25     * @throws IOException\n26     *\n\
  27     * @return String 表示文件内容的字符串\n28     */\n29     private static String getFileContent(FileChannel\
  \ fc)\n30     throws IOException{\n31         String retval = null;\n32        //读取\
  \ FileChannel 的内容\n33         ByteBuffer bb = ByteBuffer.allocate((int)fc.size());\n\
  34         fc.read(bb);\n\n35         //将内容保存为字符串\n36         bb.flip();\n37   \
  \      retval = new String(bb.array());\n38         bb = null;\n\n39         return\
  \ retval;\n40     }\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n接下来，我需要提供一个方法，用于加载文件、搜索文件并返回结果。有了前面两个方法，这就变得相当容易了，如清单\
  \ 5-8 所示。\n\n**清单 5-8：打开文件、搜索文件并返回结果**\n\n| **![开始示例](img/_1.gif)** |\n\n```\n01\
  \     public static Map searchFile(\n02         String file,\n03         String\
  \ searchPattern,\n04         int flags\n05     ) throws IOException\n06     {\n\
  07        String fileContent = getFileContent(file);\n08        Map retval = searchFile(fileContent,searchPattern,flags);\n\
  09        return retval;\n10     }}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\
  \n我测试了这个程序，并将其与 `grep` 进行了比较。说实话，在比较中它似乎稍显不足。`grep` 程序会返回匹配标记的整行内容，而此方法只返回匹配的标记本身。这倒也不算太糟糕，因为客户端可以通过使用正确的正则表达式模式来请求整行内容。但它确实不够友好，尤其是对普通用户而言。\n\
  \n我决定对模式进行“填充”，以捕获整行内容，前提是原始搜索模式中没有标点符号，因此也不包含正则表达式。清单 5-9 展示了我修改后的 `searchFile`\
  \ 方法。\n\n**清单 5-9：修改 searchFile 方法使其更友好**\n\n| **![开始示例](img/_1.gif)** |\n\n```\n\
  01  public static Map searchFile(\n02      String file,\n03      String searchPattern,\n\
  04      int flags\n05  ) throws IOException\n06  {\n07     String fileContent =\
  \ getFileContent(file);\n\n08     //如果搜索模式中没有标点符号\n09     //则假定它不是正则表达式，并提取\n10\
  \     //找到该模式的整行内容\n11     String[] regexTokens = searchPattern.split(\"\\\\p{Punct}\"\
  );\n\n12     if (regexTokens.length == 1)\n13     {\n14         searchPattern =\
  \ \"^.*\"+ searchPattern+\".*$\";\n15     }\n\n16    Map retval = searchString(fileContent,searchPattern,flags);\n\
  17    return retval;\n18 } \n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n### 讨论点\n\
  \n此时，你心中应该有一些合理的问题。这难道不应该是一本关于正则表达式的书吗？`searchFile` 和 `searchString` 方法中并没有什么特别像正则表达式的地方；它们基本上就是你已经知道如何编写的纯\
  \ Java 代码。这是怎么回事？\n\n关键在于，正则表达式只是一个工具。它并没有改变你仍在编写 Java 代码的事实，并且即使你在使用正则表达式时，也需要遵循良好的、模块化的、面向对象的原则。正则表达式让你能够跨越那些你可能永远无法跨越的难点，但它只是一个工具。就像任何精心打造的引擎一样，`java.util.regex`\
  \ 引擎通过安静地运行并且*不*让你为其操心，来彰显其卓越性。\n\n### 处理非常大的文件\n\n此时另一个有效的问题是，如果你要解析的文件内容太大，以至于无法将其全部读入内存，该怎么办？通常，你有两种方法可以选择。你可以使用\
  \ Java 的新特性之一，例如 `MappedByteBuffer`，或者你可以将文件分割成可管理的部分，然后依次解析每个部分。\n\n如果你决定将 `MappedByteBuffer`\
  \ 用于正则表达式，清单 5-10 包含了一个示例，展示了如何操作。然而，我不太愿意强烈推荐将 `MappedByteBuffer` 与正则表达式结合使用，原因有三。首先也是最重要的一点，它们的行为非常依赖于系统，因此如果你需要平台独立性，可能应该排除它们。其次，即使在给定的平台上，它们的行为也没有明确定义。因此，根据你操作系统上正在进行的其他操作，你可能会得到不一致的结果。第三，你需要考虑这样一个事实：如果整个文件无法一次性加载到内存中，那么尝试应用一个可能包含通配符的模式将是一件棘手的事情。\n\
  \n**清单 5-10：通过 MappedByteBuffer 访问文件**\n\n| **![开始示例](img/_1.gif)** |\n\n```\n01\
  \   public static boolean getFileContentUsingMappedByteBuffer\n02   (\n03      \
  \ String fileName\n04   ) throws IOException\n05   {\n06       boolean retval =\
  \ false;\n07       RandomAccessFile raf = new RandomAccessFile(fileName,\"rwd\"\
  );\n08       FileChannel fc = raf.getChannel();\n\n09       MappedByteBuffer mbb\
  \ =\n10        fc.map(FileChannel.MapMode.READ_WRITE,0,fc.size());\n\n11       CharSequence\
  \ cb = mbb.asCharBuffer();\n\n12       return retval;\n13 }\n```\n\n| **![结束示例](img/_1.gif)**\
  \ |\n\n|  |\n\n你可能需要重新考虑你的模式，并根据你对文件结构的了解，将文件分解成逻辑块。一种策略可能是检查文件大小，然后将其除以 10、100\
  \ 或任何根据系统内存限制易于加载的分数，然后搜索该部分。虽然这并不理想，但它比相应的内存映射方法更具可预测性。底线是，无论你使用哪种正则表达式风格或提供者，非常大的文件都需要特殊处理。\n\
  \n\n\n## 修改文件内容\n\n现在我想提供一个基于正则表达式模式修改文件内容的功能。也就是说，我想提供一种机制，能够打开文件、基于正则表达式模式搜索其内容，并将所有匹配该模式的内容替换为指定的字符串。由于我已经有了打开和搜索文件的代码，修改文件内容就相当容易了。实现这一功能的逻辑如图\
  \ 5-2 所示。\n\n![点击展开](img/fig215_01_0.jpg)\n图 5-2：更新文件内容的基本流程图\n\n同样，为了提高效率，我决定使用`FileChannel`，如代码清单\
  \ 5-11 所示。\n\n代码清单 5-11：基于正则表达式模式修改文件内容\n\n| **![示例开始](img/_1.gif)** |\n\n```\n\
  01  /**\n02  * 更新文件内容。默认情况下，\n03  * 使用 Pattern.MULTILINE 模式。同时支持\n04  * 替换字符串中的\
  \ $d 表示法，具体参照\n05  * Matcher.replaceAll 方法。\n06  * @param String fileName 文件名和文件路径\n\
  07  * @param String regex 要查找的正则表达式模式\n08  * @param String replacement 正则表达式的替换字符串\n\
  09  * @throws IOException 如果发生 IO 错误\n10  *\n11  * @return boolean 如果文件已更新则返回 true\n\
  12  */\n13  public static boolean updateFileContent\n14  (\n15     String fileName,\n\
  16     String regex,\n17     String replacement\n18  ) throws IOException\n19  {\n\
  20     boolean retval = false;\n\n21     RandomAccessFile raf =\n22         new\
  \ RandomAccessFile(fileName,\"rwd\");\n23     FileChannel fc = raf.getChannel();\n\
  \n24     String fileContent = getFileContent(fc);\n25     //为此正则表达式激活 MULTILINE\
  \ 标志\n26     regex = \"(?m)\"+regex;\n\n27     String newFileContent =\n28     \
  \    fileContent.replaceAll(regex,replacement);\n\n29     //如果没有变化，则不更新文件\n30  \
  \   if (!newFileContent.equals(fileContent))\n31     {\n32        setFileContent(newFileContent,fc);\n\
  33        retval = true;\n34     }\n35     //关闭清理\n36     fc.close();\n37     fc\
  \ = null;\n38     raf = null;\n\n39     return retval;\n40 }\n\n41  /**\n42  * 设置文件内容。完全覆盖\n\
  43  * 之前的文件内容，并将文件截断\n44  * 为新内容的长度。\n45  * @param <code>String</code> newContent\n\
  46  * @param <code>FileChannel</code> fc\n47  * @throws <code>IOException</code>\n\
  48  *\n49  * @author M Habibi\n50  */\n51  private static void setFileContent(\n\
  52     String newContent, FileChannel fc\n53  )\n54  throws IOException{\n55   \
  \  //将内容写入文件\n56     ByteBuffer bb = ByteBuffer.wrap(newContent.getBytes());\n57\
  \     //截断文件大小，以防\n58     //原始文件内容比新内容长\n59     fc.truncate(newContent.length());\n\
  \n60     //从位置 0 开始写入\n61     fc.position(0);\n62     fc.write(bb);\n\n63     fc.close();\n\
  64     fc = null;\n65  }\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n代码清单 5-11\
  \ 利用了之前在代码清单 5-7 第 29 行定义的`getFileContent`方法。除此之外，该示例是自包含的。\n\n## 从文件中提取电话号码\n\n\
  在这个示例中，我想解析一个文件并提取所有电话号码。这是我为一个经营小型 IT 店的朋友编写的程序。他有各种电子文档，需要从中提取电话号码以便回拨给客户。我将从最开始的需求提取阶段开始这个过程：\n\
