  \ ***\\d\\d\\d\\d***。如前所述，这并不是最优雅的模式。根据表 1-6，表达相同模式的另一种等效方式是 ***\\d{4}***——即，一个恰好由四个数字组成的序列。\
  \ |\n\n#### 选择字符示例 1\n\n模式 ***A|B*** 将匹配 *A* 或 *B*，因为它们都由一个 *A* 字符或一个 *B* 字符组成。它不会匹配\
