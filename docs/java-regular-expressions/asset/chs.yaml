  \ 所列的字符中，那么你正在读取的这个字符很可能就代表它本身。例如，表 1-2 展示了如何解读模式 ***hello****。\n\n表 1-2：模式 *hello*\
  \ ^([*])\n\n| **字母** | **描述** |\n| --- | --- |\n| h | 字符 *h* |\n| e | 后跟字符 *e* |\n\
  | l | 后跟字符 *l* |\n| l | 后跟字符 *l* |\n| o | 后跟字符 *o* |\n| * | 后跟一个元字符，在此情况下表示 *o*\
