  d{7} 的 String.matches 方法。通常，如果你准备缩小可接受模式的定义范围，或者愿意定义所有可能的变体，那么请使用 String.matches\
  \ 方法。另一方面，如果你是在查找子字符串是否存在，那么使用 Pattern 和 Matcher 对象会更合适。](img/#LiB0013.html#answer.N53)\
