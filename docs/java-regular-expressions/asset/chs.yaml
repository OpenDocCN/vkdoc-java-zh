  当你有更完整的字符串解析需求时，正则表达式会变得特别有用。当字符串格式定义良好时，例如逗号分隔的文件，分割字符串是很容易的。你不需要为此使用正则表达式；一个 `StringTokenizer`\
  \ 就足够了。但是，如果你想根据某个单词或其任何同义词来分割字符串呢？\n\n正则表达式在这类场景中会很有帮助，因为它们允许你限定复杂条件来实现分割。清单 1-12\
  \ 根据单词 *compromise* 或其同义词的出现位置来分割给定的短语。输出 1-12 显示了运行该程序的结果。\n\n清单 1-12: Split.java\n\
