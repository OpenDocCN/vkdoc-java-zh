  \   public static String strengthenSentence(String sentence){\n      String retval=null;\n\
  \n      String[] tokens = null;\n\n      String splitPattern = \",\";\n\n      tokens=\
  \ sentence.split(splitPattern);\n\n      if (tokens==null){\n         String msg\
  \ = \"   NO MATCH: pattern:\" + sentence\n             + \"\\r\\n             regex:\
  \ \" + splitPattern;\n      }\n      else{\n         retval = tokens[1] + \", \"\
  \ + tokens[0];\n         System.out.println(\"BEFORE: \" + sentence);\n        \
  \ System.out.println(\"AFTER : \" + retval +\"\\n\");\n      }\n      return retval;\n\
