  \ |\n\n## 正则表达式操作\n\n在本节中，你将探索正则表达式稍微更实际一些的用法。在实际应用中，人们使用正则表达式主要出于以下三大类基本目的：\n\n\
  *   *数据验证：* 这是确保候选字符串符合特定格式的过程（例如，确保密码长度至少为八个字符，并且至少包含两个数字）。\n\n*   *搜索和/或替换：* 这是正则表达式的另一个流行用法，而且理由充分。假设你想给所有客户发送一封信，并希望每封信都通过穿插客户姓名来实现个性化。当然，这比听起来要复杂一些，因为不同姓名的长度不同，而且当插入较长的姓名时，你不希望覆盖信中的下一个单词。正则表达式是解决这类问题的完美方案。\n\
  \n*   *分解文本：* 这也可能是一项具有挑战性的活动，特别是当需要根据复杂规则拆分字符串时。幸运的是，使用正则表达式会变得容易得多，正如清单 1-11（紧随其后）所演示的那样。\n\
  \n### 数据验证\n\n数据验证，即确保数据符合规定的格式，是正则表达式最常见的用途之一。这可能特别具有挑战性，因为数据通常形式不精确，并且由不成文的规则定义。\n\
  \nJ2SE 1.4 为你提供了几种验证数据的方法。最简单的是使用新方法 boolean String.matches(String regex)。此方法确认传入的模式*完全*匹配它所调用的字符串。\n\
  \n这种精确性可能很棘手，因此充分理解它很重要。例如，假设你需要确认给定的字符串包含单词 *Java*，后跟一个空格，再后跟某个数字。进一步假设你的候选字符串是\
  \ I love Java 4。下一节将演示处理此示例的过程。\n\n\n\n#### 字符串数据验证示例\n\n这个示例看起来很简单，因此你首先尝试测试模式\
  \ ***Java \\d***。表 1-25 展示了该模式的分解说明。\n\n表 1-25：模式 Java \\d\n\n| **正则表达式** | **描述**\
  \ |\n| --- | --- |\n| J | 大写字母 *J* |\n| a | 后跟字符 *a* |\n| v | 后跟字符 *v* |\n| a |\
  \ 后跟字符 *a* |\n| <space> | 后跟一个空格 |\n| \\d | 后跟一个数字 |\n\n这相当简单，于是你自信地编写了代码，如清单 1-8\
  \ 所示。\n\n清单 1-8：ValidationTest.java\n\n| **![示例开始](img/_1.gif)** |\n\n```\n import\
  \ java.util.regex.*;\n\n  public class ValidationTest{\n     public static void\
  \ main(String args[]){\n         String candidate = \"I love Java 4\";\n       \
  \  String pattern =\"Java \\\\d\";\n         System.out.println(candidate.matches(pattern));\n\
  \     }\n  }\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n然后你运行它：\n\n```\njava\
  \ ValidationTest\n```\n\n却发现它在输出 1-8 中失败了。\n\n输出 1-8：运行 ValidationTest.java 的结果\n\
  \n| **![示例开始](img/_1.gif)** |\n\n```\nC:\\RegEx\\code>java ValidationTest\nDoes\
  \ candidate : I love Java 4\nmatch pattern  : Java \\d?\n\nfalse\n```\n\n| **![示例结束](img/_1.gif)**\
  \ |\n\n|  |\n\n发生了什么？因为你的输入字符串是 I love Java 4，而 Java 4 前面有 I love，所以输入与模式 **Java\
  \ \\d** 并非完全匹配，只是部分匹配。那么现在该怎么办？\n\n你有两个选择。你可以修改模式，允许在要匹配的 Java 4 前后出现字符；或者直接使用 Pattern\
  \ 和 Matcher 对象。我们来探讨一下每种方案的优缺点。\n\n要使用 `String.matcher(String regex)` 方法，你需要考虑模式\
  \ **Java \\d** 前后可能出现的所有字符。因此，你使用了模式 **.*\\bJava \\d(|$)**，表 1-26 对其进行了剖析。\n\n表\
  \ 1-26：模式 .**\\bJava \\d(|$*)\n\n| **正则表达式** | **描述** |\n| --- | --- |\n| . | 任意字符\
  \ |\n| * | 重复任意次数 |\n| \\b | 后跟一个单词边界 |\n| J | 后跟大写字母 *J* |\n| a | 后跟字符 *a* |\n\
  | v | 后跟字符 *v* |\n| a | 后跟字符 *a* |\n| <space> | 后跟一个空格 |\n| \\d | 后跟一个数字 |\n| (\
  \ | 后跟一个分组，包含 |\n| <space> | 一个空格 |\n| &#124; | 或 |\n| $ | 行尾字符 |\n| ) | 关闭分组 |\n\
  \n#### 使用 Pattern 和 Matcher 对象进行数据验证示例\n\n上一节中编写模式的工作量比预期稍大。我们来看看在清单 1-9 中使用 Pattern\
  \ 和 Matcher 对象是否更简单。输出结果如输出 1-9 所示。\n\n清单 1-9：ValidationTestWithPatternAndMatcher.java\n\
  \n| **![示例开始](img/_1.gif)** |\n\n```\n import java.util.regex.*;\n\n   public class\
  \ ValidationTestWithPatternAndMatcher{\n      public static void main(String args[]){\n\
  \   // 编译模式\n   Pattern p = null;\n   try{\n     p = Pattern.compile(\"Java \\\\\
  d\");\n   }\n   catch (PatternSyntaxException pex){\n      pex.printStackTrace();\n\
  \      System.exit(0);\n   }\n\n   // 定义匹配字符串\n\n   String candidate = \"I love\
  \ Java 4\";\n   // 获取匹配器\n   Matcher m = p.matcher(candidate);\n\n   System.out.println(\"\
  result=\" + m.find());\n   }\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n\
  输出 1-9：运行 ValidationTestWithPatternAndMatcher.java 的结果\n\n| **![示例开始](img/_1.gif)**\
  \ |\n\n```\nC:\\RegEx\\Examples\\chapter1>java\nValidationTestWithPatternAndMatcher\n\
  result = true\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n清单 1-9 中使用的模式比清单 1-8\
  \ 中的更简单，它只是原始字符串 ***Java \\d***。但 Java 代码需要显式使用 Pattern 和 Matcher 对象，这对程序员的要求稍高一些。这样做是因为你需要显式访问\
  \ `Matcher.find` 方法，该方法允许你检查输入字符串，看是否有任何部分与模式匹配。这与 `String.matches(String regex)`\
  \ 方法形成对比，后者要求完全匹配。\n\n一般来说，有两种类型的验证。第一种类型要求完全匹配。对于这类验证，最简单的方法可能是使用 `String.matches(String\
  \ regex)`，因为它会拒绝任何不完全匹配的内容。\n\n第二种类型的验证要求字符串在某个位置包含该模式，但不要求完全匹配。例如，你可能要求密码包含非字母数字字符。这类验证最好通过使用\
  \ Matcher 和 Pattern 对象来实现。第 5 章 提供了更复杂的验证示例。\n\n### 搜索与替换\n\n新正则表达式包最强大的功能之一是能够搜索并替换字符串和子字符串。你可能还记得，以前这类操作非常繁琐，需要使用分词器或\
  \ `String.substring` 方法，并配合大量字符串运算。\n\n值得庆幸的是，那些日子已经过去了。在 J2SE 中，有两种通用的方法可以执行搜索和替换操作。下面的示例利用\
  \ String 类新增的两个方法，走了一条更简单的路径。（第 4 章 包含直接使用 Pattern 和 Matcher 类的更复杂示例。）以下示例涉及的两个方法如下：\n\
  \n*   `replaceFirst(String regex, String replacement)`\n\n*   `replaceAll(String\
  \ regex, String replacement)`\n\n第一个方法 `replaceFirst(String regex, String replacement)`\
  \ 仅将正则表达式模式第一次出现的位置替换为 replacement 字符串。第二个方法 `replaceAll` 将模式*所有*出现的位置替换为 replacement\
  \ 字符串。我将在第 2 章 中详细解释这些新方法。\n\n\n\n#### 搜索与替换示例\n\n如果你和我一样，你可能思考编程的时间比应该的要多。假设你正在写一篇关于拳击的文章。进一步假设你决定以编程方式而非手动方式更新这篇拳击文章。清单\
  \ 1-10 展示了实现此操作的代码。该示例从给定段落中搜索并替换一些常见的误用短语。输出 1-10 显示了运行程序的结果。\n\n清单 1-10: StyleSearchAndReplace.java\n\
  \n| **![开始示例](img/_1.gif)** |\n\n```\npublic class StyleSearchAndReplace{\n  public\
