  \ ***** 字符，只需在你搜索的字符前加上一个 ***\\*** 字符。例如，要查找 ******* 字符，请使用 ***\\****。\n\n### 常见字符与边界字符\n\
  \n正则表达式还包含一些字符，当它们由 ***\\*** 字符分隔时，会具有特殊含义。这些字符有助于查找常见的标记，例如单词边界、空格、制表符、字母数字字符等。例如，***\\\
  n*** 和 ***\\t*** 是分别表示换行符和制表符的特殊字符。\n\n在本节中，我将介绍这些常见的边界字符并提供使用示例。\n\n#### 常见字符\n\
  \n某些类型的字符出现频率很高，以至于正则表达式语言已经发展出引用它们的简写形式。例如，数字由 ***\\d*** 表达式表示。如果没有 ***\\*** 字符来分隔\
  \ ***d***，该表达式就只是指英文字母表中的第四个小写字母。表 1-3 列出了一些常见的字符。\n\n表 1-3：常见字符与边界字符\n\n| **字符**\
  \ | **描述** |\n| --- | --- |\n| . | 匹配任意字符；也可能匹配行终止符。 |\n| \\d | 一个数字 ***[0-9]***。这将匹配从\
