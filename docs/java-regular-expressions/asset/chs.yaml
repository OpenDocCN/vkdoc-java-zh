  | **B** | 字符 *B* |\n| * **用英语描述：** 查找大写 *A* 或大写 *B*。 |\n\n#### 选择字符示例 2\n\n模式 ***anna|marie***\
  \ 将匹配 *anna* 或 *marie*，因为 *anna* 匹配第一个选项，而 *marie* 匹配第二个选项。它不会匹配 *Josie*、*Ralph*\
  \ 或 *Doctor*。表 1-10 剖析了该模式。\n\n表 1-10：模式 *anna|mari*e\n\n| **正则表达式** | **描述** |\n\
  | --- | --- |\n| **anna** | 字符 *a*、*n*、*n* 和 *a*，按顺序排列 |\n| **&#124;** | 或 |\n|\
  \ **marie** | 字符 *m*、*a*、*r*、*i* 和 *e*，按顺序排列 |\n| * **用英语描述：** 查找单词 *anna* 或单词 *marie*。\
  \ |\n\n那么，该模式会将 *annamarie* 作为一个单词匹配吗？简而言之，也许吧。我将在后续章节中提供关于此主题的详细信息，但这里先做一个简要介绍。Java\
  \ 2 企业版 (J2EE) 的正则表达式允许你指定是需要精确匹配还是部分匹配。因此，对于部分匹配，*annamarie* 会匹配模式 ***anna|marie***\
  \ 两次；而对于精确匹配，则完全不匹配。在不深入细节的情况下，`String.matches` 仅提供精确匹配，而 `Matcher` 类可以使用 `find`\
  \ 方法提供更宽松的匹配。\n\n那么模式 ***Miss anna|marie*** 呢？它会匹配 *Miss marie* 和 *Miss anna*，还是只匹配其中一个？或者两者都不匹配？严格匹配会匹配\
  \ *Miss anna*，但拒绝 *Miss marie*。选择符 ***|*** 会将 *Miss anna* 视为一个选项，将模式 *marie* 视为另一个选项。因为模式\
  \ ***maria*** 不等于候选字符串 *Miss maria*，所以搜索会拒绝 *Miss maria*。\n\n### 字符类\n\n有时，你需要将搜索条件描述为一个*类*——即，作为一个共享潜在复杂共性的组，你需要能够描述这些共性，并且没有预定义的类。幸运的是，正则表达式通过字符类提供了一种实现此目的的机制，如表\
  \ 1-11 所示。\n\n表 1-11：字符类\n\n| **模式** | **描述** |\n| --- | --- |\n| [abc] | *a*、*b*\
  \ 或 *c*。（当然，可以使用任何字符，不限于 *a*、*b* 或 *c*。） |\n| ***[^abc]*** | 除 *a*、*b* 或 *c* 之外的任何字符。\
  \ |\n| [a-zA-Z] | *a* 到 *z* 或 *A* 到 *Z*。 |\n| [a-d[m-p]] | *a* 到 *d*，或 *m* 到 *p*：***[a-dm-p]***。\
  \ |\n| [a-z&&[def]] | 两个集合中都存在的字符，即 *d*、*e* 或 *f*。 |\n| [a-z&&[^bc]] | *a* 到 *z*，但排除\
  \ *b* 和 *c*：***[ad-z]***。 |\n| [a-z&&[^m-p]] | *a* 到 *z*，但不包括 *m* 到 *p*：***[a-lq-z]***。\
  \ |\n\n还有一些预定义的 POSIX（可移植操作系统接口）字符类。这些是 ASCII（美国信息交换标准代码）类，经验表明它们特别有用。因此，它们已经就绪，你可以直接引用它们。表\
  \ 1-12 包含了 POSIX 字符类。\n\n表 1-12：POSIX 字符类\n\n| **模式** | **描述** |\n| --- | --- |\n\
  | \\p{Lower} | 小写字母：***[a-z]*** |\n| \\p{Upper} | 大写字母：***[A-Z]*** |\n| \\p{ASCII}\
  \ | 所有 ASCII 字符：***[\\x00-\\x7F]*** |\n| \\p{Alpha} | 大写或小写字母：***[\\p{Lower}\\p{Upper}]***\
  \ |\n| \\p{Digit} | 数字：***[0-9]*** |\n| \\p{Alnum} | 数字或字母：***[\\p{Alpha}\\p{Digit}]***\
  \ |\n| \\p{Punct} | 标点符号：***!\"#$%&'()*+,-./:;<=>?@[\\]^_`{&#124;}~*** 之一 |\n| \\\
  p{Graph} | 任何可见字符：***[\\p{Alnum}\\p{Punct}]*** |\n| \\p{Print} | 可打印字符：***[\\p{Graph}]***\
  \ |\n| \\p{Blank} | 制表符或空格 |\n| \\p{Cntrl} | 控制字符：***[\\x00-\\x1F\\x7F]*** |\n|\
  \ \\p{XDigit} | 十六进制数字：***[0-9a-fA-F]*** |\n| \\p{Space} | 空白字符：***[ *** ***\\t\\\
  n\\x0B\\f\\r]*** |\n\n\n\n#### 简单类示例\n\n让我们逐步看几个简单示例。模式 ***[0-5]*** 将匹配输入中包含 *0*\
  \ 到 *5* 之间任意数字的部分。因此，它将匹配 *0、1、2、3、4* 或 *5*，但不会匹配 *8、6* 或任何非数字字符。表 1-13 对该模式进行了剖析。\n\
  \n表 1-13：模式 *[0-5*]\n\n| **正则表达式** | **描述** |\n| --- | --- |\n| [ | 一个类，包含 |\n|\
  \ 0 | 数字 0 |\n| - | 范围至 |\n| 5 | 数字 5 |\n| ] | 类结束 |\n| * **中文释义：** 查找从 *0* 到 *5*（含\
  \ *0* 和 *5*）的任意数字。 |\n\n#### 否定示例\n\n模式 ***[^A]*** 将匹配除字符 *A* 之外的任何字符。这包括其他字符、空格、制表符、标点符号等。需要注意的是，**^**\
  \ 分隔符只有在类括号内（即 ***[*** 和 ***]*** 括号之间）才具有“非”的含义。在这些括号之外，它表示行首字符。我将在后面更详细地讨论这个主题。表\
  \ 1-14 对该模式进行了剖析。\n\n表 1-14：模式 *[^A*]\n\n| **正则表达式** | **描述** |\n| --- | --- |\n\
  | [ | 一个类，包含 |\n| ^ | 除……之外的任意字符 |\n| A | 字符 *A* |\n| ] | 类结束 |\n| * **中文释义：** 查找除大写字母\
  \ *A* 之外的任意字符。 |\n\n#### 分组\n\n分组是一个子匹配。如果你熟悉 SQL，将分组视为 SQL 中的子查询可能会有所帮助。分组允许你将模式的一部分定义为整体的逻辑子单元，然后引用这些子单元的结果。其语法如下表\
  \ 1-15 所示。\n\n表 1-15：分组\n\n| **正则表达式** | **描述** |\n| --- | --- |\n| ( | 一个组，包含 |\n\
  | … | 任意正则模式 |\n| ) | 组结束 |\n\n#### 分组示例\n\n与大多数事物一样，示例可能比描述更具启发性。考虑模式 ***(\\w+)_(\\\
  w+)@(\\w+)\\.org*** 用于匹配电子邮件模式。表 1-16 对该模式进行了剖析。\n\n表 1-16：模式 *(\\w+)_(\\w+)@(\\\
  w+)\\.or*g\n\n| **正则表达式** | **描述** |\n| --- | --- |\n| ( | 一个组，包含 |\n| \\w | 一个字母数字或下划线字符\
  \ |\n| + | 重复一次或多次 |\n| ) | 组结束 |\n| _ | 后跟一个下划线字符 |\n| ( | 一个组，包含 |\n| \\w | 一个字母数字或下划线字符\
  \ |\n| + | 后跟一个或多个字母数字字符 |\n| ) | 组结束 |\n| @ | 后跟一个 at 符号 |\n| ( | 一个组，包含 |\n| \\\
  w | 一个字母数字或下划线字符 |\n| + | 后跟一个或多个字母数字或下划线字符 |\n| ) | 组结束 |\n| \\. | 后跟句点字符 |\n|\
  \ o | 后跟字符 *o* |\n| r | 后跟字符 *r* |\n| g | 后跟字符 *g* |\n| * **中文释义：** 查找一组字母数字字符，后跟\
  \ *_*，再后跟一组字母数字字符，后跟 *@*，再后跟一组字母数字字符，最后跟 .*org*。 |\n\n## 将 Java 与正则表达式集成\n\n到目前为止，你几乎只使用了正则表达式，但并未真正与\
  \ Java 结合。现在是时候考虑两者如何交互了。以下示例与前面的示例不同，因为它们将 Java 代码与正则表达式结合在了一起。它们更全面地展示了如何使用一些\
  \ J2SE 正则表达式语法。\n\n你将在此看到的一些正则表达式比之前看到的示例稍微高级一些，因为它们建立在本章迄今讨论的基础之上。例如，清单 1-2 将分组与量词结合在了一起。\n\
  \n清单 1-2：MatchPhoneNumber.java\n\n| **![示例开始](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\n\
  public class MatchPhoneNumber{\n   public static void main(String args[]){\n   \
  \   isPhoneValid(args[0]);\n   }\n\n   /**\n   * 确认给定电话号码的格式是否有效。\n   * @param phone\
  \ 是一个表示电话号码的字符串。\n   * @returns 如果电话号码格式可接受则返回 true。\n   */\n   public static boolean\
  \ isPhoneValid(String phone){\n      boolean retval=false;\n\n      String phoneNumberPattern\
  \ =\n        \"(\\\\d-)?(\\\\d{3}-)?\\\\d{3}-\\\\d{4}\";\n\n      retval= phone.matches(phoneNumberPattern);\n\
  \n      // 准备一条指示成功或失败的消息\n      String msg = \"   不匹配: 模式:\" + phone\n        \
  \     + \"\\r\\n             正则: \" + phoneNumberPattern;\n\n      if (retval){\n\
  \      msg = \"   匹配   : 模式:\" + phone\n          + \"\\r\\n             正则: \"\
  \ + phoneNumberPattern;\n      }\n\n      System.out.println(msg +\"\\r\\n\");\n\
  \      return retval;\n   }\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n如果这些模式现在对你来说不完全清晰，请不要气馁。随着你继续阅读本书，你会逐渐形成直观的理解。请专注于这些概念，并熟悉\
  \ Java 代码与正则表达式如何相辅相成。\n\n要充分利用以下示例，你只需要了解两点信息：\n\n*   任何以 **\\** 分隔的正则表达式元字符在 Java\
  \ 代码中使用时，都需要再次进行转义。因此，***\\d*** 在 Java 代码中变为 ***\\\\d***，***\\s*** 变为 ***\\\\s***。相应地，更复杂的表达式如\
  \ ***(\\d-)?(\\d{3}-)?\\d{3}-\\d{4}\\s*** 在 Java 代码中变为 ***(\\\\d-)?(\\\\d{3}-)?\\\
  \\d{3}-\\\\d{4}\\\\s***。所有 ***\\*** 字符在用于 String 对象时都需加倍以产生 ***\\\\***。\n\n*   在本书中，当我单独讨论正则表达式本身时，我不使用双重转义机制。但在处理具体编码示例时，我会使用。\n\
  \n*   `String.matches(String regex)` 方法是添加到 String 类中的一个新方法。它将调用该方法的字符串与给定的正则表达式\
  \ `regex` 进行比较，如果正则模式*完全*匹配该字符串，则返回 true。完全匹配意味着所讨论的字符串不能包含任何未被正则模式涵盖的字符——甚至包括换行符和空格等不可见字符。\n\
  \n\n\n### 验证电话号码格式示例\n\n清单 1-2 中的代码仅用于判断给定的电话号码是否符合格式良好的标准。它利用了表 1-6 中介绍的两个元字符。具体来说，它使用了范围限定符\
  \ ***{n,m}***，表示前面的字符或类必须至少重复 *n* 次，最多重复 *m* 次。它还使用了字符 `?`，表示前面的字符或类必须出现零次或一次。\n\
  \n整个模式用于检查一个七位数字，其前面可以带有可选的国家代码和区号。输出 1-2 显示了运行程序的结果，表 1-19 则对该模式进行了剖析。\n\n表 1-19：模式\
  \ *(\\d-)?(\\d{3}-)?\\d{3}-\\d{4}*\n\n| **正则表达式** | **描述** |\n| --- | --- |\n| (\
  \ | 一个分组，包含 |\n| \\d | 一个数字 |\n| - | 后跟一个连字符 (-) |\n| ) | 该分组结束 |\n| ? | 查找前面元素出现零次或一次\
  \ |\n| ( | 后跟一个分组，包含 |\n| \\d | 一个数字 |\n| { | 至少重复 |\n| 3 | 三次 |\n| } | 重复结束 |\n\
  | - | 后跟一个连字符 |\n| ) | 该分组结束 |\n| ? | 查找前面元素出现零次或一次 |\n| \\d | 后跟一个数字 |\n| { | 至少重复\
  \ |\n| 3 | 三次 |\n| } | 重复结束 |\n| - | 后跟一个连字符 |\n| \\d | 后跟一个数字 |\n| { | 至少重复 |\n\
  | 4 | 四次 |\n| } | 重复结束 |\n| * **中文释义：** 查找一个数字后跟一个连字符。这部分是可选的。然后，查找三个数字后跟一个连字符。这部分也是可选的。接下来，查找三个数字，后跟一个连字符，再后跟四个数字。\
