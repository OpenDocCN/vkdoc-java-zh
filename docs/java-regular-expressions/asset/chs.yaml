  \ |\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n### 量词与选择符\n\
  \n*量词*和*选择符*允许你指定需要查找的令牌数量或你愿意接受的替代令牌。表 1-6 列出了正则表达式中的一些量词和选择符。\n\n表 1-6：量词\n\n\
  | **正则表达式** | **描述** |\n| --- | --- |\n| **?** | 前面的元素重复一次或不重复。 |\n| ***** | 前面的元素重复零次或多次。\
  \ |\n| **+** | 前面的元素重复一次或多次。 |\n| **{n}** | 前面的元素恰好重复 *n* 次。 |\n| **{n,}** | 前面的元素至少重复\
  \ *n* 次。 |\n| **{n,m}** | 前面的元素至少重复 *n* 次，但不超过 *m* 次。包括 *m* 次重复。 |\n| **&#124;**\
