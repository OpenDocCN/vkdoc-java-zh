  \ static boolean containsSubtring( String candidate, String subStringPattern, int\
  \ n ) 其次，添加以粗体显示的循环：boolean retval = false; //编译模式 Pattern pattern = Pattern.compile(subStringPattern);//查看候选字符串的任何部分是否包含该\
  \ //描述 Matcher matcher = pattern.matcher(candidate); for (int i=0; i- n; i++) {\
