  ### public int groupCount()\n\n此方法简单地返回 Pattern 定义的组数。在清单 2-15 中，`groupCount` 方法显示了给定模式可能具有的组数。\n\
  \n清单 2-15：MatcherGroupCountExample 示例\n\n| **![示例开始](img/_1.gif)** |\n\n```\nimport\
  \ java.util.regex.*;\n/**\n * 演示 Matcher.groupCount() 方法的使用\n */\npublic class MatcherGroupCountExample{\n\
  \  public static void main(String args[]){\n     test();\n  }\n  public static void\
  \ test(){\n      //创建一个 Pattern\n      Pattern p = Pattern.compile(\"B(ond)\");\n\
  \n      //创建一个 Matcher 并使用 Matcher.group() 方法\n      String candidateString = \"\
  My name is Bond. James Bond.\";\n      Matcher matcher = p.matcher(candidateString);\n\
  \n      //提取可能的组数。\n      //需要注意的是，这仅代表可能的组数：\n      //而不是在候选字符串中实际找到的组数\n     \
  \ int numberOfGroups = matcher.groupCount();\n      System.out.println(\"numberOfGroups\
  \ =\"+numberOfGroups);\n  }\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n关于此方法，有一个非常重要且有点反直觉的细微差别需要注意。它基于原始\
  \ Pattern 返回可能的组数，甚至不考虑候选字符串。因此，它实际上不是关于 Matcher 对象的信息；而是关于生成它的 Pattern 的信息。这可能很棘手，因为此方法存在于\
  \ Matcher 对象上这一事实可能被解释为它在提供关于 Matcher 状态的反馈。但事实并非如此。它告诉你的是，对于给定的 Pattern，理论上可能有多少个匹配项。\n\
  \n### public boolean matches()\n\n此方法旨在帮助你根据 Matcher 的 Pattern 匹配候选字符串。当且仅当所考虑的候选字符串与模式完全匹配时，它才返回\
  \ true。\n\n清单 2-16 演示了如何使用此方法。三个字符串，*j2se*、*J2SE* 和 *J2SE*（注意 *E* 后面的空格），与模式 *J2SE*\
  \ 进行比较。\n\n清单 2-16：Matcher.matches 示例\n\n| **![示例开始](img/_1.gif)** |\n\n```\n import\
  \ java.util.regex.*;\n/**\n * 演示 Matcher.matches 方法的使用\n */\npublic class MatcherMatchesExample{\n\
  \  public static void main(String args[]){\n      test();\n  }\n  public static\
  \ void test(){\n     //创建一个 Pattern\n      Pattern p = Pattern.compile(\"J2SE\"\
  );\n\n     //创建候选字符串\n     String candidateString_1 = \"j2se\";\n     String candidateString_2\
  \ = \"J2SE \";\n     String candidateString_3 = \"J2SE\";\n\n     //尝试匹配候选字符串。\n\
  \     Matcher matcher_1 = p.matcher(candidateString_1);\n     Matcher matcher_2\
  \ = p.matcher(candidateString_2);\n     Matcher matcher_3 = p.matcher(candidateString_3);\n\
  \n     //显示第一个候选字符串的输出\n     String msg = \":\" + candidateString_1 + \": 匹配?: \"\
  ;\n     System.out.println(msg + matcher_1.matches());\n\n     //显示第二个候选字符串的输出\n\
  \     msg = \":\" + candidateString_2 + \": 匹配?: \";\n     System.out.println(msg\
  \ + matcher_2.matches());\n\n     //显示第三个候选字符串的输出\n     msg = \":\" + candidateString_3\
  \ + \": 匹配?: \";\n     System.out.println(msg + matcher_3.matches());\n  }\n}\n\
  ```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n这里三个候选字符串中只有一个成功匹配。*j2se* 被拒绝，因为大小写错误。*J2SE*\
  \ 再次被拒绝，因为它在 *E* 后面包含一个空格字符，这意味着它不是完全匹配。唯一完全匹配的是 *J2SE*。\n\n\n\n### public boolean\
  \ find()\n\n`find()` 方法会解析候选字符串中足够的部分以查找匹配项。如果成功找到这样的子字符串，则返回 `true`，并且 `find` 停止解析候选字符串。如果候选字符串中没有部分与模式匹配，则\
  \ `find` 返回 `false`。\n\n因此，对于模式\n\n```\nPattern p = Pattern.compile(\"Bond\");\n\
  ```\n\n和候选字符串 *My name is Bond. James Bond*。\n\n```\nMatcher matcher = p.matcher(\"\
  My name is Bond. James Bond\");\n```\n\n调用 `find()` 会解析 *My name is Bond. James\
  \ Bond*，直到子字符串 *My name is* *Bond* 遇到第一个 *Bond*，如下所示：\n\n![](img/fig111_01.jpg)\n\
  \n框选部分是已解析的候选字符串部分；因此，这也是我们将要关注的 `start`、`end` 或 `group` 方法所调用的部分。为什么？因为 `find`\
  \ 方法只需解析到 *Bond* 中的 *d* 即可找到匹配项。完成该任务后，`find` 方法不会浪费资源去解析候选字符串的其余部分。\n\n调用 `find`\
  \ 是使用 `start`、`end` 和 `group` 等方法之前必要的准备工作。如果没有先调用 `find`，调用这些方法将会抛出 `IllegalStateException`。\n\
  \n此方法的一个常见用途是作为 `while` 循环中的控制条件，这样就不会在可能抛出 `IllegalStateException` 时调用 `start`、`end`\
  \ 或 `group` 方法。清单 2-17 是一个简单正则表达式的示例，它循环遍历字符串 *I* *love Java. Java is my favorite\
  \ language. Java Java* *Java*。并查找模式 ***Java***。\n\n清单 2-17：使用 find() 方法\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\nimport java.util.regex.*;\n/**\n * 演示 Matcher.find 方法的使用\n */\npublic\
  \ class MatcherFindExample{\n  public static void main(String args[]){\n      test();\n\
  \  }\n  public static void test(){\n     //创建一个 Pattern\n      Pattern p = Pattern.compile(\"\
  Java\");\n\n     //创建候选字符串\n     String candidateString =\n      \"I love Java.\
  \ Java is my favorite language. Java Java Java.\";\n\n     //尝试匹配候选字符串。\n     Matcher\
  \ matcher = p.matcher(candidateString);\n\n     //循环并显示所有匹配项\n     while (matcher.find()){\n\
  \        System.out.println(matcher.group());\n     }\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
  \ |\n\n|  |\n\n在此示例中，候选字符串是\n\n```\n String candidateString =\n      \"I love Java.\
  \ Java is my favorite language. Java Java Java.\";\n```\n\n当首次进入 `while` 循环时，会立即在\
  \ `Matcher` 上调用 `find()`，这会导致下图中框选区域的出现。在该框选区域内，匹配的部分被圈出，如下面的图片所示。\n\n框选区域是已解析的区域，圈出部分是匹配的子字符串：\n\
  \n![点击展开](img/fig112_01_0.jpg)\n\n框选区域是下一个被解析的区域，圈出部分是匹配的子字符串：\n\n![点击展开](img/fig112_02_0.jpg)\n\
  \n框选区域是下一个被解析的区域，圈出部分是匹配的子字符串：\n\n![点击展开](img/fig112_03_0.jpg)\n\n框选区域是下一个被解析的区域，圈出部分是匹配的子字符串：\n\
  \n![点击展开](img/fig112_04_0.jpg)\n\n框选区域是下一个被解析的区域，圈出部分是匹配的子字符串：\n\n![点击展开](img/fig113_01_0.jpg)\n\
  \n### public boolean find(int start)\n\n`find(int start)` 方法的工作方式与其重载版本完全相同，只是它指定了开始搜索的位置。`start`\
  \ 中的 `int` 参数只是告诉 `Matcher` 从哪个字符开始搜索。\n\n因此，对于候选字符串 *I* *love Java. Java is my\
  \ favorite language. Java* *Java Java*。和模式 ***Java***，如果你只想从字符索引 11 开始搜索，则使用命令 `find(11)`。下图中框选的是已解析的区域，实际匹配的组被圈出：\n\
  \n![点击展开](img/fig113_02_0.jpg)\n\n如果给定的索引大于候选字符串的长度，则此方法将抛出 `IndexOutOfBoundsException`。因此，对于前面的候选字符串，调用\
  \ `find(58)` 将导致 `IndexOutOfBoundsException`，因为该字符串的长度只有 57。\n\n你也可以使用此方法来设置搜索的起始点。因此，你可以执行\
  \ `find(11)` 从字符 11 开始搜索，然后使用 `find(0)` 从字符 0 开始搜索。\n\n清单 2-18 提供了一个示例，针对候选字符串 *I*\
  \ *hate mice. I really* *hate MICE*。和模式 ***MICE***，其中比较是**不区分大小写**的。代码使用不区分大小写的比较来演示第一个匹配项实际上是字符编号\
  \ 11 之后匹配的字符串。\n\n清单 2-18：使用 find(int) 方法\n\n| **![开始示例](img/_1.gif)** |\n\n```\n\
  import java.util.regex.*;\n/**\n * 演示 Matcher.find(int) 方法的使用\n */\npublic class\
  \ MatcherFindParamExample{\n  public static void main(String args[]){\n      test();\n\
  \  }\n  public static void test(){\n     //创建一个 Pattern\n      Pattern p = Pattern.compile(\"\
  mice\", Pattern.CASE_INSENSITIVE);\n\n     //创建候选字符串\n     String candidateString\
  \ =\n      \"I hate mice. I really hate MICE.\";\n\n     //尝试匹配候选字符串。\n     Matcher\
  \ matcher = p.matcher(candidateString);\n\n     //显示后面的匹配项\n     System.out.println(candidateString);\n\
  \     matcher.find(11);\n     System.out.println(matcher.group());\n\n     //显示前面的匹配项\n\
  \     System.out.println(candidateString);\n     matcher.find(0);\n     System.out.println(matcher.group());\n\
  \  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n当你执行 `find(11)` 方法时，搜索区域从字符\
  \ 11 开始，如下图所示：\n\n![](img/fig114_01.jpg)\n\n接下来，你执行 `find(0)`，这会将搜索索引移回 0。下图说明了由此产生的搜索区域：\n\
  \n![](img/fig114_02.jpg)\n\n\n\n### public boolean lookingAt()\n\n`lookingAt()`\
  \ 方法是 `matches` 方法的一个更宽松的版本。它仅需将字符串与模式进行最少量的比较即可实现匹配。如果存在这样的子串，则此方法返回 `true`。\n\n\
  因此，对于模式 ***J2SE***\n\n```\nPattern = Pattern.compile(\"J2SE\"); \n```\n\n和候选字符串\
  \ *J2SE is the only one for me*\n\n```\nMatcher matcher_1 = Pattern.matcher(\"J2SE\
  \ is the only one for me\");\n```\n\n`lookingAt` 方法返回 `true`。然而，对候选字符串 *For me,\
  \ it's J2SE, or nothing at all* 调用 `lookingAt()`\n\n```\nMatcher matcher_2 = Pattern.matcher(\"\
  For me, it's J2SE, or nothing at all\");\n```\n\n将返回 `false`，因为 *For me, it's J2SE,\
  \ or nothing at all* 的开头部分与模式 ***J2SE*** 不匹配。\n\n与 `matches` 方法类似，`lookingAt` 方法总是从输入序列的开头开始查看候选字符串；但与\
  \ `matches` 不同的是，`lookingAt` 方法不要求整个输入序列都匹配。如果匹配成功，则可以通过使用 `start`、`end` 和 `group`\
  \ 方法来获取更多信息。清单 2-19 提供了一个使用 `lookingAt` 方法的示例。\n\n清单 2-19：使用 lookingAt 方法\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\nimport java.util.regex.*;\n/**\n * 演示 Matcher.LookingAt 方法的用法\n */\n\
  public class MatcherLookingAtExample{\n  public static void main(String args[]){\n\
  \      test();\n  }\n  public static void test(){\n     //创建一个 Pattern\n      Pattern\
  \ p = Pattern.compile(\"J2SE\");\n\n     //创建候选字符串\n     String candidateString_1\
  \ = \"J2SE is the only one for me\";\n     String candidateString_2 =\n      \"\
  For me, it's J2SE, or nothing at all\";\n     String candidateString_3 = \"J2SEistheonlyoneforme\"\
  ;\n\n     //尝试匹配候选字符串。\n     Matcher matcher = p.matcher(candidateString_1);\n \
  \    //显示候选字符串的输出\n     String msg = \":\" + candidateString_1 + \": matches?: \"\
  ;\n     System.out.println(msg + matcher.lookingAt());\n     matcher.reset(candidateString_2);\n\
  \     //显示候选字符串的输出\n     msg = \":\" + candidateString_2 + \": matches?: \";\n \
  \    System.out.println(msg + matcher.lookingAt());\n\n     matcher.reset(candidateString_3);\n\
  \     //显示候选字符串的输出\n     msg = \":\" + candidateString_3 + \": matches?: \";\n \
  \    System.out.println(msg + matcher.lookingAt());\n\n     /*\n     *返回结果\n   \
  \  *:J2SE is the only one for me: matches?: true\n     *:For me, it's J2SE, or nothing\
  \ at all: matches?: false\n     *:J2SEistheonlyoneforme: matches?: true\n     */\n\
  \  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n### public Matcher appendReplacement\
  \ (StringBuffer sb, String replacement)\n\n有时，在处理正则表达式时，你可能会更倾向于使用 `StringBuffer`\
  \ 而不是 `String`。这可能是出于性能、实用性或其他原因。幸运的是，`java.util.regex` 包提供了 `appendReplacement`\
  \ 和 `appendTail` 方法来实现这一点。本节重点介绍 `appendReplacement` 方法。\n\n简单来说，`appendReplacement`\
  \ 允许你根据 `Pattern` 和 `Matcher` 对象的内容创建一个 `StringBuffer`。假设你想在 *My name is Bond. James\
  \ Bond. I would like a martini.* 中将 *Smith* 替换为 *Bond*，并且希望将结果存储在 `StringBuffer`\
  \ 中。要使用 `appendReplacement`，你必须首先创建一个 `Pattern` 和一个对应的 `Matcher`。出于本例的目的，你将使用 ***Bond***：\n\
  \n```\nPattern pattern = Pattern.compile(\"Bond\");\n```\n\n同时，你将使用候选字符串 *My name\
  \ is Bond. James Bond. I would like a martini.*：\n\n```\nMatcher matcher =\n pattern.matcher(\"\
  My name is Bond. James Bond. I would like a martini.\");\n```\n\n接下来，你调用 `find`\
  \ 方法，以便 `Matcher` 可以开始解析候选字符串。第一次调用 `find` 时，`Matcher` 仅解析候选字符串中足够的部分，以找到第一个匹配项（如果存在）。这个已解析的区域在下图中用方框标出：\n\
  \n![点击展开](img/fig117_01_0.jpg)\n\n回想一下，方框区域是 `Matcher` 当前唯一知晓的候选字符串部分。\n\n然后，你将调用\
  \ `appendReplacement` 方法，该方法会用上图中方框区域内的所有内容填充 `StringBuffer sb`，但会将 *Smith* 替换为\
  \ *Bond*。因此，你的 `StringBuffer` 现在包含 *My name is Smith*。\n\n最后还有一点需要提及。在内部，`Matcher`\
  \ 对象维护着一个 *追加位置*。这个追加位置是 `Matcher` 对象为了 `StringBuffer` 对象而维护的状态信息。它记录了上一次调用 `appendReplacement`\
  \ 时从 `StringBuffer` 中读取的位置。当然，追加位置初始为 0，如下图所示：\n\n![点击展开](img/fig117_02_0.jpg)\n\
  \n调用 `appendReplacement` 后，追加位置会向前移动到匹配项之后，如下图所示。这个位置与 `matcher.end()` 方法返回的位置相同。\n\
  \n![点击展开](img/fig117_03_0.jpg)\n\n接下来，你再次调用 `matcher.find()`，使得当前考虑的位置变为下图中高亮显示的方框区域：\n\
  \n![点击展开](img/fig117_04_0.jpg)\n\n然后，你再次调用 `appendReplacement`，从而将 . *James Smith*\
  \ 追加到 `StringBuffer` 中。请记住，因为这是一个替换方法，它会自动将 *Bond* 替换为 *Smith*。`StringBuffer` 的内容变为\
  \ *My name is* *Smith. James Smith*，并且追加位置向前移动，如下图所示：\n\n![点击展开](img/fig118_01_0.jpg)\n\
  \n你的任务完成了。完整的代码清单显示在清单 2-20 中。\n\n清单 2-20：appendReplacement 方法示例\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\nimport java.util.regex.*;\nimport java.util.*;\n/**\n * 演示 Matcher.appendReplacement\
  \ 方法的用法\n */\npublic class Scrap{\n  public static void main(String args[]){\n \
  \     test();\n  }\n  public static void test(){\n     //创建一个 Pattern\n      Pattern\
  \ p = Pattern.compile(\"Bond\");\n      //创建一个 StringBuffer\n      StringBuffer\
  \ sb =new StringBuffer();\n\n//创建候选字符串\n     String candidateString =\n     \"My\
  \ name is Bond. James Bond. I would like a martini.\";\n\nString replacement = \"\
  Smith\";\n     //尝试匹配第一个候选字符串\n     Matcher matcher = p.matcher(candidateString);\n\
  \     matcher.find();\n\n//填充 StringBuffer\n     matcher.appendReplacement(sb,replacement);\n\
  \     //尝试匹配第二个候选字符串\n     Matcher matcher = p.matcher(candidateString);\n     matcher.find();\n\
  \n//填充 StringBuffer\n     matcher.appendReplacement(sb,replacement);\n\n//显示候选字符串的输出\n\
  \     String msg = sb.toString();\n\nSystem.out.println(msg.length());\n     System.out.println(msg);\n\
  \  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n\n\n#### 特别说明\n\n`appendReplacement`\
  \ 方法功能强大。如你所知，能力越大，细节差异越微妙。通过使用表达式 ***$d***（其中 ***d*** 是一个小于或等于上一次匹配中分组数量的数字），你实际上可以在搜索中嵌入并重组子组。例如，假设你的模式是\
  \ ***(James) (Bond)***：\n\n```\nPattern p = Pattern.compile(\"(James) (Bond)\");\n\
  ```\n\n你的候选字符串是 *My name is Bond. James Bond.*\n\n```\nString candidateString =\
  \ \"My name is Bond. James Bond.\";\n```\n\n并且你想插入中间名 *Waldo*。你的替换字符串可能如下所示：\n\n\
  ```\nString replacement = \"$1 Waldo $2\";\n```\n\n其中 ***$1*** 指向第一个匹配的子组 *James*，***$2***\
  \ 指向第二个匹配的子组 *Bond*。\n\n在这种情况下，`StringBuffer` 将包含值 *My name is Bond. James Waldo\
  \ Bond..* 清单 2-20 给出了一个完整的工作示例。\n\n清单 2-20：使用带子组替换的 appendReplacement\n\n| **![示例开始](img/_1.gif)**\
  \ |\n\n```\nimport java.util.regex.*;\nimport java.util.*;\n/**\n * 演示 Matcher.appendReplacement\
  \ 方法\n * 与子组替换的用法。\n */\npublic class MatcherAppendReplacementGroupExample{\n  public\
  \ static void main(String args[]){\n      test();\n  }\n  public static void test(){\n\
  \     //创建一个 Pattern\n      Pattern p = Pattern.compile(\"(James) (Bond)\");\n \
  \     //创建一个 StringBuffer\n      StringBuffer sb =new StringBuffer();\n\n     //创建候选字符串\n\
  \     String candidateString =\n     \"My name is Bond. James Bond.\";\n\n     String\
  \ replacement = \"$1 Waldo $2\";\n     //尝试匹配第一个候选字符串\n     Matcher matcher = p.matcher(candidateString);\n\
  \     matcher.find();\n\n     //填充 StringBuffer\n     matcher.appendReplacement(sb,replacement);\n\
  \n     //显示候选字符串的输出\n     String msg = sb.toString();\n     System.out.println(msg);\n\
  \  }\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n如果尚未调用 `find()` 或 `find`\
  \ 返回 false，`appendReplacement` 方法将抛出 `IllegalStateException`。如果 ***$1***、***$2***\
  \ 等引用的捕获组在 Matcher 当前正在检查的模式部分中不存在，它将抛出 `IndexOutOfBoundsException`。\n\n### public\
  \ StringBuffer appendTail(StringBuffer sb)\n\n`appendTail` 方法是 `appendReplacement`\
  \ 方法的补充。它只是将原始候选字符串中所有剩余的后续子序列追加到 `StringBuffer` 中。它从追加位置（我在 `appendReplacement`\
  \ 部分解释过）读取，直到候选字符串的末尾。\n\n在前面给出的 `appendReplacement` 示例中，你在字符串 *My name is Bond.\
  \ James Bond. I would like a martini.* 中将 *Bond* 替换为 *Smith*。完成后，你得到了一个包含值 *My name\
  \ is Smith. James Smith* 的 `StringBuffer`。\n\n这就是 `appendReplacement` 方法能为你完成的所有工作，因为它基于一次成功的匹配，而在单词\
  \ *Bond* 第二次出现中的 *d* 之后，再也找不到更多成功的匹配了。第二次调用 `appendReplacement` 后 Matcher 的状态如下图所示：\n\
  \n![点击展开](img/fig121_01_0.jpg)\n\n相应地，通过使用 `appendReplacement` 创建的 `StringBuffer`\
  \ 只会包含短语 *My name is Smith. James Smith*。`appendTail` 方法只是将字符串的其余部分，即 *. I would\
  \ like a martini.*，追加到 `StringBuffer` 缓冲区中。然后返回同一个 `StringBuffer`。\n\n### public\
  \ String replaceAll(String replacement)\n\n这个方法是我最喜欢的新增功能之一，无论是其功能还是其直观的应用程序编程接口（API）。`replaceAll`\
  \ 方法只是返回一个字符串，该字符串将描述内容的每一次出现都替换为替换内容。\n\n假设你有字符串 *I love ice. Ice is my favorite.\
  \ Ice Ice Ice.*，并且你想将 *ice* 或 *Ice* 的每一次出现都替换为单词 *Java*。第一步是描述你要查找的单词。在这种情况下，因为你想要匹配大写\
  \ *Ice* 和小写 *ice*，你将使用正则表达式模式 ***(i|I)ce***：\n\n```\nPattern pattern = Pattern.compile(\"\
  (i|I)ce\");\n```\n\n接下来，使用候选字符串获取一个 Matcher：\n\n```\nMatcher matcher = pattern.matcher(\"\
  I love ice. Ice is my favorite. Ice Ice Ice.\"); \n```\n\n最后，进行替换：\n\n```\nString\
  \ tmp = matcher.replaceAll(\"Java\");\n```\n\n现在字符串 tmp 保存了值 *I love Java. Java\
  \ is my favorite. Java Java Java.* 清单 2-21 给出了这个示例的完整代码。\n\n清单 2-21：replaceAll 方法示例\n\
  \n| **![示例开始](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\nimport java.util.*;\n\
  /**\n * 演示 Matcher.replaceAll 方法的用法\n */\npublic class MatcherReplaceAllExample{\n\
  \  public static void main(String args[]){\n      test();\n  }\n  public static\
  \ void test(){\n     //创建一个 Pattern\n      Pattern p = Pattern.compile(\"(i|I)ce\"\
  );\n\n     //创建候选字符串\n     String candidateString =\n     \"I love ice. Ice is my\
  \ favorite. Ice Ice Ice.\";\n\n     Matcher matcher = p.matcher(candidateString);\n\
  \     String tmp = matcher.replaceAll(\"Java\");\n\n     System.out.println(tmp);\n\
  \  }\n} \n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n|  | 警告  | 使用此方法将更改 Matcher\
  \ 对象的状态。具体来说，将调用 reset 方法。因此，就好像所有 start、end、group 和 find 调用都未被调用过一样。 |\n\n与 `appendReplacement`\
  \ 方法类似，`replaceAll` 方法可以通过使用 ***$*** 符号包含对子字符串的引用。有关详细信息，请参阅本章前面介绍的 `appendReplacement`\
  \ 文档。\n\n\n\n### public String replaceFirst(String replacement)\n\n`replaceFirst`\
  \ 方法是 `replaceAll` 方法的一个更专注的版本。该方法返回一个字符串，将描述内容的*第一次*出现替换为指定的替换字符串。\n\n假设你有一个候选字符串\
  \ *I love ice. Ice is my favorite. Ice Ice Ice.*，并且你想将 *ice* 或 *Ice* 的第一次出现替换为单词\
  \ *Java*。同样，你的第一步是描述你要查找的单词。在这种情况下，由于你想同时匹配大写的 *Ice* 和小写的 *ice*，你使用正则表达式模式 ***(i|I)ce***：\n\
  \n```\nPattern pattern = Pattern.compile(\"(i|I)ce\");\n```\n\n接下来，使用候选字符串获取一个 `Matcher`：\n\
  \n```\nMatcher matcher = pattern.matcher(\"I love ice. Ice is my favorite. Ice Ice\
  \ Ice.\");\n```\n\n最后，执行替换：\n\n```\nString tmp = matcher.replaceFirst(\"Java\");\n\
  ```\n\n字符串 `tmp` 保存的值为 *I love Java. Ice is my favorite. Ice Ice Ice.*。清单 2-22 展示了此示例的完整代码。\n\
  \n清单 2-22：replaceFirst 方法示例\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\n\
  import java.util.*;\n/**\n * 演示 Matcher.replaceFirst 方法的使用\n */\npublic class MatcherReplaceFirstExample{\n\
  \  public static void main(String args[]){\n      test();\n  }\n  public static\
  \ void test(){\n     //创建一个 Pattern\n      Pattern p = Pattern.compile(\"(i|I)ce\"\
  );\n\n     //创建候选字符串\n     String candidateString =\n     \"I love ice. Ice is my\
  \ favorite. Ice Ice Ice.\";\n\n     Matcher matcher = p.matcher(candidateString);\n\
  \     String tmp = matcher.replaceFirst(\"Java\");\n\n     System.out.println(tmp);\n\
  \  }} \n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n|  | 警告  | 使用此方法将更改你的 `Matcher`\
  \ 对象的状态。具体来说，会调用 `reset` 方法。因此，请记住，所有 `start`、`end`、`group` 和 `find` 调用都必须重新执行。\
  \ |\n\n与 `appendReplacement` 方法类似，`replaceFirst` 方法可以通过使用 ***$*** 符号来包含对子字符串的引用。有关详细信息，请参阅本章前面介绍的\
  \ `appendReplacement` 文档。\n\n## 新的 String 正则友好方法\n\n将正则表达式引入 J2SE 所带来的最明显的变化之一是在\
  \ `String` 类中增加了五个强大的新方法。在接下来的章节中，我将讨论这些变化，并指导你如何在未来的编码实践中使用它们。\n\n### 字符串定界艺术\n\
  \n当你使用正则表达式和 `String` 对象时，有一个非常重要的注意事项需要牢记：特殊字符，例如数字 ***\\d*** 和单词标记 ***\\w***（仅举几例），在传入\
  \ `String` 时必须进行两次定界。例如，要搜索一个数字，你必须将使用的 *\\* 字符数量加倍。因此，当你在 Java `String` 对象中使用时，***\\\
  d*** 变成了 ***\\\\d***。\n\n这听起来并不复杂，但有时处理起来却出奇地困难。例如，假设你想将 *I want to use a d character*\
  \ 中字符 *d* 的每次出现替换为 *\\d*。也就是说，你希望新的字符串变成 *I want to use a \\d character*。你该如何开始？\n\
  \n当然，你可以尝试这样做：\n\n```\nString retval  = tmp.replaceAll(\"d\",\"\\d\");\n```\n\n\
  这会导致编译失败，并出现非法转义字符错误。好吧，那么你将 *\\* 字符加倍，得到以下内容：\n\n```\nString retval  = tmp.replaceAll(\"\
  d\",\"\\\\d\");\n```\n\n这可以编译通过，但返回了一个奇怪的结果：没有任何变化。这是怎么回事？\n\n等等——回想一下，***\\\\d***\
  \ 作为正则表达式，并不意味着一个定界的 *d* 字符；它表示一个数字。嗯，那当然行不通。你的候选字符串中没有数字。尝试添加另一个 *\\* 字符来定界 ***\\\
  \\\\d***：\n\n```\nString retval  = tmp.replaceAll(\"d\",\"\\\\\\d\");\n```\n\n这再次导致编译失败，并出现非法转义字符错误。这真令人沮丧。本书前面的内容不是说在尝试定界特殊字符时要添加一个\
  \ *\\* 字符吗？\n\n嗯，实际上，并没有。本书前面的内容说的是将 *\\* 字符的数量*加倍*。因为当前有两个 *\\* 字符，将它们加倍会得到 ***\\\
  \\\\\\d*** 作为表达式。看起来很奇怪，但无论如何试试看：\n\n```\nString retval  = tmp.replaceAll(\"d\"\
  ,\"\\\\\\\\d\");\n```\n\n令人惊讶的是，它竟然成功了！但为什么它能成功？因为 ***\\\\\\\\d*** 中的第一个 *\\* 充当了第二个\
  \ *\\* 的定界符。类似地，第三个 ***\\*** 充当了第四个 *\\* 字符的定界符。\n\n好了，现在一切都清楚了。尝试将 *I want to use\
  \ a $ character* 中的 *$* 替换掉，使得结果字符串变为 *I want to use a \\$ character*。有关解决方案，请参阅本章末尾的常见问题解答部分。\n\
  \n### public boolean matches(String regex)\n\n`String.matches` 方法可能是你最常使用的正则表达式方法。它只是将给定的字符串与一个候选正则表达式进行比较，如果两者在正则表达式意义上*完全*匹配，则返回\
  \ `true`。例如，对于字符串\n\n```\nString num = \"4\";\n```\n\n将 *4* 与表示单个数字的 ***\\d*** 进行比较，将返回\
  \ `true`：\n\n```\nnum.matches(\"\\\\d\");\\\\返回 true\n```\n\n然而，将 *4*（即 *4* 后跟一个空格）与数字\
  \ ***\\d*** 进行比较，将返回 `false`。类似地，将 *4*（即 *4* 后面没有空格）与 ***\\d***（即一个数字后跟一个空格）进行比较，也将返回\
  \ `false`。\n\n这里的要点是，当你使用此方法时，*必须小心，确保正则表达式完整地描述了整个* String *，并且没有描述任何不属于该* String\
  \ *的内容*。即使是一个空格，根据前面的例子，也可能使你的匹配出现偏差。\n\n在幕后，此方法实例化一个 `Pattern` 对象，并简单地传递到前面讨论过的\
  \ `Pattern.matches` 方法。如果你将要执行大量的 `matches` 操作，你可能会发现显式创建 `Pattern` 和 `Matcher`\
  \ 对象并直接使用它们会更高效。\n\n如果传入的正则表达式无效，则此方法将抛出 `PatternSyntaxException` 错误。如果正则表达式为 `null`，`matches`\
  \ 将抛出 `NullPointerException`。\n\n### public String replaceFirst (String regex, String\
  \ replacement)\n\n`String.replaceFirst` 方法将正则表达式描述的第一次出现替换为此方法的第二个参数所表示的字符串。因此，对于字符串\
  \ `tmp`\n\n```\nString tmp = \"I want to eat 5 hamburgers, 7 days a week\";\n```\n\
  \n命令\n\n```\nString newTmp = tmp.replaceFirst(\"\\d\",\"900\");\n```\n\n将 `newTmp`\
  \ 设置为 *I want to eat 900 hamburgers, 7 days a week*。\n\n在幕后，此方法实例化 `Pattern` 和 `Matcher`\
  \ 对象，并简单地传递到前面讨论过的 `Matcher.replaceFirst` 方法。如果你将要执行大量的 `replaceFirst` 操作，你可能会发现显式创建\
  \ `Pattern` 和 `Matcher` 对象并直接使用它们会更高效。\n\n|  | 注意  | 如果你显式创建 `Pattern` 和 `Matcher`\
  \ 对象并直接使用它们，你可能希望通过在适当的位置添加行尾 ***$*** 和行首 ***^*** 字符来优化你的模式。 |\n\n如果传入的正则表达式无效，则此方法将抛出\
  \ `PatternSyntaxException` 错误。如果正则表达式为 `null`，`replaceFirst` 将抛出 `NullPointerException`。\n\
  \n\n\n### public String replaceAll (String regex, String replacement)\n\n`String.replaceAll`\
  \ 方法会将所有与正则表达式 `regex` 匹配的子串替换为该方法第二个参数所表示的字符串。因此，对于字符串 `tmp`：\n\n```\nString tmp\
  \ = \"I want to eat 5 hamburgers, 7 days a week\";\n```\n\n执行命令：\n\n```\nString\
  \ newTmp = tmp.replaceAll(\"\\d\",\"900\");\n```\n\n会将 `newTmp` 设置为 *I want to eat\
  \ 900 hamburgers, 900 days a week*。\n\n在底层，该方法会实例化 `Pattern` 和 `Matcher` 对象，并直接调用之前讨论过的\
  \ `Matcher.replaceAll` 方法。如果你需要执行大量 `replaceAll` 操作，显式创建 `Pattern` 和 `Matcher` 对象并直接使用它们，效率可能会更高。\n\
  \n如果传入的正则表达式无效，该方法将抛出 `PatternSyntaxException` 异常。如果正则表达式为 `null`，`replaceFirst`\
  \ 将抛出 `NullPointerException`。\n\n### public boolean split(String regex)\n\n如果你需要根据某些条件将字符串拆分为子字符串数组，这个方法会特别有用——从概念上讲，它类似于\
  \ `StringTokenizer`。然而，它比 `StringTokenizer` 更强大，资源消耗也更高，因为它允许你的程序使用正则表达式作为拆分条件。\n\
  \n该方法始终至少返回一个元素。如果找不到拆分候选（即输入），则返回一个仅包含一个字符串的字符串数组——即原始输入。如果找到了输入，则返回一个字符串数组，该数组包含每次出现输入之后的所有子字符串。\n\
  \n因此，对字符串 *Hello, Dolly* 调用 `split(\",\")` 方法，将返回一个包含两个元素的字符串数组。数组的第一个元素将包含 *Hello*，第二个元素将包含\
  \ *Dolly*。\n\n使用此方法时，需要注意一些细微之处。如果字符串是 *Hello,Dolly,*，即在 *Dolly* 的 *y* 后面有一个尾随逗号，那么该方法仍然会返回一个包含两个元素的字符串数组，即\
  \ *Hello* 和 *Dolly*。其隐含行为是尾随空格不会被返回。\n\n如果字符串是 *Hello,,,Dolly*，那么生成的字符串数组将有四个元素。`split`\
  \ 方法应用于模式 `,` 的返回值如下：\n\n```\n// \"Hello,,,Dolly\".split() 等于 {\"Hello\",\"\",\"\
  \",\"Dolly\"}\n```\n\n在底层，该方法会实例化一个 `Pattern` 对象，并直接调用之前讨论过的 `Pattern.split` 方法。如果你需要执行大量\
  \ `split` 操作，显式创建 `Pattern` 对象并直接使用它们，效率可能会更高。\n\n如果传入的正则表达式无效，该方法将抛出 `PatternSyntaxException`\
  \ 异常。如果正则表达式为 `null`，`replaceFirst` 将抛出 `NullPointerException`。\n\n### public String\
  \ split(String regex, int limit)\n\n该方法返回一个数组，其中包含调用该方法的 `String` 对象的子字符串。这些子字符串是围绕第一个参数\
  \ `regex` 所描述的正则表达式周围的文本。数组中实际元素的数量由第二个参数 `limit` 控制。以下部分解释了 `limit` 的不同值可能意味着什么。\n\
  \n#### Limit == 0\n\n如果你指定第二个参数 `limit` 等于 0，那么该方法会返回一个数组，其中包含尽可能多的匹配子字符串，并且尾随空格会被丢弃。因此，模式：\n\
  \n```\nPattern p = \"Hello, Dolly\".split(\",\",0); \n```\n\n在针对候选字符串 *Hello, Dolly*\
  \ 进行拆分时，将返回一个包含两个元素的数组。\n\n类似地，当针对 *Hello, Dolly,*（即在 *Dolly* 的 *y* 后面有一个尾随逗号）进行匹配时，`split`\
  \ 将返回两个元素：\n\n```\nString tmp[] = \"Hello, Dolly,.\".split(\",\",0);\n```\n\n然而，你可能并不总是希望这种表现。例如，有时你可能希望限制返回的元素数量。\n\
  \n#### Limit > 0\n\n如果你只对一定数量的匹配感兴趣，请使用正数 limit。你应该使用该数量加 1 作为 limit。要拆分 *Hello,\
  \ Dolly, You, Are, My, Favorite* 并且只想要前两个标记，你可以这样使用：\n\n```\nString[] tmp = \"Hello,\
  \ Dolly, You, Are, My, Favorite\".split(\",\",3);\n```\n\n结果字符串的值如下：\n\n```\n//tmp[0]\
  \ 是 \"Hello\"\n// tmp[1] 是 \"Dolly\";\n```\n\n这里有趣的行为是返回了第三个元素：\n\n```\n//tmp[2]\
  \ 是 \"You, Are, My, Favorite\";\n```\n\n使用正数 limit 可能会带来性能提升，因为正则引擎在达到指定匹配次数后可以停止搜索。\n\
  \n#### Limit < 0\n\n为 limit 使用负数（任何负数）会告诉正则引擎，你希望返回尽可能多的匹配，并且如果存在尾随空格，也要返回它们。因此，对于正则模式\
  \ `,` 和候选字符串 *Hello,Dolly,*，命令：\n\n```\nString tmp[] is \"Hello,Dolly\".split(\"\
  ,\", -1); \n```\n\n结果如下：\n\n```\n//tmp == {\"Hello\",\"Dolly\"};\n```\n\n然而，对于字符串\
  \ *Hello, Dolly,*（在 *Dolly* 后面的逗号后有尾随空格），方法调用：\n\n```\nString tmp[] = \"Hello,Dolly,\
  \    \".split(\",\", -1);\n```\n\n结果如下：\n\n```\n//tmp 等于 {\"Hello\",\"Dolly\",\"\
  \    \"};\n```\n\n请注意，负数 limit 的实际值并不重要。因此：\n\n```\np.split(\"Hello,Dolly\", -1);\n\
  ```\n\n完全等同于：\n\n```\np.split(\"Hello,Dolly\", -100);\n```\n\n在底层，该方法会实例化一个 `Pattern`\
  \ 对象，并直接调用之前讨论过的 `Pattern.split` 方法。如果你需要执行大量 `split` 操作，显式创建 `Pattern` 对象并直接使用它，效率可能会更高。\n\
  \n如果传入的正则表达式无效，该方法将抛出 `PatternSyntaxException` 异常。如果正则表达式为 `null`，`replaceFirst`\
  \ 将抛出 `NullPointerException`。\n\n## 总结\n\n在本章中，我为 `Pattern` 和 `Matcher` 类及其方法提供了详细的文档和大量示例。我还讨论了\
  \ `String` 类中新增的正则表达式方法。现在，你应该对这些对象的工作原理以及它们如何协同工作有了更好的理解，并且在处理这些方法时有了一个参考点。在第 3\
  \ 章中，你将学习如何将这些新工具、正则表达式语言以及 Java 语言本身整合成一个统一的整体。\n\n\n\n## 常见问题解答\n\n| **问：** |\
