  \ |\n| **问：** | **如何替换掉“I want to use a $ character”中的 $，使得结果字符串变为“I want to use\
  \ a \\$ character”？** | ![对于候选字符串 String candidate = `I want to use a $ character`;\
  \ 解决方案是有点反直觉的正则表达式模式 String newString = candidate.replaceAll(`\\\\$`,`\\\\\\\\\\\
  \\$`); 第一个参数 \\\\$ 很清楚。你想要美元符号，它恰好是一个表示行尾的正则表达式元字符。因为你确实想要实际的美元符号字符而不是行尾，所以你必须对美元符号进行转义，产生模式\
  \ \\$ 。然而，你还需要满足 String 对象构造函数的需求，它期望将 \\ 后面的任何内容视为字符串元字符。因为 \\$ 不是字符串元字符（它是正则表达式元字符），你需要告诉\
  \ String 对象的构造函数忽略 \\ 。因此，你需要再次对其进行转义，产生 \\\\$ 。这就引出了模式的第二部分：\\\\\\\\\\\\$ 。在这里，第一个\
  \ \\ 转义第二个 \\ ，第三个 \\ 转义第四个 \\ ，第五个 \\ 转义第六个。因此，字符串 \\\\\\\\\\\\$ 的结果是 \\\\\\\\\
  $ 。在内部，该方法必须从“I want to use a $ character”中剥离出 \\$ 部分，并用某些内容替换它，但该内容是什么？该方法将你提供的原始字符串分解为两部分：一个由“I\
  \ want to use a”组成的子串，和另一个由“character”组成的子串。通常，Matcher.replaceAll 方法会将你提供的任何内容插入到这两个子串之间，连接结果并返回。然而，因为你提供的内容恰好包含美元符号，所以出现了一个额外的复杂性。正如本章中\
  \ Matcher.replaceAll 的描述所示，美元符号在 replaceAll 方法中具有特殊意义。它用于引用被模式捕获的子组。因为你不希望它具有这种意义，所以你需要再次对其进行转义。因此，模式\
  \ \\\\\\$ ，其中第一个 \\ 转义第二个 \\ ，第三个 \\ 转义 $ ，从而逻辑上产生 \\$ 。 ](img/#LiB0019.html#answer.N142)\
  \ |\n\n答案\n\n| **答：**  | 只需导入 java.util.regex.* 包即可。 |\n| **答：**  | 如果你确实是在查找一个明确的子串，而不是模式描述，那么请使用\
  \ String.indexOf 方法。然而，如果你需要确认一个模式是否存在，那么你有两条路可走。第一种是使用 String.split 方法的一个变体，并将第二个参数设为负数：\
  \ \n```\nString tokens[] = candidate.split(subStringPattern,-1);\n```\n\n并确保结果数组包含多个元素：\n\
  \n```\nboolean isThere = tokens.length > 1? true: false;\n```\n\n这里的问题是，如果你要查找的短语恰好是候选句子的最后一个元素，那么数组的大小仍然会是\
  \ 1，这将导致错误的结论。你可以用候选字符串 *this is* *the phrase I want* 和模式描述 ***want.***（末尾带有一个句点，跟在\
  \ *t* 字符之后）来测试一下。你的第二个选择是使用一个像下面这样的简短方法，它总是有效的：\n\n```\n /**\n   * 确认或否认正则表达式\n\
  \   * 作为候选字符串的一部分存在。\n   * @param the <code>String</code> 候选字符串\n   * @param the\
  \ <code>String</code> 子串模式\n   * @return <code>boolean</code> 如果正则表达式\n   * 描述了候选字符串的一部分，则返回\
  \ true\n   * @author M Habibi\n   */\n\n   public static boolean\n   containsSubtring(String\
  \ candidate, String subStringPattern)\n   {\n       boolean retval = false;\n  \
  \     //编译模式\n       Pattern pattern = Pattern.compile(subStringPattern);\n    \
  \   //查看候选字符串的任何部分是否包含该\n       //描述\n       Matcher matcher = pattern.matcher(candidate);\n\
  \       retval = matcher.find();\n\n       return retval;\n   }\n```\n\n |\n| **答：** \
  \ | 这里的解决方案与之前给出的类似，包括使用 String.split 方法。同样的限制也适用。就基于方法的解决方案而言，你需要对该方法进行的唯一修改如下。首先，调整方法签名，使其接受第三个参数作为迭代次数，因此签名如下所示：\
  \ \n```\npublic static boolean containsSubtring(\n  String candidate,\n  String\
  \ subStringPattern,\n  int n\n)\n```\n\n其次，添加以粗体显示的循环：\n\n```\nboolean retval =\
  \ false;\n//编译模式\nPattern pattern = Pattern.compile(subStringPattern);\n\n//查看候选字符串的任何部分是否包含该\n\
  //描述\nMatcher matcher = pattern.matcher(candidate);\nfor (int i=0; i< n; i++)\n\
  {\n  retval = matcher.find();\n  if (!retval) break;\n}\nreturn retval;\n```\n\n\
  \ |\n| **答：**  | 对于候选字符串 \n```\n String candidate = \"I want to use a $ character\"\
  ;\n```\n\n解决方案是有点反直觉的正则表达式模式\n\n```\nString newString = candidate.replaceAll(\"\\\
  \\$\",\"\\\\\\\\\\\\$\");\n```\n\n第一个参数 *\\\\$* 很清楚。你想要美元符号，它恰好是一个表示行尾的正则表达式元字符。因为你确实想要实际的美元符号字符而不是行尾，所以你必须对美元符号进行转义，产生模式\
  \ ***\\$***。然而，你还需要满足 String 对象构造函数的需求，它期望将 *\\* 后面的任何内容视为字符串元字符。因为 *\\$* 不是字符串元字符（它是正则表达式元字符），你需要告诉\
  \ String 对象的构造函数忽略 *\\*。因此，你需要再次对其进行转义，产生 *\\\\$*。这就引出了模式的第二部分：*\\\\\\\\\\\\$* 。在这里，第一个\
  \ *\\* 转义第二个 *\\*，第三个 *\\* 转义第四个 *\\*，第五个 *\\* 转义第六个。因此，字符串 *\\\\\\\\\\\\$* 的结果是\
  \ *\\\\\\\\$*。在内部，该方法必须从 *I* *want to use a $ character* 中剥离出 *\\$* 部分，并用 *某些内容*\
  \ 替换它，但该内容是什么？该方法将你提供的原始字符串分解为两部分：一个由 *I* *want to use a* 组成的子串，和另一个由 *character*\
  \ 组成的子串。通常，Matcher.replaceAll 方法会将你提供的任何内容插入到这两个子串之间，连接结果并返回。然而，因为你提供的内容恰好包含美元符号，所以出现了一个额外的复杂性。正如本章中\
  \ Matcher.replaceAll 的描述所示，美元符号在 replaceAll 方法中具有特殊意义。它用于引用被模式捕获的子组。因为你不希望它具有这种意义，所以你需要再次对其进行转义。因此，模式\
  \ ***\\\\\\$***，其中第一个 *\\* 转义第二个 *\\*，第三个 *\\* 转义 *$*，从而逻辑上产生 *\\$*。 |\n\n\n\n#\
  \ 第 3 章：高级正则表达式\n\n## 概述\n\n> *\"你必须转身面对猛虎，才能发现它不过是纸做的。\"*\n> \n> ——禅语\n\n本章探讨 J2SE\
  \ 中正则表达式的一些更高级特性。其目标是为 Java 开发者提供更复杂的正则表达式工具和概念的参考点。当你需要重温 J2SE 正则表达式概念时，本章可作为参考资料。\n\
  \n当然，没有什么学习工具比实际编写代码更有用，因此我鼓励你亲自尝试这些概念。本章介绍了多种概念，包括组、子组、非捕获组、贪婪限定符、积极限定符、懒惰限定符、正向先行断言、负向先行断言、正向后行断言和负向后行断言。本章最后一节重点介绍如何提高正则表达式的效率。\n\
  \n|  | 注意 | 本章中的示例特意保持简单，以便清晰说明所讨论的机制。更复杂的示例（例如专业场景中使用的示例）将在第 5 章和附录中探讨。 |\n\n##\
  \ 理解组\n\n正如我在第 2 章中解释的，组就是描述正则表达式模式的一系列字符。因此，***\\w\\d*** 是一个组，因为它包含两个字符 ***\\w***\
  \ 和 ***\\d***，并且它们按顺序排列。这是一个隐式组，因此很简单，因为大多数组通常都用括号显式包围。在 Java 正则表达式中，每个模式都有组，并且这些组都有索引。因此，模式\
  \ ***\\w\\d*** 只有一个组，即它本身，该组的索引当然是 0。\n\n组在 Pattern 中描述，但在 Matcher 中实现。从概念上讲，这类似于\
  \ SQL 的工作方式：查询在 SQL 语句中描述，但匹配的部分从 ResultSet 中提取。因此，当你描述模式 ***\\w\\d*** 时，你可能会从候选字符串\
  \ *A9 is my favorite* 中提取匹配的候选 *A9*。例如，如果组被描述为\n\n```\nPattern p = Pattern.compile(\"\
  \\\\w\\\\d\");\n```\n\n并且候选字符串是\n\n```\nString candidate = \"A9 is my favorite\"\
  ;\n```\n\n你为此候选字符串定义一个 Matcher：\n\n```\nMatcher matcher = p.matcher(candidate);\n\
  ```\n\n假设已经调用了 Matcher.find() 方法，那么调用 Matcher.group(0) 会返回候选字符串中与整个模式匹配的部分，如下所示：\n\
  \n```\nString tmp = matcher.group(0);\n```\n\n因此，Matcher.group(0) 方法这个名称有点用词不当。它实际上并不提取组；它提取候选字符串中与该组匹配的部分。这是一个微妙但重要的区别。完整示例如清单\
  \ 3-1 所示。\n\n清单 3-1：使用组\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\n\
  public class SimpleGroupExample{\n    public static void main(String args[]){\n\
  \        //原始模式始终是组 0\n        Pattern p = Pattern.compile(\"\\\\w\\\\d\");\n  \
  \      String candidate = \"A9 is my favorite\";\n\n        //如果存在匹配，则提取候选字符串中\n\
  \        //与组(0)匹配的部分\n        Matcher matcher = p.matcher(candidate);\n\n     \
  \   //输出为 'A9'\n        if (matcher.find()){\n            String tmp = matcher.group(0);\n\
  \            System.out.println(tmp);\n        }\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
  \ |\n\n|  |\n\n当你需要整个模式时，这种方法非常有效。但如果你需要该模式的子部分呢？如何提取它们？这时子组就派上用场了。\n\n## 理解子组\n\
  \n正如模式可以有组一样，它也可以有子组。*子组*就是更大整体中的较小分组。它们通过被括号包围而与原始组以及彼此分隔开来。\n\n在前一节的示例中，为了能够显式引用数字\
  \ ***\\d***，你将模式修改为 ***\\w(\\d)***。这里，***\\w\\d*** 是组(0)，而 ***(\\d)*** 是组(1)。清单\
  \ 3-2 演示了如何使用子组来提取候选字符串中与数字 ***\\d*** 匹配的部分。\n\n清单 3-2：使用子组\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\nimport java.util.regex.*;\npublic class SimpleSubGroupExample{\n   \
  \ public static void main(String args[]){\n        //原始模式始终是组 0\n        Pattern\
  \ p = Pattern.compile(\"\\\\w(\\\\d)\");\n        String candidate = \"A9 is my\
  \ favorite\";\n\n        //如果存在匹配，则提取匹配的部分\n        Matcher matcher = p.matcher(candidate);\n\
  \        if (matcher.find()){\n            //提取 'A9'，它与组(0)匹配，组(0)始终是\n        \
  \    //整个模式本身\n            String tmp = matcher.group(0);\n            System.out.println(tmp);\
  \ //tmp 为 49\n\n            //提取候选字符串中与组(1)匹配的部分：\n            //即跟在 'A' 后面的 '9'\n\
  \            tmp = matcher.group(1); //tmp 为 9\n            System.out.println(tmp);\n\
  \        }\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n清单 3-2 允许你提取候选字符串中与整个表达式匹配的部分。它还允许你提取该匹配部分的子部分。因此，你可以从匹配区域\
  \ *A9* 中提取 *9*，因为 *9* 与组(1)匹配。也就是说，当正则表达式引擎匹配 *A9* 时，它会存储 *9*，因为你定义了子组 ***(\\d)***。\n\
  \n## 访问子组\n\n那么这一切实际上是如何工作的呢？正则表达式引擎内部是否有小精灵在跑来跑去，跟踪所有这些组？嗯，可以说是，也可以说不是。\n\n虽然据我所知引擎内部没有小精灵，但正则表达式引擎确实通过将候选字符串中的匹配部分存入内存来内部跟踪所有子组。因此，因为你将模式定义为\
  \ ***\\w(\\d)***，正则表达式会跟踪任何前面有字母数字或下划线字符的单个数字。当你将表达式 ***(\\d)*** 放在括号中时，正则表达式认为你的意图就是如此。\n\
  \n引擎根据这些捕获组的数字索引提供对它们的访问。捕获组按从左到右的顺序，根据其左括号的顺序进行索引，并且组(0)始终引用整个原始表达式。因此，在前面的示例中，组(0)引用候选字符串中与整个表达式\
  \ ***\\w(\\d)*** 匹配的部分，而组(1)引用表达式中与 ***(\\d)*** 部分匹配的部分。\n\n例如，如果你的模式是 ***(\\w)(\\\
  d)(\\w)(\\w)***，并且候选字符串是 *J2SE*，那么组 0 将匹配整个候选字符串 *J2SE*。组 1 将匹配 *J*，组 2 将匹配 *2*，组\
  \ 3 将匹配 *S*，组 4 将匹配 *E*。\n\n相应地，如果你的模式仍然是 ***(\\w)(\\d)(\\w)(\\w)***，但候选字符串是 *R2D2*，那么组\
  \ 0 将匹配整个候选字符串 *R2D2*。组 1 将匹配 *R*，组 2 将匹配 *2*，组 3 将匹配 *D*，组 4 将匹配 *2*。\n\n\n\n##\
  \ 非捕获子组\n\n有时你可能需要定义一个组，但又不希望该组被捕获——你只是想把它当作一个单一的逻辑实体来处理。使用这些*非捕获组*的主要优势在于，它们占用的内存更少，因为不需要正则表达式引擎来跟踪匹配的部分。\n\
  \n考虑模式 ***(\\w)(\\d\\d)(\\w+)***。具体来说，如果你不需要访问末尾的 ***(\\w+)***，就可以进行一些优化。\n\n要将一个组标记为非捕获组，只需在该组的左括号后紧跟字符\
  \ ***?:***。也就是说，你可以将表达式写成 ***(\\w)(\\d\\d)(?:\\w+)***。请注意，原始表达式 ***(\\w)(\\d\\d)(\\\
  w+)*** 与新表达式 ***(\\w)(\\d\\d)(?:\\w+)*** 的唯一区别，就在于最后一个组 ***(\\w+)*** 之前使用了 ***?:***。\n\
  \n非捕获组最常见的用途是为了逻辑分离。例如，假设你需要找出一个人早上过得怎么样。你可以接受 *good morning*、*bad morning*、*terrible\
  \ morning*、*great morning* 等等。为了清晰起见，你将表达式写成 ***(good|bad|terrible|great) morning***。也就是说，你想把各种类型的早晨当作一个单一的逻辑单元来处理。\n\
  \n然而，假设你不需要捕获早晨的类型，因为你不会用它来做任何事情——你只是想知道它存在。那么你可以将表达式修改为 ***(?:good|bad|terrible|great)\
  \ morning***。具体来说，你只需在组定义的左括号之后插入 ***?:***。这让你能够将各种类型的早晨视为一个单一的逻辑单元，但又不会浪费内存来捕获描述信息。\n\
  \n|  | 注意 | 要使一个组成为非捕获组，请在组的左括号内插入 ***?:***。 |\n\n处理非捕获组时还有一个额外的问题：就组索引而言，它们是不被计数的。这完全合理，因为你实际上是在告诉正则表达式引擎你对这些组不感兴趣。因此，为什么正则引擎要跟踪它们或提供一种允许你引用它们的机制呢？毕竟，你已经明确告诉正则表达式引擎你对此不感兴趣。\n\
  \n所以对于模式 ***(?:\\w)(\\d)*** 来说，group(0) 是整个模式，即 ***\\w\\d***，而 group(1) 是 ***(\\\
  d)***。请注意，***(?:\\w)*** 并不是通常情况下的 group(1)，因为 ***(?:\\w)*** 是一个非捕获组；它前面有 ***?:***。清单\
  \ 3-3 演示了一个简单非捕获子组的使用。\n\n清单 3-3：使用非捕获子组\n\n| **![开始示例](img/_1.gif)** |\n\n```\n\
  import java.util.regex.*;\n\npublic class NonCapturingGroupExample{\n    public\
  \ static void main(String args[]){\n        //定义模式\n        String regex = \"hello|hi|greetings|(?:good\
  \ morning)\";\n\n//定义候选字符串\n        String candidate1 = \"Tommy say hi to you\"\
  ;\n        String candidate2 = \"Tommy say good morning to you\";\n        //编译模式\n\
  \        Pattern pattern = Pattern.compile(regex);\n\n//提取第一个模式\n        Matcher\
  \ matcher = pattern.matcher(candidate1);\n        //显示组数量\n        System.out.println(\"\
  GROUP COUNT:\"+ matcher.groupCount());\n\nif (matcher.find())System.out.println(\"\
  GOT 1:\"+candidate1);\n\n//重用匹配器，并检查第二个候选字符串\n        matcher.reset();\n       \
  \ matcher = pattern.matcher(candidate2);\n\n//显示组数量\n        System.out.println(\"\
  GROUP COUNT:\"+ matcher.groupCount());\n\nif (matcher.find())\n        System.out.println(\"\
  GOT 2:\" +candidate2);\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n\
  此示例的输出如输出 3-1 所示。\n\n输出 3-1：NonCapturingGroupExample 的输出\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\nGROUP COUNT:0\nGOT 1:Tommy say hi to you\nGROUP COUNT:0\nGOT 2:Tommy\
  \ say good morning to you\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n如果你使用了捕获组，那么组计数可能会是\
  \ 1。虽然这看起来是一个相当无关紧要的问题，但随着捕获组数量的增加，它可能会变得极其复杂。\n\n\n\n## 贪婪量词\n\n你可能已经注意到，模式***(\\\
  w)(\\d\\d)(\\w+)***中的第三个子组，即***(\\w+)***，实际上给了正则表达式引擎一定的自由裁量权。对于候选字符串 *X99SuperJava*，子表达式***(\\\
  w+)***只需匹配一个或多个单词字符即可满足要求，但它却选择了匹配所有字符。也就是说，当它本可以只匹配 *S*、*Su*、*Sup* 等字符时，它却选择了匹配整个\
  \ *SuperJava*。毕竟，这些也都满足“一个或多个单词字符”的要求。为什么引擎会决定尽可能多地匹配呢？\n\n它之所以这样做，是因为它本质上是*贪婪的*。正则表达式引擎的特性是尽可能多地匹配，只要这种匹配不会干扰模式中其他子表达式的匹配。因此，它匹配了整个候选字符串\
  \ *SuperJava*。表 3-1 列出了 Java 正则表达式的贪婪量词，供你参考。\n\n表 3-1：贪婪量词\n\n| **正则表达式** | **描述**\
  \ |\n| --- | --- |\n| ? | 前面的元素重复一次或零次。 |\n| * | 前面的元素重复零次或多次。 |\n| + | 前面的元素重复一次或多次。\
  \ |\n| {n} | 前面的元素恰好重复 *n* 次。 |\n| {n,} | 前面的元素至少重复 *n* 次。 |\n| {n,m} | 前面的元素至少重复\
  \ *n* 次，但不超过 *m* 次。包括 *m* 次重复。 |\n\n贪婪匹配有一种有趣的行为模式，我称之为*贪婪-慷慨*。模式最左边的部分，即第一个***(\\\
  w)***，会尝试尽可能多地匹配。当它无法再匹配时，就会评估模式的下一部分。这就是贪婪的部分。\n\n如果模式的第二部分未能找到任何匹配，那么第一个匹配模式就会开始缓慢*释放它已经收集到的字符*，从而为模式的第二部分提供更多匹配机会。这就是行为中慷慨的部分。\n\
  \n此时，可能会发生两种情况之一。第一种情况是，后面的组最终能够成功匹配，此时第一个组停止释放字符。第二种情况是，即使前面的组释放了字符供其使用，后面的组仍然无法匹配。如果发生这种情况，那么释放字符的组实际上会重新收集那些已释放的字符，然后正则表达式引擎继续执行。如果后面的子表达式再次匹配失败，则重复此过程。\n\
  \n那么，这一切对你意味着什么呢？嗯，实际上意义重大。考虑正则表达式模式***(\\w+)(\\d\\d)(\\w+)***，它与模式***(\\w)(\\d\\\
  d)(\\w+)***几乎相同，只是第一个模式在第一个***\\w***后面使用了***+***，从而形成了组***(\\w+)***。这个小小的***+***在效率上可能会产生巨大差异，而这种差异在日常使用中你可能不会注意到，因为将新模式应用于候选字符串\
  \ *X99SuperJava* 的结果并没有改变。\n\n清单 3-5 详细分析了评估该模式时实际发生的情况。\n\n清单 3-5：贪婪量词示例\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\nimport java.util.regex.*;\n\npublic class GreedyExample{\n    public\
  \ static void main(String args[]){\n        //定义模式\n        String regex = \"(\\\
  \\w+)(\\\\d\\\\d)(\\\\w+)\";\n\n//编译模式\n        Pattern pattern = Pattern.compile(regex);\n\
  \n//定义候选字符串\n        String candidate = \"X99SuperJava\";\n\n//为候选字符串提取匹配器\n   \
  \     Matcher matcher = pattern.matcher(candidate);\n\nmatcher.find();\n\n//提取匹配的组\n\
  \        System.out.println(matcher.group(1));//返回 'X'\n        System.out.println(matcher.group(2));//返回\
  \ '99'\n        System.out.println(matcher.group(3));//返回 SuperJava\n    }\n} \n\
  ```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n当 group(1) 运行时，***(\\w+)*** 会检查候选字符串\
  \ *X99SuperJava* 中的每一个字符。也就是说，*X* 被明确考虑，通过检查，并被放入该组的匹配包中。由于此模式是贪婪的，并且在***\\w***后面有***+***，因此它会继续。接下来，*9*\
  \ 被明确考虑并通过检查。然后，下一个 *9* 被考虑。这一过程一直持续到整个字符串 *X99SuperJava* 被消耗完毕。\n\n在 group(1) 满足后，group(2)，即***(\\\
  d\\d)***，获得了机会。由于 group(2) 根本无法匹配任何内容，group(1) 释放了 *X99SuperJava* 末尾的 *a* 字符。group(2)\
  \ 考虑了这个 *a* 字符，发现它不是数字，并认为它不满足要求。因此，group(1) 释放了 *v* 字符。group(2) 检查了它，发现它不符合要求，并拒绝了它。因此，group(1)\
  \ 释放了 *X99SuperJava* 中 *v* 字符前面的 *a* 字符。这一过程一直持续到 group(1) 释放了除 *X* 之外的所有字符。最后，两个\
  \ *9* 字符的释放使得 group(2) 能够匹配。现在 group(1) 拥有 *X*，group(2) 拥有 *99*。\n\n最后，group(3)\
  \ 获得了运行机会。它从第二个 *9* 字符之后的位置开始检查候选字符串 *X99SuperJava*。由于它是贪婪的，它匹配了整个字符串 *SuperJava*。\n\
  \n因此，当应用于字符串 *X99SuperJava* 时，模式***(\\w)(\\d\\d)(\\w+)***和***(\\w+)(\\d\\d)(\\w+)***产生了完全相同的结果，但效率成本却大相径庭。虽然这在处理小字符串时可能微不足道，但在解析一个装满文件的目录时却非常重要；这可能意味着你的应用程序能够正常工作与内存耗尽之间的区别。\n\
  \n\n\n## 占有量词\n\n在理解了贪婪量词的背景后，*占有量词*相对容易理解。它们是 Java 独有的特性，不过随着时间的推移，其他正则表达式语言也可能会采用。简单来说，它们很贪婪，但绝不慷慨。在现有的贪婪量词后面加上一个加号（+）就构成了占有量词。因此，***\\\
  d+*** 变成了 ***\\d++***，***\\d{n,m}*** 变成了 ***\\d{n,m}+***，以此类推。\n\n考虑之前的例子，将模式 ***(\\\
  w+)(\\d\\d)(\\w+)*** 应用于候选字符串 *X99SuperJava*。我之前已经说明，当正则表达式引擎遇到分组 ***(\\w+)*** 时，会尝试匹配尽可能多的字符。我还说明过，如果释放这些匹配字符有助于后面的分组实现匹配，引擎会释放它们。\n\
  \n然而，如果你不希望分组释放其匹配字符来帮助后面的分组匹配，那么你只需在最后一个表达式后面加上一个额外的加号，就可以使用占有量词。你构建模式 ***(\\w++)(\\\
  d\\d)(\\w+)***——也就是说，你将 ***\\w+*** 变成了 ***\\w++***。\n\n当模式首次运行时，分组(1)，即 ***(\\w++)***，会消耗候选字符串\
  \ *X99SuperJava* 中的每一个字符。但是，由于第二个加号的存在，引擎拒绝释放任何匹配的字符来帮助后面的分组匹配。你会发现分组(1)匹配成功，而分组(2)和分组(3)匹配失败——整个正则表达式匹配失败。清单\
  \ 3-6 演示了这一点。\n\n清单 3-6：占有量词示例\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\n\
  \npublic class PossesiveExample{\n    public static void main(String args[]){\n\
  \        //定义模式\n        String regex = \"(\\\\w++)(\\\\d\\\\d)(\\\\w+)\";\n   \
  \     //编译模式\n        Pattern pattern = Pattern.compile(regex);\n\n        //定义候选字符串\n\
  \        String candidate = \"X99SuperJava\";\n\n        //为候选字符串提取匹配器\n       \
  \ Matcher matcher = pattern.matcher(candidate);\n\n        if (matcher.find()){\n\
  \            System.out.println(\"GROUP 0:\" +\n            matcher.group(0));\n\
  \            System.out.println(\"GROUP 1:\" +\n            matcher.group(1));\n\
  \            System.out.println(\"GROUP 2:\" + matcher.group(2));\n            System.out.println(\"\
  GROUP 3:\" + matcher.group(3));\n        }\n        else{\n           System.out.println(\"\
  NO MATCHES\" );\n        }\n\n        System.out.println(\"Done\");\n    }\n} \n\
  ```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n## 懒惰量词\n\n与贪婪量词相对的另一个极端是*懒惰量词*，它们会尝试匹配尽可能少的字符。懒惰量词是通过在现有贪婪量词后面追加一个问号形成的。因此，***X+***\
  \ 变成了 ***X+?***，***X{n,m}*** 变成了 ***X{n,m}?***，以此类推。例如，对于模式 ***\\d+?*** 应用于候选字符串\
  \ *1234*，结果匹配的是 *1*，如清单 3-7 所示。\n\n清单 3-7：懒惰量词示例\n\n| **![开始示例](img/_1.gif)** |\n\
  \n```\nimport java.util.regex.*;\n\npublic class ReluctantExample{\n    public static\
  \ void main(String args[]){\n        //定义模式\n        String regex = \"(\\\\d+?)\"\
  ;\n        //编译模式\n        Pattern pattern = Pattern.compile(regex);\n\n       \
  \ //定义候选字符串\n        String candidate = \"1234\";\n\n        //为候选字符串提取匹配器\n   \
  \     Matcher matcher = pattern.matcher(candidate);\n\n        while (matcher.find()){\n\
  \            //每个数字匹配一次\n            //如果这不是一个懒惰量词的例子，\n            //它将只匹配一次，并且那次匹配\n\
  \            //将包含候选字符串 \"1234\" 中的每个数字。\n            System.out.println(matcher.group());\n\
  \n        }\n\n        System.out.println(\"Done\");\n    }\n} \n```\n\n| **![结束示例](img/_1.gif)**\
  \ |\n\n|  |\n\n每次运行 find() 时，它都会匹配尽可能少的字符，因为它*不情愿*去匹配。该模式恰好匹配了四次：每个数字一次。如果你在模式中没有使用懒惰量词，那么整个候选字符串只会匹配一次，即\
  \ *1234*，因为模式会是贪婪的，并匹配尽可能多的字符。\n\n## 理解环视\n\n在编程中，有时就像在生活中一样，你希望在做出更认真的努力之前先了解预期情况。例如，你可能想在去最喜欢的餐厅吃饭之前知道它是否营业。你会怎么做？当然，你会提前打个电话。同样的想法也用于正则表达式的环视。\n\
  \n环视有四种类型：正向先行断言、负向先行断言、正向后发断言和负向后发断言。以下各节将详细解释每一种。\n\n|  | 注意  | 环视是非捕获组，但它们从不消耗文本。因此，验证候选字符串中后续是否存在某个特定字符，并不意味着该字符已被正则表达式模式消耗掉。先行断言不匹配字符；它们匹配位置。\
  \ |\n\n\n\n### 正向先行断言\n\n*正向先行断言*允许你的正则表达式“向前查看”，并确保在尝试进行后续匹配之前，候选字符串中确实存在该模式。然而，它们不会消耗（消费）这些文本——它们只是确认其存在的事实。本质上，这是一种告诉正则引擎“如果候选字符串没有该先行断言，就别费劲去匹配了”的方式。通过使用字符\
  \ ***(?=*** 来开启分组即可构成正向先行断言。例如，先行断言\n\n```\n(?=\\d\\d)\n```\n\n确认候选字符串包含连续的两个数字。但是，它不会消耗这两个数字。与其他正则模式结合使用时，正向先行断言可以成为你正则表达式武器库中非常强大的武器。\n\
  \n假设你想匹配 IP 地址，但仅当它们以 *255* 开头时。此外，如果它们确实以 *255* 开头，你希望匹配整个正则模式。使用先行断言，这个问题很容易解决，如代码清单\
  \ 3-8 所示。当然，这个例子对数据的友好性做了很多假设。即便如此，它很好地说明了先行断言的用法，所以一切都可以原谅。紧随代码清单 3-8 之后的表 3-2\
  \ 分解了正则模式 ***(?=²⁵⁵).****。\n\n表 3-2：模式 *(?=²⁵⁵)*. ^([*])\n\n| **正则表达式** | **描述**\
  \ |\n| --- | --- |\n| (?= | 一个正向先行断言，包含 |\n| ^ | 行首字符，后跟 |\n| 2 | 字符 2，后跟 |\n| 5\
  \ | 字符 5，后跟 |\n| 5 | 字符 5，后跟 |\n| ) | 关闭先行断言分组 |\n| . | 任意字符 |\n| * | 重复零次或多次 |\n\
  | ^([*])*中文释义：* 如果 IP 地址以 255 开头，则捕获整个 IP 地址。 |\n\n代码清单 3-8：简单的正向先行断言示例\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\nimport java.util.regex.*;\n\npublic class PositiveLookaheadExample{\n\
  \    public static void main(String args[]){\n        //定义模式\n        String regex\
  \ = \"(?=²⁵⁵).*\";\n\n        //编译模式\n        Pattern pattern = Pattern.compile(regex);\n\
  \n        //定义候选字符串\n        String candidate = \"255.0.0.1\";\n\n        //为候选字符串提取一个匹配器\n\
  \        Matcher matcher = pattern.matcher(candidate);\n\n        String ip =\"\
  not found\";\n\n        //如果候选字符串以 255 开头，则 ip\n        //将被填充正确的信息。\n        if\
  \ (matcher.find())\n            ip=matcher.group();\n\n        String msg =\"ip:\
  \ \" + ip;\n\n        System.out.println(msg);\n    }\n} \n```\n\n| **![结束示例](img/_1.gif)**\
  \ |\n\n|  |\n\n在代码清单 3-8 中，正则引擎在尝试执行模式的其余部分之前，首先确认候选字符串以 *255* 开头。如果候选字符串不是这样，那么模式的其余部分就不可能匹配，从而不会浪费资源去尝试匹配。\n\
  \n请注意，使用非捕获分组 ***(?:=²⁵⁵)*** 代替 ***(?=²⁵⁵)*** 来确认 *255* 的存在是行不通的，因为 ***(?:=²⁵⁵)***\
  \ 会消耗字符 *255*（即使它不捕获它们），并返回其后的 *.0.0.1*。\n\n### 负向先行断言\n\n*负向先行断言*，与正向先行断言一样，允许你的正则表达式“向前查看”。但是，它们允许引擎确认候选字符串中某处*不*存在某些内容。与所有先行断言一样，它们不消耗文本；它们只是确认其不存在的事实。通过使用字符\
  \ ***(?!*** 来开启分组即可构成负向先行断言。例如：\n\n```\n(?!\\d\\d)\n```\n\n确认候选字符串不包含连续的两个数字。它不会消耗这两个数字。\n\
  \n假设你正在解析文本，想要查找对 *John* 的引用，并提取名字和姓氏，除非该引用恰好是 *John Smith*。使用负向先行断言，这类练习变得非常容易。代码清单\
  \ 3-9 演示了执行此操作的代码。表 3-3 分解了所使用的正则模式。\n\n表 3-3：模式 *John (?!Smith)[A-Z]\\\\w*+\n\n\
  | **正则表达式** | **描述** |\n| --- | --- |\n| J | 字符 *J*，后跟 |\n| o | 字符 *o*，后跟 |\n| h\
  \ | 字符 *h*，后跟 |\n| n | 字符 *n*，后跟 |\n| <space> | 一个空格，后跟 |\n| (?! | 一个位置，在该位置你将找到除\
  \ |\n| S | 字符 *S*，后跟 |\n| m | 字符 *m*，后跟 |\n| i | 字符 *i*，后跟 |\n| t | 字符 *t*，后跟 |\n\
  | h | 字符 *h* 之外的任何内容 |\n| ) | 关闭先行断言分组，后跟 |\n| [A-Z] | 任意大写字符，后跟 |\n| \\w | 一个单词字符\
  \ |\n| + | 重复一次或多次，后跟 |\n| \\w | 任意单词字符 |\n| * | 重复零次或多次 |\n| * **中文释义：** 查找并捕获\
  \ *John* 后跟某个大写单词的出现，除非该单词是 *Smith*。 |\n\n代码清单 3-9：简单的负向先行断言示例\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\nimport java.util.regex.*;\npublic class NegativeLookaheadExample{\n\
  \    public static void main(String args[])\n    throws Exception\n    {\n     \
  \   //定义模式\n        String regex = \"John (?!Smith)[A-Z]\\\\w+\";\n\n        //编译模式\n\
  \        Pattern pattern = Pattern.compile(regex);\n\n        String candidate =\
  \ \"I think that John Smith \";\n        candidate +=\"is a fictional character.\
  \ His real name \";\n        candidate +=\"might be John Jackson, John Westling,\
  \ \";\n        candidate +=\"or John Holmes for all we know.\";\n\n        //为候选字符串提取一个匹配器\n\
  \        Matcher matcher = pattern.matcher(candidate);\n\n        String tmp=null;\n\
  \n        //提取匹配的分组。注意它是\n        //默认分组，因为环视结构是\n        //非捕获的\n        while\
  \ (matcher.find()){\n            tmp=matcher.group();\n            System.out.println(\"\
  MATCH:\" + tmp);\n        }\n    }\n} \n```\n\n| **![结束示例](img/_1.gif)** |\n\n|\
  \  |\n\n在代码清单 3-9 中，正则引擎首先解析候选字符串，并将成功的匹配视为由 *John* 后跟某个大写单词（除非该大写单词是 *Smith*）组成的那些匹配。同样重要的是要注意，使用非捕获分组允许你捕获整个匹配，因为它没有被消耗。\n\
  \n\n\n### 正向向后查找\n\n到目前为止，你已经探索了向右查看候选字符串以“向前窥视”并了解模式未来匹配情况的能力。同样，有时能够向左查看当前考虑的位置，以了解过去对特定模式的匹配情况也很有用。这就是*向后查找*的目的。\n\
  \n与向前查找类似，向后查找也有两种形式。*正向向后查找*确认当前左侧存在某个模式，而*负向向后查找*则确认当前模式左侧*不存在*某个模式。通过使用 ***(?<=***\
  \ 打开一个非捕获组来形成正向向后查找。因此，要确认当前表达式前面有两个数字，你可以使用以下正向向后查找：\n\n```\n(?<=\\d\\d).*\n```\n\
  \n这确认了候选字符串前面连续有两个数字。它不会消耗这两个数字；然而，它的表现就像消耗了一样，因为*它们超出了捕获的范围*。这是因为表达式解析器已经越过了它们。也就是说，根据定义，解析器已经尝试匹配它们但失败了。如果它没有失败，它就会停止尝试寻找下一个匹配。\n\
  \n考虑候选字符串 *42 is the answer*。当正则表达式引擎将此候选字符串与模式 ***(?<=\\d\\d).**** 进行比较时，它首先检查第一个字符，即\
  \ *4*。由于 *4* 前面没有两个数字，因此被拒绝。接下来，引擎比较 *2* 字符。由于 *2* 前面也没有两个数字，因此也被丢弃。接着，正则表达式引擎检查候选字符串\
  \ *42 is the answer* 中 *2* 后面的空格字符。由于该空格字符前面确实有两个数字，即 *4* 和 *2*，正则表达式引擎愉快地开始匹配。当然，由于模式的剩余部分是\
  \ ***.****，因此所有剩余字符都被匹配。因此，*42* 后面的空格及其之后的所有内容都被捕获。但 *4* 和 *2* 没有被捕获，因为正则表达式引擎已经越过了它们。\n\
  \n由于正则表达式引擎已经越过了 *4* 和 *2* 字符，它不会匹配它们。这是一个重要且微妙的区别。向后查找与所有环视一样，都是非捕获的。然而，在这种情况下，它们表现得好像已经捕获了\
  \ *4* 和 *2* 字符。也就是说，字符 *4* 和 *2* 被排除在捕获集之外。但这只是因为它们已经被解析，而不是因为它们被捕获了。能够看穿这种假象非常重要。\n\
  \n清单 3-10 演示了一些使用正向向后查找的代码。目标是解析文档内容并提取其中使用的任何 URL。表 3-4 分解了所使用的正则表达式模式。\n\n表 3-4：模式\
  \ (?<=http://)\\S+\n\n| **正则表达式** | **描述** |\n| (?<= | 打开一个正向向后查找组，包含 |\n| h | 字符\
  \ *h* 后跟 |\n| t | 字符 *t* 后跟 |\n| t | 字符 *t* 后跟 |\n| p | 字符 *p* 后跟 |\n| : | 字符 *:*\
  \ 后跟 |\n| / | 字符 */* 后跟 |\n| / | 字符 */* 后跟 |\n| \\S | 一个非空格字符 |\n| + | 重复一次或多次 |\n\
  | * **中文释义：** 匹配一个 URL，前提是该 URL 前面有 *http://*。 |\n\n清单 3-10：简单的正向向后查找示例\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\nimport java.util.regex.*;\npublic class PositiveLookBehindExample{\n\
  \    public static void main(String args[])\n    throws Exception\n    {\n\n//定义模式\n\
  \        String regex = \"(?<=http://)\\\\S+\";\n\n//编译模式\n        Pattern pattern\
  \ = Pattern.compile(regex);\n\nString candidate = \"Apress 网站可以在以下地址找到 \";\n   \
  \     candidate +=\"http://www.apress.com。在那里，\";\n        candidate +=\"你可以找到一些行业最佳书籍的信息，包括\"\
  ;\n        candidate +=\"畅销书《Sun Certified Java Developer \";\n        candidate\
  \ +=\" Exam with J2SE》(\";\n        candidate +=\"http://www.apress.com/book/bookDisplay.\"\
  ;\n        candidate +=\"html?bID=39) 以及其他书籍。\";\n\n//为候选字符串提取匹配器\n        Matcher\
  \ matcher = pattern.matcher(candidate);\n\n//如果找到 URL，在此处打印出来。\n        while (matcher.find()){\n\
  \            String msg =\":\"+ matcher.group()+\":\";\n            System.out.println(msg);\n\
  \        }\n    }\n} \n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n### 负向向后查找\n\
  \n*负向向后查找*确认当前模式左侧*不存在*某个模式。它们是一种告诉正则表达式引擎的方式：“我对候选字符串感兴趣，只要它前面没有这样那样的内容。”通过使用 ***(?<!***\
  \ 打开一个非捕获组来形成负向向后查找。\n\n负向向后查找不像其他环视那样直观，因此值得探讨它们实际的工作原理。例如，考虑以下负向向后查找：\n\n```\n\
  (?<!\\d\\d).*\n```\n\n上述模式似乎要求候选字符串前面不能连续有两个数字。然而，当你实际用字符串 *42 is the answer* 测试它时，它会匹配整个候选字符串。这是怎么回事？\n\
  \n问题在于候选字符串 *42 is the answer* 的第一个元素是 *4*。因此引擎会问自己：*4* 字符前面是否有两个数字？由于答案是否定的，整个模式被匹配到\
  \ group(0) 中。请记住，***.**** 是一个贪婪量词，因此它会尽可能多地匹配——在这种情况下，就是整个候选字符串。\n\n## 高效表达式的禅与艺术\n\
  \n本节介绍一些可用于优化 J2SE 中正则表达式的技术。它旨在帮助你处理已有的正则表达式，并为编写新的正则表达式建立框架。本节中的建议，结合你自己的直觉以及对数据性质的积极认识，将帮助你优化自己的正则表达式。\n\
  \n### 尽可能使用非捕获组\n\n捕获组需要 JVM 跟踪它们。如果你需要提取组或在表达式后面需要反向引用它们，这会非常有用。然而，如果你纯粹出于逻辑目的使用组，那么将它们设为非捕获组是值得的，因为这可以节省内存使用。\n\
  \n前面给出的模式 ***(?:good|bad|terrible|great) morning*** 的示例将各种早晨分组到一个逻辑单元中，但不需要捕获它们。因此，该组是非捕获的，并在左括号内以\
  \ ***?:*** 开头。\n\n### 预检查候选字符串\n\n如果你正在查找特定字符串，你可以通过首先确保该字符串确实存在于候选字符串中来节省 CPU 周期。例如，假设你想解析一个可能包含电子邮件地址的字符串，如果包含，你想提取电子邮件地址的域名。首先确保候选字符串包含\
  \ *@* 符号，然后再开始正则表达式搜索是合理的。因此，以下是一种检查是否需要编译模式的低成本方法：\n\n```\nif (candidate.indexOf(\"\
  @\")) //..尝试提取域名信息。\n```\n\n\n\n### 优先提供最可能的匹配项\n\n假设你的正则表达式用于验证一家全医生健康俱乐部成员的称谓。你预计\
  \ 90% 的客户会使用 *Dr* 这一称谓，但有些人可能不会。因此，你的称谓匹配模式可能应该类似于 ***.*\\b(?:Dr|Mr|Mrs|Miss|Brother|Mister)\
  \ .****。\n\n这种模式能提高尽早匹配成功的可能性，从而减少正则表达式引擎需要遍历的流程数量。例如，假设候选字符串是 *Please meet Dr Hana\
  \ Saez*。按照当前模式的写法，引擎在第一次遍历时就会匹配到 *D*、*r*、空格以及之后的所有内容。因此，它永远不会再去尝试匹配 ***Mr***、***Mrs***\
  \ 等。\n\n然而，如果模式写成 ***.*\\b(?:Mr|Mrs|Miss|Brother|Mister| Dr) .****，引擎会为 ***Mr***\
  \ 遍历整个候选字符串一次，然后再为 ***Mrs*** 遍历一次，接着为 ***Miss*** 遍历一次，再为 ***Brother*** 遍历一次，以此类推，直到最终匹配到\
  \ ***Dr***。实际结果虽然相同，但整个过程会消耗更多的资源。\n\n### 尽可能具体化\n\n如果你知道正则表达式模式在某个位置只应匹配数字，那么就不要使用\
  \ ***\\w*** 来定义该部分匹配——请使用 ***\\d***。这将使正则表达式引擎能够缩小搜索范围并更快地进行过滤。或者，如果你知道模式必须包含某个特定单词，那么就在模式中直接使用该单词。这与根据特定需求编写代码更容易的原理相同。需求越聚焦、越详细，你的工作就越轻松。\n\
  \n例如，假设你知道候选字符串必须以大写字母开头，其后跟小写字母。使用 ***[A-Z][a-z]+*** 这样的模式比使用 ***\\w**** 更高效。两者可能都有效，但\
  \ ***[A-Z][a-z]+*** 能让引擎比 ***\\w**** 更快地得出准确结果，因为它可以拒绝将数字和小写字母作为首字符，并拒绝将数字和大写字母用于后续部分。\n\
  \nJ2SE 正则表达式实现中，使用字面字符串比使用字符类要快得多——它能够精确地锁定特定字符串。因此，如果你要查找 10 到 19 之间的数字，使用 ***1\\\
  d*** 比使用 ***\\d+***、***\\d\\d***、***\\d{2}*** 或任何此类变体更高效。\n\n### 指定匹配的位置\n\n如果你知道候选字符串只能出现在行首之后、行尾之前或标点符号之后，那么就在正则表达式中明确说明。当你确定\
  \ ***Beth*** 必须出现在换行符之后时，模式 ***^Beth*** 的匹配速度会比模式 ***Beth*** 更快、更高效。\n\n这种优化方式特别强大，因为它允许引擎在仅检查候选字符串的前两个字符后就停止搜索。在你的正则表达式中，要寻找机会利用这类特性。\n\
  \n### 指定匹配的长度\n\n如果你要查找的匹配项长度至少为 *n* 个字符，那么就在正则表达式中明确说明。或者，如果你知道匹配项的长度不能超过 *m* 个字符，也请一并说明。\n\
  \n例如，假设你正在解析一个大型文件以查找名字的引用。合理地假设你需要的名字长度少于 20 个字符。因此，虽然你可以使用 ***\\b[A-Z][a-z]+***\
  \ 这样的模式，但使用 ***\\b[A-Z][a-z]{1,20}*** 可能更好，因为引擎可以放弃任何长度超过 20 个字符的搜索。或者，如果你知道候选字符串必须包含六个或更多字符，那么使用\
  \ ***\\w\\w\\w\\w\\w\\w+*** 比使用 ***\\w+*** 更好。\n\n|  | 注意 | J2SE 正则表达式查找特定重复项的速度比查找量化的重复项快得多。因此，***\\\
  w\\w\\w\\w\\w\\w*** 比 ***\\w{6}*** 快得多。 |\n\n### 限制备选项的范围\n\n通常，提供小的备选项比提供大的备选项更高效，并且将它们放在后面比放在前面更好。因此，如果你有模式\
  \ ***Good Morning|Good Evening***，那么模式 ***Good (?:Morning|Evening)*** 会更好。在后一个例子中，正则表达式引擎只有在确定\
  \ *Good* 是候选字符串的一部分后，才需要做出决策。\n\n在前一个例子中，即使候选字符串不包含单词 *Good*，引擎也可能需要查找两次。也就是说，即使候选字符串是\
  \ *Bad year* 且根本不可能匹配，模式 ***Good Morning|Good Evening*** 仍然会搜索两次：一次搜索 *Good morning*，然后再次搜索\
  \ *Good Evening*。\n\n## 总结\n\n本章对 J2SE 正则表达式包中一些更具挑战性的工具和概念进行了解释、详细说明并提供了示例。本章讨论了组、子组、非捕获组、贪婪限定符、占有优先限定符、懒惰限定符、正向先行断言、负向先行断言、正向后行断言和负向后行断言。最后，本章以一些优化表达式的技巧作为结尾。下一章将介绍一些在面向对象语言（如\
  \ Java）中使用正则表达式的建议。\n\n## 常见问题解答\n\n| **问：** | **如何使一个组成为非捕获组？** | ![要使一个组成为非捕获组，请在组的左括号内插入\
  \ ?:。例如，将 (\\w) 改为 (?:\\w)。](img/#LiB0032.html#answer.N19) |\n| **问：** | **给定表达式\
  \ \\w(\\d(\\w))，最右侧子组 (\\w) 的捕获索引是多少？** | ![组从左到右计数，从开括号开始，group(0) 始终指代整个正则表达式模式。因此，子组\
  \ (\\w) 的捕获索引是 2。相应地，(\\d(\\w)) 的捕获索引是 group(2)。](img/#LiB0032.html#answer.N41)\
  \ |\n| **问：** | **当其中一个组是非捕获组时，组索引会如何受到影响？** | ![计算组索引时，非捕获组不会被以任何方式计入。](img/#LiB0032.html#answer.N67)\
  \ |\n\n答案\n\n| **答：**  | 要使一个组成为非捕获组，请在组的左括号内插入 ***?:***。例如，将 ***(\\w)*** 改为 ***(?:\\\
  w)***。 |\n| **答：**  | 组从左到右计数，从开括号开始，group(0) 始终指代整个正则表达式模式。因此，子组 ***(\\w)*** 的捕获索引是\
  \ 2。相应地，***(\\d(\\w))*** 的捕获索引是 group(2)。 |\n| **答：**  | 计算组索引时，非捕获组不会被以任何方式计入。\
  \ |\n\n# 第 4 章：面向对象的正则表达式\n\n\n\n## 概述\n\n> *\"创造力是允许自己犯错。艺术是知道该保留哪些错误。\"*\n> \n\
  > —— 斯科特·亚当斯\n\n在本章中，我将提供一些关于如何在 Java 这类完全面向对象的语言中使用正则表达式的建议。与过程式语言相比，这可以（而且通常应该）是一种不同的体验，因为\
  \ Java 提供了不同的工具集。本章将涵盖何时使用 `java.util.regex` 包，何时不使用它，以及何时用其他 Java 特性来补充 `java.util.regex`\
  \ 包。\n\nJava 中表述的正则表达式与指导 Java 数据库连接（JDBC）的原则有很多共同之处。JDBC 使用通用描述语言——结构化查询语言（SQL）来描述和操作信息，而\
  \ `java.util.regex` 包则使用正则表达式。SQL 提供了一个通用的 `Command` 对象来“编译”该描述，正如正则表达式使用 `Pattern`\
  \ 对象一样。SQL 提供了 `ResultSet` 来返回搜索的结果，而正则表达式则使用 `Matcher`。JDBC 和正则表达式包的使用模式是相似的。也就是说，两者都提供通用描述，在一个对象中编译它，并在另一个对象中检查结果。\n\
  \n在 Java 中使用正则表达式时，借鉴 JDBC 编程中的相关经验是很有意义的。我发现有用的 JDBC 和通用 Java 原则组合如下：\n\n*   优化你的连接。\n\
  *   批量读取和写入。\n*   将模式存储在外部。\n*   根据需要编译你的 `Pattern`。\n*   不要局限于正则表达式解决方案。\n\n##\
  \ 优化你的连接\n\n在处理正则表达式时，应优先使用 `FileChannel` 而非其他文件访问方式。也就是说，不要使用 `RandomAccessFile`、`FileInputStream`\
  \ 或 `FileOutputStream`，而应使用 `FileChannel` 来访问文件。\n\n虽然对 `FileChannel` 的详细讨论超出了本书的范围，但我还是想简要提一下。`FileChannel`\
  \ 是 Java 在高性能文件输入/输出（I/O）方面的最新成果，而且似乎非常成功。在底层，它们会根据你使用的操作系统进行优化，因此至少与 `java.io.*`\
  \ 中的对应类一样快速高效——事实上，它们通常快得多。它们还提供了诸如 `FileLock`、在文件中任意定位、同时读写以及直接映射到内存缓冲区等工具。\n\n\
  |  | 注意 | `FileChannel` 与线程的交互也更好，但这完全是另一个话题，超出了本次讨论的范围。 |\n\n`FileChannel` 通过按字节级别读取数据并将其存储到\
  \ `ByteBuffer` 中来工作。因此，使用 `FileChannel` 读取文件内容的代码可能如清单 4-1 所示。要了解更多关于 `ByteBuffer`\
  \ 和 `Channel` 的一般信息，请查阅 Sun 的文档。\n\n清单 4-1：使用 FileChannel 访问文件\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\nimport java.io.*;\nimport java.nio.*;\nimport java.nio.channels.*;\n\
  \n/**\n* 提供一种简便机制来提取文件中的正则表达式内容\n*/\npublic class FileChannelExample{\n    public\
  \ static void main(String args[]) throws IOException{\n        //打开一个指向本类源代码的连接\n\
  \        FileInputStream fis =\n        new FileInputStream(\"FileChannelExample.java\"\
  );\n        //获取一个文件通道\n        FileChannel fc = fis.getChannel();\n\n        //创建一个足够大的\
  \ ByteBuffer\n        //并将文件内容读入其中\n        ByteBuffer bb = ByteBuffer.allocate((int)fc.size());\n\
  \n        fc.read(bb);\n        bb.flip();\n\n        //将文件内容保存为字符串\n        String\
  \ fileContent= new String(bb.array());\n\n        //释放 FileChannel\n        fc.close();\n\
  \        fc = null;\n\n        //输出本文件的内容\n        System.out.println(\"fileContent\
  \ = \" + fileContent);\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n\
  这个过程非常简单，并且比传统的文件访问方式具有许多优势。基本上，你打开一个 `FileChannel`，将其内容读入 `ByteBuffer` 或其子类之一，然后检查该缓冲区。这在清单\
  \ 4-1 中很容易理解，因为代码的相关部分以粗体显示。如你所见，如果需要，你可以轻松地将这些数据转换为字符串。当然，这里你最关心的优势与速度和内存使用有关，但使用\
  \ `FileChannel` 还有许多其他与正则表达式无关的原因。\n\n## 批量读取和写入\n\n另一个重要的连接问题是，在处理文件时，愿意将整个文件内容读入内存。虽然对于非常大的文件，这个原则有时会适得其反，但我发现它通常对我很有效。操作中最昂贵的部分通常是\
  \ I/O 事务时间。根据你的情况，用内存换取 I/O 使用，从而避免重复的 I/O 调用，可能是非常合理的。\n\n总的来说，我发现将内容读入内存，在其中进行操作，然后根据需要将其写回文件，效果更好。我发现这比读取一点文件、做一些修改、写出这些修改、再读取更多文件等操作更高效。\n\
  \n|  | 注意 | 在处理非常大的文件时，我有时发现有必要忽略上述建议，而实际上一次只读取部分数据。这是因为一个模式很容易描述一个可能需要同时匹配文件开头和结尾的部分，从而可能要求你将整个文件保留在内存中。对于极大的文件，这根本不可能。在这种情况下，我会尽最大努力优化我的表达式，并一次只应用于一个部分。如果这还不够，我会编写一个专门设计用于解析特定文件的自定义\
  \ Java 程序。第一遍可能查找开始序列，第二遍可能在该部分内查找子匹配，依此类推。 |\n\n\n\n## 将模式存储于外部文件\n\n将正则表达式模式描述存储于外部文件具有三个重要优势。首先，模式无需为字符串构造函数再次进行转义，因此更易于阅读。其次，这是第一点的直接推论，即它使在代码中使用通用的、非\
  \ Java 转义的正则表达式变得更加容易。第三，将实际模式提取到外部文件后，你可以在以后更改模式，而无需重新编译该类。\n\n|  | 注意 | 在此上下文中，当我使用术语“Java\
  \ 转义”时，我指的是在字符串中对字符进行双重转义。 |\n\nJava 正则表达式模式可能有点令人困惑，尤其是对于那些不熟悉字符串和正则表达式转义符如何协同工作的人来说。例如，考虑以下来自\
  \ [`www.regexlib.com`](http://www.regexlib.com) 的免费电子邮件描述符。要准确解析出 ***^([a-zA-Z0-9_\\\
  -\\.]+)@((\\[[0-9]{1,3}\\.*** ***[0-9]{1,3}\\.[0-9]{1,3}\\.)|(([a-zA-Z0-9\\-]+\\\
  .)+))([a-zA-Z]{2,4}|[0-9]{1,3})(\\]?)$*** 的含义已经够困难了，更不用说还要加上字符串对象构造函数所需的那些略显笨拙的\
  \ *\\\\* 字符。这足以让你重新考虑是否要使用正则表达式。\n\n此外，将正则表达式改为 Java 转义字符串的过程引入了“胖手指”风险。毫不奇怪，因为你的\
  \ Java 正则表达式看起来不常规，所以更难从正则表达式专家那里获得帮助，他们中的大多数人可能更熟悉 Perl。\n\n同样非常可能的是，随着需求的变化，你可能需要更改正则表达式而不更改代码的任何其他部分。因此，将正则表达式模式存储在一个外部文件中，然后在需要时检索它们是一个好主意。这提供了一石二鸟的机会，因为你可以设想将正则表达式模式存储在外部，并且以不需要双重转义的方式存储。但是你应该使用哪种持久化机制呢？接下来的几节将讨论一些选项。\n\
  \n### 不要使用普通属性文件存储模式\n\n乍一看，将模式存储在外部文件的解决方案似乎是属性文件。它们已经就位，久经考验，易于使用，易于修改，格式直观，并且是面向对象的。然而，不幸的是，Java\
  \ 属性文件并不完全胜任这项任务，原因有三个非常强烈的反对意见。\n\n第一个反对意见是，属性值需要像字符串一样进行转义才能正常工作。也就是说，模式 ***\\\
  w*** 必须存储为 *\\\\w*，而模式 ***^([a-zA-Z0-9_\\-\\.]+)@((\\*** ***[[0-9]{1,3}\\.[0-9]{1,3}\\\
  .[0-9]{1,3}\\.)|(([a-zA-Z0-9\\-]+\\.)+))([a-zA-Z]{2,4}|*** ***[0-9]{1,3})(\\]?)$***\
  \ 则变成了笨拙的\n\n```\n^([a-zA-Z0-9_\\\\-\\\\.]+)@((\\\\[[0-9]{1,3}\\\\.[0-9]{1,3}\\\\\
  .[0-\n9]{1,3}\\\\.)|(([a-zA-Z0-9\\\\-]+\\\\.)+))([a-zA-Z]{2,4}|[0-\n9]{1,3})(\\\\\
  ]?)$\n```\n\n就可读性而言，这几乎算不上改进。\n\n其次，Properties 对象会预处理某些字符，包括 ***\\t***、***\\n***\
  \ 和 ***\\\\***。也就是说，在使用 Properties 对象存储正则表达式模式之前，你必须了解 Properties 对象如何存储“特殊”字符的内部机制。就抽象性而言，这几乎算不上改进。\n\
  \n最后，属性文件内部使用 *\\* 字符来表示一行的结束，以便可以延续到下一行。因此，属性文件条目\n\n```\nProduce = carrots, \\\
  \nlettuce\n```\n\n被读取为\n\n```\nProduce = carrots, lettuce \n```\n\n因此，使用 Properties\
  \ 对象实际上增加了模式的复杂性，因为它引入了除正则表达式之外你还必须了解的新内容。同样，就易于维护而言，这几乎算不上改进。综合考虑，使用属性文件存储正则表达式模式似乎是在招致错误。我们可以做得更好。\n\
  \n### 不要使用 XML 存储模式\n\nXML 也是正则表达式模式外部存储的一个合理候选方案。从积极的方面来看，XML 是一种简单、普遍接受的保存外部系统数据的方式，并且有许多访问这些数据的方法。事实上，J2SE\
  \ 1.4 提供了极其有用的 XMLEncoder 和 XMLDecoder 类，使得持久化和检索 XML 数据比以往任何时候都更容易。XMLEncoder 和\
  \ XMLDecoder 是新的 Java 类，可以帮助将 JavaBeans 存储为序列化的 XML——更好的是，XML 是人类可读和可维护的，因此更改 XML\
  \ 实际上会在对象反序列化时更改其属性。此外，根据你使用的 XML 持久化机制，XML 解析器可能不需要你对模式进行 Java 转义。\n\n然而，XML 持久化方法有两个大问题。第一个问题是，最简单的\
  \ XML 持久化机制，即 XMLEncoder 和 XMLDecoder 类，会在存储时对字符串进行修饰。因此，*<* 字符变成 *&lt*，*>* 变成 *&gt*，等等。其次，XML\
  \ 持久化机制，仅仅因为它是 XML，就包含了许多与正则表达式无关的杂乱元数据。但俗话说，事实胜于雄辩。为了说明这一点，让我们在下一节中尝试一种基于 XML 的方法，看看效果如何。\n\
  \n\n\n#### XML 持久化示例\n\n由于您希望尝试将正则表达式存储为 XML 格式，因此需要创建一个支持正则表达式的 JavaBean，例如 `Regex.java`，它包含两个成员变量：一个用于存储正则表达式本身的字符串，以及一个用于说明其用途的字符串描述。代码清单\
  \ 4-2 列出了该 Regex Bean 的代码。其思路是通过使用 `XMLEncoder` 轻松地将 Regex Bean 存储为 XML，从而简化对 XML\
  \ 的修改。\n\n**代码清单 4-2：Regex Bean**\n\n| **![示例开始](img/_1.gif)** |\n\n```\n/**\n*\
  \ 持有一个支持正则表达式的对象，以便我们尝试\n* 将正则表达式描述持久化为 XML\n*/\npublic class Regex implements java.io.Serializable\
  \ {\n\n/**\n    * 设置字符串描述\n    *\n    *@param String 描述\n    */\n    public void\
  \ setDescription(String description){\n        this.description = description;\n\
  \    }\n\n/**\n    * 获取字符串描述\n    *\n    *@return String 描述\n    */\n    public\
  \ String getDescription(){\n        return this.description;\n    }\n\n/**\n   \
  \ * 设置字符串正则表达式\n    *\n    *@param String 正则表达式\n    */\n    public void setRegex(String\
  \ regex){\n        this.regex = regex;\n    }\n\n/**\n    * 获取字符串正则表达式\n    *\n\
  \    *@return String 正则表达式\n    */\n    public String getRegex(){\n        return\
  \ this.regex;\n    }\n\nprivate String regex;\n    private String description;\n\
  }\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n接下来，编写持久化代码。我不打算深入探讨如何使用 `XMLEncoder`\
  \ 和 `XMLDecoder` 对象；这既偏离主题，又很容易通过阅读代码清单 4-3 来理解。有关 `XMLEncoder` 和 `XMLDecoder` 的参考资料，请查阅\
  \ Sun 的文档。\n\n**代码清单 4-3：持久化代码**\n\n| **![示例开始](img/_1.gif)** |\n\n```\nimport java.io.*;\n\
  import java.beans.*;\n\n/**\n* 帮助将可序列化对象持久化为 XML\n* 并从中恢复。\n*/\npublic class XMLHelper{\n\
  \    public static void main(String args[]){\n        Regex regex = new Regex();\n\
  \        regex.setRegex(\"<((?i)TITLE>)(.*?)</\\\\1\");\n\nString desc =\n     \
  \   \"从 HTML 页面中提取 title 元素\";\n\nregex.setDescription(desc);\n\nsaveXML(regex,\
  \ \"htmlTitle.xml\");\n\n}\n\n/**\n    * 将可序列化对象保存为 XML 文件\n    * @param ser 要持久化的对象\n\
  \    * @param fileName 要保存到的文件名\n    */\n    public static void saveXML(Serializable\
  \ ser, String fileName){\n        try{\n            XMLEncoder e = new XMLEncoder(\n\
  \            new BufferedOutputStream(\n            new FileOutputStream(fileName)));\n\
  \            e.writeObject(ser);\n            e.close();\n        }\n        catch(IOException\
  \ ioe){\n            ioe.printStackTrace();\n        }\n\n}\n    /**\n    * 从 XML\
  \ 文件中获取可序列化对象\n    * @param fileName 要从中获取数据的文件名\n    * @return ser 要持久化的对象\n  \
  \  */\n    public static Serializable getXML(String fileName){\n    Serializable\
  \ retval= null;\n    try{\n        XMLDecoder d = new XMLDecoder(\n        new BufferedInputStream(\n\
  \        new FileInputStream(fileName)));\n        retval = (Serializable)d.readObject();\n\
  \        d.close();\n\n}\n    catch(IOException ioe){\n        ioe.printStackTrace();\n\
  \    }\n\nreturn retval;\n\n}\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n\
  本例中存储的正则表达式模式 ***<((?i)TITLE>)(.*?)</\\1*** 用于从 HTML 文件中提取第一个 title 元素的内容。有关其工作原理的详细分解，请参阅“常见问题解答”部分。\n\
  \n`XMLHelper` 类包含两个方法：`saveXML` 和 `getXML`，分别用于持久化和检索对象的状态。存储的 Regex 对象的 XML 状态如代码清单\
  \ 4-4 所示。\n\n**代码清单 4-4：持久化后的 Regex 对象的 XML 状态**\n\n| **![示例开始](img/_1.gif)** |\n\
  \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<java version=\"1.4.1\" class=\"\
  java.beans.XMLDecoder\">\n <object class=\"Regex\">\n  <void property=\"description\"\
  >\n   <string>从 HTML 页面中提取 title 元素</string>\n  </void>\n  <void property=\"regex\"\
  >\n     <string>&lt;((?i)TITLE&gt;)(.*?)&lt;/\\1</string>\n  </void>\n </object>\n\
  </java>\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n如您所见，这些信息大部分是人类可读且易于维护的。如果您修改此\
  \ XML 文件并反序列化该对象，反序列化后的对象将反映您的更改。这相当强大，但尚未达到我们期望的健壮性。您会注意到这一行：\n\n```\n <string>&lt;((?i)TITLE&gt;)(.*?)&lt;/\\\
  1</string>\n```\n\n正如预期的那样，它实际上将输入中的 *<* 字符改为了 *&lt*，将 *>* 字符改为了 *&gt*。这并不利于可读性。此外，您还会注意到\
  \ XML 中包含大量关于对象类型、方法名称等的元数据。我们并不需要这些。总而言之，这比 Properties 方法有所改进，但我们还能做得更好。\n\n| \
  \ | 注意  | 细心的读者可能已经注意到，手动将 XML 元素更改为 CDATA 段可以解决 XML 修饰问题，并且仍然允许对象反序列化过程正常工作。然而，据我所知，这种行为并不能保证跨平台一致，而且它仍然没有解决元数据杂乱的问题。\
  \ |\n\n\n\n### 使用 FileChannels 和 ByteBuffers 存储模式\n\nJava 新 I/O (NIO) 范式为外部化模式提供了一种简单而优雅的解决方案。无需深入探究\
  \ NIO，您可以使用代码清单 4-5 中的代码从持久化文件中提取正则表达式模式。\n\n代码清单 4-5：从文件中提取非 Java 分隔的正则表达式模式\n\n\
  | **![示例开始](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\nimport java.io.*;\n\
  import java.nio.*;\nimport java.nio.channels.*;\n\n/**\n* 提供一种简便机制来提取文件中的正则表达式内容\n\
  */\npublic class RegexHelper{\n\n/**\n   * 提取给定文件的内容。此特定提取过程专门\n   * 期望文件内容是一个非\
  \ Java 分隔的正则表达式模式。\n   *\n   * @param fileName 包含正则表达式模式的文件名。\n   * @returns 包含文件内容的字符串\n\
  \   * @author Mehran Habibi\n   **/\n   public static String getRegex(String fileName){\n\
  \    String retval = null;\n    try\n    {\n        //打开与文件的连接\n        FileInputStream\
  \ fis =\n        new FileInputStream(fileName);\n\n//获取文件通道\n        FileChannel\
  \ fc = fis.getChannel();\n\n//创建一个足够大的 ByteBuffer\n        //并将文件内容读入其中\n      \
  \  ByteBuffer bb = ByteBuffer.allocate((int)fc.size());\n\nfc.read(bb);\n      \
  \  bb.flip();\n        //将文件内容持久化为字符串\n        retval = new String(bb.array());\n\
  \n//释放 FileChannel\n        fc.close();\n        fc = null;\n\n}\n   catch(IOException\
  \ ioe)\n   {\n       ioe.printStackTrace();\n   }\n\nreturn retval;\n   }\n}\n```\n\
  \n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n当然，这里并非必须使用 FileChannels；任何执行文件字节级读取的机制都能得到相同的结果。然而，由于使用\
  \ NIO 读取字节非常自然，它似乎是最佳的总体解决方案。这样做的结果是，文件可以只包含纯粹的正则表达式模式，无需 Java 分隔，并且仍然能正常工作。\n\n\
  |  | 注意  | 确保模式在最后一个字符后没有多余的空格或换行符，因为这些字符会被读入作为模式的一部分，从而导致搜索失败。 |\n\n当然，这并非最友好的方式——例如，如果能像处理属性文件一样处理该文件，并在其中定义各种键，那就更好了。毕竟，您不希望被迫为每个正则表达式模式都准备一个单独的文件。例如，您可以传入一个键以及文件名，这样就能在同一个文件中存储多个模式。基于此，我们添加了重载方法\
  \ getRegex，如代码清单 4-6 所示。\n\n代码清单 4-6：重载的 getRegex 方法\n\n| **![示例开始](img/_1.gif)**\
  \ |\n\n```\n/**\n  * 提取给定文件中指定键的内容。此特定提取过程专门\n  * 期望文件内容是一个非 Java 分隔的正则表达式模式。\n\
  \  *\n  * @param fileName 包含正则表达式模式的文件名。\n  * @param key 文件中定义正则表达式的键\n  * @returns\
  \ 包含文件内容的字符串\n  * @author Mehran Habibi\n  **/\n  public static String getRegex(String\
  \ fileName, String key){\n   String retval = null;\n\n//获取文件内容\n   String content\
  \ = getRegex(fileName);\n\n//如果文件有内容，则尝试查找键\n   if (content != null)\n   {\n   \
  \ //查找行首，后跟键，再后跟等号，并捕获该键与行尾之间的所有内容\n    String keyRegex = \"^\"+key+\"=(.*)$\";\n\
  \n//我们期望输出包含多行\n    Pattern pattern = Pattern.compile(keyRegex,Pattern.MULTILINE);\n\
  \n//提取匹配器，并查找键对应的值\n    Matcher matcher = pattern.matcher(content);\n\nif (matcher\
  \ != null && matcher.find())\n       retval = matcher.group(1);\n\n}\n\nreturn retval;\n\
  \    } \n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n关键在于，您可以使用并编写非 Java 特定语法的正则表达式模式，至少就字符串语法的双重分隔而言是如此。尝试使用代码清单\
  \ 4-7 中的示例数据测试此代码。\n\n代码清单 4-7：正则表达式缓存文件的示例内容\n\n| **![示例开始](img/_1.gif)** |\n\n\
  ```\n#严格遵循电子邮件地址命名规范的电子邮件验证器。\n#它允许从 IP 地址和国家代码域名到用户名中非常罕见的字符。\nemail=^([a-zA-Z0-9_\\\
  -\\.]+)@((\\[[0-9]{1,3}\\.[0-9]{1,3}\\.[0-\n9]{1,3}\\.)|(([a-zA-Z0-9\\-]+\\.)+))([a-zA-Z]{2,4}|[0-\n\
  9]{1,3})(\\]?)$\n\n#根据以下规则匹配英国邮政编码：1\\. LN NLL\n#例如 N1 1AA 2\\. LLN NLL 例如 SW4 0QL\
  \ 3\\. LNN NLL 例如 M23 4PJ 4\\. LLNN NLL\n#例如 WS14 0JT 5\\. LLNL NLL 例如 SW1N 4TB\
  \ 6\\. LNL NLL 例如 W1C 8LQ 感谢\n#Simon Bell 提供信息...\nzip=^[a-zA-Z]{1,2}[0-9][0-9A-Za-z]{0,1}\
  \ {0,1}[0-9][A-Za-z]{2}$\n\n#此正则表达式匹配 XX/XX/YYYY 格式的日期\n#其中 XX 可以是 1 位或 2 位数字，YYYY\
  \ 始终是 4 位数字。\ndates=^\\d{1,2}\\/\\d{1,2}\\/\\d{4}$\n```\n\n| **![示例结束](img/_1.gif)**\
  \ |\n\n|  |\n\n因此，要提取正则表达式模式，您只需编写以下代码：\n\n```\nString regex =getRegex(\"regexCache.txt\"\
  ,\"email\");\n```\n\n您会注意到数据缓存文件也允许注释。当您编写完模式后，随着对模式细节的淡忘，这些注释会特别有用。\n\n最后，需要指出的是，这里存在几种不同且有效的方法。一种方法是自行创建\
  \ Properties 文件的子类，并提供对正则表达式友好的实现。将来，如果 Sun 决定做类似的事情，或者提供其他便捷机制来从文件中提取正则表达式模式，而无需要求正则表达式使用\
  \ Java 分隔，我也不会感到惊讶。与此同时，代码清单 4-8 提供了一个自定义属性文件读取器的只读实现，该实现允许存储正则表达式模式而无需双重分隔。\n\n\
  代码清单 4-8：自定义属性文件读取器\n\n| **![示例开始](img/_1.gif)** |\n\n```\n01  import java.util.Properties;\n\
  02  import java.util.regex.*;\n03  import java.util.*;\n04  import java.io.*;\n\
  05  import java.nio.*;\n06  import java.nio.channels.*;\n07  import java.util.logging.Logger;\n\
  \n08  /**\n09  * 提供 java.util.properties 文件的只读扩展。\n10 * 此类独特之处在于它专门设计用于读取未双重分隔的正则表达式，\n\
  11 * 而 String 类要求双重分隔。因此，\\s 是用于表示空白字符的实际字符串，\n12 * 而不是 \\\\s。相应地，此类不允许以编程方式修改正则表达式模式，\n\
  13 * 也不遵循 \\n、\\t 等常规属性文件约定，或\n14 * 多行属性。请参阅 load 方法的文档。\n15 */\n16 public class\
  \ RegexProperties extends Properties{\n17     private static Logger log = Logger.getAnonymousLogger();\n\
  18     /**\n19     * 参见 load(FileInputStream inStream)\n20     *\n21     * @param\
  \ String 要加载的文件名\n22     * @throws IOException 如果存在 IO 问题\n23     * @throws PatternSyntaxException\
  \ 如果文件格式未按照上述规范正确形成\n24     */\n\n\n\n29     public void load(String inStream)\n\
  30     throws IOException, PatternSyntaxException{\n31         load(new FileInputStream(inStream));\n\
  32     }\n33     /**\n34     * 用于读取存储为正则表达式的专用属性文件。\n35     * 通过 FileChannel 从输入流中读取属性列表（键和\n\
  36     * 元素对），从而允许使用所有字符。该流\n37     * 假定使用 ISO 8859-1 字符编码。\n38     * 每个属性占据输入流的一行。每\n\
  39     * 行以行终止符（\\n 或 \\r 或 \\r\\n）结束。\n40     * 文件的所有内容都会被读取。\n41     *\n42   \
  \  * 仅包含空白字符或其第一个\n43     * 非空白字符为 ASCII # 或 ! 的行将被忽略\n44     * （因此，# 或 ! 表示注释行）。\n\
  45     *\n46     * 除空白行或注释行之外的每一行都描述\n47     * 一个要添加到表中的属性。键由\n48     * 行中从第一个非空白字符开始到\n\
  49     * 第一个 ASCII =、: 或空白字符之前（但不包括该字符）的所有字符组成。\n50     * 键之后的任何空白字符将被跳过；如果键之后的第一个非空白字符\n\
  51     * 是 = 或 :，则忽略该字符。= 或 ; 之后的空白字符\n52     * <B>不会</B>被跳过，而是成为\n53     * 值的一部分。这是对该类默认行为的有意更改，\n\
  54     * 以支持可能需要这些字符的正则表达式。\n55     * 行中所有剩余的字符\n56     * 成为关联元素字符串的一部分。如果行中的最后一个\n\
  57     * 字符是 \\，则下一行<B>不会</B>\n58     * 被视为当前行的延续。同样，这是\n59     * 对该类默认行为的有意更改，以支持正则表达式。\n\
  60     *\n61     * @param FileInputStream inStream 实际的属性文件\n62     * @throws IOException\
  \ 如果存在 IO 问题\n63     * @throws PatternSyntaxException 如果文件格式不符合上述规范\n64     */\n\
  \n65     public void load(FileInputStream inStream)\n       throws IOException,\
  \ PatternSyntaxException{\n66      // 加载文件内容\n67      FileChannel fc = inStream.getChannel();\n\
  \n68      ByteBuffer bb = ByteBuffer.allocate((int)fc.size());\n69      fc.read(bb);\n\
  70      bb.flip();\n71      String fileContent = new String(bb.array());\n\n72 \
  \     // 定义一个模式，将内容逐行分解\n73      Pattern pattern = Pattern.compile(\"^(.*)$\",Pattern.MULTILINE);\n\
  74      Matcher matcher = pattern.matcher(fileContent);\n\n75      // 遍历 fileContent，逐行处理\n\
  76      while (matcher.find()){\n77          // 提取每行的相关部分。\n78          // 在此情况下，相关部分指的是行首\n\
  79          // 与行尾之间的字符\n80          String line = matcher.group(1) ;\n\n81    \
  \      // 如果行为空或为注释，则忽略\n82          if (\n83             line != null &&\n84  \
  \           !\"\".equals(line.trim()) &&\n85             !line.startsWith(\"#\"\
  ) &&\n86             !line.startsWith(\"!\")\n87          )\n88          {\n89 \
  \            String keyValue[] = null;\n\n90             // 键值对是用 '='\n91      \
  \       // 字符还是 ':' 字符分隔的？两者都是合法的。\n92             if (line.indexOf(\"=\") > 0 )\n\
  93               keyValue = line.split(\"=\",2);\n94             else\n95      \
  \         keyValue = line.split(\":\",2);\n\n96            // 最终检查 keyValue 是否为空，因为我们\n\
  97            // 将要将其放入映射中并进行修剪\n98            if (keyValue != null)\n99       \
  \     {\n100                super.put(keyValue[0].trim(),keyValue[1]);\n101    \
  \        }\n102         }\n103     }\n\n104     fc = null;\n105     bb = null;\n\
  106    }\n107     /**\n108     *\n109     * 不支持。此类设计为只读类。\n110     * 抛出 UnsupportedOperationException。\n\
  111     * @param String 要放入此属性列表中的键\n112     * @param String 与键对应的值\n113     * @throws\
  \ UnsupportedOperationException\n114     *\n115     */\n116     public void store(FileOutputStream\
  \ out, String header)\n117     throws UnsupportedOperationException\n118     {\n\
  119         String msg = \"unsupported for this class\";\n120         throw new\
  \ UnsupportedOperationException(msg);\n121     }\n122     /**!\n123     * 不支持。\n\
  124     * @param Object t - 要存储在此映射中的映射关系。\n125     *\n126     * @returns 无返回值，因为此调用始终抛出\n\
  127     * UnsupportedOperationException。\n128     * @throws  UnsupportedOperationException\n\
  129     */\n130     public void putAll(Map t)\n131    {\n132         String msg\
  \ = \"unsupported for this class\";\n133         throw new UnsupportedOperationException(msg);\n\
  134    }\n135 }\n\n\n\n## 按需编译你的正则表达式\n\n如果有可能用不到你的正则表达式，请务必坚持按需编译。也就是说，*如果*你确实需要用到`Pattern`对象，才去编译它。这在逻辑分支方法中尤其重要，因为可能根本不需要使用`Pattern`。更好的做法是，*寻找*条件编译正则表达式的机会。\n\
  \n例如，假设你正在日志处理器中解析日志条目，因为如果任何条目包含异常，你需要发送紧急邮件。当然，你可以编译模式***(.*Exception)***并对照每条记录的字符串进行检查。然而，这可能是过度设计，因为你当然不希望代码中出现任何异常。更好的做法是简单地使用`String.indexOf`查找子字符串*Exception*，并且仅在索引为正数时才尝试提取过程。这在清单\
  \ 4-9 中进行了演示。\n\n清单 4-9：检查异常的日志处理器\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport\
  \ java.util.logging.*;\nimport java.util.regex.*;\n/**\n * 监听日志条目中的异常\n * @author\
  \ M Habibi\n */\npublic class ExceptionHandler extends StreamHandler{\n\n    /**\n\
  \    * 检查正在记录的日志记录，并查看是否包含异常\n    * @param record 即将记录的 LogRecord\n    */\n    public\
  \ void publish(LogRecord record){\n        //提取消息\n        String msg = record.getMessage();\n\
  \n        //检查消息是否包含异常\n        int exceptionIndex = msg.indexOf(\"Exception\");\n\
  \n        //如果消息不包含字符串\n        //'Exception'，则无需编译正则表达式\n        if (exceptionIndex\
  \ > -1){\n\n            Pattern pattern =\n              Pattern.compile(\"(.*Exception.*)\"\
  );\n\n            Matcher matcher = pattern.matcher(msg);\n\n            if (matcher\
  \ != null && matcher.find()){\n                String err = \"EXCEPTION FOUND \"\
  \ + matcher.group(1);\n               System.out.println(err);\n               //在此处放置邮件发送代码\n\
  \            }\n        }\n    }\n} \n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\
  \n这段代码算不上特别巧妙，但它很好地筛选出了需要进一步调查的嫌疑对象，以及那些根本不可能是候选对象的条目。这里的原理当然是智能判别。如果你能排除不可能的候选对象，那么在生产环境中就能节省时间和资源。清单\
  \ 4-10 展示了测试工具。\n\n清单 4-10：将日志处理器添加到你的日志中\n\n| **![开始示例](img/_1.gif)** |\n\n```\n\
  import java.util.logging.*;\n\n/**\n* 演示日志监听器的用法\n*/\npublic class LogDemo{\n  \
  \  public static void main(String args[]){\n        Logger log = Logger.global;\n\
  \        setLoggerhandler(log);\n\n        //测试代码。即使是最高精细级别的条目也会被记录吗？\n        log.finest(new\
  \ Exception().toString());\n    }\n\n    /**\n    * 为给定的日志设置日志处理器。\n    * @param\
  \ log 需要监听器的日志记录器\n    * @version 1.0 5/12/2002\n    */\n    public static void\
  \ setLoggerhandler(Logger logger){\n        Handler handler = new ExceptionHandler();\n\
  \        logger.addHandler(handler);\n\n        //设置为处理所有错误，以便检查所有错误。\n        logger.setLevel(Level.ALL);\n\
  }} \n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n|  | 注意  | 你会注意到这段代码没有处理`Logger.throwing`方法，也没有实际发送邮件。别担心，实现这些功能的代码可以在[`www.influxs.com`](http://www.influxs.com)找到。然而，这里的实现需要超出正则表达式范围的解释。\
  \ |\n\n## 不要局限于正则表达式解决方案\n\n当你手里拿着锤子，看什么都像钉子。重要的是要意识到，并非所有文本解析问题都需要正则表达式解决方案。例如，假设你需要将一个逗号分隔的字符串分解成各个组成部分。当然，编写一个正则表达式很容易做到这一点。但是，你不需要为正则表达式来解决这个问题；`StringTokenizer`就足够了。\n\
  \n同理，你不必将自己局限于正则表达式或传统的 Java 解决方案；你可以混合搭配。例如，假设你需要解析一个日志文件，并识别其中异常的类型和频率。你也许可以编写一个正则表达式，用一行代码就完成这个任务——我没有这么聪明或耐心，但可能有很多人能做到。\n\
  \n然而，我认为在 Java 中这可能不是正确的方法。当你完成正则表达式的编写、测试和文档记录时，你团队中的其他程序员可能会因为要维护你的代码而瑟瑟发抖。采用利用正则表达式的程序化解决方案，而不是编写纯正则表达式解决方案，可能会更容易。清单\
  \ 4-9 中给出了这样一个解决方案。\n\n清单 4-11 中的代码是自包含的，应该可以直接使用。但是，它需要两个小的调整。首先，你需要定义一个`regexCache.txt`文件来保存你的正则表达式模式，如前文清单\
  \ 4-7 所述。其次，你需要在该文件中为键*exRegex*定义一个正则表达式条目。该条目的值应为\\***s([a-zA-Z.]*\\.[a-zA-Z.]*Exception)***。然后，要运行代码，你只需指向一个包含异常的日志文件即可。\n\
  \n清单 4-11：日志解析器\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\n\
  import java.util.*;\nimport java.io.*;\nimport java.nio.*;\nimport java.nio.channels.*;\n\
  import java.beans.*;\n\n/**\n* 此类解析日志，并识别所有抛出的异常及其发生频率。\n*\n*@ author M Habibi\n\
  */\npublic class LogParser{\n/**\n* 应用异常模式的正则表达式的键\n*/\npublic static final String\
  \ REGEX_KEY=\"exRegex\";\n\n/**\n* 包含正则表达式键的文件名。\n* 这应该从属性文件中提取，\n* 但我们暂时保持现状。\n\
  */\npublic static final String REGEX_KEY_FILE=\"regexCache.txt\";\n\n/**\n* 从命令行运行程序。\n\
  * @param args[]. 如果传入了日志文件名，则使用它。\n* 否则，代码会查找名为'server.log'的文件。\n*/\npublic static\
  \ void main(String args[]){\n    String logFile = \"server.log\";\n    if (args\
  \ != null && args.length == 1){\n        logFile = args[0];\n    }\n    examineLog(logFile);\n\
  \n}\n\n/**\n* 解析日志，并识别所有抛出的异常及其发生频率。\n*\n* @param logFile 要检查的日志文件名。\n* @param regexCacheFile\
  \ 包含正则表达式缓存的文件名。\n* @param regexKey 在 regexCacheFile 中键的名称。\n* @return 一个 Map，包含找到的异常名称作为键，其频率作为值。\n\
  */\npublic static Map examineLog(\n    String logFile,\n    String regexCacheFile,\n\
  \    String regexKey){\n     //创建一个 Map，用于按异常出现的顺序保留顺序\n    Map retval = new LinkedHashMap();\n\
  \n//提取正则表达式\n    String regex =getRegex(regexCacheFile,regexKey);\n\n//获取日志文件的内容\n\
  \    String fileContent = readFile(logFile);\n\n//编译模式，并记录其执行时间\n    Pattern pattern\
  \ =\n       Pattern.compile(regex, Pattern.MULTILINE);\n\nlong startTime = System.currentTimeMillis()\
  \ ;\n    Matcher matcher = pattern.matcher(fileContent);\n\n\n\n//查找匹配项。\n    while\
  \ (matcher.find()){\n       String exceptionName = matcher.group(1);\n       incrementMapCount(retval,exceptionName);\n\
  \    }\n\nlong endTime = System.currentTimeMillis() ;\n    long totalTime= endTime\
  \ - startTime;\n\n//记录总处理时间\n    totalTime =totalTime/(long)1000;\n    System.out.println(\"\
  totalTime = \" + totalTime);\n\n//显示输出结果\n    System.out.println(\"retval = \" +\
  \ retval);\n\nreturn retval;\n\n}\n    /**\n    * 解析日志，识别所有抛出的异常及其出现频率。\n    *\n\
  \    * @param logFile 要检查的日志文件名\n    * @return 一个 Map，其中键为找到的异常名称，值为其出现频率\n    */\n\
  \    public static Map examineLog(String logFile){\n        Map map =examineLog(logFile,REGEX_KEY_FILE,REGEX_KEY);\n\
  \        return map;\n    }\n\n/**\n    * 从给定文件中提取指定键对应的内容。\n    * 此特定提取过程预期文件内容为\n\
  \    * 非 Java 分隔的正则表达式模式。\n    *\n    * @param fileName 包含正则表达式模式的文件名\n    * @param\
  \ key 文件中定义正则表达式的键\n    * @returns 包含文件内容的字符串\n    * @author Mehran Habibi\n   \
  \ **/\n    private static String getRegex(String fileName, String key){\n     String\
  \ retval = null;\n\n//获取文件内容\n     String content = readFile(fileName);\n\n//如果文件有内容，则尝试查找键\n\
  \     if (content != null)\n     {\n      //查找行首，后跟键，再跟等号，并捕获键与行尾之间的所有内容\n     \
  \ String keyRegex = \"^\"+key+\"=(.*)$\";\n      Pattern pattern = Pattern.compile(keyRegex,Pattern.MULTILINE);\n\
  \nMatcher matcher = pattern.matcher(content);\n     if (matcher != null && matcher.find())\n\
  \        retval = matcher.group(1);\n\n}\n\nreturn retval;\n    }\n\n/**\n    *\
  \ 增加异常名称的计数，或为其创建新条目。\n    * @param map 预期存储异常名称（String 键）和计数（Integer 值）的 Map\n\
  \    * @param exceptionName 被跟踪的异常名称\n    */\n    private static void incrementMapCount\n\
  \    (Map map, String exceptionName)\n    {\n        Integer currentCount = (Integer)map.get(exceptionName);\n\
  \nif (currentCount == null){\n            map.put(exceptionName, new Integer(1));\n\
  \n}\n        else{\n            currentCount = new Integer(currentCount.intValue()\
  \ + 1);\n            map.put(exceptionName,currentCount);\n\n}\n\n}\n\n/**\n   *将指定文件的内容作为字符串返回。\n\
  \   * @param fileName 指定的文件名\n   * @return 包含文件内容的字符串\n   *\n   */\n   private static\
  \ String readFile(String fileName){\n       String retval = null;\n       try{\n\
  \            //打开文件连接\n            FileInputStream fis =\n            new FileInputStream(fileName);\n\
  \            FileChannel fc = fis.getChannel();\n            //创建一个足够大的字节缓冲区\n \
  \           //以容纳文件内容，\n            //并将文件内容读入其中\n            ByteBuffer bb = ByteBuffer.allocate((int)fc.size());\n\
  \            fc.read(bb);\n            bb.flip();\n\n//将内容保存为字符串\n            retval\
  \ = new String(bb.array());\n\n//清理资源\n            fc.close();\n            bb=\
  \ null;\n            fis = null;\n            fc= null;\n\n}\n       catch(Exception\
  \ e){\n             e.printStackTrace();\n       }\n\nreturn retval;\n   }\n}\n\
  ```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n清单 4-11 是一个较长的示例，但值得仔细阅读。就正则表达式的复杂性而言，这里并没有太多内容，但代码在基于\
  \ Java 的面向代码解决方案方面做得相当不错：它并没有拘泥于正则表达式解决方案。事实上，正则表达式被当作另一种工具来使用，就像 Map 或 FileChannel\
  \ 一样。我认为，这才是应有的方式。\n\nPattern 对象在 examineLog 方法中根据条件进行编译，重要的正则表达式模式被外部化，并且方法是面向对象且基于逻辑的。你不需要成为正则表达式专家就能理解这里发生了什么，这正是关键所在。顺便提一下，当我在配备\
  \ 256MB 内存、1.5GHz 主频的笔记本电脑上运行它时，即使日志文件大小为 9.26MB，它也仅用了 4 秒就执行完毕。\n\n## 总结\n\n本章提供了如何在\
  \ Java 面向对象环境中处理正则表达式的解释、细节和示例。我讨论了如何访问文件，涵盖了通过将文件内容缓存到内存来优化速度的策略，探讨了在外部存储正则表达式模式的方法及原因，并介绍了在正则表达式代码与自然面向对象编程范式之间取得平衡的策略。在第\
  \ 5 章中，你将利用本章以及前几章介绍的内容来解决实际的正则表达式问题。\n\n\n\n## 常见问题解答\n\n| **问：** | **模式 `<((?i)TITLE>)(.*?)</\\\
  1` 如何分解？** | ![答案见表 4-1。特别值得关注的是子组 `(.*?)`。请注意，这是一个惰性限定符，因此它会在遇到下一个 `<title>` 元素之前尽可能少地匹配。这里的区别在于，给定\
  \ `<title>first title</title><title>second title></title>`，该模式只会提取 `first title`。然而，如果没有惰性限定符，它会提取\
  \ `first title</title><title>second title>`。模式 `<((?i)TITLE>)(.*?)</(/1)` 正则表达式描述\
  \ * 用中文解释：提取第一个出现的 TITLE 元素的内容，并愿意匹配 TITLE 的任何大小写版本，包括 Title、title 等。 - 字符 `<` 后跟\
  \ ( 一个组，包含 (?i) 不区分大小写的比较 T 字符 T 后跟 I 字符 I 后跟 T 字符 T 后跟 L 字符 L 后跟 E 字符 E 后跟 > 字符\
  \ > ) 关闭组 ( 后跟一个组，包含 . 任意字符 * 重复任意次数 ? 惰性匹配 ) 关闭组，后跟 < 字符 < 后跟 / 字符 / 后跟 \\1 第一个组，匹配了\
  \ `(?i)TITLE>`](img/#LiB0040.html#answer.N19) |\n| **问：** | **如何判断我的正则表达式是否过于复杂？**\
  \ | ![任何正则表达式的首要目标当然是准确且高效地工作。第二个目标是可读性。如何判断它是否可读？我的建议是，根据你认为需要的详细程度添加注释，然后将其交给几位可能需要解读它的开发人员。如果他们能理解（或者更好的是，他们能够修改它），那么它可能足够清晰。如果不能，那么你可能需要考虑重构。](img/#LiB0040.html#answer.N271)\
  \ |\n\n答案\n\n| **答：**  | 答案见表 4-1。特别值得关注的是子组 ***(.*?)***。请注意，这是一个惰性限定符，因此它会在遇到下一个\
  \ *<title>* 元素之前尽可能少地匹配。这里的区别在于，给定 *<title>first title</title><title>second title></title>*，该模式只会提取\
  \ *first title*。然而，如果没有惰性限定符，它会提取 *first* *title</title><title>second title>*。\n\
  \n表 4-1：模式 `<((?i)TITLE>)(.*?)</(/1)`\n\n&#124; **正则表达式** &#124; **描述** &#124;\n\
  &#124; --- &#124; --- &#124;\n&#124; < &#124; 字符 *<* 后跟 &#124;\n&#124; ( &#124;\
  \ 一个组，包含 &#124;\n&#124; (?i) &#124; 不区分大小写的比较 &#124;\n&#124; T &#124; 字符 *T* 后跟\
  \ &#124;\n&#124; I &#124; 字符 *I* 后跟 &#124;\n&#124; T &#124; 字符 *T* 后跟 &#124;\n&#124;\
  \ L &#124; 字符 *L* 后跟 &#124;\n&#124; E &#124; 字符 *E* 后跟 &#124;\n&#124; > &#124; 字符\
  \ *>* &#124;\n&#124; ) &#124; 关闭组 &#124;\n&#124; ( &#124; 后跟一个组，包含 &#124;\n&#124;\
  \ . &#124; 任意字符 &#124;\n&#124; * &#124; 重复任意次数 &#124;\n&#124; ? &#124; 惰性匹配 &#124;\n\
  &#124; ) &#124; 关闭组，后跟 &#124;\n&#124; < &#124; 字符 *<* 后跟 &#124;\n&#124; / &#124;\
  \ 字符 */* 后跟 &#124;\n&#124; \\1 &#124; 第一个组，匹配了 ***(?i)TITLE>*** &#124;\n&#124; *\
  \ **用中文解释：** 提取第一个出现的 *TITLE* 元素的内容，并愿意匹配 *TITLE* 的任何大小写版本，包括 *Title*、*title* 等。\
  \ &#124;\n\n |\n| **答：**  | 任何正则表达式的首要目标当然是准确且高效地工作。第二个目标是可读性。如何判断它是否可读？我的建议是，根据你认为需要的详细程度添加注释，然后将其交给几位可能需要解读它的开发人员。如果他们能理解（或者更好的是，他们能够修改它），那么它可能足够清晰。如果不能，那么你可能需要考虑重构。\
