  \ |\n| **问：** | **Java 使用什么类型的正则表达式引擎？** | ![J2SE 使用传统的非确定性有限自动机（NFA）引擎。这意味着当引擎遇到分叉路径时，它会选择一条路径，记住另一条路径的位置以防万一，然后继续前进。这样做的好处是，如果你编写高效的表达式，可以非常非常快地引导引擎找到匹配。缺点是，如果你编写低效的表达式，可能会让正则表达式引擎在最终找到匹配之前进行一场徒劳的搜索。](img/#LiB0013.html#answer.N210)\
  \ |\n\n答案\n\n| **答：**  | 在正则表达式中，***\\b*** 表示单词边界。然而，在通用的 Java 术语中，***\\b*** 表示退格键。规则如下：字面量字符串\
  \ ***\\b*** 表示退格字符。但是，字面量字符串 ***\\\\b*** 表示单词边界。 |\n| **答：**  | 如果你需要精确匹配，请使用 `String.matches`\
  \ 方法。例如，如果你想要恰好七个连续的数字，并且不接受其他任何内容，那么可以使用模式 ***\\d{7}*** 的 `String.matches` 方法。通常，如果你准备缩小可接受模式的定义范围，或者愿意定义所有可能的变体，那么请使用\
  \ `String.matches` 方法。另一方面，如果你是在查找子字符串是否存在，那么使用 `Pattern` 和 `Matcher` 对象会更合适。 |\n\
  | **答：**  | 不。`String.matches` 方法只是调用了 `Pattern.matches` 方法，而后者又会创建并使用一个 `Pattern`\
  \ 对象和一个 `Matcher` 对象。 |\n| **答：**  | 绝对不能。`String` 对象在 Java 中是不可变的，因此它们不能被更改。但是，你可以创建一个包含所需更改的新\
  \ `String` 对象。因此，如果你有一个字符串 \n```\nString tmp = \"Hello\";\n```\n\n并且你想通过执行以下操作将\
  \ e 改为 X：\n\n```\nString newTmp = tmp.replaceFirst(\"e\",\"X\");\n```\n\n`tmp` 的值仍然是\
  \ `Hello`，但 `newTmp` 的值是 `HXllo`。 |\n| **答：**  | 因为 *John* 匹配了模式的第一部分，*Mc* 匹配了模式的第二部分，*Gee*\
  \ 也匹配了模式的第二部分。作为测试，尝试在 `NameFormat.java` 程序中运行 *John Janis McGee*。这里的要点是，*John*\
  \ 由一个大写字母、后跟一个或多个小写字母、再后跟一个空格组成。*Mc* 由一个大写字母、后跟一个或多个小写字母、后跟零个空格组成，*Gee* 由一个大写字母、后跟一个或多个小写字母、后跟零个空格组成。这可能不完全符合你的预期，但在这种情况下似乎是允许的。在使用正则表达式时，精确并做大量测试非常重要，否则必然会出现意外结果。\
  \ |\n| **答：**  | J2SE 使用传统的非确定性有限自动机（NFA）引擎。这意味着当引擎遇到分叉路径时，它会选择一条路径，记住另一条路径的位置以防万一，然后继续前进。这样做的好处是，如果你编写高效的表达式，可以非常非常快地引导引擎找到匹配。缺点是，如果你编写低效的表达式，可能会让正则表达式引擎在最终找到匹配之前进行一场徒劳的搜索。\
  \ |\n\n"
- "# 第 2 章：Java.util.regex 对象模型简介\n\n## 概述\n\n> *“如何吃掉一头大象？一口一口地吃。”*\n> \n> — 谚语\n\
  \nJava 新的 `java.util.regex` 包提供了一个优雅且灵活的对象模型，用于满足正则表达式的需求。它完全由三个对象组成：`Pattern` 对象、`Matcher`\
  \ 对象和一个 `PatternSyntaxException`。本章详细介绍了 `Pattern` 和 `Matcher` 类的所有方法和字段，并提供了它们的使用示例。在本章中，我还将讨论新添加到\
  \ `String` 类中的支持正则表达式的方法。\n\n本章首先对 `Pattern` 类进行剖析。我将涵盖每一个方法和字段，并经常提供示例。我还将以类似的详细程度探讨\
  \ `Matcher` 类。最后，我将通过讨论已添加到 `String` 类中的正则表达式方法来结束本章。\n\n\n\n## 模式对象\n\n图 2-1 展示了\
  \ Pattern 类的方法。该图是 Pattern 类的 UML 渲染图，展示了该类的各种方法和常量。\n\n![点击展开](img/fig74_01_0.jpg)\n\
  图 2-1: Pattern 类的 UML 表示\n\n让我们详细考察 Pattern 类的字段和方法。如果你不熟悉 UML，这里有一份快速指南，帮助你阅读图\
  \ 2-1：\n\n*   类的名称是 Pattern，位于矩形的最顶部区域。\n*   中间区域是字段变量的分组。前面的加号（+）表示它们是公有的。下划线表示它们是静态的，而\"\
  : int\"表示它们是 int 类型。\"= num\"表示默认值。\n*   矩形的最底部区域存放着类的方法。同样，加号表示公有访问权限，下划线表示该方法是静态的。括号表示给定方法的参数；因此，`flags()`不带参数，而`matcher(input\
  \ : CharSequence)`接受一个名为 input、类型为 CharSequence 的变量。末尾的冒号（:）表示类型。\n\n以下各节将描述 Pattern\
  \ 类的字段和方法。\n\n### public static final int UNIX_LINES\n\nUNIX_LINES 标志用于构造`Pattern.compile(String\
  \ regex, int flags)`方法的第二个参数。当你解析源自 UNIX 机器的数据时，请使用此标志。\n\n在许多 UNIX 变体中，不可见字符***\\\
  n***用于表示行的终止。这与其他操作系统不同，包括各种 Windows 变体，它们可能使用***\\r\\n***、***\\n***、***\\r***、***\\\
  u2028***或***\\u0085***作为行终止符。\n\n如果你将一个源自 UNIX 机器的文件传输到 Windows 平台并打开它，你可能会注意到，根据你用来查看文本的编辑器不同，行有时不会以预期的方式终止。这是因为两个系统可能使用不同的语法来表示行的结束。\n\
  \nUNIX_LINES 标志只是告诉正则表达式引擎它正在处理 UNIX 风格的行，这会影响正则表达式元字符***^***和***$***的匹配行为。使用 UNIX_LINES\
  \ 标志或等效的***(?d)***正则表达式模式，不会降低性能。默认情况下，此标志未设置。\n\n### public static final int CASE_INSENSITIVE\n\
  \nCASE_INSENSITIVE 字段用于构造`Pattern.compile(String regex, int flags)`方法的第二个参数。当你需要匹配\
  \ ASCII 字符而不区分大小写时，它非常有用。\n\n使用此标志或等效的***(?i)***正则表达式可能会导致性能略有下降。默认情况下，此标志未设置。\n\
  \n### public static final int COMMENTS\n\nCOMMENTS 标志用于构造`Pattern.compile(String\
  \ regex, int flags)`方法的第二个参数。它告诉正则表达式引擎，正则表达式模式中嵌入了注释。具体来说，它告诉正则表达式引擎忽略模式中的任何注释，从***#***字符前的空格开始，以及之后的所有内容，直到行尾。\n\
  \n因此，正则表达式模式***A*** ***#matches uppercase US-ASCII char code 65***将使用***A***作为正则表达式，但***#***字符前的空格以及之后直到行尾的所有内容都将被忽略。你的代码最终可能看起来像这样：\n\
  \n```\nPattern p =\nPattern.compile(\"A    #matches uppercase US-ASCII char code\
  \ 65\",Pattern.COMMENTS); \n```\n\n将***#***字符视为正则表达式中与 Java 注释`//`等效的符号。通过在编译正则表达式时使用\
  \ COMMENTS 标志，你是在告诉正则表达式引擎你的表达式包含注释，这些注释应该被忽略。当你的模式特别复杂或微妙时，这会很有用。当你未设置此标志时，正则表达式引擎将尝试将你的注释解释并用作正则表达式的一部分。\n\
  \n使用此标志或等效的***(?x)***正则表达式不会降低性能。\n\n### public static final int MULTILINE\n\nMULTILINE\
  \ 标志用于构造`Pattern.compile(String regex, int flags)`方法的第二个参数。它告诉正则表达式引擎，正则表达式的输入不是单行代码；相反，它包含多行，每行都有自己的终止字符。\n\
  \n这意味着行首字符***^***和行尾字符***$***可能会匹配输入字符串中的多行。例如，假设你的输入字符串是*This is a sentence.\\\
  n So is this.*。如果你使用 MULTILINE 标志编译正则表达式模式\n\n```\nPattern p = Pattern.compile(\"\
  ^\", Pattern.MULTILINE);\n```\n\n那么行首字符***^***将匹配*This is a sentence*中的*T*之前。它还会匹配*So\
  \ is this*中的*S*之前。当你未使用 MULTILINE 标志时，匹配只会找到*This is a sentence*中的*T*。\n\n使用此标志或等效的***(?m)***正则表达式可能会降低性能。\n\
  \n### public static final int DOTALL\n\nDOTALL 标志用于构造`Pattern.compile(String regex,\
  \ int flags)`方法的第二个参数。DOTALL 标志告诉正则表达式引擎允许元字符句点匹配任何字符，包括行终止字符。这意味着什么？\n\n假设你的候选字符串是*Test\\\
  n*。如果你对应的正则表达式模式是`.`，通常你会得到四个匹配：一个匹配*T*，另一个匹配*e*，第三个匹配*s*，第四个匹配*t*。这是因为正则表达式元字符`.`通常匹配任何字符，*除了*行终止字符。\n\
  \n按如下方式启用 DOTALL 标志：\n\n```\nPattern p = Pattern.compile(\".\", Pattern.DOTALL);\n\
  ```\n\n将生成五个匹配。你的模式将匹配*T*、*e*、*s*和*t*字符。此外，它还会匹配行尾的*\\n*字符。\n\n使用此标志或等效的***(?s)***正则表达式不会降低性能。\n\
  \n### public static final int UNICODE_CASE\n\nUNICODE_CASE 标志用于构造`Pattern.compile(String\
  \ regex, int flags)`方法的第二个参数。它与 CASE_INSENSITIVE 标志结合使用，为国际字符集生成不区分大小写的匹配。\n\n使用此标志或等效的***(?u)***正则表达式可能会降低性能。\n\
  \n### public static final int CANON_EQ\n\nCANON_EQ 标志用于构造`Pattern.compile(String\
  \ regex, int flags)`方法的第二个参数。如你所知，字符实际上是以数字形式存储的。例如，在 ASCII 字符集中，字符*A*由数字 65 表示。根据你使用的字符集，同一个字符可以由不同的数字组合表示。例如，*à*可以由*+00E0*和*U+0061U+0300*两者表示。CANON_EQ\
  \ 匹配将匹配任何一种表示形式。\n\n使用此标志可能会降低性能。\n\n\n\n### public static Pattern compile(String\
  \ regex) 抛出 PatternSyntaxException\n\n你会注意到 Pattern 类没有公共构造方法。这意味着你*不能*编写如下代码：\n\
  \n```\nPattern p = new Pattern(\"my regex\");//错误！\n```\n\n要获取 Pattern 对象的引用，你必须使用静态方法\
  \ compile(String regex)。因此，你的第一行正则表达式代码可能如下所示：\n\n```\nPattern p = Pattern.compile(\"\
  my regex\");//正确！\n```\n\n该方法的参数是一个表示正则表达式的字符串。当你将一个字符串传递给期望正则表达式的方法时，务必通过在每个 *\\\
  * 字符后附加另一个 *\\* 字符来转义正则表达式中可能存在的任何 *\\* 字符。这是因为 String 对象内部使用 *\\* 字符来转义字符序列中的元字符，无论这些字符序列是否是正则表达式。早在正则表达式成为\
  \ Java 的一部分之前，情况就是如此。因此，正则表达式 ***\\d*** 变成了 ***\\\\d***。要匹配单个数字，你的正则表达式变成如下形式：\n\
  \n```\nPattern p = Pattern.compile(\"\\\\d\");\n```\n\n这里的关键点是，正则表达式 ***\\d*** 变成了字符串\
  \ ***\\\\d***。\n\n字符串参数的转义有时可能很棘手，因此充分理解这一点很重要。总的来说，这意味着你需要*加倍*正则表达式中可能已经存在的 *\\\
  * 字符。它*并不*意味着你只需简单地附加一个 *\\* 字符。我稍后会提供一个例子来说明这一点。\n\n如果正则表达式本身格式错误，compile 方法将抛出\
  \ java.util.regex.PatternSyntaxException。例如，如果你传入一个包含 ***4*** 的字符串，compile 方法会在运行时抛出\
  \ PatternSyntaxException，因为正则表达式 ***[4*** 的语法是非法的，如[清单 2-1 所示。\n\n清单 2-1：使用 compile\
  \ 方法\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\n\npublic\
  \ class DelimitTest{\n  public static void main(String args[]){\n\n    //抛出异常\n\
  \    Pattern p = Pattern.compile(\"4\");\n  }\n}\n```\n\n| **![结束示例** ||  |这是否意味着每次使用正则表达式时都必须捕获\
  \ PatternSyntaxException？不。PatternSyntaxException 不必显式捕获，因为它继承自 RuntimeException，而\
  \ RuntimeException 不需要显式捕获。compile(String regex) 方法返回一个 Pattern 对象。### public static\
  \ Pattern compile(String regex, int flags) 抛出 PatternSyntaxException(String regex,\
  \ int flags) 方法是 compile(String) 方法的一种更强大的形式。该方法的第一个参数 regex 是一个表示正则表达式的字符串，详情如前文所述。关于如何格式化\
  \ String 参数的详细信息，请参阅“public static Pattern compile(String regex) 抛出 PatternSyntaxException”一节。该\
  \ compile 方法的灵活性通过使用第二个参数 int flags 得以充分体现。int flags 参数可以包含以下标志，或通过 OR 运算组合这些标志创建的位掩码：*\
  \   CANON_EQ*   CASE_INSENSTIVE*   COMMENTS*   DOTALL*   MULTILINE*   UNICODE_CASE*\
  \   UNIX_LINES 例如，如果你希望无论候选字符串的大小写如何都能匹配成功，那么你的模式可能如下所示：``` Pattern p = Pattern.compile(regex,Pattern.CASE_INSENSITIVE);```你可以使用\
  \ | 运算符组合这些标志。例如，要实现包含注释的、不区分大小写的 Unicode 匹配，你可以使用以下代码：```Pattern p =Pattern.compile(\"\
  t # 复合标志示例\",Pattern.CASE_INSENSITIVE | Pattern.UNICODE_CASE|Pattern.COMMENT);```compile(String\
  \ regex, int flags) 方法返回一个 Pattern 对象。### public String pattern()此方法返回已编译正则表达式的简单字符串表示。它有时可能在两个方面产生误导。首先，返回的字符串不反映编译模式时设置的任何标志。其次，你传入的正则表达式字符串并不总是你取回的模式字符串。具体来说，原始的字符串转义不会被显示。因此，如果你的原始代码如下：```Pattern\
  \ p = Pattern.compile(\"\\\\d\");```你应该期望输出是 ***\\d***，带有一个单独的 ***\\*** 字符。这里自然会产生一个问题：如果此方法去掉了原始的转义，你能将结果字符串作为正则表达式提供给另一个表达式吗？例如，清单\
  \ 2-2 能工作吗？清单 2-2：模式匹配示例| **![开始示例](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\n\
  \npublic class PatternMethodExample{\n  public static void main(String args[]){\n\
  \      reusePatternMethodExample();\n  }\n\n   public static void reusePatternMethodExample(){\n\
  \      //匹配单个数字\n      Pattern p = Pattern.compile(\"\\\\d\");\n      Matcher matcher\
  \ = p.matcher(\"5\");\n      boolean isOk = matcher.matches();\n      System.out.println(\"\
  原始模式匹配结果 \" + isOk);\n\n      //重用模式\n      String tmp = p.pattern();\n      Pattern\
  \ p2 = Pattern.compile(tmp);\n      matcher = p.matcher(\"5\");\n      isOk = matcher.matches();\n\
  \      System.out.println(\"第二个模式匹配结果 \" + isOk);\n   }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
  \ |\n\n|  |\n\n此方法会抛出 RuntimeException 吗？毕竟，pattern() 方法返回 ***\\d***，而尝试使用 ***\\\
  d*** 作为字符串创建正则表达式模式将会编译失败。\n\n答案是不会，它不会抛出异常。请记住，加倍 ***\\*** 字符是 String 对象构造方法的要求——它与该字符串所表示的正则表达式模式无关。因此，一旦字符串被创建，冲突就消失了。\n\
  \n### public Matcher matcher(CharSequence input)\n\n请记住，你通过编译你要查找内容的描述来创建一个 Pattern\
  \ 对象。Pattern 有点像一则个人广告：它列出了你要寻找的事物的特征。纯粹从概念上讲，你的模式可能如下所示：\n\n```\nPattern p = Pattern.compile(\"\
  她必须有红头发和火爆脾气\");\n```\n\n相应地，你需要将该描述与候选对象进行比较。也就是说，你需要检查一个给定的字符串，看它是否与你提供的描述匹配。\n\
  \nMatcher 对象就是专门为帮助你进行这种查询而设计的。我将在本章下一节详细讨论 Matcher，但现在你应该知道，Pattern.matcher(CharSequence\
  \ input) 方法返回一个 Matcher，它将帮助你获取关于候选字符串与你传入的描述相比如何的详细信息。\n\nPattern.matcher(CharSequence\
  \ input) 接受一个 CharSequence 参数作为输入参数。CharSequence 是 J2SE 1.4 中引入的一个新接口，并由 String\
  \ 对象回溯实现。由于 String 实现了 CharSequence，你可以简单地将一个 String 对象作为参数传递给 Pattern.matcher(CharSequence\
  \ input) 方法。我稍后将详细讨论 CharSequence 参数。\n\n在前面的例子中，再次纯粹从概念上讲，你可以如下获取你的 Matcher 对象：\n\
  \n```\nMatcher m = pattern.matches(\"Anna\");\n```\n\n在 J2SE 中，这个 Matcher 对象的 matches()\
  \ 方法将返回 true。在现实生活中，结果可能因人而异。\n\n\n\n### public int flags()\n\n前面我讨论了在编译正则表达式模式时可以使用的常量标志。`flags`\
  \ 方法只是返回一个代表这些标志的 `int` 值。例如，要查看你的 `Pattern` 类当前是否使用了某个给定的标志（比如 `Pattern.COMMENTS`\
  \ 标志），只需提取该标志：\n\n```\nint flgs = myPattern.flags();\n```\n\n然后将该标志与 `Pattern.COMMENTS`\
  \ 标志进行“与”（&）运算：\n\n```\nboolean isUsingCommentFlag =( Pattern.COMMENTS == (Pattern.COMMENTS\
  \ & flgs)) ;\n```\n\n类似地，要查看你是否使用了 `CASE_INSENSITIVE` 标志，可以使用以下代码：\n\n```\nboolean\
  \ isUsingCaseInsensitiveFlag =\n(Pattern.CASE_INSENSITIVE == (Pattern. CASE_INSENSITIVE\
  \ & flgs));\n```\n\n### public static boolean matches (String regex,CharSequence\
  \ input)\n\n很多时候，你只需要知道一个字符串是否完全匹配给定的正则表达式。你不想创建一个 `Pattern` 对象，提取它的 `Matcher` 对象，然后再询问那个\
  \ `Matcher`。\n\n这个静态实用方法正是为此而设计的。在内部，它会创建你所需的 `Pattern` 和 `Matcher` 对象，将正则表达式与输入字符串进行比较，并返回一个布尔值，告诉你两者是否完全匹配。清单\
  \ 2-3 给出了一个使用示例。\n\n清单 2-3：Matches 示例\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport\
  \ java.util.regex.*;\npublic class PatternMatchesTest{\n  public static void main(String\
  \ args[]){\n\n      String regex = \"ad*\";\n      String input = \"add\";\n\n \
  \     boolean isMatch = Pattern.matches(regex,input);\n      System.out.println(isMatch);//返回\
  \ true\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n如果你要进行大量比较，那么显式创建一个\
  \ `Pattern` 对象并手动进行匹配会更高效。然而，如果你不需要进行大量比较，那么 `matches` 就是一个方便的实用方法。\n\n`Pattern.matches(String\
  \ regex, CharSequence input)` 方法也在 `String` 类内部使用。从 J2SE 1.4 开始，`String` 有一个名为 `matches`\
  \ 的新方法，它在内部委托给 `Pattern.matches` 方法。你可能已经在使用这个方法而不自知。\n\n当然，如果所考虑的正则表达式模式格式不正确，此方法可能会抛出\
  \ `PatternSyntaxException`。\n\n### public String[] split(CharSequence input)\n\n\
  如果你需要根据某些条件将一个字符串拆分成子字符串数组，这个方法会特别有用。在概念上，它类似于 `StringTokenizer`，但它比 `StringTokenizer`\
  \ 更强大，资源消耗也更大，因为它允许你的程序使用正则表达式作为拆分条件。\n\n此方法总是返回至少一个元素。如果找不到要拆分的候选字符串 `input`，则返回一个只包含一个字符串的数组——即原始输入。\n\
  \n如果找到了输入，则返回一个字符串数组。该数组包含每次出现输入之后的所有子字符串。因此，对于模式\n\n```\nPattern p = new Pattern.compile(\"\
  ,\");\n```\n\n`split` 方法对于 *Hello, Dolly* 将返回一个包含两个元素的字符串数组。数组的第一个元素将包含 *Hello*，第二个元素将包含\
  \ *Dolly*。该字符串数组通过以下方式获得：\n\n```\nString tmp[] = p.split(\"Hello,Dolly\");\n```\n\
  \n在这种情况下，返回的值是\n\n```\n//tmp 等于 { \"Hello\", \"Dolly\"}\n```\n\n使用此方法时，你需要注意一些细微之处。如果候选字符串是\
  \ *Hello,Dolly,*，在 *Dolly* 的 *y* 后面有一个尾随逗号，那么此方法仍然会返回一个包含 *Hello* 和 *Dolly* 的两个元素的字符串数组。其隐含行为是尾随空格不会被返回。\n\
  \n如果输入字符串是 *Hello,,,Dolly*，则生成的字符串数组将有四个元素。`split` 方法应用于该模式时的返回值是\n\n```\n// p.split(\"\
  Hello,,,Dolly\")  返回 {\"Hello\",\"\",\"\",\"Dolly\"} \n```\n\n清单 2-4 提供了一个示例，其中使用\
  \ `split` 方法根据单个空格字符将字符串拆分成数组。\n\n清单 2-4：Pattern 拆分示例\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\nimport java.util.regex.*;\npublic class PatternSplitExample{\n  public\
  \ static void main(String args[]){\n      splitTest();\n  }\n\npublic static void\
  \ splitTest(){\n\nPattern p =\n    Pattern.compile(\" \");\n    String tmp = \"\
  this is the String I want to split up\";\n\nString[] tokens = p.split(tmp);\n\n\
  for (int i=0; i<tokens.length; i++){\n       System.out.println(tokens[i]);\n  \
  \  }\n\n}\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n当然，这是对该方法的误用：你可以使用 `StringTokenizer`\
  \ 达到同样的结果，而且资源消耗会更少。根据你现在所学的知识，请考虑清单 2-5，它是第 1 章中清单 1-12 的一个略微修改的版本，因为它使用了 `Pattern.split`\
  \ 方法。输出 2-1 显示了运行该程序的结果。\n\n清单 2-5：PatternSplit.java\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\nimport java.util.regex.*;\n\npublic class PatternSplit{\n  public static\
  \ void main(String args[]){\n\nString statement = \"I will not compromise. I will\
  \ not \"+\n      \"cooperate. There will be no concession, no conciliation, no \"\
  +\n      \"finding the middle ground, and no give and take.\";\n\nString tokens[]\
  \ =null;\n      String splitPattern= \"compromise|cooperate|concession|\"+\n   \
  \   \"conciliation|(finding the middle ground)|(give and take)\";\n\nPattern p =\
  \ Pattern.compile(splitPattern);\n\ntokens=p.split(statement);\n\nSystem.out.println(\"\
  REGEX PATTERN:\\n\"+splitPattern + \"\\n\");\n\nSystem.out.println(\"STATEMENT:\\\
  n\"+statement + \"\\n\");\n\nSystem.out.println(\"TOKENS:\");\n      for (int i=0;\
  \ i < tokens.length; i++){\n      System.out.println(tokens[i]);\n      }\n  }\n\
  }\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n输出 2-1：运行 PatternSplit.java 的结果\n\
  \n| **![开始示例](img/_1.gif)** |\n\n```\nC:\\RegEx\\code\\chapter1>java Split\nREGEX\
  \ PATTERN:\ncompromise|cooperate|concession|conciliation|(finding the middle group)|(give\n\
  and take)\n\nSTATEMENT:\nI will not compromise. I will not cooperate. There\nwill\
  \ be no concession, no conciliation,\nno finding the middle group, and no give and\
  \ take.\n\nTOKENS:\nI will not\n. I will not\n. There will be no\n, no\n, no\n,\
  \ and no\n.\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n你会注意到清单 2-5 使用了 `Pattern.split`\
  \ 方法，而清单 1-12 使用了新的 `String.split` 方法。实际上，两者是相同的，因为 `String.split` 方法在内部只是委托给这个方法。\n\
  \n你所做的事情确实非常了不起，如果没有正则表达式，这可能会变得极其复杂。你实际上是在使用复杂的人工构造——即英语同义词——来分解文本。这可不是你父辈时代的 J2SE。\n\
  \n|  | 注意 | `String` 方法通过在模式前放置一个不可见的 *^* 并在其后放置一个 *$* 来进一步优化其搜索条件。 |\n\n### public\
  \ String[] split(CharSequence input, int limit)\n\n此方法的工作方式与 `Pattern.split(CharSequence\
  \ input)` 完全相同，只有一个区别。第二个参数 `limit` 允许你控制返回的元素数量，如下面几节所示。\n\n\n\n#### Limit == 0\n\
  \n如果你指定第二个参数 limit 等于 0，那么此方法的行为与其重载版本完全相同。也就是说，它会返回一个包含尽可能多匹配子字符串的数组，并丢弃尾部空格。因此，模式\n\
  \n```\nPattern p = new Pattern.compile(\",\");\n```\n\n在对候选字符串 Hello, Dolly 进行分割时，将返回一个包含两个元素的数组。以下是该方法的使用示例：\n\
  \n```\nString tmp[] = p.split(\"Hello,Dolly\", 0);\n```\n\n类似地，当对字符串 Hello, Dolly\
  \ 进行匹配时（其中 Dolly 的 y 后面有一个尾随逗号），split 也会返回两个元素：\n\n```\nString tmp[] = p.split(\"\
  Hello,Dolly,\", 0);\n```\n\n然而，你可能并不总是需要这种行为。例如，有时你可能希望限制返回的元素数量。\n\n#### Limit\
  \ > 0\n\n如果你只对特定数量的匹配感兴趣，请使用正数 limit。你应该使用该数量加 1 作为 limit。要分割字符串 *Hello, Dolly,\
  \ You, Are, My, Favorite* 且只获取前两个标记时，请使用以下代码：\n\n```\nString[] tmp = pattern.split(\"\
  Hello, Dolly, You, Are, My, Favorite\",3);\n```\n\n结果字符串的值如下：\n\n```\n//tmp[0] 是\
  \ \"Hello\",\n// tmp[1] 是 \"Dolly\";\n```\n\n这里有趣的行为是返回了第三个元素。在本例中，第三个元素是\n\n```\n\
  //tmp[2] 是 \"You, Are, My, Favorite\";\n```\n\n使用正数 limit 可能会带来性能提升，因为正则表达式引擎在达到指定匹配次数后可以停止搜索。\n\
  \n#### Limit < 0\n\n为 limit 使用负数（任何负数）会告诉正则表达式引擎：你希望返回尽可能多的匹配项，*并且*希望返回尾部空格（如果有的话）。因此，对于正则表达式模式\n\
  \n```\nPattern p = Pattern.compile(\",\");\n```\n\n和候选字符串 *Hello,Dolly,*，命令\n\n\
  ```\nString tmp[] = p.split(\"Hello,Dolly\", -1);\n```\n\n会产生以下结果：\n\n```\n//tmp\
  \ 等于 {\"Hello\",\"Dolly\"};\n```\n\n然而，对于字符串 *Hello, Dolly,*（其中 *Dolly* 后面的逗号后有尾部空格），方法调用\n\
  \n```\nString tmp[] = p.split(\"Hello,Dolly,    \", -1); \n```\n\n会产生以下结果：\n\n```\n\
  //tmp 等于 {\"Hello\",\"Dolly\",\"    \"};\n```\n\n请注意，负数 limit 的实际值并不重要，因此\n\n```\n\
  p.split(\"Hello,Dolly\", -1);\n```\n\n与以下代码完全等价：\n\n```\np.split(\"Hello,Dolly\"\
  , -100);\n```\n\n## Matcher 对象\n\n图 2-2 展示了 Matcher 类的方法。请花点时间研究它们。\n\n![点击展开](img/fig88_01_0.jpg)\n\
  图 2-2：Matcher 类\n\n以下各节将描述 Matcher 类的各种方法。但首先，让我们简要回顾一下组（group）的概念，因为它们在 Matcher\
  \ 对象中扮演着非常重要的角色。\n\n### 组\n\n在充分利用 Matcher 对象之前，理解*组*的概念非常重要，因为 Matcher 的一些更强大的方法会涉及它们。我将在第\
  \ 3 章中更详细地讨论组，但你需要对它们有一个直观的理解，才能充分利用本章的内容，因此我在此做一个简要介绍。\n\n组正如其名：一组字符。通常，该术语指的是原始\
  \ Pattern 的一个子部分，尽管根据定义，每个组本身也是其自身的一个子组。你可能已经从算术学习中熟悉了组的概念。例如，表达式\n\n```\n6 * 7\
  \ + 4\n```\n\n隐含着分组的概念。你实际上将其理解为\n\n```\n (6 * 7) + 4\n```\n\n其中 *(6 * 7)* 被视为一个数字聚类。进一步，你可以将表达式视为\n\
  \n```\n( (6 * 7) + 4)\n```\n\n其中 *((6 * 7) + 4)* 是另一个数字聚类，它包含了子聚类 *(6*7)*。在这里，你的组包含了一个子组。类似地，正则表达式允许你将一系列字符组合在一起。为什么？我稍后会讨论。首先，让我们专注于如何实现。\n\
  \n请记住，在正则表达式中，你通过使用 Pattern 对象以通用术语描述你要查找的内容。组允许你在表达式中嵌套子描述。当你检查特定的候选字符串时，Matcher\
  \ 可以跟踪该表达式的子匹配。\n\n创建正则表达式字符的分组非常简单。你只需将想要视为组的表达式放在一对圆括号内。就是这样。因此，模式 ***(\\w)(\\\
  d\\d)(\\w+)*** 包含四个组，编号从 0 到 3。group(0) 始终是原始表达式本身，如下所示：\n\n![](img/fig89_01.jpg)\n\
  \ngroup(1) 由一个字母数字字符或下划线组成，在下图中用圆圈标出：\n\n![](img/fig90_01.jpg)\n\ngroup(2) 在下图中用圆圈标出：\n\
  \n![](img/fig90_02.jpg)\n\ngroup(3) 在下图中用圆圈标出：\n\n![](img/fig90_03.jpg)\n\n对于特定的候选字符串，比如\
  \ *X99SuperJava*，group(0) 始终是候选字符串中匹配原始正则表达式模式的部分——即模式 ***(\\w)(\\d\\d)(\\w+)***\
  \ 本身：\n\n![](img/fig90_04.jpg)\n\n下图指示了 *X99SuperJava* 中对应于 group(1) 的部分：\n\n![](img/fig90_05.jpg)\n\
  \n*X99SuperJava* 中对应于 group(2) 的部分在下图中用圆圈标出：\n\n![](img/fig90_06.jpg)\n\n*X99SuperJava*\
  \ 中对应于 group(3) 的部分在下图中用圆圈标出：\n\n![](img/fig90_07.jpg)\n\n好了，现在你知道如何指定组以及如何在候选字符串中找到对应的部分。那么，为什么要这样做呢？一个常见的原因是为了能够引用候选字符串的子部分。例如，你可能不知道这个特定的候选字符串\
  \ *X99SuperJava* 是什么，但你仍然可以编写一个程序，通过创建一个新字符串（等于 group(3) 后接 group(1) 再后接 group(2)）来重新排列它。在这种情况下，重新排列后的字符串将是\
  \ *SuperJavaX99*。\n\n第 3 章提供了关于组的详细示例。\n\n### public Pattern pattern()\n\npattern\
  \ 方法返回创建此特定 Matcher 对象的 Pattern。请参考清单 2-6。\n\n清单 2-6：Matcher Pattern 示例\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\nimport java.util.regex.*;\n\npublic class MatcherPatternExample{\n \
  \ public static void main(String args[]){\n      test();\n  }\n\n  public static\
  \ void test(){\n     Pattern p = Pattern.compile(\"\\\\d\");\n     Matcher m1 =\
  \ p.matcher(\"55\");\n     Matcher m2 = p.matcher(\"fdshfdgdfh\");\n\n     System.out.println(m1.pattern()\
  \ == m2.pattern());\n     //返回 true\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\
  \n|  |\n\n这里有几件重要的事情需要注意。首先，两个 Matcher 对象都成功返回了一个 Pattern，即使 m2 没有成功匹配。其次，这两个 Matcher\
  \ 对象返回了*完全相同的* Pattern 对象，因为它们都是由同一个 Pattern 创建的。请注意，代码行\n\n```\n System.out.println(m1.pattern()\
  \ == m2.pattern());\n```\n\n执行的是 == 比较，而不是 .equals 比较。这只有在 m1 和 m2 返回的实际对象确实是同一个对象时才能成立。\n\
  \n\n\n### public Matcher reset()\n\n`reset()` 方法会清除调用它的 `Matcher` 对象中的所有状态信息。实际上，该\
  \ `Matcher` 会被恢复到最初获取其引用时的状态，如清单 2-7 所示。\n\n清单 2-7: Matcher.reset 示例\n\n| **![示例开始](img/_1.gif)**\
  \ |\n\n```\nimport java.util.regex.*;\n/**\n * 演示 Matcher.reset() 方法的使用\n */\npublic\
  \ class MatcherResetExample{\n  public static void main(String args[]){\n      test();\n\
  \  }\n  public static void test(){\n     //创建一个模式，并获取一个匹配器\n     Pattern p = Pattern.compile(\"\
  \\\\d\");\n     Matcher m1 = p.matcher(\"01234\");\n\n     //耗尽匹配器\n     while (m1.find()){\n\
  \      System.out.println(\"\\t\\t\" + m1.group());\n     }\n     //现在将匹配器重置为其原始状态\n\
  \     m1.reset();\n     System.out.println(\"重置匹配器后\");\n     //再次遍历匹配器。\n     //如果没有清除状态，这是不可能的\n\
  \     while (m1.find()){\n      System.out.println(\"\\t\\t\" + m1.group());\n \
  \    }\n  }\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n输出 2-2 展示了此方法的输出。\n\
  \n输出 2-2: Matcher.reset 示例的输出\n\n| **![示例开始](img/_1.gif)** |\n\n```\n\n重置匹配器后\n\n\
  ```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n如果匹配器没有被重置，你将无法再次遍历其元素。\n\n### public\
  \ Matcher reset(CharSequence input)\n\n`reset(CharSequence input)` 方法会清除调用它的 `Matcher`\
  \ 对象的状态，并用新的输入替换候选字符串。这与创建一个新的 `Matcher` 对象效果相同，只是没有那么多相关的开销。这可以带来有用的优化，也是我经常使用的一种方法。清单\
  \ 2-8 演示了此方法的使用。\n\n清单 2-8: Matcher.reset(CharSequence) 示例\n\n| **![示例开始](img/_1.gif)**\
  \ |\n\n```\nimport java.util.regex.*;\n/**\n * 演示 Matcher.reset(CharSequence) 方法的使用\n\
  \ */\npublic class MatcherResetCharSequenceExample{\n  public static void main(String\
  \ args[]){\n      test();\n  }\n  public static void test(){\n     String output=\"\
  \";\n     //创建一个模式，并获取一个匹配器\n     Pattern p = Pattern.compile(\"\\\\d\");\n    \
  \ Matcher m1 = p.matcher(\"01234\");\n\n     //耗尽匹配器\n     while (m1.find()){\n\
  \      System.out.println(\"\\t\\t\" + m1.group());\n     }\n     //现在用新数据重置匹配器\n\
  \     m1.reset(\"56789\");\n     System.out.println(\"重置匹配器后\");\n     //再次遍历匹配器。\n\
  \     //如果没有重置，这是不可能的\n     while (m1.find()){\n      System.out.println(\"\\t\\\
  t\" + m1.group());\n     }\n  }\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\
  \n输出 2-3 展示了此方法的输出。\n\n输出 2-3: Matcher.reset(CharSequence) 示例的输出\n\n| **![示例开始](img/_1.gif)**\
  \ |\n\n```\n\n重置匹配器后\n\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n### public\
  \ int start()\n\n`start()` 方法返回 `Matcher` 对象上一次成功匹配的起始索引。清单 2-9 演示了 `start()` 方法的使用。此清单中的代码在候选字符串\
  \ *My name is Bond. James Bond.* 中查找单词 *Bond* 的起始索引。\n\n清单 2-9: Matcher.start()\
  \ 示例\n\n| **![示例开始](img/_1.gif)** |\n\n```\n/**\n * 演示 Matcher.start() 方法的使用\n */\n\
  public class MatcherStartExample{\n  public static void main(String args[]){\n \
  \     test();\n  }\n  public static void test(){\n     //创建一个 Matcher 并使用 Matcher.start()\
  \ 方法\n     String candidateString = \"My name is Bond. James Bond.\";\n     String\
  \ matchHelper[] =\n      {\"          ^\",\"                      ^\"};\n     Pattern\
  \ p = Pattern.compile(\"Bond\");\n     Matcher matcher = p.matcher(candidateString);\n\
  \n     //找到第一个 'Bond' 的起始点\n      matcher.find();\n      int startIndex = matcher.start();\n\
  \      System.out.println(candidateString);\n      System.out.println(matchHelper[0]\
  \ + startIndex);\n\n     //找到第二个 'Bond' 的起始点\n      matcher.find();\n      int nextIndex\
  \ = matcher.start();\n      System.out.println(candidateString);\n      System.out.println(matchHelper[1]\
  \ + nextIndex);\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n输出 2-4 展示了运行 `start()`\
  \ 方法的输出。\n\n输出 2-4: Matcher.start() 示例的输出\n\n| **![示例开始](img/_1.gif)** |\n\n```\n\
  My name is Bond. James Bond.\n          ¹¹\nMy name is Bond. James Bond.\n     \
  \                 ²³\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n如果你执行另一个 `find()`\
  \ 方法\n\n```\nmatcher.find();\n```\n\n然后执行 `start()`\n\n```\nint nonIndex = matcher.start();\
  \ //抛出 IllegalStateException\n```\n\n`start()` 方法将抛出一个 `IllegalStateException`。我很惊讶它没有简单地返回一个负数来表示匹配失败。请使用\
  \ `matches()` 方法返回的布尔值来确定是否应该调用诸如 `start()` 之类的方法。\n\n\n\n### public int start(int\
  \ group)\n\n此方法允许你指定匹配结果中你感兴趣的某个子组。如果没有匹配项，或者尚未尝试进行匹配，此方法将抛出 `IllegalStateException`。清单\
  \ 2-10 将很快演示 `start(int)` 方法的使用。但在检查代码之前，让我们先退一步，思考一下这段代码实际想要演示什么。\n\n清单 2-10：Matcher.start(int)\
  \ 示例\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\n/**\n * 演示\
  \ Matcher.start(int) 方法的使用\n */\npublic class MatcherStartParamExample{\n  public\
  \ static void main(String args[]){\n      test();\n  }\n  public static void test(){\n\
  \     //创建一个 Pattern\n      Pattern p = Pattern.compile(\"B(ond)\");\n\n//创建一个 Matcher\
  \ 并使用 Matcher.start(int) 方法\n     String candidateString = \"My name is Bond. James\
  \ Bond.\";\n     //为输出创建一个辅助索引\n     String matchHelper[] =\n                  \
  \           {\"          ^\",\n                              \"           ^\",\n\
  \                              \"                      ^\",\n                  \
  \            \"                       ^\"};\n     Matcher matcher = p.matcher(candidateString);\n\
  \     //找到第一个 'B(ond)' 的起始点\n      matcher.find();\n      int startIndex = matcher.start(0);\n\
  \      System.out.println(candidateString);\n      System.out.println(matchHelper[0]\
  \ + startIndex);\n\n//找到第一个子组 (ond) 的起始点\n      int nextIndex = matcher.start(1);\n\
  \      System.out.println(candidateString);\n      System.out.println(matchHelper[1]\
  \ + nextIndex);\n\n//找到第二个 'B(ond)' 的起始点\n      matcher.find();\n      startIndex\
  \ = matcher.start(0);\n      System.out.println(candidateString);\n      System.out.println(matchHelper[2]\
  \ + startIndex);\n      //找到第二个子组 (ond) 的起始点\n      nextIndex = matcher.start(1);\n\
  \      System.out.println(candidateString);\n      System.out.println(matchHelper[3]\
  \ + nextIndex);\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n在下面的例子中，正则表达式模式是\
  \ ***B(ond)***，这意味着模式中包含一个子组（括号表示子组）。以下是首次调用 `find()` 时被解析的候选字符串部分：\n\n![](img/fig96_01.jpg)\n\
  \n因此，当你调用 `start(0)` 方法时，你实际上是仅针对已经解析过的区域（即方框中标出的部分）调用它。对于 `Matcher` 而言，这个方框区域是我们当前唯一可以讨论的范围。这仅仅是\
  \ `find` 方法的本质，与 `start(int)` 方法本身无关。\n\n`start(0)` 方法返回 `group(0)` 中第一个字符的索引，即\
  \ *Bond* 中的 *B*。`group(0)` 在下图中用圆圈标出。\n\n![](img/fig97_01.jpg)\n\n类似地，当你调用 `start(1)`\
  \ 时，你也是仅针对已经解析过的区域（即上图中的方框区域）调用它。这次，你请求的是解析区域中的第二个分组。`start(1)` 方法返回 `group(1)`\
  \ 中第一个字符的索引，即 *Bond* 中的 *o*。`group(1)` 在下图中用圆圈标出：\n\n![](img/fig97_02.jpg)\n\n接下来，你再次调用\
  \ `matcher.find()`，这会导致候选字符串的一个新区域被纳入考虑范围，如下图所示：\n\n![](img/fig97_03.jpg)\n\n在这里调用\
  \ `start(0)` 方法，实际上是仅针对已经解析过的新区域（即上图中方框内的部分）调用它。这是关联的 `Matcher` 将考虑的唯一区域。`start(0)`\
  \ 返回 `group(0)` 中第一个字符的索引，即 *Bond* 中的 *B*。`group(0)` 在下图中用圆圈标出：\n\n![](img/fig97_04.jpg)\n\
  \n同样，调用 `start(1)` 是要求 `Matcher` 仅考虑已经解析过的新区域（即方框区域）。这次，你请求的是解析区域中的第二个分组。`start(1)`\
  \ 返回 `group(1)` 中第一个字符的索引，即 *Bond* 中的 *o*。`group(1)` 在方框区域中用圆圈标出。\n\n![](img/fig97_05.jpg)\n\
  \n当你直观地审视这个过程时，就很容易理解 `start(int)` 方法如何与组、组编号以及 `find()` 方法交互。`find()` 方法仅解析候选字符串中足够让所有组匹配的部分，并在这个有限的区域内工作。在阅读清单\
