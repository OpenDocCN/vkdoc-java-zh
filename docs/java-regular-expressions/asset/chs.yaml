  ### 查找重复单词示例\n\n我在前面的“分组与反向引用”一节中讨论过清单 1-7 中的代码。此处重新引入它的目的是演示正则表达式如何与 Java 代码实际交互。\n\
  \n清单 1-7：MatchDuplicateWords.java\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport\
  \ java.util.regex.*;\nimport java.io.*;\n\npublic class MatchDuplicateWords{\n \
  \  public static void main(String args[]){\n      hasDuplicate(args[0]);\n   }\n\
  \n/**\n   * 确认给定短语中不包含重复单词。\n   * @param phrase 表示短语的字符串。\n   * @returns 如果短语中没有重复单词则返回\
  \ true。\n   */\n   public static boolean hasDuplicate(String phrase){\n      boolean\
  \ retval=false;\n\nString duplicatePattern =\n      \"\\\\b(\\\\w+) \\\\1\\\\b\"\
  ;\n      // 编译模式\n      Pattern p = null;\n      try{\n        p = Pattern.compile(duplicatePattern);\n\
  \      }\n      catch (PatternSyntaxException pex){\n         pex.printStackTrace();\n\
  \         System.exit(0);\n      }\n      // 统计匹配次数。\n      int matches = 0;\n\n\
  //获取匹配器\n      Matcher m = p.matcher(phrase);\n      String val=null;\n\n//查找所有匹配的字符串\n\
  \      while (m.find()){\n         retval = true;\n        val = \":\" + m.group()\
  \ +\":\";\n        System.out.println(val);\n        matches++;\n      }\n\n//准备一条指示成功或失败的消息\n\
  \      String msg = \"   无匹配: 模式:\" + phrase\n             + \"\\r\\n          \
  \   正则表达式: \"\n             + duplicatePattern;\n\nif (retval){\n      msg = \"\
  \ 匹配     : 模式:\" + phrase\n          + \"\\r\\n         正则表达式: \"\n          + duplicatePattern;\n\
  \      }\n\nSystem.out.println(msg +\"\\r\\n\");\n      return retval;\n   }\n}\
  \ \n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n阅读此示例时，请注意它使用了 Pattern 和 Matcher，而不是前面大多数示例中使用的\
  \ String.matches(regex) 方法。试着猜测一下为什么采用这种方法。答案请参见本章末尾的“常见问题解答”部分。输出 1-7 显示了运行程序的结果。该模式在表\
  \ 1-24 中进行了剖析。\n\n表 1-24：模式 *\\b(\\w+) \\1\\*b\n\n| **正则表达式** | **描述** |\n| ---\
  \ | --- |\n| \\b | 单词边界 |\n| ( | 后跟一个由以下内容组成的组 |\n| \\w | 字母数字或下划线字符 |\n| + | 重复一次或多次\
  \ |\n| ) | 关闭组 |\n| <空格> | 后跟一个空格 |\n| \\1 | 后跟之前捕获的完全相同的字符组 |\n| \\b | 后跟一个单词边界\
  \ |\n| * **用英语解释：** 查找一个单词边界，后跟一组字母数字字符，再后跟一个空格，然后后跟*之前找到的完全相同的字母数字字符组*，最后后跟一个单词边界。简而言之，就是查找重复的单词。\
  \ |\n\n输出 1-7：运行 MatchDuplicateWords.java 的结果\n\n| **![开始示例](img/_1.gif)** |\n\n\
