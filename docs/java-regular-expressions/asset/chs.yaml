  ***(?i:*** 表示从 ***h*** 开始到第一个 ***l*** 结束的不区分大小写的匹配。此模式是非捕获的。 |


  表 A-12：环视


  | **正则表达式** | **描述** | **备注** |

  | --- | --- | --- |

  | **(?=X)** | *X*，使用零宽度正向先行断言 | 此模式向右查看候选字符串中剩余待解析的内容，以找到表达式 *X* 存在的第一个位置。例如，如果你想从文本文件中提取所有内联注释，可以尝试模式
  ***(?=//).*$*** 并提取组 0。此模式是非捕获的。 |

  | **(?!X)** | *X*，使用零宽度负向先行断言 | 此模式向右查看候选字符串中剩余待解析的内容，以找到表达式 *X* 不存在的第一个位置。例如，如果你想跳过某些内容前面的前导空格，可以使用
  ***(?!\s).****。此模式是非捕获的。 |

  | **(?<=X)** | *X*，使用零宽度正向后行断言 | 此模式向左查看候选字符串中剩余待解析的内容，以找到表达式 *X* 存在的第一个位置。例如，如果你想从文本文件中提取所有内联注释，可以尝试模式
  ***(?=//).*$***。此模式是非捕获的。 |

  | **(?<!X)** | *X*，使用零宽度负向后行断言 | 此模式向左查看候选字符串中剩余待解析的内容，以找到表达式 *X* 不出现的位置。例如，如果你想从文本文件中提取内联
  Java 注释之前的所有文本，可以尝试模式 ***.*(?<=//)***。此模式是非捕获的。 |

  | **(?>*X*)** | *X*，作为一个独立的非捕获组 | 此模式拒绝释放匹配的内容，无论这对模式其余部分的匹配能力有何影响。因此，虽然模式 \***w+\d***
  匹配字符串 *java2*，但模式 ***(?>\w+)\d*** 不匹配，因为 ***(?>\w+)*** 消耗了 *java* 和 *2*，并且拒绝释放 *2*
  以便 ***\d*** 能够匹配。 |


