  \     String candidateString = \"My name is Bond. James Bond.\";\n     //为输出创建一个有用的索引\n\
  \     Matcher matcher = p.matcher(candidateString);\n     //查找第一次查找结果的组号 0\n   \
  \   matcher.find();\n      String group_0 = matcher.group(0);\n      String group_1\
  \ = matcher.group(1);\n      System.out.println(\"Group 0 \" + group_0);\n     \
