  \ a\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n同样，现在不需要你能够完全理解给出的代码细节。我只是想建立一个关于\
  \ J2SE 正则表达式工作方式的总体概念。首先，我定义我的 Pattern：\n\n```\n Pattern p = Pattern.compile(regex);\n\
  ```\n\n然后，我将候选字符串提供给 Pattern 并提取一个 Matcher：\n\n```\n Matcher m = p.matcher(candidate);\n\
  ```\n\n最后，我询问我的 Matcher：\n\n```\n while (m.find()) {….} \n```\n\n\n\n## 创建模式\n\n\
  本节将介绍一些编写正则表达式的简单技巧。我将它们称为*推*、*拉*和*组合*。如同日本柔道术，如果对手向你推，你就拉他；如果他向后拉，你就向前推。如果这些技巧都不奏效，你就把他扭成麻花。\n\
  \n同样，编写正则表达式时，某些方法有时会显得完全无效，而另一些方法却非常有效。我在以下各节中描述的方法只是编写模式的简单技巧。如果你尚未掌握，很快你也会培养出自己的一套正则表达式技巧，甚至可能给它们起些昵称。\n\
  \n### 拉取技巧\n\n创建正则表达式最成功的方法之一，是先进行精确匹配，然后逐步将其变形为能匹配原始内容的通用正则表达式。我将此称为拉取技巧，因为我是在从精确匹配中慢慢\"\
  拉\"出正则表达式。\n\n例如，假设你想创建一个匹配四位数字的模式。因此，*1234* 应该匹配，但 *123* 不匹配，*12345* 或 *ABCD* 也不匹配。\n\
  \n为了这个示例，你需要引入一个正则表达式元字符 ***\\d***，它能匹配从 *0* 到 *9* 的任何数字。\n\n|  | 注意 | *元字符*用于描述另一个更复杂的字符。例如，***\\\
  n*** 是一个描述不可打印换行符的元字符。 |\n\n回到示例，你知道\n\n```\n1234 匹配 1234\n```\n\n这当然显而易见：任何内容都匹配自身。但你也知道\
  \ \\d 匹配任何数字。根据逻辑的传递性，你可以用 \\d 替换最后一位数字。于是模式变为\n\n```\n1234 应匹配 123\\d \n```\n\n\
  这里你将最后一位数字 *4* 替换为等效的元字符 ***\\d***。如果你通过方便的 RX.java 程序运行此模式，会发现它确实仍然匹配。到目前为止一切顺利。实际上，情况比顺利更好：现在你的模式不仅能匹配\
  \ *1234*，还能匹配任何以数字 *123* 开头的四位数。我们越来越接近目标了。\n\n|  | 注意 | RX.java 是本书的一个极简配套程序，你可以从\
  \ Apress 网站的下载区（[`www.apress.com`](http://www.apress.com)）获取。你可以用这个程序对候选字符串执行正则表达式模式。\
  \ |\n\n对第三位数字重复此过程，这样 *1234* 应匹配 ***12\\d\\d***，这里你将 *3* 替换为等效的 ***\\d***。情况越来越乐观了。这不仅匹配\
  \ *1234*，还匹配任何以数字 *12* 开头的四位数。\n\n你能看出趋势了。最终，你将创建模式 ***\\d\\d\\d\\d***，它能匹配任意四位数字。这并非最简洁的模式，但足以满足既定需求：它匹配任何四位数。\n\
  \n这里的要点是，原则上你有时可以从一个具体匹配*反向*推导，创建出所需的模式。当然，这只是一个技巧，并非适用于所有情况。但这是一个值得放入你正则表达式技巧包的好方法。\n\
  \n### 推动技巧\n\n另一个我发现对编写正则表达式模式很有帮助的技巧是推动技巧。推动技巧建立在已有工作的基础上，通过添加、删减或修改其范围，直到它变得有用。\n\
  \n与拉取技巧中从具体匹配标记入手不同，这种方法采用一个与你所需模式相似的现有正则表达式，并对其进行修改，直到它能完成所需任务。也就是说，正则表达式被\"推\"\
  向另一种功能，因此得名。\n\n例如，假设你想要一个匹配五位数字的正则表达式模式。基于前面的例子，你知道 ***\\d\\d\\d\\d*** 能匹配任意四位数字。因此，找到匹配五位数字的模式只需在前一个模式后追加另一个\
  \ ***\\d*** 即可。答案当然是模式 ***\\d\\d\\d\\d\\d***。\n\n随着你深入学习本章，你会发现这些并非你能想到的最优雅的四位和五位数字匹配模式表示法，但它们是完全合理的解决方案，并且推导过程也合乎逻辑。这种推导过程才是本次讨论中需要掌握的重点。\n\
  \n### 组合技巧\n\n组合技巧正如其名：将各种模式组合起来形成一个新的整体。也就是说，它通过使用其他模式来组合成一个新模式。这与推动技巧不同，因为模式本身不被修改，而只是被拼接起来。\n\
  \n假设你需要创建一个匹配美国邮政编码的模式，它由五位数字、一个连字符和四位数字组成。基于你已经完成的工作，这个模式非常容易创建。你知道四位数字匹配 ***\\\
  d\\d\\d\\d***，连字符匹配自身，五位数字匹配 ***\\d\\d\\d\\d\\d***。将这些组合成一个模式，就得到 ***\\d\\d\\d\\\
  d\\d-\\d\\d\\d\\d\\d***。\n\n同样，这并非最优雅简洁的邮政编码表示法，也不够灵活（五位数的邮政编码怎么办？连字符和数字之间有空格怎么办？没有连字符只有空格怎么办？），但它确实满足了既定需求。\n\
  \n|  | 注意 | 与大多数软件问题一样，通常可以通过明确需求来找到正则表达式难题的解决方案。 |\n\n## 正则表达式语法介绍\n\n以下各节将介绍 Java\
  \ 的正则表达式语法。为清晰起见，材料被组织成小的逻辑单元，每个单元后附有一个演示用法的简短示例。这些示例从强调 Pattern 角色的例子，逐步过渡到开始更多依赖\
  \ Matcher 的例子。\n\n|  | 注意 | 请记住，这些只是工作示例。我们尚未准备好让代码无懈可击。 |\n\n\n\n### 阅读模式\n\n正则表达式语言包含旨在帮助描述搜索条件的元字符。由于在不了解这些字符的情况下阅读模式可能会令人困惑，我在表\
  \ 1-1 中列出了最常用的元字符。\n\n表 1-1：基本正则表达式分隔符\n\n| **模式** | **名称** | **描述** |\n| --- |\
  \ --- | --- |\n| . | 点号 | 匹配任意单个字符。 |\n| $ | 美元符号 | 匹配行尾。 |\n| ^ | 脱字符 | 匹配行首。 |\n\
  | { | 左花括号 | 定义范围的开始。 |\n| [ | 左方括号 | 定义字符类的开始。 |\n| ( | 左圆括号 | 定义分组的开始。 |\n| &#124;\
  \ | 管道符号 | 表示“或”的符号 |\n| } | 右花括号 | 定义范围的结束。 |\n| ] | 右方括号 | 定义字符类的结束。 |\n| ) |\
  \ 右圆括号 | 定义分组的结束。 |\n| * | 星号 | 前面的元素重复零次或多次。 |\n| + | 加号 | 前面的元素重复一次或多次。 |\n| ?\
  \ | 问号 | 前面的元素重复零次或一次。 |\n| \\ | 反斜杠 | 后面的字符不被视为元字符。 |\n\n这些字符实际上是保留字，就像 `new` 是\
