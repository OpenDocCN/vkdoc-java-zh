  \ `find()` 时解析的候选字符串部分如下所示：\n\n![](img/fig106_01.jpg)\n\n因此，当你调用 `group(0)` 方法时，你实际上是隐式地只针对已经解析过的区域（即上图中框出的部分）调用它。就当前的\
