  |  |\n\n### 确认姓名格式示例\n\n清单 1-5 中的代码用于判断给定的姓名是否符合格式良好的标准。它查找一个名字标记、一个可选的中名标记，最后是一个姓氏标记。在本示例中，一个姓名标记由一个大写字母后跟任意数量的小写字母组成。\n\
  \n清单 1-5：MatchNameFormats.java\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport Java.util.regex.*;\n\
  import java.io.*;\n\npublic class MatchNameFormats{\n   public static void main(String\
  \ args[]){\n\nisNameValid(args[0]);\n   }\n\n/**\n   * 确认给定姓名的格式是否有效。\n   * @param\
  \ name 是表示姓名的字符串。\n   * @returns 如果姓名格式可接受则返回 true。\n   */\n   public static boolean\
  \ isNameValid(String name){\n     boolean retval=false;\n\nString nameToken =\"\\\
  \\p{Upper}(\\\\p{Lower}+\\\\s?)\";\n\nString namePattern = \"(\"+nameToken+\"){2,3}\"\
  ;\n\nretval = name.matches(namePattern);\n\n//准备一条指示成功或失败的消息\n     String msg =\
  \ \"NO MATCH: pattern:\" + name\n          + \"\\r\\n           regex :\" + namePattern;\n\
  \nif (retval){\n     msg = \"MATCH     pattern:\" + name\n          + \"\\r\\n \
  \          regex :\" + namePattern;\n     }\n\nSystem.out.println(msg +\"\\r\\n\"\
  );\n     return retval;\n     }\n} \n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\
  \n这个示例很有趣，因为它比前一个示例更充分地利用了 Java 的健壮性。具体来说，你定义了你所说的“姓名标记”的含义：\n\n```\n String nameToken\
  \ =\"\\\\p{Upper}(\\\\p{Lower}+\\\\s?)\";\n```\n\n然后你在后面使用了这个定义：\n\n```\n String\
  \ namePattern = \"(\"+nameToken+\"){2,3}\"; \n```\n\n|  | 注意  | ***\\p{Upper}***\
  \ 和 ***\\p{Lower}*** 将在稍后介绍。它们分别简单地表示任意大写字符和任意小写字符。 |\n\n这有助于避免正则表达式模式变得过于复杂，也有助于隔离错误。随着本书中的示例越来越复杂，你将开始看到将正则表达式与\
  \ Java 强大的语言相结合可以带来诸多好处，而仅使用正则表达式的话，这些好处充其量也只能是简洁地表达。清单 1-5 展示了程序 MatchNameFormats.java，输出\
  \ 1-5 展示了运行该程序的结果，表 1-22 对该模式进行了详细解析。\n\n表 1-22：模式 *(\\p{Upper}(\\p{Lower}+\\s?)){2,3}*\n\
  \n| **正则表达式** | **描述** |\n| --- | --- |\n| ( | 一个组，包含 |\n| \\p{Upper} | 一个大写字符 |\n\
