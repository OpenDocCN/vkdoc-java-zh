  \n### public String group()\n\n在对抗混乱代码的战争中，group 方法可以成为一个强大且便捷的工具。它简单地返回与原始正则表达式模式匹配的候选字符串的子串。例如，假设你想从候选字符串\
  \ *My name is Bond. James Bond.* 中提取模式 ***Bond*** 的出现\n\n```\nPattern p = Pattern.compile(\"\
  Bond\");\n```\n\n。你提取 Matcher\n\n```\nMatcher matcher = p.matches(\"My name is Bond.\
  \ James Bond.\");\n```\n\n并对其调用 find()。\n\n```\nMatcher.find(); \n```\n\n现在，下图中方框区域已准备好供\
  \ Matcher 仔细检查：\n\n![](img/fig105_01.jpg)\n\n你现在可以使用 group() 方法提取候选字符串中符合你条件的部分：\n\
  \n```\nString tmp = matcher.group(); \\\\返回 \"Bond\";\n```\n\n此方法提取所考虑区域中匹配的部分。该区域在下图中用圆圈标出：\n\
  \n![](img/fig105_02.jpg)\n\n实现相同结果的一种更笨拙的方法是使用 start 和 end 方法找到候选字符串中该组的起始和结束索引，然后使用\
  \ String.substring 方法提取该文本。\n\n如果 find() 方法不成功或最初从未被调用，则 group() 方法将抛出 IllegalStateException。清单\
  \ 2-13 提供了此方法及所讨论算法的完整工作示例。\n\n清单 2-13：Matcher.group() 方法\n\n| **![开始示例](img/_1.gif)**\
  \ |\n\n```\nimport java.util.regex.*;\n/**\n * 演示 Matcher.group() 方法的用法\n */\npublic\
  \ class MatcherGroupExample{\n  public static void main(String args[]){\n      test();\n\
  \  }\n  public static void test(){\n      //创建一个 Pattern\n      Pattern p = Pattern.compile(\"\
  Bond\");\n\n      //创建一个 Matcher 并使用 Matcher.group() 方法\n      String candidateString\
  \ = \"My name is Bond. James Bond.\";\n      Matcher matcher = p.matcher(candidateString);\n\
  \      //提取该组\n      matcher.find();\n      System.out.println(matcher.group());\n\
  \  }\n} \n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n\n\n### public String group(int\
  \ group)\n\n此方法是 `group()` 方法的一个更强大的对应版本。它允许你提取候选字符串中与模式内子组匹配的部分。`group(int)` 方法的使用将在清单\
  \ 2-14 中简要演示。\n\n清单 2-14：Matcher.group(int) 方法示例\n\n| **![示例开始](img/_1.gif)** |\n\
