  \ Word 文档。 |\n\n我认为此时已有足够的信息可以开始工作了。听起来客户想要任何可能是七位或十位数字的电话号码，而且速度不是问题。文件似乎也不大。这应该很简单，只需定义一个电话号码模式，然后使用之前介绍的搜索方法即可。毕竟，我已经能够访问文件并搜索其内容了。当然，我决定将实际的正则表达式保存在一个外部属性文件中，这样我就可以根据需要调整它。在我熟悉这些文件之前，这个过程可能会容易出错。\n\
  \n我准备开始了。我决定快速搜索一下网络，找到了几个电话号码模式。其中一些有点晦涩难懂，但我愿意尝试，因为我的客户想要尽可能多的候选号码。我找到的模式如下：\n\
  \n```\n ^(\\(?\\+?[0-9]*\\)?)?[0-9_\\- \\(\\)]*$\n    ^(0-1?)?(\\(?[2-9]\\d{2}\\\
  )?\n    [2-9]\\d{3})([\\s-./\\\\])?(\\d{3}([\\s-./\\\\])?\\d{4}\n    [a-zA-Z0-9]{7})$\n\
  \    ^\\(?[\\d]{3}\\)?[\\s-]?[\\d]{3}[\\s-]?[\\d]{4}$\n```\n\n\n\n我编写了一个快速模式，将这些模式通过\
  \ OR 运算组合起来，并在一些文档中运行测试，结果发现它实际上并不奏效。虽然我确实提取到了一些电话号码，但也获取了一些根本不可能是电话号码模式的内容，因为它们包含了字符、长空格和标点符号。\n\
  \n这里我有两个选择：可以对匹配到的候选结果进行二次验证，或者调整这个模式。这次，我决定采用自己之前的模式，并尝试融入其他模式中的优点，如表 5-5 所示。这就是第\
  \ 1 章中介绍的组合技术。\n\n表 5-5：从 614-345-6789 中提炼通用正则表达式模式\n\n| **步骤** | **我的操作** | **操作原因**\
  \ | **理由** | **生成的模式** |\n| --- | --- | --- | --- | --- |\n| 步骤 1 | 无操作 | 初始状态 |\
  \ 不适用 | (?:\\d{3})?\\d{3}\\d{4} |\n| 步骤 2 | 在数字组之间添加可选的连字符 `-` | 为了获得更通用的描述 | 电话号码可以用标点符号分隔。\
  \ | (?:\\d{3}-?)?\\d{3}-?\\d{4} |\n| 步骤 3 | 在数字组之间添加可选的空格 | 为了获得更通用的描述 | 电话号码可以用空格分隔。\
  \ | (?:\\d{3}-?\\s?)?\\d{3}-?\\s?\\d{4} |\n| 步骤 4 | 将 `-` 替换为 ***\\p{Punct}*** |\
  \ 为了兼容标点符号 | ***\\p{Punct}*** 是 `-` 的超集 | (?:\\d{3}\\p{Punct}?\\s?)?\\d{3}\\p {Punct}?\\\
  s?\\d{4} |\n| 步骤 5 | 将 ***(?:\\d{3} \\p{Punct}?\\s?)? \\d{3}\\p{Punct}?*** 替换为 ***(?\\\
  d{3}\\p{Punct }?\\s?){1,2}*** | 为了创建更简洁的模式 | 两者是等价的表述。 | (?:\\d{3}\\p{Punct}?\\\
  s?){1,2}\\d{4} |\n\n使用这个模式，我发现结果看起来是合理的。最后，在即将完成时，我决定将所有输出格式化为 *ddd-dddd* 或 *ddd-ddd-dddd*\
  \ 的形式。最终的代码如代码清单 5-12 所示。\n\n代码清单 5-12：从文件中提取电话号码\n\n| **![示例开始](img/_1.gif)** |\n\
  \n```\n01  /**\n02  * 从给定文件中挖掘电话号码，并以字符串形式返回。\n03  * @param 文件路径的字符串 filePath\n\
  04  * @throws IOException 如果文件未找到或已损坏\n05  *\n06  * @return ArrayList 包含格式良好的电话号码，\n\
  07  * 格式为 ddd-ddd-dddd 或 ddd-dddd\n08 */\n09  public static ArrayList minePhoneNumbers(String\
  \ filePath)\n10  throws IOException{\n\n11     ArrayList retval = new ArrayList();\n\
  12     // 获取模式\n13     String regex = RegexUtil.getProperty(\"../regex.properties\"\
  ,\"allPhones\");\n14     // 查找所有匹配项\n15     Map result =\n16        RegexUtil.searchFile(filePath,\
  \ regex ,Pattern.MULTILINE);\n\n17     // 获取匹配的字符串\n18     Iterator it = result.values().iterator();\n\
  \n19     // 为捕获的电话号码提供一致的格式\n20     while (it.hasNext())\n21     {\n22        String\
  \ num = (String)it.next();\n23        num = num.replaceAll(\"\\\\p{Punct}|\\\\s\"\
  ,\"\");\n\n24        if (num.length() == 7)\n25          num=num.replaceAll(\"(\\\
  \\d{3})(\\\\d{4})\",\"$1-$2\");\n26        else\n27         num=num.replaceAll(\"\
  (\\\\d{3})(\\\\d{3})(\\\\d{4})\",\"($1)-$2-$3\");\n\n28       retval.add(num);\n\
  29     }\n\n30     return retval;\n31  }\n```\n\n| **![示例结束](img/_1.gif)** |\n\n\
  |  |\n\n代码清单 5-12 相当不言自明。不过，我确实想指出第 27 行和第 29 行。请注意，只需进行微小的调整就能生成格式良好、一致的输出，这是多么容易。例如，第\
  \ 27 行简单地说：“我想将前三位数字捕获到组 1，后四位数字捕获到组 2。然后，我想用连字符分隔这两个组。” 再次强调，这涉及非常容易但最终非常强大的代码。\n\
  \n## 在目录中搜索包含正则表达式的文件\n\n原则上，在目录中搜索匹配特定模式的文件是相当容易的。我已经有了一个搜索文件的机制，所以我只需要搜索一个文件列表。正如你在图\
  \ 5-3 中所见，该算法是递归的。\n\n![点击展开](img/fig222_01_0.jpg)\n图 5-3：递归目录搜索\n\n代码清单 5-13 通过利用现有框架实现了这个设计。它遍历子目录，查找恰好包含我所描述的正则表达式模式的文件。\n\
  \n代码清单 5-13：在当前目录和子目录中搜索包含该模式的文件\n\n| **![示例开始](img/_1.gif)** |\n\n```\n01   /**\n\
  02   * 搜索给定目录，根据描述其内容的 searchPattern\n03   * 查找指定的文件。以 ArrayList 形式返回匹配的文件。\n04\
  \   * 此方法递归地搜索文件系统。\n05   * @param File currentFile 要开始搜索的目录或文件\n06   * @param String\
  \ fileExtension 文件的扩展名（如果有）\n07   * @param String searchPattern 描述我们要查找的文件内容的正则表达式\n\
  08   * @param int flags 我们想要应用于正则表达式模式的标志\n09   * @throws IOException 如果存在 IO 问题\n\
  10   *\n11   * @return ArrayList 包含 <code>File</code> 对象，\n12   * 如果未找到匹配项，则返回空\
  \ ArrayList\n13   */\n14   public static ArrayList searchDirs(\n15       File currentFile,\n\
  16       String fileExtension,\n17       String searchPattern,\n18       int flags\n\
  19   ) throws IOException\n20   {\n21      ArrayList retval = new ArrayList();\n\
  \n22      if (!currentFile.isDirectory())\n23      {\n24          Map tmp = searchFile(\n\
  25              currentFile.getPath(),\n26             searchPattern,flags);\n\n\
  27          // 如果找到了任何内容，则添加该文件\n28          if (tmp.size() > 0)\n29          {\n\
  30               retval.add(currentFile);\n31               this.log.finest(\"added\
  \ \" + currentFile);\n32          }\n33     }\n34     else\n35     {   // 遍历子目录\n\
  36         File subs[] =\n37           currentFile.listFiles(\n38              \
  \ newLocalFileFilter(fileExtension));\n\n39         if (subs != null)\n40      \
  \   {\n41           // 如果递归搜索找到了任何内容，则添加它\n42           for (int i=0; i < subs.length;\
  \ i++)\n43           {\n44               ArrayList tmp=null;\n45               tmp\
  \ =searchDirs(\n46                   subs[i],\n47                   fileExtension,\n\
  48                   searchPattern,\n49                   flags);\n\n50        \
  \       if (tmp.size() > 0)\n51               {\n52                  log.info(subs[i].getPath());\n\
  53                  retval.addAll(tmp);\n54               }\n55           }\n56\
  \         }\n57     }\n\n58        return retval;\n59   }\n60  /**\n61  * 私有过滤类，以便文件搜索更高效\n\
  62  */\n63  private static class LocalFileFilter implements FileFilter{\n64    \
  \  private String extension;\n65      LocalFileFilter()\n66      {\n67         \
  \ this(null);\n68      }\n\n69      LocalFileFilter(String extension)\n70      {\n\
  71          this.extension = extension;\n72      }\n73     /**\n74     * 如果当前文件符合条件则返回\
  \ true\n75     * @param 要检查的文件路径名\n76     *\n77     * @return 如果文件具有该扩展名，或扩展名为 null，\n\
  78     * 或者该文件是一个目录，则返回 true。\n79     * 否则返回 false。\n80     */\n81     public boolean\
  \ accept(File pathname){\n\n82        boolean retval = false;\n83        if (extension\
  \ == null)\n84        {\n85            retval = true;\n86        }\n87        else\n\
  88        {\n89            String tmp = pathname.getPath();\n90            if (tmp.endsWith(extension))\
  \ retval = true;\n91            if (pathname.isDirectory()) retval = true;\n92 \
  \        }\n\n93        return retval;\n94     }\n95 }\n```\n\n| **![示例结束](img/_1.gif)**\
  \ |\n\n|  |\n\n\n\n## 验证 EDI 文档\n\n接下来的示例取自 Sun 网站上的一个帖子。一位程序员需要帮助验证一份电子数据交换（EDI）文档。他需要确保字符串\
  \ *ISA* 始终出现在字符串 *IEA* 之前，并且每个字符串只出现一次。他提供了示例输入 *ISA*XX*XXXXXXXXXXXXXXX*XX*XXXXXXXXXXXXXXX*030130*0912*~IEA*1*000005900~*。\n\
  \n这个问题很适合使用推送技术，因为很明显我需要将数据推入一个模式中。为了简化问题，我决定进行一些抽象处理。我决定使用 *@* 符号和 *#* 符号来代替字符串\
  \ *ISA* 和 *IEA*。此外，我决定将 *@* 和 *#* 之间的所有内容都视为数字。这些只是为了方便我理解而设置的逻辑占位符。我希望能够抽象掉一些繁琐的细节。\n\
  \n|  | 注意 | 如果你上学时碰巧喜欢数学，你会注意到这类似于代数中提取复杂子表达式并用简单变量指代它们的技巧。 |\n\n现在，我将尝试根据表 5-6\
  \ 中的推理来推进。\n\n表 5-6：从 @45#78 中提取通用正则表达式模式\n\n| **步骤** | **我的操作** | **操作原因** | **理由**\
  \ | **结果模式** |\n| --- | --- | --- | --- | --- |\n| 步骤 1 | 无操作 | 初始状态 | 不适用 | @45#87\
  \ |\n| 步骤 2 | 将 *4* 替换为 ***[^@]*** | 获得更通用的描述 | *4* 的唯一特征是它不是 *@*，因此使用 ***[^@]***。\
  \ | @[^@]5#7 |\n| 步骤 3 | 将 *5* 替换为 ***[^@]*** | 获得更通用的描述 | *5* 的唯一特征是它不是 *@*。 |\
  \ @[^@][^@]#7 |\n| 步骤 4 | 将 ***[^@][^@]*** 替换为 ***[^@]**** | 获得更通用的描述 | ***[^@]****\
  \ 是 ***[^@]*** 的超集。 | @[^@]*#7 |\n| 步骤 5 | 将 *7* 替换为 ***([^@][^#])*** | 获得更通用的描述\
  \ | *7* 的唯一特征是它不是 *@* 或 *#*。 | @[^@]*#([^@][^#])8 |\n| 步骤 6 | 将 *8* 替换为 ***([^@][^#])***\
  \ | 获得更通用的描述 | *8* 的唯一特征是它不是 *@* 或 *#*。 | @[^@]*#([^@][^#])([^@][^#]) |\n| 步骤 7\
  \ | 将 ***([^@][^#])([^@][^#])*** 替换为 ***([^@][^#])**** | 获得更通用的描述 | ***([^@][^#])****\
  \ 是 ***([^@][^#])([^@][^#])*** 的超集。 | @[^@]*#([^@][^#])* |\n\n我认为我已经尽可能地将抽象化推进到了极致。现在，我将开始脱离抽象，回到我最初的目标。表\
  \ 5-7 分解了我的推理过程。\n\n表 5-7：从 *@[^@]*#([^@][^#]*)* 中提取 EDI 正则表达式\n\n| **步骤** | **我的操作**\
  \ | **操作原因** | **理由** | **结果模式** |\n| --- | --- | --- | --- | --- |\n| 步骤 8 | 无操作\
  \ | 初始状态 | 不适用 | @[^@]*#([^@][^#])* |\n| 步骤 9 | 将 *@* 替换为 *ISA* | 获得更具体的描述 | *@*\
  \ 始终只是 *ISA* 的替代符。 | ISA[^ISA]*#([^ISA][^#])* |\n| 步骤 10 | 将 *#* 替换为 *IEA* | 获得更具体的描述\
  \ | *#* 始终只是 *IEA* 的替代符。 | ISA[^ISA]*IEA([^ISA][^IEA])* |\n| 步骤 11 | 在 ***([^ISA][^IEA])***\
  \ 内部添加 ***?:*** | 提高效率 | 我不需要捕获组。 | ISA[^ISA]*IEA(?:[^ISA][^IEA])* |\n\n## 总结\n\n\
  本章中的示例应作为编写你自己正则表达式的范例。我讨论了验证邮政编码、使用日期格式、搜索字符串、搜索文件、从文件中提取数据以及修改文件内容。如果你正在寻找更多类似的示例，请访问\
