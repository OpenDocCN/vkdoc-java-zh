  \n### public int end()\n\n`end` 方法返回 `Matcher` 对象上一次成功匹配的结束索引加 1。如果没有匹配项，或者尚未尝试进行匹配，此方法将抛出\
  \ `IllegalStateException`。清单 2-11 演示了 `end` 方法的使用。\n\n清单 2-11：Matcher.end() 示例\n\
  \n| **![开始示例](img/_1.gif)** |\n\n```\n/**\n * 演示 Matcher.end() 方法的使用\n */\npublic\
