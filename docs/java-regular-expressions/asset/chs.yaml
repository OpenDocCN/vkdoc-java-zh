  \ |\n| ) | 内部组结束 |\n| ) | 外部组结束 |\n| { | 重复至少 |\n| 2 | 两次 |\n| , | 但不超过 |\n| 3 |\
  \ 三次 |\n| } | 重复结束 |\n| * **中文释义：** 查找两个或三个单词，每个单词以大写字母开头，后跟任意数量的小写字母。每个单词后面可以跟一个空格。\
