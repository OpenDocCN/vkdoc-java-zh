- fmt: 'Mehran is an amateur boxer, teaches martial arts at The Ohio State University,
    enjoys soccer, and has ruined his chess by playing too many speed games. You can
    contact him at <coach@influxs.com>.


    **About the Technical Reviewer**


    **Bill Saez** is a software engineer with Motorola in Ft. Lauderdale, Florida.
    While working with Motorola, Bill helped to create the world''s first Java-powered
    wireless handset with `J2ME` and `CLDC` certification in 2000. Since then, he
    has continued to play an integral part in the commercialization and development
    of the `J2ME` platform and has authored several `OEM` APIs for `iDEN` handsets
    as well as `J2ME` Developer Guides for those products. Bill has been involved
    with Java development since its introduction and even served as a guinea pig for
    The Ohio State University''s experimental Java software courses. He received his
    bachelor''s degree in software engineering from The Ohio State University and
    is currently pursuing a master''s degree in computer science from the University
    of Florida.


    When he''s not working or studying, Bill enjoys training for and running marathons,
    traveling with his family, and infrequently writing game reviews (http://www.epinions.com/user-billservo)
    in his copious spare time.


    **Acknowledgments**


    I''d like to thank Nate McFadden, Gary Cornell, Nicole LeClerc, and Laura Cheu
    from Apress for being such a joy to work with. I''d also like to acknowledge the
    strong contributions of various friends, including Terry Camerlengo, the excellent
    people at JavaRanch (http://www.javaranch.com), and various kind others who provided
    feedback and suggestions. In particular, I''m grateful for Jim Yingst''s fine
    critical eye. I would also like to acknowledge the strong mathematical analysis
    provided by my father, Dr. Javad Habibi. Last but certainly not least, I''d like
    to thank my technical reviewer, Bill Saez, for an amazing technical eye and a
    very gentle style. I can''t wait to see your book there, Bill.


    # Introduction


    The fundamental goal of any computer language is the manipulation of data. Traditionally,
    Java has been an excellent language for doing so, provided that the data is represented
    as objects. However, Java''s raw data manipulation mechanisms have always been
    somewhat lacking, especially when compared to the powerful machinations offered
    by languages such as Perl and awk.


    The introduction of a standard regular expression package into Java 2 Standard
    Edition (`J2SE`) is an excellent step in rectifying this oversight. The `java.util.regex`
    package offers developers everything they need to use regular expressions in Java,
    all packaged in an easy-to-use, object-oriented structure. I think that you''ll
    find that the `java.util.regex` package can become an extremely powerful tool
    in your programming arsenal, as well an elegant instrument that you''ll enjoy
    using. After you''ve mastered it, you will wonder, as I did, how you ever managed
    without it.


    ## What this Book is About


    This book is a comprehensive introduction to the regular expression support built
    into `J2SE`, and it''s designed to help Java programmers who have little to no
    experience with regular expressions. It''s meant to be both a reference and an
    explanatory text. Although a background in regular expressions is helpful, I don''t
    make any such assumptions when presenting the material. The central aim is to
    help everyday programmers solve everyday problems.


    After reading this text, you should be able to solve a great many of your routine
    text validation, searching, modification, and replacement problems quickly and
    efficiently by using Java''s built-in regular expression support. Of course, this
    book also covers some advanced features of regular expressions. You should to
    be able to effectively use your new understanding of regular expressions as soon
    as you finish [Chapter 1](#LiB0005_split_000.html#33).


    ## Who Should Read this Book


    If you''re new to regular expressions, but you''re comfortable with the Java language,
    then this book is intended for you. If you have a background in regular expressions,
    but you need a reference for Java''s regular expression package, you''ll also
    find this book useful. However, if you''re new to Java, you may find that you''re
    better served by reading some introductory texts first. There are scores of good
    introductory books available, though my recommendations are *Head First Java*
    by Kathy Sierra and Bert Bates (O''Reilly & Associates, 2003) and *Thinking in
    Java, Third Edition* by Bruce Eckel (Prentice Hall, 2002). You can''t go wrong
    with either book.


    ## How this Book is Structured


    This book has five chapters and three appendixes. It''s intended to be a progressive
    learning experience, so the chapters build on each other. I describe the contents
    of the chapters and appendixes in the following sections.


    ### [Chapter 1](#LiB0005_split_000.html#33)


    This chapter introduces regular expressions and provides some simple examples
    and explanations to get you started. It explores the `J2SE` regular expression
    syntax, operations, and differences from regular expressions you might already
    be familiar with from other languages. It also offers a tutorial on regular expressions.


    Even if you have a background in regular expressions, I suggest you look over
    the examples in this chapter—there are a lot of different regular expression flavors,
    and there''s rarely an isomorphic mapping between them. [Chapter 1](#LiB0005_split_000.html#33)
    is a natural starting point if you''re new to regular expressions in `J2SE` or
    if you need a refresher on regular expressions in general.


    ### [Chapter 2](#LiB0014_split_000.html#187)


    [Chapter 2](#LiB0014_split_000.html#187) introduces the built-in Java support
    for regular expressions through the `Pattern` and `Matcher` classes. Each method
    and attribute is dissected in detail, and all but the most trivial have companion
    code examples that highlight appropriate usage. [Chapter 2](#LiB0014_split_000.html#187)
    covers which settings and flags might affect the efficiency of your code. Additionally,
    [Chapter 2](#LiB0014_split_000.html#187) details the five new methods on the `String`
    class that support regular expressions, and offers advice and examples regarding
    appropriate usage.


    ### [Chapter 3](#LiB0020_split_000.html#336)


    [Chapter 3](#LiB0020_split_000.html#336) expounds on some advanced regular expression
    concepts, including groups, noncapturing groups, greedy qualifiers, positive qualifiers,
    reluctant qualifiers, possessive qualifiers, positive lookarounds, negative lookarounds,
    positive lookbehinds, and negative lookbehinds. It provides numerous examples
    and detailed explanations regarding how these concepts work and how they might
    benefit you in your day-to-day tasks.


    ### [Chapter 4](#LiB0033_split_000.html#402)


    [Chapter 4](#LiB0033_split_000.html#402) offers advice and suggestions on using
    regular expressions in Java''s object-oriented environment. The chapter covers
    best practices, examples, and lessons learned from similar packages.


    ### [Chapter 5](#LiB0041_split_000.html#457)


    [Chapter 5](#LiB0041_split_000.html#457) provides numerous full-featured examples,
    with accompanying explanations and code, that build on the material presented
    in previous chapters. [Chapter 5](#LiB0041_split_000.html#457) is designed to
    illustrate the development process I use when I''m trying to solve a regular expression
    problem in Java.


    ### [Appendix A](#LiB0053.html#534)


    [Appendix A](#LiB0053.html#534) offers a complete listing, with explanation, of
    the regular expression syntax and various regular expression metacharacters.


    ### [Appendix B](#LiB0054_split_000.html#565)


    [Appendix B](#LiB0054_split_000.html#565) provides a summary of the methods of
    the `Pattern` and `Matcher` classes in Java.'
