    \ |\n\n```\npublic class StyleSplitExample{\n   public static void main(String\
    \ args[]){\n      String phrase1= \"but simple justice, not charity\";\n     \
    \ strengthenSentence(phrase1);\n\n      String phrase2=\n       \"but that I love\
    \ Rome more, not that I love Caesar less\";\n      strengthenSentence(phrase2);\n\
    \n      String phrase3=\n      \"ask what you can do for your country, ask not\
    \ what your \"\n      + \"country can do for you\";\n      strengthenSentence(phrase3);\n\
    \   }\n   /**\n   * 分割并重新排列给定的字符串，以期达到更有力的效果。\n   * @param sentence 是一个字符串，代表我们想要强化的短语。\n\
    \   * @returns 是一个字符串，代表修改后的短语。\n   */\n   public static String strengthenSentence(String\
    \ sentence){\n      String retval=null;\n\n      String[] tokens = null;\n\n \
    \     String splitPattern = \",\";\n\n      tokens= sentence.split(splitPattern);\n\
    \n      if (tokens==null){\n         String msg = \"   NO MATCH: pattern:\" +\
    \ sentence\n             + \"\\r\\n             regex: \" + splitPattern;\n  \
    \    }\n      else{\n         retval = tokens[1] + \", \" + tokens[0];\n     \
    \    System.out.println(\"BEFORE: \" + sentence);\n         System.out.println(\"\
    AFTER : \" + retval +\"\\n\");\n      }\n      return retval;\n   }\n}\n```\n\n\
    | **![结束示例](img/_1.gif)** |\n\n|  |\n\n输出 1-11: 运行 StyleSplitExample.java 的结果\n\
    \n| **![开始示例](img/_1.gif)** |\n\n```\nC:\\RegEx\\Examples\\chapter1>java StyleSplitExample\n\
    BEFORE: but simple justice, not charity\nAFTER : not charity, but simple justice\n\
    \nBEFORE: but that I love Rome more, not that I love Caesar less\nAFTER : not\
    \ that I love Caesar less, but that I love Rome more\n\nBEFORE: ask what you can\
    \ do for your country, ask not what your\ncountry can do for you\nAFTER : ask\
    \ not what your country can do for you, ask what you can\ndo for your country\n\
    ```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n"
- fmt: "### Conditional String Splitting Example\n\nRegex becomes particularly useful\
    \ when you have more complete `String` parsing needs. It's easy enough to split\
    \ a string when it's in a well-defined format, such as a comma-delimited file.\
    \ You don't need regex for that; a `StringTokenizer` will do just fine. But what\
    \ if you want to split a string based on, say, a word or any of its synonyms?\n\
    \nRegular expressions can be helpful in these kinds of scenarios because they\
    \ allow you to qualify complex criteria for effecting a division. [Listing 1-12](#LiB0010.html#ch01list12)\
    \ splits the given phrase based on occurrences of the word *compromise* or its\
    \ synonyms. [Output 1-12](#LiB0010.html#ch01ex12) shows the result of running\
    \ the program.\n\n**Listing 1-12: Split.java**\n\n```\npublic class Split{\n \
    \  public static void main(String args[]){\n\n      String statement = \"I will\
    \ not compromise. I will not \"+\n      \"cooperate. There will be no concession,\
    \ no conciliation, no \"+\n      \"finding the middle group, and no give and take.\"\
    ;\n\n      String tokens[] =null;\n\n      String splitPattern= \"compromise|cooperate|concession|\"\
    +\n      \"conciliation|(finding the middle group)|(give and take)\";\n\n    \
    \  tokens=statement.split(splitPattern);\n\n      System.out.println(\"REGEX PATTERN:\\\
    n\"+splitPattern + \"\\n\");\n\n      System.out.println(\"STATEMENT:\\n\"+statement\
    \ + \"\\n\");\n      System.out.println(\"\\nTOKENS\");\n      for (int i=0; i\
    \ < tokens.length; i++){\n      System.out.println(tokens[i]);\n      }\n   }\n\
    }\n```\n\n**Output 1-12: Result of Running Split.java**\n\n```\nC:\\RegEx\\Examples\\\
    chapter1>java Split\nREGEX PATTERN:\ncompromise|cooperate|concession|conciliation|(finding\
    \ the middle group)|(give\nand take)\n\nSTATEMENT:\nI will not compromise. I will\
    \ not cooperate. There will be no\nconcession, no conciliation,\n no finding the\
    \ middle group, and no give and take.\n\nTOKENS:\nI will not\n. I will not\n.\
    \ There will be no\n, no\n, no\n, and no\n.\n```\n\nThis example illustrates the\
    \ new types of possibilities that now exist as part of the standard Java implementation.\
    \ I discuss more sophisticated splits in [Chapters 3](#LiB0020_split_000.html#336)\
    \ and [4](#LiB0033_split_000.html#402).\n\n## Comparing Regex and Perl\n\nPerl\
    \ is probably the most popular language to offer regular expression support. As\
    \ such, it makes sense to put Java's regex support in context by comparing it\
    \ to that of Perl. The distinctions you should be aware of are highlighted in\
    \ the sections that follow. Generally speaking, J2SE doesn't include some Perl\
    \ constructs, because Java is a full-featured programming language that offers\
    \ sophisticated condition and logical paths of execution that are reasonable alternatives\
    \ to the constructs offered by Perl.\n\n### What Perl Offers That Java Regex Doesn't\n\
    \nThere are several constructs and concepts you might be familiar with from your\
    \ Perl experience that you won't be able to use in the current implementation\
    \ of Java. Because these are parts of Perl and not Java, I mention them only briefly\
    \ here.\n\nRegex `String` modification isn't supported in Java. This means that\
    \ you can't modify a `String` with regex. `String`s are immutable objects in Java,\
    \ so you'll have to use methods that return a new `String` with the modifications\
    \ you need. In addition, you'll have to modify your `String` manually, as opposed\
    \ to using regex patterns to do so. The earlier search and replace example shows\
    \ how this works. The original `String` isn't modified—it simply returns a new\
    \ `String` that represents the modification.\n\nPerl's conditional constructs,\
    \ `(?{X})` and `(?(condition)X|Y)`, aren't supported by J2SE's regex. Because\
    \ Java offers robust `if-then-else` support as a language feature, there's no\
    \ need for conditional constructs. [Chapter 4](#LiB0033_split_000.html#402) provides\
    \ examples of how this works.\n\nJava doesn't support the embedded code constructs\
    \ `(?(code))` and `(??(code))`. Again, these are the sorts of things that can\
    \ be handled more intuitively, by Java standards, by using Java's built-in language\
    \ features.\n\nJava doesn't support embedded comments by default, because your\
    \ patterns can be so easily commented when you create them as `String`s. However,\
    \ you can use the `Pattern.COMMENT` flag to compile your regex with comments if\
    \ you really need to. For more on this, please see [Chapter 2](#LiB0014_split_000.html#187).\n\
    \nJava doesn't support the preprocessing operations `\\l`, `\\u`, `\\L`, and `\\\
    U`.\n\n### What Java Regex Offers That Perl Doesn't\n\nPossessive qualifiers are\
    \ unique to Java, but they're very likely to be adopted by other regex implementations\
    \ soon, because they're such a good idea. Possessive qualifiers continue to retain\
    \ any qualifying greedy match. That means that once a possessive match is achieved,\
    \ it isn't relinquished. I discuss possessive qualifiers in depth in [Chapter\
    \ 3](#LiB0020_split_000.html#336).\n\n## Summary\n\nThis chapter covered some\
    \ general regex syntax and introduced the concepts of the `Matcher` and `Pattern`\
    \ classes. You learned some methods for creating your own regular expressions\
    \ and how you might actually use them in Java. Finally, you explored some concrete\
    \ examples and reasoned your way through them. [Chapter 2](#LiB0014_split_000.html#187)\
    \ continues to build on this theme and provide you with a deeper understanding\
    \ of Java's regex package."
