  trans: "\n### public int start(int group)\n\n此方法允许你指定匹配结果中你感兴趣的某个子组。如果没有匹配项，或者尚未尝试进行匹配，此方法将抛出\
    \ `IllegalStateException`。清单 2-10 将很快演示 `start(int)` 方法的使用。但在检查代码之前，让我们先退一步，思考一下这段代码实际想要演示什么。\n\
    \n清单 2-10：Matcher.start(int) 示例\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport\
    \ java.util.regex.*;\n/**\n * 演示 Matcher.start(int) 方法的使用\n */\npublic class MatcherStartParamExample{\n\
    \  public static void main(String args[]){\n      test();\n  }\n  public static\
    \ void test(){\n     //创建一个 Pattern\n      Pattern p = Pattern.compile(\"B(ond)\"\
    );\n\n//创建一个 Matcher 并使用 Matcher.start(int) 方法\n     String candidateString =\
    \ \"My name is Bond. James Bond.\";\n     //为输出创建一个辅助索引\n     String matchHelper[]\
    \ =\n                             {\"          ^\",\n                        \
    \      \"           ^\",\n                              \"                   \
    \   ^\",\n                              \"                       ^\"};\n     Matcher\
    \ matcher = p.matcher(candidateString);\n     //找到第一个 'B(ond)' 的起始点\n      matcher.find();\n\
    \      int startIndex = matcher.start(0);\n      System.out.println(candidateString);\n\
    \      System.out.println(matchHelper[0] + startIndex);\n\n//找到第一个子组 (ond) 的起始点\n\
    \      int nextIndex = matcher.start(1);\n      System.out.println(candidateString);\n\
    \      System.out.println(matchHelper[1] + nextIndex);\n\n//找到第二个 'B(ond)' 的起始点\n\
    \      matcher.find();\n      startIndex = matcher.start(0);\n      System.out.println(candidateString);\n\
    \      System.out.println(matchHelper[2] + startIndex);\n      //找到第二个子组 (ond)\
    \ 的起始点\n      nextIndex = matcher.start(1);\n      System.out.println(candidateString);\n\
    \      System.out.println(matchHelper[3] + nextIndex);\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n在下面的例子中，正则表达式模式是 ***B(ond)***，这意味着模式中包含一个子组（括号表示子组）。以下是首次调用 `find()`\
    \ 时被解析的候选字符串部分：\n\n![](img/fig96_01.jpg)\n\n因此，当你调用 `start(0)` 方法时，你实际上是仅针对已经解析过的区域（即方框中标出的部分）调用它。对于\
    \ `Matcher` 而言，这个方框区域是我们当前唯一可以讨论的范围。这仅仅是 `find` 方法的本质，与 `start(int)` 方法本身无关。\n\
    \n`start(0)` 方法返回 `group(0)` 中第一个字符的索引，即 *Bond* 中的 *B*。`group(0)` 在下图中用圆圈标出。\n\
    \n![](img/fig97_01.jpg)\n\n类似地，当你调用 `start(1)` 时，你也是仅针对已经解析过的区域（即上图中的方框区域）调用它。这次，你请求的是解析区域中的第二个分组。`start(1)`\
    \ 方法返回 `group(1)` 中第一个字符的索引，即 *Bond* 中的 *o*。`group(1)` 在下图中用圆圈标出：\n\n![](img/fig97_02.jpg)\n\
    \n接下来，你再次调用 `matcher.find()`，这会导致候选字符串的一个新区域被纳入考虑范围，如下图所示：\n\n![](img/fig97_03.jpg)\n\
    \n在这里调用 `start(0)` 方法，实际上是仅针对已经解析过的新区域（即上图中方框内的部分）调用它。这是关联的 `Matcher` 将考虑的唯一区域。`start(0)`\
    \ 返回 `group(0)` 中第一个字符的索引，即 *Bond* 中的 *B*。`group(0)` 在下图中用圆圈标出：\n\n![](img/fig97_04.jpg)\n\
    \n同样，调用 `start(1)` 是要求 `Matcher` 仅考虑已经解析过的新区域（即方框区域）。这次，你请求的是解析区域中的第二个分组。`start(1)`\
    \ 返回 `group(1)` 中第一个字符的索引，即 *Bond* 中的 *o*。`group(1)` 在方框区域中用圆圈标出。\n\n![](img/fig97_05.jpg)\n\
    \n当你直观地审视这个过程时，就很容易理解 `start(int)` 方法如何与组、组编号以及 `find()` 方法交互。`find()` 方法仅解析候选字符串中足够让所有组匹配的部分，并在这个有限的区域内工作。在阅读清单\
    \ 2-10 时请牢记这一点。清单 2-10 是本节讨论算法的完整可运行示例。在阅读示例时，请根据需要参考前面的图片。\n\n输出 2-5 显示了运行 `start()`\
    \ 方法的输出。\n\n输出 2-5：Matcher.start(int) 示例的输出\n\n| **![开始示例](img/_1.gif)** |\n\n\
    ```\nMy name is Bond. James Bond.\n          ¹¹\nMy name is Bond. James Bond.\n\
    \          ¹²\nMy name is Bond. James Bond.\n                      ²³\nMy name\
    \ is Bond. James Bond.\n                       ²⁴\n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n如果你执行另一个 `find()` 方法\n\n```\nmatcher.find();\n```\n\n然后执行 `start()`\n\
    \n```\nint nonIndex = matcher.start(0); //抛出 IllegalStateException\n```\n\n`start(int)`\
    \ 方法将抛出 `IllegalStateException`，因为 `find()` 方法未成功。类似地，如果你尝试引用一个不存在的组编号，它将抛出 `IndexOutOfBoundsException`。\n\
    \n### public int end()\n\n`end` 方法返回 `Matcher` 对象上一次成功匹配的结束索引加 1。如果没有匹配项，或者尚未尝试进行匹配，此方法将抛出\
    \ `IllegalStateException`。清单 2-11 演示了 `end` 方法的使用。\n\n清单 2-11：Matcher.end() 示例\n\
    \n| **![开始示例](img/_1.gif)** |\n\n```\n/**\n * 演示 Matcher.end() 方法的使用\n */\npublic\
    \ class MatcherEndExample{\n  public static void main(String args[]){\n      test();\n\
    \  }\n  public static void test(){\n     //创建一个 Matcher 并使用 Matcher.end() 方法\n\
    \     String candidateString = \"My name is Bond. James Bond.\";\n     String\
    \ matchHelper[] =\n      {\"               ^\",\"                           ^\"\
    };\n     Pattern p = Pattern.compile(\"Bond\");\n     Matcher matcher = p.matcher(candidateString);\n\
    \n     //找到第一个 'Bond' 的结束点\n      matcher.find();\n      int endIndex= matcher.end();\n\
    \      System.out.println(candidateString);\n      System.out.println(matchHelper[0]\
    \ + endIndex);\n\n     //找到第二个 'Bond' 的结束点\n      matcher.find();\n      int nextIndex\
    \ = matcher.end();\n      System.out.println(candidateString);\n      System.out.println(matchHelper[1]\
    \ + nextIndex);\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n输出 2-6\
    \ 显示了运行 `end` 方法的输出。\n\n输出 2-6：Matcher.end() 示例的输出\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\nMy name is Bond. James Bond.\n              ¹⁵\nMy name is Bond. James\
    \ Bond.\n                          ²⁷\n```\n\n| **![结束示例](img/_1.gif)** |\n\n\
    |  |\n\n如果你执行另一个 `find` 方法\n\n```\nmatcher.find();\n```\n\n然后执行 `end`\n\n```\n\
    int nonIndex = matcher.end(); //抛出 IllegalStateException\n```\n\n`end` 方法将抛出 `IllegalStateException`，因为不存在有效的组来查找其结束位置。\n"
- fmt: "### `public int end(int group)`\n\nLike the `start(int)` method, this method\
    \ allows you to specify which subgroup within a matching you're interested in.\
    \ It returns the last index of the matching character sequence plus 1. [Listing\
    \ 2-12](#LiB0016.html#ch02list12) demonstrates the usage of the `end(int)` method\
    \ shortly.\n\n**Listing 2-12: `Matcher.end(int)` Example**\n\n```\nimport java.util.regex.*;\n\
    /**\n * Demonstrates the usage of the\n * Matcher.end(int) method\n */\npublic\
    \ class MatcherEndParamExample{\n  public static void main(String args[]){\n \
    \     test();\n  }\n  public static void test(){\n     //create a Pattern\n  \
    \    Pattern p = Pattern.compile(\"B(on)d\");\n     //create a Matcher and use\
    \ the Matcher.start(int) method\n     String candidateString = \"My name is Bond.\
    \ James Bond.\";\n     //create a helpful index for the sake of output\n     String\
    \ matchHelper[] =\n                             {\"               ^\",\n     \
    \                         \"              ^\",\n                             \
    \ \"                           ^\",\n                              \"        \
    \                  ^\"};\n     Matcher matcher = p.matcher(candidateString);\n\
    \     //Find the end point of the first 'B(ond)'\n      matcher.find();\n    \
    \  int endIndex = matcher.end(0);\n      System.out.println(candidateString);\n\
    \      System.out.println(matchHelper[0] + endIndex);\n\n//find the end point\
    \ of the first subgroup (ond)\n      int nextIndex = matcher.end(1);\n      System.out.println(candidateString);\n\
    \      System.out.println(matchHelper[1] + nextIndex);\n\n//Find the end point\
    \ of the second 'B(ond)'\n      matcher.find();\n      endIndex = matcher.end(0);\n\
    \      System.out.println(candidateString);\n      System.out.println(matchHelper[2]\
    \ + endIndex);\n\n//find the end point of the second subgroup (ond)\n      nextIndex\
    \ = matcher.end(1);\n      System.out.println(candidateString);\n      System.out.println(matchHelper[3]\
    \ + nextIndex);\n  }\n}\n```\n\nIn the following example, the regex pattern is\
    \ `B(on)d`, which means you have a subgroup within the pattern. The area that\
    \ has been examined by the `Matcher` after `find()` is initially called is highlighted\
    \ in the box shown in the following image:\n\n![](fig101_01.jpg)\n\nBy calling\
    \ the `end(0)` method, you're implicitly calling it only for the region that has\
    \ already been parsed, which is boxed in the preceding image. As far as the `Matcher`\
    \ is currently concerned, this boxed region is the only one we can discuss at\
    \ present.\n\nThe `end(0)` method returns the index of last character in `group(0)`\
    \ plus 1. Remember that `group(0)` is the entire expression `B(on)d`. In this\
    \ region, the last character is the *d* in *Bond*, which is at position 14. Because\
    \ `end(int)` adds 1 to that last index, 15 is returned. `group(0)` is circled\
    \ in the following image:\n\n![](fig101_02.jpg)\n\nSimilarly, when you call `end(1)`,\
    \ you're calling it only for the region that has already been parsed—again, the\
    \ boxed region. This time, you're asking for the second grouping in that region.\
    \ The `end(1)` method returns the index of the last character in `group(1)` plus\
    \ 1. The last character in `group(1)` is the *n* in *Bond*, because the pattern\
    \ is `B(on)d`, and the index of that *n* is 13. Because `end` adds 1 to the index,\
    \ 14 is returned. `group(1)` is circled in the following image:\n\n![](fig101_03.jpg)\n\
    \nNext, you call `matcher.find()` again, which results in a new region of the\
    \ candidate String coming under consideration, as shown here:\n\n![](fig102_01.jpg)\n\
    \nCalling the `end(0)` method implicitly calls it only for the new region that\
    \ has already been parsed, which is boxed in the preceding image. The `end(0)`\
    \ method returns the index of last character in `group(0)` plus 1, which is the\
    \ *d* in *Bond*. The index of *d* is 26, and because `end` adds 1 to that number,\
    \ 27 is returned. `group(0)` is circled in the following image:\n\n![](fig102_02.jpg)\n\
    \nCalling `end(1)` only considers the new region that been parsed—again, the boxed\
    \ region. This time, you're asking for the second grouping in the parsed region.\
    \ The `end(1)` method returns the index of last character in `group(1)` plus 1.\
    \ That last character is the *o* in *Bond*, which is at index 25, as shown in\
    \ the following image. Because `end(int)` adds 1 to that number, 26 is returned.\
    \ The result of calling `group(1)` is as follows:\n\n![](fig102_03.jpg)\n\nPlease\
    \ refer back to the preceding images as necessary when you read [Listing 2-12](#LiB0016.html#ch02list12).\
    \ The listing is simply a fully working example of the steps you just went through.\n\
    \n[Output 2-7](#LiB0016.html#ch02ex07) shows the output of running [Listing 2-12](#LiB0016.html#ch02list12).\n\
    \n**Output 2-7: Output for the `Matcher.end(int)` Example**\n\n```\nMy name is\
    \ Bond. James Bond.\n              ^15\nMy name is Bond. James Bond.\n       \
    \      ^14\nMy name is Bond. James Bond.\n                          ^27\nMy name\
    \ is Bond. James Bond.\n                         ^26\n```\n\nIf you execute another\
    \ `find()` method\n\n```\nmatcher.find();\n```\n\nand then execute `end()`\n\n\
    ```\nint nonIndex = matcher.end(0); //throws IllegalStateException\n```\n\nthe\
    \ `end(int)` method will throw an `IllegalStateException` if the `find` method\
    \ isn't successful or if it isn't called in the first place. Similarly, it will\
    \ throw an `IndexOutOfBoundsException` if you try to refer to a group number that\
    \ doesn't exist.\n\n### `public String group()`\n\nThe `group` method can be a\
    \ powerful and convenient tool in the war against jumbled code. It simply returns\
    \ the substring of the candidate String that matches the original regex pattern.\
    \ For example, say you want to extract occurrences of the pattern `Bond`\n\n```\n\
    Pattern p = Pattern.compile(\"Bond\");\n```\n\nfrom the candidate String *My name\
    \ is Bond. James Bond.*. You extract the `Matcher`\n\n```\nMatcher matcher = p.matches(\"\
    My name is Bond. James Bond.\");\n```\n\nand call `find()` on it.\n\n```\nMatcher.find();\
    \ \n```\n\nNow the boxed region in the following image is ready to be scrutinized\
    \ by the `Matcher`:\n\n![](fig105_01.jpg)\n\nYou can now extract the part of the\
    \ candidate String that matches your criteria by using the `group()` method:\n\
    \n```\nString tmp = matcher.group(); \\\\return \"Bond\";\n```\n\nThis method\
    \ extracts the matching part of the region under consideration. That area is circled\
    \ in the following image:\n\n![](fig105_02.jpg)\n\nA clumsier way of achieving\
    \ the same result is to use the `start` and `end` methods to find the starting\
    \ and ending indexes of the group within the candidate String, and use a `String.substring`\
    \ method to extract that text.\n\nThe `group()` method will throw an `IllegalStateException`\
    \ if the `find()` method is unsuccessful or if it's never initially called. [Listing\
    \ 2-13](#LiB0016.html#ch02list13) presents a complete working example of this\
    \ method and the algorithm discussed.\n\n**Listing 2-13: The `Matcher.group()`\
    \ Method**\n\n```\nimport java.util.regex.*;\n/**\n * Demonstrates the usage of\
    \ the\n * Matcher.group() method\n */\npublic class MatcherGroupExample{\n  public\
    \ static void main(String args[]){\n      test();\n  }\n  public static void test(){\n\
    \      //create a Pattern\n      Pattern p = Pattern.compile(\"Bond\");\n\n  \
    \    //create a Matcher and use the Matcher.group() method\n      String candidateString\
    \ = \"My name is Bond. James Bond.\";\n      Matcher matcher = p.matcher(candidateString);\n\
    \      //extract the group\n      matcher.find();\n      System.out.println(matcher.group());\n\
    \  }\n} \n```"
