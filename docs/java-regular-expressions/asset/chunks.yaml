    \ \\\\\\$ ，其中第一个 \\ 转义第二个 \\ ，第三个 \\ 转义 $ ，从而逻辑上产生 \\$ 。 ](img/#LiB0019.html#answer.N142)\
    \ |\n\n答案\n\n| **答：**  | 只需导入 java.util.regex.* 包即可。 |\n| **答：**  | 如果你确实是在查找一个明确的子串，而不是模式描述，那么请使用\
    \ String.indexOf 方法。然而，如果你需要确认一个模式是否存在，那么你有两条路可走。第一种是使用 String.split 方法的一个变体，并将第二个参数设为负数：\
    \ \n```\nString tokens[] = candidate.split(subStringPattern,-1);\n```\n\n并确保结果数组包含多个元素：\n\
    \n```\nboolean isThere = tokens.length > 1? true: false;\n```\n\n这里的问题是，如果你要查找的短语恰好是候选句子的最后一个元素，那么数组的大小仍然会是\
    \ 1，这将导致错误的结论。你可以用候选字符串 *this is* *the phrase I want* 和模式描述 ***want.***（末尾带有一个句点，跟在\
    \ *t* 字符之后）来测试一下。你的第二个选择是使用一个像下面这样的简短方法，它总是有效的：\n\n```\n /**\n   * 确认或否认正则表达式\n\
    \   * 作为候选字符串的一部分存在。\n   * @param the <code>String</code> 候选字符串\n   * @param the\
    \ <code>String</code> 子串模式\n   * @return <code>boolean</code> 如果正则表达式\n   * 描述了候选字符串的一部分，则返回\
    \ true\n   * @author M Habibi\n   */\n\n   public static boolean\n   containsSubtring(String\
    \ candidate, String subStringPattern)\n   {\n       boolean retval = false;\n\
    \       //编译模式\n       Pattern pattern = Pattern.compile(subStringPattern);\n\
    \       //查看候选字符串的任何部分是否包含该\n       //描述\n       Matcher matcher = pattern.matcher(candidate);\n\
    \       retval = matcher.find();\n\n       return retval;\n   }\n```\n\n |\n|\
    \ **答：**  | 这里的解决方案与之前给出的类似，包括使用 String.split 方法。同样的限制也适用。就基于方法的解决方案而言，你需要对该方法进行的唯一修改如下。首先，调整方法签名，使其接受第三个参数作为迭代次数，因此签名如下所示：\
    \ \n```\npublic static boolean containsSubtring(\n  String candidate,\n  String\
    \ subStringPattern,\n  int n\n)\n```\n\n其次，添加以粗体显示的循环：\n\n```\nboolean retval\
    \ = false;\n//编译模式\nPattern pattern = Pattern.compile(subStringPattern);\n\n//查看候选字符串的任何部分是否包含该\n\
    //描述\nMatcher matcher = pattern.matcher(candidate);\nfor (int i=0; i< n; i++)\n\
    {\n  retval = matcher.find();\n  if (!retval) break;\n}\nreturn retval;\n```\n\
    \n |\n| **答：**  | 对于候选字符串 \n```\n String candidate = \"I want to use a $ character\"\
    ;\n```\n\n解决方案是有点反直觉的正则表达式模式\n\n```\nString newString = candidate.replaceAll(\"\
    \\\\$\",\"\\\\\\\\\\\\$\");\n```\n\n第一个参数 *\\\\$* 很清楚。你想要美元符号，它恰好是一个表示行尾的正则表达式元字符。因为你确实想要实际的美元符号字符而不是行尾，所以你必须对美元符号进行转义，产生模式\
    \ ***\\$***。然而，你还需要满足 String 对象构造函数的需求，它期望将 *\\* 后面的任何内容视为字符串元字符。因为 *\\$* 不是字符串元字符（它是正则表达式元字符），你需要告诉\
    \ String 对象的构造函数忽略 *\\*。因此，你需要再次对其进行转义，产生 *\\\\$*。这就引出了模式的第二部分：*\\\\\\\\\\\\$*\
    \ 。在这里，第一个 *\\* 转义第二个 *\\*，第三个 *\\* 转义第四个 *\\*，第五个 *\\* 转义第六个。因此，字符串 *\\\\\\\\\
    \\\\$* 的结果是 *\\\\\\\\$*。在内部，该方法必须从 *I* *want to use a $ character* 中剥离出 *\\$*\
    \ 部分，并用 *某些内容* 替换它，但该内容是什么？该方法将你提供的原始字符串分解为两部分：一个由 *I* *want to use a* 组成的子串，和另一个由\
    \ *character* 组成的子串。通常，Matcher.replaceAll 方法会将你提供的任何内容插入到这两个子串之间，连接结果并返回。然而，因为你提供的内容恰好包含美元符号，所以出现了一个额外的复杂性。正如本章中\
    \ Matcher.replaceAll 的描述所示，美元符号在 replaceAll 方法中具有特殊意义。它用于引用被模式捕获的子组。因为你不希望它具有这种意义，所以你需要再次对其进行转义。因此，模式\
    \ ***\\\\\\$***，其中第一个 *\\* 转义第二个 *\\*，第三个 *\\* 转义 *$*，从而逻辑上产生 *\\$*。 |\n"
- fmt: "# Chapter 3: Advanced Regex\n\n## Overview\n\n> *\"You must turn and face\
    \ the tiger to learn it is made of paper.\"*\n> \n> — Zen saying\n\nThis chapter\
    \ explores some of the more advanced features of regular expressions in J2SE.\
    \ The goal is to provide a point of reference for the more complex regex tools\
    \ and concepts available to Java developers. This chapter should be a resource\
    \ you can come back to when you need a refresher on a J2SE regex concept.\n\n\
    Of course, there's no learning tool as useful as actually writing code, so I encourage\
    \ you to try out these concepts on your own. This chapter introduces a variety\
    \ of concepts, including groups, subgroups, noncapturing groups, greedy qualifiers,\
    \ positive qualifiers, reluctant qualifiers, positive lookaheads, negative lookaheads,\
    \ positive lookbehinds, and negative lookbehinds. The final section of this chapter\
    \ focuses on increasing the efficiency of your regular expressions.\n\n|  | Note\
    \ | The examples in this chapter are intentionally simple so as to clearly illustrate\
    \ the mechanisms being discussed. More complex examples, such as those used professionally,\
    \ are explored in [Chapter 5](#LiB0041_split_000.html#457) and in the Appendixes.\
    \ |\n\n## Understanding Groups\n\nAs I explained in [Chapter 2](#LiB0014_split_000.html#187),\
    \ a group is simply a sequence of characters that describes a regex pattern. Thus,\
    \ `\\w\\d` is a group, because there are two characters, `\\w` and `\\d`, and\
    \ they're in a sequence. This is an implicit group and thus trivial, because most\
    \ groups, as such, are explicitly surrounded by parentheses. In Java regular expressions,\
    \ every pattern has groups, and they're indexed. Thus, the pattern `\\w\\d` has\
    \ a single group, namely itself, and the index of that group is, of course, 0.\n\
    \nGroups are described in the `Pattern` but realized in the `Matcher`. Conceptually,\
    \ this is similar to how SQL works, where queries are described in the SQL query,\
    \ but the matching parts are extracted from the `ResultSet`. Thus, when you describe\
    \ the pattern `\\w\\d`, you might extract the matching candidate *A9* from the\
    \ candidate *A9* *is my favorite*. For example, if the group is described as\n\
    \n```\nPattern p = Pattern.compile(\"\\\\w\\\\d\");\n```\n\nand the candidate\
    \ `String` is\n\n```\nString candidate = \"A9 is my favorite\";\n```\n\nyou define\
    \ a `Matcher` for this candidate `String`:\n\n```\nMatcher matcher = p.matcher(candidate);\n\
    ```\n\nAssuming that the `Matcher.find()` method has already been called, then\
    \ calling `Matcher.group(0)` returns the part of the candidate `String` that matches\
    \ the entire pattern, as follows:\n\n```\nString tmp = matcher.group(0);\n```\n\
    \nThus, the `Matcher.group(0)` method is a bit of a misnomer. It doesn't actually\
    \ extract the group; it extracts the part of the candidate `String` that matches\
    \ that group. This is a subtle but important difference. The full example follows\
    \ in [Listing 3-1](#LiB0021.html#ch03list01).\n\n**Listing 3-1: Working with Groups**\n\
    \n```\nimport java.util.regex.*;\npublic class SimpleGroupExample{\n    public\
    \ static void main(String args[]){\n        //the original pattern is always group\
    \ 0\n        Pattern p = Pattern.compile(\"\\\\w\\\\d\");\n        String candidate\
    \ = \"A9 is my favorite\";\n\n        //if there is a match, extract that part\
    \ of\n        //the candidate string that matches group(0)\n        Matcher matcher\
    \ = p.matcher(candidate);\n\n        //OUTPUT is 'A9'\n        if (matcher.find()){\n\
    \            String tmp = matcher.group(0);\n            System.out.println(tmp);\n\
    \        }\n    }\n}\n```\n\nThat works perfectly when you need the whole pattern.\
    \ But what about cases in which you need subsections of that pattern? How do you\
    \ extract those? That's where subgroups come to the rescue.\n\n## Understanding\
    \ Subgroups\n\nJust as a pattern can have groups, so can it have subgroups. *Subgroups*\
    \ are simply smaller groups within the larger whole. They're separated from the\
    \ original group, and from each other, by being surrounded by parentheses.\n\n\
    In the example in the preceding section, in order to be able to refer explicitly\
    \ to the digit `\\d`, you modify the pattern to `\\w(\\d)`. Here, `\\w\\d` is\
    \ group(0) and `(\\d)` is group(1). [Listing 3-2](#LiB0022.html#ch03list02) demonstrates\
    \ the use of a subgroup to extract the part of the candidate that matches the\
    \ digit `\\d`.\n\n**Listing 3-2: Working with Subgroups**\n\n```\nimport java.util.regex.*;\n\
    public class SimpleSubGroupExample{\n    public static void main(String args[]){\n\
    \        //the original pattern is always group 0\n        Pattern p = Pattern.compile(\"\
    \\\\w(\\\\d)\");\n        String candidate = \"A9 is my favorite\";\n\n      \
    \  //if there is a match, extract the parts that\n        //match.\n        Matcher\
    \ matcher = p.matcher(candidate);\n        if (matcher.find()){\n            //Extract\
    \ 'A9', which matches group(0), which is\n            //always the entire pattern\
    \ itself.\n            String tmp = matcher.group(0);\n            System.out.println(tmp);\
    \ //tmp is 49\n\n            //extract part of the candidate string that matches\n\
    \            //group(1): Namely, the '9' which follows the 'A'\n            tmp\
    \ = matcher.group(1); //tmp is 9\n            System.out.println(tmp);\n     \
    \   }\n    }\n}\n```\n\n[Listing 3-2](#LiB0022.html#ch03list02) allows you to\
    \ extract parts of the candidate `String` that match the entire expression. It\
    \ also allows you to extract subsections of that matching section. Thus, you can\
    \ extract *9* from the matching region *A9* because *9* matches group(1). That\
    \ is, the regex engine stores the *9* when it matches *A9*, because you defined\
    \ the subgroup `(\\d)`.\n\n## Accessing Subgroups\n\nSo how does all of this actually\
    \ work? Are there little fairies running around under the hood of the regex engine,\
    \ keeping track of all these groups? Well, yes and no.\n\nAlthough there are no\
    \ fairies under the hood that I know of, the regex engine is internally tracking\
    \ all subgroups by putting the matching sections from the candidate `String` into\
    \ memory. Thus, because you defined the pattern as `\\w(\\d)`, the regex will\
    \ keep track of any single digit when that digit is preceded by an alphanumeric\
    \ or underscore character. That's what the regex thinks you mean for it do when\
    \ you put the expression `(\\d)` in parentheses.\n\nThe engine provides access\
    \ to these captured groups based on their numeric index. Captured groups are indexed\
    \ from left to right, in the order of their opening parentheses, and group(0)\
    \ always refers to the original expression in its entirety. Thus, in the preceding\
    \ example, group(0) refers to the part of the candidate string that matches the\
    \ entire expression `\\w(\\d)`, whereas group(1) refers to the part of the expression\
    \ that matches the `(\\d)` part of the expression.\n\nFor example, if your pattern\
    \ was `(\\w)(\\d)(\\w)(\\w)` and your candidate string was *J2SE*, then group\
    \ 0 would have matched the entire candidate *J2SE*. Group 1 would have matched\
    \ *J*, group 2 would have matched *2*, group 3 would have matched *S*, and group\
    \ 4 would have matched *E*.\n\nCorrespondingly, if your pattern stayed `(\\w)(\\\
    d)(\\w)(\\w)` but your candidate string was *R2D2*, then group 0 would have matched\
    \ the entire candidate *R2D2*. Group 1 would have matched *R*, group 2 would have\
    \ matched *2*, group 3 would have matched *D*, and group 4 would have matched\
    \ *2*."
