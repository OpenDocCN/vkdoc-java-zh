    \ greedy qualifier, so it matches as much as possible—in this case, the entire\
    \ candidate string.\n\n## Zen and the Art of Efficient Expressions\n\nThis section\
    \ deals presents some techniques you can use to optimize your regular expressions\
    \ in J2SE. It's designed to help you deal with regular expressions that already\
