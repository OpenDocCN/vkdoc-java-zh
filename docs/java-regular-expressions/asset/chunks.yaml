    \ meets the criterion of being well formatted. It checks for five digits optionally\
    \ followed by a hyphen and four digits. [Output 1-3](#LiB0009.html#ch01ex03) shows\
    \ the result of running the program. [Table 1-20](#LiB0009.html#ch01table20) dissects\
    \ the pattern.\n\nTable 1-20: The Pattern *\\d{5}(-\\d{4})*?\n\n| **Regex** |\
    \ **Description** |\n| --- | --- |\n| \\d | A digit |\n| { | Repeated at least\
    \ |\n| 5 | Five times |\n| } | End repetition |\n| ( | Open group |\n| - | Consisting\
    \ of a hyphen |\n| \\d | A digit |\n| { | Repeated at least |\n| 4 | Four times\
    \ |\n| } | End repetition |\n| ) | The end of this group |\n| ? | Look for zero\
    \ or one of the preceding |\n| * **In English:** Look for five digits, optionally\
    \ followed by a hyphen and four digits. |\n\nListing 1-3: MatchZipCodes.java\n\
    \n| **![Start example](_1.gif)** |\n\n```\nimport java.util.regex.*;\nimport java.io.*;\n\
    \npublic class MatchZipCodes{\n   public static void main(String args[]){\n  \
    \    isZipValid(args[0]);\n   }\n\n   /**\n   * Confirms that the format for the\
    \ given zip code is valid.\n   * @param zip is a String representing the zip code.\n\
    \   * @returns true if the zip code format is acceptable.\n   */\n   public static\
    \ boolean isZipValid(String zip){\n      boolean retval=false;\n      String zipCodePattern\
    \ = \"\\\\d{5}(-\\\\d{4})?\";\n      retval = zip.matches(zipCodePattern);\n\n\
    \      //prepare a message indicating success or failure\n      String msg = \"\
    \   NO MATCH: pattern:\" + zip\n             + \"\\r\\n             regex: \"\
    \ + zipCodePattern;\n\n      if (retval){\n      msg = \"   MATCH   : pattern:\"\
    \ + zip\n          + \"\\r\\n             regex: \" + zipCodePattern;\n      }\n\
    \n      System.out.println(msg +\"\\r\\n\");\n      return retval;\n   }\n}\n\
    ```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nOutput 1-3: Result of Running\
    \ MatchZipCodes.java\n\n| **![Start example](_1.gif)** |\n\n```\nC:\\RegEx\\Examples\\\
    chapter1>java MatchZipCodes \"45643-4443\"\n   MATCH  : pattern:45643-4443\n \
    \           regex: \\d{5}(-\\d{4})?\n\nC:\\RegEx\\Examples\\chapter1>java MatchZipCodes\
    \ \"45643\"\n   MATCH   : pattern:45643\n             regex: \\d{5}(-\\d{4})?\n\
    \nC:\\RegEx\\Examples\\chapter1>java MatchZipCodes \"443\"\n   NO MATCH: pattern:443\n\
    \             regex: \\d{5}(-\\d{4})?\n\nC:\\RegEx\\Examples\\chapter1>java MatchZipCodes\
    \ \"45643-44435\"\n   NO MATCH: pattern:45643-44435\n             regex: \\d{5}(-\\\
    d{4})?\n\nC:\\RegEx\\Examples\\chapter1>java MatchZipCodes \"45643 44435\"\n \
