- fmt: '# The Pattern Object


    [Figure 2-1](#LiB0015.html#ch02fig01) shows the methods of the `Pattern` class.
    The figure is a UML rendering of the `Pattern` class that illustrates the various
    methods and constants of the class.


    [![Click To expand](fig74_01.jpg)](fig74_01_0.jpg)

    Figure 2-1: A UML representation of the `Pattern` class


    Let''s examine the fields and methods of the `Pattern` class in detail. If you
    aren''t familiar with UML, here''s a quick guide to reading [Figure 2-1](#LiB0015.html#ch02fig01):


    - The name of the class is `Pattern`, and it''s in the topmost section of the
    rectangle.

    - The middle section is a grouping of the field variables. The plus sign (`+`)
    preceding these indicates that they''re public. The underline indicates that they''re
    static, and the `: int` indicates that they''re of type `int`. The `= num` indicates
    the default value.

    - The bottommost section of the rectangle holds the class''s methods. Again, the
    plus sign indicates public access, and the underline indicates that the method
    is static. The parentheses designate the parameters for a given method; thus,
    `flags()` takes no parameters, whereas `matcher(input : CharSequence)` takes variable
    named `input` of type `CharSequence`. The colon (`:`) toward the end indicates
    a type.


    The following sections describe the fields and methods of the `Pattern` class.


    ## `public static final int UNIX_LINES`


    The `UNIX_LINES` flag is used in constructing the second parameter of the `Pattern.compile(String
    regex, int flags)` method. Use this flag when you parse data that originates on
    a UNIX machine.


    On many flavors of UNIX, the invisible character `\n` is used to note termination
    of a line. This is distinct from other operating systems, including flavors of
    Windows, which may use `\r\n`, `\n`, `\r`, `\u2028`, or `\u0085` for a line terminator.


    If you transport a file that originated on a UNIX machine to a Windows platform
    and open it, you may notice that the lines will sometimes not terminate in the
    expected manner, depending on which editor you use to view the text. This happens
    because the two systems can use different syntax to denote the end of a line.


    The `UNIX_LINES` flag simply tells the regex engine that it''s dealing with UNIX-style
    lines, which affects the matching behavior of the regular expression metacharacters
    `^` and `$`. Using the `UNIX_LINES` flag, or the equivalent `(?d)` regex pattern,
    doesn''t degrade performance. By default, this flag isn''t set.


    ## `public static final int CASE_INSENSITIVE`


    The `CASE_INSENSITIVE` field is used when constructing the second parameter of
    the `Pattern.compile(String regex, int flags)` method. It''s useful when you need
    to match ASCII characters, regardless of case.


    Using this flag or the equivalent `(?I)` regular expression can cause performance
    to degrade slightly. By default, this flag isn''t set.


    ## `public static final int COMMENTS`


    The `COMMENTS` flag is used in constructing the second parameter of the `Pattern.compile(String
    regex, int flags)` method. It tells the regex engine that the regex pattern has
    an embedded comment in it. Specifically, it tells the regex engine to ignore any
    comments in the pattern, starting with the spaces leading up to the `#` character
    and everything thereafter, until the end of the line.


    Thus, the regex pattern `A` `#matches uppercase US-ASCII char code 65` will use
    `A` as the regular expression, but the spaces leading to the `#` character and
    everything after it until the end of the line will be ignored. Your code might
    end up looking something like this:


    ```

    Pattern p =

    Pattern.compile("A    #matches uppercase US-ASCII char code 65",Pattern.COMMENTS);

    ```


    Think of the `#` character as the regex equivalent of the java comment `//`. By
    using the `COMMENTS` flag in compiling your regex, you''re telling the regex engine
    that your expression contains comments, which should be ignored. This can be useful
    if your pattern is particularly complex or subtle. When you don''t set this flag,
    the regex engine will attempt to interpret and use your comments as part of the
    regular expression.


    Using this flag or the equivalent `(?x)` regular expression doesn''t degrade performance.


    ## `public static final int MULTILINE`


    The `MULTILINE` flag is used in constructing the second parameter of the `Pattern.compile(String
    regex, int flags)` method. It tells the regex engine that regex input isn''t a
    single line of code; rather, it contains several lines that have their own termination
    characters.


    This means that the beginning-of-line character, `^`, and the end-of-line character,
    `$`, will potentially match several lines within the input `String`. For example,
    imagine that your input `String` is *This is a sentence.\n So is this.*. If you
    use the `MULTILINE` flag to compile the regular expression pattern


    ```

    Pattern p = Pattern.compile("^", Pattern.MULTILINE);

    ```


    then the beginning of line character, `^`, will match before the *T* in *This
    is a sentence*. It will also match just before the *S* in *So is this*. When you
    don''t use the `MULTILINE` flag, the match will only find the *T* in *This is
    a sentence*.


    Using this flag or the equivalent `(?m)` regular expression may degrade performance.


    ## `public static final int DOTALL`


    The `DOTALL` flag is used in constructing the second parameter of the `Pattern.compile(String
    regex, int flags)` method. The `DOTALL` flag tells the regex engine to allow the
    metacharacter period to match any character, including line termination characters.
    What does this mean?


    Imagine that your candidate `String` is *Test\n*. If your corresponding regex
    pattern is `.` you would normally have four matches: one for the *T*, another
    for the *e*, another for *s*, and the fourth for *t*. This is because the regex
    metacharacter `.` will normally match any character *except* a line termination
    character.


    Enabling the `DOTALL` flag as follows:


    ```

    Pattern p = Pattern.compile(".", Pattern.DOTALL);

    ```


    would generate five matches. Your pattern would match the *T*, *e*, *s*, and *t*
    characters. In addition, it would match the `\n` character at the end of the line.


    Using this flag or the equivalent `(?s)` regular expression doesn''t degrade performance.


    ## `public static final int UNICODE_CASE`


    The `UNICODE_CASE` flag is used in constructing the second parameter of the `Pattern.compile(String
    regex, int flags)` method. It is used in conjunction with the `CASE_INSENSITIVE`
    flag to generate case-insensitive matches for the international character sets.


    Using this flag or the equivalent `(?u)` regular expression can degrade performance.


    ## `public static final int CANON_EQ`


    The `CANON_EQ` flag is used in constructing the second parameter of the `Pattern.compile(String
    regex, int flags)` method. As you know, characters are actually stored as numbers.
    For example, in the ASCII character set, the character *A* is represented by the
    number 65. Depending on the character set that you''re using, the same character
    can be represented by different numeric combinations. For example, *à* can be
    represented by both `+00E0` and `U+0061U+0300`. A `CANON_EQ` match would match
    either representation.


    Using this flag may degrade performance.'
