    \ English:** Any number of alphanumeric characters followed by single hyphens,\
    \ periods, or underscores, but ending in an alphanumeric character; followed by\
    \ an `@` symbol; followed by any number of alphanumeric characters; followed by\
    \ single hyphens, periods, or underscores, but ending in an upper- or lowercase\
    \ character. |\n\n|  | Note | The following pattern matches the previous one exactly,\
    \ except that it allows an IP address as well: \n```\n^(\\p{Alnum}+(\\.|\\_|\\\
    -)?)*\\p{Alnum}@(((\\p{Alnum}+(\\.|\\_|\\-)?)*\\p{Alpha})|((([0-1]?\\d{1,2}\\\
