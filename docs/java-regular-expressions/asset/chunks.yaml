  trans: '

    ### public boolean find()


    `find()` 方法会解析候选字符串中足够的部分以查找匹配项。如果找到这样的子字符串，则返回 `true`，并且 `find` 会停止解析候选字符串。如果候选字符串中没有部分与模式匹配，则
    `find` 返回 `false`。


    ### public boolean find(int start)


    `find(int start)` 的工作方式与其重载版本完全相同，区别在于搜索的起始位置。整数参数 `start` 只是告诉 `Matcher` 从哪个字符开始搜索。


    因此，对于候选字符串 *I* *love Java. Java is my favorite language. Java* *Java Java*. 和模式
    **Java**，如果你只想从字符索引 11 开始搜索，可以使用命令 `find(11)`。


    ### public Matcher appendReplacement(StringBuffer sb, String replacement)


    `appendReplace` 方法允许你基于正则表达式修改 `StringBuffer` 的内容。它甚至允许你通过使用 ***$n*** 符号来引用反向引用，其中
    ***n*** 指的是某个捕获的子组。例如，对于 `StringBuffer` *Waldo Smith*、模式 ***(\w+) (\w+)*** 和替换字符串
    ***$2, $1***，`StringBuffer` 的内容将被修改为 *Smith, Waldo*。


    如果尚未调用 `find()`，或者调用 `find()` 会返回 `false`，则 `appendReplacement` 方法会抛出 `IllegalStateException`。如果由
    ***$1, $2*** 等引用的捕获组在 `Matcher` 当前正在检查的模式部分中不存在，则会抛出 `IndexOutOfBoundsException`。


    ### public StringBuffer appendTail(StringBuffer sb)


    `appendTail` 方法是 `appendReplacement` 方法的补充。它只是将从追加位置（我在 `appendReplacement` 部分解释过）到原始候选字符串末尾的所有剩余子序列追加到
    `StringBuffer` 中。


    ### public String replaceAll(String replacement)


    `replaceAll` 方法返回一个字符串，该字符串将所有出现的描述替换为替换字符串。使用此方法会更改 `Matcher` 对象的状态。具体来说，会调用
    `reset()` 方法。因此，请记住，所有 `start`、`end`、`group` 和 `find` 调用都必须重新执行。


    与 `appendReplacement` 方法类似，`replaceAll` 方法可以通过使用 ***$*** 符号包含对子字符串的引用。有关详细信息，请参阅前面介绍的
    `appendReplacement` 文档。


    ### public String replaceFirst(String replacement)


    `replaceFirst` 方法是 `replaceAll` 方法的一个更有限的版本。此方法返回一个字符串，该字符串将第一个出现的描述替换为替换字符串。使用此方法会更改
    `Matcher` 对象的状态。具体来说，会调用 `reset()` 方法。因此，请记住，在调用 `replaceFirst` 之后，所有 `start`、`end`、`group`
    和 `find` 调用都必须重新执行。


    与 `appendReplacement` 方法类似，`replaceFirst` 方法可以通过使用 ***$*** 符号包含对子字符串的引用。有关详细信息，请参阅前面介绍的
    `appendReplacement` 文档。

