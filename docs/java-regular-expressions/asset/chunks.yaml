    \ |\n| --- | --- |\n| [ | A class consisting of |\n| ^ | Any character except\
    \ |\n| A | The character *A* |\n| ] | Close class |\n| * **In English:** Look\
    \ for any character except the capital letter *A* |\n\n#### Groups\n\nA group\
    \ is a submatch. If you're familiar with SQL, it might be helpful to think of\
    \ groups as the SQL equivalent of a subquery. Groups allow you to define parts\
    \ of your pattern as logical subunits of the whole and then refer to the results\
    \ of those subunits. Their syntax follows in [Table 1-15](#LiB0008.html#ch01table15).\n\
    \nTable 1-15: Groups\n\n| **Regex** | **Description** |\n| --- | --- |\n| ( |\
    \ A group consisting of |\n| … | Any regex pattern |\n| ) | Close group |\n\n\
    #### Groups Example\n\nAs with most things, an example can be more illuminating\
    \ than a description. Consider the pattern ***(\\w+)_(\\w+)@(\\w+)\\.org*** to\
    \ match e-mail patterns. [Table 1-16](#LiB0008.html#ch01table16) dissects this\
    \ pattern.\n\nTable 1-16: The Pattern *(\\w+)_(\\w+)@(\\w+)\\.or*g\n\n| **Regex**\
    \ | **Description** |\n| --- | --- |\n| ( | A group consisting of |\n| \\w | An\
    \ alphanumeric or underscore character |\n| + | Repeated one or more times |\n\
    | ) | Close group |\n| _ | Followed by an underscore character |\n| ( | A group\
    \ consisting of |\n| \\w | One alphanumeric or underscore character |\n| + | Followed\
    \ by one or more alphanumeric characters |\n| ) | Close group |\n| @ | Followed\
    \ by an at character |\n| ( | A group consisting of |\n| \\w | One alphanumeric\
    \ or underscore character |\n| + | Followed by one or more alphanumeric or underscore\
    \ characters |\n| ) | Close group |\n| \\. | Followed by the period character\
    \ |\n| o | Followed by the character *o* |\n| r | Followed by the character *r*\
    \ |\n| g | Followed by the character *g* |\n| * **In English:** Look for a group\
    \ of alphanumeric characters, followed by *_*, followed by a group of alphanumeric\
    \ characters, followed by *@*, followed by a group of alphanumeric characters,\
    \ followed by .*org.* |\n\n## Integrating Java with Regular Expressions\n\nThus\
    \ far, you've worked almost exclusively with regular expressions, but not really\
    \ with Java. Now it's time to consider how the two interact. The following examples\
    \ differ from the preceding ones in that they incorporate Java code with regular\
    \ expressions. They offer a more complete picture of how you can use some J2SE\
    \ regex syntax.\n\nSome of the regular expressions you'll see here are slightly\
    \ more advanced than in the examples you've seen previously, as they build on\
    \ the fundamentals discussed thus far in the chapter. For example, [Listing 1-2](#LiB0009.html#ch01list02)\
    \ combines groups with quantifiers.\n\nListing 1-2: MatchPhoneNumber.java\n\n\
    | **![Start example](_1.gif)** |\n\n```\nimport java.util.regex.*;\npublic class\
    \ MatchPhoneNumber{\n   public static void main(String args[]){\n      isPhoneValid(args[0]);\n\
    \   }\n\n   /**\n   * Confirms that the format for the given phone number is valid.\n\
    \   * @param phone is a String representing the phone number.\n   * @returns true\
    \ if the phone number format is acceptable.\n   */\n   public static boolean isPhoneValid(String\
    \ phone){\n      boolean retval=false;\n\n      String phoneNumberPattern =\n\
    \        \"(\\\\d-)?(\\\\d{3}-)?\\\\d{3}-\\\\d{4}\";\n\n      retval= phone.matches(phoneNumberPattern);\n\
    \n      //prepare a message indicating success or failure\n      String msg =\
    \ \"   NO MATCH: pattern:\" + phone\n             + \"\\r\\n             regex:\
    \ \" + phoneNumberPattern;\n\n      if (retval){\n      msg = \"   MATCH   : pattern:\"\
    \ + phone\n          + \"\\r\\n             regex: \" + phoneNumberPattern;\n\
    \      }\n\n      System.out.println(msg +\"\\r\\n\");\n      return retval;\n\
    \   }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nDon't be discouraged\
    \ if the patterns themselves aren't completely clear to you right now. An intuitive\
    \ understanding will develop as you continue to read this book. Focus on the concepts\
    \ and become comfortable with how the Java code and the regex complement each\
    \ other.\n\nThere are only two pieces of information you need to take full advantage\
    \ of the following examples:\n\n*   Any **\\**-delimited regex expression metacharacter\
    \ needs to be delimited once again when it's used in Java code. Thus, ***\\d***\
    \ becomes ***\\\\d*** and ***\\s*** becomes***\\\\s*** in your Java code. Correspondingly,\
    \ a more complex expression such as ***(\\d-)?(\\d{3}-)?\\d{3}-\\d{4}\\s*** becomes\
    \ ***(\\\\d-)?(\\\\d{3}-)?\\\\d{3}-\\\\d{4}\\\\s*** in Java code. All ***\\***\
    \ characters are doubled to produce ***\\\\*** when they're used in a String object.\n\
    \n*   In this book, when I talk about a regular expression in and of itself, I\
    \ don't use the double delimiting mechanism. However, I do when working with specific\
    \ coding examples.\n\n*   The String.matches(String regex) method is a new method\
    \ that has been added to the String class. It compares the String it's called\
    \ on to the given regular expression, regex, and returns true if the regex pattern\
    \ matches the String *exactly*. To match exactly means that the String in question\
    \ can't contain any characters—not even invisible characters such as newlines\
    \ and spaces—that aren't accounted for in the regex pattern."
  trans: "\n#### 简单类示例\n\n让我们逐步看几个简单示例。模式 ***[0-5]*** 将匹配输入中包含 *0* 到 *5* 之间任意数字的部分。因此，它将匹配\
    \ *0、1、2、3、4* 或 *5*，但不会匹配 *8、6* 或任何非数字字符。表 1-13 对该模式进行了剖析。\n\n表 1-13：模式 *[0-5*]\n\
    \n| **正则表达式** | **描述** |\n| --- | --- |\n| [ | 一个类，包含 |\n| 0 | 数字 0 |\n| - | 范围至\
    \ |\n| 5 | 数字 5 |\n| ] | 类结束 |\n| * **中文释义：** 查找从 *0* 到 *5*（含 *0* 和 *5*）的任意数字。\
    \ |\n\n#### 否定示例\n\n模式 ***[^A]*** 将匹配除字符 *A* 之外的任何字符。这包括其他字符、空格、制表符、标点符号等。需要注意的是，**^**\
    \ 分隔符只有在类括号内（即 ***[*** 和 ***]*** 括号之间）才具有“非”的含义。在这些括号之外，它表示行首字符。我将在后面更详细地讨论这个主题。表\
    \ 1-14 对该模式进行了剖析。\n\n表 1-14：模式 *[^A*]\n\n| **正则表达式** | **描述** |\n| --- | --- |\n\
    | [ | 一个类，包含 |\n| ^ | 除……之外的任意字符 |\n| A | 字符 *A* |\n| ] | 类结束 |\n| * **中文释义：**\
    \ 查找除大写字母 *A* 之外的任意字符。 |\n\n#### 分组\n\n分组是一个子匹配。如果你熟悉 SQL，将分组视为 SQL 中的子查询可能会有所帮助。分组允许你将模式的一部分定义为整体的逻辑子单元，然后引用这些子单元的结果。其语法如下表\
    \ 1-15 所示。\n\n表 1-15：分组\n\n| **正则表达式** | **描述** |\n| --- | --- |\n| ( | 一个组，包含\
    \ |\n| … | 任意正则模式 |\n| ) | 组结束 |\n\n#### 分组示例\n\n与大多数事物一样，示例可能比描述更具启发性。考虑模式 ***(\\\
    w+)_(\\w+)@(\\w+)\\.org*** 用于匹配电子邮件模式。表 1-16 对该模式进行了剖析。\n\n表 1-16：模式 *(\\w+)_(\\\
    w+)@(\\w+)\\.or*g\n\n| **正则表达式** | **描述** |\n| --- | --- |\n| ( | 一个组，包含 |\n|\
    \ \\w | 一个字母数字或下划线字符 |\n| + | 重复一次或多次 |\n| ) | 组结束 |\n| _ | 后跟一个下划线字符 |\n| ( |\
    \ 一个组，包含 |\n| \\w | 一个字母数字或下划线字符 |\n| + | 后跟一个或多个字母数字字符 |\n| ) | 组结束 |\n| @ |\
    \ 后跟一个 at 符号 |\n| ( | 一个组，包含 |\n| \\w | 一个字母数字或下划线字符 |\n| + | 后跟一个或多个字母数字或下划线字符\
    \ |\n| ) | 组结束 |\n| \\. | 后跟句点字符 |\n| o | 后跟字符 *o* |\n| r | 后跟字符 *r* |\n| g |\
    \ 后跟字符 *g* |\n| * **中文释义：** 查找一组字母数字字符，后跟 *_*，再后跟一组字母数字字符，后跟 *@*，再后跟一组字母数字字符，最后跟\
    \ .*org*。 |\n\n## 将 Java 与正则表达式集成\n\n到目前为止，你几乎只使用了正则表达式，但并未真正与 Java 结合。现在是时候考虑两者如何交互了。以下示例与前面的示例不同，因为它们将\
    \ Java 代码与正则表达式结合在了一起。它们更全面地展示了如何使用一些 J2SE 正则表达式语法。\n\n你将在此看到的一些正则表达式比之前看到的示例稍微高级一些，因为它们建立在本章迄今讨论的基础之上。例如，清单\
    \ 1-2 将分组与量词结合在了一起。\n\n清单 1-2：MatchPhoneNumber.java\n\n| **![示例开始](img/_1.gif)**\
    \ |\n\n```\nimport java.util.regex.*;\npublic class MatchPhoneNumber{\n   public\
    \ static void main(String args[]){\n      isPhoneValid(args[0]);\n   }\n\n   /**\n\
    \   * 确认给定电话号码的格式是否有效。\n   * @param phone 是一个表示电话号码的字符串。\n   * @returns 如果电话号码格式可接受则返回\
    \ true。\n   */\n   public static boolean isPhoneValid(String phone){\n      boolean\
    \ retval=false;\n\n      String phoneNumberPattern =\n        \"(\\\\d-)?(\\\\\
    d{3}-)?\\\\d{3}-\\\\d{4}\";\n\n      retval= phone.matches(phoneNumberPattern);\n\
    \n      // 准备一条指示成功或失败的消息\n      String msg = \"   不匹配: 模式:\" + phone\n      \
    \       + \"\\r\\n             正则: \" + phoneNumberPattern;\n\n      if (retval){\n\
    \      msg = \"   匹配   : 模式:\" + phone\n          + \"\\r\\n             正则: \"\
    \ + phoneNumberPattern;\n      }\n\n      System.out.println(msg +\"\\r\\n\");\n\
    \      return retval;\n   }\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n\
    如果这些模式现在对你来说不完全清晰，请不要气馁。随着你继续阅读本书，你会逐渐形成直观的理解。请专注于这些概念，并熟悉 Java 代码与正则表达式如何相辅相成。\n\
    \n要充分利用以下示例，你只需要了解两点信息：\n\n*   任何以 **\\** 分隔的正则表达式元字符在 Java 代码中使用时，都需要再次进行转义。因此，***\\\
    d*** 在 Java 代码中变为 ***\\\\d***，***\\s*** 变为 ***\\\\s***。相应地，更复杂的表达式如 ***(\\d-)?(\\\
    d{3}-)?\\d{3}-\\d{4}\\s*** 在 Java 代码中变为 ***(\\\\d-)?(\\\\d{3}-)?\\\\d{3}-\\\\\
    d{4}\\\\s***。所有 ***\\*** 字符在用于 String 对象时都需加倍以产生 ***\\\\***。\n\n*   在本书中，当我单独讨论正则表达式本身时，我不使用双重转义机制。但在处理具体编码示例时，我会使用。\n\
    \n*   `String.matches(String regex)` 方法是添加到 String 类中的一个新方法。它将调用该方法的字符串与给定的正则表达式\
    \ `regex` 进行比较，如果正则模式*完全*匹配该字符串，则返回 true。完全匹配意味着所讨论的字符串不能包含任何未被正则模式涵盖的字符——甚至包括换行符和空格等不可见字符。\n"
- fmt: "### Confirming Phone Number Formats Example\n\nThe code in [Listing 1-2](#LiB0009.html#ch01list02)\
    \ simply determines if the given phone number meets the criteria of being well\
    \ formatted. It takes advantage of two metacharacters introduced in [Table 1-6](#LiB0008.html#69).\
    \ Specifically it uses range, `{n,m}`, indicating that the previous character\
    \ or class must be repeated at least `n` times and no more than `m` times. It\
    \ also uses the character, indicating the previous character or class must be\
    \ present zero or one time.\n\nThe pattern as a whole checks for seven digits\
    \ preceded by optional country and area codes. [Output 1-2](#LiB0009.html#ch01ex02)\
    \ shows the result of running the program, and [Table 1-19](#LiB0009.html#ch01table19)\
    \ dissects the pattern.\n\n**Table 1-19: The Pattern `(\\d-)?(\\d{3}-)?\\d{3}-\\\
    d{4}`**\n\n| **Regex** | **Description** |\n| --- | --- |\n| `(` | A group consisting\
    \ of |\n| `\\d` | A digit |\n| `-` | Followed by a hyphen (-) |\n| `)` | The end\
    \ of this group |\n| `?` | Look for zero or one of the preceding |\n| `(` | Followed\
    \ by a group consisting of |\n| `\\d` | A digit |\n| `{` | Repeated at least |\n\
    | `3` | Three times |\n| `}` | End repetition |\n| `-` | Followed by a hyphen\
    \ |\n| `)` | The end of this group |\n| `?` | Look for zero or one of the preceding\
    \ |\n| `\\d` | Followed by a digit |\n| `{` | Repeated at least |\n| `3` | Three\
    \ times |\n| `}` | End repetition |\n| `-` | Followed by a hyphen |\n| `\\d` |\
    \ Followed by a digit |\n| `{` | Repeated at least |\n| `4` | Four times |\n|\
    \ `}` | End repetition |\n| * **In English:** Look for a single digit followed\
    \ by a hyphen. This is optional. Then, look for three digits followed by a hyphen.\
    \ This is also optional. Next, look for three digits, followed by a hyphen, followed\
    \ by four digits. |\n\n**Output 1-2: Result of Running `MatchPhoneNumber.java`**\n\
    \n| **![Start example](_1.gif)** |\n\n```\nC:\\RegEx\\Examples\\chapter1>java\
    \ MatchPhoneNumber \"1-999-111-2222\"\n   MATCH  : pattern:1-999-111-2222\n  \
    \          regex: (\\d-)?(\\d{3}-)?\\d{3}-\\d{4}\n\nC:\\RegEx\\Examples\\chapter1>java\
    \ MatchPhoneNumber \"999-111-2222\"\n   MATCH   : pattern:999-111-2222\n     \
    \        regex: (\\d-)?(\\d{3}-)?\\d{3}-\\d{4}\n\nC:\\RegEx\\Examples\\chapter1>java\
    \ MatchPhoneNumber \"1-111-2222\"\n   MATCH   : pattern:1-111-2222\n         \
    \    regex: (\\d-)?(\\d{3}-)?\\d{3}-\\d{4}\n\nC:\\RegEx\\Examples\\chapter1>java\
    \ MatchPhoneNumber \"111-2222\"\n   MATCH   : pattern:111-2222\n             regex:\
    \ (\\d-)?(\\d{3}-)?\\d{3}-\\d{4}\n\nC:\\RegEx\\Examples\\chapter1>java MatchPhoneNumber\
    \ \"1.999-111-2222\"\n   NO MATCH: pattern:1.999-111-2222\n             regex:\
    \ (\\d-)?(\\d{3}-)?\\d{3}-\\d{4}\n\nC:\\RegEx\\Examples\\chapter1>java MatchPhoneNumber\
    \ \"999 111-2222\"\n   NO MATCH: pattern:999 111-2222\n             regex: (\\\
    d-)?(\\d{3}-)?\\d{3}-\\d{4}\n\nC:\\RegEx\\Examples\\chapter1>java MatchPhoneNumber\
    \ \"1 111 2222\"\n   NO MATCH: pattern:1 111 2222\n             regex: (\\d-)?(\\\
    d{3}-)?\\d{3}-\\d{4}\n\nC:\\RegEx\\Examples\\chapter1>java MatchPhoneNumber \"\
    111-JAVA\"\n   NO MATCH: pattern:111-JAVA\n             regex: (\\d-)?(\\d{3}-)?\\\
    d{3}-\\d{4}\n```\n\n| **![End example](_1.gif)** |\n\n---\n\n### Confirming Zip\
    \ Codes Example\n\nThe code in [Listing 1-3](#LiB0009.html#ch01list03) determines\
    \ if the zip code meets the criterion of being well formatted. It checks for five\
    \ digits optionally followed by a hyphen and four digits. [Output 1-3](#LiB0009.html#ch01ex03)\
    \ shows the result of running the program. [Table 1-20](#LiB0009.html#ch01table20)\
    \ dissects the pattern.\n\n**Table 1-20: The Pattern `\\d{5}(-\\d{4})?`**\n\n\
    | **Regex** | **Description** |\n| --- | --- |\n| `\\d` | A digit |\n| `{` | Repeated\
    \ at least |\n| `5` | Five times |\n| `}` | End repetition |\n| `(` | Open group\
    \ |\n| `-` | Consisting of a hyphen |\n| `\\d` | A digit |\n| `{` | Repeated at\
    \ least |\n| `4` | Four times |\n| `}` | End repetition |\n| `)` | The end of\
    \ this group |\n| `?` | Look for zero or one of the preceding |\n| * **In English:**\
    \ Look for five digits, optionally followed by a hyphen and four digits. |\n\n\
    **Listing 1-3: `MatchZipCodes.java`**\n\n| **![Start example](_1.gif)** |\n\n\
    ```java\nimport java.util.regex.*;\nimport java.io.*;\n\npublic class MatchZipCodes{\n\
    \   public static void main(String args[]){\n      isZipValid(args[0]);\n   }\n\
    \n   /**\n   * Confirms that the format for the given zip code is valid.\n   *\
    \ @param zip is a String representing the zip code.\n   * @returns true if the\
    \ zip code format is acceptable.\n   */\n   public static boolean isZipValid(String\
    \ zip){\n      boolean retval=false;\n      String zipCodePattern = \"\\\\d{5}(-\\\
    \\d{4})?\";\n      retval = zip.matches(zipCodePattern);\n\n      //prepare a\
    \ message indicating success or failure\n      String msg = \"   NO MATCH: pattern:\"\
    \ + zip\n             + \"\\r\\n             regex: \" + zipCodePattern;\n\n \
    \     if (retval){\n      msg = \"   MATCH   : pattern:\" + zip\n          + \"\
    \\r\\n             regex: \" + zipCodePattern;\n      }\n\n      System.out.println(msg\
    \ +\"\\r\\n\");\n      return retval;\n   }\n}\n```\n\n| **![End example](_1.gif)**\
    \ |\n\n**Output 1-3: Result of Running `MatchZipCodes.java`**\n\n| **![Start example](_1.gif)**\
    \ |\n\n```\nC:\\RegEx\\Examples\\chapter1>java MatchZipCodes \"45643-4443\"\n\
    \   MATCH  : pattern:45643-4443\n            regex: \\d{5}(-\\d{4})?\n\nC:\\RegEx\\\
    Examples\\chapter1>java MatchZipCodes \"45643\"\n   MATCH   : pattern:45643\n\
    \             regex: \\d{5}(-\\d{4})?\n\nC:\\RegEx\\Examples\\chapter1>java MatchZipCodes\
    \ \"443\"\n   NO MATCH: pattern:443\n             regex: \\d{5}(-\\d{4})?\n\n\
    C:\\RegEx\\Examples\\chapter1>java MatchZipCodes \"45643-44435\"\n   NO MATCH:\
    \ pattern:45643-44435\n             regex: \\d{5}(-\\d{4})?\n\nC:\\RegEx\\Examples\\\
    chapter1>java MatchZipCodes \"45643 44435\"\n   NO MATCH: pattern:45643 44435\n\
    \             regex: \\d{5}(-\\d{4})?\n```\n\n| **![End example](_1.gif)** |"
