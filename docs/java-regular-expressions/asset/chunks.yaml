  trans: "\n### public int end(int group)\n\n与 start(int) 方法类似，此方法允许你指定你感兴趣的匹配中的哪个子组。它返回匹配字符序列的最后一个索引加\
    \ 1。清单 2-12 简要演示了 end(int) 方法的用法。\n\n清单 2-12：Matcher.end(int) 示例\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\nimport java.util.regex.*;\n/**\n * 演示 Matcher.end(int) 方法的用法\n */\n\
    public class MatcherEndParamExample{\n  public static void main(String args[]){\n\
    \      test();\n  }\n  public static void test(){\n     //创建一个 Pattern\n     \
    \ Pattern p = Pattern.compile(\"B(on)d\");\n     //创建一个 Matcher 并使用 Matcher.start(int)\
    \ 方法\n     String candidateString = \"My name is Bond. James Bond.\";\n     //为输出创建一个辅助索引\n\
    \     String matchHelper[] =\n                             {\"               ^\"\
    ,\n                              \"              ^\",\n                      \
    \        \"                           ^\",\n                              \" \
    \                         ^\"};\n     Matcher matcher = p.matcher(candidateString);\n\
    \     //找到第一个 'B(ond)' 的结束点\n      matcher.find();\n      int endIndex = matcher.end(0);\n\
    \      System.out.println(candidateString);\n      System.out.println(matchHelper[0]\
    \ + endIndex);\n\n//找到第一个子组 (ond) 的结束点\n      int nextIndex = matcher.end(1);\n\
    \      System.out.println(candidateString);\n      System.out.println(matchHelper[1]\
    \ + nextIndex);\n\n//找到第二个 'B(ond)' 的结束点\n      matcher.find();\n      endIndex\
    \ = matcher.end(0);\n      System.out.println(candidateString);\n      System.out.println(matchHelper[2]\
    \ + endIndex);\n\n//找到第二个子组 (ond) 的结束点\n      nextIndex = matcher.end(1);\n  \
    \    System.out.println(candidateString);\n      System.out.println(matchHelper[3]\
    \ + nextIndex);\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n在下面的示例中，正则表达式模式是\
    \ ***B(on)d***，这意味着模式中包含一个子组。在首次调用 find() 后，Matcher 已检查的区域在下图所示的方框中高亮显示：\n\n![](img/fig101_01.jpg)\n\
    \n通过调用 end(0) 方法，你实际上是仅针对已解析的区域（即上图中的方框区域）调用它。就当前 Matcher 而言，这个方框区域是我们目前唯一可以讨论的区域。\n\
    \nend(0) 方法返回 group(0) 中最后一个字符的索引加 1。请记住，group(0) 是整个表达式 ***B(on)d***。在此区域中，最后一个字符是\
    \ *Bond* 中的 *d*，其位置为 14。由于 end(int) 会将该最后一个索引加 1，因此返回 15。group(0) 在下图中用圆圈标出：\n\
    \n![](img/fig101_02.jpg)\n\n类似地，当你调用 end(1) 时，你也是仅针对已解析的区域（同样是方框区域）调用它。这次，你请求的是该区域中的第二个分组。end(1)\
    \ 方法返回 group(1) 中最后一个字符的索引加 1。group(1) 中的最后一个字符是 *Bond* 中的 *n*，因为模式是 ***B(on)d***，并且该\
    \ *n* 的索引是 13。由于 end 会将索引加 1，因此返回 14。group(1) 在下图中用圆圈标出：\n\n![](img/fig101_03.jpg)\n\
    \n接下来，你再次调用 matcher.find()，这会导致候选字符串的一个新区域被纳入考虑，如下所示：\n\n![](img/fig102_01.jpg)\n\
    \n调用 end(0) 方法隐式地仅针对已解析的新区域（即上图中的方框区域）调用它。end(0) 方法返回 group(0) 中最后一个字符的索引加 1，该字符是\
    \ *Bond* 中的 *d*。*d* 的索引是 26，由于 end 会将该数字加 1，因此返回 27。group(0) 在下图中用圆圈标出：\n\n![](img/fig102_02.jpg)\n\
    \n调用 end(1) 仅考虑已解析的新区域——同样是方框区域。这次，你请求的是已解析区域中的第二个分组。end(1) 方法返回 group(1) 中最后一个字符的索引加\
    \ 1。该最后一个字符是 *Bond* 中的 *o*，其索引为 25，如下图所示。由于 end(int) 会将该数字加 1，因此返回 26。调用 group(1)\
    \ 的结果如下：\n\n![](img/fig102_03.jpg)\n\n在阅读清单 2-12 时，请根据需要参考前面的图片。该清单只是你刚刚经历的步骤的一个完整工作示例。\n\
    \n输出 2-7 显示了运行清单 2-12 的输出。\n\n输出 2-7：Matcher.end(int) 示例的输出\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\nMy name is Bond. James Bond.\n              ¹⁵\nMy name is Bond. James\
    \ Bond.\n             ¹⁴\nMy name is Bond. James Bond.\n                     \
    \     ²⁷\nMy name is Bond. James Bond.\n                         ²⁶\n```\n\n|\
    \ **![结束示例](img/_1.gif)** |\n\n|  |\n\n如果你执行另一个 find() 方法\n\n```\nmatcher.find();\n\
    ```\n\n然后执行 end()\n\n```\nint nonIndex = matcher.end(0); //抛出 IllegalStateException\n\
    ```\n\n如果 find 方法不成功或最初未被调用，则 end(int) 方法将抛出 IllegalStateException。类似地，如果你尝试引用一个不存在的组号，它将抛出\
    \ IndexOutOfBoundsException。\n\n### public String group()\n\n在对抗混乱代码的战争中，group\
    \ 方法可以成为一个强大且便捷的工具。它简单地返回与原始正则表达式模式匹配的候选字符串的子串。例如，假设你想从候选字符串 *My name is Bond.\
    \ James Bond.* 中提取模式 ***Bond*** 的出现\n\n```\nPattern p = Pattern.compile(\"Bond\"\
    );\n```\n\n。你提取 Matcher\n\n```\nMatcher matcher = p.matches(\"My name is Bond.\
    \ James Bond.\");\n```\n\n并对其调用 find()。\n\n```\nMatcher.find(); \n```\n\n现在，下图中方框区域已准备好供\
    \ Matcher 仔细检查：\n\n![](img/fig105_01.jpg)\n\n你现在可以使用 group() 方法提取候选字符串中符合你条件的部分：\n\
    \n```\nString tmp = matcher.group(); \\\\返回 \"Bond\";\n```\n\n此方法提取所考虑区域中匹配的部分。该区域在下图中用圆圈标出：\n\
    \n![](img/fig105_02.jpg)\n\n实现相同结果的一种更笨拙的方法是使用 start 和 end 方法找到候选字符串中该组的起始和结束索引，然后使用\
    \ String.substring 方法提取该文本。\n\n如果 find() 方法不成功或最初从未被调用，则 group() 方法将抛出 IllegalStateException。清单\
    \ 2-13 提供了此方法及所讨论算法的完整工作示例。\n\n清单 2-13：Matcher.group() 方法\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\nimport java.util.regex.*;\n/**\n * 演示 Matcher.group() 方法的用法\n */\n\
    public class MatcherGroupExample{\n  public static void main(String args[]){\n\
    \      test();\n  }\n  public static void test(){\n      //创建一个 Pattern\n    \
    \  Pattern p = Pattern.compile(\"Bond\");\n\n      //创建一个 Matcher 并使用 Matcher.group()\
    \ 方法\n      String candidateString = \"My name is Bond. James Bond.\";\n     \
    \ Matcher matcher = p.matcher(candidateString);\n      //提取该组\n      matcher.find();\n\
    \      System.out.println(matcher.group());\n  }\n} \n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n"
- fmt: "### `public String group(int group)`\n\nThis method is a more powerful counterpart\
    \ to the `group()` method. It allows you to extract parts of a candidate `String`\
    \ that match a subgroup within your pattern. The use of the `group(int)` method\
    \ is demonstrated shortly in [Listing 2-14](#LiB0016.html#ch02list14).\n\n**Listing\
    \ 2-14: `Matcher.group(int)` Method Example**\n\n```\nimport java.util.regex.*;\n\
    /**\n * Demonstrates the usage of the\n * Matcher.group(int) method\n */\npublic\
    \ class MatcherGroupParamExample{\n  public static void main(String args[]){\n\
    \      test();\n  }\n  public static void test(){\n     //create a Pattern\n \
    \     Pattern p = Pattern.compile(\"B(ond)\");\n\n//create a Matcher and use the\
    \ Matcher.group(int) method\n     String candidateString = \"My name is Bond.\
    \ James Bond.\";\n     //create a helpful index for the sake of output\n     Matcher\
    \ matcher = p.matcher(candidateString);\n     //Find group number 0 of the first\
    \ find\n      matcher.find();\n      String group_0 = matcher.group(0);\n    \
    \  String group_1 = matcher.group(1);\n      System.out.println(\"Group 0 \" +\
    \ group_0);\n      System.out.println(\"Group 1 \" + group_1);\n      System.out.println(candidateString);\n\
    \n//Find group number 1 of the second find\n      matcher.find();\n      group_0\
    \ = matcher.group(0);\n      group_1 = matcher.group(1);\n      System.out.println(\"\
    Group 0 \" + group_0);\n      System.out.println(\"Group 1 \" + group_1);\n  \
    \    System.out.println(candidateString);\n  }\n} \n```\n\nIn the following example,\
    \ the regex pattern is again `B(ond)`, which means you have a subgroup within\
    \ the pattern. The portion the candidate parsed when `find()` is called for the\
    \ first time is shown here:\n\n![](fig106_01.jpg)\n\nThus, when you call the `group(0)`\
    \ method, you're implicitly calling it only for the region that has already been\
    \ parsed, which is boxed in the preceding image. As far as the `Matcher` is currently\
    \ concerned, this boxed region is the only one we can discuss.\n\nCalling `group(0)`\
    \ returns `Bond` because that's the first group that matches your criteria in\
    \ the region of the candidate `String` currently under inspection. Again, that\
    \ area is shown in the box in the preceding image. The actual matching group is\
    \ shown in the following image:\n\n![](fig106_02.jpg)\n\nSimilarly, when you call\
    \ `group(1)`, you're calling it only for the region that has already been parsed—again,\
    \ the boxed area. This time, you're asking for the second grouping in the parsed\
    \ region. `group(1)` is circled in the following image:\n\n![](fig106_03.jpg)\n\
    \nNext, you call `matcher.find()` again, which results in a new region of the\
    \ candidate `String` coming under inspection, as shown here:\n\n![](fig106_04.jpg)\n\
    \nCalling the `group(0)` method implicitly calls it only for the new region that\
    \ has already been parsed, which is boxed in the preceding image. The `group(0)`\
    \ method returns the `String` `Bond`. `group(0)` is circled in the following image:\n\
    \n![](fig106_05.jpg)\n\nCalling `group(1)` only considers the new region that\
    \ been parsed—again, the boxed region. Within that region, `group(1)` refers to\
    \ `ond`. `group(1)` is circled in the following image:\n\n![](fig106_06.jpg)\n\
    \n[Listing 2-14](#LiB0016.html#ch02list14) presents an example using the `group(int)`\
    \ method, and [Output 2-8](#LiB0016.html#ch02ex08) shows the output of this example.\n\
    \n**Output 2-8: Output of the `Matcher.Group(int)` Example**\n\n```\nMy name is\
    \ Bond. James Bond.\nGroup 0 Bond\nGroup 1 ond\nMy name is Bond. James Bond.\n\
    Group 0 Bond\nGroup 1 ond\n```\n\nIf you execute another `find()` method\n\n```\n\
    matcher.find();\n```\n\nand then execute `group(0)`\n\n```\nString tmp = matcher.group(0);\
    \ //throws IllegalStateException\n```\n\nthe `group(0)` method will throw an `IllegalStateException`\
    \ because the `find` method call wasn't successful. Similarly, it will throw an\
    \ `IllegalStateException` if `find` hadn't been called at all. If you try to refer\
    \ to a group number that doesn't exist, it will throw an `IndexOutOfBoundsException`.\n\
    \n### `public int groupCount()`\n\nThis method simply returns the number of groups\
    \ that the `Pattern` defined. In [Listing 2-15](#LiB0016.html#ch02list15), the\
    \ `groupCount` method displays the number of possible groups a given pattern might\
    \ have.\n\n**Listing 2-15: `MatcherGroupCountExample` Example**\n\n```\nimport\
    \ java.util.regex.*;\n/**\n * Demonstrates the usage of the\n * Matcher.groupCount()\
    \ method\n */\npublic class MatcherGroupCountExample{\n  public static void main(String\
    \ args[]){\n     test();\n  }\n  public static void test(){\n      //create a\
    \ Pattern\n      Pattern p = Pattern.compile(\"B(ond)\");\n\n      //create a\
    \ Matcher and use the Matcher.group() method\n      String candidateString = \"\
    My name is Bond. James Bond.\";\n      Matcher matcher = p.matcher(candidateString);\n\
    \n      //extract the possible number of groups.\n      //It's important to be\
    \ aware that this\n      //represents only the number of groups that\n      //are\
    \ possible: not the actual number of groups\n      //found in the candidate string\n\
    \      int numberOfGroups = matcher.groupCount();\n      System.out.println(\"\
    numberOfGroups =\"+numberOfGroups);\n  }\n}\n```\n\nThere's a very important,\
    \ and somewhat counterintuitive, subtlety to notice about this method. It returns\
    \ the number of possible groups based on the original `Pattern`, without even\
    \ considering the candidate `String`. Thus, it's not really information about\
    \ the `Matcher` object; rather, it's information about the `Pattern` that helped\
    \ spawn it. This can be tricky, because the fact that this method lives on the\
    \ `Matcher` object could be interpreted to mean that it's providing feedback about\
    \ the state of the `Matcher`. It just isn't. It's telling you how many matches\
    \ are theoretically possible for the given `Pattern`.\n\n### `public boolean matches()`\n\
    \nThis method is designed to help you match a candidate `String` against the `Matcher`'s\
    \ `Pattern`. It returns `true` if—and only if—the candidate `String` under consideration\
    \ matches the pattern exactly.\n\n[Listing 2-16](#LiB0016.html#ch02list16) demonstrates\
    \ how you might use this method. Three strings, `j2se`, `J2SE`, and `J2SE` (notice\
    \ the space after the `E`), are compared to the `Pattern` `J2SE`.\n\n**Listing\
    \ 2-16: `Matcher.matches` Example**\n\n```\n import java.util.regex.*;\n/**\n\
    \ * Demonstrates the usage of the\n * Matcher.matches method\n */\npublic class\
    \ MatcherMatchesExample{\n  public static void main(String args[]){\n      test();\n\
    \  }\n  public static void test(){\n     //create a Pattern\n      Pattern p =\
    \ Pattern.compile(\"J2SE\");\n\n     //create the candidate Strings\n     String\
    \ candidateString_1 = \"j2se\";\n     String candidateString_2 = \"J2SE \";\n\
    \     String candidateString_3 = \"J2SE\";\n\n     //Attempt to match the candidate\
    \ Strings.\n     Matcher matcher_1 = p.matcher(candidateString_1);\n     Matcher\
    \ matcher_2 = p.matcher(candidateString_2);\n     Matcher matcher_3 = p.matcher(candidateString_3);\n\
    \n     //display the output for first candidate\n     String msg = \":\" + candidateString_1\
    \ + \": matches?: \";\n     System.out.println(msg + matcher_1.matches());\n\n\
    \     //display the output for second candidate\n     msg = \":\" + candidateString_2\
    \ + \": matches?: \";\n     System.out.println(msg + matcher_2.matches());\n\n\
    \     //display the output for third candidate\n     msg = \":\" + candidateString_3\
    \ + \": matches?: \";\n     System.out.println(msg + matcher_3.matches());\n \
    \ }\n}\n```\n\nOnly one of the three candidates successfully matches here. `j2se`\
    \ is rejected because it is the wrong case. `J2SE` is again rejected because it\
    \ contains a space character after the `E`, which means that it isn't a perfect\
    \ match. The only perfect match is `J2SE`."
