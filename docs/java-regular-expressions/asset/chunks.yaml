    \ *t* 字符之后）来测试一下。你的第二个选择是使用一个像下面这样的简短方法，它总是有效的：/*** 确认或否认正则表达式* 作为候选字符串的一部分存在。*\
    \ @param the -code-String-/code- 候选字符串* @param the -code-String-/code- 子串模式* @return\
