    s?)){2,3}*\n\n| **正则表达式** | **描述** |\n| --- | --- |\n| ( | 一个组，包含 |\n| \\p{Upper}\
    \ | 一个大写字符 |\n| ( | 后跟一个内部组，包含 |\n| \\p{Lower} | 一个小写字符 |\n| + | 重复一次或多次 |\n|\
    \ \\s? | 后跟一个可选的空格 |\n| ) | 内部组结束 |\n| ) | 外部组结束 |\n| { | 重复至少 |\n| 2 | 两次 |\n\
    | , | 但不超过 |\n| 3 | 三次 |\n| } | 重复结束 |\n| * **中文释义：** 查找两个或三个单词，每个单词以大写字母开头，后跟任意数量的小写字母。每个单词后面可以跟一个空格。\
