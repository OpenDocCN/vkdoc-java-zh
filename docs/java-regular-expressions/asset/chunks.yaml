    \ NY 64332\nregexLength:\n ^(\\p{Upper}(\\p{Lower}+\\s?)){2,3}\\w+ .*, \\w+ \\\
    d{5}(-\\d{4})?$\n\nC:\\RegEx\\chapter_1\\Examples\\chapter1>\njava MatchAddress\
