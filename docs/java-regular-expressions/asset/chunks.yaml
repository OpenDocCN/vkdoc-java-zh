  trans: "\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n从这个例子中自然会引出几个问题：\n\n*   *为什么 John\
    \ Q Public 会失败？* 因为 *Q* 不是一个名称标记，根据你对名称标记的定义（即一个大写字母后跟一个或多个小写字母）。\n\n*   *为什么\
    \ John allen Smith 会失败？* 因为 *allen* 不是以大写字母开头。\n\n*   *为什么 John 会失败？* 尽管 *John*\
    \ 是一个有效的名称标记，但它没有重复出现两到三次。它仅仅是一个名称标记。\n\n*   *为什么 John McGee 会通过？* *McGee* 并非一个大写字母后跟任意数量的小写字母。*请尝试自己解决这个问题。答案在本章末尾的“常见问题解答”部分给出。\n\
    \n这个例子使用了本章开头提到的组合技术。也就是说，它使用了先前定义的模式来组合成一个新模式。仔细想想，这是一种非常工程化的做法：构建小模块，然后使用这些模块来构建更复杂的部分。\n\
    \n### 确认地址示例\n\n代码清单 1-6 中的代码仅用于判断给定的地址是否符合格式良好的标准。它利用了之前创建的名称和邮政编码模式，并添加了自己的地址模式。输出\
    \ 1-6 显示了运行程序的结果。表 1-23 对该模式进行了剖析。\n\n表 1-23：模式 *^(\\p{Upper}(\\p{Lower}+\\s?)){2,3}\\\
    w+ .*, \\w+ \\d{5}(-\\d{4})?$*\n\n| **正则表达式** | **描述** |\n| --- | --- |\n| ^ |\
    \ 行首，后跟 |\n| ( | 一个组，包含 |\n| \\p{Upper} | 一个大写字符 |\n| ( | 后跟一个内部组，包含 |\n| \\p{Lower}\
    \ | 一个小写字符 |\n| + | 重复一次或多次 |\n| \\s? | 后跟一个可选的空格 |\n| ) | 内部组结束 |\n| ) | 外部组结束\
    \ |\n| { | 至少重复 |\n| 2 | 两次 |\n| , | 但不超过 |\n| 3 | 三次 |\n| <space> | 后跟一个空格 |\n\
    | \\w | 后跟任意字母数字字符 |\n| + | 重复一次或多次 |\n| <space> | 后跟一个空格 |\n| . | 后跟任意字符 |\n\
    | * | 重复任意次数 |\n| , | 后跟一个逗号 |\n| <space> | 后跟一个空格 |\n| \\w | 后跟任意字母数字字符 |\n|\
    \ + | 重复一次或多次 |\n| <space> | 后跟一个空格 |\n| \\d | 后跟一个数字 |\n| { | 至少重复 |\n| 5 | 五次\
    \ |\n| } | 重复结束 |\n| ( | 开始一个组 |\n| - | 包含一个连字符 |\n| \\d | 一个数字 |\n| { | 至少重复\
    \ |\n| 4 | 四次 |\n| } | 重复结束 |\n| ) | 该组结束 |\n| ? | 查找零个或一个前面的元素 |\n| * **用英语解释：**\
    \ 查找一个先前定义的名称标记，后跟一些单词、一个逗号，然后是更多单词，最后跟一个邮政编码。这个例子使用了组合技术。 |\n\n代码清单 1-6：MatchAddress.java\n\
    \n| **![开始示例](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\nimport java.io.*;\n\
    \npublic class MatchAddress{\n    public static void main(String args[]){\n  \
    \      isAddressValid(args[0]);\n    }\n\n/**\n    * 确认给定地址的格式是否有效。\n    * @param\
    \ addr 是表示地址的字符串\n    * @returns 如果邮政编码格式可接受则返回 true。\n    */\n    public static\
    \ boolean isAddressValid(String addr){\n       boolean retval = false;\n\n//使用之前创建的名称模式。\n\
    \       String nameToken =\"\\\\p{Upper}(\\\\p{Lower}+\\\\s?)\";\n\nString namePattern\
    \ = \"(\"+nameToken+\"){2,3}\";\n\n//使用之前创建的邮政编码模式。\n       String zipCodePattern\
    \ = \"\\\\d{5}(-\\\\d{4})?\";\n\n//构建一个地址模式\n      String addressPattern = \"\
    ^\" + namePattern\n         + \"\\\\w+ .*, \\\\w+ \" + zipCodePattern +\"$\";\n\
    \nretval= addr.matches(addressPattern);\n\n//准备一条指示成功或失败的消息\n      String msg\
    \ = \"NO MATCH\\npattern:\\n \" + addr\n         + \"\\nregexLength:\\n \"\n \
    \        + addressPattern;\n\nif (retval){\n      msg = \"MATCH\\npattern:\\n\
    \ \" + addr\n         + \"\\nregexLength:\\n \"\n         + addressPattern;\n\
    \      }\n      System.out.println(msg +\"\\r\\n\");\n      return retval;\n \
    \  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n输出 1-6：运行 MatchAddress.java\
    \ 的结果\n\n| **![开始示例](img/_1.gif)** |\n\n```\nC:\\RegEx\\chapter_1\\Examples\\\
    chapter1>\njava MatchAddress \"John Smith 888 Luck Street,\nNY 64332\"\nMATCH\n\
    pattern:\n John Smith 888 Luck Street, NY 64332\nregexLength:\n ^(\\p{Upper}(\\\
    p{Lower}+\\s?)){2,3}\\w+ .*, \\w+ \\d{5}(-\\d{4})?$\n\nC:\\RegEx\\chapter_1\\\
    Examples\\chapter1>\njava MatchAddress \"John A. Smith 888 Luck Stree\nt, NY 64332-4453\"\
    \nNO MATCH\npattern:\n John A. Smith 888 Luck Street, NY 64332-4453\nregexLength:\n\
    \ ^(\\p{Upper}(\\p{Lower}+\\s?)){2,3}\\w+ .*, \\w+ \\d{5}(-\\d{4})?$\n\nC:\\RegEx\\\
    chapter_1\\Examples\\chapter1>\njava MatchAddress \"John Allen Smith 888 Luck\
    \ Street, NY 64332-4453\"\nMATCH\npattern:\n John Allen Smith 888 Luck Street,\
    \ NY 64332-4453\nregexLength:\n ^(\\p{Upper}(\\p{Lower}+\\s?)){2,3}\\w+ .*, \\\
    w+ \\d{5}(-\\d{4})?$\n\nC:\\RegEx\\chapter_1\\Examples\\chapter1>\njava MatchAddress\
    \ \"888 Luck Street, NY 64332\"\nNO MATCH\npattern:\n 888 Luck Street, NY 64332\n\
    regexLength:\n ^(\\p{Upper}(\\p{Lower}+\\s?)){2,3}\\w+ .*, \\w+ \\d{5}(-\\d{4})?$\n\
    C:\\RegEx\\chapter_1\\Examples\\chapter1>\njava MatchAddress \"P.O. BOX 888 Luck\
    \ Street, NY 64332-4453\"\nNO MATCH\npattern:\n P.O. BOX 888 Luck Street, NY 64332-4453\n\
    regexLength:\n ^(\\p{Upper}(\\p{Lower}+\\s?)){2,3}\\w+ .*, \\w+ \\d{5}(-\\d{4})?$\n\
    \nC:\\RegEx\\chapter_1\\Examples\\chapter1>\njava MatchAddress \"John Allen Smith\
    \ 888 Luck st., NY\"\nNO MATCH\npattern:\n John Allen Smith 888 Luck st., NY\n\
    regexLength:\n^(\\p{Upper}(\\p{Lower}+\\s?)){2,3}\\w+ .*, \\w+ \\d{5}(-\\d{4})?$\n\
    ```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n"
- fmt: "### Finding Duplicate Words Example\n\nI discussed the code in [Listing 1-7](#LiB0009.html#ch01list07)\
    \ in the \"[Groups and Back References](#LiB0008.html#91)\" section earlier. The\
    \ point in reintroducing it here is to demonstrate how regular expressions actually\
    \ interact with Java code.\n\n**Listing 1-7:** `MatchDuplicateWords.java`\n\n\
    ```\nimport java.util.regex.*;\nimport java.io.*;\n\npublic class MatchDuplicateWords{\n\
    \   public static void main(String args[]){\n      hasDuplicate(args[0]);\n  \
    \ }\n\n/**\n   * Confirms that given phrase avoids duplicate words.\n   * @param\
    \ phrase is a String representing the phrase.\n   * @returns true if the phrase\
    \ avoids duplicate\n   * words.\n   */\n   public static boolean hasDuplicate(String\
    \ phrase){\n      boolean retval=false;\n\nString duplicatePattern =\n      \"\
    \\\\b(\\\\w+) \\\\1\\\\b\";\n      // Compile the pattern\n      Pattern p = null;\n\
    \      try{\n        p = Pattern.compile(duplicatePattern);\n      }\n      catch\
    \ (PatternSyntaxException pex){\n         pex.printStackTrace();\n         System.exit(0);\n\
    \      }\n      //count the number of matches.\n      int matches = 0;\n\n//get\
    \ the matcher\n      Matcher m = p.matcher(phrase);\n      String val=null;\n\n\
    //find all matching Strings\n      while (m.find()){\n         retval = true;\n\
    \        val = \":\" + m.group() +\":\";\n        System.out.println(val);\n \
    \       matches++;\n      }\n\n//prepare a message indicating success or failure\n\
    \      String msg = \"   NO MATCH: pattern:\" + phrase\n             + \"\\r\\\
    n             regex: \"\n             + duplicatePattern;\n\nif (retval){\n  \
    \    msg = \" MATCH     : pattern:\" + phrase\n          + \"\\r\\n         regex:\
    \ \"\n          + duplicatePattern;\n      }\n\nSystem.out.println(msg +\"\\r\\\
    n\");\n      return retval;\n   }\n} \n```\n\nAs you read this example, notice\
    \ that it uses a `Pattern` and `Matcher`, and not the `String.matches(regex)`\
    \ method, as most of the examples in the previous sections have. Try to guess\
    \ why this approach has been taken. For the answer, look in the \"[FAQs](#LiB0013.html#184)\"\
    \ section at the end of this chapter. [Output 1-7](#LiB0009.html#ch01ex07) shows\
    \ the result of running the program. The pattern is dissected in [Table 1-24](#LiB0009.html#ch01table24).\n\
    \n**Table 1-24:** The Pattern `\\b(\\w+) \\1\\b`\n\n| **Regex** | **Description**\
    \ |\n| --- | --- |\n| `\\b` | A word boundary |\n| `(` | Followed by a group consisting\
    \ of |\n| `\\w` | An alphanumeric or underscore character |\n| `+` | Repeated\
    \ one or more times |\n| `)` | Close group |\n| `<space>` | Followed by a space\
    \ |\n| `\\1` | Followed by the exact group of characters captured previously |\n\
    | `\\b` | Followed by a word boundary |\n| * **In English:** Look for a word boundary,\
    \ followed by a group of alphanumeric characters, followed by a space, followed\
    \ by the *exact same group of alphanumeric characters found previously,* followed\
    \ by a word boundary. In short, look for duplicate words. |\n\n**Output 1-7:**\
    \ Result of Running `MatchDuplicateWords.java`\n\n```\nC:\\RegEx\\Examples\\chapter1>java\
    \ MatchDuplicateWords \"pizza pizza\"\n:pizza pizza:\n   MATCH   : pattern:pizza\
    \ pizza\n             regex: \\b(\\w+) \\1\\b\n\nC:\\RegEx\\Examples\\chapter1>java\
    \ MatchDuplicateWords \"Faster pussycat kill kill\"\n:kill kill:\n   MATCH   :\
    \ pattern:Faster pussycat kill kill\n             regex: \\b(\\w+) \\1\\b\n\n\
    C:\\RegEx\\Examples\\chapter1>java MatchDuplicateWords \"The mayor of of simpleton\"\
    \n:of of:\n   MATCH   : pattern:The mayor of of simpleton\n             regex:\
    \ \\b(\\w+) \\1\\b\n\nC:\\RegEx\\Examples\\chapter1>java MatchDuplicateWords \"\
    Never Never Never Never Never\"\n:Never Never:\n:Never Never:\n   MATCH   : pattern:Never\
    \ Never Never Never Never\n             regex: \\b(\\w+) \\1\\b\n\nC:\\RegEx\\\
    Examples\\chapter1>java MatchDuplicateWords \"222 2222\"\n   NO MATCH: pattern:222\
    \ 2222\n             regex: \\b(\\w+) \\1\\b\n\nC:\\RegEx\\Examples\\chapter1>java\
    \ MatchDuplicateWords \"sara sarah\"\n   NO MATCH: pattern:sara sarah\n      \
    \       regex: \\b(\\w+) \\1\\b\n\nC:\\RegEx\\Examples\\chapter1>java MatchDuplicateWords\
    \ \"Faster pussycat kill, kill\"\n   NO MATCH: pattern:Faster pussycat kill, kill\n\
    \             regex: \\b(\\w+) \\1\\b\n\nC:\\RegEx\\Examples\\chapter1>java MatchDuplicateWords\
    \ \". .\"\n   NO MATCH: pattern:. .\n             regex: \\b(\\w+) \\1\\b\n```\n\
    \n## Regular Expression Operations\n\nIn this section, you'll explore slightly\
    \ more realistic uses of regular expressions. In the practical world, people use\
    \ regular expressions for one of three basic broad categories:\n\n*   **Data validation:**\
    \ This is the process of making sure that your candidate `String` conforms to\
    \ a specific format (e.g., making sure passwords are at least eight characters\
    \ long and contain at least two digits).\n\n*   **Search and/or replace:** This\
    \ is another popular usage of regular expressions, and for good reason. Say you\
    \ want to send a letter to all of your customers, and you want each letter to\
    \ be personalized by interspersing the customer's name throughout the letter.\
    \ Of course, this is a little more complex than it sounds, because different names\
    \ have different lengths, and you don't want to overwrite the next word in your\
    \ letter when you insert a longer name. Regex is a perfect solution for these\
    \ types of problems.\n\n*   **Decomposing text:** This can also be a challenging\
    \ activity, particularly if the `String` in question needs to be split according\
    \ to complex rules. Fortunately, doing so becomes much easier with regular expressions,\
    \ as [Listing 1-11](#LiB0010.html#ch01list11) (which follows shortly) demonstrates.\n\
    \n### Data Validation\n\nData validation, or making sure that data matches a prescribed\
    \ format, is one of the most common uses for regular expressions. This can be\
    \ particularly challenging because data often takes inexact forms and is defined\
    \ by unspoken rules.\n\nJ2SE 1.4 offers you several ways to validate data. The\
    \ easiest is using the new method `boolean String.matches(String regex)`. This\
    \ method confirms that the pattern passed in *exactly* matches the `String` that\
    \ it's called on.\n\nThis exactness can be tricky, so it's important to understand\
    \ it well. For example, say you need to confirm that a given `String` contains\
    \ the word *Java*, followed by space, followed by some digit. Further, assume\
    \ that your candidate `String` is `I love Java 4`. The [next section](#LiB0010.html#ch01lev2sec18)\
    \ demonstrates the process of working through this example."
