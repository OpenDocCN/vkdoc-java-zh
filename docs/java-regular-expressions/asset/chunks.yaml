- fmt: '# Table A-9: Logical Operators


    | `Regex` | Description | Notes |

    | --- | --- | --- |

    | `XY` | *X* followed by *Y* | This is the default relationship assumption between
    characters. Note that spaces are a valid part of this syntax. Thus, `A B` means
    the character *A*, followed by a space, followed by the character *B*. |

    | `X\|Y` | Either *X* or *Y* | `AB\|CD` will match either *AB* or *CD*. Similarly,
    the pattern `hello sir\|madam` will match *hello sir* or it will match *madam*.
    Specifically, it won''t match *hello madam*. This is because of the nature of
    the And pattern discussed previously. When the regex engine sees *hello sir*,
    it assumes you mean that *hello*, followed by a space, followed by *sir* should
    be treated as a single logical unit. These are all Anded together. Then the engine
    sees the Or pattern, so it assumes that the logical alternative is *madam*. If
    you actually want to accept *hello sir* or *hello madam*, you''ll have to use
    groups—thus, the pattern `hello (sir\|madam)`. Or better yet, you can use the
    noncapturing group `hello (?:sir\|madam)`. |

    | `(X)` | *X*, the capturing group | A capturing group is a logical unit that
    is conceptually similar to the logical units you''re familiar with from algebra.
    Thus, `(\d\d\d\d)` is a capturing group that defines four digits. Capturing groups
    can be referred to later in your expression by using a back reference, as explained
    later. They''re counted left to right and can be nested. Thus, `h(ello (world))`
    has three capturing groups. Capturing group 0 is the entire expression, which
    matches the String *hello world*. Capturing group 1 is *ello world*, because you
    count from left to right, and the first group starts with the `(` right before
    the *e* in *hello*. Group 2 is *world*, because the second group starts right
    before the *w* in *world*. |

    | `\n` | The *n*th capturing group matched | In this context, I''m not referring
    to newline, even though `\n` looks like the newline symbol. The `n` in this case
    refers to a number. The regex engine allows you to access the information captured
    by a previous part of the group, even as the search is executing. For example,
    if you want to find repeated words, all you need is the pattern `(\w+)\W\1`, which
    says, "Look for a group of word characters, followed by a nonword character, followed
    by that exact same word character captured in group 1." If you attempt to refer
    to a group that doesn''t exist, a `PatternSyntaxException` will be thrown. If
    you happen to have, say, 13 captured groups, then `\13` will mean that you want
    the thirteenth capturing group. If you don''t have 13 groups, then the same expression
    `\13` will mean the first capturing group, followed by the digit *3*. |


    # Table A-10: Quotation


    | `Regex` | Description | Notes |

    | --- | --- | --- |

    | `\` | Quotes the following character | This quotes the metacharacter that follows,
    so it will actually be treated as a character. Thus, if you were looking for a
    dollar sign, you would use `\$` as the pattern. By contrast, `$` would have matched
    the end-of-line character. Remember that for regex expressions used directly as
    Strings, you need to double the number of `\` characters you see. Thus, in a Java
    String, `\s` becomes `\\s`. |

    | `\Q` | Quotes all characters until `\E` | This works in conjunction with `\E`
    to quote a sequence of characters. If you need to quote a lot of characters in
    sequence, then use `\Q` to open your quote and `\E` to close it. For example,
    if you want the characters `\([?`, the expression `\Q\(?*\E` will do the job.
    |

    | `\E` | Ends quote started by `\Q` |  |


    # Table A-11: Noncapturing Group Constructs


    | `Regex` | Description | Notes |

    | --- | --- | --- |

    | `(?:X)` | Defines a subpattern as a logical unit | Noncapturing groups don''t
    store the information that actually matches the pattern for later access. These
    are much more efficient than capturing groups if you''re only using grouping for
    logical purposes. This pattern is noncapturing. |

    | `(?idmsux-idmsux)` | *i* for `CASE_INSENSITIVE` *x* for `COMMENTS` *s* for `DOTALL`
    *u* for `UNICODE_CASE` *m* for `MULTILINE` *d* for `UNIX_LINES` | The pattern
    `(?i)hel(?-i)LO` will match the String *HELLO*, because `(?i)` indicates a case-insensitive
    match starting from `h`, and `(?-i)` signals an end to that case insensitivity
    after the first `l`. This pattern is noncapturing. |

    | `(?idmsux-idmsux:X)` | *X*, with the given flags on or off | The pattern `(?i:hel)LO`
    will match the String *HELLO*, because `(?i:` indicates a case-insensitive match
    starting from `h` and ending with the first `l`. This pattern is noncapturing.
    |


    # Table A-12: Lookarounds


    | `Regex` | Description | Notes |

    | --- | --- | --- |

    | `(?=X)` | *X*, using zero-width positive lookahead | This pattern glances to
    the right of whatever remains to be parsed from the candidate String to find the
    first position at which the expression *X* exists. For example, if you want to
    extract all of the inline comments from a text file, you might try the pattern
    `(?=//).*$` and extract group 0. This pattern is noncapturing. |

    | `(?!X)` | *X*, using zero-width negative lookahead | This pattern glances to
    the right, to whatever remains to be parsed from the candidate String, to find
    the first position at which the expression *X* doesn''t exist. For example, if
    you want to skip leading spaces leading up to some content, you could use `(?!\s).*`.
    This pattern is noncapturing. |

    | `(?<=X)` | *X*, using zero-width positive lookbehind | This pattern glances
    to the left, to whatever remains to be parsed from the candidate String, to find
    the first position at which the expression *X* exists. For example, if you want
    to extract all of the inline comments from a text file, you might try the pattern
    `(?=//).*$`. This pattern is noncapturing. |

    | `(?<!X)` | *X*, using zero-width negative lookbehind | This pattern glances
    to the left, to whatever remains to be parsed from the candidate String, to find
    the first position at which the expression *X* doesn''t occur. For example, if
    you want to extract all of the text before inline Java comments from a text file,
    you might try the pattern `.*(?<=//)`. This pattern is noncapturing. |

    | `(?>X)` | *X*, as an independent, noncapturing group | This pattern refuses
    to release the contents of the match, regardless of the consequences on the rest
    of the pattern''s ability to match. Thus, whereas the pattern `\w+\d` matches
    the String *java2*, the pattern `(?>\w+)\d` does not, because the `(?>\w+)` consumes
    *java* and *2*, and refuses to release the *2* so that `\d` can match. |


    # Table A-13: Less Common Characters


    | `Regex` | Description | Notes |

    | --- | --- | --- |

    | `\0n` | The character with octal value *on* | 0 <= n <= 7 |

    | `\0nn` | The character with octal value *onn* | 0 <= n <= 7 |

    | `\0mnn` | The character with octal value *0mnn* | 0 <= m <= 3, 0 <= n <= 7 (This
    can''t exceed 377.) |

    | `\xhh` | The character with hexadecimal value *0xhh* | 0 <= h <= 9 or A<=h <=F
    |

    | `\uhhhh` | The character with hexadecimal value *0xhhhh* | 0 <= h <= 9 or A<=h
    <=F |

    | `\a` | The alert (bell) character (`''\u0007''`) |  |

    | `\e` | The escape character (`''\u001B''`) |  |

    | `\cx` | The control character corresponding to *x* |  |


    # Table A-14: Unicode Blocks and Categories'
