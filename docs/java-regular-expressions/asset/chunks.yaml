  trans: "\n### public static Pattern compile(String regex) 抛出 PatternSyntaxException\n\
    \n你会注意到 Pattern 类没有公共构造方法。这意味着你*不能*编写如下代码：\n\n```\nPattern p = new Pattern(\"\
    my regex\");//错误！\n```\n\n要获取 Pattern 对象的引用，你必须使用静态方法 compile(String regex)。因此，你的第一行正则表达式代码可能如下所示：\n\
    \n```\nPattern p = Pattern.compile(\"my regex\");//正确！\n```\n\n该方法的参数是一个表示正则表达式的字符串。当你将一个字符串传递给期望正则表达式的方法时，务必通过在每个\
    \ *\\* 字符后附加另一个 *\\* 字符来转义正则表达式中可能存在的任何 *\\* 字符。这是因为 String 对象内部使用 *\\* 字符来转义字符序列中的元字符，无论这些字符序列是否是正则表达式。早在正则表达式成为\
    \ Java 的一部分之前，情况就是如此。因此，正则表达式 ***\\d*** 变成了 ***\\\\d***。要匹配单个数字，你的正则表达式变成如下形式：\n\
    \n```\nPattern p = Pattern.compile(\"\\\\d\");\n```\n\n这里的关键点是，正则表达式 ***\\d***\
    \ 变成了字符串 ***\\\\d***。\n\n字符串参数的转义有时可能很棘手，因此充分理解这一点很重要。总的来说，这意味着你需要*加倍*正则表达式中可能已经存在的\
    \ *\\* 字符。它*并不*意味着你只需简单地附加一个 *\\* 字符。我稍后会提供一个例子来说明这一点。\n\n如果正则表达式本身格式错误，compile\
    \ 方法将抛出 java.util.regex.PatternSyntaxException。例如，如果你传入一个包含 ***4*** 的字符串，compile\
    \ 方法会在运行时抛出 PatternSyntaxException，因为正则表达式 ***[4*** 的语法是非法的，如[清单 2-1 所示。\n\n清单\
    \ 2-1：使用 compile 方法\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\n\
    \npublic class DelimitTest{\n  public static void main(String args[]){\n\n   \
    \ //抛出异常\n    Pattern p = Pattern.compile(\"4\");\n  }\n}\n```\n\n| **![结束示例**\
    \ ||  |这是否意味着每次使用正则表达式时都必须捕获 PatternSyntaxException？不。PatternSyntaxException 不必显式捕获，因为它继承自\
    \ RuntimeException，而 RuntimeException 不需要显式捕获。compile(String regex) 方法返回一个 Pattern\
    \ 对象。### public static Pattern compile(String regex, int flags) 抛出 PatternSyntaxException(String\
    \ regex, int flags) 方法是 compile(String) 方法的一种更强大的形式。该方法的第一个参数 regex 是一个表示正则表达式的字符串，详情如前文所述。关于如何格式化\
    \ String 参数的详细信息，请参阅“public static Pattern compile(String regex) 抛出 PatternSyntaxException”一节。该\
    \ compile 方法的灵活性通过使用第二个参数 int flags 得以充分体现。int flags 参数可以包含以下标志，或通过 OR 运算组合这些标志创建的位掩码：*\
    \   CANON_EQ*   CASE_INSENSTIVE*   COMMENTS*   DOTALL*   MULTILINE*   UNICODE_CASE*\
    \   UNIX_LINES 例如，如果你希望无论候选字符串的大小写如何都能匹配成功，那么你的模式可能如下所示：``` Pattern p = Pattern.compile(regex,Pattern.CASE_INSENSITIVE);```你可以使用\
    \ | 运算符组合这些标志。例如，要实现包含注释的、不区分大小写的 Unicode 匹配，你可以使用以下代码：```Pattern p =Pattern.compile(\"\
    t # 复合标志示例\",Pattern.CASE_INSENSITIVE | Pattern.UNICODE_CASE|Pattern.COMMENT);```compile(String\
    \ regex, int flags) 方法返回一个 Pattern 对象。### public String pattern()此方法返回已编译正则表达式的简单字符串表示。它有时可能在两个方面产生误导。首先，返回的字符串不反映编译模式时设置的任何标志。其次，你传入的正则表达式字符串并不总是你取回的模式字符串。具体来说，原始的字符串转义不会被显示。因此，如果你的原始代码如下：```Pattern\
    \ p = Pattern.compile(\"\\\\d\");```你应该期望输出是 ***\\d***，带有一个单独的 ***\\*** 字符。这里自然会产生一个问题：如果此方法去掉了原始的转义，你能将结果字符串作为正则表达式提供给另一个表达式吗？例如，清单\
    \ 2-2 能工作吗？清单 2-2：模式匹配示例| **![开始示例](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\n\
    \npublic class PatternMethodExample{\n  public static void main(String args[]){\n\
    \      reusePatternMethodExample();\n  }\n\n   public static void reusePatternMethodExample(){\n\
    \      //匹配单个数字\n      Pattern p = Pattern.compile(\"\\\\d\");\n      Matcher\
    \ matcher = p.matcher(\"5\");\n      boolean isOk = matcher.matches();\n     \
    \ System.out.println(\"原始模式匹配结果 \" + isOk);\n\n      //重用模式\n      String tmp\
    \ = p.pattern();\n      Pattern p2 = Pattern.compile(tmp);\n      matcher = p.matcher(\"\
    5\");\n      isOk = matcher.matches();\n      System.out.println(\"第二个模式匹配结果 \"\
    \ + isOk);\n   }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n此方法会抛出 RuntimeException\
    \ 吗？毕竟，pattern() 方法返回 ***\\d***，而尝试使用 ***\\d*** 作为字符串创建正则表达式模式将会编译失败。\n\n答案是不会，它不会抛出异常。请记住，加倍\
    \ ***\\*** 字符是 String 对象构造方法的要求——它与该字符串所表示的正则表达式模式无关。因此，一旦字符串被创建，冲突就消失了。\n\n###\
    \ public Matcher matcher(CharSequence input)\n\n请记住，你通过编译你要查找内容的描述来创建一个 Pattern\
    \ 对象。Pattern 有点像一则个人广告：它列出了你要寻找的事物的特征。纯粹从概念上讲，你的模式可能如下所示：\n\n```\nPattern p =\
    \ Pattern.compile(\"她必须有红头发和火爆脾气\");\n```\n\n相应地，你需要将该描述与候选对象进行比较。也就是说，你需要检查一个给定的字符串，看它是否与你提供的描述匹配。\n\
    \nMatcher 对象就是专门为帮助你进行这种查询而设计的。我将在本章下一节详细讨论 Matcher，但现在你应该知道，Pattern.matcher(CharSequence\
    \ input) 方法返回一个 Matcher，它将帮助你获取关于候选字符串与你传入的描述相比如何的详细信息。\n\nPattern.matcher(CharSequence\
    \ input) 接受一个 CharSequence 参数作为输入参数。CharSequence 是 J2SE 1.4 中引入的一个新接口，并由 String\
    \ 对象回溯实现。由于 String 实现了 CharSequence，你可以简单地将一个 String 对象作为参数传递给 Pattern.matcher(CharSequence\
    \ input) 方法。我稍后将详细讨论 CharSequence 参数。\n\n在前面的例子中，再次纯粹从概念上讲，你可以如下获取你的 Matcher 对象：\n\
    \n```\nMatcher m = pattern.matches(\"Anna\");\n```\n\n在 J2SE 中，这个 Matcher 对象的\
    \ matches() 方法将返回 true。在现实生活中，结果可能因人而异。\n"
- fmt: "### `public int flags()`\n\nEarlier I discussed the constant flags that you\
    \ can use in compiling your regex pattern. The `flags()` method simply returns\
    \ an `int` that represents those flags. For example, to see whether your `Pattern`\
    \ class is currently using a given flag (say, the `Pattern.COMMENTS` flag), simply\
    \ extract the flag:\n\n```\nint flgs = myPattern.flags();\n```\n\nthen \"and\"\
    \ (`&`) that flag to the `Pattern.COMMENTS` flag:\n\n```\nboolean isUsingCommentFlag\
    \ =( Pattern.COMMENTS == (Pattern.COMMENTS & flgs)) ;\n```\n\nSimilarly, to see\
    \ if you're using the `CASE_INSENSITIVE` flag, use the following code:\n\n```\n\
    boolean isUsingCaseInsensitiveFlag =\n(Pattern.CASE_INSENSITIVE == (Pattern. CASE_INSENSITIVE\
    \ & flgs));\n```\n\n### `public static boolean matches (String regex, CharSequence\
    \ input)`\n\nVery often, you'll find that all you need to know about a `String`\
    \ is whether it matches a given regular expression exactly. You don't want to\
    \ have to create a `Pattern` object, extract its `Matcher` object, and interrogate\
    \ that `Matcher`.\n\nThis static utility method is designed to do exactly that.\
    \ Internally, it creates the `Pattern` and `Matcher` objects you need, compares\
    \ the regex to the input `String`, and returns a `boolean` that tells you whether\
    \ the two match exactly. [Listing 2-3](#LiB0015.html#ch02list03) presents an example\
    \ of its use.\n\n**Listing 2-3: Matches Example**\n\n```\nimport java.util.regex.*;\n\
    public class PatternMatchesTest{\n  public static void main(String args[]){\n\n\
    \      String regex = \"ad*\";\n      String input = \"add\";\n\n      boolean\
    \ isMatch = Pattern.matches(regex,input);\n      System.out.println(isMatch);//return\
    \ true\n  }\n}\n```\n\nIf you're going to do a lot of comparisons, then it's more\
    \ efficient to explicitly create a `Pattern` object and do your matches manually.\
    \ However, if you aren't going to do a lot of comparisons, then `matches()` is\
    \ a handy utility method.\n\nThe `Pattern.matches(String regex, CharSequence input)`\
    \ method is also used internally by the `String` class. As of J2SE 1.4, `String`\
    \ has a new method called `matches()` that internally defers to the `Pattern.matches()`\
    \ method. You might already be using this method without being aware of it.\n\n\
    Of course, this method can throw a `PatternSyntaxException` if the regex pattern\
    \ under consideration isn't well formed.\n\n### `public String[] split(CharSequence\
    \ input)`\n\nThis method can be particularly helpful if you need to break up a\
    \ `String` into an array of substrings based on some criteria. In concept, it's\
    \ similar to the `StringTokenizer`, but it's much more powerful and more resource\
    \ intensive than `StringTokenizer` because it allows your program to use regular\
    \ expressions as the splitting criteria.\n\nThis method always returns at least\
    \ one element. If the split candidate, `input`, can't be found, then a `String`\
    \ array is returned that contains exactly one `String`—namely, the original `input`.\n\
    \nIf the `input` can be found, then a `String` array is returned. That array contains\
    \ every substring after an occurrence of the `input`. Thus, for the pattern\n\n\
    ```\nPattern p = new Pattern.compile(\",\");\n```\n\nthe `split()` method for\
    \ *Hello, Dolly* will return a `String` array consisting of two elements. The\
    \ first element of the array will contain *Hello*, and the second will contain\
    \ *Dolly*. That `String` array is obtained as follows:\n\n```\nString tmp[] =\
    \ p.split(\"Hello,Dolly\");\n```\n\nIn this case, the value returned is\n\n```\n\
    //tmp is equal to { \"Hello\", \"Dolly\"}\n```\n\nYou should be aware of some\
    \ subtleties when you work with this method. If the candidate `String` had been\
    \ *Hello,Dolly,* with a trailing comma character after the *y* in *Dolly* then\
    \ this method would still have returned a two-element `String` array consisting\
    \ of *Hello* and *Dolly*. The implicit behavior is that trailing spaces aren't\
    \ returned.\n\nIf the input `String` had been *Hello,,,Dolly* the resulting `String`\
    \ array would have had four elements. The return value of the `split()` method,\
    \ as applied to the pattern, is\n\n```\n// p.split(\"Hello,,,Dolly\")  returns\
    \ {\"Hello\",\"\",\"\",\"Dolly\"} \n```\n\n[Listing 2-4](#LiB0015.html#ch02list04)\
    \ provides an example in which the `split()` method is used to split a `String`\
    \ into an array based on a single space character.\n\n**Listing 2-4: Pattern Splitting\
    \ Example**\n\n```\nimport java.util.regex.*;\npublic class PatternSplitExample{\n\
    \  public static void main(String args[]){\n      splitTest();\n  }\n\npublic\
    \ static void splitTest(){\n\nPattern p =\n    Pattern.compile(\" \");\n    String\
    \ tmp = \"this is the String I want to split up\";\n\nString[] tokens = p.split(tmp);\n\
    \nfor (int i=0; i<tokens.length; i++){\n       System.out.println(tokens[i]);\n\
    \    }\n\n}\n}\n```\n\nOf course, this is a misuse of the method: You could have\
    \ used a `StringTokenizer` to achieve the same result, and it would have been\
    \ less resource intensive. In light of what you now know, consider [Listing 2-5](#LiB0015.html#ch02list05),\
    \ which is a slightly modified version of [Listing 1-12](#LiB0010.html#176) from\
    \ [Chapter 1](#LiB0005_split_000.html#33) in that it uses the `Pattern.split()`\
    \ method. [Output 2-1](#LiB0015.html#ch02fig01) shows the result of running the\
    \ program.\n\n**Listing 2-5: PatternSplit.java**\n\n```\nimport java.util.regex.*;\n\
    \npublic class PatternSplit{\n  public static void main(String args[]){\n\nString\
    \ statement = \"I will not compromise. I will not \"+\n      \"cooperate. There\
    \ will be no concession, no conciliation, no \"+\n      \"finding the middle ground,\
    \ and no give and take.\";\n\nString tokens[] =null;\n      String splitPattern=\
    \ \"compromise|cooperate|concession|\"+\n      \"conciliation|(finding the middle\
    \ ground)|(give and take)\";\n\nPattern p = Pattern.compile(splitPattern);\n\n\
    tokens=p.split(statement);\n\nSystem.out.println(\"REGEX PATTERN:\\n\"+splitPattern\
    \ + \"\\n\");\n\nSystem.out.println(\"STATEMENT:\\n\"+statement + \"\\n\");\n\n\
    System.out.println(\"TOKENS:\");\n      for (int i=0; i < tokens.length; i++){\n\
    \      System.out.println(tokens[i]);\n      }\n  }\n}\n```\n\n**Output 2-1: Result\
    \ of Running PatternSplit.java**\n\n```\nC:\\RegEx\\code\\chapter1>java Split\n\
    REGEX PATTERN:\ncompromise|cooperate|concession|conciliation|(finding the middle\
    \ group)|(give\nand take)\n\nSTATEMENT:\nI will not compromise. I will not cooperate.\
    \ There\nwill be no concession, no conciliation,\nno finding the middle group,\
    \ and no give and take.\n\nTOKENS:\nI will not\n. I will not\n. There will be\
    \ no\n, no\n, no\n, and no\n.\n```\n\nYou'll notice that [Listing 2-5](#LiB0015.html#ch02list05)\
    \ uses the `Pattern.split()` method, whereas [Listing 1-12](#LiB0010.html#176)\
    \ uses the new `String.split()` method. In effect, the two are identical because\
    \ the `String.split()` method simply defers to this method internally.\n\nWhat\
    \ you've done is really quite amazing and might have been ridiculously convoluted\
    \ without regular expressions. You're actually using complicated artificial constructs—namely,\
    \ English language synonyms—to decompose text. This isn't your father's J2SE.\n\
    \n> **Note:** The `String` method further optimizes its search criteria by placing\
    \ an invisible `^` before the pattern and a `$` after it.\n\n### `public String[]\
    \ split(CharSequence input, int limit)`\n\nThis method works in exactly the same\
    \ way that `Pattern.split(CharSequence input)` does, except for one variation.\
    \ The second parameter, `limit`, allows you to control how many elements are returned,\
    \ as shown in the following sections."
