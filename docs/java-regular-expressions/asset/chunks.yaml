- fmt: "# Overview\n\n> *“Creativity is allowing yourself to make mistakes. Art is\
    \ knowing which ones to keep.”*\n> \n> — Scott Adams\n\nIn this chapter, I provide\
    \ some suggestions for using regular expressions in the context of a fully object-oriented\
    \ language such as Java. This can, and often should, be a different experience\
    \ than in more procedural languages, because Java offers a different toolset.\
    \ This chapter covers when to use the `java.util.regex` package, when not to use\
    \ it, and when to complement the `java.util.regex` package with other Java features.\n\
    \nRegular expressions, as formulated in Java, have a lot in common with the principles\
    \ that guide Java Database Connectivity (JDBC). JDBC uses a generic descriptive\
    \ language, Structured Query Language (SQL), for describing and manipulating information,\
    \ whereas the `java.util.regex` package uses regular expressions. SQL provides\
    \ a general `Command` object to “compile” that description, just as regex uses\
    \ the `Pattern` object. SQL provides a `ResultSet` to return the results of that\
    \ search, whereas regex uses a `Matcher`. The general pattern of use in both JDBC\
    \ and the regex package is similar. Namely, both provide a generic description,\
    \ compile it in one object, and examine the results in another object.\n\nIt only\
    \ makes sense to take advantage of the relevant lessons from JDBC programming\
    \ when you work with regex in Java. The combination of JDBC and general Java principles\
    \ that I’ve found to be useful are as follows:\n\n- Optimize your connections.\n\
    - Batch reads and writes.\n- Store your patterns externally.\n- Compile your `Pattern`\
    \ as you need to.\n- Don’t limit yourself to a regex solution.\n\n## Optimize\
    \ Your Connections\n\nWhen you work with regular expressions, use `FileChannel`s\
    \ over other means of accessing a file. That is, instead of using a `RandomAccessFile`,\
    \ a `FileInputStream`, or a `FileOutputStream`, gain access to your file using\
    \ a `FileChannel`.\n\nAlthough a detailed discussion of `FileChannel`s is beyond\
    \ the scope of this book, I do want to briefly touch upon them. `FileChannel`s\
    \ are Java’s latest effort at high-performance file input/output (I/O), and they\
    \ seem to be very successful. Under the covers, they’re optimized for whatever\
    \ operating system you happen to be on, so they’re at least as fast and efficient\
    \ as their `java.io.*` counterparts—as a matter of fact, they’re often much faster.\
    \ They also offer tools such as `FileLock`s, the ability to position anywhere\
    \ in the file, the ability to read and write concurrently, and the ability to\
    \ map directly to memory buffers.\n\n| Note | `FileChannel`s also interact better\
    \ with `Thread`s, but that’s a completely different topic that’s beyond the scope\
    \ of this discussion. |\n\n`FileChannel`s work by reading data at the byte level\
    \ and storing it into a `ByteBuffer`. Thus, the code to read the contents of a\
    \ file by using a `FileChannel` might look like [Listing 4-1](#LiB0034.html#ch04list01).\
    \ To learn more about `ByteBuffer`s and `Channel`s in general, please consult\
    \ Sun’s documentation.\n\n**Listing 4-1: Using FileChannels to Access a File**\n\
    \n```\nimport java.io.*;\nimport java.nio.*;\nimport java.nio.channels.*;\n\n\
    /**\n* Provides an easy mechanism for extracting the regex contents\n* of a file\n\
    */\npublic class FileChannelExample{\n    public static void main(String args[])\
    \ throws IOException{\n        //open a connection to the source code for this\n\
    \        //class\n        FileInputStream fis =\n        new FileInputStream(\"\
    FileChannelExample.java\");\n        //get a file channel\n        FileChannel\
    \ fc = fis.getChannel();\n\n        //create a ByteBuffer that is large enough\n\
    \        //and read the contents of the file into it\n        ByteBuffer bb =\
    \ ByteBuffer.allocate((int)fc.size());\n\n        fc.read(bb);\n        bb.flip();\n\
    \n        //save the content of the file as a String\n        String fileContent=\
    \ new String(bb.array());\n\n        //release the FileChannel\n        fc.close();\n\
    \        fc = null;\n\n        //write out the contents of this file\n       \
    \ System.out.println(\"fileContent = \" + fileContent);\n    }\n}\n```\n\nThe\
    \ process is very simple and offers a great many advantages over conventional\
    \ file access. Basically, you open obtain a `FileChannel`, read its content into\
    \ a `ByteBuffer` or one of its child classes, and then examine that buffer. This\
    \ is fairly easy to follow in [Listing 4-1](#LiB0034.html#ch04list01), because\
    \ the relevant sections of the code appear in bold. As you can see, if you need\
    \ to, you can easily convert that data into a `String`. The advantages you’re\
    \ most concerned with here, of course, relate to speed and memory usage, but there\
    \ are lot of other, nonregex reasons to use `FileChannel`s.\n\n## Batch Reads\
    \ and Writes\n\nAnother important connection issue is the willingness to read\
    \ the entire contents of a file into memory while you work. Although this principle\
    \ can sometimes backfire with extremely large files, I’ve found that it generally\
    \ works out well for me. The most expensive part of your operations is often going\
    \ to be the I/O transaction time. It may be imminently reasonable to trade memory\
    \ for I/O usage, and thus save repeated I/O calls, depending on your situation.\n\
    \nGenerally speaking, I’ve found that I’m better off reading the content into\
    \ memory, manipulating it there, and then writing it back to the file as I need\
    \ to. I’ve found this more efficient than reading a bit of a file, making some\
    \ changes, writing those out, reading more of the file, and so on.\n\n| Note |\
    \ If I’m working with very large files, I’ve sometimes found it necessary to ignore\
    \ the preceding advice and actually read parts of the data at a time. That’s because\
    \ a pattern can easily describe a section that might require a match at the beginning\
    \ of the file as well as the end, thus potentially requiring you to keep the entire\
    \ file in memory. With extremely large files, this is simply not possible. In\
    \ these sorts of scenarios, I’ll optimize my expressions to the best of my ability\
    \ and apply them a section at a time. If that’s not sufficient, I’ll write a custom\
    \ Java program that’s uniquely designed to parse the specific file. The first\
    \ pass might look for the opening sequence, the second pass might look within\
    \ that section for a submatch, and so on. |"
