    \n### public boolean matches(String regex)\n\n`String.matches` 方法可能是你最常使用的正则表达式方法。它只是将给定的字符串与一个候选正则表达式进行比较，如果两者在正则表达式意义上*完全*匹配，则返回\
    \ `true`。例如，对于字符串\n\n```\nString num = \"4\";\n```\n\n将 *4* 与表示单个数字的 ***\\d***\
    \ 进行比较，将返回 `true`：\n\n```\nnum.matches(\"\\\\d\");\\\\返回 true\n```\n\n然而，将 *4*（即\
    \ *4* 后跟一个空格）与数字 ***\\d*** 进行比较，将返回 `false`。类似地，将 *4*（即 *4* 后面没有空格）与 ***\\d***（即一个数字后跟一个空格）进行比较，也将返回\
    \ `false`。\n\n这里的要点是，当你使用此方法时，*必须小心，确保正则表达式完整地描述了整个* String *，并且没有描述任何不属于该* String\
    \ *的内容*。即使是一个空格，根据前面的例子，也可能使你的匹配出现偏差。\n\n在幕后，此方法实例化一个 `Pattern` 对象，并简单地传递到前面讨论过的\
    \ `Pattern.matches` 方法。如果你将要执行大量的 `matches` 操作，你可能会发现显式创建 `Pattern` 和 `Matcher`\
    \ 对象并直接使用它们会更高效。\n\n如果传入的正则表达式无效，则此方法将抛出 `PatternSyntaxException` 错误。如果正则表达式为\
    \ `null`，`matches` 将抛出 `NullPointerException`。\n\n### public String replaceFirst\
    \ (String regex, String replacement)\n\n`String.replaceFirst` 方法将正则表达式描述的第一次出现替换为此方法的第二个参数所表示的字符串。因此，对于字符串\
    \ `tmp`\n\n```\nString tmp = \"I want to eat 5 hamburgers, 7 days a week\";\n\
    ```\n\n命令\n\n```\nString newTmp = tmp.replaceFirst(\"\\d\",\"900\");\n```\n\n\
    将 `newTmp` 设置为 *I want to eat 900 hamburgers, 7 days a week*。\n\n在幕后，此方法实例化 `Pattern`\
    \ 和 `Matcher` 对象，并简单地传递到前面讨论过的 `Matcher.replaceFirst` 方法。如果你将要执行大量的 `replaceFirst`\
    \ 操作，你可能会发现显式创建 `Pattern` 和 `Matcher` 对象并直接使用它们会更高效。\n\n|  | 注意  | 如果你显式创建 `Pattern`\
    \ 和 `Matcher` 对象并直接使用它们，你可能希望通过在适当的位置添加行尾 ***$*** 和行首 ***^*** 字符来优化你的模式。 |\n\n\
    如果传入的正则表达式无效，则此方法将抛出 `PatternSyntaxException` 错误。如果正则表达式为 `null`，`replaceFirst`\
    \ 将抛出 `NullPointerException`。\n"
- fmt: '### `public String replaceAll(String regex, String replacement)`


    `String.replaceAll`方法将字符串中所有与正则表达式`regex`匹配的子串替换为第二个参数`replacement`所表示的字符串。例如，对于字符串`tmp`：


    ```

    String tmp = "I want to eat 5 hamburgers, 7 days a week";

    ```


    执行命令：


    ```

    String newTmp = tmp.replaceAll("\\d","900");

    ```


    会将`newTmp`设置为 *I want to eat 900 hamburgers, 900 days a week*。


    在底层，该方法会实例化`Pattern`和`Matcher`对象，并直接调用之前讨论过的`Matcher.replaceAll`方法。如果你需要执行大量`replaceAll`操作，显式创建`Pattern`和`Matcher`对象并直接使用它们可能会更高效。


    如果传入的正则表达式无效，该方法将抛出`PatternSyntaxException`异常。如果正则表达式为`null`，`replaceFirst`将抛出`NullPointerException`。


    ### `public boolean split(String regex)`


    当你需要根据某些条件将字符串拆分为子字符串数组时，此方法特别有用——在概念上，它类似于`StringTokenizer`。然而，它比`StringTokenizer`更强大，资源消耗也更高，因为它允许程序使用正则表达式作为拆分条件。


    此方法始终至少返回一个元素。如果找不到拆分目标`input`，则返回一个仅包含原始输入字符串的字符串数组。如果找到了`input`，则返回一个字符串数组，该数组包含每次出现`input`之后的所有子字符串。


    因此，对字符串 *Hello, Dolly* 调用`split(",")`方法，将返回一个包含两个元素的字符串数组：第一个元素包含 *Hello*，第二个元素包含
    *Dolly*。


    使用此方法时，需要注意一些细节。如果字符串是 *Hello,Dolly,*（在 *Dolly* 的 *y* 后面有一个尾随逗号），该方法仍会返回一个包含两个元素的字符串数组：*Hello*
    和 *Dolly*。其隐含行为是：尾随的空字符串不会被返回。


    如果字符串是 *Hello,,,Dolly*，则生成的字符串数组将有四个元素。对模式`,`应用`split`方法的返回值如下：


    ```

    // "Hello,,,Dolly".split(",") 的结果为 {"Hello","","","Dolly"}

    ```


    在底层，该方法会实例化一个`Pattern`对象，并直接调用之前讨论过的`Pattern.split`方法。如果你需要执行大量`split`操作，显式创建`Pattern`对象并直接使用它可能会更高效。


    如果传入的正则表达式无效，该方法将抛出`PatternSyntaxException`异常。如果正则表达式为`null`，`replaceFirst`将抛出`NullPointerException`。


    ### `public String split(String regex, int limit)`


    此方法返回一个数组，其中包含调用该方法的字符串对象的子字符串。这些子字符串是围绕第一个参数`regex`所描述的正则表达式周围的文本。数组中实际元素的数量由第二个参数`limit`控制。以下部分解释了`limit`不同取值的含义。


    #### `limit == 0`


    如果指定第二个参数`limit`等于`0`，则此方法返回一个包含尽可能多匹配子字符串的数组，并且会丢弃尾随的空字符串。因此，模式：


    ```

    Pattern p = "Hello, Dolly".split(",",0);

    ```


    在对候选字符串 *Hello, Dolly* 进行拆分时，将返回一个包含两个元素的数组。


    类似地，当对 *Hello, Dolly,*（在 *Dolly* 的 *y* 后面有一个尾随逗号）进行拆分时，`split`也会返回两个元素：


    ```

    String tmp[] = "Hello, Dolly,".split(",",0);

    ```


    然而，你可能并不总是需要这种行为。例如，有时你可能希望限制返回的元素数量。


    #### `limit > 0`


    如果你只对一定数量的匹配感兴趣，请使用正数`limit`。你应该使用该数量加 1 作为`limit`。要拆分 *Hello, Dolly, You, Are,
    My, Favorite* 并且只想要前两个标记时，可以这样使用：


    ```

    String[] tmp = "Hello, Dolly, You, Are, My, Favorite".split(",",3);

    ```


    结果字符串的值如下：


    ```

    //tmp[0] 为 "Hello"

    // tmp[1] 为 "Dolly"

    ```


    有趣的是，这里会返回第三个元素：


    ```

    //tmp[2] 为 "You, Are, My, Favorite"

    ```


    使用正数`limit`可能会带来性能提升，因为正则引擎在达到指定匹配次数后可以停止搜索。


    #### `limit < 0`


    使用负数（任何负数）作为`limit`，是告诉正则引擎你想要返回尽可能多的匹配，并且希望返回所有尾随的空字符串（如果有的话）。因此，对于正则模式`,`和候选字符串
    *Hello,Dolly,*，命令：


    ```

    String tmp[] = "Hello,Dolly,".split(",", -1);

    ```


    结果为：


    ```

    //tmp == {"Hello","Dolly",""};

    ```


    然而，对于字符串 *Hello, Dolly,*（在 *Dolly* 后面的逗号后有尾随空格），方法调用：


    ```

    String tmp[] = "Hello,Dolly,    ".split(",", -1);

    ```


    结果为：


    ```

    //tmp 等于 {"Hello","Dolly","    "};

    ```


    请注意，负数`limit`的具体数值无关紧要。因此：


    ```

    p.split("Hello,Dolly", -1);

    ```


    与以下代码完全等价：


    ```

    p.split("Hello,Dolly", -100);

    ```


    在底层，该方法会实例化一个`Pattern`对象，并直接调用之前讨论过的`Pattern.split`方法。如果你需要执行大量`split`操作，显式创建`Pattern`对象并直接使用它可能会更高效。


    如果传入的正则表达式无效，该方法将抛出`PatternSyntaxException`异常。如果正则表达式为`null`，`replaceFirst`将抛出`NullPointerException`。


    ## 总结


    在本章中，我为`Pattern`和`Matcher`类及其方法提供了详细的文档和大量示例。我还讨论了`String`类中新增的正则表达式方法。现在，你应该对这些对象的工作方式以及它们如何协同工作有了更好的理解，并且在处理这些方法时有了参考依据。在[第
    3 章](#LiB0020_split_000.html#336)中，你将学习如何将这些新工具、正则表达式语言和 Java 语言本身整合为一个统一的整体。'
  raw: "### public String replaceAll (String regex, String replacement)\n\nThe String.replaceAll\
    \ method replaces every occurrence of the regex description with the String represented\
    \ by the second parameter of this method. Thus, for the String tmp\n\n```\nString\
    \ tmp = \"I want to eat 5 hamburgers, 7 days a week\";\n```\n\nthe command\n\n\
    ```\nString newTmp = tmp.replaceAll(\"\\d\",\"900\");\n```\n\nsets newTmp to *I*\
    \ *want to eat 900 hamburgers, 900 days a week*.\n\nBehind the scenes, this method\
    \ instantiates Pattern and Matcher objects, and simply makes a pass through to\
    \ the Matcher.replaceAll method discussed earlier. If you're going to be doing\
    \ a lot of replaceAll operations, you'll probably find it more efficient to explicitly\
    \ create Pattern and Matcher objects, and use them directly.\n\nIf the regular\
    \ expression passed in is invalid, then this method will throw a PatternSyntaxException\
    \ error. If the regular expression is null, replaceFirst will throw a NullPointerException.\n\
    \n### public boolean split(String regex)\n\nThis method can be particularly helpful\
    \ if you need to break up a String into an array of substrings based on some criteria—in\
    \ concept, it's similar to the StringTokenizer. However, it's much more powerful\
    \ and more resource intensive than StringTokenizer because it allows your program\
    \ to use a regular expressions as the splitting criteria.\n\nThis method always\
    \ returns at least one element. If the split candidate, input, can't be found,\
    \ then a String array is returned that contains exactly one String— namely, the\
    \ original input. If the input can be found, then a String array is returned.\
    \ That array contains every substring after an occurrence of the input.\n\nThus,\
    \ calling the split(\",\") method on the String *Hello, Dolly*, will return a\
    \ String array consisting of two elements. The first element of the array will\
    \ contain *Hello*, and the second will contain *Dolly*.\n\nThere are some subtleties\
    \ you should be aware of when working with this method. If the String had been\
    \ *Hello,Dolly,* with a trailing comma character after the *y* in *Dolly* then\
    \ this method would still have returned a two-element String array consisting\
    \ of *Hello* and *Dolly*. The implicit behavior is that trailing spaces aren't\
    \ returned.\n\nIf the String had been *Hello,,,Dolly*, then the resulting String\
    \ array would have had four elements. The return value of the split method, as\
    \ applied to the pattern , is as follows:\n\n```\n// \"Hello,,,Dolly\".split()\
    \ is equal to {\"Hello\",\"\",\"\",\"Dolly\"}\n```\n\nBehind the scenes, this\
    \ method instantiates a Pattern object and simply makes a pass through to the\
    \ Pattern.split method discussed earlier. If you're going to be doing a lot of\
    \ split operations, you'll probably find it more efficient to explicitly create\
    \ Pattern objects and use them directly.\n\nIf the regular expression passed in\
    \ is invalid, then this method will throw a PatternSyntaxException error. If the\
    \ regular expression is null, replaceFirst will throw a NullPointerException.\n\
    \n### public String split(String regex, int limit)\n\nThis method returns an array\
    \ containing substrings of the String object it was called on. Those substrings\
    \ are the text surrounding the regex expression described by the first parameter,\
    \ regex. The actual number of elements in the array is controlled by the second\
    \ parameter, limit. The following sections explain what the different values of\
    \ limit can mean.\n\n#### Limit == 0\n\nIf you specify that the second parameter,\
    \ limit, should equal 0, then this method returns an array containing as many\
    \ matching substrings as possible, and trailing spaces are discarded. Thus, the\
    \ pattern\n\n```\nPattern p = \"Hello, Dolly\".split(\",\",0); \n```\n\nwill return\
    \ an array consisting of two elements when split against the candidate *Hello,\
    \ Dolly*.\n\nSimilarly, split will return two elements when matched against *Hello,\
    \ Dolly,* that has a trailing comma after the *y* in *Dolly*:\n\n```\nString tmp[]\
    \ = \"Hello, Dolly,.\".split(\",\",0);\n```\n\nHowever, you may not always want\
    \ this behavior. For example, there may be times when you want to limit the number\
    \ of elements returned.\n\n#### Limit > 0\n\nUse a positive limit if you're interested\
    \ in only a set number of matches. You should use that number plus 1 as the limit.\
    \ To split *Hello, Dolly, You, Are, My, Favorite* when you want only the first\
    \ two tokens, you would use this:\n\n```\nString[] tmp = \"Hello, Dolly, You,\
    \ Are, My, Favorite\".split(\",\",3);\n```\n\nThe value of the resulting String\
    \ is as follows:\n\n```\n//tmp[0] is  \"Hello\"\n// tmp[1] is \"Dolly\";\n```\n\
    \nThe interesting behavior here is that a third element is returned:\n\n```\n\
    //tmp[2] is  \"You, Are, My, Favorite\";\n```\n\nUsing a positive limit can potentially\
    \ lead to performance enhancements, because the regex engine can stop searching\
    \ when it meets the specified number of matches.\n\n#### Limit < 0\n\nUsing a\
    \ negative number—any negative number—for the limit tells the regex engine that\
    \ you want to return as many matches as possible and that you want trailing spaces,\
    \ if any, to be returned. Thus, for the regex pattern , and the candidate *Hello,Dolly,*\
    \ the command\n\n```\nString tmp[] is \"Hello,Dolly\".split(\",\", -1); \n```\n\
    \nresults in\n\n```\n//tmp == {\"Hello\",\"Dolly\"};\n```\n\nHowever, for the\
    \ String *Hello, Dolly,* which has trailing spaces after the comma following *Dolly*,\
    \ the method call\n\n```\nString tmp[] = \"Hello,Dolly,    \".split(\",\", -1);\n\
    ```\n\nresults in\n\n```\n//tmp is equal to {\"Hello\",\"Dolly\",\"    \"};\n\
    ```\n\nNotice that the actual value of the negative limit doesn't matter. Thus\n\
    \n```\np.split(\"Hello,Dolly\", -1);\n```\n\nis exactly equivalent to\n\n```\n\
    p.split(\"Hello,Dolly\", -100);\n```\n\nBehind the scenes, this method instantiates\
    \ a Pattern object and simply makes a pass through to the Pattern.split method\
    \ discussed earlier. If you're going to be doing a lot of split operations, you'll\
    \ probably find it more efficient to explicitly create the Pattern object and\
    \ use it directly.\n\nIf the regular expression passed in is invalid, then this\
    \ method will throw a PatternSyntaxException error. If the regular expression\
    \ is null, replaceFirst will throw a NullPointerException.\n\n## Summary\n\nIn\
    \ this chapter, I provided detailed documentation and numerous examples for the\
    \ Pattern and Matcher classes and their methods. I also discussed the new regex\
    \ methods of the String class. You should now have a better sense of how some\
    \ of these objects work and how they work together, and a point of reference when\
    \ working these methods. In [Chapter 3](#LiB0020_split_000.html#336) you'll learn\
    \ how to integrate these new tools, the regex language, and the Java language\
    \ proper into a unified whole."
