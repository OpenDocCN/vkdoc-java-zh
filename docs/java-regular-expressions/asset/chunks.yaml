    \ input) does, except for one variation. The second parameter, limit, allows you\
    \ to control how many elements are returned, as shown in the following sections."
  trans: "\n### public int flags()\n\n前面我讨论了在编译正则表达式模式时可以使用的常量标志。`flags` 方法只是返回一个代表这些标志的\
    \ `int` 值。例如，要查看你的 `Pattern` 类当前是否使用了某个给定的标志（比如 `Pattern.COMMENTS` 标志），只需提取该标志：\n\
    \n```\nint flgs = myPattern.flags();\n```\n\n然后将该标志与 `Pattern.COMMENTS` 标志进行“与”（&）运算：\n\
    \n```\nboolean isUsingCommentFlag =( Pattern.COMMENTS == (Pattern.COMMENTS & flgs))\
    \ ;\n```\n\n类似地，要查看你是否使用了 `CASE_INSENSITIVE` 标志，可以使用以下代码：\n\n```\nboolean isUsingCaseInsensitiveFlag\
    \ =\n(Pattern.CASE_INSENSITIVE == (Pattern. CASE_INSENSITIVE & flgs));\n```\n\n\
    ### public static boolean matches (String regex,CharSequence input)\n\n很多时候，你只需要知道一个字符串是否完全匹配给定的正则表达式。你不想创建一个\
    \ `Pattern` 对象，提取它的 `Matcher` 对象，然后再询问那个 `Matcher`。\n\n这个静态实用方法正是为此而设计的。在内部，它会创建你所需的\
    \ `Pattern` 和 `Matcher` 对象，将正则表达式与输入字符串进行比较，并返回一个布尔值，告诉你两者是否完全匹配。清单 2-3 给出了一个使用示例。\n\
    \n清单 2-3：Matches 示例\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\n\
    public class PatternMatchesTest{\n  public static void main(String args[]){\n\n\
    \      String regex = \"ad*\";\n      String input = \"add\";\n\n      boolean\
    \ isMatch = Pattern.matches(regex,input);\n      System.out.println(isMatch);//返回\
    \ true\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n如果你要进行大量比较，那么显式创建一个\
    \ `Pattern` 对象并手动进行匹配会更高效。然而，如果你不需要进行大量比较，那么 `matches` 就是一个方便的实用方法。\n\n`Pattern.matches(String\
    \ regex, CharSequence input)` 方法也在 `String` 类内部使用。从 J2SE 1.4 开始，`String` 有一个名为\
    \ `matches` 的新方法，它在内部委托给 `Pattern.matches` 方法。你可能已经在使用这个方法而不自知。\n\n当然，如果所考虑的正则表达式模式格式不正确，此方法可能会抛出\
    \ `PatternSyntaxException`。\n\n### public String[] split(CharSequence input)\n\
    \n如果你需要根据某些条件将一个字符串拆分成子字符串数组，这个方法会特别有用。在概念上，它类似于 `StringTokenizer`，但它比 `StringTokenizer`\
    \ 更强大，资源消耗也更大，因为它允许你的程序使用正则表达式作为拆分条件。\n\n此方法总是返回至少一个元素。如果找不到要拆分的候选字符串 `input`，则返回一个只包含一个字符串的数组——即原始输入。\n\
    \n如果找到了输入，则返回一个字符串数组。该数组包含每次出现输入之后的所有子字符串。因此，对于模式\n\n```\nPattern p = new Pattern.compile(\"\
    ,\");\n```\n\n`split` 方法对于 *Hello, Dolly* 将返回一个包含两个元素的字符串数组。数组的第一个元素将包含 *Hello*，第二个元素将包含\
    \ *Dolly*。该字符串数组通过以下方式获得：\n\n```\nString tmp[] = p.split(\"Hello,Dolly\");\n```\n\
    \n在这种情况下，返回的值是\n\n```\n//tmp 等于 { \"Hello\", \"Dolly\"}\n```\n\n使用此方法时，你需要注意一些细微之处。如果候选字符串是\
    \ *Hello,Dolly,*，在 *Dolly* 的 *y* 后面有一个尾随逗号，那么此方法仍然会返回一个包含 *Hello* 和 *Dolly* 的两个元素的字符串数组。其隐含行为是尾随空格不会被返回。\n\
    \n如果输入字符串是 *Hello,,,Dolly*，则生成的字符串数组将有四个元素。`split` 方法应用于该模式时的返回值是\n\n```\n// p.split(\"\
    Hello,,,Dolly\")  返回 {\"Hello\",\"\",\"\",\"Dolly\"} \n```\n\n清单 2-4 提供了一个示例，其中使用\
    \ `split` 方法根据单个空格字符将字符串拆分成数组。\n\n清单 2-4：Pattern 拆分示例\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\nimport java.util.regex.*;\npublic class PatternSplitExample{\n  public\
    \ static void main(String args[]){\n      splitTest();\n  }\n\npublic static void\
    \ splitTest(){\n\nPattern p =\n    Pattern.compile(\" \");\n    String tmp = \"\
    this is the String I want to split up\";\n\nString[] tokens = p.split(tmp);\n\n\
    for (int i=0; i<tokens.length; i++){\n       System.out.println(tokens[i]);\n\
    \    }\n\n}\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n当然，这是对该方法的误用：你可以使用\
    \ `StringTokenizer` 达到同样的结果，而且资源消耗会更少。根据你现在所学的知识，请考虑清单 2-5，它是第 1 章中清单 1-12 的一个略微修改的版本，因为它使用了\
    \ `Pattern.split` 方法。输出 2-1 显示了运行该程序的结果。\n\n清单 2-5：PatternSplit.java\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\nimport java.util.regex.*;\n\npublic class PatternSplit{\n  public\
    \ static void main(String args[]){\n\nString statement = \"I will not compromise.\
    \ I will not \"+\n      \"cooperate. There will be no concession, no conciliation,\
    \ no \"+\n      \"finding the middle ground, and no give and take.\";\n\nString\
    \ tokens[] =null;\n      String splitPattern= \"compromise|cooperate|concession|\"\
    +\n      \"conciliation|(finding the middle ground)|(give and take)\";\n\nPattern\
    \ p = Pattern.compile(splitPattern);\n\ntokens=p.split(statement);\n\nSystem.out.println(\"\
    REGEX PATTERN:\\n\"+splitPattern + \"\\n\");\n\nSystem.out.println(\"STATEMENT:\\\
    n\"+statement + \"\\n\");\n\nSystem.out.println(\"TOKENS:\");\n      for (int\
    \ i=0; i < tokens.length; i++){\n      System.out.println(tokens[i]);\n      }\n\
    \  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n输出 2-1：运行 PatternSplit.java\
    \ 的结果\n\n| **![开始示例](img/_1.gif)** |\n\n```\nC:\\RegEx\\code\\chapter1>java Split\n\
    REGEX PATTERN:\ncompromise|cooperate|concession|conciliation|(finding the middle\
    \ group)|(give\nand take)\n\nSTATEMENT:\nI will not compromise. I will not cooperate.\
    \ There\nwill be no concession, no conciliation,\nno finding the middle group,\
    \ and no give and take.\n\nTOKENS:\nI will not\n. I will not\n. There will be\
    \ no\n, no\n, no\n, and no\n.\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n\
    你会注意到清单 2-5 使用了 `Pattern.split` 方法，而清单 1-12 使用了新的 `String.split` 方法。实际上，两者是相同的，因为\
    \ `String.split` 方法在内部只是委托给这个方法。\n\n你所做的事情确实非常了不起，如果没有正则表达式，这可能会变得极其复杂。你实际上是在使用复杂的人工构造——即英语同义词——来分解文本。这可不是你父辈时代的\
    \ J2SE。\n\n|  | 注意 | `String` 方法通过在模式前放置一个不可见的 *^* 并在其后放置一个 *$* 来进一步优化其搜索条件。 |\n\
    \n### public String[] split(CharSequence input, int limit)\n\n此方法的工作方式与 `Pattern.split(CharSequence\
    \ input)` 完全相同，只有一个区别。第二个参数 `limit` 允许你控制返回的元素数量，如下面几节所示。\n"
- fmt: "### `Limit == 0`\n\n如果指定第二个参数`limit`等于`0`，则此方法的行为与其重载版本完全相同。也就是说，它会返回一个包含尽可能多匹配子字符串的数组，并丢弃尾随空格。因此，模式\n\
    \n```\nPattern p = new Pattern.compile(\",\");\n```\n\n在对候选字符串`Hello, Dolly`进行分割时，将返回一个包含两个元素的数组。该方法的使用示例如下：\n\
    \n```\nString tmp[] = p.split(\"Hello,Dolly\", 0);\n```\n\n类似地，当对字符串`Hello, Dolly,`（其中`Dolly`的`y`后面有一个尾随逗号）进行分割时，`split`将返回两个元素：\n\
    \n```\nString tmp[] = p.split(\"Hello,Dolly,\", 0);\n```\n\n然而，你可能并不总是需要这种行为。例如，有时你可能希望限制返回的元素数量。\n\
    \n### `Limit > 0`\n\n如果你只对特定数量的匹配感兴趣，请使用正数`limit`。你应该使用该数量加`1`作为`limit`。要分割字符串`Hello,\
    \ Dolly, You, Are, My, Favorite`，并且只想要前两个标记，请使用以下代码：\n\n```\nString[] tmp = pattern.split(\"\
    Hello, Dolly, You, Are, My, Favorite\",3);\n```\n\n结果字符串的值如下：\n\n```\n//tmp[0]\
    \ is  \"Hello\",\n// tmp[1] is \"Dolly\";\n```\n\n这里有趣的行为是返回了第三个元素。在这种情况下，第三个元素是：\n\
    \n```\n//tmp[2] is  \"You, Are, My, Favorite\";\n```\n\n使用正数`limit`可能会带来性能提升，因为正则表达式引擎在达到指定数量的匹配后可以停止搜索。\n\
    \n### `Limit < 0`\n\n为`limit`使用负数（任何负数）会告诉正则表达式引擎，你希望返回尽可能多的匹配，并且如果存在尾随空格，也要返回它们。因此，对于正则表达式模式\n\
    \n```\nPattern p = Pattern.compile(\",\");\n```\n\n和候选字符串`Hello,Dolly,`，命令\n\n\
    ```\nString tmp[] = p.split(\"Hello,Dolly\", -1);\n```\n\n会导致以下结果：\n\n```\n//tmp\
    \ is equal to {\"Hello\",\"Dolly\"};\n```\n\n然而，对于字符串`Hello, Dolly,`（在`Dolly`后面的逗号后有尾随空格），方法调用\n\
    \n```\nString tmp[] = p.split(\"Hello,Dolly,    \", -1); \n```\n\n会导致以下结果：\n\n\
    ```\n//tmp is equal to {\"Hello\",\"Dolly\",\"    \"};\n```\n\n请注意，负数`limit`的实际值并不重要，因此\n\
    \n```\np.split(\"Hello,Dolly\", -1);\n```\n\n与以下代码完全等价：\n\n```\np.split(\"Hello,Dolly\"\
    , -100);\n```\n\n## `Matcher`对象\n\n[图 2-2](#LiB0016.html#ch02fig02) 展示了`Matcher`类的方法。请花点时间研究它们。\n\
    \n[![Click To expand](fig88_01.jpg)](fig88_01_0.jpg)\n图 2-2: `Matcher`类\n\n以下各节描述了`Matcher`类的各种方法。但首先，让我们简要回顾一下组（group）的概念，因为它们在`Matcher`对象中扮演着非常重要的角色。\n\
    \n### 组（Groups）\n\n在充分利用`Matcher`对象之前，理解*组*的概念非常重要，因为`Matcher`的一些更强大的方法会用到它们。我将在[第\
    \ 3 章](#LiB0020_split_000.html#336)中更详细地讨论组，但你需要对它们有一个直观的理解，才能充分利用本章的内容，因此我在这里提供一个简短的介绍。\n\
    \n组正如其名：一组字符。通常，该术语指的是原始`Pattern`的一个子部分，尽管根据定义，每个组本身也是其自身的一个子组。你可能已经从算术的学习中熟悉了组的概念。例如，表达式\n\
    \n```\n6 * 7 + 4\n```\n\n具有隐含的分组含义。你实际上将其理解为\n\n```\n (6 * 7) + 4\n```\n\n其中`(6\
    \ * 7)`被视为一个数字聚类。进一步地，你可以将表达式视为\n\n```\n( (6 * 7) + 4)\n```\n\n其中`((6 * 7) + 4)`是另一个数字聚类，这次它包含了子聚类`(6*7)`。在这里，你的组有一个子组。类似地，正则表达式允许你将一系列字符组合在一起。为什么？我稍后会讨论。首先，让我们专注于如何分组。\n\
    \n请记住，在正则表达式中，你通过使用`Pattern`对象以通用术语描述你要查找的内容。组允许你在表达式中嵌套子描述。当你检查一个特定的候选字符串时，`Matcher`可以跟踪该表达式的子匹配。\n\
    \n创建正则表达式字符的分组非常简单。你只需将要视为一个组的表达式放在一对圆括号内。就是这样。因此，模式`(\\w)(\\d\\d)(\\w+)`由四个组组成，范围从`0`到`3`。`group(0)`始终是原始表达式本身，如下所示：\n\
    \n![](fig89_01.jpg)\n\n`group(1)`由一个字母数字或下划线字符组成，在下图中圈出：\n\n![](fig90_01.jpg)\n\
    \n`group(2)`在下图中圈出：\n\n![](fig90_02.jpg)\n\n`group(3)`在下图中圈出：\n\n![](fig90_03.jpg)\n\
    \n对于特定的候选字符串，例如`X99SuperJava`，`group(0)`始终是候选字符串中与原始正则表达式模式匹配的部分——即模式`(\\w)(\\\
    d\\d)(\\w+)`本身：\n\n![](fig90_04.jpg)\n\n下图指示了`X99SuperJava`中对应于`group(1)`的部分：\n\
    \n![](fig90_05.jpg)\n\n`X99SuperJava`中对应于`group(2)`的部分在下图中圈出：\n\n![](fig90_06.jpg)\n\
    \n`X99SuperJava`中对应于`group(3)`的部分在下图中圈出：\n\n![](fig90_07.jpg)\n\n好了，现在你知道如何指定组以及如何在候选字符串中找到对应的部分。那么，为什么要这样做呢？一个常见的原因是能够引用候选字符串的子部分。例如，你可能不知道这个特定的候选字符串`X99SuperJava`是什么，但你仍然可以编写一个程序，通过创建一个新的`String`（等于`group(3)`后接`group(1)`再后接`group(2)`）来重新排列它。在这种情况下，重新排列后的字符串将是`SuperJavaX99`。\n\
    \n[第 3 章](#LiB0020_split_000.html#336)提供了关于组的详细示例。\n\n### `public Pattern pattern()`\n\
    \n`pattern()`方法返回创建此特定`Matcher`对象的`Pattern`。请参考[清单 2-6](#LiB0016.html#ch02list06)。\n\
    \n清单 2-6: `Matcher`模式示例\n\n| **![Start example](_1.gif)** |\n\n```\nimport java.util.regex.*;\n\
    \npublic class MatcherPatternExample{\n  public static void main(String args[]){\n\
    \      test();\n  }\n\n  public static void test(){\n     Pattern p = Pattern.compile(\"\
    \\\\d\");\n     Matcher m1 = p.matcher(\"55\");\n     Matcher m2 = p.matcher(\"\
    fdshfdgdfh\");\n\n     System.out.println(m1.pattern() == m2.pattern());\n   \
    \  //return true\n  }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\n这里你应该注意几个重要的事情。首先，两个`Matcher`对象都成功返回了一个`Pattern`，即使`m2`没有成功匹配。其次，这两个`Matcher`对象返回了*完全相同的*`Pattern`对象，因为它们都是由同一个`Pattern`创建的。请注意，代码行\n\
    \n```\n System.out.println(m1.pattern() == m2.pattern());\n```\n\n执行的是`==`比较，而不是`.equals`比较。这只有在`m1`和`m2`返回的实际对象确实是同一个对象时才能成立。"
  raw: "#### Limit == 0\n\nIf you specify that the second parameter, limit, should\
    \ equal 0, then this method behaves exactly like its overloaded counterpart. That\
    \ is, it returns an array containing as many matching substrings as possible,\
    \ and trailing spaces are discarded. Thus, the pattern\n\n```\nPattern p = new\
    \ Pattern.compile(\",\");\n```\n\nwill return an array consisting of two elements\
    \ when split against the candidate Hello, Dolly. An example of the usage of the\
    \ method follows:\n\n```\nString tmp[] = p.split(\"Hello,Dolly\", 0);\n```\n\n\
    Similarly, split will return two elements when matched against the String Hello,\
    \ Dolly, with a trailing comma character after the y in Dolly:\n\n```\nString\
    \ tmp[] = p.split(\"Hello,Dolly,\", 0);\n```\n\nHowever, you may not always want\
    \ this behavior. For example, there may be a time when you want to limit the number\
    \ of elements returned.\n\n#### Limit > 0\n\nUse a positive limit if you're interested\
    \ in only a certain number of matches. You should use that number +1 as the limit.\
    \ To split the String *Hello, Dolly, You, Are, My, Favorite* when you want only\
    \ the first two tokens, use this:\n\n```\nString[] tmp = pattern.split(\"Hello,\
    \ Dolly, You, Are, My, Favorite\",3);\n```\n\nThe value of the resulting String\
    \ is as follows:\n\n```\n//tmp[0] is  \"Hello\",\n// tmp[1] is \"Dolly\";\n```\n\
    \nThe interesting behavior here is that a third element is returned. In this case,\
    \ the third element is\n\n```\n//tmp[2] is  \"You, Are, My, Favorite\";\n```\n\
    \nUsing a positive limit can potentially lead to performance enhancements, because\
    \ the regex engine can stop searching when it meets the specified number of matches.\n\
    \n#### Limit < 0\n\nUsing a negative number—any negative number—for the limit\
    \ tells the regex engine that you want to return as many matches as possible *and*\
    \ that you want trailing spaces, if any, to be returned. Thus, for the regex pattern\n\
    \n```\nPattern p = Pattern.compile(\",\");\n```\n\nand the candidate String *Hello,Dolly,*\
    \ the command\n\n```\nString tmp[] = p.split(\"Hello,Dolly\", -1);\n```\n\nresults\
    \ in the following condition:\n\n```\n//tmp is equal to {\"Hello\",\"Dolly\"};\n\
    ```\n\nHowever, for the String *Hello, Dolly,* with trailing spaces after the\
    \ comma following *Dolly*, the method call\n\n```\nString tmp[] = p.split(\"Hello,Dolly,\
    \    \", -1); \n```\n\nresults in this:\n\n```\n//tmp is equal to {\"Hello\",\"\
    Dolly\",\"    \"};\n```\n\nNotice that the actual value of the negative limit\
    \ doesn't matter, thus\n\n```\np.split(\"Hello,Dolly\", -1);\n```\n\nis exactly\
    \ equivalent to this:\n\n```\np.split(\"Hello,Dolly\", -100);\n```\n\n## The Matcher\
    \ Object\n\n[Figure 2-2](#LiB0016.html#ch02fig02) illustrates the methods of the\
    \ Matcher class. Please take a moment to study them.\n\n[![Click To expand](fig88_01.jpg)](fig88_01_0.jpg)\n\
    Figure 2-2: The Matcher class\n\nThe following sections describe the various methods\
    \ of the Matcher class. But first, let's briefly revisit the concept of groups,\
    \ as they figure so prominently in the Matcher object.\n\n### Groups\n\nBefore\
    \ you can take full advantage of the Matcher object, it's important that you understand\
    \ the concept of a *group*, as some of the more powerful methods of Matcher deal\
    \ with them. I discuss groups in even greater detail in [Chapter 3](#LiB0020_split_000.html#336),\
    \ but you need an intuitive sense of them to take full advantage of the material\
    \ in this chapter, so I provide a brief introduction here.\n\nA group is exactly\
    \ what it sounds like: a cluster of characters. Often, the term refers to a subportion\
    \ of the original Pattern, though each group is, by definition, a subgroup of\
    \ itself. You're probably already familiar with the concept of groups from your\
    \ study of arithmetic. For example, the expression\n\n```\n6 * 7 + 4\n```\n\n\
    has an implicit sense of grouping. You really read it as\n\n```\n (6 * 7) + 4\n\
    ```\n\nwhere *(6 * 7)* is thought of as a clustering of numbers. Further, you\
    \ can think of the expression as\n\n```\n( (6 * 7) + 4)\n```\n\nwhere you can\
    \ consider *((6 * 7) + 4)* another clustering of numbers, this one including the\
    \ subcluster *(6*7)*. Here, your group has a subgroup. Similarly, regex allows\
    \ you to group a sequence of characters together. Why? I discuss that shortly.\
    \ First, let's concentrate on how.\n\nRemember that in regular expressions, you\
    \ describe what you're looking for in general terms by using a Pattern object.\
    \ Groups allow you to nest subdescriptions within your expression. As you examine\
    \ a specific candidate String, the Matcher can keep track of submatches for that\
    \ expression.\n\nCreating a grouping of regex characters is very easy. You simply\
    \ put the expression you want to think of as a group inside a pair of parentheses.\
    \ That's it. Thus, the pattern ***(\\w)(\\d\\d)(\\w+)*** consists of four groups,\
    \ ranging from 0 to 3\\. group(0), which is always the original expression itself,\
    \ is as follows:\n\n![](fig89_01.jpg)\n\ngroup(1), which consists of an alphanumeric\
    \ or underscore character, is circled in the following image:\n\n![](fig90_01.jpg)\n\
    \ngroup(2) is circled in the following image:\n\n![](fig90_02.jpg)\n\ngroup(3)\
    \ is circled in the following image:\n\n![](fig90_03.jpg)\n\nFor a specific candidate\
    \ String, say *X99SuperJava*, group(0) is always the part of the candidate string\
    \ that matches the original regex pattern—namely, the pattern ***(\\w)(\\d\\d)(\\\
    w+)*** itself:\n\n![](fig90_04.jpg)\n\nThe following image indicates the corresponding\
    \ section of *X99SuperJava* for group(1):\n\n![](fig90_05.jpg)\n\nThe corresponding\
    \ section of *X99SuperJava* for group(2) is circled in the following image:\n\n\
    ![](fig90_06.jpg)\n\nThe corresponding section of *X99SuperJava* for group(3)\
    \ is circled in the following image:\n\n![](fig90_07.jpg)\n\nOK, so you know how\
    \ to designate groups and how to find the corresponding section in a candidate\
    \ string. Now, why would you? A common reason for doing so is the ability to refer\
    \ to subsections of the candidate string. For example, you may not know what this\
    \ particular candidate string, namely *X99SuperJava*, is, but you can still write\
    \ a program that rearranges it by creating a new String equal to group(3), appended\
    \ to group(1), and appended to group(2). In this case, that rearranged String\
    \ would be *SuperJavaX99*.\n\n[Chapter 3](#LiB0020_split_000.html#336) provides\
    \ detailed examples of groups.\n\n### public Pattern pattern()\n\nThe pattern\
    \ method returns the Pattern that created this particular Matcher object. Consider\
    \ [Listing 2-6](#LiB0016.html#ch02list06).\n\nListing 2-6: Matcher Pattern Example\n\
    \n| **![Start example](_1.gif)** |\n\n```\nimport java.util.regex.*;\n\npublic\
    \ class MatcherPatternExample{\n  public static void main(String args[]){\n  \
    \    test();\n  }\n\n  public static void test(){\n     Pattern p = Pattern.compile(\"\
    \\\\d\");\n     Matcher m1 = p.matcher(\"55\");\n     Matcher m2 = p.matcher(\"\
    fdshfdgdfh\");\n\n     System.out.println(m1.pattern() == m2.pattern());\n   \
    \  //return true\n  }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nYou\
    \ should notice a few important things here. First, both Matcher objects successfully\
    \ returned a Pattern, even though m2 wasn't a successful match. Second, the Matcher\
    \ objects returned *exactly the same* Pattern object, because they were both created\
    \ by that Pattern. Notice that the line\n\n```\n System.out.println(m1.pattern()\
    \ == m2.pattern());\n```\n\ndid a == compare and not a .equals compare. This could\
    \ only have worked if the actual object returned by m1 and m2 was, in fact, exactly\
    \ the same object."
  trans: "\n#### Limit == 0\n\n如果你指定第二个参数 limit 等于 0，那么此方法的行为与其重载版本完全相同。也就是说，它会返回一个包含尽可能多匹配子字符串的数组，并丢弃尾部空格。因此，模式\n\
    \n```\nPattern p = new Pattern.compile(\",\");\n```\n\n在对候选字符串 Hello, Dolly 进行分割时，将返回一个包含两个元素的数组。以下是该方法的使用示例：\n\
    \n```\nString tmp[] = p.split(\"Hello,Dolly\", 0);\n```\n\n类似地，当对字符串 Hello, Dolly\
    \ 进行匹配时（其中 Dolly 的 y 后面有一个尾随逗号），split 也会返回两个元素：\n\n```\nString tmp[] = p.split(\"\
    Hello,Dolly,\", 0);\n```\n\n然而，你可能并不总是需要这种行为。例如，有时你可能希望限制返回的元素数量。\n\n#### Limit\
    \ > 0\n\n如果你只对特定数量的匹配感兴趣，请使用正数 limit。你应该使用该数量加 1 作为 limit。要分割字符串 *Hello, Dolly,\
    \ You, Are, My, Favorite* 且只获取前两个标记时，请使用以下代码：\n\n```\nString[] tmp = pattern.split(\"\
    Hello, Dolly, You, Are, My, Favorite\",3);\n```\n\n结果字符串的值如下：\n\n```\n//tmp[0]\
    \ 是 \"Hello\",\n// tmp[1] 是 \"Dolly\";\n```\n\n这里有趣的行为是返回了第三个元素。在本例中，第三个元素是\n\n\
    ```\n//tmp[2] 是 \"You, Are, My, Favorite\";\n```\n\n使用正数 limit 可能会带来性能提升，因为正则表达式引擎在达到指定匹配次数后可以停止搜索。\n\
    \n#### Limit < 0\n\n为 limit 使用负数（任何负数）会告诉正则表达式引擎：你希望返回尽可能多的匹配项，*并且*希望返回尾部空格（如果有的话）。因此，对于正则表达式模式\n\
    \n```\nPattern p = Pattern.compile(\",\");\n```\n\n和候选字符串 *Hello,Dolly,*，命令\n\n\
    ```\nString tmp[] = p.split(\"Hello,Dolly\", -1);\n```\n\n会产生以下结果：\n\n```\n//tmp\
    \ 等于 {\"Hello\",\"Dolly\"};\n```\n\n然而，对于字符串 *Hello, Dolly,*（其中 *Dolly* 后面的逗号后有尾部空格），方法调用\n\
    \n```\nString tmp[] = p.split(\"Hello,Dolly,    \", -1); \n```\n\n会产生以下结果：\n\n\
    ```\n//tmp 等于 {\"Hello\",\"Dolly\",\"    \"};\n```\n\n请注意，负数 limit 的实际值并不重要，因此\n\
    \n```\np.split(\"Hello,Dolly\", -1);\n```\n\n与以下代码完全等价：\n\n```\np.split(\"Hello,Dolly\"\
    , -100);\n```\n\n## Matcher 对象\n\n图 2-2 展示了 Matcher 类的方法。请花点时间研究它们。\n\n![点击展开](img/fig88_01_0.jpg)\n\
    图 2-2：Matcher 类\n\n以下各节将描述 Matcher 类的各种方法。但首先，让我们简要回顾一下组（group）的概念，因为它们在 Matcher\
    \ 对象中扮演着非常重要的角色。\n\n### 组\n\n在充分利用 Matcher 对象之前，理解*组*的概念非常重要，因为 Matcher 的一些更强大的方法会涉及它们。我将在第\
    \ 3 章中更详细地讨论组，但你需要对它们有一个直观的理解，才能充分利用本章的内容，因此我在此做一个简要介绍。\n\n组正如其名：一组字符。通常，该术语指的是原始\
    \ Pattern 的一个子部分，尽管根据定义，每个组本身也是其自身的一个子组。你可能已经从算术学习中熟悉了组的概念。例如，表达式\n\n```\n6 *\
    \ 7 + 4\n```\n\n隐含着分组的概念。你实际上将其理解为\n\n```\n (6 * 7) + 4\n```\n\n其中 *(6 * 7)* 被视为一个数字聚类。进一步，你可以将表达式视为\n\
    \n```\n( (6 * 7) + 4)\n```\n\n其中 *((6 * 7) + 4)* 是另一个数字聚类，它包含了子聚类 *(6*7)*。在这里，你的组包含了一个子组。类似地，正则表达式允许你将一系列字符组合在一起。为什么？我稍后会讨论。首先，让我们专注于如何实现。\n\
    \n请记住，在正则表达式中，你通过使用 Pattern 对象以通用术语描述你要查找的内容。组允许你在表达式中嵌套子描述。当你检查特定的候选字符串时，Matcher\
    \ 可以跟踪该表达式的子匹配。\n\n创建正则表达式字符的分组非常简单。你只需将想要视为组的表达式放在一对圆括号内。就是这样。因此，模式 ***(\\w)(\\\
    d\\d)(\\w+)*** 包含四个组，编号从 0 到 3。group(0) 始终是原始表达式本身，如下所示：\n\n![](img/fig89_01.jpg)\n\
    \ngroup(1) 由一个字母数字字符或下划线组成，在下图中用圆圈标出：\n\n![](img/fig90_01.jpg)\n\ngroup(2) 在下图中用圆圈标出：\n\
    \n![](img/fig90_02.jpg)\n\ngroup(3) 在下图中用圆圈标出：\n\n![](img/fig90_03.jpg)\n\n对于特定的候选字符串，比如\
    \ *X99SuperJava*，group(0) 始终是候选字符串中匹配原始正则表达式模式的部分——即模式 ***(\\w)(\\d\\d)(\\w+)***\
    \ 本身：\n\n![](img/fig90_04.jpg)\n\n下图指示了 *X99SuperJava* 中对应于 group(1) 的部分：\n\n\
    ![](img/fig90_05.jpg)\n\n*X99SuperJava* 中对应于 group(2) 的部分在下图中用圆圈标出：\n\n![](img/fig90_06.jpg)\n\
    \n*X99SuperJava* 中对应于 group(3) 的部分在下图中用圆圈标出：\n\n![](img/fig90_07.jpg)\n\n好了，现在你知道如何指定组以及如何在候选字符串中找到对应的部分。那么，为什么要这样做呢？一个常见的原因是为了能够引用候选字符串的子部分。例如，你可能不知道这个特定的候选字符串\
    \ *X99SuperJava* 是什么，但你仍然可以编写一个程序，通过创建一个新字符串（等于 group(3) 后接 group(1) 再后接 group(2)）来重新排列它。在这种情况下，重新排列后的字符串将是\
    \ *SuperJavaX99*。\n\n第 3 章提供了关于组的详细示例。\n\n### public Pattern pattern()\n\npattern\
    \ 方法返回创建此特定 Matcher 对象的 Pattern。请参考清单 2-6。\n\n清单 2-6：Matcher Pattern 示例\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\nimport java.util.regex.*;\n\npublic class MatcherPatternExample{\n\
    \  public static void main(String args[]){\n      test();\n  }\n\n  public static\
    \ void test(){\n     Pattern p = Pattern.compile(\"\\\\d\");\n     Matcher m1\
    \ = p.matcher(\"55\");\n     Matcher m2 = p.matcher(\"fdshfdgdfh\");\n\n     System.out.println(m1.pattern()\
    \ == m2.pattern());\n     //返回 true\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n这里有几件重要的事情需要注意。首先，两个 Matcher 对象都成功返回了一个 Pattern，即使 m2 没有成功匹配。其次，这两个\
    \ Matcher 对象返回了*完全相同的* Pattern 对象，因为它们都是由同一个 Pattern 创建的。请注意，代码行\n\n```\n System.out.println(m1.pattern()\
    \ == m2.pattern());\n```\n\n执行的是 == 比较，而不是 .equals 比较。这只有在 m1 和 m2 返回的实际对象确实是同一个对象时才能成立。\n"
- fmt: "### `public Matcher reset()`\n\n`reset()`方法会清除调用它的`Matcher`对象中的所有状态信息。实际上，`Matcher`会恢复到最初获取其引用时的原始状态，如[清单2-7](#LiB0016.html#ch02list07)所示。\n\
    \n**清单2-7：`Matcher.reset()`示例**\n\n| **![开始示例](_1.gif)** |\n\n```java\nimport\
    \ java.util.regex.*;\n/**\n * Demonstrates the usage of the\n * Matcher.reset()\
    \ method\n */\npublic class MatcherResetExample{\n  public static void main(String\
    \ args[]){\n      test();\n  }\n  public static void test(){\n     //create a\
    \ pattern, and extract a matcher\n     Pattern p = Pattern.compile(\"\\\\d\");\n\
    \     Matcher m1 = p.matcher(\"01234\");\n\n     //exhaust the matcher\n     while\
    \ (m1.find()){\n      System.out.println(\"\\t\\t\" + m1.group());\n     }\n \
    \    //now reset the matcher to its original state\n     m1.reset();\n     System.out.println(\"\
    After resetting the Matcher\");\n     //iterate through the matcher again.\n \
    \    //this would not be possible without a cleared state\n     while (m1.find()){\n\
    \      System.out.println(\"\\t\\t\" + m1.group());\n     }\n  }\n}\n```\n\n|\
    \ **![结束示例](_1.gif)** |\n\n|  |\n\n[输出2-2](#LiB0016.html#ch02fig02)展示了此方法的输出。\n\
    \n**输出2-2：`Matcher.reset()`示例的输出**\n\n| **![开始示例](_1.gif)** |\n\n```\nAfter resetting\
    \ the Matcher\n```\n\n| **![结束示例](_1.gif)** |\n\n|  |\n\n如果没有重置`Matcher`，你将无法再次遍历其元素。\n\
    \n### `public Matcher reset(CharSequence input)`\n\n`reset(CharSequence input)`方法会清除调用它的`Matcher`对象的状态，并将候选字符串替换为新的输入。这与创建一个新的`Matcher`对象效果相同，但开销更小。这可以带来有用的优化，也是我经常使用的一种方式。[清单2-8](#LiB0016.html#ch02list08)演示了此方法的用法。\n\
    \n**清单2-8：`Matcher.reset(CharSequence)`示例**\n\n| **![开始示例](_1.gif)** |\n\n```java\n\
    import java.util.regex.*;\n/**\n * Demonstrates the usage of the\n * Matcher.reset(CharSequence)\
    \ method\n */\npublic class MatcherResetCharSequenceExample{\n  public static\
    \ void main(String args[]){\n      test();\n  }\n  public static void test(){\n\
    \     String output=\"\";\n     //create a pattern, and extract a matcher\n  \
    \   Pattern p = Pattern.compile(\"\\\\d\");\n     Matcher m1 = p.matcher(\"01234\"\
    );\n\n     //exhaust the matcher\n     while (m1.find()){\n      System.out.println(\"\
    \\t\\t\" + m1.group());\n     }\n     //now reset the matcher with new data\n\
    \     m1.reset(\"56789\");\n     System.out.println(\"After resetting the Matcher\"\
    );\n     //iterate through the matcher again.\n     //this would not be possible\
    \ without\n     while (m1.find()){\n      System.out.println(\"\\t\\t\" + m1.group());\n\
    \     }\n  }\n}\n```\n\n| **![结束示例](_1.gif)** |\n\n|  |\n\n[输出2-3](#LiB0016.html#ch02ex03)展示了此方法的输出。\n\
    \n**输出2-3：`Matcher.reset(CharSequence)`示例的输出**\n\n| **![开始示例](_1.gif)** |\n\n\
    ```\nAfter resetting the Matcher\n```\n\n| **![结束示例](_1.gif)** |\n\n|  |\n\n###\
    \ `public int start()`\n\n`start()`方法返回`Matcher`对象上一次成功匹配的起始索引。[清单2-9](#LiB0016.html#ch02list09)演示了`start()`方法的使用。该清单中的代码在候选字符串`My\
    \ name is Bond. James Bond.`中查找单词`Bond`的起始索引。\n\n**清单2-9：`Matcher.start()`示例**\n\
    \n| **![开始示例](_1.gif)** |\n\n```java\n/**\n * Demonstrates the usage of the\n\
    \ * Matcher.start() method\n */\npublic class MatcherStartExample{\n  public static\
    \ void main(String args[]){\n      test();\n  }\n  public static void test(){\n\
    \     //create a Matcher and use the Matcher.start() method\n     String candidateString\
    \ = \"My name is Bond. James Bond.\";\n     String matchHelper[] =\n      {\"\
    \          ^\",\"                      ^\"};\n     Pattern p = Pattern.compile(\"\
    Bond\");\n     Matcher matcher = p.matcher(candidateString);\n\n     //Find the\
    \ starting point of the first 'Bond'\n      matcher.find();\n      int startIndex\
    \ = matcher.start();\n      System.out.println(candidateString);\n      System.out.println(matchHelper[0]\
    \ + startIndex);\n\n     //Find the starting point of the second 'Bond'\n    \
    \  matcher.find();\n      int nextIndex = matcher.start();\n      System.out.println(candidateString);\n\
    \      System.out.println(matchHelper[1] + nextIndex);\n}\n```\n\n| **![结束示例](_1.gif)**\
    \ |\n\n|  |\n\n[输出2-4](#LiB0016.html#ch02ex04)展示了运行`start()`方法的输出。\n\n**输出2-4：`Matcher.start()`示例的输出**\n\
    \n| **![开始示例](_1.gif)** |\n\n```\nMy name is Bond. James Bond.\n          ^11\n\
    My name is Bond. James Bond.\n                      ^23\n```\n\n| **![结束示例](_1.gif)**\
    \ |\n\n|  |\n\n如果你执行另一个`find()`方法：\n\n```java\nmatcher.find();\n```\n\n然后执行`start()`：\n\
    \n```java\nint nonIndex = matcher.start(); //throws IllegalStateException\n```\n\
    \n`start()`方法将抛出`IllegalStateException`。令我惊讶的是，它没有简单地返回一个负数来表示匹配失败。请使用`matches()`方法返回的布尔值来判断是否应该调用`start()`等方法。"
  raw: "### public Matcher reset()\n\nThe reset method clears all state information\
    \ from the Matcher object it's called on. The Matcher is, in effect, reverted\
    \ to the state it originally had when you first received a reference to it, as\
    \ shown in [Listing 2-7](#LiB0016.html#ch02list07).\n\nListing 2-7: Matcher.reset\
    \ Example\n\n| **![Start example](_1.gif)** |\n\n```\nimport java.util.regex.*;\n\
    /**\n * Demonstrates the usage of the\n * Matcher.reset() method\n */\npublic\
    \ class MatcherResetExample{\n  public static void main(String args[]){\n    \
    \  test();\n  }\n  public static void test(){\n     //create a pattern, and extract\
    \ a matcher\n     Pattern p = Pattern.compile(\"\\\\d\");\n     Matcher m1 = p.matcher(\"\
    01234\");\n\n     //exhaust the matcher\n     while (m1.find()){\n      System.out.println(\"\
    \\t\\t\" + m1.group());\n     }\n     //now reset the matcher to its original\
    \ state\n     m1.reset();\n     System.out.println(\"After resetting the Matcher\"\
    );\n     //iterate through the matcher again.\n     //this would not be possible\
    \ without a cleared state\n     while (m1.find()){\n      System.out.println(\"\
    \\t\\t\" + m1.group());\n     }\n  }\n}\n```\n\n| **![End example](_1.gif)** |\n\
    \n|  |\n\n[Output 2-2](#LiB0016.html#ch02fig02) shows the output of this method.\n\
    \nOutput 2-2: Output for the Matcher.reset Example\n\n| **![Start example](_1.gif)**\
    \ |\n\n```\n\nAfter resetting the Matcher\n\n```\n\n| **![End example](_1.gif)**\
    \ |\n\n|  |\n\nYou wouldn't have been able to iterate through the elements of\
    \ the Matcher again if it hadn't been reset.\n\n### public Matcher reset(CharSequence\
    \ input)\n\nThe reset(CharSequence input) methods clears the state of the Matcher\
    \ object it's called on and replaces the candidate String with the new input.\
    \ This has the same effect as creating a new Matcher object, except that it doesn't\
    \ have as much of the associated overhead. This can lead to useful optimization,\
    \ and it's one that I often use. [Listing 2-8](#LiB0016.html#ch02list08) demonstrates\
    \ this method's usage.\n\nListing 2-8: Matcher.reset(CharSequence) Example\n\n\
    | **![Start example](_1.gif)** |\n\n```\nimport java.util.regex.*;\n/**\n * Demonstrates\
    \ the usage of the\n * Matcher.reset(CharSequence) method\n */\npublic class MatcherResetCharSequenceExample{\n\
    \  public static void main(String args[]){\n      test();\n  }\n  public static\
    \ void test(){\n     String output=\"\";\n     //create a pattern, and extract\
    \ a matcher\n     Pattern p = Pattern.compile(\"\\\\d\");\n     Matcher m1 = p.matcher(\"\
    01234\");\n\n     //exhaust the matcher\n     while (m1.find()){\n      System.out.println(\"\
    \\t\\t\" + m1.group());\n     }\n     //now reset the matcher with new data\n\
    \     m1.reset(\"56789\");\n     System.out.println(\"After resetting the Matcher\"\
    );\n     //iterate through the matcher again.\n     //this would not be possible\
    \ without\n     while (m1.find()){\n      System.out.println(\"\\t\\t\" + m1.group());\n\
    \     }\n  }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\n[Output 2-3](#LiB0016.html#ch02ex03)\
    \ shows the output of this method.\n\nOutput 2-3: Output for the Matcher.reset(CharSequence)\
    \ Example\n\n| **![Start example](_1.gif)** |\n\n```\n\nAfter resetting the Matcher\n\
    \n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\n### public int start()\n\n\
    The start method returns the starting index of the last successful match the Matcher\
    \ object had. [Listing 2-9](#LiB0016.html#ch02list09) demonstrates the use of\
    \ the Start method. The code in this listing finds the starting index of the word\
    \ *Bond* in the candidate *My* *name is Bond. James Bond.*.\n\nListing 2-9: Matcher.start()\
    \ Example\n\n| **![Start example](_1.gif)** |\n\n```\n/**\n * Demonstrates the\
    \ usage of the\n * Matcher.start() method\n */\npublic class MatcherStartExample{\n\
    \  public static void main(String args[]){\n      test();\n  }\n  public static\
    \ void test(){\n     //create a Matcher and use the Matcher.start() method\n \
    \    String candidateString = \"My name is Bond. James Bond.\";\n     String matchHelper[]\
    \ =\n      {\"          ^\",\"                      ^\"};\n     Pattern p = Pattern.compile(\"\
    Bond\");\n     Matcher matcher = p.matcher(candidateString);\n\n     //Find the\
    \ starting point of the first 'Bond'\n      matcher.find();\n      int startIndex\
    \ = matcher.start();\n      System.out.println(candidateString);\n      System.out.println(matchHelper[0]\
    \ + startIndex);\n\n     //Find the starting point of the second 'Bond'\n    \
    \  matcher.find();\n      int nextIndex = matcher.start();\n      System.out.println(candidateString);\n\
    \      System.out.println(matchHelper[1] + nextIndex);\n}\n```\n\n| **![End example](_1.gif)**\
    \ |\n\n|  |\n\n[Output 2-4](#LiB0016.html#ch02ex04) shows the output of running\
    \ the start() method.\n\nOutput 2-4: Output for the Matcher.start() Example\n\n\
    | **![Start example](_1.gif)** |\n\n```\nMy name is Bond. James Bond.\n      \
    \    ^11\nMy name is Bond. James Bond.\n                      ^23\n```\n\n| **![End\
    \ example](_1.gif)** |\n\n|  |\n\nIf you execute another find() method\n\n```\n\
    matcher.find();\n```\n\nand then execute start()\n\n```\nint nonIndex = matcher.start();\
    \ //throws IllegalStateException\n```\n\nthe start() method will throw an IllegalStateException.\
    \ I'm surprised that it doesn't simply return a negative number to indicate an\
    \ unsuccessful match. Use the boolean returned by the matches() method to determine\
    \ whether you should call methods such as start()."
  trans: "\n### public Matcher reset()\n\n`reset()` 方法会清除调用它的 `Matcher` 对象中的所有状态信息。实际上，该\
    \ `Matcher` 会被恢复到最初获取其引用时的状态，如清单 2-7 所示。\n\n清单 2-7: Matcher.reset 示例\n\n| **![示例开始](img/_1.gif)**\
    \ |\n\n```\nimport java.util.regex.*;\n/**\n * 演示 Matcher.reset() 方法的使用\n */\n\
    public class MatcherResetExample{\n  public static void main(String args[]){\n\
    \      test();\n  }\n  public static void test(){\n     //创建一个模式，并获取一个匹配器\n  \
    \   Pattern p = Pattern.compile(\"\\\\d\");\n     Matcher m1 = p.matcher(\"01234\"\
    );\n\n     //耗尽匹配器\n     while (m1.find()){\n      System.out.println(\"\\t\\\
    t\" + m1.group());\n     }\n     //现在将匹配器重置为其原始状态\n     m1.reset();\n     System.out.println(\"\
    重置匹配器后\");\n     //再次遍历匹配器。\n     //如果没有清除状态，这是不可能的\n     while (m1.find()){\n\
    \      System.out.println(\"\\t\\t\" + m1.group());\n     }\n  }\n}\n```\n\n|\
    \ **![示例结束](img/_1.gif)** |\n\n|  |\n\n输出 2-2 展示了此方法的输出。\n\n输出 2-2: Matcher.reset\
    \ 示例的输出\n\n| **![示例开始](img/_1.gif)** |\n\n```\n\n重置匹配器后\n\n```\n\n| **![示例结束](img/_1.gif)**\
    \ |\n\n|  |\n\n如果匹配器没有被重置，你将无法再次遍历其元素。\n\n### public Matcher reset(CharSequence\
    \ input)\n\n`reset(CharSequence input)` 方法会清除调用它的 `Matcher` 对象的状态，并用新的输入替换候选字符串。这与创建一个新的\
    \ `Matcher` 对象效果相同，只是没有那么多相关的开销。这可以带来有用的优化，也是我经常使用的一种方法。清单 2-8 演示了此方法的使用。\n\n\
    清单 2-8: Matcher.reset(CharSequence) 示例\n\n| **![示例开始](img/_1.gif)** |\n\n```\n\
    import java.util.regex.*;\n/**\n * 演示 Matcher.reset(CharSequence) 方法的使用\n */\n\
    public class MatcherResetCharSequenceExample{\n  public static void main(String\
    \ args[]){\n      test();\n  }\n  public static void test(){\n     String output=\"\
    \";\n     //创建一个模式，并获取一个匹配器\n     Pattern p = Pattern.compile(\"\\\\d\");\n  \
    \   Matcher m1 = p.matcher(\"01234\");\n\n     //耗尽匹配器\n     while (m1.find()){\n\
    \      System.out.println(\"\\t\\t\" + m1.group());\n     }\n     //现在用新数据重置匹配器\n\
    \     m1.reset(\"56789\");\n     System.out.println(\"重置匹配器后\");\n     //再次遍历匹配器。\n\
    \     //如果没有重置，这是不可能的\n     while (m1.find()){\n      System.out.println(\"\\\
    t\\t\" + m1.group());\n     }\n  }\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n\
    |  |\n\n输出 2-3 展示了此方法的输出。\n\n输出 2-3: Matcher.reset(CharSequence) 示例的输出\n\n| **![示例开始](img/_1.gif)**\
    \ |\n\n```\n\n重置匹配器后\n\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n### public\
    \ int start()\n\n`start()` 方法返回 `Matcher` 对象上一次成功匹配的起始索引。清单 2-9 演示了 `start()`\
    \ 方法的使用。此清单中的代码在候选字符串 *My name is Bond. James Bond.* 中查找单词 *Bond* 的起始索引。\n\n清单\
    \ 2-9: Matcher.start() 示例\n\n| **![示例开始](img/_1.gif)** |\n\n```\n/**\n * 演示 Matcher.start()\
    \ 方法的使用\n */\npublic class MatcherStartExample{\n  public static void main(String\
    \ args[]){\n      test();\n  }\n  public static void test(){\n     //创建一个 Matcher\
    \ 并使用 Matcher.start() 方法\n     String candidateString = \"My name is Bond. James\
    \ Bond.\";\n     String matchHelper[] =\n      {\"          ^\",\"           \
    \           ^\"};\n     Pattern p = Pattern.compile(\"Bond\");\n     Matcher matcher\
    \ = p.matcher(candidateString);\n\n     //找到第一个 'Bond' 的起始点\n      matcher.find();\n\
    \      int startIndex = matcher.start();\n      System.out.println(candidateString);\n\
    \      System.out.println(matchHelper[0] + startIndex);\n\n     //找到第二个 'Bond'\
    \ 的起始点\n      matcher.find();\n      int nextIndex = matcher.start();\n      System.out.println(candidateString);\n\
    \      System.out.println(matchHelper[1] + nextIndex);\n}\n```\n\n| **![示例结束](img/_1.gif)**\
    \ |\n\n|  |\n\n输出 2-4 展示了运行 `start()` 方法的输出。\n\n输出 2-4: Matcher.start() 示例的输出\n\
    \n| **![示例开始](img/_1.gif)** |\n\n```\nMy name is Bond. James Bond.\n         \
    \ ¹¹\nMy name is Bond. James Bond.\n                      ²³\n```\n\n| **![示例结束](img/_1.gif)**\
    \ |\n\n|  |\n\n如果你执行另一个 `find()` 方法\n\n```\nmatcher.find();\n```\n\n然后执行 `start()`\n\
    \n```\nint nonIndex = matcher.start(); //抛出 IllegalStateException\n```\n\n`start()`\
    \ 方法将抛出一个 `IllegalStateException`。我很惊讶它没有简单地返回一个负数来表示匹配失败。请使用 `matches()` 方法返回的布尔值来确定是否应该调用诸如\
    \ `start()` 之类的方法。\n"
- fmt: "### `public int start(int group)`\n\nThis method allows you to specify which\
    \ subgroup within a match you're interested in. If there are no matches, or if\
    \ no matches have been attempted, this method throws an `IllegalStateException`.\
    \ [Listing 2-10](#LiB0016.html#ch02list10) demonstrates the use of the `start(int)`\
    \ method shortly. But before examining the code, let's take a step back and consider\
    \ what the code is actually trying to demonstrate.\n\n**Listing 2-10: `Matcher.start(int)`\
    \ Example**\n\n```\nimport java.util.regex.*;\n/**\n * Demonstrates the usage\
    \ of the\n * Matcher.start(int) method\n */\npublic class MatcherStartParamExample{\n\
    \  public static void main(String args[]){\n      test();\n  }\n  public static\
    \ void test(){\n     //create a Pattern\n      Pattern p = Pattern.compile(\"\
    B(ond)\");\n\n//create a Matcher and use the Matcher.start(int) method\n     String\
    \ candidateString = \"My name is Bond. James Bond.\";\n     //create a helpful\
    \ index for the sake of output\n     String matchHelper[] =\n                \
    \             {\"          ^\",\n                              \"           ^\"\
    ,\n                              \"                      ^\",\n              \
    \                \"                       ^\"};\n     Matcher matcher = p.matcher(candidateString);\n\
    \     //Find the starting point of the first 'B(ond)'\n      matcher.find();\n\
    \      int startIndex = matcher.start(0);\n      System.out.println(candidateString);\n\
    \      System.out.println(matchHelper[0] + startIndex);\n\n//find the starting\
    \ point of the first subgroup (ond)\n      int nextIndex = matcher.start(1);\n\
    \      System.out.println(candidateString);\n      System.out.println(matchHelper[1]\
    \ + nextIndex);\n\n//Find the starting point of the second 'B(ond)'\n      matcher.find();\n\
    \      startIndex = matcher.start(0);\n      System.out.println(candidateString);\n\
    \      System.out.println(matchHelper[2] + startIndex);\n      //find the starting\
    \ point of the second subgroup (ond)\n      nextIndex = matcher.start(1);\n  \
    \    System.out.println(candidateString);\n      System.out.println(matchHelper[3]\
    \ + nextIndex);\n  }\n}\n```\n\nIn the following example, the regex pattern is\
    \ `B(ond)`, which means that you have a subgroup within the pattern (the parentheses\
    \ indicate a subgroup). The following is the portion of the candidate parsed when\
    \ `find()` is called for the first time:\n\n![](fig96_01.jpg)\n\nThus, when you\
    \ call the `start(0)` method, you're implicitly calling it only for the region\
    \ that has already been parsed, which is outlined in the box. As far as the `Matcher`\
    \ is concerned, this boxed region is the only one we can currently discuss. This\
    \ is simply the nature of the `find` method, and it has nothing to do with the\
    \ `start(int)` method yet.\n\nThe `start(0)` method returns the index of the first\
    \ character in `group(0)`, which is the *B* in *Bond*. `group(0)` is circled in\
    \ the following image.\n\n![](fig97_01.jpg)\n\nSimilarly, when you call `start(1)`,\
    \ you're calling it only for the region that has already been parsed—again, the\
    \ boxed region in the preceding image. This time, you're asking for the second\
    \ grouping in the parsed region. The `start(1)` method returns the index of the\
    \ first character in `group(1)`, which is the *o* in *Bond*. `group(1)` is circled\
    \ in the following image:\n\n![](fig97_02.jpg)\n\nNext, you call `matcher.find()`\
    \ again, which results in a new region of the candidate string coming under consideration,\
    \ as shown in the following image:\n\n![](fig97_03.jpg)\n\nCalling the `start(0)`\
    \ method here implicitly calls it only for the new region that has already been\
    \ parsed, which appears in the box in the preceding image. This is the only region\
    \ the associated `Matcher` will consider. `start(0)` returns the index of first\
    \ character in `group(0)`, which is the *B* in *Bond*. `group(0)` is circled in\
    \ the following image:\n\n![](fig97_04.jpg)\n\nAgain, calling `start(1)` asks\
    \ the `Matcher` to consider only the new region that has been parsed—again, the\
    \ boxed region. This time, you're asking for the second grouping in the parsed\
    \ region. `start(1)` returns the index of first character in `group(1)`, which\
    \ is the *o* in *Bond*. `group(1)` is circled in the boxed region.\n\n![](fig97_05.jpg)\n\
    \nWhen you consider the process visually, it's easy to understand how the `start(int)`\
    \ method interacts with groups, group numbers, and the `find()` method. `find()`\
    \ parses just enough of the candidate string for all groups to match and works\
    \ in that limited region. Keep this in mind as you read through [Listing 2-10](#LiB0016.html#ch02list10).\
    \ [Listing 2-10](#LiB0016.html#ch02list10) is a fully working example of the algorithm\
    \ discussed in this section. Please refer back to the preceding images as necessary\
    \ when you read the example.\n\n[Output 2-5](#LiB0016.html#ch02ex05) shows the\
    \ output of running the `start()` method.\n\n**Output 2-5: Output for the `Matcher.start(int)`\
    \ Example**\n\n```\nMy name is Bond. James Bond.\n          ^11\nMy name is Bond.\
    \ James Bond.\n          ^12\nMy name is Bond. James Bond.\n                 \
    \     ^23\nMy name is Bond. James Bond.\n                       ^24\n```\n\nIf\
    \ you execute another `find()` method\n\n```\nmatcher.find();\n```\n\nand then\
    \ execute `start()`\n\n```\nint nonIndex = matcher.start(0); //throws IllegalStateException\n\
    ```\n\nthe `start(int)` method will throw an `IllegalStateException` because the\
    \ `find()` method wasn't successful. Similarly, it will throw an `IndexOutOfBoundsException`\
    \ if you try to refer to a group number that doesn't exist.\n\n### `public int\
    \ end()`\n\nThe `end` method returns the ending index of the last successful match\
    \ the `Matcher` object had plus 1. If no matches exist, or if no matches have\
    \ been attempted, this method throws an `IllegalStateException`. [Listing 2-11](#LiB0016.html#ch02list11)\
    \ demonstrates the use of the `end` method.\n\n**Listing 2-11: `Matcher.end()`\
    \ Example**\n\n```\n/**\n * Demonstrates the usage of the\n * Matcher.end() method\n\
    \ */\npublic class MatcherEndExample{\n  public static void main(String args[]){\n\
    \      test();\n  }\n  public static void test(){\n     //create a Matcher and\
    \ use the Matcher.end() method\n     String candidateString = \"My name is Bond.\
    \ James Bond.\";\n     String matchHelper[] =\n      {\"               ^\",\"\
    \                           ^\"};\n     Pattern p = Pattern.compile(\"Bond\");\n\
    \     Matcher matcher = p.matcher(candidateString);\n\n     //Find the end point\
    \ of the first 'Bond'\n      matcher.find();\n      int endIndex= matcher.end();\n\
    \      System.out.println(candidateString);\n      System.out.println(matchHelper[0]\
    \ + endIndex);\n\n     //Find the end point of the second 'Bond'\n      matcher.find();\n\
    \      int nextIndex = matcher.end();\n      System.out.println(candidateString);\n\
    \      System.out.println(matchHelper[1] + nextIndex);\n  }\n}\n```\n\n[Output\
    \ 2-6](#LiB0016.html#ch02ex06) shows the output of running the `end` method.\n\
    \n**Output 2-6: Output for the `Matcher.end()` Example**\n\n```\nMy name is Bond.\
    \ James Bond.\n              ^15\nMy name is Bond. James Bond.\n             \
    \             ^27\n```\n\nIf you execute another `find` method\n\n```\nmatcher.find();\n\
    ```\n\nand then execute `end`\n\n```\nint nonIndex = matcher.end(); //throws IllegalStateException\n\
    ```\n\nthe `end` method will throw an `IllegalStateException`, because there isn't\
    \ a valid group to find the end of."
