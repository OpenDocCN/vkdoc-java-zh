    \ mechanism should you use? The next few sections discuss some options.\n\n###\
    \ Don't Use Normal Property Files to Store Patterns\n\nAt first glance, the solution\
    \ to storing patterns externally seems to be property files. They're already in\
    \ place, tried and true, easy to use, easy to modify, intuitive in format, and\
    \ object oriented. However, Java property files are, unfortunately, not quite\
    \ up to the task, because of three very strong objections.\n\nThe first objection\
    \ is that property values need to be delimited exactly as Strings need to be delimited\
    \ in order to work properly. That is, the pattern ***\\w*** would have to be stored\
    \ as *\\\\w*, and the pattern ***^([a-zA-Z0-9_\\-\\.]+)@((\\*** ***[[0-9]{1,3}\\\
    .[0-9]{1,3}\\.[0-9]{1,3}\\.)|(([a-zA-Z0-9\\-]+\\.)+))([a-zA-Z]{2,4}|*** ***[0-9]{1,3})(\\\
    ]?)$*** becomes the unwieldy\n\n```\n^([a-zA-Z0-9_\\\\-\\\\.]+)@((\\\\[[0-9]{1,3}\\\
    \\.[0-9]{1,3}\\\\.[0-\n9]{1,3}\\\\.)|(([a-zA-Z0-9\\\\-]+\\\\.)+))([a-zA-Z]{2,4}|[0-\n\
    9]{1,3})(\\\\]?)$\n```\n\nThis is hardly an improvement as far as legibility is\
    \ concerned.\n\nSecond, Properties objects preprocess certain characters, including\
    \ ***\\t***, ***\\n***, and ***\\\\***. That is, you have to understand the internal\
    \ mechanisms of how the Properties object stores \"special\" characters before\
    \ you use them to store your regex pattern. This is hardly an improvement, as\
    \ far as abstraction is concerned.\n\nFinally, property files internally use the\
    \ *\\* character to delimit the end of a line, so that it can be continued on\
    \ the next line. Thus, the property file entry\n\n```\nProduce = carrots, \\\n\
    lettuce\n```\n\nis read as\n\n```\nProduce = carrots, lettuce \n```\n\nAccordingly,\
    \ using Properties objects actually increases the complexity of the pattern, because\
    \ it introduces new things you have to know about in addition to the regex. Again,\
    \ this is hardly an improvement as far as ease of maintenance is concerned. All\
    \ things considered, using property files to store regex patterns seems like an\
    \ invitation for bugs. We can do better.\n\n### Don't Use XML to Store Patterns\n\
    \nXML is also a reasonable candidate for external storage of regex patterns. On\
    \ the positive side, XML is an easy, universally accepted way to keep external\
    \ system data, and there are many ways to access that data. As a matter of fact,\
    \ J2SE 1.4 offers the extraordinarily useful XMLEncoder and XMLDecoder classes,\
    \ which make it easier than ever to persist and retrieve XML data. XMLEncoder\
    \ and XMLDecoder are new Java classes that can help store JavaBeans as serialized\
    \ XML—better yet, the XML is human readable and maintainable, so changing the\
    \ XML actually changes the attributes of the object when it is deserialized. Moreover,\
    \ depending on which XML persistence mechanism you use, the XML parsers may not\
    \ require you to Java-delimit your patterns.\n\nThere are two big problems with\
    \ the XML persistence approach, however. The first problem is that the easiest\
    \ XML persistence mechanism, the XMLEncoder and XMLDecoder classes, decorate Strings\
    \ as they're stored. Thus, the *<* character becomes *&lt*, *>* becomes *&gt*,\
    \ and so on. Second, the XML persistence mechanism, simply by virtue of being\
    \ XML, has a lot of cluttering metadata that isn't germane to regex. But the proof,\
    \ as they say, is in the pudding. To illustrate this point, let's try an XML-based\
    \ approach in the [next section](#LiB0036.html#ch04lev2sec3) and see how it works\
    \ out."
  trans: "\n## 将模式存储于外部文件\n\n将正则表达式模式描述存储于外部文件具有三个重要优势。首先，模式无需为字符串构造函数再次进行转义，因此更易于阅读。其次，这是第一点的直接推论，即它使在代码中使用通用的、非\
    \ Java 转义的正则表达式变得更加容易。第三，将实际模式提取到外部文件后，你可以在以后更改模式，而无需重新编译该类。\n\n|  | 注意 | 在此上下文中，当我使用术语“Java\
    \ 转义”时，我指的是在字符串中对字符进行双重转义。 |\n\nJava 正则表达式模式可能有点令人困惑，尤其是对于那些不熟悉字符串和正则表达式转义符如何协同工作的人来说。例如，考虑以下来自\
    \ [`www.regexlib.com`](http://www.regexlib.com) 的免费电子邮件描述符。要准确解析出 ***^([a-zA-Z0-9_\\\
    -\\.]+)@((\\[[0-9]{1,3}\\.*** ***[0-9]{1,3}\\.[0-9]{1,3}\\.)|(([a-zA-Z0-9\\-]+\\\
    .)+))([a-zA-Z]{2,4}|[0-9]{1,3})(\\]?)$*** 的含义已经够困难了，更不用说还要加上字符串对象构造函数所需的那些略显笨拙的\
    \ *\\\\* 字符。这足以让你重新考虑是否要使用正则表达式。\n\n此外，将正则表达式改为 Java 转义字符串的过程引入了“胖手指”风险。毫不奇怪，因为你的\
    \ Java 正则表达式看起来不常规，所以更难从正则表达式专家那里获得帮助，他们中的大多数人可能更熟悉 Perl。\n\n同样非常可能的是，随着需求的变化，你可能需要更改正则表达式而不更改代码的任何其他部分。因此，将正则表达式模式存储在一个外部文件中，然后在需要时检索它们是一个好主意。这提供了一石二鸟的机会，因为你可以设想将正则表达式模式存储在外部，并且以不需要双重转义的方式存储。但是你应该使用哪种持久化机制呢？接下来的几节将讨论一些选项。\n\
    \n### 不要使用普通属性文件存储模式\n\n乍一看，将模式存储在外部文件的解决方案似乎是属性文件。它们已经就位，久经考验，易于使用，易于修改，格式直观，并且是面向对象的。然而，不幸的是，Java\
    \ 属性文件并不完全胜任这项任务，原因有三个非常强烈的反对意见。\n\n第一个反对意见是，属性值需要像字符串一样进行转义才能正常工作。也就是说，模式 ***\\\
    w*** 必须存储为 *\\\\w*，而模式 ***^([a-zA-Z0-9_\\-\\.]+)@((\\*** ***[[0-9]{1,3}\\.[0-9]{1,3}\\\
    .[0-9]{1,3}\\.)|(([a-zA-Z0-9\\-]+\\.)+))([a-zA-Z]{2,4}|*** ***[0-9]{1,3})(\\]?)$***\
    \ 则变成了笨拙的\n\n```\n^([a-zA-Z0-9_\\\\-\\\\.]+)@((\\\\[[0-9]{1,3}\\\\.[0-9]{1,3}\\\
    \\.[0-\n9]{1,3}\\\\.)|(([a-zA-Z0-9\\\\-]+\\\\.)+))([a-zA-Z]{2,4}|[0-\n9]{1,3})(\\\
    \\]?)$\n```\n\n就可读性而言，这几乎算不上改进。\n\n其次，Properties 对象会预处理某些字符，包括 ***\\t***、***\\\
    n*** 和 ***\\\\***。也就是说，在使用 Properties 对象存储正则表达式模式之前，你必须了解 Properties 对象如何存储“特殊”字符的内部机制。就抽象性而言，这几乎算不上改进。\n\
    \n最后，属性文件内部使用 *\\* 字符来表示一行的结束，以便可以延续到下一行。因此，属性文件条目\n\n```\nProduce = carrots,\
    \ \\\nlettuce\n```\n\n被读取为\n\n```\nProduce = carrots, lettuce \n```\n\n因此，使用 Properties\
    \ 对象实际上增加了模式的复杂性，因为它引入了除正则表达式之外你还必须了解的新内容。同样，就易于维护而言，这几乎算不上改进。综合考虑，使用属性文件存储正则表达式模式似乎是在招致错误。我们可以做得更好。\n\
    \n### 不要使用 XML 存储模式\n\nXML 也是正则表达式模式外部存储的一个合理候选方案。从积极的方面来看，XML 是一种简单、普遍接受的保存外部系统数据的方式，并且有许多访问这些数据的方法。事实上，J2SE\
    \ 1.4 提供了极其有用的 XMLEncoder 和 XMLDecoder 类，使得持久化和检索 XML 数据比以往任何时候都更容易。XMLEncoder\
    \ 和 XMLDecoder 是新的 Java 类，可以帮助将 JavaBeans 存储为序列化的 XML——更好的是，XML 是人类可读和可维护的，因此更改\
    \ XML 实际上会在对象反序列化时更改其属性。此外，根据你使用的 XML 持久化机制，XML 解析器可能不需要你对模式进行 Java 转义。\n\n然而，XML\
    \ 持久化方法有两个大问题。第一个问题是，最简单的 XML 持久化机制，即 XMLEncoder 和 XMLDecoder 类，会在存储时对字符串进行修饰。因此，*<*\
    \ 字符变成 *&lt*，*>* 变成 *&gt*，等等。其次，XML 持久化机制，仅仅因为它是 XML，就包含了许多与正则表达式无关的杂乱元数据。但俗话说，事实胜于雄辩。为了说明这一点，让我们在下一节中尝试一种基于\
    \ XML 的方法，看看效果如何。\n"
- fmt: "#### XML Persistence Example\n\nBecause you want to try storing your regular\
    \ expressions as XML, you'll create a regex-friendly JavaBean, say `Regex.java`,\
    \ that has two member variables: a `String` to hold the regex itself and a `String\
    \ description` to explain what it's supposed to do. [Listing 4-2](#LiB0036.html#ch04list02)\
    \ lists the code for the `Regex` bean. The idea is to easily store the `Regex`\
    \ bean as XML by using `XMLEncoder`, thus making modifications to the XML easier.\n\
    \n**Listing 4-2: The Regex Bean**\n\n```\n/**\n* Holds a regex-friendly object,\
    \ so that we can try\n* persisting regex descriptions as XML\n*/\npublic class\
    \ Regex implements java.io.Serializable {\n\n    /**\n    * sets the String description\n\
    \    *\n    *@param String description\n    */\n    public void setDescription(String\
    \ description){\n        this.description = description;\n    }\n\n    /**\n \
    \   * gets String description\n    *\n    *@return String description\n    */\n\
    \    public String getDescription(){\n        return this.description;\n    }\n\
    \n    /**\n    * sets the String regex\n    *\n    *@param String regex\n    */\n\
    \    public void setRegex(String regex){\n        this.regex = regex;\n    }\n\
    \n    /**\n    * gets String regex\n    *\n    *@return String regex\n    */\n\
    \    public String getRegex(){\n        return this.regex;\n    }\n\n    private\
    \ String regex;\n    private String description;\n}\n```\n\nNext, you write the\
    \ persistence code. I'm not going to delve into how to use the `XMLEncoder` and\
    \ `XMLDecoder` objects; that is both off-topic and very easy to figure out from\
    \ reading [Listing 4-3](#LiB0036.html#ch04list03). For a reference on `XMLEncoder`\
    \ and `XMLDecoder`, please review Sun's documentation.\n\n**Listing 4-3: The Persistence\
    \ Code**\n\n```\nimport java.io.*;\nimport java.beans.*;\n\n/**\n* Helps persist\
    \ a Serializable object to XML\n* and back again.\n*/\npublic class XMLHelper{\n\
    \    public static void main(String args[]){\n        Regex regex = new Regex();\n\
    \        regex.setRegex(\"<((?i)TITLE>)(.*?)</\\\\1\");\n\n        String desc\
    \ =\n        \"extracts the title element from an html page\";\n\n        regex.setDescription(desc);\n\
    \n        saveXML(regex, \"htmlTitle.xml\");\n    }\n\n    /**\n    * Saves the\
    \ Serializable as an XML file\n    * @param ser the object to persist\n    * @param\
    \ fileName the file to save it to.\n    */\n    public static void saveXML(Serializable\
    \ ser, String fileName){\n        try{\n            XMLEncoder e = new XMLEncoder(\n\
    \            new BufferedOutputStream(\n            new FileOutputStream(fileName)));\n\
    \            e.writeObject(ser);\n            e.close();\n        }\n        catch(IOException\
    \ ioe){\n            ioe.printStackTrace();\n        }\n    }\n\n    /**\n   \
    \ * get the Serializable from XML file\n    * @param fileName the file to get\
    \ the data from.\n    * @return ser the object to persist\n    */\n    public\
    \ static Serializable getXML(String fileName){\n        Serializable retval= null;\n\
    \        try{\n            XMLDecoder d = new XMLDecoder(\n            new BufferedInputStream(\n\
    \            new FileInputStream(fileName)));\n            retval = (Serializable)d.readObject();\n\
    \            d.close();\n        }\n        catch(IOException ioe){\n        \
    \    ioe.printStackTrace();\n        }\n        return retval;\n    }\n}\n```\n\
    \nThe regex pattern you're storing in this case, `<((?i)TITLE>)(.*?)</\\1`, extracts\
    \ the content of the first title element from an HTML file. See the \"[FAQs](#LiB0040.html#452)\"\
    \ section for a precise breakdown of how this works.\n\nThe `XMLHelper` class\
    \ has two methods, `saveXML` and `getXML`, which persist and retrieve the state\
    \ of the object. The XML for the `Regex` object stored appears in [Listing 4-4](#LiB0036.html#ch04list04).\n\
    \n**Listing 4-4: The XML State of the Persisted Regex Object**\n\n```\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<java version=\"1.4.1\" class=\"java.beans.XMLDecoder\"\
    >\n <object class=\"Regex\">\n  <void property=\"description\">\n   <string>extracts\
    \ the title element from an html page</string>\n  </void>\n  <void property=\"\
    regex\">\n     <string>&lt;((?i)TITLE&gt;)(.*?)&lt;/\\1</string>\n  </void>\n\
    \ </object>\n</java>\n```\n\nAs you can see, most of this information is human\
    \ legible and easy to maintain. If you were to change this XML file and deserialize\
    \ the object, the deserialized object would reflect your changes. That's pretty\
    \ powerful, but still not as robust as we would like. You'll notice the line\n\
    \n```\n <string>&lt;((?i)TITLE&gt;)(.*?)&lt;/\\1</string>\n```\n\nactually changed\
    \ the input, as predicted, from using the `<` character to using `&lt;` and the\
    \ `>` character to using `&gt;`. That's not particularly conducive to readability.\
    \ Also, you'll notice that the XML has a great deal of metadata about the type\
    \ of the object, the name of the method, and so on. We don't need any of this.\
    \ All in all, this is an improvement over the `Properties` approach, but we can\
    \ do better still.\n\n| Note | Observant readers may have noticed that manually\
    \ changing the XML element to be a CDATA section can change the issue of XML decoration\
    \ and still allow the object deserialization process to work. However, as far\
    \ as I know, that behavior isn't guaranteed to be platform independent, and it\
    \ still doesn't address the metadata clutter issue. |"
