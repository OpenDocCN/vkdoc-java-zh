  trans: "\n#### XML 持久化示例\n\n由于您希望尝试将正则表达式存储为 XML 格式，因此需要创建一个支持正则表达式的 JavaBean，例如\
    \ `Regex.java`，它包含两个成员变量：一个用于存储正则表达式本身的字符串，以及一个用于说明其用途的字符串描述。代码清单 4-2 列出了该 Regex\
    \ Bean 的代码。其思路是通过使用 `XMLEncoder` 轻松地将 Regex Bean 存储为 XML，从而简化对 XML 的修改。\n\n**代码清单\
    \ 4-2：Regex Bean**\n\n| **![示例开始](img/_1.gif)** |\n\n```\n/**\n* 持有一个支持正则表达式的对象，以便我们尝试\n\
    * 将正则表达式描述持久化为 XML\n*/\npublic class Regex implements java.io.Serializable {\n\
    \n/**\n    * 设置字符串描述\n    *\n    *@param String 描述\n    */\n    public void setDescription(String\
    \ description){\n        this.description = description;\n    }\n\n/**\n    *\
    \ 获取字符串描述\n    *\n    *@return String 描述\n    */\n    public String getDescription(){\n\
    \        return this.description;\n    }\n\n/**\n    * 设置字符串正则表达式\n    *\n   \
    \ *@param String 正则表达式\n    */\n    public void setRegex(String regex){\n    \
    \    this.regex = regex;\n    }\n\n/**\n    * 获取字符串正则表达式\n    *\n    *@return\
    \ String 正则表达式\n    */\n    public String getRegex(){\n        return this.regex;\n\
    \    }\n\nprivate String regex;\n    private String description;\n}\n```\n\n|\
    \ **![示例结束](img/_1.gif)** |\n\n|  |\n\n接下来，编写持久化代码。我不打算深入探讨如何使用 `XMLEncoder` 和\
    \ `XMLDecoder` 对象；这既偏离主题，又很容易通过阅读代码清单 4-3 来理解。有关 `XMLEncoder` 和 `XMLDecoder` 的参考资料，请查阅\
    \ Sun 的文档。\n\n**代码清单 4-3：持久化代码**\n\n| **![示例开始](img/_1.gif)** |\n\n```\nimport\
    \ java.io.*;\nimport java.beans.*;\n\n/**\n* 帮助将可序列化对象持久化为 XML\n* 并从中恢复。\n*/\n\
    public class XMLHelper{\n    public static void main(String args[]){\n       \
    \ Regex regex = new Regex();\n        regex.setRegex(\"<((?i)TITLE>)(.*?)</\\\\\
    1\");\n\nString desc =\n        \"从 HTML 页面中提取 title 元素\";\n\nregex.setDescription(desc);\n\
    \nsaveXML(regex, \"htmlTitle.xml\");\n\n}\n\n/**\n    * 将可序列化对象保存为 XML 文件\n  \
    \  * @param ser 要持久化的对象\n    * @param fileName 要保存到的文件名\n    */\n    public static\
    \ void saveXML(Serializable ser, String fileName){\n        try{\n           \
    \ XMLEncoder e = new XMLEncoder(\n            new BufferedOutputStream(\n    \
    \        new FileOutputStream(fileName)));\n            e.writeObject(ser);\n\
    \            e.close();\n        }\n        catch(IOException ioe){\n        \
    \    ioe.printStackTrace();\n        }\n\n}\n    /**\n    * 从 XML 文件中获取可序列化对象\n\
    \    * @param fileName 要从中获取数据的文件名\n    * @return ser 要持久化的对象\n    */\n    public\
    \ static Serializable getXML(String fileName){\n    Serializable retval= null;\n\
    \    try{\n        XMLDecoder d = new XMLDecoder(\n        new BufferedInputStream(\n\
    \        new FileInputStream(fileName)));\n        retval = (Serializable)d.readObject();\n\
    \        d.close();\n\n}\n    catch(IOException ioe){\n        ioe.printStackTrace();\n\
    \    }\n\nreturn retval;\n\n}\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\
    \n本例中存储的正则表达式模式 ***<((?i)TITLE>)(.*?)</\\1*** 用于从 HTML 文件中提取第一个 title 元素的内容。有关其工作原理的详细分解，请参阅“常见问题解答”部分。\n\
    \n`XMLHelper` 类包含两个方法：`saveXML` 和 `getXML`，分别用于持久化和检索对象的状态。存储的 Regex 对象的 XML 状态如代码清单\
    \ 4-4 所示。\n\n**代码清单 4-4：持久化后的 Regex 对象的 XML 状态**\n\n| **![示例开始](img/_1.gif)**\
    \ |\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<java version=\"1.4.1\"\
    \ class=\"java.beans.XMLDecoder\">\n <object class=\"Regex\">\n  <void property=\"\
    description\">\n   <string>从 HTML 页面中提取 title 元素</string>\n  </void>\n  <void\
    \ property=\"regex\">\n     <string>&lt;((?i)TITLE&gt;)(.*?)&lt;/\\1</string>\n\
    \  </void>\n </object>\n</java>\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n\
    如您所见，这些信息大部分是人类可读且易于维护的。如果您修改此 XML 文件并反序列化该对象，反序列化后的对象将反映您的更改。这相当强大，但尚未达到我们期望的健壮性。您会注意到这一行：\n\
    \n```\n <string>&lt;((?i)TITLE&gt;)(.*?)&lt;/\\1</string>\n```\n\n正如预期的那样，它实际上将输入中的\
    \ *<* 字符改为了 *&lt*，将 *>* 字符改为了 *&gt*。这并不利于可读性。此外，您还会注意到 XML 中包含大量关于对象类型、方法名称等的元数据。我们并不需要这些。总而言之，这比\
    \ Properties 方法有所改进，但我们还能做得更好。\n\n|  | 注意  | 细心的读者可能已经注意到，手动将 XML 元素更改为 CDATA\
    \ 段可以解决 XML 修饰问题，并且仍然允许对象反序列化过程正常工作。然而，据我所知，这种行为并不能保证跨平台一致，而且它仍然没有解决元数据杂乱的问题。\
    \ |\n"
- fmt: "### Use `FileChannels` and `ByteBuffers` to Store Patterns\n\nThe Java new\
    \ I/O (NIO) paradigm offers an easy and elegant solution for externalizing patterns.\
    \ Without digging too deeply into NIO, you can use the code in [Listing 4-5](#LiB0036.html#ch04list05)\
    \ to extract a regex pattern from a persisted file.\n\n**Listing 4-5:** Extract\
    \ a Non-Java-Delimited Regex Pattern from a File\n\n```\nimport java.util.regex.*;\n\
    import java.io.*;\nimport java.nio.*;\nimport java.nio.channels.*;\n\n/**\n* Provides\
    \ an easy mechanism for extracting the regex contents\n* of a file\n*/\npublic\
    \ class RegexHelper{\n\n/**\n   * Extracts the contents of the given file. This\n\
    \   * particular extraction process is specifically\n   * expecting the content\
    \ of the file to be a\n   * non-Java-delimited regex pattern.\n   *\n   * @param\
    \ fileName the name of the file that\n   * has the regex pattern.\n   * @returns\
    \ a string holding the content of the file\n   * @author Mehran Habibi\n   **/\n\
    \   public static String getRegex(String fileName){\n    String retval = null;\n\
    \    try\n    {\n        //open a connection to the file\n        FileInputStream\
    \ fis =\n        new FileInputStream(fileName);\n\n//get a file channel\n    \
    \    FileChannel fc = fis.getChannel();\n\n//create a ByteBuffer that is large\
    \ enough\n        //and read the contents of the file into it\n        ByteBuffer\
    \ bb = ByteBuffer.allocate((int)fc.size());\n\nfc.read(bb);\n        bb.flip();\n\
    \        //persist the content of the file as a String\n        retval = new String(bb.array());\n\
    \n//release the FileChannel\n        fc.close();\n        fc = null;\n\n}\n  \
    \ catch(IOException ioe)\n   {\n       ioe.printStackTrace();\n   }\n\nreturn\
    \ retval;\n   }\n}\n```\n\nOf course, it's not necessary to use `FileChannels`\
    \ here; any mechanism that performs a byte-level read of a file would have yielded\
    \ the same result. However, because reading bytes is so natural with NIO, it seems\
    \ like the best overall solution. The result here is that a file could contain\
    \ nothing but a pure regex pattern, without the Java delimitation, and still continue\
    \ to work properly.\n\n> **Note:** Make sure that the pattern doesn't have any\
    \ extra spaces or returns after the last character, as that will be read in as\
    \ part of the pattern proper and cause your searches to fail.\n\nOf course, this\
    \ isn't as friendly as it could be—it would be nice, for example, if you could\
    \ treat the file like a property file and define various keys in it. After all,\
    \ you don't want to be forced to have a separate file for each regex pattern.\
    \ For example, you could pass in a key, along with the filename, so that you could\
    \ store numerous patterns in the same file. With this in mind, add the overloaded\
    \ method `getRegex`, as shown in [Listing 4-6](#LiB0036.html#ch04list06).\n\n\
    **Listing 4-6:** Overloaded `getRegex` Method\n\n```\n/**\n  * Extracts the contents\
    \ of the given file at the given key.\n  * This particular extraction process\
    \ is specifically\n  * expecting the content of the file to be a\n  * non-Java-delimited\
    \ regex pattern.\n  *\n  * @param fileName the name of the file that\n  * has\
    \ the regex pattern.\n  * @param key the key that defines the regex in the file\n\
    \  * @returns a string holding the content of the file\n  * @author Mehran Habibi\n\
    \  **/\n  public static String getRegex(String fileName, String key){\n   String\
    \ retval = null;\n\n//get content of the file\n   String content = getRegex(fileName);\n\
    \n//if the file has content, then try to find the key\n   if (content != null)\n\
    \   {\n    //look for a beginning of line, followed by the key,\n    //followed\
    \ by an equal sign, and capture everything between\n    //that key and the end\
    \ of the line.\n    String keyRegex = \"^\"+key+\"=(.*)$\";\n\n//we expect the\
    \ output to have multiple lines\n    Pattern pattern = Pattern.compile(keyRegex,Pattern.MULTILINE);\n\
    \n//extract the matcher, and look for the value to the key\n    Matcher matcher\
    \ = pattern.matcher(content);\n\nif (matcher != null && matcher.find())\n    \
    \   retval = matcher.group(1);\n\n}\n\nreturn retval;\n    } \n```\n\nThe point\
    \ here is that you can use and write your regex patterns in a non-Java-specific\
    \ syntax, at least as far as the double delimiting of the `String` syntax is concerned.\
    \ Try testing this code with the sample data shown in [Listing 4-7](#LiB0036.html#ch04list07).\n\
    \n**Listing 4-7:** Sample Content of a Regex Cache File\n\n```\n#Email validator\
    \ that adheres directly to the specification\n#for email address naming. It allows\
    \ for everything from\n#ipaddress and country-code domains to very rare characters\n\
    #in the username.\nemail=^([a-zA-Z0-9_\\-\\.]+)@((\\[[0-9]{1,3}\\.[0-9]{1,3}\\\
    .[0-\n9]{1,3}\\.)|(([a-zA-Z0-9\\-]+\\.)+))([a-zA-Z]{2,4}|[0-\n9]{1,3})(\\]?)$\n\
    \n#Matches UK postcodes according to the following rules 1\\. LN NLL\n#eg N1 1AA\
    \ 2\\. LLN NLL eg SW4 0QL 3\\. LNN NLL eg M23 4PJ 4\\. LLNN NLL\n#eg WS14 0JT\
    \ 5\\. LLNL NLL eg SW1N 4TB 6\\. LNL NLL eg W1C 8LQ Thanks\n#to Simon Bell for\
    \ informin ...\nzip=^[a-zA-Z]{1,2}[0-9][0-9A-Za-z]{0,1} {0,1}[0-9][A-Za-z]{2}$\n\
    \n#This regular expression matches dates of the form XX/XX/YYYY\n#where XX can\
    \ be 1 or 2 digits long and YYYY is always 4\n#digits long.\ndates=^\\d{1,2}\\\
    /\\d{1,2}\\/\\d{4}$\n```\n\nThus, to extract a regex pattern, you would simply\
    \ write the following code:\n\n```\nString regex = getRegex(\"regexCache.txt\"\
    ,\"email\");\n```\n\nYou'll notice that the data cache file also allows comments.\
    \ You'll find these particularly useful as you drift away from the details of\
    \ the pattern itself after having written it.\n\nFinally, it should be noted that\
    \ there are several different and valid approaches to take here. One approach\
    \ would be to subclass the `Properties` file for yourself and offer a regex-friendly\
    \ implementation. In the future, I wouldn't be surprised if Sun decided to do\
    \ something like this or offer some other convenience mechanism for extracting\
    \ regex patterns from a file without requiring that the regex be Java-delimited.\
    \ In the meantime, [Listing 4-8](#LiB0036.html#ch04list08) provides a read-only\
    \ implementation of a custom property file reader that allows regex patterns to\
    \ be stored without being double delimited.\n\n**Listing 4-8:** Custom Property\
    \ File Reader\n\n```\n01  import java.util.Properties;\n02  import java.util.regex.*;\n\
    03  import java.util.*;\n04  import java.io.*;\n05  import java.nio.*;\n06  import\
    \ java.nio.channels.*;\n07  import java.util.logging.Logger;\n\n08  /**\n09  *\
    \ Provides a read-only extension of the java.util.properties file.\n10 * This\
    \ class is unique because it is especially designed to read in\n11 * regular expressions\
    \ that are not double delimited, as the String\n12 * class requires. Thus, \\\
    s is the actual string used to represent a\n13 * whitespace character, not \\\\\
    s. Accordingly, this class does not allow\n14 * the regex patterns to be modified\
    \ programmatically, nor does it\n15 * follow the normal property file convention\
    \ for \\n,\\t, etc., or\n16 * multiline properties. Please see the documentation\
    \ for the\n17 * load method\n18 */\n19 public class RegexProperties extends Properties{\n\
    20     private static Logger log = Logger.getAnonymousLogger();\n21     /**\n\
    22     * See load(FileInputStream inStream)\n23     *\n24     * @param String\
    \ the name of the file to load\n25     * @throws IOException if there's an IO\
    \ problem\n26     * @throws  PatternSyntaxException if the File format isn't properly\n\
    27     * formed, per the specification given above.\n28     */\n```"
