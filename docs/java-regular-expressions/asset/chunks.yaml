    | **^** | 行首字符 | 这是一个不可见字符。 |

    | **$** | 行尾字符 | 这是一个不可见字符。 |

    | **\b** | 单词边界 | 这是单词边界的位置。其使用需要谨慎，因为 ***\b*** 不匹配字符，而是匹配一个位置。因此，字符串 *anna marrie*
    不匹配正则表达式 ***anna\bmarie***。然而，它确实匹配 ***anna\b\smarrie***。这是因为在 *anna* 中最后一个 *a*
    之后的位置存在一个单词边界，并且恰好是空格字符，因此需要 ***\s*** 来匹配它，然后 *marie* 必须紧随其后。由于 ***\b*** 匹配一个位置，因此为其添加贪婪量词是没有意义的。所以，***\b+***、***\b\b\b\b\b***
    和 ***\b*** 匹配的内容完全相同。更复杂的是，在字符类中，***\b*** 表示退格字符。这在语法上是合法的（尽管有点别扭），因为单词边界在字符类中没有位置。因此，***[\b]***
    描述了一个退格字符，因为它被 *[* 和 *]* 包围。 |

    | **\B** | 非单词边界 | 这是单词边界的相反项，如上所述。 |

    | **\A** | 输入的开头 | ***\A*** 匹配输入的开头，但它不仅仅是 ***^*** 模式的同义词。当你在编译模式时使用 Pattern.MULTILINE
    标志时，这种区别就变得清晰了。***\A*** 匹配输入的开头，即文件的最开头。相比之下，当 Pattern.MULTILINE 标志激活时，***^***
    匹配每一行的开头。 |

    | **\Z** | 输入的结尾，不包括最后的 ***$***（如果有） | ***\Z*** 匹配输入的结尾，但它不仅仅是 ***$*** 字符的同义词。当你在编译模式时使用
    Pattern.MULTILINE 标志时，这种区别就变得清晰了。***\Z*** 匹配输入的结尾，即文件的最末尾。相比之下，当 Pattern.MULTILINE
    标志激活时，***$*** 匹配每一行的结尾。 |

    | **\G** | 上一次匹配的结尾 |   |

    | **\z** | 输入的结尾 | 其行为与使用大写字母 *Z* 的 ***\Z*** 完全相同，区别在于它还会捕获结束的 ***$*** 字符。 |


