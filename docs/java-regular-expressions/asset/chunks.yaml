  trans: "\n### 正向向后查找\n\n到目前为止，你已经探索了向右查看候选字符串以“向前窥视”并了解模式未来匹配情况的能力。同样，有时能够向左查看当前考虑的位置，以了解过去对特定模式的匹配情况也很有用。这就是*向后查找*的目的。\n\
    \n与向前查找类似，向后查找也有两种形式。*正向向后查找*确认当前左侧存在某个模式，而*负向向后查找*则确认当前模式左侧*不存在*某个模式。通过使用 ***(?<=***\
    \ 打开一个非捕获组来形成正向向后查找。因此，要确认当前表达式前面有两个数字，你可以使用以下正向向后查找：\n\n```\n(?<=\\d\\d).*\n\
    ```\n\n这确认了候选字符串前面连续有两个数字。它不会消耗这两个数字；然而，它的表现就像消耗了一样，因为*它们超出了捕获的范围*。这是因为表达式解析器已经越过了它们。也就是说，根据定义，解析器已经尝试匹配它们但失败了。如果它没有失败，它就会停止尝试寻找下一个匹配。\n\
    \n考虑候选字符串 *42 is the answer*。当正则表达式引擎将此候选字符串与模式 ***(?<=\\d\\d).**** 进行比较时，它首先检查第一个字符，即\
    \ *4*。由于 *4* 前面没有两个数字，因此被拒绝。接下来，引擎比较 *2* 字符。由于 *2* 前面也没有两个数字，因此也被丢弃。接着，正则表达式引擎检查候选字符串\
    \ *42 is the answer* 中 *2* 后面的空格字符。由于该空格字符前面确实有两个数字，即 *4* 和 *2*，正则表达式引擎愉快地开始匹配。当然，由于模式的剩余部分是\
    \ ***.****，因此所有剩余字符都被匹配。因此，*42* 后面的空格及其之后的所有内容都被捕获。但 *4* 和 *2* 没有被捕获，因为正则表达式引擎已经越过了它们。\n\
    \n由于正则表达式引擎已经越过了 *4* 和 *2* 字符，它不会匹配它们。这是一个重要且微妙的区别。向后查找与所有环视一样，都是非捕获的。然而，在这种情况下，它们表现得好像已经捕获了\
    \ *4* 和 *2* 字符。也就是说，字符 *4* 和 *2* 被排除在捕获集之外。但这只是因为它们已经被解析，而不是因为它们被捕获了。能够看穿这种假象非常重要。\n\
    \n清单 3-10 演示了一些使用正向向后查找的代码。目标是解析文档内容并提取其中使用的任何 URL。表 3-4 分解了所使用的正则表达式模式。\n\n表\
    \ 3-4：模式 (?<=http://)\\S+\n\n| **正则表达式** | **描述** |\n| (?<= | 打开一个正向向后查找组，包含 |\n\
    | h | 字符 *h* 后跟 |\n| t | 字符 *t* 后跟 |\n| t | 字符 *t* 后跟 |\n| p | 字符 *p* 后跟 |\n|\
    \ : | 字符 *:* 后跟 |\n| / | 字符 */* 后跟 |\n| / | 字符 */* 后跟 |\n| \\S | 一个非空格字符 |\n|\
    \ + | 重复一次或多次 |\n| * **中文释义：** 匹配一个 URL，前提是该 URL 前面有 *http://*。 |\n\n清单 3-10：简单的正向向后查找示例\n\
    \n| **![开始示例](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\npublic class\
    \ PositiveLookBehindExample{\n    public static void main(String args[])\n   \
    \ throws Exception\n    {\n\n//定义模式\n        String regex = \"(?<=http://)\\\\\
    S+\";\n\n//编译模式\n        Pattern pattern = Pattern.compile(regex);\n\nString candidate\
    \ = \"Apress 网站可以在以下地址找到 \";\n        candidate +=\"http://www.apress.com。在那里，\"\
    ;\n        candidate +=\"你可以找到一些行业最佳书籍的信息，包括\";\n        candidate +=\"畅销书《Sun\
    \ Certified Java Developer \";\n        candidate +=\" Exam with J2SE》(\";\n \
    \       candidate +=\"http://www.apress.com/book/bookDisplay.\";\n        candidate\
    \ +=\"html?bID=39) 以及其他书籍。\";\n\n//为候选字符串提取匹配器\n        Matcher matcher = pattern.matcher(candidate);\n\
    \n//如果找到 URL，在此处打印出来。\n        while (matcher.find()){\n            String msg\
    \ =\":\"+ matcher.group()+\":\";\n            System.out.println(msg);\n     \
    \   }\n    }\n} \n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n### 负向向后查找\n\n\
    *负向向后查找*确认当前模式左侧*不存在*某个模式。它们是一种告诉正则表达式引擎的方式：“我对候选字符串感兴趣，只要它前面没有这样那样的内容。”通过使用 ***(?<!***\
    \ 打开一个非捕获组来形成负向向后查找。\n\n负向向后查找不像其他环视那样直观，因此值得探讨它们实际的工作原理。例如，考虑以下负向向后查找：\n\n```\n\
    (?<!\\d\\d).*\n```\n\n上述模式似乎要求候选字符串前面不能连续有两个数字。然而，当你实际用字符串 *42 is the answer*\
    \ 测试它时，它会匹配整个候选字符串。这是怎么回事？\n\n问题在于候选字符串 *42 is the answer* 的第一个元素是 *4*。因此引擎会问自己：*4*\
    \ 字符前面是否有两个数字？由于答案是否定的，整个模式被匹配到 group(0) 中。请记住，***.**** 是一个贪婪量词，因此它会尽可能多地匹配——在这种情况下，就是整个候选字符串。\n\
    \n## 高效表达式的禅与艺术\n\n本节介绍一些可用于优化 J2SE 中正则表达式的技术。它旨在帮助你处理已有的正则表达式，并为编写新的正则表达式建立框架。本节中的建议，结合你自己的直觉以及对数据性质的积极认识，将帮助你优化自己的正则表达式。\n\
    \n### 尽可能使用非捕获组\n\n捕获组需要 JVM 跟踪它们。如果你需要提取组或在表达式后面需要反向引用它们，这会非常有用。然而，如果你纯粹出于逻辑目的使用组，那么将它们设为非捕获组是值得的，因为这可以节省内存使用。\n\
    \n前面给出的模式 ***(?:good|bad|terrible|great) morning*** 的示例将各种早晨分组到一个逻辑单元中，但不需要捕获它们。因此，该组是非捕获的，并在左括号内以\
    \ ***?:*** 开头。\n\n### 预检查候选字符串\n\n如果你正在查找特定字符串，你可以通过首先确保该字符串确实存在于候选字符串中来节省 CPU\
    \ 周期。例如，假设你想解析一个可能包含电子邮件地址的字符串，如果包含，你想提取电子邮件地址的域名。首先确保候选字符串包含 *@* 符号，然后再开始正则表达式搜索是合理的。因此，以下是一种检查是否需要编译模式的低成本方法：\n\
    \n```\nif (candidate.indexOf(\"@\")) //..尝试提取域名信息。\n```\n"
- fmt: '### Offer the Most Likely Alternative First


    Say your regular expression is designed to validate the title of members of an
    all-physicians'' health club. You expect 90 percent of your clients to have the
    title `Dr`, but some might not. Thus, your title-matching pattern should probably
    be something along the lines of `.*\b(?:Dr|Mr|Mrs|Miss|Brother|Mister) .*`.


    This pattern increases the likelihood of a successful match happening sooner rather
    than later, thus reducing the number of processes the regex engine has to step
    through. For example, imagine that the candidate string is `Please meet Dr Hana
    Saez`. The way the pattern is currently written, the engine will match the `D`,
    the `r`, the space, and everything thereafter on the first pass. Thus, it will
    never attempt `Mr`, `Mrs`, and so on.


    However, if the pattern had been `.*\b(?:Mr|Mrs|Miss|Brother|Mister| Dr) .*`,
    the engine would have stepped through the entire candidate string once for `Mr`,
    then again for `Mrs`, then again for `Miss`, then again for `Brother`, and so
    on until it finally matched `Dr`. The actual result would been the same, but the
    net path there would have been much more resource intensive.


    ### Be as Specific as Possible


    If you know that your regex pattern should only match numbers at a given point,
    then don''t use `\w` to define that part of the match—use `\d`. This will allow
    the regex engine to narrow the scope of its search and filter more quickly. Or,
    if you know that your pattern must contain a given word, then use that very word
    in the pattern. This is the same principle that makes it easier for you to write
    code to specific requirements. The more focused and detailed the requirements,
    the easier your job becomes.


    For example, say you know that your candidate string must start with a capital
    letter, with lowercase letters following the initial character. It''s more efficient
    to use a pattern such as `[A-Z][a-z]+` than it is use a pattern such as `\w*`.
    Both might work, but `[A-Z][a-z]+` allows the engine to produce an accurate result
    faster than `\w*`, because it can refuse to consider digits and lowercase letters
    for the first character, and refuse to consider digits and uppercase letters for
    the latter parts.


    The J2SE regex implementation is much faster with literal strings than it is with
    characters classes—it can literally zero-in on specific strings. Thus, if you''re
    looking for a number between 10 and 19, it''s more efficient to use `1\d` than
    to use `\d+`, `\d\d`, `\d{2}`, or any such variation.


    ### Specify the Position of Your Match


    If you know that the candidate string can only occur after a beginning of line,
    or right before an end of line, or after punctuation, then say so in your regex.
    The pattern `^Beth` will match faster and more efficiently than the pattern `Beth`,
    when you know that it must occur after a newline.


    This type of optimization can be particularly powerful because it allows the engine
    to stop searching after examining only the first two characters of the candidate
    string. Look for opportunities to take advantage of this sort of thing in your
    regex.


    ### Specify the Size of Your Match


    If you''re looking for a match that must be at least `n` characters long, then
    say so in your regex. Or, if you know that your match can''t be more then `m`
    characters long, say that too.


    For example, imagine that you''re parsing a large file for references to first
    names. It''s probably reasonable to assume that the names you want contain fewer
    than 20 characters. So, although you could use a pattern like `\b[A-Z][a-z]+`,
    it''s probably better to use something like `\b[A-Z][a-z]{1,20}`, because the
    engine can abandon any searches that are longer than 20 characters. Or, if you
    know that your candidate string must be six or more characters, it''s better to
    use `\w\w\w\w\w\w+` than `\w+`.


    |  | Note | J2SE regex finds specific repetitions much more quickly than quantified
    ones. Thus, `\w\w\w\w\w\w` is much faster than `\w{6}`. |


    ### Limit the Scope of Your Alternatives


    It''s generally more efficient to offer small alternatives than to offer large
    ones, and it''s better to offer them later than earlier. Thus, if you have the
    pattern `Good Morning|Good Evening`, you would be better served by the pattern
    `Good (?:Morning|Evening)`. In the latter example, the regex engine doesn''t have
    to make any decisions until after it has established that `Good` is part of the
    candidate string.


    In the former example, the engine might be obligated to look twice, even if the
    candidate string doesn''t contain the word `Good`. That is, even if the candidate
    string is `Bad year` and can''t possibly match, the pattern `Good Morning|Good
    Evening` searches twice anyway: once for `Good morning` and then again for `Good
    Evening`.


    ## Summary


    This chapter provided explanations, details, and examples of some of the more
    challenging tools and concepts in the J2SE regex package. The chapter discussed
    groups, subgroups, noncapturing groups, greedy qualifiers, positive qualifiers,
    reluctant qualifiers, positive lookaheads, negative lookaheads, positive lookbehinds,
    and negative lookbehinds. Finally, the chapter finished with a few tips for optimizing
    your expressions. The [next chapter](#LiB0033_split_000.html#402) will introduce
    some suggestions for working with regular expressions in an object-oriented language
    such as Java.


    ## FAQs


    | **Q:** | **How do I make a group noncapturing?** | [![To make a group noncapturing,
    insert ?: inside the opening parenthesis of the group. For example, change (\w)
    to (?:\w) .](question.gif)](#LiB0032.html#answer.N19) |

    | **Q:** | **Given the expression \w(\d(\w)), what''s the capturing index of the
    rightmost subgroup, (\w)?** | [![Groups are counted from left to right, starting
    with the opening parenthesis, and group(0) always refers to the whole regex pattern.
    Thus, the capturing index of subgroup (\w) is 2\. Accordingly, the capturing index
    of (\d(\w)) is group(2) .](question.gif)](#LiB0032.html#answer.N41) |

    | **Q:** | **How is group indexing affected when one of the groups is a noncapturing
    group?** | [![The noncapturing group isn''t counted in any way when group indexes
    are calculated.](question.gif)](#LiB0032.html#answer.N67) |


    ### Answers


    | [**A:**](#LiB0032.html#N19) | To make a group noncapturing, insert `?:` inside
    the opening parenthesis of the group. For example, change `(\w)` to `(?:\w)`.
    |

    | [**A:**](#LiB0032.html#N41) | Groups are counted from left to right, starting
    with the opening parenthesis, and `group(0)` always refers to the whole regex
    pattern. Thus, the capturing index of subgroup `(\w)` is 2\. Accordingly, the
    capturing index of `(\d(\w))` is `group(2)`. |

    | [**A:**](#LiB0032.html#N67) | The noncapturing group isn''t counted in any way
    when group indexes are calculated. |


