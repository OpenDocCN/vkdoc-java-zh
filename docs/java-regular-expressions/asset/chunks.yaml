  trans: "\n### public String[] split(CharSequence input)\n\n当你需要根据某些条件将字符串拆分为子字符串数组时，此方法特别有用。在概念上，它类似于\
    \ `StringTokenizer`。然而，它比 `StringTokenizer` 更强大，资源消耗也更高，因为它允许你的程序使用正则表达式作为拆分条件。\n\
    \n此方法始终至少返回一个元素。如果找不到拆分候选对象 `input`，则会返回一个字符串数组，其中恰好包含一个字符串，即原始输入 `input`。\n\n\
    如果可以找到 `input`，则会返回一个字符串数组。该数组包含每次出现 `input` 之后的所有子字符串。因此，对于模式\n\n```\nPattern\
    \ p = new Pattern.compile(\",\");\n```\n\n对于 *Hello, Dolly* 的 split 方法将返回一个包含两个元素的字符串数组。数组的第一个元素将包含字符串\
    \ *Hello*，第二个元素将包含字符串 *Dolly*。该字符串数组的获取方式如下：\n\n```\nString tmp[] = p.split(\"\
    Hello,Dolly\");\n```\n\n在这种情况下，返回的值为\n\n```\n//tmp =={ \"Hello\", \"Dolly\"}\n\
    ```\n\n在使用此方法时，有一些细微之处需要注意。如果候选字符串是 *Hello,Dolly*，并且在 *Dolly* 的 *y* 后面有一个尾随逗号，那么此方法仍然会返回两个元素：一个由\
    \ *Hello* 和 *Dolly* 组成的字符串数组。其隐含行为是尾随空格不会被返回。\n\n如果输入字符串是 *Hello,,,Dolly*，则生成的字符串数组将有四个元素。将\
    \ split 方法应用于 Pattern 的返回值是\n\n```\n// p.split(\"Hello,,,Dolly\") == {\"Hello\"\
    ,\"\",\"\",\"Dolly\"} \n```\n\nString 方法通过在模式前放置一个不可见的 ***^*** 并在其后放置一个 ***$***\
    \ 来进一步优化其搜索条件。\n\n### public String[] split(CharSequence input, int limit)\n\n\
    此方法的工作方式与 `Pattern.split(CharSequence input)` 完全相同，但有一个变化。第二个参数 `limit` 允许你控制返回的元素数量：\n\
    \n```\nLimit == 0\n```\n\n如果你指定第二个参数 `limit` 等于 0，那么此方法的行为与其重载版本完全相同：\n\n```\n\
    Limit >0\n```\n\n如果你只对特定数量的匹配感兴趣，请使用正数 limit。你应该使用数字 *1* 作为 limit。假设 Pattern **p**\
    \ 已针对字符串 `,` 进行了编译，如前所述。要拆分字符串 *Hello, Dolly, You, Are, My, Favorite* 并且只想要前两个标记，你可以这样使用：\n\
    \n```\nString[] tmp = pattern.split(\"Hello, Dolly, You, Are, My, Favorite\",3);\n\
    ```\n\n结果字符串的值将是：\n\n```\n//tmp[0] = \"Hello\", tmp[1] = \"Dolly\";\n```\n\n这里有趣的行为是返回了第三个元素，在本例中为\n\
    \n```\n//tmp[2] = \"You, Are, My, Favorite\";\n```\n\n使用正数 limit 可能会带来性能提升，因为当正则表达式引擎达到指定的匹配次数时，它可以停止搜索：\n\
    \n```\nLimit <0\n```\n\n为 limit 使用负数（任何负数）会告诉正则表达式引擎，你希望返回尽可能多的匹配项，*并且* 希望返回任何尾随空格（如果有）。因此，对于正则表达式模式\
    \ `,` 和候选字符串 *Hello,Dolly*，命令\n\n```\nString tmp[] = p.split(\"Hello,Dolly\",\
    \ -1); \n```\n\n的结果是\n\n```\n//tmp == {\"Hello\",\"Dolly\"};\n```\n\n然而，对于字符串\
    \ *Hello, Dolly,<space><space><space>*，在 *Dolly* 后面的逗号后有尾随空格，方法调用\n\n```\nString\
    \ tmp[] = p.split(\"Hello,Dolly,  \", -1);\n```\n\n的结果是\n\n```\n//tmp == {\"Hello\"\
    ,\"Dolly\",\"  \"};\n```\n\n请注意，负数 limit 的实际值并不重要。因此，\n\n```\np.split(\"Hello,Dolly\"\
    , -1);\n```\n\n完全等同于\n\n```\np.split(\"Hello,Dolly\", -100);\n```\n\n## 方法类方法\n\
    \n### public Pattern pattern()\n\n`pattern` 方法返回创建此特定 `Matcher` 对象的 `Pattern`。返回的\
    \ `Pattern` 不包含在编译模式时通过使用 `Pattern` 常量（例如 `Pattern.MULTILINE`）显式设置的任何标志。\n\n###\
    \ public Matcher reset()\n\n`reset()` 方法清除调用它的 `Matcher` 对象中的所有状态信息。实际上，`Matcher`\
    \ 会恢复到最初获得其引用时的状态。\n\n### public Matcher reset(CharSequence input)\n\n`reset(CharSequnce\
    \ input)` 方法清除调用它的 `Matcher` 对象的状态，并将候选字符串替换为新的输入 `input`。这与创建一个新的 `Matcher` 对象具有相同的效果，只是没有相关的开销。这种重用是一种有用的优化，也是我经常使用的一种方法。\n\
    \n### public int start()\n\n此方法返回匹配到的候选字符串的第一个字符的索引。如果没有匹配项，或者尚未尝试匹配，则会抛出 `IllegalStateException`。\n\
    \n### public int start(int group)\n\n此方法允许你指定匹配中感兴趣的特定子组，并返回该子组起始的第一个字符的索引。如果没有匹配项，或者尚未尝试匹配，则会抛出\
    \ `IllegalStateException`。如果你引用了不存在的组号，则会抛出 `IndexOutOfBoundsException`。\n\n###\
    \ public int end()\n\n`end` 方法返回 `Matcher` 对象最后一次成功匹配的结束索引加 1。如果没有匹配项，或者尚未尝试匹配，此方法会抛出\
    \ `IllegalStateException`。\n\n### public int end(int group)\n\n与 `start(int)`\
    \ 方法类似，此方法允许你指定匹配中感兴趣的特定子组，不同之处在于它返回匹配字符序列的最后一个索引加 1。如果没有匹配项，或者尚未尝试匹配，此方法会抛出 `IllegalStateException`。如果你引用了不存在的组号，则会抛出\
    \ `IndexOutOfBoundsException`。\n\n### public String group()\n\n在与混乱代码的斗争中，`group`\
    \ 方法可以成为一个强大而便捷的工具。它简单地返回与原始正则表达式模式匹配的候选字符串的子字符串。如果 `find` 方法调用不成功，`group()` 方法会抛出\
    \ `IllegalStateException`。类似地，如果从未调用过 `find`，它也会抛出 `IllegalStateException`。\n\n\
    ### public String group(int group)\n\n此方法是 `group()` 方法更强大的对应版本。它允许你提取与模式中子组匹配的候选字符串的部分。\n\
    \n如果 `find` 方法调用不成功，`group(int)` 方法会抛出 `IllegalStateException`。类似地，如果从未调用过 `find`，它也会抛出\
    \ `IllegalStateException`。如果为不存在的组号调用它，则会抛出 `IndexOutOfBoundsException`。\n\n###\
    \ public int groupCount()\n\n此方法简单地返回 `Pattern` 定义的组数。关于此方法，有一个非常重要且有点反直觉的细微之处需要注意：它基于原始\
    \ `Pattern` 返回可能的组数，甚至不考虑候选字符串。因此，它实际上不是关于 `Matcher` 对象的信息；而是关于帮助生成它的 `Pattern`\
    \ 的信息。这可能很棘手，因为此方法存在于 `Matcher` 对象上这一事实可能被解释为它正在提供关于 `Matcher` 状态的反馈。但事实并非如此。它告诉你对于给定的\
    \ `Pattern`，理论上可能有多少个匹配项。\n\n### public boolean matches()\n\n此方法旨在帮助你根据匹配器的 `Pattern`\
    \ 匹配候选字符串。当且仅当所考虑的候选字符串与模式完全匹配时，它才返回 `true`。\n"
- fmt: '### `public boolean find()`


    The `find()` method parses just enough of the candidate String to find a match.
    If such a substring is found, then `true` is returned and `find` stops parsing
    the candidate. If no part of the candidate String matches the pattern, then `find`
    returns `false`.


    ### `public boolean find(int start)`


    `find(int start)` works exactly like its overloaded counterpart, with the exception
    of where it starts searching. The `int` parameter `start` simply tells the `Matcher`
    at which character to start its search.


    Thus, for the candidate String `I love Java. Java is my favorite language. Java
    Java Java.` and the Pattern `Java`, if you only want to start searching at character
    index 11, you use the command `find(11)`.


    ### `public Matcher appendReplacement(StringBuffer sb, String replacement)`


    The `appendReplacement` method allows you to modify the contents of a `StringBuffer`
    based on a regular expression. It even allows you to use back references by using
    the `$n` notation, in which `n` refers to some captured subgroup. For example,
    for the `StringBuffer` `Waldo Smith`, the Pattern `(\w+) (\w+)`, and the replacement
    `$2, $1`, the contents of the `StringBuffer` will be modified to `Smith, Waldo`.


    The `appendReplacement` method will throw an `IllegalStateException` if a `find()`
    hasn''t been called, or if `find` would have returned `false` if called. It will
    throw an `IndexOutOfBoundsException` if the capturing group referred to by `$1,
    $2`, etc., doesn''t exist in the part of the pattern currently being scrutinized
    by the `Matcher`.


    ### `public StringBuffer appendTail(StringBuffer sb)`


    The `appendTail` method is a supplement to the `appendReplacement` method. It
    simply appends every remaining subsequence from the original candidate String
    to the `StringBuffer`, if reading from the append position, which I explained
    in the `appendReplacement` section, to the end of the candidate string.


    ### `public String replaceAll(String replacement)`


    The `replaceAll` method returns a String that replaces every occurrence of the
    description with the replacement. Using this method will change the state of your
    `Matcher` object. Specifically, the `reset()` method will be called. Therefore,
    remember that all `start`, `end`, `group`, and `find` calls will have to be reexecuted.


    Like the `appendReplacement` method, the `replaceAll` method can contain references
    to substring by using the `$` symbol. For details, please see the `appendReplacement`
    documentation presented earlier.


    ### `public String replaceFirst(String replacement)`


    The `replaceFirst` method is a more limited version of the `replaceAll` method.
    This method returns a String that replaces the first occurrence of the description
    with the replacement. Using this method will change the state of your `Matcher`
    object. Specifically, the `reset()` method will be called. Therefore, remember
    that all `start`, `end`, `group`, and `find` calls will have to be reexecuted
    after `replaceFirst` is called.


    Like the `appendReplacement` method, the `replaceFirst` method can contain references
    to substring by using the `$` symbol. For details, please see the `appendReplacement`
    documentation presented earlier.'
