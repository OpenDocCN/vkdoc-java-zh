    The only regex change I made in this example was to make the actual pattern just
    a little more memory efficient and a little more lenient, as shown in [Table 5-4](#LiB0043.html#ch05table04).
    Specifically, leniency means that the pattern will accept any punctuation, a space,
    or no delimiter at all between the first five digits and the last four digits
    of a U.S. zip code. The pattern will also accept five digits as a sufficient U.S.
    zip code.


    **Table 5-4: Making the Zip Code Pattern More Lenient and Efficient**


    | **Step** | **What I Did** | **Why I Did It** | **Justification** | **Resulting
    Pattern** |

    | --- | --- | --- | --- | --- |

    | Step 1 | Nothing | Initial state | N/A | `\d{5}(-\d{4})?` |

    | Step 2 | Added `?:` inside the capturing group `(-\d{4})` to produce `(?:-\d{4})`
    | To produce a more efficient pattern. | We don''t need a capture here. | `\d{5}(?:-\d{4})?`
    |

    | Step 3 | Replaced `-` with `\p{Punct}?` to produce `(?:\p{Punct}?\d{4})?` |
    Any punctuation—or no punctuation at all—can be used as a delimiter. | `\p{Punct}?`
    is a superset of `-`, and it''s optional, so the regex engine is now willing to
    accept any punctuation or no punctuation at all as a delimiter. | `\d{5}(?:\p{Punct}?\d{4})?`
    |

    | Step 4 | Added a `\s?` pattern to the list of acceptable delimiters between
    the five digits and the four digits of a U.S. zip code | Zip codes that use a
    space or empty string to separate the five digits from the four digits will pass.
    | A space between the five digits of a U.S. zip code and the following four digits
    is optional. This is simply a more lenient interpretation. | `\d{5}(?:\p{Punct}?\s?\d{4})?`
    |

    | Step 5 | Moved the `\p{Punct}?\s?` out of the noncapturing group | This improves
    readability. Optional subpatterns inside a optional noncapturing group can be
    hard to follow. | Logically, the two are equivalent. | `\d{5}\p{Punct}?\s?(?:\d{4})?`
    |

    | Step 6 | Surrounded the pattern with a beginning-of-line `^` tag and an end-of-line
    `$` tag | This increases matching speed. The more precise the pattern, the better
    it will perform. | All zip codes will be coming into the method as extracted strings.
    Thus, they''ll always have a beginning of line and an end of line. | `^\d{5}\p{Punct}?\s?(?:\d{4})?$`
    |


    Because the regex patterns are externalized, they can be tweaked later to become
    more accommodating for the various regions. Better yet, more country codes can
    be added without requiring code changes: Simply add the appropriate entries to
    the `regex.properties` file.


    The point here is that even using generic regex patterns found online, I still
    have a very Java-like flavor to the code. It''s modular, adaptable, scalable,
    and clear.'
