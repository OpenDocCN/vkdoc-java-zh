  trans: "\n## 搜索文件\n\n在前一个示例的基础上，我决定提供一个用于搜索文件内容并返回该文件中所有匹配字符串的实用工具。我将使用 `FileChannel`\
    \ 进行实际的文件 I/O 操作。虽然对 `FileChannel` 的讨论超出了本书的范围，但在我看来，它们是 Java 中访问文件的最佳方式。\n\n\
    我的策略是使用 `FileChannel` 打开一个文件，将其内容读入一个字符串，释放 `FileChannel`，然后使用 `searchString`\
    \ 方法来解析该字符串。这比逐行读取文件并检查其内容要快，尽管它比较消耗内存。清单 5-7 展示了实现此功能的代码。\n\n**清单 5-7：读取文件内容**\n\
    \n| **![开始示例](img/_1.gif)** |\n\n```\n01     /**\n02     * 提取文件的内容\n03     * @param\
    \ String fileName 要提取的文件名\n04     * @throws IOException\n05     *\n06     * @return\
    \ String 表示文件内容的字符串\n07     */\n08     public static String getFileContent(String\
    \ fileName)\n09     throws IOException{\n10        String retval = null;\n11 \
    \       //获取 FileChannel 的访问权限\n12        FileInputStream fis =\n13          new\
    \ FileInputStream(fileName);\n14        FileChannel fc = fis.getChannel();\n\n\
    15        //获取文件内容\n16        retval = getFileContent(fc);\n\n17        //关闭资源\n\
    18        fc.close();\n19        fc = null;\n\n20        return retval;\n21  \
    \   }\n\n22     /**\n23     * 提取文件的内容\n24     * @param String fileName 要提取的文件名\n\
    25     * @throws IOException\n26     *\n27     * @return String 表示文件内容的字符串\n28\
    \     */\n29     private static String getFileContent(FileChannel fc)\n30    \
    \ throws IOException{\n31         String retval = null;\n32        //读取 FileChannel\
    \ 的内容\n33         ByteBuffer bb = ByteBuffer.allocate((int)fc.size());\n34   \
    \      fc.read(bb);\n\n35         //将内容保存为字符串\n36         bb.flip();\n37     \
    \    retval = new String(bb.array());\n38         bb = null;\n\n39         return\
    \ retval;\n40     }\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n接下来，我需要提供一个方法，用于加载文件、搜索文件并返回结果。有了前面两个方法，这就变得相当容易了，如清单\
    \ 5-8 所示。\n\n**清单 5-8：打开文件、搜索文件并返回结果**\n\n| **![开始示例](img/_1.gif)** |\n\n```\n\
    01     public static Map searchFile(\n02         String file,\n03         String\
    \ searchPattern,\n04         int flags\n05     ) throws IOException\n06     {\n\
    07        String fileContent = getFileContent(file);\n08        Map retval = searchFile(fileContent,searchPattern,flags);\n\
    09        return retval;\n10     }}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n| \
    \ |\n\n我测试了这个程序，并将其与 `grep` 进行了比较。说实话，在比较中它似乎稍显不足。`grep` 程序会返回匹配标记的整行内容，而此方法只返回匹配的标记本身。这倒也不算太糟糕，因为客户端可以通过使用正确的正则表达式模式来请求整行内容。但它确实不够友好，尤其是对普通用户而言。\n\
    \n我决定对模式进行“填充”，以捕获整行内容，前提是原始搜索模式中没有标点符号，因此也不包含正则表达式。清单 5-9 展示了我修改后的 `searchFile`\
    \ 方法。\n\n**清单 5-9：修改 searchFile 方法使其更友好**\n\n| **![开始示例](img/_1.gif)** |\n\n```\n\
    01  public static Map searchFile(\n02      String file,\n03      String searchPattern,\n\
    04      int flags\n05  ) throws IOException\n06  {\n07     String fileContent\
    \ = getFileContent(file);\n\n08     //如果搜索模式中没有标点符号\n09     //则假定它不是正则表达式，并提取\n\
    10     //找到该模式的整行内容\n11     String[] regexTokens = searchPattern.split(\"\\\\\
    p{Punct}\");\n\n12     if (regexTokens.length == 1)\n13     {\n14         searchPattern\
    \ = \"^.*\"+ searchPattern+\".*$\";\n15     }\n\n16    Map retval = searchString(fileContent,searchPattern,flags);\n\
    17    return retval;\n18 } \n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n###\
    \ 讨论点\n\n此时，你心中应该有一些合理的问题。这难道不应该是一本关于正则表达式的书吗？`searchFile` 和 `searchString` 方法中并没有什么特别像正则表达式的地方；它们基本上就是你已经知道如何编写的纯\
    \ Java 代码。这是怎么回事？\n\n关键在于，正则表达式只是一个工具。它并没有改变你仍在编写 Java 代码的事实，并且即使你在使用正则表达式时，也需要遵循良好的、模块化的、面向对象的原则。正则表达式让你能够跨越那些你可能永远无法跨越的难点，但它只是一个工具。就像任何精心打造的引擎一样，`java.util.regex`\
    \ 引擎通过安静地运行并且*不*让你为其操心，来彰显其卓越性。\n\n### 处理非常大的文件\n\n此时另一个有效的问题是，如果你要解析的文件内容太大，以至于无法将其全部读入内存，该怎么办？通常，你有两种方法可以选择。你可以使用\
    \ Java 的新特性之一，例如 `MappedByteBuffer`，或者你可以将文件分割成可管理的部分，然后依次解析每个部分。\n\n如果你决定将 `MappedByteBuffer`\
    \ 用于正则表达式，清单 5-10 包含了一个示例，展示了如何操作。然而，我不太愿意强烈推荐将 `MappedByteBuffer` 与正则表达式结合使用，原因有三。首先也是最重要的一点，它们的行为非常依赖于系统，因此如果你需要平台独立性，可能应该排除它们。其次，即使在给定的平台上，它们的行为也没有明确定义。因此，根据你操作系统上正在进行的其他操作，你可能会得到不一致的结果。第三，你需要考虑这样一个事实：如果整个文件无法一次性加载到内存中，那么尝试应用一个可能包含通配符的模式将是一件棘手的事情。\n\
    \n**清单 5-10：通过 MappedByteBuffer 访问文件**\n\n| **![开始示例](img/_1.gif)** |\n\n```\n\
    01   public static boolean getFileContentUsingMappedByteBuffer\n02   (\n03   \
    \    String fileName\n04   ) throws IOException\n05   {\n06       boolean retval\
    \ = false;\n07       RandomAccessFile raf = new RandomAccessFile(fileName,\"rwd\"\
    );\n08       FileChannel fc = raf.getChannel();\n\n09       MappedByteBuffer mbb\
    \ =\n10        fc.map(FileChannel.MapMode.READ_WRITE,0,fc.size());\n\n11     \
    \  CharSequence cb = mbb.asCharBuffer();\n\n12       return retval;\n13 }\n```\n\
    \n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n你可能需要重新考虑你的模式，并根据你对文件结构的了解，将文件分解成逻辑块。一种策略可能是检查文件大小，然后将其除以\
    \ 10、100 或任何根据系统内存限制易于加载的分数，然后搜索该部分。虽然这并不理想，但它比相应的内存映射方法更具可预测性。底线是，无论你使用哪种正则表达式风格或提供者，非常大的文件都需要特殊处理。\n"
- fmt: "# Modifying the Contents of a File\n\nNow I want to provide a facility that\
    \ modifies the content of a file based on a regex pattern. That is, I want to\
    \ provide a mechanism that opens a file, searches its contents based on a regex\
    \ pattern, and changes every occurrence of that pattern with a replacement string.\
    \ Because I already have code that will open and search a file, modifying the\
    \ content of the file is fairly easy. The logic for doing so is shown in [Figure\
    \ 5-2](#LiB0047.html#ch05fig02).\n\n[![Click To expand](fig215_01.jpg)](fig215_01_0.jpg)\n\
    Figure 5-2: Basic flow diagram for updating the content of a file\n\nAgain, I\
    \ decide to use a `FileChannel` for efficiency, as shown in [Listing 5-11](#LiB0047.html#ch05list11).\n\
    \nListing 5-11: Modifying the Content of a File Based on a Regex Pattern\n\n|\
    \ **![Start example](_1.gif)** |\n\n```\n01  /**\n02  * updates the content of\
    \ the file. By default, the\n03  * Pattern.MULTILINE is used. Also supports the\n\
    04  * $d notation in the replacement string, per the\n05  * Matcher.replaceAll\
    \ method\n06  * @param the String fileName is the name and file path\n07  * @param\
    \ the String regex pattern to look for\n08  * @param the String replacement for\
    \ the regex\n09  * @throws IOException if there is an IO error\n10  *\n11  * @return\
    \ boolean true if the file was updated\n12  */\n13  public static boolean updateFileContent\n\
    14  (\n15     String fileName,\n16     String regex,\n17     String replacement\n\
    18  ) throws IOException\n19  {\n20     boolean retval = false;\n\n21     RandomAccessFile\
    \ raf =\n22         new RandomAccessFile(fileName,\"rwd\");\n23     FileChannel\
    \ fc = raf.getChannel();\n\n24     String fileContent = getFileContent(fc);\n\
    25     //Activate the MULTILINE flag for this regex\n26     regex = \"(?m)\"+regex;\n\
    \n27     String newFileContent =\n28         fileContent.replaceAll(regex,replacement);\n\
    \n29     //if nothing changed, then don't update the file\n30     if (!newFileContent.equals(fileContent))\n\
    31     {\n32        setFileContent(newFileContent,fc);\n33        retval = true;\n\
    34     }\n35     //close up shop\n36     fc.close();\n37     fc = null;\n38  \
    \   raf = null;\n\n39     return retval;\n40 }\n\n41  /**\n42  * sets the content\
    \ of a file. Completely\n43  * overwrites previous file content, and truncates\n\
    44  * file to the length of the new content.\n45  * @param the <code>String</code>\
    \ newContent\n46  * @param the <code>FileChannel</code> fc\n47  * @throws <code>IOException</code>\n\
    48  *\n49  * @author M Habibi\n50  */\n51  private static void setFileContent(\n\
    52     String newContent, FileChannel fc\n53  )\n54  throws IOException{\n55 \
    \    //write out the content to the file\n56     ByteBuffer bb = ByteBuffer.wrap(newContent.getBytes());\n\
    57     //truncate the size of the file, in case the\n58     //original file content\
    \ was longer the new\n59     //content\n60     fc.truncate(newContent.length());\n\
    \n61     //start writing as position 0\n62     fc.position(0);\n63     fc.write(bb);\n\
    \n64     fc.close();\n65     fc = null;\n66  }\n```\n\n| **![End example](_1.gif)**\
    \ |\n\n|  |\n\n[Listing 5-11](#LiB0047.html#ch05list11) takes advantage of the\
    \ `getFileContent` method defined earlier in line 29 of [Listing 5-7](#LiB0046.html#496).\
    \ Otherwise, the example is self-contained.\n\n# Extracting Phone Numbers From\
    \ a File\n\nIn this example, I want to parse a file and extract any and all phone\
    \ numbers. This is a program I wrote to help a friend who owns a small IT shop.\
    \ He had all sorts of electronic documents and needed to extract phone numbers\
    \ from them to call his clients back. I'll start this process at the very beginning,\
    \ where I extracted requirements:\n\n| **Q:** | Are you looking for U.S. numbers\
    \ or international ones? | [![U.S. numbers, but that could change.](question.gif)](#LiB0048.html#answer.N21)\
    \ |\n| **Q:** | Is speed an issue? Is someone going to be tapping his foot, waiting\
    \ for this to finish? | [![No, running overnight is fine.](question.gif)](#LiB0048.html#answer.N28)\
    \ |\n| **Q:** | Do the phone numbers follow any sort of consistent format? | [![They're\
    \ either seven or ten digits.](question.gif)](#LiB0048.html#answer.N35) |\n| **Q:**\
    \ | Do they have hyphens or spaces in them? | [![It depends-sometimes they do.](question.gif)](#LiB0048.html#answer.N42)\
    \ |\n| **Q:** | Is the format of the file subject to change? | [![Yes.](question.gif)](#LiB0048.html#answer.N49)\
    \ |\n| **Q:** | If there had to be a mistake, would you prefer too many phone\
    \ number candidates or too few? | [![Too many.](question.gif)](#LiB0048.html#answer.N56)\
    \ |\n| **Q:** | Do you need these numbers returned in any particular kind of format?\
    \ | [![I hadn't thought of that, but a consistent format would be great.](question.gif)](#LiB0048.html#answer.N63)\
    \ |\n| **Q:** | Do you have some files you've already looked through that I can\
    \ use for testing? | [![Yes.](question.gif)](#LiB0048.html#answer.N70) |\n| **Q:**\
    \ | How big are these files? | [![Not that big. I don't know.](question.gif)](#LiB0048.html#answer.N77)\
    \ |\n| **Q:** | How many files are there? | [![About ten per night.](question.gif)](#LiB0048.html#answer.N84)\
    \ |\n| **Q:** | What types of files are these? | [![Microsoft Word documents.](question.gif)](#LiB0048.html#answer.N91)\
    \ |\n\nAnswers\n\n| [**A:**](#LiB0048.html#N21) | U.S. numbers, but that could\
    \ change. |\n| [**A:**](#LiB0048.html#N28) | No, running overnight is fine. |\n\
    | [**A:**](#LiB0048.html#N35) | They're either seven or ten digits. |\n| [**A:**](#LiB0048.html#N42)\
    \ | It depends—sometimes they do. |\n| [**A:**](#LiB0048.html#N49) | Yes. |\n\
    | [**A:**](#LiB0048.html#N56) | Too many. |\n| [**A:**](#LiB0048.html#N63) | I\
    \ hadn't thought of that, but a consistent format would be great. |\n| [**A:**](#LiB0048.html#N70)\
    \ | Yes. |\n| [**A:**](#LiB0048.html#N77) | Not that big. I don't know. |\n| [**A:**](#LiB0048.html#N84)\
    \ | About ten per night. |\n| [**A:**](#LiB0048.html#N91) | Microsoft Word documents.\
    \ |\n\nI think I have enough information at this point to get started. It sounds\
    \ like the client wants anything that might be a seven-or ten-digit phone number,\
    \ and that speed isn't an issue. It also sounds like the files don't get that\
    \ large. This should be as simple as defining a phone number pattern and using\
    \ the previously presented search methods. After all, I can already access a file\
    \ and search its content. I decide to keep the actual regex in a external property\
    \ file, of course, so I can tweak it as I need to. This is going to be an error-prone\
    \ process until I get a sense of these files.\n\nI'm ready to start. I decide\
    \ to do a quick search of the Web, and I come up with a few patterns for phone\
    \ numbers. Some of these are a little esoteric, but I'm willing to try them because\
    \ my client wants as many candidates as possible. The patterns I found are as\
    \ follows:\n\n```\n ^(\\(?\\+?[0-9]*\\)?)?[0-9_\\- \\(\\)]*$\n    ^([0-1]([\\\
    s-./\\\\])?)?(\\(?[2-9]\\d{2}\\)?\n    [2-9]\\d{3})([\\s-./\\\\])?(\\d{3}([\\\
    s-./\\\\])?\\d{4}\n    [a-zA-Z0-9]{7})$\n    ^\\(?[\\d]{3}\\)?[\\s-]?[\\d]{3}[\\\
    s-]?[\\d]{4}$\n```"
