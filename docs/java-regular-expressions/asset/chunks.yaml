    \ example](_1.gif)** |\n\n|  |\n\n## Regular Expression Operations\n\nIn this\
    \ section, you'll explore slightly more realistic uses of regular expressions.\
    \ In the practical world, people use regular expressions for one of three basic\
    \ broad categories:\n\n*   *Data validation:* This is the process of making sure\
    \ that your candidate String conforms to a specific format (e.g., making sure\
    \ passwords are at least eight characters long and contain at least two digits).\n\
    \n*   *Search and/or replace:* This is another popular usage of regular expressions,\
    \ and for good reason. Say you want to send a letter to all of your customers,\
    \ and you want each letter to be personalized by interspersing the customer's\
    \ name throughout the letter. Of course, this is a little more complex than it\
    \ sounds, because different names have different lengths, and you don't want to\
    \ overwrite the next word in your letter when you insert a longer name. Regex\
    \ is a perfect solution for these types of problems.\n\n*   *Decomposing text:*\
    \ This can also be a challenging activity, particularly if the String in question\
    \ needs to be split according to complex rules. Fortunately, doing so becomes\
    \ much easier with regular expressions, as [Listing 1-11](#LiB0010.html#ch01list11)\
    \ (which follows shortly) demonstrates.\n\n### Data Validation\n\nData validation,\
    \ or making sure that data matches a prescribed format, is one of the most common\
    \ uses for regular expressions. This can be particularly challenging because data\
    \ often takes inexact forms and is defined by unspoken rules.\n\nJ2SE 1.4 offers\
    \ you several ways to validate data. The easiest is using the new method boolean\
    \ String.matches(String regex). This method confirms that the pattern passed in\
    \ *exactly* matches the String that it's called on.\n\nThis exactness can be tricky,\
    \ so it's important to understand it well. For example, say you need to confirm\
    \ that a given String contains the word *Java*, followed by space, followed by\
    \ some digit. Further, assume that your candidate String is I love Java 4\\. The\
    \ [next section](#LiB0010.html#ch01lev2sec18) demonstrates the process of working\
    \ through this example."
  trans: "\n### 查找重复单词示例\n\n我在前面的“分组与反向引用”一节中讨论过清单 1-7 中的代码。此处重新引入它的目的是演示正则表达式如何与\
    \ Java 代码实际交互。\n\n清单 1-7：MatchDuplicateWords.java\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\nimport java.util.regex.*;\nimport java.io.*;\n\npublic class MatchDuplicateWords{\n\
    \   public static void main(String args[]){\n      hasDuplicate(args[0]);\n  \
    \ }\n\n/**\n   * 确认给定短语中不包含重复单词。\n   * @param phrase 表示短语的字符串。\n   * @returns\
    \ 如果短语中没有重复单词则返回 true。\n   */\n   public static boolean hasDuplicate(String phrase){\n\
    \      boolean retval=false;\n\nString duplicatePattern =\n      \"\\\\b(\\\\\
    w+) \\\\1\\\\b\";\n      // 编译模式\n      Pattern p = null;\n      try{\n      \
    \  p = Pattern.compile(duplicatePattern);\n      }\n      catch (PatternSyntaxException\
    \ pex){\n         pex.printStackTrace();\n         System.exit(0);\n      }\n\
    \      // 统计匹配次数。\n      int matches = 0;\n\n//获取匹配器\n      Matcher m = p.matcher(phrase);\n\
    \      String val=null;\n\n//查找所有匹配的字符串\n      while (m.find()){\n         retval\
    \ = true;\n        val = \":\" + m.group() +\":\";\n        System.out.println(val);\n\
    \        matches++;\n      }\n\n//准备一条指示成功或失败的消息\n      String msg = \"   无匹配:\
    \ 模式:\" + phrase\n             + \"\\r\\n             正则表达式: \"\n            \
    \ + duplicatePattern;\n\nif (retval){\n      msg = \" 匹配     : 模式:\" + phrase\n\
    \          + \"\\r\\n         正则表达式: \"\n          + duplicatePattern;\n     \
    \ }\n\nSystem.out.println(msg +\"\\r\\n\");\n      return retval;\n   }\n} \n\
    ```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n阅读此示例时，请注意它使用了 Pattern 和 Matcher，而不是前面大多数示例中使用的\
    \ String.matches(regex) 方法。试着猜测一下为什么采用这种方法。答案请参见本章末尾的“常见问题解答”部分。输出 1-7 显示了运行程序的结果。该模式在表\
    \ 1-24 中进行了剖析。\n\n表 1-24：模式 *\\b(\\w+) \\1\\*b\n\n| **正则表达式** | **描述** |\n| ---\
    \ | --- |\n| \\b | 单词边界 |\n| ( | 后跟一个由以下内容组成的组 |\n| \\w | 字母数字或下划线字符 |\n| + |\
    \ 重复一次或多次 |\n| ) | 关闭组 |\n| <空格> | 后跟一个空格 |\n| \\1 | 后跟之前捕获的完全相同的字符组 |\n| \\b\
    \ | 后跟一个单词边界 |\n| * **用英语解释：** 查找一个单词边界，后跟一组字母数字字符，再后跟一个空格，然后后跟*之前找到的完全相同的字母数字字符组*，最后后跟一个单词边界。简而言之，就是查找重复的单词。\
    \ |\n\n输出 1-7：运行 MatchDuplicateWords.java 的结果\n\n| **![开始示例](img/_1.gif)** |\n\
    \n```\nC:\\RegEx\\Examples\\chapter1>java MatchDuplicateWords \"pizza pizza\"\n\
    :pizza pizza:\n   匹配   : 模式:pizza pizza\n             正则表达式: \\b(\\w+) \\1\\b\n\
    \nC:\\RegEx\\Examples\\chapter1>java MatchDuplicateWords \"Faster pussycat kill\
    \ kill\"\n:kill kill:\n   匹配   : 模式:Faster pussycat kill kill\n             正则表达式:\
    \ \\b(\\w+) \\1\\b\n\nC:\\RegEx\\Examples\\chapter1>java MatchDuplicateWords \"\
    The mayor of of simpleton\"\n:of of:\n   匹配   : 模式:The mayor of of simpleton\n\
    \             正则表达式: \\b(\\w+) \\1\\b\n\nC:\\RegEx\\Examples\\chapter1>java MatchDuplicateWords\
    \ \"Never Never Never Never Never\"\n:Never Never:\n:Never Never:\n   匹配   : 模式:Never\
    \ Never Never Never Never\n             正则表达式: \\b(\\w+) \\1\\b\n\nC:\\RegEx\\\
    Examples\\chapter1>java MatchDuplicateWords \"222 2222\"\n   无匹配: 模式:222 2222\n\
    \             正则表达式: \\b(\\w+) \\1\\b\n\nC:\\RegEx\\Examples\\chapter1>java MatchDuplicateWords\
    \ \"sara sarah\"\n   无匹配: 模式:sara sarah\n             正则表达式: \\b(\\w+) \\1\\b\n\
    \nC:\\RegEx\\Examples\\chapter1>java MatchDuplicateWords \"Faster pussycat kill,\
    \ kill\"\n   无匹配: 模式:Faster pussycat kill, kill\n             正则表达式: \\b(\\w+)\
    \ \\1\\b\n\nC:\\RegEx\\Examples\\chapter1>java MatchDuplicateWords \". .\"\n \
    \  无匹配: 模式:. .\n             正则表达式: \\b(\\w+) \\1\\b\n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n## 正则表达式操作\n\n在本节中，你将探索正则表达式稍微更实际一些的用法。在实际应用中，人们使用正则表达式主要出于以下三大类基本目的：\n\
    \n*   *数据验证：* 这是确保候选字符串符合特定格式的过程（例如，确保密码长度至少为八个字符，并且至少包含两个数字）。\n\n*   *搜索和/或替换：*\
    \ 这是正则表达式的另一个流行用法，而且理由充分。假设你想给所有客户发送一封信，并希望每封信都通过穿插客户姓名来实现个性化。当然，这比听起来要复杂一些，因为不同姓名的长度不同，而且当插入较长的姓名时，你不希望覆盖信中的下一个单词。正则表达式是解决这类问题的完美方案。\n\
    \n*   *分解文本：* 这也可能是一项具有挑战性的活动，特别是当需要根据复杂规则拆分字符串时。幸运的是，使用正则表达式会变得容易得多，正如清单 1-11（紧随其后）所演示的那样。\n\
    \n### 数据验证\n\n数据验证，即确保数据符合规定的格式，是正则表达式最常见的用途之一。这可能特别具有挑战性，因为数据通常形式不精确，并且由不成文的规则定义。\n\
    \nJ2SE 1.4 为你提供了几种验证数据的方法。最简单的是使用新方法 boolean String.matches(String regex)。此方法确认传入的模式*完全*匹配它所调用的字符串。\n\
    \n这种精确性可能很棘手，因此充分理解它很重要。例如，假设你需要确认给定的字符串包含单词 *Java*，后跟一个空格，再后跟某个数字。进一步假设你的候选字符串是\
    \ I love Java 4。下一节将演示处理此示例的过程。\n"
- fmt: "#### Data Validation with Strings Example\n\nThis example seems simple enough,\
    \ so you start out by testing the pattern `Java \\d`. [Table 1-25](#LiB0010.html#ch01table25)\
    \ shows a breakdown of the pattern.\n\n**Table 1-25: The Pattern `Java \\d`**\n\
    \n| **Regex** | **Description** |\n| --- | --- |\n| `J` | A capital *J* |\n| `a`\
    \ | Followed the character *a* |\n| `v` | Followed the character *v* |\n| `a`\
    \ | Followed the character *a* |\n| `<space>` | Followed by a single space |\n\
    | `\\d` | Followed by digit |\n\nThat was pretty easy, so you confidently write\
    \ your code, as shown in [Listing 1-8](#LiB0010.html#ch01list08).\n\n**Listing\
    \ 1-8: `ValidationTest.java`**\n\n```\nimport java.util.regex.*;\n\npublic class\
    \ ValidationTest{\n    public static void main(String args[]){\n        String\
    \ candidate = \"I love Java 4\";\n        String pattern =\"Java \\\\d\";\n  \
    \      System.out.println(candidate.matches(pattern));\n    }\n}\n```\n\nThen\
    \ you run it:\n\n```\njava ValidationTest\n```\n\nand you watch it fail in [Output\
    \ 1-8](#LiB0010.html#ch01ex08).\n\n**Output 1-8: Result of Running `ValidationTest.java`**\n\
    \n```\nC:\\RegEx\\code>java ValidationTest\nDoes candidate : I love Java 4\nmatch\
    \ pattern  : Java \\d?\n\nfalse\n```\n\nWhat happened? Because your input string\
    \ is `I love Java 4`, and the `Java 4` is preceded by `I love`, the input isn't\
    \ an exact match to the pattern `Java \\d`. It's a partial match. So what do you\
    \ do now?\n\nYou have two options. You could modify the pattern to allow for characters\
    \ before and/or after the `Java 4` you want to match on, or you could just use\
    \ the `Pattern` and `Matcher` objects. Let's explore the pros and cons of each\
    \ option.\n\nTo use the `String.matcher(String regex)` method, you need to account\
    \ for any and all characters that might precede or follow the pattern `Java \\\
    d`. Thus, you use the pattern `.*\\bJava \\d(|$)`, which [Table 1-26](#LiB0010.html#ch01table26)\
    \ dissects.\n\n**Table 1-26: The Pattern `.*\\bJava \\d(|$)`**\n\n| **Regex**\
    \ | **Description** |\n| --- | --- |\n| `.` | Any character |\n| `*` | Repeated\
    \ any number of times |\n| `\\b` | Followed by a word boundary |\n| `J` | Followed\
    \ by a capital *J* |\n| `a` | Followed the character *a* |\n| `v` | Followed the\
    \ character *v* |\n| `a` | Followed the character *a* |\n| `<space>` | Followed\
    \ by a single space |\n| `\\d` | Followed by a digit |\n| `(` | Followed by a\
    \ group consisting of |\n| `<space>` | A space |\n| `&#124;` | Or |\n| `$` | An\
    \ end-of-line character |\n| `)` | Close group |\n\n#### Data Validation with\
    \ the Pattern and Matcher Objects Example\n\nWriting the pattern in the preceding\
    \ section involved a little bit more work than expected. Let's see if it's any\
    \ easier to use the `Pattern` and `Matcher` objects in [Listing 1-9](#LiB0010.html#ch01list09).\
    \ The output is shown in [Output 1-9](#LiB0010.html#ch01ex09).\n\n**Listing 1-9:\
    \ `ValidationTestWithPatternAndMatcher.java`**\n\n```\nimport java.util.regex.*;\n\
    \npublic class ValidationTestWithPatternAndMatcher{\n    public static void main(String\
    \ args[]){\n        // Compile the pattern\n        Pattern p = null;\n      \
    \  try{\n            p = Pattern.compile(\"Java \\\\d\");\n        }\n       \
    \ catch (PatternSyntaxException pex){\n            pex.printStackTrace();\n  \
    \          System.exit(0);\n        }\n\n        //define the matcher string\n\
    \        String candidate = \"I love Java 4\";\n        //get the matcher\n  \
    \      Matcher m = p.matcher(candidate);\n\n        System.out.println(\"result=\"\
    \ + m.find());\n    }\n}\n```\n\n**Output 1-9: Result of Running `ValidationTestWithPatternAndMatcher.java`**\n\
    \n```\nC:\\RegEx\\Examples\\chapter1>java\nValidationTestWithPatternAndMatcher\n\
    result = true\n```\n\nThe pattern used in [Listing 1-9](#LiB0010.html#ch01list09)\
    \ is less complicated than that in [Listing 1-8](#LiB0010.html#ch01list08). It's\
    \ simply the original string `Java \\d`. But the Java code requires explicit usage\
    \ of the `Pattern` and `Matcher` objects, which is slightly more demanding of\
    \ the programmer. You're doing this because you want explicit access to the `Matcher.find`\
    \ method, which allows you to examine the input string and see if any part of\
    \ it matches the pattern. Again, this in contrast to the `String.matches(String\
    \ regex)` method, which requires an exact match.\n\nGenerally speaking, there\
    \ are two types of validation. The first type requires an exact match. For these,\
    \ the easiest validation method is probably to use the `String.matches(String\
    \ regex)`, because it rejects anything that doesn't match fully and completely.\n\
    \nThe second type of validation requires that the string contain the pattern at\
    \ some point, but it doesn't require an exact match. For example, you might require\
    \ that a password contain nonalphanumeric characters. These types of validations\
    \ are best achieved by using the `Matcher` and `Pattern` objects. [Chapter 5](#LiB0041_split_000.html#457)\
    \ provides more complex validation examples.\n\n### Search and Replace\n\nOne\
    \ of the most powerful features of the new regex package is the ability to search\
    \ for and replace Strings and substrings. As you may recall, this sort of activity\
    \ was previously a tedious affair, as it required the use of tokenizers or the\
    \ use of the `String.substring` methods, along with a lot of String arithmetic.\n\
    \nThankfully, those days are over. There are two general ways to do search and\
    \ replace operations in J2SE. The following example travels the easier path by\
    \ taking advantage of two new methods added to the `String` class. ([Chapter 4](#LiB0033_split_000.html#402)\
    \ contains more complex examples that use the `Pattern` and `Matcher` classes\
    \ directly.) The two methods relevant for the following example are as follows:\n\
    \n*   `replaceFirst(String regex, String replacement)`\n*   `replaceAll(String\
    \ regex, String replacement)`\n\nThe first method, `replaceFirst(String regex,\
    \ String replacement)`, simply replaces the first occurrence of the regex pattern\
    \ with the replacement String. The second method, `replaceAll`, replaces *all*\
    \ occurrences of the pattern with the replacement String. I explain these new\
    \ methods in detail in [Chapter 2](#LiB0014_split_000.html#187)."
