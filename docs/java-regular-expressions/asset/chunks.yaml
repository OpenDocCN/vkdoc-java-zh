  trans: "\n## 确认电话号码格式\n\n第一个示例用于确认给定的电话号码是否符合美国电话号码的标准格式。\n\n在正式开始之前，我需要做一个决定：是自行编写正则表达式，还是尝试寻找现成的？通常，我会先查阅一些在线正则表达式资源，例如\
    \ [`www.regexlib.com`](http://www.regexlib.com)，寻找已有的模式。不过，由于这个模式相对简单，而且我想演示编写过程，因此决定自己动手。\n\
    \n既然决定自己编写，我首先需要回答的问题是：什么是电话号码？我从一些示例号码入手，反向推导。这就是第 1 章中描述的“拉取技术”。它要求我获取一些实际数据，并尝试从中提取模式。假设我的样本集如下：\n\
    \n*   614-345-6789\n\n*   345-6789\n\n*   345 6789\n\n*   345.6789\n\n*   3456789\n\
    \n*   (614)345-6789\n\n*   6143456789\n\n我选择列表中的第一个电话号码作为模式模板。通过分析，我发现一个相当明显的结构：三位数字、一个连字符、三位数字、一个连字符，最后是四位数字。由此得出模式\
    \ ***\\d{3}-\\d{3}-\\d{4}***。表 5-1 展示了推导过程。\n\n表 5-1：从 614-345-6789 中提取通用正则表达式模式\n\
    \n| **步骤** | **操作** | **原因** | **说明** | **结果模式** |\n| --- | --- | --- | --- |\
    \ --- |\n| 步骤 1 | 无 | 初始状态 | 不适用 | 614-345-6789 |\n| 步骤 2 | 将数字替换为 ***\\d*** |\
    \ 获得更通用的描述 | ***\\d*** 代表任意单个数字 | \\d\\d\\d-\\d\\d\\d-\\d\\d\\d\\d |\n| 步骤 3 |\
    \ 将 ***\\d\\d\\d*** 替换为 ***\\d{3}*** | 生成更简洁的模式 | ***\\d{3}*** 完全等同于 ***\\d\\\
    d\\d*** | \\d{3}-\\d{3}-\\d\\d\\d\\d |\n| 步骤 4 | 将 ***\\d\\d\\d\\d*** 替换为 ***\\\
    d{4}*** | 生成更简洁的模式 | ***\\d{4}*** 完全等同于 ***\\d\\d\\d\\d*** | \\d{3}-\\d{3}-\\\
    d{4} |\n\n当然，该模式还必须能处理仅包含七位数字的号码，例如 *345-6789*。目前它无法做到，因为它是基于九位数字的数据建模的。调整模式以兼容这种情况，得到\
