    \ a comma |\n| <space> | Followed by a space |\n| \\w | Followed by any alphanumeric\
    \ character |\n| + | Repeated one or more times |\n| <space> | Followed by a space\
    \ |\n| \\d | Followed by a digit |\n| { | Repeated at least |\n| 5 | Five times\
    \ |\n| } | End repetition |\n| ( | Open group |\n| - | Consisting of a hyphen\
    \ |\n| \\d | A digit |\n| { | Repeated at least |\n| 4 | Four times |\n| } | End\
    \ repetition |\n| ) | The end of this group |\n| ? | Look for zero or one of the\
    \ preceding |\n| * **In English:** Look for a name token, as previously defined,\
    \ followed by some words, a comma, and then more words, followed by a zip code.\
    \ This example uses the composition technique. |\n\nListing 1-6: MatchAddress.java\n\
    \n| **![Start example](_1.gif)** |\n\n```\nimport java.util.regex.*;\nimport java.io.*;\n\
    \npublic class MatchAddress{\n    public static void main(String args[]){\n  \
    \      isAddressValid(args[0]);\n    }\n\n/**\n    * Confirms that the format\
    \ for the given address is valid.\n    * @param addr is a String representing\
    \ the address\n    * @returns true if the zip code format is acceptable.\n   \
    \ */\n    public static boolean isAddressValid(String addr){\n       boolean retval\
    \ = false;\n\n//use the name pattern created earlier.\n       String nameToken\
    \ =\"\\\\p{Upper}(\\\\p{Lower}+\\\\s?)\";\n\nString namePattern = \"(\"+nameToken+\"\
    ){2,3}\";\n\n//use the zip code pattern created earlier.\n       String zipCodePattern\
    \ = \"\\\\d{5}(-\\\\d{4})?\";\n\n//construct an address pattern\n      String\
    \ addressPattern = \"^\" + namePattern\n         + \"\\\\w+ .*, \\\\w+ \" + zipCodePattern\
    \ +\"$\";\n\nretval= addr.matches(addressPattern);\n\n//prepare a message indicating\
    \ success or failure\n      String msg = \"NO MATCH\\npattern:\\n \" + addr\n\
    \         + \"\\nregexLength:\\n \"\n         + addressPattern;\n\nif (retval){\n\
    \      msg = \"MATCH\\npattern:\\n \" + addr\n         + \"\\nregexLength:\\n\
    \ \"\n         + addressPattern;\n      }\n      System.out.println(msg +\"\\\
    r\\n\");\n      return retval;\n   }\n}\n```\n\n| **![End example](_1.gif)** |\n\
    \n|  |\n\nOutput 1-6: Result of Running MatchAddress.java\n\n| **![Start example](_1.gif)**\
    \ |\n\n```\nC:\\RegEx\\chapter_1\\Examples\\chapter1>\njava MatchAddress \"John\
