    ```\n\nThis is slightly more efficient than the previous pattern, but it's less\
    \ legible. |\n\nTable C-2: Simple E-mail `^(\\p{Alnum}+(\\.|\\_|\\-)?)*\\p{Alnum}@(\\\
    p{Alnum}+ (\\.|\\_|\\-)?)*\\p{Alpha}$`\n\n| `Regex` | `Description` |\n| --- |\
