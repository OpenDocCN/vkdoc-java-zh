    \ isNameValid(String name){\n     boolean retval=false;\n\nString nameToken =\"\
    \\\\p{Upper}(\\\\p{Lower}+\\\\s?)\";\n\nString namePattern = \"(\"+nameToken+\"\
    ){2,3}\";\n\nretval = name.matches(namePattern);\n\n//准备一条指示成功或失败的消息\n     String\
    \ msg = \"NO MATCH: pattern:\" + name\n          + \"\\r\\n           regex :\"\
    \ + namePattern;\n\nif (retval){\n     msg = \"MATCH     pattern:\" + name\n \
    \         + \"\\r\\n           regex :\" + namePattern;\n     }\n\nSystem.out.println(msg\
    \ +\"\\r\\n\");\n     return retval;\n     }\n} \n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n这个示例很有趣，因为它比前一个示例更充分地利用了 Java 的健壮性。具体来说，你定义了你所说的“姓名标记”的含义：\n\n\
    ```\n String nameToken =\"\\\\p{Upper}(\\\\p{Lower}+\\\\s?)\";\n```\n\n然后你在后面使用了这个定义：\n\
    \n```\n String namePattern = \"(\"+nameToken+\"){2,3}\"; \n```\n\n|  | 注意  | ***\\\
    p{Upper}*** 和 ***\\p{Lower}*** 将在稍后介绍。它们分别简单地表示任意大写字符和任意小写字符。 |\n\n这有助于避免正则表达式模式变得过于复杂，也有助于隔离错误。随着本书中的示例越来越复杂，你将开始看到将正则表达式与\
