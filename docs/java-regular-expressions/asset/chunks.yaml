    ## 验证 EDI 文档


    接下来的示例取自 Sun 网站上的一个帖子。一位程序员需要帮助验证一份电子数据交换（EDI）文档。他需要确保字符串 *ISA* 始终出现在字符串 *IEA*
    之前，并且每个字符串只出现一次。他提供了示例输入 *ISA*XX*XXXXXXXXXXXXXXX*XX*XXXXXXXXXXXXXXX*030130*0912*~IEA*1*000005900~*。


    这个问题很适合使用推送技术，因为很明显我需要将数据推入一个模式中。为了简化问题，我决定进行一些抽象处理。我决定使用 *@* 符号和 *#* 符号来代替字符串
    *ISA* 和 *IEA*。此外，我决定将 *@* 和 *#* 之间的所有内容都视为数字。这些只是为了方便我理解而设置的逻辑占位符。我希望能够抽象掉一些繁琐的细节。


    |  | 注意 | 如果你上学时碰巧喜欢数学，你会注意到这类似于代数中提取复杂子表达式并用简单变量指代它们的技巧。 |


    现在，我将尝试根据表 5-6 中的推理来推进。


    表 5-6：从 @45#78 中提取通用正则表达式模式


    | **步骤** | **我的操作** | **操作原因** | **理由** | **结果模式** |

    | --- | --- | --- | --- | --- |

    | 步骤 1 | 无操作 | 初始状态 | 不适用 | @45#87 |

    | 步骤 2 | 将 *4* 替换为 ***[^@]*** | 获得更通用的描述 | *4* 的唯一特征是它不是 *@*，因此使用 ***[^@]***。
    | @[^@]5#7 |

    | 步骤 3 | 将 *5* 替换为 ***[^@]*** | 获得更通用的描述 | *5* 的唯一特征是它不是 *@*。 | @[^@][^@]#7 |

