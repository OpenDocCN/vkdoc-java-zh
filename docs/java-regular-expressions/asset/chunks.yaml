    # 附录 B：Pattern 和 Matcher 方法


    本附录提供了 Java 中 Pattern 和 Matcher 类方法的摘要。旨在作为使用各种正则表达式工具时的快速参考。如需更详细的描述，请参阅正文中的相应章节。


    ## Pattern 类字段


    ### UNIX_LINES


    UNIX_LINES 标志用于构造 `Pattern.compile(String regex, int flags)` 方法的第二个参数。在解析源自 UNIX
    机器的数据时使用此标志。


    在许多 UNIX 变体中，不可见字符 *\n* 用于表示行结束。这与其他操作系统不同，包括 Windows 的各种版本，它们可能使用 *\r\n*、*\n*、*\r*、*\u2028*
    或 *\u0085* 作为行终止符。


    如果你曾经将源自 UNIX 机器的文件传输到 Windows 平台并打开它，你可能已经注意到，根据你用来查看文本的编辑器，行有时不会像你期望的那样终止。这是因为两个系统可能使用不同的语法来表示行尾。


    UNIX_LINES 标志只是告诉正则表达式引擎它正在处理 UNIX 风格的行，这会影响正则表达式元字符 *^* 和 *$* 的匹配行为。


    |  | 注意 | 使用 UNIX_LINES 标志或等效的 ***(?d)*** 正则表达式模式不会降低性能。默认情况下，此标志未设置。 |


    ### CASE_INSENSITIVE


    CASE_INSENSITIVE 字段用于构造 `Pattern.compile(String regex, int flags)` 方法的第二个参数。当你需要匹配美式
    ASCII 字符（不区分大小写）时，它非常有用。


    |  | 注意 | 使用此标志或等效的 ***(?i)*** 正则表达式可能会导致性能略有下降。默认情况下，此标志未设置。 |


    ### COMMENTS


    COMMENTS 字段被定义，因为它用于构造 `Pattern.compile(String regex, int flags)` 方法的第二个参数。它告诉正则表达式引擎正则表达式模式中嵌入了注释。具体来说，它告诉正则表达式引擎忽略模式中的任何注释，从
    *\#* 字符前的空格开始，一直到行尾的所有内容。


    因此，正则表达式模式 ***A*** ***#matches uppercase US-ASCII char code 65*** 将使用 *A* 作为正则表达式，但
    *\#* 字符前的空格以及之后直到行尾的所有内容都将被忽略。


    |  | 注意 | 使用此标志或等效的 ***(?x)*** 正则表达式不会降低性能。 |


    ### MULTILINE


    MULTILINE 字段用于构造 `Pattern.compile(String regex, int flags)` 方法的第二个参数。它告诉正则表达式引擎正则表达式的输入不是单行代码；相反，它包含多行，每行都有自己的终止字符。


    这意味着行首字符 ***^*** 和行尾字符 ***$*** 可能会匹配输入字符串中的多行。


    例如，假设你的输入字符串是 *This is sentence.\n So is this.* 如果你使用 MULTILINE 标志编译正则表达式模式：


    ```

    Pattern p = Pattern.compile("^", Pattern.MULTILINE);

    ```


    那么行首字符 ***^*** 将匹配 *This is a sentence* 中的 *T* 之前。它也会匹配 *So is this* 中的 *S* 之前。如果不使用
    MULTILINE 标志，则匹配只会找到 *This is a sentence* 中的 *T*。


    |  | 注意 | 使用此标志或等效的 ***(?m)*** 正则表达式可能会降低性能。 |


    ### DOTALL


    DOTALL 标志用于构造 `Pattern.compile(String regex, int flags)` 方法的第二个参数。


    DOTALL 标志告诉正则表达式引擎允许元字符点号 (.) 匹配任何字符，*包括* 行终止字符。这意味着什么？


    假设你的候选字符串是 *Test\n*。如果你对应的正则表达式模式是点号 (.)，那么通常你会得到四个匹配：一个匹配 *T*，一个匹配 *e*，一个匹配 *s*，第四个匹配
    *t*。这是因为正则表达式元字符点号 (.) 通常匹配除行终止字符之外的任何字符。


    启用 DOTALL 标志


    ```

    Pattern p = Pattern.compile(".", Pattern.DOTALL);

    ```


    将会产生五个匹配。你的模式将匹配 *T*、*e*、*s* 和 *t* 字符。此外，它还会匹配行尾的 *\n* 字符。


    |  | 注意 | 使用此标志或等效的 ***(?s)*** 正则表达式不会降低性能。 |


    ### UNICODE_CASE


    UNICODE_CASE 标志与 CASE_INSENSITIVE 标志结合使用，可以为国际字符集生成不区分大小写的匹配。


    |  | 注意 | 使用此标志或等效的 ***(?u)*** 正则表达式可能会降低性能。 |


    ### CANON_EQ


    如你所知，字符实际上是以数字形式存储的。例如，在美式 ASCII 字符集中，字符 A 由数字 65 表示。根据你使用的字符集，同一个字符可以由不同的数字组合表示。例如，à
    可以由 +00E0 和 U+0061U+0300 两者表示。CANON_EQ 匹配将匹配任何一种表示形式。


    |  | 注意 | 使用此标志可能会降低性能。 |


