  trans: "\n#### 字符串数据验证示例\n\n这个示例看起来很简单，因此你首先尝试测试模式 ***Java \\d***。表 1-25 展示了该模式的分解说明。\n\
    \n表 1-25：模式 Java \\d\n\n| **正则表达式** | **描述** |\n| --- | --- |\n| J | 大写字母 *J*\
    \ |\n| a | 后跟字符 *a* |\n| v | 后跟字符 *v* |\n| a | 后跟字符 *a* |\n| <space> | 后跟一个空格\
    \ |\n| \\d | 后跟一个数字 |\n\n这相当简单，于是你自信地编写了代码，如清单 1-8 所示。\n\n清单 1-8：ValidationTest.java\n\
    \n| **![示例开始](img/_1.gif)** |\n\n```\n import java.util.regex.*;\n\n  public class\
    \ ValidationTest{\n     public static void main(String args[]){\n         String\
    \ candidate = \"I love Java 4\";\n         String pattern =\"Java \\\\d\";\n \
    \        System.out.println(candidate.matches(pattern));\n     }\n  }\n```\n\n\
    | **![示例结束](img/_1.gif)** |\n\n|  |\n\n然后你运行它：\n\n```\njava ValidationTest\n```\n\
    \n却发现它在输出 1-8 中失败了。\n\n输出 1-8：运行 ValidationTest.java 的结果\n\n| **![示例开始](img/_1.gif)**\
    \ |\n\n```\nC:\\RegEx\\code>java ValidationTest\nDoes candidate : I love Java\
    \ 4\nmatch pattern  : Java \\d?\n\nfalse\n```\n\n| **![示例结束](img/_1.gif)** |\n\
    \n|  |\n\n发生了什么？因为你的输入字符串是 I love Java 4，而 Java 4 前面有 I love，所以输入与模式 **Java \\\
    d** 并非完全匹配，只是部分匹配。那么现在该怎么办？\n\n你有两个选择。你可以修改模式，允许在要匹配的 Java 4 前后出现字符；或者直接使用 Pattern\
    \ 和 Matcher 对象。我们来探讨一下每种方案的优缺点。\n\n要使用 `String.matcher(String regex)` 方法，你需要考虑模式\
    \ **Java \\d** 前后可能出现的所有字符。因此，你使用了模式 **.*\\bJava \\d(|$)**，表 1-26 对其进行了剖析。\n\n\
    表 1-26：模式 .**\\bJava \\d(|$*)\n\n| **正则表达式** | **描述** |\n| --- | --- |\n| . |\
    \ 任意字符 |\n| * | 重复任意次数 |\n| \\b | 后跟一个单词边界 |\n| J | 后跟大写字母 *J* |\n| a | 后跟字符 *a*\
    \ |\n| v | 后跟字符 *v* |\n| a | 后跟字符 *a* |\n| <space> | 后跟一个空格 |\n| \\d | 后跟一个数字\
    \ |\n| ( | 后跟一个分组，包含 |\n| <space> | 一个空格 |\n| &#124; | 或 |\n| $ | 行尾字符 |\n| )\
    \ | 关闭分组 |\n\n#### 使用 Pattern 和 Matcher 对象进行数据验证示例\n\n上一节中编写模式的工作量比预期稍大。我们来看看在清单\
    \ 1-9 中使用 Pattern 和 Matcher 对象是否更简单。输出结果如输出 1-9 所示。\n\n清单 1-9：ValidationTestWithPatternAndMatcher.java\n\
    \n| **![示例开始](img/_1.gif)** |\n\n```\n import java.util.regex.*;\n\n   public\
    \ class ValidationTestWithPatternAndMatcher{\n      public static void main(String\
    \ args[]){\n   // 编译模式\n   Pattern p = null;\n   try{\n     p = Pattern.compile(\"\
    Java \\\\d\");\n   }\n   catch (PatternSyntaxException pex){\n      pex.printStackTrace();\n\
    \      System.exit(0);\n   }\n\n   // 定义匹配字符串\n\n   String candidate = \"I love\
    \ Java 4\";\n   // 获取匹配器\n   Matcher m = p.matcher(candidate);\n\n   System.out.println(\"\
    result=\" + m.find());\n   }\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n\
    输出 1-9：运行 ValidationTestWithPatternAndMatcher.java 的结果\n\n| **![示例开始](img/_1.gif)**\
    \ |\n\n```\nC:\\RegEx\\Examples\\chapter1>java\nValidationTestWithPatternAndMatcher\n\
    result = true\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n清单 1-9 中使用的模式比清单\
    \ 1-8 中的更简单，它只是原始字符串 ***Java \\d***。但 Java 代码需要显式使用 Pattern 和 Matcher 对象，这对程序员的要求稍高一些。这样做是因为你需要显式访问\
    \ `Matcher.find` 方法，该方法允许你检查输入字符串，看是否有任何部分与模式匹配。这与 `String.matches(String regex)`\
    \ 方法形成对比，后者要求完全匹配。\n\n一般来说，有两种类型的验证。第一种类型要求完全匹配。对于这类验证，最简单的方法可能是使用 `String.matches(String\
    \ regex)`，因为它会拒绝任何不完全匹配的内容。\n\n第二种类型的验证要求字符串在某个位置包含该模式，但不要求完全匹配。例如，你可能要求密码包含非字母数字字符。这类验证最好通过使用\
    \ Matcher 和 Pattern 对象来实现。第 5 章 提供了更复杂的验证示例。\n\n### 搜索与替换\n\n新正则表达式包最强大的功能之一是能够搜索并替换字符串和子字符串。你可能还记得，以前这类操作非常繁琐，需要使用分词器或\
    \ `String.substring` 方法，并配合大量字符串运算。\n\n值得庆幸的是，那些日子已经过去了。在 J2SE 中，有两种通用的方法可以执行搜索和替换操作。下面的示例利用\
    \ String 类新增的两个方法，走了一条更简单的路径。（第 4 章 包含直接使用 Pattern 和 Matcher 类的更复杂示例。）以下示例涉及的两个方法如下：\n\
    \n*   `replaceFirst(String regex, String replacement)`\n\n*   `replaceAll(String\
    \ regex, String replacement)`\n\n第一个方法 `replaceFirst(String regex, String replacement)`\
    \ 仅将正则表达式模式第一次出现的位置替换为 replacement 字符串。第二个方法 `replaceAll` 将模式*所有*出现的位置替换为 replacement\
    \ 字符串。我将在第 2 章 中详细解释这些新方法。\n"
- fmt: "### Search and Replace Example\n\nIf you're like me, you probably think about\
    \ programming more than you should. Say you're writing an essay on boxing. Further,\
    \ say you decide to update your essay on boxing programmatically instead of manually.\
    \ [Listing 1-10](#LiB0010.html#ch01list10) shows the code for doing so. The example\
    \ searches for and replaces some commonly misused phrases from the given paragraph.\
    \ [Output 1-10](#LiB0010.html#ch01ex10) shows the result of running the program.\n\
    \n**Listing 1-10:** `StyleSearchAndReplace.java`\n\n```\npublic class StyleSearchAndReplace{\n\
    \  public static void main(String args[]){\n\n    String statement = \"The question\
    \ as to whether the jab is\"+\n    \" superior to the cross has been debated for\
    \ some time in\"+\n    \" boxing circles. However, it is my opinion that this\"\
    +\n    \" false dichotomy misses the point. I call your attention\"+\n    \" to\
    \ the fact that the best boxers often use a combination of\"+\n    \" the two.\
    \ I call your attention to the fact that Mohammed\"+\n    \" Ali,the Greatest\
    \ of the sport of boxing, used both. He had\"+\n    \" a tremendous jab, yet used\
    \ his cross effectively, often,\"+\n    \" and well\";\n\n    String newStmt=\n\
    \    statement.replaceAll(\"The question as to whether\",\"Whether\");\n\n   \
    \ newStmt= newStmt.replaceAll(\" of the sport of boxing\",\"\");\n    newStmt=newStmt.replaceAll(\"\
    amount of success\",\"success\");\n    newStmt=\n     newStmt.replaceAll(\"However,\
    \ it is my opinion that this\",\"This\");\n\n    newStmt= newStmt.replaceAll(\"\
    a combination of the two\",\"both\");\n    newStmt= newStmt.replaceAll(\"This\
    \ is in spite of the fact that\"\n     +\" the\", \"The\");\n    newStmt=\n  \
    \   newStmt.replaceAll(\"I call your attention to the fact that\",\"\");\n\n \
    \   System.out.println(\"BEFORE:\\n\"+statement + \"\\n\");\n    System.out.println(\"\
    AFTER:\\n\"+newStmt);\n   }\n}\n```\n\nAs [Output 1-10](#LiB0010.html#ch01ex10)\
    \ shows, the clarity of the paragraph has improved somewhat as a result of this\
    \ process.\n\n**Output 1-10:** Result of Running `StyleSearchAndReplace.java`\n\
    \n```\nC:\\RegEx\\Examples\\chapter1>java StyleSearchAndReplace\nBEFORE:\nThe\
    \ question as to whether the jab is superior to the cross has been debated for\n\
    some time in boxing circles. However, it is my opinion that this false dichotomy\n\
    misses the point. I call your attention to the fact that the best boxers often\n\
    use a combination of the two. I call your attention to the fact that Mohammed\n\
    Ali,the Greatest of the sport of boxing, used both. He had a tremendous jab, yet\n\
    used his cross effectively,often, and well\nAFTER:\n\nWhether the jab is superior\
    \ to the cross has been debated for some time in boxing\ncircles. This false dichotomy\
    \ misses the point. the best boxers often use both.\nMohammed Ali,the Greatest,\
    \ used both. He had a tremendous jab, yet used his cross\neffectively,often, and\
    \ well\n```\n\n### Splitting a String\n\nThere are many mechanisms available for\
    \ splitting a `String`, the most obvious being the `StringTokenizer`. However,\
    \ splitting a `String` can be surprisingly complex, because it can require fairly\
    \ complex criteria. For example, it's easy enough to split a comma-separated file,\
    \ but what about splitting a word into vowels and consonants? The latter can be\
    \ ridiculously complicated. Fortunately, regular expressions can be particularly\
    \ helpful in these sorts of situations, as you'll learn in the following sections.\n\
    \n#### Splitting a String Example\n\nIn English rhetoric, we learn that one of\
    \ the best ways to strengthen a sentence is to place positives and negatives in\
    \ opposition. The code in [Listing 1-11](#LiB0010.html#ch01list11) takes a sentence\
    \ and attempts to strengthen it by placing the positives and negatives in opposition.\
    \ [Output 1-11](#LiB0010.html#ch01ex11) shows the result.\n\n**Listing 1-11:**\
    \ `StyleSplitExample.java`\n\n```\npublic class StyleSplitExample{\n   public\
    \ static void main(String args[]){\n      String phrase1= \"but simple justice,\
    \ not charity\";\n      strengthenSentence(phrase1);\n\n      String phrase2=\n\
    \       \"but that I love Rome more, not that I love Caesar less\";\n      strengthenSentence(phrase2);\n\
    \n      String phrase3=\n      \"ask what you can do for your country, ask not\
    \ what your \"\n      + \"country can do for you\";\n      strengthenSentence(phrase3);\n\
    \   }\n   /**\n   * Splits and rearranges the given String, hopefully to a more\n\
    \   * powerful effect.\n   * @param sentence is a String representing the phrase\
    \ we want to\n   * strengthen.\n   * @returns is a String representing the modified\
    \ phrase.\n   */\n   public static String strengthenSentence(String sentence){\n\
    \      String retval=null;\n\n      String[] tokens = null;\n\n      String splitPattern\
    \ = \",\";\n\n      tokens= sentence.split(splitPattern);\n\n      if (tokens==null){\n\
    \         String msg = \"   NO MATCH: pattern:\" + sentence\n             + \"\
    \\r\\n             regex: \" + splitPattern;\n      }\n      else{\n         retval\
    \ = tokens[1] + \", \" + tokens[0];\n         System.out.println(\"BEFORE: \"\
    \ + sentence);\n         System.out.println(\"AFTER : \" + retval +\"\\n\");\n\
    \      }\n      return retval;\n   }\n}\n```\n\n**Output 1-11:** Result of Running\
    \ `StyleSplitExample.java`\n\n```\nC:\\RegEx\\Examples\\chapter1>java StyleSplitExample\n\
    BEFORE: but simple justice, not charity\nAFTER : not charity, but simple justice\n\
    \nBEFORE: but that I love Rome more, not that I love Caesar less\nAFTER : not\
    \ that I love Caesar less, but that I love Rome more\n\nBEFORE: ask what you can\
    \ do for your country, ask not what your\ncountry can do for you\nAFTER : ask\
    \ not what your country can do for you, ask what you can\ndo for your country\n\
    ```"
