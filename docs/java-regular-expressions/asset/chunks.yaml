- fmt: "## FAQs\n\n| **Q:** | **What does the pattern `<((?i)TITLE>)(.*?)</\\1` break\
    \ down to?** | [![The answer is given in Table 4-1. Of particular interest is\
    \ the subgroup `(.*?)`. Notice that this is a reluctant qualifier, thus it will\
    \ only match as little as possible before seeing the next `<title>` element. The\
    \ difference here is that given `<title>first title</title><title>second title></title>`,\
    \ the pattern will only extract `first title`. However, without the reluctant\
    \ qualifier, it would extract `first title</title><title>second title>`. The Pattern\
    \ `<((?i)TITLE>)(.*?)</(\\1)` Regex Description * In English: Extract the contents\
    \ of first occurrence of the TITLE element and be willing to match any case version\
    \ of TITLE, including Title, title, and so on. - The character `<` followed by\
    \ ( A group consisting of (?i) A case-insensitive comparison of T The character\
    \ T followed by I The character I followed by T The character T followed by L\
    \ The character L followed by E The character E followed by `>` The character\
    \ `>` ) Close group ( Followed by a group consisting of . Any character * Repeated\
    \ any number of times ? Matched reluctantly ) Close group, followed by `<` The\
    \ character `<` followed by `/` The character `/` followed by `\\1` The first\
    \ group, which matched `(?i)TITLE>` ](question.gif)](#LiB0040.html#answer.N19)\
    \ |\n| **Q:** | **How do I know if my regex is too complex?** | [![The first goal\
    \ of any regex pattern is, of course, that it works accurately and efficiently\
    \ enough. The second goal is that it be legible. How do you know if it's legible?\
    \ My advice is comment it with as much detail as you feel it needs, and then pass\
    \ it to a few developers who are likely to have to decipher it. If they follow\
    \ it (or better yet, if they're able to modify it), then it's probably clear enough.\
    \ If not, then you may want to consider refactoring. ](question.gif)](#LiB0040.html#answer.N271)\
    \ |\n\n## Answers\n\n| **A:** | The answer is given in [Table 4-1](#LiB0040.html#ch04table01).\
    \ Of particular interest is the subgroup `(.*?)`. Notice that this is a reluctant\
    \ qualifier, thus it will only match as little as possible before seeing the next\
    \ `<title>` element. The difference here is that given `<title>first title</title><title>second\
    \ title></title>`, the pattern will only extract `first title`. However, without\
    \ the reluctant qualifier, it would extract `first title</title><title>second\
    \ title>`. |\n\n**Table 4-1: The Pattern `<((?i)TITLE>)(.*?)</(\\1)`**\n\n| **Regex**\
    \ | **Description** |\n| --- | --- |\n| `<` | The character `<` followed by |\n\
    | `(` | A group consisting of |\n| `(?i)` | A case-insensitive comparison of |\n\
    | `T` | The character `T` followed by |\n| `I` | The character `I` followed by\
    \ |\n| `T` | The character `T` followed by |\n| `L` | The character `L` followed\
    \ by |\n| `E` | The character `E` followed by |\n| `>` | The character `>` |\n\
    | `)` | Close group |\n| `(` | Followed by a group consisting of |\n| `.` | Any\
    \ character |\n| `*` | Repeated any number of times |\n| `?` | Matched reluctantly\
    \ |\n| `)` | Close group, followed by |\n| `<` | The character `<` followed by\
    \ |\n| `/` | The character `/` followed by |\n| `\\1` | The first group, which\
    \ matched `(?i)TITLE>` |\n| | **In English:** Extract the contents of first occurrence\
    \ of the `TITLE` element and be willing to match any case version of `TITLE`,\
    \ including `Title`, `title`, and so on. |\n\n| **A:** | The first goal of any\
    \ regex pattern is, of course, that it works accurately and efficiently enough.\
    \ The second goal is that it be legible. How do you know if it's legible? My advice\
    \ is comment it with as much detail as you feel it needs, and then pass it to\
    \ a few developers who are likely to have to decipher it. If they follow it (or\
    \ better yet, if they're able to modify it), then it's probably clear enough.\
    \ If not, then you may want to consider refactoring. |\n\n# Chapter 5: Practical\
    \ Examples\n\n## Overview\n\n> *\"I took a speed reading course and read War and\
    \ Peace in 20 minutes. It's about Russia.\"*\n> \n> — Woody Allen\n\nIn this chapter,\
    \ I'll think aloud as I solve several regex problems. This should provide some\
    \ insight into the process of forming nontrivial regex solutions. Some of these\
