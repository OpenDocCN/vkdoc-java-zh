    If you actually need to find one of these characters, such as the ***** character,
    simply append the character you''re searching for to a ***\*** character. For
    example, to find the ******* character, use ***\****.


    ### Common and Boundary Characters


    Regular expressions also contain characters that take on special meaning when
    they''re delimited by the ***\*** character. These facilitate finding common tokens,
    such as word boundaries, empty spaces, tabs, alphanumeric characters, and so on.
    For example, ***\n*** and ***\t*** are special characters that represent a newline
    and a tab, respectively.


    In this section, I cover these common boundary characters and provide examples
    of their use.


    #### Common Characters


    Certain types of characters occur often enough that regular expression languages
    have developed a shorthand for referring to them. For example, a digit is designated
    by the ***\d*** expression. Without the ***\*** character delimiting the ***d***,
    the expression would simply refer to the fourth letter of the English alphabet,
    in lowercase. [Table 1-3](#LiB0008.html#ch01table03) lists some of these common
    characters.


    Table 1-3: Common and Boundary Characters


    | **Character** | **Description** |

    | --- | --- |

    | . | Matches any character; may also match line terminators. |

    | \d | A digit ***[0-9]***. This will match any single digit from *0* to *9*.
    Notice that an input of *19* will need to match twice: Once for the *1* and once
    again for the *9*. |

    | \D | A nondigit ***[^0-9]***. This will match any character that isn''t a digit,
    including a whitespace character. |

    | \w | A word character ***[a-zA-Z_0-9]***. This will match any character from
    *a* to *z* or *A* to *Z*, an underscore, or any single digit from *0* to *9*.
    |

    | \W | A nonword character ***[^\w]***. This will match any character that isn''t
    a word character, such as a number, including whitespace characters. |

    | \t | The tab character. |

    | \n | The newline (linefeed) character. |

    | \r | The carriage-return character. |

    | \f | The form-feed character. |

    | \s | A whitespace character. This includes the newline, carriage-return, tab,
    form-feed, and end-of-line characters. |

    | \S | A non-whitespace character, also known as ***[^\s]***. This will match
    any character that isn''t a whitespace character, as described previously. |

    | ^ | The beginning of a line. |

    | $ | The end of a line. |

    | \b | A word boundary. A *word boundary* is the character immediately preceding
    what we think of as "words" in English vernacular, corresponding to ***\w*** previously.
    It will also match the character immediately following a word. Most often, this
    character matches a space, a tab, an end of a line, or a beginning of a line.
    |

    | \B | A non-word boundary. |


    #### Common Characters Example


    Imagine that you need to verify that a given String consists of any alphanumeric
    character, including underscores, followed by a digit. Thus, you would accept
    *A1*, but not *!1*, because the *!* symbol isn''t an alphanumeric character or
    an underscore. The pattern you want in this case consists of an alphanumeric character
    (or underscore) followed by a digit; thus, ***\w\d***, per [Table 1-1](#LiB0008.html#ch01table01).


    The pattern ***\w\d*** will match *h1, k9, A1,* or *11*, because each consists
    of an alphanumeric character followed by a digit. It won''t match *AA, 9A,* or
    **5,* because these don''t consist of an alphanumeric character followed by a
    digit. [Table 1-4](#LiB0008.html#ch01table04) dissects the pattern.


    Table 1-4: The Pattern *\w\*d


    | **Regex** | **Description** |

    | --- | --- |

    | **\w** | Any character ranging from *a* to *z*, *A* to *Z*, *0* to *9*, or an
    underscore |

    | **\d** | Followed by a single digit ranging from *0* to *9* |

    | * **In English:** Look for any alphanumeric character, or the underscore character,
    followed by a single digit. |


    #### Boundary Characters


    Regular expressions also provide a mechanism for finding common character boundaries.
    These include newlines, end-of-line characters, end-of-file characters, tabs,
    and so on. These are listed in the latter part of [Table 1-3](#LiB0008.html#ch01table03).


    #### Boundary Characters Example


    Say you want to match the word anna from an input string, but only if it''s at
    the beginning of a word. Thus, Hanna wouldn''t fit your criteria. The pattern
    you want in this case consists of a word boundary, ***\b***, followed by the characters
    *a, n, n*, and *a*, thus the regex ***\banna***.


    The pattern ***\banna*** will match *anna* but not *Hanna*, because *anna* is
    a cluster of characters preceded by a space character. A space character meets
    the criterion of being a word boundary. This isn''t true of *Hanna*, because the
    character immediately preceding the *a* character in *Hanna* is an *H*, and *H*
    isn''t a word boundary. [Table 1-5](#LiB0008.html#ch01table05) dissects the pattern.


    Table 1-5: The Pattern *\bann*a


    | **Regex** | **Description** |

    | --- | --- |

    | \b | A word boundary |

    | a | Followed by the character *a* |

    | n | Followed by the character *n* |

    | n | Followed by the character *n* |

    | a | Followed by the character *a* |

    | * **In English:** Look for *anna* if it is the beginning of a word. |'
