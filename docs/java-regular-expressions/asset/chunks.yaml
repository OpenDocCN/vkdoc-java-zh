    | **![End example](_1.gif)** |\n\n|  |"
  trans: "\n### 验证电话号码格式示例\n\n清单 1-2 中的代码仅用于判断给定的电话号码是否符合格式良好的标准。它利用了表 1-6 中介绍的两个元字符。具体来说，它使用了范围限定符\
    \ ***{n,m}***，表示前面的字符或类必须至少重复 *n* 次，最多重复 *m* 次。它还使用了字符 `?`，表示前面的字符或类必须出现零次或一次。\n\
    \n整个模式用于检查一个七位数字，其前面可以带有可选的国家代码和区号。输出 1-2 显示了运行程序的结果，表 1-19 则对该模式进行了剖析。\n\n表 1-19：模式\
    \ *(\\d-)?(\\d{3}-)?\\d{3}-\\d{4}*\n\n| **正则表达式** | **描述** |\n| --- | --- |\n\
    | ( | 一个分组，包含 |\n| \\d | 一个数字 |\n| - | 后跟一个连字符 (-) |\n| ) | 该分组结束 |\n| ? | 查找前面元素出现零次或一次\
    \ |\n| ( | 后跟一个分组，包含 |\n| \\d | 一个数字 |\n| { | 至少重复 |\n| 3 | 三次 |\n| } | 重复结束 |\n\
    | - | 后跟一个连字符 |\n| ) | 该分组结束 |\n| ? | 查找前面元素出现零次或一次 |\n| \\d | 后跟一个数字 |\n| { |\
    \ 至少重复 |\n| 3 | 三次 |\n| } | 重复结束 |\n| - | 后跟一个连字符 |\n| \\d | 后跟一个数字 |\n| { | 至少重复\
    \ |\n| 4 | 四次 |\n| } | 重复结束 |\n| * **中文释义：** 查找一个数字后跟一个连字符。这部分是可选的。然后，查找三个数字后跟一个连字符。这部分也是可选的。接下来，查找三个数字，后跟一个连字符，再后跟四个数字。\
    \ |\n\n输出 1-2：运行 MatchPhoneNumber.java 的结果\n\n| **![开始示例](img/_1.gif)** |\n\n\
    ```\nC:\\RegEx\\Examples\\chapter1>java MatchPhoneNumber \"1-999-111-2222\"\n\
    \   MATCH  : pattern:1-999-111-2222\n            regex: (\\d-)?(\\d{3}-)?\\d{3}-\\\
    d{4}\n\nC:\\RegEx\\Examples\\chapter1>java MatchPhoneNumber \"999-111-2222\"\n\
    \   MATCH   : pattern:999-111-2222\n             regex: (\\d-)?(\\d{3}-)?\\d{3}-\\\
    d{4}\n\nC:\\RegEx\\Examples\\chapter1>java MatchPhoneNumber \"1-111-2222\"\n \
    \  MATCH   : pattern:1-111-2222\n             regex: (\\d-)?(\\d{3}-)?\\d{3}-\\\
    d{4}\n\nC:\\RegEx\\Examples\\chapter1>java MatchPhoneNumber \"111-2222\"\n   MATCH\
    \   : pattern:111-2222\n             regex: (\\d-)?(\\d{3}-)?\\d{3}-\\d{4}\nC:\\\
    RegEx\\Examples\\chapter1>java MatchPhoneNumber \"1.999-111-2222\"\n   NO MATCH:\
    \ pattern:1.999-111-2222\n             regex: (\\d-)?(\\d{3}-)?\\d{3}-\\d{4}\n\
    \nC:\\RegEx\\Examples\\chapter1>java MatchPhoneNumber \"999 111-2222\"\n   NO\
    \ MATCH: pattern:999 111-2222\n             regex: (\\d-)?(\\d{3}-)?\\d{3}-\\\
    d{4}\n\nC:\\RegEx\\Examples\\chapter1>java MatchPhoneNumber \"1 111 2222\"\n \
    \  NO MATCH: pattern:1 111 2222\n             regex: (\\d-)?(\\d{3}-)?\\d{3}-\\\
    d{4}\n\nC:\\RegEx\\Examples\\chapter1>java MatchPhoneNumber \"111-JAVA\"\n   NO\
    \ MATCH: pattern:111-JAVA\n             regex: (\\d-)?(\\d{3}-)?\\d{3}-\\d{4}\n\
    ```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n### 验证邮政编码格式示例\n\n清单 1-3 中的代码用于判断邮政编码是否符合格式良好的标准。它检查一个五位数字，后面可以可选地跟一个连字符和四位数字。输出\
    \ 1-3 显示了运行程序的结果。表 1-20 则对该模式进行了剖析。\n\n表 1-20：模式 *\\d{5}(-\\d{4})?*\n\n| **正则表达式**\
    \ | **描述** |\n| --- | --- |\n| \\d | 一个数字 |\n| { | 至少重复 |\n| 5 | 五次 |\n| } | 重复结束\
    \ |\n| ( | 开始分组 |\n| - | 包含一个连字符 |\n| \\d | 一个数字 |\n| { | 至少重复 |\n| 4 | 四次 |\n\
    | } | 重复结束 |\n| ) | 该分组结束 |\n| ? | 查找前面元素出现零次或一次 |\n| * **中文释义：** 查找五个数字，后面可选地跟一个连字符和四个数字。\
    \ |\n\n清单 1-3：MatchZipCodes.java\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport\
    \ java.util.regex.*;\nimport java.io.*;\n\npublic class MatchZipCodes{\n   public\
    \ static void main(String args[]){\n      isZipValid(args[0]);\n   }\n\n   /**\n\
    \   * 确认给定邮政编码的格式是否有效。\n   * @param zip 是一个表示邮政编码的字符串。\n   * @returns 如果邮政编码格式可接受则返回\
    \ true。\n   */\n   public static boolean isZipValid(String zip){\n      boolean\
    \ retval=false;\n      String zipCodePattern = \"\\\\d{5}(-\\\\d{4})?\";\n   \
    \   retval = zip.matches(zipCodePattern);\n\n      //准备一条指示成功或失败的消息\n      String\
    \ msg = \"   NO MATCH: pattern:\" + zip\n             + \"\\r\\n             regex:\
    \ \" + zipCodePattern;\n\n      if (retval){\n      msg = \"   MATCH   : pattern:\"\
    \ + zip\n          + \"\\r\\n             regex: \" + zipCodePattern;\n      }\n\
    \n      System.out.println(msg +\"\\r\\n\");\n      return retval;\n   }\n}\n\
    ```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n输出 1-3：运行 MatchZipCodes.java 的结果\n\
    \n| **![开始示例](img/_1.gif)** |\n\n```\nC:\\RegEx\\Examples\\chapter1>java MatchZipCodes\
    \ \"45643-4443\"\n   MATCH  : pattern:45643-4443\n            regex: \\d{5}(-\\\
    d{4})?\n\nC:\\RegEx\\Examples\\chapter1>java MatchZipCodes \"45643\"\n   MATCH\
    \   : pattern:45643\n             regex: \\d{5}(-\\d{4})?\n\nC:\\RegEx\\Examples\\\
    chapter1>java MatchZipCodes \"443\"\n   NO MATCH: pattern:443\n             regex:\
    \ \\d{5}(-\\d{4})?\n\nC:\\RegEx\\Examples\\chapter1>java MatchZipCodes \"45643-44435\"\
    \n   NO MATCH: pattern:45643-44435\n             regex: \\d{5}(-\\d{4})?\n\nC:\\\
    RegEx\\Examples\\chapter1>java MatchZipCodes \"45643 44435\"\n   NO MATCH: pattern:45643\
    \ 44435\n             regex: \\d{5}(-\\d{4})?\n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n"
- fmt: "### Confirming Dates Example\n\nThe code in [Listing 1-4](#LiB0009.html#ch01list04)\
    \ checks the format of a given date. It confirms that given date format consists\
    \ of one or two digits followed by a hyphen, followed by one or two digits, followed\
    \ by a hyphen, followed by four digits. [Output 1-4](#LiB0009.html#ch01ex04) shows\
    \ the result of running the program. [Table 1-21](#LiB0009.html#ch01table21) dissects\
    \ the pattern.\n\n**Table 1-21: The Pattern `\\d{1,2}-\\d{1,2}-\\d{4}`**\n\n|\
    \ **Regex** | **Description** |\n| --- | --- |\n| `\\d` | A digit |\n| `{` | Repeated\
    \ at least |\n| `1` | One time |\n| `,` | But no more than |\n| `2` | Two times\
    \ |\n| `}` | Close repetition |\n| `-` | Followed by a hyphen |\n| `\\d` | Followed\
    \ by a digit |\n| `{` | Repeated at least |\n| `1` | One time |\n| `,` | But no\
    \ more than |\n| `2` | Two times |\n| `}` | Close repetition |\n| `-` | Followed\
    \ by a hyphen |\n| `\\d` | Followed by a digit |\n| `{` | Repeated at least |\n\
    | `1` | Four times |\n| `}` | Close repetition |\n| * **In English:** Look for\
    \ one or two digits, followed by a hyphen, followed by one or two digits, followed\
    \ by a hyphen, followed by four digits. |\n\n**Listing 1-4: MatchDates.java**\n\
    \n```\nimport java.util.regex.*;\nimport java.io.*;\n\npublic class MatchDates{\n\
    \   public static void main(String args[]){\n      isDateValid(args[0]);\n   }\n\
    \   /**\n   * Confirms that given date format consists of one or two digits\n\
    \   * followed by a hyphen, followed by one or two digits, followed\n   * by a\
    \ hyphen, followed by four digits\n   * @param date is a String representing the\
    \ date.\n   * @returns true if date format is acceptable.\n   */\n   public static\
    \ boolean isDateValid(String date){\n      boolean retval=false;\n\n      String\
    \ datePattern =\"\\\\d{1,2}-\\\\d{1,2}-\\\\d{4}\";\n      retval = date.matches(datePattern);\n\
    \n      //prepare a message indicating success or failure\n      String msg =\
    \ \"   NO MATCH: pattern:\" + date\n             + \"\\r\\n             regexLength:\
    \ \" + datePattern;\n\n      if (retval){\n      msg = \"   MATCH   : pattern:\"\
    \ + date\n          + \"\\r\\n             regexLength: \" + datePattern;\n  \
    \    }\n\n      System.out.println(msg +\"\\r\\n\");\n      return retval;\n \
    \  }\n}\n```\n\n**Output 1-4: Result of Running MatchDates.java**\n\n```\nC:\\\
    RegEx\\Examples\\chapter1>java MatchDates \"04-02-1999\"\n   MATCH  : pattern:04-02-1999\n\
    \            regexLength: \\d{1,2}-\\d{1,2}-\\d{4}\n\nC:\\RegEx\\Examples\\chapter1>java\
    \ MatchDates \"15-42-1999\"\n   MATCH   : pattern:15-42-1999\n             regexLength:\
    \ \\d{1,2}-\\d{1,2}-\\d{4}\n\nC:\\RegEx\\Examples\\chapter1>java MatchDates \"\
    April fourth nineteen ninety nine\"\n   NO MATCH: pattern:April fourth nineteen\
    \ ninety nine\n             regexLength: \\d{1,2}-\\d{1,2}-\\d{4}\nC:\\RegEx\\\
    Examples\\chapter1>java MatchDates \"15-42-20002\"\n   NO MATCH: pattern:15-42-20002\n\
    \             regexLength: \\d{1,2}-\\d{1,2}-\\d{4}\n\nC:\\RegEx\\Examples\\chapter1>java\
    \ MatchDates \"02-02-20002\"\n   NO MATCH: pattern:02-02-20002\n             regexLength:\
    \ \\d{1,2}-\\d{1,2}-\\d{4}\n\nC:\\RegEx\\Examples\\chapter1>java MatchDates \"\
    04-02-02\"\n   NO MATCH: pattern:04-02-02\n             regexLength: \\d{1,2}-\\\
    d{1,2}-\\d{4}\n\nC:\\RegEx\\Examples\\chapter1>java MatchDates \"04-02-garbage\"\
    \n   NO MATCH: pattern:04-02-garbage\n             regexLength: \\d{1,2}-\\d{1,2}-\\\
    d{4}\n```\n\n### Confirming Name Formats Example\n\nThe code in [Listing 1-5](#LiB0009.html#ch01list05)\
    \ determines if the given name meets the criterion of being well formatted. It\
    \ looks for a first name token, an optional middle name token, and finally a last\
    \ name token. For this example's purposes, a name token consists of a capital\
    \ letter followed by any number of lowercase letters.\n\n**Listing 1-5: MatchNameFormats.java**\n\
    \n```\nimport Java.util.regex.*;\nimport java.io.*;\n\npublic class MatchNameFormats{\n\
    \   public static void main(String args[]){\n\nisNameValid(args[0]);\n   }\n\n\
    /**\n   * Confirms that the format for the given name is valid.\n   * @param name\
    \ is a String representing the name.\n   * @returns true if the name format is\
    \ acceptable.\n   */\n   public static boolean isNameValid(String name){\n   \
    \  boolean retval=false;\n\nString nameToken =\"\\\\p{Upper}(\\\\p{Lower}+\\\\\
    s?)\";\n\nString namePattern = \"(\"+nameToken+\"){2,3}\";\n\nretval = name.matches(namePattern);\n\
    \n//prepare a message indicating success or failure\n     String msg = \"NO MATCH:\
    \ pattern:\" + name\n          + \"\\r\\n           regex :\" + namePattern;\n\
    \nif (retval){\n     msg = \"MATCH     pattern:\" + name\n          + \"\\r\\\
    n           regex :\" + namePattern;\n     }\n\nSystem.out.println(msg +\"\\r\\\
    n\");\n     return retval;\n     }\n} \n```\n\nThis example is interesting because\
    \ it takes advantage of Java's robustness to a degree that the previous example\
    \ didn't. Specifically, you define what you mean when you say a \"name token\"\
    :\n\n```\n String nameToken =\"\\\\p{Upper}(\\\\p{Lower}+\\\\s?)\";\n```\n\nThen\
    \ you use that definition later:\n\n```\n String namePattern = \"(\"+nameToken+\"\
    ){2,3}\"; \n```\n\n|  | Note  | `\\p{Upper}` and `\\p{Lower}` are described shortly.\
    \ They simply mean any uppercase character and any lowercase character, respectively.\
    \ |\n\nThis helps to keep the regex pattern from becoming overwhelming, and it\
    \ also helps to isolate errors. As the examples in this book grow more ambitious,\
    \ you'll start to see that coupling regular expressions with Java's powerful language\
    \ can offer benefits that would, at best, be terse using regular expressions alone.\
    \ [Listing 1-5](#LiB0009.html#ch01list05) shows the program `MatchNameFormats.java`,\
    \ [Output 1-5](#LiB0009.html#ch01ex05) shows the result of running the program,\
    \ and [Table 1-22](#LiB0009.html#ch01table22) dissects the pattern.\n\n**Table\
    \ 1-22: The Pattern `(\\p{Upper}(\\p{Lower}+\\s?)){2,3}`**\n\n| **Regex** | **Description**\
    \ |\n| --- | --- |\n| `(` | A group consisting of |\n| `\\p{Upper}` | An uppercase\
    \ character |\n| `(` | Followed by a inner group consisting of |\n| `\\p{Lower}`\
    \ | A lowercase character |\n| `+` | Repeated one or more times |\n| `\\s?` |\
    \ Followed by an optional space |\n| `)` | The end of the inner group |\n| `)`\
    \ | The end of the outer group |\n| `{` | Repeated at least |\n| `2` | Two times\
    \ |\n| `,` | But no more than |\n| `3` | Three times |\n| `}` | End repetition\
    \ |\n| * **In English:** Look for two or three words beginning with a capital\
    \ letter followed by any number of lowercase letters. Each word could be followed\
    \ by a single space. |\n\n**Output 1-5: Result of Running MatchNameFormats.java**\n\
    \n```\nC:\\RegEx\\Examples\\chapter1>java MatchNameFormats \"John Smith\"\nMATCH\
    \    pattern:John Smith\n          regex :(\\p{Upper}(\\p{Lower}+\\s?)){2,3}\n\
    \nC:\\RegEx\\Examples\\chapter1>java MatchNameFormats \"John McGee\"\nMATCH  \
    \   pattern:John McGee\n           regex :(\\p{Upper}(\\p{Lower}+\\s?)){2,3}\n\
    \nC:\\RegEx\\Examples\\chapter1>java MatchNameFormats \"John Willliam Smith\"\n\
    MATCH     pattern:John Willliam Smith\n           regex :(\\p{Upper}(\\p{Lower}+\\\
    s?)){2,3}\n\nC:\\RegEx\\Examples\\chapter1>java MatchNameFormats \"John Q Smith\"\
    \nNO MATCH: pattern:John Q Smith\n           regex :(\\p{Upper}(\\p{Lower}+\\\
    s?)){2,3}\n\nC:\\RegEx\\Examples\\chapter1>java MatchNameFormats \"John allen\
    \ Smith\"\nNO MATCH: pattern:John allen Smith\n           regex :(\\p{Upper}(\\\
    p{Lower}+\\s?)){2,3}\n\nC:\\RegEx\\Examples\\chapter1>java MatchNameFormats \"\
    John\"\nNO MATCH: pattern:John\n           regex :(\\p{Upper}(\\p{Lower}+\\s?)){2,3}\n\
    ```"
