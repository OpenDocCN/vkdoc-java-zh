    ### 阅读模式


    正则表达式语言包含旨在帮助描述搜索条件的元字符。由于在不了解这些字符的情况下阅读模式可能会令人困惑，我在表 1-1 中列出了最常用的元字符。


    表 1-1：基本正则表达式分隔符


    | **模式** | **名称** | **描述** |

    | --- | --- | --- |

    | . | 点号 | 匹配任意单个字符。 |

    | $ | 美元符号 | 匹配行尾。 |

    | ^ | 脱字符 | 匹配行首。 |

    | { | 左花括号 | 定义范围的开始。 |

    | [ | 左方括号 | 定义字符类的开始。 |

    | ( | 左圆括号 | 定义分组的开始。 |

    | &#124; | 管道符号 | 表示“或”的符号 |

    | } | 右花括号 | 定义范围的结束。 |

    | ] | 右方括号 | 定义字符类的结束。 |

    | ) | 右圆括号 | 定义分组的结束。 |

    | * | 星号 | 前面的元素重复零次或多次。 |

    | + | 加号 | 前面的元素重复一次或多次。 |

    | ? | 问号 | 前面的元素重复零次或一次。 |

    | \ | 反斜杠 | 后面的字符不被视为元字符。 |


    这些字符实际上是保留字，就像 `new` 是 Java 中的保留字一样。它们是构建更复杂搜索条件的基础模块。稍后我将对此进行更详细的讨论。


    如果你在正则表达式模式中读取一个字符，并且它不在表 1-1 所列的字符中，那么你正在读取的这个字符很可能就代表它本身。例如，表 1-2 展示了如何解读模式
    ***hello****。


    表 1-2：模式 *hello* ^([*])


    | **字母** | **描述** |

    | --- | --- |

    | h | 字符 *h* |

    | e | 后跟字符 *e* |

    | l | 后跟字符 *l* |

    | l | 后跟字符 *l* |

    | o | 后跟字符 *o* |

    | * | 后跟一个元字符，在此情况下表示 *o* 应重复零次或多次 |

    | ^([*])*中文释义：* 查找单词 *hell*，后跟任意数量的尾随 *o* 字符。 |


    如果你确实需要查找这些字符之一，例如 ***** 字符，只需在你搜索的字符前加上一个 ***\*** 字符。例如，要查找 ******* 字符，请使用 ***\****。


    ### 常见字符与边界字符


    正则表达式还包含一些字符，当它们由 ***\*** 字符分隔时，会具有特殊含义。这些字符有助于查找常见的标记，例如单词边界、空格、制表符、字母数字字符等。例如，***\n***
    和 ***\t*** 是分别表示换行符和制表符的特殊字符。


    在本节中，我将介绍这些常见的边界字符并提供使用示例。


    #### 常见字符


    某些类型的字符出现频率很高，以至于正则表达式语言已经发展出引用它们的简写形式。例如，数字由 ***\d*** 表达式表示。如果没有 ***\*** 字符来分隔
    ***d***，该表达式就只是指英文字母表中的第四个小写字母。表 1-3 列出了一些常见的字符。


    表 1-3：常见字符与边界字符


    | **字符** | **描述** |

    | --- | --- |

    | . | 匹配任意字符；也可能匹配行终止符。 |

    | \d | 一个数字 ***[0-9]***。这将匹配从 *0* 到 *9* 的任意单个数字。请注意，输入 *19* 需要匹配两次：一次匹配 *1*，一次匹配
    *9*。 |

    | \D | 一个非数字 ***[⁰-9]***。这将匹配任何不是数字的字符，包括空白字符。 |

    | \w | 一个单词字符 ***[a-zA-Z_0-9]***。这将匹配从 *a* 到 *z* 或 *A* 到 *Z* 的任何字符、下划线或从 *0* 到
    *9* 的任意单个数字。 |

    | \W | 一个非单词字符 ***[^\w]***。这将匹配任何不是单词字符的字符，例如数字，包括空白字符。 |

    | \t | 制表符。 |

    | \n | 换行符。 |

    | \r | 回车符。 |

    | \f | 换页符。 |

    | \s | 一个空白字符。这包括换行符、回车符、制表符、换页符和行结束符。 |

    | \S | 一个非空白字符，也称为 ***[^\s]***。这将匹配任何不是空白字符的字符，如前所述。 |

    | ^ | 行首。 |

    | $ | 行尾。 |

    | \b | 一个单词边界。*单词边界* 是紧邻我们通常所说的英语“单词”之前的字符，对应于之前的 ***\w***。它也会匹配紧跟在单词之后的字符。大多数情况下，此字符匹配空格、制表符、行尾或行首。
    |

    | \B | 一个非单词边界。 |


    #### 常见字符示例


    假设你需要验证一个给定的字符串是否由任意字母数字字符（包括下划线）后跟一个数字组成。因此，你会接受 *A1*，但不会接受 *!1*，因为 *!* 符号不是字母数字字符或下划线。在这种情况下，你需要的模式由一个字母数字字符（或下划线）后跟一个数字组成；因此，根据表
    1-1，模式为 ***\w\d***。


    模式 ***\w\d*** 将匹配 *h1、k9、A1* 或 *11*，因为每个字符串都由一个字母数字字符后跟一个数字组成。它不会匹配 *AA、9A* 或
    **5*，因为这些字符串不是由一个字母数字字符后跟一个数字组成的。表 1-4 对这个模式进行了剖析。


    表 1-4：模式 *\w\*d


    | **正则表达式** | **描述** |

    | --- | --- |

    | **\w** | 任意字符，范围从 *a* 到 *z*、*A* 到 *Z*、*0* 到 *9*，或下划线 |

    | **\d** | 后跟一个从 *0* 到 *9* 的单个数字 |

    | * **中文释义：** 查找任意字母数字字符或下划线字符，后跟一个单个数字。 |


    #### 边界字符


    正则表达式还提供了一种查找常见字符边界的机制。这些包括换行符、行结束符、文件结束符、制表符等。这些列在表 1-3 的后半部分。


    #### 边界字符示例


    假设你想从输入字符串中匹配单词 `anna`，但仅当它位于单词开头时。因此，`Hanna` 不符合你的条件。在这种情况下，你需要的模式由一个单词边界 ***\b***
    后跟字符 *a、n、n* 和 *a* 组成，因此正则表达式为 ***\banna***。


    模式 ***\banna*** 将匹配 *anna* 但不会匹配 *Hanna*，因为 *anna* 是一个前面有空格字符的字符簇。空格字符满足作为单词边界的条件。而
    *Hanna* 则不然，因为在 *Hanna* 中紧邻 *a* 字符之前的字符是 *H*，而 *H* 不是单词边界。表 1-5 对这个模式进行了剖析。


    表 1-5：模式 *\bann*a


    | **正则表达式** | **描述** |

    | --- | --- |

    | \b | 一个单词边界 |

    | a | 后跟字符 *a* |

    | n | 后跟字符 *n* |

    | n | 后跟字符 *n* |

    | a | 后跟字符 *a* |

    | * **中文释义：** 如果 *anna* 是一个单词的开头，则查找它。 |

