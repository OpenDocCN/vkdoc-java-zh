    \n## 验证邮政编码\n\n下一个挑战是提供一个验证美国邮政编码的方法。该方法需要能处理邮政编码五位数和四位数部分之间的标点符号、空格或无分隔符的情况。它还需要能处理只有五位数的邮政编码。突然需求发生了变化：现在还需要验证加拿大、英国、阿根廷、瑞典、日本和荷兰的邮政编码。\n\
    \n我做的第一件事是在网上搜索模式，从[`www.regexlib.com`](http://www.regexlib.com)开始。这个网站提供了前面提到的所有国家的正则表达式。接着，我将这些正则表达式添加到\
    \ regex.properties 文件中，这样我就可以使用第 4 章中的 RegexProperties 类。\n\n这样做的目的，当然是为了将表达式外部化，并避免对特殊字符进行双重转义。我决定为属性键使用有意义的键名。也就是说，我预期能够获取每个正则表达式模式对应的国家代码。因此，我可以根据国家代码来定义属性文件的键。例如，由于日本的国家代码是*JP*，我将日本邮政编码模式的键定义为*zipJP*。清单\
