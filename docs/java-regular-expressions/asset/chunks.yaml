- fmt: '### Quantifiers and Alternates


    `Quantifiers` and `alternates` allow you to specify the number of tokens you need
    to find or alternative tokens you''re willing to accept. [Table 1-6](#LiB0008.html#ch01table06)
    lists some of the quantifiers and alternates in regex.


    Table 1-6: Quantifiers


    | **Regex** | **Description** |

    | --- | --- |

    | `?` | The preceding is repeated once or not at all. |

    | `*` | The preceding is repeated zero or more times. |

    | `+` | The preceding is repeated one or more times. |

    | `{n}` | The preceding is repeated exactly *n* times. |

    | `{n,}` | The preceding is repeated at least *n* times. |

    | `{n,m}` | The preceding is repeated at least *n* times, but no more than *m*
    times. This includes *m* repetitions. |

    | `\|` | The element preceding the `\|` or the element following it. |


    The following sections offer some examples that demonstrate working with quantifiers.


    #### Repeated Characters Example 1


    The pattern `An+a` will match *Ana*, *Anna*, or *Annnna* because each contains
    at least one *A* character immediately followed by one or more *n* characters
    followed by an *a* character. It won''t match `Aa` or `ANna` because these don''t
    consist of a single *A* character immediately followed by at least one *n* character
    followed by an *a* character. Notice that a capital *N* and a lowercase *n* aren''t
    considered matches. [Table 1-7](#LiB0008.html#ch01table07) dissects the pattern.


    Table 1-7: The Pattern `An+a`


    | **Regex** | **Description** |

    | --- | --- |

    | `A` | The character *A* |

    | `n+` | Followed by one or more *n* characters |

    | `a` | Followed by the character *a* |

    | * **In English:** Look for a capital *A*, followed by one or more *n* characters,
    followed by an *a* character. |


    There is some interesting behavior that can be elicited here. If this match had
    been performed using the `String.matches` method, the pattern would not have matched
    *AnnaMarie*, because the `String.matches` method requires an exact match, and
    the *Marie* part of *AnnaMarie* would have ruined that exactness. However, the
    `Matcher.find` method would have matched *AnnaMarie* because it''s more permissive.
    Stay tuned—more details coming soon.


    #### Repeated Characters Example 2


    The pattern `A{2,7}` will match *AA*, *AAAA*, or *AAAAAAA* because each of these
    contains at least two *A* characters and no more than seven *A* characters. The
    pattern won''t match *A* because it contains less than two *A* characters, and
    the pattern won''t match *AAAAAAAA* because it contains more than seven *A* characters.
    [Table 1-8](#LiB0008.html#ch01table08) dissects the pattern.


    Table 1-8: The Pattern `A{2,7}`


    | **Regex** | **Description** |

    | --- | --- |

    | `A` | The character *A* |

    | `{` | Open repeating group |

    | `2` | Repeated at least two times |

    | `,` | But not more than |

    | `7` | Seven times |

    | `}` | Close repeated group |

    | * **In English:** Look for a sequence of the character *A* repeated two, three,
    four, five, six, or seven times. |


    |  | Note | In the example at the beginning of this chapter, you needed a pattern
    to match four consecutive digits and derived `\d\d\d\d`. As noted, this isn''t
    the most elegant pattern possible. An alternative, yet equivalent, way of expressing
    the same pattern is `\d{4}`, per [Table 1-6](#LiB0008.html#ch01table06)—that is,
    a sequence of exactly four digits. |


    #### Alternative Characters Example 1


    The pattern `A|B` will match *A* or *B*, because each consists of either an *A*
    character or a *B* character. It won''t match *P*, *Q*, or *jelly* because these
    don''t consist strictly of either an *A* or a *B* character. [Table 1-9](#LiB0008.html#ch01table09)
    dissects this pattern.


    Table 1-9: The Pattern `A|B`


    | **Regex** | **Description** |

    | --- | --- |

    | `A` | The character *A* |

    | `\|` | Or |

    | `B` | The character *B* |

    | * **In English:** Look for either a capital *A* or a capital *B*. |


    #### Alternative Characters Example 2


    The pattern `anna|marie` will match *anna* or *marie*, because *anna* matches
    the first alternative and *marie* matches the second. It won''t match *Josie*,
    *Ralph*, or *Doctor*. [Table 1-10](#LiB0008.html#ch01table10) dissects the pattern.


    Table 1-10: The Pattern `anna|marie`


    | **Regex** | **Description** |

    | --- | --- |

    | `anna` | The characters *a*, *n*, *n*, and *a*, in order |

    | `\|` | Or |

    | `marie` | The characters *m*, *a*, *r*, *i*, and *e*, in order |

    | * **In English:** Look for either the word *anna* or the word *marie*. |


    So would the pattern match *annamarie* as a single word? In a word, maybe. I provide
    detailed information about this topic in later chapters, but here''s the nickel
    tour. Java 2 Enterprise Edition''s (J2EE''s) regex allows you to specify whether
    you need an exact or partial match. Thus, *annamarie* would match the pattern
    `anna|marie` twice for a partial match, and not at all for an exact match. Without
    going into too much detail, `String.matches` only provides for exact matches,
    whereas the `Matcher` class can provide more lenient matches using the `find`
    method.


    What about the pattern `Miss anna|marie`? Will it match *Miss marie* and *Miss
    anna*, or just one of them? Or will it match neither? A strict match will match
    *Miss anna* but reject *Miss marie*. The alternative `|` will read *Miss anna*
    as a single option and the pattern *marie* as another. Because the pattern *maria*
    isn''t equal to the candidate *Miss maria*, the search will reject *Miss maria*.


    ### Character Classes


    There are times when you need to describe your search criteria as a *class*—that
    is, as a group that shares potentially complex commonalities that you need to
    be able to describe and for which there are no predefined classes. Fortunately,
    regex provides a mechanism for doing so through character classes, as shown in
    [Table 1-11](#LiB0008.html#ch01table11).


    Table 1-11: Character Classes


    | **Pattern** | **Description** |

    | --- | --- |

    | `[abc]` | *a*, *b*, or *c*. (Of course, any character could be used, not just
    *a*, *b*, or *c*.) |

    | `[^abc]` | Any character except *a*, *b*, or *c*. |

    | `[a-zA-Z]` | *a* through *z* or *A* through *Z*. |

    | `[a-d[m-p]]` | *a* through *d*, or *m* through *p*: `[a-dm-p]`. |

    | `[a-z&&[def]]` | Whatever exists in both sets, namely *d*, *e*, or *f*. |

    | `[a-z&&[^bc]]` | *a* through *z*, except for *b* and *c*: `[ad-z]`. |

    | `[a-z&&[^m-p]]` | *a* through *z*, and not *m* through *p*: `[a-lq-z]`. |


    There are also some predefined Portable Operating System Interface for UNIX (POSIX)
    character classes. These are American Standard Code for Information Interchange
    (ASCII) classes that experience has shown to be particularly useful. Thus, they''re
    already in place, and you can simply refer to them for use. [Table 1-12](#LiB0008.html#ch01table12)
    contains the POSIX character classes.


    Table 1-12: POSIX Character Classes


    | **Pattern** | **Description** |

    | --- | --- |

    | `\p{Lower}` | A lowercase letter: `[a-z]` |

    | `\p{Upper}` | An uppercase letter: `[A-Z]` |

    | `\p{ASCII}` | All ASCII characters: `[\x00-\x7F]` |

    | `\p{Alpha}` | An upper- or lowercase letter: `[\p{Lower}\p{Upper}]` |

    | `\p{Digit}` | A digit: `[0-9]` |

    | `\p{Alnum}` | A number or a letter: `[\p{Alpha}\p{Digit}]` |

    | `\p{Punct}` | Punctuation: one of `!"#$%&''()*+,-./:;<=>?@[\]^_`{&#124;}~` |

    | `\p{Graph}` | Any visible character: `[\p{Alnum}\p{Punct}]` |

    | `\p{Print}` | A printable character: `[\p{Graph}]` |

    | `\p{Blank}` | A tab or space |

    | `\p{Cntrl}` | A control character: `[\x00-\x1F\x7F]` |

    | `\p{XDigit}` | A hexadecimal digit: `[0-9a-fA-F]` |

    | `\p{Space}` | A whitespace character: `[ \t\n\x0B\f\r]` |'
