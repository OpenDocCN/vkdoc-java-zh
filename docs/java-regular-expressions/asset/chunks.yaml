    ## Back Cover


    Java has always been an excellent language for working with objects. But Java’s
    text manipulation mechanisms have always been limited, compared to languages like
    AWK and Perl. On the flip side, a new regular expressions package in Java 2 Standard
    Edition (J2SE) brings hope to the Java text mechanisms. This package provides
    you everything necessary to use regular expressions—all packaged in a simplified
    object-oriented framework.


    In addition to working examples and best practices, this book features a detailed
    API reference with examples supporting nearly every method, and a step-by-step
    tutorial to create your own regular expressions. With time, you’ll discover that
    regular expressions are extremely powerful in your programming arsenal—and you’ll
    enjoy using them! And once you’ve mastered these tools, you’ll ponder how you
    ever managed without them.


    **About the Author**


    Mehran Habibi is the coauthor of *The Sun Certified Java Developer Exam with J2SE
    1.4* and *Cracking the AP Computer Science Exam, 2004-2005 Edition.* He is also
    an application architect with BankOne in Ohio, where he resides with his lovely
    wife, Angela. Mehran has over 9 years of IT experience, including positions with
    IBM, Executive Jet, UUNET, BankOne, and OCLC, in addition to working as a university
    lecturer, independent consultant, and Java certification trainer. Technologies
    of interest to him include web services, wireless technologies, and XML/XSLT.
    Mehran''s professional focus has been on architecture, project leadership, mentoring,
    team leadership, and programming from the mid-tier on back. Mehran holds certifications
    in both "The Other Company" and Java 2, and he graduated with a bachelor''s of
    science degree in software engineering from the honors program at The Ohio State
    University.


