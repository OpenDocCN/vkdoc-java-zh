  trans: "\n# 第 3 章：高级正则表达式\n\n## 概述\n\n> *\"你必须转身面对猛虎，才能发现它不过是纸做的。\"*\n> \n> ——禅语\n\
    \n本章探讨 J2SE 中正则表达式的一些更高级特性。其目标是为 Java 开发者提供更复杂的正则表达式工具和概念的参考点。当你需要重温 J2SE 正则表达式概念时，本章可作为参考资料。\n\
    \n当然，没有什么学习工具比实际编写代码更有用，因此我鼓励你亲自尝试这些概念。本章介绍了多种概念，包括组、子组、非捕获组、贪婪限定符、积极限定符、懒惰限定符、正向先行断言、负向先行断言、正向后行断言和负向后行断言。本章最后一节重点介绍如何提高正则表达式的效率。\n\
    \n|  | 注意 | 本章中的示例特意保持简单，以便清晰说明所讨论的机制。更复杂的示例（例如专业场景中使用的示例）将在第 5 章和附录中探讨。 |\n\n\
    ## 理解组\n\n正如我在第 2 章中解释的，组就是描述正则表达式模式的一系列字符。因此，***\\w\\d*** 是一个组，因为它包含两个字符 ***\\\
    w*** 和 ***\\d***，并且它们按顺序排列。这是一个隐式组，因此很简单，因为大多数组通常都用括号显式包围。在 Java 正则表达式中，每个模式都有组，并且这些组都有索引。因此，模式\
    \ ***\\w\\d*** 只有一个组，即它本身，该组的索引当然是 0。\n\n组在 Pattern 中描述，但在 Matcher 中实现。从概念上讲，这类似于\
    \ SQL 的工作方式：查询在 SQL 语句中描述，但匹配的部分从 ResultSet 中提取。因此，当你描述模式 ***\\w\\d*** 时，你可能会从候选字符串\
    \ *A9 is my favorite* 中提取匹配的候选 *A9*。例如，如果组被描述为\n\n```\nPattern p = Pattern.compile(\"\
    \\\\w\\\\d\");\n```\n\n并且候选字符串是\n\n```\nString candidate = \"A9 is my favorite\"\
    ;\n```\n\n你为此候选字符串定义一个 Matcher：\n\n```\nMatcher matcher = p.matcher(candidate);\n\
    ```\n\n假设已经调用了 Matcher.find() 方法，那么调用 Matcher.group(0) 会返回候选字符串中与整个模式匹配的部分，如下所示：\n\
    \n```\nString tmp = matcher.group(0);\n```\n\n因此，Matcher.group(0) 方法这个名称有点用词不当。它实际上并不提取组；它提取候选字符串中与该组匹配的部分。这是一个微妙但重要的区别。完整示例如清单\
    \ 3-1 所示。\n\n清单 3-1：使用组\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\n\
    public class SimpleGroupExample{\n    public static void main(String args[]){\n\
    \        //原始模式始终是组 0\n        Pattern p = Pattern.compile(\"\\\\w\\\\d\");\n\
    \        String candidate = \"A9 is my favorite\";\n\n        //如果存在匹配，则提取候选字符串中\n\
    \        //与组(0)匹配的部分\n        Matcher matcher = p.matcher(candidate);\n\n   \
    \     //输出为 'A9'\n        if (matcher.find()){\n            String tmp = matcher.group(0);\n\
    \            System.out.println(tmp);\n        }\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n当你需要整个模式时，这种方法非常有效。但如果你需要该模式的子部分呢？如何提取它们？这时子组就派上用场了。\n\n## 理解子组\n\
    \n正如模式可以有组一样，它也可以有子组。*子组*就是更大整体中的较小分组。它们通过被括号包围而与原始组以及彼此分隔开来。\n\n在前一节的示例中，为了能够显式引用数字\
    \ ***\\d***，你将模式修改为 ***\\w(\\d)***。这里，***\\w\\d*** 是组(0)，而 ***(\\d)*** 是组(1)。清单\
    \ 3-2 演示了如何使用子组来提取候选字符串中与数字 ***\\d*** 匹配的部分。\n\n清单 3-2：使用子组\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\nimport java.util.regex.*;\npublic class SimpleSubGroupExample{\n \
    \   public static void main(String args[]){\n        //原始模式始终是组 0\n        Pattern\
    \ p = Pattern.compile(\"\\\\w(\\\\d)\");\n        String candidate = \"A9 is my\
    \ favorite\";\n\n        //如果存在匹配，则提取匹配的部分\n        Matcher matcher = p.matcher(candidate);\n\
    \        if (matcher.find()){\n            //提取 'A9'，它与组(0)匹配，组(0)始终是\n      \
    \      //整个模式本身\n            String tmp = matcher.group(0);\n            System.out.println(tmp);\
    \ //tmp 为 49\n\n            //提取候选字符串中与组(1)匹配的部分：\n            //即跟在 'A' 后面的 '9'\n\
    \            tmp = matcher.group(1); //tmp 为 9\n            System.out.println(tmp);\n\
    \        }\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n清单 3-2 允许你提取候选字符串中与整个表达式匹配的部分。它还允许你提取该匹配部分的子部分。因此，你可以从匹配区域\
    \ *A9* 中提取 *9*，因为 *9* 与组(1)匹配。也就是说，当正则表达式引擎匹配 *A9* 时，它会存储 *9*，因为你定义了子组 ***(\\\
    d)***。\n\n## 访问子组\n\n那么这一切实际上是如何工作的呢？正则表达式引擎内部是否有小精灵在跑来跑去，跟踪所有这些组？嗯，可以说是，也可以说不是。\n\
    \n虽然据我所知引擎内部没有小精灵，但正则表达式引擎确实通过将候选字符串中的匹配部分存入内存来内部跟踪所有子组。因此，因为你将模式定义为 ***\\w(\\\
    d)***，正则表达式会跟踪任何前面有字母数字或下划线字符的单个数字。当你将表达式 ***(\\d)*** 放在括号中时，正则表达式认为你的意图就是如此。\n\
    \n引擎根据这些捕获组的数字索引提供对它们的访问。捕获组按从左到右的顺序，根据其左括号的顺序进行索引，并且组(0)始终引用整个原始表达式。因此，在前面的示例中，组(0)引用候选字符串中与整个表达式\
    \ ***\\w(\\d)*** 匹配的部分，而组(1)引用表达式中与 ***(\\d)*** 部分匹配的部分。\n\n例如，如果你的模式是 ***(\\\
    w)(\\d)(\\w)(\\w)***，并且候选字符串是 *J2SE*，那么组 0 将匹配整个候选字符串 *J2SE*。组 1 将匹配 *J*，组 2 将匹配\
    \ *2*，组 3 将匹配 *S*，组 4 将匹配 *E*。\n\n相应地，如果你的模式仍然是 ***(\\w)(\\d)(\\w)(\\w)***，但候选字符串是\
    \ *R2D2*，那么组 0 将匹配整个候选字符串 *R2D2*。组 1 将匹配 *R*，组 2 将匹配 *2*，组 3 将匹配 *D*，组 4 将匹配 *2*。\n"
- fmt: "# Noncapturing Subgroups\n\nThere may be times when you need to define a group,\
    \ but you don't want that group to be captured—you simply want to treat it like\
    \ a single logical entity. The major advantage of using these *noncapturing groups*\
    \ is that they're less memory intensive because they don't require the regex engine\
    \ to keep track of the matching parts.\n\nConsider the pattern `(\\w)(\\d\\d)(\\\
    w+)`. Specifically, if you don't need access to the trailing `(\\w+)`, you can\
    \ optimize a bit.\n\nTo mark a group as noncapturing, you simply follow the opening\
    \ parameters of that group with the characters `?:`. That is, you can write the\
    \ expression as `(\\w)(\\d\\d)(?:\\w+)`. Notice that the only difference between\
    \ the original expression, `(\\w)(\\d\\d)(\\w+)`, and the new expression, `(\\\
    w)(\\d\\d)(?:\\w+)`, is the use of the `?:` that immediately precedes the last\
    \ group, `(\\w+)`.\n\nThe most common use of noncapturing groups is for the sake\
    \ of logical separation. For example, say you need to find out what kind of morning\
    \ a person is having. You'll accept *good morning*, *bad morning*, *terrible morning*,\
    \ *great morning*, and so on. For the sake of clarity, you write the expression\
    \ as `(good|bad|terrible|great) morning`. That is, you want to treat the various\
    \ kinds of mornings as a single logical unit.\n\nHowever, say you don't need to\
    \ capture the type of morning, because you're not going to be using it for anything—you\
    \ just want to know it's there. You modify your expression to `(?:good|bad|terrible|great)\
    \ morning`. Specifically, you insert `?:` just inside the group definition, after\
    \ the opening parenthesis of the group. This gives you the ability to treat the\
    \ various kinds of mornings as a single logical unit, but it doesn't waste memory\
    \ capturing the description.\n\n|  | Note | To make a group noncapturing, insert\
    \ `?:` inside the opening parenthesis of the group. |\n\nAn added issue in working\
    \ with noncapturing groups is that they aren't counted, as far as group indexing\
    \ is concerned. This makes perfect sense, as you are, in effect, telling the regex\
    \ engine that you aren't interested in these groups. Thus, why should the regex\
    \ track them or provide a mechanism that allows you to refer to them? After all,\
    \ you explicitly told the regex engine that you weren't interested in doing so.\n\
    \nSo for the pattern `(?:\\w)(\\d)`, `group(0)` is the entire pattern, namely\
    \ `\\w\\d`, and `group(1)` is `(\\d)`. Notice that `(?:\\w)` is not `group(1)`,\
    \ as it normally would be, because `(?:\\w)` is a noncapturing group; it's preceded\
    \ by `?:`. [Listing 3-3](#LiB0024.html#ch03list03) demonstrates the use of a simple\
    \ noncapturing subgroup.\n\n**Listing 3-3: Working with Noncapturing Subgroups**\n\
    \n```\nimport java.util.regex.*;\n\npublic class NonCapturingGroupExample{\n \
    \   public static void main(String args[]){\n        //define the pattern\n  \
    \      String regex = \"hello|hi|greetings|(?:good morning)\";\n\n//define the\
    \ candidate strings\n        String candidate1 = \"Tommy say hi to you\";\n  \
    \      String candidate2 = \"Tommy say good morning to you\";\n        //compile\
    \ the pattern\n        Pattern pattern = Pattern.compile(regex);\n\n//extract\
    \ the first pattern\n        Matcher matcher = pattern.matcher(candidate1);\n\
    \        //show the number of groups\n        System.out.println(\"GROUP COUNT:\"\
    + matcher.groupCount());\n\nif (matcher.find())System.out.println(\"GOT 1:\"+candidate1);\n\
    \n//reuse the matcher, and check the second candidate string\n        matcher.reset();\n\
    \        matcher = pattern.matcher(candidate2);\n\n//show the number of groups\n\
    \        System.out.println(\"GROUP COUNT:\"+ matcher.groupCount());\n\nif (matcher.find())\n\
    \        System.out.println(\"GOT 2:\" +candidate2);\n    }\n}\n```\n\nThe output\
    \ of this example is shown in [Output 3-1](#LiB0024.html#ch03ex01).\n\n**Output\
    \ 3-1: Output of NonCapturingGroupExample**\n\n```\nGROUP COUNT:0\nGOT 1:Tommy\
    \ say hi to you\nGROUP COUNT:0\nGOT 2:Tommy say good morning to you\n```\n\nIf\
    \ you had used a capturing group, then the group count could have been 1. Although\
    \ this may seem like a fairly innocuous issue, it could grow exponentially more\
    \ complex, as the number of capturing groups grow."
