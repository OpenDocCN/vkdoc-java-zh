- fmt: '# Validating an EDI Document


    This next example is taken from a posting on the Sun site. A programmer needs
    help validating an Electronic Data Interchange (EDI) document. He needs to make
    sure that the String `ISA` always occurs before the String `IEA`, and that each
    occurs only once. He provided the sample input `ISA*XX*XXXXXXXXXXXXXXX*XX*XXXXXXXXXXXXXXX*030130*0912*~IEA*1*000005900~*`.


    This problem is a candidate for the push technique, because it''s fairly clear
    that I''ll have to push the data into a pattern. To simplify the problem, I decide
    to deal in the abstract a bit. Instead of the strings `ISA` and `IEA`, I decide
    to use the `@` sign and the `#` sign. Furthermore, I decide that everything—all
    the stuff in between `@` and `#`—is a number. These are just logical placeholders,
    for my own benefit. I want to be able abstract away some of the messy details.


    |  | Note | If you happened to have liked mathematics in school, you''ll notice
    that this is similar to the algebraic technique of factoring out messy subexpressions
    and referring to them using a simple variable. |


    Now I''ll see if I can take this anywhere with the reasoning in [Table 5-6](#LiB0050.html#ch05table06).


    **Table 5-6: Pulling a General Regex Pattern from `@45#78`**


    | **Step** | **What I Did** | **Why I Did It** | **Justification** | **Resulting
    Pattern** |

    | --- | --- | --- | --- | --- |

    | Step 1 | Nothing | Initial state | N/A | `@45#87` |

    | Step 2 | Substituted `[^@]` for `4` | To get a more generic description | The
    only distinguishing feature of `4` is that it''s not `@`, hence `[^@]`. | `@[^@]5#7`
    |

    | Step 3 | Substituted `[^@]` for `5` | To get a more generic description | The
    only distinguishing feature of `5` is that it''s not `@`. | `@[^@][^@]#7` |

    | Step 4 | Swapped in `[^@]*` for `[^@][^@]` | To get a more generic description
    | `[^@]*` is a superset of `[^@]`. | `@[^@]*#7` |

    | Step 5 | Swapped in `([^@][^#])` for `7` | To get a more generic description
    | The only distinguishing feature of `7` is that it''s not `@` or `#`. | `@[^@]*#([^@][^#])8`
    |

    | Step 6 | Swapped in `([^@][^#])` for `8` | To get a more generic description
    | The only distinguishing feature of `8` is that it''s not `@` or `#`. | `@[^@]*#([^@][^#])([^@][^#])`
    |

    | Step 7 | Swapped in `([^@][^#])*` for `([^@][^#])([^@][^#])` | To get a more
    generic description | `([^@][^#])*` is a superset of `([^@][^#])([^@][^#])`. |
    `@[^@]*#([^@][^#])*` |


    I think I''ve taken that about as far as I can. Now I''ll start stepping away
    from the abstract and heading back toward what I actually wanted. [Table 5-7](#LiB0050.html#ch05table07)
    breaks down my reasoning.


    **Table 5-7: Pulling an EDI Regex out of `@[^@]*#([^@][^#]*)*`**


    | **Step** | **What I Did** | **Why I Did It** | **Justification** | **Resulting
    Pattern** |

    | --- | --- | --- | --- | --- |

    | Step 8 | Nothing | Initial state | N/A | `@[^@]*#([^@][^#])*` |

    | Step 9 | Substitute `ISA` for `@` | To get a more specific description | `@`
    was always just a stand-in for `ISA`. | `ISA[^ISA]*#([^ISA][^#])*` |

    | Step 10 | Substitute `IEA` for `#` | To get a more specific description | `#`
    was always just a stand-in for `IEA`. | `ISA[^ISA]*IEA([^ISA][^IEA])*` |

    | Step 11 | Added `?:` inside `([^ISA][^IEA])` | To improve efficiency | I don''t
    need a capturing group. | `ISA[^ISA]*IEA(?:[^ISA][^IEA])*` |


    ## Summary


    The examples in this chapter should act as samples for writing your own regex
    expressions. I discussed confirming zip codes, using date formats, searching a
    string, searching a file, extracting data from a file, and modifying the contents
    of a file. If you''re looking for more examples like these, please visit [http://www.influxs.com](http://www.influxs.com).


    ## FAQs


    | **Q:** | **Where can I get more information about a particular pattern?** |
    [![I suggest that you ask the folks at one of the various Java newsgroups. The
    JavaRanch site ( http://www.javaranch.com ) is particularly helpful, and so are
    the good folks on the ORO and Regexp newsgroups. Also, Apress now provides forums
    ( http://forums.apress.com ) where readers can interact directly with authors.
    When you ask your question, make sure you provide sample input, expected output,
    and your current code. ](question.gif)](#LiB0052.html#answer.N19) |

    | **Q:** | **What are some other resources for regex?** | [![The single best regex
    book I can think of is Jeffery E. F. Friedl''s Mastering Regular Expressions (O''Reilly
    & Associates, 2002). It''s an elegant introduction to regex, and it deals with
    how several languages, including Java, use regex. It doesn''t focus on Java regex
    with the detail that this book does, but it does provide an excellent, entertaining,
    and detailed account of regex mechanics, theory, and application. If you''re looking
    for a book that will expand your general understanding of regex, you should seriously
    consider purchasing Mastering Regular Expressions . ](question.gif)](#LiB0052.html#answer.N41)
    |

    | **Q:** | **Can I e-mail you with regex questions?** | [![Well, yes and no. I
    won''t address private e-mail messages, but you''re likely to find me lurking
    on the JavaRanch site ( http://www.javaranch.com ) and the Apress forums ( http://forums.apress.com
    ). If your questions are posted so that the general public can take advantage
    of the discussion, then I''ll try and provide whatever help I can. ](question.gif)](#LiB0052.html#answer.N57)
    |


    ### Answers


    | [**A:**](#LiB0052.html#N19) | I suggest that you ask the folks at one of the
    various Java newsgroups. The JavaRanch site ([http://www.javaranch.com](http://www.javaranch.com))
    is particularly helpful, and so are the good folks on the ORO and Regexp newsgroups.
    Also, Apress now provides forums ([http://forums.apress.com](http://forums.apress.com))
    where readers can interact directly with authors. When you ask your question,
    make sure you provide sample input, expected output, and your current code. |

    | [**A:**](#LiB0052.html#N41) | The single best regex book I can think of is Jeffery
    E. F. Friedl''s *Mastering Regular Expressions* (O''Reilly & Associates, 2002).
    It''s an elegant introduction to regex, and it deals with how several languages,
    including Java, use regex. It doesn''t focus on Java regex with the detail that
    this book does, but it does provide an excellent, entertaining, and detailed account
    of regex mechanics, theory, and application. If you''re looking for a book that
    will expand your general understanding of regex, you should seriously consider
    purchasing *Mastering Regular Expressions*. |

    | [**A:**](#LiB0052.html#N57) | Well, yes and no. I won''t address private e-mail
    messages, but you''re likely to find me lurking on the JavaRanch site ([http://www.javaranch.com](http://www.javaranch.com))
    and the Apress forums ([http://forums.apress.com](http://forums.apress.com)).
    If your questions are posted so that the general public can take advantage of
    the discussion, then I''ll try and provide whatever help I can. |'
