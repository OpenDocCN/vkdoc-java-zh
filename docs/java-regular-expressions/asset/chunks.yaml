    \ `[0-5]` | Any digit from `0` to `5`, followed by |\n| `\\.` | A period |\n|\
    \ `)` | Close subgroup |\n| `)` | Close group |\n| `{3}` | Repeated three times,\
    \ followed by |\n| `(` | A group consisting of |\n| `(` | A subgroup consisting\
    \ of |\n| `[0-1]?` | Zero or one, both optional, followed by |\n| `\\d{1,2}` |\
    \ Any two digits |\n| `)` | Close subgroup |\n| `|` | Or |\n| `(` | A subgroup\
    \ consisting of |\n| `2` | The digit `2`, followed by |\n| `[0-4]` | Any digit\
    \ from `0` to `4`, followed by |\n| `\\d` | Any digit |\n| `)` | Close subgroup\
    \ |\n| `|` | Or |\n| `(` | A subgroup consisting of |\n| `2` | The digit `2`,\
    \ followed by |\n| `5` | The digit `5`, followed by |\n| `[0-5]` | Any digit from\
    \ `0` to `5`, followed by |\n| `)` | Close subgroup |\n| `)` | Subgroup |\n| `$`\
