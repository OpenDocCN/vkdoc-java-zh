  trans: "\n### public boolean find()\n\n`find()` 方法会解析候选字符串中足够的部分以查找匹配项。如果成功找到这样的子字符串，则返回\
    \ `true`，并且 `find` 停止解析候选字符串。如果候选字符串中没有部分与模式匹配，则 `find` 返回 `false`。\n\n因此，对于模式\n\
    \n```\nPattern p = Pattern.compile(\"Bond\");\n```\n\n和候选字符串 *My name is Bond.\
    \ James Bond*。\n\n```\nMatcher matcher = p.matcher(\"My name is Bond. James Bond\"\
    );\n```\n\n调用 `find()` 会解析 *My name is Bond. James Bond*，直到子字符串 *My name is* *Bond*\
    \ 遇到第一个 *Bond*，如下所示：\n\n![](img/fig111_01.jpg)\n\n框选部分是已解析的候选字符串部分；因此，这也是我们将要关注的\
    \ `start`、`end` 或 `group` 方法所调用的部分。为什么？因为 `find` 方法只需解析到 *Bond* 中的 *d* 即可找到匹配项。完成该任务后，`find`\
    \ 方法不会浪费资源去解析候选字符串的其余部分。\n\n调用 `find` 是使用 `start`、`end` 和 `group` 等方法之前必要的准备工作。如果没有先调用\
    \ `find`，调用这些方法将会抛出 `IllegalStateException`。\n\n此方法的一个常见用途是作为 `while` 循环中的控制条件，这样就不会在可能抛出\
    \ `IllegalStateException` 时调用 `start`、`end` 或 `group` 方法。清单 2-17 是一个简单正则表达式的示例，它循环遍历字符串\
    \ *I* *love Java. Java is my favorite language. Java Java* *Java*。并查找模式 ***Java***。\n\
    \n清单 2-17：使用 find() 方法\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\n\
    /**\n * 演示 Matcher.find 方法的使用\n */\npublic class MatcherFindExample{\n  public\
    \ static void main(String args[]){\n      test();\n  }\n  public static void test(){\n\
    \     //创建一个 Pattern\n      Pattern p = Pattern.compile(\"Java\");\n\n     //创建候选字符串\n\
    \     String candidateString =\n      \"I love Java. Java is my favorite language.\
    \ Java Java Java.\";\n\n     //尝试匹配候选字符串。\n     Matcher matcher = p.matcher(candidateString);\n\
    \n     //循环并显示所有匹配项\n     while (matcher.find()){\n        System.out.println(matcher.group());\n\
    \     }\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n在此示例中，候选字符串是\n\n\
    ```\n String candidateString =\n      \"I love Java. Java is my favorite language.\
    \ Java Java Java.\";\n```\n\n当首次进入 `while` 循环时，会立即在 `Matcher` 上调用 `find()`，这会导致下图中框选区域的出现。在该框选区域内，匹配的部分被圈出，如下面的图片所示。\n\
    \n框选区域是已解析的区域，圈出部分是匹配的子字符串：\n\n![点击展开](img/fig112_01_0.jpg)\n\n框选区域是下一个被解析的区域，圈出部分是匹配的子字符串：\n\
    \n![点击展开](img/fig112_02_0.jpg)\n\n框选区域是下一个被解析的区域，圈出部分是匹配的子字符串：\n\n![点击展开](img/fig112_03_0.jpg)\n\
    \n框选区域是下一个被解析的区域，圈出部分是匹配的子字符串：\n\n![点击展开](img/fig112_04_0.jpg)\n\n框选区域是下一个被解析的区域，圈出部分是匹配的子字符串：\n\
    \n![点击展开](img/fig113_01_0.jpg)\n\n### public boolean find(int start)\n\n`find(int\
    \ start)` 方法的工作方式与其重载版本完全相同，只是它指定了开始搜索的位置。`start` 中的 `int` 参数只是告诉 `Matcher` 从哪个字符开始搜索。\n\
    \n因此，对于候选字符串 *I* *love Java. Java is my favorite language. Java* *Java Java*。和模式\
    \ ***Java***，如果你只想从字符索引 11 开始搜索，则使用命令 `find(11)`。下图中框选的是已解析的区域，实际匹配的组被圈出：\n\n\
    ![点击展开](img/fig113_02_0.jpg)\n\n如果给定的索引大于候选字符串的长度，则此方法将抛出 `IndexOutOfBoundsException`。因此，对于前面的候选字符串，调用\
    \ `find(58)` 将导致 `IndexOutOfBoundsException`，因为该字符串的长度只有 57。\n\n你也可以使用此方法来设置搜索的起始点。因此，你可以执行\
    \ `find(11)` 从字符 11 开始搜索，然后使用 `find(0)` 从字符 0 开始搜索。\n\n清单 2-18 提供了一个示例，针对候选字符串\
    \ *I* *hate mice. I really* *hate MICE*。和模式 ***MICE***，其中比较是**不区分大小写**的。代码使用不区分大小写的比较来演示第一个匹配项实际上是字符编号\
    \ 11 之后匹配的字符串。\n\n清单 2-18：使用 find(int) 方法\n\n| **![开始示例](img/_1.gif)** |\n\n```\n\
    import java.util.regex.*;\n/**\n * 演示 Matcher.find(int) 方法的使用\n */\npublic class\
    \ MatcherFindParamExample{\n  public static void main(String args[]){\n      test();\n\
    \  }\n  public static void test(){\n     //创建一个 Pattern\n      Pattern p = Pattern.compile(\"\
    mice\", Pattern.CASE_INSENSITIVE);\n\n     //创建候选字符串\n     String candidateString\
    \ =\n      \"I hate mice. I really hate MICE.\";\n\n     //尝试匹配候选字符串。\n     Matcher\
    \ matcher = p.matcher(candidateString);\n\n     //显示后面的匹配项\n     System.out.println(candidateString);\n\
    \     matcher.find(11);\n     System.out.println(matcher.group());\n\n     //显示前面的匹配项\n\
    \     System.out.println(candidateString);\n     matcher.find(0);\n     System.out.println(matcher.group());\n\
    \  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n当你执行 `find(11)` 方法时，搜索区域从字符\
    \ 11 开始，如下图所示：\n\n![](img/fig114_01.jpg)\n\n接下来，你执行 `find(0)`，这会将搜索索引移回 0。下图说明了由此产生的搜索区域：\n\
    \n![](img/fig114_02.jpg)\n"
- fmt: "### `public boolean lookingAt()`\n\n`lookingAt()`方法是一种比`matches()`方法更宽松的版本。它仅根据需要比较字符串中尽可能少的部分与`Pattern`，以实现匹配。如果存在这样的子部分，则此方法返回`true`。\n\
    \n因此，对于模式`J2SE`：\n\n```\nPattern = Pattern.compile(\"J2SE\");\n```\n\n以及候选字符串`J2SE\
    \ is the only one for me`：\n\n```\nMatcher matcher_1 = Pattern.matcher(\"J2SE\
    \ is the only one for me\");\n```\n\n`lookingAt()`方法返回`true`。然而，对候选字符串`For me,\
    \ it's J2SE, or nothing at all`调用`lookingAt()`：\n\n```\nMatcher matcher_2 = Pattern.matcher(\"\
    For me, it's J2SE, or nothing at all\");\n```\n\n将返回`false`，因为`For me, it's J2SE,\
    \ or nothing at all`的第一部分与模式`J2SE`不匹配。\n\n与`matches()`方法类似，`lookingAt()`方法始终从输入序列的开头开始查看候选字符串；但与`matches()`不同，`lookingAt()`方法不要求整个输入序列都被匹配。如果匹配成功，则可以通过使用`start`、`end`和`group`方法获取更多信息。[Listing\
    \ 2-19](#LiB0016.html#ch02list19) 提供了`lookingAt()`方法的使用示例。\n\n**Listing 2-19:\
    \ 使用`lookingAt()`方法**\n\n| **![Start example](_1.gif)** |\n\n```\nimport java.util.regex.*;\n\
    /**\n * Demonstrates the usage of the\n * Matcher.LookingAt method\n */\npublic\
    \ class MatcherLookingAtExample{\n  public static void main(String args[]){\n\
    \      test();\n  }\n  public static void test(){\n     //create a Pattern\n \
    \     Pattern p = Pattern.compile(\"J2SE\");\n\n     //create the candidate Strings\n\
    \     String candidateString_1 = \"J2SE is the only one for me\";\n     String\
    \ candidateString_2 =\n      \"For me, it's J2SE, or nothing at all\";\n     String\
    \ candidateString_3 = \"J2SEistheonlyoneforme\";\n\n     //Attempt to match the\
    \ candidate Strings.\n     Matcher matcher = p.matcher(candidateString_1);\n \
    \    //display the output for the candidate\n     String msg = \":\" + candidateString_1\
    \ + \": matches?: \";\n     System.out.println(msg + matcher.lookingAt());\n \
    \    matcher.reset(candidateString_2);\n     //display the output for the candidates\n\
    \     msg = \":\" + candidateString_2 + \": matches?: \";\n     System.out.println(msg\
    \ + matcher.lookingAt());\n\n     matcher.reset(candidateString_3);\n     //display\
    \ the output for the candidate\n     msg = \":\" + candidateString_3 + \": matches?:\
    \ \";\n     System.out.println(msg + matcher.lookingAt());\n\n     /*\n     *returns\n\
    \     *:J2SE is the only one for me: matches?: true\n     *:For me, it's J2SE,\
    \ or nothing at all: matches?: false\n     *:J2SEistheonlyoneforme: matches?:\
    \ true\n     */\n  }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\n###\
    \ `public Matcher appendReplacement (StringBuffer sb, String replacement)`\n\n\
    有时，在处理正则表达式时，你可能会更倾向于使用`StringBuffer`而不是`String`。这可能是出于性能、实用性或其他原因。幸运的是，`java.util.regex`包提供了`appendReplacement`和`appendTail`方法来实现这一点。本节重点介绍`appendReplacement`方法。\n\
    \n简单来说，`appendReplacement`允许你根据`Pattern`和`Matcher`对象的内容创建一个`StringBuffer`。假设你想在字符串`My\
    \ name is Bond. James Bond. I would like a martini.`中将`Smith`替换为`Bond`，并且希望将结果存储在`StringBuffer`中。要使用`appendReplacement`，你必须首先创建一个`Pattern`和一个对应的`Matcher`。在本例中，你将使用`Bond`：\n\
    \n```\nPattern pattern = Pattern.compile(\"Bond\");\n```\n\n此外，你将使用候选字符串`My name\
    \ is Bond. James Bond. I would like a martini.`：\n\n```\nMatcher matcher =\n pattern.matcher(\"\
    My name is Bond. James Bond. I would like a martini.\");\n```\n\n接下来，你调用`find()`方法，以便`Matcher`可以开始解析候选字符串。第一次调用`find()`时，`Matcher`仅解析候选字符串中足够的部分，以找到第一个匹配项（如果有）。这个已解析的区域在下图中用方框标出：\n\
    \n[![Click To expand](fig117_01.jpg)](fig117_01_0.jpg)\n\n回想一下，方框区域是`Matcher`当前唯一知晓的候选字符串部分。\n\
    \n然后，你调用`appendReplacement`方法，该方法会用上图中方框区域内的所有内容填充`StringBuffer sb`，但会将`Smith`替换为`Bond`。因此，你的`StringBuffer`现在包含`My\
    \ name is Smith`。\n\n最后还有一点值得一提。在内部，`Matcher`对象维护着一个*追加位置*。这个追加位置是`Matcher`对象为`StringBuffer`对象维护的状态信息。它记录了上一次调用`appendReplacement`时从`StringBuffer`中读取的位置。当然，追加位置初始为`0`，如下图所示：\n\
    \n[![Click To expand](fig117_02.jpg)](fig117_02_0.jpg)\n\n调用`appendReplacement`后，追加位置会向前移动到匹配项之后，如下图所示。这与`matcher.end()`方法返回的位置相同。\n\
    \n[![Click To expand](fig117_03.jpg)](fig117_03_0.jpg)\n\n接下来，你再次调用`matcher.find()`，使得当前考虑的位置变为下图中高亮显示的方框区域：\n\
    \n[![Click To expand](fig117_04.jpg)](fig117_04_0.jpg)\n\n然后，你再次调用`appendReplacement`，从而将`.\
    \ James Smith`追加到`StringBuffer`中。请记住，因为这是一个替换方法，它会自动将`Bond`替换为`Smith`。`StringBuffer`的内容变为`My\
    \ name is Smith. James Smith`，并且追加位置向前移动，如下图所示：\n\n[![Click To expand](fig118_01.jpg)](fig118_01_0.jpg)\n\
    \n你的任务完成了。完整的代码清单显示在 [Listing 2-20](#LiB0016.html#ch02list20) 中。\n\n**Listing\
    \ 2-20: `appendReplacement()`方法示例**\n\n| **![Start example](_1.gif)** |\n\n```\n\
    import java.util.regex.*;\nimport java.util.*;\n/**\n * Demonstrates usage of\
    \ the\n * Matcher.appendReplacement method\n */\npublic class Scrap{\n  public\
    \ static void main(String args[]){\n      test();\n  }\n  public static void test(){\n\
    \     //create a Pattern\n      Pattern p = Pattern.compile(\"Bond\");\n     \
    \ //create a StringBuffer\n      StringBuffer sb =new StringBuffer();\n\n//create\
    \ the candidate Strings\n     String candidateString =\n     \"My name is Bond.\
    \ James Bond. I would like a martini.\";\n\nString replacement = \"Smith\";\n\
    \     //Attempt to match the first candidate String\n     Matcher matcher = p.matcher(candidateString);\n\
    \     matcher.find();\n\n//populate the StringBufffer\n     matcher.appendReplacement(sb,replacement);\n\
    \     //Attempt to match the second candidate String\n     Matcher matcher = p.matcher(candidateString);\n\
    \     matcher.find();\n\n//populate the StringBufffer\n     matcher.appendReplacement(sb,replacement);\n\
    \n//display the output for the candidate\n     String msg = sb.toString();\n\n\
    System.out.println(msg.length());\n     System.out.println(msg);\n  }\n}\n```\n\
    \n| **![End example](_1.gif)** |\n\n|  |"
  raw: "### public boolean lookingAt()\n\nThe lookingAt() method is a more relaxed\
    \ version of the matches method. It simply compares as little of the String against\
    \ the Pattern as necessary to achieve a match. If such a subsection exists, then\
    \ this method returns true.\n\nThus, for the pattern ***J2SE***\n\n```\nPattern\
    \ = Pattern.compile(\"J2SE\"); \n```\n\nand the candidate *J2SE is the only one\
    \ for me*\n\n```\nMatcher matcher_1 = Pattern.matcher(\"J2SE is the only one for\
    \ me\");\n```\n\nthe lookingAt method returns true. However, calling lookingAt()\
    \ for the candidate string *For me, it's J2SE, or nothing at all*\n\n```\nMatcher\
    \ matcher_2 = Pattern.matcher(\"For me, it's J2SE, or nothing at all\");\n```\n\
    \nwill return false, because the first part of *For me, it's J2SE, or nothing\
    \ at all* doesn't match the pattern ***J2SE***.\n\nLike the matches method, the\
    \ lookingAt method always starts looking at the candidate string at the beginning\
    \ of the input sequence; unlike matches, the lookingAt method doesn't require\
    \ that the entire input sequence be matched. If the match succeeds, then more\
    \ information can be obtained by using the start, end, and group methods. [Listing\
    \ 2-19](#LiB0016.html#ch02list19) provides an example of the lookingAt method's\
    \ use.\n\nListing 2-19: Using the lookingAt Method\n\n| **![Start example](_1.gif)**\
    \ |\n\n```\nimport java.util.regex.*;\n/**\n * Demonstrates the usage of the\n\
    \ * Matcher.LookingAt method\n */\npublic class MatcherLookingAtExample{\n  public\
    \ static void main(String args[]){\n      test();\n  }\n  public static void test(){\n\
    \     //create a Pattern\n      Pattern p = Pattern.compile(\"J2SE\");\n\n   \
    \  //create the candidate Strings\n     String candidateString_1 = \"J2SE is the\
    \ only one for me\";\n     String candidateString_2 =\n      \"For me, it's J2SE,\
    \ or nothing at all\";\n     String candidateString_3 = \"J2SEistheonlyoneforme\"\
    ;\n\n     //Attempt to match the candidate Strings.\n     Matcher matcher = p.matcher(candidateString_1);\n\
    \     //display the output for the candidate\n     String msg = \":\" + candidateString_1\
    \ + \": matches?: \";\n     System.out.println(msg + matcher.lookingAt());\n \
    \    matcher.reset(candidateString_2);\n     //display the output for the candidates\n\
    \     msg = \":\" + candidateString_2 + \": matches?: \";\n     System.out.println(msg\
    \ + matcher.lookingAt());\n\n     matcher.reset(candidateString_3);\n     //display\
    \ the output for the candidate\n     msg = \":\" + candidateString_3 + \": matches?:\
    \ \";\n     System.out.println(msg + matcher.lookingAt());\n\n     /*\n     *returns\n\
    \     *:J2SE is the only one for me: matches?: true\n     *:For me, it's J2SE,\
    \ or nothing at all: matches?: false\n     *:J2SEistheonlyoneforme: matches?:\
    \ true\n     */\n  }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\n###\
    \ public Matcher appendReplacement (StringBuffer sb, String replacement)\n\nThere\
    \ will be times when you'll prefer to use a StringBuffer instead of a String when\
    \ working with regular expressions. This might be for performance, utility, or\
    \ other reasons. Fortunately, the java.util.regex package offers the appendReplacement\
    \ and appendTail methods for doing so. This section focuses on the appendReplacement\
    \ method.\n\nSimply speaking, appendReplacement allows you to create a StringBuffer\
    \ based on the contents of your Pattern and Matcher objects. Say you want to swap\
    \ out *Smith* for *Bond* in the *My name is Bond. James Bond. I would like a martini.*,\
    \ and you want the results stored in a StringBuffer. To use appendReplacement,\
    \ you must first create a Pattern and a corresponding Matcher. For this example's\
    \ purposes, you'll use ***Bond***:\n\n```\nPattern pattern = Pattern.compile(\"\
    Bond\");\n```\n\nAlso, you'll work with the candidate string *My name is Bond.\
    \ James Bond. I would like a martini.*:\n\n```\nMatcher matcher =\n pattern.matcher(\"\
    My name is Bond. James Bond. I would like a martini.\");\n```\n\nNext, you call\
    \ the find method, so that the Matcher can start to parse the candidate String.\
    \ The first time you call find, the Matcher simply parses enough of the candidate\
    \ String such that the first match, if any, is found. This parsed region is boxed\
    \ in the following image:\n\n[![Click To expand](fig117_01.jpg)](fig117_01_0.jpg)\n\
    \nRecall that the boxed region is the only part of the candidate string the Matcher\
    \ is currently aware of.\n\nThen you'll call the appendReplacement method, which\
    \ populates the StringBuffer sb with everything in the boxed region shown in the\
    \ preceding image, except that *Smith* is swapped out for *Bond*. Therefore, your\
    \ StringBuffer now contains *My name is Smith*.\n\nOne last thing bears mentioning.\
    \ Internally, the Matcher object maintains an *append position*. This append position\
    \ is state information maintained by the Matcher object for the sake of the StringBuffer\
    \ object. It records the position in the StringBuffer that the last call to appendReplacement\
    \ read from. Of course, the append position is initially 0, as shown in the following\
    \ image:\n\n[![Click To expand](fig117_02.jpg)](fig117_02_0.jpg)\n\nAfter you\
    \ call appendReplacement, the append position is moved forward to just after the\
    \ match, as shown in the following image. This is the same position that the matcher.end()\
    \ method would return.\n\n[![Click To expand](fig117_03.jpg)](fig117_03_0.jpg)\n\
    \nNext, you call matcher.find() again, so that the current position under consideration\
    \ becomes the boxed region highlighted in the following image:\n\n[![Click To\
    \ expand](fig117_04.jpg)](fig117_04_0.jpg)\n\nYou then call appendReplacement\
    \ again, thus appending . *James Smith* to the StringBuffer. Remember, because\
    \ this is a replacement method, it automatically replaces *Bond* with *Smith*.\
    \ The content of the StringBuffer becomes *My name is* *Smith. James Smith*, and\
    \ the append position is moved forward, as shown in the following image:\n\n[![Click\
    \ To expand](fig118_01.jpg)](fig118_01_0.jpg)\n\nYour mission is accomplished.\
    \ The complete code listing is displayed in [Listing 2-20](#LiB0016.html#ch02list20).\n\
    \nListing 2-20: appendReplacement Method Example\n\n| **![Start example](_1.gif)**\
    \ |\n\n```\nimport java.util.regex.*;\nimport java.util.*;\n/**\n * Demonstrates\
    \ usage of the\n * Matcher.appendReplacement method\n */\npublic class Scrap{\n\
    \  public static void main(String args[]){\n      test();\n  }\n  public static\
    \ void test(){\n     //create a Pattern\n      Pattern p = Pattern.compile(\"\
    Bond\");\n      //create a StringBuffer\n      StringBuffer sb =new StringBuffer();\n\
    \n//create the candidate Strings\n     String candidateString =\n     \"My name\
    \ is Bond. James Bond. I would like a martini.\";\n\nString replacement = \"Smith\"\
    ;\n     //Attempt to match the first candidate String\n     Matcher matcher =\
    \ p.matcher(candidateString);\n     matcher.find();\n\n//populate the StringBufffer\n\
    \     matcher.appendReplacement(sb,replacement);\n     //Attempt to match the\
    \ second candidate String\n     Matcher matcher = p.matcher(candidateString);\n\
    \     matcher.find();\n\n//populate the StringBufffer\n     matcher.appendReplacement(sb,replacement);\n\
    \n//display the output for the candidate\n     String msg = sb.toString();\n\n\
    System.out.println(msg.length());\n     System.out.println(msg);\n  }\n}\n```\n\
    \n| **![End example](_1.gif)** |\n\n|  |"
  trans: "\n### public boolean lookingAt()\n\n`lookingAt()` 方法是 `matches` 方法的一个更宽松的版本。它仅需将字符串与模式进行最少量的比较即可实现匹配。如果存在这样的子串，则此方法返回\
    \ `true`。\n\n因此，对于模式 ***J2SE***\n\n```\nPattern = Pattern.compile(\"J2SE\"); \n\
    ```\n\n和候选字符串 *J2SE is the only one for me*\n\n```\nMatcher matcher_1 = Pattern.matcher(\"\
    J2SE is the only one for me\");\n```\n\n`lookingAt` 方法返回 `true`。然而，对候选字符串 *For\
    \ me, it's J2SE, or nothing at all* 调用 `lookingAt()`\n\n```\nMatcher matcher_2\
    \ = Pattern.matcher(\"For me, it's J2SE, or nothing at all\");\n```\n\n将返回 `false`，因为\
    \ *For me, it's J2SE, or nothing at all* 的开头部分与模式 ***J2SE*** 不匹配。\n\n与 `matches`\
    \ 方法类似，`lookingAt` 方法总是从输入序列的开头开始查看候选字符串；但与 `matches` 不同的是，`lookingAt` 方法不要求整个输入序列都匹配。如果匹配成功，则可以通过使用\
    \ `start`、`end` 和 `group` 方法来获取更多信息。清单 2-19 提供了一个使用 `lookingAt` 方法的示例。\n\n清单 2-19：使用\
    \ lookingAt 方法\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\n\
    /**\n * 演示 Matcher.LookingAt 方法的用法\n */\npublic class MatcherLookingAtExample{\n\
    \  public static void main(String args[]){\n      test();\n  }\n  public static\
    \ void test(){\n     //创建一个 Pattern\n      Pattern p = Pattern.compile(\"J2SE\"\
    );\n\n     //创建候选字符串\n     String candidateString_1 = \"J2SE is the only one for\
    \ me\";\n     String candidateString_2 =\n      \"For me, it's J2SE, or nothing\
    \ at all\";\n     String candidateString_3 = \"J2SEistheonlyoneforme\";\n\n  \
    \   //尝试匹配候选字符串。\n     Matcher matcher = p.matcher(candidateString_1);\n     //显示候选字符串的输出\n\
    \     String msg = \":\" + candidateString_1 + \": matches?: \";\n     System.out.println(msg\
    \ + matcher.lookingAt());\n     matcher.reset(candidateString_2);\n     //显示候选字符串的输出\n\
    \     msg = \":\" + candidateString_2 + \": matches?: \";\n     System.out.println(msg\
    \ + matcher.lookingAt());\n\n     matcher.reset(candidateString_3);\n     //显示候选字符串的输出\n\
    \     msg = \":\" + candidateString_3 + \": matches?: \";\n     System.out.println(msg\
    \ + matcher.lookingAt());\n\n     /*\n     *返回结果\n     *:J2SE is the only one\
    \ for me: matches?: true\n     *:For me, it's J2SE, or nothing at all: matches?:\
    \ false\n     *:J2SEistheonlyoneforme: matches?: true\n     */\n  }\n}\n```\n\n\
    | **![结束示例](img/_1.gif)** |\n\n|  |\n\n### public Matcher appendReplacement (StringBuffer\
    \ sb, String replacement)\n\n有时，在处理正则表达式时，你可能会更倾向于使用 `StringBuffer` 而不是 `String`。这可能是出于性能、实用性或其他原因。幸运的是，`java.util.regex`\
    \ 包提供了 `appendReplacement` 和 `appendTail` 方法来实现这一点。本节重点介绍 `appendReplacement`\
    \ 方法。\n\n简单来说，`appendReplacement` 允许你根据 `Pattern` 和 `Matcher` 对象的内容创建一个 `StringBuffer`。假设你想在\
    \ *My name is Bond. James Bond. I would like a martini.* 中将 *Smith* 替换为 *Bond*，并且希望将结果存储在\
    \ `StringBuffer` 中。要使用 `appendReplacement`，你必须首先创建一个 `Pattern` 和一个对应的 `Matcher`。出于本例的目的，你将使用\
    \ ***Bond***：\n\n```\nPattern pattern = Pattern.compile(\"Bond\");\n```\n\n同时，你将使用候选字符串\
    \ *My name is Bond. James Bond. I would like a martini.*：\n\n```\nMatcher matcher\
    \ =\n pattern.matcher(\"My name is Bond. James Bond. I would like a martini.\"\
    );\n```\n\n接下来，你调用 `find` 方法，以便 `Matcher` 可以开始解析候选字符串。第一次调用 `find` 时，`Matcher`\
    \ 仅解析候选字符串中足够的部分，以找到第一个匹配项（如果存在）。这个已解析的区域在下图中用方框标出：\n\n![点击展开](img/fig117_01_0.jpg)\n\
    \n回想一下，方框区域是 `Matcher` 当前唯一知晓的候选字符串部分。\n\n然后，你将调用 `appendReplacement` 方法，该方法会用上图中方框区域内的所有内容填充\
    \ `StringBuffer sb`，但会将 *Smith* 替换为 *Bond*。因此，你的 `StringBuffer` 现在包含 *My name\
    \ is Smith*。\n\n最后还有一点需要提及。在内部，`Matcher` 对象维护着一个 *追加位置*。这个追加位置是 `Matcher` 对象为了\
    \ `StringBuffer` 对象而维护的状态信息。它记录了上一次调用 `appendReplacement` 时从 `StringBuffer` 中读取的位置。当然，追加位置初始为\
    \ 0，如下图所示：\n\n![点击展开](img/fig117_02_0.jpg)\n\n调用 `appendReplacement` 后，追加位置会向前移动到匹配项之后，如下图所示。这个位置与\
    \ `matcher.end()` 方法返回的位置相同。\n\n![点击展开](img/fig117_03_0.jpg)\n\n接下来，你再次调用 `matcher.find()`，使得当前考虑的位置变为下图中高亮显示的方框区域：\n\
    \n![点击展开](img/fig117_04_0.jpg)\n\n然后，你再次调用 `appendReplacement`，从而将 . *James Smith*\
    \ 追加到 `StringBuffer` 中。请记住，因为这是一个替换方法，它会自动将 *Bond* 替换为 *Smith*。`StringBuffer`\
    \ 的内容变为 *My name is* *Smith. James Smith*，并且追加位置向前移动，如下图所示：\n\n![点击展开](img/fig118_01_0.jpg)\n\
    \n你的任务完成了。完整的代码清单显示在清单 2-20 中。\n\n清单 2-20：appendReplacement 方法示例\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\nimport java.util.regex.*;\nimport java.util.*;\n/**\n * 演示 Matcher.appendReplacement\
    \ 方法的用法\n */\npublic class Scrap{\n  public static void main(String args[]){\n\
    \      test();\n  }\n  public static void test(){\n     //创建一个 Pattern\n     \
    \ Pattern p = Pattern.compile(\"Bond\");\n      //创建一个 StringBuffer\n      StringBuffer\
    \ sb =new StringBuffer();\n\n//创建候选字符串\n     String candidateString =\n     \"\
    My name is Bond. James Bond. I would like a martini.\";\n\nString replacement\
    \ = \"Smith\";\n     //尝试匹配第一个候选字符串\n     Matcher matcher = p.matcher(candidateString);\n\
    \     matcher.find();\n\n//填充 StringBuffer\n     matcher.appendReplacement(sb,replacement);\n\
    \     //尝试匹配第二个候选字符串\n     Matcher matcher = p.matcher(candidateString);\n   \
    \  matcher.find();\n\n//填充 StringBuffer\n     matcher.appendReplacement(sb,replacement);\n\
    \n//显示候选字符串的输出\n     String msg = sb.toString();\n\nSystem.out.println(msg.length());\n\
    \     System.out.println(msg);\n  }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n\
    |  |\n"
- fmt: "#### Special Notes\n\n`appendReplacement` method offers a lot of power. As\
    \ you may know, with great power comes subtle distinctions. By using the expression\
    \ `$d`, in which `d` is a number less than or equal to the number of groups in\
    \ the previous match, you can actually embed and reorganize subgroups in your\
    \ search. For example, say your pattern is `(James) (Bond)`:\n\n```\nPattern p\
    \ = Pattern.compile(\"(James) (Bond)\");\n```\n\nand your candidate is *My name\
    \ is Bond. James Bond.*\n\n```\nString candidateString = \"My name is Bond. James\
    \ Bond.\";\n```\n\nand you want to insert the middle name *Waldo*. Your replacement\
    \ String might look like the following:\n\n```\nString replacement = \"$1 Waldo\
    \ $2\";\n```\n\nwhere `$1` refers to the first matching subgroup, *James*, and\
    \ `$2` refers to the second matching subgroup, *Bond*.\n\nIn this case, the `StringBuffer`\
    \ will contain the value *My name is Bond. James Waldo Bond..* [Listing 2-20](#LiB0016.html#ch02list20)\
    \ presents a complete working example.\n\n**Listing 2-20: Using appendReplacement\
    \ with Subgroup Replacements**\n\n```\nimport java.util.regex.*;\nimport java.util.*;\n\
    /**\n * Demonstrates usage of the\n * Matcher.appendReplacement method, with\n\
    \ * subgroup replacement.\n */\npublic class MatcherAppendReplacementGroupExample{\n\
    \  public static void main(String args[]){\n      test();\n  }\n  public static\
    \ void test(){\n     //create a Pattern\n      Pattern p = Pattern.compile(\"\
    (James) (Bond)\");\n      //create a StringBuffer\n      StringBuffer sb =new\
    \ StringBuffer();\n\n     //create the candidate Strings\n     String candidateString\
    \ =\n     \"My name is Bond. James Bond.\";\n\n     String replacement = \"$1\
    \ Waldo $2\";\n     //Attempt to match the first candidate String\n     Matcher\
    \ matcher = p.matcher(candidateString);\n     matcher.find();\n\n     //populate\
    \ the StringBufffer\n     matcher.appendReplacement(sb,replacement);\n\n     //display\
    \ the output for the candidate\n     String msg = sb.toString();\n     System.out.println(msg);\n\
    \  }\n}\n```\n\nThe `appendReplacement` method will throw an `IllegalStateException`\
    \ if a `find()` has not been called, or if `find` returns false. It will throw\
    \ an `IndexOutOfBoundsException` if the capturing group referred to by `$1`, `$2`,\
    \ and so on doesn't exist in the part of the pattern currently being scrutinized\
    \ by the `Matcher`.\n\n### public StringBuffer appendTail(StringBuffer sb)\n\n\
    The `appendTail` method is a supplement to the `appendReplacement` method. It\
    \ simply appends every remaining subsequence from the original candidate string\
    \ to the `StringBuffer`. It reads from the append position, which I explained\
    \ in the `appendReplacement` section, to the end of the candidate string.\n\n\
    In the `appendReplacement` example given earlier, you swapped out *Smith* for\
    \ *Bond* in the string *My name is Bond. James Bond. I would like a martini.*.\
    \ When you finished, you had a `StringBuffer` that contained the value *My name\
    \ is Smith. James Smith*.\n\nThat was as much as the `appendReplacement` method\
    \ could accomplish for you, because it's based on a successful match, and there\
    \ are no more successful matches to be found after the *d* in the second occurrence\
    \ of the word *Bond*. The state of the `Matcher` after the second call to `appendReplacement`\
    \ is shown in the following image:\n\n[![Click To expand](fig121_01.jpg)](fig121_01_0.jpg)\n\
    \nCorrespondingly, the `StringBuffer` created by using `appendReplacement` would\
    \ only have contained the phrase *My name is Smith. James Smith*. The `appendTail`\
    \ method simply appends the rest of the String, namely . *I* *would like a martini*.\
    \ to the `StringBuffer` buffer. That same `StringBuffer` is returned.\n\n### public\
    \ String replaceAll(String replacement)\n\nThis method is one of my favorite new\
    \ additions, both for its functionality and for its intuitive application programming\
    \ interface (API). The `replaceAll` method simply returns a `String` that replaces\
    \ every occurrence of the description with the replacement.\n\nImagine that you\
    \ have the String *I* *love ice. Ice is my favorite. Ice Ice Ice.*, and you want\
    \ to replace every occurrence of *ice* or *Ice* with the word *Java*. Your first\
    \ step is to describe the word you want to look for. In this case, because you\
    \ want to match both uppercase *Ice* and lowercase *ice* you'll use the regex\
    \ pattern `(i|I)ce`:\n\n```\nPattern pattern = Pattern.compile(\"(i|I)ce\");\n\
    ```\n\nNext, use the candidate String to get a `Matcher`:\n\n```\nMatcher matcher\
    \ = pattern.matcher(\"I love ice. Ice is my favorite. Ice Ice Ice.\"); \n```\n\
    \nFinally, make the replacement:\n\n```\nString tmp = matcher.replaceAll(\"Java\"\
    );\n```\n\nNow the string `tmp` holds the value *I* *love Java. Java is my favorite.\
    \ Java Java* *Java..* [Listing 2-21](#LiB0016.html#ch02list21) presents the complete\
    \ code for this example.\n\n**Listing 2-21: replaceAll Method Example**\n\n```\n\
    import java.util.regex.*;\nimport java.util.*;\n/**\n * Demonstrates usage of\
    \ the\n * Matcher.replaceAll method\n */\npublic class MatcherReplaceAllExample{\n\
    \  public static void main(String args[]){\n      test();\n  }\n  public static\
    \ void test(){\n     //create a Pattern\n      Pattern p = Pattern.compile(\"\
    (i|I)ce\");\n\n     //create the candidate String\n     String candidateString\
    \ =\n     \"I love ice. Ice is my favorite. Ice Ice Ice.\";\n\n     Matcher matcher\
    \ = p.matcher(candidateString);\n     String tmp = matcher.replaceAll(\"Java\"\
    );\n\n     System.out.println(tmp);\n  }\n} \n```\n\n|  | Caution | Using this\
    \ method will change the state of your `Matcher` object. Specifically, the `reset`\
    \ method will be called. Therefore, it's as if all `start`, `end`, `group`, and\
    \ `find` calls hadn't been called. |\n\nLike the `appendReplacement` method, this\
    \ `replaceAll` method can contain references to substrings by using the `$` symbol.\
    \ For details, please see the `appendReplacement` documentation presented earlier\
    \ in the chapter."
