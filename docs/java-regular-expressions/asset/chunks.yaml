    &#124; L &#124; 字符 *L* 后跟 &#124;\n&#124; E &#124; 字符 *E* 后跟 &#124;\n&#124; > &#124;\
    \ 字符 *>* &#124;\n&#124; ) &#124; 关闭组 &#124;\n&#124; ( &#124; 后跟一个组，包含 &#124;\n\
    &#124; . &#124; 任意字符 &#124;\n&#124; * &#124; 重复任意次数 &#124;\n&#124; ? &#124; 惰性匹配\
    \ &#124;\n&#124; ) &#124; 关闭组，后跟 &#124;\n&#124; < &#124; 字符 *<* 后跟 &#124;\n&#124;\
