  trans: "\n### 使用 FileChannels 和 ByteBuffers 存储模式\n\nJava 新 I/O (NIO) 范式为外部化模式提供了一种简单而优雅的解决方案。无需深入探究\
    \ NIO，您可以使用代码清单 4-5 中的代码从持久化文件中提取正则表达式模式。\n\n代码清单 4-5：从文件中提取非 Java 分隔的正则表达式模式\n\
    \n| **![示例开始](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\nimport java.io.*;\n\
    import java.nio.*;\nimport java.nio.channels.*;\n\n/**\n* 提供一种简便机制来提取文件中的正则表达式内容\n\
    */\npublic class RegexHelper{\n\n/**\n   * 提取给定文件的内容。此特定提取过程专门\n   * 期望文件内容是一个非\
    \ Java 分隔的正则表达式模式。\n   *\n   * @param fileName 包含正则表达式模式的文件名。\n   * @returns 包含文件内容的字符串\n\
    \   * @author Mehran Habibi\n   **/\n   public static String getRegex(String fileName){\n\
    \    String retval = null;\n    try\n    {\n        //打开与文件的连接\n        FileInputStream\
    \ fis =\n        new FileInputStream(fileName);\n\n//获取文件通道\n        FileChannel\
    \ fc = fis.getChannel();\n\n//创建一个足够大的 ByteBuffer\n        //并将文件内容读入其中\n    \
    \    ByteBuffer bb = ByteBuffer.allocate((int)fc.size());\n\nfc.read(bb);\n  \
    \      bb.flip();\n        //将文件内容持久化为字符串\n        retval = new String(bb.array());\n\
    \n//释放 FileChannel\n        fc.close();\n        fc = null;\n\n}\n   catch(IOException\
    \ ioe)\n   {\n       ioe.printStackTrace();\n   }\n\nreturn retval;\n   }\n}\n\
    ```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n当然，这里并非必须使用 FileChannels；任何执行文件字节级读取的机制都能得到相同的结果。然而，由于使用\
    \ NIO 读取字节非常自然，它似乎是最佳的总体解决方案。这样做的结果是，文件可以只包含纯粹的正则表达式模式，无需 Java 分隔，并且仍然能正常工作。\n\
    \n|  | 注意  | 确保模式在最后一个字符后没有多余的空格或换行符，因为这些字符会被读入作为模式的一部分，从而导致搜索失败。 |\n\n当然，这并非最友好的方式——例如，如果能像处理属性文件一样处理该文件，并在其中定义各种键，那就更好了。毕竟，您不希望被迫为每个正则表达式模式都准备一个单独的文件。例如，您可以传入一个键以及文件名，这样就能在同一个文件中存储多个模式。基于此，我们添加了重载方法\
    \ getRegex，如代码清单 4-6 所示。\n\n代码清单 4-6：重载的 getRegex 方法\n\n| **![示例开始](img/_1.gif)**\
    \ |\n\n```\n/**\n  * 提取给定文件中指定键的内容。此特定提取过程专门\n  * 期望文件内容是一个非 Java 分隔的正则表达式模式。\n\
    \  *\n  * @param fileName 包含正则表达式模式的文件名。\n  * @param key 文件中定义正则表达式的键\n  * @returns\
    \ 包含文件内容的字符串\n  * @author Mehran Habibi\n  **/\n  public static String getRegex(String\
    \ fileName, String key){\n   String retval = null;\n\n//获取文件内容\n   String content\
    \ = getRegex(fileName);\n\n//如果文件有内容，则尝试查找键\n   if (content != null)\n   {\n \
    \   //查找行首，后跟键，再后跟等号，并捕获该键与行尾之间的所有内容\n    String keyRegex = \"^\"+key+\"=(.*)$\"\
    ;\n\n//我们期望输出包含多行\n    Pattern pattern = Pattern.compile(keyRegex,Pattern.MULTILINE);\n\
    \n//提取匹配器，并查找键对应的值\n    Matcher matcher = pattern.matcher(content);\n\nif (matcher\
    \ != null && matcher.find())\n       retval = matcher.group(1);\n\n}\n\nreturn\
    \ retval;\n    } \n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n关键在于，您可以使用并编写非\
