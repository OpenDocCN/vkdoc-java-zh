    contains at least at least two *A* characters and no more than seven *A* characters.
    The pattern won''t match *A* because it contains less than two *A* characters,
    and the pattern won''t match *AAAAAAA* because it contains more than seven *A*
    characters. [Table 1-8](#LiB0008.html#ch01table08) dissects the pattern.


    Table 1-8: The Pattern *A{2,7*}


    | **Regex** | **Description** |

    | --- | --- |

    | **A** | The character *A* |

    | **{** | Open repeating group |

    | **2** | Repeated at least two times |

    | , | But not more than |

    | **7** | Seven times |

    | **}** | Close repeated group |

    | * **In English:** Look for a sequence of the character *A* repeated two, three,
    four, five, six, or seven times. |


    |  | Note  | In the example at the beginning of this chapter, you needed a pattern
    to match four consecutive digits and derived ***\d\d\d\d***. As noted, this isn''t
    the most elegant pattern possible. An alternative, yet equivalent, way of expressing
    the same pattern is ***\d{4}***, per [Table 1-6](#LiB0008.html#ch01table06)—that
    is, a sequence of exactly four digits. |


    #### Alternative Characters Example 1


    The pattern ***A|B*** will match *A* or *B*, because each consists of either an
    *A* character or a *B* character. It won''t match *P*, *Q*, or *jelly* because
    these don''t consist strictly of either an *A* or a *B* character. [Table 1-9](#LiB0008.html#ch01table09)
    dissects this pattern.


    Table 1-9: The Pattern *A|*B


    | **Regex** | **Description** |

    | --- | --- |

    | **A** | The character *A* |

    | **&#124;** | Or |

    | **B** | The character *B* |

    | * **In English:** Look for either a capital *A* or a capital *B*. |


    #### Alternative Characters Example 2


    The pattern ***anna|marie*** will match *anna* or *marie*, because *anna* matches
    the first alternative and *marie* matches the second. It won''t match *Josie*,
    *Ralph*, or *Doctor*. [Table 1-10](#LiB0008.html#ch01table10) dissects the pattern.


    Table 1-10: The Pattern *anna|mari*e


    | **Regex** | **Description** |

    | --- | --- |

    | **anna** | The characters *a*, *n*, *n*, and *a*, in order |

    | **&#124;** | Or |

    | **marie** | The characters *m*, *a*, *r*, *i*, and *e*, in order |

    | * **In English:** Look for either the word *anna* or the word *marie*. |


    So would the pattern match *annamarie* as a single word? In a word, maybe. I provide
    detailed information about this topic in later chapters, but here''s the nickel
    tour. Java 2 Enterprise Edition''s (J2EE''s) regex allows you to specify whether
    you need an exact or partial match. Thus, *annamarie* would match the pattern
    ***anna|marie*** twice for a partial match, and not at all for an exact match.
    Without going into too much detail, String.matches only provides for exact matches,
    whereas the Matcher class can provide more lenient matches using the find method.


    What about the pattern ***Miss anna|marie***? Will it match *Miss marie* and *Miss*
    *anna*, or just one of them? Or will it match neither? A strict match will match
    *Miss* *anna* but reject *Miss marie*. The alternative ***|*** will read *Miss
    anna* as a single option and the pattern *marie* as another. Because the pattern
    ***maria*** isn''t equal to the candidate *Miss maria*, the search will reject
    *Miss maria*.


    ### Character Classes


    There are times when you need to describe your search criteria as a *class*—that
    is, as a group that shares potentially complex commonalities that you need to
    be able to describe and for which there are no predefined classes. Fortunately,
    regex provides a mechanism for doing so through character classes, as shown in
    [Table 1-11](#LiB0008.html#ch01table11).


    Table 1-11: Character Classes


    | **Pattern** | **Description** |

    | --- | --- |

    | [abc] | *a*, *b*, or *c*. (Of course, any character could be used, not just
    *a*, *b*, or *c*.) |

    | ***[^abc]*** Any | character except *a*, *b*, or *c*. |

    | [a-zA-Z] | *a* through *z* or *A* through *Z*. |

    | [a-d[m-p]] | *a* through *d*, or *m* through *p*: ***[a-dm-p]***. |

    | [a-z&&[def]] | Whatever exists in both sets, namely *d*, *e*, or *f*. |

    | [a-z&&[^bc]] | *a* through *z*, except for *b* and *c*: ***[ad-z]***. |

    | [a-z&&[^m-p]] | *a* through *z*, and not *m* through *p*: ***[a-lq-z]***. |


    There are also some predefined Portable Operating System Interface for UNIX (POSIX)
    character classes. These are American Standard Code for Information Interchange
    (ASCII) classes that experience has shown to be particularly useful. Thus, they''re
    already in place, and you can simply refer to them for use. [Table 1-12](#LiB0008.html#ch01table12)
    contains the POSIX character classes.


    Table 1-12: POSIX Character Classes


    | **Pattern** | **Description** |

    | --- | --- |

    | \p{Lower} | A lowercase letter: ***[a-z]*** |

    | \p{Upper} | An uppercase letter: ***[A-Z]*** |

    | \p{ASCII} | All ASCII characters: ***[\x00-\x7F]*** |

    | \p{Alpha} | An upper- or lowercase letter: ***[\p{Lower}\p{Upper}]*** |

    | \p{Digit} | A digit: ***[0-9]*** |

    | \p{Alnum} | A number or a letter: ***[\p{Alpha}\p{Digit}]*** |

    | \p{Punct} | Punctuation: one of ***!"#$%&''()*+,-./:;<=>?@[\]^_`{&#124;}~***
    |

    | \p{Graph} | Any visible character: ***[\p{Alnum}\p{Punct}]*** |

    | \p{Print} | A printable character: ***[\p{Graph}]*** |

    | \p{Blank} | A tab or space |

    | \p{Cntrl} | A control character: ***[\x00-\x1F\x7F]*** |

    | \p{XDigit} | A hexadecimal digit: ***[0-9a-fA-F]*** |

    | \p{Space} | A whitespace character: ***[*** ***\t\n\x0B\f\r]*** |'
  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。



    ### 量词与选择符


    *量词*和*选择符*允许你指定需要查找的令牌数量或你愿意接受的替代令牌。表 1-6 列出了正则表达式中的一些量词和选择符。


    表 1-6：量词


    | **正则表达式** | **描述** |

    | --- | --- |

    | **?** | 前面的元素重复一次或不重复。 |

    | ***** | 前面的元素重复零次或多次。 |

    | **+** | 前面的元素重复一次或多次。 |

    | **{n}** | 前面的元素恰好重复 *n* 次。 |

    | **{n,}** | 前面的元素至少重复 *n* 次。 |

    | **{n,m}** | 前面的元素至少重复 *n* 次，但不超过 *m* 次。包括 *m* 次重复。 |

    | **&#124;** | ***&#124;*** 之前的元素或之后的元素。 |


    以下部分提供了一些演示量词使用的示例。


    #### 重复字符示例 1


    模式 ***An+a*** 将匹配 *Ana*、*Anna* 或 *Annnna*，因为它们都包含至少一个 *A* 字符，紧接着是一个或多个 *n* 字符，再紧接着是一个
    *a* 字符。它不会匹配 ***Aa*** 或 ***ANna***，因为它们不是由一个 *A* 字符、紧接着至少一个 *n* 字符、再紧接着一个 *a*
    字符组成的。请注意，大写 *N* 和小写 *n* 不被视为匹配。表 1-7 剖析了该模式。


    表 1-7：模式 *An+*a


    | **正则表达式** | **描述** |

    | --- | --- |

    | A | 字符 *A* |

    | n+ | 后跟一个或多个 *n* 字符 |

    | a | 后跟字符 *a* |

    | * **用英语描述：** 查找一个大写 *A*，后跟一个或多个 *n* 字符，再后跟一个 *a* 字符。 |


    这里可以引出一些有趣的行为。如果使用 `String.matches` 方法执行此匹配，该模式将无法匹配 *AnnaMarie*，因为 `String.matches`
    方法要求精确匹配，而 *AnnaMarie* 中的 *Marie* 部分会破坏这种精确性。然而，`Matcher.find` 方法会匹配 *AnnaMarie*，因为它更宽松。敬请期待——更多细节即将呈现。


    #### 重复字符示例 2


    模式 ***A{2,7}*** 将匹配 *AA*、*AAAA* 或 *AAAAAAA*，因为它们都包含至少两个 *A* 字符且不超过七个 *A* 字符。该模式不会匹配
    *A*，因为它包含少于两个 *A* 字符；也不会匹配 *AAAAAAA*，因为它包含多于七个 *A* 字符。表 1-8 剖析了该模式。


    表 1-8：模式 *A{2,7*}


    | **正则表达式** | **描述** |

    | --- | --- |

    | **A** | 字符 *A* |

    | **{** | 开始重复组 |

    | **2** | 至少重复两次 |

    | , | 但不超过 |

    | **7** | 七次 |

    | **}** | 结束重复组 |

    | * **用英语描述：** 查找字符 *A* 重复两次、三次、四次、五次、六次或七次的序列。 |


    |  | 注意  | 在本章开头的示例中，你需要一个模式来匹配四个连续的数字，并推导出了 ***\d\d\d\d***。如前所述，这并不是最优雅的模式。根据表
    1-6，表达相同模式的另一种等效方式是 ***\d{4}***——即，一个恰好由四个数字组成的序列。 |


    #### 选择字符示例 1


    模式 ***A|B*** 将匹配 *A* 或 *B*，因为它们都由一个 *A* 字符或一个 *B* 字符组成。它不会匹配 *P*、*Q* 或 *jelly*，因为它们严格来说既不是
    *A* 也不是 *B* 字符。表 1-9 剖析了该模式。


    表 1-9：模式 *A|*B


    | **正则表达式** | **描述** |

    | --- | --- |

    | **A** | 字符 *A* |

    | **&#124;** | 或 |

    | **B** | 字符 *B* |

    | * **用英语描述：** 查找大写 *A* 或大写 *B*。 |


    #### 选择字符示例 2


    模式 ***anna|marie*** 将匹配 *anna* 或 *marie*，因为 *anna* 匹配第一个选项，而 *marie* 匹配第二个选项。它不会匹配
    *Josie*、*Ralph* 或 *Doctor*。表 1-10 剖析了该模式。


    表 1-10：模式 *anna|mari*e


    | **正则表达式** | **描述** |

    | --- | --- |

    | **anna** | 字符 *a*、*n*、*n* 和 *a*，按顺序排列 |

    | **&#124;** | 或 |

    | **marie** | 字符 *m*、*a*、*r*、*i* 和 *e*，按顺序排列 |

    | * **用英语描述：** 查找单词 *anna* 或单词 *marie*。 |


    那么，该模式会将 *annamarie* 作为一个单词匹配吗？简而言之，也许吧。我将在后续章节中提供关于此主题的详细信息，但这里先做一个简要介绍。Java
    2 企业版 (J2EE) 的正则表达式允许你指定是需要精确匹配还是部分匹配。因此，对于部分匹配，*annamarie* 会匹配模式 ***anna|marie***
    两次；而对于精确匹配，则完全不匹配。在不深入细节的情况下，`String.matches` 仅提供精确匹配，而 `Matcher` 类可以使用 `find`
    方法提供更宽松的匹配。


    那么模式 ***Miss anna|marie*** 呢？它会匹配 *Miss marie* 和 *Miss anna*，还是只匹配其中一个？或者两者都不匹配？严格匹配会匹配
    *Miss anna*，但拒绝 *Miss marie*。选择符 ***|*** 会将 *Miss anna* 视为一个选项，将模式 *marie* 视为另一个选项。因为模式
    ***maria*** 不等于候选字符串 *Miss maria*，所以搜索会拒绝 *Miss maria*。


    ### 字符类


    有时，你需要将搜索条件描述为一个*类*——即，作为一个共享潜在复杂共性的组，你需要能够描述这些共性，并且没有预定义的类。幸运的是，正则表达式通过字符类提供了一种实现此目的的机制，如表
    1-11 所示。


    表 1-11：字符类


    | **模式** | **描述** |

    | --- | --- |

    | [abc] | *a*、*b* 或 *c*。（当然，可以使用任何字符，不限于 *a*、*b* 或 *c*。） |

    | ***[^abc]*** | 除 *a*、*b* 或 *c* 之外的任何字符。 |

    | [a-zA-Z] | *a* 到 *z* 或 *A* 到 *Z*。 |

    | [a-d[m-p]] | *a* 到 *d*，或 *m* 到 *p*：***[a-dm-p]***。 |

    | [a-z&&[def]] | 两个集合中都存在的字符，即 *d*、*e* 或 *f*。 |

    | [a-z&&[^bc]] | *a* 到 *z*，但排除 *b* 和 *c*：***[ad-z]***。 |

    | [a-z&&[^m-p]] | *a* 到 *z*，但不包括 *m* 到 *p*：***[a-lq-z]***。 |


    还有一些预定义的 POSIX（可移植操作系统接口）字符类。这些是 ASCII（美国信息交换标准代码）类，经验表明它们特别有用。因此，它们已经就绪，你可以直接引用它们。表
    1-12 包含了 POSIX 字符类。


    表 1-12：POSIX 字符类


    | **模式** | **描述** |

    | --- | --- |

    | \p{Lower} | 小写字母：***[a-z]*** |

    | \p{Upper} | 大写字母：***[A-Z]*** |

    | \p{ASCII} | 所有 ASCII 字符：***[\x00-\x7F]*** |

    | \p{Alpha} | 大写或小写字母：***[\p{Lower}\p{Upper}]*** |

    | \p{Digit} | 数字：***[0-9]*** |

    | \p{Alnum} | 数字或字母：***[\p{Alpha}\p{Digit}]*** |

    | \p{Punct} | 标点符号：***!"#$%&''()*+,-./:;<=>?@[\]^_`{&#124;}~*** 之一 |

    | \p{Graph} | 任何可见字符：***[\p{Alnum}\p{Punct}]*** |

    | \p{Print} | 可打印字符：***[\p{Graph}]*** |

    | \p{Blank} | 制表符或空格 |

    | \p{Cntrl} | 控制字符：***[\x00-\x1F\x7F]*** |

    | \p{XDigit} | 十六进制数字：***[0-9a-fA-F]*** |

    | \p{Space} | 空白字符：***[ *** ***\t\n\x0B\f\r]*** |

