  trans: "\n### public String group(int group)\n\n此方法是 `group()` 方法的一个更强大的对应版本。它允许你提取候选字符串中与模式内子组匹配的部分。`group(int)`\
    \ 方法的使用将在清单 2-14 中简要演示。\n\n清单 2-14：Matcher.group(int) 方法示例\n\n| **![示例开始](img/_1.gif)**\
    \ |\n\n```\nimport java.util.regex.*;\n/**\n * 演示 Matcher.group(int) 方法的使用\n */\n\
    public class MatcherGroupParamExample{\n  public static void main(String args[]){\n\
    \      test();\n  }\n  public static void test(){\n     //创建一个 Pattern\n     \
    \ Pattern p = Pattern.compile(\"B(ond)\");\n\n//创建一个 Matcher 并使用 Matcher.group(int)\
    \ 方法\n     String candidateString = \"My name is Bond. James Bond.\";\n     //为输出创建一个有用的索引\n\
    \     Matcher matcher = p.matcher(candidateString);\n     //查找第一次查找结果的组号 0\n \
    \     matcher.find();\n      String group_0 = matcher.group(0);\n      String\
    \ group_1 = matcher.group(1);\n      System.out.println(\"Group 0 \" + group_0);\n\
    \      System.out.println(\"Group 1 \" + group_1);\n      System.out.println(candidateString);\n\
    \n//查找第二次查找结果的组号 1\n      matcher.find();\n      group_0 = matcher.group(0);\n\
    \      group_1 = matcher.group(1);\n      System.out.println(\"Group 0 \" + group_0);\n\
    \      System.out.println(\"Group 1 \" + group_1);\n      System.out.println(candidateString);\n\
    \  }\n} \n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n在下面的示例中，正则表达式模式同样是 ***B(ond)***，这意味着你在模式中有一个子组。首次调用\
    \ `find()` 时解析的候选字符串部分如下所示：\n\n![](img/fig106_01.jpg)\n\n因此，当你调用 `group(0)` 方法时，你实际上是隐式地只针对已经解析过的区域（即上图中框出的部分）调用它。就当前的\
    \ Matcher 而言，这个框出的区域是我们唯一可以讨论的部分。\n\n调用 `group(0)` 返回 *Bond*，因为这是当前检查的候选字符串区域中符合你条件的第一个组。同样，该区域如上图方框所示。实际匹配的组如下图所示：\n\
    \n![](img/fig106_02.jpg)\n\n类似地，当你调用 `group(1)` 时，你也是只针对已经解析过的区域（即框出的区域）调用它。这次，你请求的是已解析区域中的第二个分组。`group(1)`\
    \ 在下图中用圆圈标出：\n\n![](img/fig106_03.jpg)\n\n接下来，你再次调用 `matcher.find()`，这会导致候选字符串的一个新区域进入检查范围，如下所示：\n\
    \n![](img/fig106_04.jpg)\n\n调用 `group(0)` 方法会隐式地只针对已经解析过的新区域（即上图中框出的部分）调用它。`group(0)`\
    \ 方法返回字符串 *Bond*。`group(0)` 在下图中用圆圈标出：\n\n![](img/fig106_05.jpg)\n\n调用 `group(1)`\
    \ 只考虑已经解析过的新区域（即框出的区域）。在该区域内，`group(1)` 指的是 *ond*。`group(1)` 在下图中用圆圈标出：\n\n![](img/fig106_06.jpg)\n\
    \n清单 2-14 展示了一个使用 `group(int)` 方法的示例，输出 2-8 显示了该示例的输出。\n\n输出 2-8：Matcher.Group(int)\
    \ 示例的输出\n\n| **![示例开始](img/_1.gif)** |\n\n```\nMy name is Bond. James Bond.\n\
    Group 0 Bond\nGroup 1 ond\nMy name is Bond. James Bond.\nGroup 0 Bond\nGroup 1\
    \ ond\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n如果你执行另一个 `find()` 方法\n\n\
    ```\nmatcher.find();\n```\n\n然后执行 `group(0)`\n\n```\nString tmp = matcher.group(0);\
    \ //抛出 IllegalStateException\n```\n\n`group(0)` 方法将抛出 `IllegalStateException`，因为\
    \ `find` 方法调用未成功。类似地，如果根本没有调用 `find`，它也会抛出 `IllegalStateException`。如果你尝试引用一个不存在的组号，它将抛出\
    \ `IndexOutOfBoundsException`。\n\n### public int groupCount()\n\n此方法简单地返回 Pattern\
    \ 定义的组数。在清单 2-15 中，`groupCount` 方法显示了给定模式可能具有的组数。\n\n清单 2-15：MatcherGroupCountExample\
    \ 示例\n\n| **![示例开始](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\n/**\n *\
    \ 演示 Matcher.groupCount() 方法的使用\n */\npublic class MatcherGroupCountExample{\n\
    \  public static void main(String args[]){\n     test();\n  }\n  public static\
    \ void test(){\n      //创建一个 Pattern\n      Pattern p = Pattern.compile(\"B(ond)\"\
    );\n\n      //创建一个 Matcher 并使用 Matcher.group() 方法\n      String candidateString\
    \ = \"My name is Bond. James Bond.\";\n      Matcher matcher = p.matcher(candidateString);\n\
    \n      //提取可能的组数。\n      //需要注意的是，这仅代表可能的组数：\n      //而不是在候选字符串中实际找到的组数\n   \
    \   int numberOfGroups = matcher.groupCount();\n      System.out.println(\"numberOfGroups\
    \ =\"+numberOfGroups);\n  }\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n\
    关于此方法，有一个非常重要且有点反直觉的细微差别需要注意。它基于原始 Pattern 返回可能的组数，甚至不考虑候选字符串。因此，它实际上不是关于 Matcher\
    \ 对象的信息；而是关于生成它的 Pattern 的信息。这可能很棘手，因为此方法存在于 Matcher 对象上这一事实可能被解释为它在提供关于 Matcher\
    \ 状态的反馈。但事实并非如此。它告诉你的是，对于给定的 Pattern，理论上可能有多少个匹配项。\n\n### public boolean matches()\n\
    \n此方法旨在帮助你根据 Matcher 的 Pattern 匹配候选字符串。当且仅当所考虑的候选字符串与模式完全匹配时，它才返回 true。\n\n清单\
    \ 2-16 演示了如何使用此方法。三个字符串，*j2se*、*J2SE* 和 *J2SE*（注意 *E* 后面的空格），与模式 *J2SE* 进行比较。\n\
    \n清单 2-16：Matcher.matches 示例\n\n| **![示例开始](img/_1.gif)** |\n\n```\n import java.util.regex.*;\n\
    /**\n * 演示 Matcher.matches 方法的使用\n */\npublic class MatcherMatchesExample{\n \
    \ public static void main(String args[]){\n      test();\n  }\n  public static\
    \ void test(){\n     //创建一个 Pattern\n      Pattern p = Pattern.compile(\"J2SE\"\
    );\n\n     //创建候选字符串\n     String candidateString_1 = \"j2se\";\n     String candidateString_2\
    \ = \"J2SE \";\n     String candidateString_3 = \"J2SE\";\n\n     //尝试匹配候选字符串。\n\
    \     Matcher matcher_1 = p.matcher(candidateString_1);\n     Matcher matcher_2\
    \ = p.matcher(candidateString_2);\n     Matcher matcher_3 = p.matcher(candidateString_3);\n\
    \n     //显示第一个候选字符串的输出\n     String msg = \":\" + candidateString_1 + \": 匹配?:\
    \ \";\n     System.out.println(msg + matcher_1.matches());\n\n     //显示第二个候选字符串的输出\n\
    \     msg = \":\" + candidateString_2 + \": 匹配?: \";\n     System.out.println(msg\
    \ + matcher_2.matches());\n\n     //显示第三个候选字符串的输出\n     msg = \":\" + candidateString_3\
    \ + \": 匹配?: \";\n     System.out.println(msg + matcher_3.matches());\n  }\n}\n\
    ```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n这里三个候选字符串中只有一个成功匹配。*j2se* 被拒绝，因为大小写错误。*J2SE*\
    \ 再次被拒绝，因为它在 *E* 后面包含一个空格字符，这意味着它不是完全匹配。唯一完全匹配的是 *J2SE*。\n"
- fmt: "### `public boolean find()`\n\nThe `find()` method parses just enough of the\
    \ candidate string to find a match. If such a substring is successfully found,\
    \ then `true` is returned and `find` stops parsing the candidate. If no part of\
    \ the candidate string matches the pattern, then `find` returns `false`.\n\nThus,\
    \ for the pattern\n\n```\nPattern p = Pattern.compile(\"Bond\");\n```\n\nand candidate\
    \ String `My name is Bond. James Bond`.\n\n```\nMatcher matcher = p.matcher(\"\
    My name is Bond. James Bond\");\n```\n\ncalling `find()` parses `My name is Bond.\
    \ James Bond`. until the substring `My name is` `Bond` meets the first `Bond`,\
    \ as follows:\n\n![](fig111_01.jpg)\n\nThe boxed section is the part of the candidate\
    \ that has been parsed; thus, it's the part that calls to the `start`, `end`,\
    \ or `group` methods we will be concerned with. Why? Because the `find` method\
    \ only had to parse up to `d` in `Bond` to find a match. Having accomplished that\
    \ mission, the `find` method doesn't waste resources parsing the rest of the candidate\
    \ String.\n\nCalling `find` is a necessary preamble to using methods such as `start`,\
    \ `end`, and `group`. Without first evoking `find`, calling these methods will\
    \ cause an `IllegalStateException` to be thrown.\n\nOne common use of this method\
    \ is as a control condition in a `while` loop, so that the `start`, `end`, or\
    \ `group` method isn't called when they might throw an `IllegalStateException`.\
    \ [Listing 2-17](#LiB0016.html#ch02list17) is an example of a simple regular expression\
    \ that loops through the String `I love Java. Java is my favorite language. Java\
    \ Java Java`. and finds the pattern `Java`.\n\n**Listing 2-17: Using the `find()`\
    \ Method**\n\n| **![Start example](_1.gif)** |\n\n```\nimport java.util.regex.*;\n\
    /**\n * Demonstrates the usage of the\n * Matcher.find method\n */\npublic class\
    \ MatcherFindExample{\n  public static void main(String args[]){\n      test();\n\
    \  }\n  public static void test(){\n     //create a Pattern\n      Pattern p =\
    \ Pattern.compile(\"Java\");\n\n     //create the candidate String\n     String\
    \ candidateString =\n      \"I love Java. Java is my favorite language. Java Java\
    \ Java.\";\n\n     //Attempt to match the candidate String.\n     Matcher matcher\
    \ = p.matcher(candidateString);\n\n     //loop through and display all matches\n\
    \     while (matcher.find()){\n        System.out.println(matcher.group());\n\
    \     }\n  }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nIn this example,\
    \ the candidate String is\n\n```\n String candidateString =\n      \"I love Java.\
    \ Java is my favorite language. Java Java Java.\";\n```\n\nWhen the `while` loop\
    \ is fist entered, `find()` is immediately called on the `Matcher`, which results\
    \ in the boxed area in the following image. Within that boxed region, the matching\
    \ part of the region is circled, as shown in the images that follow.\n\nThe boxed\
    \ area is the region parsed, and the circled part is the matching substring:\n\
    \n[![Click To expand](fig112_01.jpg)](fig112_01_0.jpg)\n\nThe boxed area is the\
    \ next region parsed, and the circled part is the matching substring:\n\n[![Click\
    \ To expand](fig112_02.jpg)](fig112_02_0.jpg)\n\nThe boxed area is the next region\
    \ parsed, and the circled part is the matching substring:\n\n[![Click To expand](fig112_03.jpg)](fig112_03_0.jpg)\n\
    \nThe boxed area is the next region parsed, and the circled part is the matching\
    \ substring:\n\n[![Click To expand](fig112_04.jpg)](fig112_04_0.jpg)\n\nThe boxed\
    \ area is the next region parsed, and the circled part is the matching substring:\n\
    \n[![Click To expand](fig113_01.jpg)](fig113_01_0.jpg)\n\n### `public boolean\
    \ find(int start)`\n\nThe `find(int start)` method works exactly like its overloaded\
    \ counterpart, except for where it starts searching. The `int` parameter in `start`\
    \ simply tells the `Matcher` at which character to start its search on.\n\nThus,\
    \ for the candidate String `I love Java. Java is my favorite language. Java Java\
    \ Java`. and the pattern `Java`, if you only want to start searching at character\
    \ index 11, you use the command `find(11)`. The area parsed is boxed in the following\
    \ image, and the actual matching group is circled:\n\n[![Click To expand](fig113_02.jpg)](fig113_02_0.jpg)\n\
    \nIf the index given is greater than the length of the candidate string, then\
    \ this method will throw an `IndexOutOfBoundsException`. Thus, for the preceding\
    \ candidate string, calling `find(58)` will cause an `IndexOutOfBoundsException`,\
    \ because the length of the string is only 57.\n\nYou can also use this method\
    \ to set the start of the searching point. Thus, you could execute `find(11)`\
    \ to start searching at character 11, and then use `find(0)` to start searching\
    \ at character 0.\n\n[Listing 2-18](#LiB0016.html#ch02list18) provides an example\
    \ for the candidate String `I hate mice. I really hate MICE`. and the pattern\
    \ `MICE`, in which the comparison is made is case insensitive. The code uses a\
    \ case-insensitive comparison to demonstrate that the first match is, in fact,\
    \ for the String that matches after character number 11.\n\n**Listing 2-18: Using\
    \ the `find(int)` Method**\n\n| **![Start example](_1.gif)** |\n\n```\nimport\
    \ java.util.regex.*;\n/**\n * Demonstrates the usage of the\n * Matcher.find(int)\
    \ method\n */\npublic class MatcherFindParamExample{\n  public static void main(String\
    \ args[]){\n      test();\n  }\n  public static void test(){\n     //create a\
    \ Pattern\n      Pattern p = Pattern.compile(\"mice\", Pattern.CASE_INSENSITIVE);\n\
    \n     //create the candidate String\n     String candidateString =\n      \"\
    I hate mice. I really hate MICE.\";\n\n     //Attempt to match the candidate String.\n\
    \     Matcher matcher = p.matcher(candidateString);\n\n     //display the latter\
    \ match\n     System.out.println(candidateString);\n     matcher.find(11);\n \
    \    System.out.println(matcher.group());\n\n     //display the earlier match\n\
    \     System.out.println(candidateString);\n     matcher.find(0);\n     System.out.println(matcher.group());\n\
    \  }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nWhen you execute the\
    \ `find(11)` method, the search region starts character 11, as illustrated in\
    \ the following image:\n\n![](fig114_01.jpg)\n\nNext, you execute `find(0)`, which\
    \ moves the search index back to 0. The following image illustrates the resulting\
    \ search region:\n\n![](fig114_02.jpg)"
