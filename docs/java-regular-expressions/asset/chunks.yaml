- fmt: '# Confirming Date Formats


    In this example, I need a method that will validate a date format. The requirements
    are very explicit. Some sort of punctuation between the various date tokens is
    required, and a space isn''t considered punctuation. The method should accept
    either two digits or four digits for the year, and either one or two digits for
    the day and month. I also need to make sure the date isn''t in the future. I can
    expect the first date token to be the month, the second date token to be the day
    of that month, and the last date token to be the year. Thus, valid entries might
    be as follows:


    * `11/30/2002`

    * `4/25/03`

    * `03-29/2003`

    * `11/30/1902`

    * `2/25-03`

    * `06#9/2003`


    Again, the first thing to do is search the Web. I find a few patterns that might
    work here. The first follows, and it''s described as being very robust, dealing
    with leap years, and so on: `^(?:(?:(?:0?[13578]|1[02])(\/|-|\.)31)\1|(?:(?:0?[1,3-9]|1[0-2])(\/|-|\.)(?:29|30)\2))(?:(?:1[6-9]|[2-9]\d)?\d{2})$|^(?:0?2(\/|-|\.)29\3(?:(?:(?:1[6-9]|[2-9]\d)?(?:0[48]|[2468][048]|[13579][26])|(?:(?:16|[2468][048]|[3579][26])00))))$|^(?:(?:0?[1-9])|(?:1[0-2]))(\/|-|\.)(?:0?[1-9]|1\d|2[0-8])\4(?:(?:1[6-9]|[2-9]\d)?\d{2})$`.


    I decide to pass on it for now.


    The second pattern I find is `^\d{1,2}\/\d{1,2}\/\d{4}$`, which looks promising,
    but limits itself to four-digit years. It could work, but I would have to tweak
    it. Next, I come across `((\d{2})|(\d))\/((\d{2})|(\d))\/((\d{4})|(\d{2}))`. At
    first glance, it looks like I might have to pull the second pattern toward the
    third.


    I don''t like the third pattern as is, because it uses a lot capturing groups
    that it doesn''t really need. Noncapturing groups would do as well, and they would
    be more efficient. This immediately makes me a little suspicious. It''s also more
    verbose than I had hoped for. Of course, it''s possible that the verbose nature
    of the expression makes it more efficient, but I doubt that an author who was
    worried about efficiency would have left all of those useless capturing groups
    in there.


    Whichever pattern I choose, I''ll probably want to replace any and all punctuation
    within the candidate string with a character that''s easy to work with. I would
    just get rid of all punctuation, but then I wouldn''t know if a date such as `1111971`
    was referring to January 11, 1971, or November 1, 1971. Thus, I''m going to need
    a line of code like this:


    ```

    String scrubbedDate = date.replaceAll("\\p{Punct}","@");

    ```


    Here, I''ll probably use the `@` symbol as a replacement delimiter. It doesn''t
    have any sort of special regex meaning, so it''s easier to work with. Next, I''ll
    need to write a pattern to capture the month, day, and year, and make sure that
    it constitutes a valid date.


    Wait a minute—I wonder if there''s an easier way. What if I used the `String.split`
    method around the punctuation and extracted the date from the remaining digits?
    Then I could just use straight Java code to validate the actual date. To do that,
    I''ll need something like this:


    ```

    String[] datetokens = date.split("\\p{Punct}");

    ```


    This looks fairly easy, so I go with it.


    My algorithm becomes the following: Split the date along punctuation marks, use
    it to create a `Calendar` object, compare that to today, and return true if the
    `Calendar` object is less than or equal to today. I can write the preliminary
    method signature as follows:


    ```

    public static boolean isDateValid(String date)

    ```


    [Figure 5-1](#LiB0044.html#ch05fig01) shows the algorithm.


    [![Click To expand](fig204_01.jpg)](fig204_01_0.jpg)

    Figure 5-1: The algorithm for the `isDateValid` method


    [Listing 5-4](#LiB0044.html#ch05list04) presents the full implementation.


    Listing 5-4: Validating a Date


    ```

    01 import java.util.regex.*;

    02 import java.io.*;

    03 import java.util.logging.Logger;

    04 import java.util.GregorianCalendar;

    05 import java.util.Calendar;


    06 /**

    07 *matches dates

    08 */

    09 public class MatchDates{

    10 private static final String DATE_PATTERN = "date";

    11 private static final String PROP_FILE = "../regex.properties";

    12 private static Logger log = Logger.getAnonymousLogger();

    13 public static int LOWER_YEAR_LIMIT = -120;


    14    public static void main(String args[]) throws Exception{

    15       if (args != null && args.length==1)

    16       {

    17         boolean b =isDateValid(args[0]);

    18         log.info(""+b);

    19       }

    20       else

    21       {

    22         System.out.println("usage: java MatchDates dd/dd/dddd");

    23       }

    24    }


    25    /**

    26    * Confirms that given date format consists of one or two digits

    27    * followed by a punctuation, followed by one or two digits

    28    * followed by a punctuation, followed by two or four digits. Further,

    29    * it actually validates that the date is less then today, and

    30    * and not more then <CODE>LOWER_YEAR_LIMIT</CODE> =120 years in

    31    * the past. This method even takes leap years and such into account

    32    * @param the <code>String</code> date to be consider

    33    * @return <code>boolean</code> true if

    34    *

    35    * @author M Habibi

    36    */


    37    public static boolean isDateValid(String date)

    38    {

    39      boolean retval=false;

    40      date = date.trim();


    41      //does the candidate have three digits? Otherwise

    42      //the month, day, and year extraction below could

    43      //throw a number format exception.

    44      boolean hasThreeDigitSections =

    45       date.matches("\\d+\\p{Punct}\\d+\\p{Punct}\\d+");


    46      if (hasThreeDigitSections)

    47      {

    48         String[] dateTokens = date.split("\\p{Punct}");


    49         if (dateTokens.length == 3)

    50         {

    51          //Java months are zero based, so subtract 1

    52          int month = Integer.parseInt(dateTokens[0]) -1;


    53          int day = Integer.parseInt(dateTokens[1]);

    54          int year = Integer.parseInt(dateTokens[2]);


    55          //in case a 2 digit year was entered

    56          if (year < 100)

    57            year += 2000;


    58          //get boundary years

    59          GregorianCalendar today = new GregorianCalendar();

    60          //get a lowerLimit that is LOWER_YEAR_LIMIT less then

    61          //today

    62          GregorianCalendar lowerLimit = new GregorianCalendar();

    63          lowerLimit.add(Calendar.YEAR, LOWER_YEAR_LIMIT);


    64          //create a candidate representing the proposed date.

    65          GregorianCalendar candidate =

    66          new GregorianCalendar(year, month,day);

    67          //check the validity of the date

    68          if

    69          (

    70             candidate.before(today)

    71           &&

    72             candidate.after(lowerLimit)

    73           &&//month could be off, say the user entered 55

    74             month == candidate.get(Calendar.MONTH)

    75           &&//day could be off, say the user entered 55

    76             day == candidate.get(Calendar.DAY_OF_MONTH)

    77          )

    78          {

    79              retval = true;

    80          }

    81      }

    82     }

    83     return retval;

    84    }

    85 }

    ```


    The previous example deferred almost all of the heavy lifting to regular expressions.
    The code in [Listing 5-4](#LiB0044.html#ch05list04) uses regex for the `split`
    method. Otherwise, it''s fairly conventional Java code. This doesn''t mean the
    regex contribution is trivial—as a matter of fact, I would say it''s critical.
    However, once the `split` method''s regex contribution is assimilated, you''re
    back in the comfortable world of Java.'
  raw: "## Confirming Date Formats\n\nIn this example, I need a method that will validate\
    \ a date format. The requirements are very explicit. Some sort of punctuation\
    \ between the various date tokens is required, and a space isn't considered punctuation.\
    \ The method should accept either two digits or four digits for the year, and\
    \ either one or two digits for the day and month. I also need to make sure the\
    \ date isn't in the future. I can expect the first date token to be the month,\
    \ the second date token to be the day of that month, and the last date token to\
    \ be the year. Thus, valid entries might be as follows:\n\n*   11/30/2002\n\n\
    *   4/25/03\n\n*   03-29/2003\n\n*   11/30/1902\n\n*   2/25-03\n\n*   06#9/2003\n\
    \nAgain, the first thing to do is search the Web. I find a few patterns that might\
    \ work here. The first follows, and it's described as being very robust, dealing\
    \ with leap years, and so on: ***^(?:(?:(?:0?[13578]|1[02])(\\/|-|\\.)31)\\1|(?:(?:0?[1,3-9]|1***\
    \ ***[0-2])(\\/|-|\\.)(?:29|30)\\2))(?:(?:1[6-9]|[2-9]\\d)?\\d{2})$|^(?:0?2(\\\
    /|-|\\.)29\\3*** ***(?:(?:(?:1[6-9]|[2-9]\\d)?(?:0[48]|[2468][048]|[13579][26])|(?:(?:16|[2468]***\
    \ ***[048]|[3579][26])00))))$|^(?:(?:0?[1-9])|(?:1[0-2]))(\\/|-|\\.)(?:0?[1-9]|1\\\
    d|2[0-8])*** ***\\4(?:(?:1[6-9]|[2-9]\\d)?\\d{2})$***.\n\nI decide to pass on\
    \ it for now.\n\nThe second pattern I find is ***^\\d{1,2}\\/\\d{1,2}\\/\\d{4}$***,\
    \ which looks promising, but limits itself to four-digit years. It could work,\
    \ but I would have to tweak it. Next, I come across ***((\\d{2})|(\\d))\\/((\\\
    d{2})|(\\d))\\/((\\d{4})|(\\d{2}))***. At first glance, it looks like I might\
    \ have to pull the second pattern toward the third.\n\nI don't like the third\
    \ pattern as is, because it uses a lot capturing groups that it doesn't really\
    \ need. Noncapturing groups would do as well, and they would be more efficient.\
    \ This immediately makes me a little suspicious. It's also more verbose than I\
    \ had hoped for. Of course, it's possible that the verbose nature of the expression\
    \ makes it more efficient, but I doubt that an author who was worried about efficiency\
    \ would have left all of those useless capturing groups in there.\n\nWhichever\
    \ pattern I choose, I'll probably want to replace any and all punctuation within\
    \ the candidate string with a character that's easy to work with. I would just\
    \ get rid of all punctuation, but then I wouldn't know if a date such as *1111971*\
    \ was referring to January 11, 1971, or November 1, 1971\\. Thus, I'm going to\
    \ need a line of code like this:\n\n```\nString scrubbedDate = date.replaceAll(\"\
    \\\\p{Punct}\",\"@\");\n```\n\nHere, I'll probably use the *@* symbol as a replacement\
    \ delimiter. It doesn't have any sort of special regex meaning, so it's easier\
    \ to work with. Next, I'll need to write a pattern to capture the month, day,\
    \ and year, and make sure that it constitutes a valid date.\n\nWait a minute—I\
    \ wonder if there's an easier way. What if I used the String.split method around\
    \ the punctuation and extracted the date from the remaining digits? Then I could\
    \ just use straight Java code to validate the actual date. To do that, I'll need\
    \ something like this:\n\n```\nString[] datetokens = date.split(\"\\\\p{Punct}\"\
    );\n```\n\nThis looks fairly easy, so I go with it.\n\nMy algorithm becomes the\
    \ following: Split the date along punctuation marks, use it to create a Calendar\
    \ object, compare that to today, and return true if the Calendar object is less\
    \ than or equal to today. I can write the preliminary method signature as follows:\n\
    \n```\n public static boolean isDateValid(String date)\n```\n\n[Figure 5-1](#LiB0044.html#ch05fig01)\
    \ shows the algorithm.\n\n[![Click To expand](fig204_01.jpg)](fig204_01_0.jpg)\n\
    Figure 5-1: The algorithm for the isDateValid method\n\n[Listing 5-4](#LiB0044.html#ch05list04)\
    \ presents the full implementation.\n\nListing 5-4: Validating a Date\n\n| **![Start\
    \ example](_1.gif)** |\n\n```\n01 import java.util.regex.*;\n02 import java.io.*;\n\
    03 import java.util.logging.Logger;\n04 import java.util.GregorianCalendar;\n\
    05 import java.util.Calendar;\n\n06 /**\n07 *matches dates\n08 */\n09 public class\
    \ MatchDates{\n10 private static final String DATE_PATTERN = \"date\";\n11 private\
    \ static final String PROP_FILE = \"../regex.properties\";\n12 private static\
    \ Logger log = Logger.getAnonymousLogger();\n13 public static int LOWER_YEAR_LIMIT\
    \ = -120;\n\n14    public static void main(String args[]) throws Exception{\n\
    15       if (args != null && args.length==1)\n16       {\n17         boolean b\
    \ =isDateValid(args[0]);\n18         log.info(\"\"+b);\n19       }\n20       else\n\
    21       {\n22         System.out.println(\"usage: java MatchDates dd/dd/dddd\"\
    );\n23       }\n24    }\n\n25    /**\n26    * Confirms that given date format\
    \ consists of one or two digits\n27    * followed by a punctuation, followed by\
    \ one or two digits\n28    * followed by a punctuation, followed by two or four\
    \ digits. Further,\n29    * it actually validates that the date is less then today,\
    \ and\n30    * and not more then <CODE>LOWER_YEAR_LIMIT</CODE> =120 years in\n\
    31    * the past. This method even takes leap years and such into account\n32\
    \    * @param the <code>String</code> date to be consider\n33    * @return <code>boolean</code>\
    \ true if\n34    *\n35    * @author M Habibi\n36    */\n\n37    public static\
    \ boolean isDateValid(String date)\n38    {\n39      boolean retval=false;\n40\
    \      date = date.trim();\n\n41      //does the candidate have three digits?\
    \ Otherwise\n42      //the month, day, and year extraction below could\n43   \
    \   //throw a number format exception.\n44      boolean hasThreeDigitSections\
    \ =\n45       date.matches(\"\\\\d+\\\\p{Punct}\\\\d+\\\\p{Punct}\\\\d+\");\n\n\
    46      if (hasThreeDigitSections)\n47      {\n48         String[] dateTokens\
    \ = date.split(\"\\\\p{Punct}\");\n\n49         if (dateTokens.length == 3)\n\
    50         {\n51          //Java months are zero based, so subtract 1\n52    \
    \      int month = Integer.parseInt(dateTokens[0]) -1;\n\n53          int day\
    \ = Integer.parseInt(dateTokens[1]);\n54          int year = Integer.parseInt(dateTokens[2]);\n\
    \n55          //in case a 2 digit year was entered\n56          if (year < 100)\n\
    57            year += 2000;\n\n58          //get boundary years\n59          GregorianCalendar\
    \ today = new GregorianCalendar();\n60          //get a lowerLimit that is LOWER_YEAR_LIMIT\
    \ less then\n61          //today\n62          GregorianCalendar lowerLimit = new\
    \ GregorianCalendar();\n63          lowerLimit.add(Calendar.YEAR, LOWER_YEAR_LIMIT);\n\
    \n64          //create a candidate representing the proposed date.\n65       \
    \   GregorianCalendar candidate =\n66          new GregorianCalendar(year, month,day);\n\
    67          //check the validity of the date\n68          if\n69          (\n\
    70             candidate.before(today)\n71           &&\n72             candidate.after(lowerLimit)\n\
    73           &&//month could be off, say the user entered 55\n74             month\
    \ == candidate.get(Calendar.MONTH)\n75           &&//day could be off, say the\
    \ user entered 55\n76             day == candidate.get(Calendar.DAY_OF_MONTH)\n\
    77          )\n78          {\n79              retval = true;\n80          }\n\
    81      }\n82     }\n83     return retval;\n84    }\n85 }\n```\n\n| **![End example](_1.gif)**\
    \ |\n\n|  |\n\nThe previous example deferred almost all of the heavy lifting to\
    \ regular expressions. The code in [Listing 5-4](#LiB0044.html#ch05list04) uses\
    \ regex for the split method. Otherwise, it's fairly conventional Java code. This\
    \ doesn't mean the regex contribution is trivial—as a matter of fact, I would\
    \ say it's critical. However, once the split method's regex contribution is assimilated,\
    \ you're back in the comfortable world of Java."
  trans: "\n## 确认日期格式\n\n在本例中，我需要一个能够验证日期格式的方法。要求非常明确：各个日期标记之间必须使用某种标点符号分隔，而空格不被视为标点符号。该方法应接受两位或四位数字的年份，以及一位或两位数字的月份和日期。我还需要确保日期不是未来的日期。可以预期第一个日期标记是月份，第二个日期标记是该月的日期，最后一个日期标记是年份。因此，有效的输入可能如下所示：\n\
    \n*   11/30/2002\n\n*   4/25/03\n\n*   03-29/2003\n\n*   11/30/1902\n\n*   2/25-03\n\
    \n*   06#9/2003\n\n同样，首先要做的是在网上搜索。我找到了几个可能适用的模式。第一个模式如下，它被描述为非常健壮，能够处理闰年等情况：***^(?:(?:(?:0?[13578]|1[02])(\\\
    /|-|\\.)31)\\1|(?:(?:0?[1,3-9]|1*** ***[0-2])(\\/|-|\\.)(?:29|30)\\2))(?:(?:1[6-9]|[2-9]\\\
    d)?\\d{2})$|^(?:0?2(\\/|-|\\.)29\\3*** ***(?:(?:(?:1[6-9]|[2-9]\\d)?(?:0[48]|[2468][048]|[13579][26])|(?:(?:16|[2468]***\
    \ ***[048]|[3579][26])00))))$|^(?:(?:0?[1-9])|(?:1[0-2]))(\\/|-|\\.)(?:0?[1-9]|1\\\
    d|2[0-8])*** ***\\4(?:(?:1[6-9]|[2-9]\\d)?\\d{2})$***.\n\n我决定暂时跳过它。\n\n我找到的第二个模式是\
    \ ***^\\d{1,2}\\/\\d{1,2}\\/\\d{4}$***，看起来很有希望，但它只限于四位数的年份。它可能能用，但我需要对其进行调整。接着，我遇到了\
    \ ***((\\d{2})|(\\d))\\/((\\d{2})|(\\d))\\/((\\d{4})|(\\d{2}))***。乍一看，我似乎需要将第二个模式向第三个模式靠拢。\n\
    \n我不喜欢第三个模式现在的样子，因为它使用了大量实际上并不需要的捕获组。非捕获组同样可以胜任，而且效率更高。这立刻让我有些怀疑。它也比我希望的更冗长。当然，表达式冗长的特性可能使其更高效，但我怀疑一个关心效率的作者会留下所有这些无用的捕获组。\n\
    \n无论我选择哪个模式，我可能都想把候选字符串中的所有标点符号替换成一个易于处理的字符。我可以直接去掉所有标点，但那样我就无法知道像 *1111971* 这样的日期是指\
    \ 1971 年 1 月 11 日，还是 1971 年 11 月 1 日。因此，我需要这样一行代码：\n\n```\nString scrubbedDate\
    \ = date.replaceAll(\"\\\\p{Punct}\",\"@\");\n```\n\n这里，我可能会使用 *@* 符号作为替换分隔符。它没有任何特殊的正则表达式含义，因此更容易处理。接下来，我需要编写一个模式来捕获月份、日期和年份，并确保它构成一个有效的日期。\n\
    \n等等——我在想是否有更简单的方法。如果我使用 `String.split` 方法按标点符号分割，并从剩余的数字中提取日期呢？然后我就可以直接用纯 Java\
    \ 代码来验证实际日期了。为此，我需要类似这样的代码：\n\n```\nString[] datetokens = date.split(\"\\\\p{Punct}\"\
    );\n```\n\n这看起来相当简单，所以我决定采用这种方法。\n\n我的算法如下：按标点符号分割日期，用它创建一个 `Calendar` 对象，将其与今天进行比较，如果该\
    \ `Calendar` 对象小于或等于今天，则返回 true。我可以将初步的方法签名写成如下形式：\n\n```\n public static boolean\
    \ isDateValid(String date)\n```\n\n图 5-1 展示了该算法。\n\n![点击展开](img/fig204_01_0.jpg)\n\
    图 5-1：isDateValid 方法的算法\n\n代码清单 5-4 给出了完整的实现。\n\n代码清单 5-4：验证日期\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\n01 import java.util.regex.*;\n02 import java.io.*;\n03 import java.util.logging.Logger;\n\
    04 import java.util.GregorianCalendar;\n05 import java.util.Calendar;\n\n06 /**\n\
    07 *匹配日期\n08 */\n09 public class MatchDates{\n10 private static final String DATE_PATTERN\
    \ = \"date\";\n11 private static final String PROP_FILE = \"../regex.properties\"\
    ;\n12 private static Logger log = Logger.getAnonymousLogger();\n13 public static\
    \ int LOWER_YEAR_LIMIT = -120;\n\n14    public static void main(String args[])\
    \ throws Exception{\n15       if (args != null && args.length==1)\n16       {\n\
    17         boolean b =isDateValid(args[0]);\n18         log.info(\"\"+b);\n19\
    \       }\n20       else\n21       {\n22         System.out.println(\"用法: java\
    \ MatchDates dd/dd/dddd\");\n23       }\n24    }\n\n25    /**\n26    * 确认给定的日期格式由一个或两位数字\n\
    27    * 后跟一个标点符号，再后跟一个或两位数字\n28    * 后跟一个标点符号，再后跟两位或四位数字组成。此外，\n29    * 它实际验证日期是否小于今天，并且\n\
    30    * 不超过过去 <CODE>LOWER_YEAR_LIMIT</CODE> =120 年。\n31    * 此方法甚至考虑了闰年等情况\n32\
    \    * @param 要处理的 <code>String</code> 日期\n33    * @return <code>boolean</code>\
    \ 如果有效则返回 true\n34    *\n35    * @author M Habibi\n36    */\n\n37    public static\
    \ boolean isDateValid(String date)\n38    {\n39      boolean retval=false;\n40\
    \      date = date.trim();\n\n41      //候选字符串是否包含三个数字部分？否则\n42      //下面的月份、日期和年份提取可能会\n\
    43      //抛出数字格式异常。\n44      boolean hasThreeDigitSections =\n45       date.matches(\"\
    \\\\d+\\\\p{Punct}\\\\d+\\\\p{Punct}\\\\d+\");\n\n46      if (hasThreeDigitSections)\n\
    47      {\n48         String[] dateTokens = date.split(\"\\\\p{Punct}\");\n\n\
    49         if (dateTokens.length == 3)\n50         {\n51          //Java 中月份从\
    \ 0 开始，因此减 1\n52          int month = Integer.parseInt(dateTokens[0]) -1;\n\n\
    53          int day = Integer.parseInt(dateTokens[1]);\n54          int year =\
    \ Integer.parseInt(dateTokens[2]);\n\n55          //如果输入的是两位数的年份\n56         \
    \ if (year < 100)\n57            year += 2000;\n\n58          //获取边界年份\n59   \
    \       GregorianCalendar today = new GregorianCalendar();\n60          //获取比今天早\
    \ LOWER_YEAR_LIMIT 年的下限\n61          GregorianCalendar lowerLimit = new GregorianCalendar();\n\
    62          lowerLimit.add(Calendar.YEAR, LOWER_YEAR_LIMIT);\n\n63          //创建一个代表提议日期的候选对象。\n\
    64          GregorianCalendar candidate =\n65          new GregorianCalendar(year,\
    \ month,day);\n66          //检查日期的有效性\n67          if\n68          (\n69     \
    \        candidate.before(today)\n70           &&\n71             candidate.after(lowerLimit)\n\
    72           &&//月份可能出错，例如用户输入了 55\n73             month == candidate.get(Calendar.MONTH)\n\
    74           &&//日期可能出错，例如用户输入了 55\n75             day == candidate.get(Calendar.DAY_OF_MONTH)\n\
    76          )\n77          {\n78              retval = true;\n79          }\n\
    80      }\n81     }\n82     return retval;\n83    }\n84 }\n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n前面的示例将几乎所有繁重的工作都交给了正则表达式。代码清单 5-4 中的代码在 `split` 方法中使用了正则表达式。除此之外，它都是相当常规的\
    \ Java 代码。这并不意味着正则表达式的贡献微不足道——事实上，我认为它至关重要。然而，一旦 `split` 方法中的正则表达式部分被整合进来，你就回到了熟悉的\
    \ Java 世界。\n"
- fmt: "# Searching a String\n\nThis example searches a given string for the existence\
    \ of a pattern and returns all of the matching strings. This is very easy code,\
    \ but it's such a useful little program that it's worthwhile to demonstrate it.\n\
    \nFirst, I need to decide exactly what I mean by \"return.\" Return what? In this\
    \ case, I decide to return an `ArrayList` of matching `String`s, because I want\
    \ the `String`s to be in the order in which they were found, and an `ArrayList`\
    \ maintains the order in which elements were inserted. Also, I like the idea of\
    \ returning a well-defined data structure, in case the client wants to, say, step\
    \ through that structure and examine the data further.\n\nI also decide that I\
    \ want the client to be able to pass in `Pattern.compile` flags such as `Pattern.MULTILINE`\
    \ and `Pattern.DOTALL`. It doesn't really cost me anything in the way of additional\
    \ complexity, and it's a nice feature for the client. At this point, it's worthwhile\
    \ to get a preliminary method signature written down. I come up with this:\n\n\
    ```\npublic static ArrayList searchString(\n    String content, String searchPattern,\
    \ int flags\n) throws IOException\n```\n\nNow I'm ready to start writing my method.\
    \ My first pass looks like [Listing 5-5](#LiB0045.html#ch05list05).\n\n**Listing\
    \ 5-5: First Pass at the `searchString` Method**\n\n```\n01     public static\
    \ ArrayList searchString(\n02         String content,\n03         String searchPattern,\n\
    04         int flags\n05     )\n06     throws IOException\n07     {\n08      \
    \   ArrayList retval = new ArrayList();\n09         Pattern pattern = null;\n\n\
    10        //compile the pattern\n11        if (flags > -1)\n12        {\n13  \
    \          pattern = Pattern.compile(searchPattern, flags);\n14        }\n15 \
    \       else\n16        {\n17            pattern = Pattern.compile(searchPattern);\n\
    18        }\n\n19        //extract the matcher for the pattern\n20        Matcher\
    \ matcher = pattern.matcher(content);\n\n21        //iterate through all of the\
    \ matches, and add\n22        //all relevant ones to the arrayList\n23       \
    \ while (matcher.find())\n24        {\n25            //extract the match and its\
    \ position\n26            String tmp = matcher.group();\n27            //insert\
    \ the matching string\n28            //into the map.\n29            retval.add(+\
    \ tmp);\n30        }\n\n32        return retval;\n32     } \n```\n\n[Listing 5-5](#LiB0045.html#ch05list05)\
    \ isn't terrible. It finds all the relevant matching substrings and returns them\
    \ in order. I run a few sample tests and find that it works as expected. But it\
    \ does leave something to be desired. It doesn't really tell me where the string\
    \ was found, and it might be nice if it were overloaded, so the client isn't forced\
    \ to pass in a flag if they don't need one.\n\nI decide that for this generation,\
    \ the client can live without the overloading. However, I do think the client\
    \ has a right to ask for the position at which the matching strings were found.\
    \ Thus, I modify the code so that it returns a `Map`. The `Map` will contain a\
    \ key/value pair, which will use the byte position of each find (stored as a `String`\
    \ or an `Integer`—I haven't decided which yet) and the matching substring as a\
    \ value. Modifying the code, I come up with [Listing 5-6](#LiB0045.html#ch05list06).\
    \ The only significant changes are on lines 7, 25, and 29. By the way, I decided\
    \ to use a `LinkedHashMap` on line 8, because I wanted to preserve the order in\
    \ which the matching `String`s were found. A `LinkedHashMap` is a J2SE 1.4 addition\
    \ to the `Map` family that preserves the insertion order of elements.\n\n**Listing\
    \ 5-6: Modified `searchString` Method Belonging in the `RegexUtil` Class**\n\n\
    ```\n01  public static Map searchString(\n02      String content,\n03      String\
    \ searchPattern,\n04      int flags\n05  )\n\n06  {\n07      Map retval = new\
    \ LinkedHashMap();\n08      Pattern pattern = null;\n\n09      //compile the pattern\n\
    10      if (flags > -1)\n11      {\n12          pattern = Pattern.compile(searchPattern,\
    \ flags);\n13      }\n14      else\n15      {\n16          pattern = Pattern.compile(searchPattern);\n\
    17      }\n\n18      //extract the matcher for the pattern\n19      Matcher matcher\
    \ = pattern.matcher(content);\n20     //iterate through all of the matches, and\
    \ add\n21     //all relevant ones to the arrayList\n22     while (matcher.find())\n\
    23     {\n24         //extract the match and its position\n25         int position\
    \ = matcher.start();\n26         String tmp = matcher.group();\n27         //insert\
    \ the matching string and position\n28         //into the map.\n29         retval.put(position+\"\
    \",tmp);\n30     }\n\n31     return retval;\n32 }\n```\n\nI decide to make the\
    \ position a `String`, to make dealing with the output easier. I don't want to\
    \ require the client to handle the keys too carefully, so `String`s will do for\
    \ now."
