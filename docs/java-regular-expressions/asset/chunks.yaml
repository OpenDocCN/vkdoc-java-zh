    \npublic class NonCapturingGroupExample{\n    public static void main(String args[]){\n\
    \        //define the pattern\n        String regex = \"hello|hi|greetings|(?:good\
    \ morning)\";\n\n//define the candidate strings\n        String candidate1 = \"\
    Tommy say hi to you\";\n        String candidate2 = \"Tommy say good morning to\
    \ you\";\n        //compile the pattern\n        Pattern pattern = Pattern.compile(regex);\n\
    \n//extract the first pattern\n        Matcher matcher = pattern.matcher(candidate1);\n\
    \        //show the number of groups\n        System.out.println(\"GROUP COUNT:\"\
    + matcher.groupCount());\n\nif (matcher.find())System.out.println(\"GOT 1:\"+candidate1);\n\
    \n//reuse the matcher, and check the second candidate string\n        matcher.reset();\n\
    \        matcher = pattern.matcher(candidate2);\n\n//show the number of groups\n\
    \        System.out.println(\"GROUP COUNT:\"+ matcher.groupCount());\n\nif (matcher.find())\n\
    \        System.out.println(\"GOT 2:\" +candidate2);\n    }\n}\n```\n\n| **![End\
    \ example](_1.gif)** |\n\n|  |\n\nThe output of this example is shown in [Output\
    \ 3-1](#LiB0024.html#ch03ex01).\n\nOutput 3-1: Output of NonCapturingGroupExample\n\
    \n| **![Start example](_1.gif)** |\n\n```\nGROUP COUNT:0\nGOT 1:Tommy say hi to\
    \ you\nGROUP COUNT:0\nGOT 2:Tommy say good morning to you\n```\n\n| **![End example](_1.gif)**\
    \ |\n\n|  |\n\nIf you had used a capturing group, then the group count could have\
    \ been 1\\. Although this may seem like a fairly innocuous issue, it could grow\
