- fmt: "### `public static Pattern compile(String regex) throws PatternSyntaxException`\n\
    \nYou'll notice that the `Pattern` class doesn't have a public constructor. This\
    \ means that you can't write the following type of code:\n\n```\nPattern p = new\
    \ Pattern(\"my regex\");//wrong!\n```\n\nTo get a reference to a `Pattern` object,\
    \ you must use the static method `pattern(String regex)`. Thus, your first line\
    \ of regex code might look like the following:\n\n```\nPattern p = Pattern.compile(\"\
    my regex\");//Right! \n```\n\nThe parameter for this method is a `String` that\
    \ represents a regular expression. When passing a `String` to a method that expects\
    \ a regular expression, it's important to delimit any `\\` characters that the\
    \ regular expressions might have by appending another `\\` character to them.\
    \ This is because `String` objects internally use the `\\` character to delimit\
    \ metacharacters in a character sequences, regardless of whether those character\
    \ sequences are regular expressions. This has been true long before regular expression\
    \ were a part of Java. Thus, the regular expression `\\d` becomes `\\\\d`. To\
    \ match a single digit, your regular expression code becomes the following:\n\n\
    ```\nPattern p = Pattern.compile(\"\\\\d\");\n```\n\nThe point here is that the\
    \ regular expression `\\d` becomes the String `\\\\d` .\n\nThe delimitation of\
    \ the `String` parameter can sometimes be tricky, so it's important to understand\
    \ it well. By and large, it means that you double the `\\` characters that might\
    \ already be present in the regular expression. It doesn't mean that you simply\
    \ append a single `\\` character.\n\nThe `compile` method will throw a `java.util.regex.PatternSyntaxException`\
    \ if the regular expression itself is badly formed. For example, if you pass in\
    \ a `String` that contains `[4`, the `compile` method will throw a `PatternSyntaxException`\
    \ at runtime, because the syntax of the regular expression `[4` is illegal.\n\n\
    The `compile(String regex)` method returns a `Pattern` object.\n\n### `public\
    \ static compile pattern(String regex, int flags) throws PatternSyntaxException`\n\
    \nThe `compile(String regex, int flags)` method is a more powerful form of the\
    \ `compile` method. The first parameter for this method, `regex`, is a `String`\
    \ that represents a regular expression, as detailed in the previous `pattern.compile(String\
    \ regex)` method entry. For details on how the `String` parameter must be formatted,\
    \ please see the previous `compile(String regex)` method entry.\n\nThe flexibility\
    \ of this `compile` method is fully realized by using the second parameter, `int\
    \ flags`. For example, if you want a match to be successful regardless of the\
    \ case of the candidate `String`, then your pattern might look like the following:\n\
    \n```\nPattern p = Pattern.compile(regex,Pattern.CASE_INSENSITIVE);\n```\n\nYou\
    \ can combine the flags by using the `|` operator. For example, to achieve case-insensitive\
    \ Unicode matches that include a comment, you might use the following:\n\n```\n\
    Pattern p =\nPattern.compile(\"t # a compound flag example\",Pattern.CASE_INSENSITIVE\
    \ |\n        Pattern.UNICODE_CASE| Pattern.COMMENT);\n```\n\nThe `compile(String\
    \ regex, int flags)` method returns a `Pattern` object.\n\n### `public String\
    \ pattern()`\n\nThis method returns the regular expression from which this pattern\
    \ was compiled. This is a simple `String` that represents the regex you passed\
    \ in.\n\nThis method can be misleading in two ways. First, the `String` that is\
    \ returned doesn't reflect any flags that were set when the pattern was compiled.\
    \ Second, the regex `String` you passed in isn't always the pattern `String` you\
    \ get back out. Specifically, the original `String` delimitations aren't shown.\
    \ Thus, if your original code was\n\n```\nPattern p = Pattern.compile(\"\\\\d\"\
    );\n```\n\nthen you should expect your output to be `\\d`, with a single `\\`\
    \ character.\n\n### `public Matcher matcher(CharSequence input)`\n\nRemember that\
    \ you create a `Pattern` object by compiling a description of what you're looking\
    \ for. A `Pattern` lists the features of what you're looking for. Speaking purely\
    \ conceptually, your patterns might look like the following:\n\n```\nPattern p\
    \ = Pattern.compile(\"She must have red hair and be smarter than I am\");\n```\n\
    \nCorrespondingly, you'll need to compare that description against candidates.\
    \ That is, you'll want to examine a given `String` to see whether it matches the\
    \ description you provided.\n\nThe `Matcher` object is designed specifically to\
    \ help you do this sort of interrogation. The `Pattern.matcher(CharSequence input)`\
    \ method returns the `Matcher` that will help get details about how your candidate\
    \ `String` compares with the description you passed in.\n\n### `public int flags()`\n\
    \nEarlier, I discussed the constant flags that you can use in compiling your regex\
    \ pattern. The `flags` method simply returns an `int` that represents those flags.\n\
    \nTo see if your `Pattern` class is currently using a given flag—for example,\
    \ the `Pattern.COMMENTS` flag—simply extract the flag\n\n```\nint flgs = myPattern.flags();\n\
    ```\n\nand then `&` that flag to the `Pattern.COMMENTS` flag:\n\n```\nboolean\
    \ isUsingCommentFlag =(Pattern.COMMENTS == (Pattern.COMMENTS & flgs)) ;\n```\n\
    \nSimilarly, to see if you're using `CASE_insensitive`, do the following:\n\n\
    ```\nboolean isUsingCaseInsensitiveFlag =\n(Pattern.CASE_insensitive == (Pattern.\
    \ CASE_insensitive & flgs));\n```\n\n### `public static boolean matches(String\
    \ regex,CharSequence input)`\n\nVery often, you'll find that all you need to know\
    \ about a `String` is whether it matches a given regular expression exactly. You\
    \ don't want to have to create a `Pattern` object, extract its `Matcher` object,\
    \ and interrogate that `Matcher`.\n\nThis static utility method is designed to\
    \ help you do exactly that. Internally, it creates the `Pattern` and `Matcher`\
    \ objects you need, compares the regex to the input `String`, and returns a `Boolean`\
    \ indicating whether the two objects match exactly. Usage might look something\
    \ like `PatternMatchesTest` example shown here:\n\n```\nimport java.util.regex.*;\n\
    public class PatternMatchesTest{\n  public static void main(String args[]){\n\n\
    \      String regex = \"ad*\";\n      String input = \"add\";\n\n      boolean\
    \ isMatch = Pattern.matches(regex,input);\n      System.out.println(isMatch);//return\
    \ true\n  }\n}\n```\n\nIf you're going to be doing a lot of comparisons, then\
    \ it's more efficient to explicitly create a `Pattern` object and do your matches\
    \ manually. However, if you're not going to be doing a lot of comparisons, then\
    \ `matches` is a handy utility method.\n\nThe `Pattern.matches(String regex, CharSequence\
    \ input)` method is also used internally by the `String` class. As of J2SE 1.4,\
    \ `String` has a new method called `matches`, which internally defers to this\
    \ one. Thus, you might already be using this method without being aware of it.\n\
    \nOf course, this method can throw a `PatternSyntaxException` if the regex pattern\
    \ under consideration isn't well formed."
