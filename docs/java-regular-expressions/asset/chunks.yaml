    \n此方法可能在两个方面产生误导。首先，返回的字符串不反映编译模式时设置的任何标志。其次，你传入的正则表达式字符串并不总是你取回的模式字符串。具体来说，原始的字符串转义不会被显示。因此，如果你的原始代码是\n\
    \n```\nPattern p = Pattern.compile(\"\\\\d\");\n```\n\n那么你应该期望输出是 ***\\d***，带有一个单独的\
    \ ***\\*** 字符。\n\n### public Matcher matcher(CharSequence input)\n\n请记住，你是通过编译你要查找内容的描述来创建\
    \ `Pattern` 对象的。一个 `Pattern` 列出了你要查找内容的特征。纯粹从概念上讲，你的模式可能如下所示：\n\n```\nPattern\
    \ p = Pattern.compile(\"She must have red hair and be smarter than I am\");\n\
    ```\n\n相应地，你需要将该描述与候选对象进行比较。也就是说，你需要检查一个给定的字符串，看它是否与你提供的描述相匹配。\n\n`Matcher` 对象专门设计用于帮助你进行此类查询。`Pattern.matcher(CharSequence\
    \ input)` 方法返回一个 `Matcher`，它将帮助你获取关于候选字符串与你传入的描述如何比较的详细信息。\n\n### public int flags()\n\
    \n之前，我讨论了在编译正则表达式模式时可以使用的常量标志。`flags` 方法简单地返回一个表示这些标志的 `int` 值。\n\n要查看你的 `Pattern`\
    \ 类当前是否使用了某个给定的标志——例如，`Pattern.COMMENTS` 标志——只需提取标志\n\n```\nint flgs = myPattern.flags();\n\
    ```\n\n然后将该标志与 `Pattern.COMMENTS` 标志进行按位与运算：\n\n```\nboolean isUsingCommentFlag\
    \ =(Pattern.COMMENTS == (Pattern.COMMENTS & flgs)) ;\n```\n\n类似地，要查看你是否使用了 `CASE_insensitive`，请执行以下操作：\n\
    \n```\nboolean isUsingCaseInsensitiveFlag =\n(Pattern.CASE_insensitive == (Pattern.\
    \ CASE_insensitive & flgs));\n```\n\n### public static boolean matches(String\
    \ regex,CharSequence input)\n\n很多时候，你会发现你只需要知道一个字符串是否与给定的正则表达式完全匹配。你不想创建一个 `Pattern`\
    \ 对象，提取它的 `Matcher` 对象，然后查询那个 `Matcher`。\n\n这个静态实用方法正是为此而设计的。在内部，它会创建你需要的 `Pattern`\
    \ 和 `Matcher` 对象，将正则表达式与输入字符串进行比较，并返回一个布尔值，指示这两个对象是否完全匹配。用法可能类似于这里展示的 `PatternMatchesTest`\
    \ 示例：\n\n```\nimport java.util.regex.*;\npublic class PatternMatchesTest{\n  public\
    \ static void main(String args[]){\n\n      String regex = \"ad*\";\n      String\
    \ input = \"add\";\n\n      boolean isMatch = Pattern.matches(regex,input);\n\
    \      System.out.println(isMatch);\\\\返回 true\n  }\n}\n```\n\n如果你要进行大量的比较，那么显式创建一个\
    \ `Pattern` 对象并手动进行匹配会更高效。但是，如果你不打算进行大量比较，那么 `matches` 是一个方便的实用方法。\n\n`Pattern.matches(String\
    \ regex, CharSequence input)` 方法也在 `String` 类内部使用。从 J2SE 1.4 开始，`String` 有一个名为\
    \ `matches` 的新方法，它在内部委托给这个方法。因此，你可能已经在使用此方法而并未意识到。\n\n当然，如果所考虑的正则表达式模式格式不正确，此方法可能会抛出\
    \ `PatternSyntaxException`。\n"
- fmt: "### `public String[] split(CharSequence input)`\n\nThis method can be particularly\
    \ helpful if you need to break up a `String` into an array of substrings based\
    \ on some criteria. In concept, it's similar to the `StringTokenizer`. However,\
    \ it's much more powerful and more resource intensive than `StringTokenizer`,\
    \ because it allows your program to use a regular expressions as the splitting\
    \ criteria.\n\nThis method always returns at least one element. If the split candidate,\
    \ `input`, can't be found, a `String` array is returned that contains exactly\
    \ one `String`, namely the original `input`.\n\nIf the `input` can be found, then\
    \ a `String` array is returned. That array contains every substring after an occurrence\
    \ of the `input`. Thus, for the pattern\n\n```\nPattern p = new Pattern.compile(\"\
    ,\");\n```\n\nthe `split` method for *Hello, Dolly* will return a `String` array\
    \ consisting of two elements. The first element of the array will contain the\
    \ `String` *Hello*, and the second will contain the `String` *Dolly*. That `String`\
    \ array is obtained as follows:\n\n```\nString tmp[] = p.split(\"Hello,Dolly\"\
    );\n```\n\nIn this case, the value return is\n\n```\n//tmp =={ \"Hello\", \"Dolly\"\
    }\n```\n\nThere are some subtleties you should be aware of when working with this\
    \ method. If the candidate `String` had been *Hello,Dolly*, with a trailing comma\
    \ character after the *y* in *Dolly*, then this method would still have returned\
    \ two elements: a `String` array consisting of *Hello* and *Dolly*. The implicit\
    \ behavior is that training spaces aren't returned.\n\nIf the input `String` had\
    \ been *Hello,,,Dolly*, the resulting `String` array would have four elements.\
    \ The return value of the `split` method, as applied to the `Pattern`, is\n\n\
    ```\n// p.split(\"Hello,,,Dolly\") == {\"Hello\",\"\",\"\",\"Dolly\"} \n```\n\n\
    The `String` method further optimizes its search criteria by placing an invisible\
    \ `^` before the pattern and a `$` after it.\n\n### `public String[] split(CharSequence\
    \ input, int limit)`\n\nThis method works in exactly the same way as `Pattern.split(CharSequence\
    \ input)`, with one variation. The second parameter, `limit`, allows you to control\
    \ how many elements are returned:\n\n```\nLimit == 0\n```\n\nIf you specify that\
    \ the second parameter, `limit`, should equal `0`, then this method behaves exactly\
    \ like its overloaded counterpart:\n\n```\nLimit >0\n```\n\nUse a positive `limit`\
    \ if you're interested in only a certain number of matches. You should use number\
    \ `1` as the `limit`. Say the `Pattern` `p` has been compiled for the `String`\
    \ `,` as previously. To split the `String` *Hello, Dolly, You, Are, My, Favorite*\
    \ when you only want the first two tokens, you would use this:\n\n```\nString[]\
    \ tmp = pattern.split(\"Hello, Dolly, You, Are, My, Favorite\",3);\n```\n\nThe\
    \ value of the resulting `String` would be this:\n\n```\n//tmp[0] = \"Hello\"\
    , tmp[1] = \"Dolly\";\n```\n\nThe interesting behavior here is that a third element\
    \ is returned, in this case\n\n```\n//tmp[2] = \"You, Are, My, Favorite\";\n```\n\
    \nUsing a positive `limit` can potentially lead to performance enhancements, because\
    \ the regex engine can stop searching when it meets the specified number of matches:\n\
    \n```\nLimit <0\n```\n\nUsing a negative number—any negative number—for the `limit`\
    \ tells the regex engine that you want to return as many matches as possible *and*\
    \ that you want trailing spaces, if any, to be returned. Thus, for the regex pattern\
    \ `,` and the candidate `String` *Hello,Dolly* the command\n\n```\nString tmp[]\
    \ = p.split(\"Hello,Dolly\", -1); \n```\n\nresults in\n\n```\n//tmp == {\"Hello\"\
    ,\"Dolly\"};\n```\n\nHowever, for the `String` *Hello, Dolly,<space><space><space>*,\
    \ with trailing spaces after the comma following the *Dolly*, the method call\n\
    \n```\nString tmp[] = p.split(\"Hello,Dolly,  \", -1);\n```\n\nresults in\n\n\
    ```\n//tmp == {\"Hello\",\"Dolly\",\"  \"};\n```\n\nNotice that the actual value\
    \ of the negative `limit` doesn't matter. Thus,\n\n```\np.split(\"Hello,Dolly\"\
    , -1);\n```\n\nis exactly equivalent to\n\n```\np.split(\"Hello,Dolly\", -100);\n\
    ```\n\n## Method Class Methods\n\n### `public Pattern pattern()`\n\nThe `pattern`\
    \ method returns the `Pattern` that created this particular `Matcher` object.\
    \ The `Pattern` returned doesn't contain any of the flags that are explicitly\
    \ set by using the `Pattern` constants when the pattern is compiled, such as `Pattern.MULTILINE`.\n\
    \n### `public Matcher reset()`\n\nThe `reset()` method clears all state information\
    \ from the `Matcher` object it is called on. The `Matcher` is, in effect, reverted\
    \ to the state it originally had when you first received a reference to it.\n\n\
    ### `public Matcher reset(CharSequence input)`\n\nThe `reset(CharSequnce input)`\
    \ method clears the state of the `Matcher` object it's called on and replaces\
    \ the candidate `String` with the new `input`. This has the same effect as creating\
    \ a new `Matcher` object, except that it doesn't have the associated overhead.\
    \ This recycling can be a useful optimization, and it's one that I often use.\n\
    \n### `public int start()`\n\nThis method returns the index of the first character\
    \ of the candidate `String` matched. If there are no matches, or if no matches\
    \ have been attempted, an `IllegalStateException` is thrown.\n\n### `public int\
    \ start(int group)`\n\nThis method allows you to specify which subgroup within\
    \ a matching you're interested in and returns the index of the first character\
    \ in which that subgroup starts. If there are no matches, or if no matches have\
    \ been attempted, an `IllegalStateException` is thrown. If you refer to a group\
    \ number that doesn't exist, an `IndexOutOfBoundsException` is thrown.\n\n###\
    \ `public int end()`\n\nThe `end` method returns the ending index plus 1 of the\
    \ last successful match the `Matcher` object had. If no matches exist, or if no\
    \ matches have been attempted, this method throws an `IllegalStateException`.\n\
    \n### `public int end(int group)`\n\nLike the `start(int)` method, this method\
    \ allows you to specify which subgroup within a matching you're interested in,\
    \ except that it returns the last index of matching character sequence plus 1.\
    \ If no matches exist, or if no matches have been attempted, this method throws\
    \ an `IllegalStateException`. If you refer to a group number that doesn't exist,\
    \ an `IndexOutOfBoundsException` is thrown.\n\n### `public String group()`\n\n\
    The `group` method can be a powerful and convenient tool in the war against jumbled\
    \ code. It simply returns the substring of the candidate `String` that matches\
    \ the original regex pattern. The `group()` method throws an `IllegalStateException`\
    \ if the `find` method call wasn't successful. Similarly, it throws an `IllegalStateException`\
    \ if `find` has never been called at all.\n\n### `public String group(int group)`\n\
    \nThis method is a more powerful counterpart to the `group()` method. It allows\
    \ you to extract parts of a candidate string that match a subgroup within your\
    \ pattern.\n\nThe `group(int)` method throws an `IllegalStateException` if the\
    \ `find` method call wasn't successful. Similarly, it throws an `IllegalStateException`\
    \ if `find` has never been called at all. If called for a group number that doesn't\
    \ exist, it throws an `IndexOutOfBoundsException`.\n\n### `public int groupCount()`\n\
    \nThis method simply returns the number of groups that the `Pattern` defined.\
    \ There's a very important, and somewhat counterintuitive, subtlety to notice\
    \ about this method: It returns the number of possible groups based on the original\
    \ `Pattern`, without even considering the candidate `String`. Thus, it's not really\
    \ information about the `Matcher` object; instead, it's about the `Pattern` that\
    \ helped spawn it. This can be tricky, because the fact that this method lives\
    \ on the `Matcher` object could be interpreted as meaning that it's providing\
    \ feedback about the state of the `Matcher`. It isn't. It's telling you how many\
    \ matches are theoretically possible for the given `Pattern`.\n\n### `public boolean\
    \ matches()`\n\nThis method is designed to help you match a candidate `String`\
    \ against the matcher's `Pattern`. It returns `true` if, and only if, the candidate\
    \ `String` under consideration matches the pattern exactly."
