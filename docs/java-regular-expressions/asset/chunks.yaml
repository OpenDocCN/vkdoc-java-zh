  trans: "\n## 占有量词\n\n在理解了贪婪量词的背景后，*占有量词*相对容易理解。它们是 Java 独有的特性，不过随着时间的推移，其他正则表达式语言也可能会采用。简单来说，它们很贪婪，但绝不慷慨。在现有的贪婪量词后面加上一个加号（+）就构成了占有量词。因此，***\\\
    d+*** 变成了 ***\\d++***，***\\d{n,m}*** 变成了 ***\\d{n,m}+***，以此类推。\n\n考虑之前的例子，将模式\
    \ ***(\\w+)(\\d\\d)(\\w+)*** 应用于候选字符串 *X99SuperJava*。我之前已经说明，当正则表达式引擎遇到分组 ***(\\\
    w+)*** 时，会尝试匹配尽可能多的字符。我还说明过，如果释放这些匹配字符有助于后面的分组实现匹配，引擎会释放它们。\n\n然而，如果你不希望分组释放其匹配字符来帮助后面的分组匹配，那么你只需在最后一个表达式后面加上一个额外的加号，就可以使用占有量词。你构建模式\
    \ ***(\\w++)(\\d\\d)(\\w+)***——也就是说，你将 ***\\w+*** 变成了 ***\\w++***。\n\n当模式首次运行时，分组(1)，即\
    \ ***(\\w++)***，会消耗候选字符串 *X99SuperJava* 中的每一个字符。但是，由于第二个加号的存在，引擎拒绝释放任何匹配的字符来帮助后面的分组匹配。你会发现分组(1)匹配成功，而分组(2)和分组(3)匹配失败——整个正则表达式匹配失败。清单\
    \ 3-6 演示了这一点。\n\n清单 3-6：占有量词示例\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\n\
    \npublic class PossesiveExample{\n    public static void main(String args[]){\n\
    \        //定义模式\n        String regex = \"(\\\\w++)(\\\\d\\\\d)(\\\\w+)\";\n \
    \       //编译模式\n        Pattern pattern = Pattern.compile(regex);\n\n        //定义候选字符串\n\
    \        String candidate = \"X99SuperJava\";\n\n        //为候选字符串提取匹配器\n     \
    \   Matcher matcher = pattern.matcher(candidate);\n\n        if (matcher.find()){\n\
    \            System.out.println(\"GROUP 0:\" +\n            matcher.group(0));\n\
    \            System.out.println(\"GROUP 1:\" +\n            matcher.group(1));\n\
    \            System.out.println(\"GROUP 2:\" + matcher.group(2));\n          \
    \  System.out.println(\"GROUP 3:\" + matcher.group(3));\n        }\n        else{\n\
    \           System.out.println(\"NO MATCHES\" );\n        }\n\n        System.out.println(\"\
    Done\");\n    }\n} \n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n## 懒惰量词\n\n\
    与贪婪量词相对的另一个极端是*懒惰量词*，它们会尝试匹配尽可能少的字符。懒惰量词是通过在现有贪婪量词后面追加一个问号形成的。因此，***X+*** 变成了\
    \ ***X+?***，***X{n,m}*** 变成了 ***X{n,m}?***，以此类推。例如，对于模式 ***\\d+?*** 应用于候选字符串 *1234*，结果匹配的是\
    \ *1*，如清单 3-7 所示。\n\n清单 3-7：懒惰量词示例\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport\
    \ java.util.regex.*;\n\npublic class ReluctantExample{\n    public static void\
    \ main(String args[]){\n        //定义模式\n        String regex = \"(\\\\d+?)\";\n\
    \        //编译模式\n        Pattern pattern = Pattern.compile(regex);\n\n       \
    \ //定义候选字符串\n        String candidate = \"1234\";\n\n        //为候选字符串提取匹配器\n \
    \       Matcher matcher = pattern.matcher(candidate);\n\n        while (matcher.find()){\n\
    \            //每个数字匹配一次\n            //如果这不是一个懒惰量词的例子，\n            //它将只匹配一次，并且那次匹配\n\
    \            //将包含候选字符串 \"1234\" 中的每个数字。\n            System.out.println(matcher.group());\n\
    \n        }\n\n        System.out.println(\"Done\");\n    }\n} \n```\n\n| **![结束示例](img/_1.gif)**\
    \ |\n\n|  |\n\n每次运行 find() 时，它都会匹配尽可能少的字符，因为它*不情愿*去匹配。该模式恰好匹配了四次：每个数字一次。如果你在模式中没有使用懒惰量词，那么整个候选字符串只会匹配一次，即\
    \ *1234*，因为模式会是贪婪的，并匹配尽可能多的字符。\n\n## 理解环视\n\n在编程中，有时就像在生活中一样，你希望在做出更认真的努力之前先了解预期情况。例如，你可能想在去最喜欢的餐厅吃饭之前知道它是否营业。你会怎么做？当然，你会提前打个电话。同样的想法也用于正则表达式的环视。\n\
    \n环视有四种类型：正向先行断言、负向先行断言、正向后发断言和负向后发断言。以下各节将详细解释每一种。\n\n|  | 注意  | 环视是非捕获组，但它们从不消耗文本。因此，验证候选字符串中后续是否存在某个特定字符，并不意味着该字符已被正则表达式模式消耗掉。先行断言不匹配字符；它们匹配位置。\
    \ |\n"
- fmt: "### Positive Lookaheads\n\n`Positive lookaheads` allow your regex to \"peek\
    \ ahead\" and make sure that the pattern does, in fact, exist somewhere down the\
    \ line in your candidate string before the rest of the match is attempted. They\
    \ don't consume that text, however—they just confirm the truth of its existence.\
    \ They are, basically, a way to tell the regex engine \"Don't bother looking at\
    \ the candidate string if it doesn't have the lookahead.\" You form them by opening\
    \ the group with the characters `(?=`. For example, the lookahead\n\n```\n(?=\\\
    d\\d)\n```\n\nconfirms that the candidate string contains two digits in a row.\
    \ However, it doesn't consume those two digits. Combined with other regex patterns,\
    \ positive lookaheads can a very powerful weapon in your regex arsenal.\n\nSay\
    \ you want to match IP addresses, but only if they begin with `255`. Also, if\
    \ they do begin with `255`, you want the entire regex pattern. With lookaheads,\
    \ this issue is easily solved, as demonstrated in [Listing 3-8](#LiB0029.html#ch03list08).\
    \ Of course, this example assumes a great deal about the friendly nature of the\
    \ data. Even so, it does nicely illustrate the usage of lookaheads, so all is\
    \ forgiven. [Table 3-2](#LiB0029.html#ch03table02), which follows [Listing 3-8](#LiB0029.html#ch03list08),\
    \ deconstructs the regex pattern `(?=^255).*`.\n\n**Table 3-2: The Pattern `(?=^255).*`**\
    \ ^([[*](#LiB0029.html#ftn.N78)])\n\n| **Regex** | **Description** |\n| --- |\
    \ --- |\n| `(?=` | A positive lookahead consisting of |\n| `^` | The beginning\
    \ of line character followed by |\n| `2` | The character 2 followed by |\n| `5`\
    \ | The character 5 followed by |\n| `5` | The character 5 followed by |\n| `)`\
    \ | Close the lookahead group |\n| `.` | Any character |\n| `*` | Repeated zero\
    \ or more times |\n| ^([[*](#LiB0029.html#N78)])*In English:* Capture the entire\
    \ IP address if it starts with 255. |\n\n**Listing 3-8: Simple Positive Lookahead\
    \ Example**\n\n| **![Start example](_1.gif)** |\n\n```\nimport java.util.regex.*;\n\
    \npublic class PositiveLookaheadExample{\n    public static void main(String args[]){\n\
    \        //define the pattern\n        String regex = \"(?=^255).*\";\n\n    \
    \    //compile the pattern\n        Pattern pattern = Pattern.compile(regex);\n\
    \n        //define the candidate string\n        String candidate = \"255.0.0.1\"\
    ;\n\n        //extract a matcher for the candidate string\n        Matcher matcher\
    \ = pattern.matcher(candidate);\n\n        String ip =\"not found\";\n\n     \
    \   //if the candidate starts with 255, then the ip\n        //will be populated\
    \ with the correct information.\n        if (matcher.find())\n            ip=matcher.group();\n\
    \n        String msg =\"ip: \" + ip;\n\n        System.out.println(msg);\n   \
    \ }\n} \n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nIn [Listing 3-8](#LiB0029.html#ch03list08),\
    \ the regex engine first confirms that the candidate string starts with `255`\
    \ before attempting to execute the rest of the pattern. If the candidate String\
    \ doesn't do so, then the rest of the pattern can't possibly match and no resources\
    \ are wasted in attempting to do so.\n\nNotice that using a noncapturing group\
    \ `(?:=^255)` instead of `(?=^255)` to confirm the existence of `255` wouldn't\
    \ work, because `(?:=^255)` consumes the characters `255`, even though it doesn't\
    \ capture them, and returns the `.0.0.1` that follows them.\n\n### Negative Lookaheads\n\
    \n`Negative lookaheads`, like positive lookaheads, allow your regex to \"peek\
    \ ahead.\" However, they allow the engine to confirm that something does *not*\
    \ exist somewhere down the line in your candidate string. Like all lookaheads,\
    \ they don't consume text; they just confirm the truth of its absence. They're\
    \ formed by opening the group with the characters `(?!`. For example:\n\n```\n\
    (?!\\d\\d)\n```\n\nconfirms that the candidate String doesn't contain two digits\
    \ in a row. It doesn't consume those two digits.\n\nSay you're parsing text and\
    \ you want find reference to `John` and extract both the first name and the last\
    \ name, unless that reference happens to `John Smith`. With negative lookaheads,\
    \ this sort of exercise becomes very easy. [Listing 3-9](#LiB0029.html#ch03list09)\
    \ demonstrates the code for doing so. [Table 3-3](#LiB0029.html#ch03table03) deconstructs\
    \ the regex pattern used.\n\n**Table 3-3: The Pattern `John (?!Smith)[A-Z]\\w+`**\n\
    \n| **Regex** | **Description** |\n| --- | --- |\n| `J` | The character `J` followed\
    \ by |\n| `o` | The character `o` followed by |\n| `h` | The character `h` followed\
    \ by |\n| `n` | The character `n` followed by |\n| `<space>` | A space, followed\
    \ by |\n| `(?!` | A position in which you'll find anything but |\n| `S` | The\
    \ character `S` followed by |\n| `m` | The character `m` followed by |\n| `i`\
    \ | The character `i` followed by |\n| `t` | The character `t` followed by |\n\
    | `h` | The character `h` followed by |\n| `)` | Close the lookahead group, followed\
    \ by |\n| `[A-Z]` | Any uppercase character followed by |\n| `\\w` | A word character\
    \ |\n| `+` | Repeated one or more times followed by |\n| `\\w` | Any word character\
    \ |\n| `*` | Repeated zero or more times |\n| * **In English:** Find and capture\
    \ occurrences of `John` followed by some capitalized word, unless that word is\
    \ `Smith`. |\n\n**Listing 3-9: Simple Negative Lookahead Example**\n\n| **![Start\
    \ example](_1.gif)** |\n\n```\nimport java.util.regex.*;\npublic class NegativeLookaheadExample{\n\
    \    public static void main(String args[])\n    throws Exception\n    {\n   \
    \     //define the pattern\n        String regex = \"John (?!Smith)[A-Z]\\\\w+\"\
    ;\n\n        //compile the pattern\n        Pattern pattern = Pattern.compile(regex);\n\
    \n        String candidate = \"I think that John Smith \";\n        candidate\
    \ +=\"is a fictional character. His real name \";\n        candidate +=\"might\
    \ be John Jackson, John Westling, \";\n        candidate +=\"or John Holmes for\
    \ all we know.\";\n\n        //extract a matcher for the candidate string\n  \
    \      Matcher matcher = pattern.matcher(candidate);\n\n        String tmp=null;\n\
    \n        //extract the matching group. Notice that it's\n        //the default\
    \ group, since lookarounds are\n        //noncapturing\n        while (matcher.find()){\n\
    \            tmp=matcher.group();\n            System.out.println(\"MATCH:\" +\
    \ tmp);\n        }\n    }\n} \n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\
    \nIn [Listing 3-9](#LiB0029.html#ch03list09), the regex engine first parses the\
    \ candidate and considers successful matches to be those that consist of `John`\
    \ when it's followed by some capitalized word, unless that capitalized word is\
    \ `Smith`. Again, it's important to notice that using a noncapturing group allows\
    \ you to capture the entire match, because it hasn't been consumed."
