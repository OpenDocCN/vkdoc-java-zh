  trans: "\n#### 条件字符串分割示例\n\n当你有更完整的字符串解析需求时，正则表达式会变得特别有用。当字符串格式定义良好时，例如逗号分隔的文件，分割字符串是很容易的。你不需要为此使用正则表达式；一个\
    \ `StringTokenizer` 就足够了。但是，如果你想根据某个单词或其任何同义词来分割字符串呢？\n\n正则表达式在这类场景中会很有帮助，因为它们允许你限定复杂条件来实现分割。清单\
    \ 1-12 根据单词 *compromise* 或其同义词的出现位置来分割给定的短语。输出 1-12 显示了运行该程序的结果。\n\n清单 1-12: Split.java\n\
    \n| **![开始示例](img/_1.gif)** |\n\n```\npublic class Split{\n   public static void\
    \ main(String args[]){\n\n      String statement = \"I will not compromise. I\
    \ will not \"+\n      \"cooperate. There will be no concession, no conciliation,\
    \ no \"+\n      \"finding the middle group, and no give and take.\";\n\n     \
    \ String tokens[] =null;\n\n      String splitPattern= \"compromise|cooperate|concession|\"\
    +\n      \"conciliation|(finding the middle group)|(give and take)\";\n\n    \
    \  tokens=statement.split(splitPattern);\n\n      System.out.println(\"REGEX PATTERN:\\\
    n\"+splitPattern + \"\\n\");\n\n      System.out.println(\"STATEMENT:\\n\"+statement\
    \ + \"\\n\");\n      System.out.println(\"\\nTOKENS\");\n      for (int i=0; i\
    \ < tokens.length; i++){\n      System.out.println(tokens[i]);\n      }\n   }\n\
    } \n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n输出 1-12: 运行 Split.java 的结果\n\
    \n| **![开始示例](img/_1.gif)** |\n\n```\nC:\\RegEx\\Examples\\chapter1>java Split\n\
    REGEX PATTERN:\ncompromise|cooperate|concession|conciliation|(finding the middle\
    \ group)|(give\nand take)\n\nSTATEMENT:\nI will not compromise. I will not cooperate.\
    \ There will be no\nconcession, no conciliation,\n no finding the middle group,\
    \ and no give and take.\n\nTOKENS:\nI will not\n. I will not\n. There will be\
    \ no\n, no\n, no\n, and no\n.\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n\
    这个示例说明了作为标准 Java 实现一部分而存在的新可能性。我将在第 3 章和第 4 章中讨论更复杂的分割。\n\n## 比较正则表达式与 Perl\n\n\
    Perl 可能是提供正则表达式支持的最流行的语言。因此，通过将其与 Perl 进行比较来理解 Java 的正则表达式支持是合理的。你应该注意的区别将在以下各节中重点介绍。总的来说，J2SE\
    \ 不包含某些 Perl 结构，因为 Java 是一种功能齐全的编程语言，提供了复杂的条件和逻辑执行路径，这些是 Perl 所提供结构的合理替代方案。\n\n\
    ### Perl 提供而 Java 正则表达式不支持的功能\n\n有几个你可能从 Perl 经验中熟悉的结构和概念，在当前的 Java 实现中无法使用。因为这些是\
    \ Perl 的一部分，而不是 Java 的，我在这里只简要提及。\n\nJava 不支持正则表达式字符串修改。这意味着你不能使用正则表达式修改字符串。在\
    \ Java 中，字符串是不可变对象，因此你必须使用返回带有你所需修改的新字符串的方法。此外，你必须手动修改字符串，而不是使用正则表达式模式来这样做。前面的搜索和替换示例展示了这是如何工作的。原始字符串不会被修改——它只是返回一个表示修改后的新字符串。\n\
    \nPerl 的条件结构 ***(?{X})*** 和 ***(?(condition)X|Y)*** 不被 J2SE 的正则表达式支持。因为 Java 作为语言特性提供了强大的\
    \ if-then-else 支持，所以不需要条件结构。第 4 章提供了这是如何工作的示例。\n\nJava 不支持嵌入式代码结构 ***(?(code))***\
    \ 和 ***(??(code))***。同样，这些是可以通过 Java 标准更直观地处理的事情，通过使用 Java 的内置语言特性。\n\nJava 默认不支持嵌入式注释，因为当你将模式创建为字符串时，可以很容易地对其进行注释。但是，如果你确实需要，可以使用\
    \ `Pattern.COMMENT` 标志来编译带有注释的正则表达式。更多信息，请参见第 2 章。\n\nJava 不支持预处理操作 ***\\l \\\
    u***、***\\L*** 和 ***\\U***。\n\n### Java 正则表达式提供而 Perl 不支持的功能\n\n占有量词是 Java 独有的，但它们很可能会很快被其他正则表达式实现所采用，因为它们是一个非常好的想法。占有量词会继续保留任何符合条件的贪婪匹配。这意味着一旦实现了占有匹配，它就不会被放弃。我将在第\
    \ 3 章中深入讨论占有量词。\n\n## 总结\n\n本章涵盖了一些通用的正则表达式语法，并介绍了 Matcher 和 Pattern 类的概念。你学习了一些创建自己正则表达式的方法，以及如何在\
    \ Java 中实际使用它们。最后，你探索了一些具体的示例并理解了它们的工作原理。第 2 章将继续围绕这个主题展开，并让你更深入地理解 Java 的正则表达式包。\n"
- fmt: "## FAQs\n\n| **Q:** | **The `\\b` metacharacter seems to act inconsistently\
    \ in regular expressions as I write them. What's going on?** |\n| **Q:** | **When\
    \ should I use the `String.matches` method instead of the `Pattern` and `Matcher`\
    \ objects directly?** |\n| **Q:** | **Is using the `String.matches` method less\
    \ resource-intensive than using the `Pattern` and `Matcher` objects?** |\n| **Q:**\
    \ | **Can I modify a `String` by applying a regular expression to it?** |\n| **Q:**\
    \ | **Why did the pattern `(\\p{Upper}(\\p{Lower}+\\s?)){2,3}` match `John McGee`\
    \ in the `NameFormat.java` example?** |\n| **Q:** | **What type of regex engine\
    \ does Java use?** |\n\n## Answers\n\n| **A:** | In regex, `\\b` means a word\
    \ boundary. However, in general Java vernacular, `\\b` means a backspace. Here's\
    \ the rule: The literal String `\\b` means a backspace character. However, the\
    \ literal String `\\\\b` means a word boundary. |\n| **A:** | Use the `String.matches`\
    \ method if you require an exact match. For example, if you want exactly seven\
    \ consecutive digits and nothing else is acceptable, then use `String.matches`\
    \ with the pattern `\\d{7}`. In general, if you're prepared to narrow the definition\
    \ of acceptable patterns, or if you're willing to define every possible variation,\
    \ then use the `String.matches` method. On the other hand, if you're looking for\
    \ the existence of substring, you're better served by the `Pattern` and `Matcher`\
    \ objects. |\n| **A:** | No. The `String.matches` method simply calls the `Pattern.matches`\
    \ method, which in turn creates and uses both a `Pattern` object and a `Matcher`\
    \ object. |\n| **A:** | Absolutely not. `String`s are immutable objects in Java,\
    \ and thus they cannot be changed. However, you can create a new `String` object\
    \ that has the requested changes. Thus, if you have `String tmp = \"Hello\";`\
    \ and you want to change the `e` to a `X` by doing the following: `String newTmp\
    \ = tmp.replaceFirst(\"e\",\"X\");` the value of `tmp` is still `Hello`, but the\
    \ value of `newTmp` is `HXllo`. |\n| **A:** | Because `John` meets the first part\
    \ of the pattern, `Mc` meets the second part of the pattern, and `Gee` meets the\
    \ second part of the pattern. As a test, try running `John Janis McGee` through\
    \ the `NameFormat.java` program. The point here is that `John` consists of an\
    \ uppercase letter, followed by one or more lowercase letters, followed by one\
    \ space. `Mc` consists of an uppercase letter, followed by one or more lowercase\
    \ letters, followed by no space, and `Gee` consists of an uppercase letter, followed\
    \ by one or more lowercase letters, followed by no space. This isn't exactly what\
    \ you may have had in mind, but it seems permissible in this case. It's very important\
    \ to be precise and do a lot of testing when working with regular expressions,\
    \ or unexpected results are sure to follow. |\n| **A:** | J2SE uses a traditional\
    \ nondeterministic finite automaton (NFA) engine. This means that when the engine\
    \ reaches a fork in the road, it chooses one path, remembers where the other path\
    \ is in case things don't work out, and goes from there. The advantage here is\
    \ that you could be leading the engine to a match very, very quickly if you write\
    \ efficient expressions. The disadvantage is that you could be leading the regex\
    \ engine on a wild goose chase before it finally gets the match by writing inefficient\
    \ expressions. |\n\n# Chapter 2: Introduction to the `java.util.regex` Object\
    \ Model\n\n## Overview\n\n> *\"How do you eat an elephant? One bite at a time.\"\
    *\n> \n> — Proverb\n\nJava's new `java.util.regex` package offers an elegant and\
    \ agile object model with which to meet regular expression needs. It is composed,\
    \ in its entirety, of three objects: the `Pattern` object, the `Matcher` object,\
    \ and a `PatternSyntaxException`. This chapter details all of the methods and\
    \ fields of the `Pattern` and `Matcher` classes, and provides examples of their\
    \ use. In this chapter I also discuss the new regular expression supportive methods\
    \ retrofitted into the `String` class.\n\nThe chapter starts with an examination\
    \ of the `Pattern` class. I cover every method and field and often provide examples.\
    \ I also explore the `Matcher` class in similar detail. Finally, I round out the\
    \ chapter by discussing the regex methods that have been added to the `String`\
    \ class."
