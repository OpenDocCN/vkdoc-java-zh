- fmt: "### Simple Class Example\n\nLet's step through some simple examples. The pattern\
    \ `[0-5]` will match any part of the input that contains a digit between `0` and\
    \ `5`. Thus, it will match on `0`, `1`, `2`, `3`, `4`, or `5`. It won't match\
    \ `8`, `6`, or any nondigit characters. [Table 1-13](#LiB0008.html#ch01table13)\
    \ dissects the pattern.\n\nTable 1-13: The Pattern `[0-5]`\n\n| **Regex** | **Description**\
    \ |\n| --- | --- |\n| `[` | A class consisting of |\n| `0` | The digit 0 |\n|\
    \ `-` | Ranging through |\n| `5` | The digit 5 |\n| `]` | Close class |\n| * **In\
    \ English:** Look for any digit ranging from `0` to `5`, including `0` and `5`.\
    \ |\n\n### Negation Example\n\nThe pattern `[^A]` will match any character except\
    \ the character `A`. This includes other characters, spaces, tabs, punctuation,\
    \ and so on. It's important to notice that the `^` delimiter only has a not meaning\
    \ when inside a class bracket—that is, inside the `[` and `]` brackets. Outside\
    \ those brackets, it stands for the beginning of the line character. I cover this\
    \ topic in more detail later. [Table 1-14](#LiB0008.html#ch01table14) dissects\
    \ the pattern.\n\nTable 1-14: The Pattern `[^A]`\n\n| **Regex** | **Description**\
    \ |\n| --- | --- |\n| `[` | A class consisting of |\n| `^` | Any character except\
    \ |\n| `A` | The character `A` |\n| `]` | Close class |\n| * **In English:** Look\
    \ for any character except the capital letter `A` |\n\n### Groups\n\nA group is\
    \ a submatch. If you're familiar with SQL, it might be helpful to think of groups\
    \ as the SQL equivalent of a subquery. Groups allow you to define parts of your\
    \ pattern as logical subunits of the whole and then refer to the results of those\
    \ subunits. Their syntax follows in [Table 1-15](#LiB0008.html#ch01table15).\n\
    \nTable 1-15: Groups\n\n| **Regex** | **Description** |\n| --- | --- |\n| `(`\
    \ | A group consisting of |\n| `…` | Any regex pattern |\n| `)` | Close group\
    \ |\n\n### Groups Example\n\nAs with most things, an example can be more illuminating\
    \ than a description. Consider the pattern `(\\w+)_(\\w+)@(\\w+)\\.org` to match\
    \ e-mail patterns. [Table 1-16](#LiB0008.html#ch01table16) dissects this pattern.\n\
    \nTable 1-16: The Pattern `(\\w+)_(\\w+)@(\\w+)\\.org`\n\n| **Regex** | **Description**\
    \ |\n| --- | --- |\n| `(` | A group consisting of |\n| `\\w` | An alphanumeric\
    \ or underscore character |\n| `+` | Repeated one or more times |\n| `)` | Close\
    \ group |\n| `_` | Followed by an underscore character |\n| `(` | A group consisting\
    \ of |\n| `\\w` | One alphanumeric or underscore character |\n| `+` | Followed\
    \ by one or more alphanumeric characters |\n| `)` | Close group |\n| `@` | Followed\
    \ by an at character |\n| `(` | A group consisting of |\n| `\\w` | One alphanumeric\
    \ or underscore character |\n| `+` | Followed by one or more alphanumeric or underscore\
    \ characters |\n| `)` | Close group |\n| `\\.` | Followed by the period character\
    \ |\n| `o` | Followed by the character `o` |\n| `r` | Followed by the character\
    \ `r` |\n| `g` | Followed by the character `g` |\n| * **In English:** Look for\
    \ a group of alphanumeric characters, followed by `_`, followed by a group of\
    \ alphanumeric characters, followed by `@`, followed by a group of alphanumeric\
    \ characters, followed by `.org`. |\n\n## Integrating Java with Regular Expressions\n\
    \nThus far, you've worked almost exclusively with regular expressions, but not\
    \ really with Java. Now it's time to consider how the two interact. The following\
    \ examples differ from the preceding ones in that they incorporate Java code with\
    \ regular expressions. They offer a more complete picture of how you can use some\
    \ J2SE regex syntax.\n\nSome of the regular expressions you'll see here are slightly\
    \ more advanced than in the examples you've seen previously, as they build on\
    \ the fundamentals discussed thus far in the chapter. For example, [Listing 1-2](#LiB0009.html#ch01list02)\
    \ combines groups with quantifiers.\n\nListing 1-2: MatchPhoneNumber.java\n\n\
    | **![Start example](_1.gif)** |\n\n```\nimport java.util.regex.*;\npublic class\
    \ MatchPhoneNumber{\n   public static void main(String args[]){\n      isPhoneValid(args[0]);\n\
    \   }\n\n   /**\n   * Confirms that the format for the given phone number is valid.\n\
    \   * @param phone is a String representing the phone number.\n   * @returns true\
    \ if the phone number format is acceptable.\n   */\n   public static boolean isPhoneValid(String\
    \ phone){\n      boolean retval=false;\n\n      String phoneNumberPattern =\n\
    \        \"(\\\\d-)?(\\\\d{3}-)?\\\\d{3}-\\\\d{4}\";\n\n      retval= phone.matches(phoneNumberPattern);\n\
    \n      //prepare a message indicating success or failure\n      String msg =\
    \ \"   NO MATCH: pattern:\" + phone\n             + \"\\r\\n             regex:\
    \ \" + phoneNumberPattern;\n\n      if (retval){\n      msg = \"   MATCH   : pattern:\"\
    \ + phone\n          + \"\\r\\n             regex: \" + phoneNumberPattern;\n\
    \      }\n\n      System.out.println(msg +\"\\r\\n\");\n      return retval;\n\
    \   }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nDon't be discouraged\
    \ if the patterns themselves aren't completely clear to you right now. An intuitive\
    \ understanding will develop as you continue to read this book. Focus on the concepts\
    \ and become comfortable with how the Java code and the regex complement each\
    \ other.\n\nThere are only two pieces of information you need to take full advantage\
    \ of the following examples:\n\n*   Any `\\`-delimited regex expression metacharacter\
    \ needs to be delimited once again when it's used in Java code. Thus, `\\d` becomes\
    \ `\\\\d` and `\\s` becomes `\\\\s` in your Java code. Correspondingly, a more\
    \ complex expression such as `(\\d-)?(\\d{3}-)?\\d{3}-\\d{4}\\s` becomes `(\\\\\
    d-)?(\\\\d{3}-)?\\\\d{3}-\\\\d{4}\\\\s` in Java code. All `\\` characters are\
    \ doubled to produce `\\\\` when they're used in a `String` object.\n\n*   In\
    \ this book, when I talk about a regular expression in and of itself, I don't\
    \ use the double delimiting mechanism. However, I do when working with specific\
    \ coding examples.\n\n*   The `String.matches(String regex)` method is a new method\
    \ that has been added to the `String` class. It compares the `String` it's called\
    \ on to the given regular expression, `regex`, and returns `true` if the regex\
    \ pattern matches the `String` *exactly*. To match exactly means that the `String`\
    \ in question can't contain any characters—not even invisible characters such\
    \ as newlines and spaces—that aren't accounted for in the regex pattern."
