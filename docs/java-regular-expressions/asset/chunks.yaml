    # 附录 A：正则表达式参考


    本附录为日常 Java 正则表达式需求提供了全面的快速参考。附录中的内容以纯正则表达式模式呈现，而非 Java 字符串转义后的形式。例如，在指代数字时，此处使用
    ***\d***，而非 ***\\d***。


    表 A-1：常用字符


    | **正则表达式** | **描述** | **备注** |

    | --- | --- | --- |

    | **q** | 字符 *q* | 可以是任意字符，不包括特殊正则字符或标点符号。 |

    | **\\** | 反斜杠（*/*）字符 | ***\*** 用于界定特殊正则字符，反斜杠本身也是其中之一。 |

    | **\t** | 制表符 |   |

    | **\n** | 换行符 |   |

    | **\r** | 回车符 |   |

    | **\f** | 换页符 |   |


    表 A-2：预定义字符类


    | **正则表达式** | **描述** | **备注** |

    | --- | --- | --- |

    | . | 任意单个字符 | 匹配任意单个字符，包括空格、标点、字母或数字。根据操作系统或正则模式中是否启用了 DOTALL 标志，它可能匹配也可能不匹配行终止符。因此，在需要移植代码时，最好在模式中显式设置或关闭
    DOTALL 支持。 |

    | **\d** | 0 到 9 之间的任意单个数字 |   |

    | **\D** | 匹配除单个数字之外的任意字符 | 默认情况下，不匹配行终止符。 |

    | **\s** | 空白字符：***[ \t\n\x0B\f\r]*** | 匹配制表符、空格、行尾符、回车符、换页符和换行符。 |

    | **\S** | 非空白字符 | 匹配任何非空白字符，如上所述。因此，*7* 会被匹配，标点符号也会被匹配。 |

    | **\w** | 单词字符：***[a-zA-Z_0-9]*** | 任意大写或小写字母、数字或下划线字符。 |

    | **\W** | 非单词字符；***\w*** 的相反项 | 任何非单词字符，如上所述。因此，减号会被匹配，空格也会被匹配。它不会匹配行尾的 ***$***
    或行首的 ***^*** 字符。 |


    表 A-3：字符类


    | **正则表达式** | **描述** | **备注** |

    | --- | --- | --- |

