    */\npublic static void main(String args[]){\n    String logFile = \"server.log\"\
    ;\n    if (args != null && args.length == 1){\n        logFile = args[0];\n  \
    \  }\n    examineLog(logFile);\n\n}\n\n/**\n* parses the log, and identifies all\
    \ of the\n* exceptions thrown, as well as the frequency with which\n* they occurred.\n\
    *\n* @param logFile the name of the log file to examine.\n* @param regexCacheFile\
    \ the name of the file containing\n* the regex cache.\n* @param regexKey the name\
    \ of the file containing the\n* key in the regecCacheFile.\n* @return a Map containing\
    \ the names of the exceptions\n* found as keys, and their frequency as values\n\
    */\npublic static Map examineLog(\n    String logFile,\n    String regexCacheFile,\n\
    \    String regexKey){\n     //create a map that will preserve the order of the\n\
    \    //exceptions as they occur\n    Map retval = new LinkedHashMap();\n\n//extract\
    \ the regex\n    String regex =getRegex(regexCacheFile,regexKey);\n\n//get the\
    \ contents of the log file\n    String fileContent = readFile(logFile);\n\n//compile\
    \ the pattern, and mark the time\n    //for its execution\n    Pattern pattern\
    \ =\n       Pattern.compile(regex, Pattern.MULTILINE);\n\nlong startTime = System.currentTimeMillis()\
    \ ;\n    Matcher matcher = pattern.matcher(fileContent);\n```"
  raw: "## Compile Your Patterns as You Need To\n\nMake a point of compiling your\
    \ Patterns on a just-in-time basis if there's a chance you won't need them. That\
    \ is, don't compile a Pattern object until the time you actually need it, *if*\
    \ you actually need it. This is especially true in a logically branching method,\
    \ in which there might not be any need to even use a Pattern. Better yet, *look*\
    \ for opportunities to conditionally compile your patterns.\n\nFor example, say\
    \ you're parsing log entries in your log Handler, because you want to send out\
    \ an emergency e-mail if any of the entries contain an Exception. Of course, you\
    \ could compile the pattern ***(.*Exception)*** and check it against every String\
    \ that's logged. However, this is probably overkill, because you don't, of course,\
    \ expect any exceptions in your code. It's probably a better idea to simply do\
    \ a String.indexOf for the substring *Exception* and only try the extraction process\
    \ if the index is positive. This is demonstrated in [Listing 4-9](#LiB0037.html#ch04list09).\n\
    \nListing 4-9: Log Handler That Checks for Exceptions\n\n| **![Start example](_1.gif)**\
    \ |\n\n```\nimport java.util.logging.*;\nimport java.util.regex.*;\n/**\n * Listens\
    \ for exceptions in the log entries\n * @author M Habibi\n */\npublic class ExceptionHandler\
    \ extends StreamHandler{\n\n    /**\n    * examines the record being logged, and\
    \ checks to see if\n    * it contains an exception\n    * @param record the LogRecord\
    \ about to be logged\n    */\n    public void publish(LogRecord record){\n   \
    \     //extract the message\n        String msg = record.getMessage();\n\n   \
    \     //check to see if the message contains an exception\n        int exceptionIndex\
    \ = msg.indexOf(\"Exception\");\n\n        //if the message didn't contains the\
    \ String\n        //'Exception', then don't bother compiling the regex\n     \
    \   if (exceptionIndex > -1){\n\n            Pattern pattern =\n             \
    \ Pattern.compile(\"(.*Exception.*)\");\n\n            Matcher matcher = pattern.matcher(msg);\n\
    \n            if (matcher != null && matcher.find()){\n                String\
    \ err = \"EXCEPTION FOUND \" + matcher.group(1);\n               System.out.println(err);\n\
    \               //put emailer here\n            }\n        }\n    }\n} \n```\n\
    \n| **![End example](_1.gif)** |\n\n|  |\n\nThis isn't particularly clever code,\
    \ but it does a good job of cultivating those suspects that require further investigation\
    \ and those that can't possibly be candidates. The principle here, of course,\
    \ is intelligent discrimination. If you're able to rule out impossible candidates,\
    \ then you'll save time and resources in production. [Listing 4-10](#LiB0037.html#ch04list10)\
    \ shows the test harness.\n\nListing 4-10: Adding the Log Handler to Your Log\n\
    \n| **![Start example](_1.gif)** |\n\n```\nimport java.util.logging.*;\n\n/**\n\
    * Demonstrates the usage of the log listener\n*/\npublic class LogDemo{\n    public\
    \ static void main(String args[]){\n        Logger log = Logger.global;\n    \
    \    setLoggerhandler(log);\n\n        //test the code. Do even finest-grade entries\
    \ get\n        //logged?\n        log.finest(new Exception().toString());\n  \
    \  }\n\n    /**\n    * Sets a logger handler for the given log.\n    * @param\
    \ log the logger that needs an listener\n    * @version 1.0 5/12/2002\n    */\n\
    \    public static void setLoggerhandler(Logger logger){\n        Handler handler\
    \ = new ExceptionHandler();\n        logger.addHandler(handler);\n\n        //set\
    \ to handle all errors, so that it will examine\n        //all errors.\n     \
    \   logger.setLevel(Level.ALL);\n}} \n```\n\n| **![End example](_1.gif)** |\n\n\
    |  |\n\n|  | Note  | You'll notice that this code doesn't deal with the Logger.throwing\
    \ method, and it doesn't actually send out an e-mail. Don't worry, code that does\
    \ is provided at [http://www.influxs.com](http://www.influxs.com). However, the\
    \ implementation here would require explanations that are beyond the scope of\
    \ regular expressions. |\n\n## Don't Limit Yourself to a Regex Solution\n\nWhen\
    \ you have a hammer, everything starts to look like a nail. It's important to\
    \ be aware that not all text-parsing problems require a regex solution. For example,\
    \ say you need to break a comma-delimited String into its various components.\
    \ Of course, it's easy enough to write a regex that does this. However, you don't\
    \ need regular expressions for this problem; the StringTokenizer is enough.\n\n\
    Along the same lines, you don't have to limit yourself exclusively to a regex\
    \ or a traditional Java solution; you can mix and match. For example, say you\
    \ need to parse a log file and identify the type and frequency of the Exceptions\
    \ in it. You could probably write a regex that does this for you in a single line—I'm\
    \ not smart or patient enough to do this, but there are probably plenty of people\
    \ who are.\n\nHowever, I would contend that this probably isn't the correct approach\
    \ in Java. By the time you're done writing, testing, and documenting the regex,\
    \ the other programmers on your team will be trembling in fear at the thought\
    \ of maintaining your code. It's probably easier to take a programmatic solution\
    \ that takes advantage of regular expressions, as opposed to writing a pure regex\
    \ solution. Such a solution is presented in [Listing 4-9](#LiB0037.html#438).\n\
    \nThe code in [Listing 4-11](#LiB0038.html#ch04list11) is self-sufficient and\
    \ should be ready to go as is. However, it requires two small accommodations.\
    \ First, you'll have to define a regexCache.txt file to hold your regex pattern,\
    \ as discussed previously for [Listing 4-7](#LiB0036.html#431). Second, you'll\
    \ have to define a regex entry in that file for the key *exRegex*. The value of\
    \ the entry should be \\***s([a-zA-Z.]*\\.[a-zA-Z.]*Exception)***. Then, to run\
    \ the code, you simply have to point to a log file that contains exceptions.\n\
    \nListing 4-11: The Log Parser\n\n| **![Start example](_1.gif)** |\n\n```\nimport\
    \ java.util.regex.*;\nimport java.util.*;\nimport java.io.*;\nimport java.nio.*;\n\
    import java.nio.channels.*;\nimport java.beans.*;\n\n/**\n* This class parses\
    \ the log, and identifies all of the\n* exceptions thrown, as well as the frequency\
    \ with which\n* they occurred.\n*\n*@ author M Habibi\n*/\npublic class LogParser{\n\
    /**\n* the key of the regex that applies the exception\n* pattern\n*/\npublic\
    \ static final String REGEX_KEY=\"exRegex\";\n\n/**\n* The name of the file that\
    \ contains the regex keys.\n* This should probably be extracted from a properties\
    \ file,\n* but we'll leave it as is for right now.\n*/\npublic static final String\
    \ REGEX_KEY_FILE=\"regexCache.txt\";\n\n/**\n* Runs the program from the command\
    \ line.\n* @param args[]. If the name of the log file\n* is passed in, then it\
    \ is used. Otherwise,\n* the code looks for a file name 'server.log'\n*/\npublic\
    \ static void main(String args[]){\n    String logFile = \"server.log\";\n   \
    \ if (args != null && args.length == 1){\n        logFile = args[0];\n    }\n\
    \    examineLog(logFile);\n\n}\n\n/**\n* parses the log, and identifies all of\
    \ the\n* exceptions thrown, as well as the frequency with which\n* they occurred.\n\
    *\n* @param logFile the name of the log file to examine.\n* @param regexCacheFile\
    \ the name of the file containing\n* the regex cache.\n* @param regexKey the name\
    \ of the file containing the\n* key in the regecCacheFile.\n* @return a Map containing\
    \ the names of the exceptions\n* found as keys, and their frequency as values\n\
    */\npublic static Map examineLog(\n    String logFile,\n    String regexCacheFile,\n\
    \    String regexKey){\n     //create a map that will preserve the order of the\n\
    \    //exceptions as they occur\n    Map retval = new LinkedHashMap();\n\n//extract\
    \ the regex\n    String regex =getRegex(regexCacheFile,regexKey);\n\n//get the\
    \ contents of the log file\n    String fileContent = readFile(logFile);\n\n//compile\
    \ the pattern, and mark the time\n    //for its execution\n    Pattern pattern\
    \ =\n       Pattern.compile(regex, Pattern.MULTILINE);\n\nlong startTime = System.currentTimeMillis()\
    \ ;\n    Matcher matcher = pattern.matcher(fileContent);"
  trans: "\n## 按需编译你的正则表达式\n\n如果有可能用不到你的正则表达式，请务必坚持按需编译。也就是说，*如果*你确实需要用到`Pattern`对象，才去编译它。这在逻辑分支方法中尤其重要，因为可能根本不需要使用`Pattern`。更好的做法是，*寻找*条件编译正则表达式的机会。\n\
    \n例如，假设你正在日志处理器中解析日志条目，因为如果任何条目包含异常，你需要发送紧急邮件。当然，你可以编译模式***(.*Exception)***并对照每条记录的字符串进行检查。然而，这可能是过度设计，因为你当然不希望代码中出现任何异常。更好的做法是简单地使用`String.indexOf`查找子字符串*Exception*，并且仅在索引为正数时才尝试提取过程。这在清单\
    \ 4-9 中进行了演示。\n\n清单 4-9：检查异常的日志处理器\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport\
    \ java.util.logging.*;\nimport java.util.regex.*;\n/**\n * 监听日志条目中的异常\n * @author\
    \ M Habibi\n */\npublic class ExceptionHandler extends StreamHandler{\n\n    /**\n\
    \    * 检查正在记录的日志记录，并查看是否包含异常\n    * @param record 即将记录的 LogRecord\n    */\n  \
    \  public void publish(LogRecord record){\n        //提取消息\n        String msg\
    \ = record.getMessage();\n\n        //检查消息是否包含异常\n        int exceptionIndex =\
    \ msg.indexOf(\"Exception\");\n\n        //如果消息不包含字符串\n        //'Exception'，则无需编译正则表达式\n\
    \        if (exceptionIndex > -1){\n\n            Pattern pattern =\n        \
    \      Pattern.compile(\"(.*Exception.*)\");\n\n            Matcher matcher =\
    \ pattern.matcher(msg);\n\n            if (matcher != null && matcher.find()){\n\
    \                String err = \"EXCEPTION FOUND \" + matcher.group(1);\n     \
    \          System.out.println(err);\n               //在此处放置邮件发送代码\n          \
    \  }\n        }\n    }\n} \n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n这段代码算不上特别巧妙，但它很好地筛选出了需要进一步调查的嫌疑对象，以及那些根本不可能是候选对象的条目。这里的原理当然是智能判别。如果你能排除不可能的候选对象，那么在生产环境中就能节省时间和资源。清单\
    \ 4-10 展示了测试工具。\n\n清单 4-10：将日志处理器添加到你的日志中\n\n| **![开始示例](img/_1.gif)** |\n\n```\n\
    import java.util.logging.*;\n\n/**\n* 演示日志监听器的用法\n*/\npublic class LogDemo{\n\
    \    public static void main(String args[]){\n        Logger log = Logger.global;\n\
    \        setLoggerhandler(log);\n\n        //测试代码。即使是最高精细级别的条目也会被记录吗？\n      \
    \  log.finest(new Exception().toString());\n    }\n\n    /**\n    * 为给定的日志设置日志处理器。\n\
    \    * @param log 需要监听器的日志记录器\n    * @version 1.0 5/12/2002\n    */\n    public\
    \ static void setLoggerhandler(Logger logger){\n        Handler handler = new\
    \ ExceptionHandler();\n        logger.addHandler(handler);\n\n        //设置为处理所有错误，以便检查所有错误。\n\
    \        logger.setLevel(Level.ALL);\n}} \n```\n\n| **![结束示例](img/_1.gif)** |\n\
    \n|  |\n\n|  | 注意  | 你会注意到这段代码没有处理`Logger.throwing`方法，也没有实际发送邮件。别担心，实现这些功能的代码可以在[`www.influxs.com`](http://www.influxs.com)找到。然而，这里的实现需要超出正则表达式范围的解释。\
    \ |\n\n## 不要局限于正则表达式解决方案\n\n当你手里拿着锤子，看什么都像钉子。重要的是要意识到，并非所有文本解析问题都需要正则表达式解决方案。例如，假设你需要将一个逗号分隔的字符串分解成各个组成部分。当然，编写一个正则表达式很容易做到这一点。但是，你不需要为正则表达式来解决这个问题；`StringTokenizer`就足够了。\n\
    \n同理，你不必将自己局限于正则表达式或传统的 Java 解决方案；你可以混合搭配。例如，假设你需要解析一个日志文件，并识别其中异常的类型和频率。你也许可以编写一个正则表达式，用一行代码就完成这个任务——我没有这么聪明或耐心，但可能有很多人能做到。\n\
    \n然而，我认为在 Java 中这可能不是正确的方法。当你完成正则表达式的编写、测试和文档记录时，你团队中的其他程序员可能会因为要维护你的代码而瑟瑟发抖。采用利用正则表达式的程序化解决方案，而不是编写纯正则表达式解决方案，可能会更容易。清单\
    \ 4-9 中给出了这样一个解决方案。\n\n清单 4-11 中的代码是自包含的，应该可以直接使用。但是，它需要两个小的调整。首先，你需要定义一个`regexCache.txt`文件来保存你的正则表达式模式，如前文清单\
    \ 4-7 所述。其次，你需要在该文件中为键*exRegex*定义一个正则表达式条目。该条目的值应为\\***s([a-zA-Z.]*\\.[a-zA-Z.]*Exception)***。然后，要运行代码，你只需指向一个包含异常的日志文件即可。\n\
    \n清单 4-11：日志解析器\n\n| **![开始示例](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\n\
    import java.util.*;\nimport java.io.*;\nimport java.nio.*;\nimport java.nio.channels.*;\n\
    import java.beans.*;\n\n/**\n* 此类解析日志，并识别所有抛出的异常及其发生频率。\n*\n*@ author M Habibi\n\
    */\npublic class LogParser{\n/**\n* 应用异常模式的正则表达式的键\n*/\npublic static final String\
    \ REGEX_KEY=\"exRegex\";\n\n/**\n* 包含正则表达式键的文件名。\n* 这应该从属性文件中提取，\n* 但我们暂时保持现状。\n\
    */\npublic static final String REGEX_KEY_FILE=\"regexCache.txt\";\n\n/**\n* 从命令行运行程序。\n\
    * @param args[]. 如果传入了日志文件名，则使用它。\n* 否则，代码会查找名为'server.log'的文件。\n*/\npublic static\
    \ void main(String args[]){\n    String logFile = \"server.log\";\n    if (args\
    \ != null && args.length == 1){\n        logFile = args[0];\n    }\n    examineLog(logFile);\n\
    \n}\n\n/**\n* 解析日志，并识别所有抛出的异常及其发生频率。\n*\n* @param logFile 要检查的日志文件名。\n* @param\
    \ regexCacheFile 包含正则表达式缓存的文件名。\n* @param regexKey 在 regexCacheFile 中键的名称。\n*\
    \ @return 一个 Map，包含找到的异常名称作为键，其频率作为值。\n*/\npublic static Map examineLog(\n   \
    \ String logFile,\n    String regexCacheFile,\n    String regexKey){\n     //创建一个\
    \ Map，用于按异常出现的顺序保留顺序\n    Map retval = new LinkedHashMap();\n\n//提取正则表达式\n   \
    \ String regex =getRegex(regexCacheFile,regexKey);\n\n//获取日志文件的内容\n    String\
    \ fileContent = readFile(logFile);\n\n//编译模式，并记录其执行时间\n    Pattern pattern =\n\
    \       Pattern.compile(regex, Pattern.MULTILINE);\n\nlong startTime = System.currentTimeMillis()\
    \ ;\n    Matcher matcher = pattern.matcher(fileContent);\n"
