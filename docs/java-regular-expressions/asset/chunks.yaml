    \ matches, and add\n22        //all relevant ones to the arrayList\n23       \
    \ while (matcher.find())\n24        {\n25            //extract the match and its\
    \ position\n26            String tmp = matcher.group();\n27            //insert\
    \ the matching string\n28            //into the map.\n29            retval.add(+\
    \ tmp);\n30        }\n\n32        return retval;\n32     } \n```\n\n| **![End\
    \ example](_1.gif)** |\n\n|  |\n\n[Listing 5-5](#LiB0045.html#ch05list05) isn't\
    \ terrible. It finds all the relevant matching substrings and returns them in\
    \ order. I run a few sample tests and find that it works as expected. But it does\
    \ leave something to be desired. It doesn't really tell me where the string was\
    \ found, and it might be nice if it were overloaded, so the client isn't forced\
    \ to pass in a flag if they don't need one.\n\nI decide that for this generation,\
    \ the client can live without the overloading. However, I do think the client\
    \ has a right to ask for the position at which the matching strings were found.\
    \ Thus, I modify the code so that it returns a Map. The Map will contain a key/value\
    \ pair, which will use the byte position of each find (stored as a String or an\
    \ Integer-I haven't decided which yet) and the matching substring as a value.\
    \ Modifying the code, I come up with [Listing 5-6](#LiB0045.html#ch05list06).\
    \ The only significant changes are on lines 7, 25, and 29\\. By the way, I decided\
    \ to use a LinkedHashMap on line 8, because I wanted to preserve the order in\
    \ which the matching Strings were found. A LinkedHashMap is a J2SE 1.4 addition\
    \ to the Map family that preserves the insertion order of elements.\n\nListing\
    \ 5-6: Modified searchString Method Belonging in the RegexUtil Class\n\n| **![Start\
    \ example](_1.gif)** |\n\n```\n01  public static Map searchString(\n02      String\
    \ content,\n03      String searchPattern,\n04      int flags\n05  )\n\n06  {\n\
    07      Map retval = new LinkedHashMap();\n08      Pattern pattern = null;\n\n\
    09      //compile the pattern\n10      if (flags > -1)\n11      {\n12        \
    \  pattern = Pattern.compile(searchPattern, flags);\n13      }\n14      else\n\
    15      {\n16          pattern = Pattern.compile(searchPattern);\n17      }\n\n\
    18      //extract the matcher for the pattern\n19      Matcher matcher = pattern.matcher(content);\n\
    20     //iterate through all of the matches, and add\n21     //all relevant ones\
    \ to the arrayList\n22     while (matcher.find())\n23     {\n24         //extract\
    \ the match and its position\n25         int position = matcher.start();\n26 \
    \        String tmp = matcher.group();\n27         //insert the matching string\
    \ and position\n28         //into the map.\n29         retval.put(position+\"\"\
    ,tmp);\n30     }\n\n31     return retval;\n32 }\n```\n\n| **![End example](_1.gif)**\
    \ |\n\n|  |\n\nI decide to make the position a String, to make dealing with the\
    \ output easier. I don't want to require the client to handle the keys too carefully,\
    \ so Strings will do for now."
  trans: "\n## 搜索字符串\n\n本示例在给定字符串中搜索某个模式是否存在，并返回所有匹配的字符串。这段代码非常简单，但作为一个实用的小程序，值得在此演示。\n\
    \n首先，我需要明确“返回”的具体含义。返回什么？在这个例子中，我决定返回一个包含匹配字符串的 ArrayList，因为我希望字符串按照被找到的顺序排列，而\
    \ ArrayList 正好能维护元素的插入顺序。此外，我也倾向于返回一个定义良好的数据结构，以便客户端（例如）可以遍历该结构并进一步检查数据。\n\n我还决定让客户端能够传入\
    \ `Pattern.compile` 的标志，例如 `Pattern.MULTILINE` 和 `Pattern.DOTALL`。这并不会增加多少额外的复杂性，但对客户端来说却是一个不错的功能。此时，值得先写下初步的方法签名。我得到了以下内容：\n\
    \n```\n public static ArrayList searchString(\n       String content, String searchPattern,\
    \ int flags\n   ) throws IOException\n```\n\n现在，我准备开始编写方法。我的第一个版本如清单 5-5 所示。\n\
    \n**清单 5-5：searchString 方法的第一个版本**\n\n| **![示例开始](img/_1.gif)** |\n\n```\n01 \
    \    public static ArrayList searchString(\n02         String content,\n03   \
    \      String searchPattern,\n04         int flags\n05     )\n06     throws IOException\n\
    07     {\n08         ArrayList retval = new ArrayList();\n09         Pattern pattern\
    \ = null;\n\n10        //编译模式\n11        if (flags > -1)\n12        {\n13    \
    \        pattern = Pattern.compile(searchPattern, flags);\n14        }\n15   \
    \     else\n16        {\n17            pattern = Pattern.compile(searchPattern);\n\
    18        }\n\n19        //为模式提取匹配器\n20        Matcher matcher = pattern.matcher(content);\n\
    \n21        //遍历所有匹配项，并将\n22        //所有相关项添加到 ArrayList\n23        while (matcher.find())\n\
    24        {\n25            //提取匹配项及其位置\n26            String tmp = matcher.group();\n\
    27            //将匹配的字符串\n28            //插入到映射中。\n29            retval.add(+ tmp);\n\
    30        }\n\n32        return retval;\n32     } \n```\n\n| **![示例结束](img/_1.gif)**\
    \ |\n\n|  |\n\n清单 5-5 并不算糟糕。它能找到所有相关的匹配子串并按顺序返回。我运行了几个示例测试，发现它按预期工作。但它确实还有改进空间。它没有告诉我字符串是在哪里被找到的，而且如果方法能被重载就更好了，这样客户端在不需要标志时就不必强制传入。\n\
    \n我决定，对于这个版本，客户端可以接受没有重载。不过，我确实认为客户端有权要求知道匹配字符串被找到的位置。因此，我修改了代码，使其返回一个 Map。该 Map\
    \ 将包含一个键/值对，键是每次匹配的字节位置（存储为 String 或 Integer——我还没决定用哪个），值是匹配的子串。修改代码后，我得到了清单 5-6。唯一显著的变化在第\
    \ 7、25 和 29 行。顺便提一下，我在第 8 行决定使用 `LinkedHashMap`，因为我希望保留匹配字符串被找到的顺序。`LinkedHashMap`\
    \ 是 J2SE 1.4 中添加到 Map 家族的新成员，它能保持元素的插入顺序。\n\n**清单 5-6：属于 RegexUtil 类的修改版 searchString\
    \ 方法**\n\n| **![示例开始](img/_1.gif)** |\n\n```\n01  public static Map searchString(\n\
    02      String content,\n03      String searchPattern,\n04      int flags\n05\
    \  )\n\n06  {\n07      Map retval = new LinkedHashMap();\n08      Pattern pattern\
    \ = null;\n\n09      //编译模式\n10      if (flags > -1)\n11      {\n12          pattern\
    \ = Pattern.compile(searchPattern, flags);\n13      }\n14      else\n15      {\n\
    16          pattern = Pattern.compile(searchPattern);\n17      }\n\n18      //为模式提取匹配器\n\
    19      Matcher matcher = pattern.matcher(content);\n20     //遍历所有匹配项，并将\n21 \
    \    //所有相关项添加到 ArrayList\n22     while (matcher.find())\n23     {\n24       \
    \  //提取匹配项及其位置\n25         int position = matcher.start();\n26         String\
    \ tmp = matcher.group();\n27         //将匹配的字符串和位置\n28         //插入到映射中。\n29  \
    \       retval.put(position+\"\",tmp);\n30     }\n\n31     return retval;\n32\
    \ }\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n我决定将位置存储为 String，以便更容易地处理输出。我不希望客户端过于小心地处理键，所以目前用\
    \ String 就足够了。\n"
- fmt: "# Searching a File\n\nBuilding on the previous example, I decide to provide\
    \ a utility for searching the content of a file and returning all matching strings\
    \ within that file. I'll use `FileChannels` for the actual file I/O. Although\
    \ a discussion of `FileChannels` is beyond the scope of this book, in my opinion\
    \ they're the best way to access files in Java.\n\nMy strategy is to use a `FileChannel`\
    \ to open a file, read its content into a `String`, release the `FileChannel`,\
    \ and then use the `searchString` method to parse the `String`. This is faster\
    \ than reading through the file line by line and examining its content, though\
    \ it is memory intensive. [Listing 5-7](#LiB0046.html#ch05list07) shows the code\
    \ for doing this.\n\n**Listing 5-7: Reading in File Content**\n\n```\n01     /**\n\
    02     * extracts the content of a file\n03     * @param String fileName the name\
    \ of the file to extract\n04     * @throws IOException\n05     *\n06     * @return\
    \ String representing the contents of the file\n07     */\n08     public static\
    \ String getFileContent(String fileName)\n09     throws IOException{\n10     \
    \   String retval = null;\n11        //get access to the FileChannel\n12     \
    \   FileInputStream fis =\n13          new FileInputStream(fileName);\n14    \
    \    FileChannel fc = fis.getChannel();\n\n15        //get the file content\n\
    16        retval = getFileContent(fc);\n\n17        //close up shop\n18      \
    \  fc.close();\n19        fc = null;\n\n20        return retval;\n21     }\n\n\
    22     /**\n23     * extracts the content of a file\n24     * @param String fileName\
    \ the name of the file to extract\n25     * @throws IOException\n26     *\n27\
    \     * @return String representing the contents of the file\n28     */\n29  \
    \   private static String getFileContent(FileChannel fc)\n30     throws IOException{\n\
    31         String retval = null;\n32        //read the contents of the FileChannel\n\
    33         ByteBuffer bb = ByteBuffer.allocate((int)fc.size());\n34         fc.read(bb);\n\
    \n35         //save the contents as a string\n36         bb.flip();\n37      \
    \   retval = new String(bb.array());\n38         bb = null;\n\n39         return\
    \ retval;\n40     }\n```\n\nNext, I need to provide a method that will load the\
    \ file, search it, and return the results. Given the two previous methods, this\
    \ becomes fairly easy, as shown in [Listing 5-8](#LiB0046.html#ch05list08).\n\n\
    **Listing 5-8: Opening a File, Searching the File, and Returning the Results**\n\
    \n```\n01     public static Map searchFile(\n02         String file,\n03     \
    \    String searchPattern,\n04         int flags\n05     ) throws IOException\n\
    06     {\n07        String fileContent = getFileContent(file);\n08        Map\
    \ retval = searchFile(fileContent,searchPattern,flags);\n09        return retval;\n\
    10     }}\n```\n\nI take the program out for a spin and compare it to `grep`.\
    \ To be honest, it seems to lack a bit in the comparison. The `grep` program returns\
    \ the entire line of a matching token, whereas this method only returns the matching\
    \ token. That's not terrible, because the client could request the entire line\
    \ by using the correct regex pattern. But it's not really as friendly as it could\
    \ be, especially for the average user.\n\nI decide to \"pad\" the pattern to capture\
    \ an entire line, assuming that the original search pattern has no punctuation,\
    \ and thus no regex, in it. [Listing 5-9](#LiB0046.html#ch05list09) shows my modified\
    \ `searchFile` method.\n\n**Listing 5-9: Modifying the searchFile Method to Make\
    \ It Friendlier**\n\n```\n01  public static Map searchFile(\n02      String file,\n\
    03      String searchPattern,\n04      int flags\n05  ) throws IOException\n06\
    \  {\n07     String fileContent = getFileContent(file);\n\n08     //if the search\
    \ pattern doesn't have any punctuation\n09     //then assume it's not a regular\
    \ expression and extract\n10    //the entire line in which it was found\n11  \
    \   String[] regexTokens = searchPattern.split(\"\\\\p{Punct}\");\n\n12     if\
    \ (regexTokens.length == 1)\n13     {\n14         searchPattern = \"^.*\"+ searchPattern+\"\
    .*$\";\n15     }\n\n16    Map retval = searchString(fileContent,searchPattern,flags);\n\
    17    return retval;\n18 } \n```\n\n## Discussion Point\n\nAt this point, there\
    \ should be some reasonable questions on your mind. Isn't this supposed to be\
    \ a regex book? There wasn't anything particularly regex-like about the `searchFile`\
    \ and `searchString` methods; they were pretty much straight Java code, which\
    \ you already know how to write. What's going on?\n\nThe point here is that regex\
    \ is just a tool. It doesn't change the fact that you're still writing Java code,\
    \ and you need to follow good, modular, object-oriented principles, even as you're\
    \ working with regular expressions. Regex allows you to bridge trouble spots you\
    \ might never have crossed otherwise, but it's just a tool. Like any well-built\
    \ engine, the `java.util.regex` engine announces its excellence by humming quietly\
    \ along and *not* forcing you to worry about it.\n\n## Working with Very Large\
    \ Files\n\nAnother valid question at this point is, what if the content of the\
    \ file you're trying to parse is too large to make reading all of it into memory\
    \ a practical option? In general, you have two paths you can take here. You can\
    \ use one of the new Java features, such as `MappedByteBuffers`, or you can split\
    \ the file into manageable sections and parse each of those in turn.\n\nIf you\
    \ decide to use `MappedByteBuffers` for regex, [Listing 5-10](#LiB0046.html#ch05list10)\
    \ contains an example showing how. I'm hesitant, however, to advocate `MappedByteBuffers`\
    \ with regex too strongly for three reasons. First and foremost, their behavior\
    \ is very system dependent, so you should probably rule them out if you need platform\
    \ independence. Second, even within a given platform, their behavior isn't well\
    \ defined. Thus, depending on what else you're doing with your operating system,\
    \ you could get inconsistent results. Third, you need to consider the fact that,\
    \ if the entire file can't be loaded into memory at one time, trying to apply\
    \ a pattern that might have wildcards in it is going to be a tricky affair.\n\n\
    **Listing 5-10: Accessing a File Through a MappedByteBuffer**\n\n```\n01   public\
    \ static boolean getFileContentUsingMappedByteBuffer\n02   (\n03       String\
    \ fileName\n04   ) throws IOException\n05   {\n06       boolean retval = false;\n\
    07       RandomAccessFile raf = new RandomAccessFile(fileName,\"rwd\");\n08  \
    \     FileChannel fc = raf.getChannel();\n\n09       MappedByteBuffer mbb =\n\
    10        fc.map(FileChannel.MapMode.READ_WRITE,0,fc.size());\n\n11       CharSequence\
    \ cb = mbb.asCharBuffer();\n\n12       return retval;\n13 }\n```\n\nYou may very\
    \ well need to reconsider your patterns, and break the file up into logical blocks\
    \ based on your insight into its structure. One strategy might be to check the\
    \ size of the file and divide that by 10, 100, or whatever fraction is easily\
    \ loadable given your system's memory limitations, and then search that portion.\
    \ Although this isn't ideal, it is more predictable than the corresponding mapped-memory\
    \ approach. The bottom line is that regardless of the regex flavor or provider\
    \ you use, very large files require special treatment."
