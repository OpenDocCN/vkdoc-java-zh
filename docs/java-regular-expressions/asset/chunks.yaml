    The UNICODE_CASE flag is used in constructing the second parameter of the Pattern.compile(String\
    \ regex, int flags) method. It is used in conjunction with the CASE_INSENITIVE\
    \ flag to generate case-insensitive matches for the international character sets.\n\
    \nUsing this flag or the equivalent ***(?u)*** regular expression can degrade\
    \ performance.\n\n### public static final int CANON_EQ\n\nThe CANON_EQ flag is\
    \ used in constructing the second parameter of the Pattern.compile(String regex,\
    \ int flags) method. As you know, characters are actually stored as numbers. For\
    \ example, in the ASCII character set, the character *A* is represented by the\
    \ number 65\\. Depending on the character set that you're using, the same character\
    \ can be represented by different numeric combinations. For example, *à* can be\
    \ represented by both *+00E0* and *U+0061U+0300*. A CANON_EQ match would match\
    \ either representation.\n\nUsing this flag may degrade performance."
  trans: "\n## 模式对象\n\n图 2-1 展示了 Pattern 类的方法。该图是 Pattern 类的 UML 渲染图，展示了该类的各种方法和常量。\n\
    \n![点击展开](img/fig74_01_0.jpg)\n图 2-1: Pattern 类的 UML 表示\n\n让我们详细考察 Pattern 类的字段和方法。如果你不熟悉\
    \ UML，这里有一份快速指南，帮助你阅读图 2-1：\n\n*   类的名称是 Pattern，位于矩形的最顶部区域。\n*   中间区域是字段变量的分组。前面的加号（+）表示它们是公有的。下划线表示它们是静态的，而\"\
    : int\"表示它们是 int 类型。\"= num\"表示默认值。\n*   矩形的最底部区域存放着类的方法。同样，加号表示公有访问权限，下划线表示该方法是静态的。括号表示给定方法的参数；因此，`flags()`不带参数，而`matcher(input\
    \ : CharSequence)`接受一个名为 input、类型为 CharSequence 的变量。末尾的冒号（:）表示类型。\n\n以下各节将描述 Pattern\
    \ 类的字段和方法。\n\n### public static final int UNIX_LINES\n\nUNIX_LINES 标志用于构造`Pattern.compile(String\
    \ regex, int flags)`方法的第二个参数。当你解析源自 UNIX 机器的数据时，请使用此标志。\n\n在许多 UNIX 变体中，不可见字符***\\\
    n***用于表示行的终止。这与其他操作系统不同，包括各种 Windows 变体，它们可能使用***\\r\\n***、***\\n***、***\\r***、***\\\
    u2028***或***\\u0085***作为行终止符。\n\n如果你将一个源自 UNIX 机器的文件传输到 Windows 平台并打开它，你可能会注意到，根据你用来查看文本的编辑器不同，行有时不会以预期的方式终止。这是因为两个系统可能使用不同的语法来表示行的结束。\n\
    \nUNIX_LINES 标志只是告诉正则表达式引擎它正在处理 UNIX 风格的行，这会影响正则表达式元字符***^***和***$***的匹配行为。使用\
    \ UNIX_LINES 标志或等效的***(?d)***正则表达式模式，不会降低性能。默认情况下，此标志未设置。\n\n### public static\
    \ final int CASE_INSENSITIVE\n\nCASE_INSENSITIVE 字段用于构造`Pattern.compile(String\
    \ regex, int flags)`方法的第二个参数。当你需要匹配 ASCII 字符而不区分大小写时，它非常有用。\n\n使用此标志或等效的***(?i)***正则表达式可能会导致性能略有下降。默认情况下，此标志未设置。\n\
    \n### public static final int COMMENTS\n\nCOMMENTS 标志用于构造`Pattern.compile(String\
    \ regex, int flags)`方法的第二个参数。它告诉正则表达式引擎，正则表达式模式中嵌入了注释。具体来说，它告诉正则表达式引擎忽略模式中的任何注释，从***#***字符前的空格开始，以及之后的所有内容，直到行尾。\n\
    \n因此，正则表达式模式***A*** ***#matches uppercase US-ASCII char code 65***将使用***A***作为正则表达式，但***#***字符前的空格以及之后直到行尾的所有内容都将被忽略。你的代码最终可能看起来像这样：\n\
    \n```\nPattern p =\nPattern.compile(\"A    #matches uppercase US-ASCII char code\
    \ 65\",Pattern.COMMENTS); \n```\n\n将***#***字符视为正则表达式中与 Java 注释`//`等效的符号。通过在编译正则表达式时使用\
    \ COMMENTS 标志，你是在告诉正则表达式引擎你的表达式包含注释，这些注释应该被忽略。当你的模式特别复杂或微妙时，这会很有用。当你未设置此标志时，正则表达式引擎将尝试将你的注释解释并用作正则表达式的一部分。\n\
    \n使用此标志或等效的***(?x)***正则表达式不会降低性能。\n\n### public static final int MULTILINE\n\n\
    MULTILINE 标志用于构造`Pattern.compile(String regex, int flags)`方法的第二个参数。它告诉正则表达式引擎，正则表达式的输入不是单行代码；相反，它包含多行，每行都有自己的终止字符。\n\
    \n这意味着行首字符***^***和行尾字符***$***可能会匹配输入字符串中的多行。例如，假设你的输入字符串是*This is a sentence.\\\
    n So is this.*。如果你使用 MULTILINE 标志编译正则表达式模式\n\n```\nPattern p = Pattern.compile(\"\
    ^\", Pattern.MULTILINE);\n```\n\n那么行首字符***^***将匹配*This is a sentence*中的*T*之前。它还会匹配*So\
    \ is this*中的*S*之前。当你未使用 MULTILINE 标志时，匹配只会找到*This is a sentence*中的*T*。\n\n使用此标志或等效的***(?m)***正则表达式可能会降低性能。\n\
    \n### public static final int DOTALL\n\nDOTALL 标志用于构造`Pattern.compile(String regex,\
    \ int flags)`方法的第二个参数。DOTALL 标志告诉正则表达式引擎允许元字符句点匹配任何字符，包括行终止字符。这意味着什么？\n\n假设你的候选字符串是*Test\\\
    n*。如果你对应的正则表达式模式是`.`，通常你会得到四个匹配：一个匹配*T*，另一个匹配*e*，第三个匹配*s*，第四个匹配*t*。这是因为正则表达式元字符`.`通常匹配任何字符，*除了*行终止字符。\n\
    \n按如下方式启用 DOTALL 标志：\n\n```\nPattern p = Pattern.compile(\".\", Pattern.DOTALL);\n\
    ```\n\n将生成五个匹配。你的模式将匹配*T*、*e*、*s*和*t*字符。此外，它还会匹配行尾的*\\n*字符。\n\n使用此标志或等效的***(?s)***正则表达式不会降低性能。\n\
    \n### public static final int UNICODE_CASE\n\nUNICODE_CASE 标志用于构造`Pattern.compile(String\
    \ regex, int flags)`方法的第二个参数。它与 CASE_INSENSITIVE 标志结合使用，为国际字符集生成不区分大小写的匹配。\n\n\
    使用此标志或等效的***(?u)***正则表达式可能会降低性能。\n\n### public static final int CANON_EQ\n\nCANON_EQ\
    \ 标志用于构造`Pattern.compile(String regex, int flags)`方法的第二个参数。如你所知，字符实际上是以数字形式存储的。例如，在\
    \ ASCII 字符集中，字符*A*由数字 65 表示。根据你使用的字符集，同一个字符可以由不同的数字组合表示。例如，*à*可以由*+00E0*和*U+0061U+0300*两者表示。CANON_EQ\
    \ 匹配将匹配任何一种表示形式。\n\n使用此标志可能会降低性能。\n"
- fmt: "### `public static Pattern compile(String regex)` Throws a `PatternSyntaxException`\n\
    \nYou'll notice that the `Pattern` class doesn't have a public constructor. This\
    \ means that you *can't* write the following type of code:\n\n```\nPattern p =\
    \ new Pattern(\"my regex\");//wrong!\n```\n\nTo get a reference to a `Pattern`\
    \ object, you must use the static method `compile(String regex)`. Thus, your first\
    \ line of regex code might look like the following:\n\n```\nPattern p = Pattern.compile(\"\
    my regex\");//Right! \n```\n\nThe parameter for this method is a `String` that\
    \ represents a regular expression. When you pass a `String` to a method that expects\
    \ a regular expression, it's important to delimit any `\\` characters that the\
    \ regular expressions might have by appending another `\\` character to them.\
    \ This is because `String` objects internally use the `\\` character to delimit\
    \ metacharacters in character sequences, regardless of whether those character\
    \ sequences are regular expressions. This was true long before regular expressions\
    \ were part of Java. Thus, the regular expression `\\d` becomes `\\\\d`. To match\
    \ a single digit, your regular expression becomes the following:\n\n```\nPattern\
    \ p = Pattern.compile(\"\\\\d\");\n```\n\nThe point here being that the regular\
    \ expression `\\d` becomes the String `\\\\d`.\n\nThe delimitation of the `String`\
    \ parameter can sometimes be tricky, so it's important to understand it well.\
    \ By and large, it means that you *double* the `\\` characters that might already\
    \ be present in the regular expression. It *does not* *mean* that you simply append\
    \ a single `\\` character. I present an example to illustrate this shortly.\n\n\
    The `compile` method will throw a `java.util.regex.PatternSyntaxException` if\
    \ the regular expression itself is badly formed. For example, if you pass in a\
    \ `String` that contains `[4`, the `compile` method will throw a `PatternSyntaxException`\
    \ at runtime, because the syntax of the regular expression `[4` is illegal, as\
    \ shown in [Listing 2-1](#LiB0015.html#ch02list01).\n\n**Listing 2-1: Using the\
    \ `compile` Method**\n\n```\nimport java.util.regex.*;\n\npublic class DelimitTest{\n\
    \  public static void main(String args[]){\n\n    //throws exception\n    Pattern\
    \ p = Pattern.compile(\"[4\");\n  }\n}\n```\n\nDoes this mean that you have to\
    \ catch a `PatternSyntaxException` every time you use a regular expression? No.\
    \ `PatternSyntaxException` doesn't have to be explicitly caught, because it extends\
    \ from a `RuntimeException`, and a `RuntimeException` doesn't need to be explicitly\
    \ caught.\n\nThe `compile(String regex)` method returns a `Pattern` object.\n\n\
    ### `public static Pattern compile(String regex, int flags)` Throws a `PatternSyntaxException`\n\
    \nThe `(String regex, int flags)` method is a more powerful form of the `compile(String)`\
    \ method. The first parameter for this method, `regex`, is a `String` that represents\
    \ a regular expression, as detailed in the `Pattern.compile(String regex)` method\
    \ presented earlier. For details on how you must format the `String` parameter,\
    \ please see the \"[public static Pattern compile(String regex) Throws a PatternSyntaxException](#LiB0015.html#ch02lev2sec8)\"\
    \ section.\n\nThe flexibility of this `compile` method is fully realized by using\
    \ the second parameter, `int flags`. The `int flags` parameter can consist of\
    \ the following flags or a bit mask created by OR-ing combinations thereof:\n\n\
    - `CANON_EQ`\n- `CASE_INSENSTIVE`\n- `COMMENTS`\n- `DOTALL`\n- `MULTILINE`\n-\
    \ `UNICODE_CASE`\n- `UNIX_LINES`\n\nFor example, if you want a match to be successful\
    \ regardless of the case of the candidate `String`, then your pattern might look\
    \ like the following:\n\n```\nPattern p = Pattern.compile(regex,Pattern.CASE_INSENSITIVE);\n\
    ```\n\nYou can combine the flags by using the `|` operator. For example, to achieve\
    \ case-insensitive Unicode matches that include a comment, you might use the following:\n\
    \n```\nPattern p =\nPattern.compile(\"t # a compound flag example\",\nPattern.CASE_INSENSITIVE\
    \ | Pattern.UNICODE_CASE|\nPattern.COMMENT);\n```\n\nThe `compile(String regex,\
    \ int flags)` method returns a `Pattern` object.\n\n### `public String pattern()`\n\
    \nThis method returns a simple `String` representation of the regex compiled.\
    \ It can sometimes be misleading in two ways. First, the string that's returned\
    \ doesn't reflect any flags that were set when the pattern was compiled. Second,\
    \ the regex `String` you pass in isn't always the pattern `String` you get back\
    \ out. Specifically, the original `String` delimitations aren't shown. Thus, if\
    \ your original code was this:\n\n```\nPattern p = Pattern.compile(\"\\\\d\");\n\
    ```\n\nyou should expect your output to be `\\d`, with a single `\\` character.\n\
    \nA question naturally arises here: If this method strips out the original delimiting,\
    \ can you use the resulting `String` as a regular expression to feed another expression?\
    \ For example, does [Listing 2-2](#LiB0015.html#ch02list02) work?\n\n**Listing\
    \ 2-2: Pattern Matching Example**\n\n```\nimport java.util.regex.*;\n\npublic\
    \ class PatternMethodExample{\n  public static void main(String args[]){\n   \
    \   reusePatternMethodExample();\n  }\n\n   public static void reusePatternMethodExample(){\n\
    \      //match a single digit\n      Pattern p = Pattern.compile(\"\\\\d\");\n\
    \      Matcher matcher = p.matcher(\"5\");\n      boolean isOk = matcher.matches();\n\
    \      System.out.println(\"original pattern matches \" + isOk);\n\n      //recycle\
    \ the pattern\n      String tmp = p.pattern();\n      Pattern p2 = Pattern.compile(tmp);\n\
    \      matcher = p.matcher(\"5\");\n      isOk = matcher.matches();\n      System.out.println(\"\
    second pattern matches \" + isOk);\n   }\n}\n```\n\nWill this method throw a `RuntimeException`?\
    \ After all, the `pattern()` method returns `\\d`, and an attempt to create a\
    \ regex pattern using `\\d` as a `String` will fail to compile.\n\nThe answer\
    \ is no, it won't throw an exception. Remember that the doubling of the `\\` character\
    \ is a requirement of the `String` object's constructor—it has nothing to do with\
    \ the regex pattern that the `String` represents. Thus, once the `String` is created,\
    \ the conflict disintegrates.\n\n### `public Matcher matcher(CharSequence input)`\n\
    \nRemember that you create a `Pattern` object by compiling a description of what\
    \ you're looking for. A `Pattern` is a bit like a personal ad: It lists the features\
    \ of the thing you're looking for. Speaking purely conceptually, your patterns\
    \ might look like the following:\n\n```\nPattern p = Pattern.compile(\"She must\
    \ have red hair, and a temper\");\n```\n\nCorrespondingly, you'll need to compare\
    \ that description against candidates. That is, you'll want to examine a given\
    \ `String` to see if it matches the description you provided.\n\nThe `Matcher`\
    \ object is designed specifically to help you do this sort of interrogation. I\
    \ discuss `Matcher` in detail in the next major section of this chapter, but for\
    \ now you should know that the `Pattern.matcher(CharSequence input)` method returns\
    \ the `Matcher` that will help get details about how your candidate `String` compares\
    \ with the description you passed in.\n\n`Pattern.matcher(CharSequence input)`\
    \ takes a `CharSequence` parameter as an input parameter. `CharSequence` is a\
    \ new interface introduced in J2SE 1.4 and retroactively implemented by the `String`\
    \ object. Because `String` implements `CharSequence`, you can simply pass a `String`\
    \ object as the parameter to the `Pattern.matcher(CharSequence input)` method.\
    \ I discuss the `CharSequence` parameter in detail shortly.\n\nIn the preceding\
    \ example, again speaking purely conceptually, you might get your `Matcher` object\
    \ as follows:\n\n```\nMatcher m = pattern.matches(\"Anna\");\n```\n\nIn J2SE,\
    \ this `Matcher` object's `matches()` would return `true`. In real life, YMMV."
