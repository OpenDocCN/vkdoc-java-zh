    # Chapter 4: Object-Oriented Regex'
  trans: '

    ### 优先提供最可能的匹配项


    假设你的正则表达式用于验证一家全医生健康俱乐部成员的称谓。你预计 90% 的客户会使用 *Dr* 这一称谓，但有些人可能不会。因此，你的称谓匹配模式可能应该类似于
    ***.*\b(?:Dr|Mr|Mrs|Miss|Brother|Mister) .****。


    这种模式能提高尽早匹配成功的可能性，从而减少正则表达式引擎需要遍历的流程数量。例如，假设候选字符串是 *Please meet Dr Hana Saez*。按照当前模式的写法，引擎在第一次遍历时就会匹配到
    *D*、*r*、空格以及之后的所有内容。因此，它永远不会再去尝试匹配 ***Mr***、***Mrs*** 等。


    然而，如果模式写成 ***.*\b(?:Mr|Mrs|Miss|Brother|Mister| Dr) .****，引擎会为 ***Mr*** 遍历整个候选字符串一次，然后再为
    ***Mrs*** 遍历一次，接着为 ***Miss*** 遍历一次，再为 ***Brother*** 遍历一次，以此类推，直到最终匹配到 ***Dr***。实际结果虽然相同，但整个过程会消耗更多的资源。


    ### 尽可能具体化


    如果你知道正则表达式模式在某个位置只应匹配数字，那么就不要使用 ***\w*** 来定义该部分匹配——请使用 ***\d***。这将使正则表达式引擎能够缩小搜索范围并更快地进行过滤。或者，如果你知道模式必须包含某个特定单词，那么就在模式中直接使用该单词。这与根据特定需求编写代码更容易的原理相同。需求越聚焦、越详细，你的工作就越轻松。


    例如，假设你知道候选字符串必须以大写字母开头，其后跟小写字母。使用 ***[A-Z][a-z]+*** 这样的模式比使用 ***\w**** 更高效。两者可能都有效，但
    ***[A-Z][a-z]+*** 能让引擎比 ***\w**** 更快地得出准确结果，因为它可以拒绝将数字和小写字母作为首字符，并拒绝将数字和大写字母用于后续部分。


    J2SE 正则表达式实现中，使用字面字符串比使用字符类要快得多——它能够精确地锁定特定字符串。因此，如果你要查找 10 到 19 之间的数字，使用 ***1\d***
    比使用 ***\d+***、***\d\d***、***\d{2}*** 或任何此类变体更高效。


    ### 指定匹配的位置


    如果你知道候选字符串只能出现在行首之后、行尾之前或标点符号之后，那么就在正则表达式中明确说明。当你确定 ***Beth*** 必须出现在换行符之后时，模式
    ***^Beth*** 的匹配速度会比模式 ***Beth*** 更快、更高效。


    这种优化方式特别强大，因为它允许引擎在仅检查候选字符串的前两个字符后就停止搜索。在你的正则表达式中，要寻找机会利用这类特性。


    ### 指定匹配的长度


    如果你要查找的匹配项长度至少为 *n* 个字符，那么就在正则表达式中明确说明。或者，如果你知道匹配项的长度不能超过 *m* 个字符，也请一并说明。


    例如，假设你正在解析一个大型文件以查找名字的引用。合理地假设你需要的名字长度少于 20 个字符。因此，虽然你可以使用 ***\b[A-Z][a-z]+***
    这样的模式，但使用 ***\b[A-Z][a-z]{1,20}*** 可能更好，因为引擎可以放弃任何长度超过 20 个字符的搜索。或者，如果你知道候选字符串必须包含六个或更多字符，那么使用
    ***\w\w\w\w\w\w+*** 比使用 ***\w+*** 更好。


    |  | 注意 | J2SE 正则表达式查找特定重复项的速度比查找量化的重复项快得多。因此，***\w\w\w\w\w\w*** 比 ***\w{6}***
    快得多。 |


    ### 限制备选项的范围


    通常，提供小的备选项比提供大的备选项更高效，并且将它们放在后面比放在前面更好。因此，如果你有模式 ***Good Morning|Good Evening***，那么模式
    ***Good (?:Morning|Evening)*** 会更好。在后一个例子中，正则表达式引擎只有在确定 *Good* 是候选字符串的一部分后，才需要做出决策。


    在前一个例子中，即使候选字符串不包含单词 *Good*，引擎也可能需要查找两次。也就是说，即使候选字符串是 *Bad year* 且根本不可能匹配，模式 ***Good
    Morning|Good Evening*** 仍然会搜索两次：一次搜索 *Good morning*，然后再次搜索 *Good Evening*。


    ## 总结


    本章对 J2SE 正则表达式包中一些更具挑战性的工具和概念进行了解释、详细说明并提供了示例。本章讨论了组、子组、非捕获组、贪婪限定符、占有优先限定符、懒惰限定符、正向先行断言、负向先行断言、正向后行断言和负向后行断言。最后，本章以一些优化表达式的技巧作为结尾。下一章将介绍一些在面向对象语言（如
    Java）中使用正则表达式的建议。


    ## 常见问题解答


    | **问：** | **如何使一个组成为非捕获组？** | ![要使一个组成为非捕获组，请在组的左括号内插入 ?:。例如，将 (\w) 改为 (?:\w)。](img/#LiB0032.html#answer.N19)
    |

    | **问：** | **给定表达式 \w(\d(\w))，最右侧子组 (\w) 的捕获索引是多少？** | ![组从左到右计数，从开括号开始，group(0)
    始终指代整个正则表达式模式。因此，子组 (\w) 的捕获索引是 2。相应地，(\d(\w)) 的捕获索引是 group(2)。](img/#LiB0032.html#answer.N41)
    |

    | **问：** | **当其中一个组是非捕获组时，组索引会如何受到影响？** | ![计算组索引时，非捕获组不会被以任何方式计入。](img/#LiB0032.html#answer.N67)
    |


    答案


    | **答：**  | 要使一个组成为非捕获组，请在组的左括号内插入 ***?:***。例如，将 ***(\w)*** 改为 ***(?:\w)***。 |

    | **答：**  | 组从左到右计数，从开括号开始，group(0) 始终指代整个正则表达式模式。因此，子组 ***(\w)*** 的捕获索引是 2。相应地，***(\d(\w))***
    的捕获索引是 group(2)。 |

    | **答：**  | 计算组索引时，非捕获组不会被以任何方式计入。 |


