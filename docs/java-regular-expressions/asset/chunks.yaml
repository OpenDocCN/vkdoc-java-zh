    \ 等。 &#124;\n\n |\n| **答：**  | 任何正则表达式的首要目标当然是准确且高效地工作。第二个目标是可读性。如何判断它是否可读？我的建议是，根据你认为需要的详细程度添加注释，然后将其交给几位可能需要解读它的开发人员。如果他们能理解（或者更好的是，他们能够修改它），那么它可能足够清晰。如果不能，那么你可能需要考虑重构。\
    \ |\n\n# 第 5 章：实用示例\n\n## 概述\n\n> *“我参加了一个速读课程，并在 20 分钟内读完了《战争与和平》。这本书是关于俄罗斯的。”*\n\
    > \n> — 伍迪·艾伦\n\n在本章中，我会在解决几个正则表达式问题时边思考边讲解。这应该能让你对构建非平凡正则表达式解决方案的过程有所了解。其中一些示例是我在正则表达式或\
    \ Java 新闻组中遇到的问题，另一些则是为本章专门创建的。\n\n|  | 注意  | 本章中的问题利用了在第 4 章中定义的 `RegexProperties`\
    \ 类。`RegexProperties` 是一个扩展了 `java.util.Properties` 的类，允许你从属性文件中加载正则表达式模式。其主要优势在于模式不必使用\
    \ Java 分隔符。因此，你可以直接使用 ***\\d*** 而不是 ***\\\\d***。有关 `RegexProperties` 类的更多详细信息，请参见第\
    \ 4 章。 |\n"
- fmt: '# Confirming the Format of a Phone Number


    This first example confirms that a given phone number has the normal format for
    a U.S. phone number.


    Before beginning in earnest, I have to make a decision: Do I want to write my
    own pattern or try to find an existing one? Normally, the first thing I would
    do is check some online regex resource, such as [http://www.regexlib.com](http://www.regexlib.com),
    to find an existing pattern. However, because this is a relatively simple pattern,
    and because I want to demonstrate the process of writing it, I''ll create it myself.


    Because I''ve decided to write the pattern myself, the first question I need to
    answer is, what is a phone number? I begin by working backward from some sample
    numbers. This is the pull technique described in [Chapter 1](#LiB0005_split_000.html#33).
    It requires that I take some actual data and try to pull the pattern out of it.
    Say my sample set is this:


    - `614-345-6789`

    - `345-6789`

    - `345 6789`

    - `345.6789`

    - `3456789`

    - `(614)345-6789`

    - `6143456789`


    I pick the first phone number on the list as my pattern model. In examining it,
    I see a fairly obvious blueprint: three digits, a hyphen, three digits, a hyphen,
    and then four digits. That leads to the pattern `\d{3}-\d{3}-\d{4}`. [Table 5-1](#LiB0042.html#ch05table01)
    shows the process of deriving the pattern.


    **Table 5-1: Pulling a General Regex Pattern from `614-345-6789`**


    | Step | What I Did | Why I Did It | Justification | Resulting Pattern |

    | --- | --- | --- | --- | --- |

    | Step 1 | Nothing | Initial state | N/A | `614-345-6789` |

    | Step 2 | Replaced digits with `\d` | To get a more generic description | `\d`
    stands for any single digit | `\d\d\d-\d\d\d-\d\d\d\d` |

    | Step 3 | Replaced `\d\d\d` with `\d{3}` | To produce a more succinct pattern
    | `\d{3}` is exactly equal to `\d\d\d` | `\d{3}-\d{3}-\d\d\d\d` |

    | Step 4 | Replaced `\d\d\d\d` with `\d{4}` | To produce a more succinct pattern
    | `\d{4}` is exactly equal to `\d\d\d\d` | `\d{3}-\d{3}-\d{4}` |


    Of course, the pattern also has to accommodate numbers consisting of only seven
    digits, such as `345-6789`. At present, it can''t, because it''s modeled after
    data that has nine digits. Reconciling the pattern to do so leads to `(?:\d{3}-)?\d{3}-\d{4}`.
    [Table 5-2](#LiB0042.html#ch05table02) shows the process of deriving the pattern.


    **Table 5-2: Pushing `\d{3}-\d{3}-\d{4}` to Accommodate Seven-Digit Numbers**


    | Step | What I Did | Why I Did It | Justification | Resulting Pattern |

    | --- | --- | --- | --- | --- |

    | Step 5 | Nothing | Initial state | N/A | `\d{3}-\d{3}-\d{4}` |

    | Step 6 | Grouped the leftmost `\d{3}-` in parentheses, producing `(\d{3}-)`
    | To treat `\d{3}-` as a single entity that might or might not exist. | Any part
    of a pattern can be subgrouped. | `(\d{3}-)\d{3}-\d{4}` |

    | Step 7 | Made `(\d{3}-)` optional by producing `(\d{3}-)?` | So that users can
    omit area codes. | Adding `?` after a group makes it optional. | `(\d{3}-)?\d{3}-\d{4}`
    |

    | Step 8 | Added a `?:` inside the opening `(` of `(\d{3}-)` to produce `(?:\d{3}-)?`
    | It makes the expression more efficient. Non-capturing groups require less memory.
    | Adding `?:` inside a group makes the group noncapturing. | `(?:\d{3}-)?\d{3}-\d{4}`
    |


    Now the pattern will accept any seven or ten digit sequence of numbers, as long
    as they are grouped into sets of threes and fours, and separated by hyphens.


    **A Brief Digression on Working with Regex in Java**


    If I were programming in Perl, the next natural step would probably be to account
    for punctuation in the candidate, deal with an opening parenthesis that might
    or might not be there, and so on. Of course, this would most likely be addressed
    in the pattern itself.


    But I''m not using Perl; I''m using a full featured, object-oriented language
    that''s been designed to deal with nuisances while remaining clear. I decide to
    take advantage of that by scrubbing the data, and relying more on programmatic
    logic and less on regex wizardry.


    Next, I use `String.replaceAll` to remove all punctuation and spacing from the
    phone number, as follows:


    ```

    String scrubbedPhone = phone.replaceAll("\\p{Punct}|\\s","");

    ```


    This replaces any and all punctuation or space characters with a zero-length string.


    **Note:** `\p{Punct}` is a POSIX, U.S. ASCII predefined class that matches any
    punctuation character. Specifically, it matches `!"#$%&''()*+,-./:;<=>?@[\]^_`{&#124;}~`.
    It was introduced in [Chapter 1](#LiB0005_split_000.html#33), in [Table 1-12](#LiB0008.html#84).


    This way, I can count on the phone number being in the form `6143456789` or `3456789`.
    This is great news, because I can now simplify the pattern even further, as shown
    in [Table 5-3](#LiB0042.html#ch05table03). By breaking the process down into a
    separate step, I''ve decreased the amount of complexity that will go into a given
    pattern.


    **Table 5-3: Removing References to `-` from `\d{3}-\d{3}-\d{4}` to Accommodate
    the Data Scrub**


    | Step | What I Did | Why I Did It | Justification | Resulting Pattern |

    | --- | --- | --- | --- | --- |

    | Step 9 | Nothing | Initial state | N/A | `(?:\d{3}-)?\d{3}-\d{4}` |

    | Step 10 | Removed all references to the character `-` | This scrubbing guarantees
    that I''ll never have to deal with punctuation in the phone number. Thus, it would
    be a mistake to expect it. | Removing the `-` simply means that the pattern won''t
    check for, or require, the existence of a hyphen. | `(?:\d{3})?\d{3}\d{4}` |

    | Step 11 | Treated `(\d{3})` as a single entity and checked for its existence
    one or two times; thus, replaced `(?:\d{3})?\d{3}` with `(?:\d{3}){1,2}` | To
    make the expressions less verbose. | `(?:\d{3})?\d{3}` means "three digits or
    six digits." `(?:\d{3}){1,2}` means exactly the same thing. Thus, they''re logically
    equivalent statements. | `(?:\d{3}){1,2}\d{4}` |

    | Step 12 | Went back to using the pattern from step 10. | Although the pattern
    from step 11 is briefer, it''s more difficult to read. | See previous. | `(?:\d{3})?\d{3}\d{4}`
    |


    Notice that I back off from a change made in step 11 in step 12. Although it''s
    true that step 11 made the expression less verbose, it also made it more difficult
    to read. In this case, I''m willing to have the pattern be slightly longer, if
    it will also be easier to read and maintain. Thus, the heart of my code consists
    of two lines. The first is line 32, which strips out any and all punctuation from
    the candidate:


    ```

    String tmp = phone.replaceAll("\\p{Punct}|\\s","");

    ```


    The second is line 36, which applies the pattern:


    ```

    boolean retval = tmp.matches(PHONE_PATTERN) // (\d{3})?\d{3}\d{4}

    ```


    [Listing 5-1](#LiB0042.html#ch05list01) shows the full implementation.


    **Listing 5-1: Searching for a Phone Number**


    ```

    01  import java.util.regex.*;

    02  import java.util.logging.Logger;


    03  public class MatchPhoneNumber{

    04  private static Logger log = Logger.getAnonymousLogger();

    05     private static final String PHONE_NUMBER_KEY="phoneNumber";

    06     /**

    07     * Confirms that the format for the given phone number is valid.

    08     * @param phone a String representing the phone number.

    09     * @returns true if the phone number format is acceptable.

    10    */

    11    public static boolean isPhoneValid(String phone){

    12       boolean retval=false;

    13           String msg = "\r\nCANDIDATE:" + phone;

    ```'
