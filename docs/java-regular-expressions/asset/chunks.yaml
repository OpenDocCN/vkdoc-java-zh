    \ here is that you could be leading the engine to a match very, very quickly if\
    \ you write efficient expressions. The disadvantage is that you could be leading\
    \ the regex engine on a wild goose chase before it finally gets the match by writing\
    \ inefficient expressions. ](question.gif)](#LiB0013.html#answer.N210) |\n\nAnswers\n\
    \n| [**A:**](#LiB0013.html#N19)  | In regex, ***\\b*** means a word boundary.\
    \ However, in general Java vernacular, ***\\b*** means a backspace. Here's the\
    \ rule: The literal String ***\\b*** means a backspace character. However, the\
    \ literal String ***\\\\b*** means a word boundary. |\n| [**A:**](#LiB0013.html#N53) \
    \ | Use the String.matches method if you require an exact match. For example,\
    \ if you want exactly seven consecutive digits and nothing else is acceptable,\
    \ then use String.matches with the pattern ***\\d{7}***. In general, if you're\
    \ prepared to narrow the definition of acceptable patterns, or if you're willing\
    \ to define every possible variation, then use the String.matches method. On the\
    \ other hand, if you're looking for the existence of substring, you're better\
    \ served by the Pattern and Matcher objects. |\n| [**A:**](#LiB0013.html#N87) \
    \ | No. The String.matches method simply calls the Pattern.matches method, which\
    \ in turn creates and uses both a Pattern object and a Matcher object. |\n| [**A:**](#LiB0013.html#N113) \
    \ | Absolutely not. Strings are immutable objects in Java, and thus they cannot\
    \ be changed. However, you can create a new String object that has the requested\
    \ changes. Thus, if you have \n```\nString tmp = \"Hello\";\n```\n\nand you want\
    \ to change the e to a X by doing the following:\n\n```\nString newTmp = tmp.replaceFirst(\"\
    e\",\"X\");\n```\n\nthe value of tmp is still Hello, but the value of newTmp is\
    \ HXllo. |\n| [**A:**](#LiB0013.html#N173)  | Because *John* meets the first part\
    \ of the pattern, *Mc* meets the second part of the pattern, and *Gee* meets the\
    \ second part of the pattern. As a test, try running *John Janis McGee* through\
    \ the NameFormat.java program.The point here is that *John* consists of an uppercase\
    \ letter, followed by one or more lowercase letters, followed by one space. *Mc*\
    \ consists of an uppercase letter, followed by one or more lowercase letters,\
    \ followed by no space, and *Gee* consists of an uppercase letter, followed by\
    \ one or more lowercase letters, followed by no space. This isn't exactly what\
    \ you may have had in mind, but it seems permissible in this case. It's very important\
    \ to be precise and do a lot of testing when working with regular expressions,\
    \ or unexpected results are sure to follow. |\n| [**A:**](#LiB0013.html#N210) \
    \ | J2SE uses a traditional nondeterministic finite automaton (NFA) engine. This\
    \ means that when the engine reaches a fork in the road, it chooses one path,\
    \ remembers where the other path is in case things don't work out, and goes from\
    \ there.The advantage here is that you could be leading the engine to a match\
    \ very, very quickly if you write efficient expressions. The disadvantage is that\
    \ you could be leading the regex engine on a wild goose chase before it finally\
    \ gets the match by writing inefficient expressions. |\n\n# Chapter 2: Introduction\
    \ to the Java.util.regex Object Model\n\n## Overview\n\n> *\"How do you eat an\
    \ elephant? One bite at a time.\"*\n> \n> — Proverb\n\nJava's new java.util.regex\
    \ package offers an elegant and agile object model with which to meet regular\
    \ expression needs. It is composed, in its entirety, of three objects: the Pattern\
    \ object, the Matcher object, and a PatternSyntaxException. This chapter details\
    \ all of the methods and fields of the Pattern and Matcher classes, and provides\
    \ examples of their use. In this chapter I also discuss the new regular expression\
    \ supportive methods retrofitted into the String class.\n\nThe chapter starts\
    \ with an examination of the Pattern class. I cover every method and field and\
    \ often provide examples. I also explore the Matcher class in similar detail.\
    \ Finally, I round out the chapter by discussing the regex methods that have been\
    \ added to the String class."
