  trans: "\n#### 特别说明\n\n`appendReplacement` 方法功能强大。如你所知，能力越大，细节差异越微妙。通过使用表达式 ***$d***（其中\
    \ ***d*** 是一个小于或等于上一次匹配中分组数量的数字），你实际上可以在搜索中嵌入并重组子组。例如，假设你的模式是 ***(James) (Bond)***：\n\
    \n```\nPattern p = Pattern.compile(\"(James) (Bond)\");\n```\n\n你的候选字符串是 *My name\
    \ is Bond. James Bond.*\n\n```\nString candidateString = \"My name is Bond. James\
    \ Bond.\";\n```\n\n并且你想插入中间名 *Waldo*。你的替换字符串可能如下所示：\n\n```\nString replacement\
    \ = \"$1 Waldo $2\";\n```\n\n其中 ***$1*** 指向第一个匹配的子组 *James*，***$2*** 指向第二个匹配的子组\
    \ *Bond*。\n\n在这种情况下，`StringBuffer` 将包含值 *My name is Bond. James Waldo Bond..*\
    \ 清单 2-20 给出了一个完整的工作示例。\n\n清单 2-20：使用带子组替换的 appendReplacement\n\n| **![示例开始](img/_1.gif)**\
    \ |\n\n```\nimport java.util.regex.*;\nimport java.util.*;\n/**\n * 演示 Matcher.appendReplacement\
    \ 方法\n * 与子组替换的用法。\n */\npublic class MatcherAppendReplacementGroupExample{\n\
    \  public static void main(String args[]){\n      test();\n  }\n  public static\
    \ void test(){\n     //创建一个 Pattern\n      Pattern p = Pattern.compile(\"(James)\
    \ (Bond)\");\n      //创建一个 StringBuffer\n      StringBuffer sb =new StringBuffer();\n\
    \n     //创建候选字符串\n     String candidateString =\n     \"My name is Bond. James\
    \ Bond.\";\n\n     String replacement = \"$1 Waldo $2\";\n     //尝试匹配第一个候选字符串\n\
    \     Matcher matcher = p.matcher(candidateString);\n     matcher.find();\n\n\
    \     //填充 StringBuffer\n     matcher.appendReplacement(sb,replacement);\n\n \
    \    //显示候选字符串的输出\n     String msg = sb.toString();\n     System.out.println(msg);\n\
    \  }\n}\n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n如果尚未调用 `find()` 或 `find`\
    \ 返回 false，`appendReplacement` 方法将抛出 `IllegalStateException`。如果 ***$1***、***$2***\
    \ 等引用的捕获组在 Matcher 当前正在检查的模式部分中不存在，它将抛出 `IndexOutOfBoundsException`。\n\n### public\
    \ StringBuffer appendTail(StringBuffer sb)\n\n`appendTail` 方法是 `appendReplacement`\
    \ 方法的补充。它只是将原始候选字符串中所有剩余的后续子序列追加到 `StringBuffer` 中。它从追加位置（我在 `appendReplacement`\
    \ 部分解释过）读取，直到候选字符串的末尾。\n\n在前面给出的 `appendReplacement` 示例中，你在字符串 *My name is Bond.\
    \ James Bond. I would like a martini.* 中将 *Bond* 替换为 *Smith*。完成后，你得到了一个包含值 *My\
    \ name is Smith. James Smith* 的 `StringBuffer`。\n\n这就是 `appendReplacement` 方法能为你完成的所有工作，因为它基于一次成功的匹配，而在单词\
    \ *Bond* 第二次出现中的 *d* 之后，再也找不到更多成功的匹配了。第二次调用 `appendReplacement` 后 Matcher 的状态如下图所示：\n\
    \n![点击展开](img/fig121_01_0.jpg)\n\n相应地，通过使用 `appendReplacement` 创建的 `StringBuffer`\
    \ 只会包含短语 *My name is Smith. James Smith*。`appendTail` 方法只是将字符串的其余部分，即 *. I would\
    \ like a martini.*，追加到 `StringBuffer` 缓冲区中。然后返回同一个 `StringBuffer`。\n\n### public\
    \ String replaceAll(String replacement)\n\n这个方法是我最喜欢的新增功能之一，无论是其功能还是其直观的应用程序编程接口（API）。`replaceAll`\
    \ 方法只是返回一个字符串，该字符串将描述内容的每一次出现都替换为替换内容。\n\n假设你有字符串 *I love ice. Ice is my favorite.\
    \ Ice Ice Ice.*，并且你想将 *ice* 或 *Ice* 的每一次出现都替换为单词 *Java*。第一步是描述你要查找的单词。在这种情况下，因为你想要匹配大写\
    \ *Ice* 和小写 *ice*，你将使用正则表达式模式 ***(i|I)ce***：\n\n```\nPattern pattern = Pattern.compile(\"\
    (i|I)ce\");\n```\n\n接下来，使用候选字符串获取一个 Matcher：\n\n```\nMatcher matcher = pattern.matcher(\"\
    I love ice. Ice is my favorite. Ice Ice Ice.\"); \n```\n\n最后，进行替换：\n\n```\nString\
    \ tmp = matcher.replaceAll(\"Java\");\n```\n\n现在字符串 tmp 保存了值 *I love Java. Java\
    \ is my favorite. Java Java Java.* 清单 2-21 给出了这个示例的完整代码。\n\n清单 2-21：replaceAll\
    \ 方法示例\n\n| **![示例开始](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\nimport\
    \ java.util.*;\n/**\n * 演示 Matcher.replaceAll 方法的用法\n */\npublic class MatcherReplaceAllExample{\n\
    \  public static void main(String args[]){\n      test();\n  }\n  public static\
    \ void test(){\n     //创建一个 Pattern\n      Pattern p = Pattern.compile(\"(i|I)ce\"\
    );\n\n     //创建候选字符串\n     String candidateString =\n     \"I love ice. Ice is\
    \ my favorite. Ice Ice Ice.\";\n\n     Matcher matcher = p.matcher(candidateString);\n\
    \     String tmp = matcher.replaceAll(\"Java\");\n\n     System.out.println(tmp);\n\
    \  }\n} \n```\n\n| **![示例结束](img/_1.gif)** |\n\n|  |\n\n|  | 警告  | 使用此方法将更改 Matcher\
    \ 对象的状态。具体来说，将调用 reset 方法。因此，就好像所有 start、end、group 和 find 调用都未被调用过一样。 |\n\n与 `appendReplacement`\
    \ 方法类似，`replaceAll` 方法可以通过使用 ***$*** 符号包含对子字符串的引用。有关详细信息，请参阅本章前面介绍的 `appendReplacement`\
    \ 文档。\n"
- fmt: "### `public String replaceFirst(String replacement)`\n\n`replaceFirst`方法是`replaceAll`方法的一个更聚焦的版本。该方法返回一个字符串，将描述的第一个匹配项替换为`replacement`。\n\
    \n假设你有一个候选字符串 *I love ice. Ice is my favorite. Ice Ice Ice.*，并且你想将第一个出现的`ice`或`Ice`替换为单词`Java`。同样，第一步是描述你要查找的单词。在这种情况下，由于你想同时匹配大写`Ice`和小写`ice`，你使用正则表达式模式`(i|I)ce`：\n\
    \n```\nPattern pattern = Pattern.compile(\"(i|I)ce\");\n```\n\n接下来，使用候选字符串获取一个`Matcher`：\n\
    \n```\nMatcher matcher = pattern.matcher(\"I love ice. Ice is my favorite. Ice\
    \ Ice Ice.\");\n```\n\n最后，执行替换：\n\n```\nString tmp = matcher.replaceFirst(\"Java\"\
    );\n```\n\n字符串`tmp`保存的值是 *I love Java. Ice is my favorite. Ice Ice Ice.*。[清单 2-22](#LiB0016.html#ch02list22)\
    \ 展示了此示例的完整代码。\n\n**清单 2-22：`replaceFirst`方法示例**\n\n| **![开始示例](_1.gif)** |\n\n\
    ```\nimport java.util.regex.*;\nimport java.util.*;\n/**\n * Demonstrates usage\
    \ of the\n * Matcher.replaceFirst method\n */\npublic class MatcherReplaceFirstExample{\n\
    \  public static void main(String args[]){\n      test();\n  }\n  public static\
    \ void test(){\n     //create a Pattern\n      Pattern p = Pattern.compile(\"\
    (i|I)ce\");\n\n     //create the candidate String\n     String candidateString\
    \ =\n     \"I love ice. Ice is my favorite. Ice Ice Ice.\";\n\n     Matcher matcher\
    \ = p.matcher(candidateString);\n     String tmp = matcher.replaceFirst(\"Java\"\
    );\n\n     System.out.println(tmp);\n  }} \n```\n\n| **![结束示例](_1.gif)** |\n\n\
    |  |\n\n|  | **警告** | 使用此方法将更改`Matcher`对象的状态。具体来说，会调用`reset`方法。因此，请记住，所有`start`、`end`、`group`和`find`调用都必须重新执行。\
    \ |\n\n与`appendReplacement`方法类似，`replaceFirst`方法可以通过使用`$`符号来包含对子字符串的引用。有关详细信息，请参阅本章前面介绍的`appendReplacement`文档。\n\
    \n## 新的`String`正则表达式友好方法\n\n将正则表达式引入 J2SE 所带来的最明显变化之一是在`String`类中增加了五个强大的新方法。在接下来的章节中，我将讨论这些变化，并就如何在未来的编码冒险中使用它们提供指导。\n\
    \n### 字符串定界的艺术\n\n在处理正则表达式和`String`对象时，有一个非常重要的考虑因素需要牢记：特殊字符，例如数字`\\d`和单词标记`\\\
    w`（仅举几例），在传入`String`时必须进行双重定界。例如，要搜索一个数字，你必须将使用的`\\`字符数量加倍。因此，当你在 Java `String`对象中使用`\\\
    d`时，它变成了`\\\\d`。\n\n这听起来并不复杂，但有时处理起来却出奇地困难。例如，假设你想将字符串 *I want to use a d character*\
    \ 中出现的每个字符`d`替换为`\\d`。也就是说，你希望新字符串变成 *I want to use a \\d character*。你该如何开始？\n\
    \n当然，你可以尝试这样做：\n\n```\nString retval  = tmp.replaceAll(\"d\",\"\\d\");\n```\n\n\
    这会导致编译失败，并出现非法转义字符错误。好吧，那么你将`\\`字符加倍，得到以下内容：\n\n```\nString retval  = tmp.replaceAll(\"\
    d\",\"\\\\d\");\n```\n\n这可以编译通过，但返回了一个奇怪的结果：没有任何变化。这是怎么回事？\n\n等等——回想一下，`\\\\d`作为正则表达式，并不意味着一个被定界的`d`字符；它意味着一个数字。嗯，那当然行不通。你的候选字符串中没有数字。尝试添加另一个`\\\
    `字符来定界`\\\\\\d`：\n\n```\nString retval  = tmp.replaceAll(\"d\",\"\\\\\\d\");\n\
    ```\n\n这再次因非法转义字符错误而编译失败。这真令人沮丧。本书中的内容不是说在尝试定界特殊字符时要添加一个`\\`字符吗？\n\n嗯，实际上，它并没有这么说。本书中的内容是说要将`\\\
    `字符的数量*加倍*。因为当前有两个`\\`字符，将它们加倍会得到表达式`\\\\\\\\d`。看起来很奇怪，但无论如何试试看：\n\n```\nString\
    \ retval  = tmp.replaceAll(\"d\",\"\\\\\\\\d\");\n```\n\n令人惊讶的是，它成功了！但为什么它能成功？因为`\\\
    \\\\\\d`中的第一个`\\`充当了第二个`\\`的定界符。类似地，第三个`\\`充当了第四个`\\`字符的定界符。\n\n好了，现在一切都清楚了。尝试将字符串\
    \ *I want to use a $ character* 中的`$`替换掉，使得结果字符串变为 *I want to use a \\$ character*。有关解决方案，请参阅本章末尾的常见问题解答部分。\n\
    \n### `public boolean matches(String regex)`\n\n`String.matches`方法可能是你最常使用的正则表达式方法。它简单地将给定的`String`与一个候选正则表达式进行比较，如果两者在正则表达式意义上*完全*匹配，则返回`true`。例如，对于字符串\n\
    \n```\nString num = \"4\";\n```\n\n将`4`与代表单个数字的`\\d`进行比较，将返回`true`：\n\n```\nnum.matches(\"\
    \\\\d\");\\\\returns true\n```\n\n然而，将`4`（即`4`后跟一个空格）与数字`\\d`进行比较，将返回`false`。类似地，将`4`（即`4`后面没有空格）与`\\\
    d`（即一个数字后跟一个空格）进行比较，也将返回`false`。\n\n这里的要点是，当你使用此方法时，*必须小心确保正则表达式完整地描述了整个* `String`，*并且没有描述任何不属于该*\
    \ `String` *的内容*。根据前面的例子，即使是一个空格，也可能使你的匹配偏离轨道。\n\n在幕后，此方法实例化一个`Pattern`对象，并简单地传递到前面讨论过的`Pattern.matches`方法。如果你将要执行大量`matches`操作，你可能会发现显式创建`Pattern`和`Matcher`对象并直接使用它们会更高效。\n\
    \n如果传入的正则表达式无效，则此方法将抛出`PatternSyntaxException`错误。如果正则表达式为`null`，`matches`将抛出`NullPointerException`。\n\
    \n### `public String replaceFirst (String regex, String replacement)`\n\n`String.replaceFirst`方法将正则表达式描述的第一个匹配项替换为此方法第二个参数所表示的`String`。因此，对于字符串`tmp`\n\
    \n```\nString tmp = \"I want to eat 5 hamburgers, 7 days a week\";\n```\n\n命令\n\
    \n```\nString newTmp = tmp.replaceFirst(\"\\d\",\"900\");\n```\n\n将`newTmp`设置为\
    \ *I want to eat 900 hamburgers, 7 days a week*。\n\n在幕后，此方法实例化`Pattern`和`Matcher`对象，并简单地传递到前面讨论过的`Matcher.replaceFirst`方法。如果你将要执行大量`replaceFirst`操作，你可能会发现显式创建`Pattern`和`Matcher`对象并直接使用它们会更高效。\n\
    \n|  | **注意** | 如果你显式创建`Pattern`和`Matcher`对象并直接使用它们，你可能希望通过在适当位置添加行尾`$`和行首`^`字符来优化你的模式。\
    \ |\n\n如果传入的正则表达式无效，则此方法将抛出`PatternSyntaxException`错误。如果正则表达式为`null`，`replaceFirst`将抛出`NullPointerException`。"
  raw: "### public String replaceFirst(String replacement)\n\nThe replaceFirst method\
    \ is a more focused version of the replaceAll method. This method returns a String\
    \ that replaces the *first* occurrence of the description with the replacement.\n\
    \nImagine that you have the candidate *I* *love ice. Ice is my favorite. Ice Ice\
    \ Ice.*, and you want to replace the first occurrence of *ice* or *Ice* with the\
    \ word *Java*. Again, your first step is to describe the word you want to look\
    \ for. In this case, because you want to match both uppercase *Ice* and lowercase\
    \ *ice*, you use the regex pattern ***(i|I)ce***:\n\n```\nPattern pattern = Pattern.compile(\"\
    (i|I)ce\");\n```\n\nNext, use the candidate String to get a Matcher:\n\n```\n\
    Matcher matcher = pattern.matcher(\"I love ice. Ice is my favorite. Ice Ice Ice.\"\
    );\n```\n\nFinally, make the replacement:\n\n```\nString tmp = matcher.replaceFirst(\"\
    Java\");\n```\n\nThe string tmp holds the value *I* *love Java. Ice is my favorite.\
    \ Ice Ice Ice.*. [Listing 2-22](#LiB0016.html#ch02list22) presents the complete\
    \ code for this example.\n\nListing 2-22: replaceFirst Method Example\n\n| **![Start\
    \ example](_1.gif)** |\n\n```\nimport java.util.regex.*;\nimport java.util.*;\n\
    /**\n * Demonstrates usage of the\n * Matcher.replaceFirst method\n */\npublic\
    \ class MatcherReplaceFirstExample{\n  public static void main(String args[]){\n\
    \      test();\n  }\n  public static void test(){\n     //create a Pattern\n \
    \     Pattern p = Pattern.compile(\"(i|I)ce\");\n\n     //create the candidate\
    \ String\n     String candidateString =\n     \"I love ice. Ice is my favorite.\
    \ Ice Ice Ice.\";\n\n     Matcher matcher = p.matcher(candidateString);\n    \
    \ String tmp = matcher.replaceFirst(\"Java\");\n\n     System.out.println(tmp);\n\
    \  }} \n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\n|  | Caution  | Using\
    \ this method will change the state of your Matcher object. Specifically, the\
    \ reset method will be called. Therefore, remember that all start, end, group,\
    \ and find calls will have to be re-executed. |\n\nLike the appendReplacement\
    \ method, the replaceFirst method can contain references to substring by using\
    \ the ***$*** symbol. For details, please see the appendReplacement documentation\
    \ presented earlier in the chapter.\n\n## New String Rejex-Friendly Methods\n\n\
    One of the most obvious changes brought about by the introduction of regular expressions\
    \ into J2SE is the addition of five powerful new methods in the String class.\
    \ In the following sections I discuss these changes and offer direction on how\
    \ you can use them in your future coding adventures.\n\n### The Art of Delimiting\
    \ Strings\n\nThere's one very important consideration that you have to keep in\
    \ mind when you work with regular expressions and String objects: Special characters,\
    \ such as the digit, ***\\d***, and the word token, ***\\w***, to name just a\
    \ couple, have to be delimited twice when passed into a String. For example, to\
    \ search for a digit, you must double the number of *\\* characters you use. Thus,\
    \ ***\\d*** becomes ***\\\\d*** when you use it in a Java String object.\n\nThis\
    \ doesn't sound overly complicated, but it can be surprisingly difficult to deal\
    \ with at times. For example, imagine that you want to replace every occurrence\
    \ of the character *d* in *I* *want to use a d character* with *\\d*. That is,\
    \ you want the new String to say *I* *want to use a \\d character*. How do you\
    \ start?\n\nOf course, you could try this:\n\n```\nString retval  = tmp.replaceAll(\"\
    d\",\"\\d\");\n```\n\nwhich fails to compile with an illegal escape character\
    \ error. OK, so you double up the *\\* characters to achieve the following:\n\n\
    ```\nString retval  = tmp.replaceAll(\"d\",\"\\\\d\");\n```\n\nThis manages to\
    \ compile, but it returns the bizarre result of no change at all. What's going\
    \ on here?\n\nWait—recall that ***\\\\d***, as a regular expression, doesn't mean\
    \ a delimited *d* character; it means a digit. Well, of course that wouldn't have\
    \ worked. Your candidate doesn't have any digits. Try adding another *\\* character\
    \ to delimit the ***\\\\\\d***:\n\n```\nString retval  = tmp.replaceAll(\"d\"\
    ,\"\\\\\\d\");\n```\n\nThis again fails to compile with an illegal escape character\
    \ error. This is getting frustrating. Didn't the material in this book say to\
    \ add a *\\* character when trying to delimit special characters?\n\nWell, actually,\
    \ it didn't. The material in this book said to *double* the number of *\\* characters.\
    \ Because there are currently two *\\* characters, doubling them would create\
    \ ***\\\\\\\\d*** as the expression. It looks weird, but try it anyway:\n\n```\n\
    String retval  = tmp.replaceAll(\"d\",\"\\\\\\\\d\");\n```\n\nAmazingly, it works!\
    \ But why did it work? Because the first *\\* of ***\\\\\\\\d*** acts as a delimiter\
    \ for the second *\\*. Similarly, the third ***\\*** acts as a delimiter for the\
    \ fourth *\\* character.\n\nOK, that's all clear now. Try to swap out the *$*\
    \ in *I* *want to use a $ character* so that the resulting String reads *I* *want\
    \ to use a \\$ character*. See the FAQs section at the end of this chapter for\
    \ the solution.\n\n### public boolean matches(String regex)\n\nThe String.matches\
    \ method is probably the regex method you'll use most often. It simply compares\
    \ the given String to a candidate regex and returns true if the two match *exactly*\
    \ in terms of regular expressions. For example, for the String\n\n```\nString\
    \ num = \"4\";\n```\n\ncomparing *4* to ***\\d***, which represents a single digit,\
    \ will return true:\n\n```\nnum.matches(\"\\\\d\");\\\\returns true\n```\n\nHowever,\
    \ comparing *4* (that is, *4* followed by a space) to a digit, ***\\d***, will\
    \ return false. Similarly, comparing *4* (that is, *4* with no space after it)\
    \ to ***\\d*** (that is, a digit followed by a space) will also return false.\n\
    \nThe point here is that, when you use this method, *you have to be careful that*\
    \ *the regular expression describes the entirety of the* String *and does not\
    \ describe* *anything that is not a part of the* String. Even a space, per the\
    \ preceding example, can throw your match off-kilter.\n\nBehind the scenes, this\
    \ method instantiates a Pattern object and simply makes a pass through to the\
    \ Pattern.matches method discussed earlier. If you're going to be doing a lot\
    \ of matches operations, you'll probably find it more efficient to explicitly\
    \ create Pattern and Matcher objects, and use them directly.\n\nIf the regular\
    \ expression passed in is invalid, then this method will throw a PatternSyntaxException\
    \ error. If the regular expression is null, matches will throw a NullPointerException.\n\
    \n### public String replaceFirst (String regex, String replacement)\n\nThe String.replaceFirst\
    \ method replaces the first occurrence of the regex description, with the String\
    \ represented by the second parameter of this method. Thus, for the String tmp\n\
    \n```\nString tmp = \"I want to eat 5 hamburgers, 7 days a week\";\n```\n\nthe\
    \ command\n\n```\nString newTmp = tmp.replaceFirst(\"\\d\",\"900\");\n```\n\n\
    sets newTmp to *I* *want to eat 900 hamburgers, 7 days a week*.\n\nBehind the\
    \ scenes, this method instantiates Pattern and Matcher objects, and simply makes\
    \ a pass through to the Matcher.replaceFirst method discussed earlier. If you're\
    \ going to be doing a lot of replaceFirst operations, you'll probably find it\
    \ more efficient to explicitly create Pattern and Matcher objects, and use them\
    \ directly.\n\n|  | Note  | If you explicitly create Pattern and Matcher objects\
    \ and use them directly, you may want to optimize your patterns by putting in\
    \ end-of-line ***$*** and beginning-of-line ***^*** characters where appropriate.\
    \ |\n\nIf the regular expression passed in is invalid, then this method will throw\
    \ a PatternSyntaxException error. If the regular expression is null, replaceFirst\
    \ will throw a NullPointerException."
