- fmt: "A couple of questions naturally arise from this example:\n\n- *Why did John\
    \ Q Public fail?* Because `Q` is not a name token, as you've defined name tokens\
    \ (i.e., a capital letter followed by one or more lowercase letters).\n- *Why\
    \ did John allen Smith fail?* Because `allen` doesn't start with a capital letter.\n\
    - *Why did John fail?* Although `John` is a valid name token, it isn't repeated\
    \ two or three name tokens. It's simply one name token.\n- *Why did John McGee\
    \ pass?* `McGee` isn't an uppercase letter followed by any number of lowercase\
    \ letters. Try to puzzle this one out on your own. It's answered in the \"[FAQs](#LiB0013.html#184)\"\
    \ section at the end of the chapter.\n\nThis example uses the composition technique\
    \ mentioned at the beginning of this chapter. That is, it uses patterns previous\
    \ defined to compose a new pattern. If you think about it, this is a very engineer-like\
    \ thing to do: Build small blocks, then use those blocks to build more complicated\
    \ pieces.\n\n### Confirming Addresses Example\n\nThe code in [Listing 1-6](#LiB0009.html#ch01list06)\
    \ simply determines if the given address meets the criterion of being well formatted.\
    \ It takes advantage of the name and zip code patterns created earlier, and it\
    \ adds its own address pattern. [Output 1-6](#LiB0009.html#ch01ex06) shows the\
    \ result of running the program. [Table 1-23](#LiB0009.html#ch01table23) dissects\
    \ the pattern.\n\n**Table 1-23: The Pattern** `^(\\p{Upper}(\\p{Lower}+\\s?)){2,3}\\\
    w+ .*, \\w+ \\d{5}(-\\d{4})?$`\n\n| **Regex** | **Description** |\n| --- | ---\
    \ |\n| `^` | The beginning of a line followed by |\n| `(` | A group consisting\
    \ of |\n| `\\p{Upper}` | An uppercase character |\n| `(` | Followed by a inner\
    \ group consisting of |\n| `\\p{Lower}` | A lowercase character |\n| `+` | Repeated\
    \ one or more times |\n| `\\s?` | Followed by an optional space |\n| `)` | The\
    \ end of the inner group |\n| `)` | The end of the outer group |\n| `{` | Repeated\
    \ at least |\n| `2` | Two times |\n| `,` | But no more than |\n| `3` | Three times\
    \ |\n| `<space>` | Followed by a space |\n| `\\w` | Followed by a any alphanumeric\
    \ character |\n| `+` | Repeated one or more times |\n| `<space>` | Followed by\
    \ a space |\n| `.` | Followed by any character |\n| `*` | Repeated any number\
    \ of times |\n| `,` | Followed by a comma |\n| `<space>` | Followed by a space\
    \ |\n| `\\w` | Followed by any alphanumeric character |\n| `+` | Repeated one\
    \ or more times |\n| `<space>` | Followed by a space |\n| `\\d` | Followed by\
    \ a digit |\n| `{` | Repeated at least |\n| `5` | Five times |\n| `}` | End repetition\
    \ |\n| `(` | Open group |\n| `-` | Consisting of a hyphen |\n| `\\d` | A digit\
    \ |\n| `{` | Repeated at least |\n| `4` | Four times |\n| `}` | End repetition\
    \ |\n| `)` | The end of this group |\n| `?` | Look for zero or one of the preceding\
    \ |\n| **In English:** | Look for a name token, as previously defined, followed\
    \ by some words, a comma, and then more words, followed by a zip code. This example\
    \ uses the composition technique. |\n\n**Listing 1-6: MatchAddress.java**\n\n\
    ```\nimport java.util.regex.*;\nimport java.io.*;\n\npublic class MatchAddress{\n\
    \    public static void main(String args[]){\n        isAddressValid(args[0]);\n\
    \    }\n\n/**\n    * Confirms that the format for the given address is valid.\n\
    \    * @param addr is a String representing the address\n    * @returns true if\
    \ the zip code format is acceptable.\n    */\n    public static boolean isAddressValid(String\
    \ addr){\n       boolean retval = false;\n\n//use the name pattern created earlier.\n\
    \       String nameToken =\"\\\\p{Upper}(\\\\p{Lower}+\\\\s?)\";\n\nString namePattern\
    \ = \"(\"+nameToken+\"){2,3}\";\n\n//use the zip code pattern created earlier.\n\
    \       String zipCodePattern = \"\\\\d{5}(-\\\\d{4})?\";\n\n//construct an address\
    \ pattern\n      String addressPattern = \"^\" + namePattern\n         + \"\\\\\
    w+ .*, \\\\w+ \" + zipCodePattern +\"$\";\n\nretval= addr.matches(addressPattern);\n\
    \n//prepare a message indicating success or failure\n      String msg = \"NO MATCH\\\
    npattern:\\n \" + addr\n         + \"\\nregexLength:\\n \"\n         + addressPattern;\n\
    \nif (retval){\n      msg = \"MATCH\\npattern:\\n \" + addr\n         + \"\\nregexLength:\\\
    n \"\n         + addressPattern;\n      }\n      System.out.println(msg +\"\\\
    r\\n\");\n      return retval;\n   }\n}\n```\n\n**Output 1-6: Result of Running\
    \ MatchAddress.java**\n\n```\nC:\\RegEx\\chapter_1\\Examples\\chapter1>\njava\
    \ MatchAddress \"John Smith 888 Luck Street,\nNY 64332\"\nMATCH\npattern:\n John\
    \ Smith 888 Luck Street, NY 64332\nregexLength:\n ^(\\p{Upper}(\\p{Lower}+\\s?)){2,3}\\\
    w+ .*, \\w+ \\d{5}(-\\d{4})?$\n\nC:\\RegEx\\chapter_1\\Examples\\chapter1>\njava\
    \ MatchAddress \"John A. Smith 888 Luck Stree\nt, NY 64332-4453\"\nNO MATCH\n\
    pattern:\n John A. Smith 888 Luck Street, NY 64332-4453\nregexLength:\n ^(\\p{Upper}(\\\
    p{Lower}+\\s?)){2,3}\\w+ .*, \\w+ \\d{5}(-\\d{4})?$\n\nC:\\RegEx\\chapter_1\\\
    Examples\\chapter1>\njava MatchAddress \"John Allen Smith 888 Luck Street, NY\
    \ 64332-4453\"\nMATCH\npattern:\n John Allen Smith 888 Luck Street, NY 64332-4453\n\
    regexLength:\n ^(\\p{Upper}(\\p{Lower}+\\s?)){2,3}\\w+ .*, \\w+ \\d{5}(-\\d{4})?$\n\
    \nC:\\RegEx\\chapter_1\\Examples\\chapter1>\njava MatchAddress \"888 Luck Street,\
    \ NY 64332\"\nNO MATCH\npattern:\n 888 Luck Street, NY 64332\nregexLength:\n ^(\\\
    p{Upper}(\\p{Lower}+\\s?)){2,3}\\w+ .*, \\w+ \\d{5}(-\\d{4})?$\nC:\\RegEx\\chapter_1\\\
    Examples\\chapter1>\njava MatchAddress \"P.O. BOX 888 Luck Street, NY 64332-4453\"\
    \nNO MATCH\npattern:\n P.O. BOX 888 Luck Street, NY 64332-4453\nregexLength:\n\
    \ ^(\\p{Upper}(\\p{Lower}+\\s?)){2,3}\\w+ .*, \\w+ \\d{5}(-\\d{4})?$\n\nC:\\RegEx\\\
    chapter_1\\Examples\\chapter1>\njava MatchAddress \"John Allen Smith 888 Luck\
    \ st., NY\"\nNO MATCH\npattern:\n John Allen Smith 888 Luck st., NY\nregexLength:\n\
    ^(\\p{Upper}(\\p{Lower}+\\s?)){2,3}\\w+ .*, \\w+ \\d{5}(-\\d{4})?$\n```"
