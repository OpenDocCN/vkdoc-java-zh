  trans: "\n### 正向先行断言\n\n*正向先行断言*允许你的正则表达式“向前查看”，并确保在尝试进行后续匹配之前，候选字符串中确实存在该模式。然而，它们不会消耗（消费）这些文本——它们只是确认其存在的事实。本质上，这是一种告诉正则引擎“如果候选字符串没有该先行断言，就别费劲去匹配了”的方式。通过使用字符\
    \ ***(?=*** 来开启分组即可构成正向先行断言。例如，先行断言\n\n```\n(?=\\d\\d)\n```\n\n确认候选字符串包含连续的两个数字。但是，它不会消耗这两个数字。与其他正则模式结合使用时，正向先行断言可以成为你正则表达式武器库中非常强大的武器。\n\
    \n假设你想匹配 IP 地址，但仅当它们以 *255* 开头时。此外，如果它们确实以 *255* 开头，你希望匹配整个正则模式。使用先行断言，这个问题很容易解决，如代码清单\
    \ 3-8 所示。当然，这个例子对数据的友好性做了很多假设。即便如此，它很好地说明了先行断言的用法，所以一切都可以原谅。紧随代码清单 3-8 之后的表 3-2\
    \ 分解了正则模式 ***(?=²⁵⁵).****。\n\n表 3-2：模式 *(?=²⁵⁵)*. ^([*])\n\n| **正则表达式** | **描述**\
    \ |\n| --- | --- |\n| (?= | 一个正向先行断言，包含 |\n| ^ | 行首字符，后跟 |\n| 2 | 字符 2，后跟 |\n\
    | 5 | 字符 5，后跟 |\n| 5 | 字符 5，后跟 |\n| ) | 关闭先行断言分组 |\n| . | 任意字符 |\n| * | 重复零次或多次\
    \ |\n| ^([*])*中文释义：* 如果 IP 地址以 255 开头，则捕获整个 IP 地址。 |\n\n代码清单 3-8：简单的正向先行断言示例\n\
    \n| **![开始示例](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\n\npublic class\
    \ PositiveLookaheadExample{\n    public static void main(String args[]){\n   \
    \     //定义模式\n        String regex = \"(?=²⁵⁵).*\";\n\n        //编译模式\n      \
    \  Pattern pattern = Pattern.compile(regex);\n\n        //定义候选字符串\n        String\
    \ candidate = \"255.0.0.1\";\n\n        //为候选字符串提取一个匹配器\n        Matcher matcher\
    \ = pattern.matcher(candidate);\n\n        String ip =\"not found\";\n\n     \
    \   //如果候选字符串以 255 开头，则 ip\n        //将被填充正确的信息。\n        if (matcher.find())\n\
    \            ip=matcher.group();\n\n        String msg =\"ip: \" + ip;\n\n   \
    \     System.out.println(msg);\n    }\n} \n```\n\n| **![结束示例](img/_1.gif)** |\n\
    \n|  |\n\n在代码清单 3-8 中，正则引擎在尝试执行模式的其余部分之前，首先确认候选字符串以 *255* 开头。如果候选字符串不是这样，那么模式的其余部分就不可能匹配，从而不会浪费资源去尝试匹配。\n\
    \n请注意，使用非捕获分组 ***(?:=²⁵⁵)*** 代替 ***(?=²⁵⁵)*** 来确认 *255* 的存在是行不通的，因为 ***(?:=²⁵⁵)***\
    \ 会消耗字符 *255*（即使它不捕获它们），并返回其后的 *.0.0.1*。\n\n### 负向先行断言\n\n*负向先行断言*，与正向先行断言一样，允许你的正则表达式“向前查看”。但是，它们允许引擎确认候选字符串中某处*不*存在某些内容。与所有先行断言一样，它们不消耗文本；它们只是确认其不存在的事实。通过使用字符\
    \ ***(?!*** 来开启分组即可构成负向先行断言。例如：\n\n```\n(?!\\d\\d)\n```\n\n确认候选字符串不包含连续的两个数字。它不会消耗这两个数字。\n\
    \n假设你正在解析文本，想要查找对 *John* 的引用，并提取名字和姓氏，除非该引用恰好是 *John Smith*。使用负向先行断言，这类练习变得非常容易。代码清单\
    \ 3-9 演示了执行此操作的代码。表 3-3 分解了所使用的正则模式。\n\n表 3-3：模式 *John (?!Smith)[A-Z]\\\\w*+\n\
    \n| **正则表达式** | **描述** |\n| --- | --- |\n| J | 字符 *J*，后跟 |\n| o | 字符 *o*，后跟 |\n\
    | h | 字符 *h*，后跟 |\n| n | 字符 *n*，后跟 |\n| <space> | 一个空格，后跟 |\n| (?! | 一个位置，在该位置你将找到除\
    \ |\n| S | 字符 *S*，后跟 |\n| m | 字符 *m*，后跟 |\n| i | 字符 *i*，后跟 |\n| t | 字符 *t*，后跟\
    \ |\n| h | 字符 *h* 之外的任何内容 |\n| ) | 关闭先行断言分组，后跟 |\n| [A-Z] | 任意大写字符，后跟 |\n| \\\
    w | 一个单词字符 |\n| + | 重复一次或多次，后跟 |\n| \\w | 任意单词字符 |\n| * | 重复零次或多次 |\n| * **中文释义：**\
    \ 查找并捕获 *John* 后跟某个大写单词的出现，除非该单词是 *Smith*。 |\n\n代码清单 3-9：简单的负向先行断言示例\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\nimport java.util.regex.*;\npublic class NegativeLookaheadExample{\n\
    \    public static void main(String args[])\n    throws Exception\n    {\n   \
    \     //定义模式\n        String regex = \"John (?!Smith)[A-Z]\\\\w+\";\n\n      \
    \  //编译模式\n        Pattern pattern = Pattern.compile(regex);\n\n        String\
    \ candidate = \"I think that John Smith \";\n        candidate +=\"is a fictional\
    \ character. His real name \";\n        candidate +=\"might be John Jackson, John\
    \ Westling, \";\n        candidate +=\"or John Holmes for all we know.\";\n\n\
    \        //为候选字符串提取一个匹配器\n        Matcher matcher = pattern.matcher(candidate);\n\
    \n        String tmp=null;\n\n        //提取匹配的分组。注意它是\n        //默认分组，因为环视结构是\n\
    \        //非捕获的\n        while (matcher.find()){\n            tmp=matcher.group();\n\
    \            System.out.println(\"MATCH:\" + tmp);\n        }\n    }\n} \n```\n\
    \n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n在代码清单 3-9 中，正则引擎首先解析候选字符串，并将成功的匹配视为由\
    \ *John* 后跟某个大写单词（除非该大写单词是 *Smith*）组成的那些匹配。同样重要的是要注意，使用非捕获分组允许你捕获整个匹配，因为它没有被消耗。\n"
- fmt: "### Positive Lookbehinds\n\nSo far, you've explored the ability to look to\
    \ the right of the candidate String to \"peek ahead\" and see what the future\
    \ has in store for your pattern. Similarly, there are times when it's useful to\
    \ be able to look to the left of the current position being considered to see\
    \ what the past had to say about a particular pattern. That is the purpose of\
    \ *lookbehinds.*\n\nLike lookaheads, lookbehinds come in two flavors. *Positive\
    \ lookbehinds* confirm the existence of a pattern to the left of the current position,\
    \ and *negative lookbehinds* confirm the *absence* of a pattern to the left of\
    \ the current pattern. You form positive lookbehinds by opening a noncapturing\
    \ group with `(?<=`. Thus, to confirm that two digits preceded the current expression,\
    \ you might use the following positive lookbehind:\n\n```\n(?<=\\d\\d).*\n```\n\
    \nThis confirms that the candidate string was preceded by two digits in a row.\
    \ It doesn't consume those two digits; however, it acts like it did because *they're\
    \ beyond the scope of the capture*. This happens because the expression parser\
    \ has already moved past them. That is, the parse has, by definition, already\
    \ tried to match them and failed to do so. It if hadn't, it would have stopped\
    \ trying to find the next match.\n\nConsider the candidate *42 is the answer*.\
    \ When the regex engine compares this candidate String against the pattern `(?<=\\\
    d\\d).*`, it starts by examining the first character, which is *4*. Because two\
    \ digits don't precede *4*, it's rejected. Next, the engine compares the *2* character.\
    \ Because *2* is also not preceded by two digits, it is discarded. Next, the regex\
    \ engine examines the space character following *2* in the candidate string *42\
    \ is the answer*. Because that space character is, in fact, preceded by two digits,\
    \ namely *4* and *2*, the regex engine happily starts to match. Of course, because\
    \ the remaining part of the pattern is `.*`, every remaining character is matched.\
    \ Thus, the space following *42* and everything thereafter is captured. But *4*\
    \ and *2* aren't captured, because the regex engine already passed them.\n\nBecause\
    \ the regex engine is already past the *4* and the *2* characters, it won't match\
    \ them. This is an important and subtle distinction. Lookbehinds, like all lookarounds,\
    \ are noncapturing. However, in this case, they appear to act as if they've already\
    \ captured the *4* and the *2* characters. That is, the characters *4* and *2*\
    \ are excluded from the capture set. However, that's because they've already been\
    \ parsed, not because they've been captured. It's important to be able to see\
    \ through this illusion.\n\n[Listing 3-10](#LiB0029.html#ch03list10) demonstrates\
    \ some code for using positive lookbehinds. The goal is to parse a document's\
    \ content and extract any URLs used. [Table 3-4](#LiB0029.html#ch03table04) deconstructs\
    \ the regex pattern used.\n\n**Table 3-4: The Pattern `(?<=http://)\\S+`**\n\n\
    | **Regex** | **Description** |\n|-----------|-----------------|\n| `(?<=` | Open\
    \ a positive lookbehind group consisting of |\n| `h` | The character *h* followed\
    \ by |\n| `t` | The character *t* followed by |\n| `t` | The character *t* followed\
    \ by |\n| `p` | The character *p* followed by |\n| `:` | The character *:* followed\
    \ by |\n| `/` | The character */* followed by |\n| `/` | The character */* followed\
    \ by |\n| `\\S` | A nonspace character |\n| `+` | Repeated one or more times |\n\
    | **In English:** Match a URL if that URL is preceded by *http://*. |\n\n**Listing\
    \ 3-10: Simple Positive Lookbehind Example**\n\n```\nimport java.util.regex.*;\n\
    public class PositiveLookBehindExample{\n    public static void main(String args[])\n\
    \    throws Exception\n    {\n\n//define the pattern\n        String regex = \"\
    (?<=http://)\\\\S+\";\n\n//compile the pattern\n        Pattern pattern = Pattern.compile(regex);\n\
    \nString candidate = \"The Apress website can be found at \";\n        candidate\
    \ +=\"http://www.apress.com. There, \";\n        candidate +=\"you can find information\
    \ about some of \";\n        candidate +=\"best books in the industry, including\
    \ the \";\n        candidate +=\" bestselling Sun Certified Java Developer \"\
    ;\n        candidate +=\" Exam with J2SE(\";\n        candidate +=\"http://www.apress.com/book/bookDisplay.\"\
    ;\n        candidate +=\"html?bID=39) as well as others.\";\n\n//extract a matcher\
    \ for the candidate string\n        Matcher matcher = pattern.matcher(candidate);\n\
    \n//if the url was found, print it out here.\n        while (matcher.find()){\n\
    \            String msg =\":\"+ matcher.group()+\":\";\n            System.out.println(msg);\n\
    \        }\n    }\n}\n```\n\n### Negative Lookbehinds\n\n*Negative lookbehinds*\
    \ confirm the *absence* of a pattern to the left of the current pattern. They're\
    \ a way of telling the regex engine, \"I'm interested in the candidate String,\
    \ so long as it isn't preceded by such and such.\" You form negative lookbehinds\
    \ by opening a noncapturing group with `(?<!`.\n\nNegative lookbehinds aren't\
    \ as intuitive as the other lookarounds, so it's worthwhile to explore how they\
    \ actually work. For example, consider the following negative lookbehind:\n\n\
    ```\n(?<!\\d\\d).*\n```\n\nThe preceding seems to request that the candidate string\
    \ not be preceded by two digits in a row. However, when you actually test it against\
    \ the String *42 is the answer*, it matches the entire candidate. What's going\
    \ on here?\n\nThe problem is that the first element in the candidate *42 is the\
    \ answer* is *4*. So the engine asks itself if the *4* character is preceded by\
    \ two digits. Because the answer is no, the entire pattern is matched into group(0).\
    \ Remember, `.*` is a greedy qualifier, so it matches as much as possible—in this\
    \ case, the entire candidate string.\n\n## Zen and the Art of Efficient Expressions\n\
    \nThis section deals presents some techniques you can use to optimize your regular\
    \ expressions in J2SE. It's designed to help you deal with regular expressions\
    \ that already exist, as well as establish a framework for writing new ones. The\
    \ suggestions in this section, along with your own intuition and an active awareness\
    \ of the nature of your data, will help you optimize your own regex.\n\n### Use\
    \ Noncapturing Groups Where Possible\n\nCapturing groups requires that the JVM\
    \ keep track of them. This can be very helpful if you need to extract the groups\
    \ or if you need back references to them later on in the expression. However,\
    \ if you're using groups strictly for logical purposes, it's worthwhile to make\
    \ them noncapturing, as this conserves memory use.\n\nThe example given earlier\
    \ for the pattern `(?:good|bad|terrible|great) morning` groups the various kinds\
    \ of mornings into a logical unit, but it has no need to capture them. Thus, the\
    \ group is noncapturing and opens with `?:` inside the opening parenthesis.\n\n\
    ### Precheck Your Candidate Strings\n\nIf you're looking for a specific string,\
    \ you might save CPU cycles by first making sure that the string in question actually\
    \ exists in your candidate. For example, say you want to parse a string that might\
    \ contain an e-mail address, and if it does, you want to extract the domain of\
    \ the e-mail address. It makes sense to first make sure that the candidate contains\
    \ an *@* symbol, and then begin the regex search. Thus, the following is an inexpensive\
    \ way to check for the necessity of even compiling your pattern:\n\n```\nif (candidate.indexOf(\"\
    @\")) //..try to extract domain information.\n```"
