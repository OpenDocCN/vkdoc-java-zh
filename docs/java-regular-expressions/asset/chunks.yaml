- fmt: "### [Appendix C](#LiB0057.html#615)\n\n[Appendix C](#LiB0057.html#615) offers\
    \ simple regular expressions, without accompanying code, to help with everyday,\
    \ common tasks such as validating e-mails, checking text for format, extracting\
    \ values, and so on.\n\n# Chapter 1: Regular Expressions\n\n## Overview\n\n> *\"\
    Everything, you see, makes sense, if you take the trouble to work out the rational.\"\
    *\n> \n> — Piers Anthony\n\n*Regular expressions,* or *regex* for short, describe\
    \ text. They are a mechanism by which you can tell the Java Virtual Machine (JVM)\
    \ how to find and potentially manipulate text for you. In this chapter, I'll examine\
    \ and contrast the traditional approach of describing text with the regex approach.\n\
    \nFor example, imagine you need to validate e-mail addresses. The verbal directions\
    \ for doing so might be something along the lines of \"Make sure the e-mail address\
    \ contains an at (@) symbol.\" You could probably handle this task with a single\
    \ line of Java code:\n\n```\nIf (email.indexOf(\"@\") > 0) {\n   return true;\n\
    }\n```\n\nSo far, so good. Suppose additional requirements creep in, though, as\
    \ they invariably do. Now you also need to make sure that all e-mail addresses\
    \ end with the `.org` extension. So you amend your code as follows:\n\n```\nIf\
    \ ((email.indexOf(\"@\") > 0) && (email.endsWith(\".org\"))){\n   return true;\n\
    }\n```\n\nBut the requirements continue to creep. You now need all e-mail addresses\
    \ to be of the form `firstname_lastname`, so you use the `StringTokenizer` to\
    \ tokenize the e-mail address, extract the part before the `@`, look for the underscore\
    \ (`_`) character, tokenize the strings around that, and so on. Pretty soon, you\
    \ have some convoluted code for what should be a fairly straightforward operation.\n\
    \nThe use of regular expressions can greatly simplify and condense this process.\
    \ With regular expressions, you could write the following:\n\n```\nString regex\
    \ = \"[A-Za-z]+_[A-Za-z]+@[A-Za-z]+\\\\.org\";\nif (email.matches(regex)) return\
    \ true; \n```\n\nIn English, this means \"Look for one or more letters, followed\
    \ by an `_`, followed by one or more letters, followed by an `@`, followed by\
    \ one or more letters, followed by `.org`.\" Notice that a period precedes the\
    \ *o* in \"org\".\n\nDon't be concerned if the syntax isn't completely clear to\
    \ you right now— making it clear is the aim of this book. This chapter explores\
    \ the underlying concepts of Java regex, with an emphasis on actually forming\
    \ and using the regex syntax. It's a complete introduction to regular expressions,\
    \ and it also serves as a preamble to the [next chapter](#LiB0014_split_000.html#187).\
    \ [Chapter 2](#LiB0014_split_000.html#187), in turn, is a complete and exhaustive\
    \ documentation of the J2SE regex object model.\n\n## The Building Blocks of Regular\
    \ Expressions\n\nRegular expressions in Java 2 Standard Edition (J2SE) consist\
    \ of two essential parts, which are embodied by two new Java objects. The first\
    \ part is a `Pattern`, and the second is a `Matcher`. Understanding these two\
    \ objects is crucial to your ability to master regular expressions. Fortunately,\
    \ they're easy concepts to understand.\n\nI define these concepts in detail in\
    \ the sections that follow, but at a general level, a *pattern* describes what\
    \ you're searching for, and a *matcher* examines candidates that might match the\
    \ pattern or description. For example, `\\s+` is a pattern describing one or more\
    \ spaces. Correspondingly, J2SE now provides the `Pattern` and `Matcher` objects.\n\
    \n|  | Note  | When I refer to a candidate or a candidate string, I mean the string\
    \ that the regex will be acting on. Thus, for the pattern described in the preceding\
    \ section, a candidate string might be <[coach@influxs.com](mailto:coach@influxs.com)>,\
    \ <[john_john_smith@w3c.org](mailto:john_john_smith@w3c.org)>, or <[hana@saez.com](mailto:hana@saez.com)>.\
    \ |\n\n### Defining Patterns\n\nPatterns are the actual descriptions used in regular\
    \ expressions. Their power stems from their capability to describe text, as opposed\
    \ to specifying it. They're an important part of the regex vernacular, and you\
    \ need to understand them well to use regular expressions. Fortunately, they're\
    \ easy to grasp if you refuse to be intimidated, and their somewhat off-putting\
    \ syntax soon becomes intuitive.\n\nA pattern allows you to describe the characteristics\
    \ of the item you're looking for, without specifying the item explicitly. This\
    \ can be especially helpful when you only know the traits of your targets, but\
    \ you're unable to name them specifically.\n\nImagine parsing a document. You\
    \ might want to find every capitalized word; or every word beginning with the\
    \ letter *Z*; or every word beginning with a capital *Z*, followed by a vowel,\
    \ unless that vowel is an *a*. You can't know beforehand exactly what those words\
    \ will be for a given document, but you can describe them. That description is\
    \ your pattern.\n\nI think of regular expressions as a police station. A pattern\
    \ is the officer who takes a description of the suspects, and a matcher is the\
    \ officer that rounds up and interrogates those suspects.\n\n### Defining Matchers\n\
    \nIf you're familiar with Standard Query Language (SQL), it might help you to\
    \ think of regular expressions as a sort of SQL for examining free-flowing text.\
    \ A pattern is conceptually similar to the SQL query that's executed. A matcher\
    \ corresponds to the `ResultSet` returned by that query.\n\nA `Matcher` examines\
    \ the results of applying a `Pattern`. If your pattern said, \"Find every word\
    \ starting with *a* in the previous sentence,\" then you would examine the `Matcher`\
    \ after applying your pattern. Your code might look like [Listing 1-1](#LiB0006.html#ch01list01).\
    \ The output for [Listing 1-1](#LiB0006.html#ch01list01) is shown in [Output 1-1](#LiB0006.html#ch01ex01),\
    \ which follows the listing.\n\n**Listing 1-1: Finding Every Occurrence of the\
    \ Letter A**\n\n```\nimport java.util.regex.*;\n\npublic class FindA{\n  public\
    \ static void main(String args[])\n  throws Exception{\n\n    String candidate\
    \ =\n     \"A Matcher examines the results of applying a pattern.\";\n\n    //define\
    \ the matching pattern as a\n    //word boundary, a lowercase a, any\n    //number\
    \ of immediately trailing letters\n    //numbers, or underscores, followed by\n\
    \    //a word boundary\n    String regex = \"\\\\ba\\\\w*\\\\b\";\n    Pattern\
    \ p = Pattern.compile(regex);\n\n   //extract the Matcher for the String text\n\
    \    Matcher m = p.matcher(candidate);\n    String val=null;\n    //display the\
    \ original input string\n    System.out.println(\"INPUT: \" + candidate);\n\n\
    \    //display the search pattern\n    System.out.println(\"REGEX: \" + regex\
    \ +\"\\r\\n\");\n\n   //examine the Matcher, and extract all\n   //words starting\
    \ with a lowercase a\n    while (m.find())\n    {\n      val = m.group();\n  \
    \    System.out.println(\"MATCH: \" + val);\n    }\n\n    //if there were no matches,\
    \ say so\n    if (val == null) {\n      System.out.println(\"NO MATCHES: \");\n\
    \    }\n  }\n}\n```\n\n**Output 1-1: Result of Running `FindA`**\n\n```\nINPUT:\
    \ A Matcher examines the results of applying a pattern.\nREGEX: \\ba\\w*\\b\n\n\
    MATCH: applying\nMATCH: a\n```\n\nAgain, it's not necessary that you be able to\
    \ follow the code given in detail right now. I just want to establish a general\
    \ sense of how things are done in J2SE regex. First, I define my `Pattern`:\n\n\
    ```\n Pattern p = Pattern.compile(regex);\n```\n\nThen, I feed my candidate string\
    \ to the `Pattern` and extract a `Matcher`:\n\n```\n Matcher m = p.matcher(candidate);\n\
    ```\n\nFinally, I interrogate my `Matcher`:\n\n```\n while (m.find()) {….} \n\
    ```"
  raw: "### [Appendix C](#LiB0057.html#615)\n\n[Appendix C](#LiB0057.html#615) offers\
    \ simple regular expressions, without accompanying code, to help with everyday,\
    \ common tasks such as validating e-mails, checking text for format, extracting\
    \ values, and so on.\n\n# Chapter 1: Regular Expressions\n\n## Overview\n\n> *\"\
    Everything, you see, makes sense, if you take the trouble to work out the rational.\"\
    *\n> \n> — Piers Anthony\n\n*Regular expressions,* or *regex* for short, describe\
    \ text. They are a mechanism by which you can tell the Java Virtual Machine (JVM)\
    \ how to find and potentially manipulate text for you. In this chapter, I'll examine\
    \ and contrast the traditional approach of describing text with the regex approach.\n\
    \nFor example, imagine you need to validate e-mail addresses. The verbal directions\
    \ for doing so might be something along the lines of \"Make sure the e-mail address\
    \ contains an at (@) symbol.\" You could probably handle this task with a single\
    \ line of Java code:\n\n```\nIf (email.indexOf(\"@\") > 0) {\n   return true;\n\
    }\n```\n\nSo far, so good. Suppose additional requirements creep in, though, as\
    \ they invariably do. Now you also need to make sure that all e-mail addresses\
    \ end with the .org extension. So you amend your code as follows:\n\n```\nIf ((email.indexOf(\"\
    @\") > 0) && (email.endsWith(\".org\"))){\n\n   return true;\n}\n```\n\nBut the\
    \ requirements continue to creep. You now need all e-mail addresses to be of the\
    \ form firstname_lastname, so you use the StringTokenizer to tokenize the e-mail\
    \ address, extract the part before the @, look for the underscore (_) character,\
    \ tokenize the strings around that, and so on. Pretty soon, you have some convoluted\
    \ code for what should be a fairly straightforward operation.\n\nThe use of regular\
    \ expressions can greatly simplify and condense this process. With regular expressions,\
    \ you could write the following:\n\n```\nString regex = \"[A-Za-z]+_[A-Za-z]+@[A-Za-z]+\\\
    \\.org\";\nif (email.matches(regex)) return true; \n```\n\nIn English, this means\
    \ \"Look for one or more letters, followed by an _, followed by one or more letters,\
    \ followed by an @, followed by one or more letters, followed by .org.\" Notice\
    \ that a period precedes the *o* in \"org\".\n\nDon't be concerned if the syntax\
    \ isn't completely clear to you right now— making it clear is the aim of this\
    \ book. This chapter explores the underlying concepts of Java regex, with an emphasis\
    \ on actually forming and using the regex syntax. It's a complete introduction\
    \ to regular expressions, and it also serves as a preamble to the [next chapter](#LiB0014_split_000.html#187).\
    \ [Chapter 2](#LiB0014_split_000.html#187), in turn, is a complete and exhaustive\
    \ documentation of the J2SE regex object model.\n\n## The Building Blocks of Regular\
    \ Expressions\n\nRegular expressions in Java 2 Standard Edition (J2SE) consist\
    \ of two essential parts, which are embodied by two new Java objects. The first\
    \ part is a Pattern, and the second is a Matcher. Understanding these two objects\
    \ is crucial to your ability to master regular expressions. Fortunately, they're\
    \ easy concepts to understand.\n\nI define these concepts in detail in the sections\
    \ that follow, but at a general level, a *pattern* describes what you're searching\
    \ for, and a *matcher* examines candidates that might match the pattern or description.\
    \ For example, ***\\****s****+*** is a pattern describing one or spaces. Correspondingly,\
    \ J2SE now provides the Pattern and Matcher objects.\n\n|  | Note  | When I refer\
    \ to a candidate or a candidate string, I mean the string that the regex will\
    \ be acting on. Thus, for the pattern described in the preceding section, a candidate\
    \ string might be <[coach@influxs.com](mailto:coach@influxs.com)>, <[john_john_smith@w3c.org](mailto:john_john_smith@w3c.org)>,\
    \ or <[hana@saez.com](mailto:hana@saez.com)>. |\n\n### Defining Patterns\n\nPatterns\
    \ are the actual descriptions used in regular expressions. Their power stems from\
    \ their capability to describe text, as opposed to specifying it. They're an important\
    \ part of the regex vernacular, and you need to understand them well to use regular\
    \ expressions. Fortunately, they're easy to grasp if you refuse to be intimidated,\
    \ and their somewhat off-putting syntax soon becomes intuitive.\n\nA pattern allows\
    \ you to describe the characteristics of the item you're looking for, without\
    \ specifying the item explicitly. This can be especially helpful when you only\
    \ know the traits of your targets, but you're unable to name them specifically.\n\
    \nImagine parsing a document. You might want to find every capitalized word; or\
    \ every word beginning with the letter *Z*; or every word beginning with a capital\
    \ *Z*, followed by a vowel, unless that vowel is an *a*. You can't know beforehand\
    \ exactly what those words will be for a given document, but you can describe\
    \ them. That description is your pattern.\n\nI think of regular expressions as\
    \ a police station. A pattern is the officer who takes a description of the suspects,\
    \ and a matcher is the officer that rounds up and interrogates those suspects.\n\
    \n### Defining Matchers\n\nIf you're familiar with Standard Query Language (SQL),\
    \ it might help you to think of regular expressions as a sort of SQL for examining\
    \ free-flowing text. A pattern is conceptually similar to the SQL query that's\
    \ executed. A matcher corresponds to the ResultSet returned by that query.\n\n\
    A Matcher examines the results of applying a Pattern. If your pattern said, \"\
    Find every word starting with *a* in the previous sentence,\" then you would examine\
    \ the Matcher after applying your pattern. Your code might look like [Listing\
    \ 1-1](#LiB0006.html#ch01list01). The output for [Listing 1-1](#LiB0006.html#ch01list01)\
    \ in shown in [Output 1-1](#LiB0006.html#ch01ex01), which follows the listing.\n\
    \nListing 1-1: Finding Every Occurrence of the Letter A\n\n| **![Start example](_1.gif)**\
    \ |\n\n```\nimport java.util.regex.*;\n\npublic class FindA{\n  public static\
    \ void main(String args[])\n  throws Exception{\n\n    String candidate =\n  \
    \   \"A Matcher examines the results of applying a pattern.\";\n\n    //define\
    \ the matching pattern as a\n    //word boundary, a lowercase a, any\n    //number\
    \ of immediately trailing letters\n    //numbers, or underscores, followed by\n\
    \    //a word boundary\n    String regex = \"\\\\ba\\\\w*\\\\b\";\n    Pattern\
    \ p = Pattern.compile(regex);\n\n   //extract the Matcher for the String text\n\
    \    Matcher m = p.matcher(candidate);\n    String val=null;\n    //display the\
    \ original input string\n    System.out.println(\"INPUT: \" + candidate);\n\n\
    \    //display the search pattern\n    System.out.println(\"REGEX: \" + regex\
    \ +\"\\r\\n\");\n\n   //examine the Matcher, and extract all\n   //words starting\
    \ with a lowercase a\n    while (m.find())\n    {\n      val = m.group();\n  \
    \    System.out.println(\"MATCH: \" + val);\n    }\n\n    //if there were no matches,\
    \ say so\n    if (val == null) {\n      System.out.println(\"NO MATCHES: \");\n\
    \    }\n  }\n}\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nOutput 1-1: Result\
    \ of Running FindA\n\n| **![Start example](_1.gif)** |\n\n```\nINPUT: A Matcher\
    \ examines the results of applying a pattern.\nREGEX: \\ba\\w*\\b\n\nMATCH: applying\n\
    MATCH: a\n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nAgain, it's not necessary\
    \ that you be able to follow the code given in detail right now. I just want to\
    \ establish a general sense of how things are done in J2SE regex. First, I define\
    \ my Pattern:\n\n```\n Pattern p = Pattern.compile(regex);\n```\n\nThen, I feed\
    \ my candidate string to the Pattern and extract a Matcher:\n\n```\n Matcher m\
    \ = p.matcher(candidate);\n```\n\nFinally, I interrogate my Matcher:\n\n```\n\
    \ while (m.find()) {….} \n```"
  trans: "\n### 附录 C\n\n附录 C 提供了简单的正则表达式，不附带代码，用于帮助处理日常常见任务，例如验证电子邮件、检查文本格式、提取值等。\n\
    \n# 第 1 章：正则表达式\n\n## 概述\n\n> *“你看，如果你愿意花功夫去弄清其中的道理，一切就都说得通了。”*\n> \n> — 皮尔斯·安东尼\n\
    \n*正则表达式*，简称 *regex*，用于描述文本。它是一种机制，通过它你可以告诉 Java 虚拟机（JVM）如何为你查找并可能操作文本。在本章中，我将考察并对比描述文本的传统方法与正则表达式方法。\n\
    \n例如，假设你需要验证电子邮件地址。对此的口头指导可能类似于“确保电子邮件地址包含一个 at (@) 符号”。你可能只需一行 Java 代码就能处理这个任务：\n\
    \n```\nif (email.indexOf(\"@\") > 0) {\n   return true;\n}\n```\n\n到目前为止，一切顺利。但假设有额外的需求不断涌现，就像它们总会发生的那样。现在你还需要确保所有电子邮件地址都以\
    \ .org 扩展名结尾。于是你修改代码如下：\n\n```\nif ((email.indexOf(\"@\") > 0) && (email.endsWith(\"\
    .org\"))){\n\n   return true;\n}\n```\n\n但需求仍在不断增加。现在你需要所有电子邮件地址都采用 firstname_lastname\
    \ 的形式，因此你使用 StringTokenizer 来标记化电子邮件地址，提取 @ 之前的部分，查找下划线 (_) 字符，标记化其周围的字符串，等等。很快，对于一个本应相当直接的操作，你就有了一些复杂的代码。\n\
    \n使用正则表达式可以极大地简化和压缩这个过程。使用正则表达式，你可以编写如下代码：\n\n```\nString regex = \"[A-Za-z]+_[A-Za-z]+@[A-Za-z]+\\\
    \\.org\";\nif (email.matches(regex)) return true; \n```\n\n用通俗的话说，这意味着“查找一个或多个字母，后跟一个\
    \ _，再后跟一个或多个字母，后跟一个 @，再后跟一个或多个字母，后跟 .org”。注意，“org”中的 *o* 前面有一个句点。\n\n如果现在语法对你来说不完全清楚，不必担心——让语法清晰明了正是本书的目的。本章探讨\
    \ Java 正则表达式的基本概念，重点在于实际构建和使用正则表达式语法。这是对正则表达式的完整介绍，同时也作为下一章的序言。第 2 章则是对 J2SE 正则表达式对象模型的完整且详尽的文档。\n\
    \n## 正则表达式的构建块\n\nJava 2 标准版（J2SE）中的正则表达式由两个基本部分组成，这两个部分由两个新的 Java 对象体现。第一部分是\
    \ Pattern，第二部分是 Matcher。理解这两个对象对于你掌握正则表达式至关重要。幸运的是，它们是容易理解的概念。\n\n我将在接下来的章节中详细定义这些概念，但从一般层面来说，*pattern*\
    \ 描述你要查找的内容，而 *matcher* 检查可能与模式或描述匹配的候选对象。例如，***\\****s****+*** 是描述一个或多个空格的模式。相应地，J2SE\
    \ 现在提供了 Pattern 和 Matcher 对象。\n\n|  | 注意  | 当我提到候选对象或候选字符串时，我指的是正则表达式将要操作的字符串。因此，对于上一节中描述的模式，候选字符串可能是\
    \ <coach@influxs.com>、<john_john_smith@w3c.org> 或 <hana@saez.com>。 |\n\n### 定义模式\n\
    \n模式是正则表达式中实际使用的描述。它们的力量源于其描述文本的能力，而非指定文本。它们是正则表达式术语的重要组成部分，你需要很好地理解它们才能使用正则表达式。幸运的是，如果你不被吓倒，它们很容易掌握，并且它们那有些令人不快的语法很快就会变得直观。\n\
    \n模式允许你描述要查找的项目的特征，而无需明确指定该项目。当你只知道目标的特征，但无法具体命名它们时，这尤其有用。\n\n想象一下解析一个文档。你可能想找到每个大写字母开头的单词；或者每个以字母\
    \ *Z* 开头的单词；或者每个以大写 *Z* 开头、后跟一个元音字母（除非该元音是 *a*）的单词。你无法事先确切知道给定文档中这些单词是什么，但你可以描述它们。那个描述就是你的模式。\n\
    \n我把正则表达式想象成一个警察局。模式是负责获取嫌疑人描述的警官，而匹配器是负责围捕和审讯这些嫌疑人的警官。\n\n### 定义匹配器\n\n如果你熟悉标准查询语言（SQL），将正则表达式视为一种用于检查自由格式文本的\
    \ SQL 可能会有所帮助。模式在概念上类似于执行的 SQL 查询。匹配器对应于该查询返回的 ResultSet。\n\nMatcher 检查应用 Pattern\
    \ 的结果。如果你的模式说“在上一句中查找每个以 *a* 开头的单词”，那么你将在应用模式后检查 Matcher。你的代码可能如清单 1-1 所示。清单 1-1\
    \ 的输出显示在紧随其后的输出 1-1 中。\n\n清单 1-1：查找字母 A 的每次出现\n\n| **![开始示例](img/_1.gif)** |\n\
    \n```\nimport java.util.regex.*;\n\npublic class FindA{\n  public static void\
    \ main(String args[])\n  throws Exception{\n\n    String candidate =\n     \"\
    A Matcher examines the results of applying a pattern.\";\n\n    //将匹配模式定义为\n \
    \   //一个单词边界，一个小写字母 a，任意\n    //数量的紧随其后的字母\n    //数字或下划线，后跟\n    //一个单词边界\n  \
    \  String regex = \"\\\\ba\\\\w*\\\\b\";\n    Pattern p = Pattern.compile(regex);\n\
    \n   //为字符串文本提取 Matcher\n    Matcher m = p.matcher(candidate);\n    String val=null;\n\
    \    //显示原始输入字符串\n    System.out.println(\"INPUT: \" + candidate);\n\n    //显示搜索模式\n\
    \    System.out.println(\"REGEX: \" + regex +\"\\r\\n\");\n\n   //检查 Matcher，并提取所有\n\
    \   //以小写字母 a 开头的单词\n    while (m.find())\n    {\n      val = m.group();\n   \
    \   System.out.println(\"MATCH: \" + val);\n    }\n\n    //如果没有匹配项，则说明\n    if\
    \ (val == null) {\n      System.out.println(\"NO MATCHES: \");\n    }\n  }\n}\n\
    ```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n输出 1-1：运行 FindA 的结果\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\nINPUT: A Matcher examines the results of applying a pattern.\nREGEX:\
    \ \\ba\\w*\\b\n\nMATCH: applying\nMATCH: a\n```\n\n| **![结束示例](img/_1.gif)** |\n\
    \n|  |\n\n同样，现在不需要你能够完全理解给出的代码细节。我只是想建立一个关于 J2SE 正则表达式工作方式的总体概念。首先，我定义我的 Pattern：\n\
    \n```\n Pattern p = Pattern.compile(regex);\n```\n\n然后，我将候选字符串提供给 Pattern 并提取一个\
    \ Matcher：\n\n```\n Matcher m = p.matcher(candidate);\n```\n\n最后，我询问我的 Matcher：\n\
    \n```\n while (m.find()) {….} \n```\n"
- fmt: "# Creating Patterns\n\nThis section presents some simple techniques for writing\
    \ your own regular expressions. I think of them as the *push,* the *pull,* and\
    \ the *composition.* As in the Japanese martial art Judo, if your opponent is\
    \ pushing against you, you pull him. If he's pulling away, you push. If those\
    \ techniques don't work, you compose him into a pretzel.\n\nSimilarly, writing\
    \ a regular expression will sometimes seem impervious to certain approaches, but\
    \ very susceptible to others. The methods I describe in the following sections\
    \ are only simple techniques for writing patterns. If you haven't already done\
    \ so, you'll soon cultivate your own bag of regex tricks. You may even develop\
    \ pet names for them.\n\n## The Pull Technique\n\nOne of the most successful ways\
    \ to create regular expressions consists of taking an exact match and then slowly\
    \ morphing it into a generic regular expression that matches the original. I think\
    \ of this as the pull technique, because I'm slowly pulling the regular expression\
    \ out of the exact match.\n\nFor example, imagine that you want to create a pattern\
    \ to match four-digit numbers. Thus, `1234` would be a match, but `123` would\
    \ not, and neither would `12345` or `ABCD`.\n\nFor the sake of this example, you'll\
    \ need to introduce a single regular expression metacharacter, `\\d`, that will\
    \ match any digit ranging from `0` to `9`.\n\n|  | Note | A *metacharacter* describes\
    \ another, more complex character. For example, `\\n` is a metacharacter describing\
    \ the nonprintable newline character. |\n\nGoing back to the example, you know\
    \ that\n\n```\n1234 matches 1234\n```\n\nThis is, of course, obvious: Anything\
    \ will match itself. However, you also know that `\\d` matches any digit. By the\
    \ transitive property of logic, you can substitute `\\d` for the last digit. Thus,\
    \ the pattern becomes\n\n```\n1234 should_match 123\\d \n```\n\nHere you replace\
    \ the last digit, `4`, with the equivalent metacharacter, `\\d`. If you run this\
    \ pattern though the handy `RX.java` program, you can see that it does, in fact,\
    \ continue to match. So far, so good. Actually, it's better than good: Now you\
    \ have a pattern that will match not only `1234`, but also any four-digit number\
    \ beginning with the digits `123`. We're getting closer.\n\n|  | Note | `RX.java`\
    \ is a very short companion program for this book that you can obtain from Downloads\
    \ section of the Apress Web site ([http://www.apress.com](http://www.apress.com)).\
    \ You can use this program to execute regular expression patterns against a candidate\
    \ string. |\n\nRepeat the process on the third digit, so that `1234` should match\
    \ `12\\d\\d`, where you replace the `3` with the equivalent `\\d`. Things are\
    \ looking up. Not only does this match `1234`, but also it matches any four-digit\
    \ number beginning with the digits `12`.\n\nYou can see where this is going. Eventually,\
    \ you'll create the pattern `\\d\\d\\d\\d`, which will match any four digits.\
    \ This isn't the most succinct pattern, but it's sufficient to meet the stated\
    \ need: It matches any four-digit number.\n\nThe point here is that you can, in\
    \ principle, sometimes work *backward* from a specific match to create the pattern\
    \ you need. Of course, this is just a technique, and it won't work for all situations.\
    \ However, it's a good method to put into your regex bag of tricks.\n\n## The\
    \ Push Technique\n\nAnother technique that I've found to be helpful in writing\
    \ regular expression patterns is the push technique. The push technique builds\
    \ on previous work by either adding to it, subtracting from it, or modifying its\
    \ scope until it's useful.\n\nInstead of working with a specific matching token,\
    \ as in the pull technique, this approach takes a preexisting regular expression\
    \ that's similar to the one you need and modifies it until it does the required\
    \ job. That is, the regular expression is pushed into another functionality, hence\
    \ the name.\n\nFor example, say you want a regex pattern that matches five digits.\
    \ Based on the previous example, you know that `\\d\\d\\d\\d` will match any four\
    \ digits. Thus, the process of finding a match for a five-digit match is as easy\
    \ as appending another `\\d` to the previous pattern. The answer, of course, is\
    \ the pattern `\\d\\d\\d\\d\\d`.\n\nAs you progress though this chapter, you'll\
    \ learn that these aren't the most elegant representations of the four-digit and\
    \ five-digit matching patterns you could come up with, but they're perfectly legitimate\
    \ solutions, and they're reasonably derived. That process of derivation is the\
    \ important point to take away from this discussion.\n\n## The Composition Technique\n\
    \nThe composition technique does exactly what its name implies: It puts together\
    \ various patterns to form a new whole. That is, it's the composition of a new\
    \ pattern by using other patterns. This is distinct from the push technique in\
    \ that patterns aren't modified; rather, they're simply appended.\n\nAssume that\
    \ you need to create a pattern that will match United States zip codes, which\
    \ consist of five digits, followed by a hyphen character, followed by four digits.\
    \ Based on the work you've already done, this pattern is very easy to create.\
    \ You know that four digits match `\\d\\d\\d\\d`, that a hyphen matches itself,\
    \ and that five digits match `\\d\\d\\d\\d\\d`. Composing these into a single\
    \ pattern yields the pattern `\\d\\d\\d\\d\\d-\\d\\d\\d\\d\\d`.\n\nAgain, this\
    \ isn't the most elegant and concise representation for a zip code, and it isn't\
    \ very permissive (what about five-digit zip codes? What if there are spaces between\
    \ the hyphen and the digits? What if there is no hyphen, just a space?), but it\
    \ does meet the stated requirement.\n\n|  | Note | As with most software problems,\
    \ you can often find the solution to a regex conundrum by clarifying the requirements.\
    \ |\n\n# Introducing the Regular Expression Syntax\n\nThe following sections introduce\
    \ Java's regular expression syntax. For the sake of clarity, the material is grouped\
    \ into small, logical units, followed by a brief example that demonstrates usage.\
    \ The examples progress from those that emphasize the role of the `Pattern` to\
    \ those that start to rely on the `Matcher` more.\n\n|  | Note | Please keep in\
    \ mind that these are working examples only. We're not ready to bulletproof our\
    \ code yet. |"
  raw: "## Creating Patterns\n\nThis section presents some simple techniques for writing\
    \ your own regular expressions. I think of them as the *push,* the *pull,* and\
    \ the *composition.* As in the Japanese martial art Judo, if your opponent is\
    \ pushing against you, you pull him. If he's pulling away, you push. If those\
    \ techniques don't work, you compose him into a pretzel.\n\nSimilarly, writing\
    \ a regular expression will sometimes seem impervious to certain approaches, but\
    \ very susceptible to others. The methods I describe in the following sections\
    \ are only simple techniques for writing patterns. If you haven't already done\
    \ so, you'll soon cultivate your own bag of regex tricks. You may even develop\
    \ pet names for them.\n\n### The Pull Technique\n\nOne of the most successful\
    \ ways to create regular expressions consists of taking an exact match and then\
    \ slowly morphing it into a generic regular expression that matches the original.\
    \ I think of this as the pull technique, because I'm slowly pulling the regular\
    \ expression out of the exact match.\n\nFor example, imagine that you want to\
    \ create a pattern to match four-digit numbers. Thus, *1234* would be a match,\
    \ but *123* would not, and neither would *12345* or *ABCD*.\n\nFor the sake of\
    \ this example, you'll need to introduce a single regular expression metacharacter,\
    \ ***\\d***, that will match any digit ranging from *0* to *9*.\n\n|  | Note \
    \ | A *metacharacter* describes another, more complex character. For example,\
    \ ***\\n*** is a metacharacter describing the nonprintable newline character.\
    \ |\n\nGoing back to the example, you know that\n\n```\n1234 matches 1234\n```\n\
    \nThis is, of course, obvious: Anything will match itself. However, you also know\
    \ that \\d matches any digit. By the transitive property of logic, you can substitute\
    \ \\d for the last digit. Thus, the pattern becomes\n\n```\n1234 should_match\
    \ 123\\d \n```\n\nHere you replace the last digit, *4*, with the equivalent metacharacter,\
    \ ***\\d***. If you run this pattern though the handy RX.java program, you can\
    \ see that it does, in fact, continue to match. So far, so good. Actually, it's\
    \ better than good: Now you have a pattern that will match not only *1234*, but\
    \ also any four-digit number beginning with the digits *123*. We're getting closer.\n\
    \n|  | Note  | RX.java is a very short companion program for this book that you\
    \ can obtain from Downloads section of the Apress Web site ([http://www.apress.com](http://www.apress.com)).\
    \ You can use this program to execute regular expression patterns against a candidate\
    \ string. |\n\nRepeat the process on the third digit, so that *1234* should match\
    \ ***12\\d\\d***, where you replace the *3* with the equivalent ***\\d.*** Things\
    \ are looking up. Not only does this match *1234*, but also it matches any four-digit\
    \ number beginning with the digits *12*.\n\nYou can see where this is going. Eventually,\
    \ you'll create the pattern ***\\d\\d\\d\\d***, which will match any four digits.\
    \ This isn't the most succinct pattern, but it's sufficient to meet the stated\
    \ need: It matches any four-digit number.\n\nThe point here is that you can, in\
    \ principle, sometimes work *backward* from a specific match to create the pattern\
    \ you need. Of course, this is just a technique, and it won't work for all situations.\
    \ However, it's a good method to put into your regex bag of tricks.\n\n### The\
    \ Push Technique\n\nAnother technique that I've found to be helpful in writing\
    \ regular expression patterns is the push technique. The push technique builds\
    \ on previous work by either adding to it, subtracting from it, or modifying its\
    \ scope until it's useful.\n\nInstead of working with a specific matching token,\
    \ as in the pull technique, this approach takes a preexisting regular expression\
    \ that's similar to the one you need and modifies it until it does the required\
    \ job. That is, the regular expression is pushed into another functionality, hence\
    \ the name.\n\nFor example, say you want a regex pattern that matches five digits.\
    \ Based on the previous example, you know that ***\\d\\d\\d\\d*** will match any\
    \ four digits. Thus, the process of finding a match for a five-digit match is\
    \ as easy as appending another ***\\d*** to the previous pattern. The answer,\
    \ of course, is the pattern ***\\d\\d\\d\\d\\d***.\n\nAs you progress though this\
    \ chapter, you'll learn that these aren't the most elegant representations of\
    \ the four-digit and five-digit matching patterns you could come up with, but\
    \ they're perfectly legitimate solutions, and they're reasonably derived. That\
    \ process of derivation is the important point to take away from this discussion.\n\
    \n### The Composition Technique\n\nThe composition technique does exactly what\
    \ its name implies: It puts together various patterns to form a new whole. That\
    \ is, it's the composition of a new pattern by using other patterns. This is distinct\
    \ from the push technique in that patterns aren't modified; rather, they're simply\
    \ appended.\n\nAssume that you need to create a pattern that will match United\
    \ States zip codes, which consist of five digits, followed by a hyphen character,\
    \ followed by four digits. Based on the work you've already done, this pattern\
    \ is very easy to create. You know that four digits match ***\\d\\d\\d\\d***,\
    \ that a hyphen matches itself, and that five digits match ***\\d\\d\\d\\d\\d***.\
    \ Composing these into a single pattern yields the pattern ***\\d\\d\\d\\d\\d-\\\
    d\\d\\d\\d\\d***.\n\nAgain, this isn't the most elegant and concise representation\
    \ for a zip code, and it isn't very permissive (what about five-digit zip codes?\
    \ What if there are spaces between the hyphen and the digits? What if there is\
    \ no hyphen, just a space?), but it does meet the stated requirement.\n\n|  |\
    \ Note  | As with most software problems, you can often find the solution to a\
    \ regex conundrum by clarifying the requirements. |\n\n## Introducing the Regular\
    \ Expression Syntax\n\nThe following sections introduce Java's regular expression\
    \ syntax. For the sake of clarity, the material is grouped into small, logical\
    \ units, followed by a brief example that demonstrates usage. The examples progress\
    \ from those that emphasize the role of the Pattern to those that start to rely\
    \ on the Matcher more.\n\n|  | Note  | Please keep in mind that these are working\
    \ examples only. We're not ready to bulletproof our code yet. |"
  trans: "\n## 创建模式\n\n本节将介绍一些编写正则表达式的简单技巧。我将它们称为*推*、*拉*和*组合*。如同日本柔道术，如果对手向你推，你就拉他；如果他向后拉，你就向前推。如果这些技巧都不奏效，你就把他扭成麻花。\n\
    \n同样，编写正则表达式时，某些方法有时会显得完全无效，而另一些方法却非常有效。我在以下各节中描述的方法只是编写模式的简单技巧。如果你尚未掌握，很快你也会培养出自己的一套正则表达式技巧，甚至可能给它们起些昵称。\n\
    \n### 拉取技巧\n\n创建正则表达式最成功的方法之一，是先进行精确匹配，然后逐步将其变形为能匹配原始内容的通用正则表达式。我将此称为拉取技巧，因为我是在从精确匹配中慢慢\"\
    拉\"出正则表达式。\n\n例如，假设你想创建一个匹配四位数字的模式。因此，*1234* 应该匹配，但 *123* 不匹配，*12345* 或 *ABCD*\
    \ 也不匹配。\n\n为了这个示例，你需要引入一个正则表达式元字符 ***\\d***，它能匹配从 *0* 到 *9* 的任何数字。\n\n|  | 注意\
    \ | *元字符*用于描述另一个更复杂的字符。例如，***\\n*** 是一个描述不可打印换行符的元字符。 |\n\n回到示例，你知道\n\n```\n1234\
    \ 匹配 1234\n```\n\n这当然显而易见：任何内容都匹配自身。但你也知道 \\d 匹配任何数字。根据逻辑的传递性，你可以用 \\d 替换最后一位数字。于是模式变为\n\
    \n```\n1234 应匹配 123\\d \n```\n\n这里你将最后一位数字 *4* 替换为等效的元字符 ***\\d***。如果你通过方便的 RX.java\
    \ 程序运行此模式，会发现它确实仍然匹配。到目前为止一切顺利。实际上，情况比顺利更好：现在你的模式不仅能匹配 *1234*，还能匹配任何以数字 *123*\
    \ 开头的四位数。我们越来越接近目标了。\n\n|  | 注意 | RX.java 是本书的一个极简配套程序，你可以从 Apress 网站的下载区（[`www.apress.com`](http://www.apress.com)）获取。你可以用这个程序对候选字符串执行正则表达式模式。\
    \ |\n\n对第三位数字重复此过程，这样 *1234* 应匹配 ***12\\d\\d***，这里你将 *3* 替换为等效的 ***\\d***。情况越来越乐观了。这不仅匹配\
    \ *1234*，还匹配任何以数字 *12* 开头的四位数。\n\n你能看出趋势了。最终，你将创建模式 ***\\d\\d\\d\\d***，它能匹配任意四位数字。这并非最简洁的模式，但足以满足既定需求：它匹配任何四位数。\n\
    \n这里的要点是，原则上你有时可以从一个具体匹配*反向*推导，创建出所需的模式。当然，这只是一个技巧，并非适用于所有情况。但这是一个值得放入你正则表达式技巧包的好方法。\n\
    \n### 推动技巧\n\n另一个我发现对编写正则表达式模式很有帮助的技巧是推动技巧。推动技巧建立在已有工作的基础上，通过添加、删减或修改其范围，直到它变得有用。\n\
    \n与拉取技巧中从具体匹配标记入手不同，这种方法采用一个与你所需模式相似的现有正则表达式，并对其进行修改，直到它能完成所需任务。也就是说，正则表达式被\"\
    推\"向另一种功能，因此得名。\n\n例如，假设你想要一个匹配五位数字的正则表达式模式。基于前面的例子，你知道 ***\\d\\d\\d\\d*** 能匹配任意四位数字。因此，找到匹配五位数字的模式只需在前一个模式后追加另一个\
    \ ***\\d*** 即可。答案当然是模式 ***\\d\\d\\d\\d\\d***。\n\n随着你深入学习本章，你会发现这些并非你能想到的最优雅的四位和五位数字匹配模式表示法，但它们是完全合理的解决方案，并且推导过程也合乎逻辑。这种推导过程才是本次讨论中需要掌握的重点。\n\
    \n### 组合技巧\n\n组合技巧正如其名：将各种模式组合起来形成一个新的整体。也就是说，它通过使用其他模式来组合成一个新模式。这与推动技巧不同，因为模式本身不被修改，而只是被拼接起来。\n\
    \n假设你需要创建一个匹配美国邮政编码的模式，它由五位数字、一个连字符和四位数字组成。基于你已经完成的工作，这个模式非常容易创建。你知道四位数字匹配 ***\\\
    d\\d\\d\\d***，连字符匹配自身，五位数字匹配 ***\\d\\d\\d\\d\\d***。将这些组合成一个模式，就得到 ***\\d\\d\\\
    d\\d\\d-\\d\\d\\d\\d\\d***。\n\n同样，这并非最优雅简洁的邮政编码表示法，也不够灵活（五位数的邮政编码怎么办？连字符和数字之间有空格怎么办？没有连字符只有空格怎么办？），但它确实满足了既定需求。\n\
    \n|  | 注意 | 与大多数软件问题一样，通常可以通过明确需求来找到正则表达式难题的解决方案。 |\n\n## 正则表达式语法介绍\n\n以下各节将介绍\
    \ Java 的正则表达式语法。为清晰起见，材料被组织成小的逻辑单元，每个单元后附有一个演示用法的简短示例。这些示例从强调 Pattern 角色的例子，逐步过渡到开始更多依赖\
    \ Matcher 的例子。\n\n|  | 注意 | 请记住，这些只是工作示例。我们尚未准备好让代码无懈可击。 |\n"
- fmt: '### Reading Patterns


    The regex language contains metacharacters designed to help you describe search
    criteria. Because reading a pattern without being aware of these characters can
    be a bewildering experience, I''ve listed the most popular metacharacters in [Table
    1-1](#LiB0008.html#ch01table01).


    Table 1-1: Basic Regex Delimiter Characters


    | **Pattern** | **Name** | **Description** |

    | --- | --- | --- |

    | `.` | Period | Matches any character. |

    | `$` | Dollar sign | Matches the end of a line. |

    | `^` | Carat | Matches the beginning of a line. |

    | `{` | Opening curly bracket | Defines a range opening. |

    | `[` | Opening bracket | Defines a character class opening. |

    | `(` | Opening parenthesis | Defines the beginning of a group. |

    | `&#124;` | Pipe symbol | A symbol meaning OR |

    | `}` | Closing curly bracket | Defines a range closing. |

    | `]` | Closing bracket | Defines a character class closing. |

    | `)` | Closing parenthesis | Defines the closing of a group. |

    | `*` | Asterisk | The preceding is repeated zero or more times. |

    | `+` | Plus sign | The preceding is repeated one or more times. |

    | `?` | Question mark | The preceding is repeated zero or one time. |

    | `\` | Backward slash | The following is not to be treated as a metacharacter.
    |


    These characters are effectively reserved words, just as `new` is a reserved word
    in Java. They serve as building blocks for more complex search criteria. I discuss
    this in more detail soon.


    If you''re reading a character in a regex pattern and it isn''t one of the characters
    listed in [Table 1-1](#LiB0008.html#ch01table01), then the character you''re reading
    probably stands for the character it represents. For example, [Table 1-2](#LiB0008.html#ch01table02)
    shows how the pattern `hello*` should be read.


    Table 1-2: The Pattern `hello*` ^([[*](#LiB0008.html#ftn.N251)])


    | **Letter** | **Description** |

    | --- | --- |

    | `h` | The character `h` |

    | `e` | Followed by the character `e` |

    | `l` | Followed by the character `l` |

    | `l` | Followed by the character `l` |

    | `o` | Followed by the character `o` |

    | `*` | Followed by a metacharacter that, in this case, means `o` should be repeated
    zero or more times |

    | ^([[*](#LiB0008.html#N251)])*In English:* Look for the word `hell`, followed
    by any number of trailing `o` characters. |


    If you actually need to find one of these characters, such as the `*` character,
    simply append the character you''re searching for to a `\` character. For example,
    to find the `*` character, use `\*`.


    ### Common and Boundary Characters


    Regular expressions also contain characters that take on special meaning when
    they''re delimited by the `\` character. These facilitate finding common tokens,
    such as word boundaries, empty spaces, tabs, alphanumeric characters, and so on.
    For example, `\n` and `\t` are special characters that represent a newline and
    a tab, respectively.


    In this section, I cover these common boundary characters and provide examples
    of their use.


    #### Common Characters


    Certain types of characters occur often enough that regular expression languages
    have developed a shorthand for referring to them. For example, a digit is designated
    by the `\d` expression. Without the `\` character delimiting the `d`, the expression
    would simply refer to the fourth letter of the English alphabet, in lowercase.
    [Table 1-3](#LiB0008.html#ch01table03) lists some of these common characters.


    Table 1-3: Common and Boundary Characters


    | **Character** | **Description** |

    | --- | --- |

    | `.` | Matches any character; may also match line terminators. |

    | `\d` | A digit `[0-9]`. This will match any single digit from `0` to `9`. Notice
    that an input of `19` will need to match twice: Once for the `1` and once again
    for the `9`. |

    | `\D` | A nondigit `[^0-9]`. This will match any character that isn''t a digit,
    including a whitespace character. |

    | `\w` | A word character `[a-zA-Z_0-9]`. This will match any character from `a`
    to `z` or `A` to `Z`, an underscore, or any single digit from `0` to `9`. |

    | `\W` | A nonword character `[^\w]`. This will match any character that isn''t
    a word character, such as a number, including whitespace characters. |

    | `\t` | The tab character. |

    | `\n` | The newline (linefeed) character. |

    | `\r` | The carriage-return character. |

    | `\f` | The form-feed character. |

    | `\s` | A whitespace character. This includes the newline, carriage-return, tab,
    form-feed, and end-of-line characters. |

    | `\S` | A non-whitespace character, also known as `[^\s]`. This will match any
    character that isn''t a whitespace character, as described previously. |

    | `^` | The beginning of a line. |

    | `$` | The end of a line. |

    | `\b` | A word boundary. A *word boundary* is the character immediately preceding
    what we think of as "words" in English vernacular, corresponding to `\w` previously.
    It will also match the character immediately following a word. Most often, this
    character matches a space, a tab, an end of a line, or a beginning of a line.
    |

    | `\B` | A non-word boundary. |


    #### Common Characters Example


    Imagine that you need to verify that a given String consists of any alphanumeric
    character, including underscores, followed by a digit. Thus, you would accept
    `A1`, but not `!1`, because the `!` symbol isn''t an alphanumeric character or
    an underscore. The pattern you want in this case consists of an alphanumeric character
    (or underscore) followed by a digit; thus, `\w\d`, per [Table 1-1](#LiB0008.html#ch01table01).


    The pattern `\w\d` will match `h1`, `k9`, `A1`, or `11`, because each consists
    of an alphanumeric character followed by a digit. It won''t match `AA`, `9A`,
    or `*5`, because these don''t consist of an alphanumeric character followed by
    a digit. [Table 1-4](#LiB0008.html#ch01table04) dissects the pattern.


    Table 1-4: The Pattern `\w\d`


    | **Regex** | **Description** |

    | --- | --- |

    | `\w` | Any character ranging from `a` to `z`, `A` to `Z`, `0` to `9`, or an
    underscore |

    | `\d` | Followed by a single digit ranging from `0` to `9` |

    | * **In English:** Look for any alphanumeric character, or the underscore character,
    followed by a single digit. |


    #### Boundary Characters


    Regular expressions also provide a mechanism for finding common character boundaries.
    These include newlines, end-of-line characters, end-of-file characters, tabs,
    and so on. These are listed in the latter part of [Table 1-3](#LiB0008.html#ch01table03).


    #### Boundary Characters Example


    Say you want to match the word `anna` from an input string, but only if it''s
    at the beginning of a word. Thus, `Hanna` wouldn''t fit your criteria. The pattern
    you want in this case consists of a word boundary, `\b`, followed by the characters
    `a`, `n`, `n`, and `a`, thus the regex `\banna`.


    The pattern `\banna` will match `anna` but not `Hanna`, because `anna` is a cluster
    of characters preceded by a space character. A space character meets the criterion
    of being a word boundary. This isn''t true of `Hanna`, because the character immediately
    preceding the `a` character in `Hanna` is an `H`, and `H` isn''t a word boundary.
    [Table 1-5](#LiB0008.html#ch01table05) dissects the pattern.


    Table 1-5: The Pattern `\banna`


    | **Regex** | **Description** |

    | --- | --- |

    | `\b` | A word boundary |

    | `a` | Followed by the character `a` |

    | `n` | Followed by the character `n` |

    | `n` | Followed by the character `n` |

    | `a` | Followed by the character `a` |

    | * **In English:** Look for `anna` if it is the beginning of a word. |'
