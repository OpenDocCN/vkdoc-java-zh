  trans: "\n## 非捕获子组\n\n有时你可能需要定义一个组，但又不希望该组被捕获——你只是想把它当作一个单一的逻辑实体来处理。使用这些*非捕获组*的主要优势在于，它们占用的内存更少，因为不需要正则表达式引擎来跟踪匹配的部分。\n\
    \n考虑模式 ***(\\w)(\\d\\d)(\\w+)***。具体来说，如果你不需要访问末尾的 ***(\\w+)***，就可以进行一些优化。\n\n\
    要将一个组标记为非捕获组，只需在该组的左括号后紧跟字符 ***?:***。也就是说，你可以将表达式写成 ***(\\w)(\\d\\d)(?:\\w+)***。请注意，原始表达式\
    \ ***(\\w)(\\d\\d)(\\w+)*** 与新表达式 ***(\\w)(\\d\\d)(?:\\w+)*** 的唯一区别，就在于最后一个组 ***(\\\
    w+)*** 之前使用了 ***?:***。\n\n非捕获组最常见的用途是为了逻辑分离。例如，假设你需要找出一个人早上过得怎么样。你可以接受 *good morning*、*bad\
    \ morning*、*terrible morning*、*great morning* 等等。为了清晰起见，你将表达式写成 ***(good|bad|terrible|great)\
    \ morning***。也就是说，你想把各种类型的早晨当作一个单一的逻辑单元来处理。\n\n然而，假设你不需要捕获早晨的类型，因为你不会用它来做任何事情——你只是想知道它存在。那么你可以将表达式修改为\
    \ ***(?:good|bad|terrible|great) morning***。具体来说，你只需在组定义的左括号之后插入 ***?:***。这让你能够将各种类型的早晨视为一个单一的逻辑单元，但又不会浪费内存来捕获描述信息。\n\
    \n|  | 注意 | 要使一个组成为非捕获组，请在组的左括号内插入 ***?:***。 |\n\n处理非捕获组时还有一个额外的问题：就组索引而言，它们是不被计数的。这完全合理，因为你实际上是在告诉正则表达式引擎你对这些组不感兴趣。因此，为什么正则引擎要跟踪它们或提供一种允许你引用它们的机制呢？毕竟，你已经明确告诉正则表达式引擎你对此不感兴趣。\n\
    \n所以对于模式 ***(?:\\w)(\\d)*** 来说，group(0) 是整个模式，即 ***\\w\\d***，而 group(1) 是 ***(\\\
    d)***。请注意，***(?:\\w)*** 并不是通常情况下的 group(1)，因为 ***(?:\\w)*** 是一个非捕获组；它前面有 ***?:***。清单\
    \ 3-3 演示了一个简单非捕获子组的使用。\n\n清单 3-3：使用非捕获子组\n\n| **![开始示例](img/_1.gif)** |\n\n```\n\
    import java.util.regex.*;\n\npublic class NonCapturingGroupExample{\n    public\
    \ static void main(String args[]){\n        //定义模式\n        String regex = \"\
    hello|hi|greetings|(?:good morning)\";\n\n//定义候选字符串\n        String candidate1\
    \ = \"Tommy say hi to you\";\n        String candidate2 = \"Tommy say good morning\
    \ to you\";\n        //编译模式\n        Pattern pattern = Pattern.compile(regex);\n\
    \n//提取第一个模式\n        Matcher matcher = pattern.matcher(candidate1);\n        //显示组数量\n\
    \        System.out.println(\"GROUP COUNT:\"+ matcher.groupCount());\n\nif (matcher.find())System.out.println(\"\
    GOT 1:\"+candidate1);\n\n//重用匹配器，并检查第二个候选字符串\n        matcher.reset();\n     \
    \   matcher = pattern.matcher(candidate2);\n\n//显示组数量\n        System.out.println(\"\
    GROUP COUNT:\"+ matcher.groupCount());\n\nif (matcher.find())\n        System.out.println(\"\
    GOT 2:\" +candidate2);\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\
    \n此示例的输出如输出 3-1 所示。\n\n输出 3-1：NonCapturingGroupExample 的输出\n\n| **![开始示例](img/_1.gif)**\
    \ |\n\n```\nGROUP COUNT:0\nGOT 1:Tommy say hi to you\nGROUP COUNT:0\nGOT 2:Tommy\
    \ say good morning to you\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n如果你使用了捕获组，那么组计数可能会是\
    \ 1。虽然这看起来是一个相当无关紧要的问题，但随着捕获组数量的增加，它可能会变得极其复杂。\n"
- fmt: "# Greedy Qualifiers\n\nYou might have noticed that the third subgroup of the\
    \ pattern `(\\w)(\\d\\d)(\\w+)`, namely `(\\w+)`, actually provided the regex\
    \ engine with some discretion. Given the candidate `X99SuperJava`, the subexpression\
    \ `(\\w+)` only had to match one or more word characters to meet its obligation,\
    \ yet it chose to match them all. That is, it chose to match the candidate `SuperJava`\
    \ when it could have just matched `S`, `Su`, `Sup`, and so on. After all, these\
    \ also meet the requirement of being one or more word characters. Why did the\
    \ engine decide to match as much as possible?\n\nIt did so because it is, in a\
    \ word, *greedy*. The nature of the regex engine is to match as much as it possibly\
    \ can, so long as that match doesn't interfere with another matching subexpression\
    \ somewhere else in the pattern. Thus, it matches the entire candidate `SuperJava`.\
    \ [Table 3-1](#LiB0026.html#ch03table01) presents the Java regex greedy qualifiers\
    \ for your reference.\n\n**Table 3-1: Greedy Qualifiers**\n\n| Regex | Description\
    \ |\n| --- | --- |\n| `?` | The preceding is repeated once or not at all. |\n\
    | `*` | The preceding is repeated zero or more times. |\n| `+` | The preceding\
    \ is repeated one or more times. |\n| `{n}` | The preceding is repeated exactly\
    \ *n* times. |\n| `{n,}` | The preceding is repeated at least *n* times. |\n|\
    \ `{n,m}` | The preceding is repeated at least *n* times, but no more than *m*\
    \ times. This includes *m* repetitions. |\n\nGreedy matching has an interesting\
    \ behavioral pattern that I think of as *greedy-generous*. The leftmost part of\
    \ the pattern, the first `(\\w)`, attempts to match as much as possible. When\
    \ it can't match anymore, the next part of the pattern is evaluated. This is the\
    \ greedy part.\n\nIf that second part of the pattern fails to find any matches,\
    \ and then the first matching pattern starts to slowly *release characters that\
    \ it has already collected*, thus providing the second part of the pattern with\
    \ more opportunities to match. This is the generous part of the behavior.\n\n\
    At this point, one of two things can happen. The first alternative is that the\
    \ latter group can finally achieve a match, in which case the first group stops\
    \ releasing characters. The second alternative is that the latter group can fail\
    \ to match, even with the characters made available to it from the earlier group.\
    \ If this happens, then the group that was releasing characters, in effect, collects\
    \ those released characters again, and the regex engine goes on. If a later subexpression\
    \ again fails to match, then the process is repeated.\n\nSo, what does all of\
    \ this mean to you? Well, quite a bit, really. Consider the regex pattern `(\\\
    w+)(\\d\\d)(\\w+)`, which is almost identical to the pattern `(\\w)(\\d\\d)(\\\
    w+)` except that first pattern uses `+` after the first `\\w`, thus forming the\
    \ group `(\\w+)`. That little `+` can make a huge difference in terms of efficiency,\
    \ and one that you might not notice in casual use, because the result of applying\
    \ the new pattern against the candidate `X99SuperJava` doesn't change.\n\n[Listing\
    \ 3-5](#LiB0026.html#ch03list05) examines what actually happens when the pattern\
    \ is evaluated.\n\n**Listing 3-5: Greedy Qualifier Example**\n\n```\nimport java.util.regex.*;\n\
    \npublic class GreedyExample{\n    public static void main(String args[]){\n \
    \       //define the pattern\n        String regex = \"(\\\\w+)(\\\\d\\\\d)(\\\
    \\w+)\";\n\n//compile the pattern\n        Pattern pattern = Pattern.compile(regex);\n\
    \n//define the candidate string\n        String candidate = \"X99SuperJava\";\n\
    \n//extract a matcher for the candidate string\n        Matcher matcher = pattern.matcher(candidate);\n\
    \nmatcher.find();\n\n//extract the matching groups\n        System.out.println(matcher.group(1));//returns\
    \ 'X'\n        System.out.println(matcher.group(2));//returns '99'\n        System.out.println(matcher.group(3));//returns\
    \ SuperJava\n    }\n} \n```\n\nWhen `group(1)` runs, `(\\w+)` examines every character\
    \ in the candidate String `X99SuperJava`. That is, `X` is explicitly considered,\
    \ passes inspection, and is put into the matching bag for this group. Because\
    \ this pattern is greedy and has `+` after `\\w`, it continues. Next, `9` is explicitly\
    \ considered and passes inspection. Then, the next `9` is considered. This continues\
    \ until the entire String `X99SuperJava` is consumed.\n\nAfter `group(1)` is satisfied,\
    \ `group(2)`, namely `(\\d\\d)`, gets an opportunity. Because `group(2)` is unable\
    \ to match anything at all, `group(1)` releases the `a` character at the end of\
    \ `X99SuperJava`. The `a` character is considered by `group(2)`, found not be\
    \ a digit, and considered not to be sufficient. Thus, `group(1)` releases the\
    \ `v` character. `group(2)` inspects it, finds it lacking, and rejects it. Thus,\
    \ `group(1)` releases the `a` character immediately before the `v` character in\
    \ `X99SuperJava`. This continues until `group(1)` has released every character\
    \ except `X`. Finally, the release of the two `9` characters allow `group(2)`\
    \ to match. Now `group(1)` has `X` and `group(2)` has `99`.\n\nFinally, `group(3)`\
    \ gets an opportunity to run. It starts examining the candidate String `X99SuperJava`\
    \ at the point immediately following the second `9` character. And because it's\
    \ greedy, it matches the entire String `SuperJava`.\n\nThus, the two patterns\
    \ `(\\w)(\\d\\d)(\\w+)` and `(\\w+)(\\d\\d)(\\w+)` produce exactly the same result\
    \ when applied to the String `X99SuperJava` but at vastly different efficiency\
    \ costs. Although this may be insignificant when you're dealing with a small String,\
    \ it's very significant when you're parsing a directory full of files; it could\
    \ mean the difference between your application working and it running out of memory."
  raw: "## Greedy Qualifiers\n\nYou might have noticed that the third subgroup of\
    \ the pattern***(\\w)(\\d\\d)(\\w+)***, namely***(\\w+)***, actually provided\
    \ the regex engine with some discretion. Given the candidate *X99SuperJava*, the\
    \ subexpression ***(w+)*** only had to match one or more word characters to meet\
    \ its obligation, yet it chose to match them all. That is, it chose to match the\
    \ candidate *SuperJava* when it could have just matched *S*, *Su*, *Sup*, and\
    \ so on. After all, these also meet the requirement of being one or more word\
    \ characters. Why did the engine decide to match as much as possible?\n\nIt did\
    \ so because it is, in a word, *greedy.* The nature of the regex engine is to\
    \ match as much as it possibly can, so long as that match doesn't interfere with\
    \ another matching subexpression somewhere else in the pattern. Thus, it matches\
    \ the entire candidate *SuperJava*. [Table 3-1](#LiB0026.html#ch03table01) presents\
    \ the Java regex greedy qualifiers for your reference.\n\nTable 3-1: Greedy Qualifiers\n\
    \n| **Regex** | **Description** |\n| --- | --- |\n| ? | The preceding is repeated\
    \ once or not at all. |\n| * | The preceding is repeated zero or more times. |\n\
    | + | The preceding is repeated one or more times. |\n| {n} | The preceding is\
    \ repeated exactly *n* times. |\n| {n,} | The preceding is repeated at least *n*\
    \ times. |\n| {n,m} | The preceding is repeated at least *n* times, but no more\
    \ than *m* times. This includes *m* repetitions. |\n\nGreedy matching has an interesting\
    \ behavioral pattern that I think of as *greedy-generous.* The leftmost part of\
    \ the pattern, the first ***(\\w)***, attempts to match as much as possible. When\
    \ it can't match anymore, the next part of the pattern is evaluated. This is the\
    \ greedy part.\n\nIf that second part of the pattern fails to find any matches,\
    \ and then the first matching pattern starts to slowly *release characters that\
    \ it has already collected,* thus providing the second part of the pattern with\
    \ more opportunities to match. This is the generous part of the behavior.\n\n\
    At this point, one of two things can happen. The first alternative is that the\
    \ latter group can finally achieve a match, in which case the first group stops\
    \ releasing characters. The second alternative is that the latter group can fail\
    \ to match, even with the characters made available to it from the earlier group.\
    \ If this happens, then the group that was releasing characters, in effect, collects\
    \ those released characters again, and the regex engine goes on. If a later subexpression\
    \ again fails to match, then the process is repeated.\n\nSo, what does all of\
    \ this mean to you? Well, quite a bit, really. Consider the regex pattern ***(\\\
    w+)(\\d\\d)(\\w+)***, which is almost identical to the pattern ***(\\w)(\\d\\\
    d)(\\w+)*** except that first pattern uses ***+*** after the first ***\\w***,\
    \ thus forming the group ***(\\w+)***. That little ***+*** can make a huge difference\
    \ in terms of efficiency, and one that you might not notice in casual use, because\
    \ the result of applying the new pattern against the candidate *X99SuperJava*\
    \ doesn't change.\n\n[Listing 3-5](#LiB0026.html#ch03list05) examines what actually\
    \ happens when the pattern is evaluated.\n\nListing 3-5: Greedy Qualifier Example\n\
    \n| **![Start example](_1.gif)** |\n\n```\nimport java.util.regex.*;\n\npublic\
    \ class GreedyExample{\n    public static void main(String args[]){\n        //define\
    \ the pattern\n        String regex = \"(\\\\w+)(\\\\d\\\\d)(\\\\w+)\";\n\n//compile\
    \ the pattern\n        Pattern pattern = Pattern.compile(regex);\n\n//define the\
    \ candidate string\n        String candidate = \"X99SuperJava\";\n\n//extract\
    \ a matcher for the candidate string\n        Matcher matcher = pattern.matcher(candidate);\n\
    \nmatcher.find();\n\n//extract the matching groups\n        System.out.println(matcher.group(1));//returns\
    \ 'X'\n        System.out.println(matcher.group(2));//returns '99'\n        System.out.println(matcher.group(3));//returns\
    \ SuperJava\n    }\n} \n```\n\n| **![End example](_1.gif)** |\n\n|  |\n\nWhen\
    \ group(1) runs, ***(\\w+)*** examines every character in the candidate String\
    \ *X99SuperJava*. That is, *X* is explicitly considered, passes inspection, and\
    \ is put into the matching bag for this group. Because this pattern is greedy\
    \ and has *+* after ***\\w***, it continues. Next, *9* is explicitly considered\
    \ and passes inspection. Then, the next *9* is considered. This continues until\
    \ the entire String *X99SuperJava* is consumed.\n\nAfter group(1) is satisfied,\
    \ group(2), namely ***(\\d\\d)***, gets an opportunity. Because group(2) is unable\
    \ to match anything at all, group(1) releases the *a* character at the end of\
    \ *X99SuperJava*. The *a* character is considered by group(2), found not be a\
    \ digit, and considered not to be sufficient. Thus, group(1) releases the *v*\
    \ character. group(2) inspects it, finds it lacking, and rejects it. Thus, group(1)\
    \ releases the *a* character immediately before the *v* character in *X99SuperJava*.\
    \ This continues until group(1) has released every character except *X*. Finally,\
    \ the release of the two *9* characters allow group(2) to match. Now group(1)\
    \ has *X* and group(2) has *99*.\n\nFinally, group(3) gets an opportunity to run.\
    \ It starts examining the candidate String *X99SuperJava* at the point immediately\
    \ following the second *9* character. And because it's greedy, it matches the\
    \ entire String *SuperJava*.\n\nThus, the two patterns ***(\\w)(\\d\\d)(\\w+)***\
    \ and ***(\\w+)(\\d\\d)(\\w+)*** produce exactly the same result when applied\
    \ to the String *X99SuperJava* but at vastly different efficiency costs. Although\
    \ this may be insignificant when you're dealing with a small String, it's very\
    \ significant when you're parsing a directory full of files; it could mean the\
    \ difference between your application working and it running out of memory."
  trans: "\n## 贪婪量词\n\n你可能已经注意到，模式***(\\w)(\\d\\d)(\\w+)***中的第三个子组，即***(\\w+)***，实际上给了正则表达式引擎一定的自由裁量权。对于候选字符串\
    \ *X99SuperJava*，子表达式***(\\w+)***只需匹配一个或多个单词字符即可满足要求，但它却选择了匹配所有字符。也就是说，当它本可以只匹配\
    \ *S*、*Su*、*Sup* 等字符时，它却选择了匹配整个 *SuperJava*。毕竟，这些也都满足“一个或多个单词字符”的要求。为什么引擎会决定尽可能多地匹配呢？\n\
    \n它之所以这样做，是因为它本质上是*贪婪的*。正则表达式引擎的特性是尽可能多地匹配，只要这种匹配不会干扰模式中其他子表达式的匹配。因此，它匹配了整个候选字符串\
    \ *SuperJava*。表 3-1 列出了 Java 正则表达式的贪婪量词，供你参考。\n\n表 3-1：贪婪量词\n\n| **正则表达式** | **描述**\
    \ |\n| --- | --- |\n| ? | 前面的元素重复一次或零次。 |\n| * | 前面的元素重复零次或多次。 |\n| + | 前面的元素重复一次或多次。\
    \ |\n| {n} | 前面的元素恰好重复 *n* 次。 |\n| {n,} | 前面的元素至少重复 *n* 次。 |\n| {n,m} | 前面的元素至少重复\
    \ *n* 次，但不超过 *m* 次。包括 *m* 次重复。 |\n\n贪婪匹配有一种有趣的行为模式，我称之为*贪婪-慷慨*。模式最左边的部分，即第一个***(\\\
    w)***，会尝试尽可能多地匹配。当它无法再匹配时，就会评估模式的下一部分。这就是贪婪的部分。\n\n如果模式的第二部分未能找到任何匹配，那么第一个匹配模式就会开始缓慢*释放它已经收集到的字符*，从而为模式的第二部分提供更多匹配机会。这就是行为中慷慨的部分。\n\
    \n此时，可能会发生两种情况之一。第一种情况是，后面的组最终能够成功匹配，此时第一个组停止释放字符。第二种情况是，即使前面的组释放了字符供其使用，后面的组仍然无法匹配。如果发生这种情况，那么释放字符的组实际上会重新收集那些已释放的字符，然后正则表达式引擎继续执行。如果后面的子表达式再次匹配失败，则重复此过程。\n\
    \n那么，这一切对你意味着什么呢？嗯，实际上意义重大。考虑正则表达式模式***(\\w+)(\\d\\d)(\\w+)***，它与模式***(\\w)(\\\
    d\\d)(\\w+)***几乎相同，只是第一个模式在第一个***\\w***后面使用了***+***，从而形成了组***(\\w+)***。这个小小的***+***在效率上可能会产生巨大差异，而这种差异在日常使用中你可能不会注意到，因为将新模式应用于候选字符串\
    \ *X99SuperJava* 的结果并没有改变。\n\n清单 3-5 详细分析了评估该模式时实际发生的情况。\n\n清单 3-5：贪婪量词示例\n\n\
    | **![开始示例](img/_1.gif)** |\n\n```\nimport java.util.regex.*;\n\npublic class\
    \ GreedyExample{\n    public static void main(String args[]){\n        //定义模式\n\
    \        String regex = \"(\\\\w+)(\\\\d\\\\d)(\\\\w+)\";\n\n//编译模式\n        Pattern\
    \ pattern = Pattern.compile(regex);\n\n//定义候选字符串\n        String candidate = \"\
    X99SuperJava\";\n\n//为候选字符串提取匹配器\n        Matcher matcher = pattern.matcher(candidate);\n\
    \nmatcher.find();\n\n//提取匹配的组\n        System.out.println(matcher.group(1));//返回\
    \ 'X'\n        System.out.println(matcher.group(2));//返回 '99'\n        System.out.println(matcher.group(3));//返回\
    \ SuperJava\n    }\n} \n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\n当 group(1)\
    \ 运行时，***(\\w+)*** 会检查候选字符串 *X99SuperJava* 中的每一个字符。也就是说，*X* 被明确考虑，通过检查，并被放入该组的匹配包中。由于此模式是贪婪的，并且在***\\\
    w***后面有***+***，因此它会继续。接下来，*9* 被明确考虑并通过检查。然后，下一个 *9* 被考虑。这一过程一直持续到整个字符串 *X99SuperJava*\
    \ 被消耗完毕。\n\n在 group(1) 满足后，group(2)，即***(\\d\\d)***，获得了机会。由于 group(2) 根本无法匹配任何内容，group(1)\
    \ 释放了 *X99SuperJava* 末尾的 *a* 字符。group(2) 考虑了这个 *a* 字符，发现它不是数字，并认为它不满足要求。因此，group(1)\
    \ 释放了 *v* 字符。group(2) 检查了它，发现它不符合要求，并拒绝了它。因此，group(1) 释放了 *X99SuperJava* 中 *v*\
    \ 字符前面的 *a* 字符。这一过程一直持续到 group(1) 释放了除 *X* 之外的所有字符。最后，两个 *9* 字符的释放使得 group(2)\
    \ 能够匹配。现在 group(1) 拥有 *X*，group(2) 拥有 *99*。\n\n最后，group(3) 获得了运行机会。它从第二个 *9* 字符之后的位置开始检查候选字符串\
    \ *X99SuperJava*。由于它是贪婪的，它匹配了整个字符串 *SuperJava*。\n\n因此，当应用于字符串 *X99SuperJava* 时，模式***(\\\
    w)(\\d\\d)(\\w+)***和***(\\w+)(\\d\\d)(\\w+)***产生了完全相同的结果，但效率成本却大相径庭。虽然这在处理小字符串时可能微不足道，但在解析一个装满文件的目录时却非常重要；这可能意味着你的应用程序能够正常工作与内存耗尽之间的区别。\n"
- fmt: "# Possessive Qualifiers\n\nGiven the context of greedy qualifiers, *possessive\
    \ qualifiers* are relatively easy to understand. They're unique to Java, though\
    \ they'll probably be adopted by other regex languages in time. Simply put, they're\
    \ greedy, but never generous. Adding a plus sign (`+`) after an existing greedy\
    \ qualifier forms a possessive qualifier. Thus, `\\d+` becomes `\\d++`, `\\d{n,m}`\
    \ becomes `\\d{n,m}+`, and so on.\n\nConsider the previous example in which the\
    \ pattern `(\\w+)(\\d\\d)(\\w+)` is applied to the candidate string `X99SuperJava`.\
    \ I established earlier that the regex engine, when faced with the group `(\\\
    w+)`, would attempt to match as many characters as possible. I also established\
    \ that it would release those matches if such a release would help a later group\
    \ achieve a match.\n\nIf you don't want the group to release its matches to help\
    \ later groups match, however, then you would use possessive qualifiers simply\
    \ by following your last expression with an additional plus sign. You form the\
    \ pattern `(\\w++)(\\d\\d)(\\w+)`—that is, you turn `\\w+` into `\\w++`.\n\nWhen\
    \ the pattern is first run, group(1), namely `(\\w++)`, consumes every character\
    \ in the candidate `X99SuperJava`. However, because of the existence of the second\
    \ plus sign, the engine refuses to release any of those matching characters to\
    \ help the following groups match. You find that group(1) matches, and group(2)\
    \ and group(3) don't—the regex as whole doesn't match. [Listing 3-6](#LiB0027.html#ch03list06)\
    \ demonstrates this.\n\n**Listing 3-6: Possessive Qualifier Example**\n\n```\n\
    import java.util.regex.*;\n\npublic class PossesiveExample{\n    public static\
    \ void main(String args[]){\n        //define the pattern\n        String regex\
    \ = \"(\\\\w++)(\\\\d\\\\d)(\\\\w+)\";\n        //compile the pattern\n      \
    \  Pattern pattern = Pattern.compile(regex);\n\n        //define the candidate\
    \ string\n        String candidate = \"X99SuperJava\";\n\n        //extract a\
    \ matcher for the candidate string\n        Matcher matcher = pattern.matcher(candidate);\n\
    \n        if (matcher.find()){\n            System.out.println(\"GROUP 0:\" +\n\
    \            matcher.group(0));\n            System.out.println(\"GROUP 1:\" +\n\
    \            matcher.group(1));\n            System.out.println(\"GROUP 2:\" +\
    \ matcher.group(2));\n            System.out.println(\"GROUP 3:\" + matcher.group(3));\n\
    \        }\n        else{\n           System.out.println(\"NO MATCHES\" );\n \
    \       }\n\n        System.out.println(\"Done\");\n    }\n} \n```\n\n# Reluctant\
    \ Qualifiers\n\nAt the other end of the spectrum from greedy qualifiers are *reluctant\
    \ qualifiers*, which try to match as little as possible. Reluctant qualifiers\
    \ are formed by appending to an existing greedy qualifier. Thus, `X+` becomes\
    \ `X+?`, `X{n,m}` becomes `X{n,m}?`, and so on. Given the pattern `\\d+?` against\
    \ the candidate string `1234`, for example, the resultant match is `1`, as [Listing\
    \ 3-7](#LiB0028.html#ch03list07) demonstrates.\n\n**Listing 3-7: Reluctant Qualifier\
    \ Example**\n\n```\nimport java.util.regex.*;\n\npublic class ReluctantExample{\n\
    \    public static void main(String args[]){\n        //define the pattern\n \
    \       String regex = \"(\\\\d+?)\";\n        //compile the pattern\n       \
    \ Pattern pattern = Pattern.compile(regex);\n\n        //define the candidate\
    \ string\n        String candidate = \"1234\";\n\n        //extract a matcher\
    \ for the candidate string\n        Matcher matcher = pattern.matcher(candidate);\n\
    \n        while (matcher.find()){\n            //matches once for each digit\n\
    \            //if this were not an example of a\n            //reluctant qualifier,\
    \ it would match\n            //exactly once, and that match would\n         \
    \   //include every digit in the candidate\n            //string \"1234\".\n \
    \           System.out.println(matcher.group());\n\n        }\n\n        System.out.println(\"\
    Done\");\n    }\n} \n```\n\nEvery time `find()` is run, it matches as little as\
    \ possible, because it's *reluctant* to match. The Pattern matches exactly four\
    \ times: once for each digit. If you weren't using a reluctant qualifier in the\
    \ Pattern, there would have been a single match for the entire candidate string,\
    \ namely `1234`, because the Pattern would have been greedy and matched as much\
    \ as possible.\n\n# Understanding Lookarounds\n\nThere are times in programming,\
    \ as in life, when you'd like to know what to expect before making a more serious\
    \ effort. For example, you might want to know that your favorite restaurant is\
    \ open before you go there to eat. How would you accomplish that? You would, of\
    \ course, phone ahead. The same idea is used in regex lookarounds.\n\nThere are\
    \ four flavors of lookarounds: positive lookaheads, negative lookaheads, positive\
    \ lookbehinds, and negative lookbehinds. The following sections explain each in\
    \ detail.\n\n> **Note:** Lookarounds are noncapturing groups, but they never consume\
    \ text. Thus, verifying that a certain character exists further down the candidate\
    \ string doesn't mean that the character in question has been exhausted by the\
    \ regex pattern. Lookaheads don't match characters; they match positions."
