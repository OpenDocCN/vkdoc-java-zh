  trans: "\n## 概述\n\n> *\"创造力是允许自己犯错。艺术是知道该保留哪些错误。\"*\n> \n> —— 斯科特·亚当斯\n\n在本章中，我将提供一些关于如何在\
    \ Java 这类完全面向对象的语言中使用正则表达式的建议。与过程式语言相比，这可以（而且通常应该）是一种不同的体验，因为 Java 提供了不同的工具集。本章将涵盖何时使用\
    \ `java.util.regex` 包，何时不使用它，以及何时用其他 Java 特性来补充 `java.util.regex` 包。\n\nJava 中表述的正则表达式与指导\
    \ Java 数据库连接（JDBC）的原则有很多共同之处。JDBC 使用通用描述语言——结构化查询语言（SQL）来描述和操作信息，而 `java.util.regex`\
    \ 包则使用正则表达式。SQL 提供了一个通用的 `Command` 对象来“编译”该描述，正如正则表达式使用 `Pattern` 对象一样。SQL 提供了\
    \ `ResultSet` 来返回搜索的结果，而正则表达式则使用 `Matcher`。JDBC 和正则表达式包的使用模式是相似的。也就是说，两者都提供通用描述，在一个对象中编译它，并在另一个对象中检查结果。\n\
    \n在 Java 中使用正则表达式时，借鉴 JDBC 编程中的相关经验是很有意义的。我发现有用的 JDBC 和通用 Java 原则组合如下：\n\n*  \
    \ 优化你的连接。\n*   批量读取和写入。\n*   将模式存储在外部。\n*   根据需要编译你的 `Pattern`。\n*   不要局限于正则表达式解决方案。\n\
    \n## 优化你的连接\n\n在处理正则表达式时，应优先使用 `FileChannel` 而非其他文件访问方式。也就是说，不要使用 `RandomAccessFile`、`FileInputStream`\
    \ 或 `FileOutputStream`，而应使用 `FileChannel` 来访问文件。\n\n虽然对 `FileChannel` 的详细讨论超出了本书的范围，但我还是想简要提一下。`FileChannel`\
    \ 是 Java 在高性能文件输入/输出（I/O）方面的最新成果，而且似乎非常成功。在底层，它们会根据你使用的操作系统进行优化，因此至少与 `java.io.*`\
    \ 中的对应类一样快速高效——事实上，它们通常快得多。它们还提供了诸如 `FileLock`、在文件中任意定位、同时读写以及直接映射到内存缓冲区等工具。\n\
    \n|  | 注意 | `FileChannel` 与线程的交互也更好，但这完全是另一个话题，超出了本次讨论的范围。 |\n\n`FileChannel`\
    \ 通过按字节级别读取数据并将其存储到 `ByteBuffer` 中来工作。因此，使用 `FileChannel` 读取文件内容的代码可能如清单 4-1 所示。要了解更多关于\
    \ `ByteBuffer` 和 `Channel` 的一般信息，请查阅 Sun 的文档。\n\n清单 4-1：使用 FileChannel 访问文件\n\n\
    | **![开始示例](img/_1.gif)** |\n\n```\nimport java.io.*;\nimport java.nio.*;\nimport\
    \ java.nio.channels.*;\n\n/**\n* 提供一种简便机制来提取文件中的正则表达式内容\n*/\npublic class FileChannelExample{\n\
    \    public static void main(String args[]) throws IOException{\n        //打开一个指向本类源代码的连接\n\
    \        FileInputStream fis =\n        new FileInputStream(\"FileChannelExample.java\"\
    );\n        //获取一个文件通道\n        FileChannel fc = fis.getChannel();\n\n       \
    \ //创建一个足够大的 ByteBuffer\n        //并将文件内容读入其中\n        ByteBuffer bb = ByteBuffer.allocate((int)fc.size());\n\
    \n        fc.read(bb);\n        bb.flip();\n\n        //将文件内容保存为字符串\n        String\
    \ fileContent= new String(bb.array());\n\n        //释放 FileChannel\n        fc.close();\n\
    \        fc = null;\n\n        //输出本文件的内容\n        System.out.println(\"fileContent\
    \ = \" + fileContent);\n    }\n}\n```\n\n| **![结束示例](img/_1.gif)** |\n\n|  |\n\
    \n这个过程非常简单，并且比传统的文件访问方式具有许多优势。基本上，你打开一个 `FileChannel`，将其内容读入 `ByteBuffer` 或其子类之一，然后检查该缓冲区。这在清单\
    \ 4-1 中很容易理解，因为代码的相关部分以粗体显示。如你所见，如果需要，你可以轻松地将这些数据转换为字符串。当然，这里你最关心的优势与速度和内存使用有关，但使用\
    \ `FileChannel` 还有许多其他与正则表达式无关的原因。\n\n## 批量读取和写入\n\n另一个重要的连接问题是，在处理文件时，愿意将整个文件内容读入内存。虽然对于非常大的文件，这个原则有时会适得其反，但我发现它通常对我很有效。操作中最昂贵的部分通常是\
    \ I/O 事务时间。根据你的情况，用内存换取 I/O 使用，从而避免重复的 I/O 调用，可能是非常合理的。\n\n总的来说，我发现将内容读入内存，在其中进行操作，然后根据需要将其写回文件，效果更好。我发现这比读取一点文件、做一些修改、写出这些修改、再读取更多文件等操作更高效。\n\
    \n|  | 注意 | 在处理非常大的文件时，我有时发现有必要忽略上述建议，而实际上一次只读取部分数据。这是因为一个模式很容易描述一个可能需要同时匹配文件开头和结尾的部分，从而可能要求你将整个文件保留在内存中。对于极大的文件，这根本不可能。在这种情况下，我会尽最大努力优化我的表达式，并一次只应用于一个部分。如果这还不够，我会编写一个专门设计用于解析特定文件的自定义\
    \ Java 程序。第一遍可能查找开始序列，第二遍可能在该部分内查找子匹配，依此类推。 |\n"
- fmt: '# Store Your Patterns Externally


    Storing your regex pattern description in an external file offers three important
    advantages. The first is that the Pattern doesn''t have to be delimited once again
    for the String constructor, so it''s easier to read. The second is a direct corollary
    of the first, in that the first makes it easier to use generic, non-Java-delimited
    regular expressions in your code. The third is that extracting the actual pattern
    to an external file allows you to change the pattern later without having to recompile
    the class.


    |  | Note | In this context, when I use the term "Java-delimited," I mean the
    double delimiting of the character with the character in Strings. |


    A Java regex pattern can be a little confusing, especially to someone unfamiliar
    with how the String and regex delimiters work together. For example, consider
    the following e-mail descriptor, which is freely available from [http://www.regexlib.com](http://www.regexlib.com).
    It''s difficult enough to parse out exactly what `^([a-zA-Z0-9_\-\.]+)@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.)|(([a-zA-Z0-9\-]+\.)+))([a-zA-Z]{2,4}|[0-9]{1,3})(\]?)$`
    means without having to add the somewhat awkward `\\` characters that the String
    object''s constructor requires. It''s enough to make you reconsider using regex
    altogether.


    Also, the process of changing the regex to be Java-delimited strings introduces
    fat-finger risks. Unsurprisingly, because your Java regex won''t look conventional,
    it''s that much more difficult to solicit help from regex gurus, most of whom
    are probably more familiar with Perl.


    It''s also very possible that as your requirements evolve, you may need to change
    the regular expression without changing any other part of the code. Thus, it''s
    a good idea to store your regex patterns in an external file and then retrieve
    them when you need them. This offers an opportunity to kill two birds with one
    stone, because you would, conceivably, store your regex patterns externally and
    in such a manner that the double delimiting isn''t required. But which persistence
    mechanism should you use? The next few sections discuss some options.


    ## Don''t Use Normal Property Files to Store Patterns


    At first glance, the solution to storing patterns externally seems to be property
    files. They''re already in place, tried and true, easy to use, easy to modify,
    intuitive in format, and object oriented. However, Java property files are, unfortunately,
    not quite up to the task, because of three very strong objections.


    The first objection is that property values need to be delimited exactly as Strings
    need to be delimited in order to work properly. That is, the pattern `\w` would
    have to be stored as `\\w`, and the pattern `^([a-zA-Z0-9_\-\.]+)@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.)|(([a-zA-Z0-9\-]+\.)+))([a-zA-Z]{2,4}|[0-9]{1,3})(\]?)$`
    becomes the unwieldy


    ```

    ^([a-zA-Z0-9_\\-\\.]+)@((\\[[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\.)|(([a-zA-Z0-9\\-]+\\.)+))([a-zA-Z]{2,4}|[0-9]{1,3})(\\]?)$

    ```


    This is hardly an improvement as far as legibility is concerned.


    Second, Properties objects preprocess certain characters, including `\t`, `\n`,
    and `\\`. That is, you have to understand the internal mechanisms of how the Properties
    object stores "special" characters before you use them to store your regex pattern.
    This is hardly an improvement, as far as abstraction is concerned.


    Finally, property files internally use the `\` character to delimit the end of
    a line, so that it can be continued on the next line. Thus, the property file
    entry


    ```

    Produce = carrots, \

    lettuce

    ```


    is read as


    ```

    Produce = carrots, lettuce

    ```


    Accordingly, using Properties objects actually increases the complexity of the
    pattern, because it introduces new things you have to know about in addition to
    the regex. Again, this is hardly an improvement as far as ease of maintenance
    is concerned. All things considered, using property files to store regex patterns
    seems like an invitation for bugs. We can do better.


    ## Don''t Use XML to Store Patterns


    XML is also a reasonable candidate for external storage of regex patterns. On
    the positive side, XML is an easy, universally accepted way to keep external system
    data, and there are many ways to access that data. As a matter of fact, J2SE 1.4
    offers the extraordinarily useful `XMLEncoder` and `XMLDecoder` classes, which
    make it easier than ever to persist and retrieve XML data. `XMLEncoder` and `XMLDecoder`
    are new Java classes that can help store JavaBeans as serialized XML—better yet,
    the XML is human readable and maintainable, so changing the XML actually changes
    the attributes of the object when it is deserialized. Moreover, depending on which
    XML persistence mechanism you use, the XML parsers may not require you to Java-delimit
    your patterns.


    There are two big problems with the XML persistence approach, however. The first
    problem is that the easiest XML persistence mechanism, the `XMLEncoder` and `XMLDecoder`
    classes, decorate Strings as they''re stored. Thus, the `<` character becomes
    `&lt`, `>` becomes `&gt`, and so on. Second, the XML persistence mechanism, simply
    by virtue of being XML, has a lot of cluttering metadata that isn''t germane to
    regex. But the proof, as they say, is in the pudding. To illustrate this point,
    let''s try an XML-based approach in the [next section](#LiB0036.html#ch04lev2sec3)
    and see how it works out.'
