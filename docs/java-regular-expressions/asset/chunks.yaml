- fmt: "# Compile Your Patterns as You Need To\n\nMake a point of compiling your Patterns\
    \ on a just-in-time basis if there's a chance you won't need them. That is, don't\
    \ compile a `Pattern` object until the time you actually need it, *if* you actually\
    \ need it. This is especially true in a logically branching method, in which there\
    \ might not be any need to even use a `Pattern`. Better yet, *look* for opportunities\
    \ to conditionally compile your patterns.\n\nFor example, say you're parsing log\
    \ entries in your log `Handler`, because you want to send out an emergency e-mail\
    \ if any of the entries contain an `Exception`. Of course, you could compile the\
    \ pattern `(.*Exception.*)` and check it against every `String` that's logged.\
    \ However, this is probably overkill, because you don't, of course, expect any\
    \ exceptions in your code. It's probably a better idea to simply do a `String.indexOf`\
    \ for the substring `Exception` and only try the extraction process if the index\
    \ is positive. This is demonstrated in [Listing 4-9](#LiB0037.html#ch04list09).\n\
    \n**Listing 4-9: Log Handler That Checks for Exceptions**\n\n```\nimport java.util.logging.*;\n\
    import java.util.regex.*;\n/**\n * Listens for exceptions in the log entries\n\
    \ * @author M Habibi\n */\npublic class ExceptionHandler extends StreamHandler{\n\
    \n    /**\n    * examines the record being logged, and checks to see if\n    *\
    \ it contains an exception\n    * @param record the LogRecord about to be logged\n\
    \    */\n    public void publish(LogRecord record){\n        //extract the message\n\
    \        String msg = record.getMessage();\n\n        //check to see if the message\
    \ contains an exception\n        int exceptionIndex = msg.indexOf(\"Exception\"\
    );\n\n        //if the message didn't contains the String\n        //'Exception',\
    \ then don't bother compiling the regex\n        if (exceptionIndex > -1){\n\n\
    \            Pattern pattern =\n              Pattern.compile(\"(.*Exception.*)\"\
    );\n\n            Matcher matcher = pattern.matcher(msg);\n\n            if (matcher\
    \ != null && matcher.find()){\n                String err = \"EXCEPTION FOUND\
    \ \" + matcher.group(1);\n               System.out.println(err);\n          \
    \     //put emailer here\n            }\n        }\n    }\n}\n```\n\nThis isn't\
    \ particularly clever code, but it does a good job of cultivating those suspects\
    \ that require further investigation and those that can't possibly be candidates.\
    \ The principle here, of course, is intelligent discrimination. If you're able\
    \ to rule out impossible candidates, then you'll save time and resources in production.\
    \ [Listing 4-10](#LiB0037.html#ch04list10) shows the test harness.\n\n**Listing\
    \ 4-10: Adding the Log Handler to Your Log**\n\n```\nimport java.util.logging.*;\n\
    \n/**\n* Demonstrates the usage of the log listener\n*/\npublic class LogDemo{\n\
    \    public static void main(String args[]){\n        Logger log = Logger.global;\n\
    \        setLoggerhandler(log);\n\n        //test the code. Do even finest-grade\
    \ entries get\n        //logged?\n        log.finest(new Exception().toString());\n\
    \    }\n\n    /**\n    * Sets a logger handler for the given log.\n    * @param\
    \ log the logger that needs an listener\n    * @version 1.0 5/12/2002\n    */\n\
    \    public static void setLoggerhandler(Logger logger){\n        Handler handler\
    \ = new ExceptionHandler();\n        logger.addHandler(handler);\n\n        //set\
    \ to handle all errors, so that it will examine\n        //all errors.\n     \
    \   logger.setLevel(Level.ALL);\n}}\n```\n\n| **Note** | You'll notice that this\
    \ code doesn't deal with the `Logger.throwing` method, and it doesn't actually\
    \ send out an e-mail. Don't worry, code that does is provided at [http://www.influxs.com](http://www.influxs.com).\
    \ However, the implementation here would require explanations that are beyond\
    \ the scope of regular expressions. |\n\n## Don't Limit Yourself to a Regex Solution\n\
    \nWhen you have a hammer, everything starts to look like a nail. It's important\
    \ to be aware that not all text-parsing problems require a regex solution. For\
    \ example, say you need to break a comma-delimited `String` into its various components.\
    \ Of course, it's easy enough to write a regex that does this. However, you don't\
    \ need regular expressions for this problem; the `StringTokenizer` is enough.\n\
    \nAlong the same lines, you don't have to limit yourself exclusively to a regex\
    \ or a traditional Java solution; you can mix and match. For example, say you\
    \ need to parse a log file and identify the type and frequency of the Exceptions\
    \ in it. You could probably write a regex that does this for you in a single line—I'm\
    \ not smart or patient enough to do this, but there are probably plenty of people\
    \ who are.\n\nHowever, I would contend that this probably isn't the correct approach\
    \ in Java. By the time you're done writing, testing, and documenting the regex,\
    \ the other programmers on your team will be trembling in fear at the thought\
    \ of maintaining your code. It's probably easier to take a programmatic solution\
    \ that takes advantage of regular expressions, as opposed to writing a pure regex\
    \ solution. Such a solution is presented in [Listing 4-9](#LiB0037.html#438).\n\
    \nThe code in [Listing 4-11](#LiB0038.html#ch04list11) is self-sufficient and\
    \ should be ready to go as is. However, it requires two small accommodations.\
    \ First, you'll have to define a `regexCache.txt` file to hold your regex pattern,\
    \ as discussed previously for [Listing 4-7](#LiB0036.html#431). Second, you'll\
    \ have to define a regex entry in that file for the key `exRegex`. The value of\
    \ the entry should be `\\s([a-zA-Z.]*\\.[a-zA-Z.]*Exception)`. Then, to run the\
    \ code, you simply have to point to a log file that contains exceptions.\n\n**Listing\
    \ 4-11: The Log Parser**\n\n```\nimport java.util.regex.*;\nimport java.util.*;\n\
    import java.io.*;\nimport java.nio.*;\nimport java.nio.channels.*;\nimport java.beans.*;\n\
    \n/**\n* This class parses the log, and identifies all of the\n* exceptions thrown,\
    \ as well as the frequency with which\n* they occurred.\n*\n*@ author M Habibi\n\
    */\npublic class LogParser{\n/**\n* the key of the regex that applies the exception\n\
    * pattern\n*/\npublic static final String REGEX_KEY=\"exRegex\";\n\n/**\n* The\
