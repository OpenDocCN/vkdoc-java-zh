    ### Confirming Name Formats Example\n\nThe code in [Listing 1-5](#LiB0009.html#ch01list05)\
    \ determines if the given name meets the criterion of being well formatted. It\
    \ looks for a first name token, an optional middle name token, and finally a last\
    \ name token. For this example's purposes, a name token consists of a capital\
    \ letter followed by any number of lowercase letters.\n\nListing 1-5: MatchNameFormats.java\n\
    \n| **![Start example](_1.gif)** |\n\n```\nimport Java.util.regex.*;\nimport java.io.*;\n\
    \npublic class MatchNameFormats{\n   public static void main(String args[]){\n\
    \nisNameValid(args[0]);\n   }\n\n/**\n   * Confirms that the format for the given\
    \ name is valid.\n   * @param name is a String representing the name.\n   * @returns\
    \ true if the name format is acceptable.\n   */\n   public static boolean isNameValid(String\
    \ name){\n     boolean retval=false;\n\nString nameToken =\"\\\\p{Upper}(\\\\\
    p{Lower}+\\\\s?)\";\n\nString namePattern = \"(\"+nameToken+\"){2,3}\";\n\nretval\
    \ = name.matches(namePattern);\n\n//prepare a message indicating success or failure\n\
    \     String msg = \"NO MATCH: pattern:\" + name\n          + \"\\r\\n       \
    \    regex :\" + namePattern;\n\nif (retval){\n     msg = \"MATCH     pattern:\"\
    \ + name\n          + \"\\r\\n           regex :\" + namePattern;\n     }\n\n\
    System.out.println(msg +\"\\r\\n\");\n     return retval;\n     }\n} \n```\n\n\
    | **![End example](_1.gif)** |\n\n|  |\n\nThis example is interesting because\
    \ it takes advantage of Java's robustness to a degree that the previous example\
    \ didn't. Specifically, you define what you mean when you say a \"name token\"\
    :\n\n```\n String nameToken =\"\\\\p{Upper}(\\\\p{Lower}+\\\\s?)\";\n```\n\nThen\
    \ you use that definition later:\n\n```\n String namePattern = \"(\"+nameToken+\"\
    ){2,3}\"; \n```\n\n|  | Note  | ***\\p{Upper}*** and ***\\p{Lower}*** are described\
    \ shortly. They simply mean any uppercase character and any lowercase character,\
    \ respectively. |\n\nThis helps to keep the regex pattern from becoming overwhelming,\
    \ and it also helps to isolate errors. As the examples in this book grow more\
    \ ambitious, you'll start to see that coupling regular expressions with Java's\
    \ powerful language can offer benefits that would, at best, be terse using regular\
    \ expressions alone. [Listing 1-5](#LiB0009.html#ch01list05) shows the program\
    \ MatchNameFormats.java, [Output 1-5](#LiB0009.html#ch01ex05) shows the result\
    \ of running the program, and [Table 1-22](#LiB0009.html#ch01table22) dissects\
    \ the pattern.\n\nTable 1-22: The Pattern *(\\p{Upper}(\\p{Lower}+\\s?)){2,3*}\n\
    \n| **Regex** | **Description** |\n| --- | --- |\n| ( | A group consisting of\
    \ |\n| \\p{Upper} | An uppercase character |\n| ( | Followed by a inner group\
    \ consisting of |\n| \\p{Lower} | A lowercase character |\n| + | Repeated one\
    \ or more times |\n| \\s? | Followed by an optional space |\n| ) | The end of\
    \ the inner group |\n| ) | The end of the outer group |\n| { | Repeated at least\
    \ |\n| 2 | Two times |\n| , | But no more than |\n| 3 | Three times |\n| } | End\
    \ repetition |\n| * **In English:** Look for two or three words beginning with\
    \ a capital letter followed by any number of lowercase letters. Each word could\
    \ be followed by a single space. |\n\nOutput 1-5: Result of Running MatchNameFormats.java\n\
    \n| **![Start example](_1.gif)** |\n\n```\nC:\\RegEx\\Examples\\chapter1>java\
    \ MatchNameFormats \"John Smith\"\nMATCH    pattern:John Smith\n          regex\
    \ :(\\p{Upper}(\\p{Lower}+\\s?)){2,3}\n\nC:\\RegEx\\Examples\\chapter1>java MatchNameFormats\
    \ \"John McGee\"\nMATCH     pattern:John McGee\n           regex :(\\p{Upper}(\\\
    p{Lower}+\\s?)){2,3}\n\nC:\\RegEx\\Examples\\chapter1>java MatchNameFormats \"\
    John Willliam Smith\"\nMATCH     pattern:John Willliam Smith\n           regex\
    \ :(\\p{Upper}(\\p{Lower}+\\s?)){2,3}\n\nC:\\RegEx\\Examples\\chapter1>java MatchNameFormats\
    \ \"John Q Smith\"\nNO MATCH: pattern:John Q Smith\n           regex :(\\p{Upper}(\\\
    p{Lower}+\\s?)){2,3}\n\nC:\\RegEx\\Examples\\chapter1>java MatchNameFormats \"\
    John allen Smith\"\nNO MATCH: pattern:John allen Smith\n           regex :(\\\
    p{Upper}(\\p{Lower}+\\s?)){2,3}\n\nC:\\RegEx\\Examples\\chapter1>java MatchNameFormats\
    \ \"John\"\nNO MATCH: pattern:John\n           regex :(\\p{Upper}(\\p{Lower}+\\\
    s?)){2,3}\n```"
  trans: "\n### 确认日期示例\n\n清单 1-4 中的代码用于检查给定日期的格式。它确认给定的日期格式由一位或两位数字、后跟一个连字符、再后跟一位或两位数字、后跟一个连字符、最后跟四位数字组成。输出\
