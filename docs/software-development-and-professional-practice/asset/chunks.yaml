- fmt: '### Modular Decomposition


    In 1972, David Parnas published a paper titled “On the Criteria to Be Used in
    Decomposing Systems into Modules” that proposed that one could design programs
    using a technique called *modularity*.[⁶](#Chapter07.html#CHP-7-FN-6) Parnas''
    paper was also one of the first papers to describe a decomposition based on *information
    hiding*, one of the key techniques in object-oriented programming. In his paper,
    Parnas highlighted the differences between a top-down decomposition of a problem
    based on the *flow of control* of a problem solution and a decomposition of the
    problem that used *encapsulation* and *information hiding* to isolate data definitions
    and their operations from each other. His paper is a clear precursor to object-oriented
    analysis and design (OOA&D), which we''ll see in the next chapter.


    While Parnas'' paper pre-dates the idea, he was really talking about a concept
    called *separation of concerns*. “In computer science, *separation of concerns*
    is the process of separating a computer program into distinct features that overlap
    in functionality as little as possible. A concern is any piece of interest or
    focus in a program. Typically, concerns are synonymous with features or behaviors.
    Progress towards separation of concerns is traditionally achieved through modularity
    of programming and encapsulation (or “transparency” of operation), with the help
    of information hiding.”[⁷](#Chapter07.html#CHP-7-FN-7) Traditionally, separation
    of concerns was all about separating functionality of the program. Parnas added
    the idea of separating the data as well, so that individual modules would control
    data as well as the operations that acted on the data and the data would be visible
    only through well-defined interfaces.


    There are three characteristics of modularity that are key to creating modular
    programs:


    *   Encapsulation

    *   Loose coupling (how closely do modules relate to each other)

    *   Information hiding


    In a nutshell, *encapsulation* means to bundle a group of services defined by
    their data and behaviors together as a module, and keep them together. This group
    of services should be coherent and clearly belong together. (Like a function,
    a module should do just one thing.) The module then presents an *interface* to
    the user and that interface is ideally the only way to access the services and
    data in the module. An objective of encapsulating services and data is high cohesion.
    This means that your module should do one thing and all the functions inside the
    module should work towards making that one thing happen. The closer you are to
    this goal, the higher the cohesion in your module. This is a good thing.


    The complement of encapsulation is *loose coupling*. Loose coupling describes
    how strongly two modules are related to each other. This means we want to minimize
    the dependence any one module has on another. We separate modules to minimize
    interactions and make all interactions between modules through the module interface.
    The goal is to create modules with internal integrity (strong cohesion) and small,
    few, direct, visible, and flexible connections to other modules (loose coupling).
    Good coupling between modules is loose enough that one module can easily be called
    by others.


    __________


    ⁶ Parnas, D. “On the Criteria to be Used in Decomposing Systems into Modules.”
    *Communications of the ACM* 15(12): 1053-1058\. (1972)


    ⁷ Wikipedia. Separation of Concerns. 2009\. [`http://en.wikipedia.org/wiki/Separation_of_concerns`](http://en.wikipedia.org/wiki/Separation_of_concerns)`.`
    Retrieved on December 7, 2009.


    Coupling falls into four broad categories that go from good to awful:


    *   *Simple data coupling:* Where non-structured data is passed via parameter
    lists. This is the best kind of coupling, because it lets the receiving module
    structure the data as it sees fit and it allows the receiving module to decide
    what to do with the data.

    *   *Structured data coupling*: Where structured data is passed via parameter
    lists. This is also a good kind of coupling, because the sending module keeps
    control of the data formats and the receiving module gets to do what it wants
    to with the data.

    *   *Control coupling*: Where data from module A is passed to module B and the
    content of the data tells module B what to do. This is not a good form of coupling;
    A and B are too closely coupled in this case because module A is controlling how
    functions in module B will execute.

    *   *Global-data coupling*: Where the two modules make use of the same global
    data. This is just awful. It violates a basic tenet of encapsulation by having
    the modules share data. This invites unwanted side effects and ensures that at
    any given moment during the execution of the program that neither module A nor
    module B will know precisely what is in the globally shared data. And what the
    heck are you doing using global variables anyway? Bad programmer!


    Information hiding is often confused with encapsulation, but they are not the
    same thing. Encapsulation describes a process of wrapping both data and behaviors
    into a single entity – in our case, a module. Data can be publicly visible from
    within a module, and thus not hidden. Information hiding, on the other hand, says
    that the data and behaviors in a module should be controlled and visible only
    to the operations that act on the data within the module, so it''s invisible to
    other, external, modules. This is an important feature of modules (and later of
    objects as well) because it leaves control of data in the module that understands
    best how to manipulate the data and it protects the data from side effects that
    can arise from other modules reaching in and tweaking the data.


    Parnas was not just talking about hiding data in modules. His definition of information
    hiding was even more concerned with hiding design decisions in the module definition.
    “We propose … that one begins with a list of difficult design decisions or design
    decisions which are likely to change. Each module is then designed to hide such
    a decision from the others.”[⁸](#Chapter07.html#CHP-7-FN-8) Hiding information
    in this manner allows clients of a module to use the module successfully without
    needing to know any of the design decisions that went into constructing the module.
    It also allows developers to change the implementation of the module without affecting
    how the client uses the module.'
  raw: '### Modular Decomposition


    In 1972, David Parnas published a paper titled “On the Criteria to Be Used in
    Decomposing Systems into Modules” that proposed that one could design programs
    using a technique called *modularity*.[⁶](#Chapter07.html#CHP-7-FN-6) Parnas''
    paper was also one of the first papers to describe a decomposition based on *information
    hiding*, one of the key techniques in object-oriented programming. In his paper,
    Parnas highlighted the differences between a top-down decomposition of a problem
    based on the *flow of control* of a problem solution and a decomposition of the
    problem that used *encapsulation* and *information hiding* to isolate data definitions
    and their operations from each other. His paper is a clear precursor to object-oriented
    analysis and design (OOA&D), which we''ll see in the next chapter.


    While Parnas'' paper pre-dates the idea, he was really talking about a concept
    called *separation of concerns*. “In computer science, *separation of concerns*
    is the process of separating a computer program into distinct features that overlap
    in functionality as little as possible. A concern is any piece of interest or
    focus in a program. Typically, concerns are synonymous with features or behaviors.
    Progress towards separation of concerns is traditionally achieved through modularity
    of programming and encapsulation (or “transparency” of operation), with the help
    of information hiding.”[⁷](#Chapter07.html#CHP-7-FN-7) Traditionally, separation
    of concerns was all about separating functionality of the program. Parnas added
    the idea of separating the data as well, so that individual modules would control
    data as well as the operations that acted on the data and the data would be visible
    only through well-defined interfaces.


    There are three characteristics of modularity that are key to creating modular
    programs:


    *   Encapsulation

    *   Loose coupling (how closely do modules relate to each other)

    *   Information hiding


    In a nutshell, *encapsulation* means to bundle a group of services defined by
    their data and behaviors together as a module, and keep them together. This group
    of services should be coherent and clearly belong together. (Like a function,
    a module should do just one thing.) The module then presents an *interface* to
    the user and that interface is ideally the only way to access the services and
    data in the module. An objective of encapsulating services and data is high cohesion.
    This means that your module should do one thing and all the functions inside the
    module should work towards making that one thing happen. The closer you are to
    this goal, the higher the cohesion in your module. This is a good thing.


    The complement of encapsulation is *loose coupling*. Loose coupling describes
    how strongly two modules are related to each other. This means we want to minimize
    the dependence any one module has on another. We separate modules to minimize
    interactions and make all interactions between modules through the module interface.
    The goal is to create modules with internal integrity (strong cohesion) and small,
    few, direct, visible, and flexible connections to other modules (loose coupling).
    Good coupling between modules is loose enough that one module can easily be called
    by others.


    __________


    ⁶ Parnas, D. “On the Criteria to be Used in Decomposing Systems into Modules.”
    *Communications of the ACM* 15(12): 1053-1058\. (1972)


    ⁷ Wikipedia. Separation of Concerns. 2009\. [`http://en.wikipedia.org/wiki/Separation_of_concerns`](http://en.wikipedia.org/wiki/Separation_of_concerns)`.`
    Retrieved on December 7, 2009.


