    接下来，`Observer` 接口告诉我们如何更新观察者。


    `public interface Observer`

    `{`

    `    public void update(int foo, String bar);`

    `}`


    然后是 `Observer` 接口的实现。


    `public class ConcreteObserver implements Observer`

    `{`

    `    private int foo;`

    `    private String bar;`

    `    Subject subj;`


    `    /**`

    `     * ConcreteObserver 类的构造函数`

    `     */`

    `    public ConcreteObserver(Subject subj) {`

    `        this.subj = subj;`

    `        subj.addObserver(this);`

    `    }`


    `   public void update(int foo, String bar)`

    `    {`

    `        this.foo = foo;`

    `        this.bar = bar;`

    `        show();`

    `    }`


    `    private void show() {`

    `        System.out.printf("Foo = %s Bar = %s\n", this.foo, this.bar);`

    `    }`

    `}`


    最后，是创建发布者、每个观察者并将它们组合在一起的驱动程序。


    `public class ObserverDriver`

    `{`

    `    public static void main(String [] args) {`

    `        ConcreteSubject subj = new ConcreteSubject();`


    `        ConcreteObserver obj = new ConcreteObserver(subj);`


    `        subj.setState(12, "Monday");`

    `        subj.setState(17, "Tuesday");`

    `    }`

    `}`


    执行驱动程序的输出（全部来自 `ConcreteObserver` 对象中的 `show()` 方法）将如下所示：


    * * *


    `Foo = 12 Bar = Monday`

    `Foo = 17 Bar = Tuesday`


    * * *


    在许多方面，观察者设计模式的工作方式类似于 Java 事件接口。在 Java 中，你创建一个类，该类注册为特定事件类型的“监听器”（我们的观察者）。你还需要创建一个方法，该方法就是实际的观察者，并在事件发生时做出响应。当该类型的事件发生时，Java
    事件对象（我们的主题）会通过调用你编写的方法来通知你的观察者，并将事件中的数据传递给观察者方法——Java 事件使用观察者模式的*推模型*。


    例如，如果你在 Java 程序中创建了一个 *`Button`* 对象，你可以使用 *`Button`* 对象的 *`addActionListener()`*
    方法来注册观察 *`ActionEvent`*。当 *`ActionEvent`* 发生时，所有 *`ActionListener`* 都会通过调用名为 *`actionPerformed()`*
    的方法得到通知。这意味着你的 *`Button`* 对象必须实现 *`actionPerformed()`* 方法来处理该事件。


    ##### 策略模式


    有时，你的应用程序中会有多种方式执行单个操作，或者有几种不同的行为，每种行为都有不同的接口。实现此类功能的一种方法是使用 `switch` 语句，如下所示：


    `switch (selectBehavior) {`

    `        case Behavior1:`

    `                Algorithm1.act(foo);`

    `                break;`

    `        case Behavior2:`

    `                Algorithm2.act(foo, bar);`

    `                break;`

    `        case Behavior3:`

    `                Algorithm3.act(1, 2, 3);`

    `                break;`

    `}`


    这种结构的问题在于，如果你添加另一种行为，就需要修改这段代码，并且可能还需要修改所有其他需要选择不同行为的代码。这并不好。


    策略设计模式可以帮你解决这个问题。它指出，如果你有几种需要动态选择的行为（算法），你应该确保它们都遵循相同的接口——一个 `Strategy` 接口——然后通过一个名为
    `Context` 的驱动程序动态选择它们，该驱动程序由客户端软件告知调用哪个策略。策略模式体现了我们面向对象设计的两个基本原则——*封装变化的概念*和*针对接口编程，而非针对实现编程*。图
    11-7 展示了策略模式的设置。


    ![images](img/1107.jpg)


    ***图 11-7.** 典型的策略模式布局*


    一些可能使用策略模式的例子包括：


    *   使用不同的压缩算法捕获视频

    *   为不同类型的实体（个人、公司、非营利组织）计算税款

    *   以不同格式（折线图、饼图、条形图）绘制数据

    *   使用不同格式压缩音频文件


    在每个例子中，你可以想象让应用程序告诉驱动程序——`Context`——使用哪个策略，然后请求 Context 执行该操作。


    举个例子，假设你是一名刚获得执照的注册会计师，正尝试编写自己的软件来计算客户的税款。（为什么注册会计师要编写自己的税务程序，我也不知道；请配合一下。）最初，你将客户分为三类：仅申报个人所得税的个人、申报企业所得税的公司以及几乎不申报任何税款的非营利组织。现在，所有这些群体都需要计算税款，因此计算税款的类行为应该对所有群体相同；但他们会以不同的方式计算税款。所以我们需要一个策略设置，使用相同的接口——封装应用程序中变化的部分，并将具体类编码到接口——并允许我们的客户端类选择使用哪种类型的税务客户。图
    11-8 是我们程序的结构图。


    ![images](img/1108.jpg)


    ***图 11-8.** 使用策略模式选择税务行为*


    我们创建一个 `TaxStrategy` 接口，所有具体的 `TaxStrategy` 类都将实现该接口。


    `public interface TaxStrategy {`

    `  public double computeTax(double income);`

    `}`


    由于这里唯一变化的是税款的计算方式，因此我们的 `TaxStrategy` 接口只包含 *`computeTax()`* 方法。


    然后我们创建每个具体的 `TaxStrategy` 类，每个类都为特定类型的客户实现税款计算。


    `public class PersonalTaxStrategy implements TaxStrategy {`

    `    private final double RATE = 0.25;`


    `    public double computeTax(double income) {`

    `        if (income <= 25000.0) {`

    `            return income * (0.75 * RATE);`

    `        } else {`

    `            return income * RATE;`

    `        }`

    `    }`

    `}`


    `public class CorpTaxStrategy implements TaxStrategy {`

    `    private final double RATE = 0.45;`


    `    public double computeTax(double income) {`

    `        return income * RATE ;`

    `    }`

    `}`

