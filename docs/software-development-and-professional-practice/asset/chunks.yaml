  trans: '

    ### XP 生命周期


    XP 生命周期包含了本章开头所述通用生命周期的所有阶段，但它将中间三个阶段——设计、编码和测试——压缩为一个单一的实现阶段。在实现阶段之后增加了一个产品化阶段，以便在发布前稳定代码。XP
    生命周期展示了如何将代码产出作为该方法论的核心。


    9\. *探索阶段*：当“客户确信故事卡上的内容足以支撑一个良好的首次发布，并且程序员确信如果不实际实现系统，他们无法做出更准确的估算”时，探索阶段即告完成。¹⁵
    在探索阶段，团队的主要目标是尽可能多地编写需求（故事卡）。这也是他们可以通过快速搭建系统原型来探索架构可能性的时机。估算探索阶段完成的所有任务，以锻炼你的估算技能。在大多数项目中，探索阶段是项目的“模糊前端”。你不太确定需要多长时间，同时你正在收集需求并试图弄清楚产品最终将*做*什么。


    10\. *计划博弈*：计划博弈是你发布探索阶段的尾声。在计划博弈中，你需要确定最高优先级、高价值的故事，并与客户就哪些故事将包含在下一个发布中达成一致。每次发布的持续时间应为两到六个月。时间再短，你可能无法完成任何重要工作；时间再长，则计划起来会非常困难。然后，你需要为本次发布规划最初的几个迭代；每个迭代持续
    1 到 4 周。每个迭代都会为计划在该迭代中的每个故事生成功能测试用例。第一个迭代有助于你确定项目的隐喻并搭建架构。后续迭代则根据故事优先级列表添加新功能。必要时可重新调整计划。


    11\. *实现阶段*：设计、编码、测试，或者更准确地说，设计、测试、编码。一次处理一个任务，直到某个故事的所有任务完成；一次处理一个故事，直到本次迭代的所有故事完成。我们还需要多说吗？


    ______________


    ¹⁵Beck, K. (2000)


    12\. *产品化阶段*：发生在发布完成前的最后一个迭代。此时，你应该冻结新功能，专注于稳定产品，必要时调整性能，并运行验收测试。


    13\. *维护/演进阶段*：嗯，根据敏捷理念，你始终处于维护模式。但在这里，你已经发布了客户将使用的产品，现在必须“同时生产新功能、保持现有系统运行、吸纳新成员加入团队，并告别离开的成员。”¹⁶


    14\. *死亡阶段*：如果客户无法提出新故事，则将代码封存。如果系统无法再交付价值，则将代码封存并重新开始。


    ### Scrum，伙计


    我们将要讨论的第二种敏捷方法论是 *Scrum*。Scrum 这个名字来源于橄榄球运动，其中 scrum（争球）是在犯规后重新开始比赛的一种方式。争球使用橄榄球队中的八名前锋（在英式橄榄球联合会形式的比赛中，全队共
    15 名球员）试图（重新）获得对球的控制权，并将其向对方球门线推进。敏捷 Scrum 方法论的理念是，一个小团队围绕一个单一目标团结起来，通过冲刺开发来逐步接近该目标。


    事实上，Scrum 比 XP 更早出现，其最初的流程管理思想源于 Takeuchi 和 Nonaka 在 1986 年发表的论文《新新产品开发游戏》。¹⁷
    “Scrum”一词的首次使用归功于 DeGrace 和 Stahl 在 1990 年出版的著作《棘手问题，正义解决方案》。¹⁸ Scrum 是迭代开发方法的一种变体，并融合了
    XP 的许多特性。Scrum 更像是一种管理方法，它不像 XP 那样定义许多详细的开发实践（如结对编程或测试驱动开发），尽管大多数 Scrum 项目会使用这些实践。


    Scrum 团队规模不超过 10 名开发者。与其他敏捷方法论一样，Scrum 强调小团队和集体所有权的有效性。


    Scrum 的特点在于 *冲刺*，即一个持续 1 到 4 周的迭代。冲刺是有时间盒限制的，因为它们有固定的持续时间，冲刺的输出是团队在冲刺期间能够完成的工作。冲刺的交付日期不会推迟。这意味着有时冲刺可以提前完成，有时冲刺完成时的功能会比计划少。一个冲刺总是交付一个可用的产品。


    Scrum 的需求被封装在两个待办事项列表中。产品待办事项列表是项目所有需求的优先级列表；它由 Scrum 团队和产品负责人创建。冲刺待办事项列表是当前冲刺的需求（例如用户故事）优先级列表。一旦冲刺开始，只有开发团队可以向冲刺待办事项列表添加条目——这些通常是测试过程中发现的缺陷。任何外部实体都不能向冲刺待办事项列表添加条目，只能添加到产品待办事项列表中。


    ______________


    ¹⁶Beck, K. (2000)


    ¹⁷Takeuchi, H. and I. Nonaka. “The New New Product Development Game.” *Harvard
    Business Review* 64(1): 137-146. (1986)


    ¹⁸DeGrace, P. and L. H. Stahl. Wicked Problems, Righteous Solutions: A Catalogue
    of Modern Software Engineering Paradigms. (Englewood Cliffs, NJ: Yourdon Press,
    1990.)


    Scrum 项目由一名 ScrumMaster 推动，其职责是管理待办事项列表、主持每日 Scrum 会议，并在冲刺期间保护团队免受外部影响。ScrumMaster
    通常不是开发者。


    Scrum 项目每天举行一次每日 Scrum 会议，这是一个持续 15-30 分钟的站立会议，整个团队在会上讨论冲刺进度。每日 Scrum 会议使团队能够共享信息并跟踪冲刺进度。通过每日
    Scrum 会议，任何进度延误或实现中的问题都会立即显现，然后团队可以立即处理。“ScrumMaster 确保每个人都在取得进展，记录会议上做出的决定并跟踪行动项，并保持
    Scrum 会议简短而专注。”¹⁹


    在 Scrum 会议上，每个团队成员依次回答以下三个问题：


    1.  自上次 Scrum 会议以来，你完成了哪些任务？

    2.  有什么事情阻碍你完成任务吗？

    3.  从现在到下次 Scrum 会议之间，你计划完成哪些任务？

