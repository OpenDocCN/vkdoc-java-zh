- fmt: '### The Dependency Inversion Principle (DIP)


    Robert C. Martin introduced the Dependency Inversion Principle in his C++ Report
    and later in his classic book “Agile Software Development.”^([9](#Chapter10.html#CH-10-FN-9))
    In his book, Martin defined the DIP as


    1. *High-level modules should not depend on low-level modules. Both should depend
    on abstraction.*

    2. *Abstractions should not depend on details. Details should depend on abstractions.*


    The simple version of this is: don’t depend on concrete classes; depend on abstractions.
    Martin’s contention is that object-oriented design is the inverse of traditional
    structured design. In structured design as we saw in [Chapter 7](#Chapter07.html#ch7),
    one either works from the top-down, pushing details and design decisions as low
    in the hierarchy of software layers as possible. Or one works from the bottom-up,
    designing low-level details first, and later putting together a set of low-level
    functions into a single higher-level abstraction. In both these cases, the higher
    level software depends on decisions that are made at the lower levels, including
    interface and behavioral decisions.


    Martin contends that for object-oriented design that this is backward. The Dependency
    Inversion Principle implies that higher-level (more abstract) design levels should
    create an interface that lower (more concrete) levels should code to. This will
    mean that as long as the lower level – concrete – classes *code to the interface*
    of the upper level abstraction that the upper level classes are safe. As Martin
    puts it, “The modules that contain the high-level business rules should take precedence
    over, and be independent of, the modules that contain the implementation details.
    High-level modules simply should not depend on low-level modules in any way.”


    ___________________


    ⁸ McLaughlin, 2007.


    ⁹ Martin, 2003.


    Here’s a simple example. Traditionally, in structured design we write many programs
    with the general format of:


    11. Get input data from somewhere.

    12. Process the data.

    13. Write the data to somewhere else.


    In this example, the `Processor` uses the `Collector` to get data, it then packages
    the data and uses the `Writer` to write the data to, say, a database. If we draw
    this out, we get something that looks like [Figure 10-13](#Chapter10.html#fig_10_13).


    ![images](images/1013.jpg)


    ***Figure 10-13.** A traditional input-process-output model*


    One problem with this implementation is that the `Processor` must create and use
    the `Writer` whose interface and parameter types it must know in order to write
    correctly. This means that the `Processor` must be written to a concrete implementation
    of a `Writer` and so must be re-written if we want to change what kind of `Writer`
    we want. Say the first implementation writes to a `File`, if we then want to write
    to a printer, or a database, we need to change `Processor` every time. This is
    not very reusable. So the Dependency Inversion Principle says that the `Processor`
    should be coded to an interface (we abstract `Processor`) and then the interface
    is implemented in separate concrete classes for each type of `Writer` destination.
    The resulting design looks like [Figure 10-14](#Chapter10.html#fig_10_14).


    ![images](images/1014.jpg)


    ***Figure 10-14.** Using an interface to allow different writer implementations*


    In this way, different writers can be added and as long as they adhere to the
    interface, `Processor` never needs to change. Note that the DIP is closely related
    to Principle #2, Code to an Interface.


    ### The Interface Segregation Principle (ISP)


    Clients shouldn’t have to depend on interfaces they don’t use. In particular,
    they shouldn’t have to depend on *methods* they don’t use.^([10](#Chapter10.html#CH-10-FN-10))


    We’ve talked a lot about interfaces in this chapter. Coding to interfaces, using
    interfaces to abstract out common details, and so on. We use interfaces to make
    our code more flexible and maintainable. So overall, interfaces are a great thing,
    right? Well, young Skywalker, you must beware of interfaces as well.


    One of the greatest temptations with respect to interfaces is to make them bigger.
    If an interface is good, then a bigger interface must be better, right? After
    all, you can then use the interface is way more objects and *the user just has
    to not implement certain methods that they don’t need*. Ack! By doing that you
    are ruining the *cohesion* of your interface. By “generalizing” an interface too
    much you are moving away from that single lightning bolt of a set of methods that
    are all closely related to each other to a jumble of methods that say hello to
    each other in passing. Remember ***cohesion is good***. Your applications should
    be cohesive and the classes and interfaces they depend on should also be cohesive.


    You make your interfaces less cohesive, and begin to violate the Interface Segregation
    Principle when you start adding new methods to your interface because one of the
    subclasses that implements the interface needs it – *and others do not*. So what’s
    the answer here? How do we keep our interfaces cohesive and still make them useful
    for a range of objects?


    The answer is: make more interfaces. The Interface Segregation Principle implies
    that instead of adding new methods that are only appropriate to one or a few implementation
    classes, that you *make a new interface*. You divide your bloated interface into
    two or more smaller, *more cohesive* interfaces. That way, new classes can just
    implement the interfaces that they need and not implement ones that they don’t.


    ___________________


    ^(10) Martin, 2003.'
