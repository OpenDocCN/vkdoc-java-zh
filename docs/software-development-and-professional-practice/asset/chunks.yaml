- fmt: '### Work Breakdown and Task Estimates


    The first step toward a project schedule is seeing what you''ll be doing and how
    long each step will take. This is the classic chicken-egg problem. You can''t
    really do estimation until you have a fairly detailed work breakdown into tasks.
    But your manager always wants effort estimates and schedule data before you start
    doing the design. Resist this. Make design your top priority once you''ve got
    some idea of the requirements. If you select a small set of high priority requirements,
    and then design a solution for that feature set, then you can do an effort estimation
    of that iteration. Don''t worry that the requirements might change – they will.
    You need a detailed breakdown of features into tasks before you can do effort
    estimation.


    Don''t *ever* believe anyone who tells you, “that feature will take six months
    to do.” That is a wild-assed guess (WAG), and bears little to no relation to reality.
    You just *can''t* estimate something that big. The best you can do is say, “I
    once implemented a feature like that in six months.” And even that only helps
    a little.


    You''ve got to get your work broken down into tasks that are no more than about
    a week in duration. One or two days is a better bet. Even better, never do estimation
    in any unit except person-hours. That way you''ll be more tempted to work with
    small increments of hours, and you''ll break your larger tasks down into smaller
    ones that you may actually know how to do. Once you have a believable list of
    tasks, you can start doing size and then effort estimation. Size always needs
    to come first, because you just can''t figure out how long something will take
    until you have an idea of how big it is.


    Size can be several things, depending on your work breakdown and your development
    model; functional modules, number of classes, number of methods, number of function
    points, number of object points, or that old standby, uncommented lines of code.
    Actually, no matter what you initially measure size in, you''ll end up with estimates
    in terms of `KLOC` – thousands of uncommented lines of code.


    There are several techniques for getting effort estimates – `COCOMO II` [Boehm00],
    function point analysis, and the Delphi method are just three. All, however, depend
    on being able to count things in your design. The estimation mantra is size first,
    then effort and cost estimates, then schedule.


    All other things being equal, the Delphi method is a quick and relatively efficient
    estimation technique. Here''s one way it can work: find three of your most senior
    developers – these are the folks who''ve got the most experience, and who should
    therefore be able to give you a good guess. Then give them the task breakdown
    (assuming they weren''t already involved in doing the initial breakdown – the
    ideal situation). Then ask them to give you three numbers for each task, the shortest
    amount of time it should take, the longest amount of time it should take, and
    the “normal” amount of time it should take, all in person-hours. Once you have
    these numbers, add them all up, the shortest together, the longest together, and
    the “normal” together and take the mean. Those are your estimates for each task.
    The averages of the best guess by your best developers for each task. Depending
    on your personality – and how hard your boss is breathing down your neck – pick
    one of the three values for each task as the official (for now) effort estimate
    and proceed to create a schedule.


    Finally, you should have the right people – the developers who will do the work
    – do all the estimates for the project. Managers should *never* do development
    estimates. Even if a manager has been a developer in the past, unless one is deeply
    involved in the actual development work, one should not be in the business of
    doing development estimates.


    ### Project Schedule


    Once you have estimates of the tasks in your first release or iteration and have
    people resource estimates, you can create a schedule. There are several things
    to take into account before you can look at that spiffy Gantt chart with the nice
    black diamond that marks the release date. Here''s a list:


    *   Get your developers to tell you the dependencies between tasks. There will
    be some tasks that can''t start before others finish. There may be tasks that
    can start once others are half-finished. There will be some that can all start
    together. You need to know because the task dependencies will push out your delivery
    date.

    *   Figure out what your duty cycle is. Out of each eight-hour day, how many hours
    do your developers actually do development? You need to remember that reading
    mail, attending meetings, doing code reviews, taking breaks, going to the bathroom,
    all eat up time. You can''t assume that an hour-hour task will be done in a single
    day. Realistically, out of each eight-hour day, two to four hours are eaten up
    with other stuff, so your duty cycle can be as low as four hours a day. Duty cycles
    can vary based on corporate culture, so you need to figure out what yours is before
    you start to schedule.

    *   Take weekends, vacations, sick days, training, and slack into account when
    you''re making the schedule. If your senior developer has a task on the critical
    path of your project, you probably need to know that she''s taking that three-week
    vacation in May.

    *   You can''t schedule a developer to work on two tasks at the same time. Most
    project-scheduling software will not let you do this by default, but most of them
    will also let you override this. Don''t. You will be tempted to do this so that
    your schedule does not push out past whatever deadline your manager or marketing
    team wants, but resist the temptation. You''ll only have to change the schedule
    when you miss the date anyway.


    Finally, use project-scheduling software to make your schedule. You don''t have
    to do this, just using a simple spreadsheet technique like the one proposed in
    [Chapter 9](#Chapter09.html#ch9) of the Apress title, *Joel on Software* by Joel
    Spolsky.[³](#Chapter03.html#CHP-3-FN-3) can work for small projects. But using
    real project management software like `Microsoft Project`, `Fast Track Scheduling`,
    or `Merlin` provide lots of features that make keeping the schedule up to date
    much easier. The big thing that project management software can do that your spreadsheet
    can''t is track dependencies. Joel doesn''t understand how `Microsoft Project`
    is useful in this; in fact, he says, “I''ve found that with software, the dependencies
    are so obvious that it''s just not worth the effort to formally keep track of
    them.”[⁴](#Chapter03.html#CHP-3-FN-4) This might be true for small projects, but
    when your team gets to be 10 developers or larger and you''re working on 100-plus
    tasks, knowing *something* about the dependencies of your project can help manage
    who''s working on what, and when. Joel is right in that `Project` is overkill
    for many projects, and for those you can use a spreadsheet approach that just
    lists the features and tasks you can see right now (see [Table 3-1](#Chapter03.html#tab_3_1));
    but project management software sure is handy to have around when you need it.


    ______________


    ³ Spolsky, J. *Joel on Software.* (Berkeley, CA: Apress, 2004.)


    ⁴ Spolksy, 2004.


    ![images](images/t0301.jpg)


    Spolsky''s painless schedule lists the following seven columns that should be
    in every schedule:


    *   *Feature Name*

    *   *Tasks* within the feature

    *   The *Priority* of the Task

    *   The *Original Estimate* (in person-hours)

    *   The *Current Estimate* (in person-hours)

    *   The *Elapsed Time* worked on the task (in person-hours)

    *   The *Remaining Time* on the task (also in person-hours)'
  raw: '### Work Breakdown and Task Estimates


    The first step toward a project schedule is seeing what you''ll be doing and how
    long each step will take. This is the classic chicken-egg problem. You can''t
    really do estimation until you have a fairly detailed work breakdown into tasks.
    But your manager always wants effort estimates and schedule data before you start
    doing the design. Resist this. Make design your top priority once you''ve got
    some idea of the requirements. If you select a small set of high priority requirements,
    and then design a solution for that feature set, then you can do an effort estimation
    of that iteration. Don''t worry that the requirements might change – they will.
    You need a detailed breakdown of features into tasks before you can do effort
    estimation.


    Don''t *ever* believe anyone who tells you, “that feature will take six months
    to do.” That is a wild-assed guess (WAG), and bears little to no relation to reality.
    You just *can''t* estimate something that big. The best you can do is say, “I
    once implemented a feature like that in six months.” And even that only helps
    a little.


    You''ve got to get your work broken down into tasks that are no more than about
    a week in duration. One or two days is a better bet. Even better, never do estimation
    in any unit except person-hours. That way you''ll be more tempted to work with
    small increments of hours, and you''ll break your larger tasks down into smaller
    ones that you may actually know how to do. Once you have a believable list of
    tasks, you can start doing size and then effort estimation. Size always needs
    to come first, because you just can''t figure out how long something will take
    until you have an idea of how big it is.


    Size can be several things, depending on your work breakdown and your development
    model; functional modules, number of classes, number of methods, number of function
    points, number of object points, or that old standby, uncommented lines of code.
    Actually, no matter what you initially measure size in, you''ll end up with estimates
    in terms of KLOC – thousands of uncommented lines of code.


    There are several techniques for getting effort estimates – COCOMO II [Boehm00],
    function point analysis, and the Delphi method are just three. All, however, depend
    on being able to count things in your design. The estimation mantra is size first,
    then effort and cost estimates, then schedule.


    All other things being equal, the Delphi method is a quick and relatively efficient
    estimation technique. Here''s one way it can work: find three of your most senior
    developers – these are the folks who''ve got the most experience, and who should
    therefore be able to give you a good guess. Then give them the task breakdown
    (assuming they weren''t already involved in doing the initial breakdown – the
    ideal situation). Then ask them to give you three numbers for each task, the shortest
    amount of time it should take, the longest amount of time it should take, and
    the “normal” amount of time it should take, all in person-hours. Once you have
    these numbers, add them all up, the shortest together, the longest together, and
    the “normal” together and take the mean. Those are your estimates for each task.
    The averages of the best guess by your best developers for each task. Depending
    on your personality – and how hard your boss is breathing down your neck – pick
    one of the three values for each task as the official (for now) effort estimate
    and proceed to create a schedule.


    Finally, you should have the right people – the developers who will do the work
    – do all the estimates for the project. Managers should *never* do development
    estimates. Even if a manager has been a developer in the past, unless one is deeply
    involved in the actual development work, one should not be in the business of
    doing development estimates.


    ### Project Schedule


    Once you have estimates of the tasks in your first release or iteration and have
    people resource estimates, you can create a schedule. There are several things
    to take into account before you can look at that spiffy Gantt chart with the nice
    black diamond that marks the release date. Here''s a list:


    *   Get your developers to tell you the dependencies between tasks. There will
    be some tasks that can''t start before others finish. There may be tasks that
    can start once others are half-finished. There will be some that can all start
    together. You need to know because the task dependencies will push out your delivery
    date.

    *   Figure out what your duty cycle is. Out of each eight-hour day, how many hours
    do your developers actually do development? You need to remember that reading
    mail, attending meetings, doing code reviews, taking breaks, going to the bathroom,
    all eat up time. You can''t assume that an hour-hour task will be done in a single
    day. Realistically, out of each eight-hour day, two to four hours are eaten up
    with other stuff, so your duty cycle can be as low as four hours a day. Duty cycles
    can vary based on corporate culture, so you need to figure out what yours is before
    you start to schedule.

    *   Take weekends, vacations, sick days, training, and slack into account when
    you''re making the schedule. If your senior developer has a task on the critical
    path of your project, you probably need to know that she''s taking that three-week
    vacation in May.

    *   You can''t schedule a developer to work on two tasks at the same time. Most
    project-scheduling software will not let you do this by default, but most of them
    will also let you override this. Don''t. You will be tempted to do this so that
    your schedule does not push out past whatever deadline your manager or marketing
    team wants, but resist the temptation. You''ll only have to change the schedule
    when you miss the date anyway.


    Finally, use project-scheduling software to make your schedule. You don''t have
    to do this, just using a simple spreadsheet technique like the one proposed in
    [Chapter 9](#Chapter09.html#ch9) of the Apress title, *Joel on Software* by Joel
    Spolsky.[³](#Chapter03.html#CHP-3-FN-3) can work for small projects. But using
    real project management software like Microsoft Project, Fast Track Scheduling,
    or Merlin provide lots of features that make keeping the schedule up to date much
    easier. The big thing that project management software can do that your spreadsheet
    can''t is track dependencies. Joel doesn''t understand how Microsoft Project is
    useful in this; in fact, he says, “I''ve found that with software, the dependencies
    are so obvious that it''s just not worth the effort to formally keep track of
    them.”[⁴](#Chapter03.html#CHP-3-FN-4) This might be true for small projects, but
    when your team gets to be 10 developers or larger and you''re working on 100-plus
    tasks, knowing *something* about the dependencies of your project can help manage
    who''s working on what, and when. Joel is right in that Project is overkill for
    many projects, and for those you can use a spreadsheet approach that just lists
    the features and tasks you can see right now (see [Table 3-1](#Chapter03.html#tab_3_1));
    but project management software sure is handy to have around when you need it.


    ______________


    ³ Spolsky, J. *Joel on Software.* (Berkeley, CA: Apress, 2004.)


    ⁴ Spolksy, 2004.


    ![images](images/t0301.jpg)


    Spolsky''s painless schedule lists the following seven columns that should be
    in every schedule:


    *   *Feature Name*

    *   *Tasks* within the feature

    *   The *Priority* of the Task

    *   The *Original Estimate* (in person-hours)

    *   The *Current Estimate* (in person-hours)

    *   The *Elapsed Time* worked on the task (in person-hours)

    *   The *Remaining Time* on the task (also in person-hours)'
  trans: '

    ### 工作分解与任务估算


    制定项目时间表的第一步，是明确你要做什么以及每个步骤需要多长时间。这就像经典的“先有鸡还是先有蛋”问题。在将工作详细分解为具体任务之前，你无法真正进行估算。但你的经理总是希望在开始设计之前就拿到工作量估算和时间表数据。要抵制这种做法。一旦你对需求有了初步了解，就应将设计作为首要任务。如果你选择一小部分高优先级的需求，并为该功能集设计解决方案，那么你就可以对该迭代进行工作量估算。不必担心需求可能会变化——它们肯定会变。在进行工作量估算之前，你需要将功能详细分解为任务。


    *永远不要*相信任何告诉你“那个功能需要六个月才能完成”的人。那只是一个胡乱猜测（WAG），与现实几乎毫无关系。你*根本*无法估算那么大的东西。你最多只能说：“我曾经在六个月内实现过一个类似的功能。”即便如此，这也只是略有帮助。


    你必须将工作分解为持续时间不超过一周左右的任务。一两天是更好的选择。甚至更好的是，永远只用人时作为估算单位。这样，你更倾向于以小时为单位进行小增量工作，并将较大的任务分解成你实际知道如何完成的较小任务。一旦你有了一个可信的任务列表，你就可以开始进行规模估算，然后是工作量估算。规模总是需要优先考虑，因为只有了解了任务的大小，你才能弄清楚它需要多长时间。


    规模可以指代多种事物，具体取决于你的工作分解和开发模型：功能模块、类数量、方法数量、功能点数量、对象点数量，或者那个老掉牙的指标——未注释的代码行数。实际上，无论你最初用什么来衡量规模，最终你都会以千行未注释代码（KLOC）为单位进行估算。


    有几种获取工作量估算的技术——COCOMO II [Boehm00]、功能点分析和德尔菲法只是其中三种。然而，所有这些方法都依赖于能够统计你设计中的各项内容。估算的口诀是：先规模，再工作量和成本估算，最后是时间表。


    在其他条件相同的情况下，德尔菲法是一种快速且相对高效的估算技术。以下是它的一种工作方式：找到你团队中三位最资深的开发人员——他们是经验最丰富的人，因此应该能够给出不错的猜测。然后给他们任务分解（假设他们之前没有参与初始分解——这是理想情况）。接着请他们为每个任务给出三个数字：最短所需时间、最长所需时间以及“正常”所需时间，全部以人时为单位。一旦你得到这些数字，将它们分别相加：最短的加在一起，最长的加在一起，“正常”的加在一起，然后取平均值。这些就是你对每个任务的估算值。这是你最好的开发人员对每个任务的最佳猜测的平均值。根据你的性格——以及你的老板催得有多紧——为每个任务选择三个值中的一个作为（暂时的）官方工作量估算，然后着手制定时间表。


    最后，应该让合适的人——即实际执行工作的开发人员——来完成项目的所有估算。经理*永远不应*进行开发估算。即使经理过去曾是开发人员，除非他深度参与实际的开发工作，否则也不应该从事开发估算的工作。


    ### 项目时间表


    一旦你有了第一个发布版本或迭代中任务的估算，并且有了人员资源估算，你就可以创建时间表了。在你能看到那张带有标记发布日期的漂亮黑色菱形块的甘特图之前，有几件事需要考虑。列表如下：


    *   让你的开发人员告诉你任务之间的依赖关系。有些任务必须等其它任务完成后才能开始。有些任务可能在其它任务完成一半时就可以开始。还有一些任务可以同时开始。你需要了解这些，因为任务依赖关系会推迟你的交付日期。

    *   弄清楚你的实际工作周期。在每个八小时工作日中，你的开发人员实际用于开发的时间有多少小时？你需要记住，阅读邮件、参加会议、进行代码审查、休息、上厕所，这些都会消耗时间。你不能假设一个八小时的任务能在一天内完成。实际上，在每个八小时工作日中，有两到四个小时被其他事情消耗掉了，所以你的实际工作周期可能低至每天四小时。实际工作周期会因公司文化而异，因此在开始制定时间表之前，你需要弄清楚你自己的情况。

    *   在制定时间表时，要考虑周末、假期、病假、培训和缓冲时间。如果你的资深开发人员有一个处于项目关键路径上的任务，你可能需要知道她五月份要休三周假。

    *   你不能安排一个开发人员同时处理两个任务。大多数项目排程软件默认不允许这样做，但大多数也允许你覆盖这个设置。不要这样做。你可能会想这样做，以便你的时间表不会超出经理或市场团队想要的任何截止日期，但要抵制住诱惑。否则，当你错过日期时，你终究还是得修改时间表。


    最后，使用项目排程软件来制定你的时间表。你不一定非要这样做，对于小型项目，仅使用像 Joel Spolsky 在 Apress 出版的《Joel on Software》第
    9 章中提出的那种简单电子表格技术³也能奏效。但使用像 Microsoft Project、Fast Track Scheduling 或 Merlin 这样的真正项目管理软件，能提供许多功能，使保持时间表更新变得容易得多。项目管理软件能做而你的电子表格做不到的一件大事是跟踪依赖关系。Joel
    不理解 Microsoft Project 在这方面有何用处；事实上，他说：“我发现，对于软件来说，依赖关系是如此明显，以至于不值得费心去正式跟踪它们。”⁴
    这对于小型项目来说可能是真的，但当你的团队达到 10 名或更多开发人员，并且你正在处理 100 多个任务时，了解项目依赖关系的*某些情况*可以帮助管理谁在做什么以及何时做。Joel
    说得对，Project 对许多项目来说是大材小用，对于这些项目，你可以使用一种只列出你当前能看到的特性和任务的电子表格方法（参见表 3-1）；但当你需要时，项目管理软件确实很方便。


    ______________


    ³ Spolsky, J. *Joel on Software.* (Berkeley, CA: Apress, 2004.)


    ⁴ Spolksy, 2004.


    ![images](img/t0301.jpg)


    Spolsky 的无痛时间表列出了每个时间表都应包含的以下七列：


    *   *功能名称*

    *   功能内的*任务*

    *   任务的*优先级*

    *   *原始估算*（以人时为单位）

    *   *当前估算*（以人时为单位）

    *   任务已花费的*已用时间*（以人时为单位）

    *   任务的*剩余时间*（也以人时为单位）

