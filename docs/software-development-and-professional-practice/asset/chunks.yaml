    ##### The Observer Pattern


    I love NPR’s *Talk of the Nation: Science Friday* radio show ([`http://sciencefriday.com`](http://sciencefriday.com)).
    But I hardly get to listen to it when it is broadcast because it’s on from 2:00–4:00
    PM EST on Fridays and, because I work for a living (snicker), I can’t listen to
    it then. But I subscribe to the podcast and so every Saturday morning I get a
    new podcast of *SciFri* so I can listen to it on my iPod while I mow the lawn.
    If I ever get tired of *SciFri*, I can just unsubscribe and I won’t get any new
    podcasts. That, ladies and gentlemen, is the *Observer Pattern*.


    According to the Gang of Four, the Observer Pattern “...defines a one-to-many
    dependency between objects so that when one object changes state, all of its dependents
    are notified and updated automatically.”^([10](#Chapter11.html#CH-11-FN-10)) So
    in my SciFri example, NPR is the “publisher” of the SciFri podcast, and all of
    us who “subscribe” (or register) to the podcast are the observers. We wait for
    the *SciFri* state to change (a new podcast gets created) and then we get updated
    automatically by the publisher. How the updates happen differentiates between
    two different types of Observer – push and pull. In a *push Observer*, the Publisher
    (also known as the Subject in object-oriented speak) changes state and then *pushes*
    the new state out to all the Observers. In a *pull Observer*, the Subject changes
    state, but doesn’t provide a full update until the Observers ask for it – they
    *pull* the update from the Subject. In a variation of the *pull* model, the Subject
    may provide a minimal update to all the Observers notifying them that the state
    has changed, but the Observers still need to ask for the details of the new state.


    So with the Observer pattern, we need a Subject interface so that the Subject
    and the Observer and the Client all can tell what the state interface they’re
    using is. We also need an Observer interface that just tells us how to update
    an Observer. Our publisher will then implement the Subject interface and the different
    “listeners” will implement the Observer interface. [Figure 11-6](#Chapter11.html#fig_11_6)
    is a UML diagram of this.


    ![images](images/1106.jpg)


    ***Figure 11-6.** The canonical Observer Pattern*


    The client class is missing, but it will use both the `ConcreteSubject` and `ConcreteObserver`
    classes. Here’s a simple implementation of a *push model* version of all of these.
    Remember, it’s *push model* because the *`ConcreteSubject`* object is notifying
    all the *Observers* whether they request it or not.


