    ;\n    String lname = \"Flintstone\";\n    String phone = \"800-555-1212\";\n\
    \    String email = \"fred@knox.edu\";\n\n    PhoneContact pc = new PhoneContact(fname,\
    \ lname, phone, email);\n    assertEquals(lname, pc.getLastName());\n    assertEquals(fname,\
    \ pc.getFirstName());\n    assertEquals(phone, pc.getPhoneNum());\n    assertEquals(email,\
    \ pc.getEmailAddr());\n}\n\npublic void testFileOpen() {\n    String fileName\
    \ = \"phoneList.txt\";\n\n    PhoneContactList pc = new PhoneContactList();\n\
    \    boolean fileOK = pc.fileOpen(fileName);\n    assertTrue(fileOK);\n\n    if\
    \ (fileOK == false) {\n        System.out.println(\"Open Failed, File Not Found\"\
    );\n        System.exit(1);\n    }\n}\n```\n\nTo run this set of tests in BlueJ,\
    \ we select Test All from the drop-down menu shown in [Figure 14-2](#Chapter14.html#fig_14_2).\n\
    \n![images](images/1402.jpg)\n\n***Figure 14-2.** The JUnit Menu - Select Test\
    \ All to run the tests*\n\nBecause we don't have a `phoneList.txt` file created\
    \ yet, we get the output shown in [Figure 14-3](#Chapter14.html#fig_14_3).\n\n\
    ![images](images/1403.jpg)\n\n***Figure 14-3.** JUnit Testing output*\n\nHere,\
    \ we note that the `testFileOpen()` test has failed.\n\nEvery time we make any\
    \ changes to our program we can add another test to the `TestPhoneContact` class\
    \ and re-run all the tests with a single menu selection. The testing framework\
    \ makes is much easier to create individual tests and whole suites of tests that\
    \ can be run every time you make a change to the program. This lets us know every\
    \ time we make a change if we've broken something or not. Very cool.\n\n### Testing\
    \ Is Good\n\nAt the end of the day, unit testing is a critical part of your development\
    \ process. Done carefully and correctly, it can help you remove the vast majority\
    \ of your errors even before you integrate your code into the larger program.\
    \ TDD, where you write tests first and then write the code that makes the tests\
    \ succeed, is an effective way to catch errors in both low-level design and coding\
    \ and allows you to easily and quickly create a regression test suite that you\
    \ can use for every integration and every baseline of your program.\n\n### Conclusion\n\
    \nFrom your point of view as the developer, unit testing is the most important\
    \ class of testing your program will undergo. It's the most fundamental type of\
    \ testing, making sure your code meets the requirements of the design at the lowest\
    \ level. Despite the fact that developers are more concerned with making sure\
    \ their program works than with breaking it, developing a good unit testing mindset\
    \ is critical to your development as a mature, effective programmer. Testing frameworks\
    \ make this job much easier than in the past and so learning how your local testing\
    \ framework operates and learning to write good tests is a skill you should work\
    \ hard at. Better that you should find your own bugs than the customer.\n\n##\
    \ C H A P T E R  15\n\n## Walkthroughs, Code Reviews, and Inspections\n\n> *Our\
    \ objective with Inspections is to reduce the Cost of Quality by finding and removing\
    \ defects earlier and at a lower cost. While some testing will always be necessary,\
    \ we can reduce the costs of test by reducing the volume of defects propagated\
    \ to test.*\n> \n> —Ron Radice (2002)\n> \n> *When you catch bugs early, you also\
    \ get fewer compound bugs. Compound bugs are two separate bugs that interact:\
    \ you trip going downstairs, and when you reach for the handrail it comes off\
    \ in your hand.*\n> \n> —Paul Graham (2001)\n\nHere's a shocker: your main quality\
    \ objective in software development is to get a working program to your user that\
    \ meets all their requirements and has no defects. That's right: your code should\
    \ be perfect. It meets all the user's requirements and it has no errors in it\
    \ when you deliver it. Impossible, you cry? Can't be done? Well, *software quality\
    \ assurance* is all about trying to get as close to perfection as you can – albeit\
    \ within time and budget. (You knew there was a catch, didn't you?)\n\nSoftware\
    \ quality is usually discussed from two different perspectives, the user's and\
    \ the developer's. From the user's perspective, quality has a number of characteristics\
    \ – things that your program must do in order to be accepted by the user – among\
    \ which are:[¹](#Chapter15.html#CHP-15-FN-1)\n\n*   *Correctness*: The software\
    \ has to work, period.\n*   *Usability*: It has to be easy to learn and easy to\
    \ use.\n*   *Reliability*: It has to stay up and be available when you need it.\n\
    *   *Security*: The software has to prevent unauthorized access and it has to\
    \ protect your data.\n*   *Adaptability*: It should be easy to add new features.\n\
    \n____________\n\n¹ McConnell, S. *Code Complete 2: A Practical Handbook of Software\
    \ Construction.* (Redmond, WA: Microsoft Press, 2004.)\n\nFrom the developer's\
    \ perspective, things are a bit different. The developer wants to see the following:\n\
    \n*   *Maintainability*: It has to be easy to make changes to the software.\n\
    *   *Portability*: It has to be easy to move the software to a different platform.\n\
    *   *Readability*: Many developers won't admit this, but you do need to be able\
    \ to read the code.\n*   *Understandability*: The code needs to be designed in\
    \ such a way that a new developer can understand how it all hangs together.\n\
    *   *Testability*: Well, at least the testers think that your code should be easy\
    \ to test. Code that is created in a modular fashion, with short functions that\
    \ do only one thing, is much easier to understand and test than code that is all\
    \ just one big `main()` function.\n\nSoftware Quality Assurance (SQA) has three\
    \ legs to it:\n\n*   *Testing*: Finding the errors that surface while your program\
    \ is executing, also known as *dynamic analysis*.\n*   *Debugging*: Getting all\
    \ the obvious errors out of your code, the ones that are found by testing it.\n\
    *   *Reviews*: Finding the errors that are inherently in your code as it sits\
    \ there, also known as *static analysis*.\n\nMany developers – and managers –\
    \ think that you can test your way to quality. You can't. As we saw in the last\
    \ chapter, tests are limited. You often can't explore every code path, you can't\
    \ test every possible data combination, and often your tests themselves are flawed.\
    \ Tests can only get you so far. As Edsger Dijkstra famously said, “…program testing\
    \ can be a very effective way to show the presence of bugs, but it is hopelessly\
    \ inadequate for showing their absence.”[²](#Chapter15.html#CHP-15-FN-2)\n\nReviewing\
    \ your code – reading it and looking for errors on the page – provides another\
    \ mechanism for making sure that you've implemented the user's requirements and\
    \ the resulting design correctly. In fact, most development organizations that\
    \ use a plan-driven methodology will not only review code, they'll also review\
    \ the requirements document, the architecture, the design specification, the test\
    \ plan, the tests themselves, and the user documentation. In short, all the *work\
    \ products* produced by the software development organization. Organizations that\
    \ use an agile development methodology don't necessarily have all the documents\
    \ mentioned above, but they do have requirements, user stories, user documentation,\
    \ and especially code to review. In this chapter we'll focus on reviewing your\
    \ code.\n\n__________\n\n² Dijkstra, E. “The Humble Programmer.” *CACM* 15(10):\
    \ 859-866\\. 1972."
