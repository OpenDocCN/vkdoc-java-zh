- fmt: '### The Inspection Meeting


    The moderator is in charge of the Inspection meeting. Her job during the meeting
    is to keep the meeting on track and focused. The Inspection meeting should last
    no more than two hours. If there is any material that has not been inspected at
    the end of that time, a new meeting is scheduled. At the beginning of the meeting,
    the reviewers turn in their list of previously discovered errors to the recorder.


    During the meeting the reader paraphrases the code and the reviewers follow along.
    The author is there to clarify any details and answer any questions about the
    code and otherwise does nothing. The recorder writes down all the defects reported,
    their severity and their classification. Solutions to problems are strongly discouraged.
    Participants are encouraged to have a different meeting to discuss solutions.


    We should look for a minute at defect types and severity as reported in a Fagan
    inspection. Fagan specifies only two types of defects: *minor* and *major*. Minor
    defects are typically typographic errors, errors in documentation, small user
    interface errors, and other miscellany that don''t cause the software to fail.
    All other errors are major defects. This is a bit extreme. Two levels are usually
    not sufficient for most development organizations. Most organizations will have
    at least a five level defect structure:


    1.  **Fatal:** Yes, your program dies; can you say core dump?

    2.  **Severe:** A major piece of functionality fails and there is no workaround
    for the user. Say that in a first-person shooter game, the software doesn''t allow
    you to re-load your main weapon and doesn''t let you switch weapons in the middle
    of a fight. That''s bad.

    3.  **Serious:** The error is severe, but with a workaround for the user. The
    software doesn''t let you re-load your main weapon, but if you switch weapons
    and then switch back you can re-load.

    4.  **Trivial:** A small error, either wrong documentation or something like a
    minor user interface problem. For example, a text box is 10 pixels too far from
    its prompt in a form.

    5.  **Feature request:** A brand new feature for the program is desired. This
    isn''t an error; it''s a request from the user (or marketing) for new functionality
    in the software. In a game this could be new weapons, new character types, new
    maps or surroundings, and so on. This is version 2.


    In most organizations, software is not allowed to ship to a user with known severity
    1 and 2 errors still in it. But severity 3 errors really make users unhappy, so
    realistically, no known severity 1 through 3 errors are allowed to ship. Ideally,
    of course, no errors ship, right?


    In a Fagan inspection meeting it is usually up to the recorder to correctly classify
    the severity of the major defects found in the code. This classification can be
    changed later. In the Fagan inspection process all severity 1 through 3 defects
    are required to be fixed.


    ### Inspection Report


    Within a day of the meeting, the recorder distributes the Inspection report to
    all participants. The central part of the report is the defects that were found
    in the code at the meeting.


    The report also includes metrics data, including:


    *   The number of defects found

    *   The number of each type of defect by severity and type

    *   The time spent in preparation; total time in person-hours and time per participant

    *   The time spent in the meeting; clock time and total person-hours

    *   The number of uncommented lines of code or pages reviewed


    ### Rework and Follow Up


    The author fixes all the severity 1 through 3 defects found during the meeting.
    If enough defects were found, or if enough refactoring or code changes had to
    occur, then another inspection is scheduled. How much is enough? Amounts vary.
    McConnell says 5% of the code,[⁶](#Chapter15.html#CHP-15-FN-6) but this author
    has typically used 10% of the code inspected. So if you inspected 200 lines of
    code and you had to change 20 or more of them in the rework, then you should have
    another inspection meeting. If it''s less than 10%, the author and the moderator
    can do a walkthrough. Regardless of how much code is changed, the moderator must
    check all the changes as part of the follow up. As part of the rework another
    metric should be reported – the amount of time required by the author to fix each
    of the defects reported. This metric, plus the number of defects found during
    the project are critical to doing accurate planning and scheduling for the *next*
    project. This metric is easier to keep track of if developers use a defect tracking
    system.


    ### Summary of Review Methodologies


    [Table 15-1](#Chapter15.html#tab_15_1) summarizes the characteristics of the three
    review methodologies we''ve examined. Each has its place and you should know how
    each of them works. The important thing to remember is that reviews and testing
    go hand in hand and both should be used to get your high-quality code out the
    door.


    ![images](images/t1501.jpg)


    ___________


    ⁶ McConnell, 2004.


    ### Defect Tracking Systems


    Most software development organizations and many open source development projects
    will use an automated defect tracking system to keep track of defects found in
    their software and to record requests for new features in the program. One of
    the most popular open source defect tracking systems is Bugzilla ([`www.bugzilla.org`](http://www.bugzilla.org)).


    Defect tracking systems keep track of a large amount of information about each
    defect found and entered. A typical defect tracking system will keep track of
    at least the following:


    *   The number of the defect (assigned by the tracking system itself)

    *   The current state of the defect in the system (Open, Assigned, Resolved, Integrated,
    Closed)

    *   The fix that was made to correct the error

    *   The files that were changed to make the fix

    *   What baseline the fix was integrated into

    *   What tests were written and where they are stored (ideally, the tests are
    stored along with the fix)

    *   The result of the code review or inspection


    Defect tracking systems assume that at any given time a defect report is in some
    state that reflects where it is in the process of being fixed. A typical defect
    tracking system can have upwards of ten (10) states for each defect report.


    Figure 16-1 shows the states of a typical defect tracking system and the flow
    of a defect report through the system. In brief, all defects start out as New.
    They are then assigned to a developer for Analysis. The developer decides whether
    the reported defect is:


    *   A duplicate of one already in the system

    *   Not a defect and so should be rejected

    *   A real defect that should be worked on by someone

    *   A real defect whose resolution can be postponed to a later date


    Defects that are worked on are eventually fixed and move to the Resolved state.
    The fix must then be subjected to a code review. If the code review is successful,
    the defect fix is then Approved. From Approved, the fix is scheduled for integration
    into the next baseline of the product, and if the integration tests of that baseline
    are successful, the defect is Closed. Whew!


    ![images](images/1501.jpg)


    ***Figure 15-1.** Defect tracking system workflow*


    ### Conclusion


    A second set of eyes on your code is always a good thing. Code that is reviewed
    by others is improved and brings you closer to the Platonic ideal of defect-free
    software. Walkthroughs, code reviews, and formal code inspections each have their
    place in the array of tools used to improve code quality. The more of these tools
    you have in your toolbox, the better programmer you are. The combination of reviews,
    debugging and unit testing will find the vast majority of defects in your code[⁷](#Chapter15.html#CHP-15-FN-7)
    and is the best thing that a developer can do to help release great code.


