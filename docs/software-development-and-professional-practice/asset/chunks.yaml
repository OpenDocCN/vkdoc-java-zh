  trans: '

    #### 用例


    *用例*是对程序在特定情境下所执行操作的描述。它是一组详细的步骤，当用户提出请求时，程序会按这些步骤执行。用例总是包含一个*参与者*——即启动流程的外部代理，以及一个*目标*——即用例最终应达成的结果。用例从用户视角描述了如何从某个初始状态达成目标。^(6)
    以下是 B⁴++ 的一个简单用例示例：


    1.  传感器检测到 40% 亮度的阳光。

    2.  喂食门打开。

    3.  鸟儿到达，进食并饮水。

    4.  鸟儿离开。

    5.  传感器检测到阳光亮度降至 25%。

    6.  喂食门关闭。


    鉴于 B⁴++ 的简单性，这基本上就是我们对一个用例的全部预期。实际上，步骤 3 和 4 严格来说并不属于用例，因为它们并非程序的一部分——但保留它们有助于我们更全面地了解
    B⁴++ 的运行方式。用例在需求分析中非常有用，因为它们能让你用通俗语言了解程序在特定情境下需要做什么，并且几乎总能帮助你发现新的需求。请注意，在用例中我们不讨论程序*如何*执行操作，只关注程序为达成目标*必须*做什么。用例是在软件生命周期的需求收集与分析阶段生成的，因此我们目前还不太关心细节，只需将程序视为一个黑盒，让用例描述程序的*外部行为*。大多数情况下，你编写的每个程序都会对应多个用例。我们这里只有一个，因为这个版本的
    B⁴++ 非常简单。


    #### 分解问题


    现在我们已经有了用例，接下来可以分解问题并识别程序中的对象了。你先来，我等着……


    __________


    ⁶ Cockburn, 2000.


    完成了？好的。这个问题相当简单；如果你查看上面的用例并找出其中的名词，你会发现我们可以识别出几个对象。每个对象都有特定的特征，并有助于实现喂鸟的目标。（是的，我知道，“鸟儿”在用例中是一个名词，但在这个小场景中它们是参与者，因此为了描述对象，我们忽略它们——它们不是程序的一部分。）另外两个值得关注的名词是“传感器”和“门”。它们是
    B⁴++ 的关键部件，因为用例表明，正是这些部件在日出和日落时完成了打开和关闭喂食门的目标。因此，它们成为我们设计中的对象是合乎逻辑的。以下是我为 B⁴++
    第一个版本提出的对象及其简要描述：


    > *BirdFeeder*：顶层对象。喂鸟器有一个或多个供鸟儿聚集的喂食门，以及一个用于检测日出和日落的传感器。*BirdFeeder* 类需要控制光传感器的查询以及喂食门的打开和关闭。

    >

    > *Sensor*：将有一个硬件光传感器用于检测不同的光照水平。我们需要向它查询光照水平。

    >

    > *FeedingDoor*：喂鸟器上会有几个喂食门。它们需要能够打开和关闭。


    目前这些大概就是所有的类了。现在它们各自做什么呢？为了描述类及其组成部分，我们可以使用另一个 UML 特性——*类图*。


    #### 类图


    *类图*允许你描述类的属性和方法。一组类图将描述程序中的所有对象以及对象之间的关系。我们在类图之间绘制不同类型的箭头来描述这些关系。类图为你提供了程序中创建的对象模型的视觉描述。我们在第
    5 章中描述的狐狸与兔子程序里看到过一组类图。


    类图包含三个部分：


    *   **名称**：类的名称

    *   **属性**：类使用的实例数据字段及其类型

    *   **方法**：类使用的方法集及其可见性。


    我们可以在图 8-1 中看到 `BirdFeeder` 类的类图示例。


    ![images](img/0801.jpg)


    ***图 8-1.** BirdFeeder 类*


    该图显示 *`BirdFeeder`* 类有一个整数属性 *`lightLevel`* 和一个方法 *`operate()`*。单独的类图本身并不特别有趣，但当你将多个类图放在一起并展示它们之间的关系时，就能获得关于程序的一些有趣信息。那么，我们还需要哪些类图呢？在我们的程序中，*`BirdFeeder`*
    类使用了 *`FeedingDoor`* 和 *`Sensor`* 类，但这两个类彼此并不知晓（也不关心）。实际上，虽然 *`BirdFeeder`* 知道
    *`FeedingDoor`* 和 *`Sensor`* 并使用了它们，但它们并不知道自己被使用了。啊，这就是面向对象编程之美。这种关系可以用图 8-2 中所有三个类的类图来表示。


    ![images](img/0802.jpg)


    ***图 8-2.** BirdFeeder 使用 FeedingDoor 和 Sensor*


    在 UML 中，末端带有空心箭头的虚线表示一个类（在我们的例子中是 `BirdFeeder`）通过*使用*与另一个类（在我们的例子中是 `FeedingDoor`
    或 `Sensor`）*关联*。

