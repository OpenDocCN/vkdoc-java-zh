    `     *  `*`retreat a column and reset the queen in that column`*

    `     *  we could not find a safe row in current col`

    `     *  so back up one col and move that queen`

    `     *  up a row so we can start looking again`

    `     */`

    `    public void retreat (int[] board) {`

    `        col--;`

    `        row = board[col] + 1;  `

    `    }`


