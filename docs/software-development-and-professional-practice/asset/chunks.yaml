  trans: '

    *   具有明确且稳定的问题陈述；

    *   存在确定的终止点，即当解决方案达成时；

    *   其解决方案可以被客观地评判为正确或错误；

    *   属于一类以相同或类似方式解决的同类型问题；

    *   其解决方案易于尝试和放弃；

    *   附带有限数量的备选解决方案。


    驯良问题的一个绝佳示例是对数据值列表进行排序。


    *   问题陈述简单清晰——使用此函数比较数据元素，将列表按升序排序。

    *   排序具有确定的终止点——列表已排序完成。

    *   排序结果可以被客观评估（列表要么正确排序，要么未正确排序）。

    *   排序属于一类以相同方式解决的同类型问题。对整数排序类似于对字符串排序，也类似于使用键对数据库记录排序，以此类推。

    *   排序的解决方案易于尝试和放弃。

    *   最后，排序的备选解决方案数量有限；基于比较的排序拥有一组已知算法和一个理论下界。


    你可能会问，这与设计原则有什么关系？认识到我们遇到的大多数大型软件问题都内嵌了一定程度的“棘手性”，会影响我们思考设计问题的方式，影响我们为大型、结构不良的问题设计解决方案的方法，并让我们对设计过程有更深入的洞察。这也让我们能够问心无愧地放弃瀑布模型，并促使我们寻找可应用于设计问题的统一启发式方法。在本章中，我们将讨论设计的总体原则，并在后续章节中进一步展开。


    ### 设计过程


    *设计是混乱的*。即使你完全理解了问题需求（这是一个驯良问题），在设计软件解决方案时，通常也需要考虑许多备选方案。在得出可行的解决方案之前，你通常还会犯很多错误。正如我们在图
    6-2 中所见，随着你对问题的理解逐渐加深，你的设计也会随之变化。这表面上看起来混乱无序，但实际上，你正在取得进展。


    *设计关乎权衡与优先级*。大多数软件项目都有时间限制，因此你通常无法实现客户想要的所有功能。你必须找出在可用时间内能为客户带来最大价值的子集。因此，你需要对需求进行优先级排序，并在不同子集之间进行权衡。


    *设计是启发式的*。对于绝大多数项目而言，并不存在一套一成不变的规则说：“首先，我们使用技术 Y 设计组件 X。然后，我们使用技术 W 设计组件 Z。”软件设计并非如此。软件设计是通过一套不断变化的启发式方法（经验法则）来完成的，每位设计师在其职业生涯中都会积累这些方法。随着时间的推移，优秀的设计师会学到更多的启发式方法和模式（参见第
    11 章），这使他们能够快速处理设计中容易的部分，并直击问题的棘手核心。你能做的最好的事情就是向大师级设计师请教，学习这些启发式方法。


    *设计是不断演化的*。最后，优秀的设计师认识到，对于任何问题，无论是驯良的还是棘手的，需求都会随时间变化。这进而会引发设计的变更。因此，你的设计会随时间不断演化。这在产品发布和新增功能时尤其如此。这里的诀窍是创建一个易于变更且对下游设计和代码影响有限的软件架构（第
    5 章）。


    ### 理想的设计特性（你的设计应优先考虑的特性）


    无论项目规模大小或采用何种设计流程，每个软件设计都应具备一些理想特性。这些是你在考虑设计时应遵循的原则。你的设计不一定需要具备所有这些特性，但拥有其中大部分特性无疑会使你的软件更易于编写、理解和维护。

    '
- fmt: '*Fitness of purpose.* Your design must work, and work correctly in the sense
    that it must satisfy the requirements you''ve been given within the constraints
    of the platform on which your software will be running. Don''t add new requirements
    as you go – the customer will do that for you.


    *Separation of concerns*. Related closely to modularity, this principle says you
    should separate out functional pieces of your design cleanly in order to facilitate
    ease of maintenance and simplicity. Modularity is good.


    *Simplicity*. Keep your design as simple as possible. This will let others understand
    what you''re up to. If you find a place that can be simplified, do it! If simplifying
    your design means adding more modules or classes to your design, that''s okay.
    Simplicity also applies to interfaces between modules or classes. Simple interfaces
    allow others to see the data and control flow in your design. In agile methodologies,
    this idea of simplicity is kept in front of you all the time. Most agile techniques
    have a rule that says if you''re working on part of a program and you have an
    opportunity to simplify it (called *refactoring* in agile-speak) do it right then.
    Keep you design and your code as simple as possible at all times.


    *Ease of maintenance*. A simple, understandable design is amenable to change.
    The first kind of change you''ll encounter is fixing errors. Errors occur at all
    phases of the development process, requirements, analysis, design, coding, and
    testing. The more coherent and easy to understand your design is, the easier it
    will be to isolate and fix errors.


    *Loose coupling*. When you are separating your design into either modules or in
    object-oriented design, into classes, the degree to which the classes depend on
    each other is called *coupling. Tightly coupled* modules may share data or procedures.
    This means that a change in one module is much more likely to lead to a required
    change in the other module. This increases the maintenance burden and makes the
    modules more likely to contain errors. *Loosely coupled* modules, on the other
    hand, are connected solely by their interfaces. Any data they both need must be
    passed between procedures or methods via an *interface*. Loosely coupled modules
    hide the details of how they perform operations from other modules, sharing only
    their interfaces. This lightens the maintenance burden because a change to how
    one class is implemented will not likely affect how another class operates as
    long as the interface is invariant. So changes are isolated and errors are much
    less likely to propagate.


    *High cohesion*. The complement of loose coupling is high cohesion. *Cohesion*
    within a module is the degree to which the module is self-contained with regards
    both to the data it holds and the operations that act on the data. A class that
    has high cohesion pretty much has all the data it needs defined within the class
    template and all the operations that are allowed on the data are defined within
    the class as well. So any object that is instantiated from the class template
    is very independent and just communicates with other objects via its published
    interface.


    *Extensibility*. An outgrowth of simplicity and coupling is the ability to add
    new features to the design easily. This is extensibility. One of the features
    of wicked software problems is that they''re never really finished. So after every
    release of a product, the next thing that happens is the customer asks for new
    features. The easier it is to add new features, the cleaner your design is.


    *Portability*. While not high on the list, keeping in mind that your software
    may need to be ported to another platform (or two or three) is a desirable characteristic.
    There are a lot of issues involved with porting software, including, operating
    system issues, hardware architecture, and user interface issues. This is particularly
    true for web applications.


    ### Design Heuristics


    Speaking of heuristics, here''s a short list of good, time-tested heuristics.
    The list is clearly not exhaustive and it''s pretty idiosyncratic, but it''s a
    list you can use time and again. Think about them and try some of them during
    your next design exercise. We will come back to all of these heuristics in much
    more detail in later chapters.


    *Find real world objects to model*. Alan Davis[⁶](#Chapter06.html#CHP-6-FN-6)
    and Richard Fairley[⁷](#Chapter06.html#CHP-6-FN-7) call this “intellectual distance.”
    It''s how far your design is from a real world object. The heuristic here is to
    try to find real world objects that are close to things you want to model in your
    program. Keeping the real world object in mind as you are designing your program
    helps keep your design closer to the problem. Fairley''s advice is to minimize
    the intellectual distance between the real world object and your model of it.


    __________


    ⁶ Davis, A. M. *201 Principles of Software Development.* (New York, NY: McGraw-Hill,
    1995).


    ⁷ Fairley, R. E. *Software Engineering Concepts.* (New York, NY: McGraw-Hill,
    1985.)


    *Abstraction is key*. Whether you''re doing object-oriented design and you are
    creating interfaces and abstract classes, or whether you''re doing a more traditional
    layered design, you want to use abstraction. Abstraction means being lazy. You
    put off what you need to do by pushing it higher in the design hierarchy (more
    abstraction) or pushing it further down (more details). Abstraction is a key element
    of managing the complexity of a large problem. By abstracting away the details
    you can see the kernel of the real problem.


    *Information hiding is your friend*. Information hiding is the concept that you
    isolate information – both data and behavior – in your program so that you can
    isolate errors and isolate changes; you also only allow access to the information
    via a well-defined interface. A fundamental part of object-oriented design is
    encapsulation, a concept that derives from information hiding. You hide the details
    of a class away and only allow communication and modification of data via a public
    interface. This means that your implementation can change, but as long as the
    interface is consistent and constant, nothing else in your program need change.
    If you''re not doing object-oriented design, think libraries for hiding behavior
    and structures (structs in C and C++) for hiding state.


    *Keep your design modular*. Breaking your design up into semi-independent pieces
    has many advantages. It keeps the design manageable in your head; you can just
    think about one part at a time and leave the others as black boxes. It takes advantage
    of information hiding and encapsulation. It isolates changes. It helps with extensibility
    and maintainability. Modularity is just a good thing. Do it.


    *Identify the parts of your design that are likely to change*. If you make the
    assumption that there will be changes in your requirements, then there will likely
    be changes in your design as well. If you identify those areas of your design
    that are likely to change, you can separate them, thus mitigating the impact of
    any changes you need to make. What things are likely to change? Well, it depends
    on your application, doesn''t it? Business rules can change (think tax rules or
    accounting practices), user interfaces can change, hardware can change, and so
    on. The point here is to anticipate the change and to divide up your design so
    that the necessary changes are contained.'
