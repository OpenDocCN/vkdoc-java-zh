  trans: "\n## 设计模式\n\n> *每个模式都描述了一个在我们环境中反复出现的问题，然后描述了该问题解决方案的核心，使得你可以无数次地使用这个解决方案，而无需以完全相同的方式重复操作。*\n\
    > \n> — 克里斯托弗·亚历山大^(1)\n\n每次编写代码时，你都要重新发明轮子吗？每次编写程序时，你都必须重新学习如何遍历数组吗？在你编写的每个函数中，你都需要重新发明如何修复悬空的\
    \ else 吗？每次需要使用插入排序或二分查找时，你都需要重新学习它们吗？当然不是！\n\n在你编写程序的过程中，你已经学会了一套*惯用语法*，每当编写代码时都会使用它们。例如，如果你需要在\
    \ Java 中遍历数组的所有元素，你可能会这样做：\n\n`for (int i = 0; i < myArray.length; i++) {`\n`         System.out.printf(\"\
    \ %d \", myArray[i]);`\n`}`\n\n`或`\n\n`for (int nextElement: myArray) {`\n`        System.out.printf(\"\
    \ %d \", nextElement);`\n`}`\n\n代码就会随着你的指尖流畅地输出。这些*代码模式*是你随着编写程序经验的积累而积累起来的一套代码规则和模板。\n\
    \n*设计模式*也是同样的道理——只不过针对的是你的设计。著名建筑师克里斯托弗·亚历山大在他的著作《模式语言》中定义了建筑设计的模式。同样的理念也延续到了软件设计中。如果你回头阅读本章开头的亚历山大引言，你会看到亚历山大对设计模式的定义中包含以下三个关键要素：\n\
    \n___________________\n\n¹ Alexander, C., S. Ishikawa, et al. *A Pattern Language:\
    \ Towns, Buildings, Construction.* (Oxford, UK: Oxford University Press, 1977.)\n\
    \n*   *重复出现*：引发设计模式的问题必须是一个常见问题。\n*   *核心解决方案*：模式为解决方案提供了一个模板；它试图提取出解决方案的本质。\n\
    *   *可复用性*：当相同的问题出现在不同领域时，该模式必须易于复用。\n\n事实上，到目前为止，你已经在本书中至少看到过一个设计模式：我们在第 5 章中讨论的*模型-视图-控制器*模式（MVC）是最早发表的软件设计模式示例之一。^(2)\
    \ MVC 设计模式用于使用图形用户界面的程序。它将程序分为三个部分：包含程序处理规则的*模型*，向用户呈现数据和界面的*视图*，以及协调*模型*和*视图*之间通信的*控制器*。在典型的面向对象实现中，这些抽象概念中的每一个都成为一个独立的对象。\n\
    \n*四人组*（Gamma、Helm、Johnson 和 Vlissides）在他们关于设计模式的开创性著作《设计模式：可复用面向对象软件的基础》^(3)中，将设计模式定义为“命名、抽象并识别常见设计结构的关键方面，使其有助于创建可复用的面向对象设计”的东西。换句话说，设计模式是从*具体示例*中提取的*命名抽象*，它代表了针对*特定但常见问题*的*重复出现的解决方案*——重复出现、核心解决方案、可复用性。\n\
    \n但为什么我们首先需要设计模式呢？为什么我们不能仅仅依靠我们在第 10 章中学到的面向对象设计原则，以及我们钟爱的抽象、继承、多态和封装呢？\n\n嗯，事实证明，设计是困难的。这就是原因。面向复用的设计更加困难。设计也更像是一门艺术，而不是一门科学或工程学科。经验丰富的软件设计师很少从基本原理出发；他们会在当前问题中寻找与过去解决过的问题的相似之处。并且他们会将多年来学到的设计惯用语法带到设计工作中。设计模式提供了一种*共享词汇*，使这些专家知识能够为所有人所用。\n\
    \n### 设计模式与四人组\n\n在他们的书中，四人组将设计模式描述为具有四个基本特征：\n\n*   *模式名称*：“……一个我们可以用一两个词来描述设计问题、其解决方案和后果的标识。命名一个模式会立即增加我们的设计词汇量。”\n\
    *   *问题*：描述何时使用该模式。“它解释了问题及其上下文。”\n*   *解决方案*：“……描述了构成设计的元素、它们的关系、职责和协作……该模式提供了对设计问题的抽象描述，以及元素的通用排列如何解决该问题。”\n\
    *   *后果*：将模式应用于问题的结果和权衡。这些包括时间和空间的权衡，也包括灵活性、可扩展性和可移植性等。^(4)\n\n___________________\n\
    \n² Krasner, G. E. and S. T. Pope. “A cookbook for using the Model-View-Controller\
    \ user interface paradigm in Smalltalk-80.” *Journal of Object-Oriented Programming*\
    \ 1(3): 26-49\\. 1988.\n\n³ Gamma, E., Helm, R., Johnson, R., Vlissides. *Design\
    \ Patterns: Elements of Reusable Object-Oriented Software.* (Boston, MA: Addison-Wesley,\
    \ 1995.)\n\n设计模式根据两个标准进行分类：*范围*和*目的*。范围涉及类和对象之间的关系。类之间的静态关系在编译时固定，而动态关系适用于对象，这些关系可以在运行时改变。当然，目的涉及模式对类和对象的作用。模式可以处理对象的创建、类或对象的组合，或者对象在程序中交互和分配职责的方式。\n\
    \n四人组在他们的书中描述了 23 种不同的设计模式，将它们分为三类模式：*创建型*、*结构型*和*行为型*。\n\n*   *创建型设计模式*处理对象何时以及如何创建的问题。这些模式通常会为你创建对象，使你无需直接实例化这些对象。\n\
    *   *结构型设计模式*描述对象如何组合成更大的组。\n*   *行为型设计模式*通常讨论职责如何在设计中分配以及对象之间如何进行通信。\n\n这个列表并非完整无缺，在四人组的《设计模式》一书出版后的\
    \ 15 年里，世界各地的开发者已经在这个原始列表中添加了许多模式。最近在 Google 上搜索“设计模式”一词，得到了 250 万条结果，因此许多面向对象开发者已经加入了设计模式的行列。\n\
    \n#### 经典设计模式\n\n四人组描述的 23 种（经典）设计模式如下（在本章剩余部分，我们将介绍斜体标出的六种设计模式）：\n\n**创建型模式**\n\
    \n1.  抽象工厂\n2.  建造者\n3.  *工厂方法*\n4.  原型\n5.  *单例*\n\n    **结构型模式**\n\n6.  *适配器*\n\
    7.  桥接\n8.  组合\n9.  装饰器\n10.  外观\n11.  享元\n12.  代理\n\n    **行为型模式**\n\n13.  责任链\n\
    14.  命令\n15.  解释器\n16.  *迭代器*\n17.  中介者\n18.  备忘录\n19.  *观察者*\n20.  状态\n21.  *策略*\n\
    22.  模板方法\n23.  访问者\n\n___________________\n\n⁴ Gamma et. al, 1995.\n\n### 我们可以使用的模式\n\
    \n本节中的六种模式是经典设计模式的代表性样本，也是你马上会发现最有用的六种模式。\n"
- fmt: "#### Creational Patterns\n\nCreational Patterns all have to do with creating\
    \ objects. If we think about class definitions as templates for producing objects,\
    \ then these patterns are all about how to create those templates. The two patterns\
    \ we'll look at next, Singleton and Factory show us two different ways of thinking\
    \ about creating objects.\n\n##### The Singleton Pattern\n\n`Singleton`^([5](#Chapter11.html#CH-11-FN-5))\
    \ is almost certainly the easiest of the Design Patterns to understand and to\
    \ code. The idea is simple. You are writing a program and you have a need for\
    \ one – *and only one* – instance of a class. And you need to enforce that “and\
    \ only one” requirement. Examples of programs that would use a Singleton pattern\
    \ are things like print spoolers, window managers, device drivers, and the like.\n\
    \nSo what are the implications of the “one, and only one” requirement? Well, first,\
    \ it means your program can only say “`new Singleton()`” once, right? But what’s\
    \ to stop other objects in your program (or objects in the program that you didn’t\
    \ write) from issuing another “`new Singleton()`”? The answer is – nothing! As\
    \ long as your class can be instantiated once, other objects should be able to\
    \ instantiate it again and again. Well, bummer.\n\nSo what we need to do is to\
    \ create a class that can be instantiated once and only once and which *doesn’t\
    \ use* `new` to do the instantiation. Huh?\n\nYou heard me right: we need a class\
    \ that can be instantiated without using `new`. Go ahead, think about it.\n\n\
    Here’s what we’ll do. The method that gets called when an object is instantiated\
    \ is the constructor. In Java you can say `new Singleton()` because the `Singleton()`\
    \ constructor is `public` – it’s visible from outside the class definition. If\
    \ we want to keep the constructor so we can make instances of Singleton objects,\
    \ but we don’t want anyone to be able to use `new` to do that, we must make the\
    \ constructor `private`. “But wait!” you cry, “if the constructor is private then\
    \ we can’t instantiate the object at all!” *Au contraire*, dear reader. If the\
    \ constructor is private, then it can only be accessed from inside the class definition,\
    \ so it’s entirely possible to instantiate the object from within the class definition\
    \ itself!\n\n“But wait again!” you say. “How do we get to the constructor from\
    \ *outside* the class definition?” Well, in Java is there a way to access a method\
    \ inside a class without having to have an instantiation of the class? (Think\
    \ the Math class.)\n\nAha! Class methods! If you create a `public` method that\
    \ is `static` (a class method) then that method is visible outside the class definition\
    \ without having the object actually instantiated. So, if we create a class with\
    \ a private constructor and then use a `static` method to create an instance of\
    \ the class, you can control how many instances of the class you create. Here’s\
    \ the code:\n\n```\npublic class Singleton {\n        // this is the instance\
    \ that will hang around\n        private static Singleton uniqueInstance;\n  \
    \      // the private constructor – can't be accessed from outside\n        private\
    \ Singleton() {\n                // do stuff here to initialize the instance\n\
    \        }\n        // here's the static method we'll use to create the instance\n\
    \        public static Singleton getInstance() {\n                if (uniqueInstance\
    \ == null) {\n                        uniqueInstance = new Singleton();\n    \
    \            }\n                return uniqueInstance;\n        }\n        //\
    \ Other methods – after all Singleton is a real class\n}\n```\n\nand in order\
    \ to use the `Singleton` class we’d do something like:\n\n___________________\n\
    \n⁵ Gamma et. al, 1995\n\n```\npublic class SingletonTest {\n\n        public\
    \ static void main(String [] args) {\n                Singleton mySingle;\n  \
    \              mySingle = Singleton.getInstance();\n                // and we\
    \ do other stuff here\n        }\n}\n```\n\nWhen we instantiate the `Singleton`\
    \ instance by calling the `getInstance()` method, it will test to see if we’ve\
    \ done this before. If not, it creates the instance using the private constructor\
    \ in the `Singleton` class. If the instance already exists (the `uniqueInstance`\
    \ variable is not `null`) then we just return the reference to the object. Told\
    \ you it was simple.\n\nThis version of the Singleton pattern isn’t without its\
    \ problems; for one thing, it can fail if you are writing a multi-threaded Java\
    \ program. The solution above is not “thread safe.” It's possible that in between\
    \ the test for the existing of a `Singleton` instance and the actual creation\
    \ of an instance that your program could be swapped out while another thread executes.\
    \ When it swaps back in, it could erroneously create another instance of the `Singleton`.\
    \ There are relatively easy solutions to this.\n\nThe simplest way to make your\
    \ Singleton pattern thread-safe is to make the `getInstance()` method a synchronized\
    \ method. That way it will execute to completion and not be swapped out. Here’s\
    \ a version of the `getInstance()` method that is thread safe:\n\n```\n      \
    \  public synchronized static Singleton getInstance() {\n                if (uniqueInstance\
    \ == null) {\n                        uniqueInstance = new Singleton();\n    \
    \            }\n                return uniqueInstance;\n        }\n```\n\nNotice\
    \ that the only difference is the inclusion of the `synchronized` keyword in the\
    \ method signature.\n\nOn to the next pattern."
  raw: '#### Creational Patterns


    Creational Patterns all have to do with creating objects. If we think about class
    definitions as templates for producing objects, then these patterns are all about
    how to create those templates. The two patterns we''ll look at next, Singleton
    and Factory show us two different ways of thinking about creating objects.


    ##### The Singleton Pattern


    Singleton^([5](#Chapter11.html#CH-11-FN-5)) is almost certainly the easiest of
    the Design Patterns to understand and to code. The idea is simple. You are writing
    a program and you have a need for one – *and only one* – instance of a class.
    And you need to enforce that “and only one” requirement. Examples of programs
    that would use a Singleton pattern are things like print spoolers, window managers,
    device drivers, and the like.


    So what are the implications of the “one, and only one” requirement? Well, first,
    it means your program can only say “**new** Singleton()” once, right? But what’s
    to stop other objects in your program (or objects in the program that you didn’t
    write) from issuing another “**new** Singleton()”? The answer is – nothing! As
    long as your class can be instantiated once, other objects should be able to instantiate
    it again and again. Well, bummer.


    So what we need to do is to create a class that can be instantiated once and only
    once and which *doesn’t use* **new** to do the instantiation. Huh?


    You heard me right: we need a class that can be instantiated without using **new**.
    Go ahead, think about it.


    Here’s what we’ll do. The method that gets called when an object is instantiated
    is the constructor. In Java you can say **new** Singleton() because the Singleton()
    constructor is **public** – it’s visible from outside the class definition. If
    we want to keep the constructor so we can make instances of Singleton objects,
    but we don’t want anyone to be able to use **new** to do that, we must make the
    constructor **private**. “But wait!” you cry, “if the constructor is private then
    we can’t instantiate the object at all!” *Au contraire*, dear reader. If the constructor
    is private, then it can only be accessed from inside the class definition, so
    it’s entirely possible to instantiate the object from within the class definition
    itself!


    “But wait again!” you say. “How do we get to the constructor from *outside* the
    class definition?” Well, in Java is there a way to access a method inside a class
    without having to have an instantiation of the class? (Think the Math class.)


    Aha! Class methods! If you create a **public** method that is **static** (a class
    method) then that method is visible outside the class definition without having
    the object actually instantiated. So, if we create a class with a private constructor
    and then use a **static** method to create an instance of the class, you can control
    how many instances of the class you create. Here’s the code:


    `public class Singleton {`

    `        // this is the instance that will hang around`

    `        private static Singleton uniqueInstance;`

    `        // the private constructor – can''t be accessed from outside`

    `        private Singleton() {`

    `                // do stuff here to initialize the instance`

    `        }`

    `        // here''s the static method we''ll use to create the instance`

    `        public static Singleton getInstance() {`

    `                if (uniqueInstance == null) {`

    `                        uniqueInstance = new Singleton();`

    `                }`

    `                return uniqueInstance;`

    `        }`

    `        // Other methods – after all Singleton is a real class`

    `}`


    and in order to use the `Singleton` class we’d do something like:


    ___________________


    ⁵ Gamma et. al, 1995


    `public class SingletonTest {`


    `        public static void main(String [] args) {`

    `                Singleton mySingle;`

    `                mySingle = Singleton.getInstance();`

    `                // and we do other stuff here`

    `        }`

    `}`


    When we instantiate the `Singleton` instance by calling the `getInstance()` method,
    it will test to see if we’ve done this before. If not, it creates the instance
    using the private constructor in the `Singleton` class. If the instance already
    exists (the `uniqueInstance` variable is not **`null`**) then we just return the
    reference to the object. Told you it was simple.


    This version of the Singleton pattern isn’t without its problems; for one thing,
    it can fail if you are writing a multi-threaded Java program. The solution above
    is not “thread safe.” It''s possible that in between the test for the existing
    of a `Singleton` instance and the actual creation of an instance that your program
    could be swapped out while another thread executes. When it swaps back in, it
    could erroneously create another instance of the `Singleton`. There are relatively
    easy solutions to this.


    The simplest way to make your Singleton pattern thread-safe is to make the `getInstance()`
    method a synchronized method. That way it will execute to completion and not be
    swapped out. Here’s a version of the `getInstance()` method that is thread safe:


    `        public synchronized static Singleton getInstance() {`

    `                if (uniqueInstance == null) {`

    `                        uniqueInstance = new Singleton();`

    `                }`

    `                return uniqueInstance;`

    `        }`


    Notice that the only difference is the inclusion of the `synchronized` keyword
    in the method signature.


    On to the next pattern.'
  trans: '

    #### 创建型模式


    创建型模式都与对象的创建有关。如果我们将类定义视为生成对象的模板，那么这些模式关注的就是如何创建这些模板。接下来要介绍的两种模式——单例模式和工厂模式——向我们展示了两种不同的对象创建思路。


    ##### 单例模式


    单例模式^(5)几乎可以说是设计模式中最容易理解和编码的一种。其思想很简单：你在编写程序时，需要一个类有且仅有一个实例，并且需要强制实现“仅此一个”的要求。使用单例模式的程序示例包括打印假脱机程序、窗口管理器、设备驱动程序等。


    那么，“仅此一个”的要求意味着什么呢？首先，这意味着你的程序只能调用一次“**new** Singleton()”，对吧？但如何阻止程序中的其他对象（或你未编写的程序中的对象）再次调用“**new**
    Singleton()”呢？答案是——无法阻止！只要你的类可以被实例化一次，其他对象就能反复实例化它。这可就麻烦了。


    因此，我们需要创建一个只能被实例化一次、且*不使用* **new** 关键字进行实例化的类。嗯？


    你没听错：我们需要一个无需使用 **new** 就能实例化的类。请思考一下。


    具体做法如下：对象实例化时调用的方法是构造函数。在 Java 中，你可以写 **new** Singleton()，因为 Singleton() 构造函数是
    **public** 的——它在类定义外部可见。如果我们希望保留构造函数以便创建 Singleton 对象实例，但又不想让任何人通过 **new** 来创建，就必须将构造函数设为
    **private**。“但等等！”你可能会惊呼，“如果构造函数是私有的，那我们就完全无法实例化对象了！”*恰恰相反*，亲爱的读者。如果构造函数是私有的，它只能从类定义内部访问，因此完全可以在类定义内部实例化对象！


    “但再等等！”你又说，“我们如何从*类定义外部*访问构造函数呢？”在 Java 中，有没有一种方法可以在不实例化类的情况下访问类内部的方法？（想想 Math
    类。）


    啊哈！类方法！如果你创建一个 **public** 且 **static** 的方法（类方法），那么该方法在类定义外部可见，且无需实际实例化对象。因此，如果我们创建一个具有私有构造函数的类，并使用
    **static** 方法来创建类的实例，就可以控制创建的实例数量。代码如下：


    `public class Singleton {`

    `        // 这是将长期存在的实例`

    `        private static Singleton uniqueInstance;`

    `        // 私有构造函数——无法从外部访问`

    `        private Singleton() {`

    `                // 在此处执行初始化实例的操作`

    `        }`

    `        // 这是用于创建实例的静态方法`

    `        public static Singleton getInstance() {`

    `                if (uniqueInstance == null) {`

    `                        uniqueInstance = new Singleton();`

    `                }`

    `                return uniqueInstance;`

    `        }`

    `        // 其他方法——毕竟 Singleton 是一个真正的类`

    `}`


    为了使用 `Singleton` 类，我们可以这样操作：


    ___________________


    ⁵ Gamma 等人，1995


    `public class SingletonTest {`


    `        public static void main(String [] args) {`

    `                Singleton mySingle;`

    `                mySingle = Singleton.getInstance();`

    `                // 在此处执行其他操作`

    `        }`

    `}`


    当我们通过调用 `getInstance()` 方法来实例化 `Singleton` 实例时，它会检查之前是否已经实例化过。如果没有，则使用 `Singleton`
    类中的私有构造函数创建实例。如果实例已存在（`uniqueInstance` 变量不为 **`null`**），则直接返回该对象的引用。我说过这很简单吧。


    这个版本的单例模式并非没有缺陷；例如，如果你编写的是多线程 Java 程序，它可能会失效。上述解决方案并非“线程安全”。在检查 `Singleton` 实例是否存在与实际创建实例之间，你的程序可能会被切换出去，而另一个线程则继续执行。当程序切换回来时，可能会错误地创建另一个
    `Singleton` 实例。对此有相对简单的解决方案。


    使单例模式线程安全的最简单方法是将 `getInstance()` 方法设为同步方法。这样它就会完整执行而不会被切换出去。以下是线程安全的 `getInstance()`
    方法版本：


    `        public synchronized static Singleton getInstance() {`

    `                if (uniqueInstance == null) {`

    `                        uniqueInstance = new Singleton();`

    `                }`

    `                return uniqueInstance;`

    `        }`


    注意，唯一的区别是在方法签名中加入了 `synchronized` 关键字。


    接下来进入下一个模式。

    '
- fmt: "# The Factory Pattern\n\nSay you’ve got a small company and your company is\
    \ making ice cream. Because you’re a small company, your factory can only make\
    \ one type of ice cream at a time, so you have to tell the workers on any given\
    \ day what kind of ice cream they’re making that day. Of course, you don’t change\
    \ the different ice cream recipes every day, and you don’t change the basic makeup\
    \ of the factory every day, but you do change which ice cream is being manufactured,\
    \ packaged, and shipped each day. And, of course, you have a program to model\
    \ your factory. So the question is, how do you write the program in such a way\
    \ that you don’t have to change it every day? And how do you write it so you don’t\
    \ need to change (most) of it when you add a new ice cream flavor? That’s where\
    \ the Factory design pattern comes in.\n\nA *Factory* pattern (also called a *Factory\
    \ Method* pattern)^([6](#Chapter11.html#CH-11-FN-6)) creates objects for you.\
    \ You use it when you need to create several types of objects that are usually\
    \ related to each other – they usually have the same abstract parent class - but\
    \ are different. You ask the factory to create an object of type X and it creates\
    \ one; you ask it to create an object of type Y and it creates one. This forces\
    \ the creation of concrete classes to be relegated to subclasses of an interface\
    \ that knows how to create concrete classes, and keeps your other classes closed\
    \ for modification. All without changing X or Y or the factory. In our example\
    \ we can create Vanilla, Chocolate, or Strawberry ice cream objects, using an\
    \ `IceCreamFactory` class to generate the different types of ice cream. The Factory\
    \ pattern allows you to define an interface for creating a family of objects,\
    \ and it allows subclasses to decide which members of the family to instantiate.\
    \ It defers instantiation down into the subclasses.\n\n___________________\n\n\
    ⁶ Gamma, et. al, 1995.\n\nIn our example, we’ll have several classes:\n\n> *`IceCream`*:\
    \ An interface that defines our ice cream objects\n> \n> `VanillaIceCream`: A\
    \ concrete class that inherits from *`IceCream`*\n> \n> `ChocolateIceCream`: A\
    \ concrete class that inherits from *`IceCream`*\n> \n> `StrawberryIceCream`:\
    \ A concrete class that inherits from *`IceCream`*\n> \n> *`Factory`*: An interface\
    \ that defines the methods used to make *`IceCream`* objects\n> \n> `IceCreamFactory`:\
    \ Our concrete implementation of the `Factory` interface that makes different\
    \ *`IceCream`* objects\n> \n> `IceCreamStore`: A driver class that lets us make\
    \ and sell ice cream\n\nOur `IceCream` interface could look like:\n\n```\npublic\
    \ interface IceCream {\n        public  void yummy();\n        // plus other methods\n\
    }\n```\n\nand our ice cream flavors end up as concrete classes:\n\n```\npublic\
    \ class VanillaIceCream implements IceCream {\n        public void yummy() {\n\
    \                System.out.println(\"Vanilla!\");\n        }\n}\n```\n\n```\n\
    public class ChocolateIceCream implements IceCream {\n        public void yummy()\
    \ {\n                System.out.println(\"Chocolate!\")\n        }\n\n}\n```\n\
    \n```\npublic class StrawberryIceCream implements IceCream {\n        public void\
    \ yummy() {\n                System.out.println(\"Strawberry!\");\n        }\n\
    }\n```\n\nThe Factory pattern depends on defining an interface for the factory\
    \ and then allowing subclasses that implement that interface to actually create\
    \ the objects; our `Factory` interface will look something like the following:\n\
    \n```\npublic interface Factory {\n        public  IceCream makeIceCream(String\
    \ type);\n        // and other methods here to sell, package and transport\n \
    \       // the ice cream\n}\n```\n\nAnd finally, our concrete *`IceCreamFactory`*\
    \ which will implement the `makeIceCream()` method from the *`Factory`* interface\
    \ and actually make an `IceCream` object looks like this:\n\n```\npublic class\
    \ IceCreamFactory implements Factory {\n        public IceCream makeIceCream(String\
    \ type) {\n                IceCream newIceCream = null;\n                if (type.equals(\"\
    Vanilla\")) {\n                        newIceCream = new VanillaIceCream();\n\
    \                } else if (type.equals(\"Chocolate\")) {\n                  \
    \      newIceCream = new ChocolateIceCream();\n                } else if (type.equals(\"\
    Strawberry\")) {\n                        newIceCream = new StrawberryIceCream();\n\
    \                }\n                return newIceCream;\n        }\n}\n```\n\n\
    In order to test our factory we create a driver – our ice cream store!\n\n```\n\
    public class IceCreamStore {\n        public static void main (String [] args)\
    \ {\n                IceCreamFactory myStore = new IceCreamFactory();\n      \
    \          IceCream vanilla = myStore.makeIceCream(\"Vanilla\");\n           \
    \     vanilla.yummy();\n                IceCream choco = myStore.makeIceCream(\"\
    Chocolate\");\n                choco.yummy();\n                IceCream straw\
    \ = myStore.makeIceCream(\"Strawberry\");\n                straw.yummy();\n  \
    \      }\n}\n```\n\n[Figure 11-1](#Chapter11.html#fig_11_1) shows what these look\
    \ like in a version of UML.\n\n![images](images/1101.jpg)\n\n***Figure 11-1.**\
    \ The Ice Cream Store using an IceCreamFactory*\n\nWhat to notice about this Factory\
    \ pattern example? Well, how about the following:\n\n*   The factory method (`makeIceCream()`)\
    \ encapsulates the creation of the `IceCream` object. Our driver just tells the\
    \ factory which ice cream to make.\n*   The *`Factory`* interface provides the\
    \ interface for the subclasses to create the actual objects.\n*   The `IceCreamFactory`\
    \ concrete class actually creates the objects by implementing the `makeIceCream()`\
    \ method. This also implies that other concrete classes that implement `Factory`\
    \ could do the same.\n*   This leaves the *`IceCream`* classes alone, and makes\
    \ it easier for the `IceCreamStore` to create new objects.\n*   Notice also that\
    \ the `IceCreamStore` class only deals with *`IceCream`* objects. It doesn’t have\
    \ to know anything about particular types of ice cream. The concrete *`IceCream`*\
    \ objects implement the methods from the *`IceCream`* interface and the `IceCreamStore`\
    \ just uses them regardless of which type of *`IceCream`* you’ve created.\n* \
    \  It also means that you can change the implementation of a particular type of\
    \ *`IceCream`* without changing either the interface or the `IceCreamStore`. What\
    \ a concept!\n\n## Structural Patterns\n\nStructural patterns help you put objects\
    \ together so you can use them more easily. They are all about grouping objects\
    \ together and providing ways for objects to coordinate to get work done. Remember,\
    \ composition, aggregation, delegation, and inheritance are all about structure\
    \ and coordination. The Structural pattern we'll look at here – the Adapter –\
    \ is all about getting classes to work together."
