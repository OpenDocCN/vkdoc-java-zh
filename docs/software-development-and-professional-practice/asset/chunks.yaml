    \ not on the next deadline) and your code will be cleaner, you'll be more relaxed\
    \ and more productive. Just relax and win.\n> \n> *Concrete experiments*: Every\
    \ abstract decision (requirements or design) should be tested. In XP and in other\
    \ agile methodologies, you're encouraged to produce something called a *spike*.\
    \ A spike is a quick and dirty proof-of-concept piece of code that implements\
    \ at least the outline of your decision so you can see if you're actually right.\
    \ Or, if you're wrong, you've not wasted lots of time figuring that out.\n> \n\
    > *Open, honest communication*: You have to be able to criticize constructively\
    \ and be able to deliver bad news as well as good. This is the foundation of a\
    \ good design or code review. The culture of the team must be that you can offer\
    \ constructive criticism at any time. The idea is two-fold; first, you're all\
    \ trying to improve the code, so criticism is a good thing, and second, common\
    \ code ownership means that everyone is entitled to make changes without fear\
    \ of hurting someone else's feelings.\n> \n> *Work with people's instincts, not\
    \ against them*: People generally like to win, like working with others, like\
    \ being part of a team, and especially like seeing their code work. Don't do things\
    \ that go against this.\n> \n> *Accepted responsibility*: The team as a whole\
    \ is responsible for the product. Responsibility is accepted by the entire team\
    \ and tasks are not assigned, they're requested. Common code ownership leads to\
    \ common project ownership. XP teams typically do not have managers that assign\
    \ work; they have a coach to help with the process and a project manager to take\
    \ care of the administrative tasks. The development team members themselves select\
    \ tasks and make sure they get done.\n> \n> *Local adaptation*: Change XP to fit\
    \ your local circumstances and project. This is an application of accepted responsibility.\
    \ The team owns the project, so the team also owns the process and they reach\
    \ consensus on adaptations.\n> \n> *Travel light*: The team and process artifacts\
    \ you maintain should be few, simple, and valuable. This implies that you should\
    \ be willing to change directions quickly and jettison things (code, design) that\
    \ aren't working for ones that do.\n> \n> *Honest measurement*: Measure at the\
    \ right level of detail and only measure what makes sense for your project. Remember\
    \ the difference between accuracy and precision.\n\n### The Four Basic Activities\n\
    \nIn order for XP to take the values and principles just described and create\
    \ a discipline out of them, we need to describe the activities we'll use as the\
    \ foundation. XP describes four activities that are the bedrock of the discipline.\n\
    \n*   *Coding*: The code is where the knowledge of the system resides so it's\
    \ your main activity. The fundamental difference between plan-driven models and\
    \ agile models is this emphasis on the code. In a plan-driven model, the emphasis\
    \ is on producing a set of work products that together represent the entire work\
    \ of the project with code being just one of the work products. In agile methodologies,\
    \ the code is the sole deliverable and so the emphasis is placed squarely there;\
    \ in addition, by structuring the code properly and keeping comments up to date,\
    \ the code becomes documentation for the project.\n*   *Testing*: The tests tell\
    \ you when you are done coding. Test-driven development is crucial to the idea\
    \ of managing change. XP depends heavily on writing unit tests before writing\
    \ the code that they test and on using an automated testing framework to run all\
    \ the unit tests whenever changes are integrated.\n*   *Listening*: To your partner\
    \ and to the customer. In any given software development project there are two\
    \ types of knowledge. The customer has knowledge of the business application being\
    \ written and what it is supposed to do. This is the domain knowledge of the project.\
    \ The developers have knowledge about the target platform, the programming language(s),\
    \ and the implementation issues. This is the technical knowledge of the project.\
    \ The customer doesn't know the technical side and the developers don't have the\
    \ domain knowledge, so listening – on both sides – is a key activity in developing\
    \ the product.\n*   *Designing*: Design while you code. “Designing is creating\
    \ a structure that organizes the logic in the system. Good design organizes the\
    \ logic so that a change in one part of the system doesn't always require a change\
    \ in another part of the system. Good design ensures that every piece of logic\
    \ in the system has one and only one home. Good design puts the logic near the\
    \ data it operates on. Good design allows the extension of the system with changes\
    \ in only one place.”[^(12)](#Chapter02.html#CHP-2-FN-12)\n\n### 11Implementing\
    \ XP: The 12 Practices\n\nWe (finally) get to the implementation of XP. Here are\
    \ the rules that every XP team follows during their project. The rules may vary\
    \ depending on the team and the project, but in order to call yourselves an XP\
    \ team, you need to do some form of these things. The practices described here\
    \ draw on everything previously described: the four values, the 15 principles,\
    \ and the four activities. This is really XP."
  trans: "\n> *快速反馈*：获取反馈，解读它，并尽快将其重新纳入系统。自动化测试在此至关重要，因为你可以随时运行单元测试，并在想要集成更改时运行整个回归测试套件。\n\
    > \n> ______________\n> \n> ¹¹Beck, K. (2000)\n> \n> *假设简单*：专注于今天的任务，并以最简单的方式解决它。这也意味着，在进行更改时，你应该寻找简化代码的方法。重构能使代码尽可能简单，并减少缺陷。\n\
    > \n> *增量变更*：每天将你的新代码集成到系统中。事实上，每当你完成一个任务时就进行集成。这能让你快速发现接口和交互错误，并至少每天为客户提供一个可供检查的新基线。\n\
    > \n> *拥抱变化*：变化总会发生，所以要为此做好准备。像极限编程（XP）这样的敏捷方法论，其整个基础就在于变化是软件开发中的常态，你的规程越能适应变化，你的开发过程就会越好。\n\
    > \n> *高质量工作*：质量并非免费；要努力追求无缺陷的代码。结对编程带来了“三个臭皮匠，顶个诸葛亮”的好处，而测试驱动开发则让你的代码专注于满足需求。这两者都有助于减少代码中的缺陷。\n\
    > \n> *教导学习*：教导如何更好地学习进行测试、重构和编码，而不是制定一套规则说“你必须这样测试”。\n> \n> *小规模初始投入*：这里的重点是小型团队，尤其是在项目开始时，要谨慎且保守地管理资源。如果你以较少的资源和紧凑的预算开始，这将迫使你的思维聚焦于精益设计和代码。这强化了简单性。\n\
    > \n> *为赢而战*：与“为不输而战”相对。如果你不担心进度或需求变更，你的日子会更轻松，你将能够专注于手头的问题（而不是下一个截止日期），你的代码会更整洁，你会更放松，效率也更高。放松心态，赢得胜利。\n\
    > \n> *具体实验*：每一个抽象决策（需求或设计）都应该被测试。在 XP 和其他敏捷方法论中，鼓励你创建一种称为*探针*的东西。探针是一段快速而粗糙的概念验证代码，它至少实现了你决策的轮廓，以便你能检验自己是否正确。或者，如果你错了，也不会浪费大量时间去发现这一点。\n\
    > \n> *开放、诚实的沟通*：你必须能够进行建设性的批评，并且既能传递好消息也能传递坏消息。这是良好设计或代码审查的基础。团队的文化必须是你可以随时提出建设性的批评。这有两层含义：首先，你们都在努力改进代码，所以批评是好事；其次，公共代码所有权意味着每个人都有权进行更改，而不必担心伤害他人的感情。\n\
    > \n> *顺应人的本能，而非对抗*：人们通常喜欢赢，喜欢与他人合作，喜欢成为团队的一员，尤其喜欢看到自己的代码能工作。不要做违背这一点的事情。\n> \n\
    > *接受责任*：整个团队对产品负责。责任由整个团队承担，任务不是被分配的，而是被请求的。公共代码所有权导致共同的项目所有权。XP 团队通常没有分配工作的经理；他们有一位教练来协助流程，以及一位项目经理来处理行政事务。开发团队成员自己选择任务并确保完成。\n\
    > \n> *本地适应*：根据你的本地情况和项目调整 XP。这是接受责任原则的应用。团队拥有项目，因此团队也拥有流程，他们需要就调整达成共识。\n> \n\
    > *轻装上阵*：你维护的团队和流程工件应该少而精，并且有价值。这意味着你应该愿意快速改变方向，并抛弃那些不起作用的东西（代码、设计），转而采用有效的。\n\
    > \n> *诚实度量*：在正确的细节层面进行度量，并且只度量对你的项目有意义的内容。记住准确度与精密度之间的区别。\n\n### 四项基本活动\n\n为了让\
    \ XP 能够采纳上述价值观和原则，并从中创建一套规程，我们需要描述将作为基础的活动。XP 描述了构成该规程基石的四个活动。\n\n*   *编码*：代码是系统知识所在之处，因此它是你的主要活动。计划驱动模型与敏捷模型之间的根本区别就在于对代码的重视程度。在计划驱动模型中，重点在于生成一组工作产品，这些产品共同代表项目的全部工作，而代码只是其中一个工作产品。在敏捷方法论中，代码是唯一的可交付成果，因此重点完全放在代码上；此外，通过恰当地组织代码并保持注释更新，代码本身就成了项目的文档。\n\
    *   *测试*：测试告诉你何时完成了编码。测试驱动开发对于管理变更的理念至关重要。XP 高度依赖于在编写被测试的代码之前先编写单元测试，并且使用自动化测试框架在集成更改时运行所有单元测试。\n\
    *   *倾听*：倾听你的伙伴和客户。在任何给定的软件开发项目中，都存在两种类型的知识。客户拥有关于正在编写的业务应用程序及其预期功能的知识。这是项目的领域知识。开发人员拥有关于目标平台、编程语言以及实现问题的知识。这是项目的技术知识。客户不了解技术方面，开发人员不具备领域知识，因此倾听——双方都倾听——是开发产品的关键活动。\n\
    *   *设计*：边编码边设计。“设计是创建一种结构来组织系统中的逻辑。好的设计能组织逻辑，使得系统某一部分的变更不总是需要系统另一部分的变更。好的设计确保系统中的每一段逻辑都有一个且只有一个归属地。好的设计将逻辑放在其操作的数据附近。好的设计允许仅在一个地方进行更改就能扩展系统。”¹²\n\
    \n### 实施 XP：12 个实践\n\n我们（终于）谈到了 XP 的实施。以下是每个 XP 团队在项目期间遵循的规则。这些规则可能因团队和项目而异，但要想自称为\
    \ XP 团队，你需要以某种形式做到这些事情。这里描述的实践借鉴了之前描述的所有内容：四个价值观、15 个原则和四个活动。这才是真正的 XP。\n"
- fmt: '# 极限编程（XP）的12个核心实践


    - **计划游戏（The planning game）**：通过结合业务优先级和技术估算来制定下一个发布版本的范围。客户和开发团队需要决定下一个版本中将包含哪些故事（即功能）、每个故事的优先级以及发布截止时间。开发人员负责将故事分解为一组任务，并估算每个任务的持续时间。这些持续时间的总和告诉团队，他们真正认为在发布交付日期前能完成多少工作。如果数字对不上，必要时会将故事移出发布版本。请注意，估算是开发人员的责任，而不是客户或经理的责任。在XP中，*只有*开发人员进行估算。


    - **小型发布（Small releases）**：快速将一个简单系统投入生产，然后以非常短的周期发布新版本。每个版本从业务角度来看都必须有意义，因此版本规模会有所不同。最好将发布计划定为一两个月，而不是六个月或十二个月。发布周期越长，估算就越困难。


    - **隐喻（Metaphor）**：“一个关于整个系统如何工作的简单共享故事。”隐喻取代了你的架构。它需要对系统进行连贯的解释，并且能够分解成更小的部分——故事。故事应始终使用隐喻的词汇来表达，并且隐喻的语言应成为客户和开发人员的共同语言。


    - **简单设计（Simple design）**：每天尽可能保持设计简单。经常重新设计以保持其简洁。根据Beck的说法，一个简单的设计应满足：（1）通过所有单元测试，（2）没有重复代码，（3）在代码中表达每个故事的含义，（4）使用最少数量的类和方法的合理组合来实现当前的故事。[^(13)](#Chapter02.html#CHP-2-FN-13)


    - **测试（Testing）**：程序员持续编写单元测试。在集成之前，所有测试必须通过。Beck坚持严格的原则：“任何没有自动化测试的程序功能根本就不存在。”[^(14)](#Chapter02.html#CHP-2-FN-14)
    虽然这对大多数验收测试有效，并且当然应该对所有单元测试有效，但这种类比在某些情况下会失效，尤其是在测试GUI的用户界面时。不过，如果你的测试框架能够处理GUI交互生成的事件，即使是这种情况也可以自动完成。除此之外，拥有一套良好的书面说明通常也能满足需求。


    - **重构（Refactoring）**：在不改变系统行为的前提下重构系统，使其更简单——消除冗余、删除不必要的代码层或增加灵活性。重构的关键在于识别可以简化的代码区域，并在你处理这些代码时立即进行。重构与集体所有权和简单设计密切相关。集体所有权赋予你修改代码的权限，而简单设计则要求你在发现需要修改时承担起修改的责任。


    - **结对编程（Pair programming）**：在XP项目中，所有生产代码必须由两名程序员在一台机器上编写。任何单独编写的代码都将被丢弃。结对编程是一个动态过程。你可以像更换任务一样频繁地更换搭档。这通过将整个系统的知识传播给整个团队，从而强化了集体所有权。它避免了“啤酒车问题”——即那个什么都知道的人被啤酒车撞了，从而导致项目进度倒退数月。


    - **集体所有权（Collective ownership）**：团队拥有所有东西，这意味着任何人都可以随时更改任何内容。在某些地方，这被称为“无我编程”。程序员需要接受这样一个理念：任何人都可以修改他们的代码，并且集体所有权从代码延伸到整个项目；这是一个团队项目，而不是个人项目。


    - **持续集成（Continuous integration）**：每当一个任务完成时就进行集成和构建，可能一天多次（只要所有测试都通过）。这有助于隔离代码库中的问题；如果你只集成了一个任务的变更，那么最有可能找到问题的地方就在那里。


    - **每周40小时工作制（40-hour week）**：保持常规的每周40小时工作制。永远不要连续两周加班。XP的理念与Tom DeMarco的《人件》中的许多论点有很多共同之处。如果人们每周工作60或70小时，他们的生产力会比每周工作40小时更低。当你过度加班时，会发生几件事：因为你没有时间做家务和与“生活”相关的事情，你会在工作日做这些事；持续处于截止日期压力下且从未得到持续休息，意味着你会疲劳，然后犯更多错误，这些错误又需要别人来修复。而掌控项目并每周工作40小时（上下浮动一点），会让你有时间享受生活、放松和充电，并在工作日内专注于工作，从而使你更高效，而不是更低效。


    - **现场客户（On-site customer）**：客户是团队的一部分，在现场工作，编写并执行功能测试，并帮助澄清需求。客户能够对系统的变更提供即时反馈，这也增强了团队的信心，让他们相信每天都在构建正确的系统。


    - **编码标准（Coding standards）**：团队拥有编码标准、遵循编码标准，并利用它们来改善沟通。由于代码集体所有权，团队必须拥有编码标准，并且每个人都必须遵守。如果没有一套合理的编码指南，重构将花费更长的时间，并且会降低开发人员修改代码的意愿。请注意，我说的是“合理的”。你的编码标准应该使代码更易于阅读和维护：它们不应限制创造力。


    ______________


    ^(12)Beck, K. (2000)


    ^(13)Beck, K. (2000)


    ^(14)Beck, K. (2000)'
  raw: '*   *The planning game*: Develop the scope of the next release by combining
    business priorities and technical estimates. The customer and the development
    team need to decide on the stories (read features) that will be included in the
    next release, the priority of each story, and when the release needs to be done.
    The developers are responsible for breaking the stories up into a set of tasks
    and for estimating the duration of each task. The sum of the durations tells the
    team what they really think they can get done before the release delivery date.
    If necessary, stories are moved out of a release if the numbers don''t add up.
    Notice that estimation is the responsibility of the developers and not the customer
    or the manager. In XP *only* the developers do estimation.

    *   *Small releases*: Put a simple system into production quickly, and then release
    new versions on a very short cycle. Each release has to make sense from a business
    perspective, so release size will vary. It is far better to plan releases in durations
    of a month or two rather than six or twelve. The longer a release is, the harder
    it is to estimate.

    *   *Metaphor*:“A simple shared story of how the whole system works.” The metaphor
    replaces your architecture. It needs to be a coherent explanation of the system
    that is decomposable into smaller bits – stories. Stories should always be expressed
    in the vocabulary of the metaphor and the language of the metaphor should be common
    to both the customer and the developers.

    *   *Simple design*: Keep the design as simple as you can each day. Re-design
    often to keep it simple. According to Beck, a simple design (1) runs all the unit
    tests, (2) has no duplicated code, (3) expresses what each story means in the
    code, and (4) has the fewest number of classes and methods that make sense to
    implement the stories so far.[^(13)](#Chapter02.html#CHP-2-FN-13)

    *   *Testing*: Programmers constantly write unit tests. Tests must all pass before
    integration. Beck takes the hard line that “Any program feature without an automated
    test simply doesn''t exist.”[^(14)](#Chapter02.html#CHP-2-FN-14) Although this
    works for most acceptance tests and should certainly work for all unit tests,
    this analogy breaks down in some instances, notably in testing the user interface
    in a GUI. Even this can be made to work automatically if your test framework can
    handle the events generated by a GUI interaction. Beyond this, having a good set
    of written instructions will normally fill the bill.

    *   *Refactoring*: Restructure the system “without changing its behavior” to make
    it simpler – remove redundancy, eliminate unnecessary layers of code, or to add
    flexibility. The key to refactoring is to identify areas of code that can be made
    simpler and to do it while you''re there. Refactoring is closely related to collective
    ownership and simple design. Collective ownership gives you permission to change
    the code and simple design imposes on you the responsibility to make the change
    when you see it needs to be made.

    *   *Pair programming*: All production code written in an XP project must be written
    by two programmers at one machine. Any code written alone is thrown away. Pair
    programming is a dynamic process. You may change partners as often as you change
    tasks to implement. This has the effect of reinforcing collective ownership by
    spreading the knowledge of the entire system around the entire team. It avoids
    the “beer truck problem,” where the person who knows everything gets hit by a
    beer truck and thus sets the project schedule back months.

    *   *Collective ownership*: The team owns everything, implying that anyone can
    change anything at any time. In some places this is known as “ego-less programming.”
    Programmers need to buy into the idea that anyone can change their code and that
    collective ownership extends from code to the entire project; it''s a team project,
    not an individual one.

    *   *Continuous integration*: Integrate and build every time a task is finished,
    possibly several times a day (as long as the tests all pass). This helps to isolate
    problems in the code base; if you''re integrating a single task change, then the
    most likely place to look for a problem is right there.

    *   *40-hour week*: Work a regular 40-hour week. Never work a second week in a
    row with overtime. The XP philosophy has a lot in common with many of Tom DeMarco''s
    *Peopleware* arguments. People are less productive if they''re working 60 or 70
    hours a week than if they are working 40 hours. When you''re working excessive
    amounts of overtime, several things happen. Because you don''t have time to do
    chores and things related to your “life,” you do them during the workday. Constantly
    being under deadline pressure and never getting a sustained break also means you
    get tired and then make more mistakes, which somebody then needs to fix. But being
    in control of the project and working 40-hours a week (give or take a few) leaves
    you with time for a life, time to relax and recharge, and time to focus on your
    work during the work-day, making you more productive, not less.

    *   *On-site customer*: A customer is part of the team, is on-site, writes and
    executes functional tests, and helps clarify requirements. The customer''s ability
    to give immediate feedback to changes in the system also increases team confidence
    that they are building the right system every day.

    *   *Coding standards*: The team has ‘em, follows ‘em, and uses ''em to improve
    communication. Because of collective code ownership the team must have coding
    standards and everyone must adhere to them. Without a sensible set of coding guidelines,
    it would take much, much longer to do refactoring and it would decrease the desire
    of developers to change code. Notice that I said sensible. Your coding standards
    should make your code easier to read and maintain: they shouldn''t constrict creativity.


    ______________


    ^(12)Beck, K. (2000)


    ^(13)Beck, K. (2000)


