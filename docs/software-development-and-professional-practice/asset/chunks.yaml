    \ or closed, they always open and close in the same way. So this is a classic\
    \ opportunity to abstract out the open and close door behavior and put them in\
    \ a single place, say the `FeedingDoor` class. DRY at work!"
  trans: "\n### 开闭原则（OCP）\n\n类应对扩展开放，对修改封闭。^(1)\n\n找出不变的行为，将其抽象到父类/基类中。这样就将基类代码锁定，避免修改，但所有子类都会继承该行为。你将变化的行为封装在子类（即那些扩展基类的类）中，并对基类封闭修改。关键在于，在你精心设计的代码中，添加新功能不是通过修改现有代码（它对修改是封闭的），而是通过添加新代码（它对扩展是开放的）。\n\
    \n我们在前一章中讲解的 *`BankAccount`* 类示例，就是开闭原则的经典应用。在该示例中，我们将所有个人信息抽象到抽象的 *`BankAccount`*\
    \ 类中，对其封闭修改，然后将该类扩展为不同类型的银行账户。在这种情况下，只需再次扩展 *`BankAccount`* 类，就能非常轻松地添加新类型的银行账户。我们避免了代码重复，并维护了\
    \ *`BankAccount`* 属性的完整性。请参见图 10-6。\n\n___________________\n\n¹ Larman, C. “Protected\
    \ Variation: The Importance of Being Closed.” *IEEE Software* 18(3): 89-91\\.\
    \ 2001.\n\n![images](img/1006.jpg)\n\n***图 10-6.** 开闭原则的经典 BankAccount 示例*\n\n\
    例如，在 *`BankAccount`* 类中，我们定义了 *`withdraw()`* 方法，允许客户从账户中取款。但在不同的扩展账户类中，取款的具体方式可能有所不同。虽然\
    \ *`BankAccount`* 类中的 *`withdraw()`* 方法对修改是封闭的，但它可以在子类中被重写，以实现该类型账户的特定规则，从而扩展该方法的能力。它对修改封闭，但对扩展开放。\n\
    \n开闭原则也不必局限于继承。如果你在一个类中有几个私有方法，这些方法对修改是封闭的；但如果你随后创建了一个或多个使用这些私有方法的公有方法，你就通过在这些公有方法中添加功能，为扩展这些私有方法创造了可能性。要跳出框框——呃，跳出类来思考。\n\
    \n### 不要重复自己原则（DRY）\n\n通过抽象出公共部分并将其放在单一位置，来避免重复代码。^(2)\n\nDRY 是设计原则中的“母亲与苹果派”。自从开发者开始思考编写程序的更好方法以来，它就一直被传承下来。如果你不信，可以回头看看第\
    \ 6 章和第 7 章。遵循 DRY 原则，你应将每条信息和每个行为都放在设计中的单一位置。理想情况下，一个需求只放在一个地方。这意味着你应该这样设计：每个需求都有一个逻辑上的实现位置。这样，如果你需要更改需求，只需在一个地方查找并修改。同时，你还要移除重复代码，并用方法调用来替代。如果你在重复代码，就是在重复行为。\n\
    \n___________________\n\n² Hunt, A. and D. Thomas. *The Pragmatic Programmer:\
    \ From Journeyman to Master*. (Boston, MA: Addison-Wesley, 2000.)\n\nDRY 也不仅仅适用于你的代码。梳理你的功能列表和需求以查找重复项，始终是个好主意。重写需求以避免在代码中重复功能，将使你的代码更易于维护。\n\
    \n考虑我们在上一章讨论的 B⁴++ 鸟类喂食器的最终版本。我们最后做的是为喂食器添加一个鸣禽识别器，以便喂食门能够自动开合。但让我们看看我们最终得到的两个用例（参见表\
    \ 10-1）。\n\n***表 10-1.** 鸣禽识别器用例及其备选路径*\n\n| **主路径** | **备选路径** |\n| --- | ---\
    \ |\n| 1. 爱丽丝看到或听到鸟在喂食器旁。 | 1.1 鸣禽识别器听到鸟鸣声。 |\n| 2. 爱丽丝确定它们*不是*鸣禽。 | 2.1 鸣禽识别器识别出该鸣声来自不受欢迎的鸟。\
    \ |\n| 3. 爱丽丝按下遥控器按钮。 | 3.1 鸣禽识别器向喂食门发送关闭消息。 |\n| 4. 喂食门关闭。 |   |\n| 5. 鸟儿放弃并飞走。\
    \ | 5.1 鸣禽识别器听到鸟鸣声。 \n5.2 鸣禽识别器识别出该鸣声来自鸣禽。 |\n| 6. 爱丽丝按下遥控器按钮。 | 6.1 鸣禽识别器向喂食门发送打开消息。\
    \ |\n| 7. 喂食门再次打开。 |  |\n\n注意，我们通过遥控器和鸣禽识别器在两个不同的地方打开和关闭喂食门。但仔细想想，无论我们在哪里请求开门或关门，它们的打开和关闭方式总是相同的。因此，这是一个经典的抽象机会：将开门和关门的行为提取出来，放到一个单一的位置，比如\
    \ `FeedingDoor` 类。这就是 DRY 原则的体现！\n"
- fmt: "### The Single Responsibility Principle (SRP)\n\nThis principle says that\
    \ a class should have one, and only one, reason to change.^([3](#Chapter10.html#CH-10-FN-3))\n\
    \nHere’s an example of the overlap between these design principles that was mentioned\
    \ above: SRP, the first principle about encapsulation, and DRY all say similar,\
    \ but slightly different things. Encapsulation is about abstracting behavior and\
    \ putting things in your design that are likely to change in the same place. DRY\
    \ is about avoiding duplicating code by putting identical behaviors in the same\
    \ place. SRP is about designing your classes so that each does just one thing,\
    \ and does it very well.\n\nEvery object should have a single responsibility and\
    \ all the object’s services are targeted towards carrying out that responsibility.\
    \ *Each class should have only one reason to change*. Put simply, this means to\
    \ beware of having your class try to do too many things.\n\nAs an example, let's\
    \ say we’re writing the embedded code for a mobile phone. After months (really)\
    \ of discussions with the marketing folks, our first cut at a `MobilePhone` class\
    \ looks like [Figure 10-7](#Chapter10.html#fig_10_7).\n\n![images](images/1007.jpg)\n\
    \n***Figure 10-7.** A very busy MobilePhone class*\n\nThis class seems to incorporate\
    \ a lot of what we would want a mobile phone to do, but it violates the SRP in\
    \ several different ways. This class is not trying to do a single thing, it is\
    \ trying to do way too many things – make and receive phone calls (who does that,\
    \ anyway?), create, send, and receive text messages, create, send and receive\
    \ pictures, browse the Internet. The class doesn’t have a *single responsibility*.\
    \ It has many. But we don’t want a single class to be impacted by these completely\
    \ different forces. We don’t want to modify the `MobilePhone` class every time\
    \ the picture format is changed, or every time the browser changes. Rather, we\
    \ want to separate these functions out into different classes so that they can\
    \ change independently of each other. So how do we recognize the things that should\
    \ move out of this class, and how do we recognize the things that should stay?\
    \ Have a look at [Figure 10-8](#Chapter10.html#fig_10_8).\n\n___________________\n\
    \n³ McLaughlin, Brett D., et. al., Head First Object-Oriented Analysis & Design.\
    \ (Sebastopol, CA: O’Reilly Media, Inc., 2007.)\n\n![images](images/1008.jpg)\n\
    \n***Figure 10-8.** Mobile phone classes each with a single responsibility*\n\n\
    In this example, we ask the question, “What does the mobile phone do (to itself)?”\
    \ as opposed to, “What services are offered by the mobile phone?” By asking questions\
    \ like this, we can start to separate out the responsibilities of the objects\
    \ in the design. In this case, we can see that the phone itself can get its own\
    \ phone number, initialize itself, and connect itself to the mobile phone network.\
    \ The services offered, on the other hand, are really independent of the actual\
    \ mobile phone, and so can be separated out into `PhoneCall`, `TextMsg`, and `Picture`\
    \ classes. So we divide up the initial one class into four separate classes, each\
    \ with a single responsibility. This way we can change any of the four classes\
    \ without affecting the others. We’ve simplified the design (although we’ve got\
    \ more classes), and made it easier to extend and modify. Is that a great principle,\
    \ or what?\n\n### Liskov Substitution Principle (LSP)\n\nSubclasses must be substitutable\
    \ for their base class.^([4](#Chapter10.html#CH-10-FN-4)) This principle says\
    \ that inheritance should be well designed and well behaved. In any case a user\
    \ should be able to instantiate an object as a subclass and use all the base class\
    \ functionality invisibly.\n\nIn order to illustrate the LSP, most books give\
    \ an example that violates the Substitution Principle and say, “don’t do that.”\
    \ Why should we be any different? One of the best and canonical examples of violating\
    \ the Liskov Substitution Principle is the Rectangle/Square example. The example\
    \ itself is all over the Internet; Robert Martin gives a great variation on this\
    \ example in his book *Agile Software Development, Principles, Patterns, and Practices*,^([5](#Chapter10.html#CH-10-FN-5))\
    \ and we’ll follow his version of the example. Here it is in Java.\n\n___________________\n\
    \n⁴ Wintour, Damien. “The Liskov Substitution Principle.” 1988\\. Downloaded on\
    \ September 14, 2010 from [`www.necessaryandsufficient.net/2008/09/design-guidelines-part3-the-liskov-substitutionprinciple/`](http://www.necessaryandsufficient.net/2008/09/design-guidelines-part3-the-liskov-substitutionprinciple/).\n\
    \nSay you have a class `Rectangle` that represents the geometric shape of a rectangle:\n\
    \n```\n/**\n * class Rectangle.\n */\npublic class Rectangle\n{\n    private double\
    \ width;\n    private double height;\n\n    /**\n     * Constructor for objects\
    \ of class Rectangle\n     */\n    public Rectangle(double width, double height){\n\
    \        this.width = width;\n        this.height = height;\n    }\n\n    public\
    \ void setWidth(double width){\n        this.width = width;\n    }\n\n    public\
    \ void setHeight(double height) {\n        this.height = height;\n    }\n\n  \
    \  public double getHeight() {\n        return this.height;\n    }\n\n    public\
    \ double getWidth() {\n        return this.width;\n    }\n}\n```\n\nAnd, of course,\
    \ one of your users wants to have the ability to manipulate squares as well as\
    \ rectangles. You, being the bright math student you are, already know that squares\
    \ are just a special case of rectangles; in other words a `Square` IS-A `Rectangle`.\
    \ Being a great object-oriented designer as well, you know all about inheritance.\
    \ So you create a `Square` class that inherits from `Rectangle`.\n\n```\n/**\n\
    \ * class Square\n */\npublic class Square extends Rectangle\n{\n    /**\n   \
    \  * Constructor for objects of class Square\n     */\n    public Square(double\
    \ side) {\n        super(side, side);\n    }\n\n    public void setSide(double\
    \ side) {\n        super.setWidth(side);\n        super.setHeight(side);\n   \
    \ }\n\n    public double getSide() {\n        return super.getWidth();\n    }\n\
    }\n```\n\n___________________\n\n⁵ Martin, R. C. *Agile Software Development:\
    \ Principles, Patterns, and Practices*. (Upper Saddle River, NJ: Prentice Hall,\
    \ 2003.)\n\nWell, this seems to be okay. Notice that because the width and height\
    \ of a `Square` are the same, we couldn’t run the risk of changing them individually,\
    \ so `setSide()` uses `setWidth()` and `setHeight()` to set both for the sides\
    \ of a `Square`. No big deal, right?\n\nWell, if we have a function like:\n\n\
    ```\nvoid myFunc(Rectangle r, double newWidth) {\n        r.setWidth(newWidth);\n\
    }\n```\n\nand we pass `myFunc()` a `Rectangle` object, it works just fine, changing\
    \ the width of the `Rectangle`. But what if we pass `myFunc()` a `Square` object?\
    \ Well, it turns out that in Java the same thing happens as before, but that’s\
    \ *wrong*. It violates the integrity of the `Square` object by just changing its\
    \ width without changing its height as well. So we’ve violated the LSP here and\
    \ the `Square` can not substitute for a `Rectangle` without changing the behavior\
    \ of the `Square`. The LSP says that the subclass (`Square`) should be able to\
    \ substitute for the superclass (`Rectangle`), but it doesn’t in this case.\n\n\
    Now we can get around this. We can override the `Rectangle` class’ `setWidth()`\
    \ and `setHeight()` methods in `Square` like this:"
  raw: '### The Single Responsibility Principle (SRP)


    This principle says that a class should have one, and only one, reason to change.^([3](#Chapter10.html#CH-10-FN-3))


    Here’s an example of the overlap between these design principles that was mentioned
    above: SRP, the first principle about encapsulation, and DRY all say similar,
    but slightly different things. Encapsulation is about abstracting behavior and
    putting things in your design that are likely to change in the same place. DRY
    is about avoiding duplicating code by putting identical behaviors in the same
    place. SRP is about designing your classes so that each does just one thing, and
    does it very well.


    Every object should have a single responsibility and all the object’s services
    are targeted towards carrying out that responsibility. *Each class should have
    only one reason to change*. Put simply, this means to beware of having your class
    try to do too many things.


    As an example, let''s say we’re writing the embedded code for a mobile phone.
    After months (really) of discussions with the marketing folks, our first cut at
    a `MobilePhone` class looks like [Figure 10-7](#Chapter10.html#fig_10_7).


    ![images](images/1007.jpg)


    ***Figure 10-7.** A very busy MobilePhone class*


    This class seems to incorporate a lot of what we would want a mobile phone to
    do, but it violates the SRP in several different ways. This class is not trying
    to do a single thing, it is trying to do way too many things – make and receive
    phone calls (who does that, anyway?), create, send, and receive text messages,
    create, send and receive pictures, browse the Internet. The class doesn’t have
    a *single responsibility*. It has many. But we don’t want a single class to be
    impacted by these completely different forces. We don’t want to modify the *`MobilePhone`*
    class every time the picture format is changed, or every time the browser changes.
    Rather, we want to separate these functions out into different classes so that
    they can change independently of each other. So how do we recognize the things
    that should move out of this class, and how do we recognize the things that should
    stay? Have a look at [Figure 10-8](#Chapter10.html#fig_10_8).


    ___________________


    ³ McLaughlin, Brett D., et. al., Head First Object-Oriented Analysis & Design.
    (Sebastopol, CA: O’Reilly Media, Inc., 2007.)


    ![images](images/1008.jpg)


    ***Figure 10-8.** Mobile phone classes each with a single responsibility*


    In this example, we ask the question, “What does the mobile phone do (to itself)?”
    as opposed to, “What services are offered by the mobile phone?” By asking questions
    like this, we can start to separate out the responsibilities of the objects in
    the design. In this case, we can see that the phone itself can get its own phone
    number, initialize itself, and connect itself to the mobile phone network. The
    services offered, on the other hand, are really independent of the actual mobile
    phone, and so can be separated out into `PhoneCall`, `TextMsg`, and `Picture`
    classes. So we divide up the initial one class into four separate classes, each
    with a single responsibility. This way we can change any of the four classes without
    affecting the others. We’ve simplified the design (although we’ve got more classes),
    and made it easier to extend and modify. Is that a great principle, or what?


    ### Liskov Substitution Principle (LSP)


    Subclasses must be substitutable for their base class..^([4](#Chapter10.html#CH-10-FN-4))
    This principle says that inheritance should be well designed and well behaved.
    In any case a user should be able to instantiate an object as a subclass and use
    all the base class functionality invisibly.


    In order to illustrate the LSP, most books give an example that violates the Substitution
    Principle and say, “don’t do that.” Why should we be any different? One of the
    best and canonical examples of violating the Liskov Substitution Principle is
    the Rectangle/Square example. The example itself is all over the Internet; Robert
    Martin gives a great variation on this example in his book *Agile Software Development,
    Principles, Patterns, and Practices*,^([5](#Chapter10.html#CH-10-FN-5)) and we’ll
    follow his version of the example. Here it is in Java.


    ___________________


    ⁴ Wintour, Damien. “The Liskov Substitution Principle.” 1988\. Downloaded on September
    14, 2010 from [`www.necessaryandsufficient.net/2008/09/design-guidelines-part3-the-liskov-substitutionprinciple/`](http://www.necessaryandsufficient.net/2008/09/design-guidelines-part3-the-liskov-substitutionprinciple/).


    Say you have a class `Rectangle` that represents the geometric shape of a rectangle:


    `/**`

    ` * class Rectangle.`

    ` */`

    `public class Rectangle`

    `{`

    `    private double width;`

    `    private double height;`


    `    /**`

    `     * Constructor for objects of class Rectangle`

    `     */`

    `    public Rectangle(double width, double height){`

    `        this.width = width;`

    `        this.height = height;`

    `    }`


    `    public void setWidth(double width){`

    `        this.width = width;`

    `    }`


    `    public void setHeight(double height) {`

    `        this.height = height;`

    `    }`


    `    public double getHeight() {`

    `        return this.height;`

    `    }`


    `    public double getWidth() {`

    `        return this.width;`

    `    }`

    `}`


    And, of course, one of your users wants to have the ability to manipulate squares
    as well as rectangles. You, being the bright math student you are, already know
    that squares are just a special case of rectangles; in other words a `Square`
    IS-A `Rectangle`. Being a great object-oriented designer as well, you know all
    about inheritance. So you create a `Square` class that inherits from `Rectangle`.


    `/**`

    ` * class Square`

    ` */`

    `public class Square extends Rectangle`

    `{`

    `    /**`

    `     * Constructor for objects of class Square`

    `     */`

    `    public Square(double side) {`

    `        super(side, side);`

    `    }`


    `    public void setSide(double side) {`

    `        super.setWidth(side);`

    `        super.setHeight(side);`

    `    }`


    `    public double getSide() {`

    `        return super.getWidth();`

    `    }`

    `}`


    ___________________


    ⁵ Martin, R. C. *Agile Software Development: Principles, Patterns, and Practices*.
    (Upper Saddle River, NJ: Prentice Hall, 2003.)


    Well, this seems to be okay. Notice that because the width and height of a `Square`
    are the same, we couldn’t run the risk of changing them individually, so `setSide()`
    uses `setWidth()` and `setHeight()` to set both for the sides of a `Square`. No
    big deal, right?


    Well, if we have a function like:


    `void myFunc(Rectangle r, double newWidth) {`

    `        r.setWidth(newWidth);`

    `}`


    and we pass `myFunc()` a `Rectangle` object, it works just fine, changing the
    width of the `Rectangle`. But what if we pass `myFunc()` a `Square` object? Well,
    it turns out that in Java the same thing happens as before, but that’s *wrong*.
    It violates the integrity of the `Square` object by just changing its width without
    changing its height as well. So we’ve violated the LSP here and the `Square` can
    not substitute for a `Rectangle` without changing the behavior of the `Square`.
    The LSP says that the subclass (`Square`) should be able to substitute for the
    superclass (`Rectangle`), but it doesn’t in this case.


    Now we can get around this. We can override the `Rectangle` class’ `setWidth()`
    and `setHeight()` methods in `Square` like this:'
  trans: '

    ### 单一职责原则（SRP）


    该原则指出，一个类应该只有一个，且仅有一个，需要变更的理由。^(3)


    以下是上文提到的这些设计原则之间重叠的一个示例：SRP、关于封装的第一条原则以及 DRY 原则，它们表述的内容相似，但侧重点略有不同。封装是关于抽象行为，并将设计中可能发生变化的元素放在同一位置。DRY
    是关于通过将相同的行为放在同一位置来避免重复代码。SRP 则是关于设计你的类，使得每个类只做一件事，并且把它做得非常好。


    每个对象都应该有一个单一的职责，并且该对象的所有服务都旨在履行这一职责。*每个类应该只有一个需要变更的理由*。简单来说，这意味着要警惕你的类试图承担过多功能。


    举个例子，假设我们正在为一款手机编写嵌入式代码。经过与市场部门长达数月（真的）的讨论后，我们对`MobilePhone`类的初版设计如图 10-7 所示。


    ![images](img/1007.jpg)


    ***图 10-7.** 一个非常繁忙的 MobilePhone 类*


    这个类似乎囊括了我们期望手机能做的很多事情，但它以多种方式违反了 SRP 原则。这个类并非试图只做一件事，而是试图做太多事情——拨打和接听电话（话说，现在谁还干这个？）、创建、发送和接收短信、创建、发送和接收图片、浏览互联网。这个类没有*单一的职责*。它有很多职责。但我们不希望一个单一的类受到这些完全不同因素的影响。我们不希望每次图片格式改变或浏览器更新时，都要修改`MobilePhone`类。相反，我们希望将这些功能分离到不同的类中，以便它们可以彼此独立地进行变更。那么，我们如何识别哪些东西应该移出这个类，哪些东西应该保留呢？请看图
    10-8。


    ___________________


    ³ McLaughlin, Brett D., 等，《深入浅出面向对象分析与设计》。(Sebastopol, CA: O''Reilly Media, Inc.,
    2007.)


    ![images](img/1008.jpg)


    ***图 10-8.** 每个都具有单一职责的手机类*


    在这个例子中，我们问的问题是：“手机（对自己）做了什么？”而不是“手机提供了哪些服务？”通过提出这样的问题，我们可以开始分离设计中各个对象的职责。在这种情况下，我们可以看到手机本身可以获取自己的电话号码、初始化自身，并连接到移动电话网络。另一方面，所提供的服务实际上与手机本身无关，因此可以分离到`PhoneCall`、`TextMsg`和`Picture`类中。于是，我们将最初的一个类划分成四个独立的类，每个类都有单一的职责。这样，我们可以更改这四个类中的任何一个，而不会影响其他类。我们简化了设计（尽管类变多了），并使其更易于扩展和修改。这难道不是一个很棒的原则吗？


    ### 里氏替换原则（LSP）


    子类必须能够替换其基类。^(4) 该原则指出，继承应该设计良好且行为规范。在任何情况下，用户都应该能够将对象实例化为子类，并透明地使用基类的所有功能。


    为了说明 LSP，大多数书籍都会给出一个违反替换原则的例子，并说“不要那样做”。我们为什么要例外呢？违反里氏替换原则最经典、最典型的例子之一就是矩形/正方形示例。这个例子在互联网上随处可见；Robert
    Martin 在他的书《敏捷软件开发：原则、模式与实践》^(5)中给出了这个例子的一个精彩变体，我们将沿用他的版本。以下是 Java 代码。


