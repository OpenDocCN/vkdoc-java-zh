    Now that we''ve got a first cut at the program, we need to examine each of the
    steps in the program and see what they are made of. The steps we''re interested
    in are


    1.  Check to see if the current queen is safe.

    2.  Keep a safe queen on the board and advance to the next column.

    3.  Advance an unsafe queen up a row.

    4.  Retreat a column and reset the queen in that column.


    Checking to see if the current queen is safe means that we need to check that
    there are no other queens on either of the diagonals (the up or down diagonals)
    or the row that the current queen is on. The row check is easy, one just checks
    all the other squares in the same row. To check the up and down diagonals, remember
    that if the current queen is at column j, that we only need to check columns 1
    through j-1\. If you think about it for a minute, you''ll see that the difference
    between the row and column indexes of all the squares on the up diagonal (those
    that go from lower-left to upper-right) are a constant. Similarly, the sum of
    the row and column indexes of all the squares on the down diagonal (those that
    go from upper-left to lower-right) are also a constant. This makes it easier to
    figure out which cells are on the diagonal of a queen and how to check them.


    Now we''re ready to start considering data structures. Where did this come from,
    you ask? Well, stepwise refinement is mostly about describing the control flow
    of the program. But at some point you need to decide on exactly what the data
    will look like. For each problem you try to solve, this will happen at a different
    place in your refinement process. For this problem we''re at a place where in
    the next refinement we should be writing more detailed pseudo-code. That is pretty
    much forcing us to think about data structures now, so we can do the pseudo-code.


    In particular now we need to ask ourselves, how are we going to represent the
    board and the queens on the board? How are we going to represent the empty cells?
    We need a data structure that will allow us to efficiently represent queens and
    check whether they can be attacked. A first cut at this might be an 8 × 8 two-dimensional
    array where we place queens at the appropriate row and column intersections. Because
    we don''t need to do any computation on this matrix – all we need is to indicate
    the presence or absence of a queen – we can save space by making it a boolean
    array. This data structure also allows us to quickly check the rows, and the up
    and down diagonals for queens that can attack the current queen. So we should
    use a 2D boolean array, right?


    Well, not so fast. This isn''t the only way to think about the data representation
    for queens. In fact, if we think about the data structure and the operations we
    need to perform during the safety check we might be able to simplify things a
    bit.


    First of all, since we know that there can only be one queen in each column and
    one queen in each row, why not combine that information? Instead of a 2D array,
    why not just use a 1D boolean array, say


    `boolean column[8];`


    where `column[i] = true` means that the i^(th) column is still free. For the diagonals,
    we can use the property about the constant difference or sum of up and down diagonals
    to create two other arrays


    `boolean up[-7..+7], down[0..14];`


    that will indicate which diagonal squares are free. With this arrangement, the
    test for a queen being safe is


    `(column[i] and up[row-col] and down[row+col])`[^(`5`)](#Chapter07.html#CHP-7-FN-5)


