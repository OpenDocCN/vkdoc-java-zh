  raw: "### ACT FOUR, Scene 1: In Which We Philosophize on Abstraction\n\nLet's change\
    \ tack here and talk about a different example. Alice and Bob (remember them?)\
    \ have just moved to a new city and they need to transfer their old Second City\
    \ Bank and Trust bank accounts to First Galactic Bank. Alice and Bob are typically\
    \ middle class and have several bank accounts they need to transfer: a checking\
    \ account, a passbook savings account, and an investment account. (Luckily for\
    \ them, First Galactic also handles investments – shares in Venusian Mining are\
    \ particularly hot this year.)\n\nNobody actually opens a “bank account;” they\
    \ open different types of accounts that each have different characteristics. You\
    \ can write checks on a checking account, but you can't write checks on a passbook\
    \ savings account. You can earn interest on a savings account, but you normally\
    \ don't earn interest on a checking account; you pay a monthly service fee instead.\
    \ But, all different types of bank accounts have some things in common. All of\
    \ them use your personal information (name, social security number, address, city,\
    \ state, ZIP), all of them allow you to deposit money and withdraw money.\n\n\
    So when putting together a program that handles “bank accounts” you may realize\
    \ that there will be common attributes and behaviors among several classes. Let's\
    \ look at some classes for a bank account example, shall we?\n\nSince we know\
    \ that checking accounts, savings accounts, and investment accounts are all different,\
    \ let's first create three different classes and see what we've got (see [Figure\
    \ 9-3](#Chapter09.html#fig_9_3)).\n\n![images](images/0903.jpg)\n\n***Figure 9-3.**\
    \ Bank Accounts with a lot in common*\n\nNotice that all three classes have a\
    \ lot in common. One of the things we always try to do, no matter what design\
    \ or coding techniques we're using is to avoid duplication of design and code.\
    \ This is what abstraction is all about! If we abstract out all the common elements\
    \ of these three classes, we can create a new (super) class, `BankAccount`, that\
    \ incorporates all of them. The `CheckingAcct`, `SavingsAcct`, and `InvestmentAcct`\
    \ classes can then inherit from `BankAccount`.\n\nSo here's `BankAccount`, in\
    \ [Figure 9-4](#Chapter09.html#fig_9_4).\n\n![images](images/0904.jpg)\n\n***Figure\
    \ 9-4.** A cleaner BankAccount class*\n\nBut wait! Is the `BankAccount` class\
    \ one that we would want to instantiate? If you look, you'll see that each of\
    \ the other classes is much more specific than the `BankAccount` class is. So\
    \ there isn't enough information in the `BankAccount` class for us to use. This\
    \ means we'll always be inheriting from it, but never instantiating it. It's a\
    \ perfect *abstract class.* (Note the little bit of UML below – class diagrams\
    \ of abstract classes put the class name in *italics*.) See [Figure 9-5](#Chapter09.html#fig_9_5).\n\
    \n![images](images/0905.jpg)\n\n***Figure 9-5.** The BankAccount as an abstract\
    \ class*\n\nAbstract classes are templates for actual concrete classes. They encapsulate\
    \ shared behavior and define the protocol for all subclasses. The abstract class\
    \ defines behavior and sets a common state, and then concrete subclasses inherit\
    \ and implement that behavior. You can't instantiate an abstract class; a new\
    \ concrete class must be created that extends the abstract class. Whenever you\
    \ find common behavior in two or more places, you should look to abstract that\
    \ behavior into a class and then reuse that behavior in the common concrete classes.\n\
    \nHere's what we end up with after abstracting out all the personal data and common\
    \ behavior into the *`BankAccount`* abstract class. Notice one more little bit\
    \ of UML here – the new UML arrow types – open arrow ends. These open arrows indicate\
    \ *inheritance*; so the `CheckingAcct` class inherits all the attributes and methods\
    \ from the `BankAccount` abstract class. UML calls it *generalization* because\
    \ the super class generalizes the subclasses. That's why the arrows point up to\
    \ the super class. See [Figure 9-6](#Chapter09.html#fig_9_6).\n\n![images](images/0906.jpg)\n\
    \n***Figure 9-6.** The concrete account classes inherit from BankAccount*\n\n\
    Now let's move on to explain in detail a number of object-oriented design principles\
    \ that we've just hinted at so far.\n\n### Conclusion\n\nIn object-oriented analysis\
    \ and design it's best to keep in mind your objectives. In analysis you're refining\
    \ the feature list you've created and producing a model of what the customer wants.\
    \ You want to end up with a description of what the program is supposed to do,\
    \ its essential features. This creates  a conceptual model of the problem domain\
    \ and its solution. The model is made up of a number of things, including use\
    \ cases, user stories, preliminary class diagrams, user interface storyboards,\
    \ and possibly some class interface descriptions.\n\nIn design you're taking that\
    \ conceptual model and creating the classes that will end up being code. You want\
    \ to end up with a description of how the program will implement the conceptual\
    \ model and do what the customer wants. This is an object model of the solution.\
    \ This model is made up of groups of related class diagrams, their associations\
    \ and descriptions of how they interact with each other. This includes the programming\
    \ interface for each class. This design is an abstraction of the class details\
    \ and code you'll create later. From here you should be able to get to coding\
    \ pretty quickly.\n\n## C H A P T E R  10\n\n## Object-Oriented Design Principles\n\
    \n> *Devotion to the facts will always give the pleasures of recognition; adherence\
    \ to the rules of design, the pleasures of order and certainty.*\n> \n> —Kenneth\
    \ Clark\n> \n> *How can I qualify my faith in the inviolability of the design\
    \ principles? Their virtue is demonstrated. They work.*\n> \n> —Edgar Whitney\n\
    \nNow that we’ve spent some time looking at object-oriented analysis and design,\
    \ let's recapitulate some of what we’ve already seen and add some more pithy prose.\
    \ First, let's talk about some *common design characteristics*.\n\nFirst, designs\
    \ have a purpose. They describe how something will work in a context, using the\
    \ requirements (lists of features, user stories, and use cases) to define the\
    \ context. Second, designs must have enough information in them so that someone\
    \ can implement them. You need enough details in the design so that someone can\
    \ come after you and implement the program correctly. Next, there are different\
    \ styles of design, just like there are different types of house architectures.\
    \ The type of design you want depends on what it is you’re being required to build.\
    \ It depends on the context (see, we’re back to context); if you’re an architect,\
    \ you’ll design a different kind of house at the sea shore than you will in the\
    \ mountains. Finally, designs can be expressed at different levels of detail.\
    \ When building a house, the framing carpenter needs one level of detail, the\
    \ electrician and plumber another, and the finish carpenter yet another.\n\nThere\
    \ are a number of rules of thumb about object-oriented design that have evolved\
    \ over the last few decades. These *design principles* act as guidelines for you\
    \ the designer to abide by so that your design ends up being a good one, easy\
    \ to implement, easy to maintain, and one that does just what your customer wants.\
    \ We’ve looked at several of them already in previous chapters, and here I’ve\
    \ pulled out ten fundamental design principles of object-oriented design that\
    \ are likely to be the most useful to you as you become that designer extraordinaire.\
    \ I’ll list them here and then explain them and give examples in the rest of the\
    \ chapter."
  trans: "\n### 第四幕，第一场：关于抽象化的哲学思考\n\n让我们换个话题，讨论一个不同的例子。爱丽丝和鲍勃（还记得他们吗？）刚搬到一个新城市，需要将他们在第二城市银行与信托公司的银行账户转移到第一银河银行。爱丽丝和鲍勃是典型的中产阶级，有几个银行账户需要转移：一个支票账户、一个存折储蓄账户和一个投资账户。（幸运的是，第一银河银行也处理投资业务——金星矿业公司的股票今年特别火爆。）\n\
    \n实际上，没有人会开一个“银行账户”；他们开的是不同类型的账户，每种账户都有不同的特性。你可以在支票账户上开支票，但不能在存折储蓄账户上开支票。储蓄账户可以赚取利息，但支票账户通常不产生利息；相反，你需要支付月度服务费。然而，所有不同类型的银行账户都有一些共同点。它们都使用你的个人信息（姓名、社会安全号码、地址、城市、州、邮政编码），都允许你存钱和取钱。\n\
    \n因此，在编写处理“银行账户”的程序时，你可能会意识到多个类之间会有共同的属性和行为。让我们来看看银行账户示例中的一些类，好吗？\n\n既然我们知道支票账户、储蓄账户和投资账户各不相同，那么首先创建三个不同的类，看看会得到什么结果（见图\
    \ 9-3）。\n\n![images](img/0903.jpg)\n\n***图 9-3.** 具有许多共同点的银行账户*\n\n注意，这三个类有很多共同之处。无论我们使用何种设计或编码技术，我们始终努力做到的一件事就是避免设计和代码的重复。这正是抽象化的意义所在！如果我们抽象出这三个类的所有共同元素，就可以创建一个新的（父）类\
    \ `BankAccount`，它包含了所有这些元素。然后，`CheckingAcct`、`SavingsAcct` 和 `InvestmentAcct`\
    \ 类可以继承自 `BankAccount`。\n\n这就是 `BankAccount`，如图 9-4 所示。\n\n![images](img/0904.jpg)\n\
    \n***图 9-4.** 一个更简洁的 BankAccount 类*\n\n但等等！我们是否想要实例化 `BankAccount` 类？如果你仔细观察，会发现其他每个类都比\
    \ `BankAccount` 类具体得多。因此，`BankAccount` 类中没有足够的信息供我们使用。这意味着我们总是会继承它，但永远不会实例化它。它是一个完美的*抽象类*。（注意下面的\
    \ UML 小图——抽象类的类图将类名以*斜体*显示。）见图 9-5。\n\n![images](img/0905.jpg)\n\n***图 9-5.**\
    \ 作为抽象类的 BankAccount*\n\n抽象类是实际具体类的模板。它们封装了共享行为，并为所有子类定义了协议。抽象类定义了行为并设定了共同状态，然后具体的子类继承并实现这些行为。你不能实例化一个抽象类；必须创建一个扩展该抽象类的新具体类。每当你在两个或多个地方发现共同行为时，就应该考虑将这些行为抽象到一个类中，然后在共同的具体类中重用这些行为。\n\
    \n以下是将所有个人数据和共同行为抽象到 `BankAccount` 抽象类后得到的结果。注意这里还有一个 UML 细节——新的 UML 箭头类型——开口箭头。这些开口箭头表示*继承*；因此，`CheckingAcct`\
    \ 类继承了 `BankAccount` 抽象类的所有属性和方法。UML 称之为*泛化*，因为父类概括了子类。这就是为什么箭头指向父类。见图 9-6。\n\n\
    ![images](img/0906.jpg)\n\n***图 9-6.** 具体账户类继承自 BankAccount*\n\n现在，让我们继续详细解释我们刚刚暗示过的几个面向对象设计原则。\n\
    \n### 结论\n\n在面向对象分析与设计中，最好牢记你的目标。在分析阶段，你是在细化已创建的功能列表，并生成客户需求的模型。你最终要得到的是程序应该做什么的描述，以及它的核心特性。这会创建问题域及其解决方案的概念模型。该模型由许多内容组成，包括用例、用户故事、初步类图、用户界面故事板，以及可能的类接口描述。\n\
    \n在设计阶段，你是在利用那个概念模型，创建最终将变成代码的类。你最终要得到的是程序将如何实现概念模型并满足客户需求的描述。这是解决方案的对象模型。该模型由一组相关的类图、它们的关联关系以及它们之间如何交互的描述组成。这包括每个类的编程接口。这个设计是你稍后将创建的类细节和代码的抽象。从这里，你应该能够很快进入编码阶段。\n\
    \n## 第 10 章\n\n## 面向对象设计原则\n\n> *对事实的投入总会带来认知的愉悦；遵循设计规则，则会带来秩序与确定的愉悦。*\n> \n>\
    \ ——肯尼斯·克拉克\n> \n> *我该如何证明我对设计原则不可侵犯性的信念？它们的价值已经得到证明。它们行之有效。*\n> \n> ——埃德加·惠特尼\n\
    \n既然我们已经花了一些时间研究面向对象分析与设计，让我们回顾一下已经看到的内容，并补充一些精辟的论述。首先，我们来谈谈一些*常见的设计特性*。\n\n首先，设计是有目的的。它们描述了某物在特定情境下如何工作，并使用需求（功能列表、用户故事和用例）来定义该情境。其次，设计中必须包含足够的信息，以便他人能够实现它。你需要在设计中提供足够的细节，以便后来者能够正确地实现程序。接下来，存在不同的设计风格，就像有不同类型的房屋建筑风格一样。你需要的设计类型取决于你需要构建什么。它取决于情境（看，我们又回到了情境）；如果你是建筑师，你在海边设计的房子会与在山中设计的房子不同。最后，设计可以在不同的细节层次上表达。建造房屋时，框架木匠需要一个层次的细节，电工和水管工需要另一个层次，而精装修木匠又需要另一个层次。\n\
    \n关于面向对象设计，在过去几十年中演变出了许多经验法则。这些*设计原则*作为你（设计师）应遵守的指南，以确保你的设计最终是优秀的、易于实现、易于维护，并且恰好满足客户的需求。在前几章中，我们已经看到了其中的几个原则，在这里，我提炼出了面向对象设计的十个基本设计原则，当你成为那位卓越的设计师时，这些原则很可能对你最为有用。我将在此列出它们，然后在本章剩余部分进行解释并给出示例。\n"
- fmt: "### Our List of Fundamental Object-Oriented Design Principles\n\nHere are\
    \ the ten fundamental principles:\n\n1.  Encapsulate things in your design that\
    \ are likely to change.\n2.  ***Code to an interface*** rather than to an implementation.\n\
    3.  The ***Open-Closed Principle (OCP)***: Classes should be open for extension\
    \ and closed for modification.\n4.  The ***Don’t Repeat Yourself Principle (DRY)***:\
    \ Avoid duplicate code. Whenever you find common behavior in two or more places,\
    \ look to ***abstract that behavior*** into a class ***and then reuse*** that\
    \ behavior in the common concrete classes. Satisfy one requirement in one place\
    \ in your code.\n5.  The ***Single Responsibility Principle (SRP)***: Every object\
    \ in your system should have a single responsibility, and all the objects services\
    \ should be focused on carrying out that responsibility. Another way of saying\
    \ this is that a *cohesive* class does one thing well and doesn’t try to do anything\
    \ else. This implies that higher cohesion is better. It also means that each class\
    \ in your program should have ***only one reason to change***.\n6.  The ***Liskov\
    \ Substitution Principle (LSP)***: Subtypes must be substitutable for their base\
    \ types. (in other words, inheritance should be well designed and well behaved.)\n\
    7.  The ***Dependency Inversion Principle (DIP)***: Don’t depend on concrete classes;\
    \ depend on abstractions.\n8.  The ***Interface Segregation Principle (ISP)***:\
    \ Clients shouldn’t have to depend on interfaces they don’t use.\n9.  The ***Principle\
    \ of Least Knowledge*** ***(PLK)*** (also known as the ***Law of Demeter***):\
    \ Talk only to your immediate friends.\n10.  The ***Principle of Loose Coupling***:\
    \ Objects that interact should be loosely coupled with well-defined interfaces.\n\
    \nAs you probably notice, there’s some overlap here, and one or more of the design\
    \ principles may depend on others. That’s okay. It’s the fundamentals that count.\
    \ Let’s go through these one at a time.\n\n### Encapsulate Things in Your Design\
    \ That Are Likely to Change\n\nThis first principle means to protect your classes\
    \ from unnecessary change by separating the features and methods of a class that\
    \ remain relatively constant throughout the program from those that will change.\
    \ By separating the two types of features, we isolate the parts that will change\
    \ a lot into a separate class (or classes) that we can depend on changing, and\
    \ we increase our flexibility and ease of change. We also leave the stable parts\
    \ of our design alone, so that we just need to implement them once and test them\
    \ once. (Well, you hope.) This protects the stable parts of the design from any\
    \ unnecessary changes.\n\nLet's create a very simple class `Violinist`. [Figure\
    \ 10-1](#Chapter10.html#fig_10_1) is a class diagram for the `Violinist` class.\n\
    \n![images](images/1001.jpg)\n\n***Figure 10-1.** A Violinist*\n\nNotice that\
    \ the `setUpMusic()` and `tuneInstrument()` methods are pretty stable. But what\
    \ about the `play()` method? It turns out that there are several different types\
    \ of playing styles for violins – classical, bluegrass, and Celtic, just to name\
    \ three. So that means that the `play()` method will vary, depending on the playing\
    \ style. Because we have a behavior that will change depending on the playing\
    \ style, maybe we should abstract that behavior out and encapsulate it in another\
    \ class? If we do that, then we get something like [Figure 10-2](#Chapter10.html#fig_10_2).\n\
    \n![images](images/1002.jpg)\n\n***Figure 10-2.** Violinist and playing styles*\n\
    \nNotice that we’re using association between the `Violinist` class and the `ViolinStyle`\
    \ abstract class. This allows `Violinist` to use the concrete classes that inherit\
    \ the abstract method from the abstract `ViolinStyle` class. We’ve abstracted\
    \ out and encapsulated the `play()` method – which will vary – in a separate class\
    \ so that we can isolate any changes we want to make to the playing style from\
    \ the other stable behaviors in `Violinist`.\n\n### Code to an Interface Rather\
    \ Than to an Implementation\n\nThe normal response to this design principle is,\
    \ “Huh? What does that mean?” Well, here’s the idea. This principle – like many\
    \ of the principles in this chapter - has to do with inheritance and how you use\
    \ it in your program. Say you have a program that will model different types of\
    \ geometric shapes in two dimensions. We’ll have a class `Point` that will represent\
    \ a single point in 2D, and we’ll have an interface named `Shape` that will abstract\
    \ out a couple of things that all shapes have in common – areas and perimeters.\
    \ (okay, circles and ellipses call it circumference; bear with me.) So here’s\
    \ what we’ve got (see [Figure 10-3](#Chapter10.html#fig_10_3)).\n\n![images](images/1003.jpg)\n\
    \n***Figure 10-3.** A simple Point class and the common Shape Interface*\n\nIf\
    \ we want to create concrete classes of some different shapes, we’ll *implement*\
    \ the `Shape` interface. This means that the concrete classes must implement each\
    \ of the abstract methods in the `Shape` interface. See [Figure 10-4](#Chapter10.html#fig_10_4).\n\
    \n![images](images/1004.jpg)\n\n***Figure 10-4.** Rectangle, Circle, and Triangle\
    \ all implement Shape*\n\nSo now we’ve got a number of classes that represent\
    \ different geometric shapes. How do we use them? Say we’re writing an application\
    \ that will manipulate a geometric shape. We can do this in two different ways.\
    \ First, we can write a separate application for each geometric shape. See [Figure\
    \ 10-5](#Chapter10.html#fig_10_5).\n\n![images](images/1005.jpg)\n\n***Figure\
    \ 10-5.** Using the geometric objects.*\n\nWhat’s wrong with these apps? Well,\
    \ we’ve got three different applications doing the same thing. If we want to add\
    \ another shape, say a rhombus, we’d have to write two new classes, the `Rhombus`\
    \ class, which implements the `Shape` interface, and a new `RhombusApp` class.\
    \ Yuk! This is inefficient. We’ve coded to the implementation of the geometric\
    \ shape rather than coding to the interface itself.\n\nSo how do we fix this?\
    \ The thing to realize is that the interface is the top of a class hierarchy of\
    \ all the classes that implement the interface. As such it’s a class type and\
    \ we can use it to help us implement polymorphism in our program. In this case,\
    \ since we have some number of geometric shapes that implement the `Shape` interface\
    \ we can create an array of `Shape`s that we can fill up with different types\
    \ of shapes and then iterate through. In Java we’ll use the *`List`* collection\
    \ type to hold our shapes:\n\n```\nimport java.util.*;\n\n/**\n * ShapeTest -\
    \ test the Shape interface implementations.\n *\n * @author fred\n * @version\
    \ 1.0\n */\npublic class ShapeTest\n{\n    public static void main(String [] args)\n\
    \    {\n        List<Shape> figures = new ArrayList<Shape>();\n\n        figures.add(new\
    \ Rectangle(10, 20));\n        figures.add(new Circle(10));\n        Point p1\
    \ = new Point(0.0, 0.0);\n        Point p2 = new Point(5.0, 1.0);\n        Point\
    \ p3 = new Point(2.0, 8.0);\n        figures.add(new Triangle(p1, p2, p3));\n\n\
    \        Iterator<Shape> iter = figures.iterator();\n\n        while (iter.hasNext())\
    \ {\n            Shape nxt =  iter.next();\n            System.out.printf(\"area\
    \ = %8.4f perimeter = %8.4f\\n\",\n                nxt.computeArea(), nxt.computePerimeter());\n\
    \        }\n    }\n}\n```\n\nSo when you code to the interface, your program becomes\
    \ easier to extend and modify. Your program will work with all the interface’s\
    \ subclasses seamlessly.\n\nAs an aside, the principles above let you know that\
    \ you should be constantly reviewing your design. Changing your design will force\
    \ your code to change because of the need to *refactor*. Your design is iterative.\
    \ Pride kills good design; don’t be afraid to revisit your design decisions. (Hey!\
    \ Maybe that’s another design principle!)"
  raw: '### Our List of Fundamental Object-Oriented Design Principles


    Here are the ten fundamental principles:


    1.  Encapsulate things in your design that are likely to change.

    2.  ***Code to an interface*** rather than to an implementation.

    3.  The ***Open-Closed Principle (OCP)***: Classes should be open for extension
    and closed for modification.

    4.  The ***Don’t Repeat Yourself Principle (DRY)***: Avoid duplicate code. Whenever
    you find common behavior in two or more places, look to ***abstract that behavior***
    into a class ***and then reuse*** that behavior in the common concrete classes.
    Satisfy one requirement in one place in your code.

    5.  The ***Single Responsibility Principle (SRP)***: Every object in your system
    should have a single responsibility, and all the objects services should be focused
    on carrying out that responsibility. Another way of saying this is that a *cohesive*
    class does one thing well and doesn’t try to do anything else. This implies that
    higher cohesion is better. It also means that each class in your program should
    have ***only one reason to change***.

    6.  The ***Liskov Substitution Principle (LSP)***: Subtypes must be substitutable
    for their base types. (in other words, inheritance should be well designed and
    well behaved.)

    7.  The ***Dependency Inversion Principle (DIP)***: Don’t depend on concrete classes;
    depend on abstractions.

    8.  The ***Interface Segregation Principle (ISP)***: Clients shouldn’t have to
    depend on interfaces they don’t use.

    9.  The ***Principle of Least Knowledge*** ***(PLK)*** (also known as the ***Law
    of Demeter***): Talk only to your immediate friends.

    10.  The ***Principle of Loose Coupling***: Objects that interact should be loosely
    coupled with well-defined interfaces.


    As you probably notice, there’s some overlap here, and one or more of the design
    principles may depend on others. That’s okay. It’s the fundamentals that count.
    Let’s go through these one at a time.


    ### Encapsulate Things in Your Design That Are Likely to Change


    This first principle means to protect your classes from unnecessary change by
    separating the features and methods of a class that remain relatively constant
    throughout the program from those that will change. By separating the two types
    of features, we isolate the parts that will change a lot into a separate class
    (or classes) that we can depend on changing, and we increase our flexibility and
    ease of change. We also leave the stable parts of our design alone, so that we
    just need to implement them once and test them once. (Well, you hope.) This protects
    the stable parts of the design from any unnecessary changes.


    Let''s create a very simple class `Violinist`. [Figure 10-1](#Chapter10.html#fig_10_1)
    is a class diagram for the `Violinist` class.


    ![images](images/1001.jpg)


    ***Figure 10-1.** A Violinist*


    Notice that the `setUpMusic()` and `tuneInstrument()` methods are pretty stable.
    But what about the `play()` method? It turns out that there are several different
    types of playing styles for violins – classical, bluegrass, and Celtic, just to
    name three. So that means that the `play()` method will vary, depending on the
    playing style. Because we have a behavior that will change depending on the playing
    style, maybe we should abstract that behavior out and encapsulate it in another
    class? If we do that, then we get something like [Figure 10-2](#Chapter10.html#fig_10_2).


    ![images](images/1002.jpg)


    ***Figure 10-2.** Violinist and playing styles*


    Notice that we’re using association between the `Violinist` class and the `ViolinStyle`
    abstract class. This allows `Violinist` to use the concrete classes that inherit
    the abstract method from the abstract `ViolinStyle` class. We’ve abstracted out
    and encapsulated the `play()` method – which will vary – in a separate class so
    that we can isolate any changes we want to make to the playing style from the
    other stable behaviors in `Violinist`.


    ### Code to an Interface Rather Than to an Implementation


    The normal response to this design principle is, “Huh? What does that mean?” Well,
    here’s the idea. This principle – like many of the principles in this chapter
    - has to do with inheritance and how you use it in your program. Say you have
    a program that will model different types of geometric shapes in two dimensions.
    We’ll have a class `Point` that will represent a single point in 2D, and we’ll
    have an interface named `Shape` that will abstract out a couple of things that
    all shapes have in common – areas and perimeters. (okay, circles and ellipses
    call it circumference; bear with me.) So here’s what we’ve got (see [Figure 10-3](#Chapter10.html#fig_10_3)).


    ![images](images/1003.jpg)


    ***Figure 10-3.** A simple Point class and the common Shape Interface*


    If we want to create concrete classes of some different shapes, we’ll *implement*
    the `Shape` interface. This means that the concrete classes must implement each
    of the abstract methods in the `Shape` interface. See [Figure 10-4](#Chapter10.html#fig_10_4).


    ![images](images/1004.jpg)


    ***Figure 10-4.** Rectangle, Circle, and Triangle all implement Shape*


    So now we’ve got a number of classes that represent different geometric shapes.
    How do we use them? Say we’re writing an application that will manipulate a geometric
    shape. We can do this in two different ways. First, we can write a separate application
    for each geometric shape. See [Figure 10-5](#Chapter10.html#fig_10_5).


    ![images](images/1005.jpg)


    ***Figure 10-5.** Using the geometric objects.*


    What’s wrong with these apps? Well, we’ve got three different applications doing
    the same thing. If we want to add another shape, say a rhombus, we’d have to write
    two new classes, the `Rhombus` class, which implements the `Shape` interface,
    and a new `RhombusApp` class. Yuk! This is inefficient. We’ve coded to the implementation
    of the geometric shape rather than coding to the interface itself.


    So how do we fix this? The thing to realize is that the interface is the top of
    a class hierarchy of all the classes that implement the interface. As such it’s
    a class type and we can use it to help us implement polymorphism in our program.
    In this case, since we have some number of geometric shapes that implement the
    `Shape` interface we can create an array of `Shape`s that we can fill up with
    different types of shapes and then iterate through. In Java we’ll use the *`List`*
    collection type to hold our shapes:


    `import java.util.*;`


    `/**`

    ` * ShapeTest - test the Shape interface implementations.`

    ` *`

    ` * @author fred`

    ` * @version 1.0`

    ` */`

    `public class ShapeTest`

    `{`

    `    public static void main(String [] args)`

    `    {`

    `        List<Shape> figures = new ArrayList<Shape>();`


    `        figures.add(new Rectangle(10, 20));`

    `        figures.add(new Circle(10));`

    `        Point p1 = new Point(0.0, 0.0);`

    `        Point p2 = new Point(5.0, 1.0);`

    `        Point p3 = new Point(2.0, 8.0);`

    `        figures.add(new Triangle(p1, p2, p3));`


    `        Iterator<Shape> iter = figures.iterator();`


    `        while (iter.hasNext()) {`

    `            Shape nxt =  iter.next();`

    `            System.out.printf("area = %8.4f perimeter = %8.4f\n",`

    `                nxt.computeArea(), nxt.computePerimeter());`

    `        }`

    `    }`

    `}`


    So when you code to the interface, your program becomes easier to extend and modify.
    Your program will work with all the interface’s subclasses seamlessly.


    As an aside, the principles above let you know that you should be constantly reviewing
    your design. Changing your design will force your code to change because of the
    need to *refactor*. Your design is iterative. Pride kills good design; don’t be
    afraid to revisit your design decisions. (Hey! Maybe that’s another design principle!)'
  trans: '

    ### 面向对象基本设计原则清单


    以下是十条基本原则：


    1.  在设计中封装那些可能发生变化的部分。

    2.  ***针对接口编程***，而非针对实现编程。

    3.  ***开闭原则 (OCP)***：类应对扩展开放，对修改关闭。

    4.  ***不要重复自己原则 (DRY)***：避免重复代码。只要在两个或更多地方发现共同行为，就要考虑***将该行为抽象***到一个类中，***然后复用***该行为到通用的具体类中。在代码中只在一个地方满足一个需求。

    5.  ***单一职责原则 (SRP)***：系统中的每个对象都应只有一个职责，并且该对象的所有服务都应专注于履行这一职责。另一种说法是，一个*内聚*的类只做好一件事，并且不试图做其他任何事。这意味着内聚性越高越好。这也意味着程序中的每个类都应该有***且仅有一个变更理由***。

    6.  ***里氏替换原则 (LSP)***：子类型必须能够替换其基类型。（换句话说，继承应该设计良好且行为规范。）

    7.  ***依赖倒置原则 (DIP)***：不要依赖具体类；要依赖抽象。

    8.  ***接口隔离原则 (ISP)***：客户端不应依赖它们不使用的接口。

    9.  ***最少知识原则 (PLK)***（也称为***迪米特法则***）：只与你最直接的朋友交谈。

    10. ***松耦合原则***：相互交互的对象应通过定义良好的接口保持松散耦合。


    你可能已经注意到，这些原则之间存在一些重叠，并且一个或多个设计原则可能依赖于其他原则。这没关系。重要的是基本原则。让我们逐一进行讲解。


    ### 在设计中封装那些可能发生变化的部分


    这第一条原则意味着，通过将程序中相对稳定的类的特性和方法与那些会变化的特性和方法分离开来，从而保护你的类免受不必要的变更。通过分离这两类特性，我们将那些变化频繁的部分隔离到一个（或多个）独立的类中，这些类是我们预期会变化的，从而提高了灵活性和变更的便利性。同时，我们保持设计中稳定的部分不变，这样我们只需实现它们一次并测试一次。（嗯，希望如此。）这保护了设计中稳定的部分免受任何不必要的变更。


    让我们创建一个非常简单的类 `Violinist`。图 10-1 是 `Violinist` 类的类图。


    ![images](img/1001.jpg)


    ***图 10-1.** 一位小提琴家*


    注意，`setUpMusic()` 和 `tuneInstrument()` 方法相当稳定。但是 `play()` 方法呢？事实证明，小提琴有多种不同的演奏风格——仅举三例：古典、蓝草和凯尔特。这意味着
    `play()` 方法会根据演奏风格而变化。因为我们有一个会随演奏风格变化的行为，也许我们应该将该行为抽象出来并封装到另一个类中？如果我们这样做，就会得到类似
    图 10-2 的结果。


    ![images](img/1002.jpg)


    ***图 10-2.** 小提琴家与演奏风格*


    注意，我们在 `Violinist` 类和 `ViolinStyle` 抽象类之间使用了关联。这允许 `Violinist` 使用那些继承自抽象 `ViolinStyle`
    类抽象方法的具体类。我们已经将会变化的 `play()` 方法抽象并封装到一个单独的类中，这样我们就可以将任何想要对演奏风格进行的更改与 `Violinist`
    中的其他稳定行为隔离开来。


    ### 针对接口编程，而非针对实现编程


    对这个设计原则的常见反应是，“嗯？这是什么意思？”好吧，思路是这样的。这个原则——就像本章中的许多原则一样——与继承以及如何在程序中使用继承有关。假设你有一个程序，用于模拟二维空间中不同类型的几何形状。我们将有一个
    `Point` 类来表示二维空间中的一个点，并且我们将有一个名为 `Shape` 的接口，它将抽象出所有形状共有的几个方面——面积和周长。（好吧，圆形和椭圆称之为圆周；请忍耐一下。）所以，我们得到的是这样的（参见
    图 10-3）。


    ![images](img/1003.jpg)


    ***图 10-3.** 一个简单的 Point 类和通用的 Shape 接口*


    如果我们想创建一些不同形状的具体类，我们将*实现* `Shape` 接口。这意味着具体类必须实现 `Shape` 接口中的每一个抽象方法。参见 图 10-4。


    ![images](img/1004.jpg)


    ***图 10-4.** Rectangle、Circle 和 Triangle 都实现了 Shape*


    现在我们有了许多代表不同几何形状的类。我们如何使用它们呢？假设我们正在编写一个操作几何形状的应用程序。我们可以通过两种不同的方式来实现。首先，我们可以为每种几何形状编写一个单独的应用程序。参见
    图 10-5。


    ![images](img/1005.jpg)


    ***图 10-5.** 使用几何对象*


    这些应用程序有什么问题？嗯，我们有三个不同的应用程序在做同样的事情。如果我们想添加另一个形状，比如菱形，我们就必须编写两个新类：实现 `Shape` 接口的
    `Rhombus` 类，以及一个新的 `RhombusApp` 类。哎呀！这效率太低了。我们是针对几何形状的实现进行编程，而不是针对接口本身进行编程。


    那么如何解决这个问题呢？需要认识到的是，接口是所有实现该接口的类的类层次结构的顶层。因此，它是一种类类型，我们可以利用它来帮助我们在程序中实现多态。在这种情况下，由于我们有一些实现
    `Shape` 接口的几何形状，我们可以创建一个 `Shape` 数组，用不同类型的形状填充它，然后进行迭代。在 Java 中，我们将使用 *`List`*
    集合类型来保存我们的形状：


    `import java.util.*;`


    `/**`

    ` * ShapeTest - 测试 Shape 接口的实现。`

    ` *`

    ` * @author fred`

    ` * @version 1.0`

    ` */`

    `public class ShapeTest`

    `{`

    `    public static void main(String [] args)`

    `    {`

    `        List<Shape> figures = new ArrayList<Shape>();`


    `        figures.add(new Rectangle(10, 20));`

    `        figures.add(new Circle(10));`

    `        Point p1 = new Point(0.0, 0.0);`

    `        Point p2 = new Point(5.0, 1.0);`

    `        Point p3 = new Point(2.0, 8.0);`

    `        figures.add(new Triangle(p1, p2, p3));`


    `        Iterator<Shape> iter = figures.iterator();`


    `        while (iter.hasNext()) {`

    `            Shape nxt =  iter.next();`

    `            System.out.printf("area = %8.4f perimeter = %8.4f\n",`

    `                nxt.computeArea(), nxt.computePerimeter());`

    `        }`

    `    }`

    `}`


    因此，当你针对接口编程时，你的程序将更易于扩展和修改。你的程序将与接口的所有子类无缝协作。


    顺便提一下，上述原则让你明白，你应该不断地审视你的设计。由于*重构*的需要，改变你的设计将迫使你的代码发生变化。你的设计是迭代的。骄傲会毁掉好的设计；不要害怕重新审视你的设计决策。（嘿！也许这又是另一条设计原则！）

