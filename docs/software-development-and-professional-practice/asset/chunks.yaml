- fmt: '### The Layered Approach


    The layered architectural approach suggests that programs can be structured as
    a series of layers, much like geologic strata, with a sequence of well-defined
    interfaces between the layers. This has the effect of isolating each layer from
    the ones above and below it, so that one can change the internals of any layer
    without having to change any of the other layers in the program. That is, as long
    as your changes don''t involve any changes to the interface. In a layered approach,
    interfaces are sacred. Two classic examples of a layered approach to programming
    are operating systems (OSs) and communications protocols.


    An operating system''s architecture has several objectives, among them to centralize
    control of the limited hardware resources and to protect users from each other.
    A layered approach to the operating system architecture does both of these things.
    Take a look at a pretty standard picture of an OS architecture (see [Figure 5-5](#Chapter05.html#fig_5_5)).


    ![images](images/0505.jpg)


    ***Figure 5-5.** A layered architecture*


    In this layered model, user applications request operating system services via
    a system call interface. This is normally the only way for applications to access
    the computer''s hardware. Most operating system services must make requests through
    the kernel and all hardware requests must go through device drivers that talk
    directly to the hardware devices. Each of these layers has a well-defined interface,
    so that, for example, a developer may add a new device driver for a new disk drive
    without changing any other part of the OS. This is a nice example of information
    hiding.


    The same type of interface happens in a communications protocol. The most famous
    of these layered protocols is the International Standards Organization (ISO) Open
    Systems Interconnection (OSI) seven-layer model. This model looks like [Figure
    5-6](#Chapter05.html#fig_5_6).


    ![images](images/0506.jpg)


    ***Figure 5-6.** The ISO-OSI layered architecture*


    In this model, each layer contains functions or services that are logically similar
    and are grouped together. An interface is defined between each layer and communication
    between layers is only allowed via the interfaces. A particular implementation
    need not contain all seven layers, and sometimes two or more layers are combined
    to make a smaller protocol stack. The OSI model defines both the seven-layer approach
    and all the interface protocols. The model can be downloaded as a PDF file from
    [`http://www.itu.int/rec/T-REC-X.200/en`](http://www.itu.int/rec/T-REC-X.200/en).
    (The ITU or International Telecommunications Union is the new name for the ISO.)


    Examples of protocols that are implemented at each layer are shown in [Table 5-1](#Chapter05.html#tab_5_1).


    ***Table 5-1.** Example Layered Protocols Using the ISO-OSI Architecture*


    | **Layer** | **Protocol** |

    | --- | --- |

    | 7\. Application | `http`, `ftp`, `telnet` |

    | 6\. Presentation | `MIME`, `SSL` |

    | 5\. Session | `Sockets` |

    | 4\. Transport | `TCP`, `UDP` |

    | 3\. Network | `IP`, `IPsec` |

    | 2\. Data Link | `PPP`, `Ethernet`, `SLIP`, `802.11` |

    | 1\. Physical |  |


    ### The Main Program: Subroutine Architectural Pattern


    The most traditional and oldest architectural pattern is the *main program – subroutine
    pattern*. While it descends from Niklaus Wirth''s 1971 paper “Program Development
    by Stepwise Refinement,”^([5](#Chapter05.html#CHP-05-FN-5)) Wirth was just the
    first to formally define the top-down problem decomposition methodology that naturally
    leads to the main program – subroutine pattern.


    The idea is simple. You start with a big problem, and then try to decompose the
    problem into several smaller problems or pieces of the original problem. For example,
    nearly every problem that is amenable to solution by top-down decomposition can
    be divided into three parts immediately – input processing, computation of the
    solution, and output processing.


    Once you have a problem divided into several pieces, you look at each piece individually
    and continue dividing, ignoring all the other pieces as you go. Eventually, you''ll
    have a very small problem where the solution is obvious; now is the time to write
    code. So you generally solve the problem from the top down, and write the code
    from the bottom up. There are many variations, however.


    To quote from the conclusion to Wirth''s paper:


    > 1.  *Program construction consists of a sequence of refinement steps. In each
    step a given task is broken up into a number of subtasks. Each refinement in the
    description of a task may be accompanied by a refinement of the description of
    the data which constitute the means of communication between the subtasks...*

    > 2.  *The degree of modularity obtained in this way will determine the ease or
    difficulty with which a program can be adapted to changes or extensions of the
    purpose...*

    > 3.  *During the process of stepwise refinement, a notation which is natural
    to the problem in hand should be used as long as possible... Each refinement implies
    a number of design decisions based upon a set of design criteria...*

    > 4.  *The detailed elaborations on the development of even a short program form
    a long story, indicating that careful programming is not a trivial subject.*


    ⁵ Wirth, N. “Program Development by Stepwise Refinement.” *Communications of the
    ACM* 14(4): 221-227\. (1971)


    [Figure 5-7](#Chapter05.html#fig_5_7) gives an impression about how the main program
    subroutine architecture works. We''ll discuss top-down decomposition of problems
    much more in [Chapter 7](#Chapter07.html#ch7).


    ![images](images/0507.jpg)


    ***Figure 5-7.** A main program – subroutine architecture*


    ### Conclusion


    The software architecture is the core of your application. It is the foundation
    on which you build the rest of the program. It drives the rest of your design.
    There are many different styles of software architecture and in any given project
    you''ll probably use more than one. The architectural style used for a program
    depends on what it is you''re doing. That''s the beauty of these styles; it may
    not always be true that form follows function, but for software – design follows
    architecture. These foundational patterns lead you down the path of design, shaping
    how your program will be constructed and lived in. Go out there and build a great
    program.


