    do the best you can to get an initial list of clear, testable requirements and
    then move on to design. You''ll always come back here later.


    ## C H A P T E R  5


    ## Software Architecture


    > *What do we mean by a software architecture? To me the term architecture conveys
    a notion of the core elements of the system, the pieces that are difficult to
    change. A foundation on which the rest must be built.*


    —Martin Fowler^([1](#Chapter05.html#CHP-05-FN-1))


    Once you have an idea of *what* you''re going to build, then you can start thinking
    about *how* you''re going to build it. Of course, you''ve already been thinking
    about this from the very first requirement, but now you have permission to do
    it. Now we begin to delve into design.


    There are really two levels of software design. The level we normally think of
    when we''re writing programs is usually called *detailed design*. What operations
    do we need? What data structures? What algorithms are we using? How is the database
    going to be organized? What does the user interface look like? What are the calling
    sequences? These are all very detailed questions that need to be answered before
    you can really get on with the detailed work of coding (well, sort of – we''ll
    get to that later).


    But there''s another level of design. This kind of design is all about *style*.
    If you were building a house, this design level asks questions like ranch or multi-story?
    Tudor or Cape Cod? Which direction do the bedroom windows face? Forced-air or
    hot-water heat? Three bedrooms or four? Open concept floor plan or closed? These
    questions focus somewhat on details, but they are much more about the style of
    the house and how you''ll be using it, rather than things like 12 or 14 gauge
    wire for the electrical system or the diameter of the air conditioning ductwork.
    This emphasis on style is what *software architecture* is all about. As Fowler
    says in this chapter''s opening quote, you need the foundation before you can
    build the rest of the structure. Software architecture is a set of ideas that
    tells you which foundation is the right one for your program.


    The idea of software architecture began as a response to the increasing size and
    complexity of programs. “As the size and complexity of software systems increases,
    the design problem goes beyond the algorithms and data structures of the computation:
    designing and specifying the overall system structure emerges as a new kind of
    problem.... This is the software architecture level of design.”^([2](#Chapter05.html#CHP-05-FN-2))
    However it is really the case that *all* programs of any size and complexity have
    an architecture. It''s just that for larger programs you need to be more intentional
    about your thinking about the architecture to make sure you have the right set
    of architectural patterns incorporated in your system design. You need to do this.
    It''s so much harder to change things at the architectural level once the program
    has been written, because architectural features are so fundamental to the structure
    of the program.


    ____________________________


    ¹ “Is Design Dead?” Retrieved from [http://martinfowler.com/articles/designDead.html](http://martinfowler.com/articles/designDead.html)


    ² Garlan, D. and M. Shaw (1994). An Introduction to Software Architecture. Pittsburgh,
    PA: Carnegie Mellon University: 49. CMU/SEI-94-TR-21\. (1994)


    There are many different styles of software architecture, and in any given project
    you''ll probably use more than one. The architectural style used for a program
    depends on what it is you''re doing. As we''ll see, different types of programs
    in different domains will lead us to different architectural styles; we can also
    call these *architectural patterns* since they have many characteristics of the
    *design patterns* we''ll see shortly. First let''s get some general vocabulary
    under our belts.


    ### General Architectural Patterns


    Whenever a software architect starts thinking about an architecture for a program,
    she usually starts by drawing pictures. Diagrams of the architecture allow people
    to see the structure and framework of the program much more easily than text.
    Software architectures are normally represented as black box *graphs* where graph
    nodes are *computational structures* and the graph edges are *communication conduits*
    between the structures. The conduits can represent data flow, object message passing,
    or procedure calls. Notations of this type vary and there are several standard
    notations, notably the United Modeling Language (UML). Visual descriptions of
    architectures are generally easier to understand. A particular architectural style
    is a pattern that can represent a set of similar structures. Let''s looks at several
    different common architectural styles.'
  trans: '

    ### 分析需求


    一旦你写下了一组需求，就需要确保这些需求对程序来说是合适的；你需要对它们进行*分析*。分析包含三个基本部分。


    首先，你要对需求进行*分类*，并将它们组织到相关的领域中。这将对设计人员有很大帮助。


    其次，你需要根据客户的意见对它们进行*优先级排序*。这一点至关重要，因为你无法在第一个产品版本中实现所有需求（相信我，你做不到）。因此，这个优先级列表将用于确定每个中间版本的内容。


    最后，你需要将每个需求与其他所有需求进行*对照检查*，以确保它们能构成一个连贯的整体。问自己一系列问题：


    1.  每个需求是否与项目的总体目标*一致*？如果你的程序旨在向用户销售书籍，那它就不必同时计算他们的高尔夫差点。

    2.  这个需求是否*真的必要*？你是否添加了某些内容，即使移除也不会损害程序的基本功能？如果你的第一个版本旨在允许用户购买书籍，那么你可能不需要同时允许他们购买帆船。

    3.  这个需求是否*可测试*？这可能是你在进行需求分析时最重要的问题。如果你无法弄清楚如何测试一个需求，那么你就无法知道你是否正确实现了它，或者是否已经完成。所有需求*必须*是可测试的，否则它们就不是需求。在大多数敏捷方法中，规则是先编写测试，再编写代码。

    4.  这个需求在你必须工作的技术环境中是否*可行*？这个问题通常适用于之前提到的那些非功能性需求。考虑到你在此项目中必须使用的特定目标平台或硬件约束，你的需求是否可行？例如，如果你的目标平台是运行
    OS X 的 Macintosh，那么要求使用 DirectX 图形库的需求是不可行的，因为 DirectX 是仅适用于 Windows 的库。

    5.  这个需求是否*无歧义*？你的需求需要尽可能精确（请参考之前的可测试性问题），因为就像你现在坐在这里阅读本文一样肯定的是，有人会误解一个有歧义的需求，而你会在产品发布后的第二天才发现这个错误。你的需求中绝不应包含“或”或“可能”这类词语。


    ____________________________


    ⁸ Beck, K. *极限编程解析：拥抱变化*。（波士顿，马萨诸塞州：Addison-Wesley，2000 年。）


    ### 结论


    一旦你完成了功能规格说明和需求分析，需求阶段就结束了，对吧？嗯，当然不是。正如我们之前所说——需求是会变化的。所以，放轻松，不要对需求过于执着，尽你所能获得一份清晰、可测试的初始需求列表，然后进入设计阶段。你以后总会再回到这里的。


    ## 第 5 章


    ## 软件架构


    > *我们所说的软件架构是什么意思？对我来说，架构一词传达的是系统核心元素的概念，即那些难以改变的部分。它是其余部分必须赖以建立的基础。*


    ——马丁·福勒^(1)


    一旦你对你将要构建的*内容*有了想法，就可以开始思考*如何*构建它了。当然，从第一个需求开始你就已经在思考这个问题了，但现在你被允许正式着手了。现在我们开始深入探讨设计。


    软件设计实际上有两个层次。我们在编写程序时通常想到的层次通常被称为*详细设计*。我们需要哪些操作？需要哪些数据结构？我们使用什么算法？数据库将如何组织？用户界面看起来是什么样？调用顺序是什么？这些都是非常详细的问题，需要在你能真正开始进行详细的编码工作之前得到回答（嗯，差不多是这样——我们稍后会谈到这一点）。


    但还有另一个层次的设计。这种设计完全是关于*风格*的。如果你在建造一所房子，这个设计层次会问这样的问题：是牧场风格还是多层风格？都铎风格还是科德角风格？卧室窗户朝哪个方向？强制送风还是热水供暖？三间卧室还是四间？开放式概念平面图还是封闭式？这些问题在一定程度上关注细节，但它们更多地是关于房子的风格以及你将如何使用它，而不是像电气系统用
    12 号还是 14 号电线，或者空调管道的直径这类事情。这种对风格的强调正是*软件架构*的全部意义所在。正如福勒在本章开篇引言中所说，你需要先有基础，才能构建结构的其余部分。软件架构是一套理念，它告诉你哪个基础适合你的程序。


    软件架构的概念最初是为了应对程序规模和复杂性的日益增长而出现的。“随着软件系统规模和复杂性的增加，设计问题已超越了计算中的算法和数据结构：设计和规定整个系统结构成为了一种新型问题……这就是软件架构层面的设计。”^(2)
    然而，事实上，*所有*具有一定规模和复杂性的程序都有其架构。只是对于较大的程序，你需要更有意识地去思考架构，以确保在你的系统设计中融入了正确的架构模式集。你必须这样做。一旦程序编写完成，在架构层面进行更改要困难得多，因为架构特性对程序的结构是如此基础。


    ____________________________


    ¹ “设计已死？” 取自 [`martinfowler.com/articles/designDead.html`](http://martinfowler.com/articles/designDead.html)


    ² Garlan, D. 和 M. Shaw (1994)。《软件架构导论》。匹兹堡，宾夕法尼亚州：卡内基梅隆大学：49。CMU/SEI-94-TR-21。(1994)


    有许多不同风格的软件架构，在任何给定的项目中，你可能会使用不止一种。程序所使用的架构风格取决于你正在做什么。正如我们将看到的，不同领域中的不同类型程序会引导我们采用不同的架构风格；我们也可以将这些称为*架构模式*，因为它们具有我们稍后将看到的*设计模式*的许多特征。首先，让我们掌握一些通用词汇。


    ### 通用架构模式


    每当软件架构师开始思考程序的架构时，她通常从画图开始。架构图能让人们比文本更容易地看到程序的结构和框架。软件架构通常表示为黑盒*图*，其中图节点是*计算结构*，图边是结构之间的*通信管道*。管道可以表示数据流、对象消息传递或过程调用。此类表示法多种多样，并且有几种标准表示法，特别是统一建模语言（UML）。架构的可视化描述通常更容易理解。特定的架构风格是一种可以表示一组相似结构的模式。让我们来看几种不同的常见架构风格。

