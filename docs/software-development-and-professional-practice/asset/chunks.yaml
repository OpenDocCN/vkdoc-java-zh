  trans: "\n## 总结\n\n> *所有程序员都是乐观主义者。或许正是这种现代魔法，尤其吸引那些相信美好结局和仙女教母的人。或许正是那成百上千的琐碎挫折，赶走了所有不习惯专注于最终目标的人。又或许仅仅是因为计算机还年轻，程序员更年轻，而年轻人总是乐观的。*\n\
    > \n> ——小弗雷德里克·布鲁克斯^(1)\n> \n> *这是我能想到的唯一一份让我同时成为工程师和艺术家的职业。它有着令人难以置信的严谨技术元素，我喜欢这一点，因为你必须进行非常精确的思考。另一方面，它又有着狂野的创造性，在那里，想象力的边界是唯一的真正限制。*\n\
    > \n> ——安迪·赫兹菲尔德\n\n阅读亚历克斯·E·贝尔^(2)和马克·古兹迪尔^(3)在 2008 年 8 月《ACM 通讯》上发表的“观点”专栏时，我被这两篇文章的协同效应所震撼。一篇是关于专业软件开发中应使用何种工具的警示故事，另一篇则至少部分是关于编程教学中语言和语法使用的警示故事。这让我思考起我们在开发和教学中尝试过的所有“银弹”，以及为什么它们中的大多数对真正的软件开发无关紧要。这似乎是总结本次软件开发讨论的恰当方式。\n\
    \n__________\n\n¹ Brooks, F. P. *《人月神话：软件工程随笔，银弹纪念版》*。（波士顿，马萨诸塞州：Addison-Wesley，1995\
    \ 年。）\n\n² Bell, A. E. “银弹呼啸中的软件开发”，《ACM 通讯》，51 卷，8 期（2008 年 8 月），22-24 页。\n\n\
    ³ Guzdial, M. “为计算思维铺平道路”，《ACM 通讯》，51 卷，8 期（2008 年 8 月），25-27 页。\n\n### 你学到了什么？\n\
    \n正如我在本书中多次提到的，软件开发是困难的。我不认为每个人都能做到，而在能做到的人中，我认为很少有人能始终做得极其出色。当然，这正是它的吸引力所在。没有人真的想解决简单的问题。挑战在于处理你从未做过的事情，甚至是你不知道能否解决的问题。正是这一点让你一次又一次地回到创建软件的工作中。\n\
    \n软件开发是人类能做的最具创造性的事情之一。从无到有，你拿起一个问题，与之搏斗，探索它，戳弄它，将其拆解，再以不同的形式重组，灵光一现找到解决方案，然后将其转化为他人可以轻松使用的制品。让别人用你的程序解决他们的问题，这简直是最酷的事情。\n\
    \n编写软件是一种令人谦卑的体验。把软件做对是如此困难，而做错却如此容易。在编写软件的过程中，我学会了拥抱失败。失败是这个过程中既令人兴奋又令人沮丧的一部分。从失败中，你了解自己：你了解自己如何解决问题，了解自己容易犯哪些类型的错误，并学会如何规避它们。失败教会你坚持不懈，因为你必须不断努力，直到程序能正常工作。\n\
    \n大多数软件由小团队构建，他们也构建出最好的软件。规模小、积极性高且被赋予权力的团队效率最高。小团队也倾向于使用精简的开发流程。除非你为一家迫切希望达到\
    \ SEI 能力成熟度模型 5 级^(4)的大公司工作，否则你的流程可以非常精简。详细的问题描述、头脑风暴式的设计会议、简单的配置管理、代码审查以及一个独立的测试团队，足以处理创建近乎无缺陷代码所需的一切。流程的灵活性、沟通和主人翁精神是项目成功的关键。\n\
    \n每年都有大量真正优秀的软件被编写、测试并发布；数量远多于所谓的“失败”数字所暗示的。^(5) 区分计划驱动开发和敏捷开发的关键问题，在于是否认识到需求的持续变化。敏捷开发最棒的一点是，它承认这一事实，并将重构融入其流程中。\n\
    \n简单的工具最有效。简单的工具能让你直击问题的核心，毫无阻碍地仔细审视它。它们让你能够把问题拿出来，捧在手中，翻来覆去，快速轻松地戳弄它。简单的工具还能让你将它们组合起来，完成更复杂的事情。我直接推荐你阅读斯蒂芬·詹金斯关于“老派”编程的文章。^(6)\
    \ 他比我讲得好得多。\n\n编码、调试和单元测试至少与设计同等重要。经验赋予优秀程序员深刻的设计感和丰富的模式库；经验赋予卓越程序员对其所用编程语言深入而精通的了解。正是这种深入而精通的了解，才能产生优美的代码。\n\
    \n调试一个冗长复杂的程序，是一项回报极其丰厚的努力。隔离问题、发现自己的错误、搭建调试脚手架、假设解决方案、重新设计、最终定位错误，然后创建正确的修复——这一切带来的兴奋和满足感，有时几乎令人难以承受。\n\
    \n__________\n\n⁴ Paulk, M. C. *《能力成熟度模型：改进软件过程的指南》*。（雷丁，马萨诸塞州：Addison-Wesley，1995\
    \ 年。）\n\n⁵ Glass, R. “Standish 报告：它真的描述了软件危机吗？”，《ACM 通讯》，49 卷，8 期（2006 年 8 月），15-16\
    \ 页。\n\n⁶ Jenkins, S. B. “一位‘老派’程序员的思考”，《ACM 通讯》，49 卷，5 期（2006 年 5 月），124-126\
    \ 页。\n"
- fmt: "### What to Do Next?\n\nSo now that you've read all about software development\
    \ and maybe tried some of the examples, what do you do next? How do you become\
    \ a better software developer? Well, here are some suggestions.\n\n**Write code,\
    \ write lots of code:** Experience helps a lot. Programming is a craft that requires\
    \ practice and constant reinforcement. It's very likely that you'll need to learn\
    \ a whole new set of tools and programming languages every ten years or so. So\
    \ having written lots of code will make that task easier.\n\n**Learn simple tools:**\
    \ Simple tools give you flexibility. They also help you learn the fundamental\
    \ skills that you can then take to more complicated IDEs. And when those IDEs\
    \ get replaced – as they will – you can fall back on the simple tools till you\
    \ learn the new IDE.\n\n**Read about problem solving and design:** People have\
    \ been solving problems for several thousand years now and people have been designing\
    \ things for nearly that long. Writings in other areas can communicate common\
    \ problem solving strategies that also work for software development. Don't ignore\
    \ Polya's *How to Solve It* book. It was written to solve math problems, but it\
    \ translates very, very well to software.^([7](#Chapter16.html#CHP-16-FN-7)) Also\
    \ don't ignore the classics in the computer science literature, like Dijkstra's\
    \ *Structured Programming* book,^([8](#Chapter16.html#CHP-16-FN-8)) Brooks classic\
    \ *The Mythical Man-Month*,^([9](#Chapter16.html#CHP-16-FN-9)) Bentley's *Programming\
    \ Pearls*,^([10](#Chapter16.html#CHP-16-FN-10)) McConnell's *Rapid Development*,^([11](#Chapter16.html#CHP-16-FN-11))\
    \ and Beck's *Extreme Programming Explained*.^([12](#Chapter16.html#CHP-16-FN-12))\n\
    \n**Read about programming and read about programmers:** There is a plethora of\
    \ literature on programming. A number of books have been mentioned in the previous\
    \ chapters. Two that bear repeating are Hunt and Thomas' *The Pragmatic Programmer^([13](#Chapter16.html#CHP-16-FN-13))*\
    \ and McConnell's *Code Complete 2*.^([14](#Chapter16.html#CHP-16-FN-14)) It's\
    \ also a great idea to see how other programmers work. There is a developing literature\
    \ in computing on how great programmers think, work and generally write great\
    \ code. Two notable books are Lammer's *Programmers At Work^([15](#Chapter16.html#CHP-16-FN-15))*\
    \ and Oram and Wilson's *Beautiful Code*.^([16](#Chapter16.html#CHP-16-FN-16))\n\
    \n__________\n\n⁷ Polya, G. *How To Solve It: A New Aspect of Mathematical Method,\
    \ 2nd Edition.* (Princeton, NJ: Princeton University Press, 1957.)\n\n⁸ Dahl,\
    \ O. J., E. Dijkstra, et al. *Structured Programming.* (London, UK: Academic Press,\
    \ 1972.)\n\n⁹ Brooks, 1995.\n\n^(10) Bentley, J. *Programming Pearls, 2nd Edition.*\
    \ (Reading, MA: Addison-Wesley, 2000.)\n\n^(11) McConnell, S. *Rapid Development:\
    \ Taming Wild Software Schedules.* (Redmond, WA: Microsoft Press, 1996.)\n\n^(12)\
    \ Beck, *K. Extreme Programming Explained: Embrace Change.* (Boston, MA: Addison-Wesley,\
    \ 2006.)\n\n^(13) Hunt, A. and D. Thomas. *The Pragmatic Programmer: From Journeyman\
    \ to Master.* (Boston, MA: Addison-Wesley, 2000.)\n\n^(14) McConnell, S. *Code\
    \ Complete 2.* (Redmond, WA: Microsoft Press, 2004.)\n\n^(15) Lammers, S. *Programmers\
    \ At Work.* (Redmond, WA: Microsoft Press, 1986.)\n\n**Talk to other programmers:**\
    \ Books are an okay way to gather information, but talking to your peers can't\
    \ be beat. A side effect of pair programming is that you get to see how someone\
    \ else works, how they approach problems, how they code, debug, and write tests.\
    \ Code review meetings are a great way to learn how others work. Code reviews\
    \ also reinforce Gerald Weinberg's idea of *egoless programming*.^([17](#Chapter16.html#CHP-16-FN-17))\
    \ Once you get over the idea that you “own” the code in a software product (your\
    \ employer owns it; read some of those documents you had to sign on the first\
    \ day of work), you gain the ability to look at your code and the code of your\
    \ co-workers objectively and you can learn from it.\n\n**Join the ACM and the\
    \ IEEE-CS:** The Association for Computing Machinery (ACM) [`www.acm.org`](http://www.acm.org)\
    \ and the IEEE Computer Society (IEEE-CS) [`www.computer.org`](http://www.computer.org)\
    \ are the two main professional organizations for computer scientists. Their journals\
    \ contain a wealth of information about all things related to computers and computing,\
    \ their conferences are worth attending, and online they have free books and courses\
    \ for members. You will not regret joining one or both of them.\n\n**Be humble:**\
    \ The following quote from Dijkstra says it all. Software development is hard.\
    \ Programs are very complex, and programs of any size are extremely hard to understand\
    \ completely. Besides being one of the most creative things that humans have ever\
    \ done, computer software is one of the most complex. Be humble. Work hard. Have\
    \ fun!\n\n> *The competent programmer is fully aware of the strictly limited size\
    \ of his own skull; therefore he approaches the programming task in full humility...*\n\
    > \n> —Edsger Dijkstra^([18](#Chapter16.html#CHP-16-FN-18))\n\nAnd lastly, I couldn't\
    \ resist a quote that had both the words *magic* and *computer* in it...\n\n>\
    \ *The magic of myth and legend has come true in our time. One types the correct\
    \ incantation on a keyboard, and a display screen comes to life, showing things\
    \ that never were nor could be.... The computer resembles the magic of legend\
    \ in this respect, too. If one character, one pause, of the incantation is not\
    \ strictly in proper form, the magic doesn't work. Human beings are not accustomed\
    \ to being perfect, and few areas of human activity demand it. Adjusting to the\
    \ requirement for perfection is, I think, the most difficult part of learning\
    \ to program.*\n> \n> —Frederick Brooks\n\n__________\n\n^(16) Oram, A. and G.\
    \ Wilson, Eds. *Beautiful Code: Leading Programmers Explain How They Think.* (Sebastopol,\
    \ CA: O'Reilly Media, Inc, 2007.)\n\n^(17) Weinberg, G. M. *The Psychology of\
    \ Computer Programming, Silver Anniversary Edition.* (New York, NY: Dorset House,\
    \ 1988.)\n\n^(18) Dijkstra, E. “The Humble Programmer,” *CACM* 15(10): 859-866\\\
    . 1972.\n\n## Index\n\n### ![images](images/square.jpg) A\n\nabstract classes,\
    \ definition of, [111](#Chapter09.html#page_111)\n\nabstraction\n\nabstraction\
    \ mechanism, [88](#Chapter08.html#page_88)\n\nmanaging the complexity of a large\
    \ problem, [65](#Chapter06.html#page_65)\n\nacceleration, definition of, [24](#Chapter02.html#page_24)\n\
    \nactors, definition of, [91](#Chapter08.html#page_91)\n\nAdams, Douglas, [179](#Chapter12.html#page_179)\n\
    \nAdapter pattern\n\nclass adapters, [146](#Chapter11.html#page_146)\n\ncode example,\
    \ [147](#Chapter11.html#page_147)\n\ndescription of, [146](#Chapter11.html#page_146)\n\
    \nobject adapters, [146](#Chapter11.html#page_146)\n\n`add()`, [150](#Chapter11.html#page_150)\n\
    \naggregation, definition of, [130](#Chapter10.html#page_130)\n\nagile development\
    \ models\n\nAgile Manifesto web page, [8](#Chapter02.html#page_8)\n\naims of,\
    \ [14](#Chapter02.html#page_14)\n\ndescription of, [8](#Chapter02.html#page_8)\n\
    \neXtreme Programming (XP), [15](#Chapter02.html#page_15)\n\nlightweight methodologies,\
    \ [14](#Chapter02.html#page_14)\n\nrefactoring, [14](#Chapter02.html#page_14)\n\
    \nScrum, [23](#Chapter02.html#page_23)\n\n*See also* coding; eXtreme Programming\
    \ (XP); object-oriented analysis and design (OOA&D); software development\n\n\
    Alexander, Christopher, [137](#Chapter11.html#page_137)\n\nanalysis paralysis,\
    \ avoiding, [105](#Chapter09.html#page_105)\n\narchitectural patterns, [48](#Chapter05.html#page_48)\n\
    \n`assertEquals()`, [204](#Chapter14.html#page_204)\n\nassertions, using for errors\
    \ that should never happen in production, [173](#Chapter12.html#page_173)"
