  trans: '

    ### 走查、评审与审查——天哪！


    仅靠测试来发现代码中的错误并非特别有效的方法。在许多情况下，单元测试、集成测试和系统测试的组合只能发现程序中大约 50%的错误。³ 但是，如果你在测试方案中加入某种类型的代码审查（通过阅读代码来发现错误），就能将这一比例提升至代码中所有错误的
    93%到 99%。这才是值得追求的目标。


    通常有三种类型的审查，它们从非常非正式的技术逐步过渡到非常正式的方法。这些审查通常在代码刚通过编译、单元测试之前进行，或者在单元测试完成后立即进行。最好在单元测试之后立即进行审查。这样，你已经完成了修改，代码编译通过，并且完成了第一轮测试。此时正是让其他人查看你代码的好时机。


    ### 走查


    *走查*，也称为*桌面检查*或*代码阅读*，是最不正式的审查类型。走查通常用于确认对代码的小改动，比如一两行刚修复错误的代码。如果你刚刚向类中添加了一个新方法，或者修改了超过
    10 行代码，在任何情况下都不应进行走查。而应进行代码评审。


    走查涉及两人，最多三人：代码作者和审查者。在走查中，作者的工作是向审查者解释改动应该实现什么功能，并指出改动的位置。审查者的工作是理解改动，然后阅读代码。审查者阅读代码后，会做出两种判断之一：要么同意改动是正确的，要么不同意。如果不同意，作者必须返回，再次修复代码，然后进行另一次走查。如果审查者认为改动正确，那么作者就可以将修改后的代码集成回代码库，进行集成测试。


    如果你采用敏捷方法并进行结对编程，那么在实现任务时，代码走查会自然发生。驾驶员在编写代码，而领航员则在一旁查看，检查错误并提前思考。在这种情况下，对较大块的代码进行走查是可以接受的，但对于一个完整的任务，或者更好的是，对于每个已实现的用户故事，你应该进行代码评审或审查。


    ### 代码评审


    另一方面，*代码评审*比走查要正式一些。代码评审是大多数软件开发人员会做的事情。如果你修改了大量代码，或者向现有程序添加了新代码，你应该始终进行代码评审。如前所述，敏捷程序员在完成一个用户故事后应进行代码评审。代码评审是真正的会议。


    代码评审通常有三到五人参加。参加代码评审的每个人应带来不同的视角。


    ____________


    ³ McConnell, 2004.


    *   代码评审的主持人通常是作者。主持人的工作是召集会议，在会议前提前发送待评审的材料，并主持代码评审会议。主持人也可以在会议上做笔记。

    *   会议上应有一名或多名开发人员；即与作者在同一项目工作的人。此人将带来项目的详细知识，并以此视角参与会议。

    *   代码评审中应有一名测试人员。此人带来测试视角，不仅阅读被评审的代码，还会思考代码应如何被测试。

    *   最后，应有一名经验丰富的开发人员在场，且此人不在作者的项目中。此人作为“无利害关系的第三方”，代表质量视角。他们在代码评审中的工作是理解代码，并让作者清晰地解释改动。此人提供关于代码及其如何融入项目的更具战略性的视野。


    哦，还有，不允许经理参加代码评审。经理在场会改变会议的动态，使代码评审效果降低。那些在同事中可能愿意诚实评价代码的人，在经理面前会闭口不言；这无助于发现错误。请不要让经理参加。


    代码评审的目标是发现代码中的错误，而不是修复它们。代码评审足够非正式，可能会发生一些关于修复的讨论，但这应保持在最低限度。在代码评审会议之前，所有参与者应仔细审阅主持人发送的材料，并准备一份他们发现的错误列表。这一步对于使评审会议高效且成功至关重要。请做好功课！


    这份列表应在会议开始时交给主持人。作者（也可能是主持人）逐项讲解代码改动，解释它们如何修复了原本要修复的错误，或添加了所需的新功能。如果某个错误或讨论将评审会议引向原始评审范围之外的代码——停下来！要非常小心地避免进入未经预先阅读的领域。你应该将任何不在评审范围内的代码视为黑盒。改为安排另一次会议。记住，代码评审的重点是单块代码以及在该代码块中查找错误。不要分心。


    代码评审中，电脑和投影仪是必不可少的，这样每个人都能随时看到正在发生的事情。应使用第二台电脑，以便有人（通常是作者）记录在代码中发现的错误。一次代码评审不应超过大约两小时，或评审超过
    200-500 行代码，因为大约在那段时间或阅读量之后，每个人的效率都会开始下降。


    代码评审结束后，笔记会分发给所有参与者，作者负责修复评审期间发现的所有错误。如果时间不够，则安排另一次评审。虽然代码评审不强制要求度量指标，但主持人至少应记录发现了多少错误、评审了多少行代码，以及（如果合适的话）每个错误的严重程度。这些度量指标对于衡量生产力非常有用，并应用于规划下一个项目。

    '
- fmt: '### Code Inspections


    Code inspections are the most formal type of review meeting. The sole purpose
    of an inspection is to find defects in a document. Inspections can be used to
    review planning documents, requirements, designs, or code, in short, any work
    product that a development team produces. Code inspections have specific rules
    regarding how many lines of code to review at once, how long the review meeting
    must be, and how much preparation each member of the review team should do, among
    other things. Inspections are typically used by larger organizations because they
    take more time and effort than walkthroughs or code reviews. They are also used
    for mission and safety-critical software where defects can cause harm to users.
    The most widely known inspection methodology was invented by Michael Fagan in
    1976. Fagan''s process was the first formal software inspection process proposed
    and as such, has been very influential. Most organizations that use inspections
    use a variation of the original Fagan software code inspection process.[⁴](#Chapter15.html#CHP-15-FN-4)
    Code inspections have several very important criteria, including:


    - Inspections use checklists of common error types to focus the inspectors.

    - The focus of the inspection meeting is solely on finding errors; no solutions
    are permitted.

    - Reviewers are required to prepare beforehand; the inspection meeting will be
    canceled if everyone isn''t ready.

    - Each participant in the inspection has a distinct role.

    - All participants have had inspection training.

    - The moderator is not the author and has had special training in addition to
    the regular inspection training.

    - The author is always required to follow up on errors reported in the meeting
    with the moderator.

    - Metrics data is always collected at an inspection meeting.


    #### Inspection Roles


    The following are the roles used in code inspections:


    - **Moderator**: The moderator gets all the materials from the author, decides
    who the other participants in the inspection should be, and is responsible for
    sending out all the inspection materials and scheduling and coordinating the meeting.
    Moderators must be technically competent; they need to understand the inspection
    materials and keep the meeting on track. The moderator schedules the inspection
    meeting and sends out the checklist of common errors for the reviewers to peruse.
    They also follow-up with the author on any errors found in the inspection, so
    they must understand the errors and the corrections. Moderators attend an additional
    inspection-training course to help them prepare for their role.

    - **Author**: The author distributes the inspection materials to the moderator.
    If an Overview meeting is required, the author chairs it and explains the overall
    design to the reviewers. Overview meetings are discouraged in code inspections,
    because they can “taint the evidence” by injecting the author''s opinions about
    the code and the design before the inspection meeting. Sometimes, however, if
    many of the reviewers are not familiar with the project an Overview meeting is
    necessary. The author is also responsible for all rework that is created as a
    result of the inspection meeting. During the inspection the author answers questions
    about the code from the reviewers, but does nothing else.

    - **Reader**: The reader''s role is to read the code. Actually, the reader is
    supposed to paraphrase the code, not read it. This implies that the reader has
    a good understanding of the project, its design and the code in question. The
    reader does not explain the code; he just paraphrases it. The author should answer
    any questions about the code. That said, if the author has to explain too much
    of the code that is usually considered a defect to be fixed; the code should be
    refactored to make it simpler.

    - **Reviewers**: The reviewers do the heavy lifting in the inspection. A reviewer
    can be anyone with an interest in the code who is not the author. Normally reviewers
    are other developers from the same project. As in code reviews it''s usually a
    good idea to have a senior person who is not on the project also be a reviewer.
    There are usually between two and four reviewers in an inspection meeting. Reviewers
    must do their pre-reading of the inspection materials and are expected to come
    to the meeting with a list of errors that they have found. This list is given
    to the Recorder.

    - **Recorder**: Every inspection meeting has a recorder. The recorder is one of
    the reviewers and is the person who takes notes at the inspection meeting. The
    recorder merges the defect lists of the reviewers and classifies and records errors
    found during the meeting. The recorder prepares the inspection report and distributes
    it to the meeting participants. If the project is using a defect management system,
    then it is up to the Recorder to enter defect reports for all major defects from
    the meeting into the system.

    - **Managers**: As with code reviews, managers are not invited to code inspections.


    __________


    ⁴ Fagan, M. “Design and Code Inspections to Reduce Errors in Program Development.”
    *IBM Systems Journal* 15(3): 182-211. 1976.


    #### Inspection Phases and Procedures


    Fagan inspections have seven phases that must be followed for each inspection:[⁵](#Chapter15.html#CHP-15-FN-5)


    1.  Planning

    2.  The Overview meeting

    3.  Preparation

    4.  The Inspection meeting

    5.  The Inspection report

    6.  Rework

    7.  Follow up


    ______________


    ⁵ Fagan, M. “Advances in Software Inspections.” *IEEE Trans on Software Engineering*
    12(7): 744-751. 1986.


    ##### Planning


    In the Planning phase, the moderator organizes and schedules the meeting and picks
    the participants. The moderator and the author get together to discuss the scope
    of the inspection materials – for code inspections typically between 200 and 500
    uncommented lines of code will be reviewed. The author then distributes the code
    to be inspected to the participants.


    ##### The Overview Meeting


    An Overview meeting is necessary if several of the participants are unfamiliar
    with the project or its design and they need to come up to speed before they can
    effectively read the code. If an Overview meeting is necessary, the author will
    call it and run the meeting. The meeting itself is mostly a presentation by the
    author of the project architecture and design. As mentioned, Overview meetings
    are discouraged, because they have a tendency to taint the evidence. Like the
    Inspection meeting itself, Overview meetings should last no longer than two hours.


    ##### Preparation


    In the Preparation phase, each reviewer reads the work to be inspected. Preparation
    should take no more than 2–3 hours. The amount of work to be inspected should
    be between 200 and 500 uncommented lines of code or between 30 and 80 pages of
    text. A number of studies have shown that reviewers can typically review about
    125–200 lines of code per hour. In Fagan inspections, the preparation phase is
    required. The inspection meeting can be canceled if the reviewers have not done
    their preparation. The amount of time each reviewer spent in preparation is one
    of the metrics that is gathered at the inspection meeting.'
