  trans: "\n`public class NFPTaxStrategy implements TaxStrategy {`\n`    private final\
    \ double RATE = 0.0;`\n\n`    public double computeTax(double income) {`\n`        return\
    \ income * RATE;`\n`    }`\n`}`\n\n接下来，我们创建`Context`类，它负责完成客户端程序请求创建策略对象并执行正确策略的繁重工作。\n\
    \n`public class TaxPayerContext {`\n`    private TaxStrategy strategy;`\n`    private\
    \ double income;`\n`    /** Context 的构造函数 */`\n`    public TaxPayerContext(TaxStrategy\
    \ strategy, double income) {`\n`        this.strategy = strategy;`\n`        this.income\
    \ = income;`\n`    }`\n`    public double getIncome() {`\n`        return income;`\n\
    `    }`\n`    public void setIncome(double income) {`\n`        this.income =\
    \ income;`\n`    }`\n`    public TaxStrategy getStrategy() {`\n`        return\
    \ strategy;`\n`    }`\n`    public void setStrategy(TaxStrategy strategy) {`\n\
    `        this.strategy = strategy;`\n`    }`\n`    public double computeTax()\
    \ {`\n`        return strategy.computeTax(income);`\n`    }`\n`}`\n\n请注意，这里我们编写了一个独立的\
    \ *`computeTax()`* 方法版本（我们没有重写该方法，因为我们没有扩展任何具体类——策略模式使用的是组合，而非继承）。此版本会调用客户端所选策略的\
    \ *`computeTax()`* 方法。\n\n最后，我们实现控制谁在何时被实例化的客户端。\n\n`public class StrategyClient\
    \ {`\n`        public static void main(String [] args) {`\n`                double\
    \ income;`\n`                TaxPayerContext tp;`\n\n`                income =\
    \ 35000.00;`\n`                tp = new TaxPayerContext(new PersonalTaxStrategy();`\n\
    `                                                                                 income);`\n\
    `                System.out.println(\"Tax is \" + tp.computeTax());`\n\n`                tp.setStrategy(new\
    \ CorpTaxStrategy());`\n`                System.out.println(\"Tax is \" + tp.computeTax());`\n\
    `        }`\n`}`\n\n客户端类选择要使用的算法，然后让上下文对象执行它。这样，我们就将税收计算封装到了独立的类中。只需添加新的具体`TaxStrategy`类，并在客户端中做出更改以使用该新具体类型，我们就能轻松添加新的客户类型。小菜一碟！\n\
    \n### 结论\n\n设计模式是针对设计问题的可复用、普遍出现的核心解决方案。它们并非一个完成的设计。相反，设计模式是一个模板，你可以用它来解决许多不同领域中的类似问题。设计模式为你提供了久经考验的策略来解决常见问题，因此它们可以帮助加快你的设计过程。而且，由于这些模式描述了*经过验证的解决方案*，它们也有助于减少设计中的缺陷。\n\
    \n不过要小心。像所有设计技术一样，设计模式是启发式的，因此总会有它们不适用的情况。试图将一个模式硬塞进一个根本不合适的问题中，只会自找麻烦。\n\n设计模式的目标是定义一种通用的设计词汇。它们可能无法让我们完全达到目标，但设计模式，加上第\
    \ 10 章中描述的设计原则，能让我们在这条路上走得很远。\n\n## 第 12 章\n\n## 代码构建\n\n> *大多数时候，当你看到程序员时，他们并没有在做什么。程序员的一个吸引人之处在于，你无法仅通过观察来判断他们是否在工作。他们常常坐在那里，看似在喝咖啡闲聊，或者只是盯着虚空发呆。程序员试图做的是理清那些在他脑海中四处乱窜的、所有独立且不相关的想法。*\n\
    > \n> ——查尔斯·M·斯特劳斯\n> \n> *同样，伟大的软件需要对美有一种狂热的执着。如果你审视优秀的软件内部，你会发现那些本不该有人看到的部件也同样优美。我并非声称自己编写了伟大的软件，但我知道，在代码方面，我的行为方式如果应用到日常生活中，会让我有资格服用处方药。看到缩进糟糕或使用丑陋变量名的代码，会让我抓狂。*\n\
    > \n> ——保罗·格雷厄姆，《黑客与画家》，2003 年\n\n好了，我们终于要触及软件开发的核心——编写代码。这里的前提是你已经*确实*知道如何用至少一种编程语言编写代码；本章会以几种语言为例进行说明，每种语言都是根据要阐述的要点来选择的。本章的目的是提供一些编写*更好*代码的技巧。因为我们都能写出更好的代码。\n\
    \n对于计划驱动流程的人（参见第 2 章）来说，编码是那条摇动开发流程这条狗的尾巴。一旦你完成了详细的需求、架构和详细设计，代码就应该从最终设计中自然流淌出来，对吧？并非如此。在我\
    \ 20 年的行业软件开发经验中，我从未见过这种情况发生。编码是困难的；即使是一个好的、详细的设计，将其转化为代码也需要大量的思考、经验和知识，即便是小程序也不例外。根据你使用的编程语言和目标系统，编程可能是一项非常耗时且困难的任务。另一方面，对于雇佣数十甚至数百名开发人员的大型项目，拥有非常详细的设计对成功至关重要，所以先别急着否定计划驱动流程。\n\
    \n对于敏捷开发流程的人来说，编码就是一切。敏捷宣言（[`http://agilemanifesto.org`](http://agilemanifesto.org)）在开头就指出：“可工作的软件胜过详尽的文档。”敏捷开发者倾向于尽早并频繁地创建代码；他们相信要频繁地向客户交付软件，并利用客户的反馈来改进代码。他们欢迎需求的变化，并将其视为重构代码、使产品对客户更有用的机会。这并不意味着使用敏捷流程时编码会变得更容易；它意味着你的关注点不同了。在敏捷流程中，你不是专注于尽早确定需求和设计，而是专注于尽可能快速、频繁地向客户交付可工作的代码。你经常更改代码，并且整个团队拥有所有代码，因此只要合适，任何成员都有权更改任何内容。\n\
    \n你的代码有两个受众：\n\n*   作为代码编译版本目标的机器，即实际会被执行的部分。\n*   包括你自己在内的、为了理解和修改而*阅读*代码的人。\n\
    \n为此，你的代码需要满足需求、实现设计，同时还要可读且易于理解。我们将首先关注这些目标中的可读性和可理解性部分，然后探讨一些与性能和流程相关的问题。本章不会提供编写优秀代码的所有提示、技巧和技术；这方面有整本书的篇幅，其中一些列在章末的参考文献中。祝你好运！\n"
- fmt: "Before we continue, I’d be remiss if I didn’t suggest the two best books on\
    \ coding around. The first is Steve McConnell’s *Code Complete 2: A Practical\
    \ Handbook of Software Construction*, a massive, 960-page, tome that takes you\
    \ through what makes good code.^([1](#Chapter12.html#CH-12-FN-1)) McConnell discusses\
    \ everything from variable names, to function organization, to code layout, to\
    \ defensive programming, to controlling loops. It is in McConnell’s book where\
    \ the “software construction” metaphor comes from. The metaphor suggests that\
    \ building a software application is similar to constructing a building. Small\
    \ buildings (Fido’s dog house, for example) are easier to build, require less\
    \ planning, and are easier to change (refactor) if something goes wrong. Larger\
    \ buildings (your house) require more detail, more planning, and more coordination\
    \ largely because it’s more than a one-person job. Really big buildings (skyscrapers)\
    \ require many detailed levels of both design and planning, close coordination,\
    \ and many processes to handle change and errors. Although the building construction\
    \ model isn’t perfect – it doesn’t handle incremental development well and McConnell\
    \ also talks about an accretion model where one layer of software is added to\
    \ an existing layer much like a pearl is created in an oyster – the metaphor gives\
    \ you a clear view of the idea that software gets much more complicated and difficult\
    \ to build, the larger it gets.\n\nThe second classic book is Hunt and Thomas’,\
    \ *The Pragmatic Programmer*.^([2](#Chapter12.html#CH-12-FN-2)) The book is organized\
    \ as 46 short sections containing 70 tips that provide a clear vision of how you\
    \ should act as a programmer. It provides practical advice on a range of topics\
    \ from source code control, to testing, to assertions, to the DRY principle, some\
    \ of which we’ll cover later in this chapter. Hunt and Thomas themselves do the\
    \ best job of describing what the book and what pragmatic programming is all about,\n\
    \n__________\n\n¹ McConnell, S. *Code Complete 2: A Practical Handbook of Software\
    \ Construction*. Redmond, WA, Microsoft Press, 2004).\n\n² Hunt, A. and D. Thomas.\
    \ *The Pragmatic Programmer: From Journeyman to Master*. (Boston, MA: Addison-Wesley,\
    \ 2000).\n\n> *Programming is a craft. At its simplest, it comes down to getting\
    \ a computer to do what you want it to do (or what your user wants it to do).\
    \ As a programmer, you are part listener, part advisor, part interpreter, and\
    \ part dictator. You try to capture elusive requirements and find a way of expressing\
    \ them so that a mere machine can do them justice. You try to document your work\
    \ so that others can understand it, and you try to engineer your work so that\
    \ others can build on it. What’s more, you try to do all this against the relentless\
    \ ticking of the project clock. You work small miracles every day. It’s a difficult\
    \ job.^([3](#Chapter12.html#CH-12-FN-3))*\n\n### A coding example\n\nIn *Code\
    \ Complete*, Steve McConnell gives an example of bad code that is worth examining\
    \ so we can begin to see what the issues of readability, usability, and understandability\
    \ are about. I’ve converted it from C++ to Java, but the example is basically\
    \ McConnell’s.^([4](#Chapter12.html#CH-12-FN-4)) Here’s the code; we’ll look for\
    \ what’s wrong with it.\n\n```\nvoid HandleStuff(CORP_DATA inputRec, int crntQtr,\
    \ EMP_DATA empRec, Double estimRevenue,\n   double ytdRevenue, int screenx, int\
    \ screeny, Color newColor, Color prevColor, StatusType\n   status, int expenseType)\
    \ {\nint i;\nfor ( i = 0; i < 100; i++ )\n        {\n        inputRec.revenue[i]\
    \ = 0;\n        inputRec.expense[i] = corpExpense[crntQtr][i];\n        }\nUpdateCorpDatabase(\
    \ empRec );\nestimRevenue = ytdRevenue * 4.0 / (double) crntQtr;\nnewColor = prevColor;\n\
    status = SUCCESS;\nif ( expenseType == 1 ) {\n        for ( i = 0; i < 12; i++\
    \ )\n                profit[i] = revenue[i] – expense.type1[i];\n        }\nelse\
    \ if ( expenseType == 2 ) {\n                profit[i] = revenue[i] – expense.type2[i];\n\
    \        }\nelse if ( expenseType == 3 )\n                profit[i] = revenue[i]\
    \ – expense.type3[i];\n                }\n```\n\nSo what’s wrong with this code?\
    \ Well, what isn’t? Let’s make a list\n\n*   Because this is Java, it should have\
    \ a *visibility modifier*. No, it’s not required, but you should always put one\
    \ in. You are not writing for the compiler here, you are writing for the human.\
    \ Visibility modifiers make things explicit for the human reader.\n\n__________\n\
    \n³ Hunt, 2000.\n\n⁴ McConnell, 2004, p. 162.\n\n*   The method name is terrible.\
    \ `HandleStuff` doesn’t tell you anything about what the method does.\n*   Oh,\
    \ and the method does too many things. It seems to compute something called `profit`\
    \ based on an `expenseType`. But it also seems to change a color and indicate\
    \ a success. Methods should be small. They should do just one thing.\n*   Where\
    \ are the comments? There is no indication of what the parameters are or what\
    \ the method is supposed to do. All methods should tell you at least that.\n*\
    \   The layout is just awful. And it’s not consistent. The indentation is wrong.\
    \ Sometimes the curly braces are part of the statement, and sometimes they’re\
    \ separators. And are you sure that that last right curly brace really ends the\
    \ method?\n*   The method doesn’t protect itself from bad data. If the `crntQtr`\
    \ variable is zero, then the division in line 8 will return a divide-by-zero exception.\n\
    *   The method uses magic numbers including 100, 4.0, 12, 2, and 3. Where do they\
    \ come from? What do they mean? Magic numbers are bad.\n*   The method has way\
    \ too many input parameters. If we knew what the method was supposed to do maybe\
    \ we could change this.\n*   There are also at least two input parameters – `screenx`\
    \ and `screeny` – that aren’t used at all. This is an indication of poor design;\
    \ this method’s interface may be used for more than one purpose and so it is “fat,”\
    \ meaning it has to accommodate all the possible uses.\n*   The variables `corpExpense`\
    \ and `profit` are not declared inside the method, so they are either instance\
    \ variables or class variables. This can be dangerous. Because instance and class\
    \ variables are visible inside every method in the class, we can also change their\
    \ values inside any method, generating a side effect. Side effects are bad.\n\
    *   Finally, the method doesn’t consistently adhere to the Java naming conventions.\
    \ Tsk, tsk.\n\nSo this example is terrible code for a bunch of different reasons.\
    \ In the rest of the chapter we’ll take a look at the general coding rules that\
    \ are violated here and give suggestions for how to make your code correct, readable,\
    \ and maintainable.\n\n### Functions and Methods and Size, Oh My!\n\nFirst things\
    \ first. Your classes, functions, and methods should all *do just one thing*.\
    \ This is the fundamental idea behind encapsulation. Having your methods do just\
    \ one thing isolates errors and makes them easier to find. It encourages re-use\
    \ because small, single feature methods are easier to use in different classes.\
    \ Single feature (and single layer of abstraction) classes are also easier to\
    \ re-use.\n\nSingle feature implies small. Your methods/functions should be small.\
    \ And I mean small – 20 lines of executable code is a good upper bound for a function.\
    \ Under no circumstances should you write 300 line functions. I know, I’ve done\
    \ it. It’s not pretty. Back in [Chapter 7](#Chapter07.html#ch7) we talked about\
    \ *stepwise refinement* and *modular decomposition*. Taking an initial function\
    \ definition and re-factoring it so that it does just a single small thing will\
    \ decompose your function into two or more smaller, easier to understand and easier\
    \ to maintain functions. Oh, and as we’ll see in [Chapter 14](#Chapter14.html#ch14),\
    \ smaller functions are easier to test because they require fewer unit tests (they\
    \ have fewer ways to get through the code). As the book said, *Small is Beautiful*."
  raw: 'Before we continue, I’d be remiss if I didn’t suggest the two best books on
    coding around. The first is Steve McConnell’s *Code Complete 2: A Practical Handbook
    of Software Construction*, a massive, 960-page, tome that takes you through what
    makes good code.^([1](#Chapter12.html#CH-12-FN-1)) McConnell discusses everything
    from variable names, to function organization, to code layout, to defensive programming,
    to controlling loops. It is in McConnell’s book where the “software construction”
    metaphor comes from. The metaphor suggests that building a software application
    is similar to constructing a building. Small buildings (Fido’s dog house, for
    example) are easier to build, require less planning, and are easier to change
    (refactor) if something goes wrong. Larger buildings (your house) require more
    detail, more planning, and more coordination largely because it’s more than a
    one-person job. Really big buildings (skyscrapers) require many detailed levels
    of both design and planning, close coordination, and many processes to handle
    change and errors. Although the building construction model isn’t perfect – it
    doesn’t handle incremental development well and McConnell also talks about an
    accretion model where one layer of software is added to an existing layer much
    like a pearl is created in an oyster – the metaphor gives you a clear view of
    the idea that software gets much more complicated and difficult to build, the
    larger it gets.


    The second classic book is Hunt and Thomas’, *The Pragmatic Programmer*.^([2](#Chapter12.html#CH-12-FN-2))
    The book is organized as 46 short sections containing 70 tips that provide a clear
    vision of how you should act as a programmer. It provides practical advice on
    a range of topics from source code control, to testing, to assertions, to the
    DRY principle, some of which we’ll cover later in this chapter. Hunt and Thomas
    themselves do the best job of describing what the book and what pragmatic programming
    is all about,


    __________


    ¹ McConnell, S. *Code Complete 2: A Practical Handbook of Software Construction*.
    Redmond, WA, Microsoft Press, 2004).


    ² Hunt, A. and D. Thomas. *The Pragmatic Programmer: From Journeyman to Master*.
    (Boston, MA: Addison-Wesley, 2000).


    > *Programming is a craft. At its simplest, it comes down to getting a computer
    to do what you want it to do (or what your user wants it to do). As a programmer,
    you are part listener, part advisor, part interpreter, and part dictator. You
    try to capture elusive requirements and find a way of expressing them so that
    a mere machine can do them justice. You try to document your work so that others
    can understand it, and you try to engineer your work so that others can build
    on it. What’s more, you try to do all this against the relentless ticking of the
    project clock. You work small miracles every day. It’s a difficult job.^([3](#Chapter12.html#CH-12-FN-3))*


    ### A coding example


    In *Code Complete*, Steve McConnell gives an example of bad code that is worth
    examining so we can begin to see what the issues of readability, usability, and
    understandability are about. I’ve converted it from C++ to Java, but the example
    is basically McConnell’s.^([4](#Chapter12.html#CH-12-FN-4)) Here’s the code; we’ll
    look for what’s wrong with it.


    `void HandleStuff(CORP_DATA inputRec, int crntQtr, EMP_DATA empRec, Double estimRevenue,`

    `   double ytdRevenue, int screenx, int screeny, Color newColor, Color prevColor,
    StatusType`

    `   status, int expenseType) {`

    `int i;`

    `for ( i = 0; i < 100; i++ )`

    `        {`

    `        inputRec.revenue[i] = 0;`

    `        inputRec.expense[i] = corpExpense[crntQtr][i];`

    `        }`

    `UpdateCorpDatabase( empRec );`

    `estimRevenue = ytdRevenue * 4.0 / (double) crntQtr;`

    `newColor = prevColor;`

    `status = SUCCESS;`

    `if ( expenseType == 1 ) {`

    `        for ( i = 0; i < 12; i++ )`

    `                profit[i] = revenue[i] – expense.type1[i];`

    `        }`

    `else if ( expenseType == 2 ) {`

    `                profit[i] = revenue[i] – expense.type2[i];`

    `        }`

    `else if ( expenseType == 3 )`

    `                profit[i] = revenue[i] – expense.type3[i];`

    `                }`


    So what’s wrong with this code? Well, what isn’t? Let’s make a list


    *   Because this is Java, it should have a *visibility modifier*. No, it’s not
    required, but you should always put one in. You are not writing for the compiler
    here, you are writing for the human. Visibility modifiers make things explicit
    for the human reader.


    __________


    ³ Hunt, 2000.


    ⁴ McConnell, 2004, p. 162.


    *   The method name is terrible. `HandleStuff` doesn’t tell you anything about
    what the method does.

    *   Oh, and the method does too many things. It seems to compute something called
    `profit` based on an `expenseType`. But it also seems to change a color and indicate
    a success. Methods should be small. They should do just one thing.

    *   Where are the comments? There is no indication of what the parameters are
    or what the method is supposed to do. All methods should tell you at least that.

    *   The layout is just awful. And it’s not consistent. The indentation is wrong.
    Sometimes the curly braces are part of the statement, and sometimes they’re separators.
    And are you sure that that last right curly brace really ends the method?

    *   The method doesn’t protect itself from bad data. If the `crntQtr` variable
    is zero, then the division in line 8 will return a divide-by-zero exception.

    *   The method uses magic numbers including 100, 4.0, 12, 2, and 3. Where do they
    come from? What do they mean? Magic numbers are bad.

    *   The method has way too many input parameters. If we knew what the method was
    supposed to do maybe we could change this.

    *   There are also at least two input parameters – `screenx` and `screeny` – that
    aren’t used at all. This is an indication of poor design; this method’s interface
    may be used for more than one purpose and so it is “fat,” meaning it has to accommodate
    all the possible uses.

    *   The variables `corpExpense` and `profit` are not declared inside the method,
    so they are either instance variables or class variables. This can be dangerous.
    Because instance and class variables are visible inside every method in the class,
    we can also change their values inside any method, generating a side effect. Side
    effects are bad.

    *   Finally, the method doesn’t consistently adhere to the Java naming conventions.
    Tsk, tsk.


    So this example is terrible code for a bunch of different reasons. In the rest
    of the chapter we’ll take a look at the general coding rules that are violated
    here and give suggestions for how to make your code correct, readable, and maintainable.


    ### Functions and Methods and Size, Oh My!


    First things first. Your classes, functions, and methods should all *do just one
    thing*. This is the fundamental idea behind encapsulation. Having your methods
    do just one thing isolates errors and makes them easier to find. It encourages
    re-use because small, single feature methods are easier to use in different classes.
    Single feature (and single layer of abstraction) classes are also easier to re-use.


    Single feature implies small. Your methods/functions should be small. And I mean
    small – 20 lines of executable code is a good upper bound for a function. Under
    no circumstances should you write 300 line functions. I know, I’ve done it. It’s
    not pretty. Back in [Chapter 7](#Chapter07.html#ch7) we talked about *stepwise
    refinement* and *modular decomposition*. Taking an initial function definition
    and re-factoring it so that it does just a single small thing will decompose your
    function into two or more smaller, easier to understand and easier to maintain
    functions. Oh, and as we’ll see in [Chapter 14](#Chapter14.html#ch14), smaller
    functions are easier to test because they require fewer unit tests (they have
    fewer ways to get through the code). As the book said, *Small is Beautiful*.'
