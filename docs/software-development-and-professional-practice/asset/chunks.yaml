    recursion, activation record, and the like). This is usually worse than an American
    in Paris; at least there, both sides can pantomime their needs and figure things
    out. With problems of domain understanding, the best you can usually do is order
    drinks together.


    There are usually two ways to overcome problems of understanding. The first is
    to have someone in the middle who has lived in both worlds and who can translate
    between the two. Some companies have folks called *system engineers* or *technical
    marketers* who fulfill this role. These folks have done development and have also
    worked the customer side of things so they can speak both languages. Good system
    engineers are worth their weight in use-cases. The second way to promote understanding
    is to have the customer as part of the development team. This is the approach
    taken by some agile methodologies, notably XP. When the customer is part of the
    development team you get to talk to them every day, ask them questions, teach
    them technical stuff. Both sides benefit. And because the on-site customer sees
    intermediate product builds as soon as they pop out of your build machine, you
    get immediate feedback. Win, win, win.


