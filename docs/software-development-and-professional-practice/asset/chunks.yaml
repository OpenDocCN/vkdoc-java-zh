    ### 循环是你的朋友


    > *最佳实践是迭代并增量交付，将每次迭代视为一个封闭的“迷你项目”，包括完整的需求、设计、编码集成、测试和内部交付。在迭代截止日期，向内部利益相关者交付迄今为止（经过全面测试、全面集成）的系统。征求他们对这项工作的反馈，并将该反馈纳入下一次迭代的计划中。*

    >

    > （摘自《敏捷项目如何成功》⁴）


    虽然带反馈的瀑布模型认识到并非所有需求都能提前知晓，并且在架构设计和详细设计中会犯错误，但它并未将这些认识充分融入流程中。迭代流程模型使流程步骤中所需的这种变更更加明确，并创建了逐步构建产品的流程模型。


    在大多数迭代流程模型中，你会获取已知的需求——在流程早期某个时间点对需求进行快照——并根据客户对哪些功能最重要、需要优先交付的排序，对这些需求进行优先级排序。


    然后，你选择最高优先级的需求，并规划一系列迭代，其中每次迭代都是一个完整的项目。对于每次迭代，你将添加一组次高优先级的需求（包括你在前一次迭代中可能发现的一些需求），并重复该项目。通过在每次迭代结束时，使用需求子集完成一个完整的项目，你最终会得到一个完整、可运行且健壮的产品，尽管其功能比最终产品要少。


    根据汤姆·德马科的说法，这些迭代过程遵循一条基本规则：


    > *你的项目，整个项目，有一个二元交付物。在计划完成的那一天，项目要么交付了一个被用户接受的系统，要么没有。每个人在那一天都知道结果。*

    >

    > *构建项目模型的目标是将项目划分为多个组成部分，每个部分都具有相同的特征：每个活动必须由一个具有客观完成标准的交付物来定义。这些交付物要么明确完成，要么未完成。*
    ⁵


    那么，如果你的估算错误会发生什么？如果你决定在一次迭代中包含太多新功能呢？如果出现意外延迟呢？


    ______________


    ⁴[www.adaptionsoft.com/on_time.html](http://www.adaptionsoft.com/on_time.html)


    ⁵德马科，T. *《控制软件项目：管理、度量与估算》*。（上 saddle 河，新泽西州：Yourdon 出版社，1983 年。）


    嗯，如果看起来你无法赶上迭代截止日期，那么只有两种现实的选择：推迟截止日期，或移除功能。当我们讨论估算和进度安排时，会再回到这个问题。


    迭代开发的关键在于“过一种平衡的生活——每天学一点、想一点、画一点、唱一点、跳一点、玩一点、工作一点”，⁶ 或者在软件开发领域，每天*分析*一点、*设计*一点、*编码*一点、*测试*一点。当我们讨论敏捷开发模型时，会再次探讨这个想法。


    ### 增量模型的演进


    实现增量模型的传统方式被称为*演进式原型法*。⁷ 在演进式原型法中，随着需求的接收，人们对其进行优先级排序，并生成一系列功能日益丰富的产品版本。每个版本都根据客户反馈以及集成测试和系统测试的结果进行改进。对于需求不断变化或模糊不清的环境，或者对应用领域理解不足的情况，这是一个极好的模型。这也是演变为现代敏捷开发流程的模型。参见图
    2-4。


    ![images](img/0204.jpg)


    ***图 2-4.** 演进式原型法流程模型*


    ______________


    ⁶富尔格姆，R. *《我真正需要知道的一切，在幼儿园就学会了》*。修订版。（纽约，纽约州：Ballantine 图书，2004 年。）


    ⁷麦康奈尔，S. *《快速开发：驯服疯狂软件进度》*。（雷德蒙德，华盛顿州：微软出版社，1996 年。）


    演进式原型法认识到，从一开始就规划整个项目非常困难，并且反馈是良好分析和设计的关键要素。从进度安排的角度来看，它有一定风险，但与瀑布模型的任何变体相比，它有着非常好的成功记录。演进式原型法为客户和项目管理提供了更好的进度可见性。它还能为产品需求提供良好的客户和最终用户输入，并在对这些需求进行优先级排序方面表现出色。


    不利的一面是，演进式原型法可能导致不切实际的进度、预算超支以及过于乐观的进度预期。这些情况之所以会发生，是因为原型中实现的需求数量有限，可能会让人误以为少量工作就能取得真正的进展。另一方面，在原型中放入过多需求可能导致进度延误，原因在于过于乐观的估算。这是一个难以维持的微妙平衡。由于设计会随着需求的变化而随时间演进，因此存在设计不良的可能性，除非有重新设计的准备——随着项目的推进以及客户对某个特定产品版本的投入越来越大，重新设计会变得越来越困难。此外，还存在可维护性低的可能性，同样是因为设计和代码会随着需求的变化而演进。这可能导致大量返工、进度延误，以及发布后修复缺陷的难度增加。


    演进式原型法最适合那些紧密合作、曾共同完成多个项目的经验丰富的团队。这种凝聚力强的团队高效且灵活，能够专注于每次迭代，并且通常能产生一系列原型所需的连贯、可扩展的设计。通常不建议经验不足的团队采用此模型。

    '
- fmt: '### Agile Is as Agile Does


    Starting in the mid 1990s, a group of process mavens began advocating a new model
    for software development. As opposed to the heavyweight plan-driven models mentioned
    above and espoused by groups like the Software Engineering Institute (SEI) at
    Carnegie Mellon, this new process model was lightweight. It required less documentation
    and fewer process controls. It was targeted at small to medium-sized software
    projects and smaller teams of developers. It was intended to allow these teams
    of developers to quickly adjust to changing requirements and customer demands,
    and it proposed to release completed software much more quickly than the plan-driven
    models. It was, in a word, agile.


    Agile development works from the proposition that the goal of any software development
    project is working code. And because the focus is on working software, then the
    development team should spend most of their time writing code, not writing documents.
    This gives these processes the name lightweight.


    Lightweight methodologies have several characteristics. They tend to emphasize
    writing tests before code, frequent product releases, significant customer involvement
    in development, common code ownership, and refactoring – rewriting code to make
    it simpler and easier to maintain. Lightweight methodologies also suffer from
    several myths. The two most pernicious are probably that lightweight processes
    are only good for very small projects, and that you don''t have to have any process
    discipline in a lightweight project.


    The truth is that lightweight methodologies have been successfully used in many
    small and medium-sized projects – say up to about 500K lines of code. Lightweight
    methodologies also require process discipline, especially in the beginning of
    a project when initial requirements and an iteration cycle are created and in
    the test-driven-development used as the heart of the coding process.


    ______________


    ⁸Paulk, M. C. (1995)


    ⁹Cockburn, A. *Agile Software Development.* (Boston, MA: Addison-Wesley, 2002.)


    We''ll look at two lightweight/agile methodologies, eXtreme Programming, and Scrum.


    ### eXtreme Programming (XP)


    eXtreme Programming was created around 1995 by Kent Beck and Ward Cunningham.
    XP is a “lightweight, efficient, low-risk, flexible, predictable, scientific,
    and fun way to develop software.”


    ### XP Overview


    XP relies on the following four fundamental ideas:


    *   *Heavy customer involvement*: XP requires that a customer representative be
    part of the development team and be on site at all times. The customer representative
    works with the team to create the contents of each iteration of the product, and
    she creates all the acceptance tests for each interim release.

    *   *Continuous unit testing* (also known as test-driven development [TDD]): XP
    calls for developers to write the unit tests for any new features before any of
    the code is written. In this way the tests will, of course, initially all fail,
    but it gives a developer a clear metric for success. When all the unit tests pass,
    you''ve finished implementing the feature.

    *   *Pair programming*: XP requires that all code be written by pairs of developers.
    In a nutshell, pair programming requires two programmers – a driver and a navigator
    – who share a single computer. The driver is actually writing the code while the
    navigator watches, catching typos, making suggestions, thinking about design and
    testing, and so on. The pair switches places periodically (every 30 minutes or
    so, or when one of them thinks he has a better way of implementing a piece of
    code). Pair programming works on the “two heads are better than one” theory. While
    a pair of programmers is not quite as productive as two individual programmers
    when it comes to number of lines of code written per unit of time, their code
    usually contains fewer defects, and they have a set of unit tests to show that
    it works. This makes them more productive overall. Pair programming also provides
    the team an opportunity to re-factor existing code – to re-design it to make it
    as simple as possible while still meeting the customer''s requirements. Pair programming
    is not exclusive to XP, but XP was the first discipline to use it exclusively.

    *   *Short iteration cycles and frequent releases*: XP typically uses release
    cycles in the range of just a few months and each release is composed of several
    iterations, each on the order of 4–6 weeks. The combination of frequent releases
    and an on-site customer representative allows the XP team to get immediate feedback
    on new features and to uncover design and requirements issues early. XP also requires
    constant integration and building of the product. Whenever a programming pair
    finishes a feature and it passes all their unit tests, they immediately integrate
    and build the entire product. They then use all the unit tests as a regression
    test suite to make sure the new feature hasn''t broken anything already checked
    in. If it does break something, they fix it immediately. So in an XP project,
    integrations and builds can happen several times a day. This process gives the
    team a good feel for where they are in the release cycle every day and gives the
    customer a completed build on which to run the acceptance tests.


    ______________


    ^(10)This is a very short description of how XP works; for a much more eloquent
    and detailed explanation, really the bible of XP, see:

    Beck, K. *Extreme Programming Explained: Embrace Change.* (Boston, MA: Addison-Wesley,
    2000.)


    ### XP Motivation


    Risk is the most basic problem in software. Risk manifests itself in many ways:
    schedule slips, project cancelation, increased defect rates, misunderstanding
    of the business problem, false feature rich (you''ve added features the customer
    really doesn''t want or need), and staff turnover. Managing risk is a very difficult
    and time-consuming management problem. Minimizing and handling risk are the key
    areas of risk management. XP seeks to minimize risk by controlling the four variables
    of software development.'
