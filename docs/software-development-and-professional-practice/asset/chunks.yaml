    \ An interface that defines our ice cream objects\n> \n> `VanillaIceCream`: A\
    \ concrete class that inherits from *`IceCream`*\n> \n> `ChocolateIceCream`: A\
    \ concrete class that inherits from *`IceCream`*\n> \n> `StrawberryIceCream`:\
    \ A concrete class that inherits from *`IceCream`*\n> \n> *`Factory`*: An interface\
    \ that defines the methods used to make *`IceCream`* objects\n> \n> `IceCreamFactory`:\
    \ Our concrete implementation of the `Factory` interface that makes different\
    \ *`IceCream`* objects\n> \n> `IceCreamStore`: A driver class that lets us make\
    \ and sell ice cream\n\nOur `IceCream` interface could look like:\n\n`public interface\
    \ IceCream {`\n`        public  void yummy();`\n`        // plus other methods`\n\
    `}`\n\nand our ice cream flavors end up as concrete classes:\n\n`public class\
    \ VanillaIceCream implements IceCream {`\n`        public void yummy() {`\n`                System.out.println(\"\
    Vanilla!\");`\n`        }`\n`}`\n\n`public class ChocolateIceCream implements\
    \ IceCream {`\n`        public void yummy() {`\n`                System.out.println(\"\
    Chocolate!\")`\n`        }`\n\n`}`\n`public class StrawberryIceCream implements\
    \ IceCream {`\n`        public void yummy() {`\n`                System.out.println(\"\
    Strawberry!\");`\n`        }`\n`}`\n\nThe Factory pattern depends on defining\
    \ an interface for the factory and then allowing subclasses that implement that\
    \ interface to actually create the objects; our `Factory` interface will look\
    \ something like the following:\n\n`public interface Factory {`\n`        public  IceCream\
    \ makeIceCream(String type);`\n`        // and other methods here to sell, package\
    \ and transport`\n`        // the ice cream`\n`}`\n\nAnd finally, our concrete\
    \ *`IceCreamFactory`* which will implement the *`makeIceCream()`* method from\
    \ the *`Factory`* interface and actually make an `IceCream` object looks like\
    \ this:\n\n`public class IceCreamFactory implements Factory {`\n`        public\
    \ IceCream makeIceCream(String type) {`\n`                IceCream newIceCream\
    \ = null;`\n`                if (type.equals(\"Vanilla\")) {`\n`                        newIceCream\
    \ = new VanillaIceCream();`\n`                } else if (type.equals(\"Chocolate\"\
    )) {`\n`                        newIceCream = new ChocolateIceCream();`\n`                }\
    \ else if (type.equals(\"Strawberry\")) {`\n`                        newIceCream\
    \ = new StrawberryIceCream();`\n`                }`\n`                return newIceCream;`\n\
    `        }`\n`}`\n\nIn order to test our factory we create a driver – our ice\
    \ cream store!\n\n`public class IceCreamStore {`\n`        public static void\
    \ main (String [] args) {`\n`                IceCreamFactory myStore = new IceCreamFactory();`\n\
    `                IceCream vanilla = myStore.makeIceCream(\"Vanilla\");`\n`                vanilla.yummy();`\n\
    `                IceCream choco = myStore.makeIceCream(\"Chocolate\");`\n`                choco.yummy();`\n\
    `                IceCream straw = myStore.makeIceCream(\"Strawberry\");`\n`                straw.yummy();`\n\
    `        }`\n`}`\n\n[Figure 11-1](#Chapter11.html#fig_11_1) shows what these look\
    \ like in a version of UML.\n\n![images](images/1101.jpg)\n\n***Figure 11-1.**\
    \ The Ice Cream Store using an IceCreamFactory*\n\nWhat to notice about this Factory\
    \ pattern example? Well, how about the following:\n\n*   The factory method (*`makeIceCream()`*)\
    \ encapsulates the creation of the `IceCream` object. Our driver just tells the\
    \ factory which ice cream to make.\n*   The *`Factory`* interface provides the\
    \ interface for the subclasses to create the actual objects.\n*   The `IceCreamFactory`\
    \ concrete class actually creates the objects by implementing the `makeIceCream()`\
    \ method. This also implies that other concrete classes that implement `Factory`\
    \ could do the same.\n*   This leaves the *`IceCream`* classes alone, and makes\
    \ it easier for the `IceCreamStore` to create new objects.\n*   Notice also that\
    \ the `IceCreamStore` class only deals with *`IceCream`* objects. It doesn’t have\
    \ to know anything about particular types of ice cream. The concrete *`IceCream`*\
    \ objects implement the methods from the *`IceCream`* interface and the `IceCreamStore`\
    \ just uses them regardless of which type of *`IceCream`* you’ve created.\n* \
    \  It also means that you can change the implementation of a particular type of\
    \ *`IceCream`* without changing either the interface or the `IceCreamStore`. What\
    \ a concept!\n\n#### Structural Patterns\n\nStructural patterns help you put objects\
    \ together so you can use them more easily. They are all about grouping objects\
    \ together and providing ways for objects to coordinate to get work done. Remember,\
    \ composition, aggregation, delegation, and inheritance are all about structure\
    \ and coordination. The Structural pattern we'll look at here – the Adapter –\
    \ is all about getting classes to work together."
