- fmt: "### The Open-Closed Principle (OCP)\n\nClasses should be open for extension\
    \ and closed for modification.^([1](#Chapter10.html#CH-10-FN-1))\n\nFind the behavior\
    \ that does not vary and abstract that behavior up into a super/base class. That\
    \ locks the base code away from modification but all subclasses will inherit that\
    \ behavior. You are encapsulating the behavior that varies in the subclasses (those\
    \ classes that extend the base class) and closing the base class from modification.\
    \ The bottom line here is that in your well-designed code, you add new features\
    \ not by modifying existing code (it’s closed for modification), but by adding\
    \ new code (it’s open for extension).\n\nThe `BankAccount` class example that\
    \ we did in the previous chapter is a classic example of the Open-Closed Principle\
    \ at work. In that example, we abstracted all the personal information into the\
    \ abstract `BankAccount` class, closed it from modification and then extended\
    \ that class into the different types of bank accounts. In this situation it is\
    \ very easy to add new types of bank accounts just by extending the `BankAccount`\
    \ class again. We avoid duplication of code, and we preserve the integrity of\
    \ the `BankAccount` properties. See [Figure 10-6](#Chapter10.html#fig_10_6).\n\
    \n___________________\n\n¹ Larman, C. “Protected Variation: The Importance of\
    \ Being Closed.” *IEEE Software* 18(3): 89-91. 2001.\n\n![images](images/1006.jpg)\n\
    \n***Figure 10-6.** The classic BankAccount example for OCP*\n\nFor example, in\
    \ the `BankAccount` class we define the `withdraw()` method that allows a customer\
    \ to withdraw funds from an account. But the way in which withdrawals occur can\
    \ differ in each of the extended account classes. While the `withdraw()` method\
    \ is closed for modification in the `BankAccount` class it can be overridden in\
    \ the subclasses to implement the specific rules for that type of account and\
    \ thus extend the power of the method. It’s closed for modification but open for\
    \ extension.\n\nThe Open-Closed Principle doesn’t have to be limited to inheritance\
    \ either. If you have several private methods in a class, those methods are closed\
    \ for modification, but if you then create one or more public methods that use\
    \ the private methods, you’ve opened up the possibility of extending those private\
    \ methods by adding functionality in the public methods. Think outside the box\
    \ – er, class.\n\n### Don’t Repeat Yourself Principle (DRY)\n\nAvoid duplicate\
    \ code by abstracting out things that are common and placing those things in a\
    \ single location.^([2](#Chapter10.html#CH-10-FN-2))\n\nDRY is the motherhood\
    \ and apple pie design principle. It’s been handed down ever since developers\
    \ started thinking about better ways to write programs. Go back and look at Chapters\
    \ 6 and 7 if you don’t believe me. With DRY you have each piece of information\
    \ and each behavior in a single place in the design. Ideally you have one requirement\
    \ in one place. This means that you should create your design so that there is\
    \ one logical place where a requirement is implemented. Then if you have to change\
    \ the requirement you have only one place to look to make the change. You also\
    \ remove duplicate code and replace it with method calls. If you are duplicating\
    \ code, you are duplicating behavior.\n\n___________________\n\n² Hunt, A. and\
    \ D. Thomas. *The Pragmatic Programmer: From Journeyman to Master*. (Boston, MA:\
    \ Addison-Wesley, 2000.)\n\nDRY doesn’t have to apply just to your code either.\
    \ It’s always a good idea to comb your feature list and requirements for duplications.\
    \ Rewriting requirements to avoid duplicating features in the code will make your\
    \ code much easier to maintain.\n\nConsider the final version of the B⁴++ bird\
    \ feeder that we discussed in the last chapter. The last thing we worked on was\
    \ adding a song identifier to the feeder so that the feeding doors would open\
    \ and close automatically. But let's look at the two use cases we ended up with\
    \ (see [Table 10-1](#Chapter10.html#tab_10_1)).\n\n***Table 10-1.** The Song Identifier\
    \ Use Case and Its Alternate*\n\n| **Main Path** | **Alternate Path** |\n| ---\
    \ | --- |\n| 1. Alice hears or sees birds at the bird feeder. | 1.1 The songbird\
    \ identifier hears birdsong. |\n| 2. Alice determines that they are *not* songbirds.\
    \ | 2.1 The songbird identifier recognizes the song as from an unwanted bird.\
    \ |\n| 3. Alice presses the remote control button. | 3.1 The song bird identifier\
    \ sends a message to the feeding doors to close. |\n| 4. The feeding doors close.\
    \ |  |\n| 5. The birds give up and fly away. | 5.1 The songbird identifier hears\
    \ birdsong. \n5.2 The songbird identifier recognizes the song as from a songbird.\
    \ |\n| 6. Alice presses the remote control button. | 6.1 The songbird identifier\
    \ sends a message to the feeding doors to open. |\n| 7. The feeding doors open\
    \ again. |  |\n\nNotice that we’re opening and closing the feeding doors in two\
    \ different places, via the remote control and via the song identifier. But if\
    \ you think about it, regardless of where we request the doors to be open or closed,\
    \ they always open and close in the same way. So this is a classic opportunity\
    \ to abstract out the open and close door behavior and put them in a single place,\
    \ say the `FeedingDoor` class. DRY at work!"
