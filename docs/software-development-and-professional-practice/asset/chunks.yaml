- fmt: "# Wrapping It all Up\n\n> *All programmers are optimists. Perhaps this modern\
    \ sorcery especially attracts those who believe in happy endings and fairy godmothers.\
    \ Perhaps the hundreds of nitty frustrations drive away all but those who habitually\
    \ focus on the end goal. Perhaps it is merely that computers are young, programmers\
    \ are younger, and the young are always optimists.*\n> \n> —Frederick Brooks,\
    \ Jr.^([1](#Chapter16.html#CHP-16-FN-1))\n> \n> *It's the only job I can think\
    \ of where I get to be both an engineer and an artist. There's an incredible,\
    \ rigorous, technical element to it, which I like because you have to do very\
    \ precise thinking. On the other hand, it has a wildly creative side where the\
    \ boundaries of imagination are the only real limitation.*\n> \n> —Andy Hertzfeld\n\
    \nReading Alex E. Bell's^([2](#Chapter16.html#CHP-16-FN-2)) and Mark Guzdial's^([3](#Chapter16.html#CHP-16-FN-3))\
    \ “Viewpoint” columns in the August 2008 issue of *Communications of the ACM*,\
    \ I was struck by the synergy of the two articles. One is a cautionary tale about\
    \ the tools to use in professional software development, and the other is, at\
    \ least in part, a cautionary tale about language and syntax use in teaching programming.\
    \ This got me to thinking about all the silver bullets we've tried in both development\
    \ and education, and why most of them don't matter to real software development.\
    \ This seems like an appropriate way to wrap up this discussion on software development.\n\
    \n__________\n\n¹ Brooks, F. P. *The Mythical Man-Month: Essays on Software Engineering,\
    \ Silver Anniversary Edition.* (Boston, MA: Addison-Wesley, 1995.)\n\n² Bell,\
    \ A. E. “Software Development Amidst the Whiz of Silver Bullets,” *Communications\
    \ of the ACM,* 51, 8 (August 2008), 22-24.\n\n³ Guzdial, M. “Paving the Way for\
    \ Computational Thinking,” *Communications of the ACM,* 51, 8 (August 2008), 25-27.\n\
    \n## What Have You Learned?\n\nAs I've said more than once in this book, software\
    \ development is hard. I don't think that everyone can do it, and of those that\
    \ can, I think few do it extremely well all the time. That, of course, is the\
    \ attraction. Nobody really wants to work on easy problems. The challenge is to\
    \ work on something you've never done before, something you might not even know\
    \ if you can solve. That's what has you coming back to creating software again\
    \ and again.\n\nSoftware development is one of the most creative things a human\
    \ can do. Out of nothing, one takes a problem, wrestles with it, explores it,\
    \ pokes at it, rips it apart and puts it back in a different form, comes up with\
    \ that bit of inspiration that leads to a solution, and then converts it into\
    \ an artifact that others can use effortlessly. Having others use your program\
    \ to solve their problems is just the coolest thing.\n\nWriting software is a\
    \ humbling experience. It is so hard to get software right and so easy to get\
    \ wrong. In writing software, I've learned to embrace failure. Failure is an exciting\
    \ and frustrating part of the process. From failure, you learn about yourself:\
    \ you learn how you approach problems, you learn the types of mistakes you're\
    \ prone to make, and you learn how to work around them. Failure teaches you perseverance\
    \ because you just have to keep working until the program does.\n\nSmall teams\
    \ build most software, and they build the best software. Small, highly motivated\
    \ and empowered teams are the most productive. Small teams also tend to use a\
    \ slimmed down development process. Unless you work for a large company that's\
    \ desperate to be at SEI Capability Maturity Model Level 5,^([4](#Chapter16.html#CHP-16-FN-4))\
    \ your processes can be very sparse. Detailed problem descriptions, brainstorming\
    \ design sessions, simple configuration management, code reviews, and a separate\
    \ testing team take care of everything necessary to create almost defect-free\
    \ code. Process flexibility, communication, and ownership are the keys to project\
    \ success.\n\nA lot of really good software gets written, tested, and shipped\
    \ every year; much more than the alleged “failure” numbers would have one believe.^([5](#Chapter16.html#CHP-16-FN-5))\
    \ The key issue that divides plan-driven development and agile development is\
    \ the recognition of the constant changes in requirements. The best thing about\
    \ agile development is that it recognizes this fact and builds refactoring into\
    \ its process.\n\nSimple tools are the most effective. Simple tools allow you\
    \ to cut to the heart of a problem and examine it closely with nothing in your\
    \ way. They allow you to take it out, hold it in your hands, turn it over, and\
    \ poke at it quickly and easily. Simple tools also allow you to join them together\
    \ to do more complicated things. I'll just point you to Stephen Jenkins' article\
    \ on “Old School” programming.^([6](#Chapter16.html#CHP-16-FN-6)) He's said it\
    \ much better than I could.\n\nCoding, debugging, and unit testing are at least\
    \ as important as design. Experience gives a good programmer a deep sense of design\
    \ and a wealth of patterns to draw on; experience gives a great programmer a deep,\
    \ intimate knowledge of the programming language that is their tool. It's this\
    \ deep, intimate knowledge that produces beautiful code.\n\nThe process of debugging\
    \ a long, complex program is an immensely rewarding endeavor. Isolating a problem,\
    \ uncovering your mistakes, building debugging scaffolding, hypothesizing a solution,\
    \ reworking a design, finally identifying the error, and then creating a correct\
    \ fix gives one such a rush of elation and satisfaction that it's at times nearly\
    \ overwhelming.\n\n__________\n\n⁴ Paulk, M. C. *The Capability Maturity Model:\
    \ Guidelines for Improving the Software Process.* (Reading, MA: Addison-Wesley,\
    \ 1995.)\n\n⁵ Glass, R. “The Standish Report: Does It Really Describe a Software\
    \ Crisis?,” *Communications of the ACM*, 49, 8 (August 2006), 15-16.\n\n⁶ Jenkins,\
    \ S. B. “Musings of an ‘Old-School’ Programmer,” *Communications of the ACM*,\
    \ 49, 5 (May 2006), 124-126."
