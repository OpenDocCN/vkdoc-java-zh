- fmt: "### Loops Are Your Friend\n\n> *The best practice is to iterate and deliver\
    \ incrementally, treating each iteration as a closed-end “mini-project,” including\
    \ complete requirements, design, coding integration, testing, and internal delivery.\
    \ On the iteration deadline, deliver the (fully-tested, fully-integrated) system\
    \ thus far to internal stakeholders. Solicit their feedback on that work, and\
    \ fold that feedback into the plan for the next iteration.*\n> \n> (from “How\
    \ Agile Projects Succeed”[⁴](#Chapter02.html#CHP-2-FN-4))\n\nWhile the waterfall\
    \ with feedback model recognizes that all the requirements aren't typically known\
    \ in advance, and that mistakes will be made in architectural design and detailed\
    \ design, it doesn't go far enough in taking those realizations into the process.\
    \ Iterative process models make this required change in process steps more explicit\
    \ and create process models that build products a piece at a time.\n\nIn most\
    \ iterative process models, you'll take the known requirements – you'll take a\
    \ snapshot of the requirements at some time early in the process – and prioritize\
    \ them, typically based on the customer's ranking of what features are most important\
    \ to deliver first.\n\nYou then pick the highest priority requirements and plan\
    \ a series of iterations, where each iteration is a complete project. For each\
    \ iteration, you'll add a set of the next highest priority requirements (including\
    \ some you may have discovered during the previous iteration) and repeat the project.\
    \ By doing a complete project with a subset of the requirements every time at\
    \ the end of each iteration you end up with a complete, working, and robust product,\
    \ albeit with fewer features than the final product will have.\n\nAccording to\
    \ Tom DeMarco, these iterative processes follow one basic rule:\n\n> *Your project,\
    \ the whole project, has a binary deliverable. On the scheduled completion day,\
    \ the project has either delivered a system that is accepted by the user, or it\
    \ hasn't. Everyone knows the result on that day.*\n> \n> *The object of building\
    \ a project model is to divide the project into component pieces, each of which\
    \ has this same characteristic: each activity must be defined by a deliverable\
    \ with objective completion criteria. The deliverables are demonstrably done or\
    \ not done.” [⁵](#Chapter02.html#CHP-2-FN-5)*\n\nSo what happens if you estimate\
    \ wrong? What if you decide to include too many new features in an iteration?\
    \ What if there are unexpected delays?\n\n______________\n\n⁴[www.adaptionsoft.com/on_time.html](http://www.adaptionsoft.com/on_time.html)\n\
    \n⁵DeMarco, T. *Controlling Software Projects: Management, Measurement and Estimation.*\
    \ (Upper Saddle River, NJ: Yourdon Press, 1983.)\n\nWell, if it looks as if you\
    \ won't make your iteration deadline there are only two realistic alternatives:\
    \ move the deadline, or remove features. We'll come back to this problem when\
    \ we talk about estimation and scheduling.\n\nThe key to iterative development\
    \ is “live a balanced life – learn some and think some and draw and paint and\
    \ sing and dance and play and work every day some,”[⁶](#Chapter02.html#CHP-2-FN-6)\
    \ or in the software development world, *analyze* some and *design* some and *code*\
    \ some and *test* some every day. We'll revisit this idea when we talk about the\
    \ agile development models.\n\n### Evolving the Incremental Model\n\nThe traditional\
    \ way of implementing the incremental model is known as *evolutionary prototyping*.[⁷](#Chapter02.html#CHP-2-FN-7)\
    \ In evolutionary prototyping, one prioritizes requirements as they are received\
    \ and produces a succession of increasingly feature-rich versions of the product.\
    \ Each version is refined using customer feedback and the results of integration\
    \ and system testing. This is an excellent model for an environment of changing\
    \ or ambiguous requirements, or a poorly understood application domain. This is\
    \ the model that evolved into the modern agile development processes. See [Figure\
    \ 2-4](#Chapter02.html#fig_2_4).\n\n![images](images/0204.jpg)\n\n***Figure 2-4.**\
    \ Evolutionary prototyping process model*\n\n______________\n\n⁶Fulghum, R. *All\
    \ I Really Need to Know I Learned in Kindergarten.* Revised Edition. (New York,\
    \ NY: Ballantine Books, 2004.)\n\n⁷McConnell, S. *Rapid Development: Taming Wild\
    \ Software Schedules.* (Redmond, WA: Microsoft Press, 1996.)\n\nEvolutionary prototyping\
    \ recognizes that it's very hard to plan the full project from the start and that\
    \ feedback is a critical element of good analysis and design. It's somewhat risky\
    \ from a scheduling point of view, but when compared to any variation of the waterfall\
    \ model it has a very good track record. Evolutionary prototyping provides improved\
    \ progress visibility for both the customer and project management. It also provides\
    \ good customer and end user input to product requirements and does a good job\
    \ of prioritizing those requirements.\n\nOn the downside, evolutionary prototyping\
    \ leads to the danger of unrealistic schedules, budget overruns, and overly optimistic\
    \ progress expectations. These can happen because the limited number of requirements\
    \ implemented in a prototype can give the impression of real progress for a small\
    \ amount of work. On the flip side, putting too many requirements in a prototype\
    \ can result is schedule slippages, because of overly optimistic estimation. This\
    \ is a tricky balance to maintain. Because the design evolves over time as the\
    \ requirements change, there is the possibility of a bad design, unless there's\
    \ the provision of re-designing – something that becomes harder and harder to\
    \ do as the project progresses and your customer is more heavily invested in a\
    \ particular version of the product. There is also the possibility of low maintainability,\
    \ again because the design and code evolve as requirements change. This may lead\
    \ to lots of re-work, a busted schedule, and increased difficulty in fixing bugs\
    \ post-release.\n\nEvolutionary prototyping works best with tight, experienced\
    \ teams who have worked on several projects together. This type of cohesive team\
    \ is productive and dexterous, able to focus on each iteration and usually producing\
    \ the coherent, extensible designs that a series of prototypes requires. This\
    \ model is not generally recommended for inexperienced teams."
  raw: "### Loops Are Your Friend\n\n> *The best practice is to iterate and deliver\
    \ incrementally, treating each iteration as a closed-end “mini-project,” including\
    \ complete requirements, design, coding integration, testing, and internal delivery.\
    \ On the iteration deadline, deliver the (fully-tested, fully-integrated) system\
    \ thus far to internal stakeholders. Solicit their feedback on that work, and\
    \ fold that feedback into the plan for the next iteration.*\n> \n> (from “How\
    \ Agile Projects Succeed”[⁴](#Chapter02.html#CHP-2-FN-4))\n\nWhile the waterfall\
    \ with feedback model recognizes that all the requirements aren't typically known\
    \ in advance, and that mistakes will be made in architectural design and detailed\
    \ design, it doesn't go far enough in taking those realizations into the process.\
    \ Iterative process models make this required change in process steps more explicit\
    \ and create process models that build products a piece at a time.\n\nIn most\
    \ iterative process models, you'll take the known requirements – you'll take a\
    \ snapshot of the requirements at some time early in the process – and prioritize\
    \ them, typically based on the customer's ranking of what features are most important\
    \ to deliver first.\n\nYou then pick the highest priority requirements and plan\
    \ a series of iterations, where each iteration is a complete project. For each\
    \ iteration, you'll add a set of the next highest priority requirements (including\
    \ some you may have discovered during the previous iteration) and repeat the project.\
    \ By doing a complete project with a subset of the requirements every time at\
    \ the end of each iteration you end up with a complete, working, and robust product,\
    \ albeit with fewer features than the final product will have.\n\nAccording to\
    \ Tom DeMarco, these iterative processes follow one basic rule:\n\n> *Your project,\
    \ the whole project, has a binary deliverable. On the scheduled completion day,\
    \ the project has either delivered a system that is accepted by the user, or it\
    \ hasn't. Everyone knows the result on that day.*\n> \n> *The object of building\
    \ a project model is to divide the project into component pieces, each of which\
    \ has this same characteristic: each activity must be defined by a deliverable\
    \ with objective completion criteria. The deliverables are demonstrably done or\
    \ not done.” [⁵](#Chapter02.html#CHP-2-FN-5)*\n\nSo what happens if you estimate\
    \ wrong? What if you decide to include too many new features in an iteration?\
    \ What if there are unexpected delays?\n\n______________\n\n⁴[www.adaptionsoft.com/on_time.html](http://www.adaptionsoft.com/on_time.html)\n\
    \n⁵DeMarco, T. *Controlling Software Projects: Management, Measurement and Estimation.*\
    \ (Upper Saddle River, NJ: Yourdon Press, 1983.)\n\nWell, if it looks as if you\
    \ won't make your iteration deadline there are only two realistic alternatives:\
    \ move the deadline, or remove features. We'll come back to this problem when\
    \ we talk about estimation and scheduling.\n\nThe key to iterative development\
    \ is “live a balanced life – learn some and think some and draw and paint and\
    \ sing and dance and play and work every day some,”[⁶](#Chapter02.html#CHP-2-FN-6)\
    \ or in the software development world, *analyze* some and *design* some and *code*\
    \ some and *test* some every day. We'll revisit this idea when we talk about the\
    \ agile development models.\n\n### Evolving the Incremental Model\n\nThe traditional\
    \ way of implementing the incremental model is known as *evolutionary prototyping*.[⁷](#Chapter02.html#CHP-2-FN-7)\
    \ In evolutionary prototyping, one prioritizes requirements as they are received\
    \ and produces a succession of increasingly feature-rich versions of the product.\
    \ Each version is refined using customer feedback and the results of integration\
    \ and system testing. This is an excellent model for an environment of changing\
    \ or ambiguous requirements, or a poorly understood application domain. This is\
    \ the model that evolved into the modern agile development processes. See [Figure\
    \ 2-4](#Chapter02.html#fig_2_4).\n\n![images](images/0204.jpg)\n\n***Figure 2-4.**\
    \ Evolutionary prototyping process model*\n\n______________\n\n⁶Fulghum, R. *All\
    \ I Really Need to Know I Learned in Kindergarten.* Revised Edition. (New York,\
    \ NY: Ballantine Books, 2004.)\n\n⁷McConnell, S. *Rapid Development: Taming Wild\
    \ Software Schedules.* (Redmond, WA: Microsoft Press, 1996.)\n\nEvolutionary prototyping\
    \ recognizes that it's very hard to plan the full project from the start and that\
    \ feedback is a critical element of good analysis and design. It's somewhat risky\
    \ from a scheduling point of view, but when compared to any variation of the waterfall\
    \ model it has a very good track record. Evolutionary prototyping provides improved\
    \ progress visibility for both the customer and project management. It also provides\
    \ good customer and end user input to product requirements and does a good job\
    \ of prioritizing those requirements.\n\nOn the downside, evolutionary prototyping\
    \ leads to the danger of unrealistic schedules, budget overruns, and overly optimistic\
    \ progress expectations. These can happen because the limited number of requirements\
    \ implemented in a prototype can give the impression of real progress for a small\
    \ amount of work. On the flip side, putting too many requirements in a prototype\
    \ can result is schedule slippages, because of overly optimistic estimation. This\
    \ is a tricky balance to maintain. Because the design evolves over time as the\
    \ requirements change, there is the possibility of a bad design, unless there's\
    \ the provision of re-designing – something that becomes harder and harder to\
    \ do as the project progresses and your customer is more heavily invested in a\
    \ particular version of the product. There is also the possibility of low maintainability,\
    \ again because the design and code evolve as requirements change. This may lead\
    \ to lots of re-work, a busted schedule, and increased difficulty in fixing bugs\
    \ post-release.\n\nEvolutionary prototyping works best with tight, experienced\
    \ teams who have worked on several projects together. This type of cohesive team\
    \ is productive and dexterous, able to focus on each iteration and usually producing\
    \ the coherent, extensible designs that a series of prototypes requires. This\
    \ model is not generally recommended for inexperienced teams."
