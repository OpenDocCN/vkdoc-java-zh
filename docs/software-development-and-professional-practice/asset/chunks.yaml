  raw: '### The Principle of Least Knowledge (PLK)


    (Also known as the ***Law of Demeter***). Talk only to your immediate friends.^([11](#Chapter10.html#CH-10-FN-11))


    The complement to strong cohesion in an application is *loose coupling*. That’s
    what the Principle of Least Knowledge is all about. It says that classes should
    collaborate *indirectly* with as few other classes as possible.^([12](#Chapter10.html#CH-10-FN-12))
    Here’s an example.


    You’ve got a computer system in your car – we all do these days. Say you’re writing
    an application that graphs temperature data in the car. There are a number of
    sensors that provide temperature data and that are part of a family of sensors
    in the car’s engine. Your program should select a sensor, gather and plot its
    temperature data. (This example is derived from one found in Hunt).^([13](#Chapter10.html#CH-10-FN-13))
    Part of your program might look like:


    `public void plotTemperature(Sensor theSensor) {`

    `        double temp = theSensor.getSensorData().getOilData().getTemp();`

    `        …`

    `}`


    This will likely work – once. But now you’ve coupled your temperature plotting
    method to the *`Sensor`*, *`SensorData`*, and *`OilSensor`* classes. Which means
    that a change to *any one of them* could affect your `plotTemperature()` method
    and cause you to have to refactor your code. Not good.


    This is what the PLK urges you to avoid. Instead of linking your method to a hierarchy
    and having to traverse the hierarchy to get the service you’re looking for, just
    ask for the data directly


    `public void plotTemperature(double theSensor) {`

    `        ...`

    `}`

    `...`

    `plotTemperature(aSensor.getTemp());`


    Yup, we had to add a method to the `Sensor` class to get the temperature for us,
    but that’s a small price to pay for cleaning up the mess (and the possible errors)
    above. Now your class is just collaborating directly with *one* class, and letting
    that class take care of the others. Of course, your `Sensor` class will do the
    same thing with `SensorData`, and so on.


    This leads us to a corollary to the PLK – *keep dependencies to a minimum*. This
    is the crux of loose coupling. By interacting with only a few other classes, you
    make your class more flexible and less likely to contain errors.


    ___________________


    ^(11) Martin, 2003.


    ^(12) Lieberherr, K., I. Holland, et al. *Object-Oriented Programming: An Objective
    Sense of Style*. OOPSLA ’88, Association for Computing Machinery, 1988.


    ^(13) Hunt, 2000.


    ### Class Design Guidelines for Fun and Enjoyment


    Finally, just so we shouldn’t exit the chapter without yet another list, we present
    a list of 24 class design guidelines. These guidelines are somewhat more specific
    than the general design guidelines that we have described above, but they are
    handy to have around. Cut them out and burn them into your brain.


    These 24 class design guidelines are taken from Davis^([14](#Chapter10.html#CH-10-FN-14))
    and McConnell.^([15](#Chapter10.html#CH-10-FN-15))


    1.  Present a *consistent level of abstraction* in the class interface.

    2.  Be sure you understand what abstraction the class is implementing.

    3.  Move unrelated information to a different class (ISP).

    4.  Beware of erosion of the class’s interface when you are making changes. (ISP).

    5.  Don’t add public members that are inconsistent with the interface abstraction.

    6.  Minimize accessibility of classes and members (OCP).

    7.  Don’t expose member data in public.

    8.  Avoid putting private implementation details into the class’s interface.

    9.  Avoid putting methods into the public interface.

    10.  Watch for coupling that’s too tight (PLK).

    11.  Try to implement “has a” relations through containment within a class (SRP).

    12.  Implement “is a” relations through inheritance (LSP).

    13.  Only inherit if the derived class is a more specific version of the base
    class.

    14.  Be sure to inherit only what you want to inherit (LSP).

    15.  Move common interfaces, data, and operations as high in the inheritance hierarchy
    as possible (DRY).

    16.  Be suspicious of classes of which there is only one instance.

    17.  Be suspicious of base classes that only have a single derived class.

    18.  Avoid deep inheritance trees (LSP).

    19.  Keep the number of methods in a class as small as possible.

    20.  Minimize indirect method calls to other classes (PLK).

    21.  Initialize all member data in all constructors, if possible.

    22.  Eliminate data-only classes.

    23.  Eliminate operation-only classes.

    24.  Oh, and be careful out there.… (OK, I added this one.)


    ___________________


    ^(14) Davis, A. M. 201 *Principles of Software Development*. (New York, NY: McGraw-Hill,
    Inc., 1995.)


    ^(15) McConnell, Steve, Code Complete, *2nd Edition.* (Redmond, WA: Microsoft
    Press, 2004.)


    ### Conclusion


    In this chapter we examined a number of rules of thumb about object-oriented design
    that have evolved over the last few decades. These design principles act as guidelines
    for you the designer to abide by so that your design ends up being a good one,
    easy to implement, easy to maintain, and one that does just what your customer
    wants. Importantly, these design principles give guidance when you''re feeling
    your way from features to design. They talk about ways to examine and implement
    the important object-oriented principles of inheritance, encapsulation, polymorphism,
    and abstraction. They also reinforce basic design principles like cohesion and
    coupling. Burn these principles into your brain, OO designer.


    ## C H A P T E R  11'
