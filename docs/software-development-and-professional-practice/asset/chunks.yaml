- fmt: "`public class NFPTaxStrategy implements TaxStrategy {`\n`    private final\
    \ double RATE = 0.0;`\n\n`    public double computeTax(double income) {`\n`  \
    \      return income * RATE;`\n`    }`\n`}`\n\nNext, we create the `Context` class\
    \ that does the heavy lifting of creating strategy objects requested by the client\
    \ program and executing the correct ones.\n\n`public class TaxPayerContext {`\n\
    `    private TaxStrategy strategy;`\n`    private double income;`\n`    /** constructor\
    \ for Context */`\n`    public TaxPayerContext(TaxStrategy strategy, double income)\
    \ {`\n`        this.strategy = strategy;`\n`        this.income = income;`\n`\
    \    }`\n`    public double getIncome() {`\n`        return income;`\n`    }`\n\
    `    public void setIncome(double income) {`\n`        this.income = income;`\n\
    `    }`\n`    public TaxStrategy getStrategy() {`\n`        return strategy;`\n\
    `    }`\n`    public void setStrategy(TaxStrategy strategy) {`\n`        this.strategy\
    \ = strategy;`\n`    }`\n`    public double computeTax() {`\n`        return strategy.computeTax(income);`\n\
    `    }`\n`}`\n\nNote that here we write a separate version of the `computeTax()`\
    \ method (we’re not overriding the method because we’re not extending any of the\
    \ concrete classes – the Strategy pattern uses composition, not inheritance).\
    \ This version calls the `computeTax()` method of the strategy that the client\
    \ has selected.\n\nFinally, we implement the client that controls who gets instantiated\
    \ and when.\n\n`public class StrategyClient {`\n`        public static void main(String\
    \ [] args) {`\n`                double income;`\n`                TaxPayerContext\
    \ tp;`\n\n`                income = 35000.00;`\n`                tp = new TaxPayerContext(new\
    \ PersonalTaxStrategy();`\n`                                                 \
    \                                income);`\n`                System.out.println(\"\
    Tax is \" + tp.computeTax());`\n\n`                tp.setStrategy(new CorpTaxStrategy());`\n\
    `                System.out.println(\"Tax is \" + tp.computeTax());`\n`      \
    \  }`\n`}`\n\nThe client class selects which algorithm to use and then gets the\
    \ context object to execute it. This way we’ve encapsulated the tax computation\
    \ in separate classes. We can easily add new customer types just by adding new\
    \ concrete `TaxStrategy` classes and making the change in the client to use that\
    \ new concrete type. Piece of cake!\n\n### Conclusion\n\nDesign Patterns are a\
    \ reusable, commonly occurring core solution to a design problem. They are not\
    \ a finished design. Rather a design pattern is a template you can use to solve\
    \ similar problems in many different domains. Design patterns offer you proven\
    \ strategies for solving common problems and so they can help speed up your design\
    \ process. And because these patterns describe *proven solutions* they can help\
    \ reduce defects in your design as well.\n\nBe careful, though. Like all design\
    \ techniques, design patterns are heuristics and so there will be cases where\
    \ they just don't fit. Trying to squeeze a pattern into a problem where it just\
    \ doesn't belong is asking for trouble.\n\nThe goal of design patterns is to define\
    \ a common vocabulary for design. They may not get us all the way there but design\
    \ patterns, plus the design principles described in [Chapter 10](#Chapter10.html#ch10),\
    \ get us a long way down that road.\n\n## C H A P T E R  12\n\n## Code Construction\n\
    \n> *Mostly, when you see programmers, they aren’t doing anything. One of the\
    \ attractive things about programmers is that you cannot tell whether or not they\
    \ are working simply by looking at them. Very often they’re sitting there seemingly\
    \ drinking coffee and gossiping, or just staring into space. What the programmer\
    \ is trying to do is get a handle on all the individual and unrelated ideas that\
    \ are scampering around in his head.*\n> \n> —Charles M. Strauss\n> \n> *Great\
    \ software, likewise, requires a fanatical devotion to beauty. If you look inside\
    \ good software, you find that parts no one is ever supposed to see are beautiful\
    \ too. I’m not claiming I write great software, but I know that when it comes\
    \ to code I behave in a way that would make me eligible for prescription drugs\
    \ if I approached everyday life the same way. It drives me crazy to see code that’s\
    \ badly indented, or that uses ugly variable names.*\n> \n> —Paul Graham, “Hackers\
    \ and Painters,” 2003\n\nWell, finally we’re getting to the real heart of software\
    \ development – writing the code. The assumption here is that you already *do*\
    \ know how to write code in at least one programming language; this chapter presents\
    \ examples in a few languages, each chosen for the appropriate point being made.\
    \ The purpose of this chapter is to provide some tips for writing *better* code.\
    \ Because we can all write better code.\n\nFor plan-driven process folks (see\
    \ [Chapter 2](#Chapter02.html#ch2)), coding is the tail that wags the development-process\
    \ dog. Once you finish detailed requirements, architecture, and detailed design,\
    \ the code should just flow out of the final design, right? Not. In 20 years of\
    \ industry software development experience, I never saw this happen. Coding is\
    \ hard; translating even a good, detailed design into code takes a lot of thought,\
    \ experience, and knowledge, even for small programs. Depending on the programming\
    \ language you are using and the target system, programming can be a very time-consuming\
    \ and difficult task. On the other hand, for very large projects that employ dozens\
    \ or even hundreds of developers, having a very detailed design is critical to\
    \ success, so don’t write off the plan-driven process just yet.\n\nFor the agile\
    \ development process folks, coding is it. The agile manifesto ([`http://agilemanifesto.org`](http://agilemanifesto.org))\
    \ says it at the very beginning, “Working software over comprehensive documentation.”\
    \ Agile developers favor creating code early and often; they believe in delivering\
    \ software to their customers frequently, and using feedback from the customers\
    \ to make the code better. They welcome changes in requirements and see them as\
    \ an opportunity to refactor the code and make the product more usable for their\
    \ customer. This doesn’t mean that coding gets any easier when using an agile\
    \ process; it means that your focus is different. Rather than focus on requirements\
    \ and design and getting them nailed down as early as possible, in agile processes\
    \ you focus on delivering working code to your customer as quickly and as often\
    \ as possible. You change the code often, and the entire team owns all the code\
    \ and so has permission to change anything if it’s appropriate.\n\nYour code has\
    \ two audiences:\n\n*   The machine that’s the target of the compiled version\
    \ of the code, what will actually get executed.\n*   The people, including yourself,\
    \ who will *read* it in order to understand it and modify it.\n\nTo those ends,\
    \ your code needs to fulfill the requirements, implement the design, and also\
    \ be readable and easy to understand. We’ll be focusing on the readability and\
    \ understandability parts of these ends first, and then look at some issues related\
    \ to performance and process. This chapter will not give you all the hints, tips,\
    \ and techniques for writing great code; there are entire books for that, some\
    \ of which are in the references at the end of this chapter. Good luck!"
