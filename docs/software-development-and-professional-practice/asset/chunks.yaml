    ### 模块化分解


    1972 年，大卫·帕纳斯发表了一篇题为《将系统分解为模块时应遵循的标准》的论文，提出可以使用一种称为*模块化*的技术来设计程序。⁶ 帕纳斯的论文也是最早描述基于*信息隐藏*进行分解的论文之一，而信息隐藏正是面向对象编程的关键技术之一。在论文中，帕纳斯强调了基于问题解决方案的*控制流*进行自顶向下分解，与使用*封装*和*信息隐藏*将数据定义及其操作相互隔离的分解方式之间的区别。他的论文显然是面向对象分析与设计（OOA&D）的先驱，我们将在下一章中探讨这一概念。


    尽管帕纳斯的论文早于这一概念的提出，但他实际上讨论的是一种称为*关注点分离*的思想。“在计算机科学中，*关注点分离*是指将计算机程序拆分为功能重叠尽可能小的不同特征的过程。关注点是指程序中任何感兴趣或聚焦的部分。通常，关注点与特征或行为是同义词。实现关注点分离的传统途径是通过编程的模块化和封装（或操作的‘透明性’），并借助信息隐藏来实现。”⁷
    传统上，关注点分离主要关注程序功能的分离。帕纳斯则增加了数据分离的思想，使得各个模块既能控制数据，也能控制作用于数据的操作，并且数据只能通过定义良好的接口对外可见。


    模块化有三个关键特征，对于创建模块化程序至关重要：


    *   封装

    *   松散耦合（模块之间的关联程度）

    *   信息隐藏


    简而言之，*封装*是指将由数据和行为定义的一组服务捆绑成一个模块，并保持其整体性。这组服务应当具有内聚性，并明确属于同一整体。（就像函数一样，一个模块应该只做一件事。）然后，该模块向用户提供一个*接口*，理想情况下，该接口是访问模块内服务和数据的唯一途径。封装服务和数据的目标是实现高内聚。这意味着你的模块应该只做一件事，并且模块内的所有函数都应协同工作以实现这一件事。你越接近这个目标，模块的内聚性就越高。这是一件好事。


    与封装相辅相成的是*松散耦合*。松散耦合描述了两个模块之间的关联强度。这意味着我们希望最小化任何一个模块对另一个模块的依赖。我们通过分离模块来最小化交互，并使模块间的所有交互都通过模块接口进行。目标是创建具有内部完整性（高内聚）且与其他模块之间具有少量、直接、可见且灵活的连接（松散耦合）的模块。良好的模块间耦合应足够松散，以便一个模块可以轻松地被其他模块调用。


    __________


    ⁶ Parnas, D. “On the Criteria to be Used in Decomposing Systems into Modules.”
    *Communications of the ACM* 15(12): 1053-1058. (1972)


    ⁷ Wikipedia. Separation of Concerns. 2009. [`http://en.wikipedia.org/wiki/Separation_of_concerns`](http://en.wikipedia.org/wiki/Separation_of_concerns).
    检索于 2009 年 12 月 7 日。


    耦合可分为四大类，从良好到糟糕依次为：


    *   *简单数据耦合：* 非结构化数据通过参数列表传递。这是最好的耦合类型，因为它允许接收模块按需自行组织数据，并决定如何处理这些数据。

    *   *结构化数据耦合：* 结构化数据通过参数列表传递。这也是一种良好的耦合类型，因为发送模块保持对数据格式的控制，而接收模块则可以按需处理数据。

    *   *控制耦合：* 模块 A 的数据传递给模块 B，数据内容告诉模块 B 该做什么。这不是一种好的耦合形式；在这种情况下，A 和 B 耦合过于紧密，因为模块
    A 正在控制模块 B 中函数的执行方式。

    *   *全局数据耦合：* 两个模块使用相同的全局数据。这非常糟糕。它通过让模块共享数据，违反了封装的基本原则。这会引发不良的副作用，并确保在程序执行的任何时刻，模块
    A 和模块 B 都无法确切知道全局共享数据中到底有什么。而且，你到底为什么要使用全局变量？差劲的程序员！


    信息隐藏常常与封装混淆，但它们并非同一回事。封装描述的是将数据和行为包装到单个实体（在我们的例子中即模块）中的过程。数据在模块内部可以是公开可见的，因此并未被隐藏。而信息隐藏则指出，模块中的数据和行为应受到控制，并且仅对模块内操作这些数据的函数可见，从而对外部其他模块不可见。这是模块（以及后来的对象）的一个重要特性，因为它将数据的控制权交给了最了解如何操作该数据的模块，并保护数据免受其他模块介入并篡改数据可能带来的副作用。


    帕纳斯所讨论的并不仅仅是模块中的数据隐藏。他对信息隐藏的定义更侧重于在模块定义中隐藏设计决策。“我们提议……首先列出一系列困难的设计决策或可能发生变化的设计决策。然后，每个模块的设计目标就是将这些决策对其他模块隐藏起来。”⁸
    以这种方式隐藏信息，使得模块的客户端无需了解构建该模块所涉及的任何设计决策，就能成功使用该模块。同时，它也允许开发人员更改模块的实现，而不会影响客户端使用该模块的方式。

    '
- fmt: "#### Example: Keyword in Context: Indexes for You and Me\n\nBack in the day,\
    \ when Unix was young and the world was new, the Unix documentation was divided\
    \ into eight (8) different sections and the entire manual started with a permuted\
    \ index. The problem with Unix is not the command line interface, it's not the\
    \ inverted tree file system structure. No, the problem with Unix is that the three\
    \ guys who developed it Kernighan, Ritchie, and Thompson, are the three laziest\
    \ guys on the planet. How do I know? Where's my proof? Well, the proof is in practically\
    \ every Unix command- `ls`, `cat`, `cp`, `mv`, `mkdir`, `ps`, `cc`, `as`, `ld`,\
    \ `m4` … I could go on. Unix has to have the most cryptic command line set of\
    \ any operating system on the planet. The cardinal rule for creating Unix command\
    \ line tools was apparently, “why use three characters when two will do?”\n\n\
    __________\n\n⁸ Parnas, 1972.\n\nSo finding anything in any of the 8 sections\
    \ of Unix documentation could have been a real trial. Enter the permuted index.\
    \ Every Unix man page starts with a header line that contains the name of the\
    \ command, and a short description of what the command does. For example, the\
    \ `cat(1)` man page begins\n\n```\ncat -- concatenate and print files\n```\n\n\
    The problem is, what if I don't know the name of a command, but I do know what\
    \ it does? The permuted index solves this problem by making most of the words\
    \ in the description (the articles were ignored) of the command part of the index\
    \ itself. So that *cat* could be found under “cat” and also “concatenate”, “print”\
    \ and “files.” This is known as a **Keyword in Context** (KWIC) index. It works\
    \ just dandy.\n\nSo our problem is to take as input two files, the first of which\
    \ contains words to ignore, the second of which contains lines of text to index,\
    \ and create a KWIC index for them. For example, say that we're ignoring the articles\
    \ for, the, and, et.c, and the second file looks like\n\n```\nThe Sun also Rises\n\
    For Whom the Bell Tolls\nThe Old Man and the Sea\n```\n\nOur KWIC index would\
    \ look like:\n\n```\n                  the sun ALSO rises\n          for whom\
    \ the BELL tolls\n                  the old MAN and the sea\n                \
    \        the OLD man and the sea\n            the sun also RISES\n      the old\
    \ man and the SEA\n                        the SUN also rises\n   for whom the\
    \ bell TOLLS\n                        for WHOM the bell tolls\n```\n\nNote that\
    \ each keyword is in all caps, each input line appears once for every index word\
    \ in the line, and the keywords are sorted alphabetically. Each line of text has\
    \ its keywords made visible by circularly shifting the words in the line. In the\
    \ case of a tie (two lines of text have the same index word and so should appear\
    \ together in the output), the lines of text should appear in the same order in\
    \ which they appeared in the text input file. So the question we have to answer\
    \ is is, how do we create the KWIC index? A secondary question we'll need to answer\
    \ almost immediately is, how do we store the data?\n\n### Top-Down Decomposition\n\
    \nWe'll start by designing the problem solution using a top-down decomposition.\
    \ Top-down decompositions, as we've seen with the eight queens problem earlier\
    \ in this chapter, are all about *control flow*. We want to figure out how to\
    \ sequentially solve the problem, making progress with each step we take. It is\
    \ assumed that the data are stored separately from the routines and each subroutine\
    \ in the control flow can access the data it needs. The alternative is to pass\
    \ the data along to each subroutine as we call it; this can be cumbersome and\
    \ time consuming because the data usually has to be copied each time you pass\
    \ it to a routine. A first decomposition of this problem might look like:\n\n\
    1.  Input the words to ignore and the text.\n2.  Create a data structure containing\
    \ the circularly shifted lines of text, keeping track of which word in the line\
    \ is the index word for this line.\n3.  Sort the circularly shifted lines of text\
    \ by the index words.\n4.  Format the output lines.\n5.  Output the text.\n\n\
    Note that these five steps can easily become five subroutines that are all called\
    \ in sequence from a main program. The data structure used for the input text\
    \ could be an array of characters for each line, a String for each line, or an\
    \ array of Strings for the entire input file. One could also use a map data structure\
    \ that uses each index word as the key and a String containing the input text\
    \ line as the value of the map element. There are certainly other possible data\
    \ structures to be used. Sorting can be done by any of the stable sorting algorithms\
    \ and which algorithm to use would depend on the data structure chosen and on\
    \ the expected size of the input text. Your sort must be stable because of the\
    \ requirement that identical index words sort their respective lines in the same\
    \ order that they appear in the input text file. Depending on the programming\
    \ language you use and the data structure you choose, sorting might be done automatically\
    \ for you. The data structure you choose will affect how the circular shifts are\
    \ done and how the output routine does the work of formatting each output line.\n\
    \nNow that we've got a feel for how a top-down decomposition might proceed, let's\
    \ move on and consider a modular decomposition.\n\n### Modular Decomposition of\
    \ KWIC\n\nA modular decomposition of the KWIC problem can be based on information\
    \ hiding in the sense that we will hide both data structures and design decisions.\
    \ The modules we create will not necessarily be the sequential list we have above,\
    \ but will be modules that can cooperate with each other and are called when needed.\
    \ One list of modules for KWIC is:\n\n*   A Line module (for lines of input text)\n\
    *   A Keyword-Line pair module\n*   A KWICIndex module to create the indexed list\
    \ itself\n*   A Circular Shift module\n*   A module to format and print the output\n\
    *   A master control module\n\nThe Line module will use the Keyword-Line module\
    \ to create a map data structure where each Line is a keyword and a list of lines\
    \ that contain that keyword. The KWICIndex module will use the Line module to\
    \ create the indexed list. The Circular Shift module will use the KWICIndex module\
    \ (and recursively, the Line and Keyword-Line modules) and create the circularly\
    \ shifted set of keyword-line pairs. Sorting will be taken care of internally\
    \ in the KWICIndex module; ideally the index will be created as a sorted list\
    \ and any additions to the list will maintain the ordering of the index. The format\
    \ and print module will organize the keyword-lines so that the keywords are printed\
    \ in all caps and centered on the output line. Finally, the master control module\
    \ will read the input, create the KWICIndex and cause it to print correctly.\n\
    \nThe key of these modules is that one can describe the modules and their interactions\
    \ without needing the details of how each module is implemented and how the data\
    \ is stored. That is hidden in the module description itself. Other designs are\
    \ also possible. For example, it might be better to subsume the circular shift\
    \ operations inside the Line module, allowing it to store the input lines and\
    \ their shifts. Regardless, the next step in the design is to create the interface\
    \ for each module and to coordinate the interfaces so that each module can communicate\
    \ with every other module regardless of the internal implementation.\n\nWe'll\
    \ continue this discussion in way more detail in the next chapter on object-oriented\
    \ design."
