- fmt: "### ACT ONE, Scene 2: In Which We Deign to Design\n\nNow what about design?\
    \ Assuming you've got a conceptual model from your analysis in the form of a few\
    \ use cases and a few class diagrams, your design should follow from this. In\
    \ object-oriented design, you now need to firm up the class designs, decide on\
    \ the methods your classes will contain, determine the relationships between the\
    \ classes, and figure out how each of the methods will do what it's supposed to\
    \ do.\n\nIn our current example, we've decided on four classes, `BirdFeeder`,\
    \ `FeedingDoor`, `Sensor`, and `RemoteControl`. The first three classes we've\
    \ already developed, so the question here is do we need to change any of these\
    \ classes in order to integrate the `RemoteControl` class into the program? [Figure\
    \ 9-2](#Chapter09.html#fig_9_2) shows what we've got right now.\n\n![images](images/0902.jpg)\n\
    \n***Figure 9-2.** How to integrate the RemoteControl class?*\n\nThinking about\
    \ it, it seems that nothing in `FeedingDoor` nor `Sensor` should have to change.\
    \ Why?\n\nWell, it's because the `BirdFeeder` class uses those two classes, and\
    \ they don't need to use or inherit anything from any other class; they are pretty\
    \ self sufficient (ya gotta love encapsulation). If you recall, it's the `operate()`\
    \ method in the `BirdFeeder` class that does all the hard work. It has to check\
    \ the light level from the `Sensor` and if appropriate, send a signal to the doors\
    \ to open or close. So it seems that maybe the `RemoteControl` class will work\
    \ the same way. So the question for our design is: does the `BirdFeeder` class\
    \ also use the `RemoteControl` class, or does the `RemoteControl` class stand\
    \ alone and just wait for an “event” to happen?\n\nLet's take a look at the code\
    \ for the `operate()` method again:\n\n```\n  public void operate()\n    {\n \
    \       lightLevel = s1.getLevel();\n\n        if (lightLevel > ON_THRESHOLD)\
    \ {\n            Iterator door_iter = doors.iterator();\n            while (door_iter.hasNext())\
    \ {\n                FeedingDoor a = (FeedingDoor) door_iter.next();\n       \
    \         a.open();\n            }\n        } else if (lightLevel < OFF_THRESHOLD)\
    \ {\n             Iterator door_iter = doors.iterator();\n             while (door_iter.hasNext())\
    \ {\n                FeedingDoor a = (FeedingDoor) door_iter.next();\n       \
    \         a.close();\n            }\n        }\n    }\n```\n\nIn this method,\
    \ we check the light level from the `Sensor` object and if it's above a certain\
    \ level (the sun has risen), then we ask the doors to open. It's the doors themselves\
    \ that check to see if they are already open or not. Regardless, when the `open()`\
    \ method returns, each door is open. The same thing happens with the `close()`\
    \ method. Regardless of how they start out, when each invocation of `close()`\
    \ returns its door is closed. It seems as if this is just the behavior we want\
    \ from the `RemoteControl` object, except that instead of a light threshold, it\
    \ responds to a button press. So the pseudo-code for `pressButton()` will look\
    \ like:\n\n```\npressButton()\n        while (there are still doors left to process)\
    \ do\n                if (the door is open) then\n                        door.close()\n\
    \                else\n                        door.open()\n                end-if\n\
    \        end-while\nend-method.\n```\n\nAnd from here you can just write the code.\n\
    \n### ACT TWO, Scene 1: Change in the Right Direction\n\nA key element of the\
    \ last two sections is that object-oriented analysis and design are *all about\
    \ change*. Analysis is about understanding behavior and *anticipation of change*,\
    \ while design is about implementing the model and *managing change*. In a typical\
    \ process methodology, analysis and design are iterative. As you begin to create\
    \ a new program you uncover new requirements; as the user begins to use your prototypes\
    \ they discover new ideas, things that don't work for them, and new features they\
    \ hadn't mentioned previously. All of these things require you to go back and\
    \ re-think what you already know about the problem and what you have designed.\
    \ In order to avoid what's known as “analysis paralysis” you need to manage this\
    \ never-ending flow of new ideas and requirements.\n\nThere are a number of techniques\
    \ that can be used to see and deal with change. The first we'll look at is recognizing\
    \ what might change in your design. So let's look at the B⁴++ again. Right now,\
    \ our B⁴++ will open and close the bird feeder's doors at sunrise and sunset in\
    \ response to the light levels returned by the sensor. It will also open and close\
    \ the feeding doors in response to a button push from the remote control. What\
    \ might change here?\n\nWell, the hardware might change. If the sensor changes\
    \ that might affect the `Sensor` class or it might cause your boss to re-think\
    \ how the `Sensor` class should work. You might also get new hardware. This is\
    \ just like the remote control addition we made above. And just like the remote\
    \ control example new hardware can result in the appearance of new use cases or\
    \ changes to existing use cases. These changes can consequently ripple down through\
    \ your class hierarchy.\n\nThe requirements might change. Most likely new requirements\
    \ would crop up. A requirement change can lead to alternate paths through use\
    \ cases. This implies that behavior will change requirements, which then leads\
    \ to design changes. Design change happens because requirements change.\n\nBy\
    \ thinking about what things can change in your program and design, you can begin\
    \ to anticipate change. ***Anticipating change*** can lead you to be careful about\
    \ encapsulation, inheritance, dependencies of one class on another, and so on."
  raw: '### ACT ONE, Scene 2: In Which We Deign to Design


    Now what about design? Assuming you''ve got a conceptual model from your analysis
    in the form of a few use cases and a few class diagrams, your design should follow
    from this. In object-oriented design, you now need to firm up the class designs,
    decide on the methods your classes will contain, determine the relationships between
    the classes, and figure out how each of the methods will do what it''s supposed
    to do.


    In our current example, we''ve decided on four classes, *`BirdFeeder`*, *`FeedingDoor`*,
    *`Sensor`*, and *`RemoteControl`*. The first three classes we''ve already developed,
    so the question here is do we need to change any of these classes in order to
    integrate the *`RemoteControl`* class into the program? [Figure 9-2](#Chapter09.html#fig_9_2)
    shows what we''ve got right now.


    ![images](images/0902.jpg)


    ***Figure 9-2.** How to integrate the RemoteControl class?*


    Thinking about it, it seems that nothing in *`FeedingDoor`* nor *`Sensor`* should
    have to change. Why?


    Well, it''s because the *`BirdFeeder`* class uses those two classes, and they
    don''t need to use or inherit anything from any other class; they are pretty self
    sufficient (ya gotta love encapsulation). If you recall, it''s the *`operate()`*
    method in the *`BirdFeeder`* class that does all the hard work. It has to check
    the light level from the *`Sensor`* and if appropriate, send a signal to the doors
    to open or close. So it seems that maybe the *`RemoteControl`* class will work
    the same way. So the question for our design is: does the *`BirdFeeder`* class
    also use the *`RemoteControl`* class, or does the *`RemoteControl`* class stand
    alone and just wait for an “event” to happen?


    Let''s take a look at the code for the `operate()` method again:


    `  public void operate()`

    `    {`

    `        lightLevel = s1.getLevel();`


    `        if (lightLevel > ON_THRESHOLD) {`

    `            Iterator door_iter = doors.iterator();`

    `            while (door_iter.hasNext()) {`

    `                FeedingDoor a = (FeedingDoor) door_iter.next();`

    `                a.open();`

    `            }`

    `        } else if (lightLevel < OFF_THRESHOLD) {`

    `             Iterator door_iter = doors.iterator();`

    `             while (door_iter.hasNext()) {`

    `                FeedingDoor a = (FeedingDoor) door_iter.next();`

    `                a.close();`

    `            }`

    `        }`

    `    }`


    In this method, we check the light level from the *`Sensor`* object and if it''s
    above a certain level (the sun has risen), then we ask the doors to open. It''s
    the doors themselves that check to see if they are already open or not. Regardless,
    when the `open()` method returns, each door is open. The same thing happens with
    the `close()` method. Regardless of how they start out, when each invocation of
    `close()` returns its door is closed. It seems as if this is just the behavior
    we want from the *`RemoteControl`* object, except that instead of a light threshold,
    it responds to a button press. So the pseudo-code for *`pressButton()`* will look
    like:


    `pressButton()`

    `        while (there are still doors left to process) do`

    `                if (the door is open) then`

    `                        door.close()`

    `                else`

    `                        door.open()`

    `                end-if`

    `        end-while`

    `end-method.`


    And from here you can just write the code.


    ### ACT TWO, Scene 1: Change in the Right Direction


    A key element of the last two sections is that object-oriented analysis and design
    are *all about change*. Analysis is about understanding behavior and *anticipation
    of change*, while design is about implementing the model and *managing change*.
    In a typical process methodology, analysis and design are iterative. As you begin
    to create a new program you uncover new requirements; as the user begins to use
    your prototypes they discover new ideas, things that don''t work for them, and
    new features they hadn''t mentioned previously. All of these things require you
    to go back and re-think what you already know about the problem and what you have
    designed. In order to avoid what''s known as “analysis paralysis” you need to
    manage this never-ending flow of new ideas and requirements.


    There are a number of techniques that can be used to see and deal with change.
    The first we''ll look at is recognizing what might change in your design. So let''s
    look at the B⁴++ again. Right now, our B⁴++ will open and close the bird feeder''s
    doors at sunrise and sunset in response to the light levels returned by the sensor.
    It will also open and close the feeding doors in response to a button push from
    the remote control. What might change here?


    Well, the hardware might change. If the sensor changes that might affect the Sensor
    class or it might cause your boss to re-think how the Sensor class should work.
    You might also get new hardware. This is just like the remote control addition
    we made above. And just like the remote control example new hardware can result
    in the appearance of new use cases or changes to existing use cases. These changes
    can consequently ripple down through your class hierarchy.


    The requirements might change. Most likely new requirements would crop up. A requirement
    change can lead to alternate paths through use cases. This implies that behavior
    will change requirements, which then leads to design changes. Design change happens
    because requirements change.


    By thinking about what things can change in your program and design, you can begin
    to anticipate change. ***Anticipating change*** can lead you to be careful about
    encapsulation, inheritance, dependencies of one class on another, and so on.'
  trans: '

    ### 第一幕，第二场：我们屈尊来设计


    那么设计呢？假设你已从分析中获得了概念模型，形式是一些用例和类图，你的设计应由此展开。在面向对象设计中，你现在需要巩固类的设计，决定类将包含的方法，确定类之间的关系，并弄清楚每个方法将如何实现其预定功能。


    在当前示例中，我们已确定了四个类：*`BirdFeeder`*、*`FeedingDoor`*、*`Sensor`* 和 *`RemoteControl`*。前三个类我们已经开发完成，那么问题来了：为了将
    *`RemoteControl`* 类集成到程序中，是否需要修改这些类？图 9-2 展示了我们目前的状况。


    ![images](img/0902.jpg)


    ***图 9-2.** 如何集成 RemoteControl 类？*


    仔细思考后，似乎 *`FeedingDoor`* 和 *`Sensor`* 都不需要修改。为什么？


    这是因为 *`BirdFeeder`* 类使用了这两个类，而它们无需使用或继承任何其他类的内容；它们相当自给自足（不得不爱封装）。如果你还记得，*`BirdFeeder`*
    类中的 *`operate()`* 方法承担了所有繁重工作。它需要检查来自 *`Sensor`* 的光照强度，并在适当时向门发送打开或关闭的信号。因此，*`RemoteControl`*
    类似乎也会以相同方式工作。那么我们的设计问题就是：*`BirdFeeder`* 类是否也要使用 *`RemoteControl`* 类，还是 *`RemoteControl`*
    类独立存在，仅等待“事件”发生？


    让我们再次查看 `operate()` 方法的代码：


    `  public void operate()`

    `    {`

    `        lightLevel = s1.getLevel();`


    `        if (lightLevel > ON_THRESHOLD) {`

    `            Iterator door_iter = doors.iterator();`

    `            while (door_iter.hasNext()) {`

    `                FeedingDoor a = (FeedingDoor) door_iter.next();`

    `                a.open();`

    `            }`

    `        } else if (lightLevel < OFF_THRESHOLD) {`

    `             Iterator door_iter = doors.iterator();`

    `             while (door_iter.hasNext()) {`

    `                FeedingDoor a = (FeedingDoor) door_iter.next();`

    `                a.close();`

    `            }`

    `        }`

    `    }`


    在此方法中，我们检查来自 *`Sensor`* 对象的光照强度，如果高于某个阈值（太阳升起），则要求门打开。门本身会检查自己是否已经打开。无论如何，当 `open()`
    方法返回时，每扇门都已打开。`close()` 方法也是如此。无论初始状态如何，每次调用 `close()` 返回时，其对应的门都已关闭。这似乎正是我们希望
    *`RemoteControl`* 对象具备的行为，只不过它响应的是按钮按下，而非光照阈值。因此，`pressButton()` 的伪代码将如下所示：


    `pressButton()`

    `        while (仍有门需要处理) do`

    `                if (门是打开的) then`

    `                        door.close()`

    `                else`

    `                        door.open()`

    `                end-if`

    `        end-while`

    `end-method.`


    由此，你便可以编写代码了。


    ### 第二幕，第一场：朝着正确的方向改变


    前两节的一个关键点是：面向对象分析与设计*完全关乎变化*。分析是关于理解行为和*预见变化*，而设计则是关于实现模型和*管理变化*。在典型的过程方法论中，分析与设计是迭代的。当你开始创建新程序时，会发现新的需求；当用户开始使用你的原型时，他们会发现新想法、不适合他们的地方，以及之前未提及的新功能。所有这些都要求你回头重新思考你对问题的已有认知以及你的设计。为了避免所谓的“分析瘫痪”，你需要管理这种永无止境的新想法和需求流。


    有许多技术可以用来观察和处理变化。我们首先来看的是识别设计中可能变化的部分。那么，让我们再次审视 B⁴++。目前，我们的 B⁴++ 会根据传感器返回的光照强度，在日出和日落时打开和关闭鸟食器的门。它也会响应遥控器的按钮按下，打开和关闭喂食门。这里可能会发生什么变化呢？


    嗯，硬件可能会变化。如果传感器发生变化，可能会影响 Sensor 类，或者导致你的老板重新思考 Sensor 类的工作方式。你也可能获得新硬件。这就像我们上面添加遥控器一样。正如遥控器示例所示，新硬件可能导致新用例的出现或现有用例的变更。这些变化随后可能波及你的类层次结构。


    需求可能会变化。最有可能的是出现新需求。需求变化可能导致用例出现替代路径。这意味着行为会改变需求，进而导致设计变化。设计变化之所以发生，是因为需求发生了变化。


    通过思考程序和设计中哪些事物可能变化，你可以开始预见变化。***预见变化*** 能让你在封装、继承、类之间的依赖关系等方面更加谨慎。

    '
- fmt: "# Songbirds Forever\n\nWhile we're talking about change, let's look back at\
    \ `B⁴++` again. It's several weeks now since Alice and Bob received delivery of\
    \ their new and improved `B⁴++` with remote control. Alice loves it. She can watch\
    \ the birds out her kitchen window and when the grackles swoop in she just hits\
    \ the remote control button and the doors shut. The grackles leave disappointed\
    \ and she hits the button again, the doors open. The new version works like a\
    \ charm and does everything they had asked for.\n\nThere's just one little thing....\n\
    \nAlice has discovered that sometimes she has to run errands, or go to the bathroom,\
    \ or watch her favorite nature show on The Discovery Channel. When she does this,\
    \ she can't close the door with the remote and the grackles can come and feed\
    \ to their hearts content, chasing away all the songbirds. Bummer.\n\nSo Alice\
    \ would like yet another small, insignificant change to the `B⁴++`; hardly worth\
    \ mentioning, really. She wants the `B⁴++` to detect the pesky birds and close\
    \ the doors automatically. How to do this?\n\nI'll wait....\n\nSo the new requirement\
    \ is that \"The `B⁴++` must be able to detect the unwanted birds and close the\
    \ doors automatically.\" Is this a complete requirement? It doesn't seem so because\
    \ it begs the obvious question – when do the doors open again? So it seems we\
    \ have at least a couple of things to decide.\n\n1.  How does the bird feeder\
    \ detect the birds?\n2.  How do we distinguish between the unwanted birds and\
    \ the songbirds?\n3.  When does the bird feeder open the doors again after they've\
    \ been closed?\n\nLuckily for us, our sensor supplier, SensorsRUs, has just come\
    \ out with a programmable audio sensor that will let us identify birdsong. So\
    \ if we integrate that hardware into the `B⁴++` that takes care of item #1 above.\
    \ It also turns out that the pesky birds have way different songs from the songbirds\
    \ we want to attract, so that the audio sensor can be programmed via firmware\
    \ to distinguish between the different bird species. Whew! So much for issue #2.\
    \ So what about issue #3, getting the closed doors open again?\n\nIt seems as\
    \ if there are two ways you can get the `B⁴++` to open the doors again. We can\
    \ have a timer that keeps the doors shut for a specific amount of time and then\
    \ opens them again. This has the advantage of simplicity, but it's also a pretty\
    \ stupid bit of programming. Stupid in the sense that the timer program just implements\
    \ a countdown timer with no information about the *context* in which it operates.\
    \ It could easily open the door while there are still a bunch of unwanted birds\
    \ around. Another way we could implement the bird identifier is to have it only\
    \ open the door when it hears one of our songbirds. If you reason that the songbirds\
    \ won't be around if the pesky birds are still there, then the only time you'll\
    \ hear songbirds singing is if there are no pesky birds around. If that's the\
    \ case then it's safe to open the feeding doors.\n\nSo let's do a use case. Because\
    \ opening and closing the feeding doors with the song identifier is a lot like\
    \ using the remote control, let's start with the `RemoteControl` use case and\
    \ add to it.\n\n1.  Alice hears or sees birds at the bird feeder.\n    a. 1.1\
    \ The songbird identifier hears birdsong.\n2.  Alice determines that they are\
    \ *not* songbirds.\n    b. 2.1 The songbird identifier recognizes the song as\
    \ from an unwanted bird.\n3.  Alice presses the remote control button.\n    c.\
    \ 3.1 The songbird identifier sends a message to the feeding doors to close.\n\
    4.  The feeding doors close.\n5.  The birds give up and fly away.\n    d. 5.1\
    \ The songbird identifier hears birdsong.\n    e. 5.2 The songbird identifier\
    \ recognizes the song as from a songbird.\n6.  Alice presses the remote control\
    \ button.\n    f. 6.1 The songbird identifier sends a message to the feeding doors\
    \ to open.\n7.  The feeding doors open again.\n\nWhat we've created here is an\
    \ *alternate path* in the use case. This use case looks pretty awkward now, because\
    \ the sub-cases look like they flow from the upper cases when, in fact, one or\
    \ the other of them should be done. We can rewrite the use case to look like [Table\
    \ 9-1](#Chapter09.html#tab_9_1).\n\n**Table 9-1.** The Song Identifier Use Case\
    \ and Its Alternate\n\n| **Main Path** | **Alternate Path** |\n| --- | --- |\n\
    | 1. Alice hears or sees birds at the bird feeder. | 1.1 The songbird identifier\
    \ hears birdsong. |\n| 2. Alice determines that they are *not* songbirds. | 2.1\
    \ The songbird identifier recognizes the song as from an unwanted bird. |\n| 3.\
    \ Alice presses the remote control button. | 3.1 The songbird identifier sends\
    \ a message to the feeding doors to close. |\n| 4. The feeding doors close. |\
    \  |\n| 5. The birds give up and fly away. | 5.1 The songbird identifier hears\
    \ birdsong. 5.2 The songbird identifier recognizes the song as from a songbird.\
    \ |\n| 6. Alice presses the remote control button. | 6.1 The songbird identifier\
    \ sends a message to the feeding doors to open. |\n| 7. The feeding doors open\
    \ again. |  |\n\nThese two paths aren't exactly the same. For instance, in the\
    \ Main Path, Alice sees the birds give up and fly away before she presses the\
    \ remote control button. In the alternate path, the bird song identifier must\
    \ wait until it hears birdsong before it can consider opening the feeding doors\
    \ again. So we could easily make these two different use cases. It depends on\
    \ *you*. Use cases are there to illustrate different scenarios in the use of the\
    \ program so you can represent them in any way you want. If you want to break\
    \ this use case up into two different ones, feel free. Just be consistent. You're\
    \ still managing change."
