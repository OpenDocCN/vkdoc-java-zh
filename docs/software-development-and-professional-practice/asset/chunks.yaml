    the worst ones you will see. In fact, these are problems developers should never
    see; their managers should shield them from non-technical problems. Non-technical
    requirements problems are fundamentally political. Examples abound. One group
    of customers in an organization has a different view of the program requirements
    than another group. Or worse, one manager has a different view than another manager.
    The program being developed will reduce the influence of one department by automating
    a function that they used to be the sole source of. The program will distribute
    data processing across several departments where it was once centralized in a
    single department. The list goes on and on. The best advice for non-technical
