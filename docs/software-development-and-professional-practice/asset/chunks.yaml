  trans: '

    #### 代码覆盖率：测试每条语句


    代码覆盖率的目标是测试程序中的每条语句。为此，你需要牢记代码中的几个要点。你的程序由多种不同类型的代码组成，每种代码都需要进行测试。


    首先，存在*直线型代码*。直线型代码只贯穿函数或方法中的单一路径。通常，每种不同的数据类型只需要一个测试用例（关于数据覆盖率，请参见下文）。


    接下来是*分支覆盖率*。在分支覆盖率中，你需要测试程序可能改变方向的所有位置。这意味着你需要关注控制结构。请检查每一个*`if`*和*`switch`*语句，以及每一个包含
    AND 和 OR 运算符的复杂条件表达式。对于每个*`if`*语句，你需要两个测试用例——一个用于条件表达式为`true`的情况，另一个用于其为`false`的情况。对于方法中的每个*`switch`*语句，你需要为
    switch 中的每个*`case`*子句（包括*`default`*子句）分别编写一个测试用例（你所有的`switch`语句都应该有`default`子句，对吧？）。逻辑与（`&&`）和逻辑或（`||`）运算符会增加条件表达式的复杂度，因此你需要为它们添加额外的测试用例。


    理想情况下，每个运算符需要四个测试用例（F-F、F-T、T-F、T-T），但如果你使用的语言（如 C/C++ 和 Java）对逻辑运算符采用短路求值，那么你可以减少测试用例的数量。对于或运算符，如果第一个子表达式为`false`，你仍然需要两个测试用例；但如果第一个子表达式求值为`true`（整个表达式将始终为真），则只需一个测试用例。对于与运算符，如果第一个子表达式求值为`false`（结果将始终为假），则只需一个测试用例；但如果第一个子表达式求值为`true`，则需要两个测试用例。


    然后是*循环覆盖率*。这与上述分支覆盖率类似。区别在于，在*`for`*、*`while`*或*`do`*-*`while`*循环中，最容易出现*差一错误*，你需要明确地对此进行测试。你还需要一个测试用例来验证循环的“正常”运行，但还需要测试其他一些情况。首先，对于前置测试循环，需要考虑永远不进入循环体的情况——即循环条件表达式在第一次判断时就失败。其次，你需要测试无限循环的情况——条件表达式永远不会变为假。这很可能是因为你没有在循环体中修改循环控制变量，或者虽然修改了，但条件表达式从一开始就是错误的。对于读取文件的循环，通常需要测试*文件结束*标记（EOF）。这是另一个可能出错的地方，原因可能是文件过早结束，或者（在使用标准输入的情况下）从未指示文件结束。


    最后，还有*返回值*。在许多语言中，标准库函数和操作系统调用都会返回值。例如，在 C 语言中，`fprintf`和`fscanf`函数分别返回打印到输出流的字符数和从输入流中分配到的输入元素个数。但几乎没有人会检查这些返回值。²
    你应该检查！


    请注意，Java 与 C 或 C++ 略有不同。在 Java 中，许多类似有问题的例程会将返回值声明为`void`，而不是像 C 或 C++ 那样声明为`int`。因此，上述问题在
    Java 中出现的频率远低于其他语言。不过，这并不意味着问题完全消失了。虽然 Java 中的`System.out.print()`和`System.out.println()`方法都被声明为返回`void`，但`System.out.printf()`方法返回一个`PrintStream`对象，而这个对象几乎总是被忽略。此外，在
    Java 中，调用`Scanner`的`next()`或`nextInt()`方法，或任何读取数据的方法，而不将返回值保存到变量中，是完全合法的。请务必小心。


    #### 数据覆盖率：坏数据是你的朋友？


    还记得在代码构建章节中我们讨论过的*防御性编程*吗？保护程序的关键在于警惕坏数据，检测并处理它，以便程序能够从坏数据中恢复，或者至少优雅地失败。现在，我们就要检验你的防御是否可靠了。数据覆盖率应检查两种类型的数据：好数据和坏数据。好数据是你的方法预期要处理的典型数据。这些测试将测试类型正确且在有效范围内的数据。它们只是为了检查你的程序是否正常工作。但这并不意味着你可以完全放松警惕。仍然有一些情况需要测试。以下是简要列表：


    *   **测试边界条件**。这意味着要测试接近有效数据范围边缘的数据。例如，如果你的程序正在计算课程的平均成绩，那么成绩的取值范围是 0 到 100（包含两端）。因此，你应该测试例如
    0、1、99 和 100 这些成绩。这些都是有效成绩。但你也应该测试 -1 和 101。这两个都是无效值，但接近取值范围。此外，如果你正在分配字母等级，则需要检查每个字母等级值的上下边界。例如，如果
    F 代表任何低于 60 分的成绩，你需要检查 59、60 和 61。如果会出现差一错误，这就是需要检查的地方。

    *   **测试典型数据值**。这些是你通常可能期望得到的有效数据字段。对于上述成绩计算的例子，你可以检查 35、50、67、75、88、93 等值。如果这些值不工作，那说明你还有其他问题。

    *   **测试前置条件和后置条件**。每当你进入一个控制结构——循环或选择语句，或进行函数调用时，你都会对数据值和计算状态做出某些假设。这些就是前置条件。而当你退出该控制结构时，你也会对这些值现在是什么做出假设。这些就是后置条件。你应该通过测试前置条件和后置条件来编写测试，确保你的假设是正确的。在支持断言的编程语言（包括
    C、C++ 和 Java）中，这是使用断言的好地方。


    ____________


    ² Kernighan, B. W. 和 R. Pike. *编程实践.* (波士顿, 马萨诸塞州: Addison-Wesley, 1999.)


    测试有效数据和边界条件是一回事，但你还需要测试坏数据。


    *   **非法数据值**。你应该测试明显非法的数据，以确保你的数据验证代码正常工作。我们已经提到过测试接近数据范围边界的非法数据。你还应该测试一些明显超出范围的数据。

    *   **无数据**。没错，测试当你期望接收数据却什么也没得到的情况。例如，你提示用户输入，但用户没有输入值并按下回车键，而是直接按了回车键。或者你刚刚打开的文件是空的。或者你期望在命令行上接收三个文件，但一个也没得到。所有这些情况你都必须测试。

    *   **数据过少或过多**。你必须测试这样的情况：你要求三个数据，却只得到两个。同样，也要测试你要求三个数据，却得到十个数据的情况。

    *   **未初始化的变量**。如今大多数语言系统都会为你声明的任何变量提供默认的初始化值。但你仍然应该测试以确保这些变量被正确初始化。（实际上，无论如何你都不应该依赖系统来初始化你的数据；你应该始终自己进行初始化。）

    '
- fmt: "### Characteristics of Tests\n\nRobert Martin, in his book *Clean Code* describes\
    \ a set of characteristics that all unit tests should have using the acronym F.I.R.S.T.:[³](#Chapter14.html#CHP-14-FN-3)\n\
    \n> **Fast.** Tests should be fast. If your tests take a long time to run, you're\
    \ liable to run them less frequently. So make your tests small, simple, and fast.\n\
    > \n> **Independent.** Tests should not depend on each other. In particular, one\
    \ test shouldn't set up data or create objects that another test depends on. For\
    \ example, the JUnit testing framework for Java has separate set-up and tear-down\
    \ methods that make the tests independent. We'll examine JUnit in more detail\
    \ later on.\n> \n> **Repeatable.** You should be able to run your tests any time\
    \ you want, in any order you want, including after you've added more code to the\
    \ module.\n> \n> **Self-Validating.** The tests should either just pass or fail;\
    \ in other words, their output should just be boolean. You shouldn't have to read\
    \ pages and pages of a log file to see if the test passed or not.\n> \n> **Timely.**\
    \ This means you should write the tests when you need them, so that they're available\
    \ when you want to run them. For agile methodologies that use TDD, this means\
    \ write the unit tests first, just before you write the code that they will test.\n\
    \n_____________\n\n³ Martin, R. C. *Clean Code: A Handbook of Agile Software Craftsmanship.*\
    \ (Upper Saddle River, NJ: Prentice-Hall, 2009.)\n\nFinally, it's important that\
    \ just like your functions, your tests should only test one thing; there should\
    \ be a single concept for each test. This is very important for your debugging\
    \ work because if each test only tests a single concept in your code, a test failure\
    \ will point you like a laser at the place in your code where your error is likely\
    \ to be.\n\n### How to Write a Test\n\nBefore we go any further, let's look a\
    \ bit deeper into how to write a unit test. We will do this by hand now to get\
    \ the feel for writing tests and we'll examine how a testing framework helps us\
    \ when we talk about JUnit in the next section. We'll imagine that we are writing\
    \ a part of an application and go from there. We'll do this in the form of a user\
    \ story, as it might be done in an Extreme Programming (XP) environment.[⁴](#Chapter14.html#CHP-14-FN-4)\n\
    \nIn XP the developers and the customer get together to talk about what the customer\
    \ wants. This is called *exploration*. During exploration the customer writes\
    \ a series of *stories* that describe features that they want in the program.\
    \ These stories are taken by the developers and broken up into *implementation\
    \ tasks* and estimated. Pairs of programmers take individual tasks and implement\
    \ them using TDD. We'll present a story, break it up into a few tasks, and implement\
    \ some tests for the tasks just to give you an idea of the unit testing process.\n\
    \n#### The Story\n\nWe want to take as input a flat file of phone contacts and\
    \ we want to sort the file alphabetically and produce an output table that can\
    \ be printed.\n\nReally, that's all. Stories in XP projects are typically very\
    \ short – the suggestion is that they be written on 3 × 5 index cards.\n\nSo we\
    \ can break this story up into a set of tasks. By the way, this will look suspiciously\
    \ like a design exercise; it is.\n\n#### The Tasks\n\n> We need a class that represents\
    \ a phone contact.\n> \n> We need to create a phone contact.\n> \n> We need to\
    \ read a data file and create a list of phone contacts. (This may look like two\
    \ things, but it's really just one thing – converting a file into a list of phone\
    \ contacts.)\n> \n> We need to sort the phone contacts alphabetically by last\
    \ name.\n> \n> We need to print the sorted list.\n\n______________\n\n⁴ Newkirk,\
    \ J. and R. C. Martin. *Extreme Programming in Practice.* (Boston, MA, Addison-Wesley,\
    \ 2001.)\n\n#### The Tests\n\nFirst of all, we'll collapse the first two tasks\
    \ above into a single test. It makes sense once we've created a phone contact\
    \ class to make sure we can correctly instantiate an object; in effect we're testing\
    \ the class' constructors. So let's create a test.\n\nIn our first test we'll\
    \ create an instance of our phone contact object and print out the instance variables\
    \ to prove it was created correctly. We have to do a little design work first.\
    \ We have to figure out what the phone contact class will be called and what instance\
    \ variables it will have.\n\nA reasonable name for the class is `PhoneContact`,\
    \ and as long as it's alright with our customer, the instance variables will be\
    \ `firstName`, `lastName`, `phoneNumber`, and `emailAddr`. Oh, and they can all\
    \ be `String` variables. It's a simple contact list. For this class we can have\
    \ two constructors. A default constructor that just initializes the contacts to\
    \ null and a constructor that takes all four values as input arguments and assigns\
    \ them. That's probably all we need at the moment. Here's what the test may look\
    \ like:\n\n```\npublic class TestPhoneContact\n{\n    /**\n     * Default constructor\
    \ for test class TestPhoneContact\n     */\n    public TestPhoneContact() {\n\
        }\n\n    public void testPhoneContactCreation() {\n        String fname =\
    \ \"Fred\";\n        String lname = \"Flintstone\";\n        String phone = \"\
    800-555-1212\";\n        String email = \"fred@knox.edu\";\n\n        PhoneContact\
    \ t1 = new PhoneContact();\n        System.out.printf(\"Phone Contact reference\
    \ is %H\\n\", t1);\n\n        PhoneContact t2 = new PhoneContact(fname, lname,\
    \ phone, email);\n        System.out.printf(\"Phone Contact:\\n Name = %s\\n Phone\
    \ = %s\\n Email = %s\\n\",\n                          t2.getName(), t2.getPhoneNum(),\n\
                              t2.getEmailAddr());\n    }\n}\n```\n\nNow this test\
    \ will fail to begin with because we've not created the `PhoneContact` class yet.\
    \ That's okay. So let's do that now. The `PhoneContact` class will be simple,\
    \ just the instance variables, the two constructors, and getter and setter methods\
    \ for the variables. A few minutes later we have:\n\n```\npublic class PhoneContact\
    \ {\n    /**\n     * instance variables\n     */\n    private String lastName;\n\
        private String firstName;\n    private String phoneNumber;\n    private String\
    \ emailAddr;\n\n    /*\n     * Constructors for objects of class PhoneContact\n\
         */\n    public PhoneContact() {\n        lastName = \"\";\n        firstName\
    \ = \"\";\n        phoneNumber = \"\";\n        emailAddr = \"\";\n    }\n\n    public\
    \ PhoneContact(String firstName, String lastName,\n                        String\
    \ phoneNumber, String emailAddr) {\n        this.lastName = lastName;\n        this.firstName\
    \ = firstName;\n        this.phoneNumber = phoneNumber;\n        this.emailAddr\
    \ = emailAddr;\n    }\n\n    /**\n     * Getter and Setter methods for each of\
    \ the instance variable\n     */\n    public String getName() {\n       return\
    \ this.lastName + \", \" + this.firstName;\n    }\n\n    public String getLastName()\
    \ {\n        return this.lastName;\n    }\n\n    public String getFirstName()\
    \ {\n        return this.firstName;\n    }\n\n    public String getPhoneNum()\
    \ {\n        return this.phoneNumber;\n    }\n\n    public String getEmailAddr()\
    \ {\n        return this.emailAddr;\n    }\n\n    public void setLastName(String\
    \ lastName) {\n        this.lastName = lastName;\n    }\n\n    public void setFirstName(String\
    \ firstName) {\n        this.firstName = firstName;\n    }\n\n    public void\
