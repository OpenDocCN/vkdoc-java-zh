    used to it. As Kent Beck says, “Embrace change.” What you can do is *manage* change.
    Create a backlog of new features that get added as they arrive. In the Scrum methodology,
    new requirements are always added to the release backlog, they are not added to
    the current iteration; this allows the current sprint to proceed normally and
    the requirements are all reviewed at the end of the sprint. Another way to manage
    change is to push the decision onto the user; give the user a choice - “If we
    implement this new feature it will add 6 weeks to the schedule. Do you still want
