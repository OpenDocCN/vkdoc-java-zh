    嗯，这看起来没问题。注意，因为`Square`的宽度和高度是相同的，我们不能冒险单独更改它们，所以`setSide()`使用`setWidth()`和`setHeight()`来同时设置`Square`的边长。没什么大不了的，对吧？


    好吧，如果我们有一个像这样的函数：


    `void myFunc(Rectangle r, double newWidth) {`

