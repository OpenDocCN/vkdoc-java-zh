    \ programmers. In C++ we can say: `#include <string>`\n    `/*`\n    ` * getSubString()\
    \ - get a substring from the input string.`\n    ` *  The substring starts at\
    \ index start`\n    ` *  and goes up to but doesn’t include index stop.`\n   \
    \ ` *  returns the resulting substring.`\n    ` */`\n    `string getSubString(string\
    \ str, int start, int stop) { }`\n*   In Java use JavaDoc comments for all your\
    \ methods. JavaDoc is built into the Java environment and all Java SDKs come with\
    \ the program to generate JavaDoc web pages, so why not use it? JavaDoc can provide\
    \ a nice overview of what your class is up to at very little cost. Just make sure\
    \ and keep those comments up to date! `/**`\n    ` * getSubString() - get a substring\
    \ from the input string.`\n    ` *      The substring starts at index start`\n\
    \    ` *      and goes up to but doesn’t include index stop.`\n    ` *  @param\
    \ str the input string`\n    ` *  @param start the integer starting index`\n \
    \   ` *  @param stop the integer stopping index`\n    ` *  @return the resulting\
    \ substring.`\n    ` */`\n    `String getSubString(String str, int start, int\
    \ stop) { }`\n*   Use fewer, but better comments. This is one of those useless\
    \ motherhood and apple pie pieces of advice that everyone feels obliged to put\
    \ in any discussion of comments. OK, so you don’t need to comment ever line of\
    \ code. Everyone knows that `index = index + 1;      // add one to index`\n  \
    \  *   is pretty stupid. So don’t do it. Enough said.\n*   “Self-documenting code”\
    \ is an ideal. Self documenting code is the Holy Grail of lazy programmers who\
    \ don’t want to take the time to explain their code to readers. Get over it. Self\
    \ documenting code is the Platonic ideal of coding that assumes that everyone\
    \ who reads your code can also read your mind. If you have an algorithm that’s\
    \ at all complicated, or input that is at all obscure, you need to explain it.\
    \ Don’t depend on the reader to grok every subtlety of your code. Explain it.\
    \ Just do it.\n\n### Identifier Naming Conventions\n\nAs Rob Pike puts it so well\
    \ in his terrific white paper on programming style, “Length is not a virtue in\
    \ a name; clarity of expression *is*.”^([7](#Chapter12.html#CH-12-FN-7)) As Goldilocks\
    \ would put it, you need identifier names that are not too long, not too short,\
    \ but just right. Just like comments, this means different things to different\
    \ people. Common sense and readability should rule.\n\n*   All identifiers should\
    \ be descriptive.\n    Remember, someday you may be back to look at your code\
    \ again. Or, if you’re working for a living, somebody else will be looking at\
    \ your code. Descriptive identifiers make it much, much easier to read your code\
    \ and figure out what you were trying to do at 3:00 AM. A variable called `interestRate`\
    \ is much easier to understand than `ir`. Sure, `ir` is shorter and faster to\
    \ type, but believe me, you’ll forget what it stood for about 10 minutes after\
    \ you ship that program. Reasonably descriptive identifiers can save you a lot\
    \ of time and effort.\n*   `OverlyLongVariableNamesAreHardToRead` (and type)\n\
    \    On the other hand, don’t make your identifiers too long. For one thing they\
    \ are hard to read, for another they don’t really add anything to the context\
    \ of your program, they use up too much space on the page, and finally, they’re\
    \ just plain ugly.\n\n__________\n\n⁷ Pike, Rob, *Notes on Programming in C*,\
    \ retrieved from [`http://www.literateprogramming.com/pikestyle.pdf`](http://www.literateprogramming.com/pikestyle.pdf)\
    \ on 29 September 2010\\. 1999.\n\n*   `Andtheyareevenharderwhenyoudontincludeworddivisions`\n\
    \    Despite what Rob Pike says [Pike80, p. 2], using camel case (those embedded\
    \ capital letters that begin new words in your identifiers) can make your code\
    \ easier to read. Especially if the identifier isn’t overly long. At least to\
    \ me, `maxPhysAddr` is easier to read than `maxphysaddr`.\n*   And single-letter\
    \ variable names are cryptic, but useful.\n\nUsing single letter variable names\
    \ for things like mortgage payments, window names, or graphics objects is not\
    \ a good example of readability. M, w, and g don’t mean anything even in the context\
    \ of your code. `mortpmnt`, `gfxWindow`, `gfxObj` have more meaning. The big exception\
    \ here is variables intended as index values – loop control variables and array\
    \ index variables. Here, `i`, `j`, `k`, `l`, `m`, etc. are easily understandable,\
    \ although I wouldn’t argue about using `index`, or `indx` instead.\n\n`for (int\
    \ i = 0; i < myArray.length; i++) {`\n    `    myArray[i] = 0;`\n    `}`\n   \
    \ *   looks much better and is just as understandable as `for (int arrayIndex\
    \ = 0; arrayIndex < myArray.length; arrayIndex++) {`\n        `    myArray[arrayIndex]\
    \ = 0;`\n        `}`\n*   Adhere to the programming language naming conventions\
    \ when they exist.\n    *   Somewhere, sometime, you’ll run into a document called\
    \ Style Guide or something like that. Nearly every software development organization\
    \ of any size has one. Sometimes you’re allowed to violate the guidelines, and\
    \ sometimes during a code review you’ll get dinged for not following the guidelines\
    \ and have to change your code.\n    *   If you work in a group with more than\
    \ one developer, style guidelines are a good idea. They give all your code a common\
    \ look and feel and they make it easier for one developer to make changes to code\
    \ written by somebody else.\n    *   A common set of guidelines in a Style Guide\
    \ is about naming conventions. Naming conventions tell you what your identifier\
    \ names should look like for each of the different kind of identifiers. Java has\
    \ a common set of naming conventions:\n    *   For classes and interfaces: The\
    \ identifier names should be nouns, using both upper and lowercase alphanumerics\
    \ and with the first character of the name capitalized. `public class Automobile\
    \ {}`\n        `public interface Shape {}`\n    *   For methods: The identifier\
    \ names should be verbs, using both upper and lowercase alphanumerics and with\
    \ the first character of the name in lower case. `private double computeAverage(int\
    \ [] list)`\n    *   For variables: The identifier names should use both upper\
    \ and lowercase alphanumerics, with the first character of the name in lower case.\
    \ Variable names should not start with $ or _ (underscore). `double average;`\n\
    \        `String firstSentence;`\n    *   For all identifiers (except constants),\
    \ camel case should be used, so that internal words are capitalized. `long myLongArray;`\n\
    \    *   For constants: All letters should be uppercase and words should be separated\
    \ by underscores. `static final int MAX_WIDTH = 80;`"
  trans: "\n`if (argc < 2) {`\n        `    fprintf(stderr, \"Usage: %s <filename>\\\
    n\", argv[0]);`\n        `    exit(1);`\n        `}`\n    *   那么你可以这样做（但我首先不推荐这种风格）。\n\
    *   不要让注释换行——改用块注释。这通常发生在你将注释附加到源代码行末尾时，例如 `if (argc < 2) { // make sure we have\
    \ the right number of arguments from the`\n    `command line`\n*   不要这样做。应将其改为\
    \ `if` 语句上方的块注释（参见上一条要点）。这样读起来会容易得多。\n*   所有函数/方法都应有头部块注释。这条建议的目的是让读者知道该方法的功能。如果你为方法名和输入参数使用了良好的标识符名称，这一必要性会有所降低。尽管如此，你仍应告知用户该方法将执行什么操作，以及返回值（如果有的话）是什么。关于这条建议，请参见下方针对\
    \ Java 程序员的版本。在 C++ 中，我们可以这样写：`#include <string>`\n    `/*`\n    ` * getSubString()\
    \ - 从输入字符串中获取子字符串。`\n    ` *  子字符串从索引 start 开始，`\n    ` *  一直到索引 stop 之前（不包括 stop）。`\n\
    \    ` *  返回结果子字符串。`\n    ` */`\n    `string getSubString(string str, int start,\
    \ int stop) { }`\n*   在 Java 中，请为所有方法使用 JavaDoc 注释。JavaDoc 内置于 Java 环境中，所有 Java\
    \ SDK 都附带用于生成 JavaDoc 网页的程序，既然如此，何乐而不为呢？JavaDoc 能以极低的成本为你的类提供清晰的概览。只需确保及时更新这些注释即可！`/**`\n\
    \    ` * getSubString() - 从输入字符串中获取子字符串。`\n    ` *      子字符串从索引 start 开始，`\n \
    \   ` *      一直到索引 stop 之前（不包括 stop）。`\n    ` *  @param str 输入字符串`\n    ` *  @param\
    \ start 整数起始索引`\n    ` *  @param stop 整数结束索引`\n    ` *  @return 结果子字符串。`\n   \
    \ ` */`\n    `String getSubString(String str, int start, int stop) { }`\n*   使用更少但更好的注释。这是那种老生常谈、人人都觉得有必要在任何关于注释的讨论中提及的“妈妈和苹果派”式的建议。好吧，你不需要注释每一行代码。大家都知道\
    \ `index = index + 1;      // add one to index`\n    *   这种做法很愚蠢。所以别这么做。言尽于此。\n\
    *   “自文档化代码”是一种理想。自文档化代码是那些不愿花时间向读者解释代码的懒惰程序员的“圣杯”。醒醒吧。自文档化代码是编程中的柏拉图式理想，它假设每个阅读你代码的人都能读懂你的心思。如果你的算法有点复杂，或者输入有点晦涩，你就需要解释它。不要指望读者能领会你代码中的每一个微妙之处。解释清楚。就这么做。\n\
    \n### 标识符命名约定\n\n正如 Rob Pike 在他那篇关于编程风格的精彩白皮书中精辟指出的那样：“名称的长度并非美德；表达的清晰度才是。”^(7)\
    \ 正如金发姑娘会说的那样，你需要既不太长也不太短、恰到好处的标识符名称。就像注释一样，这对不同的人意味着不同的东西。常识和可读性应占主导地位。\n\n*\
    \   所有标识符都应具有描述性。\n    请记住，有朝一日你可能会回过头来再看自己的代码。或者，如果你是在为生计而工作，那么其他人也会查看你的代码。描述性标识符能让你（或他人）在凌晨\
    \ 3 点阅读代码并弄清楚你当时想做什么时，变得容易得多。一个名为 `interestRate` 的变量比 `ir` 更容易理解。当然，`ir` 更短，输入更快，但请相信我，在发布那个程序大约\
    \ 10 分钟后，你就会忘记它代表什么。合理的描述性标识符可以为你节省大量时间和精力。\n*   `OverlyLongVariableNamesAreHardToRead`（且难以输入）\n\
    \    另一方面，不要让你的标识符太长。首先，它们难以阅读；其次，它们并不会为你的程序上下文增加任何实质内容；再次，它们会占用页面上太多空间；最后，它们简直丑得可以。\n\
    \n__________\n\n⁷ Pike, Rob, *Notes on Programming in C*，检索自 [`http://www.literateprogramming.com/pikestyle.pdf`](http://www.literateprogramming.com/pikestyle.pdf)，检索日期：2010\
    \ 年 9 月 29 日。1999 年。\n\n*   `Andtheyareevenharderwhenyoudontincludeworddivisions`\n\
    \    尽管 Rob Pike 说过 [Pike80, p. 2]，但使用驼峰命名法（即标识符中嵌入大写字母来分隔新单词）可以使你的代码更易于阅读。特别是当标识符不太长的时候。至少对我来说，`maxPhysAddr`\
    \ 比 `maxphysaddr` 更容易阅读。\n*   单字母变量名虽然晦涩，但有时很有用。\n\n将单字母变量名用于抵押贷款支付、窗口名称或图形对象等，并不是可读性的好例子。即使在你代码的上下文中，M、w\
    \ 和 g 也毫无意义。`mortpmnt`、`gfxWindow`、`gfxObj` 则更有意义。一个主要的例外是用作索引值的变量——循环控制变量和数组索引变量。在这种情况下，`i`、`j`、`k`、`l`、`m`\
    \ 等是易于理解的，尽管我不会反对使用 `index` 或 `indx` 来代替。\n\n`for (int i = 0; i < myArray.length;\
    \ i++) {`\n    `    myArray[i] = 0;`\n    `}`\n    *   看起来好多了，并且与 `for (int arrayIndex\
    \ = 0; arrayIndex < myArray.length; arrayIndex++) {`\n        `    myArray[arrayIndex]\
    \ = 0;`\n        `}` 一样易于理解。\n*   当编程语言命名约定存在时，请遵守它们。\n    *   在某个时间、某个地点，你总会遇到一份名为《风格指南》或类似名称的文档。几乎每个有一定规模的软件开发组织都有这样的文档。有时你可以违反这些指南，但有时在代码审查中，你会因为不遵守指南而被扣分，并不得不修改你的代码。\n\
    \    *   如果你在一个有多个开发者的团队中工作，风格指南是个好主意。它们能让所有代码具有统一的外观和感觉，并使一个开发者更容易修改由其他人编写的代码。\n\
    \    *   《风格指南》中一套常见的指南是关于命名约定的。命名约定告诉你，对于每种不同类型的标识符，你的标识符名称应该是什么样子。Java 有一套常见的命名约定：\n\
    \    *   对于类和接口：标识符名称应为名词，使用大写和小写字母数字字符，并且名称的首字母大写。`public class Automobile {}`\n\
    \        `public interface Shape {}`\n    *   对于方法：标识符名称应为动词，使用大写和小写字母数字字符，并且名称的首字母小写。`private\
    \ double computeAverage(int [] list)`\n    *   对于变量：标识符名称应使用大写和小写字母数字字符，并且名称的首字母小写。变量名不应以\
    \ $ 或 _（下划线）开头。`double average;`\n        `String firstSentence;`\n    *   对于所有标识符（常量除外），应使用驼峰命名法，以便内部单词的首字母大写。`long\
    \ myLongArray;`\n    *   对于常量：所有字母应大写，单词之间用下划线分隔。`static final int MAX_WIDTH =\
    \ 80;`\n"
- fmt: "### Defensive Programming\n\nBy defensive programming we mean that your code\
    \ should protect itself from bad data. The bad data can come from user input via\
    \ the command line, a graphical text box or form, or a file. Bad data can also\
    \ come from other routines in your program via input parameters like in the first\
    \ example above.\n\nHow do you protect your program from bad data? Validate! As\
    \ tedious as it sounds, you should always check the validity of data that you\
    \ receive from outside your routine. This means you should check the following:\n\
    \n- Check the number and type of command line arguments.\n- Check file operations.\n\
    \    - Did the file open?\n    - Did the read operation return anything?\n   \
    \ - Did the write operation write anything?\n    - Did we reach EOF yet?\n- Check\
    \ all values in function/method parameter lists.\n    - Are they all the correct\
    \ type and size?\n- You should always initialize variables and not depend on the\
    \ system to do the initialization for you.\n\nWhat else should you check for?\
    \ Well, here’s a short list:\n\n- Null pointers (references in Java)\n- Zeros\
    \ in denominators\n- Wrong type\n- Out of range values\n\nAs an example, here’s\
    \ a C program that takes in a list of house prices from a file and computes the\
    \ average house price from the list. The file is provided to the program from\
    \ the command line.\n\n```\n/*\n * program to compute the average selling price\
    \ of a set of homes.\n * Input comes from a file that is passed via the command\
    \ line.\n * Output is the Total and Average sale prices for\n * all the homes\
    \ and the number of prices in the file.\n *\n * jfdooley\n */\n#include <stdlib.h>\n\
    #include <stdio.h>\n\nint main(int argc, char **argv)\n{\n        FILE *fp;\n\
    \        double totalPrice, avgPrice;\n        double price;\n        int numPrices;\n\
    \n        /* check that the user entered the correct number of args */\n     \
    \   if (argc < 2) {\n                fprintf(stderr,\"Usage: %s <filename>\\n\"\
    , argv[0]);\n                exit(1);\n        }\n\n        /* try to open the\
    \ input file */\n        fp = fopen(argv[1], \"r\");\n        if (fp == NULL)\
    \ {\n                fprintf(stderr, \"File Not Found: %s\\n\", argv[1]);\n  \
    \              exit(1);\n        }\n        totalPrice = 0.0;\n        numPrices\
    \ = 0;\n\n        while (!feof(fp)) {\n                fscanf(fp, \"%10lf\\n\"\
    , &price);\n                totalPrice += price;\n                numPrices++;\n\
    \        }\n\n        avgPrice = totalPrice / numPrices;\n        printf(\"Number\
    \ of houses is %d\\n\", numPrices);\n        printf(\"Total Price of all houses\
    \ is $%10.2f\\n\", totalPrice);\n        printf(\"Average Price per house is $%10.2f\\\
    n\", avgPrice);\n\n        return 0;\n}\n```\n\n### Assertions Can Be Your Friend\n\
    \nDefensive programming means that using assertions is a great idea if your language\
    \ supports them. Java, C99, and C++ all support assertions. Assertions will test\
    \ an expression that you give them and if the expression is false, it will throw\
    \ an error and normally abort the program. You should use error handling code\
    \ for errors you think might happen – erroneous user input, for example – and\
    \ use assertions for errors that should *never* happen – off by one errors in\
    \ loops, for example. Assertions are great for testing your program, but because\
    \ you should remove them before giving programs to customers (you don’t want the\
    \ program to abort on the user, right?) they aren’t good to use to validate input\
    \ data.\n\n### Exceptions and Error Handling\n\nWe’ve talked about using assertions\
    \ to handle truly bad errors, ones that should never occur in production. But\
    \ what about handling “normal” errors? Part of defensive programming is to handle\
    \ errors in such a way that no damage is done to any data in the program or the\
    \ files it uses, and so that the program stays running for as long as possible\
    \ (making your program robust).\n\nLet’s look at exceptions first. You should\
    \ take advantage of built-in exception handling in whatever programming language\
    \ you’re using. The exception handling mechanism will give you information about\
    \ what bad thing has just happened. It’s then up to you to decide what to do.\
    \ Normally in an exception handling mechanism you have two choices, handle the\
    \ exception yourself, or pass it along to whoever called you and let them handle\
    \ it. What you do and how you do it depends on the language you’re using and the\
    \ capabilities it gives you. We’ll talk about exception handling in Java later.\n\
    \n#### Error Handling\n\nJust like with validation, you’re most likely to encounter\
    \ errors in input data, whether it’s command line input, file handling, or input\
    \ from a graphical user interface form. Here we’re talking about errors that occur\
    \ at run time. Compile time and testing errors are covered in the next chapter\
    \ on debugging and testing. Other types of errors can be data that your program\
    \ computes incorrectly, errors in other programs that interact with your program,\
    \ the operating system for instance, race conditions, and interaction errors where\
    \ your program is communicating with another and your program is at fault.\n\n\
    The main purpose of error handling is to have your program survive and run correctly\
    \ for as long as possible. When it gets to a point where your program cannot continue,\
    \ it needs to report what is wrong as best as it can and then exit gracefully.\
    \ Exiting is the last resort for error handling. So what should you do? Well,\
    \ once again we come to the “it depends” answer. What you should do depends on\
    \ what your program’s context is when the error occurs and what its purpose is.\
    \ You won’t handle an error in a video game the same way you handle one in a cardiac\
    \ pacemaker. In every case, your first goal should be – try to recover.\n\nTrying\
    \ to recover from an error will have different meanings in different programs.\
    \ Recovery means that your program needs to try to either ignore the bad data,\
    \ fix it, or substitute something else that is valid for the bad data. See McConnell^([8](#Chapter12.html#CH-12-FN-8))\
    \ for a further discussion of error handling. Here are a few examples of how to\
    \ recover from errors:\n\n- You might just *ignore the bad data and keep going*,\
    \ using the next valid piece of data. Say your program is a piece of embedded\
    \ software in a digital pressure gauge. You sample the sensor that returns the\
    \ pressure 60 times a second. If the sensor fails to deliver a pressure reading\
    \ once, should you shut down the gauge? Probably not; a reasonable thing to do\
    \ is just skip that reading and set up to read the next piece of data when it\
    \ arrives. Now if the pressure sensor skips several readings in a row, then something\
    \ might be wrong with the sensor and you should do something different (like yell\
    \ for help).\n\n__________\n\n⁸ McConnell, 2004."
