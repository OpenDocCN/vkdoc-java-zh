- fmt: "# The Adapter Pattern\n\nSo here’s the problem. You’ve got a client program\
    \ `Foo` that wants to access another class or library or package, `Bar`. The problem\
    \ is, `Foo` is expecting a particular interface and that interface is different\
    \ from the public interface that `Bar` presents to the world. What are you to\
    \ do?\n\nWell, you could rewrite `Foo` to change the interface it expects to conform\
    \ to the interface that `Bar` is presenting. But if `Foo` is large, or if it’s\
    \ being used by other classes, that may not be a viable possibility. Or you could\
    \ rewrite `Bar`, so it presents the interface that `Foo` is expecting. But maybe\
    \ `Bar` is a commercial package and you don’t have the source code?\n\nThat’s\
    \ where the Adapter design pattern comes in.^([7](#Chapter11.html#CH-11-FN-7))\
    \ You use the Adapter pattern to create an intermediate class that wraps the `Bar`\
    \ interface inside a set of methods that presents the interface that `Foo` is\
    \ looking for. Here’s the idea: the Adapter can interface with `Foo` on one side\
    \ and with `Bar` on the other. So the interface to `Bar` doesn’t have to change,\
    \ and `Foo` users gets the interface they expects. Everyone is happy! By the way,\
    \ the Adapter design pattern is also called the *Wrapper* pattern because it wraps\
    \ an interface.^([8](#Chapter11.html#CH-11-FN-8)) See [Figure 11-2](#Chapter11.html#fig_11_2).\n\
    \n![images](images/1102.jpg)\n\n***Figure 11-2.** The Adapter lets Foo use Bar*\n\
    \nThere are two ways to implement adapters: *class adapters,* where the adapter\
    \ will inherit from the target class, and *object adapters* that use delegation\
    \ to create the adapter. Note the difference: a *class adapter* subclasses an\
    \ existing class and implements a target interface. An *object adapter* subclasses\
    \ a target class and delegates to an existing class. [Figure 11-3](#Chapter11.html#fig_11_3)\
    \ is the UML for a generic class adapter.\n\n___________________\n\n⁷ Gamma et.\
    \ al, 1995.\n\n⁸ Gamma et. al, 1995.\n\n![images](images/1103.jpg)\n\n***Figure\
    \ 11-3.** A class adapter example*\n\nNote that the `Adapter` class inherits from\
    \ the `Adaptee` class and implements the same `Target` interface that the `Client`\
    \ class uses. Here’s the code for this example:\n\n```\npublic class Client\n\
    {\n    public static void main(String [] args) {\n        Target myTarget = new\
    \ Adapter();\n\n        System.out.println(myTarget.sampleMethod(12));\n    }\n\
    }\n```\n\n```\npublic interface Target\n{\n   int sampleMethod(int y);\n}\n```\n\
    \n```\npublic class Adapter extends Adaptee implements Target\n{\n    public int\
    \ sampleMethod(int y) {\n        return myMethod(y);\n    }\n}\n```\n\n```\npublic\
    \ class Adaptee\n{\n   public Adaptee() {\n   }\n\n    public int myMethod(int\
    \ y) {\n        return y * y;\n    }\n}\n```\n\nThe object adapter, on the other\
    \ hand still implements the `Target` interface, but uses composition with the\
    \ `Adaptee` class in order to accomplish the wrapping; it will look like:\n\n\
    ```\npublic class Adapter implements Target\n{\n    Adaptee myAdaptee = new Adaptee();\n\
    \n    public int sampleMethod(int y) {\n        return myAdaptee.myMethod(y);\n\
    \    }\n}\n```\n\nIn both cases, the `Client` doesn’t have to change! That’s the\
    \ beauty of Adapter. You can change which `Adaptee` you’re using, by changing\
    \ the `Adapter` and not the `Client`.\n\n## Behavioral Patterns\n\nWhere creational\
    \ patterns are all about how to create new objects, and structural patterns are\
    \ all about getting objects to communicate and cooperate, behavioral patterns\
    \ are all about getting objects to do things. They examine how responsibilities\
    \ are distributed in the design and how communication happens between objects.\
    \ The three patterns we’ll look at here all describe how to assign behavioral\
    \ responsibilities to classes. The Iterator pattern is about how to traverse a\
    \ collection of objects. The Observer pattern tells us how to manage push and\
    \ pull state changes. The Strategy pattern lets us select different behaviors\
    \ behind a single interface.\n\n### The Iterator Pattern\n\nIf you’ve programmed\
    \ in Java, you have seen iterators. We’ll get to that, but let's start at the\
    \ beginning. If you have a *collection of elements*, you can organize them in\
    \ many different ways. They can be arrays, linked lists, queues, hash tables,\
    \ sets, and so on. Each of these collections will have its own unique set of operations,\
    \ but there’s usually one operation that you might want to perform on all of them\
    \ – *traverse the entire collection from beginning to end, one element at a time*.\
    \ Oh, and you want to traverse the elements in such a way that *you don’t need\
    \ to know the internal structure of the collection*. And you may want to be able\
    \ to traverse the collection backwards, and you may want to have several traversals\
    \ going on at the same time.\n\nThat’s what the Iterator pattern is for.^([9](#Chapter11.html#CH-11-FN-9))\
    \ The Iterator pattern creates an object that allows you to traverse a collection,\
    \ one element at a time.\n\nBecause of the requirement that you don’t need to\
    \ know about the internal structure of the collection, an Iterator object doesn’t\
    \ care about sorting order; it just returns each object as it’s stored in the\
    \ collection, one at a time from first to last. The simplest iterator needs just\
    \ two methods\n\n*   `hasNext()`: Which returns a true if there is an element\
    \ to be retrieved, i.e. we’ve not reached the end of the collection yet; and false\
    \ if there’s no elements left.\n*   `getNextElement()`: Which returns the next\
    \ element in the collection.\n\n___________________\n\n⁹ Gamma et. al, 1995.\n\
    \nIn the Iterator Pattern, we have an `Iterator` interface that is implemented\
    \ to make a concrete `Iterator` object that is used by a concrete `Collections`\
    \ object. Both of these are used by a client that creates the `Collection` and\
    \ gets the iterator from there. [Figure 11-4](#Chapter11.html#fig_11_4) is the\
    \ UML version of this from Gamma et. al.\n\n![images](images/1104.jpg)\n\n***Figure\
    \ 11-4.** An example of using the Iterator Pattern*\n\nYou can see that the client\
    \ class uses the `Collection` and the `Iterator` interfaces, and the `Concrete_Iterator`\
    \ is part of and uses the `Concrete_Collection`. Note that the `Collection_Interface`\
    \ will contain an abstract method to create an iterator for the `Collection`.\
    \ This method is implemented in the `Concrete_Collection` class and when the client\
    \ calls the method, a `Concrete_Iterator` is created and passed to the client\
    \ to use.\n\nStarting in version 1.2, Java contained the **Java Collections Framework**\
    \ (JCF) that included a number of new classes and interfaces to allow you to create\
    \ collections of objects, including an `Iterator` interface. All of these new\
    \ types contained iterators. Java even included (just for collections of type\
    \ `List`) an expanded Iterator called a `ListIterator`. With the `ListIterator`\
    \ you can go backwards through the list.\n\nTypical Iterator code in Java using\
    \ both the `Iterator` and the `ListIterator` implementations:\n\n```\n/**\n *\
    \ Iterate through elements Java ArrayList using an Iterator\n * We then use ListIterator\
    \ to go backwards through the same\n * ArrayList\n*/\n\nimport java.util.ArrayList;\n\
    import java.util.Iterator;\nimport java.util.ListIterator;\n\npublic class ArrayListIterator\
    \ {\n    public static void main(String[] args) {\n        //create an ArrayList\
    \ object\n        ArrayList<Integer> arrayList = new ArrayList<Integer>();\n \
    \       //Add elements to Arraylist\n        arrayList.add(1);\n        arrayList.add(3);\n\
    \        arrayList.add(5);\n        arrayList.add(7);\n        arrayList.add(11);\n\
    \        arrayList.add(13);\n        arrayList.add(17);\n\n        //get an Iterator\
    \ object for ArrayList\n        Iterator iter = arrayList.iterator();\n\n    \
    \    System.out.println(\"Iterating through ArrayList elements\");\n        while(iter.hasNext())\
    \ {\n            System.out.println(iter.next());\n        }\n\n        ListIterator\
    \ list_iter = arrayList.listIterator(arrayList.size());\n```"
