    ## 关于技术审校


    ![图片](img/john_zukowski.jpg) ![图片](img/square.jpg) **约翰·祖科夫斯基**从事专业软件开发已超过 20
    年。他最初在 Commodore Vic-20 上用 BASIC 语言编程，随后转向 Commodore 64。他曾在 VAX/VMS 系统上使用 FORTRAN
    开发，在早期的 Sun3/4 Solaris 平台上使用 C 和 C++，并在过去 15 年间专注于微设备、桌面和服务器端的 Java 平台开发。约翰还撰写了十本与
    Java 技术相关的书籍，从第一本《*Java AWT 参考手册*》（O''Reilly，1997）到最新著作《*Java 6 平台揭秘*》（Apress，2006）。闲暇时，你可能会发现他在
    Facebook 上玩《黑帮战争》，或在 Twitter（@JavaJohnZ）上参加竞赛。


    ## 前言


    这本书究竟讲什么？简而言之，它从个人视角探讨如何开发软件。我们将审视从理解问题到最终编写出解决方案的完整过程。正因如此，本书着重关注设计。你如何设计软件？需要考虑哪些因素？什么是优秀的设计？设计软件有哪些方法和流程？小型程序的设计与大型程序有何不同？如何区分设计的好坏？


    其次，本书涉及代码构建。你如何编写程序并使其正常运行？“什么？”你可能会说，“我已经写过无数程序了！我当然知道怎么写代码！”但在本书中，我们将深入剖析你已有的实践，并探索改进之道。我们会花时间讨论编码标准、调试、单元测试、模块化以及优秀程序的特征。我们还会探讨代码阅读以及如何让程序更具可读性。优秀的、可读性强的代码能否替代文档？你究竟需要多少文档？


    第三，本书也涉及软件工程，它通常被定义为“将工程原理应用于软件开发”。什么是“工程原理”？首先，所有工程工作都遵循一个明确的流程。因此，我们会花一些时间讨论如何运作一个软件开发项目，以及项目包含哪些阶段。所有工程工作都基于将科学和数学应用于现实世界的问题。软件开发也是如此。正如我所说，我们会花大量时间研究如何设计和实现解决特定问题的程序。


    顺便提一句，至少还有一个人（除了我）认为软件开发不是一门工程学科。我指的是阿里斯泰尔·科伯恩，你可以在[`http://alistair.cockburn.us/The+end+of+software+engineering+and+the+start+of+economic-cooperative+gaming`](http://alistair.cockburn.us/The+end+of+software+engineering+and+the+start+of+economic-cooperative+gaming)阅读他的论文《软件工程的终结与经济合作博弈的开始》。


    最后，本书还涉及专业实践，包括作为软件开发者的道德与责任、社会问题、隐私、如何编写安全稳健的代码等等。简而言之，就是成为一名*专业*软件开发者所需的其他那些模糊但重要的事项。


    本书涵盖了 ACM 计算课程 2001 年课程 C292c“软件开发与专业实践”（[`www.acm.org/education/education/curricula-recommendations`](http://www.acm.org/education/education/curricula-recommendations)）中描述的许多主题。它旨在成为一本面向在职专业人士的教科书和手册。虽然章节顺序大致遵循标准的软件开发流程，但读者可以独立、不按顺序阅读各章。我假设你已经知道如何编程，并且熟悉
    Java、C 或 C++中的至少一种。我还假设你熟悉基本的数据结构，包括列表、队列、栈、映射和树，以及操作它们的算法。


    我在一门面向大三学生的软件开发课程中使用了这本书。它源于我过去五年为这门课编写的讲义。我之所以编写自己的讲义，是因为我找不到一本涵盖我认为软件开发课程（而非软件工程课程）所必需的所有主题的书。软件工程书籍往往更侧重于流程和项目管理，而不是设计和实际开发。我希望专注于设计和编写真正的代码，而不是如何运作大型项目。在开始教学之前，我在计算机行业工作了超过
    18 年，先后为大公司和初创公司工作，编写软件并管理其他编写软件的人。这本书是我对如何在一个中小型团队中成为一名软件开发者并帮助开发出优秀软件的见解。


    我希望在读完本书后，你能更清楚地了解优秀程序的设计是什么样的，什么造就了一个高效且富有成效的开发者，以及如何开发更大规模的软件。你会对设计问题有更深入的了解。你会思考如何在团队中工作，按照书面计划交付产品。你将开始理解项目管理，了解一些度量标准，知道如何评审工作产品，并理解配置管理。我远未涵盖软件开发的全部内容，我们只会粗略地审视软件工程的管理方面，但无论你是独立工作还是团队协作，你都将处于一个更好的位置，去构思、设计、实现和测试各种规模的软件。


    ## 第 1 章


    ## 软件开发导论


    > *“不仅目前看不到银弹，而且软件的本质决定了未来也不太可能出现——没有任何发明能像电子、晶体管和大规模集成电路对计算机硬件那样，对软件的生产力、可靠性和简洁性产生革命性影响。我们永远不能指望每两年看到两倍的收益。”*

    >

    > —— 小弗雷德里克·J·布鲁克斯 ^(1)


    那么，你可能会问自己，为什么这本书叫《*软件开发与专业实践*》？为什么不叫《编程大全》或《软件工程》？毕竟，软件开发不就是这些吗？嗯，不是。编程是软件开发的一部分，但肯定不是全部。同样，软件开发是软件工程的一部分，但也不是全部。


    以下是本书将使用的软件开发定义：软件开发是一个过程，它从用户那里获取一组需求（问题陈述），对其进行分析，设计问题的解决方案，然后在计算机上实现该解决方案。


    那么，你可能会问，这不就是编程吗？嗯，不是。编程实际上只是软件开发的实现部分，或者可能包括设计和实现部分。编程是软件开发的核心，但并非全部。


    那么，它不就是软件工程吗？同样，不是。软件工程也涉及一个过程，并包含软件开发，但它还包括创建人们将使用的计算机程序的整个管理方面。软件工程包括项目管理、配置管理、进度安排与估算、基线建立与调度、人员管理以及其他若干事项。软件开发是软件工程中有趣的部分。


    因此，软件开发是将软件工程的焦点缩小到仅与创建实际软件相关的部分。同时，它也是将编程的焦点扩展到包括分析、设计和发布问题。


    __________


    ¹ 布鲁克斯，弗雷德里克。“没有银弹。”《*IEEE 计算机*》（1987 年）。20(4): 10-19。

    '
- fmt: '### What We''re Doing


    It turns out that, after 60 or so years of using computers, we''ve discovered
    that developing software is hard. Learning how to develop software correctly,
    efficiently, and beautifully is also hard. You''re not born knowing how to do
    it, and most people, even those who take programming courses and work in the industry
    for years, don''t do it particularly well. It''s a skill you need to pick up and
    practice – a lot. You don''t learn programming and development by reading books
    – not even this one. You learn it by doing it. That, of course, is the attraction;
    working on interesting and difficult problems. The challenge is to work on something
    you''ve never done before, something you might not even know if you can solve.
    That''s what has you coming back to create new programs again and again.


    There are probably several ways to learn software development. But I think that
    all of them involve reading excellent designs, reading a lot of code, writing
    a lot of code, and thinking deeply about how you approach a problem and design
    a solution for it. Reading a lot of code, especially really beautiful and efficient
    code, gives you lots of good examples about how to think about problems and approach
    their solution in a particular style. Writing a lot of code lets you experiment
    with the styles and examples you''ve seen in your reading. Thinking deeply about
    problem solving lets you examine how you work and how you do design, and lets
    you extract from your labors those patterns that work for you; it makes your programming
    more intentional.


    ### So, How to Develop Software?


    Well, the first thing you should do is read this book. It certainly won''t tell
    you everything, but it will give you a good introduction into what software development
    is all about and what you need to do to write great code. It has its own perspective,
    but that''s a perspective based on 20 years writing code professionally and another
    16 years trying to figure out how to teach others to do it.


    Despite the fact that software development is only part of software engineering,
    software development is the heart of every software project. After all, at the
    end of the day what you deliver to the user is working code. That code is usually
    created by a team of developers working in concert. So to start, maybe we should
    look at a software project from the outside and ask what does that team need to
    do to make that project a success?


    In order to do software development well you need the following'
