    > *小而整合的团队*。小团队的沟通线路比大团队少。在小团队中，更容易了解你的队友。你可以了解队友的优势和劣势，谁了解什么，以及谁是特定问题或特定工具的“专家”。整合良好的团队通常一起完成过多个项目。让一个团队在多个项目中保持稳定是团队经理的主要职责。整合良好的团队效率更高，更能坚持按计划行事，并且在发布时产生的代码缺陷更少。保持团队稳定的关键在于给他们有趣的工作去做，然后让他们自主工作。

    >

    > *团队成员之间良好的沟通*。团队成员之间持续的沟通对于日常进展和成功完成项目至关重要。同地办公的团队比地理上分散的团队（即使他们只是位于同一栋楼的不同楼层或侧翼）沟通得更好、更频繁。这对于拥有遍布全球的软件开发站点的大型公司来说是一个主要问题。

    >

    > *团队与客户之间良好的沟通*。与客户的沟通对于控制项目中的需求和需求变更至关重要。现场或附近的客户允许与开发团队进行持续互动。客户可以对新版本提供即时反馈，并参与创建产品的系统和验收测试。极限编程敏捷开发方法论要求客户成为开发团队的一部分，并且每天在现场。关于极限编程的快速介绍，请参见第
    2 章。

    >

    > *每个人都认同的流程*。每个项目，无论大小，都遵循一个流程。较大的项目和较大的团队往往更受计划驱动，并遵循需要更多规则和文档的流程。较大的项目确实需要更多的协调以及对沟通和配置管理更严格的控制。如今，较小的项目和较小的团队往往倾向于遵循更敏捷的开发流程，具有更大的灵活性和更少的文档要求。这当然并不意味着敏捷项目*没有*流程，它只是意味着你为正在编写的项目做有意义的事情，以便能够满足所有需求、按时完成并交付高质量的产品。关于流程和软件生命周期的更多细节，请参见第
    2 章。

    >

    > *对该流程保持灵活的能力*。没有哪个项目会完全按照你第一天设想的那样进行。需求会变化，人员会流动，工具会失效，等等。这一点完全关乎如何处理项目中的风险。如果你识别出风险，计划如何减轻它们，然后制定一个应急计划来应对风险实际发生的情况，你的处境会好得多。第
    4 章讨论了需求和风险。

    >

    > *每个人都认同的计划*。你不会在没有算法的情况下编写排序程序，所以你也不应该在没有计划的情况下启动一个软件开发项目。项目计划概括了你将如何实施你的项目。它涉及流程、风险、资源、工具、需求管理、估算、进度、配置管理和交付。它不必很长，也不需要包含项目日常生活的所有细微细节，但团队中的每个人都需要参与其中，他们需要理解它，并且需要同意它。除非每个人都认同这个计划，否则你注定会失败。关于项目计划的更多细节，请参见第
    3 章。

    >

    > *时刻了解项目所处的位置*。这又是关于沟通的事情。大多数项目都有定期的状态会议，以便开发人员可以“同步”他们当前的状态，并了解整个项目的状态。这对于较小的团队（比如，最多约
    20 名开发人员）非常有效。许多小团队会在每天开始时召开每日会议进行同步。不同的流程模型处理这种“碰头”会议的方式不同。许多计划驱动的模型不要求这些会议，而是依赖团队经理之间相互沟通。敏捷流程通常要求每日会议，以改善团队成员之间的沟通，并在团队内部营造一种同志情谊。

    >

    > *有勇气说“嘿，我们落后了！”*。几乎所有的软件项目在开始时都有过于乐观的进度。我们就是这样。软件开发者通常是一群乐观的人，这体现在他们对工作的估算中。“当然，我一周内就能搞定！”“我今天下班前给你。”“明天？没问题。”不，不，不，不，不。面对现实吧。在某个时候你会落后。而最好的做法是立即告诉你的经理。当然，她可能会生气。但如果你最终落后了一个月而她毫不知情，她会更生气。弗雷德·布鲁克斯对软件项目是如何变得如此落后的著名回答是“一天一天地落后”。不过，好消息是，你越早发现自己落后，你拥有的选择就越多。这些选择包括延长进度（不太可能，但确实会发生）、将一些需求移到未来的版本、获得额外的帮助等。重要的是让你的经理随时了解情况。

    >

    > *适合此项目的正确工具和正确实践*。软件开发最好的事情之一就是每个项目都是不同的。即使你在做现有产品的 8.0 版本，情况也会发生变化。这意味着，对于每个项目，都需要检查并为*这个*特定项目选择正确的开发工具集。选择不合适的工具就像试图用螺丝刀钉钉子；你最终也许能钉进去，但肯定不容易也不美观，而且用锤子可以在更短的时间内钉更多的钉子。选择工具的三个最重要因素是：你正在编写的应用程序类型、目标平台和开发平台。你通常无法改变这三件事中的任何一件，所以一旦你知道了它们是什么，你就可以选择能够提高生产力的工具。工具选择的第四个几乎同样重要的因素是开发团队的组成和经验。如果你的团队都是经验丰富的开发者，熟悉多个平台，那么工具选择就容易得多。另一方面，如果你有一群刚毕业的新手，并且你的目标平台对你们所有人来说都是新的，那么你需要谨慎选择工具，并预留时间进行新工具的培训和实践。

    >

    > *意识到在项目开始时你并非无所不知*。软件开发项目不是这样运作的。你总会发现新的需求；其他需求会被发现并不像客户想象的那么重要；还有一些原本计划在下一个版本中实现的需求突然变成了第一需求。管理项目中的需求变更是一个软件开发人员可以拥有的最重要的技能之一。如果你正在使用新的开发工具（比如那个新的
    Web 开发框架），你会发现自己之前没有意识到的限制和副作用，这迫使你必须学习，例如，另外三个工具才能理解它们。（那个 Web 开发工具是基于 Python
    的，需要特定的关系数据库系统才能运行，并且需要特定配置的 Apache 才能正常工作。）

