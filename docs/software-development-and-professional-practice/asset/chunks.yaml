    \ big, chances are it's doing too much and should be broken up.\n\nYou also need\
    \ to look for and separate things that change from things that stay the same.\
    \ That is, search for the elements in a program that you might want to change\
    \ without forcing a redesign, then encapsulate those elements in classes.\n\n\
    All of these guidelines are key to managing the changes in your design. In the\
    \ end you want a clean, understandable design that is easy to maintain.\n\n###\
    \ ACT THREE, Scene 1: In Which We Do Design\n\n> *Your goal is to invent and arrange\
    \ objects in a pleasing fashion. Your application will be divided into neighborhoods\
    \ where clusters of objects work toward a common goal. Your design will be shaped\
