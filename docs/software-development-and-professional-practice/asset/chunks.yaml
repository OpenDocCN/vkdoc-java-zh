    并且我们向`myFunc()`传递一个`Rectangle`对象，它工作得很好，更改了`Rectangle`的宽度。但是，如果我们向`myFunc()`传递一个`Square`对象呢？结果，在
    Java 中会发生与之前相同的事情，但这是*错误的*。它只更改了`Square`的宽度而没有同时更改其高度，从而违反了`Square`对象的完整性。因此，我们在这里违反了
