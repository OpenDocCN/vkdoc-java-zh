    让我们回到伯特的小鸟自助餐与洗浴中心，也就是 B⁴++。上次我们离开时，B⁴++ 会在日出时自动打开喂食门，并在日落时关闭。B⁴++ 大获成功，爱丽丝和鲍勃对其性能兴奋不已。B⁴
    系列产品再次被抢购一空。


    有一天，伯特接到了爱丽丝的电话。她似乎遇到了一个问题。虽然 B⁴++ 运行良好，但爱丽丝注意到她的喂食器吸引了一些不想要的鸟类。要知道，爱丽丝是一位鸣鸟爱好者，当红衣主教鸟、彩绘鹀、猩红比蓝雀、美洲金翅雀和冠山雀出现在喂食器时，她会非常兴奋。但当黑鹂、蓝松鸦和椋鸟赶走鸣鸟并自己大快朵颐时，她就不那么高兴了。所以爱丽丝希望能在坏鸟出现时关闭
    B⁴++ 的喂食门，并在鸣鸟回来时再次打开。而你正是做这件事的合适人选。


    你问爱丽丝的第一个显而易见的问题是：“你想如何打开和关闭喂食门？”“嗯，”她说，“用遥控器怎么样？这样我就可以待在屋里，等鸟来了再开门关门。”于是，新一轮的游戏又开始了。


    和上次一样，我们可以根据这个粗略的问题描述来尝试整理一个用例。我们之前的用例是这样的：


    1.  传感器检测到 40% 亮度的阳光。

    2.  喂食门打开。

    3.  鸟儿们到来，进食和饮水。

    4.  鸟儿们离开。

    5.  传感器检测到阳光亮度降至 25%。

    6.  喂食门关闭。


    所以，我们首先需要决定的是，这个新问题属于该用例的备选路径，还是需要一个全新的用例。


    让我们尝试一个新用例。为什么？嗯，使用遥控器并不真正符合传感器用例，不是吗？遥控器可以随时激活，并且需要用户交互，这两点都不符合我们的传感器特性。那么，让我们看看能为遥控器用例想出什么：


    1.  爱丽丝听到或看到喂食器旁有鸟。

    2.  爱丽丝判断它们*不是*鸣鸟。

    3.  爱丽丝按下遥控器按钮。

    4.  喂食门关闭。

    5.  鸟儿们放弃并飞走。

    6.  爱丽丝按下遥控器按钮。

    7.  喂食门再次打开。


    这涵盖了所有情况吗？我们有没有遗漏什么？有两件事需要考虑。首先，在步骤 #1 中，我们有“爱丽丝听到或看到鸟”。问题是这个“或”对我们来说重要吗？在这种情况下，答案是否定的，因为爱丽丝是决策者，她是这个用例中的参与者。我们无法控制参与者；我们只能响应参与者想要做的事情，并提供可供参与者选择的选项。在我们的案例中，程序需要等待来自遥控器的信号，然后执行正确的操作。（先别超前，但我们现在可以把程序看作一个事件驱动系统，程序在执行操作之前必须等待（即监听）一个事件。）


    其次，用例中的哪些步骤能帮助我们识别新对象？这就是我们的文本分析发挥作用的地方。在我们之前版本的应用程序中，我们已经有了 *`BirdFeeder`*、*`Sensor`*
    和 *`FeedingDoor`* 对象。这些在用例中很容易识别。那么现在有什么新东西呢？这里唯一的新对象就是遥控器。那么遥控器是做什么的？它有多少个按钮？当遥控器按钮被按下时，程序会做什么？


    在我们的例子中，遥控器似乎相对简单。打开和关闭喂食门是一个切换操作。如果门是关着的，就打开；如果门是开着的，就关闭。只有这些选项。所以遥控器实际上只需要一个按钮来实现切换功能。


    所以最终，我们为 B⁴++ 程序得到了一个新的用例和一个新的类（参见图 9-1）。


    ![images](img/0901.jpg)


    ***图 9-1.** 新的 RemoteControl 类*


    我认为，这就是我们为这个版本的程序所需的所有分析。


    这个练习为我们提供了一些可用于分析的指导原则。


    *   首先，通过发送和响应消息来创建*协同工作的简单类*。在我们的例子中，简单的类 *`FeedingDoor`* 和 *`Sensor`* 封装了关于
    *`BirdFeeder`* 当前状态的知识，并允许我们通过简单的消息来控制喂食器。这种简单性使我们能够轻松地通过 *`RemoteControl`* 类添加一种控制喂食器的新方式。

    *   其次，我们说*类应该只有一个职责*。`FeedingDoor` 和 `Sensor` 不仅简单且易于控制，而且它们各自只做一件事。这使得它们以后更容易修改，也更容易重用。

