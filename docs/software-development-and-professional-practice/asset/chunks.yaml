  trans: "\n#### 鸣鸟永在\n\n既然我们正在讨论变更，不妨再次回顾一下 B⁴++。自从爱丽丝和鲍勃收到他们那台带遥控功能的全新升级版 B⁴++ 以来，已经过去几周了。爱丽丝对它爱不释手。她可以透过厨房窗户观赏鸟儿，当那些黑鹂猛扑过来时，她只需按下遥控器按钮，门就会关上。黑鹂们失望地离开，她再按一下按钮，门又打开了。新版本运行得完美无瑕，实现了他们提出的所有要求。\n\
    \n只是有一件小事……\n\n爱丽丝发现，有时她得去办点事、上个厕所，或者看探索频道她最爱的自然节目。每当这时，她就无法用遥控器关门，黑鹂们就能随心所欲地来觅食，把所有鸣鸟都赶走。真扫兴。\n\
    \n于是，爱丽丝希望 B⁴++ 再做一个微不足道的小改动，小到几乎不值一提。她希望 B⁴++ 能够检测到那些讨厌的鸟，并自动关门。这该怎么做呢？\n\n容我稍等……\n\
    \n那么，新的需求就是：“B⁴++ 必须能够检测到不受欢迎的鸟，并自动关门。”这是一个完整的需求吗？似乎不是，因为它引出了一个显而易见的问题——门什么时候再次打开？看来我们至少有几件事需要决定。\n\
    \n1.  喂鸟器如何检测鸟类？\n2.  我们如何区分不受欢迎的鸟和鸣鸟？\n3.  门关闭后，喂鸟器何时再次开门？\n\n幸运的是，我们的传感器供应商“传感器之家”刚刚推出了一款可编程的音频传感器，能让我们识别鸟鸣。因此，如果我们把那个硬件集成到\
    \ B⁴++ 中，就解决了上面的第 1 点。此外，那些讨厌的鸟的叫声与我们想要吸引的鸣鸟的叫声截然不同，因此可以通过固件对音频传感器进行编程，以区分不同的鸟类。呼！第\
    \ 2 个问题也解决了。那么第 3 个问题呢，如何让关闭的门再次打开？\n\n看来有两种方法可以让 B⁴++ 再次开门。我们可以设置一个定时器，让门关闭特定时间后再打开。这样做的好处是简单，但这也是一个相当愚蠢的编程方式。说它愚蠢，是因为定时器程序只是实现了一个倒计时，对其运行的*上下文*一无所知。它很可能在周围还有一群讨厌的鸟时就把门打开了。另一种实现鸟类识别器的方法是，让它只在听到鸣鸟叫声时才开门。如果你认为，只要讨厌的鸟还在，鸣鸟就不会出现，那么你听到鸣鸟歌唱的唯一时刻就是周围没有讨厌的鸟的时候。如果是这样，那么打开喂食门就是安全的。\n\
    \n那么，我们来做一个用例。因为使用鸣鸟识别器来开关喂食门与使用遥控器非常相似，我们就从 *`RemoteControl`* 用例开始，并在此基础上进行扩展。\n\
    \n1.  爱丽丝听到或看到喂食器旁有鸟。\n    a. 1.1 鸣鸟识别器听到鸟鸣。\n2.  爱丽丝确定它们*不是*鸣鸟。\n    b. 2.1 鸣鸟识别器识别出该叫声来自不受欢迎的鸟。\n\
    3.  爱丽丝按下遥控器按钮。\n    c. 3.1 鸣鸟识别器向喂食门发送关闭消息。\n4.  喂食门关闭。\n5.  鸟儿们放弃并飞走。\n    d.\
    \ 5.1 鸣鸟识别器听到鸟鸣。\n    e. 5.2 鸣鸟识别器识别出该叫声来自鸣鸟。\n6.  爱丽丝按下遥控器按钮。\n    f. 6.1 鸣鸟识别器向喂食门发送打开消息。\n\
    7.  喂食门再次打开。\n\n我们在这里创建的是用例中的一个*备选路径*。这个用例现在看起来相当别扭，因为子用例看起来像是从上层用例中衍生出来的，而实际上，应该只执行其中一个。我们可以将用例重写为表\
    \ 9-1 所示。\n\n***表 9-1.** 鸣鸟识别器用例及其备选路径*\n\n| **主路径** | **备选路径** |\n| --- | ---\
    \ |\n| 1\\. 爱丽丝听到或看到喂食器旁有鸟。 | 1.1 鸣鸟识别器听到鸟鸣。 |\n| 2\\. 爱丽丝确定它们*不是*鸣鸟。 | 2.1 鸣鸟识别器识别出该叫声来自不受欢迎的鸟。\
    \ |\n| 3\\. 爱丽丝按下遥控器按钮。 | 3.1 鸣鸟识别器向喂食门发送关闭消息。 |\n| 4\\. 喂食门关闭。 |  |\n| 5\\. 鸟儿们放弃并飞走。\
    \ | 5.1 鸣鸟识别器听到鸟鸣。 5.2 鸣鸟识别器识别出该叫声来自鸣鸟。 |\n| 6\\. 爱丽丝按下遥控器按钮。 | 6.1 鸣鸟识别器向喂食门发送打开消息。\
    \ |\n| 7\\. 喂食门再次打开。 |  |\n\n这两条路径并不完全相同。例如，在主路径中，爱丽丝是在看到鸟儿放弃并飞走后才按下遥控器按钮。在备选路径中，鸣鸟识别器必须等到听到鸟鸣，才能考虑再次打开喂食门。因此，我们完全可以将其做成两个不同的用例。这取决于*你*。用例的作用是说明程序使用中的不同场景，因此你可以用任何你喜欢的方式来表示它们。如果你想把这个用例拆分成两个不同的用例，请随意。只要保持一致性即可。你仍然是在管理变更。\n"
- fmt: "### ACT TWO, Scene 2: In Which the Design Will also Change, for the Better\n\
    \nAs we've said before, it is difficult to separate analysis and design. The temptation\
    \ for every programmer, particularly beginning programmers, is to start writing\
    \ code *now*. That temptation bleeds over into doing analysis, design, and coding\
    \ all at once and thinking about all three phases together. Unless your program\
    \ is just about 10 lines long, this is usually a *bad idea*. It's nearly always\
    \ better to abstract out requirements and architectural ideas from your low-level\
    \ design and coding. Chapters 5 and 6 talked about this separation more.\n\nSeparating\
    \ object-oriented analysis and design is a particularly difficult task. In analysis\
    \ we are trying to understand the problem and the problem domain from an object-oriented\
    \ point of view. That means we start thinking about objects and their interactions\
    \ with each other *very* early in the process. Even our use cases are littered\
    \ with loaded object words. Analysis and design are nearly inseparable, when you\
    \ are “doing analysis” you can't help but “think design” as well. So what should\
    \ you do when you really want to start thinking about design?\n\nYour design must\
    \ produce, at minimum, the classes in your system, their public interfaces, and\
    \ their relationships to other classes, especially base or super classes. If your\
    \ design methodology produces more than that, ask yourself if all the pieces produced\
    \ by that methodology have value over the lifetime of the program. If they do\
    \ not, maintaining them will cost you. Members of development teams tend not to\
    \ maintain anything that does not contribute to their productivity; this is a\
    \ fact of life that many design methods don't account for.\n\nAll software design\
    \ problems can be simplified by introducing an extra level of conceptual indirection.\
    \ This one idea is the basis of abstraction, the primary feature of object-oriented\
    \ programming. This is why in UML, what we call inheritance in Java is called\
    \ generalization. The idea is to identify common features in two or more classes\
    \ and abstract those features out into a higher level, more general class, that\
    \ the lower level classes then inherit from.\n\nWhen designing, make your classes\
    \ as atomic as possible; that is, give each class a single, clear purpose. This\
    \ is the `Single Responsibility Principle` that we'll talk more about in the next\
    \ chapter on design principles.^([7](#Chapter09.html#CHP-9-FN-7)) If your classes\
    \ or your system design grows too complicated, break complex classes into simpler\
    \ ones. The most obvious indicator of this is sheer size: if a class is big, chances\
    \ are it's doing too much and should be broken up.\n\nYou also need to look for\
    \ and separate things that change from things that stay the same. That is, search\
    \ for the elements in a program that you might want to change without forcing\
    \ a redesign, then encapsulate those elements in classes.\n\nAll of these guidelines\
    \ are key to managing the changes in your design. In the end you want a clean,\
    \ understandable design that is easy to maintain.\n\n### ACT THREE, Scene 1: In\
    \ Which We Do Design\n\n> *Your goal is to invent and arrange objects in a pleasing\
    \ fashion. Your application will be divided into neighborhoods where clusters\
    \ of objects work toward a common goal. Your design will be shaped by the number\
    \ and quality of abstractions and by how well they complement one another. Composition,\
    \ form, and focus are everything.*\n> \n> —Rebecca Wirfs-Brock and Alan McKean^([8](#Chapter09.html#CHP-9-FN-8))\n\
    \nIdentifying objects (or object classes) is a difficult part of object-oriented\
    \ design. There is no ‘magic formula’ for object identification. It relies on\
    \ the skill, experience and domain knowledge of system designers (that would be\
    \ you). Object identification is an iterative process. You are not likely to get\
    \ it right the first time.\n\nYou begin finding objects by looking for real-world\
    \ analogues in your requirements. That gets you started, but it's only the first\
    \ step. Other objects hide in the abstraction layers of your domain. Where to\
    \ find these hidden objects? You can look to your own knowledge of the application\
    \ domain, you can look for operations that crop up in your requirements and in\
    \ your architectural concepts of the system. You can even look to your own past\
    \ experience designing other systems.\n\n__________\n\n⁷ Martin, 2009.\n\n⁸ Wirfs-Brock,\
    \ R. and A. McKean. *Object Design: Roles Responsibilities, and Collaborations.*\
    \ (Boston, MA, Addison-Wesley, 2003).\n\nSteps to finding candidate objects in\
    \ your system:\n\n1.  **Write a set of use cases** describing how the application\
    \ will work for a number of different scenarios. remember, each use case must\
    \ have a goal. Remember that a scenario is a path through a use case. If you have\
    \ use cases with alternate paths as we saw above, your use case may represent\
    \ several scenarios.\n2.  **Identify the actors** in each use case, the operations\
    \ they need to perform, and the other things they need to use in performing their\
    \ actions.\n3.  **Name and describe each candidate object**. Base the identification\
    \ on tangible things in the application domain (like nouns). Use a behavioral\
    \ approach and identify objects based on what participates in what behavior (use\
    \ verbs).\n4.  Objects can manifest themselves in a number of ways. They can be\n\
    \    *   External entities that produce or consume information.\n    *   Things\
    \ that are part of the information domain (reports, displays, and the like).\n\
    \    *   Occurrences or events that occur within the system.\n    *   Internal\
    \ producers (objects that make something).\n    *   Internal consumers (objects\
    \ that consume what producers make).\n    *   Places (remote systems, databases,\
    \ and so on).\n    *   Structures (windows, frames).\n    *   People (well people\
    \ are objects, right? We have state and behavior, no?)\n    *   Things that are\
    \ owned or used by other objects (like bank accounts, or automobile parts).\n\
    \    *   Things that are lists of other objects (like parts lists, any kind of\
    \ collection, and so on).\n\n8.  **Organize the candidate objects into groups**.\
    \ Each group represents a cluster of objects that work together to solve a common\
    \ problem in your application. Each object will have several characteristics:\n\
    \n    *   **Required information**: The object has information that must be remembered\
    \ so the system can function.\n    *   **Needed services**: The object must provide\
    \ services relating to the system goals.\n    *   **Common attributes**: The attributes\
    \ defined for the object must be common to all instances of the object.\n    *\
    \   **Common operations**: The operations defined for the object must be common\
    \ to all instances of the object.\n\n9.  Look at the groups you've created and\
    \ **see if they represent good abstractions for objects** and that work in the\
    \ application. Good abstractions will help make your application easier to re-work\
    \ when you inevitably need to change some feature or relationship in the application."
  raw: "### ACT TWO, Scene 2: In Which the Design Will also Change, for the Better\n\
    \nAs we've said before, it is difficult to separate analysis and design. The temptation\
    \ for every programmer, particularly beginning programmers, is to start writing\
    \ code *now*. That temptation bleeds over into doing analysis, design, and coding\
    \ all at once and thinking about all three phases together. Unless your program\
    \ is just about 10 lines long, this is usually a *bad idea*. It's nearly always\
    \ better to abstract out requirements and architectural ideas from your low-level\
    \ design and coding. Chapters 5 and 6 talked about this separation more.\n\nSeparating\
    \ object-oriented analysis and design is a particularly difficult task. In analysis\
    \ we are trying to understand the problem and the problem domain from an object-oriented\
    \ point of view. That means we start thinking about objects and their interactions\
    \ with each other *very* early in the process. Even our use cases are littered\
    \ with loaded object words. Analysis and design are nearly inseparable, when you\
    \ are “doing analysis” you can't help but “think design” as well. So what should\
    \ you do when you really want to start thinking about design?\n\nYour design must\
    \ produce, at minimum, the classes in your system, their public interfaces, and\
    \ their relationships to other classes, especially base or super classes. If your\
    \ design methodology produces more than that, ask yourself if all the pieces produced\
    \ by that methodology have value over the lifetime of the program. If they do\
    \ not, maintaining them will cost you. Members of development teams tend not to\
    \ maintain anything that does not contribute to their productivity; this is a\
    \ fact of life that many design methods don't account for.\n\nAll software design\
    \ problems can be simplified by introducing an extra level of conceptual indirection.\
    \ This one idea is the basis of abstraction, the primary feature of object-oriented\
    \ programming. This is why in UML, what we call inheritance in Java is called\
    \ generalization. The idea is to identify common features in two or more classes\
    \ and abstract those features out into a higher level, more general class, that\
    \ the lower level classes then inherit from.\n\nWhen designing, make your classes\
    \ as atomic as possible; that is, give each class a single, clear purpose. This\
