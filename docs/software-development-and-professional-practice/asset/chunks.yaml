- fmt: '# 项目风险与应对策略


    ## 常见风险类型


    - **进度延误**：你预估需要三天完成的任务，实际却花了三周。在计划驱动型项目中，如果没有定期召开状态会议，这可能成为问题。等到三周后才告诉老板你延期了，远不如一发现可能延期就立即汇报。在敏捷项目中这种情况不太可能发生，因为大多数敏捷项目都有每日状态会议（参见[第2章](#Chapter02.html#ch2)的Scrum会议部分）。


    - **缺陷率过高**：测试发现了大量Bug。你是继续添加新功能，还是停下来修复Bug？在按固定计划（比如每周一次）进行集成构建的项目中，这确实是个难题。而在每天进行集成的项目中，你可以更轻松地跟上缺陷修复的节奏。无论哪种情况，如果缺陷率很高，最好的做法是停下来，全面审视现状，在添加更多功能之前找到缺陷的根本原因。从项目管理的角度来看，这很难做到，但最终你会感谢自己做出了这个决定。


    - **需求理解错误**：你正在开发的内容并非客户想要的。这个经典问题源于客户与开发者生活在两个不同的世界。客户身处应用领域，从用户角度理解产品应该做什么；开发者则从技术角度理解产品如何工作。有时这两个世界会交汇，这很好；但很多时候它们不会，这就导致了需求误解。避免这种情况的最佳方法是尽可能让客户驻场，并尽可能频繁地交付可用的产品。


    - **需求变更**：新功能、功能修改、功能删除……这种痛苦何时才能结束？需求变更是导致交付延期、缺陷率高和项目失败的最主要原因。当客户（或你自己的市场人员，甚至开发团队本身）在开发过程中不断更改需求时，变更就发生了。这会导致大量代码返工、基线重新测试以及一次又一次的延期。管理需求是项目经理最重要的工作。在计划驱动型流程中，通常由变更控制委员会（CCB）来审查每个新需求，并决定是否将其添加到待实现功能列表中。CCB中可能有一名开发团队成员，但这并非强制要求，因此风险在于CCB可能会在不完全理解所有进度和工作量影响的情况下添加新功能。在敏捷流程中，开发团队通常负责维护优先级排序的需求列表（在Scrum中称为产品待办列表），并且只在项目的固定时间点进行调整——在XP中是在每次迭代之后，在Scrum中是在每个Sprint之后。


    - **人员流失**：你最资深的开发人员在产品交付前三周决定加入一家初创公司。降低人员流失率的最佳方法是：(1) 给开发人员有趣的工作，(2) 让他们在舒适的环境中工作，(3)
    让他们掌控自己的进度安排。奇怪的是，金钱并不是软件开发人员的主要激励因素之一。这并不意味着他们不想获得高薪，但确实意味着为了让他们更努力工作或防止他们离职而给他们更多钱，通常并不奏效。而且，即使你尽了最大努力，你最好的开发人员还是离开了，你也只能继续前进。相信我，这不会是世界末日。减轻人员流失影响的最佳方法是将项目知识分散到开发团队的所有成员中。像*集体代码所有权*这样的原则和*结对编程*这样的技术，有助于让所有团队成员都投入到产品中，并将代码知识传播到整个团队。关于管理和留住软件开发人员的最佳书籍之一是Tom
    DeMarco所著、Dorset House出版的*Peopleware*。[²](#Chapter03.html#CHP-3-FN-2)


    ## 风险应对策略


    一旦你列出了项目的风险清单，就需要逐一处理，并讨论两件事：*规避*和*缓解*。针对每个风险，思考如何规避它。在进度中预留缓冲时间、进行持续的代码审查、尽早冻结需求、频繁发布、要求结对编程以传播代码知识等等。然后，你需要考虑如果最坏的情况真的发生了该怎么办；这就是*缓解*。从发布中移除功能、停止新功能开发并集中修复Bug、将新功能协商到未来版本中，等等。如果一个风险变成了现实，你必须采取*某种*行动；提前计划好要做什么总是更好的。


    一旦你处理了规避和缓解策略，你就有了一个应对可识别风险的计划。但这并不能让你完全高枕无忧，因为总会有你遗漏的风险；但处理你确实想到的风险的经验，将使你能够更好地应对项目中那些让你措手不及的新风险。如果你的项目使用迭代过程模型，最好在每个迭代之后重新审视你的风险，看看哪些发生了变化，识别任何新的风险，并移除那些不再可能发生的风险。


    ### 资源需求


    这部分很简单。你的项目需要多少人？他们都需要同时开始，还是可以根据阶段启动的时间错开开始日期？你需要多少台计算机？你将使用什么软件进行开发？你需要什么样的开发环境？每个人都接受过该环境的培训吗？你需要哪些支持软件和硬件？是的，无论你使用什么过程模型，你都需要一个配置管理系统和一台独立的构建机器。


    许多资源问题通常由你针对的平台和你工作的应用领域来回答。这很简单。关于团队规模、开始日期和项目阶段的问题，很可能要等到你完成初步的工作量估算和进度安排后才能回答。


    ______________


    ²DeMarco, T. and T. Lister. *Peopleware: Productive Projects and Teams, Second
    Edition.* (New York, NY: Dorset House Publishing Company, 1999.)'
  raw: '*   *Schedule slips*: That task that you estimated would take three days has
    just taken three weeks. In a plan-driven project, this can be an issue if you
    don''t have regular status meetings. Waiting three weeks to tell your boss that
    you''re late is always worse than telling her that you''ll be late as soon as
    you know it. In an agile project this is unlikely, because most agile projects
    have a daily status meeting (see the Scrum meeting section in [Chapter 2](#Chapter02.html#ch2)).

    *   *Defect rate is excessive*: Your testing is finding lots of bugs. What do
    you do, continue to add new features or stop to fix the bugs? Again, this can
    be a real issue in a project where integration builds happen according to a fixed
    schedule, say once a week. In a project where integrations happen every day, you
    can keep up with defects more easily. In either case, if you are experiencing
    a high defect rate, the best thing to do is to stop, take a look around, and find
    the root cause of the defects before adding more functionality. This can be very
    hard to do from a project management standpoint, but you''ll thank yourself in
    the end.

    *   *Requirements misunderstood*: What you''re doing isn''t what the customer
    wanted. This classic problem is the result of the fact that customers and developers
    live in two different worlds. The customer lives in the application domain where
    he understands from a user''s perspective what he wants the product to do. The
    developer understands from a technical perspective how the product will work.
    Occasionally, these worlds intersect and that''s good; but lots of times they
    don''t and that is where you get a misunderstanding of requirements. The best
    way to avoid this situation is to have the customer on site as often as possible
    and to produce deliverable products as often as possible.

    *   *Requirements churn*: New features, altered features, deleted features … will
    the misery never end? Requirements churn is probably the largest single reason
    for missed delivery dates, high defect rates, and project failure. Churn happens
    when the customer (or your own marketing folks, or the development team itself)
    continues to change requirements while development is underway. It leads to massive
    amounts of rework in the code, retesting of baselines, and delay after delay.
    Managing requirements is the single most important job of the project manager.
    In a plan-driven process this is usually accomplished by a change control board
    (CCB) that examines each new requirement and decides whether to add it to the
    list of features to be implemented. There may be a member of the development team
    on the CCB, but that''s not required, so the danger here is that the CCB will
    add new features without understanding all the scheduling and effort ramifications.
    In agile processes, the development team usually keeps control of the prioritized
    requirements list (called the product backlog in Scrum), and only adjusts the
    list at set points in the project – after iterations in XP, and after each sprint
    in Scrum.

    *   *Turnover*: Your most experienced developer decides to join a start-up three
    weeks before product delivery. The best way to reduce turnover is to (1) give
    your developers interesting work, (2) have them work in a pleasant environment,
    and (3) give them control over their own schedules. Oddly enough, money is not
    one of the main motivators for software developers. This doesn''t mean they don''t
    want to get paid well, but it does mean that throwing more money at them in order
    to get them to work harder or to keep them from leaving doesn''t generally work.
    And if, despite your best efforts, your best developer does leave, you just have
    to move on. Trust me, it won''t be the end of the world. The best way to mitigate
    the effect of turnover is to spread the knowledge of the project around all the
    members of the development team. Principles like *common code ownership* and techniques
    like *pair programming* work to invest all the team members in the product and
    spreads the knowledge of the code across the entire team. One of the best books
    on managing and keeping software developers is *Peopleware* by Tom DeMarco, published
    by Dorset House.[²](#Chapter03.html#CHP-3-FN-2)


    Once you''ve got a list of the risks to your project, you need to address each
    one and talk about two things: *avoidance* and *mitigation*. For each risk, think
    about how you can avoid it. Build slack into your schedule, do constant code reviews,
    freeze requirements early, do frequent releases, require pair programming so you
    spread around the knowledge of the code, and the like. Then you need to think
    about what you''ll do if the worst-case scenario does happen; this is *mitigation*.
    Remove features from a release, stop work on new features and do a bug hunt, negotiate
    new features into a future release, and so on. If a risk becomes a reality, you''ll
    have to do *something* about it; it''s better to have planned what you''ll do
    beforehand.


    Once you address avoidance and mitigation, you''ll have a plan on how to handle
    your identifiable risks. This doesn''t completely let you off the hook, because
    there are bound to be risks you miss; but the experience of addressing the risks
    you do think of will enable you to better handle new ones that surprise you during
    the project. If your project is using an iterative process model, it''s a good
    idea to revisit your risks after every iteration and see which ones have changes,
    identify any new ones, and remove any that can no longer happen.


    ### Resource Requirements


    This section is a piece of cake. How many people do you need for the project?
    Do they all need to start at once, or can their starting dates on the project
    be staggered as phases are initiated? How many computers do you need? What software
    will you be using for development? What development environment do you need? Is
    everyone trained in that environment? What support software and hardware do you
    need? Yes, you do need a configuration management system and a stand-alone build
    machine – no matter what process model you''re using.


    Many of these resource questions are usually answered for you by the platform
    you''re targeting and the application domain in which you are working. That''s
    the easy part. Questions about team size, start dates, and phases of the project
    will likely not be able to be answered until you do a first cut at effort estimation
    and scheduling.


    ______________


    ²DeMarco, T. and T. Lister. *Peopleware: Productive Projects and Teams, Second
    Edition.* (New York, NY: Dorset House Publishing Company, 1999.)'
