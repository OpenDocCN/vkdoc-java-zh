- fmt: '### A Play in Several Acts


    > *When doing analysis you are trying to understand the problem. To my mind this
    is not just listing requirements in use cases. … Analysis also involves looking
    behind the surface requirements to come up with a mental model of what is going
    on in the problem. … Some kind of conceptual model is a necessary part of software
    development, and even the most uncontrolled hacker does it.*

    >

    > –-Martin Fowler^([1](#Chapter09.html#CHP-9-FN-1))

    >

    > *Object-oriented design is, in its simplest form, based on a seemingly elementary
    idea. Computing systems perform certain actions on certain objects; to obtain
    flexible and reusable systems, it is better to base the structure of software
    on the objects than on the actions.*

    >

    > *Once you have said this, you have not really provided a definition, but rather
    posed a set of problems: What precisely is an object? How do you find and describe
    the objects? How should programs manipulate objects? What are the possible relations
    between objects? How does one explore the commonalities that may exist between
    various kinds of objects? How do these ideas relate to classical software engineering
    concerns such as correctness, ease of use, efficiency?*

    >

    > *Answers to these issues rely on an impressive array of techniques for efficiently
    producing reusable, extendible and reliable software: inheritance, both in its
    linear (single) and multiple forms; dynamic binding and polymorphism; a new view
    of types and type checking; genericity; information hiding; use of assertions;
    programming by contract; safe exception handling.*

    >

    > —Bertrand Meyer^([2](#Chapter09.html#CHP-9-FN-2))


    __________


    ¹ Martin, Robert, Single Responsibility Principle. [www.butunclebob.com/ArticleS.UncleBob.PrinciplesOfOod](http://www.butunclebob.com/ArticleS.UncleBob.PrinciplesOfOod).
    Retrieved on December 10, 2009.


    ### PRELUDE: In Which We Set the Scene


    When defining object-oriented analysis and design, it''s best to keep in mind
    your objectives. In both of these process phases we''re producing a *work product*
    that is closer to the code that is your end goal. In *analysis*, you''re refining
    the feature list you''ve created and producing a model of what the customer wants.
    In design you''re taking that model and creating the classes that will end up
    being code.


    In analysis you want to end up with a description of what the program is supposed
    to do, its *essential features*. This end product takes the form of a *conceptual
    model* of the problem domain and its solution. The model is made up of a number
    of things, including use cases, user stories, preliminary class diagrams, user
    interface storyboards, and possibly some class interface descriptions.


    In *design* you want to end up with a description of how the program will implement
    the conceptual model and do what the customer wants. This end product takes the
    form of an *object model* of the solution. This model is made up of groups of
    related class diagrams, their associations and descriptions of how they interact
    with each other. This includes the programming interface for each class. From
    here you should be able to get to coding pretty quickly.


    ### ACT ONE, Scene 1: In Which We Enquire into Analysis


    So what is object-oriented analysis? Well, it depends on who you talk to. For
    our purposes, we''ll define *object-oriented analysis* as a method of studying
    the nature of a problem and *determining its essential features and their relations
    to each other.^([3](#Chapter09.html#CHP-9-FN-3))* Your objective is to end up
    with a conceptual model of the problem solution that you can then use to create
    an object model – your design. This model doesn''t take into account any implementation
    details or any constraints on the target system. It looks at the domain that the
    problem is in and tries to create a set of features, objects and relations that
    describe a solution in that domain. What makes a feature essential? Typically,
    a feature is essential if it''s a feature the customer has said they must have,
    if it''s a non-functional requirement that the program won''t run without, or
    if it''s a core program element that other parts of the program depend on.


    The conceptual model describes *what* the solution will do and will typically
    include use cases,^([4](#Chapter09.html#CHP-9-FN-4)) user stories,^([5](#Chapter09.html#CHP-9-FN-5))
    and UML sequence diagrams.^([6](#Chapter09.html#CHP-9-FN-6)) It can also include
    a description of the user interface and a preliminary set of UML class diagrams
    (but that, of course, is shading over into design).


    So how do you create this conceptual model? Just like all the other methodologies
    in software development there is exactly one correct way to create a conceptual
    model – *not*! Really, just like with all the other methodologies we''ve talked
    about, the correct answer is: it depends.


    __________


    ² Meyer, Bertrand. *Object-Oriented Software Construction.* (Upper Saddle River,
    NJ: Prentice Hall, 1988).


    ³ McLaughlin, Brett D., et. al. *Head First Object-Oriented Analysis & Design.*
    (Sebastopol, CA: O''Reilly Media, Inc., 2007).


    ⁴ Cockburn, A. (2000). *Writing Effective Use Cases.* (Boston, MA: Addison-Wesley,
    2000).


    ⁵ Beck, K. *Extreme Programming Explained: Embrace Change.* (Boston, MA: Addison-Wesley,
    2000).


    ⁶ Fowler, M.*UML Distilled*. (Boston, MA: Addison-Wesley, 2000).


    It depends on understanding the problem domain, on understanding the feature list
    you''ve already come up with, and it depends on understanding how the customer
    reacts to each of the program iterations they''ll see. As we''ll see, change is
    constant.


    The key part of object-oriented analysis is the creation of *use cases*. With
    use cases you create a walkthrough of a scenario from the user''s perspective
    and that walkthrough gives you an understanding of what the program is supposed
    to do from the outside. A program of any size will normally have several use cases
    associated with it. In fact, a single use case may have alternative paths through
    the scenario. More on this later.


    Once you get a few use cases created how do you get to the class diagrams? There
    are several methods suggested, but we''ll just go over one now and save the rest
    for later. The first method we''ll look at is called *textual analysis*. With
    textual analysis, you take your uses cases and examine the text for clues about
    classes in your programs. Remember that the object-oriented paradigm is all about
    objects and the behavior of those objects, so those are the two things to pluck
    out of your use cases.


    In textual analysis, you pluck potential objects out of the text by picking out
    the nouns in your use case. Because nouns are things and objects are (usually)
    things, the nouns stand a good chance of being objects in your program. In terms
    of behavior, you look at the verbs in the use case. Verbs provide you with action
    words that describe changes in state or actions that report state. This usually
    isn''t the end, but it gives you your first cut at method names and parameter
    lists for the methods.'
