    why she is paid the big bucks.'
  raw: '### Requirements Digging


    Most software engineering texts use the phrase “requirements elicitation” to talk
    about the process of getting your users to tell you what they want. Hunt and Thomas,
    in their book *The Pragmatic Programmer* use the much more descriptive phrase
    “requirements digging” to emphasize the point that what you''re really doing is
    digging for all those requirements that your customer doesn''t know they want
    yet.^([7](#Chapter04.html#CHP-04-FN-7)) Hunt and Thomas also make the terrific
    distinction between requirements, policies, and implementations as a way to illustrate
    the requirements digging process.


    For example, “The system must let the user choose a loan term” is a nice succinct
    requirement. It says that there''s something you have to do. It isn''t specific
    enough for implementation yet, but it tells the developer something concrete that
    must be built.


    “Loan terms must be between 6 months and 30 years” is not a requirement, although
    it kind of looks like one. This statement is an example of a *business policy*.
    When statements like this are presented to developers as requirements they have
    a tendency to hard-code the statement in the program. Wrong, wrong, wrong. Policies
    like this can change, so you need to be very careful about putting business policies
    in your requirements. It is almost always the case that you need to implement
    a more general version of the business policy than is stated. The real requirement
    is probably something like, “Loan terms are of finite length but the length of
    the loan will vary by type of loan.” This tells you that you probably need to
    build a table-driven subsystem to handle this feature. That way, the loan term
    for a particular type of loan can be changed by making a single change in a data
    table and the code doesn''t need to change at all.


    “The user must be able to select a loan term using a drop-down list box” isn''t
    a requirement either, although, again, it may look like one. This is only a requirement
    if the customer absolutely must have a drop-down menu to choose their loan term.
    Otherwise, this is an example of the implementation that the customer would like
    to see, and it may not be a requirement. As Hunt and Thomas state in their book,
    “It''s important to discover the underlying reason *why* users do a particular
    thing, rather than just *the way* they currently do it. At the end of the day,
    your development has to solve their *business problem*, not just meet their stated
    requirements. Documenting the reasons behind requirements will give your team
    invaluable information when making daily implementation decisions.”


    ____________________________


    ⁷ Hunt, A. and D. Thomas. *The Pragmatic Programmer: From Journeyman to Master*.
    (Boston, MA: Addison-Wesley, 2000.)


    ### Why Requirements Digging Is Hard


    There are several reasons why pulling requirements out of your customer is a really
    hard exercise. We''ll look at a few.


    ##### Problems of Scope


    Lots of times the actual boundaries of what your program is supposed to do are
    fuzzy. This can be because of several things. The program may be part of a larger
    system and the integration of the parts is ill-defined. The customer may not have
    thought through exactly what they want the program to do, so they start throwing
    out all sorts of ideas, many of which may not even apply to the problem at hand.
    Finally, the customer may have dropped into implementation-land and provides unnecessary
    levels of detail.


    It takes lots of patience, discipline, repeatedly saying the word “no,” and repeatedly
    asking, “why does this need to be part of the program?” in order to overcome problems
    of scope. Scope is directly related to requirements creep, so beware.


    ##### Problems of Understanding


    Let''s face it; the customer and you as the developer speak different languages.
    Your customer is the domain expert and they speak the domain language (accounts
    receivable, accounts payable, reconciliation, general ledger, and so on). You
