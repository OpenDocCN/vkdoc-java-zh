  trans: '

    ### 四个变量


    软件开发项目的四个变量如下：


    *   成本

    *   时间

    *   功能

    *   质量


    *成本*可能是最受约束的变量；你无法通过花钱来换取质量或进度，而且作为开发者，你对成本的控制非常有限。成本也是布鲁克斯法则发挥作用的地方（向一个已经延期的项目增加人手，只会让它更延期）。


    *时间*是你的交付日程，不幸的是，它通常是由外部强加给你的。例如，大多数消费产品（无论是硬件还是软件）的交付日期都会定在夏末或初秋，以便赶上假日购物季。你无法改变圣诞节。如果你延期了，解决问题的唯一办法就是削减功能或降低质量；这两者都不太理想。


    *质量*是指你愿意在发布时容忍的缺陷数量及其严重程度。你可以通过牺牲质量来在交付日程上获得短期收益，但代价是巨大的。修复下一个版本需要花费更多时间，而且你的信誉也会大打折扣。


    *功能*（也称为*范围*）是指产品实际能做什么。这应该是开发者始终关注的重点。从客户的角度来看，它是最重要的变量，同时也是作为开发者的你最能掌控的变量。控制范围能让你为管理者和客户提供对质量、时间和成本的控制。


    极限编程（XP）认识到，为了最小化风险，开发者需要尽可能多地控制变量，但尤其需要控制项目的范围。XP 使用了“学开车”的比喻。学开车不是把车指向正确的方向。而是指向车，持续关注，并不断做出必要的微小修正，以保持车辆在道路上行驶。在编程中，唯一不变的就是变化。如果你能关注变化并随其发生而应对，就能将变化的成本控制在可管理的范围内。


    ### 四个价值观


    为了使 XP 成为一种可行的开发规范，参与 XP 项目的每个人都必须认同并接受一套共同的价值观，这些价值观将渗透到构成该规范的所有规则中。在 XP 中，有以下四个核心价值观使其能够运作：


    *   沟通

    *   简单

    *   反馈

    *   勇气


    沟通实际上意味着将团队的集体知识传播给所有成员。保持 XP 团队规模小，通过减少沟通线路的数量来促进沟通。结对编程和代码的集体所有权也通过将整个代码库的知识传播到整个团队来促进沟通。XP
    开发者被鼓励修复他们发现的错误，并重新设计功能使其更简单（见下文）；这会将代码知识广泛地传播到团队中。


    *简单*是关键。XP 专注于开发解决当前任务的最简单的软件。XP 开发者相信：“……今天做一件简单的事，如果以后需要改变，明天多花一点代价，也比今天做一件可能永远用不上的复杂事情要好。”XP
    团队中的所有开发者都被允许并鼓励随时重新设计代码以使其更简单。这种做法被称为“重构”。“关于系统当前状态的*具体反馈*是绝对无价的。乐观是编程的职业病。反馈就是治疗。”¹¹
    XP 程序员被要求先写测试再写代码，这样他们总能立即获得关于其代码及其对系统影响的反馈。此外，客户也在编写功能（验收）测试，因此这些测试可用于衡量系统在多大程度上符合用于开发它的“用户故事”。


    XP 开发者必须有*勇气*。他们必须愿意在设计不再合适时随时做出改变。他们需要准备好抛弃不工作的代码。简单性支持勇气，因为你不太可能破坏一个简单的系统。XP
    团队成员每天跟踪进度，并在需要时立即让客户参与重新确定功能的优先级。


    ### 15 条原则


    从上述四个价值观出发，XP 衍生出一些基本原则。列表如下：

    '
- fmt: "> *Rapid feedback*: Get feedback, interpret it, and put it back into the system\
    \ as quickly as possible. Automated tests are crucial here because you can run\
    \ unit tests all the time and you can run the entire regression suite whenever\
    \ you want to integrate your changes.\n> \n> ______________\n> \n> ^(11)Beck,\
    \ K. (2000)\n> \n> *Assume simplicity*: Focus on today's task and solve it in\
    \ the simplest way possible. This also means that you should be looking for ways\
    \ to simplify the code whenever you're making changes. Refactoring keeps the code\
    \ as simple as possible and reduces defects.\n> \n> *Incremental change*: Integrate\
    \ your new code into the system every day. In fact, integrate whenever you finish\
    \ a task. This allows you to find interface and interaction errors quickly and\
    \ gives the customer a new baseline to examine at least once a day.\n> \n> *Embracing\
    \ change*: It's gonna happen, so be prepared for it. The whole basis of agile\
    \ methodologies like XP is that change is a constant in software development and\
    \ the more your discipline accommodates change, the better your development process\
    \ will be.\n> \n> *Quality work*: Quality isn't free; strive for defect-free code.\
    \ Pair programming gives you the two heads are better than one gift and test-driven\
    \ development focuses your code on satisfying requirements. Both of these help\
    \ lead to fewer defects in your code.\n> \n> *Teach learning*: Teach how to learn\
    \ to do testing, refactoring, and coding better rather than set down a set of\
    \ rules that say, “you must test this way.”\n> \n> *Small initial investment*:\
    \ The emphasis here is on small teams, particularly at the beginning of a project\
    \ to manage the resources carefully and conservatively. If you start with fewer\
    \ resources and a tight budget, it will focus your thinking on lean design and\
    \ code. This reinforces simplicity.\n> \n> *Play to win*: As opposed to playing\
    \ not to lose. If you don't worry about schedules, or requirements churn, your\
    \ days will be more relaxed, you'll be able to focus on the problems at hand (and\
    \ not on the next deadline) and your code will be cleaner, you'll be more relaxed\
    \ and more productive. Just relax and win.\n> \n> *Concrete experiments*: Every\
    \ abstract decision (requirements or design) should be tested. In XP and in other\
    \ agile methodologies, you're encouraged to produce something called a *spike*.\
    \ A spike is a quick and dirty proof-of-concept piece of code that implements\
    \ at least the outline of your decision so you can see if you're actually right.\
    \ Or, if you're wrong, you've not wasted lots of time figuring that out.\n> \n\
    > *Open, honest communication*: You have to be able to criticize constructively\
    \ and be able to deliver bad news as well as good. This is the foundation of a\
    \ good design or code review. The culture of the team must be that you can offer\
    \ constructive criticism at any time. The idea is two-fold; first, you're all\
    \ trying to improve the code, so criticism is a good thing, and second, common\
    \ code ownership means that everyone is entitled to make changes without fear\
    \ of hurting someone else's feelings.\n> \n> *Work with people's instincts, not\
    \ against them*: People generally like to win, like working with others, like\
    \ being part of a team, and especially like seeing their code work. Don't do things\
    \ that go against this.\n> \n> *Accepted responsibility*: The team as a whole\
    \ is responsible for the product. Responsibility is accepted by the entire team\
    \ and tasks are not assigned, they're requested. Common code ownership leads to\
    \ common project ownership. XP teams typically do not have managers that assign\
    \ work; they have a coach to help with the process and a project manager to take\
    \ care of the administrative tasks. The development team members themselves select\
    \ tasks and make sure they get done.\n> \n> *Local adaptation*: Change XP to fit\
    \ your local circumstances and project. This is an application of accepted responsibility.\
    \ The team owns the project, so the team also owns the process and they reach\
    \ consensus on adaptations.\n> \n> *Travel light*: The team and process artifacts\
    \ you maintain should be few, simple, and valuable. This implies that you should\
    \ be willing to change directions quickly and jettison things (code, design) that\
    \ aren't working for ones that do.\n> \n> *Honest measurement*: Measure at the\
    \ right level of detail and only measure what makes sense for your project. Remember\
    \ the difference between accuracy and precision.\n\n## The Four Basic Activities\n\
    \nIn order for XP to take the values and principles just described and create\
    \ a discipline out of them, we need to describe the activities we'll use as the\
    \ foundation. XP describes four activities that are the bedrock of the discipline.\n\
    \n*   *Coding*: The code is where the knowledge of the system resides so it's\
    \ your main activity. The fundamental difference between plan-driven models and\
    \ agile models is this emphasis on the code. In a plan-driven model, the emphasis\
    \ is on producing a set of work products that together represent the entire work\
    \ of the project with code being just one of the work products. In agile methodologies,\
    \ the code is the sole deliverable and so the emphasis is placed squarely there;\
    \ in addition, by structuring the code properly and keeping comments up to date,\
    \ the code becomes documentation for the project.\n*   *Testing*: The tests tell\
    \ you when you are done coding. Test-driven development is crucial to the idea\
    \ of managing change. XP depends heavily on writing unit tests before writing\
    \ the code that they test and on using an automated testing framework to run all\
    \ the unit tests whenever changes are integrated.\n*   *Listening*: To your partner\
    \ and to the customer. In any given software development project there are two\
    \ types of knowledge. The customer has knowledge of the business application being\
    \ written and what it is supposed to do. This is the domain knowledge of the project.\
    \ The developers have knowledge about the target platform, the programming language(s),\
    \ and the implementation issues. This is the technical knowledge of the project.\
    \ The customer doesn't know the technical side and the developers don't have the\
    \ domain knowledge, so listening – on both sides – is a key activity in developing\
    \ the product.\n*   *Designing*: Design while you code. “Designing is creating\
    \ a structure that organizes the logic in the system. Good design organizes the\
    \ logic so that a change in one part of the system doesn't always require a change\
    \ in another part of the system. Good design ensures that every piece of logic\
    \ in the system has one and only one home. Good design puts the logic near the\
    \ data it operates on. Good design allows the extension of the system with changes\
    \ in only one place.”[^(12)](#Chapter02.html#CHP-2-FN-12)\n\n## Implementing XP:\
    \ The 12 Practices\n\nWe (finally) get to the implementation of XP. Here are the\
    \ rules that every XP team follows during their project. The rules may vary depending\
    \ on the team and the project, but in order to call yourselves an XP team, you\
    \ need to do some form of these things. The practices described here draw on everything\
    \ previously described: the four values, the 15 principles, and the four activities.\
    \ This is really XP."
