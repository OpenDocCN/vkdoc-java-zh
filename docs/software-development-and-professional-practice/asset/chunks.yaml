  trans: "\n## 设计原则\n\n> *构建软件设计有两种方式。一种是使其简单到明显没有缺陷，另一种是使其复杂到没有明显缺陷。*\n> \n> — C.\
    \ A. R. 霍尔\n\n看待软件问题的一种方式，是采用一个将问题分为两个不同层次的模型：\n\n*   **“棘手”问题**位于上层。这些问题通常来自计算机科学之外的领域（例如生物学、商业、气象学、社会学、政治学等）。这类问题往往是开放式的、定义不清的，并且从需要大量工作的意义上来说规模很大。例如，几乎任何类型的网络商务应用都是一个棘手问题。霍斯特·W·J·里特尔和梅尔文·M·韦伯在\
    \ 1973 年一篇关于社会政策的论文中¹，给出了用于识别棘手问题的定义和一组特征，我们将在本章后面进行探讨。\n*   **“温顺”问题**位于下层。这些问题往往跨越其他问题领域；它们通常定义更清晰、规模更小。排序和搜索是温顺问题的绝佳例子。然而，规模小且定义清晰并不意味着“容易”。温顺问题可能非常复杂且难以解决。只是它们定义明确，并且你知道何时找到了解决方案。这类问题为计算机科学家提供了数据结构和算法方面的基础，用于解决来自其他问题领域的棘手问题。\n\
    \n根据里特尔和韦伯的说法，棘手问题是指只有在问题解决后才能完全了解其需求的问题，或者其需求和解决方案会随时间演变的问题。事实证明，这描述了软件开发中大多数“有趣”的问题。最近，杰夫·康克林修订了里特尔和韦伯对棘手问题的描述，并提供了更简洁的棘手问题特征列表。²\
    \ 转述如下：\n\n__________\n\n¹ 里特尔，H. W. J. 和 M. M. 韦伯。“一般规划理论中的困境。”《政策科学》4(2): 155-169.\
    \ (1973)\n\n*   *只有在创建解决方案之后，才能理解棘手问题。* 另一种说法是，问题的定义和解决是同时进行的。³\n*   *棘手问题没有停止规则；*\
    \ 也就是说，你可以创建问题的增量解决方案，但没有任何东西能告诉你已经找到了正确且最终的解决方案。\n*   *棘手问题的解决方案没有对错之分；* 它们只有好坏之分，或者足够好与不够好之分。\n\
    *   *每个棘手问题本质上都是新颖且独特的。* 由于问题的“棘手性”，即使下周遇到类似的问题，你基本上也必须从头开始，因为需求会有足够大的差异，而解决方案仍然难以捉摸。\n\
    *   *每个棘手问题的解决方案都是一次性操作。* 参见上述第 4 点。\n*   *棘手问题没有现成的备选解决方案。* 也就是说，没有一小部分有限的解决方案可供选择。\n\
    \n棘手问题无处不在。例如，创建一个文字处理程序就是一个棘手问题。你可能认为你知道文字处理器需要做什么——插入文本、剪切和粘贴、处理段落、打印。但这只是一个人的功能列表。一旦你“完成”了你的文字处理器并发布它，你就会被新的功能请求淹没：拼写检查、脚注、多栏、支持不同字体、颜色、样式，等等。文字处理程序基本上永远不会完成——至少在你发布最后一个版本并终止该产品之前是这样。\n\
    \n文字处理实际上是一个非常明显的棘手问题。其他问题可能包括那些你一开始并不确定是否能解决的问题。专家系统需要一个用户界面、一个推理引擎、一组规则和一个领域信息数据库。对于特定领域，一开始完全无法确定你是否能创建出推理引擎用来得出结论和建议的规则。因此，你必须迭代不同的规则集，发布下一个版本，并观察其表现如何。然后你再次重复，添加和修改规则。直到完成之前，你并不真正知道解决方案是否正确。这就是一个棘手问题。\n\
    \n康克林、里特尔和韦伯认为，当面对一个庞大、复杂的问题（即棘手问题）时，传统的认知研究表明，大多数人会遵循一种线性的问题解决方法，即从上到下从问题到解决方案进行工作。这等同于第\
    \ 2 章中描述的传统瀑布模型。⁴ 图 6-1 展示了这种线性方法。\n\n__________\n\n² 康克林，J. 《对话映射：构建对棘手问题的共同理解》。（纽约州纽约市：约翰·威利父子出版社，2005\
    \ 年。）\n\n³ 德格雷斯，P. 和 L. H. 斯塔尔《棘手问题，正义解决方案：现代软件工程范式目录》。（新泽西州恩格尔伍德克利夫斯：约登出版社，1990\
    \ 年。）\n\n⁴ 康克林，J. 《棘手问题与社会复杂性》。2009 年 9 月 8 日检索自 [`cognexus.org/wpf/wickedproblems.pdf`](http://cognexus.org/wpf/wickedproblems.pdf)。论文最后更新于\
    \ 2008 年 10 月。\n\n![images](img/0601.jpg)\n\n***图 6-1.** 线性问题解决方法*\n\n与这种线性的瀑布式方法不同，真正的棘手问题解决者倾向于使用一种在需求分析和解决方案建模之间来回摆动的方法，直到问题解决方案足够好为止。康克林称此为**机会驱动**或**机会主义**方法，因为设计者正在寻找任何机会来朝着解决方案取得进展。⁵\
    \ 与图 6-1 中传统的瀑布图不同，机会驱动方法看起来像图 6-2。\n\n![images](img/0602.jpg)\n\n***图 6-2.**\
    \ 机会驱动开发方法*\n\n在此图中，锯齿线表示设计者的工作从问题移动到解决方案原型，然后再返回，逐渐演变对需求的理解和解决方案的迭代，并收敛到一个足够好、可以发布的实现上。作为示例，让我们快速看一下一个网络应用程序。\n\
    \n假设一个非营利组织为你所在县的青少年维护一个活动列表。该列表定期更新，并分发给全县的图书馆。目前，该列表保存在电子表格中，并以活页夹的纸质形式分发。该非营利组织希望将其所有数据放在网上，并通过网络访问。它还希望能够通过同一个网站更新数据。你说，这很简单。这只是一个带有\
    \ HTML 前端和数据库后端的网络应用程序。没问题。\n\n啊，但这实际上是一个伪装起来的棘手问题。首先，客户不知道他们希望网页长什么样。因此，无论你第一次给他们什么，都不会完全符合他们的要求；直到你完成，问题才能被完全理解。其次，随着你开发原型，他们会想要更多的功能——所以问题没有停止规则。最后，随着时间的推移，非营利组织会想要新的功能，所以没有“正确”的答案，只有“足够好”的答案。非常棘手。\n\
    \n__________\n\n⁵ 康克林，J. (2008)\n\n康克林还提供了一组“温顺”问题的特征列表，即那些你可以轻松可靠地找到解决方案的问题。“一个温顺问题：\n"
- fmt: '*   has a well-defined and stable problem statement;

    *   has a definite stopping point, i.e., when the solution is reached;

    *   has a solution which can be objectively evaluated as right or wrong;

    *   belongs to a class of similar problems which are all solved in the same similar
    way;

    *   has solutions which can be easily tried and abandoned; and

    *   comes with a limited set of alternative solutions.”


    A terrific example of a tame problem is sorting a list of data values.


    *   The problem is easily and clearly stated – sort this list into ascending order
    using this function to compare data elements.

    *   Sorting has a definite stopping point – the list is sorted.

    *   The result of a sort can be objectively evaluated (the list is either sorted
    correctly, or it isn''t.)

    *   Sorting belongs to a class of similar problems that are all solved in the
    same way. Sorting integers, is similar to sorting strings, is similar to sorting
    database records using a key and so on.

    *   Sorting has solutions that can easily be tried and abandoned.

    *   Finally, sorting has a limited set of alternative solutions; sorting by comparison
    has a set of known algorithms and a theoretical lower bound.


    What does this have to do with design principles, you ask? Well, realizing that
    most of the larger software problems we''ll encounter have a certain amount of
    “wickedness” built into them influences how we think about design issues, how
    we approach the design of a solution to a large, ill-formed problem, and gives
    us some insight into the design process. It also lets us abandon the waterfall
    model with a clear conscience and pushes us to look for unifying heuristics that
    we can apply to design problems. In this chapter we''ll discuss overall principles
    for design that we''ll then expand upon in the chapters ahead.


    ### The Design Process


    *Design is messy*. Even if you completely understand the problem requirements
    (it''s a tame problem), you typically have many alternatives to consider when
    you''re designing a software solution. You''ll also usually make lots of mistakes
    before you come up with a solution that works. As we saw in [Figure 6-2](#Chapter06.html#fig_6_2),
    your design will change as you understand the problem better over time. This gives
    the *appearance* of messiness and disorganization, but really, you''re making
    progress.


    *Design is about tradeoffs and priorities*. Most software projects are time-limited,
    so you usually won''t be able to implement all the features that the customer
    wants. You have to figure out the subset that will give the customer the most
    bang in the time you have available. So you have to prioritize the requirements
    and trade off one subset for another.


    *Design is heuristic*. For the overwhelming majority of projects there is no set
    of cut and dried rules that says, “First we design component X using technique
    Y. Then we design component Z using technique W.” Software just doesn''t work
    that way. Software design is done using a set of ever-changing heuristics (rules
    of thumb) that each designer acquires over the course of a career. Over time good
    designers learn more heuristics and patterns (see [Chapter 11](#Chapter11.html#ch11))
    that allow them to quickly get through the easy bits of a design and get to the
    heart of the wickedness of the problem. The best thing you can do is to sit at
    the feet of a master designer and learn the heuristics.


    *Designs evolve*. Finally, good designers recognize that for any problem, tame
    or wicked, the requirements will change over time. This will then cascade into
    changes in your design. And so your design will evolve over time. This is particularly
    true across product releases and new feature additions. The trick here is to create
    a software architecture ([Chapter 5](#Chapter05.html#ch5)) that is amenable to
    change with limited effect on the downstream design and code.


    ### Desirable Design Characteristics (Things Your Design Should Favor)


    Regardless of the size of your project or what process you use to do your design,
    there are a number of desirable characteristics that every software design should
    have. These are the principles you should adhere to as you consider your design.
    Your design doesn''t necessarily need to exhibit all of these characteristics,
    but having a majority of them will certainly make your software easier to write,
    understand, and use.'
