  trans: "\n#### 可靠地重现问题\n\n这是关键的第一步。如果你的错误只是偶尔出现，那么找到它的难度会大大增加。一个经典的例子就是“但在我电脑上运行正常”这个问题。这是你最不想听到的一句话。这也是技术支持人员早早退休的原因。重现问题——如果可能的话，用不同的方式——能让你看到发生了什么，并清晰地指示出问题发生的位置。幸运的是，大多数错误都很容易找到。要么你得到了错误的结果，可以找到打印语句的位置并从那里反向推导；要么你的程序悲惨地崩溃，系统为你生成了一个堆栈跟踪。Java\
    \ 虚拟机会自动为你完成这项工作。对于其他语言，你可能需要使用调试器来获取堆栈跟踪。\n\n请记住，错误并非随机事件。如果你认为问题是随机的，那么它通常属于以下几种情况之一：\n\
    \n*   *初始化问题*：这可能是因为你依赖变量定义的副作用来初始化变量，但它的行为却不符合你的预期。\n*   *时序错误*：某些事情发生的时间比你预期的要早或要晚。\n\
    *   *悬空指针问题*：你从一个局部变量返回了一个指针，而存储该局部变量的内存已经被归还给系统。\n*   *缓冲区溢出或数组越界*：你有一个遍历集合的循环，但访问越界，覆盖了某段代码、另一个变量或系统堆栈。\n\
    *   *并发问题（竞态条件）*：在多线程应用程序或使用共享内存的应用程序中，你没有同步代码，导致你需要使用的变量在被你访问之前就被其他线程覆盖了。\n\n\
    __________\n\n² Bentley, J. *编程珠玑，第 2 版*。（雷丁，马萨诸塞州，Addison-Wesley：2000 年）。\n\n\
    ³ Kernighan, B. W. 和 R. Pike. *编程实践*。（波士顿，马萨诸塞州，Addison-Wesley，1999 年）。\n\n然而，仅仅重现问题是不够的。你应该使用能引发错误的最简单的测试用例来重现它。这是一个排除所有其他可能性的过程，这样你就能专注于导致错误的单一（好吧，也许是一两个）原因。一种方法是尝试使用第一次数据量的一半来重现问题。选择其中一半。如果错误仍然出现，就再试一次。如果错误没有出现，就尝试另一半数据。如果仍然没有错误，就尝试使用四分之三的数据。你明白这个思路。当你找到最简单的用例时，你会知道的，因为任何更小的数据都会改变程序的行为；要么错误消失，要么你会得到一个略有不同的错误。\n\
    \n#### 找到错误的根源\n\n一旦你能从外部重现问题，就可以开始定位错误发生的位置了。同样，我们需要系统地来做这件事。对于大多数错误来说，这很容易。你可以使用多种技术。\n\
    \n*   *收集数据*：既然你现在有了一个能重现错误的测试用例，那就从运行该测试用例中收集数据。数据可以包括：哪种输入数据会导致错误，你需要做什么才能让它出现——你需要执行的确切步骤，它需要多长时间出现，以及具体发生了什么。一旦你有了这些数据，你就可以对代码中错误的位置形成一个假设。对于大多数类型的错误，你会得到一些正确的输出，然后程序要么崩溃，要么你得到错误的输出。这将有助于隔离错误。\n\
    *   *阅读代码*：多么棒的想法！运行测试用例后，你应该做的第一件事是检查输出，猜测错误可能在哪里（查看最后打印的内容，并在程序中找到那个打印语句），然后坐下来，喝杯咖啡，只是阅读代码。理解代码在错误发生区域试图做什么，是找出修复方法的关键。这也是首先找到错误根源的关键。十有八九，如果你只是坐下来阅读代码五分钟左右，你就能找到错误的确切位置。不要直接抓起键盘就开始胡乱修改。先阅读代码。\n\
    *   *插入打印语句*：一旦你确定哪个输出不正确，最简单的方法就是开始在那个位置以及代码中其他关键点插入打印语句。关键点可以是函数的入口和出口，例如“进入排序例程”、“退出分区例程”等等。当使用集成开发环境（IDE）时，它有内置的调试功能，包括设置断点、监视点、单步执行代码等，这使得插入打印语句变得不那么必要。我稍后会再提到其中一些方法。\n\
    *   你也可以在循环的顶部和底部、`if` 语句的 then 和 else 块的开头、`switch` 语句的 default 分支等处放置打印语句。除非发生了什么非常诡异的事情，否则使用这种方法你应该能够很快地隔离错误发生的位置。再次强调，从你认为错误显现的那个点开始反向推导。请记住，很多时候，错误*表现*其行为的位置，可能距离错误实际*发生*的位置有好多行代码。\n\
    *   在某些语言中，你可以将打印语句包裹在调试块中，在编译时可以通过命令行开关来控制这些块。在 C/C++ 中，你可以在不同位置插入如下代码块：\n  \
    \  `        #ifdef DEBUG`\n    `                        printf(\"排序例程中的调试语句\\\
    n\");`\n    `        #endif`\n    然后，在编译程序时，你可以在头文件中放入 `#define DEBUG`，或者使用 `gcc\
    \ -DDEBUG foo.c` 进行编译，这样 `printf` 函数调用就会被包含在你的程序中。省略 `#define` 或 `-DDEBUG` 则会从可执行程序中移除\
    \ `printf` 函数调用（但不会影响你的源代码）。但要注意，这种技术会使你的程序更难阅读，因为代码中散布着大量的 `DEBUG` 块。你应该在程序发布前移除\
    \ `DEBUG` 块。不幸的是，Java 没有这个功能，因为它没有预处理器。不过，并非无计可施。你可以通过使用一个命名的布尔常量来达到与 `#ifdef\
    \ DEBUG` 相同的效果。下面是一个代码示例：\n    `public class IfDef {`\n    `        final static\
    \ boolean DEBUG = true;`\n\n`        public static void main(String [] args) {`\n\
    \    `                System.out.printf(\"Hello, World \\n\");`\n"
- fmt: "```java\nif (DEBUG) {\n    System.out.printf(\"max(5, 8) is %d\\n\", Math.max(5,\
    \ 8));\n    System.out.printf(\"If this prints, the code was included\\n\");\n\
    }\n```\n\n- 在这个例子中，我们将布尔常量`DEBUG`设置为`true`以启用`DEBUG`代码块，当需要关闭时则将其设为`false`。这种方法并不完美，因为每次开关调试功能都需要重新编译，但C/C++的上述示例也是如此。\n\
    - **寻找模式**：接下来要尝试的是，观察代码或错误中是否存在你之前见过的模式。随着编程经验的积累，以及对自己编程方式和常见错误类型的理解加深，这会变得更容易。\n\
    - 上述`while`循环末尾多余的分号就是可形成模式的一个错误示例。另一个例子是`for (int j = 0; j <= myArray.length;\
    \ j++) { // some code here }`，由于使用了`<=`而非`<`，你会越界访问数组末尾，这是经典的差一错误。\n- C/C++中的一个经典错误是在条件表达式中误用单个`=`代替`==`。假设你在C/C++程序中检查字符数组中的特定字符：\n\
    ```c\nfor (int j = 0; j < length; j++) {\n    if (c = myArray[j]) {\n        pos\
    \ = j;\n        break;\n    }\n}\n```\n- 单个等号会导致`if`语句每次都提前停止；`pos`将始终为0。顺便提一下，Java不允许这种写法，它会报错，提示赋值表达式的类型不是布尔型：\n\
    ```\nTstEql.java:10: incompatible types\nfound   : char\nrequired: boolean\n \
    \               if (c = myArray[j]) {\n                      ^\n1 error\n```\n\
    - 这是因为在Java中（与C和C++一样），赋值运算符会返回结果，且每个结果都有类型。此例中结果类型是`char`，但`if`语句期望的是布尔表达式。Java编译器会检查这一点，因为它比C和C++的类型检查更严格；后两者的编译器不会进行此检查。\n\
    - 在`switch`中忘记`break`语句是另一个常见错误：\n```java\nswitch(selectOne) {\n    case 'p':\
    \       operation = \"print\";\n                    break;\n    case 'd':    \
    \   operation = \"display\";\n    default:        operation = \"blank\";\n   \
    \                 break;\n}\n```\n- 由于第二个`case`后没有`break`语句，`operation`会被重置为`blank`。\n\
    - **向他人解释代码**：你有多少次在向同事解释问题时，两分钟后突然就解决了？当你向别人解释问题时，其实也是在向自己解释。灵感往往就在此时迸发。试试看吧。\n\
    - **其他问题**：我仅触及了代码中可能出现的错误类型的皮毛。由于任何编程语言中可编写的程序近乎无限，引入错误的方式也近乎无限。内存泄漏、拼写错误、全局变量的副作用、未关闭文件、`switch`语句中缺少`default`分支、意外覆盖方法定义、错误的返回类型、局部变量隐藏全局或实例变量——这样的例子成千上万。\n\
    \n不过，请不要气馁。你犯的大多数错误其实都很简单。大部分会在代码审查和单元测试中被发现。那些逃过系统测试或（天哪）进入发布代码的错误才是真正有趣的。调试是一项极好的问题解决练习。享受其中吧。\n\
    \n## 调试工具\n\n到目前为止，我们讨论过的调试工具只有：用于消除语法错误和警告的编译器、可插入代码以获取运行时数据的`print`语句，以及可编译进或编译出的内联调试语句。还有其他工具可以帮助你找到错误根源，其中首要的就是调试器。\n\
    \n调试器是特殊的程序，它执行经过插桩的代码，并允许你在代码运行时窥视其内部情况。调试器允许你停止正在运行的代码（断点）、在代码执行时检查变量值（监视点）、单步进入和跳出函数，甚至在程序运行时修改代码和数据。对于C和C++程序，调试器是获取堆栈跟踪的最简单方式。对于C和C++开发者，几乎所有Unix和Linux系统（以及Mac\
    \ OS X和Windows的开发工具包）自带的`gdb`调试器通常是首选。对于Java，`gdb`也集成在Eclipse（[`www.eclipse.org/`](http://www.eclipse.org/)）等交互式开发环境中，并且DDD调试器（[`www.gnu.org/software/ddd/`](http://www.gnu.org/software/ddd/)）提供了图形用户界面。NetBeans\
    \ IDE（[`www.netbeans.org`](http://www.netbeans.org)）自带图形化调试器。Eclipse和NetBeans中的Java调试器允许你在单行代码上设置断点，通过监视点观察变量值的变化，并允许你逐行或逐方法地单步执行代码。`gdb`具备上述所有功能甚至更多，但你应该谨慎使用它以及任何其他调试器。调试器本质上在查看代码时具有隧道视野。它们擅长展示当前函数的所有代码，但无法让你感受到程序的整体组织结构。它们也无法让你理解复杂的数据结构，并且使用调试器调试多线程和多进程程序非常困难。多线程程序尤其困难，原因有很多，其中之一是执行时序对不同线程至关重要，而在调试器中运行多线程程序会改变时序。"
  raw: "`                if (DEBUG) {`\n    `                    System.out.printf(\"\
    max(5, 8) is %d\\n\", Math.max(5, 8));`\n    `                        System.out.printf(\"\
    If this prints, the code was included\\n\");`\n    `                }`\n    `        }`\n\
    \    `}`\n*   In this example we set the boolean constant `DEBUG` to true when\
    \ we want to turn the `DEBUG` blocks on, and we’ll then turn it to false when\
    \ we want to turn them off. This isn’t perfect because you have to re-compile\
    \ every time you want to turn debugging on and off, but you have to do that with\
    \ the C/C++ example above as well.\n*   *Look for patterns*: The next thing to\
    \ try is to see if there’s a pattern to the code or the error that you’ve seen\
    \ before. As you gain more programming experience and get a better understanding\
    \ of how you program and what kind of mistakes you make, this will be easier.\n\
    *   The extra semi-colon at the end of the while loop above is one example of\
    \ a mistake that can be a pattern. Another is `for (int j = 0; j <= myArray.length;\
    \ j++) {`\n    `    // some code here`\n    `}`\n*   where you will step off the\
    \ end of the array because you’re testing for <= rather than <. This is the classic\
    \ off-by-one error.\n*   A classic in C/C++ is using one = where you meant to\
    \ use two == in a conditional expression. Say you’re checking an array of characters\
    \ for a particular character in a C/C++ program `        for (int j = 0; j < length;\
    \ j++) {`\n    `                        if (c = myArray[j]) {`\n    `                                pos\
    \ = j;`\n    `                                break;`\n    `                        }`\n\
    \    `        }`\n*   the single equals sign will cause the if statement to stop\
    \ early every time; pos will always be zero. By the way, Java doesn’t let you\
    \ get away with this. It gives you an error that says the type of the assignment\
    \ expression is not a boolean. `        TstEql.java:10: incompatible types`\n\
    \    `        found   : char`\n    `        required: boolean`\n    `                        if\
    \ (c = myArray[j]) {`\n    `                              ^`\n    `        1 error`\n\
    *   This is because in Java, just like in C and C++ an assignment operator returns\
    \ a result and every result has a type. In this case, the result type is char\
    \ but the if-statement is expecting a boolean expression there. The Java compiler\
    \ checks for this because it’s more strongly typed than C and C++; their compilers\
    \ don’t do the check.\n*   Forgetting a break statement in a switch is another.\
    \ `        switch(selectOne) {`\n    `                        case ’p’:       operation\
    \ = \"print\";`\n    `                                                break;`\n\
    \    `                        case ’d’:       operation = \"display\";`\n    `                        default:        operation\
    \ = \"blank\";`\n    `                                                break;`\n\
    \    `        }`\n*   will reset *operation* to *blank* because there is no break\
    \ statement after the second case.\n*   *Explain the code to someone*: How many\
    \ times have you started explaining a problem to one of your peers and two minutes\
    \ later, all of a sudden, you solve it. When you start explaining the problem\
    \ to someone else, you’re really explaining it to yourself as well. That’s when\
    \ the inspiration can hit. Give it a try.\n*   *Other problems*. I’ve only scratched\
    \ the surface of the possible errors you can make and find in your code. Because\
    \ there are nearly an infinite number of programs you can write in any given programming\
    \ language, there are nearly an infinite number of ways to insert errors into\
    \ them. Memory leaks, typing mistakes, side effects from global variables, failure\
    \ to close files, not putting a default case in a switch statement, accidentally\
    \ overriding a method definition, bad return types, hiding a global or instance\
    \ variable with a local variable, there are thousands of them.\n\nDon’t be discouraged,\
    \ though. Most errors you’ll make really are simple. Most of them you’ll catch\
    \ during code reviews and unit tests. The ones that escape into system test or\
    \ (heaven forbid) released code are the really interesting ones. Debugging is\
    \ a great problem solving exercise. Revel in it.\n\n##### Debugging Tools\n\n\
    So far the only debugging tools we’ve talked about using are compilers to remove\
    \ syntax errors and warnings, print statements you can insert in your code to\
    \ give you data on what is happening where, and inline debugging statements that\
    \ you can compile in or out. There are other tools you can use that will help\
    \ you find the source of an error. The first among these are debuggers.\n\nDebuggers\
    \ are special programs that execute instrumented code and allow you to peek inside\
    \ the code as it’s running to see what’s going on. Debuggers allow you to stop\
    \ your running code (breakpoints), examine variable values as the code executes\
    \ (watchpoints), step into and out of functions, and even make changes to the\
    \ code and the data while the program is running. Debuggers are the easiest way\
    \ to get a stack trace for C and C++ programs. For C and C++ developers, the gdb\
    \ debugger that comes with nearly all Unix and Linux systems (and the development\
    \ tool packages for Mac OS X and Windows) is usually the debugger of choice. For\
    \ Java, Gdb is also integrated in some interactive development environments like\
    \ Eclipse ([`www.eclipse.org/`](http://www.eclipse.org/)), and also comes with\
    \ a graphical user interface in the DDD debugger ([`www.gnu.org/software/ddd/`](http://www.gnu.org/software/ddd/)).\
    \ The NetBeans IDE ([`www.netbeans.org`](http://www.netbeans.org)) comes with\
    \ its own graphical debugger. The Java debuggers in Eclipse and NetBeans allow\
    \ you to set breakpoints at individual lines of code, they let you watch variables\
    \ values change via watchpoints, and they allow you to step through the code one\
    \ line or one method at a time. Gdb does all the things mentioned above and more,\
    \ but you should use it, and any other debugger cautiously. Debuggers, by their\
    \ nature, have tunnel vision when it comes to looking at code. They are great\
    \ at showing you all the code for the current function, but they don’t give you\
    \ a feel for the organization of the program as a whole. They also don’t give\
    \ you a feel for complicated data structures and it’s hard to debug multi-threaded\
    \ and multi-process programs using a debugger. Multi-threaded programs are particularly\
    \ hard for a number of reasons, one of which is that while executing timing is\
    \ crucial for the different threads, and running a multi-threaded program in a\
    \ debugger changes the timing."
