    You can see that the client class uses the Collection and the Iterator interfaces,
    and the *`Concrete_Iterator`* is part of and uses the *`Concrete_Collection`*.
    Note that the *`Collection_Interface`* will contain an abstract method to create
    an iterator for the Collection. This method is implemented in the *`Concrete_Collection`*
    class and when the client calls the method, a *`Concrete_Iterator`* is created
    and passed to the client to use.


