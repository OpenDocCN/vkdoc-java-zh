  trans: '

    ### 问题


    该程序是一个简单的狐狸与兔子模拟程序。狐狸试图在网格环境中找到兔子，而兔子则试图逃脱。环境中存在兔子可以躲藏的灌木丛，并且移动受到一些限制。


    图 5-3 是该游戏运行时的典型画面。


    ![images](img/0503.jpg)


    ***图 5-3.** 一个典型的狐狸与兔子狩猎实例*


    ⁴ Matuszek, David. “Rabbit Hunt,” SIGCSE 2004 Technical Symposium, Nifty Assignments
    Session, retrieved August 17, 2009, [`http://nifty.stanford.edu/2004/RabbitHunt/.`](http://nifty.stanford.edu/2004/RabbitHunt/.)
    (2004)


    狐狸是大圆点，兔子是小圆点，灌木丛是粗十字形。


    本次编程作业的目标是让兔子变得更聪明，以便它能从狐狸手中逃脱。我们对此并不真正关心；我们想要关注的是程序的组织方式。图 5-4 展示了程序的组织结构。这是一个取自
    BlueJ IDE 的 UML 对象图。程序的关键部分是三个类：Model、View 和 Controller。


    ![images](img/0504.jpg)


    ***图 5-4.** 狐狸与兔子狩猎的类结构*


    ### 模型


    模型代表了游戏的规则。它负责所有计算，所有决定轮到谁、每回合发生什么以及是否有人获胜的工作。模型严格来说是内部的，并且与程序的其他部分几乎没有任何关系。


    ### 视图


    视图负责显示正在发生的事情。它在屏幕上呈现图像，以便用户能看到发生了什么。视图是完全被动的；它不会以任何方式影响狩猎过程，它只是一个新闻记者，向你提供模型内部发生情况的（部分）画面。


    ### 控制器


    控制器是程序中负责显示控件（窗口底部的五个按钮和速度控制）的部分。它对模型和视图的了解尽可能少；它基本上就是告诉模型何时开始、何时停止。


    ### 模型


    该程序的模型部分实际上由五个类组成：`Model`（“主”模型类）、`Animal`、`Rabbit`、`Fox` 和 `Bush`。`Rabbit` 和
    `Fox` 是 `Animal` 的子类（正如你从 UML 图中的实线箭头所看到的）。这是程序中你真正需要理解的部分。


    `RabbitHunt` 类仅创建 `model`、`view` 和 `controller` 对象，并将控制权交给 `controller` 对象。`controller`
    对象启动 `model` 对象，然后等待用户按下按钮。当按钮被按下时，会向 `model` 对象发送一条消息，由 `model` 对象决定下一步操作。


    `model` 对象会：


    *   将狐狸、兔子和灌木丛放置在场地中；

    *   给兔子和狐狸各一次移动机会（一个移动，然后另一个移动；它们不会同时移动）；

    *   通知视图显示这两次移动的结果；以及

    *   判定哪只动物获胜。


    将程序分解成这些独立部分的好处有很多。我们可以安全地重写 `Controller` 对象中的 GUI 或 `view` 对象中的显示，而无需更改 `model`。我们可以让狐狸和/或兔子变得更聪明（或更笨！），而无需更改
    GUI 或显示。我们可以几乎不费力气地将该 GUI 复用于不同的应用程序。这样的好处不胜枚举。


    简而言之，MVC 是你的朋友；请明智且频繁地使用它。


    ### 客户端-服务器架构模式


    转向更传统的架构，我们需要回溯历史。曾几何时，所有程序都运行在大型机上，你的整个程序都在一台机器上运行。如果你足够幸运，能使用分时操作系统，那么几个人可以同时使用同一个程序——尽管通常是不同的副本。然后个人电脑和网络出现了。有人灵机一动，将工作分摊给那台大型机和你的小型台式机。于是，*客户端-服务器架构*
    诞生了。


    在客户端-服务器架构中，你的程序被分解成两个不同的部分，它们通常运行在两台独立的计算机上。服务器承担大部分繁重的工作和计算；它通过高带宽网络向其客户端提供服务。另一方面，客户端主要处理用户输入、显示输出，并提供与服务器的通信。简而言之，客户端程序向服务器程序发送服务请求。然后，服务器程序评估该请求，执行必要的计算（包括在需要时访问数据库），并给出答案来响应客户端的请求。如今，客户端-服务器架构最常见的例子是万维网。


    在网络模型中，你的浏览器就是客户端。它向你呈现用户界面，与网络服务器通信，并将生成的网页渲染到你的屏幕上。网络服务器做很多事情。它提供 HTML 格式的网页，但它也可以充当数据库服务器、文件服务器和计算服务器——想想当你访问亚马逊网站时，它所做的所有事情。


    不过，客户端和服务器不必位于不同的计算机上。使用客户端-服务器架构编写的两个程序示例，其中双方可以驻留在同一台计算机上，分别是*打印后台处理程序*和 *X
    Windows 图形系统*。


    在打印后台处理程序应用中，你正在运行的程序——文字处理器、电子表格程序、你的网络浏览器——作为客户端运行，向作为计算机操作系统一部分实现的打印服务发出请求。这项服务通常被称为打印后台处理程序，因为它会维护一个打印作业队列，并控制哪些作业被打印以及它们的打印顺序。因此，在你的文字处理器中，你会从菜单中选择*打印*，设置某些属性并通常选择一台打印机，然后在某个对话框上点击*确定*。这会将一个打印请求发送到你系统上的打印后台处理程序。然后，打印后台处理程序将你的文件添加到它管理的打印作业队列中，联系打印机驱动程序并发出打印请求。这里的区别在于，一旦你点击了确定按钮，你的客户端程序（文字处理器）通常就不再与打印后台处理程序有任何联系，打印*服务*会无人值守地运行。


    X Window 系统（参见 [`www.xfree86.org/`](http://www.xfree86.org/)）是一个图形化窗口系统，用于所有基于
    Unix 和 Linux 的系统，也可作为附加窗口系统用于 Apple Macintosh 和 Microsoft Windows 系统。X 系统采用客户端-服务器架构，其中客户端程序和服务器通常都驻留在同一台计算机上。X
    系统服务器接收来自客户端程序的请求，针对当前系统连接的硬件进行处理，并提供一项输出服务，将结果数据以位图形式显示出来。客户端程序示例包括 *xterm*——一个提供
    Unix 命令行界面的窗口化终端程序，*xclock*——你猜对了——一个时钟，以及 *xdm*——X Window 显示管理器。X 系统支持分层和重叠窗口，并提供配置菜单、滚动条、打开和关闭按钮、背景和前景颜色以及图形的能力。X
    还可以管理鼠标和键盘。如今，X 系统的主要用途是作为跳板，用于构建更复杂的窗口管理器、图形环境、图形小部件以及像 GNOME 和 KDE 这样的桌面管理窗口系统。

