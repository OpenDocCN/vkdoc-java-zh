    ### 面向对象分析与设计流程


    面向对象分析（OOA）、设计（OOD）与编程（OOP）虽彼此关联，但各有侧重。OOA 致力于开发*应用领域的对象模型*。例如，你需要根据问题陈述生成一组特性及（可能存在的）用例，²从中梳理出对象以及这些对象中用于满足用例的某些方法，并构建出解决方案的整体架构。这就是面向对象分析。


    OOD 则致力于开发*满足需求的面向对象系统模型*。你需要将 OOA 阶段生成的对象作为基础，判断是否使用继承、聚合、组合、抽象类、接口等机制，以构建一个连贯且高效的模型；绘制类图，详细定义每个属性的含义及每个方法的功能，并描述接口。这就是设计阶段。


    有人偏爱面向对象分析、设计与编程，³也有人不以为然。⁴


    因此，面向对象分析让你能够将问题模型转化为对象和类的形式；而面向对象设计则让你能够将分析后的需求串联起来，在你提出的对象之间建立联系，并补充对象属性和方法的细节。但具体该如何操作呢？下面是一个建议流程，它将逐步填充这些细节。⁵
    其余部分我们将在后续过程中逐步明确。


    _________


    ¹ Fowler, M. *UML Distilled.* (波士顿，马萨诸塞州：Addison-Wesley 出版社，2000 年.)


    ² Cockburn, A. *Writing Effective Use Cases.* (波士顿，马萨诸塞州：Addison-Wesley 出版社，2000
    年.)


    ³ Beck, K., 与 B. Boehm. “Agility through Discipline: A Debate.” IEEE Computer
    36 (6):44-46. (2003 年)


    ⁴ Graham, Paul. “Why Arc isn''t Especially Object Oriented,” 2009 年 10 月 12 日检索自
    [`www.paulgraham.com/noop.html`](http://www.paulgraham.com/noop.html)


    ⁵ McLaughlin, Brett D., 等. *Head First Object-Oriented Analysis & Design.* (O''Reilly
    Media, Inc. 塞瓦斯托波尔，加利福尼亚州：2007 年.)


    1.  编写（或接收）问题陈述。据此生成初始特性集。

    2.  创建特性列表。特性列表是从问题陈述中推导出的程序特性集合；它包含你的初始需求集。

    3.  编写用例。这有助于完善特性、挖掘新需求，并暴露刚创建的特性中存在的问题。我们也会看到，这一步可以使用用户故事。

    4.  将问题分解为子系统、模块或任何你喜欢的名称，只要它们是与功能相关的、更小且自包含的单元即可。

    5.  将特性、子系统和用例映射到领域对象；创建抽象。

    6.  识别程序的对象、方法和算法。

    7.  实现本次迭代。

    8.  测试本次迭代。

    9.  如果特性列表尚未完成，且仍有时间和/或预算，则返回步骤 4 进行下一次迭代；否则……

    10. 进行最终验收测试并发布。


    请注意，该流程省略了许多细节，例如迭代的时长。一次迭代应包含多少特性？如何以及何时向特性列表添加新特性？我们究竟如何识别对象和操作？如何将对象抽象为类？测试中发现的错误应在何处修复？是否需要对代码及其他项目工作产品进行评审？


    在此省略一些步骤是可以接受的。我们主要关注流程中的分析与设计环节。下文将讨论流程其余部分的相关思路，部分答案也可见于项目管理相关的第 3 章。


    上述流程步骤如何融入软件开发生命周期？很高兴你问到这个问题。回顾一下，基本的开发生命周期包含四个阶段：


    1.  需求收集与分析；

    2.  设计；

    3.  实现与测试；

    4.  发布、维护与演进。


    我们可以轻松地将之前的十个步骤归入四个阶段，如下所示：


    **需求收集与分析**


    1.  问题陈述。

    2.  创建特性列表。

    3.  生成用例。


    **设计**


    1.  分解问题。

    2.  将特性与用例映射到领域对象。

    3.  识别对象、方法和算法。


    **实现与测试**


    1.  实现本次迭代。

    2.  测试本次迭代。

    3.  如果特性列表未完成或时间耗尽，则返回步骤 4；否则……


    **发布/维护/演进**


    1.  进行最终验收测试并发布。


    再次强调，目前我们可以忽略每个流程步骤的细节。这些细节实际上取决于你为开发项目选择的流程方法论。上述流程描述采用了迭代方法论，可以轻松适配敏捷流程或更传统的分阶段发布流程。


    另请注意，每当进入步骤 4 时，你都需要重新审视需求，因为在每次迭代过程中你很可能会发现或生成新的需求。此外，每当客户看到新的迭代版本时，他们总会提出更多要求（相信我，他们一定会）。这意味着你需要在每次新迭代开始时更新特性列表（并重新确定优先级）。切记！


    ### 执行流程


    接下来，我们通过一个扩展示例来继续探讨，看看问题陈述会引导我们走向何方，以及如何梳理需求并开始面向对象分析。


    #### 问题陈述


    伯特是“伯特之鸟”的骄傲所有者，他发明了终极喂鸟器。伯特的“鸟之盛宴与浴场”（B⁴）是一款集喂鸟器与鸟浴盆于一体的产品。它有 12 种不同颜色（包括迷彩色），并提供
    1 磅、3 磅和 5 磅三种容量规格。其附带的鸟浴盆可容纳多达 1 加仑的水，内置挂钩可悬挂在树枝或杆子上，B⁴正从货架上飞速售罄。爱丽丝和鲍勃对 B⁴渴望至极，但他们希望做一些改动。爱丽丝是个技术迷，也是狂热的鸣禽观察者。她知道她最喜欢的鸣禽只在白天觅食，因此她想要一款定制的
    B⁴，能够实现喂食门在日出时自动打开、日落时自动关闭。一贯随和的伯特同意了这一要求，“伯特之鸟”的硬件部门正全力设计专为爱丽丝打造的 B⁴++。你的任务是编写软件，让硬件正常工作。


    #### 特性列表


    我们首先要弄清楚 B⁴++实际上会*做什么*。这个版本看起来相当简单。我们几乎可以立即写下三个需求：


    *   所有喂食门必须同时打开和关闭。

    *   喂食门应在日出时自动打开。

    *   喂食门应在日落时自动关闭。


    看起来并不复杂。需求很简单，且无需用户交互。下一步是创建一个用例，以便我们真正了解这款喂鸟器将如何运作。

    '
- fmt: "#### Use Cases\n\nA *use case* is a description of what a program does in\
    \ a particular situation. It's the detailed set of steps that the program executes\
    \ when a user asks for something. Use cases always have an *actor* – some outside\
    \ agent that gets the ball rolling, and a *goal* – what the use case is supposed\
    \ to have done by the end. The use case describes what it takes to get from some\
    \ initial state to the goal from the user's perspective.^([6](#Chapter08.html#CHP-8-FN-6))\
    \ Here's a quick example of a use case for the B⁴++:\n\n1.  The sensor detects\
    \ sunlight at a 40% brightness level.\n2.  The feeding doors open.\n3.  Birds\
    \ arrive, eat, and drink.\n4.  Birds leave.\n5.  The sensor detects a decrease\
    \ in sunlight to a 25% brightness level.\n6.  The feeding doors close.\n\nGiven\
    \ the simplicity of the B4++, that's about all we can expect out of a use case.\
    \ In fact, steps 3 and 4 aren't technically part of the use case, because they\
    \ aren't part of the program – but they're good to have so that we can get a more\
    \ complete picture of how the B⁴++ is operating. Use cases are very useful in\
    \ requirements analysis because they give you an idea – in English – of what the\
    \ program needs to do in a particular situation and because they nearly always\
    \ will help you uncover new requirements. Note that in the use case we don't talk\
    \ about *how* a program does something, we only concentrate on *what* the program\
    \ has to do to reach the goal. Use cases are generated during the Requirements\
    \ Gathering and Analysis phase of the software life cycle, so we're not so much\
    \ concerned with the details yet, we just treat the program as a black box and\
    \ let the use case talk about the *external behavior* of the program. Most times\
    \ there will be several use cases for every program you write. We've only got\
    \ one because this version of the B⁴++ is so simple.\n\n#### Decompose the Problem\n\
    \nSo now that we've got our use case we can probably just decompose the problem\
    \ and identify the objects in the program. You go ahead, I'll wait....\n\n__________\n\
    \n⁶ Cockburn, 2000.\n\nDone? Okay. This problem is quite simple; if you look at\
    \ the use case above and pick out the nouns, you see that we can identify several\
    \ objects. Each of these objects has certain characteristics and contributes to\
    \ reaching the goal of getting the birds fed. (Yes, I know, “birds” is a noun\
    \ in the use case, but they are the actors in this little play so for the purposes\
    \ of describing the objects we ignore them – they're not part of the program.)\
    \ The other two nouns of interest are “sensor” and “doors.” These are the critical\
    \ pieces of the B⁴++, because the use case indicates that they are the parts that\
    \ accomplish the goal of opening and closing the feeding doors at sunrise and\
    \ sunset. So it's logical that they are objects in our design. Here are the objects\
    \ I came up with for this first version of the B⁴++ and a short description:\n\
    \n> *BirdFeeder*: The top-level object. The bird feeder has one or more feeding\
    \ doors at which the birds will gather, and a sensor to detect sunrise and sunset.\
    \ The *BirdFeeder* class needs to control the querying of the light sensor and\
    \ the opening and closing of the feeding doors.\n> \n> *Sensor*: There will be\
    \ a hardware light sensor that detects different light levels. We'll need to ask\
    \ it about light levels.\n> \n> *FeedingDoor*: There will be several feeding doors\
    \ on the bird feeder. They have to open and close.\n\nThat's probably about it\
    \ for classes at this point. Now what do they all do? To describe classes and\
    \ their components we can use another UML feature, *class* *diagrams*.\n\n####\
    \ Class Diagrams\n\nA *class diagram* allows you to describe the attributes and\
    \ the methods of a class. A set of class diagrams will describe all the objects\
    \ in a program and the relationships between the objects. We draw arrows of different\
    \ types between class diagrams to describe the relationships. Class diagrams give\
    \ you a visual description of the object model that you've created for your program.\
    \ We saw a set of class diagrams for the Fox and Rabbit program we described in\
    \ [Chapter 5](#Chapter05.html#ch5).\n\nClass diagrams have three sections:\n\n\
    *   **Name**: The name of the class\n*   **Attributes**: The instance data fields\
    \ and their types used by the class\n*   **Methods**: The set of methods used\
    \ by the class and their visibility.\n\nWe can see an example of a class diagram\
    \ for our `BirdFeeder` class in [Figure 8-1](#Chapter08.html#fig_8_1).\n\n![images](images/0801.jpg)\n\
    \n***Figure 8-1.** The BirdFeeder class*\n\nThe diagram shows that the `BirdFeeder`\
    \ class has a single integer attribute, `lightLevel`, and a single method, `operate()`.\
    \ By themselves class diagrams aren't terribly interesting, but when you put several\
    \ of them together and show the relationships between them, then you can get some\
    \ interesting information about your program. So what else do we need in the way\
    \ of class diagrams? In our program the `BirdFeeder` class uses the `FeedingDoor`\
    \ and `Sensor` classes, but they don't know (or care) about each other. In fact,\
    \ while `BirdFeeder` knows about `FeedingDoor` and `Sensor` and uses them, they\
    \ don't know they are being used. Ah, the beauty of object-oriented programming.\
    \ This relationship can be expressed in the class diagram of all three classes\
    \ shown in [Figure 8-2](#Chapter08.html#fig_8_2).\n\n![images](images/0802.jpg)\n\
    \n***Figure 8-2.** BirdFeeder uses FeedingDoor and Sensor*\n\nIn UML, the dotted\
    \ line with the open arrow at the end indicates that one class (in our case `BirdFeeder`)\
    \ is *associated* with another class (in our case either `FeedingDoor` or `Sensor`)\
    \ by *using* it."
