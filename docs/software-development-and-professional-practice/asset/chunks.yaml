    ##### 适配器模式


    问题来了。你有一个客户端程序 Foo，它想要访问另一个类、库或包 Bar。问题是，Foo 期望一个特定的接口，而这个接口与 Bar 对外公开的接口不同。你该怎么办？


    嗯，你可以重写 Foo，将其期望的接口改为符合 Bar 提供的接口。但如果 Foo 很庞大，或者被其他类所使用，这可能不是一个可行的方案。或者，你也可以重写
    Bar，使其提供 Foo 所期望的接口。但也许 Bar 是一个商业包，你根本没有源代码？


    这就是适配器设计模式发挥作用的地方。^(7) 你使用适配器模式来创建一个中间类，将 Bar 的接口包装在一组方法中，这些方法提供 Foo 所寻找的接口。思路是这样的：适配器可以在一端与
    Foo 交互，在另一端与 Bar 交互。这样，Bar 的接口无需改变，而 Foo 的用户也得到了他们期望的接口。皆大欢喜！顺便提一下，适配器设计模式也被称为*包装器*模式，因为它包装了一个接口。^(8)
    参见图 11-2。


    ![images](img/1102.jpg)


    ***图 11-2.** 适配器让 Foo 能够使用 Bar*


    实现适配器有两种方式：*类适配器*，适配器将继承目标类；以及*对象适配器*，它使用委托来创建适配器。注意区别：*类适配器*继承一个现有类并实现一个目标接口。*对象适配器*继承一个目标类并委托给一个现有类。图
    11-3 是一个通用类适配器的 UML 图。


    ___________________


    ⁷ Gamma 等人，1995 年。


    ⁸ Gamma 等人，1995 年。


    ![images](img/1103.jpg)


    ***图 11-3.** 一个类适配器示例*


    注意，`Adapter` 类继承自 `Adaptee` 类，并实现了 `Client` 类所使用的同一个 `Target` 接口。以下是此示例的代码：


    `public class Client`

    `{`

    `    public static void main(String [] args) {`

    `        Target myTarget = new Adapter();`


    `        System.out.println(myTarget.sampleMethod(12));`

    `    }`

    `}`


    `public interface Target`

    `{`

    `   int sampleMethod(int y);`

    `}`


    `public class Adapter extends Adaptee implements Target`

    `{`

    `    public int sampleMethod(int y) {`

    `        return myMethod(y);`

    `    }`

    `}`


    `public class Adaptee`

    `{`

    `   public Adaptee() {`

    `   }`


    `    public int myMethod(int y) {`

    `        return y * y;`

    `    }`

    `}`


    另一方面，对象适配器仍然实现 `Target` 接口，但使用与 `Adaptee` 类的组合来完成包装；它将如下所示：


    `public class Adapter implements Target`

    `{`

    `    Adaptee myAdaptee = new Adaptee();`


    `    public int sampleMethod(int y) {`

    `        return myAdaptee.myMethod(y);`

