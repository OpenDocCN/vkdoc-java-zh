    `    row = 0;                    // and start at the beginning of the column`

    `}`


    For *advance an unsafe queen up a row* we don''t even need a method. The test
    in the main program for safety moves the queen up a row if the `isSafe()` method
    determines that the current (row, col) position is unsafe. The code for this is:


    `       if (isSafe(board))`

    `           advance(board);`

    `       else`

    `           row++;`


