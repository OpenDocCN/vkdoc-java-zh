    ### JUnit: A Testing Framework


    In the previous section, we created our own test scaffolding, and hooked our tests
    into it. Many development environments have the facilities to do this for you.
    One of the most popular for Java is the JUnit testing framework that was created
    by Eric Gamma and Kent Beck (see [`www.junit.org`](http://www.junit.org)).


    JUnit is a framework for developing unit tests for Java classes. It provides a
    base class called TestCase that you extend to create a series of tests for the
    class you are creating. JUnit contains a number of other classes, including an
    assertion library used for evaluating the results of individual tests, and several
    applications that run the tests you create. A very good FAQ for JUnit is at [`http://junit.sourceforge.net/doc/faq/faq.htm#overview_1`](http://junit.sourceforge.net/doc/faq/faq.htm#overview_1).


    To write a test in JUnit, you must import the framework classes and then extend
    the `TestCase` base class. A very simple test would look like this:


    `import junit.framework.TestCase;`


    `public class SimpleTest extends TestCase {`


    `        public SimpleTest(String name) {`

    `                super(name);`

    `        }`


    `        public void testSimpleTest() {`

    `                LifeUniverse lu = new LifeUniverse();`

    `                int answer = lu.ultimateQuestion();`

    `                assertEquals(42, answer);`

    `        }`

    `}`


    Note that the single-argument constructor is required. The `assertEquals()` method
    is one of the assertion library (`junit.framework.Assert`) methods which, of course,
    tests to see if the expected answer (the first parameter) is equal to the actual
    answer (the second parameter). There are many other `assert*()` methods. The complete
    list is at [`http://junit.sourceforge.net/javadoc/`](http://junit.sourceforge.net/javadoc/).


    Because JUnit is packaged in a Java jar file, you either need to add the location
    of the jar file to your Java CLASSPATH environment variable, or add it to the
    line when you compile the test case from the command line. For example, to compile
    our simple test case we would use this:


    `% javac -classpath $JUNIT_HOME/junit.jar SimpleTest.java`


    where `$JUNIT_HOME` is the directory where you installed the `junit.jar` file.


    Executing a test from the command line is just as easy as compiling. There are
    two ways to do it. The first is to use one of the JUnit pre-packaged runner classes,
    which takes as its argument the name of the test class


    `java -cp .:./junit.jar junit.textui.TestRunner SimpleTest`


    which results in


    `.`

    `Time: 0.001`


    `OK (1 test)`


    where there is a dot for every test that is run, the time the entire test suite
    required, and the results of the tests.


    You can also execute the `JUnitCore` class directly, also passing the name of
    the test class as an argument to the class


    `java -cp .:./junit.jar org.junit.runner.JUnitCore SimpleTest`


    which results in


    `JUnit version 4.8.2`

    `.`

    `Time: 0.004`


    `OK (1 test)`


    JUnit is included in many standard integrated development environments (IDEs).
    BlueJ, NetBeans, and Eclipse all have JUnit plug-ins, making the creation and
    running of unit test cases nearly effortless.


