    Discussions other than responses to these three questions are deferred to other
    meetings. This meeting type has several effects. It allows the entire team to
    visualize progress towards the sprint and project completion every day. It reinforces
    team spirit by sharing progress – everyone can feel good about tasks completed.
    And finally, it verbalizes problems – which can then be solved by the entire team.


    The development team itself is self-organizing; the members of the Scrum team
    decide among themselves who will work on what user stories and tasks, assume collective
    ownership of the project, and decide on the development process they''ll use during
    the sprint. This organization is reinforced every day at the Scrum meeting.


    Before the first sprint starts, Scrum has an initial planning phase that creates
    the list of the initial requirements, decides on an architecture for implementing
    the requirements, divides the user stories into prioritized groups for the sprints,
    and breaks the first set of user stories into tasks to be estimated and assigned.
    They stop when their estimates occupy all the time allowed for the sprint. Tasks
    in a sprint should not be longer than one day of effort.


    After each sprint, another planning meeting is held where the Scrum master and
    the team re-prioritize the product backlog and create a backlog for the next sprint.
    With most Scrum teams, estimates of tasks become better as the project progresses
    primarily because the team now has data on how they have done estimating on previous
    sprints. This effect in Scrum is called “acceleration;” the productivity of the
    team can actually increase during the project as they gel as a team and get better
    at estimating tasks. This planning meeting is also where the organization can
    decide whether the project is finished, or whether to finish the project at all.


    After the last scheduled sprint, a final sprint is done to bring closure to the
    project. This sprint implements no new functionality, but prepares the final deliverable
    for product release. It fixes any existing bugs, finishes documentation, and generally
    productizes the code. Any requirements left in the product backlog are transferred
    to the next release. A Scrum retrospective is held before the next sprint begins
    to ponder the previous sprint and see if there are any process improvements that
    can be made. Scrum is a project management methodology and is typically silent
    on development processes. Despite this, Scrum teams typically use many of the
    practices described above in the XP practices section. Common code ownership,
    pair programming, small releases, simple design, test-driven development, continuous
    integration and coding standards are all common practices in Scrum projects.


