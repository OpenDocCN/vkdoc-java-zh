- fmt: '### The Post-Mortem


    Most development teams will do a post-mortem after every project. A post-mortem
    is an opportunity to reflect on the project just completed and answer a few questions.
    Typically, the questions will be like the following:


    - What went right? Did our process work the way we anticipated? Did we meet our
    schedule? Did we implement all the features required by the customer?

    - What went wrong? Why did we have so many defects? Why did we need to work 60-hour
    weeks for the last month of the project?

    - What process issues came up? Did we follow our process? If not, what parts were
    problematic?

    - What do we need to fix for next time? Given questions 1, 2, and 3, what do we
    need to fix in our process, work habits, or environment for the next project?

    - Who is responsible for the fixes? Someone has to be responsible for the changes
    to our process; who is it? (Don''t make it a manager; the development team should
    own the process.)


    ### Conclusion


    So where do we end up? We''ve gone through the general parts of managing projects
    and presented some alternative ways of doing project management. The most important
    parts are the developers should own the process and management should be supportive
    and listen to the developers – particularly where schedules and estimates are
    concerned – and be the buffer between the developers and the world. If you can
    work in an organization where those things are true, be a happy camper, because
    you''ll be able to write great code.


    ## C H A P T E R 4


    ## Requirements


    > *The hardest single part of building a software system is deciding what to build.
    No other part of the conceptual work is as difficult in establishing the detailed
    technical requirements, including the interfaces to people, to machines, and to
    other software systems. No other part of the work so cripples the results if done
    wrong. No other part is more difficult to rectify later. Therefore, the most important
    function that the software builder performs for the client is the iterative extraction
    and refinement of the product requirements.*

    >

    > —Fred Brooks^([1](#Chapter04.html#CHP-04-FN-1))


    Before you start coding – yes, *before* you start coding – you need to know what
    it is you''re going to build. That''s what requirements are: a list of stuff you
    have to implement in order to create your terrific program. Most developers hate
    requirements. Really, all we''d like to do is sit down and start coding. All of
    us have that super-programmer mentality; just give me the problem and I can sit
    down and design and code it on the fly. Not! If you want to be a productive developer
    and make fewer errors and come up with a good, clean design, you need requirements
    – the more detailed the better. A good set of requirements tells you just what
    the program is supposed to do. It gives you the scaffolding around which you''ll
    hang your design. You''ll do requirements anyway – it''s one of those steps in
    a standard development lifecycle that you can''t avoid, but if you don''t make
    room for it in your project, you''ll create a program that is pretty crappy. Being
    intentional about requirements forces you to think about the details of the program,
    and it also lets you listen to the users so you have a better idea of what they
    really want. So let''s talk about requirements.


    ### What Types of Requirements Are We Talking About Here?


    We''re really talking about *functional requirements*. That is, the list of features
    the user will see and be able to use when they fire up your program. These are
    the “black box” requirements that show the external behavior of your program.
    They will certainly lead to lower-level requirements that talk more about *how*
    your program works, rather than *what* it does. The output of this process of
    identifying requirements is a *functional specification* of what the software
    system is supposed to do.


    ____________________________


    ¹ Brooks, F. P. *The Mythical Man-Month : Essays on Software Engineering, Silver
    Anniversary Edition*. (Boston, MA: Addison-Wesley, 1995.)


    ### Functional Specification?


    A functional specification describes what the program will do entirely from the
    user''s perspective. It doesn''t care how the software is implemented. It talks
    about the features of the program and specifies screens, menus, dialogs, and the
    like. Think of it as a badly written user manual. A second kind of spec can be
    called a *technical specification*. The technical specification describes the
    internal implementation details of the program. That is, it talks about data structures,
    algorithms used, database models, choice of programming language, and so on. We''re
    not going to talk about technical specs in this chapter, just functional specs.


    “Wait,” you say. “What about all those agile methodologies we talked about in
    [Chapter 2](#Chapter02.html#ch2)? *They* don''t write functional specs. So there!
    I''m off the hook.” Well, in fact, agile methodologies *do* write functional specifications.
    They''re just in a different format from the 300-page single-spaced requirements
    document that some plan-driven methodologies require. XP requires that together
    with the customer representative you write *user stories* that lay out what the
    program will do. That''s a spec. The important part and the idea behind this entire
    chapter is to *write down what your program is supposed to do before you start
    coding*.


    ### But I Don''t Like Writing!


    A standard argument made by software developers is that they can''t write. Nonsense!
    Everyone can learn to write functional specs. But writing is work. You have to
    get in there and practice writing before you''ll be any good at it. If you''re
    still in school (be it undergrad or graduate school), take a course in writing,
    one where you''ve got to write essays or journal entries or stories or poetry
    every single week. You should also have to read other works critically; reading
    other people''s writing, whether good or bad, is a great way to learn how to write
    better.


    ### That Natural Language Thing


    Functional specifications should always be written in a natural language. Why?
    Well, it''s the Sapir-Whorf linguistic relativity hypothesis, don''t you know?^([2](#Chapter04.html#CHP-04-FN-2))
    In a nutshell, language not only determines what you *do* say, it determines what
    you *can* say (and think). That is, the language you use determines what kinds
    of thoughts you are able to have, and thus what you can think about and how you
    express your thoughts. If the language doesn''t have room for certain kinds of
    thoughts, you are much less likely to think them. Natural languages are much more
    expressive and varied than programming languages, so you want to do your designs
    in natural languages and save the programming languages for implementation later.
    Whether you believe the Sapir-Whorf hypothesis or not, it''s nearly always a good
    idea to develop your functional specification in a natural language so you don''t
    get bogged down in the syntactic and semantic details of a programming language
    before you need to. This doesn''t mean that you can''t think about implementation
    while you''re doing the functional specification (you will, trust me), but just
    shunt those thoughts over into a “technical note” sidebar of your specification.^([3](#Chapter04.html#CHP-04-FN-3))
    You might also look at Kenneth Iverson''s Turing Award lecture, “Notation as a
    Tool of Thought,” for a similar discussion.^([4](#Chapter04.html#CHP-04-FN-4))


    ____________________________


    ² [http://en.wikipedia.org/wiki/Linguistic_relativityretrieved](http://en.wikipedia.org/wiki/Linguistic_relativityretrieved),
    September 15, 2009.'
