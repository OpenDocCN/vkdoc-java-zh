    protects you.^([7](#Chapter10.html#CH-10-FN-7)) Let''s show a bit of how delegation
    works with an example.


    When last we left Alice and Bob and their B⁴++, Alice was tired of using the remote
    to open and close the feeding doors to keep away the non-song birds. So they’d
    requested yet another new feature – an automatic song identifier. With the song
    identifier the B⁴++ itself would recognize songbird songs and open the doors,
    and keep them closed for all other birds. We can think of this in a couple of
    ways.


    The `BirdFeeder` class, because of the Single Responsibility Principle, shouldn’t
    do the identification of bird songs, but it should know what songs are allowed.
    We’ll need a new class, `SongIdentifier`, that will do the actual song identification.
    We’ll also need a `Song` object that contains a birdsong. [Figure 10-9](#Chapter10.html#fig_10_9)
