- fmt: '### Outline of a Functional Specification


    Every functional specification is different, just as every software development
    project is different. So take this outline with a grain of salt and just use the
    parts that apply to your project. Lots of the ideas here are from.^([5](#Chapter04.html#CHP-04-FN-5))
    Every function specification should have the elements discussed in the following
    sections.


    ### Overview


    This is your executive summary. A paragraph or at most two of what the program
    is supposed to do. “This program runs your microwave oven. It interfaces to a
    keypad and an LCD display that provides user input and output functionality. Its
    functions are limited to those that a standard microwave would have, with the
    addition of single buttons for pizza and coffee reheating. It also will run a
    time of day clock and a standalone countdown timer. It doesn''t control the light.
    It has a safety interlock that will prevent the microwave from starting if the
    door is open.”


    ### Disclaimer


    You should always put it a statement right at the beginning that “This specification
    isn''t done yet. If you think something is missing or wrong, just sent me an email.”
    That helps keep all the marketing guys off your back and lets you file new feature
    requests in your mail trash bin. Lots of people will put a big, black `DRAFT`
    in the header or footer of the document. That can work as well, but folks tend
    to ignore it. Some people will use a big `DRAFT` watermark on their specs, so
    that every page has the word embedded behind the text. This doesn''t stop people
    from yelling at you either. At some point your disclaimer should change to something
    like “This specification is as complete as it will be for this release. If you
    think something is missing or wrong, just sent an email to the author and we''ll
    consider it for the next release.”


    ### Author''s Name


    Somebody needs to be responsible for the functional specification. Not a committee,
    not the development team, *one person*. This is usually either the development
    manager, the project manager, or the chief architect, depending on how your company
    sets up development projects. There are pros and cons to all the different organizational
    arrangements.


    If the development manager (the person to whom the developers report) is in charge
    of the functional spec, then that person is usually up to speed on all the technical
    aspects of the project. That''s good. On the other hand, if your boss writes the
    functional spec, it might be harder to tell her that there''s something wrong
    with the specification, or that you don''t agree with the design. Also, development
    managers were probably developers at one time and so they may not have the people
    skills (read: charm and schmoozing skills) necessary to talk to marketing, the
    customer, documentation, testing, and so on.


    ____________________________


    ³ Spolsky, J., *Joel on Software*. (Berkeley, CA: Apress, 2004.)


    ⁴ Iverson, K. E. “Notation as a Tool of Thought.” *Communications of the ACM*
    23(8): 444–465\. (1980.)


    ⁵ Spolsky, 2004.


    If your company uses project managers that are in charge of the specification,
    design, and schedule, but don''t have developers directly reporting to them, then
    you run the risk of getting someone that isn''t as technically astute as a former
    developer. On the other hand, these folks can usually charm the socks off the
    other teams, so negotiations are a lot smoother. Project managers need to have
    some technical skills and to be very good at getting all the stakeholders to reach
    consensus on the contents of the functional specification.


    The chief architect model is like the project manager model except that the architect
    is a developer and so is more technically competent and is usually in charge of
    the functional specification and all the program design issues. This is like the
    chief programmer model in Brooks'' *The Mythical Man-Month*. Someone else is in
    charge of interfacing with the other teams, the schedule, and doing all that people-interaction
    stuff. This can be good if the architect is disciplined and doesn''t let any requirements
    creep get in the way of a good design.


    ### Scenarios of Typical Usage


    A great way to get customers to respond to your requirements list is to present
    several scenarios of typical usage of the program to them as part of the specification.
    This has a couple of advantages.


    *   First, if you write the scenarios as if they''re user stories, the customer
    is more likely to read them.

    *   Second, customers are more likely to understand what you''re doing and come
    up with ideas for things you''ve missed or gotten wrong. This is always a good
    thing, because the more customer input you get early in the process, the more
    likely you''ll actually create something they want.


    In many agile methodologies, including XP, user stories are often written like
    scenarios. And in XP, the customer is part of the project team, so you get constant
    feedback on user stories and daily program builds. In the Unified Modeling Language
    (UML, see [www.uml.org](http://www.uml.org)), there is an entire notation used
    to create use cases (another word for scenarios). But as we discussed above, nothing
    beats natural language for describing usage scenarios. We''ll come back to use
    cases later, in [Chapter 8](#Chapter08.html#ch8).


    ### Detailed Screen-By-Screen Specifications


    Once you''ve written a couple of scenarios, you will have a much better idea of
    how your program will flow, and what screens, dialog boxes, menus, and so on you''ll
    need. This lets you go through each one of those screens and flesh out the details
    of how they''re laid out, what buttons, text boxes, icons, graphics, and so on
    they''ll have, and what other screens they connect to. Use pictures! A picture
    of a screen or a dialog box is worth way more than a thousand words. It gives
    the reader something to react to and it gets them thinking about program flow
    and user interface issues. Don''t expect anyone to read these except for the developers
    who will implement them and the tech writers who will write the user manual (that
    no one will read).


    ### Non-requirements


    This may be the most important section of the functional specification. This tells
    the world what you''re *not* going to do. Really, you need to put this in because
    after laying out what the program will do, the most important thing the functional
    specification does is *manage expectations*. One of the worst phrases a customer
    can utter at that final demo before you release is, “But I thought it was going
    to do ....” You need to tell all the stakeholders in a project what the program
    is going to do and also what it''s not going to do. “This microwave software will
    not balance your checkbook.” Well, okay, that''s a little over the top, but you
    do need to let them know that there are requirements that won''t be implemented
    – at least not in the current release. “Only one countdown timer may run at a
    time.” “There will not be a defrost cycle that allows defrost modes to be selected
    by food type.” It''s likely that your customer won''t read this section, but at
    least you can point to it when they ask.


    ### Open Issues


    When you first write the functional specification, there will be one or two (thousand)
    things you don''t know. That''s okay. Just put them in the “Open Issues” section.
    Then every time you meet with the customer, point to this section and try to get
    answers. Some of these questions will move to requirements sections and some will
    end up in the “Non-requirements” section, after you get those answers. By the
    end of the project, though, this section should be empty. If it''s not, well,
    you''ve got issues that will haunt you.'
