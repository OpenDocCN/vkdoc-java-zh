    It turns out there are other ways to share the behavior and attributes of other
    classes. The three most common are delegation, composition, and aggregation.


    *Delegation* – it’s what every manager should do. Give away work and let someone
    else do it. If you want to use the behaviors in another class but you don’t want
    to change that behavior consider using delegation instead of inheritance. Delegation
    says to give responsibility for the behavior to another class; this creates an
    association between the classes. Association in this sense means that the classes
    are related to each other, usually through an attribute or a set of related methods.
