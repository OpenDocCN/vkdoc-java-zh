    最后，某些迭代器允许您在迭代器运行时在集合中插入和删除元素。这些迭代器被称为*健壮迭代器*。Java 的 *`ListIterator`* 接口（而非 *Iterator*）允许在有限制的情况下进行插入（通过
    *`add()`* 方法）和删除（通过 *`remove()`* 方法）。*`add()`* 方法仅将元素添加到紧邻 *`next()`* 将返回的下一个元素之前的位置，或紧邻
    *`previous()`* 方法调用将返回的下一个元素之后的位置。*`remove()`* 方法只能在连续的 *next()* 或 *previous()*
    方法调用之间调用，不能连续调用两次，并且绝不能紧跟在 *add()* 方法调用之后。


    ##### 观察者模式


    我喜欢 NPR 的《全民话题：科学星期五》广播节目（[`http://sciencefriday.com`](http://sciencefriday.com)）。但我几乎无法在节目播出时收听，因为它在美国东部时间周五下午
    2:00 到 4:00 播出，而我需要工作（偷笑），所以无法收听。但我订阅了播客，因此每周六早上我都会收到一期新的《科学星期五》播客，这样我就可以在修剪草坪时用
    iPod 收听。如果我对《科学星期五》感到厌倦，只需取消订阅，就不会再收到新的播客了。女士们先生们，这就是*观察者模式*。


    根据“四人帮”的定义，观察者模式“……定义了对象之间的一对多依赖关系，这样当一个对象改变状态时，其所有依赖者都会收到通知并自动更新。”^(10) 因此，在我的《科学星期五》例子中，NPR
    是《科学星期五》播客的“发布者”，而我们所有“订阅”（或注册）该播客的人都是观察者。我们等待 *SciFri* 状态发生变化（创建新的播客），然后由发布者自动更新我们。更新的方式区分了两种不同类型的观察者——推模式和拉模式。在*推模式观察者*中，发布者（在面向对象术语中也称为主题）改变状态，然后将新状态*推送*给所有观察者。在*拉模式观察者*中，主题改变状态，但直到观察者请求时才提供完整更新——他们从主题*拉取*更新。在*拉*模式的一种变体中，主题可能会向所有观察者提供最小更新，通知他们状态已更改，但观察者仍需请求新状态的详细信息。


    因此，对于观察者模式，我们需要一个主题接口，以便主题、观察者和客户端都能知道他们正在使用的状态接口。我们还需要一个观察者接口，仅用于告知如何更新观察者。我们的发布者将实现主题接口，而不同的“监听器”将实现观察者接口。图
    11-6 是此模式的 UML 图。


    ![images](img/1106.jpg)


    ***图 11-6.** 经典观察者模式*


    客户端类缺失，但它将同时使用 `ConcreteSubject` 和 `ConcreteObserver` 类。以下是所有这些类的*推模式*版本的简单实现。请记住，这是*推模式*，因为
    *`ConcreteSubject`* 对象会通知所有 *观察者*，无论他们是否请求。


    首先，是 `Subject` 接口，它定义了如何注册、移除和通知观察者。


    `public interface Subject`

    `{`

    `    public void addObserver(Observer obs);`

    `    public void removeObserver(Observer obs);`

    `    public void notifyAllObservers();`

    `}`


    接下来，是 `Subject` 接口的实现。这个类是真正的发布者，因此它还需要构成 `Subject` 状态的属性。在这个简单版本中，我们使用一个 *`ArrayList`*
    来保存所有观察者。


    ___________________


    ¹⁰ Gamma 等人，1995 年。


    `import java.util.ArrayList;`


    `public class ConcreteSubject implements Subject`


    `    private ArrayList<Observer> observerList;`

    `        // 这两个变量是我们的状态`

    `    private int foo;`

    `    private String bar;`


    `    public ConcreteSubject() {`

    `        observerList = new ArrayList<Observer>();`

    `        this.foo = 0;`

    `        this.bar = "Hello";`

    `    }`


    `    public void addObserver(Observer obs) {`

    `        observerList.add(obs);`

    `    }`


    `    public void removeObserver(Observer obs) {`

    `        observerList.remove(obs);`

    `    }`


    `    public void notifyAllObservers() {`

    `        for (Observer obs: observerList) {`

    `            obs.update(this.foo, this.bar);`

    `           }`

    `    }`


    `    public void setState(int foo, String bar) {`

    `        this.foo = foo;`

    `        this.bar = bar;`

    `        notifyAllObservers();`

    `    }`

    `}`

