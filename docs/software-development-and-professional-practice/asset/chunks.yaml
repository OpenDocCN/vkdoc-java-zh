    \ elements, responds to queries about its state, and responds to instructions\
    \ to change state. The model knows what the application is supposed to do and\
    \ is the main computational structure of the architecture – it *models* the problem\
    \ you're trying to solve.\n*   The *view* or *viewport* manages a rectangular\
    \ area of the display and is responsible for presenting data to the user through\
    \ a combination of graphics and text. The view doesn't know anything about what\
    \ the program is actually doing; all it does is take instructions from the controller\
    \ and data from the model and displays them. It communicates back to the model\
    \ and controller to report status.\n\nThe flow of an MVC program typically looks\
    \ like this:\n\n> 1.  The *user* interacts with the user interface (e.g., the\
    \ user presses a button) and the controller handles the input event from the user\
    \ interface, often via a registered handler or callback. The user interface is\
    \ displayed by the view but controlled by the controller. Oddly enough, the controller\
    \ has no direct knowledge of the view as an object; it just sends messages when\
    \ it needs something on the screen updated.\n> 2.  The *controller* accesses the\
    \ model, possibly updating it in a way appropriate to the user's action (e.g.,\
    \ controller causes the user's shopping cart to be updated by the model). This\
    \ usually causes a change in the model's state as well as in its data.\n> 3. \
    \ A *view* uses the model to generate an appropriate user interface (e.g., view\
    \ produces a screen listing the shopping cart contents). The view gets its own\
    \ data from the model. The model has no direct knowledge of the view. It just\
    \ responds to requests for data from whomever and to requests for transforming\
    \ data from the controller.\n> 4.  The controller, as the user interface manager,\
    \ waits for further user interactions, which begins the cycle anew.\n\nThe main\
    \ idea here is separation of concerns – and code. The objective is to separate\
    \ how your program works from what it is displaying and how it gets its input\
    \ data. This is classic object-oriented programming; create objects that hide\
    \ their data and hide how they manipulate their data and then just present a simple\
    \ interface to the world to interact with other objects. We'll see this again\
    \ in [Chapter 9](#Chapter09.html#ch9).\n\n### An MVC Example: Let's Hunt!\n\n\
    A classic example of a program that uses the MVC architectural pattern is the\
    \ Nifty Assignment presented by Dr. David Matuszek at the 2004 SIGCSE Technical\
    \ Symposium.^([4](#Chapter05.html#CHP-05-FN-4))"
  trans: "\n### 管道-过滤器架构\n\n在管道-过滤器架构风格中，计算组件被称为*过滤器*，它们充当转换器，接收输入，根据一个或多个算法对其进行转换，然后将结果输出到通信管道。输入和输出管道被称为*管道*。\n\
    \n典型的管道-过滤器架构是线性的，如图 5-1 所示。\n\n![images](img/0501.jpg)\n\n***图 5-1.** 管道-过滤器架构*\n\
    \n过滤器必须是独立的组件。这正是管道-过滤器架构的优点之一。你可以通过不同的排列组合来连接集合中的不同过滤器，从而获得不同的结果。管道-过滤器架构风格的经典示例是\
    \ Unix shell，其中有大量通常只做一件事的小程序，并且可以通过 Unix 管道机制将它们串联在一起。下面是一个展示管道-过滤器如何工作的示例。这个问题来自\
    \ Jon Bentley 的著作 *编程珠玑*。^(3)\n\n_______________________\n\n³ Bentley, J. *编程珠玑（第二版）*。（波士顿，马萨诸塞州：Addison-Wesley，2000\
    \ 年。）\n\n> *问题*：给定一个英语单词词典，找出词典中所有的变位词。也就是说，找出所有互为排列的单词。例如，“pots”、“stop”和“spot”互为变位词。\n\
    \n那么我们知道些什么？首先，所有变位词都包含相同的字母，并且每个单词的字母数量相同。这为我们提供了寻找变位词的方法线索。想到了吗？别担心，我等你。\n\n\
    没错！如果你对每个单词进行排序，最终会得到一个字符串，其中包含该单词的所有字母，并按字母顺序排列。我们称之为创建单词的*签名*。然后，如果你对结果列表进行排序，所有变位词最终会聚集在排序后的列表中，因为它们排序后的字母是相同的。如果你接着记录下你排序了哪些单词，就可以简化列表并创建一个新列表，例如，将每组变位词放在输出文件的同一行。这正是\
    \ Bentley 的做法。\n\n但你可能会问，这与管道-过滤器架构有什么关系？问得好。让我们再次分解这个解决方案。\n\n1.  通过对列表中的每个单词的字母进行排序，为每个单词创建一个签名；将签名和单词保持在一起。\n\
    2.  根据签名对结果列表进行排序；现在所有变位词应该都在一起了。\n3.  通过将每组变位词放在同一行来压缩列表，同时移除签名。\n\n现在看出管道-过滤器了吗？用\
    \ Unix 术语来说，它看起来像这样：\n\n`sign <dictionary.txt | sort | squash >anagrams.txt`\n\
    \n其中 `sign` 是我们用来执行步骤 1 的过滤器，输入文件是 dictionary.txt。`sign` 输出一个签名及其关联单词的列表，该列表通过管道传递给\
    \ Unix 的 `sort` 工具（我们不需要编写这个工具）。然后 `sort` 根据每行的第一个字段（这是它的默认行为）对列表进行排序，恰好这个字段就是每个单词的签名。接着它将排序后的列表输出到下一个管道。`Squash`\
    \ 从传入的管道中获取排序后的列表，并通过将所有具有相同签名的单词放在同一行来压缩它，同时消除签名。这个最终的列表通过最后一个管道（这次是 Unix I/O\
    \ 重定向）发送到输出文件 anagrams.txt。\n\n请注意，这个示例具有标准管道-过滤器架构的所有特征：对其输入数据执行转换的独立计算组件，以及将数据从一个组件的输出传输到下一个组件输入的通信管道。同时也要注意，并非所有应用程序都应使用管道-过滤器架构。例如，它对于交互式应用程序或响应事件或中断的应用程序效果不佳。这就是为什么我们要研究更多的架构风格。\n\
    \n### 面向对象架构模式\n\n20 世纪 80 年代初（实际上它始于 60 年代，但当时无人关注），面向对象分析、设计和编程的出现带来了许多架构和设计模式。我们这里只关注一种面向对象架构模式，其余讨论留到关于设计模式的章节。\n\
    \n*模型-视图-控制器*（MVC）架构模式是一种将应用程序，甚至只是应用程序界面的一部分，分解为三个部分的方法：模型、视图和控制器。MVC 最初是为了将许多程序的传统输入、处理、输出角色映射到\
    \ GUI 领域而开发的：\n\n> 输入 ![images](img/U001.jpg) 处理 ![images](img/U001.jpg) 输出\n\
    > \n> 控制器 ![images](img/U001.jpg) 模型 ![images](img/U001.jpg) 视图\n\n用户输入、外部世界的建模以及向用户提供的视觉反馈被分离，并由模型、视图和控制器*对象*处理，如图\
    \ 5-2 所示。\n\n![images](img/0502.jpg)\n\n***图 5-2.** 模型-视图-控制器架构*\n\n*   *控制器*解释来自用户的鼠标和键盘输入，并将这些用户操作映射为发送给模型和/或视口的命令，以实现相应的更改。\n\
    *   *模型*管理一个或多个数据元素，响应关于其状态的查询，并响应更改状态的指令。模型知道应用程序应该做什么，并且是架构的主要计算结构——它*建模*了你试图解决的问题。\n\
    *   *视图*或*视口*管理显示器的矩形区域，负责通过图形和文本的组合向用户呈现数据。视图对程序实际在做什么一无所知；它所做的只是接收来自控制器的指令和来自模型的数据并进行显示。它会向模型和控制器反馈状态。\n\
    \nMVC 程序的典型流程如下所示：\n\n> 1.  *用户*与用户界面交互（例如，用户按下一个按钮），控制器处理来自用户界面的输入事件，通常通过注册的处理程序或回调。用户界面由视图显示，但由控制器控制。奇怪的是，控制器并不直接知道视图是一个对象；它只是在需要更新屏幕上的某些内容时发送消息。\n\
    > 2.  *控制器*访问模型，可能以适合用户操作的方式更新它（例如，控制器使模型更新用户的购物车）。这通常会导致模型的状态及其数据发生变化。\n> 3.\
    \  *视图*使用模型生成适当的用户界面（例如，视图生成一个列出购物车内容的屏幕）。视图从模型获取自己的数据。模型不直接知道视图。它只是响应来自任何人的数据请求以及来自控制器的数据转换请求。\n\
    > 4.  控制器作为用户界面管理器，等待进一步的用户交互，从而开始新一轮循环。\n\n这里的主要思想是关注点分离——以及代码分离。目标是分离程序的工作方式、它显示的内容以及它如何获取输入数据。这是经典的面向对象编程；创建隐藏其数据以及如何操作数据的对象，然后仅向外界提供一个简单的接口以与其他对象交互。我们将在第\
    \ 9 章中再次看到这一点。\n\n### 一个 MVC 示例：让我们来狩猎！\n\n一个使用 MVC 架构模式的经典程序示例是 David Matuszek\
    \ 博士在 2004 年 SIGCSE 技术研讨会上提出的“绝妙作业”。^(4)\n"
- fmt: '### The Problem


    The program is a simple simulation of a fox and a rabbit. The fox is trying to
    find the rabbit in a grid environment, and the rabbit is trying to get away. There
    are bushes that the rabbit can hide behind and there are some restrictions on
    movement.


    [Figure 5-3](#Chapter05.html#fig_5_3) is a typical picture of the game in action.


    ![images](images/0503.jpg)


    ***Figure 5-3.** A typical fox and rabbit hunt instance*


    ⁴ Matuszek, David. “Rabbit Hunt,” SIGCSE 2004 Technical Symposium, Nifty Assignments
    Session, retrieved August 17, 2009, [`http://nifty.stanford.edu/2004/RabbitHunt/.`](http://nifty.stanford.edu/2004/RabbitHunt/.)
    (2004)


    The fox is the large dot, the rabbit is the small dot, and the bushes are the
    fat crosses.


    The objective of the programming assignment is to make the rabbit smarter so it
    can escape from the fox. We don''t really care about this; we want to look at
    how the program is organized. [Figure 5-4](#Chapter05.html#fig_5_4) shows the
    organization of the program. It''s a UML object diagram taken from the BlueJ IDE.
    The key parts of the program are the three classes, `Model`, `View`, and `Controller`.


    ![images](images/0504.jpg)


    ***Figure 5-4.** The fox and rabbit hunt class structure*


    ### Model


    The model represents the rules of the game. It does all the computation, all the
    work of deciding whose turn it is, what happens during each turn, and whether
    anyone has won. The model is strictly internal and has practically nothing to
    do with the other parts of the program.


    ### View


    The view displays what is going on. It puts an image on the screen so the user
    can see what is happening. The view is completely passive; it does not affect
    the hunt in any way, it''s just a news reporter that gives you a (partial) picture
    of what is happening inside the model.


    ### Controller


    The controller is the part of the program that displays the controls (the five
    buttons and the speed controls at the bottom of the window). It knows as little
    as possible about the model and view; it basically tells the model when to go
    and when to stop.


    ### Model


    The model part of this program is actually composed of five classes: `Model` (the
    “main” model class), `Animal`, `Rabbit`, `Fox`, and `Bush`. `Rabbit` and `Fox`
    are subclasses of `Animal` (as you can see from the solid arrows in the UML diagram).
    This is the part of the program that you really need to understand.


    The `RabbitHunt` class just creates `model`, `view`, and `controller` objects,
    and turns control over to the `controller` object. The `controller` object starts
    the `model` object, and then just waits for the user to press a button. When a
    button is pressed, a message is sent to the `model` object, which decides what
    to do.


    The `model` object


    *   places the fox, rabbit, and bushes in the field;

    *   gives the rabbit and the fox each a chance to move (one moves, then the other;
    they don''t both move at the same time);

    *   tells the view to display the result of these two moves; and

    *   determines which animal won.


    The advantages of breaking the program up into these separate parts are many.
    We can safely rewrite the GUI in the `Controller` object or the display in the
    `view` object without changing the `model`. We can make the fox and/or the rabbit
    smarter (or dumber!) without changing the GUI or the display. We can re-use the
    GUI for a different application with very little effort. The list just goes on.


    In short, MVC is your friend; use it wisely and often.


    ### The Client-Server Architectural Pattern


    Moving to a more traditional architecture we go back in time. Once upon a time
    all programs ran on big iron and your entire program ran on a single machine.
    If you were lucky enough to be using a time-shared operating system, several people
    could be using the same program – albeit usually different copies – simultaneously.
    Then came personal computers and networks. And someone had the bright idea of
    dividing the work up between that big iron and your puny desktop machine. Thus
    was born the *client-server architecture*.


    In a client-server architecture, your program is broken up into two different
    pieces that typically run on two separate computers. A server does most of the
    heavy lifting and computation; it provides services to its clients across a high-bandwidth
    network. Clients, on the other hand, mostly just handle user input, display output,
    and provide communication to the server. In short, the client program sends requests
    for services to the server program. The server program then evaluates the request,
    does whatever computation is necessary (including accessing a database, if needed)
    and responds to the client''s request with an answer. The most common example
    of a client-server architecture today is the World Wide Web.


    In the web model, your browser is the client. It presents a user interface to
    you, communicates with a web server, and renders the resulting web pages to your
    screen. The web server does a number of things. It serves web pages in HTML, but
    it also can serve as a database server, a file server, and a computational server
    – think about everything that Amazon.com does when you access that web site.


    Clients and servers don''t have to be on different computers, though. Two examples
    of programs written using a client-server architecture where both sides can reside
    on the same computer are *print spoolers* and the *X Windows graphical system*.


    In a print spooler application, the program you are running – a word processor,
    a spreadsheet program, your web browser – runs as a client that makes request
    to a printing service that is implemented as a part of the computer''s operating
    system. This service is typically known as a print spooler because it keeps a
    spool of print jobs and controls which jobs get printed and the order of their
    printing. So from your word processor, you''ll select *Print* from a menu, set
    certain attributes and often pick a printer, and then click *OK* on some dialog
    box. This sends a print request to the print spooler on your system. The print
    spooler then adds your file to a queue of print jobs that it manages, contacts
    the printer driver and makes requests for printing to occur. The difference here
    is that once you''ve clicked the OK button, your client program (the word processor)
    typically does not have any more contact with the print spooler, the print *service*
    runs unattended.


    The X Window System (see [`www.xfree86.org/`](http://www.xfree86.org/)) is a graphical
    windowing system used on all Unix and Linux based systems and also available for
    Apple Macintosh and Microsoft Windows systems as an add-on windowing system. The
    X system uses a client-server architecture where the client programs and the server
    typically both reside on the same computer. The X system server receives requests
    from client programs, processes them for the hardware that is attached to the
    current system, and provides an output service that displays the resulting data
    in bitmapped displays. Client program examples include `xterm` – a windowed terminal
    program that provides a command line interface to Unix, `xclock` – you guessed
    it – a clock, and `xdm` the X Window display manager. The X system allows hierarchical
    and overlapping windows, and provides the ability to configure menus, scroll bars,
    open and close buttons, background and foreground colors, and graphics. X can
    also manage a mouse and keyboards. These days the main use of the X system is
    as a springboard to build more sophisticated window managers, graphical environments,
    graphical widgets, and desktop management windowing systems like GNOME and KDE.'
