- fmt: 'Joel correctly emphasizes that tasks need to be fine-grained and small in
    terms of effort. Otherwise, as noted previously, your estimates will most likely
    be wildly off. He also suggests that each developer either has a separate spreadsheet,
    or, as shown here, you add an eighth column with the developer assigned to the
    task. Having all the Tasks on the same sheet makes it more crowded, but easier
    to see all the tasks at once. While not exactly “painless,” this method of keeping
    a schedule is useful for smaller projects with a fairly limited number of tasks.


    I suggest adding a ninth column to measure the *velocity* of each task. Velocity
    is a term from XP[⁵](#Chapter03.html#CHP-3-FN-5) and is defined as the estimated
    effort of a task, divided by the actual effort. In our case, we''d use the `Original
    Estimate` of the task and the `Elapsed Time`. If you overestimate your task, your
    velocity will be greater than one (your task took less time than you originally
    thought); if you underestimate, it will be less than one (the task took you longer
    than you originally thought). Ideally, your velocity should be `1.0`, but that
    hardly ever happens.


    The reason for using velocity is to give each developer and the project manager
    an idea of how accurate the developer''s estimates are and to help do a better
    job of estimating next time. Ideally, as a developer gains experience, her velocity
    will approach `1.0` on each task. Alternatively, if a developer''s velocity jumps
    around a lot (one task is `0.6`, another is `1.8`, a third is `1.2`), then a crash
    course in estimation techniques might be appropriate. In my experience, a new
    developer''s velocity will start out gyrating wildly, with most values well under
    `1.0` – the new developer is overly optimistic. But as time goes along velocities
    will settle into a range centered on `1.0`, maybe from `0.85` to `1.15`. As a
    developer gains a history, the project manager can then start to depend more on
    their estimates, and the schedules will be more accurate.


    ______________


    ⁵ Beck, K. *Extreme Programming Explained: Embrace Change.* (Boston, MA: Addison-Wesley
    2000.)


    ### Project Oversight


    Project oversight is what happens once you''ve got a schedule. Once your project
    begins, the work needs to be managed. How this happens depends on the process
    you''re using. But regardless of the process you need to manage the schedule,
    manage the developers, manage the process itself, and above all, manage your manager.


    A manager''s technique is critical to keeping a project on schedule. Fear is not
    a motivator. Appealing to professional pride is, though. If your boss doesn''t
    support you, you''re doomed.


    Without creative, supportive management, you''re doomed. If your people aren''t
    happy, you don''t have a hope. Treat your developers as humans, not resources.
    Supporting your team and keeping them insulated from distractions is your number
    one job. Remember, projects are cooperative, social events.[⁶](#Chapter03.html#CHP-3-FN-6)


    ### Status Reviews and Presentations


    Status reviews and presentations are an inescapable part of any project. The bigger
    the project, the more formal the review. Remember that reporting status doesn''t
    fix problems, and that generally upper management doesn''t like hearing about
    problems. Tough. When you give a project status report just tell ''em where your
    project is and where it''s going during the period before the next status report.
    Don''t embellish and don''t make excuses; be honest about problems and where you
    are in the schedule. Just providing good news is usually bad for your reputation;
    something will go wrong at some point, so it is best to get it out of the way
    right away. You must communicate bad news about the project as soon as possible.
    That''s the best way to mitigate the problem and get others involved in helping
    to find a solution.


    When giving a presentation, be it a status review or a technical presentation,
    make sure you know your audience. Set your presentation to the level of the audience
    and keep the purpose of your presentation in front of you and them at all times.
    PowerPoint is ubiquitous in industry so learn to use it effectively. Keep your
    PowerPoint presentations short and to the point. Avoid cramming your slides with
    lots of bullet points. Do not make your bullet points complete sentences, mostly
    because you''ll be tempted to read them. This is the kiss of death for two reasons:
    it takes too long and takes attention away from what you''re actually saying.


    It insults the audience. Surely they do know how to read?


    Your bullet points should be talking points that you can then expand upon. This
    lets your audience focus on you, the speaker, rather than the slides. When you''re
    constructing a PowerPoint presentation, use as few words as you can.


    ______________


    ⁶ Cockburn, A. “The End of Software Engineering and The Start of Economic-Cooperative
    Gaming.” *Computer Science and Information Systems* 1(1): 1 - 32\. (2004)


    ### Defects


    Inevitably, you''ll introduce defects (errors) into your program. Defects do not
    just appear; developers put them there. As a developer, your aim is twofold


    *   Introduce as few defects as possible into the code you write.

    *   Find as many of them as you can before releasing the code.


    ![images](images/square.jpg) **Note:** By the way, I''m deliberately not using
    the word *bug* here, because it sounds both inoffensive and cute. Defects are
    neither. They are errors in your code that *you* put there. See [Chapter 13](#Chapter13.html#ch13)
    for a more detailed discussion on errors.


    Despite your best efforts, though, you will release code with defects in it. It''s
    just inevitable. For a program of any size, there are just too many possible paths
    through the program (called a *combinatorial explosion*), and too many different
    ways to introduce bad data for there not to be defects. Your objective is to release
    with as few defects as possible and to make those defects ones that don''t really
    impact the product or its performance. To make this a reality, most development
    organizations have a set of defect levels they use to characterize just how bad
    a defect really is. One set of levels looks like the following:


    1.  *Fatal*: Either this defect causes the product to crash, or a fundamental
    piece of functionality doesn''t work.

    2.  *Severe*: A major piece of functionality doesn''t work, and there is no workaround
    for it that the user can perform.

    3.  *Serious*: A piece of functionality doesn''t work, but there is a workaround
    for it that the customer can perform.

    4.  *Annoying*: A minor defect or error in the documentation that may annoy the
    user, but doesn''t affect how the program works.

    5.  *New Feature Request*: This isn''t a defect, but a request for the product
    to do something new.


    Whenever you find a defect in a piece of code, you will file a defect report (to
    keep track of how many defects you''re finding, what types they are, and how severe
    they are), and you''ll characterize the defect by severity level. When the developers
    are fixing defects, they start at level 1 and work their way down.


    In nearly all organizations, no product can release with known level 1 or level
    2 defects in it. Most organizations also try their best to remove all the level
    3 defects as well.'
