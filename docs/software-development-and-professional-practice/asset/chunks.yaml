    Strings for the entire input file. One could also use a map data structure that
    uses each index word as the key and a String containing the input text line as
    the value of the map element. There are certainly other possible data structures
    to be used. Sorting can be done by any of the stable sorting algorithms and which
    algorithm to use would depend on the data structure chosen and on the expected
    size of the input text. Your sort must be stable because of the requirement that
    identical index words sort their respective lines in the same order that they
    appear in the input text file. Depending on the programming language you use and
    the data structure you choose, sorting might be done automatically for you. The
    data structure you choose will affect how the circular shifts are done and how
    the output routine does the work of formatting each output line.


    Now that we''ve got a feel for how a top-down decomposition might proceed, let''s
    move on and consider a modular decomposition.


    ##### Modular Decomposition of KWIC


    A modular decomposition of the KWIC problem can be based on information hiding
    in the sense that we will hide both data structures and design decisions. The
    modules we create will not necessarily be the sequential list we have above, but
    will be modules that can cooperate with each other and are called when needed.
    One list of modules for KWIC is:


    *   A Line module (for lines of input text)

    *   A Keyword-Line pair module

    *   A KWICIndex module to create the indexed list itself

    *   A Circular Shift module

    *   A module to format and print the output

    *   A master control module


    The Line module will use the Keyword-Line module to create a map data structure
    where each Line is a keyword and a list of lines that contain that keyword. The
    KWICIndex module will use the Line module to create the indexed list. The Circular
    Shift module will use the KWICIndex module (and recursively, the Line and Keyword-Line
    modules) and create the circularly shifted set of keyword-line pairs. Sorting
    will be taken care of internally in the KWICIndex module; ideally the index will
    be created as a sorted list and any additions to the list will maintain the ordering
    of the index. The format and print module will organize the keyword-lines so that
    the keywords are printed in all caps and centered on the output line. Finally,
    the master control module will read the input, create the KWICIndex and cause
    it to print correctly.


    The key of these modules is that one can describe the modules and their interactions
    without needing the details of how each module is implemented and how the data
    is stored. That is hidden in the module description itself. Other designs are
    also possible. For example, it might be better to subsume the circular shift operations
    inside the Line module, allowing it to store the input lines and their shifts.
    Regardless, the next step in the design is to create the interface for each module
    and to coordinate the interfaces so that each module can communicate with every
    other module regardless of the internal implementation.


    We''ll continue this discussion in way more detail in the next chapter on object-oriented
    design.'
  trans: '

    #### 示例：上下文关键词索引——为你我而设的索引


    早在 Unix 诞生之初、世界尚新之时，Unix 文档被划分为八（8）个不同的章节，整本手册以一张排列索引开头。Unix 的问题不在于命令行界面，也不在于倒置的树形文件系统结构。不，Unix
    的问题在于开发它的三个人——克尼汉、里奇和汤普森——是地球上最懒的三个家伙。我怎么知道的？证据在哪？证据几乎遍布每个 Unix 命令——`ls`、`cat`、`cp`、`mv`、`mkdir`、`ps`、`cc`、`as`、`ld`、`m4`……我还能继续列举。Unix
    拥有地球上所有操作系统中最为晦涩的命令行集。创建 Unix 命令行工具的首要规则显然是：“能用两个字符，何必用三个？”


    __________


    ⁸ 帕纳斯，1972 年。


    因此，在 Unix 文档的 8 个章节中查找任何内容都可能是一场真正的考验。排列索引应运而生。每个 Unix 手册页都以一行标题开头，其中包含命令名称和该命令功能的简短描述。例如，cat(1)
    手册页的开头是：


          cat -- 连接并打印文件


    问题是，如果我不知道命令的名称，但我知道它的功能，该怎么办？排列索引通过将描述中大部分单词（冠词被忽略）纳入索引本身来解决这个问题。这样，*cat* 既可以在“cat”下找到，也可以在“concatenate”、“print”和“files”下找到。这被称为**上下文关键词**（KWIC）索引。它工作起来非常方便。


    因此，我们的问题是：输入两个文件，第一个文件包含要忽略的单词，第二个文件包含要索引的文本行，然后为它们创建一个 KWIC 索引。例如，假设我们忽略冠词 for、the、and
    等，第二个文件内容如下：


          The Sun also Rises


          For Whom the Bell Tolls


          The Old Man and the Sea


    我们的 KWIC 索引将如下所示：


                      the sun ALSO rises

              for whom the BELL tolls

                      the old MAN and the sea

                            the OLD man and the sea

                the sun also RISES

          the old man and the SEA

                            the SUN also rises

       for whom the bell TOLLS

                            for WHOM the bell tolls


    请注意，每个关键词都采用全大写，每行输入文本会针对该行中的每个索引词出现一次，并且关键词按字母顺序排序。每行文本通过循环移位其中的单词来使其关键词可见。在出现平局（两行文本具有相同的索引词，因此应在输出中相邻出现）的情况下，文本行应按照它们在输入文本文件中出现的顺序排列。因此，我们要回答的问题是：如何创建
    KWIC 索引？我们几乎立即需要回答的第二个问题是：如何存储数据？


    ### 自顶向下分解


    我们将从使用自顶向下分解来设计问题解决方案开始。正如我们在本章前面解决八皇后问题时所见，自顶向下分解的核心在于*控制流*。我们要弄清楚如何按顺序解决问题，并在每一步都取得进展。这里假设数据与例程分开存储，并且控制流中的每个子例程都可以访问它所需的数据。另一种方法是在调用每个子例程时将数据传递给它；这可能既繁琐又耗时，因为每次将数据传递给例程时通常都需要复制数据。该问题的首次分解可能如下所示：


    1.  输入要忽略的单词和文本。

    2.  创建一个包含循环移位后文本行的数据结构，并跟踪该行中哪个单词是索引词。

    3.  按索引词对循环移位后的文本行进行排序。

    4.  格式化输出行。

    5.  输出文本。


    请注意，这五个步骤可以轻松地变成五个子例程，它们按顺序从主程序中被调用。用于输入文本的数据结构可以是每行一个字符数组、每行一个字符串，或者整个输入文件的一个字符串数组。也可以使用映射数据结构，将每个索引词作为键，将包含输入文本行的字符串作为映射元素的值。当然还有其他可能的数据结构。排序可以通过任何稳定的排序算法完成，具体使用哪种算法取决于所选的数据结构以及输入文本的预期大小。你的排序必须是稳定的，因为要求相同的索引词对应的文本行按照它们在输入文本文件中出现的顺序排序。根据你使用的编程语言和选择的数据结构，排序可能会自动为你完成。你选择的数据结构将影响循环移位如何执行，以及输出例程如何完成格式化每个输出行的工作。


    现在我们对自顶向下分解如何进行有了一个概念，让我们继续考虑模块化分解。


    ##### KWIC 的模块化分解


    KWIC 问题的模块化分解可以基于信息隐藏，即我们将隐藏数据结构与设计决策。我们创建的模块不一定是上面列出的顺序列表，而是可以相互协作并在需要时被调用的模块。KWIC
    的一个模块列表如下：


    *   一个行模块（用于输入文本行）

    *   一个关键词-行对模块

    *   一个 KWICIndex 模块，用于创建索引列表本身

    *   一个循环移位模块

    *   一个用于格式化和打印输出的模块

    *   一个主控制模块


    行模块将使用关键词-行模块来创建一个映射数据结构，其中每一行是一个关键词以及包含该关键词的行列表。KWICIndex 模块将使用行模块来创建索引列表。循环移位模块将使用
    KWICIndex 模块（并递归地使用行模块和关键词-行模块）来创建循环移位后的关键词-行对集合。排序将在 KWICIndex 模块内部处理；理想情况下，索引将作为排序列表创建，并且对列表的任何添加都将保持索引的顺序。格式化和打印模块将组织关键词-行，使得关键词以全大写形式打印并居中显示在输出行上。最后，主控制模块将读取输入，创建
    KWICIndex 并使其正确打印。


    这些模块的关键在于，可以在不需要了解每个模块如何实现以及数据如何存储的细节的情况下，描述这些模块及其交互。这些细节隐藏在模块描述本身中。其他设计也是可能的。例如，将循环移位操作归入行模块内部可能更好，使其能够存储输入行及其移位结果。无论如何，设计的下一步是为每个模块创建接口，并协调这些接口，以便每个模块无论内部实现如何，都能与其他模块通信。


    我们将在下一章关于面向对象设计的内容中，以更详细的方式继续讨论这个话题。

    '
- fmt: "### Conclusion\n\nStructured design describes a set of classic design methodologies.\
    \ These design ideas work for a large class of problems. The original structured\
    \ design idea, stepwise refinement, has you decompose the problem from the top-down,\
    \ focusing on the control flow of the solution. It also relates closely to some\
    \ of the architectures mentioned in [Chapter 5](#Chapter05.html#ch5), particularly\
    \ the main program-subroutine and pipe-and-filter architectures. Modular decomposition\
    \ is the immediate precursor to the modern object-oriented methodologies, and\
    \ introduced the ideas of encapsulation and information hiding. These ideas are\
    \ the fundamentals of your design toolbox.\n\n### Appendix: The Complete Non-Recursive\
    \ Eight-Queens Program\n\n```\n/*\n *  NQueens.java\n *  8-Queens Program\n *\
    \  A non-recursive version for a single solution\n *  jfd\n */\n\nimport java.util.*;\n\
    \npublic class NQueens\n{\n\n        static int totalcount = 0;\n        static\
    \ int row = 0;\n        static int col = 0;\n\n    /*\n     *  the queen at (row,\
    \ col) is safe,\n     *  so we have a partial solution\n     *  advance to the\
    \ next colum\n     */\n    public void advance (int[] board) {\n        board[col]\
    \ = row;\n        col++;\n        row = 0;\n    }\n\n    /*\n     *  could not\
    \ find a safe row in current col\n     *  so back up one col and move that quee\n\
    \     *  up a ro\n     */\n    public void retreat (int[] board) {\n        col--;\n\
    \        row = board[col] + 1;\n    }\n\n    /*\n     *   check to see if queen\
    \ at (row, col)  can be\n     *   attacked\n     */\n    public boolean isSafe\
    \ (int[] board) {\n        boolean safe = true;\n        totalcount++;\n     \
    \   /*\n         *  check diagonals and row for attacks\n         *  since we're\
    \ just checking partial solutions\n         *  only need to go up to current col\n\
    \         */\n        for (int i=0; i<col; i++)  {\n           if (( (board[i]\
    \ + i) == (row + col) ) ||  // up diagonal\n               ( (board[i] - i) ==\
    \ (row - col) ) ||  // down diagonal\n               (board[i]  == row) ) {\n\
    \                safe = false;\n                 }\n        }\n        return\
    \ safe;\n    }\n\n    public static void main(String args[]) {\n        int N\
    \ = 8;      // default board size\n\n        System.out.print(\"Enter the size\
    \ of the board: \");\n        Scanner stdin = new Scanner(System.in);\n      \
    \  N = stdin.nextInt();\n        System.out.println();\n\n        NQueens queen\
    \ = new NQueens();\n        /*\n         *   index into board is a column number\n\
    \         *   value stored in board is a row number\n         *   so board[2]\
    \ = 3; says put a queen on col 2, row 3\n         */\n        int[] board = new\
    \ int [N];        /*\n         *   simple algorithm to build partial solutions\n\
    \         *   for N-queens problem. Place a queen in the\n         *   next available\
    \ column, test to see if it\n         *   can be attacked. If not, then move to\
    \ the next\n         *   column. If it can be attacked, move the queen\n     \
    \    *   up a row and try again.\n         *   If we exhaust all the rows in a\
    \ column, back up\n         *   reset the previous column and try again.\n   \
    \      */\n        do {\n            while ((row < N) && (col < N))  {\n     \
    \           if (queen.isSafe(board)) {\n                    queen.advance(board);\n\
    \                } else {\n                    row++;\n                }\n   \
    \         }\n            if (row == N) {\n                queen.retreat(board);\n\
    \            }\n\n        } while ((col < N) && (col >= 0));\n\n        /* If\
    \ we've placed all N queens, we've got a solution */\n        if (col == N) {\n\
    \            for (int i = 0; i < N; i++) {\n                System.out.print(board[i]\
    \ + \" \");\n            }\n        } else {\n            System.out.println(\"\
    No solution. \");\n           }\n\n        System.out.println();\n\n        System.out.println(\"\
    after trying \" + totalcount +\n                         \" board positions.\"\
    );\n    }\n}\n```\n\n## C H A P T E R  8\n\n## Object-Oriented Analysis and Design\
    \ Design–An Overview\n\n> *Object-oriented programming is an exceptionally bad\
    \ idea, which could only have originated in California.*\n> \n> —Edsger Dijkstra\n\
    > \n> *The object has three properties, which makes it a simple, yet powerful\
    \ model building block. It has state so it can model memory. It has behavior,\
    \ so that it can model dynamic processes. And it is encapsulated, so that it can\
    \ hide complexity.*\n> \n> —Trygve Reenskaug, *Working With Objects*\n\nWell,\
    \ yes, we've all learned about the object-oriented programming paradigm before.\
    \ But it never hurts to go over some basic definitions so that we're all on the\
    \ same page for our discussion about object-oriented analysis and design.\n\n\
    First of all, objects are *things*. They have an *identity* (i.e., a name), a\
    \ *state* (i.e., a set of attributes that describes the current data stored inside\
    \ the object), and a defined set of *operations* that operate on that state. A\
    \ stack is an object, as is an Automobile, a Bank Account, a Window, or a Button\
    \ in a graphical user interface. In an object-oriented program, a set of cooperating\
    \ objects pass messages among themselves. The messages make requests of the destination\
    \ objects to invoke methods that either perform operations on their data (thus\
    \ changing the state of the object), or to report on the current state of the\
    \ object. Eventually work gets done. Objects use *encapsulation* and *information\
    \ hiding* (remember, they're different) to isolate data and operations from other\
    \ objects in the program. Shared data areas are (usually) eliminated. Objects\
    \ are members of *classes* that define attribute types and operations.\n\nClasses\
    \ are *templates* for objects. Classes can also be thought of as factories that\
    \ generate objects. So an `Automobile` class will generate instances of autos,\
    \ a `Stack` class will create a new stack object, and a `Queue` class will create\
    \ a new queue. Classes may inherit attributes and behaviors from other classes.\
    \ Classes may be arranged in a class hierarchy where one class (a *super class*\
    \ or *base class*) is a generalization of one or more other classes (*sub-classes*).\
    \ A sub-class inherits the attributes and operations from its super class and\
    \ may add new methods or attributes of its own. In this sense a sub-class is more\
    \ specific and detailed than its super class; hence, we say that a sub-class extends\
    \ a super-class. For example, a priority queue is a more specific version of a\
    \ queue; it has all the attributes and operations of a queue, but it adds the\
    \ idea that some queue elements are more important that others. In Java this feature\
    \ is called *inheritance* while in UML it's called *generalization*.[¹](#Chapter08.html#CHP-8-FN-1)\
    \ Go figure.\n\nThere are a number of advantages to inheritance. It is an *abstraction\
    \ mechanism* which may be used to classify entities. It is a *reuse mechanism*\
    \ at both the design and the programming level. The inheritance graph is a source\
    \ of organizational knowledge about domains and systems.\n\nAnd, of course, there\
    \ are problems with inheritance, as well. It makes object classes that are not\
    \ self-contained; sub-classes cannot be understood without reference to their\
    \ super classes. Inheritance introduces complexity and this is undesirable, especially\
    \ in critical systems. Inheritance also usually allows overloading of operators\
    \ (methods in Java) which can be good (polymorphism) or bad (screening useful\
    \ methods in the superclass).\n\nObject-oriented programming (OOP) has a number\
    \ of advantages, among them easier maintenance, because objects can be understood\
    \ as stand-alone entities. Objects are also appropriate as reusable components.\
    \ But, for some problems there may be no mapping from real-world objects to system\
    \ objects, meaning that OOP is not appropriate for all problems."
