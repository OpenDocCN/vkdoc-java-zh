    ### JUnit：一个测试框架


    在上一节中，我们创建了自己的测试脚手架，并将测试挂接到其中。许多开发环境都具备为你完成此操作的功能。Java 中最流行的框架之一是 JUnit 测试框架，由
    Eric Gamma 和 Kent Beck 创建（参见 [`www.junit.org`](http://www.junit.org)）。


    JUnit 是一个用于开发 Java 类单元测试的框架。它提供了一个名为 `TestCase` 的基类，你可以扩展该类来为你正在创建的类创建一系列测试。JUnit
    包含许多其他类，包括一个用于评估单个测试结果的断言库，以及几个用于运行你创建的测试的应用程序。JUnit 的一个非常好的常见问题解答位于 [`http://junit.sourceforge.net/doc/faq/faq.htm#overview_1`](http://junit.sourceforge.net/doc/faq/faq.htm#overview_1)。


    要在 JUnit 中编写测试，你必须导入框架类，然后扩展 `TestCase` 基类。一个非常简单的测试如下所示：


    `import junit.framework.TestCase;`


    `public class SimpleTest extends TestCase {`


    `        public SimpleTest(String name) {`

    `                super(name);`

    `        }`


    `        public void testSimpleTest() {`

    `                LifeUniverse lu = new LifeUniverse();`

    `                int answer = lu.ultimateQuestion();`

    `                assertEquals(42, answer);`

    `        }`

    `}`


    请注意，单参数构造函数是必需的。`assertEquals()` 方法是断言库（`junit.framework.Assert`）的方法之一，当然，它用于测试预期答案（第一个参数）是否等于实际答案（第二个参数）。还有许多其他的
    `assert*()` 方法。完整列表位于 [`http://junit.sourceforge.net/javadoc/`](http://junit.sourceforge.net/javadoc/)。


    由于 JUnit 被打包在一个 Java jar 文件中，你需要将 jar 文件的位置添加到 Java CLASSPATH 环境变量中，或者在从命令行编译测试用例时将其添加到命令行中。例如，要编译我们的简单测试用例，我们会使用以下命令：


    `% javac -classpath $JUNIT_HOME/junit.jar SimpleTest.java`


    其中 `$JUNIT_HOME` 是你安装 `junit.jar` 文件的目录。


    从命令行执行测试与编译一样简单。有两种方法可以做到这一点。第一种是使用 JUnit 预打包的运行器类之一，该类将测试类的名称作为其参数：


    `java -cp .:./junit.jar junit.textui.TestRunner SimpleTest`


