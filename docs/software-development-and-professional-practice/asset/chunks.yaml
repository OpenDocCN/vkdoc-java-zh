    `public boolean isSafe (int[ ] board) {`

    `        boolean safe = true;`

    `        for (int i = 0; i < col; i++) {`

    `                if ( ( ( board[i] + i) == (row + col) ) ||      // down diagonal
    test`

    `                        ( ( board[i] - i) == (row - col) ) ||   // up diagonal
    test`

    `                        ( board[i]  == row) )                   // row test`

    `                        safe = false;`

    `        }`

    `        return safe;`

    `}`


    Remember that, because we''re creating partial solutions by adding one queen to
    a column at a time, we only need to test the first *`col`* columns each time.


    __________


    ⁵ Dahl, O. J., E. Dijkstra, et al. (1972). *Structured Programming.* (London,
