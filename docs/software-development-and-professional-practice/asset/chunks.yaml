    ## C H A P T E R  7"
  trans: "\n*采用松耦合。使用接口和抽象类*。与模块化、信息隐藏和变更管理一样，采用松耦合将使你的设计更易于理解，并随着时间推移更易于变更。松耦合意味着你应该最小化一个类（或模块）对另一个类的依赖。这样，一个模块的变更就不会引起其他模块的变更。如果一个模块的实现被隐藏，只暴露接口，那么只要保持接口不变，你就可以替换其实现。因此，通过在模块之间使用定义良好的接口，并在面向对象设计中利用抽象类和接口来连接类，就能实现松耦合。\n\
    \n*善用你装满常见设计模式的“锦囊”*。罗伯特·格拉斯⁸将优秀的软件设计师描述为拥有“……一套庞大的标准模式”，他们随身携带这些模式并将其应用于设计中。这就是设计经验的全部意义所在：反复进行设计，并从经验中学习。在苏珊·拉默的著作《程序员在工作》⁹中，巴特勒·兰普森说道：“大多数时候，一个新程序都是对现有程序的改进、扩展、泛化或优化。真正从头开始做全新的事情是非常罕见的……”。这正是设计模式的意义所在：它们是对你已经做过的事情的描述，你可以将其应用于新的问题。瞧！\n\
    \n*遵循“唯一正确位置原则”*。在其著作《编程有方：软件设计随笔》中，P.J. 普劳格说道：“我在这里主要关注的是‘唯一正确位置原则’——对于任何非平凡的代码片段，应该只有一个正确的位置可以找到它；对于任何可能的维护性修改，也应该只有一个正确的位置来进行。”¹⁰\
    \ 你的设计应遵循“唯一正确位置原则”；这样调试和维护将变得容易得多。\n\n__________\n\n⁸ 格拉斯，R. L. 《软件创造力 2.0》。佐治亚州亚特兰大，developer.*.\
    \ (2006)\n\n⁹ 拉默斯，S. 《程序员在工作》。（华盛顿州雷德蒙德：微软出版社，1986 年。）\n\n*使用图表作为设计语言*。我是一个视觉型学习者。对我来说，一张图确实胜过千言万语。在设计和编码时，我会不断地画图，以便可视化我的程序将如何组合在一起，哪些类或模块将相互通信，哪些数据依赖于哪个函数，返回值流向何处，事件的顺序是什么。这种可视化方式可以在你的脑海中固化设计，并能指出设计中的错误或潜在复杂性。白板或纸张很便宜，尽情使用吧！\n\
    \n### 设计师与创造力\n\n不要认为设计是千篇一律的，或者可以强加正式的过程规则来批量生产软件设计。事实远非如此。虽然问题本身、问题领域和目标平台会对你的设计施加一些形式上的限制和约束，但达成设计本身的过程不必是形式化的。它本质上是一种创造性活动。比尔·柯蒂斯在\
    \ 1987 年对软件设计师进行的一项实证研究中，总结出了一个似乎是大多数设计师遵循的过程：¹¹\n\n1.  理解问题。\n2.  将问题分解为目标和对象。\n\
    3.  选择并组合方案以解决问题。\n4.  执行方案。\n5.  反思设计产品和过程。\n\n    坦率地说，这是一个相当通用的列表，并没有真正告诉我们软件设计所需的一切。然而，柯蒂斯随后深入探讨了他列表中的第\
    \ 3 点“选择并组合方案”，发现他的设计师们使用了以下步骤：\n\n6.  为提议的解决方案构建一个心智模型。\n7.  在心智中执行该模型，看它是否能解决问题——构造输入并在脑海中模拟模型。\n\
    8.  如果得到的结果不正确，则修改模型以消除错误，然后返回步骤 2 再次模拟。\n9.  当你的样本输入产生正确输出时，选择更多的输入值，返回并再次执行步骤\
    \ 2 和 3。\n10. 当你重复这个过程足够多次（凭经验你会知道何时足够）时，你就得到了一个良好的模型，可以停止了。¹²\n\n__________\n\
    \n¹⁰ 普劳格，P. J. 《编程有方：软件设计随笔》。（新泽西州恩格尔伍德克利夫斯：PTR Prentice Hall，1993 年。）\n\n¹¹ 柯蒂斯，B.，R.\
    \ 金登等。《设计过程的实证研究：第二届程序员实证研究研讨会论文集》。（德克萨斯州奥斯汀，MCC。1987 年）\n\n这种更深层次的技术清晰地揭示了设计的认知性和迭代性。我们看到，设计从根本上说是心智的功能，具有独特性，并且依赖于设计师自身那些超越过程本身的因素。\n\
    \n约翰·内斯特在给软件工程研究所的一份报告中，列出了优秀设计师的一些共同特征。\n\n优秀的设计师\n\n*   拥有大量标准模式；\n*   经历过失败的项目；\n\
    *   精通开发工具；\n*   有追求简洁的冲动；\n*   能够预见变化；\n*   能够从用户的角度看待问题；并且\n*   能够处理复杂性。¹³\n\
    \n### 结论\n\n那么在本章结束时，关于软件设计我们学到了什么？\n\n*设计是临时的、启发式的和混乱的*。它从根本上使用试错和启发式过程，而这个过程是软件设计的自然选择。有许多众所周知的启发式方法，任何优秀的设计师都应该采用。\n\
    \n*设计依赖于对先前设计问题和解决方案的理解*。设计师需要具备一些问题领域的知识。更重要的是，他们需要具备设计知识以及优秀设计的模式。他们需要拥有一个装满这些设计模式的“锦囊”，以便用于解决新问题。这些解决方案是久经考验的。问题虽然是新的，但它们包含了已被解决的问题中的元素。这些模式是可塑的模板，可以应用于新问题中与模式要求相匹配的那些元素。\n\
    \n*设计是迭代的*。需求会变化，你的设计也必须随之变化。即使你拥有一组稳定的需求，随着你在设计活动中的推进，你对需求的*理解*也会发生变化，因此你会回过头来修改设计，以反映这种更深入、更好的理解。迭代过程会在每一步中澄清和简化你的设计。\n\
    \n*设计是一种认知活动*。在这个阶段你并不是在编写代码，所以不需要机器。你的大脑，或许再加上一支铅笔和一张纸或一块白板，就是你进行设计所需的全部工具。正如戴克斯特拉所说：“我们绝不能忘记，我们的任务不是编写程序；我们的任务是设计能展现所需行为的计算类。”¹⁴\n\
    \n__________\n\n¹² 格拉斯，R. L. 《软件创造力 2.0》。（佐治亚州亚特兰大，developer.*. 2006 年）\n\n¹³\
    \ 格拉斯，R. L. (2006)\n\n*设计是机会主义的*。格拉斯总结他对设计的讨论时说道：“不受干扰的设计过程是机会主义的——也就是说，优秀的设计师并非按部就班地进行，而是遵循由他们心智决定的、不规则的路径，追求机会而非有序的进程。”¹⁵\n\
    \n以上所有特征都反对僵化的、计划驱动的设计过程，而支持一种创造性的、灵活的设计方式。这让我们回到了本章的第一个主题——设计就是“棘手”的。\n\n最后：\n\
    \n> *设计师可能会为复杂的设计苦思冥想数月。然后突然间，简单、优雅、美丽的解决方案出现在他脑海中。当这种情况发生在你身上时，感觉就像上帝在对你说话！也许他确实在说。*\n\
    > \n> ——利奥·弗兰科夫斯基（出自《穿越时空的工程师》）\n\n## 第 7 章\n"
- fmt: '# Structured Design


    > *Invest in the abstraction, not the implementation. Abstractions can survive
    the barrage of changes from different implementations and new technologies*


    —Andy Hunt and Dave Thomas[¹](#Chapter07.html#CHP-7-FN-1)


    ## Structured Programming


    *Structured design* has its genesis in Edsger Dijkstra''s famous 1968 letter to
    the *Communications of the ACM*, “Go To Statement Considered Harmful.” Dijkstra''s
    paper concludes with


    > *The `go to` statement as it stands is just too primitive; it is too much an
    invitation to make a mess of one''s program. One can regard and appreciate the
    clauses considered (ed. `if-then-else`, `switch`, `while-do`, and `do-while`)
    as bridling its use. I do not claim that the clauses mentioned are exhaustive
    in the sense that they will satisfy all needs, but whatever clauses are suggested
    (e.g. abortion clauses) they should satisfy the requirement that a programmer
    independent coordinate system can be maintained to describe the process in a helpful
    and manageable way.[²](#Chapter07.html#CHP-7-FN-2)*


    Programming languages created from this point onward, while not eliminating the
    `goto` statement (except for Java, which has none), certainly downplayed its use,
    and courses that taught programming encouraged students to avoid it. Instead,
    problem-solving was taught in a top-down structured manner, where one begins with
    the problem statement and attempts to break the problem down into a set of solvable
    sub-problems. The process continues until each sub-problem is small enough to
    be either trivial or very easy to solve. This technique is called *structured
    programming*. Before the advent and acceptance of object-oriented programming
    in the mid-80s, this was the standard approach to problem solving and programming.
    It is still one of the best ways to approach a large class of problems.


    __________


    ¹ Hunt, A. and D. Thomas. *The Pragmatic Programmer: From Journeyman to Master.*
    (Boston, MA: Addison-Wesley, 2000.)


    ² Dijkstra, E. “GoTo Statement Considered Harmful.” Communications of the ACM
    11(3): 147-148\. (1968)


    ## Stepwise Refinement


    Niklaus Wirth formalized the technique in his 1971 paper, “Program Development
    by Stepwise Refinement.”[³](#Chapter07.html#CHP-7-FN-3) *Stepwise refinement*
    contends that designing programs consists of a set of refinement steps. In each
    step, a given task is broken up into a number of subtasks. Each refinement of
    a task must be accompanied by a refinement of the data description and the interface.
    The degree of modularity obtained will determine the ease or difficulty with which
    a program can be adapted to changes in requirements or environment.


    During refinement, you use a notation that is natural to the problem space. Avoid
    using a programming language for description as long as possible. Each refinement
    implies a number of design decisions based on a set of design criteria. These
    criteria include efficiency of time and space, clarity, and regularity of structure
    (simplicity).


    Refinement can proceed in two ways, top-down or bottom-up. Top-down refinement
    is characterized by moving from a general description of the problem to detailed
    statements of what individual modules or routines do. The guiding principle behind
    stepwise refinement is that humans can concentrate on only a few things at a time;
    Miller''s famous 7 +/− 2 chunks of data rule.[⁴](#Chapter07.html#CHP-7-FN-4) One
    works by


    *   analyzing the problem and trying to identify the outlines of a solution and
    the pros and cons of each possibility;

    *   then, designing the top levels first;

    *   steering clear of language-specific details;

    *   pushing down the details until you get to the lower levels;

    *   formalizing each level;

    *   verifying each level; and

    *   moving to the next lower level to make the next set of refinements. (That
    is, repeat.)


    One continues to refine the solution until it seems as if it would be easier to
    code than to decompose; we''ll see an example of this process later in this chapter.


    That is, you work until you become impatient at how obvious and easy the design
    becomes. The down-side here is that you really have no good metric on “when to
    stop.” It just takes practice.


    If you can''t get started at the top, then start at the bottom.


    *   Ask yourself, “What do I know that the system needs to do?” This usually involves
    lower level I/O operations, other low-level operations on data structures, and
    so on.

    *   Identify as many low-level functions and components as you can from that question.

    *   Identify common aspects of the low-level components and group them together.

    *   Continue with the next level up, or go back to the top and try again to work
    down.


    __________


    ³ Wirth, N. “Program Development by Stepwise Refinement.” CACM 14(4): 221-227\.
    (1971)


    ⁴ Miller, G. A. “The magical number seven, plus or minus two: Some limits on our
    capacity for processing information.” *Psychological Review* 63: 81-97\. (1956)


    Bottom-up assessment usually results in early identification of utility routines,
    which can lead to a more compact design. It also helps promote reuse – because
    you are reusing the lower level routines. On the downside, bottom-up assessment
    is hard to use exclusively – you nearly always end up switching to a top down
    approach at some point, sometimes you find you just can''t put a larger piece
    together from the bottom-up. This isn''t really stepwise refinement, but it can
    help get you started. Most real step-wise refinements involve alternating between
    top-down and bottom-up design elements. Fortunately, top-down and bottom-up design
    methodologies can be very complementary.


    ### Example of Stepwise Refinement: The Eight-Queens Problem


    The eight queens problem is familiar to most students. The problem is to find
    a placement of eight queens on a standard 8 × 8 chess board in such a way that
    no queen can be attacked by any other. One possible solution to the problem is
    shown in [Figure 7-1](#Chapter07.html#fig_7_1).


    ![images](images/0701.jpg)


    ***Figure 7-1.** One solution to the eight-queens problem*


    Remember that queens can move any number of spaces horizontally, vertically, or
    diagonally. It turns out that no one has yet found an analytical solution to this
    problem, and it''s likely one does not exist. So how would you approach this problem?
    Go ahead, think about it; I''ll wait.


    …


    …


    Done? Okay. Let''s see one way to decompose this problem.'
