    \ about software development is that every project is different. Even if you're\
    \ doing version 8.0 of an existing product, things change. One implication of\
    \ this is that for every project one needs to examine and pick the right set of\
    \ development tools for *this* particular project. Picking tools that are inappropriate\
    \ is like trying to hammer nails with a screwdriver; you might be able to do it\
    \ eventually, but is sure isn't easy or pretty, and you can drive a lot more nails\
    \ in a shorter period of time with a hammer than with a screwdriver. The three\
    \ most important factors in choosing tools are the application type you are writing,\
    \ the target platform, and the development platform. You usually can't do anything\
    \ about any of these three things, so once you know what they are, you can pick\
    \ tools that improve your productivity. A fourth and nearly as important factor\
    \ in tool choice is the composition and experience of the development team. If\
    \ your team are all experienced developers with facility on multiple platforms\
    \ tool choice is much easier. If, on the other hand, you have a bunch of fresh-outs\
    \ and your target platform is new to all of you, you'll need to be careful about\
    \ tool choice and fold in time for training and practice with the new tools.\n\
    > \n> *To realize that you don't know everything you need to know at the beginning\
    \ of the project*. Software development projects just don't work this way. You'll\
    \ always uncover new requirements; other requirements will be discovered to be\
    \ not nearly as important as the customer thought; still others that were targeted\
    \ for the next release are all of a sudden requirement number 1\\. Managing requirements\
    \ churn during a project is one of the single most important skills a software\
    \ developer can have. If you are using new development tools (say that new web\
    \ development framework) you'll uncover limitations you weren't aware of and side-effects\
    \ that cause you to have to learn, for example, three other tools to understand\
    \ them. (That web development tool is Python based, requires a specific relational\
    \ database system to run, and needs a particular configuration of Apache to work\
    \ correctly.)"
