- fmt: "# Unit Testing\n\n> *More than the act of testing, the act of designing tests\
    \ is one of the best bug preventers known. The thinking that must be done to create\
    \ a useful test can discover and eliminate bugs before they are coded — indeed,\
    \ test-design thinking can discover and eliminate bugs at every stage in the creation\
    \ of software, from conception to specification, to design, coding and the rest.*\n\
    > \n> —Boris Beizer\n> \n> *You can see a lot by just looking.*\n> \n> —Yogi Berra\n\
    \nAs was emphasized in the last chapter, nobody's perfect, including software\
    \ developers. In [Chapter 13](#Chapter13.html#ch13) we talked about different\
    \ things to look for when you *know* there are errors in your code. Now we're\
    \ going to talk about how to *find* those errors. Of the three types of errors\
    \ in your code, the compiler will find the syntax errors and the occasional semantic\
    \ error. In some language environments, the run-time system will find others (to\
    \ your users chagrin). The rest of the errors are found in two different ways\
    \ – testing, and code reviews and inspections. In this chapter, we'll discuss\
    \ testing, when to do it, what it is, how to do it, what your tests should cover,\
    \ and the limitations of testing. In the next chapter we'll talk about code reviews\
    \ and inspections.\n\nThere are three levels of testing in a typical software\
    \ development project: unit testing, integration testing, and system testing.\
    \ *Unit testing* is typically done by you, the developer. With unit testing, you're\
    \ testing individual methods and classes, but you're generally not testing larger\
    \ configurations of the program. You're also not usually testing interfaces or\
    \ library interactions – except those that your method might actually be using.\
    \ Because you are doing unit testing, you know how all the methods are written,\
    \ what the data is supposed to look like, what the method signatures are, and\
    \ what the return values and types should be. This is known as *white-box testing*.\
    \ It should really be called *transparent-box testing*, because the assumption\
    \ is you can see all the details of the code being tested.\n\n*Integration testing*\
    \ is normally done by a separate testing organization. This is the testing of\
    \ a collection of classes or modules that interact with each other; its purpose\
    \ is to test interfaces between modules or classes and the interactions between\
    \ the modules. Testers write their tests with knowledge of the interfaces but\
    \ not with information about *how* each module has been implemented. From that\
    \ perspective the testers are users of the interfaces. Because of this, integration\
    \ testing is sometimes called *gray-box testing*. Integration testing is done\
    \ after unit tested code is integrated into the source code base. A partial or\
    \ complete version of the product is built and tested, to find any errors in how\
    \ the new module interacts with the existing code. This type of testing is also\
    \ done when errors in a module are fixed and the module is re-integrated into\
    \ the code base.\n\n*System testing* is normally done by a separate testing organization.\
    \ This is the testing of the entire program (the system). System testing is done\
    \ on both internal baselines of the software product and on the final baseline\
    \ that is proposed for release to customers. The separate testing organization\
    \ uses the requirements and writes their own tests without knowing anything about\
    \ how the program is designed or written. This is known as *black-box testing*\
    \ because the program is opaque to the tester except for the inputs it takes and\
    \ the outputs it produces. The job of the testers at this level is to make sure\
    \ that the program implements all the requirements. Black box testing can also\
    \ include stress testing, usability testing, and acceptance testing. End users\
    \ may be involved in this type of testing.\n\n## The Problem with Testing\n\n\
    So, if we can use testing to find errors in our programs, why don't we find all\
    \ of them? After all, we wrote the program, or at least the fix or new feature\
    \ we just added, so we must understand what we just wrote. We also wrote the tests.\
    \ So why do so many errors escape into the next phase of testing or even into\
    \ users hands?\n\nWell, there are two reasons we don't find all the errors in\
    \ our code. First, we're not perfect. This seems to be a theme here. But we're\
    \ not. If we made mistakes when we wrote the code, why should we assume we won't\
    \ make some mistakes when we read it or try to test and fix it? This happens for\
    \ even small programs, but it's particularly true for larger programs. If you\
    \ have a 50,000 line program, that's a lot to read and understand and you're bound\
    \ to miss something. Also, static reading of programs won't help you find those\
    \ dynamic interactions between modules and interfaces. So we need to test more\
    \ intelligently and combine both static (code reading) and dynamic (testing) techniques\
    \ to find and fix errors in programs.\n\nThe second reason that errors escape\
    \ from one testing phase to another and ultimately to the user is that software,\
    \ more than any other product that humans manufacture, is very complex. Even small\
    \ programs have many pathways through the code and many different types of data\
    \ errors that can occur. This large number of pathways through a program is called\
    \ a *combinatorial explosion*. Every time you add an `if` statement to your program,\
    \ you double the number of possible paths through the program. Think about it;\
    \ you have one path through the code if the conditional expression in the `if`\
    \ statement is true, and a different path if the conditional expression is false.\
    \ Every time you add a new input value you increase complexity and increase the\
    \ number of possible errors. This means that, for large programs, you can't possibly\
    \ test every possible path through the program with every possible input value.\
    \ There are an exponential number of code path/data value combinations to test\
    \ every one.\n\nSo what to do? Well, if brute force won't work, then you need\
    \ a better plan. That plan is to identify those use cases that are the most probable\
    \ and test those. You need to identify the likely input data values and the boundary\
    \ conditions for data, and figure out what the likely code paths will be and test\
    \ those. That, it turns out, will get you most of the errors. Steve McConnell\
    \ says in *Code Complete* that a combination of good testing and code reviews\
    \ can uncover more than 95% of errors in a good-sized program.[¹](#Chapter14.html#CHP-14-FN-1)\
    \ That's what we need to shoot for.\n\n______________\n\n¹ McConnell, S. *Code\
    \ Complete 2: A Practical Handbook of Software Construction.* (Redmond, WA: Microsoft\
    \ Press, 2004.)"
