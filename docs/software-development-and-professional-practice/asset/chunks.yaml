    Small Teams.” *IEEE Software* 17(4): 26-32. (2000)


    ## Conclusion


    As can be seen from the methodologies described in this chapter, iteration is
    the key, whether you are using an evolutionary plan-driven process or an agile
    development one. Recognize that the best way to build a complex piece of software
    is incrementally. Learn that designing, writing, testing, and delivering incrementally
    better code is your first step to writing great software.


    # C H A P T E R 3


    # Project Management Essentials


    > *Quality, features, schedule – pick two.*


    Project management? Isn''t this a software development book?


    Yes, but working on a larger-than-one-person development project means working
    on a team; and working on a team means being managed. So learning something about
    project management from both sides is an essential part of learning software development.


    Project management is an involved and complicated set of tasks. We''ll restrict
    ourselves to several tasks that will impact you as a developer the most. They
    are the following:


    *   Project planning

    *   Estimation and scheduling

    *   Resource management

    *   Project oversight

    *   Project reviews and presentations

    *   The project post-mortem


    ## Project Planning


    Project planning is forever. By that I mean that project planning continues throughout
    the entire duration of the project. “The Plan” is never really set in stone, because
    things in a typical software project are usually in constant flux. In most projects,
    and especially in those that are using a plan-driven process model, a project
    plan is an actual document that is written by the project manager, and that is
    approved and signed off on by the development team and by upper management. It
    is, in effect, a contract, albeit a rolling one, of what the team is going to
    do and how they are going to do it. It also says how the project will be managed,
    and in the extreme plan-driven cases, even states how and when the document itself
    will be modified.


    What''s in the project plan? Generally a project plan consists of the following
    seven parts:


    *   Introduction and explanation of the project

    *   Project organization

    *   Risk analysis

    *   Hardware, software, and human resource requirements

    *   Work breakdown and task estimates

    *   Project schedule

    *   Project monitoring and reporting mechanisms, collectively known as project
    oversight


    Not all of these are necessary for all projects or project methodologies. In particular,
    plan-driven projects will use all of them, while agile projects may use a few
    on a single page.


    Project plans are a great tool for setting down what you think you''re doing,
    an outline of how it will be done, and how you plan on executing the outline.
    The problem with a project plan is that it''s static. Once it''s written and signed
    off on, upper management thinks the project will run exactly as stated in the
    plan. But the reality of the project often thwarts the plan.


    ## Project Organization


    The project organization section of the plan contains the following three things:


    *   How you''re going to organize the team

    *   What process model the project will be using

    *   How will the project be run on a day-to-day basis


    If you''re working with an experienced team, all this is already known to everyone,
    so your project organization section can be, “We''ll do what we usually do.” However,
    this section is a necessity for brand-new projects and inexperienced teams, because
    the organization section gives you something to hang your hat on when you start
    the actual project work.


    ## Risk Analysis


    In the risk analysis section, you need to think about the bad things.[¹](#Chapter03.html#CHP-3-FN-1)
    What can possibly go wrong with this project? What is the worst that could happen?
    What will we do if it does?


    Some risks to watch out for are:


    ______________


    ¹McConnell, S. *Rapid Development:* Taming Wild Software Schedules. (Redmond,
    WA: Microsoft Press, 1996.)'
