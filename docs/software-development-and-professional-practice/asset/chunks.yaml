- fmt: '假设你正在开发一款太空角色扮演游戏（RPG）《Space Rangers》。你需要在游戏中模拟飞船本身。飞船会有许多不同的特性。例如，有不同类型的飞船：穿梭机、贸易船、战斗机、货船、主力舰。每艘飞船还会有不同的特性：武器、护盾、货运容量、船员数量等等。但所有飞船有什么共同点呢？


    如果你想创建一个通用的`Ship`类，那么很难将所有这些东西都集中到一个单一的`Ship`超类中，以便你可以为`Shuttle`、`Fighter`、`Freighter`等创建子类。它们之间的差异太大了。这似乎意味着继承不是这里的最佳选择。那么回到我们的问题——所有飞船有什么共同点？


    我们可以说，《Space Rangers》中所有飞船只有两个共同点——一个飞船类型，以及一组与该飞船类型相关的属性。这引出了我们的第一个类图，如图[10-11](#Chapter10.html#fig_10_11)所示。


    ![images](images/1011.jpg)


    ***图 10-11.** 所有飞船有什么共同点？*


    这允许我们存储飞船类型以及飞船实例的各种属性映射。这意味着我们可以独立于飞船来开发属性，然后不同的飞船可以共享相似的属性。例如，所有飞船都可以有武器，但它们可以拥有不同特性的武器。这促使我们开发一个`Weapons`接口，然后我们可以用它来实现特定的类。我们通过组合的方式在`SpaceShip`中使用这些武器。请记住，组合允许我们使用一整套行为，并且可以保证这些行为不会改变。见图[10-12](#Chapter10.html#fig_10_12)。


    ![images](images/1012.jpg)


    ***图 10-12.** 使用组合让`SpaceShip`能够使用`Weapons`*


    请记住，UML图中的空心三角形表示继承（或者在接口的情况下，表示实现）。UML中的实心菱形表示组合。因此，在这个设计中，我们可以向属性`Map`中添加多种武器，每种武器可以有不同的特性，但它们都表现出相同的行为。*组合*是不是很强大？


    你还应该注意，在组合中，组件对象（`Weapons`）成为更大对象（`SpaceShip`）的一部分，当更大对象消失时（你被击毁），组件也会随之消失。由其他行为组成的对象拥有这些行为。当该对象被销毁时，它的所有行为也会被销毁。组合中的行为在组合本身之外不存在。当你的`SpaceShip`被击毁时，你所有的武器也会被摧毁。


    当然，有时你希望以这样一种方式组合一组对象和行为，即当其中一个被移除时，其他对象仍然存在。这就是*聚合*的意义所在。如果行为需要持久存在，那么你必须使用聚合。聚合是指一个类被用作另一个类的一部分，但仍然存在于该类之外。如果该对象独立存在是有意义的，那么使用聚合，否则使用组合。例如，图书馆是聚合的一个例子。每本书本身都是有意义的，但它们的聚合构成了一个图书馆。关键在于展示一个实例，在该实例中，在组合之外使用一个组件是有意义的，这意味着它应该有一个独立的存在。


    在《Space Rangers》中，除了`SpaceShip`对象之外，我们还可以有`Pilot`对象。`Pilot`也可以携带武器。当然，是不同的武器；`Pilot`可能不会携带`Cannon`对象！假设一个`Pilot`随身携带了一个`HandBlaster`，那么用面向对象的话来说，他正在使用`HandBlaster`的行为。如果这个`Pilot`意外地被一头疯狂的`SpaceCow`压死，武器会随着`Pilot`一起被摧毁吗？很可能不会，因此需要一种机制，使得`HandBlaster`可以被`Pilot`使用，但同时又独立于`Pilot`类存在。嗒哒！这就是聚合！


    因此，我们看到了三种不同的机制，允许对象使用其他对象的行为，而这些机制都不需要继承。正如OOA&D中所说：“如果你倾向于使用委托、组合和聚合而不是继承，那么你的软件通常会更加灵活，并且更容易维护、扩展和重用。”^([8](#Chapter10.html#CH-10-FN-8))'
  raw: 'Say that you’re putting together a space-based role playing game (RPG), *Space
    Rangers*. One of the things you’ll model in your game is the spaceships themselves.
    Spaceships will have lots of different characteristics. For example, there are
    different types of ships, shuttles, traders, fighters, freighters, capital ships.
    Each ship will also have different characteristics, weapons, shields, cargo capacity,
    number of crew, and so on. But what will all the ships have in common?


    Well, if you want to create a generic `Ship` class, it will be hard to gather
    all these things together in a single `Ship` superclass so you can create subclasses
    for things like `Shuttle`, `Fighter`, `Freighter`, and the like. They are all
    just too different. This seems to imply that inheritance isn’t the way to go here.
    So back to our question – what do all the ships have in common?


    We can say that all the Ships in Space Rangers have just two things in common
    – a ship type, and a set of properties that relate to that ship type. This gets
    us to our first class diagram, shown in [Figure 10-11](#Chapter10.html#fig_10_11).


    ![images](images/1011.jpg)


    ***Figure 10-11.** What do all Spaceships have in common?*


    This allows us to store the space ship type and a map of the various properties
    for an instance of a ship. It means we can then develop the properties independently
    from the ships and then different ships can share similar properties. For example,
    all ships can have weapons, but they can have different ones with different characteristics.
    This leads us to develop a weapons interface that we can then use to implement
    particular classes. We get to use these weapons in our `SpaceShip` by using composition.
    Remember that composition allows us to use an entire family of behaviors that
    we can be guaranteed won’t change. See [Figure 10-12](#Chapter10.html#fig_10_12).


    ![images](images/1012.jpg)


    ***Figure 10-12.** Using composition to allow the SpaceShip to use Weapons*


    Remember that the open triangle in the UML diagram means inheritance (or in the
    case of an interface, it means implements). The closed diamond in UML means composition.
    So in this design we can add several weapons to our properties Map and each weapon
    can have different characteristics, but all of them exhibit the same behavior.
    Isn’t *composition* grand?


    You should also note that in composition the component objects (`Weapons`) become
    part of a larger object (`SpaceShip`) and when the larger object goes away (you
    get blown up), so do the components. The object that is composed of other behaviors
    owns those behaviors. When that object is destroyed, so are all of its behaviors.
    The behaviors in a composition don’t exist outside of the composition itself.
    When your `SpaceShip` is blown up, so are all your weapons.


    Of course, sometimes you want to put together a set of objects and behaviors in
    such a way that when one of them is removed, the others continue in existence.
    That’s what *aggregation* is all about. If the behaviors need to persist, then
    you must aggregate. Aggregation is when one class is used as a part of another
    class, but still exists outside of that other class. If the object does make sense
    existing on its own, then use aggregation, otherwise use composition. For example,
    a library is an example of aggregation. Each book makes sense on its own, but
    the aggregation of them all is a library. The key is to show an instance where
    it makes sense to use a component outside a composition implying that it should
    have a separate existence.


    In *Space Rangers,* we can have `Pilot` objects in addition to `SpaceShip` objects.
    A `Pilot` can also carry weapons. Different ones, of course; `Pilots` probably
    don’t carry `Cannon` objects with them! Say a `Pilot` is carrying around a `HandBlaster`,
    so in object-oriented speak he’s using the behaviors of the `HandBlaster`. If
    the `Pilot` is accidentally crushed by a mad `SpaceCow`, is the weapon destroyed
    along with the `Pilot`? Probably not, hence the need for a mechanism where the
    `HandBlaster` can be used by a `Pilot` but has an existence outside of the `Pilot`
    class. Ta, da! Aggregation!


    So we’ve seen three different mechanisms that allow objects to use the behaviors
    of other objects, none of which require inheritance. As it’s said in OOA&D, “If
    you favor delegation, composition, and aggregation over inheritance your software
    will usually be more flexible and easier to maintain, extend and reuse.”^([8](#Chapter10.html#CH-10-FN-8))'
