- fmt: "*Use loose coupling. Use interfaces and abstract classes*. Along with modularity,\
    \ information hiding, and change, using loose coupling will make your design easier\
    \ to understand and to change as time goes along. Loose coupling says that you\
    \ should minimize the dependencies of one class (or module) on another. This is\
    \ so that a change in one module won't cause changes in other modules. If the\
    \ implementation of a module is hidden and only the interface exposed, you can\
    \ swap out implementations as long as you keep the interface constant. So you\
    \ implement loose coupling by using well-defined interfaces between modules, and\
    \ in an object-oriented design, using abstract classes and interfaces to connect\
    \ classes.\n\n*Use your knapsack full of common design patterns*. Robert Glass[⁸](#Chapter06.html#CHP-6-FN-8)\
    \ describes great software designers as having “…a large set of standard patterns”\
    \ that they carry around with them and apply to their designs. This is what design\
    \ experience is all about. Doing design over and over again and learning from\
    \ the experience. In Susan Lammer's book *Programmers at Work*,[⁹](#Chapter06.html#CHP-6-FN-9)\
    \ Butler Lampson says, “Most of the time, a new program is a refinement, extension,\
    \ generalization, or improvement of an existing program. It's really unusual to\
    \ do something that's completely new….” That's what design patterns are: they're\
    \ descriptions of things you've already done that you can apply to a new problem.\
    \ Voila!\n\n*Adhere to the Principle of One Right Place*. In his book *Programming\
    \ on Purpose: Essays on Software Design*, P.J. Plauger says, “My major concern\
    \ here is the Principle of One Right Place – there should be One Right Place to\
    \ look for any nontrivial piece of code, and One Right Place to make a likely\
    \ maintenance change.”[^(10)](#Chapter06.html#CHP-6-FN-10) Your design should\
    \ adhere to the Principle of One Right Place; debugging and maintenance will be\
    \ much easier.\n\n__________\n\n⁸ Glass, R. L. *Software Creativity 2.0.* Atlanta,\
    \ GA, developer.*. (2006)\n\n⁹ Lammers, S. *Programmers At Work.* (Redmond, WA:\
    \ Microsoft Press, 1986.)\n\n*Use diagrams as a design language*. I'm a visual\
    \ learner. For me, a picture really is worth a thousand or so words. As I design\
    \ and code I'm constantly drawing diagrams so I can visualize how my program is\
    \ going to hang together, which classes or modules will be talking to each other,\
    \ what data is dependent on what function, where do the return values go, what\
    \ is the sequence of events. This type of visualization can settle the design\
    \ in your head and it can point out errors or possible complications in the design.\
    \ Whiteboards or paper are cheap; enjoy!\n\n### Designers and Creativity\n\nDon't\
    \ think that design is cut and dried or that formal process rules can be imposed\
    \ to crank out software designs. It's not like that at all. While there are formal\
    \ restrictions and constraints on your design that are imposed by the problem,\
    \ the problem domain, and the target platform, the process of reaching the design\
    \ itself need not be formal. It is at bottom a creative activity. Bill Curtis,\
    \ in a 1987 empirical study of software designers came up with a process that\
    \ seems to be what most of the designers followed:[^(11)](#Chapter06.html#CHP-6-FN-11)\n\
    \n1.  Understand the problem.\n2.  Decompose the problem into goals and objects.\n\
    3.  Select and compose plans to solve the problem.\n4.  Implement the plans.\n\
    5.  Reflect on the design product and process.\n\nFrankly, this is a pretty general\
    \ list and doesn't really tell us all we'd need for software design. Curtis, however,\
    \ then went deeper in #3 on his list, “select and compose plans,” and found that\
    \ his designers used the following steps:\n\n6.  Build a mental model of a proposed\
    \ solution.\n7.  Mentally execute the model to see if it solves the problem –\
    \ make up input and simulate the model in your head.\n8.  If what you get is not\
    \ correct, then change the model to remove the errors and go back to step 2 to\
    \ simulate again.\n9.  When your sample input produces the correct output, select\
    \ some more input values and go back and do steps 2 and 3 again.\n10.  When you've\
    \ done this enough times (you'll know because you're experienced) then you've\
    \ got a good model and you can stop.[^(12)](#Chapter06.html#CHP-6-FN-12)\n\n__________\n\
    \n^(10) Plauger, P. J. *Programming on Purpose : Essays on Software Design.* Englewood\
    \ Cliffs, NJ: PTR Prentice Hall, 1993.)\n\n^(11) Curtis, B., R. Guindon, et al.\
    \ *Empirical Studies of the Design Process: Papers for the Second Workshop on\
    \ Empirical Studies of Programmers.* Austin, TX, MCC. (1987)\n\nThis deeper technique\
    \ makes the cognitive and the iterative aspects of design clear and obvious. We\
    \ see that design is fundamentally a function of the mind, and is idiosyncratic\
    \ and depends on things about the designer that are outside the process itself.\n\
    \nJohn Nestor, in a report to the Software Engineering Institute came up with\
    \ a list of what are some common characteristics of great designers.\n\nGreat\
    \ designers\n\n*   have a large set of standard patterns;\n*   have experienced\
    \ failing projects;\n*   have mastery of development tools;\n*   have an impulse\
    \ towards simplicity;\n*   can anticipate change;\n*   can view things from the\
    \ user's perspective; and\n*   can deal with complexity.[^(13)](#Chapter06.html#CHP-6-FN-13)\n\
    \n### Conclusion\n\nSo at the end of the chapter, what have we learned about software\
    \ design?\n\n*Design is ad hoc, heuristic, and messy*. It fundamentally uses a\
    \ trial-and-error and heuristic process and that process is the natural one to\
    \ use for software design. There are a number of well-known heuristics that any\
    \ good designer should employ.\n\n*Design depends on understanding of prior design\
    \ problems and solutions*. Designers need some knowledge of the problem domain.\
    \ More importantly, they need knowledge of design and patterns of good designs.\
    \ They need to have a knapsack of these design patterns that they can use to approach\
    \ new problems. The solutions are tried and true. The problems are new but they\
    \ contain elements of problems that have already been solved. The patterns are\
    \ malleable templates that can be applied to those elements of the new problem\
    \ that match the pattern's requirements.\n\n*Design is iterative*. Requirements\
    \ change, and so must your design. Even if you have a stable set of requirements,\
    \ your *understanding* of the requirements changes as you progress through the\
    \ design activity and so you'll go back and change the design to reflect this\
    \ deeper, better understanding. The iterative process clarifies and simplifies\
    \ your design at each step.\n\n*Design is a cognitive activity*. You're not writing\
    \ code at this point, so you don't need a machine. Your head and maybe a pencil\
    \ and paper or a whiteboard are all you need to do design. As Dijkstra says, “We\
    \ must not forget that it is not our business to make programs; it is our business\
    \ to design classes of computations that will display a desired behavior.”[^(14)](#Chapter06.html#CHP-6-FN-14)\n\
    \n__________\n\n^(12) Glass, R. L. *Software Creativity 2.0.* Atlanta, GA, developer.*.\
    \ (2006)\n\n^(13) Glass, R. L. (2006)\n\n*Design is opportunistic*. Glass sums\
    \ up his discussion of design with “The unperturbed design process is opportunistic\
    \ – that is, rather than proceed in an orderly process, good designers follow\
    \ an erratic pattern dictated by their minds, pursuing opportunities rather than\
    \ an orderly progression.”[^(15)](#Chapter06.html#CHP-6-FN-15)\n\nAll the characteristics\
    \ above argue against a rigid, plan-driven design process and for a creative,\
    \ flexible way of doing design. This brings us back to the first topic in this\
    \ chapter – design is just wicked.\n\nAnd finally:\n\n> *A designer can mull over\
    \ complicated designs for months. Then suddenly the simple, elegant, beautiful\
    \ solution occurs to him. When it happens to you, it feels as if God is talking!\
    \ And maybe He is.*\n> \n> —Leo Frankowski (in *The Cross-Time Engineer*)\n\n\
    ## C H A P T E R  7"
