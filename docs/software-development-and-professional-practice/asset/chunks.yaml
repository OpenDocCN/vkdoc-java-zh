  trans: '

    ##### 细化步骤 2


    既然我们已经有了程序的初步版本，接下来需要检查程序中的每一步，看看它们由哪些部分构成。我们关注的步骤如下：


    1.  检查当前皇后是否安全。

    2.  将安全的皇后留在棋盘上，并前进到下一列。

    3.  将不安全的皇后向上移动一行。

    4.  后退一列，并重置该列中的皇后。


    检查当前皇后是否安全，意味着我们需要确认当前皇后所在的两条对角线（上对角线和下对角线）以及所在行上都没有其他皇后。行检查很简单，只需检查同一行中的所有其他格子即可。要检查上对角线和下对角线，请记住，如果当前皇后位于第
    j 列，我们只需要检查第 1 列到第 j-1 列。稍加思考你就会发现，上对角线（从左下到右上）上所有格子的行索引与列索引之差是一个常数。类似地，下对角线（从左上到右下）上所有格子的行索引与列索引之和也是一个常数。这使得我们更容易确定哪些格子位于皇后的对角线上，以及如何检查它们。


    现在我们可以开始考虑数据结构了。你可能会问，这一步从何而来？嗯，逐步细化主要关注的是描述程序的控制流。但在某个时刻，你需要确定数据的具体形式。对于你试图解决的每个问题，这个时刻会在细化过程中的不同位置出现。对于当前问题，我们正处于这样一个阶段：在下一步细化中，我们应该编写更详细的伪代码。这几乎迫使我们现在就开始思考数据结构，以便能够编写伪代码。


    具体来说，我们现在需要问自己：我们打算如何表示棋盘和棋盘上的皇后？我们打算如何表示空单元格？我们需要一种能够高效表示皇后并检查它们是否会被攻击的数据结构。初步设想可能是一个
    8×8 的二维数组，我们在相应的行和列交叉点上放置皇后。因为我们不需要对这个矩阵进行任何计算——我们只需要指示皇后的存在与否——我们可以通过将其设为布尔数组来节省空间。这种数据结构也允许我们快速检查行、上对角线和下对角线中是否存在可以攻击当前皇后的皇后。所以我们应该使用一个二维布尔数组，对吧？


    嗯，先别急。这并不是思考皇后数据表示的唯一方式。事实上，如果我们考虑在安全检查过程中需要使用的数据结构和操作，我们或许可以简化一些事情。


    首先，既然我们知道每列只能有一个皇后，每行也只能有一个皇后，为什么不把这些信息结合起来呢？与其使用二维数组，为什么不直接使用一个一维布尔数组呢？例如：


    `boolean column[8];`


    其中 `column[i] = true` 表示第 i 列仍然空闲。对于对角线，我们可以利用上对角线和下对角线常数差或常数和的特性，创建另外两个数组：


    `boolean up[-7..+7], down[0..14];`


    这两个数组将指示哪些对角线格子是空闲的。采用这种安排，检查皇后是否安全的测试条件为：


    `(column[i] and up[row-col] and down[row+col])`^(`5`)


    好了，这看起来足够简单，所以我们终于可以完成这一步了，对吧？


    嗯，不。还有另一种思考方式。回到使用一维数组，但这次使用整数数组：


    `int board[8];`


    其中，数组的每个*索引*代表一列（在八皇后问题中为 0 到 7），而数组中存储的每个*值*代表皇后所在的行（在八皇后问题中也是 0 到 7）。由于我们现在有了每个皇后确切位置（行和列）的数据，我们就不再需要为上对角线和下对角线分别设置数组了。安全检查稍微复杂一些，但仍然很简单。现在或许是时候编写更多代码了。此时，似乎应该从伪代码过渡到一种真正的编程语言。在细化过程中的某个时刻，你必须进行这种过渡。就像决定何时定义数据结构一样，具体何时引入特定于语言的特性，取决于问题本身以及当前细化步骤的详细程度。一个用于检查安全的
    Java 方法可能如下所示：


    `public boolean isSafe (int[ ] board) {`

    `        boolean safe = true;`

    `        for (int i = 0; i < col; i++) {`

    `                if ( ( ( board[i] + i) == (row + col) ) ||      // 下对角线测试`

    `                        ( ( board[i] - i) == (row - col) ) ||   // 上对角线测试`

    `                        ( board[i]  == row) )                   // 行测试`

    `                        safe = false;`

    `        }`

    `        return safe;`

    `}`


    请记住，由于我们是通过每次向一列添加一个皇后来逐步构建部分解，因此每次只需要测试前 *`col`* 列。


    __________


    ⁵ Dahl, O. J., E. Dijkstra, 等 (1972). *结构化编程.* (英国伦敦: Academic Press, 1972.)


    既然我们已经解决了安全过程，并决定使用一个简单的数据结构来表示当前的棋盘配置，我们就可以继续进行分解中的其余过程了。剩下的过程是：


    **5.** 将安全的皇后留在棋盘上，并前进到下一列；


    **6.** 将不安全的皇后向上移动一行；以及


    **7.** 后退一列，并重置该列中的皇后。


    这些过程都足够简单，无需进一步分解即可直接编写。这是结构化编程的一个关键点——持续进行分解，直到一个过程变得显而易见，然后你就可以编写代码了。这三个方法用代码编写出来如下所示：


    `/*`

    ` *  将安全的皇后留在棋盘上，并前进到下一列`

    ` *  位于 (row, col) 的皇后是安全的，因此我们有了一个部分解。`

    ` *  前进到下一列`

    ` */`

    `public void advance (int[] board) {`

    `    board[col] = row;           // 将皇后放置在棋盘上的 (row, col) 位置`

    `    col++;                      // 移动到下一列`

    `    row = 0;                    // 并从该列的开头开始`

    `}`


    对于*将不安全的皇后向上移动一行*，我们甚至不需要一个单独的方法。主程序中用于检查安全的测试会在 `isSafe()` 方法确定当前 (row, col)
    位置不安全时，将皇后向上移动一行。实现此功能的代码如下：


    `       if (isSafe(board))`

    `           advance(board);`

    `       else`

    `           row++;`


    最后，我们有：


    `    /**`

    `     *  后退一列，并重置该列中的皇后`

    `     *  我们无法在当前列找到安全行`

    `     *  因此后退一列，并将该列的皇后`

    `     *  向上移动一行，以便重新开始查找`

    `     */`

    `    public void retreat (int[] board) {`

    `        col--;`

    `        row = board[col] + 1;  `

    `    }`


    完整的 Java 程序见附录。

