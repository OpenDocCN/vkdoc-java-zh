- fmt: "### Formatting, Layout, and Style\n\nFormatting, layout, and style are all\
    \ related to how your code looks on the page. It turns out that, as we saw above,\
    \ that how your code looks on the page is also related to its correctness. McConnell’s\
    \ *Fundamental Theorem of Formatting* says “good visual layout shows the logical\
    \ structure of a program.”^([5](#Chapter12.html#CH-12-FN-5)) Good visual layout\
    \ not only makes the program more readable, it helps reduce the number of errors\
    \ because it shows how the program is structured. The converse is also true; a\
    \ good logical structure is easier to read. So the objectives of good layout and\
    \ formatting should be\n\n*   to accurately represent the logical structure of\
    \ your program;\n*   to be consistent so there are few exceptions to whatever\
    \ style of layout you’ve chosen;\n*   to improve readability for humans; and\n\
    *   to be open to modifications. (You do know you’re code is going to be modified,\
    \ right?)\n\n### General Layout Issues and Techniques\n\nMost layout issues have\
    \ to do with laying out blocks of code; there are different types of block layout,\
    \ some of which are built into languages, some you get to choose on your own.\
    \ The three most prevalent kinds of block layouts are built-in block boundaries,\
    \ begin-end block boundaries, and emulating built-in blocks.\n\nSome languages\
    \ have built-in block boundaries for every control structure in the language.\
    \ In this case you have no choice; because the block boundary element is a language\
    \ feature you must use it. Languages that have built-in block boundaries include\
    \ Ada, PL/1, Lisp and Scheme, and Visual Basic. As an example, an `if-then` statement\
    \ in Visual Basic looks like\n\n```\nif income > 25000 then\n        statement1\n\
    \        statement2\nelse\n        statement3\n        …\nend if\n```\n\nYou can’t\
    \ write a control structure in Visual Basic without using the ending block element,\
    \ so blocks are easier to find and distinguish.\n\n__________\n\n⁵ McConnell,\
    \ 2004.\n\nBut, most languages don’t have built-in block boundary lexical elements.\
    \ Most languages use a begin-end block boundary requirement. With this requirement,\
    \ a block is a sequence of zero or more statements (where a statement has a particular\
    \ definition) that is delimited by *begin* and *end* lexical elements. The most\
    \ typical begin and end elements are the keywords `begin` and `end`, or left and\
    \ right curly braces `{` and `}`. So, for example\n\n**Pascal:**\n\n```\nif income\
    \ > 25000 then\n        begin\n                statement1;\n                statement2\n\
    \        end\nelse\n        statement3;\n```\n\n**C/C++/Java:**\n\n```\nif (income\
    \ > 25000)\n{\n        statement1;\n        statement2;\n} else\n        statement3;\n\
    ```\n\nNote in both examples that a single statement is considered a block and\
    \ does not require the block delimiter elements. Note also in Pascal the semi-colon\
    \ is the statement *separator* symbol, so is required between statements, but\
    \ because `else` and `end` are not the end of a statement, you don’t use a semi-colon\
    \ right before `else` or `end` (confused? most people are); in C, C++, and Java,\
    \ the semi-colon is the statement *terminator* symbol, and must be at the end\
    \ of every statement. This is easier to remember and write; you just pretty much\
    \ put a semi-colon everywhere except after curly braces. Simplicity is good.\n\
    \nFinally, when we format a block we can try to emulate the built-in block boundary\
    \ in languages that don’t have it by requiring that every block use the block\
    \ delimiter lexical elements.\n\n**C/C++/Java:**\n\n```\nif (income > 25000) {\n\
    \        statement1;\n        statement2;\n} else {\n        statement3;\n}\n\
    ```\n\nIn this example, we want to pretend that the left and right curly braces\
    \ are part of the control structure syntax, and so we use them to delimit the\
    \ block, no matter how large it is. To emphasize that the block delimiter is part\
    \ of the control structure, we put it on the same line as the beginning of the\
    \ control statement. We can then line up the closing block boundary element with\
    \ the beginning of the control structure. This isn’t a perfect emulation of the\
    \ built-in block element language feature, but it comes pretty close and has the\
    \ advantage that you’re less likely to run into problems with erroneous indentation\
    \ like the following:\n\n**C/C++/Java:**\n\n```\nif (income > 25000)\n       \
    \ statement1;\n        statement2;\n        statement3;\n```\n\nIn this example,\
    \ the erroneous indentation for `statement2` and `statement3` can lead the reader\
    \ to believe that they are part of the `if` statement. The compiler is under no\
    \ such illusions.\n\nOverall, using an emulating block-boundaries style works\
    \ very well, is readable, and clearly illustrates the logical structure of your\
    \ program. It’s also a great idea to put block boundaries around every block,\
    \ including just single statement blocks. That lets you eliminate the possibility\
    \ of the erroneous indentation error above. So if you say\n\n```\nif (income >\
    \ 25000) {\n        statement1;\n}\n```\n\nit’s then clear that in\n\n```\nif\
    \ (income > 25000) {\n        statement1;\n}\n        statement2;\n        statement3;\n\
    ```\n\nthat `statement2` and `statement3` are not part of the block, regardless\
    \ of their indentation. It also means that you can now safely add extra statements\
    \ to the block without worrying about whether they are in the block or not\n\n\
    ```\nif (income > 25000) {\n        statement1;\n        statement2;\n       \
    \ statement3;\n        statement4;\n        statement5;\n}\n```\n\n### White Space\n\
    \nWhite space is your friend. You wouldn’t write a book with no spaces between\
    \ words, or line breaks between paragraphs, or no chapter divisions, would you?\
    \ Then why would you write code with no white space? White space allows you to\
    \ logically separate parts of the program and to line up block separators and\
    \ other lexical elements. It also lets your eyes rest between parts of the program.\
    \ Resting your eyes is a good thing. The following are some suggestions on the\
    \ use of white space:\n\n*   Use blank lines to separate groups (just like paragraphs).\n\
    *   Within a block align all the statements to the same tab stop (the default\
    \ tab width is normally four spaces).\n*   Use indentation to show the logical\
    \ structure of each control structure and block.\n*   Use spaces around operators.\n\
    *   In fact, use spaces around array references and function/method arguments\
    \ as well.\n*   Do not use double indentation with begin-end block boundaries."
  raw: '### Formatting, Layout, and Style


    Formatting, layout, and style are all related to how your code looks on the page.
    It turns out that, as we saw above, that how your code looks on the page is also
    related to its correctness. McConnell’s *Fundamental Theorem of Formatting* says
    “good visual layout shows the logical structure of a program.”^([5](#Chapter12.html#CH-12-FN-5))
    Good visual layout not only makes the program more readable, it helps reduce the
    number of errors because it shows how the program is structured. The converse
    is also true; a good logical structure is easier to read. So the objectives of
    good layout and formatting should be


    *   to accurately represent the logical structure of your program;

    *   to be consistent so there are few exceptions to whatever style of layout you’ve
    chosen;

    *   to improve readability for humans; and

    *   to be open to modifications. (You do know you’re code is going to be modified,
    right?)


    ### General Layout Issues and Techniques


    Most layout issues have to do with laying out blocks of code; there are different
    types of block layout, some of which are built into languages, some you get to
    choose on your own. The three most prevalent kinds of block layouts are built-in
    block boundaries, begin-end block boundaries, and emulating built-in blocks.


    Some languages have built-in block boundaries for every control structure in the
    language. In this case you have no choice; because the block boundary element
    is a language feature you must use it. Languages that have built-in block boundaries
    include Ada, PL/1, Lisp and Scheme, and Visual Basic. As an example, an if-then
    statement in Visual Basic looks like


    `if income > 25000 then`

    `        statement1`

    `        statement2`

    `else`

    `        statement3`

    `        …`

    `end if`


    You can’t write a control structure in Visual Basic without using the ending block
    element, so blocks are easier to find and distinguish.


    __________


    ⁵ McConnell, 2004.


    But, most languages don’t have built-in block boundary lexical elements. Most
    languages use a begin-end block boundary requirement. With this requirement, a
    block is a sequence of zero or more statements (where a statement has a particular
    definition) that is delimited by *begin* and *end* lexical elements. The most
    typical begin and end elements are the keywords **`begin`** and **`end`**, or
    left and right curly braces **`{`** and **`}`**. So, for example


    **Pascal:**


    `if income > 25000 then`

    `        begin`

    `                statement1;`

    `                statement2`

    `        end`

    `else`

    `        statement3;`


    **C/C++/Java:**


    `if (income > 25000)`

    `{`

    `        statement1;`

    `        statement2;`

    `} else`

    `        statement3;`


    Note in both examples that a single statement is considered a block and does not
    require the block delimiter elements. Note also in Pascal the semi-colon is the
    statement *separator* symbol, so is required between statements, but because **`else`**
    and **`end`** are not the end of a statement, you don’t use a semi-colon right
    before **`else`** or **`end`** (confused? most people are); in C, C++, and Java,
    the semi-colon is the statement *terminator* symbol, and must be at the end of
    every statement. This is easier to remember and write; you just pretty much put
    a semi-colon everywhere except after curly braces. Simplicity is good.


    Finally, when we format a block we can try to emulate the built-in block boundary
    in languages that don’t have it by requiring that every block use the block delimiter
    lexical elements.


    **C/C++/Java:**


    `if (income > 25000) {`

    `        statement1;`

    `        statement2;`

    `} else {`

    `        statement3;`

    `}`


    In this example, we want to pretend that the left and right curly braces are part
    of the control structure syntax, and so we use them to delimit the block, no matter
    how large it is. To emphasize that the block delimiter is part of the control
    structure, we put it on the same line as the beginning of the control statement.
    We can then line up the closing block boundary element with the beginning of the
    control structure. This isn’t a perfect emulation of the built-in block element
    language feature, but it comes pretty close and has the advantage that you’re
    less likely to run into problems with erroneous indentation like the following:


    **C/C++/Java:**


    `if (income > 25000)`

    `        statement1;`

    `        statement2;`

    `        statement3;`


    In this example, the erroneous indentation for `statement2` and `statement3` can
    lead the reader to believe that they are part of the **`if`** statement. The compiler
    is under no such illusions.


    Overall, using an emulating block-boundaries style works very well, is readable,
    and clearly illustrates the logical structure of your program. It’s also a great
    idea to put block boundaries around every block, including just single statement
    blocks. That lets you eliminate the possibility of the erroneous indentation error
    above. So if you say


    `if (income > 25000) {`

    `        statement1;`

    `}`


    it’s then clear that in


    `if (income > 25000) {`

    `        statement1;`

    `}`

    `        statement2;`

    `        statement3;`


    that `statement2` and `statement3` are not part of the block, regardless of their
    indentation. It also means that you can now safely add extra statements to the
    block without worrying about whether they are in the block or not


    `if (income > 25000) {`

    `        statement1;`

    `        statement2;`

    `        statement3;`

    `        statement4;`

    `        statement5;`

    `}`


    ### White Space


    White space is your friend. You wouldn’t write a book with no spaces between words,
    or line breaks between paragraphs, or no chapter divisions, would you? Then why
    would you write code with no white space? White space allows you to logically
    separate parts of the program and to line up block separators and other lexical
    elements. It also lets your eyes rest between parts of the program. Resting your
    eyes is a good thing. The following are some suggestions on the use of white space:


    *   Use blank lines to separate groups (just like paragraphs).

    *   Within a block align all the statements to the same tab stop (the default
    tab width is normally four spaces).

    *   Use indentation to show the logical structure of each control structure and
    block.

    *   Use spaces around operators.

    *   In fact, use spaces around array references and function/method arguments
    as well.

    *   Do not use double indentation with begin-end block boundaries.'
  trans: '

    ### 格式、布局与风格


    格式、布局和风格都与代码在页面上的呈现方式有关。正如我们之前所见，代码在页面上的呈现方式也与其正确性相关。麦康奈尔的*格式基本定理*指出：“良好的视觉布局能够展现程序的逻辑结构。”^(5)
    良好的视觉布局不仅能让程序更易读，还能通过展示程序的结构来帮助减少错误。反之亦然；良好的逻辑结构也更易于阅读。因此，良好布局和格式的目标应该是：


    *   准确呈现程序的逻辑结构；

    *   保持一致性，使你选择的布局风格尽可能少有例外；

    *   提高人类可读性；

    *   便于修改。（你知道你的代码会被修改的，对吧？）


    ### 通用布局问题与技巧


    大多数布局问题都与代码块的布局有关；存在不同类型的块布局，有些是语言内置的，有些则需要你自行选择。三种最常见的块布局是：内置块边界、begin-end 块边界，以及模拟内置块。


    有些语言为其所有控制结构都提供了内置的块边界。在这种情况下，你别无选择；因为块边界元素是语言特性，你必须使用它。具有内置块边界的语言包括 Ada、PL/1、Lisp
    和 Scheme，以及 Visual Basic。例如，Visual Basic 中的 if-then 语句看起来像这样：


    `if income > 25000 then`

    `        statement1`

    `        statement2`

    `else`

    `        statement3`

    `        …`

    `end if`


    在 Visual Basic 中，如果不使用结束块元素，就无法编写控制结构，因此块更容易被找到和区分。


    __________


    ⁵ McConnell, 2004.


    但是，大多数语言并没有内置的块边界词法元素。大多数语言使用 begin-end 块边界要求。根据这一要求，一个块是由零个或多个语句（其中语句有特定定义）组成的序列，并由
    *begin* 和 *end* 词法元素界定。最常见的 begin 和 end 元素是关键字 **`begin`** 和 **`end`**，或者左右花括号
    **`{`** 和 **`}`**。例如：


    **Pascal:**


    `if income > 25000 then`

    `        begin`

    `                statement1;`

    `                statement2`

    `        end`

    `else`

    `        statement3;`


    **C/C++/Java:**


    `if (income > 25000)`

    `{`

    `        statement1;`

    `        statement2;`

    `} else`

    `        statement3;`


    注意在这两个例子中，单个语句被视为一个块，不需要块分隔符元素。还要注意，在 Pascal 中，分号是语句*分隔符*符号，因此需要在语句之间使用，但由于 **`else`**
    和 **`end`** 不是语句的结尾，所以在 **`else`** 或 **`end`** 之前不要使用分号（感到困惑吗？大多数人都会）；而在 C、C++
    和 Java 中，分号是语句*终止符*符号，必须放在每条语句的末尾。这更容易记忆和编写；你几乎可以在任何地方加上分号，除了花括号之后。简洁是好事。


    最后，当我们格式化一个块时，可以尝试模拟那些没有内置块边界的语言，通过要求每个块都使用块分隔符词法元素来实现。


    **C/C++/Java:**


    `if (income > 25000) {`

    `        statement1;`

    `        statement2;`

    `} else {`

    `        statement3;`

    `}`


    在这个例子中，我们想假装左右花括号是控制结构语法的一部分，因此无论块有多大，我们都用它们来界定块。为了强调块分隔符是控制结构的一部分，我们将其放在控制语句起始行的同一行。然后我们可以将结束块边界元素与控制结构的起始位置对齐。这并非对内置块元素语言特性的完美模拟，但它非常接近，并且具有一个优点：你不太可能遇到像下面这样因错误缩进而导致的问题：


    **C/C++/Java:**


    `if (income > 25000)`

    `        statement1;`

    `        statement2;`

    `        statement3;`


    在这个例子中，`statement2` 和 `statement3` 的错误缩进可能会让读者误以为它们是 **`if`** 语句的一部分。编译器可不会产生这种错觉。


    总的来说，使用模拟块边界的风格效果很好，可读性强，并能清晰地展示程序的逻辑结构。为每个块（包括仅包含单个语句的块）都加上块边界也是一个好主意。这可以消除上面出现错误缩进的可能性。所以，如果你这样写：


    `if (income > 25000) {`

    `        statement1;`

    `}`


    那么，在下面的代码中：


    `if (income > 25000) {`

    `        statement1;`

    `}`

    `        statement2;`

    `        statement3;`


    很明显，无论缩进如何，`statement2` 和 `statement3` 都不属于该块。这也意味着，你现在可以安全地向块中添加额外的语句，而无需担心它们是否在块内：


    `if (income > 25000) {`

    `        statement1;`

    `        statement2;`

    `        statement3;`

    `        statement4;`

    `        statement5;`

    `}`


    ### 空白


    空白是你的朋友。你不会写一本单词之间没有空格、段落之间没有换行、或者没有章节划分的书，对吧？那你为什么要编写没有空白的代码呢？空白允许你在逻辑上分隔程序的各个部分，并对齐块分隔符和其他词法元素。它还能让你的眼睛在程序各部分之间得到休息。让眼睛休息是件好事。以下是一些关于使用空白的建议：


    *   使用空行来分隔组（就像段落一样）。

    *   在块内，将所有语句对齐到相同的制表位（默认制表符宽度通常是四个空格）。

    *   使用缩进来展示每个控制结构和块的逻辑结构。

    *   在运算符周围使用空格。

    *   实际上，在数组引用和函数/方法参数周围也要使用空格。

    *   不要在 begin-end 块边界处使用双重缩进。

    '
- fmt: "### Block and Statement Style Guidelines\n\nAs mentioned previously, the “emulating\
    \ block boundaries” style works well for most block-structured languages.\n\n\
    - Use more parentheses than you think you’ll need. I especially use parentheses\
    \ around all my arithmetic expressions – mostly just to make sure I haven’t screwed\
    \ up the precedence rules. `fx = ((a + b) * (c + d)) / e;`\n- Format single statement\
    \ blocks consistently. Using the emulating block-boundaries technique:\n  ```\n\
    \  if (average > MIN_AVG) {\n       avg = MIN_AVG;\n  }\n  ```\n- For complicated\
    \ conditional expressions, put separate conditions on separate lines.\n  ```\n\
    \  if ((’0’ <= inChar && inChar <= ’9’) ||\n       (’a’ <= inChar && inChar <=\
    \ ’z’) ||\n       (’A’ <= inChar && inChar <= ’Z’)) {\n            mytext.addString(inChar);\n\
    \            mytext.length++;\n  }\n  ```\n- Wrap individual statements at column\
    \ 70 or so. This is a holdover from the days of 80-column punch cards, but it’s\
    \ also a great way to make your code more readable. Having very long lines of\
    \ code forces your readers to scroll horizontally, or it makes them forget what\
    \ the heck was at the beginning of the line!\n- Don’t use `goto`, no matter what\
    \ Don Knuth says.^([6](#Chapter12.html#CH-12-FN-6)) Some languages, like Java,\
    \ don’t even have `goto` statements. Most don’t need them (assembly languages\
    \ excepted). Take the spirit of Knuth’s paper and only use `goto`s where they\
    \ make real sense and make your program more readable and understandable.\n- Use\
    \ only one statement per line. (Do not write code as if you were entering the\
    \ annual International Obfuscated C Code Contest! [`www.ioccc.org.`](http://www.ioccc.org.))\
    \ This `g.setColor(Color.blue); g.fillOval(100, 100, 200, 200); mytext.addString(inChar);mytext.length++;System.out.println();`\
    \ is legal, but just doesn’t look good, and it’s easy to just slide right over\
    \ that statement in the middle. This\n  ```\n  g.setColor(Color.blue);\n  g.fillOval(100,\
    \ 100, 200, 200);\n  mytext.addString(inChar);\n  mytext.length++\n  System.out.println();\n\
    \  ```\n  looks much, much better.\n\n__________\n\n⁶ Knuth, D. “Structured Programming\
    \ with goto Statements.” *ACM Computing Surveys* 6(4): 261-301. 1974.\n\n### Declaration\
    \ Style Guidelines\n\nJust like in writing executable code, your variable declarations\
    \ need to be neat and readable.\n\n- Use only one declaration per line. Well,\
    \ I go both ways on this one. While I think that `int max,min,top,left,right,average,bottom,mode;`\
    \ is a bit crowded; I’d rewrite this as\n  ```\n  int max, min;\n  int top, bottom;\n\
    \  int left, right;\n  int average, mode;\n  ```\n  Not one per line, but the\
    \ variables that are related are grouped together. That makes more sense to me.\n\
    - Declare variables close to where they are used. Most procedural and object-oriented\
    \ programming languages have a *declaration before use* rule, requiring that you\
    \ declare a variable before you can use it in any expression. In the olden days,\
    \ say in Pascal, you had to declare variables at the top of your program (or subprogram)\
    \ and you couldn’t declare variables inside blocks. This had the disadvantage\
    \ that you might declare a variable pages and pages before you’d actually use\
    \ it. (But see the section later in this chapter where I talk about how long your\
    \ functions should be.)\n- These days you can normally declare variables in any\
    \ block in your program. The scope of that variable is the block in which it is\
    \ declared and all the blocks inside that block.\n- This tip says that it’s a\
    \ good idea to declare those variables in the closest block in which they are\
    \ used. That way you can see the declaration and the use the variables *right\
    \ there*.\n- Order declarations sensibly\n  - Group by types and usage (see the\
    \ previous example).\n  - Use white space to separate your declarations. Once\
    \ again, white space is your friend. The key idea in these last couple of tips\
    \ is to make your declarations visible and to keep them near the code where they\
    \ will be used.\n- Don’t nest header files – ever! (This is for you C and C++\
    \ programmers.) Header files are designed so that you only need to define constants,\
    \ declare global variables, and declare function prototypes once, and you can\
    \ then re-use the header file in some (possibly large) number of source code files.\
    \ Nesting header files hides some of those declarations inside the nested headers.\
    \ This is bad – because visibility is good. It allows you to erroneously include\
    \ a header file more than once, which leads to redefinitions of variables and\
    \ macros and errors.\n\n  The only header files you might nest in your own header\
    \ files are system headers like `stdio.h` or `stdlib.h` and I’m not even sure\
    \ I like that.\n\n- Don’t put source code in your header files – ever! (Again,\
    \ this is for you C and C++ programmers.) Headers are for declarations, not for\
    \ source code. Libraries are for source code. Putting a function in a header file\
    \ means that the function will be re-defined every place you include the header.\
    \ This can easily lead to multiple definitions – which the compiler may not catch\
    \ until the link phase. The only source that should be in your headers are macro\
    \ definitions in `#define` pre-processor statements and even those should be used\
    \ carefully.\n\n### Commenting Style Guidelines\n\nJust like white space, comments\
    \ are your friend. Every programming book in existence tells you to put comments\
    \ in your code – and none of them (including this one) tell you just where to\
    \ put comments, and what a good comment should look like. That’s because how to\
    \ write good, informative comments falls in the “it depends” category of advice.\
    \ A good, informative comment depends on the *context* in which you are writing\
    \ it, so general advice is pretty useless. The only good advice about writing\
    \ comments is – just do it. Oh, and since you’ll change your code – do it again.\
    \ That’s the second hardest thing about comments – keeping them up to date. So\
    \ here’s my piece of advice, write comments when you first write your program.\
    \ This gives you an idea of *where* they should be. Then, when you finish your\
    \ unit testing of a particular function, write a final set of comments for that\
    \ function by updating the ones that are already there. That way, you’ll come\
    \ pretty close to having an up-to-date set of comments in the released code.\n\
    \n- Indent a comment with its corresponding statement. This is important for readability\
    \ because then the comment and the code line up.\n  ```\n  /* make sure we have\
    \ the right number of arguments */\n  if (argc < 2) {\n      fprintf(stderr, \"\
    Usage: %s <filename>\\n\", argv[0]);\n      exit(1);\n  }\n  ```\n- Set off block\
    \ comments with blank lines. Well, I go both ways on this one. If you line up\
    \ the start and end of the block comments on lines by themselves, then you don’t\
    \ need the blank lines. If, on the other hand, you stick the end of comment marker\
    \ at the end of a line, you should use a blank line to set it apart from the source\
    \ code. So if you do this\n  ```\n  /*\n   * make sure we have the right number\
    \ of arguments\n   * from the command line\n   */\n  if (argc < 2) {\n      fprintf(stderr,\
    \ \"Usage: %s <filename>\\n\", argv[0]);\n      exit(1);\n  }\n  ```\n  you don’t\
    \ need the blank line; but if you do\n  ```\n  /* make sure we have the right\
    \ number of arguments\n     from the command line */\n  ```"
