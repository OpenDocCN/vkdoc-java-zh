  trans: '

    ### 测试心态


    测试其实还有另一个问题——那就是你。嗯，准确地说，是你，开发者。你看，开发者和测试者在代码构建中扮演着两种不同、甚至可以说是对立角色。开发者的职责是根据一组需求，设计出反映需求的方案，并编写实现该方案的代码。作为开发者，你的任务是*让代码跑起来*。


    而测试者的工作，则是拿着同样的需求和你的代码，*让代码出问题*。测试者应该对你的代码做一些难以言表、可怕且折磨人的事情，努力让其中的错误暴露在光天化日之下。他们的工作就是搞破坏。然后你作为开发者再去修复。这就是为什么做测试者可能是一份很酷的工作。


    你可以看出这可能会形成一种对立关系。你也能明白为什么开发者可能成为糟糕的测试者。如果你的任务是让代码工作，你就不会专注于破坏它。因此，你的测试用例可能不会像那些以破坏你代码为工作的人想出的那样恶毒、刻薄。简而言之，因为他们试图构建美好的东西，*开发者是糟糕的测试者*。开发者倾向于使用典型、干净的数据编写测试。他们往往过于乐观地看待一个测试能覆盖多少代码。他们编写测试时倾向于假设代码能工作；毕竟这是他们自己的代码，对吧？


    这就是为什么大多数软件开发组织都有*独立的测试团队*，尤其是在集成测试和系统测试阶段。测试者编写自己的测试代码，创建自己的框架，对所有新基线版本和最终发布代码进行测试，并将所有错误报告给开发者，然后由开发者修复。测试者通常*不做*的一件事就是单元测试。单元测试是开发者的责任，所以你无法推脱。你确实需要考虑测试，学习如何编写测试、如何运行测试以及如何分析结果。你需要学会对你的代码狠一点。而且你仍然需要修复错误。


    ### 何时测试？


    在我开始讨论如何进行单元测试以及测试哪些内容之前，我们先谈谈*何时*测试。当前的主流观点分为两个方向：更传统的方法是先编写代码，使其编译通过（从而消除语法错误），然后在你觉得某个函数或模块的代码完成后，*再*编写测试并进行单元测试。这样做的好处是，你已经理解了需求并编写了代码，在编写代码的过程中你有机会思考测试用例。然后你可以编写清晰的测试用例。在这种策略下，测试和调试是相辅相成的，几乎同时进行。它允许你发现错误、修复它，然后立即重新运行失败的测试。


    另一种源自敏捷方法论（尤其是极限编程）的新方法被称为*测试驱动开发*（TDD）。采用 TDD 时，你在编写任何代码*之前*就先编写单元测试。显然，如果你先编写单元测试，它们都会失败——最多你只能有一个在测试中调用的方法存根。但这是件好事，因为在
    TDD 中，你编写代码的目标是*让所有测试通过*。所以，如果你编写了一堆测试，然后只需编写刚好能让所有测试通过的代码，你就知道大功告成了！这样做的好处是帮助你保持代码精简，这意味着代码更简单、更容易调试。你可以编写一些新代码，进行测试；如果失败，就再写一些代码；如果通过，就停下来。它还能让你从一开始就拥有一套测试，无论何时你对代码进行修改，都可以运行这些测试。如果所有测试仍然通过，说明你的修改没有破坏任何东西。它同样允许你发现错误、修复它，然后立即重新运行失败的测试。


    那么哪种方式更好呢？嗯，答案又是那种“看情况而定”的事情。通常，先编写测试能让你更早进入测试心态，并为实现代码提供明确的目标。另一方面，在你大量实践并使之成为第二天性之前，先写测试可能会比较困难，因为你必须想象出你要测试什么。这也会迫使你尽早去理解需求以及模块或类的设计。这意味着设计、编码和测试几乎同时发生。这可能会让整个代码构建过程变得更加困难。TDD
    在中小型项目中效果很好（敏捷技术通常也是如此），但对于非常大型的程序可能会更困难。当你在进行结对编程时，TDD 也相当有效。在结对编程中，驾驶员负责编写代码，而领航员则负责观察错误并思考测试。采用
    TDD 时，驾驶员编写的是*测试*，而领航员则在思考更多要编写的测试并提前考虑代码。这个过程往往使编写测试变得更容易，然后自然地过渡到编写代码。


    不妨在编写代码之前和之后都尝试一下测试，然后由你自己决定哪种方式最好。


    ### 测试什么？


    既然我们已经讨论了测试的不同阶段以及何时进行单元测试，现在是时候讨论到底*测试什么*了。你要测试的内容分为两大类：*代码覆盖率*和*数据覆盖率*。


    *   *代码覆盖率*的目标是使用代表性数据，至少执行程序中每一行代码一次，以便确保所有代码功能正确。听起来很简单？嗯，想想那个五万行程序的组合爆炸问题吧。

    *   *数据覆盖率*的目标是测试好数据和坏数据的代表性样本，包括输入数据和程序生成的数据，目的是确保程序能正确处理数据，尤其是数据错误。


    当然，代码覆盖率和数据覆盖率之间存在重叠；例如，有时为了让程序的特定部分得以执行，你可能需要输入错误数据。我们会尽可能地将它们分开讨论，并在讨论编写实际测试时再结合起来。

    '
- fmt: '### Code Coverage: Test Every Statement


    Your objective in code coverage is to test every statement in your program. In
    order to do that, you need to keep several things in mind about your code. Your
    program is made up of a number of different types of code, each of which you need
    to test.


    First, there''s *straight line code*. Straight line code illuminates a single
    path through your function or method. Normally this will require one test – per
    different data type (see below for data coverage).


    Next there is *branch coverage*. With branch coverage you want to test everywhere
    your program can change directions. That means you need to look at control structures
    here. Take a look at every `if` and `switch` statement, and every complex conditional
    expression – those that contain AND and OR operators in them. For every `if` statement
    you''ll need two tests – one for when the conditional expression is `true` and
    one for when it''s `false`. For every `switch` statement in your method you''ll
    need a separate test for each `case` clause in the switch, including the `default`
    clause (all your `switch` statements have a `default` clause, right?). The logical
    and (`&&`) and or (`||`) operators add complexity to your conditional expressions,
    so you''ll need extra test cases for those.


    Ideally, you''ll need four test cases for each (F-F, F-T, T-F, T-T), but if the
    language you are using uses short-cut evaluation for logical operators, as do
    C/C++ and Java, then you can reduce the number of test cases. For the or operator
    you''ll still need two cases if the first sub-expression is `false`, but you can
    just use a single test case if the first sub-expression evaluates to `true` (the
    entire expression will always be true). For the and operator, you''ll only need
    a single test if the first sub-expression evaluates to `false` (the result will
    always be false) but you need both tests if the first sub-expression evaluates
    to `true`.


    Then there is *loop coverage*. This is similar to branch coverage above. The difference
    here is that in `for`, `while`, or `do`-`while` loops you have the best likelihood
    of introducing an *off-by-one error* and you need to test for that explicitly.
    You''ll also need a test for a “normal” run through the loop, but you''ll need
    to test for a couple of other things too. First will be the possibility for the
    pre-test loops that you never enter the loop body – the loop conditional expression
    fails the very first time. Then you''ll need to test for an infinite loop – the
    conditional expression never becomes false. This is most likely because you don''t
    change the loop control variable in the loop body, or you do change it, but the
    conditional expression is wrong from the get-go. For loops that read files, you
    normally need to test for the *end-of-file* marker (EOF). This is another place
    where errors could occur either because of a premature end-of-file or because
    (in the case of using standard input) end-of-file is never indicated.


    Finally, there are *return values*. In many languages, standard library functions
    and operating system calls all return values. For example, in C, the `fprintf`
    and `fscanf` functions return the number of characters printed to an output stream
    and the number of input elements assigned from an input stream, respectively.
    But hardly anyone ever checks these return values.[²](#Chapter14.html#CHP-14-FN-2)
    You should!


    Note that Java is a bit different than C or C++. In Java many of the similarly
    offending routines will have return values declared `void` rather than `int` as
    in C or C++. So the above problem occurs much less frequently in Java than in
    other languages. It''s not completely gone however. While the `System.out.print()`
    and `System.out.println()` methods in Java are both declared to return `void`,
    the `System.out.printf()` method returns a `PrintStream` object that is almost
    universally ignored. In addition, it''s perfectly legal in Java to call a `Scanner`''s
    `next()` or `nextInt()` methods or any of the methods that read data and not save
    the return value in a variable. Be careful out there.


    ### Data Coverage: Bad Data Is Your Friend?


    Remember in the chapter on Code Construction we talked about *defensive programming*,
    and that the key to defending your program was watching out for bad data, detecting
    and handling it so that your program can recover from bad data or at least fail
    gracefully. Well, this is where we see if your defenses are worthy. Data coverage
    should examine two types of data, good data and bad data. Good data is the typical
    data your method is supposed to handle. These tests will test data that is the
    correct type and within the correct ranges. They are just to see if your program
    is working normally. This doesn''t mean you''re completely off the hook here.
    There are still a few cases to test. Here''s the short list:


    *   **Test boundary conditions**. This means to test data near the edges of the
    range of your valid data. For example, if your program is computing average grades
    for a course, then the range of values is between 0 and 100 inclusive. So you
    should test grades at, for example, 0, 1, 99, and 100. Those are all valid grades.
    But you should also test at -1, and 101. Both of these are invalid values, but
    are close to the range. In addition, if you are assigning letter grades, you need
    to check at the upper and lower boundaries of each letter grade value. So if an
    F is any grade below a 60, you need to check 59, 60, and 61. If you''re going
    to have an off-by-one error, that''s where to check.

    *   **Test typical data values**. These are valid data fields that you might normally
    expect to get. For the grading example above, you might check 35, 50, 67, 75,
    88, 93, and so on. If these don''t work you''ve got other problems.

    *   **Test pre- and post-conditions**. Whenever you enter a control structure
    – a loop or a selection statement, or make a function call, you''re making certain
    assumptions about data values and the state of your computations. These are pre-conditions.
    And when you exit that control structure, you''re making assumptions about what
    those values are now. These are post-conditions. You should write tests that make
    sure that your assumptions are correct by testing the pre- and post-conditions.
    In languages that have assertions (including C, C++, and Java), this is a great
    place to use them.


    ____________


    ² Kernighan, B. W. and R. Pike. *The Practice of Programming.* (Boston, MA: Addison-Wesley,
    1999.)


    Testing valid data and boundary conditions is one thing, but you also need to
    test bad data.


    *   **Illegal data values**. You should test data that is blatantly illegal to
    make sure that your data validation code is working. We already mentioned testing
    illegal data near the boundaries of your data ranges. You should also test some
    that are blatantly out of the range.

    *   **No data**. Yup, test the case where you are expecting data and you get nothing.
    This is the case where you''ve prompted a user for input and instead of typing
    a value and hitting the return key, they just hit return. Or the file you''ve
    just opened is empty. Or you''re expecting three files on the command line and
    you get none. You''ve got to test all of these cases.

    *   **Too little or too much data**. You have to test the cases where you ask
    for three pieces of data and only get two. Also the cases where you ask for three
    and you get ten pieces of data.

    *   **Uninitialized variables**. Most language systems these days will provide
    default initialization values for any variable that you declare. But you should
    still test to make sure that these variables are initialized correctly. (Really,
    you should not depend on the system to initialize your data anyway; you should
    always initialize it yourself.)'
