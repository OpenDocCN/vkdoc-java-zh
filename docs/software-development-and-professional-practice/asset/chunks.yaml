- fmt: "### Conclusion\n\nSoftware development is the heart of every software project,\
    \ and it is the heart of software engineering. Its objective is to deliver excellent,\
    \ defect-free code to users on time and within budget – all in the face of constantly\
    \ changing requirements. That makes development a particularly hard job to do.\
    \ But finding a solution to a difficult problem and getting your code to work\
    \ correctly is just about the coolest feeling in the world.\n\n> *“[Programming\
    \ is] the only job I can think of where I get to be both an engineer and an artist.\
    \ There's an incredible, rigorous, technical element to it, which I like because\
    \ you have to do very precise thinking. On the other hand, it has a wildly creative\
    \ side where the boundaries of imagination are the only real limitation. The marriage\
    \ of those two elements is what makes programming unique. You get to be both an\
    \ artist and a scientist. I like that. I love creating the magic trick at the\
    \ center that is the real foundation for writing the program. Seeing that magic\
    \ trick, that essence of your program, working correctly for the first time, is\
    \ the most thrilling part of writing a program.”*\n> \n> — Andy Hertzfeld (designer\
    \ of the first Mac OS)^([2](#Chapter01.html#CHP-01-FN-2))\n\n## C H A P T E R\
    \ 2\n\n## Process Life Cycle Models\n\n> *If you don't know where you're going,\
    \ any road will do.*\n> \n> *If you don't know where you are, a map won't help.*\n\
    > \n> - Watts Humphrey\n\nEvery program has a life cycle. It doesn't matter how\
    \ large or small the program is, or how many people are working on the project\
    \ – all programs go through the same steps:\n\n1. Conception\n2. Requirements\
    \ gathering/exploration/modeling\n3. Design\n4. Coding and debugging\n5. Testing\n\
    6. Release\n7. Maintenance/software evolution\n8. Retirement\n\nOne's program\
    \ may compress some of these steps, or combine two or more steps into a single\
    \ piece of work, but all programs go through all steps.\n\nAlthough every program\
    \ has a life cycle, there are many different process variations that encompass\
    \ these steps. Every life cycle model, however, is a variation on two fundamental\
    \ types. In the first type, the project team will generally do a complete life\
    \ cycle – at least steps 2 through 7 – before they go back and start on the next\
    \ version of the product. In the second type, which is more prevalent these days,\
    \ the project team will generally do a partial life cycle – usually steps 3 through\
    \ 5 – and iterate through those steps several times before proceeding to the release\
    \ step.\n\nThese days the management of software development projects generally\
    \ fall into two different types, traditional *plan-driven models*,[¹](#Chapter02.html#CHP-2-FN-1)\
    \ and the newer *agile development* models.[²](#Chapter02.html#CHP-2-FN-2) In\
    \ the plan-driven models, the process tends to be stricter in terms of process\
    \ steps and when releases happen. Plan-driven models have more clearly defined\
    \ phases, and more requirements for sign-off on completion of a phase before moving\
    \ on to the next phase. Plan-driven models require more documentation of each\
    \ phase and verification of completion of each work product. These tend to work\
    \ well for government contracts for new software with well-defined deliverables.\
    \ The agile models are inherently incremental, and make the assumption that small,\
    \ frequent releases produce a more robust product than larger, less frequent ones.\
    \ Phases in agile models tend to blur together more than in plan-driven models,\
    \ and there tends to be less documentation of work products required, the basic\
    \ idea being that code is what is being produced and so documentation efforts\
    \ should focus there. See the Agile Manifesto web page at [http://agilemanifesto.org](http://agilemanifesto.org)\
    \ to get a good feel for the agile development model and goals.\n\nWe'll take\
    \ a look at several life cycle models, both plan-driven and agile, and compare\
    \ them. There is no one best process for developing software. Each project must\
    \ decide on the model that works best for its particular application and base\
    \ that decision on the project domain, the size of the project, the experience\
    \ of the team, and the timeline of the project.\n\n### A Model That's not a Model\
    \ At All: Code and Fix\n\nThe first model of software development we'll talk about\
    \ isn't really a model at all. But it is what most of us do when we're working\
    \ on small projects by ourselves, or maybe with a single partner. It's the *code\
    \ and fix Model*.\n\nThe code and fix model, shown in [Figure 2-1](#Chapter02.html#fig_2_1),\
    \ is often used in lieu of actual project management. In this model there are\
    \ no formal requirements, no required documentation, no quality assurance or formal\
    \ testing, and release is haphazard at best. Don't even think about effort estimates\
    \ or schedules when using this model.\n\nCode and fix says take a minimal amount\
    \ of time to understand the problem and then start coding. Compile your code and\
    \ try it out. If it doesn't work, fix the first problem you see and try it again.\
    \ Continue this cycle of type-compile-run-fix until the program does what you\
    \ want with no fatal errors and then ship it.\n\nEvery programmer knows this model.\
    \ We've all used it way more than once, and it actually works in certain circumstances:\
    \ for quick, disposable tasks. For example, it works well for proof-of-concept\
    \ programs. There's no maintenance involved and the model works well for small,\
    \ single-person programs. It is, however, a *very dangerous* model for any other\
    \ kind of program.\n\nWith no real mention of configuration management, little\
    \ in the way of testing, no architectural planning, and probably little more than\
    \ a desk check of the program for a code review this model is good for quick and\
    \ dirty prototypes and really nothing more. Software created using this model\
    \ will be small, short on user interface niceties, and idiosyncratic.\n\n_____________\n\
    \n¹Paulk, M. C. *The Capability Maturity Model: Guidelines for Improving the Software\
    \ Process.* (Reading, MA: Addison-Wesley, 1995.)\n\n²Martin, R. C. *Agile Software\
    \ Development, Principles, Patterns, and Practices.* (Upper Saddle River, NJ:\
    \ Prentice Hall, 2003.)\n\nThat said, this is a terrific way to do quick and dirty\
    \ prototypes and short, one-off programs. It's useful to validate architectural\
    \ decisions and to show a quick version of a user interface design. Use it to\
    \ understand the larger problem you're working on.\n\n![images](images/0201.jpg)\n\
    \n***Figure 2-1.** The code and fix process (non) model*"
