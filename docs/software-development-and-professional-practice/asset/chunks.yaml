- fmt: "# Design Patterns\n\n> Each pattern describes a problem which occurs over\
    \ and over again in our environment, and then describes the core of the solution\
    \ to that problem, in such a way that you can use this solution a million times\
    \ over, without ever doing it the same way twice.\n>\n> — Christopher Alexander^([1](#Chapter11.html#CH-11-FN-1))\n\
    \nDo you reinvent the wheel each time you write code? Do you have to re-learn\
    \ how to iterate through an array every time you write a program? Do you have\
    \ to re-invent how to fix a dangling else in every function you write? Do you\
    \ need to relearn insertion sort or binary search every time you want to use them?\
    \ Of course not!\n\nOver the time you’ve spent writing programs you’ve learned\
    \ a *set of idioms* that you employ whenever you’re writing code. For example,\
    \ if you need to iterate through all the elements of an array in Java you’re likely\
    \ to do the following:\n\n```\nfor (int i = 0; i < myArray.length; i++) {\n  \
    \  System.out.printf(\" %d \", myArray[i]);\n}\n```\n\nor\n\n```\nfor (int nextElement:\
    \ myArray) {\n    System.out.printf(\" %d \", nextElement);\n}\n```\n\nand the\
    \ code just flows out of your fingertips as you type. These *code patterns* are\
    \ sets of rules and templates for code that you accumulate as you gain more experience\
    \ writing programs.\n\n*Design patterns* are the same thing – but for your design.\
    \ The famous architect Christopher Alexander, in his book *A Pattern Language*,\
    \ defined patterns for design in architecture. The same ideas carry over into\
    \ software design. If you go back and read the Alexander quote at the top of this\
    \ chapter, you’ll see the following three key elements in Alexander’s definition\
    \ of design pattern:\n\n___________________\n\n¹ Alexander, C., S. Ishikawa, et\
    \ al. *A Pattern Language: Towns, Buildings, Construction.* (Oxford, UK: Oxford\
    \ University Press, 1977.)\n\n- *Recurring*: The problem that evokes the design\
    \ pattern must be a common one.\n- *Core solution*: The pattern provides a template\
    \ for the solution; it tries to extract out the essence of the solution.\n- *Reuse*:\
    \ The pattern must be easily reusable when the same problem appears in different\
    \ domains.\n\nIn fact, you’ve already seen at least one design pattern so far\
    \ in this book: the *Model-View-Controller* pattern (MVC) that we discussed in\
    \ [Chapter 5](#Chapter05.html#ch5) is one of the earliest published examples of\
    \ a software design pattern.^([2](#Chapter11.html#CH-11-FN-2)) The MVC design\
    \ pattern is used with programs that use graphical user interfaces. It divides\
    \ the program into three parts: the *Model* that contains the processing rules\
    \ for the program, the *View* that presents the data and the interface to the\
    \ user, and the *Controller* that mediates communication between the *Model* and\
    \ the *View*. In a typical object-oriented implementation, each of these abstractions\
    \ becomes a separate object.\n\nThe *Gang of Four* (Gamma, Helm, Johnson, and\
    \ Vlissides), in their seminal book on design patterns, *Design Patterns: Elements\
    \ of Reusable Object-Oriented Software*,^([3](#Chapter11.html#CH-11-FN-3)) define\
    \ a design pattern as something that “names, abstracts, and identifies the key\
    \ aspects of a common design structure that makes it useful for creating a reusable\
    \ object-oriented design.” In other words, a design pattern is a *named abstraction*\
    \ from a *concrete example* that represents a *recurring* *solution* to a *particular,\
    \ but common, problem –* recurring, core solution, reuse.\n\nBut why do we need\
    \ design patterns in the first place? Why can’t we just get along with the object-oriented\
    \ design principles we studied in [Chapter 10](#Chapter10.html#ch10) and with\
    \ our old favorites, abstraction, inheritance, polymorphism, and encapsulation?\n\
    \nWell, it turns out that design is hard. That’s why. Design for re-use is even\
    \ harder. Design is also much more of an art than a science or an engineering\
    \ discipline. Experienced software designers rarely start from first principles;\
    \ they look for similarities in the current problem to problems they’ve solved\
    \ in the past. And they bring to the design table the set of design idioms that\
    \ they’ve learned over time. Design patterns provide a *shared vocabulary* that\
    \ makes this expert knowledge available to everyone.\n\n## Design Patterns and\
    \ the Gang of Four\n\nIn their book, the Gang of Four describe design patterns\
    \ as having four essential features:\n\n- *The Pattern Name*: “… a handle we can\
    \ use to describe a design problem, its solution, and consequences in a word or\
    \ two. Naming a pattern immediately increases our design vocabulary.”\n- *The\
    \ Problem*: Describes when to use the pattern. “It explains the problem and its\
    \ context.”\n- *The Solution*: “… describes the elements that make up the design,\
    \ their relationships, responsibilities, and collaborations…the pattern provides\
    \ an abstract description of a design problem and how a general arrangement of\
    \ elements solves it.”\n- *The Consequences*: The results and trade-offs of applying\
    \ the pattern to a problem. These include time and space trade-offs, but also\
    \ flexibility, extensibility, and portability, among others.^([4](#Chapter11.html#CH-11-FN-4))\n\
    \n___________________\n\n² Krasner, G. E. and S. T. Pope. “A cookbook for using\
    \ the Model-View-Controller user interface paradigm in Smalltalk-80.” *Journal\
    \ of Object-Oriented Programming* 1(3): 26-49. 1988.\n\n³ Gamma, E., Helm, R.,\
    \ Johnson, R., Vlissides. *Design Patterns: Elements of Reusable Object-Oriented\
    \ Software.* (Boston, MA: Addison-Wesley, 1995.)\n\nDesign patterns are classified\
    \ using two criteria, *scope* and *purpose*. Scope deals with the relationships\
    \ between classes and objects. Static relationships between classes are fixed\
    \ at compile time, whereas, dynamic relationships apply to objects and these relationships\
    \ can change at run-time. Purpose, of course, deals with what the pattern does\
    \ with respect to classes and objects. Patterns can deal with object creation,\
    \ composition of classes or objects, or the ways in which objects interact and\
    \ distribute responsibilities in the program.\n\nThe Gang of Four describe 23\
    \ different design patterns in their book, dividing them into three different\
    \ classes of patterns: *creational*, *structural*, and *behavioral*.\n\n- *Creational*\
    \ *design patterns* are those that deal with when and how objects are created.\
    \ These patterns typically create objects for you, relieving you of the need to\
    \ instantiate those objects directly.\n- *Structural* *design patterns* are those\
    \ that describe how objects are composed into larger groups.\n- *Behavioral* *design\
    \ patterns* generally talk about how responsibilities are distributed in the design\
    \ and how communication happens between objects.\n\nThe list is not meant to be\
    \ complete, and over the 15 years since the publication of the Gang of Four’s\
    \ *Design Patterns* book, many more patterns have been added to this original\
    \ list by developers everywhere. A recent Google search for the phrase “design\
    \ patterns” yielded 2.5 million hits, so lots of object-oriented developers have\
    \ jumped on the design patterns bandwagon.\n\n### The Classic Design Patterns\n\
    \nThe 23 (classic) design patterns described by the Gang of Four are (in the remainder\
    \ of this chapter we’ll go over the six design patterns that are in italics):\n\
    \n**Creational Patterns**\n\n1.  Abstract factory\n2.  Builder\n3.  *Factory Method*\n\
    4.  Prototype\n5.  *Singleton*\n\n**Structural Patterns**\n\n6.  *Adapter*\n7.\
    \  Bridge\n8.  Composite\n9.  Decorator\n10.  Façade\n11.  Flyweight\n12.  Proxy\n\
    \n**Behavioral Patterns**\n\n13.  Chain of responsibility\n14.  Command\n15. \
    \ Interpreter\n16.  *Iterator*\n17.  Mediator\n18.  Memento\n19.  *Observer*\n\
    20.  State\n21.  *Strategy*\n22.  Template method\n23.  Visitor\n\n___________________\n\
    \n⁴ Gamma et. al, 1995.\n\n## Patterns We Can Use\n\nThe six patterns in this\
    \ section are a representative sample of the classic design patterns, and are\
    \ six that you’ll find the most useful right away."
