    \ another. Composition, form, and focus are everything.*\n> \n> —Rebecca Wirfs-Brock\
    \ and Alan McKean^([8](#Chapter09.html#CHP-9-FN-8))\n\nIdentifying objects (or\
    \ object classes) is a difficult part of object-oriented design. There is no ‘magic\
    \ formula’ for object identification. It relies on the skill, experience and domain\
    \ knowledge of system designers (that would be you). Object identification is\
    \ an iterative process. You are not likely to get it right the first time.\n\n\
    You begin finding objects by looking for real-world analogues in your requirements.\
    \ That gets you started, but it's only the first step. Other objects hide in the\
    \ abstraction layers of your domain. Where to find these hidden objects? You can\
    \ look to your own knowledge of the application domain, you can look for operations\
    \ that crop up in your requirements and in your architectural concepts of the\
    \ system. You can even look to your own past experience designing other systems.\n\
    \n__________\n\n⁷ Martin, 2009.\n\n⁸ Wirfs-Brock, R. and A. McKean. *Object Design:\
    \ Roles Responsibilities, and Collaborations.* (Boston, MA, Addison-Wesley, 2003).\n\
    \nSteps to finding candidate objects in your system:\n\n1.  ***Write a set of\
    \ use cases*** describing how the application will work for a number of different\
