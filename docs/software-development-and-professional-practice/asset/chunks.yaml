    \ block boundaries” style works well for most block-structured languages.\n\n\
    *   Use more parentheses than you think you’ll need. I especially use parentheses\
    \ around all my arithmetic expressions – mostly just to make sure I haven’t screwed\
    \ up the precedence rules. `fx = ((a + b) * (c + d)) / e;`\n*   Format single\
    \ statement blocks consistently. Using the emulating block-boundaries technique:\
    \ `if (average > MIN_AVG) {`\n    `     avg = MIN_AVG;`\n    `}`\n*   For complicated\
    \ conditional expressions, put separate conditions on separate lines. `if ((’0’\
    \ <= inChar && inChar <= ’9’) ||`\n    `     (’a’ <= inChar && inChar <= ’z’)\
    \ ||`\n    `     (’A’ <= inChar && inChar <= ’Z’)) {`\n    `          mytext.addString(inChar);`\n\
    \    `          mytext.length++;`\n    `}`\n*   Wrap individual statements at\
    \ column 70 or so. This is a holdover from the days of 80-column punch cards,\
    \ but it’s also a great way to make your code more readable. Having very long\
    \ lines of code forces your readers to scroll horizontally, or it makes them forget\
    \ what the heck was at the beginning of the line!\n*   Don’t use `goto`, no matter\
    \ what Don Knuth says.^([6](#Chapter12.html#CH-12-FN-6)) Some languages, like\
    \ Java, don’t even have `goto` statements. Most don’t need them (assembly languages\
    \ excepted). Take the spirit of Knuth’s paper and only use `goto`s where they\
    \ make real sense and make your program more readable and understandable.\n* \
    \  Use only one statement per line. (Do not write code as if you were entering\
    \ the annual International Obfuscated C Code Contest! [`www.ioccc.org.`](http://www.ioccc.org.))\
    \ This `g.setColor(Color.blue); g.fillOval(100, 100, 200, 200);`\n    `mytext.addString(inChar);mytext.length++;System.out.println();`\n\
    \n__________\n\n⁶ Knuth, D. “Structured Programming with goto Statements.” *ACM\
    \ Computing Surveys* 6(4): 261-301\\. 1974.\n\n*   is legal, but just doesn’t\
    \ look good, and it’s easy to just slide right over that statement in the middle.\
    \ This `g.setColor(Color.blue);`\n    `g.fillOval(100, 100, 200, 200);`\n\n  \
    \  `mytext.addString(inChar);`\n    `mytext.length++`\n    `System.out.println();`\n\
    *   looks much, much better.\n\n### Declaration Style Guidelines\n\nJust like\
    \ in writing executable code, your variable declarations need to be neat and readable.\n\
    \n*   Use only one declaration per line. Well, I go both ways on this one. While\
    \ I think that `int max,min,top,left,right,average,bottom,mode;`\n*   is a bit\
    \ crowded; I’d rewrite this as `int max, min;`\n    `int top, bottom;`\n    `int\
    \ left, right;`\n    `int average, mode;`\n*   Not one per line, but the variables\
    \ that are related are grouped together. That makes more sense to me.\n*   Declare\
    \ variables close to where they are used. Most procedural and object-oriented\
    \ programming languages have a *declaration before use* rule, requiring that you\
    \ declare a variable before you can use it in any expression. In the olden days,\
    \ say in Pascal, you had to declare variables at the top of your program (or subprogram)\
    \ and you couldn’t declare variables inside blocks. This had the disadvantage\
    \ that you might declare a variable pages and pages before you’d actually use\
    \ it. (But see the section later in this chapter where I talk about how long your\
    \ functions should be.)\n*   These days you can normally declare variables in\
    \ any block in your program. The scope of that variable is the block in which\
    \ it is declared and all the blocks inside that block.\n*   This tip says that\
    \ it’s a good idea to declare those variables in the closest block in which they\
    \ are used. That way you can see the declaration and the use the variables *right\
    \ there*.\n*   Order declarations sensibly\n    *   Group by types and usage (see\
    \ the previous example).\n    *   Use white space to separate your declarations.\
    \ Once again, white space is your friend. The key idea in these last couple of\
    \ tips is to make your declarations visible and to keep them near the code where\
    \ they will be used.\n*   Don’t nest header files – ever! (This is for you C and\
    \ C++ programmers.) Header files are designed so that you only need to define\
    \ constants, declare global variables, and declare function prototypes once, and\
    \ you can then re-use the header file in some (possibly large) number of source\
    \ code files. Nesting header files hides some of those declarations inside the\
    \ nested headers. This is bad – because visibility is good. It allows you to erroneously\
    \ include a header file more than once, which leads to redefinitions of variables\
    \ and macros and errors.\n\n    The only header files you might nest in your own\
    \ header files are system headers like stdio.h or stdlib.h and I’m not even sure\
    \ I like that.\n\n*   Don’t put source code in your header files – ever! (Again,\
    \ this is for you C and C++ programmers.) Headers are for declarations, not for\
    \ source code. Libraries are for source code. Putting a function in a header file\
    \ means that the function will be re-defined every place you include the header.\
    \ This can easily lead to multiple definitions – which the compiler may not catch\
    \ until the link phase. The only source that should be in your headers are macro\
    \ definitions in `#define` pre-processor statements and even those should be used\
    \ carefully.\n\n### Commenting Style Guidelines\n\nJust like white space, comments\
    \ are your friend. Every programming book in existence tells you to put comments\
    \ in your code – and none of them (including this one) tell you just where to\
    \ put comments, and what a good comment should look like. That’s because how to\
    \ write good, informative comments falls in the “it depends” category of advice.\
    \ A good, informative comment depends on the *context* in which you are writing\
    \ it, so general advice is pretty useless. The only good advice about writing\
    \ comments is – just do it. Oh, and since you’ll change your code – do it again.\
    \ That’s the second hardest thing about comments – keeping them up to date. So\
    \ here’s my piece of advice, write comments when you first write your program.\
    \ This gives you an idea of *where* they should be. Then, when you finish your\
    \ unit testing of a particular function, write a final set of comments for that\
    \ function by updating the ones that are already there. That way, you’ll come\
    \ pretty close to having an up-to-date set of comments in the released code.\n\
    \n*   Indent a comment with its corresponding statement. This is important for\
    \ readability because then the comment and the code line up. `/* make sure we\
    \ have the right number of arguments */`\n    `if (argc < 2) {`\n    `    fprintf(stderr,\
    \ \"Usage: %s <filename>\\n\", argv[0]);`\n    `    exit(1);`\n    `}`\n*   Set\
    \ off block comments with blank lines. Well, I go both ways on this one. If you\
    \ line up the start and end of the block comments on lines by themselves, then\
    \ you don’t need the blank lines. If, on the other hand, you stick the end of\
    \ comment marker at the end of a line, you should use a blank line to set it apart\
    \ from the source code. So if you do this `/*`\n    ` * make sure we have the\
    \ right number of arguments`\n    ` * from the command line`\n    ` */`\n    `if\
    \ (argc < 2) {`\n    `    fprintf(stderr, \"Usage: %s <filename>\\n\", argv[0]);`\n\
    \    `    exit(1);`\n    `}`\n    *   you don’t need the blank line; but if you\
    \ do `/* make sure we have the right number of arguments`\n        `   from the\
    \ command line */`"
  trans: "\n### 代码块与语句风格指南\n\n如前所述，“模拟代码块边界”的风格对大多数块结构语言都很适用。\n\n*   使用比你认为需要的更多的括号。我尤其会在所有算术表达式周围使用括号——主要是为了确保我没有搞错优先级规则。`fx\
    \ = ((a + b) * (c + d)) / e;`\n*   统一格式化单语句块。使用模拟代码块边界技术：`if (average > MIN_AVG)\
    \ {`\n    `     avg = MIN_AVG;`\n    `}`\n*   对于复杂的条件表达式，将不同条件放在不同行上。`if ((’0’\
    \ <= inChar && inChar <= ’9’) ||`\n    `     (’a’ <= inChar && inChar <= ’z’)\
    \ ||`\n    `     (’A’ <= inChar && inChar <= ’Z’)) {`\n    `          mytext.addString(inChar);`\n\
    \    `          mytext.length++;`\n    `}`\n*   将单条语句在第 70 列左右换行。这是 80 列穿孔卡片时代的遗留习惯，但它也是让代码更易读的好方法。过长的代码行会迫使读者水平滚动，或者让他们忘记行首到底写了什么！\n\
    *   不要使用`goto`，不管唐·克努特怎么说。^(6) 有些语言，比如 Java，甚至没有`goto`语句。大多数语言都不需要它（汇编语言除外）。请领会克努特论文的精神，只在真正有意义且能让程序更易读、更易懂的地方使用`goto`。\n\
    *   每行只写一条语句。（不要像参加年度国际混乱 C 代码大赛那样写代码！[`www.ioccc.org.`](http://www.ioccc.org)）像\
    \ `g.setColor(Color.blue); g.fillOval(100, 100, 200, 200);`\n    `mytext.addString(inChar);mytext.length++;System.out.println();`\n\
    \n__________\n\n⁶ Knuth, D. “Structured Programming with goto Statements.” *ACM\
    \ Computing Surveys* 6(4): 261-301\\. 1974.\n\n*   这种写法虽然合法，但看起来并不美观，而且很容易忽略中间那条语句。而像这样\
    \ `g.setColor(Color.blue);`\n    `g.fillOval(100, 100, 200, 200);`\n\n    `mytext.addString(inChar);`\n\
    \    `mytext.length++`\n    `System.out.println();`\n*   看起来就好得多。\n\n### 声明风格指南\n\
    \n就像编写可执行代码一样，你的变量声明也需要整洁且易读。\n\n*   每行只声明一个变量。嗯，对于这一点我持两种态度。虽然我认为 `int max,min,top,left,right,average,bottom,mode;`\n\
    *   有点拥挤；我会将其重写为 `int max, min;`\n    `int top, bottom;`\n    `int left, right;`\n\
    \    `int average, mode;`\n*   虽然不是每行一个，但相关的变量被分组在一起。这对我来说更有意义。\n*   在靠近变量使用的地方声明它们。大多数过程式和面向对象编程语言都有*先声明后使用*的规则，要求你在任何表达式中使用变量之前必须先声明它。在过去，比如在\
    \ Pascal 中，你必须在程序（或子程序）的顶部声明变量，并且不能在代码块内部声明变量。这有一个缺点：你可能在真正使用变量之前好几页就声明了它。（但请参阅本章后面关于函数应该有多长的部分。）\n\
    *   如今，你通常可以在程序的任何代码块中声明变量。该变量的作用域就是它被声明的那个代码块，以及该代码块内部的所有子代码块。\n*   这条建议指出，最好在变量被使用的最内层代码块中声明它们。这样你就可以*就在那里*看到声明和变量的使用。\n\
    *   合理地排列声明顺序\n    *   按类型和用途分组（参见前面的示例）。\n    *   使用空白行分隔你的声明。再次强调，空白行是你的朋友。最后这几条建议的核心思想是让你的声明可见，并让它们靠近将要使用它们的代码。\n\
    *   永远不要嵌套头文件！（这是针对 C 和 C++程序员的。）头文件的设计初衷是让你只需定义一次常量、声明一次全局变量和函数原型，然后就可以在（可能大量的）源代码文件中重复使用该头文件。嵌套头文件会将其中一些声明隐藏在嵌套的头文件内部。这很糟糕——因为可见性是好事。它可能导致你错误地多次包含同一个头文件，从而引发变量、宏的重定义和错误。\n\
    \n    你可能在自己的头文件中嵌套的唯一头文件是系统头文件，比如 `stdio.h` 或 `stdlib.h`，而且我甚至不确定我是否喜欢这种做法。\n\
    \n*   永远不要将源代码放在头文件中！（再次强调，这是针对 C 和 C++程序员的。）头文件用于声明，而不是用于源代码。库才用于存放源代码。将函数放在头文件中意味着每次包含该头文件时，该函数都会被重新定义。这很容易导致多重定义——编译器可能直到链接阶段才会发现。头文件中唯一应该包含的源代码是`#define`预处理语句中的宏定义，而且即使是这些宏定义也应该谨慎使用。\n\
    \n### 注释风格指南\n\n就像空白行一样，注释是你的朋友。现有的每一本编程书都告诉你要在代码中添加注释——但没有一本（包括本书）会告诉你具体在哪里添加注释，以及好的注释应该是什么样子。这是因为如何编写好的、信息丰富的注释属于“视情况而定”的建议类别。一条好的、信息丰富的注释取决于你编写它的*上下文*，所以泛泛的建议几乎毫无用处。关于编写注释的唯一好建议就是——去写吧。哦，还有，既然你会修改代码——那就再写一次。这是关于注释的第二难的事情——保持它们是最新的。所以我的建议是，在第一次编写程序时就写注释。这会让你对注释应该放在*哪里*有个概念。然后，当你完成某个特定函数的单元测试后，通过更新已有的注释来为该函数编写最终的注释集。这样，你就能在发布的代码中拥有一套相当接近最新的注释。\n\
    \n*   将注释与其对应的语句对齐缩进。这对可读性很重要，因为这样注释和代码就能对齐。`/* make sure we have the right number\
    \ of arguments */`\n    `if (argc < 2) {`\n    `    fprintf(stderr, \"Usage: %s\
    \ <filename>\\n\", argv[0]);`\n    `    exit(1);`\n    `}`\n*   用空行将块注释分隔开。嗯，对于这一点我持两种态度。如果你将块注释的开始和结束标记各自放在单独的行上并对齐，那么就不需要空行。另一方面，如果你将注释结束标记放在一行的末尾，那么你应该使用一个空行将其与源代码分隔开。所以如果你这样做\
    \ `/*`\n    ` * make sure we have the right number of arguments`\n    ` * from\
    \ the command line`\n    ` */`\n    `if (argc < 2) {`\n    `    fprintf(stderr,\
    \ \"Usage: %s <filename>\\n\", argv[0]);`\n    `    exit(1);`\n    `}`\n    *\
    \   你就不需要空行；但如果你这样做 `/* make sure we have the right number of arguments`\n   \
    \     `   from the command line */`\n"
- fmt: "```c\nif (argc < 2) {\n    fprintf(stderr, \"Usage: %s <filename>\\n\", argv[0]);\n\
    \    exit(1);\n}\n```\n*   then you do (but I wouldn’t recommend this style in\
    \ the first place).\n*   Don’t let comments wrap – use block comments instead.\
    \ This usually occurs if you tack a comment onto the end of a line of source code\
    \ `if (argc < 2) { // make sure we have the right number of arguments from the\
    \ command line`\n*   Don’t do this. Make this a block comment above the `if` statement\
    \ instead (see the bullet point above). It’s just way easier to read.\n*   All\
    \ functions/methods should have a header block comment. The purpose of this bit\
    \ of advice is so that your reader knows what the method is supposed to do. The\
    \ necessity of this is mitigated if you use good identifier names for the method\
    \ name and the input parameters. Still, you should tell the user what the method\
    \ is going to do and what the return values, if any are. See the tip below for\
    \ the version of this advice for Java programmers. In C++ we can say: `#include\
    \ <string>`\n    ```c\n    /*\n     * getSubString() - get a substring from the\
    \ input string.\n     *  The substring starts at index start\n     *  and goes\
    \ up to but doesn’t include index stop.\n     *  returns the resulting substring.\n\
    \     */\n    string getSubString(string str, int start, int stop) { }\n    ```\n\
    *   In Java use JavaDoc comments for all your methods. JavaDoc is built into the\
    \ Java environment and all Java SDKs come with the program to generate JavaDoc\
    \ web pages, so why not use it? JavaDoc can provide a nice overview of what your\
    \ class is up to at very little cost. Just make sure and keep those comments up\
    \ to date!\n    ```java\n    /**\n     * getSubString() - get a substring from\
    \ the input string.\n     *      The substring starts at index start\n     * \
    \     and goes up to but doesn’t include index stop.\n     *  @param str the input\
    \ string\n     *  @param start the integer starting index\n     *  @param stop\
    \ the integer stopping index\n     *  @return the resulting substring.\n     */\n\
    \    String getSubString(String str, int start, int stop) { }\n    ```\n*   Use\
    \ fewer, but better comments. This is one of those useless motherhood and apple\
    \ pie pieces of advice that everyone feels obliged to put in any discussion of\
    \ comments. OK, so you don’t need to comment ever line of code. Everyone knows\
    \ that `index = index + 1;      // add one to index`\n    *   is pretty stupid.\
    \ So don’t do it. Enough said.\n*   “Self-documenting code” is an ideal. Self\
    \ documenting code is the Holy Grail of lazy programmers who don’t want to take\
    \ the time to explain their code to readers. Get over it. Self documenting code\
    \ is the Platonic ideal of coding that assumes that everyone who reads your code\
    \ can also read your mind. If you have an algorithm that’s at all complicated,\
    \ or input that is at all obscure, you need to explain it. Don’t depend on the\
    \ reader to grok every subtlety of your code. Explain it. Just do it.\n\n### Identifier\
    \ Naming Conventions\n\nAs Rob Pike puts it so well in his terrific white paper\
    \ on programming style, “Length is not a virtue in a name; clarity of expression\
    \ *is*.”^([7](#Chapter12.html#CH-12-FN-7)) As Goldilocks would put it, you need\
    \ identifier names that are not too long, not too short, but just right. Just\
    \ like comments, this means different things to different people. Common sense\
    \ and readability should rule.\n\n*   All identifiers should be descriptive.\n\
    \    Remember, someday you may be back to look at your code again. Or, if you’re\
    \ working for a living, somebody else will be looking at your code. Descriptive\
    \ identifiers make it much, much easier to read your code and figure out what\
    \ you were trying to do at 3:00 AM. A variable called `interestRate` is much easier\
    \ to understand than `ir`. Sure, `ir` is shorter and faster to type, but believe\
    \ me, you’ll forget what it stood for about 10 minutes after you ship that program.\
    \ Reasonably descriptive identifiers can save you a lot of time and effort.\n\
    *   `OverlyLongVariableNamesAreHardToRead` (and type)\n    On the other hand,\
    \ don’t make your identifiers too long. For one thing they are hard to read, for\
    \ another they don’t really add anything to the context of your program, they\
    \ use up too much space on the page, and finally, they’re just plain ugly.\n\n\
    __________\n\n⁷ Pike, Rob, *Notes on Programming in C*, retrieved from [`http://www.literateprogramming.com/pikestyle.pdf`](http://www.literateprogramming.com/pikestyle.pdf)\
    \ on 29 September 2010\\. 1999.\n\n*   `Andtheyareevenharderwhenyoudontincludeworddivisions`\n\
    \    Despite what Rob Pike says [Pike80, p. 2], using camel case (those embedded\
    \ capital letters that begin new words in your identifiers) can make your code\
    \ easier to read. Especially if the identifier isn’t overly long. At least to\
    \ me, `maxPhysAddr` is easier to read than `maxphysaddr`.\n*   And single-letter\
    \ variable names are cryptic, but useful.\n\nUsing single letter variable names\
    \ for things like mortgage payments, window names, or graphics objects is not\
    \ a good example of readability. `M`, `w`, and `g` don’t mean anything even in\
    \ the context of your code. `mortpmnt`, `gfxWindow`, `gfxObj` have more meaning.\
    \ The big exception here is variables intended as index values – loop control\
    \ variables and array index variables. Here, `i`, `j`, `k`, `l`, `m`, etc. are\
    \ easily understandable, although I wouldn’t argue about using `index`, or `indx`\
    \ instead.\n\n```java\nfor (int i = 0; i < myArray.length; i++) {\n    myArray[i]\
    \ = 0;\n}\n```\n*   looks much better and is just as understandable as\n```java\n\
    for (int arrayIndex = 0; arrayIndex < myArray.length; arrayIndex++) {\n    myArray[arrayIndex]\
    \ = 0;\n}\n```\n*   Adhere to the programming language naming conventions when\
    \ they exist.\n    *   Somewhere, sometime, you’ll run into a document called\
    \ Style Guide or something like that. Nearly every software development organization\
    \ of any size has one. Sometimes you’re allowed to violate the guidelines, and\
    \ sometimes during a code review you’ll get dinged for not following the guidelines\
    \ and have to change your code.\n    *   If you work in a group with more than\
    \ one developer, style guidelines are a good idea. They give all your code a common\
    \ look and feel and they make it easier for one developer to make changes to code\
    \ written by somebody else.\n    *   A common set of guidelines in a Style Guide\
    \ is about naming conventions. Naming conventions tell you what your identifier\
    \ names should look like for each of the different kind of identifiers. Java has\
    \ a common set of naming conventions:\n    *   For classes and interfaces: The\
    \ identifier names should be nouns, using both upper and lowercase alphanumerics\
    \ and with the first character of the name capitalized.\n        ```java\n   \
    \     public class Automobile {}\n        public interface Shape {}\n        ```\n\
    \    *   For methods: The identifier names should be verbs, using both upper and\
    \ lowercase alphanumerics and with the first character of the name in lower case.\n\
    \        ```java\n        private double computeAverage(int [] list)\n       \
    \ ```\n    *   For variables: The identifier names should use both upper and lowercase\
    \ alphanumerics, with the first character of the name in lower case. Variable\
    \ names should not start with `$` or `_` (underscore).\n        ```java\n    \
    \    double average;\n        String firstSentence;\n        ```\n    *   For\
    \ all identifiers (except constants), camel case should be used, so that internal\
    \ words are capitalized.\n        ```java\n        long myLongArray;\n       \
    \ ```\n    *   For constants: All letters should be uppercase and words should\
    \ be separated by underscores.\n        ```java\n        static final int MAX_WIDTH\
    \ = 80;\n        ```"
