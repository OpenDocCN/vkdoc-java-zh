    If you’ve programmed in Java, you have seen iterators. We’ll get to that, but
    let''s start at the beginning. If you have a *collection of elements*, you can
    organize them in many different ways. They can be arrays, linked lists, queues,
    hash tables, sets, and so on. Each of these collections will have its own unique
    set of operations, but there’s usually one operation that you might want to perform
    on all of them – *traverse the entire collection from beginning to end, one element
    at a time*. Oh, and you want to traverse the elements in such a way that *you
    don’t need to know the internal structure of the collection*. And you may want
    to be able to traverse the collection backwards, and you may want to have several
    traversals going on at the same time.


    That’s what the Iterator pattern is for.^([9](#Chapter11.html#CH-11-FN-9)) The
    Iterator pattern creates an object that allows you to traverse a collection, one
    element at a time.


    Because of the requirement that you don’t need to know about the internal structure
    of the collection, an Iterator object doesn’t care about sorting order; it just
    returns each object as it’s stored in the collection, one at a time from first
    to last. The simplest iterator needs just two methods


    *   *`hasNext()`*: Which returns a true if there is an element to be retrieved,
    i.e. we’ve not reached the end of the collection yet; and false if there’s no
    elements left.

    *   *`getNextElement()`*: Which returns the next element in the collection.


    ___________________


    ⁹ Gamma et. al, 1995.


    In the Iterator Pattern, we have an Iterator interface that is implemented to
    make a concrete Iterator object that is used by a concrete Collections object.
    Both of these are used by a client that creates the Collection and gets the iterator
    from there. [Figure 11-4](#Chapter11.html#fig_11_4) is the UML version of this
    from Gamma et. al.


