  trans: '

    ### 需求挖掘


    大多数软件工程文本使用“需求获取”这个短语来谈论让用户告诉你他们想要什么的过程。亨特和托马斯在他们的著作《程序员修炼之道》中使用了更具描述性的短语“需求挖掘”，以强调你真正要做的是挖掘那些你的客户自己都还不知道他们想要的需求。^(7)
    亨特和托马斯还对需求、策略和实现做出了绝妙的区分，以此来说明需求挖掘的过程。


    例如，“系统必须让用户选择贷款期限”是一个简洁明了的需求。它表明有某件事是你必须去做的。它对于实现来说还不够具体，但它告诉了开发者一些必须构建的具体内容。


    “贷款期限必须在 6 个月到 30 年之间”并不是一个需求，尽管它看起来有点像。这个陈述是一个*业务策略*的例子。当这样的陈述作为需求呈现给开发者时，他们倾向于将其硬编码到程序中。错，错，错。像这样的策略可能会改变，所以你需要非常小心地将业务策略放入你的需求中。通常情况下，你需要实现一个比所陈述的业务策略更通用的版本。真正的需求可能类似于“贷款期限是有限的，但贷款的长度会因贷款类型而异”。这告诉你，你可能需要构建一个表驱动的子系统来处理这个特性。这样，特定类型贷款的期限就可以通过修改数据表中的单个条目来改变，而代码完全不需要改动。


    “用户必须能够使用下拉列表框选择贷款期限”也不是一个需求，尽管它可能看起来像一个。只有当客户绝对必须有一个下拉菜单来选择他们的贷款期限时，这才是一个需求。否则，这只是客户希望看到的实现的一个例子，它可能不是一个需求。正如亨特和托马斯在他们的书中所说，“发现用户做某件事的*根本原因*，而不仅仅是他们*当前做这件事的方式*，这一点非常重要。归根结底，你的开发必须解决他们的*业务问题*，而不仅仅是满足他们陈述的需求。记录需求背后的原因，将为你的团队在日常实现决策中提供宝贵的信息。”


    ____________________________


    ⁷ Hunt, A. and D. Thomas. *The Pragmatic Programmer: From Journeyman to Master*.
    (Boston, MA: Addison-Wesley, 2000.)


    ### 为什么需求挖掘很困难


    从客户那里挖掘需求是一项非常困难的工作，原因有几个。我们来看几个。


    ##### 范围问题


    很多时候，你的程序实际应该做什么的边界是模糊的。这可能是由几个原因造成的。程序可能是一个更大系统的一部分，而各个部分的集成定义不清。客户可能没有想清楚他们到底希望程序做什么，所以他们开始抛出各种各样的想法，其中许多甚至可能不适用于当前的问题。最后，客户可能陷入了实现层面的思考，并提供了不必要的细节层次。


    要克服范围问题，需要大量的耐心、纪律、反复说“不”，以及反复问“为什么这需要成为程序的一部分？”。范围与需求蔓延直接相关，所以要当心。


    ##### 理解问题


    让我们面对现实吧；客户和你作为开发者说的是不同的语言。你的客户是领域专家，他们说领域语言（应收账款、应付账款、对账、总账等等）。你说的是设计和实现语言（类、对象、方法、用例、递归、活动记录等等）。这通常比一个美国人在巴黎还要糟糕；至少在那里，双方都可以通过比划来表达需求并弄清楚事情。而对于领域理解的问题，你通常最多只能和对方一起点杯饮料。


    通常有两种方法可以克服理解问题。第一种是让一个在双方领域都待过、能在两者之间进行翻译的人居中协调。一些公司有被称为*系统工程师*或*技术营销人员*的人来扮演这个角色。这些人做过开发，也处理过客户方面的事务，所以他们能说两种语言。优秀的系统工程师的价值堪比用例。第二种促进理解的方法是让客户成为开发团队的一部分。这是一些敏捷方法论（特别是
    XP）所采用的方法。当客户成为开发团队的一部分时，你可以每天与他们交谈，向他们提问，教他们技术知识。双方都受益。而且，因为现场客户能在中间产品一从构建机器中出来时就立即看到，你就能得到即时反馈。赢，赢，赢。


    ##### 易变性问题


    事情会变。这是需求收集和分析中最困难的部分，也是导致进度延误的最大原因。你对此无能为力。习惯它吧。正如 Kent Beck 所说，“拥抱变化。”你能做的是*管理*变化。创建一个新功能积压列表，当新功能出现时就添加进去。在
    Scrum 方法论中，新需求总是被添加到发布积压列表中，而不是添加到当前迭代中；这允许当前的冲刺正常进行，所有需求都在冲刺结束时进行评审。另一种管理变化的方法是把决定权推给用户；给用户一个选择——“如果我们实现这个新功能，将会给进度增加
    6 周时间。你还想要它吗？”或者，“如果你想保持原定进度，我们只能实现并测试 A、B、C 中的其中一个。你选择你最想要的那个。”这就是敏捷人士所说的“勇气”的含义之一；^(8)
    有时候你必须坚持立场，选择对整个项目最有利的方案。


    ##### 非技术问题


    从开发者的角度来看，与需求相关的非技术问题是你将遇到的最糟糕的问题。事实上，这些是开发者永远不应该看到的问题；他们的经理应该保护他们免受非技术问题的困扰。非技术性的需求问题本质上是政治性的。例子比比皆是。组织中的一个客户群体对程序需求的看法与另一个群体不同。或者更糟，一个经理的看法与另一个经理不同。正在开发的程序将通过自动化某个部门曾经是唯一来源的功能来削弱该部门的影响力。该程序将把数据处理分散到多个部门，而以前这些处理集中在一个部门。这样的例子不胜枚举。对于非技术问题，最好的建议是——赶紧跑。让你的副总裁去处理；这就是为什么她拿高薪的原因。

    '
- fmt: '### Analyzing the Requirements


    Once you''ve written down a set of requirements you need to make sure that these
    are the right requirements for the program; you need to *analyze* them. Analysis
    has three basic parts.


    First, you *categorize* the requirements and organize them into related areas.
    This will help the designers a lot.


    Second, you *prioritize* them based on customer input. This is critical because
    you won''t be able to implement all the requirements in the first product release
    (trust me, you won''t). So this prioritized list will be what you''ll use to set
    the contents of each interim release.


    Lastly, you need to *examine* each requirement in relation to all the others to
    make sure they fit into a coherent whole. Ask yourself a series of questions:


    1. Is each requirement *consistent* with the overall project objective? If your
    program is supposed to sell your users books, it doesn''t also have to compute
    their golf handicap.

    2. Is this requirement *really necessary*? Have you added something that can be
    removed without impairing the essential functionality of the program? If your
    first release is supposed to allow users to buy books, then you probably don''t
    need to also allow them to buy sailboats.

    3. Is this requirement *testable*? This is probably the most important question
    when you''re doing requirements analysis. If you cannot figure out how to test
    a requirement, then you cannot know that you''ve implemented it correctly or that
    you are finished. All requirements *must* be testable, or else they are not requirements.
    In most agile methodologies, the rule is to write the test first, then write the
    code.

    4. Is this requirement *doable* in the technical environment you''ve got to work
    in? This question normally applies to those non-functional requirements mentioned
    previously. Are your requirements feasible given the particular target platform
    or set of hardware constraints you must work under for this project? For example,
    if your target platform is a Macintosh running OS X, a requirement that the `DirectX`
    graphics library be used is not doable because `DirectX` is a Windows only library.

    5. Is this requirement *unambiguous*? Your requirements need to be as precise
    as possible (refer to the previous testable questions), because as sure as you''re
    sitting here reading this, someone will misinterpret an ambiguous requirement
    and you''ll discover the error the day after you ship. Your requirements should
    never contain the words “or” or “may.”


    ____________________________


    ⁸ Beck, K. *Extreme Programming Explained: Embrace Change*. (Boston, MA: Addison-Wesley,
    2000.)


    ### Conclusion


    Once you''re done with your functional spec and the analysis of your requirements
    you''re done with the requirements phase, right. Well, of course not. As we''ve
    said before – requirements change. So relax, don''t obsess about the requirements,
    do the best you can to get an initial list of clear, testable requirements and
    then move on to design. You''ll always come back here later.


    ## C H A P T E R 5


    ## Software Architecture


    > *What do we mean by a software architecture? To me the term architecture conveys
    a notion of the core elements of the system, the pieces that are difficult to
    change. A foundation on which the rest must be built.*

    >

    > —Martin Fowler^([1](#Chapter05.html#CHP-05-FN-1))


    Once you have an idea of *what* you''re going to build, then you can start thinking
    about *how* you''re going to build it. Of course, you''ve already been thinking
    about this from the very first requirement, but now you have permission to do
    it. Now we begin to delve into design.


    There are really two levels of software design. The level we normally think of
    when we''re writing programs is usually called *detailed design*. What operations
    do we need? What data structures? What algorithms are we using? How is the database
    going to be organized? What does the user interface look like? What are the calling
    sequences? These are all very detailed questions that need to be answered before
    you can really get on with the detailed work of coding (well, sort of – we''ll
    get to that later).


    But there''s another level of design. This kind of design is all about *style*.
    If you were building a house, this design level asks questions like ranch or multi-story?
    Tudor or Cape Cod? Which direction do the bedroom windows face? Forced-air or
    hot-water heat? Three bedrooms or four? Open concept floor plan or closed? These
    questions focus somewhat on details, but they are much more about the style of
    the house and how you''ll be using it, rather than things like 12 or 14 gauge
    wire for the electrical system or the diameter of the air conditioning ductwork.
    This emphasis on style is what *software architecture* is all about. As Fowler
    says in this chapter''s opening quote, you need the foundation before you can
    build the rest of the structure. Software architecture is a set of ideas that
    tells you which foundation is the right one for your program.


    The idea of software architecture began as a response to the increasing size and
    complexity of programs. “As the size and complexity of software systems increases,
    the design problem goes beyond the algorithms and data structures of the computation:
    designing and specifying the overall system structure emerges as a new kind of
    problem.... This is the software architecture level of design.”^([2](#Chapter05.html#CHP-05-FN-2))
    However it is really the case that *all* programs of any size and complexity have
    an architecture. It''s just that for larger programs you need to be more intentional
    about your thinking about the architecture to make sure you have the right set
    of architectural patterns incorporated in your system design. You need to do this.
    It''s so much harder to change things at the architectural level once the program
    has been written, because architectural features are so fundamental to the structure
    of the program.


    ____________________________


    ¹ “Is Design Dead?” Retrieved from [http://martinfowler.com/articles/designDead.html](http://martinfowler.com/articles/designDead.html)


    ² Garlan, D. and M. Shaw (1994). An Introduction to Software Architecture. Pittsburgh,
    PA: Carnegie Mellon University: 49. CMU/SEI-94-TR-21. (1994)


    There are many different styles of software architecture, and in any given project
    you''ll probably use more than one. The architectural style used for a program
    depends on what it is you''re doing. As we''ll see, different types of programs
    in different domains will lead us to different architectural styles; we can also
    call these *architectural patterns* since they have many characteristics of the
    *design patterns* we''ll see shortly. First let''s get some general vocabulary
    under our belts.


    ### General Architectural Patterns


    Whenever a software architect starts thinking about an architecture for a program,
    she usually starts by drawing pictures. Diagrams of the architecture allow people
    to see the structure and framework of the program much more easily than text.
    Software architectures are normally represented as black box *graphs* where graph
    nodes are *computational structures* and the graph edges are *communication conduits*
    between the structures. The conduits can represent data flow, object message passing,
    or procedure calls. Notations of this type vary and there are several standard
    notations, notably the United Modeling Language (`UML`). Visual descriptions of
    architectures are generally easier to understand. A particular architectural style
    is a pattern that can represent a set of similar structures. Let''s looks at several
    different common architectural styles.'
