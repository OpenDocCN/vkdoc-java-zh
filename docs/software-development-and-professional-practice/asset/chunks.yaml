  trans: "\n### 接下来该做什么？\n\n既然你已经阅读了所有关于软件开发的内容，或许还尝试了一些示例，那么接下来该做什么呢？你如何才能成为一名更优秀的软件开发人员？这里有一些建议。\n\
    \n**编写代码，编写大量代码：** 经验大有裨益。编程是一门需要练习和不断强化的手艺。你很可能需要每隔十年左右学习一套全新的工具和编程语言。因此，编写大量代码会让这项任务变得更容易。\n\
    \n**学习简单的工具：** 简单的工具能为你提供灵活性。它们还能帮助你掌握基本技能，然后你可以将这些技能应用到更复杂的 IDE 中。当这些 IDE 被取代时（这是必然的），你可以退回到使用简单的工具，直到你学会新的\
    \ IDE。\n\n**阅读关于问题解决和设计的书籍：** 人类解决问题已有数千年历史，而设计事物也几乎同样悠久。其他领域的著作可以传达通用的解决问题的策略，这些策略同样适用于软件开发。不要忽视波利亚的《怎样解题》一书。这本书是为解决数学问题而写的，但它非常、非常适用于软件领域。^(7)\
    \ 同样，也不要忽视计算机科学文献中的经典著作，比如戴克斯特拉的《结构化编程》^(8)、布鲁克斯的经典之作《人月神话》^(9)、本特利的《编程珠玑》^(10)、麦康奈尔的《快速软件开发》^(11)，以及贝克的《解析极限编程》^(12)。\n\
    \n**阅读关于编程和程序员的书籍：** 关于编程的文献浩如烟海。前几章已经提到了不少书籍。其中值得再次提及的是亨特和托马斯的《程序员修炼之道》^(13)\
    \ 以及麦康奈尔的《代码大全 2》^(14)。了解其他程序员是如何工作的也是一个好主意。关于优秀程序员如何思考、工作以及通常如何编写优秀代码的计算机文献正在发展。两本值得注意的书是拉默斯的《编程大师访谈录》^(15)\
    \ 以及奥拉姆和威尔逊合编的《代码之美》^(16)。\n\n__________\n\n⁷ 波利亚，G.《怎样解题：数学思维的新方法，第二版》。（普林斯顿，新泽西州：普林斯顿大学出版社，1957\
    \ 年。）\n\n⁸ 达尔，O. J.，E. 戴克斯特拉 等。《结构化编程》。（伦敦，英国：学术出版社，1972 年。）\n\n⁹ 布鲁克斯，1995 年。\n\
    \n¹⁰ 本特利，J.《编程珠玑，第二版》。（雷丁，马萨诸塞州：艾迪生-韦斯利出版社，2000 年。）\n\n¹¹ 麦康奈尔，S.《快速软件开发：驯服狂野的软件进度表》。（雷德蒙德，华盛顿州：微软出版社，1996\
    \ 年。）\n\n¹² 贝克，K.《解析极限编程：拥抱变化》。（波士顿，马萨诸塞州：艾迪生-韦斯利出版社，2006 年。）\n\n¹³ 亨特，A. 和 D.\
    \ 托马斯。《程序员修炼之道：从学徒到大师》。（波士顿，马萨诸塞州：艾迪生-韦斯利出版社，2000 年。）\n\n¹⁴ 麦康奈尔，S.《代码大全 2》。（雷德蒙德，华盛顿州：微软出版社，2004\
    \ 年。）\n\n¹⁵ 拉默斯，S.《编程大师访谈录》。（雷德蒙德，华盛顿州：微软出版社，1986 年。）\n\n**与其他程序员交流：** 书籍是获取信息的一种不错的方式，但与同行交流是无可替代的。结对编程的一个附带好处是，你可以看到别人是如何工作的，他们如何处理问题，如何编码、调试和编写测试。代码评审会议是了解他人工作方式的好方法。代码评审也强化了杰拉尔德·温伯格提出的“无我编程”理念。^(17)\
    \ 一旦你克服了“拥有”软件产品中代码的想法（你的雇主拥有它；读一读你上班第一天必须签署的那些文件），你就能客观地审视自己以及同事的代码，并从中学习。\n\n\
    **加入 ACM 和 IEEE-CS：** 美国计算机协会 (ACM) [`www.acm.org`](http://www.acm.org) 和 IEEE\
    \ 计算机学会 (IEEE-CS) [`www.computer.org`](http://www.computer.org) 是计算机科学家的两个主要专业组织。他们的期刊包含大量与计算机和计算相关的信息，他们的会议值得参加，并且他们在线为会员提供免费的书籍和课程。加入其中一个或两个组织，你不会后悔的。\n\
    \n**保持谦逊：** 下面戴克斯特拉的这句引言说明了一切。软件开发是困难的。程序非常复杂，任何规模的程序都极难完全理解。计算机软件不仅是人类做过的最具创造性的事情之一，也是最复杂的事情之一。保持谦逊。努力工作。享受乐趣！\n\
    \n> *称职的程序员完全清楚自己头脑容量的严格限制；因此他以完全的谦逊态度来对待编程任务……*\n> \n> ——艾兹格·戴克斯特拉^(18)\n\n最后，我忍不住要引用一句同时包含“魔法”和“计算机”这两个词的引言……\n\
    \n> *神话和传说中的魔法在我们这个时代变成了现实。人们在键盘上敲出正确的咒语，显示屏就会亮起来，显示出从未有过也不可能存在的事物……计算机在这方面也类似于传说中的魔法。如果咒语中有一个字符、一个停顿没有严格遵循正确的形式，魔法就不会奏效。人类不习惯做到完美，也很少有领域要求完美。我认为，适应这种对完美的要求是学习编程最困难的部分。*\n\
    > \n> ——弗雷德里克·布鲁克斯\n\n__________\n\n¹⁶ 奥拉姆，A. 和 G. 威尔逊，编。《代码之美：顶尖程序员阐述他们的思考方式》。（塞瓦斯托波尔，加利福尼亚州：奥莱利媒体公司，2007\
    \ 年。）\n\n¹⁷ 温伯格，G. M.《计算机编程心理学，银禧纪念版》。（纽约，纽约州：多塞特出版社，1988 年。）\n\n¹⁸ 戴克斯特拉，E.“谦逊的程序员”，《ACM\
    \ 通讯》15(10): 859-866。1972 年。\n\n### 索引\n\n### ![images](img/square.jpg) A\n\n\
    抽象类，定义，111\n\n抽象\n\n抽象机制，88\n\n管理大型问题的复杂性，65\n\n加速度，定义，24\n\n参与者，定义，91\n\n亚当斯，道格拉斯，179\n\
    \n适配器模式\n\n类适配器，146\n\n代码示例，147\n\n描述，146\n\n对象适配器，146\n\nadd()，150\n\n聚合，定义，130\n\
    \n敏捷开发模型\n\n敏捷宣言网页，8\n\n目标，14\n\n描述，8\n\n极限编程 (XP)，15\n\n轻量级方法论，14\n\n重构，14\n\n\
    Scrum，23\n\n*另请参阅* 编码；极限编程 (XP)；面向对象分析与设计 (OOA&D)；软件开发\n\n亚历山大，克里斯托弗，137\n\n分析瘫痪，避免，105\n\
    \n架构模式，48\n\nassertEquals()，204\n\n断言，用于生产中绝不应发生的错误，173\n"
