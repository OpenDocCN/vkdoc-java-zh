  trans: '

    ### 功能规格说明书大纲


    每份功能规格说明书都各不相同，正如每个软件开发项目都独一无二。因此，请对这份大纲持保留态度，只采用适用于你项目的部分。其中许多想法源自参考资料。^(5) 每份功能规格说明书都应包含以下各节讨论的要素。


    ### 概述


    这是你的执行摘要。用一段或至多两段文字说明该程序应实现的功能。“该程序用于控制你的微波炉。它与一个键盘和一个液晶显示屏交互，提供用户输入和输出功能。其功能仅限于标准微波炉所具备的功能，并增加了用于加热披萨和咖啡的专用按钮。它还能运行一个实时时钟和一个独立的倒计时定时器。它不控制照明灯。它配备了一个安全联锁装置，可在门打开时阻止微波炉启动。”


    ### 免责声明


    你应该始终在文档开头声明：“本规格说明书尚未完成。如果你认为有遗漏或错误之处，请发送电子邮件告知我。”这有助于让所有市场人员不再纠缠你，并让你能够将新的功能请求归档到邮件垃圾箱中。许多人会在文档的页眉或页脚放置一个醒目的黑色“草稿”字样。这也能起到一定作用，但人们往往容易忽略它。有些人会在规格说明书中使用一个巨大的“草稿”水印，这样每一页的文字背后都嵌入了这个词。但这同样无法阻止人们对你的指责。在某个阶段，你的免责声明应改为类似这样的内容：“本规格说明书对于本次发布版本已尽可能完整。如果你认为有遗漏或错误之处，请发送电子邮件给作者，我们将在下一个版本中予以考虑。”


    ### 作者姓名


    需要有人对功能规格说明书负责。不是委员会，不是开发团队，而是*一个人*。这通常是开发经理、项目经理或首席架构师，具体取决于你公司如何组织开发项目。不同的组织架构安排各有利弊。


    如果由开发经理（即开发人员向其汇报的人）负责功能规格说明书，那么此人通常对项目的所有技术方面了如指掌。这很好。另一方面，如果你的老板编写功能规格说明书，你可能更难向她指出规格说明书中存在的问题，或者表达你不同意设计方案。此外，开发经理可能曾经是开发人员，因此他们可能不具备与市场、客户、文档、测试等团队沟通所必需的人际交往能力（即：魅力和交际技巧）。


    ____________________________


    ³ 斯波尔斯基，J.，《Joel 谈软件》。（伯克利，加利福尼亚州：Apress 出版社，2004 年。）


    ⁴ 艾弗森，K. E.，“作为思维工具的符号表示法。”《美国计算机学会通讯》23(8): 444–465。（1980 年。）


    ⁵ 斯波尔斯基，2004 年。


    如果你的公司使用项目经理来负责规格说明书、设计和进度安排，但开发人员并不直接向他们汇报，那么你可能会遇到一个技术敏锐度不如前开发人员的人。另一方面，这些人通常能够轻松赢得其他团队的好感，因此谈判会顺利得多。项目经理需要具备一定的技术技能，并且非常擅长让所有利益相关者就功能规格说明书的内容达成共识。


    首席架构师模式类似于项目经理模式，不同之处在于架构师本身就是一名开发人员，因此技术能力更强，通常负责功能规格说明书和所有程序设计问题。这类似于布鲁克斯在《人月神话》中提出的首席程序员模式。由另一个人负责与其他团队对接、管理进度安排以及处理所有与人互动相关的事务。如果架构师纪律严明，并且不让任何需求蔓延干扰良好的设计，那么这种模式效果不错。


    ### 典型使用场景


    让客户对你的需求列表做出反馈的一个好方法是，在规格说明书中向他们展示几个程序的典型使用场景。这有几个优点。


    *   首先，如果你像编写用户故事一样编写这些场景，客户更有可能去阅读它们。

    *   其次，客户更有可能理解你所做的事情，并提出你遗漏或理解错误的想法。这总是一件好事，因为在流程早期获得的客户输入越多，你最终创造出他们真正想要的东西的可能性就越大。


    在许多敏捷方法中，包括极限编程，用户故事通常像场景一样编写。在极限编程中，客户是项目团队的一部分，因此你可以持续获得关于用户故事和每日程序构建的反馈。在统一建模语言中（UML，参见[www.uml.org](http://www.uml.org)），有一种完整的符号表示法用于创建用例（场景的另一种说法）。但正如我们上面讨论的，在描述使用场景方面，没有什么比自然语言更好的了。我们将在第
    8 章中再次讨论用例。


    ### 详细的逐屏规格说明


    一旦你编写了几个场景，你就会对程序的流程以及需要哪些屏幕、对话框、菜单等有更清晰的认识。这使你能够逐一审视每个屏幕，并充实其布局细节，包括它们将具有哪些按钮、文本框、图标、图形等，以及它们连接到哪些其他屏幕。使用图片！一张屏幕或对话框的图片胜过千言万语。它能让读者有所反应，并促使他们思考程序流程和用户界面问题。除了将要实现这些功能的开发人员和将要编写用户手册（没人会读）的技术文档撰写人员之外，不要指望其他人会阅读这些内容。


    ### 非功能性需求


    这可能是功能规格说明书中最重要的部分。它向外界说明你*不*打算做什么。确实，你需要将其包含在内，因为在阐述了程序将做什么之后，功能规格说明书最重要的作用是*管理期望*。在发布前的最终演示中，客户可能说出的最糟糕的话之一是：“但我以为它还能做……”。你需要告知项目中的所有利益相关者程序将做什么，以及它不会做什么。“此微波炉软件不会帮你核对支票簿。”好吧，这有点夸张，但你确实需要让他们知道有些需求不会被实现——至少在当前版本中不会。“一次只能运行一个倒计时定时器。”“不会提供允许按食物类型选择解冻模式的解冻周期。”客户很可能不会阅读这一节，但至少当他们提出要求时，你可以指出这一点。


    ### 待定问题


    当你初次编写功能规格说明书时，会有一两个（或上千个）你不知道的事情。这没关系。只需将它们放在“待定问题”一节中。然后，每次与客户会面时，指出这一节并尝试获得答案。在获得这些答案后，其中一些问题将移至需求部分，而另一些最终将进入“非功能性需求”部分。不过，到项目结束时，这一节应该为空。如果不是，那么，你就有一些会困扰你的问题了。

    '
- fmt: '### Design and Feature Ideas


    If you''re like me, you''ll be trying to design and code the program all the time
    you''re doing your requirements gathering and analysis. That''s just what developers
    do. So to avoid having your head explode from all these fantastic design and implementation
    ideas that you can''t write down because you''re writing requirements after all,
    write a separate notebook. This notebook is just a separate document – keep a
    text document open on your desktop for it – that contains a note for later. The
    two types of notes I typically create are technical notes containing design or
    coding ideas for developers, and marketing notes containing feature ideas for
    the marketing folks and the customer.


    ### Backlog


    As your project proceeds through development, new requirements will surface. Get
    used to it; this always happens. But if you want to keep to a schedule and deliver
    a working product, you just *cannot* implement everything that will come up. That''s
    what the “Backlog” section is for, all the requirements you are going to consider
    for the next release of the product. Most functional specifications don''t have
    a “Backlog” section, but if you want your functional spec to be a living document,
    you need a place to put all the tasks you will do later. This does a couple of
    good things for you. It tells the customer you haven''t forgotten these features,
    and that by moving them to the next release you are committed to delivering the
    current release as close to the published schedule as possible. And it tells the
    developers that you''re not out of control and that the project has a good shot
    at being done with high quality and on time. For more information on backlogs,
    take a look any of the Scrum agile methodology descriptions.^([6](#Chapter04.html#CHP-04-FN-6))


    ____________________________


    ⁶ Schwaber, K. and M. Beedle. *Agile software development with Scrum*. (Upper
    Saddle River, NJ: Prentice Hall, 1980.)


    ### One More Thing


    One more thing about the functional specification – don''t obsess. Chances are
    that you''ll do a good job of picking out requirements and writing them down in
    the functional spec, but that it won''t be as detailed as you like and it won''t
    be complete. Don''t worry, be happy. The only time a functional specification
    is complete is when you ship the release. Don''t spend time trying to get every
    single detail correct, don''t spend time trying to tease every requirement out
    of your customer. It just won''t happen. Set a time limit, do your best, and let
    it go. You don''t want to have a bunch of developers sitting around twiddling
    their thumbs with nothing to do waiting for the spec do you?


    ### Types of Requirements


    In a functional specification you''ll usually see four different types of requirements:
    user requirements, domain requirements, non-functional requirements, and non-requirements.


    ### User Requirements


    User requirements are nearly always expressed in natural language. They are the
    details of what the user expects to see as she uses the program. They also include
    descriptions of screen layouts, dialog boxes, and menus. Any interaction element
    in the program should be described in the user requirements. For example:


    > *Logging into the System*: When Gloria clicks on the Login button on the main
    page, a login dialog box appears in the middle of the screen. The login dialog
    must contain two text boxes, labeled “Username” and “Password.” There must also
    be two buttons in the dialog box, labeled “Submit” and “Cancel.” If at any time
    Gloria presses the Cancel button, the dialog box shall disappear and she will
    be taken back to the previous screen. In normal usage, she will click in the Username
    text box and type in her user name, and then click (or tab) in the Password text
    box and type in her password. The text typed in the Password text box must be
    hidden. Once Gloria is finished typing in her user name and password she must
    press the Submit button. If she has entered a correct user name/password combination
    she will then be taken to the main menu page. If Gloria''s user name/password
    combination is incorrect, an “Invalid user name or password, please try again”
    message shall appear in the dialog box, the text boxes shall be cleared and she
    will be given the opportunity to login again.


    As seen in this section, you can express user requirements as scenarios, and as
    detailed screen-by-screen descriptions. Remember to use pictures as much as you
    can when you''re doing user requirements. If your program is web-based, do lots
    of quick and dirty html pages and paste them into the spec. If it''s not web-based,
    use a drawing program to create pictures of what the user will see.


    ### Domain Requirements


    These are requirements that are imposed on you by the application domain of the
    program. If you''re writing a new version of TurboTax®, you will be constrained
    by the latest IRS regulations. A general ledger program will have to abide by
    the latest edition of the Generally Accepted Accounting Principles (GAAP), and
    an AT&T-branded iPhone will need to implement the latest GSM protocols. You don''t
    need to write down all these requirements, just refer to them. A set of detailed
    domain requirements give the developers information they will need during their
    design of the program. Domain requirements are usually considered “middle layer”
    software because they are the heart of the application, below the user interface
    and above the operating system, networking, or database software. Lots of domain
    requirements will get implemented as separate classes and libraries with their
    own APIs.


    ### Non-functional Requirements


    Non-functional requirements are constraints on the services and functions of the
    program and also expectations about performance. They can include target platform
    specifications, timing constraints, performance requirements, memory usage requirements,
    file access privileges, security requirements, response times, minimum number
    of transactions per second, and so on. These are usually requirements that may
    not be visible to the user, but which do effect the user experience.


    ### Non-requirements


    These are the things you''re not going to do. See the previous section for a description
    of non-requirements.'
