  trans: '

    #### 修复错误（就那一个！）


    一旦你找到了错误所在，就需要想出一个修复方案。大多数情况下，修复方法显而易见且简单，因为错误本身很简单。这是个好消息。但有时，虽然你能找到错误，修复方法却不明显，或者修复意味着要重写一大段代码。遇到这种情况要小心！花必要的时间理解代码，然后正确地重写代码并修复错误。调试中最大的问题就是急躁。


    修复错误时请记住两件事：


    *   修复实际的错误，而不是修复症状。

    *   一次只修复一个错误。


    第二点尤其重要。我们都遇到过这样的情况：你在修复一个错误时，在同一段代码中又发现了另一个错误。诱惑就是当场把它们都修好。要抵制住！修复你本来要修的那个错误。测试它，确保修复正确。将新代码整合回源代码库。然后你可以回到步骤
    1，修复第二个错误。你可能会问：“既然我现在就能修好，为什么还要做这些额外的工作？”


    嗯，情况是这样的。当你进入调试过程的这一步时，你已经有了针对第一个错误的测试，你已经了解了错误发生的代码，你已经准备好做那一个修复了。为什么现在要修两个东西来把事情搞混呢？此外，你还没有针对第二个错误的测试。那你如何测试那个修复呢？相信我，这确实会多花一点功夫，但一次只做一个修复，从长远来看会为你省去很多头疼的问题。


    #### 测试修复


    嗯，这听起来显而易见，对吧？但你会惊讶于有多少修复根本没有经过测试。或者即使测试了，也只是用通用的样本数据做一个简单测试，而没有检查你的修复是否破坏了其他东西。


    首先，重新运行最初发现错误的那次测试。不仅仅是你在步骤 1 中想出的那个最小测试，而是第一次导致错误出现的那次测试。如果那个测试现在通过了（从错误不再发生的意义上说），那么这是一个好迹象，表明你至少修复了错误的直接原因。然后，运行回归测试套件中的所有其他测试（关于回归测试的更多讨论见下一章），以确保你没有重新破坏已经修复好的东西。最后，将你的代码整合到源代码库中，签出新版本并测试整个系统。如果一切仍然正常，那么你的状态就很好了。去喝杯啤酒吧。


    #### 寻找更多错误


    嗯，如果某个特定的函数或方法中有一个错误，那么可能还有另一个，对吧？所以，趁你在这里，不妨看看你刚修复的错误附近的一般代码区域，看看是否有类似的情况再次发生。这是寻找模式的另一个例子。模式之所以存在，是因为开发人员会一遍又一遍地犯同样的错误（毕竟我们是人）。再喝杯咖啡，吃个甜甜圈，读读更多的代码。看看整个模块或类，检查是否有其他错误或改进的机会，这没什么坏处。在敏捷开发的世界里，这被称为*重构*。这意味着重写代码使其更简单。让你的代码更简单会使其更清晰、更易读，并且更容易找到下一个错误。所以，喝点咖啡，读读代码吧。


    ### 源代码控制


    在上面的一些段落中，我们提到了源代码库以及将更改整合到该库中。这是一种巧妙的方式，来开始简要讨论*源代码控制*，也称为*软件版本控制*。


    无论何时你在做一个项目，无论你是唯一的开发者还是团队的一员，你都应该对你所做的工作进行备份。这就是版本控制系统（VCS）为你做的事情，但有所不同。VCS 不仅会备份你在项目中创建的所有文件，还会跟踪你对它们所做的所有更改，这样除了可以说“给我
    PhoneContact.java 的最新版本”之外，你还可以说“我想要上周四的 PhoneContact.java 版本”。


    VCS 会为你项目中创建并添加的所有文件维护一个*仓库*。这个仓库可以是一个平面文件，也可以是一个更复杂的数据库。一个客户端程序允许你访问仓库并检索存储在那里的一个或多个文件的不同版本。通常，如果你只是向
    VCS 请求某个特定文件或某些文件，你会得到最新版本。无论你从仓库中提取出哪个版本的文件，在 VCS 术语中它都被称为*工作副本*。提取文件的过程称为*签出*。


    如果你独自在一个项目上工作，那么你从 VCS 仓库签出的工作副本是唯一存在的副本，当你将文件签回时，你所做的任何更改都会反映在仓库中。这样做很酷的一点是，如果你做了一个更改但发现它是错误的，你可以直接签出一个没有该更改的先前版本。VCS
    另一个有趣的地方是当有多个开发人员在一个项目上工作时。当你在一个开发团队中工作时，团队中的其他人很可能会签出与你相同的文件。这就带来了文件共享的问题。这里的问题是，如果你们两个都对文件做了更改，然后都想将文件签回仓库，谁先签入？谁的更改最终会留在仓库中？理想情况下，两者都保留，对吧？


    嗯，也许不是。假设 Alice 和 Bob 都从仓库签出了 PhoneContact.java，并且各自对其进行了修改。Bob 将他修改后的 PhoneContact.java
    版本签回仓库，然后去吃午饭了。几分钟后，Alice 签入了她的 PhoneContact.java 版本。这时会出现两个问题。(1) 如果 Alice 没有在
    Bob 修改过的同一行代码上做任何更改，那么她的版本仍然比 Bob 的新，并且会在仓库中覆盖 Bob 的版本。Bob 的更改仍然存在，但它们现在位于比 Alice
    的版本更旧的版本中。(2) 更糟的是，如果 Alice 确实对 Bob 修改过的一些相同代码做了更改，那么她的更改实际上会覆盖 Bob 的更改，导致 main.c
    变成一个完全不同的文件。真糟糕。所以我们不希望这两种情况发生。我们如何避免这个问题呢？


    版本控制系统使用以下两种不同的策略来避免这种冲突问题：


    *   锁定-修改-解锁

    *   复制-修改-合并


    #### 使用锁定-修改-解锁


    第一种策略是*锁定-修改-解锁*。在这种策略中，Bob 签出 PhoneContact.java 并将其锁定以进行编辑。这意味着 Bob 现在拥有唯一一个可以更改的
    PhoneContact.java 工作副本。如果 Alice 试图签出 PhoneContact.java，她会收到一条消息，说她只能签出一个只读版本，因此在
    Bob 释放他的锁之前无法将其签回。Bob 进行他的更改，将 PhoneContact.java 签回，然后释放锁。Alice 现在可以签出并锁定一个可编辑版本的
    PhoneContact.java（现在包含 Bob 的更改），进行她自己的更改，然后将文件签回，并释放她的锁。锁定-修改-解锁策略的效果是将仓库中的更改序列化。


    这种*更改的序列化*是锁定-修改-解锁最大的问题。当 Bob 签出文件进行编辑时，Alice 无法进行她的更改。她只能无所事事地等着，直到 Bob 完成。Alice
    的老板可不喜欢这种无所事事的情况。不过，还有另一种选择。

    '
- fmt: '#### Using Copy-Modify-Merge


    The second strategy is *copy-modify-merge*. In this strategy, Alice and Bob are
    both free to check out editable copies of `PhoneContact.java`. Let’s say that
    Alice makes her changes first and checks her new version of the file back into
    the repository and goes out for cocktails. When Bob is finished making his changes
    he tries to check his new version of `PhoneContact.java` into the repository only
    to have the VCS tell him his version of the file is “out of date;” Bob can’t check
    in. What happened here? Well, the VCS stamps each file that’s checked out with
    a timestamp and a version number. It also keeps track of what is checked out and
    who checked it out and when. It checks those values when you try to check in.


    When Bob tried to check in, his VCS realized that the version of the code he was
    trying to check in was older than the current version (the new one that Alice
    had checked in earlier), so it let him know that. So what is Bob to do? That’s
    where the third part of copy-modify-merge comes in. Bob needs to tell the VCS
    to merge his changes with the current version of `PhoneContact.java` and then
    check in the updated version. This all works just fine if Alice and Bob have changed
    different parts of the file. If their changes do not conflict, then the VCS can
    just do the merge automatically and check in the new file. A problem occurs if
    Alice and Bob have made changes to the same lines of code in the file. In that
    case, Bob must do a manual merge of the two files. Bob has to do this because
    the VCS isn’t smart enough to choose between the conflicting changes. Usually,
    a VCS will provide some help in doing the merge, but ultimately the merge decision
    must be Bob’s.


    `copy-modify-merge` is the strategy used by most version control systems these
    days, including the popular open-source version control system, subversion ([`http://subversion.apache.org`](http://subversion.apache.org)).^([4](#Chapter13.html#CH-13-FN-4))
    There is one problem (well, okay, more than one, but we’ll just talk about this
    one) with `copy-modify-merge`. If your repository allows you to store binary files,
    you can’t merge them. Say you have two versions of the same `jpg` file. How do
    you decide which of the bits is correct? So in this case the VCS (subversion included)
    will require you to use `lock-modify-unlock`.


    Git ([http://git.scm.com](http://git.scm.com)), the other candidate for most popular
    open-source version control system, uses a model that has each developer have
    a local repository of the entire development history. When a developer makes a
    change to a file, the changes are copied to the other local repositories. Git
    uses a model called an incomplete merge along with a number of plug-in merge tools
    to coordinate merges across repositories. Git’s main virtue is speed. It may be
    the fastest distributed VCS around.


    ### One Last Thought on Coding and Debugging – Pair Programming


    Pair programming is a technique to improve software quality and programmer performance.
    It’s been around for many years, but only recently been formalized [Williams00].
    In pair programming two people share one computer and one keyboard. One person
    “drives,” controlling the keyboard and writing the code, and the other “navigates,”
    watching for errors in the code, suggesting changes and test cases. Periodically
    the driver and the navigator switch places. Pairs can work together for long periods
    of time on a project, or pairs can change with each programming task. Pair programming
    is particularly popular in agile development environments; in the *Extreme Programming*
    process, all developers are required to pair program and no code that has not
    been written by two people is allowed to be integrated into the project [Beck00].
    There have been several studies^([5](#Chapter13.html#CH-13-FN-5)) that show that
    pair programming decreases the number of errors in code and improves the productivity
    of programmers. So this is our final debugging technique – pair program!


    ### Conclusion


    Just like writing good, efficient code, debugging is a skill that all programmers
    need to acquire. Being a careful coder will mean you have less debugging to do,
    but there will always be debugging. Programmers are all human and we’ll always
    make mistakes. Having a basket of debugging skills will help you find the root
    causes of errors in your code faster and it will help you from injecting more
    errors. The combination of reviews ([Chapter 15](#Chapter15.html#ch15)), debugging
    and unit testing – as we’ll see in the next chapter – is the knock-out punch that
    a developer uses to release defect-free code.


    __________


    ⁴ Collins-Sussman, B., Fitzpatrick, B. W., and Pilato, C. M. *Version Control
    with Subversion*. (Sebastapol, CA: O’Reilly Press, 2010). Retrieved from [`http://svnbook.red-bean.com/`](http://svnbook.red-bean.com/)
    on 15 October 2010.


    ⁵ Cockburn, A. and L. Williams. The Costs and Benefits of Pair Programming. *Extreme
    Programming Examined*. (Boston, MA: Addison-Wesley Longman, 2001). Page 592.


    ## C H A P T E R  14'
  raw: '#### Using Copy-Modify-Merge


    The second strategy is *copy-modify-merge*. In this strategy, Alice and Bob are
    both free to check out editable copies of PhoneContact.java. Let’s say that Alice
    makes her changes first and checks her new version of the file back into the repository
    and goes out for cocktails. When Bob is finished making his changes he tries to
    check his new version of PhoneContact.java into the repository only to have the
    VCS tell him his version of the file is “out of date;” Bob can’t check in. What
    happened here? Well, the VCS stamps each file that’s checked out with a timestamp
    and a version number. It also keeps track of what is checked out and who checked
    it out and when. It checks those values when you try to check in.


    When Bob tried to check in, his VCS realized that the version of the code he was
    trying to check in was older than the current version (the new one that Alice
    had checked in earlier), so it let him know that. So what is Bob to do? That’s
    where the third part of copy-modify-merge comes in. Bob needs to tell the VCS
    to merge his changes with the current version of PhoneContact.java and then check
    in the updated version. This all works just fine if Alice and Bob have changed
    different parts of the file. If their changes do not conflict, then the VCS can
    just do the merge automatically and check in the new file. A problem occurs if
    Alice and Bob have made changes to the same lines of code in the file. In that
    case, Bob must do a manual merge of the two files. Bob has to do this because
    the VCS isn’t smart enough to choose between the conflicting changes. Usually,
    a VCS will provide some help in doing the merge, but ultimately the merge decision
    must be Bob’s.


    copy-modify-merge is the strategy used by most version control systems these days,
    including the popular open-source version control system, subversion ([`http://subversion.apache.org`](http://subversion.apache.org)).^([4](#Chapter13.html#CH-13-FN-4))
    There is one problem (well, okay, more than one, but we’ll just talk about this
    one) with copy-modify-merge. If your repository allows you to store binary files,
    you can’t merge them. Say you have two versions of the same jpg file. How do you
    decide which of the bits is correct? So in this case the VCS (subversion included)
    will require you to use lock-modify-unlock.


    Git ([http://git.scm.com](http://git.scm.com)), the other candidate for most popular
    open-source version control system, uses a model that has each developer have
    a local repository of the entire development history. When a developer makes a
    change to a file, the changes are copied to the other local repositories. Git
    uses a model called an incomplete merge along with a number of plug-in merge tools
    to coordinate merges across repositories. Git’s main virtue is speed. It may be
    the fastest distributed VCS around.


    ### One Last Thought on Coding and Debugging – Pair Programming


    Pair programming is a technique to improve software quality and programmer performance.
    It’s been around for many years, but only recently been formalized [Williams00].
    In pair programming two people share one computer and one keyboard. One person
    “drives,” controlling the keyboard and writing the code, and the other “navigates,”
    watching for errors in the code, suggesting changes and test cases. Periodically
    the driver and the navigator switch places. Pairs can work together for long periods
    of time on a project, or pairs can change with each programming task. Pair programming
    is particularly popular in agile development environments; in the *Extreme Programming*
    process, all developers are required to pair program and no code that has not
    been written by two people is allowed to be integrated into the project [Beck00].
    There have been several studies^([5](#Chapter13.html#CH-13-FN-5)) that show that
    pair programming decreases the number of errors in code and improves the productivity
    of programmers. So this is our final debugging technique – pair program!


    ### Conclusion


    Just like writing good, efficient code, debugging is a skill that all programmers
    need to acquire. Being a careful coder will mean you have less debugging to do,
    but there will always be debugging. Programmers are all human and we’ll always
    make mistakes. Having a basket of debugging skills will help you find the root
    causes of errors in your code faster and it will help you from injecting more
    errors. The combination of reviews ([Chapter 15](#Chapter15.html#ch15)), debugging
    and unit testing – as we’ll see in the next chapter – is the knock-out punch that
    a developer uses to release defect-free code.


    __________


    ⁴ Collins-Sussman, B., Fitzpatrick, B. W., and Pilato, C. M. *Version Control
    with Subversion*. (Sebastapol, CA: O’Reilly Press, 2010). Retrieved from [`http://svnbook.red-bean.com/`](http://svnbook.red-bean.com/)
    on 15 October 2010.


    ⁵ Cockburn, A. and L. Williams. The Costs and Benefits of Pair Programming. *Extreme
    Programming Examined*. (Boston, MA: Addison-Wesley Longman, 2001). Page 592.


    ## C H A P T E R  14'
  trans: '

    #### 使用复制-修改-合并


    第二种策略是*复制-修改-合并*。在这种策略中，爱丽丝和鲍勃都可以自由签出 `PhoneContact.java` 的可编辑副本。假设爱丽丝先进行了修改，并将她的新版本文件签回仓库，然后出去喝鸡尾酒了。当鲍勃完成他的修改，尝试将他的新版本
    `PhoneContact.java` 签入仓库时，版本控制系统却告诉他，他的文件版本“已过期”；鲍勃无法签入。这是怎么回事呢？原来，版本控制系统会为每个签出的文件打上时间戳和版本号。它还会跟踪哪些文件被签出、谁签出的以及何时签出的。当你尝试签入时，它会检查这些值。


    当鲍勃尝试签入时，他的版本控制系统发现他试图签入的代码版本比当前版本（爱丽丝之前签入的新版本）更旧，因此系统通知了他。那么鲍勃该怎么办呢？这就是复制-修改-合并的第三部分发挥作用的地方。鲍勃需要告诉版本控制系统，将他的修改与
    `PhoneContact.java` 的当前版本进行合并，然后签入更新后的版本。如果爱丽丝和鲍勃修改了文件的不同部分，这一切都能顺利进行。如果他们的修改没有冲突，版本控制系统可以自动完成合并并签入新文件。但如果爱丽丝和鲍勃修改了文件中相同的代码行，问题就出现了。在这种情况下，鲍勃必须手动合并这两个文件。鲍勃必须这样做，因为版本控制系统不够智能，无法在冲突的修改之间做出选择。通常，版本控制系统会在合并过程中提供一些帮助，但最终的合并决定必须由鲍勃做出。


    复制-修改-合并是当今大多数版本控制系统使用的策略，包括流行的开源版本控制系统 Subversion（[`http://subversion.apache.org`](http://subversion.apache.org)）。^(4)
    复制-修改-合并存在一个问题（好吧，不止一个，但我们只讨论这一个）。如果你的仓库允许存储二进制文件，你就无法合并它们。假设你有同一个 jpg 文件的两个版本。你如何判断哪些比特是正确的呢？因此，在这种情况下，版本控制系统（包括
    Subversion）会要求你使用锁定-修改-解锁。


    Git（[`git.scm.com`](http://git.scm.com)）是另一个最流行的开源版本控制系统候选，它采用了一种模型，让每个开发者都拥有一个包含整个开发历史的本地仓库。当开发者修改一个文件时，这些修改会被复制到其他本地仓库。Git
    使用一种称为“不完全合并”的模型，并配合许多插件式合并工具来协调跨仓库的合并。Git 的主要优点是速度快。它可能是目前最快的分布式版本控制系统。


    ### 关于编码和调试的最后一个想法——结对编程


    结对编程是一种提高软件质量和程序员绩效的技术。它已经存在多年，但直到最近才被正式化 [Williams00]。在结对编程中，两个人共享一台电脑和一个键盘。一个人“驾驶”，控制键盘并编写代码，另一个人“导航”，观察代码中的错误，提出修改建议和测试用例。驾驶者和导航者会定期交换角色。结对可以长期在同一个项目上合作，也可以随着每个编程任务而改变。结对编程在敏捷开发环境中尤其流行；在*极限编程*流程中，所有开发者都必须进行结对编程，并且任何不是由两个人编写的代码都不允许集成到项目中
    [Beck00]。已有几项研究^(5)表明，结对编程可以减少代码中的错误数量，并提高程序员的生产力。所以，这就是我们最后的调试技术——结对编程！


    ### 结论


    就像编写良好、高效的代码一样，调试是所有程序员都需要掌握的技能。做一个细心的编码者意味着你需要进行的调试工作会更少，但调试总是会存在的。程序员都是人，我们总会犯错。掌握一系列调试技能将帮助你更快地找到代码错误的根本原因，并帮助你避免引入更多错误。正如我们将在下一章中看到的，评审（第
    15 章）、调试和单元测试的结合，是开发者用来发布无缺陷代码的制胜组合。


    __________


    ⁴ Collins-Sussman, B., Fitzpatrick, B. W., and Pilato, C. M. *使用 Subversion 进行版本控制*。（加利福尼亚州塞巴斯托波尔：O''Reilly
    Press，2010 年）。2010 年 10 月 15 日检索自 [`http://svnbook.red-bean.com/`](http://svnbook.red-bean.com/)。


    ⁵ Cockburn, A. 和 L. Williams。结对编程的成本与收益。*极限编程研究*。（马萨诸塞州波士顿：Addison-Wesley Longman，2001
    年）。第 592 页。


