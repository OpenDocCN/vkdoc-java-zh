- fmt: "### Pipe-and-filter Architecture\n\nIn a pipe-and-filter style architecture,\
    \ the computational components are called *filters* and they act as transducers\
    \ that take input, transform it according to one or more algorithms, and then\
    \ output the result to a communications conduit. The input and outputs conduits\
    \ are called *pipes*.\n\nA typical pipe-and-filter architecture is linear, as\
    \ in [Figure 5-1](#Chapter05.html#fig_5_1).\n\n![images](images/0501.jpg)\n\n\
    ***Figure 5-1.** The pipe-and-filter architecture*\n\nThe filters must be independent\
    \ components. That is one of the beauties of a pipe-and-filter architecture. You\
    \ can join different filters in the set in different arrangements in order to\
    \ get different results. The classic example of a pipe-and-filter architectural\
    \ style is the Unix shell, where there are a large number of small programs that\
    \ typically do a single thing and can be chained together using the Unix pipe\
    \ mechanism. Here's an example that shows how a pipe-and-filter can work. This\
    \ problem is from Jon Bentley's book *Programming Pearls*.^([3](#Chapter05.html#CHP-05-FN-3))\n\
    \n_______________________\n\n³ Bentley, J. *Programming Pearls, Second Edition*.\
    \ (Boston, MA: Addison-Wesley, 2000.)\n\n> *The Problem*: Given a dictionary of\
    \ words in English, find all the anagrams in the dictionary. That is, find all\
    \ the words that are permutations of each other. For example, “pots,” “stop,”\
    \ and “spot” are anagrams of each other.\n\nSo what do we know? Well, first of\
    \ all, all the anagrams have the same letters and the same number of letters in\
    \ each word. That gives us the clue to the method you'll use to find the anagrams.\
    \ Got it yet? Don't worry; I'll wait.\n\nYes! If you sort each word, you'll end\
    \ up with a string of characters that has all the letters in the word in alphabetical\
    \ order. We call this creating a *sign* for the word. If you then sort the resulting\
    \ list, all the anagrams will end up together in the sorted list because their\
    \ sorted letters will be identical. If you then keep track of which words you\
    \ sorted, you can then simplify the list and create a new list with, say, each\
    \ set of anagrams on the same line of the output file. This is exactly how Bentley\
    \ does it.\n\nBut how does this relate to a pipe-and-filter architecture, you\
    \ ask? Good question. Let's break down the solution again.\n\n1.  Create a sign\
    \ for each word in the list by sorting the letters in each word; keep the sign\
    \ and the word together.\n2.  Sort the resulting list by the signs; all the anagrams\
    \ should now be together.\n3.  Squash the list by putting each set of anagrams\
    \ on the same line, removing the signs as you do.\n\nSee the pipe-and-filter now?\
    \ In Unix-speak it looks like this:\n\n`sign <dictionary.txt | sort | squash >anagrams.txt`\n\
    \nwhere `sign` is the filter we use to do step 1, with input file `dictionary.txt`.\
    \ `sign` outputs a list of signs and their associated words which is piped to\
    \ the Unix `sort` utility (we didn't need to write that one). `Sort` then sorts\
    \ the list by the first field on each line (its default behavior), which happens\
    \ to be the sign of each word. It then outputs the sorted list to the next pipe.\
    \ `Squash` takes the sorted list from the incoming pipe and compresses it by putting\
    \ all the words with the same sign on the same line, eliminating the signs as\
    \ it does so. This final list is sent via one last pipe (this time a Unix I/O\
    \ redirection) to the output file `anagrams.txt`.\n\nNote that this example has\
    \ all the features of a standard pipe-and-filter architecture: independent computational\
    \ components that perform a transformation on their input data and communication\
    \ conduits that transmit the data from the output of one component to the input\
    \ of the next. Note also that not all applications should use the pipe-and-filter\
    \ architecture. For example, it won't work so well for interactive applications\
    \ or applications that respond to events or interrupts. That's why we're going\
    \ to look at more architectural styles.\n\n### An Object-Oriented Architectural\
    \ Pattern\n\nThe advent of object-oriented analysis, design, and programming in\
    \ the early 1980s (well, it really started in the ‘60s, but no one was paying\
    \ attention) brought with it a number of architectural and design patterns. We'll\
    \ just focus on one object-oriented architectural pattern here and save discussions\
    \ of the rest to the chapter on Design Patterns.\n\nThe *Model-View-Controller*\
    \ (MVC) architectural pattern is a way of breaking an application, or even just\
    \ a piece of an application's interface, into three parts: the model, the view,\
    \ and the controller. MVC was originally developed to map the traditional input,\
    \ processing, output roles of many programs into the GUI realm:\n\n> Input ![images](images/U001.jpg)\
    \ Processing ![images](images/U001.jpg) Output\n> \n> Controller ![images](images/U001.jpg)\
    \ Model ![images](images/U001.jpg) View\n\nThe user input, the modeling of the\
    \ external world, and the visual feedback to the user are separated and handled\
    \ by model, view and controller *objects,* as shown in [Figure 5-2](#Chapter05.html#fig_5_2).\n\
    \n![images](images/0502.jpg)\n\n***Figure 5-2.** The Model-View-Controller architecture*\n\
    \n*   The *controller* interprets mouse and keyboard inputs from the user and\
    \ maps these user actions into commands that are sent to the model and/or viewport\
    \ to effect the appropriate change.\n*   The *model* manages one or more data\
    \ elements, responds to queries about its state, and responds to instructions\
    \ to change state. The model knows what the application is supposed to do and\
    \ is the main computational structure of the architecture – it *models* the problem\
    \ you're trying to solve.\n*   The *view* or *viewport* manages a rectangular\
    \ area of the display and is responsible for presenting data to the user through\
    \ a combination of graphics and text. The view doesn't know anything about what\
    \ the program is actually doing; all it does is take instructions from the controller\
    \ and data from the model and displays them. It communicates back to the model\
    \ and controller to report status.\n\nThe flow of an MVC program typically looks\
    \ like this:\n\n> 1.  The *user* interacts with the user interface (e.g., the\
    \ user presses a button) and the controller handles the input event from the user\
    \ interface, often via a registered handler or callback. The user interface is\
    \ displayed by the view but controlled by the controller. Oddly enough, the controller\
    \ has no direct knowledge of the view as an object; it just sends messages when\
    \ it needs something on the screen updated.\n> 2.  The *controller* accesses the\
    \ model, possibly updating it in a way appropriate to the user's action (e.g.,\
    \ controller causes the user's shopping cart to be updated by the model). This\
    \ usually causes a change in the model's state as well as in its data.\n> 3. \
    \ A *view* uses the model to generate an appropriate user interface (e.g., view\
    \ produces a screen listing the shopping cart contents). The view gets its own\
    \ data from the model. The model has no direct knowledge of the view. It just\
    \ responds to requests for data from whomever and to requests for transforming\
    \ data from the controller.\n> 4.  The controller, as the user interface manager,\
    \ waits for further user interactions, which begins the cycle anew.\n\nThe main\
    \ idea here is separation of concerns – and code. The objective is to separate\
    \ how your program works from what it is displaying and how it gets its input\
    \ data. This is classic object-oriented programming; create objects that hide\
    \ their data and hide how they manipulate their data and then just present a simple\
    \ interface to the world to interact with other objects. We'll see this again\
    \ in [Chapter 9](#Chapter09.html#ch9).\n\n### An MVC Example: Let's Hunt!\n\n\
    A classic example of a program that uses the MVC architectural pattern is the\
    \ Nifty Assignment presented by Dr. David Matuszek at the 2004 SIGCSE Technical\
    \ Symposium.^([4](#Chapter05.html#CHP-05-FN-4))"
