- fmt: '# Fix the Error (Just That One)!


    Once you’ve found where the error is, you need to come up with a fix for it. Most
    of the time the fix is obvious and simple because the error is simple. That’s
    the good news. But sometimes while you can find the error, the fix isn’t obvious,
    or the fix will entail rewriting a large section of code. In cases like this be
    careful! Take the time necessary to understand the code, and then rewrite the
    code and fix the error correctly. The biggest problem in debugging is haste.


    When you are fixing errors remember two things:


    - Fix the actual error; don’t fix the symptom.

    - Only fix one error at a time.


    This second item is particularly important. We’ve all been in situations where
    you’re fixing an error and you find another one in the same piece of code. The
    temptation is to fix them both right then and there. Resist! Fix the error you
    came to fix. Test it and make sure the fix is correct. Integrate the new code
    back into the source code base. Then you can go back to step 1 and fix the second
    error. You might ask, “Why do all this extra work when I can just make the fix
    right now?”


    Well, here’s the situation. By the time you get to this step in the debugging
    process you already have a test for the first error, you’ve educated yourself
    about the code where the error occurs, you’re ready to make that one fix. Why
    should you confuse the issue by fixing two things now? Besides, you don’t have
    a test for the second error. So how do you test that fix? Trust me, it’s a little
    more work, but doing the fixes one at a time will save you lots of headaches down
    the road.


    ## Test the Fix


    Well, this sounds obvious, doesn’t it? But you’d be surprised how many fixes don’t
    get tested. Or if they’re tested, it’s a simple test with generic sample data
    and no attempt to see if your fix broke anything else.


    First of all, re-run the original test that uncovered the error. Not just the
    minimal test that you came up with in step 1, but the first test that caused the
    error to appear. If that test now fails (in the sense that the error does not
    occur any more), then that’s a good sign you’ve at least fixed the proximate cause
    of the error. Then run every other test in your regression suite (see the next
    chapter for more discussion on regression tests) so you can make sure you’ve not
    re-broken something that was already fixed. Finally, integrate your code into
    the source code base, check out the new version and test the entire thing. If
    all that still works, then you’re in good shape. Go have a beer.


    ## Look for More Errors


    Well, if there was one error in a particular function or method, then there might
    be another, right? So while you’re here, you might as well take a look at the
    code in the general vicinity of the error you just fixed and see if anything like
    it happens again. This is another example of looking for patterns. Patterns are
    there because developers make the same mistakes over and over again (we’re human,
    after all). Grab another cup of coffee and a doughnut and read some more code.
    It won’t hurt to take a look at the whole module or class and see if there are
    other errors or opportunities for change. In the agile world, this is called *refactoring*.
    This means rewriting the code to make it simpler. Making your code simpler will
    make it clearer, easier to read, and it will make finding that next error easier.
    So have some coffee and read some code.


    # Source Code Control


    In some of the paragraphs above we’ve made mention of a source code base and integrating
    changes into that base. That is a sneaky way of starting a brief discussion of
    *source code control*, also known as *software version control*.


    Whenever you work on a project, whether you are the only developer or you are
    part of a team, you should keep backups of the work you’re doing. That’s what
    a version control system (VCS) does for you, but with a twist. A VCS will not
    only keep a backup of all the files you create during a project, but it will keep
    track of all the changes you’ve made to them, so that in addition to saying, “Give
    me the latest version of `PhoneContact.java`,” you can say, “I want the version
    of `PhoneContact.java` from last Thursday.”


    A VCS keeps a *repository* of all the files you’ve created and added to it for
    your project. The repository can be a flat file or a more sophisticated database.
    A client program allows you access the repository and retrieve different versions
    of one or more of the files stored there. Normally, if you just ask the VCS for
    a particular file or files, you get the latest version. Whatever version of the
    file you extract from the repository, it’s called the *working copy* in VCS-speak.
    Extracting the file is called a *check out*.


    If you are working on a project all alone, then the working copy you check out
    from the VCS repository is the only one out there and any changes that you make
    will be reflected in the repository when you check the file back in. The cool
    part of this is that if you make a change and it’s wrong, you can just check out
    a previous version that doesn’t have the change in it. The other interesting part
    of a VCS is when there is more than one developer working on a project. When you’re
    working on a development team, it’s quite likely that somebody else on the team
    may check out the same file that you did. This brings up the problem of file sharing.
    The problem here is if both of you make changes to the file and then both want
    to check the file back into the repository who gets to go first and whose changes
    end up in the repository? Ideally, both, right?


    Well, maybe not. Say Alice and Bob both check out `PhoneContact.java` from the
    repository and each of them makes changes to it. Bob checks his version of `PhoneContact.java`
    back into the repository and goes to lunch. A few minutes later Alice checks in
    her version of `PhoneContact.java`. Two problems occur. (1) if Alice hasn’t made
    any changes in the same lines of code that Bob did, her version is still newer
    than Bob’s and it hides Bob’s version in the repository. Bob’s changes are still
    there, but they are now in an older version than Alice’s. (2) Worse, if Alice
    did make changes to some of the same code that Bob did, then her changes actually
    overwrite Bob’s and `main.c` is a very different file. Bummer. So we don’t want
    either of these situations to occur. How do we avoid this problem?


    Version control systems use the following two different strategies to avoid this
    collision problem:


    - lock-modify-unlock

    - copy-modify-merge


    ## Using Lock-Modify-Unlock


    The first strategy is *lock-modify-unlock*. In this strategy, Bob checks out `PhoneContact.java`
    and locks it for edit. This means that Bob now has the only working copy of `PhoneContact.java`
    that can be changed. If Alice tries to check out `PhoneContact.java` she gets
    a message that she can only check out a read-only version and so can’t check it
    back in until Bob gives up his lock. Bob makes his changes, checks `PhoneContact.java`
    back in, and then releases the lock. Alice can now check out and lock an editable
    version of `PhoneContact.java` (which now includes Bob’s changes) and make her
    own changes and check the file back in, giving up her lock. The lock-modify-unlock
    strategy has the effect of serializing changes in the repository.


    This *serialization of changes* is the biggest problem with lock-modify-unlock.
    While Bob has the file checked out for editing, Alice can’t make her changes.
    She just sits around twiddling her thumbs until Bob is done. Alice’s boss doesn’t
    like this thumb twiddling stuff. However, there is an alternative.'
  raw: '#### Fix the Error (Just That One)!


    Once you’ve found where the error is, you need to come up with a fix for it. Most
    of the time the fix is obvious and simple because the error is simple. That’s
    the good news. But sometimes while you can find the error, the fix isn’t obvious,
    or the fix will entail rewriting a large section of code. In cases like this be
    careful! Take the time necessary to understand the code, and then rewrite the
    code and fix the error correctly. The biggest problem in debugging is haste.


    When you are fixing errors remember two things:


    *   Fix the actual error; don’t fix the symptom.

    *   Only fix one error at a time.


    This second item is particularly important. We’ve all been in situations where
    you’re fixing an error and you find another one in the same piece of code. The
    temptation is to fix them both right then and there. Resist! Fix the error you
    came to fix. Test it and make sure the fix is correct. Integrate the new code
