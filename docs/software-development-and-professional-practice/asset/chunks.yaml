- fmt: "# Design Principles\n\n> *There are two ways of constructing a software design.\
    \ One way is to make it so simple that there are obviously no deficiencies. And\
    \ the other way is to make it so complicated that there are no obvious deficiencies.*\n\
    > \n> — C. A. R. Hoare\n\nOne way to look at software problems is with a model\
    \ that divides the problems into two different layers:\n\n*   “Wicked” problems\
    \ fall in the upper layer. These are problems that typically come from domains\
    \ outside of computer science (e.g. biology, business, meteorology, sociology,\
    \ political science, etc.). These types of problems tend to be open-ended, ill-defined,\
    \ and large in the sense that they require much work. For example, pretty much\
    \ any kind of a web commerce application is a wicked problem. Horst W. J. Rittel\
    \ and Melvin M. Webber, in a 1973 paper on social policy,[¹](#Chapter06.html#CHP-6-FN-1)\
    \ gave a definition for and a set of characteristics used to recognize a wicked\
    \ problem that we'll look at later in this chapter.\n*   “Tame” problems fall\
    \ in the lower layer. These problems tend to cut across other problem domains;\
    \ they tend to be more well defined and small. Sorting and searching are great\
    \ examples of tame problems. Small and well-defined don't mean “easy” however.\
    \ Tame problems can be very complicated and difficult to solve. It's just that\
    \ they are clearly defined and you know when you have a solution. These are the\
    \ kinds of problems that provide computer scientists with foundations in terms\
    \ of data structures and algorithms for the wicked problems we solve from other\
    \ problem domains.\n\nAccording to Rittel and Webber, a wicked problem is one\
    \ for which the requirements are completely known only after the problem is solved,\
    \ or for which the requirements and solution evolve over time. It turns out this\
    \ describes most of the “interesting” problems in software development. Recently,\
    \ Jeff Conklin has revised Rittel and Webber's description of a wicked problem\
    \ and provided a more succinct list of the characteristics of wicked problems.[²](#Chapter06.html#CHP-6-FN-2)\
    \ To paraphrase:\n\n__________\n\n¹ Rittel, H. W. J. and M. M. Webber. “Dilemmas\
    \ in a General Theory of Planning.” *Policy Sciences* 4(2): 155-169. (1973)\n\n\
    *   *A wicked problem is not understood until after the creation of a solution.*\
    \ Another way of saying this is that the problem is defined and solved at the\
    \ same time.[³](#Chapter06.html#CHP-6-FN-3)\n*   *Wicked problems have no stopping\
    \ rule*; that is, you can create incremental solutions to the problem, but there's\
    \ nothing that tells you that you've found the correct and final solution.\n*\
    \   *Solutions to wicked problems are not right or wrong*; they are better or\
    \ worse, or good-enough or not-good-enough.\n*   *Every wicked problem is essentially\
    \ novel and unique*. Because of the “wickedness” of the problem, even if you have\
    \ a similar problem next week, you basically have to start over again because\
    \ the requirements will be different enough and the solution will still be elusive.\n\
    *   Every solution to a wicked problem is a ‘one shot operation’. See number 4\
    \ above.\n*   *Wicked problems have no given alternative solutions.* That is,\
    \ there is no small finite set of solutions from which to choose.\n\nWicked problems\
    \ crop up all over the place. For example, creating a word processing program\
    \ is a wicked problem. You may think that you know what a word processor needs\
    \ to do – insert text, cut and paste, handle paragraphs, print. But this list\
    \ of features is only one person's list. As soon as you “finish” your word processor\
    \ and release it, you'll be inundated with new feature requests: spell checking,\
    \ footnotes, multiple columns, support for different fonts, colors, styles, and\
    \ the list goes on. The word processing program is essentially never done – at\
    \ least not until you release the last version and end-of-life the product.\n\n\
    Word processing is actually a pretty obvious wicked problem. Others might include\
    \ problems where you don't really know if you can solve the problem at the start.\
    \ Expert systems require a user interface, an inference engine, a set of rules,\
    \ and a database of domain information. For a particular domain, it's not at all\
    \ certain at the beginning that you can create the rules that the inference engine\
    \ will use to reach conclusions and recommendations. So you have to iterate through\
    \ different rule sets, send out the next version and see how well it performs.\
    \ Then you do it again, adding and modifying rules. You don't really know if the\
    \ solution is correct until you're done. Now that's a wicked problem.\n\nConklin\
    \ and Rittel and Webber say that when faced with a large, complicated problem\
    \ (a wicked one), that traditional cognitive studies indicate most people will\
    \ follow a linear problem solving approach, working top-down from the problem\
    \ to the solution. This is equivalent to the traditional waterfall model described\
    \ in [Chapter 2](#Chapter02.html#ch2)[⁴](#Chapter06.html#CHP-6-FN-4). [Figure\
    \ 6-1](#Chapter06.html#fig_6_1) shows this linear approach.\n\n__________\n\n\
