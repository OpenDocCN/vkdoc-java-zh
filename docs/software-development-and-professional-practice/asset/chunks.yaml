    ## 关于作者


    ![image](img/john_dooley.jpg) ![images](img/square.jpg) **约翰·杜利**在 40 年前编写了他的第一个程序——使用
    Fortran IV 语言在穿孔卡片上。自那以后，他在工业界工作了超过 18 年，曾为贝尔实验室、IBM、麦克唐纳·道格拉斯和摩托罗拉等公司工作，并在一家初创公司有过一段必要的任职经历。他还花了
    17 年时间教授本科生计算机科学，包括在伊利诺伊州盖尔斯堡的诺克斯学院，他在那里担任计算机科学系主任，并已任教 10 年。作为一名软件专业人士，他编写过从设备驱动程序到编译器、嵌入式电话软件再到金融应用程序的各种代码。他还管理过从
    5 人到 30 人不等的开发团队，公司规模有大有小。他拥有数学、计算机科学和电气工程学位。

