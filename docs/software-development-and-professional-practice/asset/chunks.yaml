    ##### The Strategy Pattern


    Sometimes you have an application where you have several ways of doing a single
    operation or you have several different behaviors, each with a different interface.
    One of the ways to implement something like this is using a `switch` statement
    like so:


    `switch (selectBehavior) {`

    `        case Behavior1:`

    `                Algorithm1.act(foo);`

    `                break;`

    `        case Behavior2:`

    `                Algorithm2.act(foo, bar);`

    `                break;`

    `        case Behavior3:`

    `                Algorithm3.act(1, 2, 3);`

    `                break;`

    `}`


    The problem with this type of construct it that if you add another behavior, you
    need to change this code and potentially all the other code that has to select
    different behaviors. Not good.


    The Strategy design pattern gets you around this. It says that if you have several
    behaviors (algorithms) you need to select from dynamically, you should make sure
    that they all adhere to the same interface – a `Strategy` interface – and then
    that they are selected dynamically via a driver, called the `Context`, that is
    told which to call by the client software. The Strategy pattern embodies two of
    our fundamental object-oriented design principles—*encapsulate the idea that varies*
    and *code to an interface, not an implementation*. [Figure 11-7](#Chapter11.html#fig_11_7)
    is what a Strategy setup will look like.


    ![images](images/1107.jpg)


    ***Figure 11-7.** A typical Strategy Pattern layout*


    Some examples of when you might use the Strategy pattern are


    *   Capture video using different compression algorithms

    *   Compute taxes for different types of entities (people, corporations, non-profits)

    *   Plot data in different formats (line graphs, pie charts, bar graphs)

    *   Compress audio files using different formats


    In each of these examples you can think of having the application program telling
    a driver – the `Context` – which of the strategies to use and then asking the
    Context to perform the operation.


    As an example, let’s say you are a newly minted CPA and you’re trying to write
    your own software to compute your customers tax bills. (Why a CPA would write
    her own tax program, I have no idea; work with me on this.) Initially, you’ve
    divided your customers into individuals who only file personal income taxes, corporations
    who file corporate income taxes, and not-for-profit organizations who file hardly
    any taxes at all. Now, all of these groups have to compute taxes so the behavior
    of a class to compute taxes should be the same for all; but they’ll compute taxes
    in different ways. So what we need is a Strategy setup that will use the same
    interface – to encapsulate what varies in our application, and to code the concrete
    classes to an interface – and allow our client class to select which type of tax
    customer to use. [Figure 11-8](#Chapter11.html#fig_11_8) is a diagram of what
    our program will look like.


    ![images](images/1108.jpg)


    ***Figure 11-8.** Using the Strategy pattern to select a Tax behavior*


    We create a `TaxStrategy` interface that all the concrete `TaxStrategy` classes
    will implement.


