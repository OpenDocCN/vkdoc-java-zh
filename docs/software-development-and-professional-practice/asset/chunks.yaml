    a whole.


    ##### Non-technical Problems


    From a developer''s perspective, non-technical problems with requirements are
    the worst ones you will see. In fact, these are problems developers should never
    see; their managers should shield them from non-technical problems. Non-technical
    requirements problems are fundamentally political. Examples abound. One group
