  trans: "\n### 多幕剧\n\n> *进行分析时，你试图理解问题。在我看来，这不仅仅是列出用例中的需求。……分析还涉及审视表面需求之下的内容，以构建出问题背后运作的心智模型。……某种概念模型是软件开发中不可或缺的一部分，即使是最不受约束的黑客也会这样做。*\n\
    > \n> ——马丁·福勒^(1)\n> \n> *面向对象设计，就其最简单的形式而言，基于一个看似基础的想法。计算系统对某些对象执行某些操作；为了获得灵活且可重用的系统，最好将软件的结构建立在对象之上，而非操作之上。*\n\
    > \n> *一旦你说了这些，你实际上并没有给出定义，而是提出了一系列问题：对象究竟是什么？如何发现并描述对象？程序应如何操作对象？对象之间可能存在哪些关系？如何探索不同种类对象之间可能存在的共性？这些想法如何与经典的软件工程关注点（如正确性、易用性、效率）相关联？*\n\
    > \n> *对这些问题的回答依赖于一系列令人印象深刻的技术，用于高效地生产可重用、可扩展且可靠的软件：继承（包括单继承和多继承）；动态绑定与多态；类型与类型检查的新视角；泛型；信息隐藏；断言的使用；契约式设计；安全的异常处理。*\n\
    > \n> ——伯特兰·迈耶^(2)\n\n__________\n\n¹ 马丁，罗伯特，单一职责原则。[www.butunclebob.com/ArticleS.UncleBob.PrinciplesOfOod](http://www.butunclebob.com/ArticleS.UncleBob.PrinciplesOfOod)。检索于\
    \ 2009 年 12 月 10 日。\n\n### 序曲：场景设定\n\n在定义面向对象分析与设计时，最好牢记你的目标。在这两个过程阶段中，我们都在生成一个*工作产品*，它更接近作为最终目标的代码。在*分析*阶段，你正在细化已创建的功能列表，并生成客户所需内容的模型。在设计阶段，你则基于该模型创建最终将成为代码的类。\n\
    \n在分析中，你最终要得到的是对程序应完成功能的描述，即其*本质特征*。这个最终产品以问题域及其解决方案的*概念模型*形式呈现。该模型由若干要素组成，包括用例、用户故事、初步类图、用户界面故事板，以及可能的类接口描述。\n\
    \n在*设计*中，你最终要得到的是对程序将如何实现概念模型并满足客户需求的描述。这个最终产品以解决方案的*对象模型*形式呈现。该模型由一组相关的类图、它们的关联关系以及它们之间如何交互的描述组成。这包括每个类的编程接口。从这里，你应该能够很快进入编码阶段。\n\
    \n### 第一幕，第一场：探究分析\n\n那么什么是面向对象分析呢？嗯，这取决于你和谁讨论。就我们的目的而言，我们将*面向对象分析*定义为一种研究问题本质的方法，旨在*确定其本质特征以及这些特征之间的相互关系。^(3)*\
    \ 你的目标是最终得到一个问题解决方案的概念模型，然后你可以用它来创建对象模型——即你的设计。这个模型不考虑任何实现细节或目标系统的约束。它着眼于问题所在的领域，并试图创建一组特征、对象和关系，以描述该领域中的解决方案。什么使一个特征成为本质特征？通常，如果一个特征是客户明确表示必须拥有的，或者是一个程序运行所必需的非功能性需求，又或者是程序其他部分所依赖的核心程序元素，那么它就是本质特征。\n\
    \n概念模型描述了解决方案*将做什么*，通常包括用例、^(4) 用户故事、^(5) 以及 UML 序列图。^(6) 它还可以包括用户界面的描述和一组初步的\
    \ UML 类图（但这当然就逐渐偏向设计了）。\n\n那么如何创建这个概念模型呢？就像软件开发中的所有其他方法论一样，创建概念模型恰好有一种正确的方法——*才怪*！实际上，就像我们讨论过的所有其他方法论一样，正确答案是：视情况而定。\n\
    \n__________\n\n² 迈耶，伯特兰。*面向对象软件构造*。（上 saddle 河，新泽西州：普伦蒂斯霍尔出版社，1988 年）。\n\n³ 麦克劳克林，布雷特·D.\
    \ 等。*深入浅出面向对象分析与设计*。（塞瓦斯托波尔，加利福尼亚州：奥莱利媒体公司，2007 年）。\n\n⁴ 科伯恩，A.（2000 年）。*编写有效用例*。（波士顿，马萨诸塞州：艾迪生-韦斯利出版社，2000\
    \ 年）。\n\n⁵ 贝克，K. *解析极限编程：拥抱变化*。（波士顿，马萨诸塞州：艾迪生-韦斯利出版社，2000 年）。\n\n⁶ 福勒，M. *UML\
    \ 精粹*。（波士顿，马萨诸塞州：艾迪生-韦斯利出版社，2000 年）。\n\n这取决于对问题领域的理解，取决于对你已经提出的功能列表的理解，还取决于对客户在每次看到程序迭代时如何反应的理解。正如我们将看到的，变化是常态。\n\
    \n面向对象分析的关键部分是创建*用例*。通过用例，你可以从用户的角度创建场景的逐步演练，这种演练让你从外部理解程序应该做什么。任何规模的程序通常都会关联多个用例。事实上，单个用例可能包含场景中的替代路径。稍后会详细介绍这一点。\n\
    \n一旦你创建了几个用例，如何得到类图呢？有几种建议的方法，但我们这里只介绍一种，其余留待以后讨论。我们要看的第一种方法称为*文本分析*。通过文本分析，你检查用例文本，从中寻找程序中类的线索。请记住，面向对象范式完全关乎对象及其行为，因此这两点正是你需要从用例中提取出来的。\n\
    \n在文本分析中，你通过挑选用例中的名词来从文本中提取潜在的对象。因为名词是事物，而对象（通常）也是事物，所以名词很有可能是你程序中的对象。就行为而言，你需要关注用例中的动词。动词为你提供了描述状态变化或报告状态的动作词。这通常不是终点，但它为你提供了方法名和方法参数列表的初步版本。\n"
- fmt: '让我们回到伯特的小鸟自助餐与浴场，也就是 B⁴++。上次我们讲到 B⁴++ 时，它已经能在日出时自动打开喂食门，并在日落时自动关闭。B⁴++ 大获成功，爱丽丝和鲍勃对其性能感到非常满意。B⁴
    系列产品再次被抢购一空。


    有一天，伯特接到了爱丽丝的电话。她似乎遇到了一个问题。虽然 B⁴++ 运行得很好，但爱丽丝注意到，她的喂鸟器吸引了一些她不想要的鸟类。回想一下，爱丽丝是一位鸣鸟爱好者，当红衣主教鸟、彩绘鹀、猩红比蓝雀、美洲金翅雀和冠山雀出现在喂食器前时，她会非常兴奋。但当
    grackles、蓝松鸦和椋鸟赶走鸣鸟并大快朵颐时，她就不那么高兴了。因此，爱丽丝希望能够在不想要的鸟出现时关闭 B⁴++ 的喂食门，并在鸣鸟回来时再次打开它们。而你正是做这件事的合适人选。


    你问爱丽丝的第一个显而易见的问题是：“你想如何打开和关闭喂食门？”“嗯，”她说，“用遥控器怎么样？这样我就可以待在屋里，当鸟儿到来时，只需打开和关闭门就行了。”于是，游戏再次开始。


    就像上次一样，我们可以根据这个粗略的问题描述，尝试整理出一个用例。我们之前的用例是这样的：


    1.  传感器检测到 40% 亮度水平的阳光。

    2.  喂食门打开。

    3.  鸟儿到来，进食和饮水。

    4.  鸟儿离开。

    5.  传感器检测到阳光减弱至 25% 亮度水平。

    6.  喂食门关闭。


    因此，我们首先需要决定的是，我们的新问题是这个用例中的一个备选路径，还是需要一个全新的用例。


    让我们尝试一个新的用例。为什么？嗯，使用遥控器并不真正适合传感器用例，不是吗？遥控器可以随时激活，并且需要用户交互，这两点都不符合我们传感器的特性。那么，让我们看看能为遥控器用例想出什么：


    1.  爱丽丝听到或看到喂食器处的鸟儿。

    2.  爱丽丝确定它们*不是*鸣鸟。

    3.  爱丽丝按下遥控器按钮。

    4.  喂食门关闭。

    5.  鸟儿放弃并飞走。

    6.  爱丽丝按下遥控器按钮。

    7.  喂食门再次打开。


    这涵盖了所有情况吗？我们有没有遗漏什么？有两件事需要考虑。首先，在步骤 #1 中，我们有“爱丽丝听到或看到鸟儿”。问题是，“或”是否对我们有影响？在这种情况下，答案是否定的，因为爱丽丝是决策者，并且她是这个用例中的参与者。我们无法控制参与者；我们只能响应参与者想要做的事情，并为参与者提供可用的选项。在我们的案例中，我们的程序需要等待来自遥控器的信号，然后执行正确的操作。（先别超前，但请将我们的程序视为一个事件驱动系统，程序在执行操作之前必须等待（即监听）一个事件。）


    其次，用例中的哪些步骤能帮助我们识别新的对象？这就是我们的文本分析发挥作用的地方。在我们之前版本的应用程序中，我们已经有了`BirdFeeder`、`Sensor`和`FeedingDoor`对象。这些在用例中很容易被识别出来。那么现在有什么新东西呢？这里唯一的新对象就是遥控器。那么遥控器是做什么的？它有多少个按钮？当遥控器按钮被按下时，程序会做什么？


    在我们的例子中，遥控器似乎相对简单。打开和关闭喂食门是一个切换操作。如果门是关着的，就打开；如果门是开着的，就关闭。只有这些选项。因此，遥控器实际上只需要一个按钮来实现切换功能。


    所以，最终我们为 B⁴++ 程序得到了一个新的用例和一个新的类（参见[图 9-1](#Chapter09.html#fig_9_1)）。


    ![images](images/0901.jpg)


    ***图 9-1.** 新的 `RemoteControl` 类*


    我认为，对于这个版本的程序，我们需要的分析就这些了。


    这个练习为我们提供了一些可用于分析的指导原则。


    *   首先，创建*通过发送和响应消息来协同工作的简单类*。在我们的例子中，简单的类`FeedingDoor`和`Sensor`封装了关于`BirdFeeder`当前状态的知识，并允许我们通过简单的消息来控制喂鸟器。这种简单性使我们能够通过`RemoteControl`类轻松添加一种控制喂鸟器的新方式。

    *   其次，我们说*类应该只有一个职责*。`FeedingDoor`和`Sensor`不仅简单且易于控制，而且它们各自只做一件事。这使得它们以后更容易修改，也更容易重用。'
  raw: 'Let''s go back to Burt''s Bird Buffet and Bath, the B⁴++. When last we left
    the B⁴++ it automatically opened the feeding doors at sunrise and closed them
    at sunset. The B⁴++ was a hit and Alice and Bob were thrilled with its performance.
    Once again the B⁴ models were flying off the shelves.


    Then one day Burt gets a call from Alice. It seems she has an issue. While the
    B⁴++ works just fine, Alice has noticed that she''s getting unwanted birds at
    her bird feeder. Recall that Alice is a songbird fanatic and she''s thrilled when
    cardinals, painted buntings, scarlet tanagers, American goldfinches, and tufted
    titmice show up at the feeder. But she''s not so thrilled when grackles, blue
    jays, and starlings drive away the songbirds and have their own feast. So Alice
    wants to be able to close the B⁴++ feeding doors when the bad birds show up and
    open them again when the songbirds come back. And you''re just the guy to do it.


    The first obvious question you ask Alice is, “How do you want to open and close
    the feeding doors?” “Well,” she says, “how about a remote control? That way I
    can stay inside the house and just open and close the doors when the birds arrive.”
    And so the game begins again.


    Just like last time we can take this sketchy problem statement and try to put
    together a use case. Our previous use case looked like:


    1.  The sensor detects sunlight at a 40% brightness level.

    2.  The feeding doors open.

    3.  The birds arrive, eat, and drink.

    4.  The birds leave.

    5.  The sensor detects a decrease in sunlight to a 25% brightness level.

    6.  The feeding doors close.


    So the first thing we need to decide is whether our new problem is an alternate
    path in this use case, or whether we need an entirely new use case.


    Let''s try a new use case. Why? Well, using the remote control doesn''t really
    fit into the sensor use case, does it? The remote can be activated at any time
    and it requires a user interaction, neither of which fits with our sensor. So
    let''s see what we can come up with for a remote control use case:


    1.  Alice hears or sees birds at the bird feeder.

    2.  Alice determines that they are *not* songbirds

    3.  Alice presses the remote control button.

    4.  The feeding doors close.

    5.  The birds give up and fly away.

    6.  Alice presses the remote control button.

    7.  The feeding doors open again.


    Does this cover all the situations? Are there any we''ve missed? There are two
    things to think of. First, in step #1 we have “Alice hears or sees birds.” The
    question is should the “or” matter to us? In this case the answer is no, because
    Alice is the one deciding and she''s the actor in this use case. We can''t control
    the actor; we can only respond to something the actor wants to do and make available
    options for the actor to exercise. In our case, our program will need to wait
    for the signal from the remote control and then do the right thing. (Not to get
    ahead of ourselves, but look at our program now as an event-driven system and
    the program has to wait (aka listen) for an event before it does something.)


    Secondly, what are the steps in the use case that will help us identify new objects?
    This is where our textual analysis comes in. In our previous version of this application,
    we''ve already got *`BirdFeeder`*, *`Sensor`*, and *`FeedingDoor`* objects. These
    are identified in the use case easily. So what is new now? The only new object
    here is the remote control. So what does the remote control do? How many buttons
    does it have? What does the program do when the remote control button(s) is(are)
    pressed?


    In our example, the remote control seems relatively simple. Opening and closing
    the feeding doors is a toggle operation. The doors open if they are closed, and
    close if they are open. Those are the only options. So the remote really just
    needs a single button to implement the toggle function.


    So at the end of the day we''ve got a new use case and a new class for the B⁴++
    program (see [Figure 9-1](#Chapter09.html#fig_9_1)).


    ![images](images/0901.jpg)


    ***Figure 9-1.** The new RemoteControl class*


    And that, I think, is all the analysis we need for this version of the program.


    This exercise provides us with a couple of guidelines we can use for analysis.


    *   First, make *simple classes that work together* by sending and responding
    to messages. In our example, the simple classes *`FeedingDoor`* and *`Sensor`*
    encapsulate knowledge about the current state of the *`BirdFeeder`* and allow
    us to control the bird feeder with simple messages. This simplicity allows us
    to easily add a new way of controlling the bird feeder with the *`RemoteControl`*
    class.

    *   Second, we say that *classes should have one responsibility.* Not only are
    the `FeedingDoor` and `Sensor` simple and easy to control, but they each only
    do one thing. That makes them easier to change later and easier to reuse.'
