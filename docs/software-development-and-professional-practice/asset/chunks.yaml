  trans: "\n`    public void testPhoneContactCreation() {`\n`        String fname\
    \ = \"Fred\";`\n`        String lname = \"Flintstone\";`\n`        String phone\
    \ = \"800-555-1212\";`\n`        String email = \"fred@knox.edu\";`\n\n`        PhoneContact\
    \ pc = new PhoneContact(fname, lname, phone, email);`\n`        assertEquals(lname,\
    \ pc.getLastName());`\n`        assertEquals(fname, pc.getFirstName());`\n`        assertEquals(phone,\
    \ pc.getPhoneNum());`\n`        assertEquals(email, pc.getEmailAddr());`\n`    }`\n\
    \n`    public void testFileOpen() {`\n`        String fileName = \"phoneList.txt\"\
    ;`\n\n`        PhoneContactList pc = new PhoneContactList();`\n`        boolean\
    \ fileOK = pc.fileOpen(fileName);`\n`        assertTrue(fileOK);`\n\n`        if\
    \ (fileOK == false) {`\n`            System.out.println(\"Open Failed, File Not\
    \ Found\");`\n`            System.exit(1);`\n`        }`\n`    }`\n`}`\n\n要在 BlueJ\
    \ 中运行这组测试，我们从图 14-2 所示的下拉菜单中选择“测试全部”。\n\n![images](img/1402.jpg)\n\n***图 14-2.**\
    \ JUnit 菜单 - 选择“测试全部”来运行测试*\n\n由于我们还没有创建 `phoneList.txt` 文件，因此会得到图 14-3 所示的输出。\n\
    \n![images](img/1403.jpg)\n\n***图 14-3.** JUnit 测试输出*\n\n在这里，我们注意到 `testFileOpen()`\
    \ 测试失败了。\n\n每当我们对程序进行任何更改时，都可以向 `TestPhoneContact` 类添加另一个测试，并通过一次菜单选择重新运行所有测试。测试框架使得创建单个测试和整个测试套件变得容易得多，这些测试可以在每次对程序进行更改时运行。这让我们每次做出更改时都能知道是否破坏了某些东西。非常酷。\n\
    \n### 测试是好事\n\n归根结底，单元测试是开发过程中至关重要的一部分。如果做得仔细且正确，它可以帮助你在将代码集成到更大的程序之前就消除绝大多数错误。TDD（测试驱动开发）是一种有效的方法，它先编写测试，然后编写使测试通过的代码，这有助于在底层设计和编码中捕获错误，并允许你轻松快速地创建一个回归测试套件，可用于每次集成和每次程序基线。\n\
    \n### 结论\n\n从开发者的角度来看，单元测试是你的程序将经历的最重要的测试类别。它是最基本的测试类型，确保你的代码在最低级别上满足设计要求。尽管开发者更关心确保程序能工作，而不是破坏它，但培养良好的单元测试思维对于你成长为一名成熟、高效的程序员至关重要。测试框架使这项工作比过去容易得多，因此学习本地测试框架的运作方式并学会编写良好的测试是你应该努力掌握的技能。最好是你自己发现自己的错误，而不是让客户发现。\n\
    \n## 第 15 章\n\n## 走查、代码审查和检查\n\n> *我们进行检查的目标是通过更早、更低成本地发现和消除缺陷来降低质量成本。虽然某些测试总是必要的，但我们可以通过减少传播到测试阶段的缺陷数量来降低测试成本。*\n\
    > \n> —罗恩·拉迪斯 (2002)\n> \n> *当你尽早捕获错误时，你也会遇到更少的复合错误。复合错误是两个相互作用的独立错误：你下楼时绊倒了，当你伸手去抓扶手时，扶手却掉在了你手里。*\n\
    > \n> —保罗·格雷厄姆 (2001)\n\n这里有一个令人震惊的事实：你在软件开发中的主要质量目标是向用户交付一个满足所有需求且没有缺陷的可运行程序。没错：你的代码应该是完美的。它满足用户的所有需求，并且在交付时没有任何错误。不可能？你喊道。做不到？好吧，*软件质量保证*\
    \ 的全部意义就在于尽可能接近完美——尽管要在时间和预算的限制内。（你知道总有难处，对吧？）\n\n软件质量通常从两个不同的角度来讨论：用户的角度和开发者的角度。从用户的角度来看，质量有许多特征——你的程序必须满足这些特征才能被用户接受——其中包括：¹\n\
    \n*   *正确性*：软件必须能工作，就这么简单。\n*   *可用性*：它必须易于学习和使用。\n*   *可靠性*：它必须保持运行，并在你需要时可用。\n\
    *   *安全性*：软件必须防止未经授权的访问，并且必须保护你的数据。\n*   *适应性*：应该易于添加新功能。\n\n____________\n\n\
    ¹ 麦康奈尔，S. 《代码大全 2：软件构建实践手册》。（雷德蒙德，华盛顿州：微软出版社，2004 年。）\n\n从开发者的角度来看，情况略有不同。开发者希望看到以下几点：\n\
    \n*   *可维护性*：必须易于对软件进行更改。\n*   *可移植性*：必须易于将软件迁移到不同的平台。\n*   *可读性*：许多开发者不会承认这一点，但你确实需要能够阅读代码。\n\
    *   *可理解性*：代码的设计方式需要让新开发者能够理解所有部分是如何组合在一起的。\n*   *可测试性*：嗯，至少测试人员认为你的代码应该易于测试。以模块化方式创建的代码，使用只做一件事的短函数，比所有代码都挤在一个巨大的\
    \ main() 函数中要容易理解和测试得多。\n\n软件质量保证 (SQA) 有三个支柱：\n\n*   *测试*：发现程序执行时出现的错误，也称为*动态分析*。\n\
    *   *调试*：从代码中清除所有明显的错误，即通过测试发现的错误。\n*   *审查*：发现代码中固有的错误，也称为*静态分析*。\n\n许多开发者——以及管理者——认为可以通过测试来达到质量目标。你做不到。正如我们在上一章中看到的，测试是有限的。你通常无法探索每条代码路径，无法测试每种可能的数据组合，而且你的测试本身也常常存在缺陷。测试只能帮你走到这一步。正如艾兹格·迪杰斯特拉的名言：“……程序测试可以是一种非常有效的方法来显示错误的存在，但对于证明其不存在，则是完全不够的。”²\n\
    \n审查你的代码——阅读它并在页面上寻找错误——提供了另一种机制，以确保你正确实现了用户的需求和由此产生的设计。事实上，大多数使用计划驱动方法论的开发组织不仅会审查代码，还会审查需求文档、架构、设计规范、测试计划、测试本身以及用户文档。简而言之，就是软件开发组织产生的所有*工作产品*。使用敏捷开发方法论的开发组织不一定拥有上述所有文档，但它们确实有需求、用户故事、用户文档，尤其是需要审查的代码。在本章中，我们将重点讨论审查你的代码。\n\
    \n__________\n\n² 迪杰斯特拉，E. “谦卑的程序员。” *CACM* 15(10): 859-866。1972 年。\n"
- fmt: '### Walkthroughs, Reviews, and Inspections – Oh My!


    Testing alone is not a particularly effective way of finding errors in your code.
    In many cases, the combination of unit testing, integration testing, and system
    testing will only find about 50% or so of the errors in your program.[³](#Chapter15.html#CHP-15-FN-3)
    But, if you add some type of code review (reading the code to find errors) to
    your testing regimen you can bring that percentage up to between 93% and 99% of
    all the errors in your code. Now that''s an objective to shoot for.


    There are three types of reviews that are typically done, and they work their
    way up from very informal techniques, to very formal methodologies. These reviews
    are typically done either right after you''ve got a clean compile of your code
    and before you unit test, or right after you finish your unit testing. It''s better
    to do the reviews right after unit testing. Then you''ve got your changes made,
    you''ve got a clean compile, and you''ve done the first round of testing. That''s
    a great time to have someone else take a look at your code.


    ### Walkthroughs


    *Walkthroughs*, also known as *desk checks* or *code reads*, are the least formal
    type of a review. Walkthroughs are normally used to confirm small changes to code,
    say a line or two, that you have just made to fix an error. If you''ve just added
    a new method to a class, or you''ve changed more than about 10 lines of code,
    under no circumstances should you do a walkthrough. Do a code review instead.


    Walkthroughs involve two or at most three people: the author of the code and the
    reviewer. The author''s job in a walkthrough is to explain to the reviewer what
    the change is supposed to do and to point out where the change was made. The reviewer''s
    job is to understand the change and then read the code. Once the reviewer reads
    the code she makes one of two judgments; either she agrees that the change is
    correct, or she does not. If not, the author has to go back, fix the code again,
    and then do another walkthrough. If the reviewer thinks the change is correct,
    then the author can integrate the changed code back into the code base for integration
    testing.


    If you''re using an agile methodology and you''re pair programming, a code walkthrough
    will happen naturally as you are implementing a task. The driver is writing the
    code and the navigator is looking over her shoulder, checking for errors and thinking
    ahead. In this case it''s acceptable to use a walkthrough for a larger piece of
    code, but for a complete task, or better yet, for each user story that is implemented,
    you should do a code review or an inspection.


    ### Code Reviews


    *Code reviews*, on the other hand, are somewhat more formal than a walkthrough.
    Code reviews are what most software developers do. You should always do a code
    review if you''ve changed a substantial amount of code, or if you''ve added new
    code to an existing program. As mentioned, agile programmers should do code reviews
    when they finish a user story. Code reviews are real meetings.


    There are usually between three and five attendees at a code review. The people
    who attend a code review should each bring a different perspective to the meeting.


    ____________


    ³ McConnell, 2004.


    *   The moderator of the code review is usually the author. It''s the moderator''s
    job to call the meeting, send out the work to be reviewed well before the meeting
    time, and to run the code review meeting. The moderator may also take notes at
    the meeting.

    *   There should be one or more developers at the meeting; someone who is working
    on the same project as the author. This person will bring detailed knowledge of
    the project to the meeting and assume that perspective.

    *   There should be a tester at the code review. This person brings the testing
    perspective and not only reads the code being reviewed, but thinks about ways
    the code should be tested.

    *   Finally, there should be an experienced developer present who is not on the
    same project as the author. This person is the “disinterested third-party” who
    represents the quality perspective. Their job at the code review is to understand
    the code and get the author to explain the changes clearly. This person provides
    a more strategic vision about the code and how it fits into the project.


    Oh, and no managers are allowed at code reviews. The presence of a manager changes
    the dynamics of the meeting and makes the code review less effective. People who
    might be willing to honestly critique a piece of code among peers will clam up
    in the presence of a manager; this doesn''t help find errors. No managers, please.


    The objective of a code review is to find errors in the code. It is not to fix
    them. Code reviews are informal enough that some discussion of fixes may occur,
    but that should be kept to a minimum. Before the code review meeting, all the
    participants should go over the materials sent out by the moderator and prepare
    a list of errors they find. This step is critical to making the review meeting
    efficient and successful. Do your homework!


    This list should be given to the moderator at the beginning of the meeting. The
    author (who may also be the moderator) goes through the code changes, explaining
    them and how they either fix the error they were intended to fix, or add the new
    feature that was required. If an error or a discussion leads the review meeting
    off into code that was not in the scope of the original review – Stop! Be very
    careful about moving off into territory that hasn''t been pre-read. You should
    treat any code not in the scope of the review as a black box. Schedule another
    meeting instead. Remember, the focus of the code review is on a single piece of
    code and finding errors in that piece of code. Don''t be distracted.


    A computer and projector are essential at the code review so that everyone can
    see what''s going on all the time. A second computer should be used so that someone
    (usually the author) can take notes about errors found in the code. A code review
    should not last more than about two hours or review more than about 200–500 lines
    of code because everyone''s productivity will begin to suffer after about that
    amount of time or reading.


    After the code review, the notes are distributed to all the participants and the
    author is charged with fixing all the errors that were found during the review.
    If you run out of time, then another review is scheduled. While metrics aren''t
    required for code reviews, the moderator should at least keep track of how many
    errors were found, how many lines of code were reviewed, and if appropriate, the
    severity of each of the errors. These metrics are very useful to gauge productivity
    and should be used in planning the next project.'
