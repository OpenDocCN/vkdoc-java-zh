  trans: '

    ## 结构化设计


    > *投资于抽象，而非实现。抽象能够经受住来自不同实现和新技术的变革冲击。*


    ——安迪·亨特与戴夫·托马斯¹


    ### 结构化编程


    *结构化设计*源于艾兹格·迪杰斯特拉 1968 年写给《ACM 通讯》的著名信件《GOTO 语句有害论》。迪杰斯特拉在论文结尾写道：


    > *当前的 **goto** 语句过于原始；它极易诱使程序员把程序搞得一团糟。我们可以将所考虑的语句（编者注：if-then-else、switch、while-do
    和 do-while）视为对其使用的约束。我并非声称这些语句已穷尽所有需求，但无论提出何种语句（例如终止语句），它们都应满足一个要求：能够维护一个独立于程序员的坐标系，以便以有益且可管理的方式描述过程。²*


    自此以后诞生的编程语言，虽然并未完全消除 goto 语句（Java 除外，它完全没有 goto），但无疑弱化了其使用，教授编程的课程也鼓励学生避免使用它。取而代之的是，问题求解采用自上而下的结构化方式：从问题陈述开始，尝试将问题分解为一组可解决的子问题。这一过程持续进行，直到每个子问题都小到要么微不足道，要么非常容易解决。这种技术被称为*结构化编程*。在
    80 年代中期面向对象编程出现并被接受之前，这是问题求解和编程的标准方法。它至今仍是处理大量问题的最佳方式之一。


    __________


    ¹ 亨特，A. 与 D. 托马斯。《程序员修炼之道：从小工到专家》。（马萨诸塞州波士顿：Addison-Wesley，2000 年。）


    ² 迪杰斯特拉，E. 《GOTO 语句有害论》。《ACM 通讯》11(3)：147-148。（1968 年）


    ### 逐步求精


    尼克劳斯·维尔特在其 1971 年的论文《通过逐步求精进行程序开发》中正式确立了这一技术。³*逐步求精*认为，程序设计由一系列求精步骤组成。在每一步中，一个给定的任务被分解为若干子任务。每次任务求精都必须伴随数据描述和接口的求精。所获得的模块化程度将决定程序适应需求或环境变化的难易程度。


    在求精过程中，应使用问题空间自然对应的符号表示。应尽可能避免过早使用编程语言进行描述。每次求精都意味着基于一组设计准则做出若干设计决策。这些准则包括时间和空间效率、清晰度以及结构的规律性（简洁性）。


    求精可以按两种方式进行：自上而下或自下而上。自上而下求精的特点是，从问题的总体描述逐步深入到各个模块或例程的具体功能陈述。逐步求精背后的指导原则是，人类一次只能专注于少数几件事；即米勒著名的
    7±2 数据块法则。⁴ 其工作方式为：


    *   分析问题，尝试识别解决方案的轮廓以及每种可能性的利弊；

    *   然后，先设计顶层结构；

    *   避免涉及特定语言的细节；

    *   将细节向下推，直至到达底层；

    *   形式化每一层；

    *   验证每一层；

    *   然后进入下一层，进行下一组求精。（即重复此过程。）


    持续对解决方案进行求精，直到感觉编码比继续分解更容易为止；我们将在本章后面看到这一过程的一个示例。


    也就是说，你会一直工作，直到对设计变得如此显而易见和简单而感到不耐烦为止。这里的缺点是，你并没有一个很好的“何时停止”的衡量标准。这只能靠实践来掌握。


    如果你无法从顶层开始，那就从底层开始。


    *   问自己：“我知道系统需要做什么？”这通常涉及底层 I/O 操作、其他对数据结构的底层操作等。

    *   根据这个问题，尽可能多地识别出底层函数和组件。

    *   识别底层组件的共同点，并将它们分组。

    *   继续处理上一层，或者回到顶层再次尝试向下工作。


    __________


    ³ 维尔特，N. 《通过逐步求精进行程序开发》。《CACM》14(4)：221-227。（1971 年）


    ⁴ 米勒，G. A. 《神奇的数字七，加减二：我们处理信息能力的一些限制》。《心理学评论》63：81-97。（1956 年）


    自下而上的评估通常能早期识别出实用例程，这有助于实现更紧凑的设计。它也有助于促进复用——因为你复用了底层例程。缺点是，自下而上的评估很难单独使用——你几乎总会在某个时刻切换回自上而下的方法，有时你会发现根本无法从底层向上拼凑出一个更大的整体。这并非真正的逐步求精，但它可以帮助你起步。大多数实际的逐步求精过程都涉及自上而下和自下而上设计元素的交替使用。幸运的是，自上而下和自下而上的设计方法可以很好地互补。


    #### 逐步求精示例：八皇后问题


    八皇后问题对大多数学生来说都很熟悉。问题是要在标准的 8×8 国际象棋棋盘上放置八个皇后，使得任何皇后都不能被其他皇后攻击。该问题的一个可能解如图 7-1
    所示。


    ![images](img/0701.jpg)


    ***图 7-1.** 八皇后问题的一个解*


    请记住，皇后可以沿水平、垂直或对角线方向移动任意数量的格子。事实证明，至今尚未有人找到该问题的解析解，而且很可能根本不存在这样的解。那么你会如何解决这个问题呢？请继续，思考一下；我会等你。


    ……


    ……


    好了吗？好的。让我们看看分解这个问题的一种方式。

    '
- fmt: "##### Proposed Solution 1\n\nThe first thing we need to do is to look at the\
    \ problem and tease out the requirements and the outline of a solution. This will\
    \ start us down the road of answering the question of what the top-level decomposition\
    \ should be.\n\nFirst you could think of solving the problem using brute force;\
    \ just try all the possible arrangements of queens and pick the ones that work.\
    \ With 8 queens and 64 possible squares there are\n\n![images](images/p74-01.jpg)\n\
    \npossible board configurations, where `n` is the number of squares on the board\
    \ and `k` is the number of queens, which is only 4,426,165,368 (a bit over 4 billion\
    \ configurations). These days, that's not very many, so brute force might be the\
    \ way to go.\n\nSo if we generate a set `A` of all the possible board combinations,\
    \ we can create a test called `q(x)` that returns a `true` if the board configuration\
    \ `x` is a solution, and returns `false` if `x` is not a solution. Then we can\
    \ create a program that looks like the following:\n\n```\nGenerate the set A of\
    \ all board configurations;\nwhile there are still untested configurations in\
    \ A do\n    x = the next configuration from A\n    if (q(x) == true) then print\
    \ the solution x and stop\n    go back to the top and do it again.\n```\n\nNotice\
    \ that all the work is getting done in two steps – generating the set `A` and\
    \ performing the test `q(x)`. The generation of `A` only happens once, but performing\
    \ the test `q(x)` happens once for every configuration in `A` until you find a\
    \ solution. While this decomposition will surely work, it's not terribly efficient.\
    \ So let's just say that we'd rather reduce the number of combinations. Efficiency\
    \ is a good thing, after all.\n\n##### Proposed Solution 2\n\nAgain, we need to\
    \ start at the top level. But this time we've done some analysis, so we have a\
    \ clearer idea of what has to happen. We've eliminated brute-force, but we see\
    \ that we can think in terms of board configurations. In order to reduce the number\
    \ of total possible configurations and then come up with a more efficient algorithm,\
    \ we need to think about the problem. The first thing to notice is that you can\
    \ never have more than one queen in a column, in fact, you must have *exactly*\
    \ one queen per column. That reduces the number of possible combinations to `2^(24)`\
    \ or just 16 million. Although this is good, it doesn't really change the algorithm.\
    \ Our proposed solution would now look like:\n\n```\nGenerate the set B of restricted\
    \ board configurations;\nwhile there are still untested configurations in B do\n\
    \    x = the next configuration from B\n    if (q(x) == true) then print the solution\
    \ x and stop\n    go back to the top and do it again.\n```\n\nThis version requires\
    \ generating the set `B`, of board positions with one queen in each column and\
    \ still requires visiting up to 16 million possible board positions. Generating\
    \ `B` is now more complicated than generating `A` because we now have to test\
    \ to see if a proposed board position meets the one queen per column restriction.\
    \ There must be a better way.\n\n##### Proposed Solution 3\n\nWell, of course\
    \ there is. We just need to be more intelligent about generating board configurations\
    \ and evaluate board positions while we're generating them. Instead of generating\
    \ a complete board configuration and then testing it, why not generate and test\
    \ *partial solutions*? If we can stop as soon as we know we don't have a valid\
    \ solution, then things should go faster. Also, if we can back up from a bad solution\
    \ to the last good partial solution, we can eliminate bad configurations more\
    \ quickly.\n\nNow we're at the point where we can do that top-level design, formalize\
    \ it, and move down to the next refinement level.\n\n##### Refinement 1\n\nHere's\
    \ the idea.\n\n1.  Put down a queen on the next row in the next available column.\n\
    2.  Test the queen to see if she can attack any other queen. (That's a variation\
    \ on the `q(x)` test above.)\n3.  If she can attack, pick her back up, back up\
    \ to the previous trial solution and try again.\n4.  If she can't attack, leave\
    \ her alone and go back to the top and try the next queen.\n\nWith this method,\
    \ we're guaranteed that the trial solution at column `j` is correct. We then attempt\
    \ to generate a new solution by adding a queen in column `j+1`. If this fails,\
    \ we just need to back up to our previous correct trial solution at column `j`\
    \ and try again. This technique of creating and testing partial solutions is called\
    \ a *stepwise construction of trial solutions* by Wirth. And the backing up technique\
    \ is, of course, called *backtracking*. Here's more formal pseudo-code to find\
    \ a single solution:\n\n```\ndo {\n    while ((row < 8) && (col < 8)) {\n    \
    \    if (the current queen is safe) then\n            advance: keep the queen\
    \ on the board and advance to the next col.\n        else\n            the queen\
    \ is not safe, so move up to the next row.\n    }\n    if (we've exhausted all\
    \ the rows in this column) then\n        regress: retreat a column, move its queen\
    \ up a row, and start again.\n} while ((col < 8) && (col >= 0));\nif (we've reached\
    \ column 8) then\n    we have a solution, print it.\n```\n\nThis solution tests\
    \ only a single queen at a time. One implication of this is that, at any given\
    \ time, there are only `j` queens on the board and so only `j` queens need to\
    \ be tested each time through the outer loop. (One only needs to test the queens\
    \ up through column `j`.) That reduces the amount of work in the testing routine.\n\
    \nThis algorithm is our first formal view of the solution. Notice in the method\
    \ described above that we're using pseudo-code rather than a real programming\
    \ language. This is because we want to push language details further down the\
    \ refinement levels. Also, while we've got a general outline of the method, there\
    \ are a lot of details still to be considered. These details have been pushed\
    \ down in the hierarchy of control we're creating, and we'll get to them in the\
    \ next refinement iteration. This is also a function of the stepwise refinement.\n\
    \nNow that we have a description of the algorithm, we can also work to verify\
    \ it. The final verification will, of course, be watching the program produce\
    \ a correct solution but we're not at that point yet. However, we can surely take\
    \ a chess board (or a piece of paper) and walk through this algorithm by hand\
    \ to verify that we can generate a placement of queens on the board that is a\
    \ solution to the problem.\n\nAt this point we've got a more formal top-level\
    \ description, we've done what verification we can, and we're ready to expand\
    \ those fuzzy steps we see above."
  raw: '##### Proposed Solution 1


    The first thing we need to do is to look at the problem and tease out the requirements
    and the outline of a solution. This will start us down the road of answering the
    question of what the top-level decomposition should be.


    First you could think of solving the problem using brute force; just try all the
    possible arrangements of queens and pick the ones that work. With 8 queens and
    64 possible squares there are


    ![images](images/p74-01.jpg)


    possible board configurations, where n is the number of squares on the board and
    k is the number of queens, which is only 4,426,165,368 (a bit over 4 billion configurations).
    These days, that''s not very many, so brute force might be the way to go.


    So if we generate a set A of all the possible board combinations, we can create
    a test called *q(x)* that returns a *true* if the board configuration x is a solution,
    and returns *false* if x is not a solution. Then we can create a program that
    looks like the following:


          Generate the set A of all board configurations;


          *while* there are still untested configurations in A *do*


                x = the next configuration from A


                *if* (q(x) == true) *then* print the solution x and stop


                *go back* to the top and do it again.


    Notice that all the work is getting done in two steps – generating the set A and
    performing the test *q(x)*. The generation of A only happens once, but performing
    the test *q(x)* happens once for every configuration in A until you find a solution.
    While this decomposition will surely work, it''s not terribly efficient. So let''s
    just say that we''d rather reduce the number of combinations. Efficiency is a
    good thing, after all.


    ##### Proposed Solution 2


    Again, we need to start at the top level. But this time we''ve done some analysis,
    so we have a clearer idea of what has to happen. We''ve eliminated brute-force,
    but we see that we can think in terms of board configurations. In order to reduce
    the number of total possible configurations and then come up with a more efficient
    algorithm, we need to think about the problem. The first thing to notice is that
    you can never have more than one queen in a column, in fact, you must have *exactly*
    one queen per column. That reduces the number of possible combinations to 2^(24)
    or just 16 million. Although this is good, it doesn''t really change the algorithm.
    Our proposed solution would now look like:


          Generate the set B of restricted board configurations;


          *while* there are still untested configurations in B *do*


                x = the next configuration from B


                *if* (q(x) == true) *then* print the solution x and stop


                *go back* to the top and do it again.


    This version requires generating the set, B, of board positions with one queen
    in each column and still requires visiting up to 16 million possible board positions.
    Generating B is now more complicated than generating A because we now have to
    test to see if a proposed board position meets the one queen per column restriction.
    There must be a better way.


    ##### Proposed Solution 3


    Well, of course there is. We just need to be more intelligent about generating
    board configurations and evaluate board positions while we''re generating them.
    Instead of generating a complete board configuration and then testing it, why
    not generate and test *partial solutions*? If we can stop as soon as we know we
    don''t have a valid solution, then things should go faster. Also, if we can back
    up from a bad solution to the last good partial solution, we can eliminate bad
    configurations more quickly.


    Now we''re at the point where we can do that top-level design, formalize it, and
    move down to the next refinement level.


    ##### Refinement 1


    Here''s the idea.


    1.  Put down a queen on the next row in the next available column.

    2.  Test the queen to see if she can attack any other queen. (That''s a variation
    on the *q(x)* test above.)

    3.  If she can attack, pick her back up, back up to the previous trial solution
    and try again.

    4.  If she can''t attack, leave her alone and go back to the top and try the next
    queen.


    With this method, we''re guaranteed that the trial solution at column j is correct.
    We then attempt to generate a new solution by adding a queen in column j+1\. If
    this fails, we just need to back up to our previous correct trial solution at
    column j and try again. This technique of creating and testing partial solutions
    is called a *stepwise construction of trial solutions* by Wirth. And the backing
    up technique is, of course, called *backtracking*. Here''s more formal pseudo-code
    to find a single solution:


    `do {`

    `            while ((row < 8) && (col < 8))  {`

    `                if (the current queen is safe) then`

    `                    advance: keep the queen on the board and advance to the next
    col.`

    `                else`

    `                    the queen is not safe, so move up to the next row.`

    `            }`

    `            if (we''ve exhausted all the rows in this column) then`

    `                regress: retreat a column, move its queen up a row, and start
    again.`


    `      } while ((col < 8) && (col >= 0));`

    `      if (we''ve reached column 8) then`

    `        we have a solution, print it.`


    This solution tests only a single queen at a time. One implication of this is
    that, at any given time, there are only j queens on the board and so only j queens
    need to be tested each time through the outer loop. (One only needs to test the
    queens up through column j.) That reduces the amount of work in the testing routine.


    This algorithm is our first formal view of the solution. Notice in the method
    described above that we''re using pseudo-code rather than a real programming language.
    This is because we want to push language details further down the refinement levels.
    Also, while we''ve got a general outline of the method, there are a lot of details
    still to be considered. These details have been pushed down in the hierarchy of
    control we''re creating, and we''ll get to them in the next refinement iteration.
    This is also a function of the stepwise refinement.


    Now that we have a description of the algorithm, we can also work to verify it.
    The final verification will, of course, be watching the program produce a correct
    solution but we''re not at that point yet. However, we can surely take a chess
    board (or a piece of paper) and walk through this algorithm by hand to verify
    that we can generate a placement of queens on the board that is a solution to
    the problem.


    At this point we''ve got a more formal top-level description, we''ve done what
    verification we can, and we''re ready to expand those fuzzy steps we see above.'
  trans: '

    ##### 方案一


    我们首先要做的是审视问题，梳理需求并勾勒出解决方案的轮廓。这将引导我们思考顶层分解应该是什么样子。


    首先，你可以考虑用暴力法解决问题：尝试所有可能的皇后摆放位置，然后选出可行的方案。在 8 个皇后和 64 个可选方格的情况下，可能的棋盘配置数为


    ![images](img/p74-01.jpg)


    其中 n 是棋盘上的方格数，k 是皇后数，计算结果仅为 4,426,165,368（略多于 40 亿种配置）。如今看来，这个数量并不算大，因此暴力法或许可行。


    因此，如果我们生成所有可能棋盘组合的集合 A，就可以创建一个名为 *q(x)* 的测试函数：若棋盘配置 x 是一个解，则返回 *true*；否则返回 *false*。然后我们可以编写如下所示的程序：


          生成所有棋盘配置的集合 A；


          *当* A 中仍有未测试的配置时，*执行*


                x = A 中的下一个配置


                *如果* (q(x) == true) *则* 打印解 x 并停止


                *返回* 顶部并重复执行。


    请注意，所有工作都在两个步骤中完成——生成集合 A 和执行测试 *q(x)*。生成 A 只执行一次，但测试 *q(x)* 会对 A 中的每个配置执行一次，直到找到解。虽然这种分解方案肯定可行，但效率并不高。所以我们不妨说，我们希望减少组合数量。毕竟，效率是件好事。


    ##### 方案二


    同样，我们需要从顶层开始。但这次我们已经做了一些分析，因此对需要完成的任务有了更清晰的认识。我们排除了暴力法，但发现可以从棋盘配置的角度来思考。为了减少总可能配置的数量，并设计出更高效的算法，我们需要深入思考这个问题。首先要注意的是，同一列中绝不能有多个皇后，实际上，每列必须*恰好*有一个皇后。这将可能的组合数减少到
    2²⁴，即仅 1600 万。虽然这很不错，但并没有真正改变算法。我们提出的解决方案现在看起来是这样的：


          生成受限棋盘配置的集合 B；


          *当* B 中仍有未测试的配置时，*执行*


                x = B 中的下一个配置


                *如果* (q(x) == true) *则* 打印解 x 并停止


                *返回* 顶部并重复执行。


    这个版本需要生成集合 B，即每列只有一个皇后的棋盘位置集合，并且仍然需要遍历多达 1600 万个可能的棋盘位置。生成 B 现在比生成 A 更复杂，因为我们必须测试一个候选棋盘位置是否满足每列一个皇后的限制。一定有更好的方法。


    ##### 方案三


    当然，确实有更好的方法。我们只需要更智能地生成棋盘配置，并在生成过程中评估棋盘位置。与其先生成一个完整的棋盘配置再测试，为什么不生成并测试*部分解*呢？如果我们能在确定没有有效解时立即停止，那么事情就会进展得更快。此外，如果我们能从错误的解回溯到上一个正确的部分解，就能更快地排除错误的配置。


    现在我们到了可以进行顶层设计、将其形式化，并进入下一层细化阶段的时候了。


    ##### 细化步骤 1


    思路如下。


    1.  在下一可用列的下一行放置一个皇后。

    2.  测试该皇后是否能攻击到其他任何皇后。（这是上述 *q(x)* 测试的一个变体。）

    3.  如果能攻击，则将其拿起，回溯到上一个试验解并重试。

    4.  如果不能攻击，则保留该皇后，返回顶部并尝试下一个皇后。


    使用这种方法，我们可以保证第 j 列的试验解是正确的。然后我们尝试通过在第 j+1 列添加一个皇后生成新的解。如果失败，我们只需回溯到第 j 列之前正确的试验解并重试。这种创建和测试部分解的技术被
    Wirth 称为*试验解的逐步构造*。而回溯技术自然被称为*回溯法*。以下是寻找单个解的更形式化的伪代码：


    `do {`

    `            while ((row < 8) && (col < 8))  {`

    `                if (当前皇后是安全的) then`

    `                    前进：保留皇后在棋盘上，并前进到下一列。`

    `                else`

    `                    皇后不安全，因此移动到下一行。`

    `            }`

    `            if (我们已经穷尽了该列的所有行) then`

    `                回归：后退一列，将该列的皇后上移一行，然后重新开始。`


    `      } while ((col < 8) && (col >= 0));`

    `      if (我们已经到达第 8 列) then`

    `        我们找到了一个解，打印它。`


    这个解决方案每次只测试一个皇后。这意味着，在任何给定时刻，棋盘上只有 j 个皇后，因此每次外层循环只需测试 j 个皇后。（只需测试到第 j 列的皇后。）这减少了测试例程的工作量。


    这个算法是我们对解决方案的第一次形式化审视。请注意，上述方法中我们使用的是伪代码，而不是真正的编程语言。这是因为我们希望将语言细节推迟到更低的细化层级。此外，虽然我们已经有了方法的大致框架，但仍有许多细节需要考虑。这些细节已被推入我们正在创建的控制层级中，我们将在下一次细化迭代中处理它们。这也是逐步细化的一个特点。


    既然我们已经有了算法的描述，我们也可以着手验证它。最终的验证当然是观察程序产生正确的解，但我们目前还不到那一步。不过，我们完全可以拿一个棋盘（或一张纸）手动模拟这个算法，以验证我们能否生成一个符合问题要求的皇后摆放方案。


    至此，我们有了一个更形式化的顶层描述，也完成了力所能及的验证，现在可以准备展开上面那些模糊的步骤了。

    '
- fmt: "### Refinement 2\n\nNow that we’ve got a first cut at the program, we need\
    \ to examine each of the steps in the program and see what they are made of. The\
    \ steps we’re interested in are:\n\n1. Check to see if the current queen is safe.\n\
    2. Keep a safe queen on the board and advance to the next column.\n3. Advance\
    \ an unsafe queen up a row.\n4. Retreat a column and reset the queen in that column.\n\
    \nChecking to see if the current queen is safe means that we need to check that\
    \ there are no other queens on either of the diagonals (the up or down diagonals)\
    \ or the row that the current queen is on. The row check is easy: one just checks\
    \ all the other squares in the same row. To check the up and down diagonals, remember\
    \ that if the current queen is at column `j`, we only need to check columns `1`\
    \ through `j-1`. If you think about it for a minute, you’ll see that the difference\
    \ between the row and column indexes of all the squares on the up diagonal (those\
    \ that go from lower-left to upper-right) are a constant. Similarly, the sum of\
    \ the row and column indexes of all the squares on the down diagonal (those that\
    \ go from upper-left to lower-right) are also a constant. This makes it easier\
    \ to figure out which cells are on the diagonal of a queen and how to check them.\n\
    \nNow we’re ready to start considering data structures. Where did this come from,\
    \ you ask? Well, stepwise refinement is mostly about describing the control flow\
    \ of the program. But at some point you need to decide on exactly what the data\
    \ will look like. For each problem you try to solve, this will happen at a different\
    \ place in your refinement process. For this problem we’re at a place where in\
    \ the next refinement we should be writing more detailed pseudo-code. That is\
    \ pretty much forcing us to think about data structures now, so we can do the\
    \ pseudo-code.\n\nIn particular, now we need to ask ourselves: how are we going\
    \ to represent the board and the queens on the board? How are we going to represent\
    \ the empty cells? We need a data structure that will allow us to efficiently\
    \ represent queens and check whether they can be attacked. A first cut at this\
    \ might be an 8 × 8 two-dimensional array where we place queens at the appropriate\
    \ row and column intersections. Because we don’t need to do any computation on\
    \ this matrix – all we need is to indicate the presence or absence of a queen\
    \ – we can save space by making it a boolean array. This data structure also allows\
    \ us to quickly check the rows, and the up and down diagonals for queens that\
    \ can attack the current queen. So we should use a 2D boolean array, right?\n\n\
    Well, not so fast. This isn’t the only way to think about the data representation\
    \ for queens. In fact, if we think about the data structure and the operations\
    \ we need to perform during the safety check, we might be able to simplify things\
    \ a bit.\n\nFirst of all, since we know that there can only be one queen in each\
    \ column and one queen in each row, why not combine that information? Instead\
    \ of a 2D array, why not just use a 1D boolean array, say:\n\n`boolean column[8];`\n\
    \nwhere `column[i] = true` means that the i-th column is still free. For the diagonals,\
    \ we can use the property about the constant difference or sum of up and down\
    \ diagonals to create two other arrays:\n\n`boolean up[-7..+7], down[0..14];`\n\
    \nthat will indicate which diagonal squares are free. With this arrangement, the\
    \ test for a queen being safe is:\n\n`(column[i] and up[row-col] and down[row+col])`[^5](#Chapter07.html#CHP-7-FN-5)\n\
    \nAll right. This seems simple enough, so we’re finally done with this, right?\n\
    \nWell, no. There’s yet another way to think about this. Going back to using a\
    \ 1D array, but this time using an integer array:\n\n`int board[8];`\n\nwhere\
    \ each *index* into the array represents a column (0 through 7 in the eight-queens\
    \ case), and each *value* stored in the array represents the row on which a queen\
    \ is deposited (also 0 through 7 in the eight-queens case). Because we now have\
    \ data on the exact location (rows and columns) of each queen, we don’t need separate\
    \ arrays for the up and down diagonals. The test for safety is a bit more difficult,\
    \ but still simple. This might be the time for some more code. At this point it\
    \ seems appropriate to move from pseudo-code to a real language. You’ll have to\
    \ make that move at some point in the refinement process. Just like deciding when\
    \ to define your data structures, exactly when to insert language-specific features\
    \ depends on the problem and on how detailed the refinement is at this point.\
    \ A Java method to test for safety might look like:\n\n```\npublic boolean isSafe\
    \ (int[] board) {\n    boolean safe = true;\n    for (int i = 0; i < col; i++)\
    \ {\n        if ( ( ( board[i] + i) == (row + col) ) ||      // down diagonal\
    \ test\n                ( ( board[i] - i) == (row - col) ) ||   // up diagonal\
    \ test\n                ( board[i]  == row) )                   // row test\n\
    \                safe = false;\n    }\n    return safe;\n}\n```\n\nRemember that,\
    \ because we’re creating partial solutions by adding one queen to a column at\
    \ a time, we only need to test the first `col` columns each time.\n\n__________\n\
    \n[^5]: Dahl, O. J., E. Dijkstra, et al. (1972). *Structured Programming.* (London,\
    \ UK: Academic Press, 1972.)\n\nNow that we have the safety procedure out of the\
    \ way and we’ve decided on a simple data structure to represent the current board\
    \ configuration, we can proceed to the remaining procedures in the decomposition.\
    \ The remaining procedures are:\n\n5. Keep a safe queen on the board and advance\
    \ to the next column;\n6. Advance an unsafe queen up a row; and\n7. Retreat a\
    \ column and reset the queen in that column.\n\nThese are all simple enough to\
    \ just write without further decomposition. This is a key point of structured\
    \ programming – keep doing the decompositions until a procedure becomes obvious,\
    \ then you can code. These three methods then look like the following when written\
    \ in code:\n\n```\n/*\n *  keep a safe queen on the board and advance to the next\
    \ column\n *  the queen at (row, col) is safe, so we have a partial solution.\n\
    \ *  advance to the next column\n */\npublic void advance (int[] board) {\n  \
    \  board[col] = row;           // put the queen at (row, col) on the board\n \
    \   col++;                      // move to the next column\n    row = 0;     \
    \               // and start at the beginning of the column\n}\n```\n\nFor *advance\
    \ an unsafe queen up a row* we don’t even need a method. The test in the main\
    \ program for safety moves the queen up a row if the `isSafe()` method determines\
    \ that the current `(row, col)` position is unsafe. The code for this is:\n\n\
    ```\nif (isSafe(board))\n    advance(board);\nelse\n    row++;\n```\n\nFinally,\
    \ we have:\n\n```\n/**\n *  retreat a column and reset the queen in that column\n\
    \ *  we could not find a safe row in current col\n *  so back up one col and move\
    \ that queen\n *  up a row so we can start looking again\n */\npublic void retreat\
    \ (int[] board) {\n    col--;\n    row = board[col] + 1;  \n}\n```\n\nThe complete\
    \ Java program is in the Appendix."
