- fmt: '### The XP Life Cycle


    The XP life cycle contains all the phases of the generic life cycle described
    at the start of the chapter, but it compresses the middle three phases – design,
    code, and test – into a single implementation phase. A productizing phase is added
    after implementation to allow the code to be stabilized before release. The XP
    life cycle shows how producing code is the centerpiece of the methodology.


    9. **Exploration**: Exploration is done when “the customer is confident that there
    is more than enough material on the story cards to make a good first release and
    the programmers are confident that they can''t estimate any better without actually
    implementing the system.”[^(15)](#Chapter02.html#CHP-2-FN-15) During exploration,
    the team''s main goal is to get as many requirements (story cards) written as
    they can. This is also the time when they can explore the architecture possibilities
    by doing a quick spike of the system. Estimate all tasks done during exploration
    to practice your estimation skills. In most projects Exploration is the “fuzzy
    front-end” of the project. You''re not quite sure how long it will take and you''re
    gathering requirements and trying to figure out what the product will actually
    *do*.


    10. **Planning game**: The Planning game is the tail end of your release exploration
    phase. In the planning game you need to identify your top priority, high-value
    stories and agree with the customer which ones will be in the next release. Releases
    should be from two to six months duration each. Any shorter and you''re not likely
    to get any significant work done and any longer is just plain too hard to plan.
    Then you need to plan the first few iterations for the release; iterations are
    1 to 4 weeks each. Each iteration produces functional test cases for each story
    scheduled for the iteration. The first iteration helps you nail down your metaphor
    for the project and puts the architecture in place. Subsequent iterations add
    new features based on the prioritized list of stories. Reschedule as necessary.


    11. **Implement**: Design, code, test, or actually, design, test, code. One task
    at a time until all the tasks for a story are complete, and one story at a time
    until all the stories for this iteration are complete. Need we say more?


    ______________


    ^(15)Beck, K. (2000)


    12. **Productizing**: Occurs in the last iteration before your release is done.
    At this point you should freeze new functionality and focus on stabilizing the
    product, tuning performance, if necessary, and running acceptance tests.


    13. **Maintenance/evolution**: Well, according to the agile philosophy, you''re
    always in maintenance mode. Here though, you''ve released something the customer
    will use and you now must “simultaneously produce new functionality, keep the
    existing system running, incorporate new people into the team, and bid farewell
    to members who move on.”[^(16)](#Chapter02.html#CHP-2-FN-16)


    14. **Death**: If the customer can''t come up with new stories, mothball the code.
    If the system can''t deliver anymore, mothball the code and start over.


    ### Scrum, mate


    The second agile methodology we''ll look at is *Scrum*. Scrum derives its name
    from rugby, where a scrum is a means of restarting play after a rules infraction.
    The scrum uses the eight forwards on a rugby team (out of 15 players in the rugby
    union form of the game) to attempt to (re)gain control of the ball and move it
    forward towards the opposing goal line. The idea in the agile Scrum methodology
    is that a small team is unified around a single goal and gets together for sprints
    of development that move them towards that goal.


    Scrum is, in fact, older than XP, with the original process management idea coming
    from Takeuchi and Nonaka''s 1986 paper, “The New New Product Development Game.”[^(17)](#Chapter02.html#CHP-2-FN-17)
    The first use of the term scrum is attributed to DeGrace and Stahl''s 1990 book
    *Wicked Problems, Righteous Solutions*.[^(18)](#Chapter02.html#CHP-2-FN-18) Scrum
    is a variation on the iterative development approach and incorporates many of
    the features of XP. Scrum is more of a management approach than XP and doesn''t
    define many of the detailed development practices (like pair programming or test-driven
    development) that XP does, although most scrum projects will use these practices.


    Scrum uses teams of no more than 10 developers. Just like other agile methodologies,
    scrum emphasizes the efficacy of small teams and collective ownership.


    Scrum is characterized by the *sprint*, an iteration of between one and four weeks.
    Sprints are time-boxed in that they are of a fixed duration and the output of
    a sprint is what work the team can accomplish during the sprint. The delivery
    date for the sprint does not move out. This means that sometimes a sprint can
    finish early, and sometimes a sprint will finish with less functionality than
    was proposed. A sprint always delivers a usable product.


    Scrum requirements are encapsulated in two backlogs. The product backlog is the
    prioritized list of all the requirements for the project; it is created by the
    scrum team and the product owner. The sprint backlog is the prioritized list of
    requirements (say user stories) for the current sprint. Once the sprint starts,
    only the development team may add items to the sprint backlog – these are usually
    bugs found during testing. No outside entity may add items to the sprint backlog,
    only to the product backlog.


    ______________


    ^(16)Beck, K. (2000)


    ^(17)Takeuchi, H. and I. Nonaka. “The New New Product Development Game.” *Harvard
    Business Review* 64(1): 137-146. (1986)


    ^(18)DeGrace, P. and L. H. Stahl. Wicked Problems, Righteous Solutions: A Catalogue
    of Modern Software Engineering Paradigms. (Englewood Cliffs, NJ: Yourdon Press,
    1990.)


    Scrum projects are facilitated by a `ScrumMaster` whose job it is to manage the
    backlogs, run the daily Scrum meetings, and to protect the team from outside influences
    during the sprint. The scrum master is usually not a developer.


    Scrum projects have a daily scrum meeting, which is a stand-up meeting of 15–30
    minutes duration where the entire team discusses sprint progress. The daily Scrum
    meeting allows the team to share information and track sprint progress. By having
    daily Scrum meetings, any slip in the schedule or any problems in implementation
    are immediately obvious and can then be addressed by the team at once. “The Scrum
    master ensures that everyone makes progress, records the decisions made at the
    meeting and tracks action items, and keeps the Scrum meetings short and focused.”[^(19)](#Chapter02.html#CHP-2-FN-19)


    At the Scrum meeting, each team member answers the following three questions in
    turn:


    1.  What tasks have you finished since the last Scrum meeting?

    2.  Is anything getting in the way of your finishing your tasks?

    3.  What tasks are you planning to do between now and the next Scrum meeting?'
