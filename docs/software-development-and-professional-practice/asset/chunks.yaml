  trans: "\n## 单元测试\n\n> *测试行为本身固然重要，但设计测试的行为更是已知最有效的缺陷预防手段之一。为了创建有用测试而必须进行的思考，能够在代码编写之前就发现并消除缺陷——事实上，测试设计的思考能够在软件创建的每个阶段（从概念构思、规格说明、设计、编码到后续环节）发现并消除缺陷。*\n\
    > \n> ——鲍里斯·贝泽\n> \n> *只需观察，便能洞见许多。*\n> \n> ——约吉·贝拉\n\n正如上一章所强调的，没有人是完美的，软件开发人员也不例外。在第\
    \ 13 章中，我们讨论了当你*知道*代码中存在错误时，应该查找哪些不同的问题。现在，我们将讨论如何*找到*这些错误。在代码的三种错误类型中，编译器会找出语法错误和偶尔的语义错误。在某些语言环境中，运行时系统会找出其他错误（这会让你的用户感到懊恼）。其余的错误则通过两种不同的方式发现——测试，以及代码评审与审查。在本章中，我们将讨论测试：何时进行测试、测试是什么、如何进行测试、测试应覆盖哪些内容，以及测试的局限性。在下一章中，我们将讨论代码评审与审查。\n\
    \n在典型的软件开发项目中，测试分为三个层级：单元测试、集成测试和系统测试。*单元测试*通常由你（开发者）完成。通过单元测试，你测试的是单个方法和类，但通常不测试程序的更大配置。你通常也不测试接口或库的交互——除非你的方法实际使用了它们。由于你在进行单元测试，你了解所有方法的编写方式、数据应有的形态、方法签名，以及返回值和类型。这被称为*白盒测试*。它实际上应该被称为*透明盒测试*，因为其假设是你能够看到被测试代码的所有细节。\n\
    \n*集成测试*通常由独立的测试组织完成。这是对一组相互交互的类或模块进行的测试；其目的是测试模块或类之间的接口以及模块间的交互。测试人员编写测试时，了解接口信息，但不知道每个模块*如何*实现。从这个角度看，测试人员是接口的使用者。因此，集成测试有时被称为*灰盒测试*。集成测试在单元测试后的代码被集成到源代码库之后进行。会构建并测试产品的部分或完整版本，以发现新模块与现有代码交互中的任何错误。当模块中的错误被修复且模块重新集成到代码库时，也会进行此类测试。\n\
    \n*系统测试*通常由独立的测试组织完成。这是对整个程序（系统）进行的测试。系统测试既在软件产品的内部基线版本上进行，也在拟发布给客户的最终基线版本上进行。独立的测试组织根据需求编写自己的测试，而对程序的设计或编写方式一无所知。这被称为*黑盒测试*，因为除了程序接收的输入和产生的输出之外，测试人员无法了解程序内部。此层级测试人员的职责是确保程序实现了所有需求。黑盒测试还可以包括压力测试、可用性测试和验收测试。最终用户可能会参与此类测试。\n\
    \n### 测试的问题\n\n那么，既然我们可以通过测试来发现程序中的错误，为什么不能找出所有错误呢？毕竟，我们编写了程序，或者至少编写了我们刚刚添加的修复或新功能，所以我们一定理解自己刚刚写的内容。我们也编写了测试。那么，为什么仍有这么多错误逃逸到下一测试阶段，甚至落入用户手中呢？\n\
    \n嗯，我们无法找出代码中所有错误的原因有两个。首先，我们并不完美。这似乎是一个反复出现的主题。但事实确实如此。如果我们在编写代码时犯了错误，为什么还要假设我们在阅读代码或尝试测试和修复它时不会犯错误呢？即使是小型程序也会发生这种情况，对于大型程序尤其如此。如果你有一个\
    \ 5 万行的程序，阅读和理解起来工作量巨大，你必然会遗漏某些东西。此外，静态阅读程序无法帮助你发现模块和接口之间的动态交互。因此，我们需要更智能地进行测试，并结合静态（代码阅读）和动态（测试）技术来发现并修复程序中的错误。\n\
    \n错误从一个测试阶段逃逸到另一个阶段，并最终到达用户手中的第二个原因是，软件比人类制造的任何其他产品都要复杂得多。即使是小型程序，其代码路径也很多，并且可能发生多种不同类型的数据错误。程序中这种大量的路径被称为*组合爆炸*。每次你在程序中添加一个`if`语句，程序的可能路径数量就会翻倍。想想看：如果`if`语句中的条件表达式为真，则有一条代码路径；如果条件表达式为假，则有另一条路径。每次你添加一个新的输入值，都会增加复杂性，并增加可能出现的错误数量。这意味着，对于大型程序，你不可能用所有可能的输入值测试程序中的每一条可能路径。要测试每一条路径，代码路径/数据值的组合数量是指数级的。\n\
    \n那么该怎么办呢？好吧，如果蛮力方法行不通，你就需要一个更好的计划。这个计划就是识别那些最有可能的用例，并对它们进行测试。你需要识别可能的输入数据值和数据的边界条件，并找出可能的代码路径，然后对这些路径进行测试。事实证明，这样做能够发现大部分错误。史蒂夫·麦康奈尔在《代码大全》中指出，良好的测试与代码评审相结合，可以在一个规模适中的程序中发现超过\
    \ 95%的错误。¹ 这正是我们需要努力达到的目标。\n\n______________\n\n¹ 麦康奈尔，S. 《代码大全 2：软件构建实用手册》。（雷德蒙德，华盛顿州：微软出版社，2004\
    \ 年。）\n"
- fmt: '### That Testing Mindset


    There''s actually another problem with testing – you. Well, actually, you, the
    developer. You see, developers and testers have two different, one might say adversarial,
    roles to play in code construction. Developers are there to take a set of requirements
    and produce a design that reflects the requirements and write the code that implements
    the design. Your job as a developer is to *get code to work*.


    A tester''s job, on the other hand, is to take those same requirements and your
    code and *get the code to break*. Testers are supposed to do unspeakable, horrible,
    wrenching things to your code in an effort to get the errors in it to expose themselves
    to the light of day. Their job is to break stuff. You the developer then get to
    fix it. This is why being a tester can be a very cool job.


    You can see where this might be an adversarial relationship. You can also see
    where developers might make pretty bad testers. If your job is to make the code
    work, you''re not focused on breaking it. So your test cases may not be the nasty,
    mean test cases that someone whose job it is to break your code may come up with.
    In short, because they''re trying to build something beautiful, *developers make
    lousy testers*. Developers tend to write tests using typical, clean data. They
    tend to have an overly optimistic view of how much of their code that a test will
    exercise. They tend to write tests assuming that the code will work; after all
    it''s their code, right?


    This is why most software development organizations have a *separate testing team*,
    particularly for integration and system testing. The testers write their own test
    code, create their own frameworks, do the testing of all new baselines and the
    final release code, and report all the errors back to the developers who then
    must fix them. The one thing testers normally *do not* do is unit testing. Unit
    testing is the developer''s responsibility, so you''re not off the hook here.
    You do need to think about testing, learn how to write tests, how to run them,
    and how to analyze the results. You need to learn to be mean to your code. And
    you still need to fix the errors.


    ### When to Test?


    Before I get around to discussing just how to do unit testing and what things
    to test, let''s talk about *when* to test. Current thinking falls into two areas:
    the more traditional approach is to write your code, get it to compile, so you''ve
    eliminated the syntax errors, and then write your tests and do your unit testing
    *after* you feel the code for a function or a module is finished. This has the
    advantage that you''ve understood the requirements and written the code and while
    you were writing the code you had the opportunity to think about test cases. Then
    you can write clear test cases. In this strategy testing and debugging go hand
    in hand and occur pretty much simultaneously. It allows you to find an error,
    fix it, and then re-run the failed test right away.


    A newer approach that flows out of the agile methodologies, especially out of
    Extreme Programming, is called *test-driven development* (TDD). With TDD, you
    write your unit tests *before* you write any code. Clearly if you write your unit
    tests first, they will all fail – at most you''ll have the stub of a method to
    call in your test. But that''s a good thing because in TDD your goal when you
    write code is to *get all the tests to pass*. So if you''ve written a bunch of
    tests, you then write just enough code to make all the tests pass and then you
    know you''re done! This has the advantage of helping you keep your code lean,
    which implies simpler and easier to debug. You can write some new code, test it;
    if it fails write some more code, if it passes, stop. It also gives you, right
    up front, a set of tests you can run whenever you make a change to your code.
    If the tests all still pass, then you haven''t broken anything by making the changes.
    It also allows you to find an error, fix it, and then re-run the failed test right
    away.


    So which way is better? Well, the answer is another of those "it depends" things.
    Generally, writing your tests first gets you in the testing mind-set earlier and
    gives you definite goals for implementing the code. On the other hand, until you
    do it a lot and it becomes second nature, writing tests first can be hard because
    you have to visualize what you''re testing. It forces you to come to terms with
    the requirements and the module or class design early as well. That means that
    design/coding/testing all pretty much happen at once. This can make the whole
    code construction process more difficult. TDD works well for small to medium sized
    projects (as do agile techniques in general), but it may be more difficult for
    very large programs. TDD also works quite well when you are pair programming.
    In pair programming, the driver is writing the code while the navigator is watching
    for errors and thinking about testing. With TDD, the driver is writing a *test*
    while the navigator is thinking of more tests to write and thinking ahead to the
    code. This process tends to make writing the tests easier and then flows naturally
    into writing the code.


    Give testing a shot both before and after and then you can decide which is best.


    ### What to Test?


    Now that we''ve talked about different phases of testing and when you should do
    your unit testing, it''s time to discuss just *what* to test. What you''re testing
    falls into two general categories: *code coverage* and *data coverage*.


    *   *Code coverage* has the goal of executing every line of code in your program
    at least once with representative data so you can be sure that all the code functions
    correctly. Sounds easy? Well, remember that combinatorial explosion problem for
    that 50,000 line program.

    *   *Data coverage* has the goal of testing representative samples of good and
    bad data, both input data and data generated by your program, with the objective
    of making sure the program handles data and particularly data errors correctly.


    Of course there is overlap between code coverage and data coverage; sometimes
    in order to get a particular part of your program to execute you have to feed
    it bad data, for example. We''ll separate these as best we can and come together
    when we talk about writing actual tests.'
