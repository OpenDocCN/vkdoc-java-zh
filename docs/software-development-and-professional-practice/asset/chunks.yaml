  trans: "\n### 测试的特性\n\n罗伯特·马丁在他的著作 *Clean Code* 中，使用缩写 F.I.R.S.T. 描述了所有单元测试应具备的一组特性：³\n\
    \n> **快速（Fast）。** 测试应该快速。如果测试运行时间过长，你就不太可能频繁运行它们。因此，要让你的测试小巧、简单且快速。\n> \n> **独立（Independent）。**\
    \ 测试不应相互依赖。特别是，一个测试不应设置另一个测试所依赖的数据或创建对象。例如，Java 的 JUnit 测试框架提供了独立的 setUp 和 tearDown\
    \ 方法，使测试相互独立。稍后我们将更详细地介绍 JUnit。\n> \n> **可重复（Repeatable）。** 你应该能够随时以任意顺序运行测试，包括在向模块添加更多代码之后。\n\
    > \n> **自验证（Self-Validating）。** 测试应该要么通过，要么失败；换句话说，它们的输出应该只是布尔值。你不应该为了查看测试是否通过而阅读一页又一页的日志文件。\n\
    > \n> **及时（Timely）。** 这意味着你应该在需要时编写测试，以便在想要运行时它们已经就绪。对于使用 TDD 的敏捷方法论来说，这意味着在编写将被测试的代码之前，先编写单元测试。\n\
    \n_____________\n\n³ 马丁，R. C. *Clean Code：敏捷软件工艺手册。*（上萨德尔河，新泽西州：Prentice-Hall，2009\
    \ 年。）\n\n最后，重要的是，就像你的函数一样，你的测试应该只测试一件事；每个测试应该只有一个概念。这对你的调试工作非常重要，因为如果每个测试只测试代码中的一个概念，那么测试失败就会像激光一样，精准地指向代码中可能存在错误的位置。\n\
    \n### 如何编写测试\n\n在进一步深入之前，让我们更深入地探讨如何编写单元测试。我们现在将手动进行，以感受编写测试的过程，并在下一节讨论 JUnit\
    \ 时，了解测试框架如何帮助我们。我们将假设正在编写应用程序的一部分，并由此展开。我们将以用户故事的形式进行，就像在极限编程（XP）环境中可能做的那样。⁴\n\
    \n在 XP 中，开发人员和客户聚在一起讨论客户的需求。这被称为*探索*。在探索期间，客户编写一系列*故事*，描述他们希望在程序中拥有的功能。开发人员接手这些故事，将其分解为*实现任务*并进行估算。成对的程序员领取单个任务，并使用\
    \ TDD 实现它们。我们将呈现一个故事，将其分解为几个任务，并为这些任务实现一些测试，以便让你了解单元测试的过程。\n\n#### 故事\n\n我们希望输入一个包含电话联系人的平面文件，并按字母顺序对文件进行排序，生成一个可打印的输出表格。\n\
    \n实际上，仅此而已。XP 项目中的故事通常非常简短——建议将它们写在 3×5 的索引卡上。\n\n因此，我们可以将这个故事分解为一组任务。顺便说一句，这看起来很像一个设计练习；它确实是。\n\
    \n#### 任务\n\n> 我们需要一个表示电话联系人的类。\n> \n> 我们需要创建一个电话联系人。\n> \n> 我们需要读取一个数据文件并创建一个电话联系人列表。（这看起来像是两件事，但实际上只是一件事——将文件转换为电话联系人列表。）\n\
    > \n> 我们需要按姓氏字母顺序对电话联系人进行排序。\n> \n> 我们需要打印排序后的列表。\n\n______________\n\n⁴ 纽柯克，J.\
    \ 和 R. C. 马丁。*实践中的极限编程。*（波士顿，马萨诸塞州，Addison-Wesley，2001 年。）\n\n#### 测试\n\n首先，我们将把上面的前两个任务合并到一个测试中。一旦我们创建了一个电话联系人类，确保我们可以正确地实例化一个对象是有意义的；实际上，我们是在测试该类的构造函数。那么，让我们创建一个测试。\n\
    \n在我们的第一个测试中，我们将创建一个电话联系人对象的实例，并打印出实例变量以证明它被正确创建。我们首先需要做一些设计工作。我们必须弄清楚电话联系人类将被称为什么，以及它将拥有哪些实例变量。\n\
    \n该类的一个合理名称是 `PhoneContact`，只要客户同意，实例变量将是 `firstName`、`lastName`、`phoneNumber`\
    \ 和 `emailAddr`。哦，它们都可以是字符串变量。这是一个简单的联系人列表。对于这个类，我们可以有两个构造函数。一个默认构造函数，仅将联系人初始化为\
    \ null；另一个构造函数，接受所有四个值作为输入参数并进行赋值。目前可能只需要这些。以下是测试可能的样子：\n\n`public class TestPhoneContact`\n\
    `{`\n`    /**`\n`     * 测试类 TestPhoneContact 的默认构造函数`\n`     */`\n`    public\
    \ TestPhoneContact() {`\n`    }`\n\n`    public void testPhoneContactCreation()\
    \ {`\n`        String fname = \"Fred\";`\n`        String lname = \"Flintstone\"\
    ;`\n`        String phone = \"800-555-1212\";`\n`        String email = \"fred@knox.edu\"\
    ;`\n\n`        PhoneContact t1 = new PhoneContact();`\n`        System.out.printf(\"\
    Phone Contact reference is %H\\n\", t1);`\n\n`        PhoneContact t2 = new PhoneContact(fname,\
    \ lname, phone, email);`\n`        System.out.printf(\"Phone Contact:\\n Name\
    \ = %s\\n Phone = %s\\n Email = %s\\n\",`\n`                          t2.getName(),\
    \ t2.getPhoneNum(),`\n`                          t2.getEmailAddr());`\n`    }`\n\
    `}`\n\n这个测试一开始会失败，因为我们还没有创建 `PhoneContact` 类。这没关系。那么我们现在就来创建它。`PhoneContact` 类将很简单，只包含实例变量、两个构造函数以及变量的\
    \ getter 和 setter 方法。几分钟后，我们有了：\n\n`public class PhoneContact {`\n`    /**`\n\
    `     * 实例变量`\n`     */`\n`    private String lastName;`\n`    private String\
    \ firstName;`\n`    private String phoneNumber;`\n`    private String emailAddr;`\n\
    \n`    /*`\n`     * PhoneContact 类对象的构造函数`\n`     */`\n`    public PhoneContact()\
    \ {`\n`        lastName = \"\";`\n`        firstName = \"\";`\n`        phoneNumber\
    \ = \"\";`\n`        emailAddr = \"\";`\n`    }`\n\n`    public PhoneContact(String\
    \ firstName, String lastName,`\n`                        String phoneNumber, String\
    \ emailAddr) {`\n`        this.lastName = lastName;`\n`        this.firstName\
    \ = firstName;`\n`        this.phoneNumber = phoneNumber;`\n`        this.emailAddr\
    \ = emailAddr;`\n`    }`\n\n`    /**`\n`     * 每个实例变量的 Getter 和 Setter 方法`\n`     */`\n\
    `    public String getName() {`\n`       return this.lastName + \", \" + this.firstName;`\n\
    `    }`\n\n`    public String getLastName() {`\n`        return this.lastName;`\n\
    `    }`\n\n`    public String getFirstName() {`\n`        return this.firstName;`\n\
    `    }`\n\n`    public String getPhoneNum() {`\n`        return this.phoneNumber;`\n\
    `    }`\n\n`    public String getEmailAddr() {`\n`        return this.emailAddr;`\n\
    `    }`\n\n`    public void setLastName(String lastName) {`\n`        this.lastName\
    \ = lastName;`\n`    }`\n\n`    public void setFirstName(String firstName) {`\n\
    `        this.firstName = firstName;`\n`    }`\n\n`    public void setPhoneNum(String\
