  trans: '

    ### 我们正在做什么


    事实证明，在使用了计算机大约 60 多年后，我们发现开发软件是困难的。学习如何正确、高效且优雅地开发软件同样困难。你并非生来就懂得如何去做，而且大多数人，即使是那些参加过编程课程并在行业工作多年的人，也做得并不特别出色。这是一项你需要去掌握并不断练习的技能——大量地练习。你无法通过阅读书籍来学会编程和开发——即使是这本书也不行。你只能通过实践来学习。当然，这正是其魅力所在：致力于解决有趣且困难的问题。挑战在于去处理你从未做过的事情，甚至是你可能不确定自己能否解决的问题。正是这一点让你一次又一次地回来创建新的程序。


    学习软件开发可能有几种方法。但我认为，所有这些方法都包括阅读优秀的设计、阅读大量的代码、编写大量的代码，以及深入思考你如何解决问题并为其设计解决方案。阅读大量代码，尤其是那些真正优美且高效的代码，会为你提供许多关于如何思考问题并以特定风格寻求解决方案的优秀范例。编写大量代码则让你能够尝试你在阅读中看到的风格和范例。深入思考问题解决过程，让你能够审视自己是如何工作、如何进行设计的，并让你从自己的劳动中提炼出那些对你有效的模式；这会让你的编程更具目的性。


    ### 那么，如何开发软件呢？


    嗯，你应该做的第一件事就是阅读这本书。它当然不会告诉你所有事情，但它会为你提供一个很好的入门介绍，让你了解软件开发究竟是怎么回事，以及你需要做些什么才能编写出优秀的代码。它有其自身的视角，但这个视角是基于
    20 年的专业代码编写经验，以及另外 16 年试图弄清楚如何教会他人做这件事的经验。


    尽管软件开发只是软件工程的一部分，但软件开发是每个软件项目的核心。毕竟，最终交付给用户的是能正常工作的代码。而这些代码通常是由一个协同工作的开发团队创建的。因此，首先，我们或许应该从外部审视一个软件项目，并问问那个团队需要做些什么才能让这个项目取得成功。


    为了做好软件开发，你需要具备以下几点：

    '
- fmt: '> *A small, well integrated team*. Small teams have fewer lines of communication
    than larger ones. It''s easier to get to know your teammates on a small team.
    You can get to know your teammates'' strengths and weaknesses, who knows what,
    and who is the “go to guy” for particular problems or particular tools. Well-integrated
    teams have usually worked on several projects together. Keeping a team together
    across several projects is a major job of the team''s manager. Well-integrated
    teams are more productive, they are better at holding to a schedule, and they
    produce code with fewer defects at release. The key to keeping a team together
    is to give them interesting work to do and then leave them alone.


    > *Good communication among team members*. Constant communication among team members
    is critical to day-to-day progress and successful project completion. Teams that
    are co-located are better at communicating and communicate more than teams that
    are distributed geographically (even if they''re just on different floors or wings
    of a building). This is a major issue with larger companies that have software
    development sites scattered across the globe.


    > *Good communication between the team and the customer.* Communication with the
    customer is essential to controlling requirements and requirements churn during
    a project. On-site or close-by customers allow for constant interaction with the
    development team. Customers can give immediate feedback on new releases and be
    involved in creating system and acceptance tests for the product. The Extreme
    Programming agile development methodology requires that a customer be part of
    the development team and be on site daily. See [Chapter 2](#Chapter02.html#ch2)
    for a quick introduction to Extreme Programming.


    > *A process that everyone buys into*. Every project, no matter how big or small,
    follows a process. Larger projects and larger teams tend to be more plan-driven
    and follow processes with more rules and documentation required. Larger projects
    do require more coordination and tighter controls on communication and configuration
    management. Smaller projects and smaller teams will, these days, tend to follow
    more agile development processes, with more flexibility and less documentation
    required. This certainly doesn''t mean there is *no* process in an agile project,
    it just means you do what makes sense for the project you''re writing so that
    you can satisfy all the requirements, meet the schedule, and produce a quality
    product. See [Chapter 2](#Chapter02.html#ch2) for more details on process and
    software life cycles.


    > *The ability to be flexible about that process*. No project ever proceeds as
    you think it will on the first day. Requirements change, people come and go, tools
    don''t work out, and so on. This point is all about handling risk in your project.
    If you identify risks, plan to mitigate them, and then have a contingency plan
    to address the event where the risk actually occurs, you''ll be in much better
    shape. [Chapter 4](#Chapter04.html#ch4) talks about requirements and risk.


    > *A plan that every one buys into*. You wouldn''t write a sorting program without
    an algorithm, so you shouldn''t launch a software development project without
    a plan. The project plan encapsulates what you''re going to do to implement your
    project. It talks about process, risks, resources, tools, requirements management,
    estimates, schedules, configuration management, and delivery. It doesn''t have
    to be long and it doesn''t need to contain all the minute details of the everyday
    life of the project, but everyone on the team needs to have input into it, they
    need to understand it, and they need to agree with it. Unless everyone buys into
    the plan, you''re doomed. See [Chapter 3](#Chapter03.html#ch3) for more details
    on project plans.


    > *To know where you are at all times*. It''s that communication thing again.
    Most projects have regular status meetings so that the developers can “sync up”
    on their current status and get a feel for the status of the entire project. This
    works very well for smaller teams (say, up to about 20 developers). Many small
    teams will have daily meetings to sync up at the beginning of each day. Different
    process models handle this “spot” meeting differently. Many plan-driven models
    don''t require these meetings, depending on the team managers to communicate with
    each other. Agile processes often require daily meetings to improve communications
    among team members and to create a sense of camaraderie within the team.


    > *To be brave enough to say, “hey, we''re behind!”* Nearly all software projects
    have schedules that are too optimistic at the start. It''s just the way we are.
    Software developers are an optimistic bunch, generally, and it shows in their
    estimates of work. “Sure, I can get that done in a week!” “I''ll have it to you
    by the end of the day.” “Tomorrow? Not a problem.” No, no, no, no, no. Just face
    it. At some point you''ll be behind. And the best thing to do about it is to tell
    your manager right away. Sure, she might be angry. But she''ll be angrier when
    you end up a month behind and she didn''t know it. Fred Brooks'' famous answer
    to the question of how software projects get so far behind is “one day at a time.”
    The good news, though, is that the earlier you figure out you''re behind, the
    more options you have. These include lengthening the schedule (unlikely, but it
    does happen), moving some requirements to a future release, getting additional
    help, etc. The important part is to keep your manager informed.


    > *The right tools and the right practices for this project*. One of the best
    things about software development is that every project is different. Even if
    you''re doing version 8.0 of an existing product, things change. One implication
    of this is that for every project one needs to examine and pick the right set
    of development tools for *this* particular project. Picking tools that are inappropriate
    is like trying to hammer nails with a screwdriver; you might be able to do it
    eventually, but is sure isn''t easy or pretty, and you can drive a lot more nails
    in a shorter period of time with a hammer than with a screwdriver. The three most
    important factors in choosing tools are the application type you are writing,
    the target platform, and the development platform. You usually can''t do anything
    about any of these three things, so once you know what they are, you can pick
    tools that improve your productivity. A fourth and nearly as important factor
    in tool choice is the composition and experience of the development team. If your
    team are all experienced developers with facility on multiple platforms tool choice
    is much easier. If, on the other hand, you have a bunch of fresh-outs and your
    target platform is new to all of you, you''ll need to be careful about tool choice
    and fold in time for training and practice with the new tools.


    > *To realize that you don''t know everything you need to know at the beginning
    of the project*. Software development projects just don''t work this way. You''ll
    always uncover new requirements; other requirements will be discovered to be not
    nearly as important as the customer thought; still others that were targeted for
    the next release are all of a sudden requirement number 1\. Managing requirements
    churn during a project is one of the single most important skills a software developer
    can have. If you are using new development tools (say that new web development
    framework) you''ll uncover limitations you weren''t aware of and side-effects
    that cause you to have to learn, for example, three other tools to understand
    them. (That web development tool is Python based, requires a specific relational
    database system to run, and needs a particular configuration of Apache to work
    correctly.)'
