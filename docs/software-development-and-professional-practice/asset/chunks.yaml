- fmt: "### Reproduce the Problem Reliably\n\nThis is the key first step. If your\
    \ error only shows up periodically it will be much, much harder to find. The classic\
    \ example of how hard this can be is the “but it works fine on my computer” problem.\
    \ This is the one sentence you never want to hear. This is why people in tech\
    \ support retire early. Reproducing the problem – in different ways if possible\
    \ – will allow you to see what’s happening and will give you a clear indication\
    \ of where the problem is occurring. Luckily for you, most errors are easy to\
    \ find. Either you get the wrong answer and you can look for where the print statement\
    \ is located and work backwards from there, or your program dies a horrible death\
    \ and the system generates a stack trace for you. The Java Virtual Machine does\
    \ this automatically for you. With other languages, you may need to use a debugger\
    \ to get the stack trace.\n\nRemember, errors are not random events. If you think\
    \ the problem is random, then it’s usually one of the following:\n\n*   *An initialization\
    \ problem*: This can be that you’re depending on a side effect of the variable\
    \ definition to initialize the variable and it’s not acting as you expect.\n*\
    \   *A timing error*: Something is happening sooner or later than you expect.\n\
    *   *A dangling pointer problem*: You returned a pointer from a local variable\
    \ and the memory in which that local variable was stored has been given back to\
    \ the system.\n*   *A buffer overflow or walking off the end of an array*: You\
    \ have a loop that iterates through a collection and you’re walking off the end\
    \ and stomping on either a piece of code, or another variable or the system stack.\n\
    *   *A concurrency issue (a race condition)*: In a multi-threaded application\
    \ or in an application that uses shared memory you’ve not synchronized your code\
    \ and a variable you need to use is getting overwritten by someone else before\
    \ you can get to it.\n\n__________\n\n² Bentley, J. *Programming Pearls, 2nd Edition*.\
    \ (Reading, MA, Addison-Wesley: 2000).\n\n³ Kernighan, B. W. and R. Pike. *The\
    \ Practice of Programming*. (Boston, MA, Addison-Wesley, 1999).\n\nReproducing\
    \ the problem is not enough, however. You should reproduce it using the simplest\
    \ test case that will cause the error to occur. It’s a matter of eliminating all\
    \ the other possibilities so you can focus on the single one (well, maybe one\
    \ or two) that probably causes the error. One way to do this is to try to reproduce\
    \ the problem using half the data you had the first time. Pick one half or the\
    \ other. If the error still occurs, try it again. If the error doesn’t happen,\
    \ try the other half of the data. If there’s still no error, then try with three-quarters\
    \ of the data. You get the idea. You’ll know when you’ve found the simplest case\
    \ because with anything smaller the behavior of the program will change; either\
    \ the error will disappear, or you’ll get a slightly different error.\n\n### Find\
    \ the Source of the Error\n\nOnce you can reproduce the problem from the outside,\
    \ you can now find where the error is occurring. Once again, we need to do this\
    \ systematically. For most errors this is easy. There are a number of techniques\
    \ you can use.\n\n*   *Gather data*: Since you’ve now got a test case that will\
    \ reproduce the error, gather data from running the test case. The data can include\
    \ what kinds of input data cause the error, what do you have to do to get it to\
    \ appear – the exact steps you need to execute, how long it takes to appear, and\
    \ what exactly happens. Once you have this data you can form an hypothesis on\
    \ where the error is in the code. For most types of errors, you’ll have some output\
    \ that is correct and then either the program crashes or you get bad output. That\
    \ will help isolate the error.\n*   *Read the code*: What a concept! The first\
    \ thing you should do once you’ve run your test case is examine the output, make\
    \ a guess where the error might be (look at the last thing that got printed and\
    \ find that print statement in the program), and then sit back, grab a cup of\
    \ coffee, and just read the code. Understanding what the code is trying to do\
    \ in the area where the error occurs is key to figuring out what the fix should\
    \ be. It’s also key to finding the source of the error in the first place. Nine\
    \ times out of ten, if you just sit back and read the code for five minutes or\
    \ so you’ll find just where the error is. Don’t just grab the keyboard and start\
    \ hacking away. Read the code.\n*   *Insert print statements*: The simplest thing\
    \ to do once you figure out what output is incorrect is to start putting print\
    \ statements at that point and at other interesting points in the code. Interesting\
    \ points can be the entrance and exit to functions, “Entering sort routine”, “Exiting\
    \ partition routine”, and so on. When using an integrated development environment\
    \ (IDE) there are built-in debugging features, including setting breakpoints,\
    \ watchpoints, the ability to step through code, etc. that make inserting print\
    \ statements less useful. I’ll come back to some of these below.\n*   You can\
    \ also put print statements at the top and bottom of loops, at the beginning of\
    \ the then and else blocks of `if`-statements, in the default case of a `switch`\
    \ statement, etc. Unless something very spooky is going on you should be able\
    \ to isolate where the error is occurring pretty quickly using this method. Once\
    \ again, work your way backwards from the point where you think the error makes\
    \ itself known. Remember that many times where an error *exhibits* its behavior\
    \ may be many lines of code after where the error actually *occurs*.\n*   In some\
    \ languages you can encase your print statements inside debugging blocks that\
    \ you can turn on and off on the command line when you compile. In C/C++ you can\
    \ insert\n    ```\n    #ifdef DEBUG\n        printf(\"Debug statement in sort\
    \ routine\\n\");\n    #endif\n    ```\n    blocks in various places and then when\
    \ you compile the program you can either put a `#define DEBUG` in a header file\
    \ or you can compile using `gcc -DDEBUG foo.c` and the `printf` function call\
    \ will be included in your program. Leaving out the `#define` or the `-DDEBUG`\
    \ will remove the `printf` function call from the executable program (but not\
    \ your source). Beware though that this technique makes your program harder to\
    \ read because of all the `DEBUG` blocks scattered around the code. You should\
    \ remove `DEBUG` blocks before your program releases. Unfortunately, Java doesn’t\
    \ have this facility because it doesn’t have a pre-processor. However all is not\
    \ lost. You can get the same effect as the `#ifdef DEBUG` by using a named boolean\
    \ constant. Here’s an example of code:\n    ```\n    public class IfDef {\n  \
    \      final static boolean DEBUG = true;\n\n        public static void main(String\
    \ [] args) {\n            System.out.printf(\"Hello, World \\n\");\n    ```"
