        }\n\n    public void setEmailAddr(String emailAddr) {\n        this.emailAddr\
    \ = emailAddr;\n    }\n}\n```\n\nThe last thing we need is a driver for the test\
    \ we've just created. This will complete the *scaffolding* for this test environment.\n\
    \n```\npublic class TestDriver\n{\n    public static void main(String [] args)\n\
        {\n        TestPhoneContact t1 = new TestPhoneContact();\n```"
  raw: "### Characteristics of Tests\n\nRobert Martin, in his book *Clean Code* describes\
