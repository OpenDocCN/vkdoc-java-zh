    First of all, objects are *things*. They have an *identity* (i.e., a name), a\
    \ *state* (i.e., a set of attributes that describes the current data stored inside\
    \ the object), and a defined set of *operations* that operate on that state. A\
    \ stack is an object, as is an Automobile, a Bank Account, a Window, or a Button\
    \ in a graphical user interface. In an object-oriented program, a set of cooperating\
    \ objects pass messages among themselves. The messages make requests of the destination\
    \ objects to invoke methods that either perform operations on their data (thus\
    \ changing the state of the object), or to report on the current state of the\
    \ object. Eventually work gets done. Objects use *encapsulation* and *information\
    \ hiding* (remember, they're different) to isolate data and operations from other\
    \ objects in the program. Shared data areas are (usually) eliminated. Objects\
    \ are members of *classes* that define attribute types and operations.\n\nClasses\
    \ are *templates* for objects. Classes can also be thought of as factories that\
    \ generate objects. So an `Automobile` class will generate instances of autos,\
    \ a `Stack` class will create a new stack object, and a `Queue` class will create\
    \ a new queue. Classes may inherit attributes and behaviors from other classes.\
    \ Classes may be arranged in a class hierarchy where one class (a *super class*\
    \ or *base class*) is a generalization of one or more other classes (*sub-classes*).\
    \ A sub-class inherits the attributes and operations from its super class and\
    \ may add new methods or attributes of its own. In this sense a sub-class is more\
    \ specific and detailed than its super class; hence, we say that a sub-class extends\
    \ a super-class. For example, a priority queue is a more specific version of a\
    \ queue; it has all the attributes and operations of a queue, but it adds the\
    \ idea that some queue elements are more important that others. In Java this feature\
    \ is called *inheritance* while in UML it's called *generalization*.[¹](#Chapter08.html#CHP-8-FN-1)\
    \ Go figure.\n\nThere are a number of advantages to inheritance. It is an *abstraction\
    \ mechanism* which may be used to classify entities. It is a *reuse mechanism*\
    \ at both the design and the programming level. The inheritance graph is a source\
    \ of organizational knowledge about domains and systems.\n\nAnd, of course, there\
    \ are problems with inheritance, as well. It makes object classes that are not\
    \ self-contained; sub-classes cannot be understood without reference to their\
    \ super classes. Inheritance introduces complexity and this is undesirable, especially\
    \ in critical systems. Inheritance also usually allows overloading of operators\
    \ (methods in Java) which can be good (polymorphism) or bad (screening useful\
    \ methods in the superclass).\n\nObject-oriented programming (OOP) has a number\
    \ of advantages, among them easier maintenance, because objects can be understood\
    \ as stand-alone entities. Objects are also appropriate as reusable components.\
    \ But, for some problems there may be no mapping from real-world objects to system\
    \ objects, meaning that OOP is not appropriate for all problems."
  trans: "\n### 结论\n\n结构化设计描述了一套经典的设计方法论。这些设计思想适用于一大类问题。最初的结构化设计思想——逐步求精，要求你采用自顶向下的方式分解问题，重点关注解决方案的控制流。它也与第\
    \ 5 章中提到的某些架构密切相关，特别是主程序-子程序架构和管道-过滤器架构。模块化分解是现代面向对象方法论的直接前身，并引入了封装和信息隐藏的概念。这些概念是你设计工具箱中的基础。\n\
    \n### 附录：完整的非递归八皇后程序\n\n`/*`\n` *  NQueens.java`\n` *  八皇后程序`\n` *  单解的非递归版本`\n\
    ` *  jfd`\n` */`\n\n`import java.util.*;`\n\n`public class NQueens`\n`{`\n\n`        static\
    \ int totalcount = 0;`\n`        static int row = 0;`\n`        static int col\
    \ = 0;`\n\n`    /*`\n`     *  (row, col) 处的皇后是安全的，`\n`     *  因此我们得到了一个部分解`\n\
    `     *  前进到下一列`\n`     */`\n`    public void advance (int[] board) {`\n`        board[col]\
    \ = row;`\n`        col++;`\n`        row = 0;`\n`    }`\n\n`    /*`\n`     *  在当前列中找不到安全的行`\n\
    `     *  因此回退一列，并将该皇后`\n`     *  上移一行`\n`     */`\n`    public void retreat (int[]\
    \ board) {`\n`        col--;`\n`        row = board[col] + 1;`\n`    }`\n\n`    /*`\n\
    `     *  检查 (row, col) 处的皇后是否`\n`     *  会受到攻击`\n`     */`\n`    public boolean\
    \ isSafe (int[] board) {`\n`        boolean safe = true;`\n`        totalcount++;`\n\
    `        /*`\n`         *  检查对角线和行是否有攻击`\n`         *  由于我们只检查部分解`\n`         *  只需检查到当前列即可`\n\
    `         */`\n`        for (int i=0; i<col; i++)  {`\n`           if (( (board[i]\
    \ + i) == (row + col) ) ||  // 上对角线`\n`               ( (board[i] - i) == (row\
    \ - col) ) ||  // 下对角线`\n`               (board[i]  == row) ) {`\n`                safe\
    \ = false;`\n`                 }`\n`        }`\n`        return safe;`\n`    }`\n\
    \n`    public static void main(String args[]) {`\n`        int N = 8;      //\
    \ 默认棋盘大小`\n\n`        System.out.print(\"请输入棋盘大小: \");`\n`        Scanner stdin\
    \ = new Scanner(System.in);`\n`        N = stdin.nextInt();`\n`        System.out.println();`\n\
    \n`        NQueens queen = new NQueens();`\n`        /*`\n`         *  棋盘数组的索引是列号`\n\
    `         *  棋盘数组中存储的值是行号`\n`         *  因此 board[2] = 3; 表示在第 2 列第 3 行放置一个皇后`\n\
    `         */`\n`        int[] board = new int [N];        /*`\n`         *  构建\
    \ N 皇后问题部分解的简单算法。`\n`         *  在下一个可用列中放置一个皇后，`\n`         *  测试它是否会受到攻击。`\n\
    `         *  如果不会，则移动到下一列。`\n`         *  如果会，则将皇后上移一行并重试。`\n`         *  如果某一列的所有行都已尝试完毕，`\n\
    `         *  则回退，重置前一列并重试。`\n`         */`\n`        do {`\n`            while\
    \ ((row < N) && (col < N))  {`\n`                if (queen.isSafe(board)) {`\n\
    `                    queen.advance(board);`\n`                } else {`\n`                    row++;`\n\
    `                }`\n`            }`\n`            if (row == N) {`\n`                queen.retreat(board);`\n\
    `            }`\n\n`        } while ((col < N) && (col >= 0));`\n\n`        /*\
    \ 如果已放置所有 N 个皇后，则得到一个解 */`\n`        if (col == N) {`\n`            for (int i\
    \ = 0; i < N; i++) {`\n`                System.out.print(board[i] + \" \");`\n\
    `            }`\n`        } else {`\n`            System.out.println(\"无解。 \"\
    );`\n`           }`\n\n`        System.out.println();`\n\n`        System.out.println(\"\
    在尝试了 \" + totalcount +`\n`                         \" 个棋盘位置之后。\");`\n`    }`\n\
    `}`\n\n## 第 8 章\n\n## 面向对象分析与设计概述\n\n> *面向对象编程是一个极其糟糕的想法，这种想法只可能出自加利福尼亚。*\n> \n\
    > ——艾兹格·迪杰斯特拉\n> \n> *对象具有三个属性，这使其成为一个简单而强大的模型构建块。它具有状态，因此可以模拟记忆。它具有行为，因此可以模拟动态过程。并且它是封装的，因此可以隐藏复杂性。*\n\
    > \n> ——特里格夫·雷恩斯考，《与对象共事》\n\n嗯，是的，我们之前都学过面向对象编程范式。但回顾一些基本定义绝无坏处，这样我们在讨论面向对象分析与设计时就能站在同一页面上。\n\
    \n首先，对象是*事物*。它们具有*标识*（即名称）、*状态*（即描述对象内部当前存储数据的一组属性），以及一组定义好的*操作*来作用于该状态。栈是一个对象，汽车、银行账户、窗口或图形用户界面中的按钮也是如此。在面向对象程序中，一组协作的对象之间相互传递消息。这些消息向目标对象发出请求，以调用那些要么对其数据执行操作（从而改变对象状态），要么报告对象当前状态的方法。最终，工作得以完成。对象使用*封装*和*信息隐藏*（记住，它们是不同的）来将数据和操作与程序中的其他对象隔离开来。共享数据区域（通常）被消除。对象是*类*的成员，类定义了属性类型和操作。\n\
    \n类是对象的*模板*。类也可以被视为生成对象的工厂。因此，一个`Automobile`类将生成汽车实例，一个`Stack`类将创建一个新的栈对象，而一个`Queue`类将创建一个新的队列。类可以从其他类继承属性和行为。类可以排列成类层次结构，其中一个类（*超类*或*基类*）是一个或多个其他类（*子类*）的泛化。子类从其超类继承属性和操作，并可以添加自己的新方法或属性。从这个意义上说，子类比其超类更具体、更详细；因此，我们说子类扩展了超类。例如，优先队列是队列的一个更具体的版本；它拥有队列的所有属性和操作，但增加了某些队列元素比其他元素更重要的概念。在\
    \ Java 中，此特性称为*继承*，而在 UML 中则称为*泛化*。¹ 真是令人费解。\n\n继承有许多优点。它是一种*抽象机制*，可用于对实体进行分类。在设计和编程层面，它都是一种*复用机制*。继承图是关于领域和系统的组织性知识的来源。\n\
    \n当然，继承也存在问题。它使得对象类不是自包含的；如果不参考其超类，就无法理解子类。继承引入了复杂性，这是不可取的，尤其是在关键系统中。继承通常还允许运算符重载（Java\
    \ 中的方法），这可能是好事（多态性），也可能是坏事（屏蔽超类中的有用方法）。\n\n面向对象编程（OOP）有许多优点，其中包括更易于维护，因为对象可以被理解为独立的实体。对象也适合作为可复用的组件。但是，对于某些问题，可能无法将现实世界中的对象映射到系统对象，这意味着\
    \ OOP 并不适用于所有问题。\n"
- fmt: '### An Object-Oriented Analysis and Design Process


    Object-oriented analysis (`OOA`), design (`OOD`) and programming (`OOP`) are related
    but distinct. `OOA` is concerned with developing an *object model of the application
    domain*. So, for example, you take the problem statement, generate a set of features
    and (possibly) use cases, tease out the objects and some of the methods within
    those objects that you''ll need to satisfy the use case, and you put together
    an architecture of how the solution will hang together. That''s object-oriented
    analysis.


    `OOD` is concerned with developing an *object-oriented system model* to satisfy
    requirements. You take the objects generated from your `OOA`, figure out whether
    to use inheritance, aggregation, composition, abstract classes, interfaces, and
    so on, in order to create a coherent and efficient model, draw the class diagrams,
    and flesh out the details of what each attribute is and what each method does,
    and describe the interfaces. That''s the design.


    Some people like object-oriented analysis, design, and programming and some people
    don''t.


    So object-oriented analysis allows you to take a problem model and re-cast it
    in terms of objects and classes and object-oriented design allows you to take
    your analyzed requirements and connect the dots between the objects you''ve proposed
    and to fill in the details with respect to object attributes and methods. But
    how do you really do all this? Well, here is a proposed process that starts to
    fill in some of the details. We''ll figure out the rest as we go along.


    1.  Write (or receive) the problem statement. Use this to generate an initial
    set of features.

    2.  Create the feature list. The feature list is the set of program features that
    you derive from the problem statement; it contains your initial set of requirements.

    3.  Write up use cases. This helps to refine the features and to dig out new requirements
    and to expose problems with the features you just created. We''ll also see that
    we can use user stories for this step.

    4.  Break the problem into subsystems or modules or whatever you want to call
    them as long as they''re smaller, self-contained bits usually related to functionality.

    5.  Map your features, subsystems, and use cases to domain objects; create abstractions.

    6.  Identify the program''s objects, methods, and algorithms.

    7.  Implement this iteration.

    8.  Test the iteration.

    9.  If you''ve not finished the feature list and you still have time and/or money
    left, go back to step 4 and do another iteration, otherwise…

    10.  Do final acceptance testing and release.


    Note that this process leaves out a lot of details like the length of iteration.
    How many features end up in an iteration? How and when do we add new features
    to the feature list? How exactly do we identify objects and operations? How do
    we abstract objects into classes? Where do we fix bugs that are found in testing?
    Do we do reviews of code and other project work products?


    Leaving out steps here is okay. We''re mostly concerned with the analysis and
    design elements of the process. We''ll discuss ideas on the rest of the process
    below and some of the answers are also in Chapter 3 on project management.


    How do the process steps above fit into the software development life cycle? Well,
    I''m glad you asked. Recall that the basic development life cycle has four steps:


    1.  Requirements Gathering and Analysis;

    2.  Design;

    3.  Implementation and Testing; and

    4.  Release, Maintenance, and Evolution.


    We can easily assign the previous ten steps into four buckets, as follows:


    **Requirements Gathering and Analysis**


    1.  Problem statement.

    2.  Feature list creation.

    3.  Use case generation.


    **Design**


    1.  Break up the problem.

    2.  Map features and use cases to domain objects.

    3.  Identify objects, methods, and algorithms.


    **Implementation and Testing**


    1.  Implement this iteration.

    2.  Test the iteration.

    3.  If you''ve not finished with the feature list or out of time, go back to step
    4, otherwise…


    **Release/Maintenance/Evolution**


    1.  Do final acceptance testing and release.


    Once again we can ignore the details of each process step for now. These details
    really depend on the process methodology you choose for your development project.
    The description of the process above uses an iterative methodology and can easily
    be fitted into an agile process, or a more traditional staged release process.


    Note also, that you''ll need to revisit the requirements whenever you get to step
    4, because you''re likely to have uncovered or generated new requirements during
    each iteration. Also, whenever your customer sees a new iteration, they''ll ask
    for more stuff (yes, they will, trust me). This means you''ll be updating the
    feature list (and re-prioritizing) at the beginning of each new iteration. BEWARE!


    ### Doing the Process


    Let''s continue by working through an extended example, seeing where the problem
    statement leads us and how we can tease out requirements and begin our object
    oriented analysis.


    #### The Problem Statement


    Burt, the proud owner of Birds by Burt, has created the ultimate in bird feeders.
    Burt''s Bird Buffet and Bath (`B⁴`), is an integrated bird feeder and bird bath.
    It comes in 12 different colors (including camo) and 1, 3, and 5 lb capacities.
    It will hold up to one gallon of water in the attached bird bath, it has a built-in
    hanger so you can hang it from a tree branch or from a pole, and the `B⁴` is just
    flying off the shelves. Alice and Bob are desperate for a `B⁴`, but they''d like
    a few changes. Alice is a techno-nerd and a fanatic songbird watcher. She knows
    that her favorite songbirds only feed during the day, so she wants a custom `B⁴`
    that allows the feeding doors to open automatically at sunrise and close automatically
    at sunset. Burt, ever the accommodating owner, has agreed and the hardware division
    of Birds by Burt is hard at work designing the `B⁴++` for Alice. Your job is to
    write the software to make the hardware work.


    #### The Feature List


    The first thing we need to do is figure out what the `B⁴++` will actually *do*.
    This version seems simple enough. We can almost immediately write down three requirements:


    *   The feeding doors must all open and close simultaneously.

    *   The feeding doors should open automatically at sunrise.

    *   The feeding doors should close automatically at sunset.


    So this doesn''t seem so bad. The requirements are simple and there is no user
    interaction required. The next step is to create a use case so we can see just
    what the bird feeder is really going to do.'
