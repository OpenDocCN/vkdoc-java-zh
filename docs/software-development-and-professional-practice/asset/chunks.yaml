    \n`        /* try to open the input file */`\n`        fp = fopen(argv[1], \"\
    r\");`\n`        if (fp == NULL) {`\n`                fprintf(stderr, \"File Not\
    \ Found: %s\\n\", argv[1]);`\n`                exit(1);`\n`        }`\n`        totalPrice\
    \ = 0.0;`\n`        numPrices = 0;`\n\n`        while (!feof(fp)) {`\n`                fscanf(fp,\
    \ \"%10lf\\n\", &price);`\n`                totalPrice += price;`\n`                numPrices++;`\n\
    `        }`\n\n`        avgPrice = totalPrice / numPrices;`\n`        printf(\"\
    Number of houses is %d\\n\", numPrices);`\n`        printf(\"Total Price of all\
    \ houses is $%10.2f\\n\", totalPrice);`\n`        printf(\"Average Price per house\
    \ is $%10.2f\\n\", avgPrice);`\n\n`        return 0;`\n`}`\n\n### Assertions Can\
    \ Be Your Friend\n\nDefensive programming means that using assertions is a great\
    \ idea if your language supports them. Java, C99, and C++ all support assertions.\
    \ Assertions will test an expression that you give them and if the expression\
    \ is false, it will throw an error and normally abort the program. You should\
    \ use error handling code for errors you think might happen – erroneous user input,\
    \ for example – and use assertions for errors that should *never* happen – off\
    \ by one errors in loops, for example. Assertions are great for testing your program,\
    \ but because you should remove them before giving programs to customers (you\
    \ don’t want the program to abort on the user, right?) they aren’t good to use\
    \ to validate input data.\n\n### Exceptions and Error Handling\n\nWe’ve talked\
    \ about using assertions to handle truly bad errors, ones that should never occur\
    \ in production. But what about handling “normal” errors? Part of defensive programming\
    \ is to handle errors in such a way that no damage is done to any data in the\
    \ program or the files it uses, and so that the program stays running for as long\
    \ as possible (making your program robust).\n\nLet’s look at exceptions first.\
    \ You should take advantage of built-in exception handling in whatever programming\
    \ language you’re using. The exception handling mechanism will give you information\
    \ about what bad thing has just happened. It’s then up to you to decide what to\
    \ do. Normally in an exception handling mechanism you have two choices, handle\
    \ the exception yourself, or pass it along to whoever called you and let them\
    \ handle it. What you do and how you do it depends on the language you’re using\
    \ and the capabilities it gives you. We’ll talk about exception handling in Java\
    \ later.\n\n#### Error Handling\n\nJust like with validation, you’re most likely\
    \ to encounter errors in input data, whether it’s command line input, file handling,\
    \ or input from a graphical user interface form. Here we’re talking about errors\
    \ that occur at run time. Compile time and testing errors are covered in the next\
    \ chapter on debugging and testing. Other types of errors can be data that your\
    \ program computes incorrectly, errors in other programs that interact with your\
    \ program, the operating system for instance, race conditions, and interaction\
    \ errors where your program is communicating with another and your program is\
    \ at fault.\n\nThe main purpose of error handling is to have your program survive\
    \ and run correctly for as long as possible. When it gets to a point where your\
    \ program cannot continue, it needs to report what is wrong as best as it can\
    \ and then exit gracefully. Exiting is the last resort for error handling. So\
    \ what should you do? Well, once again we come to the “it depends” answer. What\
    \ you should do depends on what your program’s context is when the error occurs\
    \ and what its purpose is. You won’t handle an error in a video game the same\
    \ way you handle one in a cardiac pacemaker. In every case, your first goal should\
    \ be – try to recover.\n\nTrying to recover from an error will have different\
    \ meanings in different programs. Recovery means that your program needs to try\
    \ to either ignore the bad data, fix it, or substitute something else that is\
    \ valid for the bad data. See McConnell^([8](#Chapter12.html#CH-12-FN-8)) for\
    \ a further discussion of error handling. Here are a few examples of how to recover\
    \ from errors,\n\n*   You might just *ignore the bad data and keep going*, using\
    \ the next valid piece of data. Say your program is a piece of embedded software\
    \ in a digital pressure gauge. You sample the sensor that returns the pressure\
    \ 60 times a second. If the sensor fails to deliver a pressure reading once, should\
    \ you shut down the gauge? Probably not; a reasonable thing to do is just skip\
    \ that reading and set up to read the next piece of data when it arrives. Now\
    \ if the pressure sensor skips several readings in a row, then something might\
    \ be wrong with the sensor and you should do something different (like yell for\
    \ help).\n\n__________\n\n⁸ McConnell, 2004."
  trans: "\n### 防御性编程\n\n所谓防御性编程，是指你的代码应能自我保护，免受不良数据的侵害。这些不良数据可能来自用户通过命令行、图形文本框或表单的输入，也可能来自文件。此外，不良数据还可能来自程序中其他例程的输入参数，就像上面第一个例子那样。\n\
    \n如何保护你的程序免受不良数据的侵害？验证！尽管听起来很繁琐，但你始终应该检查从例程外部接收到的数据的有效性。这意味着你需要检查以下内容：\n\n*  \
    \ 检查命令行参数的数量和类型。\n*   检查文件操作。\n    *   文件是否成功打开？\n    *   读取操作是否返回了内容？\n    *\
    \   写入操作是否写入了内容？\n    *   是否已到达文件末尾（EOF）？\n*   检查函数/方法参数列表中的所有值。\n    *   它们的类型和大小是否正确？\n\
    *   你应该始终初始化变量，而不是依赖系统为你完成初始化。\n\n还需要检查什么？这里有一个简短的清单：\n\n*   空指针（Java 中的引用）\n\
    *   分母为零\n*   类型错误\n*   值超出范围\n\n举个例子，下面是一个 C 程序，它从一个文件中读取房屋价格列表，并计算列表中的平均房价。该文件通过命令行提供给程序。\n\
    \n`/*`\n` * 程序功能：计算一组房屋的平均售价。`\n` * 输入：来自通过命令行传递的文件。`\n` * 输出：所有房屋的总价和平均售价，以及文件中的价格数量。`\n\
    ` *`\n` * 作者：jfdooley`\n` */`\n`#include <stdlib.h>`\n`#include <stdio.h>`\n\n\
    `int main(int argc, char **argv)`\n`{`\n`        FILE *fp;`\n`        double totalPrice,\
    \ avgPrice;`\n`        double price;`\n`        int numPrices;`\n\n`        /*\
    \ 检查用户是否输入了正确数量的参数 */`\n`        if (argc < 2) {`\n`                fprintf(stderr,\"\
    用法: %s <文件名>\\n\", argv[0]);`\n`                exit(1);`\n`        }`\n\n`        /*\
    \ 尝试打开输入文件 */`\n`        fp = fopen(argv[1], \"r\");`\n`        if (fp == NULL)\
    \ {`\n`                fprintf(stderr, \"文件未找到: %s\\n\", argv[1]);`\n`                exit(1);`\n\
    `        }`\n`        totalPrice = 0.0;`\n`        numPrices = 0;`\n\n`        while\
    \ (!feof(fp)) {`\n`                fscanf(fp, \"%10lf\\n\", &price);`\n`                totalPrice\
    \ += price;`\n`                numPrices++;`\n`        }`\n\n`        avgPrice\
    \ = totalPrice / numPrices;`\n`        printf(\"房屋数量为 %d\\n\", numPrices);`\n\
    `        printf(\"所有房屋总价为 $%10.2f\\n\", totalPrice);`\n`        printf(\"每套房屋平均售价为\
    \ $%10.2f\\n\", avgPrice);`\n\n`        return 0;`\n`}`\n\n### 断言可以成为你的朋友\n\n\
    防御性编程意味着，如果你的语言支持断言，那么使用断言是一个好主意。Java、C99 和 C++ 都支持断言。断言会测试你提供给它的表达式，如果表达式为假，则会抛出错误并通常中止程序。对于你认为可能发生的错误（例如，用户输入错误），你应该使用错误处理代码；而对于*绝不应该*发生的错误（例如，循环中的差一错误），则应使用断言。断言非常适合测试你的程序，但由于在将程序交付给客户之前应将其移除（你肯定不希望程序在用户面前中止，对吧？），因此它们不适合用于验证输入数据。\n\
    \n### 异常与错误处理\n\n我们已经讨论了使用断言来处理真正严重的错误，即那些在生产环境中绝不应发生的错误。但如何处理“正常”的错误呢？防御性编程的一部分就是处理错误，确保程序或其使用的文件中的数据不受损害，并尽可能让程序持续运行（使你的程序健壮）。\n\
    \n我们先来看异常。你应该利用你所使用的编程语言中内置的异常处理机制。异常处理机制会提供关于刚刚发生的错误的信息。然后由你来决定如何处理。通常，在异常处理机制中，你有两个选择：自己处理异常，或者将其传递给调用你的函数并让它们处理。具体做什么以及如何做，取决于你使用的语言及其提供的能力。稍后我们将讨论\
    \ Java 中的异常处理。\n\n#### 错误处理\n\n就像验证一样，你最有可能在输入数据中遇到错误，无论是命令行输入、文件处理，还是来自图形用户界面表单的输入。这里我们讨论的是运行时发生的错误。编译时和测试时的错误将在下一章关于调试和测试的内容中介绍。其他类型的错误可能包括：程序计算错误的数据、与你的程序交互的其他程序（例如操作系统）中的错误、竞态条件，以及你的程序与另一个程序通信时因你的程序导致的交互错误。\n\
    \n错误处理的主要目的是让你的程序尽可能长时间地存活并正确运行。当程序无法继续运行时，它需要尽可能好地报告问题所在，然后优雅地退出。退出是错误处理的最后手段。那么你应该怎么做呢？好吧，我们又回到了“视情况而定”这个答案。你应该做什么取决于错误发生时程序的上下文及其目的。你不会以处理心脏起搏器错误的方式来处理电子游戏中的错误。在任何情况下，你的首要目标都应该是——尝试恢复。\n\
    \n尝试从错误中恢复在不同程序中含义不同。恢复意味着你的程序需要尝试忽略不良数据、修复它，或者用其他有效数据替换不良数据。关于错误处理的进一步讨论，请参见\
    \ McConnell^(8)。以下是一些如何从错误中恢复的示例：\n\n*   你可以*忽略不良数据并继续运行*，使用下一个有效的数据。假设你的程序是数字压力表中的嵌入式软件。你每秒采样返回压力的传感器\
    \ 60 次。如果传感器有一次未能提供压力读数，你是否应该关闭压力表？可能不需要；一个合理的做法是跳过这次读数，并准备读取下一个到达的数据。但如果压力传感器连续跳过多次读数，那么传感器可能出了问题，你应该采取不同的措施（比如发出警报）。\n\
    \n__________\n\n⁸ McConnell, 2004.\n"
- fmt: "- 你可以用*上一个有效数据*来替代缺失或错误的数据。以数字压力表为例，如果传感器漏读了一次，由于每个时间间隔只有六十分之一秒，缺失的读数很可能与上一个读数非常接近。在这种情况下，你可以用上一个有效数据来替代缺失的值。\n\
    - 有时你可能没有任何先前记录的有效数据。你的应用程序使用异步事件处理器，因此没有数据历史记录，但程序知道数据应在特定范围内。假设你提示用户输入一个薪资数额，但返回的值是负数。显然没有人会拿到负数的薪资，所以这个值是错误的。处理这种错误的一种方法（可能不是最好的）是*替换为范围内最接近的有效值*，在本例中为零。虽然不理想，但至少你的程序可以用该字段中的一个有效数据值继续运行。\n\
    - 在C程序中，几乎所有系统调用和大多数标准库函数都会返回一个值。你应该测试这些值！大多数函数会返回指示成功（非负整数）或失败（负整数，通常为-1）的值。有些函数会返回一个指示其成功程度的值。例如，`printf()`系列函数返回打印的字符数，`scanf()`系列函数返回读取的输入元素数。大多数C函数还会设置一个名为`errno`的全局变量，该变量包含一个整数，即发生的错误编号。错误编号列表位于名为`errno.h`的头文件中。`errno`变量为零表示成功。任何其他正整数都是所发生错误的编号。由于系统会告诉你两件事：（1）发生了错误，（2）它认为的错误原因，你可以采取多种不同的方式来处理它，包括仅*报告错误*并退出。例如，如果我们尝试打开一个不存在的文件，程序：\n\
    \    ```\n    #include <stdio.h>\n    #include <stdlib.h>\n    #include <errno.h>\n\
    \n    int main(int argc, char **argv)\n    {\n        FILE *fd;\n        char\
    \ *fname = \"NotAFile.txt\";\n\n        if ((fd = fopen(fname, \"r\")) == NULL)\
    \ {\n            perror(\"File not opened\");\n            exit(1);\n        }\n\
    \        printf(\"File exists\\n\");\n        return 0;\n    }\n    ```\n    -\
    \ 如果文件确实不存在，将返回错误消息`File not opened: No such file or directory`。函数`perror()`读取`errno`变量，并使用提供的字符串以及对应于错误编号的标准字符串，将错误消息写入控制台的标准错误输出。该程序还可以提示用户输入不同的文件名，或者替换为默认文件名。这两种方法都可以让程序继续运行，而不是在出错时退出。\n\
    - 还有其他用于错误处理和恢复的技术。这些示例应该能让你了解在程序中可以做什么。这里要记住的重要思想是，如果可能的话，尝试恢复，但最重要的是，*不要静默失败！*\n\
    \n### Java中的异常\n\n一些编程语言内置了错误报告系统，当错误发生时，它会通知你，并让你自行决定如何处理。这些通常会导致程序惨死的错误被称为*异常*。异常由遇到错误的代码*抛出*。一旦有东西被抛出，通常最好有人能*捕获*它。异常也是如此。因此，在编写代码时，你需要了解异常的两个方面：\n\
    \n- 当有一段代码可能遇到错误时，你*抛出*一个异常。像Java这样的系统会为你抛出一些异常。这些异常在Java API文档的`Exception`类中列出（参见[`http://download.oracle.com/javase/6/docs/api`](http://download.oracle.com/javase/6/docs/api)）。你也可以编写自己的代码来抛出异常。我们将在本章后面提供一个示例。\n\
    - 一旦抛出异常，就必须有人*捕获*它。如果你在程序中什么都不做，这个*未捕获的异常*会渗透到Java虚拟机（JVM）并在那里被捕获。JVM会终止你的程序，并提供一个堆栈回溯，该回溯应能引导你回到最初抛出异常的地方，并显示你是如何到达那里的。另一方面，你也可以编写代码来封装可能生成异常的调用，并使用Java的`try...catch`机制自己捕获它们。Java要求某些异常必须被捕获。我们稍后会看到一个示例。\n\
    \nJava有三种不同类型的异常——受检异常、错误和未受检异常。*受检异常*是那些你应该使用异常处理器自己捕获和处理的异常；它们是你应该在设计和编写代码时预见并处理的异常。例如，如果你的代码要求用户输入文件名，你应该预见到他们会输错，并准备好捕获由此产生的`FileNotFoundException`。受检异常必须被捕获。\n\
    \n另一方面，*错误*通常是发生在程序外部且你无能为力的事情相关的异常，除了优雅地失败。你可能会尝试捕获错误异常并为用户提供一些输出，但通常仍然需要退出。\n\
    \n第三种类型的异常是*运行时异常*。运行时异常都源于程序运行时内部出现的问题，并且几乎总是表明代码中存在错误。例如，`NullPointerException`几乎总是表明代码中存在错误，并以运行时异常的形式出现。错误和运行时异常统称为*未受检异常*（这是因为你通常不会尝试捕获它们，所以它们未被检查）。在下面的程序中，我们故意引发了一个运行时异常：\n\
    \n```\npublic class TestNull {\n  public static void main(String[] args) {\n \
    \     String str = null;\n      int len = str.length();\n  }\n}\n```\n\n这个程序可以正常编译，但当你运行它时，会得到如下输出：\n\
    \n---\n\n```\nException in thread \"main\" java.lang.NullPointerException\n\n\
    \        at TestNull.main(TestNull.java:4)\n```\n\n---\n\n这是一个典型的运行时异常。没有必要捕获这个异常，因为我们唯一能做的就是退出。如果我们捕获它，程序可能看起来像这样：\n\
    \n```\npublic class TestNullCatch {\n        public static void main(String[]\
    \ args) {\n                String str = null;\n\n                try {\n     \
    \                   int len = str.length();\n                } catch (NullPointerException\
    \ e) {\n                        System.out.println(\"Oops: \" + e.getMessage());\n\
    \                        System.exit(1);\n                }\n        }\n}\n```\n\
    \n这会给出如下输出：\n\n---\n\n```\nOops: null\n```"
  raw: "*   You might *substitute the last valid piece of data* for a missing or wrong\
    \ piece. Taking the digital pressure gauge again, if the sensor misses a reading,\
    \ since each time interval is only a sixtieth of a second, it’s likely that the\
    \ missing reading is very close to the previous reading. In that case you can\
    \ substitute the last valid piece of data for the missing value.\n*   There may\
    \ be instances where you don’t have any previously recorded valid data. Your application\
    \ uses an asynchronous event handler, so you don’t have any history of data, but\
    \ your program knows that the data should be in a particular range. Say you’ve\
    \ prompted the user for a salary amount and the value that you get back is a negative\
    \ number. Clearly no one gets paid a salary of negative dollars, so the value\
    \ is wrong. One way (probably not the best) to handle this error is to *substitute\
    \ the closest valid value in the range*, in this case a zero. Although not ideal,\
    \ at least your program can continue running with a valid data value in that field.\n\
    *   In C programs, nearly all system calls and most of the standard library functions\
    \ return a value. You should test these values! Most functions will return values\
    \ that indicate success (a non-negative integer) or failure (a negative integer,\
    \ usually -1). Some functions return a value that indicates how successful they\
    \ were. For example, the `printf()` family of functions returns the number of\
    \ characters printed, and the `scanf()` family returns the number of input elements\
    \ read. Most C functions also set a global variable named `errno` that contains\
    \ an integer value that is the number of the error that occurred. The list of\
    \ error numbers is in a header file called `errno.h`. A zero on the `errno` variable\
    \ indicates success. Any other positive integer value is the number of the error\
    \ that occurred. Because the system tells you two things, (1) an error occurred,\
    \ and (2) what it thinks is the cause of the error, you can do lots of different\
    \ things to handle it, including just *reporting the error* and bailing out. For\
    \ example, if we try to open a file that doesn’t exist, the program `#include\
    \ <stdio.h>`\n    `#include <stdlib.h>`\n    `#include <errno.h>`\n\n`int main(int\
    \ argc, char **argv)`\n    `{`\n    `    FILE *fd;`\n    `    char *fname = \"\
    NotAFile.txt\";`\n\n`    if ((fd = fopen(fname, \"r\")) == NULL) {`\n    `        perror(\"\
    File not opened\");`\n    `        exit(1);`\n    `    }`\n    `    printf(\"\
    File exists\\n\");`\n    `    return 0;`\n    `}`\n    *   will return the error\
    \ message `File not opened: No such file or directory`\n    *   if the file really\
    \ doesn’t exist. The function `perror()` reads the `errno` variable and using\
    \ the string provided plus a standard string corresponding to the error number,\
    \ writes an error message to the console’s standard error output. This program\
    \ could also prompt the user for a different file name or it could substitute\
    \ a default file name. Either of these would allow the program to continue rather\
    \ than exiting on the error.\n*   There are other techniques to use in error handling\
    \ and recovery. These examples should give you a flavor of what you can do within\
    \ your program. The important idea to remember here is to attempt recovery if\
    \ possible, but most of all, *don’t fail silently!*\n\n#### Exceptions in Java\n\
    \nSome programming languages have built-in error reporting systems that will tell\
    \ you when an error occurs, and leave it up to you to handle it one way or another.\
    \ These errors that would normally cause your program to die a horrible death\
    \ are called *exceptions*. Exceptions get *thrown* by the code that encounters\
    \ the error. Once something is thrown, it’s usually a good idea if someone *catches*\
    \ it. This is the same with exceptions. So there are two sides to exceptions that\
    \ you need to be aware of when you’re writing code:\n\n*   When you have a piece\
    \ of code that can encounter an error you *throw* an exception. Systems like Java\
    \ will throw some exceptions for you. These exceptions are listed in the `Exception`\
    \ class in the Java API documentation (see [`http://download.oracle.com/javase/6/docs/api`](http://download.oracle.com/javase/6/docs/api)).\
    \ You can also write your own code to throw exceptions. We’ll have an example\
    \ later in the chapter.\n*   Once an exception is thrown, somebody has to *catch*\
    \ it. If you don’t do anything in your program, this *uncaught exception* will\
    \ percolate through to the Java Virtual Machine (the JVM) and be caught there.\
    \ The JVM will kill your program and provide you with a stack backtrace that should\
    \ lead you back to the place that originally threw the exception and show you\
    \ how you got there. On the other hand, you can also write code to encapsulate\
    \ the calls that might generate exceptions and catch them yourself using Java’s\
    \ S **`try...catch`** mechanism. Java requires that some exceptions must be caught.\
    \ We’ll see an example later.\n\nJava has three different types of exceptions\
    \ – checked exceptions, errors, and unchecked exceptions. *Checked exceptions*\
    \ are those that you should catch and handle yourself using an exception handler;\
    \ they are exceptions that you should anticipate and handle as you design and\
    \ write your code. For example, if your code asks a user for a file name, you\
    \ should anticipate that they will type it wrong and be prepared to catch the\
    \ resulting **`FileNotFoundException`**. Checked exceptions must be caught.\n\n\
    *Errors* on the other hand are exceptions that usually are related to things happening\
    \ outside your program and are things you can’t do anything about except fail\
    \ gracefully. You might try to catch the error exception and provide some output\
    \ for the user, but you will still usually have to exit.\n\nThe third type of\
    \ exception is the *runtime exception*. Runtime exceptions all result from problems\
    \ within your program that occur as it runs and almost always indicate errors\
    \ in your code. For example, a **`NullPointerException`** nearly always indicates\
    \ a bug in your code and shows up as a runtime exception. Errors and runtime exceptions\
    \ are collectively called *unchecked exceptions* (that would be because you usually\
    \ don’t try to catch them, so they’re unchecked). In the program below we deliberately\
    \ cause a runtime exception:\n\n`public class TestNull {`\n`  public static void\
    \ main(String[] args) {`\n`      String str = null;`\n`      int len = str.length();`\n\
    `  }`\n`}`\n\nThis program will compile just fine, but when you run it you’ll\
    \ get this as output:\n\n* * *\n\n`Exception in thread \"main\" java.lang.NullPointerException`\n\
    \n`        at TestNull.main(TestNull.java:4)`\n\n* * *\n\nThis is a classic runtime\
    \ exception. There’s no need to catch this exception because the only thing we\
    \ can do is exit. If we do catch it, the program might look like:\n\n`public class\
    \ TestNullCatch {`\n`        public static void main(String[] args) {`\n`                String\
    \ str = null;`\n\n`                try {`\n`                        int len =\
    \ str.length();`\n`                } catch (NullPointerException e) {`\n`                        System.out.println(\"\
    Oops: \" + e.getMessage());`\n`                        System.exit(1);`\n`                }`\n\
    `        }`\n`}`\n\nwhich gives us the output\n\n* * *\n\n`Oops: null`\n\n* *\
    \ *"
  trans: "\n*   你可以*用最后一个有效数据*来替代缺失或错误的数据。以数字压力表为例，如果传感器漏读了一次数据，由于每个时间间隔只有六十分之一秒，漏读的数据很可能与上一次读数非常接近。在这种情况下，你可以用最后一个有效数据来替代缺失值。\n\
    *   有时你可能没有任何先前记录的有效数据。你的应用程序使用异步事件处理程序，因此没有任何数据历史记录，但程序知道数据应该处于特定范围内。假设你提示用户输入一个工资金额，但返回的值是负数。显然没有人会拿到负数的工资，所以这个值是错误的。处理这种错误的一种方法（可能不是最好的）是*用范围内最接近的有效值*来替代，在这种情况下就是零。虽然不理想，但至少你的程序可以继续运行，并在该字段中保留一个有效的数据值。\n\
    *   在 C 程序中，几乎所有系统调用和大多数标准库函数都会返回一个值。你应该测试这些值！大多数函数会返回指示成功（非负整数）或失败（负整数，通常是 -1）的值。有些函数会返回一个指示其成功程度的数值。例如，`printf()`\
    \ 系列函数返回打印的字符数，而 `scanf()` 系列函数返回读取的输入元素数。大多数 C 函数还会设置一个名为 `errno` 的全局变量，其中包含一个整数，即发生的错误编号。错误编号列表位于名为\
    \ `errno.h` 的头文件中。`errno` 变量为零表示成功。任何其他正整数都是发生的错误编号。由于系统会告诉你两件事：（1）发生了错误，以及（2）它认为的错误原因，你可以采取多种不同的方式来处理它，包括仅*报告错误*并退出。例如，如果我们尝试打开一个不存在的文件，程序\
    \ `#include <stdio.h>`\n    `#include <stdlib.h>`\n    `#include <errno.h>`\n\n\
    `int main(int argc, char **argv)`\n    `{`\n    `    FILE *fd;`\n    `    char\
    \ *fname = \"NotAFile.txt\";`\n\n`    if ((fd = fopen(fname, \"r\")) == NULL)\
    \ {`\n    `        perror(\"File not opened\");`\n    `        exit(1);`\n   \
    \ `    }`\n    `    printf(\"File exists\\n\");`\n    `    return 0;`\n    `}`\n\
    \    *   如果文件确实不存在，将返回错误消息 `File not opened: No such file or directory`。函数 `perror()`\
    \ 会读取 `errno` 变量，并使用提供的字符串以及对应于错误编号的标准字符串，将错误消息写入控制台的标准错误输出。该程序也可以提示用户输入不同的文件名，或者替换为默认文件名。这两种方法都能让程序继续运行，而不是在出错时退出。\n\
    *   还有其他用于错误处理和恢复的技术。这些示例应该能让你了解在程序中可以做什么。这里要记住的重要思想是，如果可能的话，尝试恢复，但最重要的是，*不要静默失败！*\n\
    \n#### Java 中的异常\n\n一些编程语言内置了错误报告系统，当错误发生时，它会通知你，并让你自行决定如何处理。这些通常会导致程序惨烈崩溃的错误被称为*异常*。异常由遇到错误的代码*抛出*。一旦有东西被抛出，通常最好有人能*捕获*它。异常也是如此。因此，在编写代码时，你需要了解异常的两个方面：\n\
    \n*   当有一段代码可能遇到错误时，你*抛出*一个异常。像 Java 这样的系统会为你抛出一些异常。这些异常在 Java API 文档的 `Exception`\
    \ 类中列出（参见 [`http://download.oracle.com/javase/6/docs/api`](http://download.oracle.com/javase/6/docs/api)）。你也可以编写自己的代码来抛出异常。我们将在本章后面给出一个示例。\n\
    *   一旦抛出异常，就必须有人来*捕获*它。如果你在程序中什么都不做，这个*未捕获的异常*会渗透到 Java 虚拟机（JVM）并在那里被捕获。JVM 会终止你的程序，并提供一个堆栈回溯信息，该信息应能引导你找到最初抛出异常的地方，并显示你是如何到达那里的。另一方面，你也可以编写代码来封装可能产生异常的调用，并使用\
    \ Java 的 **`try...catch`** 机制自行捕获它们。Java 要求某些异常必须被捕获。我们稍后会看到一个示例。\n\nJava 有三种不同类型的异常——受检异常、错误和未受检异常。*受检异常*是你应该使用异常处理程序自行捕获和处理的异常；它们是你应该在设计和编写代码时预见并处理的异常。例如，如果你的代码要求用户输入文件名，你应该预见到他们可能会输错，并准备好捕获由此产生的\
    \ **`FileNotFoundException`**。受检异常必须被捕获。\n\n另一方面，*错误*通常是发生在程序外部且你无法处理的事情相关的异常，除了优雅地失败之外，你无能为力。你可以尝试捕获错误异常并为用户提供一些输出，但通常仍然需要退出。\n\
    \n第三种类型的异常是*运行时异常*。运行时异常都源于程序运行时内部出现的问题，并且几乎总是表明代码中存在错误。例如，**`NullPointerException`**\
    \ 几乎总是表明代码中存在错误，并以运行时异常的形式出现。错误和运行时异常统称为*未受检异常*（这是因为你通常不会尝试捕获它们，所以它们未被检查）。在下面的程序中，我们故意制造了一个运行时异常：\n\
    \n`public class TestNull {`\n`  public static void main(String[] args) {`\n`      String\
    \ str = null;`\n`      int len = str.length();`\n`  }`\n`}`\n\n这个程序可以正常编译，但当你运行它时，会得到如下输出：\n\
    \n* * *\n\n`Exception in thread \"main\" java.lang.NullPointerException`\n\n`        at\
    \ TestNull.main(TestNull.java:4)`\n\n* * *\n\n这是一个经典的运行时异常。没有必要捕获这个异常，因为我们唯一能做的就是退出。如果我们捕获它，程序可能看起来像这样：\n\
    \n`public class TestNullCatch {`\n`        public static void main(String[] args)\
    \ {`\n`                String str = null;`\n\n`                try {`\n`                        int\
    \ len = str.length();`\n`                } catch (NullPointerException e) {`\n\
    `                        System.out.println(\"Oops: \" + e.getMessage());`\n`                        System.exit(1);`\n\
    `                }`\n`        }`\n`}`\n\n这会输出：\n\n* * *\n\n`Oops: null`\n\n* *\
    \ *\n"
- fmt: "注意，`getMessage()`方法会返回一个包含Java认为合适的错误信息的字符串（如果有的话）。否则，它返回`null`。这比上面的默认堆栈跟踪信息帮助要少一些。\n\
    \n让我们用Java重写上面的简短C程序，并说明如何捕获*受检异常*。\n\n```\nimport java.io.*;\nimport java.util.*;\n\
    \npublic class FileTest\n        public static void main(String [] args)\n   \
    \     {\n                File fd = new File(\"NotAFile.txt\");\n             \
    \   System.out.println(\"File exists \" + fd.exists());\n\n                try\
    \ {\n                        FileReader fr = new FileReader(fd);\n           \
    \     } catch (FileNotFoundException e) {\n                        System.out.println(e.getMessage());\n\
    \                }\n        }\n}\n```\n\n当我们执行`FileTest`时，得到的输出是\n\n* * *\n\n\
    ```\nFile exists false\n\nNotAFile.txt (No such file or directory)\n```\n\n* *\
    \ *\n\n顺便说一下，如果我们在上面的程序中不使用`try-catch`块，那么它将无法编译。我们会得到编译器错误信息\n\n* * *\n\n```\n\
    FileTestWrong.java:11: unreported exception java.io.FileNotFoundException; must\
    \ be caught or declared to be thrown\n                FileReader fr = new FileReader(fd);\n\
    ```\n\n* * *\n\n```\n                                ^\n```\n\n* * *\n\n```\n\
    1 error\n```\n\n* * *\n\n记住，受检异常**必须**被捕获。这种类型的错误不会出现在非受检异常中。这远非你应该了解的关于Java异常和异常处理的全部内容；开始深入研究Java教程和Java\
    \ API吧！\n\n### 关于编码的最后说明\n\n编码是软件开发的核心。代码是你产出的东西。但编码是困难的；即使是一个好的、详细的设计，将其转化为代码也需要大量的思考、经验和知识，即使是对于小程序也是如此。根据你使用的编程语言和目标系统，编程可能是一项非常耗时且困难的任务。这就是为什么花时间让你的代码可读，并使代码布局与设计的逻辑结构相匹配，对于编写人类可理解且能正常工作的代码至关重要。遵守编码标准和约定，保持一致的风格，并包含良好、准确的注释，将在调试和测试过程中极大地帮助你。而且，六个月后当你回来试图弄清楚自己当时在想什么时，它也会帮助你。\n\
    \n最后，\n\n> *我很少比花一整天时间编程让计算机自动完成一个我手动做只需十秒钟的任务更快乐。*\n> \n> ——道格拉斯·亚当斯，《最后一瞥》\n\
    \n## 第13章\n\n## 调试\n\n> *我们一开始编程，就惊讶地发现让程序正确并不像我们想象的那么容易。调试必须被“发现”。我清楚地记得那一刻，我意识到从那时起，我生命中的很大一部分时间将花在寻找自己程序中的错误上。*\n\
    > \n> ——莫里斯·威尔克斯，1949年\n> \n> *看着自己的麻烦，并知道是你自己而非别人造成了它，这是一件痛苦的事。*\n> \n> ——索福克勒斯\n\
    \n恭喜！你已经完成了代码编写，所以现在是时候让它运行起来了。我知道。你在想：“我能写出完美的代码；我很细心。我的程序不会有任何错误。”别这样想了。每个程序员都曾在某个时候这么想过。根本不存在完美的程序。人类是不完美的（谢天谢地）。所以我们在编写代码时都会犯错。在写了40多年代码之后，我已经达到了这样一个程度：大多数时候，我那些少于大约20行的程序没有任何*明显*的错误，而且很多时候它们甚至能一次编译通过。我认为这是一个相当不错的结果。你应该以此为努力目标。\n\
    \n让你的程序运行起来是一个包含三个部分的过程，这三个部分的顺序存在一些争议。这三个部分是：\n\n*   调试\n*   审查/检查\n*   测试\n\n\
    *调试*是找到错误的*根本原因*并修复它的过程。这并不意味着通过编写代码绕过错误来治疗症状，使其消失；而是意味着找到错误的真正原因，并修复那段代码，从而消除错误。调试通常在完成代码编写之后、进行代码审查或单元测试之前进行（但请参见本章后面的测试驱动开发）。\n\
    \n*审查*（或检查）是阅读代码（就像它呈现在页面上一样）并***寻找错误***的过程。错误可能包括你实现设计的方式中的错误、其他类型的逻辑错误、错误的注释等。审查代码本质上是一个**静态**过程，因为程序没有在计算机上运行——你是在屏幕或纸上阅读它。因此，尽管审查对于发现静态错误非常有效，但它无法发现代码中的动态或交互错误。这就是测试的目的。我们将在下一章中更多地讨论审查和检查。\n\
    \n*测试*，当然，是**在代码中查找错误**的过程，而不是修复它们，而修复错误正是调试的全部内容。测试至少发生在以下三个不同级别：\n\n*   *单元测试*：测试代码的小片段，特别是在函数或方法级别。\n\
    *   *集成测试*：将几个相互关联的模块或类放在一起，并对它们进行整体测试。\n*   *系统测试*：从用户的角度测试整个程序；这也被称为*黑盒测试*，因为测试人员不知道代码是如何实现的，他们只知道需求是什么，因此他们测试编写的代码是否正确实现了所有需求。\n\
    \n本章我们将重点讨论调试。"
  raw: "Note that the **`getMessage()`** method will return a String containing whatever\
    \ error message Java deems appropriate – if there is one. Otherwise it returns\
    \ a `null`. This is somewhat less helpful than the default stack trace above.\n\
    \nLet’s rewrite the short C program above in Java and illustrate how to catch\
    \ a *checked exception*.\n\n`import java.io.*;`\n`import java.util.*;`\n\n`public\
    \ class FileTest`\n\n`        public static void main(String [] args)`\n`        {`\n\
    `                File fd = new File(\"NotAFile.txt\");`\n`                System.out.println(\"\
    File exists \" + fd.exists());`\n\n`                try {`\n`                        FileReader\
    \ fr = new FileReader(fd);`\n`                } catch (FileNotFoundException e)\
    \ {`\n`                        System.out.println(e.getMessage());`\n`                }`\n\
    `        }`\n`}`\n\nand the output we get when we execute `FileTest` is\n\n* *\
    \ *\n\n`File exists false`\n\n`NotAFile.txt (No such file or directory)`\n\n*\
    \ * *\n\nBy the way, if we don’t use the **`try-catch`** block in the above program,\
    \ then it won’t compile. We get the compiler error message\n\n* * *\n\n`FileTestWrong.java:11:\
    \ unreported exception java.io.FileNotFoundException; must be caught or declared\
    \ to be thrown`\n\n`                FileReader fr = new FileReader(fd);`\n\n*\
    \ * *\n\n`                                ^`\n\n* * *\n\n`1 error`\n\n* * *\n\n\
    Remember, checked exceptions **must** be caught. This type of error doesn’t show\
    \ up for unchecked exceptions. This is far from everything you should know about\
    \ exceptions and exception handling in Java; start digging through the Java tutorials\
    \ and the Java API!\n\n### The Last Word on Coding\n\nCoding is the heart of software\
    \ development. Code is what you produce. But coding is hard; translating even\
    \ a good, detailed design into code takes a lot of thought, experience, and knowledge,\
    \ even for small programs. Depending on the programming language you are using\
    \ and the target system, programming can be a very time-consuming and difficult\
    \ task. That’s why taking the time to make your code readable and have the code\
    \ layout match the logical structure of your design is essential to writing code\
    \ that is understandable by humans and that works. Adhering to coding standards\
    \ and conventions, keeping to a consistent style, and including good, accurate\
    \ comments will help you immensely during debugging and testing. And it will help\
    \ you six months from now when you come back and try to figure out what the heck\
    \ you were thinking here.\n\nAnd finally,\n\n> *I am rarely happier than when\
    \ spending an entire day programming my computer to perform automatically a task\
    \ that it would otherwise take me a good ten seconds to do by hand.*\n> \n> —Douglas\
    \ Adams, “Last Chance to See”\n\n## C H A P T E R  13\n\n## Debugging\n\n> *As\
    \ soon as we started programming, we found to our surprise that it wasn’t as easy\
    \ to get programs right as we had thought. Debugging had to be discovered. I can\
    \ remember the exact instant when I realized that a large part of my life from\
    \ then on was going to be spent in finding mistakes in my own programs.*\n> \n\
    > —Maurice Wilkes, 1949\n> \n> *It is a painful thing to look at your own trouble\
    \ and know that you yourself and no one else has made it.*\n> \n> —Sophocles\n\
    \nCongratulations! You’ve finished writing your code so now it’s time to get it\
    \ working. I know. You’re thinking, “I can write perfect code; I’m careful. I\
    \ won’t have any errors in my program.” Get over it. Every programmer thinks this\
    \ at one point or another. There’s just no such thing as a perfect program. Humans\
    \ are imperfect (thankfully). So we all make mistakes when we write code. After\
    \ writing code for over 40 years I’ve gotten to the point where most of the time\
    \ my programs that are less than about 20 lines long don’t have any *obvious*\
    \ errors in them and lots of times they even compile the first time. I think that’s\
    \ a pretty good result. You should shoot for that.\n\nGetting your program to\
    \ work is a process with three parts, the order of which is the subject of some\
    \ debate. The three parts are\n\n*   Debugging\n*   Reviewing/inspecting\n*  \
    \ Testing\n\n*Debugging* is the process of finding the *root cause* of an error\
    \ and fixing it. This doesn’t mean treating the symptoms of an error by coding\
    \ around it to make it go away; it means to find the real reason for the error\
    \ and fixing that piece of code so the error is removed. Debugging is normally\
    \ done once you finish writing the code and before you do a code review or unit\
    \ testing (but see test-driven development later in this chapter).\n\n*Reviewing*\
    \ (or inspecting) is the process of reading the code as it sits on the page and\
    \ ***looking for errors***. The errors can include errors in how you’ve implemented\
    \ the design, other kinds of logic errors, wrong comments, etc. Reviewing code\
    \ is an inherently **static** process because the program isn’t running on a computer\
    \ – you’re reading it off a screen or a piece of paper. So although reviewing\
    \ is very good for finding static errors, it can’t find dynamic or interaction\
    \ errors in your code. That’s what testing is for. We’ll talk more about reviews\
    \ and inspections in the next chapter.\n\n*Testing*, of course is the process\
    \ of **finding errors** in the code, as opposed to fixing them, which is what\
    \ debugging is all about. Testing occurs, at minimum, at the following three different\
    \ levels:\n\n*   *Unit testing*: Where you test small pieces of your code, notably\
    \ at the function or method level.\n*   *Integration testing*: Where you put together\
    \ several modules or classes that relate to each other and test them together.\n\
    *   *System testing*: Where you test the entire program from the user’s perspective;\
    \ this is also called *black-box testing*, because the tester doesn’t know how\
    \ the code was implemented, all they know is what the requirements are and so\
    \ they’re testing to see if the code as written implements all the requirements\
    \ correctly.\n\nWe’ll focus on debugging in this chapter."
  trans: "\n请注意，**`getMessage()`** 方法会返回一个字符串，其中包含 Java 认为合适的任何错误信息（如果有的话）。否则，它会返回一个\
    \ `null`。这比上面默认的堆栈跟踪信息帮助要小一些。\n\n让我们用 Java 重写上面那个简短的 C 程序，并演示如何捕获一个*受检异常*。\n\n\
    `import java.io.*;`\n`import java.util.*;`\n\n`public class FileTest`\n\n`        public\
    \ static void main(String [] args)`\n`        {`\n`                File fd = new\
    \ File(\"NotAFile.txt\");`\n`                System.out.println(\"File exists\
    \ \" + fd.exists());`\n\n`                try {`\n`                        FileReader\
    \ fr = new FileReader(fd);`\n`                } catch (FileNotFoundException e)\
    \ {`\n`                        System.out.println(e.getMessage());`\n`                }`\n\
    `        }`\n`}`\n\n当我们执行 `FileTest` 时得到的输出是\n\n* * *\n\n`File exists false`\n\
    \n`NotAFile.txt (No such file or directory)`\n\n* * *\n\n顺便提一下，如果我们在上面的程序中不使用\
    \ **`try-catch`** 块，那么它将无法编译。我们会得到如下编译器错误信息\n\n* * *\n\n`FileTestWrong.java:11:\
    \ unreported exception java.io.FileNotFoundException; must be caught or declared\
    \ to be thrown`\n\n`                FileReader fr = new FileReader(fd);`\n\n*\
    \ * *\n\n`                                ^`\n\n* * *\n\n`1 error`\n\n* * *\n\n\
    请记住，受检异常**必须**被捕获。这种类型的错误不会出现在非受检异常中。这远非你需要了解的关于 Java 异常和异常处理的全部内容；开始深入研究 Java\
    \ 教程和 Java API 吧！\n\n### 关于编码的最后总结\n\n编码是软件开发的核心。代码是你产出的成果。但编码是困难的；即使对于一个很小的程序，将一个良好、详细的设计转化为代码也需要大量的思考、经验和知识。根据你使用的编程语言和目标系统，编程可能是一项非常耗时且困难的任务。这就是为什么花时间让你的代码可读，并使代码布局与设计的逻辑结构相匹配，对于编写人类可理解且能正常工作的代码至关重要。遵循编码标准和约定，保持一致的风格，并包含良好、准确的注释，将在调试和测试过程中极大地帮助你。而且，六个月后当你回过头来试图弄清楚自己当时到底在想什么时，它也会帮到你。\n\
    \n最后，\n\n> *没有什么比花一整天时间编程，让计算机自动完成一件我手动做起来需要足足十秒钟的任务，更让我快乐的了。*\n> \n> ——道格拉斯·亚当斯，《最后一眼》\n\
    \n## 第 13 章\n\n## 调试\n\n> *从我们开始编程起，就惊讶地发现，让程序正确运行并不像我们想象的那么容易。调试必须被“发现”。我清楚地记得那一刻，我意识到从那时起，我生命中的很大一部分时间将花在寻找自己程序中的错误上。*\n\
    > \n> ——莫里斯·威尔克斯，1949 年\n> \n> *看着自己的麻烦，并知道是你自己而非他人造成了它，这是一件痛苦的事。*\n> \n> ——索福克勒斯\n\
    \n恭喜！你已经完成了代码编写，所以现在是时候让它运行起来了。我知道。你在想：“我能写出完美的代码；我很细心。我的程序不会有任何错误。” 别这么想。每个程序员都曾在某个时候这么想过。根本不存在完美的程序。人类是不完美的（谢天谢地）。所以我们在编写代码时都会犯错。在编写了\
    \ 40 多年代码之后，我已经达到了这样一个境界：大多数时候，我那些少于大约 20 行的程序没有任何*明显*的错误，而且很多时候它们甚至能一次编译通过。我认为这是一个相当不错的结果。你也应该以此为目标。\n\
    \n让你的程序运行起来是一个包含三个部分的过程，这三个部分的顺序存在一些争议。这三个部分是：\n\n*   调试\n*   评审/审查\n*   测试\n\n\
    *调试*是寻找错误的*根本原因*并修复它的过程。这并不意味着通过编写代码绕过错误来治疗其症状，使其消失；而是意味着找到错误的真正原因，并修复那段代码，从而消除错误。调试通常在完成代码编写之后、进行代码评审或单元测试之前进行（但请参见本章后面的测试驱动开发）。\n\
    \n*评审*（或审查）是阅读页面上代码的过程，并***寻找错误***。这些错误可能包括你实现设计的方式中的错误、其他类型的逻辑错误、错误的注释等。评审代码本质上是一个**静态**过程，因为程序并没有在计算机上运行——你是在屏幕或纸上阅读它。因此，尽管评审对于发现静态错误非常有效，但它无法发现代码中的动态或交互错误。这正是测试的目的。我们将在下一章中更多地讨论评审和审查。\n\
    \n*测试*，当然，是**在代码中寻找错误**的过程，而不是修复它们，后者是调试的全部内容。测试至少发生在以下三个不同层面：\n\n*   *单元测试*：测试代码的小片段，尤其是在函数或方法层面。\n\
    *   *集成测试*：将几个相互关联的模块或类放在一起，并对它们进行整体测试。\n*   *系统测试*：从用户的角度测试整个程序；这也被称为*黑盒测试*，因为测试者不知道代码是如何实现的，他们只知道需求是什么，因此他们测试编写的代码是否正确实现了所有需求。\n\
    \n本章我们将重点讨论调试。\n"
- fmt: "### What’s an Error, Anyway?\n\nWe define three types of errors in code:\n\
    \n- Syntactic errors\n- Semantic errors\n- Logic errors\n\n`Syntactic errors`\
    \ are errors you make with respect to the syntax of the programming language you’re\
    \ using. Spelling a keyword wrong, failing to declare a variable before you use\
    \ it, forgetting to put that closing curly brace in a block, forgetting the return\
    \ type of a function, and forgetting that semi-colon at the end of a statement\
    \ are all typical examples of syntactic errors. Syntactic errors are by far the\
    \ easiest to find, because the compiler finds nearly all of them for you. Compilers\
    \ are very rigid taskmasters when it comes to enforcing lexical and grammar rules\
    \ of a language so if you get through the compilation process with no errors **and\
    \ no warnings**, then it’s very likely your program has no syntax errors left.\
    \ Notice the “and no warnings” in the previous sentence. You should *always* compile\
    \ your code with the strictest syntax checking turned on, and you should *always*\
    \ eliminate all errors and warnings before you move on to reviews or testing.\
    \ If you are sure you’ve not done anything wrong syntactically, then that’s just\
    \ one less thing to worry about while you’re finding all the other errors! And\
    \ the good news is that modern integrated development environments (IDEs) do this\
    \ for you automatically once you’ve set up the compiler options. So once you set\
    \ the warning and syntax checking levels, every time you make a change, the IDE\
    \ will automatically re-compile your file and let you know about any syntactic\
    \ errors!\n\n`Semantic errors`, on the other hand, occur when you fail to create\
    \ a proper sentence in the programming language. You do this because you have\
    \ some basic misunderstanding about the grammar rules of the language. Not putting\
    \ curly braces around a block, accidentally putting a semi-colon after the condition\
    \ in an `if` or `while` statement in C/C++ or Java, forgetting to use a `break;`\
    \ statement at the end of a case statement inside a `switch`, are all classic\
    \ examples of semantic errors. Semantic errors are harder to find because they\
    \ are normally syntactically correct pieces of code so the compiler passes your\
    \ program and it compiles correctly into an object file. It’s only when you try\
    \ to execute your program that semantic errors surface. The good news is that\
    \ they’re usually so egregious that they show up pretty much immediately. The\
    \ bad news is they can be very subtle. For example, in this code segment:\n\n\
    ```\nwhile (j < MAX_LEN);\n{\n        // do stuff here\n        j++;\n}\n```\n\
    \nthe semi-colon at the end of the `while` statement’s conditional expression\
    \ is usually very hard to see, your eyes will just slide right over it; but its\
    \ effect is to either put the program into an infinite loop, because the loop\
    \ control variable `j` is never being incremented, or to never execute the loop,\
    \ but then erroneously execute the block because it is no longer semantically\
    \ connected to the `while` statement.\n\nThe third type of error, `logic errors`,\
    \ are by far the most difficult to find and eradicate. A logic error is one that\
    \ occurs because you’ve made a mistake in translating the design into code. These\
    \ errors include things like computing a result incorrectly, off-by-one errors\
    \ in loops (which can also be a semantic error if your off-by-one error is because\
    \ you didn’t understand array indexing, for example), misunderstanding a network\
    \ protocol, returning a value of the wrong type from a method, and so on. With\
    \ a logic error, either your program seems to execute normally, but you get the\
    \ wrong answers, or it dies a sudden and horrible death because you’ve walked\
    \ off the end of an array, tried to dereference a null pointer, or tried to go\
    \ off and execute code in the middle of a data area. It’s not pretty.\n\nUnit\
    \ testing involves finding the errors in your program, and debugging involves\
    \ finding the root cause and fixing those errors. Debugging is about finding out\
    \ why an error occurs in your program. You can look at errors as opportunities\
    \ to learn more about the program, and about how you work and approach problem\
    \ solving. Because after all, debugging is a problem solving activity, just as\
    \ developing a program is problem solving. Look at debugging as an opportunity\
    \ to learn about yourself and improve your skill set.\n\n### What Not To Do\n\n\
    Just like in any endeavor, particularly problem solving endeavors, there’s a wrong\
    \ way and a right way to approach the task. Here are a few things you shouldn’t\
    \ do as you approach a debugging problem.^([1](#Chapter13.html#CH-13-FN-1))\n\n\
    First of all, *don’t guess about where the error might be*. This implies that\
    \ (1) you don’t know anything about the program you’re trying to debug, and (2)\
    \ you’re not going about the job of finding the root cause of the error systematically.\
    \ Stop, take a deep breath, and start again.\n\n*Don’t fix the symptom, fix the\
    \ problem*. Lots of times you can “fix” a problem by forcing the error to go away\
    \ by adding code. This is particularly true if the error involves an outlier in\
    \ a range of values. The temptation here is to special case the outlier by adding\
    \ code to handle just that case. Don’t do it! You haven’t fixed the underlying\
    \ problem here; you’ve just painted over it. Trust me, there’s some other special\
    \ case out there waiting to break free and squash your program. Study the program,\
    \ figure out what it’s doing at that spot, and fix the problem. You’ll thank me\
    \ later.\n\n__________\n\n¹ McConnell, S. *Code Complete 2: A Practical Handbook\
    \ of Software Construction*. (Redmond, WA: Microsoft Press, 2004).\n\n*Avoid denial*.\
    \ It’s always tempting to say “the compiler must be wrong” or “the system must\
    \ be broken” or “Ralph’s module is obviously sending me bad data” or “that’s impossible”\
    \ or some such excuse. Buck up here, developer. If you just “changed one thing”\
    \ and the program breaks, then guess who probably just injected an error into\
    \ the program? Or at the very least uncovered one? Review the quote from Sophocles\
    \ at the beginning of this chapter, “... *you yourself and no one else has made\
    \ it.”* You will make mistakes. We all do. The best attitude to display is, “by\
    \ golly, this program can’t beat me, I’m going to fix this thing!” One of the\
    \ best discussions of careful coding and how hard it is to write correct programs\
    \ is the discussion of how to write binary search in Column 5 of Jon Bentley’s\
    \ *Programming Pearls*.^([2](#Chapter13.html#CH-13-FN-2)) You should read it.\n\
    \n### An Approach to Debugging\n\nHere’s an approach to debugging that will get\
    \ the job done. Remember, you’re solving a problem here and the best way to do\
    \ that is to have a systematic way of sneaking up on the problem and whacking\
    \ it on the head. The other thing to remember about debugging is that, like a\
    \ murder mystery, you’re working backwards from the conclusion.^([3](#Chapter13.html#CH-13-FN-3))\
    \ The bad thing has already happened – your program failed. Now you need to examine\
    \ the evidence and work backwards to a solution.\n\n1.  Reproduce the problem\
    \ reliably.\n2.  Find the source of the error.\n3.  Fix the error (just that one).\n\
    4.  Test the fix (now you’ve got a regression test for later).\n5.  Optionally\
    \ look for other errors in the vicinity of the one you just fixed."
  raw: '### What’s an Error, Anyway?


    We define three types of errors in code


    *   Syntactic errors

    *   Semantic errors

    *   Logic errors


    *Syntactic errors* are errors you make with respect to the syntax of the programming
    language you’re using. Spelling a keyword wrong, failing to declare a variable
    before you use it, forgetting to put that closing curly brace in a block, forgetting
    the return type of a function, and forgetting that semi-colon at the end of a
    statement are all typical examples of syntactic errors. Syntactic errors are by
    far the easiest to find, because the compiler finds nearly all of them for you.
    Compilers are very rigid taskmasters when it comes to enforcing lexical and grammar
    rules of a language so if you get through the compilation process with no errors
    **and no warnings**, then it’s very likely your program has no syntax errors left.
    Notice the “and no warnings” in the previous sentence. You should *always* compile
    your code with the strictest syntax checking turned on, and you should *always*
    eliminate all errors and warnings before you move on to reviews or testing. If
    you are sure you’ve not done anything wrong syntactically, then that’s just one
    less thing to worry about while you’re finding all the other errors! And the good
    news is that modern integrated development environments (IDEs) do this for you
    automatically once you’ve set up the compiler options. So once you set the warning
    and syntax checking levels, every time you make a change, the IDE will automatically
    re-compile your file and let you know about any syntactic errors!


    *Semantic errors*, on the other hand, occur when you fail to create a proper sentence
    in the programming language. You do this because you have some basic misunderstanding
    about the grammar rules of the language. Not putting curly braces around a block,
    accidentally putting a semi-colon after the condition in an `if` or `while` statement
    in C/C++ or Java, forgetting to use a `break;` statement at the end of a case
    statement inside a `switch`, are all classic examples of semantic errors. Semantic
    errors are harder to find because they are normally syntactically correct pieces
    of code so the compiler passes your program and it compiles correctly into an
    object file. It’s only when you try to execute your program that semantic errors
    surface. The good news is that they’re usually so egregious that they show up
    pretty much immediately. The bad news is they can be very subtle. For example,
    in this code segment


    `while (j < MAX_LEN);`

    `{`

    `        // do stuff here`

    `        j++;`

    `}`


    the semi-colon at the end of the `while` statement’s conditional expression is
    usually very hard to see, your eyes will just slide right over it; but its effect
    is to either put the program into an infinite loop, because the loop control variable
    j is never being incremented, or to never execute the loop, but then erroneously
    execute the block because it is no longer semantically connected to the `while`
    statement.


    The third type of error, *logic errors*, are by far the most difficult to find
    and eradicate. A logic error is one that occurs because you’ve made a mistake
    in translating the design into code. These errors include things like computing
    a result incorrectly, off-by-one errors in loops (which can also be a semantic
    error if your off-by-one error is because you didn’t understand array indexing,
    for example), misunderstanding a network protocol, returning a value of the wrong
    type from a method, and so on. With a logic error, either your program seems to
    execute normally, but you get the wrong answers, or it dies a sudden and horrible
    death because you’ve walked off the end of an array, tried to dereference a null
    pointer, or tried to go off and execute code in the middle of a data area. It’s
    not pretty.


    Unit testing involves finding the errors in your program, and debugging involves
    finding the root cause and fixing those errors. Debugging is about finding out
    why an error occurs in your program. You can look at errors as opportunities to
    learn more about the program, and about how you work and approach problem solving.
    Because after all, debugging is a problem solving activity, just as developing
    a program is problem solving. Look at debugging as an opportunity to learn about
    yourself and improve your skill set.


    ### What Not To Do


    Just like in any endeavor, particularly problem solving endeavors, there’s a wrong
    way and a right way to approach the task. Here are a few things you shouldn’t
    do as you approach a debugging problem.^([1](#Chapter13.html#CH-13-FN-1))


    First of all, *don’t guess about where the error might be*. This implies that
    (1) you don’t know anything about the program you’re trying to debug, and (2)
    you’re not going about the job of finding the root cause of the error systematically.
    Stop, take a deep breath, and start again.


    *Don’t fix the symptom, fix the problem*. Lots of times you can “fix” a problem
    by forcing the error to go away by adding code. This is particularly true if the
    error involves an outlier in a range of values. The temptation here is to special
    case the outlier by adding code to handle just that case. Don’t do it! You haven’t
    fixed the underlying problem here; you’ve just painted over it. Trust me, there’s
    some other special case out there waiting to break free and squash your program.
    Study the program, figure out what it’s doing at that spot, and fix the problem.
    You’ll thank me later.


    __________


    ¹ McConnell, S. *Code Complete 2: A Practical Handbook of Software Construction*.
    (Redmond, WA: Microsoft Press, 2004).


    *Avoid denial*. It’s always tempting to say “the compiler must be wrong” or “the
    system must be broken” or “Ralph’s module is obviously sending me bad data” or
    “that’s impossible” or some such excuse. Buck up here, developer. If you just
    “changed one thing” and the program breaks, then guess who probably just injected
    an error into the program? Or at the very least uncovered one? Review the quote
    from Sophocles at the beginning of this chapter, “... *you yourself and no one
    else has made it.”* You will make mistakes. We all do. The best attitude to display
    is, “by golly, this program can’t beat me, I’m going to fix this thing!” One of
    the best discussions of careful coding and how hard it is to write correct programs
    is the discussion of how to write binary search in Column 5 of Jon Bentley’s *Programming
    Pearls*.^([2](#Chapter13.html#CH-13-FN-2)) You should read it.


    ### An Approach to Debugging


    Here’s an approach to debugging that will get the job done. Remember, you’re solving
    a problem here and the best way to do that is to have a systematic way of sneaking
    up on the problem and whacking it on the head. The other thing to remember about
    debugging is that, like a murder mystery, you’re working backwards from the conclusion.^([3](#Chapter13.html#CH-13-FN-3))
    The bad thing has already happened – your program failed. Now you need to examine
    the evidence and work backwards to a solution.


    1.  Reproduce the problem reliably.

    2.  Find the source of the error.

    3.  Fix the error (just that one).

    4.  Test the fix (now you’ve got a regression test for later).

    5.  Optionally look for other errors in the vicinity of the one you just fixed.'
  trans: '

    ### 那么，究竟什么是错误？


    我们将代码中的错误分为三类：


    *   语法错误

    *   语义错误

    *   逻辑错误


    *语法错误*是指你在使用编程语言时，违反其语法规则所犯的错误。拼错关键字、使用变量前未声明、忘记在代码块中加上右花括号、忘记函数的返回类型、以及忘记在语句末尾加上分号，这些都是语法错误的典型例子。语法错误是目前最容易发现的，因为编译器几乎能为你找出所有这类错误。在强制执行语言的词法和语法规则方面，编译器是非常严格的“工头”。因此，如果你的代码在编译过程中没有错误**且没有警告**，那么你的程序很可能已经没有语法错误了。请注意上一句中的“且没有警告”。你应该*始终*在开启最严格语法检查的情况下编译代码，并且*始终*在进入审查或测试阶段之前消除所有错误和警告。如果你确信自己在语法上没有犯任何错误，那么在寻找其他错误时，你就少了一件需要操心的事！好消息是，一旦你设置好编译器选项，现代集成开发环境（IDE）会自动为你完成这项工作。因此，一旦你设定了警告和语法检查级别，每次做出更改时，IDE
    都会自动重新编译你的文件，并告知你任何语法错误！


    另一方面，*语义错误*则发生在你未能用编程语言构建出正确语句的时候。出现这种情况是因为你对语言的语法规则存在一些基本的误解。在 C/C++ 或 Java 中，没有为代码块加上花括号、不小心在
    `if` 或 `while` 语句的条件后加上分号、忘记在 `switch` 语句的 `case` 分支末尾使用 `break;` 语句，这些都是语义错误的经典例子。语义错误更难发现，因为它们通常是语法正确的代码片段，因此编译器会通过你的程序，并成功将其编译成目标文件。只有当尝试执行程序时，语义错误才会显现出来。好消息是，它们通常非常明显，几乎会立刻暴露出来。坏消息是，它们也可能非常隐蔽。例如，在以下代码片段中：


    `while (j < MAX_LEN);`

    `{`

    `        // 在此处执行操作`

    `        j++;`

    `}`


    `while` 语句条件表达式末尾的那个分号通常很难被发现，你的眼睛很容易就滑过去了；但它的效果要么是让程序陷入无限循环（因为循环控制变量 j 从未被递增），要么是让循环体永远不会执行，但却错误地执行了该代码块，因为它与
    `while` 语句在语义上已不再关联。


    第三类错误，*逻辑错误*，是目前最难发现和根除的。逻辑错误的发生是因为你在将设计转化为代码时犯了错误。这些错误包括：计算结果不正确、循环中的“差一错误”（例如，如果你的“差一”错误是因为你不理解数组索引，那么它也可能是一个语义错误）、误解网络协议、从方法中返回了错误类型的值，等等。出现逻辑错误时，你的程序可能看似正常执行，但得到的结果却是错误的；或者程序会突然且可怕地崩溃，因为你访问了数组的越界位置、试图解引用一个空指针、或者试图在数据区域的中间执行代码。这可不是什么好事。


    单元测试涉及找出程序中的错误，而调试则涉及找到根本原因并修复这些错误。调试就是找出错误在程序中发生的原因。你可以将错误视为一个机会，借此更深入地了解程序，了解自己是如何工作的，以及如何解决问题。因为归根结底，调试是一项解决问题的活动，就像开发程序本身也是解决问题一样。把调试看作一个了解自己、提升技能的机会。


    ### 不该做什么


    就像在任何努力中一样，尤其是在解决问题的努力中，处理任务有错误的方法，也有正确的方法。以下是你在处理调试问题时不应做的一些事情。^(1)


    首先，*不要猜测错误可能在哪里*。这意味着：（1）你对正在调试的程序一无所知；（2）你没有系统地寻找错误的根本原因。停下来，深吸一口气，然后重新开始。


    *不要只修复症状，要修复问题本身*。很多时候，你可以通过添加代码来强制错误消失，从而“修复”一个问题。当错误涉及某个数值范围中的异常值时，尤其如此。这里的诱惑是，通过添加仅处理该异常情况的代码来特殊处理它。不要这样做！你并没有修复底层的根本问题；你只是把它粉饰过去了。相信我，还有其他一些特殊情况正等着冒出来，搞垮你的程序。仔细研究程序，弄清楚它在那个位置做了什么，然后修复问题。你以后会感谢我的。


    __________


    ¹ 麦康奈尔，S. 《代码大全 2：软件构建实用手册》。（雷德蒙德，华盛顿州：微软出版社，2004 年）。


    *避免否认*。人们总是倾向于说“肯定是编译器错了”或“系统肯定坏了”或“拉尔夫的模块显然给我发了错误的数据”或“那不可能”之类的借口。振作起来，开发者。如果你只是“改了一处地方”，程序就崩溃了，那么猜猜看，是谁很可能刚刚给程序注入了一个错误？或者至少是发现了一个错误？回顾一下本章开头索福克勒斯的名言，“……*是你自己，而不是别人，造成了它*。”你会犯错误。我们都会。最好的态度是展示出：“好家伙，这个程序可难不倒我，我一定要把它修好！”关于谨慎编码以及编写正确程序有多难，最好的讨论之一来自乔恩·本特利的《编程珠玑》第
    5 栏中关于如何编写二分查找的讨论。^(2) 你应该读一读。


    ### 一种调试方法


    这里有一种调试方法，可以帮你完成任务。记住，你是在解决一个问题，而最好的方法就是系统地接近问题，然后一击命中。关于调试，另一件需要记住的事情是，就像一桩谋杀悬案一样，你是从结论逆向推理的。^(3)
    坏事已经发生了——你的程序失败了。现在你需要检查证据，并逆向推导出解决方案。


    1.  可靠地重现问题。

    2.  找到错误的根源。

    3.  修复错误（仅修复这一个）。

    4.  测试修复（这样你就有了一个后续的回归测试）。

    5.  （可选）在你刚修复的错误附近，寻找其他错误。

