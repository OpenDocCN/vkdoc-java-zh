    ### 最少知识原则（PLK）


    （也称为***迪米特法则***）。只与你最直接的朋友交谈。^(11)


    应用程序中高内聚的补充是*松散耦合*。这正是最少知识原则的核心所在。它指出，类应尽可能*间接地*与少数其他类进行协作。^(12) 下面是一个例子。


    你的汽车里有一个计算机系统——如今我们都有。假设你正在编写一个应用程序，用于绘制汽车中的温度数据。有一系列传感器提供温度数据，它们是汽车发动机传感器家族的一部分。你的程序应选择一个传感器，收集并绘制其温度数据。（此示例源自
    Hunt 书中的一个例子）。^(13) 你的程序部分可能如下所示：


    `public void plotTemperature(Sensor theSensor) {`

    `        double temp = theSensor.getSensorData().getOilData().getTemp();`

    `        …`

    `}`


    这很可能能工作——但仅此一次。但现在，你的温度绘制方法已经与*`Sensor`*、*`SensorData`* 和 *`OilSensor`* 类耦合在一起。这意味着*其中任何一个*类的变更都可能影响你的
    `plotTemperature()` 方法，并迫使你重构代码。这并不理想。


    这正是 PLK 敦促你避免的情况。与其将你的方法链接到一个层级结构中，并遍历该层级以获取所需服务，不如直接请求数据：


    `public void plotTemperature(double theSensor) {`

    `        ...`

    `}`

    `...`

    `plotTemperature(aSensor.getTemp());`


    没错，我们不得不在 `Sensor` 类中添加一个方法来为我们获取温度，但为了清理上述混乱（以及可能的错误），这只是一个小小的代价。现在，你的类只与*一个*类直接协作，并让那个类去处理其他类。当然，你的
    `Sensor` 类也会对 `SensorData` 做同样的事情，以此类推。


    这引出了 PLK 的一个推论——*将依赖关系降至最低*。这是松散耦合的关键。通过仅与少数其他类交互，你的类会变得更加灵活，并且更不容易包含错误。


    ___________________


    ¹¹ Martin, 2003.


    ¹² Lieberherr, K., I. Holland, et al. *Object-Oriented Programming: An Objective
    Sense of Style*. OOPSLA ’88, Association for Computing Machinery, 1988.


    ¹³ Hunt, 2000.


    ### 类设计指南：乐趣与享受


    最后，为了不让我们在没有任何列表的情况下结束本章，我们列出了 24 条类设计指南。这些指南比我们上面描述的一般设计指南更为具体，但非常实用。把它们摘录下来，并深深印入你的脑海。


    这 24 条类设计指南取自 Davis^(14) 和 McConnell。^(15)


    1.  在类接口中呈现*一致的抽象层次*。

    2.  确保你理解该类正在实现的抽象。

    3.  将不相关的信息移至另一个类（ISP）。

    4.  在进行更改时，警惕类接口的侵蚀（ISP）。

    5.  不要添加与接口抽象不一致的公共成员。

    6.  最小化类和成员的可访问性（OCP）。

    7.  不要在公共接口中暴露成员数据。

    8.  避免将私有实现细节放入类的接口中。

    9.  避免将方法放入公共接口中。

    10. 注意耦合是否过于紧密（PLK）。

    11. 尝试通过类内的包含关系来实现“has a”关系（SRP）。

    12. 通过继承来实现“is a”关系（LSP）。

    13. 仅当派生类是基类的一个更具体版本时才进行继承。

    14. 确保只继承你想要继承的内容（LSP）。

    15. 将公共接口、数据和操作尽可能上移到继承层次结构的高层（DRY）。

    16. 对只有一个实例的类保持警惕。

    17. 对只有一个派生类的基类保持警惕。

    18. 避免过深的继承树（LSP）。

    19. 尽量保持类中方法的数量尽可能少。

    20. 最小化对其他类的间接方法调用（PLK）。

    21. 如果可能，在所有构造函数中初始化所有成员数据。

    22. 消除纯数据类。

    23. 消除纯操作类。

    24. 哦，还有，在外要小心……（好吧，这条是我加的。）


    ___________________


    ¹⁴ Davis, A. M. 201 *Principles of Software Development*. (New York, NY: McGraw-Hill,
    Inc., 1995.)


    ¹⁵ McConnell, Steve, Code Complete, *2nd Edition.* (Redmond, WA: Microsoft Press,
    2004.)


    ### 结论


    在本章中，我们审视了过去几十年中发展起来的许多关于面向对象设计的经验法则。这些设计原则作为指南，指导你（设计者）遵循它们，从而使你的设计最终成为一个优秀的设计——易于实现、易于维护，并且恰好满足客户的需求。重要的是，当你在从功能特性向设计摸索前进时，这些设计原则提供了指导。它们阐述了检查和实现继承、封装、多态和抽象等重要面向对象原则的方法。同时，它们也强化了诸如内聚和耦合等基本设计原则。将这些原则深深印入你的脑海吧，面向对象设计者。


    ## 第 11 章

