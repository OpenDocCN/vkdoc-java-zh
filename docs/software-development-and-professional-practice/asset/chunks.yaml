  trans: "\n### 结论\n\n软件开发是每个软件项目的核心，也是软件工程的核心。其目标是在不断变化的需求面前，按时、在预算内为用户交付卓越、无缺陷的代码。这使得开发工作变得尤为艰巨。然而，为难题找到解决方案并让代码正确运行，是世界上最酷的感觉之一。\n\
    \n> *“（编程是）我能想到的唯一一份让我同时成为工程师和艺术家的工作。它有着令人难以置信的、严谨的技术元素，我喜欢这一点，因为你必须进行非常精确的思考。另一方面，它又有着极具创造力的一面，唯一的限制就是想象力的边界。这两者的结合正是编程的独特之处。你可以同时成为艺术家和科学家。我喜欢这一点。我喜欢创造位于核心的魔法把戏，这才是编写程序的真正基础。第一次看到那个魔法把戏，也就是你程序的精髓，能够正确运行，是编写程序过程中最激动人心的部分。”*\n\
    > \n> — 安迪·赫兹菲尔德（第一代 Mac OS 的设计者）^(2)\n\n## 第 2 章\n\n## 流程生命周期模型\n\n> *如果你不知道要去哪里，那么走哪条路都行。*\n\
    > \n> *如果你不知道自己在哪里，那么地图也没用。*\n> \n> - 瓦茨·汉弗莱\n\n每个程序都有一个生命周期。无论程序是大是小，无论项目有多少人参与——所有程序都经历相同的步骤：\n\
    \n1.  构思\n2.  需求收集/探索/建模\n3.  设计\n4.  编码与调试\n5.  测试\n6.  发布\n7.  维护/软件演进\n8. \
    \ 退役\n\n某个程序可能会压缩其中一些步骤，或者将两个或多个步骤合并为一项工作，但所有程序都会经历所有步骤。\n\n尽管每个程序都有生命周期，但包含这些步骤的流程有许多不同的变体。然而，每个生命周期模型都是两种基本类型的变体。在第一种类型中，项目团队通常会完成一个完整的生命周期——至少是步骤\
    \ 2 到 7——然后才回头开始产品的下一个版本。在第二种类型中（这在当今更为普遍），项目团队通常会完成部分生命周期——通常是步骤 3 到 5——并在进入发布步骤之前，多次迭代这些步骤。\n\
    \n如今，软件开发项目的管理通常分为两种不同类型：传统的*计划驱动模型*¹和较新的*敏捷开发模型*²。在计划驱动模型中，流程在步骤和发布时间方面往往更为严格。计划驱动模型有更清晰定义的阶段，并且在进入下一阶段之前，对阶段完成有更多的签核要求。计划驱动模型需要对每个阶段进行更多文档记录，并验证每个工作产品的完成情况。这些模型通常适用于具有明确定义交付成果的新软件政府合同。敏捷模型本质上是增量式的，并假设小而频繁的发布比大而不频繁的发布能产生更健壮的产品。敏捷模型中的阶段往往比计划驱动模型中的阶段更模糊，并且所需的工作产品文档通常更少，其基本思想是代码才是正在产出的东西，因此文档工作应聚焦于此。请访问敏捷宣言网页\
    \ [`agilemanifesto.org`](http://agilemanifesto.org) 以深入了解敏捷开发模型和目标。\n\n我们将审视几种生命周期模型，包括计划驱动型和敏捷型，并对它们进行比较。没有一种开发软件的最佳流程。每个项目必须根据其特定应用决定最适合的模型，并基于项目领域、项目规模、团队经验和项目时间线做出决定。\n\
    \n### 一个根本不是模型的模型：编码与修复\n\n我们要讨论的第一个软件开发模型实际上根本不是一个模型。但这是我们在独自处理小型项目，或者可能只有一个合作伙伴时，大多数人会做的事情。它就是*编码与修复模型*。\n\
    \n如图 2-1 所示的编码与修复模型，通常被用来替代实际的项目管理。在这个模型中，没有正式的需求，没有必需的文档，没有质量保证或正式测试，发布也充其量是随意的。使用此模型时，甚至不要考虑工作量估算或进度安排。\n\
    \n编码与修复意味着花最少的时间理解问题，然后开始编码。编译你的代码并尝试运行。如果它不工作，修复你看到的第一个问题，然后再次尝试。继续这个“输入-编译-运行-修复”的循环，直到程序按你的意愿运行且没有致命错误，然后发布它。\n\
    \n每个程序员都知道这个模型。我们都用过它不止一次，而且它在某些情况下确实有效：用于快速、一次性的任务。例如，它适用于概念验证程序。它不涉及维护，并且适用于小型、单人程序。然而，对于任何其他类型的程序来说，这是一个*非常危险的*模型。\n\
    \n由于没有真正提及配置管理，几乎没有测试，没有架构规划，可能除了对程序进行桌面检查作为代码审查之外别无他物，这个模型只适用于快速而粗糙的原型，仅此而已。使用此模型创建的软件规模小，用户界面细节欠缺，且风格独特。\n\
    \n_____________\n\n¹Paulk, M. C. *能力成熟度模型：改进软件过程的指南*。（雷丁，马萨诸塞州：Addison-Wesley，1995\
    \ 年。）\n\n²Martin, R. C. *敏捷软件开发：原则、模式与实践*。（上 saddle 河，新泽西州：Prentice Hall，2003\
    \ 年。）\n\n话虽如此，这是进行快速而粗糙的原型和简短、一次性程序的绝佳方式。它对于验证架构决策和展示用户界面设计的快速版本很有用。用它来理解你正在处理的更大问题。\n\
    \n![images](img/0201.jpg)\n\n***图 2-1.** 编码与修复流程（非）模型*\n"
- fmt: '### Cruising over the Waterfall


    The first and most traditional of the plan-driven process models is the *waterfall*
    model. Shown in [Figure 2-2](#Chapter02.html#fig_2_2), it was created in 1970
    by Winston Royce,[³](#Chapter02.html#CHP-2-FN-3) and addresses all of the standard
    life cycle phases. It progresses nicely through requirements gathering and analysis,
    to architectural design, detailed design, coding, debugging, system testing, release,
    and maintenance. It requires detailed documentation at each stage, along with
    reviews, archiving of the documents, sign-offs at each process phase, configuration
    management, and close management of the entire project. It''s a model of the plan-driven
    process.


    _____________


    ³ Royce, W. W. *Managing the Development of Large Software Systems.* Proceedings
    of IEEE WESCON, IEEE Press. (1970)


    ![images](images/0202.jpg)


    ***Figure 2-2.** The waterfall process model*


    It also doesn''t work.


    There are two fundamental and related problems with the waterfall model that hamper
    its acceptance and make it very difficult to implement. First, it generally requires
    that you finish phase `N` before you continue on to phase `N+1`. In the simplest
    example, this means that you must nail down *all* your requirements before you
    start your architectural design, and finish your coding and debugging before you
    start anything but unit testing, etc. In theory, this is great. You''ll have a
    complete set of requirements, you''ll understand exactly what the customer wants,
    and everything the customer wants, so you can then confidently move on to designing
    the system.


    In practice, this never happens though. I''ve never worked on a project where
    all the requirements were nailed down at the beginning of the work. I''ve never
    seen a project where big things didn''t change somewhere during development. So
    finishing one phase before the other begins is problematic.


    The second problem with the waterfall is that, as stated, it has no provision
    for backing up. It is fundamentally based on an assembly-line mentality for developing
    software. The nice little diagram shows no way to go back and rework your design
    if you find a problem during implementation. This is similar to the first problem
    above. The implications are that you really have to nail down one phase and review
    everything in detail before you move on. In practice this is just not – practical.
    The world doesn''t work this way. You never know everything you need to know at
    exactly the time you need to know it. This is why software is a wicked problem.


    All this being said, the waterfall is a terrific theoretical model. It isolates
    the different phases of the life cycle and forces you to think about what you
    really do need to know before you move on. It''s also a good way to start thinking
    about very large projects; it gives managers a warm fuzzy because it lets them
    think they know what''s going on (they don''t, but that''s another story). It''s
    also a good model for inexperienced teams working on a well-defined, new project
    because it leads them through the life cycle.


    So because the waterfall is not a good practical model, it immediately morphs
    into a slightly different one.


    ### Backing Up the Waterfall


    The first thing that happens to the waterfall model is that it changes into the
    waterfall with feedback, shown in [Figure 2-3](#Chapter02.html#fig_2_3). This
    is an admission that a straight-line waterfall doesn''t work and that you need
    the ability to back up to a previous phase when you discover a problem in the
    current phase.


    ![images](images/0203.jpg)


    ***Figure 2-3.** Waterfall with feedback process model*


    The waterfall with feedback model recognizes that you have to start work with
    incomplete requirements, design, test plan, and so on. It also explicitly builds
    in the idea that you will have to go back to previous process steps as new information
    about your project is uncovered. The new information can be new requirements,
    updated requirements, design flaws, defects in testing plans, and the like. Any
    of these will require that you revisit a previous process step to rectify the
    problem.


    This process model is still quite rigid, and it still has the same advantages
    of a waterfall model when it comes to very large, new projects and inexperienced
    teams. The two main disadvantages with the waterfall with feedback model are that
    it really messes with your scheduling big time, and it makes it harder to know
    when you''re finished. It messes with your schedule because in any phase there
    can be unexpected moves back to a previous phase of development. This also means
    it''s harder to know when you are done.


    Because of these disadvantages, the waterfall with feedback model also morphs
    into a new model, one that attempts to address the scheduling and uncertainty
    issues.'
