    ### 敏捷即敏捷


    自 20 世纪 90 年代中期起，一群流程专家开始倡导一种新的软件开发模式。与上述由卡内基梅隆大学软件工程研究所（SEI）等团体所推崇的、以计划为驱动的重型模型⁸相反，这种新流程模型是轻量级的。它需要的文档更少，流程控制也更少。它针对的是中小型软件项目和较小的开发团队。其目的是让这些开发团队能够快速适应不断变化的需求和客户要求，并且它提出要比计划驱动模型更快地发布完成的软件。简而言之，它就是敏捷。⁹


    敏捷开发基于这样一个命题：任何软件开发项目的目标都是可运行的代码。并且由于重点在于可运行的软件，因此开发团队应该将大部分时间花在编写代码上，而不是编写文档上。这使得这些流程被称为轻量级。


    轻量级方法论有几个特点。它们倾向于强调在编写代码之前编写测试、频繁发布产品、客户深度参与开发、代码共同所有权以及重构——即重写代码以使其更简单、更易于维护。轻量级方法论也伴随着一些误解。其中两个最有害的误解可能是：轻量级流程只适用于非常小的项目，以及在轻量级项目中不需要任何流程纪律。


    事实是，轻量级方法论已在许多中小型项目中成功应用——比如代码量高达约 50 万行的项目。轻量级方法论同样需要流程纪律，尤其是在项目初期，当初始需求和迭代周期被创建时，以及在作为编码过程核心的测试驱动开发中。


    ______________


    ⁸Paulk, M. C. (1995)


    ⁹Cockburn, A. *敏捷软件开发.* (波士顿, 马萨诸塞州: Addison-Wesley, 2002.)


    我们将探讨两种轻量级/敏捷方法论：极限编程和 Scrum。


    ### 极限编程（XP）


    极限编程大约在 1995 年由肯特·贝克和沃德·坎宁安创立。XP 是一种“轻量级、高效、低风险、灵活、可预测、科学且有趣的软件开发方式”。¹⁰


    ### XP 概述


    XP 依赖于以下四个基本理念：


    *   *客户深度参与*：XP 要求客户代表成为开发团队的一员，并始终在现场。客户代表与团队合作，共同创建产品每个迭代的内容，并为每个中间版本创建所有验收测试。

    *   *持续单元测试*（也称为测试驱动开发 [TDD]）：XP 要求开发人员在编写任何代码之前，先为任何新功能编写单元测试。这样一来，测试最初当然都会失败，但这为开发人员提供了一个清晰的成功衡量标准。当所有单元测试通过时，你就完成了该功能的实现。

    *   *结对编程*：XP 要求所有代码都由成对的开发人员编写。简而言之，结对编程需要两名程序员——一名驾驶员和一名领航员——他们共享一台计算机。驾驶员实际编写代码，而领航员则在一旁观察，捕捉拼写错误、提出建议、思考设计和测试等。两人会定期交换角色（大约每
    30 分钟，或者当其中一人认为有更好的方式来实现某段代码时）。结对编程基于“三个臭皮匠，顶个诸葛亮”的理论。虽然就单位时间内编写的代码行数而言，一对程序员的生产力不如两个单独工作的程序员，但他们编写的代码通常缺陷更少，并且他们有一套单元测试来证明代码能正常工作。这使得他们整体上更具生产力。结对编程还为团队提供了重构现有代码的机会——即重新设计代码，使其在满足客户需求的同时尽可能简单。结对编程并非
    XP 独有，但 XP 是第一个专门使用它的方法论。

    *   *短迭代周期和频繁发布*：XP 通常使用仅几个月的发布周期，每个发布由多个迭代组成，每个迭代大约 4-6 周。频繁发布与现场客户代表的结合，使得 XP
    团队能够获得关于新功能的即时反馈，并及早发现设计和需求问题。XP 还要求持续集成和构建产品。每当一个编程对完成一个功能并且该功能通过了他们所有的单元测试时，他们就会立即集成并构建整个产品。然后，他们使用所有单元测试作为回归测试套件，以确保新功能没有破坏任何已检入的代码。如果确实破坏了某些东西，他们会立即修复。因此，在一个
    XP 项目中，集成和构建一天可能发生多次。这个过程让团队每天都能很好地了解他们在发布周期中的位置，并为客户提供一个可运行的构建版本，以便运行验收测试。


    ______________


    ¹⁰这只是对 XP 工作方式的非常简短的描述；要获得更详尽、更精彩的解释，真正堪称 XP 圣经的著作，请参阅：

    Beck, K. *解析极限编程：拥抱变化.* (波士顿, 马萨诸塞州: Addison-Wesley, 2000.)


    ### XP 的动机


    风险是软件中最基本的问题。风险以多种方式显现：进度延迟、项目取消、缺陷率上升、对业务问题的误解、虚假功能丰富（你添加了客户并不真正想要或需要的功能）以及人员流失。管理风险是一个非常困难且耗时的管理问题。最小化和处理风险是风险管理的关键领域。XP
    试图通过控制软件开发的四个变量来最小化风险。

    '
- fmt: '### The Four Variables


    The four variables of software development projects are as follows:


    - `Cost`

    - `Time`

    - `Features`

    - `Quality`


    `Cost` is probably the most constrained; you can''t spend your way to quality
    or schedule, and as a developer you have very limited control over cost. Cost
    also is where Brooks'' law gets invoked (adding programmers to a late project
    just makes it later).


    `Time` is your delivery schedule and is unfortunately usually imposed on you from
    the outside. For example, most consumer products (be they hardware or software)
    will have a delivery date in late summer or early fall in order to hit the holiday
    buying season. You can''t move Christmas. If you are late, the only way to fix
    your problem is to drop features or lessen quality; neither of which is pretty.


    `Quality` is the number and severity of defects you are willing to release with.
    You can make short-term gains in delivery schedules by sacrificing quality, but
    the cost is enormous. It will take more time to fix the next release and your
    credibility is pretty well shot.


    `Features` (also called `scope`) is what the product actually does. This is what
    developers should always focus on. It''s the most important of the variables from
    the customer''s perspective and it is also the one you as a developer have the
    most control over. Controlling scope allows you to provide managers and customers
    control over quality, time, and cost.


    XP recognizes that to minimize risk, developers need to control as many of the
    variables as possible, but especially they need to control the scope of the project.
    XP uses the metaphor of "learning to drive." Learning to drive is not pointing
    the car in the right direction. It''s pointing the car, constantly paying attention
    and making the constant minor corrections necessary to keep the car on the road.
    In programming, the only constant is change. If you pay attention and cope with
    change as it occurs, you can keep the cost of change manageable.


    ### The Four Values


    In order for XP to be a viable discipline of development everyone who is involved
    in an XP project needs to buy into a common set of values that will permeate all
    the rules that make up the discipline. In XP there are the following four core
    values that enable it to work:


    - `Communication`

    - `Simplicity`

    - `Feedback`

    - `Courage`


    `Communication` really means spreading the collective knowledge of the group around
    to all the members. Keeping the XP team small facilitates communication by keeping
    the number of lines of communication small. Pair programming and collective ownership
    of the code also facilitate communication by spreading the knowledge of the entire
    code base around the entire team. XP developers are encouraged to fix bugs they
    find and to redesign features to make them simpler (see below); this spreads knowledge
    of the code widely among the team.


    `Simplicity` is key. XP focuses on developing the simplest piece of software that
    solves today''s task. XP developers bet that "...it is better to do a simple thing
    today and pay a little more tomorrow to change it if it needs it, than to do a
    more complicated thing today that may never be used anyway." All developers on
    an XP team are allowed and encouraged to redesign code to make it simpler at any
    time. This practice is called "refactoring." "Concrete `feedback` about the current
    state of the system is absolutely priceless. Optimism is an occupational hazard
    of programming. Feedback is the treatment."[^(11)](#Chapter02.html#CHP-2-FN-11)
    XP programmers are required to write tests before they write the code, so that
    they always have immediate feedback about their code and its impact on the system.
    Also, the customer is writing functional (acceptance) tests so those are available
    to measure how well the system is adhering to the "stories" used to develop it.


    XP developers must have `courage`. They must be willing to make changes at any
    time when the design no longer fits. They need to be prepared to throw code away
    if it doesn''t work. Simplicity supports courage because you''re less likely to
    break a simple system. XP team members track the schedule daily and involve the
    customer in re-prioritizing features as soon as needed.


    ### The 15 Principles


    From the four values described above XP derives some basic principles. The list
    looks like the following:'
