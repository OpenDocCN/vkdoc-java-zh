    ## 8.2 Sets


    A `Set` is a collection of objects, of which no two are the same. A `Set` does
    not record the order in which the objects were added to it. To create a `Set`,
    we can use the `mutableSetOf` function. As with the `mutableListOf` function,
    we need to pass in a type parameter. So to create a `Set` of `String`s, we use


    ```

    val stringList = mutableSetOf<String>()

    ```


    **PROGRAMMING CHALLENGE 8.2**


    Change the code from the `List` challenge to the following:


    ```

    package lpk.basics

    fun main() {

    val birds = mutableSetOf<String>()

    birds.add("emu")

    birds.add("magpie")

    birds.add("galah")

    birds.add("emu")

    println("Number of bird species: " + birds.size)

    if (birds.contains("emu")) {

    println("Saw an emu!")

    }

    if (birds.contains("brolga")) {

    println("Saw a brolga!")

    }

    }

    ```


    Run the program. What output do you get?


    Note that there is no call to find out what the “third” species seen was. This
    is because the elements of a `Set` are not in any order, so we cannot access the
    element at a particular position, as we can with `List`s and `Array`s.


    ## 8.3 Maps


    We use `Map`s to record information about objects, for example, the ages of the
    members of a club. The objects about which we are storing information are called
    the *keys*. For each key in a map, there is exactly one *value*. As with `List`s
    and `Set`s, we specify the types of objects to be stored in a `Map`. However,
    we need to specify a type for the keys and also a type for the values.


    If we would like a `Map` to store people’s ages, we might use their names, which
    are `String`s, for the keys, and we might use `Int`s for their ages. To create
    a `Map` with these type parameters, we use this code:


    ```

    val nameToAge = mutableMapOf<String, Int>()

    ```


    To store a key and its value in a `Map`, we use the `put` function, which has
    two parameters: one for the key and one for the value. To get the value for a
    particular key, we use square bracket notation, similar to that for getting `Array`
    and `List` items for a particular index. Let’s see these in action.


    **PROGRAMMING CHALLENGE 8.3**


    Run the following code:


    ```

    package lpk.basics

    fun main() {

    val nameToAge = mutableMapOf<String, Int>()

    nameToAge.put("Harry", 15)

    nameToAge.put("Luna", 16)

    nameToAge.put("Snape", 36)

    println("Harry''s age: " + nameToAge["Harry"])

    println("Luna''s age: " + nameToAge["Luna"])

    println("Snape''s age: " + nameToAge["Snape"])

    }

    ```


    What output do you get?


    If the value for a key in the map needs to be updated, we call `put` again, with
    the key and the new value. This simply overwrites the previous value for that
    key. If we are no longer interested in the value for a key, we remove the key
    from the map using the `remove` function. Another operation of interest is to
    iterate over the keys in a map.


