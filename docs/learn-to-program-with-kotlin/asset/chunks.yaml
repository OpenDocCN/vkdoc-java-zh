  raw: '## 11.6 Generating the Permutations of a **Term**


    As a starting point for implementing the `permutations` function of `Term`, let’s
    think about how we might find the possible permutations of `"abc"`.


    Some of the rearrangements will have the `Char a` in the first position. How many,
    and what are they? Well, with `a` already used, we have `b` and `c` left. There
    are just two ways of arranging these letters: `"bc"` and `"cb"`. It follows that
    there are exactly two permutations of `"abc"` in which `a` is in the first place:
    `"abc"` and `"acb"`.


    What about the permutations with `a` in second place? These are produced from
    permutations of `"bc"` by inserting an `a` between the first and second letters
    of the permutation. This gives `"bac"` and `"cab"`.


    Finally, the permutations of `"abc"` in which the `a` appears in the third position
    are obtained by generating the two permutations of `"bc"` and adding `a` onto
    the end, which gives `"bca"` and `"cba"`.


    PROJECT STEP 11.13


    Let’s calculate the permutations of `"xabc"`. It’s best to do this in a text editor
    using a font in which all characters have the same width, so that columns of text
    will line up.


    Write out the permutations of `"abc"` in a single line. There should be six of
    these.


    Now copy this list three times to give four identical lines that each contain
    the six permutations of `"abc"`.


    For each of the terms in the first line, add an `x` to the start.


    For each of the terms in the second line, insert an `x` between the first and
    second letters.


    For the third line, insert an `x` between the second and third letters of each
    term.


    For the last line, add an `x` to the end of each term.


    There should now be the 24 distinct permutations of `"xabc"`, written over four
    lines.


    Here is our algorithm for calculating the permutations of a `Term`:


    *   If the `Term` has only one character, then there is only one permutation,
    which is the `Term` itself, so just return a `Set` containing the original `Term`.


    *   For `Term`s of length greater than one, remove the first letter. The resulting
    `Term` has one letter fewer than the original. Calculate the permutations of the
    trimmed `Term`.


    *   For each of these, create new `Term`s by inserting the first letter of the
    original `Term` at each possible position within that `Term`.


    The second step of this algorithm actually invokes the algorithm itself. This
    is called *recursion* and is an extremely important technique in programming.


    How do we know that this algorithm eventually stops? Well


    *   The recursive call uses a shorter input than the original.


    *   For input of length 1, we do not make a recursive call, but just return a
    result.


    To implement this algorithm, we will need two “helper” functions. The first is
    to create a new `Term` from an existing one by removing its first letter. We will
    call this function `tail`. As usual, our procedure is to provide a stub, then
    write tests, and then do the implementation. Here is a stub for the function:


    ```

    fun tail(): Term {

    return Term("")

    }

    ```


    PROJECT STEP 11.14


    Copy this function into `Term`.


    The function is pretty straightforward, but there are a couple of corner cases
    to test carefully.


    PROJECT STEP 11.15


    It’s not clear how we should take the `tail` of an empty `Term`. Let’s just decide
    to return the `Term` itself. To lock in this behavior, add the following to `TermTest`:


    ```

    @Test

    fun tailEmpty() {

    val empty = Term("")

    Assert.assertEquals(empty, empty.tail())

    }

    ```


    The second corner case is dealing with a `Term` that has length one.


    PROJECT STEP 11.16


    Copy this code into `TermTest`:


    ```

    @Test

    fun tailOne() {

    val a = Term("a")

    Assert.assertEquals(Term(""), a.tail())

    }

    ```


    We should also have a test for a more normal `Term`.


    PROJECT STEP 11.17


    Add this unit test:


    ```

    @Test

    fun tailTest() {

    val anaconda = Term("anaconda")

    Assert.assertEquals(Term("naconda"), anaconda.tail())

    }

    ```


    The `String` data type has functions for creating a new `String` from part of
    an existing one. One of these, called `substring` , takes an `Int` parameter which
    marks the position at which the `String` is to be cut. The returned `String` is
    the part of the original one after, and including, the indexed `Char`. (And remember
    that `String` indexes start at `0`.) We can use `substring` to implement `tail`.


    PROJECT STEP 11.18


    Replace the stub implementation of `tail` with this code:


    ```

    fun tail(): Term {

    if (text == "") {

    return Term("")

    }

    return Term(text.substring(1))

    }

    ```


    Check that the three tests for `tail` now pass.


    The second helper function that we need is one that will insert a `Char` into
    a `Term`, at a given position, and so produce a new `Term`. For example, if we
    start with `"xyz"` and call `insert(a, 1)`, we should get `"xayz"`.


    PROJECT STEP 11.19


    Add the following stubbed function to `Term`:


    ```

    fun insert(newChar: Char, position: Int): Term {

    return Term("")

    }

    ```


    As with the `tail` function, there are three tests that we should implement: two
    corner cases for short `Term`s and a straightforward example.


    PROJECT STEP 11.20


    If we start with an empty `Term`, there is only one location at which it makes
    sense to do an insertion: `0`. The resulting `Term` should just consist of the
    inserted `Char`.


    Copy the following test for this “empty” scenario into `TermTest`:


    ```

    @Test

    fun insertIntoEmpty() {

    val empty = Term("")

    Assert.assertEquals(Term("a"), empty.insert(''a'', 0))

    }

    ```


    PROJECT STEP 11.21


    For a `Term` of length one, we can insert a `Char` either at position `0` or at
    position `1`. Here’s a test for these options:


    ```

    @Test

    fun insertIntoLengthOneTerm() {

    val x = Term("x")

    Assert.assertEquals(Term("ax"), x.insert(''a'', 0))

    Assert.assertEquals(Term("xa"), x.insert(''a'', 1))

    }

    ```


    Copy it into `TermTest`.


    PROJECT STEP 11.22


    Here’s a test using a longer `Term`:


    ```

    @Test

    fun insertTest() {

    val x = Term("xy")

    Assert.assertEquals(Term("axy"), x.insert(''a'', 0))

    Assert.assertEquals(Term("xay"), x.insert(''a'', 1))

    Assert.assertEquals(Term("xya"), x.insert(''a'', 2))

    }

    ```


    Add it to `TermTest`.


    The `substring` function of `String` that we used earlier actually comes in two
    forms. We’ve already used the single parameter version, but there is also a version
    that takes two `Int` parameters. The `String` returned by this function contains
    the text between the positions indicated by these parameters. We can implement
    `insert` by using these two versions of `substring`.


    PROJECT STEP 11.23


    Replace the stub implementation of `insert` with this code:


    ```

    fun insert(newChar: Char, position: Int): Term {

    val before = text.substring(0, position)

    val after = text.substring(position)

    return Term(before + newChar + after)

    }

    ```


    Check that the tests for this function now pass.


    With these two helper functions in place, we can finally implement `permutations`.
    First, let’s replace our stub implementation by one in which the algorithm is
    sketched out using comments:


    ```

    1   fun permutations(): Set {

    2       //Create a result set to which the permutations will be added.


    4       //If the Term has length 0 or 1, then the Term itself is

    5       //the only permutation,

    6       //so add it to the result and return.


