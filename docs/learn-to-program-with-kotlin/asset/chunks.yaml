    of the book, we will solve the problem of reading speed signs, which is necessary
    for self-driving cars.


    The speed signs that our software will read consist of black numerals inside a
    red circle, all on a white background. By the end of the book, we will have written
    software that can find the speed sign in a photo and read it.


    Our software will do this in two main steps. First, the part of the image that
    contains the sign will be located and will be broken into sub-images. The output
    of this process will be a list of `Picture`s, each representing a numeral of the
    speed. The second step will be to determine what numbers these images represent.


    The implementation of the software is spread across the next four chapters, as
    follows. In this chapter, we will enhance the `Picture` class from Part III to
    allow the kind of slicing that is required in locating important features of images.
    In the next chapter, these new functions will be applied to speed sign photos
    to extract the digit sub-images. In Chapter [20](#508289_1_En_20_Chapter.xhtml),
    we will develop the code that can take a black and white image and determine what
    digit it represents. Finally, in the last chapter of the book, we will put all
    of these pieces together to produce what is really a very sophisticated program.


    ## 18.1 A Bit More Kotlin


    Before we get started on our computer vision code, there are a couple of concepts
    to learn. We will do so using a tool called the Kotlin REPL (read, evaluate, print
    loop), which is a part of IntelliJ. The REPL is started using the menus `Tools`
    ➤ `Kotlin` ➤ `Kotlin` `REPL` . The tool itself is a sort of command-line interface
    to Kotlin and is shown in Figure [18-1](#508289_1_En_18_Chapter.xhtml#Fig1).


    ![../images/508289_1_En_18_Chapter/508289_1_En_18_Fig1_HTML.jpg](images/508289_1_En_18_Chapter/508289_1_En_18_Fig1_HTML.jpg)


    Figure 18-1


    The Kotlin REPL


    In Chapter [20](#508289_1_En_20_Chapter.xhtml), we will need to talk about proportions,
    which are fractional numbers, such as “.65”. These can be modeled in Kotlin using
    a class called `Float`. If we want to divide two `Int`s using ordinary arithmetic
    (rather than integer arithmetic), we convert them to `Float`s first. For example,
    if we enter the expression


    ```

    1.toFloat() / 3.toFloat()

    ```


    in the Kotlin REPL, the answer `0.33333334` is printed out. There’s not much really
    to say about `Float`s. They are very easy to use. We usually only get problems
    when we forget to convert `Int`s to `Float`s before making a division, for example:


    ```

    (1/3).toFloat()

    ```


    gives the result `0.0` because `1/3` is the `Int 0`, which is then converted to
    the `Float 0.0`.


    The second new programming concept that we need is that of *filtering* , which
    is the application of some decision process to the elements of a `List`, to keep
    the important ones and discard the rest. To see this in action, let’s filter the
    integers between `1` and `10`, keeping just the even ones. To do this, type


    ```

    (1..10).filter { i -> i % 2 == 0 }

    ```


    into the REPL and press `Ctrl+Enter`. You should get the printout:


    ```

    [2, 4, 6, 8, 10]

    ```


    The expression


    ```

    i -> i % 2 == 0

    ```


    is a function from type `Int` to type `Boolean`. This function returns `true`
    if the remainder of dividing `i` by `2` is equal to `0`, that is, if `i` is even.
    Recall, from the previous chapter, that this is called a lambda function. In fact,
    lambda functions like this are so useful that Kotlin allows a shorthand in which
    the `i -> i` part of the expression is replaced by `it`, which is a nice shorthand
    for “any element of the collection that we are iterating over.” Using this, we
    can write


    ```

    (1..10).filter { it % 2 == 0 }

    ```


    The `filter` function applies this to all of the elements of the original list
    and builds a new list consisting of those for which the function was `true`. We
    can use filtering to answer questions such as “What is lowest multiple of 41 that
    is greater than 1000?”:


    ```

    (1001..1100).filter{it % 41 == 0}.first()

    ```


    We will use filtering in Chapter [19](#508289_1_En_19_Chapter.xhtml), where we
    slice images into lists of sub-images and need to discard those that are too small
    to be of interest.


    ## 18.2 Project Structure


    The code for this chapter can be downloaded from [`https://github.com/Apress/learn-to-program-w-kotlin-ch18.git`](https://github.com/Apress/learn-to-program-w-kotlin-ch18.git).
    This contains the `Picture` class from previous chapters, with some unnecessary
    functions removed, `PictureTest`, and a directory of test images.'
