    ![../images/508289_1_En_5_Chapter/508289_1_En_5_Fig6_HTML.jpg](img/508289_1_En_5_Fig6_HTML.jpg)


    图 5-6


    一种图案，其中瓦片颜色通过将其行索引乘以列索引得到


    这些维度在第 2 行和第 3 行设置。该图案关于左上角到右下角的对角线对称。这是因为单元格在此对角线上的反射会交换行和列坐标。例如，考虑行 5 列 3 的单元格。该单元格在对角线上的反射是行
    3 列 5。由于 5 乘以 3 等于 3 乘以 5，这些单元格将具有相同的灰色阴影。第一行和第一列上的单元格都是黑色的，因为 0 乘以任何其他数都等于 0。


