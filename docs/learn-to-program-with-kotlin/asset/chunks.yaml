    ## 10.13 进一步探索


    如果你在完成本项目的任何步骤时遇到困难，或者代码混乱不堪，可以从 [`https://github.com/Apress/learn-to-program-w-kotlin-projectausten-complete.git`](https://github.com/Apress/learn-to-program-w-kotlin-projectausten-complete.git)
    下载完整版本。利用这个版本（或你自己的代码），你可以通过以下几种方式进一步拓展项目。首先，你可以使用提供的文本文件来分析奥斯汀的其他小说。此外，你还可以从古腾堡计划下载大量其他书籍，并比较不同作者的用词习惯。


    如果你想消除章节编号污染数据的问题，可以收紧单词的定义，并对 `Line` 进行相应修改。例如，你可以检测单词中的第一个 `Char`，如果它不是字母，则拒绝该单词。要判断一个
    `Char` 是否为字母，可以使用 `Character.isLetter` 函数。


    我们分析的一个不足之处在于，它将具有相同词根的单词视为独立实体。示例请参见图 10-12。按词根对单词进行分类的方法称为*词干提取*。英语和其他语言都有可免费下载的*词库*，可用于此类分析。当你读完本书时，应该能够利用词库按词根汇总单词使用统计信息。


    ![../images/508289_1_En_10_Chapter/508289_1_En_10_Fig12_HTML.jpg](img/508289_1_En_10_Fig12_HTML.jpg)


    图 10-12


    具有相同词根的单词


    ## 10.14 本章小结


    本章内容非常丰富。我们涵盖了一些非常重要且困难的主题，例如面向对象设计，并编写了一个虽小但精密的文本分析系统。我们编写的程序质量很高，因为我们为所有代码都编写了单元测试。


    本章涵盖的大量内容为我们后续章节中更多与文本相关的编程打下了坚实的基础。


    # 11. 变位词


    本章建立在第 10 章使用的面向对象编程和单元测试技术之上，并引入了一种新的编程技术——*递归*。我们要解决的问题是：给定任意一个英文单词，它的所有变位词有哪些？


    ## 11.1 主要类


    假设我们要找出某个给定单词的所有变位词。一种方法如下：首先，计算出该单词中字母的所有不同排列方式，然后对照已知的英语单词列表检查每种排列。不在列表中的组合将被丢弃，剩下的排列就是变位词。例如，假设我们从单词
    `rat` 开始。该单词中字母的不同排列有：


    ```

    art

    atr

    rat

    rta

    tar

    tra

    ```


    其中在字典中实际存在的三个单词是 `art`、`rat` 和 `tar`。


    基于这种解决问题的方法，我们想到了两个主要类。第一个类我们称之为 `Term`，它封装了查找所有字母排列（排列组合）的算法。第二个类称为 `Dictionary`，负责进行核对。


    首先，在 IntelliJ 中克隆此仓库：


    [`https://github.com/Apress/learn-to-program-w-kotlin-anagrams.git`](https://github.com/Apress/learn-to-program-w-kotlin-anagrams.git)


    展开后的项目结构应如图 11-1 所示。主要部分包括：


    ![../images/508289_1_En_11_Chapter/508289_1_En_11_Fig1_HTML.jpg](img/508289_1_En_11_Fig1_HTML.jpg)


    图 11-1


    变位词项目的结构


    *   `lib` 目录，包含 JUnit 所需的文件。

    *   `src/main/kotlin/lpk/anagrams` 中的三个 Kotlin 文件：这些是前面描述的两个类的存根，以及第三个类 `AnagramFinder`，它将包含
    `main` 函数。

    *   `src/test/kotlin/lpk/anagrams/test` 目录中 `Term` 和 `Dictionary` 的测试存根。

    *   主分支资源目录中的 `english.txt` 文件：该文件包含韦氏 1913 年词典中的所有单词（来自古腾堡计划）。

    *   `FiveWords.txt` 文件，这是一个非常小的字典文件，用于测试。

    *   一个名为 `.idea` 的目录，由 IntelliJ 使用。


    `AnagramFinder` 已经包含了主要算法的框架：


    ```

    /**

    * 查找并打印一个单词的变位词。

    */

    fun main() {

    //从 resources/books 中的 "english.txt" 创建一个字典

    //从我们的初始英文单词创建一个 Term

    //获取该单词中字母的所有排列

    //对于每个排列，

    //...如果它在字典中

    //...则打印它。

    }

    ```


    我们的实现计划是编写 `Dictionary` 和 `Term` 类，使它们能够提供上述代码框架中所需的函数。在开发 `Dictionary` 和 `Term`
    时，我们将遵循在“奥斯汀项目”中使用的“测试优先”方法。

