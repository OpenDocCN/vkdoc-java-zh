  raw: '## 10.6 HistogramTest and Histogram


    At this point, we have a basic implementation of `Line` together with a basic
    unit test class. Rather than continue work on these, let’s turn our attention
    to `Histogram`. From our discussions earlier, we have a pretty good idea of what
    functions this will require. We will need to be able


    *   To record that a word has occurred


    *   To retrieve the `Set` of words that have been recorded


    *   To get the number of times that any word has been given


    We can provide stubs for the corresponding functions and then begin testing.


    PROJECT STEP 10.11


    Change `Histogram` as follows:


    ```

    package lpk.austen

    /**

    * Collects word usage data.

    */

    class Histogram {

    fun record(word: String) {}

    fun allWords(): Set {

    return mutableSetOf()

    }

    fun numberOfTimesGiven(word: String): Int {

    return 0

    }

    }

    ```


    To create a unit test, right-click `lpk.austen.test` in the project tree and select
    the option for a new Kotlin file, as shown in Figure [10-5](#508289_1_En_10_Chapter.xhtml#Fig5).
    When the **New Kotlin File/Class** dialog shows, enter `"HistogramTest"` as the
    name. With a file created ready to contain our tests, let’s think about some test
    cases. When faced with the problem of designing unit tests, a good starting point
    is to consider what happens to “small” test objects. What “small” means will depend
    on the problem at hand. With `HistogramTest`, we can start with an empty `Histogram`
    and then record zero, one, or two words. This approach gives us a few scenarios
    straight away:


    ![../images/508289_1_En_10_Chapter/508289_1_En_10_Fig5_HTML.jpg](images/508289_1_En_10_Chapter/508289_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Creating `HistogramTest`


    | Scenario | Description |

    | --- | --- |

    | Empty | There are no words in a `Histogram` when it is first created. |

    | Unknown word | If we ask for the count of an unrecorded word, we get 0. |

    | One word | If we record just one word, then the `Set` of `allWords` will contain
    just that word, and it will have count 1. |

    | Same word twice | If we record a word twice, then it will have count 2. |

    | Two words | If we record two different words, then they will both occur in `allWords`,
    and they will each have `count` 1. |


    PROJECT STEP 10.12


    Let’s implement the first of these test scenarios. Replace whatever text is in
    `HistogramTest.kt` with this code:


    ```

    package lpk.austen.test

    import org.junit.Assert

    import org.junit.Test

    import lpk.austen.Histogram

    public class HistogramTest {

    @Test

    fun emptyToStartWith() {

    val histogram = Histogram()

    Assert.assertEquals(0, histogram.allWords().size)

    }

    }

    ```


    Why is there an `import` statement for `Histogram`?


    Do you think this test will pass or fail?


    Run it and find out.


    The test for an unknown word is also easy to write. When a `Histogram` is first
    created, any word is unknown to it. So a test could work by creating a `Histogram`
    object and then calling `numberOfTimesGiven` with any `String` as parameter. We
    would expect 0 as the result of this call.


    PROJECT STEP 10.13


    Here is the shell of the test described earlier:


    ```

    @Test

    fun unknownWord() {

    }

    ```


    Add a line to create a `Histogram` called `histogram`.


    Now add a line that creates a `val` called `given` that contains the result of
    calling


    ```

    histogram.numberOfTimesGiven("xylophone")

    ```


    Finally, add a line that asserts that `given` is equal to 0. Your completed test
    should be something like this:


    ```

    @Test

    fun unknownWord() {

    val histogram = Histogram()

    val given = histogram.numberOfTimesGiven("xylophone")

    Assert.assertEquals(0, given)

    }

    ```


    Do you expect this to pass or fail?


    Run it and see.


    PROJECT STEP 10.14


    Now let’s write a test that checks the state of a `Histogram` after one word has
    been recorded. Here’s some code that creates a `Histogram`, records the single
    word `"piano"`, and then extracts the result of `allWords` as a `val` called `words`:


    ```

    @Test

    fun recordOneWord() {

    val histogram = Histogram()

    histogram.record("piano")

    val words = histogram.allWords()

    }

    ```


    Copy this code into `HistogramTest`.'
