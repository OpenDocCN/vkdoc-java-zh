    (Color) -> (Color)\n```\n\nand then passing this in as the argument to the `transform`\
    \ function of `Picture`. The thresholding function should map pixels to whichever\
    \ of red, white, or black they are closest.\n\nSo, for a `Color` that is vaguely\
    \ white, it should return `Color.WHITE`; for a `Color` that is close to `Color.RED`,\
    \ it should return that; and otherwise it should return `Color.BLACK`. To this\
    \ end, change `DigitFinder` to be:\n\n```\nclass DigitFinder(val input : Picture)\
    \ {\n    val blackWhitRedThresholder: ((Color) -> (Color)) = {\n        if (it.red\
