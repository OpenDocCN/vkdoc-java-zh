- fmt: '# 15.3 Conditional Transformations


    The `transform` function can be used to create various artistic effects. For example,
    let’s turn an image into pure black and white, choosing either shade based on
    the brightness of the input pixels. Start by modifying the `PhotoDisplayer` class
    to show the picture `agent99.png` in the resources directory:


    ```

    override fun createPicture(): Picture {

    val file = Paths.get(IMAGES + "agent99.png").toFile()

    return loadPictureFromFile(file)

    }

    ```


    If you run the `main` function of `PhotoDisplayer`, you should see a photo of
    a cat.


    Let’s transform the cat image by changing each pixel to either black or white.
    All of the “bright” pixels will be made white, and all of the “dark” ones black.
    What do we mean by “bright” and “dark”? If we add the red, green, and blue components
    of a `Color`, and divide by three, we get the equivalent grayscale pixel, as we
    saw in Challenge 15.1. Let’s just say that if this average is greater than 128,
    the pixel is bright and should be whitened, else it should be made black. In code:


    ```

    val makeBW = { it: Color ->

    val brightness = (it.red + it.green + it.blue) / 3

    if (brightness > 128) {

    Color(255, 255, 255)

    } else {

    Color(0, 0, 0)

    }

    }

    ```


    This code snippet defines a `val` called `makeBW` that has type `(Color) -> (Color)`,
    that is, it is a function that returns a `Color` from an input `Color`. Such a
    function can be passed into the `transform` function of `Picture` before the cat
    photo is displayed:


    ```

    override fun createPicture(): Picture {

    val file = Paths.get(IMAGES + "agent99.png").toFile()

    val makeBW = { it: Color ->

    val brightness = (it.red + it.green + it.blue) / 3

    if (brightness > 128) {

    Color(255, 255, 255)

    } else {

    Color(0, 0, 0)

    }

    }

    return loadPictureFromFile(file).transform(makeBW)

    }

    ```


    If you run this version of `PhotoDisplayer`, you should see an “inkblot” version
    of the cat photo, as in Figure [15-2](#508289_1_En_15_Chapter.xhtml#Fig2). The
    process of reducing the number of colors in an image by classifying the pixels
    according to levels of intensity and using a single color for each level is called
    *thresholding*.


    ![../images/508289_1_En_15_Chapter/508289_1_En_15_Fig2_HTML.jpg](images/508289_1_En_15_Chapter/508289_1_En_15_Fig2_HTML.jpg)


    Figure 15-2


    The “inkblot” transformation


    ## PROGRAMMING CHALLENGE 15.6


    The images directory contains a file, `waratah.jpg`, that is a photo of a waratah
    bloom. Change the code in `createPicture` to load this file. Then change the transform
    function so that for a `Color`, `it`, the returned value is


    *   `it` itself if `it.red` is greater than `180`.

    *   The grayscale version of `it` otherwise.


    For the grayscale version of a pixel, you can use


    ```

    val average = (it.red + it.green + it.blue) / 3

    Color(average, average, average)

    ```


    The original and modified images are shown in Figure [15-3a](#508289_1_En_15_Chapter.xhtml#Fig3)
    and [15-3b](#508289_1_En_15_Chapter.xhtml#Fig3).


    ![../images/508289_1_En_15_Chapter/508289_1_En_15_Fig3_HTML.jpg](images/508289_1_En_15_Chapter/508289_1_En_15_Fig3_HTML.jpg)


    Figure 15-3


    Selective graying of the pixels in an image


    ## PROGRAMMING CHALLENGE 15.7


    The file `skatingminister.png` in the images directory is a copy of *The Reverend
    Robert Walker Skating on Duddingston Loch* by Henry Raeburn, shown in Figure [15-4a](#508289_1_En_15_Chapter.xhtml#Fig4).
    Let’s see if we can change his dark clothes to something a bit more exciting,
    as in Figure [15-4b](#508289_1_En_15_Chapter.xhtml#Fig4).


    ![../images/508289_1_En_15_Chapter/508289_1_En_15_Fig4_HTML.jpg](images/508289_1_En_15_Chapter/508289_1_En_15_Fig4_HTML.jpg)


    Figure 15-4


    Recoloring of the dark pixels


    There are two steps in the transformation process: identifying the pixels in his
    clothing and then changing these to a purple hue. The pixels in the minister’s
    clothes (including hat, skates, and stockings) are all much darker than any other
    pixels in the image. By experimentation, I have found that all of these pixels,
    and no others, have the following property:


    ```

    it.red + it.green + it.blue < 140

    ```


    To change one of these pixels to be purple, we can do something like this:


    ```

    val halfGreen = it.green / 2

    Color(it.red + halfGreen, 0, it.blue + halfGreen)

    ```


    This formula produces a color that contains only red and blue, so it is a shade
    of purple. The complicated bit is the extraction of the green component and adding
    half of it to each of the red and blue components in the output. The reason that
    we do this is to maintain the total brightness of the transformed pixels. Putting
    this all together, we get the following transformation function:


    ```

    val makeBlackPurple = { it: Color ->

    if (it.red + it.green + it.blue < 140) {

    val halfGreen = it.green / 2

    Color(it.red + halfGreen, 0, it.blue + halfGreen)

    } else {

    it

    }

    }

    ```


    Can you change `Picture.createPicture` to load the `skatingminister.png` file
    and then to apply the transformation to the loaded image?


    Our next transformation is a good review in computer arithmetic. Recall that for
    an integer `x`, `x / y` is the number of times that `y` goes fully into `x`. For
    example, `235 / 32` is `7`. If we multiply this by `32`, we get `224`, which is
    close to, but not exactly the same as, the original value of `235`. In summary:


    *   `(235/32) * 32 = 224`


    In fact:


    *   `(224/32) * 32 = 224`

    *   `(225/32) * 32 = 224`

    *   `(226/32) * 32 = 224`


    and so on, up to the next multiple of `32`. We can use this to transform colors
    as follows:


    ```

    override fun createPicture(): Picture {

    val file = Paths.get(IMAGES + "ladyagnew.png").toFile()

    val approximater = { it: Color ->

    Color((it.red / 32) * 32,

    (it.green / 32) * 32,

    (it.blue / 32) * 32

    )

    }

    return loadPictureFromFile(file).transform(approximater)

    }

    ```


    ## PROGRAMMING CHALLENGE 15.8


    Calculate the result of applying the `approximater` to these colors:


    *   `Color(224, 67, 160)`

    *   `Color(239, 89, 172)`

    *   `Color(255, 97, 204)`


    What is the effect of applying this transformation to every pixel in an image?


    ## PROGRAMMING CHALLENGE 15.9


    The file `ladyagnew.png` in the images directory is the portrait *Lady Agnew of
    Lochnaw* by John Singer Sargent, shown in Figure [15-5a](#508289_1_En_15_Chapter.xhtml#Fig5).
    Change `PhotoDisplayer.createPicture` to load this file and then to apply the
    transformation. The result should be as in Figure [15-5b](#508289_1_En_15_Chapter.xhtml#Fig5).


    ![../images/508289_1_En_15_Chapter/508289_1_En_15_Fig5_HTML.png](images/508289_1_En_15_Chapter/508289_1_En_15_Fig5_HTML.png)


    Figure 15-5


    The effects of color reduction


    There are 8 multiples of 32 between 0 and 255: 0, 32, 64, 96, 128, 160, 192, and
    224, and the colors produced by this transformation can have any of them for their
    red, green, and blue components. This gives a total of


    *   8 × 8 × 8 = 512


    colors that could be produced by applying the mapping to an image. With fewer
    colors, an image can be stored in a smaller file than the original, which can
    have any of


    *   256 × 256 × 256 = 16,777,216


    different colors.'
  raw: '## 15.3 Conditional Transformations


    The `transform` function can be used to create various artistic effects. For example,
    let’s turn an image into pure black and white, choosing either shade based on
    the brightness of the input pixels. Start by modifying the `PhotoDisplayer` class
    to show the picture `agent99.png` in the resources directory:


    ```

    override fun createPicture(): Picture {

    val file = Paths.get(IMAGES + "agent99.png").toFile()

    return loadPictureFromFile(file)

    }

    ```


    If you run the `main` function of `PhotoDisplayer`, you should see a photo of
    a cat.


    Let’s transform the cat image by changing each pixel to either black or white.
    All of the “bright” pixels will be made white, and all of the “dark” ones black.
    What do we mean by “bright” and “dark”? If we add the red, green, and blue components
    of a `Color`, and divide by three, we get the equivalent grayscale pixel, as we
    saw in Challenge 15.1\. Let’s just say that if this average is greater than 128,
    the pixel is bright and should be whitened, else it should be made black. In code:


    ```

    val makeBW = { it: Color ->

    val brightness = (it.red + it.green + it.blue) / 3

    if (brightness > 128) {

    Color(255, 255, 255)

    } else {

    Color(0, 0, 0)

    }

    }

    ```


    This code snippet defines a `val` called `makeBW` that has type `(Color) -> (Color)`,
    that is, it is a function that returns a `Color` from an input `Color`. Such a
    function can be passed into the `transform` function of `Picture` before the cat
    photo is displayed:


    ```

    override fun createPicture(): Picture {

    val file = Paths.get(IMAGES + "agent99.png").toFile()

    val makeBW = { it: Color ->

    val brightness = (it.red + it.green + it.blue) / 3

    if (brightness > 128) {

    Color(255, 255, 255)

    } else {

    Color(0, 0, 0)

    }

    }

    return loadPictureFromFile(file).transform(makeBW)

    }

    ```


    If you run this version of `PhotoDisplayer`, you should see an “inkblot” version
    of the cat photo, as in Figure [15-2](#508289_1_En_15_Chapter.xhtml#Fig2). The
    process of reducing the number of colors in an image by classifying the pixels
    according to levels of intensity and using a single color for each level is called
    *thresholding* .


