    version of `reverse` (but make sure that you have deleted the printout) or change
    it back to one of the other implementations. The fact that we can have different
    implementations of a function is one of the key features of object-oriented programming.
    The implementation details are hidden within the method itself, so we are free
    to change our approach without any unexpected effects in classes that use the
    function.'
