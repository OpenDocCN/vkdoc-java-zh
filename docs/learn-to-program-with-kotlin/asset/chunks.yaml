    \ = mutableListOf()\ninit {\n}\nfun speed(): Int {\nreturnconvert(digits)\n}\n\
    }\n```\n\n### 21.5.2 项目步骤 21.3 的详细信息\n\n以下是实现代码：\n\n```\nfun convertDigits(digits:\
    \ List): Int {\nvar total = 0\nvar multiplier = 1\nval n = digits.size\nfor(i\
    \ in 0..n - 1) {\nval digit = digits[n - i - 1]\ntotal = total + digit * multiplier\n\
    multiplier = multiplier * 10\n}\nreturn total\n}\n```\n"
