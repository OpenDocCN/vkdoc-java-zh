    should be able to navigate to the file `FirstProgram.kt`. Double-click this to
    open it in the main editor pane. To run the program, click the little green triangle
    at line 7 of the program text. A pop-up will show, with the option `Run ‘FirstProgramKt’`.
    Select this option.


