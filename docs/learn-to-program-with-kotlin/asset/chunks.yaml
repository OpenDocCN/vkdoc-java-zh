    \ = 0\n            } else {\n                shades[row][column] = 255\n     \
    \       }\n        }\n    }\n    return shades\n}\n```\n\n# 5. Integers\n\nWhole\
    \ numbers, such as 1, 2, 0, –1, –194, and so on, are known as *integers*. We have\
    \ already used these as the row and column indexes for our tile patterns and also\
    \ to define shades of gray. In this chapter, we will be seeing how to combine\
    \ integers using the familiar arithmetical operators, plus some that you might\
    \ not have seen before.\n\n## 5.1 Addition, Subtraction, and Multiplication\n\n\
    To add two integer values together in Kotlin, we use the `+` operator, and subtraction\
    \ uses `-`. The asterisk, `*`, is used for multiplication.\n\nTo see Kotlin’s\
    \ arithmetical operators in action, let’s write a new program that does some calculations\
    \ and prints out the results. In the project tree, right-click the item `lpk.basics`.\
    \ A menu will pop up. From it, choose `New` ➤ `Kotlin File/Class`. A dialog will\
    \ show that asks for the name and type of the file. Type `Arithmetic` as the name,\
    \ and select `File` for the type, as in Figure 5-2. When you press enter, a file\
    \ will be created. You may also get a dialog that asks you if you’d like to add\
    \ the new file to a Git repository. If so, click the `Cancel` button.\n\n![../images/508289_1_En_5_Chapter/508289_1_En_5_Fig1_HTML.jpg](images/508289_1_En_5_Chapter/508289_1_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1: The right-click menu\n\nThe new file will contain a package declaration\
    \ and a comment about when the file was created. Delete all of this text and replace\
    \ it by this code:\n\n![../images/508289_1_En_5_Chapter/508289_1_En_5_Fig2_HTML.jpg](images/508289_1_En_5_Chapter/508289_1_En_5_Fig2_HTML.jpg)\n\
    \nFigure 5-2: Creating a new Kotlin file\n\n```\npackage lpk.basics\nfun main()\
    \ {\n    val x = 7 + 5\n    println(x)\n}\n```\n\nWhen you have done this, you\
    \ should get a green triangle just to the left of the `main` function. Right-click\
    \ this and then choose the `Run`… option, just like running programs in previous\
    \ chapters. A panel should show at the bottom of the IntelliJ screen, with some\
    \ printout, including the number `12`.\n\n![../images/508289_1_En_5_Chapter/508289_1_En_5_Fig3_HTML.jpg](images/508289_1_En_5_Chapter/508289_1_En_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3: The printout after running the program\n\nThe program works as follows.\
    \ On line 1, we declare it to be in the `lpk.basics` package, as we did with earlier\
    \ programs. The `main` function, which is the starting point, is declared on line\
    \ 3. Line 4 is where the arithmetic happens. We define a value called `x` using\
    \ the keyword `val`. The equals sign sets `x` to be equal to `5 + 7`, which of\
    \ course is `12`. On line 5, we call the library function `println` to print out\
    \ `x`.\n\n### PROGRAMMING CHALLENGE 5.1\n\nModify the program so that it prints\
    \ out `7` minus `5`.\n\n### PROGRAMMING CHALLENGE 5.2\n\nThere is no × symbol\
    \ on the keyboard, so for multiplication, programmers use an asterisk. Modify\
    \ the program so that it prints out `7 * 5`.\n\n### PROGRAMMING CHALLENGE 5.3\n\
    \nLet’s rewrite the program so that it prints out the seven times table. To do\
    \ this, we will need a loop that has values from `1` through to `10`. The body\
    \ of this loop will print out `7` times the loop value. Here is the program with\
    \ the loop outlined:\n\n```\npackage lpk.basics\nfun main() {\n    for (i in 1..10)\
    \ {\n        //Loop body goes here\n    }\n}\n```\n\nReplace the `//Loop body\
    \ goes here` comment with code that:\n\n1.  Declares a variable `x` with value\
    \ `7` times `i`\n2.  Prints `x`\n\nThe last challenge prints out a list of multiples\
    \ of seven. We can do something a bit fancier. Change the program to the following:\n\
    \n```\npackage lpk.basics\nfun main() {\n    for (i in 1..10) {\n        val x\
    \ = 7 * i\n        println(\"7 times $i is $x\")\n    }\n}\n```\n\nWhen you run\
    \ the program, you should see the output shown in Figure 5-4.\n\n![../images/508289_1_En_5_Chapter/508289_1_En_5_Fig4_HTML.jpg](images/508289_1_En_5_Chapter/508289_1_En_5_Fig4_HTML.jpg)\n\
    \nFigure 5-4: Printing out a times table\n\nOn line 6, we are printing out what\
    \ is called a `String` rather than just a number. We will work more with `String`s\
    \ in later chapters. For now, it is enough to think of a `String` just as a mixture\
    \ of letters, digits, and other characters. Kotlin has a great feature that allows\
    \ us to insert variable values into a `String`. This is done using the dollar\
    \ signs on line 6: `$i` means “the current value of `i`” and similarly for `$x`.\
    \ This is called *string interpolation*."
