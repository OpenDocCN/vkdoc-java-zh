    ```


    事实上，这是可行的，但 Kotlin 使用两个竖线字符而不是单词 `OR`：


    ```

    if (column == 0 || column == 2) ....

    ```


    以下是生成该图案的 `getTileColors` 版本：


    ```

    fun tileColors(): Array> {

    val shades = Array(8) {

    Array(8) { 0 }

    }

    for (row in 0..7) {

    for (column in 0..7) {

    if (column == 0 || column == 2) {

    shades[row][column] = 0

    } else {

    shades[row][column] = 255

    }

    }

    }

    return shades

    }

    ```


