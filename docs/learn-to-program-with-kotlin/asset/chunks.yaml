    version of `flipInVerticalAxis`. Check that the unit test now passes.


    To actually flip a photograph, we return to the `PhotoDisplayer` class and add
    a call to flip the `Picture` it reads from a file:


    ```

    override fun createPicture() : Picture {

    val file = Paths.get(IMAGES + "bay.png").toFile()

    return loadPictureFromFile(file).flipInVerticalAxis()

    }

    ```


    When you run the `main` function of `PhotoDisplayer`, the image should appear
    flipped about the vertical axis as in Figure [14-12](#508289_1_En_14_Chapter.xhtml#Fig12).


    ![../images/508289_1_En_14_Chapter/508289_1_En_14_Fig12_HTML.jpg](images/508289_1_En_14_Chapter/508289_1_En_14_Fig12_HTML.jpg)


    Figure 14-12


    The image flipped about its vertical axis


    Of course, we now want to flip images horizontally about their midline. Copy the
    function `flipInVerticalAxis` and rename the copied function to `flipInHorizontalAxis`.


    PROGRAMMING CHALLENGE 14.11


    The test resources directory of the project contains files `red_green.png` and
    `green_red.png` that represent flipped versions of each other. Write a unit test
    of `flipInHorizontalAxis` that makes use of these files.


    PROGRAMMING CHALLENGE 14.12


    Now implement the function properly, and check that your test passes.


    PROGRAMMING CHALLENGE 14.13


    Modify `PhotoDisplayer` to show the bay photo upside down. Then show the image
    flipped both horizontally and vertically.'
