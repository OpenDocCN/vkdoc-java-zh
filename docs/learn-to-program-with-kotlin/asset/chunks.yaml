    # 3. Arrays and Loops


    In the previous chapter, we worked on a program that built patterns of black and
    white tiles that corresponded to the elements of a square array. In this chapter,
    we will introduce a powerful syntax that allows us to build larger patterns from
    shorter programs.


    ## 3.1 Array Indexes


    Recall from Chapter [2](#508289_1_En_2_Chapter.xhtml) that an array is a list
    of values. An array of arrays is effectively a grid, and our programs so far have
    used these to represent rectangular patterns of black and white tiles. In these
    programs, we have used the library function `arrayOf` to create arrays. However,
    we can also create arrays from scratch, for example:


    ```

    1   fun tileColors(): Array> {

    2       val shades = Array(2) {

    3           Array(2) { 0 }

    4       }

    5       shades[0][0] = 192

    6       shades[0][1] = 128

    7       shades[1][0] = 64

    8       shades[1][1] = 0

    9       return shades

    10   }

    ```


    This version of `tileColors` works as follows. On lines 2 to 4, we are setting
    up an array of arrays with two rows and two columns in each row and with each
    value `0`. Don’t worry too much about the details of this yet; we will return
    to it later on. It is the next four lines that are of interest for now. In these
    lines, we refer to the values in the array using their row and column indexes,
    just like looking at the grid of a map. The values are then set using the equals
    sign, which has the meaning “is set to,” for example:


    ```

    shades[1][0] = 64

    ```


    means “the array value that is in row 1 and column 0 is set to 64.”


    In this grid system, we work from the top down, and the first row has index `0`.
    Within each row, we work from left to right, and the first column has index `0`.
    Figure [3-1](#508289_1_En_3_Chapter.xhtml#Fig1) shows the correspondence between
    array indexes and the squares in the tile array.


    ![../images/508289_1_En_3_Chapter/508289_1_En_3_Fig1_HTML.png](images/508289_1_En_3_Chapter/508289_1_En_3_Fig1_HTML.png)


    Figure 3-1


    The row and column indexes of an array


    Referring to the preceding code listing, the top-left square, which has grid references
    `[0][0]`, is given the value `192`. The top-right square, which has grid references
    `[0][1]`, is assigned value `128`. The bottom-left corner has references `[1][0]`
    and is assigned value `64`. Finally, the bottom-right corner has references `[1][1]`
    and is assigned value `0`. Remember that a high value is a light shade of gray,
    so the top-left corner is light gray, whereas the bottom-right corner is black.
    In fact, if we run the code, we get the pattern shown in Figure [3-2](#508289_1_En_3_Chapter.xhtml#Fig2).


    ![../images/508289_1_En_3_Chapter/508289_1_En_3_Fig2_HTML.jpg](images/508289_1_En_3_Chapter/508289_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    The pattern produced by our first code listing


