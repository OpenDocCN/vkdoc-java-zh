    for (col in 0..4) {

    shades[2][col] = 0

    }

    //Row 3 is white.

    for (col in 0..4) {

    shades[3][col] = 255

    }

    //Row 4 is black.

    for (col in 0..4) {

    shades[4][col] = 0

    }

    return shades

    }

    ```


