    # 第三部分 图像


    图像


    在第三部分中，我们将通过编写操作图像的软件来学习函数式编程的基础知识。


    # 14. 彩色图片


    在本章中，我们将回到显示图像的程序。我们将首先展示简单的颜色模式，例如国旗。然后，我们将学习如何加载图像文件，例如照片。最后，我们将编写执行简单图像处理的代码，例如沿垂直轴翻转图像。


    ## 14.1 颜色建模


    计算机屏幕通过产生大量称为*像素*的微小彩色点来显示图像。（“像素”一词是“图像单元”的缩写。）在许多现代屏幕上，这些点小到肉眼无法看见，但在大型电视屏幕上通常可见。


    如果你有机会观察一个像素相对较大的屏幕，你可能会看到每个像素本身由微小的红色、绿色和蓝色子像素组成。（如果手机屏幕上有雨滴充当放大镜，你可以在某些手机屏幕上看到这些子像素。）由于这些屏幕会发光，它们可以通过组合不同强度的红色、绿色和蓝色值来产生任何颜色。在下一页的图
    14-1 中，图 14-1a 是低强度的纯红色，而图 14-1b 是等量绿色和蓝色的混合，两者均为高强度。


    ![../images/508289_1_En_14_Chapter/508289_1_En_14_Fig1_HTML.png](img/508289_1_En_14_Fig1_HTML.png)


    图 14-1


    组合红色、绿色和蓝色以创建不同的颜色


    编程挑战 14.1


    对于以下每个方块，请粗略指示（低、中或高）所使用的红色、绿色和蓝色的强度。


    ![../images/508289_1_En_14_Chapter/508289_1_En_14_Figa_HTML.png](img/508289_1_En_14_Figa_HTML.png)


    为了对现实世界的颜色进行建模，我们将使用一个名为 `java.awt.Color` 的类。在这个模型中，一种颜色由三个介于 `0` 和 `255` 之间的
    `Int` 值表示，分别对应红色、绿色和蓝色分量。在图 14-1a 所示的锈红色图像中，红色值为 `127`，绿色和蓝色值均为 `0`。蓝绿色图像的红色值为
    `0`，绿色和蓝色值均为 `255`。我们可以通过传入相应的红色、绿色和蓝色分量来构造 `Color` 对象。例如，锈红色是 `Color(127, 0,
    0)`，蓝绿色是 `Color(0, 255, 255)`。如果红色、绿色和蓝色值相同，我们会得到一种灰色调。在一个极端情况下，所有值都为 `0`，这就是黑色。白色是
    `Color(255, 255, 255)`。


    顺便提一下，标准 Java 库中有两个 `"Color"` 类：`java.awt.Color` 和 `javafx.scene.paint.Color`。包名确实很重要，如果你的程序无法编译，有可能是因为
    `import` 语句引入了错误的 `Color` 类。

