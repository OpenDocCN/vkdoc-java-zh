- fmt: '## 10.8 Back to `LineTest` and `Line`


    Our implementation of `Line` is deficient because it does not handle full stops.
    In fact, it does not handle commas, semicolons, colons, quotation marks, or any
    other punctuation `Char`s. If we look at the first 30 or so lines of `PrideAndPrejudice.txt`,
    we see that the underscore character has also been used. So let’s add checks for
    these in `LineTest`.


    **PROJECT STEP 10.25**


    Copy the following test functions into `LineTest`:


    ```

    @Test

    fun ignorePunctuation() {

    val line = Line("Hello. Goodbye! Yes? No, no.")

    val words = line.words()

    Assert.assertEquals(5, words.size)

    Assert.assertEquals("hello", words[0])

    Assert.assertEquals("goodbye", words[1])

    Assert.assertEquals("yes", words[2])

    Assert.assertEquals("no", words[3])

    Assert.assertEquals("no", words[4])

    }

    @Test fun morePunctuation() {

    val line = Line("Hello; _Goodbye_! X: 5")

    val words = line.words()

    Assert.assertEquals(4, words.size)

    Assert.assertEquals("hello", words[0])

    Assert.assertEquals("goodbye", words[1])

    Assert.assertEquals("x", words[2])

    Assert.assertEquals("5", words[3])

    }

    ```


    Run them and confirm that they fail.


    Something that we haven’t yet written a test for is the double quote character.
    We use double quotes to *delimit* (define the start and end of) `String`s, so
    we can’t just put one in a `String` and expect it will work. What we need to do
    is precede a double quote that we want literally in a `String` with a backslash
    `Char`. This is called an *escape* character.


    **PROJECT STEP 10.26**


    Add this test for double quotes to `LineTest`:


    ```

    @Test

    fun doubleQuotes() {

    val line = Line("\"It''s not.\"")

    val words = line.words()

    Assert.assertEquals(2, words.size)

    Assert.assertEquals("it''s", words[0])

    Assert.assertEquals("not", words[1])

    }

    ```


    It will fail.


    Here is the `init` block from `Line`:


    ```

    1   init {

    2       var currentWord = ""

    3       for (c in line) {

    4           if (c == '' '') {

    5               addWord(currentWord)

    6               currentWord = ""

    7           } else {

    8               currentWord = currentWord + c

    9           }

    10       }

    11       addWord(currentWord)

    12   }

    ```


    Line 4 is an `if` statement that, when `true`, branches into the code that breaks
    the word currently being built. This `if` statement is only taking the space `Char`
    into account. We could fix this by using the `||` operator:


    ```

    if (c == '' '' || c == '','' || c == ''.'' || ...) {

    ```


    However, this will become a very complex line of code because there are so many
    possible punctuation characters that can terminate a word. Instead, we will create
    a function that takes a `Char` as input and returns either `true` or `false`,
    depending on whether or not the `Char` should break a word. The data type that
    has values `true` and `false` is called `Boolean` , and this will be the return
    type for our new function. Instead of comparing `c` to the space `Char` on line
    4, we will make a call to the new function, which is called `isWordTerminator`.


    **PROJECT STEP 10.27**


    Replace the existing code for `Line` with this new version:


    ```

    package lpk.austen

    /**

    * Represents a line of text read in from a book.

    */

    class Line(line: String) {

    val words = mutableListOf()

    init {

    var currentWord = ""

    for (c in line) {

    if (isWordTerminator(c)) {

    addWord(currentWord)

    currentWord = ""

    } else {

    currentWord = currentWord + c

    }

    }

    addWord(currentWord)

    }

    fun words(): List {

    return words

    }

    fun addWord(str: String) {

    if (str != "") {

    words.add(str.toLowerCase())

    }

    }

    fun isWordTerminator(c: Char): Boolean {

    if (c == '' '') return true

    if (c == ''.'') return true

    if (c == '','') return true

    if (c == ''!'') return true

    if (c == ''?'') return true

    if (c == ''\"'') return true

    if (c == ''_'') return true

    if (c == '';'') return true

    if (c == '':'') return true

    return false

    }

    }

    ```


    Check that all of the unit tests for `Line` now pass.


    ## 10.9 Testing with Real Data


    With these corrections to `Line`, all of the unit tests for `Book` should now
    pass. To be sure that our code is correct, we ought to write a test that uses
    actual text from a book by Austen.


    In IntelliJ, find the file `PrideAndPrejudice.txt` and open it. Copy the first
    32 lines of text. Right-click the `books` directory in `resources` of the `test`
    directory (make sure it’s the `test` directory) as shown in Figure [10-6](#508289_1_En_10_Chapter.xhtml#Fig6),
    and choose the **New** ➤ **File** option. A dialog will show, asking for the file
    name. Enter `Page1.txt` into this and press the `Enter` key. Open the new file
    (it may even open automatically) and paste in the text copied from `PrideAndPrejudice.txt`.


    ![../images/508289_1_En_10_Chapter/508289_1_En_10_Fig6_HTML.jpg](images/508289_1_En_10_Chapter/508289_1_En_10_Fig6_HTML.jpg)


    Figure 10-6


    Adding a new test data file


    **PROJECT STEP 10.28**


    Add the following to `BookTest`:


    ```

    @Test

    fun prideAndPrejudice() {

    val book = Book(Paths.get(

    "src/test/resources/books/Page1.txt"))

    //32 lines from the start of Pride and Prejudice

    val histogram = book.histogram

    //Check some words that we have

    //counted using a text editor.

    Assert.assertEquals(1, histogram.numberOfTimesGiven("pride"))

    Assert.assertEquals(5, histogram.numberOfTimesGiven("it"))

    Assert.assertEquals(3, histogram.numberOfTimesGiven("and"))

    Assert.assertEquals(3, histogram.numberOfTimesGiven("bennet"))

    //Check that some words followed by

    //punctuation are counted correctly.

    Assert.assertEquals(3, histogram.numberOfTimesGiven("you"))

    Assert.assertEquals(2, histogram.numberOfTimesGiven("she"))

    }

    ```


    Check that the test passes.


    The test that we’ve just added, based on real data, should give us a lot of confidence
    in our code.'
