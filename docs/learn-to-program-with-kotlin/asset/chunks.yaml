    ## 1.9 我们程序的源代码


    作为本章的收尾，让我们快速浏览一下程序的代码，以便更熟悉 Kotlin 代码的样貌。这里的目标仅仅是理解程序的大致轮廓，细节将在后续章节中展开。


    ```

    1   package lpk.basics


    3   import javax.swing.ImageIcon

    4   import javax.swing.JFrame

    5   import javax.swing.SwingUtilities


    7   fun main() {

    8       SwingUtilities.invokeLater { FirstProgram().doLaunch() }

    9   }

    10   class FirstProgram {


    12       fun tileColors() : Array> {

    13           return arrayOf(

    14                   arrayOf(0, 255),

    15                   arrayOf(255, 0)

    16           )

    17       }


    19       fun doLaunch() {

    20           val frame = JFrame("Basics")

    21           frame.defaultCloseOperation = JFrame.EXIT_ON_CLOSE

    22           frame.iconImage = ImageIcon("./src/lpk/basics/icon.png").image

    23           frame.add(TilePanel(tileColors()))

    24           frame.pack()

    25           frame.isVisible = true

    26       }

    27   }

    ```


    请注意，某些 `import` 语句（第 3 至 5 行）可能不会直接显示。相反，它们可能显示为一个可折叠的代码块，点击 + 号即可展开。


    ![../images/508289_1_En_1_Chapter/508289_1_En_1_Fig9_HTML.jpg](img/508289_1_En_1_Fig9_HTML.jpg)


    图 1-9


    `import` 语句可能隐藏在一个可折叠的代码块中


    即使是这个简短的程序，也包含了许多对于初次接触编程的人来说完全无法理解的细节。别担心！你不需要立刻理解所有内容。程序的主要部分可以通过以下几点来理解：


    1.  第一行告诉系统我们的程序属于哪个 `package`。程序的完整名称包含其包名，就像街道名称加上其他详细信息构成唯一的邮政地址一样。


    2.  `import` 语句让系统知道我们的代码中需要哪些其他程序。所有执行稍微复杂操作（例如显示用户界面）的软件，都会使用预构建的组件。`import`
    语句用于将这些组件提供给我们的代码使用。


    3.  包含 `tileColors()` 的代码块设置了一个颜色值网格。我们将在接下来的几章中详细研究它。


    4.  第 19 至 26 行告诉系统如何将颜色块转换为可以在屏幕上绘制的用户界面元素。


    5.  第 7 行名为 `main` 的函数是系统启动程序的入口点。


    在下一章中，我们将开始修改这段代码以生成新的图案。


    # 2. 简单图案


    在本章中，我们将了解如何在 Kotlin 中表示黑色、白色以及其他灰度。这将使我们能够修改上一章的程序，以显示不同的方块图案。在进行这些修改的过程中，我们将熟悉
    Kotlin 的基本语法和编程环境。


    ## 2.1 灰度


    软件工程是关于使用简单的数学结构（如数字）来对现实世界的各个方面（如颜色、形状、声音等）进行建模。目前，我们处理的是灰度，在计算机程序中表示灰度有很多种方法，例如：


    1.  为特定的灰度命名，例如 `black`、`white`、`light gray`、`dark gray` 等。


    2.  用 `0` 表示黑色，`1` 表示白色，介于两者之间的数值表示中间灰度。


    3.  用 `0` 表示黑色，`255` 表示白色，介于两者之间的每个整数表示一种中间灰度。


    如果程序中只使用少数几种灰度，第一种方法是不错的。实际上，编写网页时也采用了类似的方法。第二种方法在许多应用中使用，但可能会令人困惑，因为 `0` 和 `1`
    之间有无限多个数字，而计算机屏幕上只能显示有限的一组灰度，因此不同的小数最终可能会产生相同的灰度。第三种方法允许 256 种不同的灰度，这大概与大多数人能分辨的灰度数量相当，每个数字代表一种不同的灰度，并且有一种相当简单的方法来估算某个数值对应的灰度。这就是我们在程序中使用的模型。


    我们程序中设置要显示的方块颜色的部分如下：


    ```

    1   fun tileColors() : Array> {

    2       return arrayOf(

    3               arrayOf(0, 255),

    4               arrayOf(255, 0)

    5       )

    6   }

    ```


    这段代码是所谓*函数*的一个例子，函数是完成一项任务的代码块，可以从程序中的一个或多个位置调用。让我们详细看看这个函数。


    1.  关键字 `fun` 标识这是一个函数。


    2.  `tileColors` 是函数的名称。当我们想使用它时，就通过这个名称来调用它。


    3.  空括号 `()` 标志着函数名称的结束，并意味着该函数没有输入。函数的输入通常被称为*参数*（在讨论函数定义时）或*实参*（在讨论实际调用函数时）。


    4.  复杂的部分 `Array<Array<Int>>` 描述了函数的输出。这个特定的函数产生了一个所谓的 `Array`。数组就是一个事物的列表。我们的函数产生了一个数组，其中的对象本身也是数组，而这些内部数组保存的是表示颜色的整数。因此，该函数返回一个由
    `Int` 类型的 `Array` 组成的 `Array`。尖括号是这些数组中可以包含什么内容的精确规范的一部分。我们将在后面的章节中详细讨论它们。


    5.  左花括号 `{` 是函数体的开始，函数体是实现函数逻辑的一组指令。


    6.  单词 `return` 定义了函数的输出或结果是什么。


    7.  第 2 行的单词 `arrayOf` 是对另一个名为 `arrayOf` 的函数的调用，该函数根据传入的内容生成一个数组。


    8.  第 2 行末尾的左括号 `(` 是我们传递给 `arrayOf` 函数的参数列表的开始。这个左括号与第 5 行的右括号匹配。


    9.  在第 3 行和第 4 行，我们正在设置第 2 行对 `arrayOf` 函数调用的参数。我们传入了两个参数，一个来自第 3 行，一个来自第 4 行。第
    3 行末尾的逗号将它们分隔开。


    10. 第 3 行创建了一个包含两个 `Int` 的 `Array`。这是通过调用 `arrayOf` 函数完成的。此调用中的参数是 `0` 和 `255`。


    11. 第 4 行创建了一个数组，其第一个位置是 `255`，第二个位置是 `0`。


    12. 第 6 行的右花括号 `}` 结束了这个函数。


    这里有很多细节。不要让它们压垮你！通过编写代码（并犯错误），你会逐渐熟悉这种语法。现在，让我们对这个程序做一些修改。

