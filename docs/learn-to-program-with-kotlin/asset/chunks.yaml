- fmt: '你期望`words`包含多少个元素？


    添加一行代码来检查（断言）这一点。


    `Assert.assertTrue`函数可用于检查某个语句是否为`true`。添加以下代码行，检查`words`是否包含`"piano"`：


    ```

    Assert.assertTrue(words.contains("piano"))

    ```


    这两行代码共同精确地检查了`words`中的内容：我们检查了只有一个元素，并且检查了该元素是什么。


    最后，添加一行代码，检查对`"piano"`应用`numberOfTimesGiven`的结果是否为1。


    完整的测试应如下所示：


    ```

    @Test

    fun recordOneWord() {

    val histogram = Histogram()

    histogram.record("piano")

    val words = histogram.allWords()

    Assert.assertEquals(1, words.size)

    Assert.assertTrue(words.contains("piano"))

    Assert.assertEquals(1, histogram.numberOfTimesGiven("piano"))

    }

    ```


    **项目步骤 10.15**


    我们接下来要关注的测试场景是同一个单词被记录两次。以下是此场景的设置代码：


    ```

    @Test

    fun recordOneWordTwice() {

    val histogram = Histogram()

    histogram.record("piano")

    histogram.record("piano")

    val words = histogram.allWords()

    }

    ```


    你期望`words`包含什么？请记住这是一个`Set`。添加断言来检查这一点。


    `histogram.numberOfTimesGiven("piano")`的值应该是什么？为此添加一个断言。


    完整的测试应如下所示：


    ```

    @Test

    fun recordOneWordTwice() {

    val histogram = Histogram()

    histogram.record("piano")

    histogram.record("piano")

    val words = histogram.allWords()

    Assert.assertEquals(1, words.size)

    Assert.assertTrue(words.contains("piano"))

    Assert.assertEquals(2, histogram.numberOfTimesGiven("piano"))

    }

    ```


    **项目步骤 10.16**


    让我们测试记录两个不同单词时会发生什么。创建一个名为`recordTwoWords`的测试函数。


    在测试函数中，创建一个名为`histogram`的`Histogram`。添加记录单词`"piano"`和`"violin"`的代码行。创建一个名为`words`的`val`，其值为调用`histogram`的`allWords`返回的结果。


    `words`应该包含多少个元素？为此添加一个断言。


    添加一行检查`words`是否包含`"piano"`的代码。


    添加一行检查`words`是否包含`"violin"`的代码。


    添加代码行检查这些单词每个都被记录了一次。


    完整的测试应如下所示：


    ```

    @Test

    fun recordTwoWords() {

    val histogram = Histogram()

    histogram.record("piano")

    histogram.record("violin")

    val words = histogram.allWords()

    Assert.assertEquals(2, words.size)

    Assert.assertTrue(words.contains("piano"))

    Assert.assertTrue(words.contains("violin"))

    Assert.assertEquals(1, histogram.numberOfTimesGiven("piano"))

    Assert.assertEquals(1, histogram.numberOfTimesGiven("violin"))

    }

    ```


    有了这些测试，我们就可以实现`Histogram`了。实现方式有很多种，我们可以自由选择任何能让测试通过的实现。一种方法是使用`Map<String,Int>`来记录单词计数，就像我们在第[8](#508289_1_En_8_Chapter.xhtml)章中使用`Map`记录鸟类计数一样。`Map`需要能被`Histogram`中的所有函数访问，因此我们将其声明为一个字段，命名为`counter`。


    **项目步骤 10.17**


    将`Histogram`修改为：


    ```

    1   package lpk.austen


    3   /**

    4    * Collects word usage data.

    5    */

    6   class Histogram {


    8       val counter = mutableMapOf()


    10       fun record(word: String) {

    11       }


    13       fun allWords(): Set {

    14           return counter.keys

    15       }


    17       fun numberOfTimesGiven(word: String): Int {

    18           return counter[word] ?: 0

    19       }

    20   }

    ```


    第8行声明了我们的`counter`字段。该字段在第14行的`allWords`实现中使用。`Map<String, Int>`的`keys`是所有`Map`中包含`Int`值的`String`。


    在第18行，我们直接从`Map`中获取某个`String`的计数。你还记得我们为什么使用Elvis运算符吗？如果不记得，请查看第97页的解释。


    关于前面列出的代码，你可能想知道为什么没有构造函数和`init`块。与`Line`不同，创建`Histogram`不需要任何信息，因此无需添加构造函数。至于没有`init`块，唯一需要的字段初始化已在字段声明中完成。


    `Histogram`唯一剩下的部分是实现`record`函数。如前所述，我们已经见过类似的情况。


    **项目步骤 10.18**


    让我们实现`record`。共有三行代码。第一行，我们检索作为参数传入的`word`的当前计数：


    ```

    val currentCount = counter[word] ?: 0

    ```


    接下来，我们定义一个新的`val`，它是旧计数加1：


    ```

    val newCount = currentCount + 1

    ```


    最后，我们将`newCount`以`word`为键放入`counter`中：


    ```

    counter.put(word, newCount)

    ```


    进行这些更改，然后重新运行单元测试。它们现在应该全部通过。


    如果你遇到问题，可以使用以下`Histogram.kt`代码：


    ```

    package lpk.austen

    /**

    * Collects word usage data.

    */

    class Histogram {

    val counter = mutableMapOf()

    fun record(word: String) {

    val currentCount = counter[word] ?: 0

    val newCount = currentCount + 1

    counter.put(word, newCount)

    }

    fun allWords(): Set {

    return counter.keys

    }

    fun numberOfTimesGiven(word: String): Int {

    return counter[word] ?: 0

    }

    }

    ```'
