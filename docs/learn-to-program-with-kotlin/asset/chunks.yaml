    ## 3.2 循环


    假设我们想要生成一个如图 3-3 所示的平铺图案。面对如此多的单元格，在 `getTileColors` 函数中逐个设置每个单元格的颜色会非常繁琐。然而，我们可以利用每一行内所有单元格颜色相同这一事实，来自动化设置行内颜色的过程。为此，我们需要使用一种称为
    `for` 循环的编程结构。


    ![../images/508289_1_En_3_Chapter/508289_1_En_3_Fig3_HTML.jpg](img/508289_1_En_3_Fig3_HTML.jpg)


    图 3-3


    我们将使用 `for` 循环来生成此图案


    生成图案的第一步是初始化一个数组，我们将其命名为 `shades`，包含五行五列：


    ```

    val shades = Array(5) {

    Array(5) { 0 }

    }

    ```


    创建数组后，我们可以使用 `for` 循环设置第一行的颜色：


    ```

    //将第 0 行的每个单元格设置为黑色

    for (col in 0..4) {

    shades[0][col] = 0

    }

    ```


    我们使用的 `for` 循环结构如下：


    ```

    for (COUNTER in RANGE) {

    循环体：可能使用计数器的代码

    }

    ```


    在我们前面的 `for` 循环中，计数器名为 `col`。它代表列索引，因此取值范围为 `0` 到 `4`。在 Kotlin 中，连续数字的列表由所谓的*区间*表示。在
    Kotlin 中定义区间有多种方式。这里我们使用了表达式 `0..4`。（实际上，Kotlin 中的区间也可以是非连续的数字，但我们不需要用到那些。）循环体仅设置对应列的单元格颜色：


    ```

    shades[0][col] = 0

    ```


    请注意，该行中的每个单元格都获得相同的值 `0`。


    为了生成完整的图案，我们对每一行使用类似的循环，但使用逐渐变浅的灰色阴影：


    ```

    fun tileColors(): Array<Array<Int>> {

    val shades = Array(5) {

    Array(5) { 0 }

    }

    //将第 0 行的每个单元格设置为黑色

    for (col in 0..4) {

    shades[0][col] = 0

    }

    //第 1 行为深灰色。

    for (col in 0..4) {

    shades[1][col] = 65

    }

    //第 2 行为灰色。

    for (col in 0..4) {

    shades[2][col] = 130

    }

    //第 3 行为浅灰色。

    for (col in 0..4) {

    shades[3][col] = 195

    }

    //第 4 行为白色。

    for (col in 0..4) {

    shades[4][col] = 255

    }

    return shades

    }

    ```


    将上述代码复制到你的程序中并运行，以验证它是否生成了之前展示的图案。


    编程挑战 3.3


    修改上述代码，使其生成如下黑白条纹图案：


    ![../images/508289_1_En_3_Chapter/508289_1_En_3_Figa_HTML.jpg](img/508289_1_En_3_Figa_HTML.jpg)


    ## 3.3 嵌套循环


    我们已经看到，`for` 循环可以轻松地将一行中的所有单元格设置为相同颜色。假设我们想要将图案中*所有*的瓦片都设置为相同颜色。为此，我们可以编写一系列几乎相同的循环，每行一个。更好的方法是循环遍历行，并在循环体内再嵌套一个循环来设置行内的值。这种在一个循环内部嵌套另一个循环的模式在编程中非常常见，被称为*嵌套循环*。以下是一个将每个单元格设置为白色的嵌套循环：


    ```

    fun tileColors(): Array<Array<Int>> {

    val shades = Array(5) {

    Array(5) { 0 }

    }

    for (row in 0..4) {

    for (col in 0..4) {

    shades[row][col] = 255

    }

    }

    return shades

    }

    ```


    编程挑战 3.4


    运行上述代码。然后修改它，使其生成一个每个瓦片都是灰色（值为 `128`）的图案。


    ## 3.4 总结与挑战题解答


    在本章中，我们了解了数组索引如何像地图参考一样，允许我们设置和读取特定值。我们还学习了 `for` 循环，它提供了一种便捷的语法来批量设置数组值。在下一章中，我们将看到如何构建嵌套循环，以依赖于行和列值的方式设置数组值，从而生成更有趣的图案。


