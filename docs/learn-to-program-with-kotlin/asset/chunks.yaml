    `true`，要么是 `false`。它的初始值是 `false`。值为 `true` 或 `false` 的类型称为布尔型。


    ## 7.4 关于**字符串**迭代的更多内容


    考虑这个简单的程序：


    ```

    package lpk.basics

    fun main() {

    val str = "abc"

    for (c in str) {

    println(c)

    }

    }

    ```


    Kotlin 系统将其视为如下写法：


    ```

    package lpk.basics

    fun main() {

    val str = "abc"

    val c_0 = ''a''

    println(c_0)

    val c_1 = ''b''

    println(c_1)

    val c_2 = ''c''

    println(c_2)

    }

    ```


    这就是为什么我们可以在循环中将 `c` 视为一个 `val`，例如：


    ```

    for (c in str) {

    // 循环体。这里的 c 是一个 val。

    }

    ```


