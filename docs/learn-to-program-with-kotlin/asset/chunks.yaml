- fmt: '# 7. Strings


    A lot of software deals with text in some form or another, and there are a couple
    of data types in Kotlin for this.


    `Char` is used to represent symbols such as letters, digits, and punctuation marks.
    We can define a `Char` by writing it between single quotes, for example, `''a''`.
    The uppercase and lowercase versions of a character are represented by distinct
    `Char`s. Apart from the so-called Latin characters that are on most computer keyboards,
    `Char`s can represent accented letters, symbols from languages all around the
    world, and mathematical notation.


    `String`s are used to represent words, sentences, or even whole books. We define
    `String`s by writing them between double quotes, as we did in some of our previous
    programs. If we want an empty `String`, we simply write two double quotes: `""`.
    We’ll see this a lot in the code in this chapter.


    ## 7.1 Strings as Objects


    As has been mentioned before, programming is a process of modeling the real world
    using lists of instructions that can be performed by a computer. The `String`
    data type is used to model text. If we have some text, we might be interested
    in questions such as how many characters it has, for example, to find out how
    many lines it will take to print it. In Kotlin, and in many other languages, information
    is obtained by “asking” data items about themselves. We “ask” questions of data
    items with a special “dot” notation. Here’s an example:


    ```

    1   fun main() {

    2       val str = "Hello World!"

    3       val l = str.length

    4       println("Length: $l" )

    5   }

    ```


    On line 2, we define a `val` called `str`, which is a `String` having the value
    “Hello World!”. On the next line, we define a `val` called `l` to be equal to
    the `length` of `str`. This value is obtained using the notation:


    ```

    str.length

    ```


    Note that on line 4 we are printing out the `String`:


    ```

    "Length: $l"

    ```


    Kotlin interprets this by replacing the text:


    ```

    $l

    ```


    with the value of `l`, so that what gets printed is


    ```

    Length: 12

    ```


    This is `String` interpolation again. It is used a lot in Kotlin programming,
    and you will quickly get used to it.


    **Tip**


    As usual, there’s a file in the project tree from which all of the code examples
    in this chapter can be copied:


    `chapter7_code_to_copy.txt`


    This is especially useful in this chapter because some of the code samples will
    not copy correctly from the electronic version of the book.


    Let’s get a bit more practice using this dot notation. Create a file called `Strings.kt`,
    following the instructions from Chapter [5](#508289_1_En_5_Chapter.xhtml). Then
    copy this code into the new file:


    ```

    1   package lpk.basics


    3   fun main() {

    4       val str = "Hello World!"

    5       val l = str.length

    6       println("Length: $l")

    7       val upperCase = str.toUpperCase()

    8       println(upperCase)

    9       val lowerCase = str.toLowerCase()

    10       println(lowerCase)

    11   }

    ```


    When you run this program, you should see output like this:


    ```

    Length: 12

    HELLO WORLD!

    hello world!

    ```


    On line 7 of this program, we create a `val` by asking `str` “What is an uppercase
    version of you?” using the `toUpperCase` function. Similarly, on line 9, we ask
    `str` for a lowercase version of itself.


    How do we know which questions we can ask a `String`? In the old days, programmers
    spent a lot of time learning all of the functions that were available for different
    data types, and this knowledge was a large part of their skill set. These days,
    tools such as IntelliJ put this information at our fingertips. If we type in the
    code


    ```

    str.

    ```


    and then press the `Ctrl` and space keys simultaneously, a pop-up will show that
    contains a list of the available functions, as shown in Figure [7-1](#508289_1_En_7_Chapter.xhtml#Fig1).
    We will get a lot of practice in using these “dot” functions and will define our
    own data types, which will demystify things considerably! For now, take heart
    from the fact that IntelliJ will do a lot of the hard work for us when we write
    code.


    ![../images/508289_1_En_7_Chapter/508289_1_En_7_Fig1_HTML.jpg](images/508289_1_En_7_Chapter/508289_1_En_7_Fig1_HTML.jpg)


    **Figure 7-1** IntelliJ lists the functions that may be called on a data type


    ## 7.2 String Iteration


    One of the most common operations on `String`s is to *iterate*, or loop, through
    the `Char`s in them, one by one, from the first to the last, just as we can with
    the elements of an `Array`. To see how this works, copy the following code into
    your `Strings.kt` file:


    ```

    1   package lpk.basics


    3   fun main() {

    4       val str = "Kotlin!"

    5       for (c in str) {

    6           println(c)

    7       }

    8   }

    ```


    Line 4 defines a `val` called `str`, just like we saw in earlier programs. The
    next line introduces a `for`-loop in which there is a loop `val` called `c`. The
    body of the loop, which here is just a `println` call, is executed once for each
    of the `Char`s in `str`. If we run this program, we get the characters of `"Kotlin!"`
    printed out, one per line, as shown in Figure [7-2](#508289_1_En_7_Chapter.xhtml#Fig2).


    ![../images/508289_1_En_7_Chapter/508289_1_En_7_Fig2_HTML.jpg](images/508289_1_En_7_Chapter/508289_1_En_7_Fig2_HTML.jpg)


    **Figure 7-2** By iterating through the characters in a `String`, we can print
    it vertically


    **PROGRAMMING CHALLENGE 7.1**


    Suppose that we change the body of the loop in the preceding code listing to be
    a `print` rather than a `println` statement. What do you think the result of running
    the program will be?


    **PROGRAMMING CHALLENGE 7.2**


    Consider this variation on the program:


    ```

    fun main() {

    val str = "Kotlin!"

    var numberOfSpaces = 0

    for (c in str) {

    for (n in 0..numberOfSpaces) {

    print(" ")

    }

    println(c)

    numberOfSpaces = numberOfSpaces + 1

    }

    }

    ```


    Notice the `var` called `numberOfSpaces` defined on line 3. It gets incremented
    each time the loop body is executed, as the last statement of the loop body, on
    line 9.


    What is the value of `numberOfSpaces` when the loop `val c` is `''K''`?


    What is the value when `c` is `''o''`?


    What is the effect of the inner loop on lines 5 to 7?


    What do you think the result of the program will be?


    A common reason for iterating (looping) through a `String` is to find certain
    `Char`s within it. For example, here’s a program that uses a loop to count the
    spaces in a `String`:


    ```

    1   package lpk.basics


    3   fun main() {

    4       val str = "How long is a piece of string?"

    5       var spaceCount = 0

    6       for (c in str) {

    7           if (c == '' '') {

    8               spaceCount = spaceCount + 1

    9           }

    10       }

    11       println("Number of spaces: $spaceCount")

    12   }

    ```


    On line 5, we define a `var` to hold the number of spaces seen so far. Line 6
    sets up a `for`-loop that will go through the `Char`s in the `String`, with a
    loop `val` called `c`. On line 7, the `val c` is compared with the `Char` that
    represents a space. If the comparison is `true`, `spaceCount` is incremented,
    on line 8. Finally, the count is printed out after the loop, on line 11.


    **PROGRAMMING CHALLENGE 7.3**


    Copy the preceding code from the file:


    `chapter7_code_to_copy.txt`


    Can you modify the code to count the number of times that the letter `''a''` appears?


    Can you count the number of times that either `''a''` or `''e''` appears?


    Now change the program to count the number of times that vowels appear.'
