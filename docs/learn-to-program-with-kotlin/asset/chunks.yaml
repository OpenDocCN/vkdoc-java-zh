    ## 13.4 The `WordNode` Class


    A `WordNode` will be created from a `String` and will have a function to generate
    the valid one-letter variants of it. The downloaded project files should include
    the following stub for `WordNode`:


    ```

    package lpk.words

    /**

    * Generates one-letter variants of a word.

    */

    data class WordNode(val text: String) {

    fun variantsByOneLetter(checker: WordChecker): List {

    val result = mutableListOf()

    return result

    }

    }

    ```


    The `variantsByOneLetter` function is what our algorithm will use to generate
    new words. As usual, it’s very useful to think about how this function will work
    in some simple cases.


    *   If we start with an empty word, no variations get generated.


    *   From a one-letter word, we get every other possible one-letter word that is
    in the dictionary.


    *   From the word `ab`, we can get every word of the form `a_`, where `_` represents
    any letter apart from `b`, that is in the dictionary, plus every word of the form
    `_b` that is in the dictionary, where now `_` represents any letter apart from
    `a`.


    In turning these scenarios into unit tests, we are faced with the problem of not
    actually knowing what words are in the dictionary. For the one-letter words, this
    would not be too hard to discover. However, for the two-letter words, it would
    be a real challenge. We would have to write a program to search the dictionary
    for them, which would be a lot of work. Given that we will probably also want
    tests involving three- and four-letter words at some stage, we need to find another
    approach.


    What we can do is create another dictionary that contains just a small number
    of words and create the `WordChecker` used in our tests from this restricted dictionary.


