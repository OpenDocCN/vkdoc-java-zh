- fmt: '## 20.3 Identifying the Digit “1”


    The freshly downloaded code already contains a version of `DigitReader` that can
    identify “1.” To see how it does this, it’s easiest to work backward from the
    test:


    ```

    1   val DIGITS = "src/test/resources/images/digits"


    3   class DigitReaderTest {

    4       @Test

    5       fun readTest() {

    6           Assert.assertEquals(1, read(loadSummary("1.png")))

    7       }


    9       fun loadSummary(name: String): PictureSummary {

    10           val file = Paths.get(DIGITS + "/" + name).toFile()

    11           return PictureSummary(loadPictureFromFile(file))

    12       }

    13   }

    ```


    The first line of this code is a constant that identifies the relevant test data
    directory. On line 9, we have a function that takes the name of an image file,
    loads it as a `Picture`, and then creates a `PictureSummary`. This function is
    used in the test function, on line 6. This line of code applies `read` to the
    summary and checks that it returns `1`.


    If we go now to the `read` function itself, which is in a file called `DigitReader.kt`,
    we see that is simply looking at the image height to width ratio, which is obtained
    from `PictureSummary`:


    ```

    fun read(summary : PictureSummary) : Int {

    if (summary.heightToWidth > 3.0) return 1

    return -1

    }

    ```


    Let’s now look at `PictureSummary`:


    ```

    1   package lpk.imaging


    3   import java.awt.Color


    5   class PictureSummary(picture: Picture) {

    6       val heightToWidth: Float

    7       val hasBottomBar : Boolean

    8       val proportionBlackRight : Float


    10       init {

    11           heightToWidth = picture.height().toFloat() / picture.width().toFloat()

    12           val regions = Regions(picture.height(), picture.width())

    13           var rightQuarterBlack = 0

    14           var bottomBarBlack = 0

    15           var black = 0

    16           for (row in 0..picture.height() - 1) {

    17               for (column in 0..picture.width() - 1) {

    18                   val isBlack = picture.pixelByRowColumn(row, column) == Color.BLACK

    19                   if (isBlack) {

    20                       black++

    21                       if (regions.isInBottomBar(row)) bottomBarBlack++

    22                       if (regions.isInRightQuarter(column)) rightQuarterBlack++

    23                   }

    24               }

    25           }

    26           proportionBlackRight = rightQuarterBlack.toFloat() / black.toFloat()

    27           val bottomBarRatio = bottomBarBlack.toFloat() / regions.bottomBarArea().toFloat()

    28           hasBottomBar = bottomBarRatio > .75

    29       }

    30   }

    ```


    Line 5 shows that a `PictureSummary` is created with a `Picture`. There are three
    `val`s in `PictureSummary`. We have already seen that `heightToWidth` is used
    to identify “1.” The `val`s `hasBottomBar` and `proportionBlackRight` summarize
    information about where the black pixels are. The `init` block, which begins on
    line 10, calculates these `val`s.


    At first, the `init` block looks very complicated. Let’s go through the details
    of it. On line 11, the `heightToWidth` is set as the height to width ratio of
    the image. On line 12, we create an instance of `Regions` that will be used to
    classify where in the image a pixel is. Lines 13 to 15 set up three `var`s that
    are used to count black pixels. Lines 16 and 17 define a double loop through the
    pixels of the image. We have seen this row-column double looping before.


    Within the loop, on line 18, we check whether the current pixel is black. If the
    pixel is black, then we want to record statistics about it. This is done by incrementing
    the relevant counters, on lines 20 to 22. To increase the counters, we use the
    notation `++`, by which `c++` is shorthand for `c = c + 1`. On lines 21 and 22,
    we are using the `Regions` object to decide whether or not to increment the region-specific
    counters we set up earlier.


    After the pixel iteration double loop is finished, the counter values are used
    to set `proportionBlackRight` and `hasBottomBar`. Note that we convert the integer
    counts to floats before doing the divisions. Also note that for `proportionBlackHigh`,
    we are dividing the number of black pixels in the region by the total number of
    black pixels in the image, whereas for `hasBottomBar` we are dividing the number
    of black pixels in the lower seventh by the total number of pixels in that region.


    The unit test for `PictureSummary` loads files from the `summary` directory that
    have been specially prepared to have easily calculated proportions of black pixels
    in the regions of interest. For example, here’s `proportionBlackRightTest`:


    ```

    @Test

    fun proportionBlackRightTest() {

    Assert.assertEquals(0.0F, summary("bwbw_v.png").proportionBlackRight)

    Assert.assertEquals(0.5F, summary("wbwb_v.png").proportionBlackRight)

    Assert.assertEquals(0.25F, summary("bwbw_h.png").proportionBlackRight)

    Assert.assertEquals(0.25F, summary("wbwb_h.png").proportionBlackRight)

    }

    ```


    The first assertion uses the image shown in Figure [20-1](#508289_1_En_20_Chapter.xhtml#Fig1)
    on page 350.


    The `Regions` class is another one that looks more complicated than it really
    is:


    ```

    1   package lpk.imaging


    3   class Regions(val rows: Int, val columns: Int) {

    4       val seventhHeight: Int

    5       val sixSeventhsHeight: Int

    6       val quarterWidth: Int

    7       val threeQuarterWidth: Int

    8       val quarterHeight: Int

    9       val threeQuarterHeight: Int


    11       init {

    12           seventhHeight = rows / 7

    13           sixSeventhsHeight = rows - seventhHeight

    14           quarterWidth = columns / 4

    15           threeQuarterWidth = columns - quarterWidth

    16           quarterHeight = rows / 4

    17           threeQuarterHeight = rows - quarterHeight

    18       }


    20       fun isInRightQuarter(column: Int): Boolean {

    21           return column >= threeQuarterWidth

    22       }


    24       fun isInBottomBar(row: Int): Boolean {

    25           if (row >= sixSeventhsHeight) return true

    26           return false

    27       }


    29       fun bottomBarArea(): Int {

    30           return columns * seventhHeight

    31       }

    32   }

    ```


    The constructor on line 3 has `rows` and `columns` declared as `val`s. This means
    that they are available throughout the code in the class, as are the `val`s declared
    on lines 4 to 9. These other `val`s are calculated from the constructor parameters.
    The calculations are done in the `init` block. The functions in the class are
    pretty self-explanatory and have unit tests that further clarify their meaning.


    To check that these classes are all correct so far, we can run the unit tests.
    The fact that `readTest` passes means that our code is in fact reading the digit
    “1” from an image.


    ## 20.4 Identifying the Digit “2”


    It’s possible to recognize “2” using the current version of `PictureSummary`,
    as “2” is the only digit containing a bottom bar. Let’s first add a line for this
    in `readTest`:


    ```

    @Test

    fun readTest() {

    Assert.assertEquals(1, read(loadSummary("1.png")))

    Assert.assertEquals(2, read(loadSummary("2.png")))

    }

    ```


    The change to the `read` function itself is also a one-liner:


    ```

    fun read(summary: PictureSummary): Int {

    if (summary.heightToWidth > 3.0) return 1

    if (summary.hasBottomBar) return 2

    return -1

    }

    ```


    With this version of `read`, the modified test passes.'
