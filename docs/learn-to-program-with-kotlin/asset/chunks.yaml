    实际上，这些测试也起到了文档的作用，使其他程序员更容易理解这个类。在过去十年左右的时间里，有一种趋势是将单元测试用作类行为的文档。由于测试实际上是可执行的，因此它们保证是最新的，而其他类型的文档（例如代码注释）往往会很快过时。大多数软件开发人员讨厌编写文档。

