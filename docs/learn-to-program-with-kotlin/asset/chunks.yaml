- fmt: '## 15.1 Blood Sunset


    What happens if we change the colors in a photo by converting each pixel to a
    “red-only” version of that pixel? We can do this by creating a new `Color` from
    an existing one using the formula


    ```

    newColor = Color(oldColor.red, 0, 0)

    ```


    Let’s implement this formula within a function called `makeRed` that creates a
    red-only version of a `Picture`. Add the following code to the `Picture` class:


    ```

    1   fun makeRed(): Picture {

    2       val pixelsRed = Array(height()) { row ->

    3           Array(width()) { column ->

    4               val pixel = pixelByRowColumn(row, column)

    5               Color(pixel.red, 0, 0)

    6           }

    7       }

    8       return Picture(pixelsRed)

    9   }

    ```


    **PROGRAMMING CHALLENGE 15.1**


    Modify the `createPicture` function of `PhotoDisplayer` so that `makeRed` is called
    prior to an image being displayed. Now run the `main` function of `PhotoDisplayer`.


    The modified picture will be a disturbingly red sunset image, shown in Figure
    [15-1](#508289_1_En_15_Chapter.xhtml#Fig1).


    ![../images/508289_1_En_15_Chapter/508289_1_En_15_Fig1_HTML.jpg](images/508289_1_En_15_Chapter/508289_1_En_15_Fig1_HTML.jpg)


    Figure 15-1


    After transformation using `makeRed`


    Now suppose that instead of turning our image red, we want to turn it blue. We
    can add a function that does this:


    ```

    1   fun makeBlue(): Picture {

    2       val pixelsBlue = Array(height()) { row ->

    3           Array(width()) { column ->

    4               val pixel = pixelByRowColumn(row, column)

    5               Color(0, 0, pixel.blue)

    6           }

    7       }

    8       return Picture(pixelsBlue)

    9   }

    ```


    **PROGRAMMING CHALLENGE 15.2**


    Copy this function into `Picture` and then invoke it, rather than `makeRed`, in
    `PhotoDisplayer`.


    Write a `makeGreen` function and use it to change the image.


    If we compare the `makeRed` and `makeBlue` functions (and `makeGreen` too), we
    notice that they are exactly the same, apart from line 7, which implements the
    pixel transformation logic. This transformation logic can be thought of as a function
    that takes one `Color` and turns it into another one:


    - (`Color`) → (`Color`)


    In fact, we can rearrange `makeRed` so that it has the form:


    - Create a `Color` transformation function.

    - Apply it to every pixel.


    The rearranged version of `makeRed` is


    ```

    fun makeRed(): Picture {

    val makePixelRed = { it: Color -> Color(it.red, 0, 0) }

    val pixelsRed = Array(height()) { row ->

    Array(width()) { column ->

    val pixel = pixelByRowColumn(row, column)

    makePixelRed(pixel)

    }

    }

    return Picture(pixelsRed)

    }

    ```


    Now let’s take this a step further and extract the array-looping code as a function
    into which a transformation function can be passed:


    ```

    fun transform(pixelTransformation: (Color) -> (Color)): Picture {

    val transformed = Array(height()) { row ->

    Array(width()) { column ->

    val pixel = pixelByRowColumn(row, column)

    pixelTransformation(pixel)

    }

    }

    return Picture(transformed)

    }

    ```


    The `makeRed` function can then be rewritten as


    ```

    fun makeRed() : Picture {

    val makePixelRed = {it : Color -> Color(it.red, 0, 0)}

    return transform(makePixelRed)

    }

    ```


    **PROGRAMMING CHALLENGE 15.3**


    Refactor `makeBlue` (and `makeGreen`) along the same lines as `makeRed` was rewritten
    earlier.


    **PROGRAMMING CHALLENGE 15.4**


    We can get some interesting results by swapping the red, green, and blue components
    of the pixels in a `Picture`. Define a function `makeMess` as follows:


    ```

    fun makeMess() : Picture {

    val mess = { it : Color -> Color(it.green, it.blue, it.red)}

    return transform(mess)

    }

    ```


    Then show the bay photo with this transformation applied.


    **PROGRAMMING CHALLENGE 15.5**


    Consider the following code for changing pixels:


    ```

    val function = {it : Color ->

    val average = (it.red + it.green + it.blue)/3

    Color(average, average, average)

    }

    ```


    How will this change a `Picture`?


    Write a function that calls this and apply it before displaying a `Picture`.


    ## 15.2 A Unit Test


    The `transform` function that we developed in the previous section is a powerful
    way of modifying images one pixel at a time. Before we go further, we should test
    it. The following unit test loads an image in which every pixel is green (line
    5). It then creates a function from `Color` to `Color`, called `toRed`, that simply
    changes any input `Color` to red (line 8). The `transform` function is applied
    to the green image, with `toRed` as the argument (line 12). The result of the
    transformation should be an image of the same size as the original, but with every
    pixel red, and this is what is checked (lines 15 to 20).


    ```

    1   @Test

    2   fun transformTest() {

    3       //Start with an image in which all pixels are green.

    4       val file = Paths.get(IMAGES + "green_h50_w100.png").toFile()

    5       val loaded = loadPictureFromFile(file)

    6       //Create a transformation

    7       //that turns each pixel red.

    8       val red = Color(255, 0, 0)

    9       val toRed = { it: Color -> red }

    10      //Call the transform function

    11      //using the red transformation.

    12      val changed = loaded.transform(toRed)


    14      //For each row in the result...

    15      for (row in 0..49) {

    16          //for each pixel in the row...

    17          for (column in 0..99) {

    18              Assert.assertEquals(changed.pixelByRowColumn(row, column), red)

    19          }

    20      }

    21   }

    ```


    Copy this test function into `PictureTest` and check that it passes.'
