    # Part II Text


    In Part II, we learn the fundamentals of Object-Oriented Programming and Unit
    Testing by completing some fascinating programs on text analysis and word games.


    # 10. Project Austen


    The previous chapters have given us enough basic skills to start on the first
    of our programming projects. The goal of this project will be to make a statistical
    analysis of the novels of Jane Austen. For each of Austen’s major works, we will
    calculate:


    * The number of words in the book

    * The set of distinct words

    * Frequency histograms of word usage


    This project introduces two of the cornerstones of modern software engineering:
    *Object-Oriented Programming* and *Unit Testing*.


    ## 10.1 Object-Oriented Programming


    Object-Oriented Programming, or OOP, has been the dominant software development
    methodology of the last three decades. When we develop software using OOP, we
    write a collection of programs called *classes*. These are the data types used
    to model different aspects of the real-world problem that our software solves.
    We’ve actually been using some aspects of OOP already: `String` is a prebuilt
    class to represent real-world text and `List`, `Set`, and `Map` model collections
    of data.


    As stated earlier, we are going to analyze the books of Jane Austen. How might
    we think about a book as a collection of objects? The answer depends on what problem
    our software is trying to solve. If we are writing an inventory system for a book
    distributor, we will need classes to represent authors, publishers, subjects,
    and so on. If we are writing a program to control the printing process, we will
    need classes to describe the layout and text of a book, plus details of the paper
    and binding.


    In Project Austen, we will start with text files for books, and our purpose is
    to extract word count information from these. We know from Chapter 9 how to read
    a text file into a `List` of `String`s, one for each line of the book. We can
    encapsulate this task into a data type.


    The lines of the book will need to be split apart into individual words, which
    might not be an easy job. This anticipated difficulty is a clue that it is probably
    worthwhile having a class for splitting lines.


    Finally, we will probably want a class for collecting the statistics themselves.
    Putting this all together, here is a first guess at the classes that we will need
    for Project Austen:


    * `Histogram`: Records the statistics for the usage of the words in a book

    * `Line`: Splits a `String` into individual words to be recorded in a `Histogram`

    * `Book`: Reads `Line`s from a `File` and populates a `Histogram`


    The great thing about software is that it is easy to change, so we don’t need
    to agonize about getting the design of our classes right straight away. As we
    develop our software, we will get new ideas about how to implement the system,
    and we can rework it without much loss. In fact, the continual rewriting of software
    is such a big part of modern programming that it has a special name: *refactoring*.


    ## 10.2 Unit Tests


    The downside of software being easy to change is that we can easily introduce
    errors. Our defense against such is *Unit Testing*. A unit test of a class is
    a program that creates instances of the class, makes function calls on them, and
    checks the outputs of these calls. This is actually very simple, and the unit
    tests that we write later will make these concepts very clear.


    There are various programs that can help us write and run our tests, and we are
    going to use one called JUnit, which is an industry standard and which integrates
    very well with IntelliJ.


    ## 10.3 Project Structure and Setup


    To get started, create a new project in IntelliJ by cloning this repository: [`https://github.com/Apress/learn-to-program-w-kotlin-projectausten.git`](https://github.com/Apress/learn-to-program-w-kotlin-projectausten.git).
    (If you’ve forgotten how to do this, have a look at Chapter 1 or 9.) The project
    structure, shown in Figure 10-1, is a little bit more complicated than we have
    previously seen. The `src` directory has two subdirectories: `main` and `test`.
    Our programs will be put into the `main` directory, and the unit tests for them
    will be put into `test`.


    ![../images/508289_1_En_10_Chapter/508289_1_En_10_Fig1_HTML.jpg](images/508289_1_En_10_Chapter/508289_1_En_10_Fig1_HTML.jpg)


    **Figure 10-1** The structure of Project Austen


    If we expand the `main` directory, we see two directories, one called `kotlin`
    and one called `resources`, as shown in Figure 10-2a. The `kotlin` directory contains
    the code that we will be working on. There are files for the three classes that
    we identified, and they have been put in a package called `lpk.austen`. At this
    stage, these Kotlin files are just stubs: there is no real code written yet. The
    `resources` directory contains text files for each of four books by Austen. These
    were downloaded from Project Gutenberg.


    ![../images/508289_1_En_10_Chapter/508289_1_En_10_Fig2_HTML.png](images/508289_1_En_10_Chapter/508289_1_En_10_Fig2_HTML.png)


    **Figure 10-2** Expansion of the project tree


    The `test` directory has a structure that is parallel to that of `main`, as shown
    in Figure 10-2b. In the `kotlin` subdirectory, there is a single file, called
    `LineTest`, in a package called `lpk.austen.test`. This is a stub for the unit
    test of `Line`. In the `resources` directory, there are some very short books
    (not by Austen!) that will be used in our unit tests of the `Book` class, when
    we come to write it.'
