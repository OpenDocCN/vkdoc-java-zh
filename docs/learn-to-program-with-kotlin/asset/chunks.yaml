    The rules for scoping are very much common sense, and IntelliJ will make it obvious
    when there’s a problem, so don’t worry too much about this issue.


    One thing that might be confusing is that loop counters, which are described as
    `val`s earlier, seem to be reassigned with each iteration of the loop. In fact,
    this is not the case. A loop such as


    ```

    for (i in 1..3) {

    val square = i * i

    println("$i, $square")

    }

    ```


    gets converted by Kotlin into code along the lines of


    ```

    val i1 = 1

    val square1 = i1 * i1

    println("$i1, $square1")

    val i2 = 2

    val square2 = i2 * i2

    println("$i2, $square2")

    val i3 = 3

    val square3 = i3 * i3

    println("$i3, $square3")

    ```


    ## 6.4 Summary and Solutions to Challenges


    To write complex programs, we need to store information, and we do this in `val`s
    and `var`s.


    SOLUTION 6.1


    This is done by changing the limits of the loop. The sum to `100` is calculated
    using


    ```

    package lpk.basics

    fun main() {

    var sum = 0

