    }\nfun reader(name: String): SpeedReader {\nval file = Paths.get(SPEED_SIGNS +\"\
    /\"+ name).toFile()\nreturnSpeedReader(file)\n}\n}\n```\n\n这段代码中名为 `reader` 的函数接收一个限速标志文件名，从中创建一个\
    \ `File` 对象，然后将其用作创建 `SpeedReader` 的参数。测试函数中的断言检查 `SpeedReader` 返回的数字是否正确。\n\n\
    `SpeedReader` 类仅部分实现：\n\n```\nclassSpeedReader(signImageFile : File) {\nval digits\
    \ = mutableListOf()\ninit {\n}\nfun speed() :Int {\nreturn-1\n}\n}\n```\n\n名为\
    \ `digits` 的 `val` 是一个 `Int` 类型的 `List`。该列表的元素将是传入构造函数的限速标志图像文件中读取的各个数字。这需要在 `init`\
    \ 块中完成，而该块尚未编写。另一项待完成的工作是编写 `speed` 函数，该函数将把数字列表转换为一个 `Int`。\n\n## 21.2 十进制数\n\
    \n我们首先来处理 `speed` 的实现。`digits` 变量包含一个 `Int` 类型的 `List`。我们如何将它们转换为一个数字？如果列表中的数字是\
    \ `a`、`b` 和 `c`，那么它们所代表的数字就是十进制展开式：\n\n*a* × 100 + *b* × 10 + *c* × 1\n\n列表中可能只有一两个数字，因此我们的转换代码会相当复杂。为了能够测试代码，我们将其放入一个辅助函数中，该函数接收任意\
    \ `Int` 类型的 `List` 并将其转换为一个数字。\n\n项目步骤 21.1\n\n将以下函数添加到 `SpeedReader.kt` 文件中。该函数应放在\
    \ `class SpeedReader....` 这一行之前。\n\n```\nfun convertDigits(digits: List) : Int\
    \ {\nreturn-1\n}\n```\n\n然后将 `speed` 的实现更改为：\n\n```\nfun speed(): Int {\nreturn\
    \ convertDigits(digits)\n}\n```\n\n项目步骤 21.2\n\n将以下测试函数添加到 `SpeedReaderTest` 中：\n\
    \n```\n@Test\nfun convertDigitsTest() {\nval list1 = mutableListOf(1)\nAssert.assertEquals(1,\
    \ convertDigits(list1))\nval list45 = mutableListOf(4,5)\nAssert.assertEquals(45,\
    \ convertDigits(list45))\nval list150 = mutableListOf(1, 5, 0)\nAssert.assertEquals(150,\
    \ convertDigits(list150))\n}\n```\n\n粘贴代码后，IntelliJ 应会显示导入 `convertDigits` 函数的建议，如图\
    \ 21-1 所示。按照建议，同时按下 `Alt` 和 `Enter` 键。然后你应该会看到以下行：\n\n```\nimport lpk.imaging.convertDigits\n\
    ```\n\n被添加到其他 `import` 语句中。\n\n确认此测试失败。\n\n![../images/508289_1_En_21_Chapter/508289_1_En_21_Fig1_HTML.jpg](img/508289_1_En_21_Fig1_HTML.jpg)\n\
    \n图 21-1\n\nIntelliJ 提供导入新函数的选项\n\n实现 `convertDigits` 的一种方法如下：\n\n*   设置一个名为 `total`\
    \ 的累加变量。\n*   设置一个名为 `multiplier` 的 `var`，它将始终是 10 的幂。\n*   反向遍历列表，在每一步中：\n  \
    \  *   将当前数字乘以 `multiplier`。\n    *   将结果加到 `total` 上。\n    *   将 `multiplier`\
    \ 扩大十倍，为下一个数字做准备。\n\n项目步骤 21.3\n\n看看你是否能实现上述算法。\n\n我们在这里所做的重构——将关键逻辑实现为一个易于测试的“辅助”函数——在软件工程中非常常见。\n\
    \n## 21.3 整合所有内容\n\n剩下的工作就是填充 `init` 块。这比数字转换容易得多。代码需要将图像文件转换为数字，并将这些数字添加到 `digits`\
    \ 字段中。以下是实现方法：\n\n*   从 `File` 创建一个 `Picture`。\n*   从 `Picture` 创建一个 `DigitFinder`。\n\
    *   从 `DigitFinder` 获取一个数字图像列表。\n*   对于每个数字图像：\n    *   创建一个 `PictureSummary`。\n\
    \    *   将 `PictureSummary` 传递给 `read` 函数，以获取一个 `Int`。\n    *   将该 `Int` 添加到 `digits`\
    \ 中。\n\n项目步骤 21.4\n\n在 `SpeedReader` 的 `init` 块中实现上述算法。确认 `SpeedReader` 的所有测试均通过。\n\
    \n至此，项目完成——测试证明我们的软件能够成功读取限速标志。这是一项了不起的成就。干得好！\n\n你可能想知道“工业级”图像识别软件是如何编写的。其大部分代码与我们实现的代码基本相同。主要区别之一在于，我们的\
    \ `read` 函数（具有精心选择的阈值和特定的数字选择顺序）被稳健的统计模型所取代，这些模型是通过分析数千张图像的过程（称为“机器学习”）构建的。\n\n\
