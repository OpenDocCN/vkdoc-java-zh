    测试资源目录中的文件 `red_blue_green.png` 如图 16-3 所示。红色和蓝色方块是 50×50 像素的，右侧和底部的绿色边框宽 8 像素。


    ![../images/508289_1_En_16_Chapter/508289_1_En_16_Fig3_HTML.jpg](img/508289_1_En_16_Fig3_HTML.jpg)


    图 16-3


    `chopIntoSquares` 的测试图像


    假设我们将其分解为 10×10 的块。


    会有多少行块？


    会有多少列块？


    是否有任何绿色像素包含在某个块中？


    描述这些块的颜色。


    这个挑战中的思路构成了以下测试的基础：

