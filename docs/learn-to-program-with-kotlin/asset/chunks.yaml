    # 17.3 First Attempt at Superposition


    The algorithm to do the pixel swapping is pretty complicated, so let’s start with
    something easier: producing a picture that simply puts the dinosaur photo into
    the top-left corner of the background, with no conditional pixel swapping. For
    this first attempt, we will be using `cliffs.png` in the `images` directory. This
    is a 3840-by-2160 photograph taken on the Ulan river in Australia. Of course,
    you’re welcome to use your own photograph. To do so, paste it into the `images`
    directory. Anyhow, to get started, replace the code in `PhotoDisplayer.createPicture()`
    with this:


    ```

    override fun createPicture(): Picture {

    val backgroundFile = Paths.get(IMAGES + "cliffs.png").toFile()

    val background = loadPictureFromFile(backgroundFile)

    val dinoFile = Paths.get(IMAGES +

    "a_dinosaur_fixed.png").toFile()

    val dino = loadPictureFromFile(dinoFile)

    val dinoWidth = dino.width()

    val dinoHeight = dino.height()

    val newPixels = Array(background.height()) {

    row ->

    Array(background.width()) {

    column ->

    if (row >= dinoHeight) {

    background.pixelByRowColumn(row, column)

    } else if (column >= dinoWidth) {

    background.pixelByRowColumn(row, column)

    } else {

    dino.pixelByRowColumn(row, column)

    }

    }

    }

    return Picture(newPixels).scaleDown(5)

    }

    ```


    The looping code in the second half of this function is where the pixel swapping
    occurs.


    The first `if` statement says that for a `row` greater than or equal to the height
    of the foreground image, a background pixel is used.


    The second `if` statement says that for `column` greater than or equal to the
    width of the foreground image, we also take a background pixel.


    For any other location, which in fact only leaves the top left-hand corner, a
    foreground pixel is taken. Note that on the last line we are scaling down the
    image before showing it. If you run this code, you should see something like Figure
    [17-5](#508289_1_En_17_Chapter.xhtml#Fig5).


    ![../images/508289_1_En_17_Chapter/508289_1_En_17_Fig5_HTML.jpg](images/508289_1_En_17_Chapter/508289_1_En_17_Fig5_HTML.jpg)


    Figure 17-5


    First step in image superposition


    Let’s now try to position the dinosaur a bit better. We will add `val`s called
    `rowOffset` and `columnOffset`, which represent the position of the top left-hand
    corner of the dinosaur foreground picture within the background picture. Suppose
    that we want to move the dinosaur image 500 pixels down and 400 pixels to the
    right, so


    ```

    val rowOffset = 500

    val columnOffset = 400

    ```


    Now consider the pixel for a particular `row` and `column` location. If `row`
    is less than 500, or it is greater than or equal to `500 + dinoHeight`, then the
    background pixel is to be used. If `column` is less than 400, or it is greater
    than or equal to `400 + dinoWidth`, then we also use the background pixel. For
    any other location, we use the foreground pixel.


    Putting this all together, we can replace our implementation by


    ```

    override fun createPicture(): Picture {

    val backgroundFile = Paths.get(

    IMAGES + "cliffs.png").toFile()

    val background = loadPictureFromFile(backgroundFile)

    val dinoFile = Paths.get(

    IMAGES + "a_dinosaur_fixed.png").toFile()

    val dino = loadPictureFromFile(dinoFile)

    val dinoWidth = dino.width()

    val dinoHeight = dino.height()

    val rowOffset = 500

    val columnOffset = 400

    val newPixels = Array(background.height()) { row ->

    Array(background.width()) { column ->

    if (row = rowOffset + dinoHeight) {

    background.pixelByRowColumn(row, column)

    } else if (column =

    columnOffset + dinoWidth

    ) {

    background.pixelByRowColumn(row, column)

    } else {

    dino.pixelByRowColumn(

    row - rowOffset, column - columnOffset

    )

    }

    }

    }

    return Picture(newPixels).scaleDown(5)

    }

    ```


    If you run this, you should see the foreground image pushed down and to the right,
    as in Figure [17-6](#508289_1_En_17_Chapter.xhtml#Fig6).


