    14       }\n15       return Picture(pixels)\n16   }\n```\n\n请记住，第5行表示“对于任意行，应用以下代码”。第6行为该行创建一个数组，然后第7行表示“对于任意列，应用以下代码”。接下来的第8至12行代码根据像素距离左边缘的远近，创建红色或白色像素。\n\
    \n**编程挑战 14.4**\n\n意大利国旗的宽高比为3:2，从左到右有三条垂直条纹，分别为深绿色、白色和中等红色。你能修改`createPictureOfFlag`函数来生成这面国旗的图像吗？对于绿色，请使用`Color(0,\
    \ 145, 69)`；对于红色，请使用`Color(207, 43, 56)`。\n\n现在假设我们要生成一个边长为400的正方形，它有厚度为80的红色边框，中心为白色，如图[14-5](#508289_1_En_14_Chapter.xhtml#Fig5)所示。首先，让我们看看能否只生成顶部边框。这包括所有行索引小于80的像素。因此，如下代码可以实现：\n\
    \n![../images/508289_1_En_14_Chapter/508289_1_En_14_Fig5_HTML.jpg](images/508289_1_En_14_Chapter/508289_1_En_14_Fig5_HTML.jpg)\n\
    \n图14-5 白色中心红色边框的方框。我们将修改它以生成瑞士国旗\n\n```\nfun createPictureOfFlag(): Picture {\n\
    val height = 400\nval width = 400\nval pixels = Array(height) {\nrow ->\nif (row\
    \ \nColor(255, 0, 0)\n}\n} else {\nArray(width) {\ncolumn ->\nColor(255, 255,\
    \ 255)\n}\n}\n}\nreturn Picture(pixels)\n}\n```\n\n请确认这段代码确实生成了一个带有红色顶部边框的白色正方形。现在我们来添加左侧边框。我们可以通过修改`else`块来实现，使其根据`column`的值决定返回红色还是白色像素。如果`column\
    \ < 80`，像素应为红色，否则为白色。因此，我们的代码变为：\n\n```\n1   fun createPictureOfFlag(): Picture\
    \ {\n2       val height = 400\n3       val width = 400\n4       val pixels = Array(height)\
    \ {\n5               row ->\n6           if (row \n9                   Color(255,\
    \ 0, 0)\n10               }\n11           } else {\n12               Array(width)\
    \ {\n13                       column ->\n14                   if (column < 80)\
    \ {\n15                       Color(255, 0, 0)\n16                   } else {\n\
    17                       Color(255, 255, 255)\n18                   }\n19    \
    \           }\n20           }\n21       }\n22       return Picture(pixels)\n23\
    \   }\n```\n\n这段代码可以工作（请运行确认），但它变得非常混乱。问题之一是我们第9行和第15行有相同的构建红色像素的代码。这可以通过将所需的`Color`提取为`Flag`的字段来解决。第二个问题是我们有复杂的代码来遍历二维数组，并在其中混合了决定数组条目颜色的逻辑。我们可以将颜色选择逻辑从循环中提取出来，如下所示：\n\
    \n```\n1   val white = Color(255, 255, 255)\n2   val red = Color(255, 0, 0)\n\n\
    4   fun createPictureOfFlag(): Picture {\n5       val height = 400\n6       val\
    \ width = 400\n7       val pixels = Array(height) {\n8               row ->\n\
    9           Array(width) {\n10                   column ->\n11               colorForLocation(row,\
    \ column)\n12           }\n13       }\n14       return Picture(pixels)\n15   }\n\
    \n17   fun colorForLocation(row: Int, column: Int): Color {\n18       if (row\
    \ < 80) {//top\n19           return red\n20       } else {\n21           if (column\
    \ < 80) {//left\n22               return red\n23           } else {\n24      \
    \         return white\n25           }\n26       }\n27   }\n```\n\n这是一种改进，但`colorForLocation`函数实际上可以进一步简化：\n\
    \n```\nfun colorForLocation(row: Int, column: Int): Color {\nif (row < 80) return\
    \ red//top\nif (column < 80) return red//left\nreturn white//anything else\n}\n\
    ```\n\n这是因为在Kotlin中，`if`语句内的单行代码块可以与`'if'`放在同一行。使用这种格式的代码，很容易添加底部和右侧边框：\n\n```\n\
    fun colorForLocation(c: Int, r: Int): Color {\nif (r  320) return red//bottom\n\
    if (c  320) return red//right\nreturn white//anything else\n}\n```\n\n**编程挑战 14.5**\n\
    \n请确认通过这些更改，生成了红色边框的方框。\n\n此时`Flag.kt`的完整代码已在挑战的解答中给出，因此如果您在编辑时出错，可以查阅该处寻求帮助。\n\
    \n**编程挑战 14.6**\n\n通过修改`colorForLocation`函数，您能否生成图[14-6](#508289_1_En_14_Chapter.xhtml#Fig6)所示的瑞士国旗图像？**提示**\
    \ 任何在红色方框代码中为红色的像素仍应为红色，并且有四个新的红色区域。请先尝试仅生成包含其中一个区域的方框，如图[14-7](#508289_1_En_14_Chapter.xhtml#Fig7)所示。\n\
    \n![../images/508289_1_En_14_Chapter/508289_1_En_14_Fig8_HTML.jpg](images/508289_1_En_14_Chapter/508289_1_En_14_Fig8_HTML.jpg)\n\
    \n图14-8 `test`目录下的`resources`子目录包含可用于测试的简单图像\n\n![../images/508289_1_En_14_Chapter/508289_1_En_14_Fig7_HTML.jpg](images/508289_1_En_14_Chapter/508289_1_En_14_Fig7_HTML.jpg)\n\
    \n图14-7 将红色方框转换为瑞士国旗的第一步\n\n![../images/508289_1_En_14_Chapter/508289_1_En_14_Fig6_HTML.jpg](images/508289_1_En_14_Chapter/508289_1_En_14_Fig6_HTML.jpg)\n\
    \n图14-6 瑞士国旗"
  raw: "The Dubai flag has a white vertical stripe closest to the flag pole, and the\
    \ rest of the flag is red. The proportions are rather unusual: the width to height\
    \ ratio is 17:8\\. The white stripe is five seventeenths of the width of the flag.\
    \ The flag is shown against a black background in Figure [14-4](#508289_1_En_14_Chapter.xhtml#Fig4).\n\
    \n![../images/508289_1_En_14_Chapter/508289_1_En_14_Fig4_HTML.jpg](images/508289_1_En_14_Chapter/508289_1_En_14_Fig4_HTML.jpg)\n\
    \nFigure 14-4\n\nThe Dubai flag, against a black background, which acts as a border\n\
    \nHere is a version of `createPictureOfFlag` that produces this flag:\n\n```\n\
    1   fun createPictureOfFlag(): Picture {\n2       val height = 160\n3       val\
    \ width = 340\n4       val pixels = Array(height) {\n5               row ->\n\
    6           Array(width) {\n7                   column ->\n8               if\
    \ (column < 100) {\n9                   Color(255, 255, 255)\n10             \
    \  } else {\n11                   Color(255, 0, 0)\n12               }\n13   \
    \        }\n14       }\n15       return Picture(pixels)\n16   }\n```\n\nRemember\
    \ that line 5 means “for any row, apply the following code.” Line 6 creates an\
    \ array for the row, and then line 7 means “for any column, apply the following\
    \ code.” The code that does follow, lines 8 to 12, creates either a red or white\
    \ pixel, depending on how close to the left edge the pixel is.\n\nPROGRAMMING\
    \ CHALLENGE 14.4\n\nThe Italian flag has width to height ratio of 3:2 and has\
    \ three vertical stripes, which are dark green, white, and medium red, from left\
    \ to right. Can you modify `createPictureOfFlag` to produce an image of this flag?\
    \ For the green, use `Color(0, 145, 69)`, and for the red use `Color(207, 43,\
    \ 56)`.\n\nSuppose now that we’d like to produce a square with sides 400, that\
    \ has red borders, of thickness 80, and is white in the center, such as is shown\
    \ in Figure [14-5](#508289_1_En_14_Chapter.xhtml#Fig5). For starters, let’s just\
    \ see if we can produce the top border. This consists of all pixels for which\
    \ the row is less than 80\\. So code like this will work:\n\n![../images/508289_1_En_14_Chapter/508289_1_En_14_Fig5_HTML.jpg](images/508289_1_En_14_Chapter/508289_1_En_14_Fig5_HTML.jpg)\n\
    \nFigure 14-5\n\nRed box with white center. We will modify this to produce the\
    \ Swiss flag\n\n```\nfun createPictureOfFlag(): Picture {\nval height = 400\n\
    val width = 400\nval pixels = Array(height) {\nrow ->\nif (row \nColor(255, 0,\
    \ 0)\n}\n} else {\nArray(width) {\ncolumn ->\nColor(255, 255, 255)\n}\n}\n}\n\
    return Picture(pixels)\n}\n```\n\nCheck that this code does produce a white square\
    \ with a red top border. Now let’s get the left-hand border in. We can do this\
    \ by altering the `else` block to decide to return a red or white pixel, depending\
    \ on the value of `column`. If `column < 80`, the pixel should be red, else it\
    \ should be white. So our code becomes\n\n```\n1   fun createPictureOfFlag():\
    \ Picture {\n2       val height = 400\n3       val width = 400\n4       val pixels\
    \ = Array(height) {\n5               row ->\n6           if (row \n9         \
    \          Color(255, 0, 0)\n10               }\n11           } else {\n12   \
    \            Array(width) {\n13                       column ->\n14          \
    \         if (column < 80) {\n15                       Color(255, 0, 0)\n16  \
    \                 } else {\n17                       Color(255, 255, 255)\n18\
    \                   }\n19               }\n20           }\n21       }\n22    \
    \   return Picture(pixels)\n23   }\n```\n\nThis code works (run it to confirm),\
    \ but it is getting very messy. One of the problems is that we have the same code\
    \ for constructing a red pixel on lines 9 and 15\\. This can be fixed by extracting\
    \ the `Color`s we need as fields of `Flag`. A second problem is that we have complex\
    \ code for iterating through the double array, and into this we mix the logic\
    \ for deciding the color of the array entry. We can pull the color-choice logic\
    \ out of the loops as follows:\n\n```\n1   val white = Color(255, 255, 255)\n\
    2   val red = Color(255, 0, 0)\n\n4   fun createPictureOfFlag(): Picture {\n5\
    \       val height = 400\n6       val width = 400\n7       val pixels = Array(height)\
    \ {\n8               row ->\n9           Array(width) {\n10                  \
    \ column ->\n11               colorForLocation(row, column)\n12           }\n\
    13       }\n14       return Picture(pixels)\n15   }\n\n17   fun colorForLocation(row:\
    \ Int, column: Int): Color {\n18       if (row < 80) {//top\n19           return\
    \ red\n20       } else {\n21           if (column < 80) {//left\n22          \
    \     return red\n23           } else {\n24               return white\n25   \
    \        }\n26       }\n27   }\n```\n\nThis is an improvement, but the `colorForLocation`\
    \ function can actually be neatened up:\n\n```\nfun colorForLocation(row: Int,\
    \ column: Int): Color {\nif (row < 80) return red//top\nif (column < 80) return\
    \ red//left\nreturn white//anything else\n}\n```\n\nThis is because, in Kotlin,\
    \ a single-line block inside an `if` statement can be put on the same line as\
    \ the `'if'`. With the code in this format, it’s easy to change to add the bottom\
    \ and right borders:\n\n```\nfun colorForLocation(c: Int, r: Int): Color {\nif\
    \ (r  320) return red//bottom\nif (c  320) return red//right\nreturn white//anything\
    \ else\n}\n```\n\nPROGRAMMING CHALLENGE 14.5\n\nCheck that with these changes,\
    \ the red box is produced.\n\nThe complete code for `Flag.kt` at this point is\
    \ given in the solution to the challenge, so if you made an editing mistake, you\
    \ can look there for help.\n\nPROGRAMMING CHALLENGE 14.6\n\nBy modifying `colorForLocation`,\
    \ can you produce an image of the Swiss flag, shown in Figure [14-6](#508289_1_En_14_Chapter.xhtml#Fig6)?**Hint**\
    \ Any pixel that was red in the red box code should still be red, and there are\
    \ four new red regions. Try first to get the box with just one of these regions,\
    \ as shown in Figure [14-7](#508289_1_En_14_Chapter.xhtml#Fig7).\n\n![../images/508289_1_En_14_Chapter/508289_1_En_14_Fig8_HTML.jpg](images/508289_1_En_14_Chapter/508289_1_En_14_Fig8_HTML.jpg)\n\
    \nFigure 14-8\n\nThe `resources` subdirectory of the `test` directory has simple\
    \ images that we can use for tests\n\n![../images/508289_1_En_14_Chapter/508289_1_En_14_Fig7_HTML.jpg](images/508289_1_En_14_Chapter/508289_1_En_14_Fig7_HTML.jpg)\n\
    \nFigure 14-7\n\nA first step in converting the red box into the Swiss flag\n\n\
    ![../images/508289_1_En_14_Chapter/508289_1_En_14_Fig6_HTML.jpg](images/508289_1_En_14_Chapter/508289_1_En_14_Fig6_HTML.jpg)\n\
    \nFigure 14-6\n\nThe Swiss flag"
