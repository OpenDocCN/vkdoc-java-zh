    \ of the input image, and it is this thresholded version that is added to the\
    \ result.\n\nAfter making these changes, run the test. You should see that the\
    \ thresholding has not worked very well. As shown in Figure [19-3](#508289_1_En_19_Chapter.xhtml#Fig3),\
    \ almost everything is black, including parts of the sign that should be white.\
    \ To understand what is going on, it’s useful to open the original image in a\
