    ## 9.2 Writing


    To store information, we can use the function `Files.write`. This requires a parameter
    for the storage location and a parameter for the data that is to be written. The
    following program reads a list of bird sightings, converts it to a list with no
    blanks, and then writes the filtered list to a file, called `Reformatted.txt`,
    in the `files` directory:


    ```

    package lpk.files

    import java.nio.file.Files

    import java.nio.file.Paths

    fun main() {

    val helloWorld = Paths.get("files/BirdListWithGaps.txt")

    val sightings = Files.readAllLines(helloWorld)

    val noGaps = mutableListOf()

    for (sighting in sightings) {

    if (sighting != "") {

    noGaps.add(sighting)

    }

    }

    val reformatted = Paths.get("files/Reformatted.txt")

    Files.write(reformatted, noGaps)

    }

    ```


    If we run the modified program, a new file will be created in the `files` directory.
    To see this, right-click the directory and then select **Reload from Disk**, as
    in Figure [9-3](#508289_1_En_9_Chapter.xhtml#Fig3). The file will then appear
    as shown in Figure [9-4](#508289_1_En_9_Chapter.xhtml#Fig4). If you double-click
    this file, IntelliJ will open it, and you can check that it contains no empty
    lines.


    ![../images/508289_1_En_9_Chapter/508289_1_En_9_Fig4_HTML.jpg](images/508289_1_En_9_Chapter/508289_1_En_9_Fig4_HTML.jpg)


    Figure 9-4


    The newly written file appears in red in IntelliJ


