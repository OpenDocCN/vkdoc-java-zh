- fmt: '# 1.9 Source Code for Our Program


    As a wrap-up for this chapter, let’s have a quick look at the code for our program,
    just to get a bit more familiar with what Kotlin code looks like. The aim here
    is just to understand a little of the broad outline of a program. The details
    will come later.


    ```

    1   package lpk.basics


    3   import javax.swing.ImageIcon

    4   import javax.swing.JFrame

    5   import javax.swing.SwingUtilities


    7   fun main() {

    8       SwingUtilities.invokeLater { FirstProgram().doLaunch() }

    9   }

    10   class FirstProgram {


    12       fun tileColors() : Array<Array<Int>> {

    13           return arrayOf(

    14                   arrayOf(0, 255),

    15                   arrayOf(255, 0)

    16           )

    17       }


    19       fun doLaunch() {

    20           val frame = JFrame("Basics")

    21           frame.defaultCloseOperation = JFrame.EXIT_ON_CLOSE

    22           frame.iconImage = ImageIcon("./src/lpk/basics/icon.png").image

    23           frame.add(TilePanel(tileColors()))

    24           frame.pack()

    25           frame.isVisible = true

    26       }

    27   }

    ```


    Note that some of the `import` statements (lines 3 to 5) might not be showing.
    Instead, they might appear as a collapsed code block that can be expanded by clicking
    the + sign.


    ![../images/508289_1_En_1_Chapter/508289_1_En_1_Fig9_HTML.jpg](images/508289_1_En_1_Chapter/508289_1_En_1_Fig9_HTML.jpg)


    Figure 1-9


    The `import` statements might be hidden as a collapsed code block


    Even this short program contains a lot of detail that will be totally incomprehensible
    to a first-time programmer. Don’t worry! You don’t need to understand everything
    at once. The main parts of the program can be understood in the following terms:


    1.  The first line tells the system what `package` our program belongs in. The
    complete name of a program includes its package, just as the combination of street
    name plus other details makes a postal address unique.


    2.  The `import` statements let the system know what other programs are needed
    in our code. All software that does anything remotely complex, such as showing
    a user interface, makes use of prebuilt components. The `import` statements are
    used to make them available to our code.


    3.  The block containing `tileColors()` sets up a grid of color values. We’ll
    look at this in detail in the next few chapters.


    4.  Lines 19 to 26 tell the system how to turn the block of colors into a user
    interface element that can be drawn on the screen.


    5.  The function called `main` on line 7 is the starting point for the system
    to launch the program.


    In the next chapter, we will begin modifying this code to produce new patterns.


    # 2. Simple Patterns


    In this chapter, we will see how black, white, and other shades of gray can be
    represented in Kotlin. This will allow us to modify our program from the previous
    chapter to show different tile patterns. In making these changes, we will be getting
    familiar with basic Kotlin syntax and with the programming environment.


    ## 2.1 Shades of Gray


    Software engineering is about modeling aspects of the real world, such as colors,
    shapes, sounds, and so on, using simple mathematical constructs such as numbers.
    For now, we are working with shades of gray, and there are many ways that these
    can be represented in a computer program, for example:


    1.  Giving specific shades names such as `black`, `white`, `light gray`, `dark
    gray`, and so on


    2.  Representing black by `0`, white by `1`, and intermediate shades by numbers
    between these values


    3.  Representing black as `0` and white as `255`, with each intermediate shade
    given by a whole number between these values


    The first method is fine if there are just a few shades used in a program. In
    fact, a similar approach is used in writing web pages. The second method is used
    in a lot of applications but can be confusing as there are infinitely many numbers
    between `0` and `1`, but only a finite set of shades can be displayed on computer
    screens, so different decimals might end up producing the same shade. The third
    approach allows for 256 different shades of gray, which is probably as many as
    can be discerned by most people, with each number representing a different shade,
    and a fairly simple way of estimating the shade for a value. This is the model
    that we have used in our program.


    The part of our program that sets up the colors of the squares that are to be
    displayed is


    ```

    1   fun tileColors() : Array<Array<Int>> {

    2       return arrayOf(

    3               arrayOf(0, 255),

    4               arrayOf(255, 0)

    5       )

    6   }

    ```


    This code is an example of what is called a *function*, which is a block of code
    that does one job, and is called from one or more places in a program. Let’s look
    at this function in detail.


    1.  The keyword `fun` identifies this as a function.


    2.  `tileColors` is the name of the function. When we want to use it, we call
    it by this name.


    3.  The empty brackets `()` signal the end of the function name and mean that
    the function has no inputs. Inputs to functions are usually called *parameters*
    (when talking of a function definition) or *arguments* (when talking of an actual
    call to a function).


    4.  The complicated bit `Array<Array<Int>>` describes what the function produces.
    This particular function produces what is called an `Array`. An array is just
    a list of things. Our function produces an array in which the objects are themselves
    arrays, and these inner arrays hold whole numbers, representing colors. So the
    function returns an `Array` of `Array`s of `Int`s. The angle brackets are part
    of the precise specification of what can go into these arrays. We will discuss
    these in detail in later chapters.


    5.  The left brace, `{`, is the start of the function body, which is the set of
    instructions in which the logic of the function is implemented.


    6.  The word `return` defines what the output, or result, of the function will
    be.


    7.  The word `arrayOf` on line 2 is a call to another function, called `arrayOf`,
    which produces an array from whatever is passed into it.


    8.  The left bracket `(` at the end of line 2 is the start of the list of arguments
    that we are passing into the `arrayOf` function. This left bracket is matched
    by the right bracket on line 5.


    9.  On lines 3 and 4, we are setting up the arguments to the `arrayOf` function
    call made on line 2. We are passing in two arguments, one from line 3 and one
    from line 4. The comma at the end of line 3 separates these.


    10.  Line 3 creates an `Array` of two `Int`s. This is done with a call to the
    `arrayOf` function. The arguments in this call are `0` and `255`.


    11.  Line 4 creates an array that has `255` in the first position and `0` in the
    second.


    12.  The closing right brace on line 6 completes the function.


    There are lots of details here. Don’t let them overwhelm you! By writing code
    (and making mistakes), you will become familiar with this syntax. Let’s make some
    changes to this program now.'
