    23       //Return the result.

    24   }

    ```


    PROJECT STEP 11.24


    Copy this into `Term` as the new implementation of `permutations` (so replace
    the existing code with this).


    PROJECT STEP 11.25


    On line 3, add a `val` called `result` that is initialized using a `mutableSetOf<Term>()`
