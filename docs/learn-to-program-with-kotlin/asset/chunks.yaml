    Often, in programming, we need to produce text automatically—a message to users,
    for example—and in Kotlin this is very easy because we can join `String`s together
    using the same `+` operator that is used for adding numbers:


    ```

    1   fun main() {

    2       val msg = "Hello" + " " + "World!"

    3       println(msg)

    4   }

    ```


    The `val msg` on line 2 is defined by joining three `String`s, the middle of which
    is just a space, to produce the single `String "Hello World!"`.


    We can remove certain `Char`s from text by looping through it and, as we do so,
    adding the letters that we want to keep to a result `var`. For example, suppose
    that we want to remove the spaces from a `String`. We can look at each `Char`
    in the `String`, and if it is not a space, we add it to a result `var`. The way
    we check that a `Char c` is *not* the space `Char` is by using the `not equals`
    operator, written `!=`:


    ```

    1   if (c != '' '') {

    2       //add it

    3   }

    ```


    Here’s the complete program:


    ```

    fun main() {

    val str = "There is a bunker!"

    var noSpaces = ""

    for (c in str) {

    if (c != '' '') {

    noSpaces = noSpaces + c

    }

    }

    println(noSpaces)

    }

    ```


