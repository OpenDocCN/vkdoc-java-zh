  raw: '## 14.3 Photographs


    There are several file formats for storing images on computers. JPEG and PNG are
    the most commonly used. Given a file in one of these formats, how can we turn
    it into a `Picture`? Image processing is such an important task that there are
    library classes that can help. In fact, there is a class called `javax.imageio.ImageIO`
    which can do most of the work for us. Replace all of the code in `Picture.kt`
    with


    ```

    package lpk.imaging

    import java.awt.Color

    import java.io.File

    import javax.imageio.ImageIO

    fun loadPictureFromFile(imageFile: File): Picture {

    val image = ImageIO.read(imageFile)

    val width = image.width

    val height = image.height

    val pixels = Array(height) { row ->

    Array(width) { column ->

    Color(image.getRGB(column, row))

    }

    }

    return Picture(pixels)

    }

    class Picture(val pixels: Array>) {

    fun height(): Int {

    return pixels.size

    }

    fun width(): Int {

    return pixels[0].size

    }

    fun pixelByRowColumn(row: Int, column: Int): Color {

    return pixels[row][column]

    }

    }

    ```


