    # 20. Parsing the Images


    We finished the last chapter with a program, `DigitFinder`, that was able to load
    a photo of a speed sign and extract from it a list of black and white images of
    the individual digits. In this chapter, we will write code for determining the
    numbers that these extracted images represent.


    Applying `DigitFinder` to different speed signs gives output images such as those
    shown as follows:


    ![../images/508289_1_En_20_Chapter/508289_1_En_20_Figa_HTML.jpg](images/508289_1_En_20_Chapter/508289_1_En_20_Figa_HTML.jpg)


    To determine what digit an image represents, our software will build a description
    of the image and then make a decision based on the description. For example, if
    the image is “very narrow,” it will be classified as representing “1.” If it is
    “white centered,” then it will be classified as “0.” Because the images we are
    classifying vary in size and angle of presentation and are missing the occasional
    black pixel, our software will only be able to use fairly broad descriptions,
    such as “narrow” or “white centered,” in deciding what digit an image represents.


    We will mostly use information about the density of black pixels in different
    parts of an image to describe it. A class called `Regions` will identify which
    part of an image a pixel lies in. A class called `PictureSummary` will run through
    the pixels in an image and, with the help of a `Regions` object for that image,
    will gather statistics about where the black pixels are. This information will
    be summarized as properties such as `hasCenterBlank`, `hasCenterDark`, and so
    on. Finally, a function called `read`, in a file called `DigitReader.kt`, will
    contain the decision-making logic that uses the information from a `PictureSummary`
    to decide which digit an image represents.


    Our goal in this chapter is to develop the classes `Regions`, `PictureSummary`,
    and `DigitReader.kt`, and their tests, to the point where we can programmatically
    distinguish “0,” “1,” “2,” “5,” and “7.” The code that does this can then be easily
    extended to deal with the remaining digits. Rather than explain all the details,
    we will just present the finished classes as the starting point of the next chapter.


    ## 20.1 Terminology


    All of our number images are rectangular. As outlined earlier, we will summarize
    an image by describing the regional density of its black pixels within this rectangle.
    The images come in different sizes, so we can only talk in relative terms.


    The *left*, *right*, *top*, and *bottom* refer to the quarters of the image in
    those locations. We are interested in the proportions of all the black pixels
    in the image that are in each of these regions. Consider, for example, Figure
    [20-1](#508289_1_En_20_Chapter.xhtml#Fig1). Ignoring the red border, the proportion
    of the black pixels that are in the left quarter is 0.5, and the proportion in
    the top quarter is 0.25.


    ![../images/508289_1_En_20_Chapter/508289_1_En_20_Fig1_HTML.jpg](images/508289_1_En_20_Chapter/508289_1_En_20_Fig1_HTML.jpg)


    Figure 20-1


    Half of the pixels that are black are in the left quarter


    The *center* of the image is the part that is surrounded by these quarters. The
    *top bar* is the top seventh of the image, and the *bottom bar* is the bottom
    seventh. For the center and for the bars, we are interested in the proportion
    of all of the pixels *in these regions* that are black. The following table gives
    examples of some of the terms that we will use.


    | Term | Meaning | Example |

    | --- | --- | --- |

    | `hasCenterBlank` | At most 10% of center pixels are black | “0” |

    | `hasDarkCenter` | At least 65% of center pixels are black | “4” |

    | `hasTopBar` | The top seventh is at least 75% black | “5” |

    | `hasBottomBar` | The bottom seventh is at least 75% black | “2” |


    ## 20.2 Project Structure


    The code for this chapter can be downloaded from [`https://github.com/Apress/learn-to-program-w-kotlin-ch20.git`](https://github.com/Apress/learn-to-program-w-kotlin-ch20.git).
    The `Picture` and `DigitFinder` classes are as we left them at the end of the
    previous chapter. There are also basic versions of `PictureSummary`, `Regions`,
    and `DigitReader` and tests for these.


    Two new directories of test data have been added. The `summary` directory contains
    images that we will use in the unit tests for `PictureSummary`. The `digits` directory
    contains the images shown at the start of this chapter, which will be used for
    testing `DigitReader`. Another change is that the `signs` test data directory
    now contains signs that cover all numerals. `DigitFinderTest` has been enhanced
    to process all of the files in this directory, rather than just `80.png`, and
    this is how the images in the `digits` directory were created.'
