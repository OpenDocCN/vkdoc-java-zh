- fmt: '# 17.2 Photographing the Dinosaur


    Once we’ve got the screen magenta, we can line the dinosaur up against it and
    take a photo. The results might be something like Figure [17-2](#508289_1_En_17_Chapter.xhtml#Fig2),
    in which the background changes color as we move away from the center of the screen.
    The reason for this is probably that the pixels at the edges are more “side on”
    to our camera than those at the center, and so we are seeing more of the blue
    subpixels than the red. Whatever the exact problem is, we can fix it with thresholding:
    we will write a program that changes any pixel that is almost magenta to be exactly
    magenta. (This is another reason why there needs to be a strong contrast between
    the background color and the colors in the dinosaur model.)


    ![../images/508289_1_En_17_Chapter/508289_1_En_17_Fig2_HTML.jpg](images/508289_1_En_17_Chapter/508289_1_En_17_Fig2_HTML.jpg)


    Figure 17-2


    The raw dinosaur photo


    Save your dinosaur photo and paste it into the `src/images` directory of the project,
    as shown in Figure [17-3](#508289_1_En_17_Chapter.xhtml#Fig3).


