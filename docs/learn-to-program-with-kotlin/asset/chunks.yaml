- fmt: "# 13.9 The Implementation of `lookForTarget`\n\nWe already have a commented\
    \ stub for `lookForTarget`. We also have some tests in place that can guide us\
    \ in our implementation and let us know if it is correct. Let’s now start filling\
    \ in the blanks. Referring back to the code listing for `WordSwitch` on page 209,\
    \ the first thing that we need is a `var` to hold newly generated words, initialized\
    \ with those derived from the `startNode`:\n\n```\nvar currentGeneration = startNode.variantsByOneLetter(checker)\n\
