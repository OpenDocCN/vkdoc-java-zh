- fmt: '## 6.2 Using `vals`


    As mentioned earlier, we can think of a `val` as a box containing an item of data
    that cannot be replaced with another item. You might well ask: “Why bother? Why
    not just use `var`s everywhere? They can do more so aren’t they better?” In fact,
    a lot of languages do not have `val`s and only have `var`s. The problem with `var`s
    is that because the contents can be replaced, it can become very hard to keep
    track of what is in them. This difficulty really becomes important in two situations.


    Firstly, with very complex programs, it’s hard for us humans to keep track of
    what is inside each `var`. This makes it hard to write and maintain large programs
    that use a lot of `var`s.


    The second problem with `var`s is that modern software has lots of things happening
    simultaneously. If one computer activity is trying to retrieve the contents of
    a `var` but other activities are changing these contents, unpredictable behavior
    can ensue. It’s very hard to write software in which multiple independent activities
    are changing shared data. In “the old days,” prior to 2005, it was quite unusual
    to find computers that were capable of doing several tasks at the same time, whereas
    now it is almost impossible to find ones that do not have at least two so-called
    processing cores. For this reason, modern languages such as Kotlin distinguish
    between `val`s and `var`s.


    We will use `val`s a lot in later chapters. Right now, let’s just write a program
    that uses a `val` in a temporary variable. The *Fibonacci* numbers are 1, 1, 2,
    3, 5, 8, and so on. Each number in the sequence is obtained by adding up the previous
    two numbers. Here is the outline of a program that prints the first ten or so
    Fibonacci numbers:


    ```

    1   package lpk.basics


    3   fun main() {

    4       var current = 1

    5       var previous = 1

    6       for (i in 1..10) {

    7           //Print previous

    8           //Calculate the next one

    9           //Re-assign previous to current

    10           //Re-assign current to next

    11       }

    12   }

    ```


    On lines 4 and 5, we define `var`s to hold the current and previous Fibonacci
    numbers. These `var`s are initialized with the first two elements of the sequence
    and will be changed in the loop to hold further elements of the sequence as these
    are calculated.


    Within the loop, the first thing that we want to do is print `previous`. So line
    7 can be changed to


    ```

    println(previous)

    ```


    On line 8, we need to calculate the next number. The Fibonacci recipe says that
    this is the sum of `previous` and `next`. We can store this sum in a `val`, which
    we might as well call `next`. So line 8 becomes


    ```

    val next = current + previous

    ```


    Now that we’ve calculated the next number, what was the current becomes the previous.
    So line 9 can be changed to


    ```

    previous = current

    ```


    Remember, this is to be understood as “take the contents of `current` and put
    them in `previous`.”


    Finally, we need to switch the contents of `current` to contain the contents of
    `next`:


    ```

    current = next

    ```


    **PROGRAMMING CHALLENGE 6.5**


    Implement these changes and run the program.


    This program would work with `next` defined as a `var` rather than as a `val`,
    but whenever we can use a `val`, we should. Notice that in IntelliJ the `var`s
    are written with a slightly annoying underline. That is a subtle hint to use `val`s
    when possible. If you change `next` from being a `val` to being a `var`, then
    IntelliJ will write `var` with an off-putting yellow background, as in Figure
    [6-1](#508289_1_En_6_Chapter.xhtml#Fig1). This is a less subtle hint that we can
    do better.


    ![../images/508289_1_En_6_Chapter/508289_1_En_6_Fig1_HTML.jpg](images/508289_1_En_6_Chapter/508289_1_En_6_Fig1_HTML.jpg)


    **Figure 6-1** An IntelliJ hint to use a `val`


    ## 6.3 Scope


    Consider this program:


    ```

    1   package lpk.basics


    3   fun main() {

    4       for (i in 1..10) {

    5           val square = i * i

    6           val cube = i * square

    7           println("$i, $square, $cube")

    8       }

    9   }

    ```


    There are three `val`s: the loop counter, `i`; `square`, defined on line 5; and
    `cube`, defined on line 6. These `val`s have meaning within the body of the `for`-loop,
    that is, between the left brace at the end of line 4 and the matching right brace
    on line 8. If we copy line 7 and put it after the brace on line 8, the `i`, `square`,
    and `cube` references have no meaning, so we get errors, as in Figure [6-2](#508289_1_En_6_Chapter.xhtml#Fig2).
    In languages such as Kotlin, symbols have meaning within the pair of braces in
    which they are defined, and outside they have either no meaning or another meaning.
    Within a pair of braces, symbols cannot be referred to by a line above the line
    in which they are defined. For example, we can’t use `square` before it has been
    defined, as has been attempted in Figure [6-3](#508289_1_En_6_Chapter.xhtml#Fig3).
    The section of code in which a `val` or `var` has meaning is called its *scope*.


    ![../images/508289_1_En_6_Chapter/508289_1_En_6_Fig3_HTML.jpg](images/508289_1_En_6_Chapter/508289_1_En_6_Fig3_HTML.jpg)


    **Figure 6-3** We can’t use a symbol before it has been defined


    ![../images/508289_1_En_6_Chapter/508289_1_En_6_Fig2_HTML.jpg](images/508289_1_En_6_Chapter/508289_1_En_6_Fig2_HTML.jpg)


    **Figure 6-2** IntelliJ shows out-of-scope symbols as errors


    The rules for scoping are very much common sense, and IntelliJ will make it obvious
    when there’s a problem, so don’t worry too much about this issue.


    One thing that might be confusing is that loop counters, which are described as
    `val`s earlier, seem to be reassigned with each iteration of the loop. In fact,
    this is not the case. A loop such as


    ```

    for (i in 1..3) {

    val square = i * i

    println("$i, $square")

    }

    ```


    gets converted by Kotlin into code along the lines of


    ```

    val i1 = 1

    val square1 = i1 * i1

    println("$i1, $square1")

    val i2 = 2

    val square2 = i2 * i2

    println("$i2, $square2")

    val i3 = 3

    val square3 = i3 * i3

    println("$i3, $square3")

    ```


    ## 6.4 Summary and Solutions to Challenges


    To write complex programs, we need to store information, and we do this in `val`s
    and `var`s.


    **SOLUTION 6.1**


    This is done by changing the limits of the loop. The sum to `100` is calculated
    using


    ```

    package lpk.basics

    fun main() {

    var sum = 0

    for (i in 1..100) {

    sum = sum + i

    }

    print(sum)

    }

    ```


    This should give result `5050`.


    The sum from `11` to `20` is given by


    ```

    package lpk.basics

    fun main() {

    var sum = 0

    for (i in 11..20) {

    sum = sum + i

    }

    print(sum)

    }

    ```


    This should give result `155`.


    **SOLUTION 6.2**


    ```

    package lpk.basics

    fun main() {

    var sum = 0

    for (i in 1..10) {

    sum = sum + i * i

    }

    print(sum)

    }

    ```


    In the expression `sum + i * i`, the multiplication is done before the addition.
    In Kotlin, as in standard mathematical notation, multiplication takes precedence
    over addition.


    **SOLUTION 6.3**


    ```

    package lpk.basics

    fun main() {

    var sum = 0

    for (i in 1..10) {

    if (i % 2 == 0) {

    sum = sum + i

    }

    }

    print(sum)

    }

    ```


    **SOLUTION 6.4**


    This is similar to calculating the sum, but we begin with `1` and multiply the
    partial result within the loop body:


    ```

    package lpk.basics

    fun main() {

    var factorial = 1

    for (i in 1..5) {

    factorial = factorial * i

    }

    print(factorial)

    }

    ```


    The sequence of factorials grows very fast. In fact, if you try to calculate the
    factorial of a number like `30` using something like the preceding code, you will
    get a crazy answer. This is because of a limit to the memory allocated to store
    `Int`s in Kotlin. It is possible to work with larger numbers, though we won’t
    be doing so in this book.


    **SOLUTION 6.5**


    ```

    package lpk.basics

    fun main() {

    var current = 1

    var previous = 1

    for (i in 1..10) {

    println(previous)

    val next = current + previous

    previous = current

    current = next

    }

    }

    ```'
