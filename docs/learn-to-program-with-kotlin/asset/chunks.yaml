    # 18. 概述


    *计算机视觉*是指利用软件从图像中提取信息的技术。这是一个重要的课题，在医学（发现肿瘤）、天文学（发现行星）和安全领域（发现罪犯）等方面都有应用。在本书的最后一部分，我们将解决读取限速标志的问题，这对于自动驾驶汽车来说是必不可少的。


    我们的软件将要读取的限速标志由红色圆圈内的黑色数字组成，背景为白色。到本书结束时，我们将编写出能够在一张照片中找到限速标志并读取其内容的软件。


    我们的软件将通过两个主要步骤完成这一任务。首先，定位图像中包含标志的部分，并将其分割成子图像。这一过程的输出将是一个`Picture`列表，每个`Picture`代表限速的一个数字。第二步是确定这些图像代表什么数字。


    该软件的实现分布在接下来的四章中，具体如下。在本章中，我们将增强第三部分中的`Picture`类，使其能够进行定位图像重要特征所需的切片操作。在下一章中，这些新函数将被应用于限速标志照片，以提取数字子图像。在第
    20 章中，我们将开发能够接收黑白图像并确定其代表哪个数字的代码。最后，在本书的最后一章中，我们将把所有这些部分整合起来，生成一个真正非常复杂的程序。


    ## 18.1 更多 Kotlin 知识


    在我们开始编写计算机视觉代码之前，需要学习几个概念。我们将使用一个名为 Kotlin REPL（读取-求值-打印循环）的工具来学习，该工具是 IntelliJ
    的一部分。通过菜单 `Tools` ➤ `Kotlin` ➤ `Kotlin` `REPL` 可以启动 REPL。该工具本身是 Kotlin 的一种命令行界面，如图
    18-1 所示。


    ![../images/508289_1_En_18_Chapter/508289_1_En_18_Fig1_HTML.jpg](img/508289_1_En_18_Fig1_HTML.jpg)


    图 18-1


    Kotlin REPL


    在第 20 章中，我们将需要讨论比例，即分数，例如“.65”。在 Kotlin 中，可以使用名为`Float`的类来建模。如果我们想使用普通算术（而非整数算术）来除两个`Int`，我们需要先将它们转换为`Float`。例如，如果在
    Kotlin REPL 中输入表达式


    ```

    1.toFloat() / 3.toFloat()

    ```


    则会输出答案 `0.33333334`。关于`Float`其实没什么好说的，它们非常容易使用。通常，只有当我们忘记在除法之前将`Int`转换为`Float`时才会出现问题，例如：


    ```

    (1/3).toFloat()

    ```


    会得到结果 `0.0`，因为 `1/3` 是 `Int 0`，然后被转换为 `Float 0.0`。


    我们需要掌握的第二个新编程概念是*过滤*，即对`List`中的元素应用某种决策过程，保留重要的元素，丢弃其余的元素。为了演示其用法，让我们过滤 `1` 到
    `10` 之间的整数，只保留偶数。为此，在 REPL 中输入


    ```

    (1..10).filter { i -> i % 2 == 0 }

    ```


    然后按 `Ctrl+Enter`。你应该会看到输出：


    ```

    [2, 4, 6, 8, 10]

    ```


    表达式


    ```

    i -> i % 2 == 0

    ```


    是一个从 `Int` 类型到 `Boolean` 类型的函数。如果 `i` 除以 `2` 的余数等于 `0`，即 `i` 是偶数，则该函数返回 `true`。回顾上一章，这被称为
    lambda 函数。事实上，像这样的 lambda 函数非常有用，以至于 Kotlin 允许一种简写形式，将表达式中的 `i -> i` 部分替换为 `it`，这是对“我们正在迭代的集合中的任何元素”的一个很好的简写。使用这个简写，我们可以写成


    ```

    (1..10).filter { it % 2 == 0 }

    ```


    `filter` 函数将此 lambda 应用于原始列表中的所有元素，并构建一个新列表，其中包含那些使函数返回 `true` 的元素。我们可以使用过滤来回答诸如“大于
    1000 的 41 的最小倍数是多少？”这样的问题：


    ```

    (1001..1100).filter{it % 41 == 0}.first()

    ```


    我们将在第 19 章中使用过滤，届时我们将把图像切片成子图像列表，并且需要丢弃那些太小而不值得关注的子图像。


