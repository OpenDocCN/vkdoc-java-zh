- fmt: '# 10.7 BookTest and Book


    From our brief design discussion earlier, we know that a `Book` is created from
    a text file and will have a `Histogram` object in which the words in the book
    are to be recorded. The text file can be passed in as a constructor parameter,
    and the extraction of information from it can be done in an `init` block. Here’s
    a partial implementation of `Book`:


    ```

    package lpk.austen

    import java.nio.file.Files

    import java.nio.file.Path

    import java.nio.file.Paths

    /**

    * Reads a book from a text file and produces word usage information.

    */

    class Book(bookFile : Path) {

    val histogram = Histogram()

    init {

    //Code to read the book here.

    }

    }

    ```


    **PROJECT STEP 10.19**


    Paste this code into `Book.kt`, replacing whatever is currently in that file.


    Our unit tests for `Book` will work by creating `Book`s from the short text files
    in the `test/resources/books` directory. These files are all so small that we
    can easily count the words in them, and our unit tests will compare our counts
    with values returned by the code. Let’s get started!


    **PROJECT STEP 10.20**


    Create an empty file `BookTest.kt` alongside the other unit test files. Replace
    whatever is in this file with this code:


    ```

    package lpk.austen.test

    import org.junit.Assert

    import org.junit.Test

    import lpk.austen.Book

    import java.nio.file.Paths

    class BookTest {

    @Test fun shortStory() {

    val book = Book(Paths.get(

    "src/test/resources/books/ShortStory.txt"))

    val allWords = book.histogram.allWords()

    }

    }

    ```


    The messy part of this code is the path to the file `ShortStory.txt`, but this
    is just another of the kind of `Path` construction that we had in Chapter [9](#508289_1_En_9_Chapter.xhtml).
    Now double-click the file `ShortStory.txt` and inspect the text. How many different
    words are there? What are they?


    **PROJECT STEP 10.21**


    Add an assertion to the test function, `shortStory`, that checks that there are
    four words.


    For each of the words in `ShortStory.txt`, add a line to the test that checks
    that the word is in the `Set`.


    For each of the words in `ShortStory.txt`, add a line to the test that checks
    that `book.histogram` has the correct count for that word.


    After completing this step, your test code should look something like this:


    ```

    @Test fun shortStory() {

    val book = Book(Paths.get(

    "src/test/resources/books/ShortStory.txt"))

    val allWords = book.histogram.allWords()

    Assert.assertEquals(4, allWords.size)

    Assert.assertTrue(allWords.contains("the"))

    Assert.assertTrue(allWords.contains("beginning"))

    Assert.assertTrue(allWords.contains("middle"))

    Assert.assertTrue(allWords.contains("end"))

    Assert.assertEquals(3, book.histogram.numberOfTimesGiven("the"))

    Assert.assertEquals(1, book.histogram.numberOfTimesGiven("beginning"))

    Assert.assertEquals(1, book.histogram.numberOfTimesGiven("middle"))

    Assert.assertEquals(1, book.histogram.numberOfTimesGiven("end"));

    }

    ```


    Of course, this test will fail, because we have not yet implemented the `init`
    block of `Book`.


    We can implement the `init` block by having the `Line` and `Histogram` classes
    work together to record all of the words in the `Book`. The lines of the book
    file will be turned into `Line` objects, and then these `Line`s will provide the
    words to be recorded by the `Histogram`:


    ```

    1   init {

    2       val lines = Files.readAllLines(bookFile)

    3       for (str in lines) {

    4           val line = Line(str)

    5           for (word in line.words()) {

    6               histogram.record(word)

    7           }

    8       }

    9   }

    ```


    Let’s go through this code in detail, as it is a bit complicated. On line 2, we
    read the `bookFile` from the constructor into a `val` called `lines`. As with
    the bird sightings example from page 92, `lines` is a `List` of `String`s, with
    an entry for each line of the text file. On line 3, we iterate through the elements
    of `lines`. Line 4 creates a `Line` instance, called `line`, from the line of
    text currently represented by the loop `val`. Since `line` is of type `Line`,
    it offers the “dot” function `words`. On line 5, we iterate over the elements
    of `line.words`, and on line 6 we add the current `word` to our `histogram` field.


    **PROJECT STEP 10.22**


    Copy this code into `Book` and check that the unit test now passes.


    **PROJECT STEP 10.23**


    Add a test to `BookTest` that uses `HorrorStory.txt`. This test should be something
    like this:


    ```

    @Test fun horrorStory() {

    val book = Book(Paths.get(

    "src/test/resources/books/HorrorStory.txt"))

    val allWords = book.histogram.allWords()

    Assert.assertEquals(7, allWords.size)

    Assert.assertTrue(allWords.contains("it"))

    Assert.assertTrue(allWords.contains("was"))

    Assert.assertTrue(allWords.contains("a"))

    Assert.assertTrue(allWords.contains("and"))

    Assert.assertTrue(allWords.contains("stormy"))

    Assert.assertTrue(allWords.contains("night"))

    Assert.assertTrue(allWords.contains("dark"))

    Assert.assertEquals(1, book.histogram.numberOfTimesGiven("it"))

    Assert.assertEquals(1, book.histogram.numberOfTimesGiven("was"))

    Assert.assertEquals(1, book.histogram.numberOfTimesGiven("a"))

    Assert.assertEquals(1, book.histogram.numberOfTimesGiven("dark"));

    Assert.assertEquals(1, book.histogram.numberOfTimesGiven("and"));

    Assert.assertEquals(1, book.histogram.numberOfTimesGiven("stormy"));

    Assert.assertEquals(1, book.histogram.numberOfTimesGiven("night"));

    }

    ```


    Run the test. It should pass.


    **PROJECT STEP 10.24**


    Open the file `TheLittleBookOfCalm.txt` in IntelliJ. This text is a little more
    complex than either `ShortStory` or `HorrorStory` because it contains a blank
    line and because the sentences end with full stops. Add a test to `BookTest` that
    is based on this text file. It should look something like this:


    ```

    1   @Test

    2   fun littleBookOfCalmTest() {

    3       val book = Book(Paths.get(

    4        "src/test/resources/books/TheLittleBookOfCalm.txt"))

    5       //This book has two lines with several repeated words.

    6       //There is also a blank line.

    7       //The two non-blank lines end in full stops.

    8       val histogram = book.histogram

    9       Assert.assertEquals(2, histogram.numberOfTimesGiven("this"))

    10       Assert.assertEquals(1, histogram.numberOfTimesGiven("is"))

    11       Assert.assertEquals(1, histogram.numberOfTimesGiven("a"))

    12       Assert.assertEquals(3, histogram.numberOfTimesGiven("very"))

    13       Assert.assertEquals(2, histogram.numberOfTimesGiven("short"))

    14       Assert.assertEquals(2, histogram.numberOfTimesGiven("book"))

    15       Assert.assertEquals(1, histogram.numberOfTimesGiven("we"))

    16       Assert.assertEquals(1, histogram.numberOfTimesGiven("hope"))

    17       Assert.assertEquals(1, histogram.numberOfTimesGiven("that"))

    18       Assert.assertEquals(1, histogram.numberOfTimesGiven("you"))

    19       Assert.assertEquals(1, histogram.numberOfTimesGiven("find"))

    20       Assert.assertEquals(1, histogram.numberOfTimesGiven("calming"))

    21   }

    ```


    Run this test. It should fail.


    Why is `TheLittleBookOfCalm.txt` not processed properly? To investigate, we can
    add a line to our test that prints out the words in `histogram` before making
    any assertions. Add this statement:


    ```

    print(histogram.allWords())

    ```


    after line 8 of `littleBookOfCalmTest`, and run this test again. It will still
    fail, but will also print out something like this:


    ```

    [a, very, calming., book, this, is, hope, we, that, find, short, book., you]

    ```


    This reveals the problem: we are not trimming the full stops, so are getting entries
    for both `"book"` and `"book."`. Also, there is an entry for `"calming."` instead
    of `"calming"`. This is a bug (error) in `Line`.'
