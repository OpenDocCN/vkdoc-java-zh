    \ `wordChecker` 函数来替代重复的代码块。目前，在空间和复杂性上的节省并不显著，但随着我们添加更多函数，我们刚刚完成的工作（或者说让 IntelliJ\
    \ 为我们完成的工作！）肯定会带来回报。\n\n![../images/508289_1_En_13_Chapter/508289_1_En_13_Fig6_HTML.jpg](img/508289_1_En_13_Fig6_HTML.jpg)\n\
    \n图 13-6\n\nIntelliJ 提供重构其他匹配代码块的选项\n\n## 13.6 对 `WordNode` 的进一步测试\n\n现在代码已经简化，我们可以回到测试场景，实现那些涉及从两个字母的单词生成新单词的测试。如果我们从单词\
    \ `ab` 开始，那么通过改变第一个字母，我们可以得到 `bb`、`cb`、`db`、`eb`、`fb` 等等。其中，只有前三个在我们这些测试所使用的字典中。通过改变\
    \ `ab` 的第二个字母，我们可以生成有效单词 `aa`、`ac` 和 `ad`。因此，我们总共有六个变体：\n\n```\naa, ac, ad, bb,\
    \ cb, db\n```\n\n项目步骤 13.6\n\n复制并粘贴整个函数 `testOneLetterWord`。\n\n将复制的函数重命名为 `testTwoLetterWord`。\n\
    \n然后按如下方式修改函数体：\n\n*   不要从 `\"a\"` 创建 `WordNode`，而是从 `\"ab\"` 创建。\n*   添加一个断言，确认\
    \ `generated` 有六个元素。\n*   不要断言 `generated` 包含 `WordNode(\"b\")` 等，而是检查它是否包含前面列出的元素。\n\
    \n## 13.7 实现 `WordNode`\n\n我们已经有了 `WordNode` 的桩代码。现在，有了几个测试，我们可以填充 `variantsByOneLetter`\
    \ 的细节。我们的桩代码已经让这个函数创建了一个 `List<WordNode>` 并返回它。我们需要做的是编写填充这个列表的代码。这可以通过遍历单词中的每个位置，并添加通过更改该位置的字母所产生的变体来实现。\n\
    \n项目步骤 13.7\n\n用以下代码替换 `variantsByOneLetter`：\n\n```\n1   fun variantsByOneLetter(checker:\
    \ WordChecker): List {\n2       val result = mutableListOf()\n3       //对于单词中的每个位置...\n\
    4       for (i in 0..text.length - 1) {\n5           //...添加通过仅更改\n6         \
    \  //该位置的字母而产生的变体。\n\n8       }\n9       return result\n10   }\n```\n\n这段代码中当前为空的第\
    \ 7 行需要一些思考。此时，作用域内的对象有：需要添加新变体的 `result`、用于测试可能单词的 `checker`、字母位置 `i`，当然还有在类构造函数中声明的字段\
    \ `word`。\n\n在为这类棘手问题开发算法时，思考一个具体的例子非常有用。因此，假设我们的 `WordNode` 对应 `\"bolt\"`，并且\
    \ `i` 是 `2`。我们想知道通过替换 `\"l\"` 可以得到哪些单词。在 `\"l\"` 之前，我们有 `\"bo\"`，在它之后我们有 `\"t\"\
    `。这些片段创建了一个模板 `\"bo_t\"`。对于字母表中的每个字母，我们可以用该字母替换下划线字符，并使用 `checker` 测试生成的 `String`。因此，我们询问：\n\
    \n*   “`boat`” 是否有效，\n*   “`bobt`” 是否有效，\n*   “`boct`” 是否有效，\n*   依此类推，直到\n* \
    \  “`bozt`” 是否有效？\n\n例外情况是，我们不需要询问 `\"bolt\"`，因为这是我们正在处理的单词。作为一个算法，这相当于：\n\n*\
    \   获取位置之前的文本\n*   获取位置之后的文本\n*   对于字母表中的每个字母\n    *   如果该字母与我们的单词中的字母不同，则使用它创建一个新单词。\n\
    \    *   如果新单词有效，则添加它。\n\n由于这个逻辑非常复杂，我们将把它放入一个专用函数中，并在 `variantsByOneLetter` 的第\
    \ 7 行使用它。\n\n项目步骤 13.8\n\n将此函数复制到 `WordNode` 中：\n\n```\nprivate fun addVariantsAtPosition(position:\
    \ Int, nodes: MutableList, checker: WordChecker) {\nval textBeforePosition = text.substring(0,\
    \ position)\nval textAfterPosition = if (text.length > 1) text.substring(position\
    \ + 1, text.length) else \"\"\nval originalLetter = text[position]\nfor (fromAlphabet\
    \ in \"abcdefghijklmnopqrstuvwxyz\") {\nif (originalLetter != fromAlphabet) {\n\
    val variant = textBeforePosition + fromAlphabet + textAfterPosition\nif (checker.isPreviouslyUnseenValidWord(variant))\
    \ {\nnodes.add(WordNode(variant))\n}\n}\n}\n}\n```\n\n将函数中的代码行与前面给出的算法步骤进行比较。\n\
    \n然后，将项目步骤 13.7 中空的第 7 行替换为对这个新函数的调用：\n\n```\naddVariantsAtPosition(i, result,\
    \ checker)\n```\n\n检查一下，通过这些更改，测试现在是否通过了。\n"
- fmt: '# 13.8 The `WordSwitch` Class


    Our `WordChecker` and `WordNode` classes implement key parts of the word switch
    algorithm. To coordinate the activities of these two classes, we will use a third
    class, called `WordSwitch`. This class has already been partially implemented.
    If you open it in IntelliJ, you should see this code:


    ```

    1   package lpk.words


    3   import java.nio.file.Paths


    5   /**

    6    * Implements the Word Switch algorithm.

    7    */

    8   class WordSwitch(dictionary: Dictionary, start: String, val target: String)
    {


    10       val startNode: WordNode

    11       val checker: WordChecker


    13       init {

    14           startNode = WordNode(start)

    15           checker = WordChecker(dictionary)

    16       }


    18       fun lookForTarget(): WordNode? {

    19           //Declare a variable to hold the new words that get created

    20           //in each generation. Initialise it with the words generated

    21           //by the start word.


    23           //Have a loop to create new generations so long as these

    24           //contain new words and the target is not found.


    26           return null

    27       }

    28   }

    ```


    The constructor on line 8 shows that there is a field, called `target`, which
    is a `String`. The other two constructor parameters are a `Dictionary` and a `String`,
    from which the search starts. These two parameters are used in the `init` block
    to initialize two fields. These fields are a `WordNode` from which the search
    algorithm is launched and a `WordChecker`.


    Line 18 introduces a function, `lookForTarget`, that will actually do the searching.
    This function will return a `WordNode` holding the destination, if it can be reached,
    else will return `null`, the “nothing” object. The possibility of a `null` means
    that the return type is `WordNode?` rather than `WordNode`.


    We will of course write unit tests before attempting to fill out the details of
    this function. In these unit tests, we will reuse the “abcd” dictionary from `WordCheckerTest`.
    Here are some possible test cases:


    *   If the start word is `ab` and the destination is `abc`, then the destination
    will not be reached, as it is of a different length from the starting word.

    *   The word `ae` is unreachable because it is not in the dictionary.

    *   The word `b` should be reachable from `a`, `bb` should be reachable from `aa`,
    `bbb` from `aaa`, and so on.


    ## PROJECT STEP 13.9


    Open `WordSwitchTest` and copy these two test functions into the body of the class:


    ```

    @Test

    fun noPathDifferentLengths() {

    val path = Paths.get("src/test/resources/books/abcd.txt")

    val dictionary = Dictionary(path)

    val wordSwitch = WordSwitch(dictionary, "ab", "abc")

    Assert.assertNull(wordSwitch.lookForTarget())

    }

    @Test

    fun noPathTargetNotInDictionary() {

    val path = Paths.get("src/test/resources/books/abcd.txt")

    val dictionary = Dictionary(path)

    val wordSwitch = WordSwitch(dictionary, "aa", "ae")

    Assert.assertNull(wordSwitch.lookForTarget())

    }

    ```


    Run these tests. Why do they pass?


    ## PROJECT STEP 13.10


    Notice that both test functions start with the same first two lines. Can you get
    IntelliJ to refactor this duplicated code?


    ## PROJECT STEP 13.11


    After refactoring, your code should look something like that in the solution to
    Project Step 13.8. In this code, the two test functions each declare and create
    a `Dictionary` that is used only in the next line as a parameter to the `WordSwitch`
    constructor call, for example:


    ```

    1   @Test

    2   fun noPathDifferentLengths() {

    3       val dictionary = dictionary()

    4       val wordSwitch = WordSwitch(dictionary, "ab", "abc")

    5       Assert.assertNull(wordSwitch.lookForTarget())

    6   }

    ```


    This can be simplified further by replacing the `dictionary` parameter used in
    the `WordSwitch` constructor on line 4 with a call to `dictionary()` and then
    deleting line 3:


    ```

    @Test

    fun noPathDifferentLengths() {

    val wordSwitch = WordSwitch(dictionary(), "ab", "abc")

    Assert.assertNull(wordSwitch.lookForTarget())

    }

    ```


    Perform the same refactoring on the other test function. This kind of refactoring
    is called *inlining*.


    Now that the test code has been cleaned up a bit, let’s look at some of the other
    test scenarios. One test that we want to implement is that if we start with `a`,
    then we can get to `b`. We start a test for this by creating a `WordNode` from
    `a`:


    ```

    val wordSwitch = WordSwitch(dictionary(), "a", "b")

    ```


    Then run `lookForTarget` and assign the result to a `val`:


    ```

    val result = wordSwitch.lookForTarget()

    ```


    Now we need to check that the `text` inside `result` is equal to `b`. That is,
    we would like to make a call such as


    ```

    Assert.assertEquals("b", result.text)

    ```


    However, this code is wrong because `result` is not of type `WordNode`; it is
    of type `WordNode?`. That is, it may be `null`. This is very inconvenient, because
    we know that it should not be `null`: it should be a `WordNode` that has `text`
    equal to `"b"`. Fortunately, Kotlin has a way around the problem. A special operator,
    called the *non-null assertion*, and written `!!` can be added, and then we can
    treat `result` as if it truly is a `WordNode`:


    ```

    Assert.assertEquals("b", result!!.text)

    ```


    We now have the pieces we need in order to test that we can get from `a` to `b`.


    ## PROJECT STEP 13.12


    Create a function in `WordSwitchTest` that tests that `"a"` can be transformed
    to `"b"`. Call the function `a_to_b`.


    ## PROJECT STEP 13.13


    Copy the test function `a_to_b` and modify it to check that the word `"ab"` can
    be transformed to `"ba"`.'
