    `Page1.txt` 并按 `Enter` 键。打开新文件（它甚至可能自动打开），并粘贴从 `PrideAndPrejudice.txt` 复制的文本。


    ![../images/508289_1_En_10_Chapter/508289_1_En_10_Fig6_HTML.jpg](img/508289_1_En_10_Fig6_HTML.jpg)


    图 10-6


    添加新的测试数据文件


