- fmt: '# 14.5 Summary and Solutions to Challenges


    In this chapter, we have developed a basic class for creating images and performing
    simple manipulations of them. In the coming chapters, we will build on the work
    done here. We also introduced some shorthand notation for creating double arrays
    and used it a lot in the creation of pictures of flags. As the book progresses,
    we will use this notation and related concepts a great deal, as they form a really
    important part of Kotlin and of other modern programming languages.


    **SOLUTION 14.1**


    The first image has red and blue at medium intensity, and no green. The second
    image has red, green, and blue all at low intensities. The third image has red
    and green, both at high intensity, and no blue.


    **SOLUTION 14.2**


    The Ukraine flag:


    ```

    fun createPictureOfFlag(): Picture {

    val height = 300

    val width = 450

    val pixels = Array(height) {

    row ->

    if (row < 150) {

    Array(width, { column -> Color(51, 102, 255) })

    } else {

    Array(width, { column -> Color(254, 203, 0) })

    }

    }

    return Picture(pixels)

    }

    ```


    **SOLUTION 14.3**


    The flag of Germany:


    ```

    fun createPictureOfFlag(): Picture {

    val height = 300

    val width = 500

    val pixels = Array(height) {

    row ->

    if (row < 100) {

    Array(width, { column -> Color(0, 0, 0) })

    } else if (row < 200) {

    Array(width, { column -> Color(255, 0, 0) })

    } else {

    Array(width, { column -> Color(255, 212, 0) })

    }

    }

    return Picture(pixels)

    }

    ```


    **SOLUTION 14.4**


    The Italian flag:


    ```

    fun createPictureOfFlag(): Picture {

    val height = 200

    val width = 300

    val pixels = Array(height) {

    row ->

    Array(width) {

    column ->

    if (column < 100) {

    Color(0, 145, 69)

    } else if (column < 200) {

    Color(255, 255, 255)

    } else {

    Color(207, 43, 56)

    }

    }

    }

    return Picture(pixels)

    }

    ```


    **SOLUTION 14.5**


    Here’s the complete code for `Flag.kt` after all of the refactoring:


    ```

    package lpk.imaging


    import java.awt.Color


    fun main() {

    Flag().show()

    }


    class Flag : PictureDisplayer() {

    val white = Color(255, 255, 255)

    val red = Color(255, 0, 0)


    fun createPictureOfFlag(): Picture {

    val height = 400

    val width = 400

    val pixels = Array(height) {

    row ->

    Array(width) {

    column ->

    colorForLocation(row, column)

    }

    }

    return Picture(pixels)

    }


    fun colorForLocation(c: Int, r: Int): Color {

    if (r < 80) return red //top

    if (r > 320) return red //bottom

    if (c < 80) return red //left

    if (c > 320) return red //right

    return white //anything else

    }


    //Don''t change anything below here.

    override fun createPicture(): Picture {

    return createPictureOfFlag()

    }


    fun show() {

    doLaunch()

    }

    }

    ```


    **SOLUTION 14.6**


    Only the `colorForLocation` function needs to be changed:


    ```

    fun colorForLocation(r: Int, c: Int): Color {

    if (c < 80) return red //left

    if (c > 320) return red //right

    if (r < 80) return red //top

    if (r > 320) return red //bottom

    if (c < 240 && r < 240) return red

    if (c > 240 && r > 240) return red

    return white

    }

    ```


    **SOLUTION 14.7**


    ```

    @Test

    fun loadYellowPicture() {

    val file = Paths.get(IMAGES + "yellow_h80_w30.png").toFile()

    val loaded = loadPictureFromFile(file)

    Assert.assertEquals(loaded.height(), 80)

    Assert.assertEquals(loaded.width(), 30)

    val yellow = Color(255, 255, 0)

    for (row in 0..79) {

    for (column in 0..29) {

    Assert.assertEquals(loaded.pixelByRowColumn(row, column), yellow)

    }

    }

    }

    ```


    **SOLUTION 14.8**


    The returned `Picture` has the same height and width as the original. Each pixel
    is black.


    **SOLUTION 14.9**


    Line 2 checks that the `Picture`s have the same height.


    Line 3 checks that they have the same width.


    The rest of the code checks that for each location in the `Picture` being tested,
    the pixel at that location is the same as the pixel in the corresponding location
    in the expected `Picture`.


    **SOLUTION 14.10**


    ```

    fun flipInVerticalAxis(): Picture {

    val pixels = Array(height()) {

    row ->

    Array(width()) {

    column ->

    Color(0, 0, 0)

    }

    }

    return Picture(pixels)

    }

    ```


    **SOLUTION 14.11**


    ```

    @Test

    fun flipInHorizontalAxisTest() {

    val fileGR = Paths.get(IMAGES + "green_red.png").toFile()

    val greenRed = loadPictureFromFile(fileGR)

    val fileRG = Paths.get(IMAGES + "red_green.png").toFile()

    val redGreen = loadPictureFromFile(fileRG)

    val flipped = greenRed.flipInHorizontalAxis()

    checkPicture(flipped, redGreen)

    }

    ```


    **SOLUTION 14.12**


    ```

    fun flipInHorizontalAxis(): Picture {

    val pixels = Array(height()) { row ->

    Array(width()) { column ->

    pixelByRowColumn(height() - 1 - row, column)

    }

    }

    return Picture(pixels)

    }

    ```


    **SOLUTION 14.13**


    This displays the image flipped both vertically and horizontally:


    ```

    override fun createPicture() : Picture {

    val file = Paths.get(IMAGES + "bay.png").toFile()

    return loadPictureFromFile(file).

    flipInVerticalAxis().

    flipInHorizontalAxis()

    }

    ```


    # 15. Pixel Transformations


    In the previous chapter, we introduced a model for on-screen images that allowed
    us to load them from files and to change them by moving their pixels around. In
    this chapter, we will modify images by changing the colors of individual pixels.


    To get started, create a new project in IntelliJ from this repository: [`https://github.com/Apress/learn-to-program-w-kotlin-ch15.git`](https://github.com/Apress/learn-to-program-w-kotlin-ch15.git).
    The downloaded code is much the same as at the end of the previous chapter, but
    some extra image files are included, and the `Flag` class has been removed.'
