    \ in \"abcdefghijklmnopqrstuvwxyz\") {\nif (originalLetter != fromAlphabet) {\n\
    val variant = textBeforePosition + fromAlphabet + textAfterPosition\nif (checker.isPreviouslyUnseenValidWord(variant))\
    \ {\nnodes.add(WordNode(variant))\n}\n}\n}\n}\n```\n\nCompare the lines of code\
    \ in the function with the steps of the algorithm given earlier.\n\nThen replace\
    \ the empty line 7 in Project Step 13.7 with this call to the new function:\n\n\
    ```\naddVariantsAtPosition(i, result, checker)\n```\n\nCheck that, with these\
    \ changes, the tests now pass."
