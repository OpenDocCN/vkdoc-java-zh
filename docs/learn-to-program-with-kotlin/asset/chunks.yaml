    # 6. Values and Variables


    When we are writing a program, we may have a piece of information that will need
    to be referred to from other places in our program. *Values* and *variables* are
    used for this. They are defined using the keywords `val` and `var`, respectively.
    We can think of `val`s and `var`s as boxes containing items of data. A `var` is
    a box from which the data may be removed and replaced with some other data item.
    With a `val`, however, the data item is set once and can never be replaced.


    ## 6.1 Using `vars`


    One common use of `var`s is to store the partial results of a calculation. For
    example, if we want to write a program to add up the numbers from `1` to `10`,
    we can


    *   Create a `var` called `sum`, with an initial value of `0`.


    *   Define a loop with counter `i` that starts at `1` and goes to `10`.


    *   Add `i` to `sum` at each step in the loop.


    Here’s how this algorithm looks as code:


    ```

    1   package lpk.basics


    3   fun main() {

    4       var sum = 0

    5       for (i in 1..10) {

    6           sum = sum + i

    7       }

    8       print(sum)

    9   }

    ```


    Copy this into the `Arithmetic.kt` file that we used in the previous chapter.
    Check that when you run it, the number `55` is printed out.


    The code works as follows. On line 4, we define the `var` called `sum`. The equals
    sign in this line of code actually means “set the data in the `sum` box to be
    `0`.” Line 6 at first seems confusing because `sum` is used on both sides of the
    equals sign. But as in line 4, the equals sign actually means “set the value to.”
    So line 6 is actually interpreted as “replace the contents of the `sum` box with
    the current contents plus `i`.”


    One of the trickiest things about working with variables is the use of `=` for
    setting their values. Some programming languages use `:=` for this job, which
    is less confusing. Remember that to test to see if two objects are equal, we use
    `==`.


    PROGRAMMING CHALLENGE 6.1


    Modify the preceding program to add up the numbers between `1` and `100`.


    Then modify it to add up the numbers between `11` and `20`.


    PROGRAMMING CHALLENGE 6.2


    Now change the program to add up the squares of the numbers between `1` and `10`.
    (The square of a number is that number times itself. Remember to use `*` for multiplication.)


    PROGRAMMING CHALLENGE 6.3


    By using an `if` statement, we can add just the even numbers to the `sum` variable.
    See if you can work out the sum of the even numbers between `0` and `10`.


    PROGRAMMING CHALLENGE 6.4


    The *factorial* of a number is defined as follows:


    *   1 factorial is 1


    *   2 factorial is 2 × 1


    *   3 factorial is 3 × 2 × 1


    and so on. Modify the program for sums to find the factorial of 5.'
