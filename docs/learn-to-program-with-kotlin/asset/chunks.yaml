    ## 11.3 `Term` 类


    一个 `Term` 对象表示任意 `Char` 的排列。该排列可能是也可能不是可以在字典中找到的真实“术语”。以下是首次打开项目时 `Term` 的代码：


    ```

    1   package lpk.anagrams


    3   /**

    4    * 字符的排列，可能

    5    * 是也可能不是一个英文单词。

    6    */

    7   data class Term(val text: String) {


    9       fun permutations(): Set {

    10           val result = mutableSetOf()

    11           return result

    12       }

    13   }

    ```


    这里有一些我们之前没见过的东西。注意，在第 7 行的中间，构造函数是


    ```

    val text: String

    ```


    构造函数参数被标记为 `val`，并且没有显式的 `init` 块。这是 Kotlin 的简写，表示存在一个名为 `text` 的字段，其类型为 `String`，并且被设置为传递给构造函数的那个值。


    还要注意，第 7 行以关键字 `data` 开头。这使得 `Term` 成为一个所谓的*数据类*，Kotlin 会自动添加代码，允许我们使用 `==` 运算符比较
    `Term`。


    项目步骤 11.7


    为了看到实际效果，打开 `TermTest` 类并添加以下内容：


    ```

    1   @Test

    2   fun equalsTest() {

    3       val cat = Term("cat")

    4       val feline = Term("cat")

    5       val dog = Term("dog")

    6       Assert.assertTrue(cat == feline)

    7       Assert.assertFalse(cat == dog)

    8   }

    ```


    在第 3 行和第 4 行，我们声明了 `Term` 实例，分别命名为 `cat` 和 `feline`，它们的 `word` 都是 `String "cat"`。在第
    6 行，我们使用 `==` 运算符比较它们，并期望比较结果为 `true`。


    确认此测试通过。


    确认如果从 `Term` 类的声明中移除 `data` 关键字，测试会失败。


    确保将 `data` 关键字放回去！


    ## 11.4 排列


    *排列*就是重新排列。我们可以排列 `String` 中的 `Char` 来生成其他 `String`。例如，从 `"ab"` 中，我们可以得到 `"ab"`
    本身以及 `"ba"`。从 `"abc"` 中，我们可以得到六种排列：`"abc"`、`"acb"`、`"bca"`、`"bac"`、`"cab"` 和 `"cba"`。如果一个
    `String` 包含重复的 `Char`，那么某些重新排列会与其他排列相同。我们只关心不同的排列。因此，从 `"aab"` 中，我们得到 `"aab"`、`"aba"`
    和 `"baa"`。


    所谓 `Term` 的 `permutations`，是指根据其 `text` 的重新排列构建的 `Term` 的 `Set`。

