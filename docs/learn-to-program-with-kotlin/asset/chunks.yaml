    \ Get a list of digit images from the `DigitFinder`.\n- For each digit image:\n\
    \  - Create a `PictureSummary`.\n  - Pass the `PictureSummary` to the read function,\
    \ to get an `Int`.\n  - Add the `Int` to digits.\n\n### Project Step 21.4\n\n\
    Implement the preceding algorithm in the `init` block of `SpeedReader`. Check\
    \ that the tests for `SpeedReader` all pass.\n\nThis concludes the project—the\
    \ tests prove that our software is successfully reading speed signs. This is a\
    \ fantastic achievement. Well done!\n\nYou may be wondering how “industrial-strength”\
    \ image recognition software is written. Much of the code is fundamentally the\
    \ same as what we have implemented. One of the main differences is that our read\
    \ function, with its delicately chosen cutoffs and particular order of digit selection,\
    \ is replaced by robust statistical models that are built from the analysis of\
    \ thousands of images in a process called “machine learning.”\n\n## 21.4 Summary\n\
    \nIn reading this book and, above all, in doing the challenges and project steps,\
    \ you will have learned the fundamental skills required for serious programming:\n\
    \n- Modeling the real world with object-oriented software\n- Unit testing\n- Functional\
    \ programming\n- Code refactoring\n\nAdditionally, you will have gained experience\
    \ with professional tools such as Git and IntelliJ. Finally, you have learned\
    \ the basic syntax of the beautiful language Kotlin. Good luck with your future\
    \ programming!\n\n## 21.5 Project Steps\n\n### 21.5.1 Details of Project Step\
    \ 21.1\n\nThe new version of `SpeedReader.kt` is\n\n```\npackage lpk.imaging\n\
    import java.io.File\nfun convert(digits: List<Int>): Int {\n    return -1\n}\n\
    class SpeedReader(signImageFile: File) {\n    val digits = mutableListOf<Int>()\n\
    \    init {\n    }\n    fun speed(): Int {\n        return convert(digits)\n \
    \   }\n}\n```\n\n### 21.5.2 Details of Project Step 21.3\n\nHere is the implementation:\n\
    \n```\nfun convertDigits(digits: List<Int>): Int {\n    var total = 0\n    var\
    \ multiplier = 1\n    val n = digits.size\n    for(i in 0..n - 1) {\n        val\
    \ digit = digits[n - i - 1]\n        total = total + digit * multiplier\n    \
    \    multiplier = multiplier * 10\n    }\n    return total\n}\n```"
