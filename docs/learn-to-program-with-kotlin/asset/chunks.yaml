- fmt: '## 14.2 Modeling Pictures


    We will model a picture as an array of rows of pixels, and each row of pixels
    will be modeled as an array of `Color`s. This gives an array of arrays, that is,
    a double array, of `Color`s. In code, this is


    ```

    1   package lpk.imaging


    3   import java.awt.Color


    5   class Picture(val pixels: Array>) {

    6       fun height(): Int {

    7           return pixels.size

    8       }


    10       fun width(): Int {

    11           return pixels[0].size

    12       }


    14       fun pixelByRowColumn(row: Int, column: Int): Color {

    15           return pixels[row][column]

    16       }

    17   }

    ```


    Line 5 shows that a `Picture` is constructed from the double array of `Color`s
    and that the double array passed into the constructor is available within the
    class. That is, it is a field. The `height` function returns the number of elements
    in the double array, which is the number of arrays of `Color`s that are the rows.
    The `width` function returns the number of `Color` objects in the first row. (We
    are assuming that all rows have the same number of pixels.) The `pixelByRowColumn`
    function gives us access to any particular pixel in the image.


