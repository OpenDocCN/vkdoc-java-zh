    ## 16.5 本章小结与挑战题解答


    在本章中，我们编写了用于裁剪和缩小`Picture`的函数。我们利用裁剪函数实现了缩小功能，这极大地简化了原本非常复杂的算法。此外，我们还添加了一个将`Picture`写入文件的函数。在下一章中，我们将使用该函数来保存变换后的图像。


    解答 16.1


    以下是测试代码：


