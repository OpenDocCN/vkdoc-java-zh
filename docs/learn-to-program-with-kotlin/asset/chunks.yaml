    ## 8.2 Sets


    A `Set` is a collection of objects, of which no two are the same. A `Set` does
    not record the order in which the objects were added to it. To create a `Set`,
    we can use the `mutableSetOf` function. As with the `mutableListOf` function,
    we need to pass in a type parameter. So to create a `Set` of `String`s, we use


    ```

    val stringList = mutableSetOf()

    ```


    PROGRAMMING CHALLENGE 8.2


    Change the code from the `List` challenge to the following:


    ```

