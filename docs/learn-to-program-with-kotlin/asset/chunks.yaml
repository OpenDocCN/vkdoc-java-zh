    # 17. Project Dino


    We will finish this part of the book by writing a CGI (computer-generated imagery)
    program using the code developed over the previous three chapters. Our program
    will create a picture of a dinosaur standing in Dove Lake, Tasmania, as shown
    in Figure [17-1](#508289_1_En_17_Chapter.xhtml#Fig1). As well as implementing
    a really interesting algorithm, this project will demonstrate how software engineers
    often have to find the balance between a technically perfect implementation and
    one that is fit for purpose and a lot less work. We will need to solve a lot of
    problems to get a good image, and some of our solutions will be nontechnical.
    This is typical in applied programming.


    ![../images/508289_1_En_17_Chapter/508289_1_En_17_Fig1_HTML.jpg](images/508289_1_En_17_Chapter/508289_1_En_17_Fig1_HTML.jpg)


    Figure 17-1


    The finished image


    The fundamental algorithm that we will use is called “green screen.” It is used
    a lot in film and television. The trick is to take a photo of the dinosaur against
    a background that consists of a single color, which is not present in the dinosaur,
    and then to merge the landscape photo into the dinosaur photo by switching any
    pixels of the screen color with ones from the landscape.


    The source code for the chapter includes landscape and dinosaur photographs, but
    you can easily use your own. The main steps in our CGI project are as follows:


    *   Produce the screen background against which the dinosaur can be photographed.
    This uses techniques from Chapter [14](#508289_1_En_14_Chapter.xhtml).


    *   Take the photo of the dinosaur and then use the thresholding algorithms from
    Chapter [15](#508289_1_En_15_Chapter.xhtml) to correct for various errors.


    *   Write a function that does the selective superposition.


    *   Shrink the image and display it.


    To get started, download the code from [`https://github.com/Apress/learn-to-program-w-kotlin-ch17.git`](https://github.com/Apress/learn-to-program-w-kotlin-ch17.git).


    ## 17.1 Producing the Screen


    The dinosaur that we will use is painted a mixture of colors that includes green.
    This means that using a shade of green as a screen color will not work—parts of
    the dinosaur would get replaced with the background. Instead, we will use magenta.
    It’s best if the screen is a light source, so that there is no shadow when we
    photograph the dinosaur in front of it. A computer screen will do fine. If we
    can lay the screen flat, then we can place the dinosaur on the screen, which makes
    it easy to get the entire model in the photo.


    To turn the computer screen magenta, we can modify the `Flag` program from Chapter
    [14](#508289_1_En_14_Chapter.xhtml) to show a giant rectangle of that color. The
    following code, which is in the file `Flag.kt` in the project source, shows how
    this is done. Note that the flag dimensions must match the screen. If the rectangle
    is too big, the program will probably crash.


    ```

    package lpk.imaging

    import java.awt.Color

    fun main() {

    Flag().doLaunch()

    }

    class Flag : PictureDisplayer() {

    val magenta = Color(255, 0, 255)

    fun createPictureOfFlag(): Picture {

    val height = 2000//Use your screen

    val width = 3000//resolution here!

    val pixels = Array(height) {

    Array(width) {

    magenta

    }

    }

    return Picture(pixels)

    }

    //Don''t change anything below here.

    override fun createPicture(): Picture {

    return createPictureOfFlag()

    }

    }

    ```'
