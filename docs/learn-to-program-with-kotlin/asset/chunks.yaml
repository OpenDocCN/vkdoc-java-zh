    take action as follows:


    | Column | Contains red? | `leftLimit` | `rightLimit` | Action |

    | --- | --- | --- | --- | --- |

    | `0` | `false` | `-1` | `-1` |   |

    | `1` | `false` | `-1` | `-1` |   |

