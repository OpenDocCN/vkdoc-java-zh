    The file `HelloWorldFile.kt` contains the following code:


    ```

    1   package lpk.files


    3   import java.nio.file.Files

    4   import java.nio.file.Paths


    6   fun main() {

    7       val helloWorld = Paths.get("files/HelloWorld.txt")

    8       val strings = Files.readAllLines(helloWorld)

    9       println("strings = $strings")

    10   }

    ```


    As usual, the first line names the package in which this program is located. In
    this chapter, we are working in a package called `lpk.files`. Following the package
    definition, we have a list of `import` statements. As mentioned in Chapter [1](#508289_1_En_1_Chapter.xhtml),
    these are special instructions that tell Kotlin what preexisting programs our
    code will rely on. In our programs dealing with `String`s, `List`s, and so on,
    we have been using classes that are almost always needed, so are made available
    by default. As we write more complex programs, we will rely heavily on other code
    libraries and will therefore use `import` statements almost all the time.


    Line 7 defines a `val`, called `helloWorld`, as the return value of the function
    `Paths.get`. This function is defined in a code library that was written in Java
    (remember that Java is the precursor to Kotlin), which is why we need to include
    a file name (`Paths`) in the function name. The functions that we have used previously,
    such as `mutableListOf`, are “Kotlin native,” so are a little bit easier to use.


    You may be wondering what the data type of `helloWorld` is. Is it an `Int`? A
    `String`? Something else? Good question! In fact, it is a `Path`. We can tell
    this by putting the cursor in or near the word `helloWorld` and pressing `Ctrl`
    and `q` simultaneously. When we do this, a little pop-up is shown that gives information
    about the `val`, including its data type, as shown in Figure [9-2](#508289_1_En_9_Chapter.xhtml#Fig2).
    `Path` is a class that is used to model the file system on a computer. Essentially,
    a `Path` object represents a file or directory (folder).


    ![../images/508289_1_En_9_Chapter/508289_1_En_9_Fig3_HTML.jpg](images/508289_1_En_9_Chapter/508289_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Reloading the `files` directory


    ![../images/508289_1_En_9_Chapter/508289_1_En_9_Fig2_HTML.jpg](images/508289_1_En_9_Chapter/508289_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    The type information pop-up


    When defining a location, we can use either “absolute” or “relative” terms. An
    absolute path is one such as


    `C:\lpk\FilesChapter\files\HelloWorld.txt`


    which defines exactly one location in the machine’s file system. A relative path
    needs to be interpreted with respect to the current location. This is just like
    defining geographical locations. For example, if someone asks us “Where is Bondi
    Beach?” and they are actually in Bondi, we can reply “On Campbell Parade.” However,
    if they are in Jakarta, we might reply “On Campbell Parade in Bondi, Sydney, Australia.”
    On line 7, we are defining a `Path` relative to the `FilesChapter` directory,
    which is the “current location” when running the program in IntelliJ.


    On line 8, the `val helloWorld` is passed as argument to the function called `Files.readAllLines`.
    This is another function from a Java library, which is why the full name, including
    `File`, is used when calling it. The function reads the file at the location described
    by its parameter and returns a `List` of `String`s, with one list entry for each
    line of the file.


    As usual, we can run the program from the menu that shows when we right-click
    the green triangle beside the `main` function. When we do this, we get the list
    of lines printed as a `String`. There is in fact only one line, and the printout
    is


    ```

    strings = [Hello world!]

    ```


