    ## 12.4 总结


    通过基于之前 Anagram 项目的工作，我们成功找出了 1913 年版韦氏词典中列出的所有回文词。这个简短的项目让我们进一步练习了面向对象编程、单元测试以及递归算法的使用。


    本章的完整代码可从 [`https://github.com/Apress/learn-to-program-w-kotlin-palindromes-complete.git`](https://github.com/Apress/learn-to-program-w-kotlin-palindromes-complete.git)
    获取。


    # 13. 单词转换


    如何将“cave”变成“home”？一种方法如下：


    ```

    cave → came → come → home.

    ```


    这就是*单词转换*游戏：选择两个单词，然后看能否通过每次改变一个字母，将其中一个单词转换成另一个，且每次改变后得到的都是有效单词。


    在本章中，我们将编写软件来解决任意两个单词的单词转换问题——如果存在解决方案——并在无解时告知用户。这既是一个有趣的问题，也能让我们进一步练习面向对象编程和单元测试，同时我们还将构建一种新的数据结构，它实际上是递归的。


    ## 13.1 算法


    解决此问题的一种方法是创建单词的“代”，每一代由上一代通过单字母替换生成，并注意记录已生成过的单词。当发现某一代包含目标单词时，过程成功结束。当某一代仅包含之前各代已出现的单词时，过程失败结束。最好通过示例来理解。假设起始单词是
    `fight`，目标单词是 `argue`。


    ### 13.1.1 第一代


    通过改变 `fight` 中任意一个字母可以得到的单词有：


    ```

    bight, dight, eight, hight, light, might,

    night, pight, right, sight, tight, wight

    ```


    这些单词都是新的，但都不是目标单词，因此我们用它们来构建新一代。


    ### 13.1.2 第二代


    第一代中的每个单词都可以变回 `fight`，但那是我们的起始单词，所以已经出现过。除此之外：


    *   从 `bight` 可以得到 `bigot` 和 `bigha`。


    *   从 `dight` 可以得到 `digit`。


    *   从 `eyght` 可以得到 `eight`。


    *   `night` 生成 `noght`。


    *   `tight` 生成 `toght`。


    因此第二代中的新单词是：


    ```

    bigot, bigha, digit, eyght, noght, toght

    ```


    ### 13.1.3 第三代


    在第二代创建的单词中，只能创建两个新单词：`bigot` 生成 `begot`，`digit` 可以变成 `dimit`。


    ### 13.1.4 第四代


    从第三代的新单词中，我们从 `begot` 得到 `besot`、`beget` 和 `begod`，从 `dimit` 得到 `limit` 和 `demit`。


    ### 13.1.5 算法成功终止


    经过多代之后，找到了目标单词 `argue`。生成它的单词是 `argus`。生成 `argus` 的单词是 `argas`，依此类推，逆向追溯，直到 `bigot`，然后到
    `bight`，最后到起始单词 `fight`。完整的单词链是：


    ```

    fight, bight, bigot, begot, beget, reget, revet, levet,

    lever, laver, lager, eager, egger, agger, anger, angor,

    algor, algol, argol, argal, argas, argus, argue

    ```


    ### 13.1.6 算法失败终止


    同样值得看一个算法未找到目标单词而终止的示例。假设起始单词是 `viola`，目标单词是 `cello`。第一代只包含两个新单词：`villa` 和 `viole`。从
    `villa` 可以得到 `viola`（当然）以及新单词 `zilla` 和 `villi`，但 `viole` 无法变成新单词。因此我们有：


    ```

    起始单词: viola

    第一代: villa, viole

    第二代: zilla, villi

    ```


    然而，`zilla` 和 `villi` 都无法变成新单词，因此第三代为空，算法终止。


    ## 13.2 主要类与项目设置


    如示例所示，我们的算法包含三个关键过程。首先，是从现有单词生成新单词的任务。我们将有一个名为 `WordNode` 的类来执行此操作。其次，`WordNode`
    创建的单词需要检查是否有效以及是否之前出现过。这项工作将由名为 `WordChecker` 的类完成。最后，如果找到目标单词，我们需要构建从起始单词到目标单词的“路径”。我们的
    `WordNode` 类除了创建新单词外，还将负责这项工作。


    还需要另外两个类。前几章的 `Dictionary` 将被 `WordChecker` 用来测试潜在新单词的有效性。最后，一个名为 `WordSwitch`
    的类将提供 `main` 函数并实现单词转换算法。


    `WordChecker`、`WordNode` 和 `WordSwitch` 的桩代码及其单元测试已经创建，我们使用与前几章相同的 `Dictionary`
    类和测试。要开始，请打开项目 [`https://github.com/Apress/learn-to-program-w-kotlin-wordswitch.git`](https://github.com/Apress/learn-to-program-w-kotlin-wordswitch.git)。

