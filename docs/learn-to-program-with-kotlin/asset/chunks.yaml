    \ `ac`, and `ad`. So in total we have six variants:\n\n```\naa, ac, ad, bb, cb,\
    \ db\n```\n\nPROJECT STEP 13.6\n\nCopy and paste the entire function `testOneLetterWord`.\n\
    \nRename the copied function to `testTwoLetterWord`.\n\nThen modify the body as\
    \ follows:\n\n*   Instead of creating a `WordNode` from `\"a\"`, create it from\
