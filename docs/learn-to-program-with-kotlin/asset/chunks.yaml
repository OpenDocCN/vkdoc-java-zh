    \ letter and test the resulting `String` using the `checker`. So we ask:\n\n*\
    \   is `\"boat\"` ok,\n*   is `\"bobt\"` ok,\n*   is `\"boct\"` ok,\n*   and so\
    \ on, to\n*   is `\"bozt\"` ok?\n\nThe exception is that we do not bother asking\
