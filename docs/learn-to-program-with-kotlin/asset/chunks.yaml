    \ press `Alt` and the `Enter` keys simultaneously. You should then see the line\n\
    \n```\nimport lpk.imaging.convertDigits\n```\n\nadded among the other `import`\
    \ statements.\n\nCheck that this test fails.\n\n![../images/508289_1_En_21_Chapter/508289_1_En_21_Fig1_HTML.jpg](images/508289_1_En_21_Chapter/508289_1_En_21_Fig1_HTML.jpg)\n\
    \n**Figure 21-1** IntelliJ offers to import the new function\n\nOne way of implementing\
    \ `convertDigits` is as follows:\n\n- Have a running total, called `total`.\n\
    - Have a `var` called `multiplier`, which will always be a power of 10.\n- Run\
    \ through the list backward, and at each step\n  - Multiply the current digit\
    \ by `multiplier`.\n  - Add the result to `total`.\n  - Make `multiplier` ten\
    \ times bigger, ready for the next digit.\n\n### Project Step 21.3\n\nSee if you\
    \ can implement the preceding algorithm.\n\nThe refactoring that we have done\
