    To slice a `Picture` vertically into pieces that each contain red pixels, we can
    work as follows. Starting on the left side, we look for the first column that
    contains a red pixel. When we have found this, we start looking for a column that
    does not contain a red pixel. The columns in between form the first slice. We
    turn this slice into a `Picture` and add it to the result, which is a `List<Picture>`.
    Then we start again, looking for a column containing red pixels, and so on.


    This is best understood with an example. Consider the following `Picture`, which
    has 4 rows and 13 columns of pixels.


