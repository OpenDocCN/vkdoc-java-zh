    ## 7.5 Summary and Solutions to Challenges


    This chapter introduced the hugely important `String` data type. One of the most
    common operations on `String`s is to loop through the characters of it, just as
    can be done with arrays. The expansion of such loops as equivalent code blocks,
    one for each element of the `String`, gives some insight into the nature of loop
    variables.


    **SOLUTION 7.1**


    The output will be just “Kotlin!” on a single line.


    **SOLUTION 7.2**


    When `c` is `''K''`, `numberOfSpaces` is `0`.


    When `c` is `''o''`, `numberOfSpaces` is `1`.


    The inner loop prints out `numberOfSpaces` spaces, one after the other, on a single
    line.


    Running the program gives a printout of `"Kotlin!"` on the diagonal:


    ![../images/508289_1_En_7_Chapter/508289_1_En_7_Figa_HTML.jpg](images/508289_1_En_7_Chapter/508289_1_En_7_Figa_HTML.jpg)


    **SOLUTION 7.3**


    Counting the `''a''`s:


    ```

    package lpk.basics

    fun main() {

    val str = "How long is a piece of string?"

    var count = 0

    for (c in str) {

    if (c == ''a'') {

    count = count + 1

    }

    }

    println("Count: $count")

    }

    ```


    To count the `''a''`s and the `''e''`s, we can use an `or` in our comparison:


    ```

    package lpk.basics

    fun main() {

    val str = "How long is a piece of string?"

    var count = 0

    for (c in str) {

    if (c == ''a'' || c == ''e'') {

    count = count + 1

    }

    }

    println("Count: $count")

    }

    ```


    An alternative is to have two `if` statements:


    ```

    package lpk.basics

    fun main() {

    val str = "How long is a piece of string?"

    var count = 0

    for (c in str) {

    if (c == ''a'') {

    count = count + 1

    }

    if (c == ''e'') {

    count = count + 1

    }

    }

    println("Count: $count")

    }

    ```


    To count the vowels, we can list them all in the `if` statement:


    ```

    package lpk.basics

    fun main() {

    val str = "How long is a piece of string?"

    var count = 0

    for (c in str) {

    if (c == ''a'' || c == ''e'' || c == ''i''|| c == ''o''|| c == ''u'') {

    count = count + 1

    }

    }

    println("Count: $count")

    }

    ```


    Actually, this is incorrect because it is not taking into account uppercase vowels.
    To fix this problem, we can insert a `val` that is the lowercase version of `c`
    and make the comparison against this. To get the lowercase version of a `Char`,
    we call the `toLowerCase` “dot” function on it. (This function is defined on `Char`s
    as well as `String`s.) Here is the corrected code:


    ```

    package lpk.basics

    fun main() {

    val str = "Are we there yet?"

    var count = 0

    for (c in str) {

    val l = c.toLowerCase()

    if (l == ''a'' || l == ''e'' || l == ''i''|| l == ''o''|| l == ''u'') {

    count = count + 1

    }

    }

    println("Count: $count")

    }

    ```


    (And in fact this is still not counting `"y"` as a vowel when it acts as such,
    in a word like “rhythm.”)


    **SOLUTION 7.4**


    ```

    package lpk.basics

    fun main() {

    val str = "Can you understand this?"

    var result = ""

    for (c in str) {

    val l = c.toLowerCase()

    if (l != ''a'' && l != ''e'' && l != ''i'' && l != ''o'' && l != ''u'') {

    result = result + l

    }

    }

    println(result)

    }

    ```


    **SOLUTION 7.5**


    ```

    package lpk.basics

    fun main() {

    val str = "Mind the gap!"

    var compacted = ""

    var previousCharWasASpace = false

    for (c in str) {

    if (c == '' '') {

    if (!previousCharWasASpace) {

    compacted = compacted + c

    }

    previousCharWasASpace = true

    } else {

    compacted = compacted + c

    previousCharWasASpace = false

    }

    }

    println(compacted)

    }

    ```


    **SOLUTION 7.6**


    Here is a version with no loop:


    ```

    package lpk.basics

    fun main() {

    val str = "back"

    var result = ""

    val c_0 = ''b''

    result = result + c_0

    val c_1 = ''a''

    result = result + c_1

    val c_2 = ''c''

    result = result + c_2

    val c_3 = ''k''

    result = result + c_3

    println(result)

    }

    ```


    **SOLUTION 7.7**


    The values that `result` takes on are `b`, `ba`, `bac`, and `back`.


    With the symbols around the plus signs switched, the values that `result` takes
    on are `b`, `ab`, `cab`, and `kcab`. Here is a `String` reversal program:


    ```

    package lpk.basics

    fun main() {

    val str = "That''s weird!"

    var reversed = ""

    for (c in str) {

    reversed = c + reversed

    }

    println(reversed)

    }

    ```


    # 8. Data Structures


    Suppose that we go on a bird-watching expedition and want to keep a record of
    the birds that we see. We might wish to answer the following questions:


    - What types of birds did we see?

    - In what order did we see them?

    - How many times were the different species seen?


    In this chapter, we will look at the tools that Kotlin provides for answering
    these kinds of questions.'
