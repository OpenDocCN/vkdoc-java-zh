- fmt: '# 16.2 Improving the Unit Tests


    In writing the second unit test for `cropTo`, we copied an existing test and then
    modified the code slightly. Now that our implementation of `cropTo` is working,
    we should go back and fix this code duplication.


    The last seven lines of both `cropToRedSquare` and `cropToBlueRectangle` are essentially
    identical. They check the height and width of the image and then check that each
    pixel is `expectedColor`. Here’s a function that makes exactly these checks:


    ```

    fun checkSingleColorPicture(picture: Picture, expectedColor: Color, expectedHeight:
    Int, expectedWidth: Int) {

    Assert.assertEquals(picture.height(), expectedHeight)

    Assert.assertEquals(picture.width(), expectedWidth)

    for (row in 0..expectedHeight - 1) {

    for (column in 0..expectedWidth - 1) {

    Assert.assertEquals(picture.pixelByRowColumn(row, column), expectedColor)

    }

    }

    }

    ```


    Copy this code into `PictureTest` and then change `cropToRedSquare` to use it:


    ```

    @Test

    fun cropToRedSquare() {

    val tiles100 = load("red_blue_tiles_50.png")

    val cropped = tiles100.cropTo(0, 0, 50, 50)

    val expectedColor = Color(255, 0, 0)

    checkSingleColorPicture(cropped, expectedColor, 50, 50)

    }

    ```


    **PROGRAMMING CHALLENGE 16.4**


    Make similar changes to `cropToBlueRectangle`.


    With these changes, our code is a lot less verbose and easier to understand and
    maintain. You may ask why we didn’t extract the `checkSingleColorPicture` function
    before copying `cropToRedSquare` and so avoid the duplication from the beginning.
    The reason is that in programming it isn’t always immediately clear what the correct
    abstractions are, but once we have found them, it is easy to refactor the code.


    # 16.3 Shrinking an Image


    Suppose that we have an image with 200 rows of pixels, and each row has 300 pixels
    in it, and that we want to shrink this by a factor of 2. The result will contain
    100 rows of 150 pixels. Blocks of pixels in the original image get merged into
    single pixels in the smaller image. In this section, we will describe and implement
    algorithms for shrinking `Picture`s.


    As a working example, consider the following `Picture` of a friendly black dog
    against a green background. This picture has 9 rows and 12 columns of pixels.


    ![../images/508289_1_En_16_Chapter/508289_1_En_16_Figb_HTML.png](images/508289_1_En_16_Chapter/508289_1_En_16_Figb_HTML.png)


    The first step in shrinking the image by a factor of 2 is to break it into 2-by-2
    blocks:


    ![../images/508289_1_En_16_Chapter/508289_1_En_16_Figc_HTML.png](images/508289_1_En_16_Chapter/508289_1_En_16_Figc_HTML.png)


    The pixels in the bottom row will be discarded, as they do not fit into complete
    blocks. The shrunken form of the image has a pixel for each block, and the color
    of that pixel is the average of the colors of the pixels in the block:


    ![../images/508289_1_En_16_Chapter/508289_1_En_16_Figd_HTML.png](images/508289_1_En_16_Chapter/508289_1_En_16_Figd_HTML.png)


    Consider now a particular block of pixels:


    ![../images/508289_1_En_16_Chapter/508289_1_En_16_Fige_HTML.png](images/508289_1_En_16_Chapter/508289_1_En_16_Fige_HTML.png)


    This block is just a double array of `Color`s, that is, a `Picture`, and it can
    be obtained by applying the `cropTo` function that we developed in Section [16.1](#508289_1_En_16_Chapter.xhtml#Sec1).


    To apply `cropTo`, we need to know the location of the top left-hand corner of
    the block. It is three blocks across from the left-hand side, so the column number
    is 3 × 2 = 6, because each block is 2-by-2. The block is two blocks down from
    the top, so the row number is 2 × 2 = 4. The other parameters required by `cropTo`
    are the width and height of the sub-`Picture`, and these are both 2. Thus, the
    red block can be obtained as the return of


    ```

    cropTo(2 * 2, 3 * 2, 2, 2)

    ```


    **PROGRAMMING CHALLENGE 16.5**


    Remember that the `height` function tells us the number of rows of pixels in a
    `Picture`. If we break a `Picture` into square blocks with side length `sideLength`,
    how many rows of blocks are there?


    How many columns of blocks are in each block row?


    Consider the block in row `blockRow` and `blockColumn` of the blocks. How can
    we get this as a `Picture` using the `cropTo` function?


    The solutions to the previous challenge give us the essentials of a function for
    breaking a `Picture` into blocks:


    ```

    fun chopIntoSquares(sideLength: Int): Array> {

    val resultRows = height() / sideLength

    val resultColumns = width() / sideLength

    val result = Array(resultRows) { blockRow ->

    Array(resultColumns) { blockColumn ->

    cropTo(

    blockRow * sideLength, blockColumn * sideLength,

    sideLength, sideLength

    )

    }

    }

    return result

    }

    ```


    Copy this function into `Picture`.


    **PROGRAMMING CHALLENGE 16.6**


    The file `red_blue_green.png` in the test resources directory is shown in Figure
    [16-3](#508289_1_En_16_Chapter.xhtml#Fig3). The red and blue squares are 50-by-50
    pixels, and the green border at the right and bottom sides is 8 pixels wide.


    ![../images/508289_1_En_16_Chapter/508289_1_En_16_Fig3_HTML.jpg](images/508289_1_En_16_Chapter/508289_1_En_16_Fig3_HTML.jpg)


    Figure 16-3


    Test image for `chopIntoSquares`


    Suppose that we break this into 10-by-10 blocks.


    How many rows of blocks will there be?


    How many columns of blocks?


    Are any of the green pixels included in any of the blocks?


    Describe the colors of the blocks.


    The ideas from this challenge form the basis of the following test:'
