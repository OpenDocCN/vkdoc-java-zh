    the `Char`s in them, one by one, from the first to the last, just as we can with
    the elements of an `Array`. To see how this works, copy the following code into
    your `Strings.kt` file:


    ```

    1   package lpk.basics


    3   fun main() {

    4       val str = "Kotlin!"

    5       for (c in str) {

    6           println(c)

    7       }

    8   }

    ```


    Line 4 defines a `val` called `str`, just like we saw in earlier programs. The
    next line introduces a `for`-loop in which there is a loop `val` called `c`. The
    body of the loop, which here is just a `println` call, is executed once for each
    of the `Char`s in `str`. If we run this program, we get the characters of `"Kotlin!"`
    printed out, one per line, as shown in Figure [7-2](#508289_1_En_7_Chapter.xhtml#Fig2).


    ![../images/508289_1_En_7_Chapter/508289_1_En_7_Fig2_HTML.jpg](images/508289_1_En_7_Chapter/508289_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    By iterating through the characters in a `String`, we can print it vertically


