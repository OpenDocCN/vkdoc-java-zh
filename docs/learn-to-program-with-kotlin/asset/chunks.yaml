  raw: '## 1.3 Installing Git


    Git is a program that is used to share source code between programmers. All of
    the code in this book can be obtained using Git. This is extremely convenient,
    but the downside is that we need to install another piece of software. To begin,
    visit [`https://git-scm.com/`](https://git-scm.com/). From this site, download
    the version for your operating system. Running the installer is a pretty lengthy
    process, as there are lots of screens that present different setup options. Just
    accept the default options at each screen.


    ## 1.4 Installing IntelliJ


    A good code editor is extremely helpful in avoiding and correcting errors in programs.
    IntelliJ is the best code editor for Kotlin and is very popular with professional
    programmers. We will be using the “Community Edition” of the tool, which is free
    for noncommercial use. IntelliJ can be downloaded from the JetBrains website,
    [`www.jetbrains.com/idea/`](https://www.jetbrains.com/idea/), and the installation
    process is simple and well documented.


    ## 1.5 Our First Program


    Our first program is available from a Git repository that can be opened with IntelliJ.
    The IntelliJ tool for opening a Git repository is available from the “Welcome
    to IntelliJ IDEA” screen shown in Figure [1-2](#508289_1_En_1_Chapter.xhtml#Fig2).


    ![../images/508289_1_En_1_Chapter/508289_1_En_1_Fig2_HTML.jpg](images/508289_1_En_1_Chapter/508289_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    The IntelliJ welcome screen


    To get the first program:


    ![../images/508289_1_En_1_Chapter/508289_1_En_1_Fig3_HTML.jpg](images/508289_1_En_1_Chapter/508289_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    The IntelliJ dialog for getting a Git repository


    1.  Click the **Get from VCS** button.


    2.  Wait for the “Get from Version Control” dialog, shown in Figure [1-3](#508289_1_En_1_Chapter.xhtml#Fig3),
    to show.


    3.  Copy this address: [`https://github.com/Apress/learn-to-program-w-kotlin-basics.git`](https://github.com/Apress/learn-to-program-w-kotlin-basics.git)
    into the **URL** field.


    4.  Create a new directory, also known as a “folder” in Windows, and copy the
    location into the **Directory** field.


    5.  Press the **Clone** button.


    After some time, which depends on your Internet connection and computer speed,
    IntelliJ will present the downloaded project, as in Figure [1-4](#508289_1_En_1_Chapter.xhtml#Fig4).
    In the bottom right-hand corner, there might be a pop-up (not shown here) asking
    about adding files to Git. Just click the **Don’t ask again option**.


    ![../images/508289_1_En_1_Chapter/508289_1_En_1_Fig4_HTML.jpg](images/508289_1_En_1_Chapter/508289_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    The project in IntelliJ. This part of the IntelliJ user interface is called the
    project tree. It contains the source files for our programs


    The upper left-hand side of this screen has what is called the project tree. We
    will use this later to locate our first program and run it. The project tree can
    be shown or hidden by pressing the `Alt` and `1` keys at the same time. If, for
    whatever reason, the project tree is not showing, use this key combination to
    reveal it. If that does not work, use the menu `Windows` ➤ `Restore Default Layout`
    to put things right.


    ## 1.6 Changing the Appearance of IntelliJ


    As with many programs, the appearance of IntelliJ is configurable. This is done
    by selecting a visual “theme.” The default theme uses the dark colors that can
    be seen in the preceding screenshots—in fact, the theme is called “Darcula.” To
    change the theme, use the menu `File` ➤ `Settings` to display the Settings dialog.
    Then select **Appearance** in the tree on the left of the settings screen. The
    **Theme** drop-down has a number of built-in themes from which you can select
    one you like, as shown in Figure [1-5](#508289_1_En_1_Chapter.xhtml#Fig5). In
    the interests of producing clearer screenshots, I will be using the “IntelliJ
    Light” theme from now on, as shown.


    ![../images/508289_1_En_1_Chapter/508289_1_En_1_Fig5_HTML.jpg](images/508289_1_En_1_Chapter/508289_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Setting the visual theme


    ## 1.7 Troubleshooting


    If IntelliJ was installed before Git, you may get an error message about the path
    to the Git executable not being found. This can generally be fixed by setting
    the path within IntelliJ. To do this, choose `File` ➤ `Settings` and then select
    `Git` under the `Version Control` heading, as in Figure [1-6](#508289_1_En_1_Chapter.xhtml#Fig6).
    The **Test** button in the top right-hand corner can be used to check that IntelliJ
    knows where Git is installed. If this test fails, you may need to adjust the setup
    in IntelliJ by changing the **Path to Git executable** value.


    ![../images/508289_1_En_1_Chapter/508289_1_En_1_Fig7_HTML.jpg](images/508289_1_En_1_Chapter/508289_1_En_1_Fig7_HTML.jpg)


    Figure 1-7


    The program is run by clicking the green triangle


    ![../images/508289_1_En_1_Chapter/508289_1_En_1_Fig6_HTML.jpg](images/508289_1_En_1_Chapter/508289_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Configuring Git in IntelliJ


    ## 1.8 Running Our First Program


    By clicking the folder icons (they look like > signs) in the project tree, you
    should be able to navigate to the file `FirstProgram.kt`. Double-click this to
    open it in the main editor pane. To run the program, click the little green triangle
    at line 7 of the program text. A pop-up will show, with the option **Run ‘FirstProgramKt’**.
    Select this option.


    After a half-minute or so of background activity, you should see an application
    frame with a pattern of black and white squares. Congratulations! You’ve got the
    first program running! If you click the small cross at the upper right-hand corner,
    the display will close and the program will terminate.


    ![../images/508289_1_En_1_Chapter/508289_1_En_1_Fig8_HTML.jpg](images/508289_1_En_1_Chapter/508289_1_En_1_Fig8_HTML.jpg)


    Figure 1-8


    Our first program shows a simple pattern of black and white tiles'
  trans: '

    ## 1.3 安装 Git


    Git 是一个用于在程序员之间共享源代码的程序。本书中的所有代码都可以通过 Git 获取。这非常方便，但缺点是我们需要额外安装一个软件。首先，请访问 [`https://git-scm.com/`](https://git-scm.com/)。在此网站上下载适用于您操作系统的版本。运行安装程序的过程相当漫长，因为会有许多屏幕显示不同的设置选项。只需在每个屏幕上接受默认选项即可。


    ## 1.4 安装 IntelliJ


    一个好的代码编辑器对于避免和纠正程序中的错误非常有帮助。IntelliJ 是 Kotlin 的最佳代码编辑器，深受专业程序员的欢迎。我们将使用该工具的“社区版”，该版本对非商业用途免费。IntelliJ
    可以从 JetBrains 网站 [`www.jetbrains.com/idea/`](https://www.jetbrains.com/idea/)
    下载，安装过程简单且文档齐全。


    ## 1.5 我们的第一个程序


    我们的第一个程序可以从一个 Git 仓库获取，该仓库可以用 IntelliJ 打开。用于打开 Git 仓库的 IntelliJ 工具可以从图 1-2 所示的“欢迎使用
    IntelliJ IDEA”屏幕中找到。


    ![../images/508289_1_En_1_Chapter/508289_1_En_1_Fig2_HTML.jpg](img/508289_1_En_1_Fig2_HTML.jpg)


    图 1-2


    IntelliJ 欢迎屏幕


    要获取第一个程序：


    ![../images/508289_1_En_1_Chapter/508289_1_En_1_Fig3_HTML.jpg](img/508289_1_En_1_Fig3_HTML.jpg)


    图 1-3


    用于获取 Git 仓库的 IntelliJ 对话框


    1.  点击 **从版本控制获取** 按钮。


    2.  等待图 1-3 所示的“从版本控制获取”对话框出现。


    3.  将此地址 [`https://github.com/Apress/learn-to-program-w-kotlin-basics.git`](https://github.com/Apress/learn-to-program-w-kotlin-basics.git)
    复制到 **URL** 字段中。


    4.  创建一个新目录（在 Windows 中也称为“文件夹”），并将该路径复制到 **目录** 字段中。


    5.  点击 **克隆** 按钮。


    一段时间后（取决于您的网络连接和计算机速度），IntelliJ 将显示下载好的项目，如图 1-4 所示。在右下角，可能会弹出一个窗口（此处未显示），询问是否将文件添加到
    Git。只需点击 **不再询问** 选项。


    ![../images/508289_1_En_1_Chapter/508289_1_En_1_Fig4_HTML.jpg](img/508289_1_En_1_Fig4_HTML.jpg)


    图 1-4


    IntelliJ 中的项目。IntelliJ 用户界面的这一部分称为项目树。它包含我们程序的源文件


    此屏幕的左上角是所谓的项目树。稍后我们将使用它来定位并运行我们的第一个程序。可以通过同时按下 `Alt` 和 `1` 键来显示或隐藏项目树。如果由于某种原因项目树没有显示，请使用此组合键将其显示出来。如果这不起作用，请使用菜单
    `窗口` ➤ `恢复默认布局` 来恢复正常。


    ## 1.6 更改 IntelliJ 的外观


    与许多程序一样，IntelliJ 的外观是可配置的。这是通过选择视觉“主题”来完成的。默认主题使用前面截图中可以看到的深色——实际上，这个主题叫做“Darcula”。要更改主题，请使用菜单
    `文件` ➤ `设置` 来显示设置对话框。然后在设置屏幕左侧的树中选择 **外观**。**主题** 下拉菜单中有许多内置主题，您可以选择一个喜欢的，如图 1-5
    所示。为了生成更清晰的截图，从现在开始我将使用“IntelliJ Light”主题，如图所示。


    ![../images/508289_1_En_1_Chapter/508289_1_En_1_Fig5_HTML.jpg](img/508289_1_En_1_Fig5_HTML.jpg)


    图 1-5


    设置视觉主题


    ## 1.7 故障排除


    如果在安装 Git 之前安装了 IntelliJ，您可能会收到一条错误消息，提示找不到 Git 可执行文件的路径。通常可以通过在 IntelliJ 中设置路径来解决此问题。为此，请选择
    `文件` ➤ `设置`，然后在 `版本控制` 标题下选择 `Git`，如图 1-6 所示。可以使用右上角的 **测试** 按钮来检查 IntelliJ 是否知道
    Git 的安装位置。如果此测试失败，您可能需要通过更改 **Git 可执行文件路径** 的值来调整 IntelliJ 中的设置。


    ![../images/508289_1_En_1_Chapter/508289_1_En_1_Fig7_HTML.jpg](img/508289_1_En_1_Fig7_HTML.jpg)


    图 1-7


    通过点击绿色三角形来运行程序


    ![../images/508289_1_En_1_Chapter/508289_1_En_1_Fig6_HTML.jpg](img/508289_1_En_1_Fig6_HTML.jpg)


    图 1-6


    在 IntelliJ 中配置 Git


    ## 1.8 运行我们的第一个程序


    通过点击项目树中的文件夹图标（它们看起来像 > 符号），您应该能够导航到 `FirstProgram.kt` 文件。双击该文件以在主编辑窗格中打开它。要运行程序，请点击程序文本第
    7 行的绿色小三角形。将出现一个弹出窗口，其中包含选项 **运行 ''FirstProgramKt''**。选择此选项。


    大约半分钟的后台活动后，您应该会看到一个带有黑白方块图案的应用程序窗口。恭喜！您已经成功运行了第一个程序！如果您点击右上角的小叉号，显示窗口将关闭，程序将终止。


    ![../images/508289_1_En_1_Chapter/508289_1_En_1_Fig8_HTML.jpg](img/508289_1_En_1_Fig8_HTML.jpg)


    图 1-8


    我们的第一个程序显示了一个简单的黑白瓷砖图案

