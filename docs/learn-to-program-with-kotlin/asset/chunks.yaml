    # Part I: Basics


    In Part I, we set up Kotlin and learn the most important features of the language.


    # 1. Getting Started


    In this chapter, we set up our programming environment and get our first program
    running.


    ## 1.1 What Is Programming?


    A computer program is a set of instructions that tell a computer to perform an
    action such as showing an image or printing out some text.


    These instructions are written using special sets of words and symbols, called
    programming languages. In this book, we are going to use a language called Kotlin.
    Kotlin is quite new and is closely related to another language, called Java, which
    is extremely popular in industry and in universities around the world. While Java
    is an excellent language, it is over 20 years old, which is ancient in computing
    terms. Additionally, since Java was first developed, there have been many improvements
    in programming that Kotlin takes advantage of. These improvements mean that Kotlin
    programs tend to be simpler than their Java equivalents, and many sources of mistakes
    are avoided outright.


    Unlike human beings, computers do not understand vague instructions and are not
    able to move beyond the simple typographical errors that we easily make. This
    can make programming a very frustrating task, as even tiny mistakes, such as a
    missing comma, can stop an otherwise perfect program from working. To avoid these
    problems, some introductory programming books use very simple languages or even
    Lego-style visual programming tools in which syntax errors are not possible.


    We’ve decided to stick with Kotlin in this book because by learning it you will
    be gaining skills in a language that is the first choice for thousands of other
    programmers and can be used to program lots of different kinds of devices, such
    as personal computers (obviously), Android devices, microcomputers, and so on.
    Also, there are lots of code samples that can be found for solving particular
    problems.


    To handle the problems brought about by the complexity of a full-powered language,
    we will work by modifying existing programs using a code editor that highlights
    errors and offers sensible corrections.


    ## 1.2 Installing Java


    As mentioned before, Kotlin is related to an older language called Java. In fact,
    in order to write and run Kotlin programs, we will need to install the programming
    tools for Java. These are bundled as what is called the *Java Development Kit*
    or *Java Platform*, or *JDK*, which is a free download from Oracle at the site
    [`www.oracle.com/java/technologies/javase-downloads.html`](https://www.oracle.com/java/technologies/javase-downloads.html).
    On this page, shown in Figure [1-1](#508289_1_En_1_Chapter.xhtml#Fig1), click
    the “JDK Download” link. This will take you to a page that provides download links
    for a variety of operating systems. Choose the one that suits your system and
    download and install the software.


    ![../images/508289_1_En_1_Chapter/508289_1_En_1_Fig1_HTML.jpg](images/508289_1_En_1_Chapter/508289_1_En_1_Fig1_HTML.jpg)


    Figure 1-1: The Java download site. Click the “JDK Download” link'
