    \ a function `isInTopBar` to `Regions`.\n\nAlso, add a test for this in `RegionsTest`.\n\
    \n**Project Step 20.2**\n\nAdd a val `hasTopBar` to `PictureSummary` and calculate\
    \ it in the `init` block. You can do this by copying and modifying each line of\
    \ code relating to `hasBottomBar`.\n\nFor an image, the top bar and bottom bar\
