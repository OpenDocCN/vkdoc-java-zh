    Actually, this is incorrect because it is not taking into account uppercase vowels.
    To fix this problem, we can insert a `val` that is the lowercase version of `c`
    and make the comparison against this. To get the lowercase version of a `Char`,
    we call the `toLowerCase` “dot” function on it. (This function is defined on `Char`s
    as well as `String`s.) Here is the corrected code:


    ```

    package lpk.basics

    fun main() {

    val str = "Are we there yet?"

    var count = 0

    for (c in str) {

    val l = c.toLowerCase()

    if (l == ''a'' || l == ''e'' || l == ''i''|| l == ''o''|| l == ''u'') {

    count = count + 1

    }

    }

