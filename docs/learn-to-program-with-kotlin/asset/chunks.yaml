    # Part III Images


    Images


    In Part III, we learn the fundamentals of Functional Programming by writing software
    that manipulates images.


    # 14. Color Pictures


    In this chapter, we will return to programs that display images. We will begin
    by showing simple color patterns such as national flags. Then we will see how
    to load image files such as photographs. Finally, we will write code that does
    simple image manipulations, such as flipping them in the vertical axis.


    ## 14.1 Modeling Color


    Computer screens display images by producing huge numbers of tiny colored dots
    called *pixels*. (The word “pixels” is short for “picture cells.”) On many modern
    screens, these dots are too small to be seen with the naked eye, but they are
    generally visible on large television screens.


    If you do get a look at a screen that has relatively large pixels, you might see
    that each pixel itself consists of tiny red, green, and blue subpixels. (You can
    see the subpixels on some phone screens if a raindrop is on the screen, acting
    as a magnifier.) Because these screens emit light, they can produce any color
    by combining red, green, and blue values at different intensities. In Figure [14-1](#508289_1_En_14_Chapter.xhtml#Fig1),
    on the following page, Figure [14-1a](#508289_1_En_14_Chapter.xhtml#Fig1) is pure
    red at a low intensity, whereas Figure [14-1b](#508289_1_En_14_Chapter.xhtml#Fig1)
    is a mixture of equal parts green and blue, both at high intensity.


    ![../images/508289_1_En_14_Chapter/508289_1_En_14_Fig1_HTML.png](images/508289_1_En_14_Chapter/508289_1_En_14_Fig1_HTML.png)


    Figure 14-1


    Combining red, green, and blue to create different colors


    PROGRAMMING CHALLENGE 14.1


    For each of the following squares, give a rough indication (low, medium, or high)
    of the intensity of red, green, and blue used.


    ![../images/508289_1_En_14_Chapter/508289_1_En_14_Figa_HTML.png](images/508289_1_En_14_Chapter/508289_1_En_14_Figa_HTML.png)


    To model real-world colors, we will be using a class called `java.awt.Color`.
    In this model, a color is represented as a trio of `Int`s between `0` and `255`,
    one each for the red, green, and blue components. In the rust-colored image shown
    in Figure [14-1a](#508289_1_En_14_Chapter.xhtml#Fig1), red has a value of `127`,
    and both green and blue have value `0`. The turquoise image has a red value of
    `0` and green and blue values of `255`. We can construct `Color` objects by passing
    in the respective red, green, and blue components. For example, the rusty red
    is `Color(127, 0, 0)`, and the turquoise is `Color(0, 255, 255)`. If the red,
    green, and blue values are the same, we get a shade of gray. At one extreme, with
    all values `0`, this is black. White is `Color(255, 255, 255)`.


    By the way, there are two `"Color"` classes in the standard Java libraries: `java.awt.Color`
    and `javafx.scene.paint.Color`. Package names really are important, and if your
    programs won’t compile, there is a chance that it is because the `import` statements
    are bringing the wrong `Color` class in.'
