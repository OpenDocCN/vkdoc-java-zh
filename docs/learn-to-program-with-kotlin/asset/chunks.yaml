- fmt: '# 10.12 Putting Things in Order


    The histograms that we can create contain a lot of information about the books
    that they summarize, but not in a form that is immediately useful. We can scroll
    through the list of words and their frequencies, but we cannot easily find the
    most commonly used words, nor can we see the words in alphabetical order.


    We could write code to implement these requirements directly, but a better solution
    is to write the data to a file that can be opened in a spreadsheet application
    such as Microsoft Excel or Google Sheets.


    Both of these programs, and many others, can import data that is in what is called
    Comma-Separated Variable (CSV) format. In CSV, each row of spreadsheet data is
    written on a single line. Within lines, commas separate the values for each column,
    for example:


    ```

    wickham''s,32

    permit,1

    suitable,3

    ```


