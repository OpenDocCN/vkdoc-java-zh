    ## 15.5 章节总结与挑战题解答


    在本章中，我们编写了将一种`Color`转换为另一种`Color`的函数。通过将这些函数作为参数传递给遍历图像中所有像素的函数，我们以多种有趣的方式修改了图像。这种将函数本身作为参数传递给其他函数的编程风格被称为*函数式编程*。自计算诞生之初，函数式编程语言就已存在。然而，函数式编程是在过去十年左右才变得非常流行。许多现代语言，如
    Kotlin，都结合了函数式和面向对象的特性。


    解答 15.1


    以下代码在显示图像之前调用了`makeRed`：


    ```

    override fun createPicture(): Picture {

    val file = Paths.get(IMAGES + "bay.png").toFile()

    return loadPictureFromFile(file).makeRed()

    }

    ```


    解答 15.2


    这是一个将图像变为绿色的函数：


    ```

    fun makeGreen(): Picture {

    val pixelsRed = Array(height()) { row ->

    Array(width()) { column ->

    val pixel = pixelByRowColumn(row, column)

    Color(0, pixel.green, 0)

    }

    }

    return Picture(pixelsRed)

    }

    ```


    解答 15.3


    以下是`makeBlue`函数：


    ```

    fun makeBlue() : Picture {

    val makePixelBlue = {it : Color -> Color(0, 0, it.blue)}

    return transform(makePixelBlue)

    }

    ```


    解答 15.4


    要应用`makeMess`函数，请在`PhotoDisplayer`中对`createPicture`进行如下修改：


    ```

    override fun createPicture(): Picture {

    val file = Paths.get(IMAGES + "bay.png").toFile()

    return loadPictureFromFile(file).makeMess()

    }

    ```


    你应该会得到一张看起来像图 15-7 的图像。


    ![../images/508289_1_En_15_Chapter/508289_1_En_15_Fig7_HTML.jpg](img/508289_1_En_15_Fig7_HTML.jpg)


    图 15-7


    应用了`makeMess`的海湾


    解答 15.5


    该变换将`Picture`转换为灰度图。我们可以通过将其封装在一个函数中来使用它：


    ```

    fun makeGray() : Picture {

    val function = {it : Color ->

    val average = (it.red + it.green + it.blue)/3

    Color(average, average, average)

    }

    return transform(function)

    }

    ```


    然后在`PhotoDisplayer`中应用它：


    ```

    override fun createPicture(): Picture {

    val file = Paths.get(IMAGES + "bay.png").toFile()

    return loadPictureFromFile(file).makeGray()

    }

    ```


    有趣的是，“工业级”的灰度算法会使用不同比例的红色、绿色和蓝色，因为我们的眼睛天生对某些颜色比其他颜色更敏感。


    解答 15.6


    代码如下：


    ```

    override fun createPicture(): Picture {

    val file = Paths.get(IMAGES + "waratah.jpg").toFile()

    val keepRed = { it: Color ->

    if (it.red > 180) {

    it

    } else {

    val average = (it.red + it.green + it.blue) / 3

    Color(average, average, average)

    }

    }

    return loadPictureFromFile(file).transform(keepRed)

    }

    ```


    解答 15.7


    完整的函数如下：


    ```

    override fun createPicture(): Picture {

    val file = Paths.get(IMAGES + "skatingminister.png").toFile()

    val makeBlackPurple = { it: Color ->

    if (it.red + it.green + it.blue < 140) {

    val halfGreen = it.green / 2

    Color(it.red + halfGreen, 0, it.blue + halfGreen)

    } else {

    it

    }

    }

    return loadPictureFromFile(file).transform(makeBlackPurple)

    }

    ```


    解答 15.8


    变换如下：


    *   `Color(224, 67, 160)` → `Color(224, 64, 160)`


    *   `Color(239, 89, 172)` → `Color(224, 64, 160)`


    *   `Color(255, 97, 204)` → `Color(224, 96, 196)`


    这种变换减少了图像中使用的颜色数量。


    解答 15.9


    代码如下：


    ```

    override fun createPicture(): Picture {

    val file = Paths.get(IMAGES + "ladyagnew.png").toFile()

    val approximater = { it: Color ->

    Color((it.red / 32) * 32,

    (it.green / 32) * 32,

    (it.blue / 32) * 32

    )

    }

    return loadPictureFromFile(file).transform(approximater)

    }

    ```


    解答 15.10


    将黑条放在左侧：


    ```

    fun blackBar(): Picture {

    val blackAtSide = { row: Int, column: Int

    ->

    val originalPixel = pixelByRowColumn(row, column)

    if (column < 50) {

    Color(0, 0, 0)

    } else {

    originalPixel

    }

    }

    return transformByPosition(blackAtSide)

    }

    ```


    解答 15.11


    将黑条放在两侧：


    ```

    fun blackBar(): Picture {

    val borderWidth = 50;

    val blackAtSide = { row: Int, column: Int

    ->

    val originalPixel = pixelByRowColumn(row, column)

    val color = if (column < borderWidth ||

    width() - column < borderWidth

    ) {

    Color(0, 0, 0)

    } else {

    originalPixel

    }

    color

    }

    return transformByPosition(blackAtSide)

    }

    ```


    解答 15.12


    代码如下：


    ```

    override fun createPicture(): Picture {

    val file = Paths.get(IMAGES + "cradlemt.png").toFile()

    return loadPictureFromFile(file).darkBorder()

    }

    ```


    解答 15.13


    要获得非常暗的边框：


    ```

    fun darkBorder(): Picture {

    val borderWidth = 50

    val darkSides = { row: Int, column: Int

    ->

    val originalPixel = pixelByRowColumn(row, column)

    val isInBorder =

    row  height() - borderWidth ||

    column < borderWidth ||

    width() - column < borderWidth

    if (isInBorder) {

    originalPixel.darker().darker()

    } else {

    originalPixel

    }

    }

    return transformByPosition(darkSides)

    }

    ```


    # 16. 裁剪与调整图像大小


    在前两章中，我们通过重新排列像素或应用颜色变换来转换图像。现在，我们将研究改变图像大小的操作，无论是通过提取子图像，还是通过合并像素来生成原始图像的压缩版本。我们还将学习如何将变换后的图像保存到文件。本章的代码可以从[`https://github.com/Apress/learn-to-program-w-kotlin-ch16.git`](https://github.com/Apress/learn-to-program-w-kotlin-ch16.git)获取。此代码包含我们熟悉的`Picture`类，但移除了前几章引入的变换。

    '
- fmt: '## 16.1 Cropping


    The operation of taking a part of an image and producing a new image from it is
    called *cropping*. Figure [16-1](#508289_1_En_16_Chapter.xhtml#Fig1) shows an
    example. To crop a `Picture`, we need to specify the row and column at which the
    extracted `Picture` begins, plus the number of rows and columns in it. Each of
    these parameters is an `Int`. A good name for the function is `cropTo`, and the
    `Picture` class in the downloaded code for this chapter already contains a stub
    implementation:


    ![../images/508289_1_En_16_Chapter/508289_1_En_16_Fig1_HTML.png](images/508289_1_En_16_Chapter/508289_1_En_16_Fig1_HTML.png)


    Figure 16-1


    A photo and a cropped version of it


    ```

    1   fun cropTo(rowAt: Int, columnAt: Int, h: Int, w: Int): Picture {

    2       val cropArray = Array(1) {

    3           row ->

    4           Array(1) {

    5               column ->

    6               Color(0, 0, 0)

    7           }

    8       }

    9       return Picture(cropArray)

    10   }

    ```


    Let’s have a quick look at this to review our understanding of Kotlin syntax:


    - Line 1 defines the function name (`cropTo`), the list of parameters (four `Int`s),
    and the return type (`Picture`).

    - On line 2, we define a `val` called `cropArray`, which is an array that has
    `1` row.

    - On line 4, we define the first (and only) row of `cropArray` as being an `Array`
    that has just one element.

    - On line 6, we define the single element to be a black `Color` object.

    - On line 9, we build a `Picture` from the double array and return it.

    - Lines 3 and 5 define parameters for the initialization functions. The arrow
    syntax `row ->` defines a function that takes an arbitrary row index as input
    and returns the array built on line 4. Similarly, `column ->` defines a function
    that takes an arbitrary column index and returns the black pixel created on line
    6. When we define functions like this, with arrows pointing to code blocks, we
    are using what is called *lambda notation*.


    So this stub implementation produces a `Picture` that consists of a single black
    pixel.


    Before replacing this stub with a correct implementation, we will write a test.
    Our tests use a simple `Picture` that can be cropped to easily described sub-`Picture`s.
    Figure [16-2a](#508289_1_En_16_Chapter.xhtml#Fig2) shows the test image. It has
    100 rows and columns. If we crop this image at position `(0, 0)` with 50 rows
    and 50 columns in the cropped image, then the result should be a red square with
    side length 50. If we crop it at position `(50, 10)` with `h = 10` and `w = 20`,
    then the result should be a blue rectangle of height 10 and width 20. Finally,
    if we crop it at position `(25, 25)` and set both `h` and `w` to be `50`, then
    the result should be a 50-by-50 version of the original image, as shown in Figure
    [16-2b](#508289_1_En_16_Chapter.xhtml#Fig2).


    ![../images/508289_1_En_16_Chapter/508289_1_En_16_Fig2_HTML.jpg](images/508289_1_En_16_Chapter/508289_1_En_16_Fig2_HTML.jpg)


    Figure 16-2


    Test images


    The first of these scenarios corresponds to the following test function, which
    is already in `PictureTest`:


    ```

    1   @Test

    2   fun cropToRedSquare() {

    3       val tiles100 = load("red_blue_tiles_50.png")

    4       val cropped = tiles100.cropTo(0, 0, 50, 50)

    5       val expectedColor = Color(255, 0, 0)

    6       Assert.assertEquals(cropped.height(), 50)

    7       Assert.assertEquals(cropped.width(), 50)

    8       for (row in 0..49) {

    9           for (column in 0..49) {

    10               Assert.assertEquals(cropped.pixelByRowColumn(row, column), expectedColor)

    11           }

    12       }

    13   }

    ```


    Line 1 of this code uses the `load` function in `PictureTest` to load the image
    into a `val` called `tiles100`. On line 4, the `cropTo` function is called with
    both `row` and `column` being `0` and `h` and `w` being `50`. The return value
    from this function call is assigned to a `val` called `cropped`. The remainder
    of the test consists of assertions about `cropped`: line 6 checks that it is the
    right height, line 7 checks the width, and the double loops beginning on line
    8 check that each pixel is red.


    ### PROGRAMMING CHALLENGE 16.1


    Let’s write a test corresponding to the blue rectangle scenario.


    - Copy the function `cropToRedSquare` and rename the copied function `cropToBlueRectangle`.

    - Change the call to `cropTo` so that the starting point has row `50` and column
    `10` and so that there are `10` rows and `20` columns in the cropped image.

    - Change the `expectedColor` to be blue rather than red.

    - Check that the height of the cropped image is `10`.

    - Check that the width of the cropped image is `20`.

    - Change the outer loop to run from `0` to `9`.

    - Make a similar change to the inner loop.


    When you run this new test, it should fail.


    The third scenario, applying the `cropTo` at a central location, has already been
    written as a test function in `PictureTest`:


    ```

    @Test

    fun cropCenter() {

    val tiles100 = load("red_blue_tiles_50.png")

    val cropped = tiles100.cropTo(25, 25, 50, 50)

    val expected = load("red_blue_tiles_25.png")

    checkPicture(expected, cropped)

    }

    ```


    This test loads our familiar tile pattern image and then crops it at the point
    `(25, 25)` to a square of side length `50`. Then the test loads a pre-prepared
    image that is what the cropped image should look like. The final line of the test
    is to compare the expected image with the actual image, using a function called
    `checkPicture` in `PictureTest`.


    ### PROGRAMMING CHALLENGE 16.2


    Have a look at `checkPicture`.


    What does the first line do?


    What does the second line do?


    The last section of the function consists of nested loops. What does this code
    do?


    To help us understand image cropping, it’s very useful to have a particular example
    in mind. We will use the following multicolor square as our working example. This
    has seven pixels per side and is being cropped at position `row=2,column=3`. (Remember
    that rows and column indexes are zero based and that the top left hand of the
    square is `(0,0)`.) The sub-image has two rows and three columns: `height=2,width=3`.


    ![../images/508289_1_En_16_Chapter/508289_1_En_16_Figa_HTML.png](images/508289_1_En_16_Chapter/508289_1_En_16_Figa_HTML.png)


    The cropped image is shown to the right of the square. Let’s look at some of the
    pixels in this image and see what pixels they correspond to in the original.


    | **Pixel** | **Location in result** | **Location in original** |

    | --- | --- | --- |

    | Yellow at top left | `row=0, column=0` | `row=2, column=3` |

    | Green in top row | `row=0, column=1` | `row=2, column=4` |

    | Green in second row | `row=1, column=0` | `row=3, column=3` |


    The pattern, as code, is as follows. If we crop at position `(rowAt, columnAt)`,
    then the pixel at a given `row` and `column` in the result is in the original.


    ```

    pixelByRowColumn(rowAt + row, columnAt + column)

    ```


    ### PROGRAMMING CHALLENGE 16.3


    Let’s fix the stub implementation of `cropTo`.


    On the first line, we currently create an array with `1` row. How many rows should
    there be in the cropped picture? Change the `1` to this value.


    The third line creates an array with `1` column. Correct this.


    Replace the current sixth line with the formula given earlier.


    With these changes, the three tests should pass. If not, use the solution to this
    challenge to correct your code.'
