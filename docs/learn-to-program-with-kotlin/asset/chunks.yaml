    \nFigure 13-3\n\nThe refactor menu\n\nA small window will appear with a number\
    \ of options, as shown in Figure [13-4](#508289_1_En_13_Chapter.xhtml#Fig4). From\
    \ these options, choose `Function`. A fairly complex dialog with various options,\
    \ plus a preview of the changes, will be shown, as in Figure [13-5](#508289_1_En_13_Chapter.xhtml#Fig5).\
    \ Just press **OK**.\n\n![../images/508289_1_En_13_Chapter/508289_1_En_13_Fig5_HTML.jpg](images/508289_1_En_13_Chapter/508289_1_En_13_Fig5_HTML.jpg)\n\
