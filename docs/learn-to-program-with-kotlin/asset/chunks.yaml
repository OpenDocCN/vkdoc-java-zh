    # 9. The File System


    Computers can store information on a wide variety of hardware, such as magnetic
    disks, thumb drives, optical drives, and so on. To save programmers from having
    to write code that is specific to each storage device, operating systems present
    an abstraction called the *file system* . In turn, Kotlin provides us with the
    tools we need in order to be able to explore the files on a computer and read
    and write information. In this chapter, we will make use of some of these tools
    to read and write text files.


    In this chapter, we are using a new project in IntelliJ. To download this, use
    the menu sequence `File` ➤ `New` ➤ `Project from Version Control` ➤ `Git`. As
    in Chapter [1](#508289_1_En_1_Chapter.xhtml), a **Clone Repository** dialog should
    be shown. Copy the address [`https://github.com/Apress/learn-to-program-w-kotlin-files.git`](https://github.com/Apress/learn-to-program-w-kotlin-files.git)
    into the **Git Repository URL** field, choose a destination directory, and click
    the **Clone** button.


    Again, as in Chapter [1](#508289_1_En_1_Chapter.xhtml), you may be presented with
    an almost entirely empty screen. If so, follow the same tricks as on page 6 to
    show the project file tree. As well as a Kotlin program called `HelloWorldFile.kt`,
    there should be several text files, as shown in Figure [9-1](#508289_1_En_9_Chapter.xhtml#Fig1).


    ![../images/508289_1_En_9_Chapter/508289_1_En_9_Fig1_HTML.jpg](images/508289_1_En_9_Chapter/508289_1_En_9_Fig1_HTML.jpg)


