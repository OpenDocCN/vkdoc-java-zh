    # 9. 文件系统


    计算机可以在各种硬件上存储信息，例如磁盘、U 盘、光驱等。为了使程序员不必为每种存储设备编写特定的代码，操作系统提供了一种称为*文件系统*的抽象。反过来，Kotlin
    为我们提供了探索计算机上的文件以及读写信息所需的工具。在本章中，我们将使用其中一些工具来读写文本文件。


    在本章中，我们将在 IntelliJ 中使用一个新项目。要下载它，请使用菜单序列 `File` ➤ `New` ➤ `Project from Version
    Control` ➤ `Git`。与第 1 章一样，应该会显示一个**克隆仓库**对话框。将地址 [`https://github.com/Apress/learn-to-program-w-kotlin-files.git`](https://github.com/Apress/learn-to-program-w-kotlin-files.git)
    复制到 **Git Repository URL** 字段中，选择一个目标目录，然后单击 **Clone** 按钮。


    同样，与第 1 章一样，你可能会看到一个几乎完全空白的屏幕。如果是这样，请按照第 6 页上的相同技巧来显示项目文件树。除了一个名为 `HelloWorldFile.kt`
    的 Kotlin 程序外，还应该有几个文本文件，如图 9-1 所示。


