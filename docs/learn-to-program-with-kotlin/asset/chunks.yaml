    ```

    fun isInCenter(row: Int, column: Int): Boolean {

    if (isInTopQuarter(row)) return false

    if (isInBottomQuarter(row)) return false

    if (isInLeftQuarter(column)) return false

    if (isInRightQuarter(column)) return false

