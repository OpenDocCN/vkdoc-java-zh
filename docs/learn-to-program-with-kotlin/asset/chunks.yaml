  raw: '## 15.4 Position-Based Transformations


    The transformations that we have seen so far have the signature


    ```

    (Color) -> (Color)

    ```


    That is, they take an input `Color` and change it to an output `Color`. Consider
    the two images of Cradle Mountain shown in Figure [15-6](#508289_1_En_15_Chapter.xhtml#Fig6).
    The original image has been transformed using a function that darkens the border
    pixels. The formula for such a transformation needs not just the original `Color`
    but also the location of the pixel, that is, its `row` and `column` positions.
    A possible signature is


    ![../images/508289_1_En_15_Chapter/508289_1_En_15_Fig6_HTML.jpg](images/508289_1_En_15_Chapter/508289_1_En_15_Fig6_HTML.jpg)


    Figure 15-6


    A transformation of the pixels according to their position


    ```

    ((Color), (Int), (Int)) -> (Color)

    ```


    The `Color` parameter in this signature is the pixel at the given `row` and `column`.
    This can actually be obtained from the image itself, so is redundant information.
    That is, we can achieve a border effect such as in Figure [15-6b](#508289_1_En_15_Chapter.xhtml#Fig6)
    using a function with signature


    ```

    ((Int), (Int)) -> (Color)

    ```


    Let’s see how.


    Copy the following code into the `Picture` class:


    ```

    fun transformByPosition(

    pixelTransformation: ((Int), (Int)) ->

    (Color)

    ): Picture {

    val transformed = Array(height()) { row ->

    Array(width()) { column ->

    pixelTransformation(row, column)

    }

    }

    return Picture(transformed)

    }

    ```


    This function builds a double array of `Color`s, representing the transformed
    pixels. The values in the array are set using the function `pixelTransformation`,
    which is passed in as a parameter. It will help our understanding of this new
    code to put it to work straight away. Rather than attempting anything really tricky,
    let’s just see if we can change the top of an image to be a black bar. Copy this
    code into `Picture`:


    ```

    1   fun blackBar(): Picture {

    2       val blackAtTop = { row: Int, column: Int

    3           ->

    4           val originalPixel = pixelByRowColumn(row, column)

    5           if (row < 50) {

    6               Color(0, 0, 0)

    7           } else {

    8               originalPixel

    9           }

    10       }

    11       return transformByPosition(blackAtTop)

    12   }

    ```


    Then change the `createPicture` function in `PhotoDisplayer` to be


    ```

    override fun createPicture(): Picture {

    val file = Paths.get(IMAGES + "cradlemt.png").toFile()

    return loadPictureFromFile(file).blackBar()

    }

    ```


    Running `PhotoDisplayer` should show the image of Cradle Mountain with a black
    bar across the top. The `blackBar` function works as follows. On line 2, we declare
    a `val` which is our transformation function. It has two `Int` parameters, which
    are the `row` and `column`. On line 4, we get the pixel of the image being transformed
    at the current `row` and `column`. Line 5 decides whether or not this pixel is
    in one of the first 50 rows of the image. If it is, `Color(0, 0, 0)` is used,
    line 6\. Otherwise, the original value is applied.


    PROGRAMMING CHALLENGE 15.10


    Change the `blackBar` function so that just the left-hand edge of the image becomes
    all black.


    PROGRAMMING CHALLENGE 15.11


    A single black bar on the left-hand side looks terrible. See if you can change
    your code to put bars at both the left- and right-hand edges.


    We’d like to produce the image shown in Figure [15-6b](#508289_1_En_15_Chapter.xhtml#Fig6),
    which has borders that are slightly darkened versions of the background, not just
    black. There is actually a library function that will do this recoloring for us.
    The function is called `darker`, and we can apply it as follows:


    ```

    1   fun darkBorder(): Picture {

    2       val borderWidth = 50

    3       val darkSides = { row: Int, column: Int

    4           ->

    5           val originalPixel = pixelByRowColumn(row, column)

    6           val isInBorder = column < borderWidth || width() - column <

    7                   borderWidth

    8           if (isInBorder) {

    9               originalPixel.darker()

    10           } else {

    11               originalPixel

    12           }

    13       }

    14       return transformByPosition(darkSides)

    15   }

    ```


    Line 6 calculates whether a pixel is within either the left or right border zone.
    If it is, then on line 8, the `darker` function is applied. The function `darker`
    returns a `Color` from an input `Color`.


    PROGRAMMING CHALLENGE 15.12


    Change the `PhotoDisplayer.createPicture` function to call `darkBorder` before
    displaying the Cradle Mountain photo.


    If you run `PhotoDisplayer`, you will notice that the dark bars at the edges are
    not as dark as in Figure [15-6b](#508289_1_En_15_Chapter.xhtml#Fig6). To fix this,
    we can change line 8 of `darkBorder` to call `darker` twice:


    ```

    originalPixel.darker().darker()

    ```


    To add the border at the top, we need to change the definition of `isInBorder`
    to include those in the first `borderWidth` rows:


    ```

    val isInBorder = row < borderWidth || column < borderWidth || width() - column
    < borderWidth

    ```


    PROGRAMMING CHALLENGE 15.13


    Can you modify the preceding line of code so that the pixels near the lower edge
    are included in the border?


    With the `darkBorder` function as in the solution to Challenge 15.13, the displayed
    image should at last be as we want.'
