- fmt: '# 4.1 If-Else Statements


    Consider the pattern in Figure [4-1](#508289_1_En_4_Chapter.xhtml#Fig1). There
    are eight rows and columns, and the tiles are either black or white. All of the
    white tiles are below the diagonal that goes from the top-left to the bottom-right
    corner.


    ![../images/508289_1_En_4_Chapter/508289_1_En_4_Fig1_HTML.jpg](images/508289_1_En_4_Chapter/508289_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    A pattern produced using if-else logic


    What might the corresponding `getTileColors` code be? Something like this, perhaps:


    ```

    fun getTileColors() : Array> {

    CODE TO INITIALIZE AN 8-BY-8 ARRAY

    FOR EACH ROW

    FOR EACH COLUMN

    IF BELOW DIAGONAL

    shades[row][column] = WHITE

    ELSE

    shades[row][column] = BLACK

    RETURN ARRAY

    }

    ```


    To implement this algorithm, we need to be able to decide whether an arbitrary
    cell is below the top-to-bottom diagonal. Consider a cell with coordinates `[row][column]`.
    If `row` and `column` are the same, then the cell is on the diagonal. If `column`
    is greater than `row`, then the cell is to the right and above the diagonal. If,
    however, `row` is greater than `column`, the cell is to the bottom and to the
    left of the diagonal. You can check these statements by looking at actual cells
    in the image. For example, where is cell `[5][3]`? Where is cell `[3][5]`? Using
    this fact, we can rewrite the algorithm as


    ```

    fun getTileColors() : Array> {

    CODE TO INITIALIZE AN 8-BY-8 ARRAY

    FOR EACH ROW

    FOR EACH COLUMN

    if (row > column) {

    shades[row][column] = WHITE

    } else {

    shades[row][column] = BLACK

    }

    RETURN ARRAY

    }

    ```


    To turn this into Kotlin code, we need to


    1. Implement the code for initializing the array

    2. Replace the `FOR EACH` pseudo-code with `for`-loops

    3. Use the correct values for white and black

    4. Write a proper `return` statement


    The result is


    ```

    fun tileColors(): Array> {

    val shades = Array(8) {

    Array(8) { 0 }

    }

    for (row in 0..7) {

    for (column in 0..7) {

    if (row > column) {

    shades[row][column] = 255

    } else {

    shades[row][column] = 0

    }

    }

    }

    return shades

    }

    ```


    Tip


    As with the previous chapter, there’s a file in the project tree: `chapter4_code_to_copy.txt`
    from which this and other code can be copied.


