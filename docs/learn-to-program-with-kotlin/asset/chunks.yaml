- fmt: '# 1.3 Installing Git


    `Git` is a program that is used to share source code between programmers. All
    of the code in this book can be obtained using `Git`. This is extremely convenient,
    but the downside is that we need to install another piece of software. To begin,
    visit [`https://git-scm.com/`](https://git-scm.com/). From this site, download
    the version for your operating system. Running the installer is a pretty lengthy
    process, as there are lots of screens that present different setup options. Just
    accept the default options at each screen.


    # 1.4 Installing IntelliJ


    A good code editor is extremely helpful in avoiding and correcting errors in programs.
    `IntelliJ` is the best code editor for `Kotlin` and is very popular with professional
    programmers. We will be using the “Community Edition” of the tool, which is free
    for noncommercial use. `IntelliJ` can be downloaded from the `JetBrains` website,
    [`www.jetbrains.com/idea/`](https://www.jetbrains.com/idea/), and the installation
    process is simple and well documented.


    # 1.5 Our First Program


    Our first program is available from a `Git` repository that can be opened with
    `IntelliJ`. The `IntelliJ` tool for opening a `Git` repository is available from
    the “Welcome to IntelliJ IDEA” screen shown in Figure [1-2](#508289_1_En_1_Chapter.xhtml#Fig2).


    ![../images/508289_1_En_1_Chapter/508289_1_En_1_Fig2_HTML.jpg](images/508289_1_En_1_Chapter/508289_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    The IntelliJ welcome screen


    To get the first program:


    ![../images/508289_1_En_1_Chapter/508289_1_En_1_Fig3_HTML.jpg](images/508289_1_En_1_Chapter/508289_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    The IntelliJ dialog for getting a Git repository


    1.  Click the `Get from VCS` button.

    2.  Wait for the “Get from Version Control” dialog, shown in Figure [1-3](#508289_1_En_1_Chapter.xhtml#Fig3),
    to show.

    3.  Copy this address: [`https://github.com/Apress/learn-to-program-w-kotlin-basics.git`](https://github.com/Apress/learn-to-program-w-kotlin-basics.git)
    into the `URL` field.

    4.  Create a new directory, also known as a “folder” in Windows, and copy the
    location into the `Directory` field.

    5.  Press the `Clone` button.


    After some time, which depends on your Internet connection and computer speed,
    `IntelliJ` will present the downloaded project, as in Figure [1-4](#508289_1_En_1_Chapter.xhtml#Fig4).
    In the bottom right-hand corner, there might be a pop-up (not shown here) asking
    about adding files to `Git`. Just click the `Don’t ask again` option.


    ![../images/508289_1_En_1_Chapter/508289_1_En_1_Fig4_HTML.jpg](images/508289_1_En_1_Chapter/508289_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    The project in IntelliJ. This part of the IntelliJ user interface is called the
    project tree. It contains the source files for our programs


    The upper left-hand side of this screen has what is called the project tree. We
    will use this later to locate our first program and run it. The project tree can
    be shown or hidden by pressing the `Alt` and `1` keys at the same time. If, for
    whatever reason, the project tree is not showing, use this key combination to
    reveal it. If that does not work, use the menu `Windows` ➤ `Restore Default Layout`
    to put things right.


    # 1.6 Changing the Appearance of IntelliJ


    As with many programs, the appearance of `IntelliJ` is configurable. This is done
    by selecting a visual “theme.” The default theme uses the dark colors that can
    be seen in the preceding screenshots—in fact, the theme is called “Darcula.” To
    change the theme, use the menu `File` ➤ `Settings` to display the Settings dialog.
    Then select `Appearance` in the tree on the left of the settings screen. The `Theme`
    drop-down has a number of built-in themes from which you can select one you like,
    as shown in Figure [1-5](#508289_1_En_1_Chapter.xhtml#Fig5). In the interests
    of producing clearer screenshots, I will be using the “IntelliJ Light” theme from
    now on, as shown.


    ![../images/508289_1_En_1_Chapter/508289_1_En_1_Fig5_HTML.jpg](images/508289_1_En_1_Chapter/508289_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Setting the visual theme


