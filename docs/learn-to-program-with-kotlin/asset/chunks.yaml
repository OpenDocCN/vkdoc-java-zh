    **Hint** This is similar to the space removal program, but we need a `var` that
    remembers whether or not the previous `Char` was a space. This `var` can be called
    `previousCharWasSpace`. Its values are either `true` or `false`. The initial value
    of it is `false`. A type that is either `true` or `false` is called a Boolean.


    ## 7.4 More on `String` Iteration


    Consider this simple program:


    ```

    package lpk.basics

    fun main() {

    val str = "abc"

    for (c in str) {

    println(c)

    }

    }

    ```


    The Kotlin system treats this as if it were written:


    ```

    package lpk.basics

    fun main() {

    val str = "abc"

    val c_0 = ''a''

    println(c_0)

    val c_1 = ''b''

    println(c_1)

    val c_2 = ''c''

    println(c_2)

    }

    ```


    This is why we can talk about `c` as a `val` in a loop such as


    ```

    for (c in str) {

    //Loop body. c is a val here.

    }

    ```


    **PROGRAMMING CHALLENGE 7.6**


    Consider this program:


    ```

    package lpk.basics

    fun main() {

    val str = "back"

    var result = ""

    for (c in str) {

    result = result + c

    }

    println(result)

    }

    ```


    Write an equivalent “long form” version of this program that does not use a loop.


    **PROGRAMMING CHALLENGE 7.7**


    The solution to the previous challenge is a program in which a `var` called `result`
    is initialized (created) as an empty `String` and then reset four times. For each
    reset, write on a piece of paper the value before and after the reset.


    Each of the resets is of the form


    ```

    result = result + c_0

    ```


    What happens if we switch the order of the `String`s in the `+` operations? That
    is, if we change them to put the next `Char` before `result`:


    ```

    result = c_0 + result

    ```


    Write out “before” and “after” values for `result` with these switched resets.


