    这是一个*超级困难*的算法，包含嵌套循环，所以像往常一样，不必担心一次就能完全理解。事实上，这是本书最难的部分。


    ## 13.10 寻找路径


    此时，我们的 `WordSwitch` 程序可以判断一个单词是否能转换为另一个单词，但它无法告诉我们转换过程中的单词序列。为了获取这些信息，我们将为每个 `WordNode`
