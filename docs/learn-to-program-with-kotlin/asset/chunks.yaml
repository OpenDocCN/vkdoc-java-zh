    Assert.assertTrue(Term("aa").isPalindrome())

    Assert.assertTrue(Term("aaa").isPalindrome())

    Assert.assertTrue(Term("madam").isPalindrome())

    Assert.assertFalse(Term("ab").isPalindrome())

    }

    ```


