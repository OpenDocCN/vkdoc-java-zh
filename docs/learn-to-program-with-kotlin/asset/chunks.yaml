    ## 5.2 Division


    With addition, subtraction, and multiplication, we combine two integers in a simple
    way to produce another integer. Division is more complicated because it is not
    always possible to divide one number into another. Division by 0 is not defined.
    And how do we divide 13 by 4 to obtain another integer? In programming, division
    of whole numbers is handled by two operations: `/` and `%`.


    By `x / y`, we mean the number of times that `y` goes completely into `x`. For
    example, `8/3` is `2` and `8/4` is also `2`.


    By `x` `%` `y`, we mean the remainder after dividing `x` by `y`. For example,
    `8 % 3` is `2` and `8 % 4` is `0`. To see these operations in action, run the
    following program:


    ```

    1   package lpk.basics


    3   fun main() {

    4       for (i in 1..20) {

    5           val div = i / 5

    6           val rem = i % 5

    7           println("i: $i, div: $div, rem: $rem")

    8       }

    9   }

    ```


    Line 4 sets up a `for`-loop with variable `i` that goes from `1` to `20`. On line
    5, we define a `val` called `div`, which is set to be the integer part of `i`
    divided by `5`. The next line defines a `val`, called `rem`, which is the remainder
    after dividing `i` by `5`. On line 7, we print out `i` and the two `val`s. The
    result of our program begins:


    ![../images/508289_1_En_5_Chapter/508289_1_En_5_Figb_HTML.jpg](images/508289_1_En_5_Chapter/508289_1_En_5_Figb_HTML.jpg)


    ## 5.3 Making Patterns Using Arithmetic


    We can modify our tiles program to produce patterns using the arithmetical operations.
    For example, let’s change the `getTileColors` function in `FirstProgram` to


    ```

    1   fun tileColors(): Array> {

    2       val shades = Array(16) {

    3           Array(16) { 0 }

    4       }

    5       for (row in 0..15) {

    6           for (col in 0..15) {

    7               shades[row][col] = row * col

    8           }

    9       }

    10       return shades

    11   }

    ```


    We get the pattern shown in Figure [5-6](#508289_1_En_5_Chapter.xhtml#Fig6). Notice
    that this contains 16 rows and columns.


    ![../images/508289_1_En_5_Chapter/508289_1_En_5_Fig6_HTML.jpg](images/508289_1_En_5_Chapter/508289_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    A pattern in which the tile shade is obtained by multiplying its row index by
    its column index


    These dimensions are set up on lines 2 and 3\. The pattern is symmetrical about
    the diagonal between the top-left and bottom-right corners. This is because the
    reflection of cells in this diagonal has the effect of swapping row and column
    coordinates. For example, consider the cell with row 5 and column 3\. The reflection
    of this cell in the diagonal has row 3 and column 5\. Since 5 times 3 is 3 times
    5, these cells will have the same shade of gray. The cells along the first row
    and the first column are all black because 0 times any other number is 0.


    Now let’s use the remainder operation, `%`, to build the pattern of alternating
    black and white rows shown in Figure [5-7](#508289_1_En_5_Chapter.xhtml#Fig7).


    ![../images/508289_1_En_5_Chapter/508289_1_En_5_Fig7_HTML.jpg](images/508289_1_En_5_Chapter/508289_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    A pattern in which the tile shade is either black or white depending on the remainder
    of the row index divided by `2`


    The code that produces this is


    ```

    1   fun tileColors(): Array> {

    2       val shades = Array(16) {

    3           Array(16) { 0 }

    4       }

    5       for (row in 0..15) {

    6           for (col in 0..15) {

    7               val remainder = row % 2

    8               if (remainder == 0) {

    9                   shades[row][col] = 0

    10               } else {

    11                   shades[row][col] = 255

    12               }

    13           }

    14       }

    15       return shades

    16   }

    ```


