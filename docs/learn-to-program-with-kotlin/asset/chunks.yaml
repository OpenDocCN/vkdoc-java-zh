    If `IntelliJ` was installed before `Git`, you may get an error message about the
    path to the `Git` executable not being found. This can generally be fixed by setting
    the path within `IntelliJ`. To do this, choose `File` ➤ `Settings` and then select
    `Git` under the `Version Control` heading, as in Figure [1-6](#508289_1_En_1_Chapter.xhtml#Fig6).
