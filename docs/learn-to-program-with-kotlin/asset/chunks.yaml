  raw: '# 12. Palindromes


    A palindrome is a word that is the same whether written forward or backward, for
    example, “kayak.” In this chapter, we will find all English words that are palindromes.
    This will give us further practice with object-oriented programming, unit testing,
    and recursion.


    The classes we developed in the previous chapter are a great starting point for
    this project. Our implementation strategy will be based on adding an `isPalindrome`
    function to the `Term` class. We will then write a `main` function that loops
    through the words in the dictionary, creates `Term`s from them, and then filters
    these using `isPalindrome`.


    To get started, use IntelliJ to check out the completed code from Chapter [11](#508289_1_En_11_Chapter.xhtml),
    which is available from [`https://github.com/Apress/learn-to-program-w-kotlin-anagrams-complete.git`](https://github.com/Apress/learn-to-program-w-kotlin-anagrams-complete.git).


    ## 12.1 Reversing a **Term**


    To implement `isPalindrome`, we will need code to reverse a `Term`. As usual,
    we will add a stub of the function, write a test, and then go back and implement
    it properly.


    PROJECT STEP 12.1


    Copy this stub code into `Term`:


    ```

    fun reverse() : Term {

    returnTerm("")

    }

    ```


    PROJECT STEP 12.2


    The following test checks that if we apply `reverse` to `"ab"`, we get `"ba"`
    as the result:


    ```

    @Test

    fun reverseTest() {

    Assert.assertEquals(Term("ba"), Term("ab").reverse())

    }

    ```


    This is a good start for a unit test, but we should also add lines to check the
    results when we reverse


    *   An empty `Term`


    *   A `Term` with just one letter


    *   `Term`s with three or four letters


    *   A `Term` that has some repeated letters.


    See if you can add lines for these tests.


    After this step, `TermTest` should include a test function along the lines of


    ```

    @Test

    fun reverseTest() {

    Assert.assertEquals(Term(""), Term("").reverse())

    Assert.assertEquals(Term("a"), Term("a").reverse())

    Assert.assertEquals(Term("ba"), Term("ab").reverse())

    Assert.assertEquals(Term("cba"), Term("abc").reverse())

    Assert.assertEquals(Term("aabb"), Term("bbaa").reverse())

    }

    ```


    Of course, you may have made separate tests for each of these assertions or have
    other differences.


    One of the programming challenges in Chapter [7](#508289_1_En_7_Chapter.xhtml)
    was to reverse a `String`, and we can use that code to implement `reverse`:


    ```

    fun reverse() : Term {

    var result =""

    for (c in text) {

    result = c + result

    }

    returnTerm(result)

    }

    ```


    PROJECT STEP 12.3


    Replace the stub implementation with that shown earlier. Check that with this
    change, the unit test passes.


    PROJECT STEP 12.4


    There’s actually a library function for `String` reversal. Replace your implementation
    of `reverse` with this:


    ```

    fun reverse() : Term {

    returnTerm(text.reversed())

    }

    ```


    Check that the unit test still passes.


    We already have two different implementations of `reverse`; now we’ll look at
    a recursive implementation, as it is good practice in this essential programming
    technique.


    A recursive approach to Term reversal begins with two basis steps:


    *   The reverse of the empty `Term` is itself.


    *   The reverse of a `Term` with just one letter is itself.


    These steps are in fact checked in our unit test. Now consider a longer word,
    such as `"abcde"`. This word can be broken into three parts:


    *   The first `Char`, which is `a`


    *   The last `Char`, which is `e`


    *   A word of length three in the middle, which is `"bcd"`


    To form the reverse, we start with `e`, then add the reverse of the middle section,
    then add a. How do we get the reverse of the middle section? By applying recursion!


    PROJECT STEP 12.5


    Replace the current version of `reverse` with this:


    ```

    1   fun reverse() : Term {

    2       val length = text.length

    3       //If the word is empty or just one letter,

    4       //it is its own reverse.

    5       if (length < 2) {

    6           return this

    7       }

    8       //Get the first and last characters and the

    9       //inner word formed by the letters in between.

    10       val first = text[0]

    11       val last = text[length - 1]

    12       val inner = Term(text.substring(1, length - 1))

    13       //Use recursion to get the reverse of the inner word.

    14       val reverseOfInner = inner.reverse().text

    15       //Put the three pieces together to form the result.

    16       val newText = last + reverseOfInner + first

    17       return Term(newText)

    18   }

    ```


    Check that the unit tests still pass.


    There are a couple of points worth noting about this code. First, on line 2, we
    have introduced a `val`, called `length`, which stores the length of the `Term`’s
    `text`. This is a convenience so that we don’t need to call `text.length` on lines
    4, 10, and 11\. Second, on line 11, we have used the `substring` function of `String`
    to get the inner part of the text.


    PROJECT STEP 12.6


    To see the recursion in action, add the following printout as the first line of
    `reverse`:


    ```

    println(text)

    ```


    Now add a new test function:


    ```

    @Test

    fun abcdeTest() {

    Assert.assertEquals(Term("edcba"), Term("abcde").reverse())

    }

    ```


    When you run this test, you should get the following printout:


    ```

    text = ''abcde''

    text = ''bcd''

    text = ''c''

    ```


    The first printout is from the initial call to `reverse`, and then there are printouts
    for two recursive calls. The call to `reverse` for the `Term "c"` does not result
    in a further recursive call because this word has just one letter.


    Now make a test using the input `"abcdef"`. What printouts do you expect to see?
    How does the recursion end with this input?


    Make sure you remove the printout after running these tests!


    ## 12.2 Detecting Palindromes


    With the `reverse` function at our disposal, it is very simple to add a function
    that returns `true` if and only if a `Term` is palindromic. In fact, it’s so simple
    that we implement it immediately:


    ```

    fun isPalindrome(): Boolean {

    returnequals(reverse())

    }

    ```


    PROJECT STEP 12.7


    Add this function to `Term`.


    PROJECT STEP 12.8


    Even a simple function should have a test. Add the following to `TermTest`:


    ```

    @Test

    fun isPalindromeTest() {

    Assert.assertTrue(Term("").isPalindrome())

