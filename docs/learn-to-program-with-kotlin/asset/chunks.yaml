    ## 10.8 回到 `LineTest` 和 `Line`


    我们之前对 `Line` 的实现是有缺陷的，因为它没有处理句号。实际上，它也没有处理逗号、分号、冒号、引号或任何其他标点符号 `Char`。如果我们查看 `PrideAndPrejudice.txt`
    的前 30 行左右，会发现其中还使用了下划线字符。因此，让我们在 `LineTest` 中添加对这些字符的检查。


    项目步骤 10.25


    将以下测试函数复制到 `LineTest` 中：


    ```

    @Test

    fun ignorePunctuation() {

    val line = Line("Hello. Goodbye! Yes? No, no.")

    val words = line.words()

    Assert.assertEquals(5, words.size)

    Assert.assertEquals("hello", words[0])

    Assert.assertEquals("goodbye", words[1])

    Assert.assertEquals("yes", words[2])

    Assert.assertEquals("no", words[3])

    Assert.assertEquals("no", words[4])

    }

    @Test fun morePunctuation() {

    val line = Line("Hello; _Goodbye_! X: 5")

    val words = line.words()

    Assert.assertEquals(4, words.size)

    Assert.assertEquals("hello", words[0])

    Assert.assertEquals("goodbye", words[1])

    Assert.assertEquals("x", words[2])

    Assert.assertEquals("5", words[3])

    }

    ```


    运行它们并确认测试失败。


    我们还没有为其编写测试的一个内容是双引号字符。我们使用双引号来*界定*（定义开始和结束）`String`，因此不能简单地将一个双引号放入 `String`
    中并期望它能正常工作。我们需要做的是，在 `String` 中想要表示字面意义的双引号前面加上一个反斜杠 `Char`。这被称为*转义*字符。


    项目步骤 10.26


    将以下针对双引号的测试添加到 `LineTest` 中：


    ```

    @Test

    fun doubleQuotes() {

    val line = Line("\"It''s not.\"")

    val words = line.words()

    Assert.assertEquals(2, words.size)

    Assert.assertEquals("it''s", words[0])

    Assert.assertEquals("not", words[1])

    }

    ```


    该测试将会失败。


    以下是 `Line` 中的 `init` 块：


    ```

    1   init {

    2       var currentWord = ""

    3       for (c in line) {

    4           if (c == '' '') {

    5               addWord(currentWord)

    6               currentWord = ""

    7           } else {

    8               currentWord = currentWord + c

    9           }

    10       }

    11       addWord(currentWord)

    12   }

    ```


    第 4 行是一个 `if` 语句，当条件为 `true` 时，会分支执行中断当前正在构建的单词的代码。这个 `if` 语句只考虑了空格 `Char`。我们可以通过使用
    `||` 运算符来修复这个问题：


    ```

    if (c == '' '' || c == '','' || c == ''.'' || ...) {

    ```


    然而，这将会变成一行非常复杂的代码，因为可能有太多标点符号字符可以终止一个单词。相反，我们将创建一个函数，该函数接收一个 `Char` 作为输入，并根据该
    `Char` 是否应该中断一个单词来返回 `true` 或 `false`。具有 `true` 和 `false` 值的数据类型称为 `Boolean`，这将是我们的新函数的返回类型。我们将不再在第
    4 行将 `c` 与空格 `Char` 进行比较，而是调用这个名为 `isWordTerminator` 的新函数。


    项目步骤 10.27


    用这个新版本替换 `Line` 的现有代码：


    ```

    package lpk.austen

    /**

    * 表示从书中读取的一行文本。

    */

    class Line(line: String) {

    val words = mutableListOf()

    init {

    var currentWord = ""

    for (c in line) {

    if (isWordTerminator(c)) {

    addWord(currentWord)

    currentWord = ""

    } else {

    currentWord = currentWord + c

    }

    }

    addWord(currentWord)

    }

    fun words(): List {

    return words

    }

    fun addWord(str: String) {

    if (str != "") {

    words.add(str.toLowerCase())

    }

    }

    fun isWordTerminator(c: Char): Boolean {

    if (c == '' '') return true

    if (c == ''.'') return true

    if (c == '','') return true

    if (c == ''!'') return true

    if (c == ''?'') return true

    if (c == ''\"'') return true

    if (c == ''_'') return true

    if (c == '';'') return true

    if (c == '':'') return true

    return false

    }

    }

    ```


    检查 `Line` 的所有单元测试现在是否都通过了。


