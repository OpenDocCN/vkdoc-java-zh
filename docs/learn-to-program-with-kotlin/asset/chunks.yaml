    }

    ```


    这个测试加载了我们熟悉的平铺图案图像，然后在点`(25, 25)`处将其裁剪成一个边长为`50`的正方形。然后测试加载一个预先准备好的图像，该图像就是裁剪后应有的样子。测试的最后一行是使用`PictureTest`中名为`checkPicture`的函数将预期图像与实际图像进行比较。


