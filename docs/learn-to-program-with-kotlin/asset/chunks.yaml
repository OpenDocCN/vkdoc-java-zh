- fmt: "# 19.4 A More General Slicing Function\n\nTo get to the actual digits in the\
    \ thresholded and twice-sliced speed sign of Figure [19-7](#508289_1_En_19_Chapter.xhtml#Fig7),\
    \ we need to get rid of the red circle and the white space around the digits.\
    \ We can do this by more slicing! If we change our slicing functions to match\
    \ any required color, then we will be able to slice horizontally and then vertically\
