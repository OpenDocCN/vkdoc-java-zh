    ## 14.5 本章小结与挑战题解答


    在本章中，我们开发了一个基础类，用于创建图像并对其进行简单操作。在接下来的章节中，我们将基于此继续深入。我们还引入了一些创建双数组的简写符号，并在绘制国旗图片时大量使用了它。随着本书的推进，我们将频繁使用这种符号及相关概念，因为它们构成了
    Kotlin 及其他现代编程语言中非常重要的一部分。


    **解答 14.1**


    第一张图像包含中等强度的红色和蓝色，不含绿色。第二张图像包含低强度的红色、绿色和蓝色。第三张图像包含高强度的红色和绿色，不含蓝色。


    **解答 14.2**


    乌克兰国旗：


    ```

    fun createPictureOfFlag(): Picture {

    val height = 300

    val width = 450

    val pixels = Array(height) {

    row ->

    if (row  Color(51, 102, 255) })

    } else {

    Array(width, { column -> Color(254, 203, 0) })

    }

    }

    return Picture(pixels)

    }

    ```


    **解答 14.3**


    德国国旗：


    ```

    fun createPictureOfFlag(): Picture {

    val height = 300

    val width = 500

    val pixels = Array(height) {

    row ->

    if (row  Color(0, 0, 0) })

    } else if (row  Color(255, 0, 0) })

    } else {

    Array(width, { column -> Color(255, 212, 0) })

    }

    }

    return Picture(pixels)

    }

    ```


    **解答 14.4**


    意大利国旗：


    ```

    fun createPictureOfFlag(): Picture {

    val height = 200

    val width = 300

    val pixels = Array(height) {

    row ->

    Array(width) {

    column ->

    if (column < 100) {

    Color(0, 145, 69)

    } else if (column < 200) {

    Color(255, 255, 255)

    } else {

    Color(207, 43, 56)

    }

    }

    }

    return Picture(pixels)

    }

    ```


    **解答 14.5**


    以下是经过所有重构后 `Flag.kt` 的完整代码：


    ```

    package lpk.imaging

    import java.awt.Color

    fun main() {

    Flag().show()

    }

    class Flag : PictureDisplayer() {

    val white = Color(255, 255, 255)

    val red = Color(255, 0, 0)

    fun createPictureOfFlag(): Picture {

