    的红色正方形。如果我们在位置`(50, 10)`裁剪它，`h = 10`且`w = 20`，那么结果应该是一个高 10、宽 20 的蓝色矩形。最后，如果我们在位置`(25,
    25)`裁剪它，并将`h`和`w`都设为`50`，那么结果应该是原始图像的 50x50 版本，如图 16-2b 所示。


