    unused import statements), then add it. Then add this function stub within the
    body of the class, among the other functions:


    ```

    fun toCSV(file : Path) {

    }

    ```


    To test this function, we will need to create a `Histogram`, populate it with
    some data, call the function with some known file as the parameter, and then check
    the contents of the file. Here is a partial implementation of the test, which
    does just the setup:


    ```

    @Test

    fun toCSVTest() {

    val histogram = Histogram()

    histogram.record("piano")

    histogram.record("piano")

    histogram.record("violin")

    val csvFile = Paths.get("HistogramTest.csv")

    histogram.toCSV(csvFile)

    }

    ```


    Now let’s think about the assertions we can make about the exported file. First
    of all, it should have two lines, because there are two items in the `Histogram`.
    We don’t know or care about the order of the lines in the file, but one of them
    should contain the information `piano,2` and the other should show `violin` as
    given once. This code does those checks:


    ```

