    9       sightings.add("emu")


    11       //Count the species.

    12       val speciesToCount = mutableMapOf()

    13       for (sighting in sightings) {

    14           val countSoFar = speciesToCount[sighting]

    15           val updatedCount = countSoFar + 1

    16           speciesToCount.put(sighting, updatedCount)

    17       }


    19       //Print the species counts.

    20       for (species in speciesToCount.keys) {

    21           val count = speciesToCount[species]

    22           println("Number of $species sightings: $count")

    23       }

    24   }

    ```


    On lines 5 to 9, we are recording bird sightings in a `List`, which is straightforward.
    The next block of code, lines 12 to 17, is an attempt to count the species by
    using a map where the keys are the species and the values are the number of times
    sighted. The final block of code is printing out the species counts, just as we
    printed out ages in the last challenge.


    If we look at this code in IntelliJ, we see a red line under the plus sign on
    line 15, indicating an error, as shown in Figure [8-1](#508289_1_En_8_Chapter.xhtml#Fig1).
    To understand what the problem is, it helps to remember that the `for`-loop of
    lines 13 to 17 is equivalent to a series of blocks, as follows:


    ![../images/508289_1_En_8_Chapter/508289_1_En_8_Fig1_HTML.jpg](images/508289_1_En_8_Chapter/508289_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    There is something wrong with using `+` here


    ```

    1   val sighting_0 = "emu"

    2   val countSoFar_0 = speciesToCount[sighting_0]

    3   val updatedCount_0 = countSoFar_0 + 1

    4   speciesToCount.put(sighting_0, updatedCount_0)


    6   val sighting_1 = "magpie"

    7   val countSoFar_1 = speciesToCount[sighting_1]

    8   val updatedCount_1 = countSoFar_1 + 1

    9   speciesToCount.put(sighting_1, updatedCount_1)


    11   val sighting_2 = "galah"

    12   val countSoFar_2 = speciesToCount[sighting_2]

    13   val updatedCount_2 = countSoFar_2 + 1

    14   speciesToCount.put(sighting_2, updatedCount_2)


    16   val sighting_3 = "emu"

    17   val countSoFar_3 = speciesToCount[sighting_3]

    18   val updatedCount_3 = countSoFar_3 + 1

    19   speciesToCount.put(sighting_3, updatedCount_3)

    ```


    Now consider the declaration of `countSoFar_0` on line 2 of this expanded code.
    We are trying to set this `val` to hold the value that the map `speciesToCount`
    associates with the key `sighting_0`. At this point in the program, `speciesToCount`
    does not hold any values at all, so


    ```

    speciesToCount[sighting_0]

    ```


    will return a special value called `null`. This `null` value is not an `Int`,
    so the `+` operator cannot apply to it.


    At line 7, the program is trying to get the value that `speciesToCount` associates
    with `magpie`. At this point, there is a value in the map for the key `emu`, but
    not for our black and white friend, so `countSoFar_1` is also set to `null`.


    Line 17 is a little different, because there *is* a value (`1`) for the key (`emu`)
    at this point, so line 18 will actually be adding two `Int`s. However, the compiler
    is not smart enough to know this, so this line will also get an error.


    To fix this problem, we use some special syntax which means "use `0` instead of
    `null`." This is written using the so-called *Elvis operator*: `?:`.


    Here is a corrected version of the program:


    ```

    1   package lpk.basics


    3   fun main() {

    4       //Record the sightings.

    5       val sightings = mutableListOf()

    6       sightings.add("emu")

    7       sightings.add("magpie")

    8       sightings.add("galah")

    9       sightings.add("emu")


    11       //Count the species.

    12       val speciesToCount = mutableMapOf()

    13       for (sighting in sightings) {

    14           val countSoFar = speciesToCount[sighting] ?: 0

    15           val updatedCount = countSoFar + 1

    16           speciesToCount.put(sighting, updatedCount)

    17       }


    19       //Print the species counts.

    20       for (species in speciesToCount.keys) {

    21           val count = speciesToCount[species]

    22           println("Number of $species sightings: $count")

    23       }

    24   }

    ```


    PROGRAMMING CHALLENGE 8.5


    What output do you expect from the program? Run it and see.


    You might wonder why Kotlin returns `null` when getting a value from a map for
    an unknown key. Why not return `0`? Well, there are lots of situations where `0`
    would *not* be correct, and the code would then need to check for `0`, which would
    be annoying and error-prone. By possibly returning `null`, Kotlin is forcing us
    to think about what might go wrong. The strict rules that Kotlin enforces actually
    allow the system to detect errors that programmers need to test for manually in
    other languages. In fact, some languages are very lax, and for them `0`, `false`,
    and `null` are all the same thing. This makes them easy to learn, but in the long
    run, it''s very hard to know what is going on, which leads to faulty software.


