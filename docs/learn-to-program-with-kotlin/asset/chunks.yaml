    ![../images/508289_1_En_4_Chapter/508289_1_En_4_Figa_HTML.jpg](images/508289_1_En_4_Chapter/508289_1_En_4_Figa_HTML.jpg)


    PROGRAMMING CHALLENGE 4.2


    To check if two values are the same, we use the `==` (two equals signs) operator.
    For example, to check if the row and column have the same value in an `if` statement,
    we would use `if (row == column)`. Using this operation, can you change the preceding
    code to produce a pattern with black tiles on the main top-left to bottom-right
    diagonal?


    ![../images/508289_1_En_4_Chapter/508289_1_En_4_Figb_HTML.jpg](images/508289_1_En_4_Chapter/508289_1_En_4_Figb_HTML.jpg)


    PROGRAMMING CHALLENGE 4.3


    By choosing a color based just on the column index, we can produce a vertical
    stripe. See if you can produce this pattern:


    ![../images/508289_1_En_4_Chapter/508289_1_En_4_Figc_HTML.jpg](images/508289_1_En_4_Chapter/508289_1_En_4_Figc_HTML.jpg)


    ## 4.2 The Or Operator


    Suppose that we’d like to produce a tile pattern with both column 0 and column
    2 being entirely filled with black tiles, as in Figure [4-2](#508289_1_En_4_Chapter.xhtml#Fig2).
    We could produce this if the body of our `if` statement was something like


    ![../images/508289_1_En_4_Chapter/508289_1_En_4_Fig2_HTML.jpg](images/508289_1_En_4_Chapter/508289_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    A pattern produced using the `or` operation


    ```

    if (column == 0 OR column == 2) ....

    ```


    In fact, this is possible, but Kotlin uses two pipe characters instead of the
    word `OR`:


    ```

    if (column == 0 || column == 2) ....

    ```


    Here is a version of `getTileColors` that gives the pattern:


    ```

    fun tileColors(): Array> {

    val shades = Array(8) {

    Array(8) { 0 }

    }

    for (row in 0..7) {

    for (column in 0..7) {

    if (column == 0 || column == 2) {

    shades[row][column] = 0

    } else {

    shades[row][column] = 255

    }

    }

    }

    return shades

    }

    ```


    PROGRAMMING CHALLENGE 4.4


    It is possible to use multiple `||` operators in a single statement: `a || b ||
    c || d` means "`a OR b OR c OR d`." Use this to change the code so that it produces
    this pattern:


    ![../images/508289_1_En_4_Chapter/508289_1_En_4_Figd_HTML.jpg](images/508289_1_En_4_Chapter/508289_1_En_4_Figd_HTML.jpg)


    PROGRAMMING CHALLENGE 4.5


    Change the code so that it produces this pattern:


    ![../images/508289_1_En_4_Chapter/508289_1_En_4_Fige_HTML.jpg](images/508289_1_En_4_Chapter/508289_1_En_4_Fige_HTML.jpg)


    ## 4.3 The And Operator


    Suppose that we want to produce a pattern that has a single black tile, which
    occurs at position `[1][1]`, as in Figure [4-3](#508289_1_En_4_Chapter.xhtml#Fig3).
    This is the single array location for which both `row == 1` *and* `column == 1`.
    To express a requirement that two conditions are true, we use the *and* operator,
    which is written as two ampersands: `&&`. Here is a version of `tileColors` that
    uses `&&` in an `if` statement to produce the pattern:


    ![../images/508289_1_En_4_Chapter/508289_1_En_4_Fig3_HTML.jpg](images/508289_1_En_4_Chapter/508289_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    A pattern produced using the `and` operator


    ```

    fun tileColors(): Array> {

    val shades = Array(8) {

    Array(8) { 0 }

    }

    for (row in 0..7) {

    for (column in 0..7) {

    if (row == 1 && column == 1) {

    shades[row][column] = 0

    } else {

    shades[row][column] = 255

    }

    }

    }

    return shades

    }

    ```


    PROGRAMMING CHALLENGE 4.6


    To test if one number is greater than another, we can use the `>` operator. For
    example, `row > 2` will return the value `true` if `row` is `3, 4, 5,` … and will
    return `false` if `row` is `0`, `1`, or `2`. Using the `>` operator for both rows
    and columns produces this pattern:


    ![../images/508289_1_En_4_Chapter/508289_1_En_4_Figf_HTML.jpg](images/508289_1_En_4_Chapter/508289_1_En_4_Figf_HTML.jpg)


    PROGRAMMING CHALLENGE 4.7


    The preceding pattern can also be produced using an `||` operator. For which values
    of `row` are the cells white? For which values of `column`?


    **Note** You might want to use the "less than" operator, `<`, to express the conditions
    on rows and columns.


    ## 4.4 If-Else-If Statements


    It is possible to make more complex choices by an extension of the `if-else` syntax
    in which the `else` part is itself an `if-else` statement. For example, suppose
    that we want to produce the "two dots" pattern in Figure [4-4](#508289_1_En_4_Chapter.xhtml#Fig4).
    We can do this using an `if-else-if` combination:


    ![../images/508289_1_En_4_Chapter/508289_1_En_4_Fig4_HTML.jpg](images/508289_1_En_4_Chapter/508289_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    A pattern produced using `if-else-if` logic


    ```

    fun tileColors(): Array> {

    val shades = Array(8) {

    Array(8) { 0 }

    }

    for (row in 0..7) {

    for (column in 0..7) {

    if (row == 1 && column == 1) {

    shades[row][column] = 0

    } else if (row == 1 && column == 6) {

    shades[row][column] = 0

    } else {

    shades[row][column] = 255

    }

    }

    }

    return shades

    }

    ```


    PROGRAMMING CHALLENGE 4.8


    See if you can produce this pattern:


    ![../images/508289_1_En_4_Chapter/508289_1_En_4_Figg_HTML.jpg](images/508289_1_En_4_Chapter/508289_1_En_4_Figg_HTML.jpg)


    PROGRAMMING CHALLENGE 4.9


    It is possible to have repeated `else-if` blocks. See if you can produce this
    pattern:


    ![../images/508289_1_En_4_Chapter/508289_1_En_4_Figh_HTML.jpg](images/508289_1_En_4_Chapter/508289_1_En_4_Figh_HTML.jpg)'
