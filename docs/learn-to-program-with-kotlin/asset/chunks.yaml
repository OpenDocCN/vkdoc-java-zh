    One shortcoming of our analysis is that it counts words that are related as separate
    entities. See Figure [10-12](#508289_1_En_10_Chapter.xhtml#Fig12) for an example.
    The classification of words by root word is called *stemming*. There are freely
    downloadable *word banks* for English and other languages that can be used for
    this kind of analysis. By the time that you have finished this book, you should
    be able to use a word bank to aggregate the word usage statistics by root word.


