  raw: '## 19.2 Thresholding the Sign Images


    The `Picture` class has functions that can slice an instance into components containing
    red. One of the most distinctive features of a speed sign is the red circle surrounding
    the numbers. Our plan is to slice the speed sign image to retrieve a slice containing
    the red circle. Of course, speed signs do not contain pure colors, but we can
    overcome this problem by thresholding. This can be achieved by creating a function:


    ```

    (Color) -> (Color)

    ```


    and then passing this in as the argument to the `transform` function of `Picture`.
    The thresholding function should map pixels to whichever of red, white, or black
    they are closest.


    So, for a `Color` that is vaguely white, it should return `Color.WHITE`; for a
    `Color` that is close to `Color.RED`, it should return that; and otherwise it
    should return `Color.BLACK`. To this end, change `DigitFinder` to be


    ```

    class DigitFinder(val input : Picture) {

    val blackWhitRedThresholder: ((Color) -> (Color)) = {

    if (it.red > 196 && it.green > 196 && it.blue > 196) {

    Color.WHITE

    } else if (it.red > 196) {

    Color.RED

    } else {

    Color.BLACK

    }

    }

    fun digits() : List {

    val result = mutableListOf()

    val blackWhitRedVersion = input.transform(blackWhitRedThresholder)

    result.add(blackWhitRedVersion)

    return result

    }

    }

    ```


    In this new version of the class, there is a `val` called `blackWhiteThresholder`
    that performs the thresholding. This is then applied to produce a new version
    of the input image, and it is this thresholded version that is added to the result.


    After making these changes, run the test. You should see that the thresholding
    has not worked very well. As shown in Figure [19-3](#508289_1_En_19_Chapter.xhtml#Fig3),
    almost everything is black, including parts of the sign that should be white.
    To understand what is going on, it’s useful to open the original image in a drawing
    program and have a look at what the actual colors in it are. It turns out that
    the “white” background of the sign has a red value of about 185, which is below
    the 196 in our thresholder. Even more surprisingly, the pixels in the “red” circle
    have red values of about 155 and blue values of about 80\. They are a long way
    from being a pure red.


    ![../images/508289_1_En_19_Chapter/508289_1_En_19_Fig3_HTML.jpg](images/508289_1_En_19_Chapter/508289_1_En_19_Fig3_HTML.jpg)


    Figure 19-3


    First attempt at thresholding


    For a second attempt, let’s try changing `blackWhitRedThresholder` to


    ```

    val blackWhitRedThresholder: ((Color) -> (Color)) = {

    if (it.red > 128 && it.green > 128 && it.blue > 128) {

    Color.WHITE

    } else if (it.red > 128) {

    Color.RED

    } else {

    Color.BLACK

    }

    }

    ```


    This gives a better result, but brown parts of the picture, such as the grass,
    are being changed to be red, as in Figure [19-4.](#508289_1_En_19_Chapter.xhtml#Fig4)
    This will make it hard to find the sign.


    ![../images/508289_1_En_19_Chapter/508289_1_En_19_Fig4_HTML.jpg](images/508289_1_En_19_Chapter/508289_1_En_19_Fig4_HTML.jpg)


    Figure 19-4


    Second attempt


    For our third attempt, let’s change emphasis and think about what information
    in the image is most important for our purpose. The digits in the sign are really
    what we are most interested in. These are pretty dark in the photo. So let’s only
    change pixels to black if they really are very dark. Next in importance are the
    red pixels in the circle. As we learned from our second attempt, pixels that have
    high red values but also have high green or blue values should not be changed
    to red. Anything else can be changed to white without loss of the information
    that really counts. So let’s try changing the thresholder to


    ```

    val blackWhitRedThresholder: ((Color) -> (Color)) = {

    if (it.red  128 && it.green < 96 && it.blue < 96) {

    Color.RED

    } else {

    Color.WHITE

    }

    }

    ```


    The result, shown in Figure [19-5](#508289_1_En_19_Chapter.xhtml#Fig5), at last
    gives us something that we can work with.


    ![../images/508289_1_En_19_Chapter/508289_1_En_19_Fig5_HTML.jpg](images/508289_1_En_19_Chapter/508289_1_En_19_Fig5_HTML.jpg)


    Figure 19-5


    Third attempt


    ## 19.3 Slicing the Thresholded Image


    With a nicely thresholded `Picture` , we can now find the horizontal slice that
    contains the speed sign. We can do this by changing the `digits` function to


    ```

    fun digits(): List {

    val result = mutableListOf()

    val blackWhitRedVersion = input.transform(blackWhitRedThresholder)

    val slicesH = blackWhitRedVersion.

    sliceHorizontallyIntoPicturesContainingRed()

    val sliceH0 = slicesH.first()

    result.add(sliceH0)

    return result

    }

    ```


    Note that we are taking just the first `Picture` from the list produced by the
    horizontal slicing function. We will tidy this up later on. With the new code,
    we get just a narrow section of the thresholded image, as shown in Figure [19-6](#508289_1_En_19_Chapter.xhtml#Fig6).


    There is still a lot of image here that is not the sign. We can get rid of the
    excess by slicing this image vertically. To do so, change `digits` to


    ```

    fun digits(): List {

    val result = mutableListOf()

    val blackWhitRedVersion = input.transform(blackWhitRedThresholder)

    val slicesH = blackWhitRedVersion.

    sliceHorizontallyIntoPicturesContainingRed()

    val sliceH0 = slicesH.first()

    val slicesV = sliceH0.

    sliceVerticallyIntoPicturesContainingRed()

    val sliceV0 = slicesV.first()

    result.add(sliceV0)

    return result

    }

    ```


    ![../images/508289_1_En_19_Chapter/508289_1_En_19_Fig6_HTML.jpg](images/508289_1_En_19_Chapter/508289_1_En_19_Fig6_HTML.jpg)


    Figure 19-6


    Thresholded and then sliced horizontally


    The result is a nicely trimmed speed sign, in just three colors, as shown in Figure
    [19-7](#508289_1_En_19_Chapter.xhtml#Fig7).


    ![../images/508289_1_En_19_Chapter/508289_1_En_19_Fig7_HTML.jpg](images/508289_1_En_19_Chapter/508289_1_En_19_Fig7_HTML.jpg)


    Figure 19-7


    After the vertical slicing'
