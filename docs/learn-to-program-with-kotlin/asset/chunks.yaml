    ## 10.14 Summary


    This has been a huge chapter. We’ve covered some really important and difficult
    topics, such as object-oriented design, and we have written a small but sophisticated
    text analysis system. The programs that we wrote are of high quality because we
    wrote unit tests for all of our code.


    The enormous amount covered in this chapter puts us in a great position to forge
    on with more text-related programming in the coming chapters.


    # 11. Anagrams


    This chapter builds on the techniques of object-oriented programming and unit
    testing that were used in Chapter [10](#508289_1_En_10_Chapter.xhtml) and introduces
    a new programming technique, *recursion*. The problem that we will solve is the
    following: given any English word, what are all the anagrams of it?


    ## 11.1 Main Classes


    Suppose that we want to find all the anagrams of some given word. One approach
    is as follows: first, we work out all of the different ways of rearranging the
    letters in the word, and then we check each arrangement against a list of known
    English words. The combinations that do not occur in the list are discarded, and
    the remaining arrangements are the anagrams. For example, suppose that we start
    with the word `rat`. The different arrangements of the letters in this word are


    ```

    art

    atr

    rat

    rta

    tar

    tra

    ```


    The three of these that are actually found in the dictionary are `art`, `rat`,
    and `tar`.


    Given this approach to the problem, two main classes come to mind. The first,
    which we call `Term`, encapsulates the algorithm for finding all of the letter
    arrangements (permutations). The second, called `Dictionary`, does the checking.


    To get started, clone this repository in IntelliJ:


    [`https://github.com/Apress/learn-to-program-w-kotlin-anagrams.git`](https://github.com/Apress/learn-to-program-w-kotlin-anagrams.git)


    The expanded project structure should appear as in Figure [11-1](#508289_1_En_11_Chapter.xhtml#Fig1).
    The main parts are


    ![../images/508289_1_En_11_Chapter/508289_1_En_11_Fig1_HTML.jpg](images/508289_1_En_11_Chapter/508289_1_En_11_Fig1_HTML.jpg)


    Figure 11-1


    The structure of the Anagrams project


    * The `lib` directory, which contains the files needed by JUnit.

    * Three Kotlin files in `src/main/kotlin/lpk/anagrams`: These are stubs for the
    two classes described earlier, plus a third, `AnagramFinder`, that will contain
    the `main` function.

    * Stubs for the tests of `Term` and `Dictionary`, in the directory `src/test/kotlin/lpk/anagrams/test`.

    * The file `english.txt` in the resources directory of the main branch: This contains
    all of the words from Webster’s 1913 dictionary, as found at Project Gutenberg.

    * The file `FiveWords.txt`, which is a very small dictionary file, for testing.

    * A directory called `.idea`, which is used by IntelliJ.


    `AnagramFinder` already contains a sketch of the main algorithm:


    ```

    /**

    * Finds and prints the anagrams of a word.

    */

    fun main() {

    //Create a dictionary from "english.txt" in resources/books

    //Create a Term from our initial English word.

    //Get all rearrangements of the letters in this word.

    //For each of these,

    //...if it is in the dictionary

    //...print it.

    }

    ```


    Our implementation plan is to write the `Dictionary` and `Term` classes so they
    can supply the functions required in the preceding code sketch. In developing
    `Dictionary` and `Term`, we will follow the “test-first” methodology that we used
    in Project Austen.'
