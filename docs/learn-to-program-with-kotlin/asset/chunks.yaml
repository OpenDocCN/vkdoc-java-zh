    ## 12.4 Summary


    By building on our previous work in the Anagrams project, we have been able to
    find all of palindromes listed in the 1913 edition of Webster’s dictionary. This
    short project gave us more practice in object-oriented programming and unit testing
    and in working with recursive algorithms.


    The completed code for this chapter is available from [`https://github.com/Apress/learn-to-program-w-kotlin-palindromes-complete.git`](https://github.com/Apress/learn-to-program-w-kotlin-palindromes-complete.git).


    # 13. Word Switch


    How can one turn “cave” into “home”? Here’s one way:


    ```

    cave → came → come → home.

    ```


    This is the *word switch* game: choose two words and then see if one can be transformed
    into the other by changing one letter at a time, such that a valid word is produced
    by each change.


    In this chapter, we will write software that solves the word switch problem for
    any two words—if there is a solution—and lets us know if there is not. As well
    as being an interesting problem, this will give us yet more practice with object-oriented
    programming and unit testing, and we will also build a new kind of data structure,
    which is in fact recursive.


    ## 13.1 The Algorithm


    One approach to solving this problem is to create “generations” of words, with
    each generation created from the previous one by single-letter substitutions,
    taking care to remember the words that have already been generated. When a generation
    is found that contains the target word, the process finishes with success. When
    a generation contains only words that were found in previous generations, the
    process finishes with failure. It’s best to look at this using an example. Suppose
    that the start word is `fight` and the target is `argue`.


    ### 13.1.1 Generation 1


    The words that can be derived from `fight` by changing just any one letter are


    ```

    bight, dight, eight, hight, light, might,

    night, pight, right, sight, tight, wight

    ```


    These are all new, but none of them is the target, so we use them to build a new
    generation.


    ### 13.1.2 Generation 2


    Each of the words from Generation 1 can be changed to `fight`, but that was our
    starting word, so has already been seen. Apart from that:


    *   From `bight`, we get `bigot` and `bigha`.

    *   From `dight`, we get `digit`.

    *   From `eyght`, we get `eight`.

    *   `night` generates `noght`.

    *   `tight` generates `toght`.


    So the new words in Generation 2 are


    ```

    bigot, bigha, digit, eyght, noght, toght

    ```


    ### 13.1.3 Generation 3


    Of the words created in Generation 2, only two new words can be created: `bigot`
    begets `begot`, and `digit` can be changed to `dimit`.


    ### 13.1.4 Generation 4


    From the words that were new in Generation 3, we get `besot`, `beget`, and `begod`
    from `begot`, and we get `limit` and `demit` from `dimit`.


    ### 13.1.5 Algorithm Termination with Success


    After many generations, the target word, `argue`, is found. The word that gave
    rise to it was `argus`. The word that gave rise to `argus` was `argas`, and so
    on, backward, until we get to `bigot` and then `bight` and, finally, the start
    word, `fight`. The complete chain of words is


    ```

    fight, bight, bigot, begot, beget, reget, revet, levet,

    lever, laver, lager, eager, egger, agger, anger, angor,

    algor, algol, argol, argal, argas, argus, argue

    ```


    ### 13.1.6 Algorithm Termination with Failure


    It’s also worth looking at an example where the algorithm terminates without finding
    the target word. Suppose that our start word is `viola` and our target is `cello`.
    The first generation contains just two new words: `villa` and `viole`. From `villa`,
    we can get `viola` (of course) plus the new words `zilla` and `villi`, but `viole`
    cannot be changed into a new word. So we have


    ```

    Start word: viola

    Generation 1: villa, viole

    Generation 2: zilla, villi

    ```


    However, neither `zilla` nor `villi` can be changed into new words, so Generation
    3 is empty and the algorithm terminates.


    ## 13.2 Main Classes and Project Setup


    As the examples have shown, there are three key processes in our algorithm. First,
    there is the task of generating new words from existing ones. We will have a class
    called `WordNode` to do this. Second, words created by `WordNode` need to be checked
    to see if they are valid and if they have previously been seen. This job will
    be done by a class called `WordChecker`. Finally, if the target word is found,
    we need to build the “path” of words from the starting word to the target. Our
    `WordNode` class will do this job, in addition to creating new words.


    Two more classes are needed. The `Dictionary` from previous chapters will be used
    by the `WordChecker` to test the validity of potential new words. Finally, a class
    called `WordSwitch` will provide a `main` function and implement the word switch
    algorithm.


    Stubs for `WordChecker`, `WordNode`, and `WordSwitch` and their unit tests have
    already been created, and we are using the same `Dictionary` class and test as
    in previous chapters. To get started, open the project [`https://github.com/Apress/learn-to-program-w-kotlin-wordswitch.git`](https://github.com/Apress/learn-to-program-w-kotlin-wordswitch.git).'
