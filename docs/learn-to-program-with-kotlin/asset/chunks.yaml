    \ Instead of asserting that `generated` contains `WordNode(\"b\")` and so on,\
    \ check that it contains the elements listed earlier.\n\n# 13.7 Implementing `WordNode`\n\
    \nWe already have a stub for `WordNode`. Now, with some tests in place, we can\
    \ fill in the details of `variantsByOneLetter`. Our stub code already has this\
    \ function creating a `List<WordNode>` and then returning it. What we need to\
