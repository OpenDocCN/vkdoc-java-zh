- fmt: '# 14.3 Photographs


    There are several file formats for storing images on computers. JPEG and PNG are
    the most commonly used. Given a file in one of these formats, how can we turn
    it into a `Picture`? Image processing is such an important task that there are
    library classes that can help. In fact, there is a class called `javax.imageio.ImageIO`
    which can do most of the work for us. Replace all of the code in `Picture.kt`
    with


    ```

    package lpk.imaging

    import java.awt.Color

    import java.io.File

    import javax.imageio.ImageIO

    fun loadPictureFromFile(imageFile: File): Picture {

    val image = ImageIO.read(imageFile)

    val width = image.width

    val height = image.height

    val pixels = Array(height) { row ->

    Array(width) { column ->

    Color(image.getRGB(column, row))

    }

    }

    return Picture(pixels)

    }

    class Picture(val pixels: Array>) {

    fun height(): Int {

    return pixels.size

    }

    fun width(): Int {

    return pixels[0].size

    }

    fun pixelByRowColumn(row: Int, column: Int): Color {

    return pixels[row][column]

    }

    }

    ```


    This new version of the file imports the libraries needed for reading image files.
    Then there is a `loadPictureFromFile` function, which works as follows. The single
    parameter to the function is a `File` containing the image data. The first line
    of the function reads the file into a `val` called `image`. This `val` can give
    us the height and width of the image, and these are used in creating a double
    array of pixels. We are able to get the pixel at a particular location using the
    `getRGB` function, which is used in initializing the double array.


    It’s important not to get too bogged down in the details of this function. The
    array initialization code should look familiar after all of the hard work we have
    done writing similar code to produce flags. However, we should satisfy ourselves
    that the code is correct by writing a test. The project we are working on already
    contains an almost empty `PictureTest` class, and there are some image files we
    can use as test data, as shown in Figure [14-8](#508289_1_En_14_Chapter.xhtml#Fig8).


    The file `green_h50_w100.png` in the images directory is a green rectangle with
    50 rows and 100 columns. Let’s write a test that uses `loadPictureFromFile` to
    create an image from this file and then checks that


    * The `Picture` has 50 rows.

    * It has 100 columns.

    * Each pixel is green.


    Replace the current contents of `PictureTest.kt` with the following code:


    ```

    1   package lpk.imaging.test


    3   import org.junit.Assert

    4   import org.junit.Test

    5   import lpk.imaging.Picture

    6   import lpk.imaging.loadPictureFromFile

    7   import java.awt.Color

    8   import java.nio.file.Paths


    10   private val IMAGES = "src/test/resources/images/"


    12   class PictureTest {

    13       @Test

    14       fun loadPictureFromFileTest() {

    15           val file = Paths.get(IMAGES + "green_h50_w100.png").toFile()

    16           val loaded = loadPictureFromFile(file)

