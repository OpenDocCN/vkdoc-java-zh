    Assert.assertTrue(lines.contains("piano,2"))

    Assert.assertTrue(lines.contains("violin,1"))

    }

    ```


    Run the test. You should get some horrible looking error that indicates that the
    file `HistogramTest.csv` does not exist.


    With the test in place, let’s consider how we might implement `toCSV`. There is
    a useful library function, `Files.write`, for writing a list of `String`s to a
    file. So if we can get the information we need as a `List` of `String`s, then
    we are almost finished. We can produce such a `List` by iterating through the
    words in the `Histogram`, getting the count for the word, and then building a
    `String` from the word and its count. The following code implements this algorithm:


    ```

    fun toCSV(file : Path) {

    val csvLines = mutableListOf()

    for (word in allWords()) {

    val timesGiven = numberOfTimesGiven(word)

    val line = "$word,$timesGiven"

    csvLines.add(line)

    }

    Files.write(file, csvLines)

    }

    ```


