    ## 4.3 The And Operator


    Suppose that we want to produce a pattern that has a single black tile, which
    occurs at position `[1][1]`, as in Figure [4-3](#508289_1_En_4_Chapter.xhtml#Fig3).
    This is the single array location for which both `row == 1` *and* `column == 1`.
    To express a requirement that two conditions are true, we use the *and* operator,
    which is written as two ampersands: `&&`. Here is a version of `tileColors` that
    uses `&&` in an `if` statement to produce the pattern:


    ![../images/508289_1_En_4_Chapter/508289_1_En_4_Fig3_HTML.jpg](images/508289_1_En_4_Chapter/508289_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    A pattern produced using the `and` operator


    ```

    fun tileColors(): Array> {

    val shades = Array(8) {

    Array(8) { 0 }

    }

    for (row in 0..7) {

    for (column in 0..7) {

    if (row == 1 && column == 1) {

    shades[row][column] = 0

    } else {

    shades[row][column] = 255

    }

    }

    }

    return shades

    }

    ```


    PROGRAMMING CHALLENGE 4.6


    To test if one number is greater than another, we can use the `>` operator. For
    example, `row > 2` will return the value `true` if `row` is `3, 4, 5,` … and will
    return `false` if `row` is `0`, `1`, or `2`. Using the `>` operator for both rows
    and columns produces this pattern:


    ![../images/508289_1_En_4_Chapter/508289_1_En_4_Figf_HTML.jpg](images/508289_1_En_4_Chapter/508289_1_En_4_Figf_HTML.jpg)


    PROGRAMMING CHALLENGE 4.7


    The preceding pattern can also be produced using an `||` operator. For which values
    of `row` are the cells white? For which values of `column`?


    **Note** You might want to use the “less than” operator, `<` , to express the
    conditions on rows and columns.


    ## 4.4 If-Else-If Statements


    It is possible to make more complex choices by an extension of the `if-else` syntax
    in which the `else` part is itself an `if-else` statement. For example, suppose
    that we want to produce the “two dots” pattern in Figure [4-4](#508289_1_En_4_Chapter.xhtml#Fig4).
    We can do this using an `if-else-if` combination:


    ![../images/508289_1_En_4_Chapter/508289_1_En_4_Fig4_HTML.jpg](images/508289_1_En_4_Chapter/508289_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    A pattern produced using `if-else-if` logic


    ```

    fun tileColors(): Array> {

    val shades = Array(8) {

    Array(8) { 0 }

    }

    for (row in 0..7) {

    for (column in 0..7) {

    if (row == 1 && column == 1) {

    shades[row][column] = 0

    } else if (row == 1 && column == 6) {

    shades[row][column] = 0

    } else {

    shades[row][column] = 255

    }

    }

    }

    return shades

    }

    ```


    PROGRAMMING CHALLENGE 4.8


    See if you can produce this pattern:


    ![../images/508289_1_En_4_Chapter/508289_1_En_4_Figg_HTML.jpg](images/508289_1_En_4_Chapter/508289_1_En_4_Figg_HTML.jpg)


    PROGRAMMING CHALLENGE 4.9


    It is possible to have repeated `else-if` blocks. See if you can produce this
    pattern:


    ![../images/508289_1_En_4_Chapter/508289_1_En_4_Figh_HTML.jpg](images/508289_1_En_4_Chapter/508289_1_En_4_Figh_HTML.jpg)'
