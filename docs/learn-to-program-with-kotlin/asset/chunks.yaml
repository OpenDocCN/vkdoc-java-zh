- fmt: '## 11.2 The `Dictionary` Class


    When the project is first retrieved, `Dictionary` should appear as follows:


    ```

    1   package lpk.anagrams


    3   import java.nio.file.Files

    4   import java.nio.file.Path


    6   /**

    7    * Checks words against a list of words read

    8    * from a file in which there is one word per line.

    9    */

    10   class Dictionary(pathToFile: Path) {


    12       fun contains(string: String): Boolean {

    13           return false

    14       }

    15   }

    ```


    As usual, the first line names the `package` to which this class belongs. Lines
    3 and 4 import code that will be required for reading the dictionary file. On
    line 10, the instruction


    ```

    (pathToFile: Path)

    ```


    means that a `Dictionary` can be constructed from a `Path` object and that this
    object will be available in the `init` block under the name `pathToFile`.


    The `contains` function is what we will use for checking word validity. Let’s
    get started by testing it. When the project is first retrieved, there is a ready-made
    test class that has some necessary imports and a test stub:


    ```

    package lpk.anagrams.test

    import org.junit.Assert

    import org.junit.Test

    import java.nio.file.Paths

    import lpk.anagrams.Dictionary

    class DictionaryTest {

    @Test

    fun containsTest() {

    }

    }

    ```


    **PROJECT STEP 11.1**


    We can begin our test by constructing a `Dictionary` from the file called `FiveWords.txt`,
    in the test resources directory.


    Copy this code into `containsTest`:


    ```

    val path = Paths.get("src/test/resources/books/FiveWords.txt")

    val dictionary = Dictionary(path)

    ```


    There are as yet no assertions in this test, so it should pass.


    The file `FiveWords.txt` is literally named. It contains precisely these lines:


    ```

    aardvark

    bat

    cat

    dog

    eel

    ```


    We can add some meaning to our test by checking that if we call `contains` for
    each of these words, the returned value is `true`.


    **PROJECT STEP 11.2**


    Add this line of code into `containsTest`:


    ```

    Assert.assertTrue(dictionary.contains("aardvark"));

    ```


    Check that the test now fails.


    Add equivalent lines for each of the other four words in the dictionary file.


    As well as checking what is in the dictionary, we should check what is not. Otherwise,
    we might have an implementation of `contains` that always returns `true`. The
    test as it is now written would pass, even with such a bad implementation of `contains`.


    **PROJECT STEP 11.3**


    Add these two lines to the test:


    ```

    Assert.assertFalse(dictionary.contains("aardwolf"));

    Assert.assertFalse(dictionary.contains("zebra"));

    ```


    Our test should at this point contain five positive assertions and two negative
    assertions:


    ```

    @Test

    fun containsTest() {

    val path = Paths.get("src/test/resources/books/FiveWords.txt")

    val dictionary = Dictionary(path)

    Assert.assertTrue(dictionary.contains("aardvark"))

    Assert.assertTrue(dictionary.contains("bat"))

    Assert.assertTrue(dictionary.contains("cat"))

    Assert.assertTrue(dictionary.contains("dog"))

    Assert.assertTrue(dictionary.contains("eel"))

    Assert.assertFalse(dictionary.contains("aardwolf"))

    Assert.assertFalse(dictionary.contains("zebra"))

    }

    ```


    With a complete test in place, we can now think about implementing `Dictionary`.
    As usual, there are many ways of doing this. One simple approach is as follows:


    *   Have a `Set<String>` field that contains exactly the words in the dictionary
    file.

    *   Implement `contains` by returning the `Set`’s value for `contains`.

    *   In the `init` block, read the lines of the dictionary file one by one, and
    add each to the `Set`.


    **PROJECT STEP 11.4**


    Add a field called `words` that is a `mutableSetOf<String>()`.


    **PROJECT STEP 11.5**


    Replace the stubbed implementation of `contains` with


    ```

    fun contains(string: String): Boolean {

    return words.contains(string)

    }

    ```


    The only work remaining with `Dictionary` is to write the `init` block.


    **PROJECT STEP 11.6**


    Can you remember the code to get the contents of a file as a `List<String>`?


    (We used this in the constructor of `Book` in Project Austen.)


    Write an `init` block for `Dictionary`. The code should read `pathToFile` as a
    `List<String>`, then iterate over this `List` and add each item to `words`.


    If each of the last three steps has been implemented correctly, the unit test
    should pass. You can compare your code with this:


    ```

    package lpk.anagrams

    import java.nio.file.Files

    import java.nio.file.Path

    /**

    * Checks words against a list of words read

    * from a file in which there is one word per line.

    */

    class Dictionary(pathToFile: Path) {

    val words = mutableSetOf()

    init {

    val lines = Files.readAllLines(pathToFile)

    for (line in lines) {

    words.add(line)

    }

    }

    fun contains(string: String): Boolean {

    return words.contains(string)

    }

    }

    ```


    ## 11.3 The `Term` Class


    A `Term` object represents any arrangement of `Char`s. The arrangement may or
    may not be a real “term” that can be found in a dictionary. Here’s the code for
    `Term` when the project is first opened:


    ```

    1   package lpk.anagrams


    3   /**

    4    * An arrangement of characters which may

    5    * or may not be an English word.

    6    */

    7   data class Term(val text: String) {


    9       fun permutations(): Set {

    10           val result = mutableSetOf()

    11           return result

    12       }

    13   }

    ```


    There are a couple of things here that we haven’t seen before. Notice, in the
    middle of line 7, that the constructor is


    ```

    val text: String

    ```


    The constructor parameter is labeled `val`, and there is no explicit `init` block.
    This is Kotlin shorthand for there being a field called `text`, which is of type
    `String` and which is set to be the value passed in to the constructor.


    Notice too that line 7 starts with the keyword `data`. This makes `Term` a so-called
    *data class*, and Kotlin adds code automatically that allows us to compare `Term`s
    using the `==` operator.


    **PROJECT STEP 11.7**


    To see this in action, open the class `TermTest` and add the following:


    ```

    1   @Test

    2   fun equalsTest() {

    3       val cat = Term("cat")

    4       val feline = Term("cat")

    5       val dog = Term("dog")

    6       Assert.assertTrue(cat == feline)

    7       Assert.assertFalse(cat == dog)

    8   }

    ```


    On lines 3 and 4, we declare `Term` instances, called `cat` and `feline`, respectively,
    that both have the `String "cat"` as their `word`. On line 6, we compare these
