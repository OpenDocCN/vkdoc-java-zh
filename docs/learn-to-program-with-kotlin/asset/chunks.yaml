- fmt: '### 3.2 Loops


    Suppose that we wanted to produce a tile pattern like the one shown in Figure
    [3-3](#508289_1_En_3_Chapter.xhtml#Fig3). With so many cells, it would be tedious
    to set each of the colors in the `getTileColors` function individually. However,
    we can take advantage of the fact that within each row all of the cells are the
    same color, to automate the process of setting the colors within a row. To do
    this, we need to use a programming structure called a `for`-loop.


    ![../images/508289_1_En_3_Chapter/508289_1_En_3_Fig3_HTML.jpg](images/508289_1_En_3_Chapter/508289_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    We will use `for`-loops to produce this pattern.


    The first step in producing the pattern is to initialize an array, which we call
    `shades`, with five rows and columns:


    ```

    val shades = Array(5) {

    Array(5) { 0 }

    }

    ```


    With the array created, we can set the colors of the first row using a `for`-loop:


    ```

    //Set each cell in row 0 to be black

    for (col in 0..4) {

    shades[0][col] = 0

    }

    ```


    The structure of the `for`-loop that we are using is:


    ```

    for (COUNTER in RANGE) {

    LOOP BODY: CODE THAT MAY USE THE COUNTER

    }

    ```


    In our preceding `for`-loop, the counter is called `col`. It represents the column
    index and therefore has values from `0` to `4`. A list of consecutive numbers
    is represented in Kotlin by what is called a *range*. There are various ways of
    defining a range in Kotlin. Here, we are using the expression `0..4`. (In fact,
    ranges in Kotlin can be nonconsecutive numbers too, but we won’t need those.)
    The loop body simply sets the color of the cell corresponding to the column:


    ```

    shades[0][col] = 0

    ```


    Note that each cell in the row gets the same value, `0`.


    To produce the full pattern, we use similar loops for each of the rows, but with
    progressively lighter shades of gray:


    ```

    fun tileColors(): Array> {

    val shades = Array(5) {

    Array(5) { 0 }

    }

    //Set each cell in row 0 to be black

    for (col in 0..4) {

    shades[0][col] = 0

    }

    //Row 1 is dark gray.

    for (col in 0..4) {

    shades[1][col] = 65

    }

    //Row 2 is gray.

    for (col in 0..4) {

    shades[2][col] = 130

    }

    //Row 3 is light gray.

    for (col in 0..4) {

    shades[3][col] = 195

    }

    //Row 4 is white.

    for (col in 0..4) {

    shades[4][col] = 255

    }

    return shades

    }

    ```


    Copy the preceding code into your program and run it to verify that it produces
    the pattern shown earlier.


    **PROGRAMMING CHALLENGE 3.3**


    Modify the preceding code so that it produces this pattern of black and white
    stripes:


    ![../images/508289_1_En_3_Chapter/508289_1_En_3_Figa_HTML.jpg](images/508289_1_En_3_Chapter/508289_1_En_3_Figa_HTML.jpg)


    ### 3.3 Nested Loops


    We have seen that a `for`-loop makes it easy to set all cells in a row to have
    the same color. Suppose that we wanted to give *all* of the tiles in a pattern
    the same color. To do this, we could have a series of nearly identical loops,
    one for each row. A better approach is to loop over the rows, and for the body
    of the loop, have another loop, which sets the values within a row. This pattern,
    of having a loop inside another loop, is very common in programming and is called
    a *nested loop*. Here is a nested loop that sets each cell to be white:


    ```

    fun tileColors(): Array> {

    val shades = Array(5) {

    Array(5) { 0 }

    }

    for (row in 0..4) {

    for (col in 0..4) {

    shades[row][col] = 255

    }

    }

    return shades

    }

    ```


    **PROGRAMMING CHALLENGE 3.4**


    Run the preceding code. Then modify it to produce a pattern in which each tile
    is gray (value `128`).


    ### 3.4 Summary and Solutions to Challenges


    In this chapter, we have seen how array indexes are like map references that allow
    us to set and read particular values. We have also seen `for`-loops, which provide
    a convenient syntax for setting array values in bulk. In the next chapter, we
    will see how it is possible to build nested loops that set array values in a way
    that depends on the row and column values, resulting in yet more interesting patterns.


