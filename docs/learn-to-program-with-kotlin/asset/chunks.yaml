    ## 5.2 除法


    通过加法、减法和乘法，我们可以简单地将两个整数组合起来得到另一个整数。除法则更复杂，因为一个数并不总能被另一个数整除。除以 0 是未定义的。而且，我们如何将
    13 除以 4 来得到另一个整数呢？在编程中，整数的除法由两个操作处理：`/` 和 `%`。


    `x / y` 表示 `y` 能完整地包含在 `x` 中的次数。例如，`8/3` 是 `2`，`8/4` 也是 `2`。


    `x` `%` `y` 表示 `x` 除以 `y` 后的余数。例如，`8 % 3` 是 `2`，`8 % 4` 是 `0`。要查看这些操作的实际效果，请运行以下程序：


    ```

    1   package lpk.basics


    3   fun main() {

    4       for (i in 1..20) {

    5           val div = i / 5

    6           val rem = i % 5

    7           println("i: $i, div: $div, rem: $rem")

    8       }

    9   }

    ```


    第 4 行设置了一个 `for` 循环，变量 `i` 从 `1` 到 `20`。在第 5 行，我们定义了一个名为 `div` 的 `val`，它被设置为 `i`
    除以 `5` 的整数部分。下一行定义了一个名为 `rem` 的 `val`，它是 `i` 除以 `5` 后的余数。在第 7 行，我们打印出 `i` 和这两个
    `val`。我们程序的结果以如下内容开始：


    ![../images/508289_1_En_5_Chapter/508289_1_En_5_Figb_HTML.jpg](img/508289_1_En_5_Figb_HTML.jpg)


