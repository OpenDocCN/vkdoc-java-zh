- fmt: "# 13.5 Refactoring `WordNodeTest`\n\nThe two test functions in `WordNodeTest`\
    \ contain several lines of code that are identical. It would be best if we could\
    \ avoid this duplication, as it is visual clutter that makes the tests hard to\
    \ read. Also, if we make any changes to the way the `WordChecker` is created,\
    \ then the corresponding changes will need to be made in two places. To fix this\
    \ problem, we can extract the common code as a function that is called instead\
    \ of the repeated code. IntelliJ has great support for this. To begin, highlight\
    \ the first three lines of `testEmpty`, as shown in Figure [13-2](#508289_1_En_13_Chapter.xhtml#Fig2).\n\
