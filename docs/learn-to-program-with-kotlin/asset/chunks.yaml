    Assert.assertTrue(wordNode.variantsByOneLetter(checker).isEmpty())

    }

    ```


    即使使用我们的桩实现，这个测试也能通过，因为它总是返回一个空列表。尽管拥有这样的测试似乎毫无意义，但它可以保护我们免受未来可能包含错误的代码更改的影响。


    ### 13.12.5 项目步骤 13.5 的详情


