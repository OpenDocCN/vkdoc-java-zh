  解答 9.3


  ```

  package lpk.files

  import java.nio.file.Files

  import java.nio.file.Paths

  fun main() {

  val file = Paths.get("files/BirdListWithGaps.txt")

  val sightings = Files.readAllLines(file)

  val birdTypes = mutableSetOf()

  for (bird in sightings) {

  if (bird != "") {

  birdTypes.add(bird)

