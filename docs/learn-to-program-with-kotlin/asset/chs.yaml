  ## 15.3 条件变换


  `transform` 函数可用于创建各种艺术效果。例如，让我们将一张图像转换为纯粹的黑白，根据输入像素的亮度选择黑色或白色。首先，修改 `PhotoDisplayer`
  类以显示资源目录中的图片 `agent99.png`：


  ```

  override fun createPicture(): Picture {

  val file = Paths.get(IMAGES + "agent99.png").toFile()

  return loadPictureFromFile(file)

  }

  ```


  如果你运行 `PhotoDisplayer` 的 `main` 函数，你应该会看到一张猫的照片。


  让我们通过将每个像素更改为黑色或白色来变换这张猫的图像。所有“亮”像素将变为白色，所有“暗”像素将变为黑色。我们所说的“亮”和“暗”是什么意思？如果我们把 `Color`
  的红色、绿色和蓝色分量相加，然后除以三，就得到了等效的灰度像素，正如我们在挑战 15.1 中看到的那样。我们不妨这样定义：如果这个平均值大于 128，则该像素为亮色，应变为白色；否则应变为黑色。代码如下：


  ```

  val makeBW = { it: Color ->

  val brightness = (it.red + it.green + it.blue) / 3

  if (brightness > 128) {

  Color(255, 255, 255)

  } else {

  Color(0, 0, 0)

  }

  }

  ```


  这段代码定义了一个名为 `makeBW` 的 `val`，其类型为 `(Color) -> (Color)`，也就是说，它是一个从输入 `Color` 返回一个
  `Color` 的函数。在显示猫的照片之前，可以将这样的函数传递给 `Picture` 的 `transform` 函数：


  ```

  override fun createPicture(): Picture {

  val file = Paths.get(IMAGES + "agent99.png").toFile()

  val makeBW = { it: Color ->

  val brightness = (it.red + it.green + it.blue) / 3

  if (brightness > 128) {

  Color(255, 255, 255)

  } else {

  Color(0, 0, 0)

  }

  }

  return loadPictureFromFile(file).transform(makeBW)

  }

  ```


  如果你运行这个版本的 `PhotoDisplayer`，你应该会看到猫照片的“墨迹”版本，如图 15-2 所示。通过根据强度级别对像素进行分类，并为每个级别使用单一颜色来减少图像中颜色数量的过程称为*阈值处理*。


  ![../images/508289_1_En_15_Chapter/508289_1_En_15_Fig2_HTML.jpg](img/508289_1_En_15_Fig2_HTML.jpg)


  图 15-2


  “墨迹”变换


  **编程挑战 15.6**


  images 目录包含一个文件 `waratah.jpg`，这是一张红火球帝王花花朵的照片。修改 `createPicture` 中的代码以加载此文件。然后修改变换函数，使得对于
  `Color` 类型的 `it`，返回值为：


  *   如果 `it.red` 大于 `180`，则返回 `it` 本身。

  *   否则返回 `it` 的灰度版本。


  对于像素的灰度版本，你可以使用：


  ```

