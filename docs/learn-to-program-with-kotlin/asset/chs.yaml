  \n图 18-2\n\n切片之后\n\n以下是该算法的一种实现：\n\n```\nfun sliceVerticallyIntoPicturesContainingRed():\
  \ List {\nval result = mutableListOf()\nvar leftLimit = -1\nvar rightLimit = -1\n\
  for (i in 0..width() - 1) {\nif (columnContainsRedPixel(i)) {\nif (leftLimit ==\
  \ -1) {\nleftLimit = i\n}\nrightLimit = i\n} else {\n//这是一个间隙\nif (leftLimit >=\
  \ 0) {\n//当前子图片已完成\nval columnsInCurrentPiece = rightLimit - leftLimit + 1\nval\
  \ piece = cropTo(0, leftLimit, height(), columnsInCurrentPiece)\nresult.add(piece)\n\
  //重置标记\nleftLimit = -1\nrightLimit = -1\n}\n}\n}\n//可能还有一块延伸到图片边缘的剩余部分\n//如果存在，则将其添加\n\
  if (leftLimit >= 0) {\nval columnsInCurrentPiece = rightLimit - leftLimit + 1\n\
  val piece = cropTo(0, leftLimit, height(), columnsInCurrentPiece)\nresult.add(piece)\n\
  }\nreturn result\n}\n```\n\n这段代码非常复杂，但有两件事可以帮助我们理解它。首先，我们可以尝试用前面例子中的值来逐步执行代码。其次，我们可以将这段代码与第\
