  \ `LineTest` 中，并检查你是否得到与之前相同的测试报告。\n\n现在让我们转向 `List` 的实现。为此，我们需要引入**字段**或**实例变量**的概念。这只是对类中所有函数都可用的\
  \ `val` 或 `var` 的一个花哨称呼。（即使字段是 `val`，实际上不会变化，它仍然被称为实例变量。这个术语在 Kotlin 之前就已存在。）字段通常在构造函数之后声明。我们的\
  \ `Line` 类将有一个 `String` 的 `List` 作为字段，该字段将由 `words` 函数返回。以下是包含这些更改的 `Line`：\n\n\
  ```\n1   package lpk.austen\n\n3   /**\n4    * 表示从书籍中读取的一行文本。\n5    */\n6   class\
  \ Line(line : String) {\n7       val words = mutableListOf()\n\n9       fun words():\
  \ List {\n10           return words\n11       }\n12   }\n```\n\n\n\n代码中仍然缺少一个关键部分，即第\
  \ 6 行传入构造函数的参数`line`与第 7 行声明的字段`words`之间的连接。我们需要以某种方式从`line`中提取信息并将其放入`words`中。为此，我们使用所谓的*初始化块*或`init`块。其语法如下：\n\
  \n```\ninit {\n//初始化代码...\n}\n```\n\n通常将其放在字段声明和函数之间。\n\n`init`代码有多种可能的实现方式。以下是一种相当简单的方法：\n\
  \n1.  声明一个名为`currentWord`的`var`变量，用于在构建每个单词时存储其`Char`字符。\n\n2.  遍历`line`中的`Char`字符。对于每个字符：\n\
  \    1.  如果是字母，则将其添加到`currentWord`中。\n\n2.  如果是空格，则单词构建完成。将其添加到单词列表并重置`currentWord`。\n\
  \n3.  当遍历完`line`中的所有`Char`字符后，需要记得将`currentWord`添加到单词列表中。\n\n在代码中，这表现为：\n\n```\n\
  1   package lpk.austen\n\n3   /**\n4    * 表示从书中读取的一行文本。\n5    */\n6   class Line(line\
  \ : String) {\n7       val words = mutableListOf()\n\n9       init {\n10       \
  \    var currentWord = \"\"\n11           for (c in line) {\n12               if\
  \ (c == ' ') {\n13                   words.add(currentWord)\n14                \
  \   currentWord = \"\"\n15               } else {\n16                   currentWord\
  \ = currentWord + c\n17               }\n18           }\n19           words.add(currentWord)\n\
  20       }\n\n22       fun words(): List {\n23           return words\n24      \
  \ }\n25   }\n```\n\n如果我们现在运行单元测试，会发现`oneWord`和`twoWords`都通过了，但`testEmpty`失败了。这是一个单元测试保护我们免受编码错误的例子。\n\
  \n项目步骤 10.5\n\n将代码复制到`List`中，并验证两个测试通过，但`testEmpty`失败。\n\n我们代码的一个问题在于第 19 行将`currentWord`添加到`words`的方式。此时`currentWord`可能为空，这种情况下我们不应该添加它。我们可以通过将第\
  \ 19 行包裹在`if`块中来防止这种情况：\n\n```\nif (currentWord != \"\") {\nwords.add(currentWord)\n\
  }\n```\n\n项目步骤 10.6\n\n进行此代码更改，然后检查所有单元测试是否都通过。\n\n## 10.5 对`Line`的进一步测试\n\n我们对`Line`的最后一次修改使所有三个测试都通过了，但实际上仍然存在一个问题。旧版本的代码会将空`String`添加到`words`字段。我们通过添加一个忽略空`String`的`if`语句来防止了这种情况。但还有另一个地方我们将`String`添加到了`words`中：在循环内部。如果输入的`String`包含多个空格，那么连续的两个`Char`字符都会满足第\
  \ 12 行`if`语句的条件。这将导致添加一个空单词。让我们通过一个测试来证明这一点。\n\n项目步骤 10.7\n\n将以下新测试添加到`LineTest`中：\n\
  \n```\n@Test fun doubleSpace() {\nval line = Line(\"a  b\")\nval words = line.words()\n\
  Assert.assertEquals(2, words.size)\nAssert.assertEquals(\"a\", words[0])\nAssert.assertEquals(\"\
  b\", words[1])\n}\n```\n\n然后确认测试失败。*如果测试没有失败，很可能是因为\"a b\"中的双空格没有正确复制。与所有章节一样，项目树中有一个文件，可以从中复制所有必需的代码——请使用该文件。*\n\
  \n解决这个问题的一种方法是将第 8 行包裹在`if`语句中，就像第 14 行一样。如果我们这样做，就会在两个地方重复完全相同的逻辑，这几乎总是一件坏事。相反，我们将创建一个新函数来将`String`添加到单词列表，并在两个地方使用这个函数。\n\
  \n项目步骤 10.8\n\n在`Line`中创建以下新函数：\n\n```\nfun addWord(str: String) {\nif (str != \"\
  \") {\nwords.add(str)\n}\n}\n```\n\n然后修改`init`块以使用新函数：\n\n```\npackage lpk.austen\n\
  /**\n* 表示从书中读取的一行文本。\n*/\nclass Line(line: String) {\nval words = mutableListOf()\n\
  init {\nvar currentWord = \"\"\nfor (c in line) {\nif (c == ' ') {\naddWord(currentWord)\n\
  currentWord = \"\"\n} else {\ncurrentWord = currentWord + c\n}\n}\naddWord(currentWord)\n\
  }\nfun words(): List {\nreturn words\n}\nfun addWord(str: String) {\nif (str !=\
  \ \"\") {\nwords.add(str)\n}\n}\n}\n```\n\n确认所有四个单元测试现在都通过。\n\n到目前为止，我们的测试只使用了小写文本。我们是否希望将大写单词与相同单词的小写版本区别对待？不。让我们确保`List`中的单词始终转换为小写。同样，我们从单元测试开始。\n\
  \n项目步骤 10.9\n\n将以下内容添加到`ListTest`中：\n\n```\n@Test fun wordsAreLowerCase() {\nval\
  \ line = Line(\"Hello THERE\")\nval words = line.words()\nAssert.assertEquals(2,\
  \ words.size)\nAssert.assertEquals(\"hello\", words[0])\nAssert.assertEquals(\"\
