  编程挑战 7.5


  （超级困难。）在某些排版程序中，当单词之间有多个空格时，格式化后的文本会看起来“有间隙”。编写一个程序，将单词之间的所有多个空格压缩为单个空格字符。例如，给定输入：


  ```

  "Mind the   gap!"

  ```


  输出应为：


  ```

  "Mind the gap!"

  ```


  **注意** 如果你从本文档复制文本，三个空格可能会被转换为一个空格。


  **提示** 这与移除空格的程序类似，但我们需要一个 `var` 来记住前一个 `Char` 是否是空格。这个 `var` 可以命名为 `previousCharWasSpace`。它的值要么是
  `true`，要么是 `false`。它的初始值是 `false`。值为 `true` 或 `false` 的类型称为布尔型。


  ## 7.4 关于**字符串**迭代的更多内容


  考虑这个简单的程序：


  ```

  package lpk.basics

  fun main() {

  val str = "abc"

  for (c in str) {

  println(c)

  }

  }

  ```


  Kotlin 系统将其视为如下写法：


  ```

  package lpk.basics

  fun main() {

  val str = "abc"

  val c_0 = ''a''

  println(c_0)

  val c_1 = ''b''

  println(c_1)

  val c_2 = ''c''

  println(c_2)

  }

  ```


  这就是为什么我们可以在循环中将 `c` 视为一个 `val`，例如：


  ```

  for (c in str) {

  // 循环体。这里的 c 是一个 val。

  }

  ```


  编程挑战 7.6


  考虑这个程序：


  ```

  package lpk.basics

  fun main() {

  val str = "back"

  var result = ""

  for (c in str) {

  result = result + c

  }

  println(result)

  }

  ```


  编写一个不使用循环的等效“长格式”版本。


  编程挑战 7.7


  上一个挑战的解决方案是一个程序，其中名为 `result` 的 `var` 被初始化为空 `String`，然后被重置了四次。对于每次重置，在纸上写出重置前后的值。


  每次重置的形式如下：


  ```

  result = result + c_0

  ```


  如果我们在 `+` 操作中交换 `String` 的顺序会发生什么？也就是说，如果我们将它们改为将下一个 `Char` 放在 `result` 之前：


  ```

  result = c_0 + result

  ```


  用这些交换后的重置，写出 `result` 的“之前”和“之后”值。


  利用这些见解，将上一个挑战的程序转换为一个使用循环来反转 `String` 的程序。


  ## 7.5 总结与挑战题解答


  本章介绍了极其重要的 `String` 数据类型。对 `String` 最常见的操作之一就是遍历其字符，就像对数组所做的那样。将此类循环展开为等效的代码块（每个
  `String` 元素对应一个代码块），可以让我们深入了解循环变量的本质。


