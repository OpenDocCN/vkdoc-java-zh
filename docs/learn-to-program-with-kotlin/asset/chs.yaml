  在 0 到 255 之间，32 的倍数有 8 个：0、32、64、96、128、160、192 和 224，并且此变换产生的颜色的红色、绿色和蓝色分量可以是其中任何一个。这意味着将映射应用于图像总共可以产生：


  *   8 × 8 × 8 = 512


