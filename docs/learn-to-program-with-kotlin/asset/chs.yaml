  \ 函数可以根据个人对此事的看法进行修改，以包含或排除数字。目前，我们暂时保留数字。\n\n## 10.11 统计单词数量\n\n我们还没有兑现确定本书最终单词数的承诺。为了获取单词数量，我们将向\
  \ `Histogram` 添加一个名为 `totalWords` 的新函数。这个函数不接受任何参数，并返回一个 `Int` 类型，因此一个可能的桩函数是：\n\
