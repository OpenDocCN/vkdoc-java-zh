  \ {\n14           return counter.keys\n15       }\n\n17       fun numberOfTimesGiven(word:\
  \ String): Int {\n18           return counter[word] ?: 0\n19       }\n20   }\n```\n\
  \n第 8 行声明了我们的 `counter` 字段。该字段在第 14 行的 `allWords` 实现中被使用。`Map<String, Int>` 的 `keys`\
  \ 是所有 `Map` 中包含 `Int` 值的 `String`。\n\n在第 18 行，我们直接从 `Map` 中获取某个 `String` 的计数。你还记得我们为什么使用\
  \ Elvis 运算符吗？如果不记得，请查看第 97 页的解释。\n\n关于前面列出的代码，你可能想知道为什么没有构造函数和 `init` 块。与 `Line`\
  \ 不同，创建 `Histogram` 不需要任何信息，因此无需添加构造函数。至于没有 `init` 块，唯一需要的字段初始化已在字段声明中完成。\n\n`Histogram`\
  \ 中唯一剩余需要实现的部分是 `record` 函数。如前所述，我们已经见过类似的内容。\n\n项目步骤 10.18\n\n让我们实现 `record`。它有三行代码。第一行，我们检索传入参数\
  \ `word` 的当前计数：\n\n```\nval currentCount = counter[word] ?: 0\n```\n\n接下来，我们定义一个新的\
  \ `val`，它是旧计数加 1：\n\n```\nval newCount = currentCount + 1\n```\n\n最后，我们将 `newCount`\
  \ 以键 `word` 放入 `counter`：\n\n```\ncounter.put(word, newCount)\n```\n\n进行这些更改，然后重新运行单元测试。现在它们应该全部通过。\n\
  \n如果你遇到了问题，可以使用以下 `Histogram.kt` 代码：\n\n```\npackage lpk.austen\n/**\n* 收集单词使用数据。\n\
  */\nclass Histogram {\nval counter = mutableMapOf()\nfun record(word: String) {\n\
  val currentCount = counter[word] ?: 0\nval newCount = currentCount + 1\ncounter.put(word,\
  \ newCount)\n}\nfun allWords(): Set {\nreturn counter.keys\n}\nfun numberOfTimesGiven(word:\
  \ String): Int {\nreturn counter[word] ?: 0\n}\n}\n```\n\n\n## 10.7 BookTest 与 Book\n\
  \n从我们之前简短的设计讨论可知，`Book` 由文本文件创建，并包含一个 `Histogram` 对象，用于记录书中的单词。文本文件可作为构造函数参数传入，其信息提取工作可在\
  \ `init` 块中完成。以下是 `Book` 的部分实现：\n\n```\npackage lpk.austen\nimport java.nio.file.Files\n\
