  ## 15.4 基于位置的变换


  到目前为止，我们看到的变换都具有以下签名：


  ```

  (Color) -> (Color)

  ```


  也就是说，它们接收一个输入的 `Color`，并将其转换为一个输出的 `Color`。观察图 15-6 中摇篮山的两幅图像。原始图像经过一个使边缘像素变暗的函数变换。这种变换的公式不仅需要原始的
  `Color`，还需要像素的位置，即其 `row` 和 `column` 坐标。一个可能的签名是：


  ![../images/508289_1_En_15_Chapter/508289_1_En_15_Fig6_HTML.jpg](img/508289_1_En_15_Fig6_HTML.jpg)


  图 15-6


  根据像素位置进行的变换


  ```

  ((Color), (Int), (Int)) -> (Color)

  ```


  此签名中的 `Color` 参数是位于给定 `row` 和 `column` 处的像素。这实际上可以从图像本身获取，因此是冗余信息。也就是说，我们可以使用一个具有以下签名的函数来实现如图
  15-6b 所示的边缘效果：


  ```

  ((Int), (Int)) -> (Color)

  ```


  让我们看看如何实现。


  将以下代码复制到 `Picture` 类中：


  ```

