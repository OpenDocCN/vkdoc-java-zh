  \ `LineTest` 的单个文件，位于名为 `lpk.austen.test` 的包中。这是 `Line` 单元测试的存根。在 `resources` 目录中，有一些非常短的书籍（不是奥斯汀的！），这些将用于我们编写\
  \ `Book` 类时对其进行的单元测试。\n\n\n\n## 10.4 LineTest 与 Line\n\n目前，`Line` 桩类（stub class）仅包含一条注释：\n\
  \n```\npackage lpk.austen\n/**\n* 表示从书籍中读取的一行文本。\n*/\nclass Line\n```\n\n而 `LineTest`\
  \ 则稍微有趣一些：\n\n```\n1   package lpk.austen.test\n\n3   import org.junit.Test\n\n\
  5   class LineTest {\n6       @Test\n7       fun test1() {\n\n9       }\n10   }\n\
  ```\n\n这里有几个新知识点：\n\n1.  在第 3 行，我们导入了 `org.junit.Test`，这是一种特殊的类，称为**注解**（`annotation`）。它们被用作代码中的标签。\n\
  \n2.  在第 6 行和第 7 行，我们声明了一个名为 `test1` 的函数，并使用第 3 行导入的 `@Test` 注解对其进行了标记。这个标签使得 JUnit\
  \ 框架能够将 `test1` 识别为一个测试，并让 Kotlin 运行它。\n\n3.  `test1` 的函数体目前是空的，因为 `Line` 中还没有可供测试的代码。\n\
  \n我们可以使用 IntelliJ 运行 `test1`，方法是点击代码左侧出现的绿色小三角形，如图 10-3a 所示。图 10-3b 展示了测试运行后 IntelliJ\
