- "# 13. 单词转换\n\n如何将“cave”变成“home”？一种方法如下：\n\n```\ncave → came → come → home.\n```\n\
  \n这就是*单词转换*游戏：选择两个单词，然后看能否通过每次改变一个字母，将其中一个单词转换成另一个，且每次改变后得到的都是有效单词。\n\n在本章中，我们将编写软件来解决任意两个单词的单词转换问题——如果存在解决方案——并在无解时告知用户。这既是一个有趣的问题，也能让我们进一步练习面向对象编程和单元测试，同时我们还将构建一种新的数据结构，它实际上是递归的。\n\
  \n## 13.1 算法\n\n解决此问题的一种方法是创建单词的“代”，每一代由上一代通过单字母替换生成，并注意记录已生成过的单词。当发现某一代包含目标单词时，过程成功结束。当某一代仅包含之前各代已出现的单词时，过程失败结束。最好通过示例来理解。假设起始单词是\
  \ `fight`，目标单词是 `argue`。\n\n### 13.1.1 第一代\n\n通过改变 `fight` 中任意一个字母可以得到的单词有：\n\n\
  ```\nbight, dight, eight, hight, light, might,\nnight, pight, right, sight, tight,\
  \ wight\n```\n\n这些单词都是新的，但都不是目标单词，因此我们用它们来构建新一代。\n\n### 13.1.2 第二代\n\n第一代中的每个单词都可以变回\
  \ `fight`，但那是我们的起始单词，所以已经出现过。除此之外：\n\n*   从 `bight` 可以得到 `bigot` 和 `bigha`。\n\n\
  *   从 `dight` 可以得到 `digit`。\n\n*   从 `eyght` 可以得到 `eight`。\n\n*   `night` 生成 `noght`。\n\
  \n*   `tight` 生成 `toght`。\n\n因此第二代中的新单词是：\n\n```\nbigot, bigha, digit, eyght, noght,\
  \ toght\n```\n\n### 13.1.3 第三代\n\n在第二代创建的单词中，只能创建两个新单词：`bigot` 生成 `begot`，`digit`\
  \ 可以变成 `dimit`。\n\n### 13.1.4 第四代\n\n从第三代的新单词中，我们从 `begot` 得到 `besot`、`beget` 和\
  \ `begod`，从 `dimit` 得到 `limit` 和 `demit`。\n\n### 13.1.5 算法成功终止\n\n经过多代之后，找到了目标单词\
  \ `argue`。生成它的单词是 `argus`。生成 `argus` 的单词是 `argas`，依此类推，逆向追溯，直到 `bigot`，然后到 `bight`，最后到起始单词\
  \ `fight`。完整的单词链是：\n\n```\nfight, bight, bigot, begot, beget, reget, revet, levet,\n\
  lever, laver, lager, eager, egger, agger, anger, angor,\nalgor, algol, argol, argal,\
  \ argas, argus, argue\n```\n\n### 13.1.6 算法失败终止\n\n同样值得看一个算法未找到目标单词而终止的示例。假设起始单词是\
  \ `viola`，目标单词是 `cello`。第一代只包含两个新单词：`villa` 和 `viole`。从 `villa` 可以得到 `viola`（当然）以及新单词\
  \ `zilla` 和 `villi`，但 `viole` 无法变成新单词。因此我们有：\n\n```\n起始单词: viola\n第一代: villa, viole\n\
  第二代: zilla, villi\n```\n\n然而，`zilla` 和 `villi` 都无法变成新单词，因此第三代为空，算法终止。\n\n## 13.2\
  \ 主要类与项目设置\n\n如示例所示，我们的算法包含三个关键过程。首先，是从现有单词生成新单词的任务。我们将有一个名为 `WordNode` 的类来执行此操作。其次，`WordNode`\
  \ 创建的单词需要检查是否有效以及是否之前出现过。这项工作将由名为 `WordChecker` 的类完成。最后，如果找到目标单词，我们需要构建从起始单词到目标单词的“路径”。我们的\
  \ `WordNode` 类除了创建新单词外，还将负责这项工作。\n\n还需要另外两个类。前几章的 `Dictionary` 将被 `WordChecker`\
  \ 用来测试潜在新单词的有效性。最后，一个名为 `WordSwitch` 的类将提供 `main` 函数并实现单词转换算法。\n\n`WordChecker`、`WordNode`\
  \ 和 `WordSwitch` 的桩代码及其单元测试已经创建，我们使用与前几章相同的 `Dictionary` 类和测试。要开始，请打开项目 [`https://github.com/Apress/learn-to-program-w-kotlin-wordswitch.git`](https://github.com/Apress/learn-to-program-w-kotlin-wordswitch.git)。\n\
  \n\n\n## 13.3 `WordChecker` 类\n\n首次打开项目时，`WordChecker` 类应如下所示：\n\n```\n1   package\
  \ lpk.words\n\n3   /**\n4    * 检查潜在的新单词是否在词典中\n5    * 且之前未被见过。\n6    */\n7   class\
  \ WordChecker(val dictionary: Dictionary) {\n\n9       val wordsSoFar = mutableSetOf()\n\
  \n11       fun isPreviouslyUnseenValidWord(string: String): Boolean {\n12      \
  \     return false\n13       }\n14   }\n```\n\n从第 7 行可以看出，`WordChecker` 有一个 `Dictionary`\
  \ 类型的字段，该字段通过构造函数传入。\n\n目前只有一个函数 `isPreviouslyUnseenValidWord`，它被赋予了一个始终返回 `false`\
  \ 的桩实现。我们的第一个编程任务是为这个函数编写一个单元测试，以便我们可以安全地用正确的实现替换这个桩。有几个测试用例浮现在脑海中：\n\n*   如果某个\
  \ `String` 不在 `Dictionary` 中，该函数应返回 `false`。\n\n*   对于在 `Dictionary` 中的 `String`，第一次见到该单词时，函数应返回\
  \ `true`，但后续调用都应返回 `false`。\n\n在编写单元测试时，我们可以像上一个项目那样创建一个包含五个单词的词典，然后基于此创建一个 `WordChecker`。\n\
  \n项目步骤 13.1\n\n在 IntelliJ 中打开 `WordCheckerTest`，并将这个部分实现的测试函数复制到该类中：\n\n```\n@Test\n\
  fun notInDictionaryTest() {\nval path = Paths.get(\"src/test/resources/books/FiveWords.txt\"\
  )\nval dictionary = Dictionary(path)\nval checker = WordChecker(dictionary)\n}\n\
  ```\n\n在此函数中添加一行，检查单词“aardwolf”是否不是一个之前未见过的有效单词。\n\n考虑到 `isPreviouslyUnseenValidWord`\
  \ 的桩实现，你预期这个测试会通过还是失败？\n\n提示\n\n此项目步骤及其他项目步骤的解决方案位于本章末尾。\n\n实现此项目步骤后，`WordCheckerTest`\
  \ 应如下所示：\n\n```\npackage lpk.words.test\nimport org.junit.Assert\nimport org.junit.Test\n\
