- '# 6. 值与变量


  在编写程序时，我们可能会有一段信息需要在程序的其他地方引用。*值*和*变量*就是为此而生的。它们分别使用关键字 `val` 和 `var` 来定义。我们可以把
  `val` 和 `var` 想象成存放数据项的盒子。`var` 是一个可以取出数据并替换为其他数据项的盒子。而对于 `val`，数据项一旦设定就永远无法替换。


  ## 6.1 使用 `var`


  `var` 的一个常见用途是存储计算的中间结果。例如，如果我们想编写一个程序来计算从 `1` 到 `10` 所有数字的和，我们可以：


  *   创建一个名为 `sum` 的 `var`，初始值为 `0`。

  *   定义一个循环，计数器 `i` 从 `1` 开始，到 `10` 结束。

  *   在循环的每一步中，将 `i` 加到 `sum` 上。


  以下是将该算法转换为代码的形式：


  ```

  1   package lpk.basics


  3   fun main() {

  4       var sum = 0

  5       for (i in 1..10) {

  6           sum = sum + i

  7       }

  8       print(sum)

  9   }

  ```


  将这段代码复制到上一章使用的 `Arithmetic.kt` 文件中。运行它，检查是否打印出了数字 `55`。


  代码的工作原理如下。在第 4 行，我们定义了一个名为 `sum` 的 `var`。这行代码中的等号实际上表示“将 `sum` 盒子中的数据设置为 `0`”。第
  6 行乍一看可能令人困惑，因为等号两边都出现了 `sum`。但和第 4 行一样，等号实际上表示“将值设置为”。因此，第 6 行实际上被解释为“用当前内容加上 `i`
  的结果替换 `sum` 盒子中的内容”。


  使用变量时最棘手的事情之一就是使用 `=` 来设置它们的值。有些编程语言使用 `:=` 来完成这项工作，这样就不那么容易混淆。请记住，要测试两个对象是否相等，我们使用
  `==`。


  编程挑战 6.1


  修改上述程序，使其计算从 `1` 到 `100` 所有数字的和。


  然后修改它，使其计算从 `11` 到 `20` 所有数字的和。


  编程挑战 6.2


  现在修改程序，使其计算从 `1` 到 `10` 所有数字的平方和。（一个数的平方就是该数乘以自身。记住使用 `*` 表示乘法。）


