  \ `<` 来表达行和列上的条件。\n\n## 4.4 If-Else-If 语句\n\n通过扩展 `if-else` 语法，可以做出更复杂的选择，其中 `else`\
  \ 部分本身就是一个 `if-else` 语句。例如，假设我们想要生成图 4-4 中的“两点”图案。我们可以使用 `if-else-if` 组合来实现：\n\n\
