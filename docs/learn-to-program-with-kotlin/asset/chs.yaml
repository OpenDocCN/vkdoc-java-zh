  \ 了。实现方式有很多种，我们可以自由选择任何能让测试通过的实现。一种方法是使用 `Map<String,Int>` 来记录单词计数，就像我们在第 8 章中使用\
  \ `Map` 记录鸟类计数一样。`Map` 需要能被 `Histogram` 中的所有函数访问，因此我们将其声明为一个字段，命名为 `counter`。\n\n\
  项目步骤 10.17\n\n将 `Histogram` 修改为：\n\n```\n1   package lpk.austen\n\n3   /**\n4  \
