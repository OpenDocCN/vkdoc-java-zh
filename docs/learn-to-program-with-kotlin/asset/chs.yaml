  \ `Char`。如果我们查看 `PrideAndPrejudice.txt` 的前 30 行左右，会发现其中还使用了下划线字符。因此，让我们在 `LineTest`\
  \ 中添加对这些字符的检查。\n\n项目步骤 10.25\n\n将以下测试函数复制到 `LineTest` 中：\n\n```\n@Test\nfun ignorePunctuation()\
  \ {\nval line = Line(\"Hello. Goodbye! Yes? No, no.\")\nval words = line.words()\n\
  Assert.assertEquals(5, words.size)\nAssert.assertEquals(\"hello\", words[0])\nAssert.assertEquals(\"\
  goodbye\", words[1])\nAssert.assertEquals(\"yes\", words[2])\nAssert.assertEquals(\"\
  no\", words[3])\nAssert.assertEquals(\"no\", words[4])\n}\n@Test fun morePunctuation()\
  \ {\nval line = Line(\"Hello; _Goodbye_! X: 5\")\nval words = line.words()\nAssert.assertEquals(4,\
  \ words.size)\nAssert.assertEquals(\"hello\", words[0])\nAssert.assertEquals(\"\
  goodbye\", words[1])\nAssert.assertEquals(\"x\", words[2])\nAssert.assertEquals(\"\
  5\", words[3])\n}\n```\n\n运行它们并确认测试失败。\n\n我们还没有为其编写测试的一个内容是双引号字符。我们使用双引号来*界定*（定义开始和结束）`String`，因此不能简单地将一个双引号放入\
  \ `String` 中并期望它能正常工作。我们需要做的是，在 `String` 中想要表示字面意义的双引号前面加上一个反斜杠 `Char`。这被称为*转义*字符。\n\
  \n项目步骤 10.26\n\n将以下针对双引号的测试添加到 `LineTest` 中：\n\n```\n@Test\nfun doubleQuotes() {\n\
  val line = Line(\"\\\"It's not.\\\"\")\nval words = line.words()\nAssert.assertEquals(2,\
  \ words.size)\nAssert.assertEquals(\"it's\", words[0])\nAssert.assertEquals(\"not\"\
  , words[1])\n}\n```\n\n该测试将会失败。\n\n以下是 `Line` 中的 `init` 块：\n\n```\n1   init {\n\
  2       var currentWord = \"\"\n3       for (c in line) {\n4           if (c ==\
  \ ' ') {\n5               addWord(currentWord)\n6               currentWord = \"\
  \"\n7           } else {\n8               currentWord = currentWord + c\n9     \
  \      }\n10       }\n11       addWord(currentWord)\n12   }\n```\n\n第 4 行是一个 `if`\
  \ 语句，当条件为 `true` 时，会分支执行中断当前正在构建的单词的代码。这个 `if` 语句只考虑了空格 `Char`。我们可以通过使用 `||` 运算符来修复这个问题：\n\
  \n```\nif (c == ' ' || c == ',' || c == '.' || ...) {\n```\n\n然而，这将会变成一行非常复杂的代码，因为可能有太多标点符号字符可以终止一个单词。相反，我们将创建一个函数，该函数接收一个\
  \ `Char` 作为输入，并根据该 `Char` 是否应该中断一个单词来返回 `true` 或 `false`。具有 `true` 和 `false` 值的数据类型称为\
  \ `Boolean`，这将是我们的新函数的返回类型。我们将不再在第 4 行将 `c` 与空格 `Char` 进行比较，而是调用这个名为 `isWordTerminator`\
  \ 的新函数。\n\n项目步骤 10.27\n\n用这个新版本替换 `Line` 的现有代码：\n\n```\npackage lpk.austen\n/**\n\
  * 表示从书中读取的一行文本。\n*/\nclass Line(line: String) {\nval words = mutableListOf()\ninit\
  \ {\nvar currentWord = \"\"\nfor (c in line) {\nif (isWordTerminator(c)) {\naddWord(currentWord)\n\
  currentWord = \"\"\n} else {\ncurrentWord = currentWord + c\n}\n}\naddWord(currentWord)\n\
  }\nfun words(): List {\nreturn words\n}\nfun addWord(str: String) {\nif (str !=\
  \ \"\") {\nwords.add(str.toLowerCase())\n}\n}\nfun isWordTerminator(c: Char): Boolean\
  \ {\nif (c == ' ') return true\nif (c == '.') return true\nif (c == ',') return\
  \ true\nif (c == '!') return true\nif (c == '?') return true\nif (c == '\\\"') return\
  \ true\nif (c == '_') return true\nif (c == ';') return true\nif (c == ':') return\
  \ true\nreturn false\n}\n}\n```\n\n检查 `Line` 的所有单元测试现在是否都通过了。\n\n## 10.9 使用真实数据进行测试\n\
