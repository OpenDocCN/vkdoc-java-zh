  ## 15.2 单元测试


  我们在上一节中开发的 `transform` 函数是一种强大的方法，可以逐个像素地修改图像。在进一步深入之前，我们应该对其进行测试。以下单元测试加载了一张每个像素都是绿色的图像（第
  5 行）。然后，它创建了一个从 `Color` 到 `Color` 的函数，名为 `toRed`，该函数简单地将任何输入的 `Color` 更改为红色（第 8
  行）。将 `transform` 函数应用于绿色图像，并以 `toRed` 作为参数（第 12 行）。转换的结果应该是一张与原始图像大小相同，但每个像素都是红色的图像，这正是检查的内容（第
  15 至 20 行）。


  ```

  1   @Test

  2   fun transformTest() {

  3       //从一张所有像素都是绿色的图像开始。

  4       val file = Paths.get(IMAGES + "green_h50_w100.png").toFile()

