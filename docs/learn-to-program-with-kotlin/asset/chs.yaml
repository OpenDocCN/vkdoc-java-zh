  2   fun testEmpty() {\n3       val line = Line(\"\")\n4       Assert.assertEquals(0,\
  \ line.words().size)\n5   }\n```\n\n这里的第 3 行从一个空 `String` 创建了一个 `Line`。下一行调用了 JUnit\
  \ 提供的名为 `Assert.assertEquals` 的函数。该函数接受两个参数并比较它们是否相等。如果不相等，测试将失败。因此，第 4 行检查 `0`\
