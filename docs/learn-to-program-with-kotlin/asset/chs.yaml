  ## 7.3 构建新的**字符串**


  在编程中，我们经常需要自动生成文本——例如，给用户的消息——而在 Kotlin 中这非常容易，因为我们可以使用与数字相加相同的 `+` 运算符来拼接 `String`：


  ```

  1   fun main() {

  2       val msg = "Hello" + " " + "World!"

  3       println(msg)

  4   }

  ```


  第 2 行的 `val msg` 通过拼接三个 `String` 定义，其中中间那个只是一个空格，从而生成单个 `String "Hello World!"`。


  我们可以通过循环遍历文本，并在遍历过程中将想要保留的字母添加到一个结果 `var` 中，从而从文本中移除某些 `Char`。例如，假设我们想要从一个 `String`
  中移除空格。我们可以查看 `String` 中的每个 `Char`，如果它不是空格，就将其添加到结果 `var` 中。检查 `Char c` *不是*空格 `Char`
  的方法是使用“不等于”运算符，写作 `!=`：


  ```

  1   if (c != '' '') {

  2       // 添加它

  3   }

  ```


  以下是完整的程序：


  ```

  fun main() {

  val str = "There is a bunker!"

  var noSpaces = ""

  for (c in str) {

  if (c != '' '') {

  noSpaces = noSpaces + c

  }

  }

  println(noSpaces)

  }

  ```


