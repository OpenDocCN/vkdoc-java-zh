  \ Color.RED))\nAssert.assertTrue(allBlue.columnContainsPixelMatching(column, Color.BLUE))\n\
  }\nval allRed = load(\"red10.png\")\nfor (column in 0..9) {\nAssert.assertTrue(allRed.columnContainsPixelMatching(column,\
  \ Color.RED))\nAssert.assertFalse(allRed.columnContainsPixelMatching(column, Color.BLUE))\n\
  }\n//100 行，200 列，除一个 50x50 的方块外全黑\n//该方块左上角位于第 50 行、第 100 列\nval someRed = load(\"\
  red_in_black.png\")\nfor (column in 0..99) {\nAssert.assertFalse(someRed.columnContainsPixelMatching(column,\
  \ Color.RED))\n}\nfor (column in 100..149) {\nAssert.assertTrue(someRed.columnContainsPixelMatching(column,\
  \ Color.RED))\n}\nfor (column in 150..199) {\nAssert.assertFalse(someRed.columnContainsPixelMatching(column,\
  \ Color.RED))\n}\n}\n```\n\n### 19.6.2 项目步骤 19.2 的细节\n\n重构后的测试为\n\n```\n@Test\n\
  fun sliceVerticallyIntoPicturesContainingTest() {\nval picture = load(\"slice_test_v.png\"\
  )\nval slices = picture.sliceVerticallyIntoPicturesContaining(Color.RED)\nAssert.assertEquals(3,\
  \ slices.size)\ncheckPicture(load(\"v0.png\"), slices[0])\ncheckPicture(load(\"\
  v1.png\"), slices[1])\nval slicesBlack =\npicture.sliceVerticallyIntoPicturesContaining(Color.BLACK)\n\
  Assert.assertEquals(1, slicesBlack.size)\ncheckPicture(load(\"slice_test_v.png\"\
  ), slicesBlack[0])\n}\n```\n\n### 19.6.3 项目步骤 19.3 的细节\n\n`DigitFinder` 的新版本为\n\n\
  ```\npackage pfb.imaging\nimport java.awt.Color\nclass DigitFinder(val input: Picture)\
  \ {\nval blackWhitRedThresholder: ((Color) -> (Color)) = {\nif (it.red  128 && it.green\
  \  (Boolean)) = {\nit.width() > 20 && it.height() > 20\n}\nfun digits(): List {\n\
  val blackWhitRedVersion = input.transform(blackWhitRedThresholder)\nval slicesH\
  \ = blackWhitRedVersion.\nsliceHorizontallyIntoPicturesContaining(Color.RED)\nval\
  \ signSlice = slicesH.first()\nval slicesV = signSlice.\nsliceVerticallyIntoPicturesContaining(Color.RED)\n\
  val sign = slicesV.first()\nval slices2H = sign.\nsliceHorizontallyIntoPicturesContaining(Color.BLACK).\n\
  filter(sizeAtLeast20)\nreturn slices2H\n}\n}\n```\n\n# 20. 解析图像\n\n在上一章中，我们完成了一个名为\
  \ `DigitFinder` 的程序，它能够加载限速标志的照片，并从中提取出各个数字的黑白图像列表。在本章中，我们将编写代码来确定这些提取出的图像所代表的数字。\n\
  \n将 `DigitFinder` 应用于不同的限速标志，会得到如下所示的输出图像：\n\n![../images/508289_1_En_20_Chapter/508289_1_En_20_Figa_HTML.jpg](img/508289_1_En_20_Figa_HTML.jpg)\n\
  \n为了确定一幅图像代表哪个数字，我们的软件将构建该图像的描述，然后根据描述做出判断。例如，如果图像“非常窄”，它将被归类为“1”。如果图像“中心为白色”，则会被归类为“0”。由于我们分类的图像在大小和呈现角度上各不相同，并且偶尔会缺失黑色像素，因此我们的软件在判断图像代表哪个数字时，只能使用相当宽泛的描述，例如“窄”或“中心为白色”。\n\
  \n我们将主要利用图像不同部分黑色像素的密度信息来描述它。一个名为 `Regions` 的类将识别像素位于图像的哪个区域。一个名为 `PictureSummary`\
  \ 的类将遍历图像中的像素，并借助该图像的 `Regions` 对象，收集关于黑色像素位置的统计数据。这些信息将被总结为诸如 `hasCenterBlank`、`hasCenterDark`\
  \ 等属性。最后，在名为 `DigitReader.kt` 的文件中，一个名为 `read` 的函数将包含决策逻辑，该逻辑使用来自 `PictureSummary`\
  \ 的信息来决定图像代表哪个数字。\n\n本章的目标是开发 `Regions`、`PictureSummary` 和 `DigitReader.kt` 这些类及其测试，达到能够通过编程区分“0”、“1”、“2”、“5”和“7”的程度。执行此操作的代码可以轻松扩展以处理其余数字。我们不会解释所有细节，而是直接展示完成的类，作为下一章的起点。\n\
  \n## 20.1 术语\n\n我们所有的数字图像都是矩形的。如前所述，我们将通过描述矩形内黑色像素的区域密度来总结一幅图像。图像的大小各不相同，因此我们只能使用相对术语。\n\
  \n*左*、*右*、*上*和*下*指的是图像在这些位置的四分之一区域。我们关注的是图像中所有黑色像素位于这些区域的比例。例如，考虑图 20-1。忽略红色边框，位于左四分之一区域的黑色像素比例为\
  \ 0.5，位于上四分之一区域的比例为 0.25。\n\n![../images/508289_1_En_20_Chapter/508289_1_En_20_Fig1_HTML.jpg](img/508289_1_En_20_Fig1_HTML.jpg)\n\
  \n图 20-1\n\n一半的黑色像素位于左四分之一区域\n\n图像的*中心*是被这些四分之一区域包围的部分。*顶部条带*是图像顶部七分之一的部分，*底部条带*是底部七分之一的部分。对于中心和条带，我们关注的是*在这些区域中*所有像素里黑色像素的比例。下表给出了我们将使用的一些术语示例。\n\
  \n| 术语 | 含义 | 示例 |\n| --- | --- | --- |\n| `hasCenterBlank` | 中心区域最多 10% 的像素为黑色\
  \ | “0” |\n| `hasDarkCenter` | 中心区域至少 65% 的像素为黑色 | “4” |\n| `hasTopBar` | 顶部七分之一区域至少\
  \ 75% 为黑色 | “5” |\n| `hasBottomBar` | 底部七分之一区域至少 75% 为黑色 | “2” |\n\n## 20.2 项目结构\n\
  \n本章的代码可以从 [`https://github.com/Apress/learn-to-program-w-kotlin-ch20.git`](https://github.com/Apress/learn-to-program-w-kotlin-ch20.git)\
  \ 下载。`Picture` 和 `DigitFinder` 类与我们上一章结束时留下的版本一致。此外，还有 `PictureSummary`、`Regions`\
  \ 和 `DigitReader` 的基本版本及其测试。\n\n新增了两个测试数据目录。`summary` 目录包含我们将在 `PictureSummary`\
  \ 单元测试中使用的图像。`digits` 目录包含本章开头显示的图像，这些图像将用于测试 `DigitReader`。另一个变化是，`signs` 测试数据目录现在包含覆盖所有数字的标志。`DigitFinderTest`\
  \ 已得到增强，可以处理此目录中的所有文件，而不仅仅是 `80.png`，`digits` 目录中的图像正是通过这种方式创建的。\n\n\n\n## 20.3\
  \ 识别数字“1”\n\n新下载的代码中已包含一个能识别数字“1”的 `DigitReader` 版本。要了解其工作原理，最简便的方式是从测试用例反向推导：\n\
  \n```\n1   val DIGITS = \"src/test/resources/images/digits\"\n\n3   class DigitReaderTest\
  \ {\n4       @Test\n5       fun readTest() {\n6           Assert.assertEquals(1,\
  \ read(loadSummary(\"1.png\")))\n7       }\n\n9       fun loadSummary(name: String):\
  \ PictureSummary {\n10           val file = Paths.get(DIGITS + \"/\" + name).toFile()\n\
  11           return PictureSummary(loadPictureFromFile(file))\n12       }\n13  \
  \ }\n```\n\n这段代码的第一行是一个常量，用于标识相关的测试数据目录。第 9 行定义了一个函数，它接收图像文件名，将其加载为 `Picture` 对象，然后创建一个\
  \ `PictureSummary`。该函数在第 6 行的测试函数中被调用。这行代码对摘要应用 `read` 函数，并检查其返回值是否为 `1`。\n\n现在我们来看\
  \ `read` 函数本身，它位于名为 `DigitReader.kt` 的文件中。可以看到，该函数仅通过检查图像的高宽比（该比值从 `PictureSummary`\
  \ 获取）来进行判断：\n\n```\nfun read(summary : PictureSummary) : Int {\nif (summary.heightToWidth\
  \ > 3.0) return 1\nreturn -1\n}\n```\n\n接下来，我们查看 `PictureSummary`：\n\n```\n1   package\
  \ lpk.imaging\n\n3   import java.awt.Color\n\n5   class PictureSummary(picture:\
  \ Picture) {\n6       val heightToWidth: Float\n7       val hasBottomBar : Boolean\n\
  8       val proportionBlackRight : Float\n\n10       init {\n11           heightToWidth\
  \ = picture.height().toFloat() / picture.width().toFloat()\n12           val regions\
  \ = Regions(picture.height(), picture.width())\n13           var rightQuarterBlack\
  \ = 0\n14           var bottomBarBlack = 0\n15           var black = 0\n16     \
  \      for (row in 0..picture.height() - 1) {\n17               for (column in 0..picture.width()\
  \ - 1) {\n18                   val isBlack = picture.pixelByRowColumn(row, column)\
  \ == Color.BLACK\n19                   if (isBlack) {\n20                      \
  \ black++\n21                       if (regions.isInBottomBar(row)) bottomBarBlack++\n\
  22                       if (regions.isInRightQuarter(column)) rightQuarterBlack++\n\
  23                   }\n24               }\n25           }\n26           proportionBlackRight\
  \ = rightQuarterBlack.toFloat() / black.toFloat()\n27           val bottomBarRatio\
  \ = bottomBarBlack.toFloat() / regions.bottomBarArea().toFloat()\n28           hasBottomBar\
  \ = bottomBarRatio > .75\n29       }\n30   }\n```\n\n第 5 行显示，`PictureSummary` 是通过一个\
  \ `Picture` 对象创建的。`PictureSummary` 中有三个 `val` 属性。我们已经看到 `heightToWidth` 用于识别数字“1”。`hasBottomBar`\
  \ 和 `proportionBlackRight` 这两个 `val` 属性则汇总了黑色像素的位置信息。从第 10 行开始的 `init` 代码块负责计算这些\
  \ `val` 属性。\n\n乍看之下，`init` 代码块非常复杂。让我们详细分析一下。第 11 行将 `heightToWidth` 设置为图像的高宽比。第\
  \ 12 行创建了一个 `Regions` 实例，用于判断像素在图像中的位置。第 13 至 15 行设置了三个用于统计黑色像素数量的 `var` 变量。第 16\
  \ 和 17 行定义了一个遍历图像像素的双重循环。我们之前已经见过这种行列双重循环的结构。\n\n在循环内部，第 18 行检查当前像素是否为黑色。如果是黑色像素，我们就需要记录其统计信息。这通过在第\
  \ 20 至 22 行递增相应的计数器来实现。为了增加计数器，我们使用了 `++` 符号，其中 `c++` 是 `c = c + 1` 的简写形式。在第 21\
  \ 和 22 行，我们使用 `Regions` 对象来决定是否递增之前设置的区域特定计数器。\n\n像素迭代的双重循环结束后，计数器值被用于设置 `proportionBlackRight`\
  \ 和 `hasBottomBar`。请注意，在进行除法运算之前，我们将整数计数转换为了浮点数。另外，对于 `proportionBlackHigh`，我们是用该区域内的黑色像素数除以图像中的总黑色像素数；而对于\
  \ `hasBottomBar`，我们则是用底部七分之一区域内的黑色像素数除以该区域的总像素数。\n\n`PictureSummary` 的单元测试会从 `summary`\
  \ 目录加载文件，这些文件经过特殊准备，使得感兴趣区域内的黑色像素比例易于计算。例如，以下是 `proportionBlackRightTest` 测试：\n\n\
  ```\n@Test\nfun proportionBlackRightTest() {\nAssert.assertEquals(0.0F, summary(\"\
  bwbw_v.png\").proportionBlackRight)\nAssert.assertEquals(0.5F, summary(\"wbwb_v.png\"\
  ).proportionBlackRight)\nAssert.assertEquals(0.25F, summary(\"bwbw_h.png\").proportionBlackRight)\n\
  Assert.assertEquals(0.25F, summary(\"wbwb_h.png\").proportionBlackRight)\n}\n```\n\
  \n第一个断言使用了第 350 页图 20-1 所示的图像。\n\n`Regions` 类同样看起来比实际复杂：\n\n```\n1   package lpk.imaging\n\
  \n3   class Regions(val rows: Int, val columns: Int) {\n4       val seventhHeight:\
  \ Int\n5       val sixSeventhsHeight: Int\n6       val quarterWidth: Int\n7    \
  \   val threeQuarterWidth: Int\n8       val quarterHeight: Int\n9       val threeQuarterHeight:\
  \ Int\n\n11       init {\n12           seventhHeight = rows / 7\n13           sixSeventhsHeight\
  \ = rows - seventhHeight\n14           quarterWidth = columns / 4\n15          \
  \ threeQuarterWidth = columns - quarterWidth\n16           quarterHeight = rows\
  \ / 4\n17           threeQuarterHeight = rows - quarterHeight\n18       }\n\n20\
  \       fun isInRightQuarter(column: Int): Boolean {\n21           return column\
  \ >= threeQuarterWidth\n22       }\n\n24       fun isInBottomBar(row: Int): Boolean\
  \ {\n25           if (row >= sixSeventhsHeight) return true\n26           return\
  \ false\n27       }\n\n29       fun bottomBarArea(): Int {\n30           return\
  \ columns * seventhHeight\n31       }\n32   }\n```\n\n第 3 行的构造函数将 `rows` 和 `columns`\
  \ 声明为 `val` 属性。这意味着它们在整个类代码中均可访问，第 4 至 9 行声明的其他 `val` 属性也是如此。这些其他 `val` 属性是根据构造函数参数计算得出的，计算过程在\
  \ `init` 代码块中完成。该类中的函数不言自明，并且有相应的单元测试进一步阐明其含义。\n\n为了验证到目前为止这些类是否正确，我们可以运行单元测试。`readTest`\
  \ 测试通过的事实表明，我们的代码确实能够从图像中读取数字“1”。\n\n## 20.4 识别数字“2”\n\n使用当前版本的 `PictureSummary`\
  \ 也可以识别数字“2”，因为“2”是唯一包含底部横杠的数字。首先，我们在 `readTest` 中添加一行测试代码：\n\n```\n@Test\nfun readTest()\
  \ {\nAssert.assertEquals(1, read(loadSummary(\"1.png\")))\nAssert.assertEquals(2,\
  \ read(loadSummary(\"2.png\")))\n}\n```\n\n对 `read` 函数本身的修改也只需添加一行代码：\n\n```\nfun\
  \ read(summary: PictureSummary): Int {\nif (summary.heightToWidth > 3.0) return\
  \ 1\nif (summary.hasBottomBar) return 2\nreturn -1\n}\n```\n\n使用此版本的 `read` 函数，修改后的测试用例能够通过。\n\
  \n\n\n## 20.5 识别“5”和“7”\n\n为了识别“5”和“7”，我们需要在 `PictureSummary` 中实现 `hasTopBar` 概念。\n\
  \n项目步骤 20.1\n\n向 `Regions` 添加一个 `isInTopBar` 函数。\n\n同时，在 `RegionsTest` 中为此添加一个测试。\n\
  \n项目步骤 20.2\n\n向 `PictureSummary` 添加一个 `hasTopBar` 属性，并在 `init` 块中计算它。你可以通过复制并修改与\
  \ `hasBottomBar` 相关的每一行代码来实现。\n\n对于图像而言，顶部条和底部条的面积相同。因此，在计算 `topBarRatio` 时，直接使用\
  \ `regions.bottomBarArea`。\n\n对于测试，复制并修改 `hasBottomBarTest`。`images` 目录中已包含 `topbar.png`\
  \ 和 `notopbar.png` 文件，供此测试使用。\n\n项目步骤 20.3\n\n向 `readTest` 添加几行代码，用于检查“5”和“7”是否可以被识别。检查测试是否失败。\n\
  \n有了这些基础，编写识别“5”和“7”的代码就相当容易了。一张有顶部条的图片只能代表这两个数字之一。为了区分它们，我们查看右侧像素的比例。对于“7”，这个比例非常低，而对于“5”，则大约是四分之一。用代码表示，我们可以将\
  \ `read` 修改为：\n\n```\nfun read(summary: PictureSummary): Int {\nif (summary.heightToWidth\
  \ > 3.0) return 1\nif (summary.hasBottomBar) return 2\nif (summary.hasTopBar) {\n\
  if (summary.proportionBlackRight < .2) {\nreturn 7\n}\nreturn 5\n}\nreturn -1\n\
  }\n```\n\n完成这些修改后，测试应该能通过，这样我们就又识别出两个数字了！\n\n## 20.6 识别“0”\n\n零的特征是中心区域为空，因此如果我们能增强\
  \ `PictureSummary` 类来指示这一点，就能处理“0”了。\n\n项目步骤 20.4\n\n向 `Regions` 添加以下三个新函数：`isInLeftQuarter`、`isInTopQuarter`\
  \ 和 `isInBottomQuarter`。\n\n这些函数应与 `isInRightQuarter` 非常相似。\n\n同时，添加相应的测试。\n\n利用这些新函数，我们可以向\
  \ `Regions` 添加一个 `isInCenter` 函数：\n\n```\nfun isInCenter(row: Int, column: Int):\
  \ Boolean {\nif (isInTopQuarter(row)) return false\nif (isInBottomQuarter(row))\
  \ return false\nif (isInLeftQuarter(column)) return false\nif (isInRightQuarter(column))\
  \ return false\nreturn true\n}\n```\n\n项目步骤 20.5\n\n为此函数添加一个测试，使用一个由 `40` 行和 `60`\
  \ 列创建的 `Regions` 对象。\n\n要了解一个区域中黑色像素的密度，我们需要知道该区域的总像素数。\n\n项目步骤 20.6\n\n根据我们对中心区域的定义，矩形中有多大比例位于此区域？\n\
  \n对于这类问题，我总是画图来解决。\n\n为此添加一个函数，命名为 `centerPixelCount`。\n\n同时，添加一个测试，假设使用通常的测试区域，即\
  \ `40` 行和 `60` 列。\n\n让我们向 `PictureSummary` 添加一个名为 `hasCenterBlank` 的属性。为了初始化它，我们在\
  \ `init` 块中添加一个名为 `centerBlack` 的计数器。如果某个黑色像素位于中心区域，则计数器递增：\n\n```\nif (regions.isInCenter(row,\
  \ column)) centerBlack++\n```\n\n遍历完所有像素后，在 `init` 块的末尾，我们可以按如下方式设置 `val hasCenterBlank`：\n\
  \n```\nval centerRatio = centerBlack.toFloat() /\nregions.centerPixelCount().toFloat()\n\
  hasCenterBlank = centerRatio < .1\n```\n\n现在，让我们在数字识别代码中使用这个新属性。首先，我们添加一个测试。\n\n\
  项目步骤 20.7\n\n将以下行添加到 `readTest` 中：\n\n```\nAssert.assertEquals(0, read(loadSummary(\"\
  0.png\")))\n```\n\n为了让这个测试通过，我们可以在 `read` 函数中添加以下行：\n\n```\nif (summary.hasCenterBlank)\
  \ return 0\n```\n\n## 20.7 总结与步骤详情\n\n我们的代码现在能够从图像中识别数字“0”、“1”、“2”、“5”和“7”。在下一章中，我们将使用此代码的扩展版本来识别所有数字。\n\
