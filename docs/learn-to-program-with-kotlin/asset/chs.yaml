- '# 3. 数组与循环


  在上一章中，我们编写了一个程序，该程序构建了与方形数组元素对应的黑白瓷砖图案。在本章中，我们将介绍一种强大的语法，它允许我们用更简短的程序构建更大的图案。


  ## 3.1 数组索引


  回顾第 2 章，数组是一个值的列表。数组的数组实际上就是一个网格，我们之前的程序都使用它来表示黑白瓷砖的矩形图案。在这些程序中，我们使用了库函数 `arrayOf`
  来创建数组。然而，我们也可以从头开始创建数组，例如：


  ```

  1   fun tileColors(): Array> {

  2       val shades = Array(2) {

  3           Array(2) { 0 }

  4       }

  5       shades[0][0] = 192

  6       shades[0][1] = 128

  7       shades[1][0] = 64

  8       shades[1][1] = 0

  9       return shades

  10   }

  ```


  这个版本的 `tileColors` 工作原理如下。在第 2 到第 4 行，我们设置了一个数组的数组，包含两行，每行有两列，每个值都为 `0`。暂时不必过于担心其中的细节；我们稍后会再讨论。现在值得关注的是接下来的四行。在这些行中，我们使用行和列索引来引用数组中的值，就像查看地图网格一样。然后使用等号设置这些值，等号的含义是“被设置为”，例如：


  ```

  shades[1][0] = 64

  ```


  意思是“位于第 1 行第 0 列的数组值被设置为 64。”


  在这个网格系统中，我们从上到下操作，第一行的索引为 `0`。在每一行内，我们从左到右操作，第一列的索引为 `0`。图 3-1 展示了数组索引与瓷砖阵列中方格的对应关系。


  ![../images/508289_1_En_3_Chapter/508289_1_En_3_Fig1_HTML.png](img/508289_1_En_3_Fig1_HTML.png)


  图 3-1


  数组的行索引和列索引


  参照前面的代码清单，左上角的方格，其网格坐标为 `[0][0]`，被赋予值 `192`。右上角的方格，其网格坐标为 `[0][1]`，被赋予值 `128`。左下角的方格坐标为
  `[1][0]`，被赋予值 `64`。最后，右下角的方格坐标为 `[1][1]`，被赋予值 `0`。请记住，数值越高，灰色越浅，因此左上角是浅灰色，而右下角是黑色。实际上，如果我们运行这段代码，会得到如图
  3-2 所示的图案。


  ![../images/508289_1_En_3_Chapter/508289_1_En_3_Fig2_HTML.jpg](img/508289_1_En_3_Fig2_HTML.jpg)


  图 3-2


  由我们第一个代码清单生成的图案


  这种构建数组的方法比我们在第 2 章中习惯的方法更繁琐，但它将允许我们使用循环和其他结构来构建更有趣的图案。在继续之前，让我们先练习一下数组表示法。


  编程挑战 3.1


  考虑以下版本的 `tileColors`：


  ```

  fun tileColors(): Array> {

  val shades = Array(2) {

  Array(2) { 0 }

  }

  shades[0][0] = 0

  shades[0][1] = 255

  shades[1][0] = 255

  shades[1][1] = 0

  return shades

  }

  ```


  请手动绘制一个两行两列的方格网格。在每个单元格中，写入分配的值。然后根据这些值对单元格进行着色。最后，运行程序，并将你手绘的图片与程序显示的结果进行对比。


  提示


  为了节省纸质版书籍读者的大量输入工作，本章的代码片段可在项目树中的 `chapter3_code_to_copy.txt` 文件中找到。


  编程挑战 3.2


  现在考虑另一个不同版本的 `tileColors`：


  ```

  fun tileColors(): Array> {

  val shades = Array(3) {

  Array(3) { 0 }

  }

  shades[0][0] = 255

  shades[0][1] = 255

  shades[0][2] = 0

  shades[1][0] = 255

  shades[1][1] = 0

  shades[1][2] = 0

  shades[2][0] = 0

  shades[2][1] = 0

  shades[2][2] = 0

