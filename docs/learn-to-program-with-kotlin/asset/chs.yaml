  package lpk.basics

  fun main() {

  val str = "Can you understand this?"

  var result = ""

  for (c in str) {

  val l = c.toLowerCase()

  if (l != ''a'' && l != ''e'' && l != ''i'' && l != ''o'' && l != ''u'') {

  result = result + l

  }

  }

  println(result)

