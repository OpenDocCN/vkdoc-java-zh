  解答 7.5


  ```

  package lpk.basics

  fun main() {

  val str = "Mind the gap!"

  var compacted = ""

  var previousCharWasASpace = false

  for (c in str) {

  if (c == '' '') {

  if (!previousCharWasASpace) {

  compacted = compacted + c

  }

  previousCharWasASpace = true

  } else {

  compacted = compacted + c

  previousCharWasASpace = false

  }

  }

  println(compacted)

