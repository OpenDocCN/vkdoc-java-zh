  \ `String` 构造的 `Line`，其单词列表应包含这些单词，顺序正确，且没有其他单词。以下是这样一个测试的实现：\n\n```\n@Test fun\
  \ twoWords() {\nval line = Line(\"hello there\")\nval words = line.words()\nAssert.assertEquals(2,\
  \ words.size)\nAssert.assertEquals(\"hello\", words[0])\nAssert.assertEquals(\"\
  there\", words[1])\n}\n```\n\n我们可以通过点击 `LineTest` 单词左侧的绿色小三角形并选择 `运行 'LineTest'`\
