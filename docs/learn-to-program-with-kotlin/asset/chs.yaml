  \ Kotlin 的基本语法。祝你未来的编程之旅一切顺利！\n\n## 21.5 项目步骤\n\n### 21.5.1 项目步骤 21.1 的详细信息\n\n\
  `SpeedReader.kt` 的新版本如下：\n\n```\npackagelpk.imaging\nimportjava.io.File\nfun convert(digits:\
  \ List): Int {\nreturn-1\n}\nclassSpeedReader(signImageFile: File) {\nval digits\
  \ = mutableListOf()\ninit {\n}\nfun speed(): Int {\nreturnconvert(digits)\n}\n}\n\
  ```\n\n### 21.5.2 项目步骤 21.3 的详细信息\n\n以下是实现代码：\n\n```\nfun convertDigits(digits:\
  \ List): Int {\nvar total = 0\nvar multiplier = 1\nval n = digits.size\nfor(i in\
  \ 0..n - 1) {\nval digit = digits[n - i - 1]\ntotal = total + digit * multiplier\n\
  multiplier = multiplier * 10\n}\nreturn total\n}\n```\n\n\n\n### 21.5.3 项目步骤 21.4\
  \ 的细节\n\n以下是所有组件如何协同工作来读取标志的：\n\n```\ninit {\nval sign = loadPictureFromFile(signImageFile)\n\
  val digitImages = DigitFinder(sign).digits()\ndigitImages.forEach {\ndigitImage\
  \ ->\nval pictureSummary = PictureSummary(digitImage)\nval digit = read(pictureSummary)\n\
  digits.add(digit)\n}\n}\n```\n\n索引 符号 && !! ?: * > < / % + ++ - != == $ A 加法 变位词\
