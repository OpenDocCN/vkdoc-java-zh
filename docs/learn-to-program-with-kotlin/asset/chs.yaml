  在本章中，我们学习了如何读取和写入计算机的文件系统。


  解答 9.1


  文件中有两行，因此我们期望列表中有两个元素。要修改程序以读取此文件，我们只需将第 7 行改为指向 `HelloWorldTwice.txt` 文件即可：


