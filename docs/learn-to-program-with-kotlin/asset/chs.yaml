  fun tileColors(): Array> {\nval shades = Array(16) {\nArray(16) { 0 }\n}\nfor (row\
  \ in 0..15) {\nfor (col in 0..15) {\nval remainder = col % 2\nif (remainder == 0)\
  \ {\nshades[row][col] = 0\n} else {\nshades[row][col] = 255\n}\n}\n}\nreturn shades\n\
  }\n```\n\n解答 5.6\n\n```\nfun tileColors(): Array> {\nval shades = Array(16) {\n\
  Array(16) { 0 }\n}\nfor (row in 0..15) {\nfor (col in 0..15) {\nval remainder =\
  \ (row + col) % 2\nif (remainder == 0) {\nshades[row][col] = 0\n} else {\nshades[row][col]\
  \ = 255\n}\n}\n}\nreturn shades\n}\n```\n\n解答 5.7\n\n```\nfun tileColors(): Array>\
