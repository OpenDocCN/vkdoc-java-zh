  HELLO WORLD!

  hello world!

  ```


  在这个程序的第 7 行，我们通过使用 `toUpperCase` 函数询问 `str` “你的大写版本是什么？”来创建一个 `val`。类似地，在第 9 行，我们向
  `str` 询问它的小写版本。


