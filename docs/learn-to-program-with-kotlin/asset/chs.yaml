  \  在第 2 行，我们定义了一个名为`cropArray`的`val`，它是一个包含`1`行的数组。\n*   在第 4 行，我们将`cropArray`的第一行（也是唯一一行）定义为一个仅包含一个元素的`Array`。\n\
