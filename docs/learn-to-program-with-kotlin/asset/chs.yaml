- '# 1. 入门


  在本章中，我们设置编程环境并运行第一个程序。


  ## 1.1 什么是编程？


  计算机程序是一组指令，告诉计算机执行诸如显示图像或打印文本之类的操作。


  这些指令使用特殊的单词和符号集编写，称为编程语言。在本书中，我们将使用一种名为 Kotlin 的语言。Kotlin 相当新，与另一种名为 Java 的语言密切相关，Java
  在全球工业界和大学中非常流行。虽然 Java 是一种优秀的语言，但它已有 20 多年的历史，这在计算领域算是古老的。此外，自 Java 首次开发以来，编程领域有了许多改进，Kotlin
  利用了这些改进。这些改进意味着 Kotlin 程序通常比其 Java 等效程序更简单，并且许多错误来源被直接避免。


  与人类不同，计算机不理解模糊的指令，也无法超越我们容易犯的简单打字错误。这可能会使编程变得非常令人沮丧，因为即使是微小的错误，比如缺少逗号，也可能使一个原本完美的程序无法运行。为了避免这些问题，一些入门编程书籍使用非常简单的语言，甚至使用乐高风格的视觉编程工具，在这些工具中不可能出现语法错误。


  我们决定在本书中坚持使用 Kotlin，因为通过学习它，您将掌握一种语言技能，这种语言是成千上万其他程序员的首选，并且可用于编程多种不同类型的设备，例如个人电脑（显然）、Android
  设备、微型计算机等。此外，还可以找到大量解决特定问题的代码示例。


  为了处理全功能语言复杂性带来的问题，我们将通过使用代码编辑器修改现有程序来工作，该编辑器会高亮显示错误并提供合理的修正。


