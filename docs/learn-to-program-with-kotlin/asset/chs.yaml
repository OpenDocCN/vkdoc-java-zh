- '# 9. 文件系统


  计算机可以在各种硬件上存储信息，例如磁盘、U 盘、光驱等。为了使程序员不必为每种存储设备编写特定的代码，操作系统提供了一种称为*文件系统*的抽象。反过来，Kotlin
  为我们提供了探索计算机上的文件以及读写信息所需的工具。在本章中，我们将使用其中一些工具来读写文本文件。


