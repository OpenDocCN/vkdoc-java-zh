  \ 类型的 `List`。该列表的元素将是传入构造函数的限速标志图像文件中读取的各个数字。这需要在 `init` 块中完成，而该块尚未编写。另一项待完成的工作是编写\
  \ `speed` 函数，该函数将把数字列表转换为一个 `Int`。\n\n## 21.2 十进制数\n\n我们首先来处理 `speed` 的实现。`digits`\
  \ 变量包含一个 `Int` 类型的 `List`。我们如何将它们转换为一个数字？如果列表中的数字是 `a`、`b` 和 `c`，那么它们所代表的数字就是十进制展开式：\n\
  \n*a* × 100 + *b* × 10 + *c* × 1\n\n列表中可能只有一两个数字，因此我们的转换代码会相当复杂。为了能够测试代码，我们将其放入一个辅助函数中，该函数接收任意\
  \ `Int` 类型的 `List` 并将其转换为一个数字。\n\n项目步骤 21.1\n\n将以下函数添加到 `SpeedReader.kt` 文件中。该函数应放在\
  \ `class SpeedReader....` 这一行之前。\n\n```\nfun convertDigits(digits: List) : Int {\n\
  return-1\n}\n```\n\n然后将 `speed` 的实现更改为：\n\n```\nfun speed(): Int {\nreturn convertDigits(digits)\n\
  }\n```\n\n项目步骤 21.2\n\n将以下测试函数添加到 `SpeedReaderTest` 中：\n\n```\n@Test\nfun convertDigitsTest()\
