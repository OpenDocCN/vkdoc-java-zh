  3           ->

  4           val originalPixel = pixelByRowColumn(row, column)

  5           if (row < 50) {

  6               Color(0, 0, 0)

  7           } else {

  8               originalPixel

  9           }

  10       }

  11       return transformByPosition(blackAtTop)

  12   }

