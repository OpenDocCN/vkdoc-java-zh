  ## 7.2 **字符串**迭代


  对 `String` 最常见的操作之一就是*迭代*，或者说循环遍历其中的 `Char`，一个接一个，从第一个到最后一个，就像我们对 `Array` 的元素所做的那样。为了了解这是如何工作的，请将以下代码复制到你的
  `Strings.kt` 文件中：


  ```

  1   package lpk.basics


  3   fun main() {

  4       val str = "Kotlin!"

  5       for (c in str) {

  6           println(c)

  7       }

  8   }

  ```


  第 4 行定义了一个名为 `str` 的 `val`，就像我们在之前的程序中看到的那样。下一行引入了一个 `for` 循环，其中有一个名为 `c` 的循环 `val`。循环体（这里只是一个
  `println` 调用）会为 `str` 中的每个 `Char` 执行一次。如果我们运行这个程序，`"Kotlin!"` 的字符会被打印出来，每行一个，如图
  7-2 所示。


  ![../images/508289_1_En_7_Chapter/508289_1_En_7_Fig2_HTML.jpg](img/508289_1_En_7_Fig2_HTML.jpg)


  图 7-2


  通过遍历 `String` 中的字符，我们可以垂直打印它


