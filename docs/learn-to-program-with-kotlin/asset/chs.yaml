  以下是用于水平切分的函数：\n\n```\nfun sliceHorizontallyIntoPicturesContainingRed(): List {\n\
  val result = mutableListOf()\nvar upperLimit = -1\nvar lowerLimit = -1\nfor (i in\
  \ 0..height() - 1) {\nif (rowContainsRedPixel(i)) {\nif (upperLimit == -1) {\nupperLimit\
  \ = i\n}\nlowerLimit = i\n} else {\n//这是一个间隙。\nif (upperLimit >= 0) {\n//当前子图片已完整。\n\
  val rowsInCurrentPiece = lowerLimit - upperLimit + 1\nval piece = cropTo(upperLimit,\
  \ 0, rowsInCurrentPiece, width())\nresult.add(piece)\n//重置标记。\nupperLimit = -1\n\
  lowerLimit = -1\n}\n}\n}\n//可能还有一块延伸到图片边缘的碎片。\n//如果存在，则将其添加。\nif (upperLimit >=\
  \ 0) {\nval rowsInCurrentPiece = lowerLimit - upperLimit + 1\nval piece = cropTo(upperLimit,\
  \ 0, rowsInCurrentPiece, width())\nresult.add(piece)\n}\nreturn result\n}\n```\n\
  \n以下是测试代码：\n\n```\n@Test\nfun sliceHorizontallyIntoPicturesContainingRedTest() {\n\
