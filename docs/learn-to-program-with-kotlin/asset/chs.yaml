  \n项目步骤 13.7\n\n用以下代码替换 `variantsByOneLetter`：\n\n```\n1   fun variantsByOneLetter(checker:\
  \ WordChecker): List {\n2       val result = mutableListOf()\n3       //对于单词中的每个位置...\n\
  4       for (i in 0..text.length - 1) {\n5           //...添加通过仅更改\n6           //该位置的字母而产生的变体。\n\
  \n8       }\n9       return result\n10   }\n```\n\n这段代码中当前为空的第 7 行需要一些思考。此时，作用域内的对象有：需要添加新变体的\
  \ `result`、用于测试可能单词的 `checker`、字母位置 `i`，当然还有在类构造函数中声明的字段 `word`。\n\n在为这类棘手问题开发算法时，思考一个具体的例子非常有用。因此，假设我们的\
  \ `WordNode` 对应 `\"bolt\"`，并且 `i` 是 `2`。我们想知道通过替换 `\"l\"` 可以得到哪些单词。在 `\"l\"` 之前，我们有\
  \ `\"bo\"`，在它之后我们有 `\"t\"`。这些片段创建了一个模板 `\"bo_t\"`。对于字母表中的每个字母，我们可以用该字母替换下划线字符，并使用\
  \ `checker` 测试生成的 `String`。因此，我们询问：\n\n*   “`boat`” 是否有效，\n*   “`bobt`” 是否有效，\n\
  *   “`boct`” 是否有效，\n*   依此类推，直到\n*   “`bozt`” 是否有效？\n\n例外情况是，我们不需要询问 `\"bolt\"`，因为这是我们正在处理的单词。作为一个算法，这相当于：\n\
  \n*   获取位置之前的文本\n*   获取位置之后的文本\n*   对于字母表中的每个字母\n    *   如果该字母与我们的单词中的字母不同，则使用它创建一个新单词。\n\
  \    *   如果新单词有效，则添加它。\n\n由于这个逻辑非常复杂，我们将把它放入一个专用函数中，并在 `variantsByOneLetter` 的第\
  \ 7 行使用它。\n\n项目步骤 13.8\n\n将此函数复制到 `WordNode` 中：\n\n```\nprivate fun addVariantsAtPosition(position:\
  \ Int, nodes: MutableList, checker: WordChecker) {\nval textBeforePosition = text.substring(0,\
  \ position)\nval textAfterPosition = if (text.length > 1) text.substring(position\
  \ + 1, text.length) else \"\"\nval originalLetter = text[position]\nfor (fromAlphabet\
  \ in \"abcdefghijklmnopqrstuvwxyz\") {\nif (originalLetter != fromAlphabet) {\n\
  val variant = textBeforePosition + fromAlphabet + textAfterPosition\nif (checker.isPreviouslyUnseenValidWord(variant))\
  \ {\nnodes.add(WordNode(variant))\n}\n}\n}\n}\n```\n\n将函数中的代码行与前面给出的算法步骤进行比较。\n\n\
  然后，将项目步骤 13.7 中空的第 7 行替换为对这个新函数的调用：\n\n```\naddVariantsAtPosition(i, result, checker)\n\
  ```\n\n检查一下，通过这些更改，测试现在是否通过了。\n\n\n\n## 13.8 `WordSwitch` 类\n\n我们的 `WordChecker`\
  \ 和 `WordNode` 类实现了单词转换算法的关键部分。为了协调这两个类的活动，我们将使用第三个类，名为 `WordSwitch`。这个类已经部分实现了。如果你在\
  \ IntelliJ 中打开它，应该会看到以下代码：\n\n```\n1   package lpk.words\n\n3   import java.nio.file.Paths\n\
  \n5   /**\n6    * 实现单词转换算法。\n7    */\n8   class WordSwitch(dictionary: Dictionary,\
  \ start: String, val target: String) {\n\n10       val startNode: WordNode\n11 \
  \      val checker: WordChecker\n\n13       init {\n14           startNode = WordNode(start)\n\
  15           checker = WordChecker(dictionary)\n16       }\n\n18       fun lookForTarget():\
  \ WordNode? {\n19           //声明一个变量来保存每一代中产生的新单词。\n20           //用起始单词生成的单词来初始化它。\n\
  \n23           //只要这些新单词中包含新词且未找到目标，\n24           //就循环创建新的一代。\n\n26          \
  \ return null\n27       }\n28   }\n```\n\n第 8 行的构造函数显示有一个名为 `target` 的字段，类型为 `String`。另外两个构造函数参数分别是\
  \ `Dictionary` 和 `String`，搜索从该字符串开始。这两个参数在 `init` 块中用于初始化两个字段。这两个字段分别是：一个 `WordNode`（搜索算法由此启动）和一个\
  \ `WordChecker`。\n\n第 18 行引入了一个函数 `lookForTarget`，它将实际执行搜索。如果能够到达目标，此函数将返回一个包含目标单词的\
  \ `WordNode`，否则返回 `null`（“空”对象）。`null` 的可能性意味着返回类型是 `WordNode?` 而不是 `WordNode`。\n\
  \n当然，在尝试填充此函数的细节之前，我们会编写单元测试。在这些单元测试中，我们将重用 `WordCheckerTest` 中的 “abcd” 字典。以下是一些可能的测试用例：\n\
  \n*   如果起始单词是 `ab`，目标单词是 `abc`，那么将无法到达目标，因为它的长度与起始单词不同。\n\n*   单词 `ae` 无法到达，因为它不在字典中。\n\
  \n*   单词 `b` 应该可以从 `a` 到达，`bb` 应该可以从 `aa` 到达，`bbb` 应该可以从 `aaa` 到达，以此类推。\n\n项目步骤\
  \ 13.9\n\n打开 `WordSwitchTest` 并将这两个测试函数复制到类的正文中：\n\n```\n@Test\nfun noPathDifferentLengths()\
  \ {\nval path = Paths.get(\"src/test/resources/books/abcd.txt\")\nval dictionary\
  \ = Dictionary(path)\nval wordSwitch = WordSwitch(dictionary, \"ab\", \"abc\")\n\
  Assert.assertNull(wordSwitch.lookForTarget())\n}\n@Test\nfun noPathTargetNotInDictionary()\
  \ {\nval path = Paths.get(\"src/test/resources/books/abcd.txt\")\nval dictionary\
  \ = Dictionary(path)\nval wordSwitch = WordSwitch(dictionary, \"aa\", \"ae\")\n\
  Assert.assertNull(wordSwitch.lookForTarget())\n}\n```\n\n运行这些测试。它们为什么能通过？\n\n项目步骤\
  \ 13.10\n\n注意，两个测试函数都以相同的前两行开头。你能让 IntelliJ 重构这段重复的代码吗？\n\n项目步骤 13.11\n\n重构后，你的代码应该类似于项目步骤\
  \ 13.8 的解决方案。在这段代码中，两个测试函数各自声明并创建了一个 `Dictionary`，该字典仅在下一行作为参数传递给 `WordSwitch` 构造函数调用，例如：\n\
  \n```\n1   @Test\n2   fun noPathDifferentLengths() {\n3       val dictionary = dictionary()\n\
  4       val wordSwitch = WordSwitch(dictionary, \"ab\", \"abc\")\n5       Assert.assertNull(wordSwitch.lookForTarget())\n\
  6   }\n```\n\n这可以进一步简化：将第 4 行 `WordSwitch` 构造函数中使用的 `dictionary` 参数替换为对 `dictionary()`\
  \ 的调用，然后删除第 3 行：\n\n```\n@Test\nfun noPathDifferentLengths() {\nval wordSwitch =\
  \ WordSwitch(dictionary(), \"ab\", \"abc\")\nAssert.assertNull(wordSwitch.lookForTarget())\n\
  }\n```\n\n对另一个测试函数执行相同的重构。这种重构称为*内联*。\n\n现在测试代码已经清理得差不多了，让我们看看其他一些测试场景。我们想要实现的一个测试是，如果从\
  \ `a` 开始，那么我们可以到达 `b`。我们通过从 `a` 创建一个 `WordNode` 来开始对此的测试：\n\n```\nval wordSwitch\
  \ = WordSwitch(dictionary(), \"a\", \"b\")\n```\n\n然后运行 `lookForTarget` 并将结果赋值给一个\
  \ `val`：\n\n```\nval result = wordSwitch.lookForTarget()\n```\n\n现在我们需要检查 `result`\
  \ 内部的 `text` 是否等于 `b`。也就是说，我们希望进行如下调用：\n\n```\nAssert.assertEquals(\"b\", result.text)\n\
  ```\n\n然而，这段代码是错误的，因为 `result` 的类型不是 `WordNode`；而是 `WordNode?`。也就是说，它可能是 `null`。这非常不方便，因为我们知道它不应该是\
  \ `null`：它应该是一个 `text` 等于 `\"b\"` 的 `WordNode`。幸运的是，Kotlin 有一种解决这个问题的方法。可以添加一个特殊的运算符，称为*非空断言*，写作\
  \ `!!`，然后我们就可以将 `result` 视为真正的 `WordNode`：\n\n```\nAssert.assertEquals(\"b\", result!!.text)\n\
  ```\n\n现在我们有了测试从 `a` 到 `b` 所需的全部要素。\n\n项目步骤 13.12\n\n在 `WordSwitchTest` 中创建一个函数，测试\
  \ `\"a\"` 能否转换为 `\"b\"`。将该函数命名为 `a_to_b`。\n\n项目步骤 13.13\n\n复制测试函数 `a_to_b` 并修改它，以检查单词\
  \ `\"ab\"` 能否转换为 `\"ba\"`。\n\n\n\n## 13.9 `lookForTarget` 的实现\n\n我们已经有了一个带注释的 `lookForTarget`\
  \ 存根，并且还有一些测试用例可以指导我们实现并验证其正确性。现在让我们开始填补空白。回顾第 209 页 `WordSwitch` 的代码清单，我们首先需要一个\
  \ `var` 来存放新生成的单词，并用从 `startNode` 派生出的单词进行初始化：\n\n```\nvar currentGeneration = startNode.variantsByOneLetter(checker)\n\
  ```\n\n代码的下一部分需要一个变量来存放目标节点，初始值为 `null`。通常，Kotlin 能够根据声明推断 `var` 的类型，但如果初始值为 `null`，则无法推断。其类型可能是\
  \ `String?`、`Int?` 或其他类型。在这种情况下，我们必须通过在声明中包含类型来帮助 Kotlin：\n\n```\nvar targetNode\
  \ : WordNode? = null\n```\n\n我们的代码会反复从当前代创建新的一代单词。只要还能创建新单词且尚未找到目标，我们就需要继续搜索。这可以通过一种称为\
  \ `while` 循环的结构来表达：\n\n```\nwhile (currentGeneration.isNotEmpty() && targetNode\
  \ == null) {\n//这是循环体。\n//计算在此进行。\n}\n```\n\n我们之前见过对列表或数组元素进行循环的写法。`while` 循环的工作方式不同。循环体中的代码会重复执行，直到循环条件为假时才停止。我们的循环条件是\
  \ `currentGeneration` 不为空且 `targetNode` 为 `null`。换句话说，如果 `targetNode` 被赋值为非 `null`\
  \ 值，或者 `currentGeneration` 为空，循环就会停止。\n\n在循环体内，我们创建一个变量来存放从 `currentGeneration`\
  \ 生成的单词：\n\n```\nval nextGeneration = mutableListOf()\n```\n\n为了实际生成新单词，我们需要遍历 `currentGeneration`\
  \ 中的每个单词：\n\n```\nfor (wordNode in currentGeneration) {\n//处理这个 wordNode。\n}\n```\n\
  \n循环变量 `val wordNode` 代表当前代中的一个单词。它有可能就是目标。让我们检查这种可能性：\n\n```\nif (wordNode.text\
  \ == target) {\ntargetNode = wordNode\n}\n```\n\n同样在循环内，我们需要从 `wordNode` 生成新单词，并将它们添加到下一代中：\n\
  \n```\nnextGeneration.addAll(wordNode.variantsByOneLetter(checker))\n```\n\n一旦 `currentGeneration`\
  \ 中的所有单词都用于生成新单词，就需要用 `nextGeneration` 替换 `currentGeneration`：\n\n```\ncurrentGeneration\
  \ = nextGeneration\n```\n\n综合以上所有内容，我们实现了主要的搜索算法：\n\n```\nfun lookForTarget(): WordNode?\
  \ {\n//声明一个变量来存放每一代中创建的新单词。\n//用起始单词生成的单词进行初始化。\nvar currentGeneration = startNode.variantsByOneLetter(checker)\n\
  //只要这些代中包含新单词且未找到目标，就循环创建新的一代。\nvar targetNode: WordNode? = null\nwhile (currentGeneration.isNotEmpty()\
  \ && targetNode == null) {\n//创建一个 val 来存放将要生成的单词。\nval nextGeneration = mutableListOf()\n\
  //对于当前代中的每个单词...\nfor (wordNode in currentGeneration) {\n//...检查它是否是目标...\nif (wordNode.text\
  \ == target) {\ntargetNode = wordNode\n}\n//...并从中生成所有新单词。\nnextGeneration.addAll(wordNode.variantsByOneLetter(checker))\n\
  }\n//处理完当前代后，\n//用其生成的单词替换它。\ncurrentGeneration = nextGeneration\n}\nreturn targetNode\n\
  }\n```\n\n项目步骤 13.14\n\n用上述代码替换 `lookForTarget` 的现有代码，然后检查测试是否通过。\n\n这是一个*超级困难*的算法，包含嵌套循环，所以像往常一样，不必担心一次就能完全理解。事实上，这是本书最难的部分。\n\
  \n## 13.10 寻找路径\n\n此时，我们的 `WordSwitch` 程序可以判断一个单词是否能转换为另一个单词，但它无法告诉我们转换过程中的单词序列。为了获取这些信息，我们将为每个\
  \ `WordNode` 提供其派生来源的 `WordNode`。然后我们可以从目标 `WordNode` 反向追溯到原始节点，从而得到反向的转换序列。\n\n\
  ![../images/508289_1_En_13_Chapter/508289_1_En_13_Fig7_HTML.png](img/508289_1_En_13_Fig7_HTML.png)\n\
  \n图 13-7\n\n从 `cave` 派生的 `WordNode` 树的一部分\n\n例如，考虑从 `cave` 到 `home` 的转换。我们的起始 `WordNode`\
  \ 是 `cave`。它没有前驱节点，因为它是起始节点。`cave` 的变体包括 `cage`、`cake`、`came`、`cane` 等。对于这些 `WordNode`\
  \ 中的每一个，我们将 `cave` 设置为父节点。在下一代中，我们可以从 `cake` 派生出 `bake` 和 `rake`，从 `cage` 派生出 `rage`\
  \ 和 `sage`，以此类推。通过这种方式，我们可以形成一个以 `cave` 为*根*节点的 `WordNode` 树状结构。\n\n为了在软件中表示这种结构，我们只需向\
  \ `WordNode` 添加一个新的实例变量，不妨称之为 `parent`。我们将修改构造函数来设置该变量。\n\n项目步骤 13.15\n\n将 `WordNode`\
  \ 的声明改为：\n\n```\ndata class WordNode(val text: String, val parent: WordNode? = null)\n\
  ```\n\n这个构造函数的新部分是：\n\n```\nval parent: WordNode? = null\n```\n\n这段代码的含义是：\n\n*\
  \   有一个名为 `parent` 的字段。\n*   它是一个 `val`（而非 `var`）。\n*   它的类型是 `WordNode?`。\n*  \
  \ 调用构造函数时，可以省略 `parent`，此时其值将为 `null`。\n\n最后这个属性（参数可以省略）是 Kotlin 一个非常方便的特性。我们称之为*可选参数*。\n\
  \n当创建一个 `WordNode` 作为现有 `WordNode` 的变体时，新节点应将旧节点作为 `parent`。让我们测试一下。在 `WordNodeTest`\
  \ 中，我们目前有以下测试函数：\n\n```\n1   @Test\n2   fun testOneLetterWord() {\n3       val path\
  \ = Paths.get(\"src/test/resources/books/abcd.txt\")\n4       val dictionary = Dictionary(path)\n\
  5       val checker = WordChecker(dictionary)\n6       val nodeA = WordNode(\"a\"\
  )\n7       val generated = nodeA.variantsByOneLetter(checker)\n8       Assert.assertEquals(3,\
  \ generated.size)\n9       Assert.assertTrue(generated.contains(WordNode(\"b\")))\n\
  10       Assert.assertTrue(generated.contains(WordNode(\"c\")))\n11       Assert.assertTrue(generated.contains(WordNode(\"\
  d\")))\n12   }\n```\n\n需要修改此测试，以检查第 9、10 和 11 行的 `WordNode` 是否将 `nodeA` 作为 `parent`。\n\
  \n项目步骤 13.16\n\n将第 9-11 行改为：\n\n```\nAssert.assertTrue(generated.contains(WordNode(\"\
  b\", nodeA)))\nAssert.assertTrue(generated.contains(WordNode(\"c\", nodeA)))\nAssert.assertTrue(generated.contains(WordNode(\"\
  d\", nodeA)))\n```\n\n然后对 `testTwoLetterWord` 进行等效修改。\n\n这些修改后的测试应该会失败，因为在 `addVariantsAtPosition`\
  \ 函数中创建变体时，我们没有将 `WordNode` 作为 `parent` 添加到其变体中。在该函数的第 26 行（如第 207 页所列），我们创建了 `WordNode`\
  \ 变体：\n\n```\nnodes.add(WordNode(variant))\n```\n\n必须修改构造函数调用，以包含对运行该函数的 `WordNode`\
  \ 的引用。回想一下，有一个关键字 `this` 指向当前对象。\n\n项目步骤 13.17\n\n将该行代码改为：\n\n```\nnodes.add(WordNode(variant,\
  \ this))\n```\n\n检查 `WordNodeTest` 中的所有测试现在是否都通过。\n\n这个变量将使我们能够计算从任意 `WordNode`\
  \ 回溯到原始 `WordNode` 的 `WordNode` 序列。这个序列被称为通往根节点的*路径*。\n\n项目步骤 13.18\n\n向 `WordNode`\
  \ 添加以下存根函数：\n\n```\nfun rootPath() : List {\nval result = mutableListOf()\nreturn\
  \ result\n}\n```\n\n以下是此函数的一些测试用例：\n\n\n\n*   如果创建一个 `parent` 为 `null` 的 `WordNode`，则假定它为根节点，因此该函数应返回一个仅包含该\
  \ `WordNode` 的列表。\n\n*   如果创建一个名为 `a` 且 `parent` 为 `null` 的 `WordNode`，然后将其作为父节点来创建第二个节点\
  \ `b`，那么从 `b` 到根节点的路径包含 `b` 和 `a`。\n\n*   接上例，如果我们创建一个 `WordNode` `c`，其父节点为 `b`，那么从\
  \ `c` 到根节点的路径将是 `c, b, a`。\n\n项目步骤 13.19\n\n将以下代码复制到 `WordNodeTest` 中：\n\n```\n\
  @Test\nfun testPathFromRootWithNullParent() {\nval a = WordNode(\"a\", null)\nval\
  \ path = a.rootPath()\nAssert.assertEquals(1, path.size)\nAssert.assertEquals(a,\
  \ path.get(0))\n}\n```\n\n确认测试失败。\n\n项目步骤 13.20\n\n以下是第二个场景的测试函数：\n\n```\n@Test\n\
  fun testPathFromRootLengthTwo() {\nval a = WordNode(\"a\", null)\nval b = WordNode(\"\
  b\", a)\nval path = b.rootPath()\nAssert.assertEquals(2, path.size)\nAssert.assertEquals(a,\
  \ path.get(0))\nAssert.assertEquals(b, path.get(1))\n}\n```\n\n将其复制到 `WordNodeTest`\
  \ 中，并确认测试失败。\n\n项目步骤 13.21\n\n你能为第三个场景添加一个测试吗？\n\n`rootPath` 的实现非常简单。首先从一个空列表开始。然后，如果\
  \ `WordNode` 有 `parent`，则添加 `parent` 的路径。最后，添加 `WordNode` 本身。这个算法用代码表示如下。请注意，在第\
  \ 5 行，我们使用了 `addAll` 函数，该函数将一个 `List` 中的所有元素插入到另一个 `List` 中。\n\n```\n1   fun rootPath()\
  \ : List {\n2       val result = mutableListOf()\n3       if (parent != null) {\n\
  4           val parentRootPath = parent.rootPath()\n5           result.addAll(parentRootPath)\n\
  6       }\n7       result.add(this)\n8       return result\n9   }\n```\n\n项目步骤 13.22\n\
  \n用上述代码替换 `rootPath` 的桩实现。\n\n确认测试现在通过。\n\n一个 `WordNode` 包含另一个 `WordNode` 这一事实使其成为*递归数据结构*。`rootPath`\
  \ 函数实际上是递归的，因为前面第 4 行调用了 `parent.rootPath`。\n\n## 13.11 整合所有内容\n\n现在，我们拥有了解决单词转换问题所需的所有部分。`WordSwitch`\
  \ 类有一个函数，用于在可能的情况下，通过真实单词的单字母转换，从原始单词找到目标 `WordNode`。如果目标 `WordNode` 不为 `null`，那么它可以为我们提供转换过程中的单词列表。\n\
  \n项目步骤 13.23\n\n将以下 `main` 函数添加到 `WordSwitch.kt` 文件中，位于类声明之上：\n\n```\nfun main()\
  \ {\n//加载字典。\nval path = Paths.get(\"src/main/resources/books/english.txt\")\nval\
  \ dictionary = Dictionary(path)\n//创建一个 WordSwitch 来查找\n//从 \"swine\" 到 \"whale\"\
  \ 的路径。\nval wordSwitch = WordSwitch(dictionary, \"swine\", \"whale\")\n//计算目标节点。\n\
  val target = wordSwitch.lookForTarget()\nif (target == null) {\n//如果目标为 null，则打印出无法到达该单词的信息。\n\
  println(\"Could not reach target.\")\n} else {\n//否则，检索从根节点到目标节点的路径并打印出来。\nval fromRoot\
  \ = target.rootPath()\nfor (wordNode in fromRoot) {\nprintln(wordNode.text)\n}\n\
  }\n}\n```\n\n通过点击 `main` 函数旁边出现的绿色三角形来运行 `main` 函数。输出应显示：\n\n```\nswine, shine,\
  \ whine, while, whale\n```\n\n要计算不同的单词搜索，只需将 `\"swine\"` 和 `\"whale\"` 更改为你想要的任何单词。\n\
  \n## 13.12 总结与步骤详情\n\n我们构建了一个递归数据结构来解决一个难题。这实际上是相当复杂的编程，如果你理解了大部分代码，那做得很好；如果你有点困惑，也不必担心——这是非常高级的编码，可能需要一些时间才能消化。将问题分解为不同的类让我们更多地练习了面向对象编程。像往常一样，我们非常强调单元测试。此外，还有一些新的语法：我们学习了\
  \ `while` 循环。最后，我们进行了一些重构以减少代码重复，这是一项非常重要的编程技能。\n\n这确实是一个庞大的章节。接下来的内容会变得更简单（也更多彩！）。\n\
  \n### 13.12.1 项目步骤 13.1 的详情\n\n测试通过是因为它检查是否返回了 `false`，而在我们的函数桩实现中，它总是返回 `false`。我们进行测试的原因是为了防止将来出现错误。\n\
  \n### 13.12.2 项目步骤 13.2 的详情\n\n以下是完整实现的测试：\n\n```\n@Test\nfun validWordTest() {\n\
  val path = Paths.get(\"src/test/resources/books/FiveWords.txt\")\nval dictionary\
  \ = Dictionary(path)\nval checker = WordChecker(dictionary)\nAssert.assertTrue(checker.isPreviouslyUnseenValidWord(\"\
  bat\"))\nAssert.assertFalse(checker.isPreviouslyUnseenValidWord(\"bat\"))\n}\n```\n\
  \n### 13.12.3 项目步骤 13.3 的详情\n\n该函数的一种可能实现如下：\n\n```\nfun isPreviouslyUnseenValidWord(string:\
  \ String): Boolean {\nif (!dictionary.contains(string)) {\nreturn false\n}\nif (wordsSoFar.contains(string))\
  \ {\nreturn false\n}\nwordsSoFar.add(string)\nreturn true\n}\n```\n\n### 13.12.4\
  \ 项目步骤 13.4 的详情\n\n以下是完整的测试函数：\n\n```\n@Test\nfun testEmpty() {\nval path = Paths.get(\"\
  src/test/resources/books/abcd.txt\")\nval dictionary = Dictionary(path)\nval checker\
  \ = WordChecker(dictionary)\nval wordNode = WordNode(\"\")\nAssert.assertTrue(wordNode.variantsByOneLetter(checker).isEmpty())\n\
  }\n```\n\n即使使用我们的桩实现，这个测试也能通过，因为它总是返回一个空列表。尽管拥有这样的测试似乎毫无意义，但它可以保护我们免受未来可能包含错误的代码更改的影响。\n\
  \n### 13.12.5 项目步骤 13.5 的详情\n\n完成的测试是：\n\n```\n@Test\nfun testOneLetterWord() {\n\
  val path = Paths.get(\"src/test/resources/books/abcd.txt\")\nval dictionary = Dictionary(path)\n\
  val checker = WordChecker(dictionary)\nval nodeA = WordNode(\"a\")\nval generated\
  \ = nodeA.variantsByOneLetter(checker)\nAssert.assertEquals(3, generated.size)\n\
  Assert.assertTrue(generated.contains(WordNode(\"b\")))\nAssert.assertTrue(generated.contains(WordNode(\"\
  c\")))\nAssert.assertTrue(generated.contains(WordNode(\"d\")))\n}\n```\n\n请注意，`generated`\
  \ 是一个 `List<WordNode>`，*而不是* `List<String>`，这就是为什么我们使用：\n\n```\nAssert.assertTrue(generated.contains(WordNode(\"\
  b\")))\n```\n\n*而不是*：\n\n```\nAssert.assertTrue(generated.contains(\"b\"))\n```\n\
  \n还要注意，我们正在检查 `generated` 是否包含三个特定的 `WordNode`，并且其大小为 3。大小检查确保 `generated` 中没有我们未检查的其他\
  \ `WordNode`。\n\n### 13.12.6 项目步骤 13.6 的详情\n\n以下是测试：\n\n```\n@Test\nfun testTwoLetterWord()\
  \ {\nval checker = wordChecker()\nval nodeAB = WordNode(\"ab\")\nval generated =\
  \ nodeAB.variantsByOneLetter(checker)\nAssert.assertEquals(6, generated.size)\n\
  Assert.assertTrue(generated.contains(WordNode(\"aa\")))\nAssert.assertTrue(generated.contains(WordNode(\"\
  ac\")))\nAssert.assertTrue(generated.contains(WordNode(\"ad\")))\nAssert.assertTrue(generated.contains(WordNode(\"\
  bb\")))\nAssert.assertTrue(generated.contains(WordNode(\"cb\")))\nAssert.assertTrue(generated.contains(WordNode(\"\
  db\")))\n}\n```\n\n### 13.12.7 项目步骤 13.9 的详情\n\n测试通过是因为它们测试的是返回 `null`，而这正是桩实现所做的。像往常一样，这些测试是为了确保在我们编写函数体之后，这种情况仍然会发生。\n\
  \n实际上，这些测试也起到了文档的作用，使其他程序员更容易理解这个类。在过去十年左右的时间里，有一种趋势是将单元测试用作类行为的文档。由于测试实际上是可执行的，因此它们保证是最新的，而其他类型的文档（例如代码注释）往往会很快过时。大多数软件开发人员讨厌编写文档。\n\
  \n\n\n### 13.12.8 项目步骤 13.10 的细节\n\n以下是重构后的代码，提取出的函数被移到了文件末尾：\n\n```\n1   class\
  \ WordSwitchTest {\n2       @Test\n3       fun noPathDifferentLengths() {\n4   \
  \        val dictionary = dictionary()\n5           val wordSwitch = WordSwitch(dictionary,\
  \ \"ab\", \"abc\")\n6           Assert.assertNull(wordSwitch.lookForTarget())\n\
  7       }\n\n9       @Test\n10       fun noPathTargetNotInDictionary() {\n11   \
  \        val dictionary = dictionary()\n12           val wordSwitch = WordSwitch(dictionary,\
  \ \"aa\", \"ae\")\n13           Assert.assertNull(wordSwitch.lookForTarget())\n\
  14       }\n\n16       private fun dictionary(): Dictionary {\n17           val\
  \ path = Paths.get(\"src/test/resources/books/abcd.txt\")\n18           val dictionary\
  \ = Dictionary(path)\n19           return dictionary\n20       }\n21   }\n```\n\n\
  请注意，第 4 行和第 11 行有些令人困惑，因为它们都声明了一个名为 `dictionary` 的 `val`，并将其设置为包含同样名为 `dictionary`\
  \ 的*函数*的返回值，但使用了括号来表示函数调用。这种混淆可以通过内联代码来消除，这将在本章后面部分完成。\n\n### 13.12.9 项目步骤 13.12\
  \ 的细节\n\n测试代码如下：\n\n```\n@Test\nfun a_to_b() {\nval wordSwitch = WordSwitch(dictionary(),\
  \ \"a\", \"b\")\nval result = wordSwitch.lookForTarget()\nAssert.assertEquals(\"\
