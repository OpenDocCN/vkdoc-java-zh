- "# 4. 二元选择\n\n在上一章中，我们学习了如何使用 `for` 循环遍历数组的元素。这使我们能够自动为瓦片着色，而不是逐个设置颜色。现在，我们将学习如何根据计算结果为\
  \ `true` 或 `false` 的表达式在代码中做出选择。结合循环，这将使我们能够用很少的代码行生成复杂的瓦片图案。\n\n\n\n## 4.1 If-Else\
  \ 语句\n\n观察图 4-1 中的图案。共有八行八列，瓷砖要么是黑色，要么是白色。所有白色瓷砖都位于从左上角到右下角的对角线下方。\n\n![../images/508289_1_En_4_Chapter/508289_1_En_4_Fig1_HTML.jpg](img/508289_1_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1\n\n使用 if-else 逻辑生成的图案\n\n对应的 `getTileColors` 代码可能是什么样的？大概是这样的：\n\n```\n\
  fun getTileColors() : Array> {\n初始化一个 8x8 数组的代码\n对于每一行\n对于每一列\n如果在对角线下方\nshades[row][column]\
  \ = WHITE\n否则\nshades[row][column] = BLACK\n返回数组\n}\n```\n\n要实现这个算法，我们需要能够判断任意一个单元格是否位于从左上到右下的对角线下方。考虑一个坐标为\
  \ `[row][column]` 的单元格。如果 `row` 和 `column` 相等，则该单元格位于对角线上。如果 `column` 大于 `row`，则该单元格位于对角线的右侧和上方。然而，如果\
  \ `row` 大于 `column`，则该单元格位于对角线的下方和左侧。你可以通过查看图像中的实际单元格来验证这些说法。例如，单元格 `[5][3]` 在哪里？单元格\
  \ `[3][5]` 在哪里？利用这个事实，我们可以将算法重写为：\n\n```\nfun getTileColors() : Array> {\n初始化一个\
  \ 8x8 数组的代码\n对于每一行\n对于每一列\nif (row > column) {\nshades[row][column] = WHITE\n} else\
  \ {\nshades[row][column] = BLACK\n}\n返回数组\n}\n```\n\n要将其转换为 Kotlin 代码，我们需要：\n\n\
  1.  实现初始化数组的代码\n2.  将 `FOR EACH` 伪代码替换为 `for` 循环\n3.  使用正确的白色和黑色值\n4.  编写正确的 `return`\
  \ 语句\n\n结果如下：\n\n```\nfun tileColors(): Array> {\nval shades = Array(8) {\nArray(8)\
  \ { 0 }\n}\nfor (row in 0..7) {\nfor (column in 0..7) {\nif (row > column) {\nshades[row][column]\
  \ = 255\n} else {\nshades[row][column] = 0\n}\n}\n}\nreturn shades\n}\n```\n\n提示\n\
  \n与上一章一样，项目树中有一个文件：`chapter4_code_to_copy.txt`，可以从中复制此代码及其他代码。\n\n编程挑战 4.1\n\n修改程序，使其生成与上述图案相反的图案：\n\
  \n![../images/508289_1_En_4_Chapter/508289_1_En_4_Figa_HTML.jpg](img/508289_1_En_4_Figa_HTML.jpg)\n\
  \n编程挑战 4.2\n\n要检查两个值是否相同，我们使用 `==`（两个等号）运算符。例如，要在 `if` 语句中检查行和列是否具有相同的值，我们会使用 `if\
  \ (row == column)`。使用此操作，你能修改前面的代码，使其生成在主左上到右下对角线上有黑色瓷砖的图案吗？\n\n![../images/508289_1_En_4_Chapter/508289_1_En_4_Figb_HTML.jpg](img/508289_1_En_4_Figb_HTML.jpg)\n\
  \n编程挑战 4.3\n\n通过仅根据列索引选择颜色，我们可以生成垂直条纹。看看你是否能生成这个图案：\n\n![../images/508289_1_En_4_Chapter/508289_1_En_4_Figc_HTML.jpg](img/508289_1_En_4_Figc_HTML.jpg)\n\
  \n## 4.2 或运算符\n\n假设我们想要生成一个瓷砖图案，其中第 0 列和第 2 列完全由黑色瓷砖填充，如图 4-2 所示。如果我们的 `if` 语句体是这样的，我们就可以生成这个图案：\n\
  \n![../images/508289_1_En_4_Chapter/508289_1_En_4_Fig2_HTML.jpg](img/508289_1_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2\n\n使用 `or` 运算生成的图案\n\n```\nif (column == 0 OR column == 2) ....\n```\n\n\
  事实上，这是可行的，但 Kotlin 使用两个竖线字符而不是单词 `OR`：\n\n```\nif (column == 0 || column == 2) ....\n\
  ```\n\n以下是生成该图案的 `getTileColors` 版本：\n\n```\nfun tileColors(): Array> {\nval shades\
  \ = Array(8) {\nArray(8) { 0 }\n}\nfor (row in 0..7) {\nfor (column in 0..7) {\n\
  if (column == 0 || column == 2) {\nshades[row][column] = 0\n} else {\nshades[row][column]\
  \ = 255\n}\n}\n}\nreturn shades\n}\n```\n\n编程挑战 4.4\n\n可以在单个语句中使用多个 `||` 运算符：`a\
  \ || b || c || d` 表示“`a 或 b 或 c 或 d`”。使用此方法修改代码，使其生成此图案：\n\n![../images/508289_1_En_4_Chapter/508289_1_En_4_Figd_HTML.jpg](img/508289_1_En_4_Figd_HTML.jpg)\n\
  \n编程挑战 4.5\n\n修改代码，使其生成此图案：\n\n![../images/508289_1_En_4_Chapter/508289_1_En_4_Fige_HTML.jpg](img/508289_1_En_4_Fige_HTML.jpg)\n\
  \n## 4.3 与运算符\n\n假设我们想要生成一个只有一个黑色瓷砖的图案，该瓷砖位于位置 `[1][1]`，如图 4-3 所示。这是 `row == 1`\
  \ *且* `column == 1` 同时成立的唯一数组位置。要表达两个条件都为真的需求，我们使用 *与* 运算符，它写作两个与符号：`&&`。以下是 `tileColors`\
  \ 的一个版本，它在 `if` 语句中使用 `&&` 来生成该图案：\n\n![../images/508289_1_En_4_Chapter/508289_1_En_4_Fig3_HTML.jpg](img/508289_1_En_4_Fig3_HTML.jpg)\n\
  \n图 4-3\n\n使用 `and` 运算符生成的图案\n\n```\nfun tileColors(): Array> {\nval shades = Array(8)\
  \ {\nArray(8) { 0 }\n}\nfor (row in 0..7) {\nfor (column in 0..7) {\nif (row ==\
  \ 1 && column == 1) {\nshades[row][column] = 0\n} else {\nshades[row][column] =\
  \ 255\n}\n}\n}\nreturn shades\n}\n```\n\n编程挑战 4.6\n\n要测试一个数是否大于另一个数，我们可以使用 `>` 运算符。例如，如果\
  \ `row` 是 `3, 4, 5,` …，则 `row > 2` 将返回值 `true`；如果 `row` 是 `0`、`1` 或 `2`，则返回 `false`。对行和列都使用\
  \ `>` 运算符会生成此图案：\n\n![../images/508289_1_En_4_Chapter/508289_1_En_4_Figf_HTML.jpg](img/508289_1_En_4_Figf_HTML.jpg)\n\
