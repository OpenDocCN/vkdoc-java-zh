  3   /**\n4    * 表示从书籍中读取的一行文本。\n5    */\n6   class Line(line : String) {\n\n8  \
  \ }\n```\n\n这里的主要变化是将简单的声明 `Line` 替换为：\n\n```\nLine(line : String)\n```\n\n这就是所谓的**构造函数**。目前，构造函数什么也不做；我们只是在勾勒代码的轮廓。\n\
