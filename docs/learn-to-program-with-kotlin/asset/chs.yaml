  \ |\n| 输出 | `List<String>` | `List<Picture>` |\n\n两种情况下算法的通用形式相同，都包含一个主循环，随后调用一个函数来添加任何剩余的部分。\n\
  \n当然，单元测试总能帮助我们更好地理解代码。切片函数的测试使用了图 18-3 所示的测试图像。该测试将图像垂直分割，检查是否得到三个片段，然后将每个片段与预期的测试图像进行比较。\n\
