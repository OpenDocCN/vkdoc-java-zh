  \n图 10-4\n\n两个单元测试失败\n\n![../images/508289_1_En_10_Chapter/508289_1_En_10_Fig3_HTML.jpg](img/508289_1_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3\n\n从 IntelliJ 运行 JUnit 测试\n\n现在我们已经有了基本的框架，可以开始实现和测试 `Line` 了。我们知道需要从 `String`（书籍中的文本行）创建\
