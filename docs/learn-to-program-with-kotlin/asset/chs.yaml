  ## 9.2 写入


  为了存储信息，我们可以使用函数 `Files.write`。这需要一个参数用于存储位置，以及一个参数用于要写入的数据。以下程序读取一个鸟类目击列表，将其转换为无空行的列表，然后将过滤后的列表写入
  `files` 目录中一个名为 `Reformatted.txt` 的文件：


  ```

  package lpk.files

  import java.nio.file.Files

  import java.nio.file.Paths

  fun main() {

  val helloWorld = Paths.get("files/BirdListWithGaps.txt")

  val sightings = Files.readAllLines(helloWorld)

  val noGaps = mutableListOf()

  for (sighting in sightings) {

  if (sighting != "") {

  noGaps.add(sighting)

  }

  }

  val reformatted = Paths.get("files/Reformatted.txt")

  Files.write(reformatted, noGaps)

  }

  ```


  如果我们运行修改后的程序，将在 `files` 目录中创建一个新文件。要查看此文件，请右键单击该目录，然后选择**从磁盘重新加载**，如图 9-3 所示。然后该文件将如图
  9-4 所示出现。如果你双击此文件，IntelliJ 将打开它，你可以检查它是否不包含空行。


