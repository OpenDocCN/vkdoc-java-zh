  \n图 14-6\n\n瑞士国旗\n\n\n\n## 14.3 照片\n\n计算机上有多种文件格式用于存储图像。JPEG 和 PNG 是最常用的两种格式。给定一个这两种格式之一的文件，我们如何将其转换为一个\
  \ `Picture`？图像处理是一项非常重要的任务，因此有现成的库类可以提供帮助。事实上，有一个名为 `javax.imageio.ImageIO` 的类可以为我们完成大部分工作。将\
  \ `Picture.kt` 中的所有代码替换为以下内容：\n\n```\npackage lpk.imaging\nimport java.awt.Color\n\
  import java.io.File\nimport javax.imageio.ImageIO\nfun loadPictureFromFile(imageFile:\
  \ File): Picture {\nval image = ImageIO.read(imageFile)\nval width = image.width\n\
  val height = image.height\nval pixels = Array(height) { row ->\nArray(width) { column\
  \ ->\nColor(image.getRGB(column, row))\n}\n}\nreturn Picture(pixels)\n}\nclass Picture(val\
  \ pixels: Array>) {\nfun height(): Int {\nreturn pixels.size\n}\nfun width(): Int\
  \ {\nreturn pixels[0].size\n}\nfun pixelByRowColumn(row: Int, column: Int): Color\
  \ {\nreturn pixels[row][column]\n}\n}\n```\n\n这个新版本的文件导入了读取图像文件所需的库。然后有一个 `loadPictureFromFile`\
  \ 函数，其工作方式如下。该函数的唯一参数是一个包含图像数据的 `File`。函数的第一行将文件读入一个名为 `image` 的 `val` 中。这个 `val`\
  \ 可以为我们提供图像的高度和宽度，这些信息用于创建一个像素的二维数组。我们可以使用 `getRGB` 函数获取特定位置的像素，该函数用于初始化这个二维数组。\n\
  \n重要的是不要过于纠结于这个函数的细节。在我们完成了编写类似代码来生成旗帜的所有艰苦工作之后，数组初始化的代码应该看起来很熟悉。然而，我们应该通过编写一个测试来确保代码是正确的。我们正在处理的项目中已经包含了一个几乎为空的\
  \ `PictureTest` 类，并且有一些图像文件可以用作测试数据，如图 14-8 所示。\n\n`images` 目录中的文件 `green_h50_w100.png`\
  \ 是一个绿色矩形，有 50 行和 100 列。让我们编写一个测试，使用 `loadPictureFromFile` 从这个文件创建一个图像，然后检查：\n\n\
  *   `Picture` 有 50 行。\n*   它有 100 列。\n*   每个像素都是绿色的。\n\n将 `PictureTest.kt` 的当前内容替换为以下代码：\n\
  \n```\n1   package lpk.imaging.test\n\n3   import org.junit.Assert\n4   import org.junit.Test\n\
  5   import lpk.imaging.Picture\n6   import lpk.imaging.loadPictureFromFile\n7  \
  \ import java.awt.Color\n8   import java.nio.file.Paths\n\n10   private val IMAGES\
  \ = \"src/test/resources/images/\"\n\n12   class PictureTest {\n13       @Test\n\
  14       fun loadPictureFromFileTest() {\n15           val file = Paths.get(IMAGES\
  \ + \"green_h50_w100.png\").toFile()\n16           val loaded = loadPictureFromFile(file)\n\
  17           Assert.assertEquals(loaded.height(), 50)\n18           Assert.assertEquals(loaded.width(),\
  \ 100)\n19           val green = Color(0, 255, 0)\n20           for (row in 0..49)\
  \ {\n21               for (column in 0..99) {\n22                   Assert.assertEquals(loaded.pixelByRowColumn(row,\
  \ column), green)\n23               }\n24           }\n25       }\n26   }\n```\n\
  \n第 14 行和第 15 行将图像文件定义为一个变量，然后将其作为参数传递给 `loadPictureFromFile`，并将返回的 `Picture` 保存在名为\
  \ `loaded` 的 `val` 中。测试的其余部分包含关于名为 `loaded` 的对象的各种断言。第 16 行检查它是否具有正确的行数。下一行检查宽度。接下来是一个代码块，它逐行逐列地遍历像素，并检查它们是否都是绿色的。将这段代码复制到\
  \ `PictureTest` 中后，运行它并检查测试是否通过。\n\n**编程挑战 14.7**\n\n有一个名为 `yellow_h80_w30.png`\
