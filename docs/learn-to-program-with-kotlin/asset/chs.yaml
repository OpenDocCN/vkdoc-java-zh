  解答 7.2


  当 `c` 为 `''K''` 时，`numberOfSpaces` 为 `0`。


  当 `c` 为 `''o''` 时，`numberOfSpaces` 为 `1`。


  内层循环在单行上依次打印出 `numberOfSpaces` 个空格。


