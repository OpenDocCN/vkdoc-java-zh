  解答 7.3


  统计 `''a''` 的数量：


  ```

  package lpk.basics

  fun main() {

  val str = "How long is a piece of string?"

  var count = 0

  for (c in str) {

  if (c == ''a'') {

  count = count + 1

  }

  }

  println("Count: $count")

  }

  ```


  要统计 `''a''` 和 `''e''` 的数量，我们可以在比较中使用 `or`：


  ```

  package lpk.basics

  fun main() {

  val str = "How long is a piece of string?"

  var count = 0

  for (c in str) {

  if (c == ''a'' || c == ''e'') {

  count = count + 1

  }

  }

  println("Count: $count")

  }

  ```


  另一种方法是使用两个 `if` 语句：


  ```

  package lpk.basics

  fun main() {

  val str = "How long is a piece of string?"

  var count = 0

  for (c in str) {

  if (c == ''a'') {

  count = count + 1

  }

  if (c == ''e'') {

  count = count + 1

  }

  }

  println("Count: $count")

  }

  ```


  要统计元音字母，我们可以在 `if` 语句中列出所有元音：


  ```

  package lpk.basics

  fun main() {

  val str = "How long is a piece of string?"

  var count = 0

  for (c in str) {

  if (c == ''a'' || c == ''e'' || c == ''i''|| c == ''o''|| c == ''u'') {

  count = count + 1

  }

  }

  println("Count: $count")

  }

  ```


  实际上，这是不正确的，因为它没有考虑大写元音字母。为了解决这个问题，我们可以插入一个 `val`，它是 `c` 的小写版本，并针对它进行比较。要获取 `Char`
  的小写版本，我们调用它的 `toLowerCase` “点”函数。（这个函数在 `Char` 和 `String` 上都有定义。）以下是修正后的代码：


  ```

  package lpk.basics

  fun main() {

  val str = "Are we there yet?"

  var count = 0

  for (c in str) {

  val l = c.toLowerCase()

  if (l == ''a'' || l == ''e'' || l == ''i''|| l == ''o''|| l == ''u'') {

  count = count + 1

  }

  }

  println("Count: $count")

  }

  ```


  （实际上，这仍然没有将 `"y"` 在充当元音时（例如在单词 “rhythm” 中）计入。）


  解答 7.4


