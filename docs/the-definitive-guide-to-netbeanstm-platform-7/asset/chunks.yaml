  raw: '#### ID3 API


    Of course, you will reuse the information stored in this manner in your application.
    Therefore, you need an API that adequately supports retrieval and storage of ID3
    data, according to the specification. On the Internet you will find a series of
    such ID3 APIs for free. Most of them are reasonably useful. For easy handling
    and simple integration, I started implementing my own ID3 APIs, though. Doing
    so, I consciously avoided the assistance of NetBeans APIs, in order to being able
    to use it in other applications, too. Although this library is still under development
    (only the editing of ID3v1 tags is possible at the moment), it is sufficient for
    this example, which merely demonstrates advantages and strengths of the NetBeans
    Platform. Of course, you are free to use another library. If you do, however,
    you must adapt resulting source locations to the selected API. As with the JMF
    libraries, you integrate the ID3 library using a library wrapper module. You can
    create such a module by clicking *File ![Image](images/U001.jpg) New Project...*
    and *NetBeans Modules ![Image](images/U001.jpg) Library Wrapper Module*. On the
    wizard''s first page, select the library named `com-hboeck-mp3manager-id3.jar`
    (which can also be downloaded from the Source Code/Download area for this book
    on the Apress web site). Name the module *ID3 API* and add it to the MP3 manager.
    All other fields can be left with their default values.


    You must define a dependency to the ID3 module in order to provide the ID3 API
    to the file type module. You can do this in the *Properties* of the file type
    module in the category *Libraries* (see [Figure 44-2](#Chapter44.html#fig_44_2)).
    Press the *Add Dependency...* button and just select the *ID3 API* module there.


    ![Image](images/4402.jpg)


    ***Figure 44-2.** Defining dependencies to the ID3 API*


    As already mentioned, the class `Mp3DataObject` is responsible for the information
    and methods specific to MP3\. As a result, you extend this class which facilitates
    accessing both the ID3v1 tag and the ID3v2 tag (see [Listing 44-4](#Chapter44.html#list_44_4)).
    It is very important that you create the tags only when accessing the file itself,
    and here is why. If you open, for example, a folder containing a lot of MP3 files
    in the Favorites window, an `Mp3DataObject` is created for each file. If you read
    the ID3 tags of every file, you would eventually encounter a significant delay—a
    behavior to be avoided.


    ***Listing 44-4.** Extending the MP3 DataObject Class with Support for ID3*


    `import com.hboeck.mp3manager.id3.v1.`**`ID3v1Tag`**`;`

    `import com.hboeck.mp3manager.id3.v2.`**`ID3v2Tag`**`;`

    `...`

    `public class` **`Mp3DataObject`** `extends MultiDataObject {`

    `private` **`ID3v1Tag`** `id3v1 = null;`

    `private` **`ID3v2Tag`** `id3v2 = null;`

    `public` **`Mp3DataObject`**`(FileObject pf, MultiFileLoader loader)`

    `           throws DataObjectExistsException, IOException {`

    `      super(pf, loader);`

    `   }`

    `   ...`


    `public ID3v1Tag` **`getID3v1Tag`**`() {`

    `      if(id3v1 == null) {`

    `id3v1 = new` **`ID3v1Tag`**`(FileUtil.toFile(`**`getPrimaryFile()`**`));`

    `      }`

    `return` **`id3v1`**`;`

    `   }`


    `public ID3v2Tag` **`getID3v2Tag`**`() {`

    `      if(id3v2 == null) {`

    `id3v2 = new` **`ID3v2Tag`**`(FileUtil.toFile(`**`getPrimaryFile()`**`));`

    `      }`

    `return` **`id3v2`**`;`

    `   }`

    `}`


    Using the `DataObject` method `getPrimaryFile()` you receive the `FileObject`
    of the MP3 file, which is managed by the `Mp3DataObject` instance (this is the
    object that is passed to the constructor by the data loader). You must pass a
    `FileObject` to the ID3 tag constructor. This file is obtained by using the method
    `FileUtil.toFile()`, which determines the file encapsulated by the `FileObject`.


    Another way to obtain instances of the `ID3v1Tag` and `ID3v2Tag` classes could
    be to provide them using the Lookup of the `Mp3DataObject`. This enables you to
    retrieve these instances from a simple `Node` or `DataObject` instance, without
    special type safety:


    `Node n = ...`

    `ID3v1Tag id3v1 = n.`**`getLookup`**`().`**`lookup`**`(ID3v1Tag.class);`


    #### ID3 Editor


    Now you just need a way to display and edit the ID3 data. You can do this with
    the *Properties* module of the NetBeans Platform connected to your MP3 file type.
    It is the nodes'' job to provide properties to be displayed in the user interface.
    Therefore, you now create the `Mp3DataNode` class. Connected to this class, you
    must change the `createNodeDelegate()` method of the `Mp3DataObject` class. An
    `Mp3DataNode` instance is created then.


    In the newly created `Mp3DataNode` class, you overwrite the `createSheet()` method.
    This method provides the properties of the nodes using a `Sheet` instance; features
    can occur that can only be read or written. In this example, the ID3v1 data will
    be read as well as written, while the ID3v2 data is only read.


    First, you invoke the `createSheet()` method of the `DataNode` superclass, which
    already creates a `Sheet` and adds some basic properties to it, such as file name,
    size, or the date of modification. If you do not want this data displayed, you
    can also directly create your own sheet using `Sheet.createDefault()`. Inside
    a `Sheet` object, properties are grouped using `Set` objects. These groups may
    be purposefully hidden or shown in the Properties window. A `Set` is created using
    the static `createPropertiesSet()` method.


    You create two of them, in order to manage the ID3v1 and ID3v2 data separately.
    It is important that each `Set` is given a unique name, using the method `setName()`;
    otherwise, the sets will be overridden inside the sheets. (See [Listing 44-5](#Chapter44.html#list_44_5)).


    ***Listing 44-5.** Providing ID3 Information in a Properties Sheet for Display
    and Editing Purposes*


    `import org.openide.nodes.`**`PropertySupport`**`;`

    `import org.openide.nodes.`**`Sheet`**`;`


    `public class` **`Mp3DataNode`** `extends DataNode {`

    `   ...`

    `   @Override`

    `protected Sheet` **`createSheet`**`() {`

    `      Sheet sheet = super.createSheet();`

    `      Sheet.Set set1 = Sheet.`**`createPropertiesSet`**`();`

    `      Sheet.Set set2 = Sheet.`**`createPropertiesSet`**`();`

    `      set1.`**`setName("id3v1")`**`;`

    `      set1.setDisplayName("ID3 V1");`

    `      set2.`**`setName("id3v2")`**`;`

    `      set2.setDisplayName("ID3 V2");`


    **`Mp3DataObject`** `m = getLookup().lookup(`**`Mp3DataObject`**`.class);`

    `      ID3v1Tag id3v1 = m.`**`getID3v1Tag`**`();`

    `      ID3v2Tag id3v2 = m.`**`getID3v2Tag`**`();`

    `      try {`

    `         /* ID3v1 Properties */`

    **`  Property`** `title1 =`

    `            new PropertySupport.Reflection<String>(id3v1, String.class, "`**`title`**`");`

    `         ...`

    `         title1.setName("Title");`

    `         set1.`**`put`**`(title1);`

    `         /* ID3v2 Properties */`

    **`Property`** `album2 =`

    `            new PropertySupport.Reflection<String>(id3v2, String.class, "`**`getAlbum`**`",
    null);`

    `         ...`

    `         album2.setName("Album");`

    `         set2.`**`put`**`(album2);`

    `      } catch (Exception e) { }`


    `      sheet.`**`put`**`(set1);`

    `      sheet.`**`put`**`(set2);`

    `return` **`sheet`**`;`

    `   }`

    `}`'
  trans: '

    #### ID3 API


    当然，您会在应用程序中重用以此方式存储的信息。因此，您需要一个能够根据规范充分支持 ID3 数据检索和存储的 API。在互联网上，您可以免费找到一系列此类
    ID3 API。其中大多数都相当实用。不过，为了便于处理和简单集成，我开始实现自己的 ID3 API。这样做时，我有意避免使用 NetBeans API 的帮助，以便也能在其他应用程序中使用它。尽管这个库仍在开发中（目前只能编辑
    ID3v1 标签），但对于这个仅用于演示 NetBeans 平台优势和强项的示例来说已经足够了。当然，您也可以自由使用其他库。但如果这样做，您必须将生成的源代码位置调整到所选
    API。与 JMF 库一样，您可以使用库包装器模块来集成 ID3 库。您可以通过点击 *文件 ![Image](img/U001.jpg) 新建项目...*
    和 *NetBeans 模块 ![Image](img/U001.jpg) 库包装器模块* 来创建这样一个模块。在向导的第一页，选择名为 `com-hboeck-mp3manager-id3.jar`
    的库（该库也可以从 Apress 网站上本书的源代码/下载区域下载）。将模块命名为 *ID3 API*，并将其添加到 MP3 管理器中。所有其他字段可以保留默认值。


    您必须定义一个对 ID3 模块的依赖关系，以便向文件类型模块提供 ID3 API。您可以在文件类型模块的 *属性* 中的 *库* 类别下执行此操作（参见图
    44-2）。按下 *添加依赖项...* 按钮，然后选择 *ID3 API* 模块即可。


    ![Image](img/4402.jpg)


    ***图 44-2.** 定义对 ID3 API 的依赖关系*


    如前所述，`Mp3DataObject` 类负责特定于 MP3 的信息和方法。因此，您扩展了这个类，以便于访问 ID3v1 标签和 ID3v2 标签（参见清单
    44-4）。非常重要的是，您只在访问文件本身时才创建标签，原因如下。例如，如果您在“收藏夹”窗口中打开一个包含许多 MP3 文件的文件夹，则会为每个文件创建一个
    `Mp3DataObject`。如果您读取每个文件的 ID3 标签，最终会遇到显著的延迟——这是一种需要避免的行为。


    ***清单 44-4.** 扩展 MP3 DataObject 类以支持 ID3*


    `import com.hboeck.mp3manager.id3.v1.`**`ID3v1Tag`**`;`

    `import com.hboeck.mp3manager.id3.v2.`**`ID3v2Tag`**`;`

    `...`

    `public class` **`Mp3DataObject`** `extends MultiDataObject {`

    `private` **`ID3v1Tag`** `id3v1 = null;`

    `private` **`ID3v2Tag`** `id3v2 = null;`

    `public` **`Mp3DataObject`**`(FileObject pf, MultiFileLoader loader)`

    `           throws DataObjectExistsException, IOException {`

    `      super(pf, loader);`

    `   }`

    `   ...`


    `public ID3v1Tag` **`getID3v1Tag`**`() {`

    `      if(id3v1 == null) {`

    `id3v1 = new` **`ID3v1Tag`**`(FileUtil.toFile(`**`getPrimaryFile()`**`));`

    `      }`

    `return` **`id3v1`**`;`

    `   }`


    `public ID3v2Tag` **`getID3v2Tag`**`() {`

    `      if(id3v2 == null) {`

    `id3v2 = new` **`ID3v2Tag`**`(FileUtil.toFile(`**`getPrimaryFile()`**`));`

    `      }`

    `return` **`id3v2`**`;`

    `   }`

    `}`


    使用 `DataObject` 方法 `getPrimaryFile()`，您可以获取由 `Mp3DataObject` 实例管理的 MP3 文件的 `FileObject`（这是数据加载器传递给构造函数的对象）。您必须将一个
    `FileObject` 传递给 ID3 标签构造函数。这个文件是通过使用 `FileUtil.toFile()` 方法获得的，该方法确定由 `FileObject`
    封装的文件。


    另一种获取 `ID3v1Tag` 和 `ID3v2Tag` 类实例的方法是通过 `Mp3DataObject` 的 Lookup 来提供它们。这使得您能够从简单的
    `Node` 或 `DataObject` 实例中检索这些实例，而无需特殊的类型安全性：


    `Node n = ...`

    `ID3v1Tag id3v1 = n.`**`getLookup`**`().`**`lookup`**`(ID3v1Tag.class);`


    #### ID3 编辑器


    现在您只需要一种显示和编辑 ID3 数据的方法。您可以通过 NetBeans 平台的 *属性* 模块连接到您的 MP3 文件类型来实现这一点。节点的工作是提供要在用户界面中显示的属性。因此，您现在创建
    `Mp3DataNode` 类。与此类关联，您必须更改 `Mp3DataObject` 类的 `createNodeDelegate()` 方法。然后会创建一个
    `Mp3DataNode` 实例。


    在新创建的 `Mp3DataNode` 类中，您重写 `createSheet()` 方法。该方法使用 `Sheet` 实例提供节点的属性；可以出现只能读取或写入的特性。在此示例中，ID3v1
    数据既可读也可写，而 ID3v2 数据只能读取。


    首先，您调用 `DataNode` 超类的 `createSheet()` 方法，该方法已经创建了一个 `Sheet` 并向其中添加了一些基本属性，例如文件名、大小或修改日期。如果您不希望显示这些数据，也可以直接使用
    `Sheet.createDefault()` 创建自己的 sheet。在 `Sheet` 对象内部，属性使用 `Set` 对象进行分组。这些组可以在“属性”窗口中有意地隐藏或显示。使用静态的
    `createPropertiesSet()` 方法创建 `Set`。


    您创建两个这样的 `Set`，以便分别管理 ID3v1 和 ID3v2 数据。重要的是，每个 `Set` 都必须使用 `setName()` 方法赋予一个唯一的名称；否则，这些集合将在
    sheet 内部被覆盖。（参见清单 44-5）。


    ***清单 44-5.** 在属性 Sheet 中提供 ID3 信息以供显示和编辑*


    `import org.openide.nodes.`**`PropertySupport`**`;`

    `import org.openide.nodes.`**`Sheet`**`;`


    `public class` **`Mp3DataNode`** `extends DataNode {`

    `   ...`

    `   @Override`

    `protected Sheet` **`createSheet`**`() {`

    `      Sheet sheet = super.createSheet();`

    `      Sheet.Set set1 = Sheet.`**`createPropertiesSet`**`();`

    `      Sheet.Set set2 = Sheet.`**`createPropertiesSet`**`();`

    `      set1.`**`setName("id3v1")`**`;`

    `      set1.setDisplayName("ID3 V1");`

    `      set2.`**`setName("id3v2")`**`;`

    `      set2.setDisplayName("ID3 V2");`


    **`Mp3DataObject`** `m = getLookup().lookup(`**`Mp3DataObject`**`.class);`

    `      ID3v1Tag id3v1 = m.`**`getID3v1Tag`**`();`

    `      ID3v2Tag id3v2 = m.`**`getID3v2Tag`**`();`

    `      try {`

    `         /* ID3v1 属性 */`

    **`  Property`** `title1 =`

    `            new PropertySupport.Reflection<String>(id3v1, String.class, "`**`title`**`");`

    `         ...`

    `         title1.setName("标题");`

    `         set1.`**`put`**`(title1);`

    `         /* ID3v2 属性 */`

    **`Property`** `album2 =`

    `            new PropertySupport.Reflection<String>(id3v2, String.class, "`**`getAlbum`**`",
    null);`

    `         ...`

    `         album2.setName("专辑");`

    `         set2.`**`put`**`(album2);`

    `      } catch (Exception e) { }`


    `      sheet.`**`put`**`(set1);`

    `      sheet.`**`put`**`(set2);`

    `return` **`sheet`**`;`

    `   }`

    `}`

    '
- fmt: '`Node`的查找提供了该节点所代表的`Mp3DataObject`实例。使用之前创建的`getID3v1Tag()`和`getID3v2Tag()`方法，你可以访问MP3文件的ID3信息。然后，为每个属性创建一个`PropertySupport.Reflection<T>`类的实例。使用模板指定属性的类型（在此示例中为`String`）。对于读写属性，你分配方法名称（通过这些方法可以读取和写入属性），但不包含`get`和`set`前缀。将`title`传递给构造函数以设置标题（例如，使用`getTitle()`和`setTitle()`方法）。只读属性会传递给一个特殊的构造函数版本，该版本分别接受get和set方法的名称。将`null`作为set方法传递将阻止属性被修改。每个创建的属性都使用`setName()`方法命名。此名称会显示在*Properties*窗口中。最后，使用`put()`方法将每个实例添加到`Sheet`对象，并返回该sheet。


    启动应用程序，并通过*Window*菜单打开收藏夹和属性窗口时，如果你在属性窗口中选择了一个MP3文件，你将看到如[图44-3](#Chapter44.html#fig_44_3)所示的窗口。


    ![Image](images/4403.jpg)


    ***图44-3.** 使用属性窗口作为ID3编辑器*


    在[第19章](#Chapter19.html#ch19)中，你将学习如何为属性提供特殊的编辑器（例如用于选择值的组合框），例如可以有一系列预定义值的流派。


    ### 媒体库


    在上一节中，你使用了NetBeans平台提供的收藏夹模块。该模块也非常适合在你的应用程序中用作*媒体库*。原因是用户可以非常简单地单独添加每个文件或整个目录到收藏夹模块。该功能不仅限于MP3文件，还可以用于管理任何文件类型。因此，例如通过添加来自空闲集群的图像模块，你还可以管理和显示JPG格式的曲目封面。由于你可以通过层文件将操作绑定到特定的MIME类型，因此你可以直接在*收藏夹*窗口中处理MP3文件。这意味着，例如，你可以通过双击直接播放文件，或使用拖放功能将文件拖到单独的窗口（例如播放列表）。请记住，收藏夹模块或窗口必须在你的NetBeans平台中激活（即可用），才能使用它。通过上下文菜单打开MP3管理器的*属性*，并确保在*平台*集群下的*库*类别中激活了*收藏夹*模块。


    现在，你还可以使用品牌模块更改收藏夹模块的名称和菜单。品牌模块由NetBeans IDE自动创建。你只需在品牌对话框中调整所需的文本，该对话框可以通过平台应用程序上下文菜单中的*品牌…*打开。你可以在*资源包*注册表中搜索要替换的文本。你想要调整窗口名称和不同的菜单项，如[图44-4](#Chapter44.html#fig_44_4)所示。


    ![Image](images/4404.jpg)


    ***图44-4.** 将收藏夹模块品牌化为媒体库*


    ### 服务


