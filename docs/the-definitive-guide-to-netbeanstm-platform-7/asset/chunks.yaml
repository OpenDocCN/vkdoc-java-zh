    the output window module, and thus the service provider, does not exist, the `getDefault()`
    method would provide a standard implementation which would write the outputs on
    the standard output. So, the output window is implemented as a global service.
    (For more information see [Chapter 5](#Chapter05.html#ch5).) Consequently, the
    output window could be easily substituted by your own window without having to
    adapt the source code. The `getIO()` method delivers an `InputOutput` object with
    which you can access the window. You can define a name which is displayed on the
    tab or in the headline. With the `boolean` parameter you determine whether a new
    tab is created or whether an already existing tab with the same name will be reused.
    With the methods `getOut()` and `getErr()` you get an object of the `OutputWriter`
    class. This class is a subclass of the Java `PrintWriter` class. Thus, you can
    output messages by `println()`, as usual. The text output by `getErr()` is displayed
    red in the output window. It is important that you close the streams again with
    the `close()` method when you finish all your output. So, the name of the tab,
    which is displayed in bold, is displayed as usual again, signaling to the user
    that the task is completed. If multiple tasks are displayed you can ensure that
    the corresponding one is active via the `InputOutput.select()` method.


