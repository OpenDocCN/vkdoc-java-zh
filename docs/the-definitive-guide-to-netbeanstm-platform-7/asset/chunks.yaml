    In [Listing 20-8](#Chapter20.html#list_20_8) you can see that first a file with
    some attributes is created in the standard folder `OptionsDialog`. Via the `instanceCreate`
    attribute, the factory method is specified which then creates the container. The
    `advancedOptionsFolder` attribute indicates the folder to which the secondary
    panels must be assigned in order to be displayed in this container. If you want
