- fmt: "### Resources\n\nAny plugin resource can be accessed by using the `FileLocator`\
    \ class in Eclipse. To simply load resources from a NetBeans module, you extend\
    \ the `Installer` class by the method `getModuleResource()` (see [Listing 39-5](#Chapter39.html#list_39_5)).\
    \ Use the module classloader that has access to all module resources. This returns\
    \ a URL which, using the `URLMapper` class, maps to the `FileObject` instance.\n\
    \n**Listing 39-5.** The `getModuleResource()` Method Helps Load Arbitrary Module\
    \ Resources.\n\n```\nimport java.net.URL;\nimport org.openide.filesystems.FileObject;\n\
    import org.openide.filesystems.URLMapper;\nimport org.openide.modules.ModuleInstall;\n\
    \npublic class Installer extends ModuleInstall {\n   ...\npublic FileObject getModuleResource(String\
    \ path) {\n      URL url = getClass().getClassLoader().getResource(path);\nFileObject\
    \ resource = URLMapper.findFileObject(url);\nreturn resource;\n   }\n}\n```\n\n\
    The `FileObject` class provides extensive methods for working with the resource.\
    \ The following example demonstrates this by loading content of the `myprops.properties`\
    \ file out of the `resources` directory of the module into the `Properties` object.\n\
    \n```\npublic final class TestAction implements ActionListener {\npublic void\
    \ actionPerformed(ActionEvent e) {\nFileObject res = Installer.getDefault().getModuleResource(\n\
    \                                \"resources/myprops.properties\");\n      Properties\
    \ props = new Properties();\n      try {\n         props.load(res.getInputStream());\n\
    \         System.out.println(\"Value:\" + props.getProperty(\"key\"));\n     \
    \ } catch(Exception ex) {}\n   }\n}\n```\n\n### Settings\n\nPlugin-specific settings,\
    \ used internally as well as by the user, are managed via a `Preferences` object\
    \ or a `IPreferenceStore` object in Eclipse RCP, which is provided by the `Activator`\
    \ class. The NetBeans Platform takes a slightly different approach. For managing\
    \ settings it contains an implementation of the Java Preferences API. Access to\
    \ a `Preferences` instance is obtained via the `NbPreferences` class. An advantage\
    \ of this implementation is that data is stored in the NetBeans Platform user\
    \ directory. A distinction is made between module-specific data and application-specific\
    \ data. The `root()` method gives access to settings saved in the `config/Preferences.properties`\
    \ file. The `forModule()` method, on the other hand, handles access to data found\
    \ in a module-specific properties file. For example, if the code name base is\
    \ `com.galileo.netbeans.module`, settings will be stored in the `config/Preferences/com/galileo/netbeans/module.properties`\
    \ file.\n\n```\n   NbPreferences.forModule(MyClass.class).put(\"key\", \"value\"\
    );\n   NbPreferences.root().put(\"key\", \"value\");\n```\n\nYou can find more\
    \ detailed information on this topic in [Chapter 20](#Chapter20.html#ch20).\n\n\
    ### Application Lifecycle\n\nThe lifecycle of Eclipse RCP applications is handled\
    \ by an `IApplication` instance. It implements the `start()` and `stop()` methods.\
    \ The first is responsible for starting the application, typically used for creating\
    \ and opening the main window. The `stop()` method handles the shutting down of\
    \ the application, where the workbench is closed and other application-specific\
    \ tasks are carried out. NetBeans Platform applications unfortunately do not have\
    \ such a comfortable lifecycle management—although, on the other hand, that considerably\
    \ simplifies development. For example, the main window opens and closes on its\
    \ own, without coding. Most aspects relating to the lifecycle of an application\
    \ are handled within individual modules and dealt with via a module installer.\
    \ Another possibility is to react to the closing of the whole application, rather\
    \ than the shutdown of individual modules; this is done via the abstract class\
    \ `LifecycleManager`. The default implementation of the `LifecycleManager` class,\
    \ provided by the NetBeans Platform, is responsible for the proper shutdown of\
    \ the application. You can insert your own implementation of this class before\
    \ the default implementation, so application-specific tasks are handled as the\
    \ application shuts down. It is important not to forget to call the default implementation\
    \ from your own implementation. What such a class can look like and how you explicitly\
    \ shut down your application with the `LifecycleManager` is described in [Chapter\
    \ 8](#Chapter08.html#ch8).\n\n### Views and Editors\n\nWhile the Eclipse workbench\
    \ displays and docks windows of two types—*views* and *editors*—the NetBeans Platform\
    \ handles these types with one window type. A window displayed within the NetBeans\
    \ window system is a *Top Component*; the implementation of a window is derived\
    \ from the `TopComponent` class. This superclass integrates itself as a window\
    \ into the NetBeans window system and makes a great deal of information available,\
    \ giving access to its current state as well as its lifecycle. Similar to how\
    \ views and editors in an Eclipse application are organized, via the relevant\
    \ extension points, top components are declaratively made available, via the layer\
    \ file, within the `Mode` folder. A mode is a container for top components. Here,\
    \ let's return to the view and editor distinction, since modes can be one of these\
    \ types. Top components are created within one of these modes (see Figure 9-5).\
    \ A mode's size, position, and type are described in an XML file. In this way\
    \ you also have the opportunity to register your own modes in the layer file with\
    \ the corresponding extension point (see [Chapter 10](#Chapter10.html#ch10) for\
    \ further information). However, top components are not required to be registered\
    \ within a mode, where they are displayed in default mode. As with the Eclipse\
    \ workbench, the user places top components in various positions while the application\
    \ is running.\n\nFor the easy creation and registration of top components, the\
    \ NetBeans IDE once again provides a very useful wizard. Choose *File ![Image](images/U001.jpg)\
    \ New File... ![Image](images/U001.jpg) Module Development ![Image](images/U001.jpg)\
    \ Window* and start using it. The wizard offers you the possibility of configuring\
    \ a top component and assigning it to a mode. Detailed information about this\
    \ and other topics relating to the design of the user interface can be found in\
    \ [Part 2](#Part02.html#p2).\n\n### Summary\n\nThis chapter assumed you were an\
    \ Eclipse user and introduced you to the NetBeans IDE as a tool, and to the NetBeans\
    \ Platform as a desktop framework. The chapter started by looking at the most\
    \ commonly used functions and windows in Eclipse and showing where they can be\
    \ used in the NetBeans IDE. You learned how to adapt the keymap to Eclipse settings.\
    \ Next, we compared Eclipse plugins to NetBeans modules and compared the terminology\
    \ of the two platforms, describing the major similarities and differences between\
    \ them.\n\n## C H A P T E R  40\n\n## IntelliJ IDEA and the NetBeans Platform\n\
    \nThe Java development environment IntelliJ IDEA of JetBrains ([`http://jetbrains.com/idea`](http://jetbrains.com/idea))\
    \ is now freely available with the community edition. It provides another alternative\
