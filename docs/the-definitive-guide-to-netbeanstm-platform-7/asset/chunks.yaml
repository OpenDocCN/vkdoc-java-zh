    NetBeans IDE 提供了一个专门的*测试结果*窗口（*窗口 ![图片](img/U001.jpg) 输出 ![图片](img/U001.jpg) 测试结果*）来清晰展示结果（参见图
    42-3）。运行测试时会自动打开该窗口。测试过程中在标准输出上产生的输出会显示在窗口右侧。您可以使用左侧工具栏设置不同的筛选器。例如，您可以仅显示存在错误的测试。此外，您还可以选择对所有测试或仅对失败的测试重复运行。


    ![图片](img/4203.jpg)


    ***图 42-3.** 测试结果概览*


    到目前为止，对于常规测试，NB JUnit 模块并不需要特殊的支持。使用 JUnit 注解使得实现特别简单明了。尽管接下来您将测试 NetBeans 平台特定的实现，但您会用到
    NB JUnit 模块的优势。不过，在使用它之前，您需要先激活它。为此，请打开 NetBeans 平台应用程序项目的*属性*窗口的上下文菜单。在 *harness*
    集群的 *Libraries* 类别中激活 *NB JUnit* 模块。然后，可以通过随后显示的 *Resolve* 按钮自动添加此模块所需的模块。之后，您可以通过模块项目的*单元测试库*节点的上下文菜单，选择*添加单元测试依赖项*来添加
    *NB JUnit* 模块。从上下文菜单中调用新添加的模块 *Edit*，并激活*递归包含依赖项*选项，以便在测试时获取这些模块提供的依赖项（参见图 42-4）。


    ![图片](img/4204.jpg)


    ***图 42-4.** 必须递归包含 NB JUnit 模块的依赖项。*


    #### 在 NetBeans 运行时容器环境中进行测试


    NB JUnit 模块使您能够在 NetBeans 运行时容器环境中运行测试。在测试期间，也会提供诸如全局 Lookup 等功能，但这要求您为整个 NetBeans
    平台应用程序项目运行测试（*全部测试*）。


    为此，请使用 `NbModuleSuite` 类。您可以创建一个包装测试，并通过静态方法 `suite()` 基于 `NbModuleSuite.Configuration`
    对象来交付它。


    您在清单 42-5 中看到，测试类派生自 `NbTestCase` 类。这是为了能够将其添加到 `Configuration` 对象中所必需的。您不再需要那些不再被考虑的注解。相反，所有测试都必须以
    `test` 为前缀。


    ***清单 42-5.** 在 NetBeans 运行时容器环境中运行测试。*


    `import junit.framework.Test;`

    `import org.netbeans.junit.NbTestCase;`

    `import org.netbeans.junit.NbModuleSuite;`


    `public class MathTest extends NbTestCase {`


    `   public MathTest() {`

    `      super("MathTest");`

    `   }`


    `   public static Test suite() {`

    `      NbModuleSuite.Configuration config = NbModuleSuite.createConfiguration(MathTest.class);`

    `      return NbModuleSuite.create(config);`

    `   }`


    `   public void testAdd() {`

    `      ...`

    `   }`

    `}`


    请注意，如果您有其他包含注解但未添加到包装测试对象中 `suite()` 方法的测试类，这些测试也会被执行，但它们实际上无法成功运行，因为它们会被 NetBeans
    运行时容器关闭所取消。因此，建议将所有要运行的测试都添加到包装器中，以确保所有测试都在相同的环境中运行。您可以使用 `@Ignore` 注解轻松标记那些不会运行的测试。


    您可以通过 `Configuration` 对象的 `addTest()` 方法添加任意数量的测试类或仅添加单个测试。此外，您还可以定义哪些模块（`enableModules()`）或哪些集群（`clusters()`）将处于活动状态。不过，*platform*
    集群默认是激活的。通常，对于模块测试来说，在运行测试时避免启动用户界面（这只会浪费时间）是有意义的，可以通过 `gui(false)` 实现。调用这些方法时，请确保在先前方法的返回值上调用下一个方法，因为
    `NbModuleSuite.Configuration` 类的方法每次都会返回一个包含相应更改值的实例副本。因此，调用方式如下所示：


    `NbModuleSuite.Configuration config = NbModuleSuite`

    `   .createConfiguration(CalculatorTest.class)`

    `   .addTest(MathTest.class)`

    `   .enableModules(".*")`

    `   .clusters(".*");`

