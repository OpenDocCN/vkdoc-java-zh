- fmt: "# Drop-down Menu in Toolbar\n\nThe NetBeans Platform provides a special factory\
    \ class for creating a drop-down button with popup menu (see [Figure 9-3](#Chapter09.html#fig_9_3)).\
    \ You can integrate such a button into the toolbar the same way as the combo box\
    \ that was previously shown. So first, you create an action class and add a toolbar\
    \ to it. It must inherit from the class `AbstractAction` to be able to implement\
    \ the `Toolbar.Presenter` interface. In the `getToolbarPresenter()` method, you\
    \ then produce a popup menu which you fill with the actions of the layer file.\
    \ Then you produce the corresponding button by the method `DropDownButtonFactory.createDropDownButton()`\
    \ and return it, as shown in [Listing 9-18](#Chapter09.html#list_9_18).\n\n***Listing\
    \ 9-18.** Creating a Drop-down Button*\n\n```\n@ActionID(\n    category = \"File\"\
    ,\n    id = \"com.galileo.netbeans.module.MyDropDownButton\")\n@ActionRegistration(\n\
    \    iconBase = \"com/galileo/netbeans/module/icon.png\",\n    displayName = \"\
    #CTL_MyDropDownButton\")\n@ActionReferences({\n    @ActionReference(path = \"\
    Toolbars/File\", position = 300)\n})\npublic final class MyDropDownButton extends\
    \ AbstractAction implements Presenter.Toolbar {\n    final String EXTENSION_POINT\
    \ = \"MyDropDownActions\";\n    JPopupMenu popup = new JPopupMenu();\n\n    @Override\n\
    \    public void actionPerformed(ActionEvent e) { }\n\n    @Override\n    public\
    \ Component getToolbarPresenter() {\n        for (Action a: Utilities.actionsForPath(EXTENSION_POINT))\n\
    \            popup.add(a);\n        return DropDownButtonFactory.createDropDownButton(\n\
    \                ImageUtilities.loadImageIcon(\"com/galileo/netbeans/module/icon.png\"\
    , false),\n                popup);\n    }\n}\n```\n\nIf you look at the source\
    \ code in [Listing 9-17](#Chapter09.html#list_9_17) you see that only a few lines\
    \ are necessary to create a flexible extendable drop-down button with popup menu.\
