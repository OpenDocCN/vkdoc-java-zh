- fmt: "### Explorer API\n\nWith the Explorer API you can visually display and manage\
    \ your nodes in different variants. For this purpose, the API provides a set of\
    \ explorer views with which you can display your nodes in typical structures.\
    \ The class hierarchy of these views is shown in [Figure 12-5](#Chapter12.html#fig_12_5).\
    \ For example, the class `ChoiceView` presents its nodes in a combo box, while\
    \ the `MenuView` presents it in a menu structure of any depth. The most commonly\
    \ used view—and probably the most popular one—is the `BeanTreeView` which presents\
    \ its nodes in a tree structure. Besides representing nodes and processing actions\
    \ (such as cutting out, inserting, deleting, or dragging and dropping nodes),\
    \ those views are responsible for displaying the context menu of a node. The view\
    \ gets the actions of a node via the `getActions()` method of a node.\n\n![Image](images/1205.jpg)\n\
    \n**Figure 12-5.** Class hierarchy of the different explorer views\n\nManaging\
    \ an explorer view is always done by the `ExplorerManager` class. An instance\
    \ of this manager must be provided by the component that contains the explorer\
    \ view. In most cases, this is its top component.\n\nThe remarkable thing about\
    \ this is that the manager does not have to be connected to the view, since, the\
    \ view automatically searches for a manager in the component hierarchy, which\
    \ is to say, in the parent components. The parent component must implement the\
    \ interface `ExplorerManager.Provider`, so this manager can be found. This interface\
    \ specifies the `getExplorerManager()` method, by which the view determines the\
    \ manager. In the course of this, multiple different views can use the same manager.\n\
    \nOne of the main tasks of the explorer manager is to monitor the selection of\
    \ nodes in a view. The manager always provides the selected node and its Lookup.\
    \ You proceed as follows, so the current context can be accessed by another top\
    \ component or even by another module from outside (from an action class). With\
    \ the helper class `ExplorerUtils` you can create a Lookup that always represents\
    \ the selected node (or several nodes, delivered by the explorer manager) via\
    \ the method `createLookup()`. Using the `associateLookup()` method you define\
    \ the Lookup (that was created this way) as local Lookup of your top component.\
    \ Thus, the Lookup can be accessed from outside via the global proxy Lookup (which\
    \ you get when calling `Utilities.actionsGlobalContext()`).\n\nIn the previous\
    \ section, you created the necessary node classes and child factory classes for\
    \ the explorer example. What is still missing at this point is a window with an\
    \ explorer view that can display the nodes. By means of this still missing step,\
    \ I will explain the usage of a view and the manager. First, you create the top\
    \ component `ExplorerTopComponent` by the window wizard of the NetBeans IDE. Then\
    \ you provide it with an explorer manager. For this purpose, you have to implement\
    \ the interface `ExplorerManager.Provider` and apply an instance of the `ExplorerManager`\
    \ as private data element. With the `getExplorerManager()` method you return this\
    \ manager. In the next step, you add a `BeanTreeView` to the top component; this\
    \ is most easily done by dragging a scroll pane on the window by the Form Editor\
    \ and entering `new BeanTreeView()` in the properties in the category *Code* at\
    \ *Custom Creation Code*. Then, your `initComponents()` method should look like\
    \ the example. As already mentioned, the view finds the explorer manager itself,\
    \ so you do not have to make further steps to connect the view and the manager.\
    \ Every view, respectively every manager, is based on a root element from which\
    \ all the other nodes originate. You set this root element with `setRootContext()`\
    \ in the `initTree()` method. You also pass an instance of the node class `ExplorerFolderNode`\
    \ to the just-named method. From this node, the creation of all other nodes is\
    \ initiated. Of course, you only create this node if the folder `Explorer` exists\
    \ in the System Filesystem (meaning, if any module added the entry to the folder\
    \ `Explorer` in its layer file). See [Listing 12-6](#Chapter12.html#list_12_6).\n\
    \n**Listing 12-6.** Explorer Window Which Displays the Nodes by a BeanTreeView.\
    \ The Nodes Are Managed by an Explorer Manager.\n\n```\npublic final class ExplorerTopComponent\
    \ extends TopComponent\nimplements ExplorerManager.Provider {\n\n    private static\
    \ final String ROOT_NODE = \"Explorer\";\n    private final ExplorerManager manager\
    \ = new ExplorerManager();\n\n    public ExplorerTopComponent() {\n        initComponents();\n\
    \        initTree();\n        initActions();\n        associateLookup(ExplorerUtils.createLookup(manager,\
    \ getActionMap()));\n    }\n\n    private JScrollPane jScrollPane1;\n\n    private\
    \ void initComponents() {\n        jScrollPane1 = new BeanTreeView();\n      \
    \  setLayout(new BorderLayout());\n        add(jScrollPane1, BorderLayout.CENTER);\n\
    \        ...\n    }\n\n    private void initTree() {\n        FileObject root\
    \ = FileUtil.getConfigFile(ROOT_NODE);\n        if(root != null) { /* folder found\
    \ */\n            manager.setRootContext(\n            new ExplorerFolderNode(root,\
    \ Children.create(\n            new ExplorerFolderFactory(root), false)));\n \
    \       }\n    }\n\n    private void initActions() {\n        CutAction cut =\
    \ SystemAction.get(CutAction.class);\n        getActionMap().put(cut.getActionMapKey(),\
    \ ExplorerUtils.actionCut(manager));\n        CopyAction copy = SystemAction.get(CopyAction.class);\n\
    \        getActionMap().put(copy.getActionMapKey(), ExplorerUtils.actionCopy(manager));\n\
    \        PasteAction paste = SystemAction.get(PasteAction.class);\n        getActionMap().put(paste.getActionMapKey(),\
    \ ExplorerUtils.actionPaste(manager));\n        DeleteAction delete = SystemAction.get(DeleteAction.class);\n\
    \        getActionMap().put(delete.getActionMapKey(), ExplorerUtils.actionDelete(manager,\
    \ true));\n    }\n\n    public ExplorerManager getExplorerManager() {\n      \
    \  return manager;\n    }\n\n    protected void componentActivated() {\n     \
    \   ExplorerUtils.activateActions(manager, true);\n    }\n\n    protected void\
    \ componentDeactivated() {\n        ExplorerUtils.activateActions(manager, false);\n\
    \    }\n}\n```\n\nAs a next step, you connect the standard actions (cut, copy,\
    \ paste, and delete) provided by the Platform with the actions of the explorer\
    \ manager in the `initActions()` method. The actions of the explorer manager are\
    \ provided by the `ExplorerUtils` class which you register by the action map key\
    \ in the action map of your top component. You create a proxy Lookup (which provides\
    \ the respectively selected node with its Lookup) by means of the `ExplorerUtils.createLookup`\
    \ method, so the respectively selected nodes of a view can be accessed via the\
    \ Lookup of the top component. You define this proxy Lookup as local Lookup of\
    \ your top component via the `associateLookup()` method. The action map also has\
    \ to be located in the Lookup of the top component, so the previously registered\
    \ actions (registered in the action map) are actually active. Practically, you\
    \ can directly pass the action map to the `createLookup()` method, which makes\
    \ the action map available via the proxy Lookup.\n\nTo save resources, you can\
    \ switch on or switch off the listener of the explorer manager actions (which\
    \ you previously connected to the system actions) in the methods `componentActivated()`\
    \ and `componentDeactivated()`, which are called when activating and deactivating\
    \ your windows. This way, they are not notified of events in the clipboard, for\
    \ example, if the window is not even active.\n\nAt this point, I should mention\
    \ the many interesting examples and tutorials available on the NetBeans website\
    \ at `http://netbeans.org/kb/trails/platform.html`. The tutorials are easy to\
    \ understand and the examples concerning the Nodes, Explorer, and Property Sheet\
    \ API are particularly useful."
