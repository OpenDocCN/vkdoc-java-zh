    \ method of the `DataNode` superclass, which already creates a `Sheet` and adds\
    \ some basic properties to it, such as file name, size, or the date of modification.\
    \ If you do not want this data displayed, you can also directly create your own\
    \ sheet using `Sheet.createDefault()`. Inside a `Sheet` object, properties are\
