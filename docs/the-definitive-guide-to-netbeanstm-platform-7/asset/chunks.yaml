    ### 管理设置


    NetBeans Platform 应用程序中的设置和配置数据最好通过 Java Preferences API 进行保存和加载。Java 平台通过 `Preferences`
    类指定了一个接口。使用此接口，可以独立于其物理位置保存和加载设置和配置数据。可以提供不同的实现，以便将数据保存在文件、系统注册表甚至数据库中。数据以键值对的形式按层次结构保存。`Preferences`
    类的一个实例代表此层次结构中的一个节点。你可以将节点想象成文件系统中的一个目录，数据可以保存在其下。


    通过 `NbPreferences` 类，Utilities API 为 NetBeans Platform 提供了 Java Preferences 规范的一个实现。此实现确保设置存储在应用程序的中央配置目录中，该目录位于用户目录中。设置以普通的
    *.properties* 文件形式存储。因此，你通过 Preferences 保存的设置，就像 NetBeans Platform 应用程序中的所有其他设置一样，是按用户管理的。`NbPreferences`
    类提供了两个静态方法。使用 `forModule()` 方法，会返回一个 `Preferences` 节点，其数据为每个模块保存在 *config/Preferences*
    目录下的一个单独的 *.properties* 文件中（参见图 20-3）。使用 `root()` 方法，会返回一个应用程序全局的 `Preferences`
    节点，该节点在 *config/Preferences.properties* 文件中管理其数据。


    ![Image](img/2003.jpg)


    ***图 20-3.** 使用 NetBeans Preferences 实现，设置可以按模块保存在 Preferences 目录中，也可以按应用程序全局保存在
    Preferences.properties 文件中*


    然后，你可以使用 `Preferences` 类指定的方法轻松保存和读取设置。例如，如果你想保存服务器的名称和端口，我们使用清单 20-9 中所示的调用。


    ***清单 20-9.** 通过 Preferences API 保存和加载设置*


    `Preferences node =` **`NbPreferences.forModule(this.getClass());`**

    `String name = node.`**`get`**`("server.name", "localhost");`

    `int    port = node.`**`getInt`**`("server.port", 8080);`

    `node.`**`put`**`("server.name", name);`

    `node.`**`putInt`**`("server.port", port);`


    除了此处显示的用于访问数据的方法外，还有更多方法可用，例如，你也可以轻松保存数组或布尔值。此外，通过 *Java* *Preferences* *API*，你可以在一个
    `Preferences` 实例（即一个节点）上注册 `NodeChangeListener` 和 `PropertyChangeListener`，以便对子节点的添加和删除以及数据的变化做出反应。


    ### 总结


    通过 Options Dialog API 和 SPI，NetBeans Platform 提供了一个预制的选项对话框。在此选项对话框中，你可以快速轻松地集成你自己的（私有）面板。你已经学习了如何由用户集中且统一地管理设置。你还学习了
    NetBeans Preferences API 如何简化保存设置的过程。


    ## 第 21 章


    ## 面板


    窗体编辑器是使用面板模块的一个非常好的例子。窗体编辑器将其 AWT 和 Swing 组件放置在面板上（参见图 21-1）。然后可以通过拖放移动这些组件。你也可以在运行时向面板添加组件。面板窗口的内容由
    `PaletteController` 管理和提供。这样的 `PaletteController` 可以通过 Lookup 由顶层组件提供。这意味着，一旦某个
    Lookup 中包含 `PaletteController` 实例的顶层组件变为活动状态，面板窗口就会打开并显示其内容。`PaletteController`
    是通过 `PaletteFactory` 类创建的。有两种方式提供组件。你可以通过层文件中的 XML 文件注册将在面板上显示的组件，或者你可以使用两级或三级节点层次结构。我们将在此处探讨这两种方法。


    请注意，你不仅限于为自己的顶层组件提供面板，还可以在层文件中为特定文件类型注册一个面板，该面板仅在 NetBeans 编辑器中打开此类文件时显示。如果你想扩展
    NetBeans IDE 的功能，这尤其有用。此主题将在第 22 章 中探讨。


    ![Image](img/2101.jpg)


    ***图 21-1.** NetBeans GUI 编辑器的面板*

