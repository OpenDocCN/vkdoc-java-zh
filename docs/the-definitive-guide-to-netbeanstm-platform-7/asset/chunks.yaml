    ### Context Aware Actions


    Actions of this type work in a particular context—a file, for example. The special
    thing about this type of action is that such actions are only active when the
    referring context in the application is active, too. In the example, the file
    is opened in the application. The context is automatically transferred to the
    action by the NetBeans Platform, so the action can execute the referring action
    on the context, such as edit a file, for example. Typically, connecting the context
    and the action by a so-called *Context Interface* (also called a *Cookie*), which
    is implemented by the context.


    We want to use a node class as context in the following example. A node is the
    representation of certain data. In practice, a node can be a file which is depicted
    in a tree structure or which is opened in an editor, for example. You will learn
    more about this concept, which is frequently used within the NetBeans Platform,
    in [Chapters 7](#Chapter07.html#ch7) and [12](#Chapter12.html#ch12).


    To create a context aware action you can use the action wizard again (*File* ![Image](images/U001.jpg)
    *New File*… ![Image](images/U001.jpg) *Module Development* ![Image](images/U001.jpg)
    *Action*). However in this case you should choose the type *Conditionally Enabled*.
    Specify the context interface then and choose whether the action should be even
    active when multiple instances of the context interface exist. We use the context
    interface `Editable` in this example and specify that the action will only work
    on one context instance. On the following page of the wizard you can then integrate
    the action into the menubar and the toolbar (see the “Always Enabled Action” section).
    After completing the wizard, your action class should about look like [Listing
    6-7](#Chapter06.html#list_6_7).


