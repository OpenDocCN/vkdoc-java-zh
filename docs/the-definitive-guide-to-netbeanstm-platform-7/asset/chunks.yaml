  raw: '#### Configuration, Access, and Shutdown


    You want to configure the Java DB database system, centrally manage access to
    it, and, when the time comes, shut down the system again by a module installer.
    First, you set the path in which the database will be stored in the `restored()`
    method, which is called when starting the application, or the module with the
    feature `derby.system.home` (see [Listing 26-2](#Chapter26.html#list_26_2)). The
    database will be created in the subdirectory *databases* in the user-specific
    user directory. In addition, you call the method `initTables()` in which you first
    want to check by means of a `SELECT` query whether the needed tables were already
    created. If the application is started the first time (the tables do not exist
    yet), this triggers an `SQLException` which we catch and then create the two tables
    `albums` and `genres`.


    Create the table `genres` first, because the table `albums` will depend on it.
    Each entry in the table will get a unique ID which will be assigned by the database
    in ascending order. You achieve this by assigning `GENERATED` `ALWAYS` `AS` `IDENTITY`
    for the column `id`. So even if you define a value for the column `id,` adding
    an entry to the table, the automatically-created value is used. Alternatively,
    you can use `BY` `DEFAULT` instead of `ALWAYS`; then only a value is created when
    you do not explicitly assign an ID. With `PRIMARY` `KEY` you finally define the
    column `id` as the primary key through which the connection to the entries in
    the `albums` table will be established. You create this directly afterward and
    define the key column `id` in the same way. Additional columns are `title`, `tracks`,
    `cds`, `years`, and `genre`. However, you do not directly write in the genre in
    the column genre, but the ID of a genre entry out of the table `genre`. So, the
    column `genre` in `albums` is a foreign key. You define it by `FOREIGN` `KEY`
    `(genre)` and define the relation to the column `id` in `genres` by `REFERENCES`
    `genres` `(id)`. Add three example entries in the table `genres`, so that when
    creating an album a genre can be chosen.


    ***Listing 26-2.** Installing the Database System and the Database at the Start*


    `import java.sql.Statement;`

    `import java.sql.Connection;`

    `import java.sql.DriverManager;`

    `import java.sql.SQLException;`

    `import org.openide.modules.ModuleInstall;`

    `import org.openide.util.Exceptions;`


    `public class` **`Installer`** `extends ModuleInstall {`

    `private static` **`Connection`** `conn = null;`

    `@Override    public void` **`restored`**`() {`

    `      System.setProperty("`**`derby.system.home`**`",`

    `         System.getProperty("netbeans.user",`

    `         System.getProperty("user.home")) + "/databases");`

    `      initTables();`

    `   }`

    `private void` **`initTables`**`() {`

    `      try {`

    `         Statement stmt = getConnection().createStatement();`

    `         stmt.`**`executeQuery`**`("SELECT id FROM genres");`

    `         stmt.close();`

    `      } catch(SQLException e) {`

    `         try {`

    `            Statement stmt = getConnection().createStatement();`

    `            stmt.execute("`**`CREATE TABLE`** `genres (" +`

    `"id` **`INTEGER GENERATED ALWAYS AS IDENTITY`**`, " +`

    `"genre` **`VARCHAR`**`(100), " +`

    `               "`**`PRIMARY KEY`**`(id))");`

    `            stmt.execute("`**`CREATE TABLE`** `albums (" +`

    `"id` **`INTEGER GENERATED ALWAYS AS IDENTITY`**`, " +`

    `               "title`**`  VARCHAR`**`(100), " +`

    `"tracks` **`VARCHAR`**`(10), " +`

    `               "cds  `**`  VARCHAR`**`(10), " +`

    `               "years`**`  VARCHAR`**`(10), " +`

    **`"genre`**`  INTEGER, " +`

    `               "`**`PRIMARY KEY`**`(id), " +`

    `               "`**`FOREIGN KEY`**`(genre)` **`REFERENCES`** `genres (id))");`

    `            stmt.execute("`**`INSERT INTO`** `genres (genre) " +`

    `               "`**`VALUES`**`(''Techno, Trance & Dance'')");`

    `            stmt.execute("`**`INSERT INTO`** `genres (genre) " +`

    `               "`**`VALUES`**`(''Rock & Pop'')");`

    `            stmt.execute("`**`INSERT INTO`** `genres (genre) " +`

    `               "`**`VALUES`**`(''Country & Classic'')");`

    `            stmt.close();`

    `         } catch(SQLException ex) {`

    `            Exceptions.printStackTrace(ex);`

    `         }`

    `      }`

    `   }`


    You provide central access to the database with the static method `getConnection()`.
    This way, the users in particular do not have to worry about the connection URL.
    Furthermore, the `Connection` object (which is to say, the connection to the database)
    is held centrally and does not have to be established anew and finished each time.
    The method `getConnection()` is also a factory method, which establishes a connection
    if there is not one yet, or brings the `Connection` object back, if it has been
    established. You are informed about the application finishing by the method `close()`.
    This is where you eventually add the still-established connection to the database
    and then you shut down the complete Java DB system, (and automatically your database
    `MyDB`, too) by `jdbc:derby:;shutdown=true`. (See [Listing 26-3](#Chapter26.html#list_26_3).)


    ***Listing 26-3.** Centrally Providing the Connection and Shutting Down the Database*


    `public static Connection` **`getConnection`**`() throws SQLException {`

    `      if(conn == null || conn.isClosed()) {`

    `         conn = DriverManager.`**`getConnection`**`(`

    `            "`**`jdbc:derby:MyDB;create=true`**`", "user", "password");`

    `      }`

    `      return conn;`

    `   }`

    `   @Override`

    `public void` **`close`**`() {`

    `      try {`

    `        conn.`**`close`**`();`

    `        DriverManager.getConnection("jdbc:derby:;`**`shutdown=true`**`");`

    `      } catch (SQLException ex) {}`

    `   }`

    `}`'
