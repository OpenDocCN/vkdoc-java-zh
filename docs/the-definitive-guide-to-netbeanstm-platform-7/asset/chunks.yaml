    Now you have to make these mappings, which typically end with *hbm.xml* and which
    are in the same package as the classes, known in Hibernate. This is done by an
    entry in the configuration file *hibernate.cfg.xml* in which you already did the
    database settings. You list all files by the element `mapping`. Furthermore, you
    define the feature `hbm2ddl` with the value `update`. So, if it is not there yet,
    Hibernate automatically creates the database schema for us out of the information
    of the mapping files when the application starts, as shown in [Listing 27-5](#Chapter27.html#list_27_5).


    ***Listing 27-5.** Making the Mapping Files Public in the Configuration File*


    `<hibernate-configuration>`

    `   <session-factory>`

    `      ...`

    `      <property name="`**`hbm2ddl.auto`**`">`**`update`**`</property>`

    `      <`**`mapping`** `resource="com/galileo/netbeans/myentities/`**`Genre.hbm.xml`**`"/>`

    `      <`**`mapping`** `resource="com/galileo/netbeans/myentities/`**`Album.hbm.xml`**`"/>`

    `   </session-factory>`

    `</hibernate-configuration>`


    #### SessionFactory and Sessions


    Now the configuration work is completed and you can get in touch with Hibernate
    for the first time. To do this, first create an object of the class `Configuration`
    which manages the configuration you created before in the file *hibernate.cfg.xml*.
    This class wants to get its information from the *hibernate.properties* file by
    default. However, you organized your information in an XML document, which is
    why you induce the `Configuration` instance to search for this file with the `configure()`
    method. This method is also available in some parameterized variants, which you
    can transfer a `File` or a `URL` in the configuration file to. We use the parameter-less
    version which directly expects the configuration with the name *hibernate.cfg.xml*
    on the class path. Usually, such a `Configuration` is only created once. Based
    on this configuration we create a `SessionFactory` with the method `buildSessionFactory()`.
    A `SessionFactory` is also held throughout the duration of the complete runtime
    of the application.


    In other words, you manage the `Configuration` and the `SessionFactory` instance
    in your module at a central place. A module installer class would be good for
    that purpose; you would create a static instance of a `SessionFactory there (see`
    [`Listing 27-6`](#Chapter27.html#list_27_6)`)`.


    ***Listing 27-6.** Central Management and Providing the SessionFactory*


    `import org.hibernate.`**`Session`**`;`

    `import org.hibernate.`**`SessionFactory`**`;`

    `import org.hibernate.cfg.`**`Configuration`**`;`

    `import org.openide.modules.ModuleInstall;`


    `public class` **`Installer`** `extends ModuleInstall {`

    `private static final` **`SessionFactory`** `sessionFactory;`

    `   static {`

    `      try {`

    `sessionFactory = new` **`Configuration`**`().`**`configure`**`().`**`buildSessionFactory`**`();`

    `      } catch (Throwable ex) {`

    `         throw new ExceptionInInitializerError(ex);`

    `      }`

    `   }`

    `public static Session` **`createSession`**`() {`

    `      return sessionFactory.`**`openSession`**`();`

    `   }`

    `public static Session` **`currentSession`**`() {`

    `      return sessionFactory.`**`getCurrentSession`**`();`

    `   }`

    `   @Override`

    `public void` **`close`**`() {`

    `      sessionFactory.`**`close`**`();`

    `   }`

    `}`


    The database is accessed through sessions. A `Session` is a relative short-lived
    object which is responsible for the interaction between application and database.
    So there is a JDBC connection hidden behind a `Session`. A session is thus also
    responsible for the creation of a transaction and contains a cache. You create
    each a new `Session` with the method `openSession()`. An even more current session
    is delivered with the method `getCurrentSession()`. If there is none, a new one
    is created and bound to the current thread. If a transaction is finished (by `commit()`
    or `rollback()`), which was created by this `Session,` it is automatically closed.
    This way of using sessions is the easiest and the most comfortable and is therefore
    preferred.'
