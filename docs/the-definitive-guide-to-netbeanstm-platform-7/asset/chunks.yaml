  trans: "\n##### 服务接口与服务实现\n\n以下属性用于定义特定的服务提供者接口及其实现。关于此主题的更多信息，请参阅第 5 章。\n\n*  \
    \ *`OpenIDE-Module-Provides`*：使用此属性声明一个服务接口，该模块为此接口提供服务提供者。\n    **`OpenIDE-Module-Provides`**`:\
    \ com.galileo.netbeans.spi.ServiceInterface`\n*   *`OpenIDE-Module-Requires`*：在此处可以声明一个服务接口，该模块需要该接口的服务提供者。由哪个模块提供接口的实现并不重要。\n\
    \    **`OpenIDE-Module-Requires`**`: org.openide.windows.IOProvider`\n*   *`OpenIDE-Module-Needs`*：此属性是\
    \ require 属性的低调版本，不需要模块具有任何特定的顺序。这对于需要特定实现的 API 模块可能很有用。\n    **`OpenIDE-Module-Needs`**`:\
    \ org.openide.windows.IOProvider`\n*   *`OpenIDE-Module-Recommends`*：使用此属性，可以实现一个可选依赖项。例如，如果有一个模块提供了\
    \ `java.sql.Driver` 实现，则该模块会被激活并授予访问权限。然而，如果没有可用的此令牌提供者，则由可选依赖项定义的模块仍然可以执行。\n\
    \    **`OpenIDE-Module-Recommends`**`: java.sql.Driver`\n*   *`OpenIDE-Module-Requires-Message`*：与前两个属性类似，可以使用此属性定义一个消息。如果未找到所需的令牌，则会显示此消息。\n\
    \    **`OpenIDE-Module-Requires-Message`**`:`\n    `   所需的服务提供者不可用。有关更多信息，请访问以下网站。`\n\
    \n**操作系统相关模块**\n\n清单属性 `OpenIDE-Module-Requires` 允许您定义倾向于在特定操作系统上使用的模块。此属性用于检查特定令牌是否存在。可用的令牌如下：\n\
    \n`org.openide.modules.os.Windows`\n`org.openide.modules.os.Linux`\n`org.openide.modules.os.Unix`\n\
    `org.openide.modules.os.PlainUnix`\n`org.openide.modules.os.MacOSX`\n`org.openide.modules.os.OS2`\n\
    `org.openide.modules.os.Solaris`\n\n模块系统确保这些令牌仅在相应的操作系统上可用。例如，一个在 Windows 系统上由模块系统自动激活的模块，会在所有其他系统上自动停用。要提供一个在\
    \ Windows 系统上自动加载但在其他操作系统上自动停用的模块，请将模块类型设置为 `eager`，并将以下条目添加到清单文件中：\n\n**`OpenIDE-Module-Requires`**`:\
    \ org.openide.modules.os.Windows`\n\n##### 可见性\n\n通过以下属性，可以控制模块在插件管理器中的可见性。这样，可以隐藏那些对应用程序最终用户不重要的模块。\n\
    \n*   *`AutoUpdate-Show-In-Client`*：此属性决定模块是否在插件管理器中显示。可以设置为 `true` 或 `false`。\n\
    \    **`AutoUpdate-Show-In-Client`**`: true`\n*   *`AutoUpdate-Essential-Module`*：使用此属性，您可以标记属于应用程序一部分的模块。被这样标记的模块，用户无法在插件管理器中停用或卸载。可以设置为\
    \ `true` 或 `false`。\n    **`AutoUpdate-Show-In-Client`**`: true`\n\n结合这两个属性，NetBeans\
    \ 平台引入了所谓的*套件*模块。每个可见模块（`AutoUpdate-Show-In-Client: true`）在插件管理器中都被视为一个套件模块。套件模块定义依赖关系的所有模块都以相同方式处理，除非这些模块也属于其他套件模块且被设为不可见。这意味着，如果一个套件模块被停用，所有依赖它的模块也将被停用。\n\
    \n通过这种方式，您可以为多个逻辑相关的模块构建包装模块。然后，您可以将它们作为一个整体展示给最终用户。您可以创建一个空模块，在其中将 `AutoUpdate-Show-In-Client`\
    \ 属性设置为 `true`，同时定义对所有属于此套件模块的模块的依赖关系。然后，在依赖模块中将 `AutoUpdate-Show-In-Client` 属性设置为\
    \ `false`，这样它们就不会被单独显示。\n\n#### 示例\n\n清单 3-2 展示了一个包含一些典型属性的清单文件。\n\n***清单 3-2.**\
    \ 清单文件示例*\n\n**`OpenIDE-Module:`** `com.galileo.netbeans.module`\n**`OpenIDE-Module-Public-Packages:`**`-`\n\
    **`OpenIDE-Module-Module-Dependencies:`**\n`   com.galileo.netbeans.module2 >\
    \ 1.0,`\n`   org.jdesktop.layout/1 > 1.4,`\n`   org.netbeans.core/2 = 200610171010,`\n\
    `   org.openide.actions > 6.5.1,`\n`   org.openide.awt > 6.9.0,`\n**`OpenIDE-Module-Java-Dependencies:`**\
    \ `Java > 1.6`\n**`OpenIDE-Module-Implementation-Version:`** `200701100122`\n\
    **`OpenIDE-Module-Specification-Version:`** `1.3`\n**`OpenIDE-Module-Install:`**\
    \ `com/galileo/netbeans/module/Install.class`\n**`OpenIDE-Module-Layer:`** `com/galileo/netbeans/module/layer.xml`\n\
    **`OpenIDE-Module-Localizing-Bundle:`** `com/galileo/netbeans/module/Bundle.properties`\n\
    **`OpenIDE-Module-Requires:`**\n`   org.openide.windows.IOProvider,`\n`   org.openide.modules.ModuleFormat1`\n"
- fmt: "### Layer File\n\nIn addition to the manifest file of a module with which\
    \ mainly the interfaces and the environment of a module are described, there is\
    \ also a *Layer* file. This is the central configuration file, in which virtually\
    \ everything is defined what a module adds to the Platform. So, the layer file\
    \ is the interface between the module and the NetBeans Platform, declaratively\
    \ describing the integration of a module into the Platform. Firstly, the attribute\
    \ `OpenIDE-Module-Layer` makes public if a layer file exists in the manifest file.\
    \ During that process the path of the file is defined, usually using `layer.xml`\
    \ as the file name.\n\n`OpenIDE-Module-Layer:` `com/galileo/netbeans/module/layer.xml`\n\
    \nThis file format is a hierarchical file system containing folders, files, and\
    \ attributes. Starting the application, all existing layer files are summarized\
    \ to one virtual file system. This is the so-called *System Filesystem* which\
    \ is the runtime configuration of the NetBeans Platform.\n\n![Image](images/0302.jpg)\n\
    \n***Figure 3-2.** System Filesystem*\n\nThis layer file contains certain default\
    \ folders. They are defined by different modules which are extension points. So,\
    \ there is the default folder `Menu`, for example, which looks like [Listing 3-3](#Chapter03.html#list_3_3).\n\
    \n***Listing 3-3.** Default Folder of the Layer File*\n\n```\n<folder name=\"\
    Menu\">\n   <folder name=\"Edit\">\n      <file name=\"MyAction.shadow\">\n  \
    \       <attr name=\"originalFile\"\n               stringvalue=\"Actions/Edit/com-galileo-netbeans-module-MyAction.instance\"\
    />\n      </file>\n   </folder>\n</folder>\n```\n\nIn this example, the action\
    \ class `MyAction` is added to the Edit menu. Do not worry about the exact syntax\
    \ at this point; it is explained in the context of respective standard folders\
    \ in later chapters. First of all, we elaborate this basic structure of the layer\
    \ file. In addition, the NetBeans Platform provides practical features for working\
    \ with the layer file, as shown in subsequent chapters, when our first module\
    \ will be created. You can also find an index with the most important extension\
    \ points in this book's appendix.\n\nEvery module is able to add new menu items\
    \ or create new toolbars. Since each layer file of a module is merged to the System\
    \ Filesystem, the entire menu bar content is assembled. The window system, which\
    \ is responsible for generating the menu bar, now has to read the `Menu` folder\
    \ in order to gain the content of the entire menu bar.\n\nThis System Filesystem\
    \ also contributes significantly to the fact that modules can be added or removed\
    \ at runtime. Listeners can be registered on this System Filesystem. This is done\
    \ by the window system, too, for example. If any changes occur because of an added\
    \ module, the window system or the menu bar itself can update its content.\n\n\
    #### Order of Folders and Files\n\nThe order in which the entries are read out\
    \ of the layer file (and the order they are displayed in the menu bar), can be\
    \ determined by a position attribute as shown in [Listing 3-4](#Chapter03.html#list_3_4).\n\
    \n***Listing 3-4.** Defining the Order of Entries in the Layer File*\n\n```\n\
    <filesystem>\n  <folder name=\"Menu\">\n    <folder name=\"Edit\">\n      <file\
    \ name=\"CopyAction.shadow\">\n        <attr name=\"originalFile\"\n         \
    \     stringvalue=\"Actions/Edit/org-openide-actions-CopyAction.instance\"/>\n\
    \        <attr name=\"position\" intvalue=\"10\"/>\n      </file>\n      <file\
    \ name=\"CutAction.shadow\">\n        <attr name=\"originalFile\"\n          \
    \    stringvalue=\"Actions/Edit/org-openide-actions-CutAction.instance\"/>\n \
    \       <attr name=\"position\" intvalue=\"20\"/>\n      </file>\n    </folder>\n\
    \  </folder>\n</filesystem>\n```\n\nThus, the copy action would be shown before\
    \ the cut action. If necessary, you can also use this attribute to define the\
    \ order of the `folder` elements. In practice, positions are chosen with greater\
    \ distance. This simplifies the subsequent insertion of additional entries. Should\
    \ the same position be assigned twice, a warning message is logged while running\
    \ the application.\n\nIn order to easily position the layer content, the NetBeans\
    \ IDE offers a layer tree in the projects window, in which all entries of the\
    \ layer files are shown. There, their order can be defined by drag-and-drop. The\
    \ respective entries in the layer file are then handled by the IDE. Where exactly\
    \ to find these layer trees is already explained in the section *Creating Modules*\
    \ after creating our first module. You can determine the order of actions with\
    \ the wizard of the NetBeans IDE (see [Chapter 6](#Chapter06.html#ch6)). The respective\
    \ attributes are then created by the wizard.\n\nShould positions of entries in\
    \ the layer tree be changed, some entries will be added to the layer file. These\
    \ entries overwrite the default positions of the entries affected by the change.\
    \ The position of an entry (also of an entry of a NetBeans Platform module) is\
    \ overwritten as follows:\n\n```\n<attr name=\"Menu/Edit/CopyAction.shadow/position\"\
    \ intvalue=\"15\"/>\n```\n\nUse the complete file path of the affected entry in\
    \ front of the attribute name `position`.\n\n#### File Types\n\nThere are different\
    \ file types provided within the System Filesystem. You will be confronted with\
    \ them at some points again, when developing your application. For example, registering\
    \ actions and menu entries in the layer file. I want to explain two frequently\
    \ used file types in the following sections."
  raw: '### Layer File


    In addition to the manifest file of a module with which mainly the interfaces
    and the environment of a module are described, there is also a *Layer* file. This
    is the central configuration file, in which virtually everything is defined what
    a module adds to the Platform. So, the layer file is the interface between the
    module and the NetBeans Platform, declaratively describing the integration of
    a module into the Platform. Firstly, the attribute `OpenIDE-Module-Layer` makes
    public if a layer file exists in the manifest file. During that process the path
    of the file is defined, usually using layer.xml as the file name.


    **`OpenIDE-Module-Layer:`** `com/galileo/netbeans/module/layer.xml`


    This file format is a hierarchical file system containing folders, files, and
    attributes. Starting the application, all existing layer files are summarized
    to one virtual file system. This is the so-called *System Filesystem* which is
    the runtime configuration of the NetBeans Platform.


    ![Image](images/0302.jpg)


    ***Figure 3-2.** System Filesystem*


    This layer file contains certain default folders. They are defined by different
    modules which are extension points. So, there is the default folder `Menu`, for
    example, which looks like [Listing 3-3](#Chapter03.html#list_3_3).


    ***Listing 3-3.** Default Folder of the Layer File*


    `<`**`folder`** `name="`**`Menu`**`">`

    `   <`**`folder`** `name="Edit">`

    `      <`**`file`** `name="MyAction.shadow">`

    `         <`**`attr`** `name="originalFile"`

    `               stringvalue="Actions/Edit/com-galileo-netbeans-module-MyAction.instance"/>`

    `      </`**`file`**`>`

    `   </`**`folder`**`>`

    `</`**`folder`**`>`


    In this example, the action class `MyAction` is added to the Edit menu. Do not
    worry about the exact syntax at this point; it is explained in the context of
    respective standard folders in later chapters. First of all, we elaborate this
    basic structure of the layer file. In addition, the NetBeans Platform provides
    practical features for working with the layer file, as shown in subsequent chapters,
    when our first module will be created. You can also find an index with the most
    important extension points in this book''s appendix.


    Every module is able to add new menu items or create new toolbars. Since each
    layer file of a module is merged to the System Filesystem, the entire menu bar
    content is assembled. The window system, which is responsible for generating the
    menu bar, now has to read the `Menu` folder in order to gain the content of the
    entire menu bar.


    This System Filesystem also contributes significantly to the fact that modules
    can be added or removed at runtime. Listeners can be registered on this System
    Filesystem. This is done by the window system, too, for example. If any changes
    occur because of an added module, the window system or the menu bar itself can
    update its content.


    #### Order of Folders and Files


    The order in which the entries are read out of the layer file (and the order they
    are displayed in the menu bar), can be determined by a position attribute as shown
    in [Listing 3-4](#Chapter03.html#list_3_4).


    ***Listing 3-4.** Defining the Order of Entries in the Layer File*


    `<filesystem>`

    `  <folder name="Menu">`

    `    <folder name="Edit">`

    `      <file name="`**`CopyAction.shadow`**`">`

    `        <attr name="originalFile"`

    `              stringvalue="Actions/Edit/org-openide-actions-CopyAction.instance"/>`

    `        <`**`attr`** `name="`**`position" intvalue`**`="10"/>`

    `      </file>`

    `      <file name="`**`CutAction.shadow`**`">`

    `        <attr name="originalFile"`

    `              stringvalue="Actions/Edit/org-openide-actions-CutAction.instance"/>`

    `        <`**`attr`** `name="`**`position" intvalue`**`="20"/>`

    `      </file>`

    `    </folder>`

    `  </folder>`

    `</filesystem>`


    Thus, the copy action would be shown before the cut action. If necessary, you
    can also use this attribute to define the order of the `folder` elements. In practice,
    positions are chosen with greater distance. This simplifies the subsequent insertion
    of additional entries. Should the same position be assigned twice, a warning message
    is logged while running the application.


    In order to easily position the layer content, the NetBeans IDE offers a layer
    tree in the projects window, in which all entries of the layer files are shown.
    There, their order can be defined by drag-and-drop. The respective entries in
    the layer file are then handled by the IDE. Where exactly to find these layer
    trees is already explained in the section *Creating Modules* after creating our
    first module. You can determine the order of actions with the wizard of the NetBeans
    IDE (see [Chapter 6](#Chapter06.html#ch6)). The respective attributes are then
    created by the wizard.


    Should positions of entries in the layer tree be changed, some entries will be
    added to the layer file. These entries overwrite the default positions of the
    entries affected by the change. The position of an entry (also of an entry of
    a NetBeans Platform module) is overwritten as follows:


    `<`**`attr`** `name="`**`Menu/Edit/CopyAction.shadow/position" intvalue`**`="15"/>`


    Use the complete file path of the affected entry in front of the attribute name
    `position`.


    #### File Types


    There are different file types provided within the System Filesystem. You will
    be confronted with them at some points again, when developing your application.
    For example, registering actions and menu entries in the layer file. I want to
    explain two frequently used file types in the following sections.'
  trans: '

    ### 层文件


    除了用于描述模块接口和环境的模块清单文件外，还存在一个*层*文件。这是核心配置文件，几乎定义了模块向平台添加的所有内容。因此，层文件是模块与 NetBeans
    平台之间的接口，以声明方式描述模块如何集成到平台中。首先，属性 `OpenIDE-Module-Layer` 会在清单文件中公开层文件是否存在。在此过程中，会定义文件的路径，通常使用
    `layer.xml` 作为文件名。


    **`OpenIDE-Module-Layer:`** `com/galileo/netbeans/module/layer.xml`


    该文件格式是一个包含文件夹、文件和属性的分层文件系统。启动应用程序时，所有现有的层文件会被合并成一个虚拟文件系统。这就是所谓的*系统文件系统*，它是 NetBeans
    平台的运行时配置。


    ![图片](img/0302.jpg)


    ***图 3-2.** 系统文件系统*


    该层文件包含某些默认文件夹。它们由作为扩展点的不同模块定义。例如，存在默认文件夹 `Menu`，如清单 3-3 所示。


    ***清单 3-3.** 层文件的默认文件夹*


    `<`**`folder`** `name="`**`Menu`**`">`

    `   <`**`folder`** `name="Edit">`

    `      <`**`file`** `name="MyAction.shadow">`

    `         <`**`attr`** `name="originalFile"`

    `               stringvalue="Actions/Edit/com-galileo-netbeans-module-MyAction.instance"/>`

    `      </`**`file`**`>`

    `   </`**`folder`**`>`

    `</`**`folder`**`>`


    在此示例中，操作类 `MyAction` 被添加到“编辑”菜单中。此时不必担心确切的语法；它将在后续章节中结合相应的标准文件夹进行解释。首先，我们详细阐述层文件的基本结构。此外，NetBeans
    平台提供了处理层文件的实用功能，如后续章节中创建第一个模块时所示。您还可以在本书附录中找到包含最重要扩展点的索引。


    每个模块都能够添加新的菜单项或创建新的工具栏。由于每个模块的层文件都会被合并到系统文件系统中，因此整个菜单栏的内容得以组装。负责生成菜单栏的窗口系统现在必须读取
    `Menu` 文件夹，以获取整个菜单栏的内容。


    这个系统文件系统也极大地促进了模块可以在运行时添加或移除这一特性。可以在该系统文件系统上注册监听器。例如，窗口系统也会执行此操作。如果由于添加模块而发生任何更改，窗口系统或菜单栏本身可以更新其内容。


    #### 文件夹和文件的顺序


    从层文件中读取条目的顺序（以及它们在菜单栏中显示的顺序）可以通过位置属性来确定，如清单 3-4 所示。


    ***清单 3-4.** 定义层文件中条目的顺序*


    `<filesystem>`

    `  <folder name="Menu">`

    `    <folder name="Edit">`

    `      <file name="`**`CopyAction.shadow`**`">`

    `        <attr name="originalFile"`

    `              stringvalue="Actions/Edit/org-openide-actions-CopyAction.instance"/>`

    `        <`**`attr`** `name="`**`position" intvalue`**`="10"/>`

    `      </file>`

    `      <file name="`**`CutAction.shadow`**`">`

    `        <attr name="originalFile"`

    `              stringvalue="Actions/Edit/org-openide-actions-CutAction.instance"/>`

    `        <`**`attr`** `name="`**`position" intvalue`**`="20"/>`

    `      </file>`

    `    </folder>`

    `  </folder>`

    `</filesystem>`


    因此，复制操作会显示在剪切操作之前。如有必要，您也可以使用此属性来定义 `folder` 元素的顺序。在实践中，位置值会设置得间隔较大。这简化了后续插入其他条目。如果两次分配了相同的位置，则在运行应用程序时会记录一条警告消息。


    为了轻松定位层内容，NetBeans IDE 在项目窗口中提供了一个层树，其中显示了层文件的所有条目。在那里，可以通过拖放来定义它们的顺序。层文件中的相应条目随后由
    IDE 处理。在创建第一个模块后，*创建模块*部分已经解释了具体在哪里可以找到这些层树。您可以使用 NetBeans IDE 的向导来确定操作的顺序（请参见第
    6 章）。相应的属性随后由向导创建。


    如果层树中条目的位置需要更改，则会将一些条目添加到层文件中。这些条目会覆盖受更改影响的条目的默认位置。条目（也包括 NetBeans 平台模块的条目）的位置按如下方式覆盖：


    `<`**`attr`** `name="`**`Menu/Edit/CopyAction.shadow/position" intvalue`**`="15"/>`


    在属性名称 `position` 之前使用受影响条目的完整文件路径。


    #### 文件类型


    系统文件系统中提供了不同的文件类型。在开发应用程序时，您会在某些时候再次遇到它们。例如，在层文件中注册操作和菜单项。我将在以下部分中解释两种常用的文件类型。

