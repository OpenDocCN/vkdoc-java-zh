- fmt: '### NetBeans Runtime Container


    The basis of the NetBeans Platform and its modular architecture is called *NetBeans
    Runtime Container*. It consists of the following five modules:


    - *Bootstrap*: This module is executed initially. It executes all registered command-line
    handlers, creates a boot classloader which loads the startup module, and then
    executes it.

    - *Startup*: This module deploys the application by initializing the module system
    and the file system.

    - *Module System API*: This API is responsible for the management of the modules
    and for their settings and dependencies.

    - *File System API*: This API provides a virtual file system which provides a
    platform-independent access. It is mostly used for loading resources of the modules.

    - *Lookup & Utilities API*: This component provides an important base component
    which is used for the intercommunication of the modules. The `Lookup` API is located
    in an independent module, so it can be used independently of the NetBeans Platform.


    The arrows in [Figure 2-3](#Chapter02.html#fig_2_3) show the dependencies of these
    five basic modules.


    ![Image](images/0203.jpg)


    ***Figure 2-3.** NetBeans runtime container*


    The runtime container is the minimal form of a rich client application and can
    be executed as such without further modules. If there are no tasks to do, the
    runtime container would directly shut down again after starting up. It is interesting
    to note that, on the one hand, the NetBeans Platform can create applications with
    an extensive user interface, and on the other, can also use this runtime container
    for a modular command-line application. Starting the runtime container, it finds
    all available modules and creates an internal registry out of them. Usually, one
    module is just loaded when needed. First, it is registered as existing. However,
    a module has the possibility to do tasks right at the start. This is done by the
    Module Installer, which will be discussed in [Chapter 3](#Chapter03.html#ch3).
    The runtime container also facilitates dynamic loading, unloading, installing,
    and uninstalling of modules during runtime. This functionality is especially necessary
    for users when updating an application (with the auto update function). It is
    also necessary for deactivating unneeded modules within an application.


    For a complete understanding of the process of a rich client application, it is
    also important to mention that the Bootstrap module (the first module executed)
    is started by a platform-specific launcher. This launcher is also responsible
    for identifying the Java Runtime Environment. The launcher is part of the NetBeans
    Platform and is operating system (or OS) specific, so that, for example, on Windows
    systems it is an `.exe` file.


    ### NetBeans Classloader System


    The NetBeans classloader system is part of the NetBeans runtime container and
    a precondition for encapsulating the module and the structure of a modular architecture.
    This system consists of three different types of classloaders. These are the *module
    classloader*, the *system classloader*, and the *original classloader*.


    - Most classes are loaded by the module classloader.

    - The system classloader is only used in certain cases, such as when resources
    must be accessed outside a module.

    - The original classloader loads resources out of the class path of the launcher
    of the application.


    The module classloader and the system classloader are multiparent classloaders;
    they can have not just one classloader as parent, as usual, but any number of
    parents. [Figure 2-4](#Chapter02.html#fig_2_4) shows the connections of the single
    classloader types.


    ![Image](images/0204.jpg)


    ***Figure 2-4.** NetBeans classloader system*


    #### Module Classloader


    For each module registered in the Module System, an instance of the module classloader
    is created, by means of which every module obtains its own namespace. This classloader
    primarily loads classes from the module''s JAR archive, but it may load from multiple
    archives, as often happens with library wrapper modules. You will learn more about
    this in [Chapter 3](#Chapter03.html#ch3).


    The original classloader is implicitly a parent classloader of every module classloader,
    and is the first on the parent''s list. Further parents are those of related modules,
    on which dependencies have been set. How dependencies are set is described in
    [Chapter 3](#Chapter03.html#ch3).


    This multiparent module classloader enables classes to be loaded from other modules,
    while avoiding namespace conflicts. The loading of classes is delegated to the
    parent classloader, rather than the modules themselves. In addition to the classes
    of the module JAR archive, this classloader is also responsible for loading the
    Locale Extension Archive (see [Chapter 34](#Chapter34.html#ch34)) from the subdirectory
    `locale`, as well as the patch archives under the subdirectory `patches`, if these
    are available.


    #### System Classloader


    The system classloader is, by default, a multiparent classloader. It owns all
    the instantiated module classloaders as its parents. As a result, it is theoretically
    possible to load everything provided by a module with this classloader. Access
    to the system classloader can be obtained in one of two different ways: via `Lookup`
    (about which you will read much more later), as well as the context classloader
    of the current thread. This is the default (insofar as you have not explicitly
    set other context classloaders) of the system classloader.


    ```

    ClassLoader cl = (ClassLoader) Lookup.getDefault().lookup(ClassLoader.class);

    ```


    or


    ```

    ClassLoader cl = Thread.currentThread().getContextClassLoader();

    ```


    #### Original Classloader


    The original (application) classloader is created by the launcher of the application.
    It loads classes and other resources on the original `CLASSPATH` and from the
    `lib` directories and their `ext` subdirectories as well. If a JAR archive is
    not recognized as a module (that is, the manifest entries are invalid), it is
    not transferred to the module system. Such resources are always found first: if
    the same resource is found here as in the module JAR archive, those found in the
    module are ignored. This arrangement is necessary for the branding of modules,
    for example, as well as for the preparation of multiple language distributions
    of a particular module. As before, this classloader is not used for loading all
    related resources. It is much more likely to be used for resources that are needed
    in the early start phase of an application, such as for the classes required for
    setting the look and feel classes.


    ### Summary


    This chapter examined the structure of the NetBeans Platform beginning with a
    look at its architecture, the core of which is provided by its runtime container.
    The runtime container provides the execution environment of applications created
    on top of the NetBeans Platform and also provides an infrastructure for modular
    applications. The NetBeans classloader system, which ensures the encapsulation
    of modules, was introduced and explained. Aside from the runtime container, many
    modules form parts of the NetBeans Platform and this chapter looked briefly at
    each of these, finally noting that the NetBeans IDE is itself a rich client application
    consisting of modules reusable in your own applications.


    ## C H A P T E R  3'
