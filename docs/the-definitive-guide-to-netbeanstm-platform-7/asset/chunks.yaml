- fmt: "# Node Classes\n\nAs you already learned in [Chapter 12](#Chapter12.html#ch12),\
    \ child nodes are created by a `ChildFactory` class. You create such a class for\
    \ managing the categories, which will be displayed on the palette, in this case\
    \ as genre. For this purpose, you derive from the `ChildFactory<String>` class.\
    \ The nodes are created by the `createNodesForKey()` method. For this example\
    \ (see [Listing 21-3](#Chapter21.html#list_21_3)), you just create three `GenreNode`\
    \ instances directly.\n\nAs you might imagine, you read the genres from a database\
    \ and then create the `GenreNode` objects for it. (In [Chapter 26](#Chapter26.html#ch26),\
    \ which deals with embedding and using the Java DB, we will use and extend this\
    \ example.) The `GenreNode` class itself is explicitly easy. The genre is passed\
    \ to its constructor as parameter which is directly passed to the `AlbumNodeFactory`\
    \ class. Thus, you are in the second (respectively third) level of the node hierarchy\
    \ (see [Listing 21-4](#Chapter21.html#list_21_4)).\n\n***Listing 21-3.** All Genres,\
    \ Which Will Be Displayed on the Palette, Are Created by GenreNodeFactory.*\n\n\
    ```\nimport org.openide.nodes.ChildFactory;\nimport org.openide.nodes.Node;\n\
    ...\npublic class GenreNodeFactory extends ChildFactory<String> {\n\n   @Override\n\
    protected boolean createKeys(List<String> toPopulate) {\n      toPopulate.add(\"\
    root\");\n      return true;\n   }\n\n@Override    protected Node[] createNodesForKey(String\
    \ key) {\n      return new Node[]{\n         new GenreNode(\"Techno, Trance and\
    \ Dance\"),\n         new GenreNode(\"Rock and Pop\"),\n         new GenreNode(\"\
    Country and Classic\")};\n   }\n}\n```\n\n***Listing 21-4.** A Genre Represented\
    \ by the GenreNode Class*\n\n```\nimport org.openide.nodes.AbstractNode;\nimport\
    \ org.openide.nodes.Children;\n\npublic class GenreNode extends AbstractNode {\n\
    \   public GenreNode(String genre) {\nsuper(Children.create(new AlbumNodeFactory(genre),\
    \ false));\n      this.setDisplayName(genre);\n   }\n}\n```\n\nThe `AlbumNodeFactory`\
    \ class, which is responsible for creating the albums of a certain genre, is basically\
    \ built like the `GenreNodeFactory` class. First you create three node instances\
    \ of the type `AlbumNode` in the `createNodesForKey()` method directly and pass\
    \ the genre to this method. With this parameter, for example, you were able to\
    \ search in a database for albums belonging to this genre. The data of an album\
    \ is managed by the `Album` class (see [Listing 21-5](#Chapter21.html#list_21_5)).\n\
    \n***Listing 21-5.** The AlbumNodeFactory Class Creates the Nodes of the Albums\
    \ for a Certain Genre.*\n\n```\nimport org.openide.nodes.ChildFactory;\nimport\
    \ org.openide.nodes.Node;\n...\npublic class AlbumNodeFactory extends ChildFactory<String>\
    \ {\n   private String genre;\n\n   public AlbumNodeFactory(String genre) {\n\
    \      this.genre = genre;\n   }\n\n   @Override\nprotected boolean createKeys(List<String>\
    \ toPopulate) {\n      toPopulate.add(genre);\n      return true;\n   }\n\n  \
    \ @Override\nprotected Node[] createNodesForKey(String key) {\n      return new\
    \ Node[] {\nnew AlbumNode(\nnew Album(\"Tunnel Trance Force 39\", \"42\", \"2\"\
    ,\"2007\",\n                  \"com/galileo/netbeans/module/cover_small.jpg\"\
    ,\n                  \"com/galileo/netbeans/module/cover_big.jpg\")),\nnew AlbumNode(\n\
    new Album(\"Dream Dance 43\", \"39\", \"3\", \"2007\",\n                  \"com/galileo/netbeans/module/cover2_small.jpg\"\
    ,\n                  \"com/galileo/netbeans/module/cover2_big.jpg\")),\nnew AlbumNode(\n\
    new Album(\"DJ Networx 31\", \"45\", \"2\", \"2006\",\n                  \"com/galileo/netbeans/module/cover3_small.jpg\"\
    ,\n                  \"com/galileo/netbeans/module/cover3_big.jpg\"))       };\n\
    \   }\n}\n```\n\nAt last, the `AlbumNode` class is responsible for displaying\
    \ the albums on the palette (as you can see in [Figure 21-2](#Chapter21.html#fig_21_2)).\
    \ Since an `AlbumNode` does not own additional child nodes, you pass an empty\
    \ container to the constructor of the base class via `Children.LEAF`. You determine\
    \ the name via `setDisplayName()`, which will be displayed on the palette. You\
    \ can use HTML here for an attractive presentation (see [Listing 21-6](#Chapter21.html#list_21_6)).\
    \ For this purpose, I created the `getLabel()` method, which puts together an\
    \ HTML string, which displays the data of the album in a table. The value of the\
    \ `getHtmlDisplayName()` is used in the palette manager, which you can open via\
    \ the context menu of the palette. You provide the icon of the corresponding entry\
    \ with the `getIcon()` method. In this example, the icon is a cover of an album.\
    \ Thus the user can choose between big and small icons. So you should deliver\
    \ a small icon (typically 16 pixels) and a bigger icon, depending on the `type`\
    \ parameter.\n\n***Listing 21-6.** The AlbumNode Class Is Responsible for Displaying\
    \ a Palette Entry.*\n\n```\nimport org.openide.nodes.AbstractNode;\nimport org.openide.nodes.Children;\n\
    ...\npublic class AlbumNode extends AbstractNode {\nprivate Album album = null;\n\
    \n   public AlbumNode(Album album) {\n      super(Children.LEAF);\n      this.album\
    \ = album;\n      this.setDisplayName(getLabel());\n   }\n\npublic String getHtmlDisplayName()\
    \ {\n      return \"<b>\" + album.getTitle() + \"</b> (\" + album.getTracks()\
    \ + \" Tracks)\";\n   }\n\npublic Image getIcon(int type) {\n      return album.getIcon(type);\n\
    \   }\n\nprivate String getLabel() {\n      String label = \"<html>\" +\n    \
    \     \"<table cellspacing=\\\"0\\\" cellpadding=\\\"1\\\">\" +\n            \"\
    <tr>\" +\n               \"<td><b>Title </b></td>\" +\n               \"<td>\"\
    \ + album.getTitle() + \"</td>\" +\n             ...\n   }\n}\n```\n\n## Creating\
    \ and Adding a Palette\n\nAfter creating this node hierarchy, which provides the\
    \ data for the palette, you can now create a palette and add it to the Lookup\
    \ of the playlist top component. Thus, the palette is always displayed as soon\
    \ as a playlist is active. So first, create a root node in the constructor of\
    \ the `PlaylistTopComponent` class. Your palette data comes from this root node.\
    \ You pass a children container, which is created by the factory method `Children.create()`,\
    \ to this root node. This children container cares about the management of the\
    \ data. At the same time, you pass a `GenreNodeFactory` instance which is responsible\
    \ for creating the data. Then, you just need a `PaletteActions` Instance which\
    \ has no further significance at the moment. Later you can create a `PaletteController`\
    \ instance out of it via `createPalette()`. You can pack this instance into a\
    \ Lookup, which you define as a local Lookup of the top component via `associateLookup()`.\n\
    \n```\nimport org.netbeans.spi.palette.PaletteActions;\nimport org.netbeans.spi.palette.PaletteController;\n\
    import org.netbeans.spi.palette.PaletteFactory;\n...\npublic PlaylistTopComponent()\
    \ {\n   ...\n   Node root = new AbstractNode(Children.create(new GenreNodeFactory(),\
    \ false));\n   PaletteActions    a = new MyPaletteActions();\n   PaletteController\
    \ p = PaletteFactory.createPalette(root, a);\nassociateLookup(Lookups.fixed(p));\n\
    }\n```"
  raw: '#### Node Classes


    As you already learned in [Chapter 12](#Chapter12.html#ch12), child nodes are
    created by a `ChildFactory` class. You create such a class for managing the categories,
    which will be displayed on the palette, in this case as genre. For this purpose,
    you derive from the `ChildFactory<String>` class. The nodes are created by the
    `createNodesForKey()` method. For this example (see [Listing 21-3](#Chapter21.html#list_21_3)),
    you just create three `GenreNode` instances directly.


    As you might imagine, you read the genres from a database and then create the
    `GenreNode` objects for it. (In [Chapter 26](#Chapter26.html#ch26), which deals
    with embedding and using the Java DB, we will use and extend this example.) The
    `GenreNode` class itself is explicitly easy. The genre is passed to its constructor
    as parameter which is directly passed to the `AlbumNodeFactory` class. Thus, you
    are in the second (respectively third) level of the node hierarchy (see [Listing
    21-4](#Chapter21.html#list_21_4)).


    ***Listing 21-3.** All Genres, Which Will Be Displayed on the Palette, Are Created
    by GenreNodeFactory.*


    `import org.openide.nodes.ChildFactory;`

    `import org.openide.nodes.Node;`

    `...`

    `public class` **`GenreNodeFactory`** `extends ChildFactory<String> {`


    `   @Override`

    `protected boolean` **`createKeys`**`(List<String> toPopulate) {`

    `      toPopulate.add("root");`

    `      return true;`

    `   }`


    `@Override    protected Node[]` **`createNodesForKey`**`(String key) {`

    `      return new Node[]{`

    `         new GenreNode("Techno, Trance and Dance"),`

    `         new GenreNode("Rock and Pop"),`

    `         new GenreNode("Country and Classic")};`

    `   }`

    `}`


    ***Listing 21-4.** A Genre Represented by the GenreNode Class*


    `import org.openide.nodes.AbstractNode;`

    `import org.openide.nodes.Children;`


    `public class` **`GenreNode`** `extends AbstractNode {`

    `   public GenreNode(String genre) {`

    `super(Children.create(new` **`AlbumNodeFactory`**`(genre), false));`

    `      this.`**`setDisplayName`**`(genre);`

    `   }`

    `}`


    The `AlbumNodeFactory` class, which is responsible for creating the albums of
    a certain genre, is basically built like the `GenreNodeFactory` class. First you
    create three node instances of the type `AlbumNode` in the `createNodesForKey()`
    method directly and pass the genre to this method. With this parameter, for example,
    you were able to search in a database for albums belonging to this genre. The
    data of an album is managed by the `Album` class (see [Listing 21-5](#Chapter21.html#list_21_5)).


    ***Listing 21-5.** The AlbumNodeFactory Class Creates the Nodes of the Albums
    for a Certain Genre.*


    `import org.openide.nodes.ChildFactory;`

    `import org.openide.nodes.Node;`

    `...`

    `public class` **`AlbumNodeFactory`** `extends ChildFactory<String> {`

    `   private String genre;`


    `   public AlbumNodeFactory(String genre) {`

    `      this.genre = genre;`

    `   }`


    `   @Override`

    `protected boolean` **`createKeys`**`(List<String> toPopulate) {`

    `      toPopulate.add(genre);`

    `      return true;`

    `   }`


    `   @Override`

    `protected Node[]` **`createNodesForKey`**`(String key) {`

    `      return new Node[] {`

    **`new AlbumNode`**`(`

    **`new Album`**`("Tunnel Trance Force 39", "42", "2","2007",`

    `                  "com/galileo/netbeans/module/cover_small.jpg",`

    `                  "com/galileo/netbeans/module/cover_big.jpg")),`

    **`new AlbumNode`**`(`

    **`new Album`**`("Dream Dance 43", "39", "3", "2007",`

    `                  "com/galileo/netbeans/module/cover2_small.jpg",`

    `                  "com/galileo/netbeans/module/cover2_big.jpg")),`

    **`new AlbumNode`**`(`

    **`new Album`**`("DJ Networx 31", "45", "2", "2006",`

    `                  "com/galileo/netbeans/module/cover3_small.jpg",`

    `                  "com/galileo/netbeans/module/cover3_big.jpg"))       };`

    `   }`

    `}`


    At last, the `AlbumNode` class is responsible for displaying the albums on the
    palette (as you can see in [Figure 21-2](#Chapter21.html#fig_21_2)). Since an
    `AlbumNode` does not own additional child nodes, you pass an empty container to
    the constructor of the base class via `Children.LEAF`. You determine the name
    via `setDisplayName()`, which will be displayed on the palette. You can use HTML
    here for an attractive presentation (see [Listing 21-6](#Chapter21.html#list_21_6)).
    For this purpose, I created the `getLabel()` method, which puts together an HTML
    string, which displays the data of the album in a table. The value of the `getHtmlDisplayName()`
    is used in the palette manager, which you can open via the context menu of the
    palette. You provide the icon of the corresponding entry with the `getIcon()`,  method.
    In this example, the icon is a cover of an album. Thus the user can choose between
    big and small icons. So you should deliver a small icon (typically 16 pixels)
    and a bigger icon, depending on the `type` parameter.


    ***Listing 21-6.** The AlbumNode Class Is Responsible for Displaying a Palette
    Entry.*


    `import org.openide.nodes.AbstractNode;`

    `import org.openide.nodes.Children;`

    `...`

    `public class` **`AlbumNode`** `extends AbstractNode {`

    `private` **`Album`** `album = null;`


    `   public AlbumNode(`**`Album`** `album) {`

    `      super(`**`Children.LEAF`**`);`

    `      this.album = album;`

    `      this.setDisplayName(getLabel());`

    `   }`


    `public String` **`getHtmlDisplayName`**`() {`

    `      return "<b>" + album.getTitle() + "</b> (" + album.getTracks() + " Tracks)";`

    `   }`


    `public Image` **`getIcon`**`(int type) {`

    `      return album.getIcon(type);`

    `   }`


    `private String` **`getLabel`**`() {`

    `      String label = "<html>" +`

    `         "<table cellspacing=\"0\" cellpadding=\"1\">" +`

    `            "<tr>" +`

    `               "<td><b>Title </b></td>" +`

    `               "<td>" + album.getTitle() + "</td>" +`

    `             ...`

    `   }`

    `}`


    #### Creating and Adding a Palette


    After creating this node hierarchy, which provides the data for the palette, you
    can now create a palette and add it to the Lookup of the playlist top component.
    Thus, the palette is always displayed as soon as a playlist is active. So first,
    create a root node in the constructor of the `PlaylistTopComponent` class. Your
    palette data comes from this root node. You pass a children container, which is
    created by the factory method `Children.create()`, to this root node. This children
    container cares about the management of the data. At the same time, you pass a
    `GenreNodeFactory` instance which is responsible for creating the data. Then,
    you just need a `PaletteActions` Instance which has no further significance at
    the moment. Later you can create a `PaletteController` instance out of it via
    `createPalette()`. You can pack this instance into a Lookup, which you define
    as a local Lookup of the top component via `associateLookup()`.


    `import org.netbeans.spi.palette.PaletteActions;`

    `import org.netbeans.spi.palette.PaletteController;`

    `import org.netbeans.spi.palette.PaletteFactory;`

    `...`

    `public` **`PlaylistTopComponent`**`() {`

    `   ...`

    `   Node root = new AbstractNode(`**`Children.create(new GenreNodeFactory(), false)`**`);`

    `   PaletteActions    a = new MyPaletteActions();`

    `   PaletteController p = PaletteFactory.`**`createPalette`**`(root, a);`

    **`associateLookup`**`(Lookups.fixed(p));`

    `}`'
