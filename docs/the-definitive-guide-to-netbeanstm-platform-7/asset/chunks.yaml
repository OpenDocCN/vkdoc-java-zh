    ![Image](images/anne_bock.jpg) ![Image](images/square.jpg) Anne Böck studied English
    at the University of Tübingen and has, so to speak, dealt with the English language
    every day for years. She spent a semester studying in the U.S.A. at Indiana University.
    Additionally, she lived and worked in Canada for another six months. These days,
    she teaches English at a German school, and also works as a professional translator.


    ## About the Technical Reviewers


    ![Image](images/jesse_glick.jpg) ![Image](images/square.jpg) Jesse Glick has worked
    on the `NetBeans` project since 1999, and saw it acquired by Sun Microsystems,
    made open source, and most recently incorporated into Oracle''s tool portfolio.
    He has worked on basic components of the IDE such as the project system, the `Ant`
    and `Maven` integrations, and the `Hudson` integration.


    Jesse has also contributed to the `NetBeans Platform` and its in-IDE tooling,
    co-authored an O''Reilly book on the subject, and spoken at several conferences
    on related topics.


    ![Image](images/david_konecny.jpg) ![Image](images/square.jpg) David Konecny is
    a principal member of the technical staff at Oracle. He is technical leader of
    Java EE support in `NetBeans IDE` and has over the years worked on several different
    areas of the IDE. Prior to working for Sun and Oracle, he spent a decade in miscellaneous
    engineering roles. He is passionate about his work and anything he does in his
    life. Born in Czechoslovakia, he currently lives in New Zealand and works from
    home.


    ## Introduction


    With this work in your hands, you hold the most current and the most comprehensive
    guide to the Swing-based rich client platform, *NetBeans Platform 7*. This theme-rich
    client platform is highly topical. In addition to the `NetBeans Platform`, `Eclipse
    RCP` is also a principal representative of this category. The development of these
    two platforms was mainly driven by the `NetBeans` and `Eclipse` integrated development
    environments (IDEs). Those two IDEs are based on their respective platforms and
    represent a rich client application themselves. The `NetBeans Platform` is completely
    based on the Java API with AWT and Swing and integrates the concepts of the Java
    Standard Edition (JSE), while the `Eclipse RCP` with SWT and JFace builds more
    and more on its own approaches and concepts.


    Rich client platforms are flexible and used mainly for their constantly increasing
    requirements for applications and their architecture. One crucial aspect is their
    increased productivity and flexibility to be able to equip a product depending
    on its intended usage and to adapt it to a market. This is especially important
    for professional applications.


    In my opinion, the `NetBeans Platform` is always worth using, even if an application
    is very small or quite huge, because of the comprehensive support actually provided
    by the `NetBeans IDE`. It is also already worth it because of the execution environment,
    and even more so because of the numerous APIs that provide practical solutions
    for frequently occurring problems and challenges with client application development.
    These solutions are very close to the practice and the application and increase
    productivity a lot.


    However, this assumption is based on one basic condition: professional knowledge
    and use of the workings of the rich client platform. The application developer
    should at least know the main principles; only then can the real advantages of
    increased productivity and greater software quality be achieved in practice.


    Many developers have assumed the platform was too complex, which is one of the
    main reasons the rich client platforms have not yet been established as quasi-standards
    for client application development. At first, developers may get the impression
    that there is a huge wall of APIs and concepts to master. However, once you begin
    to learn more, you find that there are immense synergies and simplifications possible,
    which make up for the challenges of the initial learning phase.


    The `NetBeans IDE` simplifies both daily usage and developers'' learning curve
    by providing comprehensive, helpful, and intuitive wizards. It is surely important
    that all `NetBeans` APIs and concepts build on the APIs and concepts of the Java
    Standard Edition (JSE). That fact simplifies everyday experiences with it and
    also facilitates the reuse of already existing components.


    ### News of the NetBeans Platform


    The `NetBeans Platform 7` contains numerous innovations. One crucial innovation
    is the introduction of *Annotations*. Actions, for example, do not have to derive
    from a special class anymore. Thus, actions can be registered via annotations,
    and at the same time, actions can be added to a menu or to a toolbar, too. Before,
    you had to assign two separate configuration files for top components. Now, top
    components are registered via annotations and made public to the `NetBeans Platform`.
    Declarative information can now be directly and decentrally provided because of
    using annotations. Annotations are well documented and are checked by the editor
    or respectively by the compiler; information is provided in a simpler manner and
    potential erratic entries in XML are avoided. Furthermore, the information is
    located exactly at the position it refers to, so no additional files have to be
    managed. This also simplifies refactoring and facilitates the `NetBeans Platform`''s
    independence of the `NetBeans IDE`. Bear in mind that the necessary configuration
    files, or rather configuration entries, are created out of the annotations at
    compile time. This means using annotations is not mandatory; you can also manually
    create the necessary configuration as previously.


    Whether or not you use annotations is a question of philosophy in the end, and
    also depends on the project''s size and on your special needs. Of course, you
    can also look at the disadvantages of annotations. For example, the meta-information
    is scattered in the source files. A central file might be easier to adapt or to
    overlook.


    The support of *OSGi* bundles is also a crucial innovation. Now OSGi bundles can
    be executed parallel to `NetBeans` modules within the `NetBeans Platform 7`. For
    this purpose, the OSGi framework, `Felix` or `Equinox`, is optionally integrated
    in the `NetBeans Platform`. It is also possible to convert the `NetBeans Platform`
    modules into OSGi bundles. This innovation allows the use of numerous existing
    OSGi bundles.


    Out-of-the-box support of `Maven` can also be called an innovation. `NetBeans
    Platform` applications can now be completely developed via `Maven`. With the `NetBeans
    Maven` plugin and the availability of all `NetBeans Platform` modules in a public
    `Maven` repository, there is nothing that prevents using the `NetBeans Platform`
    outside the `NetBeans IDE`.'
