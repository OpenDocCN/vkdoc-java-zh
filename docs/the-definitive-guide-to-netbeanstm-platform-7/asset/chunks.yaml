    `}`


    ### 企业 Java Bean


    为了管理可用产品和购物车中的产品，分别实现一个 EJB。你可以通过点击 *文件 ![Image](img/U001.jpg) 新建文件… ![Image](img/U001.jpg)
    Enterprise JavaBeans ![Image](img/U001.jpg) 会话 Bean* 向已创建的项目添加一个 Bean 类。将用于产品管理的
    EJB 类命名为 *ProductBean*，并添加到包 `com.galileo.netbeans.beans` 中。会话类型应为 *无状态*。（参见图
    31-3。）你必须在本地使用此类（Web 服务将位于同一模块中，因此可以本地访问）；自 EJB 3.1 起，不再需要指定接口。


    ![Image](img/3103.jpg)


    ***图 31-3.** 创建 ProductBean 类以管理产品*


    现在，为 Bean 类 `ProductBean` 配备两个方法：一个用于添加产品，另一个用于获取所有已保存产品的完整列表。你可以通过 Java 持久化 API
    (JPA) 的实体管理器访问数据库中的产品。为此，可以再次使用 NetBeans IDE 的代码向导。在你的类中按下 *Alt+Insert*，并在上下文菜单中选择
    *使用实体管理器…* 选项。实体管理器将作为私有数据元素创建。使用注解 `@PersistenceContext` 注解实体管理器，并为其定义持久化单元的名称（根据
    *persistence.xml* 文件中的配置）。实体管理器的实例由 EJB 容器在运行时注入。（参见清单 31-2。）


    ***清单 31-2.** 用于管理产品的无状态会话 Bean*


    `@Stateless`

    `@LocalBean`

    `public class` **`ProductBean`** `{`


    `   @`**`PersistenceContext`**`(unitName = "OrderSystemPU")`

    `private` **`EntityManager`** `em;`


    `public void` **`addProduct`**`(Product product) {`

    `      em.persist(product);`

    `   }`

    `public List<Product>` **`getProducts`**`() {`

    `      return em.createQuery(`

    `         em.getCriteriaBuilder().createQuery(Product.class)).getResultList();`

    `   }`

    `}`


    接下来，你需要一个用于实现购物车的 Bean 类。为此，再次选择 *文件 ![Image](img/U001.jpg) 新建文件… ![Image](img/U001.jpg)
    Enterprise JavaBeans ![Image](img/U001.jpg) 会话 Bean*，并使用向导创建一个名为 `CartBean` 的
    EJB。将该 EJB 添加到包 `com.galileo.netbeans.beans` 中。会话类型应为 *有状态*，并且在这种情况下同样不需要接口，因为它只能由
    Web 服务本地访问。（参见清单 31-3。）


    ***清单 31-3.** 用于管理购物车的 CartBean 类*


    `import com.galileo.netbeans.entities.Product;`

    `import java.util.ArrayList;`

    `import java.util.List;`

    `import javax.ejb.LocalBean;`

    `import javax.ejb.Stateful;`


    `@`**`Stateful`**

    `@`**`LocalBean`**

    `public class` **`CartBean`** `{`

    `   private List<Product> products = new ArrayList<Product>();`


    `public void` **`addProduct`**`(Product product) {`

    `      products.add(product);`

    `   }`


    `public List<Product>` **`getProducts`**`() {`

    `      return products;`

    `   }`


    `public Double` **`getSum`**`() {`

    `      Double sum = 0.0;`

    `      for (Product p : products) {`

    `         sum += p.getPrice();`

    `      }`

    `      return sum;`

    `   }`


    `public Integer` **`getAmount`**`() {`

    `      return products.size();`

    `   }`

    `}`


    现在，你已经实现了两个简单的会话 Bean 和一个持久化实体。当然，应用程序可以通过更多 Java EE 特性进行扩展，但本章主要介绍如何通过 Web 服务接口调用
    EJB。

    '
- fmt: "### Web Service\n\nThis section will deal with creating a web service interface\
    \ that functions to some extent as a communication layer to call the EJBs. There\
    \ are two ways to create a web service. It can either be implemented in a EJB\
    \ module so it represents a session bean or, if implemented in a web application,\
    \ you can implement the web service as a session bean with a web service interface\
    \ or as a plain web service.\n\nIn this example the web service will be integrated\
    \ into the already existing EJB module. Surely, you could also create a new EJB\
    \ module for this purpose. However, in that case it is necessary to create a local\
    \ interface for both `ProductBean` and `CartBean`. That way, the web service can\
    \ refer to the EJBs. Add a web service to the EJB module with *File ![Image](images/U001.jpg)\
    \ New File… ![Image](images/U001.jpg) Web Services ![Image](images/U001.jpg) Web\
    \ Service*. Call it *OrderService* and add it to the package `com.galileo.netbeans.service`.\
    \ As you can see, the web service must be created as a stateless session bean\
    \ in this kind of container, which is just an additional annotation in the implementation.\
    \ (See [Figure 31-4](#Chapter31.html#fig_31_4).)\n\n![Image](images/3104.jpg)\n\
    \n***Figure 31-4.** Creating a web service class as a stateless session bean*\n\
    \nNow add references of both beans to the basic structure of the web service.\
    \ Because of *Dependency Injection* this is quite simple, but you can use the\
    \ advantages of the code wizard. Thus, press *Alt+Insert* and choose *Call Enterprise\
    \ Bean*. Then you can choose the desired EJB in the selection dialog. This way\
    \ you create references to a `ProductBean` as well as to a `CartBean` object,\
    \ as depicted in [Listing 31-4](#Chapter31.html#list_31_4). In the same easy way,\
    \ with the code wizard (with *Add Web Service Operation…*) you add the desired\
    \ web service methods, which will finally be available in your NetBeans Platform\
    \ application. (See [Figure 31-5](#Chapter31.html#fig_31_5).)\n\n![Image](images/3105.jpg)\n\
    \n***Figure 31-5.** Adding web service methods with the code wizard*\n\nAdd the\
    \ annotation `@WebService` to the web service and give the annotation a name.\
    \ Both EJB references will automatically be initialized by the EJB container at\
    \ runtime.\n\n***Listing 31-4.** Implementation of Web Services As Façade for\
    \ EJBs*\n\n```\nimport com.galileo.netbeans.beans.CartBean;\nimport com.galileo.netbeans.beans.ProductBean;\n\
    import com.galileo.netbeans.entities.Product;\nimport java.util.List;\nimport\
    \ javax.ejb.EJB;\nimport javax.jws.Oneway;\nimport javax.jws.WebService;\nimport\
    \ javax.jws.WebMethod;\nimport javax.jws.WebParam;\nimport javax.ejb.Stateless;\n\
    \n@WebService(serviceName = \"OrderService\") @Stateless\npublic class OrderService\
    \ {\n   @EJB\nprivate ProductBean productBean;\n   @EJB\nprivate CartBean cartBean;\n\
    \n   @WebMethod(operationName = \"addProductToCart\")\n   @Oneway\npublic void\
    \ addProductToCart(\n      @WebParam(name = \"product\") Product product) {\n\
    \      cartBean.addProduct(product);\n   }\n\n   @WebMethod(operationName = \"\
    getSumOfCart\")\npublic Double getSumOfCart() {\n      return cartBean.getSum();\n\
    \   }\n\n   @WebMethod(operationName = \"getAmountOfCart\")\npublic Integer getAmountOfCart()\
    \ {\n      return cartBean.getAmount();\n   }\n\n   @WebMethod(operationName =\
    \ \"getProducts\")\npublic List<Product> getProducts() {\n      return productBean.getProducts();\n\
    \   }\n\n   @WebMethod(operationName = \"addProduct\")\n   @Oneway\npublic void\
    \ addProduct(\n      @WebParam(name = \"product\") Product product) {\n      productBean.addProduct(product);\n\
    \   }\n}\n```\n\nNow you have equipped two enterprise beans with a web service\
    \ interface. A web service is described by a WSDL file, and on the basis of a\
    \ WSDL file a web service client is created. However, you do not have to create\
    \ the WSDL file, because the GlassFish server creates it on demand. So you just\
    \ have to deploy the EJB module with the web service on the server. Choose *Deploy*\
    \ in the context menu of the referring project. Make sure the database server\
    \ is started besides the GlassFish server so that the web service calls can be\
    \ executed successfully.\n\n### Web Service Client\n\nYou cannot create a web\
    \ service client directly in a NetBeans Platform application if you want to use\
    \ it instead of a Java EE application client. For this a normal Java project is\
    \ needed. In the simplest case, just create a Java class library project with\
    \ *File ![Image](images/U001.jpg) New Project… ![Image](images/U001.jpg) Java\
    \ ![Image](images/U001.jpg) Java Class Library*. Add a web service client to it\
    \ with *File ![Image](images/U001.jpg) New File… ![Image](images/U001.jpg) Web\
    \ Services ![Image](images/U001.jpg) Web Service Client* as shown in [Figure 31-6](#Chapter31.html#fig_31_6).\n\
    \n![Image](images/3106.jpg)\n\n***Figure 31-6.** Creating a web service client*\n\
    \nPass the URL of the WSDL file to the wizard (see [Figure 31-6](#Chapter31.html#fig_31_6)).\
    \ You can do that by simply choosing *Browse…* in the web service projects menu.\
    \ Specify a package name and finish the wizard so the web service client classes\
    \ are automatically created out of the information of the WSDL file. Create a\
    \ JAR file out of this client with *Build*. In the next section, you will see\
    \ that the JAR file will be integrated in the NetBeans Platform application."
  raw: '### Web Service


    This section will deal with creating a web service interface that functions to
    some extent as a communication layer to call the EJBs. There are two ways to create
    a web service. It can either be implemented in a EJB module so it represents a
    session bean or, if implemented in a web application, you can implement the web
    service as a session bean with a web service interface or as a plain web service.


    In this example the web service will be integrated into the already existing EJB
    module. Surely, you could also create a new EJB module for this purpose. However,
    in that case it is necessary to create a local interface for both `ProductBean`
    and `CartBean.` That way, the web service can refer to the EJBs. Add a web service
    to the EJB module with *File ![Image](images/U001.jpg) New File… ![Image](images/U001.jpg)
    Web Services ![Image](images/U001.jpg) Web Service*. Call it *OrderService* and
    add it to the package `com.galileo.netbeans.service`. As you can see, the web
    service must be created as a stateless session bean in this kind of container,
    which is just an additional annotation in the implementation. (See [Figure 31-4](#Chapter31.html#fig_31_4).)


    ![Image](images/3104.jpg)


    ***Figure 31-4.** Creating a web service class as a stateless session bean*


    Now add references of both beans to the basic structure of the web service. Because
    of *Dependency Injection* this is quite simple, but you can use the advantages
    of the code wizard. Thus, press *Alt+Insert* and choose *Call Enterprise Bean*.
    Then you can choose the desired EJB in the selection dialog. This way you create
    references to a `ProductBean` as well as to a `CartBean` object, as depicted in
    [Listing 31-4](#Chapter31.html#list_31_4). In the same easy way, with the code
    wizard (with *Add Web Service Operation…*) you add the desired web service methods,
    which will finally be available in your NetBeans Platform application. (See [Figure
    31-5](#Chapter31.html#fig_31_5).)


    ![Image](images/3105.jpg)


    ***Figure 31-5.** Adding web service methods with the code wizard*


    Add the annotation `@WebService` to the web service and give the annotation a
    name. Both EJB references will automatically be initialized by the EJB container
    at runtime.


    ***Listing 31-4.** Implementation of Web Services As Façade for EJBs*


    `import com.galileo.netbeans.beans.CartBean;`

    `import com.galileo.netbeans.beans.ProductBean;`

    `import com.galileo.netbeans.entities.Product;`

    `import java.util.List;`

    `import javax.ejb.EJB;`

    `import javax.jws.Oneway;`

    `import javax.jws.WebService;`

    `import javax.jws.WebMethod;`

    `import javax.jws.WebParam;`

    `import javax.ejb.Stateless;`


    `@`**`WebService`**`(serviceName = "`**`OrderService`**`") @Stateless`

    `public class` **`OrderService`** `{`

    `   @`**`EJB`**

    `private` **`ProductBean`** `productBean;`

    `   @`**`EJB`**

    `private` **`CartBean`** `cartBean;`


    `   @WebMethod(operationName = "addProductToCart")`

    `   @Oneway`

    `public void` **`addProductToCart`**`(`

    `      @WebParam(name = "product") Product product) {`

    `      cartBean.addProduct(product);`

    `   }`


    `   @WebMethod(operationName = "getSumOfCart")`

    `public Double` **`getSumOfCart`**`() {`

    `      return cartBean.getSum();`

    `   }`


    `   @WebMethod(operationName = "getAmountOfCart")`

    `public Integer` **`getAmountOfCart`**`() {`

    `      return cartBean.getAmount();`

    `   }`


    `   @WebMethod(operationName = "getProducts")`

    `public List<Product>` **`getProducts`**`() {`

    `      return productBean.getProducts();`

    `   }`


    `   @WebMethod(operationName = "addProduct")`

    `   @Oneway`

    `public void` **`addProduct`**`(`

    `      @WebParam(name = "product") Product product) {`

    `      productBean.addProduct(product);`

    `   }`

    `}`


    Now you have equipped two enterprise beans with a web service interface. A web
    service is described by a WSDL file, and on the basis of a WSDL file a web service
    client is created. However, you do not have to create the WSDL file, because the
    GlassFish server creates it on demand. So you just have to deploy the EJB module
    with the web service on the server. Choose *Deploy* in the context menu of the
    referring project. Make sure the database server is started besides the GlassFish
    server so that the web service calls can be executed successfully.


    ### Web Service Client


    You cannot create a web service client directly in a NetBeans Platform application
    if you want to use it instead of a Java EE application client. For this a normal
    Java project is needed. In the simplest case, just create a Java class library
    project with *File ![Image](images/U001.jpg) New Project… ![Image](images/U001.jpg)
    Java ![Image](images/U001.jpg) Java Class Library*. Add a web service client to
    it with *File ![Image](images/U001.jpg) New File… ![Image](images/U001.jpg) Web
    Services ![Image](images/U001.jpg) Web Service Client* as shown in [Figure 31-6](#Chapter31.html#fig_31_6).


    ![Image](images/3106.jpg)


    ***Figure 31-6.** Creating a web service client*


    Pass the URL of the WSDL file to the wizard (see [Figure 31-6](#Chapter31.html#fig_31_6)).
    You can do that by simply choosing *Browse…* in the web service projects menu.
    Specify a package name and finish the wizard so the web service client classes
    are automatically created out of the information of the WSDL file. Create a JAR
    file out of this client with *Build*. In the next section, you will see that the
    JAR file will be integrated in the NetBeans Platform application.'
  trans: '

    ### Web 服务


    本节将介绍如何创建一个 Web 服务接口，该接口在一定程度上充当通信层来调用 EJB。创建 Web 服务有两种方式。它可以实现在 EJB 模块中，从而作为一个会话
    Bean；或者，如果实现在 Web 应用程序中，你可以将 Web 服务实现为带有 Web 服务接口的会话 Bean，或者实现为一个普通的 Web 服务。


    在本示例中，Web 服务将被集成到已有的 EJB 模块中。当然，你也可以为此目的创建一个新的 EJB 模块。不过，在这种情况下，需要为 `ProductBean`
    和 `CartBean` 都创建一个本地接口。这样，Web 服务才能引用这些 EJB。通过 *文件 ![Image](img/U001.jpg) 新建文件…
    ![Image](img/U001.jpg) Web 服务 ![Image](img/U001.jpg) Web 服务* 向 EJB 模块添加一个 Web
    服务。将其命名为 *OrderService*，并添加到包 `com.galileo.netbeans.service` 中。如你所见，在此类容器中，Web
    服务必须创建为一个无状态会话 Bean，这只是在实现中添加一个额外的注解。（参见图 31-4。）


    ![Image](img/3104.jpg)


    ***图 31-4.** 将 Web 服务类创建为无状态会话 Bean*


    现在，将两个 Bean 的引用添加到 Web 服务的基本结构中。由于*依赖注入*，这非常简单，但你也可以利用代码向导的优势。因此，按下 *Alt+Insert*
    并选择 *调用企业 Bean*。然后在选择对话框中选择所需的 EJB。通过这种方式，你可以创建对 `ProductBean` 和 `CartBean` 对象的引用，如清单
    31-4 所示。同样简单的方式是，使用代码向导（通过 *添加 Web 服务操作…*）添加所需的 Web 服务方法，这些方法最终将在你的 NetBeans Platform
    应用程序中可用。（参见图 31-5。）


    ![Image](img/3105.jpg)


    ***图 31-5.** 使用代码向导添加 Web 服务方法*


    向 Web 服务添加注解 `@WebService` 并为其命名。两个 EJB 引用将在运行时由 EJB 容器自动初始化。


    ***清单 31-4.** 将 Web 服务实现为 EJB 的门面*


    `import com.galileo.netbeans.beans.CartBean;`

    `import com.galileo.netbeans.beans.ProductBean;`

    `import com.galileo.netbeans.entities.Product;`

    `import java.util.List;`

    `import javax.ejb.EJB;`

    `import javax.jws.Oneway;`

    `import javax.jws.WebService;`

    `import javax.jws.WebMethod;`

    `import javax.jws.WebParam;`

    `import javax.ejb.Stateless;`


    `@`**`WebService`**`(serviceName = "`**`OrderService`**`") @Stateless`

    `public class` **`OrderService`** `{`

    `   @`**`EJB`**

    `private` **`ProductBean`** `productBean;`

    `   @`**`EJB`**

    `private` **`CartBean`** `cartBean;`


    `   @WebMethod(operationName = "addProductToCart")`

    `   @Oneway`

    `public void` **`addProductToCart`**`(`

    `      @WebParam(name = "product") Product product) {`

    `      cartBean.addProduct(product);`

    `   }`


    `   @WebMethod(operationName = "getSumOfCart")`

    `public Double` **`getSumOfCart`**`() {`

    `      return cartBean.getSum();`

    `   }`


    `   @WebMethod(operationName = "getAmountOfCart")`

    `public Integer` **`getAmountOfCart`**`() {`

    `      return cartBean.getAmount();`

    `   }`


    `   @WebMethod(operationName = "getProducts")`

    `public List<Product>` **`getProducts`**`() {`

    `      return productBean.getProducts();`

    `   }`


    `   @WebMethod(operationName = "addProduct")`

    `   @Oneway`

    `public void` **`addProduct`**`(`

    `      @WebParam(name = "product") Product product) {`

    `      productBean.addProduct(product);`

    `   }`

    `}`


    现在，你已经为两个企业 Bean 配备了 Web 服务接口。Web 服务由 WSDL 文件描述，并且基于 WSDL 文件创建 Web 服务客户端。不过，你无需创建
    WSDL 文件，因为 GlassFish 服务器会按需生成它。因此，你只需将包含 Web 服务的 EJB 模块部署到服务器上。在相关项目的上下文菜单中选择
    *部署*。确保数据库服务器与 GlassFish 服务器一起启动，以便 Web 服务调用能够成功执行。


    ### Web 服务客户端


    如果你想在 NetBeans Platform 应用程序中使用 Web 服务客户端，而不是 Java EE 应用程序客户端，则无法直接在其中创建它。这需要一个普通的
    Java 项目。最简单的情况下，只需通过 *文件 ![Image](img/U001.jpg) 新建项目… ![Image](img/U001.jpg) Java
    ![Image](img/U001.jpg) Java 类库* 创建一个 Java 类库项目。然后通过 *文件 ![Image](img/U001.jpg)
    新建文件… ![Image](img/U001.jpg) Web 服务 ![Image](img/U001.jpg) Web 服务客户端* 向其添加一个 Web
    服务客户端，如图 31-6 所示。


    ![Image](img/3106.jpg)


    ***图 31-6.** 创建 Web 服务客户端*


    将 WSDL 文件的 URL 传递给向导（参见图 31-6）。你可以通过在 Web 服务项目菜单中简单地选择 *浏览…* 来完成此操作。指定一个包名并完成向导，这样
    Web 服务客户端类就会根据 WSDL 文件中的信息自动创建。使用 *构建* 从此客户端创建一个 JAR 文件。在下一节中，你将看到该 JAR 文件将被集成到
    NetBeans Platform 应用程序中。

    '
- fmt: "### NetBeans Platform Application\n\nAssuming you have already created a NetBeans\
    \ Platform application, add a library wrapper module to which you add the already\
    \ created JAR file with the web service client. In addition, create an application\
    \ module with a dependency on the integrated web service client module. First,\
    \ add an action, which adds products to the database as test, to the application\
    \ module (see [Listing 31-5](#Chapter31.html#list_31_5)).\n\n**Listing 31-5.**\
    \ Adding Test Products\n\n```\nimport com.galileo.netbeans.client.OrderService;\n\
    import com.galileo.netbeans.client.OrderService_Service;\nimport com.galileo.netbeans.client.Product;\n\
    …\npublic final class CreateProducts implements ActionListener {\n   @Override\n\
    \   public void actionPerformed(ActionEvent e) {\nOrderService_Service service\
    \ = new OrderService_Service();\nOrderService port = service.getOrderServicePort();\n\
    \      Product p1 = new Product();\n      p1.setName(\"Product 1\");\n      p1.setOrderId(\"\
    P1\");\n      p1.setPrice(2.99);\n      Product p2 = new Product();\n      p2.setName(\"\
    Product 2\");\n      p2.setOrderId(\"P2\");\n      p2.setPrice(3.99);\n      …\n\
    \      port.addProduct(p1);\n      port.addProduct(p2);\n    }\n}\n```\n\nNow\
    \ you need a top component that contains a table in which all available products\
    \ can be listed (see [Figure 31-7](#Chapter31.html#fig_31_7)).\n\n![Image](images/3107.jpg)\n\
    \n**Figure 31-7.** NetBeans Platform application for the demonstration of accessing\
    \ the EJBs by web services\n\nYou do not have to create the `OrderService` object\
    \ yourself. Instead the already created `OrderService_Service` class gives you\
    \ an instance with the method `getOrderServicePort()` (see [Listing 31-6](#Chapter31.html#list_31_6)).\
    \ Then you can execute the server side–implemented methods as completely transparent\
    \ on this instance. By clicking the *Reload* button all products should be selected\
    \ and added to the table. With *Add to Cart* all selected products will be transferred\
    \ to the `CartBean`. Simultaneously, the current sum and the quantity of products\
    \ will be requested from the `CartBean`.\n\n**Listing 31-6.** Read Data with the\
    \ Web Service from the Server and Restore It\n\n```\nimport com.galileo.netbeans.client.OrderService;\n\
    import com.galileo.netbeans.client.OrderService_Service;\nimport com.galileo.netbeans.client.Product;\n\
    …\npublic final class OrderTopComponent extends TopComponent {\nprivate OrderService_Service\
    \ service = new OrderService_Service();\n   private OrderService port;\n\n   public\
    \ OrderTopComponent() {\n      …\nport = service.getOrderServicePort();\n   }\n\
    \n   private void addToCartActionPerformed(ActionEvent evt) {\n      if (tableView.getSelectedRowCount()\
    \ > 0) {\n         port.addProductToCart(tableModel.getRow(tableView.getSelectedRow()));\n\
    \         cartSum.setText(port.getSumOfCart() + \" \");\ncartAmount.setText(\"\
    \" + port.getAmountOfCart());\n      }\n   }\n\n   private void reloadProductsActionPerformed(ActionEvent\
    \ evt) {\n      tableModel.getList().clear();\n      tableModel.getList().addAll(port.getProducts());\n\
    \      tableModel.fireTableDataChanged();\n   }\n}\n```\n\nSo now an application\
    \ example has been created with which EJBs can be addressed out of the context\
