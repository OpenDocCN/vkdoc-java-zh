  trans: '

    ### 设计


    本质上，你的应用程序应能够播放 MP3 文件，在播放列表中管理这些文件，并显示相关的 ID3 信息。此外，你还希望支持通过应用程序对 ID3 信息进行简单的编辑和添加。使用
    NetBeans 平台的“收藏夹”模块作为 MP3 库。例如，借助“面板”模块，你可以管理整个 MP3 专辑。你还可以使用“输出”模块在处理 ID3 任务时向用户提供反馈。该应用程序的一大优势在于其易于扩展，这得益于
    NetBeans 平台基于模块的架构。然而，同样需要精心设计的架构和应用程序结构，因此你必须考虑要提供的功能以及粒度，也就是说，你必须提前考虑需要多少个模块来完成这项工作。为了提供合适的接口和扩展点，你还必须考虑应用程序在哪些方面以及如何需要最大的可扩展性。然后，你使用相应的接口和扩展点来创建必要的接口。


    在图 44-1 中，你可以看到应用程序的结构，其中包含 NetBeans 平台以及底层的 Java 平台。实际的应用程序部分，在图 44-1 中用 *MP3
    管理器* 标记，大致可以分为三层：


    *   最底层包含将成为应用程序组成部分的模块，包括图形用户界面，例如导航器列表、用于 MP3 文件的 Java Sound SPI 实现，以及数据库系统
    Java DB。你希望在应用程序内部将 Java DB 用于不同目的。

    *   在中间层，你封装服务接口。这一层有助于解耦应用程序组件，因为这些组件不再直接依赖于彼此的实现，在大多数情况下仅依赖于所提供的接口。

    *   第三层基于第二层，实现应用程序的组件，使用独立模块提供实际功能。


    所有模块及其各自的职责如下所列（稍后，你将逐步创建并实现其中一些模块）：


    *   *核心*：在此模块中，可以提供应用程序重要且不可或缺的组件（使用应用程序所必需的组件）。

    *   *核心 UI*：你在此模块中封装额外的用户界面。

    *   *JMF 插件*：在此模块中，你封装 Java Media Framework 和 MP3 实现的 Java Sound SPI，后者由 Sun 以
    JAR 存档形式提供。播放 MP3 编码的音频数据需要 Java Sound SPI。

    *   *Java DB*：通过此模块，你集成数据库系统 Java DB。

    *   *服务*：你在此模块中定义服务接口，以便应用程序提供的服务可以动态扩展。

    *   *播放器*：此模块提供一个带有图形用户界面的 MP3 播放器。

    *   *播放列表*：通过此模块，MP3 文件可以在不同的列表中进行管理，从而提供给播放器。

    *   *ID3 API*：包含用于读取和写入 MP3 文件 ID3 信息的 API。

    *   *收藏夹品牌化*：调整“收藏夹”模块的菜单项。

    *   *属性品牌化*：调整“属性”模块的菜单项。

    *   *数据库搜索器*：这是一个服务提供者，你可以用它来在数据库中搜索 MP3 文件。

    *   *文件系统搜索器*：这是一个服务提供者，你可以用它来在硬盘驱动器上搜索 MP3 文件。

    *   *搜索器 UI*：此模块为使用搜索 MP3 的服务提供者提供用户界面。

    *   *索引器*：此模块自动指示位于硬盘驱动器上的 MP3 文件。借助它，可以使用不同标准快速找到 MP3 文件。


    ![图片](img/4401.jpg)


    ***图 44-1.** 将应用程序组件划分为模块*


    ### 创建 NetBeans 平台应用程序


    每个 NetBeans 富客户端应用程序的基础是一个 *NetBeans 平台应用程序项目*。该项目代表整个应用程序，并包含各个模块。应用程序品牌化（即应用程序命名、启动画面等）也通过
    NetBeans 平台应用程序项目进行。NetBeans IDE 提供了一个用于创建此类项目的向导。你可以通过 *文件 ![图片](img/U001.jpg)
    新建项目* 调用此向导。然后，在 *NetBeans 模块* 下选择项目类型 *NetBeans 平台应用程序*。按 *下一步* 进入下一页，你可以在其中输入项目名称。这次你选择
    *MP3 管理器*。通过单击 *完成*，平台应用程序即创建完成。你可以在品牌化对话框中专门调整应用程序的外观以适应产品，该对话框可以通过平台应用程序上下文菜单中的
    *品牌化…* 调用。在那里，你还可以调整标题、不同的图标和启动画面等。


    现在你已经为应用程序创建了基础，可以继续处理各个模块，即应用程序的组件。


    ### 对 MP3 的支持


    为了在你的播放器模块中支持播放 MP3 文件，请使用 *Java Media Frameworks* (JMF) 和一个 MP3 插件。*MP3 插件* 是用于
    MP3 文件的 Java Sound API（它是 Java 平台的一部分）的一个实现。基本上，这个插件足以播放 MP3，但借助 JMF 实现会容易得多。你为这两个组件（JMF
    和 MP3 插件）创建一个 *库包装器模块*，以便将这两个库集成到你的应用程序中。


    #### 创建 JMF 模块


    从 [`http://www.oracle.com/technetwork/java/javase/tech`](http://www.oracle.com/technetwork/java/javase/tech)
    下载跨平台版本的 JMF 以及 MP3 插件。（你也可以在 Apress 网站 [`www.apress.com`](http://www.apress.com)
    上本书的源代码/下载区域找到这两个组件。）将 JMF 发行版中的 JAR 存档 *lib/jmf.jar* 和 MP3 插件发行版中的 *lib/ext/mp3plugin.jar*
    复制到一个目录中。之后你可以将两者添加到一个模块中。调用 *文件 ![图片](img/U001.jpg) 新建项目... ![图片](img/U001.jpg)
    NetBeans 模块 ![图片](img/U001.jpg) 库包装器模块*。通过 *浏览* 添加你复制到目录中的两个 JAR 存档（按住 *Ctrl*
    键以选择两个存档）。在向导的下一页输入 *JMF 插件* 作为项目名称，并选择已创建的 NetBeans 平台应用程序。在下一页通过 `javax.media`
    确定模块的 *代码名称基*。最后，按 *完成*，包装器模块即创建完成并添加到 MP3 管理器中。

    '
- fmt: "### Registering the MP3 Plugin\n\nBear in mind that the MP3 plugin is not\
    \ immediately provided to the JMF; you must register this plugin at the `PlugInManager`\
    \ of the JMF so it can be used. Pass the task to a *Module* *Installer* (you can\
    \ find more about this in [Chapter 3](#Chapter03.html#ch3)) in order to ensure\
    \ that the plugin is always registered. The module installer is executed when\
    \ loading the JMF plugin. Create the module installer via *File ![Image](images/U001.jpg)\
    \ New File ![Image](images/U001.jpg) Module Development ![Image](images/U001.jpg)\
    \ Installer / Activator*. Press *Finish* in the dialog that appears to create\
    \ the installer. You implement the necessary registration for the `PlugInManager`\
    \ in the `restored()` method. You must indicate the plugin's class, the input\
    \ and output formats, and the plugin's type. Of course, in this case it is a codec\
    \ plugin. Next, insert the following lines as shown in [Listing 44-1](#Chapter44.html#list_44_1).\n\
    \n***Listing 44-1.** Registering the MP3 Plugin at the JMF Plugin Manager During\
    \ Startup*\n\n```\npackage javax.media;\nimport javax.media.format.AudioFormat;\n\
    import org.openide.modules.ModuleInstall;\n\npublic class Installer extends ModuleInstall\
    \ {\n   public void restored() {\n         Format input1 = new AudioFormat(AudioFormat.MPEGLAYER3);\n\
    \         Format input2 = new AudioFormat(AudioFormat.MPEG);\n         Format\
    \ output = new AudioFormat(AudioFormat.LINEAR);\n         PlugInManager.addPlugIn(\n\
    \                 \"com.sun.media.codec.audio.mp3.JavaDecoder\",\n           \
    \      new Format[]{input1, input2},\n                 new Format[]{output},\n\
    \                 PlugInManager.CODEC);\n      }\n}\n```\n\n### MP3 File Type\n\
    \nAnother important base for easy-to-use and professional management of MP3 files\
    \ within your application is a so-called MP3 file type. A *file type* is a concept\
    \ of the NetBeans Platform which is used to manage files of a particular type.\
    \ It consists of three main parts. First, there is a `FileObject`, which basically\
    \ represents a wrapper for a `File`. Thus, it represents the concrete physical\
    \ MP3 file. Based on this, there is a `DataObject`, which extends the `FileObject`\
    \ by properties and functionalities in a flexible manner. The third component\
    \ is a `Node` object, which is used to graphically represent a `DataObject` at\
    \ the user interface that includes the ability to accept actions. More information\
    \ related to this can be found in the [Chapters 7](#Chapter07.html#ch7) and [12](#Chapter12.html#ch12).\n\
    \nNormally, the MP3 file type belongs to the core functionality of your MP3 manager,\
    \ which means you could manage the MP3 file type in the Core module. For more\
    \ flexibility and to avoid cyclic dependencies, however, you should create a separate\
    \ module for the MP3 file type. To do this, call *File ![Image](images/U001.jpg)\
    \ New Project... ![Image](images/U001.jpg) NetBeans Modules ![Image](images/U001.jpg)\
    \ Module*. Assign *File Type* as name and `com.hboeck.mp3manager.filetype` as\
    \ code name base. You can leave the remaining values. Clicking the *Finish* button\
    \ closes the wizard and creates the module.\n\nThe components of a file type are\
    \ created completely by the file type wizard which in turn is provided by the\
    \ IDE. Call this wizard via *File ![Image](images/U001.jpg) New File ![Image](images/U001.jpg)\
    \ Module Development ![Image](images/U001.jpg) File Type*. You use `audio/mpeg`\
    \ as MIME type for MP3s, and of course, assign `mp3` for the extension. On the\
    \ next page, you enter `Mp3` as the prefix for the class to create, and you can\
