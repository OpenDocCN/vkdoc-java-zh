    \ both with a Visual Panel and a Wizard Panel. However, you will adapt the content\
    \ of some predefined methods.\n\nFirst, create the user interface of the first\
    \ panel—this is the class `PlaylistVisualPanel1`—in the NetBeans Form Editor.\
