- fmt: '### Design


    Essentially, your application should be able to play MP3 files, manage those files
    in playlists, and display the relevant ID3 information. Furthermore, you want
    to enable simple editing and addition of ID3 information via the application.
    Use the `Favorites` module of the NetBeans Platform as an MP3 library. Using the
    `Palette` module, you could manage entire MP3 albums, for example. You could also
    use the `Output` module to give feedback to the user while processing ID3 jobs.
    The great advantage of the application is its easy extensibility, due to the module-based
    architecture of the NetBeans Platform. However, a well-designed architecture and
    application structure is also required, so you must think about the functionalities
    you want to provide as well as the granularity, meaning you must think about how
    many modules are required to do the job in advance. To provide proper interfaces
    and extension points, you also have to think about where and how the application
    needs to be most extensible. You then create the necessary interfaces using the
    appropriate interfaces and extension points.


    In [Figure 44-1](#Chapter44.html#fig_44_1) you see the structure of the application
    containing the NetBeans Platform and also the underlying Java Platform. The actual
    application part, which is marked in [Figure 44-1](#Chapter44.html#fig_44_1) with
    *MP3 Manager*, can be roughly divided into three layers:


    - The lowest layer contains modules which will be integral parts of the application,
    containing graphical user-interfaces such as a navigator list, an implementation
    of the Java Sound SPI for MP3 files, and the database system Java DB. You want
    to use Java DB for different purposes within the application.

    - In a middleware layer you encapsulate service interfaces. This layer facilitates
    decoupling of the application components, because these components no longer directly
    depend on each other''s implementation, but in most cases only on the provided
    interfaces.

    - The third layer, based on the second, implements the application''s components,
    providing actual functionality using the independent modules.


    All modules and their respective responsibilities are listed in the following
    (later, you will create and implement some of them, step by step):


    - *Core*: In this module, important and integral components of the application
    (which are mandatory for using the application) could be provided.

    - *Core UI*: You encapsulate additional user interfaces in this module.

    - *JMF-Plugin*: In this module, you encapsulate the Java Media Framework and the
    MP3 implementation of the Java Sound SPI, which is provided by Sun in the form
    of a JAR archive. The Java Sound SPI is required for playing MP3-coded audio data.

    - *Java DB*: With this module, you integrate the database system Java DB.

    - *Services*: You define service interfaces in this module, so the services provided
    by the application can be expanded dynamically.

    - *Player*: This module provides an MP3 player with GUI.

    - *Playlist*: With this module, MP3 files can be managed in different lists and
    thus be provided to the player.

    - *ID3 API*: Contains an API for reading and writing the ID3 information of MP3
    files.

    - *Favorites Branding*: Adapts the menu entries of the `Favorites` module.

    - *Properties Branding*: Adapts the menu entries of the `Properties` module.

    - *Database Searcher*: This is a service provider with which you can search for
    MP3 files in a database.

    - *Filesystem Searcher*: This is a service provider with which you can search
    for MP3 files on the hard disk drive.

    - *Searcher UI*: This module provides a user interface for using the service provider
    searching MP3s.

    - *Indexer*: This module automatically indicates MP3 files that are located on
    the hard disk drive. With it MP3 files can be found quickly using different criteria.


    ![Image](images/4401.jpg)


    ***Figure 44-1.** Partitioning of application components into modules*


    ### Creating a NetBeans Platform Application


    The base of each NetBeans rich client application is a *NetBeans Platform Application*
    *project*. This project represents the application as a whole and contains the
    separate modules. Application branding (meaning naming of the application, splash
    screen, etc.) also occurs via the NetBeans Platform Application project. The NetBeans
    IDE provides a wizard for creating such a project. You can call this wizard via
    *File ![Image](images/U001.jpg) New Project*. Then, select the project type *NetBeans
    Platform Application* under *NetBeans Modules*. Press *Next* to get to the next
    page where you can enter a project name. You choose *MP3 Manager* this time. By
    clicking *Finish*, the Platform application is created. You can specifically adapt
    the appearance of your application to the product in the branding dialog which
    you can call via *Branding…* in the context menu of the Platform application.
    There, you can also adapt the title, different icons, and the splash screen, among
    other things.


    So now that you have created the basis for your application, you can go on to
    the separate modules, meaning the application''s components.


    ### Support for MP3


    To support playing MP3 files in your player module, use *Java Media Frameworks*
    (JMF) and an MP3 plugin. The *MP3 Plugin* is an implementation of the Java Sound
    API (which is part of the Java Platform) for MP3 files. Basically, this plugin
    would be sufficient for playing MP3s, but with the assistance of the JMF implementation
    it is much easier. You create a *library wrapper module* for the two components,
    the JMF and the MP3 plugin, in order to integrate those two libraries into your
    application.


    #### Creating the JMF Module


    Download the JMF as a cross-platform edition as well as the MP3 plugin from [`http://www.oracle.com/technetwork/java/javase/tech`](http://www.oracle.com/technetwork/java/javase/tech).
    (You will also find both components in the Source Code/Download area for this
    book on the Apress web site at [`www.apress.com`](http://www.apress.com).) Copy
    both the JAR archive `lib/jmf.jar` from the JMF distribution, and `lib/ext/mp3plugin.jar`
    from the MP3 plugin distribution, into a directory. You can add both to a module
    afterwards. Call *File ![Image](images/U001.jpg) New Project... ![Image](images/U001.jpg)
    NetBeans Modules ![Image](images/U001.jpg) Library Wrapper Module*. Add both JAR
    archives which you copied in a directory (hold the *Ctrl* key, to select both
    archives) with *Browse*. Enter *JMF Plugin* as project name on the next page of
    the wizard and choose the NetBeans Platform application that had been created.
    Determine the *Code Name Base* of the modules via `javax.media` on the following
    page. Finally, press *Finish*, so the wrapper module is created and added to the
    MP3 manager.'
