    ***图 13-8.** 向导描述符、向导面板和可视面板之间的交互。*


    在启动向导的动作类的 `actionPerformed()` 方法中，创建了一个 `PlaylistWizardDescriptor` 实例。此描述符生成其面板，并为每个面板注册一个
    `ChangeListener`，以便在面板状态发生变化时得到通知。然后通过向导面板的 `getComponent()` 方法获取可视面板。此方法按需创建可视面板，并注册一个
    `PropertyChangeListener`，以获知用户所做的更改。向导描述符通过 `ChangeListener` 观察其面板的状态，而该 `ChangeListener`
    又通过 `PropertyChangeListener` 观察可视面板的状态。


    当用户在由视图通过监听器监控的字段中输入数据时，会触发一个 `PropertyChangeEvent`，通知向导面板数据已更改。向导面板通过 getter
    方法检索数据，然后验证接收到的数据。根据验证结果，设置面板的状态。


    如果状态发生变化，会触发一个 `ChangeEvent`，通知向导描述符，该描述符通过调用 `isValid()` 方法验证面板状态。根据 `isValid()`
    方法的值，向导描述符会激活或停用向导中的按钮。

