- fmt: '### Adding a Library to a Module


    It is advisable to always use a library wrapper module when integrating a library
    into an application, as seen in the preceding section. Creating a new module in
    this way for a third-party library adds to the value and maintainability of the
    application as a whole, because you can then set dependencies on the library with
    the module that wraps it. In some cases, it can be desirable to add a library
    to the existing module (your own application module). To do this is simple and
    works similarly to creating a library wrapper module.


    To add a library, open the features of the desired module with *Properties* in
    the context menu. In the category *Libraries,* in which dependencies on other
    modules are defined, you find the tab *Wrapped JARs* on the right side. There
    you can add the wanted library with the *Add JAR* button.


    Doing so, a `class-path-extension` entry is added to the *Project Metadata* file
    for each library. The path defined by the `runtime-relative-path` attribute is
    the path within which the library is located in the distribution (this is where
    it is automatically copied when creating the module). The location where the original
    of the library is located is specified by the `binary-origin` attribute. As you
    can see, it is the same directory as with the library wrapper modules. (See [Listing
    3-11](#Chapter03.html#list_3_11).)


    ***Listing 3-11.** Project Metadata File with Class Path Extension*


    ```

    <class-path-extension>

    <runtime-relative-path>ext/com-hboeck-mp3.jar</runtime-relative-path>

    <binary-origin>release/modules/ext/com-hboeck-mp3.jar</binary-origin>

    </class-path-extension>

    ```


    With this entry into the project metadata file the library is copied into the
    *ext/* directory and is added to the manifest of the module with the entry `Class-Path:
    ext/com-hboeck-mp3.jar` when creating the module. In contrast to a library wrapper
    module, the packages of the library are not exposed. As a result, they can only
    be used by the module. (In most cases, this is the reason for the direct addition
    of the library: it should not be made public). It is also possible to define the
    packages of the library as being public, which is automatically the case with
    a library wrapper module.


    **WHEN TO USE WHICH APPROACH?**


    Bear in mind that you should create a library wrapper module of a library whenever
    possible rather than directly adding libraries because of modularity and maintainability.
    As a rule, only add a library to a module directly, when the library is solely
    used by this module and if it is not a problem to distribute the library together
    with the module that uses it. Furthermore, note that you cannot load the same
    library from two different modules with the `Class-Path`. This could lead to unforeseen
    problems. Also, do not try to use the `Class-Path` attribute to refer to the module
    JAR archives or to libraries found in the NetBeans *lib/* directory.


    ### Reusing Modules


    Usually, you create a NetBeans platform application project for applications which
    are not that big, then add the whole logic of the application to this project
    in the form of modules. In case you then want to implement, for example, a big
    application for enterprises in a team, it can be useful to break down the application
    into multiple parts, each containing an amount of modules. For this purpose, the
    NetBeans IDE offers the opportunity to add both a single module or a complete
    cluster (folder with NetBeans modules) as dependency. So if you develop, for example,
    a series of base modules, whose functionality you want to use in multiple applications,
    it is best to use a module suite.


    You can create a module suite with *File ![Image](images/U001.jpg) New Project…
    ![Image](images/U001.jpg) NetBeans Modules*. Within this module suite you can
    develop and test your base modules encapsulated from special application modules.
    Starting the build process of your modules, all modules are stored in a cluster.
    Then you can add this cluster to another NetBeans Platform project as follows:
    call *Properties ![Image](images/U001.jpg) Libraries* in the desired application.
    There, you find the button *Add Cluster…* (see [Figure 3-13](#Chapter03.html#fig_3_13))
    with which you can select the cluster of the module suite.


    ![Image](images/0313.jpg)


    ***Figure 3-13.** Adding a complete cluster for reusing external modules.*


    If you did not select a real cluster, the NetBeans IDE asks you to select the
    desired modules of the folder, and then creates a respective cluster. This means
    the NetBeans IDE automatically creates a cluster from a folder with modules.


    Now, you can access further NetBeans modules from different NetBeans Platform
    applications with the possibility of reusing modules, as described. This way,
    you can, for example, implement your generic modules centrally, independent from
    special applications.


    **MODULE SUITE VS. NETBEANS PLATFORM APPLICATION**


    This book is primarily about developing independent applications based on the
    NetBeans Platform. This is why it constantly uses the *NetBeans Platform Application*
    project type to create an application in the following chapters. For this project
    type only the NetBeans Platform modules are provided, by default, since it will
    become an independent application and not an extension of the NetBeans IDE. However,
    you have the possibility of accessing any modules of the NetBeans IDE. For this
    purpose, call *Properties ![Image](images/U001.jpg) Libraries* in your NetBeans
    Platform application project. There you can activate the desired modules. Your
    own modules can only define dependencies on modules which are activated there.
    You can switch between a NetBeans Platform application and a module suite anytime
    under *Properties ![Image](images/U001.jpg) Libraries*. The branding support and
    creating an installer are logically just provided with a NetBeans Platform application.


    ### Summary


    In this chapter you learned how the underlying module system of NetBeans Platform
    applications is structured and how it functions. The module system is part of
    the runtime container. First, we looked at the structure of a NetBeans module.
    You learned about the many configuration options that are defined in the manifest
    file. In addition to the manifest file, a module optionally provides a layer file.
    You learned how to make contributions to the whole application, via registration
    entries in a module layer file.


    You created your first module, learned how modules use code from other modules,
    and explored the lifecycle of modules and how third-party libraries integrate
    in a module via a library wrapper module. Finally, you discovered how those kinds
    of modules work, and you got some hands on experience with them.


    ## Chapter 4: The OSGi Framework


    The OSGi Framework provides a modular runtime environment. An application built
    on the OSGi Framework is developed in a modular way—in the form of *bundles*—so
    the OSGi Framework is comparable to the module system of the NetBeans Platform.
    An OSGi bundle matches the principle of a NetBeans module. The OSGi Framework
    has been widely adopted because of its standardization by a consortium of companies.
    By now, it is accepted as an official dynamic component model for Java through
    the Java community process as JSR 291.


    However, this chapter will not discuss the OSGi Framework in too much detail (there
    is plenty of information specific to OSGi already available). Instead, it will
    demonstrate the possibilities of OSGi connected with the NetBeans Platform.'
