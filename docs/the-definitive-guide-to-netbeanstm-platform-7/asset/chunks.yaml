    请注意，此模块需要依赖 Dialogs API 才能使用 NetBeans 对话框支持。依赖关系的定义已在*版本控制与依赖关系*一节中描述，而关于 Dialogs
    API 的信息可在第 13 章中找到。


    要尝试此新功能，请调用*运行 ![Image](img/U001.jpg) 运行主项目 (F6)*。当应用程序关闭时，将显示该对话框，你可以确认是否真的应该关闭应用程序。


    ### 模块注册表


    模块通常不需要关心其他模块，也不需要知道其他模块是否存在。然而，有时可能需要创建所有可用模块的列表。模块系统为每个模块提供了一个`ModuleInfo`类，其中存储了关于模块的所有信息。`ModuleInfo`对象可通过
    Lookup 集中获取，获取方式如下：


    `Collection<? extends` **`ModuleInfo`**`> modules = Lookup.getDefault().lookupAll(`**`ModuleInfo`**`.class);`


    该类提供的信息包括模块名称、版本、依赖关系、当前状态（已激活或已停用）以及当前模块的服务实现是否存在。使用`getAttribute()`方法可从清单文件中获取此信息。要获知变更，请注册一个`PropertyChangeListener`，它会通知你系统中模块的激活和停用情况（`ModuleInfo`对象）。你还可以注册一个`LookupListener`，它会通知你模块的安装和卸载。例如，可以像代码清单
    3-8 所示定义一个监听器。


    ***代码清单 3-8.** 响应模块系统的变更*


    `Lookup.Result<ModuleInfo>`**`result`** `= Lookup.getDefault().lookupResult(`**`ModuleInfo`**`.class);`

    **`result`**`.addLookupListener(new LookupListener() {`

    `   public void resultChanged(LookupEvent lookupEvent) {`

    `Collection<? extends` **`ModuleInfo`**`> c = result.allInstances();`

    `      System.out.println("Available modules: " + c.size());`

    `   }`

    `});`

    `result.allItems(); // 初始化监听器`


    ### 使用库


    在开发富客户端应用程序时，你很可能需要将外部库以 JAR 归档文件的形式包含在应用程序中。由于整个应用程序基于模块，因此最好将外部 JAR 文件以模块的形式集成进来。这样做的好处是可以设置对该模块的依赖关系，从而增强整个应用程序的一致性。你还可以将多个
    JAR 文件打包到一个模块中，之后就不再需要像通常开发应用程序时那样，将物理 JAR 文件放在应用程序类路径上。


    #### 库包装器模块


    要实现上述场景，请创建一个*库包装器模块*。NetBeans IDE 为此提供了一个项目类型和向导。


    1.  要创建新的库包装器项目，请转到*文件 ![Image](img/U001.jpg) 新建项目*…，然后使用图 3-11 所示的对话框，选择类别*NetBeans
    模块*，接着选择项目类型*库包装器模块*。


    ![Image](img/0311.jpg)


    ***图 3-11.** 创建库包装器模块*


    2.  点击*下一步*以选择所需的 JAR 文件。你可以在此处选择一个或多个 JAR 文件（按住 Ctrl 键可选择多个 JAR 文件）。你还可以为你正在包装为模块的
    JAR 添加许可证文件。

    3.  在下一步中，提供项目名称以及存储新模块的位置。指定该库包装器模块所属的模块套件或平台应用程序。

    4.  再次点击*下一步*以填写*基本模块配置*对话框，如图 3-12 所示。


    ![Image](img/0312.jpg)


    ***图 3-12.** 库包装器模块配置*


    5.  在此处你可以定义代码名称基。通常此字段会预填入选中的 JAR 归档文件的读取代码名称基的名称。此外，你可以为模块提供名称和本地化包，以本地化模块清单信息。点击*完成*按钮，即可创建新项目。


    当你在*项目*窗口中查看新创建的库包装器模块，并额外打开*源包*文件夹时，你会看到清单文件的*Bundle.properties*文件位于此处。被模块封装的库已被复制到项目文件夹的*release/modules/ext*目录中。


    要理解库包装器模块的工作原理，请查看位于项目结构中*重要文件*文件夹内的相关清单文件。请注意，代码清单 3-9 中描述的清单信息可能不会直接出现在清单文件中。某些信息（如公共包）仅在构建模块时（调用*构建项目*时）才会写入。要查看完整的清单文件，请创建模块，然后打开创建的模块
    JAR 归档文件（位于 NetBeans 平台应用程序的*build/cluster/modules*目录中）内的清单文件。你可以在库包装器模块属性的*API
    版本控制*下查看哪些包是公开的。在那里，你可以稍后从*公共包*列表中删除包。


    ***代码清单 3-9.** 库包装器模块的清单文件*


    `Manifest-Version: 1.0`

    `Ant-Version: Apache Ant 1.7.0`

    `Created-By: 1.6.0-b105 (Sun Microsystems Inc.)`

    `OpenIDE-Module: com.hboeck.mp3`

    **`OpenIDE-Module-Public-Packages:`**

    **`com.hboeck.mp3.*,`**

    **`com.hboeck.mp3.id3.*,`**

    **`...`**

    `OpenIDE-Module-Java-Dependencies: Java > 1.4`

    `OpenIDE-Module-Specification-Version: 1.0`

    `OpenIDE-Module-Implementation-Version: 101211`

    `OpenIDE-Module-Localizing-Bundle:`

    `   com/hboeck/mp3/Bundle.properties`

    `OpenIDE-Module-Requires: org.openide.modules.ModuleFormat1`

    **`Class-Path: ext/com-hboeck-mp3.jar`**


    向导完成了两件非常重要的事情。一方面，它使用**OpenIDE-Module-Public-Packages**属性标记了库的所有包，使所有这些包可公开访问。这很有用，因为库也应该被其他模块使用。另一方面，向导使用**Class-Path**属性标记了库（位于分发版的*ext/*目录中），将其置于模块类路径上。这样，库的类就可以被模块类加载器加载。*自动加载*类型被自动分配给库包装器模块（参见*配置文件*一节）。这样，它只在需要时被加载。

