- fmt: "# Plugin Lifecycle and Events\n\nAn Eclipse plugin may contain an *activator*.\
    \ This class extends the abstract class `Plugin` or `AbstractUIPlugin`, depending\
    \ on whether the plugin contains graphic elements or not. This optional class\
    \ serves as the conceptual representation of the plugin. Containing no application\
    \ logic, it mainly reacts to distinguished events; for instance, the methods `start()`\
    \ and `stop()` specified by the interface `BundleActivator` and implemented by\
    \ the classes `Plugin` and `AbstractUIPlugin`. The methods are called by the Eclipse\
    \ Platform when the plugin is loaded or closed. By overwriting these methods,\
    \ special platform-specific tasks can be executed at these times. An `Activator`\
    \ in its simplest form looks like that shown in [Listing 39-1](#Chapter39.html#list_39_1).\n\
    \n**Listing 39-1.** Activator Class of an Eclipse Plugin\n\n```\nimport org.eclipse.core.runtime.Plugin;\n\
    import org.osgi.framework.BundleContext;\n\npublic class Activator extends Plugin\
    \ {\n   private static Activator plugin;\n\n   public void start(BundleContext\
    \ context) throws Exception {\n      super.start(context);\n      plugin = this;\n\
    \   }\n\n   public void stop(BundleContext context) throws Exception {\n     \
    \ plugin = null;\n      super.stop(context);\n   }\n\n   public static Activator\
    \ getDefault() {\n      return plugin;\n   }\n}\n```\n\nThe counterpart to the\
    \ Eclipse plugin activator is the module installer of a NetBeans module. This\
    \ module installer is optional. The NetBeans platform instantiates an installer\
    \ during module startup. The installer extends the class `ModuleInstall` (see\
    \ [Listing 39-2](#Chapter39.html#list_39_2)).\n\nThis class specifies the methods\
    \ `restored()` and `close()`, which are equivalent to methods in the `BundleActivator`\
    \ interface. Also available are `validate()`, for the examination of the starting\
