- fmt: "### Module System\n\nFirst, you want to define declaratively which modules\
    \ should become explicitly activated or deactivated for which user group. To do\
    \ this, just extend both XML files which already exist. In the newly defined folders\
    \ any number of modules can be listed, but only those modules that are attributed\
    \ with `codeNameBase`. This way, you can indicate a unique identification of the\
    \ module (see [Listing 33-12](#Chapter33.html#list_33_12)).\n\n***Listing 33-12.**\
    \ Configuration of the Modules for the User Group User*\n\n```\n<filesystem>\n\
    \   <folder name=\"Modules2Disable\">\n      <file name=\"AdminModule\">\n   \
    \      <attr name=\"codeNameBase\" stringvalue=\"com.galileo.netbeans.module.admin\"\
    />\n      </file>\n   </folder>\n   <folder name=\"Modules2Enable\">\n      <file\
    \ name=\"UserModule\">\n         <attr name=\"codeNameBase\" stringvalue=\"com.galileo.netbeans.module.user\"\
    />\n      </file>\n   </folder>\n</filesystem>\n```\n\nFor users of the group\
    \ *User* the module `AdminModule` should be deactivated and the module `UserModule`\
    \ should be activated. For the user group *Admin* it is set the other way around,\
    \ as shown in [Listing 33-13](#Chapter33.html#list_33_13).\n\n***Listing 33-13.**\
    \ Configuration of the Modules for the User Group Admin*\n\n```\n<filesystem>\n\
    \   <folder name=\"Modules2Disable\">\n      <file name=\"UserModule\">\n    \
    \     <attr name=\"codeNameBase\" stringvalue=\"com.galileo.netbeans.module.user\"\
    />\n      </file>\n   </folder>\n   <folder name=\"Modules2Enable\">\n      <file\
    \ name=\"AdminModule\">\n         <attr name=\"codeNameBase\" stringvalue=\"com.galileo.netbeans.module.admin\"\
    />\n      </file>\n   </folder>\n</filesystem>\n```\n\nThese configurations will\
    \ be read and interpreted by the class `UserGroupModuleSystem`. Implement the\
    \ method `handleModules()` which is parameterized. Like this the method can be\
    \ used for the activation as well as for the deactivation. You can pass the folder\
    \ in the configuration file to the method. In this folder you search for all file\
    \ elements and read its attribute `codeNameBase` so you can add the unique identification\
    \ of the module to the list. Detect the module instances for all modules of this\
    \ list with the update manager, which can access all modules. Then add those to\
    \ the referring operation container. Finally, with this container activation or\
    \ deactivation can take place (see [Listing 33-14](#Chapter33.html#list_33_14)).\n\
    \n***Listing 33-14.** Activation and Deactivation of Modules Depending on the\
    \ Configuration Provided*\n\n```\nimport org.netbeans.api.autoupdate.OperationContainer;\n\
    import org.netbeans.api.autoupdate.OperationSupport;\nimport org.netbeans.api.autoupdate.UpdateManager;\n\
    import org.netbeans.api.autoupdate.UpdateUnit;\nimport org.openide.filesystems.FileObject;\n\
    import org.openide.filesystems.FileUtil;\nimport org.openide.util.Exceptions;\n\
    \npublic class UserGroupModuleSystem {\n\n   public static void handleModules(String\
    \ folder, boolean en) {\n      FileObject fo = FileUtil.getConfigFile(folder);\n\
    \      List<String> modules = new ArrayList<String>();\n      for (FileObject\
    \ fi : fo.getChildren()) {\n         modules.add((String)fi.getAttribute(\"codeNameBase\"\
    ));\n      }\n      try {\n         OperationContainer<OperationSupport> cont;\n\
    \         if (en) {\n            cont = OperationContainer.createForEnable();\n\
    \         } else {\n            cont = OperationContainer.createForDirectDisable();\n\
    \         }\n         for (UpdateUnit uu : UpdateManager.getDefault().getUpdateUnits())\
    \ {\n            if (uu.getInstalled() != null\n               && modules.contains(uu.getInstalled().getCodeName())\n\
    \               && uu.getInstalled().isEnabled() == !en) {\n               cont.add(uu.getInstalled());\n\
    \            }         \n         }\n         if (!cont.listAll().isEmpty()) {\n\
    \            cont.getSupport().doOperation(null);\n         }\n      } catch (Exception\
    \ ex) {\n         Exceptions.printStackTrace(ex);\n      }\n   }\n}\n```\n\nOnce\
    \ more, the advantage of the module-based NetBeans Platform becomes clear with\
    \ the activation or deactivation of modules. Deactivating a module, all components,\
    \ such as menu entries or windows, are automatically deleted at runtime. Activating\
    \ the module, all components are simply added again.\n\n### Summary\n\nEnterprise\
    \ applications must often be adapted dynamically to different groups of users.\
    \ This chapter showed you the possibilities available with the NetBeans Platform.\
    \ You used JNDI and JAAS in combination with an Apache directory server to manage\
    \ user data. You learned how you can adapt the user interface for a specific user\
    \ group and how to load and disable predefined modules.\n\n## PART 6\n\n## Pack\
    \ & Ship: Adapting, Delivering, and Actualizing Applications\n\n## C H A P T E\
    \ R 34\n\n## Internationalization and Localization\n\nProfessional applications—especially\
    \ flexible ones—should be designed to adapt as easily as possible to other countries\
    \ and languages. For this reason, the Java and NetBeans Platform and the NetBeans\
    \ IDE provide a great deal of support for internationalization, making it easy\
    \ to internationalize and localize your application. It is worth preparing even\
    \ very small applications and applications that were initially designed for only\
    \ one language for localization."
  raw: '#### Module System


    First, you want to define declaratively which modules should become explicitly
    activated or deactivated for which user group. To do this, just extend both XML
    files which already exist. In the newly defined folders any number of modules
    can be listed, but only those modules that are attributed with `codeNameBase`.
    This way, you can indicate a unique identification of the module (see [Listing
    33-12](#Chapter33.html#list_33_12)).


    ***Listing 33-12.** Configuration of the Modules for the User Group User*


    `<filesystem>`

    `   <folder name="`**`Modules2Disable`**`">`

    `      <file name="AdminModule">`

    `         <attr name="`**`codeNameBase`**`" stringvalue="`**`com.galileo.netbeans.module.admin`**`"/>`

    `      </file>`

    `   </folder>`

    `   <folder name="`**`Modules2Enable`**`">`

    `      <file name="UserModule">`

    `         <attr name="`**`codeNameBase`**`" stringvalue="`**`com.galileo.netbeans.module.user`**`"/>`

    `      </file>`

    `   </folder>`

    `</filesystem>`


    For users of the group *User* the module `AdminModule` should be deactivated and
    the module `UserModule` should be activated. For the user group *Admin* it is
    set the other way around, as shown in [Listing 33-13](#Chapter33.html#list_33_13).


    ***Listing 33-13.** Configuration of the Modules for the User Group Admin*


    `<filesystem>`

    `   <folder name="`**`Modules2Disable`**`">`

    `      <file name="UserModule">`

    `         <attr name="`**`codeNameBase`**`" stringvalue="`**`com.galileo.netbeans.module.user`**`"/>`

    `      </file>`

    `   </folder>`

    `   <folder name="`**`Modules2Enable`**`">`

    `      <file name="AdminModule">`

    `         <attr name="`**`codeNameBase`**`" stringvalue="`**`com.galileo.netbeans.module.admin`**`"/>`

    `      </file>`

    `   </folder>`

    `</filesystem>`


    These configurations will be read and interpreted by the class `UserGroupModuleSystem`.
    Implement the method `handleModules()` which is parameterized. Like this the method
    can be used for the activation as well as for the deactivation. You can pass the
    folder in the configuration file to the method. In this folder you search for
    all file elements and read its attribute `codeNameBase` so you can add the unique
    identification of the module to the list. Detect the module instances for all
    modules of this list with the update manager, which can access all modules. Then
    add those to the referring operation container. Finally, with this container activation
    or deactivation can take place (see [Listing 33-14](#Chapter33.html#list_33_14)).


    ***Listing 33-14.** Activation and Deactivation of Modules Depending on the Configuration
    Provided*


    `import org.netbeans.api.autoupdate.OperationContainer;`

    `import org.netbeans.api.autoupdate.OperationSupport;`

    `import org.netbeans.api.autoupdate.UpdateManager;`

    `import org.netbeans.api.autoupdate.UpdateUnit;`

    `import org.openide.filesystems.FileObject;`

    `import org.openide.filesystems.FileUtil;`

    `import org.openide.util.Exceptions;`


    `public class` **`UserGroupModuleSystem`** `{`


    `public static void` **`handleModules`**`(String folder, boolean en) {`

    `      FileObject fo = FileUtil`**`.getConfigFile`**`(folder);`

    `      List<String> modules = new ArrayList<String>();`

    `      for (FileObject fi : fo.getChildren()) {`

    `         modules.add((String)fi`**`.getAttribute`**`("codeNameBase"));`

    `      }`

    `      try {`

    `         OperationContainer<OperationSupport> cont;`

    `         if (en) {`

    `            cont = OperationContainer`**`.createForEnable`**`();`

    `         } else {`

    `            cont = OperationContainer`**`.createForDirectDisable`**`();`

    `         }`

    `         for (UpdateUnit uu : UpdateManager.getDefault()`**`.getUpdateUnits`**`())
    {`

    `            if (uu.getInstalled() != null`

    `               && modules.contains(uu.getInstalled().getCodeName())`

    `               && uu.getInstalled().isEnabled() == !en) {`

    `               cont.add(uu`**`.getInstalled`**`());`

    `            }          }`

    `         if (!cont.listAll().isEmpty()) {`

    `            cont.getSupport()`**`.doOperation`**`(null);`

    `         }`

    `      } catch (Exception ex) {`

    `         Exceptions.printStackTrace(ex);`

    `      }`

    `   }`

    `}`


    Once more, the advantage of the module-based NetBeans Platform becomes clear with
    the activation or deactivation of modules. Deactivating a module, all components,
    such as menu entries or windows, are automatically deleted at runtime. Activating
    the module, all components are simply added again.


    ### Summary


    Enterprise applications must often be adapted dynamically to different groups
    of users. This chapter showed you the possibilities available with the NetBeans
    Platform. You used JNDI and JAAS in combination with an Apache directory server
    to manage user data. You learned how you can adapt the user interface for a specific
    user group and how to load and disable predefined modules.


    ## PART 6


    ## Pack & Ship: Adapting, Delivering, and Actualizing Applications


    ## C H A P T E R  34


    ## Internationalization and Localization


    Professional applications—especially flexible ones—should be designed to adapt
    as easily as possible to other countries and languages. For this reason, the Java
    and NetBeans Platform and the NetBeans IDE provide a great deal of support for
    internationalization, making it easy to internationalize and localize your application.
    It is worth preparing even very small applications and applications that were
    initially designed for only one language for localization.'
