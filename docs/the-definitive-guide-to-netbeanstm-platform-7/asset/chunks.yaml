    \ ![Image](images/U001.jpg) *Installer / Activator* an Activator class will automatically\
    \ be created.\n\n### Integrating Existing OSGi Bundles\n\nOne important advantage\
    \ of supporting OSGi bundles by the NetBeans Platform is definitely the reusability\
    \ of already existing components that exist as OSGi bundles.\n\nAdding a whole\
    \ folder of bundles, called a *cluster*, to a Platform application is very easy.\
    \ For this purpose just activate the category *Libraries* in the *Properties*\
