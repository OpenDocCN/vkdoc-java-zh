    With this action, you can immediately test the MP3 player. Start the application
    and open the Favorites window. Add an MP3 file or a folder with MP3 files to the
    Favorites Window. Now you can start the playback by double-clicking or using the
    context menu.


    #### User Interface


    Having only an action is not really satisfying, so in this section you will create
    a complete user interface for an MP3 player. This user interface uses the functionality
    provided by the MP3 player service. You create a new package in the player module
    named `com.hboeck.mp3manager.player.gui`. With the help of the *Window* wizard,
    you create a `TopComponent` class. You can invoke this wizard like the previous
    ones via *File ![Image](images/U001.jpg) New File... ![Image](images/U001.jpg)
    Module Development*. For the window position, you can use `explorer`, for example,
    and for the class name prefix you can use `Mp3Player`. Then, you build a `TopComponent`
    using the Form Designer as shown in [Figure 44-5](#Chapter44.html#fig_44_5).


    ![Image](images/4405.jpg)


    ***Figure 44-5.** MP3 player user interface*


    Of course, it is not looking all that beautiful, but it is functional and offers
    all the relevant MP3 player functionalities. Most of the work required for designing
    the top component is done by the Form Designer. You simply have to implement the
    actions (see [Listing 44-14](#Chapter44.html#list_44_14)). But first, give yourself
    access to an `Mp3Player` instance delivered by the `getDefault()` method in the
    constructor. For this instance, register an `Mp3PlayerEventListener`, for which
    you defined an interface in the “Service Interface” section, to be notified about
    the start and stop event of the MP3 file. These events are required to update
    information displayed on the user interface.


