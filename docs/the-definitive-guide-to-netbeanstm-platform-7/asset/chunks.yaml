- fmt: "#### Exporting a Scene\n\nIn a few steps and with the assistance of some Java\
    \ utilities, you can export a scene, generated with the Visual Library API, into\
    \ an image within a PNG file. To this end, you first create a `BufferedImage`\
    \ object into which you can write the graphic data. Specify the size of this `Image`\
    \ instance using the current size of the view of the respective scene, to ensure\
    \ that the complete content is stored. From this object, you get the `Graphics2D`\
    \ context with which you feed data into the buffer of the `BufferedImage` object.\
    \ Next, you must supply this context to the `paint()` method of the scene. Then\
    \ the scene writes its content on the buffer of the `BufferedImage` instance rather\
    \ than on the screen (see [Listing 14-2](#Chapter14.html#list_14_2)). Following\
    \ this, dispose of the context so that the resources can be released. With a `JFileChooser`,\
    \ you request a file name and, if necessary, append the appropriate suffix. Once\
    \ this is done, you utilize the `ImageIO` class that looks for an `ImageWriter`\
    \ for PNG files, using the `ImageWriter` to write the data of the `BufferedImage`\
    \ object into the selected file.\n\n***Listing 14-2.** Exporting a Scene into\
    \ a PNG File*\n\n```\nprivate Scene sc = new Scene();\n\npublic void exportScene()\
    \ {\n   BufferedImage img = new BufferedImage(\n         sc.getView().getWidth(),\n\
    \         sc.getView().getHeight(),\n         BufferedImage.TYPE_4BYTE_ABGR);\n\
    \n   Graphics2D graphics = img.createGraphics();\n   sc.paint(graphics);\n   graphics.dispose();\n\
    \n   JFileChooser chooser = new JFileChooser();\n   chooser.setFileFilter(new\
    \ FileNameExtensionFilter(\n      \"Portable Network Graphics (.png)\", \"png\"\
    ));\n\n   if(chooser.showSaveDialog(sc.getView()) == JFileChooser.APPROVE_OPTION)\
    \ {\n      File f = chooser.getSelectedFile();\n      if (!f.getName().toLowerCase().endsWith(\"\
    .png\")) {\n         f = new File(f.getParentFile(), f.getName() + \".png\");\n\
    \      }\n      try {\n         ImageIO.write(img, \"png\", file);\n      } catch\
    \ (IOException e) {\n         Logger.getLogger(getName()).warning(e.toString());\n\
    \      }\n   }\n}\n```\n\n### ObjectScene – Model-View Relation\n\nThe Visual\
    \ Library API provides only the constituent components of a view. That means a\
    \ widget has only information about the kind of presentation or flow of data.\
    \ What a widget does not have is a data model. This is where the `ObjectScene`\
    \ class comes into play, representing an extension of the `Scene` class. The function\
    \ (or extension) of this class is to manage the mapping between the view (i.e.,\
    \ the widget) and an associated data model, which can be any object. The class\
    \ `ObjectScene` provides methods allowing the assignment of a data model or of\
    \ multiple widgets. Furthermore, it is possible to determine the data model registered\
    \ to a widget or vice versa. Besides representing the data model and the widgets,\
    \ the `ObjectScene` class also provides information about the current state (represented\
    \ by the `ObjectState` class) of a widget or of a data model.\n\nData models are\
    \ stored internally in a `Map`. For identification and comparison purposes, the\
    \ `equals()` method of the data models is used. Ensure that your data model contains\
    \ a useful implementation of this method and note additionally that each unique\
    \ data model can only be added once (because of the unique identification). Thus,\
    \ if the data model `d1` is in an `ObjectScene` and you add a second data model\
    \ `d2`, whereby `d1.equals(d2) == true` applies, an exception is raised.\n\n[Table\
    \ 14-2](#Chapter14.html#tab_14_2) summarizes the most important methods of the\
    \ `ObjectScene` class and their functions.\n\n![Image](images/t1402.jpg)\n\n###\
    \ Graphs\n\nTo simplify creating graphs—that is, the creation of nodes and associated\
    \ edges—the API based on the `ObjectScene` class (which was introduced in the\
    \ previous section) provides the classes `GraphScene` and `GraphPinScene`. [Listing\
    \ 14-3](#Chapter14.html#list_14_3) illustrates the practical meaning of the `ObjectScene`\
    \ class for these classes, again.\n\nBoth `GraphScene` and `GraphPinScene` are\
    \ abstract classes, whose only task is the management of data models and widgets.\
    \ Creating widgets is done by subclasses that create widgets depending on the\
    \ data model. This is achieved by the abstract attach methods which must be overridden\
    \ by the subclasses. The types of data models are defined by templates and can\
    \ vary in each case for nodes, edges, and pins. In the simplest case, as in this\
    \ example, you use the type `String`. For the nodes and edges, you must provide\
    \ a separate `LayerWidget` to each and add them to the scene.\n\n***Listing 14-3.**\
    \ Implementation of a GraphPinScene Class*\n\n```\npublic class MyGraphPinScene\
    \ extends GraphPinScene<String, String, String> {\n   private LayerWidget mainLayer;\n\
    \   private LayerWidget connectionLayer;\n\n   public MyGraphPinScene() {\n  \
    \       mainLayer = new LayerWidget(this);\n         addChild(mainLayer);\n  \
    \       connectionLayer = new LayerWidget(this);\n         addChild(connectionLayer);\n\
    \      }\n```\n\nThe `attachNodeWidget()` method is responsible for creating nodes.\
    \ For this purpose, this example uses the `IconNodeWidget` class. (The `ImageWidget`\
    \ class could also be used.) Practically, you can also manage the accompanying\
    \ pins with the `IconNodeWidget` class. This is done by using `LabelWidget`, which\
    \ is accessed by the `getLabelWidget()` method. A `FlowLayout` is defined for\
    \ this widget, so that the pins can be arranged and presented correctly. To move\
    \ the node, add a `MoveAction` instance. Finally, add the node to the `mainLayer`\
    \ and return it.\n\n```\n   protected Widget attachNodeWidget(String node) {\n\
    \      IconNodeWidget widget = new IconNodeWidget(this);\n         widget.setImage(ImageUtilities.loadImage(\"\
    com/galileo/netbeans/module/node.gif\"));\n         widget.getLabelWidget().setLayout(\n\
    \            LayoutFactory.createHorizontalFlowLayout(LayoutFactory.SerialAlignment.JUSTIFY,\
    \ 5));\n         widget.getActions().addAction(ActionFactory.createMoveAction());\n\
    \         mainLayer.addChild(widget);\n         return(widget);\n      }\n```\n\
    \nThe `attachEdgeWidget()` method is responsible for creating edges. For this\
    \ purpose, you want to use the `ConnectionWidget` class. Use a router so that\
    \ you do not just draw the edges between the nodes in a straight line (eventually\
    \ intersecting other nodes or edges). You can pass a series of `LayerWidget`s\
    \ to a router. Doing so, the widgets of the `LayerWidget`s are not crossed. Accordingly,\
    \ the router determines a path for the edges, so that no intersections occur.\
    \ You can create such a router with the `RouterFactory`. Then, we add the configured\
    \ edges to the `ConnectionLayer` and return them.\n\n```\n   protected Widget\
    \ attachEdgeWidget(String edge) {\n      ConnectionWidget widget = new ConnectionWidget(this);\n\
    \         widget.setTargetAnchorShape(AnchorShape.TRIANGLE_FILLED);\n        \
    \ widget.setRouter(RouterFactory.createOrthogonalSearchRouter(mainLayer,connectionLayer));\n\
    \         connectionLayer.addChild(widget);\n         return widget;\n      }\n\
    ```\n\nPins are created with the `attachPinWidget()` method. A pin is an input\
    \ or output of a node, to which an edge can be connected (the red points in [Figure\
    \ 14-4](#Chapter14.html#fig_14_4) represent the pins). So, a pin is assigned to\
    \ a node; this node may possess multiple pins. You receive the data model for\
    \ the pin and for the node to which the pin will be added as data model. Via the\
    \ `findWidget()` method you can determine the widget of the node. Afterward, you\
    \ can add the created pin to this widget."
  raw: '#### Exporting a Scene


    In a few steps and with the assistance of some Java utilities, you can export
    a scene, generated with the Visual Library API, into an image within a PNG file.
    To this end, you first create a `BufferedImage` object into which you can write
    the graphic data. Specify the size of this `Image` instance using the current
    size of the view of the respective scene, to ensure that the complete content
    is stored. From this object, you get the `Graphics2D` context with which you feed
    data into the buffer of the `BufferedImage` object. Next, you must supply this
    context to the `paint()` method of the scene. Then the scene writes its content
    on the buffer of the `BufferedImage` instance rather than on the screen (see [Listing
    14-2](#Chapter14.html#list_14_2)). Following this, dispose of the context so that
    the resources can be released. With a `JFileChooser`, you request a file name
    and, if necessary, append the appropriate suffix. Once this is done, you utilize
    the `ImageIO` class that looks for an `ImageWriter` for PNG files, using the `ImageWriter`
    to write the data of the `BufferedImage` object into the selected file.


    ***Listing 14-2.** Exporting a Scene into a PNG File*


    `private` **`Scene` **`sc = new`** `Scene`**`();`


    `public void exportScene() {`

    `BufferedImage img = new` **`BufferedImage`**`(`

    `      sc.getView().`**`getWidth`**`(),`

    `      sc.getView().`**`getHeight`**`(),`

    `      BufferedImage.TYPE_4BYTE_ABGR);`


    `   Graphics2D graphics = img.`**`createGraphics`**`();`

    `   sc.`**`paint`**`(graphics);`

    `   graphics.`**`dispose`**`();`


    `   JFileChooser chooser = new JFileChooser();`

    `   chooser.setFileFilter(new FileNameExtensionFilter(`

    `      "Portable Network Graphics (.png)", "`**`png`**`"));`


    `   if(chooser.`**`showSaveDialog`**`(sc.getView()) == JFileChooser.APPROVE_OPTION)
    {`

    `      File f = chooser.`**`getSelectedFile`**`();`

    `      if (!f.getName().toLowerCase().`**`endsWith`**`(".png")) {`

    `         f = new File(f.getParentFile(), f.getName() + "`**`.png`**`");`

    `      }`

    `      try {`

    **`ImageIO.write(img, "png", file);`**

    `      } catch (IOException e) {`

    `         Logger.getLogger(getName()).warning(e.toString());`

    `      }`

    `   }`

    `}`


    ### ObjectScene – Model-View Relation


    The Visual Library API provides only the constituent components of a view. That
    means a widget has only information about the kind of presentation or flow of
    data. What a widget does not have is a data model. This is where the `ObjectScene`
    class comes into play, representing an extension of the `Scene` class. The function
    (or extension) of this class is to manage the mapping between the view (i.e.,
    the widget) and an associated data model, which can be any object. The class `ObjectScene`
    provides methods allowing the assignment of a data model or of multiple widgets.
    Furthermore, it is possible to determine the data model registered to a widget
    or vice versa. Besides representing the data model and the widgets, the `ObjectScene`
    class also provides information about the current state (represented by the `ObjectState`
    class) of a widget or of a data model.


    Data models are stored internally in a `Map`. For identification and comparison
    purposes, the `equals()` method of the data models is used. Ensure that your data
    model contains a useful implementation of this method and note additionally that
    each unique data model can only be added once (because of the unique identification).
    Thus, if the data model, `d1`, is in an `ObjectScene` and  you add a second data
    model, `d2`, whereby `d1.equals(d2) == true` applies, an exception is raised.


    [Table 14-2](#Chapter14.html#tab_14_2) summarizes the most important methods of
    the `ObjectScene` class and their functions.


    ![Image](images/t1402.jpg)


    ### Graphs


    To simplify creating graphs—that is, the creation of nodes and associated edges—the
    API based on the `ObjectScene` class (which was introduced in the previous section)
    provides the classes `GraphScene` and `GraphPinScene`. [Listing 14-3](#Chapter14.html#list_14_3)
    illustrates  the practical meaning of the `ObjectScene` class for these classes,
    again.


    Both `GraphScene` and `GraphPinScene` are abstract classes, whose only task is
    the management of data models and widgets. Creating widgets is done by subclasses
    that create widgets depending on the data model. This is achieved by the abstract
    attach methods which must be overridden by the subclasses. The types of data models
    are defined by templates and can vary in each case for nodes, edges, and pins.
    In the simplest case, as in this example, you use the type `String`. For the nodes
    and edges, you must provide a separate `LayerWidget` to each and add them to the
    scene.


    ***Listing 14-3.** Implementation of a GraphPinScene Class*


    `public class` **`MyGraphPinScene`** `extends` **`GraphPinScene<String, String,
    String>`** `{`

    `private` **`LayerWidget`** `mainLayer;`

    `private` **`LayerWidget`** `connectionLayer;`


    `public` **`MyGraphPinScene`**`() {`

    `      mainLayer = new LayerWidget(this);`

    `      addChild(mainLayer);`

    `      connectionLayer = new LayerWidget(this);`

    `      addChild(connectionLayer);`

    `   }`


    The `attachNodeWidget()` method is responsible for creating nodes. For this purpose,
    this example uses the `IconNodeWidget` class. (The `ImageWidget` class could also
    be used.) Practically, you can also manage the accompanying pins with the `IconNodeWidget`
    class. This is done by using `LabelWidget`, which is accessed by the `getLabelWidget()`
    method. A `FlowLayout` is defined for this widget, so that the pins can be arranged
    and presented correctly. To move the node, add a `MoveAction` instance. Finally,
    add the node to the `mainLayer` and return it.


    `protected Widget` **`attachNodeWidget`**`(String node) {`

    **`IconNodeWidget`** `widget = new IconNodeWidget(this);`

    `      widget.`**`setImage`**`(ImageUtilities.loadImage("com/galileo/netbeans/module/node.gif"));`

    `      widget.getLabelWidget().`**`setLayout`**`(`

    `         LayoutFactory.createHorizontalFlowLayout(LayoutFactory.SerialAlignment.JUSTIFY,
    5));`

    `      widget.getActions().`**`addAction`**`(ActionFactory.`**`createMoveAction`**`());`

    `      mainLayer.`**`addChild`**`(widget);`

    `      return(widget);`

    `   }`


    The `attachEdgeWidget()` method is responsible for creating edges. For this purpose,
    you want to use the `ConnectionWidget` class. Use a router so that you do not
    just draw the edges between the nodes in a straight line (eventually intersecting
    other nodes or edges). You can pass a series of `LayerWidget`s to a router. Doing
    so, the widgets of the `LayerWidget`s are not crossed. Accordingly, the router
    determines a path for the edges, so that no intersections occur. You can create
    such a router with the `RouterFactory`. Then, we add the configured edges to the
    `ConnectionLayer` and return them.


    `protected Widget` **`attachEdgeWidget`**`(String edge) {`

    **`ConnectionWidget`** `widget = new ConnectionWidget(this);`

    `      widget.setTargetAnchorShape(AnchorShape.TRIANGLE_FILLED);`

    `      widget.`**`setRouter`**`(RouterFactory.createOrthogonalSearchRouter(mainLayer,connectionLayer));`

    `      connectionLayer.`**`addChild`**`(widget);`

    `      return widget;`

    `   }`


    Pins are created with the `attachPinWidget()` method. A pin is an input or output
    of a node, to which an edge can be connected (the red points in [Figure 14-4](#Chapter14.html#fig_14_4)
    represent the pins). So, a pin is assigned to a node; this node may possess multiple
    pins. You receive the data model for the pin and for the node to which the pin
    will be added as data model. Via the `findWidget()` method you can determine the
    widget of the node. Afterward, you can add the created pin to this widget.'
  trans: '

    #### 导出场景


    只需几个步骤，并借助一些 Java 工具，您就可以将使用 Visual Library API 生成的场景导出为 PNG 文件中的图像。为此，您首先需要创建一个
    `BufferedImage` 对象，以便将图形数据写入其中。使用相应场景视图的当前大小来指定此 `Image` 实例的尺寸，以确保存储完整的内容。从此对象中，您可以获取
    `Graphics2D` 上下文，用于将数据馈送到 `BufferedImage` 对象的缓冲区中。接下来，您必须将此上下文提供给场景的 `paint()`
    方法。然后，场景会将其内容写入 `BufferedImage` 实例的缓冲区，而不是屏幕（请参见清单 14-2）。之后，释放该上下文以便释放资源。使用 `JFileChooser`，您请求一个文件名，并在必要时附加适当的后缀。完成后，您利用
    `ImageIO` 类查找 PNG 文件的 `ImageWriter`，并使用 `ImageWriter` 将 `BufferedImage` 对象的数据写入所选文件。


    ***清单 14-2.** 将场景导出为 PNG 文件*


    `private` **`Scene` **`sc = new`** `Scene`**`();`


    `public void exportScene() {`

    `BufferedImage img = new` **`BufferedImage`**`(`

    `      sc.getView().`**`getWidth`**`(),`

    `      sc.getView().`**`getHeight`**`(),`

    `      BufferedImage.TYPE_4BYTE_ABGR);`


    `   Graphics2D graphics = img.`**`createGraphics`**`();`

    `   sc.`**`paint`**`(graphics);`

    `   graphics.`**`dispose`**`();`


    `   JFileChooser chooser = new JFileChooser();`

    `   chooser.setFileFilter(new FileNameExtensionFilter(`

    `      "便携式网络图形 (.png)", "`**`png`**`"));`


    `   if(chooser.`**`showSaveDialog`**`(sc.getView()) == JFileChooser.APPROVE_OPTION)
    {`

    `      File f = chooser.`**`getSelectedFile`**`();`

    `      if (!f.getName().toLowerCase().`**`endsWith`**`(".png")) {`

    `         f = new File(f.getParentFile(), f.getName() + "`**`.png`**`");`

    `      }`

    `      try {`

    **`ImageIO.write(img, "png", file);`**

    `      } catch (IOException e) {`

    `         Logger.getLogger(getName()).warning(e.toString());`

    `      }`

    `   }`

    `}`


    ### ObjectScene – 模型-视图关系


    Visual Library API 仅提供视图的组成组件。这意味着小部件仅包含关于呈现方式或数据流的信息。小部件所不具备的是数据模型。这就是 `ObjectScene`
    类发挥作用的地方，它代表了 `Scene` 类的扩展。此类的功能（或扩展）是管理视图（即小部件）与关联数据模型（可以是任何对象）之间的映射。`ObjectScene`
    类提供了允许分配数据模型或多个小部件的方法。此外，还可以确定注册到小部件的数据模型，反之亦然。除了表示数据模型和小部件之外，`ObjectScene` 类还提供关于小部件或数据模型当前状态（由
    `ObjectState` 类表示）的信息。


    数据模型在内部存储在一个 `Map` 中。为了识别和比较，使用了数据模型的 `equals()` 方法。请确保您的数据模型包含此方法的有用实现，并另外注意每个唯一的数据模型只能添加一次（因为唯一标识）。因此，如果数据模型
    `d1` 已存在于 `ObjectScene` 中，并且您添加了第二个数据模型 `d2`，且满足 `d1.equals(d2) == true`，则会引发异常。


    表 14-2 总结了 `ObjectScene` 类最重要的方法及其功能。


    ![图片](img/t1402.jpg)


    ### 图形


    为了简化图形的创建——即创建节点和关联的边——基于 `ObjectScene` 类（在上一节中介绍）的 API 提供了 `GraphScene` 和 `GraphPinScene`
    类。清单 14-3 再次说明了 `ObjectScene` 类对这些类的实际意义。


    `GraphScene` 和 `GraphPinScene` 都是抽象类，其唯一任务是管理数据模型和小部件。小部件的创建由子类完成，这些子类根据数据模型创建小部件。这是通过抽象
    attach 方法实现的，子类必须重写这些方法。数据模型的类型由模板定义，并且可以在节点、边和引脚的情况下各不相同。在最简单的情况下，如本例所示，您使用 `String`
    类型。对于节点和边，您必须为每个提供一个单独的 `LayerWidget`，并将它们添加到场景中。


    ***清单 14-3.** GraphPinScene 类的实现*


    `public class` **`MyGraphPinScene`** `extends` **`GraphPinScene<String, String,
    String>`** `{`

    `private` **`LayerWidget`** `mainLayer;`

    `private` **`LayerWidget`** `connectionLayer;`


    `public` **`MyGraphPinScene`**`() {`

    `      mainLayer = new LayerWidget(this);`

    `      addChild(mainLayer);`

    `      connectionLayer = new LayerWidget(this);`

    `      addChild(connectionLayer);`

    `   }`


    `attachNodeWidget()` 方法负责创建节点。为此，本例使用了 `IconNodeWidget` 类。（也可以使用 `ImageWidget`
    类。）实际上，您也可以使用 `IconNodeWidget` 类来管理附带的引脚。这是通过使用 `LabelWidget` 来完成的，可以通过 `getLabelWidget()`
    方法访问它。为此小部件定义了一个 `FlowLayout`，以便可以正确排列和呈现引脚。要移动节点，请添加一个 `MoveAction` 实例。最后，将节点添加到
    `mainLayer` 并返回它。


    `protected Widget` **`attachNodeWidget`**`(String node) {`

    **`IconNodeWidget`** `widget = new IconNodeWidget(this);`

    `      widget.`**`setImage`**`(ImageUtilities.loadImage("com/galileo/netbeans/module/node.gif"));`

    `      widget.getLabelWidget().`**`setLayout`**`(`

    `         LayoutFactory.createHorizontalFlowLayout(LayoutFactory.SerialAlignment.JUSTIFY,
    5));`

    `      widget.getActions().`**`addAction`**`(ActionFactory.`**`createMoveAction`**`());`

    `      mainLayer.`**`addChild`**`(widget);`

    `      return(widget);`

    `   }`


    `attachEdgeWidget()` 方法负责创建边。为此，您希望使用 `ConnectionWidget` 类。使用路由器，这样您就不会只在节点之间以直线绘制边（最终与其他节点或边相交）。您可以将一系列
    `LayerWidget` 传递给路由器。这样做，`LayerWidget` 的小部件不会被交叉。因此，路由器会为边确定一条路径，以便不会发生交叉。您可以使用
    `RouterFactory` 创建这样的路由器。然后，我们将配置好的边添加到 `ConnectionLayer` 并返回它们。


    `protected Widget` **`attachEdgeWidget`**`(String edge) {`

    **`ConnectionWidget`** `widget = new ConnectionWidget(this);`

    `      widget.setTargetAnchorShape(AnchorShape.TRIANGLE_FILLED);`

    `      widget.`**`setRouter`**`(RouterFactory.createOrthogonalSearchRouter(mainLayer,connectionLayer));`

    `      connectionLayer.`**`addChild`**`(widget);`

    `      return widget;`

    `   }`


    引脚使用 `attachPinWidget()` 方法创建。引脚是节点的输入或输出，可以连接到边（图 14-4 中的红点代表引脚）。因此，引脚被分配给一个节点；该节点可能拥有多个引脚。您会收到引脚的数据模型以及引脚将添加到的节点的数据模型。通过
    `findWidget()` 方法，您可以确定节点的小部件。之后，您可以将创建的引脚添加到此小部件中。

    '
