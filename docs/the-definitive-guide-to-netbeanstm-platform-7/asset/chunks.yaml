- fmt: "与`construct()`方法类似，数据在`doInBackground()`方法中创建（或加载）。与`construct()`方法不同，我们将创建的数据作为函数的返回值传递（参见[清单15-5](#Chapter15.html#list_15_5)）。返回类型由`SwingWorker`类的第一个模板参数定义——在此示例中为`DefaultComboBoxModel`。此方法也在EDT之外执行。`done()`方法是`finished()`方法的对应部分，当`doInBackground()`方法完成后，会在EDT内部调用`done()`方法。通过`get()`方法，你可以接收由`doInBackground()`准备的数据。\n\
    \n`SwingWorker`类的其他非常有用的特性是`publish()`和`process()`方法。通过使用`publish()`，数据可以从异步执行的`doInBackground()`方法发送到EDT，并通过调用`process()`进行处理。\n\
    \n**清单15-5.** 使用`SwingWorker`类在初始化阶段直接添加数据\n\n```\nitems.setModel(m);\nSwingWorker<DefaultComboBoxModel,\
    \ String> worker =\nnew SwingWorker<DefaultComboBoxModel, String>() {\n\n   @Override\n\
    protected DefaultComboBoxModel doInBackground() throws Exception {\n      for(int\
    \ i = 0; i < 20; i++) {\n         Thread.sleep(200);\npublish(\"Item \" + i);\n\
    \      }\n      return m;\n   }\n\n   @Override\nprotected void process(List<String>\
    \ chunks) {\n      m.addElement(chunks.iterator().next());\n   }\n};\n\nworker.execute();\n\
    ```\n\n与其在`done()`方法中设置数据模型，不如立即添加元素。在`doInBackground()`方法中，单个条目会立即通过`publish()`发送到EDT。这些条目由`process()`方法接收并插入到组合框中，因此它们会立即显示。`publish()`和`process()`的参数类型由`SwingWorker`类的第二个模板参数定义。\n\
    \n### 撤销/重做\n\n你可以使用上下文接口`UndoRedo.Provider`为任何组件（并为用户）提供撤销/重做支持。如果某个组件位于全局代理查找（实现了`UndoRedo.Provider`接口）中，则默认情况下，撤销/重做按钮（在工具栏和*编辑*菜单中）会自动激活。\n\
    \n撤销和重做功能由`UndoRedo`接口定义。该接口由`UndoRedo.Manager`类实现。此管理器派生自Java平台的`UndoManager`类。该类负责管理可以撤销或重建的更改。此管理器的一个实例通过`UndoRedo.Provider`接口指定的`getUndoRedo()`方法返回给你的组件。\n\
    \n将添加到管理器的事件高度依赖于上下文。这些事件的接口由`UndoableEdit`指定。Java已经为此接口提供了一些抽象实现，例如`AbstractUndoableEdit`类。该类为所有方法提供了标准实现。因此，你只需覆盖你需要的方法。`StateEdit`类和相应的`StateEditable`接口也非常有用。`StateEditable`接口必须由那些其数据可能被用户更改的对象实现。例如，一个代表MP3文件的`DataObject`类，其ID3信息可以由用户更改。\n\
    \n[清单15-6](#Chapter15.html#list_15_6) 基于一个非常简单的类演示了这一原理，该类只有一个可以通过文本字段由用户更改的特性。你将撤销/重做管理器（可以通过`getUndoRedo()`方法提供）作为私有数据元素保存。`TopComponent`有两个按钮：一个用于读取数据对象的属性，另一个用于保存文本字段中所做的更改。如果进行了更改，首先创建一个实现`UndoableEdit`接口的`StateEdit`对象。你必须向此对象传递一个`StateEditable`实例。当然，这就是你的数据对象。然后，通过`undoableEditHappened()`方法将这样创建的`UndoableEdit`实例传递给管理器（它会通知所有监听器）。这样，所有平台的撤销和重做操作按钮都会自动激活或停用。现在，你可以在数据对象中进行所有更改，然后通过`end()`方法结束事件。\n\
    \n**清单15-6.** 提供撤销/重做管理器并在用户更改数据时添加元素\n\n```\nimport javax.swing.event.UndoableEditEvent;\n\
    import javax.swing.undo.StateEdit;\nimport org.openide.awt.UndoRedo;\n...\npublic\
    \ class MyTopComponent extends TopComponent implements UndoRedo.Provider {\nprivate\
    \ UndoRedo.Manager manager = new UndoRedo.Manager();\n   private MyObject obj\
    \ = new MyObject();\n\n   @Override\npublic UndoRedo getUndoRedo() {\n      return\
    \ manager;\n   }\n\n   private void loadActionPerformed(ActionEvent evt) {\n \
    \     textField.setText(obj.getProp());\n   }\n\n   private void saveActionPerformed(ActionEvent\
    \ evt) {\nStateEdit edit = new StateEdit(obj);\n      manager.undoableEditHappened(new\
    \ UndoableEditEvent(obj, edit));\n      obj.setProp(textField.getText());\nedit.end();\n\
    \   }\n}\n```\n\n数据对象（其更改将被撤销或恢复）必须实现`StateEditable`接口。该接口指定了`storeState()`和`restoreState()`两个方法。`StateEdit`类的原理基于将数据对象的特性存储在一个`Hashtable`中。然后，这个`Hashtable`由`StateEdit`对象管理；在创建`StateEdit`对象时调用`storeState()`方法。在应用更改之前，特性会被存储到哈希表（即传递）中。如果用户想要再次撤销某些更改，`StateEdit`对象会调用`restoreState()`方法。此方法传递一个包含原始值的`Hashtable`。你只需读取这些值并应用它们。（参见[清单15-7](#Chapter15.html#list_15_7)。）\n\
    \n**清单15-7.** 需要恢复已更改特性的数据对象\n\n```\npublic class MyObject implements StateEditable\
    \ {\n   private String prop = new String(\"init value\");\n\npublic void storeState(Hashtable<Object,\
    \ Object> props) {\n      props.put(\"prop\", prop); // 保存原始状态\n   }\n\npublic\
    \ void restoreState(Hashtable<?, ?> props) {\n      prop = (String)props.get(\"\
    prop\"); // 读取原始状态\n   }\n\n   public void setProp(String value) {\n      prop\
    \ = value;\n   }\n\n   public String getProp() {\n      return prop;\n   }\n}\n\
    ```\n\n最后，我将说明向文本组件添加撤销/重做功能是多么容易；此功能对文本尤其有用。`JTextComponent`的所有子类——默认情况下包括`JEditorPane`、`JTextArea`和`JTextField`——都拥有一个`Document`作为数据模型。你可以通过`addUndoableEditListener()`方法向`Document`实例添加一个`UndoableEditListener`。NetBeans的`UndoRedo.Manager`也实现了此监听器接口。你可以将此管理器（先前存储在`TopComponent`中并由`getUndoRedo()`方法返回）作为监听器添加到`Document`实例。这意味着，通过添加一行代码，你就可以为文本组件添加撤销/重做功能：\n\
    \n```\ntextField.getDocument().addUndoableEditListener(manager);\n```\n\n现在，文本组件本身能够将其事件报告给管理器，而撤销和重做按钮则会相应地自动激活或停用。当然，通过这种方式，你可以为文本组件以及任何其数据模型实现了`Document`接口或使用`Document`实现（例如`HTMLDocument`和`PlainDocument`类）的组件添加撤销支持。"
  raw: 'Similar to the `construct()` method, data is created (or loaded) within the
    method `doInBackground()`. In contrast to the `construct()` method we deliver
    the created data as the return value of the function (see [Listing 15-5](#Chapter15.html#list_15_5)).
    The return type is defined by the first template of the `SwingWorker` class—in
    this example, `DefaultComboBoxModel`. This method is also executed outside the
    EDT. The `done()` method is the counterpart to the `finished()` method, which
    is called from within the EDT as soon as the `doInBackground()` method has finished.
    Using the `get()` method, you receive data prepared by `doInBackground()`.


    Other very useful features of the `SwingWorker` class are the `publish()` and
    `process()` methods. By using `publish()`, data can be sent from the asynchronously
    executed `doInBackground()` method to the EDT that is processed by calling `process()`.


    ***Listing 15-5.** Adding Data Directly During the Initialization Phase with the
    SwingWorker Class*


    `items.setModel(m);`

    **`SwingWorker`**`<DefaultComboBoxModel,` **`String`**`> worker =`

    `new` **`SwingWorker`**`<DefaultComboBoxModel,` **`String`**`>() {`


    `   @Override`

    `protected DefaultComboBoxModel` **`doInBackground`**`() throws Exception {`

    `      for(int i = 0; i < 20; i++) {`

    `         Thread.sleep(200);`

    **`publish`**`("Item " + i);`

    `      }`

    `      return m;`

    `   }`


    `   @Override`

    `protected void` **`process`**`(List<String> chunks) {`

    `      m.addElement(chunks.iterator().next());`

    `   }`

    `};`


    `worker.execute();`


    Rather than setting the data model in the `done()` method, the elements are added
    immediately. In the `doInBackground()` method, single entries are immediately
    sent to the EDT using `publish()`. Those entries are received with the `process()`
    method and inserted into the combo box, so they appear right away. The parameter
    type of `publish()` and `process()` is defined in the second template of the `SwingWorker`
    class.


    ### Undo/Redo


    You can equip any component (and provide the user) with undo/redo support using
    the context interface `UndoRedo.Provider`. If a component is located in the global
    proxy Lookup (which implements the `UndoRedo.Provider` interface), the undo/redo
    buttons (in the toolbar and in the *Edit* menu) are automatically activated by
    default.


    The undo and the redo functionality is specified by the `UndoRedo` interface.
    This interface is implemented by the `UndoRedo.Manager` class. This manager derives
    from the `UndoManager` class of the Java Platform. This class is responsible for
    managing changes, which can be undone or rebuilt. An instance of this manager
    returns your component via the `getUndoRedo()` method specified by the `UndoRedo.Provider`
    interface.


    The events, which will be added to the manager, are strongly dependent on context.
    The interface for those events is specified by `UndoableEdit`. Java already offers
    some abstract implementations for this interface, such as the `AbstractUndoableEdit`
    class. This class provides all methods with a standard implementation. Thus, you
    just have to overwrite the methods you need. The `StateEdit` class and the corresponding
    `StateEditable` interface are very helpful, too. The `StateEditable` interface
    must be implemented by objects, whose data may be changed by users. An example
    of this would be a `DataObject` class representing an MP3 file whose ID3 information
    can be changed by the user.


    [Listing 15-6](#Chapter15.html#list_15_6) demonstrates this principle on the basis
    of a very simple class that just has one feature that can be changed by the user
    via a text field. You keep the undo/redo manager (which you can deliver via the
    `getUndoRedo()` method) as a private data element. The `TopComponent` has two
    buttons: one to read the attribute of the data object, the other to save the changes
    made in the text field. If a change is made, first create a `StateEdit` object
    that implements the `UndoableEdit` interface. You have to pass an instance of
    the `StateEditable` instances to this object. Of course, this is your data object.
    Then, pass the `UndoableEdit` instance, created like this, to the manager (which
    notifies all listeners) via the `undoableEditHappened()` method. That way, all
    Platform undo and redo action buttons are activated or deactivated automatically.
    Now, you can make all changes in the data object and afterward finish the event
    via the `end()` method.


    ***Listing 15-6.** Providing an Undo/Redo Manager and Adding an Element When Data
    Is Changed by the User*


    `import javax.swing.event.UndoableEditEvent;`

    `import javax.swing.undo.StateEdit;`

    `import org.openide.awt.UndoRedo;`

    `...`

    `public class MyTopComponent extends TopComponent implements UndoRedo.Provider
    {`

    `private` **`UndoRedo.Manager`** `manager = new` **`UndoRedo.Manager`**`();`

    `   private MyObject obj = new MyObject();`


    `   @Override`

    `public UndoRedo` **`getUndoRedo`**`() {`

    `      return manager;`

    `   }`


    `   private void loadActionPerformed(ActionEvent evt) {`

    `      textField.setText(obj.getProp());`

    `   }`


    `   private void saveActionPerformed(ActionEvent evt) {`

    **`StateEdit edit = new StateEdit(obj);`**

    `      manager.`**`undoableEditHappened`**`(new` **`UndoableEditEvent`**`(obj,
    edit));`

    `      obj.setProp(textField.getText());`

    **`edit.end();`**

    `   }`

    `}`


    The data object (whose changes will be undone or restored) must implement the
    `StateEditable` interface. This interface specifies the two methods `storeState()`
    and `restoreState()`. The principle of the `StateEdit` class is based on storing
    the features of a data object in a `Hashtable`. Then, this `Hashtable` is managed
    by the `StateEdit` object; the `storeState()` method is called when the `StateEdit`
    object is created. Features are stored to the hashtable (that is, passed) before
    changes are applied. In case the user wants to undo some changes again, the `StateEdit`
    object calls the `restoreState()` method. This method delivers a `Hashtable` which
    contains the original values. You just need to read these values and apply them.
    (See [Listing 15-7](#Chapter15.html#list_15_7).)


    ***Listing 15-7.** Data Object Whose Changed Features Need to Be Restored*


    `public class MyObject implements` **`StateEditable`** `{`

    `   private String prop = new String("init value");`


    `public void` **`storeState`**`(Hashtable<Object, Object> props) {`

    `      props.put("prop", prop); // save original state`

    `   }`


    `public void` **`restoreState`**`(Hashtable<?, ?> props) {`

    `      prop = (String)props.get("prop"); // read original state`

    `   }`


    `   public void setProp(String value) {`

    `      prop = value;`

    `   }`


    `   public String getProp() {`

    `      return prop;`

    `   }`

    `}`


    Finally, I will illustrate how easy it is to add undo/redo functionality to a
    text component; this feature is especially helpful for text. All subclasses of
    `JTextComponent`—by default these are `JEditorPane`, `JTextArea`, and `JTextField`—own
    a `Document` as data model. You can add an `UndoableEditListener` to a `Document`
    instance via the `addUndoableEditListener()` method. This listener interface is
    also implemented by the NetBeans `UndoRedo.Manager`. You can add this manager,
    previously stored in the `TopComponent` and returned by the `getUndoRedo()` method,
    to a `Document` instance as listener. This means, by appending a single line of
    code, you can add the undo/redo functionality to a text component:


    `textField.getDocument().`**`addUndoableEditListener`**`(manager);`


    Now the text component itself is able to report its events to the manager, while
    the undo and redo buttons in turn become activated or deactivated automatically.
    Of course, this way, you can add undo support to a text component, as well as
    any component whose data model implements the `Document` interface or uses an
    implementation of `Document`, as the `HTMLDocument` and `PlainDocument` classes
    do, for example.'
