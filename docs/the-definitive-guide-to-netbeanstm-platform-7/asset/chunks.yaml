- fmt: '### Callback Actions


    A callback action is different from an always enabled action since a callback
    action is able to delegate to another action which typically depends on the context.
    Typically, a callback action does not contain action logic, but delegates further
    to a so called *Action Performer*. In case no action performer exists, you can
    add a so-called fallback implementation within the callback action. Callback actions
    are mainly used for global actions, meaning actions that follow different logics
    depending on the context. These are actions such as search, copy, or paste. Such
    global actions are also already provided in multiples by the actions API of the
    NetBeans Platform. Action performers are provided by a Java `ActionMap`. During
    that process, the action performer and the key of the callback action are registered
    within this map. All classes, which transfer from `JComponent`, have an `ActionMap`
    by default. The NetBeans Platform base class also has a `TopComponent` by default.
    It is used for windows that will be displayed within a NetBeans Platform application
    (more about this in [Chapter 10](#Chapter10.html#ch10)). This `ActionMap` is provided
    by a Lookup. It is the task of a callback action class to check if an `ActionMap`
    exists in the global proxy Lookup. And if there is one, the task is to check whether
    an action performer was registered for your own action. In this case, action representers,
    such as menu and toolbar entries, are automatically activated. If no action performer
    and no fallback implementation are provided, the action representers are deactivated.


    The NetBeans IDE does not provide a special wizard to create a callback action.
    If you want to create a callback action with a fallback implementation, just use
    the wizard for an always enabled action class as described in the section “Always
    Enabled Actions.” Then you just have to add another parameter to the `ActionRegistration`
    annotation. It is even easier if you do not want a fallback implementation. Then
    just add the `ActionID` and the `ActionRegistration` annotation to the key. In
    this case, a class is not even necessary anymore.


    In [Listing 6-3](#Chapter06.html#list_6_3), an action with fallback implementation
    will be created to be able to refresh. It will execute a different action depending
    on which window has the focus. Create an action class named `RefreshAction` with
    the wizard for an always enabled action and add it to a menu or a toolbar. The
    class which was already extended with the `key` parameter should then look like
    [Listing 6-3](#Chapter06.html#list_6_3).


    ***Listing 6-3.** Callback Action with Fallback Implementation*


    ```

    import java.awt.event.ActionEvent;

    import java.awt.event.ActionListener;

    import org.openide.awt.ActionRegistration;

    import org.openide.awt.ActionReference;

    import org.openide.awt.ActionReferences;

    import org.openide.awt.ActionID;


    @ActionID(     category = "File",

        id = "com.galileo.netbeans.RefreshAction")

    @ActionRegistration(

        iconBase = "com/galileo/netbeans/icon.gif",

        displayName = "#CTL_RefreshAction"

    key = "RefreshAction")

    @ActionReferences({

        @ActionReference(path = "Menu/File", position = 900),

        @ActionReference(path = "Toolbars/File", position = 300)

    })

    public final class RefreshAction implements ActionListener {

        public void actionPerformed(ActionEvent e) {

            // TODO fallback implementation

        }

    }

    ```


    The only difference with an always enabled action is that a callback action uses
    the additional parameter `key`. This way you can assign a random identifier by
    which an action performer is linked.


    The class `RefreshAction` itself functions as a fallback implementation. If you
    do not need such a class, you just have to annotate a key as shown in [Listing
    6-4](#Chapter06.html#list_6_4).


    ***Listing 6-4.** Callback Action Without Fallback Implementation*


    ```

    @ActionID(     category = "File",

        id = "com.galileo.netbeans.RefreshAction")

    @ActionRegistration(

        iconBase = "com/galileo/netbeans/icon.gif",

        displayName = "#CTL_RefreshAction")

    public static final String REFRESH_ACTION = "RefreshAction";

    ```


    Now if you start the application and neither a fallback implementation nor an
    action performer is provided, the action is deactivated in the menu as well as
    in the toolbar. [Listing 6-5](#Chapter06.html#list_6_5) conventionally explains
    how to provide an action performer since it assumes a window which derives from
    the class `TopComponent`. You will create such a window in [Chapter 10](#Chapter10.html#ch10).
    As soon as you have created it, you can also test this action class practically.


    ***Listing 6-5.** Registration of an Action Performer for a Callback Action*


    ```

    public final class MyTopComponent extends TopComponent {

       public MyTopComponent() {       ...

    getActionMap().put("RefreshAction",

                             new AbstractAction() {

             public void actionPerformed(ActionEvent event) {

               // refresh content of top component

             }

          });

       }

    }

    ```


    Give the action map of the top component by the method `getActionMap()`, which
    is defined by the class `JComponent`. Then add an instance of the actions implementations
    connected with the key of the `RefreshAction`. Now the action, which is created
    by the class `AbstractAction`, is in the context of `MyTopComponent`. You can
    add each action class to the action map which implements the interface `Action`.


    As soon as the window `MyTopComponent` is focused, the `RefreshAction` is active.
    Confirming the action, the method `actionPerformed()` provided by `MyTopComponent`
    is executed. For a comprehensive understanding it makes sense to know how a callback
    class gets to the action performer, since the action performer is not provided
    to the `RefreshAction` class just by adding it to the action map. The connection
    between those two parts is still missing. The Lookup concept is responsible for
    that connection. In this case the Lookup concept means a local Lookup of the top
    component and a global proxy Lookup which facilitates access of the callback action
    to the local Lookup.The top component has to ensure that its action map is located
    in its Lookup. Then, a callback action can find an action performer. By default,
    the action map is already in the local Lookup of the top component; you do not
    have to worry about it anymore, except for setting another local Lookup with the
    method `associateLookup()` or overwriting the `getLookup()` method. Just know
    that you will need to add the action map again. But that is enough about the Lookup
    concept; you can find more information about it in [Chapter 5](#Chapter05.html#ch5).


    You are now able to add any number of action performers, which are automatically
    executed, depending on the current concept, to a callback action. You might be
    asking yourself how to use actions provided by the NetBeans Actions API such as
    the `CopyAction`, the `CutAction`, or the `DeleteAction` classes, which at least
    are already integrated in the menu and so can be used. These classes are all callback
    actions and can be used just by providing an action performer, as explained before
    by means of the class `RefreshAction`.


    If you do not want to use annotations for your callback action you can also register
    them in the folder `Actions` via the entries shown in [Listing 6-6](#Chapter06.html#list_6_6).


    ***Listing 6-6.** Registration of a Callback Action via an Entry in the Layer
    File*'
