    ***Figure 44-4.** Branding of the Favorites module for use as media library*


    ### Services


    Next, you will implement the main functionality of the application. It is divided
    into two sections: the *Service Interface* and the *Service Provider*. In conjunction
    with the registry mechanism of the service provider and the Lookup, you can implement
    the functionality that is absolutely decoupled and independent of specific modules.
    Therefore, you create a new module to bundle the service interfaces for a central
    provision (see [Figure 44-1](#Chapter44.html#fig_44_1)). From this point of view,
    the module can be seen as a link between different application modules. Use *File
    ![Image](images/U001.jpg) New Project...* to create a new module, as usual. For
    convenience, name it *Services* and set the code name base to `com.hboeck.mp3manager.services`.
    Even for this module, you must remember to enable public access for the packages,
    which you will do under *Properties ![Image](images/U001.jpg) API Versioning*,
    because only then can you define a dependency to the Services module and be able
    to use its classes.


    ### MP3 Player


    In the previous section, you created the base for your player design by dividing
    the services module into two parts: a service interface and a service provider.
    Now you consider the interfaces and the functionality the player should provide
    to other components of your application. You then describe these interfaces in
    an abstract class. You should therefore choose an abstract class, and not an interface,
    since the player will be a central global service. In other words, the requesting
    modules are usually only interested in a single player instance. As you will notice
    in the following sections, this behavior can be ensured much more easily using
    an abstract class.'
