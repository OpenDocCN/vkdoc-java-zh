    The previously presented XML files are only of use for the configuration of the
    help set and the help system. You can create the help pages themselves as a standard
    HTML page. The wizard has already created a first example page when creating the
    help set. This is the *module-about.html* file. It has also already been attached
    to the help set via the file *module-map.xml*. So, you can add your own help pages
    exactly the same way.


    ### Inserting Links into Help Pages


    Within a help page, you can define links both to external sites and to other help
    pages, even though they belong to another module.


    #### Links to External Web Sites


    Typically, external web sites are called in an external browser, since the help
    window is inadequate for that purpose. So, the `BrowserDisplayer` class, which
    you refer to with the `object` HTML element, is responsible for this. You define
    the link itself via the `content` parameter (see [Listing 16-8](#Chapter16.html#list_16_8)).


    ***Listing 16-8.** Link Embedded in Help Pages*


    **`<object`**

    `   classid="java:org.netbeans.modules.javahelp`**`.BrowserDisplayer">`**

    `   <param name=`**`"content"`** `value="`**`http://www.netbeans.org">`**

    `   <param name="text" value="http://www.netbeans.org">`

    `   <param name="textFontSize" value="medium">`

    `   <param name="textColor" value="blue">`

    **`</object>`**


    The `BrowserDisplayer` class passes the link to the `URLDisplayer` service. The
    default implementation of this service provided by the NetBeans Platform opens
    the link in the internal web browser of the NetBeans Platform, though. Since this
    browser mostly displays web sites insufficiently, it would be the best for us
    to call the standard browser of the operating system. Since the `URLDisplayer`
    class is designed as a service and the Java Platform provides a method for calling
    the standard browser (via the `Desktop` class), you can realize this by a specific
    service provider. To do so, you create the `ExternalURLDisplayer` class which
    derives from the service class `HtmlBrowser.URLDisplayer`. This interface is located
    in the *UI Utilities* module to which you must consequently define a dependency
    under *Properties ![Image](images/U001.jpg) Libraries*. This interface specifies
    the `showURL()` method which gets the link to open as `URL` object. Then, you
    just have to pass this link to the `browse()` method of the Java `Desktop` class
    in the form of a `URI` object. Then, the Java `Desktop` class opens the corresponding
    web site in its standard browser. (See [Listing 16-9](#Chapter16.html#list_16_9).)


    ***Listing 16-9.** Service Provider for Opening Links in Help Pages Externally*


    **`@ServiceProvider`** `(service = HtmlBrowser.URLDisplayer.class, position =
    0)`

    `public class ExternalURLDisplayer extends` **`HtmlBrowser.URLDisplayer{`**

    `public void` **`showURL`**`(URL link) {`

    `      try {`

    **`Desktop.getDesktop().browse(link.toURI());`**

    `      } catch(Exception ex) {`

    `         Logger.getLogger("global").log(Level.SEVERE, null, ex);`

    `         // show the user a message dialog`

    `      }`

    `   }`

    `}`


    This service provider is registered and thus published via the `ServiceProvider`
    annotation (see [Chapter 5](#Chapter05.html#ch5)).


    #### Links to Other Help Pages


    You can easily add links to help pages of other modules via the `nbdocs` protocol
    with the `href` element, as shown in [Listing 16-10](#Chapter16.html#list_16_10).


    ***Listing 16-10.** Links on Help Pages of Other Modules*


    `<a` **`href="nbdocs:`**`//org.netbeans.modules.usersguide/org/netbeans/`

    `   modules/usersguide/configure/configure_options.html">Using the Options Dialog</a>`


    It is important that you first indicate the code name base of the module. In this
    example, it is `org.netbeans.modules.usersguide`. Subsequently, you define the
    path to the help page. In case the module and the help page are not available,
    the help system is able to display relevant information to the user because of
    the specification of the code name base. You link on your own module-internal
    help pages the same way.


    ### Context-Sensitive Help


    Context-sensitive help enables the user to directly access help and the corresponding
    topic relating to the current context, in which the user actually is. Therefore,
    the user does not have to search for the desired topic, but the respective page
    is directly displayed. A context-sensitive help is realized by the connection
    of separate components with the ID of a corresponding help page. The NetBeans
    Platform defines the `HelpCtx.Provider` interface, so a component can announce
    the help ID to the help system in a simple manner. This interface specifies the
    `getHelpCtx()` method which must be implemented by the corresponding component
    and thus delivers a `HelpCtx` object containing an ID.


    Numerous frequently-used classes of the NetBeans Platform API already implement
    the `HelpCtx.Provider` interface. Among these are, for example, the classes `Node`,
    `DataObject`, `TopComponent`, `SystemAction`, `WizardDescriptor.Panel`, and `DialogDescriptor`.
    Then, you only have to overwrite the `getHelpCtx()` method in their subclasses.
    Typically, the context help is called by the user with (*F1*). An additional key
    for calling help is displayed on a dialog or a wizard which delivers an ID via
    the `getHelpCtx()` method.


    A shortcut definition must be available, so the help can be called with (*F1*).
    If it was not already made by the NetBeans Platform—so you cannot open the help
    window with (*F1*)—you can define this shortcut yourself in the layer file with
    the following entry, as shown in [Listing 16-11](#Chapter16.html#list_16_11).


    ***Listing 16-11.** Make the Help System Accessible by F1.*


    `<folder name=`**`"Shortcuts`**`">`

    `   <file name="`**`F1`**`.shadow">`

    `      <attr name="originalFile"`

    `            stringvalue="Actions/Help/org-netbeans-modules-javahelp-`**`HelpAction.`**`instance"/>`

    `   </file>`

    `</folder>`


    If the user presses (*F1*), the `HelpAction` is executed. The `HelpAction` automatically
    searches the component that is currently focused. If the focused component implements
    the `HelpCtx.Provider` interface, the ID of the help page is determined by the
    `getHelpCtx()` method. Furthermore, you also have the possibility to provide a
    `JComponent` subclass with a help ID using the **setHelpIDString()** method:


    `JComponent c = ...`

    `HelpCtx`**`.setHelpIDString`**`(c, "com.galileo.netbeans.module.about");`


    Remember, your component must be focusable, so it can be found by `HelpAction`.
    By default, the `TopComponent` class is not focusable, (you can find that out
    with the `isFocusable()` method). You can achieve this simply by calling `setFocusable()`.
    So, a `TopComponent` subclass, which delivers its help ID via `getHelpCtx()`,
    would then look like [Listing 16-12](#Chapter16.html#list_16_12).


    ***Listing 16-12.** Context-Sensitive Help for Components*


    `public final class MyTopComponent extends TopComponent {`

    `   public MyTopComponent() {`

    **`setFocusable`**`(true);`

    `   }`

    `public HelpCtx` **`getHelpCtx`**`() {`

    `return new` **`HelpCtx`**`("com.galileo.netbeans.module.about");`

    `   }`

    `}`


    If `MyTopComponent` is focused and the user presses (*F1*), the help system and
    the help page are called. The help page has the ID `com.galileo.netbeans.module.about`.
    You can define this ID in connection with the desired page in the map file of
    the help set (see the section “Creating and Integrating a Helpset”). If you only
    want the help window without a special page to be called, you can return `HelpCtx.DEFAULT_HELP`.
    Beyond that, you can also pass a `Class` object to the `HelpCtx` constructor,
    instead of passing the ID in the form of a `String`. Then, the `HelpCtx` object
    detects the ID by means of the complete class name. So, if you used `new` `HelpCtx(getClass())`
    in the `MyTopComponent` example, the help ID would be `com.galileo.netbeans.module.MyTopComponent`.'
  trans: '

    #### 帮助页面


    前面介绍的 XML 文件仅用于配置帮助集和帮助系统。你可以将帮助页面本身创建为标准 HTML 页面。向导在创建帮助集时已经创建了第一个示例页面，即 *module-about.html*
    文件。该文件也已通过 *module-map.xml* 文件附加到帮助集中。因此，你可以用完全相同的方式添加自己的帮助页面。


    ### 在帮助页面中插入链接


    在帮助页面内，你可以定义指向外部站点和其他帮助页面的链接，即使它们属于另一个模块。


    #### 指向外部网站的链接


    通常，外部网站会在外部浏览器中调用，因为帮助窗口不适合此目的。因此，负责此功能的是 `BrowserDisplayer` 类，你可以通过 `object`
    HTML 元素引用它。你通过 `content` 参数定义链接本身（参见清单 16-8）。


    ***清单 16-8.** 嵌入在帮助页面中的链接*


    **`<object`**

    `   classid="java:org.netbeans.modules.javahelp`**`.BrowserDisplayer">`**

    `   <param name=`**`"content"`** `value="`**`http://www.netbeans.org">`**

    `   <param name="text" value="http://www.netbeans.org">`

    `   <param name="textFontSize" value="medium">`

    `   <param name="textColor" value="blue">`

    **`</object>`**


    `BrowserDisplayer` 类将链接传递给 `URLDisplayer` 服务。不过，NetBeans 平台提供的该服务的默认实现会在 NetBeans
    平台的内部 Web 浏览器中打开链接。由于此浏览器通常无法充分显示网站，因此对我们来说，最好的方式是调用操作系统的标准浏览器。由于 `URLDisplayer`
    类被设计为服务，并且 Java 平台提供了一种调用标准浏览器的方法（通过 `Desktop` 类），你可以通过特定的服务提供者来实现这一点。为此，你需要创建
    `ExternalURLDisplayer` 类，该类派生自服务类 `HtmlBrowser.URLDisplayer`。此接口位于 *UI Utilities*
    模块中，因此你必须在 *属性 ![Image](img/U001.jpg) 库* 下定义对该模块的依赖关系。此接口指定了 `showURL()` 方法，该方法获取要打开的链接作为
    `URL` 对象。然后，你只需将此链接以 `URI` 对象的形式传递给 Java `Desktop` 类的 `browse()` 方法。接着，Java `Desktop`
    类会在其标准浏览器中打开相应的网站。（参见清单 16-9。）


    ***清单 16-9.** 用于在外部打开帮助页面链接的服务提供者*


    **`@ServiceProvider`** `(service = HtmlBrowser.URLDisplayer.class, position =
    0)`

    `public class ExternalURLDisplayer extends` **`HtmlBrowser.URLDisplayer{`**

    `public void` **`showURL`**`(URL link) {`

    `      try {`

    **`Desktop.getDesktop().browse(link.toURI());`**

    `      } catch(Exception ex) {`

    `         Logger.getLogger("global").log(Level.SEVERE, null, ex);`

    `         // 向用户显示消息对话框`

    `      }`

    `   }`

    `}`


    此服务提供者通过 `ServiceProvider` 注解进行注册并发布（参见第 5 章）。


    #### 指向其他帮助页面的链接


    你可以通过 `href` 元素使用 `nbdocs` 协议轻松添加指向其他模块帮助页面的链接，如清单 16-10 所示。


    ***清单 16-10.** 指向其他模块帮助页面的链接*


    `<a` **`href="nbdocs:`**`//org.netbeans.modules.usersguide/org/netbeans/`

    `   modules/usersguide/configure/configure_options.html">使用选项对话框</a>`


    重要的是，你首先需要指明模块的代码名称基。在此示例中，它是 `org.netbeans.modules.usersguide`。随后，你定义帮助页面的路径。如果模块和帮助页面不可用，由于指定了代码名称基，帮助系统能够向用户显示相关信息。你以相同的方式链接到自己的模块内部帮助页面。


    ### 上下文相关帮助


    上下文相关帮助使用户能够直接访问与当前上下文相关的帮助和相应主题，用户实际上就处于该上下文中。因此，用户无需搜索所需主题，而是直接显示相应的页面。上下文相关帮助是通过将各个组件与相应帮助页面的
    ID 连接来实现的。NetBeans 平台定义了 `HelpCtx.Provider` 接口，因此组件可以以简单的方式向帮助系统通告帮助 ID。此接口指定了
    `getHelpCtx()` 方法，该方法必须由相应的组件实现，并返回一个包含 ID 的 `HelpCtx` 对象。


    NetBeans 平台 API 的许多常用类已经实现了 `HelpCtx.Provider` 接口。例如，其中包括 `Node`、`DataObject`、`TopComponent`、`SystemAction`、`WizardDescriptor.Panel`
    和 `DialogDescriptor` 等类。然后，你只需在其子类中重写 `getHelpCtx()` 方法。通常，用户通过按 (*F1*) 来调用上下文帮助。在对话框或向导上会显示一个用于调用帮助的附加键，该键通过
    `getHelpCtx()` 方法提供一个 ID。


    必须存在快捷键定义，以便可以通过 (*F1*) 调用帮助。如果 NetBeans 平台尚未定义（即你无法通过 (*F1*) 打开帮助窗口），你可以在层文件中使用以下条目自行定义此快捷键，如清单
    16-11 所示。


    ***清单 16-11.** 使帮助系统可通过 F1 访问。*


    `<folder name=`**`"Shortcuts`**`">`

    `   <file name="`**`F1`**`.shadow">`

    `      <attr name="originalFile"`

    `            stringvalue="Actions/Help/org-netbeans-modules-javahelp-`**`HelpAction.`**`instance"/>`

    `   </file>`

    `</folder>`


    如果用户按下 (*F1*)，则会执行 `HelpAction`。`HelpAction` 会自动搜索当前获得焦点的组件。如果获得焦点的组件实现了 `HelpCtx.Provider`
    接口，则通过 `getHelpCtx()` 方法确定帮助页面的 ID。此外，你还可以使用 **setHelpIDString()** 方法为 `JComponent`
    子类提供帮助 ID：


    `JComponent c = ...`

    `HelpCtx`**`.setHelpIDString`**`(c, "com.galileo.netbeans.module.about");`


    请记住，你的组件必须是可聚焦的，以便 `HelpAction` 能够找到它。默认情况下，`TopComponent` 类是不可聚焦的（你可以通过 `isFocusable()`
    方法发现这一点）。你可以通过简单地调用 `setFocusable()` 来实现这一点。因此，一个通过 `getHelpCtx()` 提供其帮助 ID 的
    `TopComponent` 子类将如清单 16-12 所示。


    ***清单 16-12.** 组件的上下文相关帮助*


    `public final class MyTopComponent extends TopComponent {`

    `   public MyTopComponent() {`

    **`setFocusable`**`(true);`

    `   }`

    `public HelpCtx` **`getHelpCtx`**`() {`

    `return new` **`HelpCtx`**`("com.galileo.netbeans.module.about");`

    `   }`

    `}`


    如果 `MyTopComponent` 获得焦点并且用户按下 (*F1*)，则会调用帮助系统和帮助页面。该帮助页面的 ID 为 `com.galileo.netbeans.module.about`。你可以在帮助集的映射文件中将此
    ID 与所需页面关联起来（参见“创建和集成帮助集”一节）。如果你只想调用帮助窗口而不显示特定页面，可以返回 `HelpCtx.DEFAULT_HELP`。除此之外，你还可以将
    `Class` 对象传递给 `HelpCtx` 构造函数，而不是以 `String` 形式传递 ID。然后，`HelpCtx` 对象会通过完整的类名来识别
    ID。因此，如果你在 `MyTopComponent` 示例中使用了 `new` `HelpCtx(getClass())`，则帮助 ID 将为 `com.galileo.netbeans.module.MyTopComponent`。

