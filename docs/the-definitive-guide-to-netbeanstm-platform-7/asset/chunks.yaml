    ### Module Registry


    Modules do not normally need to worry about other modules. Nor should they need
    to know whether other modules exist. However, it might sometimes be necessary
    to create a list of all available modules. The module system provides a `ModuleInfo`
    class for each module, where all information about modules is stored. The `ModuleInfo`
    objects are available centrally via the Lookup, and can be obtained there as follows:


    `Collection<? extends` **`ModuleInfo`**`> modules = Lookup.getDefault().lookupAll(`**`ModuleInfo`**`.class);`


    The class provides information such as module name, version, dependencies, current
    status (activated or deactivated), and the existence of service implementations
    for the current module. Use the `getAttribute()` method to obtain this information
    from the manifest file. To be informed of changes, register a `PropertyChangeListener`,
    which informs you both of the activation and deactivation of modules in the system
    (`ModuleInfo` object). You can also register a `LookupListener` that informs you
    of the installation and uninstallation of modules. For example, a listener could
    be defined as shown in [Listing 3-8](#Chapter03.html#list_3_8).


