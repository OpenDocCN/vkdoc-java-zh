    \ widget = new ImageWidget(this,`\n`            ImageUtilities.loadImage(\"com/galileo/netbeans/module/pin.gif\"\
    ));`\n`    IconNodeWidget n = (IconNodeWidget) findWidget(node);`\n`    n.getLabelWidget().addChild(widget);`\n\
    `    return widget;`\n`}`\n\nFinally, you must override the `attachEdgeSourceAnchor()`\
    \ and `attachEdgeTargetAnchor()` methods. With these methods, the starting point\
    \ and the endpoint of an edge are specified. In this respect, you first determine\
    \ the pin to which the edge is to be connected via the `findWidget()` method.\
    \ Then, you create an anchor point for this pin via the `AnchorFactory`. Afterward,\
    \ you add this pin to the edge that you already traced by the `findWidget()`.\n\
    \n`protected void attachEdgeSourceAnchor(String edge, String oldPin, String pin)\
    \ {`\n`    ConnectionWidget c = (ConnectionWidget) findWidget(edge);`\n`    Widget\
    \ widget = findWidget(pin);`\n`    Anchor a = AnchorFactory.createRectangularAnchor(widget);`\n\
    `    c.setSourceAnchor(a);`\n`}`\n\n`protected void attachEdgeTargetAnchor(String\
    \ edge, String oldPin, String pin) {`\n`    ConnectionWidget c = (ConnectionWidget)\
    \ findWidget(edge);`\n`    Widget widget = findWidget(pin);`\n`    Anchor a =\
    \ AnchorFactory.createRectangularAnchor(widget);`\n`    c.setTargetAnchor(a);`\n\
    `}`\n\nAnalogously, you could also create an implementation for the `GraphScene`\
    \ class, which has no pins. There, edges are connected directly to the node rather\
    \ than to a pin. The advantages of the just-created implementation now become\
    \ apparent when using it (see [Listing 14-4](#Chapter14.html#list_14_4)). As with\
    \ a normal scene, you create an instance and add its view to a `JScrollPane`.\
    \ Now, you do not need to create separate widgets. You just need to supply the\
    \ data model (which is a string in this case) to the methods `addNode()`, `addPin()`,\
