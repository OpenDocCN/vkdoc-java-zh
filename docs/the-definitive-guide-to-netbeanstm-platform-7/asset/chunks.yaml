    ### 场景：根元素


    如你所知，Visual Library API 的组件（即 widget）以层次树结构进行排列和管理。这反过来意味着 widget 可以包含其他 widget。`Scene`
    类本身也是一个 widget，它代表后续元素的容器，因此是树层次结构的根元素（参见图 14-2）。从图形上看，场景由一个视图表示，该视图是一个简单的 `JComponent`
    实例。然后，它通常被添加到 `JScrollPane` 中。你总是从创建一个场景开始，然后根据应用程序的目的，以层次结构向其中添加更多 widget。清单
    14-1 对此进行了说明。


