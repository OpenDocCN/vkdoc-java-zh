  trans: "\n#### 依赖关系\n\n可以在各个控件之间定义依赖关系。这样，您就能对其他控件的位置或大小变化做出响应。这种依赖关系通过注册在控件上的监听器来实现。为此，`Widget`\
    \ 类提供了两个方法：`addDependency()` 和 `removeDependency()`。通过这两个方法，可以添加或移除监听器。监听器由接口\
    \ `Widget.Dependency` 指定。实现该接口时，监听器必须实现 `revalidateDependency()` 方法，当其他控件的位置或大小发生变化时，相应控件会调用此方法。在此方法中，您应调用自己控件的\
    \ `revalidate()` 方法，即依赖于其他控件的那个控件。\n\n#### 边框\n\n每个控件都有一个边框。默认情况下，这是一个空边框，由 `EmptyBorder`\
    \ 类表示。您可以使用 `setBorder()` 方法指定其他边框。边框由接口 `Border` 定义，该接口由众多边框类实现。除了 `EmptyBorder`\
    \ 类，这些类还包括 `LineBorder`、`BevelBorder`、`DashedBorder`、`ImageBorder`、`ResizeBorder`、`RoundedBorder`\
    \ 和 `SwingBorder`。`ResizeBorder` 会在控件的边缘添加八个点，用于改变其大小。通过 `SwingBorder` 类，您可以使用任何\
    \ Swing 的 `javax.swing.border.Border` 实现。最后，还提供了 `CompositeBorder` 类，您可以向它传递任意数量的上述\
    \ `Border` 实例，以组合多个不同的边框。\n\n然而，边框并非直接创建，而是通过工厂创建。这个工厂是 `BorderFactory` 类，它提供了众多方法，您可以用它们创建各种边框类型。您也可以将工厂生成的实例同时用于多个控件。因此，如果您希望多个控件使用相同的边框，只需创建该边框的一个实例即可。\n\
    \n#### 布局\n\n一个控件（类似于 Swing 容器）具有特定的布局，由布局管理器管理和确定。布局由接口 `Layout` 定义，负责子控件的排列。共有四种不同的布局变体可用。您可以通过\
    \ `LayoutFactory` 类创建它们，并使用 `setLayout()` 方法将其添加到控件中。\n\n*   *AbsoluteLayout*：使用\
    \ `AbsoluteLayout` 时，子控件根据 `getPreferredLocation()` 提供的坐标进行排列。子控件的大小对应于 `getPreferredBounds()`\
    \ 提供的尺寸。如果这两个方法都返回 `null`，则位置变为 `(0, 0)`，或使用尺寸 `(0, 0, 0, 0)`。默认情况下，控件使用此布局。此布局通过\
    \ `Layout al = LayoutFactory.`**`createAbsoluteLayout`**`();` 生成。\n\n*   *FlowLayout*：`FlowLayout`\
    \ 按顺序在水平或垂直方向上排列其控件。这样做时，可以选择四种不同的对齐方式：左上、居中、右下和两端对齐。此外，还可以确定各个控件之间的间距。控件的大小对应于\
    \ `getPreferredBounds()` 返回的值。创建此布局可使用以下方法；或者，将对齐方式作为 `LayoutFactory.SerialAlignment`\
    \ 类型与间距一起提供：`Layout hfl = LayoutFactory.`**`createHorizontalFlowLayout`**`();`\n\
    \    `Layout vfl = LayoutFactory.`**`createVerticalFlowLayout`**`();`\n*   *CardLayout*：`CardLayout`\
    \ 仅显示当前活动的控件，该控件由 `setActiveCard()` 方法确定。活动控件的大小由 `getPreferredBounds()` 决定。所有其他控件都以尺寸\
    \ `(0, 0, 0, 0)` 表示，因此实际上不可见。通过 `getActiveCard()` 方法确定当前活动的控件。您可以通过以下方式创建布局：`Layout\
    \ cl = LayoutFactory.`**`createCardLayout`**`();`\n\n*   并通过以下调用指定活动控件：\n\n`LayoutFactory.`**`setActiveCard`**`(Widget\
    \ parent, Widget` **`act`**`);`\n\n您可以使用 `SwitchCardAction` 类切换到另一个控件。\n\n*  \
    \ *OverlayLayout*：`OverlayLayout` 确定包含所有子控件的最小区域。包含此布局的控件及其所有子控件都将被设置为该确定区域的大小，并彼此堆叠排列。最后一个子控件显示在最上层。您可以通过以下方式创建此布局：`Layout\
    \ ol = LayoutFactory.`**`createOverlayLayout`**`();`\n\n控件知道自己的位置、大小和内容，但不会获取有关其行为的信息。控件的行为受任意添加到控件上的动作影响。这些动作由接口\
    \ `WidgetAction` 定义，该接口定义了许多事件方法。这些方法由相应的事件调用，例如在分配了动作的控件上点击鼠标按钮。然后，动作类的实现会执行所需的行为，例如通过拖放移动控件。\n\
    \n与边框和布局一样，动作也是由工厂创建的。这个工厂是 `ActionFactory` 类。这些动作在控件内部由 `WidgetAction.Chain`\
    \ 类管理。此类接收用户事件，并将其转发给由该类管理的相应动作。每个控件都有此类的一个实例，可通过 `getAction()` 方法获取。使用 `WidgetAction.Chain`\
    \ 类的 `addAction()` 和 `removeAction()` 方法，您可以向控件添加或移除动作。\n"
- fmt: "# ActionFactory 类中的工厂方法\n\n`ActionFactory`类的一些工厂方法需要一个提供者（provider）作为参数。提供者实现了动作的特定行为。在某些情况下（例如`EditAction`），必须指定一个提供者实现（在双击相应\
    \ widget 时执行）。对于其他动作，例如`MoveAction`，如果你希望行为偏离默认值，可以选择性地指定一个提供者。这些提供者各自通过一个特殊的接口来指定，例如`EditProvider`或`HoverProvider`。\n\
    \n分组功能是在`WidgetAction.Chain`类中管理 widget 动作的真正优势或目的。在某些应用中，你可能只允许对`Scene`执行某些动作。例如，可能只能移动\
    \ widget，但不能编辑它们。你可以使用`Scene`类中的`setActiveTool()`方法来确定`Scene`的当前状态。现在，`Widget`类可以针对不同状态管理一个单独的`WidgetAction.Chain`实例。以前，通过`getAction()`方法访问动作。该方法提供默认的`WidgetAction.Chain`实例，如果没有设置状态（`setActiveTool(null)`），也会使用该实例。现在，你可以使用`getActions(String\
    \ tool)`方法的一个变体（向其提供工具名称并获取相关的`WidgetAction.Chain`实例），以便获取特定状态的实例。\n\n## AcceptAction\n\
    \n此动作用于处理拖放操作。因此，在创建动作时必须提供一个`AcceptProvider`实现。`AcceptProvider`接口指定了`isAcceptable()`方法，该方法允许指定是否允许在此\
    \ widget 上进行放置操作，以及`accept()`方法，通过该方法完成放置操作。\n\n```\nActionFactory.createAcceptAction(AcceptProvider\
    \ p);\n```\n\n## ActionMapAction\n\n此动作创建一个上下文菜单，通过右键单击 widget 显示。与此相关，可以使用无参数的默认方法创建动作，此时菜单的动作从\
    \ Scene 视图的`ActionMap`中推断出来。此外，还有一个选项可以向该方法提供一个用于创建菜单的`InputMap`和`ActionMap`。\n\
    \n```\nActionFactory.createActionMapAction();\nActionFactory.createActionMapAction(InputMap\
    \ i, ActionMap a);\n```\n\n## AddRemoveControlPointAction\n\n此动作只能由`FreeConnectionWidget`\
    \ widget 使用。你可以通过双击控制点来添加或删除它们。你也可以选择性地指定所使用的灵敏度。\n\n```\nActionFactory.createAddRemoveControlPointAction();\n\
    ActionFactory.createAddRemoveControlPointAction(\n    double createSensitivity,\n\
    \    double deleteSensitivity);\n```\n\n## MoveAction / AlignWithMoveAction\n\n\
    使用`MoveAction`，可以通过拖放移动 Widget。请注意，此动作仅在父 widget 具有`AbsoluteLayout`时才有效。`AlignWithMoveAction`的行为类似于`MoveAction`。但与`MoveAction`不同的是，`AlignWithMoveAction`中会发生与其他\
    \ widget 的额外“吸附”行为。你可以通过包含`AlignWithWidgetCollector`实例的列表或通过`LayerWidget`来检查哪些\
    \ widget 将被对齐或分别检查。在第二种情况下，会检查每个图层内所有子 widget 的对齐情况。\n\n```\nActionFactory.createMoveAction();\n\
    ActionFactory.createMoveAction(\n    MoveStrategy             strategy,\n    MoveProvider\
    \             provider);\nActionFactory.createAlignWithMoveAction(\n    AlignWithWidgetCollector\
    \  collector,\n    LayerWidget              interactionLayer,\n    AlignWithMoveDecorator\
    \   decorator);\nActionFactory.createAlignWithMoveAction(\n    LayerWidget   \
    \           collectionLayer,\n    LayerWidget              interactionLayer,\n\
    \    AlignWithMoveDecorator   decorator);\n```\n\n## ResizeAction / AlignWithResizeAction\n\
    \n使用`ResizeAction`，你可以更改 widget 的大小。此外，`AlignWithResizeAction`会检查其他 widget 的对齐情况。你可以通过`AlignWithWidgetCollector`或`LayerWidget`传递需要检查与其他\
    \ widget 对齐情况的 widget。\n\n```\nActionFactory.createResizeAction();\nActionFactory.createResizeAction(\n\
    \    ResizeStrategy             strategy,\n    ResizeProvider             provider);\n\
    ActionFactory.createResizeAction(\n    ResizeStrategy             strategy,\n\
    \    ResizeControlPointResolver resolver,\n    ResizeProvider             provider);\n\
    ActionFactory.createAlignWithResizeAction(\n    AlignWithWidgetCollector   collector,\n\
    \    LayerWidget                interactionLayer,\n    AlignWithMoveDecorator\
    \     decorator);\nActionFactory.createAlignWithResizeAction(\n    LayerWidget\
    \                collectionLayer,\n    LayerWidget                interactionLayer,\n\
    \    AlignWithMoveDecorator     decorator);\n```\n\n## ZoomAction / CenteredZoomAction\n\
    \n使用这些动作，你可以通过鼠标滚轮更改整个场景的缩放。因此，不要将这些动作添加到 widget，而是直接添加到场景。\n\n```\nActionFactory.createZoomAction();\n\
    ActionFactory.createZoomAction(double zoom, boolean animated);\nActionFactory.createCenteredZoomAction(double\
    \ zoomMultiplier);\n```\n\n## ConnectAction / ExtendedConnectAction / ReconnectAction\n\
    \n使用`ConnectAction`实例，你可以在所需的连接上检查源 widget 和目标 widget，然后建立此连接。你可以选择性地通过`ConnectDecorator`指定用户特定的连接元素。使用`ExtendedConnectAction`，只有在按住\
    \ *Ctrl* 键时才能建立连接。此动作适用于与其他动作发生冲突的情况——例如，如果你想同时使用`ConnectAction`和`MoveAction`。在这些情况下，请使用`ExtendedConnectAction`。\n\
    \n```\nActionFactory.createConnectAction(\n    LayerWidget        interactionLayer,\n\
    \    ConnectProvider    provider);\nActionFactory.createConnectAction(\n    ConnectDecorator\
    \   decorator,\n    LayerWidget        interactionLayer,\n    ConnectProvider\
    \    provider);\nActionFactory.createExtendedConnectAction(\n    LayerWidget \
    \       interactionLayer,\n    ConnectProvider    provider);\nActionFactory.createExtendedConnectAction(\n\
    \    ConnectDecorator   decorator,\n    LayerWidget        interactionLayer,\n\
    \    ConnectProvider    provider);\nActionFactory.createReconnectAction(\n   \
    \ ReconnectProvider  provider);\nActionFactory.createReconnectAction(\n    ReconnectDecorator\
    \ decorator,\n    ReconnectProvider  provider);\n```\n\n## CycleFocusAction /\
    \ CycleObjectSceneFocusAction\n\n使用`CycleFocusAction`和`CycleObjectSceneFocusAction`，你可以使用\
    \ *Tab* 键在场景的 widget 之间向前或向后切换焦点。使用`CycleFocusAction`时，你通过`CycleFocusProvider`指定行为，即设置焦点的前一个或后一个\
    \ widget。对于可以应用于`ObjectScene`的`CycleObjectSceneFocusAction`，焦点的顺序由`getIdentityCode()`的返回值决定。"
  raw: 'Some of the factory methods of the `ActionFactory` class require a provider
    as parameter. A provider implements a specific behavior of an action. In some
    cases (for example, the `EditAction)`, a provider implementation (which is executed
    when double-clicking the respective widget) must be specified. For other actions,
    such as the `MoveAction`, you can optionally specify a provider if you wish the
    behavior to deviate from the default. These providers are each specified through
    a special interface such as `EditProvider` or `HoverProvider`.


    The possibility of grouping is the real advantage or purpose of managing a widget''s
    actions in a `WidgetAction.Chain` class. In some applications, you may only want
    to permit certain actions for a `Scene`. So, for example, it will only be possible
    to move widgets, but not to edit them. You determine the current status of a `Scene`
    using the `setActiveTool()` method in the `Scene` class. Now, the `Widget` class
    can manage a separate `WidgetAction.Chain` instance concerning different states.
    Previously, access was gained to actions via the `getAction()` method. This method
    supplied the default `WidgetAction.Chain` instance, which is also used if no status
    is set (`setActiveTool(null)`). Now you can use a variant of the `getActions(String`
    `tool)` method (to which you supply the name of the tool and obtain the relevant
    `WidgetAction.Chain` instance), in order to get an instance for a specific status.


    **AcceptAction**


    This action is for the treatment of drag-and-drop operations. Thus, an `AcceptProvider`
    implementation must be provided when creating the action. The `AcceptProvider`
    interface specifies the method `isAcceptable()`, which allows specifying whether
    a drop operation on this widget is allowed, as well as the method `accept()`,
    with which you accomplish the drop operation.


    `ActionFactory.`**`createAcceptAction`**`(`**`AcceptProvider`** `p);`


    **ActionMapAction**


    This action creates a context menu, displayed by right-clicking the widget. Connected
    to this, it is possible to create the action using the default method without
    parameters, whereby actions for the menu are inferred from the `ActionMap` of
    the Scene view. Additionally, there is an option to supply the method with an
    `InputMap` and `ActionMap` used for creating the menu.


    `ActionFactory.`**`createActionMapAction`**`();`

    `ActionFactory.`**`createActionMapAction`**`(`**`InputMap`** `i,` **`ActionMap`**
    `a);`


    **AddRemoveControlPointAction**


    This action can only be used by `FreeConnectionWidget` widgets. You can add or
    remove control points by double-clicking them. Optionally, you can also indicate
    the sensitivity used.


    `ActionFactory.`**`createAddRemoveControlPointAction`**`();`

    `ActionFactory.`**`createAddRemoveControlPointAction`**`(`

    **`double`** `createSensitivity,`

    **`double`** `deleteSensitivity);`


    **MoveAction/AlignWithMoveAction**


    With the `MoveAction`, a Widget can be moved by drag-and-drop. Please note that
    this action only works if the parent widget has an `AbsoluteLayout`. The `AlignWithMoveAction`
    behaves similarly to the `MoveAction`. In contrast with the `MoveAction`, in the
    `AlignWithMoveAction` an additional “snapping” with other widgets occurs, though.
    You can check which widgets will be aligned or respectively checked either by
    a list with an `AlignWithWidgetCollector` instance or by a `LayerWidget`. In the
    second case, the alignment of all child widgets within each layer is checked.


    `ActionFactory.`**`createMoveAction`**`();`

    `ActionFactory.`**`createMoveAction`**`(`

    **`MoveStrategy`**`             strategy,`

    **`MoveProvider`**`             provider);`

    `ActionFactory.`**`createAlignWithMoveAction`**`(`

    **`AlignWithWidgetCollector`**`  collector,`

    **`LayerWidget`**`              interactionLayer,`

    **`AlignWithMoveDecorator`**`   decorator);`

    `ActionFactory.`**`createAlignWithMoveAction`**`(`

    **`LayerWidget`**`              collectionLayer,`

    **`LayerWidget`**`              interactionLayer,`

    **`AlignWithMoveDecorator`**`   decorator);`


    **ResizeAction/AlignWithResizeAction**


    With the `ResizeAction`, you change the size of widgets. Additionally, the `AlignWithResizeAction`
    checks the alignment of other widgets. You can pass widgets that need their alignment
    checked against others either by an `AlignWithWidgetCollector` or by a `LayerWidget`.


    `ActionFactory.`**`createResizeAction`**`();`

    `ActionFactory.`**`createResizeAction`**`(`

    **`ResizeStrategy`**`             strategy,`

    **`ResizeProvider`**`             provider);`

    `ActionFactory.`**`createResizeAction`**`(`

    **`ResizeStrategy`**`             strategy,`

    **`ResizeControlPointResolver`** `resolver,`

    **`ResizeProvider`**`             provider);`

    `ActionFactory.`**`createAlignWithResizeAction`**`(`

    **`AlignWithWidgetCollector`**`   collector,`

    **`LayerWidget`**`                interactionLayer,`

    **`AlignWithMoveDecorator`**`     decorator);`

    `ActionFactory.`**`createAlignWithResizeAction`**`(`

    **`LayerWidget`**`                collectionLayer,`

    **`LayerWidget`**`                interactionLayer,`

    **`AlignWithMoveDecorator`**`     decorator);`


    **ZoomAction/CenteredZoomAction**


    With these actions, you can change the zoom of the whole scene with the mouse
    wheel. So you do not add these actions to a widget, but directly to a scene.


    `ActionFactory.`**`createZoomAction`**`();`

    `ActionFactory.`**`createZoomAction`**`(`**`double`** `zoom,` **`boolean`** `animated);`

    `ActionFactory.`**`createCenteredZoomAction`**`(`**`double`** `zoomMultiplier);`


    **ConnectAction/ExtendedConnectAction/ReconnectAction**


    With a `ConnectAction` instance, you check the source and the target widgets on
    the desired connection and you can then establish this connection. Optionally,
    you can indicate a user-specific connection element by a `ConnectDecorator`. With
    the `ExtendedConnectAction`, a connection can only be established as long as the
    *Ctrl* key is pressed. This action is meant for those cases where conflicts with
    other actions occur—for example, if you want to use the `ConnectAction` and the
    `MoveAction` at the same time. In those cases, use the `ExtendedConnectAction`.


    `ActionFactory.`**`createConnectAction`**`(`

    **`LayerWidget`**`        interactionLayer,`

    **`ConnectProvider`**`    provider);`

    `ActionFactory.`**`createConnectAction`**`(`

    **`ConnectDecorator`**`   decorator,`

    **`LayerWidget`**`        interactionLayer,`

    **`ConnectProvider`**`    provider);`

    `ActionFactory.`**`createExtendedConnectAction`**`(`

    **`LayerWidget`**`        interactionLayer,`

    **`ConnectProvider`**`    provider);`

    `ActionFactory.`**`createExtendedConnectAction`**`(`

    **`ConnectDecorator`**`   decorator,`

    **`LayerWidget`**`        interactionLayer,`

    **`ConnectProvider`**`    provider);`

    `ActionFactory.`**`createReconnectAction`**`(`

    **`ReconnectProvider`**`  provider);`

    `ActionFactory.`**`createReconnectAction`**`(`

    **`ReconnectDecorator`** `decorator,`

    **`ReconnectProvider`**`  provider);`


    **CycleFocusAction/CycleObjectSceneFocusAction**


    With `CycleFocusAction` and `CycleObjectSceneFocusAction` you can shift the focus
    between widgets of a scene using the *Tab* key, either forward or backward. With
    `CycleFocusAction` you specify the behavior, i. e. the preceding or following
    widget to set the focus on, using a `CycleFocusProvider`. In the case of `CycleObjectSceneFocusAction`,
    which can be applied to an `ObjectScene`, the order of the focusing is determined
    by the return value of `getIdentityCode()`.'
