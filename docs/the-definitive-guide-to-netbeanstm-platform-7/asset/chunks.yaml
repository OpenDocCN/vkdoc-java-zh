    #### Event Handling


    In this section, I will again explain in overview the concept of interaction between
    the three layers— wizard descriptor, wizard panel and visual panel—and how events
    and notifications are received and processed. In the sequence diagram in [Figure
    13-8](#Chapter13.html#fig_13_8), both scenarios—the initialization of a wizard
    and the interaction between the various parts of the wizard as the user enters
    data—are displayed.


    ![Image](images/1308.jpg)


    ***Figure 13-8.** Interaction between the wizard descriptor, wizard panel, and
    visual panel.*


    In the `actionPerformed()` method of the action class to start the wizard, an
    instance of the `PlaylistWizardDescriptor` is created. This descriptor generates
    its panels and registers a `ChangeListener` for each, so that it is notified whenever
    the status of the panel changes. The visual panels are then obtained via the `getComponent()`
    method of the wizard panels. This method creates the visual panel on demand and
    registers a `PropertyChangeListener`, informing of changes made by the user. The
    wizard descriptor observes the status of its panels via a `ChangeListener`, which
    in turn observes the status of the visual panels via a `PropertyChangeListener`.


    When the user types data into a field that is monitored by the view with a listener,
    a `PropertyChangeEvent` is fired, notifying the wizard panel that data has changed.
    The wizard panel retrieves the data via the getters and then verifies received
    data. Depending on the result of the verification, status of the panel is set.


    If the status changes, a `ChangeEvent` is fired, notifying the wizard descriptor,
    which verifies the panel status, calling the `isValid()` method. Depending on
    the value of the `isValid()` method, the wizard descriptor activates or deactivates
    the buttons in the wizard.'
