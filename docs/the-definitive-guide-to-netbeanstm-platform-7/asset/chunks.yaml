- fmt: "### Desktop Features\n\n`Desktop`类属于Java平台，允许执行标准应用程序，如互联网浏览器或电子邮件客户端。将`File`或`URI`对象传递给`Desktop`类提供的方法。基于这些对象，可以启动关联的标准应用程序。例如，如果执行`Desktop.open(new\
    \ File(\"myfile.pdf\"))`，则会启动Acrobat Reader（如果这是`.pdf`文件的标准应用程序）。[表15-1](#Chapter15.html#tab_15_1)展示了`Desktop`类的所有方法。\n\
    \n![Image](images/t1501.jpg)\n\n![Image](images/t1501a.jpg)\n\n### System Tray\
    \ Integration\n\nJava平台包含增强的桌面集成功能，并提供对底层操作系统系统托盘的访问。您可以添加一个或多个图标，这些图标可以配备上下文菜单以及双击操作。对于NetBeans平台应用程序，一种好的实现方式是使用模块安装器的`restored()`方法。首先，检查操作系统是否有系统托盘。如果有，则通过`getSystemTray()`方法获取其访问权限。要添加上下文菜单，请创建一个`PopupMenu`，其操作通过层文件中的扩展点定义（这样，您就可以从不同模块向托盘图标添加操作）。将此扩展点命名为`TrayMenu`，并通过`Lookup`读取其内容。这些操作只需实现与`ActionListener`接口对应的`Action`，并以常规方式注册。例如，一个操作可能如[清单15-1](#Chapter15.html#list_15_1)所示。\n\
    \n***清单15-1.** 向托盘菜单的扩展点添加操作。*\n\n```\n@ActionID(\n   category = \"TrayMenu\"\
