- fmt: "### Summary\n\nWith the Nodes and Explorer API the NetBeans Platform provides\
    \ a universal framework for displaying very different data. In this chapter you\
    \ learned the basics about the different node classes and the functionality of\
    \ a node container. Using an example, you created your own node classes and container\
    \ and used the Explorer API to display some data defined in an XML file.\n\n##\
    \ Dialogs and Wizards\n\nThe *Dialogs API* helps you create and display dialogs\
    \ and wizards. The dialogs are based on the Java `Dialog` class. Using the Dialogs\
    \ API, you can display standard dialogs, as well as custom dialogs tailored to\
    \ specific business needs. In addition, the API integrates well with the NetBeans\
    \ window system, as well as the NetBeans help system. Wizards can be seen as a\
    \ special kind of dialog and are therefore part of the Dialogs API.\n\n### Standard\
    \ Dialogs\n\nUse the `NotifyDescriptor` class to define the properties of a standard\
    \ dialog. Provide a message in the form of a `String`, an `Icon`, or a `Component`,\
    \ which will be displayed with the dialog. Optionally, use an array to display\
    \ multiple messages in varying situations. Different types of messages can be\
    \ specified, giving control over the icon displayed. Define the type via the predefined\
    \ constants in the `NotifyDescriptor`, as listed in [Table 13-1](#Chapter13.html#tab_13_1).\n\
    \n![Image](images/t1301.jpg)\n\nAn option type defines which buttons are displayed\
    \ in the dialog, for which the constants shown in [Table 13-2](#Chapter13.html#tab_13_2)\
    \ are provided.\n\n![Image](images/t1302.jpg)\n\nAdditionally, you can use the\
    \ constructor or the `setAdditionalOptions()` method to pass in an `Object` array\
    \ whose components are added to the buttons of the dialog in the form of `JButton`\
    \ objects. Typically, `String` objects are passed here, though you can also use\
    \ `Component` or `Icon` objects. However, if you want to omit the default buttons,\
    \ only custom buttons can be provided via the `setOptions()` method or by passing\
    \ them in to the constructor. Here, too, the classes `String`, `Component`, and\
    \ `Icon` are used:\n\n```\nNotifyDescriptor d = new NotifyDescriptor(\n   \"Text\"\
    ,  // Dialog message\n   \"Title\", // Dialog title\n   NotifyDescriptor.OK_CANCEL_OPTION,\
    \    // Buttons\n   NotifyDescriptor.INFORMATION_MESSAGE, // Symbol\n   null,\
    \    // Own buttons as Object[]\n   null);   // Additional buttons as Object[]\n\
    ```\n\nDialog description, such as the one defined previously, is passed in to\
    \ the `notify()` method of the `DialogDisplayer` class, which is responsible for\
    \ the creation and display of dialogs, and also gives a return value when the\
    \ dialog closes. The `DialogDisplayer` is designed as a global service, whose\
    \ provider is supplied by the `getDefault()` method via the Lookup.\n\n```\nObject\
    \ retval = DialogDisplayer.getDefault().notify(d);\n```\n\nYou can identify the\
    \ buttons the user clicked by comparison with the constants listed in [Table 13-3](#Chapter13.html#tab_13_3).\n\
    \n![Image](images/t1303.jpg)\n\n![Image](images/t1303a.jpg)\n\nFor the most common\
    \ dialog types, the Dialogs API provides three subclasses of the `NotifyDescriptor`\
    \ class, so you only need to define a few parameters. We will take a closer look\
    \ at these classes with examples in the following sections.\n\n#### Information\
    \ Dialog\n\nCreate an information dialog via the `NotifyDescriptor.Message` class.\
    \ Pass the text to be displayed to the constructor, as well as an optional message\
    \ type. By default, the dialog shows the information symbol, as shown in [Figure\
    \ 13-1](#Chapter13.html#fig_13_1).\n\n```\nNotifyDescriptor nd = new NotifyDescriptor.Message(\"\
    Information\");\n```\n\n![Image](images/1301.jpg)\n\n***Figure 13-1.** Information\
    \ dialog*\n\n#### Question Dialog\n\nShould the user be enabled to answer a question\
    \ posed in the dialog (see [Figure 13-2](#Chapter13.html#fig_13_2)), use the `NotifyDescriptor.Confirmation`\
    \ class. To that end, a range of constructors is available for passing in the\
    \ message, title, message type, and additional option types.\n\n```\nNotifyDescriptor\
    \ d = new NotifyDescriptor.Confirmation(\n   \"You can place any String or Component\
    \ here\",\n   \"That's a question\");\n```\n\n![Image](images/1302.jpg)\n\n***Figure\
    \ 13-2.** Question dialog*\n\n#### Input Dialog\n\nAn input dialog is easily created\
    \ via the `NotifyDescriptor.InputLine` class. Define the text and title to be\
    \ displayed in the input area of the dialog (see [Figure 13-3](#Chapter13.html#fig_13_3)).\
    \ Optionally, pass in an option type and message type so that the desired buttons\
    \ and symbols are shown.\n\n```\nNotifyDescriptor d = new NotifyDescriptor.InputLine(\n\
    \   \"First and last name: \",\n   \"Please enter your name\");\n```\n\n![Image](images/1303.jpg)\n\
    \n***Figure 13-3.** Input dialog*\n\nAccess text entered by the user via the `getInputText()`\
    \ method. Optionally, enter text into the field via the `setInputText()` method.\n\
    \n### Custom Dialogs\n\nCustom dialogs are created via the `DialogDescriptor`\
    \ class. This class is an extension of the `NotifyDescriptor` class. Pass in a\
    \ `Component` object to be displayed, while also defining dialog modality and\
    \ a related `ActionListener` that reacts when the buttons are clicked. Optionally,\
    \ pass in a `HelpCtx` object, providing the ID of a help topic so that a Help\
    \ button is automatically displayed on the dialog. For the `DialogDescriptor`,\
    \ create a `Dialog` object via the `DialogDisplayer`'s `createDialog()` method.\
    \ Alternatively, display the dialog directly, via the `notify()` or `notifyLater()`\
    \ methods.\n\n#### Displaying Notifications\n\nCreating your own dialogs, for\
    \ example, in order to query certain data from the user, you can display notifications\
    \ to the user (see the section *Wizards*), equivalent to a wizard. The notification\
    \ line, which is automatically integrated by the Dialogs API, can be created if\
    \ needed via the `createNotificationLineSupport()` method of your `NotifyDescriptor`\
    \ instance. Thus, the notification line is created in the form of a `NotificationLineSupport`\
    \ instance at the bottom of the dialog (see [Figure 13-4](#Chapter13.html#fig_13_4)).\
    \ You can display information with the following methods in that line:\n\n```\n\
    setInformationMessage(String msg)\nsetWarningMessage(String msg)\nsetErrorMessage(String\
    \ msg)\n```\n\nEach of these methods also sets a corresponding icon in front of\
    \ the displayed notification. You can read the respectively displayed notification\
    \ via the corresponding `get` methods. With the `clearMessages()` method you can\
    \ delete a displayed notification again.\n\n![Image](images/1304.jpg)\n\n***Figure\
    \ 13-4.** Dialog with integrated notification line*"
  raw: '### Summary


    With the Nodes and Explorer API the NetBeans Platform provides a universal framework
    for displaying very different data. In this chapter you learned the basics about
    the different node classes and the functionality of a node container. Using an
    example, you created your own node classes and container and used the Explorer
    API to display some data defined in an XML file.


    ## C H A P T E R  13


    ## Dialogs and Wizards


    The *Dialogs API* helps you create and display dialogs and wizards. The dialogs
    are based on the Java `Dialog` class. Using the Dialogs API, you can display standard
    dialogs, as well as custom dialogs tailored to specific business needs. In addition,
    the API integrates well with the NetBeans window system, as well as the NetBeans
    help system. Wizards can be seen as a special kind of dialog and are therefore
    part of the Dialogs API.


    ### Standard Dialogs


    Use the `NotifyDescriptor` class to define the properties of a standard dialog.
    Provide a message in the form of a `String`, an `Icon`, or a `Component`, which
    will be displayed with the dialog. Optionally, use an array to display multiple
    messages in varying situations. Different types of messages can be specified,
    giving control over the icon displayed. Define the type via the predefined constants
    in the `NotifyDescriptor`, as listed in [Table 13-1](#Chapter13.html#tab_13_1).


    ![Image](images/t1301.jpg)


    An option type defines which buttons are displayed in the dialog, for which the
    constants shown in [Table 13-2](#Chapter13.html#tab_13_2) are provided.


    ![Image](images/t1302.jpg)


    Additionally, you can use the constructor or the `setAdditionalOptions()` method
    to pass in an `Object` array whose components are added to the buttons of the
    dialog in the form of `JButton` objects. Typically, `String` objects are passed
    here, though you can also use `Component` or `Icon` objects. However, if you want
    to omit the default buttons, only custom buttons can be provided via the `setOptions()`
    method or by passing them in to the constructor. Here, too, the classes `String`,
    `Component`, and `Icon` are used:


    **`NotifyDescriptor`** `d = new` **`NotifyDescriptor`**`(`

    `   "Text",  // Dialog message`

    `   "Title", // Dialog title`

    `   NotifyDescriptor.OK_CANCEL_OPTION,    // Buttons`

    `   NotifyDescriptor.INFORMATION_MESSAGE, // Symbol`

    `   null,    // Own buttons as Object[]`

    `   null);   // Additional buttons as Object[]`


    Dialog description, such as the one defined previously, is passed in to the `notify()`
    method of the `DialogDisplayer` class, which is responsible for the creation and
    display of dialogs, and also gives a return value when the dialog closes. The
    `DialogDisplayer` is designed as a global service, whose provider is supplied
    by the `getDefault()` method via the Lookup.


    `Object retval = DialogDisplayer.getDefault().notify(d);`


    You can identify the buttons the user clicked by comparison with the constants
    listed in [Table 13-3](#Chapter13.html#tab_13_3).


    ![Image](images/t1303.jpg)


    ![Image](images/t1303a.jpg)


    For the most common dialog types, the Dialogs API provides three subclasses of
    the `NotifyDescriptor` class, so you only need to define a few parameters. We
    will take a closer look at these classes with examples in the following sections.


    #### Information Dialog


    Create an information dialog via the `NotifyDescriptor.Message` class. Pass the
    text to be displayed to the constructor, as well as an optional message type.
    By default, the dialog shows the information symbol, as shown in [Figure 13-1](#Chapter13.html#fig_13_1).


    `NotifyDescriptor nd = new` **`NotifyDescriptor.Message`**`("Information");` ![Image](images/1301.jpg)


    ***Figure 13-1.** Information dialog*


    #### Question Dialog


    Should the user be enabled to answer a question posed in the dialog (see [Figure
    13-2](#Chapter13.html#fig_13_2)), use the `NotifyDescriptor.Confirmation` class.
    To that end, a range of constructors is available for passing in the message,
    title, message type, and additional option types.


    `NotifyDescriptor d = new` **`NotifyDescriptor.Confirmation`**`(`

    `   "You can place any String or Component here",`

    `   "That''s a question");` ![Image](images/1302.jpg)


    ***Figure 13-2.** Question dialog*


    #### Input Dialog


    An input dialog is easily created via the `NotifyDescriptor.InputLine` class.
    Define the text and title to be displayed in the input area of the dialog (see
    [Figure 13-3](#Chapter13.html#fig_13_3)). Optionally, pass in an option type and
    message type so that the desired buttons and symbols are shown.


    `NotifyDescriptor d = new` **`NotifyDescriptor.InputLine`**`(`

    `   "First and last name: ",`

    `   "Please enter your name");` ![Image](images/1303.jpg)


    ***Figure 13-3.** Input dialog*


    Access text entered by the user via the `getInputText()` method. Optionally, enter
    text into the field via the `setInputText()` method.


    ### Custom Dialogs


    Custom dialogs are created via the `DialogDescriptor` class. This class is an
    extension of the `NotifyDescriptor` class. Pass in a `Component` object to be
    displayed, while also defining dialog modality and a related `ActionListener`
    that reacts when the buttons are clicked. Optionally, pass in a `HelpCtx` object,
    providing the ID of a help topic so that a Help button is automatically displayed
    on the dialog. For the `DialogDescriptor`, create a `Dialog` object via the `DialogDisplayer`''s
    `createDialog()` method. Alternatively, display the dialog directly, via the `notify()`
    or `notifyLater()` methods.


    #### Displaying Notifications


    Creating your own dialogs, for example, in order to query certain data from the
    user, you can display notifications to the user (see the section *Wizards*), equivalent
    to a wizard. The notification line, which is automatically integrated by the Dialogs
    API, can be created if needed via the `createNotificationLineSupport()` method
    of your `NotifyDescriptor` instance. Thus, the notification line is created in
    the form of a `NotificationLineSupport` instance at the bottom of the dialog (see
    [Figure 13-4](#Chapter13.html#fig_13_4)). You can display information with the
    following methods in that line:


    `setInformationMessage(String msg)`

    `setWarningMessage(String msg)`

    `setErrorMessage(String msg)`


    Each of these methods also sets a corresponding icon in front of the displayed
    notification. You can read the respectively displayed notification via the corresponding
    `get` methods. With the `clearMessages()` method you can delete a displayed notification
    again.


    ![Image](images/1304.jpg)


    ***Figure 13-4.** Dialog with integrated notification line*'
