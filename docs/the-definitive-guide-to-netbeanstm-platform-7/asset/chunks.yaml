- fmt: "# Java Authentication and Authorization (JAAS)\n\nThe Java Authentication\
    \ and Authorization (JAAS) API is an alternative to the JNDI. As you can surmise\
    \ from the name, the focus is on authentication rather than querying attributes\
    \ in the directory. As a result, it is not as easy to create the example in [Listing\
    \ 33-4](#Chapter33.html#list_33_4). However, this section will show you how to\
    \ use and integrate the JAAS API and its configuration in your NetBeans Platform\
    \ application.\n\nSimilar to the JNDI concept, you first need a configuration.\
    \ JAAS provides such a configuration in a certain file structure. This file is\
    \ typically defined by a command-line parameter. It makes sense to pack this file\
    \ in the module in a NetBeans Platform application. Use a variation of the `LoginContext`\
    \ constructors, to which a `ConfigFile` instance can be passed; the configuration\
    \ file is passed to this instance. You can get that `URI` or `URL` with the `getResource()`\
    \ method.\n\nThe JAAS API provides different login modules for different authentication\
    \ mechanisms, as it does for the LDAP protocol with which you can communicate\
    \ with your directory server. In the configuration file shown in [Listing 33-5](#Chapter33.html#list_33_5)\
    \ which login module is used in which configuration is assigned.\n\n**Listing\
    \ 33-5.** JAAS Configuration File\n\n```\nLoginJaas {\n   com.sun.security.auth.module.LdapLoginModule\
    \ REQUIRED\n   userProvider=\"ldap://localhost:10389\"\n   authIdentity=\"uid={USERNAME},ou=users,ou=system\"\
    \n   useSSL=false\n   debug=true;\n};\n```\n\nDifferent configurations can be\
    \ managed in one file. Each is given one name. You indicate the URL to the directory\
    \ server as with JNDI and specify the path to the user's entry. The user name\
    \ and the password are queried or set separately, as you can see in [Listing 33-6](#Chapter33.html#list_33_6).\n\
    \n**Listing 33-6.** Authentication with the JAAS API\n\n```\nimport com.sun.security.auth.login.ConfigFile;\n\
    import java.security.Principal;\nimport javax.security.auth.callback.Callback;\n\
    import javax.security.auth.callback.CallbackHandler;\nimport javax.security.auth.callback.NameCallback;\n\
    import javax.security.auth.callback.PasswordCallback;\nimport javax.security.auth.callback.UnsupportedCallbackException;\n\
    import javax.security.auth.login.LoginContext;\n…\npublic class SecurityManager\
    \ implements CallbackHandler {\n   private static SecurityManager inst = new SecurityManager();\n\
    \   private String user;\n   private String password;\n\n   private SecurityManager()\
    \ {\n   }\n\n   public static SecurityManager getDefault() {\n      return inst;\n\
    \   }\n\n   public boolean login(String user, String password) {\n      this.user\
    \ = user;\n      this.password = password;\n      LoginContext loginContext =\
    \ null;\n      try {\n         URL url = SecurityManager.class.getResource(\"\
    config.jaas\");\n         loginContext = new LoginContext(\"LoginJaas\",\n   \
    \              null, this, new ConfigFile(url.toURI()));\n         loginContext.login();\n\
    \         for (Principal p : loginContext.getSubject().getPrincipals()) {\n  \
    \           System.out.println(\"Principal: <\" + p.getClass() + \"> \" + p.getName());\n\
    \         }\n         return true;\n      } catch (LoginException e) {\n     \
    \    return false;\n      }\n   }\n\n   @Override\n   public void handle(Callback[]\
    \ callbacks) throws IOException, UnsupportedCallbackException {\n      for (Callback\
    \ cb : callbacks) {\n         if (cb instanceof NameCallback) {\n            NameCallback\
    \ nc = (NameCallback) cb;\n            nc.setName(this.user);\n         } else\
    \ if (cb instanceof PasswordCallback) {\n            PasswordCallback pc = (PasswordCallback)\
    \ cb;\n            pc.setPassword(this.password.toCharArray());\n         }\n\
    \      }\n   }\n}\n```\n\nTransfer a `CallbackHandler` object to the `LoginContext`\
    \ constructor. Implement the `CallbackHandler` interface directly in the `SecurityManager`\
    \ class. The method `handle()` is provided an array with `Callback` instances.\
    \ Check the type of instances and referring actions. This is mainly setting the\
    \ user name and the password which can be queried during the login process by\
    \ the `login()` method. If the authentication is carried out completely, you can\
    \ query the user's features by different `Principal` instances.\n\n## Adapting\
    \ the Application\n\nThis section will deal with the functionalities of the NetBeans\
    \ Platform for adapting the application to a specific user. On the one hand, it\
    \ is about how to dynamically adapt the System Filesystem, which contains the\
    \ configuration of the menu. On the other hand, it is about how to switch on and\
    \ off certain functions on the module layer.\n\nYou need the `login()` method\
    \ of the `LoginHandler` class from the beginning of this chapter which was withheld\
    \ until now. This method transfers the data typed in by the user to the security\
    \ manager (see the previous section *Authentication*). The security manager is\
    \ concerned with the authentication on the server. If the user is logged in successfully,\
    \ get the referring user groups with the method `getUserGroups()`. If the list\
    \ is empty, the user is not assigned to any group, so the user has no authority.\
    \ Otherwise, give the list to the `UserGroupFileSystem` class (discussed in the\
    \ following section *System Filesystem*) certain modules become activated or deactivated.\
    \ Implement this functionality in the class `UserGroupModuleSystem` (discussed\
    \ later in this chapter in the section *Module System*). See [Listing 33-7](#Chapter33.html#list_33_7).\n\
    \n**Listing 33-7.** Adaptation of the Application After Successful Login\n\n```\n\
    public class LoginHandler implements ActionListener {\n   …\n   private void login()\
    \ {\n      if(!SecurityManager.getDefault().login(panel.getUsername(), panel.getPassword()))\
    \ {\n         panel.setInfo(\"Wrong password or username\");\n      } else {\n\
    \         List<UserGroup> groups = SecurityManager.getDefault().getUserGroups();\n\
    \         if (groups.isEmpty()) {\n            panel.setInfo(\"You have no access\
    \ rights\");\n         } else {\n            try {\n               UserGroupFileSystem.getDefault().setUserGroups(groups);\n\
