    #### 节点容器


    `PlaylistView` 中表示的所有节点都由一个容器管理。容器基于 `Children` 类。此类有不同的变体，应根据用途进行选择。你将使用 `Index.ArrayChildren`
    类作为节点容器的超类（参见清单 44-18）。要添加到播放列表的节点存储在 `ArrayList` 类型的对象中。你通过 `initCollection()`
    方法提供此列表。该列表最初为空，因为节点是通过从媒体库拖放来插入的。使用 `getRemaining()` 方法，你可以返回剩余 MP3 文件的列表，该列表可以直接传递给播放器以播放播放列表。


