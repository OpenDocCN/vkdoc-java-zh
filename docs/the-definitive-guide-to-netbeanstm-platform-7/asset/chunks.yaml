  trans: '

    #### 数据系统


    在 NetBeans 平台中，数据可以是本地的，也可以通过 FTP、CVS、数据库或 XML 文件获取。通过抽象化，一个模块对数据的访问对所有其他模块是透明的。因此，实际的数据访问本身并非关注点，因为它由
    NetBeans 平台的 API 处理。


    #### 数据管理与表示框架


    基于文件和已保存数据的抽象化（如前一段所述），NetBeans 平台提供了一个框架，通过该框架可以为数据分配特定的操作或功能。该框架还负责管理和表示数据及其在用户界面上的操作。


    #### 中央服务管理


    NetBeans 平台通过查找概念提供了中央服务管理。这使你能够独立地提供和使用应用程序内提供的特定服务。这个概念很重要，因为它能够实现应用程序各部分之间的松散耦合。这是
    NetBeans 平台应用所追求的重要目标之一。


    #### 国际化


    NetBeans 平台提供了支持 JavaHelp 和其他资源国际化的类和方法。你可以轻松地将文本常量存储在属性文件中。NetBeans 平台还会加载适用于当前国家和语言设置的文本常量和图标。


    #### 帮助系统


    通过标准的 JavaHelp 系统，NetBeans 平台提供了一个中央系统，用于向最终用户集成和显示帮助主题。此外，各个模块可以向应用程序的帮助系统贡献自己的主题。最重要的是，NetBeans
    平台还允许你提供上下文相关的帮助。


    ### 总结


    在本章中，你了解了富客户端所能带来的不同，以及富客户端所具备的优势，包括其模块化架构，这种架构得益于富客户端平台独有的模块系统。然而，富客户端平台还提供了许多其他优势和特性，包括对一致用户界面的支持，以及在运行时用新功能更新应用程序的能力。最后，本章介绍了
    NetBeans 平台最重要的特性。


    ## 第 2 章


    ## NetBeans 平台的结构


    为了让你了解富客户端应用程序的结构，并展示你正在创建的应用程序与 NetBeans 平台之间的关系，本章将讨论 NetBeans 平台的架构。本章还将介绍
    NetBeans 平台的独立构建模块，以及 NetBeans 运行时容器为你处理的责任。最后，本章将解释 NetBeans 类加载器系统的结构，以及它在基于
    NetBeans 平台构建的应用程序中所扮演的角色。


    ### NetBeans 平台架构


    现代应用程序的规模和复杂性正在稳步增长。同时，专业应用程序首先需要具备灵活性，以便能够快速、轻松地扩展。这使得有必要将应用程序划分为不同的部分。因此，每个不同的部分都是一个构建模块，共同构成模块化架构。这些不同的部分必须相互独立，提供定义良好的接口供同一应用程序的其他部分使用，并具备其他部分可以使用的特性。


    将应用程序划分为模块（即逻辑上相互依赖的部分）极大地增强了应用程序的设计。与单体应用程序（其中每个类都可以使用任何其他类的代码）相比，这种架构更加灵活，更重要的是，更易于维护。虽然在
    Java 中可以保护类免受外部世界的访问，但这种类级别的保护粒度太细，对大多数应用程序来说用处不大。NetBeans 平台正是解决了现代客户端应用程序的这一核心问题。其概念和结构支持灵活且模块化应用程序的开发与概念化。


    NetBeans 平台的基本构建模块是模块。一个模块是一组功能相关的类，以及该模块暴露的接口描述，以及其运行所需的其他模块的描述。完整的 NetBeans
    平台，以及在其之上构建的应用程序，都被划分为模块。这些模块由 NetBeans 平台的核心加载，该核心被称为 *NetBeans 运行时容器*。NetBeans
    运行时容器动态且自动地加载应用程序的模块，之后还负责运行该应用程序。


    NetBeans IDE 是一个模块化富客户端应用程序的绝佳示例。IDE 的功能和特性，例如其 Java 语言支持或代码编辑器，都是以模块的形式在 NetBeans
    平台之上创建的，如图 2-1 所示。这带来了巨大的优势，因为应用程序可以通过添加更多模块进行扩展，并适应特定的用户需求，从而允许停用或卸载未使用的特定模块。


    ![图片](img/0201.jpg)


    ***图 2-1.** NetBeans IDE 的概念结构*


    为了使你的应用程序能够达到这种模块化水平，NetBeans 平台一方面提供了使模块能够被其他模块扩展的机制和概念，另一方面也使它们能够在不相互依赖的情况下进行通信。换句话说，NetBeans
    平台支持应用程序内模块的松散耦合。


    为了优化模块内代码的封装（这在模块化系统中是必需的），NetBeans 平台提供了自己的*类加载器系统*。每个模块由其类加载器加载，并在此过程中形成一个独立的代码单元。因此，一个模块可以显式地使其包可用，从而将特定功能暴露给其他模块。为了使用其他模块的功能，一个模块可以声明对其他模块的依赖。这些依赖关系在模块的清单文件中声明，并由
    NetBeans 运行时容器解析，确保应用程序始终以一致的状态启动。最重要的是，这种松散耦合在 NetBeans 平台的声明式概念中发挥了作用。我的意思是，尽可能多地在描述文件和配置文件中进行定义，以避免这些概念与
    Java 源代码的硬连接。

