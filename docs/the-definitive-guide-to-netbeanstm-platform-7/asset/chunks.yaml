- fmt: "### Creating Persistent Entity\n\nFirst, you create a persistent entity class\
    \ that will represent the data to be managed. This way, you are able to read,\
    \ change, save, and delete products in a database. The NetBeans IDE provides a\
    \ wizard as well. It is possible to directly create a persistence unit, too; however,\
    \ you should configure a database in advance. You can use the integrated Java\
    \ DB, which you can configure in the *Services* window under *Databases*, over\
    \ the context menu (see [Chapter 26](#Chapter26.html#ch26)).\n\nCall *File ![Image](images/U001.jpg)\
    \ New File… ![Image](images/U001.jpg) Persistence ![Image](images/U001.jpg) Entity\
    \ Class* to create a persistent entity class. Call it *Product* and assign it\
    \ to the package `com.galileo.netbeans.order.entities.` Activate the option *Create\
    \ Persistence Unit* to let the wizard create it (you will need to enter more information\
    \ on the following wizard page). Name the persistence unit *OrderSystemPU* and\
    \ choose *EclipseLink* as persistence provider. To use the previously created\
    \ database, use `jdbc/ProductDatabase` as data source. Choose *Create* as table\
    \ generation strategy so the necessary tables in the database are automatically\
    \ generated when the first product is added. (See [Figure 32-2](#Chapter32.html#fig_32_2).)\n\
    \n![Image](images/3202.jpg)\n\n***Figure 32-2.** Creating a persistence entity\
    \ class and a persistence unit*\n\nThe class is created with the attribute `id`\
    \ which uniquely identifies an entry in a database. The value of this ID is automatically\
    \ given by the database. You add further attributes as an example (`orderId`,\
    \ `name`, `price`) with referring getter and setter methods. (See [Listing 32-1](#Chapter32.html#list_32_1).)\n\
    \n***Listing 32-1.** Persistent Entity Class Product with JPA Annotation for Saving\
    \ the Object in the Database*\n\n```\nimport java.io.Serializable;\nimport javax.persistence.Entity;\n\
    import javax.persistence.GeneratedValue;\nimport javax.persistence.GenerationType;\n\
    import javax.persistence.Id;\n@Entity\npublic class Product implements Serializable\
    \ {\n   @Id\n   @GeneratedValue(strategy = GenerationType.AUTO)\n   private Long\
    \   id;\n   private String orderId;\n   private String name;\n   private Double\
    \ price;\n\npublic Long getId() {\n      return id;\n   }\npublic void setId(Long\
    \ id) {\n      this.id = id;\n   }\npublic String getName() {\n      return name;\n\
    \   }\npublic void setName(String name) {\n      this.name = name;\n   }\n   …\n\
    }\n```\n\n### Creating a RESTful Web Service\n\nThere are several wizards available\
    \ for creating a RESTful web service. Besides creating a simple service you can\
    \ directly create a web service for your use case, too. Meanwhile, the referring\
    \ methods to manipulate and query the data are automatically created. Call *File\
    \ ![Image](images/U001.jpg) New File… ![Image](images/U001.jpg) Web Services ![Image](images/U001.jpg)*\
    \ *RESTful Web Services from Entity Classes* and add the class `Product` which\
    \ you have created before. Add the service class to the package `com.galileo.netbeans.order.service`.\n\
    \nThe created service is split in two classes: `AbstractFacade` and `ProductFacadeREST`.\
    \ The `AbstractFacade` class is an abstract implementation of methods for getting\
    \ access to databases over the entity manager. Those methods that should be provided\
    \ as services are implemented in `ProductFacadeREST`; the entity manager is managed\
    \ in this class. (See [Listing 32-2](#Chapter32.html#list_32_2).)\n\n***Listing\
    \ 32-2.** RESTful Web Service Class to Manipulate and Get Data of the Type Product*\n\
    \n```\nimport com.galileo.netbeans.order.entities.Product;\nimport javax.ws.rs.Consumes;\n\
    import javax.ws.rs.DELETE;\nimport javax.ws.rs.GET;\nimport javax.ws.rs.POST;\n\
    import javax.ws.rs.PUT;\nimport javax.ws.rs.Path;\nimport javax.ws.rs.PathParam;\n\
    import javax.ws.rs.Produces;\n\n@Stateless\n@Path(\"com.galileo.netbeans.order.entities.product\"\
    )\npublic class ProductFacadeREST extends AbstractFacade<Product> {\n\n@PersistenceContext(unitName\
    \ = \"OrderServicePU\")\n   private EntityManager em;\n\n   public ProductFacadeREST()\
    \ {\n      super(Product.class);\n   }\n\n   @POST\n   @Override\n   @Consumes({\"\
    application/xml\"})\npublic void create(Product entity) {\n      super.create(entity);\n\
    \   }\n\n   @PUT\n   @Override\n   @Consumes({\"application/xml\"})\n   public\
    \ void edit(Product entity) {\n      super.edit(entity);\n   }\n\n   @DELETE\n\
    \   @Path(\"{id}\")\npublic void remove (@PathParam(\"id\") Long id) {\n     \
    \ super.remove(super.find(id));\n   }\n\n   @Override\nprotected EntityManager\
    \ getEntityManager() {\n      return em;\n   }\n   …\n}\n```\n\nThe methods have\
    \ annotations to identify which HTTP operations are used. Besides, the format\
    \ in which the data is transferred is defined with `@Consumes` and `@Produces`.\
    \ In addition to the type `application/xml` you can also choose `application/json`.\n\
    \nSo, you have created a simple RESTful web service you can now provide on the\
    \ server with *Deploy*. The interface of the service is defined by a WADL file\
    \ which is also published by the Java EE server. You can test the service with\
    \ a web interface: *Test RESTful Web Services* in the context menu of the application\
    \ project.\n\n### Install NetBeans Platform Application\n\nAfter creating a web\
    \ service you now come back to the NetBeans Platform. First, create a NetBeans\
    \ Platform application project which you will call *OrderApplication*. Before\
    \ creating an application module, you have to add accessory modules from the extended\
    \ NetBeans IDE to the application. To do so, go into the *Properties* of the project\
    \ on the category *Libraries*. There you add the following modules:\n\n*   enterprise/RESTful\
    \ Web Service Libraries\n*   ide/JAXB 2.2 Library\n*   ide/JAXB API\n\nThe *Jersey*\
    \ libraries, which represent the reference implementation of the Java API for\
    \ RESTful web services (JAX-RS), are hidden behind the module RESTful Web Service\
    \ Libraries."
