    ### 目录服务器


    用户身份验证所需的数据通常由目录服务器管理。借助目录服务器，您可以通过轻量级目录访问协议（LDAP）交换必要的信息。为了实施示例并进行演示，您需要安装一个本地目录服务器。您可以创建并修改所需的数据结构以供其使用。


    #### 安装测试环境


    *Apache Directory*项目将用作服务器。其一部分是*ApacheDS*，这是一个用 Java 编写的、符合 LDAP 标准的目录服务器。该项目的另一部分是*Apache
    Directory Studio*，这是一个工具平台，您将用作目录服务器 ApacheDS 的图形用户界面。您只需下载并安装嵌入了 ApacheDS 的目录工作室。安装软件后，您可以启动工作室并安装服务器。但在安装服务器之前，您必须先添加它。通过*文件
    ![Image](img/U001.jpg) 新建…*打开向导，并在*Apache DS*类别中选择*Apache DS 服务器*条目。在后续页面中，您只需为其命名，然后点击*完成*结束向导。之后，您就可以配置服务器了。（参见图
    33-1。）


    ![Image](img/3301.jpg)


    ***图 33-1.** 安装 Apache Directory 服务器实例*


    创建的实例将以默认设置添加到*服务器*窗口中。在此窗口中，首先启动服务器。之后，您可以通过上下文菜单中的*LDAP 浏览器 ![Image](img/U001.jpg)
    创建连接*来创建连接。此连接将添加到*连接*窗口中。切换到该窗口，并通过上下文菜单中的*打开连接*建立与服务器的连接。连接建立后，*LDAP 浏览器*窗口中将显示一个目录信息树（DIT）。（参见图
    33-2。）接下来，您将向 LDAP 浏览器窗口添加必要的用户数据。


    ![Image](img/3302.jpg)


    ***图 33-2.** Apache Directory Studio*

