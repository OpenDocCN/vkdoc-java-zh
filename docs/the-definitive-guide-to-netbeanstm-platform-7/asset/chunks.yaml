  raw: '#### Alignment and Anchoring


    One great advantage of the GUI Builder is the support for placing components.Reference
    lines are displayed (depending on the components already added to the form) to
    enable the arrangement of new components. A component is automatically arranged
    according to the reference lines when brought closer to them; you can quickly
    create an exactly arranged and structured user interface. (See [Figure 41-5](#Chapter41.html#fig_41_5).)


    ![Image](images/4105.jpg)


    ***Figure 41-5.** Automatic alignment and anchoring of components*


    So-called *anchoring points* are defined for determining the layout manager behavior
    when changing the size of a window. Components are either anchored to components
    next to them or to margins of the form. In [Figure 41-5](#Chapter41.html#fig_41_5)
    you see how the button *jButton1* is anchored to the margin of the form and to
    the text field *jTextField1*. The text field itself is anchored to the upper margin
    of the form; that is, the size of the form is changed below and thus the button''s
    position is not changed. If the Form is made bigger on the right side, the button
    “sticks” to the right border. The GUI Builder suggests anchoring points depending
    on the location (marked visibly in a half-round shape). You can change them with
    *Anchor* in the context menu, though.


    ### Adapting Components


    You have learned how to place and change the place of different components within
    a Form. Now you also want to adapt these components.


    #### Text and Variable Name


    The components which you drag from the Palette to its Form get a default caption
    referring to the types'' name. The variables are named the same way. You can adapt
    the caption either with *F2* or with *Edit Text* out of the context menu. You
    can also adapt the variable name in the context menu with *Change Variable Name*.


    #### Application-Specific Code


    In the section *Palette* I wrote that there is at first no possibility of editing
    the code produced by the GUI Builder. However, the *Code Customize,* shown in
    [Figure 41-6](#Chapter41.html#fig_41_6), makes this possible. You can call the
    Code Customizer for each component out of the context menu with *Customize Code*.
    Doing this, you can add your user-specific code at different locations of the
    initializing and of the declaration code. Furthermore, it is possible to let the
    component create either locally or as a field. In that last case you can define
    additional attributes referring to the access or the storage.


    ![Image](images/4106.jpg)


    ***Figure 41-6.** Code Customizer for adapting the initialization and declaration
    of a component*


    Earlier I mentioned that the Properties window provides a special Code view (*Code*).
    This offers additional opportunities to intervene besides those options shown
    in [Figure 41-6](#Chapter41.html#fig_41_6). Doing this, you can not only easily
    edit the code, but at the same time you also get a complete overview of all user-specific
    extensions of the code.


    ### Actions


    Actions are an elementary part of a user interface. Actions shall be executed
    in reaction to an event triggered by the user. Such an event can be a mouse click
    or pressing a key, for example. You can define an individual action for each event
    of a component. The GUI Builder connects event and action for you. You can choose
    from all available events in the context menu (*Events*). Clicking a certain event,
    a listener is automatically registered for it. This listener calls the method.
    Then you can implement its body in the Source view.


    An example will illustrate this. An action will be implemented for the *actionPerformed*
    event (so clicking on the button) for the button shown in [Figure 41-5](#Chapter41.html#fig_41_5).
    This is why you call the following entry out of the context menu of the button
    *jButton1*: *Events ![Image](images/U001.jpg) Action ![Image](images/U001.jpg)
    actionPerformed*. The editor automatically changes into the Source view and jumps
    into the referring method which is called with this event. In [Listing 41-1](#Chapter41.html#list_41_1)
    it is the method `jButton1ActionPerformed()`.


    ***Listing 41-1.** Implementation of an Action. Only the Methods Body Can Be Edited.*


    `private void` **`jButton1ActionPerformed`**`(java.awt.event.ActionEvent evt)
    {`

    `   jTextField1.setText("Hello World");`

    `}`


    If you look at the automatically generated code block in the Source view, you
    will find the registration of a listener (as shown in [Listing 41-2](#Chapter41.html#list_41_2))
    which calls the method with the actual action.


    ***Listing 41-2.** Automatic Registration of an Event Listener by the GUI Builder*


    `jButton1.addActionListener(new java.awt.event.ActionListener() {`

    `   public void actionPerformed(java.awt.event.ActionEvent evt) {`

    **`jButton1ActionPerformed`**`(evt);`

    `   }`

    `});`


    You can easily get an overview about which events are registered and which other
    events are provided. Get this overview in the event view (*Events*) of the Properties
    window. Furthermore, you can also register, delete, or rename multiple *handlers*
    or jump to their position in the source code. (See [Figure 41-7](#Chapter41.html#fig_41_7).)


    ![Image](images/4107.jpg)


    ***Figure 41-7.** Events view for managing the actions handler of a certain component*


    ### Beans Binding


    On the one hand, you can bind GUI components to a data source with the Beans Binding
    Framework (JSR 295). On the other hand, you can keep features of different GUI
    components synchronous with each other. These are tasks which have to be implemented
    in nearly every rich-client application. The Beans Binding Framework together
    with the NetBeans IDE or the GUI Builder ensure that you only have to write a
    few lines of code.


    I will demonstrate the advantages of the Beans Binding Framework and of the support
    by the GUI Builder with a typical example (shown in [Figure 41-8](#Chapter41.html#fig_41_8))
    in which you take an already existing database and create entity classes for its
    tables. Then you bind the data from the database to a table in a NetBeans Platform
    application. Furthermore, you bind a detail view to a table. Doing so, some changes
    both in the table and in the detail view should be possible.


    ![Image](images/4108.jpg)


    ***Figure 41-8.** Beans Binding example application*'
  trans: '

    #### 对齐与锚定


    GUI 构建器的一大优势在于支持组件放置。系统会显示参考线（取决于已添加到窗体中的组件），以便排列新组件。当组件靠近参考线时，会自动根据参考线进行排列；您可以快速创建排列精确、结构清晰的用户界面。（参见图
    41-5。）


    ![Image](img/4105.jpg)


    ***图 41-5.** 组件的自动对齐与锚定*


    所谓的*锚定点*用于定义更改窗口大小时布局管理器的行为。组件要么锚定到其相邻组件，要么锚定到窗体的边距。在图 41-5 中，您可以看到按钮 *jButton1*
    如何锚定到窗体的边距以及文本字段 *jTextField1*。文本字段本身锚定到窗体的上边距；也就是说，窗体的大小在下方更改，因此按钮的位置不会改变。如果窗体在右侧变大，按钮会“粘”在右侧边框上。GUI
    构建器会根据位置建议锚定点（以半圆形标记可见）。不过，您可以通过上下文菜单中的 *Anchor* 来更改它们。


    ### 适配组件


    您已经学习了如何在窗体中放置和更改不同组件的位置。现在，您还需要适配这些组件。


    #### 文本与变量名


    从组件面板拖到其窗体的组件会获得一个引用类型名称的默认标题。变量的命名方式相同。您可以通过 *F2* 或上下文菜单中的 *Edit Text* 来适配标题。您也可以在上下文菜单中通过
    *Change Variable Name* 来适配变量名。


    #### 特定于应用程序的代码


    在*组件面板*部分，我提到最初无法编辑 GUI 构建器生成的代码。然而，如图 41-6 所示的*代码定制器*使这成为可能。您可以通过上下文菜单中的 *Customize
    Code* 为每个组件调用代码定制器。这样做，您可以在初始化和声明代码的不同位置添加用户特定的代码。此外，还可以让组件在本地创建或作为字段创建。在后一种情况下，您可以定义与访问或存储相关的附加属性。


    ![Image](img/4106.jpg)


    ***图 41-6.** 用于适配组件初始化和声明的代码定制器*


    之前我提到过，属性窗口提供了一个特殊的代码视图（*Code*）。除了图 41-6 中显示的选项之外，这还提供了额外的干预机会。这样做，您不仅可以轻松编辑代码，同时还能全面了解所有用户特定的代码扩展。


    ### 操作


    操作是用户界面的基本组成部分。操作应作为对用户触发事件的响应来执行。例如，此类事件可以是鼠标单击或按键。您可以为组件的每个事件定义单独的操作。GUI 构建器会为您连接事件和操作。您可以从上下文菜单（*Events*）中选择所有可用的事件。单击某个特定事件，系统会自动为其注册一个监听器。此监听器会调用该方法。然后，您可以在源代码视图中实现其方法体。


    下面通过一个示例来说明。将为图 41-5 中显示的按钮的 *actionPerformed* 事件（即单击按钮）实现一个操作。因此，您需要从按钮 *jButton1*
    的上下文菜单中调用以下条目：*Events ![Image](img/U001.jpg) Action ![Image](img/U001.jpg) actionPerformed*。编辑器会自动切换到源代码视图，并跳转到与此事件调用的相关方法。在清单
    41-1 中，它是方法 `jButton1ActionPerformed()`。


    ***清单 41-1.** 操作的实现。只有方法体可以编辑。*


    `private void` **`jButton1ActionPerformed`**`(java.awt.event.ActionEvent evt)
    {`

    `   jTextField1.setText("Hello World");`

    `}`


    如果您查看源代码视图中自动生成的代码块，您会发现一个监听器的注册（如清单 41-2 所示），该监听器会调用包含实际操作的方法。


    ***清单 41-2.** GUI 构建器自动注册事件监听器*


    `jButton1.addActionListener(new java.awt.event.ActionListener() {`

    `   public void actionPerformed(java.awt.event.ActionEvent evt) {`

    **`jButton1ActionPerformed`**`(evt);`

    `   }`

    `});`


    您可以轻松了解哪些事件已注册以及提供了哪些其他事件。在属性窗口的事件视图（*Events*）中获取此概览。此外，您还可以注册、删除或重命名多个*处理程序*，或跳转到它们在源代码中的位置。（参见图
    41-7。）


    ![Image](img/4107.jpg)


    ***图 41-7.** 用于管理特定组件操作处理程序的事件视图*


    ### Beans 绑定


    一方面，您可以使用 Beans 绑定框架（JSR 295）将 GUI 组件绑定到数据源。另一方面，您可以使不同 GUI 组件的特性彼此保持同步。这些是几乎每个富客户端应用程序都必须实现的任务。Beans
    绑定框架与 NetBeans IDE 或 GUI 构建器一起，确保您只需编写少量代码。


    我将通过一个典型示例（如图 41-8 所示）来演示 Beans 绑定框架以及 GUI 构建器支持的优势。在该示例中，您获取一个已有的数据库，并为其表创建实体类。然后，您将数据库中的数据绑定到
    NetBeans 平台应用程序中的表格。此外，您还将一个详细视图绑定到该表格。这样，表格和详细视图中的某些更改都应该是可行的。


    ![Image](img/4108.jpg)


    ***图 41-8.** Beans 绑定示例应用程序*

