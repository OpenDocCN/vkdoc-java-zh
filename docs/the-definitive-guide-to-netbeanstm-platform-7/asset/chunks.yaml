    #### 资源


    任何插件资源都可以通过 Eclipse 中的 `FileLocator` 类进行访问。要从 NetBeans 模块中简单加载资源，你可以通过 `getModuleResource()`
    方法扩展 `Installer` 类（参见清单 39-5）。使用可以访问所有模块资源的模块类加载器。该方法返回一个 URL，通过 `URLMapper` 类，该
    URL 会映射到 `FileObject` 实例。


    ***清单 39-5.** getModuleResource() 方法有助于加载任意模块资源。*


    `import java.net.URL;`

    `import org.openide.filesystems.FileObject;`

    `import org.openide.filesystems.URLMapper;`

    `import org.openide.modules.ModuleInstall;`


    `public class` **`Installer`**`extends ModuleInstall {`

    `   ...`

    `public FileObject` **`getModuleResource`**`(String path) {`

    `      URL url = getClass().getClassLoader().`**`getResource`**`(path);`

    **`FileObject`** `resource =` **`URLMapper`**`.`**`findFileObject`**`(url);`

    `return` **`resource`**`;`

    `   }`

    `}`


    `FileObject` 类提供了丰富的方法来处理资源。以下示例通过将模块 *resources* 目录下的 *myprops.properties* 文件内容加载到
    `Properties` 对象中，演示了这一点。


    `public final class` **`TestAction`** `implements ActionListener {`

    `public void` **`actionPerformed`**`(ActionEvent e) {`

    **`FileObject`** `res = Installer.getDefault().`**`getModuleResource`**`(`

    `                                "`**`resources/myprops.properties`**`");`

    `      Properties props = new Properties();`

    `      try {`

    `         props.load(`**`res.getInputStream()`**`);`

    `         System.out.println("Value:" + props.getProperty("key"));`

    `      } catch(Exception ex) {}`

    `   }`

    `}`


    #### 设置


    插件特定的设置，供内部和用户使用，在 Eclipse RCP 中通过 `Preferences` 对象或 `IPreferenceStore` 对象进行管理，这些对象由
    Activator 类提供。NetBeans 平台采用了一种略有不同的方法。为了管理设置，它包含了 Java Preferences API 的一个实现。通过
    `NbPreferences` 类可以获取 `Preferences` 实例。此实现的一个优点是数据存储在 NetBeans 平台用户目录中。模块特定数据和应用程序特定数据之间是有区别的。`root()`
    方法提供对存储在 *config/Preferences.properties* 文件中的设置的访问。另一方面，`forModule()` 方法处理对模块特定属性文件中数据的访问。例如，如果代码名称基是
    `com.galileo.netbeans.module`，设置将存储在 *config/Preferences/com/galileo/netbeans/module.properties*
    文件中。


    `   NbPreferences.`**`forModule`**`(MyClass.class).put("key", "value");`

    `   NbPreferences.`**`root`**`().put("key", "value");`


    你可以在第 20 章中找到关于此主题的更详细信息。


    #### 应用程序生命周期


    Eclipse RCP 应用程序的生命周期由 `IApplication` 实例处理。它实现了 `start()` 和 `stop()` 方法。前者负责启动应用程序，通常用于创建和打开主窗口。`stop()`
    方法处理应用程序的关闭，此时工作台被关闭，并执行其他特定于应用程序的任务。不幸的是，NetBeans 平台应用程序没有如此便捷的生命周期管理——不过，从另一方面看，这大大简化了开发。例如，主窗口会自动打开和关闭，无需编码。与应用程序生命周期相关的大多数方面都在各个模块内部处理，并通过模块安装程序进行管理。另一种可能性是对整个应用程序的关闭做出反应，而不是对单个模块的关闭做出反应；这是通过抽象类
    `LifecycleManager` 完成的。NetBeans 平台提供的 `LifecycleManager` 类的默认实现负责应用程序的正常关闭。你可以在默认实现之前插入你自己的此类的实现，以便在应用程序关闭时处理特定于应用程序的任务。重要的是不要忘记从你自己的实现中调用默认实现。此类的外观以及如何使用
    `LifecycleManager` 显式关闭应用程序，在第 8 章中进行了描述。


    #### 视图和编辑器


    Eclipse 工作台显示和停靠两种类型的窗口——*视图*和*编辑器*——而 NetBeans 平台则用一种窗口类型处理这些类型。在 NetBeans 窗口系统中显示的窗口是一个*顶层组件*；窗口的实现派生自
    `TopComponent` 类。这个超类将自身作为窗口集成到 NetBeans 窗口系统中，并提供大量信息，允许访问其当前状态及其生命周期。类似于 Eclipse
    应用程序中的视图和编辑器通过相关扩展点进行组织的方式，顶层组件通过层文件在 `Mode` 文件夹内以声明方式提供。模式是顶层组件的容器。这里，让我们回到视图和编辑器的区别，因为模式可以是这些类型之一。顶层组件在这些模式之一中创建（参见图
    9-5）。模式的大小、位置和类型在 XML 文件中描述。这样，你也有机会在层文件中使用相应的扩展点注册你自己的模式（更多信息请参见第 10 章）。但是，顶层组件不需要在模式内注册，它们会在默认模式下显示。与
    Eclipse 工作台一样，用户在应用程序运行时可以将顶层组件放置在不同的位置。


    为了轻松创建和注册顶层组件，NetBeans IDE 再次提供了一个非常有用的向导。选择 *文件 ![Image](img/U001.jpg) 新建文件...
    ![Image](img/U001.jpg) 模块开发 ![Image](img/U001.jpg) 窗口* 并开始使用它。该向导为你提供了配置顶层组件并将其分配给某个模式的可能性。关于此主题以及与用户界面设计相关的其他主题的详细信息，请参见第
    2 部分。


    ### 总结


    本章假设你是 Eclipse 用户，并向你介绍了 NetBeans IDE 作为工具，以及 NetBeans 平台作为桌面框架。本章首先查看了 Eclipse
    中最常用的功能和窗口，并展示了它们在 NetBeans IDE 中的对应位置。你学习了如何将键映射调整为 Eclipse 设置。接着，我们比较了 Eclipse
    插件和 NetBeans 模块，并比较了两个平台的术语，描述了它们之间的主要相似点和差异。


    ## 第 40 章


    ## IntelliJ IDEA 与 NetBeans 平台


    JetBrains 的 Java 开发环境 IntelliJ IDEA ([`http://jetbrains.com/idea`](http://jetbrains.com/idea))
    现在通过社区版免费提供。由于集成了 Maven 项目支持，它为开发 NetBeans 平台应用程序提供了另一种选择。在本章中，我将为初学者和专业人士提供一些使用
    IntelliJ IDEA 成功搭建基于 NetBeans 平台的应用程序的技巧。

    '
- fmt: '### Presettings


    Maven is not part of IntelliJ IDEA. So before you can create a Maven project you
    have to provide a Maven distribution. You can download the current version at
    [`http://maven.apache.org`](http://maven.apache.org) as a zip file. Just unpack
    it at the desired location. This directory with the Maven distribution has to
    be made available to IntelliJ IDEA. You can do this either directly in the settings
    of the IDE under *Settings ![Image](images/U001.jpg) Maven* or through the environment
    variable `M2_HOME` which is usually in Maven. By default, IntelliJ IDEA uses the
    path that has been defined with this variable. Expect to find the Maven settings
    file (`settings.xml`) in the user directory by default under `.m2/settings.xml`.
    Additionally, `.m2/repository` is used in the user directory as local repository.


    ### Creating a NetBeans Platform Application


    If Maven is installed and the installation is made known to IntelliJ IDEA you
    can directly start and set up a NetBeans Platform application project. To do so,
    call *File ![Image](images/U001.jpg) New Project...* and choose the option *Create
    project from scratch*. On the following page you can give a name to the project
    to be created and you can define the storage location. Activate the option *Create
    module* and choose the type *Maven Module*. (See [Figure 40-1](#Chapter40.html#fig_40_1).)


    ![Image](images/4001.jpg)


    ***Figure 40-1.** Create Maven Project*


    Go to the next page by clicking *Next*. There you can assign the group ID, artifact
    ID, and the version for the new project. Because you do not just want to create
    an empty standard Maven project, but a NetBeans Platform application project,
    activate the option *Create from archetype*. Choose the latest version of the
    archetype `netbeans-platform-app-archetype` which belongs to the group `org.codehaus.mojo.archetypes`
    from the list. (See [Figure 40-2](#Chapter40.html#fig_40_2).) If it is not listed
    you can manually add this archetype with the button *Add archetype ...*, the named
    artifact, and group ID. You can see which versions are provided in the official
    Maven repository under [`http://search.maven.org/#search|ga|1|netbeans-platform-app-archetype`](http://search.maven.org/#search%7Cga%7C1%7Cnetbeans-platform-app-archetype).


    ![Image](images/4002.jpg)


    ***Figure 40-2.** Choosing Maven archetype for a NetBeans Platform application
    project*


    Complete the wizard with *Finish* and Maven creates the basic structure of a NetBeans
    Platform application. Initially, that can take quite some time, because several
    Maven plugins have to be downloaded into the local repository. As already mentioned
    in [Chapter 37](#Chapter37.html#ch37), three Maven projects are created in practice:
    a superordinate parent project which is supposed to bundle the whole NetBeans
    Platform application, a project for the NetBeans Platform module, and another
    one for the branding module. These are subordinate to the parent project and thus
    inherit the features of the POM file. This results in the project structure shown
    in [Figure 40-3](#Chapter40.html#fig_40_3).


    ![Image](images/4003.jpg)


    ***Figure 40-3.** Project structure of a Maven NetBeans Platform application*


    In another step, you can now add one or more Maven NetBeans modules to this Maven
    project. Do this with *File ![Image](images/U001.jpg) New Module...* in the menu
    or with *New ![Image](images/U001.jpg) Module* out of the context menu of the
    already created NetBeans Platform application project. Choose the option *Create
    project from scratch* and on the following page choose the type *Maven Module*.
    Give a name to the module and ensure that the module is created in the directory
    of the parent project. In the next step you will see that the module is added
    to the parent project and that the module itself inherits from the parent project.
    You will also see that the group ID and the version are already taken from the
    parent POM file. You can also define other values optionally; to do so, deactivate
    the option *Inherit*. There is also a special Maven archetype for creating a NetBeans
    module. This is the `nbm-archetype` archetype out of the group `org.codehaus.mojo.archetypes`.
    Choose it from the list or add it manually with *Add archetype*. (See [Figure
    40-4](#Chapter40.html#fig_40_4).)


    ![Image](images/4004.jpg)


    ***Figure 40-4.** Choosing Maven archetype for a NetBeans module project*


    Complete the wizard with *Finish*. The module is automatically created by Maven
    and added as a module to the NetBeans Platform project. Within this and other
    modules you can implement your application logic. There are several classes and
    APIs available that are described this book; you just need to add the referring
    NetBeans Platform module as dependency to your application module. In the following
    section you will learn how to easily search for Platform modules and how to add
    them as dependencies.


    ### Defining Dependencies


    As you already know from the preceding chapters, you can use classes of a NetBeans
    module only after setting a dependency on the referring module. Do this for a
    Maven project by adding a Maven dependency to the POM file. IntelliJ IDEA provides
    a searching assistant for adding a dependency entry. To get there, open the referring
    POM file and call *Code ![Image](images/U001.jpg) Generate*. Then choose *Dependency*
    out of the popup menu to open the assistant. You can search for `netbeans`, for
    example, choose a special NetBeans module, and add it as dependency. (See [Figure
    40-5](#Chapter40.html#fig_40_5).)


    ![Image](images/4005.jpg)


    ***Figure 40-5.** Searching for NetBeans modules and adding them as a dependency*


    You can directly add a dependency entry into the POM file. Besides you can also
    implement a dependency when implementing your classes out of the editor. Use a
    class of a module on which no dependency was defined before. This way, an error
    is displayed in the editor. Then using `Alt+Enter` choose out of the popup menu
    and add the necessary dependency with the artifact searching assistant.


    ### Building and Executing an Application


    Now that you know how to create the basic structure of a NetBeans Platform application,
    add application modules to it, and add dependencies for using the APIs of the
    NetBeans Platform modules, you just need to be able to build and execute the NetBeans
    Platform application and create a distribution.


    The *Maven Projects* explorer (*Window ![Image](images/U001.jpg) Tool Windows
    ![Image](images/U001.jpg) Maven Projects*) is quite helpful here. First, the whole
    application with the Maven build phase `install` has to be installed and copied
    into the local repository. To do this, open the folder *Lifecycle* of the parent
    project (in the example *MyApplication - NB App Parent*) and start the process
    with the context menu or by a double-click.


    A NetBeans Platform application is executed by means of the Maven plugin `nbm-maven-plugin`.
    For this the plugin provides the goal `nbm:run-platform`. Please note that you
    cannot start the application with the parent project; you must do so over the
    automatically created *NB App* module, which represents the NetBeans Platform
    itself. You find all the goals provided by the plugin in the *Maven Projects*
    explorer (see [Figure 40-6](#Chapter40.html#fig_40_6)). You will also find the
    goal `nbm:standalone-zip`, with which you can finally create your application
    as a ZIP distribution.


    ![Image](images/4006.jpg)


    ***Figure 40-6.** Creating and executing the application by means of the Maven
    project explorer*


    Alternatively, you can set a run configuration with *Run ![Image](images/U001.jpg)
    Edit Configurations* and directly start a build from the toolbar. With a run configuration,
    you can also automatically execute the build phase `install` before the goal `nbm:run-platform`.
    This way you can create and execute your application with one button.'
