    #### 系统文件系统


    系统文件系统在本书的几乎每一章中都或多或少地扮演着重要角色。它在某些用户组的动态适配中至关重要，作为例如操作、菜单项、窗口或选项面板等内容的中央注册表。无论如何，系统文件系统是使动态适配成为可能的核心概念。有两个特性值得利用。一个是通过添加后缀
    `_hidden` 来隐藏特定条目。另一个是在运行时添加额外配置的可能性。


    你将实现 `UserGroupFileSystem` 类。不过，首先你需要思考如何管理一个用户组（参见清单 33-8）。枚举类型 `UserGroup` 将对此有所帮助。


    ***清单 33-8.** 用户组信息的管理*


    `public enum` **`UserGroup`** `{`

    **`ADMIN`**`("Admin", "configs/admin.xml"),`

    **`USER`**`("User", "configs/user.xml");`

    `   private String groupName;`

    `   private String configPath;`


    **`UserGroup`**`(String groupName, String configPath) {`

    `      this.groupName = groupName;`

    `      this.configPath = configPath;`

    `   }`


    `public URL` **`getConfig`**`() {`

    `      return UserGroup.class.getResource(configPath);`

    `   }`


    `public String` **`getGroup`**`() {`

    `      return this.groupName;`

    `   }`


    `   public boolean equals(String groupName) {`

    `      return this.groupName.equals(groupName);`

    `   }`


    `   @Override`

    `   public String toString() {`

    `      return this.groupName;`

    `   }`


    `public static UserGroup` **`get`** `(String groupName) {`

    `      for (UserGroup group : UserGroup.values()) {`

    `         if (group.groupName.equals(groupName)) {`

    `            return group;`

    `         }`

    `      }`

    `      return null;`

    `   }`

    `}`


    在此枚举类型中，通过元素 `USER` 和 `ADMIN` 定义组的名称以及相应配置文件的路径。这样，`getConfig()` 方法就能直接返回指向 XML
    文件的 URL。


    之前，你定义了 Admin 和 User 两个用户组。现在，你需要为每个组创建一个小的测试配置，以便可以显示或隐藏某些菜单。因此，将为用户组 User 提供一个菜单，该菜单不提供给
    Admin 组，反之亦然。（参见清单 33-9）。


    ***清单 33-9.** 用户组 User 的配置*


    `<filesystem>`

    `   <folder name="Menu">`

    `      <folder name="Tools_hidden"/>`

    `      <folder name="Admin_hidden"/>`

    `   </folder>`

    `</filesystem>`


    使用清单 33-9 所示的配置，User 组用户的 *Tools* 和 *Admin* 菜单将被隐藏。


    ***清单 33-10.** 用户组 Admin 的配置*


    `<filesystem>`

    `   <folder name="Menu">`

    `      <folder name="Edit_hidden"/>`

    `      <folder name="User_hidden"/>`

    `   </folder>`

    `</filesystem>`


    与清单 33-10 所示的配置相反，对于 Admin 组成员，*Edit* 和 *User* 菜单被隐藏。


    一个或多个以 XML 文件形式存在的此类配置，可以由一个 `XMLFileSystem` 在一个充当代理的 `MultiFileSystem` 中共同管理。`MultiFileSystem`
    实现可以作为服务提供者注册，并在启动期间添加到系统文件系统中。由于系统文件系统能够对更改做出反应，因此可以在后续阶段（即登录之后）设置实际配置。为此，创建一个继承自
    `MultiFileSystem` 的 `UserGroupFileSystem` 类（参见清单 33-11）。使用 `@ServiceProvider`
    注解注册该类，以便系统能够找到并加载它。


    ***清单 33-11.** 可设置动态配置的 MultiFileSystem 实现*


    `import org.openide.filesystems.FileSystem;`

    `import org.openide.filesystems.MultiFileSystem;`

    `import org.openide.filesystems.XMLFileSystem;`

    `import org.openide.util.Lookup;`

    `import org.openide.util.lookup.ServiceProvider;`


    `@ServiceProvider(service = FileSystem.class) @ServiceProvider(service = UserGroupFileSystem.class)
    public class` **`UserGroupFileSystem`** `extends` **`MultiFileSystem`** `{`


    `public` **`UserGroupFileSystem`**`() {`

    `      setPropagateMasks(true);`

    `   }`


    `public static UserGroupFileSystem` **`getDefault`**`() {`

    `      return Lookup.getDefault().lookup(UserGroupFileSystem.class);`

    `   }`


    `public void` **`setUserGroups`**`(List<UserGroup>` **`groups`**`) throws Exception
    {`

    `      FileSystem[] fileSystems = new FileSystem[groups.size()];`

    `      for (int idx = 0; idx < fileSystems.length; idx++) {`

    `fileSystems[idx] = new` **`XMLFileSystem`**`(groups.get(idx)`**`.getConfig`**`());`

    `      }`

    **`setDelegates`**`(fileSystems);`

    `   }`

    `}`


    注册的类会在启动期间自动初始化。但是，到目前为止还没有设置任何配置，因此它实际上是一个空文件系统。有必要在构造函数中调用 `setPropagateMasks(true)`
    方法，这样带有 `_hidden` 后缀的条目才能生效。全局查找（global lookup）提供了已经添加到系统文件系统中的实例。因此，这个实例使你能够在之后向系统文件系统中注入动态条目。


    `setUserGroups()` 方法（你将从登录处理器中传递一个包含 `UserGroup` 对象的列表给它）最终会设置配置。为此，为每个组的 XML
    文件创建一个 `XMLFileSystem` 实例，并从中创建一个数组。然后，将此数组传递给 `setDelegates()` 方法，以便传播这些更改。

