    ### Wizards


    Aside from support for dialogs, the Dialogs API includes a wizard framework to
    create step-by-step procedures that help users work through a particular process.
    Wizards of this kind are familiar within the NetBeans IDE itself, such as those
    used to create new windows or actions. For each step, provide a panel appropriate
    to the related data entry required for the step. Coordination between steps is
    handled by the wizard framework. We will use this wizard for the following example
    by which I will show you the possibilities for designing a wizard and its architecture,
    in particular. In this example you will make a wizard for creating playlists.
    The wizard provides two steps. The first step allows users to describe the playlist,
    as shown in [Figure 13-6](#Chapter13.html#fig_13_6), while the second allows music
    titles to be chosen and added to the playlist.


    ![Image](images/1306.jpg)


    ***Figure 13-6.** First step in the example wizard for playlist creation*


    #### Wizard Architecture


    The `WizardDescriptor` class describes and configures a wizard in principle. The
    class is a subclass of the `DialogDescriptor` class, explained in the previous
    section. The `DialogDescriptor` class, in turn, is a subclass of `NotifyDescriptor`.
    The `WizardDescriptor` contains and manages all panels in the wizards and is responsible
    for central tasks such as controlling the action buttons and displaying the table
    of contents. In other words, the `WizardDescriptor` is the controller of the entire
    wizard. Typically, the `WizardDescriptor` also provides the data model, from which
    data collected over various steps is saved as properties. But you can also provide
    your own data model.


    For each step in the wizard, a panel has to be provided. Typically, a panel is
    built out of two separate classes. The first class implements the GUI. This class
    is known as the *Visual Panel*, and normally extends `JPanel`. The second class,
    handling the management and validation of the panel, is known as the *Wizard Panel*.
    This class extends the `WizardDescriptor.Panel<Data>` class. It creates the Visual
    Panel on demand and makes it available to the wizard. In terms of the MVC (Model-View-Controller)
    paradigm, the Visual Panel is the view, and the Wizard Panel is the controller.
    The Visual Panel only contains the user interface implementation and provides
    the user-entered data via `get` and `set` methods. The Visual Panel should not
    include business logic and, in particular, does not deal with any wizard-specific
    classes or calls. As a result, the panel is completely reusable and can also be
    used outside of the wizard. In this way, the panel is reusable—for example, in
    a dialog for later editing of a playlist. The relationship between `WizardDescriptor`,
    `WizardPanel`, and `VisualPanel` is illustrated again in [Figure 13-7](#Chapter13.html#fig_13_7).


    ![Image](images/1307.jpg)


    ***Figure 13-7.** Architecture of a wizard*'
