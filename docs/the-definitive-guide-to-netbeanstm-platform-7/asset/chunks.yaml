    \ and choose the option *Create Persistence Unit*. Meanwhile, the necessary JPA\
    \ configuration (`persistence.xml`) is created as shown in [Figure 29-5](#Chapter29.html#fig_29_5)\
    \ (see also [Chapter 28](#Chapter28.html#ch28)).\n\n![Image](images/2905.jpg)\n\
    \n***Figure 29-5.** Creating the entity classes on the base of existing databank\
    \ tables*\n\nOn the last page of the wizard use `java.util.List` as *Collection\
    \ Type* and deactivate all options. After the entity classes have been created,\
    \ you can create a library. To do so, call *Build* from the project's context\
    \ menu. Add the JAR file to a library wrapper module of your NetBeans Platform\
    \ application in the next step. Call it *My Entities* and use `com.galileo.netbeans.myentities`\
    \ as the code name base.\n\n### Build Up and Test Application\n\nNow you have\
    \ created a module for the MySQL driver and the EclipseLink implementation of\
    \ the Java Persistence API. You did not create the entity classes `Album` and\
    \ `Genre` yourself but let the NetBeans IDE create and annotate them. Out of that\
    \ you created a NetBeans module. You can take the application module My Module\
    \ as it is, because the advantage of using JPA is that you can change the underlying\
    \ ORM framework. You only have to designate the new persistence unit name when\
    \ creating the Entity Manager Factory in the `Installer` class. If you define\
    \ the dependencies as in [Figure 29-1](#Chapter29.html#fig_29_1) you can start\
    \ and test the application.\n\n### Summary\n\nIn this chapter you used the widespread\
    \ database MySQL to store your objects using the JPA implementation EclipseLink.\
    \ You learned how to create classes out of relations and you also saw the great\
    \ advantage of using the Java Persistence API, when you changed the persistence\
    \ provider without impacting applications code and logic.\n\n## C H A P T E R\
    \  30\n\n## Web Services\n\nThe *Amazon Product Advertising API* allows you to\
    \ search for products or information about several products, and even execute\
    \ operations in the shopping cart. This chapter will show you how to create the\
    \ necessary classes with the NetBeans IDE and how to use those classes within\
    \ a NetBeans Platform application."
  raw: "### Installing MySQL Database\n\nFirst, create a MySQL database. This chapter\
    \ assumes you have already installed a MySQL server or have access to one. You\
    \ can download the free-to-use community edition at [`http://dev.mysql.com/downloads`](http://dev.mysql.com/downloads).\
    \ Then open the *Services* window in the NetBeans IDE. There you will find the\
    \ node *Databases*. Choose *Register MySQL Server…* out of its context menu (see\
    \ [Figure 29-2](#Chapter29.html#fig_29_2)).\n\n![Image](images/2902.jpg)\n\n***Figure\
    \ 29-2.** Registering MySQL Server in the NetBeans IDE*\n\nType in the name of\
    \ the server, the port, the username and the password (in this example *localhost*)\
    \ into the dialog that appears. You get a *MySQL Server* node as shown in [Figure\
    \ 29-3](#Chapter29.html#fig_29_3). Now you can create a database out of this node\
    \ with *Create Database…* in the context menu. Name it *eclipselink-db*.\n\n![Image](images/2903.jpg)\n\
    \n***Figure 29-3.** Installing and managing MySQL Server in the service window*\n\
    \nThe approach in this chapter is different from that of previous chapters: the\
    \ entity classes are created out of the relations of the database. Hence, in the\
    \ next step you create the necessary tables. Both tables *album* and *genre* should\
    \ have the structure shown in [Listing 29-1](#Chapter29.html#list_29_1). Open\
    \ the connection which you created before in the Services window and select the\
    \ action *Execute Command…* in the context menu of the node *eclipselink-db ![Image](images/U001.jpg)\
    \ Tables* to create the table (see [Figure 29-3](#Chapter29.html#fig_29_3)). You\
    \ can directly type in the schema as an SQL statement (see [Listing 29-1](#Chapter29.html#list_29_1)).\
    \ Alternatively, you can also select the action *Create Table…* and create both\
    \ tables manually.\n\n***Listing 29-1.** Schema of Both Tables album and genre*\n\
    \n`CREATE TABLE genre (`\n`   id INT NOT NULL,`\n`   genre VARCHAR(30) NOT NULL,`\n\
    `   PRIMARY KEY(id)`\n`)`\n`CREATE TABLE album (`\n`   id INT NOT NULL AUTO_INCREMENT,`\n\
    `   title VARCHAR(30) NOT NULL,`\n`   tracks VARCHAR(30) NOT NULL,`\n`   cds VARCHAR(30)\
    \ NOT NULL,`\n`   year VARCHAR(30) NOT NULL,`\n`   genre INT NOT NULL,`\n`   PRIMARY\
    \ KEY(id),`\n`   FOREIGN KEY(genre) REFERENCES genre(id)`\n`)`\n\nFinally, register\
    \ the MySQL server within the NetBeans IDE. You have now created a database and\
    \ the necessary tables.\n\n#### Integrating MySQL Driver\n\nIntegrate the MySQL\
    \ JDBC driver (Connector/J) so the NetBeans Platform application can connect itself\
    \ to the MySQL server and the NetBeans Platform gets access to the database. Do\
    \ this with a new library wrapper module with *File ![Image](images/U001.jpg)\
    \ New Project… ![Image](images/U001.jpg) NetBeans Modules ![Image](images/U001.jpg)\
    \ Library Wrapper Module*. You can download the driver directly from [`http://dev.mysql.com/downloads`](http://dev.mysql.com/downloads)\
    \ or get it from the NetBeans IDE in the *ide/modules/ext* directory.\n\nThe module\
    \ is called *MySQL Connector* here and you add it to the NetBeans Platform application\
    \ (see [Figure 29-4](#Chapter29.html#fig_29_4)).\n\n![Image](images/2904.jpg)\n\
    \n***Figure 29-4.** Integrate the MySQL JDBC driver in your application.*\n\n\
    #### Integrate EclipseLink\n\nYou do not want to get access directly to the database\
    \ through the JDBC interface, but through the ORM framework EclipseLink (JPA 2.0).\
    \ Hence you have to make sure that the necessary libraries are available. Create\
    \ a library wrapper module and add the Java Persistence API as well as the EclipseLink\
    \ library as a special implementation of the JPA. You can get both libraries out\
    \ of the NetBeans IDE from the directory *java/modules/ext/eclipselink*:\n\n>\
    \ eclipselink-2.2.0.jar\n> \n> eclipselink-javax.persistence-2.0.jar\n\nName this\
    \ wrapper module *EclipseLink* and add it to your NetBeans Platform application.\n\
    \n### Creating Entities out of Database Schema\n\nIn the preceding chapters you\
    \ created the entity classes yourself. Based on its structures, the tables were\
    \ automatically created by the ORM framework. Now you want to reverse the process.\
    \ You already created the necessary tables for your application at the beginning\
    \ of the chapter. The NetBeans IDE can now create the referring entity classes\
    \ automatically. This process becomes interesting when you have to implement an\
    \ application on an existing database.\n\nUnfortunately, the NetBeans IDE wizard\
    \ to create the entity classes on the base of tables is only provided for Java\
    \ projects, not for module projects. Therefore you have to take a small detour.\
    \ First, create a Java project with *File ![Image](images/U001.jpg) New Project…\
    \ ![Image](images/U001.jpg) Java ![Image](images/U001.jpg) Java Class Library*.\
    \ Then you can start the actual wizard with *File ![Image](images/U001.jpg) New\
    \ File… ![Image](images/U001.jpg) Persistence ![Image](images/U001.jpg) Entity\
    \ Classes From Database*. Choose the referring database connection (*eclipselink\
    \ db*) first and then add the tables *album* and *genre* with *Add >*. On the\
    \ subsequent page, the classes to create are listed. Define the package (*com.galileo.netbeans.myentities*)\
    \ and choose the option *Create Persistence Unit*. Meanwhile, the necessary JPA\
    \ configuration (*persistence.xml)* is created as shown in [Figure 29-5](#Chapter29.html#fig_29_5)\
    \ (see also [Chapter 28](#Chapter28.html#ch28)).\n\n![Image](images/2905.jpg)\n\
    \n***Figure 29-5.** Creating the entity classes on the base of existing databank\
    \ tables*\n\nOn the last page of the wizard use *java.util.List* as *Collection\
    \ Type* and deactivate all options. After the entity classes have been created,\
    \ you can create a library. To do so, call *Build* from the project's context\
    \ menu. Add the JAR file to a library wrapper module of your NetBeans Platform\
    \ application in the next step. Call it *My Entities* and use *com.galileo.netbeans.myentities*\
    \ as the code name base.\n\n### Build Up and Test Application\n\nNow you have\
    \ created a module for the MySQL driver and the EclipseLink implementation of\
    \ the Java Persistence API. You did not create the entity classes `Album` and\
    \ `Genre` yourself but let the NetBeans IDE create and annotate them. Out of that\
    \ you created a NetBeans module. You can take the application module My Module\
    \ as it is, because the advantage of using JPA is that you can change the underlying\
    \ ORM framework. You only have to designate the new persistence unit name when\
    \ creating the Entity Manager Factory in the `Installer` class. If you define\
    \ the dependencies as in [Figure 29-1](#Chapter29.html#fig_29_1) you can start\
    \ and test the application.\n\n### Summary\n\nIn this chapter you used the widespread\
    \ database MySQL to store your objects using the JPA implementation EclipseLink.\
    \ You learned how to create classes out of relations and you also saw the great\
    \ advantage of using the Java Persistence API, when you changed the persistence\
    \ provider without impacting applications code and logic.\n\n## C H A P T E R\
    \  30\n\n## Web Services\n\nThe *Amazon Product Advertising API* allows you to\
    \ search for products or information about several products, and even execute\
    \ operations in the shopping cart. This chapter will show you how to create the\
    \ necessary classes with the NetBeans IDE and how to use those classes within\
    \ a NetBeans Platform application."
  trans: "\n### 安装 MySQL 数据库\n\n首先，创建一个 MySQL 数据库。本章假设您已经安装了 MySQL 服务器或可以访问一台服务器。您可以在\
    \ [`http://dev.mysql.com/downloads`](http://dev.mysql.com/downloads) 下载免费使用的社区版。然后，在\
    \ NetBeans IDE 中打开 *服务* 窗口。您会在其中找到 *数据库* 节点。在其上下文菜单中选择 *注册 MySQL 服务器...*（参见 图\
    \ 29-2）。\n\n![图片](img/2902.jpg)\n\n***图 29-2.** 在 NetBeans IDE 中注册 MySQL 服务器*\n\
    \n在出现的对话框中输入服务器名称、端口、用户名和密码（本例中为 *localhost*）。您将获得一个 *MySQL 服务器* 节点，如 图 29-3 所示。现在，您可以通过该节点的上下文菜单中的\
    \ *创建数据库...* 来创建一个数据库。将其命名为 *eclipselink-db*。\n\n![图片](img/2903.jpg)\n\n***图 29-3.**\
    \ 在服务窗口中安装和管理 MySQL 服务器*\n\n本章的方法与之前章节不同：实体类是根据数据库的关系创建的。因此，下一步您需要创建必要的表。*album*\
    \ 和 *genre* 这两个表的结构应如 清单 29-1 所示。在服务窗口中打开您之前创建的连接，并在 *eclipselink-db ![图片](img/U001.jpg)\
    \ 表* 节点的上下文菜单中选择 *执行命令...* 操作来创建表（参见 图 29-3）。您可以直接以 SQL 语句的形式输入模式（参见 清单 29-1）。或者，您也可以选择\
    \ *创建表...* 操作并手动创建这两个表。\n\n***清单 29-1.** album 和 genre 两个表的模式*\n\n`CREATE TABLE\
    \ genre (`\n`   id INT NOT NULL,`\n`   genre VARCHAR(30) NOT NULL,`\n`   PRIMARY\
    \ KEY(id)`\n`)`\n`CREATE TABLE album (`\n`   id INT NOT NULL AUTO_INCREMENT,`\n\
    `   title VARCHAR(30) NOT NULL,`\n`   tracks VARCHAR(30) NOT NULL,`\n`   cds VARCHAR(30)\
    \ NOT NULL,`\n`   year VARCHAR(30) NOT NULL,`\n`   genre INT NOT NULL,`\n`   PRIMARY\
    \ KEY(id),`\n`   FOREIGN KEY(genre) REFERENCES genre(id)`\n`)`\n\n最后，在 NetBeans\
    \ IDE 中注册 MySQL 服务器。至此，您已经创建了一个数据库和必要的表。\n\n#### 集成 MySQL 驱动程序\n\n集成 MySQL JDBC\
    \ 驱动程序（Connector/J），以便 NetBeans Platform 应用程序能够连接到 MySQL 服务器，并且 NetBeans Platform\
    \ 能够访问数据库。通过 *文件 ![图片](img/U001.jpg) 新建项目… ![图片](img/U001.jpg) NetBeans 模块 ![图片](img/U001.jpg)\
    \ 库包装器模块* 创建一个新的库包装器模块来完成此操作。您可以直接从 [`http://dev.mysql.com/downloads`](http://dev.mysql.com/downloads)\
    \ 下载驱动程序，或者从 NetBeans IDE 的 *ide/modules/ext* 目录中获取。\n\n此处将模块命名为 *MySQL Connector*，并将其添加到\
    \ NetBeans Platform 应用程序中（参见 图 29-4）。\n\n![图片](img/2904.jpg)\n\n***图 29-4.** 在您的应用程序中集成\
    \ MySQL JDBC 驱动程序。*\n\n#### 集成 EclipseLink\n\n您不希望直接通过 JDBC 接口访问数据库，而是通过 ORM 框架\
    \ EclipseLink（JPA 2.0）进行访问。因此，您必须确保必要的库可用。创建一个库包装器模块，并添加 Java Persistence API\
    \ 以及作为 JPA 特殊实现的 EclipseLink 库。您可以从 NetBeans IDE 的 *java/modules/ext/eclipselink*\
    \ 目录中获取这两个库：\n\n> eclipselink-2.2.0.jar\n> \n> eclipselink-javax.persistence-2.0.jar\n\
    \n将此包装器模块命名为 *EclipseLink*，并将其添加到您的 NetBeans Platform 应用程序中。\n\n### 从数据库模式创建实体\n\
    \n在前面的章节中，您自己创建了实体类。ORM 框架会根据其结构自动创建表。现在，您想要逆转这个过程。在本章开始时，您已经为应用程序创建了必要的表。NetBeans\
    \ IDE 现在可以自动创建相应的实体类。当您需要在现有数据库上实现应用程序时，这个过程就变得很有意义。\n\n不幸的是，NetBeans IDE 中基于表创建实体类的向导仅适用于\
    \ Java 项目，不适用于模块项目。因此，您需要稍微绕一下路。首先，通过 *文件 ![图片](img/U001.jpg) 新建项目… ![图片](img/U001.jpg)\
    \ Java ![图片](img/U001.jpg) Java 类库* 创建一个 Java 项目。然后，您可以通过 *文件 ![图片](img/U001.jpg)\
    \ 新建文件… ![图片](img/U001.jpg) 持久性 ![图片](img/U001.jpg) 来自数据库的实体类* 启动实际的向导。首先选择相应的数据库连接（*eclipselink\
    \ db*），然后通过 *添加 >* 添加 *album* 和 *genre* 表。在后续页面上，会列出要创建的类。定义包（*com.galileo.netbeans.myentities*）并选择\
    \ *创建持久化单元* 选项。同时，会创建必要的 JPA 配置（*persistence.xml*），如 图 29-5 所示（另请参见 第 28 章）。\n\
    \n![图片](img/2905.jpg)\n\n***图 29-5.** 基于现有数据库表创建实体类*\n\n在向导的最后一页，使用 *java.util.List*\
    \ 作为 *集合类型*，并取消所有选项的勾选。实体类创建完成后，您可以创建一个库。为此，请从项目的上下文菜单中选择 *构建*。下一步，将 JAR 文件添加到\
    \ NetBeans Platform 应用程序的库包装器模块中。将其命名为 *My Entities*，并使用 *com.galileo.netbeans.myentities*\
    \ 作为代码名称基础。\n\n### 构建并测试应用程序\n\n现在，您已经为 MySQL 驱动程序和 Java Persistence API 的 EclipseLink\
    \ 实现创建了模块。您没有自己创建实体类 `Album` 和 `Genre`，而是让 NetBeans IDE 创建并注解它们。基于此，您创建了一个 NetBeans\
    \ 模块。您可以按原样使用应用程序模块“我的模块”，因为使用 JPA 的好处是您可以更改底层的 ORM 框架。您只需在 `Installer` 类中创建实体管理器工厂时指定新的持久化单元名称即可。如果您按照\
    \ 图 29-1 定义依赖关系，就可以启动并测试应用程序。\n\n### 总结\n\n在本章中，您使用了广泛使用的 MySQL 数据库，通过 JPA 实现\
    \ EclipseLink 来存储您的对象。您学习了如何从关系创建类，并且当您更改持久化提供程序而不影响应用程序代码和逻辑时，您也看到了使用 Java Persistence\
    \ API 的巨大优势。\n\n## 第 30 章\n\n## Web 服务\n\n*Amazon Product Advertising API* 允许您搜索产品或关于多个产品的信息，甚至可以在购物车中执行操作。本章将向您展示如何使用\
    \ NetBeans IDE 创建必要的类，以及如何在 NetBeans Platform 应用程序中使用这些类。\n"
- fmt: "### Creating a Web Service Client\n\nIn the first step, you do not open a\
    \ NetBeans module, but a Java class library that can be created by a wizard. Call\
    \ *File ![Image](images/U001.jpg) New Project*, in the category *Java* choose\
    \ the project type *Java Class Library*. Call the project *Amazon Web Services*\
    \ and close the wizard with *Finish*. Then choose *File ![Image](images/U001.jpg)\
    \ New File ![Image](images/U001.jpg) Web Services ![Image](images/U001.jpg) Web\
    \ Service Client*. You directly specify the file to use by the URL *[http://webservices.amazon.com/AWSECommerceService/DE/AWSECommerceService.wsdl](http://webservices.amazon.com/AWSECommerceService)*.\
    \ (this only works when you are online). If you want to work offline, you can\
    \ download the WSDL file and specify it as a local file in the wizard (see [Figure\
    \ 30-1](#Chapter30.html#fig_30_1)). Call the package in which the web service\
    \ classes are produced `com.amazon.advertising.api`.\n\n![Image](images/3001.jpg)\n\
    \n***Figure 30-1.** Creating a web service client for the Amazon Product Advertising\
    \ API*\n\nKeep *JAX-WS Style* as the client style. Press *Finish* so all classes,\
    \ which are necessary to use the web service, can be created by means of the description\
    \ in the WSDL file. You deactivate the default set *Wrapper Style* for a better\
    \ arranged usage of the web service operations, as you will see later. Open the\
    \ newly added *Web Services References* folder in the project's view; there should\
    \ be an entry *AWSECommerceService* in it. Open the context menu of this entry\
    \ and choose *Edit Web Service Attributes*. Expand the node *AWSECommerceServicePortType*\
    \ beneath *Port Types* on the WSDL Customization tab and deactivate the option\
    \ *Enable Wrapper Style* (see [Figure 30-2](#Chapter30.html#fig_30_2)). This setting\
    \ is then applied to all operations of this port type.\n\n![Image](images/3002.jpg)\n\
    \n***Figure 30-2.** Deactivating wrapper style for the Amazon Web service*\n\n\
    If you apply the settings with *OK* the web service client classes should become\
    \ updated. Now you can execute a *Build* and get the web service client as a JAR\
    \ file `dist/Amazon_Web_Services.jar` in the project folder. In the next step\
    \ you can use this file within a NetBeans module as *Amazon Web ServicesAPI.*\n\
    \n### Using the Web Service\n\nIn the last paragraph, a Java interface for the\
    \ usage of the Amazon Web service has been created. You can proceed in the exact\
    \ same way with other web services. To call a web service out of a NetBeans Platform\
    \ application you first create a NetBeans Platform application with *File ![Image](images/U001.jpg)\
    \ New Project… ![Image](images/U001.jpg) NetBeans Modules ![Image](images/U001.jpg)\
    \ NetBeans Platform Application*. You can give the application any name. In the\
    \ next step you add the web service client to the application. To do so, you create\
    \ a library wrapper module with *File ![Image](images/U001.jpg) New Project… ![Image](images/U001.jpg)\
    \ NetBeans Modules ![Image](images/U001.jpg) Library Wrapper Module*. Add the\
    \ JAR file `Amazon_Web_Services.jar` to the library wrapper module and call it\
    \ *Amazon Web Services*, too.\n\nThe web service client is now available within\
    \ your NetBeans Platform application. Now you can create an application module\
    \ in which to use the web service. With *File ![Image](images/U001.jpg) New Project…\
    \ ![Image](images/U001.jpg) NetBeans Modules ![Image](images/U001.jpg) Module*\
    \ you add a further module to the Platform application. Add a dependency to the\
    \ Amazon Web service module that the module can also use the web service client.\
    \ To demonstrate a call of a web service operation, create a top component. With\
    \ that you want to search the available pictures of a product by means of the\
    \ *ASIN* (Amazon Standard Identification Number). Thinking about the MP3 Manager\
    \ (developed in [Chapter 44](#Chapter44.html#ch44)) the following usage is imaginable:\
    \ save the ASIN in the ID3 tag of an MP3 file and then you can display the available\
    \ cover of the currently playing MP3 file—or you can search for and display albums\
    \ of the currently played artist.\n\nIn the exemplified application, as shown\
    \ in [Figure 30-3](#Chapter30.html#fig_30_3), you want to search for a product\
    \ by means of the typed-in ASIN and display its preview as used on the Amazon\
    \ web site. To do so, take a closer look at the necessary query with which you\
    \ can call the Amazon web service. This query should be executed asynchronously\
    \ to avoid an obstruction of the complete application. Keep in mind that accessing\
    \ the GUI components only works from the Event Dispatch Thread. You have to be\
    \ informed as soon as the query is executed and you can display the picture. The\
    \ easiest way to achieve this is with a `SwingWorker` class. Create your own class\
    \ that derives from `SwingWorker<String, Object>`.\n\n![Image](images/3003.jpg)\n\
    \n***Figure 30-3.** Query product information over the Amazon Product Advertising\
    \ API*\n\nThe method `doInBackgroud()`, which you have to overwrite, is automatically\
    \ executed asynchronously. This is where you place your web service query. If\
    \ that is executed the method is queried by the `SwingWorker` class (see [Listing\
    \ 30-1](#Chapter30.html#list_30_1)). You can detect the value of the method `doInBackground()`\
    \ by the method `get()` quite easily—in this example, the URL of the product picture.\n\
    \n***Listing 30-1.** Executing a Web Service Query and Displaying the Results\
    \ by Means of a SwingWorker Class*\n\n```\nimport com.amazon.advertising.api.AWSECommerceService;\n\
    import com.amazon.advertising.api.AWSECommerceServicePortType;\nimport com.amazon.advertising.api.ImageSet;\n\
    import com.amazon.advertising.api.Item;\nimport com.amazon.advertising.api.ItemLookup;\n\
    import com.amazon.advertising.api.ItemLookupRequest;\nimport com.amazon.advertising.api.ItemLookupResponse;\n\
    …\nfinal class AWSTopComponent extends TopComponent {\n    private static final\
    \ String AWS_KEY = <your access key>;\n    private static final String SEC_KEY\
    \ = <your secret key>;\n\n    private final class ImageLookupByASIN extends SwingWorker<String,\
    \ Object> {\n        private String asin = \"\";\n\n        public ImageLookupByASIN(String\
    \ asin) {\n            this.asin = asin;\n        }\n```"
