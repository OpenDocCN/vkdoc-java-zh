    `      if (value.length() > 10) {`

    `return new` **`Result`**`(null, "Max length of Order ID is 10");`

    `      }`

    `      return null;`

    `   }`

    `}`


    Now, you assign these validator classes to the binding. In order to do this, you
    first have to compile the class. The easiest way to do this is via *Compile* in
    the context menu of the class in the project view. After that, open the context
    menu of the node *Other Components* in the inspector window (the editor must be
    in the Design view) and call *Add From Palette ![Image](images/U001.jpg) Beans
    ![Image](images/U001.jpg) Choose Bean*. Type in the complete class name including
