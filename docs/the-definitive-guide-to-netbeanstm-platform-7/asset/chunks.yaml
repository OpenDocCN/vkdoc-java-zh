    `OpenIDE-Module-Specification-Version: 1.0`\n`OpenIDE-Module-Name: My Module`\n\
    `OpenIDE-Module-Localizing-Bundle: com/galileo/netbeans/module/Bundle.properties`\n\
    `OpenIDE-Module-Install: com/galileo/netbeans/module/Installer.class`\n`OpenIDE-Module-Public-Packages:\
    \ com.galileo.netbeans.module.api.*`\n`OpenIDE-Module-Module-Dependencies: com.galileo.netbeans.library\
    \ > 1.0`\n`OpenIDE-Module-Java-Dependencies: Java > 1.6`\n\n***Listing 4-2.**\
    \ Manifest File of an OSGi Bundle*\n\n`Bundle-SymbolicName: com.galileo.osgi.bundle`\n\
    `Bundle-Version: 1.0`\n`Bundle-Name: My Bundle`\n`Bundle-Localization: com/galileo/osgi/bundle/Bundle`\n\
    `Bundle-Activator: com.galileo.osgi.bundle.Installer`\n`Export-Package: com.galileo.osgi.bundle.api`\n\
    `Require-Bundle: com.galileo.netbeans.library;bundle-version=\"[1.0,100)\"`\n\
    `Bundle-RequiredExecutionEnvironment: JavaSE-1.6`\n\nDefining a localizing bundle\
    \ with the attribute `OpenIDE-Module-Localizing-Bundle` or `Bundle-Localization`,\
    \ remember that the file extension is not given in an OSGi bundle. Defining a\
    \ dependency on another module or bundle by the attribute `Require-Bundle` indicates\
    \ the needed version with `bundle-version`. To define a minimum requirement on\
    \ the runtime environment you can specify a tag list with the attribute `Bundle-RequiredExecutionEnvironment`.\
    \ Expecting Java 6, use `JavaSE-1.6`. Other examples of tags are `J2SE-1.5` or\
    \ `OSGi/Minimum-1.1`.\n\n### Creating New OSGi Bundles\n\nCreating a new OSGi\
    \ bundle in the NetBeans IDE is easy. To do this use the wizard for creating a\
    \ new NetBeans module and indicate that it should become a bundle that is OSGi\
    \ conformant, as shown in [Figure 4-2](#Chapter04.html#fig_4_2).\n\n![Image](images/0402.jpg)\n\
    \n***Figure 4-2.** Creating an OSGi bundle with the NetBeans wizard*\n\nChoose\
    \ the type Module with *File* ![Image](images/U001.jpg) *New Project…* in the\
    \ category *NetBeans Modules*. Then activate the option *Generate OSGi Bundle*\
    \ under *Basic Module Configuration* (see [Figure 4-2](#Chapter04.html#fig_4_2)).\
    \ Further usage of the module or bundle is completely transparent then, meaning\
    \ you can define dependencies or add features to the bundle with the NetBeans\
    \ wizard as usual. It is especially interesting that you can also add a layer\
    \ file to an OSGi bundle. This layer file is integrated in the layer files of\
    \ the NetBeans modules in the System Filesystem, too.\n\nWithin a NetBeans Platform\
    \ application, please bear in mind that OSGi bundles are actually executed by\
    \ an OSGi container—by default the Apache Felix OSGi implementation—not by the\
    \ NetBeans module system. In connection with this, please also bear in mind that\
    \ the following modules are activated and hence included in your platform application:\n\
    \n*   OSGi Specification\n*   Apache's Felix OSGi Implementation\n*   NetBeans\
    \ OSGi Integration\n\n### Bundle Lifecycle\n\nSimilar to a Module Installer for\
    \ a NetBeans module, which was covered in [Chapter 3](#Chapter03.html#ch3), the\
    \ OSGi Framework offers a possibility for OSGi bundles that you can refer to certain\
    \ events in the lifecycle of a bundle. Such a class that implements the interface\
    \ `BundleActivator` is called an activator (see [Listing 4-3](#Chapter04.html#list_4_3)).\
