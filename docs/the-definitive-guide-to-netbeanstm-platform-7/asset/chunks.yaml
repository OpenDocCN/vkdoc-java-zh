    ### Summary


    In this chapter, you learned one of the most interesting and important concepts
    of the NetBeans Platform: Lookup. This chapter examined the functionality of Lookups
    and familiarized you with the service interfaces and service providers. You learned
    to create service interfaces and use them within service providers, as well as
    how service providers are discovered in a loosely coupled way. To that end, you
    began to use the various registration mechanisms.


    However, Lookups do a lot more than simply discover services. In fact, they also
