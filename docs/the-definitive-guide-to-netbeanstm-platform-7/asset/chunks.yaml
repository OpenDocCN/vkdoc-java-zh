    ### Configuration in Case of Maven Projects


    Implementing tests for Maven-based NetBeans Platform applications takes place
    the same way as described in the sections *Unit Tests* and *Functional GUI Tests*,
    the only differences concern the configuration, which we''ll look at next.


    #### Module Tests


    Running software tests is an integral part of the build lifecycle in Maven. So,
    the build phase *test* is executed after *compile* before the actual artifact
    is created by *package*. These tests are run by the *Maven Surefire Plugin*. This
    plugin automatically runs the test cases located under *src/test/java*. By a dependency
    entry it can be defined which JUnit version is used. Thus, applying a Maven-based
    NetBeans Platform application project the entry (depicted in [Listing 42-17](#Chapter42.html#list_42_17))
    is already added in the parent POM file.


    ***Listing 42-17.** Determining the JUnit Version*


    `<dependencies>`

    `   <`**`dependency`**`>`

    `      <groupId>`**`junit`**`</groupId>`

    `      <artifactId>junit</artifactId>`

    `      <version>4.8.2</version>`

    `      <scope>`**`test`**`</scope>`

    `   </`**`dependency`**`>`

    `</dependencies>`


    Writing this entry into the parent POM file, it is automatically provided to all
    modules. This means no further configuration is necessary.


    Module tests can be created by a wizard within the NetBeans IDE, as described
    in the section *General Tests*, too. If you want to use the JUnit extension implementing
    your test cases, add the entry shown in [Listing 42-18](#Chapter42.html#list_42_18)
    to the POM file of the corresponding module or to the parent POM file, if the
    remaining modules also use this module.


