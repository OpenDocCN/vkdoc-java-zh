    ### 创建持久化实体


    首先，你需要创建一个持久化实体类，它将代表要管理的数据。通过这种方式，你可以在数据库中读取、更改、保存和删除产品。NetBeans IDE 也提供了一个向导。你也可以直接创建一个持久化单元；但是，你需要预先配置一个数据库。你可以使用集成的
    Java DB，它可以在*服务*窗口的*数据库*下，通过上下文菜单进行配置（参见第 26 章）。


    依次选择*文件 ![Image](img/U001.jpg) 新建文件… ![Image](img/U001.jpg) 持久化 ![Image](img/U001.jpg)
    实体类*来创建一个持久化实体类。将其命名为 *Product*，并分配到包 `com.galileo.netbeans.order.entities.` 中。激活*创建持久化单元*选项，让向导创建它（你需要在接下来的向导页面中输入更多信息）。将持久化单元命名为
    *OrderSystemPU*，并选择 *EclipseLink* 作为持久化提供程序。要使用之前创建的数据库，请使用 *jdbc/ProductDatabase*
    作为数据源。选择*创建*作为表生成策略，这样当添加第一个产品时，数据库中必要的表就会自动生成。（参见图 32-2。）


    ![Image](img/3202.jpg)


    ***图 32-2.** 创建持久化实体类和持久化单元*


    该类创建时带有属性 `id`，它唯一标识数据库中的一条记录。此 ID 的值由数据库自动赋予。作为示例，你可以添加更多属性（`orderId, name, price`）以及相应的
    getter 和 setter 方法。（参见清单 32-1。）


    ***清单 32-1.** 带有 JPA 注解的持久化实体类 Product，用于将对象保存到数据库*


    `import java.io.Serializable;`

    `import javax.persistence.Entity;`

    `import javax.persistence.GeneratedValue;`

    `import javax.persistence.GenerationType;`

    `import javax.persistence.Id;`

    **`@Entity`**

    `public class` **`Product`** `implements Serializable {`

    `   @Id`

    `   @GeneratedValue(strategy = GenerationType.AUTO)`

    `   private Long   id;`

    `   private String orderId;`

    `   private String name;`

    `   private Double price;`


    `public Long` **`getId`**`() {`

    `      return id;`

    `   }`

    `public void` **`setId`**`(Long id) {`

    `      this.id = id;`

    `   }`

    `public String` **`getName`**`() {`

    `      return name;`

    `   }`

    `public void` **`setName`**`(String name) {`

    `      this.name = name;`

    `   }`

    `   …`

    `}`


    ### 创建 RESTful Web 服务


    有几个向导可用于创建 RESTful Web 服务。除了创建简单的服务，你也可以直接为你的用例创建 Web 服务。同时，用于操作和查询数据的相关方法会自动创建。依次选择*文件
    ![Image](img/U001.jpg) 新建文件… ![Image](img/U001.jpg) Web 服务 ![Image](img/U001.jpg)
    来自实体类的 RESTful Web 服务*，并添加你之前创建的类 `Product`。将服务类添加到包 `com.galileo.netbeans.order.service`
    中。


    创建的服务被拆分为两个类：`AbstractFacade` 和 `ProductFacadeREST`。`AbstractFacade` 类是对通过实体管理器访问数据库的方法的抽象实现。那些应作为服务提供的方法在
    `ProductFacadeREST` 中实现；实体管理器在此类中进行管理。（参见清单 32-2。）


    ***清单 32-2.** 用于操作和获取 Product 类型数据的 RESTful Web 服务类*


    `import com.galileo.netbeans.order.entities.Product;`

    `import javax.ws.rs.Consumes;`

    `import javax.ws.rs.DELETE;`

    `import javax.ws.rs.GET;`

    `import javax.ws.rs.POST;`

    `import javax.ws.rs.PUT;`

    `import javax.ws.rs.Path;`

    `import javax.ws.rs.PathParam;`

    `import javax.ws.rs.Produces;`


    `@Stateless`

    `@Path("com.galileo.netbeans.order.entities.product")`

    `public class` **`ProductFacadeREST`** `extends AbstractFacade<Product> {`


    **`@PersistenceContext`**`(unitName = "OrderServicePU")`

    `   private EntityManager em;`


    `   public ProductFacadeREST() {`

    `      super(Product.class);`

    `   }`


    `   @POST`

    `   @Override`

    `   @Consumes({"application/xml"})`

    `public void` **`create`**`(Product entity) {`

    `      super.create(entity);`

    `   }`


    `   @PUT`

    `   @Override`

    `   @Consumes({"application/xml"})`

    `   public void` edit`(Product entity) {`

    `      super.edit(entity);`

    `   }`


    `   @DELETE`

    `   @Path("{id}")`

    `public void` **`remove`** `(@PathParam("id") Long id) {`

    `      super.remove(super.find(id));`

    `   }`


    `   @Override`

    `protected EntityManager` **`getEntityManager`**`() {`

    `      return em;`

    `   }`

    `   …`

    `}`


    这些方法带有注解，用于标识使用了哪些 HTTP 操作。此外，数据传输的格式通过 `@Consumes` 和 `@Produces` 定义。除了 `application/xml`
    类型，你还可以选择 `application/json`。


    这样，你就创建了一个简单的 RESTful Web 服务，现在可以通过*部署*将其提供到服务器上。该服务的接口由一个 WADL 文件定义，该文件也由 Java
    EE 服务器发布。你可以通过 Web 界面测试该服务：在应用程序项目的上下文菜单中选择*测试 RESTful Web 服务*。


    ### 安装 NetBeans 平台应用程序


    创建 Web 服务后，现在回到 NetBeans 平台。首先，创建一个 NetBeans 平台应用程序项目，将其命名为 *OrderApplication*。在创建应用程序模块之前，你需要将扩展
    NetBeans IDE 中的附属模块添加到应用程序中。为此，请进入项目*属性*的*库*类别。在那里添加以下模块：


    *   enterprise/RESTful Web 服务库

    *   ide/JAXB 2.2 库

    *   ide/JAXB API


    *Jersey* 库（它是 Java RESTful Web 服务 API (JAX-RS) 的参考实现）隐藏在 RESTful Web 服务库模块之后。

