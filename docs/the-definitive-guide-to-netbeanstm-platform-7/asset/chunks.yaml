  raw: '#### General Tests


    Let''s assume the class `Math`, shown in [Listing 42-1](#Chapter42.html#list_42_1),
    is the first simple JUnit test class. You want to check its methods for correctness
    by a unit test. You create this in a module of a NetBeans Platform application.


    ***Listing 42-1.** Simple Class with Methods to Be Checked by a Unit Test*


    `public class` **`Math`** `{`

    `public int` **`add`**`(int a, int b) {`

    `      return a + b;`

    `   }`

    `public int` **`subtract`**`(int a, int b) {`

    `      return a - b;`

    `   }`

    `}`


    The NetBeans IDE provides various wizards for creating the basic structure of
    a unit test. In addition to creating an empty test class, you can create a test
    for assigned classes, so tests can be created for all methods. This saves a lot
    of time and work. You create a test class for the class to check `Math` the same
    way. Call *File ![Image](images/U001.jpg) New File ![Image](images/U001.jpg) JUnit
    ![Image](images/U001.jpg) Test for Existing Class*. Select the desired class with
    *Browse*. (See [Figure 42-1](#Chapter42.html#fig_42_1).)


    ![Image](images/4201.jpg)


    ***Figure 42-1.** Creating test cases for an existing class automatically*


    As depicted in [Figure 42-1](#Chapter42.html#fig_42_1) you can choose the methods
    for which a test will be created. There is a distinction between *Public, Protected,*
    and *Package Private* methods. You can also determine whether a *Test Initializer*
    and/or a *Finalizer* method will be created. By the option *Default Method* *Bodies*,
    the tests are already implemented based on the signature of the method. You barely
    need to adapt these implementations, depending on the complexity of the methods
    which are tested. So this option can save a lot of work. After, press *Finish*
    to create the test class `MathTest`, which will be created in a new directory
    *test/unit/src*. Furthermore, a dependency on the JUnit library is added to the
    application under *Unit Test Libraries*. Thus you get the project structure shown
    in [Figure 42-2](#Chapter42.html#fig_42_2).


    ![Image](images/4202.jpg)


    ***Figure 42-2.** Project structure with separate folders for test cases and with
    the necessary libraries*


    **![Image](images/square.jpg) Note** If you want to add additional methods with
    the NetBeans wizard to your class after creating the test class, you can create
    tests for those methods automatically. To do so, just execute the wizard of the
    referring class again. Then the existing test class is extended with the test
    cases for the new methods.


    Now let''s take a look at the created test class `MathTest`. You see at the beginning
    that in this simple case no support by the *NB JUnit* module is necessary; only
    JUnit classes are used. Furthermore, you recognize that since JUnit 4 the test
    class no longer has to derive from a special base class. Despite this, the test
    cases (and some helper methods) are now marked with annotations. Using annotations
    you are free to give names to the methods. (See [Listing 42-2](#Chapter42.html#list_42_2).)


    ***Listing 42-2.** Test Class MathTest for Checking the Methods of the Class Math*


    `import org.junit.After;`

    `import org.junit.AfterClass;`

    `import org.junit.Before;`

    `import org.junit.BeforeClass;`

    `import org.junit.Test;`

    `import static org.junit.Assert.*;`


    `public class` **`MathTest`** `{`

    `   public MathTest() {`

    `   }`

    **`@BeforeClass`**

    `public static void` **`setUpClass`**`() throws Exception {`

    `   }`

    **`@AfterClass`**

    `public static void` **`tearDownClass`**`() throws Exception {`

    `   }`

    **`@Before`**

    `public void` **`setUp`**`() {`

    `   }`

    **`@After`**

    `public void` **`tearDown`**`() {`

    `   }`


    **`@Test`**

    `public void` **`testAdd`**`() {`

    `      System.out.println("add");`

    `      int a = 0;`

    `      int b = 0;`

    `      Math instance = new Math();`

    `      int expResult = 0;`

    `      int result = instance.add(a, b);`

    **`assertEquals`**`(expResult, result);`

    `      // TODO review the generated test code.`

    `      fail("The test case is a prototype.");`

    `   }`


    **`@Test`**

    `public void` **`testSubtract`**`() {`

    `      System.out.println("subtract");`

    `      int a = 0;`

    `      int b = 0;`

    `      Math instance = new Math();`

    `      int expResult = 0;`

    `      int result = instance.subtract(a, b);`

    **`assertEquals`**`(expResult, result);`

    `      // TODO review the generated test code.`

    `      fail("The test case is a prototype.");`

    `   }`

    `}`


    Both methods marked with the annotations `@Before` and `@After` are automatically
    executed before running each test of this class. So certain preconditions and
    resources can be determined and allocated before running the tests. Afterward,
    they can eventually be released again. A new instance of the class is created
    for running each single test of a class. This means the constructor is suitable
    to allocate resources which are for all test cases of a class.


    If you need a connection to a database for multiple tests, for example, it makes
    sense (for performance reasons) to create the connection only once and then close
    it after finishing all referring tests. For this purpose you can mark two methods
    with the annotations `@BeforeClass` and `@AfterClass`, with which you can do the
    necessary preparatory work and rework. These methods have to be declared as `static`,
    because they are called in before creating the class. Furthermore, this enforces
    the fact that the resources (such as database connections) that are globally provided
    by those methods are `static` as well. This way they are provided to all instances.
    An example is shown in [Listing 42-3](#Chapter42.html#list_42_3).


    ***Listing 42-3.** Providing and Opening Resources Before or After Doing All Tests*


    `public class DatabaseTest {`

    `   private static Connection conn;`


    `   @BeforeClass`

    `   public static void setUpClass() throws Exception {`

    `      conn = DriverManager.getConnection("url");`

    `   }`


    `   @AfterClass`

    `   public static void tearDownClass() throws Exception {`

    `      conn.close();`

    `   }`


    `   @Test`

    `   public void testAdd() throws Exception {`

    `      Statement stmt = conn.createStatement();`

    `      //...`

    `   }`


    `   @Test`

    `   public void testRemove() throws Exception {`

    `      Statement stmt = conn.createStatement();`

    `      //...`

    `   }`

    `}`


    Let''s come back to the test class `MathTest`. Now you want to complete and then
    execute both tests which so far are just an automatically created basic structure.
    First, you can delete the setUp and the tearDown methods, because you do not need
    them in this case. After that you define useful parameters with the referring
    expected return values for both tests. The class looks about like it does in [Listing
    42-4](#Chapter42.html#list_42_4).


    ***Listing 42-4.** MathTest with Test Values and with Expected Result Values*


    `import org.junit.Test;`

    `import static junit.framework.Assert.*;`

    `public class` **`MathTest`** `{`


    `   @Test`

    `public void` **`testAdd`**`() {`

    `      System.out.println("testAdd");`

    `      int a = 3;`

    `      int b = 4;`

    `      Math instance = new Math();`

    `      int expResult = 7;`

    `      int result = instance.add(a, b);`

    **`assertEquals`**`(expResult, result);`

    `   }`


    `   @Test`

    `public void` **`testSubtract`**`() {`

    `      System.out.println("testSubtract");`

    `      int a = 5;`

    `      int b = 3;`

    `      Math instance = new Math();`

    `      int expResult = 2;`

    `      int result = instance.subtract(a, b);`

    **`assertEquals`**`(expResult, result);`

    `   }`

    `}`


    After filling both tests with reasonable values, you can now execute them. Choose
    *Test All* out of the context menu of the Platform application project or choose
    *Test* out of the context menu of the desired modules to execute the tests of
    all modules. Alternatively, you can also press *Alt+F6* or call *Run ![Image](images/U001.jpg)
    Test Project*. Then the tests of the projects that are selected in the project
    view are executed.'
  trans: '

    #### 通用测试


    假设 清单 42-1 中所示的 `Math` 类是第一个简单的 JUnit 测试类。您希望通过单元测试来检查其方法的正确性。您可以在 NetBeans Platform
    应用程序的模块中创建此测试。


    ***清单 42-1.** 待通过单元测试检查的简单类及其方法*


    `public class` **`Math`** `{`

    `public int` **`add`**`(int a, int b) {`

    `      return a + b;`

    `   }`

    `public int` **`subtract`**`(int a, int b) {`

    `      return a - b;`

    `   }`

    `}`


    NetBeans IDE 提供了多种向导来创建单元测试的基本结构。除了创建空的测试类之外，您还可以为指定的类创建测试，从而可以为所有方法创建测试。这节省了大量时间和工作。您以相同的方式为要检查的
    `Math` 类创建一个测试类。依次选择 *文件 ![Image](img/U001.jpg) 新建文件 ![Image](img/U001.jpg) JUnit
    ![Image](img/U001.jpg) 现有类的测试*。通过 *浏览* 选择所需的类。（参见 图 42-1。）


    ![Image](img/4201.jpg)


    ***图 42-1.** 自动为现有类创建测试用例*


    如 图 42-1 所示，您可以选择要为其创建测试的方法。这里有 *公共*、*受保护* 和 *包私有* 方法之分。您还可以决定是否创建 *测试初始化器* 和/或
    *终结器* 方法。通过 *默认方法体* 选项，测试将根据方法的签名自动实现。根据被测试方法的复杂程度，您几乎不需要调整这些实现。因此，此选项可以节省大量工作。之后，点击
    *完成* 创建测试类 `MathTest`，该类将创建在一个新的目录 *test/unit/src* 中。此外，在应用程序的 *单元测试库* 下会添加对 JUnit
    库的依赖。这样您就得到了如 图 42-2 所示的项目结构。


    ![Image](img/4202.jpg)


    ***图 42-2.** 项目结构，包含用于测试用例的独立文件夹以及必要的库*


    **![Image](img/square.jpg) 注意** 如果在创建测试类后，您想通过 NetBeans 向导向您的类添加其他方法，您可以自动为这些方法创建测试。为此，只需再次执行相关类的向导即可。然后，现有的测试类将扩展包含新方法的测试用例。


    现在让我们看一下已创建的测试类 `MathTest`。您会看到，在这个简单示例的开头，不需要 *NB JUnit* 模块的支持；仅使用了 JUnit 类。此外，您会注意到，自
    JUnit 4 起，测试类不再需要派生自特定的基类。尽管如此，测试用例（以及一些辅助方法）现在都使用注解进行标记。使用注解，您可以自由地为方法命名。（参见
    清单 42-2。）


    ***清单 42-2.** 用于检查 Math 类方法的测试类 MathTest*


    `import org.junit.After;`

    `import org.junit.AfterClass;`

    `import org.junit.Before;`

    `import org.junit.BeforeClass;`

    `import org.junit.Test;`

    `import static org.junit.Assert.*;`


    `public class` **`MathTest`** `{`

    `   public MathTest() {`

    `   }`

    **`@BeforeClass`**

    `public static void` **`setUpClass`**`() throws Exception {`

    `   }`

    **`@AfterClass`**

    `public static void` **`tearDownClass`**`() throws Exception {`

    `   }`

    **`@Before`**

    `public void` **`setUp`**`() {`

    `   }`

    **`@After`**

    `public void` **`tearDown`**`() {`

    `   }`


    **`@Test`**

    `public void` **`testAdd`**`() {`

    `      System.out.println("add");`

    `      int a = 0;`

    `      int b = 0;`

    `      Math instance = new Math();`

    `      int expResult = 0;`

    `      int result = instance.add(a, b);`

    **`assertEquals`**`(expResult, result);`

    `      // TODO review the generated test code.`

    `      fail("The test case is a prototype.");`

    `   }`


    **`@Test`**

    `public void` **`testSubtract`**`() {`

    `      System.out.println("subtract");`

    `      int a = 0;`

    `      int b = 0;`

    `      Math instance = new Math();`

    `      int expResult = 0;`

    `      int result = instance.subtract(a, b);`

    **`assertEquals`**`(expResult, result);`

    `      // TODO review the generated test code.`

    `      fail("The test case is a prototype.");`

    `   }`

    `}`


    使用 `@Before` 和 `@After` 注解标记的两个方法会在运行该类的每个测试之前自动执行。因此，可以在运行测试之前确定和分配某些前提条件和资源。之后，它们最终可以被释放。为了运行一个类的每个单独测试，都会创建该类的一个新实例。这意味着构造函数适用于分配那些对该类的所有测试用例都通用的资源。


    例如，如果多个测试都需要数据库连接，那么（出于性能考虑）只创建一次连接，然后在完成所有相关测试后关闭它是合理的。为此，您可以使用 `@BeforeClass`
    和 `@AfterClass` 注解标记两个方法，通过这些方法您可以进行必要的准备工作和收尾工作。这些方法必须声明为 `static`，因为它们是在创建类之前被调用的。此外，这强制要求由这些方法全局提供的资源（例如数据库连接）也必须是
    `static` 的。这样它们就可以提供给所有实例。清单 42-3 中显示了一个示例。


    ***清单 42-3.** 在所有测试之前或之后提供和释放资源*


    `public class DatabaseTest {`

    `   private static Connection conn;`


    `   @BeforeClass`

    `   public static void setUpClass() throws Exception {`

    `      conn = DriverManager.getConnection("url");`

    `   }`


    `   @AfterClass`

    `   public static void tearDownClass() throws Exception {`

    `      conn.close();`

    `   }`


    `   @Test`

    `   public void testAdd() throws Exception {`

    `      Statement stmt = conn.createStatement();`

    `      //...`

    `   }`


    `   @Test`

    `   public void testRemove() throws Exception {`

    `      Statement stmt = conn.createStatement();`

    `      //...`

    `   }`

    `}`


    让我们回到测试类 `MathTest`。现在您想要完成并执行这两个目前还只是自动创建的基本结构的测试。首先，您可以删除 setUp 和 tearDown 方法，因为在这种情况下您不需要它们。之后，您为这两个测试定义有用的参数以及相应的预期返回值。该类看起来与
    清单 42-4 中的类似。


    ***清单 42-4.** 包含测试值和预期结果值的 MathTest*


    `import org.junit.Test;`

    `import static junit.framework.Assert.*;`

    `public class` **`MathTest`** `{`


    `   @Test`

    `public void` **`testAdd`**`() {`

    `      System.out.println("testAdd");`

    `      int a = 3;`

    `      int b = 4;`

    `      Math instance = new Math();`

    `      int expResult = 7;`

    `      int result = instance.add(a, b);`

    **`assertEquals`**`(expResult, result);`

    `   }`


    `   @Test`

    `public void` **`testSubtract`**`() {`

    `      System.out.println("testSubtract");`

    `      int a = 5;`

    `      int b = 3;`

    `      Math instance = new Math();`

    `      int expResult = 2;`

    `      int result = instance.subtract(a, b);`

    **`assertEquals`**`(expResult, result);`

    `   }`

    `}`


    在用合理的值填充两个测试后，您现在可以执行它们了。从 Platform 应用程序项目的上下文菜单中选择 *测试全部*，或者从所需模块的上下文菜单中选择 *测试*
    来执行所有模块的测试。或者，您也可以按 *Alt+F6* 或调用 *运行 ![Image](img/U001.jpg) 测试项目*。然后，将执行在项目视图中选中的项目的测试。

