- fmt: "### Summary\n\nIn this chapter you got to know helpful interfaces, classes,\
    \ and concepts of the NetBeans Platform concerning the development of graphic\
    \ user interfaces. You looked at the Java Platform desktop integration functionality\
    \ and at how to initialize GUI components asynchronously. Finally you learned\
    \ how to implement an undo and redo functionality.\n\n## PART 3\n\n## Ready &\
    \ Go: Using the NetBeans Platform Standard Modules\n\n## C H A P T E R 16\n\n\
    ## Help System\n\nThe NetBeans Platform help system is based on *JavaHelp*. The\
    \ NetBeans Platform provides a module containing the JavaHelp library and provides\
    \ a class to get access to the help system (see [Figure 16-1](#Chapter16.html#fig_16_1)).\
    \ To use the help system, you must set a dependency on the `JavaHelp Integration`\
    \ module in your module via *Properties* ![Image](images/U001.jpg) *Libraries*;\
    \ the menu item *Help* ![Image](images/U001.jpg) *Help Contents* will be automatically\
    \ provided in your application. The user can open the help window via this menu\
    \ item.\n\n![Image](images/1601.jpg)\n\n***Figure 16-1.** Window of the integrated\
    \ help system*\n\n### Creating and Integrating a Help Set\n\nThe NetBeans IDE\
    \ provides a wizard to set up a help set. This makes an otherwise tricky process\
    \ child’s play. For this purpose call the menu item *File* ![Image](images/U001.jpg)\
    \ *New File…*, choose the file type *JavaHelp Help Set* in the *Module Development*\
    \ category, and click *Next*. On the next (and last) page, you will already see\
    \ a list of files that are created or changed by the wizard. Click *Finish* to\
    \ constitute the help set.\n\nA help set is added to a module via the `HelpSetRegistration`\
    \ annotation. The created help set files are stored in a separate package `docs`\
    \ by the wizard. Since a help set does not have a Java file, a Java file is created\
    \ (`package-info.java`) and the annotation is added, as in [Listing 16-1](#Chapter16.html#list_16_1).\n\
    \n***Listing 16-1.** Registration of a Help Set via an Annotation*\n\n```\n@HelpSetRegistration(helpSet\
    \ = \"module-hs.xml\", position = 3672)\npackage com.galileo.netbeans.module.docs;\n\
    import org.netbeans.api.javahelp.HelpSetRegistration;\n```\n\nThe `HelpSetRegistration`\
    \ annotation with the `helpSet` attribute refers to the actual help set XML file\
    \ `module-hs.xml`. This annotation leads to an entry in the layer file in the\
    \ standard folder `Services/JavaHelp`. This also means that if you want to consciously\
    \ avoid annotations, you can register your help set by the following entry in\
    \ the layer file yourself, as shown in [Listing 16-2](#Chapter16.html#list_16_2).\n\
    \n***Listing 16-2.** Direct Registration of a Help Set in the Layer File*\n\n\
    ```\n<folder name=\"Services\">\n   <folder name=\"JavaHelp\">\n      <file name=\"\
    module-helpset.xml\" url=\"module-helpset.xml\"/>\n   </folder>\n</folder>\n```\n\
    \nSo, you register the `module-helpset.xml` file, which contains a reference on\
    \ the help set, in the layer file. The layer file then looks like [Listing 16-3](#Chapter16.html#list_16_3).\n\
    \n***Listing 16-3.** Help Set Reference File for the Registration via the Layer\
    \ File*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE helpsetref\
    \ PUBLIC\n   \"-//NetBeans//DTD JavaHelp Help Set Reference 1.0//EN\"\n   \"http://www.netbeans.org/dtds/helpsetref-1_0.dtd\"\
    >\n<helpsetref url=\"nbdocs:/com/galileo/netbeans/module/docs/module-hs.xml\"\
    />\n```\n\nIn this first step you learned how to create a help set with the NetBeans\
    \ wizard, and how to register a help set either by a separate annotation or by\
    \ a layer entry and an additional XML file. In the subsequent sections, we will\
    \ take a closer look at the separate files.\n\n#### module-hs.xml\n\nThis is the\
    \ central file which describes and configures the help set. Use the `title` element\
    \ to give the help set a name. In the `map` element, you refer to map files. In\
    \ these map files are the HTML help pages with your IDs; the content of a help\
    \ set is defined by these map files. With the `view` elements, you add the content\
    \ of our help set to the table of contents and to the index (see [Listing 16-4](#Chapter16.html#list_16_4)).\
    \ Additionally, you define the search engine to be used.\n\n***Listing 16-4.**\
    \ Help Set Description*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE\
    \ helpset PUBLIC\n   \"-//Sun Microsys Inc.//DTD JavaHelp HelpSet Version 2.0//EN\"\
    \n   \"http://java.sun.com/products/javahelp/helpset_2_0.dtd\">\n<helpset version=\"\
    2.0\">\n   <title>My Module Help</title>\n   <maps>\n      <homeID>com.galileo.netbeans.module.about</homeID>\n\
    \      <mapref location=\"module-map.xml\"/>\n   </maps>\n   <view mergetype=\"\
    javax.help.AppendMerge\">\n      <name>TOC</name>\n      <label>Table of Contents</label>\n\
    \      <type>javax.help.TOCView</type>\n      <data>module-toc.xml</data>\n  \
    \ </view>\n   <view mergetype=\"javax.help.AppendMerge\">\n      <name>Index</name>\n\
    \      <label>Index</label>\n      <type>javax.help.IndexView</type>\n      <data>module-idx.xml</data>\n\
    \   </view>\n   <view>\n      <name>Search</name>\n      <label>Search</label>\n\
    \      <type>javax.help.SearchView</type>\n      <data engine=\"com.sun.java.help.search.DefaultSearchEngine\"\
    >JavaHelpSearch</data>\n   </view>\n</helpset>\n```\n\n#### module-map.xml\n\n\
    The actual HTML help pages are registered in the map file and a unique ID is given\
    \ to them by the `target` attribute. The unique ID is then used for the table\
    \ of contents and for the index. Additionally, those exact IDs are also used for\
    \ a `HelpCtx` object, namely for realizing context-sensitive help. (See [Listing\
    \ 16-5](#Chapter16.html#list_16_5).)\n\n***Listing 16-5.** Mapping of Help Topics\
    \ IDs on HTML Pages*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE\
    \ map PUBLIC\n   \"-//Sun Microsystems Inc.//DTD JavaHelp Map Version 2.0//EN\"\
    \n   \"http://java.sun.com/products/javahelp/map_2_0.dtd\">\n<map version=\"2.0\"\
    >\n   <mapID target=\"com.galileo.netbeans.module.about\" url=\"module-about.html\"\
    />\n</map>\n```\n\n#### module-toc.xml\n\nWith this file you can determine the\
    \ content of the table of contents. Here, you register the ID of the corresponding\
    \ help page (which you want to add to the table of contents) by the `tocitem`\
    \ element. Doing so, the `tocitem` element can be arbitrarily nested so the help\
    \ pages can be grouped. (See [Listing 16-6](#Chapter16.html#list_16_6).)\n\n***Listing\
    \ 16-6.** Table of Contents of a Help Set*\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<!DOCTYPE toc PUBLIC\n   \"-//Sun Microsystems Inc.//DTD JavaHelp TOC\
    \ Version 2.0//EN\"\n   \"http://java.sun.com/products/javahelp/toc_2_0.dtd\"\
    >\n<toc version=\"2.0\">\n   <tocitem text=\"My Module\">\n      <tocitem text=\"\
    About My Module\" target=\"com.galileo.netbeans.module.about\"/>\n   </tocitem>\n\
    </toc>\n```\n\n#### module-idx.xml\n\nIn this file, you list the IDs of the help\
    \ pages, which you want to include in the index, with the `indexitem` element.\
    \ (See [Listing 16-7](#Chapter16.html#list_16_7).)\n\n***Listing 16-7.** Index\
    \ of a Help Set*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE\
    \ index PUBLIC\n   \"-//Sun Microsystems Inc.//DTD JavaHelp Index Version 2.0//EN\"\
    \n   \"http://java.sun.com/products/javahelp/index_2_0.dtd\">\n<index version=\"\
    2.0\">\n   <indexitem text=\"About My Module\" target=\"com.galileo.netbeans.module.about\"\
    />\n</index>\n```"
  raw: '### Summary


    In this chapter you got to know helpful interfaces, classes, and concepts of the
    NetBeans Platform concerning the development of graphic user interfaces. You looked
    at the Java Platform desktop integration functionality and at how to initialize
    GUI components asynchronously. Finally you learned how to implement an undo and
    redo functionality.


    ## PART 3


    ## Ready & Go: Using the NetBeans Platform Standard Modules


    ## C H A P T E R  16


    ## Help System


    The NetBeans Platform help system is based on *JavaHelp*. The NetBeans Platform
    provides a module containing the JavaHelp library and provides a class to get
    access to the help system (see [Figure 16-1](#Chapter16.html#fig_16_1)). To use
    the help system, you must set a dependency on the *`JavaHelp Integration`* module
    in your module via *Properties* ![Image](images/U001.jpg) *Libraries*; the menu
    item *Help* ![Image](images/U001.jpg) *Help Contents* will be automatically provided
    in your application. The user can open the help window via this menu item.


    ![Image](images/1601.jpg)


    ***Figure 16-1.** Window of the integrated help system*


    ### Creating and Integrating a Help Set


    The NetBeans IDE provides a wizard to set up a help set. This makes an otherwise
    tricky process child’s play. For this purpose call the menu item *File* ![Image](images/U001.jpg)
    *New File…*, choose the file type *JavaHelp Help Set* in the *Module Development*
    category, and click *Next*. On the next (and last) page, you will already see
    a list of files that are created or changed by the wizard. Click *Finish* to constitute
    the help set.


    A help set is added to a module via the `HelpSetRegistration` annotation. The
    created help set files are stored in a separate package `docs` by the wizard.
    Since a help set does not have a Java file, a Java file is created (*package-info.java*)
    and the annotation is added, as in [Listing 16-1](#Chapter16.html#list_16_1).


    ***Listing 16-1.** Registration of a Help Set via an Annotation*


    **`@HelpSetRegistration(helpSet`** `= "module-hs.xml", position = 3672)`

    `package com.galileo.netbeans.module.docs;`

    `import org.netbeans.api.javahelp.HelpSetRegistration;`


    The `HelpSetRegistration` annotation with the `helpSet` attribute refers to the
    actual help set XML file *module-hs.xml*. This annotation leads to an entry in
    the layer file in the standard folder `Services/JavaHelp`. This also means that
    if you want to consciously avoid annotations, you can register your help set by
    the following entry in the layer file yourself, as shown in [Listing 16-2](#Chapter16.html#list_16_2).


    ***Listing 16-2.** Direct Registration of a Help Set in the Layer File*


    `<folder name="`**`Services`**`">`

    `   <folder name="`**`JavaHelp`**`">`

    `      <file name="module-helpset.xml" url="module-helpset.xml"/>`

    `   </folder>`

    `</folder>`


    So, you register the *module-helpset.xml* file, which contains a reference on
    the help set, in the layer file. The layer file then looks like [Listing 16-3](#Chapter16.html#list_16_3).


    ***Listing 16-3.** Help Set Reference File for the Registration via the Layer
    File*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<!DOCTYPE` **`helpsetref`** `PUBLIC`

    `   "-//NetBeans//DTD JavaHelp Help Set Reference 1.0//EN"`

    `   "http://www.netbeans.org/dtds/helpsetref-1_0.dtd">`

    **`<helpsetref`** `url="`**`nbdocs:`**`/com/galileo/netbeans/module/docs/`**`module-hs.xml"/`**`>`


    In this first step you learned how to create a help set with the NetBeans wizard,
    and how to register a help set either by a separate annotation or by a layer entry
    and an additional XML file. In the subsequent sections, we will take a closer
    look at the separate files.


    #### module-hs.xml


    This is the central file which describes and configures the help set. Use the
    `title` element to give the help set a name. In the `map` element, you refer to
    map files. In these map files are the HTML help pages with your IDs; the content
    of a help set is defined by these map files. With the `view` elements, you add
    the content of our help set to the table of contents and to the index (see [Listing
    16-4](#Chapter16.html#list_16_4)). Additionally, you define the search engine
    to be used.


    ***Listing 16-4.** Help Set Description*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<!DOCTYPE` **`helpset`** `PUBLIC`

    `   "-//Sun Microsys Inc.//DTD JavaHelp HelpSet Version 2.0//EN"`

    `   "http://java.sun.com/products/javahelp/helpset_2_0.dtd">`

    **`<helpset`** `version="2.0">`

    `   <title>My Module Help</title>`

    `   <maps>`

    `      <homeID>com.galileo.netbeans.module.about</homeID>`

    `      <mapref location="`**`module-map.xml"/>`**

    **`</maps>`**

    **`<view`** `mergetype="javax.help.AppendMerge">`

    `      <name>TOC</name>`

    `      <label>Table of Contents</label>`

    `      <type>javax.help.TOCView</type>`

    `      <data>`**`module-toc.xml`**`</data>`

    **`</view>`**

    **`<view`** `mergetype="javax.help.AppendMerge">`

    `      <name>Index</name>`

    `      <label>Index</label>`

    `      <type>javax.help.IndexView</type>`

    `      <data>`**`module-idx.xml`**`</data>`

    **`</view>`**

    **`<view`**`>`

    `      <name>Search</name>`

    `      <label>Search</label>`

    `      <type>javax.help.SearchView</type>`

    `      <data engine="com.sun.java.help.search.DefaultSearchEngine">JavaHelpSearch</data>`

    **`</view>`**

    **`</helpset>`**


    #### module-map.xml


    The actual HTML help pages are registered in the map file and a unique ID is given
    to them by the `target` attribute. The unique ID is then used for the table of
    contents and for the index. Additionally, those exact IDs are also used for a
    `HelpCtx` object, namely for realizing context-sensitive help. (See [Listing 16-5](#Chapter16.html#list_16_5).)


    ***Listing 16-5.** Mapping of Help Topics IDs on HTML Pages*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<!DOCTYPE` **`map`** `PUBLIC`

    `   "-//Sun Microsystems Inc.//DTD JavaHelp Map Version 2.0//EN"`

    `   "http://java.sun.com/products/javahelp/map_2_0.dtd">`

    **`<map`** `version="2.0">`

    `   <mapID target="`**`com.galileo.netbeans.module.about"`** `url=`**`"module-about.html"/>`**

    **`</map>`**


    #### module-toc.xml


    With this file you can determine the content of the table of contents. Here, you
    register the ID of the corresponding help page (which you want to add to the table
    of contents) by the `tocitem` element. Doing so, the `tocitem` element can be
    arbitrarily nested so the help pages can be grouped. (See [Listing 16-6](#Chapter16.html#list_16_6).)


    ***Listing 16-6.** Table of Contents of a Help Set*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<!DOCTYPE` **`toc`** `PUBLIC`

    `   "-//Sun Microsystems Inc.//DTD JavaHelp TOC Version 2.0//EN"`

    `   "http://java.sun.com/products/javahelp/toc_2_0.dtd">`

    `<`**`toc`** `version="2.0">`

    `   <tocitem text="My Module">`

    **`<tocitem`** `text="About My Module" target=`**`"com.galileo.netbeans.module.about"/>`**

    `   </tocitem>`

    **`</toc>`**


    #### module-idx.xml


    In this file, you list the IDs of the help pages, which you want to include in
    the index, with the `indexitem` element. (See [Listing 16-7](#Chapter16.html#list_16_7).)


    ***Listing 16-7.** Index of a Help Set*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<!DOCTYPE` **`index`** `PUBLIC`

    `   "-//Sun Microsystems Inc.//DTD JavaHelp Index Version 2.0//EN"`

    `   "http://java.sun.com/products/javahelp/index_2_0.dtd">`

    `<`**`index`** `version="2.0">`

    `   <`**`indexitem`** `text="About My Module" target=`**`"com.galileo.netbeans.module.about"/>`**

    **`</index>`**'
  trans: '

    ### 摘要


    在本章中，你了解了 NetBeans 平台中与图形用户界面开发相关的一些实用接口、类和概念。你学习了 Java 平台的桌面集成功能，以及如何异步初始化 GUI
    组件。最后，你还学习了如何实现撤销和重做功能。


    ## 第三部分


    ## 准备就绪：使用 NetBeans 平台标准模块


    ## 第 16 章


    ## 帮助系统


    NetBeans 平台的帮助系统基于 *JavaHelp*。NetBeans 平台提供了一个包含 JavaHelp 库的模块，并提供了一个用于访问帮助系统的类（参见图
    16-1）。要使用帮助系统，你必须在你的模块中通过 *属性* ![Image](img/U001.jpg) *库* 设置对 *`JavaHelp 集成`*
    模块的依赖；应用程序中将自动提供菜单项 *帮助* ![Image](img/U001.jpg) *帮助内容*。用户可以通过此菜单项打开帮助窗口。


    ![Image](img/1601.jpg)


    ***图 16-1.** 集成帮助系统的窗口*


    ### 创建和集成帮助集


    NetBeans IDE 提供了一个用于设置帮助集的向导。这使得原本棘手的过程变得轻而易举。为此，请调用菜单项 *文件* ![Image](img/U001.jpg)
    *新建文件…*，在 *模块开发* 类别中选择文件类型 *JavaHelp 帮助集*，然后单击 *下一步*。在下一个（也是最后一个）页面上，你将看到由向导创建或更改的文件列表。单击
    *完成* 以构成帮助集。


    帮助集通过 `HelpSetRegistration` 注解添加到模块中。创建的帮助集文件由向导存储在单独的 `docs` 包中。由于帮助集没有 Java
    文件，因此会创建一个 Java 文件（*package-info.java*）并添加注解，如清单 16-1 所示。


    ***清单 16-1.** 通过注解注册帮助集*


    **`@HelpSetRegistration(helpSet`** `= "module-hs.xml", position = 3672)`

    `package com.galileo.netbeans.module.docs;`

    `import org.netbeans.api.javahelp.HelpSetRegistration;`


    带有 `helpSet` 属性的 `HelpSetRegistration` 注解引用了实际的帮助集 XML 文件 *module-hs.xml*。此注解会在标准文件夹
    `Services/JavaHelp` 中的层文件中生成一个条目。这也意味着，如果你有意避免使用注解，可以通过在层文件中添加如下条目来手动注册你的帮助集，如清单
    16-2 所示。


    ***清单 16-2.** 在层文件中直接注册帮助集*


    `<folder name="`**`Services`**`">`

    `   <folder name="`**`JavaHelp`**`">`

    `      <file name="module-helpset.xml" url="module-helpset.xml"/>`

    `   </folder>`

    `</folder>`


    因此，你在层文件中注册了 *module-helpset.xml* 文件，该文件包含对帮助集的引用。层文件随后看起来像清单 16-3 所示。


    ***清单 16-3.** 用于通过层文件注册的帮助集引用文件*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<!DOCTYPE` **`helpsetref`** `PUBLIC`

    `   "-//NetBeans//DTD JavaHelp Help Set Reference 1.0//EN"`

    `   "http://www.netbeans.org/dtds/helpsetref-1_0.dtd">`

    **`<helpsetref`** `url="`**`nbdocs:`**`/com/galileo/netbeans/module/docs/`**`module-hs.xml"/`**`>`


    在第一步中，你学习了如何使用 NetBeans 向导创建帮助集，以及如何通过单独的注解或通过层条目和额外的 XML 文件来注册帮助集。在接下来的章节中，我们将更详细地研究各个文件。


    #### module-hs.xml


    这是描述和配置帮助集的核心文件。使用 `title` 元素为帮助集命名。在 `map` 元素中，你引用映射文件。在这些映射文件中包含了带有 ID 的 HTML
    帮助页面；帮助集的内容由这些映射文件定义。通过 `view` 元素，你将帮助集的内容添加到目录和索引中（参见清单 16-4）。此外，你还定义了要使用的搜索引擎。


    ***清单 16-4.** 帮助集描述*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<!DOCTYPE` **`helpset`** `PUBLIC`

    `   "-//Sun Microsys Inc.//DTD JavaHelp HelpSet Version 2.0//EN"`

    `   "http://java.sun.com/products/javahelp/helpset_2_0.dtd">`

    **`<helpset`** `version="2.0">`

    `   <title>我的模块帮助</title>`

    `   <maps>`

    `      <homeID>com.galileo.netbeans.module.about</homeID>`

    `      <mapref location="`**`module-map.xml"/>`**

    **`</maps>`**

    **`<view`** `mergetype="javax.help.AppendMerge">`

    `      <name>TOC</name>`

    `      <label>目录</label>`

    `      <type>javax.help.TOCView</type>`

    `      <data>`**`module-toc.xml`**`</data>`

    **`</view>`**

    **`<view`** `mergetype="javax.help.AppendMerge">`

    `      <name>Index</name>`

    `      <label>索引</label>`

    `      <type>javax.help.IndexView</type>`

    `      <data>`**`module-idx.xml`**`</data>`

    **`</view>`**

    **`<view`**`>`

    `      <name>Search</name>`

    `      <label>搜索</label>`

    `      <type>javax.help.SearchView</type>`

    `      <data engine="com.sun.java.help.search.DefaultSearchEngine">JavaHelpSearch</data>`

    **`</view>`**

    **`</helpset>`**


    #### module-map.xml


    实际的 HTML 帮助页面在映射文件中注册，并通过 `target` 属性赋予一个唯一 ID。该唯一 ID 随后用于目录和索引。此外，这些确切的 ID 也用于
    `HelpCtx` 对象，即用于实现上下文相关的帮助。（参见清单 16-5。）


    ***清单 16-5.** 将帮助主题 ID 映射到 HTML 页面*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<!DOCTYPE` **`map`** `PUBLIC`

    `   "-//Sun Microsystems Inc.//DTD JavaHelp Map Version 2.0//EN"`

    `   "http://java.sun.com/products/javahelp/map_2_0.dtd">`

    **`<map`** `version="2.0">`

    `   <mapID target="`**`com.galileo.netbeans.module.about"`** `url=`**`"module-about.html"/>`**

    **`</map>`**


    #### module-toc.xml


    使用此文件，你可以确定目录的内容。在这里，你通过 `tocitem` 元素注册要添加到目录中的相应帮助页面的 ID。这样，`tocitem` 元素可以任意嵌套，以便对帮助页面进行分组。（参见清单
    16-6。）


    ***清单 16-6.** 帮助集的目录*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<!DOCTYPE` **`toc`** `PUBLIC`

    `   "-//Sun Microsystems Inc.//DTD JavaHelp TOC Version 2.0//EN"`

    `   "http://java.sun.com/products/javahelp/toc_2_0.dtd">`

    `<`**`toc`** `version="2.0">`

    `   <tocitem text="我的模块">`

    **`<tocitem`** `text="关于我的模块" target=`**`"com.galileo.netbeans.module.about"/>`**

    `   </tocitem>`

    **`</toc>`**


    #### module-idx.xml


    在此文件中，你使用 `indexitem` 元素列出要包含在索引中的帮助页面的 ID。（参见清单 16-7。）


    ***清单 16-7.** 帮助集的索引*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<!DOCTYPE` **`index`** `PUBLIC`

    `   "-//Sun Microsystems Inc.//DTD JavaHelp Index Version 2.0//EN"`

    `   "http://java.sun.com/products/javahelp/index_2_0.dtd">`

    `<`**`index`** `version="2.0">`

    `   <`**`indexitem`** `text="关于我的模块" target=`**`"com.galileo.netbeans.module.about"/>`**

    **`</index>`**

