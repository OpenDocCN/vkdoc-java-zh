    \ new AsyncGUIJob(){\npublic void construct() {\n            // long lasting loading\
    \ of data\n            for(int i = 0; i < 20; i++) {\n               Thread.sleep(200);\n\
    \               m.addElement(\"Item \" + i);\n            }\n         }\n\npublic\
    \ void finished() {\n            items.setModel(m);\n         }\n      });\n \
    \  }\n}\n```\n\n另一种异步初始化GUI组件的可能性是使用Java平台的`SwingWorker`类。它是一个抽象类，其初始化组件的方式与通过`AsyncGUIJob`接口几乎相同。使用`SwingWorker`类，前面使用`AsyncGUIJob`的示例看起来像[清单15-4](#Chapter15.html#list_15_4)。\n\
