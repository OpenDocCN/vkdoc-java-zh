    \          list = null;\n         }\n      }\n   }\n```\n\nFinally, you also implement\
    \ the missing control and information methods in your service provider class.\
    \ (See [Listing 44-11](#Chapter44.html#list_44_11)).\n\n**Listing 44-11.** Methods\
    \ to Control Volume and Playback Position\n\n```\n   @Override\n   public void\
    \ setVolume(int volume) {\n      this.volume = volume;\n      if(volumeControl\
    \ != null) {\n         volumeControl.setLevel((float)(volume/100.0));\n      }\n\
    \   }\n\n   @Override\n   public void setMute(boolean mute) {\n      this.mute\
    \ = mute;\n      if(volumeControl != null) {\n         volumeControl.setMute(mute);\n\
    \      }\n   }\n\n   @Override\n   public int getDuration() {\n      return (int)player.getDuration().getSeconds();\n\
    \   }\n\n   @Override\n   public int getMediaTime() {\n      return (int)player.getMediaTime().getSeconds();\n\
    \   }\n\n   @Override\n   public void setMediaTime(int seconds) {\n      player.setMediaTime(new\
    \ Time((double)seconds));\n   }\n}\n```\n\nAccessing this implementation of the\
    \ MP3 player should be done via the `Mp3Player.getDefault()` method. You must\
