    \ this view you can also deactivate certain update centers and thus exclude them\
    \ from the update process.\n\n![Image](images/3605.jpg)\n\n***Figure 36-5.** Configuration\
    \ of the update centers to be searched for new modules*\n\nWhen switching to the\
    \ *Updates* tab, use the *Reload Catalog* button to allow the Auto Update service\
    \ to look for updates in the defined update centers. Updated versions of modules\
    \ are searched for those modules that are already installed in the application.\
    \ For searching new modules, use the same approach in the *Available Plugins*\
    \ tab. The found modules are displayed immediately in a list, from which you can\
    \ select those you need. Use the *Update* or *Install* button to add selected\
    \ modules to the application. Modules that are also locally available—that is,\
    \ those that are personally downloaded—can be installed as well. To do so, switch\
    \ to the *Downloaded* tab, and then click *Add Plugins…* to add the desired NBM\
    \ files. Finally, click *Install* to install the selected plugins.\n\nThe last\
    \ tab to be discussed is the *Installed* tab (see [Figure 36-6](#Chapter36.html#fig_36_6)).\
    \ All currently installed modules are listed there, organized by categories. You\
    \ can deactivate modules in this view, as well as completely uninstall them.\n\
    \n![Image](images/3606.jpg)\n\n***Figure 36-6.** The Installed tab lists all installed\
    \ modules. Here, you can deactivate and uninstall modules.*\n\n#### New Update\
    \ Center\n\nAs already mentioned, users of your application may register additional\
    \ update centers in the Plugin Manager. However, you can also add update center\
    \ information to one of your modules. Once this module is loaded in an application,\
    \ the registered update center is also automatically provided there. So, you are\
    \ able to add an additional update center to an already delivered application.\
    \ For adding such update center information to your module, a wizard is provided\
    \ under *File ![Image](images/U001.jpg) New File... ![Image](images/U001.jpg)\
    \ Module Development ![Image](images/U001.jpg) Update Center*. The wizard registers\
    \ the entered update center information, consisting of the name and URL in the\
    \ standard folder `Services/AutoupdateType` in the layer file. Such an entry then\
    \ looks like that shown in [Listing 36-3](#Chapter36.html#list_36_3).\n\n***Listing\
    \ 36-3.** Update Center Definition in the Layer File*\n\n```\n<folder name=\"\
    Services\">\n   <folder name=\"AutoupdateType\">\n      <file name=\"my_module_update_center.instance\"\
    >\n         <attr name=\"displayName\"\n               bundlevalue=\"com.galileo.netbeans.module.Bundle\
    \               #Services/AutoupdateType/my_module_update_center.instance\"/>\n\
    \         <attr name=\"enabled\" boolvalue=\"true\"/>\n         <attr name=\"\
    instanceCreate\" methodvalue=\n               \"org.netbeans.modules.autoupdate.updateprovider.\n\
    \               AutoupdateCatalogFactory.createUpdateProvider\"/>\n         <attr\
    \ name=\"instanceOf\" stringvalue=\"org.netbeans.spi.autoupdate.UpdateProvider\"\
    />\n         <attr name=\"url\" bundlevalue=\n               \"com.galileo.netbeans.module.Bundle#my_module_update_center\"\
    />\n      </file>\n   </folder>\n</folder>\n```\n\nThe actual files have been\
    \ outsourced in a resource bundle:\n\n```\nmy_module_update_center=http://heikoboeck.de/updates.xml\n\
    Services/AutoupdateType/my_module_update_center.instance=My Update Center\n```\n\
    \nThis example assumed that the update center is publicly accessible via the Internet\
    \ address per *http*. However, you can also use the *file* protocol to install\
    \ an update center with it, for example, on a company-internal server.\n\n```\n\
    file:/D:/NetBeans/MyUpdateCenter/updates/updates.xml\n```\n\n#### Automatically\
    \ Installing Updates\n\nAn NBM file can also be installed without user interaction.\
    \ To do this, just put the NBM file in the `update/download` directory of a cluster.\
    \ The update is then automatically installed when the application is next started.\
    \ After, the NBM file is removed and the application is started anew. Backups\
    \ of original versions of the actualized modules are found in the `update/backup/netbeans`\
    \ directory. Bear in mind that the update is always installed in this cluster\
    \ where the update is stored, even if the module that should be updated is installed\
    \ in a different cluster.\n\nThe *Auto Update Services API* offers further possibilities\
    \ for management, automatic installation, uninstallation, or deactivation of modules.\
    \ [Chapter 25](#Chapter25.html#ch25) will cover the functionalities of the Auto\
    \ Update Services API.\n\n### Summary\n\nThis chapter introduced you to the update\
    \ facilities of the NetBeans Platform. First, you saw how the Auto Update service\
    \ works. An NBM file is an update package and can be created from your module\
    \ by the NetBeans IDE. Next, you learned how to provide and configure update centers.\
    \ You also saw how a module is configured to provide a localized version of an\
    \ existing module. Finally, this chapter dealt with the configuration of update\
    \ centers on the client-side and how updates can be installed automatically.\n\
    \n## PART 7\n\n## Test & Tooling: Developing and Testing NetBeans Platform Applications\n\
    \n## C H A P T E R  37\n\n## Maven and the NetBeans Platform\n\nThe NetBeans Platform\
    \ uses the build tool Ant by default. Maven, an alternative to Ant, has until\
    \ now only been provided as an additional plugin, with limited support from the\
    \ IDE. But this has changed; Maven is now an integral part of the NetBeans IDE.\
    \ The NetBeans IDE involves the Maven distribution and numerous wizards to create\
    \ different project types. This chapter will focus on Maven support when developing\
    \ NetBeans Platform applications.\n\nThe configuration for a Maven project is\
    \ hierarchical and modular, so it is quite suitable as a build system for NetBeans\
    \ Platform applications. In Maven projects the complete build process is carried\
    \ out by Maven, which means it is easy to work even without the NetBeans IDE.\
    \ The functionality of Maven itself is organized into separate plugins; due to\
    \ Maven's widespread use, plugins are available for numerous tasks. The necessary\
    \ configuration files remain small and clearly organized.\n\n### Basics and Structure\
    \ of a Maven Project\n\nIn Maven, all the necessary information for a software\
    \ project is defined in a so-called *POM* (project object model) file. Each module\
    \ (such as a JAR file) contains its own file. A project can consist of several\
    \ modules. A parent POM file which aggregates these modules can be created so\
    \ these modules can be collectively created. At the same time, subordinate modules\
    \ can inherit features of the parent POM file. In this way a hierarchic structure\
    \ arise, and this structure can be extended further down. (See [Figure 37-1](#Chapter37.html#fig_37_1).)\n\
    \n![Image](images/3701.jpg)\n\n***Figure 37-1.** File structure of a multi-module\
    \ project with parent POM file to inherit features and aggregation of several\
    \ modules*"
  raw: '### Configuring and Installing on the Client-Side


    The desired update centers must be installed in the *Plugin Manager*, which you
    can open via *Tools ![Image](images/U001.jpg) Plugins*. Your rich client application
    is then able to get new or updated modules from an update center. In the *Settings*
    tab you can install any update center (see [Figure 36-5](#Chapter36.html#fig_36_5)).
    The URL of an update center must refer to the update center descriptor (see the
    “Update Centers” section). In this view you can also deactivate certain update
    centers and thus exclude them from the update process.


    ![Image](images/3605.jpg)


    ***Figure 36-5.** Configuration of the update centers to be searched for new modules*


    When switching to the *Updates* tab, use the *Reload Catalog* button to allow
    the Auto Update service to look for updates in the defined update centers. Updated
    versions of modules are searched for those modules that are already installed
    in the application. For searching new modules, use the same approach in the *Available
    Plugins* tab. The found modules are displayed immediately in a list, from which
    you can select those you need. Use the *Update* or *Install* button to add selected
    modules to the application. Modules that are also locally available—that is, those
    that are personally downloaded—can be installed as well. To do so, switch to the
    *Downloaded* tab, and then click *Add Plugins…* to add the desired NBM files.
    Finally, click *Install* to install the selected plugins.


    The last tab to be discussed is the *Installed* tab (see [Figure 36-6](#Chapter36.html#fig_36_6)).
    All currently installed modules are listed there, organized by categories. You
    can deactivate modules in this view, as well as completely uninstall them.


    ![Image](images/3606.jpg)


    ***Figure 36-6.** The Installed tab lists all installed modules. Here, you can
    deactivate and uninstall modules.*


    #### New Update Center


    As already mentioned, users of your application may register additional update
    centers in the Plugin Manager. However, you can also add update center information
    to one of your modules. Once this module is loaded in an application, the registered
    update center is also automatically provided there. So, you are able to add an
    additional update center to an already delivered application. For adding such
    update center information to your module, a wizard is provided under *File ![Image](images/U001.jpg)
    New File... ![Image](images/U001.jpg) Module Development ![Image](images/U001.jpg)
    Update Center*. The wizard registers the entered update center information, consisting
    of the name and URL in the standard folder `Services/AutoupdateType` in the layer
    file. Such an entry then looks like that shown in [Listing 36-3](#Chapter36.html#list_36_3).


    ***Listing 36-3.** Update Center Definition in the Layer File*


    `<folder name="`**`Services`**`">`

    `   <folder name="`**`AutoupdateType`**`">`

    `      <file name="`**`my_module_update_center.instance`**`">`

    `         <attr name="`**`displayName`**`"`

    `               bundlevalue="com.galileo.netbeans.module.Bundle                #Services/AutoupdateType/my_module_update_center.instance"/>`

    `         <attr name="`**`enabled`**`" boolvalue="`**`true`**`"/>`

    `         <attr name="instanceCreate" methodvalue=`

    `               "org.netbeans.modules.autoupdate.updateprovider.`

    `               AutoupdateCatalogFactory.createUpdateProvider"/>`

    `         <attr name="instanceOf" stringvalue="org.netbeans.spi.autoupdate.UpdateProvider"/>`

    `         <attr name="`**`url`**`" bundlevalue=`

    `               "com.galileo.netbeans.module.Bundle#`**`my_module_update_center`**`"/>`

    `      </file>`

    `   </folder>`

    `</folder>`


    The actual files have been outsourced in a resource bundle:


    `my_module_update_center=`**`http://heikoboeck.de/updates.xml`**

    `Services/AutoupdateType/my_module_update_center.instance=`**`My Update Center`**


    This example assumed that the update center is publicly accessible via the Internet
    address per *http*. However, you can also use the *file* protocol to install an
    update center with it, for example, on a company-internal server.


    `file:/D:/NetBeans/MyUpdateCenter/updates/updates.xml`


    #### Automatically Installing Updates


    An NBM file can also be installed without user interaction. To do this, just put
    the NBM file in the *`update/download`* directory of a cluster. The update is
    then automatically installed when the application is next started. After, the
    NBM file is removed and the application is started anew. Backups of original versions
    of the actualized modules are found in the *`update/backup/netbeans`* directory.
    Bear in mind that the update is always installed in this cluster where the update
    is stored, even if the module that should be updated is installed in a different
    cluster.


    The *Auto Update Services API* offers further possibilities for management, automatic
    installation, uninstallation, or deactivation of modules. [Chapter 25](#Chapter25.html#ch25)
    will cover the functionalities of the Auto Update Services API.


    ### Summary


    This chapter introduced you to the update facilities of the NetBeans Platform.
    First, you saw how the Auto Update service works. An NBM file is an update package
    and can be created from your module by the NetBeans IDE. Next, you learned how
    to provide and configure update centers. You also saw how a module is configured
    to provide a localized version of an existing module. Finally, this chapter dealt
    with the configuration of update centers on the client-side and how updates can
    be installed automatically.


    ## PART 7


    ## Test & Tooling: Developing and Testing NetBeans Platform Applications


    ## C H A P T E R  37


    ## Maven and the NetBeans Platform


    The NetBeans Platform uses the build tool Ant by default. Maven, an alternative
    to Ant, has until now only been provided as an additional plugin, with limited
    support from the IDE. But this has changed; Maven is now an integral part of the
    NetBeans IDE. The NetBeans IDE involves the Maven distribution and numerous wizards
    to create different project types. This chapter will focus on Maven support when
    developing NetBeans Platform applications.


    The configuration for a Maven project is hierarchical and modular, so it is quite
    suitable as a build system for NetBeans Platform applications. In Maven projects
    the complete build process is carried out by Maven, which means it is easy to
    work even without the NetBeans IDE. The functionality of Maven itself is organized
    into separate plugins; due to Maven''s widespread use, plugins are available for
    numerous tasks. The necessary configuration files remain small and clearly organized.


    ### Basics and Structure of a Maven Project


    In Maven, all the necessary information for a software project is defined in a
    so-called *POM* (project object model) file. Each module (such as a JAR file)
    contains its own file. A project can consist of several modules. A parent POM
    file which aggregates these modules can be created so these modules can be collectively
    created. At the same time, subordinate modules can inherit features of the parent
    POM file. In this way a hierarchic structure arise, and this structure can be
    extended further down. (See [Figure 37-1](#Chapter37.html#fig_37_1).)


    ![Image](images/3701.jpg)


    ***Figure 37-1.** File structure of a multi-module project with parent POM file
    to inherit features and aggregation of several modules*'
