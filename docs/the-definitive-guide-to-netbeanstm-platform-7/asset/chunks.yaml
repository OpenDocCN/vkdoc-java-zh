    ### 创建模块


    现在是时候创建你的第一个模块了。NetBeans IDE 中集成的示例应用程序也提供了很好的模块开发入门介绍。为简单起见，你只需在此设计一个单独的模块。


    首先，创建一个 NetBeans 平台应用程序或模块套件。这样，你将能够更轻松地执行和测试模块，并且可以定义对你自己的模块和库的依赖关系（请参阅“定义依赖关系”部分）。之后，你甚至可以创建一个独立的富客户端发行版（请参阅第
    35 章）。


    NetBeans IDE 提供了一个向导来帮助你应用 NetBeans 平台应用程序项目。


    1.  启动 NetBeans IDE，然后在菜单中选择 *文件* ![Image](img/U001.jpg) *新建项目*…。在左侧出现的对话框中会显示不同的项目类别。在此选择
    *NetBeans 模块*。然后在右侧选择项目类型 *NetBeans 平台应用程序*（请参阅图 3-3）。


    ![Image](img/0303.jpg)


    ***图 3-3.** 创建一个新的 NetBeans 平台应用程序项目*


    2.  在下一页，为应用程序命名（例如，My Application），并选择项目保存的位置。其余字段可以留空。

    3.  点击 *完成* 按钮以创建 NetBeans 平台应用程序项目。

    4.  现在可以创建第一个模块了；此任务有另一个向导可用。打开 *文件* ![Image](img/U001.jpg)*新建项目* … 菜单。选择类别 *NetBeans
    模块*，然后在右侧选择项目类型 *模块*。

    5.  点击 *下一步* 按钮进入下一页，为项目命名。在此输入，例如，My Module，然后选择选项 *添加到模块套件*，并从列表中选择先前创建的 NetBeans
    平台应用程序或模块套件。

    6.  在最后一页，定义代码名称基址和模块显示名称。本地化包的默认值可以保留。为了完整起见，激活选项 *生成 XML 层* 以创建一个层文件。如果不需要，可以稍后将其删除，同时删除清单文件中的相关条目。

    7.  点击 *完成* 按钮，让向导生成模块，如图 3-4 所示。


    ![Image](img/0304.jpg)


    ***图 3-4.** 新模块的配置*


    在“项目”窗口中查看该模块，你会看到 *源包* 文件夹。目前，此文件夹仅包含 *Bundle.properties* 和 *layer.xml* 文件。*Bundle.properties*
    文件仅为清单文件中注册的信息提供一个本地化包。*layer.xml* 文件提供了所谓的 *层树*，这是一种特殊视图，你可以在 *重要文件* 文件夹中找到它。它提供两种不同的视图。一方面，有
    *<此层>* 文件夹，其中仅显示你的层文件的内容。另一方面，有 *<上下文中的此层>* 文件夹，其中显示了属于你的 NetBeans 平台应用程序的模块的层文件条目。此视图也表示为系统文件系统，就像运行时提供给平台的那样。


    在此视图中，模块的条目（你正在查看其文件夹的模块）以粗体显示。这让你可以概览最重要的默认文件夹，并且你可以直接移动、删除或添加条目。此外，你可以在 *重要文件*
    文件夹中找到同样由向导创建的清单文件（请参阅图 3-5）。


    ![Image](img/0305.jpg)


    ***图 3-5.** 项目窗口中的模块*


    你现在可以启动已创建的模块作为富客户端应用程序。为此，请在菜单中选择 *运行 ![Image](img/U001.jpg) 运行主项目 (F6)* 或在你
    NetBeans 平台应用程序项目的上下文菜单中选择 *运行*。（请参阅图 3-6）。


    ![Image](img/0306.jpg)


    ***图 3-6.** 你的 NetBeans 平台应用程序的基本结构*


    我们仅用几个步骤就应用了 NetBeans 平台应用程序的基本结构。在接下来的章节中，我们将逐步为我们的模块配备功能，例如窗口和菜单项。通过这种方式，我们将丰富富客户端应用程序。


    ### 版本控制与依赖关系


    为了确保模块化系统保持一致性和可维护性，系统内的模块规定它们需要使用的模块至关重要。为此，NetBeans 平台允许定义对其他模块的依赖关系。只有定义了依赖关系，一个模块才能访问另一个模块的代码。依赖关系在模块的清单文件中设置。当模块被加载时，模块系统会读取该信息。


    #### 版本控制


    为了保证依赖关系之间的兼容性，你必须定义版本；例如，*主发行版本*、*规范版本* 和 *实现版本*。这些版本基于 Java 包版本控制规范，并反映了依赖关系的基本概念。你可以在模块的“属性”对话框中定义和编辑依赖关系，该对话框可以通过
    *属性 ![Image](img/U001.jpg) API 版本控制* 访问（请参阅图 3-7）。


    首先，在此窗口中定义 *主发行版本*。此版本用于通知用户与模块先前版本相比存在不兼容的更改。在此，斜杠用于在清单文件中将代码名称基址与版本分开：


    **`OpenIDE-Module`**`: com.galileo.netbeans.module`**`/1`** ![Image](img/0307.jpg)


    ***图 3-7.** 设置模块版本*


    最重要的版本是 *规范版本*。使用杜威十进制格式来定义此版本：


    **`OpenIDE-Module-Specification-Version`**`: 1.0.4`


    *实现版本* 是自由定义的文本。通常，使用一个时间戳，提供日期和时间。通过这种方式，你可以确定其唯一性。如果在模块的“属性”对话框中未显式设置，IDE 会在创建模块时使用当前时间戳添加实现版本，设置在清单文件中：


    **`OpenIDE-Module-Implementation-Version`**`: 200701231820`


    另一方面，如果你在“属性”对话框中定义了自己的实现版本，IDE 会添加带有当前时间戳的 `OpenIDE-Module-Build-Version` 属性。


    在公共包列表中，列出了你模块中的所有包。要将一个包暴露给其他模块，请勾选你想要暴露的包旁边的复选框。这样做，你就定义了模块的 API。暴露的包在清单文件中如下列出：


    **`OpenIDE-Module-Public-Packages:`**

    `   com.galileo.netbeans.module.*,`

    `   com.galileo.netbeans.module.model.*`


    要限制对公共包的访问（例如，只允许你自己的模块访问公共包），你可以定义模块的 *好友*。你可以在“属性”对话框的“API 版本控制”部分的公共包列表下方定义它们。然后，这些好友在清单文件中如下列出：


    **`OpenIDE-Module-Friends`**`:`

    `   com.galileo.netbeans.module2,`

    `   com.galileo.netbeans.module3`


    #### 定义依赖关系


    基于这些不同的版本，定义你明确的依赖关系。为此，有三种不同类型的依赖关系可用：模块依赖于模块、包或 Java 版本。


    **无依赖关系则无法访问**


    要使用来自另一个模块（包括 NetBeans 平台自身的模块）的类，你必须首先按照以下章节所述定义一个依赖关系。这意味着，如果你在模块中使用了一个 NetBeans
    平台类，而代码编辑器找不到所需的类，通常只需设置对提供该类的模块的依赖关系即可解决问题。

