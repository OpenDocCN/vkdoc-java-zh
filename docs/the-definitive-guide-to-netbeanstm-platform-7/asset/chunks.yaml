    ### Managing Settings


    Settings and configuration data inside a NetBeans Platform application is preferably
    saved and loaded via the Java Preferences API. The Java Platform specifies an
    interface via the `Preferences` class. With this interface, settings and configuration
    data can be saved and loaded independent of their physical location. Different
    implementations can be provided with which the data, for example, in a file, in
    a system registry or even in a database can be saved. The data is saved in a hierarchic
    structure in form of key value pairs. An instance of the `Preferences` class represents
    a node in this hierarchy. You can imagine a node like a directory in a file system
    below which the data can be saved.


    With the `NbPreferences` class the Utilities API makes available an implementation
    of the Java Preferences specification for the NetBeans Platform. This implementation
    ensures that the settings are stored in the central configuration directory of
    the application, which is located in the user directory. The settings are stored
    as normal *.properties* files. Thus, the settings, which you save via Preferences,
    like all other settings in a NetBeans Platform application, are managed user-specifically.
    The `NbPreferences` class provides two static methods. With the `forModule()`
    method a `Preferences` Node is delivered whose data are saved in a separate *.properties*
    file in the *config/Preferences* directory for each module (see [Figure 20-3](#Chapter20.html#fig_20_3)).
    With the `root()` method an application global `Preferences` Node which manages
    its data in the *config/Preferences.properties* file is delivered.


    ![Image](images/2003.jpg)


    ***Figure 20-3.** With the NetBeans Preferences implementation, settings can be
    saved either module-specifically in the Preferences directory or application-globally
    in the Preferences.properties file*


    Then, you can easily save and read your settings with the methods specified by
    the `Preferences` class. If you want to save the name and port of a server, for
    example, we use the call shown in [Listing 20-9](#Chapter20.html#list_20_9).


    ***Listing 20-9.** Saving and Loading of Settings via the Preferences API*


    `Preferences node =` **`NbPreferences.forModule(this.getClass());`**

    `String name = node.`**`get`**`("server.name", "localhost");`

    `int    port = node.`**`getInt`**`("server.port", 8080);`

    `node.`**`put`**`("server.name", name);`

    `node.`**`putInt`**`("server.port", port);`


    Besides the methods for accessing data, shown here, further methods are available
    with which you can easily save arrays or boolean values, too, for example. Furthermore,
    with the *Java* *Preferences* *API* you can register a `NodeChangeListener` and
    a `PropertyChangeListener` on a `Preferences` Instance (meaning a node), in order
    to add and delete of child nodes as well as to react on changes of data.


    ### Summary


    With the Options Dialog API and SPI, the NetBeans Platform provides a precast
    options dialog. In this options dialog you can quickly and easily integrate your
    own (private) panels. You already learned how settings can be managed centrally
    and in a homogenous way by the user. You also learned how the NetBeans Preferences
    API facilitates simply saving the settings.


    ## C H A P T E R  21


    ## Palette


    The Form Editor is a very good example for using the palette module. The Form
    Editor places its AWT and Swing components on the palette (see [Figure 21-1](#Chapter21.html#fig_21_1)).
    These components can then be moved via drag-and-drop. You can also add components
    to the palette during runtime. The content of the palette window is managed and
    provided by a `PaletteController`. Such a `PaletteController` can be made available
    by a top component via the Lookup. This means that as soon as a top component,
    in whose Lookup is located a `PaletteController` instance, becomes active, the
    palette window is opened and its content is displayed. A `PaletteController` is
    created via the `PaletteFactory` class. There are two ways to provide the components.
    You can either register the components, which will be displayed on the palette,
    with XML files in the layer file, or you can use a two-stage or three-stage node
    hierarchy. We will look at both approaches here.


    Note that you are not limited to providing a palette to your own top components,
    but you can also register a palette for a certain file type in the layer file
    which is just displayed when a file of this type is opened in the NetBeans editor.
    This is especially helpful if you want to extend the functionality of the NetBeans
    IDE. This topic will be explored in [Chapter 22](#Chapter22.html#ch22).


    ![Image](images/2101.jpg)


    ***Figure 21-1.** Palette of the NetBeans GUI editor*'
