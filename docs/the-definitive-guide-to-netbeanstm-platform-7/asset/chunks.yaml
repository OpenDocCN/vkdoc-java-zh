    \ be able to assign a name to the playlist, while choosing a genre and providing\
    \ a description and image. The completed panel should look like [Figure 13-6](#Chapter13.html#fig_13_6),\
    \ whereby the panel is already shown integrated into the wizard. The panel is\
    \ a normal Swing component, extending `JPanel`; however, you should bear in mind\
    \ the following implementation details:\n\n- For each piece of data requested\
    \ from the user, a public property constant is defined. These are constants for\
    \ the name of the playlist, the genre, a description, and an image. In particular,\
    \ these constants are needed later to save and load data into the data model.\n\
    - In the constructor, a listener is added to each field to be monitored. In the\
    \ example, you want to ensure that the name has at least three characters, the\
    \ chosen image has a maximum size of 128 × 128 pixels, and a warning message is\
    \ shown when no image has been selected. To that end, you register a `DocumentListener`\
    \ for the two text fields `playlistName` and `imagePath`.\n- It is important to\
    \ override the `getName()` method. Thus you provide the names of the panels displayed\
    \ in the headers of the steps in the wizard.\n- For each field, add a getter method\
    \ which the wizard panel uses to access data entered by the user.\n- In the `DocumentListener`\
    \ methods `changedUpdate()`, `insertUpdate()`, and `removeUpdate()`, use the `firePropertyChange()`\
    \ method to notify all registered `PropertyChangeListener`s. The interaction between\
    \ the three layers of a wizard is discussed in detail in the next section.\n\n\
    [Listing 13-2](#Chapter13.html#list_13_2) shows a section from the Visual Panel\
    \ `PlaylistWizardPanel1`. Notice the panel is completely free from any wizard\
    \ logic. The complete source code of this class as well as the complete example\
    \ project can be downloaded from the Source Code/Download area for this book on\
    \ the Apress web site.\n\n***Listing 13-2.** Visual Panel of the First Wizard\
    \ Step*\n\n```\npublic final class PlaylistVisualPanel1 extends JPanel\nimplements\
    \ DocumentListener {\npublic static final String PROP_PLAYLIST_NAME = \"playlist\"\
    ;\npublic static final String PROP_GENRE         = \"genre\";\npublic static final\
    \ String PROP_DESCRIPTION   = \"description\";\npublic static final String PROP_IMAGE_PATH\
