    ![Image](images/U001.jpg) API版本控制*下进行此操作，因为只有这样，你才能定义对Services模块的依赖关系并使用其类。


    ### MP3播放器


    在上一节中，你通过将服务模块分为两部分：服务接口和服务提供者，为你的播放器设计奠定了基础。现在，你考虑播放器应向应用程序的其他组件提供的接口和功能。然后，你在一个抽象类中描述这些接口。你应该选择抽象类，而不是接口，因为播放器将是一个中央全局服务。换句话说，请求模块通常只对一个播放器实例感兴趣。正如你将在以下部分中注意到的，使用抽象类可以更容易地确保这种行为。'
