    You gain access to the data object, meaning the MP3 file, which provides the features,
    via the Lookup. Then you create an object for each property, making sure to distinguish
    between properties that can be changed by the user and read-only properties. For
    the features that the user will be able to change in the *Properties* window,
    you create a `PropertySupport.Reflection` instance with the corresponding type,
    in this case `String`. As first parameter you pass the data object; as second
    parameter, pass the data type of the property; and as third parameter, you pass
