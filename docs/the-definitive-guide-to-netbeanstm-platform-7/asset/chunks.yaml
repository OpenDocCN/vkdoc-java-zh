    \ a data object factory for the MP3 MIME type which is responsible for loading\
    \ an `Mp3DataObject`. (See [Listing 44-2](#Chapter44.html#list_44_2).)\n\n***Listing\
    \ 44-2.** Each Data Object Factory Is Responsible for a Certain File Type and\
    \ Is Served by the NetBeans Platform. This Is Why It Must Be Registered.*\n\n\
    ```\n<folder name=\"Loaders\">\n  <folder name=\"audio\">\n    <folder name=\"\
    mpeg\">\n      <folder name=\"Factories\">\n        <file name=\"Mp3DataLoader.instance\"\
    >\n          <attr name=\"SystemFileSystem.icon\"\n                urlvalue=\"\
