    ### Using Libraries


    When developing rich client applications, you will more than likely need to include
    external libraries in the form of JAR archives within your application. Since
    the whole application is based on modules, it is desirable to integrate the external
    JAR file in the form of a module. That has the advantage of setting dependencies
    on the module, enhancing the consistency of the application as a whole. You can
    also bundle multiple JAR files into a single module, after which you will no longer
    need to put the physical JAR files on the application classpath, as is normally
    done when developing applications.


    #### Library Wrapper Module


    To achieve the scenario just outlined, create a *Library Wrapper Module*. The
    NetBeans IDE provides a project type and a wizard for this purpose.


    1.  To create a new library wrapper project, go to *File ![Image](images/U001.jpg)
    New Project*…, and use the dialog shown in [Figure 3-11](#Chapter03.html#fig_3_11)
    to choose the category *NetBeans Modules*, followed by the project type *Library
    Wrapper Module*.


    ![Image](images/0311.jpg)


    ***Figure 3-11.** Creating a library wrapper module*


    2.  Click *Next* to choose the required JAR files. You can choose one or more
    JAR files here (hold down the Ctrl key to select multiple JAR files). You are
    also able to add a license file for the JAR you are wrapping as a module.

    3.  In the next step, provide a project name, as well as a location to store the
    new module. Specify the Module Suite or Platform Application to which the library
    wrapper module belongs.

    4.  Click *Next* again to fill out the *Basic Module Configuration* dialog, as
    shown in [Figure 3-12](#Chapter03.html#fig_3_12).


    ![Image](images/0312.jpg)


    ***Figure 3-12.** Library wrapper module configuration*


    5.  This is where you can define the code name base. Normally this field is prefilled
    with the name of the selected JAR archive of the read code name base. Furthermore,
    you can provide the module with a name and a Localizing Bundle to localize the
    module manifest information. With a click on the *Finish* button, you create the
    new project.


    When you are looking at the newly created library wrapper module in the *Projects*
    window, and you additionally open the *Source Packages* folder, you will see that
    the *Bundle.properties* file of the manifest file is located here. The library,
    which is encapsulated by the module, was copied in the directory *release/modules/ext*
    of the project folder.


    To understand how a library wrapper module works, take a look at the related manifest
    file which is found in the projects structure in the folder *Important Files*.
    Note that the manifest information, which is depicted in the [Listing 3-9](#Chapter03.html#list_3_9),
    may not be found directly in the manifest file. Certain information, such as the
    public packages, are just written when you build the module (when calling *Build
    Project*). To see the entire manifest file, create the module and then open the
    manifest file within the created module JAR archive (located in the *build/cluster/modules*
    directory of your NetBeans Platform application. You can see which packages are
    exposed in the properties of your library wrapper module under *API Versioning*.
    There, you can delete packages from the *Public Packages* list later.


    ***Listing 3-9.** Manifest File of a Library Wrapper Module*


    `Manifest-Version: 1.0`

    `Ant-Version: Apache Ant 1.7.0`

    `Created-By: 1.6.0-b105 (Sun Microsystems Inc.)`

    `OpenIDE-Module: com.hboeck.mp3`

    **`OpenIDE-Module-Public-Packages:`**

    **`com.hboeck.mp3.*,`**

    **`com.hboeck.mp3.id3.*,`**

    **`...`**

    `OpenIDE-Module-Java-Dependencies: Java > 1.4`

    `OpenIDE-Module-Specification-Version: 1.0`

    `OpenIDE-Module-Implementation-Version: 101211`

    `OpenIDE-Module-Localizing-Bundle:`

    `   com/hboeck/mp3/Bundle.properties`

    `OpenIDE-Module-Requires: org.openide.modules.ModuleFormat1`

    **`Class-Path: ext/com-hboeck-mp3.jar`**


    Two very important things have been accomplished by the wizard. On the one hand,
    it marked all packages of the library with the attribute **OpenIDE-Module-Public-Packages**,
    making all these packages publicly accessible. This is useful because a library
    is supposed to be used by other modules, too. On the other hand, the wizard marked
    the library (located in the distribution in the directory *ext/*) with the **Class-Path**
    attribute, putting it on the module class path. This way, the classes of the library
    can be loaded by the module classloader. The type *Autoload* was automatically
    assigned to the library wrapper module (see the section *Configuration File*).
    This way, it is just loaded when needed.'
