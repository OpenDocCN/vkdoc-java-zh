  trans: '

    ### 本书结构


    本书面向希望基于 NetBeans 平台开发客户端应用的 Java 开发者。读者无需具备富客户端平台的相关知识。本书的主要目标是贴近实际实践，介绍 NetBeans
    平台的基本理念与功能，并阐释 NetBeans IDE 在应用开发阶段提供的出色支持，以及 NetBeans 平台的接口与优势。通过这种方式，我希望能够激励您进一步使用
    NetBeans 平台——并扪心自问，为何您此前没有基于富客户端平台来开发应用，尤其是在您认识到过去本可以从中获益的众多优势之后。


    本书各章节大多相互独立，以便您能直接切入感兴趣的章节，并为您提供一份基于 NetBeans 平台开发富客户端应用的实用手册。为使各章节清晰易懂并便于直接查阅，本书中的讲解均辅以小型示例，而不依赖于某个整体应用。在本书末尾，我将展示如何创建一个完整的富客户端应用，涵盖从草案阶段、创建基本结构到实现应用逻辑的全过程。我将以
    MP3 管理器为例，采用类似教程的格式进行讲解。在该应用中，您将集成 Java Media Framework (JMF) 以及 Java DB 数据库系统等。


    第 1 部分 介绍 NetBeans 平台的基本特性与概念。首先，您将了解富客户端的定义、富客户端平台通常包含哪些特性，以及 NetBeans 平台提供的特殊优势。此外，由于基于模块的特性至关重要，我将在第
    1 部分 中同时介绍 NetBeans 模块系统和 OSGi 框架。查找、操作和数据管理这三个核心主题将分别用一章的篇幅来阐述，从而完成第一部分的内容。


    第 2 部分 完全专注于用户界面的开发。这部分主要涉及窗口系统以及菜单栏、工具栏、状态栏和进度条。借助窗口系统的支持，您可以轻松实现并管理自己的窗口。结合第一部分中讲解的数据管理，您将在单独的一章中学习灵活的节点概念以及
    Explorer API。本部分还涵盖了对话框和向导的开发，以及强大的 Visual Library API 的使用。


    在第 3 部分 中，我们将深入探讨 NetBeans 平台的标准模块，这些模块无需太多额外工作即可直接使用。这包括帮助系统、输出窗口、导航器、属性窗口、选项对话框和面板模块。我将用单独的章节解释如何使用它们中的每一个。


    第 4 部分 介绍如何使用 NetBeans 平台和 NetBeans IDE 中非常有用的 API。实际上，您并不局限于 NetBeans 平台的模块。其中一章解释了如何使用
    Palette API，另一章则介绍了如何使用 Task List API。此外，我们还将通过贴近实际实践的示例，深入了解 Quick Search 和 Auto
    Update Services API。


    在第 5 部分 中，我将 NetBeans 平台置于数据库和 Java EE 应用的背景下。首先，您将在 NetBeans 平台应用中使用 Java DB
    作为客户端数据库解决方案。后续章节将介绍如何使用 Hibernate 来简化数据库访问。然而，应用 Hibernate 并不需要依赖于特定的对象关系映射（ORM）框架。在稍后的章节中，我将解释如何为此目的集成
    Java Persistence API (JPA)。作为 Java DB 和 Hibernate 的替代方案，我还将深入探讨结合 EclipseLink
    的 MySQL 数据库解决方案。在本部分中，我们将从两个方面探讨 Web 服务：一方面，是关于使用基于 SOAP 的任何可用 Web 服务；另一方面，是关于连接使用
    SOAP 和基于 REST 的 Web 服务的服务器端 Java EE 应用。最后一章将回答关于用户身份验证和应用特定定制的问题。


    在第 6 部分 中，您将了解 NetBeans 平台在国际化和本地化方面提供的可能性。此外，本部分还涵盖了 NetBeans 平台的品牌化以及将整个应用打包为可交付单元。在另一章中，您将了解
    NetBeans 平台的更新机制，借助该机制，您可以在交付后以简单透明的方式更新您的应用。


    本书的第 7 部分 介绍 NetBeans 平台或 NetBeans IDE 的各种开发和测试工具。首先，是关于使用 Maven 构建系统实现 NetBeans
    平台应用。在另一章中，您将学习如何甚至在 Eclipse IDE 内使用 Maven 开发 NetBeans 平台应用。此外，有一章将简化从 Eclipse
    IDE 切换到 NetBeans IDE 以开发 NetBeans 平台应用的过程。除了 NetBeans 和 Eclipse IDE，IntelliJ IDEA
    也可用于开发 NetBeans 平台应用。NetBeans IDE 提供了一个强大的 GUI 构建器，用于高效开发用户界面。您将在单独的章节中学习如何使用它，以及如何调试和测试您的应用。


    第 8 部分 以一个完整可用的示例来结束本指南。在本部分中，您将逐步开发一个 MP3 管理器应用。前面描述的概念和技术将在此汇聚，并能让您如同在实际实践中一样理解它们。


    ### 下载代码


    本书中的所有示例和讲解均基于 Java 6 和 NetBeans 7。您可以在 [`http://java.oracle.com`](http://java.oracle.com)
    下载 Java 开发工具包 (JDK 6)，并在 [`http://netbeans.org`](http://netbeans.org) 下载 NetBeans
    7。


    本书中的每个源代码示例都可以从 Apress 网站上本书的“源代码/下载”区域下载，作为完整的可运行 NetBeans IDE 项目。


    ## 第 1 部分


    ## 基础与概念：NetBeans 平台基础


    ## 第 1 章


    ## 引言


    本章将向您介绍富客户端开发。在此过程中，您将了解什么是富客户端，以及富客户端平台如何为您提供帮助。本章还将简要介绍 NetBeans 平台的主要优势和特性。

    '
- fmt: '### What Is a Rich Client?


    In a client server architecture the term `rich client` is used for clients where
    the data processing occurs mainly on the client side. The client also provides
    the graphical user interface (GUI). Often rich clients are applications that are
    extendable via plugins and modules. In this way, rich clients are able to solve
    more than one problem.


    Rich clients are typically developed on top of a framework. A framework offers
    a basic starting point on top of which the user can assemble logically related
    parts of the application, which are called modules. Ideally, unrelated solutions
    (such as those made available by different providers) can work together, so that
    all the modules appear to have been created as one whole.


    Above and beyond all that, rich clients have the advantage that they are easy
    to distribute and update, such as via an automatic online update function within
    the client itself or through a mechanism that enables the rich client to start
    over the Internet (for example, via Java Web Start).


    Here''s an overview of the characteristics of a rich client:


    - Flexible and modular application architecture

    - Platform independence

    - Adaptability to the end user

    - Ability to work online as well as offline

    - Simplified distribution to the end user

    - Simplified updating of the client


    ### What Is a Rich Client Platform?


    A rich client platform is an application lifecycle environment, a basis for desktop
    applications. Most desktop applications have similar features, such as menus,
    toolbars, status bars, progress visualizations, data displays, customization settings,
    the saving and loading of user-specific data and configurations, splash screens,
    about boxes, internationalization, help systems, and so on. For these and other
    typical client application features, a rich client platform provides a framework
    with which the features can quickly and simply be put together.


    The configurability and extensibility of an application take center stage in a
    framework of this kind. As a result, you can, for example, declaratively provide
    the menu entries of an application in a text file, then the menu will be loaded
    automatically by the framework. This means that the source code becomes considerably
    more focused and manageable, and developers are able to concentrate on the actual
    business needs of the application, while the menu is maximally configurable.


    The most important aspect of a rich client platform is its architecture. Applications
    based on rich client platforms are written in the form of modules, within which
    logically coherent parts of an application are isolated. A module is described
    declaratively and automatically loaded by the platform. As a result, there is
    no explicit binding necessary between the source code and the application. In
    this way, a relatively loosely coupled relationship is established between independently
    functioning modules, by means of which the dynamic extensibility of the application
    and the ability to swap its constituent parts are enormously simplified. That
    way it is also very easy to assemble user- or domain-specific applications from
    individual modules.


    A rich client platform also frees the developer from being concerned with tasks
    that have little to do with the application''s business logic. At the end of the
    development cycle, you achieve a well-deserved and modern application architecture.


    ### Advantages of a Rich Client Platform


    Aside from the modularity offered by a rich client architecture,—which simultaneously
    implies a high degree of robustness and end user value—the extensive development
    support it provides should also be highlighted. These and other advantages of
    development based on rich client platforms are briefly described here.


    #### Reduction of Development Time


    A rich client platform provides a multitude of application programming interfaces
    (APIs) for desktop application development. For example, these APIs can be used
    by developers to manage windows and menus or support the display of customization
    options. Through the reusability of many predefined components, developers are
    able to concentrate very closely on the business logic of the application in question.


    #### User Interface Consistency


    Usability of an application is always of crucial concern, particularly when the
    application is intended to be used by professionals in a specific field. A rich
    client platform makes available a framework to display the user interface (UI),
    with an emphasis on consistency, accessibility, and usability.


    #### Updating an Application


    Using a rich client platform, it is possible to quickly and efficiently distribute
    new or updated modules to end users. As a result, not all the clients of an application
    need be informed by developers to switch to a new version. Updates can be distributed
    and installed in the form of modules, so distinct features can be developed and
    delivered by independently developer teams. The modular architecture of the application
    ensures that completed modules can be distributed without having to wait for other
    modules to be finalized.


    #### Platform Independence


    Rich client platforms are based on international standards and reusable components.
    As a result, Java applications based on rich client platforms can be automatically
    deployed to multiple systems, such as Windows or Linux, so long as an implementation
    of the Java Runtime Environment is available. Since the feature set and the applicability
    of applications keep changing, it is very important that they are developed in
    such a way that they are extendable and can be deployed to different target systems.
    All this is provided by a rich client platform, saving time and money. Applications
    based on rich client platforms do not require further libraries or components,
    other than the Java Runtime Environment.


    #### Reusability and Reliability


    Rich client platforms make a range of features and modules available, which can
    be used in the developer''s own applications. If the module does not completely
    match the application''s requirements, it is entirely possible to use it as a
    starting point, while extending it or changing it as needed. Since most platforms
    also make their source code available, it may also, in some cases, be worth considering
    changing or extending the platform itself. These factors imply a high degree of
    reliability and freedom.


    ### Characteristics of the NetBeans Platform


    In addition to the generic advantages of a rich client platform, the NetBeans
    Platform offers numerous frameworks and several additional features that can be
    particularly useful to your applications. The important ones, which constitute
    the main characteristics of the NetBeans Platform, are outlined here.


    #### User Interface Framework


    Windows, menus, toolbars, and other components are made available by the platform.
    As a result, you focus on specific actions, which condense your code, making it
    better and less error prone. The complete user interface offered by the NetBeans
    Platform is completely based on AWT/Swing and can be extended with your own components.


    #### Data Editor


    The powerful NetBeans editor within the NetBeans integrated development environment
    (IDE) can be used by your own application. The tools and functionality of the
    editor can quickly and easily be extended and adapted to the purposes of the application.


    #### Customization Display


    A display of user- and application-specific settings is needed in every application.
    The NetBeans Platform makes a framework available, making it extremely simple
    to integrate your own options dialogs, letting the user save and restore settings
    in a way that is pleasing to the eye.


    #### Wizard Framework


    The NetBeans Platform offers simple tools to create extendable and user-friendly
    wizards, guiding the user through complex steps in the application.'
  raw: '### What Is a Rich Client?


    In a client server architecture the term *rich client* is used for clients where
    the data processing occurs mainly on the client side. The client also provides
    the graphical user interface (GUI). Often rich clients are applications that are
    extendable via plugins and modules. In this way, rich clients are able to solve
    more than one problem.


    Rich clients are typically developed on top of a framework. A framework offers
    a basic starting point on top of which the user can assemble logically related
    parts of the application, which are called modules. Ideally, unrelated solutions
    (such as those made available by different providers) can work together, so that
    all the modules appear to have been created as one whole.


    Above and beyond all that, rich clients have the advantage that they are easy
    to distribute and update, such as via an automatic online update function within
    the client itself or through a mechanism that enables the rich client to start
    over the Internet (for example, via Java Web Start).


    Here''s an overview of the characteristics of a rich client:


    *   Flexible and modular application architecture

    *   Platform independence

    *   Adaptability to the end user

    *   Ability to work online as well as offline

    *   Simplified distribution to the end user

    *   Simplified updating of the client


    ### What Is a Rich Client Platform?


    A rich client platform is an application lifecycle environment, a basis for desktop
    applications. Most desktop applications have similar features, such as menus,
    toolbars, status bars, progress visualizations, data displays, customization settings,
    the saving and loading of user-specific data and configurations, splash screens,
    about boxes, internationalization, help systems, and so on. For these and other
    typical client application features, a rich client platform provides a framework
    with which the features can quickly and simply be put together.


    The configurability and extensibility of an application take center stage in a
    framework of this kind. As a result, you can, for example, declaratively provide
    the menu entries of an application in a text file, then the menu will be loaded
    automatically by the framework. This means that the source code becomes considerably
    more focused and manageable, and developers are able to concentrate on the actual
    business needs of the application, while the menu is maximally configurable.


    The most important aspect of a rich client platform is its architecture. Applications
    based on rich client platforms are written in the form of modules, within which
    logically coherent parts of an application are isolated. A module is described
    declaratively and automatically loaded by the platform. As a result, there is
    no explicit binding necessary between the source code and the application. In
    this way, a relatively loosely coupled relationship is established between independently
    functioning modules, by means of which the dynamic extensibility of the application
    and the ability to swap its constituent parts are enormously simplified. That
    way it is also very easy to assemble user- or domain-specific applications from
    individual modules.


    A rich client platform also frees the developer from being concerned with tasks
    that have little to do with the application''s business logic. At the end of the
    development cycle, you achieve a well-deserved and modern application architecture.


    ### Advantages of a Rich Client Platform


    Aside from the modularity offered by a rich client architecture,—which simultaneously
    implies a high degree of robustness and end user value—the extensive development
    support it provides should also be highlighted. These and other advantages of
    development based on rich client platforms are briefly described here.


    #### Reduction of Development Time


    A rich client platform provides a multitude of application programming interfaces
    (APIs) for desktop application development. For example, these APIs can be used
    by developers to manage windows and menus or support the display of customization
    options. Through the reusability of many predefined components, developers are
    able to concentrate very closely on the business logic of the application in question.


    #### User Interface Consistency


    Usability of an application is always of crucial concern, particularly when the
    application is intended to be used by professionals in a specific field. A rich
    client platform makes available a framework to display the user interface (UI),
    with an emphasis on consistency, accessibility, and usability.


    #### Updating an Application


    Using a rich client platform, it is possible to quickly and efficiently distribute
    new or updated modules to end users. As a result, not all the clients of an application
    need be informed by developers to switch to a new version. Updates can be distributed
    and installed in the form of modules, so distinct features can be developed and
    delivered by independently developer teams. The modular architecture of the application
    ensures that completed modules can be distributed without having to wait for other
    modules to be finalized.


    #### Platform Independence


    Rich client platforms are based on international standards and reusable components.
    As a result, Java applications based on rich client platforms can be automatically
    deployed to multiple systems, such as Windows or Linux, so long as an implementation
    of the Java Runtime Environment is available. Since the feature set and the applicability
    of applications keep changing, it is very important that they are developed in
    such a way that they are extendable and can be deployed to different target systems.
    All this is provided by a rich client platform, saving time and money. Applications
    based on rich client platforms do not require further libraries or components,
    other than the Java Runtime Environment.


    #### Reusability and Reliability


    Rich client platforms make a range of features and modules available, which can
    be used in the developer''s own applications. If the module does not completely
    match the application''s requirements, it is entirely possible to use it as a
    starting point, while extending it or changing it as needed. Since most platforms
    also make their source code available, it may also, in some cases, be worth considering
    changing or extending the platform itself. These factors imply a high degree of
    reliability and freedom.


    ### Characteristics of the NetBeans Platform


    In addition to the generic advantages of a rich client platform, the NetBeans
    Platform offers numerous frameworks and several additional features that can be
    particularly useful to your applications. The important ones, which constitute
    the main characteristics of the NetBeans Platform, are outlined here.


    #### User Interface Framework


    Windows, menus, toolbars, and other components are made available by the platform.
    As a result, you focus on specific actions, which condense your code, making it
    better and less error prone. The complete user interface offered by the NetBeans
    Platform is completely based on AWT/Swing and can be extended with your own components.


    #### Data Editor


    The powerful NetBeans editor within the NetBeans integrated development environment
    (IDE) can be used by your own application. The tools and functionality of the
    editor can quickly and easily be extended and adapted to the purposes of the application.


    #### Customization Display


    A display of user- and application-specific settings is needed in every application.
    The NetBeans Platform makes a framework available, making it extremely simple
    to integrate your own options dialogs, letting the user save and restore settings
    in a way that is pleasing to the eye.


    #### Wizard Framework


    The NetBeans Platform offers simple tools to create extendable and user-friendly
    wizards, guiding the user through complex steps in the application.'
