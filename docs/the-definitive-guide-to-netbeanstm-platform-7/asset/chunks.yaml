    \ of a listener (as shown in [Listing 41-2](#Chapter41.html#list_41_2)) which\
    \ calls the method with the actual action.\n\n***Listing 41-2.** Automatic Registration\
    \ of an Event Listener by the GUI Builder*\n\n```\njButton1.addActionListener(new\
    \ java.awt.event.ActionListener() {\n   public void actionPerformed(java.awt.event.ActionEvent\
    \ evt) {\n      jButton1ActionPerformed(evt);\n   }\n});\n```\n\nYou can easily\
