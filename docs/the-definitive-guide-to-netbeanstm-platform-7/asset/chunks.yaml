    The Navigator API specifies the interfaces of a panel, which can be displayed
    in the navigator, by the interface `NavigatorPanel`. Panels are added declaratively
    via the layer file of your module. Doing so, a panel is linked to a certain MIME
    type. If a file with the corresponding MIME type is opened, the accordingly-registered
