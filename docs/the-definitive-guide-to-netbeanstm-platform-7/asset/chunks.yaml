- fmt: "# Creating a Top Component\n\nThe NetBeans IDE provides a helpful wizard for\
    \ creating `TopComponent`s. This wizard creates the complete basic skeleton. It\
    \ is started by calling *File* ![Image](images/U001.jpg) *New File…*, and selecting\
    \ the category *Module Development* and file type *Window*. On the following page,\
    \ *Basic Settings,* you can edit a series of settings for your top component,\
    \ as shown in [Figure 10-3](#Chapter10.html#fig_10_3).\n\n![Image](images/1003.jpg)\n\
    \n***Figure 10-3.** Creating a top component: Basic Settings*\n\nFirst, define\
    \ the *Window Position*, meaning the mode in which your top component is supposed\
    \ to be displayed. For the moment, you can only select the modules that the NetBeans\
    \ Platform provides. However, later you can substitute it with a self-defined\
    \ mode. Furthermore, you can define the behavior of the top component to create\
    \ on this wizard page. I will explain the meaning of this option later in the\
    \ “Behavior*”* section.\n\nPress *Next* to get to the last page of the wizard.\
    \ There, you can determine a prefix for the class name and an icon for the top\
    \ component, as shown in [Figure 10-4](#Chapter10.html#fig_10_4).\n\n![Image](images/1004.jpg)\n\
    \n***Figure 10-4.** Creating a top component: Name, Icon and Location*\n\nPress\
    \ the *Finish* button to end the wizard and to create the top component. The wizard\
    \ has already done everything you need for you. Now you can edit the top component\
    \ and equip it with the desired functionality with the Form Editor. You can test\
    \ everything with *Run* ![Image](images/U001.jpg) *Run Main Project*.\n\nNow let's\
    \ take a look at the class which has been created by the wizard. This class is\
    \ now marked by a series of annotations whose meaning is explained in [Listing\
    \ 10-1](#Chapter10.html#list_10_1).\n\n***Listing 10-1.** Basic Structure of a\
    \ Top Component with Annotations*\n\n```\nimport org.openide.util.NbBundle;\n\
    import org.openide.windows.TopComponent;\nimport org.netbeans.api.settings.ConvertAsProperties;\n\
    import org.openide.awt.ActionID;\nimport org.openide.awt.ActionReference;\n\n\
    @ConvertAsProperties(\n    dtd = \"-//com.galileo.netbeans.module//My//EN\",\n\
    \    autostore = false)\n@TopComponent.Description(\n    preferredID = \"MyTopComponent\"\
    ,\n    iconBase = \"com/galileo/netbeans/module/icon.png\",\n    persistenceType\
    \ = TopComponent.PERSISTENCE_ALWAYS)\n@TopComponent.Registration(\n    mode =\
    \ \"editor\",\n    openAtStartup = true)\n@ActionID(\n    category = \"Window\"\
    ,\n    id = \"com.galileo.netbeans.module.MyTopComponent\")\n@ActionReference(\n\
    \    path = \"Menu/Window\" /*, position = 333 */)\n@TopComponent.OpenActionRegistration(\n\
    \    displayName = \"#CTL_MyAction\",\n    preferredID = \"MyTopComponent\")\n\
    public final class MyTopComponent extends TopComponent {\npublic MyTopComponent()\
    \ {\n        initComponents();\n        setName(NbBundle.getMessage(MyTopComponent.class,\
    \ \"CTL_MyTopComponent\"));\n        setToolTipText(NbBundle.getMessage(MyTopComponent.class,\
    \ \"HINT_MyTopComponent\"));\n    }\n    ...\n}\n```\n\nThe top component is marked\
    \ with basic information by the annotation `TopComponent.Description`. A unique\
    \ identifier (`preferredID`), the path to an icon (`iconBase`), and the determination\
    \ whether the top component will be saved or not (`persistenceType`) belong to\
    \ this basic information. The possibilities are described in the next section,\
    \ “Persistence”.\n\nYou add the top component to a mode by the `TopComponent.Registration`\
    \ annotation. The mode determined by the attribute `mode` must already exist.\
    \ You can either choose a mode that is already defined by the NetBeans Platform\
    \ or you can create one yourself. In the section “Creating a Mode” you will learn\
    \ how to do this. With the `openAtStartup` attribute you can determine whether\
    \ your top component will be automatically opened when starting the application.\
    \ Finally, the optional attribute `position` is provided for determining the order\
    \ of multiple top components within a mode.\n\nThe NetBeans Platform does a lot\
    \ of work in the background with the annotation `TopComponent.OpenActionRegistration`.\
    \ This annotation causes the registration of an action to open the annotated top\
    \ component in the layer file. In this respect, it is interesting that not only\
    \ the registration occurs, but the action is also automatically provided. This\
    \ means, no corresponding action class exists in your module anymore. The action\
    \ class is created in the background by means of the transferred parameters with\
    \ the factory method `TopComponent.openAction()`. You define the name of the action\
    \ by the `displayName` attribute. Using `#` you can determine a key for a text\
    \ constant out of a properties bundle (see [Chapter 6](#Chapter06.html#ch6)).\
    \ With the `preferredID` attribute you can easily determine whether only one or\
    \ more instances can be produced by your top component. For this purpose use the\
    \ already defined identifier of your top component. That way, only a singleton\
    \ instance is created. Omitting the attribute, a new instance of the top component\
    \ is opened when executing the action.\n\nThe two attributes `ActionID` and `ActionReference`\
    \ are connected to the `TopComponent.OpenActionRegistration` annotation. As described\
    \ in [Chapter 6](#Chapter06.html#ch6), with `ActionID`, a unique identifier is\
    \ added to the open action with a category. With the `ActionReference` annotation\
    \ you determine where and in which menu the action will be displayed (see [Chapter\
    \ 9](#Chapter09.html#ch9)). While using the annotation as described is considerably\
    \ easier than registering a top component, I will explain (see [Listing 10-2](#Chapter10.html#list_10_2))—its\
    \ use is not mandatory, however. You also have the possibility here of directly\
    \ specifying the necessary information in the layer file. First, the top component\
    \ is defined in the standard folder `Windows2/Components` in the layer file. The\
    \ assignment to a mode occurs in the standard folder `Windows2/Modes`.\n\n***Listing\
    \ 10-2.** Definition and Assignment of a Top Component in the Layer File*\n\n\
    ```\n<folder name=\"Windows2\">\n   <folder name=\"Components\">\n      <file\
    \ name=\"MyTopComponent.settings\" url=\"MyTopComponentSettings.xml\"/>\n   </folder>\n\
    \   <folder name=\"Modes\">\n      <folder name=\"editor\">\n         <file name=\"\
    MyTopComponent.wstcref\" url=\"MyTopComponentWstcref.xml\"/>\n      </folder>\n\
    \   </folder>\n</folder>\n```\n\nA *Settings* file is needed for defining a top\
    \ component in the folder `Windows2/Components`. The complete class name of the\
    \ top component is named in this file. Thus, the window system is able to create\
    \ an instance of the top component. (See [Listing 10-3](#Chapter10.html#list_10_3).)\n\
    \n***Listing 10-3.** Settings File to Declaratively Add a Top Component*\n\n```\n\
    <!DOCTYPE settings PUBLIC\n \"-//NetBeans//DTD Session settings 1.0//EN\"\n \"\
    http://www.netbeans.org/dtds/sessionsettings-1_0.dtd\">\n<settings version=\"\
    1.0\">\n   <instance class=\"com.galileo.netbeans.module.MyTopComponent\"/>\n\
    </settings>\n```\n\nMapping a top component to a mode is done using a *Top Component\
    \ Reference* file, as shown in [Listing 10-4](#Chapter10.html#list_10_4). In this\
    \ file a unique identifier of the top component is defined. Additionally, it is\
    \ defined by the `opened` attribute of the `state` element, whether the window\
    \ is opened starting the application.\n\n***Listing 10-4.** Top Component Reference\
    \ File Mapping a Top Component to a Mode*\n\n```\n<!DOCTYPE tc-ref PUBLIC\n \"\
    -//NetBeans//DTD Top Component in Mode Properties 2.0//EN\"\n \"http://www.netbeans.org/dtds/tc-ref2_0.dtd\"\
    >\n<tc-ref version=\"2.0\" >\n   <tc-id id=\"MyTopComponent\"/>\n   <state opened=\"\
    true\"/>\n</tc-ref>\n```\n\nIf you chose the declarative way instead of the annotations,\
    \ you should finally overwrite the two methods `preferredID()` and `getPersistenceType()`\
    \ of your top component class and thus deliver the corresponding values."
  raw: '#### Creating a Top Component


    The NetBeans IDE provides a helpful wizard for creating `TopComponent`s. This
    wizard creates the complete basic skeleton. It is started by calling *File* ![Image](images/U001.jpg)
    *New File…*, and selecting the category *Module Development* and file type *Window*.
    On the following page, *Basic Settings,* you can edit a series of settings for
    your top component, as shown in [Figure 10-3](#Chapter10.html#fig_10_3).


    ![Image](images/1003.jpg)


    ***Figure 10-3.** Creating a top component: Basic Settings*


    First, define the *Window Position*, meaning the mode in which your top component
    is supposed to be displayed. For the moment, you can only select the modules that
    the NetBeans Platform provides. However, later you can substitute it with a self-defined
    mode. Furthermore, you can define the behavior of the top component to create
    on this wizard page. I will explain the meaning of this option later in the “Behavior*”*
    section.


    Press *Next* to get to the last page of the wizard. There, you can determine a
    prefix for the class name and an icon for the top component, as shown in [Figure
    10-4](#Chapter10.html#fig_10_4).


    ![Image](images/1004.jpg)


    ***Figure 10-4.** Creating a top component: Name, Icon and Location*


    Press the *Finish* button to end the wizard and to create the top component. The
    wizard has already done everything you need for you. Now you can edit the top
    component and equip it with the desired functionality with the Form Editor. You
    can test everything with *Run* ![Image](images/U001.jpg) *Run Main Project*.


    Now let''s take a look at the class which has been created by the wizard. This
    class is now marked by a series of annotations whose meaning is explained in [Listing
    10-1](#Chapter10.html#list_10_1).


    ***Listing 10-1.** Basic Structure of a Top Component with Annotations*


    `import org.openide.util.NbBundle;`

    `import org.openide.windows.TopComponent;`

    `import org.netbeans.api.settings.ConvertAsProperties;`

    `import org.openide.awt.ActionID;`

    `import org.openide.awt.ActionReference;`


    `@ConvertAsProperties(`

    `    dtd = "-//com.galileo.netbeans.module//My//EN",`

    `    autostore = false)`

    **`@TopComponent.Description`**`(`

    `    preferredID = "MyTopComponent",`

    `    iconBase = "com/galileo/netbeans/module/icon.png",`

    `    persistenceType = TopComponent.PERSISTENCE_ALWAYS)`

    **`@TopComponent.Registration`**`(`

    `    mode = "editor",`

    `    openAtStartup = true)`

    `@ActionID(`

    `    category = "Window",`

    `    id = "com.galileo.netbeans.module.MyTopComponent")`

    `@ActionReference(`

    `    path = "Menu/Window" /*, position = 333 */)`

    **`@TopComponent.OpenActionRegistration`**`(`

    `    displayName = "#CTL_MyAction",`

    `    preferredID = "MyTopComponent")`

    `public final class` **`MyTopComponent`** `extends TopComponent {`

    `public` **`MyTopComponent`**`() {`

    `        initComponents();`

    `        setName(NbBundle.getMessage(MyTopComponent.class, "CTL_MyTopComponent"));`

    `        setToolTipText(NbBundle.getMessage(MyTopComponent.class, "HINT_MyTopComponent"));`

    `    }`

    `    ...`

    `}`


    The top component is marked with basic information by the annotation `TopComponent.Description`.
    A unique identifier (`preferredID`), the path to an icon (`iconBase`), and the
    determination whether the top component will be saved or not (`persistenceType`)
    belong to this basic information. The possibilities are described in the next
    section, “Persistence”.


    You add the top component to a mode by the `TopComponent.Registration` annotation.
    The mode determined by the attribute `mode` must already exist. You can either
    choose a mode that is already defined by the NetBeans Platform or you can create
    one yourself. In the section “Creating a Mode” you will learn how to do this.
    With the `openAtStartup` attribute you can determine whether your top component
    will be automatically opened when starting the application. Finally, the optional
    attribute `position` is provided for determining the order of multiple top components
    within a mode.


    The NetBeans Platform does a lot of work in the background with the annotation
    `TopComponent.OpenActionRegistration`. This annotation causes the registration
    of an action to open the annotated top component in the layer file. In this respect,
    it is interesting that not only the registration occurs, but the action is also
    automatically provided. This means, no corresponding action class exists in your
    module anymore. The action class is created in the background by means of the
    transferred parameters with the factory method `TopComponent.openAction()`. You
    define the name of the action by the `displayName` attribute. Using # you can
    determine a key for a text constant out of a properties bundle (see [Chapter 6](#Chapter06.html#ch6)).
    With the `preferredID` attribute you can easily determine whether only one or
    more instances can be produced by your top component. For this purpose use the
    already defined identifier of your top component. That way, only a singleton instance
    is created. Omitting the attribute, a new instance of the top component is opened
    when executing the action.


    The two attributes `ActionID` and `ActionReference` are connected to the `TopComponent.OpenActionRegistration`
    annotation. As described in [Chapter 6](#Chapter06.html#ch6), with `ActionID`,
    a unique identifier is added to the open action with a category. With the `ActionReference`
    annotation you determine where and in which menu the action will be displayed
    (see [Chapter 9](#Chapter09.html#ch9)). While using the annotation as described
    is considerably easier than registering a top component, I will explain  (see
    [Listing 10-2](#Chapter10.html#list_10_2))—its use is not mandatory, however.
    You also have the possibility here of directly specifying the necessary information
    in the layer file. First, the top component is defined in the standard folder
    `Windows2/Components` in the layer file. The assignment to a mode occurs in the
    standard folder `Windows2/Modes`.


    ***Listing 10-2.** Definition and Assignment of a Top Component in the Layer File*


    `<folder name="`**`Windows2`**`">`

    `   <folder name="`**`Components`**`">`

    `      <file name="MyTopComponent.settings" url="MyTopComponentSettings.xml"/>`

    `   </folder>`

    `   <folder name="`**`Modes`**`">`

    `      <folder name="editor">`

    `         <file name="MyTopComponent.wstcref" url="MyTopComponentWstcref.xml"/>`

    `      </folder>`

    `   </folder>`

    `</folder>`


    A *Settings* file is needed for defining a top component in the folder `Windows2/Components`.
    The complete class name of the top component is named in this file. Thus, the
    window system is able to create an instance of the top component. (See [Listing
    10-3](#Chapter10.html#list_10_3).)


    ***Listing 10-3.** Settings File to Declaratively Add a Top Component*


    `<!DOCTYPE settings PUBLIC`

    ` "-//NetBeans//DTD Session settings 1.0//EN"`

    ` "http://www.netbeans.org/dtds/sessionsettings-1_0.dtd">`

    `<settings version="1.0">`

    `   <instance class="com.galileo.netbeans.module.MyTopComponent"/>`

    `</settings>`


    Mapping a top component to a mode is done using a *Top Component Reference* file,
    as shown in [Listing 10-4](#Chapter10.html#list_10_4). In this file a unique identifier
    of the top component is defined. Additionally, it is defined by the `opened` attribute
    of the `state` element, whether the window is opened starting the application.


    ***Listing 10-4.** Top Component Reference File Mapping a Top Component to a Mode*


    `<!DOCTYPE tc-ref PUBLIC`

    ` "-//NetBeans//DTD Top Component in Mode Properties 2.0//EN"`

    ` "http://www.netbeans.org/dtds/tc-ref2_0.dtd">`

    `<tc-ref version="2.0" >`

    `   <tc-id id="`**`MyTopComponent`**`"/>`

    `   <state opened="`**`true`**`"/>`

    `</tc-ref>`


    If you chose the declarative way instead of the annotations, you should finally
    overwrite the two methods `preferredID()` and `getPersistenceType()` of your top
    component class and thus deliver the corresponding values.'
  trans: '

    #### 创建顶层组件


    NetBeans IDE 提供了一个有用的向导来创建 `TopComponent`。该向导会创建完整的基本骨架。通过调用 *文件* ![Image](img/U001.jpg)
    *新建文件…*，然后选择类别 *模块开发* 和文件类型 *窗口* 来启动它。在接下来的页面 *基本设置* 中，你可以为你的顶层组件编辑一系列设置，如 图 10-3
    所示。


    ![Image](img/1003.jpg)


    ***图 10-3.** 创建顶层组件：基本设置*


    首先，定义 *窗口位置*，即你的顶层组件应该显示的模式。目前，你只能选择 NetBeans 平台提供的模块。但是，稍后你可以将其替换为自定义模式。此外，你可以在此向导页面上定义要创建的顶层组件的行为。我将在后面的“行为”部分解释此选项的含义。


    点击 *下一步* 进入向导的最后一页。在那里，你可以确定类名的前缀和顶层组件的图标，如 图 10-4 所示。


    ![Image](img/1004.jpg)


    ***图 10-4.** 创建顶层组件：名称、图标和位置*


    点击 *完成* 按钮结束向导并创建顶层组件。该向导已经为你完成了所有必要的工作。现在，你可以使用表单编辑器编辑顶层组件并为其配备所需的功能。你可以通过 *运行*
    ![Image](img/U001.jpg) *运行主项目* 来测试所有内容。


    现在让我们看一下向导创建的类。这个类现在被一系列注解标记，其含义在 清单 10-1 中解释。


    ***清单 10-1.** 带有注解的顶层组件的基本结构*


    `import org.openide.util.NbBundle;`

    `import org.openide.windows.TopComponent;`

    `import org.netbeans.api.settings.ConvertAsProperties;`

    `import org.openide.awt.ActionID;`

    `import org.openide.awt.ActionReference;`


    `@ConvertAsProperties(`

    `    dtd = "-//com.galileo.netbeans.module//My//EN",`

    `    autostore = false)`

    **`@TopComponent.Description`**`(`

    `    preferredID = "MyTopComponent",`

    `    iconBase = "com/galileo/netbeans/module/icon.png",`

    `    persistenceType = TopComponent.PERSISTENCE_ALWAYS)`

    **`@TopComponent.Registration`**`(`

    `    mode = "editor",`

    `    openAtStartup = true)`

    `@ActionID(`

    `    category = "Window",`

    `    id = "com.galileo.netbeans.module.MyTopComponent")`

    `@ActionReference(`

    `    path = "Menu/Window" /*, position = 333 */)`

    **`@TopComponent.OpenActionRegistration`**`(`

    `    displayName = "#CTL_MyAction",`

    `    preferredID = "MyTopComponent")`

    `public final class` **`MyTopComponent`** `extends TopComponent {`

    `public` **`MyTopComponent`**`() {`

    `        initComponents();`

    `        setName(NbBundle.getMessage(MyTopComponent.class, "CTL_MyTopComponent"));`

    `        setToolTipText(NbBundle.getMessage(MyTopComponent.class, "HINT_MyTopComponent"));`

    `    }`

    `    ...`

    `}`


    顶层组件通过注解 `TopComponent.Description` 标记了基本信息。一个唯一标识符（`preferredID`）、图标的路径（`iconBase`）以及确定顶层组件是否会被保存（`persistenceType`）都属于这些基本信息。这些可能性将在下一节“持久性”中描述。


    你通过 `TopComponent.Registration` 注解将顶层组件添加到一个模式中。由属性 `mode` 确定的模式必须已经存在。你可以选择 NetBeans
    平台已定义的模式，也可以自己创建一个。在“创建模式”一节中，你将学习如何做到这一点。通过 `openAtStartup` 属性，你可以确定你的顶层组件是否会在应用程序启动时自动打开。最后，提供了可选属性
    `position` 用于确定一个模式内多个顶层组件的顺序。


    NetBeans 平台在后台通过注解 `TopComponent.OpenActionRegistration` 做了大量工作。此注解会导致在层文件中注册一个用于打开被注解的顶层组件的操作。在这方面，有趣的是不仅发生了注册，而且操作也会自动提供。这意味着，你的模块中不再存在相应的操作类。操作类是通过工厂方法
    `TopComponent.openAction()` 使用传递的参数在后台创建的。你通过 `displayName` 属性定义操作的名称。使用 # 你可以为属性包中的文本常量确定一个键（参见第
    6 章）。通过 `preferredID` 属性，你可以轻松确定你的顶层组件是只能生成一个实例还是多个实例。为此，请使用已定义的顶层组件标识符。这样，只会创建一个单例实例。省略该属性，则在执行操作时会打开顶层组件的一个新实例。


    `ActionID` 和 `ActionReference` 这两个属性与 `TopComponent.OpenActionRegistration` 注解相关联。如第
    6 章所述，通过 `ActionID`，为打开操作添加了一个带有类别的唯一标识符。通过 `ActionReference` 注解，你可以确定操作将在哪里以及哪个菜单中显示（参见第
    9 章）。虽然像描述的那样使用注解比注册顶层组件要简单得多，但我将解释（参见清单 10-2）——然而，它的使用并非强制性的。你也可以选择直接在层文件中指定必要的信息。首先，在层文件的标准文件夹
    `Windows2/Components` 中定义顶层组件。分配到模式的操作发生在标准文件夹 `Windows2/Modes` 中。


    ***清单 10-2.** 在层文件中定义和分配顶层组件*


    `<folder name="`**`Windows2`**`">`

    `   <folder name="`**`Components`**`">`

    `      <file name="MyTopComponent.settings" url="MyTopComponentSettings.xml"/>`

    `   </folder>`

    `   <folder name="`**`Modes`**`">`

    `      <folder name="editor">`

    `         <file name="MyTopComponent.wstcref" url="MyTopComponentWstcref.xml"/>`

    `      </folder>`

    `   </folder>`

    `</folder>`


    在文件夹 `Windows2/Components` 中定义顶层组件需要一个 *Settings* 文件。该文件中命名了顶层组件的完整类名。这样，窗口系统就能够创建顶层组件的实例。（参见清单
    10-3。）


    ***清单 10-3.** 用于声明式添加顶层组件的设置文件*


    `<!DOCTYPE settings PUBLIC`

    ` "-//NetBeans//DTD Session settings 1.0//EN"`

    ` "http://www.netbeans.org/dtds/sessionsettings-1_0.dtd">`

    `<settings version="1.0">`

    `   <instance class="com.galileo.netbeans.module.MyTopComponent"/>`

    `</settings>`


    将顶层组件映射到模式是通过一个 *顶层组件引用* 文件完成的，如清单 10-4 所示。在此文件中定义了顶层组件的唯一标识符。此外，通过 `state` 元素的
    `opened` 属性，定义了窗口是否在应用程序启动时打开。


    ***清单 10-4.** 将顶层组件映射到模式的顶层组件引用文件*


    `<!DOCTYPE tc-ref PUBLIC`

    ` "-//NetBeans//DTD Top Component in Mode Properties 2.0//EN"`

    ` "http://www.netbeans.org/dtds/tc-ref2_0.dtd">`

    `<tc-ref version="2.0" >`

    `   <tc-id id="`**`MyTopComponent`**`"/>`

    `   <state opened="`**`true`**`"/>`

    `</tc-ref>`


    如果你选择了声明式方式而不是注解，那么你最终应该覆盖顶层组件类的 `preferredID()` 和 `getPersistenceType()` 这两个方法，从而提供相应的值。

