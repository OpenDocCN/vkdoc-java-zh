    \ it is possible for both systems to interact as well as convert NetBeans modules\
    \ into OSGi bundles.\n\n### OSGi Bundle Format\n\nIn [Chapter 3](#Chapter03.html#ch3)\
    \ you learned about the basic structure of a NetBeans module and the special importance\
    \ of the manifest file in that structure. In the manifest file, you define features\
    \ and interfaces of a module. An OSGi bundle is also depicted by a manifest file;\
    \ most attributes correspond to an attribute of the NetBeans module system. The\
    \ basic structure of an OSGi bundle is shown in [Figure 4-1](#Chapter04.html#fig_4_1).\n\
    \n![Image](images/0401.jpg)\n\n***Figure 4-1.** Components of an OSGi bundle*\n\
    \n[Table 4-1](#Chapter04.html#tab_4_1) lists the most important NetBeans module\
    \ attributes together with the corresponding OSGi bundle attributes.\n\n![Image](images/t0401.jpg)\n\
    \nEach of the following Listings ([Listing 4-1](#Chapter04.html#list_4_1) and\
    \ [Listing 4-2](#Chapter04.html#list_4_2)) shows the manifest file of a simple\
    \ NetBeans module and of an equally structured OSGi bundle. As you can see, the\
    \ differences between the two files are negligible.\n\n***Listing 4-1.** Manifest\
