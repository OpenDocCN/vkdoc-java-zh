    现在你可以启动应用程序，打开一个或多个播放列表，并通过工具栏添加 MP3 文件（参见图 44-7）。


    ![Image](img/4407.jpg)


    ***图 44-7.** 使用播放列表工具栏，可以将文件添加到播放列表中。*


    如果你尝试将文件从媒体库窗口拖放到播放列表，你会很快发现这是不可能的。目前还无法实现，因为你的 `Mp3DataNode` 类（包含你希望在窗口之间传输的对象）和
    `PlaylistView` 类尚未为拖放操作做好准备。我们将在下一节中介绍这一简单直观使用方面的内容。

