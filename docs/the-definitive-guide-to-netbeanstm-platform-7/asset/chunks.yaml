    #### 测试覆盖率


    Cobertura 还会为基于 Maven 的 NetBeans 平台项目生成一份关于测试覆盖率的报告。在 POM 文件中添加以下条目，即可使用 *Maven
    Cobertura 插件*，如清单 42-21 所示。


    ***清单 42-21.** 将 Cobertura 插件添加到 POM 文件*


    `<reporting>`

    `   <plugins>`

    `      <plugin>`

    `         <groupId>org.codehaus.mojo</groupId>`

    `         <artifactId>cobertura-maven-plugin</artifactId>`

    `         <version>2.4</version>`

    `      </plugin>`

    `   </plugins>`

    `</reporting>`


    你可以通过以下命令从命令行（或其他 IDE）启动报告生成：


    `mvn cobertura:cobertura`


    然后，报告会以 HTML 格式存储在 *target\site\cobertura* 目录中。此外，NetBeans IDE 还提供了一个有用的插件。你可以通过插件管理器安装
    *Maven 测试覆盖率* 插件，这样，就可以通过模块的上下文菜单，选择 *代码覆盖率 ![Image](img/U001.jpg) 显示报告* 来显示报告。（参见图
    42-8）。


    ![Image](img/4208.jpg)


    ***图 42-8.** NetBeans IDE 中集成的测试覆盖率报告*


    你可以运行测试，并通过 *运行所有测试* 来执行以下报告生成。你可以直接查看相应类的哪些行通过了测试，哪些没有，并在概览中打开单个文件（如图 42-9 所示）。


    ![Image](img/4209.jpg)


    ***图 42-9.** 测试覆盖率分析的详细结果*


    ### 总结


    进行软件测试是软件开发模型中不可或缺的一部分。在本章中，你学习了更多关于如何轻松高效地测试 NetBeans 平台应用程序的知识。在本章的第一部分，我们在
    JUnit 的支持下进行了模块测试。在第二部分，你学习了如何测试 NetBeans 平台应用程序的 GUI。这是在 Jelly Tools 平台的支持下完成的。


    ## 第 43 章


    ## 使用 NetBeans IDE 进行调试


    本章介绍 NetBeans 调试环境的功能。在此环境中，你可以使用大量有用的信息窗口和其他实用功能来调试你的 NetBeans 平台应用程序。


    ### 调试窗口


    NetBeans 调试器使用一系列有用的窗口，使调试尽可能高效和透明。在以下部分中，你将详细了解这些窗口。*调试* 窗口本身是不同功能的组合。每个功能都有专门的窗口。因此，你可以概览所有线程，并且在到达断点时，也可以概览完整的调用堆栈。一个符号（在右侧）会显示哪些线程当前已暂停。你可以通过此符号停止或恢复某些线程。你也可以通过上下文菜单同时影响所有线程。通过双击调用堆栈中的条目，你可以直接跳转到源文件中相应方法的位置。（参见图
    43-1）。


    ![Image](img/4301.jpg)


    ***图 43-1.** 显示所有当前线程和当前调用层次结构的调试窗口*


    ### 断点


    所谓的*断点*是调试应用程序的基础。通过这些断点，你可以在源代码中定义应用程序执行应停止的特定位置。IDE 的支持提供了某些可能性。例如，你可以仔细查看变量的当前值，或者在应用程序停止的位置更详细地查看方法的返回值。通过这种方式，你可以获取有关软件异常行为的信息。


    根据在源代码中的位置或事件，可以区分不同类型的断点。NetBeans IDE 中提供的断点类型列于表 43-1 中。


    ![Image](img/t4301.jpg)


    应用断点可以通过单击行号（源代码编辑器的左侧边距）、通过菜单 *调试 ![Image](img/U001.jpg) 新建断点* 或通过断点窗口工具栏中的按钮
    ![Image](img/U4301.jpg) 来完成（参见图 43-2）。


    ![Image](img/4302.jpg)


    ***图 43-2.** 断点窗口中所有断点的概览*


    所有设置的断点都会显示在*断点*窗口中。为了清晰起见，你还可以将它们分组排列。你可以将断点分类为用户特定的（*自定义组*），或者使用按钮 ![Image](img/U4302.jpg)（断点窗口的左侧边距）按默认方式分组。可用的标准组如下：


    *   编程语言：*语言*

    *   断点类型：*类型*

    *   项目：*项目*

    *   文件：*文件*

    *   调试会话：*调试会话*

    *   子组：*嵌套*


    调用断点的上下文菜单以分配用户特定的组，或将断点分配给现有组。使用*移入组...*，你可以直接将断点分配给一个组，或者使用*新建*创建一个新组。如图 43-2
    所示，你可以专门激活或停用单独的断点或断点组。额外显示的绿色箭头会显示你的应用程序当前暂停在哪个断点处。断点也可以配置为仅在特定条件下暂停应用程序。因此，对于所有类型的断点，你都可以确定应用程序仅在运行一定次数后才暂停。例如，你可以让应用程序在某个变量上的断点被第十次命中时暂停。


    ![Image](img/4303.jpg)


    ***图 43-3.** 单独配置断点*


    此外，你可以为*类*和*异常*断点类型定义应排除哪些类。对于其余类型，你可以通过布尔表达式定义断点生效的任何条件。默认情况下，当到达断点时，当前正在执行的线程会暂停。但是，你也可以配置断点，使其暂停所有线程或不暂停任何线程。在后一种情况下，应用程序会直接继续执行。


    ### 变量


    NetBeans IDE 提供了不同的窗口和工具，以便在到达断点时检查变量。在变量窗口（*窗口 ![Image](img/U001.jpg) 调试 ![Image](img/U001.jpg)
    变量*）中，会显示当前上下文中的所有变量（参见图 43-4）。这样，你可以观察实例变量、局部变量以及最终传递的参数的值。你也可以通过将鼠标指向变量，直接在编辑器中查看各个变量的值。


    ![Image](img/4304.jpg)


    ***图 43-4.** 变量概览*


    通过所谓的*监视*，你还可以观察当前断点上下文之外的变量。你可以通过变量窗口左侧的工具栏添加新的监视条目。此外，你可以直接在源代码编辑器中选择变量，然后通过拖放添加它们，以便具体而清晰地跟踪某些变量的值。作为在变量窗口中表示监视的替代方案，你可以使用单独的监视窗口，该窗口位于*窗口
    ![Image](img/U001.jpg) 调试 ![Image](img/U001.jpg) 监视* 下。

    '
- fmt: '### Remote Debugging


    The easiest way is to start your application directly from the NetBeans IDE in
    the debug mode. However, the NetBeans IDE also supports debugging applications
    that had been started outside the NetBeans IDE. For this purpose, it is necessary
    that you start the application in the debug mode. In connection with this, some
    parameters must be specified so the NetBeans IDE can successfully connect to the
    application via the *Java Debug Wire Protocol* (JDWP). Remote debugging parameters
    are listed in [Table 43-2](#Chapter43.html#tab_43_2).


    ![Image](images/t4302.jpg)


    ![Image](images/t4302a.jpg)


    Start your application, for example, by the following parameters, to debug them
    by means of the NetBeans IDE:


    `-Xdebug -Xrunjdwp: transport=dt_socket,server=y,address=65535,suspend=n`


    To debug an externally started application call *Debug ![Image](images/U001.jpg)
    Attach Debugger*. Select the *Java Debugger* *(JPDA)* and use *SocketAttach* as
    connector. Additionally, you indicate the host''s name on which the application
    runs, the port number on which the application accepts requests, as well as a
    timeout.


    Press *OK* after doing the settings as shown in [Figure 43-5](#Chapter43.html#fig_43_5)
    to directly establish a connection.


    ![Image](images/4305.jpg)


    ***Figure 43-5.** Connecting remote debugger with application*


    ### Controlling Debugging


    The NetBeans IDE provides different actions with which you can quickly detect
    the concerning points of code for debugging most efficiently. The following list
    provides a good overview of those actions:


    *   ![Image](images/U4303.jpg) *Debug Main Project* (`Ctrl + F5`): Starts the
    main project (in the debug mode) that is currently opened in the IDE. Only when
    the debugging is started are the following actions available.

    *   ![Image](images/U4304.jpg) *Step Over* (`F8`): With it, the complete current
    code line is executed without descending in eventually existing calls.

    *   ![Image](images/U4305.jpg) *Step Over Expression* (`Shift + F8`): With this
    command you can evaluate expressions, which consist of multiple method calls,
    in detail. In the Variables window, the passed values and the return value are
    displayed as history for each single method call (see [Figure 43-4](#Chapter43.html#fig_43_4)).
    If an expression does not contain a further method call, the action behaves like
    *Step Over*.

    *   ![Image](images/U4306.jpg) *Step Into* (`F7`): With this command a code line
    is executed. If this code line contains method calls for which the source code
    exists, you can descend into the separate calls by this action. If multiple calls
    exist, you can directly descend into the corresponding method call by one click.

    *   ![Image](images/U4307.jpg) *Step Into Next Method* (`Shift + F7`): Similar
    to the *Step* Into action. However, with this one descends directly into the next
    method of the current line.

    *   ![Image](images/U4308.jpg) *Step Out* (`Ctrl + F7`): Executes a line. If it
    is part of a method, all remaining lines are executed and the debugger jumps to
    the called position.

    *   ![Image](images/U4309.jpg) *Run to Cursor* (`F4`): Executes all lines up to
    that line in which the cursor currently is.

    *   ![Image](images/U4310.jpg) *Continue* (`F5`): With this action you can resume
    a paused thread by a breakpoint. The application is executed up to the eventually
    existing next breakpoint.

    *   ![Image](images/U4311.jpg) *Pause:* With this action you can pause all threads
    at once.

    *   ![Image](images/U4312.jpg) *Finish Debugger Session* (`Shift + F5`): This
    action finishes the current debugger session and thus the application, too, if
    it had been started out of the IDE.


    ### Call Stack


    If your application has been stopped at a breakpoint you can look at the complete
    call hierarchy up to the current line via the *Call Stack* window (*Window ![Image](images/U001.jpg)
    Debugging ![Image](images/U001.jpg) Call Stack*), as shown in [Figure 43-6](#Chapter43.html#fig_43_6).
    Double-clicking an entry, it jumps directly to the called position in the editor.
    That way you can check the variables concerning the called methods.


    ![Image](images/4306.jpg)


    ***Figure 43-6.** Call Stack window for tracking the call hierarchy*


    To jump into the methods of Java and the NetBeans Platform, the source code must
    be present. You can see which source directories are available to the debugger
    in the *Sources* window (*Window ![Image](images/U001.jpg) Debugging ![Image](images/U001.jpg)
    Sources*), as shown in [Figure 43-7](#Chapter43.html#fig_43_7). This is where
    you can also add further directories via the context menu by *Add Source Root*.
    Get the source code of the NetBeans Platform as a separate ZIP file on the download
    page at [`http://netbeans.org`](http://www.netbeans.org).


    ![Image](images/4307.jpg)


    ***Figure 43-7.** Sources window with all source directories that are available
    when debugging*


    ### Heap Walking


    With the heap walking functionality the NetBeans IDE provides a substantial tool
    for tracking memory leaks. It is possible to display an overview of all current
    instances of your application in the Loaded Classes window, as shown in [Figure
    43-8](#Chapter43.html#fig_43_8). To find the desired instance out of the many
    instances, you can filter for names or subclasses. If needed, you can also filter
    instances using a regular expression.


    ![Image](images/4308.jpg)


    ***Figure 43-8.** Loaded Classes window for displaying the amount of all current
    instances grouped in classes*


    You can take an individual look at the instances of a certain class by the context
    menu of an entry with *Show in Instances View* (see [Figure 43-9](#Chapter43.html#fig_43_9)).
    Doing so, you can look at the respective values of a chosen instance. You can
    select an instance on the left. Corresponding references are displayed, as well.


    ![Image](images/4309.jpg)


    ***Figure 43-9.** Instances window for displaying all current instances of a certain
    class*


    ### Summary


    Errors and potential problems within an application can be quickly tracked with
    an efficiently designed debugging environment. You have such an environment at
    hand: the NetBeans IDE. In this chapter you got to know the NetBeans Debugging
    features and how you can use them for NetBeans Platform application debugging.


    ## PART 8


    ## Play & More: Developing an MP3-Manager—An Example of a NetBeans Platform Application


    ## C H A P T E R  44


    ## Sample Project: MP3 Manager


    The purpose of this chapter is to demonstrate the design and the implementation
    of a completely executable application, playing MP3 files on the NetBeans Platform.
    Of course, this application will be as flexible and modular as possible. Therefore,
    it will reuse many of the previously implemented and discussed advantages and
    features of the NetBeans Platform.


    This chapter is useful even if you have not read all the previous chapters, as
    well as if you are trying to dive directly into the NetBeans Platform world. Where
    more detailed knowledge is required, I will refer you to chapters that deal with
    the subject in greater detail. The following pages will cover only the most important
    parts of the implementation. Like all the other examples in this book, this example
    can be downloaded as a complete NetBeans project from the Source Code/Download
    area for this book on the Apress web site ([`www.apress.com`](http://www.apress.com)).'
