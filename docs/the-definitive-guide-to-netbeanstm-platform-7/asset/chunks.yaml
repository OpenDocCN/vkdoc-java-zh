- fmt: "# Service Provider Configuration File\n\nService provider can also be registered\
    \ by a *Service Provider Configuration* file. Such a file is actually created\
    \ using the `ServiceProvider` annotation in the background.\n\nThis approach is\
    \ part of the Java JAR File Specification. A file is named after its service and\
    \ lists in its content all service providers. The file must be placed in the `META-INF/services`\
    \ directory, which is part of the `src/` directory of a module, or in other words,\
    \ it must be part of the class path of a module.\n\n`src/META-INF/services/com.galileo.netbeans.module.Mp3Finder`\n\
    `com.galileo.netbeans.module.Mp3DatabaseFinder`\n`com.galileo.netbeans.module.Mp3FilesystemFinder`\n\
    \nIn this example, two service providers are registered for the service (that\
    \ is, the interface or abstract class, `Mp3Finder`). The global Lookup, which\
    \ is to say, the standard Lookup (`Lookup.getDefault()`) discovers the services\
    \ in the `META-INF/services` directory and instantiates the providers. A successful\
    \ service instantiation requires that each service provider have a default constructor\
    \ so that creation from Lookup is possible.\n\nAs already described, you can make\
    \ your service implementation public under a certain name; thus, it can be accessed\
    \ more quickly. To do this, create the configuration file in the `META-INF/namedservices`\
    \ directory. A subfolder of this directory indicates the name, for example `META-INF/namedservices/Mp3FinderServices`.\
    \ You get the services which are registered there by a Lookup created with `Lookups.forPath(\"\
    Mp3FinderServices\")`.\n\nBased on the original specification of the service provider\
    \ configuration file, the NetBeans Platform provides two extensions, allowing\
    \ the removal of existing service providers and changing the order of the registered\
    \ providers. To make these additions comply with the original Java specification,\
    \ the add-ons are prefixed with the comment sign `#`. So, these lines are ignored\
    \ by the JDK implementation.\n\n## Removal of a Service Provider\n\nIt is possible\
    \ to remove a service provider registered by another module. This feature can\
    \ be used to substitute the standard implementation of a service of the NetBeans\
    \ Platform with your own implementation.\n\nA service provider is removed by adding\
    \ the following entry in your service provider configuration file. At the same\
    \ time, you can provide your own implementation.\n\n```\n# remove the other implementation\
    \ (by prefixing the line with #-)\n#-org.netbeans.core.ServiceImpl\n# provide\
    \ my own\ncom.galileo.netbeans.module.MyServiceImpl\n```\n\n## Order of Service\
    \ Providers\n\nThe order in which service providers are returned from Lookup is\
    \ controlled using a `position` attribute for each provider entry. For example,\
    \ this is necessary to control the order of additional entries in the status bar\
    \ (see [Chapter 11](#Chapter11.html#ch11)) or to ensure that your own implementation\
    \ is called before the NetBeans Platform implementation. Also, it is allowed to\
    \ specify a negative value for the position attribute. The NetBeans Platform orders\
    \ instances by ascending positions, so that instances with smaller numbers are\
    \ returned before instances with larger numbers. For that purpose, the following\
    \ entry is added to the service provider configuration file:\n\n```\ncom.galileo.netbeans.module.MyServiceImpl\n\
    #position=20\ncom.galileo.netbeans.module.MyImportantServiceImpl\n#position=10\n\
    ```\n\nIt is recommended that position values are assigned in larger intervals,\
    \ as shown in the example. This simplifies adding further implementations later\
    \ on.\n\n## Services Folder\n\nAnother way to provide a service implementation\
    \ is registration using the `Services` folder in the module layer file, as shown\
    \ in [Listing 5-6](#Chapter05.html#list_5_6).\n\n**Listing 5-6.** Registration\
    \ of Service Providers in a Layer File\n\n```\n<folder name=\"Services\">\n  \
    \ <folder name=\"Mp3Services\">\n      <file name=\"com-galileo-netbeans-module-Mp3DatabaseFinder.instance\"\
    >\n         <attr name=\"instanceOf\" stringvalue=\"com.galileo.netbeans.module.Mp3Finder\"\
    />\n      </file>\n   </folder>\n</folder>\n```\n\nIf a service is requested using\
    \ the default Lookup, implementations are discovered by searching the `Services`\
    \ folder and its subdirectories for instances, which can be assigned to the requested\
    \ service interface. So, services can be grouped using arbitrary folders, as shown\
    \ with the folder `Mp3Services` in our example.\n\nIn contrast to the registration\
    \ using the service provider configuration file, the service provider need not\
    \ provide a default constructor if registered in the layer file. With the layer\
    \ file, specifying a static method in the `instanceCreate` attribute is possible,\
    \ creating an instance of the service provider. Let's assume the already created\
    \ provider `Mp3DatabaseFinder` has a static method `getDefault()` that returns\
    \ the instance. The declaration can be changed by adding the following attribute:\n\
    \n```\n<attr name=\"instanceCreate\"\n   methodvalue=\"com.galileo.netbeans.module.Mp3DatabaseFinder.getDefault\"\
    />\n```\n\nWith this attribute declaration, the service provider instance is not\
    \ created using the default constructor, but rather by calling the static method\
    \ `getDefault()` (more detailed information regarding this attribute and the corresponding\
    \ `.instance` files are described in [Chapter 3](#Chapter03.html#ch3)).\n\nAlso,\
    \ using the registration via the `Services` folder allows removing existing service\
    \ providers and controlling the order of the providers. Both mechanisms are achieved\
    \ using default features of the layer file. A service provider can be removed\
    \ by adding the suffix `_hidden` to its name, as it is done for menu entries (see\
    \ [Chapter 9](#Chapter09.html#ch9)).\n\n```\n<file name=\"com-galileo-netbeans-module-ServImp.instance_hidden\"\
    >\n```\n\nThe order in which service providers are returned is controlled using\
    \ the `position` attribute, which is the same strategy as used for other entries\
    \ in the layer file (see [Chapter 3](#Chapter03.html#ch3)).\n\n```\n<folder name=\"\
    Services\">\n   <file name=\"com-galileo-netbeans-module-ServImp.instance\">\n\
    \      <attr name=\"position\" intvalue=\"10\"/>\n   </file>\n   <file name=\"\
    com-galileo-netbeans-module-ServImp2.instance\">\n      <attr name=\"position\"\
    \ intvalue=\"20\"/>\n   </file>\n</folder>\n```\n\nIn this example, the `position`\
    \ attributes ensure that the service provider `ServImp` will be returned before\
    \ `ServImp2`."
  raw: '#### Service Provider Configuration File


    Service provider can also be registered by a *Service Provider Configuration*
    file. Such a file is actually created using the `ServiceProvider` annotation in
    the background.


    This approach is part of the Java JAR File Specification. A file is named after
    its service and lists in its content all service providers. The file must be placed
    in the *META-INF/services* directory, which is part of the *src/* directory of
    a module, or in other words, it must be part of the class path of a module.


    `src/META-INF/services/com.galileo.netbeans.module.Mp3Finder`

    **`com.galileo.netbeans.module.Mp3DatabaseFinder`**

    **`com.galileo.netbeans.module.Mp3FilesystemFinder`**


    In this example, two service providers are registered for the service (that is,
    the interface or abstract class, `Mp3Finder`). The global Lookup, which is to
    say, the standard Lookup (`Lookup.getDefault()`) discovers the services in the
    *`META INF/services`* directory and instantiates the providers. A successful service
    instantiation requires that each service provider have a default constructor so
    that creation from Lookup is possible.


    As already described, you can make your service implementation public under a
    certain name; thus, it can be accessed more quickly. To do this, create the configuration
    file in the *META-INF/namedservices* directory. A subfolder of this directory
    indicates the name, for example *META-INF/namedservices/Mp3FinderServices*. You
    get the services which are registered there by a Lookup created with `Lookups.forPath("Mp3FinderServices")`.


    Based on the original specification of the service provider configuration file,
    the NetBeans Platform provides two extensions, allowing the removal of existing
    service providers and changing the order of the registered providers. To make
    these additions comply with the original Java specification, the add-ons are prefixed
    with the comment sign #. So, these lines are ignored by the JDK implementation.


    ##### Removal of a Service Provider


    It is possible to remove a service provider registered by another module. This
    feature can be used to substitute the standard implementation of a service of
    the NetBeans Platform with your own implementation.


    A service provider is removed by adding the following entry in your service provider
    configuration file. At the same time, you can provide your own implementation.


    `# remove the other implementation (by prefixing the line with #-)`

    `#-org.netbeans.core.ServiceImpl`

    `# provide my own`

    `com.galileo.netbeans.module.MyServiceImpl`


    ##### Order of Service Providers


    The order in which service providers are returned from Lookup is controlled using
    a `position` attribute for each provider entry. For example, this is necessary
    to control the order of additional entries in the status bar (see [Chapter 11](#Chapter11.html#ch11))
    or to ensure that your own implementation is called before the NetBeans Platform
    implementation. Also, it is allowed to specify a negative value for the position
    attribute. The NetBeans Platform orders instances by ascending positions, so that
    instances with smaller numbers are returned before instances with larger numbers.
    For that purpose, the following entry is added to the service provider configuration
    file:


    `com.galileo.netbeans.module.MyServiceImpl`

    `#position=20`

    `com.galileo.netbeans.module.MyImportantServiceImpl`

    `#position=10`


    It is recommended that position values are assigned in larger intervals, as shown
    in the example. This simplifies adding further implementations later on.


    ##### Services Folder


    Another way to provide a service implementation is registration using the `Services`
    folder in the module layer file, as shown in [Listing 5-6](#Chapter05.html#list_5_6).


    ***Listing 5-6.** Registration of Service Providers in a Layer File*


    `<folder name="`**`Services`**`">`

    `   <folder name="Mp3Services">`

    `      <file name="com-galileo-netbeans-module-Mp3DatabaseFinder.instance">`

    `         <attr name="`**`instanceOf`**`" stringvalue="com.galileo.netbeans.module.Mp3Finder"/>`

    `      </file>`

    `   </folder>`

    `</folder>`


    If a service is requested using the default Lookup, implementations are discovered
    by searching the `Services` folder and its subdirectories for instances, which
    can be assigned to the requested service interface. So, services can be grouped
    using arbitrary folders, as shown with the folder `Mp3Services` in our example.


    In contrast to the registration using the service provider configuration file,
    the service provider need not provide a default constructor if registered in the
    layer file. With the layer file, specifying a static method in the `instanceCreate`
    attribute is possible, creating an instance of the service provider. Let''s assume
    the already created provider `Mp3DatabaseFinder` has a static method `getDefault()`
    that returns the instance. The declaration can be changed by adding the following
    attribute:


    `<attr name="`**`instanceCreate`**`"`

    `   methodvalue="com.galileo.netbeans.module.Mp3DatabaseFinder.`**`getDefault`**`"/>`


    With this attribute declaration, the service provider instance is not created
    using the default constructor, but rather by calling the static method `getDefault()`
    (more detailed information regarding this attribute and the corresponding *.instance*
    files are described in [Chapter 3](#Chapter03.html#ch3)).


    Also, using the registration via the `Services` folder allows removing existing
    service providers and controlling the order of the providers. Both mechanisms
    are achieved using default features of the layer file. A service provider can
    be removed by adding the suffix `_hidden` to its name, as it is done for menu
    entries (see [Chapter 9](#Chapter09.html#ch9)).


    `<file name="com-galileo-netbeans-module-ServImp.instance`**`_hidden`**`">`


    The order in which service providers are returned is controlled using the `position`
    attribute, which is the same strategy as used for other entries in the layer file
    (see [Chapter 3](#Chapter03.html#ch3)).


    `<folder name="Services">`

    `   <file name="com-galileo-netbeans-module-ServImp.instance">`

    `      <attr name="position" intvalue="10"/>`

    `   </file>`

    `   <file name="com-galileo-netbeans-module-ServImp2.instance">`

    `      <attr name="position" intvalue="20"/>`

    `   </file>`

    `</folder>`


    In this example, the `position` attributes ensure that the service provider `ServImp`
    will be returned before `ServImp2`.'
  trans: '

    #### 服务提供者配置文件


    服务提供者也可以通过*服务提供者配置文件*进行注册。此类文件实际上是在后台使用 `ServiceProvider` 注解创建的。


    这种方法属于 Java JAR 文件规范的一部分。文件以其服务命名，并在其内容中列出所有服务提供者。该文件必须放置在 *META-INF/services*
    目录中，该目录是模块 *src/* 目录的一部分，或者换句话说，它必须是模块类路径的一部分。


    `src/META-INF/services/com.galileo.netbeans.module.Mp3Finder`

    **`com.galileo.netbeans.module.Mp3DatabaseFinder`**

    **`com.galileo.netbeans.module.Mp3FilesystemFinder`**


    在此示例中，为该服务（即接口或抽象类 `Mp3Finder`）注册了两个服务提供者。全局查找（即标准查找 `Lookup.getDefault()`）会发现在
    *`META INF/services`* 目录中的服务，并实例化这些提供者。成功的服务实例化要求每个服务提供者都有一个默认构造函数，以便能够通过 Lookup
    创建。


    如前所述，你可以让你的服务实现以特定名称公开；这样，它可以被更快地访问。为此，请在 *META-INF/namedservices* 目录中创建配置文件。该目录的一个子文件夹表示名称，例如
    *META-INF/namedservices/Mp3FinderServices*。你可以通过使用 `Lookups.forPath("Mp3FinderServices")`
    创建的 Lookup 来获取在那里注册的服务。


    基于服务提供者配置文件的原始规范，NetBeans 平台提供了两个扩展，允许移除现有的服务提供者以及更改已注册提供者的顺序。为了使这些补充符合原始的 Java
    规范，这些附加项以注释符号 # 作为前缀。因此，JDK 实现会忽略这些行。


    ##### 移除服务提供者


    可以移除由另一个模块注册的服务提供者。此功能可用于用你自己的实现替换 NetBeans 平台服务的标准实现。


    通过在你的服务提供者配置文件中添加以下条目来移除服务提供者。同时，你可以提供你自己的实现。


    `# 移除其他实现（通过在行前添加 #- 前缀）`

    `#-org.netbeans.core.ServiceImpl`

    `# 提供我自己的实现`

    `com.galileo.netbeans.module.MyServiceImpl`


    ##### 服务提供者的顺序


    Lookup 返回服务提供者的顺序是通过为每个提供者条目设置一个 `position` 属性来控制的。例如，这对于控制状态栏中附加条目的顺序（参见第 11
    章）或确保你自己的实现在 NetBeans 平台实现之前被调用是必要的。此外，允许为 position 属性指定负值。NetBeans 平台按 position
    升序对实例进行排序，因此编号较小的实例会在编号较大的实例之前返回。为此，需要在服务提供者配置文件中添加以下条目：


    `com.galileo.netbeans.module.MyServiceImpl`

    `#position=20`

    `com.galileo.netbeans.module.MyImportantServiceImpl`

    `#position=10`


    建议以较大的间隔分配 position 值，如示例所示。这简化了后续添加更多实现的操作。


    ##### 服务文件夹


    提供服务实现的另一种方式是使用模块层文件中的 `Services` 文件夹进行注册，如清单 5-6 所示。


    ***清单 5-6.** 在层文件中注册服务提供者*


    `<folder name="`**`Services`**`">`

    `   <folder name="Mp3Services">`

    `      <file name="com-galileo-netbeans-module-Mp3DatabaseFinder.instance">`

    `         <attr name="`**`instanceOf`**`" stringvalue="com.galileo.netbeans.module.Mp3Finder"/>`

    `      </file>`

    `   </folder>`

    `</folder>`


    如果使用默认 Lookup 请求服务，则通过搜索 `Services` 文件夹及其子目录中的实例来发现实现，这些实例可以分配给所请求的服务接口。因此，可以使用任意文件夹对服务进行分组，如我们示例中的
    `Mp3Services` 文件夹所示。


    与使用服务提供者配置文件注册相比，如果在层文件中注册，服务提供者无需提供默认构造函数。使用层文件，可以在 `instanceCreate` 属性中指定一个静态方法，用于创建服务提供者的实例。假设已经创建的提供者
    `Mp3DatabaseFinder` 有一个返回实例的静态方法 `getDefault()`。可以通过添加以下属性来更改声明：


    `<attr name="`**`instanceCreate`**`"`

    `   methodvalue="com.galileo.netbeans.module.Mp3DatabaseFinder.`**`getDefault`**`"/>`


    通过此属性声明，服务提供者实例不是使用默认构造函数创建的，而是通过调用静态方法 `getDefault()` 创建的（有关此属性和相应的 *.instance*
    文件的更详细信息，请参见第 3 章）。


    此外，通过 `Services` 文件夹进行注册也允许移除现有的服务提供者并控制提供者的顺序。这两种机制都是通过使用层文件的默认功能实现的。可以通过在其名称后添加后缀
    `_hidden` 来移除服务提供者，就像对菜单条目所做的那样（参见第 9 章）。


    `<file name="com-galileo-netbeans-module-ServImp.instance`**`_hidden`**`">`


    返回服务提供者的顺序是通过 `position` 属性控制的，这与层文件中其他条目使用的策略相同（参见第 3 章）。


    `<folder name="Services">`

    `   <file name="com-galileo-netbeans-module-ServImp.instance">`

    `      <attr name="position" intvalue="10"/>`

    `   </file>`

    `   <file name="com-galileo-netbeans-module-ServImp2.instance">`

    `      <attr name="position" intvalue="20"/>`

    `   </file>`

    `</folder>`


    在此示例中，`position` 属性确保服务提供者 `ServImp` 会在 `ServImp2` 之前返回。

