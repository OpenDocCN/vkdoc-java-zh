    Next the repository is defined. The NetBeans Platform or the NetBeans IDE modules
    can be loaded from this repository, so it is provided globally to the project.
    The dependencies defined in this file under `dependencies` are provided to all
    modules (which inherit from the parent POM file). Consequently, you do not have
