- fmt: "# Login Dialog\n\nIn [Chapter 13](#Chapter13.html#ch13), which was about creating\
    \ application-specific dialogs, you created a login dialog. The focus in that\
    \ case was on the UI component, not on the login process. You directly implemented\
    \ the handler's logic within an installer, which was used to show the start of\
    \ the dialog, even before the application is started. Now that the authentication\
    \ process and the subsequent adaptation will be added, you want to externalize\
    \ the logic in a separate `LoginHandler` class. (See [Listing 33-1](#Chapter33.html#list_33_1).)\n\
    \n**Listing 33-1.** First Part of the Login Handler for Managing the Login Dialog\n\
    \n```\nimport org.openide.DialogDescriptor;\nimport org.openide.DialogDisplayer;\n\
    import org.openide.LifecycleManager;\n…\npublic class LoginHandler implements\
    \ ActionListener {\n   private static final LoginHandler instance = new LoginHandler();\n\
    \   private LoginPanel panel = new LoginPanel();\n   private DialogDescriptor\
    \ dialog = null;\n\n   private LoginHandler() {\n   }\n\npublic static LoginHandler\
    \ getDefault() {\n      return instance;\n   }\n\npublic void showLoginDialog()\
    \ {\n      panel.reset();\n      dialog = new DialogDescriptor(panel, \"Login\"\
    , true, this);\n      dialog.setClosingOptions(new Object[]{});\n      dialog.addPropertyChangeListener(new\
    \ PropertyChangeListener() {\n         @Override\n         public void propertyChange(PropertyChangeEvent\
    \ evt) {\n            if(evt.getPropertyName().equals(DialogDescriptor.PROP_VALUE)\n\
    \               && evt.getNewValue().equals(DialogDescriptor.CLOSED_OPTION)) {\n\
    \               LifecycleManager.getDefault().exit();\n            }\n       \
    \  }\n      });\n\n      DialogDisplayer.getDefault().notifyLater(dialog);\n \
    \  }\n\n   @Override\npublic void actionPerformed(ActionEvent evt) {\n      if(evt.getSource()\
    \ == DialogDescriptor.CANCEL_OPTION) {\n         LifecycleManager.getDefault().exit();\n\
    \      } else {\nlogin();\n      }\n   }\n\n   private void login() { … }\n}\n\
    ```\n\nIt makes sense to implement the class which should create and display the\
    \ dialog as a singleton class. First, the method `showLoginDialog()` creates a\
    \ `DialogDescriptor` instance which both the UI panel (with the text field) and\
    \ a reference to the `LoginHandler` instance are transferred to. You implement\
    \ the `ActionListener` interface with its method `actionPerformed()` by using\
    \ the `LoginHandler` class. The method becomes activated as soon as a button is\
    \ pressed. We cover two cases in this context: if the user presses *Cancel* or\
    \ the *Esc* key, or closes the dialog, the application finishes. If the user presses\
    \ *OK*, the login process starts with the input data. Furthermore, you have to\
    \ install a `PropertyChangeListener` to be able to react in case the integrated\
    \ close button in the upper-right corner is pressed.\n\nYou are now able to use\
    \ this `LoginHandler` class within an installer in the `restored()` method to\
    \ display the dialog (see [Listing 33-2](#Chapter33.html#list_33_2)). You may\
    \ also want to register an action in the menu with which a change of the user\
    \ is realized, as shown in [Listing 33-3](#Chapter33.html#list_33_3).\n\n**Listing\
    \ 33-2.** Executing the Login Handler at Application Start\n\n```\nimport org.openide.modules.ModuleInstall;\n\
    public class Installer extends ModuleInstall {\n   @Override\npublic void restored()\
    \ {\n      LoginHandler.getDefault().showLoginDialog();\n   }\n}\n```\n\n**Listing\
    \ 33-3.** Executing the Login Handler with an Action Which Can Be Assigned to\
    \ a Menu\n\n```\npublic final class SwitchUser implements ActionListener {\n \
    \  @Override\n   public void actionPerformed(ActionEvent e) {\n      LoginHandler.getDefault().showLoginDialog();\n\
    \   }\n}\n```\n\n# Directory Server\n\nThe data necessary for the authentication\
    \ of a user are usually managed by a directory server. With the directory server\
    \ you can swap the necessary information by the Lightweight Directory Access Protocol\
    \ (LDAP). To implement the example and for the sake of demonstration you want\
    \ to install a local directory server. You can create and change the necessary\
    \ structure of the data for its usage.\n\n## Installing the Test Environment\n\
    \nThe *Apache Directory* project will be used as server. One part of it is *ApacheDS*,\
    \ which is an LDAP conform directory server written in Java. The other part of\
    \ the project is the *Apache Directory Studio*, which is a tooling platform you\
    \ will use as GUI for the directory server ApacheDS. You just need to download\
    \ and install the directory studio in which ApacheDS is embedded. After installing\
    \ the software, you can start the studio and install the server. But before installing\
    \ the server you have to add it. Open the assistant with *File ![Image](images/U001.jpg)\
    \ New…* and choose the entry *Apache DS Server* in the category *Apache DS*. On\
    \ the following page you just need to give it a name before you finish the assistant\
    \ with *Finish*. After that you can provide the server. (See [Figure 33-1](#Chapter33.html#fig_33_1).)\n\
    \n![Image](images/3301.jpg)\n\n**Figure 33-1.** Installing the Apache Directory\
    \ server instance\n\nThe created instance is added to the window *Server* with\
    \ the standard settings. In this window, first start the server. After, you will\
    \ be able to create a connection with *LDAP Browser ![Image](images/U001.jpg)\
    \ Create a Connection* in the context menu. This connection will be added to the\
    \ *Connections* window. Switch to this window and establish a connection to the\
    \ server with *Open Connection* in the context menu. If this connection is established,\
    \ a Directory Information Tree (DIT) is displayed in the *LDAP Browser* window.\
    \ (See [Figure 33-2](#Chapter33.html#fig_33_2).) Next you will add the necessary\
    \ user data to the LDAP browser window.\n\n![Image](images/3302.jpg)\n\n**Figure\
    \ 33-2.** Apache Directory Studio"
