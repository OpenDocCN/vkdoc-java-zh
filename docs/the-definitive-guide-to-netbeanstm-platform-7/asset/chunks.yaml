    ## File Systems API\n\nThe NetBeans Platform provides transparent access to files\
    \ and folders by means of the File Systems API. In this process, access is very\
    \ abstract; it works the same way, whether the data are present, for example,\
    \ as a virtual XML file system (such as the System Filesystem), or if they are\
    \ in a JAR archive or a normal directory. The general interfaces of a file system\
    \ are described in the abstract class `FileSystem`. The abstract class `AbstractFileSystem`\
    \ implements some of the tasks of a file system. Thus it is helpful as a base\
    \ class for special file system implementations. The concrete implementation `LocalFileSystem`,\
    \ `JarFileSystem`, and `XMLFileSystem` derive from this class. The class `MultiFileSystem`\
    \ represents a proxy for multiple file systems; it is mostly used as a base class.\
    \ The file system class hierarchy is shown in [Figure 7-2](#Chapter07.html#fig_7_2).\n\
    \n![Image](images/0702.jpg)\n\n***Figure 7-2.** Class hierarchy of the file systems*\n\
