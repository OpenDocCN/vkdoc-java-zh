- fmt: "### Creating Modules\n\nNow it is time to create your first module. A good\
    \ introduction to module development is also offered by the sample applications\
    \ already integrated in the NetBeans IDE. For simplicity's sake, you will just\
    \ design a single module here.\n\nFirst, create a NetBeans Platform Application\
    \ or a Module Suite. This way you will be able to execute and test the module\
    \ easier, and you can define dependencies to your own modules and libraries (see\
    \ the “Defining Dependencies” section). Afterward, you can even create an independent\
    \ rich client distribution (see [Chapter 35](#Chapter35.html#ch35)).\n\nThe NetBeans\
    \ IDE provides a wizard to help you apply a NetBeans Platform Application project.\n\
    \n1.  Start the NetBeans IDE and then select *File* ![Image](images/U001.jpg)\
    \ *New Project*… in the menu. Different project categories are displayed in the\
    \ dialog that appears on the left side. Select *NetBeans Modules* there. Then\
    \ choose the project type *NetBeans Platform Application* on the right side (see\
    \ [Figure 3-3](#Chapter03.html#fig_3_3)).\n\n![Image](images/0303.jpg)\n\n***Figure\
    \ 3-3.** Creating a new NetBeans Platform application project*\n\n2.  On the next\
    \ page, name the application (for example, My Application) and choose the location\
    \ where the project is to be saved. The remaining fields can be left blank.\n\
    3.  Click the *Finish* button to create the NetBeans Platform application project.\n\
    4.  Now the first module can be created; another wizard is available for this\
    \ task. Open the *File* ![Image](images/U001.jpg)*New Project* … menu. Choose\
    \ the category *NetBeans Modules*, and then the project type *Module* on the right\
    \ side.\n5.  Click the *Next* button to go to the next page, for naming the project.\
    \ Enter here, for example, My Module, and then select the option *Add to Module\
    \ Suite*, and select the previously created NetBeans Platform Application or Module\
    \ Suite from the list.\n6.  On the last page, define the Code Name Base and a\
    \ module display name. The default value for the Localizing Bundle can be kept.\
    \ To make it complete, activate the option *Generate XML Layer* due to create\
    \ a layer file. If it is not needed, it can be deleted later, together with the\
    \ referring entry in the manifest file.\n7.  Click the *Finish* button and let\
    \ the wizard generate the module, as shown in [Figure 3-4](#Chapter03.html#fig_3_4).\n\
    \n![Image](images/0304.jpg)\n\n***Figure 3-4.** Configuration of a new module*\n\
    \nLooking at the module in the Projects window, you see the folder *Source Packages*.\
    \ At the moment, this folder contains only the files `Bundle.properties` and `layer.xml`.\
    \ The file `Bundle.properties` only provides a localizing bundle for the information\
    \ registered in the manifest file. The so-called *Layer Tree*, a special view,\
    \ which you can find in the folder *Important Files*, is provided for the `layer.xml`\
    \ file. It provides two different views. On the one hand, there is the folder\
    \ *<this layer>*, in which only the content of your layer file is displayed. On\
    \ the other hand, there is the folder *<this layer in context>*, in which the\
    \ entries of the layer files of the modules (belonging to your NetBeans Platform\
    \ application) are displayed. This view is represented as System Filesystem, too,\
    \ as provided to the Platform during the runtime.\n\nIn this view entries of the\
    \ module (in which you look at the folders) are displayed in bold. This gives\
    \ you an overview of the most important default folders, and you can directly\
    \ move, delete, or add entries. Furthermore, you can find the manifest file, which\
    \ was also created by the wizard, in the folder *Important Files (see [Figure\
    \ 3-5](#Chapter03.html#fig_3_5))*.\n\n![Image](images/0305.jpg)\n\n***Figure 3-5.**\
    \ Module in the projects window*\n\nYou can already start the created module as\
    \ a rich client application. To do so, call *Run ![Image](images/U001.jpg) Run\
    \ Main Project (F6)* in the menu or *Run* in the context menu of your NetBeans\
    \ Platform application project. (See [Figure 3-6](#Chapter03.html#fig_3_6).)\n\
    \n![Image](images/0306.jpg)\n\n***Figure 3-6.** The basic structure of your NetBeans\
    \ Platform application*\n\nWe applied the basic structure of a NetBeans Platform\
    \ application in just a few steps. In the following chapters, we will equip our\
    \ module with functionalities, such as windows and menu entries, step by step.\
    \ In this way we will enrich the rich client application.\n\n### Versioning and\
    \ Dependencies\n\nTo ensure that a modular system remains consistent and maintainable,\
    \ it is crucial that the modules within the system prescribe the modules they\
    \ need to use. To that end, the NetBeans Platform allows definition of dependencies\
    \ on other modules. Only by defining a dependency can one module access the code\
    \ from another module. Dependencies are set in the manifest file of a module.\
    \ That information is then read by the module system when the module is loaded.\n\
    \n#### Versioning\n\nTo guarantee compatibility between dependencies, you must\
    \ define versions; for example, the *Major Release Version*, the *Specification\
    \ Version*, and the *Implementation Version*.These versions are based on the Java\
    \ Package Versioning Specification and reflect the basic concepts of dependencies.\
    \ You can define and edit dependencies in the Properties dialog of your module,\
    \ which you can access via *Properties ![Image](images/U001.jpg) API Versioning*\
    \ (see [Figure 3-7](#Chapter03.html#fig_3_7)).\n\nFirst, define the *Major Release\
    \ Version* in this window. This is the version notifying the user of incompatible\
    \ changes, compared to the previous version of the module. Here, the slash is\
    \ used to separate the code name base from the version within the manifest file:\n\
    \n`OpenIDE-Module: com.galileo.netbeans.module/1`\n\n![Image](images/0307.jpg)\n\
    \n***Figure 3-7.** Setting the module version*\n\nThe most important version is\
    \ the *Specification Version*. The Dewey-Decimal-Format is used to define this\
    \ version:\n\n`OpenIDE-Module-Specification-Version: 1.0.4`\n\nThe *Implementation\
    \ Version* is freely definable text. Typically, a timestamp is used, providing\
    \ the date and time. In that way, you determine it is unique. If not explicitly\
    \ set in the Properties dialog of the module, the IDE adds the implementation\
    \ version when the module is created, using the current timestamp, set within\
    \ the manifest file:\n\n`OpenIDE-Module-Implementation-Version: 200701231820`\n\
    \nOn the other hand, if you define your own implementation version in the Properties\
    \ dialog, the IDE adds the `OpenIDE-Module-Build-Version` attribute with the current\
    \ timestamp.\n\nIn the list of Public Packages, all packages in your module are\
    \ listed. To expose a package to other modules, check the box next to the package\
    \ you want to expose. In doing so, you define the API of your module. Exposed\
    \ packages are listed as follows in the manifest file:\n\n```\nOpenIDE-Module-Public-Packages:\n\
    \   com.galileo.netbeans.module.*,\n   com.galileo.netbeans.module.model.*\n```\n\
    \nTo restrict access to the public packages (for example, to allow only your own\
    \ modules to access the public packages), you can define a module's *Friends*.\
    \ You define them beneath the list of public packages in the API Versioning section\
    \ of the Properties dialog. These are then listed as follows in the manifest file:\n\
    \n```\nOpenIDE-Module-Friends:\n   com.galileo.netbeans.module2,\n   com.galileo.netbeans.module3\n\
    ```\n\n#### Defining Dependencies\n\nBased on these various versions, define your\
    \ clear dependencies. To that end, three different types of dependencies are available:\
    \ a module depends on a module, a package, or a version of Java.\n\n**NO ACCESS\
    \ WITHOUT DEPENDENCIES**\n\nTo use classes from another module, including the\
    \ NetBeans Platform's own modules, you must first define a dependency, as described\
    \ in the following sections. That means, if you use a NetBeans Platform class\
    \ in your module and the code editor cannot find the desired class, the problem\
    \ can normally be fixed by simply setting a dependency on the module that provides\
    \ the class."
  raw: '### Creating Modules


    Now it is time to create your first module. A good introduction to module development
    is also offered by the sample applications already integrated in the NetBeans
    IDE. For simplicity''s sake, you will just design a single module here.


    First, create a NetBeans Platform Application or a Module Suite. This way you
    will be able to execute and test the module easier, and you can define dependencies
    to your own modules and libraries (see the “Defining Dependencies” section). Afterward,
    you can even create an independent rich client distribution (see [Chapter 35](#Chapter35.html#ch35)).


    The NetBeans IDE provides a wizard to help you apply a NetBeans Platform Application
    project.


    1.  Start the NetBeans IDE and then select *File* ![Image](images/U001.jpg) *New
    Project*… in the menu. Different project categories are displayed in the dialog
    that appears on the left side. Select *NetBeans Modules* there. Then choose the
    project type *NetBeans Platform Application* on the right side (see [Figure 3-3](#Chapter03.html#fig_3_3)).


    ![Image](images/0303.jpg)


    ***Figure 3-3.** Creating a new NetBeans Platform application project*


    2.  On the next page, name the application (for example, My Application) and choose
    the location where the project is to be saved. The remaining fields can be left
    blank.

    3.  Click the *Finish* button to create the NetBeans Platform application project.

    4.  Now the first module can be created; another wizard is available for this
    task. Open the *File* ![Image](images/U001.jpg)*New Project* … menu. Choose the
    category *NetBeans Modules*, and then the project type *Module* on the right side.

    5.  Click the *Next* button to go to the next page, for naming the project. Enter
    here, for example, My Module, and then select the option *Add to Module Suite*,
    and select the previously created NetBeans Platform Application or Module Suite
    from the list.

    6.  On the last page, define the Code Name Base and a module display name. The
    default value for the Localizing Bundle can be kept. To make it complete, activate
    the option *Generate XML Layer* due to create a layer file. If it is not needed,
    it can be deleted later, together with the referring entry in the manifest file.

    7.  Click the *Finish* button and let the wizard generate the module, as shown
    in [Figure 3-4](#Chapter03.html#fig_3_4).


    ![Image](images/0304.jpg)


    ***Figure 3-4.** Configuration of a new module*


    Looking at the module in the Projects window, you see the folder *Source Packages*.
    At the moment, this folder contains only the files *Bundle.properties* and *layer.xml*.
    The file *Bundle.properties* only provides a localizing bundle for the information
    registered in the manifest file. The so-called *Layer Tree*, a special view, which
    you can find in the folder *Important Files*, is provided for the *layer.xml*
    file. It provides two different views. On the one hand, there is the folder *<this
    layer>*, in which only the content of your layer file is displayed. On the other
    hand, there is the folder *<this layer in context>*, in which the entries of the
    layer files of the modules (belonging to your NetBeans Platform application) are
    displayed. This view is represented as System Filesystem, too, as provided to
    the Platform during the runtime.


    In this view entries of the module (in which you look at the folders) are displayed
    in bold. This gives you an overview of the most important default folders, and
    you can directly move, delete, or add entries. Furthermore, you can find the manifest
    file, which was also created by the wizard, in the folder *Important Files (see
    [Figure 3-5](#Chapter03.html#fig_3_5))*.


    ![Image](images/0305.jpg)


    ***Figure 3-5.** Module in the projects window*


    You can already start the created module as a rich client application. To do so,
    call *Run ![Image](images/U001.jpg) Run Main Project (F6)* in the menu or *Run*
    in the context menu of your NetBeans Platform application project. (See [Figure
    3-6](#Chapter03.html#fig_3_6).)


    ![Image](images/0306.jpg)


    ***Figure 3-6.** The basic structure of your NetBeans Platform application*


    We applied the basic structure of a NetBeans Platform application in just a few
    steps. In the following chapters, we will equip our module with functionalities,
    such as windows and menu entries, step by step. In this way we will enrich the
    rich client application.


    ### Versioning and Dependencies


    To ensure that a modular system remains consistent and maintainable, it is crucial
    that the modules within the system prescribe the modules they need to use. To
    that end, the NetBeans Platform allows definition of dependencies on other modules.
    Only by defining a dependency can one module access the code from another module.
    Dependencies are set in the manifest file of a module. That information is then
    read by the module system when the module is loaded.


    #### Versioning


    To guarantee compatibility between dependencies, you must define versions; for
    example, the *Major Release Version*, the *Specification Version*, and the *Implementation
    Version*.These versions are based on the Java Package Versioning Specification
    and reflect the basic concepts of dependencies. You can define and edit dependencies
    in the Properties dialog of your module, which you can access via *Properties
    ![Image](images/U001.jpg) API Versioning* (see [Figure 3-7](#Chapter03.html#fig_3_7)).


    First, define the *Major Release Version* in this window. This is the version
    notifying the user of incompatible changes, compared to the previous version of
    the module. Here, the slash is used to separate the code name base from the version
    within the manifest file:


    **`OpenIDE-Module`**`: com.galileo.netbeans.module`**`/1`** ![Image](images/0307.jpg)


    ***Figure 3-7.** Setting the module version*


    The most important version is the *Specification Version*. The Dewey-Decimal-Format
    is used to define this version:


    **`OpenIDE-Module-Specification-Version`**`: 1.0.4`


    The *Implementation Version* is freely definable text. Typically, a timestamp
    is used, providing the date and time. In that way, you determine it is unique.
    If not explicitly set in the Properties dialog of the module, the IDE adds the
    implementation version when the module is created, using the current timestamp,
    set within the manifest file:


    **`OpenIDE-Module-Implementation-Version`**`: 200701231820`


    On the other hand, if you define your own implementation version in the Properties
    dialog, the IDE adds the `OpenIDE-Module-Build-Version` attribute with the current
    timestamp.


    In the list of Public Packages, all packages in your module are listed. To expose
    a package to other modules, check the box next to the package you want to expose.
    In doing so, you define the API of your module. Exposed packages are listed as
    follows in the manifest file:


    **`OpenIDE-Module-Public-Packages:`**

    `   com.galileo.netbeans.module.*,`

    `   com.galileo.netbeans.module.model.*`


    To restrict access to the public packages (for example, to allow only your own
    modules to access the public packages), you can define a module''s *Friends*.
    You define them beneath the list of public packages in the API Versioning section
    of the Properties dialog. These are then listed as follows in the manifest file:


    **`OpenIDE-Module-Friends`**`:`

    `   com.galileo.netbeans.module2,`

    `   com.galileo.netbeans.module3`


    #### Defining Dependencies


    Based on these various versions, define your clear dependencies. To that end,
    three different types of dependencies are available: a module depends on a module,
    a package, or a version of Java.


    **NO ACCESS WITHOUT DEPENDENCIES**


    To use classes from another module, including the NetBeans Platform''s own modules,
    you must first define a dependency, as described in the following sections. That
    means, if you use a NetBeans Platform class in your module and the code editor
    cannot find the desired class, the problem can normally be fixed by simply setting
    a dependency on the module that provides the class.'
