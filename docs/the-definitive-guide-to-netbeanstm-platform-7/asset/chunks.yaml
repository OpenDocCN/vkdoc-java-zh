- fmt: "### String Literals in Source Code\n\nString literals in source code are outsourced\
    \ in `*.properties*` files. Therefore, the language-dependent literals can be\
    \ separated and easily changed into other languages. This is possible even after\
    \ the release of an application. The constants are saved as key-value pairs in\
    \ a simple `*.properties*` file:\n\n`CTL_MyTopComponent = My Window`\n`HINT_MyTopComponent\
    \ = This is My Window`\n\nSuch a resource file is managed by the Java class `ResourceBundle`.\
    \ A `ResourceBundle` is responsible for the resources of a particular `Locale`\
    \ setting that specifies both the country and the language. For easy handling\
    \ of `*.properties*` files and for access to a `ResourceBundle` instance, the\
    \ NetBeans Platform provides the class `NbBundle`. The resource file must be named\
    \ `Bundle.properties`; however, such a file is typically created for each package.\
    \ The easiest way to create `ResourceBundle` objects is with the following call:\n\
    \n`ResourceBundle bundle = NbBundle.getBundle(MyTopComponent.class);`\n\nThus,\
    \ the class `NbBundle` creates a `ResourceBundle` object for the `Bundle.properties`\
    \ file, provided in the package of the class `MyTopComponent`. The required string\
    \ literal is easily read via the `ResourceBundle` method `getString()`:\n\n`String\
    \ msg = bundle.getString(\"CTL_MyTopComponent\");`\n\nIf you just want to read\
    \ few literals inside your class, you can use the method `getMessage()` to read\
    \ a literal directly without creating a `ResourceBundle` instance before the following:\n\
    \n`String msg = NbBundle.getMessage(MyTopComponent.class, \"CTL_MyTopComponent\"\
    );`\n\nFurthermore, it is possible to add a placeholder to your string literals.\
    \ This is most often required if numbers or a file name/path will be inserted.\
    \ A pair of braces is used as a placeholder, which includes the number of the\
    \ parameter:\n\n`Result = {0} MP3-Files found for {1}`\n\nYou can directly pass\
    \ these parameters to the `getMessage()` method, which then replaces the placeholder\
    \ with the parameter. Alternatively, you can pass up to three parameters or an\
    \ array with an unlimited number of parameters:\n\n`String label = NbBundle.getMessage(MyTopComponent.class,\
    \ \"Result\", new Integer(results.size()), search.getText());`\n\nWithin a `*.properties*`\
    \ file, literals are just saved in one language. To add another language to your\
    \ application, provide the literals—with the same keys—in a file named `Bundle_<language>_<country>.properties`\
    \ in the same folder. The class `NbBundle` returns the `ResourceBundle` for this\
    \ file using the method `getBundle()`. This file is equivalent to the `Locale`\
    \ setting, which returns `Locale.getDefault()`. The `Bundle.properties` file that\
    \ does not contain a language and country identifier is the default bundle. This\
    \ bundle is always used if there is no special bundle for the `Locale` setting\
    \ available. A specific bundle can also be requested by passing a `Locale` object\
    \ to the `getBundle()` method. To know in which order the bundles are searched,\
    \ the method `NbBundle.getLocalizingSuffixes()` lists all suffixes in the order\
    \ used.\n\nThe method `Locale.getDefault()` returns the `Locale` setting of the\
    \ virtual machine by default. To run and execute the whole application with a\
    \ specific `Locale` setting, set the command-line parameter `locale`. With this\
    \ parameter you can pass a language and country identifier to the application.\
    \ You can find more information on this in [Chapter 35](#Chapter35.html#ch35).\n\
    \nThe NetBeans IDE provides a wizard for the internationalization of string literals\
    \ for your source files. With this wizard you can scan your files for strings\
    \ which can then be moved to a `*.properties*` file. You can edit the key, the\
    \ value, and the code that will be pasted instead of the literal. You can find\
    \ the wizard in the menu under *Tools ![Image](images/U001.jpg) Internationalization\
    \ ![Image](images/U001.jpg) Internationalization Wizard*, as shown in [Figure\
    \ 34-1](#Chapter34.html#fig_34_1).\n\n![Image](images/3401.jpg)\n\n***Figure 34-1.**\
    \ You can automatically move string literals to a bundle and paste the necessary\
    \ source code with the internationalization wizard.*\n\n### String Literals in\
    \ the Manifest File\n\nIn addition to the string literals of the source files,\
    \ you can also internationalize the textual information of the manifest file.\
    \ There are two options for doing so. The first option is to append a language\
    \ identifier to the manifest attributes and thus use the same attribute several\
    \ times:\n\n`Manifest-Version: 1.0`\n`OpenIDE-Module: com.galileo.netbeans.module`\n\
    `OpenIDE-Module-Name: My Module`\n`OpenIDE-Module-Name_de: Mein Modul`\n\nThe\
    \ second (preferred) option is to outsource the attributes you intend to internationalize\
    \ into a `*.properties*` file. Then, the attribute names are used as keys and\
    \ are provided in bundles for each language. Define the bundle with the `OpenIDE-Module-Localizing-Bundle`\
    \ attribute as shown in [Listing 34-1](#Chapter34.html#list_34_1) (see also [Chapter\
    \ 3](#Chapter03.html#ch3)), so the attributes are read out of the bundle (see\
    \ [Listings 34-2](#Chapter34.html#list_34_2) and [34-3](#Chapter34.html#list_34_3)).\n\
    \n***Listing 34-1.** Manifest.mf*\n\n```\nManifest-Version: 1.0\nOpenIDE-Module:\
    \ com.galileo.netbeans.module\nOpenIDE-Module-Localizing-Bundle: com/galileo/netbeans/module/Bundle.properties\n\
    ```\n\n***Listing 34-2.** Bundle.Properties*\n\n```\nOpenIDE-Module-Name = My\
    \ Module\n```\n\n***Listing 34-3.** Bundle_de.Properties*\n\n```\nOpenIDE-Module-Name\
    \ = Mein Modul\n```\n\n### Internationalization of Help Pages\n\nGenerally, help\
    \ pages, including the help set configuration files, are internationalized like\
    \ `*.properties*` files by appending country and/or language identifiers. Since\
    \ a help set typically consists of a large number of files, this would result\
    \ in a very confusing structure. Therefore, it is also possible to store the files\
    \ intended for internationalization in a subfolder, as shown in [Figure 34-2](#Chapter34.html#fig_34_2).\
    \ Language and country identification is no longer necessary, because that information\
    \ is already represented by the subfolder.\n\n![Image](images/3402.jpg)\n\n***Figure\
    \ 34-2.** Help sets for specific languages are stored in a separate directory.*\n\
    \nOnly the help set file `module-hs.xml` remains in the root directory, and has\
    \ not attached an identifier. In this file, you delegate to the corresponding\
    \ folders. The help set file without an identifier is always used when the current\
    \ `Locale` setting does not match the existing files. The help set file points\
    \ to the English version of the help pages (see [Listing 34-4](#Chapter34.html#list_34_4)).\n\
    \n***Listing 34-4.** Help Set File Which Refers to a Language-Specific Package*\n\
    \n```\n<maps>\n   <homeID>com.galileo.netbeans.module.about</homeID>\n   <mapref\
    \ location=\"en/module-map.xml\"/>\n</maps>\n<view mergetype=\"javax.help.AppendMerge\"\
    >\n   <name>TOC</name>\n   <label>Contents</label>\n   <type>javax.help.TOCView</type>\n\
    \   <data>en/module-toc.xml</data>\n</view>\n<view mergetype=\"javax.help.AppendMerge\"\
    >\n   <name>Index</name>\n   <label>Index</label>\n   <type>javax.help.IndexView</type>\n\
    \   <data>en/module-idx.xml</data>\n</view>\n```\n\nYou should also consider that\
    \ the registration of the help set only occurs once for the `module-hs.xml` file\
    \ by the `HelpSetRegistration` annotation in the `package-info.java` file. Then\
    \ the help sets containing a country/language identification are automatically\
    \ found.\n\n### Internationalizing Other Resources\n\nThe NetBeans Platform provides\
    \ additional possibilities for internationalizing other application components\
    \ besides the areas of internationalization already described."
  raw: '### String Literals in Source Code


    String literals in source code are outsourced in *.properties* files. Therefore,
    the language-dependent literals can be separated and easily changed into other
    languages. This is possible even after the release of an application. The constants
    are saved as key-value pairs in a simple *.properties* file:


    `CTL_MyTopComponent = My Window`

    `HINT_MyTopComponent = This is My Window`


    Such a resource file is managed by the Java class `ResourceBundle`. A `ResourceBundle`
    is responsible for the resources of a particular `Locale` setting that specifies
    both the country and the language. For easy handling of *.properties* files and
    for access to a `ResourceBundle` instance, the NetBeans Platform provides the
    class `NbBundle`. The resource file must be named *Bundle.properties*; however,
    such a file is typically created for each package. The easiest way to create `ResourceBundle`
    objects is with the following call:


    `ResourceBundle bundle = NbBundle`**`.getBundle`**`(MyTopComponent.class);`


    Thus, the class `NbBundle` creates a `ResourceBundle` object for the *Bundle.properties*
    file, provided in the package of the class `MyTopComponent`. The required string
    literal is easily read via the `ResourceBundle` method `getString()`:


    `String msg = bundle`**`.getString`**`("CTL_MyTopComponent");`


    If you just want to read few literals inside your class, you can use the method
    `getMessage()` to read a literal directly without creating a `ResourceBundle`
    instance before the following:


    `String msg = NbBundle`**`.getMessage`**`(MyTopComponent.class, "CTL_MyTopComponent");`


    Furthermore, it is possible to add a placeholder to your string literals. This
    is most often required if numbers or a file name/path will be inserted. A pair
    of braces is used as a placeholder, which includes the number of the parameter:


    `Result = {0} MP3-Files found for {1}`


    You can directly pass these parameters to the `getMessage()` method, which then
    replaces the placeholder with the parameter. Alternatively, you can pass up to
    three parameters or an array with an unlimited number of parameters:


    `String label = NbBundle.getMessage(MyTopComponent.class, "Result",`

    **`new Integer(results.size()), search.getText()`**`);`


    Within a *.properties* file, literals are just saved in one language. To add another
    language to your application, provide the literals—with the same keys—in a file
    named `Bundle_<language>_<country>.properties` in the same folder. The class `NbBundle`
    returns the `ResourceBundle` for this file using the method `getBundle()`. This
    file is equivalent to the `Locale` setting, which returns `Locale.getDefault()`.
    The *Bundle.properties* file that does not contain a language and country identifier
    is the default bundle. This bundle is always used if there is no special bundle
    for the `Locale` setting available. A specific bundle can also be requested by
    passing a `Locale` object to the `getBundle()` method. To know in which order
    the bundles are searched, the method `NbBundle.getLocalizingSuffixes()` lists
    all suffixes in the order used.


    The method `Locale.getDefault()` returns the `Locale` setting of the virtual machine
    by default. To run and execute the whole application with a specific `Locale`
    setting, set the command-line parameter `locale`. With this parameter you can
    pass a language and country identifier to the application. You can find more information
    on this in [Chapter 35](#Chapter35.html#ch35).


    The NetBeans IDE provides a wizard for the internationalization of string literals
    for your source files. With this wizard you can scan your files for strings which
    can then be moved to a *.properties* file. You can edit the key, the value, and
    the code that will be pasted instead of the literal. You can find the wizard in
    the menu under *Tools ![Image](images/U001.jpg) Internationalization ![Image](images/U001.jpg)
    Internationalization Wizard*, as shown in [Figure 34-1](#Chapter34.html#fig_34_1).


    ![Image](images/3401.jpg)


    ***Figure 34-1.** You can automatically move string literals to a bundle and paste
    the necessary source code with the internationalization wizard.*


    ### String Literals in the Manifest File


    In addition to the string literals of the source files, you can also internationalize
    the textual information of the manifest file. There are two options for doing
    so. The first option is to append a language identifier to the manifest attributes
    and thus use the same attribute several times:


    `Manifest-Version: 1.0`

    `OpenIDE-Module: com.galileo.netbeans.module`

    `OpenIDE-Module-Name: My Module`

    `OpenIDE-Module-Name`**`_de`**`: Mein Modul`


    The second (preferred) option is to outsource the attributes you intend to internationalize
    into a *.properties* file. Then, the attribute names are used as keys and are
    provided in bundles for each language. Define the bundle with the `OpenIDE-Module-Localizing-Bundle`
    attribute as shown in [Listing 34-1](#Chapter34.html#list_34_1) (see also [Chapter
    3](#Chapter03.html#ch3)), so the attributes are read out of the bundle (see [Listings
    34-2](#Chapter34.html#list_34_2) and [34-3](#Chapter34.html#list_34_3)).


    ***Listing 34-1.** Manifest.mf*


    `Manifest-Version: 1.0`

    `OpenIDE-Module: com.galileo.netbeans.module`

    **`OpenIDE-Module-Localizing-Bundle`**`: com/galileo/netbeans/module/Bundle.properties`


    ***Listing 34-2.** Bundle.Properties*


    `OpenIDE-Module-Name = My Module`


    ***Listing 34-3.** Bundle_de.Properties*


    `OpenIDE-Module-Name = Mein Modul`


    ### Internationalization of Help Pages


    Generally, help pages, including the help set configuration files, are internationalized
    like *.properties* files by appending country and/or language identifiers. Since
    a help set typically consists of a large number of files, this would result in
    a very confusing structure. Therefore, it is also possible to store the files
    intended for internationalization in a subfolder, as shown in [Figure 34-2](#Chapter34.html#fig_34_2).
    Language and country identification is no longer necessary, because that information
    is already represented by the subfolder.


    ![Image](images/3402.jpg)


    ***Figure 34-2.** Help sets for specific languages are stored in a separate directory.*


    Only the help set file `module-hs.xml` remains in the root directory, and has
    not attached an identifier. In this file, you delegate to the corresponding folders.
    The help set file without an identifier is always used when the current `Locale`
    setting does not match the existing files. The help set file points to the English
    version of the help pages (see [Listing 34-4](#Chapter34.html#list_34_4)).


    ***Listing 34-4.** Help Set File Which Refers to a Language-Specific Package*


    `<maps>`

    `   <homeID>com.galileo.netbeans.module.about</homeID>`

    `   <mapref location="`**`en/`**`module-map.xml"/>`

    `</maps>`

    `<view mergetype="javax.help.AppendMerge">`

    `   <name>TOC</name>`

    `   <label>Contents</label>`

    `   <type>javax.help.TOCView</type>`

    `   <data>`**`en/`**`module-toc.xml</data>`

    `</view>`

    `<view mergetype="javax.help.AppendMerge">`

    `   <name>Index</name>`

    `   <label>Index</label>`

    `   <type>javax.help.IndexView</type>`

    `   <data>`**`en/`**`module-idx.xml</data>`

    `</view>`


    You should also consider that the registration of the help set only occurs once
    for the `module-hs.xml` file by the `HelpSetRegistration` annotation in the *package-info.java*
    file. Then the help sets containing a country/language identification are automatically
    found.


    ### Internationalizing Other Resources


    The NetBeans Platform provides additional possibilities for internationalizing
    other application components besides the areas of internationalization already
    described.'
  trans: '

    ### 源代码中的字符串字面量


    源代码中的字符串字面量被外包到 `*.properties` 文件中。因此，与语言相关的字面量可以被分离出来，并轻松地更改为其他语言。即使在应用程序发布后，这也是可行的。这些常量以键值对的形式保存在一个简单的
    `*.properties` 文件中：


    `CTL_MyTopComponent = My Window`

    `HINT_MyTopComponent = This is My Window`


    此类资源文件由 Java 类 `ResourceBundle` 管理。一个 `ResourceBundle` 负责特定 `Locale`（区域设置）的资源，该设置同时指定了国家和语言。为了便于处理
    `*.properties` 文件以及访问 `ResourceBundle` 实例，NetBeans 平台提供了 `NbBundle` 类。资源文件必须命名为
    *Bundle.properties*；不过，通常每个包都会创建这样一个文件。创建 `ResourceBundle` 对象最简单的方法是使用以下调用：


    `ResourceBundle bundle = NbBundle`**`.getBundle`**`(MyTopComponent.class);`


    因此，`NbBundle` 类会为 `MyTopComponent` 类所在包中提供的 *Bundle.properties* 文件创建一个 `ResourceBundle`
    对象。所需的字符串字面量可以通过 `ResourceBundle` 的 `getString()` 方法轻松读取：


    `String msg = bundle`**`.getString`**`("CTL_MyTopComponent");`


    如果你只想在类中读取少量字面量，可以使用 `getMessage()` 方法直接读取字面量，而无需事先创建 `ResourceBundle` 实例，如下所示：


    `String msg = NbBundle`**`.getMessage`**`(MyTopComponent.class, "CTL_MyTopComponent");`


    此外，还可以向字符串字面量中添加占位符。这在需要插入数字或文件名/路径时最为常见。使用一对大括号作为占位符，其中包含参数的编号：


    `Result = {0} MP3-Files found for {1}`


    你可以直接将这些参数传递给 `getMessage()` 方法，该方法会用参数替换占位符。或者，你可以传递最多三个参数，或一个包含无限数量参数的数组：


    `String label = NbBundle.getMessage(MyTopComponent.class, "Result",`

    **`new Integer(results.size()), search.getText()`**`);`


    在 `*.properties` 文件中，字面量仅以一种语言保存。要为应用程序添加另一种语言，请在同一个文件夹中提供一个名为 `Bundle_<语言>_<国家>.properties`
    的文件，其中包含具有相同键的字面量。`NbBundle` 类使用 `getBundle()` 方法返回此文件的 `ResourceBundle`。此文件等同于返回
    `Locale.getDefault()` 的 `Locale` 设置。不包含语言和国家标识符的 *Bundle.properties* 文件是默认的资源包。如果
    `Locale` 设置没有可用的特定资源包，则始终使用此默认资源包。也可以通过将 `Locale` 对象传递给 `getBundle()` 方法来请求特定的资源包。要了解资源包的搜索顺序，方法
    `NbBundle.getLocalizingSuffixes()` 会按使用顺序列出所有后缀。


    默认情况下，方法 `Locale.getDefault()` 返回虚拟机的 `Locale` 设置。要使用特定的 `Locale` 设置运行和执行整个应用程序，请设置命令行参数
    `locale`。使用此参数，你可以将语言和国家标识符传递给应用程序。你可以在第 35 章中找到更多相关信息。


    NetBeans IDE 提供了一个向导，用于对源文件中的字符串字面量进行国际化。使用此向导，你可以扫描文件中的字符串，然后将其移动到 `*.properties`
    文件中。你可以编辑键、值以及将替换字面量的代码。你可以在菜单中的 *工具 ![Image](img/U001.jpg) 国际化 ![Image](img/U001.jpg)
    国际化向导* 下找到该向导，如图 34-1 所示。


    ![Image](img/3401.jpg)


    ***图 34-1.** 你可以使用国际化向导自动将字符串字面量移动到资源包，并粘贴必要的源代码。*


    ### 清单文件中的字符串字面量


    除了源文件的字符串字面量之外，你还可以对清单文件的文本信息进行国际化。有两种方法可以做到这一点。第一种方法是将语言标识符附加到清单属性上，从而多次使用相同的属性：


    `Manifest-Version: 1.0`

    `OpenIDE-Module: com.galileo.netbeans.module`

    `OpenIDE-Module-Name: My Module`

    `OpenIDE-Module-Name`**`_de`**`: Mein Modul`


    第二种（也是首选）方法是将你打算国际化的属性外包到一个 `*.properties` 文件中。然后，属性名称将用作键，并在每种语言的资源包中提供。使用 `OpenIDE-Module-Localizing-Bundle`
    属性定义资源包，如清单 34-1 所示（另请参见第 3 章），这样属性就会从资源包中读取（参见清单 34-2 和 34-3）。


    ***清单 34-1.** Manifest.mf*


    `Manifest-Version: 1.0`

    `OpenIDE-Module: com.galileo.netbeans.module`

    **`OpenIDE-Module-Localizing-Bundle`**`: com/galileo/netbeans/module/Bundle.properties`


    ***清单 34-2.** Bundle.Properties*


    `OpenIDE-Module-Name = My Module`


    ***清单 34-3.** Bundle_de.Properties*


    `OpenIDE-Module-Name = Mein Modul`


    ### 帮助页面的国际化


    通常，帮助页面（包括帮助集配置文件）的国际化方式与 `*.properties` 文件类似，即通过附加国家和/或语言标识符。由于一个帮助集通常包含大量文件，这会导致结构非常混乱。因此，也可以将打算国际化的文件存储在一个子文件夹中，如图
    34-2 所示。不再需要语言和国家标识，因为该信息已由子文件夹表示。


    ![Image](img/3402.jpg)


    ***图 34-2.** 特定语言的帮助集存储在单独的目录中。*


    只有帮助集文件 `module-hs.xml` 保留在根目录中，并且没有附加标识符。在此文件中，你委托到相应的文件夹。当当前的 `Locale` 设置与现有文件不匹配时，始终使用不带标识符的帮助集文件。该帮助集文件指向帮助页面的英文版本（参见清单
    34-4）。


    ***清单 34-4.** 引用特定语言包的帮助集文件*


    `<maps>`

    `   <homeID>com.galileo.netbeans.module.about</homeID>`

    `   <mapref location="`**`en/`**`module-map.xml"/>`

    `</maps>`

    `<view mergetype="javax.help.AppendMerge">`

    `   <name>TOC</name>`

    `   <label>Contents</label>`

    `   <type>javax.help.TOCView</type>`

    `   <data>`**`en/`**`module-toc.xml</data>`

    `</view>`

    `<view mergetype="javax.help.AppendMerge">`

    `   <name>Index</name>`

    `   <label>Index</label>`

    `   <type>javax.help.IndexView</type>`

    `   <data>`**`en/`**`module-idx.xml</data>`

    `</view>`


    你还应该考虑到，帮助集的注册仅通过 *package-info.java* 文件中的 `HelpSetRegistration` 注解为 `module-hs.xml`
    文件进行一次。然后，包含国家/语言标识的帮助集会被自动找到。


    ### 国际化其他资源


    除了已经描述的国际化领域之外，NetBeans 平台还提供了对其他应用程序组件进行国际化的额外可能性。

