  trans: "\n### 数据系统 API\n\n数据系统 API 提供了一个基于文件系统 API 的逻辑层。`FileObject` 管理其数据时不关心数据类型，而\
    \ `DataObject` 则是针对特定类型的 `FileObject` 的包装器。`DataObject` 通过类型特定的特性和功能扩展了 `FileObject`。这些功能由接口或抽象类（即所谓的上下文接口）来指定。功能的实现由\
    \ `DataObject` 通过本地 Lookup 提供。由于这种机制，`DataObject` 的能力可以动态且灵活地调整，并且可以从外部调用。由于 `DataObject`\
    \ 知道其所管理数据的类型，因此它能够相应地表示数据。这意味着，`DataObject` 负责自行创建一个 `Node`，以便在用户界面上相应地表示数据。`DataObject`\
    \ 由专门的 `DataObject.Factory` 创建，该工厂恰好负责一种数据类型。\n\n该系统的连贯性很容易展示。在下面的示例中，三层 API 如何协同工作并相互构建将变得非常清晰。在这方面，NetBeans\
    \ IDE 完成了大量工作并提供了一个向导。\n\n现在，您希望使用此向导向模块中添加一个用于 MP3 文件的数据文件。\n\n1.  为此，请选择“文件”![Image](img/U001.jpg)\
    \ “新建文件…”，然后在“模块开发”类别中选择“文件类型”。\n2.  目前，您可以确定 MIME 类型；在此示例中，输入 `audio/mpeg`。文件类型根据扩展名进行识别；对于\
    \ XML 文件，也可以通过根元素来识别内容的类型。在这里，您希望文件通过扩展名 `mp3` 来识别。因此，您填写此项（参见图 7-3）。您可以选择定义多个文件扩展名，每个扩展名之间用逗号分隔。因此，对于视频文件，`mpg`\
    \ 或 `mpeg` 会是有意义的。\n\n    ![Image](img/0703.jpg)\n\n    ***图 7-3.** 使用 NetBeans\
    \ 向导为 MP3 文件创建新的文件类型*\n\n3.  要进入最后一页，请按“下一步”。输入 `Mp3` 作为类名前缀，并选择一个 16 × 16 像素的图标。\n\
    4.  然后按“完成”按钮，向导将创建数据对象类。\n\n### 数据对象\n\n原则上，数据对象由抽象类 `DataObject` 定义。通常，子类 `MultiDataObject`\
    \ 被用作基类。一方面，它已经实现了 `DataObject` 的大部分抽象方法；这就是为什么您自己的数据对象类保持得非常小巧。另一方面，多数据对象可以包含一个或多个文件对象。一个数据对象总是有一个称为主文件的文件对象。此外，多数据对象可以选择性地包含一个或多个文件，这些文件称为辅助文件。辅助文件通常出现在相关数据中——例如，在表单编辑器中。在编辑器中，文件\
    \ *myform.java、myform.form、myform.class* 由一个数据对象表示。在此示例中，文件 *myform.java* 是主文件，而文件\
    \ *myform.class* 和 *myform.form* 是辅助文件。数据对象内的文件对象由类 `MultiDataObject.Entry` 管理。这里主要使用子类\
    \ `FileEntry`。标准的文件操作（例如移除或删除）通过此类执行。查看由向导创建的类 `Mp3DataObject`，如清单 7-3 所示。\n\n\
    ***清单 7-3.** 用于文件对象类型 Mp3 的数据对象类。此类为 MP3 文件提供逻辑。*\n\n`import java.io.IOException;`\n\
    `import org.openide.filesystems.FileObject;`\n`import org.openide.loaders.DataNode;`\n\
    `import org.openide.loaders.DataObjectExistsException;`\n`import org.openide.loaders.MultiDataObject;`\n\
    `import org.openide.loaders.MultiFileLoader;`\n`import org.openide.nodes.Node;`\n\
    `import org.openide.nodes.Children;`\n`import org.openide.util.Lookup;`\n\n`public\
    \ class Mp3DataObject extends` **`MultiDataObject`** `{`\n`public` **`Mp3DataObject(FileObject\
    \ pf, MultiFileLoader loader)`**\n`      throws DataObjectExistsException, IOException\
    \ {`\n`      super(pf, loader);`\n`   }`\n`   protected Node createNodeDelegate()\
    \ {`\n`      return new DataNode(this, Children.LEAF, getLookup());`\n`   }`\n\
    `public Lookup` **`getLookup`**`() {`\n`      return getCookieSet().getLookup();`\n\
    `   }`\n`}`\n\n正如您已经知道的，数据对象通常由数据对象工厂创建。该工厂负责创建特定的数据对象类型。`Mp3DataObject` 类的构造函数包含两个参数。首先，是主文件，它包含或代表实际的\
    \ MP3 文件。其次，它包含以 `MultiFileLoader` 对象形式存在的工厂实例，该工厂负责该数据对象。您只需将这些参数传递给基类构造函数，由它进行管理。数据对象负责创建相应的节点，因为该对象知道其数据的类型。节点用于在用户界面上表示数据对象。您通过方法\
    \ `createNodeDelegate()` 来实现这一点，该方法创建节点类 `DataNode` 的一个实例并返回。这是与位于表示层的节点 API 的接口（参见图\
    \ 7-1）。您将在第 12 章中了解更多相关信息。\n\n文件对象和数据对象之间的主要区别在于，数据对象知道它包含哪些数据。这意味着数据对象的特征在于能够为此类型的数据（在本例中为\
    \ MP3 文件）提供特性和功能。数据对象为其文件提供的功能由接口或抽象类描述。这些就是上下文接口。这些接口的实例由数据对象在本地 Lookup 中管理。由于这些接口不一定由\
    \ `DataObject` 本身实现，而是由 Lookup 管理，因此数据对象能够动态地提供其能力。这意味着，例如，它可以在运行时提供一个正在播放的 MP3\
    \ 文件。只要 MP3 文件正在播放，就会提供此功能。此外，还可以灵活地用更多功能扩展数据对象。Lookup 本身提供了对这些接口的类型安全访问。\n\n\
    现在，您的 `Mp3DataObject` 的基本结构已经完成。构造函数通过相应的工厂从较低抽象层获取要管理的文件对象。抽象层为上层表示层提供一个代表，并最终通过\
    \ Lookup 将其功能提供给环境。基类 `DataObject` 和 `MultiDataObject` 提供了许多用于使用数据对象的方法。在此，查阅\
    \ API 文档会非常有帮助。\n"
- fmt: "### Implementing Context Interfaces\n\nFirst, you specify the functionality\
    \ which will receive your `Mp3DataObject` by an interface. You should now call\
    \ it `PlayInterface` and so specify the method `play()` with which the corresponding\
    \ `Mp3DataObject` can be played:\n\n```\npublic interface PlayInterface {\n  \
    \  public void play();\n}\n```\n\nOf course, you then need an implementation of\
    \ the desired functionality which you have specified by the context interface.\
    \ You might imagine that you implement the interface directly by the class `Mp3DataObject`;\
    \ however, it is better to do this by a separate class, a *Support* class. That\
    \ way the functionality can be flexibly added to the `Mp3DataObject` and deleted\
    \ again. Furthermore, multiple context interfaces can be grouped semantically\
    \ and the `Mp3DataObject` class remains very small.\n\n```\npublic class PlaySupport\
    \ implements PlayInterface {\n    private Mp3DataObject mp3 = null;\n    public\
    \ PlaySupport(Mp3DataObject mp3) {\n        this.mp3 = mp3;\n    }\n    public\
    \ void play() {\n        System.out.println(\"Play: \" + mp3.getPrimaryFile().getName());\n\
    \    }\n}\n```\n\nFurthermore, it is only necessary to add an instance of this\
    \ support class to the Lookup of the `Mp3DataObject` class. You do this with the\
    \ method `getCookieSet().assign()` and in doing so indicate that it is the type\
    \ `PlayInterface`. Of course, you could also indicate `PlaySupport.class`, but\
    \ this way, you are independent of the implementation.\n\n```\npublic class Mp3DataObject\
    \ extends MultiDataObject {\n    public Mp3DataObject(FileObject pf, MultiFileLoader\
    \ loader)\n            throws DataObjectExistsException, IOException {\n     \
    \   super(pf, loader);\n        getCookieSet().assign(PlayInterface.class, new\
    \ PlaySupport(this));\n    }\n}\n```\n\nYou finally expanded your `Mp3DataObject`\
    \ with a functionality in three steps. This functionality can be used from outside\
    \ in the local Lookup which is available through `getLookup()`.\n\n### Using Context\
    \ Interfaces\n\nFinally, the question remains how to access the functionalities\
    \ of a data object. I want to answer this question by means of a context aware\
    \ action class. To do this, you create a new class with the wizard by *File* ![Image](images/U001.jpg)\
    \ *New File*… ![Image](images/U001.jpg) *Module Development* ![Image](images/U001.jpg)\
    \ *Action*. You now use `Mp3DataObject` as context. This way, the action only\
    \ becomes active when a `Mp3DataObject`, meaning its node, is selected. As you\
    \ already know from [Chapter 6](#Chapter06.html#ch6), the context is transferred\
    \ to the constructor of a context aware class:\n\n```\npublic final class MyContextAction\
