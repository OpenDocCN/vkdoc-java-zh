- fmt: "#### Lookup and Service Tests\n\nBasically, you can realize tests for modules,\
    \ which query the services through the global `Lookup`, as described in the previous\
    \ paragraph. However, then you must run the tests for the whole application. If\
    \ you want to test a single module, you can implement the so-called *mock* objects\
    \ (placeholder objects) to successfully run the module tests. You can do the same\
    \ thing if a loosely coupled service provider is not provided when developing\
    \ or testing. The classes for mock objects are implemented as part of the test\
    \ classes and can then be added to the global `Lookup`. To do so, you have two\
    \ options which will be explored in the following scenario (see [Listing 42-6](#Chapter42.html#list_42_6),\
    \ [Listing 42-7](#Chapter42.html#list_42_7), and [Listing 42-8](#Chapter42.html#list_42_8).).\n\
    \nThe following assumes you have the module *My Module* which uses the service\
    \ `CalculatorService` (also defined in this example).\n\n***Listing 42-6.** Class\
    \ to Check Which Uses a Global Service*\n\n```\nimport org.openide.util.Lookup;\n\
    public class Calculator {\n   public int add(int a, int b) {\n      CalculatorService\
    \ calc = Lookup.getDefault().lookup(CalculatorService.class);\n      return calc.add(a,\
    \ b);\n   }\n}\n```\n\n***Listing 42-7.** Service Interface*\n\n```\npublic interface\
    \ CalculatorService {\n   public int add(int a, int b);\n}\n```\n\nThe module\
    \ *My Module 2* provides a service provider for the `CalculatorService`.\n\n***Listing\
    \ 42-8.** Service Provider in a Separate Module*\n\n```\nimport com.galileo.netbeans.module.CalculatorService;\n\
    import org.openide.util.lookup.ServiceProvider;\n\n@ServiceProvider(service=CalculatorService.class)\n\
    public class CalculatorImpl implements CalculatorService {\n   @Override\n   public\
    \ int add(int a, int b) {\n      return a + b;\n   }\n}\n```\n\nNow, you create\
    \ the test class `CalculatorTest` for the class `Calculator`. If you run a test\
    \ on the module or on the whole application, later you will receive a `NullPointerException`,\
    \ because the `lookup()` call cannot deliver a service implementation. To solve\
    \ this problem, you can now directly provide a mock service in the test class.\
    \ You can add this to the global `Lookup` by means of the class `MockServices`\
    \ out of the NB JUnit modle. Do this before running the test in a method that\
    \ is marked with the annotation `@BeforeClass`. In the example in [Listing 42-9](#Chapter42.html#list_42_9)\
    \ this is the method `setUpClass()`.\n\n***Listing 42-9.** Test Class with Mock\
    \ Service Implementation*\n\n```\nimport org.junit.BeforeClass;\nimport org.junit.Test;\n\
    import static org.junit.Assert.*;\n\npublic class CalculatorTest {\n\n   @BeforeClass\n\
    \   public static void setUpClass() throws Exception {\n      MockServices.setServices(CalculatorMockInt.class);\n\
    \   }\n\n   @Test\n   public void testAdd() {\n      System.out.println(\"add\"\
    );\n      Calculator calc = new Calculator();\n      assertEquals(calc.add(3,\
    \ 5), 8);\n   }\n\n   public static final class CalculatorMockInt implements CalculatorService\
    \ {\n      @Override\n      public int add(int a, int b) {\n         return a\
    \ + b;\n      }\n   }\n}\n```\n\nYou implement a mock class (it must be `public`)\
    \ which you can publish in the global `Lookup` with `MockServices.setServices()`.\
    \ You implement it with the inner class `CalculatorMockInt`. This way, you can\
    \ now test independently of the other modules.\n\nAn alternative to using the\
    \ `MockServices` class is implementing a mock class in a separate class or file\
    \ into the Unit Test package. You can then publish this as usual with the `@ServiceProvider`\
    \ annotation. A referring entry is applied in the directory `build/test/unit/classes/META-INF/services`\
    \ before the test execution. (See [Listing 42-10](#Chapter42.html#list_42_10).)\n\
    \n***Listing 42-10.** Implementation and Registration of a Mock System in a Separate\
    \ File*\n\n```\nimport org.openide.util.lookup.ServiceProvider;\n\n@ServiceProvider(service\
    \ = CalculatorService.class)\npublic class CalculatorMockExt implements CalculatorService\
    \ {\n   @Override\n   public int add(int a, int b) {\n      return a + b;\n  \
    \ }\n}\n```\n\n![Image](images/square.jpg) **Note** When deleting the mock class\
    \ or its `@ServiceProvider` annotation, the registration still exists in the `META-INF/services`\
    \ directory. Do a ‘clean’ before running a new test."
  raw: '#### Lookup and Service Tests


    Basically, you can realize tests for modules, which query the services through
    the global Lookup, as described in the previous paragraph. However, then you must
    run the tests for the whole application. If you want to test a single module,
    you can implement the so-called *mock* objects (placeholder objects) to successfully
    run the module tests. You can do the same thing if a loosely coupled service provider
    is not provided when developing or testing. The classes for mock objects are implemented
    as part of the test classes and can then be added to the global Lookup. To do
    so, you have two options which will be explored in the following scenario (see
    [Listing 42-6](#Chapter42.html#list_42_6), [Listing 42-7](#Chapter42.html#list_42_7),
    and [Listing 42-8](#Chapter42.html#list_42_8).).


    The following assumes you have the module *My Module* which uses the service `CalculatorService`
    (also defined in this example).


    ***Listing 42-6.** Class to Check Which Uses a Global Service*


    `import org.openide.util.Lookup;`

    `public class` **`Calculator`** `{`

    `public int` **`add`**`(int a, int b) {`

    **`CalculatorService`** `calc = Lookup.getDefault().`**`lookup`**`(CalculatorService.class);`

    `      return calc.add(a, b);`

    `   }`

    `}`


    ***Listing 42-7.** Service Interface*


    `public interface` **`CalculatorService`** `{`

    `   public int add(int a, int b);`

    `}`


    The module *My Module 2* provides a service provider for the `CalculatorService`.


    ***Listing 42-8.** Service Provider in a Separate Module*


    `import com.galileo.netbeans.module.CalculatorService;`

    `import org.openide.util.lookup.ServiceProvider;`


    `@`**`ServiceProvider`**`(service=`**`CalculatorService`**`.class)`

    `public class` **`CalculatorImpl`** `implements` **`CalculatorService`** `{`

    `   @Override`

    `public int` **`add`**`(int a, int b) {`

    `      return a + b;`

    `   }`

    `}`


    Now, you create the test class `CalculatorTest` for the class `Calculator`. If
    you run a test on the module or on the whole application, later you will receive
    a `NullPointerException`, because the `lookup()` call cannot deliver a service
    implementation. To solve this problem, you can now directly provide a mock service
    in the test class. You can add this to the global Lookup by means of the class
    `MockServices` out of the NB JUnit modle. Do this before running the test in a
    method that is marked with the annotation `@BeforeClass`. In the example in [Listing
    42-9](#Chapter42.html#list_42_9) this is the method `setUpClass()`.


    ***Listing 42-9.** Test Class with Mock Service Implementation*


    `import org.junit.BeforeClass;`

    `import org.junit.Test;`

    `import static org.junit.Assert.*;`


    `public class` **`CalculatorTest`** `{`


    **`@BeforeClass`**

    `public static void` **`setUpClass`**`() throws Exception {`

    **`MockServices`**`.`**`setServices`**`(CalculatorMockInt.class);`

    `   }`


    **`@Test`**

    `public void` **`testAdd`**`() {`

    `      System.out.println("add");`

    `      Calculator calc = new Calculator();`

    `      assertEquals(calc.add(3, 5), 8);`

    `   }`


    `public static final class` **`CalculatorMockInt`** `implements` **`CalculatorService`**
    `{`

    `      @Override`

    `public int` **`add`**`(int a, int b) {`

    `         return a + b;`

    `      }`

    `   }`

    `}`


    You implement a mock class (it must be `public`) which you can publish in the
    global Lookup with `MockServices.setServices()`. You implement it with the inner
    class `CalculatorMockInt`. This way, you can now test independently of the other
    modules.


    An alternative to using the `MockServices` class is implementing a mock class
    in a separate class or file into the Unit Test package. You can then publish this
    as usual with the `@ServiceProvider` annotation. A referring entry is applied
    in the directory *build/test/unit/classes/META-INF/services* before the test execution.
    (See [Listing 42-10](#Chapter42.html#list_42_10).)


    ***Listing 42-10.** Implementation and Registration of a Mock System in a Separate
    File*


    `import org.openide.util.lookup.ServiceProvider;`


    **`@ServiceProvider`**`(service = CalculatorService.class)`

    `public class` **`CalculatorMockExt`** `implements` **`CalculatorService`** `{`

    `   @Override`

    `public int` **`add`**`(int a, int b) {`

    `      return a + b;`

    `   }`

    `}`


    ![Image](images/square.jpg) **Note** When deleting the mock class or its `@ServiceProvider`
    annotation, the registration still exists in the *META-INF/services* directory.
    Do a ‘clean’ before running a new test.'
  trans: '

    #### 查找与服务测试


    基本上，你可以按照上一段所述，为那些通过全局查找（Lookup）查询服务的模块实现测试。然而，这样一来你就必须运行整个应用程序的测试。如果你想测试单个模块，可以实现所谓的*模拟*对象（占位对象）来成功运行模块测试。如果在开发或测试时没有提供松散耦合的服务提供者，你也可以采用同样的方法。模拟对象的类作为测试类的一部分实现，然后可以添加到全局查找中。为此，你有两种选择，将在下面的场景中进行探讨（参见清单
    42-6、清单 42-7 和清单 42-8）。


    以下假设你有一个名为 *My Module* 的模块，它使用了 `CalculatorService` 服务（也在本例中定义）。


    ***清单 42-6.** 使用全局服务的待检查类*


    `import org.openide.util.Lookup;`

    `public class` **`Calculator`** `{`

    `public int` **`add`**`(int a, int b) {`

    **`CalculatorService`** `calc = Lookup.getDefault().`**`lookup`**`(CalculatorService.class);`

    `      return calc.add(a, b);`

    `   }`

    `}`


    ***清单 42-7.** 服务接口*


    `public interface` **`CalculatorService`** `{`

    `   public int add(int a, int b);`

    `}`


    模块 *My Module 2* 为 `CalculatorService` 提供了一个服务提供者。


    ***清单 42-8.** 独立模块中的服务提供者*


    `import com.galileo.netbeans.module.CalculatorService;`

    `import org.openide.util.lookup.ServiceProvider;`


    `@`**`ServiceProvider`**`(service=`**`CalculatorService`**`.class)`

    `public class` **`CalculatorImpl`** `implements` **`CalculatorService`** `{`

    `   @Override`

    `public int` **`add`**`(int a, int b) {`

    `      return a + b;`

    `   }`

    `}`


    现在，你为 `Calculator` 类创建测试类 `CalculatorTest`。如果你在模块或整个应用程序上运行测试，稍后将会收到一个 `NullPointerException`，因为
    `lookup()` 调用无法提供服务实现。为了解决这个问题，你可以直接在测试类中提供一个模拟服务。你可以通过 NB JUnit 模块中的 `MockServices`
    类将其添加到全局查找中。在运行测试之前，在一个标有 `@BeforeClass` 注解的方法中执行此操作。在清单 42-9 的示例中，这个方法就是 `setUpClass()`。


    ***清单 42-9.** 包含模拟服务实现的测试类*


    `import org.junit.BeforeClass;`

    `import org.junit.Test;`

    `import static org.junit.Assert.*;`


    `public class` **`CalculatorTest`** `{`


    **`@BeforeClass`**

    `public static void` **`setUpClass`**`() throws Exception {`

    **`MockServices`**`.`**`setServices`**`(CalculatorMockInt.class);`

    `   }`


    **`@Test`**

    `public void` **`testAdd`**`() {`

    `      System.out.println("add");`

    `      Calculator calc = new Calculator();`

    `      assertEquals(calc.add(3, 5), 8);`

    `   }`


    `public static final class` **`CalculatorMockInt`** `implements` **`CalculatorService`**
    `{`

    `      @Override`

    `public int` **`add`**`(int a, int b) {`

    `         return a + b;`

    `      }`

    `   }`

    `}`


    你实现了一个模拟类（必须是 `public` 的），可以通过 `MockServices.setServices()` 将其发布到全局查找中。你使用内部类
    `CalculatorMockInt` 来实现它。这样，你现在就可以独立于其他模块进行测试了。


    使用 `MockServices` 类的另一种方法是在单元测试包中的一个独立类或文件中实现模拟类。然后，你可以像往常一样使用 `@ServiceProvider`
    注解发布它。在测试执行之前，会在目录 *build/test/unit/classes/META-INF/services* 中应用一个相关的条目。（参见清单
    42-10）。


    ***清单 42-10.** 在独立文件中实现和注册模拟系统*


    `import org.openide.util.lookup.ServiceProvider;`


    **`@ServiceProvider`**`(service = CalculatorService.class)`

    `public class` **`CalculatorMockExt`** `implements` **`CalculatorService`** `{`

    `   @Override`

    `public int` **`add`**`(int a, int b) {`

    `      return a + b;`

    `   }`

    `}`


    ![图片](img/square.jpg) **注意** 当删除模拟类或其 `@ServiceProvider` 注解时，注册信息仍然存在于 *META-INF/services*
    目录中。在运行新测试之前，请执行一次“清理”（clean）。

    '
- fmt: "### System Filesystem Tests\n\nWhen running a test, modules can directly access\
    \ the content of your layer file over the System Filesystem (without further configuration\
    \ of the tests). However, it is not possible to access the contents of other modules.\
    \ Anyway, the concerned components should preferably be tested isolated from their\
    \ environment when running unit tests. Now, the question arises as to how to provide\
    \ the needed content to a software module in the System Filesystem without having\
    \ to change to `layer.xml` file itself?\n\nThe answer to this question is that\
    \ your own Filesystem can be added to the System Filesystem during runtime. You\
    \ thus create the configuration (which is necessary for the software module to\
    \ test) in an XML file. You save it together with the test classes. You implement\
    \ a Filesystem implementation there that derives from `MultiFileSystem`. In the\
    \ constructor you can then create an `XMLFileSystem` instance for each XML file.\
    \ You can then pass it to the `MultiFileSystem` that acts as proxy for all `XMLFileSystem`\
    \ instances. This Filesystem implementation is then made public via a `@ServiceProvider`\
    \ annotation in the global Lookup. Thus, the content of this Filesystem is added\
    \ to the System Filesystem.\n\n[Listing 42-11](#Chapter42.html#list_42_11) demonstrates\
    \ the method described above with a simple example. You extend the already known\
    \ class `Math` with another method `multiply()`. This method reads its values\
    \ out of the System Filesystem.\n\n**Listing 42-11.** The Method to Test Which\
    \ Reads Its Values out of the System Filesystem\n\n```\nimport org.openide.filesystems.FileObject;\n\
    import org.openide.filesystems.FileUtil;\n\npublic class Math {\n   public int\
    \ multiply(String aName, String bName) {\n         FileObject file = FileUtil.getConfigFile(\"\
    MyFolder/MyFile\");\n\n         int aVal = (int)file.getAttribute(aName);\n  \
    \       int bVal = (int)file.getAttribute(bName);\n         return aVal * bVal;\n\
    \   }\n}\n```\n\nYou create the configuration needed for this in an XML file (in\
    \ the directory of the unit tests). (See [Listing 42-12](#Chapter42.html#list_42_12).)\
    \ The file is then called `test.xml` here.\n\n**Listing 42-12.** Configuration\
    \ That Will Be Available in the System Filesystem\n\n```\n<filesystem>\n   <folder\
    \ name=\"MyFolder\">\n      <file name=\"MyFile\">\n         <attr name=\"a\"\
    \ intvalue=\"2\"/>\n         <attr name=\"b\" intvalue=\"3\"/>\n      </file>\n\
    \   </folder>\n</filesystem>\n```\n\nDepending on your needs, multiple XML files\
    \ can be provided. You have to create an `XMLFileSystem` instance for each file\
    \ and add them all to a `MultiFileSystem` instance via the `setDelegates()` method.\
    \ For this purpose, you create the class `TestFileSystem` in the directory of\
    \ the unit tests (see [Listing 42-13](#Chapter42.html#list_42_13)).\n\n**Listing\
    \ 42-13.** Filesystem Implementation That Adds Different XML Configurations to\
    \ the System Filesystem\n\n```\nimport org.openide.filesystems.FileSystem;\nimport\
    \ org.openide.filesystems.MultiFileSystem;\nimport org.openide.filesystems.XMLFileSystem;\n\
    import org.openide.util.Exceptions;\nimport org.openide.util.lookup.ServiceProvider;\n\
    \n@ServiceProvider(service=FileSystem.class)\npublic class TestFileSystem extends\
    \ MultiFileSystem {\n   public TestFileSystem() throws Exception {\n      setDelegates(new\
    \ XMLFileSystem(TestFileSystem.class.getResource(\"test.xml\")));\n   }\n}\n```\n\
    \nVia the `@ServiceProvider` annotation you ensure that the `TestFileSystem` class\
    \ is instantiated and added to the System Filesystem when starting. Thus, you\
    \ can now successfully check the method `Math.multiply()` for correctness via\
    \ the test shown in [Listing 42-14](#Chapter42.html#list_42_14).\n\n**Listing\
    \ 42-14.** Testing the Method `multiply()` Which Gets Data from the System Filesystem\n\
    \n```\npublic class MathTest {\n   @Test\n   public void testMultiply() {\n  \
    \    System.out.println(\"testMultiply\");\n      Math instance = new Math();\n\
    \      int expResult = 6;\n      int result = instance.multiply(\"a\", \"b\");\n\
    \      assertEquals(expResult, result);\n   }\n}\n```\n\nYou are now able to separately\
    \ test software modules that read data from other modules via the System Filesystem\
    \ during runtime.\n\n### Checking Test Coverage\n\nFor software quality, it is\
    \ important that (at best) every line of code is run through in a test. This is\
    \ called test coverage. For checking the test coverage, you can use the *Cobertura*\
    \ project. Cobertura detects the coverage and creates clear reports when running\
    \ the test. In these reports, you can see the results in the context of the source\
    \ code for each class. First, you have to install the plugin *Cobertura Module\
    \ Test Coverage* via the Plugin Manager.\n\nCreating this report is easy via an\
    \ Ant target which is integrated into the module build script. Open the folder\
    \ *Important Files* in the project view and then extend the file *Build Script*\
    \ so all available Ant targets are displayed. For creating the reports, call *Run\
    \ Target* in the context menu of the target `coverage-report`.\n\nThe created\
    \ report can be displayed in your browser via the Ant target `display-coverage-report`\
    \ or you can directly open the report in the directory `build\\test\\unit\\cobertura-report`.\
    \ (See [Figure 42-5](#Chapter42.html#fig_42_5).)\n\n![Image](images/4205.jpg)\n\
    \n**Figure 42-5.** Report about the test coverage of the module tests\n\n### Functional\
    \ GUI Tests\n\nFor creating functional tests, NetBeans provides the module Jelly\
    \ Tools Platform (based on Jemmy) besides the already mentioned NB JUnit module.\
    \ Jemmy itself is a library with which automated tests for GUI applications can\
    \ be created. It contains methods that enable actions, which a user can execute\
    \ via Swing or AWT components (such as insert text or press button), to be automated.\
    \ Jemmy provides numerous operator classes with which all Swing components can\
    \ be accessed. Based on this, the Jelly Tools Platform module implements operator\
    \ classes for accessing special NetBeans Platform GUI components such as the main\
    \ application window, the Favorites, the Output window, or different option panels."
  raw: '#### System Filesystem Tests


    When running a test, modules can directly access the content of your layer file
    over the System Filesystem (without further configuration of the tests). However,
    it is not possible to access the contents of other modules. Anyway, the concerned
    components should preferably be tested isolated from their environment when running
    unit tests. Now, the question arises as to how to provide the needed content to
    a software module in the System Filesystem without having to change to *layer.xml*
    file itself?


    The answer to this question is that your own Filesystem can be added to the System
    Filesystem during runtime. You thus create the configuration (which is necessary
    for the software module to test) in an XML file. You save it together with the
    test classes. You implement a Filesystem implementation there that derives from
    `MultiFileSystem`. In the constructor you can then create an `XMLFileSystem` instance
    for each XML file. You can then pass it to the `MultiFileSystem` that acts as
    proxy for all `XMLFileSystem` instances. This Filesystem implementation is then
    made public via a `@ServiceProvider` annotation in the global Lookup. Thus, the
    content of this Filesystem is added to the System Filesystem.


    [Listing 42-11](#Chapter42.html#list_42_11) demonstrates the method described
    above with a simple example. You extend the already known class `Math` with another
    method `multiply()`. This method reads its values out of the System Filesystem.


    ***Listing 42-11.** The Method to Test Which Reads Its Values out of the System
    Filesystem*


    `import org.openide.filesystems.FileObject;`

    `import org.openide.filesystems.FileUtil;`


    `public class` **`Math`** `{`

    `public int` **`multiply`**`(String aName, String bName) {`

    `      FileObject file = FileUtil.`**`getConfigFile`**`("MyFolder/MyFile");`


    `      int aVal = (int)file.`**`getAttribute`**`(aName);`

    `      int bVal = (int)file.`**`getAttribute`**`(bName);`

    `      return aVal * bVal;`

    `   }`

    `}`


    You create the configuration needed for this in an XML file (in the directory
    of the unit tests). (See [Listing 42-12](#Chapter42.html#list_42_12).) The file
    is then called *test.xml* here.


    ***Listing 42-12.** Configuration That Will Be Available in the System Filesystem*


    `<filesystem>`

    `   <folder name="MyFolder">`

    `      <file name="MyFile">`

    `         <attr name="a" intvalue="2"/>`

    `         <attr name="b" intvalue="3"/>`

    `      </file>`

    `   </folder>`

    `</filesystem>`


    Depending on your needs, multiple XML files can be provided. You have to create
    an `XMLFileSystem` instance for each file and add them all to a `MultiFileSystem`
    instance via the `setDelegates()` method. For this purpose, you create the class
    `TestFileSystem` in the directory of the unit tests (see [Listing 42-13](#Chapter42.html#list_42_13)).


    ***Listing 42-13.** Filesystem Implementation That Adds Different XML Configurations
    to the System Filesystem*


    `import org.openide.filesystems.FileSystem;`

    `import org.openide.filesystems.MultiFileSystem;`

    `import org.openide.filesystems.XMLFileSystem;`

    `import org.openide.util.Exceptions;`

    `import org.openide.util.lookup.ServiceProvider;`


    **`@ServiceProvider`**`(service=`**`FileSystem`**`.class)`

    `public class` **`TestFileSystem`** `extends` **`MultiFileSystem`** `{`

    `   public TestFileSystem() throws Exception {`

    **`setDelegates`**`(new` **`XMLFileSystem`**`(TestFileSystem.class.getResource("`**`test.xml`**`")));`


    `   }`

    `}`


    Via the `@ServiceProvider` annotation you ensure that the `TestFileSystem` class
    is instantiated and added to the System Filesystem when starting. Thus, you can
    now successfully check the method `Math.multiply()` for correctness via the test
    shown in [Listing 42-14](#Chapter42.html#list_42_14).


    ***Listing 42-14.** Testing the Method multiply() Which Gets Data from the System
    Filesystem*


    `public class MathTest {`

    `   @Test`

    `   public void testMultiply() {`

    `      System.out.println("testMultiply");`

    `      Math instance = new Math();`

    `      int expResult = 6;`

    `      int result = instance.multiply("a", "b");`

    `      assertEquals(expResult, result);`

    `   }`

    `}`


    You are now able to separately test software modules that read data from other
    modules via the System Filesystem during runtime.


    #### Checking Test Coverage


    For software quality, it is important that (at best) every line of code is run
    through in a test. This is called test coverage. For checking the test coverage,
    you can use the *Cobertura* project. Cobertura detects the coverage and creates
    clear reports when running the test. In these reports, you can see the results
    in the context of the source code for each class. First, you have to install the
    plugin *Cobertura Module Test Coverage* via the Plugin Manager.


    Creating this report is easy via an Ant target which is integrated into the module
    build script. Open the folder *Important Files* in the project view and then extend
    the file *Build Script* so all available Ant targets are displayed. For creating
    the reports, call *Run Target* in the context menu of the target *coverage-report*.


    The created report can be displayed in your browser via the Ant target *display-coverage-report*
    or you can directly open the report in the directory *build\test\unit\cobertura-report*.
    (See [Figure 42-5](#Chapter42.html#fig_42_5).)


    ![Image](images/4205.jpg)


    ***Figure 42-5.** Report about the test coverage of the module tests*


    ### Functional GUI Tests


    For creating functional tests, NetBeans provides the module Jelly Tools Platform
    (based on Jemmy) besides the already mentioned NB JUnit module. Jemmy itself is
    a library with which automated tests for GUI applications can be created. It contains
    methods that enable actions, which a user can execute via Swing or AWT components
    (such as insert text or press button), to be automated. Jemmy provides numerous
    operator classes with which all Swing components can be accessed. Based on this,
    the Jelly Tools Platform module implements operator classes for accessing special
    NetBeans Platform GUI components such as the main application window, the Favorites,
    the Output window, or different option panels.'
  trans: '

    #### 系统文件系统测试


    运行测试时，模块可以直接通过系统文件系统访问层文件的内容（无需进一步配置测试）。但是，无法访问其他模块的内容。无论如何，在运行单元测试时，相关组件最好与其环境隔离进行测试。现在问题来了：如何在不修改
    *layer.xml* 文件本身的情况下，为系统文件系统中的软件模块提供所需内容？


    这个问题的答案是，你可以在运行时将自己的文件系统添加到系统文件系统中。因此，你可以在一个 XML 文件中创建配置（这是软件模块测试所必需的）。将其与测试类保存在一起。在那里实现一个派生自
    `MultiFileSystem` 的文件系统实现。在构造函数中，你可以为每个 XML 文件创建一个 `XMLFileSystem` 实例。然后，你可以将其传递给充当所有
    `XMLFileSystem` 实例代理的 `MultiFileSystem`。然后，通过全局 Lookup 中的 `@ServiceProvider` 注解将此文件系统实现公开。这样，此文件系统的内容就会被添加到系统文件系统中。


    清单 42-11 通过一个简单的示例演示了上述方法。你为已知的 `Math` 类扩展一个 `multiply()` 方法。该方法从系统文件系统中读取其值。


    ***清单 42-11.** 从系统文件系统读取值的待测试方法*


    `import org.openide.filesystems.FileObject;`

    `import org.openide.filesystems.FileUtil;`


    `public class` **`Math`** `{`

    `public int` **`multiply`**`(String aName, String bName) {`

    `      FileObject file = FileUtil.`**`getConfigFile`**`("MyFolder/MyFile");`


    `      int aVal = (int)file.`**`getAttribute`**`(aName);`

    `      int bVal = (int)file.`**`getAttribute`**`(bName);`

    `      return aVal * bVal;`

    `   }`

    `}`


    你在一个 XML 文件（位于单元测试目录中）中创建此测试所需的配置。（参见清单 42-12）。该文件在此处命名为 *test.xml*。


    ***清单 42-12.** 将在系统文件系统中可用的配置*


    `<filesystem>`

    `   <folder name="MyFolder">`

    `      <file name="MyFile">`

    `         <attr name="a" intvalue="2"/>`

    `         <attr name="b" intvalue="3"/>`

    `      </file>`

    `   </folder>`

    `</filesystem>`


    根据你的需要，可以提供多个 XML 文件。你必须为每个文件创建一个 `XMLFileSystem` 实例，并通过 `setDelegates()` 方法将它们全部添加到一个
    `MultiFileSystem` 实例中。为此，你在单元测试目录中创建 `TestFileSystem` 类（参见清单 42-13）。


    ***清单 42-13.** 将不同 XML 配置添加到系统文件系统的文件系统实现*


    `import org.openide.filesystems.FileSystem;`

    `import org.openide.filesystems.MultiFileSystem;`

    `import org.openide.filesystems.XMLFileSystem;`

    `import org.openide.util.Exceptions;`

    `import org.openide.util.lookup.ServiceProvider;`


    **`@ServiceProvider`**`(service=`**`FileSystem`**`.class)`

    `public class` **`TestFileSystem`** `extends` **`MultiFileSystem`** `{`

    `   public TestFileSystem() throws Exception {`

    **`setDelegates`**`(new` **`XMLFileSystem`**`(TestFileSystem.class.getResource("`**`test.xml`**`")));`


    `   }`

    `}`


    通过 `@ServiceProvider` 注解，你确保 `TestFileSystem` 类在启动时被实例化并添加到系统文件系统中。因此，你现在可以通过清单
    42-14 中所示的测试成功检查 `Math.multiply()` 方法的正确性。


    ***清单 42-14.** 测试从系统文件系统获取数据的 multiply() 方法*


    `public class MathTest {`

    `   @Test`

    `   public void testMultiply() {`

    `      System.out.println("testMultiply");`

    `      Math instance = new Math();`

    `      int expResult = 6;`

    `      int result = instance.multiply("a", "b");`

    `      assertEquals(expResult, result);`

    `   }`

    `}`


    现在，你可以单独测试那些在运行时通过系统文件系统从其他模块读取数据的软件模块了。


    #### 检查测试覆盖率


    对于软件质量而言，重要的是（最好）每一行代码都能在测试中被执行到。这被称为测试覆盖率。为了检查测试覆盖率，你可以使用 *Cobertura* 项目。Cobertura
    可以检测覆盖率，并在运行测试时生成清晰的报告。在这些报告中，你可以在每个类的源代码上下文中查看结果。首先，你需要通过插件管理器安装 *Cobertura Module
    Test Coverage* 插件。


    通过集成到模块构建脚本中的 Ant 目标，可以轻松创建此报告。在项目视图中打开 *Important Files* 文件夹，然后扩展 *Build Script*
    文件，以便显示所有可用的 Ant 目标。要创建报告，请在 *coverage-report* 目标的上下文菜单中调用 *Run Target*。


    创建的报告可以通过 Ant 目标 *display-coverage-report* 在你的浏览器中显示，或者你可以直接在目录 *build\test\unit\cobertura-report*
    中打开该报告。（参见图 42-5）。


    ![Image](img/4205.jpg)


    ***图 42-5.** 模块测试的测试覆盖率报告*


    ### 功能 GUI 测试


    为了创建功能测试，NetBeans 除了前面提到的 NB JUnit 模块外，还提供了 Jelly Tools Platform 模块（基于 Jemmy）。Jemmy
    本身是一个库，可以用它来创建 GUI 应用程序的自动化测试。它包含一些方法，能够自动化用户通过 Swing 或 AWT 组件（例如输入文本或按下按钮）可以执行的操作。Jemmy
    提供了大量的操作符类，通过这些类可以访问所有 Swing 组件。在此基础上，Jelly Tools Platform 模块实现了用于访问特定 NetBeans
    平台 GUI 组件（如主应用程序窗口、收藏夹、输出窗口或不同的选项面板）的操作符类。

