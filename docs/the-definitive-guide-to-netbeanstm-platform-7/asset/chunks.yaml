- fmt: "#### Saving the Playlist\n\nYou may have already noticed that the content\
    \ of the playlist is lost when restarting the application. This is because the\
    \ window system stores the playlist itself, but is unable to store the contained\
    \ data. In other words, you have to extend the `load` and `store` functions for\
    \ your application. A good approach is to store the lists in an embedded database\
    \ (Java DB, for example, works very well for this). This client-side database\
    \ system was already used in the “Java DB” section in [Chapter 26](#Chapter26.html#ch26).\
    \ You integrate it into your application using a module, and thus you can use\
    \ the database (in addition to the use for playlists) for other purposes.\n\n\
    The module is a library wrapper module, and is created like any other module—via\
    \ *File ![Image](images/U001.jpg) New Project... ![Image](images/U001.jpg) NetBeans\
    \ Modules ![Image](images/U001.jpg) Library Wrapper Module*. You add the files\
    \ `lib/derby.jar` and `lib/derbyLocale_de_DE.jar` to it from the Java DB distribution.\
    \ (Further information on how to integrate and use Java DB, as well as where to\
    \ obtain a distribution, can be found in [Chapter 26](#Chapter26.html#ch26).)\
    \ Name the module *Java DB* and use `org.apache.derby` for the code name base.\
    \ After creating the module, add a module installer, which is used to initialize\
    \ centralized access. Such an installer can be created via *File ![Image](images/U001.jpg)\
    \ New File... ![Image](images/U001.jpg) Module Development ![Image](images/U001.jpg)\
    \ Installer / Activator*. Afterward, rename it with *Refactor ![Image](images/U001.jpg)\
    \ Rename...* to *Database*.\n\nIn the `restored()` method, called while starting\
    \ the module, you set the system directory of Java DB and execute the `initTables()`\
    \ method. This method will first check whether the table `playlist` exists by\
    \ performing a SELECT query. If the table does not exist yet, a `SQLException`\
    \ will be thrown, which you will catch in order to then create the table. Using\
    \ the `getConnection()` method, you obtain a connection to the database. The `close()`\
    \ method allows the database system to be correctly shut down after the application\
    \ is finished. (See [Listing 44-22](#Chapter44.html#list_44_22).)\n\n***Listing\
    \ 44-22.** The Database Class Initializes the Database and Provides a Central\
    \ Connection.*\n\n```\npackage org.apache.derby;\nimport java.sql.Connection;\n\
    import java.sql.DriverManager;\nimport java.sql.SQLException;\nimport java.sql.Statement;\n\
    import org.openide.modules.ModuleInstall;\nimport org.openide.util.Exceptions;\n\
    \npublic class Database extends ModuleInstall {\nprivate static Connection conn\
    \ = null;\n\npublic void restored() {\n      System.setProperty(\"derby.system.home\"\
    ,\n         System.getProperty(\"netbeans.user\",\n         System.getProperty(\"\
    user.home\")) + \"/databases\");\ninitTables();\n   }\n\nprivate void initTables()\
    \ {\n      try {\n         Statement stmt = getConnection().createStatement();\n\
    \         stmt.executeQuery(\"SELECT id FROM playlist\");\n         stmt.close();\n\
    \      } catch(SQLException e) {\n         try {\n            Statement stmt =\
    \ getConnection().createStatement();\n            stmt.execute(\"CREATE TABLE\
    \ playlist (\" +\n\"id VARCHAR(12),\" +\n\"filename VARCHAR(100))\");\n      \
    \      stmt.close();\n         } catch(SQLException ex) {\n            Exceptions.printStackTrace(ex);\n\
    \         }\n      }\n   }\n\npublic static Connection getConnection() throws\
    \ SQLException{\n      if(conn == null || conn.isClosed()) {\nconn = DriverManager.getConnection(\n\
    \            \"jdbc:derby:Mp3Manager;create=true\",\n            \"user\", \"\
    password\");\n      }\n      return conn;\n   }\n\npublic void close() {\n   \
    \   try {\n        conn.close();\n        DriverManager.getConnection(\"jdbc:derby:;shutdown=true\"\
    );\n      } catch (SQLException ex) {}\n   }\n}\n```\n\nDo not forget to make\
    \ the `org.apache.derby` package containing the `Database` class public. To enable\
    \ the *Playlist* module to access the database, specify a dependency to the Java\
    \ DB module. As you already know, the nodes for a view have to be provided by\
    \ the class `NodeContainer`. Knowing this, it would be best to just extend this\
    \ class so it reads the content of the playlist from the database for itself and\
    \ can store it when the application closes. To do so, add the methods `load()`\
    \ and `update()` to the `NodeContainer` class. The `load()` method will perform\
    \ a query to read all entries for a particular playlist. When the `getNodeDelegate()`\
    \ method is used, each entry will result in an `Mp3DataObject` that delivers its\
    \ corresponding node. (See [Listing 44-23](#Chapter44.html#list_44_23).)\n\n***Listing\
    \ 44-23.** The load() Method Reads All Entries from the Database and Adds Them\
    \ to the Container.*\n\n```\npackage com.hboeck.mp3manager.playlist;\nimport java.sql.PreparedStatement;\n\
    import java.sql.ResultSet;\nimport java.sql.SQLException;\nimport org.apache.derby.Database;\n\
    ...\npublic final class NodeContainer extends Index.ArrayChildren {\n   ...\n\
    public void load(String id) {\n      try {\n         String sql=\"SELECT filename\
    \ FROM playlist WHERE id = ?\";\nPreparedStatement stmt = Database.getConnection().prepareStatement(sql);\n\
    \         stmt.setString(1, id);\n         ResultSet rs = stmt.executeQuery();\n\
    \         while (rs.next()) {\n            try {\n               add(Mp3DataObject.find(rs.getString(1)).getNodeDelegate());\n\
    \            } catch(Exception e) {}\n         }\n         rs.close();\n     \
    \    stmt.close();\n      } catch(SQLException e) {\n         LOG.severe(e.toString());\n\
    \      }\n   }\n```\n\nTo store the playlist, use the `update()` method. First,\
    \ remove all entries of this specific playlist to avoid lost entries. Then use\
    \ the `getNodes()` method to obtain all nodes of this container and store the\
    \ path of the related MP3 file for each node. (See [Listing 44-24](#Chapter44.html#list_44_24).)\n\
    \n***Listing 44-24.** The update() Method Stores the Container's Entries in the\
    \ Database.*\n\n```\npublic void update (String id) {\n      try {\nString sql\
    \ = \"DELETE FROM playlist WHERE id = ?\";\nPreparedStatement stmt = Database.getConnection().prepareStatement(sql);\n\
    \         stmt.setString(1, id);\n         stmt.execute();\n         stmt.close();\n\
    \         sql=\"INSERT INTO playlist (id, filename) VALUES (?, ?)\";\nstmt = Database.getConnection().prepareStatement(sql);\n\
    \         for(Node n : getNodes()) {\n            stmt.setString(1, id);\n   \
    \         stmt.setString(2, n.getLookup().lookup(Mp3DataObject.class).\n     \
    \          getPrimaryFile().getPath());\n            stmt.execute();\n       \
    \  }\n         stmt.close();\n      } catch(Exception e) {\n         LOG.severe(e.toString());\n\
    \      }\n   }\n}\n```\n\nYou might ask who is calling these methods. The answer\
    \ can be found if you open the `Playlist` class, since the base class, `TopComponent`,\
    \ defines the `componentOpened()` method, called while opening the window. Here,\
    \ you determine the unique ID of the top component, at first, while in a subsequent\
    \ step you call the container's `load()` method with this ID. The `writeExternal()`\
    \ method of the superclass is used to store data while the application is closing.\
    \ Consequently, you will override this method and invoke the `update()` method\
    \ with the ID you stored as a private variable. (See [Listing 44-25](#Chapter44.html#list_44_25).)\n\
    \n***Listing 44-25.** The Playlist Class Is Responsible for Loading and Storing\
    \ the Container's Content.*"
