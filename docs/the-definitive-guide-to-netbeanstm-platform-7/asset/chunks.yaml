    Similar to the `SessionFactory` in the native Hibernate interface, an `EntityManagerFactory`
    is available with the Java Persistence API. This factory is created for a certain
    persistence unit. So `EntityManager`s, which were produced by this factory, are
    able to save and manage the objects in the defined database which are defined
    in the referring persistence unit. Normally, an `EntityManagerFactory` is created
    only once and held during the whole application runtime like the `SessionFactory`.
    You get an instance of such a factory over the bootstrap class `Persistence` by
    calling the following:


    **`EntityManagerFactory`** `emf = Persistence.`**`createEntityManagerFactory`**`("HibernateJPA");`


    The transferred parameter `HibernateJPA` defines the name of one persistence unit
    defined in the file *persistence.xml*. The factory is produced for the persistence
    unit.


    The equivalent of a session—which to some extent represents a wrapper of a JDBC
    link—is up to the JPA in the class `EntityManager`. Through this manager you can
    access the database and save, delete, find, and query objects there. Usually,
    one `EntityManager` is used for a certain process. However, it is a bad practice
    if you create a new `EntityManager` for each query or action. Hence it is important
    to choose an adequate runtime of an `EntityManager` depending on the application
    context. Since there are only a few trivial database actions in this example,
    for simplicity''s sake let''s only use one `EntityManager` for the whole runtime.
    In practice it does not make sense to use an `EntityManager` for each and every
    action.


    As with the `SessionFactory`, it makes sense to manage the `EntityManagerFactory`
    in one module installer class (see [Listing 28-4](#Chapter28.html#list_28_4)).
    This way you can also easily and properly finish having the factory shut down
    the application.


