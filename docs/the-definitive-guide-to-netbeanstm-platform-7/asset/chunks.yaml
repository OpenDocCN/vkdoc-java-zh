- fmt: "#### Top Component\n\nNow you can begin creating the playlist. To do so, you\
    \ need a top component again. You will create the top component using the Window\
    \ wizard via *File ![Image](images/U001.jpg) New File... ![Image](images/U001.jpg)\
    \ Module Development ![Image](images/U001.jpg) Window*. You assign the top component\
    \ to the `editor` mode and assign the prefix `Playlist`. Thus, you have already\
    \ created the basic structure of the playlist. A top component created this way\
    \ is designed as a singleton instance by default. This means that only one window\
    \ of that type can be opened. Since you want to manage multiple playlists at the\
    \ same time, though, you must change this. To do so, you just have to delete the\
    \ `preferredID` attribute of the `TopComponent.OpenActionRegistration` annotation.\
    \ So, a new `PlaylistTopComponent` instance is created by the corresponding action\
    \ with each invocation. (See [Figure 44-6](#Chapter44.html#fig_44_6)).\n\n```\n\
    package com.hboeck.mp3manager.playlist;\nimport com.hboeck.mp3manager.filetype.Mp3DataObject;\n\
    import com.hboeck.mp3manager.services.player.Mp3Player;\nimport org.openide.explorer.ExplorerManager;\n\
    import org.openide.explorer.ExplorerUtils;\nimport org.openide.nodes.AbstractNode;\n\
    \n@TopComponent.Description( preferredID = \"PlaylistTopComponent\",\n   iconBase\
    \ = \"com/hboeck/mp3manager/playlist/playlist.png\",\n   persistenceType = TopComponent.PERSISTENCE_ALWAYS)\n\
    @TopComponent.Registration( mode = \"editor\",\n   openAtStartup = false)\n@ActionID(\
    \ category = \"Window\",\n   id = \"com.hboeck.mp3manager.playlist.PlaylistTopComponent\"\
    )\n@ActionReference(path = \"Menu/Window\" /*, position = 333 */)\n@TopComponent.OpenActionRegistration(\n\
    \   displayName = \"#CTL_PlaylistAction\")\npublic final class PlaylistTopComponent\
    \ extends TopComponent\nimplements ExplorerManager.Provider {\n\n   private static\
    \ final String PREF_CURRENTDIR = \"currentdir\";\n   private Preferences PREF\
    \ = NbPreferences.forModule(PlaylistTopComponent.class)\nprivate ExplorerManager\
    \ manager   = new ExplorerManager();\nprivate NodeContainer   container = new\
    \ NodeContainer();\nprivate PlaylistView    playlist  = new PlaylistView();\n\n\
    public PlaylistTopComponent() {\n      initComponents();\n      setName(NbBundle.getMessage(PlaylistTopComponent.class,\
    \ \"CTL_Playlist\"));\n      setToolTipText(NbBundle.getMessage(PlaylistTopComponent.class,\
    \ \"CTL_Playlist\"));\nmanager.setRootContext(new AbstractNode(container));\n\
    \      playlist.setDefaultActionProcessor(new Play());\nassociateLookup(ExplorerUtils.createLookup(manager,\
    \ getActionMap()));\n   }\n\n   private final class Play implements ActionListener\
    \ {\n      @Override\n      public void actionPerformed(ActionEvent e) {\n   \
    \      Mp3Player.getDefault().play(\n            container.getRemaining(manager.getSelectedNodes()[0]));\n\
    \      }\n   }\n\npublic ExplorerManager getExplorerManager() {\n      return\
    \ manager;\n   }\n   ...\n}\n```\n\n![Image](images/4406.jpg)\n\n***Figure 44-6.**\
    \ Playlist top component*\n\nYou enhance the top component by adding a toolbar\
    \ with three buttons, using the Form Designer. These buttons are used to add and\
    \ remove files, and to name the playlist. Finally, you just add a panel that uses\
    \ the `BorderLayout` and occupies the whole area of the top component. This panel\
    \ is used as the container for the node view.\n\nManaging the nodes in your `PlaylistView`\
    \ is done by an explorer manager. You implement the `ExplorerManager.Provider`\
    \ interface, create a private instance of the `ExplorerManager`, and return this\
    \ manager in the `getExplorerManager()` method. Additionally, you create a `NodeContainer`\
    \ instance. Every manager has a root context, which is a node that is used as\
    \ root for all the other nodes. This context is set by the method `setRootContext()`.\
    \ You will use an `AbstractNode` as the root context (because you do not want\
    \ to display it anyway) and pass it to the container carrying the MP3 files of\
    \ the playlist.\n\nFinally, you create a `PlaylistView` instance to which you\
    \ pass the action to be performed when double-clicking an MP3 file in the playlist.\
    \ To pass the action, use the `setDefaultActionProcessor()` method. Your default\
    \ behavior is to play back the complete list starting at the selected file. Therefore,\
    \ the method `getRemaining()` delivers all files still remaining in the list.\
    \ Finally, the view just needs to be added to the panel you already created in\
    \ a previous step using the Form Designer. To do so, call *Customize Code* from\
    \ the context menu of the panel and insert the following lines after the layout\
    \ initialization (pre-population):\n\n```\npanel.add(playlist, BorderLayout.CENTER);\n\
    ```\n\nOf course, in the end, you should not forget the buttons in the toolbar\
    \ of the playlist, since they are used to add and remove MP3 files by invoking\
    \ a file chooser dialog, as well as to rename the playlist itself. It should be\
    \ possible to add files in a way that multiple files and directories can be selected\
    \ via the `addActionPerformed()` method. Therefore, you add the method `addAllFiles()`,\
    \ which recursively parses the selection and adds all files to the node container.\
    \ Removing files (done by the `removeActionPerformed()` method) is very easy,\
    \ because the `ExplorerManager` returns all selected entries, and the `remove()`\
    \ method of the container removes an array of nodes in one step. Renaming the\
    \ playlist (invoked by the method `renameActionPerformed()`) is easy as well,\
    \ using the Dialogs API. (See [Listing 44-19](#Chapter44.html#list_44_19)).\n\n\
    ***Listing 44-19.** Actions to Edit the Playlist*\n\n```\npublic final class PlaylistTopComponent\
    \ extends TopComponent\nimplements ExplorerManager.Provider {\n   ...\nprivate\
    \ void addActionPerformed(ActionEvent evt) {\n      JFileChooser fc = new JFileChooser(PREF.get(PREF_CURRENTDIR,\
    \ \"\"));\n      fc.setFileSelectionMode(JFileChooser.FILES_AND_DIRECTORIES);\n\
    \      fc.setFileFilter(new FileNameExtensionFilter(\"MP3 Files\", \"mp3\"));\n\
    \      fc.setMultiSelectionEnabled(true);\n      if(fc.showOpenDialog(this) ==JFileChooser.APPROVE_OPTION)\
    \ {\naddAllFiles(fc.getSelectedFiles());\n         PREF.put(PREF_CURRENTDIR,\n\
    \            fc.getCurrentDirectory().getAbsolutePath());\n      }\n   }\n\nprivate\
    \ void addAllFiles(File[] files) {\n      for(File f : files) {\n         if(f.isFile())\
    \ {\n            try {\n               container.add(Mp3DataObject.find(f).getNodeDelegate());\n\
    \            } catch(Exception e) {}\n         } else if(f.isDirectory()) {\n\
    \  addAllFiles(f.listFiles());\n         }\n      }\n   }\n\nprivate void removeActionPerformed(ActionEvent\
    \ evt) {\n      container.remove(manager.getSelectedNodes());\n   }\n\nprivate\
    \ void renameActionPerformed(ActionEvent evt) {\n      NotifyDescriptor.InputLine\
    \ nf = new NotifyDescriptor.InputLine(\n            \"New Playlist Name\", \"\
    Rename\");\n      nf.setInputText(getName());\n      if(DialogDisplayer.getDefault().notify(nf)\
    \ == NotifyDescriptor.OK_OPTION) {\nsetName(nf.getInputText());\n      }\n   }\n\
    }\n```\n\nNow you can start the application, open one or multiple playlists, and\
    \ add MP3 files via the toolbar (see [Figure 44-7](#Chapter44.html#fig_44_7)).\n\
    \n![Image](images/4407.jpg)\n\n***Figure 44-7.** Using the toolbar playlist, files\
    \ can be added to the playlist.*\n\nIf you try to drag files from the Media Library\
    \ window to the playlist you will quickly recognize that this is not possible.\
    \ This is not possible, yet, because your `Mp3DataNode` class (containing the\
    \ objects you want to transfer between windows) and the `PlaylistView` class are\
    \ not yet prepared for dragging actions. We will cover this aspect of simple and\
    \ intuitive usage in the next section."
