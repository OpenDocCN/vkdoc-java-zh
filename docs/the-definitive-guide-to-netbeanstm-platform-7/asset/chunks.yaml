    MIME type is provided (with which the corresponding navigator panel can be found)
    the `NavigatorLookupHint` interface can be implemented by the component which
    displays the context. The interface can then be provided via the local Lookup.
    This interface just specifies a method with which a MIME type can be returned.
    Thus, the navigator module is able to find a panel if no file with a MIME type
    exists.


