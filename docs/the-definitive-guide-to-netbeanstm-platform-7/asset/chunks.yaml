- fmt: "# Manually Creating Data Object\n\nUsually, a data object does not have to\
    \ be created explicitly, but is created by a factory on demand. However, you have\
    \ the possibility of creating a `DataObject` for a given `FileObject` with the\
    \ static `find()` method of the `DataObject` class:\n\n```\nFileObject myFile\
    \ = …\ntry {\n   DataObject obj = DataObject.find(myFile);\n} catch(DataObjectNotFoundException\
    \ ex) {\n   // no loader available for this file type\n}\n```\n\nIn that process,\
    \ the `FileObject` is passed. A factory is searched for its file type. If one\
    \ is found, it creates a `DataObject` and returns it. Otherwise, a `DataObjectNotFoundException`\
    \ is thrown, in case no factory is registered for this file type.\n\n## Summary\n\
    \nIn this chapter, you learned about two of the four most important NetBeans APIs,\
    \ together with their dependencies. You learned about these by means of an example\
    \ with MP3 files. Of the four, the File Systems API is found on the lowest level,\
    \ as a generic abstraction layer over any kind of data. On top of that, the Data\
    \ Systems API handles the logic relating to the data abstracted by the File Systems\
    \ API; for example, you can use the Data Systems API to connect an MP3 file with\
    \ the functionality that plays it.\n\n# C H A P T E R 8\n\n# Tips and Tricks\n\
    \nThis chapter will cover two topics of general importance. The first section\
    \ will introduce you to the possibilities for doing tasks on specific NetBeans\
    \ Platform lifecyle events. The second section will look at how logging is typically\
    \ done within a NetBeans Platform application.\n\n## Lifecycle of the NetBeans\
    \ Platform\n\nThe NetBeans Platform provides different opportunities to react\
    \ on certain events of the lifecycle and to trigger them yourself.\n\n### Tasks\
    \ on Starting the Platform\n\nThe NetBeans Platform offers an extension point\
    \ named `WarmUp` for executing asynchronous tasks when starting applications:\n\
    \n```\n<folder name=\"WarmUp\">\n   <file name=\"com-galileo-netbeans-module-MyWarmUpTask.instance\"\
    />\n</folder>\n```\n\nYou can add any instances (that implement the `Runnable`\
    \ interface) to this extension point in your layer file:\n\n```\npublic class\
    \ MyWarmUpTask implements Runnable{\npublic void run() {\n      // do something\
    \ on application startup\n   }\n}\n```\n\nCritical tasks—for example, tasks that\
    \ are necessary as module-starting conditions—must not be started here. These\
    \ tasks are executed asynchronously at the start of applications, which means\
    \ there is no guarantee about when the task is started or finished. In this case,\
    \ a module installer should be used (see [Chapter 3](#Chapter03.html#ch3)).\n\n\
    ### Tasks on Ending the Platform\n\nWhen a NetBeans Platform application is shut\
    \ down, all user-specific settings (such as the information about open `top component`s,\
    \ application window size, and toolbars) are saved to the application user directory.\
    \ In addition, all modules that implement a module installer (see [Chapter 3](#Chapter03.html#ch3))\
    \ are asked if the application can be shut down. Thus, an application is not only\
    \ closed, but it is shut down properly. Usually, an application is closed using\
    \ the menu or the close button in the title bar. In some cases, you might close\
    \ an application programmatically. This could be an option if wrong data is entered\
    \ in a login dialog, and the application should then be closed. In this case,\
    \ you must not or cannot—as usual in Java applications—close the application using\
    \ `System.exit()`. The process for shutting down an application is specified by\
    \ the Utilities API in the global service `LifecycleManager`. The NetBeans `Core`\
    \ module offers a service provider for that purpose, responsible for executing\
    \ the tasks mentioned earlier. This standard implementation of the `LifecycleManager`\
    \ can be obtained by calling the `getDefault()` method. Close an application by\
    \ calling the following line:\n\n```\nLifecycleManager.getDefault().exit();\n\
    ```\n\nSince this `LifecycleManager` is implemented as a service, you can provide\
    \ your own implementation of this abstract class. This does not mean that the\
    \ standard implementation of the NetBeans Platform is no longer available—you\
    \ simply need to call it. This way, it is possible to execute custom tasks while\
    \ the application is closed. [Listing 8-1](#Chapter08.html#list_8_1) demonstrates\
    \ how to call the standard implementation after executing custom tasks and shut\
    \ down applications properly.\n\n***Listing 8-1.** A Custom LifecycleManager Implementation,\
    \ Which Calls the Standard Implementation*\n\n```\nimport org.openide.LifecycleManager;\n\
    \npublic class MyLifecycleManager extends LifecycleManager {\n   @Override\npublic\
    \ void saveAll() {\n      for(LifecycleManager manager :\n         Lookup.getDefault().lookupAll(LifecycleManager.class))\
    \ {\n         if(manager != this) { /* skip our own instance */\n  manager.saveAll();\n\
    \         }\n      }\n   }\n   @Override\n   public void exit() {\n      // do\
    \ application specific shutdown tasks\n      for(LifecycleManager manager :\n\
    \         Lookup.getDefault().lookupAll(LifecycleManager.class)) {\n         if(manager\
    \ != this) { /* skip our own instance */\nmanager.exit();\n         }\n      }\n\
    \   }\n}\n```\n\nThis implementation must be registered as a service provider.\
    \ It is important to note that a position must be declared to ensure that the\
    \ custom implementation is delivered and called first by the Lookup. The standard\
    \ `LifecycleManager` would be called only if this were not done. We register the\
    \ class with the following annotation:\n\n```\n@ServiceProvider(service=LifecycleManager.class,\
    \ position=1)\n```\n\n### Restart of the Platform\n\nYou can not only finish,\
    \ but also restart your application by means of the lifecycle manager of the NetBeans\
    \ Platform. For this purpose, the `LifecycleManager` class offers the method `markForRestart()`.\
    \ If this is called before finishing, a restart is realized:\n\n```\nLifecycleManager.getDefault().markForRestart();\n\
    LifecycleManager.getDefault().exit();\n```\n\n## Logging\n\nA very important and\
    \ helpful (but often disregarded) topic is logging. Logging is the practice of\
    \ recording status, warning, and error messages. Logging in the NetBeans Platform\
    \ is based on the Java Logging API.\n\n### Logger\n\nLog output is recorded by\
    \ the Logging API using a `Logger` object. Typically, different `Logger` instances\
    \ are used for specific components. You get an instance of a `Logger` via the\
    \ factory method `getLogger()`. You can also use a global logger, but you should\
    \ use a named component-specific logger whenever possible. This way, different\
    \ loggers can be individually turned on or off, which is very helpful when searching\
    \ for bugs. A named logger is obtained by the following call:\n\n```\nLogger log\
    \ = Logger.getLogger(MyClass.class.getName());\n```\n\nTypically, the full name\
    \ of the class that creates the log output is used as the name for the logger.\
    \ This name is obtained from the `Class` method `getName()`. If a logger already\
    \ exists for this name, it is returned. The global logger can be obtained using\
    \ the name `Logger.GLOBAL_LOGGER_NAME`.\n\nRecord log output (of a defined `Level`)\
    \ using the `log()` methods in the `Logger` class. The following log levels are\
    \ provided in the `Level` class:\n\n* `FINEST`\n* `FINER`\n* `FINE`\n* `CONFIG`\n\
    * `INFO`\n* `WARNING`\n* `SEVERE`\n\nFor convenience, the methods `finest()`,\
    \ `finer()`, `fine()`, `config()`, `info()`, `warning()`, and `severe()` are also\
    \ provided; these record the given message at the declared level."
  raw: '#### Manually Creating Data Object


    Usually, a data object does not have to be created explicitly, but is created
    by a factory on demand. However, you have the possibility of creating a `DataObject`
    for a given `FileObject` with the static `find()` method of the `DataObject` class:


    `FileObject myFile = …`

    `try {`

    `   DataObject obj = DataObject.`**`find`**`(myFile);`

    `} catch(DataObjectNotFoundException ex) {`

    `   // no loader available for this file type`

    `}`


    In that process, the `FileObject` is passed. A factory is searched for its file
    type. If one is found, it creates a `DataObject` and returns it. Otherwise, a
    `DataObjectNotFoundException` is thrown, in case no factory is registered for
    this file type.


    ### Summary


    In this chapter, you learned about two of the four most important NetBeans APIs,
    together with their dependencies. You learned about these by means of an example
    with MP3 files. Of the four, the File Systems API is found on the lowest level,
    as a generic abstraction layer over any kind of data. On top of that, the Data
    Systems API handles the logic relating to the data abstracted by the File Systems
    API; for example, you can use the Data Systems API to connect an MP3 file with
    the functionality that plays it.


    ## C H A P T E R  8


    ## Tips and Tricks


    This chapter will cover two topics of general importance. The first section will
    introduce you to the possibilities for doing tasks on specific NetBeans Platform
    lifecyle events. The second section will look at how logging is typically done
    within a NetBeans Platform application.


    ### Lifecycle of the NetBeans Platform


    The NetBeans Platform provides different opportunities to react on certain events
    of the lifecycle and to trigger them yourself.


    #### Tasks on Starting the Platform


    The NetBeans Platform offers an extension point named `WarmUp` for executing asynchronous
    tasks when starting applications:


    `<folder name="`**`WarmUp`**`">`

    `   <file name="com-galileo-netbeans-module-MyWarmUpTask.instance"/>`

    `</folder>`


    You can add any instances (that implement the `Runnable` interface) to this extension
    point in your layer file:


    `public class MyWarmUpTask implements` **`Runnable`**`{`

    `public void` **`run`**`() {`

    `      // do something on application startup`

    `   }`

    `}`


    Critical tasks—for example, tasks that are necessary as module-starting conditions—must
    not be started here. These tasks are executed asynchronously at the start of applications,
    which means there is no guarantee about when the task is started or finished.
    In this case, a module installer should be used (see [Chapter 3](#Chapter03.html#ch3)).


    #### Tasks on Ending the Platform


    When a NetBeans Platform application is shut down, all user-specific settings
    (such as the information about open `top component`s, application window size,
    and toolbars) are saved to the application user directory. In addition, all modules
    that implement a module installer (see [Chapter 3](#Chapter03.html#ch3)) are asked
    if the application can be shut down. Thus, an application is not only closed,
    but it is shut down properly. Usually, an application is closed using the menu
    or the close button in the title bar. In some cases, you might close an application
    programmatically. This could be an option if wrong data is entered in a login
    dialog, and the application should then be closed. In this case, you must not
    or cannot—as usual in Java applications—close the application using `System.exit()`.
    The process for shutting down an application is specified by the Utilities API
    in the global service `LifecycleManager`. The NetBeans `Core` module offers a
    service provider for that purpose, responsible for executing the tasks mentioned
    earlier. This standard implementation of the `LifecycleManager` can be obtained
    by calling the `getDefault()` method. Close an application by calling the following
    line:


    `LifecycleManager.getDefault().exit();`


    Since this `LifecycleManager` is implemented as a service, you can provide your
    own implementation of this abstract class. This does not mean that the standard
    implementation of the NetBeans Platform is no longer available—you simply need
    to call it. This way, it is possible to execute custom tasks while the application
    is closed. [Listing 8-1](#Chapter08.html#list_8_1) demonstrates how to call the
    standard implementation after executing custom tasks and shut down applications
    properly.


    ***Listing 8-1.** A Custom LifecycleManager Implementation, Which Calls the Standard
    Implementation*


    `import org.openide.LifecycleManager;`


    `public class MyLifecycleManager extends` **`LifecycleManager`** `{`

    `   @Override`

    `public void` **`saveAll`**`() {`

    `      for(LifecycleManager manager :`

    `         Lookup.getDefault().lookupAll(LifecycleManager.class)) {`

    `         if(manager != this) { /* skip our own instance */`

    **`  manager.saveAll();`**

    `         }`

    `      }`

    `   }`

    `   @Override`

    `   public void` exit`() {`

    `      // do application specific shutdown tasks`

    `      for(LifecycleManager manager :`

    `         Lookup.getDefault().lookupAll(LifecycleManager.class)) {`

    `         if(manager != this) { /* skip our own instance */`

    **`manager.exit();`**

    `         }`

    `      }`

    `   }`

    `}`


    This implementation must be registered as a service provider. It is important
    to note that a position must be declared to ensure that the custom implementation
    is delivered and called first by the Lookup. The standard `LifecycleManager` would
    be called only if this  were not done. We register the class with the following
    annotation:


    `@ServiceProvider(service=LifecycleManager.class, position=1)`


    #### Restart of the Platform


    You can not only finish, but also restart your application by means of the lifecycle
    manager of the NetBeans Platform. For this purpose, the `LifecycleManager` class
    offers the method `markForRestart()`. If this is called before finishing, a restart
    is realized:


    `LifecycleManager.getDefault().` **`markForRestart`**`();`

    `LifecycleManager.getDefault().exit();`


    ### Logging


    A very important and helpful (but often disregarded) topic is logging. Logging
    is the practice of recording status, warning, and error messages. Logging in the
    NetBeans Platform is based on the Java Logging API.


    #### Logger


    Log output is recorded by the Logging API using a `Logger` object. Typically,
    different `Logger` instances are used for specific   components. You get an instance
    of a `Logger` via the factory method `getLogger()`. You can also use a global
    logger, but you should use a named component-specific logger whenever possible.
    This way, different loggers can be individually turned on or off, which is very
    helpful when searching for bugs. A named logger is obtained by the following call:


    `Logger log = Logger.`**`getLogger`**`(MyClass.class.`**`getName`**`());`


    Typically, the full name of the class that creates the log output is used as the
    name for the logger. This name is obtained from the `Class` method `getName()`.
    If a logger already exists for this name, it is returned. The global logger can
    be obtained using the name `Logger.GLOBAL_LOGGER_NAME`.


    Record log output (of a defined `Level`) using the `log()` methods in the `Logger`
    class. The following log levels are provided in the `Level` class:


    *   `FINEST`

    *   `FINER`

    *   `FINE`

    *   `CONFIG`

    *   `INFO`

    *   `WARNING`

    *   `SEVERE`


    For convenience, the methods `finest()`, `finer()`, `fine()`, `config()`, `info()`,
    `warning()`, and `severe()` are also provided; these record the given message
    at the declared level.'
