    ### VMD: Visual Mobile Designer


    The implementation of graphs using the VMD classes is even easier. In this respect,
    VMD stands for *Visual Mobile Designer* and marks the classes that are used by
    the VMD. These classes provide a `GraphPinScene` implementation, as shown in the
    previous section. In addition to the scene, there are also special classes for
    nodes, edges, and pins that offer a conform design. So, you do not have to care
    about any details of implementation, such as the creation of widgets, setting
    of the layout or of a router; you can just add the necessary elements. A `VMDGraphScene`
    already has four layers and actions, such as zoom, pan, and select. Let''s pick
    up the simple example with the three nodes (above) again, and realize it with
    a `VMDGraphScene (see` [`Listing 14-5`](#Chapter14.html#list_14_5)`)`.


