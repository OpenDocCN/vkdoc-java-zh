    \ them where the required modules can be found or why none are needed.\n    **`OpenIDE-Module-Module-Dependency-Message`**`:`\n\
    \    `   The module dependency is broken. Please go to the`\n    `   following\
    \ URL and download the module.`\n*   *`OpenIDE-Module-Package-Dependency-Message`*:\
    \ The message defined by this attribute is displayed if a necessary reference\
    \ to a package fails.\n    **`OpenIDE-Module-Package-Dependency-Message`**`:`\n\
    \    `   The package dependency is broken. The reason could be…`\n*   *`OpenIDE-Module-Deprecated`*:\
    \ Use this to mark an old module which is no longer supported. A warning is displayed\
    \ if the user tries to load the module into the Platform.\n    **`OpenIDE-Module-Deprecated`**`:\
    \ true`\n*   *`OpenIDE-Module-Deprecation-Message`*: Use this attribute to add\
    \ optional information. Both the information and the deprecated warning are displayed\
    \ in the application log so, for example, you can tell the user which module to\
    \ use instead. Note that this message will only be displayed if the attribute\
    \ `OpenIDE-Module-Deprecated` is set to `true`.\n    **`OpenIDE-Module-Deprecation-Message`**`:`\n\
    \    `   Module 1 is deprecated, use Module 3 instead.`"
  trans: "\n#### 属性\n\n以下列出常用的清单属性。一个模块可以通过这些清单属性进行文本描述。此外，这些属性决定了模块如何集成到平台中。\n\n\
    *   *`OpenIDE-Module`*：此属性为模块定义一个唯一名称，供模块系统将其识别为一个模块。定义此属性是强制性的。\n    **`OpenIDE-Module`**`:\
    \ com.galileo.netbeans.module`\n*   *`OpenIDE-Module-Name`*：定义模块的显示名称，该名称也会显示在插件管理器中。\n\
    \    **`OpenIDE-Module-Name:`** `My First Module`\n*   *`OpenIDE-Module-Short-Description`*：模块功能的简短描述。\n\
    \    **`OpenIDE-Module-Short-Description`**`:`\n    `   This is a short description\
    \ of my first module`\n*   *`OpenIDE-Module-Long-Description`*：使用此属性可以更好地描述模块的功能。此文本也会显示在插件管理器中。因此，始终使用此属性来告知用户模块的特性是很有意义的。\n\
    \    **`OpenIDE-Module-Long-Description`**`:`\n    `   Here you can put a longer\
    \ description with more than one`\n    `   sentence. You can explain the capability\
    \ of your module.`\n*   *`OpenIDE-Module-Display-Category`*：通过此属性，可以将模块分组到一个虚拟组中，从而作为一个功能单元呈现给用户。\n\
    \    **`OpenIDE-Module-Display-Category`**`: My Modules`\n*   *`OpenIDE-Module-Install`****:***\
    \ 可以使用此属性注册一个模块安装器类（参见生命周期一节），以便在模块生命周期的特定时间点执行操作。\n    **`OpenIDE-Module-Install`**`:\
    \ com/galileo/netbeans/module/Installer.class`\n*   *`OpenIDE-Module-Layer`*：这是最重要的属性之一。它指定了层文件的路径（参见*层文件*一节）。模块到平台的集成由层文件描述。\n\
    \    **`OpenIDE-Module-Layer`**`: com/galileo/netbeans/module/layer.xml`\n*  \
    \ *`OpenIDE-Module-Public-Packages`*：为了支持封装，默认情况下禁止访问其他模块中的类。使用此属性，可以将包显式声明为公共包，以便其他模块可以访问它。这对于库尤其重要。\n\
    \    **`OpenIDE-Module-Public-Packages`**`:`\n    `   com.galileo.netbeans.module.actions.*,`\n\
    \    `   com.galileo.netbeans.module.util.*`\n*   *`OpenIDE-Module-Friends`*：如果只有特定模块可以访问通过\
    \ `OpenIDE-Module-Public-Packages` 属性声明为公共的包，则可以在此处指定这些模块。\n    **`OpenIDE-Module-Friends`**`:`\n\
    \    `   com.galileo.netbeans.module2,`\n    `   com.galileo.netbeans.module3`\n\
    *   *`OpenIDE-Module-Localizing-Bundle`*：此处可以定义一个用作本地化包的属性文件（参见第 8 章）。\n    **`OpenIDE-Module-Localizing-Bundle`**`:`\n\
    \    `   com/galileo/netbeans/module/Bundle.properties`\n\n##### 版本与依赖关系\n\n可以使用以下属性定义不同的版本和依赖关系。在*版本控制与依赖关系*一节中，您可以找到这些属性的应用及其全部功能的详细描述。\n\
    \n*   *`OpenIDE-Module-Module-Dependencies`*：使用此属性定义模块之间的依赖关系，并且还可以指定所需的最低模块版本。\n\
    \    **`OpenIDE-Module-Module-Dependencies`**`:`\n    `   org.openide.util > 6.8.1,`\n\
    \    `   org.openide.windows > 6.5.1`\n*   *`OpenIDE-Module-Package-Dependencies`*：一个模块也可能依赖于特定的包。此类依赖关系通过此属性定义。\n\
    \    **`OpenIDE-Module-Package-Dependencies`**`: com.galileo.netbeans.module2.gui\
    \ > 1.2`\n*   *`OpenIDE-Module-Java-Dependencies`*：如果模块需要特定的 Java 版本，可以通过此属性设置。\n\
    \    **`OpenIDE-Module-Java-Dependencies`**`: Java > 1.5`\n*   *`OpenIDE-Module-Specification-Version`*：此属性指示模块的规范版本。通常采用杜威十进制格式编写。\n\
    \    **`OpenIDE-Module-Specification-Version`**`: 1.2.1`\n*   *`OpenIDE-Module-Implementation-Version`*：此属性设置模块的实现版本，通常使用时间戳。每当模块发生更改时，此数字都应随之更改。\n\
    \    **`OpenIDE-Module-Implementation-Version`**`: 200701190920`\n*   *`OpenIDE-Module-Build-Version:`*\
    \ 此属性仅具有可选性质，模块系统会忽略它。通常提供一个时间戳。\n    **`OpenIDE-Module-Build-Version`**`: 20070305`\n\
    *   *`OpenIDE-Module-Module-Dependency-Message`*：此处可以设置一段文本。当模块依赖关系无法解析时，会显示此文本。在某些情况下，存在未解析的依赖关系可能是很正常的。此时，最好向用户显示一条有用的消息，告知他们可以在哪里找到所需的模块，或者为什么不需要它们。\n\
    \    **`OpenIDE-Module-Module-Dependency-Message`**`:`\n    `   The module dependency\
    \ is broken. Please go to the`\n    `   following URL and download the module.`\n\
    *   *`OpenIDE-Module-Package-Dependency-Message`*：当对某个包的必要引用失败时，会显示由此属性定义的消息。\n\
    \    **`OpenIDE-Module-Package-Dependency-Message`**`:`\n    `   The package dependency\
    \ is broken. The reason could be…`\n*   *`OpenIDE-Module-Deprecated`*：使用此属性标记一个不再受支持的旧模块。如果用户尝试将该模块加载到平台中，则会显示一条警告。\n\
    \    **`OpenIDE-Module-Deprecated`**`: true`\n*   *`OpenIDE-Module-Deprecation-Message`*：使用此属性添加可选信息。该信息和弃用警告都会显示在应用程序日志中，例如，您可以告知用户应该改用哪个模块。请注意，仅当\
    \ `OpenIDE-Module-Deprecated` 属性设置为 `true` 时，才会显示此消息。\n    **`OpenIDE-Module-Deprecation-Message`**`:`\n\
    \    `   Module 1 is deprecated, use Module 3 instead.`\n"
- fmt: "# Service Interfaces and Service Implementations\n\nThe following attributes\
    \ are used to define certain service provider interfaces and implementations.\
    \ Further information on this topic can be found in [Chapter 5](#Chapter05.html#ch5).\n\
    \n- `OpenIDE-Module-Provides`: Use this attribute to declare a service interface\
    \ to which this module furnishes a service provider.\n  `OpenIDE-Module-Provides`:\
    \ `com.galileo.netbeans.spi.ServiceInterface`\n- `OpenIDE-Module-Requires`: Here,\
    \ a service interface can be declared for which the module needs a service provider.\
    \ It does not matter which module provides an implementation of the interfaces.\n\
    \  `OpenIDE-Module-Requires`: `org.openide.windows.IOProvider`\n- `OpenIDE-Module-Needs`:\
    \ This attribute is an understated version of the require attribute and does not\
    \ need any specific order of modules. This may be useful with API modules which\
    \ require a specific implementation.\n  `OpenIDE-Module-Needs`: `org.openide.windows.IOProvider`\n\
    - `OpenIDE-Module-Recommends`: Using this attribute, you can realize an optional\
    \ dependency. For example, if there is a module which provides a `java.sql.Driver`\
    \ implementation, this module is activated and access is granted. Nevertheless,\
    \ if no provider of this token is available, the module defined by the optional\
    \ dependency can be executed.\n  `OpenIDE-Module-Recommends`: `java.sql.Driver`\n\
    - `OpenIDE-Module-Requires-Message`: Like the two previous attributes, a message\
    \ can be defined with this attribute. This message is displayed if a required\
    \ token is not found.\n  `OpenIDE-Module-Requires-Message`:\n  `   The required\
    \ service provider is not available. For more    information go to the following\
    \ website.`\n\n## OPERATING SYSTEM-DEPENDENT MODULES\n\nThe manifest attribute\
    \ `OpenIDE-Module-Requires` allows you to define modules that tend to be used\
    \ on a specific operating system. This attribute is used to check the presence\
    \ of a particular token. The following tokens are available:\n\n`org.openide.modules.os.Windows`\n\
    `org.openide.modules.os.Linux`\n`org.openide.modules.os.Unix`\n`org.openide.modules.os.PlainUnix`\n\
    `org.openide.modules.os.MacOSX`\n`org.openide.modules.os.OS2`\n`org.openide.modules.os.Solaris`\n\
    \nThe module system ensures that the tokens are only available on the appropriate\
    \ operating systems. For example, a module that is automatically activated by\
    \ the module system using a Windows system would automatically be deactivated\
    \ with all others. To provide a module that automatically loads on Windows systems\
    \ but automatically deactivates on other operating systems, set the module type\
    \ to `eager` and add the following entry to the manifest file:\n\n`OpenIDE-Module-Requires`:\
    \ `org.openide.modules.os.Windows`\n\n## Visibility\n\nWith the following attributes,\
    \ the visibility of modules within the plugin manager is controlled. This way,\
    \ modules can be hidden, which are not important to the end user of your application.\n\
    \n- `AutoUpdate-Show-In-Client`: This attribute determines whether a module is\
    \ displayed in the plugin manager. It can be set to `true` or `false`.\n  `AutoUpdate-Show-In-Client`:\
    \ `true`\n- `AutoUpdate-Essential-Module`: With this attribute you can mark modules\
    \ that are part of your application. A module which is marked like this cannot\
    \ be deactivated or uninstalled in the plugin manager by the user. It can be set\
    \ to `true` or `false`.\n  `AutoUpdate-Show-In-Client`: `true`\n\nIn conjunction\
    \ with these two attributes, so-called *kit* modules were introduced in the NetBeans\
    \ Platform. Each visible module (`AutoUpdate-Show-In-Client: true`) is treated\
    \ as a kit module in the plugin manager. All modules on which the kit module defines\
    \ a dependency are treated the same way, except for invisible modules which belong\
    \ to other kit modules, too. This means if a kit module is deactivated, all dependent\
    \ modules will be deactivated as well.\n\nThis way you can build wrapper modules\
    \ to several logically related modules. Then you can display them to the end user\
    \ as a unit. You can create an empty module in which the `AutoUpdate-Show-In-Client`\
    \ attribute is set to `true`, while defining a dependency on all modules which\
    \ belong to this kit module. Then you set the attribute `AutoUpdate-Show-In-Client`\
    \ to `false` in the dependent modules so they are not displayed separately.\n\n\
    ### Example\n\n[Listing 3-2](#Chapter03.html#list_3_2) shows a manifest file with\
    \ some typical attributes.\n\n***Listing 3-2.** Example of a Manifest File*\n\n\
    ```\nOpenIDE-Module: com.galileo.netbeans.module\nOpenIDE-Module-Public-Packages:\
    \ -\nOpenIDE-Module-Module-Dependencies:\n   com.galileo.netbeans.module2 > 1.0,\n\
    \   org.jdesktop.layout/1 > 1.4,\n   org.netbeans.core/2 = 200610171010,\n   org.openide.actions\
    \ > 6.5.1,\n   org.openide.awt > 6.9.0,\nOpenIDE-Module-Java-Dependencies: Java\
    \ > 1.6\nOpenIDE-Module-Implementation-Version: 200701100122\nOpenIDE-Module-Specification-Version:\
    \ 1.3\nOpenIDE-Module-Install: com/galileo/netbeans/module/Install.class\nOpenIDE-Module-Layer:\
    \ com/galileo/netbeans/module/layer.xml\nOpenIDE-Module-Localizing-Bundle: com/galileo/netbeans/module/Bundle.properties\n\
    OpenIDE-Module-Requires:\n   org.openide.windows.IOProvider,\n   org.openide.modules.ModuleFormat1\n\
    ```"
