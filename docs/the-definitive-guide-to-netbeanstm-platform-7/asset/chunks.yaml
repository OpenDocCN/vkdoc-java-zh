    `   @Consumes({"application/xml"})`

    `   public void` edit`(Product entity) {`

    `      super.edit(entity);`

    `   }`


    `   @DELETE`

    `   @Path("{id}")`

    `public void` **`remove`** `(@PathParam("id") Long id) {`

    `      super.remove(super.find(id));`

    `   }`


    `   @Override`

    `protected EntityManager` **`getEntityManager`**`() {`

    `      return em;`

    `   }`

    `   …`

    `}`


    The methods have annotations to identify which HTTP operations are used. Besides,
    the format in which the data is transferred is defined with `@Consumes` and `@Produces`.
    In addition to the type `application/xml` you can also choose `application/json`.


    So, you have created a simple RESTful web service you can now provide on the server
    with *Deploy*. The interface of the service is defined by a WADL file which is
    also published by the Java EE server. You can test the service with a web interface:
    *Test RESTful Web Services* in the context menu of the application project.


    ### Install NetBeans Platform Application


    After creating a web service you now come back to the NetBeans Platform. First,
    create a NetBeans Platform application project which you will call *OrderApplication*.
    Before creating an application module, you have to add accessory modules from
    the extended NetBeans IDE to the application. To do so, go into the *Properties*
    of the project on the category *Libraries*. There you add the following modules:


    *   enterprise/RESTful Web Service Libraries

    *   ide/JAXB 2.2 Library

    *   ide/JAXB API


    The *Jersey* libraries, which represent the reference implementation of the Java
    API for RESTful web services (JAX-RS), are hidden behind the module RESTful Web
    Service Libraries.'
