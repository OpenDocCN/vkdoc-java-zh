- fmt: "#### Providing Context Interfaces Dynamically\n\nIn the following example\
    \ ([Listing 7-4](#Chapter07.html#list_7_4)), I will show you how to change the\
    \ functionalities provided by an `Mp3DataObject` during the runtime of the application.\
    \ This way, you can also implicitly control the actions which are available to\
    \ the user. You already created a context interface and a support class for playing\
    \ an MP3 file. Now, you want to apply the same just for stopping an MP3 file.\
    \ Furthermore, the support classes and the method `playing()` now set the current\
    \ playing status of the `Mp3DataObject`.\n\n***Listing 7-4.** Context Interfaces\
    \ and Support Class for Playing Mp3DataObject*\n\n```\npublic interface PlayInterface\
    \ {\n   public void play();\n}\npublic class PlaySupport implements PlayInterface\
    \ {\n   private Mp3DataObject mp3 = null;\n   public PlaySupport(Mp3DataObject\
    \ mp3) {\n      this.mp3 = mp3;\n   }\npublic void play() {\n       System.out.println(\"\
    play\");\n       mp3.playing(true);\n    }\n}\npublic interface StopInterface\
    \ {\n   public void stop();\n}\npublic class StopSupport implements StopInterface\
    \ {\n   private Mp3DataObject mp3 = null;\n   public StopSupport(Mp3DataObject\
    \ mp3) {\n      this.mp3 = mp3;\n   }\npublic void stop() {\n      System.out.println(\"\
    stop\");\n      mp3.playing(false);\n  }\n}\n```\n\nYou create both support classes\
    \ in the constructor. First, you can assume that the MP3 file is not played, and\
    \ so you add the `PlaySupport` with the `assign()` method to the Lookup. You change\
    \ the context interfaces, which are in the context interfaces. You do this in\
    \ the `playing()` method which is called by the support classes by corresponding\
    \ parameters. If only the file is playing, delete all instances of the type by\
    \ only passing the type `PlayInterface` and no instances to the `assign()` method\
    \ and add an instance of `StopInterface` (see [Listing 7-5](#Chapter07.html#list_7_5)).\
    \ If the file is stopped, it works the other way around.\n\n***Listing 7-5.**\
    \ Dynamically Adding and Deleting Instances of Context Interfaces*\n\n```\npublic\
    \ class Mp3DataObject extends MultiDataObject {\nprivate PlaySupport playSupport\
    \ = null;\nprivate StopSupport stopSupport = null;\n   public Mp3DataObject(FileObject\
    \ pf, MultiFileLoader loader)\n      throws DataObjectExistsException, IOException\
    \ {\n      super(pf, loader);\nplaySupport = new PlaySupport(this);\nstopSupport\
    \ = new StopSupport(this);\n      getCookieSet().assign(PlayInterface.class, playSupport);\n\
    \   }\npublic synchronized void playing(boolean value) {\n      if(value) {\n\
    getCookieSet().assign(PlayInterface.class);\ngetCookieSet().assign(StopInterface.class,\
    \ stopSupport);\n      } else {\ngetCookieSet().assign(StopInterface.class);\n\
    getCookieSet().assign(PlayInterface.class, playSupport);\n      }\n   }\n}\n```\n\
    \nTo complete the example, you need another two action classes with which you\
    \ can start and stop the MP3 file. These should be two `ContextAware` classes\
    \ which use `PlayInterface` and `StopInterface` as context. Then, the menu or\
    \ tool entries are automatically activated or deactivated, depending on which\
    \ context interface or which support class is provided by the selected MP3 file\
    \ (see [Listing 7-6](#Chapter07.html#list_7_6)).\n\n***Listing 7-6.** Context-Sensitive\
    \ Actions Which Are Active When the Selected Mp3DataObject Provides an Instance\
    \ of the According Context Interface*\n\n```\npublic final class PlayAction implements\
    \ ActionListener {\n   private final PlayInterface context;\n   public PlayAction(PlayInterface\
    \ context) {\n      this.context = context;\n   }\n   @Override\n   public void\
    \ actionPerformed(ActionEvent ev) {\ncontext.play();\n   }\n}\npublic final class\
    \ StopAction implements ActionListener {\n   private final StopInterface context;\n\
    \   public StopAction(StopInterface context) {\n      this.context = context;\n\
    \   }\n   @Override\n   public void actionPerformed(ActionEvent ev) {\ncontext.stop();\n\
    \   }\n}\n```\n\n#### Data Object Factory\n\nData Objects are created by a data\
    \ object factory. A factory is responsible for exactly one type. A factory can\
    \ recognize the type of a file either because of the file ending or with an XML\
    \ root element. Factories are registered in the layer and automatically created\
    \ by the NetBeans Platform, which manages all existing factories and can find\
    \ the corresponding file for the respective file type. A factory is specified\
    \ by the interface `DataObject.Factory`. The class `MultiFileLoader` represents\
    \ an implementation which is used by default (see [Listing 7-6](#Chapter07.html#list_7_6)).\n\
    \nThe factory, responsible for creating data objects of the type `Mp3DataObject`,\
    \ has also been registered in the layer file by the NetBeans wizard. A look into\
    \ the layer file (Listing 7-7) reveals how such a factory registration is built.\n\
    \n***Listing 7-7.** Registration of a Data Object Factory in the Layer File*\n\
    \n```\n<folder name=\"Loaders\">\n   <folder name=\"audio\">\n      <folder name=\"\
    mpeg\">\n         <folder name=\"Factories\">\n            <file name=\"Mp3DataLoader.instance\"\
    >\n               <attr name=\"SystemFileSystem.icon\" urlvalue=\n           \
    \     \"nbresloc:/com/galileo/netbeans/module/mp3.png\"/>\n               <attr\
    \ name=\"dataObjectClass\" stringvalue=\n                \"com.galileo.netbeans.module.Mp3DataObject\"\
    />\n               <attr name=\"instanceCreate\" methodvalue=\n              \
    \  \"org.openide.loaders.DataLoaderPool.factory\"/>\n               <attr name=\"\
    mimeType\" stringvalue=\"audio/mpeg\"/>\n            </file>\n         </folder>\n\
    \      </folder>\n   </folder>\n</folder>\n```\n\nIn the standard folder `Loaders`\
    \ subfolders are created according to the defined MIME type (in this example `audio/mpeg`).\
    \ Under them is the standard folder `Factories` in which our special data object\
    \ factory is registered with the name `Mp3DataLoader.instance`. An icon for this\
    \ file type is specified by the attribute `SystemFileSystem.icon`. With the attributes\
    \ `mimeType` and `dataObjectClass` you determine for which type of data which\
    \ data object type shall be produced by the factory. This means, here, that only\
    \ the MIME type, not the file ending is determined. This determination is also\
    \ made in the layer file in the standard folder `Services/MIMEResolver`. Finally,\
    \ the now-registered special factory for your `Mp3DataObject` class is created\
    \ by the method `DataLoaderPool.factory()`.\n\nWhen you created the MP3 file type\
    \ at the beginning of this chapter, the file `Mp3Resolver.xml` was created besides\
    \ the `Mp3DataObject` class by the NetBeans wizard. This file determines that\
    \ the file extension `.mp3` is assigned to the MIME type `audio/mpeg` (see [Listing\
    \ 7-8](#Chapter07.html#list_7_8)).\n\n***Listing 7-8.** MIME Resolver-Datei*\n\
    \n```\n<!DOCTYPE MIME-resolver PUBLIC\n   \"-//NetBeans//DTD MIME Resolver 1.0//EN\"\
    \n   \"http://www.netbeans.org/dtds/mime-resolver-1_0.dtd\">\n<MIME-resolver>\n\
    \   <file>\n      <ext name=\"mp3\"/>\n      <resolver mime=\"audio/mpeg\"/>\n\
    \   </file>\n</MIME-resolver>\n```\n\nThis file is also registered in the layer\
    \ file. For this purpose, the already mentioned standard folder `Services/MIMEResolver`\
    \ is used, as shown in [Listing 7-9](#Chapter07.html#list_7_9).\n\n***Listing\
    \ 7-9.** Registration of a MIME Type*\n\n```\n<folder name=\"Services\">\n   <folder\
    \ name=\"MIMEResolver\">\n      <file name=\"Mp3Resolver.xml\" url=\"Mp3Resolver.xml\"\
    >\n         <attr name=\"displayName\" bundlevalue=\n               \"com.galileo.netbeans.module.Bundle#Services/MIMEResolver/Mp3Resolver.xml\"\
    />\n      </file>\n   </folder>\n</folder>\n```"
  raw: '#### Providing Context Interfaces Dynamically


    In the following example ([Listing 7-4](#Chapter07.html#list_7_4)), I will show
    you how to change the functionalities provided by an `Mp3DataObject` during the
    runtime of the application. This way, you can also implicitly control the actions
    which are available to the user. You already created a context interface and a
    support class for playing an MP3 file. Now, you want to apply the same just for
    stopping an MP3 file. Furthermore, the support classes and the method `playing()`
    now set the current playing status of the `Mp3DataObject`.


    ***Listing 7-4.** Context Interfaces and Support Class for Playing Mp3DataObject*


    `public interface` **`PlayInterface`** `{`

    `   public void play();`

    `}`

    `public class` **`PlaySupport`** `implements` **`PlayInterface`** `{`

    `   private Mp3DataObject mp3 = null;`

    `   public PlaySupport(Mp3DataObject mp3) {`

    `      this.mp3 = mp3;`

    `   }`

    `public void` **`play`**`() {`

    `       System.out.println("play");`

    `       mp3.playing(true);`

    `    }`

    `}`

    `public interface` **`StopInterface`** `{`

    `   public void stop();`

    `}`

    `public class` **`StopSupport`** `implements` **`StopInterface`** `{`

    `   private Mp3DataObject mp3 = null;`

    `   public StopSupport(Mp3DataObject mp3) {`

    `      this.mp3 = mp3;`

    `   }`

    `public void` **`stop`**`() {`

    `      System.out.println("stop");`

    `      mp3.playing(false);`

    `  }`

    `}`


    You create both support classes in the constructor. First, you can assume that
    the MP3 file is not played, and so you add the `PlaySupport` with the `assign()`
    method to the Lookup. You change the context interfaces, which are in the context
    interfaces. You do this in the `playing()` method which is called by the support
    classes by corresponding parameters. If only the file is playing, delete all instances
    of the type by only passing the type `PlayInterface` and no instances to the `assign()`
    method and add an instance of `StopInterface` (see [Listing 7-5](#Chapter07.html#list_7_5)).
    If the file is stopped, it works the other way around.


    ***Listing 7-5.** Dynamically Adding and Deleting Instances of Context Interfaces*


    `public class` **`Mp3DataObject`** `extends MultiDataObject {`

    **`private PlaySupport playSupport = null;`**

    **`private StopSupport stopSupport = null;`**

    `   public Mp3DataObject(FileObject pf, MultiFileLoader loader)`

    `      throws DataObjectExistsException, IOException {`

    `      super(pf, loader);`

    **`playSupport = new PlaySupport(this);`**

    **`stopSupport = new StopSupport(this);`**

    `      getCookieSet().assign(PlayInterface.class, playSupport);`

    `   }`

    `public synchronized void` **`playing`**`(boolean value) {`

    `      if(value) {`

    **`getCookieSet().assign(PlayInterface.class);`**

    **`getCookieSet().assign(StopInterface.class, stopSupport);`**

    `      } else {`

    **`getCookieSet().assign(StopInterface.class);`**

    **`getCookieSet().assign(PlayInterface.class, playSupport);`**

    `      }`

    `   }`

    `}`


    To complete the example, you need another two action classes with which you can
    start and stop the MP3 file. These should be two `ContextAware` classes which
    use `PlayInterface` and `StopInterface` as context. Then, the menu or tool entries
    are automatically activated or deactivated, depending on which context interface
    or which support class is provided by the selected MP3 file (see [Listing 7-6](#Chapter07.html#list_7_6)).


    ***Listing 7-6.** Context-Sensitive Actions Which Are Active When the Selected
    Mp3DataObject Provides an Instance of the According Context Interface*


    `public final class` **`PlayAction`** `implements ActionListener {`

    `   private final PlayInterface context;`

    `   public PlayAction(`**`PlayInterface context`**`) {`

    `      this.context = context;`

    `   }`

    `   @Override`

    `   public void actionPerformed(ActionEvent ev) {`

    **`context.play();`**

    `   }`

    `}`

    `public final class` **`StopAction`** `implements ActionListener {`

    `   private final StopInterface context;`

    `   public StopAction(`**`StopInterface context`**`) {`

    `      this.context = context;`

    `   }`

    `   @Override`

    `   public void actionPerformed(ActionEvent ev) {`

    **`context.stop();`**

    `   }`

    `}`


    #### Data Object Factory


    Data Objects are created by a data object factory. A factory is responsible for
    exactly one type. A factory can recognize the type of a file either because of
    the file ending or with an XML root element. Factories are registered in the layer
    and automatically created by the NetBeans Platform, which manages all existing
    factories and can find the corresponding file for the respective file type. A
    factory is specified by the interface `DataObject.Factory`. The class `MultiFileLoader`
    represents an implementation which is used by default (see [Listing 7-6](#Chapter07.html#list_7_6)).


    The factory, responsible for creating data objects of the type `Mp3DataObject`,
    has also been registered in the layer file by the NetBeans wizard. A look into
    the layer file (Listing 7-7) reveals how such a factory registration is built.


    ***Listing 7-7.** Registration of a Data Object Factory in the Layer File*


    `<folder name="`**`Loaders`**`">`

    `   <folder name="audio">`

    `      <folder name="mpeg">`

    `         <folder name="`**`Factories`**`">`

    `            <file name="`**`Mp3DataLoader`**`.instance">`

    `               <attr name="`**`SystemFileSystem.icon`**`" urlvalue=`

