    #### 提前结束向导


    根据具体用例，允许用户提前结束向导可能很有用。通常，*完成*按钮仅在最后一个面板中激活。为了允许用户在更早的面板中结束向导，请在相应面板上实现 `WizardDescriptor.FinishablePanel`
    接口。该接口指定了 `isFinishPanel()` 方法，如果向导可以完成，你可以通过该方法返回 `true` 值。在示例中，可以设想在第一个面板中实现此接口，允许用户在输入数据后立即结束向导，而无需将曲目添加到播放列表。


    #### 数据的额外验证


    面板通过 `isValid()` 方法向向导描述符声明其数据的有效性。该方法在打开面板时以及通过 `ChangeListener` 通知时被调用。如果希望在用户点击*下一步*或结束向导时执行额外的验证，请实现
    `WizardDescriptor.ValidatingPanel` 接口。该接口指定了 `validate()` 方法，可以在其中执行详细的验证。通过此方式识别出的错误将通过
    `WizardValidationException` 进行通知。此异常类的构造函数接收一个 `JComponent`，该组件将获得焦点，以便向用户显示错误位置。此外，可以添加一条失败消息，该消息随后会显示在向导中。


    与其使用 `WizardDescriptor.ValidatingPanel` 接口的 `validate()` 方法（该方法在事件分发线程（EDT）中异步执行，而
    EDT 中不应执行长时间运行的任务，否则会阻塞整个用户界面），不如使用 `WizardDescriptor.AsynchronousValidatingPanel`
    接口来异步处理验证。使用此接口时，`validate()` 方法会在一个单独的线程中自动执行。因此，用户界面仍然可供用户使用，从而可以使用*取消*按钮来结束进程。由于异步方法不在
    EDT 中执行，因此你不应访问 GUI 组件来从中读取数据。为此，该接口指定了 `prepareValidation()` 方法，该方法在 EDT 中调用，允许访问
    GUI 组件中的数据，同时禁止进一步更改。使用 `validate()` 方法对这些数据执行检查。


    #### 迭代器


    在向导描述符中，面板由一个迭代器管理。该迭代器负责面板的顺序。此类迭代器的接口由 `WizardDescriptor.Iterator` 类描述。该接口的一个标准实现是
    `WizardDescriptor.ArrayIterator` 类，它按顺序提供面板。当将面板作为数组传递给 `WizardDescriptor` 类时，也会使用此类。但是，当希望根据用户选择或输入的数据，允许用户跳过某个或多个面板时，请为
    `WizardDescriptor` 分配你自己的迭代器实现，以处理面板的动态顺序。此类迭代器的框架也可以通过 NetBeans IDE 中的向导创建。回到*向导*向导的第一步，你将*向导步骤序列*设置为*静态*。但是，如果你在此处设置为*动态*，IDE
    将创建一个迭代器类。


    基于 `WizardDescriptor.Iterator` 接口，有一些扩展。使用 `WizardDescriptor.InstantiatingIterator`
    接口及其 `instantiate()` 方法来创建一个 `Set` 对象。一个扩展是 `WizardDescriptor.AsynchronousInstantiatingIterator`，其
    `instantiate()` 方法在用户点击*完成*按钮时，在 EDT 之外异步执行。最后，使用 `WizardDescriptor.ProgressInstantiatingIterator`
    接口，在向导结束时，当 `instantiate()` 方法正在处理时，向用户显示一个进度条。在这种情况下，`instantiate()` 方法在一个单独的线程中被调用，并接收一个
    `ProgressHandle`。状态通过此类显示，就像使用标准进度条一样（参见第 11 章）。


    ### 总结


    NetBeans 平台提供了一个专业的 API 用于创建对话框和向导。在本章中，你学习了如何快速创建简单的标准对话框，以及如何创建适应你特殊需求的复杂对话框。此外，你还学习了如何通过
    Dialogs API 实现结构清晰的向导，以引导用户穿越复杂的事实世界。


    ## 第 14 章


    ## 可视化库


    NetBeans *可视化库 API* 是一个用于可视化各种不同结构的通用库。它特别适合面向图形的表示。可视化库 API 是标准 NetBeans 平台的一部分，并被
    NetBeans IDE 本身在众多模块和领域中使用，例如在 Java Micro Edition (JME) 应用程序中对 midlet 进行可视化建模，如图
    14-1 所示。要使用可视化库 API，你只需定义对相应模块的依赖关系（在模块*属性*的*库*下），正如之前对其他模块所述的那样。


    ### 可视化库 API 的结构


    可视化库 API 的组件，如同 Swing 一样，以树形结构进行组织和管理。所有图形组件的超类是 `Widget` 类。如果你查看图 14-1，那么三个组件（*移动设备*、*表单*和
    *loginScreen*），以及连接到这些组件的边，都是 widget。一个 widget 也可以是更多 widget 的容器。每个 widget 都有一个相对于其父
    widget 确定的位置。`Widget` 超类除了管理颜色和透明度等属性外，还负责呈现 widget 的边框和背景。像 Swing 容器一样，widget
    具有特定的布局，负责定位其子 widget。Widget 之间也可以相互依赖，以便在发生更改时得到通知。一个 widget 允许链接一系列动作（这些动作在特定用户事件发生时执行）。


    ![图片](img/1401.jpg)


    ***图 14-1.** 使用可视化库 API 的图导向结构的可视化模型*


    ### Widget 类


    可视化库 API 的所有图形组件都是 `Widget` 类的子类，该类管理并提供基本特性和功能，如布局、背景和字体。因此，`Widget` 是一个图形原语，相当于
    Swing 中的 `JComponent` 类。从 `Widget` 派生出了许多类，它们为各自的目的提供了 `Widget` 实现。这个继承层次结构如图
    14-2 所示，这些不同 widget 类的含义列在表 14-1 中。这些类中最重要的几个将在以下各节中更详细地讨论。关于这些类的更详尽描述，请参阅可视化库
    API 文档，该文档位于可视化库的 JavaDoc 页面中。


    ![图片](img/1402.jpg)


    ***图 14-2.** 可视化库 API 的 Widget 继承层次结构*


    表 14-1 提供了各种 widget 实现的特性和功能概览。


    ![图片](img/t1401.jpg)


