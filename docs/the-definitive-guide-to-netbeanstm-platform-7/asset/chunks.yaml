    Adding a converter to a binding takes place the same way as with a validator (see
    the section *Validator*).


    ### Summary


    With the Swing GUI Builder the NetBeans IDE provides the user with a powerful
    tool for implementing user interfaces. You can also take advantage of the Swing
    GUI Builder when developing NetBeans Platform applications. In this chapter, you
    learned about the basic functions of the GUI Builder, its components, and the
    Layout Manager. Furthermore, you used the Beans Binding Framework and got to know
    the support that the GUI Builder provides.


    ## C H A P T E R  42


    ## Testing NetBeans Platform Applications


    Two different kinds of tests can be identified for implementing and running tests
    with NetBeans Platform applications: unit tests and functional tests. This chapter
    will address both kinds of tests and the support NetBeans provides for them.


    ### Unit Tests


    *Unit tests* for NetBeans Platform applications are implemented based on the popular
    test framework *JUnit*. NetBeans provides an extension of JUnit with the library
    *NB JUnit*. This library provides numerous helper classes, which make testing
    classes and methods within the NetBeans Platform a lot easier.


    **Caution** JUnit is no longer part of the NetBeans IDE. Now, at installation
    you will be asked whether you want to install JUnit or not. The following description
    presumes that you have agreed to the installation. The JUnit module is installed
    when starting the IDE the first time. Watch out: for this installation you need
    writing permission which usually is not available in the standard program directory
    of Windows 7\. It is the same for the Cobertura module, which you will use in
    the section *Checking Test Coverage*. You can solve this problem by installing
    the IDE in another directory (with writing permission).


    First, I will describe the general process of creating and running tests by means
    of a simple class. The subsequent sections will address how to successfully test
    special resources of a NetBeans Platform application, such as services out of
    the Lookup or files out of the System Filesystem.'
