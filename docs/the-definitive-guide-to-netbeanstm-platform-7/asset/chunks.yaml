    `Sheet.Set` objects via the factory method `createPropertiesSet()`, in order to
    apply the two areas *ID3v1* and *ID3v2*. It is important that you give a `Sheet.Set`
    a unique name (used for internal management) via the `setName()` method, otherwise
    only the last added `Sheet.Set` will be displayed. With the `setDisplayName()`
