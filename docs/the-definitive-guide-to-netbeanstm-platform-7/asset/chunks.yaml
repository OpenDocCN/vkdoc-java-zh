- fmt: "### Java Service Loader\n\nSince Java 6, a similar API to Lookup is available:\
    \ `ServiceLoader`. This class loads service providers, which are registered over\
    \ the `META-INF/services` directory. With this functionality, the `ServiceLoader`\
    \ class equals the NetBeans standard Lookup that can be obtained using `Lookup.getDefault()`.\
    \ A `ServiceLoader` is created for a special type using the `Class` object of\
    \ the service interface or the abstract service class. A static factory method\
    \ is used for creating a `ServiceLoader` instance. Depending on the classloader\
    \ used to load the service providers, three methods for creating service loaders\
    \ are available.\n\nBy default, service providers are loaded using the context\
    \ classloader of the current thread. Inside the NetBeans Platform, this is the\
    \ system classloader (for more details on the NetBeans classloader system, see\
    \ [Chapter 2](#Chapter02.html#ch2)). This allows the user to load service providers\
    \ from all modules. Such a service loader is created with the following call:\n\
    \n`ServiceLoader<Mp3Finder> s = ServiceLoader.load(Mp3Finder.class);`\n\nYou may\
    \ want to use a special classloader to load service providers, such as the module\
    \ classloader to restrict loading of service providers to classes from your own\
    \ module. To obtain such a `ServiceLoader`, the classloader to be used is passed\
    \ to the factory method:\n\n`ServiceLoader<Mp3Finder> s = ServiceLoader.load(Mp3Finder.class,\
    \ this.getClass().getClassLoader());`\n\nIn addition to this, it is possible to\
    \ create a service loader that only returns installed service providers—for example,\
    \ a service provider from JAR archives located in the `lib/ext` directory or in\
    \ the platform-specific extension directory. Other service providers found on\
    \ the class path are ignored. This service loader is created using the `loadInstalled()`\
    \ method:\n\n`ServiceLoader<Mp3Finder> s = ServiceLoader.loadInstalled(Mp3Finder.class);`\n\
    \nThe service provider can be obtained using an iterator. The iterator triggers\
    \ dynamic loading of the provider on first access. The loaded providers are stored\
    \ in a local cache. The iterator returns the cached providers before loading the\
    \ remaining previously unloaded providers. If necessary, the internal cache can\
    \ be cleared using the method `reload()`. This ensures that all providers are\
    \ reloaded.\n\n```\nIterator<Mp3Finder> i = s.iterator();\nif(i.hasNext()) {\n\
    \   Mp3Finder finder = i.next();\n}\n```\n\nIf a provider cannot be instantiated,\
    \ it does not match the indicated type, or the configuration file is incorrect.\
    \ In that case, a `ServiceConfigurationError` is triggered.\n\n### Summary\n\n\
    In this chapter, you learned one of the most interesting and important concepts\
    \ of the NetBeans Platform: Lookup. This chapter examined the functionality of\
    \ Lookups and familiarized you with the service interfaces and service providers.\
    \ You learned to create service interfaces and use them within service providers,\
    \ as well as how service providers are discovered in a loosely coupled way. To\
    \ that end, you began to use the various registration mechanisms.\n\nHowever,\
    \ Lookups do a lot more than simply discover services. In fact, they also function\
    \ to enable intermodular communication. This chapter showed you an example, in\
    \ which information is shared between windows without them knowing about each\
    \ other. Finally, the exploration of this topic was broadened by relating it to\
    \ the JDK 6 `ServiceLoader` class.\n\n## C H A P T E R 6\n\n## Actions\n\nThe\
    \ treatment of actions of the NetBeans Platform is based on the Swing Action Framework.\
    \ Consequently, each action is based on the Swing interface `ActionListener` or\
    \ `Action`. The benefit of the NetBeans Platform is that it provides an infrastructure\
    \ for different recurring types of actions. Previously actions had to be derived\
    \ from a special class depending on the type of action; since NetBeans Platform\
    \ 7 all actions have the same form and just need to implement the `ActionListener`\
    \ interface. In addition to the fact that actions are now easier to use, the implementation\
    \ of actions has become more transparent for you as a developer. Now the NetBeans\
    \ Platform does the hard work for you in the background.\n\n**ENORMOUSLY EASIER:\
    \ ACTIONS IN THE NETBEANS PLATFORM 7**\n\nJust implement your action logic via\
    \ an `ActionListener` interface. Meta information, such as ID, name, or the icon\
    \ of the action, is simply added with annotations. The NetBeans Platform does\
    \ the rest for you.\n\nNot only is it possible to create rudimentary action classes\
    \ which execute their logic encapsulated (`AlwaysEnabled`), but actions can be\
    \ created which dynamically transfer available actions (`Callback`) or actions\
    \ which are able to include their logic in a certain context (`ContextAware`).\
    \ [Figure 6-1](#Chapter06.html#fig_6_1) gives an overview of these three main\
    \ types of actions again with their most important features.\n\n![Image](images/0601.jpg)\n\
    \n***Figure 6-1.** Different types of actions within the NetBeans Platform*\n\n\
    The registration of actions is centrally done in the layer file of your standard\
    \ folder `Actions`. This central registration can then be referred to from other\
    \ places. This has one great advantage: actions can be used at different places\
    \ at once, for example in the menu bar, in the toolbar, and in an application\
    \ module itself connected with a control element. So just one instance of the\
    \ action class is created by the platform. A further reason for the central declaration\
    \ of the actions is the possibility of adapting the toolbar user specifically.\
    \ Like this, all available actions can be shown to the user and can be assigned\
    \ to any toolbar. If the user removes an entry from the toolbar, the action is\
    \ not lost because only the reference is deleted and not the action itself.\n\n\
    To simplify the registration and the assignment of actions the NetBeans Platform\
    \ 7 has something new, too. Now, annotations are used instead of the manual registration\
    \ and assignment in the layer file. With this information the referring layer\
    \ entries are automatically generated creating the application. You are not forced\
    \ to use annotations, though. You can still create the layer entries directly\
    \ in the layer file.\n\nIn the following sections I will explain how to simply\
    \ create actions, how to build them, and how to register them via annotations\
    \ or by a manual layer entry. To create action classes you use the wizard that\
    \ is provided by the NetBeans IDE. You will learn that action classes are so simple\
    \ that you do not even need the wizard."
