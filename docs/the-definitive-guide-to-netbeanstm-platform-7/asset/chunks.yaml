    ### 在客户端配置和安装


    所需的更新中心必须通过*插件管理器*安装，您可以通过*工具 ![Image](img/U001.jpg) 插件*打开它。然后，您的富客户端应用程序就能够从更新中心获取新的或更新的模块。在*设置*选项卡中，您可以安装任何更新中心（参见图
    36-5）。更新中心的 URL 必须指向更新中心描述符（请参阅“更新中心”部分）。在此视图中，您还可以停用某些更新中心，从而将它们从更新过程中排除。


