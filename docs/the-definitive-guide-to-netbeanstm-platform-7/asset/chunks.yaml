    #### 手动创建数据对象


    通常，数据对象无需显式创建，而是由工厂按需生成。不过，你也可以通过 `DataObject` 类的静态 `find()` 方法，为给定的 `FileObject`
    创建一个 `DataObject`：


    `FileObject myFile = …`

    `try {`

    `   DataObject obj = DataObject.`**`find`**`(myFile);`

    `} catch(DataObjectNotFoundException ex) {`

    `   // 没有适用于此文件类型的加载器`

    `}`


    在此过程中，会传入 `FileObject`。系统会为其文件类型查找工厂。如果找到，工厂会创建一个 `DataObject` 并返回。否则，若没有为该文件类型注册工厂，则会抛出
    `DataObjectNotFoundException`。


    ### 总结


    在本章中，你了解了 NetBeans 四大 API 中的两个及其依赖关系。我们通过一个 MP3 文件的示例来学习这些内容。在这四个 API 中，文件系统 API
    位于最底层，作为任何类型数据的通用抽象层。在此基础上，数据系统 API 处理与文件系统 API 抽象出的数据相关的逻辑；例如，你可以使用数据系统 API 将
    MP3 文件与播放它的功能连接起来。


    ## 第 8 章


    ## 技巧与窍门


    本章将涵盖两个具有普遍重要性的主题。第一部分将向你介绍如何在特定的 NetBeans 平台生命周期事件上执行任务。第二部分将探讨在 NetBeans 平台应用程序中通常如何进行日志记录。


    ### NetBeans 平台的生命周期


    NetBeans 平台提供了多种机会来响应生命周期的某些事件，并自行触发这些事件。


    #### 平台启动时的任务


    NetBeans 平台提供了一个名为 `WarmUp` 的扩展点，用于在启动应用程序时执行异步任务：


    `<folder name="`**`WarmUp`**`">`

    `   <file name="com-galileo-netbeans-module-MyWarmUpTask.instance"/>`

    `</folder>`


    你可以在层文件中将任何实例（实现 `Runnable` 接口）添加到此扩展点：


    `public class MyWarmUpTask implements` **`Runnable`**`{`

    `public void` **`run`**`() {`

    `      // 在应用程序启动时执行某些操作`

    `   }`

    `}`


    关键任务——例如，作为模块启动条件所必需的任务——绝不能在此处启动。这些任务在应用程序启动时异步执行，这意味着无法保证任务何时开始或结束。在这种情况下，应使用模块安装程序（参见第
    3 章）。


    #### 平台结束时的任务


    当 NetBeans 平台应用程序关闭时，所有用户特定的设置（例如关于打开的 `top component` 的信息、应用程序窗口大小和工具栏）都会保存到应用程序用户目录。此外，所有实现了模块安装程序的模块（参见第
    3 章）都会被询问是否允许关闭应用程序。因此，应用程序不仅仅是关闭，而是被妥善地关闭。通常，应用程序是通过菜单或标题栏中的关闭按钮来关闭的。在某些情况下，你可能需要通过编程方式关闭应用程序。例如，如果在登录对话框中输入了错误数据，并且应用程序应该被关闭，这可能是一个选项。在这种情况下，你不能也不应该——像
    Java 应用程序通常所做的那样——使用 `System.exit()` 来关闭应用程序。关闭应用程序的过程由 Utilities API 中的全局服务 `LifecycleManager`
    指定。NetBeans `Core` 模块为此提供了一个服务提供者，负责执行前面提到的任务。可以通过调用 `getDefault()` 方法来获取 `LifecycleManager`
    的这个标准实现。通过调用以下代码行来关闭应用程序：


    `LifecycleManager.getDefault().exit();`


    由于此 `LifecycleManager` 是作为服务实现的，你可以提供此抽象类的自定义实现。这并不意味着 NetBeans 平台的标准实现不再可用——你只需调用它即可。这样，就可以在应用程序关闭时执行自定义任务。清单
    8-1 演示了如何在执行自定义任务后调用标准实现并妥善关闭应用程序。


    ***清单 8-1.** 一个自定义的 LifecycleManager 实现，它调用了标准实现*


    `import org.openide.LifecycleManager;`


    `public class MyLifecycleManager extends` **`LifecycleManager`** `{`

    `   @Override`

    `public void` **`saveAll`**`() {`

    `      for(LifecycleManager manager :`

    `         Lookup.getDefault().lookupAll(LifecycleManager.class)) {`

    `         if(manager != this) { /* 跳过我们自己的实例 */`

    **`  manager.saveAll();`**

    `         }`

    `      }`

    `   }`

    `   @Override`

    `   public void` exit`() {`

    `      // 执行应用程序特定的关闭任务`

    `      for(LifecycleManager manager :`

    `         Lookup.getDefault().lookupAll(LifecycleManager.class)) {`

    `         if(manager != this) { /* 跳过我们自己的实例 */`

    **`manager.exit();`**

    `         }`

    `      }`

    `   }`

    `}`


    此实现必须注册为服务提供者。需要注意的是，必须声明一个位置，以确保自定义实现首先被 Lookup 传递和调用。如果不这样做，则只会调用标准的 `LifecycleManager`。我们使用以下注解注册该类：


    `@ServiceProvider(service=LifecycleManager.class, position=1)`


    #### 平台重启


    你不仅可以通过 NetBeans 平台的生命周期管理器结束应用程序，还可以重启它。为此，`LifecycleManager` 类提供了 `markForRestart()`
    方法。如果在结束之前调用此方法，则会实现重启：


    `LifecycleManager.getDefault().` **`markForRestart`**`();`

    `LifecycleManager.getDefault().exit();`


    ### 日志记录


    日志记录是一个非常重要且有用（但经常被忽视）的主题。日志记录是记录状态、警告和错误消息的做法。NetBeans 平台中的日志记录基于 Java 日志记录 API。


    #### 日志记录器


    日志输出由日志记录 API 使用 `Logger` 对象记录。通常，不同的 `Logger` 实例用于特定的组件。你可以通过工厂方法 `getLogger()`
    获取 `Logger` 的实例。你也可以使用全局日志记录器，但应尽可能使用命名的、特定于组件的日志记录器。这样，不同的日志记录器可以单独打开或关闭，这在查找错误时非常有用。通过以下调用获取命名的日志记录器：


    `Logger log = Logger.`**`getLogger`**`(MyClass.class.`**`getName`**`());`


    通常，创建日志输出的类的完整名称被用作日志记录器的名称。此名称通过 `Class` 方法 `getName()` 获取。如果已存在此名称的日志记录器，则返回该日志记录器。可以使用名称
    `Logger.GLOBAL_LOGGER_NAME` 获取全局日志记录器。


    使用 `Logger` 类中的 `log()` 方法记录（指定 `Level` 的）日志输出。`Level` 类中提供了以下日志级别：


    *   `FINEST`

    *   `FINER`

    *   `FINE`

    *   `CONFIG`

    *   `INFO`

    *   `WARNING`

    *   `SEVERE`


    为方便起见，还提供了 `finest()`、`finer()`、`fine()`、`config()`、`info()`、`warning()` 和 `severe()`
    方法；这些方法在声明的级别记录给定的消息。

