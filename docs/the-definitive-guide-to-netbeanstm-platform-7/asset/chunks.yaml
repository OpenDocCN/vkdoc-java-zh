    #### 搜索更新


    第一步是搜索必须安装的模块。搜索会在所有已注册的更新中心中进行。这意味着在应用程序的首次交付中，至少应注册一个更新中心。新的模块应通过此更新中心纳入。你可以通过
    NetBeans IDE 非常轻松地注册一个更新中心。为此，只需调用 *文件 ![Image](img/U001.jpg) 新建文件 ![Image](img/U001.jpg)
    模块开发 ![Image](img/U001.jpg) 更新中心*。你可以在第 36 章中找到更多相关信息。


    使用清单 25-1 所示的方法搜索最新的模块和已更新的模块。让所需的（或所有）更新提供者从更新中心加载关于所提供模块的信息非常重要。在此示例中，你通过 `UpdateUnitProviderFactory`
    确定所有提供者，并执行其 `refresh()` 方法。之后，你通过 `UpdateManager` 确定所有可以更新或重新安装的已提供模块，该管理器也会考虑所有提供者。为此，使用
    `!unit.getAvailableUpdates().isEmpty()` 过滤掉所有已安装且未更新的模块。现在，你只需使用 `getInstalled()`
    方法来区分新模块和已更新的模块。如果它返回 `null`，则表示该模块的版本尚未安装；也就是说，它是一个新模块。根据此查询，你将模块添加到相应的列表中。


    ***清单 25-1.** 搜索新模块和已更新模块*


    `private List<UpdateElement> install = new ArrayList<UpdateElement>();`

    `private List<UpdateElement> update = new ArrayList<UpdateElement>();`


    `public void` **`searchNewAndUpdatedModules`**`() {`

    `   for (UpdateUnitProvider provider : UpdateUnitProviderFactory.`

    `           getDefault().getUpdateUnitProviders(false)) {`

    `      try {`

    `         provider.`**`refresh`**`(null, true);`

    `      } catch (IOException ex) {`

    `         LOG.severe(ex.getMessage());`

    `      }`

    `   }`

    `for (UpdateUnit unit :` **`UpdateManager`**`.getDefault().`**`getUpdateUnits`**`())
    {`

    `      if (!unit.`**`getAvailableUpdates`**`().isEmpty()) {`

    `         if (unit.`**`getInstalled`**`() == null) {`

    `            install.`**`add`**`(unit.getAvailableUpdates().get(0));`

    `         } else {`

    `            update.`**`add`**`(unit.getAvailableUpdates().get(0));`

    `         }`

    `      }`

    `   }`

    `}`


    在清单 25-1 所示的方法中，所有更新中心都由 `UpdateManager` 查询。你也可以将搜索限制在单独的提供者上，以确保模块自动从专用更新中心安装，如清单
    25-2 所示。你通过 `UpdateUnitProviderFactory` 根据名称（根据层文件中的定义）确定所需的更新提供者。与之前的方法不同，你随后不是搜索更新管理器，而是直接在提供者上确定它。


    ***清单 25-2.** 在特殊更新中心中搜索模块*


    `private static final String` **`UC_NAME`** `= "com_galileo_netbeans_module_update_center";`


    `public void` **`searchNewAndUpdatedModulesInDedicatedUC`**`() {`

    `   for (UpdateUnitProvider provider : UpdateUnitProviderFactory.`

    `           getDefault().`**`getUpdateUnitProviders`**`(false)) {`

    `      try {`

    `         if (`**`provider.getName()`**`.equals(UC_NAME)) {`

    `            provider.refresh(null, true);`

    `for (UpdateUnit u :` **`provider.getUpdateUnits()`**`) {`

    `               if (!u.getAvailableUpdates().isEmpty()) {`

    `                  if (u.getInstalled() == null) {`

    `                     install.add(u.getAvailableUpdates().get(0));`

    `                  } else {`

    `                     update.add(u.getAvailableUpdates().get(0));`

    `                  }`

    `               }`

    `            }`

    `         }`

    `      } catch (IOException ex) {`

    `         LOG.severe(ex.getMessage());`

    `      }`

    `   }`

    `}`


    #### 安装和重启更新


    对模块的操作通过 `OperationContainer` 执行。可以向此容器添加任意数量的 `UpdateElement` 实例。请注意，每个操作容器负责一个特定的操作。这意味着在这种情况下需要两个不同的容器。它们通过相应的工厂方法
    `OperationContainer.createForInstall()` 和 `OperationContainer.createForUpdate()`
    创建。添加元素不依赖于类型。因此，你为你的目的创建一个辅助方法。（参见清单 25-3。）


    ***清单 25-3.** 将更新元素添加到操作容器*


    `public OperationContainer<InstallSupport>` **`addToContainer`**`(`

    `        OperationContainer<InstallSupport> c,`

    `        List<UpdateElement> modules) {`

    `   for (UpdateElement e : modules) {`

    `      if (container.`**`canBeAdded`**`(e.getUpdateUnit (), e)) {`

    **`OperationInfo`**`<InstallSupport> operationInfo = c.`**`add`**`(e);`

    `         if (operationInfo != null) {`

    `            c.add(operationInfo.`**`getRequiredElements`**`());`

    `         }`

    `      }`

    `   }`

    `   return container;`

    `}`


    清单 25-3 中显示的辅助方法首先检查模块是否与容器兼容。对于每个模块，这通过 `canBeAdded()` 方法进行检查。在这种情况下，你添加该模块；当该模块尚未在容器中找到时，会返回一个
    `OperationInfo` 实例。此实例有助于通过 `getRequiredElements()` 方法添加当前模块所需的依赖项。在此示例中，可以跳过此调用，因为无论如何都会添加所有可用的模块。但是，使用
    `getBrokenDependencies()` 方法，你可以检查是否有依赖项无法满足。


    除了用元素填充容器之外，下载和安装模块的工作方式相同；一个辅助方法对此步骤很有用。一个 `OperationContainer` 被传递给此方法。通过此操作容器，然后可以安装模块。之后，你通过
    `InstallSupport` 实例的 `doDownload()`、`doValidate()` 和 `doInstall()` 方法下载、检查并最终安装模块。如果
    `doInstall()` 方法返回一个 `OperationSupport.Restarter`，则需要重新启动才能完成安装。但是，你此时不希望重新启动，而是将何时重新启动的决定权留给用户，因此使用
    `doRestartLater()` 方法。（参见清单 25-4。）


    ***清单 25-4.** 下载并安装模块，然后通知用户*


    `public void` **`installModules`**`(OperationContainer<InstallSupport> container)
    {`

    `   try {`

    `      InstallSupport support = container.getSupport();`


    `      if (support != null) {`

    `         Validator vali = support.`**`doDownload`** `(null, true);`

    `         Installer inst = support.`**`doValidate`**`(vali, null);`

    **`Restarter`** `restarter = support.`**`doInstall`**`(inst, null);`


    `         if (restarter != null) {`

    `            support.`**`doRestartLater`**`(restarter);`

    `            if (!isRestartRequested) {`

    **`NotificationDisplayer`**`.getDefault().notify(`

    `                  "应用程序已更新",`

    `                  ImageUtilities.loadImageIcon("com/galileo/netbeans/module/rs.png",
    false),`

    `                  "点击此处重新启动",`

    `new` **`RestartAction`**`(support, restarter));`

    `               isRestartRequested = true;`

    `            }`

    `         }`

    `      }`

    `   } catch (OperationException ex) {`

    `      LOG.severe(ex.getMessage());`

    `   }`

    `}`

