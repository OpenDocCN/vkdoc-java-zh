    \ of an Already Existing Palette*\n\n```\n<folder name=\"HTMLPalette\">\n   <folder\
    \ name=\"My HTML Items\">\n      <file name=\"item1.xml\" url=\"items/item1.xml\"\
    />\n      <file name=\"item2.xml\" url=\"items/item2.xml\"/>\n   </folder>\n</folder>\n\
    ```\n\n### Summary\n\nWith the Palette API you can not only extend your NetBeans\
    \ Platform application but also the NetBeans IDE. You can create file-specific\
    \ palettes or extend already existing ones. In this chapter you learned how to\
    \ create and register palette items as well as palette controllers. In the last\
    \ part of this chapter we looked at how to extend preexisting palettes.\n\n##\
    \ C H A P T E R 23\n\n## Task List API\n\nThe Task List module of the NetBeans\
    \ IDE enables you to display tasks, notifications, or error messages as shown\
    \ in [Figure 23-1](#Chapter23.html#fig_23_1). The entries of the Task List can\
    \ be arranged in groups, giving the user a better overview; the user can also\
    \ determine from what sections entries will be shown. By default, three sections,\
    \ called scopes, are defined within the Task List module. One scope corresponds\
    \ to the currently opened file, another scope corresponds to the main project\
    \ and its opened dependent projects, and the third to all opened projects. The\
    \ entries are supplied by scanners working with the fixed scope.\n\n![Image](images/2301.jpg)\n\
    \n***Figure 23-1.** Task List module of the NetBeans IDE*\n\nFor the Task List\
    \ module there is the *Task List API* with which you can flexibly expand the scope\
    \ of operation of the module. It is essentially about providing additional scanner.\
    \ The expansions are integrated via extension points in the layer file. How this\
    \ works is best shown in an example. Let's say you want to implement a scanner\
    \ which displays all positions at which a direct output of information is used,\
    \ such as with `System.out.println()`. Before delivering a product, for example,\
    \ you can ensure that all important positions were substituted by logging outputs\
    \ or just removed.\n\n### Implementing Scanner\n\nYou derive your own scanner\
    \ implementation from the abstract `FileTaskScanner` class. A scanner has a name\
    \ and a description of what it can achieve. Optionally, you can connect a scanner\
    \ to an options panel. With this options panel the user can individually configure\
    \ the scanner. For example, you can use the ToDo scanner of the NetBeans IDE to\
    \ configure the tokens, which will become identified as a ToDo task within a file.\
    \ For simplicity's sake, you define these tokens directly in the scanner. Then\
    \ the three parameters name, description and path to the options panel (`null`,\
    \ if no options panel is used) are passed to the base class constructor. Since\
    \ the scanner is later declaratively registered in the layer file and afterward\
    \ initialized by the Task List framework, you provide the factory method `create()`.\
    \ Via this method, a `LoggingTaskScanner` instance can be created.\n\nThe most\
    \ important part of the scanner is the `scan()` method, as you could probably\
    \ already guess. With this method you get passed the file which is to be searched.\
    \ You go though this file with a `Pattern` (for recognizing the tokens) and with\
    \ a `Matcher`. Create a `Task` instance for each position found. Afterward, you\
    \ add this instance to a list which is returned. The `TodoTaskScanner` class was\
    \ used as a template for the implementation in [Listing 23-1](#Chapter23.html#list_23_1).\
    \ A `Task` instance is created via the static method `Task.create()`. You pass\
    \ the searched file, the group to which the entry shall be added, a description\
    \ (typically the line in which the token was found), and the number of the line\
    \ to this method.\n\n***Listing 23-1.** Scanner Implementation*\n\n```\nimport\
    \ org.netbeans.spi.tasklist.FileTaskScanner;\nimport org.netbeans.spi.tasklist.Task;\n\
    import org.openide.filesystems.FileObject;\n...\npublic class LoggingTaskScanner\
    \ extends FileTaskScanner {\n\nprivate static final String GROUP_NAME = \"logging-tasklist\"\
    ;\nprivate static final String[] TOKENS = {       \"System.out.println\",\n  \
    \    \"System.err.println\",\n      \"printStackTrace\"};\n   private Pattern\
    \  regexp   = null;\n   private Callback callback = null;\n\npublic LoggingTaskScanner(String\
    \ name, String desc){\n      super(name, desc, null);\n   }\n\npublic static LoggingTaskScanner\
    \ create() {\n      String name = NbBundle.getBundle(LoggingTaskScanner.class).\
    \                                 getString(\"LBL_loggingtask\");\n      String\
    \ desc = NbBundle.getBundle(LoggingTaskScanner.class).\n                     \
    \        getString(\"HINT_loggingtask\");\nreturn new LoggingTaskScanner(name,\
    \ desc);\n   }\n\npublic List<? extends Task> scan(FileObject file) {\n      List<Task>\
    \ tasks = new LinkedList<Task>();\n      int lineno = 0;\n      try {\n      \
    \   for (String line : file.asLines()) {\n            lineno++;\n            Matcher\
    \ matcher = getScanRegexp().matcher(line);\n            if (matcher.find()) {\n\
    \               String description =\n                  line.subSequence(matcher.start()+1,\
    \ line.length()).toString();\n               Task task = Task.create(file, GROUP_NAME,\
    \ description, lineno );\n               tasks.add(task);\n            }\n   \
    \      }\n      } catch (IOException ex) {\n         Exceptions.printStackTrace(ex);\n\
    \      }\nreturn tasks;\n   }\n\nprivate Pattern getScanRegexp() {\n      if (regexp\
    \ == null) {\n         // create Pattern for the Tokens\n      }\n      return\
    \ regexp;\n   }\n\npublic void attach(Callback callback) {\n      if(callback\
    \ == null && this.callback != null) {\n         regexp = null;\n      }\n    \
    \  this.callback = callback;\n   }\n\n   @Override\npublic void notifyPrepare()\
    \ {\n      getScanRegexp();\n   }\n\n   @Override\npublic void notifyFinish()\
    \ {\n      regexp = null;\n   }\n}\n```\n\nThe user can activate or deactivate\
    \ scanners via the context menu of the Task List window. You are informed about\
    \ whether the scanner is active or not by the `attach()` method. If the `callback`\
    \ parameter has the value `null`, the scanner has been deactivated. You can access\
    \ the Task List framework via the `Callback` instance. Finally, there are still\
    \ the two methods `notifyPrepare()` and `notifyFinish()`. The `notifyPrepare()`\
    \ method is called before initiation of a scan by the Task List framework in which\
    \ you can do preparations for the following call of the method `scan()`. Finally,\
    \ the `notifyFinish()` method is called."
