    \ 44-12](#Chapter44.html#list_44_12)).\n\n**Listing 44-12.** Registering the Mp3Player\
    \ Service Provider\n\n```\nimport org.openide.util.lookup.ServiceProvider;\n...\n\
    @ServiceProvider(service=Mp3Player.class)\npublic class Mp3PlayerImpl extends\
    \ Mp3Player implements ControllerListener {\n   ...\n}\n```"
