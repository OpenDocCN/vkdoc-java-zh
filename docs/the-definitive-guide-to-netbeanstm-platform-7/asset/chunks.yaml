    ##### 模块依赖关系


    您可以通过 *属性 ![Image](img/U001.jpg) 库* 来定义和编辑模块依赖关系，如图 3-8 所示。


    ![Image](img/0308.jpg)


    ***图 3-8.** 模块依赖关系的定义*


    在此窗口中，使用 *添加依赖关系…* 为您的模块添加依赖关系。NetBeans 模块系统提供了多种方法来将依赖关系连接到特定模块。


    在最简单的情况下，不需要指定版本。这意味着只需要有一个可用的模块，而不需要特定的版本（尽管在可能的情况下，您仍然可以指定一个版本）：


    **`OpenIDE-Module-Module-Dependencies`**`: com.galileo.netbeans.module2`


    此外，您可能需要一个特定的规范版本。在这种情况下，模块版本应大于 7.1 版。这是定义依赖关系最常见的方式：


    **`OpenIDE-Module-Module-Dependencies`**`: org.openide.dialogs` **`> 7.1`**


    如果您要依赖的模块有一个主发行版本，则必须在模块名称后通过斜杠指定：


    **`OpenIDE-Module-Module-Dependencies`**`: org.netbeans.modules.options.api`**`/1`**
    `> 1.5`


    此外，您还可以指定一个主发行版本的范围：


    **`OpenIDE-Module-Module-Dependencies`**`: com.galileo.netbeans.module3`**`/2-3`**
    `> 3.1.5`


    为了与另一个模块建立紧密集成，可以设置一个*实现依赖关系*。这种方法的主要区别和原因在于，无论模块是否暴露了这些包，都可以使用模块中的所有包。必须谨慎设置这种依赖关系，因为它违背了封装原则和
    API 的定义。为了使系统能够保证应用程序的一致性，必须将依赖关系精确地设置在给定实现版本的版本上。然而，这个版本会随着模块的每次更改而变化。


    **`OpenIDE-Module-Module-Dependencies`**`: com.galileo.netbeans.module2 =` **`200702031823`**


    在列表中选择所需的依赖关系（参见图 3-8），然后单击 *编辑…* 按钮。如图 3-9 所示，您可以设置各种类型的依赖关系。


    ![Image](img/0309.jpg)


    ***图 3-9.** 编辑模块依赖关系*


    ##### Java 包依赖关系


    NetBeans 允许您设置对特定 Java 包的模块依赖关系。这种依赖关系在清单文件中设置：


    **`OpenIDE-Module-Package-Dependencies`**`: javax.sound.midi.spi > 1.4`


    ##### Java 版本依赖关系


    如果您的模块依赖于特定的 Java 版本，例如 Java 6，您也可以在模块属性的 *属性 ![Image](img/U001.jpg) 源代码* 下，使用
    *源代码级别* 设置来指定。除此之外，您还可以要求特定版本的 Java 虚拟机：


    **`OpenIDE-Module-Java-Dependencies`**`: Java > 1.6 VM > 1.0`


    您可以使用等号要求一个精确的版本，或者要求一个大于指定版本的版本。


    ### 生命周期


    您可以实现一个所谓的*模块安装程序*来影响模块的生命周期，从而对某些事件做出反应。模块系统 API 提供了 `ModuleInstall` 类，我们从中派生自己的模块安装程序类。这样做时，可以覆盖所需事件的以下方法。可用的方法或事件如下：


    *   *`validate()`*：此方法在安装或加载模块之前调用。如有必要，在此设置某些加载序列，例如验证模块许可证。如果序列不成功且模块未加载，则可以抛出
    `IllegalStateException`。此异常会阻止加载或安装模块。

    *   *`restored()`*：此方法在加载已安装的模块时始终被调用。在此，可以初始化启动模块的操作。

    *   *`uninstalled()`*：此方法在从应用程序中移除模块时调用。

    *   *`closing()`*：在模块结束之前，会调用此方法。在此，您还可以测试模块是否准备好被移除，或者是否仍有要执行的活动。如果返回值为 `false`，则模块和整个应用程序不会结束，因为此方法总是在结束模块之前调用。只有当所有模块都设置为
    `true` 时，应用程序才会结束。例如，您可以向用户显示一个对话框，以确认是否真的应该关闭应用程序。

    *   *`close()`*：如果所有模块都准备好结束，则调用此方法。在此，您可以在关闭模块之前调用操作。


    ![Image](img/square.jpg) **注意** 使用这些方法时，请考虑您调用的操作是否可以通过声明方式设置。但是，始终检查所需操作是否可以采用声明方式。特别是在
    `validate()` 和 `restored()` 方法的情况下，请考虑这些方法会影响整个应用程序的启动时间。例如，当注册服务时，您可以使用层文件中的条目或
    Java 扩展机制（参见第 5 章）。这样，它们会在首次使用时才被加载，并且不会延长整个应用程序的启动时间。


    清单 3-6 展示了一个模块安装程序类的结构。


    ***清单 3-6.** 模块安装程序类的结构*


