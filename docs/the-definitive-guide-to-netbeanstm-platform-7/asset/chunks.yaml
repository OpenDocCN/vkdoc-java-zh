    ### 提供属性


    如前所述，你必须在相应的节点类中重写 `createSheet()` 方法；在本示例中，即新创建的 `Mp3DataNode` 类，它代表 *.mp3* 类型的文件。首先，你需要一个
    `Sheet` 实例，你可以通过基类的方法轻松创建它，该方法已经为实例添加了一组基本属性（这是图 19-1 中名为 *属性* 的第一个区域）。如果你不需要这些信息，当然也可以通过
    `Sheet` 的标准构造函数自行创建实例。因此，你已经了解到，显示的属性可以按区域组织，用户可以根据需要隐藏或显示这些区域。此类区域的属性由 `Sheet.Set`
    类管理。你通过工厂方法 `createPropertiesSet()` 创建两个 `Sheet.Set` 对象，以便应用 *ID3v1* 和 *ID3v2*
    这两个区域。重要的是，你需要通过 `setName()` 方法为 `Sheet.Set` 指定一个唯一的名称（用于内部管理），否则只会显示最后添加的 `Sheet.Set`。通过
    `setDisplayName()` 方法，你可以确定该区域用作标题的名称。


    ***清单 19-1.** 通过 createSheet() 方法，你可以创建一个包含所需属性的 Sheet 实例，该实例将显示在属性窗口中。*


