- fmt: "### Opening the Help System\n\nIf you want to call the help system yourself,\
    \ you can get access via the `Lookup`. There, an implementation of the `Help`\
    \ class is registered (see [Listing 16-13](#Chapter16.html#list_16_13)).\n\n***Listing\
    \ 16-13.** Calling the Help System Concerning a Certain Topic*\n\n```\nHelp h\
    \ = Lookup.getDefault().lookup(Help.class);\nif(h != null)\n   h.showHelp(new\
    \ HelpCtx(\"com.galileo.netbeans.module.about\"));\n   // h.showHelp(HelpCtx.DEFAULT_HELP);\n\
    ```\n\nYou pass a `HelpCtx` instance, which represents a help page, to the `showHelp()`\
    \ method. You pass the ID of the desired help page, which you determined in the\
    \ map file, to the constructor. If you want to open the help window with the default\
    \ help page, you can use `HelpCtx.DEFAULT_HELP`.\n\n### Summary\n\nIn this chapter,\
    \ you learned how to use the NetBeans Platform help system, which is based on\
