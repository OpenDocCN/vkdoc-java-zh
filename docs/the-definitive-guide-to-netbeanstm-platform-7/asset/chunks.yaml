- fmt: "#### Drag-and-Drop Functionality\n\nThe drag-and-drop functionality is still\
    \ missing for dragging the albums from the palette to the playlist window. For\
    \ this purpose, two supplements are necessary. One for the `Album` and `AlbumNode`\
    \ classes and one for the top component or the table, which will receive instances\
    \ of the `Album` class.\n\nThe data you want to pass is located in the `Album`\
    \ class. You implement the `Transferable` interface on the `Album` class, in order\
    \ to be able to directly pass them to the playlist top component via drag-and-drop\
    \ (see [Listing 21-7](#Chapter21.html#list_21_7)). A `DataFlavor` (which you create\
    \ as a static instance in `Album`) is needed for identifying the data. With the\
    \ `getTransferDataFlavors()` method you return your special `DataFlavor`. The\
    \ `getTransferData()` method is called by the playlist window. Return the album\
    \ instance to this method via `this`, if the requested `DataFlavor` is of the\
    \ type `DATA_FLAVOR`. If another `DataFlavor` is requested, you trigger an exception.\n\
    \n**Listing 21-7.** The Album Class Contains the Data and Implements the Interface\
    \ Transferable, So It Can Be Passed Via Drag and Drop.\n\n```\nimport java.awt.datatransfer.DataFlavor;\n\
    import java.awt.datatransfer.Transferable;\nimport java.awt.datatransfer.UnsupportedFlavorException;\n\
    ...\npublic class Album implements Transferable {\npublic static final DataFlavor\
    \ DATA_FLAVOR = new DataFlavor(Album.class, \"album\");\n   ...\n\npublic DataFlavor[]\
    \ getTransferDataFlavors() {\n      return new DataFlavor[] {DATA_FLAVOR};\n \
    \  }\n\npublic boolean isDataFlavorSupported(DataFlavor flavor) {\n      return\
    \ flavor == DATA_FLAVOR;\n   }\n\npublic Object getTransferData(DataFlavor flavor)\
    \ throws UnsupportedFlavorException {\n      if(flavor == DATA_FLAVOR) {\nreturn\
    \ this;\n      } else {\n         throw new UnsupportedFlavorException(flavor);\n\
    \      }\n   }\n}\n```\n\nActually, the user does not move the `Album` object\
    \ itself, but an `AlbumNode` instance. This means the drag event is triggered\
    \ on the node. Therefore, you overwrite the `drag()` method which was already\
    \ specified by the `Node` class. This method delivers a `Transferable` instance—in\
    \ this case the album instance, which is represented by the `AlbumNode` (see [Listing\
    \ 21-8](#Chapter21.html#list_21_8)).\n\n**Listing 21-8.** Making the AlbumNode\
    \ Drag-Suitable\n\n```\nimport java.awt.datatransfer.Transferable;\n...\npublic\
    \ class AlbumNode extends AbstractNode {\nprivate Album album = null;\n   ...\n\
    public Transferable Drag() throws IOException {\nreturn Album;\n   }\n}\n```\n\
    \nFinally, you still have to extend the `PlaylistTopComponent` so it can receive\
    \ a palette entry. For this you need a `TransferHandler`, which is registered\
    \ on the object. This object will be able to receive the data; here, it is the\
    \ `albums` table and its scroll area `scrollPane`. You implement a specific transfer\
    \ handler named `AlbumTransferHandler`, in order to determine which data you want\
    \ to accept and to process the data. To do so you just overwrite two methods.\
    \ First, the `canImport()` method, which is always called when an object is dragged\
    \ on or above the component. In this component, you decide whether that object\
    \ will be accepted. This check is done by the `DataFlavor` which was previously\
    \ determined in `Album`. If this method returns `true`, the user receives a (mouse\
    \ symbol) signal that the component is able to receive the object. The other method\
    \ to overwrite is the `importData()` method. This method is called when the drop\
    \ event is triggered. Via the `TransferSupport` object (which is passed), you\
    \ receive exactly that `Transferable` instance delivered to the `AlbumNode` class\
    \ by the previously implemented `drag()` method. With the `getTransferData()`\
    \ method and with your `DataFlavor` object, you are then able to determine the\
    \ corresponding `Album` object. Finally, you add the object's data to the table.\
    \ (See [Listing 21-9](#Chapter21.html#list_21_9).)\n\n**Listing 21-9.** Receiving\
    \ an Album Object Passed via Drag and Drop\n\n```\nimport javax.swing.TransferHandler;\n\
    import javax.swing.TransferHandler.TransferSupport;\n...\npublic final class PlaylistTopComponent\
    \ extends TopComponent {\n\nprivate TransferHandler th = new AlbumTransferHandler();\n\
    \n   public PlaylistTopComponent() {\n      ...\n      albums.setTransferHandler(th);\n\
    \      scrollPane.setTransferHandler(th);\n   }\n\nprivate final class AlbumTransferHandler\
    \ extends TransferHandler {\n\npublic boolean canImport(TransferSupport support)\
    \ {\n         return support.isDataFlavorSupported(Album.DATA_FLAVOR);\n     \
    \ }\n\npublic boolean importData(TransferSupport support) {\n         try {\n\
    \            Album a = (Album)support.getTransferable().getTransferData(Album.DATA_FLAVOR);\n\
    \            DefaultTableModel model = (DefaultTableModel)albums.getModel();\n\
    \            model.addRow(new Object[]{a.getTitle(),\n                       \
    \               a.getTracks(),\n                                      a.getCDs(),\n\
    \                                      a.getYear()});\n            return true;\n\
    \         } catch(Exception e) {\n            Exceptions.printStackTrace(e);\n\
    \            return false;\n         }\n      }\n   }\n}\n```\n\n### Summary\n\
    \nThe palette module of the NetBeans IDE is concerned with the management and\
    \ graphic display of components, in order to facilitate quick access. In this\
    \ chapter you learned how to define palette entries in the layer file. Additionally\
    \ you implemented an example to create a specific node class that represents palette\
    \ items. In this example you also saw how easy it is to implement drag-and-drop\
    \ support for your own palette items.\n\n## PART 4\n\n## Use & Extend: Advanced\
    \ APIs of the NetBeans Platform & ID\n\n## C H A P T E R  22\n\n## Palette API\n\
    \nIn [Chapter 21](#Chapter21.html#ch21), you created a palette. From this palette\
    \ you could drag music albums on the top component (which you implemented yourself)\
    \ via drag-and-drop. As indicated, it is also possible to register a palette for\
    \ a certain file type. This means that when a file of this type is opened in the\
    \ NetBeans editor, the palette registered for this type is automatically opened.\
    \ The following example will show how this actually works.\n\nLet's assume you\
    \ want to provide a palette for manifest files (`*.mf`) (see [Figure 22-1](#Chapter22.html#fig_22_1)).\
    \ First you define the items, which will be provided on the palette, each with\
    \ an XML file and a class. Then you register this item in the layer file. Afterwards,\
    \ you implement a class that creates a palette for the already defined and registered\
    \ items. Finally, you register this class in the layer file for the manifest file\
    \ type.\n\n![Image](images/2201.jpg)\n\n**Figure 22-1.** Palette for manifest\
    \ files"
