    用户可以通过任务列表窗口的上下文菜单激活或停用扫描器。您可以通过 `attach()` 方法获知扫描器是处于活动状态还是非活动状态。如果 `callback`
    参数的值为 `null`，则表示扫描器已被停用。您可以通过 `Callback` 实例访问任务列表框架。最后，还有两个方法 `notifyPrepare()`
    和 `notifyFinish()`。`notifyPrepare()` 方法在任务列表框架启动扫描之前被调用，您可以在其中为后续的 `scan()` 方法调用做准备。最后，会调用
    `notifyFinish()` 方法。

