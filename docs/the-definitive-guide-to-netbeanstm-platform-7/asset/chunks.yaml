    另一种显示对话框的方法是使用 `notify()` 方法，该方法在应用程序可用时立即在单独的线程中执行。通过 `WindowManager` 类提供的 `invokeWhenUIReady()`
    方法来实现。这种方法与 `notifyLater()` 的区别在于，对话框仅在应用程序窗口完全加载后才显示。


