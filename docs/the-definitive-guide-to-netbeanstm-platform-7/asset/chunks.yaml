- fmt: "# LogManager\n\nThe Java Logging API specifies a central `LogManager`. This\
    \ manager controls a hierarchical namespace holding all named loggers. That is\
    \ why it is reasonable to use the full names of classes (that hold the hierarchical\
    \ package structure) for logger names. For access to this manager, use the following:\n\
    \n`LogManager manager = LogManager.getDefault();`\n\nThe `LogManager` provides\
    \ all names of all loggers. As a result, you can detect the name of a NetBeans\
    \ Platform logger whose level may be changed for debugging purposes, for example.\
    \ A list of all loggers can be retrieved as follows:\n\n```\nLogManager manager\
    \ = LogManager.getLogManager();\nfor(String name : Collections.list(manager.getLoggerNames()))\
    \ {\n   System.out.println(name);\n}\n```\n\n## Configuration\n\nBesides the loggers,\
    \ the manager also administers configuration files, which are initially loaded\
    \ from the `lib/logging.properties` file in the Java Platform directory. You can\
    \ load special configuration files from a specific file by setting their file\
    \ name to the system property `java.util.logging.config.file`. Configuration data\
    \ may be loaded from a database, for example. For this purpose, implement a class\
    \ that extracts the data from the database. Then register this class with the\
    \ system property `java.util.logging.config.class`. Registration causes it to\
    \ be automatically instantiated. Within this class, you provide the configuration\
    \ data for the `LogManager` via an `InputStream` for the `readConfiguration(InputStream)`\
    \ with the `LogManager` method.\n\nRegister `Handler` implementations in the configuration\
    \ file so they output log data to the console (`ConsoleHandler`) or into a file\
    \ (`FileHandler`). You can register your own implementations like the handler\
    \ from the NetBeans Platform that display log messages graphically. The logging\
    \ system comes with a root logger. All other loggers forward their logs to this\
    \ root logger. Register a handler for this root logger, with the following property:\n\
    \n`handlers = java.util.logging.ConsoleHandler`\n\nMultiple handlers can be listed\
    \ using commas. To disable forwarding logs to the root logger, do so by using\
    \ the following:\n\n`<logger name>.useParentHandlers = false`\n\nIn this case,\
    \ you can or must define a handler especially for this logger in order to obtain\
    \ log output:\n\n`<logger name>.handlers = java.util.logging.FileHandler`\n\n\
    Finally, setting the log level is important in the configuration. A log level\
    \ defines which kind of log is recorded. This way, you can hide simple status\
    \ messages and just show warning and error messages when searching errors. On\
    \ the one hand, you can globally define the log level with the following feature:\n\
    \n`.level = WARNING`\n\nOn the other hand, you can overwrite a single logger's\
    \ log level by using its name as a prefix:\n\n`<logger name>.level = INFO`\n\n\
    Configuration data is not only set in the configuration file, but also as system\
    \ properties. Set it at runtime using the `System.setProperty()` method. Doing\
    \ so, make sure to call the `LogManager`'s `readConfiguration()` method in order\
    \ to apply the new configuration data. Alternatively, determine the configuration\
    \ right at the application's startup using command-line parameters. During development\
    \ in NetBeans, set your Module Suite start parameters in the *Project Properties*\
    \ file (under *Important Files*) using the property `run.args.extra`. For example,\
    \ use the following:\n\n`run.args.extra = -J-Dcom.galileo.netbeans.myclass.level=INFO`\n\
    \nFor distribution of your application, set command-line parameters using the\
    \ property `default_options` in the *etc/<application>.conf* file.\n\n### Error\
    \ Reports\n\nThe NetBeans Platform implements and registers a special log handler\
    \ that displays recorded error messages for the user in a dialog. Therefore, use\
    \ either the `SEVERE` or `WARNING` log level, and pass the `Exception` directly\
    \ to the `log()` method.\n\n```\nLogger logger = Logger.getLogger(MyClass.class.getName());\n\
    try {\n   ...\n} catch(Exception e) {\n   logger.log(Level.SEVERE, null, e);\n\
    \   // oder\n   logger.log(Level.WARNING, null, e);\n}\n```\n\n## Summary\n\n\
    In this chapter you learned how to execute tasks on starting and finishing a NetBeans\
    \ Platform application. You can register any `Runnable` instances as tasks. You\
    \ can also restart your application with the lifecycle manager. The second part\
    \ of this chapter dealt with the important topic of logging, including the different\
    \ kinds of log output and how you can configure them.\n\n# PART 2\n\n# Look &\
    \ Feel: Developing User Interfaces\n\n# C H A P T E R 9\n\n# Menu Bar and Toolbar\n\
    \nIn addition to managing your own windows, a status bar, and a progress bar,\
    \ the application window of a NetBeans Platform application manages a menu bar\
    \ and a toolbar by default. The following sections will cover how to use the menu\
    \ bar and the toolbar.\n\n![Image](images/square.jpg) **Tip** Creation and registration\
    \ of menus, menu entries, and toolbar actions has been quite simplified with NetBeans\
    \ Platform 7. In connection with the annotations for actions described in [Chapter\
    \ 6](#Chapter06.html#ch6), menu entries and toolbar actions are easily created.\n\
    \n## Menu Bar\n\nThe menu bar of an application based on the NetBeans Platform\
    \ is built by the Platform itself via the System Filesystem. Every menu (as well\
    \ as the menu entries) is defined in the module layer file. This allows each module\
    \ to declaratively add its menu entries to the menu bar. With NetBeans Platform\
    \ 7 this is even easier. Just implement the action performed when selecting a\
    \ menu entry; that way, this action is supplied with an annotation and the corresponding\
    \ layer entries are automatically created out of these annotations.\n\nIn [Chapter\
    \ 6](#Chapter06.html#ch6), you learned how to create and annotate action classes.\
    \ In this section you will learn how to integrate actions into the menu bar."
  raw: '#### LogManager


    The Java Logging API specifies a central `LogManager`. This manager controls a
    hierarchical namespace holding all named loggers. That is why it is reasonable
    to use the full names of classes (that hold the hierarchical package structure)
    for logger names. For access to this manager, use the following:


    **`LogManager`** `manager = LogManager.`**`getDefault`**`();`


    The `LogManager` provides all names of all loggers. As a result, you can detect
    the name of a NetBeans Platform logger whose level may be changed for debugging
    purposes, for example. A list of all loggers can be retrieved as follows:


    **`LogManager`** `manager = LogManager.`**`getLogManager`**`();`

    `for(String name : Collections.list(manager.`**`getLoggerNames`**`())) {`

    `   System.out.println(name);`

    `}`


    #### Configuration


    Besides the loggers, the manager also administers configuration files, which are
    initially loaded from the `lib/logging.properties` file in the Java Platform directory.
    You can load special configuration files from a  specific file by setting their
    file name to the system property `java.util.logging.config.file`. Configuration
    data may be loaded from a database, for example. For this purpose, implement  a
    class that extracts the data from the database. Then register this class with
    the system property `java.util.logging.config.class`. Registration causes it to
    be automatically instantiated. Within this class, you provide the configuration
    data for the `LogManager` via an `InputStream` for the `readConfiguration(InputStream)`
    with the `LogManager` method.


    Register `Handler` implementations in the configuration file so they output log
    data to the console (`ConsoleHandler`) or into a file (`FileHandler`). You can
    register your own implementations like the handler from the NetBeans Platform
    that display log messages graphically. The logging system comes with a root logger.
    All other loggers forward their logs to this root logger. Register a handler for
    this root logger, with the following property:


    **`handlers`** `= java.util.logging.ConsoleHandler`


    Multiple handlers can be listed using commas. To disable forwarding logs to the
    root logger, do so by using the following:


    `<logger name>.`**`useParentHandlers`** `= false`


    In this case, you can or must define a handler especially for this logger in order
    to obtain log output:


    `<logger name>.`**`handlers`** `= java.util.logging.FileHandler`


    Finally, setting the log level is important in the configuration. A log level
    defines which kind of log is recorded.  This way, you can hide simple status messages
    and just show warning and error messages when searching errors. On the one hand,
    you can globally define the log level with the following feature:


    `.level = WARNING`


    On the other hand, you can overwrite a single logger''s log level by using its
    name as a prefix:


    `<logger name>.level = INFO`


    Configuration data is not only set in the configuration file, but also as system
    properties. Set it at runtime using the `System.setProperty()` method. Doing so,
    make sure to call the `LogManager`''s `readConfiguration()` method in order to
    apply the new configuration data. Alternatively, determine the configuration right
    at the application''s startup using command-line parameters. During development
    in NetBeans, set your Module Suite start parameters in the *Project Properties*
    file (under *Important Files*) using the property `run.args.extra`. For example,
    use the following:


    **`run.args.extra`** `= -J-Dcom.galileo.netbeans.myclass.level=INFO`


    For distribution of your application, set command-line parameters using the property
    `default_options` in the *etc/<application>.conf* file.


    ##### Error Reports


    The NetBeans Platform implements and registers a special log handler that displays
    recorded error messages for the user in a dialog. Therefore, use either the `SEVERE`
    or `WARNING` log level, and pass the `Exception` directly to the `log()` method.


    `Logger` **`logger`** `= Logger.getLogger(MyClass.class.getName());`

    `try {`

    `   ...`

    `} catch(Exception e) {`

    `   logger.`**`log`**`(Level.`**`SEVERE`**`, null, e);`

    `   // oder`

    `   logger.`**`log`**`(Level.`**`WARNING`**`, null, e);`

    `}`


    ### Summary


    In this chapter you learned how to execute tasks on starting and finishing a NetBeans
    Platform application. You can register any `Runnable` instances as tasks. You
    can also restart your application with the lifecycle manager. The second part
    of this chapter dealt with the important topic of logging, including the different
    kinds of log output and how you can configure them.


    ## PART 2


    ## Look & Feel: Developing User Interfaces


    ## C H A P T E R  9


    ## Menu Bar and Toolbar


    In addition to managing your own windows, a status bar, and a progress bar, the
    application window of a NetBeans Platform application manages a menu bar and a
    toolbar by default. The following sections will cover how to use the menu bar
    and the toolbar.


    ![Image](images/square.jpg) **Tip** Creation and registration of menus, menu entries,
    and toolbar actions has been quite simplified with NetBeans Platform 7\. In connection
    with the annotations for actions described in [Chapter 6](#Chapter06.html#ch6),
    menu entries and toolbar actions are easily created.


    ### Menu Bar


    The menu bar of an application based on the NetBeans Platform is built by the
    Platform itself via the System Filesystem. Every menu (as well as the menu entries)
    is defined in the module layer file. This allows each module to declaratively
    add its menu entries to the menu bar. With NetBeans Platform 7 this is even easier.
    Just implement the action performed when selecting a menu entry; that way, this
    action is supplied with an annotation and the corresponding layer entries are
    automatically created out of these annotations.


    In [Chapter 6](#Chapter06.html#ch6), you learned how to create and annotate action
    classes. In this section you will learn how to integrate actions into the menu
    bar.'
