    be displayed with the context menu of a module via *Code Coverage ![Image](images/U001.jpg)
    Show Report*. (See [Figure 42-8](#Chapter42.html#fig_42_8).)


    ![Image](images/4208.jpg)


    ***Figure 42-8.** Integrated report about the test cover within the NetBeans IDE*


    You can run the tests and execute the following report generation with *Run All
    Tests*. You can directly see which lines of the corrresponding class are run through
    a test and which are not, and open single files in the overview (depicted in [Figure
    42-9](#Chapter42.html#fig_42_9)).


    ![Image](images/4209.jpg)


    ***Figure 42-9.** Detailed result of the analysis of the test cover*


    ### Summary


    Doing software testing is an integral part of software development models. In
    this chapter you learned more about how to easily and efficiently test NetBeans
    Platform applications. In the first part of this chapter we did module tests with
    the support of JUnit. In the second part you learned how to test the GUI of a
    NetBeans Platform application. This is done with the support of the Jelly Tools
    Platform.


    ## C H A P T E R  43


    ## Debugging with the NetBeans IDE


    This chapter is about the functionality of the NetBeans debugging environment.
    In this environment you can debug your NetBeans Platform application using numerous
    supporting info windows and other useful features.


    ### Debugging Window


    The NetBeans debugger uses a series of helpful windows to make debugging as efficient
    and transparent as possible. In the following sections you will learn more about
    those windows in detail. The *Debugging* window itself is a combination of different
    functions. Dedicated windows are provided for each function. Thus, you have an
    overview of all threads and, when reaching a breakpoint, you have an overview
    of the complete call stack, too. A symbol (on the right side) shows you which
    threads are currently paused. You can stop or resume certain threads by means
    of this symbol. You can also influence all threads at once with the context menu.
    By double-clicking an entry of the call stack you can directly jump in the source
    file to the position of the corresponding method. (See [Figure 43-1](#Chapter43.html#fig_43_1).)


    ![Image](images/4301.jpg)


    ***Figure 43-1.** Debugging window with all current threads and with the current
    call hierarchy*


    ### Breakpoints


    The so-called *Breakpoints* are the base for debugging an application. With these
    breakpoints you define certain positions in the source code where the execution
    of the application should be stopped. The support of the IDE offers certain possibilities.
    For example, you can take a closer look at the current values of variables or
    you can look at the return value of a method in closer detail at the place where
    the application was stopped. This way you can get information about erratic behavior
    of the software.


    Different types of breakpoints can be distinguished depending on the position
    in the source code or on the event. The types of breakpoints provided in the NetBeans
    IDE are listed in [Table 43-1](#Chapter43.html#tab_43_1).


    ![Image](images/t4301.jpg)


    Apply breakpoints either by clicking the line number (left margin of the source
    code editor), via the menu with *Debug ![Image](images/U001.jpg) New Breakpoint*
    or with the button ![Image](images/U4301.jpg) in the toolbar of the Breakpoints
    window (see [Figure 43-2](#Chapter43.html#fig_43_2)).


    ![Image](images/4302.jpg)


    ***Figure 43-2.** Overview of all breakpoints in the breakpoint window*


    All set breakpoints are displayed in the *Breakpoints* window. For the purpose
    of clarity, you can also arrange them in groups. You can classify the breakpoints
    as either user-specific (*Custom Groups*) or you can group them by default using
    the button ![Image](images/U4302.jpg) (left margin of the Breakpoints window).
    The following standard groups are available:


    *   Programming language: *Language*

    *   Type of the breakpoint: *Type*

    *   Project: *Project*

    *   Files: *Files*

    *   Debug sessions: *Debug Session*

    *   Subgroups: *Nested*


    Call the context menu of the breakpoint to assign a user-specific group or to
    assign a breakpoint to an existing group. With *Move Into Group...* you can either
    directly assign the breakpoint to a group or you can create a new group with *New*.
    As shown in [Figure 43-2](#Chapter43.html#fig_43_2), you can specifically activate
    or deactivate separate breakpoints or groups of breakpoints. The additionally
    displayed green arrow shows you at which breakpoint your application is paused
    at the moment. Breakpoints can also be configured so that the application is only
    paused under certain conditions. Thus, for all types of breakpoints, you can determine
    that the application is just paused after a certain amount of runs. So you can
    pause the application, for example, when the breakpoint on one variable is run
    for the tenth time.


    ![Image](images/4303.jpg)


    ***Figure 43-3.** Configuring breakpoints individually*


    Additionally, you can define which classes should be excluded for the breakpoint
    types *Class* and *Exception*. For the remaining types, you can define any conditions
    when the breakpoint will be valid by a Boolean expression. By default when reaching
    a breakpoint, the currently executing thread is paused. However, you can also
    configure a breakpoint so that either all threads or none is paused. In the latter
    case, the application just resumes.


    ### Variables


    The NetBeans IDE provides different windows and tools in order to check the variables
    when reaching a breakpoint. In the variables window (*Window ![Image](images/U001.jpg)
    Debugging ![Image](images/U001.jpg) Variables*) all variables of the current context
    are displayed (see [Figure 43-4](#Chapter43.html#fig_43_4)). This way, you can
    observe the values of the instance variables, the local variables, and the eventually
    transferred parameters. You can also look at the values of separate variables
    directly in the editor by pointing to the variable with your mouse.


    ![Image](images/4304.jpg)


    ***Figure 43-4.** Overview of variables*


    By so-called *watches* you can also observe variables outside the context of the
    current breakpoint. You can add a new watch entry by means of the toolbar on the
    left side of the Variables window. Additionally, you can just select variables
    in the source code editor and then add them via drag-and-drop so you can concretely
    and clearly track the values of certain variables. As an alternative to representing
    the watches in the Variables window you can use the separate Watches window which
    you find under *Window ![Image](images/U001.jpg) Debugging ![Image](images/U001.jpg)
    Watches*.'
