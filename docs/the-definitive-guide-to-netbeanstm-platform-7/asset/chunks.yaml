    \n```\npublic class MultiViewPanel1 extends JPanel implements MultiViewElement\
    \ {\n   private JToolBar toolbar = new JToolBar();\n   private MultiViewElementCallback\
    \ callback = null;\n\n   public MultiViewPanel1() {\n      initComponents();\n\
    \      toolbar.add(new Panel1ToolbarAction1());\n      toolbar.add(new Panel1ToolbarAction2());\n\
    \   }\n```\n\n视图最初通过`setMultiViewElementCallback()`方法接收一个`MultiViewElementCallback`，以便访问其嵌入的顶级组件。例如，通过此对象你可以获取多视图顶级组件，或者——如你将看到的——你可以调整多视图顶级组件的名称。要在你的类中使用此回调对象，请将数据保存为私有元素。视图的实例通过`getVisualRepresentation()`方法获取。每当视图被激活时都会调用此方法，这意味着应避免在此方法中创建组件。通常，使用`this`来传递当前组件。当前视图的工具栏通过`getToolbarRepresentation()`方法获取。它也会被重复调用。为此，你也应该提供一个已创建的工具栏。多视图顶级组件上下文菜单中的操作通过`getActions()`方法从当前活动视图获取。首先，使用此方法通过`MultiViewElementCallback`对象访问顶级组件的标准操作。然后，你可以将自己的操作添加到标准操作集中。使用`getLookup()`提供一个`Lookup`，该`Lookup`成为多视图顶级组件`Lookup`的一部分，因此也是全局上下文的一部分。\n\
    \n```\npublic void setMultiViewCallback(MultiViewElementCallback c) {\n      callback\
