    For  an additional entry:


    `public class` **`ModuleSpecVersion`** `extends` **`ManifestItem`** `{`

    `public String` **`getItem`**`() {`

    `      return("OpenIDE-Module-Specification-Version: 1.0");`

    `   }`

    `}`


    Of course, you could still extend these classes, so a dialog is displayed to the
    user. In such a dialog, the user can directly assign the concrete values, such
    as the name or the version of the module. You just have to register it in the
    layer file in a folder (which you create), in order to complete the first step
    of defining the separate items. In this case, it makes sense to call the folder
    `ManifestPalette`. Below this folder you can create additional folders. Each of
    those folders then represents a category in the palette, into which the entries
    can be grouped. (See [Listing 22-3](#Chapter22.html#list_22_3).)


    ***Listing 22-3.** Registration of the Palette Entries in Your Own Folder*


    `<folder name="`**`ManifestPalette`**`">`

    `   <folder name="`**`Basic`**`">`

    `      <file name="ModuleName.xml" url="items/`**`ModuleName.xml`**`"/>`

    `   </folder>`

    `   <folder name="`**`Versioning`**`">`

    `      <file name="ModuleSpecVersion.xml" url="items/`**`ModuleSpecVersion.xml`**`"/>`

    `      <file name="ModuleImplVersion.xml" url="items/`**`ModuleImplVersion.xml`**`"/>`

    `   </folder>`

    `</folder>`


    ### Creating and Registering the Palette Controller


    You already implemented and registered the items for the palette in the layer
    file in the `ManifestPalette` folder. Now, your task is to create a `PaletteController`
    instance for this folder, which manages these entries. To do this create a class
    named `ManifestPalette`. Add the method `createPalette()` to this class. This
    method assisted by the `PaletteFactory` class of the Palette API creates a `PaletteController`
    instance, as shown in [Listing 22-4](#Chapter22.html#list_22_4).


    ***Listing 22-4.** Palette Controller Class Responsible for Managing Your Entries*


    `import org.netbeans.spi.palette.PaletteActions;`

    `import org.netbeans.spi.palette.`**`paletteController`**`;`

    `import org.netbeans.spi.palette.`**`paletteFactory`**`;`

    `...`

    `public class` **`ManifestPalette`** `{`

    `private static` **`PaletteController`** `palette;`


    `public static PaletteController` **`createPalette`**`() {`

    `      try {`

    `         if (palette == null) {`

    `palette =` **`PaletteFactory`**`.`**`createPalette`**`("`**`ManifestPalette`**`",
    new MyPaletteActions());`

    `         }`

    `         return(`**`palette`**`);`

    `      } catch (Exception ex) {`

    `         Logger.getLogger(ManifestPalette.class.getName()).log(Level.SEVERE,
    null, ex);`

    `      }`

    `      return null;`

    `   }`


    `   private static final class MyPaletteActions`

    `      extends PaletteActions {`

    `      ...`

    `   }`

    `}`


    We now come to the crucial part, which is the registration of this controller
    for the manifest file type. First, you have to determine the registered MIME type
    for the manifest files. You can easily find out this type by means of the layer
    tree of the *Projects* view under *Important Files ![Image](images/U001.jpg) XML
    Layer ![Image](images/U001.jpg) <this layer in context>*. There, you can find
    the MIME type `text/x-mainfest` under `Editors`. So, you register the controller
    in the folder `Editors/text/x-manifest` in your layer file as follows:


    `<folder name="`**`Editors`**`">`

    `   <folder name="`**`text`**`">`

    `      <folder name="`**`x-manifest`**`">`

    `         <file name="`**`ManifestPalette`**`.instance">`

    `            <attr name="instanceOf" stringvalue="org.netbeans.spi.palette.`**`paletteController`**`"/>`

    `            <attr name="instanceCreate"`

    `               methodvalue="com.galileo.netbeans.module.`**`ManifestPalette`**`.`**`createPalette`**`"/>`

    `         </file>`

    `      </folder>`

    `   </folder>`

    `</folder>`


    Thus, the controller for your manifest palette items is automatically created
    when opening a manifest file in the editor via the `createPalette()` method. This
    controller is provided to the palette module via the Lookup. Then, the palette
    module can display the corresponding entries as shown in [Figure 22-1](#Chapter22.html#fig_22_1).'
