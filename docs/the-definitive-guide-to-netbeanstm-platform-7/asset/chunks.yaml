  raw: '### OSGi and the NetBeans Platform


    Because of the importance of OSGi—especially to companies—the NetBeans Platform
    has been extended so that OSGi bundles can now be executed in a NetBeans Platform
    application. To do so, bundles must not be executed by a NetBeans module system
    but by an integrated OSGi runtime container (Felix or Equinox). This means you
    are able to develop hybrid applications in which NetBeans modules and OSGi bundles
    can run in parallel. A special adapter layer must establish the connection between
    both module systems; as a result, NetBeans modules are able to define dependencies
    on OSGi bundles and refer to their APIs. It is also possible the other way around:
    OSGi bundles can define dependencies on and refer to NetBeans modules.


    Furthermore, it is possible to execute a whole NetBeans Platform application in
    an OSGi runtime container. For this purpose all NetBeans Platform modules are
    converted into OSGi bundles while creating an application. The NetBeans IDE naturally
    supports this as well as the development of bundles. Because the two module systems
    are quite similar, it is possible for both systems to interact as well as convert
    NetBeans modules into OSGi bundles.


    ### OSGi Bundle Format


    In [Chapter 3](#Chapter03.html#ch3) you learned about the basic structure of a
    NetBeans module and the special importance of the manifest file in that structure.
    In the manifest file, you define features and interfaces of a module. An OSGi
    bundle is also depicted by a manifest file; most attributes correspond to an attribute
    of the NetBeans module system. The basic structure of an OSGi bundle is shown
    in [Figure 4-1](#Chapter04.html#fig_4_1).


    ![Image](images/0401.jpg)


    ***Figure 4-1.** Components of an OSGi bundle*


    [Table 4-1](#Chapter04.html#tab_4_1) lists the most important NetBeans module
    attributes together with the corresponding OSGi bundle attributes.


    ![Image](images/t0401.jpg)


    Each of the following Listings ([Listing 4-1](#Chapter04.html#list_4_1) and [Listing
    4-2](#Chapter04.html#list_4_2)) shows the manifest file of a simple NetBeans module
    and of an equally structured OSGi bundle. As you can see, the differences between
    the two files are negligible.


    ***Listing 4-1.** Manifest File of a NetBeans Module*


    **`OpenIDE-Module`**`: com.galileo.netbeans.module`

    **`OpenIDE-Module-Specification-Version`**`: 1.0`

    **`OpenIDE-Module-Name`**`: My Module`

    **`OpenIDE-Module-Localizing-Bundle`**`: com/galileo/netbeans/module/Bundle.properties`

    **`OpenIDE-Module-Install`**`: com/galileo/netbeans/module/Installer.class`

    **`OpenIDE-Module-Public-Packages`**`: com.galileo.netbeans.module.api.*`

    **`OpenIDE-Module-Module-Dependencies`**`: com.galileo.netbeans.library > 1.0`

    **`OpenIDE-Module-Java-Dependencies`**`: Java > 1.6`


    ***Listing 4-2.** Manifest File of an OSGi Bundle*


    **`Bundle-SymbolicName`**`: com.galileo.osgi.bundle`

    **`Bundle-Version`**`: 1.0`

    **`Bundle-Name`**`: My Bundle`

    **`Bundle-Localization`**`: com/galileo/osgi/bundle/Bundle`

    **`Bundle-Activator`**`: com.galileo.osgi.bundle.Installer`

    **`Export-Package`**`: com.galileo.osgi.bundle.api`

    **`Require-Bundle`**`: com.galileo.netbeans.library;bundle-version="[1.0,100)"`

    **`Bundle-RequiredExecutionEnvironment`**`: JavaSE-1.6`


    Defining a localizing bundle with the attribute `OpenIDE-Module-Localizing-Bundle`
    or `Bundle-Localization`, remember that the file extension is not given in an
    OSGi bundle. Defining a dependency on another module or bundle by the attribute
    `Require-Bundle` indicates the needed version with `bundle-version`. To define
    a minimum requirement on the runtime environment you can specify a tag list with
    the attribute `Bundle-RequiredExecutionEnvironment`. Expecting Java 6, use `JavaSE-1.6`.
    Other examples of tags are `J2SE-1.5` or `OSGi/Minimum-1.1`.


    ### Creating New OSGi Bundles


    Creating a new OSGi bundle in the NetBeans IDE is easy. To do this use the wizard
    for creating a new NetBeans module and indicate that it should become a bundle
    that is OSGi conformant, as shown in [Figure 4-2](#Chapter04.html#fig_4_2).


    ![Image](images/0402.jpg)


    ***Figure 4-2.** Creating an OSGi bundle with the NetBeans wizard*


    Choose the type Module with *File* ![Image](images/U001.jpg) *New Project…* in
    the category *NetBeans Modules*. Then activate the option *Generate OSGi Bundle*
    under *Basic Module Configuration* (see [Figure 4-2](#Chapter04.html#fig_4_2)).
    Further usage of the module or bundle is completely transparent then, meaning
    you can define dependencies or add features to the bundle with the NetBeans wizard
    as usual. It is especially interesting that you can also add a layer file to an
    OSGi bundle. This layer file is integrated in the layer files of the NetBeans
    modules in the System Filesystem, too.


    Within a NetBeans Platform application, please bear in mind that OSGi bundles
    are actually executed by an OSGi container—by default the Apache Felix OSGi implementation—not
    by the NetBeans module system. In connection with this, please also bear in mind
    that the following modules are activated and hence included in your platform application:


    *   OSGi Specification

    *   Apache''s Felix OSGi Implementation

    *   NetBeans OSGi Integration


    ### Bundle Lifecycle


    Similar to a Module Installer for a NetBeans module, which was covered in [Chapter
    3](#Chapter03.html#ch3), the OSGi Framework offers a possibility for OSGi bundles
    that you can refer to certain events in the lifecycle of a bundle. Such a class
    that implements the interface `BundleActivator` is called an activator (see [Listing
    4-3](#Chapter04.html#list_4_3)). It provides the methods `start()` and `stop()`.


    ***Listing 4-3.** Activator Class of an OSGi Bundle*


    `import org.osgi.framework.BundleActivator;`

    `import org.osgi.framework.BundleContext;`


    `public class Activator implements` **`BundleActivator`**`{`

    `public void` **`start`**`(BundleContext c) throws Exception {`

    `   }`

    `public void` **`stop`**`(BundleContext c) throws Exception {`

    `   } }`


    It is possible to create such a class with the same NetBeans wizard with which
    a Module Installer is created, too. If you call this wizard for an OSGi bundle
    with *File* ![Image](images/U001.jpg) *New File* ![Image](images/U001.jpg) *Modules
    Development* ![Image](images/U001.jpg) *Installer / Activator* an Activator class
    will automatically be created.


    ### Integrating Existing OSGi Bundles


    One important advantage of supporting OSGi bundles by the NetBeans Platform is
    definitely the reusability of already existing components that exist as OSGi bundles.


    Adding a whole folder of bundles, called a *cluster*, to a Platform application
    is very easy. For this purpose just activate the category *Libraries* in the *Properties*
    dialog of the referring project. You can add bundles with the *Add Cluster…* button,
    which is where you can choose the modules which are provided by the NetBeans Platform,
    too. (See [Figure 4-3](#Chapter04.html#fig_4_3).) Choose the referring directory
    in the following dialog. The wizard will point out that it is not a cluster. The
    wizard will list all JAR files (bundles and modules) if you click *Next*. Then
    you can choose the desired bundles and finish the wizard with the *Finish* button.


    ![Image](images/0403.jpg)


    ***Figure 4-3.** Creating and importing bundle clusters*


    Now you can define dependencies from among the previously added bundles in your
    modules.'
  trans: '

    ### OSGi 与 NetBeans 平台


    鉴于 OSGi 的重要性——尤其对企业而言——NetBeans 平台已得到扩展，使得 OSGi 包现在可以在 NetBeans 平台应用程序中执行。为此，包不应由
    NetBeans 模块系统执行，而应由集成的 OSGi 运行时容器（Felix 或 Equinox）执行。这意味着您可以开发混合应用程序，其中 NetBeans
    模块和 OSGi 包可以并行运行。必须通过一个特殊的适配器层在两个模块系统之间建立连接；因此，NetBeans 模块能够定义对 OSGi 包的依赖关系并引用其
    API。反之亦然：OSGi 包也可以定义对 NetBeans 模块的依赖关系并引用它们。


    此外，还可以在 OSGi 运行时容器中执行整个 NetBeans 平台应用程序。为此，在创建应用程序时，所有 NetBeans 平台模块都会被转换为 OSGi
    包。NetBeans IDE 自然支持此功能以及包的开发。由于这两个模块系统非常相似，两个系统可以交互，并且可以将 NetBeans 模块转换为 OSGi
    包。


    ### OSGi 包格式


    在第 3 章中，您了解了 NetBeans 模块的基本结构以及清单文件在该结构中的特殊重要性。在清单文件中，您定义了模块的特性和接口。OSGi 包也通过清单文件来描述；大多数属性与
    NetBeans 模块系统的属性相对应。OSGi 包的基本结构如图 4-1 所示。


    ![Image](img/0401.jpg)


    ***图 4-1.** OSGi 包的组件*


    表 4-1 列出了最重要的 NetBeans 模块属性以及相应的 OSGi 包属性。


    ![Image](img/t0401.jpg)


    以下每个清单（清单 4-1 和清单 4-2）分别显示了一个简单 NetBeans 模块和一个结构相同的 OSGi 包的清单文件。如您所见，这两个文件之间的差异微乎其微。


    ***清单 4-1.** NetBeans 模块的清单文件*


    **`OpenIDE-Module`**`: com.galileo.netbeans.module`

    **`OpenIDE-Module-Specification-Version`**`: 1.0`

    **`OpenIDE-Module-Name`**`: My Module`

    **`OpenIDE-Module-Localizing-Bundle`**`: com/galileo/netbeans/module/Bundle.properties`

    **`OpenIDE-Module-Install`**`: com/galileo/netbeans/module/Installer.class`

    **`OpenIDE-Module-Public-Packages`**`: com.galileo.netbeans.module.api.*`

    **`OpenIDE-Module-Module-Dependencies`**`: com.galileo.netbeans.library > 1.0`

    **`OpenIDE-Module-Java-Dependencies`**`: Java > 1.6`


    ***清单 4-2.** OSGi 包的清单文件*


    **`Bundle-SymbolicName`**`: com.galileo.osgi.bundle`

    **`Bundle-Version`**`: 1.0`

    **`Bundle-Name`**`: My Bundle`

    **`Bundle-Localization`**`: com/galileo/osgi/bundle/Bundle`

    **`Bundle-Activator`**`: com.galileo.osgi.bundle.Installer`

    **`Export-Package`**`: com.galileo.osgi.bundle.api`

    **`Require-Bundle`**`: com.galileo.netbeans.library;bundle-version="1.0,100)"`

    **`Bundle-RequiredExecutionEnvironment`**`: JavaSE-1.6`


    使用属性 `OpenIDE-Module-Localizing-Bundle` 或 `Bundle-Localization` 定义本地化包时，请记住在 OSGi
    包中不提供文件扩展名。通过属性 `Require-Bundle` 定义对另一个模块或包的依赖关系时，使用 `bundle-version` 指示所需的版本。要定义对运行时环境的最低要求，您可以使用属性
    `Bundle-RequiredExecutionEnvironment` 指定一个标签列表。如果期望 Java 6，请使用 `JavaSE-1.6`。其他标签示例包括
    `J2SE-1.5` 或 `OSGi/Minimum-1.1`。


    ### 创建新的 OSGi 包


    在 NetBeans IDE 中创建新的 OSGi 包很容易。为此，请使用创建新 NetBeans 模块的向导，并指示它应成为一个符合 OSGi 规范的包，如[图
    4-2 所示。


    ![Image](img/0402.jpg)


    ***图 4-2.** 使用 NetBeans 向导创建 OSGi 包*


    在 *NetBeans 模块* 类别中，选择 *文件* ![Image](img/U001.jpg) *新建项目…* 下的模块类型。然后在 *基本模块配置*
    下激活 *生成 OSGi 包* 选项（参见图 4-2）。之后，模块或包的进一步使用是完全透明的，这意味着您可以像往常一样使用 NetBeans 向导定义依赖关系或向包添加功能。特别有趣的是，您还可以向
    OSGi 包添加层文件。该层文件也会集成到系统文件系统中 NetBeans 模块的层文件中。


    在 NetBeans 平台应用程序中，请记住 OSGi 包实际上是由 OSGi 容器（默认是 Apache Felix OSGi 实现）执行的，而不是由 NetBeans
    模块系统执行的。与此相关，还请记住以下模块已被激活，因此已包含在您的平台应用程序中：


    *   OSGi 规范

    *   Apache 的 Felix OSGi 实现

    *   NetBeans OSGi 集成


    ### 包生命周期


    类似于第 3 章中介绍的 NetBeans 模块的模块安装器，OSGi 框架为 OSGi 包提供了一种可能性，使您可以引用包生命周期中的某些事件。实现 `BundleActivator`
    接口的此类类称为激活器（参见清单 4-3）。它提供了 `start()` 和 `stop()` 方法。


    ***清单 4-3.** OSGi 包的激活器类*


    `import org.osgi.framework.BundleActivator;`

    `import org.osgi.framework.BundleContext;`


    `public class Activator implements` **`BundleActivator`**`{`

    `public void` **`start`**`(BundleContext c) throws Exception {`

    `   }`

    `public void` **`stop`**`(BundleContext c) throws Exception {`

    `   } }`


    也可以使用与创建模块安装器相同的 NetBeans 向导来创建此类。如果您通过 *文件* ![Image](img/U001.jpg) *新建文件* ![Image](img/U001.jpg)
    *模块开发* ![Image](img/U001.jpg) *安装器 / 激活器* 为 OSGi 包调用此向导，则会自动创建一个激活器类。


    ### 集成现有的 OSGi 包


    NetBeans 平台支持 OSGi 包的一个重要优势无疑是能够重用已存在的、以 OSGi 包形式存在的组件。


    向平台应用程序添加一个完整的包文件夹（称为*集群*）非常容易。为此，只需在相关项目的*属性*对话框中激活*库*类别。您可以通过*添加集群…*按钮添加包，该按钮也可以选择
    NetBeans 平台提供的模块。（参见图 4-3。）在接下来的对话框中选择相关目录。如果所选目录不是集群，向导会指出这一点。如果您单击*下一步*，向导将列出所有
    JAR 文件（包和模块）。然后您可以选择所需的包，并通过*完成*按钮完成向导。


    ![Image](img/0403.jpg)


    ***图 4-3.** 创建和导入包集群*


    现在，您可以在模块中定义对之前添加的包的依赖关系。

