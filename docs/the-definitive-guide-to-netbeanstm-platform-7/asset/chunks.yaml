    #### 松散服务提供


    模块 B 是用于实现接口 `Mp3Finder` 的服务提供者。在此示例中，假设该模块正在数据库中搜索 MP3 文件。这允许注册服务提供者的多个实现。所有实现可以位于一个或多个独立的模块中。要创建模块
    A 中接口 `Mp3Finder` 的 `Mp3DatabaseFinder` 实现，模块 B 必须定义对模块 A 的依赖关系。然而，作为搜索列表用户界面的模块
    A 不需要依赖模块 B。这是因为 Lookup 基于接口（同样位于模块 A 中）而非实现（位于模块 B 中）提供服务。因此，模块 A 完全独立于服务的实现（参见图
    5-1），并且可以透明地使用它。


    ![Image](img/0501.jpg)


    ***图 5-1.** 服务查找模式*


    在模块 A 中，指定了服务接口 `Mp3Finder`，并实现了一个用于搜索和显示 MP3 文件的用户界面（参见清单 5-1）。通过将接口 `Mp3Finder`
    的 `Class` 对象传递给 Lookup，返回一个与请求类型匹配的实例，从而获取服务提供者。接口 `Mp3Finder` 也被称为模块 A 的扩展点。任何模块都可以为其注册实现。


    ***清单 5-1.** 模块 A：MP3 搜索器*


    `public interface` **`Mp3Finder`** `{`

    `public List<Mp3FileObject>` **`find`**`(String search);`

    `}`

    `public class Mp3SearchList {`

    `   public void doSearch(String search) {`

    **`Mp3Finder`** `finder =`

    `         Lookup.getDefault().Lookup(`**`Mp3Finder`**`.class);`

    `      List<Mp3FileObject> list = finder.`**`find`**`(search);`

    `   }`

    `}`


    模块 B 提供了一个服务提供者，允许在数据库中搜索 MP3 文件。这是通过实现模块 A 指定的接口 `Mp3Finder` 来完成的（参见清单 5-2）。因此，模块
    B 是模块 A 在扩展点 `Mp3Finder` 上的一个扩展。


    新创建的服务提供者必须被注册，以便可以通过 Lookup 发现它。为此，你需要使用 `ServiceProvider` 注解。


    ***清单 5-2.** 模块 B：MP3 查找器*


    `import org.openide.util.Lookup.ServiceProvider;`

    `...`

    **`@ServiceProvider`**`(service = Mp3Finder.class)`

    `public class` **`Mp3DatabaseFinder`** `implements` **`Mp3Finder`** `{`

    `public List<Mp3FileObject>` **`find`**`(String search) {`

    `      // 在数据库中搜索 mp3 文件`

    `   }`

    `}`


    #### 提供多个服务实现


    能够注册多个 MP3 搜索实现是很有用的。这很容易实现。只需创建接口 `Mp3Finder` 的更多实现即可。同样，这些实现必须通过注解进行注册。例如，这样的实现可以如下所示：


    `import org.openide.util.Lookup.ServiceProvider;`

    `...`

    **`@ServiceProvider`**`(service = Mp3Finder.class)`

    `public class` **`Mp3FilesystemFinder`** `implements` **`Mp3Finder`** `{`

    `public List<Mp3FileObject>` **`find`**`(String search) {`

    `      // 在本地文件系统中搜索 mp3 文件`

    `   }`

    `}`


    要使用某个服务的所有已注册实现，必须采用使用 Lookup 发现服务的方式。不要使用 `Lookup()` 方法来获取单个实现，而应使用 `LookupAll()`
    来检索该服务的所有已注册实现。按如下方式调用所有已发现服务的 `find()` 方法：


    `public class Mp3SearchList {`

    `   public void doSearch(String search) {`

    `Collection<? extends` **`Mp3Finder`**`> finder =`

    `         Lookup.getDefault().`**`LookupAll(Mp3Finder`**`.class);`

    `      List<Mp3FileObject> list = new ArrayList<Mp3FileObject>();`

    `      for(Mp3Finder f : finder) {`

    `         list.addAll(f.`**`find`**`(search));`

    `      }`

    `   }`

    `}`


    #### 确保服务可用性


    如果没有可用的搜索服务允许搜索 MP3 文件，那么搜索模块对用户来说就没有用处。为了启用模块 A，并确保至少有一个服务实现可用，NetBeans 模块系统提供了两个属性：`OpenIDE-Module-Provides`
    和 `OpenIDE-Module-Requires`，它们允许在模块的清单文件中定义是否提供或需要特定的服务实现。这些以及清单文件的其他属性将在第 3 章的“模块清单”部分中更详细地描述。


    在模块 A 的清单文件中，需要存在至少一个 `Mp3Finder` 服务的提供者，使用以下条目：


    **`OpenIDE-Module-Requires`**`: com.galileo.netbeans.modulea.Mp3Finder`


    为了在加载模块时通知模块系统模块 B 提供了 `Mp3Finder` 服务，请将以下条目添加到模块 B 的清单文件中：


    **`OpenIDE-Module-Provides`**`: com.galileo.netbeans.modulea.Mp3Finder`


    如果没有模块在其清单文件中声明这样的条目（即没有可用的服务提供者），模块系统会报告错误并且不会加载模块 A。

