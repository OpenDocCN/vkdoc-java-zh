    `public Image` **`getIcon`**`(int type) {`

    `      return album.getIcon(type);`

    `   }`


    `private String` **`getLabel`**`() {`

    `      String label = "<html>" +`

    `         "<table cellspacing=\"0\" cellpadding=\"1\">" +`

    `            "<tr>" +`

    `               "<td><b>Title </b></td>" +`

    `               "<td>" + album.getTitle() + "</td>" +`

    `             ...`

    `   }`

    `}`


    #### 创建并添加组件面板


    创建完这个为组件面板提供数据的节点层次结构后，你现在可以创建一个组件面板并将其添加到播放列表顶层组件的 Lookup 中。这样，只要播放列表处于活动状态，组件面板就会显示出来。因此，首先在`PlaylistTopComponent`类的构造函数中创建一个根节点。你的组件面板数据来自这个根节点。你向此根节点传递一个子容器，该容器由工厂方法`Children.create()`创建。这个子容器负责管理数据。同时，你传递一个负责创建数据的`GenreNodeFactory`实例。然后，你只需要一个`PaletteActions`实例，目前它没有更多意义。稍后，你可以通过`createPalette()`从中创建一个`PaletteController`实例。你可以将此实例打包到一个
    Lookup 中，并通过`associateLookup()`将其定义为顶层组件的本地 Lookup。


    `import org.netbeans.spi.palette.PaletteActions;`

    `import org.netbeans.spi.palette.PaletteController;`

    `import org.netbeans.spi.palette.PaletteFactory;`

    `...`

    `public` **`PlaylistTopComponent`**`() {`

    `   ...`

    `   Node root = new AbstractNode(`**`Children.create(new GenreNodeFactory(), false)`**`);`

    `   PaletteActions    a = new MyPaletteActions();`

    `   PaletteController p = PaletteFactory.`**`createPalette`**`(root, a);`

    **`associateLookup`**`(Lookups.fixed(p));`

    `}`

