    \ {\n            return false;\n        }\n    }\n}\n```\n\nBe aware that this\
    \ module requires a dependency on the Dialogs API to be able to use the NetBeans\
    \ dialog support. Defining dependencies was described previously in the section\
    \ *Versioning and Dependencies*, while information about the Dialogs API can be\
    \ found in [Chapter 13](#Chapter13.html#ch13).\n\nTo try this new functionality,\
    \ invoke *Run ![Image](images/U001.jpg) Run Main Project (F6)*. When the application\
    \ shuts down, the dialog is shown and you can confirm whether or not the application\
    \ should actually be shut down.\n\n## Module Registry\n\nModules do not normally\
    \ need to worry about other modules. Nor should they need to know whether other\
    \ modules exist. However, it might sometimes be necessary to create a list of\
    \ all available modules. The module system provides a `ModuleInfo` class for each\
    \ module, where all information about modules is stored. The `ModuleInfo` objects\
    \ are available centrally via the Lookup, and can be obtained there as follows:\n\
    \n```\nCollection<? extends ModuleInfo> modules = Lookup.getDefault().lookupAll(ModuleInfo.class);\n\
    ```\n\nThe class provides information such as module name, version, dependencies,\
    \ current status (activated or deactivated), and the existence of service implementations\
    \ for the current module. Use the `getAttribute()` method to obtain this information\
    \ from the manifest file. To be informed of changes, register a `PropertyChangeListener`,\
    \ which informs you both of the activation and deactivation of modules in the\
    \ system (`ModuleInfo` object). You can also register a `LookupListener` that\
    \ informs you of the installation and uninstallation of modules. For example,\
    \ a listener could be defined as shown in [Listing 3-8](#Chapter03.html#list_3_8).\n\
    \n***Listing 3-8.** Reacting on Changes in the Module System*\n\n```\nLookup.Result<ModuleInfo>\
    \ result = Lookup.getDefault().lookupResult(ModuleInfo.class);\nresult.addLookupListener(new\
    \ LookupListener() {\n    public void resultChanged(LookupEvent lookupEvent) {\n\
    \        Collection<? extends ModuleInfo> c = result.allInstances();\n       \
    \ System.out.println(\"Available modules: \" + c.size());\n    }\n});\nresult.allItems();\
    \ // initialize the listener\n```\n\n## Using Libraries\n\nWhen developing rich\
    \ client applications, you will more than likely need to include external libraries\
    \ in the form of JAR archives within your application. Since the whole application\
    \ is based on modules, it is desirable to integrate the external JAR file in the\
    \ form of a module. That has the advantage of setting dependencies on the module,\
    \ enhancing the consistency of the application as a whole. You can also bundle\
    \ multiple JAR files into a single module, after which you will no longer need\
    \ to put the physical JAR files on the application classpath, as is normally done\
    \ when developing applications.\n\n### Library Wrapper Module\n\nTo achieve the\
    \ scenario just outlined, create a *Library Wrapper Module*. The NetBeans IDE\
    \ provides a project type and a wizard for this purpose.\n\n1.  To create a new\
    \ library wrapper project, go to *File ![Image](images/U001.jpg) New Project*…,\
    \ and use the dialog shown in [Figure 3-11](#Chapter03.html#fig_3_11) to choose\
    \ the category *NetBeans Modules*, followed by the project type *Library Wrapper\
    \ Module*.\n\n![Image](images/0311.jpg)\n\n***Figure 3-11.** Creating a library\
    \ wrapper module*\n\n2.  Click *Next* to choose the required JAR files. You can\
    \ choose one or more JAR files here (hold down the Ctrl key to select multiple\
    \ JAR files). You are also able to add a license file for the JAR you are wrapping\
    \ as a module.\n3.  In the next step, provide a project name, as well as a location\
    \ to store the new module. Specify the Module Suite or Platform Application to\
    \ which the library wrapper module belongs.\n4.  Click *Next* again to fill out\
    \ the *Basic Module Configuration* dialog, as shown in [Figure 3-12](#Chapter03.html#fig_3_12).\n\
    \n![Image](images/0312.jpg)\n\n***Figure 3-12.** Library wrapper module configuration*\n\
    \n5.  This is where you can define the code name base. Normally this field is\
    \ prefilled with the name of the selected JAR archive of the read code name base.\
    \ Furthermore, you can provide the module with a name and a Localizing Bundle\
    \ to localize the module manifest information. With a click on the *Finish* button,\
    \ you create the new project.\n\nWhen you are looking at the newly created library\
    \ wrapper module in the *Projects* window, and you additionally open the *Source\
    \ Packages* folder, you will see that the *Bundle.properties* file of the manifest\
    \ file is located here. The library, which is encapsulated by the module, was\
    \ copied in the directory *release/modules/ext* of the project folder.\n\nTo understand\
    \ how a library wrapper module works, take a look at the related manifest file\
    \ which is found in the projects structure in the folder *Important Files*. Note\
    \ that the manifest information, which is depicted in the [Listing 3-9](#Chapter03.html#list_3_9),\
    \ may not be found directly in the manifest file. Certain information, such as\
    \ the public packages, are just written when you build the module (when calling\
    \ *Build Project*). To see the entire manifest file, create the module and then\
