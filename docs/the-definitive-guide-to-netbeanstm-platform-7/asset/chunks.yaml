  raw: '#### Implementing Context Interfaces


    First, you specify the functionality which will receive your `Mp3DataObject` by
    an interface. You should now call it `PlayInterface` and so specify the method
    `play()` with which the corresponding `Mp3DataObject` can be played:


    `public interface` **`PlayInterface`** `{`

    `public void` **`play`**`();`

    `}`


    Of course, you then need an implementation of the desired functionality which
    you have specified by the context interface. You might imagine that you implement
    the interface directly by the class `Mp3DataObject`; however, it is better to
    do this by a separate class, a *Support* class. That way the functionality can
    be flexibly added to the `Mp3DataObject` and deleted again. Furthermore, multiple
    context interfaces can be grouped semantically and the `Mp3DataObject` class remains
    very small.


    `public class` **`PlaySupport`** `implements` **`PlayInterface`** `{`

    `   private Mp3DataObject mp3 = null;`

    `   public PlaySupport(Mp3DataObject mp3) {`

    `      this.mp3 = mp3;`

    `   }`

    `public void` **`play`**`() {`

    `      System.out.println("Play: " + mp3.getPrimaryFile().getName());`

    `   }`

    `}`


    Furthermore, it is only necessary to add an instance of this support class to
    the Lookup of the `Mp3DataObject` class. You do this with the method `getCookieSet().assign()`
    and in doing so indicate that it is the type `PlayInterface`. Of course, you could
    also indicate `PlaySupport.class`, but this way, you are independent of the implementation.


    `public class Mp3DataObject extends` **`MultiDataObject`** `{`

    `public` **`Mp3DataObject(FileObject pf, MultiFileLoader loader)`**

    `      throws DataObjectExistsException, IOException {`

    `      super(pf, loader);`

    **`getCookieSet().assign(PlayInterface.class, new PlaySupport(this));`**

    `   }`

    `}`


    You finally expanded your `Mp3DataObject` with a functionality in three steps.
    This functionality can be used from outside in the local Lookup which is available
    through `getLookup()`.


    #### Using Context Interfaces


    Finally, the question remains how to access the functionalities of a data object.
    I want to answer this question by means of a context aware action class. To do
    this, you create a new class with the wizard by *File* ![Image](images/U001.jpg)
    *New File*… ![Image](images/U001.jpg) *Module Development* ![Image](images/U001.jpg)
    *Action*. You now use `Mp3DataObject` as context. This way, the action only becomes
    active when a `Mp3DataObject`, meaning its node, is selected. As you already know
    from [Chapter 6](#Chapter06.html#ch6), the context is transferred to the constructor
    of a context aware class:


    `public final class MyContextAction implements ActionListener {`

    `private final` **`Mp3DataObject context`**`;`

    `    public MyContextAction(`**`Mp3DataObject context`**`) {`

    `        this.context = context;`

    `    }`

    `public void` **`actionPerformed`**`(ActionEvent ev) {`

    `        // do something with context`

    `PlayInterface p =` **`context.getLookup().Lookup(PlayInterface.class);`**

    `        p.play();`

    `    }`

    `}`


    If an `Mp3DataObject` is now selected in your application, the context aware action
    automatically becomes active through the NetBeans Platform. You can then access
    the context, which is the `Mp3DataObject` instance, in the `actionPerformed()`
    method. As you already know, the features of the data object are managed in a
    Lookup. So you catch this Lookup and deliver the implementation of the `PlayInterface`
    by the `Lookup()` method. You can now access the implementation of the `PlaySupport`
    class and you can execute its methods.


    You can test everything with the *Favorites* module.


    1.  To do this, ensure that the module Favorites is activated in your NetBeans
    Platform application under *Properties* ![Image](images/U001.jpg) *Libraries*
    in the cluster platform.

    2.  Next start your application and open the Favorites window with *Window* ![Image](images/U001.jpg)
    *Favorites*.

    3.  Right-click the window and choose *Add to Favorites*.

    4.  Then select an MP3 file or a directory with MP3 files in the selection dialog
    and press *Add* to add the selected entry from the Favorites window. The shown
    MP3 files are represented by a data node instance which was created by the `Mp3DataObject`
    itself. The object was created by a data loader when you added the MP3 files to
    the Favorites window.


    If you selected an MP3 file and you now execute the action—looking at the output
    of the `play()` method—you see that you can directly access the selected data
    by the context class of this action.'
