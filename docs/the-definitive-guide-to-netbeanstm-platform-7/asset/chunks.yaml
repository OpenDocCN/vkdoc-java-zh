  trans: '

    ### 回调动作


    回调动作与始终启用动作不同，因为回调动作能够委托给另一个通常依赖于上下文的动作。通常，回调动作不包含动作逻辑，而是进一步委托给所谓的*动作执行器*。如果不存在动作执行器，你可以在回调动作中添加所谓的回退实现。回调动作主要用于全局动作，即那些根据上下文遵循不同逻辑的动作。这些动作包括搜索、复制或粘贴等。NetBeans
    平台的 Actions API 也提供了多个这样的全局动作。动作执行器由 Java 的 `ActionMap` 提供。在此过程中，动作执行器和回调动作的键会注册到这个映射中。所有继承自
    `JComponent` 的类默认都有一个 `ActionMap`。NetBeans 平台基类也默认有一个 `TopComponent`。它用于在 NetBeans
    平台应用程序中显示的窗口（更多信息请参见第 10 章）。这个 `ActionMap` 通过 Lookup 提供。回调动作类的任务是检查全局代理 Lookup
    中是否存在 `ActionMap`。如果存在，则检查是否为你自己的动作注册了动作执行器。在这种情况下，菜单和工具栏条目等动作表示器会被自动激活。如果没有提供动作执行器和回退实现，动作表示器将被停用。


    NetBeans IDE 没有提供专门的向导来创建回调动作。如果你想创建一个带有回退实现的回调动作，只需使用“始终启用动作”一节中描述的向导来创建一个始终启用的动作类。然后，你只需在
    `ActionRegistration` 注解中添加另一个参数。如果你不需要回退实现，那就更简单了。只需将 `ActionID` 和 `ActionRegistration`
    注解添加到键上即可。在这种情况下，甚至不再需要类。


    在清单 6-3 中，将创建一个带有回退实现的动作，以实现刷新功能。它将根据当前哪个窗口拥有焦点来执行不同的动作。使用始终启用动作的向导创建一个名为 `RefreshAction`
    的动作类，并将其添加到菜单或工具栏中。已经用 `key` 参数扩展的类应如清单 6-3 所示。


    ***清单 6-3.** 带有回退实现的回调动作*


    `import java.awt.event.ActionEvent;`

    `import java.awt.event.ActionListener;`

    `import org.openide.awt.ActionRegistration;`

    `import org.openide.awt.ActionReference;`

    `import org.openide.awt.ActionReferences;`

    `import org.openide.awt.ActionID;`


    `@ActionID(     category = "File",`

    `    id = "com.galileo.netbeans.RefreshAction")`

    `@ActionRegistration(`

    `    iconBase = "com/galileo/netbeans/icon.gif",`

    `    displayName = "#CTL_RefreshAction"`

    **`key = "RefreshAction"`**`)`

    `@ActionReferences({`

    `    @ActionReference(path = "Menu/File", position = 900),`

    `    @ActionReference(path = "Toolbars/File", position = 300)`

    `})`

    `public final class` **`RefreshAction`** `implements ActionListener {`

    `    public void actionPerformed(ActionEvent e) {`

    `        // TODO 回退实现`

    `    }`

    `}`


    与始终启用动作的唯一区别在于，回调动作使用了额外的参数 `key`。这样，你可以分配一个随机标识符，动作执行器通过该标识符进行关联。


    `RefreshAction` 类本身充当回退实现。如果你不需要这样的类，只需像清单 6-4 所示那样注解一个键即可。


    ***清单 6-4.** 不带回退实现的回调动作*


    `@ActionID(     category = "File",`

    `    id = "com.galileo.netbeans.RefreshAction")`

    `@ActionRegistration(`

    `    iconBase = "com/galileo/netbeans/icon.gif",`

    `    displayName = "#CTL_RefreshAction")`

    `public static final String` **`REFRESH_ACTION = "RefreshAction"`**`;`


    现在，如果你启动应用程序，并且既没有提供回退实现也没有提供动作执行器，该动作在菜单和工具栏中都将被停用。清单 6-5 常规性地解释了如何提供动作执行器，因为它假设一个派生自
    `TopComponent` 类的窗口。你将在第 10 章 中创建这样一个窗口。一旦创建完成，你也可以实际测试这个动作类。


    ***清单 6-5.** 为回调动作注册动作执行器*


    `public final class MyTopComponent extends TopComponent {`

    `   public MyTopComponent() {       ...`

    **`getActionMap()`**`.put(`**`"RefreshAction"`**`,`

    `                         new AbstractAction() {`

    `         public void actionPerformed(ActionEvent event) {`

    `           // 刷新顶层组件的内容`

    `         }`

    `      });`

    `   }`

    `}`


    通过 `JComponent` 类定义的 `getActionMap()` 方法获取顶层组件的动作映射。然后，添加一个与 `RefreshAction` 的键关联的动作实现实例。现在，由
    `AbstractAction` 类创建的动作位于 `MyTopComponent` 的上下文中。你可以将任何实现了 `Action` 接口的动作类添加到动作映射中。


    一旦 `MyTopComponent` 窗口获得焦点，`RefreshAction` 就会被激活。确认该动作后，将执行由 `MyTopComponent`
    提供的 `actionPerformed()` 方法。为了全面理解，了解回调类如何获取动作执行器是有意义的，因为仅仅将动作执行器添加到动作映射中并不会将其提供给
    `RefreshAction` 类。这两部分之间的连接仍然缺失。Lookup 概念负责这个连接。在这种情况下，Lookup 概念指的是顶层组件的本地 Lookup
    和一个全局代理 Lookup，后者便于回调动作访问本地 Lookup。顶层组件必须确保其动作映射位于其 Lookup 中。然后，回调动作才能找到动作执行器。默认情况下，动作映射已经在顶层组件的本地
    Lookup 中；你无需再担心它，除非你使用 `associateLookup()` 方法设置另一个本地 Lookup 或重写 `getLookup()`
    方法。只需知道你需要再次添加动作映射。关于 Lookup 概念就介绍这么多；你可以在第 5 章 中找到更多信息。


    现在，你可以向回调动作添加任意数量的动作执行器，这些执行器会根据当前上下文自动执行。你可能会问自己如何使用 NetBeans Actions API 提供的动作，例如
    `CopyAction`、`CutAction` 或 `DeleteAction` 类，这些类至少已经集成在菜单中，因此可以使用。这些类都是回调动作，只需像之前通过
    `RefreshAction` 类解释的那样提供一个动作执行器即可使用。


    如果你不想为回调动作使用注解，你也可以通过清单 6-6 中所示的条目在 `Actions` 文件夹中注册它们。


    ***清单 6-6.** 通过层文件中的条目注册回调动作*

    '
- fmt: "```xml\n<file name=\"com-galileo-netbeans-RefreshAction.instance\">\n  <attr\
    \ name=\"displayName\"\n    bundlevalue=\"com.galileo.netbeans.Bundle#CTL_RefreshAction\"\
    />\n  <attr name=\"iconBase\"\n    stringvalue=\"com/galileo/netbeans/icon.gif\"\
    />\n  <attr name=\"instanceCreate\"\n    methodvalue=\"org.openide.awt.Actions.callback\"\
    />\n  <attr name=\"fallback\"\n    methodvalue=\"org.openide.awt.Actions.alwaysEnabled\"\
    \ />\n  <attr name=\"delegate\"\n    newvalue=\"com.galileo.netbeans.RefreshAction\"\
    />\n  <attr name=\"key\" stringvalue=\"RefreshAction\"/>\n</file>\n```\n\nThe\
    \ attributes `displayName` and `iconBase` correspond to the attributes of an always\
    \ enabled action explained in the section “Always Enabled Actions”. The special\
    \ attributes for a callback action are listed and explained in [Table 6-3](#Chapter06.html#tab_6_3).\n\
    \nThe optional attributes of an always enabled action (see [Table 6-2](#Chapter06.html#tab_6_2))\
    \ are also provided using a callback action.\n\n![Image](images/t0603.jpg)\n\n\
    ## Context Aware Actions\n\nActions of this type work in a particular context—a\
    \ file, for example. The special thing about this type of action is that such\
    \ actions are only active when the referring context in the application is active,\
    \ too. In the example, the file is opened in the application. The context is automatically\
    \ transferred to the action by the NetBeans Platform, so the action can execute\
    \ the referring action on the context, such as edit a file, for example. Typically,\
    \ connecting the context and the action by a so-called *Context Interface* (also\
    \ called a *Cookie*), which is implemented by the context.\n\nWe want to use a\
    \ node class as context in the following example. A node is the representation\
    \ of certain data. In practice, a node can be a file which is depicted in a tree\
    \ structure or which is opened in an editor, for example. You will learn more\
    \ about this concept, which is frequently used within the NetBeans Platform, in\
    \ [Chapters 7](#Chapter07.html#ch7) and [12](#Chapter12.html#ch12).\n\nTo create\
    \ a context aware action you can use the action wizard again (*File* ![Image](images/U001.jpg)\
    \ *New File*… ![Image](images/U001.jpg) *Module Development* ![Image](images/U001.jpg)\
    \ *Action*). However in this case you should choose the type *Conditionally Enabled*.\
    \ Specify the context interface then and choose whether the action should be even\
    \ active when multiple instances of the context interface exist. We use the context\
    \ interface `Editable` in this example and specify that the action will only work\
    \ on one context instance. On the following page of the wizard you can then integrate\
    \ the action into the menubar and the toolbar (see the “Always Enabled Action”\
    \ section). After completing the wizard, your action class should about look like\
    \ [Listing 6-7](#Chapter06.html#list_6_7).\n\n***Listing 6-7.** Action Class of\
    \ the Type Context Aware Which Becomes Active When an Instance of the Context\
    \ Interface Editable Exists*\n\n```\nimport java.awt.event.ActionListener;\nimport\
    \ java.awt.event.ActionEvent;\nimport org.netbeans.api.actions.Editable;\nimport\
    \ org.openide.awt.ActionID;\nimport org.openide.awt.ActionRegistration;\nimport\
    \ org.openide.awt.ActionReferences;\n\n@ActionID(\n    category = \"Edit\",\n\
    \    id = \"com.galileo.netbeans.MyContextAction\")\n@ActionRegistration(\n  \
    \  iconBase = \"com/galileo/netbeans/icon.gif\",\n    displayName = \"#CTL_MyContextAction\"\
    )\n@ActionReferences({})\npublic final class MyContextAction implements ActionListener\
    \ {\nprivate final Editable context;\n    public MyContextAction(Editable context)\
    \ {\n        this.context = context;\n    }\npublic void actionPerformed(ActionEvent\
    \ ev) {\n        // do something with context\ncontext.edit();\n    } }\n```\n\
    \nNow looking at the created action class, you will quickly recognize that it\
    \ hardly differs from an always enabled action. A context aware action is registered\
