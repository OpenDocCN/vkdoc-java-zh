    Option panels are registered by annotations and thus added to the option dialog.
    A primary panel that does not contain secondary panels is provided with the `@OptionsPanelController.TopLevelRegistration`
    annotation. A primary panel functioning as container for secondary panels is provided
    with the `@OptionsPanelController.ContainerRegistration` annotation. A secondary
    panel is registered via the `@OptionsPanelController.SubRegistration` annotation.
    The annotation is added to the controller, which is itself responsible for creating
    the corresponding panel.


    #### Primary Panel


    Using the annotation for the registration of a primary panel, you must assign
    a name via the `categoryName` attribute and an icon via the `iconBase` attribute
    (see [Listing 20-3](#Chapter20.html#list_20_3)). The icon and the name are located
    in the top bar of the option dialog (see [Figure 20-1](#Chapter20.html#fig_20_1)).
    Optionally, you can add the attributes `keywords` And `keywordsCategory` with
    the appropriate values, so the option panel can be found by QuickSearch. Furthermore,
    you can assign an identifier via the `id` attribute. With this identifier, a panel
    can directly be opened via the `OptionsDisplayer.open()` method. Ideally, you
    use a constant string of your controller class for this purpose. You can influence
    the order in which the panels in the options dialog are displayed, via the `position`
    attribute. bear in mind that you can also read values from a *Bundle.properties*
    file via the # sign concerning the currently displayed annotations.


