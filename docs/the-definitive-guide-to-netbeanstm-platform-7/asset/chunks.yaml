- fmt: "#### Installing the Test Environment\n\nBefore creating a first test class,\
    \ you have to install the test environment in a few simple steps. The following\
    \ assumes that you have already created and opened a NetBeans Platform application\
    \ project with at least one module within the NetBeans IDE.\n\nFirst, create a\
    \ folder in which the test classes are stored. The easiest way to do this is in\
    \ the Files window (*Window* ![Image](images/U001.jpg) *Files*). You just create\
    \ the directory `test/qa-functional/src` in the corresponding module directory\
    \ via *File* ![Image](images/U001.jpg) *New File* ![Image](images/U001.jpg) *Other*\
    \ ![Image](images/U001.jpg) *Folder*. (See [Figure 42-6](#Chapter42.html#fig_42_6).)\n\
    \n![Image](images/4206.jpg)\n\n***Figure 42-6.** Structure of the directory for\
    \ functional test classes*\n\nThus, the two new folders *Functional Test Packages*\
    \ and *Functional Test Libraries* are displayed in the Project View (after restarting\
    \ the IDE). Before you can add the libraries necessary for implementing and executing\
    \ the functional tests to the folder *Functional Test Libraries*, you have to\
    \ add the libraries to the application itself. Thus, activate the whole cluster\
    \ `harness` via *Properties* ![Image](images/U001.jpg) *Libraries* in the Platform\
    \ application project. The (eventually) missing modules can be automatically added\
    \ with the button *Resolve*.\n\nThen you can add the following libraries from\
    \ the context menu of the *Functional Test Libraries* folder with *Add Functional\
    \ Test Depedency*:\n\n- `JUnit`\n- `Jelly Tools Platform`\n- `Jemmy`\n- `NB JUnit`\n\
    \nYou just have to ensure that the dependencies are included recursively for the\
    \ `NB JUnit` module. You can activate this option with *Edit...* in the context\
    \ menu (see [Figure 42-4](#Chapter42.html#fig_42_4)). Now you have created the\
    \ necessary prerequisites and can implement a first test case in the next section.\n\
    \n#### Implementing a Test Case\n\nThis section will explain the basic approach\
    \ of implementing functional GUI tests with a simple example. A feature will be\
    \ saved persistently in a window by pressing a button. Opening the application\
    \ or the window, the value will automatically be loaded into the appropriate text\
    \ field. (See [Figure 42-7](#Chapter42.html#fig_42_7).)\n\n![Image](images/4207.jpg)\n\
    \n***Figure 42-7.** The functionality of the TopComponent MyWindow will be tested.*\n\
    \nSo, the window in the form of a top component class could be implemented as\
    \ shown in [Listing 42-15](#Chapter42.html#list_42_15).\n\n***Listing 42-15.**\
    \ The GUI Component to Be Tested and with Which a feature Will Be Saved or Loaded*\n\
    \n```\nimport org.openide.windows.TopComponent;\nimport org.openide.awt.ActionID;\n\
    import org.openide.awt.ActionReference;\nimport org.openide.util.NbBundle;\nimport\
    \ org.openide.util.NbBundle.Messages;\nimport org.openide.util.NbPreferences;\n\
    \n@TopComponent.Description(\n    preferredID = \"MyTopComponent\",\n    persistenceType\
    \ = TopComponent.PERSISTENCE_ALWAYS)\n@TopComponent.Registration(\n    mode =\
    \ \"editor\",\n    openAtStartup = true)\n@ActionID(\n    category = \"Window\"\
    ,\n    id = \"com.galileo.netbeans.module.MyTopComponent\")\n@ActionReference(path\
    \ = \"Menu/Window\")\n@TopComponent.OpenActionRegistration(\n    displayName =\
    \ \"#CTL_MyAction\",\n    preferredID = \"MyTopComponent\")\n@Messages({\n   \
    \ \"CTL_MyTopComponent=MyWindow\",\n    \"CTL_MyAction=MyWindow\"})\npublic final\
    \ class MyTopComponent extends TopComponent {\n\n    private javax.swing.JButton\
    \ okButton;\n    private javax.swing.JTextField propValue;\n\n    public MyTopComponent()\
    \ {\n        initComponents();\n        setName(Bundle.CTL_MyTopComponent());\n\
    \    }\n\n    ...\n\n    private void okButtonActionPerformed(ActionEvent evt)\
    \ {\n        NbPreferences.forModule(MyTopComponent.class).put(\"propKey\", propValue.getText());\n\
    \    }\n\n    @Override\n    public void componentOpened() {\n        propValue.setText(NbPreferences.forModule(\n\
    \            MyTopComponent.class).get(\"propKey\", \"default\"));\n    }\n}\n\
    ```\n\nNow, you want to create a test case for this functionality. Create the\
    \ class `MyTopComponentTest` with *File* ![Image](images/U001.jpg) *New File*\
    \ ![Image](images/U001.jpg) *Java* ![Image](images/U001.jpg) *Java Class* under\
    \ *Functional Test Packages*. You derive functional tests from the class `JellyTestCase`.\
    \ As in the section *Testing in the NetBeans Runtime Container Environment* you\
    \ provide a wrapper test instance that ensures that all tests run within the NetBeans\
    \ Runtime Container environment. You provide it by the method `suite()` so you\
    \ can determine which clusters and modules will be active. You can determine this\
    \ via a `Configuration` object. You can also influence which tests are run. (See\
    \ [Listing 42-16](#Chapter42.html#list_42_16).)\n\n***Listing 42-16.** Test Class\
    \ to Test the Functionality of MyTopComponent*\n\n```\nimport junit.framework.Test;\n\
    import org.netbeans.jellytools.JellyTestCase;\nimport org.netbeans.jellytools.MainWindowOperator;\n\
    import org.netbeans.jellytools.TopComponentOperator;\nimport org.netbeans.jemmy.operators.JButtonOperator;\n\
    import org.netbeans.jemmy.operators.JTextFieldOperator;\nimport org.netbeans.junit.NbModuleSuite;\n\
    \npublic class MyTopComponentTest extends JellyTestCase {\n\n    private static\
    \ final String EXPECTED_RESULT = \"testValue\";\n\n    public MyTopComponentTest(String\
    \ name) {\n        super(name);\n    }\n\n    public static Test suite() {\n \
    \       return NbModuleSuite.allModules(MyTopComponentTest.class,\n          \
    \  \"testSetValue\", \"testGetValue\");\n    }\n\n    public void testSetValue()\
    \ {\n        TopComponentOperator op = new TopComponentOperator(\"MyWindow\");\n\
    \        JTextFieldOperator text = new JTextFieldOperator(op, 0);\n        text.setText(EXPECTED_RESULT);\n\
    \        JButtonOperator button = new JButtonOperator(op, \"OK\");\n        button.press();\n\
    \        op.close();\n    }\n}\n```"
  raw: '#### Installing the Test Environment


    Before creating a first test class, you have to install the test environment in
    a few simple steps. The following assumes that you have already created and opened
    a NetBeans Platform application project with at least one module within the NetBeans
    IDE.


    First, create a folder in which the test classes are stored. The easiest way to
    do this is in the Files window (*Window ![Image](images/U001.jpg) Files*). You
    just create the directory *test/qa-functional/src* in the corresponding module
    directory via *File ![Image](images/U001.jpg) New File ![Image](images/U001.jpg)
    Other ![Image](images/U001.jpg) Folder*. (See [Figure 42-6](#Chapter42.html#fig_42_6).)


    ![Image](images/4206.jpg)


    ***Figure 42-6.** Structure of the directory for functional test classes*


    Thus, the two new folders *Functional Test Packages* and *Functional Test Libraries*
    are displayed in the Project View (after restarting the IDE). Before you can add
    the libraries necessary for implementing and executing the functional tests to
    the folder *Functional Test Libraries*, you have to add the libraries to the application
    itself. Thus, activate the whole cluster *harness* via *Properties ![Image](images/U001.jpg)
    Libraries* in the Platform application project. The (eventually) missing modules
    can be automatically added with the button *Resolve*.


    Then you can add the following libraries from the context menu of the *Functional
    Test Libraries* folder with *Add Functional Test Depedency*:


    *   JUnit

    *   Jelly Tools Platform

    *   Jemmy

