    ### The Scene: The Root Element


    As you already know, the components of the Visual Library API—that is, the widgets—are
    arranged and managed in a hierarchical tree structure. In turn, this means widgets
    can contain other widgets. The `Scene` class, which is itself a widget, represents
    the container for the subsequent elements and therefore is the root element of
    the tree hierarchy (see [Figure 14-2](#Chapter14.html#fig_14_2)). Graphically,
    a scene is represented by a view, which is a simple `JComponent` instance. This
    is then typically added to a `JScrollPane`. You always start with creating a scene,
    to which you then add further widgets in hierarchical arrangement, depending on
    the application''s purpose. [Listing 14-1](#Chapter14.html#list_14_1) illustrates
    this.


