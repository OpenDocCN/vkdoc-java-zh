    \ enable the representation of the data and allow the user to manage and edit\
    \ music albums. You want to list albums in a table within a top component (see\
    \ [Figure 26-3](#Chapter26.html#fig_26_3)). First you create a class `AlbumsTopComponent`\
    \ which contains a table of the type `JTable`. You need a model for the table,\
    \ so this table can represent and manage the albums in terms of the already-created\
    \ data model `Album`. Since this data model is only necessary at this point you\
    \ implement it as private inner class `AlbumsTableModel`. So the data is stored\
    \ in a `List` of the type `Album`. Since you need access to this model later,\
