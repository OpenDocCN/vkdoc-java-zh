- fmt: "# ID3 API\n\nOf course, you will reuse the information stored in this manner\
    \ in your application. Therefore, you need an API that adequately supports retrieval\
    \ and storage of ID3 data, according to the specification. On the Internet you\
    \ will find a series of such ID3 APIs for free. Most of them are reasonably useful.\
    \ For easy handling and simple integration, I started implementing my own ID3\
    \ APIs, though. Doing so, I consciously avoided the assistance of NetBeans APIs,\
    \ in order to being able to use it in other applications, too. Although this library\
    \ is still under development (only the editing of ID3v1 tags is possible at the\
    \ moment), it is sufficient for this example, which merely demonstrates advantages\
    \ and strengths of the NetBeans Platform. Of course, you are free to use another\
    \ library. If you do, however, you must adapt resulting source locations to the\
    \ selected API. As with the JMF libraries, you integrate the ID3 library using\
    \ a library wrapper module. You can create such a module by clicking *File ![Image](images/U001.jpg)\
    \ New Project...* and *NetBeans Modules ![Image](images/U001.jpg) Library Wrapper\
    \ Module*. On the wizard's first page, select the library named `com-hboeck-mp3manager-id3.jar`\
    \ (which can also be downloaded from the Source Code/Download area for this book\
    \ on the Apress web site). Name the module *ID3 API* and add it to the MP3 manager.\
    \ All other fields can be left with their default values.\n\nYou must define a\
    \ dependency to the ID3 module in order to provide the ID3 API to the file type\
    \ module. You can do this in the *Properties* of the file type module in the category\
    \ *Libraries* (see [Figure 44-2](#Chapter44.html#fig_44_2)). Press the *Add Dependency...*\
    \ button and just select the *ID3 API* module there.\n\n![Image](images/4402.jpg)\n\
    \n***Figure 44-2.** Defining dependencies to the ID3 API*\n\nAs already mentioned,\
    \ the class `Mp3DataObject` is responsible for the information and methods specific\
    \ to MP3. As a result, you extend this class which facilitates accessing both\
    \ the ID3v1 tag and the ID3v2 tag (see [Listing 44-4](#Chapter44.html#list_44_4)).\
    \ It is very important that you create the tags only when accessing the file itself,\
    \ and here is why. If you open, for example, a folder containing a lot of MP3\
    \ files in the Favorites window, an `Mp3DataObject` is created for each file.\
    \ If you read the ID3 tags of every file, you would eventually encounter a significant\
    \ delay—a behavior to be avoided.\n\n***Listing 44-4.** Extending the MP3 DataObject\
    \ Class with Support for ID3*\n\n```\nimport com.hboeck.mp3manager.id3.v1.ID3v1Tag;\n\
    import com.hboeck.mp3manager.id3.v2.ID3v2Tag;\n...\npublic class Mp3DataObject\
    \ extends MultiDataObject {\n   private ID3v1Tag id3v1 = null;\n   private ID3v2Tag\
    \ id3v2 = null;\n   public Mp3DataObject(FileObject pf, MultiFileLoader loader)\n\
    \              throws DataObjectExistsException, IOException {\n         super(pf,\
    \ loader);\n      }\n   ...\n\n   public ID3v1Tag getID3v1Tag() {\n         if(id3v1\
    \ == null) {\n            id3v1 = new ID3v1Tag(FileUtil.toFile(getPrimaryFile()));\n\
    \         }\n         return id3v1;\n      }\n\n   public ID3v2Tag getID3v2Tag()\
    \ {\n         if(id3v2 == null) {\n            id3v2 = new ID3v2Tag(FileUtil.toFile(getPrimaryFile()));\n\
    \         }\n         return id3v2;\n      }\n}\n```\n\nUsing the `DataObject`\
