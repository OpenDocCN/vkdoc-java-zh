  raw: '### Global Services


    Global services—services that can be used by multiple modules and are only provided
    by one module—are typically implemented using abstract (singleton) classes. With
    this pattern, the services manage the implementation on their own and provide
    an additional trivial implementation (as an inner class) in case there is no other
    implementation registered in the system. This has the advantage that the user
    always gets a valid reference to a service and never a `null` value.


    An example would be an MP3 player service (see [Listing 5-3](#Chapter05.html#list_5_3)),
    used by different modules—for example, a search list or playlist. The implementation
    of the player should be exchangeable.


    ***Listing 5-3.** MP3 Player As a Global Service in Module MP3 Services*


    `public` **`abstract`** `class Mp3Player {`

    `   public abstract void play(Mp3FileObject mp3);`

    `   public abstract void stop();`

    `public` **`static Mp3Player getDefault`**`() {`

    `      Mp3Player player =`

    `         Lookup.getDefault().Lookup(Mp3Player.class);`

    `      if(player == null) {`

    `         player = new DefaultMp3Player();`

    `      }`

    `      return player;`

    `   }`

    `private static class` **`DefaultMp3Player`** `extends Mp3Player {`

    `      public void play(Mp3FileObject mp3) {`

    `         // send file to an external player or`

    `         // provide own player implementation or`

    `         // show a message that no player is available`

    `      }`

    `      public void stop() {}`

    `   }`

    `}`


    This service, implemented as an abstract class, specifies its interface via the
    abstract methods, and at the same time provides access to the service via the
    static method `getDefault()`.The advantage of this pattern is that there is no
    need for users of the service to know anything about the Lookup API. This keeps
    the application logic lean, as well as independent from the Lookup API.


    The abstract class should normally be part of a module, which is, in turn, part
    of the standard distribution of the application (in the example, this would be
    the module MP3 Services). The service provider (that is, the classes that contain
    the real code for playing MP3 files) can be encapsulated in a separate module
    (see [Listing 5-4](#Chapter05.html#list_5_4)). In the example, this is the class
    `MyMp3Player`, for which you subsequently create a skeleton and add it to module
    C.


    ***Listing 5-4.** MP3 Player Service Provider in Module MP3 Player*


    `public class MyMp3Player extends` **`Mp3Player`** `{`

    `   public void play(Mp3FileObject mp3) {`

    `      // play file`

    `   }`

    `   public void stop() {`

    `      // stop player`

    `   }`

    `}`


    Now the `MyMp3Player` service provider must be registered. For this purpose you
    can use the `ServiceProvider` annotation which looks like the following:


    `@ServiceProvider (service = Mp3Player.class)`

    `public class MyMp3Player extends` **`Mp3Player`** `{ ...`


    The relationships and dependencies of the modules are shown in [Figure 5-2](#Chapter05.html#fig_5_2).


    ![Image](images/0502.jpg)


    ***Figure 5-2.** Dependencies and relationships of global service, service provider,
    and application module*


    Good examples for global services inside the NetBeans Platform are `StatusDisplayer`
    and `IOProvider`. The class `IOProvider` grants access to the Output window. The
    service provider actually writing the data to the Output window is in a separate
    class, `NbIOProvider`, in a separate module. If the module is available and the
    service provider registered, its implementation is retrieved via the static method
    `IOProvider.getDefault()`. If the module is not available, the default implementation
    is provided, which writes the output data to the default output (`System.out`
    and `System.err`).


    ### Registering Service Providers


    To allow a dynamic and flexible registration of service providers, even after
    delivering the application, and to ensure those are loaded only if needed, the
    registration is done declaratively, using configuration files.


    Services which shall be available through the Lookup within a NetBeans Platform-based
    application can be registered and made public to the system in different ways.
    These different possibilities will be described in the following sections.


    #### Annotation


    The Lookup API provides the `ServiceProvider` annotation for the registration
    of a service provider. This is the easiest and the most transparent way to make
    your provider class known to the Lookup. So, when creating your application, a
    service provider configuration file is applied automatically, as you will see
    in the section *Service Provider Configuration File*. Thus, if you do not want
    to use an annotation, you can directly jump to that section. In the example shown
    in [Listing 5-5](#Chapter05.html#list_5_5), you see the attribute of this annotation.


    ***Listing 5-5.** Registering a Service Provider with the @ServiceProvider Annotation*


    `import com.galileo.netbeans.mp3object.Mp3FileObject;`

    `import java.util.List;`

    `import org.openide.util.Lookup.ServiceProvider;`


    **`@ServiceProvider`**`(`

    **`service`** `= Mp3Finder.class,`

    **`path`** `= "Mp3FinderServices",`

    **`position`** `= 10,`

    **`supersedes`**`={"com.galileo.netbeans.module.DefaultMp3Finder"})`

    `public class Mp3DatabaseFinder implements Mp3Finder {`

    `    @Override`

    `    public List<Mp3FileObject> find(String what){`

    `        ...`

    `    }`

    `}`


    In [Listing 5-5](#Chapter05.html#list_5_5) the class `Mp3DatabaseFinder` is registered
    with the `ServiceProvider` annotation as implementation of the service `Mp3Finder`.
    The only mandatory attribute is the `service` attribute, with which you determine
    which service you want to provide. You can influence the order, how the Lookup
    delivers multiple service providers, by the `position` attribute. With `supersedes`
    you can indicate a list of already registered service providers wich are substituted
    in this registration. This way, you can, for example, delete a registered standard
    implementation of a service. Finally, there is also the `path` attribute. With
    it you can indicate a name or a whole path (for example, *MyServices/Mp3Services*)
    under which the service provider configuration file is applied. However, in this
    case, the directory *META-INF/namedservices* is used instead of *META-INF/services*.
    So in the example of [Listing 5-5](#Chapter05.html#list_5_5), the configuration
    file would be stored in the directory *META-INF/namedservices/Mp3FinderServices*.
    Like this, the implementation can be accessed by a Lookup which you can create
    with `Lookups.forPath()`.'
