- fmt: "### Behavior of a Top Component Group\n\nGroups manage their windows in accordance\
    \ with the user settings, allowing the following cases:\n\n- When a group is being\
    \ opened, all windows that have not already opened will be opened, if the `open`\
    \ attribute is set to `true` (if no window has been opened, yet).\n- Upon closing\
    \ a group, all windows will be closed that were not open prior to opening the\
    \ group, and their `close` attribute will be set to `true`. That means the windows\
    \ the user had open prior to opening the group will remain open.\n- Closing a\
    \ group (if one of the windows has already been opened before opening the group),\
    \ only those windows are closed in which the `close` attribute is `true` and whose\
    \ attributes have not been opened before opening the group. This means the windows\
    \ the user opened before opening the group itself stay open.\n- If a window of\
    \ a group is closed by the user, the `open` attribute is set to `false` when closing\
    \ the group. When the group is reopened, the window will thus not be opened.\n\
    - If during the time a group is open, the user opens a window from the group that\
    \ was previously closed, the `open` attribute is set to `true`, opening the window\
    \ when the group is reopened.\n\nSo, the user is able to influence the content\
    \ of a group. Even if you found the descriptions of the preceding cases somewhat\
    \ confusing, the best way of digging these logic groups is to directly explore\
    \ them.\n\n### Creating a Top Component Group\n\nGroups are defined via a *Group\
    \ Configuration* file and groups are declared in the layer file in the folder\
    \ `Windows2/Groups`, announcing its existence to the platform. This file has the\
    \ structure shown in [Listing 10-12](#Chapter10.html#list_10_12).\n\n***Listing\
    \ 10-12.** The Group Configuration File: MyGroup.wsgrp*\n\n```\n<!DOCTYPE group\
    \ PUBLIC \"-//NetBeans//DTD Group Properties 2.0//EN\" \"http://www.netbeans.org/dtds/group-properties2_0.dtd\"\
    >\n<group version=\"2.0\">\n   <module name=\"com.galileo.netbeans.module\" spec=\"\
    1.0\"/>\n   <name unique=\"MyGroup\"/>\n   <state opened=\"false\"/>\n</group>\n\
    ```\n\nBy the optional `module` attribute you declare the name of the module that\
    \ this group belongs to. The `name` attribute defines unique identifiers that\
    \ must correspond to the file name. Whether the group is currently displayed or\
    \ not is set in the `state` attribute. Now you create the group in the layer file\
    \ and refer it to the *Group Configuration* file (see [Listing 10-13](#Chapter10.html#list_10_13)).\n\
    \n***Listing 10-13.** Adding a Group to the Layer File*\n\n```\n<folder name=\"\
    Windows2\">\n   <folder name=\"Groups\">\n      <file name=\"MyGroup.wsgrp\" url=\"\
    MyGroup.wsgrp\"/>\n      <folder name=\"MyGroup\">\n         <file name=\"MyTopComponent.wstcgrp\"\
    \ url=\"MyTopComponent.wstcgrp\"/>\n      </folder>\n   </folder>\n</folder>\n\
    ```\n\nAs you see, I already added your first top component to the newly created\
    \ group. This is done by declaring a *Group Reference Configuration* file (`*.wstcgrp`),\
    \ where the behavior of the top component inside the group is declared (as shown\
    \ in [Listing 10-14](#Chapter10.html#list_10_14)).\n\n***Listing 10-14.** Group\
    \ Reference Configuration: MyTopComponent.wstcgrp*\n\n```\n<!DOCTYPE tc-group\
    \ PUBLIC\n \"-//NetBeans//DTD Top Component in Group Properties 2.0//EN\"\n \"\
    http://www.netbeans.org/dtds/tc-group2_0.dtd\">\n<tc-group version=\"2.0\">\n\
    \   <module name=\"com.galileo.netbeans.module\" spec=\"1.0\"/>\n   <tc-id id=\"\
    MyTopComponent\"/>\n   <open-close-behavior open=\"true\" close=\"true\"/>\n</tc-group>\n\
    ```\n\nThis file references a top component via its unique identifier. The `TopComponent`\
    \ must be declared in the layer file in the folder `Windows2/Components` with\
    \ a `*.settings` file (as occurs automatically when using the wizard to create\
    \ a top component. See the section “Creating a Top Component”). Further, the behavior\
    \ of the window is defined considering opening and closing. (Those attributes\
    \ are discussed in the previous section.)\n\nFor each window that you now want\
    \ to add to the group, create such a file and make an entry in the folder of your\
    \ group in the layer file. You can easily use the group via the Window Manager.\
    \ The Window Manager also provides a method for finding a group, as shown in [Listing\
    \ 10-15](#Chapter10.html#list_10_15).\n\n***Listing 10-15.** Opening and Closing\
    \ a Top Component Group*\n\n```\nTopComponentGroup group = WindowManager.getDefault().findTopComponentGroup(\"\
    MyGroup\");\nif(group != null) { /* group found */\n   group.open();\n}\n```\n\
    \n### Administration: Window Manager\n\nThe Window Manager is the central component\
    \ of the window system. It manages modes, windows, and groups, and provides an\
    \ API to access its administrated components. For this purpose, the methods for\
    \ locating components (see Table 10-6) are very helpful.\n\n![Image](images/t1006.jpg)\n\
    \nA `PropertyChangeListener` can be added to the Window Manager, for example to\
    \ become informed when a mode is activated. Additionally, a set of all available\
    \ modes in the window system can be obtained via a call to `getModes()`. The main\
    \ application window is accessed via the following call:\n\n```\nFrame main =\
    \ WindowManager.getDefault().getMainWindow();\n```\n\nThe architecture of the\
    \ window system classes is summarized in [Figure 10-6](#Chapter10.html#fig_10_6).\n\
    \n![Image](images/1006.jpg)\n\n***Figure 10-6.** Architecture of NetBeans window\
    \ system*"
  raw: '#### Behavior of a Top Component Group


    Groups manage their windows in accordance with the user settings, allowing the
    following cases:


    *   When a group is being opened, all windows that have not already opened will
    be opened, if the `open` attribute is set to `true` (if no window has been opened,
    yet).

    *   Upon closing a group, all windows will be closed that were not open prior
    to opening the group, and their `close` attribute will be set to `true`. That
    means the windows the user had open prior to opening the group will remain open.

    *   Closing a group (if one of the windows has already been opened before opening
    the group), only those windows are closed in which the `close` attribute is `true`
    and whose attributes have not been opened before opening the group. This means
    the windows the user opened before opening the group itself stay open.

    *   If a window of a group is closed by the user, the `open` attribute is set
    to `false` when closing the group. When the group is reopened, the window will
    thus not be opened.

    *   If during the time a group is open, the user opens a window from the group
    that was previously closed, the `open` attribute is set to `true`, opening the
    window when the group is reopened.


    So, the user is able to influence the content of a group. Even if you found the
    descriptions of the preceding cases somewhat confusing, the best way of digging
    these logic groups is to directly explore them.


    #### Creating a Top Component Group


    Groups are defined via a *Group Configuration* file and groups are declared in
    the layer file in the folder *Windows2/Groups*, announcing its existence to the
    platform. This file has the structure shown in [Listing 10-12](#Chapter10.html#list_10_12).


    ***Listing 10-12.** The Group Configuration File: MyGroup.wsgrp*


    `<!DOCTYPE group PUBLIC "-//NetBeans//DTD Group Properties 2.0//EN" "http://www.netbeans.org/dtds/group-properties2_0.dtd">`

    `<group version="2.0">`

    `   <`**`module`** `name="com.galileo.netbeans.module" spec="1.0"/>`

    `   <`**`name`** `unique="MyGroup"/>`

    `   <`**`state`** `opened="false"/>`

    `</group>`


    By the optional `module` attribute you declare the name of the module that this
    group belongs to. The `name` attribute defines unique identifiers that must correspond
    to the file name. Whether the group is currently displayed or not is set in the
    `state` attribute. Now you create the group in the layer file and refer it to
    the *Group* *Configuration* file (see [Listing 10-13](#Chapter10.html#list_10_13)).


    ***Listing 10-13.** Adding a Group to the Layer File*


    `<folder name="`**`Windows2`**`">`

    `   <folder name="`**`Groups`**`">`

    `      <file name="`**`MyGroup`**`.wsgrp" url="MyGroup.wsgrp"/>`

    `      <folder name="`**`MyGroup`**`">`

    `         <file name="MyTopComponent.wstcgrp" url="MyTopComponent.wstcgrp"/>`

    `      </folder>`

    `   </folder>`

    `</folder>`


    As you see, I already added your first top component to the newly created group.
    This is done by declaring a *Group Reference Configuration* file (*.wstcgrp*),
    where the behavior of the top component inside the group is declared (as shown
    in [Listing 10-14](#Chapter10.html#list_10_14)).


    ***Listing 10-14.** Group Reference Configuration: MyTopComponent.wstcgrp*


    `<!DOCTYPE tc-group PUBLIC`

    ` -//NetBeans//DTD Top Component in Group Properties 2.0//EN"`

    ` "http://www.netbeans.org/dtds/tc-group2_0.dtd">`

    `<tc-group version="2.0">`

    `   <`**`module`** `name="com.galileo.netbeans.module" spec="1.0"/>`

    `   <`**`tc-id`** `id="MyTopComponent"/>`

    `   <`**`open-close-behavior`** `open="true" close="true"/>`

    `</tc-group>`


    This file references a top component via its unique identifier. The `TopComponent`
    must be declared in the layer file in the folder `Windows2/Components` with a
    *.settings* file (as occurs automatically when using the wizard to create a top
    component. See the section “Creating a Top Component”). Further, the behavior
    of the window is defined considering opening and closing. (Those attributes are
    discussed in the previous section.)


    For each window that you now want to add to the group, create such a file and
    make an entry in the folder of your group in the layer file. You can easily use
    the group via the Window Manager. The Window Manager also provides a method for
    finding a group, as shown in [Listing 10-15](#Chapter10.html#list_10_15).


    ***Listing 10-15.** Opening and Closing a Top Component Group*


    `TopComponentGroup group = WindowManager.getDefault().`**`findTopComponentGroup("MyGroup")`**`;`

    `if(group != null) { /* group found */`

    `   group.`**`open()`**`;`

    `}`


    ### Administration: Window Manager


    The Window Manager is the central component of the window system. It manages modes,
    windows, and groups, and provides an API to access its administrated components.
    For this purpose, the methods for locating components (see Table 10-6) are very
    helpful.


    ![Image](images/t1006.jpg)


    A `PropertyChangeListener` can be added to the Window Manager, for example to
    become informed when a mode is activated. Additionally, a set of all available
    modes in the window system can be obtained via a call to `getModes()`. The main
    application window is accessed via the following call:


    `Frame main = WindowManager.getDefault().`**`getMainWindow()`**`;`


    The architecture of the window system classes is summarized in [Figure 10-6](#Chapter10.html#fig_10_6).


    ![Image](images/1006.jpg)


    ***Figure 10-6.** Architecture of NetBeans window system*'
