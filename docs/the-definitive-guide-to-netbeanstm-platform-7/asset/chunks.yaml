    ## Java DB


    *Apache Derby* 是一个隐藏在 Java DB 背后的关系型数据库管理系统（RDBMS）。该数据库系统完全用 Java 实现，因此可以作为跨平台系统使用。对于一个完整的数据库管理系统而言，Java
    DB 非常小巧；它可以直接随应用程序一起交付，因为无需特殊安装，也无需为操作数据库而执行额外操作。因此，Java DB 非常适合在富客户端应用程序中使用。自
    Java 平台 6 起，Oracle 默认提供客户端数据库 Java DB；NetBeans IDE 自然也在管理和服务器操作方面支持 Java DB。


    ### 集成 Java DB


    你可以通过 Java 平台安装获取 Java DB，也可以在 [`http://www.oracle.com/technetwork/java/javadb`](http://www.oracle.com/technetwork/java/javadb)
    下载最新版本。在 *lib* 子目录中，你会找到文件 *derby.jar*，它既是实际的数据库系统，也提供了驱动程序。此外还有文件 *derbyclient.jar*，当
    Java DB 在服务器上运行，并且你不想将数据库系统随应用程序一起交付时，会用到此文件。不过，本讨论主要涉及客户端使用，因此重点是将 Java DB 嵌入到其应用程序中。使用
    NetBeans 平台应用程序的术语，你需要将 Java DB 作为一个独立且分离的模块添加到应用程序中；也就是说，你需要创建一个库包装模块。首先，调用 *文件
    ![Image](img/U001.jpg) 新建项目...* 并选择 *NetBeans 模块 ![Image](img/U001.jpg) 库包装模块*。下一步是选择文件
    *derby.jar* 以及附加文件 *derbyLocale_de_DE.jar*，后者包含数据库系统所有报告的德语版本。当然，你也可以选择添加其他语言包或附加包。在此示例中，使用
    `org.apache.derby` 作为代码名称基础，使用 `Java` `DB` `Embedded` 作为名称。现在，你只需在想要访问数据库的应用程序模块中，定义对此刚创建的模块的依赖关系即可。当
    JDBC 驱动程序首次被调用时，数据库系统将自动启动。


    ### 注册驱动程序


    如果你已经使用过 JDBC API，那么你可能或多或少熟悉 `Class.forName()` 调用。它会间接加载你所使用的数据库系统对应的数据库驱动程序，从而使驱动程序管理器能够建立到其数据库的连接。`DriverManager`
    类已通过 JDBC API 4.0（Java 平台 6 的一部分）进行了扩展，因此它可以加载通过 *META-INF/services* 目录注册的数据库驱动程序。理想情况下，你或驱动程序本身可以声明式地注册
    `java.sql.Driver` 接口的实现。这样做的好处是，可以完全省略 `Class.forName()` 调用，并且驱动程序仅在首次需要时才被加载。Java
    DB 也通过这种方式注册其所需的驱动程序。对我们来说，这意味着我们可以直接通过 `DriverManager` 建立连接，而无需担心驱动程序的问题。


    ### 创建和使用数据库


    在将 Java DB 打包成包装模块并添加到 NetBeans 平台应用程序，并且定义了与 NetBeans 平台应用程序的依赖关系之后，你就可以直接访问数据库系统并创建你的第一个数据库了。每个数据库都由
    Java DB 在一个单独的目录中管理，该目录的名称与数据库名称相同，如 图 26-1 所示。这些目录创建在你必须首先定义的系统目录中。一个理想的位置是用户目录，例如，NetBeans
    平台及其特定于应用程序的设置也保存在该目录中。你可以通过系统属性获取路径，这样就不需要考虑跨平台的路径问题了。


    这个基础目录通过名称 `derby.system.home` 进行注册。


    `System.setProperty("`**`derby.system.home`**`",`

    `        System.getProperty("`**`netbeans.user`**`",`

    `        System.getProperty("`**`user.home`**`")) + "/databases");`


    你可以通过 `netbeans.user` 特性获取特定于应用程序的目录路径。如果未设置此特性，则使用用户目录的默认值，该值可通过 `user.home`
    获取。在检测到的目录中，数据库应位于 *databases* 目录下。如果你未设置 `derby.system.home` 特性，Java DB 将使用应用程序的当前目录。


    ![Image](img/2601.jpg)


    ***图 26-1.** 将 Java DB 作为库包装模块集成到你自己的应用程序中。数据库的物理位置由 derby.system.home 特性设置。*


    Java DB 的一个非常实用的特性是，数据库系统无需显式启动。每个数据库在首次访问时都会单独启动；你无需担心管理本地数据库的运行，你可以像使用服务器数据库一样使用和调用它。


    按照上述方法设置系统目录后，你可以通过驱动程序管理器建立到数据库的连接：


    `Connection connection = DriverManager.`**`getConnection`**`(`

    `        "`**`jdbc:derby:MyDB`**`;create=true", "user", "password");`


    那么，如何创建数据库呢？这是通过定义添加到连接 URL 中的属性 `create=true` 来实现的。如果数据库 `MyDB` 不存在，则会先创建它，随后建立到该数据库的连接。如果数据库已存在，则仅建立连接。这个属性非常重要，尤其是在
    Java DB 的嵌入式本地使用中，因为应用程序的数据库会在首次安装或启动时自动创建。不过，Java DB 还定义了许多其他属性，这些属性目前并不重要。你可以在
    Java DB 参考手册中找到这些属性的信息，该手册位于 Java DB 发行版的目录中，并附有其他文档。除了将属性附加到 URL 之外，你还可以将它们保存在
    `Properties` 对象中，并将其作为第二个参数传递给 `getConnection()` 方法：


    **`Properties`** `props = new Properties();`

    `props.put("`**`user`**`", "user");`

    `props.put("`**`password`**`", "password");`

    `props.put("`**`create`**`", "true");`

    `Connection connection = DriverManager.`**`getConnection`**`("`**`jdbc:derby:MyDB`**`",
    props);`

