  trans: '

    ### OSGi 运行时容器中的 NetBeans 平台


    前面几节讨论了在 NetBeans 平台内部（更准确地说，是与 NetBeans 平台并行）执行 OSGi 模块；NetBeans 平台模块仍由 NetBeans
    平台系统执行。现在，如果你想开发一个完全基于 OSGi 的应用程序，可以将整个 NetBeans 平台视为 OSGi 模块。


    为此，请在 NetBeans 平台应用程序的上下文菜单中点击 *OSGi* ![Image](img/U001.jpg) *构建模块*。整个应用程序，即所有必要的
    NetBeans 平台模块加上你自行创建的模块，会在 *build/osgi* 目录下以符合 OSGi 规范的模块形式创建。此外，你的应用程序可以直接在 NetBeans
    IDE 中的 OSGi 运行时容器 Felix 中执行。为此，请在上下文菜单中点击 *OSGi* ![Image](img/U001.jpg) *在 Felix
    中运行*；模块会自动创建并与 Felix 一起启动。


    ### 总结


    在本章中，你学习了 OSGi 框架的一些基础知识。你了解了 OSGi 模块的结构，并比较了 NetBeans 模块与 OSGi 模块的清单文件属性。你还学习了如何使用
    NetBeans IDE 创建兼容 OSGi 的模块。本章的最后部分解释了模块的生命周期，以及如何将现有模块集成到 NetBeans 平台应用程序中。


    ## 第 5 章


    ## 查找概念


    查找概念既重要又简单。它在 NetBeans 平台应用程序的许多地方被使用，允许模块之间相互通信。本章展示了典型的用例以及查找概念的工作原理。


    ### 功能


    *查找*是 NetBeans 平台中用于管理对象实例的核心组件和常用概念。简化来说，查找是一个 `Map`，以 `Class` 对象作为键，以这些 `Class`
    对象的实例作为值。


    查找背后的主要思想是解耦组件。它让模块之间能够相互通信，这在基于组件的系统（例如基于 NetBeans 平台的应用程序）中扮演着重要角色。一方面，模块可以提供对象；另一方面，模块可以通过查找来搜索和使用对象。


    **![Image](img/square.jpg) 注意** 查找概念在查找 API 模块中实现。它提供了一个非常简单且清晰的接口。查找 API 模块在
    NetBeans 平台中经常被使用（通常也是间接使用）；它是 NetBeans 平台模块化概念的基石。顺便提一下，查找 API 模块完全独立运行，不依赖于任何其他模块。也就是说，你可以在任何
    Java 应用程序中使用查找 API 模块，即使该应用程序并非基于 NetBeans 平台开发。


    查找的优势在于其类型安全性，这是通过使用 `Class` 对象而非字符串作为键来实现的。这样，键就定义了检索实例的类型。因此，不可能请求一个在模块中类型未知的实例。这种模式使得应用程序更加健壮，因为像
    `ClassCastException` 这样的错误不会发生。查找也用于检索和管理一个键（即一种类型）的多个实例。这种对特定实例的集中管理用于不同的目的。查找用于发现服务提供者，支持声明式添加和实例的延迟加载。除此之外，你可以通过查找将实例从一个模块传递到另一个模块，而无需模块之间相互了解。通过这种方式，建立了一种模块间的通信。甚至上下文相关的操作也是使用查找组件实现的。


    为了澄清一个常见的误解，在单个应用程序中可以有多个查找。最常用的查找是全局查找，由 NetBeans 平台默认提供。此外，还有一些组件（例如 TopComponent）拥有自己的查找。这些是局部查找。如“模块间通信”部分所述，你可以创建自己的查找，并为你的组件配备一个查找。


    查找概念简单、高效且方便。一旦你熟悉了这种模式，你会发现它适用于许多不同的领域。在接下来的部分中，将展示查找在其主要用例中的用法。


    ### 服务与扩展点


    查找的一个主要应用是发现和提供服务。在这种场景下，查找扮演着动态服务定位器的角色，允许将服务接口与服务提供者分离。一个模块使用功能而无需了解任何实现细节。通过这种方式，实现了模块之间的松散耦合。


    使用查找和服务接口，可以轻松为图形组件定义扩展点。一个很好的例子是 NetBeans 状态栏，它定义了接口 `StatusLineElementProvider`。通过这个接口和服务提供者注册，状态栏可以用用户定义的组件进行扩展（第
    5 章的“状态栏”部分描述了一个示例），而状态栏无需了解这些组件或依赖于它们。


    为了实现动态、灵活的服务提供和交换，这些服务是以声明方式添加到查找中的，而不是在源代码中编程实现。这可以通过两种方法之一实现：使用 *META-INF/services*
    目录中的服务提供者配置文件添加服务的实现，或者使用模块的层文件。这两种方法都将在本章后面的“注册服务提供者”部分展示。


    NetBeans 平台提供了一个全局查找，可以通过静态方法 `Lookup.getDefault()` 获取。这个全局查找用于发现通过可用的声明式注册之一添加的服务。使用这种方法可以为单个服务注册多个实现。声明式注册允许在首次请求时实例化实现。这种模式被称为延迟加载。


    为了更好地理解这种提供和请求服务的模式，并获得更实际的视角，本章将演示如何为 MP3 文件创建搜索列表。


    #### 定义服务接口


    模块 A 是一个提供用户界面的模块，允许用户通过特定的搜索条件搜索 MP3 文件。搜索结果会显示在一个列表中。为了保持独立于搜索算法，并确保能够动态使用多种搜索变体（这些变体可能在运行时切换），你在模块
    A 中指定了服务接口 `Mp3Finder`。该服务定义了 MP3 文件的搜索接口。实际的搜索算法在另一个模块（模块 B）中实现，并通过声明式注册提供。

    '
- fmt: "#### Loose Service Provisioning\n\nModule B is a service provider for implementation\
    \ of the interface `Mp3Finder`. In this example, assume the module is searching\
    \ for MP3 files in a database. This allows multiple implementations of the service\
    \ provider to be registered. All implementations can be in either one or more\
    \ than one separate modules. To create an `Mp3DatabaseFinder` implementation of\
    \ the interface `Mp3Finder` from module A, module B must define a dependency on\
    \ module A. However, module A, the search list user interface, needs no dependency\
    \ on module B. This is because the Lookup provides the service based on the interface\
    \ (living in module A as well) rather than the implementation (residing in module\
    \ B). Thus, module A is completely independent of the implementation of the service\
    \ (see [Figure 5-1](#Chapter05.html#fig_5_1)) and can use it transparently.\n\n\
    ![Image](images/0501.jpg)\n\n***Figure 5-1.** Service Lookup pattern*\n\nIn module\
    \ A, the service interface `Mp3Finder` is specified and a user interface is implemented\
    \ for search and display of MP3 files (see [Listing 5-1](#Chapter05.html#list_5_1)).\
    \ A service provider is retrieved by passing the `Class` object of the interface\
    \ `Mp3Finder` to Lookup, returning an instance matching the requested type. The\
    \ interface `Mp3Finder` is also known as an extension point of module A. Any module\
    \ can register implementations for it.\n\n***Listing 5-1.** Module A: MP3 Searcher*\n\
    \n```\npublic interface Mp3Finder {\n    public List<Mp3FileObject> find(String\
    \ search);\n}\npublic class Mp3SearchList {\n    public void doSearch(String search)\
    \ {\n        Mp3Finder finder =\n            Lookup.getDefault().Lookup(Mp3Finder.class);\n\
    \        List<Mp3FileObject> list = finder.find(search);\n    }\n}\n```\n\nModule\
    \ B provides a service provider allowing the search of a database for MP3 files.\
    \ This is done by implementing the interface `Mp3Finder`, specified by module\
    \ A (see [Listing 5-2](#Chapter05.html#list_5_2)). So, module B is an extension\
    \ of module A at the extension point `Mp3Finder`.\n\nThe newly created service\
    \ provider must be registered, so it can be discovered with Lookup. For this purpose\
    \ you use the `ServiceProvider` annotation.\n\n***Listing 5-2.** Module B: MP3\
    \ Finder*\n\n```\nimport org.openide.util.Lookup.ServiceProvider;\n...\n@ServiceProvider(service\
    \ = Mp3Finder.class)\npublic class Mp3DatabaseFinder implements Mp3Finder {\n\
    \    public List<Mp3FileObject> find(String search) {\n        // search in database\
    \ for mp3 files\n    }\n}\n```\n\n#### Providing Multiple Service Implementations\n\
    \nIt is useful to be able to register multiple MP3 search implementations. This\
    \ is easy. Simply create further implementations of the interface `Mp3Finder`.\
    \ Again these have to be registered with an annotation. Such an implementation\
    \ could be, for example, as follows:\n\n```\nimport org.openide.util.Lookup.ServiceProvider;\n\
    ...\n@ServiceProvider(service = Mp3Finder.class)\npublic class Mp3FilesystemFinder\
    \ implements Mp3Finder {\n    public List<Mp3FileObject> find(String search) {\n\
    \        // search in local filesystem for mp3 files\n    }\n}\n```\n\nTo use\
    \ all registered implementations of a service, discovery of the services using\
    \ Lookup must be adopted. Rather than using the `Lookup()` method to retrieve\
    \ a single implementation, use `LookupAll()` to retrieve all registered implementations\
    \ of the service. Call the `find()` method of all discovered services as follows:\n\
    \n```\npublic class Mp3SearchList {\n    public void doSearch(String search) {\n\
    \        Collection<? extends Mp3Finder> finder =\n            Lookup.getDefault().LookupAll(Mp3Finder.class);\n\
    \        List<Mp3FileObject> list = new ArrayList<Mp3FileObject>();\n        for(Mp3Finder\
    \ f : finder) {\n            list.addAll(f.find(search));\n        }\n    }\n\
    }\n```\n\n#### Ensuring Service Availability\n\nA search module is of no use to\
    \ the user if no search service is available allowing a search for MP3 files.\
    \ To enable module A, ensuring that at least one implementation of a service is\
    \ available, the NetBeans module system provides two attributes: `OpenIDE-Module-Provides`\
    \ and `OpenIDE-Module-Requires`, which allow definition in the manifest file of\
    \ a module if a special service implementation is provided or required. These\
    \ and further attributes of the manifest file are described in more detail in\
    \ the “Module Manifest” section of [Chapter 3](#Chapter03.html#ch3).\n\nWithin\
    \ the manifest file of module A, the existence of at least one provider of the\
    \ `Mp3Finder` service is required, with the following entry:\n\n`OpenIDE-Module-Requires:\
    \ com.galileo.netbeans.modulea.Mp3Finder`\n\nTo inform the module system during\
    \ loading of the modules that module B provides the service `Mp3Finder`, add the\
    \ following entry to the manifest file of module B:\n\n`OpenIDE-Module-Provides:\
    \ com.galileo.netbeans.modulea.Mp3Finder`\n\nIf no module declares such an entry\
    \ in its manifest file (that is, there is no service provider available), the\
    \ module system announces an error and does not load module A."
  raw: '#### Loose Service Provisioning


    Module B is a service provider for implementation of the interface Mp3Finder.
    In this example, assume the module is searching for MP3 files in a database. This
    allows multiple implementations of the service provider to be registered. All
    implementations can be in either one or more than one separate modules. To create
    an `Mp3DatabaseFinder` implementation of the interface `Mp3Finder` from module
    A, module B must define a dependency on module A. However, module A, the search
    list user interface, needs no dependency on module B. This is because the Lookup
    provides the service based on the interface (living in module A as well) rather
    than the implementation (residing in module B). Thus, module A is completely independent
    of the implementation of the service (see [Figure 5-1](#Chapter05.html#fig_5_1))
    and can use it transparently.


    ![Image](images/0501.jpg)


    ***Figure 5-1.** Service Lookup pattern*


    In module A, the service interface `Mp3Finder` is specified and a user interface
    is implemented for search and display of MP3 files (see [Listing 5-1](#Chapter05.html#list_5_1)).
    A service provider is retrieved by passing the `Class` object of the interface
    `Mp3Finder` to Lookup, returning an instance matching the requested type. The
    interface `Mp3Finder` is also known as an extension point of module A. Any module
    can register implementations for it.


    ***Listing 5-1.** Module A: MP3 Searcher*


    `public interface` **`Mp3Finder`** `{`

    `public List<Mp3FileObject>` **`find`**`(String search);`

    `}`

    `public class Mp3SearchList {`

    `   public void doSearch(String search) {`

    **`Mp3Finder`** `finder =`

    `         Lookup.getDefault().Lookup(`**`Mp3Finder`**`.class);`

    `      List<Mp3FileObject> list = finder.`**`find`**`(search);`

    `   }`

    `}`


    Module B provides a service provider allowing the search of a database for MP3
    files. This is done by implementing the interface `Mp3Finder`, specified by module
    A (see [Listing 5-2](#Chapter05.html#list_5_2)). So, module B is an extension
    of module A at the extension point `Mp3Finder`.


    The newly created service provider must be registered, so it can be discovered
    with Lookup. For this purpose you use the ServiceProvider annotation.


    ***Listing 5-2.** Module B: MP3 Finder*


    `import org.openide.util.Lookup.ServiceProvider;`

    `...`

    **`@ServiceProvider`**`(service = Mp3Finder.class)`

    `public class` **`Mp3DatabaseFinder`** `implements` **`Mp3Finder`** `{`

    `public List<Mp3FileObject>` **`find`**`(String search) {`

    `      // search in database for mp3 files`

    `   }`

    `}`


    #### Providing Multiple Service Implementations


    It is useful to be able to register multiple MP3 search implementations. This
    is easy. Simply create further implementations of the interface `Mp3Finder`. Again
    these have to be registered with an annotation. Such an implementation could be,
    for example, as follows:


    `import org.openide.util.Lookup.ServiceProvider;`

    `...`

    **`@ServiceProvider`**`(service = Mp3Finder.class)`

    `public class` **`Mp3FilesystemFinder`** `implements` **`Mp3Finder`** `{`

    `public List<Mp3FileObject>` **`find`**`(String search) {`

    `      // search in local filesystem for mp3 files`

    `   }`

    `}`


    To use all registered implementations of a service, discovery of the services
    using Lookup must be adopted. Rather than using the `Lookup()` method to retrieve
    a single implementation, use `LookupAll()` to retrieve all registered implementations
    of the service. Call the `find()` method of all discovered services as follows:


    `public class Mp3SearchList {`

    `   public void doSearch(String search) {`

    `Collection<? extends` **`Mp3Finder`**`> finder =`

    `         Lookup.getDefault().`**`LookupAll(Mp3Finder`**`.class);`

    `      List<Mp3FileObject> list = new ArrayList<Mp3FileObject>();`

    `      for(Mp3Finder f : finder) {`

    `         list.addAll(f.`**`find`**`(search));`

    `      }`

    `   }`

    `}`


    #### Ensuring Service Availability


    A search module is of no use to the user if no search service is available allowing
    a search for MP3 files. To enable module A, ensuring that at least one implementation
    of a service is available, the NetBeans module system provides two attributes:
    `OpenIDE-Module-Provides` and `OpenIDE-Module-Requires`, which allow definition
    in the manifest file of a module if a special service implementation is provided
    or required. These and further attributes of the manifest file are described in
    more detail in the “Module Manifest” section of [Chapter 3](#Chapter03.html#ch3).


    Within the manifest file of module A, the existence of at least one provider of
    the `Mp3Finder` service is required, with the following entry:


    **`OpenIDE-Module-Requires`**`: com.galileo.netbeans.modulea.Mp3Finder`


    To inform the module system during loading of the modules that module B provides
    the service `Mp3Finder`, add the following entry to the manifest file of module
    B:


    **`OpenIDE-Module-Provides`**`: com.galileo.netbeans.modulea.Mp3Finder`


    If no module declares such an entry in its manifest file (that is, there is no
    service provider available), the module system announces an error and does not
    load module A.'
