    `</file>`


    名称与注解参数相对应的属性，其含义与之相同。这些及其他必要属性及其值在表 6-1 中进行了说明。


    ![Image](img/t0601.jpg)


    除了这些属性之外，还提供了两个可选属性。这些属性在表 6-2 中列出。


    ![Image](img/t0602.jpg)

