    likely be classloader problems. Hibernate itself uses the system classloader and
    can thus access the entities without explicitly defined dependencies. The Proxy
    Factory of the Javassist library—which is responsible for the proxy production
    of objects to the runtime (necessary for the lazy loading)—uses a different classloader
    and consequently does not find classes out of the Hibernate libraries or classes
    out of your application modules. Advantageously, you can provide your own classloader
    provider implementation to the class `javassist.util.proxy.ProxyFactory` by the
    `ProxyFactory.ClassLoaderProvider` interface and create a module installer for
    the Hibernate module. Use the `restored()` method to provide the system classloader
    to the application of the `ProxyFactory` at the start (see [Listing 27-1](#Chapter27.html#list_27_1)).


    ***Listing 27-1.** Providing a Classloader Provider Implementation*


    `import javassist.util.proxy.ProxyFactory;`

    `import org.openide.modules.ModuleInstall;`


    `public class Installer extends ModuleInstall {`

    `   @Override`

    `   public void restored() {`

    `ProxyFactory.classLoaderProvider = new` **`ProxyFactory.ClassLoaderProvider`**`()
    {`

    `        @Override`

    `        public ClassLoader get(ProxyFactory pf) {`

    `return` **`Thread.currentThread().getContextClassLoader`**`();`

    `        }`

    `     };`

    `   }`

    `}`


    Usually, the context classloader of the current thread is the system classloader
    (if no other was used). Transfer this to the `ProxyFactory` object via the `get()`
    method.


    ### Structure of the Exemplified Application


    Now I will show you how to use Hibernate with the albums example from [Chapter
    26](#Chapter26.html#ch26), so you can appreciate the advantages of an object relational
    bridge. In addition, you can use the already integrated database system Java DB
    again now. Add the library wrapper module with the Hibernate libraries to the
    already created Platform application. Each module that wants to use the Hibernate
    functionality is able to define a dependency to the application. In this example,
    it is only the application module (*My Module*). Open the *Properties* window
    over the context menu and add the *Hibernate* module under *Libraries*. You have
    to add a dependency on the *Java DB* module to the *Hibernate* module in the same
    way so Hibernate can access the Java DB database driver.


    So far you have managed the classes for your entities, `genre` and `album`, in
    the application module. Since Hibernate needs access to these classes, you should
    define another dependency from Hibernate to the application module. That would
    lead to a cyclic dependency; the module system of the NetBeans Platform would
    quickly report an error and the application would not even start. This is why
    you outsource your entity classes in a separate module, so the cyclic dependency
    is solved. This constellation with the additional module is graphically illustrated
    in [Figure 27-1](#Chapter27.html#fig_27_1).


    ![Image](images/2701.jpg)


    ***Figure 27-1.** The application components and their dependencies*


    ![Image](images/square.jpg) **Tip** When developing your application, using the
    embedded version of the Java DB (in this case, the module *Java DB Embedded*)
    is not recommended; instead, use the server variant that is already integrated
    in the NetBeans IDE. Integrate the Java DB driver as module in your application
    as described in [Chapter 27](#Chapter27.html#ch27), adjust it in the *hibernate.cfg.xml*
    file to the connection URL, and start the database server in the NetBeans IDE
    with *Start Server* in the context menu of the node *Databases ![Image](images/U001.jpg)
    Java DB* in the service window. This way it is possible to look at the database
    schema produced by Hibernate.


    ### Configuring Hibernate


    After integrating Hibernate you now have to provide some configuration information.
    You define this information by an XML file which is called *hibernate.cfg.xml*
    by default. You definitively need to specify the database driver, the URL to connect
    with the database, the necessary authentication data, and the SQL dialect which
    should be used. This configuration file then looks as follows in [Listing 27-2](#Chapter27.html#list_27_2).


    ***Listing 27-2.** Hibernate Configuration File*


    `<?xml version="1.0" encoding="utf-8"?>`

    `<!DOCTYPE hibernate-configuration PUBLIC`

    `   "-//Hibernate/Hibernate Configuration DTD 3.0//EN"`

    `   "http://hibernate.sourceforge.net/hibernate-configuration-3.0.dtd">`

    `<`**`hibernate-configuration`**`>`

    `   <session-factory>`

    `      <property name="connection.driver_class">`**`org.apache.derby.jdbc.EmbeddedDriver`**`</property>`

    `      <property name="connection.url">`**`jdbc:derby:hibernate-db;create=true`**`</property>`

    `      <property name="connection.username">`**`user`**`</property>`

    `      <property name="connection.password">`**`password`**`</property>`

    `      <property name="dialect">`**`org.hibernate.dialect.DerbyDialect`**`</property>`

    `   </session-factory>`

    `</`**`hibernate-configuration`**`>`


    First, you define the database class, which in this case is `org.apache.derby.jdbc.EmbeddedDriver`
    for the Java DB database system. Add the URL so Hibernate can establish a connection
    to your database; you already know that this is composed for the Java DB. Along
    with the username and the password, which will eventually be necessary, you have
    to define the SQL dialect. Hibernate provides corresponding classes for all major
    database systems in the package `org.hibernate.dialect`. You can find more information
    about additional configuration options from the Hibernate reference documentation.


    All this begs the question, where to put this file. Because the data is in a separate
    file, you have the option of using several Hibernate modules with different configurations.
    You can then either save the file in the *src* directory of an application module
    or directly save it in the Hibernate module. It is important that it is on the
    referring class path, because this is where it is searched for. Optionally, as
    you will see later, you can define an alternative URL to the configuration file
    when producing an `Configuration` object.'
