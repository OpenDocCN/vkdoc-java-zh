    \ can see which packages are exposed in the properties of your library wrapper\
    \ module under *API Versioning*. There, you can delete packages from the *Public\
    \ Packages* list later.\n\n***Listing 3-9.** Manifest File of a Library Wrapper\
    \ Module*\n\n```\nManifest-Version: 1.0\nAnt-Version: Apache Ant 1.7.0\nCreated-By:\
    \ 1.6.0-b105 (Sun Microsystems Inc.)\nOpenIDE-Module: com.hboeck.mp3\nOpenIDE-Module-Public-Packages:\n\
    com.hboeck.mp3.*,\ncom.hboeck.mp3.id3.*,\n...\nOpenIDE-Module-Java-Dependencies:\
    \ Java > 1.4\nOpenIDE-Module-Specification-Version: 1.0\nOpenIDE-Module-Implementation-Version:\
    \ 101211\nOpenIDE-Module-Localizing-Bundle:\n   com/hboeck/mp3/Bundle.properties\n\
    OpenIDE-Module-Requires: org.openide.modules.ModuleFormat1\nClass-Path: ext/com-hboeck-mp3.jar\n\
    ```\n\nTwo very important things have been accomplished by the wizard. On the\
    \ one hand, it marked all packages of the library with the attribute `OpenIDE-Module-Public-Packages`,\
    \ making all these packages publicly accessible. This is useful because a library\
    \ is supposed to be used by other modules, too. On the other hand, the wizard\
    \ marked the library (located in the distribution in the directory `ext/`) with\
    \ the `Class-Path` attribute, putting it on the module class path. This way, the\
    \ classes of the library can be loaded by the module classloader. The type *Autoload*\
    \ was automatically assigned to the library wrapper module (see the section *Configuration\
    \ File*). This way, it is just loaded when needed."
