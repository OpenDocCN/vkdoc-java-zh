    #### MP3 文件播放


    既然已经实现了 MP3 播放器服务提供者，就可以为 MP3 文件类型注册一个操作。这样一来，就可以通过上下文菜单或直接在“收藏夹”窗口中双击等方式播放 MP3
    文件。使用 NetBeans 操作向导可以轻松创建并注册此类操作。调用 *文件 ![Image](img/U001.jpg) 新建文件...* 并选择 *模块开发
    ![Image](img/U001.jpg) 操作*。选择 *条件启用* 作为操作类型，并将 `Mp3DataObject` 作为上下文接口。在下一页中，可以将此操作与预定义类别关联，或创建一个新类别。接着，将操作分配给一个菜单。激活
    *文件类型上下文菜单项* 选项，以便该操作出现在 MP3 文件的上下文菜单中。选择 `audio/mpeg` 作为内容类型，该类型在创建 MP3 文件类型时已定义。最后，在向导的最后一页定义类名、标签和图标。点击
    *完成* 结束向导。这样一来，NetBeans IDE 和 NetBeans 平台带来的便利性再次显而易见。只需在 `actionPerformed()`
    方法中再插入一行代码即可（参见清单 44-13）。


    ***清单 44-13.** 播放 MP3 文件的上下文相关操作*


