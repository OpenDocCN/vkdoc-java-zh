    \ API. This keeps the application logic lean, as well as independent from the\
    \ Lookup API.\n\nThe abstract class should normally be part of a module, which\
    \ is, in turn, part of the standard distribution of the application (in the example,\
    \ this would be the module MP3 Services). The service provider (that is, the classes\
    \ that contain the real code for playing MP3 files) can be encapsulated in a separate\
