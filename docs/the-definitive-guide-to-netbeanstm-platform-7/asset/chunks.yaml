    Besides creating your own palette for a file type, for which there is no palette
    so far, you can add entries to an already existing palette. To do this you just
    have to know the name of the folder in the layer file. You can easily search for
    already existing palette folders in the layer tree (*Important Files ![Image](images/U001.jpg)
    XML Layer*). For example, the folder for HTML files is called `HTMLPalette`. You
    can also add your entries to the already existing folder `HTMLPalette` the same
    way as with your own folder `ManifestPalette`. For example, this could then look
    like [Listing 22-5](#Chapter22.html#list_22_5).


    ***Listing 22-5.** Adding Entries of an Already Existing Palette*


    `<folder name="`**`HTMLPalette`**`">`

    `   <folder name="`**`My HTML Items`**`">`

    `      <file name="item1.xml" url="items/item1.xml"/>`

    `      <file name="item2.xml" url="items/item2.xml"/>`

    `   </folder>`

    `</folder>`


    ### Summary


    With the Palette API you can not only extend your NetBeans Platform application
    but also the NetBeans IDE. You can create file-specific palettes or extend already
    existing ones. In this chapter you learned how to create and register palette
    items as well as palette controllers. In the last part of this chapter we looked
    at how to extend preexisting palettes.


    ## C H A P T E R  23


    ## Task List API


    The Task List module of the NetBeans IDE enables you to display tasks, notifications,
    or error messages as shown in [Figure 23-1](#Chapter23.html#fig_23_1). The entries
    of the Task List can be arranged in groups, giving the user a better overview;
    the user can also determine from what sections entries will be shown. By default,
    three sections, called scopes, are defined within the Task List module. One scope
    corresponds to the currently opened file, another scope corresponds to the main
    project and its opened dependent projects, and the third to all opened projects.
    The entries are supplied by scanners working with the fixed scope.


    ![Image](images/2301.jpg)


    ***Figure 23-1.** Task List module of the NetBeans IDE*


    For the Task List module there is the *Task List API* with which you can flexibly
    expand the scope of operation of the module. It is essentially about providing
    additional scanner. The expansions are integrated via extension points in the
    layer file. How this works is best shown in an example. Let''s say you want to
    implement a scanner which displays all positions at which a direct output of information
    is used, such as with `System.out.println()`. Before delivering a product, for
    example, you can ensure that all important positions were substituted by logging
    outputs or just removed.


    ### Implementing Scanner


    You derive your own scanner implementation from the abstract `FileTaskScanner`
    class. A scanner has a name and a description of what it can achieve. Optionally,
    you can connect a scanner to an options panel. With this options panel the user
    can individually configure the scanner. For example, you can use the ToDo scanner
    of the NetBeans IDE to configure the tokens, which will become identified as a
    ToDo task within a file. For simplicity''s sake, you define these tokens directly
    in the scanner. Then the three parameters name, description and path to the options
    panel (`null`, if no options panel is used) are passed to the base class constructor.
    Since the scanner is later declaratively registered in the layer file and afterward
    initialized by the Task List framework, you provide the factory method `create()`.
    Via this method, a `LoggingTaskScanner` instance can be created.


    The most important part of the scanner is the `scan()` method, as you could probably
    already guess. With this method you get passed the file which is to be searched.
    You go though this file with a `Pattern` (for recognizing the tokens) and with
    a `Matcher`. Create a `Task` instance for each position found. Afterward, you
    add this instance to a list which is returned. The `TodoTaskScanner` class was
    used as a template for the implementation in [Listing 23-1](#Chapter23.html#list_23_1).
    A `Task` instance is created via the static method `Task.create()`. You pass the
    searched file, the group to which the entry shall be added, a description (typically
    the line in which the token was found), and the number of the line to this method.


    ***Listing 23-1.** Scanner Implementation*


    `import org.netbeans.spi.tasklist.FileTaskScanner;`

    `import org.netbeans.spi.tasklist.Task;`

    `import org.openide.filesystems.FileObject;`

    `...`

    `public class` **`LoggingTaskScanner`** `extends` **`FileTaskScanner`** `{`


