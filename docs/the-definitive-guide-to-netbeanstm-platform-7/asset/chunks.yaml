    You can use the output window for your own purposes. Thus, you can create output
    in a simple way when developing, or you can display helpful information to the
    user, later. In this chapter you learned how to access the output window, how
    to add your own actions, and how to insert and display hyperlinks.


    ## C H A P T E R  18


    ## Navigator


    You can display context-dependent panels with the *Navigator* window and the *Navigator
    API*. Typically, these panels are used by the NetBeans IDE editor for navigation
    in a document, for example,. Here, the constructors, methods, and additional elements
    of a Java class are displayed (see [Figure 18-1](#Chapter18.html#fig_18_1)). As
    a result, the user can navigate within the document. However, this is just one
    application case; the panels displayed in the navigator can be used for any purpose.


