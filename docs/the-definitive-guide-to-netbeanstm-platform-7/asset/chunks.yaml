    \ So, the name of the tab, which is displayed in bold, is displayed as usual again,\
    \ signaling to the user that the task is completed. If multiple tasks are displayed\
    \ you can ensure that the corresponding one is active via the `InputOutput.select()`\
    \ method.\n\nYou can open the output window in your application with the menu\
    \ item *Window ![Image](images/U001.jpg) Output ![Image](images/U001.jpg) Output*.\
    \ This menu item is added by the output window module. The output window offers\
