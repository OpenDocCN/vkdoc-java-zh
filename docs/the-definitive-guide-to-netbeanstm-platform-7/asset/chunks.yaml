    \ class that already implements the `Action` interface. You create an `ImageIcon`\
    \ in the constructor and set this for the property `SMALL_ICON`.\n\n```\npublic\
    \ class StopTask extends AbstractAction {\n   public StopTask() {\n      putValue(SMALL_ICON,\
    \ ImageUtilities.loadImageIcon(\"icon.gif\", true));\n   }\n   public void actionPerformed(ActionEvent\
    \ evt) {\n      // stop the task\n   }\n}\n```\n\nNow, you pass an array with\
    \ an instance of the `StopTask` class to the `getIO()` method as second parameter.\n\
    \n```\nInputOutput io = IOProvider.getDefault().getIO(\"Task\", new Action[]{new\
    \ StopTask()});\n```\n\n### Inserting/Displaying Hyperlinks\n\nYou gain access\
    \ to the output window by the previously described methods `getOut()` and `getErr()`.\
