    `      FileSystem[] fileSystems = new FileSystem[groups.size()];`

    `      for (int idx = 0; idx < fileSystems.length; idx++) {`

    `fileSystems[idx] = new` **`XMLFileSystem`**`(groups.get(idx)`**`.getConfig`**`());`

    `      }`

    **`setDelegates`**`(fileSystems);`

    `   }`

    `}`


    The registered class becomes automatically initialized during the startup. However,
    there is no configuration set so far. so it is a virtually empty file system.
    It is necessary to call in the method `setPropagateMasks(true)` in the constructor,
    so the entries with suffix `_hidden` have an effect. The global lookup provides
    the instance which has been added to the System Filesystem already. So this instance
    makes it possible for you to inject dynamic entries into the System Filesystem
    afterward.


    The `setUserGroups()` method, to which you transfer a list with `UserGroup` objects
    out of the login handler, sets the configuration in the end. For this purpose
    create an `XMLFileSystem` instance and create an array out of it for the XML file
    of each group. Then, transfer this array to the `setDelegates()` method so the
    changes become propagated.'
