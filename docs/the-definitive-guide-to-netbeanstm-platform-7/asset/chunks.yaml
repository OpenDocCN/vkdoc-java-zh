    \ SPI`可以用作通用框架。\n\n多视图顶级组件提供的按钮栏允许用户在不同视图之间切换。可选地，其中一个由任意`JComponent`组成的视图会提供一个工具栏，显示在下拉列表旁边（参见[图10-7](#Chapter10.html#fig_10_7)）。\n\
