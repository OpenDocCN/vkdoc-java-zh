- fmt: "### Search Updates\n\nThe first step is to search the modules that must be\
    \ installed. The search takes place in all registered update centers. That means\
    \ in the first delivery of your application, at least one update center should\
    \ be registered. Via this update center the new modules should be included. You\
    \ can register an update center quite easily by means of the NetBeans IDE. To\
    \ do so, just call *File ![Image](images/U001.jpg) New File ![Image](images/U001.jpg)\
    \ Module Development ![Image](images/U001.jpg) Update Center*. You can find more\
    \ information on this in [Chapter 36](#Chapter36.html#ch36).\n\nSearch for both\
    \ the latest and the updated modules by the method shown in [Listing 25-1](#Chapter25.html#list_25_1).\
    \ It is important to make the desired (or all) update provider(s) load information\
    \ from the update centers about the provided modules. In this example you determine\
    \ all providers via the `UpdateUnitProviderFactory` and execute its `refresh()`\
    \ method. After that, you determine all provided modules that can be updated or\
    \ reinstalled via the `UpdateManager`, which also takes all providers into account.\
    \ To do so, filter with `!unit.getAvailableUpdates().isEmpty()` all modules which\
    \ are already installed and which are not updated. Now you just have to distinguish\
    \ between a new module and an updated module using the method `getInstalled()`.\
    \ If it says `null`, a version of this module is not yet installed; that means\
    \ it is a new module. According to this query you add the modules to the appropriate\
    \ list.\n\n***Listing 25-1.** Searching New and Updated Modules*\n\n```\nprivate\
    \ List<UpdateElement> install = new ArrayList<UpdateElement>();\nprivate List<UpdateElement>\
    \ update = new ArrayList<UpdateElement>();\n\npublic void searchNewAndUpdatedModules()\
    \ {\n   for (UpdateUnitProvider provider : UpdateUnitProviderFactory.\n      \
    \     getDefault().getUpdateUnitProviders(false)) {\n      try {\n         provider.refresh(null,\
    \ true);\n      } catch (IOException ex) {\n         LOG.severe(ex.getMessage());\n\
    \      }\n   }\nfor (UpdateUnit unit : UpdateManager.getDefault().getUpdateUnits())\
    \ {\n      if (!unit.getAvailableUpdates().isEmpty()) {\n         if (unit.getInstalled()\
    \ == null) {\n            install.add(unit.getAvailableUpdates().get(0));\n  \
    \       } else {\n            update.add(unit.getAvailableUpdates().get(0));\n\
    \         }\n      }\n   }\n}\n```\n\nIn the approach shown in [Listing 25-1](#Chapter25.html#list_25_1),\
    \ all update centers are queried by the `UpdateManager`. You can also restrict\
    \ the search to a separate provider to ensure that the modules are automatically\
    \ installed out of a dedicated update center, as shown in [Listing 25-2](#Chapter25.html#list_25_2).\
    \ You determine the desired update provider by the `UpdateUnitProviderFactory`\
    \ via name (according to the definition in the layer file). In contrast to the\
    \ previous approach, you do not search for the update manager then, but determine\
    \ it directly on the provider.\n\n***Listing 25-2.** Searching Modules in a Special\
    \ Update Center*\n\n```\nprivate static final String UC_NAME = \"com_galileo_netbeans_module_update_center\"\
    ;\n\npublic void searchNewAndUpdatedModulesInDedicatedUC() {\n   for (UpdateUnitProvider\
    \ provider : UpdateUnitProviderFactory.\n           getDefault().getUpdateUnitProviders(false))\
    \ {\n      try {\n         if (provider.getName().equals(UC_NAME)) {\n       \
    \     provider.refresh(null, true);\nfor (UpdateUnit u : provider.getUpdateUnits())\
    \ {\n               if (!u.getAvailableUpdates().isEmpty()) {\n              \
    \    if (u.getInstalled() == null) {\n                     install.add(u.getAvailableUpdates().get(0));\n\
    \                  } else {\n                     update.add(u.getAvailableUpdates().get(0));\n\
    \                  }\n               }\n            }\n         }\n      } catch\
    \ (IOException ex) {\n         LOG.severe(ex.getMessage());\n      }\n   }\n}\n\
    ```\n\n### Installing and Restarting Updates\n\nOperations on modules are executed\
    \ via an `OperationContainer`. It is possible to add any amount of `UpdateElement`\
    \ instances to this container. Please note that each operation container is responsible\
    \ for one certain action. That means in this case that two different containers\
    \ are needed. These are created via the referring factory methods `OperationContainer.createForInstall()`\
    \ and `OperationContainer.createForUpdate()`. Adding the elements does not depend\
    \ on the type. This is why you create a helper method for your purposes. (See\
    \ [Listing 25-3](#Chapter25.html#list_25_3).)\n\n***Listing 25-3.** Adding the\
    \ Update Elements to an Operation Container*\n\n```\npublic OperationContainer<InstallSupport>\
    \ addToContainer(\n        OperationContainer<InstallSupport> c,\n        List<UpdateElement>\
    \ modules) {\n   for (UpdateElement e : modules) {\n      if (container.canBeAdded(e.getUpdateUnit\
    \ (), e)) {\nOperationInfo<InstallSupport> operationInfo = c.add(e);\n       \
    \  if (operationInfo != null) {\n            c.add(operationInfo.getRequiredElements());\n\
    \         }\n      }\n   }\n   return container;\n}\n```\n\nThe helper method\
    \ shown in [Listing 25-3](#Chapter25.html#list_25_3) first checks whether a module\
    \ is compatible with the container. For each module this is checked by the method\
    \ `canBeAdded()`. In that case you add the module; an `OperationInfo` instance\
    \ is delivered when the module has not been found in the container yet. This instance\
    \ helps adding the needed dependencies from the current module by means of the\
    \ method `getRequiredElements()`. In this example, this call could be skipped,\
    \ because all available modules are added anyway. However, with the method `getBrokenDependencies()`\
    \ you could check whether a dependency cannot be fulfilled.\n\nIn addition to\
    \ filling the container with elements, downloading and installing modules works\
    \ the same way; a helper method is useful for this step. An `OperationContainer`\
    \ is passed to this method. Through this operation container the modules can then\
