    \ the path to a set of icons (displayed for a node), depending on the node's current\
    \ state. You define the base name of four different icons via this method. For\
    \ example, if you indicate `com/galileo/netbeans/module/icon.png`, the following\
    \ icons (which should already be provided) are automatically found:\n\n- `com/galileo/netbeans/module/icon.png`\n\
    - `com/galileo/netbeans/module/iconOpen.png`\n- `com/galileo/netbeans/module/icon32.png`\n\
    - `com/galileo/netbeans/module/iconOpen32.png`\n\n#### Node Context Menu\n\nA\
    \ node provides a context menu to the user over which context-independent actions\
    \ can be provided. A `DataNode` gets its entries or respective actions for its\
    \ context menu by the factory of the data object that is managed by the node.\
    \ In turn, the node class provides the actions via the `getActions()` method.\
    \ As you already learned in [Chapter 7](#Chapter07.html#ch7), it is possible in\
    \ this respect to register actions in the standard folder `Loaders` below a MIME\
    \ type–specific folder. If the MIME type is, for example, `audio/mpeg`, as in\
    \ [Chapter 7](#Chapter07.html#ch7), the actions are registered in `Loaders/audio/mpeg/Actions`.\
    \ Of course, you can use the mechanisms of the Actions API (described in [Chapter\
    \ 6](#Chapter06.html#ch6)) for this purpose. The actions are automatically read\
    \ and added to the context menu of the node. To explain this, I will continue\
    \ with the example of the MP3 data object from [Chapter 7](#Chapter07.html#ch7).\
    \ Only the following additional annotation is needed to add the action `PlayAction`\
    \ to the node context menu of the `Mp3DataObject`.\n\n```\n@ActionReferences({\n\
    \   ...\n@ActionReference(\n      path = \"Loaders/audio/mpeg/Actions\",\n   \
    \   position = 50, separatorAfter=60)\n})\npublic final class PlayAction implements\
    \ ActionListener { ...\n```\n\nThus, the play functionality also appears in the\
    \ context menu of an MP3 file (see [Figure 12-3](#Chapter12.html#fig_12_3)). Of\
    \ course, with the context sensitivity implemented in [Chapter 7](#Chapter07.html#ch7)\
    \ (see also [Chapter 6](#Chapter06.html#ch6)). This means if the file is being\
    \ played, the play action is deactivated in the context menu, too.\n\n![Image](images/1203.jpg)\n\
    \n***Figure 12-3.** Adding actions to the context menu of a node*\n\nA node delivers\
    \ the action that is executed when double clicking via the `getPreferredAction()`\
    \ method. If this method is not overridden, the first action of the array is used\
    \ by `getActions()`.\n\n#### Event Handling\n\nTo react on the events of a node,\
