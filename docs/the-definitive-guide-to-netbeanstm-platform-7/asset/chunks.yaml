    #### 拖放


    首先，你需要扩展 `Mp3DataNode` 类。其超类 `AbstractNode` 已经实现了 `drag()` 方法，该方法会在拖拽事件发生时被调用。例如，当你将文件从媒体库拖拽到播放列表时，就会触发一个拖拽事件。此方法必须返回一个
    `Transferable` 实例。因此，你需要在 `Mp3DataNode` 类中实现 `Transferable` 接口及其方法。你重写 `drag()`
    方法，从而返回一个指向自身实例的引用。为了在拖放操作期间访问数据并进行标识，你需要创建一个 `DataFlavor` 对象，该对象可以从外部访问。（参见清单
    44-20。）


    ***清单 44-20.** 对 Mp3DataNode 类的扩展以启用拖放功能*


