- fmt: "# Binding Table and Data Source\n\nThe first step is to create (or use an\
    \ already existing) Java DB database. In the Service window you can easily create\
    \ a new database over the context menu of the *Databases ![Image](images/U001.jpg)\
    \ Java DB* node with *Create Database*. This is called *ProductDatabase* in this\
    \ example. You add a table with the structure shown in [Listing 41-3](#Chapter41.html#list_41_3)\
    \ to the database and then you create two more test data sets—you can add any\
    \ number of entries later.\n\n**Listing 41-3.** Table Structure and Test Data\
    \ Sets\n\n```\nCREATE TABLE product (\n   id INT NOT NULL PRIMARY KEY GENERATED\
    \ ALWAYS AS IDENTITY,\n   title   VARCHAR(50) NOT NULL,\n   orderId VARCHAR(10)\
    \ NOT NULL,\n   price   DOUBLE      NOT NULL\n);\n\nINSERT INTO product (title,\
    \ orderId, price) VALUES ('Product 1', 'P1', 1.49);\nINSERT INTO product (title,\
    \ orderId, price) VALUES ('Product 2', 'P2', 5.99);\n```\n\nNow you need an entity\
    \ class for this table. However, you do not need to implement this entity class\
    \ yourself, but can let it be created automatically by a wizard of the NetBeans\
    \ IDE. For this, a Java class library project is necessary, though. Create it\
    \ with *File ![Image](images/U001.jpg) New Project... ![Image](images/U001.jpg)\
    \ Java ![Image](images/U001.jpg) Java Class Library*. You can then use the wizard\
    \ in this project with *File ![Image](images/U001.jpg) New File... ![Image](images/U001.jpg)\
    \ Persistence ![Image](images/U001.jpg) Entity Classes From Database* for implementing\
    \ the necessary entity class. In the first step, select the database connection\
    \ and after that the table *PRODUCT*. In the following step you deactivate the\
    \ option for creating named queries and JAXB annotations. However, a persistence\
    \ unit should be created. On the last page of the wizard, select `java.util.List`\
    \ as *Collection Type* and deactivate the option *Attributes for Regenerating\
    \ Tables*, because you build on an already existing table. Then, you create the\
    \ class `Product` with *Finish*. This has getter and setter methods in addition\
    \ to attributes which have JPA annotations. It will later be necessary to implement\
    \ a listener logic for propagating a change of a `Product` instance to the table.\
    \ The listeners have to be informed at all set methods with the `firePropertyChange()`\
    \ method. (See [Listing 41-4](#Chapter41.html#fig_41_1).)\n\n**Listing 41-4.**\
    \ Entity Class for the Table PRODUCT with Change Listener Logic with Which Changes\
    \ in the Table Can Be Directly Shown\n\n```\nimport java.beans.PropertyChangeListener;\n\
    import java.beans.PropertyChangeSupport;\nimport javax.persistence.Basic;\nimport\
    \ javax.persistence.Column;\n...\n@Entity\n@Table(name = \"PRODUCT\")\npublic\
    \ class Product implements Serializable {\n   private static final long serialVersionUID\
    \ = 1L;\n\n   @Id\n   @GeneratedValue(strategy = GenerationType.IDENTITY)\n  \
    \ @Basic(optional = false)\n   @Column(name = \"ID\")\nprivate Integer id;\n\n\
    \   @Basic(optional = false)\n   @Column(name = \"TITLE\")\nprivate String title;\n\
    \n   @Basic(optional = false)\n   @Column(name = \"ORDERID\")\nprivate String\
    \ orderid;\n\n   @Basic(optional = false)\n   @Column(name = \"PRICE\")\nprivate\
    \ double price;\n\n   private transient PropertyChangeSupport changeSupport =\
    \ new PropertyChangeSupport(this);\n\n   public Product() {\n   }\n\n   public\
    \ Product(Integer id) {\n      this.id = id;\n   }\n\n   public Product(\n   \
    \   Integer id, String title, String orderid, double price) {\n      this.id =\
    \ id;\n      this.title = title;\n      this.orderid = orderid;\n      this.price\
    \ = price;\n   }\n\n   public Integer getId() {\n      return id;\n   }\n\n  \
    \ public void setId(Integer id) {\n      Integer oldId = this.id;\n      this.id\
    \ = id;\n      changeSupport.firePropertyChange(\"id\", oldId, id);\n   }\n\n\
    \   public String getTitle() {\n      return title;\n   }\n\n   public void setTitle(String\
    \ title) {\n      String oldTitle = this.title;\n      this.title = title;\n \
    \     changeSupport.firePropertyChange(\"title\", oldTitle, title);\n   }\n\n\
    \   public String getOrderid() {\n      return orderid;\n   }\n\n   public void\
    \ setOrderid(String orderid) {\n      String oldOrderid = this.orderid;\n    \
    \  this.orderid = orderid;\n      changeSupport.firePropertyChange(\"orderid\"\
    , oldOrderid, orderid);\n   }\n\n   public double getPrice() {\n      return price;\n\
    \   }\n\n   public void setPrice(double price) {\n      double oldPrice = this.price;\n\
    \      this.price = price;\n      changeSupport.firePropertyChange(\"price\",\
    \ oldPrice, price);\n   }    \n\npublic void addPropertyChangeListener(PropertyChangeListener\
    \ listener) {\n      changeSupport.addPropertyChangeListener(listener);\n   }\n\
    \npublic void removePropertyChangeListener(\n      PropertyChangeListener listener)\
    \ {\n      changeSupport.removePropertyChangeListener(listener);\n   }\n}\n```\n\
    \nThe file `persistence.xml` was generated along with the entity class. The persistence\
    \ unit is configured by this file. So this is where you can edit the connection\
    \ parameters of the database when necessary. The name of the persistence unit\
    \ is important; you will need it later to access the data. (See [Listing 41-5](#Chapter41.html#list_41_5).)\n\
    \n**Listing 41-5.** Configuration of the Persistence Unit in `persistence.xml`\n\
    \n```\n<persistence ...>\n  <persistence-unit name=\"MyEntitiesLibraryPU\" transaction-type=\"\
    RESOURCE_LOCAL\">\n    <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>\n\
    \    <class>com.galileo.netbeans.myentities.Product</class>\n    <properties>\n\
    \      <property name=\"javax.persistence.jdbc.url\"\n         value=\"jdbc:derby://localhost:1527/ProductDatabase\"\
    />\n      <property name=\"javax.persistence.jdbc.password\"\n         value=\"\
    password\"/>\n      <property name=\"javax.persistence.jdbc.driver\"\n       \
    \  value=\"org.apache.derby.jdbc.ClientDriver\"/>\n      <property name=\"javax.persistence.jdbc.user\"\
    \n         value=\"admin\"/>\n    </properties>\n  </persistence-unit>\n</persistence>\n\
    ```\n\nYou can create the library project with *Build*. Then you come back to\
    \ the NetBeans Platform. Create an application with *File ![Image](images/U001.jpg)\
    \ New Project ![Image](images/U001.jpg) NetBeans Modules ![Image](images/U001.jpg)\
    \ NetBeans Platform Application*. For this Platform application you have to include\
    \ two additional modules. To do this, open the cluster *java* in *Properties ![Image](images/U001.jpg)\
    \ Libraries* and add the two modules *Beans Binding integration* and *TopLink\
    \ Essentials*. After that you can add a library wrapper module with the JAR file\
    \ of the entity class which had been created before. This module will be called\
    \ *My Entities*.\n\nYou need two more library wrapper modules for the connection\
    \ to the database and for saving the objects. Add one for the database driver;\
    \ this is the file `derbyclient.jar` which you find in the directory of the Java\
    \ DB installation. Call this module *Java DB Driver*. You need another library\
    \ wrapper module for *EclipseLink* as persistence provider. Add the two files\
    \ `eclipselink-2.2.0.jar` and `eclipselink-javax.persistence-2.0.jar` out of the\
    \ directory `java/modules/ext/eclipselink` of the NetBeans IDE installation to\
    \ this module.\n\nNow, there is just one more module missing: the actual application\
    \ module. Call this *My Module*. You have to define the following dependencies\
    \ first, so the interaction between those different modules can work:\n\n*   The\
    \ module *My Entities* contains a dependency on the modules *EclipseLink* and\
    \ *Java DB Driver*.\n*   The module *My Module* contains a dependency on the module\
    \ *EclipseLink*, *My Entities*, and *Beans Binding integration*."
