- fmt: "### Registering Panels\n\nYou must register the panel in the layer file of\
    \ your module, so the navigator module can find and create the panel. For this\
    \ purpose the navigator module defines the folder `Navigator/Panels`. Below this\
    \ folder, assign your panel to a MIME type for which the panel will be displayed.\
    \ Select `audio/mpeg` here. (See [Listing 18-2](#Chapter18.html#list_18_2).) However,\
    \ any other type would be conceivable.\n\n***Listing 18-2.** Registration of the\
    \ Navigator Panel in the Layer File*\n\n```\n<folder name=\"Navigator\">\n   <folder\
    \ name=\"Panels\">\n      <folder name=\"audio\">\n         <folder name=\"mpeg\"\
    >\n            <file name=\"com-galileo-netbeans-module-mp3navigator-Mp3AlbumNavigatorPanel.instance\"\
    />\n         </folder>\n      </folder>\n   </folder>\n</folder>\n```\n\nNow,\
    \ you should ask yourself how the navigator module knows when to display which\
    \ panel. Usually, the navigator module reads the MIME type of the currently active\
    \ node. In case no nodes exist, as in this example, the Navigator API provides\
    \ the interface `NavigatorLookupHint`. This interface specifies the `getContentType()`\
    \ method with which the context component—in this case the `Mp3SearchList` class—delivers\
    \ the MIME type, to which a navigator panel will be displayed. You implement this\
    \ interface in the class `Mp3SearchList` and return the MIME type `audio/mpeg`\
    \ exactly as you registered the panel in the layer file; see [Listing 18-3](#Chapter18.html#list_18_3).\n\
    \n***Listing 18-3.** Implementation of the NavigatorLookupHint Interface, Which\
    \ Determines the Panel to Be Displayed*\n\n```\nimport org.netbeans.spi.navigator.NavigatorLookupHint;\n\
    ...\npublic final class Mp3SearchList extends TopComponent implements ListSelectionListener\
    \ {\n\n   public Mp3SearchList() {\n      ...\n      associateLookup(new ProxyLookup(new\
    \ AbstractLookup(content),\nLookups.singleton(new Mp3AlbumNavigatorLookupHint())));\n\
    \   }\n\nprivate static final class Mp3AlbumNavigatorLookupHint implements NavigatorLookupHint\
    \ {\npublic String getContentType() {\n         return \"audio/mpeg\";\n     \
    \ }\n   }\n}\n```\n\nYou create the inner class `Mp3AlbumNavigatorLookupHint`\
    \ which implements the `NavigatorLookupHint` interface. You must now add an instance\
    \ of this class to your local Lookup. Since you already determined an `AbstractLookup`\
    \ as local Lookup, which contains the currently selected entry of the search list,\
    \ you cannot directly add this instance. So, you must create a `ProxyLookup` to\
    \ which you can pass the `AbstractLookup` and a Lookup (which you create via the\
    \ factory `Lookups`). Then, define this proxy Lookup as local Lookup by the method\
    \ `associateLookup()`. As soon as the top component `Mp3SearchList` is focused,\
    \ the navigator module is informed by the global Lookup about the existence of\
    \ a `NavigatorLookupHint` instance. As a result, the navigator can call the `getContentType()`\
    \ method, and thus open the appropriate navigator panel according to the return\
    \ value.\n\nOf course, when multiple different panels exist, the navigator component\
    \ becomes interesting. You can create any number of navigator panels and assign\
    \ the corresponding MIME type in the `Navigator/Panels` folder. The navigator\
    \ module then automatically switches the panels, depending on which component\
    \ is currently active. Finally, the Navigator API also provides the `NavigatorHandler`\
    \ class. This class contains the static `activatePanel()` method to which you\
    \ can pass a `NavigatorPanel` instance. This way, you can also programmatically\
    \ open a panel.\n\n### Summary\n\nThe navigator module is a universal component\
    \ for displaying context-dependent data structures. This chapter discussed how\
    \ to create panels which can be displayed by the navigator module. You also learned\
    \ both methods by which the navigator module locates panels.\n\n## C H A P T E\
    \ R 19\n\n## Properties\n\nWith the *Properties* window you can display the properties\
    \ of a node in a simple way. This means you can display the properties of the\
    \ data or of the action which is represented by this node (for more information\
    \ see [Chapter 12](#Chapter12.html#ch12)). Thus, you give the user the possibility\
    \ to change it. A set of properties is managed by the `Sheet` class of the Nodes\
    \ API. The `AbstractNode` class (usually the basis of a node) provides such a\
    \ `Sheet` via the method `getSheet()`. To provide such a `Sheet`, you just have\
    \ to overwrite the `createSheet()` method. Then, you can add your specific properties\
    \ to this `Sheet`. I will provide an example to demonstrate how this works. You\
    \ want to display the ID3 information of the just selected or activated MP3 file.\
    \ However, you do not read the ID3 information for simplicity's sake, but just\
    \ use fixed exemplified values; one condition is that you at least have your own\
    \ node class which derives from `AbstractNode`. Creating the MP3 file type in\
    \ [Chapter 7](#Chapter07.html#ch7), you saw that the `DataNode` class is used\
    \ by default. So let's look at the MP3 file type example once again (you can also\
    \ just create an MP3 file type with the NetBeans wizard) and implement your own\
    \ node class. The properties, shown in the properties window, will look like those\
    \ shown in [Figure 19-1](#Chapter19.html#fig_19_1).\n\n![Image](images/1901.jpg)\n\
    \n***Figure 19-1.** Presentation of the properties of the just selected node in\
    \ the properties window*"
