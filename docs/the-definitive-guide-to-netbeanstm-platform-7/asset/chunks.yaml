    You define and edit module dependencies via *Properties ![Image](images/U001.jpg)
    Libraries*, as shown in [Figure 3-8](#Chapter03.html#fig_3_8).


    ![Image](images/0308.jpg)


    ***Figure 3-8.** Definition of module dependencies*


    In this window, use *Add Dependency…* to add dependencies to your module. The
    NetBeans module system offers different methods to connect dependencies to a particular
    module.


    In the simplest case, no version is required. That means there should simply be
    a module available, though not a particular version (although, where possible,
    you still specify a version):


    **`OpenIDE-Module-Module-Dependencies`**`: com.galileo.netbeans.module2`


    In addition, you may require a certain specification version. In this case, the
    module version should be greater than version 7.1\. This is the most common manner
    of defining dependencies:


    **`OpenIDE-Module-Module-Dependencies`**`: org.openide.dialogs` **`> 7.1`**


    If the module on which you want to depend has a major release version, it must
    be specified via a slash after the name of the module:


    **`OpenIDE-Module-Module-Dependencies`**`: org.netbeans.modules.options.api`**`/1`**
    `> 1.5`


    Additionally, you may also specify a range of major release versions:


    **`OpenIDE-Module-Module-Dependencies`**`: com.galileo.netbeans.module3`**`/2-3`**
    `> 3.1.5`


    To create tight integration to another module it is possible to set an *Implementation
    Dependency*. The main difference and the reason for this approach is to make use
    of all the packages in the module, regardless of whether the module has exposed
    them or not. A dependency of this kind must be set with care, since it negates
    the principle of encapsulation and the definition of APIs. To enable the system
    to guarantee the consistency of the application, the dependency must be set precisely
    on the version of the given implementation version. However, this version changes
    with each change to the module.


    **`OpenIDE-Module-Module-Dependencies`**`: com.galileo.netbeans.module2 =` **`200702031823`**


    Select the required dependency in the list (see [Figure 3-8](#Chapter03.html#fig_3_8))
    and click the *Edit…* button. As shown in [Figure 3-9](#Chapter03.html#fig_3_9)
    you can set various types of dependencies.


    ![Image](images/0309.jpg)


    ***Figure 3-9.** Editing module dependencies*


    ##### Java Package Dependency


    NetBeans lets you set a module dependency on a specific Java package. A dependency
    of this kind is set in the manifest file:


    **`OpenIDE-Module-Package-Dependencies`**`: javax.sound.midi.spi > 1.4`


    ##### Java Version Dependency


    If your module depends on a specific Java version, such as Java 6, you can also
    specify that in the module properties under *Properties ![Image](images/U001.jpg)
    Sources*, using the *Source Level* setting. Aside from that, you can require a
    specific version of the Java Virtual Machine:


    **`OpenIDE-Module-Java-Dependencies`**`: Java > 1.6 VM > 1.0`


    You can require an exact version using the equal sign or require a version that
    is greater than the specified version.


    ### Lifecycle


    You can implement a so-called *Module Installer* to influence the lifecycle of
    a module and thus react on certain events. The Module System API provides the
    `ModuleInstall` class, from which we derive our own module installer class. Doing
    so, the following methods of the desired events can be overwritten. The following
    methods or events are available:


    *   *`validate()`*: This method is called before a module is installed or loaded.
    If necessary, certain load sequences, such as the verification of a module license,
    are set here. Should the sequence not succeed and the module not be loaded, an
    `IllegalStateException` can be thrown. This exception prevents loading or installing
    the module.

    *   *`restored()`*: This method is always called when an installed module is loaded.
    Here, actions can be initialized starting a module.

    *   *`uninstalled()`*: This method is called when a module is removed from the
    application.

    *   *`closing()`*: Before a module is ended, this method is called. Here, you
    can also test whether the module is ready to be removed or if there are still
    activities to be executed. If the return value is `false`, the module and the
    whole application is not ended, because this method is always called before ending
    a module. The application is just ended when all modules are set `true`. You can,
    for example, show the user a dialog to confirm whether the application should
    really be closed.

    *   *`close()`*: If all modules are ready to end, this method is called. Here,
    you can call the actions before shutting down a module.


    ![Image](images/square.jpg) **Note** Using these methods, consider whether the
    actions you are calling could be set declaratively instead. However, always check
    if the desired action could go a declarative way. In particular, in the cases
    of the methods `validate()` and `restored()`, consider that these methods influence
    the startup time of the whole application. For example, when services are registered,
    you could either use entries in the layer file or the Java Extension Mechanism
    (see [Chapter 5](#Chapter05.html#ch5)). This way they are loaded at their first
    usage and doesn''t extend the startup time of the application as a whole.


    [Listing 3-6](#Chapter03.html#list_3_6) shows the structure of a module installer
    class.


    ***Listing 3-6.** Structure of a Module Installer Class*


    `public class Installer extends` **`ModuleInstall`** `{`

    `public void` **`validate`**`() throws IllegalStateException {`

    `      // e. g. check for a license key and throw an`

    `      // IllegalStateException if this is not valid.`

    `   }`

    `public void` **`restored`**`() {`

    `      // called when the module is loaded.`

    `   }`

    `public void` **`uninstalled`**`() {`

    `      // called when the module is deinstalled.`

    `   }`

    `public boolean` **`closing`**`() {`

    `      // called to check if the module can be closed.`

    `   }`

    `public void` **`close`**`() {`

    `      // called before the module will be closed.`

    `   }`

    `}`


    To record the state of the module installer class over different sessions, overwrite
    the methods `readExternal()` and `writeExternal()` from the `Externalizable` interface,
    which is implemented by the `ModuleInstall` class. There you store and retrieve
    necessary data. When doing so, it is recommended to first call the methods to
    be overwritten on the superclass. To let the module system know at startup if
    a module provides a module installer, and where to find it, register it in the
    manifest file:


    **`OpenIDE-Module-Install`**`: com/galileo/netbeans/module/Installer.class`


