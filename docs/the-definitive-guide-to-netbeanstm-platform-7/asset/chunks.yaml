    ### Summary


    Databases are usually located on a server. However, Java DB offers a client database
    solution. In this chapter we looked at how such a database can be integrated in
    your NetBeans Platform application.


    ## C H A P T E R  27


    ## Hibernate


    In [Chapter 26](#Chapter26.html#ch26) you learned about using the client database
    solution Java DB within a rich client application. You had to disassemble the
    files to save them in the relational database system and you also had to extract
    the data of the database in a conventional way via SQL over the JDBC interface.
    You then had to assemble your objects—in this example, `Album` and `Genre`. You
    encapsulated this functionality in the class `DataModel`—you may have noticed
    that this can become quite complicated and error-prone. This is one of the reasons
    database creators put such an effort into developing and standardizing object-oriented
    databases, although they cannnot establish and enforce against the relational
    systems, yet. This is mainly because of the widespread use of the RDBMS: new applications
    have to access data that is saved in relations.


    This is why so-called object relational bridges have been developed; they take
    care of saving and loading object data in and out of rational databases and thus
    form an abstraction layer for the underlying database system. Probably the most
    popular and widely used implementation of such a bridge is Hibernate. Hibernate
    does the mapping of the object data on relations, which should be as transparent
    as possible. Ideally, that means you do not need to worry about where and how
    your data is saved.


    This chapter will show how Hibernate can be usefully integrated in a rich client
    application on the basis of the NetBeans Platform. I will only cover the basic
    concepts of using Hibernate here, however; this chapter will not discuss all the
    details of the wide functionalities of Hibernate.'
