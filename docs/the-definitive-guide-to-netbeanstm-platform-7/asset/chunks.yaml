    #### 新建更新中心


    如前所述，您应用程序的用户可以在插件管理器中注册额外的更新中心。但是，您也可以将更新中心信息添加到您的某个模块中。一旦该模块在应用程序中被加载，注册的更新中心也会自动提供。因此，您可以为已交付的应用程序添加额外的更新中心。要将此类更新中心信息添加到您的模块，可以在*文件
    ![Image](img/U001.jpg) 新建文件... ![Image](img/U001.jpg) 模块开发 ![Image](img/U001.jpg)
    更新中心*下找到一个向导。该向导会注册输入的更新中心信息，包括名称和 URL，这些信息存储在层文件中标准文件夹 `Services/AutoupdateType`
    内。这样的条目看起来如清单 36-3 所示。


    ***清单 36-3.** 层文件中的更新中心定义*


    `<folder name="`**`Services`**`">`

    `   <folder name="`**`AutoupdateType`**`">`

    `      <file name="`**`my_module_update_center.instance`**`">`

    `         <attr name="`**`displayName`**`"`

    `               bundlevalue="com.galileo.netbeans.module.Bundle                #Services/AutoupdateType/my_module_update_center.instance"/>`

    `         <attr name="`**`enabled`**`" boolvalue="`**`true`**`"/>`

    `         <attr name="instanceCreate" methodvalue=`

    `               "org.netbeans.modules.autoupdate.updateprovider.`

    `               AutoupdateCatalogFactory.createUpdateProvider"/>`

    `         <attr name="instanceOf" stringvalue="org.netbeans.spi.autoupdate.UpdateProvider"/>`

    `         <attr name="`**`url`**`" bundlevalue=`

    `               "com.galileo.netbeans.module.Bundle#`**`my_module_update_center`**`"/>`

    `      </file>`

    `   </folder>`

    `</folder>`


    实际文件已外包到资源包中：


    `my_module_update_center=`**`http://heikoboeck.de/updates.xml`**

    `Services/AutoupdateType/my_module_update_center.instance=`**`My Update Center`**


    此示例假设更新中心可通过 *http* 的互联网地址公开访问。但是，您也可以使用 *file* 协议来安装更新中心，例如，在公司内部服务器上。


    `file:/D:/NetBeans/MyUpdateCenter/updates/updates.xml`


    #### 自动安装更新


    NBM 文件也可以在无需用户交互的情况下安装。为此，只需将 NBM 文件放入集群的 *`update/download`* 目录中。然后，当应用程序下次启动时，更新将自动安装。之后，NBM
    文件会被移除，应用程序会重新启动。已更新模块原始版本的备份位于 *`update/backup/netbeans`* 目录中。请记住，更新始终安装在存储该更新的集群中，即使要更新的模块安装在不同的集群中也是如此。


    *自动更新服务 API* 为模块的管理、自动安装、卸载或停用提供了更多可能性。第 25 章 将介绍自动更新服务 API 的功能。


    ### 总结


    本章向您介绍了 NetBeans 平台的更新功能。首先，您了解了自动更新服务的工作原理。NBM 文件是一个更新包，可以通过 NetBeans IDE 从您的模块创建。接下来，您学习了如何提供和配置更新中心。您还了解了如何配置模块以提供现有模块的本地化版本。最后，本章讨论了客户端更新中心的配置以及如何自动安装更新。


    ## 第七部分


    ## 测试与工具：开发和测试 NetBeans 平台应用程序


    ## 第 37 章


    ## Maven 与 NetBeans 平台


    NetBeans 平台默认使用构建工具 Ant。作为 Ant 的替代方案，Maven 迄今为止仅作为附加插件提供，且 IDE 对其支持有限。但这种情况已经改变；Maven
    现在已成为 NetBeans IDE 的一个组成部分。NetBeans IDE 包含了 Maven 发行版和用于创建不同项目类型的众多向导。本章将重点介绍在开发
    NetBeans 平台应用程序时的 Maven 支持。


    Maven 项目的配置是分层且模块化的，因此它非常适合作为 NetBeans 平台应用程序的构建系统。在 Maven 项目中，完整的构建过程由 Maven
    执行，这意味着即使没有 NetBeans IDE 也能轻松工作。Maven 本身的功能被组织成独立的插件；由于 Maven 的广泛使用，针对众多任务都有可用的插件。必要的配置文件保持小巧且组织清晰。


    ### Maven 项目的基础和结构


    在 Maven 中，软件项目的所有必要信息都在所谓的 *POM*（项目对象模型）文件中定义。每个模块（例如 JAR 文件）都包含自己的文件。一个项目可以由多个模块组成。可以创建一个聚合这些模块的父
    POM 文件，以便可以共同创建这些模块。同时，下级模块可以继承父 POM 文件的特性。这样就形成了一个分层结构，并且这个结构可以进一步向下扩展。（参见图 37-1。）


    ![Image](img/3701.jpg)


    ***图 37-1.** 具有父 POM 文件的多模块项目的文件结构，用于继承特性和聚合多个模块*

    '
- fmt: "#### Parent POM File\n\nOne of the most important features of Maven is the\
    \ possibility of inheritance. This means that a parent POM can be referenced from\
    \ a POM file. Elements which are defined there can be inherited or overridden.\
    \ At the same time, it is possible to aggregate modules. All modules that will\
    \ belong to this project are defined in a parent POM file. This way, a software\
    \ project, which consists of several modules, can be created as a unit.\n\nThe\
    \ basic structure of a parent POM file is shown in [Listing 37-1](#Chapter37.html#list_37_1).\
    \ There the file, or rather the project, is identified in principle by the elements\
    \ `groupId`, `artifactId`, and `version`. As it is no module (e.g., JAR file),\
    \ but a parent POM file, the `packaging` type `pom` is used. Below the element\
    \ `dependencies` you can define dependencies on other modules. This is especially\
    \ important for single modules which use classes out of other modules. At that\
    \ place you can define the version of a dependency in advance in the parent POM\
    \ file to ensure that all modules, which define the referring dependency, use\
    \ the same version. You can already preconfigure plugins, which are used in the\
    \ build process, with the element `build`. The actual aggregation of several modules\
    \ belonging together occurs by the element `modules`. So if a build process is\
    \ started with this parent POM file, the modules `Module1` and `Module2` are built.\
    \ If the build process fails at one module, the whole process is cancelled.\n\n\
    ***Listing 37-1.** Example of a Parent POM file with Which Several Modules Are\
    \ Summarized*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<project   \
    \ xsi:schemaLocation=\"http://maven.apache.org/xsd/maven-4.0.0.xsd\">\n    <modelVersion>4.0.0</modelVersion>\n\
    \    <groupId>com.galileo.netbeans</groupId>\n    <artifactId>MyApplication</artifactId>\n\
    \    <version>1.0-SNAPSHOT</version>\n    <packaging>pom</packaging>\n    <name>MyApplication</name>\n\
    \    <repositories>...</repositories>\n    <build>...</build>\n    <modules>\n\
    \        <module>Module1</module>\n        <module>Module2</module>\n    </modules>\n\
    \    <properties>...</properties>\n</project>\n```\n\n#### Module POM File\n\n\
    The POM file for a module consists of exactly the same basic structure. Obviously,\
    \ the element `parent` is used instead of the element `modules` at this point.\
    \ So you refer to the POM file to use, whose settings will be inherited. The name,\
    \ which was given by `artifactId`, must be the same as the name indicated in the\
    \ parent POM file under `modules`. Now you define that you are dealing with a\
    \ module. You do this with the `packaging` element; this can be `jar` or `nbm`\
    \ for a NetBeans Platform, module, for example. (See [Listing 37-2](#Chapter37.html#list_37_2).)\n\
    \n***Listing 37-2.** Example of a Module POM File Which Inherits from a Parent\
    \ POM File*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<project xsi:schemaLocation=\"\
    http://maven.apache.org/xsd/maven-4.0.0.xsd\">\n    <modelVersion>4.0.0</modelVersion>\n\
    \    <parent>\n        <artifactId>MyApplication</artifactId>\n        <groupId>com.galileo.netbeans</groupId>\n\
    \        <version>1.0-SNAPSHOT</version>\n    </parent>\n    <artifactId>Module1</artifactId>\n\
    \    <packaging>nbm</packaging>\n    <name>MyModule</name>\n    <properties>...</properties>\n\
    \    <dependencies>\n        <dependency>\n            <groupId>com.galileo.netbeans</groupId>\n\
    \            <artifactId>Module5</artifactId>\n            <version>1.3</version>\n\
    \        </dependency>\n    </dependencies>\n    <build>...</build>\n</project>\n\
    ```\n\nOne of the most important features of Maven is dependency management, especially\
    \ compared to Ant. There, dependencies on other modules (JAR files) or projects\
    \ are declared for each project or module in the referring POM file. However,\
    \ the actual and main advantage is the resolution of transitive dependencies by\
    \ Maven, since Maven even resolves and integrates dependencies of the dependencies.\
    \ Hence, you do not have to care about the whole class path, which ensures a simple\
    \ reproducibility of a build any time.\n\n#### Maven Repositories\n\nEmbedding\
    \ and managing repositories is an integral part of Maven. A repository, in this\
    \ context, is the location for artifacts (mostly JAR files). Besides the actual\
    \ artifact, the POM file is also located there. Thus, the POM file allows the\
    \ resolution of transitive dependencies. The storage structure goes along with\
    \ a certain convention. For example, the module with the group ID `com.galileo.netbeans`,\
    \ artifact ID `MyModule`, and version `1.0` would be located at `<Repository>/com/galileo/netbeans/MyModule/1.0/MyModule-1.0.jar`\
    \ if needed in another project.\n\nYou can define any number of other specific\
    \ repositories for your project, besides the central Maven repository (`http://repo1.maven.org/maven2`),\
    \ which is integrated by default. Add the entry in [Listing 37-3](#Chapter37.html#list_37_3)\
    \ to your POM file to be able to use artifacts out of the repository with the\
    \ NetBeans modules, for example.\n\n***Listing 37-3.** Definition of a Maven Repository*\n\
    \n```\n<repositories>\n    <repository>\n        <id>netbeans</id>\n        <name>NetBeans</name>\n\
    \        <url>http://bits.netbeans.org/maven2/</url>\n    </repository>\n</repositories>\n\
    ```\n\nOf course, this definition can be added to the parent POM file, so that\
    \ not every corresponding module has to be configured separately.\n\nMaven manages\
    \ a local repository; you do not have to download the necessary artifacts from\
    \ the online repository for each and every build. All downloaded artifacts are\
    \ located in this local repository, which is searched first to accelerate the\
    \ build process. Then the process can also be executed offline. You define where\
    \ your local repository is located in the `settings.xml` file, which usually is\
    \ located in the user directory at `<user directory>/.m2/settings.xml`. The definition\
    \ looks like [Listing 37-4](#Chapter37.html#list_37_4).\n\n***Listing 37-4.**\
    \ Definition of the Local Maven Repository*\n\n```\n<settings>\n    <localRepository>D:\\\
    MyLocalRepository</localRepository>\n    ...\n</settings>\n```\n\n### Maven Projects\
    \ in the NetBeans IDE\n\nThe NetBeans IDE provides different wizards for creating\
    \ a NetBeans Platform application and its modules for Maven and Ant, by default.\
    \ Additionally, useful features are provided as the Maven repository browser,\
    \ for example."
  raw: '#### Parent POM File


    One of the most important features of Maven is the possibility of inheritance.
    This means that a parent POM can be referenced from a POM file. Elements which
    are defined there can be inherited or overridden. At the same time, it is possible
    to aggregate modules. All modules that will belong to this project are defined
    in a parent POM file. This way, a software project, which consists of several
    modules, can be created as a unit.


    The basic structure of a parent POM file is shown in [Listing 37-1](#Chapter37.html#list_37_1).
    There the file, or rather the project, is identified in principle by the elements
    `groupId`, `artifactId`, and `version`. As it is no module (e.g., JAR file), but
    a parent POM file, the `packaging` type *pom* is used. Below the element `dependencies`
    you can define dependencies on other modules. This is especially important for
    single modules which use classes out of other modules. At that place you can define
    the version of a dependency in advance in the parent POM file to ensure that all
    modules, which define the referring dependency, use the same version. You can
    already preconfigure plugins, which are used in the build process, with the element
    `build`. The actual aggregation of several modules belonging together occurs by
    the element `modules`. So if a build process is started with this parent POM file,
    the modules *Module1* and *Module2* are built. If the build process fails at one
    module, the whole process is cancelled.


    ***Listing 37-1.** Example of a Parent POM file with Which Several Modules Are
    Summarized*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<project    xsi:schemaLocation="http://maven.apache.org/xsd/maven-4.0.0.xsd">`

    `   <modelVersion>4.0.0</modelVersion>`

    `   <`**`groupId`**`>com.galileo.netbeans</`**`groupId`**`>`

    `   <`**`artifactId`**`>MyApplication</`**`artifactId`**`>`

    `   <version>1.0-SNAPSHOT</version>`

    `   <`**`packaging`**`>pom</`**`packaging`**`>`

    `   <name>MyApplication</name>`

    `   <repositories>...</repositories>`

    `   <build>...</build>`

    `   <`**`modules`**`>`

    `      <module>`**`Module1`**`</module>`

    `      <module>Module2</module>`

    `   </`**`modules`**`>`

    `   <properties>...</properties>`

    `</project>`


    #### Module POM File


    The POM file for a module consists of exactly the same basic structure. Obviously,
    the element `parent` is used instead of the element `modules` at this point. So
    you refer to the POM file to use, whose settings will be inherited. The name,
    which was given by `artifactId`, must be the same as the name indicated in the
    parent POM file under `modules`. Now you define that you are dealing with a module.
    You do this with the `packaging` element; this can be *jar* or *nbm* for a NetBeans
    Platform, module, for example. (See [Listing 37-2](#Chapter37.html#list_37_2).)


    ***Listing 37-2.** Example of a Module POM File Which Inherits from a Parent POM
    File*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<project xsi:schemaLocation="http://maven.apache.org/xsd/maven-4.0.0.xsd">`

    `   <modelVersion>4.0.0</modelVersion>`

    `   <`**`parent`**`>`

    `      <artifactId>MyApplication</artifactId>`

    `      <groupId>com.galileo.netbeans</groupId>`

    `      <version>1.0-SNAPSHOT</version>`

    `   </`**`parent`**`>`

    `   <artifactId>`**`Module1`**`</artifactId>`

    `   <`**`packaging`**`>nbm</`**`packaging`**`>`

    `   <name>MyModule</name>`

    `   <properties>...</properties>`

    `   <dependencies>`

    `      <`**`dependency`**`>`

    `         <groupId>com.galileo.netbeans</groupId>`

    `         <artifactId>Module5</artifactId>`

    `         <version>1.3</version>`

    `      </`**`dependency`**`>`

    `   </dependencies>`

    `   <build>...</build>`

    `</project>`


    One of the most important features of Maven is dependency management, especially
    compared to Ant. There, dependencies on other modules (JAR files) or projects
    are declared for each project or module in the referring POM file. However, the
    actual and main advantage is the resolution of transitive dependencies by Maven,
    since Maven even resolves and integrates dependencies of the dependencies. Hence,
    you do not have to care about the whole class path, which ensures a simple reproducibility
    of a build any time.


    #### Maven Repositories


    Embedding and managing repositories is an integral part of Maven. A repository,
    in this context, is the location for artifacts (mostly JAR files). Besides the
    actual artifact, the POM file is also located there. Thus, the POM file allows
    the resolution of transitive dependencies. The storage structure goes along with
    a certain convention. For example, the module with the group ID `com.galileo.netbeans`,
    artifact ID `MyModule`, and version `1.0` would be located at `<Repository>/com/galileo/netbeans/MyModule/1.0/MyModule-1.0.jar`
    if needed in another project.


    You can define any number of other specific repositories for your project, besides
    the central Maven repository ([`http://repo1.maven.org/maven2`](http://repo1.maven.org/maven2)),
    which is integrated by default. Add the entry in [Listing 37-3](#Chapter37.html#list_37_3)
    to your POM file to be able to use artifacts out of the repository with the NetBeans
    modules, for example.


    ***Listing 37-3.** Definition of a Maven Repository*


    `<repositories>`

    `   <`**`repository`**`>`

    `      <id>netbeans</id>`

    `      <name>NetBeans</name>`

    `      <url>http://bits.netbeans.org/maven2/</url>`

    `   </`**`repository`**`>`

    `</repositories>`


    Of course, this definition can be added to the parent POM file, so that not every
    corresponding module has to be configured separately.


    Maven manages a local repository; you do not have to download the necessary artifacts
    from the online repository for each and every build. All downloaded artifacts
    are located in this local repository, which is searched first to accelerate the
    build process. Then the process can also be executed offline. You define where
    your local repository is located in the *settings.xml* file, which usually is
    located in the user directory at *<user directory>/.m2/settings.xml*. The definition
    looks like [Listing 37-4](#Chapter37.html#list_37_4).


    ***Listing 37-4.** Definition of the Local Maven Repository*


    `<settings>`

    `   <`**`localRepository`**`>D:\MyLocalRepository</`**`localRepository`**`>`

    `   ...`

    `</settings>`


    ### Maven Projects in the NetBeans IDE


    The NetBeans IDE provides different wizards for creating a NetBeans Platform application
    and its modules for Maven and Ant, by default. Additionally, useful features are
    provided as the Maven repository browser, for example.'
  trans: '

    #### 父 POM 文件


    Maven 最重要的特性之一就是支持继承。这意味着父 POM 可以被 POM 文件引用。在父 POM 中定义的元素可以被继承或覆盖。同时，还可以聚合模块。所有属于该项目的模块都在父
    POM 文件中定义。这样，一个由多个模块组成的软件项目就可以作为一个整体来创建。


    父 POM 文件的基本结构如清单 37-1 所示。在该文件中，或者说该项目，主要通过 `groupId`、`artifactId` 和 `version`
    元素来标识。由于它不是模块（例如 JAR 文件），而是一个父 POM 文件，因此使用了 *pom* 类型的 `packaging`。在 `dependencies`
    元素下，你可以定义对其他模块的依赖关系。这对于使用其他模块中类的单个模块尤其重要。你可以在父 POM 文件中预先定义依赖项的版本，以确保所有定义了该依赖关系的模块都使用相同的版本。你还可以使用
    `build` 元素预先配置构建过程中使用的插件。多个相关模块的实际聚合是通过 `modules` 元素实现的。因此，如果使用此父 POM 文件启动构建过程，则会构建
    *Module1* 和 *Module2* 模块。如果构建过程在某个模块上失败，则整个构建过程将被取消。


    ***清单 37-1.** 用于聚合多个模块的父 POM 文件示例*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<project    xsi:schemaLocation="http://maven.apache.org/xsd/maven-4.0.0.xsd">`

    `   <modelVersion>4.0.0</modelVersion>`

    `   <`**`groupId`**`>com.galileo.netbeans</`**`groupId`**`>`

    `   <`**`artifactId`**`>MyApplication</`**`artifactId`**`>`

    `   <version>1.0-SNAPSHOT</version>`

    `   <`**`packaging`**`>pom</`**`packaging`**`>`

    `   <name>MyApplication</name>`

    `   <repositories>...</repositories>`

    `   <build>...</build>`

    `   <`**`modules`**`>`

    `      <module>`**`Module1`**`</module>`

    `      <module>Module2</module>`

    `   </`**`modules`**`>`

    `   <properties>...</properties>`

    `</project>`


    #### 模块 POM 文件


    模块的 POM 文件具有完全相同的基本结构。显然，此处使用 `parent` 元素代替了 `modules` 元素。这样，你就可以引用要使用的 POM 文件，其设置将被继承。由
    `artifactId` 指定的名称必须与父 POM 文件中 `modules` 下指定的名称相同。现在，你定义了你正在处理的是一个模块。这是通过 `packaging`
    元素完成的；例如，对于 NetBeans Platform 模块，它可以是 *jar* 或 *nbm*。（参见清单 37-2。）


    ***清单 37-2.** 继承自父 POM 文件的模块 POM 文件示例*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<project xsi:schemaLocation="http://maven.apache.org/xsd/maven-4.0.0.xsd">`

    `   <modelVersion>4.0.0</modelVersion>`

    `   <`**`parent`**`>`

    `      <artifactId>MyApplication</artifactId>`

    `      <groupId>com.galileo.netbeans</groupId>`

    `      <version>1.0-SNAPSHOT</version>`

    `   </`**`parent`**`>`

    `   <artifactId>`**`Module1`**`</artifactId>`

    `   <`**`packaging`**`>nbm</`**`packaging`**`>`

    `   <name>MyModule</name>`

    `   <properties>...</properties>`

    `   <dependencies>`

    `      <`**`dependency`**`>`

    `         <groupId>com.galileo.netbeans</groupId>`

    `         <artifactId>Module5</artifactId>`

    `         <version>1.3</version>`

    `      </`**`dependency`**`>`

    `   </dependencies>`

    `   <build>...</build>`

    `</project>`


    Maven 最重要的特性之一是依赖管理，尤其是与 Ant 相比。在 Maven 中，对其他模块（JAR 文件）或项目的依赖关系是在每个项目或模块的相应 POM
    文件中声明的。然而，实际的主要优势在于 Maven 能够解析传递性依赖，因为 Maven 甚至能够解析并集成依赖项的依赖项。因此，你无需关心整个类路径，这确保了构建在任何时候都能轻松重现。


    #### Maven 仓库


    嵌入和管理仓库是 Maven 不可或缺的一部分。在此上下文中，仓库是工件（主要是 JAR 文件）的存放位置。除了实际的工件之外，POM 文件也位于此处。因此，POM
    文件允许解析传递性依赖。存储结构遵循特定的约定。例如，如果另一个项目需要，组 ID 为 `com.galileo.netbeans`、工件 ID 为 `MyModule`、版本为
    `1.0` 的模块将位于 `<Repository>/com/galileo/netbeans/MyModule/1.0/MyModule-1.0.jar`。


    除了默认集成的中央 Maven 仓库（[`http://repo1.maven.org/maven2`](http://repo1.maven.org/maven2)）之外，你可以为项目定义任意数量的其他特定仓库。将清单
    37-3 中的条目添加到你的 POM 文件中，以便能够使用来自包含 NetBeans 模块的仓库中的工件。


    ***清单 37-3.** Maven 仓库的定义*


    `<repositories>`

    `   <`**`repository`**`>`

    `      <id>netbeans</id>`

    `      <name>NetBeans</name>`

    `      <url>http://bits.netbeans.org/maven2/</url>`

    `   </`**`repository`**`>`

    `</repositories>`


    当然，这个定义可以添加到父 POM 文件中，这样就不必单独配置每个相应的模块了。


    Maven 管理一个本地仓库；你不必为每次构建都从在线仓库下载必要的工件。所有下载的工件都位于此本地仓库中，构建过程会首先搜索该仓库以加速构建。然后，该过程也可以离线执行。你可以在
    *settings.xml* 文件中定义本地仓库的位置，该文件通常位于用户目录下的 *<user directory>/.m2/settings.xml*。定义如清单
    37-4 所示。


    ***清单 37-4.** 本地 Maven 仓库的定义*


    `<settings>`

    `   <`**`localRepository`**`>D:\MyLocalRepository</`**`localRepository`**`>`

    `   ...`

    `</settings>`


    ### NetBeans IDE 中的 Maven 项目


    NetBeans IDE 默认提供了用于创建 NetBeans Platform 应用程序及其 Maven 和 Ant 模块的不同向导。此外，还提供了有用的功能，例如
    Maven 仓库浏览器。

