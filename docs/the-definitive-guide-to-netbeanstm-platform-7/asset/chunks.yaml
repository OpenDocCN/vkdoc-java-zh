    ### 总结


    NetBeans IDE 的面板模块负责组件的管理和图形显示，以便快速访问。在本章中，你学习了如何在层文件中定义面板条目。此外，你还实现了一个示例，创建了一个表示面板项的具体节点类。在这个示例中，你还看到了为自己的面板项实现拖放支持是多么容易。


