    #### Node Context Menu


    A node provides a context menu to the user over which context-independent actions
    can be provided. A `DataNode` gets its entries or respective actions for its context
    menu by the factory of the data object that is managed by the node. In turn, the
    node class provides the actions via the `getActions()` method. As you already
    learned in [Chapter 7](#Chapter07.html#ch7), it is possible in this respect to
    register actions in the standard folder `Loaders` below a MIME type–specific folder.
    If the MIME type is, for example, `audio/mpeg`, as in [Chapter 7](#Chapter07.html#ch7),
    the actions are registered in `Loaders/audio/mpeg/Actions`. Of course, you can
    use the mechanisms of the Actions API (described in [Chapter 6](#Chapter06.html#ch6))
    for this purpose. The actions are automatically read and added to the context
    menu of the node. To explain this, I will continue with the example of the MP3
    data object from [Chapter 7](#Chapter07.html#ch7). Only the following additional
    annotation is needed to add the action `PlayAction` to the node context menu of
    the `Mp3DataObject`.


    `@ActionReferences({`

    `   ...`

    **`@ActionReference`**`(`

    `      path = "`**`Loaders/audio/mpeg/Actions`**`",`

    `      position = 50, separatorAfter=60)`

    `})`

    `public final class PlayAction implements ActionListener { ...`


    Thus, the play functionality also appears in the context menu of an MP3 file (see
    [Figure 12-3](#Chapter12.html#fig_12_3)). Of course, with the context sensitivity
    implemented in [Chapter 7](#Chapter07.html#ch7) (see also [Chapter 6](#Chapter06.html#ch6)).
    This means if the file is being played, the play action is deactivated in the
    context menu, too.


    ![Image](images/1203.jpg)


    ***Figure 12-3.** Adding actions to the context menu of a node*


    A node delivers the action that is executed when double clicking via the `getPreferredAction()`
    method. If this method is not overridden, the first action of the array is used
    by `getActions()`.


    #### Event Handling


    To react on the events of a node, you can install a `PropertyChangeListener` as
    well as a `NodeListener`. You can use the `PropertyChangeListener` to monitor
    the properties that a node supplies via the `getPropertySet()` method. With the
    `NodeListener` you can be informed about internal node changes such as the name,
    the parent node, and also the child nodes, for example. For this purpose, the
    node class provides a series of public property keys, such as `PROP_NAME` or `PROP_LEAF`.
    The `NodeListener` provides the methods shown in [Table 12-1](#Chapter12.html#tab_12_1).


    ![Image](images/t1201.jpg)


    If you do not want to become informed about or implement all events, you can use
    the adapter class `NodeAdapter` instead of the `NodeListener` interface.


