    the example in [Listing 33-4](#Chapter33.html#list_33_4). However, this section
    will show you how to use and integrate the JAAS API and its configuration in your
    NetBeans Platform application.


    Similar to the JNDI concept, you first need a configuration. JAAS provides such
    a configuration in a certain file structure. This file is typically defined by
    a command-line parameter. It makes sense to pack this file in the module in a
    NetBeans Platform application. Use a variation of the `LoginContext` constructors,
    to which a `ConfigFile` instance can be passed; the configuration file is passed
    to this instance. You can get that `URI` or `URL` with the `getResource()` method.


    The JAAS API provides different login modules for different authentication mechanisms,
    as it does for the LDAP protocol with which you can communicate with your directory
    server. In the configuration file shown in [Listing 33-5](#Chapter33.html#list_33_5)
    which login module is used in which configuration is assigned.


