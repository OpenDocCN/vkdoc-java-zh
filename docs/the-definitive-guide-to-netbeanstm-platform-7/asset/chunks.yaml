    dataObjectClass\"\n                stringvalue=\"com.hboeck.mp3manager.filetype.Mp3DataObject\"\
    />\n          <attr name=\"instanceCreate\"\n                methodvalue=\"org.openide.loaders.DataLoaderPool.factory\"\
    />\n          <attr name=\"mimeType\" stringvalue=\"audio/mpeg\"/>\n        </file>\n\
    \      </folder>\n    </folder>\n  </folder>\n</folder>\n```\n\nThis factory creates\
    \ an `Mp3DataObject` for each MP3 `FileObject`, which consists of the basic structure\
    \ shown in [Listing 44-3](#Chapter44.html#list_44_3).\n\n***Listing 44-3.** Implement\
    \ the Logic of an MP3 File via the Mp3DataObject Class.*\n\n```\nimport java.io.IOException;\n\
    import org.openide.filesystems.FileObject;\nimport org.openide.loaders.DataNode;\n\
    import org.openide.loaders.DataObjectExistsException;\nimport org.openide.loaders.MultiDataObject;\n\
    import org.openide.loaders.MultiFileLoader;\nimport org.openide.nodes.Node;\n\
    import org.openide.nodes.Children;\nimport org.openide.util.Lookup;\n\npublic\
    \ class Mp3DataObject extends MultiDataObject {\n   public Mp3DataObject(FileObject\
    \ pf, MultiFileLoader loader)\n         throws DataObjectExistsException, IOException\
    \ {\n         super(pf, loader);\n      }\n\n      @Override\n   protected Node\
    \ createNodeDelegate() {\n         return new DataNode(this, Children.LEAF, getLookup());\n\
    \      }\n\n      @Override\n   public Lookup getLookup() {\n         return getCookieSet().getLookup();\n\
    \      }\n}\n```\n\nThis class's task is to assign a common `FileObject` with\
    \ logic. Furthermore, the `Mp3DataObject` delivers a node to you. By this node,\
    \ the MP3 file can be simply and comfortably displayed in different views, such\
    \ as the Favorites module or, for example, in a playlist. You implement such a\
    \ playlist later in this chapter. By default, just the `DataNode` class is used.\
    \ In the following section you want to equip the node with special feature and\
    \ then create a special node class that derives from `DataNode`.\n\n![Image](images/square.jpg)\
    \ **Note** When implementing the first module, which uses the MP3 file type and\
    \ therefore must define a dependency on the file type, you will see that this\
    \ is not possible. The reason for this is that all packages of a module are not\
    \ public, by default. This means, you must explicitly define which packages can\
    \ be accessed from outside. You define this in the *Properties* of a module under\
    \ *API Versioning*. The module is only shown in the list if at least one package\
    \ is defined as public and contains modules that another module depends on.\n\n\
    ### ID3 Support\n\nInside an MP3 file, information about the file can be saved\
    \ in an *ID3 tag*, in which you must distinguish between two different versions.\
    \ The ID3v1 tag consists of a fixed number of fields (such as number, artist,\
    \ and title), which each has a fixed size. The most important information, at\
    \ least, can be stored in the file with that tag. The ID3v2 tag introduces a much\
    \ more flexible concept. A much greater number of standardized fields are defined\
    \ and furthermore, multiple customized fields can be added (a field is referred\
    \ to as frame, as well). Nonetheless, the tag can also be read by applications\
    \ that do not know about or interpret this field. The frames of an ID3v2 tag may\
    \ vary in length. Also, a frame will only exist in a file if it is required, which\
    \ means there are no empty frames."
  raw: '#### Registering the MP3 Plugin


    Bear in mind that the MP3 plugin is not immediately provided to the JMF; you must
    register this plugin at the `PlugInManager` of the JMF so it can be used. Pass
    the task to a *Module* *Installer* (you can find more about this in [Chapter 3](#Chapter03.html#ch3))
    in order to ensure that the plugin is always registered. The module installer
    is executed when loading the JMF plugin. Create the module installer via *File
    ![Image](images/U001.jpg) New File ![Image](images/U001.jpg) Module Development
    ![Image](images/U001.jpg) Installer / Activator*. Press *Finish* in the dialog
    that appears to create the installer. You implement the necessary registration
    for the `PlugInManager` in the `restored()` method. You must indicate the plugin''s
    class, the input and output formats, and the plugin''s type. Of course, in this
    case it is a codec plugin. Next, insert the following lines as shown in [Listing
    44-1](#Chapter44.html#list_44_1).


    ***Listing 44-1.** Registering the MP3 Plugin at the JMF Plugin Manager During
    Startup*


    `package` **`javax.media`**`;`

    `import javax.media.format.`**`AudioFormat`**`;`

    `import org.openide.modules.`**`ModuleInstall`**`;`


    `public class` **`Installer`** `extends ModuleInstall {`

    `public void` **`restored`**`() {`

    `      Format input1 = new AudioFormat(`**`AudioFormat.MPEGLAYER3`**`);`

    `      Format input2 = new AudioFormat(`**`AudioFormat.MPEG`**`);`

    `      Format output = new AudioFormat(`**`AudioFormat.LINEAR`**`);`

    **`PlugInManager`**`.addPlugIn(`

    `              "`**`com.sun.media.codec.audio.mp3.JavaDecoder`**`",`

    `              new Format[]{input1, input2},`

    `              new Format[]{output},`

    **`PlugInManager.CODEC`**`);`

    `   }`

    `}`


    #### MP3 File Type


    Another important base for easy-to-use and professional management of MP3 files
    within your application is a so-called MP3 file type. A *file type* is a concept
    of the NetBeans Platform which is used to manage files of a particular type. It
    consists of three main parts. First, there is a `FileObject`, which basically
    represents a wrapper for a `File`. Thus, it represents the concrete physical MP3
    file. Based on this, there is a `DataObject`, which extends the `FileObject` by
    properties and functionalities in a flexible manner. The third component is a
    `Node` object, which is used to graphically represent a `DataObject` at the user
    interface that includes the ability to accept actions. More information related
    to this can be found in the [Chapters 7](#Chapter07.html#ch7) and [12](#Chapter12.html#ch12).


    Normally, the MP3 file type belongs to the core functionality of your MP3 manager,
    which means you could manage the MP3 file type in the Core module. For more flexibility
    and to avoid cyclic dependencies, however, you should create a separate module
    for the MP3 file type. To do this, call *File ![Image](images/U001.jpg) New Project...
    ![Image](images/U001.jpg) NetBeans Modules ![Image](images/U001.jpg) Module*.
    Assign *File Type* as name and `com.hboeck.mp3manager.filetype` as code name base.
    You can leave the remaining values. Clicking the *Finish* button closes the wizard
    and creates the module.


    The components of a file type are created completely by the file type wizard which
    in turn is provided by the IDE. Call this wizard via *File ![Image](images/U001.jpg)
    New File ![Image](images/U001.jpg) Module Development ![Image](images/U001.jpg)
    File Type*. You use `audio/mpeg` as MIME type for MP3s, and of course, assign
    `mp3` for the extension. On the next page, you enter `Mp3` as the prefix for the
    class to create, and you can select an icon for this file type. Now all the required
    information is collected, and the MP3 file type can be created by clicking *Finish*.


    The wizard registers a data object factory for the MP3 MIME type which is responsible
    for loading an `Mp3DataObject`. (See [Listing 44-2](#Chapter44.html#list_44_2).)


    ***Listing 44-2.** Each Data Object Factory Is Responsible for a Certain File
    Type and Is Served by the NetBeans Platform. This Is Why It Must Be Registered.*


    `<folder name="Loaders">`

    `  <folder name="`**`audio`**`">`

    `    <folder name="`**`mpeg`**`">`

    `      <folder name="Factories">`

    `        <file name="`**`Mp3DataLoader.instance`**`">`

    `          <attr name="SystemFileSystem.icon"`

    `                urlvalue="nbresloc:/com/hboeck/mp3manager/filetype/mp3.png"/>`

    `          <attr name="`**`dataObjectClass`**`"`

    `                stringvalue="com.hboeck.mp3manager.filetype.`**`Mp3DataObject`**`"/>`

    `          <attr name="instanceCreate"`

    `                methodvalue="org.openide.loaders.DataLoaderPool.factory"/>`

    `          <attr name="mimeType" stringvalue="audio/mpeg"/>`

    `        </file>`

    `      </folder>`

    `    </folder>`

    `  </folder>`

    `</folder>`


    This factory creates an `Mp3DataObject` for each MP3 `FileObject`, which consists
    of the basic structure shown in [Listing 44-3](#Chapter44.html#list_44_3).


    ***Listing 44-3.** Implement the Logic of an MP3 File via the Mp3DataObject Class.*


    `import java.io.IOException;`

    `import org.openide.filesystems.FileObject;`

    `import org.openide.loaders.DataNode;`

    `import org.openide.loaders.DataObjectExistsException;`

    `import org.openide.loaders.MultiDataObject;`

    `import org.openide.loaders.MultiFileLoader;`

    `import org.openide.nodes.Node;`

    `import org.openide.nodes.Children;`

    `import org.openide.util.Lookup;`


    `public class` **`Mp3 DataObject`** `extends` **`MultiDataObject`** `{`

    `public` **`Mp3DataObject`**`(FileObject pf, MultiFileLoader loader)`

    `      throws DataObjectExistsException, IOException {`

    `      super(pf, loader);`

    `   }`


    `   @Override`

    `protected Node` **`createNodeDelegate`**`() {`

    `      return new DataNode(this, Children.LEAF, getLookup());`

    `   }`


    `   @Override`

    `public Lookup` **`getLookup`**`() {`

    `      return getCookieSet().getLookup();`

    `   }`

    `}`


    This class''s task is to assign a common `FileObject` with logic. Furthermore,
    the `Mp3DataObject` delivers a node to you. By this node, the MP3 file can be
    simply and comfortably displayed in different views, such as the Favorites module
    or, for example, in a playlist. You implement such a playlist later in this chapter.
    By default, just the `DataNode` class is used. In the following section you want
    to equip the node with special feature and then create a special node class that
    derives from `DataNode`.


    ![Image](images/square.jpg) **Note** When implementing the first module, which
    uses the MP3 file type and therefore must define a dependency on the file type,
    you will see that this is not possible. The reason for this is that all packages
    of a module are not public, by default. This means, you must explicitly define
    which packages can be accessed from outside. You define this in the *Properties*
    of a module under *API Versioning*. The module is only shown in the list if at
    least one package is defined as public and contains modules that another module
    depends on.


    ### ID3 Support


    Inside an MP3 file, information about the file can be saved in an *ID3 tag*, in
    which you must distinguish between two different versions. The ID3v1 tag consists
    of a fixed number of fields (such as number, artist, and title), which each has
    a fixed size. The most important information, at least, can be stored in the file
    with that tag. The ID3v2 tag introduces a much more flexible concept. A much greater
    number of standardized fields are defined and furthermore, multiple customized
    fields can be added (a field is referred to as frame, as well). Nonetheless, the
    tag can also be read by applications that do not know about or interpret this
    field. The frames of an ID3v2 tag may vary in length. Also, a frame will only
    exist in a file if it is required, which means there are no empty frames.'
