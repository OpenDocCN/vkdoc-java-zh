    contexts. You learned how easy it is to register and assign actions with annotations.


    ## C H A P T E R  7


    ## Data and Files


    The NetBeans Platform provides a very substantial concept for creating, managing,
    manipulating, and presenting data. This concept mainly embraces the File Systems
    API and the Data Systems API. Additionally, there is the Nodes API and the Explorer
    API. Each of these APIs is located on its own abstraction level. This system can
    be divided into four levels together with the concrete data outside the NetBeans
    Platform application, as shown in [Figure 7-1](#Chapter07.html#fig_7_1).


    ![Image](images/0701.jpg)


    ***Figure 7-1.** Architecture for managing data and files within the NetBeans
    Platform*


    A data system is initially abstracted using the `FileSystem` class. Doing so,
    the physical data, which lie below, can be present in any form. The `FileSystem`
    class lets users address physical data from different sources in the same way—for
    example, a local file system, a file system in the form of an XML file (similar
    to how the System Filesystem is built, too) or a JAR file. Only an implementation
    of the abstract `FileSystem` class has to be provided in the desired form. This
    way, the File Systems API abstracts from the concrete data and provides it within
    the application in a virtual file system. Thus access is possible independent
    from the origin of the data. The abstracted data on the abstraction layer in the
    form of a `FileObject` class do not have information yet about what kind of data
    to manage. So this layer does not contain data-specific logic. Building upon this
    layer, there is the Data Systems API in the logical layer. There are objects,
    which represent the data of a very specific type. These objects build upon the
    `DataObject` class. For each of the desired data types there exists a `DataObject.Factory`
    which is responsible for creating objects. The NodesAPI is the top layer in this
    concept (it is on the presentation layer). So a node is responsible for the type-specific
    representation of data. In this respect, a `Node` represents a `DataObject`, which
    itself is responsible for creating the node. In [Chapter 12](#Chapter12.html#ch12),
    I will explain in detail how to represent your data by means of nodes and the
    explorer.


    ### File Systems API


    The NetBeans Platform provides transparent access to files and folders by means
    of the File Systems API*.* In this process, access is very abstract; it works
    the same way, whether the data are present, for example, as a virtual XML file
    system (such as the System Filesystem), or if they are in a JAR archive or  a
    normal directory. The general interfaces of a file system are described in the
    abstract class `FileSystem`. The abstract class `AbstractFileSystem` implements
    some of the tasks of a file system.  Thus it is helpful as a base class for special
    file system implementations. The concrete implementation `LocalFileSystem`, `JarFileSystem`,
    and `XMLFileSystem` derive from this class. The class `MultiFileSystem` represents
    a proxy for multiple file systems; it is mostly used as a base class. The file
    system class hierarchy is shown in [Figure 7-2](#Chapter07.html#fig_7_2).


    ![Image](images/0702.jpg)


    ***Figure 7-2.** Class hierarchy of the file systems*


    ### The File Object


    Files within a filesystem—directories and files—are represented by the class `FileObject`.This
    is an abstract wrapper class for the `File` class of the Java Platform. The implementation
    of a `FileObject` is provided by the concrete file system. Apart from the standard
    file operations, the class `FileObject` also provides the possibility of supervising
    changes of files or directories. The following sections will describe the operations
    of the class `FileObject`.'
