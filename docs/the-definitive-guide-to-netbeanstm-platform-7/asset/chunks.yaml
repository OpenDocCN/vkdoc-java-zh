- fmt: '### Creating a NetBeans Platform Application


    First of all, you can create a NetBeans Platform application with *File* → *New
    Project…* → *Maven* → *NetBeans Application*. Please note that the project name
    must not contain spaces, because it is used as `artifactId` in the POM file. Spaces
    are not allowed for the `artifactId`, because of the located artifacts in a repository,
    but you can give an alternate display name in `<name>`. Furthermore, you assign
    a `groupId` (reverse DNS format like Java packages) and a `version`. The final
    step of the wizard is to choose the NetBeans version which your application will
    be based on. A dependency is automatically set in the POM file on the referring
    cluster so that the Platform modules are included. Furthermore, it is possible
    to set whether OSGi bundles will be added as dependencies and whether a first
    module project will be set directly with the Platform application. Finish the
    following wizard and you will get the application structure shown in [Figure 37-2](#Chapter37.html#fig_37_2).


    ![Image](images/3702.jpg)


    ***Figure 37-2.** Maven-based NetBeans Platform application project in the NetBeans
    IDE project''s view*


    What is striking at first sight is that the actual NetBeans Platform application
    project does not just consist of one, but three (or four, if you select the option
    to add a sample module) parts. These are named *NB App*, *NB App Branding*, and
    *NB App Branding*. These parts have the following tasks:


    - *NB App*: This project determines which components belong to the application,
    which means dependencies on the NetBeans Platform cluster, on the branding module,
    and on the application module *MyModule* are defined in the file `pom.xml`. Start
    your application with *Run* in the context menu of this project.

    - *NB App Branding*: With this part of the project, branding resources, meaning
    the adapted texts and icons, are managed and created as branding modules. You
    can open the branding dialog with the context menu of this project.

    - *NB App Parent*: This is the actual container project for the whole application.
    That means the POM file of this project is the parent POM file for both the two
    modules which were described before, and for all further application modules.
    This is where the aggregation of all modules occurs by the `modules` attribute.
    Call *Build* in the context menu of this project for creating the whole application.
    This way, all affiliated modules are created.


    ### Creating NetBeans Platform Modules


    You can create a new Maven application module analogous with *File* → *New Project…*
    → *Maven* → *NetBeans Module*. To add a new module from an existing Platform application,
    just choose the basic directory of the desired application creating the module.
    This is the level on which the parent POM file is located. The module is automatically
    added to the parent POM file. A referring `parent` entry is added to the module
    POM file, too. This way, it also inherits the configuration of the Platform application.


    ### Adding Dependencies


    Finally, I will show you how to add a dependency to a module. To do this, call
    the entry *Add Dependency* in the context menu of the *Dependencies* node. You
    can add the dependency in the referring dialog either directly by defining the
    artifact ID, group ID, and version, or by choosing an open project (see [Figure
    37-3](#Chapter37.html#fig_37_3)). The search function includes the defined Maven
    repositories. This way you can add a dependency on a module of the NetBeans Platform,
    for example. However, that also means that you can only search for modules that
    are already installed in a repository. So, if you want to define a dependency
    on a module that is part of your application but not yet created, you have to
    take the way over *Open Projects*.


    ![Image](images/3703.jpg)


    ***Figure 37-3.** Adding a dependency to a Maven-based NetBeans Platform module*


    It is even easier to find modules over the Maven repository browser (see [Figure
    37-4](#Chapter37.html#fig_37_4)). Open it with *Window* → *Other* → *Maven Repository
    Browser*. This is where you can add repositories. In those repositories you can
    search and browse. You can add a module as a dependency (in a special version)
    with *Add as Dependency* in the context menu of a module.


    ![Image](images/3704.jpg)


    ***Figure 37-4**. Maven Repository Browser*


    ## Maven Projects Without NetBeans IDE


    In the previous section you used the NetBeans IDE to create NetBeans Platform
    Maven projects. Since the NetBeans IDE actually just transfers parameters of the
    GUI to Maven you can also use Maven directly. Next, I will show you in detail
    how to use the NetBeans Maven plugins creating a NetBeans Platform application.


    Some preconditions have to be fulfilled before starting with setting a first Maven
    project:


    1. In case you have not yet installed Maven, you can download the latest version
    from *[http://maven.apache.org](http://maven.apache.org)*. You just have to unpack
    the downloaded package and store it in a suitable directory.

    2. Then create the environment variable `M2_HOME`, which should point to the basic
    directory of the Maven distribution. *(C:\Program Files\apache-maven-3.0.3*, for
    example).

    3. Furthermore, the environment variable `JAVA_HOME` should be set, which points
    to the JRE directory *( C:\Program Files\Java\jdk1.6.0_24\*, for example).

    4. Finally, add the directory to the path variable. This way, Maven can be called
    in without indicating a path in the command line.


    Now you are ready to start and create a Maven-based NetBeans Platform application,
    as described next.'
