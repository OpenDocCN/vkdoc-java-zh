- fmt: 'A module is described by its manifest file''s data together with the data
    specified in related XML files and therefore does not need to be explicitly added
    to the NetBeans Platform. Using XML files, the NetBeans Platform knows the modules
    that are available to it, as well as their locations and the contracts that need
    to be satisfied for them to be allowed to be loaded. These dependencies are declared
    in the module''s manifest file and resolved by the NetBeans runtime container,
    ensuring that the application always starts up in a consistent state. The NetBeans
    Platform itself is formed from a group of core modules (see [Figure 2-2](#Chapter02.html#fig_2_2)),
    which are needed for starting the application and for defining its user interface.
    To this end, the NetBeans Platform makes many API modules and service provider
    interface (SPI) modules available, simplifying the development process considerably.
    Included in this group (shown in [Figure 2-2](#Chapter02.html#fig_2_2)) are, for
    example, the Actions API, which makes available the often needed action classes;
    the powerful Nodes API; and the Options SPI, which helps your own options dialogs
    to be easily integrated into the application. In addition to these, there are
    also complete reusable components in the NetBeans Platform, such as the Output
    Window and the Favorites module.


    ![Image](images/0202.jpg)


    ***Figure 2-2.** NetBeans Platform architecture*


    ### NetBeans Platform Distribution


    Normally you do not need to separately download a distribution of the NetBeans
    Platform, because the NetBeans Platform is already a basic part of the NetBeans
    IDE, which is a rich client application itself. Developing your application in
    the NetBeans IDE, the Platform is extracted from the NetBeans IDE. However, there
    is the possibility of also adding multiple NetBeans Platforms to the NetBeans
    IDE. To that end, you can download a separate distribution of the NetBeans Platform
    from the official site, at [`http://netbeans.org/features/platform`](http://netbeans.org/features/platform).


    Now let''s take a closer look at the important parts of the NetBeans Platform
    distribution:


    *   The modules `org.netbeans.bootstrap`, `org.netbeans.core.startup`, `org-openide-filesystems`,
    `org-openide-modules`, `org-openide-util`, and `org-openide-util-lookup` comprise
    the NetBeans runtime container, which is the core of the platform and is responsible
    for the development of all other modules.

    *   The NetBeans Platform also supports OSGi technology. The modules needed for
    this are `org.netbeans.libs.felix`, `org.netbeans.core.osgi`, `org.netbeans.core.netigso`,
    and `org.netbeans.libs.osgi`.

    *   The modules `org-netbeans-core`, `org-netbeans-core-execution`, `org-netbeans-core-ui`,
    and `org-netbeans-core-windows` provide basic functionalities for the API modules.

    *   `org-netbeans-core-output2` is a complete application module which can be
    used as a central output window.

    *   The module `org-netbeans-core-multiview` is a framework for MultiView Windows,
    (e.g., the form editor window) and provides an API for it.

    *   The module `org-openide-windows` contains the Window System API, which is
    the API that is probably used most. It includes basic classes for developing windows
    and the windows manager, among others. From the windows manager you can access
    information about all existing windows.

    *   The update functionality of an application is implemented by the module `org-netbeans-modules-autoupdate-services`.
    This module provides the complete functionality for finding, downloading, and
    installing modules. The module `org-netbeans-modules-autoupdate-ui` provides the
    Plugin Manager, which enables the user to manage and control modules and updates.

    *   With the `org-netbeans-modules-favorites` module you can display random data
    and directory structures and thereby influence their actions via the Data Systems
    API.

    *   The `org-openide-actions` module provides a set of frequently used actions,
    such as copy, cut, and print. The functionality of these actions can be implemented
    in a context-sensitive manner.

    *   A very powerful module is `org-openide-loaders`, which contains the Data Systems
    API. This can be used to create dataloaders that can be linked with certain types
    of files and then create data objects for it. A special behavior can be added
    to these data objects in a simple way.

    *   The Nodes API of the module `org-openide-nodes` is a very central feature
    of the NetBeans Platform. Nodes can, for example, be displayed in an explorer
    view; by doing so, nodes can provide actions and property sheets for data objects.

    *   The `org-openide-explorer` module provides a framework to develop explorer
    views as used, for example, in the projects or file view of the NetBeans IDE.

    *   The `org-netbeans-modules-editor-mimelookup` module provides an API to find
    MIME type–specific settings, services, and other objects, such as an SPI to implement
    your own MIME type–specific data provider. The `org-netbeans-modules-editor-mimelookup-impl`
    module is a special implementation of this SPI which is responsible for finding
    objects in the directory structure of the System Filesystem.

    *   `org-netbeans-modules-javahelp` contains the JavaHelp runtime library and
    provides an implementation to the modules API, which makes it possible for application
    modules to integrate their own helpsets by means of the JavaHelp technology.

    *   The QuickSearch SPI for implementing and providing your own providers is located
    in the module `org.netbeans.spi.quicksearch`.

    *   The master filesystem module `org-netbeans-modules-masterfs` provides an important
    wrapper filesystem.

    *   The module `org-netbeans-modules-options-api` provides an option dialog and
    an SPI, making it easy to add your own option panels.

    *   Long-running tasks can be managed centrally by the module `org-netbeans-api-progress`.
    The module `org-netbeans-modules-progress-ui` provides a visualization of this
    with which it is possible to stop separate tasks.

    *   `org-netbeans-modules-queries` provides a general query API with which modules
    can query information about files. An SPI is also provided to supply your own
    query implementations.

    *   `org-netbeans-modules-sendopts`, this module provides a *Command Line Parsing
    API* and an SPI with which your own handlers can become registered for command
    lines.

    *   The `org-netbeans-modules-settings` module provides an API to save module-specific
    settings in a user-defined format. It also provides several useful setting formats.

    *   The `org-openide-awt` module includes the *UI Utilities API*, by which the
    different help classes for creating the user interface are provided.

    *   In the module `org-openide-dialogs` an API for displaying standard and application-specific
    dialogs is provided. The Wizard Framework is located in this module.

    *   `org-openide-execution` provides an API for executing long-running asynchronous
    tasks.

    *   `org-openide-io` provides an API and an SPI for the input and output of files.
    This module also provides a standard implementation with which you can write on
    the Output Window module.

    *   The Text API in the module `org-openide-text` provides an extension of the
    `javax.swing.text` API.

    *   The modules `org-netbeans-swing-plaf` and `org-netbeans-swing-tabcontrol`
    are responsible for the adaptation of the look and feel and displaying the tabs.
    The module `org-jdesktop-layout` is a wrapper module of the Swing layout extenstion
    library.

    *   The Visual Library API is provided by the module `org-netbeans-api-visual`.


    Furthermore, it is possible to add modules out of the IDE distribution to the
    listed modules.'
