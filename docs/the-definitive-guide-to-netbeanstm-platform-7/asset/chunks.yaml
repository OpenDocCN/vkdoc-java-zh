    ## C H A P T E R  12


    ## Nodes and Explorer


    In [Chapter 7](#Chapter07.html#ch7) you learned that the NetBeans Platform provides
    a very substantial concept for creating, managing, editing, and presenting data.
    You then looked at  the File Systems API and the Data Systems API*.* This chapter
    is about the presentation of data in the form of nodes. Nodes can be provided
    with actions and displayed in an explorer view. So, a node is responsible for
    the type-specific representation of the data. In this context, a `Node` represents
    a `DataObject` that is itself responsible for creating the nodes (see [Chapter
    7](#Chapter07.html#ch7)).


    ### Nodes API


    The *Nodes API* is the third and uppermost layer in the NetBeans Resource Management
    System. In this context, the role of the Nodes API is the visual representation
    of data. Closely connected to this API is the *Explorer API*, which is used for
    displaying and managing nodes. A node is used to present data to the user interface
    of an application, as well as to give the user actions, functionalities, and properties
    for interacting with underlying data. However, a node does not need to merely
    present data, but can also be used for many other things as well. For example,
    an action hiding beneath a node could be invoked when the node is double-clicked.
    Besides, a node is not typically concerned with business logic, but focuses on
    providing a presentation layer, delegating user interaction to action classes
    and, where applicable, to its related data object.


    #### Node Classes


    The general interfaces and features are described by the abstract base class `Node`
    (see [Figure 12-1](#Chapter12.html#fig_12_1)). All subclasses of `Node` can be
    managed and displayed in an explorer view, the possibilities for which are covered
    in the “Explorer API” section.


    ![Image](images/1201.jpg)


    ***Figure 12-1.** Hierarchy of the node base classes*


    The two classes `AbstractNode` and `FilterNode` derive from `Node`. The class
    `AbstractNode` represents the simplest form of a node by providing the abstract
    methods of the base class with a standard implementation. So, starting from this
    class, you can directly create an instance. A proxy node can be realized by the
    class `FilterNode` that delegates its method calls to the original node. This
    kind of node is typically used when a data set will be visualized at multiple
    positions. The class `BeanNode` is used for representing a JavaBean. The child
    element of the node can be classified with an `Index` via the class `IndexedNode`.
    Finally, there is also the subclass `DataNode` which is the most commonly used;
    with this kind of node, data objects are represented. In the simplest case, this
    class is used directly; this was also the case in [Chapter 7](#Chapter07.html#ch7)
    with the MP3 file type. This class is instantiated by the method `createNodeDelegate()`
    of the `Mp3DataObject`. This object is responsible for providing the corresponding
    node itself.


    Besides the reference to the data object, the Lookup of the `Mp3DataObject` is
    also passed to the constructor. With this Lookup, a data object can, in a way,
    provide its actions to the user or bring its actions to the surface. For example,
    an action that is executed on the node gets the features of the node via the `getLookup()`
    method and thus gets the Lookup of the data object below. So, the node just forwards
    the Lookup. However, a node itself —as well as a data object—can possess and provide
    functionalities in the form of context interfaces. These functionalities are associated—exactly
    as with the data object—by the node via `getCookieSet().assign()` and also called
    from outside via the `getLookup()` method. In this case, no Lookup must be passed
    to the node constructor, because the constructor uses its own Lookup.


    If a node will not display a data object, but something special—as, for example,
    with a root node—you create your own node class that directly derives from `AbstractNode`.
    Using this base class, you also implement the folder nodes in the subsequent example.


    #### Node Container


    Each node has its own `Children` object, representing a container for child nodes,
    which are the node''s subnodes. In this context, the container is responsible
    for adding, deleting, and structuring the child nodes. Each node that is located
    in this container gets the node (the owner of the container) as parent. For those
    nodes that do not have child nodes—as, in this case, the `DataNode` of the `Mp3DataObject`—
    an empty container can be passed via `Children.LEAF`. There are multiple variants
    of the abstract base class `Children`. Usually, you should not derive from this
    base class. The most common class is the `Children.Keys<T>` class, where mostly
    a one-to-one relationship is given between key and node. In the example shown
    in [Figure 12-2](#Chapter12.html#fig_12_2) the key for a node is a file object.
    However, you do not directly use the class, but instead derive from the class
    `ChildFactory` and create a `Children` object via the factory method `Children.create()`.
    This enables you to simply create the child nodes in the background (if, for example,
    it would otherwise block the GUI for too long).


    ![Image](images/1202.jpg)


    ***Figure 12-2.** Hierarchy of the different children container classes*'
