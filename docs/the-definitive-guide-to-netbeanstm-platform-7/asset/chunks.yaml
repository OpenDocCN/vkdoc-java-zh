    ### 打开帮助系统


    如果你想自行调用帮助系统，可以通过 Lookup 进行访问。其中注册了一个 `Help` 类的实现（参见清单 16-13）。


    ***清单 16-13.** 调用关于特定主题的帮助系统*


    **`Help`** `h = Lookup.getDefault().lookup(`**`Help.`**`class);`

    `if(h != null)`

    `   h`**`.showHelp`**`(new HelpCtx("`**`com.galileo.netbeans.module.about`**`"));`

    `   // h.showHelp(HelpCtx.DEFAULT_HELP);`


    你将一个代表帮助页面的 `HelpCtx` 实例传递给 `showHelp()` 方法。将你在映射文件中确定的所需帮助页面的 ID 传递给构造函数。如果你想打开显示默认帮助页面的帮助窗口，可以使用
    `HelpCtx.DEFAULT_HELP`。


    ### 总结


    在本章中，你学习了如何使用基于标准 JavaHelp 框架的 NetBeans 平台帮助系统。我们探讨了如何创建自己的帮助集以及如何在帮助页面中插入链接。本章你学到的一个重要内容是，如何创建上下文相关的帮助。


    ## 第 17 章


    ## 输出窗口


    NetBeans 平台提供了*输出窗口*模块，作为一个舒适且实用的显示区域，用于向用户显示消息。多个不同的输出可以在不同的标签页中并行输出。输出窗口与 NetBeans
    平台的 I/O API 紧密相连。因此，标准的 I/O 提供程序实现会将其输出重定向到输出窗口。（参见图 17-1。）


    ![图片](img/1701.jpg)


    ***图 17-1.** 输出窗口*


    ### 生成输出


    首先，在 NetBeans 平台应用程序的属性中，在 *属性 ![图片](img/U001.jpg) 库* 下，确保 *输出窗口* 和 *I/O API*
    这两个模块在 *平台* 集群中被激活，这样该模块才可供你使用，因为你只能在此处激活模块后才能定义对它们的依赖关系。现在，你必须在想要使用输出窗口的模块中定义对
    I/O API 模块的依赖关系。为此，打开你的模块的 *属性*，并在 *库* 下通过 *添加依赖项…* 按钮添加 I/O API 模块作为依赖项。然后，你的输出可能如清单
    17-1 所示。


    ***清单 17-1.** 使用输出窗口模块*


    `InputOutput io =` **`IOProvider.getDefault().getIO`**`("Task", true);`

    `io.`**`getOut`**`().println("信息消息");`

    `io.`**`getErr`**`().println("错误消息");`

    `io.getOut().close();`

    `io.getErr().close();`


    你通过 Lookup 上的 `IOProvider.getDefault()` 方法获取位于输出窗口中的 `IOProvider` 服务的服务提供者。如果输出窗口模块（以及服务提供者）不存在，`getDefault()`
    方法将提供一个标准实现，该实现会将输出写入标准输出。因此，输出窗口是作为全局服务实现的。（更多信息请参见第 5 章。）因此，输出窗口可以很容易地被你自己的窗口替代，而无需修改源代码。`getIO()`
    方法返回一个 `InputOutput` 对象，你可以通过它访问窗口。你可以定义一个显示在标签页或标题中的名称。通过 `boolean` 参数，你可以决定是创建一个新标签页，还是重用已存在的同名标签页。通过
    `getOut()` 和 `getErr()` 方法，你可以获得一个 `OutputWriter` 类的对象。该类是 Java `PrintWriter`
    类的子类。因此，你可以像往常一样使用 `println()` 输出消息。通过 `getErr()` 输出的文本在输出窗口中显示为红色。重要的是，当你完成所有输出后，必须使用
    `close()` 方法再次关闭流。这样，原本以粗体显示的标签页名称会恢复正常显示，向用户表明任务已完成。如果显示了多个任务，你可以通过 `InputOutput.select()`
    方法确保相应的任务处于活动状态。


    你可以通过菜单项 *窗口 ![图片](img/U001.jpg) 输出 ![图片](img/U001.jpg) 输出* 在你的应用程序中打开输出窗口。此菜单项由输出窗口模块添加。输出窗口提供了一个上下文菜单，例如，你可以使用它在输出中搜索，或删除某个标签页中的输出。


    ### 添加操作


    输出窗口包含一个工具栏，你可以在上面放置自己的操作。例如，在图 17-1 中有四个 Ant 特定的操作。为此，`getIO()` 方法有一个变体，它接受一个类型为
    `Action` 的数组作为第二个参数。因此，可以传递非常简单的操作类，这些类只需实现 Java `Action` 接口即可。重要的是，你的操作类需要通过属性
    `Action.SMALL_ICON` 定义一个可以在工具栏中显示的图标。接下来，你将看到一个此类操作的示例类，它派生自已经实现了 `Action` 接口的
    `AbstractAction` 类。你在构造函数中创建一个 `ImageIcon`，并将其设置为 `SMALL_ICON` 属性。


    `public class StopTask extends` **`AbstractAction`** `{`

    `   public StopTask() {`

    `      putValue(`**`SMALL_ICON`**`, ImageUtilities.loadImageIcon("icon.gif", true));`

    `   }`

    `   public void actionPerformed(ActionEvent evt) {`

    `      // 停止任务`

    `   }`

    `}`


    现在，你将一个包含 `StopTask` 类实例的数组作为第二个参数传递给 `getIO()` 方法。


    `InputOutput io = IOProvider.getDefault().`**`getIO`**`("Task",` **`new Action[]{new
    StopTask()}`**`);`


    ### 插入/显示超链接


    你可以通过前面描述的 `getOut()` 和 `getErr()` 方法访问输出窗口。为此，这些方法返回一个 `OutputWriter` 实例。该类代表了
    Java 平台 `PrintWriter` 类的一个扩展。它指定了两个额外的 `println()` 方法，用于在输出窗口中显示超链接。为此，需要将文本作为
    `String` 对象和一个 `OutputListener` 实例传入。该监听器负责执行点击链接时要执行的操作。


    在清单 17-2 中，你通过 `getOut()` 方法访问相应的 `OutputWriter` 实例。如前所述，`println()` 方法获取链接的名称和一个监听器。


    ***清单 17-2.** 在输出窗口中创建超链接*


    `InputOutput io = IOProvider.getDefault().getIO("Task", true);`

    **`OutputWriter`** `ow =` **`Io.getOut()`**`;`

    `try {`

    `   ow.`**`println`**`("我的链接", new MyHyperlinkListener());`

    `} catch (IOException ex) {`

    `   Exceptions.printStackTrace(ex);`

    `}`


    你可以使用 `OutputListener` 接口实现一个相应的监听器，如清单 17-3 所示。


    ***清单 17-3.** 用于响应输出窗口中超链接的监听器*


    `import org.openide.windows.OutputEvent;`

    `import org.openide.windows.OutputListener;`


    `public class MyHyperlinkListener implements` **`OutputListener`** `{`


    `   @Override`

    `   public void outputLineSelected(OutputEvent ev) {`

    `      // 选择链接/行时的操作`

    `   }`


    `   @Override`

    `public void` **`outputLineAction`**`(OutputEvent ev) {`

    `      // 点击链接时的操作`

    `   }`


    `   @Override`

    `   public void outputLineCleared(OutputEvent ev) {`

    `      // 删除链接/行时的操作`

    `   }`

    `}`


    如你在清单 17-3 中所见，你必须实现三个方法。你不仅需要响应点击操作，还必须响应选择和删除链接的操作。如果你需要在监听器内访问某个特定对象，只需创建一个相应的构造函数，并在添加链接或监听器时将要访问的对象传递给它即可。

