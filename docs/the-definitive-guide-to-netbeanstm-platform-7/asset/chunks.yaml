    `      <folder name="mpeg">`

    `         <folder name="`**`Factories`**`">`

    `            <file name="`**`Mp3DataLoader`**`.instance">`

    `               <attr name="`**`SystemFileSystem.icon`**`" urlvalue=`

    `                "nbresloc:/com/galileo/netbeans/module/mp3.png"/>`

    `               <attr name="`**`dataObjectClass`**`" stringvalue=`

    `                "com.galileo.netbeans.module.`**`Mp3DataObject`**`"/>`

    `               <attr name="`**`instanceCreate`**`" methodvalue=`

    `                "org.openide.loaders.DataLoaderPool.factory"/>`

    `               <attr name="`**`mimeType`**`" stringvalue="`**`audio/mpeg`**`"/>`

    `            </file>`

    `         </folder>`

    `      </folder>`

    `   </folder>`

    `</folder>`


    在标准文件夹 `Loaders` 下，根据定义的 MIME 类型（本例中为 `audio/mpeg`）创建子文件夹。在这些子文件夹下是标准文件夹 `Factories`，我们的特殊数据对象工厂以名称
    `Mp3DataLoader.instance` 在其中注册。通过属性 `SystemFileSystem.icon` 指定了此文件类型的图标。通过属性 `mimeType`
    和 `dataObjectClass`，你可以确定工厂应为哪种数据类型生成哪种数据对象类型。这意味着，这里只确定了 MIME 类型，而不是文件后缀。此确定也在层文件的标准文件夹
    `Services/MIMEResolver` 中进行。最后，通过方法 `DataLoaderPool.factory()` 创建了现已注册的、用于你的 `Mp3DataObject`
    类的特殊工厂。


    当你在本章开头创建 MP3 文件类型时，NetBeans 向导除了创建 `Mp3DataObject` 类之外，还创建了文件 *Mp3Resolver.xml*。此文件确定文件扩展名
    *.mp3* 被分配给 MIME 类型 `audio/mpeg`（参见清单 7-8）。


    ***清单 7-8.** MIME 解析器文件*


    `<!DOCTYPE MIME-resolver PUBLIC`

    `   "-//NetBeans//DTD MIME Resolver 1.0//EN"`

    `   "http://www.netbeans.org/dtds/mime-resolver-1_0.dtd">`

    `<MIME-resolver>`

    `   <file>`

    `      <ext name="mp3"/>`

    `      <resolver mime="audio/mpeg"/>`

    `   </file>`

    `</MIME-resolver>`


    此文件也在层文件中注册。为此，使用了前面提到的标准文件夹 `Services/MIMEResolver`，如清单 7-9 所示。


    ***清单 7-9.** MIME 类型的注册*


