    a *Primary* *Panel* (with or without secondary panels) or a *Secondary* *Panel*
    and indicate the data the wizard needs. Finally, the wizard creates the panel
    and registers it via an annotation.


    ![Image](images/2002.jpg)


    ***Figure 20-2.** NetBeans wizard for creating options panels*


    A panel consists of a view and a controller. The view is responsible for providing
    the GUI and for loading and saving the data. The controller creates the view and
    at the same time is a broker between the options dialog and the view. The panel,
    meaning the view, is derived from the `JPanel` class. You can arbitrarily place
    your components, with which the options are displayed and set, on this panel.
    [Listing 20-1](#Chapter20.html#list_20_1) uses two text fields. You save and load
    the value of these fields via the Preferences API (see the “Managing Settings”
    section) in the methods `store()` and `load()`, which are called by the controller
    when opening and closing the panel.


    The options dialog can only be closed by the user when the appropriate settings
    haven been selected. Therefore, a panel must inform the option dialog about its
    state, either valid or invalid. Implement validation via the `valid()` method.
    In this example, for example, you want to make sure the user enters a value in
    the first field, so you add a `DocumentListener` to the `option1` text field.
    Now, each time the user makes an entry in the first text field, the controller
    is informed via `Controller.changed()`, which in turn calls the `valid()` method,
    only returning `true` when at least one character is entered into the text field.


    ***Listing 20-1.** View of the Options Panel, Only Deriving from JPanel*


    `public final class` **`ModuleOptions1Panel`** `extends` **`JPanel`** `implements
    DocumentListener {`

    `   private JTextField option1;`

    `   private JTextField option2;`

    `private final` **`ModuleOptions1PanelController`** `controller;`


    `   public ModuleOptionsPanel(ModuleOptions1PanelController ctl) {`

    `      this.controller = ctl;`

    `      initComponents();`

    `      option1.getDocument().addDocumentListener(this);`

    `   }`


    `   public void insertUpdate(DocumentEvent event) {`

    **`controller.changed();`**

    `   }`


    `   public void removeUpdate(DocumentEvent event) {`

    **`controller.changed();`**

    `   }`


    `   public void changedUpdate(DocumentEvent event) {`

    **`controller.changed();`**

    `   }`


    `public void` **`load`**`() {`

    `      option1.setText(`

    `         NbPreferences.forModule(ModuleOptions1Panel.class).`

    `         get("option1", "default"));`

    `   }`


    `public void` **`store`**`() {`

    `      NbPreferences.forModule(ModuleOptions1Panel.class).`

    `         put("option1", option1.getText());`

    `   }`


    `public boolean` **`valid`**`() {`

    `      if(option1.getText().length() == 0) {`

    `         return false;`

    `      } else {`

    `         return true;`

    `      }`

    `   }`

    `}`


    Now let us look at the responsibilities of the controller. Since the controller
    needs to interact with the options dialog, its interfaces are determined by the
    abstract class `OptionsPanelController`. The controller''s most important task
    is the creation of the view, using `getPanel()`, which you provide via the method
    `getComponent()`. As you can see, the method `getComponent()` receives a Lookup.
    This is a proxy Lookup, containing the Lookups of all controllers available in
    the options dialog. The controller uses the `getLookup()` method to make a Lookup
    available, which is already implemented by the abstract class `OptionsPanelController`.
    However, this default implementation just provides an empty Lookup. So, in order
    to provide certain objects in the Lookup, you have to overwrite the `getLookup()`
    method. Consequently, you can communicate with other option panels via this so-called
    master Lookup, which you get via `getComponent()`. You already learned in [Chapter
    5](#Chapter05.html#ch5) how communication can be realized using local Lookups
    and a global proxy Lookup (in this case, the master Lookup).


    The `update()` method is called when the panel is loaded the first time. Here,
    you call the `load()` method of the panel in order to load the data, so to initialize
    the fields. If the user clicks the *OK* button, the `applyChanges()` method of
    the options dialog is called. So here you save the data via the `store()` method.
    However, if the user cancels the dialog, the `cancel()` method is called, in which
    you obviously do not save the data. Should the situation arise, you can roll back
    the changes you already made. Using the `isValid()` method, you inform the options
    dialog whether the data of the panels is okay. If this is not the case, the *OK*
    button is automatically deactivated. Moreover, you must inform the options dialog
    whether the data has changed. You do this using the `isChanged()` method. With
    `getHelpCtx()`, you can provide a `HelpCtx` object that contains a reference to
    a help page, which will be displayed when the user clicks the options dialog''s
    *Help* button.


    To inform the options dialog about changes in data, you must give it the possibility
    of registering (see [Listing 20-2](#Chapter20.html#list_20_2)). You achieve this
    via the methods `addPropertyChangeListener()` and `removePropertyChangeListener()`.
    You already know the `changed()` method from the view class `ModuleOptions1Panel`.
    This method is called by the view when data is changed, and thus informs the options
    dialog about the changes. The options dialog is registered as a listener. As a
    result, the options dialog in turn checks whether the data is valid.


