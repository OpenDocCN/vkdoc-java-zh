- fmt: "### Palette Entries via the Layer File\n\nA component, which will be placed\
    \ on the palette, is defined via the XML file shown in [Listing 21-1](#Chapter21.html#list_21_1).\n\
    \n***Listing 21-1.** XML File That Defines a Palette Entry*\n\n```\n<!DOCTYPE\
    \ editor_palette_item PUBLIC\n   \"-//NetBeans//Editor Palette Item 1.1//EN\"\n\
    \   \"http://www.netbeans.org/dtds/editor-palette-item-1_1.dtd\">\n<editor_palette_item\
    \ version=\"1.1\">\n   <body></body>\n   <icon16 urlvalue=\"file:/E:/icon16.jpg\"\
    />\n   <icon32 urlvalue=\"file:/E:/icon32.jpg\"/>\n   <inline-description>\n \
    \     <display-name>My Palette Item</display-name>\n      <tooltip>My Palette\
    \ Item</tooltip>\n   </inline-description>\n</editor_palette_item>\n```\n\nWith\
    \ the elements `icon16` and `icon32` you define each an icon that will be displayed\
    \ for this entry, depending on the user's settings. Typically, they are the size\
    \ 16 and 32 pixels, but they can also be bigger. However, it makes sense to assign\
    \ a 16 pixels-sized icon even for the `icon16` attribute because this attribute\
    \ is also used for the display in the palette manager which can be called via\
    \ the context menu of the Palette window, since only 16-pixel icons can be displayed\
    \ there. Interestingly, you can also use absolute paths, as shown in this section's\
    \ example. Thus, not only icons of the module can be used, but also icons from\
    \ a user-defined directory. This can be especially useful if you want the user\
    \ to have the ability to add entries to the palette during runtime.\n\nWith the\
    \ `inline-description` element and its both subelements `display-name` and `tooltip`\
    \ you can determine the text with which the entry will be displayed in the palette.\
    \ Alternatively, you can use the element `description` instead of `inline-description`.\
    \ With its attribute `localizing-bundle` you can indicate a resource bundle which\
    \ provides the values for `display-name` and `tooltip`. By the attributes `display-name-key`\
    \ and `tooltip-key` you indicate the keys for these values. This way, you can\
    \ also internationalize palette entries; it can be very helpful to look at the\
    \ DTD of this XML file (DTDs are found in the Appendix).\n\nYou can now define\
    \ any number of components. Those components must be registered in the layer file\
    \ of your module in order to add it to a palette. For this purpose you can define\
    \ an arbitrary folder. Below this folder, create a subfolder for each category\
    \ which will be displayed on the palette. Then, the XML files are entered into\
    \ this subfolder. The result is the following entry, for example:\n\n```\n<folder\
    \ name=\"MyPaletteItems\">\n   <folder name=\"My Category\">\n      <file name=\"\
    myitem1.xml\" url=\"myitem1.xml\"/>\n      <file name=\"myitem2.xml\" url=\"myitem2.xml\"\
    />\n   </folder>\n</folder>\n```\n\nNow, just a `PaletteController` instance is\
    \ missing, which you then add to the top component, for which the palette entries\
    \ will be displayed (see [Listing 21-2](#Chapter21.html#list_21_2)). As already\
    \ mentioned at the beginning of this chapter, you use the `PaletteFactory` class\
    \ for this purpose. This class provides a factory method, namely `createPalette()`.\
    \ To this method you just have to pass the `MyPaletteItems` folder you defined\
    \ in the layer file. Then, the classes `PaletteFactory` and `PaletteController`\
    \ do the rest. You must provide an implementation of the `PaletteActions` class\
    \ as second parameter. This class provides actions for certain events. In the\
    \ simplest case, you create an empty implementation of this abstract class and\
    \ return an empty array in the methods `null`.\n\n***Listing 21-2.** Creating\
    \ a Palette Instance and Connecting It with a Top Component*\n\n```\npublic MyTopComponent()\
    \ {\n   ...\n   try {\n      associateLookup(Lookups.fixed(\n      PaletteFactory.createPalette(\"\
    MyPaletteItems\", new MyActions())));\n   } catch(IOException e) {\n      // MyPaletteItems\
    \ cannot be found\n   }\n}\n```\n\n### Creating a Palette via Your Own Nodes\n\
    \nEntries of a palette are represented by a node. In the previous section you\
    \ defined each entry via an XML file. For each of these entries a standard node\
    \ is provided automatically. You can also provide palette components via your\
    \ own node implementation instead of an XML definition. These nodes must be present\
    \ in a three-stage hierarchy. The top layer is only a root node, which you can\
    \ pass to the `createPalette()` method in order to create the elements. The nodes\
    \ on the second level, meaning all child nodes of the root node, are one category.\
    \ In turn, its child nodes are then used as palette entries. For example, let's\
    \ say you want to create a palette for managing music albums, which can be added\
    \ to a playlist via drag-and-drop (as you can see in [Figure 21-2](#Chapter21.html#fig_21_2)).\n\
    \n![Image](images/2102.jpg)\n\n***Figure 21-2.** Using the palette for managing\
    \ music albums, which can be added to a playlist via drag-and-drop*"
  raw: '### Palette Entries via the Layer File


    A component, which will be placed on the palette, is defined via the XML file
    shown in [Listing 21-1](#Chapter21.html#list_21_1).


    ***Listing 21-1.** XML File That Defines a Palette Entry*


    `<!DOCTYPE` **`editor_palette_item`** `PUBLIC`

    `   "-//NetBeans//Editor Palette Item 1.1//EN"`

    `   "http://www.netbeans.org/dtds/editor-palette-item-1_1.dtd">`

    `<`**`editor_palette_item`** `version="1.1">`

    `   <body></body>`

    `   <`**`icon16`** `urlvalue="file:/E:/icon16.jpg"/>`

    `   <`**`icon32`** `urlvalue="file:/E:/icon32.jpg"/>`

    `   <`**`inline-description`**`>`

    `      <`**`display-name`**`>My Palette Item</`**`display-name`**`>`

    `      <`**`tooltip`**`>My Palette Item</`**`tooltip`**`>`

    `   </`**`inline-description`**`>`

    `</`**`editor_palette_item`**`>`


    With the elements `icon16` and `icon32` you define each an icon that will be displayed
    for this entry, depending on the user''s settings. Typically, they are the size
    16 and 32 pixels, but they can also be bigger. However, it makes sense to assign
    a 16 pixels-sized icon even for the `icon16` attribute because this attribute
    is also used for the display in the palette manager which can be called via the
    context menu of the Palette window, since only 16-pixel icons can be displayed
    there. Interestingly, you can also use absolute paths, as shown in this section''s
    example. Thus, not only icons of the module can be used, but also icons from a
    user-defined directory. This can be especially useful if you want the user to
    have the ability to add entries to the palette during runtime.


    With the `inline-description` element and its both subelements `display-name`
    and `tooltip` you can determine the text with which the entry will be displayed
    in the palette. Alternatively, you can use the element `description` instead of
    `inline-description`. With its attribute `localizing-bundle` you can indicate
    a resource bundle which provides the values for `display-name` and `tooltip`.
    By the attributes `display-name-key` and `tooltip-key` you indicate the keys for
    these values. This way, you can also internationalize palette entries; it can
    be very helpful to look at the DTD of this XML file (DTDs are found in the Appendix).


    You can now define any number of components. Those components must be registered
    in the layer file of your module in order to add it to a palette. For this purpose
    you can define an arbitrary folder. Below this folder, create a subfolder for
    each category which will be displayed on the palette. Then, the XML files are
    entered into this subfolder. The result is the following entry, for example:


    `<folder name="`**`MyPaletteItems`**`">`

    `   <folder name="`**`My Category`**`">`

    `      <file name="myitem1.xml" url="`**`myitem1.xml`**`"/>`

    `      <file name="myitem2.xml" url="`**`myitem2.xml`**`"/>`

    `   </folder>`

    `</folder>`


    Now, just a `PaletteController` instance is missing, which you then add to the
    top component, for which the palette entries will be displayed (see [Listing 21-2](#Chapter21.html#list_21_2)).
    As already mentioned at the beginning of this chapter, you use the `PaletteFactory`
    class for this purpose. This class provides a factory method, namely `createPalette()`.
    To this method you just have to pass the `MyPaletteItems` folder you defined in
    the layer file. Then, the classes `PaletteFactory` and `PaletteController` do
    the rest. You must provide an implementation of the `PaletteActions` class as
    second parameter. This class provides actions for certain events. In the simplest
    case, you create an empty implementation of this abstract class and return an
    empty array in the methods `null`.


    ***Listing 21-2.** Creating a Palette Instance and Connecting It with a Top Component*


    `public MyTopComponent() {`

    `   ...`

    `   try {`

    `      associateLookup(Lookups.fixed(`

    **`PaletteFactory.createPalette("MyPaletteItems", new MyActions())`**`));`

    `   } catch(IOException e) {`

    `      // MyPaletteItems cannot be found`

    `   }`

    `}`


    ### Creating a Palette via Your Own Nodes


    Entries of a palette are represented by a node. In the previous section you defined
    each entry via an XML file. For each of these entries a standard node is provided
    automatically. You can also provide palette components via your own node implementation
    instead of an XML definition. These nodes must be present in a three-stage hierarchy.
    The top layer is only a root node, which you can pass to the `createPalette()`
    method in order to create the elements. The nodes on the second level, meaning
    all child nodes of the root node, are one category. In turn, its child nodes are
    then used as palette entries. For example, let''s say you want to create a palette
    for managing music albums, which can be added to a playlist via drag-and-drop
    (as you can see in [Figure 21-2](#Chapter21.html#fig_21_2)).


    ![Image](images/2102.jpg)


    ***Figure 21-2.** Using the palette for managing music albums, which can be added
    to a playlist via drag-and-drop*'
