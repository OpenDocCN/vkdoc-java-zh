    ### 摘要


    借助节点和资源管理器 API，NetBeans 平台提供了一个用于显示各种不同数据的通用框架。在本章中，您学习了不同节点类的基础知识以及节点容器的功能。通过一个示例，您创建了自己的节点类和容器，并使用资源管理器
    API 显示了 XML 文件中定义的一些数据。


    ## 第 13 章


    ## 对话框与向导


    *对话框 API* 可帮助您创建和显示对话框与向导。这些对话框基于 Java 的 `Dialog` 类。使用对话框 API，您可以显示标准对话框，以及针对特定业务需求定制的自定义对话框。此外，该
    API 与 NetBeans 窗口系统以及 NetBeans 帮助系统都能很好地集成。向导可被视为一种特殊的对话框，因此也是对话框 API 的一部分。


    ### 标准对话框


    使用 `NotifyDescriptor` 类来定义标准对话框的属性。提供一个以 `String`、`Icon` 或 `Component` 形式呈现的消息，该消息将与对话框一起显示。或者，也可以使用数组在不同情况下显示多条消息。可以指定不同类型的消息，从而控制所显示的图标。通过
    `NotifyDescriptor` 中预定义的常量来定义类型，如表 13-1 所列。


    ![图片](img/t1301.jpg)


    选项类型定义了对话框中显示哪些按钮，为此提供了表 13-2 中所示的常量。


    ![图片](img/t1302.jpg)


    此外，您可以使用构造函数或 `setAdditionalOptions()` 方法传入一个 `Object` 数组，其组件会以 `JButton` 对象的形式添加到对话框的按钮中。通常，这里传入的是
    `String` 对象，但您也可以使用 `Component` 或 `Icon` 对象。然而，如果您想省略默认按钮，则只能通过 `setOptions()`
    方法或在构造函数中传入它们来提供自定义按钮。同样，这里也使用 `String`、`Component` 和 `Icon` 类：


    **`NotifyDescriptor`** `d = new` **`NotifyDescriptor`**`(`

    `   "文本",  // 对话框消息`

    `   "标题", // 对话框标题`

    `   NotifyDescriptor.OK_CANCEL_OPTION,    // 按钮`

    `   NotifyDescriptor.INFORMATION_MESSAGE, // 符号`

    `   null,    // 自定义按钮，类型为 Object[]`

    `   null);   // 附加按钮，类型为 Object[]`


    像前面定义的对话框描述，会被传入 `DialogDisplayer` 类的 `notify()` 方法中，该类负责对话框的创建和显示，并在对话框关闭时给出返回值。`DialogDisplayer`
    被设计为一个全局服务，其提供者通过 Lookup 由 `getDefault()` 方法提供。


    `Object retval = DialogDisplayer.getDefault().notify(d);`


    您可以通过与表 13-3 中列出的常量进行比较，来识别用户点击的按钮。


    ![图片](img/t1303.jpg)


    ![图片](img/t1303a.jpg)


    对于最常见的对话框类型，对话框 API 提供了 `NotifyDescriptor` 类的三个子类，因此您只需定义少数几个参数。在接下来的章节中，我们将通过示例更详细地了解这些类。


    #### 信息对话框


    通过 `NotifyDescriptor.Message` 类创建信息对话框。将要显示的文本以及可选的**消息类型**传递给构造函数。默认情况下，对话框会显示信息符号，如图
    13-1 所示。


    `NotifyDescriptor nd = new` **`NotifyDescriptor.Message`**`("信息");` ![图片](img/1301.jpg)


    ***图 13-1.** 信息对话框*


    #### 问题对话框


    如果希望用户能够回答对话框中提出的问题（参见图 13-2），请使用 `NotifyDescriptor.Confirmation` 类。为此，提供了一系列构造函数，用于传入消息、标题、消息类型和附加选项类型。


    `NotifyDescriptor d = new` **`NotifyDescriptor.Confirmation`**`(`

    `   "您可以在此处放置任何字符串或组件",`

    `   "这是一个问题");` ![图片](img/1302.jpg)


    ***图 13-2.** 问题对话框*


    #### 输入对话框


    通过 `NotifyDescriptor.InputLine` 类可以轻松创建输入对话框。定义要在对话框输入区域显示的文本和标题（参见图 13-3）。或者，传入选项类型和消息类型，以便显示所需的按钮和符号。


    `NotifyDescriptor d = new` **`NotifyDescriptor.InputLine`**`(`

    `   "名和姓：",`

    `   "请输入您的姓名");` ![图片](img/1303.jpg)


    ***图 13-3.** 输入对话框*


    通过 `getInputText()` 方法访问用户输入的文本。或者，通过 `setInputText()` 方法在字段中输入文本。


    ### 自定义对话框


    自定义对话框通过 `DialogDescriptor` 类创建。此类是 `NotifyDescriptor` 类的扩展。传入一个要显示的 `Component`
    对象，同时定义对话框的模态性以及一个相关的 `ActionListener`，该监听器在点击按钮时做出响应。或者，传入一个 `HelpCtx` 对象，提供帮助主题的
    ID，以便在对话框上自动显示“帮助”按钮。对于 `DialogDescriptor`，通过 `DialogDisplayer` 的 `createDialog()`
    方法创建一个 `Dialog` 对象。或者，通过 `notify()` 或 `notifyLater()` 方法直接显示对话框。


    #### 显示通知


    在创建自己的对话框时，例如为了向用户查询某些数据，您可以向用户显示通知（参见*向导*一节），其效果等同于向导。通知行由对话框 API 自动集成，如果需要，可以通过
    `NotifyDescriptor` 实例的 `createNotificationLineSupport()` 方法创建。因此，通知行以 `NotificationLineSupport`
    实例的形式创建在对话框底部（参见图 13-4）。您可以使用以下方法在该行中显示信息：


    `setInformationMessage(String msg)`

    `setWarningMessage(String msg)`

    `setErrorMessage(String msg)`


    这些方法中的每一个还会在显示的通知前面设置一个相应的图标。您可以通过相应的 `get` 方法读取当前显示的通知。使用 `clearMessages()` 方法可以再次删除已显示的通知。


    ![图片](img/1304.jpg)


    ***图 13-4.** 带有集成通知行的对话框*

