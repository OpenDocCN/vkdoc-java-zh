    ## C H A P T E R  24


    ## Quick Search API


    The Quick Search feature of the NetBeans Platform is an infrastructure for easily
    searching various files in different sources (shown in [Figure 24-1](#Chapter24.html#fig_24_1)).
    The Quick Search module has a simple API for providing so-called search provider
    implementations.


    ![Image](images/2401.jpg)


    ***Figure 24-1.** Quick Search feature*


    The search box of the Quick Search module can be added to a toolbar or to the
    menu bar. Then the user can type in the desired term there. The registered search
    providers are already asynchronously queried for corresponding results when typing
    in. An action can be triggered by clicking a result. [Listing 24-1](#Chapter24.html#list_24_1)
    shows how to implement a search provider combined with the Favorites module. You
    search for MP3 files in its folders. Clicking a found file should add it to the
    playlist.


    ### Implementing Quick Search Provider


    The NetBeans IDE provides a wizard for creating the basic structure and the registration
    of a search provider. Call this wizard with *File ![Image](images/U001.jpg) New
    File ![Image](images/U001.jpg) Module Development ![Image](images/U001.jpg) Quick
    Search Provider*. First, we name the provider class and define the package in
    which the class shall be created. Additionally, we define the category with which
    the results are grouped in the Quick Search popup (see [Figure 24-1](#Chapter24.html#fig_24_1)).
    You are able to influence the order of these categories, too. A small number means
    that the referring category is listed at the top. Finally, you have to choose
    a *command prefix*. If this prefix is separated from the search term by a space,
    it is only searched in the referring category.


