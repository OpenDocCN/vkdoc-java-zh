- fmt: '### Data Systems


    In terms of the NetBeans Platform, data can be local or available via `FTP`, `CVS`,
    a database, or an `XML` file. By means of abstraction, data access by one module
    is transparent to all other modules. Actual data access itself is therefore not
    a concern, since it is dealt with by the NetBeans Platform''s APIs.


    ### Framework for the Management and Representation of Data


    Based on the abstraction of files and saved data (described in the previous paragraph),
    the NetBeans Platform provides a framework with which data can be assigned with
    specific actions or functions. It is also part of the framework to manage and
    represent the data and its action on the user interface.


    ### Central Service Management


    The NetBeans Platform provides a central service management with the lookup concept.
    This enables you to provide and use certain services provided within an application
    independently of each other. This concept is important, because it enables a loose
    coupling of application parts to be realized. This is one of the important goals
    which the application of the NetBeans Platform pursues.


    ### Internationalization


    The NetBeans Platform provides classes and methods enabling the internationalization
    of `JavaHelp` and other resources. You can easily store text constants in properties
    files. The NetBeans Platform also loads text constants and icons applicable to
    the current country and language settings.


    ### Help System


    By means of the standard `JavaHelp` System, the NetBeans Platform offers a central
    system for the integration and display of help topics to the end user. In addition,
    individual modules can contribute their own topics to the application''s help
    system. On top of all that, the NetBeans Platform lets you provide context-sensitive
    help as well.


    ### Summary


    In this chapter you learned the difference that a rich client can make, and the
    advantages a rich client brings to the table, including its modular architecture,
    which is made possible by a module system unique to rich client platforms. However,
    a rich client platform offers many other advantages and features, including support
    for a consistent user interface and the ability to update applications with new
    features at runtime. Finally, this chapter introduced the most important characteristics
    of the NetBeans Platform.


    ## C H A P T E R 2


    ## Structure of the NetBeans Platform


    To give you an overview of how a rich client application is structured and to
    show the relationship of the application you''re creating to the NetBeans Platform,
    this chapter will discuss the architecture of the NetBeans Platform. It will also
    introduce the independent building blocks of the NetBeans Platform and the responsibilities
    that the NetBeans runtime container handles for you. Finally, this chapter will
    explain the structure of the NetBeans classloader system along with the role it
    plays in applications built on top of the NetBeans Platform.


    ### NetBeans Platform Architecture


    The size and complexity of modern applications is steadily increasing. At the
    same time, professional applications need to be flexible, above all, so that they
    can be quickly and easily extended. This makes it necessary to divide an application
    into distinct parts. As a result, each distinct part is a building block that
    makes up a modular architecture. The distinct parts must be independent, making
    available well-defined interfaces that are used by other parts of the same application,
    with features that other parts of the application can use and extend.


    The division of an application into modules—that is, logically interdependent
    parts—enhances the design of an application enormously. In contrast to a monolithic
    application, in which every class can make use of code from any other class, the
    architecture is far more flexible and, more importantly, far simpler to maintain.
    Although it is possible in Java to protect a class from access from the outside
    world, such class-level protection is too finely grained to be useful to most
    applications. It is exactly this central aspect of modern client applications
    that the NetBeans Platform tackles. Its concepts and structures support the development
    and conceptualization of flexible and modular applications.


    The basic building block of the NetBeans Platform is modules. A module is a collection
    of functionally-related classes together with a description of the interfaces
    that the module exposes, as well as a description of the other modules that it
    needs in order to function. The complete NetBeans Platform, as well as the application
    built on top of it, are divided into modules. These are loaded by the core of
    the NetBeans Platform, which is known as the *NetBeans runtime container*. The
    NetBeans runtime container loads the application''s modules dynamically and automatically,
    after which it is responsible for running the application as well.


    The NetBeans IDE is a very good example of a modular rich client application.
    The functionality and characteristics of an IDE, such as its Java language support
    or the code editor, are created in the form of modules on top of the NetBeans
    Platform, as shown in [Figure 2-1](#Chapter02.html#fig_2_1). This offers a great
    advantage because the application can be extended by additional modules and adapted
    to specific user needs, allowing particular modules that are not used to be deactivated
    or uninstalled.


    ![Image](images/0201.jpg)


    ***Figure 2-1.** Conceptual structure of the NetBeans IDE*


    To enable your applications to attain this level of modularity, the NetBeans Platform
    on the one hand makes mechanisms and concepts available that enable modules to
    be extendable by other modules, and on the other hand enables them to communicate
    with each other without being dependent on each other. In other words, the NetBeans
    Platform supports a loose coupling of modules within an application.


    To optimize the encapsulation of code within modules, which is necessary within
    a modular system, the NetBeans Platform provides its own *classloader system*.
    Each module is loaded by its classloader and, in the process, makes a separate
    independent unit of code available. As a result, a module can explicitly make
    its packages available, with specific functionality being exposed to other modules.
    To use functionality from other modules, a module can declare dependencies on
    other modules. These dependencies are declared in the module''s manifest file
    and resolved by the NetBeans runtime container, ensuring that the application
    always starts up in a consistent state. More than anything else, this loose coupling
    plays a role in the declarative concept of the NetBeans Platform. By that I mean
    that as much as possible is defined in description and configuration files, in
    order to avoid a hard-wired connection of these concepts with the Java source
    code.'
