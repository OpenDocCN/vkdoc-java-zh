    ### 扩展现有面板


    除了为尚无面板的文件类型创建自己的面板外，您还可以向现有面板添加条目。为此，您只需知道图层文件中文件夹的名称即可。您可以轻松地在图层树（*重要文件 ![Image](img/U001.jpg)
    XML 图层*）中搜索现有的面板文件夹。例如，HTML 文件的文件夹名为 `HTMLPalette`。您也可以像处理自己的 `ManifestPalette`
    文件夹一样，将条目添加到现有的 `HTMLPalette` 文件夹中。例如，结果可能如清单 22-5 所示。


    ***清单 22-5.** 添加现有面板的条目*


    `<folder name="`**`HTMLPalette`**`">`

    `   <folder name="`**`我的 HTML 项`**`">`

    `      <file name="item1.xml" url="items/item1.xml"/>`

    `      <file name="item2.xml" url="items/item2.xml"/>`

    `   </folder>`

    `</folder>`


    ### 总结


    使用面板 API，您不仅可以扩展 NetBeans Platform 应用程序，还可以扩展 NetBeans IDE。您可以创建特定于文件的面板，或扩展现有面板。在本章中，您学习了如何创建和注册面板项以及面板控制器。在本章的最后部分，我们探讨了如何扩展现有面板。


    ## 第 23 章


    ## 任务列表 API


    NetBeans IDE 的“任务列表”模块使您能够显示任务、通知或错误消息，如图 23-1 所示。任务列表中的条目可以按组排列，使用户获得更好的概览；用户还可以决定显示哪些部分的条目。默认情况下，任务列表模块中定义了三个部分，称为作用域。一个作用域对应于当前打开的文件，另一个作用域对应于主项目及其打开的依赖项目，第三个作用域对应于所有打开的项目。这些条目由在固定作用域内工作的扫描器提供。


    ![Image](img/2301.jpg)


    ***图 23-1.** NetBeans IDE 的任务列表模块*


    对于任务列表模块，存在*任务列表 API*，您可以使用它灵活地扩展模块的操作范围。其核心在于提供额外的扫描器。这些扩展通过图层文件中的扩展点进行集成。通过一个示例最能说明其工作原理。假设您想要实现一个扫描器，用于显示所有直接使用信息输出的位置，例如使用
    `System.out.println()`。例如，在交付产品之前，您可以确保所有重要位置都已替换为日志输出或已删除。


    ### 实现扫描器


    您需要从抽象的 `FileTaskScanner` 类派生自己的扫描器实现。扫描器具有名称和对其功能的描述。您可以选择将扫描器连接到选项面板。通过此选项面板，用户可以单独配置扫描器。例如，您可以使用
    NetBeans IDE 的 ToDo 扫描器来配置令牌，这些令牌将在文件中被识别为 ToDo 任务。为简单起见，您可以直接在扫描器中定义这些令牌。然后，将名称、描述和选项面板路径（如果不使用选项面板则为
    `null`）这三个参数传递给基类构造函数。由于扫描器稍后将在图层文件中声明式注册，然后由任务列表框架初始化，因此您需要提供工厂方法 `create()`。通过此方法，可以创建
    `LoggingTaskScanner` 实例。


    您可能已经猜到，扫描器最重要的部分是 `scan()` 方法。通过此方法，您将获得要搜索的文件。您使用 `Pattern`（用于识别令牌）和 `Matcher`
    遍历此文件。为每个找到的位置创建一个 `Task` 实例。然后，将此实例添加到返回的列表中。清单 23-1 中的实现使用了 `TodoTaskScanner`
    类作为模板。通过静态方法 `Task.create()` 创建 `Task` 实例。您需要向此方法传递搜索到的文件、条目应添加到的组、描述（通常是找到令牌的行）以及行号。


    ***清单 23-1.** 扫描器实现*


    `import org.netbeans.spi.tasklist.FileTaskScanner;`

    `import org.netbeans.spi.tasklist.Task;`

    `import org.openide.filesystems.FileObject;`

    `...`

