    ### Deactivating Modules Automatically


    In the example showing how to automatically update an application in the previous
    section you got to know the Auto Update Services API for finding, downloading,
    installing, and updating modules. Furthermore, the API makes it possible to activate
    or deactivate certain modules. There are very interesting applications for this.
    For example, you can switch off certain modules or functionalities for certain
    user groups (by the login information). The method is quite similar to that described
    in the previous section. First, you determine all available modules (including
    the already installed modules) via the `UpdateManager`. By the additional filter
    `UpdateManager.TYPE.MODULE` you ensure that only application modules and not localization
    modules are delivered. Via the `getInstalled()` method you check whether you are
    dealing with an installed module. This way new modules are filtered. Search for
    modules to deactivate in the remaining modules that are activated. Deactivating
    works via the unique code name base. (See [Listing 25-7](#Chapter25.html#list_25_7).)


    ***Listing 25-7.** Searching for Certain Active Application Modules*


    `List<String> modules = Collections.singletonList("com.galileo.netbeans.module3");`

    `OperationContainer<OperationSupport> cont = OperationContainer.createForDirectDisable();`

    `for (UpdateUnit unit : UpdateManager.getDefault().getUpdateUnits(UpdateManager.TYPE.MODULE))
    {`

    `   if (unit.getInstalled() != null) {`

    `      UpdateElement elem = unit.getInstalled();`

    `      if (elem.isEnabled()) {`

    `         if (modules.contains(elem.getCodeName())) {`

    `            if (cont.canBeAdded(unit, elem)) {`

    `               OperationInfo<OperationSupport> operationInfo = cont.add(elem);`

    `               if (operationInfo != null) {`

    `                  cont.add(operationInfo.getRequiredElements());`

    `               }`

    `            }`

    `         }`

    `      }`

    `   }`

    `}`


    For deactivating modules you create a referring container with the factory method
    `OperationContainer.createForDirectDisable()`. Add the desired modules to it.
    Before doing so, check again whether the modules are compatible with the container.
    If the module is successfully added you can add all modules that are dependent
    of the module to deactivate via the `OperationInfo` instance. Finally, ensure
    that the container is not empty. Then deactivate the modules via the method `doOperation()`
    (see [Listing 25-8](#Chapter25.html#list_25_8).)


    ***Listing 25-8.** Deactivating Application Modules*


