    port on which the database server accepts connections:


    `Connection connection = DriverManager.`**`getConnection`**`(`

    `     "jdbc:derby:`**`//localhost:1527/`**`MyDB;", "user", "password");`


    Since the database server in this case is located on the same computer as the
    application, use the specification `localhost` or the IP address `127.0.0.1` and
    define the port as `1527`. You can also get this URL from the already established
    connection in the services window of the NetBeans IDE.


    #### Retrieving and Importing Structures of Tables


    Next I will show you a very helpful feature of the database explorer in the services
    window. It is possible to display the SQL source code with which your table was
    created in order to copy it as is into your application for the initial creation
    of the database tables or in an SQL script file. Call the context menu of the
    wanted table, where you will find the point *Grab* *Structure...*; call it to
    save the structure in a file. Then just choose *Recreate* *Table...* in the context
    menu, and choose the just created file. The SQL source code, which is necessary
    to create the table, will then be displayed in a window. You can also supply this
    functionality to its original purpose and so import tables out of a foreign database
    in your database.


    ### Example Application


    I want to finish this chapter with a really simple example to explain some idiosyncrasies
    of the Java DB around creating table structures and show you how to cleverly integrate
    the Java DB in the lifecycle of your application. In this example, you will manage
    music albums that can be assigned to a certain genre.'
