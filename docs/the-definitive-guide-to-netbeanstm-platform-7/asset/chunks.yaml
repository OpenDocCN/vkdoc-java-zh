- fmt: "### Graphics\n\nNot only texts can be adapted by language and country; graphics,\
    \ such as icons, can also be adapted. The `ImageUtilities` class provides a variant\
    \ of the `loadImage()` method that is usually used for loading graphics, in order\
    \ to simplify it. You can set a `boolean` parameter whether an available language/country-specific\
    \ version of the graphic will be loaded depending on the current `Locale` setting.\
    \ The method `NbBundle.getLocalizingSuffixes()` lists possible identifications\
    \ which are searched for.\n\n```\nImage img = ImageUtilities.loadImage(\"resources/icon.gif\"\
    , true);\n```\n\nIf the current `Locale` setting, for example, is `de_DE`, it\
    \ is first searched for `icon_de_DE.gif` and `icon_de.gif`.\n\n### Arbitrary Files\n\
    \nThe NetBeans Platform defines a special protocol for loading other arbitrary\
    \ internationalized resources. This is the `nbresloc` protocol, an extension of\
    \ the `nbres` protocol, with which you can load resources from all available modules.\
    \ You can easily create a `URL` object for a resource addressed by this protocol:\n\
    \n```\nURL u = new URL(\"nbresloc:/com/galileo/netbeans/icon.png\");\nImageIcon\
    \ icon = new ImageIcon(u);\n```\n\nIf the `Locale` setting is `de_DE` and a file\
    \ named `icon_de_DE.png` or `icon_de.png` exists, this icon is loaded instead\
    \ of `icon.png`.\n\n### Folders, Files, and Attributes in the Layer File\n\nThe\
    \ System Filesystem provides two special attributes to internationalize names\
    \ and icons of folders and files. This is very helpful, for example, for menus\
    \ whose names are only declared in the layer file and thus cannot be read via\
    \ the `NbBundle` class (as is the case for actions). These two attributes are\
    \ `SystemFileSystem.localizingBundle` and `SystemFileSystem.icon`. With the first\
    \ attribute, you can refer to your resource bundle, leaving out the `.properties`\
    \ extension. In this resource bundle, a key is automatically searched that matches\
    \ the complete path of the folder or of the file which contains the `SystemFileSystem.localizingBundle`\
    \ attribute. For this example, this is `Menu/MyMenu` and `Menu/MyMenu/MySubMenu`.\
    \ With the `SystemFileSystem.icon` attribute, you can additionally set an icon\
    \ for the folder or for the file. Use the `nbresloc` protocol so it can also be\
    \ loaded as an internationalized version. (See [Listings 34-5](#Chapter34.html#list_34_5),\
    \ [34-6](#Chapter34.html#list_34_6), and [34-7](#Chapter34.html#list_34_7).)\n\
    \n**Listing 34-5.** Layer.xml\n\n```\n<folder name=\"Menu\">\n   <folder name=\"\
    MyMenu\">\n      <attr name=\"SystemFileSystem.localizingBundle\"\n          \
    \  stringvalue=\"com.galileo.netbeans.module.Bundle\"/>\n      <folder name=\"\
    MySubMenu\">\n         <attr name=\"SystemFileSystem.localizingBundle\"\n    \
    \           stringvalue=\"com.galileo.netbeans.module.Bundle\"/>\n         <attr\
    \ name=\"SystemFileSystem.icon\"\n               urlvalue=\"nbresloc:/com/galileo/netbeans/module/icon.png\"\
    />\n      </folder>\n   </folder>\n</folder>\n```\n\n**Listing 34-6.** Bundle.properties\n\
    \n```\nMenu/MyMenu=Extras\nMenu/MyMenu/MySubMenu=My Tools\n```\n\n**Listing 34-7.**\
    \ Bundle_de.properties\n\n```\nMenu/MyMenu=Extras\nMenu/MyMenu/MySubMenu=Meine\
    \ Tools\n```\n\nThe System Filesystem provides the `bundlevalue` attribute type\
    \ in order to internationalize attributes within the layer file. Thus, you can\
    \ outsource, for example, the name of an action, which is determined by an attribute\
    \ in the layer file, in a properties bundle.\n\n```\n<file name=\"com-galileo-netbeans-MyFirstAction.instance\"\
    >\n   <attr name=\"displayName\" bundlevalue=\"com.galileo.netbeans.module.Bundle#CTL_MyAction\"\
    />\n</file>\n```\n\nThus, the name of the action is determined by the `CTL_MyAction`\
    \ key. For this purpose, indicate the name of the package and of the bundle. Which\
    \ bundle is finally used depends on the locale settings and is automatically determined.\n\
    \n### Administration and Preparation of Localized Resources\n\nUp to this point,\
    \ this discussion has assumed that the localized resources have been stored in\
    \ the same folder as the module, whether the `Bundle.properties` files or graphics.\
    \ However, how do you ensure that the resources for each language are separately\
    \ managed, and how can you later extend an already-provided module with an additional\
    \ translation? For this purpose the NetBeans Platform makes it possible to separate\
    \ the resources to localize from the remaining parts (which are mainly the classes)\
    \ of a module. [Figure 34-3](#Chapter34.html#fig_34_3) shows the `locale` directory\
    \ which is located below the directory in which the module is stored. The resources\
    \ for a language in a JAR archive in this folder are extended with a language/country\
    \ identifier. The archive has the same name as the module JAR archive. In this\
    \ *Locale Extension Archive*, all language/country-specific resources are managed.\
    \ They have the same package structure as the module. This way, the resources\
    \ are separated and can be updated individually. For example, translations of\
    \ the NetBeans Platform modules are provided in the same manner.\n\n![Image](images/3403.jpg)\n\
    \n**Figure 34-3.** Preparation of language-specific resources in a separate JAR\
    \ archive in the directory locale\n\nNote that the individual localized resources\
    \ still need the language/country identifier. The *Locale Extension Archive* needs\
    \ no manifest file, because the archive is exclusively identified by the name\
    \ of the localized package and is added to the class path of the module classloader.\n\
    \nIn this example, the resources for German are in the `locale` folder as a locale\
    \ extension archive. The English resources that have no identifier are the default\
    \ resources and are located in the JAR archive of the module. Now, it is interesting\
    \ that you can put the default resources into a locale extension archive, because\
    \ it has no identifier and can be made available in the `locale` directory; the\
    \ resources you plan to localize are completely separated from the module itself.\
    \ This is particularly the case when adding another language is done by a third\
    \ person because it is obvious which resources must be localized.\n\n### Summary\n\
    \nThis chapter showed how to internationalize an application, adapting it to several\
    \ languages. You learned the specifics of internationalizing source code and the\
    \ manifest file, as well as adapting help pages and other resources, such as graphics.\n\
    \n## C H A P T E R 35\n\n## Branding and Packaging Application\n\nAs described\
    \ in [Chapter 3](#Chapter03.html#ch3), there are two different types of containers\
    \ used by the NetBeans Platform: a *Module Suite* and a *NetBeans Platform Application*.\
    \ While a module suite represents a pure collection of connected related modules,\
    \ a NetBeans Platform application provides the basic structure for an independent\
    \ application. This means you can user-specifically adapt a NetBeans Platform\
    \ application and then create an installable package out of it. The following\
    \ sections will explain how this works.\n\n### Branding\n\nA Platform application\
    \ provides a separate dialog for the so-called branding, or product-specific adaptation,\
    \ of your application. There are numerous settings in this dialog, including the\
    \ adaptation of the name and the different icons as well as for determining a\
    \ splash screen and the window system's behavior. Interestingly, you can arbitrarily\
    \ change all texts defined by the Platform, such as the names of certain windows.\
    \ In the following sections we will take a closer look at this; to get started,\
    \ click on *Branding…* in the context menu of your Platform application. An example\
    \ of branding in a NetBeans Platform application is shown in [Figure 35-1](#Chapter35.html#fig_35_1)."
  raw: '#### Graphics


    Not only texts can be adapted by language and country; graphics, such as icons,
    can also be adapted. The `ImageUtilities` class provides a variant of the `loadImage()`
    method that is usually used for loading graphics, in order to simplify it. You
    can set a `boolean` parameter whether an available language/country-specific version
    of the graphic will be loaded depending on the current `Locale` setting. The method
    `NbBundle.getLocalizingSuffixes()` lists possible identifications which are searched
    for.


    `Image img = ImageUtilities`**`.loadImage`**`("resources/icon.gif",`**`true`**`);`


    If the current `Locale` setting, for example, is *de_DE*, it is first searched
    for *icon_de_DE.gif* and *icon_de.gif*.


    #### Arbitrary Files


    The NetBeans Platform defines a special protocol for loading other arbitrary internationalized
    resources. This is the *nbresloc* protocol, an extension of the *nbres* protocol,
    with which you can load resources from all available modules. You can easily create
    a `URL` object for a resource addressed by this protocol:


    `URL u = new URL("`**`nbresloc`**`:/com/galileo/netbeans/icon.png");`

    `ImageIcon icon = new ImageIcon(u);`


    If the `Locale` setting is `de_DE` and a file named `icon_de_DE.png` or `icon_de.png`
    exists, this icon is loaded instead of `icon.png`.


    #### Folders, Files, and Attributes in the Layer File


    The System Filesystem provides two special attributes to internationalize names
    and icons of folders and files. This is very helpful, for example, for menus whose
    names are only declared in the layer file and thus cannot be read via the `NbBundle`
    class (as is the case for actions). These two attributes are `SystemFileSystem.localizingBundle`
    and `SystemFileSystem.icon`. With the first attribute, you can refer to your resource
    bundle, leaving out the *.properties* extension. In this resource bundle, a key
    is automatically searched that matches the complete path of the folder or of the
    file which contains the `SystemFileSystem.localizingBundle` attribute. For this
    example, this is `Menu/MyMenu` and `Menu/MyMenu/MySubMenu`. With the `SystemFileSystem.icon`
    attribute, you can additionally set an icon for the folder or for the file. Use
    the `nbresloc` protocol so it can also be loaded as an internationalized version.
    (See [Listings 34-5](#Chapter34.html#list_34_5), [34-6](#Chapter34.html#list_34_6),
    and [34-7](#Chapter34.html#list_34_7).)


    ***Listing 34-5.** Layer.xml*


    `<folder name="`**`Menu`**`">`

    `   <folder name="`**`MyMenu`**`">`

    `      <attr name="SystemFileSystem.localizingBundle"`

    `            stringvalue="com.galileo.netbeans.module.Bundle"/>`

    `      <folder name="`**`MySubMenu`**`">`

    `         <attr name="`**`SystemFileSystem.localizingBundle`**`"`

    `               stringvalue="com.galileo.netbeans.module.Bundle"/>`

    `         <attr name="`**`SystemFileSystem.icon`**`"`

    `               urlvalue="`**`nbresloc`**`:/com/galileo/netbeans/module/icon.png"/>`

    `      </folder>`

    `   </folder>`

    `</folder>`


    ***Listing 34-6.** Bundle.properties*


    **`Menu/MyMenu`**`=Extras`

    **`Menu/MyMenu/MySubMenu`**`=My Tools`


    ***Listing 34-7.** Bundle_de.properties*


    **`Menu/MyMenu`**`=Extras`

    **`Menu/MyMenu/MySubMenu`**`=Meine Tools`


    The System Filesystem provides the `bundlevalue` attribute type in order to internationalize
    attributes within the layer file. Thus, you can outsource, for example, the name
    of an action, which is determined by an attribute in the layer file, in a properties
    bundle.


    `<file name="com-galileo-netbeans-MyFirstAction.instance">`

    `   <attr name="`**`displayName`**`" bundlevalue="com.galileo.netbeans.module.Bundle#CTL_MyAction"/>`

    `</file>`


    Thus, the name of the action is determined by the `CTL_MyAction` key. For this
    purpose, indicate the name of the package and of the bundle. Which bundle is finally
    used depends on the locale settings and is automatically determined.


    ### Administration and Preparation of Localized Resources


    Up to this point, this discussion has assumed that the localized resources have
    been stored in the same folder as the module, whether the *Bundle.properties*
    files or graphics. However, how do you ensure that the resources for each language
    are separately managed, and how can you later extend an already-provided module
    with an additional translation? For this purpose the NetBeans Platform makes it
    possible to separate the resources to localize from the remaining parts (which
    are mainly the classes) of a module. [Figure 34-3](#Chapter34.html#fig_34_3) shows
    the *locale* directory which is located below the directory in which the module
    is stored. The resources for a language in a JAR archive in this folder are extended
    with a language/country identifier. The archive has the same name as the module
    JAR archive. In this *Locale Extension Archive*, all language/country-specific
    resources are managed. They have the same package structure as the module. This
    way, the resources are separated and can be updated individually. For example,
    translations of the NetBeans Platform modules are provided in the same manner.


    ![Image](images/3403.jpg)


    ***Figure 34-3.** Preparation of language-specific resources in a separate JAR
    archive in the directory locale*


    Note that the individual localized resources still need the language/country identifier.
    The *Locale Extension Archive* needs no manifest file, because the archive is
    exclusively identified by the name of the localized package and is added to the
    class path of the module classloader.


    In this example, the resources for German are in the *locale* folder as a locale
    extension archive. The English resources that have no identifier are the default
    resources and are located in the JAR archive of the module. Now, it is interesting
    that you can put the default resources into a locale extension archive, because
    it has no identifier and can be made available in the *locale* directory; the
    resources you plan to localize are completely separated from the module itself.
    This is particularly the case when adding another language is done by a third
    person because it is obvious which resources must be localized.


    ### Summary


    This chapter showed how to internationalize an application, adapting it to several
    languages. You learned the specifics of internationalizing source code and the
    manifest file, as well as adapting help pages and other resources, such as graphics.


    ## C H A P T E R  35


    ## Branding and Packaging Application


    As described in [Chapter 3](#Chapter03.html#ch3), there are two different types
    of containers used by the NetBeans Platform: a *Module Suite* and a *NetBeans
    Platform Application*. While a module suite represents a pure collection of connected
    related modules, a NetBeans Platform application provides the basic structure
    for an independent application. This means you can user-specifically adapt a NetBeans
    Platform application and then create an installable package out of it. The following
    sections will explain how this works.


    ### Branding


    A Platform application provides a separate dialog for the so-called branding,
    or product-specific adaptation, of your application. There are numerous settings
    in this dialog, including the adaptation of the name and the different icons as
    well as for determining a splash screen and the window system''s behavior. Interestingly,
    you can arbitrarily change all texts defined by the Platform, such as the names
    of certain windows. In the following sections we will take a closer look at this;
    to get started, click on *Branding…* in the context menu of your Platform application.
    An example of branding in a NetBeans Platform application is shown in [Figure
    35-1](#Chapter35.html#fig_35_1).'
  trans: '

    #### 图形


    不仅文本可以根据语言和国家进行适配；图形（如图标）也可以进行适配。`ImageUtilities` 类提供了 `loadImage()` 方法的一个变体，该方法通常用于加载图形，以简化此过程。你可以设置一个
    `boolean` 参数，决定是否根据当前的 `Locale` 设置加载可用的语言/国家特定版本的图形。方法 `NbBundle.getLocalizingSuffixes()`
    列出了会被搜索的可能标识。


    `Image img = ImageUtilities`**`.loadImage`**`("resources/icon.gif",`**`true`**`);`


    例如，如果当前的 `Locale` 设置为 *de_DE*，则会首先搜索 *icon_de_DE.gif* 和 *icon_de.gif*。


    #### 任意文件


    NetBeans 平台定义了一种特殊协议，用于加载其他任意国际化资源。这就是 *nbresloc* 协议，它是 *nbres* 协议的扩展，通过它你可以从所有可用的模块中加载资源。你可以轻松地为通过此协议寻址的资源创建一个
    `URL` 对象：


    `URL u = new URL("`**`nbresloc`**`:/com/galileo/netbeans/icon.png");`

    `ImageIcon icon = new ImageIcon(u);`


    如果 `Locale` 设置为 `de_DE`，并且存在名为 `icon_de_DE.png` 或 `icon_de.png` 的文件，则会加载此图标而不是
    `icon.png`。


    #### 层文件中的文件夹、文件和属性


    系统文件系统提供了两个特殊属性，用于国际化文件夹和文件的名称和图标。这对于例如菜单（其名称仅在层文件中声明，因此无法通过 `NbBundle` 类读取，就像操作那样）非常有用。这两个属性是
    `SystemFileSystem.localizingBundle` 和 `SystemFileSystem.icon`。使用第一个属性，你可以引用你的资源包，省略
    *.properties* 扩展名。在此资源包中，会自动搜索一个键，该键与包含 `SystemFileSystem.localizingBundle` 属性的文件夹或文件的完整路径匹配。对于此示例，该路径是
    `Menu/MyMenu` 和 `Menu/MyMenu/MySubMenu`。使用 `SystemFileSystem.icon` 属性，你还可以为文件夹或文件设置图标。使用
    `nbresloc` 协议，以便它也可以作为国际化版本加载。（参见清单 34-5、34-6 和 34-7。）


    ***清单 34-5.** Layer.xml*


    `<folder name="`**`Menu`**`">`

    `   <folder name="`**`MyMenu`**`">`

    `      <attr name="SystemFileSystem.localizingBundle"`

    `            stringvalue="com.galileo.netbeans.module.Bundle"/>`

    `      <folder name="`**`MySubMenu`**`">`

    `         <attr name="`**`SystemFileSystem.localizingBundle`**`"`

    `               stringvalue="com.galileo.netbeans.module.Bundle"/>`

    `         <attr name="`**`SystemFileSystem.icon`**`"`

    `               urlvalue="`**`nbresloc`**`:/com/galileo/netbeans/module/icon.png"/>`

    `      </folder>`

    `   </folder>`

    `</folder>`


    ***清单 34-6.** Bundle.properties*


    **`Menu/MyMenu`**`=Extras`

    **`Menu/MyMenu/MySubMenu`**`=My Tools`


    ***清单 34-7.** Bundle_de.properties*


    **`Menu/MyMenu`**`=Extras`

    **`Menu/MyMenu/MySubMenu`**`=Meine Tools`


    系统文件系统提供了 `bundlevalue` 属性类型，用于国际化层文件中的属性。因此，你可以将例如由层文件中的属性确定的操作名称外包到属性包中。


    `<file name="com-galileo-netbeans-MyFirstAction.instance">`

    `   <attr name="`**`displayName`**`" bundlevalue="com.galileo.netbeans.module.Bundle#CTL_MyAction"/>`

    `</file>`


    因此，操作的名称由 `CTL_MyAction` 键确定。为此，请指明包和包的名称。最终使用哪个包取决于区域设置，并且是自动确定的。


    ### 本地化资源的管理和准备


    到目前为止，本讨论假设本地化资源已存储在模块所在的同一文件夹中，无论是 *Bundle.properties* 文件还是图形。但是，如何确保每种语言的资源被单独管理，以及如何稍后为已提供的模块添加额外的翻译？为此，NetBeans
    平台可以将要本地化的资源与模块的其余部分（主要是类）分离。图 34-3 显示了 *locale* 目录，该目录位于存储模块的目录之下。此文件夹中 JAR 归档文件中的某种语言的资源会附加一个语言/国家标识符。该归档文件与模块
    JAR 归档文件同名。在此*区域设置扩展归档文件*中，管理所有语言/国家特定的资源。它们具有与模块相同的包结构。这样，资源就被分离了，并且可以单独更新。例如，NetBeans
    平台模块的翻译就是以相同方式提供的。


    ![Image](img/3403.jpg)


    ***图 34-3.** 在目录 locale 的单独 JAR 归档文件中准备特定语言的资源*


    请注意，各个本地化资源仍然需要语言/国家标识符。*区域设置扩展归档文件*不需要清单文件，因为该归档文件完全由本地化包的名称标识，并被添加到模块类加载器的类路径中。


    在此示例中，德语的资源作为区域设置扩展归档文件位于 *locale* 文件夹中。没有标识符的英语资源是默认资源，位于模块的 JAR 归档文件中。现在，有趣的是，你可以将默认资源放入区域设置扩展归档文件中，因为它没有标识符，并且可以在
    *locale* 目录中提供；你计划本地化的资源与模块本身完全分离。当添加另一种语言是由第三方完成时，尤其如此，因为很明显哪些资源必须本地化。


    ### 总结


    本章展示了如何国际化应用程序，使其适应多种语言。你学习了国际化源代码和清单文件的细节，以及适配帮助页面和其他资源（如图形）的方法。


    ## 第 35 章


    ## 应用程序的品牌化与打包


    如第 3 章所述，NetBeans 平台使用两种不同类型的容器：*模块套件*和*NetBeans 平台应用程序*。模块套件代表纯相关模块的集合，而 NetBeans
    平台应用程序则为独立应用程序提供了基本结构。这意味着你可以根据用户需求定制 NetBeans 平台应用程序，然后从中创建可安装的包。以下部分将解释其工作原理。


    ### 品牌化


    平台应用程序提供了一个单独的对话框，用于所谓的品牌化，即应用程序的产品特定适配。此对话框中有许多设置，包括名称和不同图标的适配，以及确定启动画面和窗口系统的行为。有趣的是，你可以任意更改平台定义的所有文本，例如某些窗口的名称。在以下部分中，我们将对此进行更详细的探讨；首先，在你的平台应用程序的上下文菜单中单击*品牌化...*。NetBeans
    平台应用程序中的品牌化示例如图 35-1 所示。

