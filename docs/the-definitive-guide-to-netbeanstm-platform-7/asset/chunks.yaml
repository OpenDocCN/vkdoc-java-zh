- fmt: "# Creating and Positioning Menu and Menu Entries\n\nWhen creating an action\
    \ with the action wizard of the NetBeans IDE (see [Chapter 6](#Chapter06.html#ch6))\
    \ you can easily assign it to a menu and position it in the desired location via\
    \ the wizard GUI. So you know what happens meanwhile in the background—to change\
    \ something later or to be able to get by without the support of the NetBeans\
    \ IDE—I will explain the process of creating menu entries for your own actions.\n\
    \nFor example, say you want to add a menu entry to the *Edit* menu. To do this,\
    \ use the simple action class mentioned in the “Always Enabled Actions” section\
    \ in [Chapter 6](#Chapter06.html#ch6). You have not assigned the action to a menu\
    \ or toolbar there yet—so far, we have ignored the `ActionReferences` annotation,\
    \ which has automatically been created by the action wizard. Now, you need exactly\
    \ this annotation to assign an action to a menu (see [Listing 9-1](#Chapter09.html#list_9_1)).\n\
    \n***Listing 9-1.** Assign Actions to a Menu with Annotations*\n\n```\n@ActionID(\n\
    \    category = \"Edit\",\n    id = \"com.galileo.netbeans.module.MyFirstAction\"\
    )\n@ActionRegistration(\n    iconBase = \"com/galileo/netbeans/module/icon.png\"\
    ,\n    displayName = \"#CTL_MyFirstAction\")\n@ActionReferences({\n@ActionReference(\n\
    \        path = \"Menu/Edit\",\n        position = 1200)\n})\npublic final class\
    \ MyFirstAction implements ActionListener {\n    public void actionPerformed(ActionEvent\
    \ e) {\n        // TODO implement action body\n    }\n}\n```\n\nIn [Listing 9-1](#Chapter09.html#list_9_1)\
    \ you see that the `ActionReferences` annotation is a list of assignments. An\
    \ assignment is done by the `ActionReference` annotation. Specify with the `path`\
    \ attribute where the action will be displayed. `Menu` is a standard folder in\
    \ the System Filesystem in which the complete menu bar of your application is\
    \ managed. The menu is determined by the name that follows `Menu/`. In this example,\
    \ the action is displayed in the `Edit` menu. The name of the menu entry is given\
    \ by the action itself; it is the value determined by `displayName`. Additionally,\
    \ define the position of your action within the menu with the `position` attribute.\n\
    \n[Listing 9-2](#Chapter09.html#list_9_2) shows the effects of this annotation:\
    \ a correspondent entry is generated in the layer file when creating the software.\
    \ If you do not want to use an annotation, you can create this entry yourself\
    \ and assign your action to a menu this way, too.\n\n***Listing 9-2.** Assigning\
    \ Action to a Menu by Direct Layer Entry*\n\n```\n<filesystem>\n  <folder name=\"\
    Menu\">\n    <folder name=\"Edit\">\n      <file name=\"MyFirstAction.shadow\"\
    >\n        <attr name=\"originalFile\"\n         stringvalue=\"Actions/Edit/com-galileo-netbeans-module-MyFirstAction.instance\"\
    />\n        <attr name=\"position\" intvalue=\"1200\"/>\n      </file>\n    </folder>\n\
    \  </folder>\n</filesystem>\n```\n\nYou assigned the menu `Edit` with the `folder`\
    \ element in the standard folder `Menu`. The menu entry is added by the `file`\
    \ element. Now, referencing on the action class, which must be defined in the\
    \ standard folder `Actions`, follows with the attribute `originalFile`. Since\
    \ the module system brings together all layer files, the menu entries of all modules,\
    \ which are set below the folder `Edit`, are displayed in the *Edit* menu. So\
    \ a menu is only created by the definition with the `folder` element. Thus, you\
    \ have created your first menu entry. So far, we have assumed that the *Edit*\
    \ menu is already present. However, this must not be the case. Since menus do\
    \ not have to be explicitly applied, they are automatically created by the NetBeans\
    \ Platform. This way, you can easily create menus in any combination. So, for\
    \ example, to move the action above into a submenu of *Edit*, you just have to\
    \ modify the `path` attribute of the `ActionReference` annotation:\n\n```\n@ActionReference(\n\
    \    path = \"Menu/Edit/My Submenu\",\n    position = 1200)\n```\n\nThis leads\
    \ to another folder `My Submenu` in the layer file which represents the content\
    \ of the submenu, as shown in [Listing 9-3](#Chapter09.html#list_9_3) and [Figure\
    \ 9-1](#Chapter09.html#fig_9_1).\n\n***Listing 9-3.** Creating a Submenu*\n\n\
    ```\n<folder name=\"Menu\">\n  <folder name=\"Edit\">\n    <folder name=\"My Submenu\"\
    >\n      <file name=\"MyFirstAction.shadow\">\n        <attr name=\"originalFile\"\
    \n         stringvalue=\"Actions/Edit/com-galileo-netbeans-module-MyFirstAction.instance\"\
    />\n        <attr name=\"position\" intvalue=\"1200\"/>\n      </file>\n    </folder>\n\
    \  </folder>\n</folder>\n```\n\n![Image](images/0901.jpg)\n\n***Figure 9-1.**\
    \ Menu ![Image](images/U001.jpg) Submenu ![Image](images/U001.jpg) Menu entry*\n\
    \nYou can look at the order of menus or menu entries in the layer tree (see [Chapter\
    \ 3](#Chapter03.html#ch3)) before executing your application. In the preceding\
    \ examples, you learned how to determine the position of a menu entry by the `position`\
    \ attribute (either with the `ActionReference` annotation or directly in the layer\
    \ file). Since menus and submenus are implicitly applied when creating a menu\
    \ entry, you cannot determine the order via annotation. So when assigning a new\
    \ menu or submenu which you want to position exactly, you must assign the menu\
    \ before using it in the layer file. There you can determine the position as shown\
    \ in [Listing 9-4](#Chapter09.html#list_9_4). For more information see [Chapter\
    \ 3](#Chapter03.html#ch3).\n\n***Listing 9-4.** Determining the Position of a\
    \ Menu or Submenu*\n\n```\n<folder name=\"Menu\">\n  <folder name=\"Edit\">\n\
    \    <folder name=\"My Submenu\">\n      <attr name=\"position\" intvalue=\"800\"\
    />\n    </folder>\n  </folder>\n</folder>\n```\n\n## Insert Separator\n\nYou can\
    \ determine separators, which will be displayed between the menu entries, when\
    \ defining a menu entry with the `ActionReference` annotation. For this purpose,\
    \ the attributes `separatorBefore` and `separatorAfter` are provided. This is\
    \ when you enter their absolute position. To add a separator in front of the example\
    \ menu entry in [Listing 9-1](#Chapter09.html#list_9_1), extend the annotation\
    \ of the action as shown in [Listing 9-5](#Chapter09.html#list_9_5).\n\n***Listing\
    \ 9-5.** Adding Separator via Annotation Attribute*\n\n```\n@ActionReference(\n\
    \    path = \"Menu/Edit\",\n    position = 1200,\n    separatorBefore = 1190)\n\
    ```\n\nFurthermore, there is an opportunity to define separators directly in the\
    \ layer file. The layer entry would look like that shown in [Listing 9-6](#Chapter09.html#list_9_6),\
    \ analogous to the previous example.\n\n***Listing 9-6.** Adding Separator via\
    \ Layer Entry*\n\n```\n<folder name=\"Menu\">\n  <folder name=\"Edit\">\n    <folder\
    \ name=\"My Submenu\">\n      <file name=\"MyFirstAction.shadow\"> ... </file>\n\
    \      <file name=\"MyFirstAction-separatorBefore.instance\">\n        <attr name=\"\
    instanceCreate\" newvalue=\"javax.swing.JSeparator\"/>\n        <attr name=\"\
    position\" intvalue=\"1190\"/>\n      </file>\n    </folder>\n  </folder>\n</folder>\n\
    ```"
  raw: '#### Creating and Positioning Menu and Menu Entries


    When creating an action with the action wizard of the NetBeans IDE (see [Chapter
    6](#Chapter06.html#ch6)) you can easily assign it to a menu and position it in
    the desired location via the wizard GUI. So you know what happens meanwhile in
    the background—to change something later or to be able to get by without the support
    of the NetBeans IDE—I will explain the process of creating menu entries for your
    own actions.


    For example, say you want to add a menu entry to the *Edit* menu. To do this,
    use the simple action class mentioned in the “Always Enabled Actions” section
    in [Chapter 6](#Chapter06.html#ch6). You have not assigned the action to a menu
    or toolbar there yet—so far, we have ignored the `ActionReferences` annotation,
    which has automatically been created by the action wizard. Now, you need exactly
    this annotation to assign an action to a menu (see [Listing 9-1](#Chapter09.html#list_9_1)).


    ***Listing 9-1.** Assign Actions to a Menu with Annotations*


    `@ActionID(`

    `    category = "Edit",`

    `    id = "com.galileo.netbeans.module.MyFirstAction")`

    `@ActionRegistration(`

    `    iconBase = "com/galileo/netbeans/module/icon.png",`

    `    displayName = "#CTL_MyFirstAction")`

    **`@ActionReferences`**`({`

    **`@ActionReference`**`(`

    `        path = "Menu/Edit",`

    `        position = 1200)`

    `})`

    `public final class MyFirstAction implements ActionListener {`

    `    public void actionPerformed(ActionEvent e) {`

    `        // TODO implement action body`

    `    }`

    `}`


    In [Listing 9-1](#Chapter09.html#list_9_1) you see that the `ActionReferences`
    annotation is a list of assignments. An assignment is done by the `ActionReference`
    annotation. Specify with the `path` attribute where the action will be displayed.
    `Menu` is a standard folder in the System Filesystem in which the complete menu
    bar of your application is managed. The menu is determined by the name that follows
    `Menu/`. In this example, the action is displayed in the `Edit` menu. The name
    of the menu entry is given by the action itself; it is the value determined by
    `displayName`. Additionally, define the position of your action within the menu
    with the `position` attribute.


    [Listing 9-2](#Chapter09.html#list_9_2) shows the effects of this annotation:
    a correspondent entry is generated in the layer file when creating the software.
    If you do not want to use an annotation, you can create this entry yourself and
    assign your action to a menu this way, too.


    ***Listing 9-2.** Assigning Action to a Menu by Direct Layer Entry*


    `<filesystem>`

    `  <folder name="`**`Menu`**`">`

    `    <folder name="`**`Edit`**`">`

    `      <file name="`**`MyFirstAction.shadow`**`">`

    `        <attr name="originalFile"`

    `         stringvalue="Actions/Edit/com-galileo-netbeans-module-`**`MyFirstAction.instance`**`"/>`

    `        <attr name="position" intvalue="1200"/>`

    `      </file>`

    `    </folder>`

    `  </folder>`

    `</filesystem>`


    You assigned the menu `Edit` with the `folder` element in the standard folder
    `Menu`. The menu entry is added by the `file` element. Now, referencing on the
    action class, which must be defined in the standard folder `Actions`, follows
    with the attribute `originalFile`. Since the module system brings together all
    layer files, the menu entries of all modules, which are set below the folder `Edit`,
    are displayed in the *Edit* menu. So a menu is only created by the definition
    with the `folder` element. Thus, you have created your first menu entry. So far,
    we have assumed that the *Edit* menu is already present. However, this must not
    be the case. Since menus do not have to be explicitly applied, they are automatically
    created by the NetBeans Platform. This way, you can easily create menus in any
    combination. So, for example, to move the action above into a submenu of *Edit*,
    you just have to modify the `path` attribute of the `ActionReference` annotation:


    `@ActionReference(`

    `    path = "Menu/Edit/`**`My Submenu`**`",`

    `    position = 1200)`


    This leads to another folder `My Submenu` in the layer file which represents the
    content of the submenu, as shown in [Listing 9-3](#Chapter09.html#list_9_3) and
    [Figure 9-1](#Chapter09.html#fig_9_1).


    ***Listing 9-3.** Creating a Submenu*


    `<folder name="`**`Menu`**`">`

    `  <folder name="`**`Edit`**`">`

    `    <folder name="`**`My Submenu`**`">`

    `      <file name="MyFirstAction.shadow">`

    `        <attr name="originalFile"`

    `         stringvalue="Actions/Edit/com-galileo-netbeans-module-MyFirstAction.instance"/>`

    `        <attr name="position" intvalue="1200"/>`

    `      </file>`

    `    </folder>`

    `  </folder>`

    `</folder>` ![Image](images/0901.jpg)


    ***Figure 9-1.** Menu ![Image](images/U001.jpg) Submenu ![Image](images/U001.jpg)
    Menu entry*


    You can look at the order of menus or menu entries in the layer tree (see [Chapter
    3](#Chapter03.html#ch3)) before executing your application. In the preceding examples,
    you learned how to determine the position of a menu entry by the `position` attribute
    (either with the `ActionReference` annotation or directly in the layer file).
    Since menus and submenus are implicitly applied when creating a menu entry, you
    cannot determine the order via annotation. So when assigning a new menu or submenu
    which you want to position exactly, you must assign the menu before using it in
    the layer file. There you can determine the position as shown in [Listing 9-4](#Chapter09.html#list_9_4).
    For more information see [Chapter 3](#Chapter03.html#ch3).


    ***Listing 9-4.** Determining the Position of a Menu or Submenu*


    `<folder name="`**`Menu`**`">`

    `  <folder name="`**`Edit`**`">`

    `    <folder name="`**`My Submenu`**`">`

    `      <attr name="position" intvalue="800"/>`

    `    </folder>`

    `  </folder>`

    `</folder>`


    #### Insert Separator


    You can determine seperators, which will be displayed between the menu entries,
    when defining a menu entry with the `ActionReference` annotation. For this purpose,
    the attributes `separatorBefore` and `separatorAfter` are provided. This is when
    you enter their absolute position. To add a separator in front of the example
    menu entry in [Listing 9-1](#Chapter09.html#list_9_1), extend the annotation of
    the action as shown in [Listing 9-5](#Chapter09.html#list_9_5).


    ***Listing 9-5.** Adding Separator via Annotation Attribute*


    `@ActionReference(`

    `    path = "Menu/Edit",`

    `    position = 1200,`

    **`separatorBefore = 1190`**`)`


    Furthermore, there is an opportunity to define separators directly in the layer
    file. The layer entry would look like that shown in [Listing 9-6](#Chapter09.html#list_9_6),
    analogous to the previous example.


    ***Listing 9-6.** Adding Separator via Layer Entry*


    `<folder name="Menu">`

    `  <folder name="Edit">`

    `    <folder name="My Submenu">`

    `      <file name="MyFirstAction.shadow"> ... </file>`

    **`<file name="MyFirstAction-separatorBefore.instance">`**

    **`<attr name="instanceCreate" newvalue="javax.swing.JSeparator"/>`**

    **`<attr name="position" intvalue="1190"/>`**

    **`</file>`**

    `    </folder>`

    `  </folder>`

    `</folder>`'
  trans: '

    #### 创建菜单位置与菜单项


    使用 NetBeans IDE 的操作向导创建操作时（参见第 6 章），你可以通过向导图形界面轻松将其分配到菜单并定位到所需位置。为了让你了解后台实际发生的过程——以便日后修改或脱离
    NetBeans IDE 支持也能独立操作——我将详细解释为自定义操作创建菜单项的方法。


    例如，假设你想在*编辑*菜单中添加一个菜单项。为此，请使用第 6 章中“始终启用的操作”一节提到的简单操作类。你尚未将该操作分配到菜单或工具栏——到目前为止，我们忽略了由操作向导自动创建的
    `ActionReferences` 注解。现在，你需要使用这个注解将操作分配到菜单（参见清单 9-1）。


    ***清单 9-1.** 使用注解将操作分配到菜单*


    `@ActionID(`

    `    category = "Edit",`

    `    id = "com.galileo.netbeans.module.MyFirstAction")`

    `@ActionRegistration(`

    `    iconBase = "com/galileo/netbeans/module/icon.png",`

    `    displayName = "#CTL_MyFirstAction")`

    **`@ActionReferences`**`({`

    **`@ActionReference`**`(`

    `        path = "Menu/Edit",`

    `        position = 1200)`

    `})`

    `public final class MyFirstAction implements ActionListener {`

    `    public void actionPerformed(ActionEvent e) {`

    `        // TODO implement action body`

    `    }`

    `}`


    在清单 9-1 中，你可以看到 `ActionReferences` 注解是一个分配列表。每次分配通过 `ActionReference` 注解完成。使用
    `path` 属性指定操作显示的位置。`Menu` 是系统文件系统中的一个标准文件夹，用于管理应用程序的完整菜单栏。菜单由 `Menu/` 后面的名称决定。在此示例中，操作显示在
    `Edit` 菜单中。菜单项的名称由操作本身决定，即 `displayName` 确定的值。此外，使用 `position` 属性定义操作在菜单中的位置。


    清单 9-2 展示了此注解的效果：在创建软件时，会在层文件中生成一个对应的条目。如果你不想使用注解，也可以自行创建此条目，从而将操作分配到菜单。


    ***清单 9-2.** 通过直接层条目将操作分配到菜单*


    `<filesystem>`

    `  <folder name="`**`Menu`**`">`

    `    <folder name="`**`Edit`**`">`

    `      <file name="`**`MyFirstAction.shadow`**`">`

    `        <attr name="originalFile"`

    `         stringvalue="Actions/Edit/com-galileo-netbeans-module-`**`MyFirstAction.instance`**`"/>`

    `        <attr name="position" intvalue="1200"/>`

    `      </file>`

    `    </folder>`

    `  </folder>`

    `</filesystem>`


    你使用标准文件夹 `Menu` 中的 `folder` 元素分配了 `Edit` 菜单。菜单项通过 `file` 元素添加。接着，通过 `originalFile`
    属性引用操作类，该类必须在标准文件夹 `Actions` 中定义。由于模块系统会合并所有层文件，因此所有在 `Edit` 文件夹下设置的模块菜单项都会显示在*编辑*菜单中。因此，菜单仅通过
    `folder` 元素的定义创建。至此，你已经创建了第一个菜单项。到目前为止，我们假设 *Edit* 菜单已经存在。但情况并非必须如此。由于菜单无需显式应用，它们由
    NetBeans 平台自动创建。这样，你可以轻松创建任意组合的菜单。例如，要将上述操作移动到 *Edit* 的子菜单中，只需修改 `ActionReference`
    注解的 `path` 属性：


    `@ActionReference(`

    `    path = "Menu/Edit/`**`My Submenu`**`",`

    `    position = 1200)`


    这会在层文件中生成另一个文件夹 `My Submenu`，用于表示子菜单的内容，如清单 9-3 和图 9-1 所示。


    ***清单 9-3.** 创建子菜单*


    `<folder name="`**`Menu`**`">`

    `  <folder name="`**`Edit`**`">`

    `    <folder name="`**`My Submenu`**`">`

    `      <file name="MyFirstAction.shadow">`

    `        <attr name="originalFile"`

    `         stringvalue="Actions/Edit/com-galileo-netbeans-module-MyFirstAction.instance"/>`

    `        <attr name="position" intvalue="1200"/>`

    `      </file>`

    `    </folder>`

    `  </folder>`

    `</folder>` ![Image](img/0901.jpg)


    ***图 9-1.** 菜单 ![Image](img/U001.jpg) 子菜单 ![Image](img/U001.jpg) 菜单项*


    你可以在运行应用程序之前，在层树中查看菜单或菜单项的顺序（参见第 3 章）。在前面的示例中，你学习了如何通过 `position` 属性（使用 `ActionReference`
    注解或直接在层文件中）确定菜单项的位置。由于菜单和子菜单在创建菜单项时会隐式应用，因此无法通过注解确定顺序。因此，当分配一个需要精确定位的新菜单或子菜单时，你必须在层文件中使用该菜单之前先进行分配。在那里，你可以像清单
    9-4 所示那样确定位置。更多信息请参见第 3 章。


    ***清单 9-4.** 确定菜单或子菜单的位置*


    `<folder name="`**`Menu`**`">`

    `  <folder name="`**`Edit`**`">`

    `    <folder name="`**`My Submenu`**`">`

    `      <attr name="position" intvalue="800"/>`

    `    </folder>`

    `  </folder>`

    `</folder>`


    #### 插入分隔符


    在使用 `ActionReference` 注解定义菜单项时，你可以确定显示在菜单项之间的分隔符。为此，提供了 `separatorBefore` 和 `separatorAfter`
    属性。这需要你输入它们的绝对位置。要在清单 9-1 的示例菜单项前添加分隔符，请按清单 9-5 所示扩展操作的注解。


    ***清单 9-5.** 通过注解属性添加分隔符*


    `@ActionReference(`

    `    path = "Menu/Edit",`

    `    position = 1200,`

    **`separatorBefore = 1190`**`)`


    此外，还可以直接在层文件中定义分隔符。与上一个示例类似，层条目将如清单 9-6 所示。


    ***清单 9-6.** 通过层条目添加分隔符*


    `<folder name="Menu">`

    `  <folder name="Edit">`

    `    <folder name="My Submenu">`

    `      <file name="MyFirstAction.shadow"> ... </file>`

    **`<file name="MyFirstAction-separatorBefore.instance">`**

    **`<attr name="instanceCreate" newvalue="javax.swing.JSeparator"/>`**

    **`<attr name="position" intvalue="1190"/>`**

    **`</file>`**

    `    </folder>`

    `  </folder>`

    `</folder>`

    '
- fmt: "# Hiding Present Menu Entries\n\nYou also have the possibility of hiding preexisting\
    \ menus or menu entries, which either derive from Platform modules or were added\
    \ by other application modules. This is quite easy because of the layer tree.\
    \ To do so, open the folder *Important Files ![Image](images/U001.jpg) XML Layer\
    \ ![Image](images/U001.jpg) <this layer in context>* in your module. The entries\
    \ you defined are shown there, as well as those from other modules of your application\
    \ or from Platform modules. Below the *Menu Bar* folder you see all menus and\
    \ menu entries. Choose the desired entry here and delete it via the context menu.\
    \ They will not actually be deleted now, but just set as invisible in your layer\
    \ file, assuming you deleted the *View* menu and the menu entry *Edit* ![Image](images/U001.jpg)\
    \ *Find*…. In this case, the entries in [Listing 9-7](#Chapter09.html#list_9_7)\
    \ are added to your layer file.\n\n***Listing 9-7.** Hiding of Menu Entries*\n\
    \n```\n<folder name=\"Menu\">\n  <folder name=\"View_hidden\"/>\n  <folder name=\"\
    Edit\">\n    <file name=\"org-openide-actions-FindAction.shadow_hidden\"/>\n \
    \ </folder>\n</folder>\n```\n\nSo the suffix `_hidden` is added to the according\
    \ entry. If you now want to add a deleted (i.e. a hidden) entry again, just remove\
    \ the suffix from your layer file.\n\n## Shortcuts and Mnemonics\n\nShortcuts\
    \ are defined and managed centrally in the layer file. This is why the standard\
    \ folder `Shortcuts` exists. The shortcut is defined by the `file` element and\
    \ is referred on an action class as an attribute from the central `Actions` folder.\
    \ So a shortcut is not created for a menu entry, but for an action. A shortcut\
    \ consists of one or more modifiers and an identifier, separated by a minus sign:\n\
    \n`modifier-identifier`\n\nThe following keys can be used as modifiers which are\
    \ represented by a letter (code) in the layer file:\n\n*   C – (Ctrl)\n*   A –\
    \ (Alt)\n*   S – (Shift)\n*   M – (Cmd)/(Meta)\n\nFurthermore, there are two wildcard\
    \ codes that ensure that the shortcuts are independent from the operating system;\
    \ these should be used:\n\n*   D – (Ctrl) or (Cmd)/(Meta) (with Mac OS)\n*   O\
    \ – Alt) or (Ctrl) (with Mac OS)\n\nAll constants, which are defined by the Java\
    \ class `KeyEvent`, can be used as identifier. For example, for `KeyEvent.VK_M`,\
    \ just omit the prefix `VK_`, so the identifier would be `M`.\n\nAs mentioned\
    \ at the beginning of this section, shortcuts are managed in the layer file, even\
    \ though you can create them with an `ActionReference` annotation in a simple\
    \ manner. This means, creating a shortcut is analogous to creating a menu entry.\
    \ For example, using the shortcut (Ctrl) + (M) concerning the action `MyFirstAction`,\
    \ you add the annotation shown in [Listing 9-8](#Chapter09.html#list_9_8).\n\n\
    ***Listing 9-8.** Definition of a Shortcut with Annotations*\n\n```\n@ActionID(\n\
    \   category = \"Edit\",\n   id = \"com.galileo.netbeans.module.MyFirstAction\"\
    )\n@ActionRegistration(\n   iconBase = \"com/galileo/netbeans/module/icon.png\"\
    ,\n   displayName = \"#CTL_MyFirstAction\")\n@ActionReferences({\n    @ActionReference(path\
    \ = \"Menu/Edit\", position = 100),\n    @ActionReference(path = \"Shortcuts\"\
    , name = \"D-M\")\n})\npublic final class MyFirstAction implements ActionListener\
    \ {\n   ... }\n```\n\nThis annotation leads to a layer entry as shown in [Listing\
    \ 9-9](#Chapter09.html#list_9_9). This means, defining shortcuts, you have the\
    \ option of using a direct layer entry if you do not want to use annotations that\
    \ represent the preferred variant (see [Listing 9-9](#Chapter09.html#list_9_9)).\n\
    \n***Listing 9-9.** Definition of Shortcuts in the Layer File*\n\n```\n<folder\
    \ name=\"Shortcuts\">\n   <file name=\"D-M.shadow\">\n      <attr name=\"originalFile\"\
    \n            stringvalue=\"Actions/Edit/com-galileo-netbeans-module-MyFirstAction.instance\"\
    />\n    </file>\n</folder>\n```\n\nIn this context, it can be helpful to look\
    \ at the Javadocs of the functions `Utilities.keyToString()` and `Utilities.stringToKey()`,\
    \ which are used to encode the shortcuts. Some possible combinations are listed\
    \ in [Table 9-1](#Chapter09.html#tab_9_1) as an example. If you do not know the\
    \ spelling for a certain key, you can also use the action wizard (see [Chapter\
    \ 6](#Chapter06.html#ch6)).\n\n![Image](images/t0901.jpg)\n\nMnemonics are inserted\
    \ directly by setting an ampersand (&) before the corresponding character in the\
    \ name of an action. This can also take place in the action class or in a properties\
    \ file:\n\n`CTL_OpenMyWindow=Open MyWindow`\n\nBear in mind that the mnemonics\
    \ are displayed only when holding the (Alt) key.\n\n## Creating Your Own Menu\
    \ Bar\n\nIf you want to create your own menu bar to use within a module, you can\
    \ easily use the features of the NetBeans APIs. The Data Systems API actually\
    \ provides a subclass of the `JMenubar` class with the class `MenuBar`. This class\
    \ can create a `DataFolder` object out of its content, so you can define your\
    \ own menu like the standard menu in the layer file of your module.\n\nNow, only\
    \ a `DataFolder` object needs to be created, too. To do this, you need to get\
    \ access to the root folder of our menu by the method `FileUtil.getConfigFile()`.\
    \ In this example it is called `MyModuleMenu`. For this module you create a `DataFolder`\
    \ object and transfer this directly to the `MenuBar` constructor with the static\
    \ method `findFolder()`, as shown in [Listing 9-10](#Chapter09.html#list_9_10).\n\
    \n***Listing 9-10.** Creating Your Own Menu Bar That Reads Its Content out of\
    \ the System Filesystem*\n\n```\nFileObject menu = FileUtil.getConfigFile(\"MyModuleMenu\"\
    );\nMenuBar    bar  = new MenuBar(DataFolder.findFolder(menu));\n```\n\n# Toolbar\n\
    \n## Creating Toolbar and Toolbar Actions\n\nYou can add actions to the toolbar\
    \ the same way you add actions to the menu bar. You can use the existing toolbar\
    \ or create any number of custom toolbars to group your toolbar buttons. Toolbars\
    \ are defined in the standard folder `Toolbars` in the layer file. As described\
    \ in the “Menu Bar” section, use the `ActionReference` annotation to add an action\
    \ to a toolbar. You want to add the action class to the `MyFirstAction` toolbar,\
    \ as shown in [Listing 9-11](#Chapter09.html#list_9_11).\n\n***Listing 9-11.**\
    \ Adding an Action to a Toolbar with Annotations*\n\n```\n@ActionID(\n    category\
    \ = \"Edit\",\n    id = \"com.galileo.netbeans.module.MyFirstAction\")\n@ActionRegistration(\n\
    \    iconBase = \"com/galileo/netbeans/module/icon.png\",\n    displayName = \"\
    #CTL_MyFirstAction\")\n@ActionReferences({\n    @ActionReference(\n        path\
    \ = \"Toolbars/MyToolbars\",\n        position = 100)\n})\npublic final class\
    \ MyFirstAction implements ActionListener {\n    public void actionPerformed(ActionEvent\
    \ e) {\n        // TODO implement action body\n    }\n}\n```\n\nAs you see in\
    \ [Listing 9-11](#Chapter09.html#list_9_11), a toolbar only differentiates from\
    \ a menu entry by the corresponding path specification. A menu entry refers to\
    \ an action in the standard folder `Menu` with the `ActionReference` annotation,\
    \ while for a toolbar action the standard folder `Toolbars` is used. Remember\
    \ that for a toolbar action the action class is provided with a corresponding\
    \ icon by the `iconBase` attribute.\n\nAnalogous to the menu bar, such an annotation\
    \ leads to an automatically created layer entry. If you do not want to use annotations,\
    \ you can also add your toolbar actions by direct entries into the layer file\
    \ of a toolbar. An entry that matches [Listing 9-9](#Chapter09.html#list_9_9)\
    \ would look like that shown in [Listing 9-12](#Chapter09.html#list_9_12).\n\n\
    ***Listing 9-12.** Adding an Action to a Toolbar with Direct Layer Entry*\n\n\
    ```\n<folder name=\"Toolbars\">\n  <folder name=\"MyToolbar\">\n    <file name=\"\
    MyFirstAction.shadow\">\n      <attr name=\"originalFile\"\n            stringvalue=\"\
    Actions/Edit/com-galileo-netbeans-module-MyFirstAction.instance\"/>\n    </file>\n\
    \  </folder>\n</folder>\n```"
  raw: '#### Hiding Present Menu Entries


    You also have the possibility of hiding preexisting menus or menu entries, which
    either derive from Platform modules or were added by other application modules.
    This is quite easy because of the layer tree. To do so, open the folder *Important
    Files ![Image](images/U001.jpg) XML Layer ![Image](images/U001.jpg) <this layer
    in context>* in your module. The entries you defined are shown there, as well
    as those from other modules of your application or from Platform modules. Below
    the *Menu Bar* folder you see all menus and menu entries. Choose the desired entry
    here and delete it via the context menu. They will not actually be deleted now,
    but just set as invisible in your layer file, assuming you deleted the *View*
    menu and the menu entry *Edit* ![Image](images/U001.jpg) *Find*…. In this case,
    the entries in [Listing 9-7](#Chapter09.html#list_9_7) are added to your layer
    file.


    ***Listing 9-7.** Hiding of Menu Entries*


    `<folder name="Menu">`

    `  <folder name="View`**`_hidden`**`"/>`

    `  <folder name="Edit">`

    `    <file name="org-openide-actions-FindAction.shadow`**`_hidden`**`"/>`

    `  </folder>`

    `</folder>`


    So the suffix `_hidden` is added to the according entry. If you now want to add
    a deleted (i.e. a hidden) entry again, just remove the suffix from your layer
    file.


    #### Shortcuts and Mnemonics


    Shortcuts are defined and managed centrally in the layer file. This is why the
    standard folder `Shortcuts` exists. The shortcut is defined by the `file` element
    and is referred on an action class as an attribute from the central `Actions`
    folder. So a shortcut is not created for a menu entry, but for an action. A shortcut
    consists of one or more modifiers and an identifier, separated by a minus sign:


    `modifier-identifier`


    The following keys can be used as modifiers which are represented by a letter
    (code) in the layer file:


    *   C – (Ctrl)

    *   A – (Alt)

    *   S – (Shift)

    *   M – (Cmd)/(Meta)


    Furthermore, there are two wildcard codes that ensure that the shortcuts are independent
    from the operating system; these should be used:


    *   D – (Ctrl) or (Cmd)/(Meta) (with Mac OS)

    *   O – Alt) or (Ctrl) (with Mac OS)


    All constants, which are defined by the Java class `KeyEvent`, can be used as
    identifier. For example, for `KeyEvent.VK_M`, just omit the prefix `VK_`, so the
    identifier would be `M`.


    As mentioned at the beginning of this section, shortcuts are managed in the layer
    file, even though you can create them with an `ActionReference` annotation in
    a simple manner. This means, creating a shortcut is analogous to creating a menu
    entry. For example, using the shortcut (Ctrl) + (M) concerning the action `MyFirstAction`,
    you add the annotation shown in [Listing 9-8](#Chapter09.html#list_9_8).


    ***Listing 9-8.** Definition of a Shortcut with Annotations*


    `@ActionID(`

    `   category = "Edit",`

    `   id = "com.galileo.netbeans.module.MyFirstAction")`

    `@ActionRegistration(`

    `   iconBase = "com/galileo/netbeans/module/icon.png",`

    `   displayName = "#CTL_MyFirstAction")`

    `@ActionReferences({`

    `    @ActionReference(path = "Menu/Edit", position = 100),`

    **`@ActionReference(path = "Shortcuts", name = "D-M")`**

    `})`

    `public final class MyFirstAction implements ActionListener {`

    `   ... }`


    This annotation leads to a layer entry as shown in [Listing 9-9](#Chapter09.html#list_9_9).
    This means, defining shortcuts, you have the option of using a direct layer entry
    if you do not want to use annotations that represent the preferred variant (see
    [Listing 9-9](#Chapter09.html#list_9_9)).


    ***Listing 9-9.** Definition of Shortcuts in the Layer File*


    `<folder name="`**`Shortcuts`**`">`

    `   <file name="`**`D-M`**`.shadow">`

    `      <attr name="originalFile"`

    `            stringvalue="Actions/Edit/com-galileo-netbeans-module-MyFirstAction.instance"/>`

    `    </file>`

    `</folder>`


    In this context, it can be helpful to look at the Javadocs of the functions `Utilities.keyToString()`
    and `Utilities.stringToKey()`, which are used to encode the shortcuts. Some possible
    combinations are listed in [Table 9-1](#Chapter09.html#tab_9_1) as an example.
    If you do not know the spelling for a certain key, you can also use the action
    wizard (see [Chapter 6](#Chapter06.html#ch6)).


    ![Image](images/t0901.jpg)


    Mnemonics are inserted directly by setting an ampersand (&) before the corresponding
    character in the name of an action. This can also take place in the action class
    or in a properties file:


    `CTL_OpenMyWindow=Open MyWind`**`&`**`ow`


    bear in mind that the mnemonics are displayed only when holding the (Alt) key.


    #### Creating Your Own Menu Bar


    If you want to create your own menu bar to use within a module, you can easily
    use the features of the NetBeans APIs. The Data Systems API actually provides
    a subclass of the `JMenubar` class with the class `MenuBar`. This class can create
    a `DataFolder` object out of its content, so you can define your own menu like
    the standard menu in the layer file of your module.


    Now, only a `DataFolder` object needs to be created, too. To do this, you need
    to get access to the root folder of our menu by the method `FileUtil.getConfigFile()`.
    In this example it is called `MyModuleMenu`. For this module you create a `DataFolder`
    object and transfer this directly to the `MenuBar` constructor with the static
    method `findFolder()`, as shown in [Listing 9-10](#Chapter09.html#list_9_10).


    ***Listing 9-10.** Creating Your Own Menu Bar That Reads Its Content out of the
    System Filesystem*


    `FileObject menu = FileUtil.getConfigFile("`**`MyModuleMenu`**`");`

    `MenuBar    bar  = new MenuBar(DataFolder.`**`findFolder`**`(menu));`


    ### Toolbar


    #### Creating Toolbar and Toolbar Actions


    You can add actions to the toolbar the same way you add actions to the menu bar.
    You can use the existing toolbar or create any number of custom toolbars to group
    your toolbar buttons. Toolbars are defined in the standard folder `Toolbars` in
    the layer file. As described in the “Menu Bar” section, use the `ActionReference`
    annotation to add an action to a toolbar. You want to add the action class to
    the `MyFirstAction` toolbar, as shown in [Listing 9-11](#Chapter09.html#list_9_11).


    ***Listing 9-11.** Adding an Action to a Toolbar with Annotations*


    `@ActionID(`

    `    category = "Edit",`

    `    id = "com.galileo.netbeans.module.MyFirstAction")`

    `@ActionRegistration(`

    `    iconBase = "com/galileo/netbeans/module/icon.png",`

    `    displayName = "#CTL_MyFirstAction")`

    `@ActionReferences({`

    **`@ActionReference`**`(`

    `        path = "`**`Toolbars`**`/`**`MyToolbars`**`",`

    `        position = 100)`

    `})`

    `public final class MyFirstAction implements ActionListener {`

    `    public void actionPerformed(ActionEvent e) {`

    `        // TODO implement action body`

    `    }`

    `}`


    As you see in [Listing 9-11](#Chapter09.html#list_9_11), a toolbar only differentiates
    from a menu entry by the corresponding path specification. A menu entry refers
    to an action in the standard folder `Menu` with the `ActionReference` annotation,
    while for a toolbar action the standard folder `Toolbars` is used. Remember that
    for a toolbar action the action class is provided with a corresponding icon by
    the `iconBase` attribute.


    Analogous to the menu bar, such an annotation leads to an automatically created
    layer entry. If you do not want to use annotations, you can also add your toolbar
    actions by direct entries into the layer file of a toolbar. An entry that matches
    [Listing 9-9](#Chapter09.html#list_9_9) would look like that shown in [Listing
    9-12](#Chapter09.html#list_9_12).


    ***Listing 9-12.** Adding an Action to a Toolbar with Direct Layer Entry*


    `<folder name="`**`Toolbars`**`">`

    `  <folder name="`**`MyToolbar`**`">`

    `    <file name="MyFirstAction.shadow">`

    `      <attr name="originalFile"`

    `            stringvalue="Actions/Edit/com-galileo-netbeans-module-MyFirstAction.instance"/>`

    `    </file>`

    `  </folder>`

    `</folder>`'
  trans: '

    #### 隐藏现有菜单项


    您也可以隐藏现有的菜单或菜单项，这些菜单项可能来自平台模块，也可能由其他应用程序模块添加。由于层级树的存在，这非常容易实现。为此，请在您的模块中打开文件夹
    *重要文件 ![Image](img/U001.jpg) XML 层级 ![Image](img/U001.jpg) <上下文中的此层级>*。您定义的条目以及来自应用程序其他模块或平台模块的条目都会显示在此处。在
    *菜单栏* 文件夹下方，您可以看到所有菜单和菜单项。在此处选择所需的条目，并通过上下文菜单将其删除。它们实际上并不会被删除，而只是在您的层级文件中被设置为不可见，假设您删除了
    *视图* 菜单和菜单项 *编辑* ![Image](img/U001.jpg) *查找*…。在这种情况下，清单 9-7 中的条目会被添加到您的层级文件中。


    ***清单 9-7.** 隐藏菜单项*


    `<folder name="Menu">`

    `  <folder name="View`**`_hidden`**`"/>`

    `  <folder name="Edit">`

    `    <file name="org-openide-actions-FindAction.shadow`**`_hidden`**`"/>`

    `  </folder>`

    `</folder>`


    因此，后缀 `_hidden` 被添加到相应的条目中。如果您现在想重新添加一个已删除（即已隐藏）的条目，只需从您的层级文件中移除该后缀即可。


    #### 快捷键和助记符


    快捷键在层级文件中集中定义和管理。这就是标准文件夹 `Shortcuts` 存在的原因。快捷键由 `file` 元素定义，并在中央 `Actions` 文件夹中作为属性引用到某个操作类。因此，快捷键不是为菜单项创建的，而是为操作创建的。一个快捷键由一个或多个修饰键和一个标识符组成，它们之间用减号分隔：


    `modifier-identifier`


    以下键可用作修饰键，在层级文件中由一个字母（代码）表示：


    *   C – (Ctrl)

    *   A – (Alt)

    *   S – (Shift)

    *   M – (Cmd)/(Meta)


    此外，还有两个通配符代码，用于确保快捷键与操作系统无关；应使用这些代码：


    *   D – (Ctrl) 或 (Cmd)/(Meta) (在 Mac OS 上)

    *   O – (Alt) 或 (Ctrl) (在 Mac OS 上)


    所有由 Java 类 `KeyEvent` 定义的常量都可用作标识符。例如，对于 `KeyEvent.VK_M`，只需省略前缀 `VK_`，因此标识符就是
    `M`。


    如本节开头所述，快捷键在层级文件中进行管理，尽管您可以通过 `ActionReference` 注解以简单的方式创建它们。这意味着，创建快捷键类似于创建菜单项。例如，要为操作
    `MyFirstAction` 使用快捷键 (Ctrl) + (M)，您可以添加 清单 9-8 中所示的注解。


    ***清单 9-8.** 使用注解定义快捷键*


    `@ActionID(`

    `   category = "Edit",`

    `   id = "com.galileo.netbeans.module.MyFirstAction")`

    `@ActionRegistration(`

    `   iconBase = "com/galileo/netbeans/module/icon.png",`

    `   displayName = "#CTL_MyFirstAction")`

    `@ActionReferences({`

    `    @ActionReference(path = "Menu/Edit", position = 100),`

    **`@ActionReference(path = "Shortcuts", name = "D-M")`**

    `})`

    `public final class MyFirstAction implements ActionListener {`

    `   ... }`


    此注解会生成如 清单 9-9 所示的层级条目。这意味着，在定义快捷键时，如果您不想使用代表首选方式的注解，可以选择直接使用层级条目（参见 清单 9-9）。


    ***清单 9-9.** 在层级文件中定义快捷键*


    `<folder name="`**`Shortcuts`**`">`

    `   <file name="`**`D-M`**`.shadow">`

    `      <attr name="originalFile"`

    `            stringvalue="Actions/Edit/com-galileo-netbeans-module-MyFirstAction.instance"/>`

    `    </file>`

    `</folder>`


    在此上下文中，查看 `Utilities.keyToString()` 和 `Utilities.stringToKey()` 函数的 Javadoc 可能会有所帮助，这些函数用于编码快捷键。表
    9-1 中列出了一些可能的组合作为示例。如果您不确定某个特定键的拼写，也可以使用操作向导（参见第 6 章）。


    ![Image](img/t0901.jpg)


    助记符是通过在操作名称中相应字符前设置一个 & 符号 (&) 直接插入的。这也可以在操作类或属性文件中进行：


    `CTL_OpenMyWindow=Open MyWind`**`&`**`ow`


    请记住，助记符仅在按住 (Alt) 键时才会显示。


    #### 创建您自己的菜单栏


    如果您想创建自己的菜单栏以在模块中使用，可以轻松地使用 NetBeans API 的功能。数据系统 API 实际上提供了一个 `JMenubar` 类的子类，即
    `MenuBar` 类。这个类可以根据其内容创建一个 `DataFolder` 对象，因此您可以像在模块的层级文件中定义标准菜单一样定义自己的菜单。


    现在，只需要再创建一个 `DataFolder` 对象。为此，您需要通过方法 `FileUtil.getConfigFile()` 获取对菜单根文件夹的访问权限。在此示例中，它被称为
    `MyModuleMenu`。对于此模块，您创建一个 `DataFolder` 对象，并使用静态方法 `findFolder()` 将其直接传递给 `MenuBar`
    构造函数，如 清单 9-10 所示。


    ***清单 9-10.** 创建您自己的菜单栏，该菜单栏从系统文件系统中读取其内容*


    `FileObject menu = FileUtil.getConfigFile("`**`MyModuleMenu`**`");`

    `MenuBar    bar  = new MenuBar(DataFolder.`**`findFolder`**`(menu));`


    ### 工具栏


    #### 创建工具栏和工具栏操作


    您可以像向菜单栏添加操作一样，向工具栏添加操作。您可以使用现有的工具栏，也可以创建任意数量的自定义工具栏来对您的工具栏按钮进行分组。工具栏在层级文件的标准文件夹
    `Toolbars` 中定义。如“菜单栏”部分所述，使用 `ActionReference` 注解将操作添加到工具栏。您希望将操作类添加到 `MyFirstAction`
    工具栏，如 清单 9-11 所示。


    ***清单 9-11.** 使用注解向工具栏添加操作*


    `@ActionID(`

    `    category = "Edit",`

    `    id = "com.galileo.netbeans.module.MyFirstAction")`

    `@ActionRegistration(`

    `    iconBase = "com/galileo/netbeans/module/icon.png",`

    `    displayName = "#CTL_MyFirstAction")`

    `@ActionReferences({`

    **`@ActionReference`**`(`

    `        path = "`**`Toolbars`**`/`**`MyToolbars`**`",`

    `        position = 100)`

    `})`

    `public final class MyFirstAction implements ActionListener {`

    `    public void actionPerformed(ActionEvent e) {`

    `        // TODO implement action body`

    `    }`

    `}`


    如您在 清单 9-11 中所见，工具栏与菜单项的区别仅在于相应的路径规范。菜单项通过 `ActionReference` 注解引用标准文件夹 `Menu`
    中的操作，而对于工具栏操作，则使用标准文件夹 `Toolbars`。请记住，对于工具栏操作，操作类通过 `iconBase` 属性提供了一个相应的图标。


    与菜单栏类似，这样的注解会导致自动创建一个层级条目。如果您不想使用注解，也可以通过直接在层级文件中为工具栏添加条目来添加您的工具栏操作。与 清单 9-9 匹配的条目将如
    清单 9-12 所示。


    ***清单 9-12.** 通过直接层级条目向工具栏添加操作*


    `<folder name="`**`Toolbars`**`">`

    `  <folder name="`**`MyToolbar`**`">`

    `    <file name="MyFirstAction.shadow">`

    `      <attr name="originalFile"`

    `            stringvalue="Actions/Edit/com-galileo-netbeans-module-MyFirstAction.instance"/>`

    `    </file>`

    `  </folder>`

    `</folder>`

