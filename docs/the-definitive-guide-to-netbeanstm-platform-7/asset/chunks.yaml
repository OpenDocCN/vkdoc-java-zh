    在本节中，我将再次概述三个层（向导描述符、向导面板和可视面板）之间的交互概念，以及如何接收和处理事件与通知。在图 13-8 的时序图中，显示了两种场景：向导的初始化，以及用户输入数据时向导各部分之间的交互。


