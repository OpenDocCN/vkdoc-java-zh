    实例就会被添加到本地 Lookup 中。需要一个代理（即一个表示为 `ContextGlobalProvider` 接口的代理组件）来解耦模块 A 和 B。此代理组件将模块
    A 的本地 Lookup（其中包含当前选中的实例）提供给模块 B。为了使集中式代理组件能够访问 `Mp3SearchList` 类的本地 Lookup，Lookup
    API 提供了 `Lookup.Provider` 接口。`Mp3SearchList` 类必须实现此接口。


    通过 `getLookup()` 方法，可以提供本地 Lookup。`Lookup.Provider` 接口已由 `TopComponent` 类实现，该类是所有可见的
    NetBeans 窗口系统组件以及 `Mp3SearchList` 的父类。NetBeans 窗口系统已经提供了一个中央代理组件的实例，即 `GlobalActionContextImpl`
    类。该类提供了一个代理 Lookup，它可以访问当前聚焦的 `TopComponent` 的本地 Lookup。通过调用静态工具方法 `Utilities.actionsGlobalContext()`
    可以轻松获取此 Lookup。因此，无需关心 `ContextGlobalProvider` 实例，您就已经可以访问全局代理 Lookup。如果您对更多细节感兴趣，并想进一步了解此概念，那么研究一下所提及的类和方法源代码可能会很有价值。


    ![图片](img/0504.jpg)


