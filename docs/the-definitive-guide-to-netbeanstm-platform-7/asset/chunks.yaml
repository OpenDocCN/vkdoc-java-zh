    Task\", true);\nOutputWriter ow = io.getOut();\ntry {\n   ow.println(\"My Link\"\
    , new MyHyperlinkListener());\n} catch (IOException ex) {\n   Exceptions.printStackTrace(ex);\n\
    }\n```\n\nYou can implement a corresponding listener with an `OutputListener`\
    \ interface, as shown in [Listing 17-3](#Chapter17.html#list_17_1).\n\n***Listing\
    \ 17-3.** Listener for the Reaction on Hyperlinks in the Output Window*\n\n```\n\
    import org.openide.windows.OutputEvent;\nimport org.openide.windows.OutputListener;\n\
    \npublic class MyHyperlinkListener implements OutputListener {\n\n   @Override\n\
    \   public void outputLineSelected(OutputEvent ev) {\n      // Action for selection\
