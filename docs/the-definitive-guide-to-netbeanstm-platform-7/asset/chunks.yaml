  raw: '#### Inter-Module Communication


    In addition to the global Lookup, which is provided by the NetBeans Platform and
    allows access to all registered services, it is possible to equip your own components
    with a local Lookup. The Lookup API offers a factory to create Lookups and an
    opportunity to listen to changes in Lookups. Using the class `ProxyLookup`, a
    user can create a proxy combining multiple Lookups into one. Using this feature
    of the Lookup API and SPI, you enable communication between components of different
    modules without making them interdependent.


    A typical use case for the communication of loosely coupled modules is the visualization
    of detailed information for a selected object. The selection of objects and visualization
    of information is done in separate modules. As an example, imagine a list displaying
    the search results for MP3 files. Selecting an entry in the list provides the
    selected entry via Lookup, so other parts of the application can access the entry
    and display the required detailed information. This pattern is similar to the
    observer pattern. The module providing the objects—in this case the search list—is
    the subject, and the information display module is the observer. This allows multiple
    modules to display the data or detailed information in various ways. Again, the
    advantage is loose coupling of the modules: they are completely independent of
    each other. The only thing they have in common is the provided object (or, to
    be more precise, its interface), which is the source of the information to be
    processed. This loose coupling is achieved by using a proxy object, which acts
    as a substitute for the subject in the registration process of the observer. So,
    the observer is registered with the proxy component (in this case the Lookup),
    not the subject.


    [Figure 5-3](#Chapter05.html#fig_5_3) shows the example implemented in the following
    paragraphs. Both windows are in a separate module, each independent of the other
    (both can be exchanged or new ones can be added arbitrarily).


    ![Image](images/0503.jpg)


    ***Figure 5-3.** Typical application example of a data exchange between two modules,
    without interdependency*


    The structure of this concept is shown in [Figure 5-4](#Chapter05.html#fig_5_4).
    The class `Mp3SearchList` in module A represents a list of search results. A search
    result entry is represented by the class `Mp3FileObject`, residing in a separate
    module, since this class is the most common denominator of all modules. If an
    entry is selected in the list, the `Mp3FileObject` instance is added to the local
    Lookup. A broker (that is, a proxy component depicted as the interface `ContextGlobalProvider`)
    is needed to decouple modules A and B. This proxy component provides the local
    Lookup of module A to module B, which contains the currently selected instance.
    To enable the centralized proxy component to access the local Lookup of the class
    `Mp3SearchList`, the Lookup API provides the interface `Lookup.Provider`. This
    interface must be implemented from the class `Mp3SearchList`.


    With the `getLookup()` method, the local Lookup can be provided. The `Lookup.Provider`
    interface is already implemented by the class `TopComponent`, which is the superclass
    of all visible NetBeans window system components, as well as the `Mp3SearchList`.
    The NetBeans window system already provides an instance of the central proxy component,
    the class `GlobalActionContextImpl`. This class provides a proxy Lookup, which
    has access to the local Lookup of the focused `TopComponent`. This Lookup can
    be obtained easily by calling the static utility method `Utilities.actionsGlobalContext()`.
    So, there is no need to care about the `ContextGlobalProvider` instance, but you
    already have access to the global proxy Lookup. If you are interested in more
    details and want to know more about this concept, it may be worthwhile to investigate
    the sources for the classes and methods mentioned.


    ![Image](images/0504.jpg)


    ***Figure 5-4.** Structure of the intermodule communication concept using a local
    Lookup via a proxy component to decouple subject and observer*


    The class `Mp3DetailsView` gains access to the local Lookup of the `Mp3SearchList`
    by calling `Utilities.actionsGlobalContext()`. Based on the global proxy Lookup,
    you create a `Lookup.Result` for the class `Mp3FileObject`. An instance of the
    class `Lookup.Result` provides a subset of a Lookup for a special type of class.
    The main advantage is that the user can listen for changes in this subset by using
    a `LookupListener`. So, the component will be notified as soon as another `Mp3FileObject`
    is selected in the `Mp3SearchList`, or if the window showing the `Mp3SearchList`
    loses focus. As an example, no detailed MP3 information will be displayed.


    Following, you find the classes of this example application. Only the important
    parts of the classes are shown.


    First, there is the class `Mp3SearchList`, which represents a window, and because
    of this, extends from the base class `TopComponent`. To enable listening to selection
    changes in the result list, you also implement the `ListSelectionListener` interface.
    As a private member, you have a data model that manages the data in the table.
    For demonstration purposes, a simple data model has been chosen, creating three
    example objects of the class `Mp3FileObject` in the constructor and adding them
    to the model. This data would normally be provided using the search algorithm.
    The second private member object is an instance of `InstanceContent`. This enables
    you to dynamically change the content of the Lookup. In the constructor of the
    `Mp3SearchList`, you can now create a local Lookup, using the class `AbstractLookup`
    and passing the `InstanceContent` object into its constructor. Using the method
    `associateLookup()`, your local Lookup is set as the Lookup of the `TopComponent`,
    so that it will be returned from the `getLookup()` method.


    In the method `valueChanged()`, which gets called if a data set is selected in
    the table, you get the data set from the data model, wrap it into a collection,
    and pass it to the `InstanceContent` instance (see [Listing 5-7](#Chapter05.html#list_5_7)),
    which is the data storage for the Lookup. So, the selected element is always part
    of the local Lookup.


