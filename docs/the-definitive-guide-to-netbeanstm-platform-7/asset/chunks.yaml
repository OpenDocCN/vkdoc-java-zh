- fmt: "### Inter-Module Communication\n\nIn addition to the global `Lookup`, which\
    \ is provided by the NetBeans Platform and allows access to all registered services,\
    \ it is possible to equip your own components with a local `Lookup`. The Lookup\
    \ API offers a factory to create `Lookup`s and an opportunity to listen to changes\
    \ in `Lookup`s. Using the class `ProxyLookup`, a user can create a proxy combining\
    \ multiple `Lookup`s into one. Using this feature of the Lookup API and SPI, you\
    \ enable communication between components of different modules without making\
    \ them interdependent.\n\nA typical use case for the communication of loosely\
    \ coupled modules is the visualization of detailed information for a selected\
    \ object. The selection of objects and visualization of information is done in\
    \ separate modules. As an example, imagine a list displaying the search results\
    \ for MP3 files. Selecting an entry in the list provides the selected entry via\
    \ `Lookup`, so other parts of the application can access the entry and display\
    \ the required detailed information. This pattern is similar to the observer pattern.\
    \ The module providing the objects—in this case the search list—is the subject,\
    \ and the information display module is the observer. This allows multiple modules\
    \ to display the data or detailed information in various ways. Again, the advantage\
