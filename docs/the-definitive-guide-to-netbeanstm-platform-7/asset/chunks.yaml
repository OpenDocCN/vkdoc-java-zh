    #### Mac OS X Application


    A fourth and last possibility for a distribution, the creation of a Mac OS X application,
    is also available. For this purpose call the context menu *Package as… ![Image](images/U001.jpg)
    Mac OS X Application* of the corresponding Platform application. Bear in mind
    that you cannot execute this on the Windows Platform, because the *ln* command,
    among others, is accessed but not provided in Windows.


    ### Summary


    ## C H A P T E R  36


    ## Updating a NetBeans Platform Application


    During software lifecycles, it nearly always happens that you want to provide
    updates for your application because of fixed errors, new functionalities, or
    to implement new requirements. It would be very cumbersome if you needed to redistribute
    the entire application when you just needed to provide a patch or a new feature.
    This is one of the advantages of a modular architecture of the application: you
    can offer updates on the module layer. For the user, installing updates must be
    as simple and intuitive as possible. To that end, the NetBeans Platform in conjunction
    with the Plugin Manager provides an Auto Update service. This module is able to
    automatically search for updated or new modules in a set of predefined update
    centers, and to dynamically load them at runtime. Beyond that, users are able
    to manually install downloaded updates or new modules via the Plugin Manager.


    ### The Auto Update Service


    Updates are made available as NBM files. These update packages must be offered
    via an update center. Within a NetBeans Platform application, update centers can
    be defined in which the Auto Update service searches for updates. Update center
    definitions can be made manually or they can be delivered with an application
    module. The user can configure the application so that updates are automatically
    searched at a certain time. Of course updates can also be initiated manually.
    [Figure 36-1](#Chapter36.html#fig_36_1) shows the components of the Auto Update
    service.


    ![Image](images/3601.jpg)


    ***Figure 36-1.** Components that make up the Auto Update functionality and their
    dependencies*


    ### The NBM File


    Modules that you want to make available as an update are distributed in the form
    of NBM files. These consist of a JAR archive containing the actual module together
    with its configuration data and update information required by the Plugin Manager
    (see [Figure 36-2](#Chapter36.html#fig_36_2)). An NBM file may also contain the
    libraries required by the module. The content of the module JAR file and its related
    configuration files have already been described in [Chapter 3](#Chapter03.html#ch3).


    One file I have not yet discussed is the `info.xml` file. This file contains information
    displayed to the user when choosing existing modules or modules to be installed
    in the Plugin Manager (see [Listing 36-1](#Chapter36.html#list_36_1)). The `manifest`
    element contains information from the module''s manifest file. For example, the
    defined dependencies are very important. If the user chooses a module in the Plugin
    Manager that is dependent on another module, the latter is automatically activated
    so it can be downloaded simultaneously with the selected module. If dependencies
    cannot be satisfied, the user can install the module without being able to activate
    it, though. Finally, you can also add license information via the `license` element,
    which was displayed to the user before installation of the module began. This
    forces the user to confirm that licensing requirements have been satisfied so
    the module can be installed.


    ![Image](images/3602.jpg)


    ***Figure 36-2.** Parts of an NBM file*


    ***Listing 36-1.** Information File of an NBM File*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<!DOCTYPE module PUBLIC    "-//NetBeans//DTD Autoupdate Module Info 2.5//EN"`

    `   "http://www.netbeans.org/dtds/autoupdate-info-2_5.dtd">`

    `<module` **`codenamebase`**`="com.galileo.netbeans.module"`

    **`distribution`**`="./com-galileo-netbeans-module.nbm"`

    **`downloadsize`**`="7123"`

    **`homepage`**`="http://heikoboeck.de"`

    **`license`**`="AD9FBBC9"`

    **`moduleauthor`**`="Heiko Boeck"`

    **`needsrestart`**`="false"`

    **`releasedate`**`="2007/10/16">`

    `   <`**`manifest`** `AutoUpdate-Show-In-Client="true"`

    `             OpenIDE-Module="com.galileo.netbeans.module"`

    `             OpenIDE-Module-Name="My Module"`

    `             OpenIDE-Module-Implementation-Version="071016"`

    `             ...              OpenIDE-Module-Specification-Version="1.0"/>`

    `   <`**`license`** `name="AD9FBBC9">Place your license information here</`**`license`**`>`

    `</module>`


    An NBM file is created automatically by the NetBeans IDE by just calling *Create
    NBM* in the context menu of the desired module. When you choose *Create NBM*,
    the IDE attempts to sign the NBM file. To make this possible, a so-called keystore
    must be prepared and generated (see [Figure 36-3](#Chapter36.html#fig_36_3)).
    Use the *Keystores Manager* of the NetBeans IDE, which is only available after
    installation of the *Mobility* plugin. This mobility plugin is part of the complete
    NetBeans IDE installation package. However, you can also install this plugin via
    the Plugin Manager (*Tools ![Image](images/U001.jpg) Plugins ![Image](images/U001.jpg)
    Available Plugins*), later. Open the Keystores Manager via *Tools ![Image](images/U001.jpg)
    Keystores*. Next, create a keystore file via *Add Keystore...*, including a file
    name and a directory where the keystore will be located. A recommended location
    is the *nbproject* folder of your module. After entering a password of at least
    six characters, click OK to create the keystore.


    ![Image](images/3603.jpg)


    ***Figure 36-3.** Creating a keystore*'
