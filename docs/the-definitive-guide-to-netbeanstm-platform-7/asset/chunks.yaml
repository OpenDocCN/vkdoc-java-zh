- fmt: "# Help Pages\n\nThe previously presented XML files are only of use for the\
    \ configuration of the help set and the help system. You can create the help pages\
    \ themselves as a standard HTML page. The wizard has already created a first example\
    \ page when creating the help set. This is the `module-about.html` file. It has\
    \ also already been attached to the help set via the file `module-map.xml`. So,\
    \ you can add your own help pages exactly the same way.\n\n## Inserting Links\
    \ into Help Pages\n\nWithin a help page, you can define links both to external\
    \ sites and to other help pages, even though they belong to another module.\n\n\
    ### Links to External Web Sites\n\nTypically, external web sites are called in\
    \ an external browser, since the help window is inadequate for that purpose. So,\
    \ the `BrowserDisplayer` class, which you refer to with the `object` HTML element,\
    \ is responsible for this. You define the link itself via the `content` parameter\
    \ (see [Listing 16-8](#Chapter16.html#list_16_8)).\n\n**Listing 16-8.** Link Embedded\
    \ in Help Pages\n\n```\n<object\n   classid=\"java:org.netbeans.modules.javahelp.BrowserDisplayer\"\
    >\n   <param name=\"content\" value=\"http://www.netbeans.org\">\n   <param name=\"\
    text\" value=\"http://www.netbeans.org\">\n   <param name=\"textFontSize\" value=\"\
    medium\">\n   <param name=\"textColor\" value=\"blue\">\n</object>\n```\n\nThe\
    \ `BrowserDisplayer` class passes the link to the `URLDisplayer` service. The\
    \ default implementation of this service provided by the NetBeans Platform opens\
    \ the link in the internal web browser of the NetBeans Platform, though. Since\
    \ this browser mostly displays web sites insufficiently, it would be the best\
    \ for us to call the standard browser of the operating system. Since the `URLDisplayer`\
    \ class is designed as a service and the Java Platform provides a method for calling\
    \ the standard browser (via the `Desktop` class), you can realize this by a specific\
    \ service provider. To do so, you create the `ExternalURLDisplayer` class which\
    \ derives from the service class `HtmlBrowser.URLDisplayer`. This interface is\
    \ located in the *UI Utilities* module to which you must consequently define a\
    \ dependency under *Properties ![Image](images/U001.jpg) Libraries*. This interface\
    \ specifies the `showURL()` method which gets the link to open as `URL` object.\
    \ Then, you just have to pass this link to the `browse()` method of the Java `Desktop`\
    \ class in the form of a `URI` object. Then, the Java `Desktop` class opens the\
    \ corresponding web site in its standard browser. (See [Listing 16-9](#Chapter16.html#list_16_9).)\n\
    \n**Listing 16-9.** Service Provider for Opening Links in Help Pages Externally\n\
    \n```\n@ServiceProvider (service = HtmlBrowser.URLDisplayer.class, position =\
    \ 0)\npublic class ExternalURLDisplayer extends HtmlBrowser.URLDisplayer{\npublic\
    \ void showURL(URL link) {\n      try {\nDesktop.getDesktop().browse(link.toURI());\n\
    \      } catch(Exception ex) {\n         Logger.getLogger(\"global\").log(Level.SEVERE,\
    \ null, ex);\n         // show the user a message dialog\n      }\n   }\n}\n```\n\
    \nThis service provider is registered and thus published via the `ServiceProvider`\
    \ annotation (see [Chapter 5](#Chapter05.html#ch5)).\n\n### Links to Other Help\
    \ Pages\n\nYou can easily add links to help pages of other modules via the `nbdocs`\
    \ protocol with the `href` element, as shown in [Listing 16-10](#Chapter16.html#list_16_10).\n\
    \n**Listing 16-10.** Links on Help Pages of Other Modules\n\n```\n<a href=\"nbdocs://org.netbeans.modules.usersguide/org/netbeans/\n\
    \   modules/usersguide/configure/configure_options.html\">Using the Options Dialog</a>\n\
    ```\n\nIt is important that you first indicate the code name base of the module.\
    \ In this example, it is `org.netbeans.modules.usersguide`. Subsequently, you\
    \ define the path to the help page. In case the module and the help page are not\
    \ available, the help system is able to display relevant information to the user\
    \ because of the specification of the code name base. You link on your own module-internal\
    \ help pages the same way.\n\n## Context-Sensitive Help\n\nContext-sensitive help\
    \ enables the user to directly access help and the corresponding topic relating\
    \ to the current context, in which the user actually is. Therefore, the user does\
    \ not have to search for the desired topic, but the respective page is directly\
    \ displayed. A context-sensitive help is realized by the connection of separate\
    \ components with the ID of a corresponding help page. The NetBeans Platform defines\
    \ the `HelpCtx.Provider` interface, so a component can announce the help ID to\
    \ the help system in a simple manner. This interface specifies the `getHelpCtx()`\
    \ method which must be implemented by the corresponding component and thus delivers\
    \ a `HelpCtx` object containing an ID.\n\nNumerous frequently-used classes of\
    \ the NetBeans Platform API already implement the `HelpCtx.Provider` interface.\
    \ Among these are, for example, the classes `Node`, `DataObject`, `TopComponent`,\
    \ `SystemAction`, `WizardDescriptor.Panel`, and `DialogDescriptor`. Then, you\
    \ only have to overwrite the `getHelpCtx()` method in their subclasses. Typically,\
    \ the context help is called by the user with (`F1`). An additional key for calling\
    \ help is displayed on a dialog or a wizard which delivers an ID via the `getHelpCtx()`\
    \ method.\n\nA shortcut definition must be available, so the help can be called\
    \ with (`F1`). If it was not already made by the NetBeans Platform—so you cannot\
    \ open the help window with (`F1`)—you can define this shortcut yourself in the\
    \ layer file with the following entry, as shown in [Listing 16-11](#Chapter16.html#list_16_11).\n\
    \n**Listing 16-11.** Make the Help System Accessible by F1.\n\n```\n<folder name=\"\
    Shortcuts\">\n   <file name=\"F1.shadow\">\n      <attr name=\"originalFile\"\n\
    \            stringvalue=\"Actions/Help/org-netbeans-modules-javahelp-HelpAction.instance\"\
    />\n   </file>\n</folder>\n```\n\nIf the user presses (`F1`), the `HelpAction`\
    \ is executed. The `HelpAction` automatically searches the component that is currently\
    \ focused. If the focused component implements the `HelpCtx.Provider` interface,\
    \ the ID of the help page is determined by the `getHelpCtx()` method. Furthermore,\
    \ you also have the possibility to provide a `JComponent` subclass with a help\
    \ ID using the `setHelpIDString()` method:\n\n```\nJComponent c = ...\nHelpCtx.setHelpIDString(c,\
    \ \"com.galileo.netbeans.module.about\");\n```\n\nRemember, your component must\
    \ be focusable, so it can be found by `HelpAction`. By default, the `TopComponent`\
    \ class is not focusable, (you can find that out with the `isFocusable()` method).\
    \ You can achieve this simply by calling `setFocusable()`. So, a `TopComponent`\
    \ subclass, which delivers its help ID via `getHelpCtx()`, would then look like\
    \ [Listing 16-12](#Chapter16.html#list_16_12).\n\n**Listing 16-12.** Context-Sensitive\
    \ Help for Components\n\n```\npublic final class MyTopComponent extends TopComponent\
    \ {\n   public MyTopComponent() {\nsetFocusable(true);\n   }\npublic HelpCtx getHelpCtx()\
    \ {\nreturn new HelpCtx(\"com.galileo.netbeans.module.about\");\n   }\n}\n```\n\
    \nIf `MyTopComponent` is focused and the user presses (`F1`), the help system\
    \ and the help page are called. The help page has the ID `com.galileo.netbeans.module.about`.\
    \ You can define this ID in connection with the desired page in the map file of\
    \ the help set (see the section “Creating and Integrating a Helpset”). If you\
    \ only want the help window without a special page to be called, you can return\
    \ `HelpCtx.DEFAULT_HELP`. Beyond that, you can also pass a `Class` object to the\
    \ `HelpCtx` constructor, instead of passing the ID in the form of a `String`.\
    \ Then, the `HelpCtx` object detects the ID by means of the complete class name.\
    \ So, if you used `new HelpCtx(getClass())` in the `MyTopComponent` example, the\
    \ help ID would be `com.galileo.netbeans.module.MyTopComponent`."
