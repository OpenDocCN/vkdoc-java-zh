    `   authIdentity="uid={USERNAME},ou=users,ou=system"`

    `   useSSL=false`

    `   debug=true;`

    `};`


    Different configurations can be managed in one file. Each is given one name. You
    indicate the URL to the directory server as with JNDI and specify the path to
