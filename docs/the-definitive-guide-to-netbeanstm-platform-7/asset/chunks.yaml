    project *Amazon Web Services* and close the wizard with *Finish*. Then choose
    *File ![Image](images/U001.jpg) New File ![Image](images/U001.jpg) Web Services
    ![Image](images/U001.jpg) Web Service Client*. You directly specify the file to
