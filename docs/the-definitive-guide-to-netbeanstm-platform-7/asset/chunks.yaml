    你通过静态方法 `getConnection()` 提供对数据库的集中访问。这样，用户尤其不必担心连接 URL。此外，`Connection` 对象（即与数据库的连接）被集中持有，无需每次都重新建立和关闭。`getConnection()`
    方法也是一个工厂方法，如果连接尚未建立，它会建立一个连接；如果连接已建立，则返回该 `Connection` 对象。应用程序结束时，你会通过 `close()`
    方法得到通知。正是在这里，你最终关闭仍与数据库保持的连接，然后通过 `jdbc:derby:;shutdown=true` 关闭整个 Java DB 系统（以及你的数据库
    `MyDB`）。（参见清单 26-3。）


    ***清单 26-3.** 集中提供连接与关闭数据库*


    `public static Connection` **`getConnection`**`() throws SQLException {`

    `      if(conn == null || conn.isClosed()) {`

    `         conn = DriverManager.`**`getConnection`**`(`

    `            "`**`jdbc:derby:MyDB;create=true`**`", "user", "password");`

    `      }`

    `      return conn;`

    `   }`

    `   @Override`

    `public void` **`close`**`() {`

    `      try {`

    `        conn.`**`close`**`();`

    `        DriverManager.getConnection("jdbc:derby:;`**`shutdown=true`**`");`

    `      } catch (SQLException ex) {}`

    `   }`

    `}`

