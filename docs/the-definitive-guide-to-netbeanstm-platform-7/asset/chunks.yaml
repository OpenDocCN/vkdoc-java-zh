  raw: '### Always Enabled Actions


    Choose *File* ![Image](images/U001.jpg) *New File…* ![Image](images/U001.jpg)
    *Module Development* ![Image](images/U001.jpg) *Action* to call the wizard for
    creating a new action class. In the first step you can choose the type of action.
    Doing so you can choose between an *Always Enabled* action and a *Conditionally
    Enabled* action. You want to create an action that is always provided and so you
    should choose *Always Enabled*. In the next step you can integrate your action
    class into the menu bar and the toolbar and you can also define a short cut (see
    [Figure 6-2](#Chapter06.html#fig_6_2)). Right now you''re concerned with the actions
    so you deactivate these options and just assign the action to create to the existing
    or a new category.


    ![Image](images/0602.jpg)


    ***Figure 6-2.** Creating an action class with the NetBeans wizards*


    Press the *Next* button to get to the last step. You can define the name of the
    action class, which will be shown in the menu, there. Furthermore you can or must
    choose an icon for the action. This icon should typically have a size of 16 ×
    16 pixels. You should provide the same icon sized 24 × 24 pixels. Like this, the
    user has the possibility of depicting the toolbar in two different sizes. You
    do not have to especially select it, it should only be in the same folder and
    named the same with *24* attached. If the 16 × 16 pixels icon is called *icon.gif*,
    the 24 × 24 pixels icon has to be called *icon24.gif*. Furthermore, you can provide
    the icons *icon_pressed.gif*, *icon_disabled.gif, icon_rollover.gif* for the referring
    conditions. Then press the *Finish* button to close the wizard and to generate
    the action class. Now let''s look at the action class, shown in [Listing 6-1](#Chapter06.html#list_6_1).


    ***Listing 6-1.** Example of an Action Class—although the Assignment and the Provision
    Occur by Meta Information via Annotations*


    `import java.awt.event.ActionEvent;`

    `import java.awt.event.ActionListener;`

    `import org.openide.awt.ActionID;`

    `import org.openide.awt.ActionRegistration;`

    `import org.openide.awt.ActionReferences;`


    **`@ActionID`**`(`

    `    id = "com.galileo.netbeans.MyFirstAction",`

    `    category = "File")`

    **`@ActionRegistration`**`(`

    `    displayName = "#CTL_MyFirstAction",`

    `    iconBase = "com/galileo/netbeans/icon.gif")`

    `@ActionReferences({})`

    `public final class MyFirstAction implements` **`ActionListener`** `{`

    `public void` **`actionPerformed`**`(ActionEvent e) {`

    `        // TODO implement action body`

    `    }`

    `}`


    First, you should give each action a unique identifier by means of the `ActionID`
    annotation. You do so by specifying a unique string with the `id` parameter. I
    suggest using the classname in connection with its code name base. This way the
    ID is really unique. Moreover, the action has to be assigned to a category; that
    can either be an already existing category or a new category.


    The action is registered by the `ActionRegistration` annotation. The action is
    registered at the identifier which is assigned by the `ActionID`. The display
    name is read by the assignment of the key `#CTL_MyFirstAction` from the *Bundle.properties*
    file. The advantage of this is that the name can be localized easily (the name
    can be adjusted to another language). Besides, an icon with the `iconBase` parameter
    is specified.


    ![Image](images/square.jpg) **Note** For the time being I will ignore the `ActionReferences`
    annotation, which is automatically created by the wizard. This way, an action
    is assigned to a menu or to a toolbar. I will get to this in [Chapter 9](#Chapter09.html#ch9).


    The action class itself is quite simple. Only the `actionPerformed()` method of
    the `ActionListener` inferface has to be implemented. The action that you intend
    will be executed by this method.


    As already mentioned at the beginning of the chapter, the registration of actions
    via annotations is the normal method. However, you do not have to use it. It is
    equally good to introduce your actions to the NetBeans Platform by referring entries
    in the layer file since, in principle, it is not really different using annotations.
    The only difference is that these entries are created when automatically creating
    your application out of the information of the annotations. To register an always
    enabled action class without annotations, create the following `.instance` element
    in the `Actions` folder, as shown in [Listing 6-2](#Chapter06.html#list_6_2).


    ***Listing 6-2.** Registration of an Always Enabled Action by a Direct Entry in
    the Layer File*


    `<file name="com-galileo-netbeans-MyFirstAction.instance">`

    `  <attr name="`**`displayName`**`" bundlevalue=`

    `    "com.galileo.netbeans.Bundle#CTL_MyFirstAction"/>`

    `  <attr name="`**`iconBase`**`"`

    `    stringvalue="com/galileo/netbeans/icon.gif"/>`

    `  <attr name="`**`instanceCreate`**`"`

    `    methodvalue="org.openide.awt.Actions.alwaysEnabled"/>`

    `  <attr name="`**`delegate`**`"`

    `    newvalue="com.galileo.netbeans.MyFirstAction"/>`

    `</file>`


    The attributes with names, which correspond to the annotation parameters, refer
    to its meaning. These and other necessary attributes and their values are explained
    in [Table 6-1](#Chapter06.html#tab_6_1).


    ![Image](images/t0601.jpg)


    In addition to these attributes two more optional attributes are provided. These
    are presented in [Table 6-2](#Chapter06.html#tab_6_2).


    ![Image](images/t0602.jpg)'
