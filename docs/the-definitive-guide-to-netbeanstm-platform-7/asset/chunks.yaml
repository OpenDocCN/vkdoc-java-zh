    有了这个操作，就可以立即测试 MP3 播放器。启动应用程序并打开“收藏夹”窗口。将一个 MP3 文件或包含 MP3 文件的文件夹添加到“收藏夹”窗口。现在，可以通过双击或使用上下文菜单开始播放。


    #### 用户界面


    仅仅有一个操作并不能令人满意，因此在本节中，将为 MP3 播放器创建一个完整的用户界面。该用户界面使用了 MP3 播放器服务提供的功能。在播放器模块中创建一个名为
    `com.hboeck.mp3manager.player.gui` 的新包。借助 *窗口* 向导，创建一个 `TopComponent` 类。可以像之前一样通过
    *文件 ![Image](img/U001.jpg) 新建文件... ![Image](img/U001.jpg) 模块开发* 来调用此向导。对于窗口位置，可以使用
    `explorer` 等；对于类名前缀，可以使用 `Mp3Player`。然后，使用窗体设计器构建一个 `TopComponent`，如图 44-5 所示。


    ![Image](img/4405.jpg)


    ***图 44-5.** MP3 播放器用户界面*


    当然，它看起来并不那么美观，但功能齐全，提供了所有相关的 MP3 播放器功能。设计顶层组件的大部分工作都由窗体设计器完成。只需实现操作即可（参见清单 44-14）。但首先，需要在构造函数中获取对
    `getDefault()` 方法提供的 `Mp3Player` 实例的访问权限。为此实例注册一个 `Mp3PlayerEventListener`（在“服务接口”部分为其定义了接口），以便在
    MP3 文件启动和停止事件时得到通知。这些事件用于更新用户界面上显示的信息。


