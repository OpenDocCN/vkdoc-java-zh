    ### 总结


    数据库通常位于服务器上。然而，Java DB 提供了一种客户端数据库解决方案。在本章中，我们探讨了如何将这样的数据库集成到您的 NetBeans Platform
    应用程序中。


    ## 第 27 章


    ## Hibernate


    在第 26 章中，您学习了如何在富客户端应用程序中使用客户端数据库解决方案 Java DB。您必须分解文件以将其保存到关系数据库系统中，并且还必须通过 JDBC
    接口以传统方式通过 SQL 提取数据库中的数据。然后，您必须组装您的对象——在本例中是 `Album` 和 `Genre`。您将此功能封装在 `DataModel`
    类中——您可能已经注意到，这可能会变得相当复杂且容易出错。这也是数据库创建者投入如此多精力来开发和标准化面向对象数据库的原因之一，尽管它们目前还无法与关系型系统相抗衡并得到广泛应用。这主要是因为
    RDBMS 的广泛使用：新的应用程序必须访问以关系形式保存的数据。


    因此，所谓的对象关系桥接技术应运而生；它们负责将对象数据保存到关系数据库以及从关系数据库加载对象数据，从而为底层数据库系统形成一个抽象层。此类桥接技术中最流行且使用最广泛的实现可能是
    Hibernate。Hibernate 负责将对象数据映射到关系上，这种映射应尽可能透明。理想情况下，这意味着您无需担心数据的存储位置和方式。


    本章将展示如何将 Hibernate 有效地集成到基于 NetBeans Platform 的富客户端应用程序中。不过，这里仅介绍使用 Hibernate
    的基本概念；本章不会讨论 Hibernate 广泛功能的所有细节。

