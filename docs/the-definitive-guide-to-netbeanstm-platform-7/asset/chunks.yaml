- fmt: "# Attributes\n\nIn the following, frequently used manifest attributes are\
    \ listed. A module can be textually described with those manifest attributes.\
    \ Additionally, those attributes determine the integration of a module into the\
    \ Platform.\n\n- `OpenIDE-Module`: This attribute defines a unique name for the\
    \ module used for recognition as a module by the module system. Defining this\
    \ attribute is obligatory.\n  `OpenIDE-Module`: `com.galileo.netbeans.module`\n\
    - `OpenIDE-Module-Name`: This defines a displayable name of the module which is\
    \ also displayed in the plugin manager.\n  `OpenIDE-Module-Name`: `My First Module`\n\
    - `OpenIDE-Module-Short-Description`: A short functionality description by the\
    \ module.\n  `OpenIDE-Module-Short-Description`:\n  `   This is a short description\
    \ of my first module`\n- `OpenIDE-Module-Long-Description`: With this attribute\
    \ the functionality of the module can be better described. This text is also displayed\
    \ in the plugin manager. Thus, it makes sense to always use this attribute, to\
    \ inform the user about the module's features.\n  `OpenIDE-Module-Long-Description`:\n\
    \  `   Here you can put a longer description with more than one`\n  `   sentence.\
    \ You can explain the capability of your module.`\n- `OpenIDE-Module-Display-Category`:\
    \ With this attribute, modules can be grouped to a virtual group so it can be\
    \ presented to the user as a functional unit.\n  `OpenIDE-Module-Display-Category`:\
    \ `My Modules`\n- `OpenIDE-Module-Install`: A module installer class can be registered\
    \ with this attribute (see the section Lifecycle), in order to execute actions\
    \ at certain points of time of the module life cycle.\n  `OpenIDE-Module-Install`:\
    \ `com/galileo/netbeans/module/Installer.class`\n- `OpenIDE-Module-Layer`: This\
    \ is one of the most important attributes. With it the path of the layer file\
    \ is specified (see the section Layer File). The integration of a module into\
    \ the Platform is described by the layer file.\n  `OpenIDE-Module-Layer`: `com/galileo/netbeans/module/layer.xml`\n\
    - `OpenIDE-Module-Public-Packages`: To support encapsulation, accessing classes\
    \ in other modules is denied by default. With this attribute, packages can be\
    \ explicitly declared as public so other modules can access it. This is especially\
    \ essential with libraries.\n  `OpenIDE-Module-Public-Packages`:\n  `   com.galileo.netbeans.module.actions.*,`\n\
    \  `   com.galileo.netbeans.module.util.*`\n- `OpenIDE-Module-Friends`: If only\
    \ certain modules can access the packages which are declared as public with the\
    \ attribute `OpenIDE-Module-Public-Packages` then those may be stated here.\n\
    \  `OpenIDE-Module-Friends`:\n  `   com.galileo.netbeans.module2,`\n  `   com.galileo.netbeans.module3`\n\
    - `OpenIDE-Module-Localizing-Bundle`: Here, a properties file can be defined that\
    \ is used as a localizing bundle (see [Chapter 8](#Chapter08.html#ch8)).\n  `OpenIDE-Module-Localizing-Bundle`:\n\
    \  `   com/galileo/netbeans/module/Bundle.properties`\n\n## Versions and Dependencies\n\
    \nDifferent versions and dependencies can be defined with the following attributes.\
    \ In the section Versioning and Dependencies you find a detailed description of\
    \ the application and of the whole functionality of these attributes.\n\n- `OpenIDE-Module-Module-Dependencies`:\
    \ With this attribute the dependencies between modules are defined, and the least-needed\
    \ module version can also be specified.\n  `OpenIDE-Module-Module-Dependencies`:\n\
    \  `   org.openide.util > 6.8.1,`\n  `   org.openide.windows > 6.5.1`\n- `OpenIDE-Module-Package-Dependencies`:\
    \ A module may also depend on a specific package. Such dependencies are defined\
    \ with this attribute.\n  `OpenIDE-Module-Package-Dependencies`: `com.galileo.netbeans.module2.gui\
    \ > 1.2`\n- `OpenIDE-Module-Java-Dependencies`: If a module requires a specific\
    \ Java version, it can be set with this attribute.\n  `OpenIDE-Module-Java-Dependencies`:\
    \ `Java > 1.5`\n- `OpenIDE-Module-Specification-Version`: This attribute indicates\
    \ the specification version of the module. It is usually written in the Dewey-Decimal\
    \ format.\n  `OpenIDE-Module-Specification-Version`: `1.2.1`\n- `OpenIDE-Module-Implementation-Version`:\
    \ This attribute sets the implementation version of the module, usually by a timestamp.\
    \ This number should change with every change of the module.\n  `OpenIDE-Module-Implementation-Version`:\
    \ `200701190920`\n- `OpenIDE-Module-Build-Version`: This attribute has only an\
    \ optional character and is ignored by the module system. Typically, a timestamp\
    \ is given.\n  `OpenIDE-Module-Build-Version`: `20070305`\n- `OpenIDE-Module-Module-Dependency-Message`:\
    \ Here, a text can be set. This text is displayed if a module dependency cannot\
    \ be resolved. In some cases, it can be quite normal to have an unresolved dependency.\
    \ In this case, it is a good idea to show the user a helpful message, informing\
    \ them where the required modules can be found or why none are needed.\n  `OpenIDE-Module-Module-Dependency-Message`:\n\
    \  `   The module dependency is broken. Please go to the`\n  `   following URL\
    \ and download the module.`\n- `OpenIDE-Module-Package-Dependency-Message`: The\
    \ message defined by this attribute is displayed if a necessary reference to a\
    \ package fails.\n  `OpenIDE-Module-Package-Dependency-Message`:\n  `   The package\
    \ dependency is broken. The reason could be…`\n- `OpenIDE-Module-Deprecated`:\
    \ Use this to mark an old module which is no longer supported. A warning is displayed\
    \ if the user tries to load the module into the Platform.\n  `OpenIDE-Module-Deprecated`:\
    \ `true`\n- `OpenIDE-Module-Deprecation-Message`: Use this attribute to add optional\
    \ information. Both the information and the deprecated warning are displayed in\
    \ the application log so, for example, you can tell the user which module to use\
    \ instead. Note that this message will only be displayed if the attribute `OpenIDE-Module-Deprecated`\
    \ is set to `true`.\n  `OpenIDE-Module-Deprecation-Message`:\n  `   Module 1 is\
    \ deprecated, use Module 3 instead.`"
