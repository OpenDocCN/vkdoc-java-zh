    #### 实现上下文接口


    首先，你需要通过一个接口来指定将接收你的 `Mp3DataObject` 的功能。现在，你应该将其命名为 `PlayInterface`，并指定一个 `play()`
    方法，通过该方法可以播放对应的 `Mp3DataObject`：


    `public interface` **`PlayInterface`** `{`

    `public void` **`play`**`();`

    `}`


    当然，接下来你需要实现通过上下文接口指定的所需功能。你可能会想象直接通过 `Mp3DataObject` 类来实现该接口；然而，更好的做法是通过一个单独的类，即*支持*类来实现。这样，该功能可以灵活地添加到
    `Mp3DataObject` 中，也可以再次删除。此外，多个上下文接口可以在语义上分组，并且 `Mp3DataObject` 类可以保持非常小巧。


    `public class` **`PlaySupport`** `implements` **`PlayInterface`** `{`

    `   private Mp3DataObject mp3 = null;`

    `   public PlaySupport(Mp3DataObject mp3) {`

    `      this.mp3 = mp3;`

    `   }`

    `public void` **`play`**`() {`

    `      System.out.println("Play: " + mp3.getPrimaryFile().getName());`

    `   }`

    `}`


    此外，只需将这个支持类的一个实例添加到 `Mp3DataObject` 类的查找（Lookup）中。你可以通过 `getCookieSet().assign()`
    方法来实现，并在此过程中指明其类型为 `PlayInterface`。当然，你也可以指明 `PlaySupport.class`，但这样做可以使你独立于具体实现。


    `public class Mp3DataObject extends` **`MultiDataObject`** `{`

    `public` **`Mp3DataObject(FileObject pf, MultiFileLoader loader)`**

    `      throws DataObjectExistsException, IOException {`

    `      super(pf, loader);`

    **`getCookieSet().assign(PlayInterface.class, new PlaySupport(this));`**

    `   }`

    `}`


    最终，你分三步为你的 `Mp3DataObject` 扩展了一个功能。这个功能可以从外部通过 `getLookup()` 获取的本地查找（Lookup）来使用。


    #### 使用上下文接口


    最后，问题仍然是如何访问数据对象的功能。我想通过一个上下文感知的动作类来回答这个问题。为此，你需要通过向导创建一个新类，路径为 *文件* ![Image](img/U001.jpg)
    *新建文件*… ![Image](img/U001.jpg) *模块开发* ![Image](img/U001.jpg) *动作*。现在，你使用 `Mp3DataObject`
    作为上下文。这样，只有当选中了一个 `Mp3DataObject`（即其节点）时，该动作才会变为可用。正如你从第 6 章已经了解到的，上下文会被传递到上下文感知类的构造函数中：


    `public final class MyContextAction implements ActionListener {`

    `private final` **`Mp3DataObject context`**`;`

    `    public MyContextAction(`**`Mp3DataObject context`**`) {`

    `        this.context = context;`

    `    }`

    `public void` **`actionPerformed`**`(ActionEvent ev) {`

    `        // 对上下文执行某些操作`

    `PlayInterface p =` **`context.getLookup().Lookup(PlayInterface.class);`**

    `        p.play();`

    `    }`

    `}`


    现在，如果在你的应用程序中选中了一个 `Mp3DataObject`，该上下文感知动作就会通过 NetBeans 平台自动变为可用。然后，你可以在 `actionPerformed()`
    方法中访问上下文，即 `Mp3DataObject` 实例。正如你已经知道的，数据对象的特性是在一个查找（Lookup）中管理的。因此，你获取这个查找，并通过
    `Lookup()` 方法提供 `PlayInterface` 的实现。现在，你可以访问 `PlaySupport` 类的实现，并执行其方法。


    你可以通过 *收藏夹* 模块来测试所有内容。


    1.  为此，请确保在你的 NetBeans 平台应用程序中，在 *属性* ![Image](img/U001.jpg) *库* 下的平台集群中激活了“收藏夹”模块。

    2.  接下来，启动你的应用程序，并通过 *窗口* ![Image](img/U001.jpg) *收藏夹* 打开“收藏夹”窗口。

    3.  右键单击该窗口，然后选择 *添加到收藏夹*。

    4.  然后，在选择对话框中选择一个 MP3 文件或一个包含 MP3 文件的目录，然后按 *添加* 将选中的条目添加到“收藏夹”窗口中。显示的 MP3 文件由一个数据节点实例表示，该实例是由
    `Mp3DataObject` 本身创建的。当你将 MP3 文件添加到“收藏夹”窗口时，该对象由一个数据加载器创建。


    如果你选中了一个 MP3 文件，然后执行该动作——查看 `play()` 方法的输出——你会看到，你可以通过该动作的上下文类直接访问选中的数据。

