- fmt: "#### Toolbar Configurations\n\nWhich toolbars are displayed in what order\
    \ is saved in a toolbar configuration in XML format. (Please find the corresponding\
    \ DTD in the appendix.) The toolbars, which the NetBeans Platform entails by default,\
    \ are defined by the configuration `Standard.xml` in the Core-UI module. This\
    \ looks like [Listing 9-13](#Chapter09.html#list_9_13).\n\n***Listing 9-13.**\
    \ Standard Platform Toolbar Configuration: Standard.xml*\n\n```\n<Configuration>\n\
    \   <Row>\n      <Toolbar name=\"File\"/>\n      <Toolbar name=\"Clipboard\"/>\n\
    \      <Toolbar name=\"UndoRedo\"/>\n      <Toolbar name=\"Memory\"/>\n   </Row>\n\
    </Configuration>\n```\n\nYou have the option to create your own configurations\
    \ and set them dynamically during the runtime, so you show and hide your toolbars\
    \ dependent on the context. Now, you create your own configuration, in which you\
    \ want to show the already created toolbar named `MyToolbar` and the standard\
    \ toolbar `Edit`, while the toolbar `File` will be hidden. The configuration could\
    \ look like [Listing 9-14](#Chapter09.html#list_9_14).\n\n***Listing 9-14.** Configuration\
    \ of Your Own Toolbar*\n\n```\n<!DOCTYPE Configuration PUBLIC\n  \"-//NetBeans\
    \ IDE//DTD toolbar//EN\"\n  \"http://www.netbeans.org/dtds/toolbar.dtd\">\n<Configuration>\n\
    \   <Row>\n      <Toolbar name=\"UndoRedo\"/>\n      <Toolbar name=\"MyToolbar\"\
    />\n   </Row>\n   <Row>\n      <Toolbar name=\"File\" visible=\"false\"/>\n  \
    \ </Row>\n</Configuration>\n```\n\nYou can save this newly created configuration\
    \ with any name. You now add it to the layer file to make the configuration public\
    \ in the Platform. To do so, define the location of the configuration relative\
    \ to the layer file with the `url` attribute, as shown in [Listing 9-15](#Chapter09.html#list_9_15).\n\
    \n***Listing 9-15.** Registering Toolbar Configuration*\n\n```\n<folder name=\"\
    Toolbars\">\n   <file name=\"MyToolbarConfig.xml\" url=\"toolbars/MyToolbarConfig.xml\"\
    />\n</folder>\n```\n\nTo display the desired toolbar and to activate the configuration,\
    \ you just have to add a line in your source code at the place you want it. For\
    \ this purpose, the UI Utilities module provides a helpful API:\n\n```\nToolbarPool.getDefault().setConfiguration(\"\
    MyToolbarConfig\");\n```\n\nThis call could occur, for example, when activating\
    \ a window, to display a context-independent toolbar to the user. For this chapter\
    \ you want to set this up as soon as you create your first window.\n\nThe class\
    \ `ToolbarPool` is responsible for managing toolbars that are registered in the\
    \ System Filesystem. The `getDefault()` method delivers the `ToolbarPool` object\
    \ which is produced by the system and which cares about the toolbars that were\
    \ defined in the standard folder `Toolbars`. You also have the option to create\
    \ your own `ToolbarPool` object which manages toolbars that were defined in your\
    \ own folder. To do so, you just have to pass a `DataFolder` object to the constructor.\
    \ I will show you how this works in the section “Creating Your Own Toolbars.”\n\
    \nThe class `ToolbarPool` provides some useful functions, as shown in Table 9-2.\n\
    \n![Image](images/t0902.jpg)\n\n![Image](images/t0902a.jpg)\n\n#### Adaptation\
    \ by the User\n\nPressing the right mouse button, a context menu is displayed\
    \ on the toolbars in your application. The user can use it to show and hide separate\
    \ toolbars. The toolbars can also be configured by the user via *Customize…* during\
    \ the runtime. Add or delete single actions via drag-and-drop, as shown in [Figure\
    \ 9-2](#Chapter09.html#fig_9_2).\n\n![Image](images/0902.jpg)\n\n***Figure 9-2.**\
    \ User-specific toolbars setting*\n\n#### Creating Your Own Toolbars\n\nAs with\
    \ the menu bar, you have the possibility of creating your own toolbar or a pool\
    \ of toolbars. Then you can use these toolbars within your top component, for\
    \ example. For this purpose, the `ToolbarPool` class and the `Menubar` class provide\
    \ a constructor to which you can pass a `DataFolder` object that represents a\
    \ folder of the toolbars in the System Filesystem, as shown in [Listing 9-16](#Chapter09.html#list_9_16).\
    \ You can define your toolbars exactly as you do with the standard toolbars.\n\
    \n***Listing 9-16.** Creating Your Own Toolbars Which Read Their Content out of\
    \ the System Filesystem*\n\n```\nFileObject  tbs  = FileUtil.getConfigFile(\"\
    MyToolbars\");\nToolbarPool pool = new ToolbarPool(DataFolder.findFolder(tbs));\n\
    ```\n\nYou will find more information about which components you can add to the\
    \ toolbars via the System Filesystem in the API documentation of the class `ToolbarPool`.\n\
    \n#### Using Your Own Controls\n\nYour actions are displayed as an icon in the\
    \ toolbar, by default. Over and above that you can equip your toolbar actions\
    \ with a certain control element, such as a combo box. You do not need a special\
    \ action class for that. You can use a standard action as used in the previous\
    \ sections. Instead of implementing the `ActionListener` interface, this class\
    \ must inherit of `AbstractAction`. We implement the `Presenter.Toolbar` interface\
    \ so the action can always provide its special control element. Furthermore, it\
    \ makes sense to implement a standard constructor for the initialization of the\
    \ control element.\n\n##### Combo Box in Toolbar\n\nAs an example, I want to show\
    \ you an action class which has a combo box as control element with which you\
    \ can edit a zoom, for example.\n\n***Listing 9-17.** User-Specific Control Elements\
    \ for a Toolbar Action*\n\n```\n@ActionID(\n    category = \"View\",\n    id =\
    \ \"com.galileo.netbeans.module.MyComboboxAction\")\n@ActionRegistration(displayName\
    \ = \"#CTL_MyComboboxAction\")\n@ActionReferences({\n    @ActionReference(path=\"\
    Toolbars/MyToolbar\") })\npublic final class MyComboboxAction extends AbstractAction\
    \ implements Presenter.Toolbar {\nJComboBox box = new JComboBox(new String[]{\"\
    100%\", \"200%\"});\n\n    public MyComboboxAction() {\n        box.setMaximumSize(box.getPreferredSize());\n\
    \        box.setAction(this);\n    }\n\n    @Override\n    public void actionPerformed(ActionEvent\
    \ e) {\n        System.out.print(\"Adjust zoom to: \");\n        System.out.println(box.getSelectedItem());\n\
    \    }\n\n    @Override\npublic Component getToolbarPresenter() {\n        return\
    \ box;\n    } }\n```\n\nThe action class is usually registered by the annotations,\
    \ and thus assigned to a toolbar. You add your own control element as a private\
    \ field. You want to avoid having the combo box taking the whole width, so you\
    \ set the maximal width of the combo box on the preferred width in the constructor.\
    \ The connection of control element and action is very important. You achieve\
    \ this by the `setAction()` method of the combo box to which you pass the reference\
    \ on your own class by the `this` operator. If the combo box is now operated,\
    \ this action is executed. Finally, you just have to implement the `getToolbarPresenter()`\
    \ method and return the combo box with it. The combo box you created is displayed\
    \ instead of the standard button."
  raw: '#### Toolbar Configurations


    Which toolbars are displayed in what order is saved in a toolbar configuration
    in XML format. (Please find the corresponding DTD in the appendix.) The toolbars,
    which the NetBeans Platform entails by default, are defined by the configuration
    *Standard.xml* in the Core-UI module. This looks like [Listing 9-13](#Chapter09.html#list_9_13).


    ***Listing 9-13.** Standard Platform Toolbar Configuration: Standard.xml*


    `<Configuration>`

    `   <Row>`

    `      <Toolbar name="`**`File`**`"/>`

    `      <Toolbar name="`**`Clipboard`**`"/>`

    `      <Toolbar name="`**`UndoRedo`**`"/>`

    `      <Toolbar name="`**`Memory`**`"/>`

    `   </Row>`

    `</Configuration>`


    You have the option to create your own configurations and set them dynamically
    during the runtime, so you show and hide your toolbars dependent on the context.
    Now, you create your own configuration, in which you want to show the already
    created toolbar named `MyToolbar` and the standard toolbar `Edit`, while the toolbar
    `File` will be hidden. The configuration could look like [Listing 9-14](#Chapter09.html#list_9_14).


    ***Listing 9-14.** Configuration of Your Own Toolbar*


    `<!DOCTYPE Configuration PUBLIC`

    `  "-//NetBeans IDE//DTD toolbar//EN"`

    `  "http://www.netbeans.org/dtds/toolbar.dtd">`

    `<Configuration>`

    `   <Row>`

    `      <Toolbar name="`**`UndoRedo`**`"/>`

    `      <Toolbar name="`**`MyToolbar`**`"/>`

    `   </Row>`

    `   <Row>`

    `      <Toolbar name="`**`File`**`" visible="`**`false`**`"/>`

    `   </Row>`

    `</Configuration>`


    You can save this newly created configuration with any name. You now add it to
    the layer file to make the configuration public in the Platform. To do so, define
    the location of the configuration relative to the layer file with the `url` attribute,
    as shown in [Listing 9-15](#Chapter09.html#list_9_15).


    ***Listing 9-15.** Registering Toolbar Configuration*


    `<folder name="Toolbars">`

    `   <file name="`**`MyToolbarConfig.xml`**`" url="toolbars/MyToolbarConfig.xml"/>`

    `</folder>`


    To display the desired toolbar and to activate the configuration, you just have
    to add a line in your source code at the place you want it. For this purpose,
    the UI Utilities module provides a helpful API:


    `ToolbarPool.getDefault().setConfiguration("`**`MyToolbarConfig`**`");`


    This call could occur, for example, when activating a window, to display a context-independent
    toolbar to the user. For this chapter you want to set this up as soon as you create
    your first window.


    The class `ToolbarPool` is responsible for managing toolbars that are registered
    in the System Filesystem. The `getDefault()` method delivers the `ToolbarPool`
    object which is produced by the system and which cares about the toolbars that
    were defined in the standard folder `Toolbars`. You also have the option to create
    your own `ToolbarPool` object which manages toolbars that were defined in your
    own folder. To do so, you just have to pass a `DataFolder` object to the constructor.
    I will show you how this works in the section “Creating Your Own Toolbars.”


    The class `ToolbarPool` provides some useful functions, as shown in Table 9-2.


    ![Image](images/t0902.jpg)


    ![Image](images/t0902a.jpg)


    #### Adaptation by the User


    Pressing the right mouse button, a context menu is displayed on the toolbars in
    your application. The user can use it to show and hide separate toolbars. The
    toolbars can also be configured by the user via *Customize…* during the runtime.
    Add or delete single actions via drag-and-drop, as shown in [Figure 9-2](#Chapter09.html#fig_9_2).


    ![Image](images/0902.jpg)


    ***Figure 9-2.** User-specific toolbars setting*


    #### Creating Your Own Toolbars


    As with the menu bar, you have the possibility of creating your own toolbar or
    a pool of toolbars. Then you can use these toolbars within your top component,
    for example. For this purpose, the `ToolbarPool` class and the `Menubar` class
    provide a constructor to which you can pass a `DataFolder` object that represents
    a folder of the toolbars in the System Filesystem, as shown in [Listing 9-16](#Chapter09.html#list_9_16).
    You can define your toolbars exactly as you do with the standard toolbars.


    ***Listing 9-16.** Creating Your Own Toolbars Which Read Their Content out of
    the System Filesystem*


    `FileObject  tbs  = FileUtil.getConfigFile("`**`MyToolbars`**`");`

    `ToolbarPool pool = new ToolbarPool(DataFolder.`**`findFolder`**`(tbs));`


    You will find more information about which components you can add to the toolbars
    via the System Filesystem in the API documentation of the class `ToolbarPool`.


    #### Using Your Own Controls


    Your actions are displayed as an icon in the toolbar, by default. Over and above
    that you can equip your toolbar actions with a certain control element, such as
    a combo box. You do not need a special action class for that. You can use a standard
    action as used in the previous sections. Instead of implementing the `ActionListener`
    interface, this class must inherit of `AbstractAction`. We implement the `Presenter.Toolbar`
    interface so the action can always provide its special control element. Furthermore,
    it makes sense to implement a standard constructor for the initialization of the
    control element.


    ##### Combo Box in Toolbar


    As an example, I want to show you an action class which has a combo box as control
    element with which you can edit a zoom, for example.


    ***Listing 9-17.** User-Specific Control Elements for a Toolbar Action*


    `@ActionID(`

    `    category = "View",`

    `    id = "com.galileo.netbeans.module.MyComboboxAction")`

    `@ActionRegistration(displayName = "#CTL_MyComboboxAction")`

    `@ActionReferences({`

    `    @ActionReference(path="Toolbars/MyToolbar") })`

    `public final class MyComboboxAction extends` **`AbstractAction`** `implements`
    **`Presenter.Toolbar`** `{`

    `JComboBox box =` **`new JComboBox`**`(new String[]{"100%", "200%"});`


    `    public MyComboboxAction() {`

    `        box.setMaximumSize(box.getPreferredSize());`

    `        box.setAction(this);`

    `    }`


    `    @Override`

    `    public void actionPerformed(ActionEvent e) {`

    `        System.out.print("Adjust zoom to: ");`

    `        System.out.println(box.getSelectedItem());`

    `    }`


    `    @Override`

    `public Component` **`getToolbarPresenter()`** `{`

    `        return box;`

    `    } }`


    The action class is usually registered by the annotations, and thus assigned to
    a toolbar. You add your own control element as a private field. You want to avoid
    having the combo box taking the whole width, so you set the maximal width of the
    combo box on the preferred width in the constructor. The connection of control
    element and action is very important. You achieve this by the `setAction()` method
    of the combo box to which you pass the reference on your own class by the `this`
    operator. If the combo box is now operated, this action is executed. Finally,
    you just have to implement the `getToolbarPresenter()` method and return the combo
    box with it. The combo box you created is displayed instead of the standard button.'
  trans: '

    #### 工具栏配置


    哪些工具栏以何种顺序显示，会保存在一个 XML 格式的工具栏配置中。（请在附录中找到对应的 DTD。）NetBeans 平台默认自带的工具栏由 Core-UI
    模块中的配置 *Standard.xml* 定义。该配置如清单 9-13 所示。


    ***清单 9-13.** 标准平台工具栏配置：Standard.xml*


    `<Configuration>`

    `   <Row>`

    `      <Toolbar name="`**`File`**`"/>`

    `      <Toolbar name="`**`Clipboard`**`"/>`

    `      <Toolbar name="`**`UndoRedo`**`"/>`

    `      <Toolbar name="`**`Memory`**`"/>`

    `   </Row>`

    `</Configuration>`


    你可以选择创建自己的配置，并在运行时动态设置它们，从而根据上下文显示或隐藏工具栏。现在，你创建自己的配置，其中希望显示已创建的名为 `MyToolbar`
    的工具栏以及标准工具栏 `Edit`，同时隐藏 `File` 工具栏。该配置可能如清单 9-14 所示。


    ***清单 9-14.** 自定义工具栏配置*


    `<!DOCTYPE Configuration PUBLIC`

    `  "-//NetBeans IDE//DTD toolbar//EN"`

    `  "http://www.netbeans.org/dtds/toolbar.dtd">`

    `<Configuration>`

    `   <Row>`

    `      <Toolbar name="`**`UndoRedo`**`"/>`

    `      <Toolbar name="`**`MyToolbar`**`"/>`

    `   </Row>`

    `   <Row>`

    `      <Toolbar name="`**`File`**`" visible="`**`false`**`"/>`

    `   </Row>`

    `</Configuration>`


    你可以用任意名称保存这个新创建的配置。然后将其添加到层文件中，使该配置在平台中公开。为此，需要使用 `url` 属性定义配置相对于层文件的位置，如清单 9-15
    所示。


    ***清单 9-15.** 注册工具栏配置*


    `<folder name="Toolbars">`

    `   <file name="`**`MyToolbarConfig.xml`**`" url="toolbars/MyToolbarConfig.xml"/>`

    `</folder>`


    要显示所需的工具栏并激活该配置，只需在源代码中所需位置添加一行代码。为此，UI 工具模块提供了一个有用的 API：


    `ToolbarPool.getDefault().setConfiguration("`**`MyToolbarConfig`**`");`


    例如，此调用可以在激活窗口时发生，以便向用户显示与上下文无关的工具栏。在本章中，你希望在创建第一个窗口时立即进行此设置。


    `ToolbarPool` 类负责管理在系统文件系统中注册的工具栏。`getDefault()` 方法返回由系统生成的 `ToolbarPool` 对象，该对象负责管理在标准文件夹
    `Toolbars` 中定义的工具栏。你也可以选择创建自己的 `ToolbarPool` 对象，用于管理在自定义文件夹中定义的工具栏。为此，只需将一个 `DataFolder`
    对象传递给构造函数即可。我将在“创建自己的工具栏”一节中向你展示其工作原理。


    `ToolbarPool` 类提供了一些有用的功能，如表 9-2 所示。


    ![Image](img/t0902.jpg)


    ![Image](img/t0902a.jpg)


    #### 用户自定义


    按下鼠标右键时，应用程序的工具栏上会显示一个上下文菜单。用户可以使用它来显示或隐藏单独的工具栏。用户还可以在运行时通过*自定义...* 来配置工具栏。通过拖放添加或删除单个操作，如图
    9-2 所示。


    ![Image](img/0902.jpg)


    ***图 9-2.** 用户特定的工具栏设置*


    #### 创建自己的工具栏


    与菜单栏一样，你可以创建自己的工具栏或工具栏池。然后，例如，你可以在顶层组件中使用这些工具栏。为此，`ToolbarPool` 类和 `Menubar` 类提供了一个构造函数，你可以向其传递一个
    `DataFolder` 对象，该对象代表系统文件系统中的一个工具栏文件夹，如清单 9-16 所示。你可以像定义标准工具栏一样定义自己的工具栏。


    ***清单 9-16.** 创建从系统文件系统读取内容的自己的工具栏*


    `FileObject  tbs  = FileUtil.getConfigFile("`**`MyToolbars`**`");`

    `ToolbarPool pool = new ToolbarPool(DataFolder.`**`findFolder`**`(tbs));`


    关于可以通过系统文件系统向工具栏添加哪些组件的更多信息，请参阅 `ToolbarPool` 类的 API 文档。


    #### 使用自定义控件


    默认情况下，你的操作在工具栏中显示为图标。除此之外，你还可以为工具栏操作配备特定的控件元素，例如组合框。你不需要为此使用特殊的操作类。你可以使用前面章节中使用的标准操作。该类必须继承
    `AbstractAction`，而不是实现 `ActionListener` 接口。我们实现 `Presenter.Toolbar` 接口，以便该操作始终可以提供其特殊的控件元素。此外，为控件元素的初始化实现一个标准构造函数也是合理的。


    ##### 工具栏中的组合框


    作为示例，我想向你展示一个操作类，它有一个组合框作为控件元素，你可以用它来编辑缩放比例等。


    ***清单 9-17.** 工具栏操作用户特定的控件元素*


    `@ActionID(`

    `    category = "View",`

    `    id = "com.galileo.netbeans.module.MyComboboxAction")`

    `@ActionRegistration(displayName = "#CTL_MyComboboxAction")`

    `@ActionReferences({`

    `    @ActionReference(path="Toolbars/MyToolbar") })`

    `public final class MyComboboxAction extends` **`AbstractAction`** `implements`
    **`Presenter.Toolbar`** `{`

    `JComboBox box =` **`new JComboBox`**`(new String[]{"100%", "200%"});`


    `    public MyComboboxAction() {`

    `        box.setMaximumSize(box.getPreferredSize());`

    `        box.setAction(this);`

    `    }`


    `    @Override`

    `    public void actionPerformed(ActionEvent e) {`

    `        System.out.print("Adjust zoom to: ");`

    `        System.out.println(box.getSelectedItem());`

    `    }`


    `    @Override`

    `public Component` **`getToolbarPresenter()`** `{`

    `        return box;`

    `    } }`


    操作类通常通过注解注册，并因此分配给一个工具栏。你将自定义控件元素添加为私有字段。你希望避免组合框占据整个宽度，因此在构造函数中将组合框的最大宽度设置为首选宽度。控件元素与操作的连接非常重要。你可以通过组合框的
    `setAction()` 方法实现这一点，该方法通过 `this` 运算符将对自身类的引用传递给它。现在，如果操作组合框，则会执行此操作。最后，你只需实现
    `getToolbarPresenter()` 方法并返回组合框即可。你创建的组合框将显示，而不是标准按钮。

