    ### 总结


    Visual Library 是一个用于创建面向图形的用户界面的强大框架。本章讨论了 Visual Library API 的基本结构。我们详细查看了所有小部件类。你学习了关于事件和操作以及作为根元素的
    Scene 类的所有内容。本章另一个重要部分涵盖了模型-视图关系。最后，你了解了如何使用来自 Visual Mobile Designer 的预定义类。


    ## 第 15 章


    ## 技巧与窍门


    在本章中，你将学习一些关于 NetBeans 平台用户界面的有用特性。本章涉及桌面集成、GUI 组件的异步初始化以及撤销和重做功能的实现。

