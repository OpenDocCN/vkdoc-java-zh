    \ by the methods `doDownload()`, `doValidate()`, and `doInstall()` of the `InstallSupport`\
    \ instance. If the method `doInstall()` returns an `OperationSupport.Restarter`,\
    \ a reboot is necessary to finish the installation. However, you do not want to\
