  raw: '#### Search Updates


    The first step is to search the modules that must be installed. The search takes
    place in all registered update centers. That means in the first delivery of your
    application, at least one update center should be registered. Via this update
    center the new modules should be included. You can register an update center quite
    easily by means of the NetBeans IDE. To do so, just call *File ![Image](images/U001.jpg)
    New File ![Image](images/U001.jpg) Module Development ![Image](images/U001.jpg)
    Update Center*. You can find more information on this in [Chapter 36](#Chapter36.html#ch36).


    Search for both the latest and the updated modules by the method shown in [Listing
    25-1](#Chapter25.html#list_25_1). It is important to make the desired (or all)
    update provider(s) load information from the update centers about the provided
    modules. In this example you determine all providers via the `UpdateUnitProviderFactory`
    and execute its `refresh()` method. After that, you determine all provided modules
    that can be updated or reinstalled via the `UpdateManager`, which also takes all
    providers into account. To do so, filter with `!unit.getAvailableUpdates().isEmpty()`
    all modules which are already installed and which are not updated. Now you just
    have to distinguish between a new module and an updated module using the method
    `getInstalled()`. If it says `null`, a version of this module is not yet installed;
    that means it is a new module. According to this query you add the modules to
    the appropriate list.


    ***Listing 25-1.** Searching New and Updated Modules*


    `private List<UpdateElement> install = new ArrayList<UpdateElement>();`

    `private List<UpdateElement> update = new ArrayList<UpdateElement>();`


    `public void` **`searchNewAndUpdatedModules`**`() {`

    `   for (UpdateUnitProvider provider : UpdateUnitProviderFactory.`

    `           getDefault().getUpdateUnitProviders(false)) {`

    `      try {`

    `         provider.`**`refresh`**`(null, true);`

    `      } catch (IOException ex) {`

    `         LOG.severe(ex.getMessage());`

    `      }`

    `   }`

    `for (UpdateUnit unit :` **`UpdateManager`**`.getDefault().`**`getUpdateUnits`**`())
    {`

    `      if (!unit.`**`getAvailableUpdates`**`().isEmpty()) {`

    `         if (unit.`**`getInstalled`**`() == null) {`

    `            install.`**`add`**`(unit.getAvailableUpdates().get(0));`

    `         } else {`

    `            update.`**`add`**`(unit.getAvailableUpdates().get(0));`

    `         }`

    `      }`

    `   }`

    `}`


    In the approach shown in [Listing 25-1](#Chapter25.html#list_25_1), all update
    centers are queried by the `UpdateManager`. You can also restrict the search to
    a separate provider to ensure that the modules are automatically installed out
    of a dedicated update center, as shown in [Listing 25-2](#Chapter25.html#list_25_2).
    You determine the desired update provider by the `UpdateUnitProviderFactory` via
    name (according to the definition in the layer file). In contrast to the previous
    approach, you do not search for the update manager then, but determine it directly
    on the provider.


    ***Listing 25-2.** Searching Modules in a Special Update Center*


    `private static final String` **`UC_NAME`** `= "com_galileo_netbeans_module_update_center";`


    `public void` **`searchNewAndUpdatedModulesInDedicatedUC`**`() {`

    `   for (UpdateUnitProvider provider : UpdateUnitProviderFactory.`

    `           getDefault().`**`getUpdateUnitProviders`**`(false)) {`

    `      try {`

    `         if (`**`provider.getName()`**`.equals(UC_NAME)) {`

    `            provider.refresh(null, true);`

    `for (UpdateUnit u :` **`provider.getUpdateUnits()`**`) {`

    `               if (!u.getAvailableUpdates().isEmpty()) {`

    `                  if (u.getInstalled() == null) {`

    `                     install.add(u.getAvailableUpdates().get(0));`

    `                  } else {`

    `                     update.add(u.getAvailableUpdates().get(0));`

    `                  }`

    `               }`

    `            }`

    `         }`

