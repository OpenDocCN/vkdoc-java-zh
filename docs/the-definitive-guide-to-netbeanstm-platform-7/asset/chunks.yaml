- fmt: "# Java DB\n\n*Apache Derby* is a relational database management system (RDBMS)\
    \ hidden behind Java DB. This database system is implemented 100% in Java and\
    \ can therefore be used as a platform-independent system. The Java DB is very\
    \ small for a complete database management system; it can be delivered directly\
    \ with its application because no special installation and no further actions\
    \ for operating a database are necessary. Java DB is therefore predestined for\
    \ use in a rich client application. Since Java Platform 6, Oracle delivers the\
    \ client database Java DB by default; the NetBeans IDE naturally supports the\
    \ Java DB in terms of management and server action.\n\n## Integrating the Java\
    \ DB\n\nYou can get the Java DB with your Java Platform installation or you can\
    \ download the latest version at [`http://www.oracle.com/technetwork/java/javadb`](http://www.oracle.com/technetwork/java/javadb).\
    \ You will find the file `derby.jar`, which is the actual database system that\
    \ also provides the driver, in the subdirectory `lib`. There is also the file\
    \ `derbyclient.jar`, which is used when the Java DB is executed on a server and\
    \ when you do not want to deliver the database system with your application. However,\
    \ this discussion will mainly deal with the client-side use and therefore with\
    \ embedding the Java DB in its application. Using the terminology of a NetBeans\
    \ Platform application, you want to add the Java DB as an independent and separate\
    \ module to your application; that is, you create a library wrapper module. First,\
    \ call *File ![Image](images/U001.jpg) New Project...* and choose *NetBeans Modules\
    \ ![Image](images/U001.jpg) Library Wrapper Module*. The next step is to select\
    \ the file `derby.jar` and the additional file `derbyLocale_de_DE.jar`, which\
    \ contains the German versions of all reports of the database system. Alternatively\
    \ you can of course add a different language package or additional packages. In\
    \ this example use `org.apache.derby` as code name base and `Java DB Embedded`\
    \ as name. Now you just have to define a dependency on this module which was just\
    \ created in your application module that wants to access the database. The database\
    \ system is then automatically booted when the JDBC driver is called for the first\
    \ time.\n\n## Registering Drivers\n\nIf you have worked with the JDBC API already\
    \ you are probably more or less familiar with the call `Class.forName()`. The\
    \ referring database driver for the database system you use is indirectly loaded,\
    \ so the driver manager is able to establish a connection to its database. The\
    \ `DriverManager` class has been extended by the JDBC API 4.0, which is part of\
    \ the Java Platform 6, so it can load the database drivers which were registered\
    \ over the `META-INF/services` directory. Ideally you or the driver itself can\
    \ declaratively register the implementation of the `java.sql.Driver` interface.\
    \ The advantage of this is that the call `Class.forName()` can be completely omitted\
    \ and the driver is only loaded when it is needed the first time. This way, Java\
    \ DB registers its needed drivers, too. For us that means we are able to directly\
    \ establish a connection via the `DriverManager` and we do not have to worry about\
    \ the driver.\n\n## Creating and Using a Database\n\nAfter packing the Java DB\
    \ in a wrapper module and adding it to your NetBeans Platform application, and\
    \ after you defined a dependency to the NetBeans Platform application, you can\
    \ directly access the database system and create your first database. Each database\
    \ is managed by Java DB in a separate directory which has the same name as the\
    \ database, as shown in [Figure 26-1](#Chapter26.html#fig_26_1). These directories\
    \ are created in a system directory which you have to define first. An ideal location\
    \ would be the user directory, for example, in which the NetBeans platform and\
    \ its application-specific settings are also saved. You can get the path over\
    \ the system properties so you do not need to think about independent platform\
    \ paths.\n\nThis base directory becomes registered with the name `derby.system.home`.\n\
    \n```\nSystem.setProperty(\"derby.system.home\",\n        System.getProperty(\"\
    netbeans.user\",\n        System.getProperty(\"user.home\")) + \"/databases\"\
    );\n```\n\nYou get to the path of the application-specific directory by the feature\
    \ `netbeans.user`. If this feature is not set, use the standard value of the user\
    \ directory, which you get via `user.home`. Within the detected directory, the\
    \ database should be located in the directory `databases`. If you have not set\
    \ the feature `derby.system.home`, Java DB uses the current directory of the application.\n\
    \n![Image](images/2601.jpg)\n\n***Figure 26-1.** Integrating Java DB as library\
    \ wrapper module in your own application. The physical location of the databases\
    \ is set by the feature `derby.system.home`.*\n\nThe feature of the Java DB that\
    \ the database system must not be started explicitly is very practical. The databases\
