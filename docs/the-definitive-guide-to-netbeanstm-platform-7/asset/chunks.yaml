- fmt: "### Validator\n\nA validator can be used for checking the data inserted by\
    \ the user. The desired limits for a value can be checked, for example. You can\
    \ create a validator class for the example application which was created before.\
    \ Then you can limit the order ID on 10 characters. Name the class `OrderIDValidator`\
    \ and derive it from the class `Validator`. Use `String` as type parameter. Then\
    \ you have to implement the `validate()` method so you can check the desired range\
    \ of the value after. If the value is invalid you create a `Result` instance with\
    \ which you can deliver an error message. If the value is okay, you just send\
    \ back `null`. (See [Listing 41-9](#Chapter41.html#list_41_9).)\n\n***Listing\
    \ 41-9.** Implementation of a Validator Class to Ensure Valid Values*\n\n```\n\
    import org.jdesktop.beansbinding.Validator;\nimport org.jdesktop.beansbinding.Validator.Result;\n\
    \npublic class OrderIDValidator extends Validator<String> {\n   @Override\n  \
    \ public Result validate(String value) {\n      if (value.length() > 10) {\n \
    \        return new Result(null, \"Max length of Order ID is 10\");\n      }\n\
    \      return null;\n   }\n}\n```\n\nNow, you assign these validator classes to\
    \ the binding. In order to do this, you first have to compile the class. The easiest\
    \ way to do this is via *Compile* in the context menu of the class in the project\
    \ view. After that, open the context menu of the node *Other Components* in the\
    \ inspector window (the editor must be in the Design view) and call *Add From\
    \ Palette ![Image](images/U001.jpg) Beans ![Image](images/U001.jpg) Choose Bean*.\
    \ Type in the complete class name including the code name base in the dialog that\
    \ appears. In this example, use `com.galileo.netbeans.module.OrderIDValidator`.\
    \ Thus, the validator is provided in the desired form and you can assign it to\
    \ the binding. For this purpose, open the bind dialog of the according text field\
    \ via *Bind ![Image](images/U001.jpg) text*. Switch to the *Advanced* tab. There,\
    \ you can select the added instance (`orderIDValidator1`).\n\nHowever, we did\
    \ not think about what will happen if the entered value is invalid, yet. The Beans\
    \ Binding Framework cares about the fact that the invalid value is not applied.\
    \ However, typically, you want to respond to the user about it. You already generated\
    \ a corresponding message in the validator class. You register a `BindingListener`\
    \ and implement the method `syncFailed()`, in order to omit an invalid input and\
    \ return the message (see the section *Binding Listener*). Check whether you are\
    \ dealing with a validator error and return the corresponding message. (See [Listing\
    \ 41-10](#Chapter41.html#list_41_10).)\n\n***Listing 41-10.** Reacting on an Invalid\
    \ Change of Value*\n\n```\nbindingGroup.addBindingListener(new AbstractBindingListener()\
    \ {\n   @Override\n   public void syncFailed(Binding binding, SyncFailure fail)\
    \ {\n      if ((fail != null) && (fail.getType() == Binding.SyncFailureType.VALIDATION_FAILED))\
    \ {\n         statusLabel.setText(fail.getValidationResult().getDescription());\n\
    \      }\n   }\n});\n```\n\n### Converter\n\nIt is possible to convert between\
    \ types of data with a converter class. For example, it is possible to show values\
    \ as text in the GUI while they are saved as number in the database. This conversion\
    \ occurs in both directions. One converter class derives from the class `Converter`\
    \ and doing so, decides the source and target type of data by means of the type\
    \ parameter. In [Listing 41-11](#Chapter41.html#list_41_11), you want to convert\
    \ between a number and a string.\n\n***Listing 41-11.** Converter Class for Changing\
    \ Different Types of Data*\n\n```\nimport org.jdesktop.beansbinding.Converter;\n\
    \npublic class ProductCategoryConverter extends Converter<Integer, String> {\n\
    \n   @Override\n   public String convertForward(Integer arg) {\n      String value\
    \ = null;\n      switch (arg) {\n         case 1:\n            value = \"Category\
    \ 1\";\n            break;\n         case 2:\n            value = \"Category 2\"\
    ;\n            break;\n      }\n      return value;\n   }\n\n   @Override\n  \
    \ public Integer convertReverse(String arg) {\n      int value = 0;\n      if\
    \ (\"Category 1\".equals(arg)) {\n         value = 1;\n      } else if (\"Category\
    \ 2\".equals(arg)) {\n         value = 2;\n      }\n      return value;\n   }\n\
    }\n```\n\nAdding a converter to a binding takes place the same way as with a validator\
    \ (see the section *Validator*).\n\n### Summary\n\nWith the Swing GUI Builder\
    \ the NetBeans IDE provides the user with a powerful tool for implementing user\
    \ interfaces. You can also take advantage of the Swing GUI Builder when developing\
    \ NetBeans Platform applications. In this chapter, you learned about the basic\
    \ functions of the GUI Builder, its components, and the Layout Manager. Furthermore,\
    \ you used the Beans Binding Framework and got to know the support that the GUI\
    \ Builder provides.\n\n## C H A P T E R  42\n\n## Testing NetBeans Platform Applications\n\
    \nTwo different kinds of tests can be identified for implementing and running\
    \ tests with NetBeans Platform applications: unit tests and functional tests.\
    \ This chapter will address both kinds of tests and the support NetBeans provides\
    \ for them.\n\n### Unit Tests\n\n*Unit tests* for NetBeans Platform applications\
    \ are implemented based on the popular test framework *JUnit*. NetBeans provides\
    \ an extension of JUnit with the library *NB JUnit*. This library provides numerous\
    \ helper classes, which make testing classes and methods within the NetBeans Platform\
    \ a lot easier.\n\n**Caution** JUnit is no longer part of the NetBeans IDE. Now,\
    \ at installation you will be asked whether you want to install JUnit or not.\
    \ The following description presumes that you have agreed to the installation.\
    \ The JUnit module is installed when starting the IDE the first time. Watch out:\
    \ for this installation you need writing permission which usually is not available\
    \ in the standard program directory of Windows 7. It is the same for the Cobertura\
    \ module, which you will use in the section *Checking Test Coverage*. You can\
    \ solve this problem by installing the IDE in another directory (with writing\
    \ permission).\n\nFirst, I will describe the general process of creating and running\
    \ tests by means of a simple class. The subsequent sections will address how to\
