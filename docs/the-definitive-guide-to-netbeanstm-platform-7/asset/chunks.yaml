  trans: '

    ### 远程调试


    最简单的方式是直接从 NetBeans IDE 中以调试模式启动应用程序。不过，NetBeans IDE 也支持调试在 NetBeans IDE 外部启动的应用程序。为此，你需要以调试模式启动应用程序。同时，必须指定一些参数，以便
    NetBeans IDE 能够通过 *Java 调试连线协议* (JDWP) 成功连接到应用程序。远程调试参数列于表 43-2。


    ![Image](img/t4302.jpg)


    ![Image](img/t4302a.jpg)


    例如，通过以下参数启动你的应用程序，以便利用 NetBeans IDE 进行调试：


    `-Xdebug -Xrunjdwp: transport=dt_socket,server=y,address=65535,suspend=n`


    要调试一个外部启动的应用程序，请调用 *调试 ![Image](img/U001.jpg) 附加调试器*。选择 *Java 调试器* *(JPDA)*，并使用
    *SocketAttach* 作为连接器。此外，你还需要指定应用程序运行的主机名、应用程序接受请求的端口号以及超时时间。


    按照图 43-5 所示完成设置后，按 *确定* 以直接建立连接。


    ![Image](img/4305.jpg)


    ***图 43-5.** 将远程调试器与应用程序连接*


    ### 控制调试


    NetBeans IDE 提供了多种操作，你可以利用它们快速定位代码中的关键点，从而最高效地进行调试。以下列表对这些操作进行了很好的概述：


    *   ![Image](img/U4303.jpg) *调试主项目* (*Ctrl + F5*)：启动当前在 IDE 中打开的主项目（以调试模式）。只有启动调试后，以下操作才可用。

    *   ![Image](img/U4304.jpg) *单步跳过* (*F8*)：执行当前完整的代码行，而不会进入其中可能存在的调用。

    *   ![Image](img/U4305.jpg) *单步跳过表达式* (*Shift + F8*)：使用此命令，你可以详细评估由多个方法调用组成的表达式。在“变量”窗口中，每个单独方法调用传递的值和返回值会作为历史记录显示（参见图
    43-4）。如果表达式不包含进一步的方法调用，则该操作的行为与 *单步跳过* 相同。

    *   ![Image](img/U4306.jpg) *单步进入* (*F7*)：使用此命令执行一行代码。如果该代码行包含存在源代码的方法调用，你可以通过此操作进入这些单独的调用。如果存在多个调用，你可以通过一次点击直接进入相应的方法调用。

    *   ![Image](img/U4307.jpg) *单步进入下一个方法* (*Shift + F7*)：类似于 *单步进入* 操作。但使用此操作会直接进入当前行的下一个方法。

    *   ![Image](img/U4308.jpg) *单步跳出* (*Ctrl + F7*)：执行一行代码。如果它是某个方法的一部分，则会执行所有剩余的行，并且调试器会跳转到调用位置。

    *   ![Image](img/U4309.jpg) *运行到光标处* (*F4*)：执行从当前位置到光标所在行的所有行。

    *   ![Image](img/U4310.jpg) *继续* (*F5*)：使用此操作，你可以通过断点恢复暂停的线程。应用程序会一直执行到可能存在的下一个断点。

    *   ![Image](img/U4311.jpg) *暂停：* 使用此操作，你可以立即暂停所有线程。

    *   ![Image](img/U4312.jpg) *结束调试器会话* (*Shift + F5*)：此操作结束当前的调试器会话，如果应用程序是从 IDE
    中启动的，也会随之结束。


    ### 调用堆栈


    如果你的应用程序在断点处停止，你可以通过 *调用堆栈* 窗口（*窗口 ![Image](img/U001.jpg) 调试 ![Image](img/U001.jpg)
    调用堆栈*）查看直到当前行的完整调用层次结构，如图 43-6 所示。双击某个条目，它会直接跳转到编辑器中对应的调用位置。这样你就可以检查与被调用方法相关的变量。


    ![Image](img/4306.jpg)


    ***图 43-6.** 用于跟踪调用层次结构的“调用堆栈”窗口*


    要跳转到 Java 和 NetBeans 平台的方法中，必须存在源代码。你可以在 *源* 窗口（*窗口 ![Image](img/U001.jpg) 调试
    ![Image](img/U001.jpg) 源*）中查看调试器可用的源目录，如图 43-7 所示。你也可以在此处通过上下文菜单的 *添加源根目录* 来添加更多目录。在下载页面
    [`http://netbeans.org`](http://www.netbeans.org) 上，你可以获取 NetBeans 平台的源代码，它是一个单独的
    ZIP 文件。


    ![Image](img/4307.jpg)


    ***图 43-7.** “源”窗口，显示调试时可用的所有源目录*


    ### 堆遍历


    借助堆遍历功能，NetBeans IDE 提供了一个用于跟踪内存泄漏的重要工具。可以在“已加载类”窗口中显示应用程序所有当前实例的概览，如图 43-8 所示。要从众多实例中找到所需的实例，你可以按名称或子类进行过滤。如果需要，你还可以使用正则表达式过滤实例。


    ![Image](img/4308.jpg)


    ***图 43-8.** “已加载类”窗口，用于显示按类分组的所有当前实例的数量*


    你可以通过某个条目的上下文菜单中的 *在实例视图中显示*（参见图 43-9）来单独查看特定类的实例。这样，你就可以查看所选实例的各个值。你可以在左侧选择一个实例。相应的引用也会显示出来。


    ![Image](img/4309.jpg)


    ***图 43-9.** “实例”窗口，用于显示特定类的所有当前实例*


    ### 总结


    借助一个高效设计的调试环境，可以快速追踪应用程序中的错误和潜在问题。你手头就有这样一个环境：NetBeans IDE。在本章中，你了解了 NetBeans
    的调试功能，以及如何将它们用于 NetBeans 平台应用程序的调试。


    ## 第 8 部分


    ## 实践与拓展：开发一个 MP3 管理器——NetBeans 平台应用程序示例


    ## 第 44 章


    ## 示例项目：MP3 管理器


    本章旨在演示一个完全可执行的、在 NetBeans 平台上播放 MP3 文件的应用程序的设计与实现。当然，这个应用程序将尽可能灵活和模块化。因此，它将重用许多之前实现和讨论过的
    NetBeans 平台的优势和特性。


    即使你没有阅读前面所有的章节，或者你正试图直接深入 NetBeans 平台的世界，本章也很有用。在需要更详细知识的地方，我会引导你参考更深入讨论该主题的章节。接下来的页面将只涵盖实现中最重要的部分。与本书中的所有其他示例一样，你可以从
    Apress 网站（[`www.apress.com`](http://www.apress.com)）上本书的源代码/下载区域下载此示例，它是一个完整的
    NetBeans 项目。

