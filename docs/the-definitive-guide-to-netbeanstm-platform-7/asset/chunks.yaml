    ### 集成 Hibernate 库


    首先，你需要从 [`http://hibernate.org.`](http://hibernate.org.) 下载当前版本的 *Hibernate* 发行版（此处为
    3.6.1 版本）。该发行版除了包含 Hibernate 库本身之外，还附带了所有必要的第三方库、示例和全面的文档。你需要像处理 Java DB 一样，将这些库封装成一个独立的模块；这将为应用程序提供
    Hibernate 功能。为此，请调用 *文件 ![Image](img/U001.jpg) 新建项目...*，然后选择 *NetBeans 模块 ![Image](img/U001.jpg)
    库包装器模块*。将以下库添加到发行版中：


    *   hibernate3.jar

    *   lib/jpa/hibernate-jpa-2.0-api-1.0.0.Final.jar

    *   lib/required/antlr-2.7.6.jar

    *   lib/required/commons-collections-3.1.jar

    *   lib/required/dom4j-1.6.1.jar

    *   lib/required/javassist-3.12.0.GA.jar

    *   lib/required/jta-1.1.jar

    *   lib/required/slf4j-api-1.6.1.jar


    Hibernate 使用 Java 简单日志门面（SLF4J）API 来生成日志输出。顾名思义，该 API 为不同的日志框架（包括 Log4J 或 Java
    平台日志框架）提供了一个门面。对于门面而言，并不“强制”要求某个框架必须存在；然而，提供一个这样的框架确实很有意义，尤其是在应用程序开发过程中，因为 Hibernate
    会输出大量有用的报告。SLF4J 也提供了自己的简单日志实现。该实现是 SLF4J 包的一部分，你可以从 [`http://slf4j.org`](http://slf4j.org)
    下载。因此，现在也将这个 JAR 文件添加到 Hibernate 模块中：


    `slf4j-simple-1.6.1.jar`


    如果在 NetBeans 平台中使用库时出现问题，很可能是类加载器问题。Hibernate 本身使用系统类加载器，因此可以在没有显式定义依赖关系的情况下访问实体。Javassist
    库的代理工厂——负责在运行时为对象生成代理（延迟加载所需）——使用了不同的类加载器，因此无法找到 Hibernate 库中的类或应用程序模块中的类。有利的是，你可以通过
    `ProxyFactory.ClassLoaderProvider` 接口向 `javassist.util.proxy.ProxyFactory` 类提供你自己的类加载器提供程序实现，并为
    Hibernate 模块创建一个模块安装程序。使用 `restored()` 方法在启动时为 `ProxyFactory` 的应用程序提供系统类加载器（参见清单
    27-1）。


    ***清单 27-1.** 提供类加载器提供程序实现*


    `import javassist.util.proxy.ProxyFactory;`

    `import org.openide.modules.ModuleInstall;`


    `public class Installer extends ModuleInstall {`

    `   @Override`

    `   public void restored() {`

    `ProxyFactory.classLoaderProvider = new` **`ProxyFactory.ClassLoaderProvider`**`()
    {`

    `        @Override`

    `        public ClassLoader get(ProxyFactory pf) {`

    `return` **`Thread.currentThread().getContextClassLoader`**`();`

    `        }`

    `     };`

    `   }`

    `}`


    通常，当前线程的上下文类加载器就是系统类加载器（如果没有使用其他类加载器）。通过 `get()` 方法将其传递给 `ProxyFactory` 对象。


    ### 示例应用程序的结构


    现在，我将向你展示如何将 Hibernate 与第 26 章中的专辑示例结合使用，以便你能够体会到对象关系桥接的优势。此外，你现在还可以再次使用已经集成的数据库系统
    Java DB。将包含 Hibernate 库的库包装器模块添加到已创建的 Platform 应用程序中。每个想要使用 Hibernate 功能的模块都可以定义对该应用程序的依赖关系。在此示例中，只有应用程序模块（*我的模块*）需要这样做。通过上下文菜单打开*属性*窗口，并在*库*下添加*Hibernate*模块。你需要以相同的方式向*Hibernate*模块添加对*Java
    DB*模块的依赖关系，以便 Hibernate 能够访问 Java DB 数据库驱动程序。


    到目前为止，你已经在应用程序模块中管理了实体类 `genre` 和 `album`。由于 Hibernate 需要访问这些类，你应该定义另一个从 Hibernate
    到应用程序模块的依赖关系。这将导致循环依赖；NetBeans 平台的模块系统会迅速报告错误，应用程序甚至无法启动。这就是为什么你要将实体类外包到一个单独的模块中，从而解决循环依赖问题。这种包含额外模块的配置在图
    27-1 中以图形方式进行了说明。


    ![Image](img/2701.jpg)


    ***图 27-1.** 应用程序组件及其依赖关系*


    ![Image](img/square.jpg) **提示** 在开发应用程序时，不建议使用 Java DB 的嵌入式版本（在本例中为 *Java DB Embedded*
    模块）；相反，应使用已集成在 NetBeans IDE 中的服务器变体。按照第 27 章所述，将 Java DB 驱动程序作为模块集成到你的应用程序中，在
    *hibernate.cfg.xml* 文件中将其调整为连接 URL，然后在 NetBeans IDE 中通过服务窗口中 *数据库 ![Image](img/U001.jpg)
    Java DB* 节点的上下文菜单中的*启动服务器*来启动数据库服务器。这样，你就可以查看 Hibernate 生成的数据库模式了。


    ### 配置 Hibernate


    集成 Hibernate 后，你现在需要提供一些配置信息。你可以通过一个默认名为 *hibernate.cfg.xml* 的 XML 文件来定义这些信息。你绝对需要指定数据库驱动程序、连接数据库的
    URL、必要的身份验证数据以及应使用的 SQL 方言。该配置文件的内容如以下清单 27-2 所示。


    ***清单 27-2.** Hibernate 配置文件*


    `<?xml version="1.0" encoding="utf-8"?>`

    `<!DOCTYPE hibernate-configuration PUBLIC`

    `   "-//Hibernate/Hibernate Configuration DTD 3.0//EN"`

    `   "http://hibernate.sourceforge.net/hibernate-configuration-3.0.dtd">`

    `<`**`hibernate-configuration`**`>`

    `   <session-factory>`

    `      <property name="connection.driver_class">`**`org.apache.derby.jdbc.EmbeddedDriver`**`</property>`

    `      <property name="connection.url">`**`jdbc:derby:hibernate-db;create=true`**`</property>`

    `      <property name="connection.username">`**`user`**`</property>`

    `      <property name="connection.password">`**`password`**`</property>`

    `      <property name="dialect">`**`org.hibernate.dialect.DerbyDialect`**`</property>`

    `   </session-factory>`

    `</`**`hibernate-configuration`**`>`


    首先，你定义了数据库类，在本例中，对于 Java DB 数据库系统，它是 `org.apache.derby.jdbc.EmbeddedDriver`。添加
    URL 以便 Hibernate 能够建立与数据库的连接；你已经知道这是为 Java DB 组合而成的。除了最终可能需要的用户名和密码之外，你还必须定义 SQL
    方言。Hibernate 在 `org.hibernate.dialect` 包中为所有主流数据库系统提供了相应的类。你可以从 Hibernate 参考文档中找到有关其他配置选项的更多信息。


    所有这些都引出了一个问题：这个文件应该放在哪里。由于数据位于单独的文件中，你可以选择使用多个具有不同配置的 Hibernate 模块。然后，你可以将该文件保存在应用程序模块的
    *src* 目录中，或者直接保存在 Hibernate 模块中。重要的是它必须位于相关的类路径上，因为这是搜索它的位置。或者，正如你稍后将看到的，在创建 `Configuration`
    对象时，你可以为配置文件定义替代的 URL。

