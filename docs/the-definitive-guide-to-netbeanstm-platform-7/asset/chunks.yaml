- fmt: "### Name, Icons, and Splash Screen\n\nYou can determine the name of your application\
    \ and assign icons for the sizes 16 × 16, 32 × 32, and 48 × 48 on the first tab\
    \ (*Basics*) of the branding dialog. Those icons are used for different purposes.\
    \ For example, the icon sized 16 × 16 is used for the title bar of your application.\
    \ The icon sized 32 × 32 is used for the taskbar. However, you can also indicate\
    \ a different icon for each.\n\n![Image](images/3501.jpg)\n\n***Figure 35-1.**\
    \ Branding of a NetBeans Platform application*\n\nOn the *Splash Screen* tab you\
    \ can select a splash screen which is displayed when starting your application.\
    \ This splash screen is also used for the About dialog. Furthermore, a progress\
    \ bar can be displayed on the splash screen. You can display or hide the progress\
    \ bar and determine its color. You can easily determine the position of the progress\
    \ bar on the splash screen via drag-and-drop. There, you can also determine the\
    \ position of the text field in which status information is displayed when loading\
    \ the application. You can also determine the text's color yourself.\n\n### Window\
    \ System Behavior\n\nIn [Chapter 10](#Chapter10.html#ch10) you already learned\
    \ how to individually determine the window's behaviour within the NetBeans window\
    \ system. On the *Window System* tab, you can apply these settings globally for\
    \ the whole window system, meaning for all windows. (See [Figure 35-2](#Chapter35.html#fig_35_2).)\n\
    \n![Image](images/3502.jpg)\n\n***Figure 35-2.** Configuring the window system's\
    \ behavior*\n\nIn addition to the already known parameters, you can also determine\
    \ whether the size of the windows within the window system can or cannot be changed.\
    \ Moreover, you can determine whether a window can be closed or not in an editor\
    \ mode (document) or in a view mode (non-document).\n\n### Resource Bundles\n\n\
    You can change all text constants of the NetBeans Platform and comfortably adapt\
    \ them to your needs on the *Resource Bundles* tab (see [Figure 35-3](#Chapter35.html#fig_35_3)).\
    \ In the upper-right corner, a search field is provided to filter text constants\
    \ for keys and values. This way you keep track of these numerous bundles.\n\n\
    ![Image](images/3503.jpg)\n\n***Figure 35-3.** Adapting text constants of the\
    \ NetBeans Platform*\n\nIf you want to delete the version number, for example\
    \ (which is displayed behind the title of your application by default), first\
    \ search for `application` to get a range of key value pairs. This way, you also\
    \ find the text constant with the key `CTL_MainWindow` which determines the name\
    \ of your application. Double-clicking this entry, you can change the value. You\
    \ delete the part `{0}` after the title. Thus, you make it so that the version\
    \ number is no longer displayed. All altered texts are displayed in bold in order\
    \ to keep the overview of all changes.\n\nIf you change something concerning the\
    \ text constants, they are not changed in the original files. Instead, the NetBeans\
    \ IDE creates new `*.properties` files with the changed texts in the `branding`\
    \ directory of your Platform application in the original folder hierarchy of the\
    \ corresponding module. (See [Figure 35-4](#Chapter35.html#fig_35_4).) When creating\
    \ the application a so-called branding module with the *Branding Name* as suffix\
    \ in its name is created. Define the branding name in the *Properties* of your\
    \ Platform application under *Application*. This way, you can deliver your application\
    \ with different brandings parallel. You can define which branding is chosen when\
    \ starting the application by a command-line parameter; this is covered in the\
    \ “Command Line Parameters” section.\n\n![Image](images/3504.jpg)\n\n***Figure\
    \ 35-4.** Administration of the changed text constants in branding modules*\n\n\
    You can switch to the original values any time, because the changed text constants\
    \ are managed separately. Open the *Files* view if you want to reset single or\
    \ multiple changed values when developing. In the *Files* view you find the `branding`\
    \ folder in the directory of your Platform application. In this folder you find\
    \ the corresponding properties files (see [Figure 35-4](#Chapter35.html#fig_35_4)).\
    \ There, you can either delete separate values or whole files.\n\n### Command-Line\
    \ Parameters\n\nStart your finished application by a operating system-specific\
    \ launcher which is provided by the NetBeans Platform. This launcher is an `*.exe`\
    \ file for the Windows operating system, for example. You can influence this launcher\
    \ and thus the start and the execution of the application by a series of parameters.\
    \ Note that you either use a double back slash or a single slash for all paths.\
    \ Command-line parameters are listed in [Table 35-1](#Chapter35.html#tab_35_1).\n\
    \n#### Overview of Parameters\n\n![Image](images/t3501.jpg)\n\nYou can define\
    \ and pass those parameters either directly to the launcher or via the `etc/<branding\
    \ name>.conf` file which is located in the distribution of the application. There\
    \ you can determine any options via the `default_options` attribute. Furthermore,\
    \ you can separately assign the path of the Java Platform, the user directory,\
    \ and additional clusters in this file.\n\n#### Determining Parameters While Developing\n\
    \nWith the `run.args.extra` attribute you can determine parameters in the `project.properties`\
    \ file of your Platform application or module (if the module does not belong to\
    \ another application). You can use this attribute to define command-line parameters\
    \ while developing the application within the NetBeans IDE. For example, if you\
    \ test another locale setting and you want to switch on the output of a logger,\
    \ you enter the following into the `project.properties` file:\n\n```\nrun.args.extra\
    \ = --locale fr:FR \\\n                 -J-Dcom.galileo.netbeans.module.level=100\n\
    ```\n\n### Creating Distribution\n\nThe NetBeans IDE provides different types\
    \ for creating a distribution of your application. For the end user, an installer\
    \ package is the most interesting form of distribution because the user only has\
    \ to click the installer to automatically install the complete software.\n\n####\
    \ Installer Package\n\nThe NetBeans IDE is able to create a operating system-specific\
    \ installer package from your application, as shown in [Figure 35-5](#Chapter35.html#fig_35_5).\
    \ To do so, just define which package you want to create in the *Properties* of\
    \ your Platform application under *Installer*. Optionally, you can add a software\
    \ license and choose whether the installer package will be compressed.\n\n![Image](images/3505.jpg)\n\
    \n***Figure 35-5.** Creating Platform-specific installer packages*\n\nYou can\
    \ create installer packages for Windows, Linux, Max OS X, and Solaris. If you\
    \ now select *Package as…* ![Image](images/U001.jpg) *Installers* from the application\
    \ context menu, the NetBeans IDE creates the desired installer packages in the\
    \ `dist` directory."
  raw: '#### Name, Icons, and Splash Screen


    You can determine the name of your application and assign icons for the sizes
    16 × 16, 32 × 32, and 48 × 48 on the first tab (*Basics*) of the branding dialog.
    Those icons are used for different purposes. For example, the icon sized 16 ×
    16 is used for the title bar of your application. The icon sized 32 × 32 is used
    for the taskbar. However, you can also indicate a different icon for each.


    ![Image](images/3501.jpg)


    ***Figure 35-1.** Branding of a NetBeans Platform application*


    On the *Splash Screen* tab you can select a splash screen which is displayed when
    starting your application. This splash screen is also used for the About dialog.
    Furthermore, a progress bar can be displayed on the splash screen. You can display
    or hide the progress bar and determine its color. You can easily determine the
    position of the progress bar on the splash screen via drag-and-drop. There, you
    can also determine the position of the text field in which status information
    is displayed when loading the application. You can also determine the text''s
    color yourself.


    #### Window System Behavior


    In [Chapter 10](#Chapter10.html#ch10) you already learned how to individually
    determine the window''s behaviour within the NetBeans window system. On the *Window
    System* tab, you can apply these settings globally for the whole window system,
    meaning for all windows. (See [Figure 35-2](#Chapter35.html#fig_35_2).)


    ![Image](images/3502.jpg)


    ***Figure 35-2.** Configuring the window system''s behavior*


    In addition to the already known parameters, you can also determine whether the
    size of the windows within the window system can or cannot be changed. Moreover,
    you can determine whether a window can be closed or not in an editor mode (document)
    or in a view mode (non-document).


    #### Resource Bundles


    You can change all text constants of the NetBeans Platform and comfortably adapt
    them to your needs on the *Resource Bundles* tab (see [Figure 35-3](#Chapter35.html#fig_35_3)).
    In the upper-right corner, a search field is provided to filter text constants
    for keys and values. This way you keep track of these numerous bundles.


    ![Image](images/3503.jpg)


    ***Figure 35-3.** Adapting text constants of the NetBeans Platform*


    If you want to delete the version number, for example (which is displayed behind
    the title of your application by default), first search for `application` to get
    a range of key value pairs. This way, you also find the text constant with the
    key `CTL_MainWindow` which determines the name of your application. Double-clicking
    this entry, you can change the value. You delete the part `{0}` after the title.
    Thus, you make it so that the version number is no longer displayed. All altered
    texts are displayed in bold in order to keep the overview of all changes.


    If you change something concerning the text constants, they are not changed in
    the original files. Instead, the NetBeans IDE creates new *.properties* files
    with the changed texts in the *branding* directory of your Platform application
    in the original folder hierarchy of the corresponding module. (See [Figure 35-4](#Chapter35.html#fig_35_4).)
    When creating the application a so-called branding module with the *Branding Name*
    as suffix in its name is created. Define the branding name in the *Properties*
    of your Platform application under *Application*. This way, you can deliver your
    application with different brandings parallel. You can define which branding is
    chosen when starting the application by a command-line parameter; this is covered
    in the “Command Line Parameters” section.


    ![Image](images/3504.jpg)


    ***Figure 35-4.** Administration of the changed text constants in branding modules*


    You can switch to the original values any time, because the changed text constants
    are managed separately. Open the *Files* view if you want to reset single or multiple
    changed values when developing. In the *Files* view you find the *branding* folder
    in the directory of your Platform application. In this folder you find the corresponding
    properties files (see [Figure 35-4](#Chapter35.html#fig_35_4)). There, you can
    either delete separate values or whole files.


    ### Command-Line Parameters


    Start your finished application by a operating system-specific launcher which
    is provided by the NetBeans Platform. This launcher is an *.exe* file for the
    Windows operating system, for example. You can influence this launcher and thus
    the start and the execution of the application by a series of parameters. Note
    that you either use a double back slash or a single slash for all paths. Command-line
    parameters are listed in [Table 35-1](#Chapter35.html#tab_35_1).


    #### Overview of Parameters


    ![Image](images/t3501.jpg)


    You can define and pass those parameters either directly to the launcher or via
    the *etc/<branding name>.conf* file which is located in the distribution of the
    application. There you can determine any options via the `default_options` attribute.
    Furthermore, you can separately assign the path of the Java Platform, the user
    directory, and additional clusters in this file.


    #### Determining Parameters While Developing


    With the `run.args.extra` attribute you can determine parameters in the *project.properties*
    file of your Platform application or module (if the module does not belong to
    another application). You can use this attribute to define command-line parameters
    while developing the application within the NetBeans IDE. For example, if you
    test another locale setting and you want to switch on the output of a logger,
    you enter the following into the *project.properties* file:


    `run.args.extra = --locale fr:FR \`

    `                 -J-Dcom.galileo.netbeans.module.level=100`


    ### Creating Distribution


    The NetBeans IDE provides different types for creating a distribution of your
    application. For the end user, an installer package is the most interesting form
    of distribution because the user only has to click the installer to automatically
    install the complete software.


    #### Installer Package


    The NetBeans IDE is able to create a operating system-specific installer package
    from your application, as shown in [Figure 35-5](#Chapter35.html#fig_35_5). To
    do so, just define which package you want to create in the *Properties* of your
    Platform application under *Installer*. Optionally, you can add a software license
    and choose whether the installer package will be compressed.


    ![Image](images/3505.jpg)


    ***Figure 35-5.** Creating Platform-specific installer packages*


    You can create installer packages for Windows, Linux, Max OS X, and Solaris. If
    you now select *Package as…* ![Image](images/U001.jpg) *Installers* from the application
    context menu, the NetBeans IDE creates the desired installer packages in the *dist*
    directory.'
  trans: '

    #### 名称、图标与启动画面


    在品牌设置对话框的第一个选项卡（*基本设置*）中，您可以指定应用程序的名称，并为 16 × 16、32 × 32 和 48 × 48 三种尺寸分配图标。这些图标用于不同用途。例如，16
    × 16 的图标用于应用程序的标题栏，32 × 32 的图标用于任务栏。不过，您也可以为每种用途指定不同的图标。


    ![图片](img/3501.jpg)


    ***图 35-1.** NetBeans Platform 应用程序的品牌设置*


    在*启动画面*选项卡中，您可以选择一个启动画面，该画面会在应用程序启动时显示。此启动画面也用于“关于”对话框。此外，您还可以在启动画面上显示一个进度条。您可以显示或隐藏进度条，并决定其颜色。通过拖放操作，您可以轻松确定进度条在启动画面上的位置。同样，您还可以在此处确定文本字段的位置，该字段用于显示加载应用程序时的状态信息。您也可以自行设定文本的颜色。


    #### 窗口系统行为


    在第 10 章中，您已经学习了如何在 NetBeans 窗口系统中单独指定窗口的行为。在*窗口系统*选项卡中，您可以将这些设置全局应用于整个窗口系统，即应用于所有窗口。（参见图
    35-2。）


    ![图片](img/3502.jpg)


    ***图 35-2.** 配置窗口系统的行为*


    除了已知的参数外，您还可以决定窗口系统内的窗口大小是否可更改。此外，您还可以决定在编辑器模式（文档）或视图模式（非文档）下，窗口是否可以关闭。


    #### 资源包


    您可以在*资源包*选项卡中更改 NetBeans Platform 的所有文本常量，并轻松地将其调整为您所需的内容（参见图 35-3）。右上角提供了一个搜索字段，用于按键和值过滤文本常量。这样，您就能轻松管理这些数量众多的资源包。


    ![图片](img/3503.jpg)


    ***图 35-3.** 调整 NetBeans Platform 的文本常量*


    例如，如果您想删除版本号（默认显示在应用程序标题后面），首先搜索 `application` 以获取一系列键值对。这样，您就能找到键为 `CTL_MainWindow`
    的文本常量，它决定了应用程序的名称。双击此条目，您可以更改其值。删除标题后面的 `{0}` 部分。这样，版本号就不再显示了。所有更改过的文本都会以粗体显示，以便您总览所有修改。


    如果您更改了文本常量，原始文件并不会被修改。相反，NetBeans IDE 会在您的 Platform 应用程序的 *branding* 目录中，按照相应模块的原始文件夹层次结构，创建包含更改后文本的新
    *.properties* 文件。（参见图 35-4。）在创建应用程序时，会创建一个所谓的品牌模块，其名称中包含 *Branding Name* 作为后缀。在
    Platform 应用程序的 *Properties* 下的 *Application* 中定义品牌名称。这样，您可以同时交付具有不同品牌设置的应用程序。您可以通过命令行参数指定启动应用程序时选择哪个品牌；这将在“命令行参数”部分中介绍。


    ![图片](img/3504.jpg)


    ***图 35-4.** 在品牌模块中管理已更改的文本常量*


    您可以随时切换回原始值，因为更改后的文本常量是单独管理的。在开发过程中，如果您想重置单个或多个更改后的值，请打开*文件*视图。在*文件*视图中，您可以在 Platform
    应用程序的目录中找到 *branding* 文件夹。在此文件夹中，您可以找到相应的属性文件（参见图 35-4）。在那里，您可以删除单独的条目或整个文件。


    ### 命令行参数


    通过 NetBeans Platform 提供的特定于操作系统的启动器来启动您完成的应用程序。例如，对于 Windows 操作系统，此启动器是一个 *.exe*
    文件。您可以通过一系列参数来影响此启动器，从而影响应用程序的启动和执行。请注意，所有路径要么使用双反斜杠，要么使用单斜杠。命令行参数列于表 35-1 中。


    #### 参数概览


    ![图片](img/t3501.jpg)


    您可以直接将这些参数传递给启动器，或者通过位于应用程序分发目录中的 *etc/<品牌名称>.conf* 文件来定义和传递。在该文件中，您可以通过 `default_options`
    属性指定任何选项。此外，您还可以在此文件中单独指定 Java 平台、用户目录以及其他集群的路径。


    #### 开发时确定参数


    使用 `run.args.extra` 属性，您可以在 Platform 应用程序或模块的 *project.properties* 文件中指定参数（如果该模块不属于其他应用程序）。您可以使用此属性在
    NetBeans IDE 内开发应用程序时定义命令行参数。例如，如果您要测试另一个区域设置并希望打开日志记录器的输出，请在 *project.properties*
    文件中输入以下内容：


    `run.args.extra = --locale fr:FR \`

    `                 -J-Dcom.galileo.netbeans.module.level=100`


    ### 创建分发版本


    NetBeans IDE 提供了多种类型来创建应用程序的分发版本。对于最终用户而言，安装程序包是最有趣的分发形式，因为用户只需单击安装程序即可自动安装完整的软件。


    #### 安装程序包


    NetBeans IDE 能够从您的应用程序创建特定于操作系统的安装程序包，如图 35-5 所示。为此，只需在 Platform 应用程序的 *Properties*
    下的 *Installer* 中定义您要创建的包类型。您还可以选择添加软件许可证，并选择是否压缩安装程序包。


    ![图片](img/3505.jpg)


    ***图 35-5.** 创建特定于平台的安装程序包*


    您可以为 Windows、Linux、Mac OS X 和 Solaris 创建安装程序包。现在，如果您从应用程序上下文菜单中选择 *Package as…*
    ![图片](img/U001.jpg) *Installers*，NetBeans IDE 将在 *dist* 目录中创建所需的安装程序包。

