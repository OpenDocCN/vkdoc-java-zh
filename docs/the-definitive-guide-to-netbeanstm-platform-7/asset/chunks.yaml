- fmt: "### Dependencies\n\nDependencies can be defined between individual widgets.\
    \ You are thereby able to respond to changes in position or size of other widgets.\
    \ This dependency is realized by a listener that is registered on the widget.\
    \ For this purpose, the `Widget` class provides two methods, `addDependency()`\
    \ and `removeDependency()`. With these two methods, a listener can be added or\
    \ removed. A listener is specified by the interface `Widget.Dependency`. Doing\
    \ so, the listener must implement the method `revalidateDependency()`, which is\
    \ called by the respective widget when there is a change of position or size.\
    \ In this method you should call the `revalidate()` method of your widget, meaning\
    \ the widget that depends on another widget.\n\n### Border\n\nEach widget has\
    \ a border. By default, this is an empty border, represented by the class `EmptyBorder`.\
    \ You can determine another border with the `setBorder()` method. A border is\
    \ specified by the interface `Border`. This interface is implemented by numerous\
    \ border classes. Besides the `EmptyBorder` class, these are the classes `LineBorder`,\
    \ `BevelBorder`, `DashedBorder`, `ImageBorder`, `ResizeBorder`, `RoundedBorder`\
    \ and `SwingBorder`. A `ResizeBorder` adds eight points to the edges of your widget,\
    \ which are used to change its size. Beyond the class `SwingBorder` you can use\
    \ any Swing `javax.swing.border.Border` implementation. Finally, the `CompositeBorder`\
    \ class is provided, to which you can pass any amount of the already mentioned\
    \ `Border` instances in order to combine multiple different borders.\n\nHowever,\
    \ the borders are not created directly, but via a factory. This is the `BorderFactory`\
    \ class that provides numerous methods with which you can create various border\
    \ types. You can also use instances produced by this factory for multiple widgets\
    \ at once. So, if you wish to use the same border for several widgets, you just\
    \ need to create one instance of it.\n\n### Layout\n\nA widget (like a Swing container)\
    \ has a special layout, managed and determined by a layout manager. A layout is\
    \ specified by the interface `Layout` and is responsible for the arrangement of\
    \ the child widgets. Four different variants of layouts are available. You create\
    \ them via the `LayoutFactory` class and add them to a widget via the `setLayout()`\
    \ method.\n\n- **AbsoluteLayout**: With the `AbsoluteLayout`, child widgets are\
    \ arranged according to the coordinates that are supplied by `getPreferredLocation()`.\
    \ The size of child widgets corresponds to the proportions provided by `getPreferredBounds()`.\
    \ If both methods supply `null`, the position becomes `(0, 0)` or the size `(0,\
    \ 0, 0, 0)` is used. By default, this layout is used by a widget. This layout\
    \ is generated with `Layout al = LayoutFactory.createAbsoluteLayout();`\n\n- **FlowLayout**:\
    \ The `FlowLayout` arranges its widgets in sequential order in a horizontal or\
    \ vertical direction. Doing so, four different alignments can be selected: left\
    \ top, center, right bottom, and justified. Furthermore, the gap between individual\
    \ widgets can be determined. The size of the widgets corresponds to the value\
    \ that `getPreferredBounds()` returns. The following methods are available for\
    \ the creation of this layout; alternatively, supply the alignment as a `LayoutFactory.SerialAlignment`\
    \ type along with the gap:\n  ```\n  Layout hfl = LayoutFactory.createHorizontalFlowLayout();\n\
    \  Layout vfl = LayoutFactory.createVerticalFlowLayout();\n  ```\n\n- **CardLayout**:\
    \ A `CardLayout` always shows the currently active widget only, which is determined\
    \ by the method `setActiveCard()`. The size of the active widget is determined\
    \ by `getPreferredBounds()`. All other widgets are represented in the size `(0,\
    \ 0, 0, 0)`, so are practically invisible. Determine the currently active widget\
    \ by the method `getActiveCard()`. You can create the layout with the following:\n\
    \  ```\n  Layout cl = LayoutFactory.createCardLayout();\n  ```\n  and specify\
    \ the active widget by the following call:\n  ```\n  LayoutFactory.setActiveCard(Widget\
    \ parent, Widget act);\n  ```\n  You can switch to another widget using the `SwitchCardAction`\
    \ class.\n\n- **OverlayLayout**: The `OverlayLayout` determines the minimum area\
    \ containing all child widgets. Both the widget that contains this layout and\
    \ all child widgets are set to the size of this determined area and arranged on\
    \ top of each other. The last child widget is displayed on top. You create this\
    \ layout as follows:\n  ```\n  Layout ol = LayoutFactory.createOverlayLayout();\n\
    \  ```\n\nA widget knows its position, size, and content, but it does not get\
    \ information about its behavior. The behavior of a widget is influenced by actions\
    \ added arbitrarily to a widget. These actions are specified by the interface\
    \ `WidgetAction`, which defines a number of event methods. These methods are called\
    \ by corresponding events, such as clicking a mouse button on the widget the action\
    \ is assigned to. The implementation of the action class then executes the desired\
    \ behavior such as moving a widget by drag and drop.\n\nLike borders and layouts,\
    \ actions are created by a factory. This is the `ActionFactory` class. These actions\
    \ are managed within a widget by the `WidgetAction.Chain` class. This class receives\
    \ the user events and forwards them to the appropriate actions that are managed\
    \ by this class. Each widget has an instance of this class, which is obtained\
    \ by the `getAction()` method. With the methods `addAction()` and `removeAction()`\
    \ of the `WidgetAction.Chain` class you can add or remove actions to your widget."
