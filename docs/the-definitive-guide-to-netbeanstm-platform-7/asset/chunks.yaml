    ### 用户自定义属性编辑器


    您可以使用自定义编辑器来处理属性值，以支持用户输入、修改属性、检查（日期）或限制（固定值选择）。在图 19-1 中，您可能已经注意到流派可以通过组合框进行选择。您可以通过以下调用为每个单独属性进行设置：


    `genreProp.`**`setPropertyEditorClass`**`(GenrePropertyEditor.class);`


    其中 `GenrePropertyEditor` 是一个带有组合框的用户自定义编辑器。接下来，我们将探讨如何构建这样一个编辑器，并介绍相关的类和方法。请在本书的网页上找到该示例的完整代码，该代码位于
    Apress 网站 `www.apress.com` 的源代码/下载区域。


    首先，您需要从 Java 类 `PropertyEditorSupport` 派生出 `GenrePropertyEditor` 类。这是 `PropertyEditor`
    接口的基础实现，所有用户自定义编辑器都必须实现该接口。此外，您还需要同时实现 `ExPropertyEditor` 和 `InplaceEditor.Factory`
    这两个接口。通过 `ExPropertyEditor` 的 `attachEnv()` 方法，我们可以获取一个 `PropertyEnv` 对象，从而以某种方式与属性窗口进行交互。您需要在该对象上注册一个
    `InplaceEditor.Factory` 实例（即您自己的类），该实例负责创建编辑器。实际上，`getInplaceEditor()` 方法正是执行此操作。该方法仅在请求时创建并交付编辑器。您将图形编辑器组件的实现作为私有内部类提供，该类派生自
    `InplaceEditor`，正如您可能从 `getInplaceEditor()` 的返回值中猜到的那样。由于您希望使用组合框作为编辑器，因此将其定义为私有数据元素，并使用所需的值进行初始化。（参见清单
    19-3。）然后，必须在 `getComponent()` 方法之前交付此组件。`InplaceEditor` 的其他重要方法包括 `setValue()`
    和 `getValue()`。通过这些方法，可以基于属性设置组合框的值，反之亦然。此外，还有 `reset()` 方法，用于撤销更改（通常在按下 *Esc*
    键时）。


    ***清单 19-3.** 用户自定义编辑器，可通过组合框选择流派属性*


    `public class` **`GenrePropertyEditor`** `extends` **`PropertyEditorSupport`**

    `implements` **`ExPropertyEditor`**`,` **`InplaceEditor.Factory`** `{`

    `   private InplaceEditor ed = null;`


    `public void` **`attachEnv`**`(PropertyEnv propertyEnv) {`

    `      propertyEnv.`**`registerInplaceEditorFactory`**`(this);`

    `   }`


    `public InplaceEditor` **`getInplaceEditor`**`() {`

    `      if(ed == null)`

    `         ed = new Inplace();`

    `      return ed;`

    `   }`


    `private static class` **`Inplace`** `implements` **`InplaceEditor`** `{`

    `      private PropertyEditor editor = null;`

    `      private PropertyModel  model  = null;`

    **`private JComboBox genres = new JComboBox(`**

    **`new String[] {"Techno", "Trance", "Rock", "Pop"});`**


    `      public JComponent getComponent() {`

    `         return this.genres;`

    `      }`


    `public Object` **`getValue`**`() {`

    `         return this.genres.getSelectedItem();`

    `      }`


    `public void` **`setValue`**`(Object object) {`

    `         this.genres.setSelectedItem(object);`

    `      }`


    `public void` **`reset`**`() {`

    `         String genre = (String) editor.getValue();`

