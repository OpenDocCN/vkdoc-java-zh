  raw: '##### Drop-down Menu in Toolbar


    The NetBeans Platform provides a special factory class for creating a drop-down
    button with popup menu (see [Figure 9-3](#Chapter09.html#fig_9_3)). You can integrate
    such a button into the toolbar the same way as the combo box that was previously
    shown. So first, you create an action class and add a toolbar to it. It must inherit
    from the class `AbstractAction` to be able to implement the `Toolbar.Presenter`
    interface. In the `getToolbarPresenter()` method, you then produce a popup menu
    which you fill with the actions of the layer file. Then you produce the corresponding
    button by the method `DropDownButtonFactory.createDropDownButton()` and return
    it, as shown in [Listing 9-18](#Chapter09.html#list_9_18).


    ***Listing 9-18.** Creating a Drop-down Button*


    `@ActionID(`

    `    category = "File",`

    `    id = "com.galileo.netbeans.module.MyDropDownButton")`

    `@ActionRegistration(`

    `    iconBase = "com/galileo/netbeans/module/icon.png",`

    `    displayName = "#CTL_MyDropDownButton")`

    `@ActionReferences({`

    `    @ActionReference(path = "`**`Toolbars`**`/File", position = 300)`

    `})`

    `public final class MyDropDownButton extends` **`AbstractAction`** `implements`
    **`Presenter.Toolbar`** `{`

    `final String` **`EXTENSION_POINT`** `= "MyDropDownActions";`

    `    JPopupMenu popup = new JPopupMenu();`


    `    @Override`

    `    public void actionPerformed(ActionEvent e) { }`


    `    @Override`

    `public Component` **`getToolbarPresenter`**`() {`

    `for (Action a: Utilities.` **`actionsForPath`**`(`**`EXTENSION_POINT`**`))`

    `            popup.add(a);`

    `return` **`DropDownButtonFactory.createDropDownButton`**`(`

    `               ImageUtilities.loadImageIcon("com/galileo/netbeans/module/icon.png",
    false),`

    `               popup);`

    `    } }`


    If you look at the source code in [Listing 9-17](#Chapter09.html#list_9_17) you
    see that only a few lines are necessary to create a flexible extendable drop-down
    button with popup menu. Besides the factory method that creates the button, the
    `actionsForPath()` method of the `Utilities` class is important. It provides a
    list of all actions which are registered in a certain folder. You can register
    them there by an `ActionReference` annotation, by default, like this:


    `@ActionReference(path = "MyDropDownActions", position = 100)`

    `public final class MyDropDownAction1 implements ActionListener`


    Thus, the action `MyDropDownAction1` is registered in the System Filesystem in
    the folder `MyDropDownActions`. It works the same way as adding an action to the
    menu bar or the toolbar. You see, the System Filesystem is not just helpful for
    standard components, such as the menu bar or the toolbar, but you can also take
    advantage of it for your own components.


    ![Image](images/0903.jpg)


    ***Figure 9-3.** Drop-down button with popup menu in the toolbar*


    ### Summary


    This chapter covered the menu bar and the toolbar of a NetBeans Platform application.
    You learned how a menu is structured, how to set your own toolbar, and, most important,
    how to simply add your actions to a toolbar or to a menu.


    ## C H A P T E R  10


    ## Window System


    The *Window System* is a framework provided by the NetBeans Platform. It is responsible
    for the administration and display of all application windows and allows the user
    to customize the layout of the user interface.


    ![Image](images/square.jpg)**Tip** The registration of windows now works with
    annotations, making the development of NetBeans Platform applications not just
    easier, but also more independent of the NetBeans IDE.


    The basic structure of the visual window system is document based . That means
    the central section—that is, the editor section—is all about the display of several
    files in tabs. Different windows can be placed in variant areas around the editor
    area, the view areas (see [Figure 10-1](#Chapter10.html#fig_10_1)). Usually, these
    are supporting windows that offer edit functionality to the documents. In the
    case of the NetBeans IDE, for example, these windows provide the structure of
    the project, the Properties dialog, and the Output window. These three are located
    around the editor area.


    By default, all windows are displayed in the NetBeans main application window.
    Moreover, undocking windows by using the context menu or dragging the window from
    the application window is possible (*Dock/Undock*). What that looks like is shown
    in [Figure 10-2](#Chapter10.html#fig_10_2), where the project window is undocked.
    Docking and undocking allows for flexible window positioning. The so-called *Floating
    Windows* feature is especially useful when you are using multiple monitors.


    ![Image](images/1001.jpg)


    ***Figure 10-1.** Structure of the NetBeans Platform application window*


    The window system is comprised of modes. A *mode* is a container in which windows
    can be displayed like a tab. The windows must be subclasses of `TopComponent`.
    All displayed windows are managed by the `WindowManager`. It is also possible
    to group windows. The assembly of the window system is declaratively described
    in the layer file. This assembly entails a description of the available modes,
    the windows that are displayed within them, and a definition of which window belongs
    to what group of windows. This information is also provided to the window system
    via the System Filesystem. In the following sections, the separate parts of the
    window system are described in detail; I will also show you how to use them in
    your module.


    ![Image](images/1002.jpg)


    ***Figure 10-2.** NetBeans window system with floating windows*


    ### Configuration


    A module configures its windows, modes, and groups in the layer file, within the
    folders `Components`, `Modes`, and `Groups` within the standard folder `Windows2`.
    This way, a module can define its available windows, associate them with modes,
    and group them.


    This configuration is the default configuration a module defines. The default
    configuration is used by the window system upon the first start. When exiting
    the application, any changes made to the layout of the application (e.g., moving
    a window to another mode or closing a window group) are stored within the user
    directory in the folder `config/Windows2Local` in a hierarchy identical to the
    layer file. Upon restarting, the application settings are read first. Only if
    no configuration files exist in the user directory (as is the case when starting
    the application for the very first time), are the settings read from the layer
    file.


    ### Window: Top Component


    The Window System API provides the class `TopComponent` for creating windows that
    integrate into the NetBeans Platform. This is a subclass of the Java class `JComponent`
    and it provides optional support for window interactions with the window system.
    A `TopComponent` always exists inside a mode and, as such, is dockable, is automatically
    managed by the `WindowManager`, and receives lifecycle events.'
