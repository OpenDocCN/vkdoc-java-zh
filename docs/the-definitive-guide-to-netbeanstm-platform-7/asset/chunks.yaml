    \ again which you call `Player` and to which you will pass the code name base\
    \ `com.hboeck.mp3manager.player`. Using *Properties ![Image](images/U001.jpg)\
    \ Libraries*, you define the corresponding dependencies so this module can access\
    \ the file type, the JMF plugin, and the service interface.\n\nFirst, you create\
    \ an `Mp3PlayerImpl` class, which inherits from the previously created service\
    \ interface `Mp3Player`. You implement the abstract methods of the service interface\
    \ `MP3Player` here via the Java Media Framework. Start with the `play()` method,\
    \ which an MP3 file is passed to as `Mp3DataObject`. The central class of JMF\
    \ is the `Manager` class. It is used to obtain system-dependent resources. This\
    \ manager creates a `Player` instance for the MP3 file passed as a URL. Before\
    \ starting that `Player` using the `start()` method, you register a `ControllerListener`\
    \ for it, so that you will be informed of the different states of the `Player`.\
    \ (See [Listing 44-9](#Chapter44.html#list_44_9)).\n\n**Listing 44-9.** Implementation\
    \ of the Service Provider Using the JMF\n\n```\npackage com.hboeck.mp3manager.player;\n\
    import com.hboeck.mp3manager.filetype.Mp3DataObject;\nimport com.hboeck.mp3manager.services.player.Mp3Player;\n\
    import javax.media.ControllerEvent;\nimport javax.media.ControllerListener;\n\
    import javax.media.EndOfMediaEvent;\nimport javax.media.GainControl;\nimport javax.media.Manager;\n\
    import javax.media.Player;\nimport javax.media.RealizeCompleteEvent;\nimport javax.media.Time;\n\
    ...\npublic class Mp3PlayerImpl extends Mp3Player implements ControllerListener\
    \ {\n\n   private static final Logger LOG = Logger.getLogger(Mp3PlayerImpl.class.getName());\n\
    \   private Player      player        = null;\n   private GainControl volumeControl\
    \ = null;\n   private int     volume = 20;\n   private boolean mute   = false;\n\
    \   private Mp3DataObject               mp3  = null;\n   private ListIterator<Mp3DataObject>\
    \ list = null;\n\n   public Mp3PlayerImpl() {\n   }\n\n   @Override\n   public\
    \ void play(Mp3DataObject mp3) {\n      try {\n         this.mp3 = mp3;\n    \
    \     if(player != null) {\n            player.stop();\n            player.close();\n\
    \         }\n         player = Manager.createPlayer(mp3.getPrimaryFile().getURL());\n\
    \         player.addControllerListener(this);\n         player.start();\n    \
    \  } catch(Exception e) {\n         LOG.log(Level.SEVERE, e.getMessage(), e);\n\
    \      }\n   }\n\n   @Override\n   public void play(ListIterator<Mp3DataObject>\
    \ mp3s) {\n      list = mp3s;\n      if(list.hasNext()) {\n         play(list.next());\n\
    \      }\n   }\n\n   @Override\n   public void pause() {\n      if(player != null)\
    \ {\n         player.stop();\n      }\n   }\n\n   @Override\n   public void stop()\
    \ {\n      if(player != null) {\n         fireStopEvent();\n         player.stop();\n\
    \         player.setMediaTime(new Time(0));\n         player.close();\n      }\n\
    \   }\n\n   @Override\n   public void previous() {\n      if (list != null &&\
    \ list.hasPrevious()) {\n         play(list.previous());\n      }\n   }\n\n  \
    \ @Override\n   public void next() {\n      if (list != null && list.hasNext())\
    \ {\n         play(list.next());\n      }\n   }\n```\n\nThe `ControllerListener`\
    \ interface defines the `controllerUpdate()` method, which is used to get the\
    \ current state of the `Player`. We are particularly interested in two states:\
    \ first, only if the `Player` is realized do you get access to the volume control;\
    \ at the same time, you notify the listeners that the playback of the MP3 file\
    \ already started (you do so via the `firePlayEvent()` method). The second event\
    \ of interest is `EndOfMediaEvent`, which allows you to stop the `Player`, and\
    \ then reset the current playback position to the beginning. If a list of MP3\
    \ files was passed to the `play()` method, you start playback with the next file\
    \ in the list. (See [Listing 44-10](#Chapter44.html#list_44_10)).\n\n**Listing\
