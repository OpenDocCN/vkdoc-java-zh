    The class `Mp3DetailsView` is the window showing detailed information of the selected
    entry of the `Mp3SearchList`. To get notification of changes in the Lookup—in
    case of selection changes, for example—the `LookupListener` interface is implemented.
    A `Lookup.Result`, which enables us to react to changes for a specific type (in
    our case `Mp3FileObject`), is used as a private member. Opening a window triggers
    the method `componentOpened()`. Use this callback to obtain the Lookup of the
    proxy component, using the method `Utilities.actionsGlobalContext()`, which returns
    a Lookup that always delegates to the local Lookup of the active `TopComponent`.
    Based on this proxy Lookup, you now create a `Lookup.Result` for the type `Mp3FileObject`
    and register a `LookupListener` to listen to changes on this result. If a `TopComponent`
    now gains the focus, which has one or more instances of this type in its local
    Lookup, the method `resultChanged()` gets called. With this, you only need to
    retrieve the instances and display the information accordingly as shown in Listing
    5 9.


    **Listing 5-9.** The Window Mp3DetailsView Shows the Information of the Mp3FileObject,
    Which is Selected in the Mp3SearchList.


    ```

    public class Mp3DetailsView extends TopComponent implements LookupListener {

    private Lookup.Result<Mp3FileObject> result = null;


    public Mp3DetailsView() {

    initComponents();

    }

    public void componentOpened() {

    result = Utilities.actionsGlobalContext().LookupResult(Mp3FileObject.class);

    result.addLookupListener(this);

    }

    public void resultChanged(LookupEvent event) {

    Collection<? extends Mp3FileObject> mp3s = result.allInstances();

    if(!mp3s.isEmpty()) {

    Mp3FileObject mp3 = mp3s.iterator().next();

    artist.setText(mp3.getArtist());

    title.setText(mp3.getTitle());

    year.setText(mp3.getYear());

    }

    }

    }

    ```


    The information provided via `Mp3SearchList` and displayed using `Mp3DetailsView`
    is part of the class `Mp3FileObject` (see [Listing 5-10](#Chapter05.html#list_5_10)).
    This class should be implemented in a separate module to achieve the best possible
    encapsulation and reuse; in this example, it is module C. To grant modules A and
    B access to this class, they must declare a dependency on module C. If the class
    `Mp3FileObject` is provided only via module A, it is possible to move the class
    to module A.


    **Listing 5-10.** Mp3FileObject Provides the Data


    ```

    public class Mp3FileObject {

    private String artist;

    private String title;

    private String year;


    public Mp3FileObject(String artist, String title, String year) {

    this.artist = artist;

    this.title  = title;

    this.year   = year;

    }

    public String getArtist() {

    return this.artist;

    }

    public String getTitle() {

    return this.title;

    }

    public String getYear() {

    return this.year;

    }

    }

    ```


    As a proxy component, this example uses the global proxy Lookup provided by the
    NetBeans Platform, which delegates to the local Lookup of the active `TopComponent`.
    In [Figure 5-4](#Chapter05.html#fig_5_4), this is depicted with the interface
    `ContextGlobalProvider`. This global proxy Lookup can also be easily substituted
    by your own implementation. This implementation only has to provide the local
    Lookup of the component containing the subject to the observer.


    ### Dynamic Lookup


