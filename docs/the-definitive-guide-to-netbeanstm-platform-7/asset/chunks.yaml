    \ Then, your output could look like [Listing 17-1](#Chapter17.html#list_17_1).\n\
    \n***Listing 17-1.** Using the Output Window Module*\n\n```\nInputOutput io =\
    \ IOProvider.getDefault().getIO(\"Task\", true);\nio.getOut().println(\"Info message\"\
    );\nio.getErr().println(\"error message\");\nio.getOut().close();\nio.getErr().close();\n\
    ```\n\nYou get the service provider of the `IOProvider` service, which is located\
    \ in the output window, by the `IOProvider.getDefault()` method over the `Lookup`.\
    \ If the output window module, and thus the service provider, does not exist,\
    \ the `getDefault()` method would provide a standard implementation which would\
    \ write the outputs on the standard output. So, the output window is implemented\
    \ as a global service. (For more information see [Chapter 5](#Chapter05.html#ch5).)\
    \ Consequently, the output window could be easily substituted by your own window\
    \ without having to adapt the source code. The `getIO()` method delivers an `InputOutput`\
    \ object with which you can access the window. You can define a name which is\
    \ displayed on the tab or in the headline. With the `boolean` parameter you determine\
    \ whether a new tab is created or whether an already existing tab with the same\
