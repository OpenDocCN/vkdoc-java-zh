    ### 预设配置


    Maven 并非 IntelliJ IDEA 的内置组件。因此，在创建 Maven 项目之前，您需要先提供一个 Maven 发行版。您可以从 [`http://maven.apache.org`](http://maven.apache.org)
    下载当前版本的 zip 文件，并将其解压到您想要的位置。这个包含 Maven 发行版的目录必须让 IntelliJ IDEA 能够访问到。您可以通过 IDE
    设置中的 *Settings ![Image](img/U001.jpg) Maven* 直接进行配置，或者通过通常位于 Maven 中的环境变量 *M2_HOME*
    来设置。默认情况下，IntelliJ IDEA 会使用该变量定义的路径。Maven 的设置文件（*settings.xml*）通常位于用户目录下的 *.m2/settings.xml*。此外，用户目录下的
    *.m2/repository* 被用作本地仓库。


    ### 创建 NetBeans 平台应用程序


    如果 Maven 已安装，并且 IntelliJ IDEA 已知晓其安装位置，您就可以直接开始创建并设置一个 NetBeans 平台应用程序项目。为此，请调用
    *File ![Image](img/U001.jpg) New Project...*，然后选择 *Create project from scratch*
    选项。在接下来的页面中，您可以为要创建的项目命名，并定义存储位置。激活 *Create module* 选项，并选择 *Maven Module* 类型。（参见图
    40-1。）


    ![Image](img/4001.jpg)


    ***图 40-1.** 创建 Maven 项目*


    点击 *Next* 进入下一页。在此页面，您可以为新项目分配 group ID、artifact ID 和版本。由于您不只是想创建一个空的标准 Maven
    项目，而是要创建一个 NetBeans 平台应用程序项目，请激活 *Create from archetype* 选项。从列表中选择属于 *org.codehaus.mojo.archetypes*
    组的 *netbeans-platform-app-archetype* 原型的最新版本。（参见图 40-2。）如果列表中没有，您可以使用 *Add archetype
    ...* 按钮手动添加该原型，并指定其 artifact 和 group ID。您可以在官方 Maven 仓库 [`http://search.maven.org/#search|ga|1|netbeans-platform-app-archetype`](http://search.maven.org/#search%7Cga%7C1%7Cnetbeans-platform-app-archetype)
    查看可用的版本。


    ![Image](img/4002.jpg)


    ***图 40-2.** 为 NetBeans 平台应用程序项目选择 Maven 原型*


    点击 *Finish* 完成向导，Maven 将创建 NetBeans 平台应用程序的基本结构。最初，这可能需要一些时间，因为需要将多个 Maven 插件下载到本地仓库。正如第
    37 章中提到的，实践中会创建三个 Maven 项目：一个用于打包整个 NetBeans 平台应用程序的上级父项目、一个用于 NetBeans 平台模块的项目，以及另一个用于品牌模块的项目。这些项目都隶属于父项目，因此继承了
    POM 文件的特性。由此产生的项目结构如图 40-3 所示。


    ![Image](img/4003.jpg)


    ***图 40-3.** Maven NetBeans 平台应用程序的项目结构*


    接下来，您可以向此 Maven 项目添加一个或多个 Maven NetBeans 模块。通过菜单中的 *File ![Image](img/U001.jpg)
    New Module...*，或者从已创建的 NetBeans 平台应用程序项目的上下文菜单中选择 *New ![Image](img/U001.jpg)
    Module* 来完成此操作。选择 *Create project from scratch* 选项，并在下一页中选择 *Maven Module* 类型。为模块命名，并确保该模块创建在父项目的目录中。在下一步中，您将看到该模块已添加到父项目中，并且模块本身继承了父项目的属性。您还会看到
    group ID 和版本已从父 POM 文件中获取。您也可以选择定义其他值；为此，请取消激活 *Inherit* 选项。还有一个专门用于创建 NetBeans
    模块的 Maven 原型，即来自 *org.codehaus.mojo.archetypes* 组的 *nbm-archetype* 原型。从列表中选择它，或使用
    *Add archetype* 手动添加。（参见图 40-4。）


    ![Image](img/4004.jpg)


    ***图 40-4.** 为 NetBeans 模块项目选择 Maven 原型*


    点击 *Finish* 完成向导。Maven 会自动创建该模块，并将其作为模块添加到 NetBeans 平台项目中。在此模块及其他模块中，您可以实现应用程序逻辑。本书描述了多个可用的类和
    API；您只需将相关的 NetBeans 平台模块作为依赖项添加到您的应用程序模块中即可。在下一节中，您将学习如何轻松搜索平台模块并将其添加为依赖项。


    ### 定义依赖项


    正如您从前面的章节中已经了解到的，只有在设置了相关模块的依赖关系后，才能使用 NetBeans 模块中的类。对于 Maven 项目，可以通过向 POM 文件添加
    Maven 依赖项来实现。IntelliJ IDEA 提供了一个搜索助手来添加依赖项条目。要打开它，请打开相关的 POM 文件，然后调用 *Code ![Image](img/U001.jpg)
    Generate*。接着从弹出菜单中选择 *Dependency* 以打开助手。例如，您可以搜索 `netbeans`，选择一个特定的 NetBeans 模块，并将其添加为依赖项。（参见图
    40-5。）


    ![Image](img/4005.jpg)


    ***图 40-5.** 搜索 NetBeans 模块并将其添加为依赖项*


    您可以直接在 POM 文件中添加依赖项条目。此外，您也可以在编辑器中实现类时添加依赖项。当您使用一个尚未定义依赖关系的模块中的类时，编辑器中会显示错误。然后，使用
    *Alt+Enter* 从弹出菜单中选择，并通过 artifact 搜索助手添加必要的依赖项。


    ### 构建与运行应用程序


    现在您已经了解了如何创建 NetBeans 平台应用程序的基本结构、如何向其添加应用程序模块，以及如何添加依赖项以使用 NetBeans 平台模块的 API，接下来您只需要能够构建、运行
    NetBeans 平台应用程序并创建发行版即可。


    *Maven Projects* 资源管理器（*Window ![Image](img/U001.jpg) Tool Windows ![Image](img/U001.jpg)
    Maven Projects*）在此处非常有用。首先，需要使用 Maven 构建阶段 *install* 来安装整个应用程序并将其复制到本地仓库。为此，请打开父项目的
    *Lifecycle* 文件夹（在示例中为 *MyApplication - NB App Parent*），然后通过上下文菜单或双击启动该过程。


    NetBeans 平台应用程序通过 Maven 插件 *nbm-maven-plugin* 来运行。为此，该插件提供了目标 *nbm:run-platform*。请注意，您不能通过父项目启动应用程序；必须通过自动创建的
    *NB App* 模块（它代表 NetBeans 平台本身）来启动。您可以在 *Maven Projects* 资源管理器中找到该插件提供的所有目标（参见图
    40-6）。您还会找到目标 *nbm:standalone-zip*，通过它，您最终可以将应用程序创建为 ZIP 发行版。


    ![Image](img/4006.jpg)


    ***图 40-6.** 通过 Maven 项目资源管理器创建和运行应用程序*


    或者，您可以通过 *Run ![Image](img/U001.jpg) Edit Configurations* 设置一个运行配置，然后直接从工具栏启动构建。通过运行配置，您还可以在目标
    *nbm:run-platform* 之前自动执行构建阶段 *install*。这样，您只需一个按钮即可创建并运行您的应用程序。

