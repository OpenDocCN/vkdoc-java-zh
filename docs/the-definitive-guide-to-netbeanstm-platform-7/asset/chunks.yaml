- fmt: "### System Filesystem\n\nSystem Filesystem has been more or less important\
    \ in nearly every chapter of this book. It is important in the dynamic adaptation\
    \ of certain user groups as the central registry of, for example, actions, menu\
    \ entries, windows, or option panels. Anyway, System Filesystem is the concept\
    \ which makes a dynamic adaptation possible in general. There are two features\
    \ which you want to take advantage of. One is the possibility of hiding certain\
    \ entries by the suffix `_hidden`. The other is the possibility of adding additional\
    \ configurations at runtime.\n\nYou will implement the class `UserGroupFileSystem`.\
    \ However, first you need to think about how to manage a user group (see [Listing\
    \ 33-8](#Chapter33.html#list_33_8)). The enum type `UserGroup` will help with\
    \ this.\n\n**Listing 33-8.** Management of the Information of a User Group\n\n\
    ```\npublic enum UserGroup {\n    ADMIN(\"Admin\", \"configs/admin.xml\"),\n \
    \   USER(\"User\", \"configs/user.xml\");\n    private String groupName;\n   \
    \ private String configPath;\n\n    UserGroup(String groupName, String configPath)\
    \ {\n        this.groupName = groupName;\n        this.configPath = configPath;\n\
    \    }\n\n    public URL getConfig() {\n        return UserGroup.class.getResource(configPath);\n\
    \    }\n\n    public String getGroup() {\n        return this.groupName;\n   \
    \ }\n\n    public boolean equals(String groupName) {\n        return this.groupName.equals(groupName);\n\
    \    }\n\n    @Override\n    public String toString() {\n        return this.groupName;\n\
    \    }\n\n    public static UserGroup get(String groupName) {\n        for (UserGroup\
    \ group : UserGroup.values()) {\n            if (group.groupName.equals(groupName))\
    \ {\n                return group;\n            }\n        }\n        return null;\n\
    \    }\n}\n```\n\nDefine the name of the group and the path of the referring configuration\
    \ in this enum type with the elements `USER` and `ADMIN`. Doing so, the method\
    \ `getConfig()` directly delivers a URL on the XML file.\n\nEarlier, you defined\
    \ the two user groups Admin and User. Now you want to create a small test configuration\
    \ for each with which certain menus can be displayed or hidden. So, a menu will\
    \ be provided to the user group User which is not provided to the group Admin,\
    \ and the other way around. (See [Listing 33-9](#Chapter33.html#list_33_9).)\n\
    \n**Listing 33-9.** Configuration of the User Group User\n\n```\n<filesystem>\n\
    \    <folder name=\"Menu\">\n        <folder name=\"Tools_hidden\"/>\n       \
    \ <folder name=\"Admin_hidden\"/>\n    </folder>\n</filesystem>\n```\n\nWith the\
    \ configuration shown in [Listing 33-9](#Chapter33.html#list_33_9), the menu *Tools*\
    \ and *Admin* of users of the group User will be hidden.\n\n**Listing 33-10.**\
    \ Configuration of the User Group Admin\n\n```\n<filesystem>\n    <folder name=\"\
    Menu\">\n        <folder name=\"Edit_hidden\"/>\n        <folder name=\"User_hidden\"\
    />\n    </folder>\n</filesystem>\n```\n\nIn contrast with the configuration shown\
    \ in [Listing 33-10](#Chapter33.html#list_33_10), the menu *Edit* and *User* are\
    \ hidden for Admin group members.\n\nOne or more such configurations which exist\
    \ as XML files can be managed by an `XMLFileSystem` together in a `MultiFileSystem`\
    \ which acts as proxy. A `MultiFileSystem` implementation can be registered as\
    \ a service provider while adding it to the System Filesystem during the startup.\
    \ Since the System Filesystem is able to react on changes, it is possible to set\
    \ the actual configuration subsequently, in other words, after the login. To do\
    \ so, create a `UserGroupFileSystem` class which deduces from `MultiFileSystem`\
    \ (see [Listing 33-11](#Chapter33.html#list_33_11)). Register the class with the\
    \ `@ServiceProvider` annotation in order to find and load it.\n\n**Listing 33-11.**\
    \ MultiFileSystem Implementation with Which Dynamic Configurations Can Be Set\n\
    \n```\nimport org.openide.filesystems.FileSystem;\nimport org.openide.filesystems.MultiFileSystem;\n\
    import org.openide.filesystems.XMLFileSystem;\nimport org.openide.util.Lookup;\n\
    import org.openide.util.lookup.ServiceProvider;\n\n@ServiceProvider(service =\
    \ FileSystem.class)\n@ServiceProvider(service = UserGroupFileSystem.class)\npublic\
    \ class UserGroupFileSystem extends MultiFileSystem {\n\n    public UserGroupFileSystem()\
    \ {\n        setPropagateMasks(true);\n    }\n\n    public static UserGroupFileSystem\
    \ getDefault() {\n        return Lookup.getDefault().lookup(UserGroupFileSystem.class);\n\
    \    }\n\n    public void setUserGroups(List<UserGroup> groups) throws Exception\
    \ {\n        FileSystem[] fileSystems = new FileSystem[groups.size()];\n     \
    \   for (int idx = 0; idx < fileSystems.length; idx++) {\n            fileSystems[idx]\
    \ = new XMLFileSystem(groups.get(idx).getConfig());\n        }\n        setDelegates(fileSystems);\n\
    \    }\n}\n```\n\nThe registered class becomes automatically initialized during\
    \ the startup. However, there is no configuration set so far, so it is a virtually\
    \ empty file system. It is necessary to call the method `setPropagateMasks(true)`\
    \ in the constructor, so the entries with suffix `_hidden` have an effect. The\
    \ global lookup provides the instance which has been added to the System Filesystem\
    \ already. So this instance makes it possible for you to inject dynamic entries\
    \ into the System Filesystem afterward.\n\nThe `setUserGroups()` method, to which\
    \ you transfer a list with `UserGroup` objects out of the login handler, sets\
    \ the configuration in the end. For this purpose, create an `XMLFileSystem` instance\
    \ and create an array out of it for the XML file of each group. Then, transfer\
    \ this array to the `setDelegates()` method so the changes become propagated."
