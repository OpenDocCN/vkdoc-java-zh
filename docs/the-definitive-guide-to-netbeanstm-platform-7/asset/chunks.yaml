- fmt: '### Starting and Executing an Application


    Next I will show you how you can create and start the application as a whole.
    You can use the standard Maven build phase `install` to create the application.
    To execute it, choose *Run As* ![Image](images/U001.jpg) *Maven install* on the
    parent project.


    To start the application out of the Eclipse IDE, you can use the goal `nbm:run-platform`
    of the NetBeans Maven plugin. You establish a *Run Configuration* by pressing
    *Run* ![Image](images/U001.jpg) *Run Configurations.* Double-click *Maven Build*
    and a new configuration will be created. Give it a name (such as *Start Platform*)
    and define the root directory. The root directory is the `application` project
    which is automatically created and which represents the NetBeans Platform itself.
    You can choose the project by pressing the *Browse Workspace...* button. Enter
    `nbm:run-platform` at *Goals*, accept the settings with *Apply*. Click *Run* to
    start the application. (See [Figure 38-7](#Chapter38.html#fig_38_7).)


    ![Image](images/3807.jpg)


    ***Figure 38-7.** Creating a run configuration to start a NetBeans Platform Application*


    The NetBeans Maven plugin achieves many other goals. Among them, it enables you
    to create a ZIP distribution. In the section *Creating and Executing the Application*
    in [Chapter 37](#Chapter37.html#ch37) you can read which goals are provided. Analogous
    to these goals you can install a run configuration which you can comfortably use
    out of the Eclipse IDE.


    ### Summary


    Developing NetBeans Platform applications is not just reserved for NetBeans IDE
    users anymore. Maven support makes the use of NetBeans Platform in the Eclipse
    IDE very simple. You saw in this chapter how to set up your Eclipse IDE to create,
    develop and start Maven-based NetBeans Platform applications.


    ## C H A P T E R  39


    ## From Eclipse to NetBeans


    This chapter describes the basic properties and functions of the NetBeans IDE.
    The chapter should help facilitate the migration from the Eclipse IDE to the Net
    Beans IDE, and make it easier to start working with the NetBeans Platform.


    ### The NetBeans IDE


    This section introduces techniques, fundamental characteristics, and functions
    of the NetBeans IDE. It helps smooth the transition from the Eclipse IDE to the
    NetBeans IDE, and provides an introduction to the NetBeans Platform.


    #### Where Can I find What?


    [Table 39-1](#Chapter39.html#tab_39_1) provides a basic overview of where you
    can find the windows and functions you know from the Eclipse IDE, within the NetBeans
    IDE.


    ![Image](images/t3901.jpg)


    ![Image](images/t3901a.jpg)


    #### Handling Projects


    In the NetBeans IDE, mapping keyboard shortcuts to provided functionalities is
    done via a `keymap`. This `keymap` is viewed and edited under *Tools* ![Image](images/U001.jpg)
    *Options* ![Image](images/U001.jpg) *Keymap*. That means you can adapt the actions
    to your own needs. Better yet, is that several keymaps can be managed in parallel.
    The NetBeans IDE provides an Eclipse keymap out of the box, making it possible
    to switch to Eclipse profile (also under *Tools* ![Image](images/U001.jpg) *Options*
    ![Image](images/U001.jpg) *Keymap*) and use the well-known shortcuts further on.
    Surely, this makes it much easier, especially for advanced Eclipse users.


    Something often missed by Eclipse users in the NetBeans IDE is the *Perspectives*
    feature. However, a module providing the perspective feature is available at `http://plugins.netbeans.org`.
    Thus, you can use perspectives in the NetBeans IDE. This module can be downloaded
    and installed through the *Plugin Manager* (*Tools* ![Image](images/U001.jpg)
    *Plugins*).


    ### From Eclipse Plugin to NetBeans Module


    The concept of a plugin in the Eclipse world is equivalent to a NetBeans module.
    As in the Eclipse IDE, the NetBeans IDE offers a wizard providing the basic structure
    for a module in a few clicks. Perform this via *File* ![Image](images/U001.jpg)
    *New Project…* ![Image](images/U001.jpg) *NetBeans Modules* ![Image](images/U001.jpg)
    *Module*.


    While creating a plugin with the Eclipse IDE, several parameters must be declared
    from the beginning. Among them is the activator, the GUI, and if you want to create
    a rich client application with the new plugin. The NetBeans IDE Module wizard
    takes a more general approach. In all three points specified before, decisions
    can be made later on whether the functionality is needed. An activator - called
    a NetBeans module installer (more on this later on) - can be added anytime via
    a separate wizard. This wizard is found under *File* ![Image](images/U001.jpg)
    *New File...* ![Image](images/U001.jpg) *Module Development* ![Image](images/U001.jpg)
    *Installer / Activator*. Also, there is no need to bother about whether the module
    will come with a graphic interface. On this point, separate wizards are available,
    and you can use them later as needed. One of the most important wizards is the
    *Window* wizard, for the construction of windows, which are docked and administered
    in the NetBeans window system. Start this wizard via *File* ![Image](images/U001.jpg)
    *New File...* ![Image](images/U001.jpg) *Module Development* ![Image](images/U001.jpg)
    *Window*. You can decide whether to provide a rich client application that the
    module will be a part of, or whether this module is to become an extension of
    an already existing application. Although the module wizard asks whether a standalone
    module or an application module is needed, this is easily changed in the *Properties*
    dialog of a module, or simply through adding and removing the module from a NetBeans
    Platform application.


    For modules to become self-contained rich client applications, a NetBeans Platform
    Application project is needed. This project is a container for your modules, and
    is responsible for branding your application. To create a NetBeans Platform application,
    a wizard is also provided. Find it under *File* ![Image](images/U001.jpg) *New
    Project...* ![Image](images/U001.jpg) *NetBeans Modules* ![Image](images/U001.jpg)
    *NetBeans Platform Application*. Both new and existing modules can be added to
    the new application. The range of NetBeans modules used by your application, and
    hence used by your modules, is determined under *Properties* ![Image](images/U001.jpg)
    *Libraries*. Your application (or your modules) is by no means limited to NetBeans
    Platform modules. Arbitrary NetBeans IDE modules can be added to your application.'
