    \ void outputLineCleared(OutputEvent ev) {\n      // Action for deletion of the\
    \ link/line\n   }\n}\n```\n\nAs you see in [Listing 17-3](#Chapter17.html#list_17_3),\
    \ you must implement three methods. You cannot only react on clicks, but must\
