- fmt: "### Saving and Loading Objects\n\nWith the `Installer` class you created a\
    \ helper for easy saving and loading of objects. You want to use it directly.\
    \ You remember that we created the class `DataModel`. This class was responsible\
    \ for the interaction with the database and so was a mapper between SQL and your\
    \ objects. Hibernate now does all these tasks for us. You still want to use the\
    \ class, however, because then you do not have to change your remaining application\
    \ and at the same time you encapsulate the Hibernate interaction. This is probably\
    \ the most interesting part of this chapter, because this is where the greatest\
    \ simplification arises (see [Listing 27-7](#Chapter27.html#list_27_7)).\n\n**Listing\
    \ 27-7.** The Class `DataModel` Interacts with the Database over Hibernate\n\n\
    ```\nimport com.galileo.netbeans.myentities.Genre;\nimport com.galileo.netbeans.myentities.Album;\n\
    import java.util.List;\nimport org.hibernate.Session;\nimport org.hibernate.Transaction;\n\
    \npublic class DataModel {\n   public static List<Album> getAlbums() {\n     \
    \ Session s = Installer.currentSession();\n      Transaction t = s.beginTransaction();\n\
    \      List<Album> list = (List<Album>)s.createCriteria(Album.class).list();\n\
    \      t.commit();\n      return list;\n   }\n   public static List<Genre> getGenres()\
    \ {\n      Session s = Installer.currentSession();\n      Transaction t = s.beginTransaction();\n\
    \      List<Genre> list = (List<Genre>)s.createCriteria(Genre.class).list();\n\
    \      t.commit();\n      return list;\n   }\n   public static void updateAlbum(Album\
    \ album) {\n      Session s = Installer.currentSession();\n      Transaction t\
    \ = s.beginTransaction();\n      s.update(album);\n      t.commit();\n   }\n \
    \  public static void insertAlbum(Album album) {\n      Session s = Installer.currentSession();\n\
    \      Transaction t = s.beginTransaction();\n      s.save(album);\n      t.commit();\n\
    \   }\n   public static void deleteAlbum(Album album) {\n      Session s = Installer.currentSession();\n\
    \      Transaction t = s.beginTransaction();\n      s.delete(album);\n      t.commit();\n\
    \   }\n}\n```\n\nFor each action we use a current—or possibly new—`Session` for\
    \ each action, with which you create a transaction. Then you are able to save,\
    \ update, and execute the wanted action on the `Session` and you can successfully\
    \ close the transaction with `commit()`. As already mentioned, it is not necessary\
    \ to explicitly close the `Session`, because it is automatically closed finishing\
    \ the transaction.\n\nThis example naturally deals with very simple application\
    \ cases. For this reason you have one transaction for each action during a session\
    \ which has the same lifetime. (You can get information about the granularity\
    \ of sessions and transactions that should be used from the Hibernate documentation.)\
    \ So now you have completely migrated our example, which first transferred its\
    \ data via SQL over the JDBC interface quasi “rough draft” between application\
    \ and database. Thus the application runs entirely abstracted from the underlying\
    \ persistence system and you can save and query objects comfortably and transparently.\n\
    \n### Summary\n\nHibernate is an object relational bridge. This allows you to\
    \ create a transparent interface between application and database. In this chapter\
    \ you learned how to integrate Hibernate in a NetBeans Platform application. You\
    \ saw how to configure Hibernate and how the mapping between objects and relations\
    \ is done. The chapter dealt with sessions and session factories as well as with\
    \ the saving and loading of objects.\n\n## Chapter 28: Java Persistence API\n\n\
    The target of the Java Persistence API (JPA) is to specify a standardized, simple\
    \ to use persistence model that can be used with both Java SE and Java EE. The\
    \ best features and ideas flowed in, mainly from Hibernate, TopLink, and JDO.\
    \ Consequently, an application that uses the interfaces of the JPA is completely\
    \ independent of a special framework such as Hibernate. Its application keeps\
    \ the same independence as it had before it was used with the Java Database Connectivity\
    \ (JDBC) interface.\n\nThe JPA is mainly characterized by its lightness and its\
    \ slimness. One of the main features of the JPA is the specification of the object\
    \ relational mapping by the Java annotations directly in the persistence object.\
    \ A separate mapping file as used with Hibernate in [Chapter 27](#Chapter27.html#ch27)\
    \ is not necessary anymore (it should be mentioned that no explicit mapping of\
    \ the object structures on relations is necessary). It is possible, though, to\
    \ influence the standard mapping strategy by annotations. This makes the specification\
    \ of entities much easier. Still, the JPA specifies the SQL-related query language\
    \ *Java Persistence Query Language* (JPQL) for both static and dynamic queries,\
    \ which makes it independent of a proprietary query language as HQL. The persistence\
    \ layer can be classified in three areas: the API itself in the package `javax.persistence`,\
    \ the query language, JPQL and the annotations to define the mapping information.\n\
    \nMeanwhile, a set of projects and frameworks provides a JPA implementation, to\
    \ which Hibernate and EclipseLink or OpenJPA belong. We take a look at the JPA\
    \ interface now, because you already got to know the native interface of Hibernate.\
    \ By the way, the JPA interface of Hibernate does not look very different from\
    \ the native interface. You will see quite clearly that Hibernate was a model\
    \ when JPA was specified.\n\n### Hibernate and the Java Persistence API\n\nSince\
    \ Hibernate 3.5, the Hibernate implementation of the JPA is a built-in feature\
    \ and is located in the `hibernate3.jar`. Together with the used libraries and\
    \ the JPA itself you create a module called Hibernate, exactly as described in\
    \ [Chapter 27](#Chapter27.html#ch27). Pay attention to the hints on the classloader\
    \ and to the logging."
  raw: '#### Saving and Loading Objects


    With the `Installer` class you created a helper for easy saving and loading of
    objects. You want to use it directly. You remember that we created the class `DataModel`.
    This class was responsible for the interaction with the database and so was a
    mapper between SQL and your objects. Hibernate now does all these tasks for us.
    You still want to use the class, however, because then you do not have to change
    your remaining application and at the same time you encapsulate the Hibernate
    interaction. This is probably the most interesting part of this chapter, because
    this is where the greatest simplification arises (see [Listing 27-7](#Chapter27.html#list_27_7)).


    ***Listing 27-7.** The Class DataModel Interacts with the Database over Hibernate*


    `import com.galileo.netbeans.myentities.Genre;`

    `import com.galileo.netbeans.myentities.Album;`

    `import java.util.List;`

    `import org.hibernate.`**`Session`**`;`

    `import org.hibernate.`**`Transaction`**`;`


    `public class` **`DataModel`** `{`

    `public static List<Album>` **`getAlbums`**`() {`

    **`  Session`** `s = Installer.`**`currentSession`**`();`

    `      Transaction t = s.`**`beginTransaction`**`();`

    `      List<Album> list = (List<Album>)s.`**`createCriteria`**`(`**`Album.class`**`).list();`

    `      t.`**`commit`**`();`

    `      return list;`

    `   }`

    `public static List<Genre>` **`getGenres`**`() {`

    **`  Session`** `s = Installer.`**`currentSession`**`();`

    `      Transaction t = s.`**`beginTransaction`**`();`

    `      List<Genre> list = (List<Genre>)s.`**`createCriteria`**`(`**`Genre.class`**`).list();`

    `      t.`**`commit`**`();`

    `      return list;`

    `   }`

    `public static void` **`updateAlbum`**`(Album album) {`

    **`  Session`** `s = Installer.`**`currentSession`**`();`

    `      Transaction t = s.`**`beginTransaction`**`();`

    `      s.`**`update`**`(album);`

    `      t.`**`commit`**`();`

    `   }`

    `public static void` **`insertAlbum`**`(Album album) {`

    **`  Session`** `s = Installer.`**`currentSession`**`();`

    `      Transaction t = s.`**`beginTransaction`**`();`

    `      s.`**`save`**`(album);`

    `      t.`**`commit`**`();`

    `   }`

    `public static void` **`deleteAlbum`**`(Album album) {`

    `      Session s = Installer.`**`currentSession`**`();`

    `      Transaction t = s.`**`beginTransaction`**`();`

    `      s.`**`delete`**`(album);`

    `      t.`**`commit`**`();`

    `   }`

    `}`


    For each action we use a current—or possibly new—`Session` for each action, with
    which you create a transaction. Then you are able to save, update, and execute
    the wanted action on the `Session` and you can successfully close the transaction
    with `commit()`. As already mentioned, it is not necessary to explicitly close
    the `Session`, because it is automatically closed finishing the transaction.


    This example naturally deals with very simple application cases. For this reason
    you have one transaction for each action during a session which has the same lifetime.
    (You can get information about the granularity of sessions and transactions that
    should be used from the Hibernate documentation.) So now you have completely migrated
    our example, which first transferred its data via SQL over the JDBC interface
    quasi “rough draft” between application and database. Thus the application runs
    entirely abstracted from the underlying persistence system and you can save and
    query objects comfortably and transparently.


    ### Summary


    Hibernate is an object relational bridge. This allows you to create a transparent
    interface between application and database. In this chapter you learned how to
    integrate Hibernate in a NetBeans Platform application. You saw how to configure
    Hibernate and how the mapping between objects and relations is done. The chapter
    dealt with sessions and session factories as well as with the saving and loading
    of objects.


    ## C H A P T E R  28


    ## Java Persistence API


    The target of the Java Persistence API (JPA) is to specify a standardized, simple
    to use persistence model that can be used with both Java SE and Java EE. The best
    features and ideas flowed in, mainly from Hibernate, TopLink, and JDO. Consequently,
    an application that uses the interfaces of the JPA is completely independent of
    a special framework such as Hibernate. Its application keeps the same independence
    as it had before it was used with the Java Database Connectivity (JDBC) interface.


    The JPA is mainly characterized by its lightness and its slimness. One of the
    main features of the JPA is the specification of the object relational mapping
    by the Java annotations directly in the persistence object. A separate mapping
    file as used with Hibernate in [Chapter 27](#Chapter27.html#ch27) is not necessary
    anymore (it should be mentioned that no explicit mapping of the object structures
    on relations is necessary). It is possible, though, to influence the standard
    mapping strategy by annotations. This makes the specification of entities much
    easier. Still, the JPA specifies the SQL-related query language *Java Persistence
    Query Language* (JPQL) for both static and dynamic queries, which makes it independent
    of a proprietary query language as HQL. The persistence layer can be classified
    in three areas: the API itself in the package `javax.persistence`, the query language,
    JPQL and the annotations to define the mapping information.


    Meanwhile, a set of projects and frameworks provides a JPA implementation, to
    which Hibernate and EclipseLink or OpenJPA belong. We take a look at the JPA interface
    now, because you already got to know the native interface of Hibernate. By the
    way, the JPA interface of Hibernate does not look very different from the native
    interface. You will see quite clearly that Hibernate was a model when JPA was
    specified.


    ### Hibernate and the Java Persistence API


    Since Hibernate 3.5, the Hibernate implementation of the JPA is a built-in feature
    and is located in the *hibernate3.jar*. Together with the used libraries and the
    JPA itself you create a module called Hibernate, exactly as described in [Chapter
    27](#Chapter27.html#ch27). Pay attention to the hints on the classloader and to
    the logging.'
