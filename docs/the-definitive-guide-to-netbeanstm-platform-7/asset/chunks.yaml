    ### 通过图层文件定义面板条目


    将放置在面板上的组件通过 清单 21-1 所示的 XML 文件进行定义。


    ***清单 21-1.** 定义面板条目的 XML 文件*


    `<!DOCTYPE` **`editor_palette_item`** `PUBLIC`

    `   "-//NetBeans//Editor Palette Item 1.1//EN"`

    `   "http://www.netbeans.org/dtds/editor-palette-item-1_1.dtd">`

    `<`**`editor_palette_item`** `version="1.1">`

    `   <body></body>`

    `   <`**`icon16`** `urlvalue="file:/E:/icon16.jpg"/>`

    `   <`**`icon32`** `urlvalue="file:/E:/icon32.jpg"/>`

    `   <`**`inline-description`**`>`

    `      <`**`display-name`**`>My Palette Item</`**`display-name`**`>`

    `      <`**`tooltip`**`>My Palette Item</`**`tooltip`**`>`

    `   </`**`inline-description`**`>`

    `</`**`editor_palette_item`**`>`


    通过 `icon16` 和 `icon32` 元素，你可以根据用户设置分别为该条目定义要显示的图标。通常，它们的尺寸为 16 像素和 32 像素，但也可以更大。不过，即使对于
    `icon16` 属性，分配一个 16 像素大小的图标也是有意义的，因为该属性也用于在面板管理器中显示（可通过“面板”窗口的上下文菜单调用），而该管理器只能显示
    16 像素的图标。有趣的是，你还可以使用绝对路径，如本节示例所示。因此，不仅可以使用模块中的图标，还可以使用用户自定义目录中的图标。如果你希望用户在运行时能够向面板添加条目，这一点尤其有用。


    通过 `inline-description` 元素及其两个子元素 `display-name` 和 `tooltip`，你可以确定条目在面板中显示的文本。或者，你也可以使用
    `description` 元素代替 `inline-description`。通过其属性 `localizing-bundle`，你可以指定一个资源包，该资源包提供
    `display-name` 和 `tooltip` 的值。通过属性 `display-name-key` 和 `tooltip-key`，你可以指定这些值的键。这样，你还可以实现面板条目的国际化；查看此
    XML 文件的 DTD（DTD 可在附录中找到）会非常有帮助。


    现在你可以定义任意数量的组件。这些组件必须注册到模块的图层文件中，以便将其添加到面板中。为此，你可以定义一个任意文件夹。在此文件夹下，为每个将在面板上显示的类别创建一个子文件夹。然后，将
    XML 文件放入此子文件夹中。结果如下所示，例如：


    `<folder name="`**`MyPaletteItems`**`">`

    `   <folder name="`**`My Category`**`">`

    `      <file name="myitem1.xml" url="`**`myitem1.xml`**`"/>`

    `      <file name="myitem2.xml" url="`**`myitem2.xml`**`"/>`

    `   </folder>`

    `</folder>`


    现在，只缺少一个 `PaletteController` 实例，你需要将其添加到将显示面板条目的顶层组件中（参见清单 21-2）。正如本章开头所述，为此你需要使用
    `PaletteFactory` 类。该类提供了一个工厂方法，即 `createPalette()`。你只需将你在图层文件中定义的 `MyPaletteItems`
    文件夹传递给此方法。然后，`PaletteFactory` 和 `PaletteController` 类会处理其余工作。你必须提供一个 `PaletteActions`
    类的实现作为第二个参数。该类为某些事件提供操作。在最简单的情况下，你可以创建此抽象类的空实现，并在方法中返回空数组 `null`。


    ***清单 21-2.** 创建面板实例并将其与顶层组件连接*


    `public MyTopComponent() {`

    `   ...`

    `   try {`

    `      associateLookup(Lookups.fixed(`

    **`PaletteFactory.createPalette("MyPaletteItems", new MyActions())`**`));`

    `   } catch(IOException e) {`

    `      // 找不到 MyPaletteItems`

    `   }`

    `}`


    ### 通过自定义节点创建面板


    面板的条目由一个节点表示。在上一节中，你通过 XML 文件定义了每个条目。对于每个这样的条目，都会自动提供一个标准节点。你也可以通过自己的节点实现（而非 XML
    定义）来提供面板组件。这些节点必须存在于一个三级层次结构中。顶层只是一个根节点，你可以将其传递给 `createPalette()` 方法以创建元素。第二层上的节点（即根节点的所有子节点）代表一个类别。反过来，它们的子节点则用作面板条目。例如，假设你想创建一个用于管理音乐专辑的面板，这些专辑可以通过拖放添加到播放列表中（如图
    21-2 所示）。


    ![Image](img/2102.jpg)


    ***图 21-2.** 使用面板管理音乐专辑，这些专辑可以通过拖放添加到播放列表中*

