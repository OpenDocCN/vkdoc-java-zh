    \n***Figure 7-1.** Architecture for managing data and files within the NetBeans\
    \ Platform*\n\nA data system is initially abstracted using the `FileSystem` class.\
    \ Doing so, the physical data, which lie below, can be present in any form. The\
    \ `FileSystem` class lets users address physical data from different sources in\
    \ the same way—for example, a local file system, a file system in the form of\
    \ an XML file (similar to how the System Filesystem is built, too) or a JAR file.\
    \ Only an implementation of the abstract `FileSystem` class has to be provided\
    \ in the desired form. This way, the File Systems API abstracts from the concrete\
    \ data and provides it within the application in a virtual file system. Thus access\
