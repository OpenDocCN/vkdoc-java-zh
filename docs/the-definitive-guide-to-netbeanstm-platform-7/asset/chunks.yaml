    接下来定义仓库。NetBeans 平台或 NetBeans IDE 模块可以从该仓库加载，因此它被全局提供给项目。在此文件的 `dependencies`
    下定义的依赖项将提供给所有模块（这些模块继承自父 POM 文件）。因此，你不再需要添加对 JUnit 的依赖。稍后用于构建过程的 Maven 插件可以在 `pluginManagement`
    元素下进行预配置。因此，在此处，例如，你可以定义要使用的集群和 NetBeans Maven 插件的品牌令牌。此外，你可以向编译器插件提供信息，表明项目是基于
    Java 创建的。最初，只有项目的两个模块（品牌模块和应用程序模块）被添加到 `modules` 元素下。你创建的所有属于此应用程序的模块都将通过其构件 ID
    在此处执行。最后，定义将全局和集中提供的属性。你可以使用 ${...} 访问它们的值。


    品牌模块和应用程序模块的 POM 文件都具有普通 NetBeans 平台模块 POM 文件的结构。接下来让我们更仔细地看看这一点。

