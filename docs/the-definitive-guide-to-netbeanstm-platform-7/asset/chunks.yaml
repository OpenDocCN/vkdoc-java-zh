    ### Summary


    The NetBeans Platform window system definitely represents a central part of the
    graphical user interface with which you implement and manage your user-specific
    GUI in separate windows. In this chapter you learned about the basic structure
    of the window system. You looked at the operation and the features of top components,
    modes, and groups. Finally, you also learned how to use the MultiView API combining
    multiple top components.


    ## C H A P T E R  11


    ## Status Bar and Progress Bar


    The status bar enables you to give information directly to the user of your application.
    At the same time, it is possible to extend the status bar with your own components.
    In addition to the status bar, a progress bar that is able to manage and display
    multiple tasks at once is integrated in the application. In the following sections
    you will learn how to use these two components.


    ### Status Bar


    A status bar is already integrated in the application window of the NetBeans Platform.
    You access this status bar via the abstract class `StatusDisplayer`. You get the
    standard implementation of the status bar (this is the standard NetBeans Platform
    status bar if no other is provided) via the `getDefault()` method. It is also
    possible to provide your own implementation of the status bar. (Chapter 5 describes
    how to create your own implementation for a service, such as the status bar.)


    #### Using the Status Bar


    You can output a text on the status bar via the method `setStatusText()`:


    `StatusDisplayer.getDefault().setStatusText("my first status");`


    There is a variant belonging to this method. With this variant you can determine
    the importance of the displayed text via an additional parameter. This means the
    status message is displayed until a new message (with the same or higher importance)
    is set. Additionally, you have the option to delete the message yourself. For
    this purpose, the `setStatusText()` method returns a handle:


    `StatusDisplayer.Message setStatusText(String t, int importance)`


    You can delete the corresponding message after a parameterizable number of milliseconds.
    You can do this via a handle in the form of a `StatusDisplayer.Message` instance
    by the method `clear(int timeInMillis)`.


    You can register a `ChangeListener` via the method `addChangeListener()` to react
    to these changes (changes of the text) of the status bar. If you want to use the
    status bar, you must ensure that your module defines a dependency on the UI Utilitie*s*
    module.


    #### Extending the Status Bar


    You can extend the status bar (if there is enough space) very simply. The UI Utilities
    API provides the service interface `StatusLineElementProvider`. This interface
    specifies the method `getStatusLineElement()`, with which the component that will
    be added to the status bar is returned.


    You add your implementation via the `ServiceProvider` annotation. More information
    about how a service provider provides its implementation and how to determine
    the position of your component in the status bar is provided in [Chapter 5](#Chapter05.html#ch5).
    As an example, [Listing 11-1](#Chapter11.html#list_11_1) shows adding a clock
    to the status bar (see [Figure 11-1](#Chapter11.html#fig_11_1)).


    ***Listing 11-1.** Extending the Status Bar with a Clock*


    `import org.openide.awt.StatusLineElementProvider;`


    `public class MyStatusLineClock implements` **`StatusLineElementProvider`** `{`

    `   private static final DateFormat format = DateFormat.getTimeInstance(DateFormat.MEDIUM);`

    `   private static JLabel time = new JLabel(" " + format.format(new Date()) +
    " ");`

    `   private JPanel panel = new JPanel(new BorderLayout());`


    `   public MyStatusLineClock() {`

    `      Timer t = new Timer(1000, new ActionListener() {`

    `         public void actionPerformed(ActionEvent event) {`

    `            time.setText(" " + format.format(new Date()) + " ");`

    `         }`

    `      });`

    `      t.start();`

    `      panel.add(new JSeparator(SwingConstants.VERTICAL), BorderLayout.WEST);`

    `      panel.add(time, BorderLayout.CENTER);`

    `   }`


    `public Component` **`getStatusLineElement()`** `{`

    `      return panel;`

    `   } }`


    Now, the implementation must be published to be found by the status bar. For this
    purpose, add the following annotation to the class:


    `import org.openide.util.lookup.ServiceProvider`

    `@ServiceProvider(service = StatusLineElementProvider.class)`

    `public class MyStatusLineClock implements StatusLineElementProvider { … }`


    Thus, your clock is declaratively added to the Lookup. Consequently, it can be
    found by the status bar which then adds the component.


    ![Image](images/1101.jpg)


    ***Figure 11-1.** Extending the Status Bar with Your Own Components*


    #### Notifications


    Besides the display of static text on the left side of the status bar, you can
    also display notifications in the form of a balloon on the right (see [Figure
    11-2](#Chapter11.html#fig_11_2)). Not only can messages be displayed more conspicuously
    to the user, but the user can also trigger an action by clicking the message.
    This kind of notification is used by the Plugin Manager, for example, from which
    you can download or install new modules. This way the user can directly start
    the process with one click.


    ![Image](images/1102.jpg)


    ***Figure 11-2.** Displaying Notifications As Balloons Within the NetBeans Platform*


    The displayed balloon is hidden again after a few seconds. However, the icon remains
    in the status bar so the user still has the option to call the notification later
    (see [Listing 11-2](#Chapter11.html#list_11_2)).


    ***Listing 11-2.** Displaying a Notification in the Status Bar*


    **`Notification`** `noti =`**`NotificationDisplayer`**`.getDefault().`**`notify`**`(`

    `    "My first notification...",`

    `    ImageUtilities.loadImageIcon("com/galileo/netbeans/module/info16.png", true),`

    `    "... which disappears in a few seconds",`

    `    Lookups.forPath("NotificationActions").lookup(ActionListener.class));`


    Pass a title, an icon, a detailed description, and an action to the `notify()`
    method (in the example, an action is used via the Lookup of the System Filesystem),
    as shown in [Listing 11-2](#Chapter11.html#list_11_2). Or instead, you can just
    pass `null` if no action will be provided. Optionally, you can determine the priority
    of the message with `NotificationDisplayer.Priority`. The values `HIGH`, `LOW`,
    `NORMAL` and `SILENT` are provided; however, `SILENT` means that only the icon
    is displayed in the status bar. When clicking this icon, the balloon appears.
    If the message will consist of more than one string you can also use a `JComponent`
    instance both for the detailed description in the balloon and for displaying it
    in the notification list. You can use a variant of the `notify()` method for this.


    The message remains visible in the status bar in the notification list until it
    is closed by the user. You also have the option of closing the notification by
    the `clear()` method over the handle `Notification`, which the `notify()` method
    returns as return value.'
