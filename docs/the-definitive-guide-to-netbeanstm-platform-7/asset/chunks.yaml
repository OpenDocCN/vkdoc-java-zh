    #### Installing and Restarting Updates


    Operations on modules are executed via an `OperationContainer`. It is possible
    to add any amount of `UpdateElement` instances to this container. Please note
    that each operation container is responsible for one certain action. That means
    in this case that two different containers are needed. These are created via the
    referring factory methods `OperationContainer.createForInstall()` and `OperationContainer.createForUpdate()`.
    Adding the elements does not depend on the type. This is why you create a helper
    method for your purposes. (See [Listing 25-3](#Chapter25.html#list_25_3).)


    ***Listing 25-3.** Adding the Update Elements to an Operation Container*


    `public OperationContainer<InstallSupport>` **`addToContainer`**`(`

    `        OperationContainer<InstallSupport> c,`

    `        List<UpdateElement> modules) {`

    `   for (UpdateElement e : modules) {`

    `      if (container.`**`canBeAdded`**`(e.getUpdateUnit (), e)) {`

    **`OperationInfo`**`<InstallSupport> operationInfo = c.`**`add`**`(e);`

    `         if (operationInfo != null) {`

    `            c.add(operationInfo.`**`getRequiredElements`**`());`

    `         }`

    `      }`

    `   }`

    `   return container;`

    `}`


    The helper method shown in [Listing 25-3](#Chapter25.html#list_25_3) first checks
    whether a module is compatible with the container. For each module this is checked
    by the method `canBeAdded()`. In that case you add the module; an `OperationInfo`
    instance is delivered when the module has not been found in the container yet.
    This instance helps adding the needed dependencies from the current module by
    means of the method `getRequiredElements()`. In this example, this call could
    be skipped, because all available modules are added anyway. However, with the
    method `getBrokenDependencies()` you could check whether a dependency cannot be
    fulfilled.


    In addition to filling the container with elements, downloading and installing
    modules works the same way; a helper method is useful for this step. An `OperationContainer`
    is passed to this method. Through this operation container the modules can then
    be installed. After that you download, check, and finally install the modules
    by the methods `doDownload()`, `doValidate()`, and `doInstall()` of the `InstallSupport`
    instance. If the method `doInstall()` returns an `OperationSupport.Restarter`,
    a reboot is necessary to finish the installation. However, you do not want to
    reboot at this time, and instead leave the decision about when to reboot to the
    user and so use the method `doRestartLater()`. (See [Listing 25-4](#Chapter25.html#list_25_4).)


    ***Listing 25-4.** Downloading and Installing the Module and Afterward Notifying
    the User*


    `public void` **`installModules`**`(OperationContainer<InstallSupport> container)
    {`

    `   try {`

    `      InstallSupport support = container.getSupport();`


    `      if (support != null) {`

    `         Validator vali = support.`**`doDownload`** `(null, true);`

    `         Installer inst = support.`**`doValidate`**`(vali, null);`

    **`Restarter`** `restarter = support.`**`doInstall`**`(inst, null);`


    `         if (restarter != null) {`

    `            support.`**`doRestartLater`**`(restarter);`

    `            if (!isRestartRequested) {`

    **`NotificationDisplayer`**`.getDefault().notify(`

    `                  "Die Anwendung wurde aktualisiert",`

    `                  ImageUtilities.loadImageIcon("com/galileo/netbeans/module/rs.png",
    false),`

    `                  "Click here to restart",`

    `new` **`RestartAction`**`(support, restarter));`

    `               isRestartRequested = true;`

    `            }`

    `         }`

    `      }`

    `   } catch (OperationException ex) {`

    `      LOG.severe(ex.getMessage());`

    `   }`

    `}`'
