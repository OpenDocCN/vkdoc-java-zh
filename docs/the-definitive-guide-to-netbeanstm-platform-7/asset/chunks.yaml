    \ the referring directory in the following dialog. The wizard will point out that\
    \ it is not a cluster. The wizard will list all JAR files (bundles and modules)\
    \ if you click *Next*. Then you can choose the desired bundles and finish the\
    \ wizard with the *Finish* button.\n\n![Image](images/0403.jpg)\n\n***Figure 4-3.**\
    \ Creating and importing bundle clusters*\n\nNow you can define dependencies from\
