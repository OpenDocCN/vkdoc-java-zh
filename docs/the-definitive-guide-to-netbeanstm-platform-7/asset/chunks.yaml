    The following example illustrates creation of a Login dialog via the `DialogDescriptor`
    class. It is important that the dialog is displayed at the appropriate time: when
    the application starts. The application should be blocked until the login details
    are correctly entered. Two approaches are supported, as discussed in the following
    paragraphs.


    As mentioned, a `Component` object can be passed in to the `DialogDescriptor`,
    displaying it in the dialog. In the example shown in [Figure 13-5](#Chapter13.html#fig_13_5),
    this approach is used to integrate two text fields into the dialog so that the
    user can enter a username and password. The panel provides the username and password
    via its `getUsername()` and `getPassword()` methods. To display the dialog at
    application startup, a Module Installer is needed (see [Chapter 3](#Chapter03.html#ch3)).
    In the `restored()` method of the Module Installer you create the `DialogDescriptor`
    to display the Login dialog.


    ![Image](images/1305.jpg)


    ***Figure 13-5.** Login dialog created via DialogDescriptor and an additional
    panel*


    Because you need to execute the dialog asynchronously—otherwise the dialog would
    be displayed during the initialization phase—it is necessary to register an `ActionListener`
    to react to user button clicks. The actual login process is executed in the `actionPerformed()`
    method. If the entered values are incorrect, exit the application via the `LifecycleManager`
    class (see [Chapter 8](#Chapter08.html#ch8)).


    To allow reaction when users click the Close button (on the upper-right side of
    the dialog), register a `PropertyChangeListener`, in which the application is
    shut down. To display the dialog immediately after the initialization phase—that
    is, directly after the splash screen—use the `notifyLater()` method, as shown
    in [Listing 13-1](#Chapter13.html#list_13_1).


    ***Listing 13-1.** Login Dialog Displayed When the Application Starts, Blocking
    the Application Until the Username and Password Are Successfully Entered*


