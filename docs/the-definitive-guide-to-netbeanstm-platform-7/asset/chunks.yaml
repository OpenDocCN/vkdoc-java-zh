    ### Directory Server


    The data necessary for the authentication of a user are usually managed by a directory
    server. With the directory server you can swap the necessary information by the
    Lightweight Directory Access Protocol (LDAP). To implement the example and for
    the sake of demonstration you want to install a local directory server. You can
    create and change the necessary structure of the data for its usage.


    #### Installing the Test Environment


    The *Apache Directory* project will be used as server. One part of it is *ApacheDS*,
    which is an LDAP conform directory server written in Java. The other part of the
    project is the *Apache Directory Studio*, which is a tooling platform you will
    use as GUI for the directory server ApacheDS. You just need to download and install
    the directory studio in which ApacheDS is embedded. After installing the software,
    you can start the studio and install the server. But before installing the server
    you have to add it. Open the assistant with *File ![Image](images/U001.jpg) New…*
    and choose the entry *Apache DS Server* in the category *Apache DS*. On the following
    page you just need to give it a name before you finish the assistant with *Finish*.
    After that you can provide the server. (See [Figure 33-1](#Chapter33.html#fig_33_1).)


    ![Image](images/3301.jpg)


    ***Figure 33-1.** Installing the Apache Directory server instance*


    The created instance is added to the window *Server* with the standard settings.
    In this window, first start the server. After, you will be able to create a connection
    with *LDAP Browser ![Image](images/U001.jpg) Create a Connection* in the context
    menu. This connection will be added to the *Connections* window. Switch to this
    window and establish a connection to the server with *Open Connection* in the
    context menu. If this connection is established, a Directory Information Tree
    (DIT) is displayed in the *LDAP Browser* window. (See [Figure 33-2](#Chapter33.html#fig_33_2).)
    Next you will add the necessary user data to the LDAP browser window.


    ![Image](images/3302.jpg)


    ***Figure 33-2.** Apache Directory Studio*'
