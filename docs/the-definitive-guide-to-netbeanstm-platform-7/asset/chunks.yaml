- fmt: "#### Mapping Objects on Relations\n\nNow that Hibernate is ready, the question\
    \ arises as to how Hibernate saves your objects in the database. How is the referring\
    \ object structure mapped on a relation? You create a so-called *mapping file*\
    \ for each object which persists precisely this mapping information. This involves,\
    \ among other things, information with which name and with which type object attributes\
    \ in a relation are saved, but more important, how associations between different\
    \ objects are handled. Much detailed information is possible and needed, depending\
    \ on the complexity of the object structure and the purpose of the application.\
    \ In this setting you cannot go into detail, so restrict the application on the\
    \ mapping information which is necessary for your exemplified classes.\n\nLet's\
    \ look at such a mapping first for our example class `Genre`. You remember that\
    \ in it you managed a number as a unique ID and a string for the genre name itself.\
    \ (See [Listing 27-3](#Chapter27.html#list_27_3).)\n\n***Listing 27-3.** Object\
    \ Relational Mapping for the Class Genre: Genre.hbm.xml*\n\n```\n<!DOCTYPE hibernate-mapping\
    \ PUBLIC\n   \"-//Hibernate/Hibernate Mapping DTD 3.0//EN\"\n   \"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\"\
    >\n<hibernate-mapping package=\"com.galileo.netbeans.myentities\">\n   <class\
    \ name=\"Genre\" table=\"Genre\" lazy=\"true\">\n      <id name=\"id\">\n    \
    \     <generator class=\"increment\"/>\n      </id>\n      <property name=\"genre\"\
    \n                not-null=\"true\"\n                length=\"30\"\n         \
    \       column=\"genre\"/>\n   </class>\n</hibernate-mapping>\n```\n\nBy the `class`\
    \ element you define the class name and the name of the table in which the files\
    \ of an object of the type `Genre` are saved. With the element `id` you define\
    \ your object attribute with the same name as primary key for the table which\
    \ will be assigned in ascending order. At last, you only need to define the second\
    \ and last attribute `genre` with the `property` element. If you look at an excerpt\
    \ of the mapping for the class `Album`, it gets a little more interesting, because\
    \ a genre can be assigned to an album; there can be multiple albums of the same\
    \ genre, however. Therefore you have a `many-to-one` relation. You define this\
    \ with the element which has the same name and set its `lazy` attribute to `false`,\
    \ as shown in [Listing 27-4](#Chapter27.html#list_27_4). This way the `Genre`\
    \ object is loaded together with the `Album` and not just when it is needed. By\
    \ determining `fetch=\"join\"` you induce Hibernate to detect the genre at the\
    \ same time as querying the album data by a JOIN query. This is a query optimization:\
    \ only one instead of two queries is needed to load a class completely out of\
    \ a database.\n\n***Listing 27-4.** Define the Association on the Genre with Many-to-One*\n\
    \n```\n<!DOCTYPE hibernate-mapping PUBLIC\n   \"-//Hibernate/Hibernate Mapping\
    \ DTD 3.0//EN\"\n   \"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\"\
    >\n<hibernate-mapping package=\"com.galileo.netbeans.myentities\">\n   <class\
    \ name=\"Album\" table=\"Album\" lazy=\"true\">\n      <id name=\"id\">\n    \
    \     <generator class=\"increment\"/>\n      </id>\n      <many-to-one name=\"\
    genre\" lazy=\"false\" fetch=\"join\"/>\n      <property name=\"title\"\n    \
    \            not-null=\"true\"\n                length=\"30\"\n              \
    \  column=\"title\"/>\n```\n\nNow you have to make these mappings, which typically\
    \ end with *hbm.xml* and which are in the same package as the classes, known in\
    \ Hibernate. This is done by an entry in the configuration file *hibernate.cfg.xml*\
    \ in which you already did the database settings. You list all files by the element\
    \ `mapping`. Furthermore, you define the feature `hbm2ddl` with the value `update`.\
    \ So, if it is not there yet, Hibernate automatically creates the database schema\
    \ for us out of the information of the mapping files when the application starts,\
    \ as shown in [Listing 27-5](#Chapter27.html#list_27_5).\n\n***Listing 27-5.**\
    \ Making the Mapping Files Public in the Configuration File*\n\n```\n<hibernate-configuration>\n\
    \   <session-factory>\n      ...\n      <property name=\"hbm2ddl.auto\">update</property>\n\
    \      <mapping resource=\"com/galileo/netbeans/myentities/Genre.hbm.xml\"/>\n\
    \      <mapping resource=\"com/galileo/netbeans/myentities/Album.hbm.xml\"/>\n\
    \   </session-factory>\n</hibernate-configuration>\n```\n\n#### SessionFactory\
    \ and Sessions\n\nNow the configuration work is completed and you can get in touch\
    \ with Hibernate for the first time. To do this, first create an object of the\
    \ class `Configuration` which manages the configuration you created before in\
    \ the file *hibernate.cfg.xml*. This class wants to get its information from the\
    \ *hibernate.properties* file by default. However, you organized your information\
    \ in an XML document, which is why you induce the `Configuration` instance to\
    \ search for this file with the `configure()` method. This method is also available\
    \ in some parameterized variants, which you can transfer a `File` or a `URL` in\
    \ the configuration file to. We use the parameter-less version which directly\
    \ expects the configuration with the name *hibernate.cfg.xml* on the class path.\
    \ Usually, such a `Configuration` is only created once. Based on this configuration\
    \ we create a `SessionFactory` with the method `buildSessionFactory()`. A `SessionFactory`\
    \ is also held throughout the duration of the complete runtime of the application.\n\
    \nIn other words, you manage the `Configuration` and the `SessionFactory` instance\
    \ in your module at a central place. A module installer class would be good for\
    \ that purpose; you would create a static instance of a `SessionFactory` there\
    \ (see [Listing 27-6](#Chapter27.html#list_27_6)).\n\n***Listing 27-6.** Central\
    \ Management and Providing the SessionFactory*\n\n```\nimport org.hibernate.Session;\n\
    import org.hibernate.SessionFactory;\nimport org.hibernate.cfg.Configuration;\n\
    import org.openide.modules.ModuleInstall;\n\npublic class Installer extends ModuleInstall\
    \ {\nprivate static final SessionFactory sessionFactory;\n   static {\n      try\
    \ {\nsessionFactory = new Configuration().configure().buildSessionFactory();\n\
    \      } catch (Throwable ex) {\n         throw new ExceptionInInitializerError(ex);\n\
    \      }\n   }\npublic static Session createSession() {\n      return sessionFactory.openSession();\n\
    \   }\npublic static Session currentSession() {\n      return sessionFactory.getCurrentSession();\n\
    \   }\n   @Override\npublic void close() {\n      sessionFactory.close();\n  \
    \ }\n}\n```\n\nThe database is accessed through sessions. A `Session` is a relative\
    \ short-lived object which is responsible for the interaction between application\
    \ and database. So there is a JDBC connection hidden behind a `Session`. A session\
    \ is thus also responsible for the creation of a transaction and contains a cache.\
    \ You create each a new `Session` with the method `openSession()`. An even more\
    \ current session is delivered with the method `getCurrentSession()`. If there\
    \ is none, a new one is created and bound to the current thread. If a transaction\
    \ is finished (by `commit()` or `rollback()`), which was created by this `Session`,\
    \ it is automatically closed. This way of using sessions is the easiest and the\
    \ most comfortable and is therefore preferred."
