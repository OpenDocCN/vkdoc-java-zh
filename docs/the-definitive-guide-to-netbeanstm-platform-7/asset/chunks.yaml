    \ modules and are only provided by one module—are typically implemented using\
    \ abstract (singleton) classes. With this pattern, the services manage the implementation\
    \ on their own and provide an additional trivial implementation (as an inner class)\
    \ in case there is no other implementation registered in the system. This has\
