- fmt: '# Eclipse IDE and the NetBeans Platform


    In [Chapter 37](#Chapter37.html#ch37) you learned how easy it is to create applications
    based on the NetBeans Platform even without the NetBeans IDE. This is possible
    now because NetBeans Platform applications can be developed with Maven (with the
    NetBeans Maven plugins). A Maven Repository with all NetBeans modules as Maven
    modules is available at [`http://bits.netbeans.org/maven2`](http://bits.netbeans.org/maven2),
    so dependencies on NetBeans Platform modules can easily be defined by an XML entry.


    Besides Maven, numerous annotations contribute to the independence of a given
    IDE, since by now, many declarative configuration entries have been created by
    corresponding wizards. But to compile them manually is complex and error-prone.
    The corresponding configuration entries and configuration files are created automatically.


    Because of the Maven support available for the Eclipse IDE, the way has been cleared
    for using the NetBeans Platform.


    ## Installing Eclipse IDE


    This chapter assumes you have a current version of Eclipse installed. You can
    get a distribution at [`http://www.eclipse.org/downloads`](http://www.eclipse.org/downloads),
    though this does not contain support for Maven projects yet. You can install the
    support for Maven projects with the *M2Eclipse* feature.


    The easiest way to receive the M2Eclipse feature is through the *Eclipse Marketplace*.
    In order to do this just activate *Help ![Image](images/U001.jpg) Eclipse Marketplace*.
    Choose the *Eclipse Marketplace* catalog. All available features will be displayed
    on the following page. After that you can install *Maven Integration for Eclipse*
    on the *Install* button. Now that the necessary plugins are determined (see [Figure
    38-1](#Chapter38.html#fig_38_1)) close the wizard with *Finish*.


    ![Image](images/3801.jpg)


    ***Figure 38-1.** Installation of the M2Eclipse feature*


    After you have installed the Maven feature the next step is to take care that
    the Eclipse IDE gets started with the Virtual Machine of the JDK, because the
    Maven plugin uses libraries out of the JDK. You can adapt the `eclipse.ini` file
    which you can find in the root directory of the Eclipse distribution. In this
    file you can indicate the Virtual Machine you want to use with the `vm` parameter
    as follows:


    ```

    -vm

    C:\Program Files\Java\jdk1.6.0_23\bin\javaw.exe

    ```


    This parameter must be indicated in front of the `vmargs` parameter.


    ## Creating a NetBeans Platform Application


    Now that your Eclipse IDE can deal with Maven projects, you can create your NetBeans
    Platform-based application in Eclipse. To do this call up *File ![Image](images/U001.jpg)
    New ![Image](images/U001.jpg) Other...* then choose *Maven* in the category *Maven
    Project* wizard. Leave the option *Create a simple project* deactivated as you
    want to choose a special Maven archetype on the subsequent page. This archetype
    creates the basic structure for a NetBeans Platform application. You get the required
    `netbeans-platform-app` archetype by filtering in the *Nexus Indexer* catalog
    for `platform`, as shown in [Figure 38-2](#Chapter38.html#fig_38_2).


    ![Image](images/3802.jpg)


    ***Figure 38-2.** Choice of the NetBeans Platform application archetype*


    Choose this archetype. On the subsequent page you have to choose the group ID,
    artifact ID, and the version for the application to apply. This package is only
    used for the branding module. Finally, you determine the NetBeans Platform version
    to use with the feature `netbeansVersion`. Under [`http://bits.netbeans.org/maven2/org/netbeans/cluster/platform`](http://bits.netbeans.org/maven2/org/netbeans/cluster/platform)
    you can check which versions are available through the standard repository. Press
    *Finish* to create the NetBeans Platform Maven project. (See [Figure 38-3](#Chapter38.html#fig_38_3).)


    ![Image](images/3803.jpg)


    ***Figure 38-3.** Defining the parameters for the NetBeans Platform application
    project*


    As described in [Chapter 37](#Chapter37.html#ch37), three projects will be created
    by Maven. One project (in the example here named *MyApplication*) represents the
    parent POM file. Additionally, two Maven module projects which refer to the parent
    project will be created. One represents the NetBeans Platform with its modules
    (*application*), the other represents the branding modules (*branding*).


    ## Creating NetBeans Platform Modules


    Now you can add a first application module to the base for the NetBeans Platform
    application that was created above. In order to do so, you can again draw on a
    wizard. Call the context menu of the parent project in the package explorer (e.g.,
    *MyApplication*) and choose *Maven ![Image](images/U001.jpg) New Maven Module
    Project* (note: if you use the menu instead of the context menu the parent POM
    file can get overwritten).


    On the first page you define a name for the module you want to create. It should
    be automatically referred to the parent project. Leave the option *Create a simple
    project* deactivated, because you want to choose a specific NetBeans module archetype
    on the following wizard page.


    You can find the `nbm-archetype` in the *Nexus Indexer* catalog—you can filter
    the listed items for `nbm`. Choose the `nbm-archetype` now (see [Figure 38-4](#Chapter38.html#fig_38_4)).


    ![Image](images/3804.jpg)


    ***Figure 38-4.** Choose the `nbm-archetype` to create a NetBeans module*


    On the last wizard page, the group ID should already be preoccupied by the parent
    project''s value. Please define the version of the currently valid module and
    the base package used. There are no properties listed for this project type, though
    you must define the property `netbeansVersion`. This way you specify an existing
    NetBeans version (see [Figure 38 5](#Chapter38.html#fig_38_5)).


    ![Image](images/3805.jpg)


    ***Figure 38-5.** Defining the parameters for the NetBeans Platform module project*


    Finally, the application module is created and automatically added to the parent
    POM file when you press the *Finish* button. So the whole application can later
    be automatically created as a unit. The parent POM file refers to the module POM
    file; the parent POM file inherits the settings and features of the module POM
    file.


    ## Add Dependencies


    In order to be able to get access to classes of other modules, you must define
    a dependency in the POM file. This is also valid for the usage of classes of the
    NetBeans Platform modules. If you indicate group ID, artifact ID, and version
    it is possible to define the dependency in the POM file manually. Alternatively,
    you can click *Maven ![Image](images/U001.jpg) Add Dependency* from the context
    menu of the module concerned. There you can search for modules and, by pressing
    *OK*, you can add the chosen dependency. (See [Figure 38-6](#Chapter38.html#fig_38_6).)


    ![Image](images/3806.jpg)


    ***Figure 38-6.** Adding a dependency*'
