- fmt: "### Shutting Down a Database\n\nA database automatically starts up when a\
    \ connection to a database is established. Shutting down is different. The database\
    \ system cannot recognize when an application is finished (and would thus shut\
    \ down abruptly) so you should explicitly shut down the database system when finishing\
    \ the application; a consistent condition is then guaranteed. Shutting down the\
    \ system means all active databases are implicitly shut down. Optionally, you\
    \ can separately finish databases, too.\n\nThe best way to accomplish this task\
    \ is to do it with a module installer or in a lifecycle manager implementation\
    \ (see [Chapter 8](#Chapter08.html#ch8)). In a module installer use the `close()`\
    \ method as shown in [Listing 26-1](#Chapter26.html#list_26_1).\n\n***Listing\
    \ 26-1.** Shutting Down the Database System Finishing an Application*\n\n```\n\
    import java.sql.DriverManager;\nimport java.sql.SQLException;\nimport org.openide.modules.ModuleInstall;\n\
    \npublic class Installer extends ModuleInstall {\n   @Override\npublic void close()\
    \ {\n      try {\n        DriverManager.getConnection(\"jdbc:derby:;shutdown=true\"\
    );\n      } catch (SQLException ex) {}\n   }\n}\n```\n\nWith that the whole Java\
    \ DB system is shut down finishing your application. If you want to shut down\
    \ an individual database you just have to add `jdbc:derby:` behind the referring\
    \ database name. If, for example, you want to finish the database `MyDB`, the\
    \ call would be as follows:\n\n```\nDriverManager.getConnection(\"jdbc:derby:MyDB;shutdown=true\"\
    );\n```\n\nBear in mind that shutting down, meaning the parameter `shutdown=true`,\
    \ always triggers an exception which provides a report about the shutdown.\n\n\
    ### Developing a Database by Means of the NetBeans IDE\n\nIn an effort to simplify\
    \ the development of database-supported applications a Java DB support is integrated\
    \ into the NetBeans IDE. By means of the IDE you can start and stop the database\
    \ system, create databases, and establish a connection to the databases. The graphic\
    \ support for creating and configuring tables especially simplifies development.\
    \ This allows you to define and change the individual table colums and data types\
    \ in a very simple way.\n\n#### Installing and Starting the Java DB System\n\n\
    To use this support you first have to define the installation path of the Java\
    \ DB. Call the *Services* window with *Window ![Image](images/U001.jpg) Services*\
    \ and then choose *Properties* from the context menu of the *Java DB* node. The\
    \ path should already point to the Java DB directory of the Java Platform installation.\
    \ If you downloaded the Java DB yourself or if you have a separate installation,\
    \ you can of course set the path on it, too. You also have to set another path\
    \ in which the database will be created and set.\n\nAfter you have completed these\
    \ settings, you can start the database server through the context menu with *Start\
    \ Server*. This is necessary because now the database system is no longer integrated\
    \ in an application, but is operated as an independent server. The server usually\
    \ accepts connections on port 1527, which is displayed in the output window.\n\
    \n#### Integrating a Java DB Server Driver into Your Application\n\nSince the\
    \ Java DB database system is not integrated in its applications, but is operated\
    \ as a server, it is necessary to add another driver to your application. This\
    \ driver, which is necessary to establish the connection to a Java DB server,\
    \ is located in the file `derbyclient.jar` (introduced in the section “Integrating\
    \ the Java DB.”). Add this to your application by means of a library wrapper module\
    \ and define in your module that a database connection wants to connect with its\
    \ dependency.\n\n#### Creating and Configuring a Database\n\nYour application\
    \ is now ready for accessing a deleted Java DB server. You can create a new database\
    \ in the NetBeans IDE with *Create Database...* out of the context menu of the\
    \ node *Databases* ![Image](images/U001.jpg) *Java DB* in the *Services* window,\
    \ which is shown in [Figure 26-2](#Chapter26.html#fig_26_2). When doing so, you\
    \ have to insert a name, a username, and a password for the database. After inserting\
    \ these data, the database is created and a connection is established. You can\
    \ establish a connection via the context menu item *Connect...* of the referring\
    \ connection. If a connection is established successfully, the tables, indices,\
    \ and the foreign keys of the database are displayed. Using the context menu you\
    \ can create new entries to each.\n\nFor example, you can create a new table over\
    \ the context menu of *Tables* with *Create Table...*, look at the content of\
    \ a table with *View Data...,* or give an SQL order with *Execute Command*.\n\n\
    ![Image](images/2602.jpg)\n\n***Figure 26-2.** You get access to the Java DB databases\
    \ in the Services window in which you can also configure it.*\n\n#### Accessing\
    \ the Database out of Your Application\n\nNow you will deal with the application\
    \ that wants to use the database. The definition of the feature `derby.system.home`,\
    \ which was needed when using the integrated application of the Java DB system,\
    \ is no longer necessary. To successfully create a connection to the Java DB server\
    \ out of your application you have to adapt the connection URL, since you need\
    \ to specify the name (or the IP address) and the port on which the database server\
    \ accepts connections:\n\n```\nConnection connection = DriverManager.getConnection(\n\
    \     \"jdbc:derby://localhost:1527/MyDB;\", \"user\", \"password\");\n```\n\n\
    Since the database server in this case is located on the same computer as the\
    \ application, use the specification `localhost` or the IP address `127.0.0.1`\
    \ and define the port as `1527`. You can also get this URL from the already established\
    \ connection in the services window of the NetBeans IDE.\n\n#### Retrieving and\
    \ Importing Structures of Tables\n\nNext I will show you a very helpful feature\
    \ of the database explorer in the services window. It is possible to display the\
    \ SQL source code with which your table was created in order to copy it as is\
    \ into your application for the initial creation of the database tables or in\
    \ an SQL script file. Call the context menu of the wanted table, where you will\
    \ find the point *Grab Structure...*; call it to save the structure in a file.\
    \ Then just choose *Recreate Table...* in the context menu, and choose the just\
    \ created file. The SQL source code, which is necessary to create the table, will\
    \ then be displayed in a window. You can also supply this functionality to its\
    \ original purpose and so import tables out of a foreign database in your database.\n\
    \n### Example Application\n\nI want to finish this chapter with a really simple\
    \ example to explain some idiosyncrasies of the Java DB around creating table\
    \ structures and show you how to cleverly integrate the Java DB in the lifecycle\
    \ of your application. In this example, you will manage music albums that can\
    \ be assigned to a certain genre."
