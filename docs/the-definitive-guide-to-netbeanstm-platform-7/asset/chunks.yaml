    #### 日志管理器


    Java 日志记录 API 指定了一个中央 `LogManager`。该管理器控制着一个包含所有已命名日志记录器的分层命名空间。因此，使用类的完整名称（包含分层包结构）作为日志记录器名称是合理的。要访问此管理器，请使用以下代码：


    **`LogManager`** `manager = LogManager.`**`getDefault`**`();`


    `LogManager` 提供了所有日志记录器的名称。因此，你可以检测到 NetBeans 平台日志记录器的名称，例如，其级别可能因调试目的而更改。所有日志记录器的列表可以通过以下方式检索：


    **`LogManager`** `manager = LogManager.`**`getLogManager`**`();`

    `for(String name : Collections.list(manager.`**`getLoggerNames`**`())) {`

    `   System.out.println(name);`

    `}`


    #### 配置


    除了日志记录器，管理器还管理配置文件，这些文件最初是从 Java 平台目录中的 `lib/logging.properties` 文件加载的。你可以通过将特定配置文件的文件名设置为系统属性
    `java.util.logging.config.file`，从该文件加载特殊配置文件。配置数据也可以从数据库加载，例如。为此，需要实现一个从数据库提取数据的类。然后，使用系统属性
    `java.util.logging.config.class` 注册此类。注册后，该类会被自动实例化。在此类中，你通过 `InputStream` 为 `LogManager`
    提供配置数据，用于 `LogManager` 方法的 `readConfiguration(InputStream)`。


    在配置文件中注册 `Handler` 实现，以便它们将日志数据输出到控制台（`ConsoleHandler`）或文件（`FileHandler`）。你可以注册自己的实现，例如
    NetBeans 平台中用于以图形方式显示日志消息的处理程序。日志记录系统自带一个根日志记录器。所有其他日志记录器将其日志转发给此根日志记录器。为根日志记录器注册一个处理程序，使用以下属性：


    **`handlers`** `= java.util.logging.ConsoleHandler`


    可以使用逗号列出多个处理程序。要禁用向根日志记录器转发日志，请使用以下方式：


    `<logger name>.`**`useParentHandlers`** `= false`


    在这种情况下，你可以或必须为此日志记录器专门定义一个处理程序，以便获取日志输出：


    `<logger name>.`**`handlers`** `= java.util.logging.FileHandler`


    最后，在配置中设置日志级别很重要。日志级别定义了记录哪种类型的日志。这样，你可以在查找错误时隐藏简单的状态消息，仅显示警告和错误消息。一方面，你可以使用以下功能全局定义日志级别：


    `.level = WARNING`


    另一方面，你可以通过使用日志记录器的名称作为前缀来覆盖单个日志记录器的日志级别：


    `<logger name>.level = INFO`


    配置数据不仅可以在配置文件中设置，还可以作为系统属性设置。在运行时使用 `System.setProperty()` 方法进行设置。这样做时，请确保调用 `LogManager`
    的 `readConfiguration()` 方法以应用新的配置数据。或者，在应用程序启动时使用命令行参数确定配置。在 NetBeans 中开发时，在 *Project
    Properties* 文件（位于 *Important Files* 下）中使用属性 `run.args.extra` 设置模块套件的启动参数。例如，使用以下内容：


    **`run.args.extra`** `= -J-Dcom.galileo.netbeans.myclass.level=INFO`


    为了分发你的应用程序，请使用 *etc/<application>.conf* 文件中的属性 `default_options` 设置命令行参数。


    ##### 错误报告


    NetBeans 平台实现并注册了一个特殊的日志处理程序，该程序在对话框中向用户显示记录的错误消息。因此，请使用 `SEVERE` 或 `WARNING`
    日志级别，并将 `Exception` 直接传递给 `log()` 方法。


    `Logger` **`logger`** `= Logger.getLogger(MyClass.class.getName());`

    `try {`

    `   ...`

    `} catch(Exception e) {`

    `   logger.`**`log`**`(Level.`**`SEVERE`**`, null, e);`

    `   // 或者`

    `   logger.`**`log`**`(Level.`**`WARNING`**`, null, e);`

    `}`


    ### 总结


    在本章中，你学习了如何在 NetBeans 平台应用程序启动和完成时执行任务。你可以将任何 `Runnable` 实例注册为任务。你还可以使用生命周期管理器重新启动应用程序。本章的第二部分涉及日志记录这一重要主题，包括不同类型的日志输出以及如何配置它们。


    ## 第二部分


    ## 外观与体验：开发用户界面


    ## 第 9 章


    ## 菜单栏和工具栏


    除了管理自己的窗口、状态栏和进度条之外，NetBeans 平台应用程序的应用程序窗口默认还管理菜单栏和工具栏。以下部分将介绍如何使用菜单栏和工具栏。


    ![Image](img/square.jpg) **提示** 使用 NetBeans 平台 7，菜单、菜单项和工具栏操作的创建和注册已大大简化。结合第 6
    章中描述的操作注解，可以轻松创建菜单项和工具栏操作。


    ### 菜单栏


    基于 NetBeans 平台的应用程序的菜单栏由平台本身通过系统文件系统构建。每个菜单（以及菜单项）都在模块层文件中定义。这允许每个模块以声明方式将其菜单项添加到菜单栏。使用
    NetBeans 平台 7，这甚至更加简单。只需实现选择菜单项时执行的操作；这样，该操作会附带一个注解，相应的层条目会自动从这些注解中创建。


    在第 6 章中，你学习了如何创建和注解操作类。在本节中，你将学习如何将操作集成到菜单栏中。

