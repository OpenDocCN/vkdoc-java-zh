    模块由其清单文件的数据以及相关 XML 文件中指定的数据共同描述，因此无需显式添加到 NetBeans 平台。通过使用 XML 文件，NetBeans 平台能够了解其可用的模块、它们的位置以及允许加载这些模块所需满足的契约。这些依赖关系在模块的清单文件中声明，并由
    NetBeans 运行时容器解析，从而确保应用程序始终以一致的状态启动。NetBeans 平台本身由一组核心模块（参见图 2-2）构成，这些模块是启动应用程序和定义其用户界面所必需的。为此，NetBeans
    平台提供了许多 API 模块和服务提供者接口（SPI）模块，极大地简化了开发过程。这组模块（如图 2-2 所示）包括，例如，提供常用操作类的 Actions
    API；功能强大的 Nodes API；以及帮助您轻松地将自己的选项对话框集成到应用程序中的 Options SPI。除此之外，NetBeans 平台中还有完整的可重用组件，例如输出窗口和收藏夹模块。


    ![Image](img/0202.jpg)


    ***图 2-2.** NetBeans 平台架构*


    ### NetBeans 平台发行版


    通常您不需要单独下载 NetBeans 平台的发行版，因为 NetBeans 平台已经是 NetBeans IDE 的基本组成部分，而 NetBeans IDE
    本身就是一个富客户端应用程序。在 NetBeans IDE 中开发应用程序时，平台会从 NetBeans IDE 中提取出来。但是，也可以将多个 NetBeans
    平台添加到 NetBeans IDE 中。为此，您可以从官方网站 [`http://netbeans.org/features/platform`](http://netbeans.org/features/platform)
    下载 NetBeans 平台的独立发行版。


    现在让我们仔细看看 NetBeans 平台发行版中的重要部分：


    *   模块 `org.netbeans.bootstrap`、`org.netbeans.core.startup`、`org-openide-filesystems`、`org-openide-modules`、`org-openide-util`
    和 `org-openide-util-lookup` 构成了 NetBeans 运行时容器，它是平台的核心，负责所有其他模块的开发。

    *   NetBeans 平台也支持 OSGi 技术。为此所需的模块是 `org.netbeans.libs.felix`、`org.netbeans.core.osgi`、`org.netbeans.core.netigso`
    和 `org.netbeans.libs.osgi`。

    *   模块 `org-netbeans-core`、`org-netbeans-core-execution`、`org-netbeans-core-ui`
    和 `org-netbeans-core-windows` 为 API 模块提供基本功能。

    *   `org-netbeans-core-output2` 是一个完整的应用程序模块，可用作中央输出窗口。

    *   模块 `org-netbeans-core-multiview` 是一个用于多视图窗口（例如，表单编辑器窗口）的框架，并为其提供了一个 API。

    *   模块 `org-openide-windows` 包含窗口系统 API，这可能是最常用的 API。它包含用于开发窗口和窗口管理器等的基本类。通过窗口管理器，您可以访问有关所有现有窗口的信息。

    *   应用程序的更新功能由模块 `org-netbeans-modules-autoupdate-services` 实现。该模块提供了查找、下载和安装模块的完整功能。模块
    `org-netbeans-modules-autoupdate-ui` 提供了插件管理器，使用户能够管理和控制模块及更新。

    *   使用 `org-netbeans-modules-favorites` 模块，您可以显示随机数据和目录结构，并通过数据系统 API 影响其操作。

    *   `org-openide-actions` 模块提供了一组常用的操作，例如复制、剪切和打印。这些操作的功能可以以上下文相关的方式实现。

    *   一个非常强大的模块是 `org-openide-loaders`，它包含数据系统 API。这可用于创建数据加载器，这些加载器可以与特定类型的文件关联，然后为其创建数据对象。可以通过简单的方式为这些数据对象添加特殊行为。

    *   `org-openide-nodes` 模块的 Nodes API 是 NetBeans 平台的一个非常核心的特性。例如，节点可以在资源管理器视图中显示；通过这种方式，节点可以为数据对象提供操作和属性表。

    *   `org-openide-explorer` 模块提供了一个框架来开发资源管理器视图，例如在 NetBeans IDE 的项目或文件视图中使用的视图。

    *   `org-netbeans-modules-editor-mimelookup` 模块提供了一个 API 来查找特定 MIME 类型的设置、服务和其他对象，以及一个
    SPI 来实现您自己的特定 MIME 类型数据提供者。`org-netbeans-modules-editor-mimelookup-impl` 模块是该
    SPI 的一个特殊实现，负责在系统文件系统的目录结构中查找对象。

    *   `org-netbeans-modules-javahelp` 包含 JavaHelp 运行时库，并为模块 API 提供了一个实现，使应用程序模块能够通过
    JavaHelp 技术集成自己的帮助集。

    *   用于实现和提供您自己的提供者的 QuickSearch SPI 位于模块 `org.netbeans.spi.quicksearch` 中。

    *   主文件系统模块 `org-netbeans-modules-masterfs` 提供了一个重要的包装器文件系统。

    *   模块 `org-netbeans-modules-options-api` 提供了一个选项对话框和一个 SPI，使得添加您自己的选项面板变得容易。

    *   长时间运行的任务可以由模块 `org-netbeans-api-progress` 集中管理。模块 `org-netbeans-modules-progress-ui`
    提供了此功能的可视化，可以停止单独的任务。

    *   `org-netbeans-modules-queries` 提供了一个通用的查询 API，模块可以使用它来查询有关文件的信息。还提供了一个 SPI
    来提供您自己的查询实现。

    *   `org-netbeans-modules-sendopts`，该模块提供了一个*命令行解析 API* 和一个 SPI，您自己的处理程序可以通过它注册到命令行。

    *   `org-netbeans-modules-settings` 模块提供了一个 API，用于以用户定义的格式保存特定于模块的设置。它还提供了几种有用的设置格式。

    *   `org-openide-awt` 模块包含*UI 工具 API*，通过该 API 提供了用于创建用户界面的不同帮助类。

    *   在 `org-openide-dialogs` 模块中，提供了一个用于显示标准对话框和特定于应用程序的对话框的 API。向导框架位于此模块中。

    *   `org-openide-execution` 提供了一个用于执行长时间运行的异步任务的 API。

    *   `org-openide-io` 为文件的输入和输出提供了一个 API 和一个 SPI。该模块还提供了一个标准实现，您可以使用它在输出窗口模块上进行写入。

    *   `org-openide-text` 模块中的 Text API 提供了 `javax.swing.text` API 的扩展。

    *   模块 `org-netbeans-swing-plaf` 和 `org-netbeans-swing-tabcontrol` 负责外观和感觉的适配以及标签的显示。模块
    `org-jdesktop-layout` 是 Swing 布局扩展库的包装模块。

    *   可视化库 API 由模块 `org-netbeans-api-visual` 提供。


    此外，还可以将 IDE 发行版中的模块添加到列出的模块中。

