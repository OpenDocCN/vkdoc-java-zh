- fmt: "用户仍需要被告知应用程序需要重启；为此，集成在 NetBeans 平台状态栏中的通知显示器（`NotificationDisplayer`）效果很好。提示会以气泡形式显示给用户。这样做的实际好处是，你可以添加一个显示为链接的操作，用户可以直接点击重启。你需要`InstallSupport`和`Restarter`实例来执行重启。将两者都传递给`RestartAction`，然后它会执行重启（如[清单\
    \ 25-5](#Chapter25.html#list_25_5)所示）。\n\n***清单 25-5.** 执行重启的操作类*\n\n```\nprivate\
    \ static final class RestartAction implements ActionListener {\n    private InstallSupport\
    \ support;\n    private OperationSupport.Restarter restarter;\n\n    public RestartAction(\n\
    \            InstallSupport support,\n            OperationSupport.Restarter restarter)\
    \ {\n        this.support = support;\n        this.restarter = restarter;\n  \
    \  }\n\n    @Override\n    public void actionPerformed(ActionEvent e) {\n    \
    \    try {\n            support.doRestart(restarter, null);\n        } catch (OperationException\
    \ ex) {\n            LOG.severe(ex.getMessage());\n        }\n    }\n}\n```\n\n\
    #### 自动启动安装\n\n最后，你必须在后台启动进程的自动执行。一种可能性是在启动应用程序时安装更新。你可以通过一个预热任务（warm-up task）以简单的方式实现这一点。这看起来就像整体实现的方法，如[清单\
    \ 25-6](#Chapter25.html#list_25_6)所示。\n\n***清单 25-6.** 通过预热任务执行自动更新安装*\n\n```\n\
    import org.netbeans.api.autoupdate.InstallSupport;\nimport org.netbeans.api.autoupdate.OperationContainer;\n\
    import org.netbeans.api.autoupdate.OperationException;\nimport org.netbeans.api.autoupdate.OperationSupport;\n\
    import org.netbeans.api.autoupdate.UpdateElement;\nimport org.netbeans.api.autoupdate.UpdateManager;\n\
