    ### RESTful Web 服务客户端


    现在，您将为 Web 服务创建一个服务客户端类。为此，首先创建一个名为 *OrderModule* 的应用程序模块。在此新模块上，依次选择 *文件 ![Image](img/U001.jpg)*
    *新建文件… ![Image](img/U001.jpg)* *Web 服务 ![Image](img/U001.jpg)* *RESTful Java 客户端*。将服务类命名为
    *OrderServiceClient*，将其添加到包 `com.galileo.netbeans.order.module` 中，然后通过 *浏览…* 按钮选择
    *来自项目* 选项，选择将为其创建客户端类的 Web 服务。（参见图 32-3。）


    ![Image](img/3203.jpg)


    ***图 32-3.** 为 RESTful Web 服务创建服务客户端*


    现在，让我们看一下创建的类。服务提供的所有方法均通过 JAX-RS 实现；使用了允许完全透明调用服务的签名。（参见清单 32-3。）


    ***清单 32-3.** 具有完全透明对象的 RESTful Web 服务客户端，该对象可在 Java EE 服务器之间传输*


    `import com.sun.jersey.api.client.Client;`

    `import com.sun.jersey.api.client.UniformInterfaceException;`

    `import com.sun.jersey.api.client.WebResource;`

    `…`

    `public class` **`OrderServiceClient`** `{`

    `   private WebResource webResource;`

    `   private Client client;`

    `   private static final String BASE_URI = "http://localhost:8080/OrderSystem/resources";`


    `public` **`OrderServiceClient`**`() {`

    `      ClientConfig config = new DefaultClientConfig();`

    `      client = Client.create(config);`

    `      webResource = client.resource(BASE_URI).`

    `         path("com.galileo.netbeans.order.entities.product");`

    `   }`


    `public void` **`create`**`(Object requestEntity) throws UniformInterfaceException
    {`

    `      webResource.type(MediaType.APPLICATION_XML).post(requestEntity);`

    `   }`


    `public` **`<T> T findAll(Class<T> responseType)`** `throws UniformInterfaceException
    {`

    `      WebResource resource = webResource;`

    `      return resource.accept(MediaType.APPLICATION_XML).get(responseType);`

    `   }`

    `   …`

    `}`


    查看清单 32-3 中创建的类，您会发现方法返回的数据类型由传入的类对象类型定义。要获取 XML 格式的原始数据，您可以直接使用 `String` 类型。但是，您希望为数据创建一个实体类（类似于服务器端类）。JAXB
    会根据 XML 数据以及相关的注解自动创建所需的实体类实例。如果 getter 和 setter 方法与相关 XML 元素的名称（以及服务器端类的属性）匹配，则除了使用
    `@XmlRootElement` 注解该类之外，您无需执行任何其他操作。（参见清单 32-4。）


    ***清单 32-4.** 由 JAXB 框架自动创建并用 XML 数据填充属性的实体类*


    `import javax.xml.bind.annotation.XmlRootElement;`


    `@XmlRootElement`

    `public class Product {`

    `   private Long   id;`

    `   private String orderId;`

    `   private String name;`

    `   private Double price;`

    `   …`

    `}`


    现在，您可以在所有传输对象或获取单个对象的情况下使用此类。如果服务方法向您传递了一个对象列表（参见清单 32-3 中的方法），则必须创建一个辅助类。在 XML
    中，对象列表由额外的标签（`<Products>`）包裹。为了能够正确创建此标签及其下属对象，需要使用清单 32-5 中所示的辅助类。


    ***清单 32-5.** 用于自动创建产品列表的辅助类*


    `import java.util.ArrayList;`

    `import java.util.List;`

    `import javax.xml.bind.annotation.XmlRootElement;`


    **`@XmlRootElement`**

    `public class` **`Products`** `{`

    `   private List<Product> product = new ArrayList<Product>();`


    `public List<Product>` **`getProduct`**`() {`

    `      return product;`

    `   }`


    `public void` **`setProduct`**`(List<Product> product) {`

    `      this.product = product;`

    `   }`

    `}`


    Web 服务客户端的使用非常简单。作为测试，您可以向数据库添加多个产品，然后查询特定对象或所有对象并传递其数据，如清单 32-6 所示。


    ***清单 32-6.** 测试 RESTful Web 服务的服务客户端*


    `public final class` **`TestRESTAction`** `implements ActionListener {`


    `   @Override`

    `   public void actionPerformed(ActionEvent e) {`

    **`OrderServiceClient`** `client =` **`new OrderServiceClient`**`();`


    **`Product`** `p = new Product();`

    `      p.setName("Test Product");`

    `      p.setOrderId("P1");`

    `      p.setPrice(3.99);`

    **`client.create`**`(p);`


    `Product p1 =` **`client.find`**`(Product.class, "1");`

    `      System.out.println("P1: " + p1);`


    **`Products`** `pro =`**`client.findAll`**`(Products.class);`

    `      System.out.println("Products: " + pro.getProduct().size());`

    `   }`

    `}`


    ### 总结


    RESTful Web 服务提供了一种非常简单的方式，可以从 NetBeans 平台应用程序中访问服务器端资源。在本章中，您学习了如何创建 RESTful
    Web 服务及相应的客户端模块。您使用客户端模块从 NetBeans 平台应用程序访问了一个简单的产品数据库。


    ## 第 33 章


    ## 身份验证与多用户登录


    在开始讨论身份验证和多用户登录之前，让我们回顾一下您在第 13 章中创建的登录对话框。通过此对话框，您可以获取用户的登录数据。这里，我们将在服务器端检查这些数据。检查登录数据有多种可能性。在此背景下，我们将重点介绍两种
    Java 内置函数。一旦用户成功注册，根据其权限或组成员身份调整应用程序就显得尤为重要。

