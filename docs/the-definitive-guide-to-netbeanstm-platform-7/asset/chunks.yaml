    我们现在还需要一个节点，用于激活该操作。作为示例，我创建了类 `MyNode`，它继承自 `Node` 的子类 `AbstractNode`。在实际应用中，这样的节点类可以代表某种类型的文件。本例中的类仅用于阐明上下文感知操作与特定上下文的关联。在操作类中，你已定义节点必须实现接口
    `Editable`。因此，现在需要完成这一步骤。该上下文接口指定了方法 `edit()`，你刚刚通过一个空实现创建了它。该方法稍后由操作类调用；它代表了上下文相关的操作逻辑。Actions
    API 提供了一系列常用的上下文接口，例如 `Openable` 或 `Closable`。不过，由于你不需要特定的超接口，你可以将任何接口用作上下文接口。（参见清单
    6-8。）


    ***清单 6-8.** 实现上下文接口 Editable 并因此代表操作上下文的节点*


    `import org.netbeans.api.actions.Editable;`

    `import org.openide.nodes.AbstractNode;`

    `import org.openide.nodes.Children;`


    `public class MyNode extends AbstractNode` **`implements Editable`** `{`

    `   public MyNode() {`

    `     super(Children.LEAF);`

    `   }`

    `public void` **`edit`**`() {`

    `      // 根据此节点代表的数据编辑某些内容`

    `   }`

    `}`


    现在，你只需在你的顶层组件中设置活动节点，该组件可以是一个文件编辑器，例如，其中打开了由该节点代表的文件。为此，你只需将该节点添加到顶层组件的本地 Lookup
    中。（参见清单 6-9。）


    ***清单 6-9.** 设置活动节点。通过这样做，当实现此节点的相关上下文接口时，该操作变为活动状态。*


    `public final class MyTopComponent extends TopComponent {`

    `   public MyTopComponent() {`

    `      MyNode node = new MyNode();`

    `      ...`

    `      associateLookup(Lookups.fixed(`**`node`**`, getActionMap()));`

    `   }`

    `}`


    如果你的应用程序中的焦点在此顶层组件上，NetBeans 平台会确保将本地 Lookup（其中现在有一个 `MyNode` 实例）作为全局上下文提供给该操作。在这种情况下，菜单栏和/或工具栏中的操作也会由
    NetBeans 平台自动激活。


    最后，关于上下文感知操作，清单 6-10 展示了如何通过直接在层文件中注册来注册此类操作类，而无需使用注解。


    ***清单 6-10.** 通过直接在层文件中注册上下文感知操作。*


    `<file name="com-galileo-netbeans-MyContextAction.instance">`

    `  <attr name="displayName" bundlevalue=`

    `    "com.galileo.netbeans.Bundle#CTL_MyContextAction"/>`

    `  <attr name="iconBase"`

    `    stringvalue="com/galileo/netbeans/icon.gif"/>`

    `  <attr name="`**`instanceCreate`**`"`

    `    methodvalue="org.openide.awt.Actions.context"/>`

    `  <attr name="`**`delegate`**`"`

    `    methodvalue="org.openide.awt.Actions.inject"/>`

    `  <attr name="`**`injectable`**`"`

    `    stringvalue="com.galileo.netbeans.MyContextAction"/>`

    `  <attr name="`**`type`**`"`

    `    stringvalue="org.netbeans.api.actions.Editable"/>`

    `  <attr name="`**`selectionType`**`" stringvalue="EXACTLY_ONE"/>`

    `</file>`


    属性 `displayName` 和 `iconBase` 指的是“始终启用的操作”一节中描述的始终启用操作的属性。在表 6-4 中，列出并解释了上下文感知操作的特殊属性。表
    6-2 中始终启用操作的可选属性也适用于上下文感知操作。


    ![Image](img/t0604.jpg)


    ### 总结


    本章讨论了操作。你学习了如何通过 NetBeans IDE 中的向导快速高效地创建操作。你还了解了可用的各种操作类型，并学习了如何有效使用它们。例如，某些操作始终可用，而其他操作仅在特定上下文中可用。你学习了使用注解注册和分配操作是多么容易。


    ## 第 7 章


    ## 数据和文件


    NetBeans 平台为创建、管理、操作和呈现数据提供了一个非常强大的概念。这个概念主要包含文件系统 API 和数据系统 API。此外，还有节点 API 和资源管理器
    API。这些 API 中的每一个都位于其自身的抽象级别上。该系统可以划分为四个级别，以及 NetBeans 平台应用程序外部的具体数据，如图 7-1 所示。


    ![Image](img/0701.jpg)


    ***图 7-1.** NetBeans 平台内管理数据和文件的架构*


    数据系统最初使用 `FileSystem` 类进行抽象。这样，位于其下的物理数据可以以任何形式存在。`FileSystem` 类允许用户以相同的方式处理来自不同来源的物理数据——例如，本地文件系统、XML
    文件形式的文件系统（类似于系统文件系统的构建方式）或 JAR 文件。只需以所需形式提供抽象类 `FileSystem` 的一个实现即可。这样，文件系统 API
    就从具体数据中抽象出来，并在应用程序内以虚拟文件系统的形式提供。因此，可以独立于数据来源进行访问。抽象层上以 `FileObject` 类形式存在的抽象数据，尚未包含关于要管理何种数据类型的信息。因此，该层不包含数据特定的逻辑。在此基础之上，逻辑层有数据系统
    API。这里有代表特定类型数据的对象。这些对象基于 `DataObject` 类构建。对于每种所需的数据类型，都存在一个 `DataObject.Factory`，负责创建对象。节点
    API 是该概念中的顶层（它位于表示层）。因此，节点负责数据的类型特定表示。在这方面，`Node` 代表一个 `DataObject`，而 `DataObject`
    本身负责创建节点。在第 12 章中，我将详细解释如何通过节点和资源管理器来表示你的数据。


    ### 文件系统 API


    NetBeans 平台通过文件系统 API 提供对文件和文件夹的透明访问。在此过程中，访问非常抽象；无论数据是以虚拟 XML 文件系统（例如系统文件系统）的形式存在，还是位于
    JAR 存档或普通目录中，其工作方式都是相同的。文件系统的一般接口在抽象类 `FileSystem` 中描述。抽象类 `AbstractFileSystem`
    实现了文件系统的一些任务。因此，它作为特殊文件系统实现的基类很有用。具体的实现 `LocalFileSystem`、`JarFileSystem` 和 `XMLFileSystem`
    都派生自该类。类 `MultiFileSystem` 代表多个文件系统的代理；它主要用作基类。文件系统的类层次结构如图 7-2 所示。


    ![Image](img/0702.jpg)


    ***图 7-2.** 文件系统的类层次结构*


    ### 文件对象


    文件系统中的文件——目录和文件——由类 `FileObject` 表示。这是 Java 平台 `File` 类的一个抽象包装类。`FileObject` 的实现由具体的文件系统提供。除了标准的文件操作外，类
    `FileObject` 还提供了监督文件或目录更改的可能性。以下部分将描述类 `FileObject` 的操作。

    '
- fmt: "### Creating\n\nIf you want to create a `FileObject` for an existing file\
    \ in your local file system, you can do this with the helper class `FileUtil`:\n\
    \n```\nFileObject obj = FileUtil.toFileObject(new File(\"C:/file.txt\"));\n```\n\
    \nIf you want to create a `FileObject` out of a concrete `FileSystem` object,\
    \ you can indicate the complete paths with the method `findResource()`:\n\n```\n\
    FileSystem fs = …\nFileObject obj = fs.findResource(\"folder/file\");\n```\n\n\
    Here is how to create new files or directories based on a `File` object:\n\n```\n\
    File file   = new File(\"E:/newfolder/newfile.txt\");\nFile folder = new File(\"\
    E:/newfolder2\");\nFileObject fo1 = FileUtil.createData(file);\nFileObject fo2\
    \ = FileUtil.createFolder(folder);\n```\n\nIf you already have a directory in\
    \ the form of a `FileObject`, you can create a file or a directory in its file\
    \ system as follows:\n\n```\nFileObject folder    = …\nFileObject file      =\
    \ folder.createData(\"newfile.txt\");\nFileObject subfolder = folder.createFolder(\"\
    newfolder\");\n```\n\n### Renaming\n\nIf you want to rename a file or a directory,\
    \ you first have to ensure that the `FileObject` cannot be edited by just anybody.\
    \ You do this by means of a `FileLock` object. After renaming, you release this\
    \ `FileLock` again in a `finally` block.\n\n```\nFileObject myfile = …\nFileLock\
    \ lock = null;\ntry {\n   lock = myfile.lock();\n} catch (FileAlreadyLockedException\
    \ e) {\n   return;\n}\ntry {\n   myfile.rename(lock, \"newfilename\", myfile.getExt());\n\
    } finally {\n   lock.releaseLock();\n}\n```\n\n### Deleting\n\nDeleting files\
    \ or directories is very easy, because the method `delete()` is concerned with\
    \ reserving and opening a `FileLock` itself. Consequently, deleting only requires\
    \ the following line:\n\n```\nFileObject myfile = …\nmyfile.delete();\n```\n\n\
    Furthermore, a variant of the method is provided. It enables you to pass your\
    \ own `FileLock`, analogous to the renaming of a `FileObject`.\n\n### Removing\n\
    \nA `FileObject` cannot just be removed by renaming as you can do it with a `File`.\
    \ The `FileUtil` class provides the `moveFile()` method for removing a `FileObject`.\
    \ This method copies the file or the directory into a destination directory, deletes\
    \ the source, and in doing so, automatically reserves the needed `FileLock` objects\
    \ and releases them again.\n\n```\nFileObject fileToMove = …\nFileObject destFolder\
    \ = …\nFileUtil.moveFile(fileToMove, destFolder, fileToMove.getName());\n```\n\
    \n### Reading and Writing Data\n\nAs with Java, reading and writing a `FileObject`\
    \ works by streams. For this purpose, the `FileObject` class provides the `InputStream`\
    \ and the `OutputStream`. You pack them in a `BufferedReader` for simple and performant\
    \ reading and in a `PrintWriter` for writing, as shown in [Listing 7-1](#Chapter07.html#list_7_1).\n\
    \n***Listing 7-1.** Reading and Writing a FileObject*\n\n```\nFileObject myFile\
    \ = …\nBufferedReader input = new BufferedReader(new InputStreamReader(myFile.getInputStream()));\n\
    try {\n   String line = null;\n   while((line = input.readLine()) != null) {\n\
    \      // process the line\n} finally {\n   input.close();\n}\nPrintWriter output\
    \ = new PrintWriter(\n   myFile.getOutputStream());\ntry {\n   output.println(\"\
    the new content of myfile\");\n} finally {\n   output.close();\n}\n```\n\nOptionally,\
    \ you can transfer your own `FileLock` to the method `getOutputStream()`.\n\n\
    The `FileObject` class itself provides two simple methods for the easy reading\
    \ of a text-based `FileObject`. On the one hand, it is possible to get the complete\
    \ content of a file at once with the method `asText()`. On the other hand, you\
    \ can get a list with all separate lines with the method `asLines()`. You can\
    \ add a special encoding (such as UTF-8) as parameter to both methods, alternatively.\n\
    \n```\nFileObject myFile = …\nfor (String line : fo.asLines()) {\n   // process\
    \ the line\n}\n```\n\n### Monitoring Changes\n\nThe class `FileObject` enables\
    \ you to react on changes of files within a filesystem because you can register\
    \ a `FileChangeListener` for that case, as shown in [Listing 7-2](#Chapter07.html#list_7_2).\n\
    \n***Listing 7-2.** Reacting on Changes of a Data Object*\n\n```\nFile file =\
    \ new File(\"E:/NetBeans 7/file.txt\");\nFileObject fo = FileUtil.toFileObject(file);\n\
    fo.addFileChangeListener(new FileChangeListener(){\npublic void fileFolderCreated(FileEvent\
    \ fe) {\n   }\npublic void fileDataCreated(FileEvent fe) {\n   }\npublic void\
    \ fileChanged(FileEvent fe) {\n   }\npublic void fileDeleted(FileEvent fe) {\n\
    \   }\npublic void fileRenamed(FileRenameEvent fre) {\n   }\npublic void fileAttributeChanged(FileAttributeEvent\
    \ fae) {\n   } });\n```\n\nThe methods `fileFolderCreated()` and `fileDataCreated()`\
    \ are called when creating a directory or when calling a file. These methods only\
    \ make sense when the supervised `FileObject` is a directory. Changing a file,\
    \ the event is always triggered for the file itself and for the parent directory.\
    \ This means the methods are informed about changes of data, even when supervising\
    \ the parent directory. If you are not interested in all events of the `FileChangeListener`\
    \ interfaces, you can instead use the adapter class `FileChangeAdapter`.\n\n![Image](images/square.jpg)\
    \ **Caution** Remember that you can only be informed about events that are executed\
    \ within your application on the concrete `FileObject`. You cannot be informed\
    \ when renaming a file outside of the application in the Windows Explorer, for\
    \ example.\n\nThe classes `FileSystem`, `FileObject`, and `FileUtil` provide numerous\
    \ very helpful methods. So, in this respect, it is totally worthwhile to take\
    \ a closer look at the documentation of the File Systems API."
