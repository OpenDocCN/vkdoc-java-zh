    `      // 在加载模块时调用。`

    `   }`

    `public void` **`uninstalled`**`() {`

    `      // 在卸载模块时调用。`

    `   }`

    `public boolean` **`closing`**`() {`

    `      // 调用以检查模块是否可以关闭。`

    `   }`

    `public void` **`close`**`() {`

    `      // 在模块关闭之前调用。`

    `   }`

    `}`


