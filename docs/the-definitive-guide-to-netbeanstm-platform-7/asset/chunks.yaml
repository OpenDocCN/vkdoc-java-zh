    \ New File ![Image](images/U001.jpg) Module Development ![Image](images/U001.jpg)\
    \ Window*。该顶层组件最终应如图[Figure 41-8](#Chapter41.html#fig_41_8)所示。然而，在添加表格和文本字段之前，您需要一个数据源，以便稍后可以将表格绑定到该数据源。\n\
    \n为此，请在Inspector窗口中打开*Other Components*节点的上下文菜单，然后选择*Add From Palette ![Image](images/U001.jpg)\
