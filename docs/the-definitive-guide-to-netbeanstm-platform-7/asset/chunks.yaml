- fmt: "### User-Defined Properties Editor\n\nYou can use a self-defined editor for\
    \ a property value to support the user entering, changing properties, checking\
    \ (date), or restricting (fixed defined selection of values). In [Figure 19-1](#Chapter19.html#fig_19_1)\
