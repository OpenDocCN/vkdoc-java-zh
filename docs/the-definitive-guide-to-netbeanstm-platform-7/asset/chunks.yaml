    ##### 工具栏中的下拉菜单


    NetBeans 平台提供了一个特殊的工厂类，用于创建带有弹出菜单的下拉按钮（参见图 9-3）。你可以像之前展示的组合框一样，将此类按钮集成到工具栏中。因此，首先你需要创建一个动作类，并为其添加一个工具栏。它必须继承自
    `AbstractAction` 类，以便能够实现 `Toolbar.Presenter` 接口。在 `getToolbarPresenter()` 方法中，你随后生成一个弹出菜单，并用层文件中的动作填充它。然后，通过
    `DropDownButtonFactory.createDropDownButton()` 方法生成相应的按钮并返回，如清单 9-18 所示。


    ***清单 9-18.** 创建下拉按钮*


    `@ActionID(`

    `    category = "File",`

    `    id = "com.galileo.netbeans.module.MyDropDownButton")`

    `@ActionRegistration(`

    `    iconBase = "com/galileo/netbeans/module/icon.png",`

    `    displayName = "#CTL_MyDropDownButton")`

    `@ActionReferences({`

    `    @ActionReference(path = "`**`Toolbars`**`/File", position = 300)`

    `})`

    `public final class MyDropDownButton extends` **`AbstractAction`** `implements`
    **`Presenter.Toolbar`** `{`

    `final String` **`EXTENSION_POINT`** `= "MyDropDownActions";`

    `    JPopupMenu popup = new JPopupMenu();`


    `    @Override`

    `    public void actionPerformed(ActionEvent e) { }`


    `    @Override`

    `public Component` **`getToolbarPresenter`**`() {`

    `for (Action a: Utilities.` **`actionsForPath`**`(`**`EXTENSION_POINT`**`))`

    `            popup.add(a);`

    `return` **`DropDownButtonFactory.createDropDownButton`**`(`

    `               ImageUtilities.loadImageIcon("com/galileo/netbeans/module/icon.png",
    false),`

    `               popup);`

    `    } }`


    如果你查看清单 9-17 中的源代码，你会发现只需几行代码就能创建一个灵活可扩展的、带有弹出菜单的下拉按钮。除了创建按钮的工厂方法外，`Utilities`
    类的 `actionsForPath()` 方法也很重要。它提供了注册在特定文件夹中的所有动作的列表。你可以通过 `ActionReference` 注解将它们注册到那里，默认情况下，就像这样：


    `@ActionReference(path = "MyDropDownActions", position = 100)`

    `public final class MyDropDownAction1 implements ActionListener`


    因此，动作 `MyDropDownAction1` 被注册在系统文件系统的 `MyDropDownActions` 文件夹中。其工作方式与向菜单栏或工具栏添加动作相同。你看，系统文件系统不仅对标准组件（如菜单栏或工具栏）有帮助，你还可以利用它来创建自己的组件。


    ![Image](img/0903.jpg)


    ***图 9-3.** 工具栏中带有弹出菜单的下拉按钮*


    ### 总结


    本章涵盖了 NetBeans 平台应用程序的菜单栏和工具栏。你学习了菜单的结构、如何设置自己的工具栏，以及最重要的是，如何简单地将你的动作添加到工具栏或菜单中。


    ## 第 10 章


    ## 窗口系统


    *窗口系统*是 NetBeans 平台提供的一个框架。它负责所有应用程序窗口的管理和显示，并允许用户自定义用户界面的布局。


    ![Image](img/square.jpg)**提示** 窗口的注册现在通过注解进行，这不仅使 NetBeans 平台应用程序的开发更加容易，而且使其更加独立于
    NetBeans IDE。


    可视化窗口系统的基本结构是基于文档的。这意味着中心部分——即编辑器部分——主要用于在选项卡中显示多个文件。不同的窗口可以放置在编辑器区域周围的各个区域，即视图区域（参见图
    10-1）。通常，这些是提供文档编辑功能的辅助窗口。以 NetBeans IDE 为例，这些窗口提供了项目结构、属性对话框和输出窗口。这三个窗口位于编辑器区域周围。


    默认情况下，所有窗口都显示在 NetBeans 主应用程序窗口中。此外，还可以通过使用上下文菜单或将窗口从应用程序窗口中拖出，来取消停靠窗口（*停靠/取消停靠*）。图
    10-2 展示了其效果，其中项目窗口已被取消停靠。停靠和取消停靠允许灵活地定位窗口。所谓的*浮动窗口*功能在使用多个显示器时尤其有用。


    ![Image](img/1001.jpg)


    ***图 10-1.** NetBeans 平台应用程序窗口的结构*


    窗口系统由模式组成。*模式*是一个容器，窗口可以在其中像选项卡一样显示。窗口必须是 `TopComponent` 的子类。所有显示的窗口都由 `WindowManager`
    管理。也可以对窗口进行分组。窗口系统的组装在层文件中以声明方式描述。这种组装包括对可用模式、在这些模式中显示的窗口以及定义哪个窗口属于哪个窗口组的描述。这些信息也通过系统文件系统提供给窗口系统。在接下来的章节中，将详细描述窗口系统的各个部分；我还将向你展示如何在你的模块中使用它们。


    ![Image](img/1002.jpg)


    ***图 10-2.** 带有浮动窗口的 NetBeans 窗口系统*


    ### 配置


    模块在层文件中配置其窗口、模式和组，位于标准文件夹 `Windows2` 下的 `Components`、`Modes` 和 `Groups` 文件夹中。这样，模块可以定义其可用的窗口，将它们与模式关联，并对它们进行分组。


    此配置是模块定义的默认配置。窗口系统在首次启动时使用此默认配置。退出应用程序时，对应用程序布局所做的任何更改（例如，将窗口移动到另一个模式或关闭窗口组）都会存储在用户目录的
    `config/Windows2Local` 文件夹中，其层次结构与层文件相同。重新启动时，会首先读取应用程序设置。仅当用户目录中不存在配置文件时（例如，首次启动应用程序时），才会从层文件中读取设置。


    ### 窗口：顶层组件


    窗口系统 API 提供了 `TopComponent` 类，用于创建集成到 NetBeans 平台中的窗口。它是 Java 类 `JComponent` 的子类，并为窗口与窗口系统的交互提供可选支持。一个
    `TopComponent` 始终存在于一个模式内部，因此它是可停靠的，由 `WindowManager` 自动管理，并接收生命周期事件。

