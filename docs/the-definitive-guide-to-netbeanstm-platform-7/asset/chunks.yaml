    `public static final` **`EntityManager`**`        EM;`

    `   static {       try {`

    `         EMF = Persistence.`**`createEntityManagerFactory`**`("`**`HibernateJPA`**`");`

    `         EM = EMF.`**`createEntityManager`**`();`

    `      } catch (Throwable ex) {`

    `         throw new ExceptionInInitializerError(ex);`

    `      }`

    `   }`

    `   @Override`

    `public void` **`close`**`() {`

    `      EM.`**`close`**`();`

    `      EMF.`**`close`**`();`

    `   }`

    `}`


    ### 保存与加载对象


    最后，还需要澄清如何通过 `EntityManager` 访问你的对象。再次以 `DataModel` 类为例，你在其中实现了与原生 Hibernate 接口的交互。现在你想用
    JPA 替换它。让我们看看 `getAlbums()` 和 `getGenres()` 方法。像往常一样，你首先创建一个事务，在其中执行查询或操作。通过 `getTransaction()`
    方法，你可以从 `EntityManager` 获取一个 `EntityTransaction` 实例。使用 `begin()` 启动事务，然后为 *JPQL*
    查询 `SELECT a FROM Album a` 创建一个 `Query` 实例。此查询提供 `Album` 表中的所有对象。你可以通过 `getResultList()`
    方法以 `List` 形式获取此结果。使用 `commit()` 成功完成事务。（参见清单 28-5。）


    ***清单 28-5.** 使用 EntityManager 与数据库交互*


    `import javax.persistence.`**`Query`**`;`


    `public class` **`DataModel`** `{`


    `public static List<Album>` **`getAlbums`**`() {`

    `     Installer.EM.`**`getTransaction`**`().`**`begin`**`();`

    `     Query q = Installer.EM.`**`createQuery`**`("SELECT a FROM Album a");`

    `     List<Album> list = q.`**`getResultList`**`();`

    `     Installer.EM.`**`getTransaction`**`().`**`commit`**`();`

    `     return list;`

    `   }`


    `public static List<Genre>` **`getGenres`**`() {`

    `     Installer.EM.`**`getTransaction`**`().`**`begin`**`();`

    `     Query q = Installer.EM.`**`createQuery`**`("SELECT g FROM Genre g");`

    `     List<Genre> list = q.`**`getResultList`**`();`

    `     Installer.EM.`**`getTransaction`**`().`**`commit`**`();`

    `     return list;`

    `   }`


    `public static void` **`updateAlbum`**`(Album album) {`

    `      Installer.EM.`**`getTransaction`**`().`**`begin`**`();`

    `      Installer.EM.`**`persist`**`(album);`

    `      Installer.EM.`**`getTransaction`**`().`**`commit`**`();`

    `   }`


    `public static void` **`insertAlbum`**`(Album album) {`

