    \ lasting loading of data\n      for(int i = 0; i < 20; i++) {\n         Thread.sleep(200);\n\
    \         m.addElement(new String(\"Item \" + i));\n      }\nreturn m;\n   }\n\
    \n   @Override\nprotected void done() {\n      try {\n         items.setModel(get());\n\
    \      } catch (Exception ignore) {}\n   }\n};\n\nworker.execute();\n```"
