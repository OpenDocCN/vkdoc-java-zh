  raw: '#### Behavior


    A top component''s behavior can be adapted by a series of features, shown in Table
    10-1\. You edit the settings of these features with the NetBeans window wizard.
    Otherwise, you can also adapt these features which are set in the constructor
    of a top component later.


    ![Image](images/t1001.jpg)


    These features can be prepended by `PROP_` with the following method within a
    top component:


    **`putClientProperty`**`(`

    `    TopComponent.PROP_CLOSING_DISABLED,`

    `    Boolean.TRUE);`


    #### States


    A top component can have several states, listed in [Table 10-2](#Chapter10.html#tab_10_2).


    ![Image](images/t1002.jpg)


    ![Image](images/t1002a.jpg)


    Entering a specific state is announced via a call to one of the methods shown
    in [Table 10-3](#Chapter10.html#tab_10_3). If a window has to perform an action
    in a specific state, simply override the corresponding method.


    ![Image](images/t1003.jpg)


    [Chapter 9](#Chapter09.html#ch9) showed how to create toolbar configurations and
    how to use them to display application-specific toolbars. Use two previously described
    methods that inform us about the state of the top component to display the currently
    active top component, as shown in [Listing 10-5](#Chapter10.html#list_10_5).


    ***Listing 10-5.** Displaying and Hiding Toolbars Based on Context*


    `public class MyTopComponent extends TopComponent {`

    `   private String origConfig = "Standard";`

    `   private String myConfig   = "`**`MyToolbarConfig`**`";`


    `protected void` **`componentActivated()`** `{`

    `      origConfig = ToolbarPool.getDefault().`**`getConfiguration`**`();`

    `      ToolbarPool.getDefault().setConfiguration(myConfig);`

    `   }`


    `protected void` **`componentDeactivated()`** `{`

    `      ToolbarPool.getDefault().`**`setConfiguration`**`(origConfig);`

    `   } }`


    If the top component is focused, the method `componentActivated()` is called.
    The current configuration is stored for later reactivation. Then, you set your
    own toolbar configuration `MyToolbarConfig` (created in [Chapter 9](#Chapter09.html#ch9)).
    If another top component is selected, this top component loses focus and the method
    `componentDeactivated()` is called. The stored configuration is set in this method
    to restore previous toolbars.


    #### Context Menu


    When right-clicking the title bar of a top component, a context menu is displayed,
    with actions such as *Undock Window* or *Close Window*. These actions are obtained
    from the `TopComponent` class via its `getActions()` method. To add your own actions
    to this context menu, you can override this method (see [Listing 10-6](#Chapter10.html#list_10_6)).
    When doing so, it is useful to add the actions declaratively. In [Chapter 3](#Chapter03.html#ch3),
    I mentioned that it is possible to add your own folders and extension points to
    the layer file. That is exactly what you want to use here. The actions are declared
    in the layer file and read it on demand in the `getActions()` method.


    ***Listing 10-6.** Reading Actions for a Context Menu from the Layer File*


    `public class` **`MyTopComponent`** `extends TopComponent {`

    `   private List<Action> ca = null;`


    `   @Override`

    `public Action[]` **`getActions`**`() {`

    `      if (ca == null) {`

    `         ca = new ArrayList<Action>(Arrays.asList(`**`super.getActions()`**`));`

    `         ca.add(null); /* add separator */`

    `Lookup lkp =` **`Lookups.forPath`**`("ContextActions/MyTC");`

    `         ca.addAll(lkp.`**`lookupAll`**`(Action.class));`

    `      }`


    `      return ca.toArray(new Action[ca.size()]);`

    `   } }`


    First, the superclass''s `getActions()` method is called in order to obtain default
    actions. With the help of the method `Lookups.forPath()` you can easily create
    a Lookup for the declared folder `ContextActions/MyTC`. The method `lookupAll()`
    then obtains all registered actions that implement the `Action` interface. When
    creating the menu, a `null` value is automatically replaced by a separator by
    the Platform. The assembled list of actions is returned as an array. Finally,
    you just have to create references on the actual action definitions (usually in
    the standard folder `Actions`). You can realize the references either elegantly
    via annotation in the respective action class itself or by a direct entry in the
    layer file. The necessary annotation would look like the following:


    `@ActionReference(path = "ContextActions/MyTC")`


    The corresponding entry in the layer file in the self-defined folder could look
    like [Listing 10-7](#Chapter10.html#list_10_7), for example.


    ***Listing 10-7.** Defining Context Menu Actions in the Layer File*


    `<folder name="`**`ContextActions`**`">`

    `  <folder name="`**`MyTC`**`">`

    `    <file name="MyAction1.shadow">`

    `      <attr name="originalFile"`

    `            stringvalue="Actions/Edit/com-galileo-netbeans-module-MyAction1.instance"/>`

    `    </file>`

    `    <file name="MyAction2.shadow">`

    `      <attr name="originalFile"`

    `            stringvalue="Actions/Edit/com-galileo-netbeans-module-MyAction2.instance"/>`

    `    </file>`

    `  </folder>`

    `</folder>`


    You have now created an extension point. Other modules can easily add actions
    to the context menu of your top component by defining this action in their layer
    file in the folder `ContextActions/MyTC`. Thus, the context menu can be flexibly
    extended by any other module without any dependency.


    #### Persistence


    The window system is capable of storing opened top components upon exiting the
    application and restoring them upon restart. However, there are use cases where
    storing the top component is not desirable. Determining whether a top component
    will be stored or not is done via the value that is delivered by the method `getPersistenceType()`.
    You can determine this value with the `persistenceType` attribute of the `TopComponent.Description`
    annotation. If you do not use annotations, though, the named method should always
    be overridden. The constants listed in Table 10-4 are available as return values.


    ![Image](images/t1004.jpg)


    The window system calls the methods `writeProperties()` and `readProperties()`
    upon storing or restoring a top component. The window system then calls the methods
    when saving and loading a top component. You can use these methods in order to
    save or load your top component-specific data. For this purpose you always get
    a `Properties` object as parameter. The data that is saved there is saved by the
    NetBeans Platform in the user directory as an XML file. From there it is loaded,
    too.


    #### Registry


    All top components of the NetBeans window system are centrally managed in a registry.
    The interface of this registry is specified by the `TopComponent.Registry` interface.
    An instance of this registry is obtained either directly via the `TopComponent`
    class by calling


    `TopComponent.Registry registry = TopComponent.getRegistry();`


    or via the `WindowManager`:


    `TopComponent.Registry registry = WindowManager.getDefault().getRegistry();`


    This registry will return, for example the currently activated top components
    via `getActivated()` or all opened top components via `getOpened()`. Furthermore,
    a `PropertyChangeListener` can be registered on the registry in order to globally
    react to state changes of the top component, for example (see [Table 10-5](#Chapter10.html#tab_10_5)).


    ![Image](images/t1005.jpg)


    In the following example, a listener is added to the registry. This listener reacts
    when a top component is opened (see [Listing 10-8](#Chapter10.html#list_10_8)).


    ***Listing 10-8.** Track Changes of Top Component States Globally*


    `public class MyTopComponent extends TopComponent implements` **`PropertyChangeListener`**
    `{`


    `   public MyTopComponent() {`

    **`  TopComponent.Registry`** `reg = TopComponent.`**`getRegistry()`**`;`

    `      reg.addPropertyChangeListener(WeakListeners.propertyChange(this, reg));`

    `   }`


    `public void` **`propertyChange`**`(PropertyChangeEvent evt) {`

    `      if(evt.getPropertyName().equals(TopComponent.Registry.`**`PROP_OPENED`**`))`

    `         // Top Component opened`

    `   } }`'
