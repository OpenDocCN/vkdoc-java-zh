    #### 配置、访问与关闭


    你需要配置 Java DB 数据库系统，集中管理对其的访问，并在时机成熟时通过模块安装程序关闭该系统。首先，在 `restored()` 方法中设置数据库的存储路径，该方法在启动应用程序或调用具有
    `derby.system.home` 特性的模块时被调用（参见清单 26-2）。数据库将创建在用户特定用户目录下的 *databases* 子目录中。此外，你还需要调用
    `initTables()` 方法，在该方法中，你首先希望通过 `SELECT` 查询来检查所需的表是否已创建。如果应用程序是首次启动（表尚不存在），则会触发一个
    `SQLException`，我们捕获该异常，然后创建 `albums` 和 `genres` 这两个表。


    先创建 `genres` 表，因为 `albums` 表将依赖于它。表中的每个条目都会获得一个唯一的 ID，该 ID 由数据库按升序分配。你可以通过为 `id`
    列指定 `GENERATED ALWAYS AS IDENTITY` 来实现这一点。因此，即使你在向表中添加条目时为 `id` 列定义了值，也会使用自动生成的值。或者，你也可以使用
    `BY DEFAULT` 代替 `ALWAYS`；这样，只有在你没有显式分配 ID 时，才会生成一个值。最后，使用 `PRIMARY KEY` 将 `id`
    列定义为主键，通过该主键将建立与 `albums` 表中条目的连接。紧接着创建 `albums` 表，并以相同的方式定义其主键列 `id`。其他列包括 `title`、`tracks`、`cds`、`years`
    和 `genre`。但是，你并不直接将流派写入 `genre` 列，而是写入 `genre` 表中某个流派条目的 ID。因此，`albums` 表中的 `genre`
    列是一个外键。你通过 `FOREIGN KEY (genre)` 来定义它，并通过 `REFERENCES genres (id)` 来定义与 `genres`
    表中 `id` 列的关联。在 `genres` 表中添加三个示例条目，以便在创建专辑时可以选择一个流派。


    ***清单 26-2.** 启动时安装数据库系统与数据库*


    `import java.sql.Statement;`

