    \ you see how the button `jButton1` is anchored to the margin of the form and\
    \ to the text field `jTextField1`. The text field itself is anchored to the upper\
    \ margin of the form; that is, the size of the form is changed below and thus\
    \ the button's position is not changed. If the Form is made bigger on the right\
    \ side, the button “sticks” to the right border. The GUI Builder suggests anchoring\
    \ points depending on the location (marked visibly in a half-round shape). You\
    \ can change them with *Anchor* in the context menu, though.\n\n### Adapting Components\n\
    \nYou have learned how to place and change the place of different components within\
    \ a Form. Now you also want to adapt these components.\n\n#### Text and Variable\
    \ Name\n\nThe components which you drag from the Palette to its Form get a default\
    \ caption referring to the types' name. The variables are named the same way.\
    \ You can adapt the caption either with `F2` or with *Edit Text* out of the context\
    \ menu. You can also adapt the variable name in the context menu with *Change\
    \ Variable Name*.\n\n#### Application-Specific Code\n\nIn the section *Palette*\
    \ I wrote that there is at first no possibility of editing the code produced by\
    \ the GUI Builder. However, the *Code Customize*, shown in [Figure 41-6](#Chapter41.html#fig_41_6),\
    \ makes this possible. You can call the Code Customizer for each component out\
    \ of the context menu with *Customize Code*. Doing this, you can add your user-specific\
    \ code at different locations of the initializing and of the declaration code.\
    \ Furthermore, it is possible to let the component create either locally or as\
    \ a field. In that last case you can define additional attributes referring to\
    \ the access or the storage.\n\n![Image](images/4106.jpg)\n\n***Figure 41-6.**\
    \ Code Customizer for adapting the initialization and declaration of a component*\n\
    \nEarlier I mentioned that the Properties window provides a special Code view\
    \ (*Code*). This offers additional opportunities to intervene besides those options\
    \ shown in [Figure 41-6](#Chapter41.html#fig_41_6). Doing this, you can not only\
    \ easily edit the code, but at the same time you also get a complete overview\
    \ of all user-specific extensions of the code.\n\n### Actions\n\nActions are an\
    \ elementary part of a user interface. Actions shall be executed in reaction to\
    \ an event triggered by the user. Such an event can be a mouse click or pressing\
    \ a key, for example. You can define an individual action for each event of a\
    \ component. The GUI Builder connects event and action for you. You can choose\
    \ from all available events in the context menu (*Events*). Clicking a certain\
    \ event, a listener is automatically registered for it. This listener calls the\
    \ method. Then you can implement its body in the Source view.\n\nAn example will\
    \ illustrate this. An action will be implemented for the `actionPerformed` event\
    \ (so clicking on the button) for the button shown in [Figure 41-5](#Chapter41.html#fig_41_5).\
    \ This is why you call the following entry out of the context menu of the button\
    \ `jButton1`: *Events ![Image](images/U001.jpg) Action ![Image](images/U001.jpg)\
    \ actionPerformed*. The editor automatically changes into the Source view and\
    \ jumps into the referring method which is called with this event. In [Listing\
    \ 41-1](#Chapter41.html#list_41_1) it is the method `jButton1ActionPerformed()`.\n\
    \n***Listing 41-1.** Implementation of an Action. Only the Methods Body Can Be\
    \ Edited.*\n\n```\nprivate void jButton1ActionPerformed(java.awt.event.ActionEvent\
    \ evt) {\n   jTextField1.setText(\"Hello World\");\n}\n```\n\nIf you look at the\
