    \ class of the Java Platform. The implementation of a `FileObject` is provided\
    \ by the concrete file system. Apart from the standard file operations, the class\
    \ `FileObject` also provides the possibility of supervising changes of files or\
    \ directories. The following sections will describe the operations of the class\
    \ `FileObject`."
