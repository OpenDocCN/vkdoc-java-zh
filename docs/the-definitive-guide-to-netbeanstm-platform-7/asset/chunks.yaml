- fmt: "### Progress Bar\n\nBy default, the NetBeans status bar has an integrated\
    \ progress bar. It is used via the Progress API. There are classes available for\
    \ visualizing the progress of simple tasks as well as for monitoring multiple\
    \ tasks that have their progress displayed as one. The progress of separate tasks\
    \ can be monitored as well.\n\n#### Displaying the Progress of Separate Tasks\n\
    \nThere are three variants of displays available that you can set depending on\
    \ the information about the task in progress, as shown in [Figure 11-3](#Chapter11.html#fig_11_3):\n\
    \n- A finite display of percentile progress until completion, if the number of\
    \ required steps is known.\n- A finite display of remaining seconds until completion,\
    \ if the number of required steps and their total duration are known.\n- An infinite\
    \ display if neither the number nor the total duration of required steps is known.\n\
    \n![Image](images/1103.jpg)\n\n***Figure 11-3.** Different Kinds of Progress Display*\n\
    \nThe most basic use case entails the use of `ProgressHandleFactory`, creating\
    \ an instance of `ProgressHandle` for a specific task (see [Listing 11-3](#Chapter11.html#list_11_3)).\
    \ The `ProgressHandle` provides control of the progress display.\n\n***Listing\
    \ 11-3.** Using the Progress Bar for Separate Tasks*\n\n```\nRunnable run = new\
    \ Runnable() {\n   public void run() {\nProgressHandle p = ProgressHandleFactory.createHandle(\"\
    My Task\");\n      p.start(100);\n         // do some work\n      p.progress(\"\
    Step 1\", 10);\n         // do next work\n      p.progress(100);\n      p.finish();\n\
    \   } };\n```\n\n```\nThread t = new Thread(run);\nt.start(); // start the task\
    \ and progress visualisation\n```\n\n[Table 11-1](#Chapter11.html#tab_11_1) lists\
    \ the methods used to start different display types.\n\n![Image](images/t1101.jpg)\n\
    \nThe methods shown in [Table 11-2](#Chapter11.html#tab_11_2) allow switching\
    \ between finite and infinite progress bars during runtime, including displaying\
    \ percentile or seconds.\n\n![Image](images/t1102.jpg)\n\n![Image](images/square.jpg)\
    \ **Caution** a common error working with progress bars concerns the real task\
    \ performed in the event dispatch thread that is responsible for updating the\
    \ GUI. Executing the task there blocks the thread, which in turn blocks displaying\
    \ the progress bar, because this step is already finished until the event dispatch\
    \ thread comes into play again updating the GUI. To separately execute the task,\
    \ the `SwingWorker` class of the Java API can be used, for example. Its use is\
    \ shown via an asynchronous initialization in [Chapter 15](#Chapter15.html#ch15).\
    \ In this context, the class `ProgressUtils` also provides useful functions.\n\
    \nThere are several methods for creating a `ProgressHandle` with the `ProgressHandleFactory`.\
    \ One of these methods allows passing the `Cancellable` service interface, allowing\
    \ the user to abort the task with a button displayed next to the progress bar\
    \ (see [Figure 11-3](#Chapter11.html#fig_11_3)).\n\n```\ncreateHandle(String displayName,\
    \ Cancellable allowToCancel)\n```\n\nWith the `suspend(String message)` method\
    \ you can pause the progress bar and display a corresponding message.\n\n####\
    \ Displaying the Progress of Multiple Related Tasks\n\nAdditionally, the Progress\
    \ API provides an extended method for monitoring progress. An `AggregateProgressHandle`\
    \ can be created via the `AggregateProgressFactory`. With the help of this handle,\
    \ you can assemble the progress of multiple tasks and display them in a single\
    \ progress bar. For this purpose, the class `ProgressContributor` is additionally\
    \ required. Every task requires an instance of it to communicate current progress\
    \ to the `AggregateProgressHandle`.\n\nThe following example shows the use of\
    \ this type of progress display. For this purpose, we want to create a number\
    \ of tasks with different durations of execution and then display its progress\
    \ in the progress bar.\n\nFor this purpose, we firstly create the abstract class\
    \ `AbstractTask` that inherits from the class `Thread`. This allows the parallel\
    \ execution of tasks from the list. It is also possible not to derive from `Thread`\
    \ and start the tasks sequentially. This abstract class shall take care of creating\
    \ and managing the `ProgressContributor` class and it shall communicating current\
    \ progress.\n\n```\npublic abstract class AbstractTask extends Thread {\nprotected\
    \ ProgressContributor p = null;\n\n   public AbstractTask(String id) {\np = AggregateProgressFactory.createProgressContributor(id);\n\
    \   }\n\npublic ProgressContributor getProgressContributor() {\n      return p;\n\
    \   } }\n```\n\nYou now create an example task that takes ten steps to finish\
    \ via the class `MyTask`. You just have to implement the `run()` method, in which\
    \ the task is executed and progress is communicated.\n\n```\npublic class MyTask\
    \ extends AbstractTask {\n   public MyTask(String id) {\n      super(id);\n  \
    \ }\n\n   public void run() {\n      p.start(10);\n      //do some work\n    \
    \  p.progress(5);\n      //do some work\n      p.progress(10);\n      p.finish();\n\
    \   }\n}\n```\n\nThe class `MyTask2` is an additional example task that takes\
    \ more steps to finish than the class `MyTask1`.\n\n```\npublic class MyTask2\
    \ extends AbstractTask {\n   public MyTask2(String id) {\n      super(id);\n \
    \  }\n\n   public void run() {\n      p.start(30);\n      //do another work\n\
    \      p.progress(2);\n      //do another work\n      p.progress(15);\n      p.finish();\n\
    \   }\n}\n```\n\nLocated in the `MyProgram` class is a list of the tasks and the\
    \ `processTaskList()` method to execute the tasks. As an example, you store three\
    \ tasks in the constructor and add them to your task list. By calling the method\
    \ `processTaskList()` (which could, for example, be called by a button), an array\
    \ for the `ProgressContributor` is created, and every task's `ProgressContributor`\
    \ is added to that array. Then, you pass this array to the `AggregateProgressFactory`\
    \ (which creates an `AggregateProgressHandle`) via the `createHandle()` method\
    \ (see [Listing 11-4](#Chapter11.html#list_11_4)). When starting this handle,\
    \ the progress bar is displayed and ready to receive progress notifications from\
    \ the tasks. What remains is to start the tasks. The progress bar automatically\
    \ terminates when the last task is finished.\n\n***Listing 11-4.** Executing a\
    \ List of Tasks*\n\n```\npublic class MyProgram {\nprivate List<AbstractTask>\
    \ tasks = new ArrayList<AbstractTask>();\n\npublic MyProgram() {\ntasks.add(new\
    \ MyTask(\"Task1\"));\ntasks.add(new MyTask2(\"Task2\"));\ntasks.add(new MyTask2(\"\
    Task3\"));\n   }\n\n   public void processTaskList() {\nProgressContributor cps[]\
    \ = new ProgressContributor[tasks.size()];\n      int i = 0;\n      for(AbstractTask\
    \ task : tasks) {\n         cps[i] = task.getProgressContributor();\n        \
    \ i++;\n      }\n```"
  raw: '### Progress Bar


    By default, the NetBeans status bar has an integrated progress bar. It is used
    via the Progress API. There are classes available for visualizing the progress
    of simple tasks as well as for monitoring multiple tasks that have their progress
    displayed as one. The progress of separate tasks can be monitored as well.


    #### Displaying the Progress of Separate Tasks


    There are three variants of displays available that you can set depending on the
    information about the task in progress, as shown in [Figure 11-3](#Chapter11.html#fig_11_3):


    *   A finite display of percentile progress until completion, if the number of
    required steps is known.

    *   A finite display of remaining seconds until completion, if the number of required
    steps and their total duration are known.

    *   An infinite display if neither the number nor the total duration of required
    steps is known.


    ![Image](images/1103.jpg)


    ***Figure 11-3.** Different Kinds of Progress Display*


    The most basic use case entails the use of `ProgressHandleFactory`, creating an
    instance of `ProgressHandle` for a specific task (see [Listing 11-3](#Chapter11.html#list_11_3)).
    The `ProgressHandle` provides control of the progress display.


    ***Listing 11-3.** Using the Progress Bar for Separate Tasks*


    `Runnable run = new Runnable() {`

    `   public void run() {`

    **`ProgressHandle`** `p =` **`ProgressHandleFactory`**`.createHandle("My Task");`

    `      p.start(100);`

    `         // do some work`

    `      p.progress("Step 1", 10);`

    `         // do next work`

    `      p.progress(100);`

    `      p.finish();`

    `   } };`


    `Thread t = new Thread(run);`

    `t.start(); // start the task and progress visualisation`


    [Table 11-1](#Chapter11.html#tab_11_1) lists the methods used to start different
    display types.


    ![Image](images/t1101.jpg)


    The methods shown in [Table 11-2](#Chapter11.html#tab_11_2) allow switching between
    finite and infinite progress bars during runtime, including displaying percentile
    or seconds.


    ![Image](images/t1102.jpg)


    ![Image](images/square.jpg) **Caution** a common error working with progress bars
    concerns the real task performed in the event dispatch thread that is responsible
    for updating the GUI. Executing the task there blocks the thread, which in turn
    blocks displaying the progress bar, because this step is already finished until
    the event dispatch thread comes into play again updating the GUI. To separately
    execute the task, the `SwingWorker` class of the Java API can be used, for example.
    Its use is shown via an asynchronous initialization in [Chapter 15](#Chapter15.html#ch15).
    In this context, the class `ProgressUtils` also provides useful functions.


    There are several methods for creating a `ProgressHandle` with the `ProgressHandleFactory`.
    One of these methods allows passing the `Cancellable` service interface, allowing
    the user to abort the task with a button displayed next to the progress bar (see
    [Figure 11-3](#Chapter11.html#fig_11_3)).


    `createHandle(String displayName,` **`Cancellable`** `allowToCancel)`


    With the `suspend(String message)` method you can pause the progress bar and display
    a corresponding message.


    #### Displaying the Progress of Multiple Related Tasks


    Additionally, the Progress API provides an extended method for monitoring progress.
    An `AggregateProgressHandle` can be created via the `AggregateProgressFactory`.
    With the help of this handle, you can assemble the progress of multiple tasks
    and display them in a single progress bar. For this purpose, the class `ProgressContributor`
    is additionally required. Every task requires an instance of it to communicate
    current progress to the `AggregateProgressHandle`.


    The following example shows the use of this type of progress display. For this
    purpose, we want to create a number of tasks with different durations of execution
    and then display its progress in the progress bar.


    For this purpose, we firstly create the abstract class `AbstractTask` that inherits
    from the class `Thread`. This allows the parallel execution of tasks from the
    list. It is also possible not to derive from `Thread` and start the tasks sequentially.
    This abstract class shall take care of creating and managing the `ProgressContributor`
    class and it shall communicating current progress.


    `public abstract class AbstractTask extends Thread {`

    `protected` **`ProgressContributor`** `p = null;`


    `   public AbstractTask(String id) {`

    `p =` **`AggregateProgressFactory.createProgressContributor`**`(id);`

    `   }`


    `public` **`ProgressContributor`** `getProgressContributor() {`

    `      return p;`

    `   } }`


    You now create an example task that takes ten steps to finish via the class `MyTask`.
    You just have to implement the `run()` method, in which the task is executed and
    progress is communicated.


    `public class MyTask extends AbstractTask {`

    `   public MyTask(String id) {`

    `      super(id);`

    `   }`


    `   public void run() {`

    `      p.`**`start`**`(10);`

    `      //do some work`

    `      p.`**`progress`**`(5);`

    `      //do some work`

    `      p.`**`progress`**`(10);`

    `      p.`**`finish`**`();`

    `   }`

    `}`


    The class `MyTask2` is an additional example task that takes more steps to finish
    than the class `MyTask1`.


    `public class MyTask2 extends AbstractTask {`

    `   public MyTask2(String id) {`

    `      super(id);`

    `   }`


    `   public void run() {`

    `      p.`**`start`**`(30);`

    `      //do another work`

    `      p.`**`progress`**`(2);`

    `      //do another work`

    `      p.`**`progress`**`(15);`

    `      p.`**`finish`**`();`

    `   }`

    `}`


    Located in the `MyProgram` class is a list of the tasks and the `processTaskList()`
    method to execute the tasks. As an example, you store three tasks in the constructor
    and add them to your task list. By calling the method `processTaskList()` (which
    could, for example, be called by a button), an array for the `ProgressContributor`
    is created, and every task''s `ProgressContributor` is added to that array. Then,
    you pass this array to the `AggregateProgressFactory` (which creates an `AggregateProgressHandle`)
    via the `createHandle()` method (see [Listing 11-4](#Chapter11.html#list_11_4)).
    When starting this handle, the progress bar is displayed and ready to receive
    progress notifications from the tasks. What remains is to start the tasks. The
    progress bar automatically terminates when the last task is finished.


    ***Listing 11-4.** Executing a List of Tasks*


    `public class` **`MyProgram`** `{`

    `private List<AbstractTask>` **`tasks`** `= new ArrayList<AbstractTask>();`


    `public` **`MyProgram`**`() {`

    `tasks.add(new` **`MyTask`**`("Task1"));`

    `tasks.add(new` **`MyTask2`**`("Task2"));`

    `tasks.add(new` **`MyTask2`**`("Task3"));`

    `   }`


    `   public void processTaskList() {`

    **`ProgressContributor`** `cps[] = new` **`ProgressContributor`**`[tasks.size()];`

    `      int i = 0;`

    `      for(AbstractTask task : tasks) {`

    `         cps[i] = task.getProgressContributor();`

    `         i++;`

    `      }`'
  trans: '

    ### 进度条


    默认情况下，NetBeans 状态栏集成了一个进度条。它通过 Progress API 来使用。有一些类可用于可视化简单任务的进度，也可用于监控多个任务（这些任务的进度会合并显示为一个）。同时，也可以监控各个独立任务的进度。


    #### 显示独立任务的进度


    根据对进行中任务的了解程度，你可以设置三种不同的显示变体，如图 11-3 所示：


    *   如果已知所需步骤数，则显示完成前的百分比进度。

    *   如果已知所需步骤数及其总耗时，则显示完成前的剩余秒数。

    *   如果既不知道所需步骤数，也不知道总耗时，则显示无限进度。


    ![Image](img/1103.jpg)


    ***图 11-3.** 不同类型的进度显示*


    最基本的用例涉及使用 `ProgressHandleFactory`，为特定任务创建一个 `ProgressHandle` 实例（见清单 11-3）。`ProgressHandle`
    提供了对进度显示的控制。


    ***清单 11-3.** 为独立任务使用进度条*


    `Runnable run = new Runnable() {`

    `   public void run() {`

    **`ProgressHandle`** `p =` **`ProgressHandleFactory`**`.createHandle("我的任务");`

    `      p.start(100);`

    `         // 执行一些工作`

    `      p.progress("步骤 1", 10);`

    `         // 执行下一步工作`

    `      p.progress(100);`

    `      p.finish();`

    `   } };`


    `Thread t = new Thread(run);`

    `t.start(); // 启动任务和进度可视化`


    表 11-1 列出了用于启动不同显示类型的方法。


    ![Image](img/t1101.jpg)


    表 11-2 中显示的方法允许在运行时在有限和无限进度条之间切换，包括显示百分比或秒数。


    ![Image](img/t1102.jpg)


    ![Image](img/square.jpg) **注意** 使用进度条时的一个常见错误与在负责更新 GUI 的事件分发线程中执行的实际任务有关。在该线程中执行任务会阻塞该线程，进而阻塞进度条的显示，因为当事件分发线程再次介入更新
    GUI 时，这一步已经完成了。为了单独执行任务，可以使用 Java API 中的 `SwingWorker` 类。其用法在第 15 章中通过异步初始化进行了展示。在此上下文中，`ProgressUtils`
    类也提供了有用的功能。


    有几种方法可以通过 `ProgressHandleFactory` 创建 `ProgressHandle`。其中一种方法允许传递 `Cancellable`
    服务接口，使用户能够通过进度条旁边显示的一个按钮来中止任务（见图 11-3）。


    `createHandle(String displayName,` **`Cancellable`** `allowToCancel)`


    使用 `suspend(String message)` 方法可以暂停进度条并显示相应的消息。


    #### 显示多个相关任务的进度


    此外，Progress API 还提供了一种扩展方法来监控进度。可以通过 `AggregateProgressFactory` 创建一个 `AggregateProgressHandle`。借助这个句柄，你可以将多个任务的进度组合起来，并在一个进度条中显示。为此，还需要
    `ProgressContributor` 类。每个任务都需要一个该类的实例来向 `AggregateProgressHandle` 通报当前进度。


    以下示例展示了这种进度显示类型的使用。为此，我们要创建一些执行时间不同的任务，然后在进度条中显示它们的进度。


    为此，我们首先创建抽象类 `AbstractTask`，它继承自 `Thread` 类。这允许列表中的任务并行执行。也可以不从 `Thread` 派生，而是顺序启动任务。这个抽象类负责创建和管理
    `ProgressContributor` 类，并负责通报当前进度。


    `public abstract class AbstractTask extends Thread {`

    `protected` **`ProgressContributor`** `p = null;`


    `   public AbstractTask(String id) {`

    `p =` **`AggregateProgressFactory.createProgressContributor`**`(id);`

    `   }`


    `public` **`ProgressContributor`** `getProgressContributor() {`

    `      return p;`

    `   } }`


    现在，你通过 `MyTask` 类创建一个需要十步才能完成的示例任务。你只需实现 `run()` 方法，在该方法中执行任务并通报进度。


    `public class MyTask extends AbstractTask {`

    `   public MyTask(String id) {`

    `      super(id);`

    `   }`


    `   public void run() {`

    `      p.`**`start`**`(10);`

    `      //执行一些工作`

    `      p.`**`progress`**`(5);`

    `      //执行一些工作`

    `      p.`**`progress`**`(10);`

    `      p.`**`finish`**`();`

    `   }`

    `}`


    `MyTask2` 类是另一个示例任务，它比 `MyTask1` 类需要更多步骤才能完成。


    `public class MyTask2 extends AbstractTask {`

    `   public MyTask2(String id) {`

    `      super(id);`

    `   }`


    `   public void run() {`

    `      p.`**`start`**`(30);`

    `      //执行另一项工作`

    `      p.`**`progress`**`(2);`

    `      //执行另一项工作`

    `      p.`**`progress`**`(15);`

    `      p.`**`finish`**`();`

    `   }`

    `}`


    在 `MyProgram` 类中，有一个任务列表和用于执行任务的 `processTaskList()` 方法。作为示例，你在构造函数中存储三个任务并将它们添加到任务列表中。通过调用
    `processTaskList()` 方法（例如，可以通过按钮调用），会为 `ProgressContributor` 创建一个数组，并将每个任务的 `ProgressContributor`
    添加到该数组中。然后，你通过 `createHandle()` 方法将此数组传递给 `AggregateProgressFactory`（它会创建一个 `AggregateProgressHandle`）（见清单
    11-4）。启动此句柄时，进度条会显示出来，并准备好接收来自任务的进度通知。剩下的就是启动任务。当最后一个任务完成时，进度条会自动终止。


    ***清单 11-4.** 执行任务列表*


    `public class` **`MyProgram`** `{`

    `private List<AbstractTask>` **`tasks`** `= new ArrayList<AbstractTask>();`


    `public` **`MyProgram`**`() {`

    `tasks.add(new` **`MyTask`**`("任务 1"));`

    `tasks.add(new` **`MyTask2`**`("任务 2"));`

    `tasks.add(new` **`MyTask2`**`("任务 3"));`

    `   }`


    `   public void processTaskList() {`

    **`ProgressContributor`** `cps[] = new` **`ProgressContributor`**`[tasks.size()];`

    `      int i = 0;`

    `      for(AbstractTask task : tasks) {`

    `         cps[i] = task.getProgressContributor();`

    `         i++;`

    `      }`

