    \      playlistName.getDocument().addDocumentListener(this);\n      imagePath.getDocument().addDocumentListener(this);\n\
    \   }\npublic String getName() {\n      return NbBundle.getMessage(PlaylistWizardPanel1.class,\
    \ \"Panel1.Name\");\n   }\n   public String getPlaylistName() {\n      return\
    \ playlistName.getText();\n   }\n   public String getGenre() {\n      return (String)genre.getSelectedItem();\n\
    \   }\n   public String getDescription() {\n      return description.getText();\n\
    \   }\n   public String getImagePath() {\n      return imagePath.getText();\n\
    \   }\npublic void changedUpdate( DocumentEvent e ) {\n      if (playlistName.getDocument()\
    \ == e.getDocument()) {\nfirePropertyChange(PROP_PLAYLIST_NAME, 0, 1);\n     \
    \ } else if(imagePath.getDocument() == e.getDocument()) {\nfirePropertyChange(PROP_IMAGE_PATH,\
    \ 0, 1);\n      }\n   } }\n```\n\nLook at the content of the related Wizard Panel,\
    \ providing the controller for the Visual Panel. The class implements the `WizardDescriptor.Panel<Data>`\
    \ interface, defining the interface of wizard panels. As a template, you can define\
    \ a class that will be used as a data model. Since you need no special custom\
