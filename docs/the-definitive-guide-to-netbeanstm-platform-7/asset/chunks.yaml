    \         PopupMenu popup = new PopupMenu();\n         popup.setFont(new Font(\"\
    Arial\", Font.PLAIN, 11));\n\n         for(Action a : Utilities.actionsForPath(\"\
    TrayMenu\")) {\n            MenuItem item = new MenuItem((String)a.getValue(Action.NAME));\n\
    \            item.addActionListener(a);\n            popup.add(item);\n      \
    \   }\n\n         Image image = ImageUtilities.loadImage(\"com/galileo/netbeans/module/icon.gif\"\
    );\nTrayIcon trayIcon = new TrayIcon(image, \"My Tray Menu\", popup);\n\n    \
    \     trayIcon.addActionListener(new ActionListener() {\n            @Override\n\
    \            public void actionPerformed(ActionEvent e) {\n               System.out.println(\"\
    double click on tray icon\");\n            }\n         });\n\n         try {\n\
    tray.add(trayIcon);\n         } catch (AWTException e) {\n            System.err.println(e);\n\
    \         }\n      }\n   }\n}\n```\n\n### Asynchronous Initialization of Graphical\
    \ Components\n\n在开发图形用户界面时，实现快速响应时间非常重要。这对于组件的初始化阶段尤其如此，这些组件需要在与用户的对话框中初始化。一个很好的例子是向导，这在[第13章](#Chapter13.html#ch13)中讨论过。如果用户启动一个向导，向导应立即打开并可用。但通常，组件（如下拉框）的数据需要从相对较慢的数据源加载，或者必须根据依赖数据进行计算和组合。在这种情况下，请在单独的线程中异步初始化组件，与用户界面的其余初始化过程分开。这样做时，请注意不要从事件调度线程（EDT）外部访问GUI组件。\n\
    \nNetBeans *Utilities API* 通过服务提供者接口`AsyncGUIJob`提供了一种简单的方法来满足这一需求。该接口指定了两个方法来帮助异步初始化组件。`construct()`方法会在单独的线程中自动执行，因此EDT不会被阻塞。这允许您加载数据或执行其他长时间运行的初始化操作，而不会影响性能。但是，不要在`construct()`方法中访问GUI组件。一旦`construct()`方法返回，就会调用`finished()`方法。由于它是在事件调度线程中调用的，您可以将之前在`construct()`方法中加载的数据添加到GUI组件中。在[清单15-3](#Chapter15.html#list_15_3)的示例中，数据（在`construct()`中加载）被添加到一个`DefaultComboBoxModel`中。加载完成后，您在`finished()`方法中将创建的数据模型添加到`JComboBox`中。这个异步过程通过`Utilities.attachInitJob()`方法启动并连接到组件。这样，就可以为各种组件定义和启动独立的作业。\n\
