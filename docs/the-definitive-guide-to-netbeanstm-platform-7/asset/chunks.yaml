    in [Listing 20-8](#Chapter20.html#list_20_8).


    ***Listing 20-8.** Registration of a Secondary Panel Container via Layer Entry*


    `<folder name="`**`OptionsDialog`**`">`

    `   <file name="ModuleOptions3.instance">`

    `      <attr name="instanceCreate" methodvalue=`

