  trans: '

    ### NetBeans 运行时容器


    NetBeans 平台及其模块化架构的基础被称为 *NetBeans 运行时容器*。它由以下五个模块组成：


    *   *Bootstrap*：该模块首先执行。它执行所有已注册的命令行处理器，创建一个用于加载启动模块的引导类加载器，然后执行该模块。

    *   *Startup*：该模块通过初始化模块系统和文件系统来部署应用程序。

    *   *模块系统 API*：此 API 负责管理模块及其设置和依赖关系。

    *   *文件系统 API*：此 API 提供了一个虚拟文件系统，用于提供平台无关的访问。它主要用于加载模块的资源。

    *   *Lookup 与 Utilities API*：该组件提供了一个重要的基础组件，用于模块间的相互通信。Lookup API 位于一个独立的模块中，因此它可以独立于
    NetBeans 平台使用。


    图 2-3 中的箭头显示了这五个基本模块之间的依赖关系。


    ![Image](img/0203.jpg)


    ***图 2-3.** NetBeans 运行时容器*


    运行时容器是富客户端应用程序的最小形式，并且可以无需其他模块直接运行。如果没有任务需要执行，运行时容器将在启动后直接关闭。值得注意的是，NetBeans 平台一方面可以创建具有丰富用户界面的应用程序，另一方面也可以使用此运行时容器来构建模块化的命令行应用程序。启动运行时容器时，它会查找所有可用的模块，并从中创建一个内部注册表。通常，一个模块仅在需要时才被加载。首先，它会被注册为“已存在”。然而，模块也有可能在启动时立即执行任务。这是通过模块安装程序（Module
    Installer）完成的，相关内容将在第 3 章中讨论。运行时容器还支持在运行时动态加载、卸载、安装和卸载模块。当用户更新应用程序（使用自动更新功能）时，此功能尤其必要。在应用程序中停用不需要的模块时，也需要此功能。


    为了完整理解富客户端应用程序的启动过程，还需要说明的是，Bootstrap 模块（第一个执行的模块）是由一个特定于平台的启动器启动的。该启动器还负责识别 Java
    运行时环境。启动器是 NetBeans 平台的一部分，并且是特定于操作系统（或 OS）的，例如，在 Windows 系统上它是一个 `.exe` 文件。


    ### NetBeans 类加载器系统


    NetBeans 类加载器系统是 NetBeans 运行时容器的一部分，也是封装模块和构建模块化架构结构的前提条件。该系统由三种不同类型的类加载器组成。它们是
    *模块类加载器*、*系统类加载器* 和 *原始类加载器*。


    *   大多数类由模块类加载器加载。

    *   系统类加载器仅在特定情况下使用，例如，当必须访问模块外部的资源时。

    *   原始类加载器从应用程序启动器的类路径中加载资源。


    模块类加载器和系统类加载器是多父级类加载器；它们可以拥有任意数量的父级，而不仅仅像通常那样只有一个父级类加载器。图 2-4 显示了各种类加载器类型之间的连接关系。


    ![Image](img/0204.jpg)


    ***图 2-4.** NetBeans 类加载器系统*


    #### 模块类加载器


    对于在模块系统中注册的每个模块，都会创建一个模块类加载器的实例，每个模块通过该实例获得自己的命名空间。此类加载器主要从模块的 JAR 归档文件中加载类，但也可能从多个归档文件中加载，这在库包装模块中经常发生。您将在第
    3 章中了解更多相关信息。


    原始类加载器隐式地是每个模块类加载器的父级类加载器，并且位于父级列表的首位。其他父级是那些设置了依赖关系的相关模块的类加载器。如何设置依赖关系将在第 3 章中描述。


    这种多父级模块类加载器使得能够从其他模块加载类，同时避免命名空间冲突。类的加载被委托给父级类加载器，而不是模块本身。除了模块 JAR 归档文件中的类之外，此类加载器还负责从
    `locale` 子目录加载区域设置扩展归档文件（参见第 34 章），以及从 `patches` 子目录加载补丁归档文件（如果存在）。


    #### 系统类加载器


    默认情况下，系统类加载器是一个多父级类加载器。它拥有所有已实例化的模块类加载器作为其父级。因此，理论上可以使用此类加载器加载模块提供的所有内容。可以通过两种不同的方式访问系统类加载器：通过
    Lookup（稍后您将了解更多相关内容），以及通过当前线程的上下文类加载器。默认情况下（只要您没有显式设置其他上下文类加载器），这就是系统类加载器。


    `ClassLoader cl = (ClassLoader) Lookup.getDefault().lookup(ClassLoader.class);`


    或


    `ClassLoader cl = Thread.currentThread().getContextClassLoader();`


    #### 原始类加载器


    原始（应用程序）类加载器由应用程序的启动器创建。它从原始的 `CLASSPATH` 以及 `lib` 目录及其 `ext` 子目录中加载类和其他资源。如果某个
    JAR 归档文件未被识别为模块（即清单条目无效），则不会将其传递给模块系统。此类资源总是被优先找到：如果在此处找到与模块 JAR 归档文件中相同的资源，则模块中的资源将被忽略。这种安排对于模块的品牌化（例如）以及准备特定模块的多语言发行版是必要的。与之前一样，此类加载器不用于加载所有相关资源。它更可能用于应用程序早期启动阶段所需的资源，例如设置外观和感觉所需的类。


    ### 总结


    本章从 NetBeans 平台的架构入手，考察了其结构，其核心由运行时容器提供。运行时容器为基于 NetBeans 平台构建的应用程序提供了执行环境，并为模块化应用程序提供了基础设施。本章介绍并解释了确保模块封装的
    NetBeans 类加载器系统。除了运行时容器之外，许多模块构成了 NetBeans 平台的一部分，本章简要介绍了其中的每一个，最后指出 NetBeans
    IDE 本身就是一个富客户端应用程序，由可在您自己的应用程序中重用的模块组成。


    ## 第 3 章

    '
- fmt: "# The NetBeans Module System\n\nThe `NetBeans Module System` is responsible\
    \ for managing all modules. This means it is responsible for tasks such as creating\
    \ the classloader, loading modules, or activating or deactivating them. The NetBeans\
    \ module system was designed using standard Java technologies, as much as possible.\
    \ The basic idea for the module format originates from the Java extension mechanism.\
    \ The fundamental ideas of the package versioning specification are used to describe\
    \ and manage dependencies between application modules and applications of system\
    \ modules.\n\nBasic properties, such as the description of a module and the dependencies\
    \ on another module, are described in a manifest file. This file uses the standard\
    \ manifest format with additional NetBeans-specific attributes. The Java Activation\
    \ Framework and Java Development Kit (JDK) internal functions (such as the support\
    \ of executable JAR archives) were models for the module specification. Most modules\
    \ do not need a special installation code, except of the attributes in the manifest\
    \ file, meaning they are declaratively added to the Platform. An XML file, the\
    \ `layer.xml` file, provides user-specific information and defines the integration\
    \ of a module into the Platform. In this file everything is specified that a module\
    \ wants to add to the Platform, ranging from actions to menu items to services,\
    \ among others.\n\n## Structure of a Module\n\nA module is a simple JAR archive\
    \ which usually consists of the following parts:\n\n- Manifest file (`manifest.mf`)\n\
    - Layer file (`layer.xml`)\n- Class files\n- Resources like icons, properties\
    \ bundles, helpsets, etc.\n\nOnly the manifest file is obligatory, because it\
    \ identifies a module. All other content depends on its modules task. For example,\
    \ if the module just represents a library, no layer file is needed. The structure\
    \ of a module is shown in [Figure 3-1](#Chapter03.html#fig_3_1).\n\n![Image](images/0301.jpg)\n\
    \n**Figure 3-1.** NetBeans module\n\nFurthermore, an XML configuration file (`com-galileo-netbeans-module.xml`),\
    \ which is located outside the JAR archive, belongs to each module. This is the\
    \ first file read by the module system; that is, it announces the module to the\
    \ Platform.\n\n## Configuration File\n\nEach module is declared in the module\
    \ system by an XML configuration file, located outside the module in the directory\
    \ `config/Modules` of a cluster. This directory is read by the module system when\
    \ the application is started. The modules are loaded according to this information.\
    \ In this configuration file the name, version, and the location of the module\
    \ are defined and whether and how a module is loaded is defined. This file has\
    \ the following structure, as shown in [Listing 3-1](#Chapter03.html#list_3_1).\n\
    \n**Listing 3-1.** Module configuration file: `com-galileo-netbeans-module.xml`\n\
    \n```\n<module name=\"com.galileo.netbeans.module\">\n   <param name=\"autoload\"\
    >false</param>\n   <param name=\"eager\">false</param>\n   <param name=\"enabled\"\
    >true</param>\n   <param name=\"jar\">modules/com-galileo-netbeans-module.jar</param>\n\
    \   <param name=\"reloadable\">false</param>\n   <param name=\"specversion\">1.0</param>\n\
    </module>\n```\n\nThe `enabled` attribute defines whether a module is loaded,\
    \ and therefore whether it is provided to the application. There are three ways\
    \ to determine at which point a module should be loaded:\n\n- **Regular:** Most\
    \ application modules are this type. They are loaded when starting the application.\
    \ The application loading time is extended by the time of module initialization.\
    \ Therefore, it is recommended to keep the module initialization very short. Normally,\
    \ it is not necessary to run anything during module loading, because many tasks\
    \ can be defined declaratively.\n- **Autoload:** These modules are just loaded,\
    \ when another module requires them. Autoload modules correspond to the principle\
    \ of Lazy-Loading. This mode is usually used for those modules acting as libraries.\n\
    - **Eager:** Eager modules are only loaded when all dependencies are met. This\
    \ is another possibility for minimizing the starting time. For example, if a module\
    \ X depends on the modules A and B which are actually not even available, it makes\
    \ no sense to load module X.\n\nIf the value of both attributes `autoload` and\
    \ `eager` is `false`, a module is type Regular. If one of these values is `true`,\
    \ the module type is Autoload or Eager. The module type is defined in the API\
    \ Versioning section of the modules Properties (see [Figure 3-7](#Chapter03.html#fig_3_7)).\
    \ Regular mode is used, by default.\n\n## Manifest File\n\nEach module running\
    \ within the NetBeans Platform has a manifest file. This file is a textual description\
    \ of the module and its environment. When loading a module, the manifest file\
    \ is the first file read by the module system. A NetBeans module is recognized\
    \ if the manifest file contains the `OpenIDE-Module` attribute. This is the only\
    \ mandatory attribute. Its value can be any identifier (typically the code name\
    \ is the base of the used module—for example, `com.galileo.netbeans.module`).\
    \ Therefore, conflicts cannot occur between modules, even if created by various\
    \ developers. This identifier is used to clearly distinguish a non-ambiguous module\
    \ which is necessary for upgrades or dependency definitions, for example."
  raw: '## The NetBeans Module System


    The *NetBeans Module System* is responsible for managing all modules. This means
    it is responsible for tasks such as creating the classloader, loading modules,
    or activating or deactivating them. The NetBeans module system was designed using
    standard Java technologies, as much as possible. The basic idea for the module
    format originates from the Java extension mechanism. The fundamental ideas of
    the package versioning specification are used to describe and manage dependencies
    between application modules and applications of system modules.


    Basic properties, such as the description of a module and the dependencies on
    another module, are described in a manifest file. This file uses the standard
    manifest format with additional NetBeans-specific attributes. The Java Activation
    Framework and Java Development Kit (JDK) internal functions (such as the support
    of executable JAR archives) were models for the module specification. Most modules
    do not need a special installation code, except of the attributes in the manifest
    file, meaning they are declaratively added to the Platform. An XML file, the *layer.xml*
    file, provides user-specific information and defines the integration of a module
    into the Platform. In this file everything is specified that a module wants to
    add to the Platform, ranging from actions to menu items to services, among others.


    ### Structure of a Module


    A module is a simple JAR archive which usually consists of the following parts:


    *   Manifest file (*manifest.mf*)

    *   Layer file (*layer.xml*)

    *   Class files

    *   Resources like icons, properties bundles, helpsets, etc.


    Only the manifest file is obligatory, because it identifies a module. All other
    content depends on its modules task. For example, if the module just represents
    a library, no layer file is needed. The structure of a module is shown in [Figure
    3-1](#Chapter03.html#fig_3_1).


    ![Image](images/0301.jpg)


    ***Figure 3-1.** NetBeans module*


    Furthermore, an XML configuration file (`com-galileo-netbeans-module.xml`), which
    is located outside the JAR archive, belongs to each module. This is the first
    file read by the module system; that is, it announces the module to the Platform.


    ### Configuration File


    Each module is declared in the module system by an XML configuration file, located
    outside the module in the directory *config/Modules* of a cluster. This directory
    is read by the module system when the application is started. The modules are
    loaded according to this information. In this configuration file the name, version,
    and the location of the module are defined and whether and how a module is loaded
    is defined. This file has the following structure, as shown in [Listing 3-1](#Chapter03.html#list_3_1).


    ***Listing 3-1.** Module configuration file: com-galileo-netbeans-module.xml*


    `<`**`module`** `name="com.galileo.netbeans.module">`

    `   <param name="autoload">false</param>`

    `   <param name="eager">false</param>`

    `   <param name="enabled">true</param>`

    `   <param name="jar">`**`modules/com-galileo-netbeans-module.jar`**`</param>`

    `   <param name="reloadable">false</param>`

    `   <param name="specversion">1.0</param>`

    `</`**`module`**`>`


    The `enabled` attribute defines whether a module is loaded, and therefore whether
    it is provided to the application. There are three ways to determine at which
    point a module should be loaded:


    *   *Regular***:** Most application modules are this type. They are loaded when
    starting the application. The application loading time is extended by the time
    of module initialization. Therefore, it is recommended to keep the module initialization
    very short. Normally, it is not necessary to run anything during module loading,
    because many tasks can be defined declaratively.

    *   *Autoload***:** These modules are just loaded, when another module requires
    them. Autoload modules correspond to the principle of *Lazy-Loading*. This mode
    is usually used for those modules acting as libraries.

    *   *Eager***:** Eager modules are only loaded when all dependencies are met.
    This is another possibility for minimizing the starting time. For example, if
    a module X depends on the modules A and B which are actually not even available,
    it makes no sense to load module X.


    If the value of both attributes `autoload` and `eager` is `false`, a module is
    type Regular. If one of these values is `true`, the module type is Autoload or
    Eager. The module type is defined in the API Versioning section of the modules
    Properties (see [Figure 3-7](#Chapter03.html#fig_3_7)). Regular mode is used,
    by default.


    ### Manifest File


    Each module running within the NetBeans Platform has a manifest file. This file
    is a textual description of the module and its environment. When loading a module,
    the manifest file is the first file read by the module system. A NetBeans module
    is recognized if the manifest file contains the `OpenIDE-Module` attribute. This
    is the only mandatory attribute. Its value can be any identifier (typically the
    code name is the base of the used module—for example, `com.galileo.netbeans.module`).
    Therefore, conflicts cannot occur between modules, even if created by various
    developers. This identifier is used to clearly distinguish a non-ambiguous module
    which is necessary for upgrades or dependency definitions, for example.'
  trans: '

    ## NetBeans 模块系统


    *NetBeans 模块系统*负责管理所有模块。这意味着它负责诸如创建类加载器、加载模块、激活或停用模块等任务。NetBeans 模块系统在设计时尽可能使用了标准
    Java 技术。模块格式的基本思想源于 Java 扩展机制。包版本规范的基本概念被用于描述和管理应用程序模块与系统模块之间的依赖关系。


    模块的基本属性，例如模块的描述以及与其他模块的依赖关系，都在清单文件中进行描述。该文件使用标准的清单格式，并附加了 NetBeans 特有的属性。Java
    激活框架和 Java 开发工具包（JDK）的内部功能（例如对可执行 JAR 归档的支持）是模块规范的模型。大多数模块除了清单文件中的属性外，不需要特殊的安装代码，这意味着它们是以声明方式添加到平台中的。一个
    XML 文件，即 *layer.xml* 文件，提供了用户特定的信息，并定义了模块如何集成到平台中。在该文件中，指定了模块想要添加到平台的所有内容，从操作到菜单项再到服务等等。


    ### 模块的结构


    一个模块是一个简单的 JAR 归档文件，通常由以下部分组成：


    *   清单文件（*manifest.mf*）

    *   层文件（*layer.xml*）

    *   类文件

    *   资源，如图标、属性包、帮助集等


    只有清单文件是必需的，因为它标识了一个模块。所有其他内容取决于其模块的任务。例如，如果模块仅代表一个库，则不需要层文件。模块的结构如图 3-1 所示。


    ![图片](img/0301.jpg)


    ***图 3-1.** NetBeans 模块*


    此外，每个模块都包含一个位于 JAR 归档文件外部的 XML 配置文件（`com-galileo-netbeans-module.xml`）。这是模块系统读取的第一个文件；也就是说，它向平台宣告该模块的存在。


    ### 配置文件


    每个模块通过一个 XML 配置文件在模块系统中声明，该文件位于模块外部，即集群的 *config/Modules* 目录中。当应用程序启动时，模块系统会读取此目录。模块根据这些信息被加载。在此配置文件中，定义了模块的名称、版本和位置，并定义了是否以及如何加载模块。该文件的结构如下，如清单
    3-1 所示。


    ***清单 3-1.** 模块配置文件：com-galileo-netbeans-module.xml*


    `<`**`module`** `name="com.galileo.netbeans.module">`

    `   <param name="autoload">false</param>`

    `   <param name="eager">false</param>`

    `   <param name="enabled">true</param>`

    `   <param name="jar">`**`modules/com-galileo-netbeans-module.jar`**`</param>`

    `   <param name="reloadable">false</param>`

    `   <param name="specversion">1.0</param>`

    `</`**`module`**`>`


    `enabled` 属性定义了模块是否被加载，从而决定它是否提供给应用程序。有三种方式可以确定模块应在何时加载：


    *   *常规***：** 大多数应用程序模块属于此类型。它们在启动应用程序时被加载。应用程序的加载时间会因模块初始化时间而延长。因此，建议保持模块初始化非常简短。通常，在模块加载期间无需运行任何操作，因为许多任务可以声明式地定义。

    *   *自动加载***：** 这些模块仅在其他模块需要它们时才被加载。自动加载模块符合*懒加载*原则。此模式通常用于那些充当库的模块。

    *   *急切加载***：** 急切加载模块仅在满足所有依赖关系时才被加载。这是另一种最小化启动时间的方法。例如，如果模块 X 依赖于实际上甚至不可用的模块
    A 和 B，那么加载模块 X 是没有意义的。


    如果 `autoload` 和 `eager` 两个属性的值都为 `false`，则模块类型为常规。如果其中一个值为 `true`，则模块类型为自动加载或急切加载。模块类型在模块属性的
    API 版本部分中定义（参见图 3-7）。默认情况下使用常规模式。


    ### 清单文件


    在 NetBeans 平台中运行的每个模块都有一个清单文件。该文件是对模块及其环境的文本描述。加载模块时，清单文件是模块系统读取的第一个文件。如果清单文件包含
    `OpenIDE-Module` 属性，则识别为 NetBeans 模块。这是唯一必需的属性。其值可以是任何标识符（通常代码名称是所用模块的基础——例如，`com.galileo.netbeans.module`）。因此，即使由不同的开发者创建，模块之间也不会发生冲突。此标识符用于清晰地区分一个无歧义的模块，这对于升级或依赖关系定义等是必需的。

