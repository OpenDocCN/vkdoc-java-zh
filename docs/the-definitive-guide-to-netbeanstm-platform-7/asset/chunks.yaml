    \ }`\n\n## SHARING A BASE PANEL BETWEEN MULTIPLE WIZARD STEPS\n\nIf the wizard\
    \ consists of multiple panels, it is advisable to create a base class which handles\
    \ the listener logic and provides helper methods such as the `setMessage()` method.\
    \ This base class implements the `WizardDescriptor.Panel<Data>` interface, so\
    \ specific panels only need to derive from the base class. This approach is also\
    \ considered in [Figure 13-7](#Chapter13.html#fig_13_7).\n\n### Creating a Wizard\
    \ from Panels\n\nSo far, you've learned about constructing a panel that represents\
    \ a step in a wizard. You saw how the tasks of view and controller are distributed\
    \ and, above all, clearly separated. Only one small step remains before the entire\
    \ wizard is completed. A wizard is represented by the `WizardDescriptor` class,\
    \ which manages the individual panels. One option now is to instantiate your own\
    \ panels and pass them to a `WizardDescriptor`. The action class—which is created\
    \ automatically when using the IDE to create the panels—works that way. In the\
    \ interest of encapsulation, a clearer structuring, and reusability, it is a good\
    \ idea to create an individual wizard descriptor, extending the `WizardDescriptor`\
    \ class. Thus this class can even take care of the creation of panels and their\
    \ properties. Action classes, when starting a wizard, only need to create an instance\
    \ of the wizard descriptor. This one can be directly passed to the `DialogDisplayer`.\
    \ In this way, your wizard can be called fully transparent.\n\nTherefore, for\
    \ this example, create the `PlaylistWizardDescriptor` class, extending the `WizardDescriptor`\
    \ class (see [Listing 13-3](#Chapter13.html#list_13_3)). Use the `setPanelsAndSettings()`\
    \ method to pass in both panels, which are declared as private fields. The panels\
    \ must be passed with an iterator instance; such an iterator class is responsible\
    \ for the order of the panels. Use the default `ArrayIterator`. The second parameter\
    \ for `setPanelsAndSettings()` is a data model, which is passed to the panels\
    \ via the `readSettings()` and `storeSettings()` methods. In this data model the\
    \ data collected by the wizard are stored. Pass this as a reference to the `PlaylistWizardDescriptor`,\
    \ which you want to use as data model. Finally, carry out a few configuration\
    \ tasks.\n\n***Listing 13-3.** Wizard Descriptor, Which Assembles the Panels to\
    \ a Wizard*\n\n```\npublic class PlaylistWizardDescriptor extends WizardDescriptor\
    \ {\n\nprivate PlaylistWizardPanel1 p1 = new PlaylistWizardPanel1();\nprivate\
    \ PlaylistWizardPanel2 p2 = new PlaylistWizardPanel2();\n\npublic PlaylistWizardDescriptor()\
    \ {\nList<Panel<WizardDescriptor>> panels = new ArrayList<Panel<WizardDescriptor>>();\n\
    \      panels.add(p1);\n      panels.add(p2);\n      this.setPanelsAndSettings(new\
    \ ArrayIterator<WizardDescriptor>(panels), this);\n      this.setTitleFormat(new\
    \ MessageFormat(\"{0}\"));\n      this.setTitle(NbBundle.getMessage(PlaylistWizardDescriptor.class,\
    \ \"Wizard.Name\"));\n\n      putProperty(WizardDescriptor.PROP_CONTENT_DATA,\n\
    \         new String[]{panel1.getName(), panel2.getName()});\n      putProperty(WizardDescriptor.PROP_AUTO_WIZARD_STYLE,\n\
    \         Boolean.TRUE);\n      putProperty(WizardDescriptor.PROP_CONTENT_DISPLAYED,\n\
    \         Boolean.TRUE);\n      putProperty(WizardDescriptor.PROP_CONTENT_NUMBERED,\n\
    \         Boolean.TRUE);\n   } }\n```\n\nSimpler than the `WizardDescriptor` itself\
    \ is the action class that starts the wizard. Create a simple instance of the\
    \ `PlaylistWizardDescriptor` class and immediately pass it to the `createDialog()`\
    \ method, as illustrated in the “Custom Dialogs” section earlier in the chapter.\
    \ This creates a `Dialog` object, which contains a wizard displayed as usual,\
    \ via the `setVisible()` method (see [Listing 13-4](#Chapter13.html#list_13_4)).\
    \ After completing the wizard, you can determine which button the user has pressed\
    \ with the `getValue()` method. The most important point here is how the data\
    \ is analyzed. Since the `WizardDescriptor` itself is your data model, you can\
    \ read the data directly from it. The best approach is to use the `getProperties()`\
    \ method, providing a `Map` with all the properties that have been saved.\n\n\
    ***Listing 13-4.** Action Class That Creates and Calls a Wizard*\n\n```\n@ActionID(\n\
    \   category = \"Tools\",\n   id = \"com.galileo.netbeans.module.PlaylistWizardAction\"\
    )\n@ActionRegistration(\n   displayName = \"#CTL_PlaylistWizardAction\",\n   iconBase\
    \ = \"com/galileo/netbeans/module/wizard.png\")\n@ActionReference(path = \"Menu/Tools\"\
    , position = 1200)\npublic final class PlaylistWizardAction implements ActionListener\
    \ {\n   @Override\n   public void actionPerformed(ActionEvent e) {\nPlaylistWizardDescriptor\
    \ descriptor = new PlaylistWizardDescriptor();\n      Dialog dialog = DialogDisplayer.getDefault().createDialog(descriptor);\n\
    \      dialog.setVisible(true);\n      dialog.toFront();\n      if(descriptor.getValue()==WizardDescriptor.FINISH_OPTION)\
    \ {\nMap<String, Object> props = descriptor.getProperties();\n         //Create\
    \ the playlist with the data stored in props\n      }\n   }\n}\n```\n\n### Event\
    \ Handling\n\nIn this section, I will again explain in overview the concept of\
    \ interaction between the three layers— wizard descriptor, wizard panel and visual\
    \ panel—and how events and notifications are received and processed. In the sequence\
    \ diagram in [Figure 13-8](#Chapter13.html#fig_13_8), both scenarios—the initialization\
    \ of a wizard and the interaction between the various parts of the wizard as the\
    \ user enters data—are displayed.\n\n![Image](images/1308.jpg)\n\n***Figure 13-8.**\
    \ Interaction between the wizard descriptor, wizard panel, and visual panel.*\n\
    \nIn the `actionPerformed()` method of the action class to start the wizard, an\
    \ instance of the `PlaylistWizardDescriptor` is created. This descriptor generates\
    \ its panels and registers a `ChangeListener` for each, so that it is notified\
