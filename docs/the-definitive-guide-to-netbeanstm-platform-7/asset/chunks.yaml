- fmt: "#### Setting Up User Data\n\nAfter starting up the directory server, now that\
    \ you have access, you want to set up the user data with which you should be able\
    \ to log in later. In [Figure 33-2](#Chapter33.html#fig_33_2) you already see\
    \ the entry `users` beneath `system` in the DIT. Add two user entries to this\
    \ entry now. To do so, open *New ![Image](images/U001.jpg) New Entry* from the\
    \ context menu of the entry. You want to set up the entry from scratch. On the\
    \ following page add the object class `inetOrgPerson`. Linked with that, further\
    \ elements are added. Press *Next* to set the relative distinguished name (RDN)\
    \ with `uid=<username>` on the next page (where `username` is your username).\
    \ The next step is setting the common name (`cn`) and the surname (`sn`). (See\
    \ [Figure 33-3](#Chapter33.html#fig_33_3).) There you can use random values.\n\
    \n![Image](images/3303.jpg)\n\n***Figure 33-3.** Completing the attribute for\
    \ the new user entry*\n\nNow, you can set up the new user with *Finish*. What\
    \ is missing is a password which you can add by an extra attribute. For this purpose\
    \ activate *New Attribute…* in the list of attributes of the directory studio\
    \ in the context menu. The type of attribute is `userPassword`. Close the assistant\
    \ directly with *Finish*. As a result, the password editor will automatically\
    \ be displayed. You can define the actual password and choose a hash algorithm\
    \ with it.\n\nNow you can already authenticate the application users. However,\
    \ in this chapter we want to go one step further and activate or deactivate certain\
    \ functions within the NetBeans Platform application in dependency of a certain\
    \ group membership of the user. How such a group membership is displayed in the\
    \ directory depends on the use case (whether a user belongs to one or more groups).\
    \ In this example, add the group membership directly to the user entry. Using\
    \ a multi-value attribute it is possible to assign one user to multiple groups.\
    \ The main process of this action is the same as adding the password. Use `employeeType`\
    \ as attribute type. Finish the wizard and directly define the value in the attribute\
    \ list (for example, `User`). To assign the user to multiple groups just add multiple\
    \ `employeeType` attributes.\n\nGo on the same way to assign a second user whom\
    \ you will assign to the `Admin` group. In the following chapters different application\
    \ configurations for both user groups will be realized.\n\n### Authentication\n\
    \nIn the preceding paragraphs you made the first steps to query the user's login\
    \ data when starting the application and let these data checks be performed by\
    \ a server. What is still missing is the link to the application (client) and\
    \ the directory (server). As mentioned at the beginning of the chapter, you want\
    \ to use the LDAP protocol for this. The Java platform even provides multiple\
    \ ways out-of-the-box for a simple LDAP communication. Obviously, it is best to\
    \ use the Java Naming and Directory Interface (JNDI); however, the Java Authentication\
    \ and Authorization Service (JAAS) can be very helpful, too. You will use JNDI\
    \ in this example, as it provides more flexibility.\n\n#### Java Naming and Directory\
    \ Interface (JNDI)\n\nYou often find JNDI connected with Java EE. JNDI is flexible\
    \ because of factories that can be configured differently. There is also a factory\
    \ for the directory server and for the LDAP protocol, so those can be used flexibly\
    \ as well. The login process, meaning the usage of JNDI, is separated in the `SecurityManager`\
    \ class. In this singleton class you manage the groups of the users which are\
    \ currently logged in. Now you turn your attention to the `login()` method. At\
    \ first, you have to combine the following features in a `Properties` instance:\n\
    \n*   `INITIAL_CONTEXT_FACTORY`: This feature defines the factory which you should\
    \ use. For this application use `com.sun.jndi.ldap.LdapCtxFactory`.\n*   `PROVIDER_URL`:\
    \ Defines the URL for the directory server. You have to define the `ldap` protocol\
    \ before server name, port, and DN, e.g. `ldap://localhost:10389/ou=system`.\n\
    *   `SECURITY_AUTHENTICATION`: Indicates the authentication mechanism of the Simple\
    \ Authentication and the Security Layer (SASL) frameworks. `SIMPLE`, `DIGEST-MD5`,\
    \ `GSSAPI`, `NTLM`, `GSS-SPNEGO`, and `CRAM-MD5` are provided.\n*   `SECURITY_PRINCIPAL`:\
    \ Indicates the username as complete path in the directory. The path is already\
    \ given. You insert the username dynamically out of the login dialog.\n*   `SECURITY_CREDENTIALS`:\
    \ Transfers the password which belongs to the authenticated user.\n\nTransfer\
    \ the `Properties` object which was created with these features to the `InitialDirContext`\
    \ class which tries to establish the connection with the details given. If this\
    \ trial fails because of typing in a wrong password, for example, a `NamingException`\
    \ is thrown. You can also use the subclass `InitialLdapContext` instead of `InitialDirContext`\
    \ dealing with LDAP queries for an advanced control. (See [Listing 33-4](#Chapter33.html#list_33_4).)\n\
    \n***Listing 33-4.** Implementation of Accessing the Directory Server with the\
    \ JNDI*\n\n```\nimport javax.naming.NamingException;\nimport javax.naming.directory.Attribute;\n\
    import javax.naming.directory.Attributes;\nimport javax.naming.directory.DirContext;\n\
    import javax.naming.directory.InitialDirContext;\n…\npublic class SecurityManager\
    \ {\n   private static final SecurityManager inst = new SecurityManager();\n \
    \  private String user;\n   private List<UserGroup> groups = new ArrayList<UserGroup>();\n\
    \n   private SecurityManager() {\n   }\n\npublic static SecurityManager getDefault()\
    \ {\n      return inst;\n   }\n\npublic boolean login(String user, String password)\
    \ {\n      this.user = \"\";\n      this.groups.clear();\n      Properties props\
    \ = new Properties();\n\n      props.put(DirContext.INITIAL_CONTEXT_FACTORY, \"\
    com.sun.jndi.ldap.LdapCtxFactory\");\n      props.put(DirContext.PROVIDER_URL,\
    \ \"ldap://localhost:10389/ou=system\");\n      props.put(DirContext.SECURITY_AUTHENTICATION,\
    \ \"simple\");\n      props.put(DirContext.SECURITY_PRINCIPAL, \"uid=\" + user\
    \ + \", ou=users, ou=system\");\n      props.put(DirContext.SECURITY_CREDENTIALS,\
    \ password);\n\n      try {\nInitialDirContext ctx = new InitialDirContext(props);\n\
    \         this.user = user;\nAttributes attr = ctx.getAttributes(\"uid=\" + user\
    \ + \", ou=users\");\n         Attribute a = attr.get(\"employeeType\");\n\n \
    \        if (a != null) {\n            for (String groupName : Collections.list((Enumeration<String>)\
    \ a.getAll())) {\nUserGroup group = UserGroup.get(groupName);\n              \
    \ if (group != null) {\n                  groups.add(group);\n               }\n\
    \            }\n         }\n         return true;\n      } catch (NamingException\
    \ ex) {\n         return false;\n      }\n   }\n\npublic List<UserGroup> getUserGroups()\
    \ {\n      return this.groups;\n   }\n}\n```\n\nIf the connection is successfully\
    \ established, no exception was thrown. You can query the user's attributes of\
    \ the `InitialDirContext` instance this way. Get the attribute `employeeType`,\
    \ which assigned users to groups. Since it is a multi-value attribute, you can\
    \ get all values of this attribute with the `getAll()` method. Create an object\
    \ for each attribute value. (See *Adapting the Application* later in this chapter.)\
    \ Add all identified groups to a list and provide it with the `getUserGroups()`\
    \ method."
  raw: '#### Setting Up User Data


    After starting up the directory server, now that you have access, you want to
    set up the user data with which you should be able to log in later. In [Figure
    33-2](#Chapter33.html#fig_33_2) you already see the entry *users* beneath *system*
    in the DIT. Add two user entries to this entry now. To do so, open *New ![Image](images/U001.jpg)
    New Entry* from the context menu of the entry. You want to set up the entry from
    scratch. On the following page add the object class *inetOrgPerson.* Linked with
    that, further elements are added. Press *Next* to set the relative distinguished
    name (RDN) with *uid=<username>* on the next page (where *username* is your username).
    The next step is setting the common name (cn) and the surname (sn). (See [Figure
    33-3](#Chapter33.html#fig_33_3).) There you can use random values.


    ![Image](images/3303.jpg)


    ***Figure 33-3.** Completing the attribute for the new user entry*


    Now, you can set up the new user with *Finish*. What is missing is a password
    which you can add by an extra attribute. For this purpose activate *New Attribute…*
    in the list of attributes of the directory studio in the context menu. The type
    of attribute is *userPassword*. Close the assistant directly with *Finish*. As
    a result, the password editor will automatically be displayed. You can define
    the actual password and choose a hash algorithm with it.


    Now you can already authenticate the application users. However, in this chapter
    we want to go one step further and activate or deactivate certain functions within
    the NetBeans Platform application in dependency of a certain group membership
    of the user. How such a group membership is displayed in the directory depends
    on the use case (whether a user belongs to one or more groups). In this example,
    add the group membership directly to the user entry. Using a multi-value attribute
    it is possible to assign one user to multiple groups. The main process of this
    action is the same as adding the password. Use *employeeType* as attribute type.
    Finish the wizard and directly define the value in the attribute list (for example,
    *User*). To assign the user to multiple groups just add multiple *employeeType*
    attributes.


    Go on the same way to assign a second user whom you will assign to the *Admin*
    group. In the following chapters different application configurations for both
    user groups will be realized.


    ### Authentication


    In the preceding paragraphs you made the first steps to query the user''s login
    data when starting the application and let these data checks be performed by a
    server. What is still missing is the link to the application (client) and the
    directory (server). As mentioned at the beginning of the chapter, you want to
    use the LDAP protocol for this. The Java platform even provides multiple ways
    out-of-the-box for a simple LDAP communication. Obviously, it is best to use the
    Java Naming and Directory Interface (JNDI); however, the Java Authentication and
    Authorization Service (JAAS) can be very helpful, too. You will use JNDI in this
    example, as it provides more flexibility.


    #### Java Naming and Directory Interface (JNDI)


    You often find JNDI connected with Java EE. JNDI is flexible because of factories
    that can be configured differently. There is also a factory for the directory
    server and for the LDAP protocol, so those can be used flexibly as well. The login
    process, meaning the usage of JNDI, is separated in the `SecurityManager` class.
    In this singleton class you manage the groups of the users which are currently
    logged in. Now you turn your attention to the `login()` method. At first, you
    have to combine the following features in a `Properties` instance:


    *   INITIAL_CONTEXT_FACTORY: This feature defines the factory which you should
    use. For this application use `com.sun.jndi.ldap.LdapCtxFactory`.

    *   *PROVIDER_URL*: Defines the URL for the directory server. You have to define
    the Idap protocol before server name, port, and DN, e.g. `ldap://localhost:10389/ou=system`.

    *   *SECURITY_AUTHENTICATION*: Indicates the authentication mechanism of the Simple
    Authentication and the Security Layer (SASL) frameworks. SIMPLE, DIGEST-MD5, GSSAPI,
    NTLM, GSS-SPNEGO, and CRAM-MD5 are provided.

    *   *SECURITY_PRINCIPAL*: Indicates the username as complete path in the directory.
    The path is already given. You insert the username dynamically out of the login
    dialog.

    *   *SECURITY_CREDENTIALS*: Transfers the password which belongs to the authenticated
    user.


    Transfer the `Properties` object which was created with these features to the
    `InitialDirContext` class which tries to establish the connection with the details
    given. If this trial fails because of typing in a wrong password, for example,
    a `NamingException` is thrown. You can also use the subclass `InitialLdapContext`
    instead of `InitialDirContext` dealing with LDAP queries for an advanced control.
    (See [Listing 33-4](#Chapter33.html#list_33_4).)


    ***Listing 33-4.** Implementation of Accessing the Directory Server with the JNDI*


    `import javax.naming.NamingException;`

    `import javax.naming.directory.Attribute;`

    `import javax.naming.directory.Attributes;`

    `import javax.naming.directory.DirContext;`

    `import javax.naming.directory.InitialDirContext;`

    `…`

    `public class` **`SecurityManager`** `{`

    `   private static final SecurityManager inst = new SecurityManager();`

    `   private String user;`

    `   private List<UserGroup> groups = new ArrayList<UserGroup>();`


    `   private SecurityManager() {`

    `   }`


    `public static SecurityManager` **`getDefault`**`() {`

    `      return inst;`

    `   }`


    `public boolean` **`login`**`(String user, String password) {`

    `      this.user = "";`

    `      this.groups.clear();`

    `      Properties props = new Properties();`


    `      props.put(DirContext.`**`INITIAL_CONTEXT_FACTORY`**`, "com.sun.jndi.ldap.LdapCtxFactory");`

    `      props.put(DirContext`**`.PROVIDER_URL`**`, "ldap://localhost:10389/ou=system");`

    `      props.put(DirContext`**`.SECURITY_AUTHENTICATION`**`, "simple");`

    `      props.put(DirContext`**`.SECURITY_PRINCIPAL`**`, "uid=" + user + ", ou=users,
    ou=system");`

    `      props.put(DirContext`**`.SECURITY_CREDENTIALS`**`, password);`


    `      try {`

    `InitialDirContext ctx = new` **`InitialDirContext`**`(props);`

    `         this.user = user;`

    `Attributes attr = ctx` **`.getAttributes`**`("uid=" + user + ", ou=users");`

    `         Attribute a = attr.get("employeeType");`


    `         if (a != null) {`

    `            for (String groupName : Collections.list((Enumeration<String>) a.getAll()))
    {`

    `UserGroup group =` **`UserGroup`**`.get(groupName);`

    `               if (group != null) {`

    `                  groups.add(group);`

    `               }`

    `            }`

    `         }`

    `         return true;`

    `      } catch (NamingException ex) {`

    `         return false;`

    `      }`

    `   }`


    `public List<UserGroup>` **`getUserGroups`**`() {`

    `      return this.groups;`

    `   }`

    `}`


    If the connection is successfully established, no exception was thrown. You can
    query the user''s attributes of the `InitialDirContext` instance this way. Get
    the attribute *employeeType*, which assigned users to groups. Since it is a multi-value
    attribute, you can get all values of this attribute with the `getAll()` method.
    Create an object for each attribute value. (See *Adapting the Application* later
    in this chapter.) Add all identified groups to a list and provide it with the
    `getUserGroups()` method.'
  trans: '

    #### 设置用户数据


    启动目录服务器后，既然你已获得访问权限，接下来需要设置用户数据，以便后续能够使用这些数据登录。在图 33-2 中，你已经看到 DIT 中 *system*
    条目下的 *users* 条目。现在，请向该条目添加两个用户条目。为此，请从该条目的上下文菜单中选择 *New ![Image](img/U001.jpg)
    New Entry*。你需要从头开始设置该条目。在接下来的页面中，添加对象类 *inetOrgPerson*。与此关联，会添加更多元素。点击 *Next*，在下一页使用
    `uid=<username>`（其中 *username* 是你的用户名）设置相对可分辨名称 (RDN)。下一步是设置通用名称 (cn) 和姓氏 (sn)。（参见图
    33-3。）你可以在此处使用任意值。


    ![Image](img/3303.jpg)


    ***图 33-3.** 完成新用户条目的属性设置*


    现在，你可以通过 *Finish* 完成新用户的设置。缺少的是一个密码，你可以通过一个额外的属性来添加。为此，请在目录工作室的属性列表的上下文菜单中激活 *New
    Attribute…*。属性类型为 *userPassword*。直接点击 *Finish* 关闭向导。结果，密码编辑器将自动显示。你可以在此定义实际密码并选择哈希算法。


    现在，你已经可以对应用程序用户进行身份验证。然而，在本章中，我们希望更进一步，根据用户所属的特定用户组，在 NetBeans 平台应用程序中激活或停用某些功能。这种组成员关系在目录中的显示方式取决于具体用例（用户属于一个还是多个组）。在此示例中，直接将组成员关系添加到用户条目中。使用多值属性可以将一个用户分配到多个组。此操作的主要过程与添加密码相同。使用
    *employeeType* 作为属性类型。完成向导后，直接在属性列表中定义值（例如，*User*）。要将用户分配到多个组，只需添加多个 *employeeType*
    属性。


    以同样的方式继续，分配第二个用户，你将把他分配到 *Admin* 组。在接下来的章节中，将为这两个用户组实现不同的应用程序配置。


    ### 身份验证


    在前面的段落中，你迈出了第一步，即在启动应用程序时查询用户的登录数据，并让服务器执行这些数据检查。目前还缺少的是应用程序（客户端）和目录（服务器）之间的连接。正如本章开头所述，你希望为此使用
    LDAP 协议。Java 平台甚至提供了多种开箱即用的方式来实现简单的 LDAP 通信。显然，最好使用 Java 命名和目录接口 (JNDI)；不过，Java
    身份验证和授权服务 (JAAS) 也非常有用。在此示例中，你将使用 JNDI，因为它提供了更大的灵活性。


    #### Java 命名和目录接口 (JNDI)


    你经常会在 Java EE 中看到 JNDI。JNDI 之所以灵活，是因为其工厂可以以不同方式进行配置。目录服务器和 LDAP 协议也都有对应的工厂，因此它们也可以灵活使用。登录过程，即
    JNDI 的使用，被分离在 `SecurityManager` 类中。在这个单例类中，你管理当前已登录用户的用户组。现在，请将注意力转向 `login()`
    方法。首先，你需要在 `Properties` 实例中组合以下特性：


    *   INITIAL_CONTEXT_FACTORY：此特性定义了你应该使用的工厂。对于此应用程序，请使用 `com.sun.jndi.ldap.LdapCtxFactory`。

    *   *PROVIDER_URL*：定义目录服务器的 URL。你需要在服务器名称、端口和 DN 之前定义 ldap 协议，例如 `ldap://localhost:10389/ou=system`。

    *   *SECURITY_AUTHENTICATION*：指示简单身份验证和安全层 (SASL) 框架的身份验证机制。提供了 SIMPLE、DIGEST-MD5、GSSAPI、NTLM、GSS-SPNEGO
    和 CRAM-MD5。

    *   *SECURITY_PRINCIPAL*：将用户名指示为目录中的完整路径。该路径已给出。你从登录对话框中动态插入用户名。

    *   *SECURITY_CREDENTIALS*：传输属于已验证用户的密码。


    将使用这些特性创建的 `Properties` 对象传递给 `InitialDirContext` 类，该类会尝试使用给定的详细信息建立连接。如果此尝试因输入错误密码等原因而失败，则会抛出
    `NamingException`。你也可以使用子类 `InitialLdapContext` 代替 `InitialDirContext` 来处理 LDAP
    查询以实现高级控制。（参见清单 33-4。）


    ***清单 33-4.** 使用 JNDI 访问目录服务器的实现*


    `import javax.naming.NamingException;`

    `import javax.naming.directory.Attribute;`

    `import javax.naming.directory.Attributes;`

    `import javax.naming.directory.DirContext;`

    `import javax.naming.directory.InitialDirContext;`

    `…`

    `public class` **`SecurityManager`** `{`

    `   private static final SecurityManager inst = new SecurityManager();`

    `   private String user;`

    `   private List<UserGroup> groups = new ArrayList<UserGroup>();`


    `   private SecurityManager() {`

    `   }`


    `public static SecurityManager` **`getDefault`**`() {`

    `      return inst;`

    `   }`


    `public boolean` **`login`**`(String user, String password) {`

    `      this.user = "";`

    `      this.groups.clear();`

    `      Properties props = new Properties();`


    `      props.put(DirContext.`**`INITIAL_CONTEXT_FACTORY`**`, "com.sun.jndi.ldap.LdapCtxFactory");`

    `      props.put(DirContext`**`.PROVIDER_URL`**`, "ldap://localhost:10389/ou=system");`

    `      props.put(DirContext`**`.SECURITY_AUTHENTICATION`**`, "simple");`

    `      props.put(DirContext`**`.SECURITY_PRINCIPAL`**`, "uid=" + user + ", ou=users,
    ou=system");`

    `      props.put(DirContext`**`.SECURITY_CREDENTIALS`**`, password);`


    `      try {`

    `InitialDirContext ctx = new` **`InitialDirContext`**`(props);`

    `         this.user = user;`

    `Attributes attr = ctx` **`.getAttributes`**`("uid=" + user + ", ou=users");`

    `         Attribute a = attr.get("employeeType");`


    `         if (a != null) {`

    `            for (String groupName : Collections.list((Enumeration<String>) a.getAll()))
    {`

    `UserGroup group =` **`UserGroup`**`.get(groupName);`

    `               if (group != null) {`

    `                  groups.add(group);`

    `               }`

    `            }`

    `         }`

    `         return true;`

    `      } catch (NamingException ex) {`

    `         return false;`

    `      }`

    `   }`


    `public List<UserGroup>` **`getUserGroups`**`() {`

    `      return this.groups;`

    `   }`

    `}`


    如果连接成功建立，则不会抛出异常。你可以通过这种方式查询 `InitialDirContext` 实例的用户属性。获取属性 *employeeType*，该属性将用户分配到组。由于这是一个多值属性，你可以使用
    `getAll()` 方法获取该属性的所有值。为每个属性值创建一个对象。（请参阅本章后面的*适配应用程序*。）将所有识别出的组添加到一个列表中，并通过 `getUserGroups()`
    方法提供该列表。

