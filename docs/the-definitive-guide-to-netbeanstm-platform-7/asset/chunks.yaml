- fmt: '### NetBeans Platform in OSGi Runtime Container


    The preceding sections were about executing OSGi bundles within (or more precisely
    parallel to) the NetBeans Platform; NetBeans Platform modules were still executed
    by the NetBeans Platform system. Now, if you want to develop an application plainly
    based on OSGi, it is possible to treat the whole NetBeans Platform as OSGi bundles.


    To do this, click *OSGi* ![Image](images/U001.jpg) *Build Bundles* in the context
    menu of your NetBeans Platform application. The whole application, meaning all
    necessary NetBeans Platform modules plus your self-created modules, is created
    in the directory `build/osgi` as OSGi-conformant bundles. Furthermore, it is possible
    that your applications will be executed directly out of the NetBeans IDE in the
    OSGi runtime container, Felix. To do so, click on *OSGi* ![Image](images/U001.jpg)
    *Run in Felix* in the context menu; the bundles are automatically created and
    started with Felix.


    ### Summary


    In this chapter you learned some basics about the OSGi framework. You looked at
    the structure of an OSGi bundle and compared the manifest file attributes of NetBeans
    modules with those of OSGi bundles. You also learned how you can create OSGi-compatible
    modules with the NetBeans IDE. The last part of this chapter explained the bundle
    lifecycle and how you integrate existing bundles in a NetBeans Platform application.


    ## C H A P T E R 5


    ## Lookup Concept


    The Lookup concept is as important as it is simple. Used in many places within
    NetBeans Platform applications, it allows modules to communicate with each other.
    This chapter shows typical use cases and how the Lookup concept works.


    ### Functionality


    The *Lookup* is a central component and a commonly used concept in the NetBeans
    Platform for the management of object instances. Simplified, the Lookup is a `Map`,
    with `Class` objects as keys and instances of those `Class` objects as values.


    The main idea behind the Lookup is decoupling components. I let modules communicate
    with each other, which plays an important role in component-based systems, such
    as applications based on the NetBeans Platform. On the one hand, modules can provide
    objects; on the other hand, modules can search and use objects with the Lookup.


    **![Image](images/square.jpg) Note** The Lookup concept is implemented in the
    module Lookup API. It provides a very simple and clear interface. The Lookup API
    module is used quite often within the NetBeans Platform (often indirectly, too);
    it is the cornerstone of the modular concept of the NetBeans Platform. By the
    way, the Lookup API module works completely innocently and has no dependencies
    on other modules at all. That is to say, you can use the Lookup API module in
    any Java application, even if it was not developed on the basis of the NetBeans
    Platform.


    The advantage of the Lookup is its type safety, achieved by using `Class` objects
    instead of strings as keys. With this, the key defines the type of the retrieved
    instance. So it is impossible to request an instance whose type is unknown in
    the module. This pattern results in a more robust application, since errors like
    `ClassCastException` do not occur. The Lookup is also used to retrieve and manage
    multiple instances for one key, which is to say of one type. This central management
    of specific instances is used for different purposes. The Lookup is used to discover
    service providers for which declarative adding and lazy-loading of instances is
    supported. In addition to this, you may pass instances via Lookup from one module
    to another, without the modules knowing each other. In this way a kind of inter-module
    communication is established. Even context-sensitive actions are realized using
    the Lookup component.


    To clear up a common misunderstanding, within a single application it is possible
    to have more than one Lookup. The most commonly used Lookup is global, provided
    by default in the NetBeans Platform. In addition, there are components, such as
    `TopComponent`, that have their own Lookup. These are local Lookups. As described
    in the “Inter-module communication” section, it is possible to create your own
    Lookups and equip your components with a Lookup.


    The Lookup concept is simple, efficient and convenient. Once you are familiar
    with this pattern, you will find it applies to many different areas. In the following
    sections, the usage of the Lookup in its main use cases is shown.


    ### Services and Extension Points


    A main application of the Lookup is the discovery and provision of services. The
    role of the Lookup in this scenario is a function of a dynamic service locator,
    allowing separation of the service interface and the service provider. A module
    makes use of functionality without knowing anything about implementation. In this
    way, loose coupling is achieved between modules.


    Using the Lookup and a service interface, it is simple to define extension points
    for graphic components. A good example is the NetBeans status bar, defining the
    interface `StatusLineElementProvider`. With this interface and a service provider
    registration, the status bar is extended with user-defined components (an example
    of this is described in the “Status Bar” section of [Chapter 5](#Chapter05.html#ch5))
    without the status bar knowing about or having a dependency on those components.


    For a dynamic and flexible provision and exchange of services, these are added
    declaratively to the Lookup, rather than programmed in the source code. This is
    achieved by either of two methods: adding the implementation of a service using
    the Service Provider Configuration file in the `META-INF/services` directory,
    or using the layer file of your module. Both are shown in the “Registering Service
    Providers” section later in this chapter.


    The NetBeans Platform provides a global Lookup, which is retrieved using the static
    method `Lookup.getDefault()`. This global Lookup is used to discover services,
    added by using one of the available declarative registrations. Use this approach
    to register more than one implementation for a single service. The declarative
    registration allows instantiation of implementations on the first request. This
    pattern is known as lazy loading.


    To achieve a better understanding of this pattern for providing and requesting
    services, and to get a more practical perspective, this chapter will illustrate
    the creation of a search list for MP3 files.


    #### Defining the Service Interface


    Module A is a module providing a user interface allowing the user to search for
    MP3 files by special search criteria. The search results are shown in a list.
    To remain independent of the search algorithm and ensure the dynamic use of multiple
    search variants (which may be switched at runtime), you specify the service interface
    `Mp3Finder` in module A. This service defines the search interface for MP3 files.
    The actual search algorithm is implemented in a separate module, module B, provided
    via declarative registration.'
