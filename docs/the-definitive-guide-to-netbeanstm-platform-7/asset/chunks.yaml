    `login()` 方法查询。如果认证完全完成，您可以通过不同的 `Principal` 实例查询用户的特征。


    ### 适配应用程序


    本节将介绍 NetBeans Platform 用于将应用程序适配到特定用户的功能。一方面，涉及如何动态适配包含菜单配置的系统文件系统。另一方面，涉及如何在模块层开启或关闭某些功能。


