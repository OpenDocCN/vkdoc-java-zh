- fmt: "### instance Files\n\nFiles of the type `*.instance*` in the System Filesystem\
    \ describe objects of which instances can be created. The filename typically describes\
    \ the full class name of a Java object (for example, `com-galileo-netbeans-module-MyClass.instance`),\
    \ which makes a default constructor or static method create an instance.\n\n```\n\
    <filesystem>\n   <file name=\"com-galileo-netbeans-module-MyClass.instance\"/>\n\
    </filesystem>\n```\n\nAn instance is created by using the File Systems and Data\
    \ Systems API, as follows:\n\n```\nFileObject o = FileUtil.getConfigFile(name);\n\
    DataObject d = DataObject.find(o);\nInstanceCookie c = d.getLookup.lookup(InstanceCookie.class);\n\
    c.instanceCreate();\n```\n\nIf you want a more convenient name for an instance,\
    \ the full class name can be defined by using the `instanceClass` attribute. This\
    \ enables much shorter names to be used:\n\n```\n<file name=\"MyClass.instance\"\
    >\n   <attr name=\"instanceClass\" stringvalue=\"com.galileo.netbeans.module.MyClass\"\
    />\n</file>\n```\n\nIn classes that do not have a parameterless default constructor,\
    \ create the instance via a static method defined by the `instanceCreate` attribute.\n\
    \n```\n<file name=\"MyClass.instance\">\n   <attr name=\"instanceCreate\" methodvalue=\"\
    com.galileo.netbeans.module.MyClass.getDefault\"/>\n</file>\n```\n\nDoing so,\
    \ the `FileObject` of the entry is passed to the `getDefault()` method, if declared\
    \ so in the factory method signature. With this `FileObject` you can read self-defined\
    \ attributes, for example. Assuming, you want to define the path of an icon or\
    \ any other resource in the layer file as an attribute:\n\n```\n<file name=\"\
    MyClass.instance\">\n   <attr name=\"instanceCreate\" methodvalue=\"com.galileo.netbeans.module.MyClass.getDefault\"\
    />\n   <attr name=\"icon\" urlvalue=\"nbres:/com/galileo/icon.gif\"/>\n</file>\n\
    ```\n\nThe `getDefault()` method with which an instance of the `MyClass` class\
    \ can be created could thus look like the following:\n\n```\npublic static MyClass\
    \ getDefault(FileObject obj) {\n   URL url = (URL) obj.getAttribute(\"icon\");\n\
    \   ...\n   return new MyClass(...);\n}\n```\n\nAs you will recognize, I specified\
    \ the path with a `urlvalue` attribute type. Therefore, a URL instance is directly\
    \ delivered. In addition to the already known attribute types `stringvalue`, `methodvalue`,\
    \ and `urlvalue` there are several others. We will take a closer look at them\
    \ in the section *Layer File*.\n\nOne or more instances of a certain type can\
    \ also be generated by a Lookup rather than via an `InstanceCookie`, as previously\
    \ shown. Contrary to what was shown previously, you can easily produce multiple\
    \ instances of a certain type and create the Lookup for a particular folder of\
    \ the System Filesystem. Using the `lookup()` or the `lookupAll()` method, one\
    \ or more instances (if several have been defined) can be delivered.\n\n```\n\
    Lookup lkp = Lookups.forPath(\"MyFolder\");\nCollection<? extends MyClass> c =\
    \ lkp.lookupAll(MyClass.class);\n```\n\nSuch a `Lookup` is used in [Chapter 10](#Chapter10.html#ch10)\
    \ to extend the content menu of the top component with your own actions defined\
    \ in the layer file. The basic class or the interface can be user defined by the\
    \ `instanceOf` attribute in the layer file. This allows a more efficient working\
    \ of `Lookup` and avoids `Lookup` having to initiate each object in order to determine\
    \ from which base class the class will inherit, or which interface it implements.\
    \ This way, the `Lookup` can directly create only the desired object type instances.\n\
    \nIf the class `MyClass` from the prior entry implements, for example, the `MyInterface`\
    \ interface, we can complete the entry as follows:\n\n```\n<file name=\"com-galileo-netbeans-module-MyAction.instance\"\
    >\n   <attr name=\"instanceOf\" stringvalue=\"com.galileo.netbeans.module.MyInterface\"\
    />\n</file>\n```\n\n### shadow Files\n\n`*.shadow*` files are a kind of link of\
    \ reference to an `*.instance*` file. They are mainly used when singleton instances\
    \ of objects, as with actions, are used. These are defined by an `.instance` file\
    \ in the `Actions` folder. An entry in the `Menu` or `Toolbars` folder then refers\
    \ to the action by using the `.shadow` file. A `.shadow` file refers to files\
    \ in the System Filesystem as well as to files on disk. This way, the Favorites\
    \ module stores its entries. The path to the `.instance` file is specified by\
    \ the attribute `originalFile` (see [Listing 3-5](#Chapter03.html#list_3_5)).\n\
    \n***Listing 3-5**, Connecting a .shadow File with an .instance File*\n\n```\n\
    <folder name=\"Actions\">\n  <folder name=\"Window\">\n    <file name=\"com-galileo-netbeans-module-MyAction.instance\"\
    />\n  </folder>\n</folder>\n<folder name=\"Menu\">\n  <folder name=\"Window\"\
    >\n    <file name=\"MyAction.shadow\">\n      <attr name=\"originalFile\"\n  \
    \          stringvalue=\"Actions/Window/com-galileo-netbeans-module-MyAction.instance\"\
    />\n    </file>\n  </folder>\n</folder>\n```\n\n### Attribute Values\n\nMostly,\
    \ file entries are expanded by attributes in the System Filesystem. The attributes\
    \ can have quite different meanings, though. For example, the name of a registered\
    \ action is defined by the attribute. It is possible to define class names or\
    \ factory methods by attributes elsewhere. The System Filesystem provides a series\
    \ of types with which the attribute values become available; with those attributes,\
    \ the different attribute values can be read out. The most common types and their\
    \ meaning are shown in [Table 3-1](#Chapter03.html#tab_3_1). All types are listed\
    \ in the Filesystem DTD (see Appendix).\n\n![Image](images/t0301.jpg)\n\nA factory\
    \ method which is indicated by the type `methodvalue` has different signatures:\n\
    \n```\nstatic MyClass factoryMethod();\nstatic MyClass factoryMethod(FileObject\
    \ fo);\nstatic MyClass factoryMethod(FileObject fo, String attrName);\nstatic\
    \ MyClass factoryMethod(Map attrs);\nstatic MyClass factoryMethod(Map attrs, String\
    \ attrName);\n```\n\nYou get access on the according entry in the System Filesystem\
    \ by the `FileObject` parameter in a simple way. With this object you can access\
    \ the referring attributes (compare the section *File Types*). You directly get\
    \ the attributes when using a `Map` as parameter of your factory method.\n\n###\
    \ Accessing System Filesystem\n\nOf course it is possible that your own module\
    \ folder, files, and attributes are used from the layer file to provide module\
    \ extension points to others. You get access on the System Filesystem by the following\
    \ call for reading entries:\n\n```\nFileUtil.getConfigRoot();\n```\n\nThis call\
    \ provides the root of the System Filesystem as `FileObject`. From there, you\
    \ can access the whole content. You can also use the following method if you want\
    \ to access a certain path in the System Filesystem:\n\n```\nFileUtil.getConfigFile(String\
    \ path);\n```\n\nIn [Chapter 10](#Chapter10.html#ch10) I will show you an example\
    \ of how to define your own entries in the layer file, read them, and thus provide\
    \ an extension point to other modules."
  raw: '##### instance Files


    Files of the type *.instance* in the System Filesystem describe objects of which
    instances can be created. The filename typically describes the full class name
    of a Java object (for example, `com-galileo-netbeans-module-MyClass.instance`),
    which makes a default constructor or static method create an instance.


    `<filesystem>`

    `   <file name="com-galileo-netbeans-module-MyClass.instance"/>`

    `</filesystem>`


    An instance is created by using the File Systems and Data Systems API, as follows:


    `FileObject o = FileUtil.getConfigFile(name);`

    `DataObject d = DataObject.find(o);`

    `InstanceCookie c = d.getLookup.lookup(InstanceCookie.class);`

    `c.instanceCreate();`


    If you want a more convenient name for an instance, the full class name can be
    defined by using the `instanceClass` attribute. This enables much shorter names
    to be used:


    `<file name="MyClass.instance">`

    `   <attr name="`**`instanceClass`**`" stringvalue="com.galileo.netbeans.module.MyClass"/>`

    `</file>`


    In classes that do not have a parameterless defauld contructor, create the instance
    via a static method defined by the `instanceCreate` attribute.


    `<file name="MyClass.instance">`

    `   <attr name="`**`instanceCreate" methodvalue`**`="com.galileo.netbeans.module.MyClass.`**`getDefault`**`"/>`

    `</file>`


    Doing so, the `FileObject` of the entry is passed to the `getDefault()` method,
    if declared so in the factory method signature. With this `FileObject` you can
    read self-defined attributes, for example. Assuming, you want to define the path
    of an icon or any other resource in the layer file as an attribute:


    `<file name="MyClass.instance">`

    `   <attr name="instanceCreate" methodvalue="com.galileo.netbeans.module.MyClass.getDefault"/>`

    **`<attr name="icon" urlvalue="nbres:/com/galileo/icon.gif"/>`**

    `</file>`


    The `getDefault()` method with which an instance of the `MyClass` class can be
    created could thus look like the following:


    `public static MyClass` **`getDefault`**`(FileObject obj) {`

    `   URL url = (URL) obj.`**`getAttribute`**`("icon");`

    `   ...`

    `   return new MyClass(...);`

    `}`


    As you will recognize, I specified the path with a `urlvalue` attribute type.
    Therefore, a URL instance is directly delivered. In addition to the already known
    attribute types `stringvalue`, `methodvalue`, and `urlvalue` there are several
    others. We will take a closer look at them in the section *Layer File*.


    One or more instances of a certain type can also be generated by a Lookup rather
    than via an `InstanceCookie`, as previously shown. Contrary to what was shown
    previously, you can easily produce multiple instances of a certain type and create
    the Lookup for a particular folder of the System Filesystem. Using the `lookup()`
    or the `lookupAll()` method, one or more instances (if several have been defined)
    can be delivered.


    **`Lookup`** `lkp =` **`Lookups.forPath("MyFolder")`**`;`

    `Collection<? extends MyClass> c = lkp.`**`lookupAll(MyClass.class)`**`;`


    Such a `Lookup` is used in [Chapter 10](#Chapter10.html#ch10) to extend the content
    menu of the top component with your own actions defined in the layer file. The
    basic class or the interface can be user defined by the `instanceOf` attribute
    in the layer file. This allows a more efficient working of `Lookup` and avoids
    `Lookup` having to initiate each object in order to determine from which base
    class the class will inherit, or which interface it implements. This way, the
    `Lookup` can directly create only the desired object type instances.


    If the class `MyClass` from the prior entry implements, for example, the `MyInterface`
    interface, we can complete the entry as follows:


    `<file name="com-galileo-netbeans-module-MyAction.instance">`

    `   <attr name="`**`instanceOf`**`" stringvalue="`**`com.galileo.netbeans.module.MyInterface`**`"/>`

    `</file>`


    ##### shadow Files


    *.shadow* files are a kind of link of reference to an *.instance* file. They are
    mainly used when singleton instances of objects, as with actions, are used. These
    are defined by an .instance file in the `Actions` folder. An entry in the `Menu`
    or `Toolbars` folder then refers to the action by using the .shadow file. A .shadow
    file refers to files in the System Filesystem as well as to files on disk. This
    way, the Favorites module stores its entries. The path to the .instance file is
    specified by the attribute `originalFile` (see [Listing 3-5](#Chapter03.html#list_3_5)).


    ***Listing 3-5**, Connecting a .shadow File with an .instance File*


    `<folder name="Actions">`

    `  <folder name="Window">`

    `    <file name="com-galileo-netbeans-module-MyAction.`**`instance`**`"/>`

    `  </folder>`

    `</folder>`

    `<folder name="Menu">`

    `  <folder name="Window">`

    `    <file name="MyAction.`**`shadow`**`">`

    `      <attr name="originalFile"`

    `            stringvalue="Actions/Window/com-galileo-netbeans-module-MyAction.`**`instance`**`"/>`

    `    </file>`

    `  </folder>`

    `</folder>`


    #### Attribute Values


    Mostly, file entries are expanded by attributes in the System Filesystem. The
    attributes can have quite different meanings, though. For example, the name of
    a registered action is defined by the attribute. It is possible to define class
    names or factory methods by attributes elsewhere. The System Filesystem provides
    a series of types with which the attribute values become available; with those
    attributes, the different attribute values can be read out. The most common types
    and their meaning are shown in [Table 3-1](#Chapter03.html#tab_3_1). All types
    are listed in the Filesystem DTD (see Appendix).


    ![Image](images/t0301.jpg)


    A factory method which is indicated by the type `methodvalue` has different signatures:


    `static MyClass factoryMethod();`

    `static MyClass factoryMethod(FileObject fo);`

    `static MyClass factoryMethod(FileObject fo, String attrName);`

    `static MyClass factoryMethod(Map attrs);`

    `static MyClass factoryMethod(Map attrs, String attrName);`


    You get access on the according entry in the System Filesystem by the `FileObject`
    parameter in a simple way. With this object you can access the referring attributes
    (compare the section *File Types*). You directly get the attributes when using
    a `Map` as parameter of your factory method.


    #### Accessing System Filesystem


    Of course it it possible that your own module folder, files, and attributes are
    used from the layer file to provide module extension points to others. You get
    access on the System Filesystem by the following call for reading entries:


    `FileUtil.`**`getConfigRoot`**`();`


    This call provides the root of the System Filesystem as `FileObject`. From there,
    you can access the whole content. You can also use the following method if you
    want to access a certain path in the System Filesystem:


    `FileUtil.`**`getConfigFile`**`(String path);`


    In [Chapter 10](#Chapter10.html#ch10) I will show you an example of how to define
    your own entries in the layer file, read them, and thus provide an extension point
    to other modules.'
  trans: '

    ##### 实例文件


    系统文件系统中类型为 *.instance* 的文件描述了可创建实例的对象。文件名通常描述了一个 Java 对象的完整类名（例如 `com-galileo-netbeans-module-MyClass.instance`），这使得默认构造函数或静态方法能够创建实例。


    `<filesystem>`

    `   <file name="com-galileo-netbeans-module-MyClass.instance"/>`

    `</filesystem>`


    通过使用文件系统和数据系统 API 创建实例，如下所示：


    `FileObject o = FileUtil.getConfigFile(name);`

    `DataObject d = DataObject.find(o);`

    `InstanceCookie c = d.getLookup.lookup(InstanceCookie.class);`

    `c.instanceCreate();`


    如果你希望为实例使用更便捷的名称，可以通过 `instanceClass` 属性来定义完整的类名。这使得可以使用更短的名称：


    `<file name="MyClass.instance">`

    `   <attr name="`**`instanceClass`**`" stringvalue="com.galileo.netbeans.module.MyClass"/>`

    `</file>`


    对于没有无参默认构造函数的类，可以通过 `instanceCreate` 属性定义的静态方法来创建实例。


    `<file name="MyClass.instance">`

    `   <attr name="`**`instanceCreate" methodvalue`**`="com.galileo.netbeans.module.MyClass.`**`getDefault`**`"/>`

    `</file>`


    这样做时，如果工厂方法签名中声明了，条目的 `FileObject` 会被传递给 `getDefault()` 方法。利用这个 `FileObject`，你可以读取自定义属性，例如。假设你想在层文件中将图标路径或任何其他资源定义为属性：


    `<file name="MyClass.instance">`

    `   <attr name="instanceCreate" methodvalue="com.galileo.netbeans.module.MyClass.getDefault"/>`

    **`<attr name="icon" urlvalue="nbres:/com/galileo/icon.gif"/>`**

    `</file>`


    用于创建 `MyClass` 类实例的 `getDefault()` 方法可能如下所示：


    `public static MyClass` **`getDefault`**`(FileObject obj) {`

    `   URL url = (URL) obj.`**`getAttribute`**`("icon");`

    `   ...`

    `   return new MyClass(...);`

    `}`


    正如你所见，我使用 `urlvalue` 属性类型指定了路径。因此，会直接提供一个 URL 实例。除了已知的属性类型 `stringvalue`、`methodvalue`
    和 `urlvalue` 之外，还有其他几种类型。我们将在 *层文件* 一节中更详细地介绍它们。


    特定类型的一个或多个实例也可以通过 Lookup 生成，而不是像之前展示的那样通过 `InstanceCookie` 生成。与之前展示的不同，你可以轻松地生成特定类型的多个实例，并为系统文件系统的特定文件夹创建
    Lookup。使用 `lookup()` 或 `lookupAll()` 方法，可以提供一个或多个实例（如果定义了多个）。


    **`Lookup`** `lkp =` **`Lookups.forPath("MyFolder")`**`;`

    `Collection<? extends MyClass> c = lkp.`**`lookupAll(MyClass.class)`**`;`


    这种 `Lookup` 在第 10 章中被用于扩展顶层组件的内容菜单，添加在层文件中定义的自定义操作。基本类或接口可以通过层文件中的 `instanceOf`
    属性由用户定义。这使得 `Lookup` 的工作更高效，避免了 `Lookup` 为了确定类继承自哪个基类或实现了哪个接口而必须实例化每个对象。这样，`Lookup`
    可以直接只创建所需类型的对象实例。


    如果前面条目中的 `MyClass` 类实现了，例如，`MyInterface` 接口，我们可以按如下方式完成条目：


    `<file name="com-galileo-netbeans-module-MyAction.instance">`

    `   <attr name="`**`instanceOf`**`" stringvalue="`**`com.galileo.netbeans.module.MyInterface`**`"/>`

    `</file>`


    ##### 影子文件


    *.shadow* 文件是一种指向 *.instance* 文件的引用链接。它们主要用于使用对象的单例实例时，例如操作。这些实例由 `Actions` 文件夹中的
    .instance 文件定义。然后，`Menu` 或 `Toolbars` 文件夹中的条目通过使用 .shadow 文件来引用该操作。.shadow 文件既可以引用系统文件系统中的文件，也可以引用磁盘上的文件。收藏夹模块就是通过这种方式存储其条目的。指向
    .instance 文件的路径由 `originalFile` 属性指定（参见清单 3-5）。


    ***清单 3-5**，连接 .shadow 文件与 .instance 文件*


    `<folder name="Actions">`

    `  <folder name="Window">`

    `    <file name="com-galileo-netbeans-module-MyAction.`**`instance`**`"/>`

    `  </folder>`

    `</folder>`

    `<folder name="Menu">`

    `  <folder name="Window">`

    `    <file name="MyAction.`**`shadow`**`">`

    `      <attr name="originalFile"`

    `            stringvalue="Actions/Window/com-galileo-netbeans-module-MyAction.`**`instance`**`"/>`

    `    </file>`

    `  </folder>`

    `</folder>`


    #### 属性值


    大多数情况下，系统文件系统中的文件条目会通过属性进行扩展。不过，这些属性可能具有完全不同的含义。例如，注册操作的名称由属性定义。在其他地方，可以通过属性定义类名或工厂方法。系统文件系统提供了一系列类型，通过这些类型，属性值变得可用；利用这些属性，可以读取不同的属性值。表
    3-1 展示了最常见的类型及其含义。所有类型都列在文件系统 DTD 中（参见附录）。


    ![图片](img/t0301.jpg)


    由 `methodvalue` 类型指示的工厂方法具有不同的签名：


    `static MyClass factoryMethod();`

    `static MyClass factoryMethod(FileObject fo);`

    `static MyClass factoryMethod(FileObject fo, String attrName);`

    `static MyClass factoryMethod(Map attrs);`

    `static MyClass factoryMethod(Map attrs, String attrName);`


    通过 `FileObject` 参数，你可以以一种简单的方式访问系统文件系统中的相应条目。利用这个对象，你可以访问相关的属性（比较 *文件类型* 一节）。当使用
    `Map` 作为工厂方法的参数时，你可以直接获取这些属性。


    #### 访问系统文件系统


    当然，你自己的模块文件夹、文件和属性也可以从层文件中使用，以便为其他人提供模块扩展点。你可以通过以下调用来访问系统文件系统以读取条目：


    `FileUtil.`**`getConfigRoot`**`();`


    此调用将系统文件系统的根目录作为 `FileObject` 提供。从那里，你可以访问整个内容。如果你想访问系统文件系统中的特定路径，也可以使用以下方法：


    `FileUtil.`**`getConfigFile`**`(String path);`


    在第 10 章中，我将向你展示一个示例，说明如何在层文件中定义自己的条目，读取它们，从而为其他模块提供一个扩展点。

