    #### Converter


    It is possible to convert between types of data with a converter class. For example,
    it is possible to show values as text in the GUI while they are saved as number
    in the database. This conversion occurs in both directions. One converter class
    derives from the class `Converter` and doing so, decides the source and target
    type of data by means of the type parameter. In [Listing 41-11](#Chapter41.html#list_41_11),
    you want to convert between a number and a string.


    ***Listing 41-11.** Converter Class for Changing Different Types of Data*


