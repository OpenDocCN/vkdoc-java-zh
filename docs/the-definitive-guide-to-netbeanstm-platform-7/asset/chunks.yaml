    现在，你应该思考导航器模块如何知道何时显示哪个面板。通常，导航器模块会读取当前活动节点的 MIME 类型。如果不存在节点（如本例所示），Navigator
    API 提供了 `NavigatorLookupHint` 接口。该接口指定了 `getContentType()` 方法，上下文组件（本例中为 `Mp3SearchList`
    类）通过该方法提供 MIME 类型，导航器面板将据此显示。你在 `Mp3SearchList` 类中实现此接口，并返回 MIME 类型 `audio/mpeg`，与你之前在图层文件中注册面板时完全一致；参见清单
    18-3。


    ***清单 18-3.** 实现 NavigatorLookupHint 接口，该接口决定要显示的面板*


    `import org.netbeans.spi.navigator.NavigatorLookupHint;`

    `...`

    `public final class` **`Mp3SearchList`** `extends TopComponent implements ListSelectionListener
    {`


    `   public Mp3SearchList() {`

    `      ...`

    `      associateLookup(new ProxyLookup(new AbstractLookup(content),`

    `Lookups.singleton(new` **`Mp3AlbumNavigatorLookupHint`**`())));`

    `   }`


    `private static final class Mp3AlbumNavigatorLookupHint implements` **`NavigatorLookupHint`**
    `{`

    `public String` **`getContentType`**`() {`

    `         return "`**`audio/mpeg`**`";`

    `      }`

    `   }`

    `}`


    你创建了内部类 `Mp3AlbumNavigatorLookupHint`，它实现了 `NavigatorLookupHint` 接口。现在必须将此类的实例添加到你的本地
    Lookup 中。由于你已经确定了一个 `AbstractLookup` 作为本地 Lookup，它包含了搜索列表中当前选中的条目，因此你不能直接添加此实例。所以，你必须创建一个
    `ProxyLookup`，你可以将 `AbstractLookup` 和一个 Lookup（通过工厂 `Lookups` 创建）传递给它。然后，通过 `associateLookup()`
    方法将此代理 Lookup 定义为本地 Lookup。一旦顶层组件 `Mp3SearchList` 获得焦点，全局 Lookup 就会通知导航器模块存在一个
    `NavigatorLookupHint` 实例。结果，导航器可以调用 `getContentType()` 方法，并根据返回值打开相应的导航器面板。


    当然，当存在多个不同的面板时，导航器组件就变得有趣了。你可以创建任意数量的导航器面板，并在 `Navigator/Panels` 文件夹中分配相应的 MIME
    类型。然后，导航器模块会根据当前哪个组件处于活动状态，自动切换面板。最后，Navigator API 还提供了 `NavigatorHandler` 类。该类包含静态方法
    `activatePanel()`，你可以向其传递一个 `NavigatorPanel` 实例。这样，你也可以通过编程方式打开面板。


    ### 总结


    导航器模块是一个用于显示上下文相关数据结构的通用组件。本章讨论了如何创建可由导航器模块显示的面板。你还学习了导航器模块定位面板的两种方法。


    ## 第 19 章


    ## 属性


    通过**属性**窗口，你可以以简单的方式显示节点的属性。这意味着你可以显示由该节点表示的数据或操作的属性（更多信息请参见第 12 章）。因此，你为用户提供了修改它的可能性。一组属性由
    Nodes API 的 `Sheet` 类管理。`AbstractNode` 类（通常是节点的基类）通过 `getSheet()` 方法提供这样一个 `Sheet`。要提供这样一个
    `Sheet`，你只需重写 `createSheet()` 方法。然后，你可以将你的特定属性添加到此 `Sheet` 中。我将提供一个示例来演示其工作原理。你想要显示刚刚选中或激活的
    MP3 文件的 ID3 信息。不过，为简单起见，你并不读取 ID3 信息，而是仅使用固定的示例值；一个条件是，你至少拥有自己的节点类，该类派生自 `AbstractNode`。在第
    7 章中创建 MP3 文件类型时，你看到默认使用的是 `DataNode` 类。那么，让我们再次查看 MP3 文件类型示例（你也可以直接使用 NetBeans
    向导创建一个 MP3 文件类型）并实现你自己的节点类。属性窗口中显示的属性将类似于图 19-1 所示。


