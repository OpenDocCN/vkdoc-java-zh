    #### 关系上的对象映射


    现在 Hibernate 已经准备就绪，问题在于 Hibernate 如何将你的对象保存到数据库中。引用对象结构是如何映射到关系上的？你需要为每个对象创建一个所谓的*映射文件*，该文件精确地保存了这种映射信息。这其中包括对象属性在关系中以何种名称和类型保存的信息，但更重要的是，如何处理不同对象之间的关联。根据对象结构的复杂性和应用程序的目的，可能需要大量详细信息。在此背景下无法深入细节，因此将应用限制在示例类所需的映射信息上。


    首先，让我们为示例类 `Genre` 查看这样一个映射。你记得，在其中你管理了一个作为唯一 ID 的数字和一个用于流派名称本身的字符串。（参见清单 27-3。）


    ***清单 27-3.** 类 Genre 的对象关系映射：Genre.hbm.xml*


    `<!DOCTYPE hibernate-mapping PUBLIC`

    `   "-//Hibernate/Hibernate Mapping DTD 3.0//EN"`

    `   "http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd">`

    `<`**`hibernate-mapping`** `package="`**`com.galileo.netbeans.myentities`**`">`

    `   <`**`class`** `name="`**`Genre`**`" table="`**`Genre`**`" lazy="true">`

    `      <`**`id`** `name="`**`id`**`">`

    `         <`**`generator`** `class="increment"/>`

    `      </`**`id`**`>`

    `      <`**`property`** `name="`**`genre`**`"`

    `                not-null="true"`

    `                length="30"`

    `                column="genre"/>`

    `   </class>`

    `</`**`hibernate-mapping`**`>`


    通过 `class` 元素，你定义了类名以及保存 `Genre` 类型对象文件的表名。使用 `id` 元素，你将同名的对象属性定义为表的主键，该主键将按升序分配。最后，你只需要使用
    `property` 元素定义第二个也是最后一个属性 `genre`。如果你查看类 `Album` 的映射片段，事情会变得更有趣一些，因为一个流派可以分配给一个专辑；然而，同一流派可以有多个专辑。因此，你有一个
    `many-to-one`（多对一）关系。你使用同名的元素来定义它，并将其 `lazy` 属性设置为 `false`，如清单 27-4 所示。这样，`Genre`
    对象会与 `Album` 一起加载，而不是仅在需要时才加载。通过设置 `fetch="join"`，你指示 Hibernate 在查询专辑数据时通过 JOIN
    查询同时获取流派。这是一种查询优化：只需一次查询而不是两次，即可将类完全从数据库中加载出来。


    ***清单 27-4.** 使用多对一在 Genre 上定义关联*


    `<!DOCTYPE hibernate-mapping PUBLIC`

    `   "-//Hibernate/Hibernate Mapping DTD 3.0//EN"`

    `   "http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd">`

    `<`**`hibernate-mapping`** `package="`**`com.galileo.netbeans.myentities`**`">`

    `   <`**`class`** `name="`**`Album`**`" table="`**`Album`**`" lazy="true">`

    `      <`**`id`** `name="id">`

    `         <`**`generator`** `class="increment"/>`

    `      </`**`id`**`>`

    `      <`**`many-to-one`** `name="`**`genre`**`" lazy="`**`false`**`" fetch="`**`join`**`"/>`

    `      <`**`property`** `name="title"`

    `                not-null="true"`

    `                length="30"`

    `                column="title"/>`


    现在，你需要让 Hibernate 知道这些通常以 *hbm.xml* 结尾且与类位于同一包中的映射。这可以通过在配置文件 *hibernate.cfg.xml*
    中添加一个条目来完成，你之前已经在该文件中进行了数据库设置。你通过 `mapping` 元素列出所有文件。此外，你定义了值为 `update` 的特性 `hbm2ddl`。因此，如果数据库模式尚不存在，Hibernate
    会在应用程序启动时根据映射文件中的信息自动为我们创建它，如清单 27-5 所示。


    ***清单 27-5.** 在配置文件中公开映射文件*


    `<hibernate-configuration>`

    `   <session-factory>`

    `      ...`

    `      <property name="`**`hbm2ddl.auto`**`">`**`update`**`</property>`

    `      <`**`mapping`** `resource="com/galileo/netbeans/myentities/`**`Genre.hbm.xml`**`"/>`

    `      <`**`mapping`** `resource="com/galileo/netbeans/myentities/`**`Album.hbm.xml`**`"/>`

    `   </session-factory>`

    `</hibernate-configuration>`


    #### SessionFactory 和会话


    现在配置工作已完成，你可以首次接触 Hibernate 了。为此，首先创建一个 `Configuration` 类的对象，该类管理你之前在 *hibernate.cfg.xml*
    文件中创建的配置。默认情况下，此类希望从 *hibernate.properties* 文件中获取其信息。但是，你将信息组织在 XML 文档中，因此你需要指示
    `Configuration` 实例使用 `configure()` 方法搜索此文件。此方法也有几个参数化的变体，你可以向其传递一个 `File` 或 `URL`
    形式的配置文件。我们使用无参数版本，它直接在类路径上查找名为 *hibernate.cfg.xml* 的配置。通常，这样的 `Configuration`
    只创建一次。基于此配置，我们使用 `buildSessionFactory()` 方法创建一个 `SessionFactory`。`SessionFactory`
    也会在应用程序的整个运行期间保持。


    换句话说，你在模块的中心位置管理 `Configuration` 和 `SessionFactory` 实例。模块安装程序类很适合这个目的；你可以在其中创建一个
    `SessionFactory` 的静态实例（参见清单 27-6）。


    ***清单 27-6.** 集中管理并提供 SessionFactory*


    `import org.hibernate.`**`Session`**`;`

    `import org.hibernate.`**`SessionFactory`**`;`

    `import org.hibernate.cfg.`**`Configuration`**`;`

    `import org.openide.modules.ModuleInstall;`


    `public class` **`Installer`** `extends ModuleInstall {`

    `private static final` **`SessionFactory`** `sessionFactory;`

    `   static {`

    `      try {`

    `sessionFactory = new` **`Configuration`**`().`**`configure`**`().`**`buildSessionFactory`**`();`

    `      } catch (Throwable ex) {`

    `         throw new ExceptionInInitializerError(ex);`

    `      }`

    `   }`

    `public static Session` **`createSession`**`() {`

    `      return sessionFactory.`**`openSession`**`();`

    `   }`

    `public static Session` **`currentSession`**`() {`

    `      return sessionFactory.`**`getCurrentSession`**`();`

    `   }`

    `   @Override`

    `public void` **`close`**`() {`

    `      sessionFactory.`**`close`**`();`

    `   }`

    `}`


    通过会话访问数据库。`Session` 是一个生命周期相对较短的对象，负责应用程序和数据库之间的交互。因此，`Session` 背后隐藏着一个 JDBC 连接。会话还负责创建事务并包含一个缓存。你使用
    `openSession()` 方法创建每个新的 `Session`。使用 `getCurrentSession()` 方法可以获取一个更当前的会话。如果没有，则会创建一个新的会话并将其绑定到当前线程。如果由该
    `Session` 创建的事务完成（通过 `commit()` 或 `rollback()`），它会自动关闭。这种使用会话的方式最简单、最方便，因此是首选。

