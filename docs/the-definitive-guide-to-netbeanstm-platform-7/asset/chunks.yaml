    **`  Session`** `s = Installer.`**`currentSession`**`();`

    `      Transaction t = s.`**`beginTransaction`**`();`

    `      s.`**`update`**`(album);`

    `      t.`**`commit`**`();`

    `   }`

    `public static void` **`insertAlbum`**`(Album album) {`

    **`  Session`** `s = Installer.`**`currentSession`**`();`

    `      Transaction t = s.`**`beginTransaction`**`();`

    `      s.`**`save`**`(album);`

    `      t.`**`commit`**`();`

    `   }`

