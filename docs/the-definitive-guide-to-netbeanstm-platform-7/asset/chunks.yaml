    ### Playlist


    The objective of this section is to create a playlist. The user should be able
    to manage multiple playlists in parallel. And of course you want the user to be
    able to add MP3 files from the Media Library to the playlist by using drag-and-drop.
    All this functionality is provided in a separate module. So, you create a new
    module via *File ![Image](images/U001.jpg) New Project... ![Image](images/U001.jpg)
    NetBeans Modules ![Image](images/U001.jpg) Module*, name it *`Playlist`*, and
    set the code name base to `com.hboeck.mp3manager.playlist`. Add a dependency to
    the *`File Type`* and *`Services`* module.


    For the playlist, another `top component` is used, containing a `TreeTableView`
    taken from the Explorer API. Using such a view eases the management of MP3 files
    with the help of the `Mp3DataNode` class.


    #### Node View


    Let us start with the view for the nodes. You use a `TreeTableView` and create
    the subclass `PlaylistView`. This class is used to hide the configuration and
    to have a handier class. The only thing you need to configure is the default action
    processor because, by default, a double-click in this view executes the default
    action of a node (that is, an `Mp3DataNode)`, which is the `PlayAction` you created
    in the “Playback of MP3 files” section. But this action plays only a single file,
    while the desired behavior of a playlist is to play the complete list automatically.
    Therefore, you implement the `setDefaultActionProcessor()` method (see [Listing
    44-17](#Chapter44.html#list_44_17)), which takes an instance of an `ActionListener`.
    The `actionPerformed()` method of this listener is executed (instead of the node''s
    default action) when the node is double-clicked or the *Enter* key is pressed.


    ***Listing 44-17.** This View Is Used to Represent MP3 Files in a List View.*


