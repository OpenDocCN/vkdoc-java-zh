    #### 图像


    应用程序中使用的图片和图标不是通过安装器加载的，而是通过 NetBeans 平台中的一个中心类 `ImageUtilities` 加载的。该类提供了 `loadImage()`
    和 `loadImageIcon()` 方法，应（最好）使用这些方法。它们背后是一个图标管理器，负责管理已加载的图像和图标，并防止重复加载资源。使用它可以从所有可用的模块中加载图标。也可以加载本地化资源，如下例所示。如果第二个参数设置为
    `true`，并且存在一个名为 *icon_de_DE.png* 的图标，那么它将被加载（如果应用程序的区域设置是 `de_DE`）：


    `Image img = ImageUtilities.`**`loadImage`**`("resources/icon.png",` **`true`**`);`

