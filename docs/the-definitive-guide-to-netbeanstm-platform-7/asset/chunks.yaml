    #### Java 认证与授权 (JAAS)


    Java 认证与授权 (JAAS) API 是 JNDI 的一种替代方案。正如其名，它侧重于认证而非查询目录中的属性。因此，创建清单 33-4 中的示例并不那么容易。不过，本节将向您展示如何在
    NetBeans Platform 应用程序中使用和集成 JAAS API 及其配置。


    与 JNDI 概念类似，您首先需要一个配置文件。JAAS 在特定的文件结构中提供了这样的配置。该文件通常通过命令行参数定义。在 NetBeans Platform
    应用程序中，将此文件打包到模块中是合理的。使用 `LoginContext` 构造函数的变体，可以向其传递一个 `ConfigFile` 实例；配置文件被传递给该实例。您可以通过
    `getResource()` 方法获取该 `URI` 或 `URL`。


    JAAS API 为不同的认证机制提供了不同的登录模块，就像它为 LDAP 协议（您可以通过该协议与目录服务器通信）所做的那样。在清单 33-5 所示的配置文件中，指定了在哪个配置中使用哪个登录模块。


