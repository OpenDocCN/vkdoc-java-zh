- fmt: '#### Ending a Wizard Prematurely


    Depending on the use case, it may be useful to allow the user to end the wizard
    prematurely. Normally the *Finish* button is only activated in the last panel.
    To allow the user to end the wizard in an earlier panel, implement the interface
    `WizardDescriptor.FinishablePanel` on the corresponding panel. This specifies
    the method `isFinishPanel()` with which you can return the value `true`, if the
    wizard can be finished. In the example, it is conceivable to implement this interface
    in the first panel, allowing the user to end the wizard already after entering
    the data without adding tracks to the playlist.


    #### Additional Validation of Data


    A panel announces the validity of its data to the wizard descriptor via the `isValid()`
    method. The method is called on opening a panel and on notification via the `ChangeListener`.
    Should additional verifications be done when the user clicks *Next* or ends the
    wizard, implement the `WizardDescriptor.ValidatingPanel` interface. This interface
    specifies the `validate()` method, in which detailed verifications can be performed.
    Errors identified in this way are announced with a `WizardValidationException`.
    The constructor of this exception class receives a `JComponent`, which obtains
    the focus, in order to show the user the wrong place. In addition, a failure message
    can be added, which is then shown in the wizard.


    Rather than using the `validate()` method of the `WizardDescriptor.ValidatingPanel`
    interface, which is executed asynchronously in the event dispatch thread (EDT)
    (where no long-running tasks should be performed, or else the complete user interface
    is blocked), use the `WizardDescriptor.AsynchronousValidatingPanel` interface
    to asynchronously handle verification. Using this interface, the `validate()`
    method is automatically executed in a separate thread. As a result, the user interface
    is available to the user, enabling use of the *Cancel* button to end the process.
    Since the asynchronous method is not carried out in the EDT, you should not access
    GUI components to read data from them. To that end, the interface specifies the
    `prepareValidation()` method, which is called in the EDT, allowing access to data
    in the GUI components while disallowing further change. Accomplish your checks
    on these data using the `validate()` method.


    #### Iterators


    Within a wizard descriptor the panels are managed by an iterator. This iterator
    is responsible for the order of the panels. The interface of an iterator of this
    kind is described by the `WizardDescriptor.Iterator` class. A standard implementation
    of this interface provides the `WizardDescriptor.ArrayIterator` class, providing
    panels in a sequential order. This class is also used when passing panels as an
    array to the `WizardDescriptor` class. However, when giving the user the choice
    to skip one or more panels, based on the chosen or entered data, assign your own
    iterator implementation to the `WizardDescriptor`, which handles the dynamic order
    of the panels. The skeleton of such an interator can also be created via a wizard
    in the NetBeans IDE. Returning to the first step of the *Wizard* wizard, you set
    the *Wizard Step Sequence* to *Static*. However, if you set *Dynamic* at this
    point, the IDE will create an iterator class.


    Based on the `WizardDescriptor.Iterator` interface there are a few extensions.
    Use the `WizardDescriptor.InstantiatingIterator` interface and its `instantiate()`
    method to create a `Set` of objects. An extension is the `WizardDescriptor.AsynchronousInstantiatingIterator`,
    with its `instantiate()` method, which is performed asynchronously outside the
    EDT, when the user clicks the *Finish* button. Finally, use the `WizardDescriptor.ProgressInstantiatingIterator`
    interface to show the user a progress bar when the wizard ends, while the `instantiate()`
    method is processing. In this case, the `instantiate()` method is called in a
    separate thread, receiving a `ProgressHandle`. The status is shown via this class,
    as is done with the standard progress bar (see [Chapter 11](#Chapter11.html#ch11)).


    ### Summary


    The NetBeans Platform provides a professional API for creating dialogs and wizards.
    In this chapter you learned both how to quickly create simple standard dialogs
    and how to create complex dialogs that are adapted to your special needs. Additionally,
    you learned how to implement clearly structured wizards by the Dialogs API, in
    order to guide the user through a complex world of facts.


    ## C H A P T E R  14


    ## Visual Library


    The NetBeans *Visual Library API* is a generic library for visualizing very different
    structures. It is particularly well suited to graph-oriented representations.
    The Visual Library API is part of the standard NetBeans Platform and is used by
    the NetBeans IDE itself in numerous modules and areas, such as the visual modeling
    of midlets in a Java Micro Edition (JME) application, as shown in [Figure 14-1](#Chapter14.html#fig_14_1).
    To use the Visual Library API, you just need to define a dependency on the module
    (under *Libraries* within your module''s *Properties*), as previously noted with
    respect to other modules.


    ### Structure of the Visual Library API


    The components of the Visual Library API, like Swing, are structured and managed
    as a tree. The superclass of all graphic components is the `Widget` class. If
    you consider [Figure 14-1](#Chapter14.html#fig_14_1), then the three components
    (*Mobile Device*, *form*, and *loginScreen*), as well as the edges connected to
    the components, are all widgets. A widget can also be a container for more widgets.
    Each widget has a position that is determined relative to its parent widget. The
    `Widget` superclass is responsible for presenting the border and background of
    a widget in addition to managing properties such as color and transparency. Like
    a Swing container, a widget has a certain layout responsible for positioning its
    child widgets. Widgets can also depend upon each other in order to be notified
    about changes. A widget enables a series of actions (which are executed when specific
    user events occur) to be linked.


    ![Image](images/1401.jpg)


    ***Figure 14-1.** Visual model of a graph-oriented structure using the Visual
    Library API*


    ### The Widget Classes


    All graphic components of the Visual Library API are subclasses of the `Widget`
    class, which manages and provides basic features and functionalities such as layout,
    background, and font. So, a `Widget` is a graphic primitive, equivalent to the
    `JComponent` class in Swing. From `Widget`, numerous classes are derived, which
    provide a `Widget` implementation for the respective purpose. This inheritance
    hierarchy is represented in [Figure 14-2](#Chapter14.html#fig_14_2), and the meanings
    of these various widget classes are listed in [Table 14-1.](#Chapter14.html#tab_14_1)
    The most important of these classes are dealt with in more detail in the following
    sections. For a more exhaustive description of these classes, see the Visual Library
    API documentation, found within the JavaDoc page of the Visual Library.


    ![Image](images/1402.jpg)


    ***Figure 14-2.** Widget inheritance hierarchy of the Visual Library API*


    [Table 14-1](#Chapter14.html#tab_14_1) provides an overview of the features and
    functionalities of various widget implementations.


