    ### 总结


    属性窗口是一种简单且常见的方式，用于显示和修改任意对象的属性。在本章中，您学习了如何提供要在属性窗口中显示的属性。您还学习了如何实现用户特定的属性编辑器。


    ## 第 20 章


    ## 选项与设置


    借助*选项对话框 API 和 SPI*，您可以轻松创建选项面板，用户可以通过这些面板方便地管理应用程序的设置和选项。该模块提供了选项对话框的基本结构，您可以将自己的面板集成到其中，如图
    20-1 所示。面板有两种或三种可能的变体。有主面板和次面板。次面板是主面板的子类别，以选项卡形式呈现。主面板有两种类型：一种是自己管理选项的主面板，另一种是仅作为容器并包含次面板的主面板。设置通常使用
    Preferences API 进行保存和加载。NetBeans 平台提供了一个特定的实现，将在“管理设置”部分进行更详细的说明。


    ![Image](img/2001.jpg)


    ***图 20-1.** 标准选项对话框，您可以在其中集成自己的面板*

