    **SHARING A BASE PANEL BETWEEN MULTIPLE WIZARD STEPS**


    If the wizard consists of multiple panels, it is advisable to create a base class
    which handles the listener logic and provides helper methods such as the `setMessage()`
    method. This base class implements the `WizardDescriptor.Panel<Data>` interface,
    so specific panels only need to derive from the base class. This approach is also
    considered in [Figure 13-7](#Chapter13.html#fig_13_7).


    #### Creating a Wizard from Panels


    So far, you''ve learned about constructing a panel that represents a step in a
    wizard. You saw how the tasks of view and controller are distributed and, above
    all, clearly separated. Only one small step remains before the entire wizard is
    completed. A wizard is represented by the `WizardDescriptor` class, which manages
    the individual panels. One option now is to instantiate your own panels and pass
    them to a `WizardDescriptor`. The action class—which is created automatically
    when using the IDE to create the panels—works that way. In the interest of encapsulation,
    a clearer structuring, and reusability, it is a good idea to create an individual
    wizard descriptor, extending the `WizardDescriptor` class. Thus this class can
    even take care of the creation of panels and their properties. Action classes,
    when starting a wizard, only need to create an instance of the wizard descriptor.
    This one can be directly passed to the `DialogDisplayer`. In this way, your wizard
    can be called fully transparent.


    Therefore, for this example, create the `PlaylistWizardDescriptor` class, extending
    the `WizardDescriptor` class (see [Listing 13-3](#Chapter13.html#list_13_3)).
    Use the `setPanelsAndSettings()` method to pass in both panels, which are declared
    as private fields. The panels must be passed with an iterator instance; such an
    iterator class is responsible for the order of the panels. Use the default `ArrayIterator`.
    The second parameter for `setPanelsAndSettings()` is a data model, which is passed
    to the panels via the `readSettings()` and `storeSettings()` methods. In this
    data model the data collected by the wizard are stored. Pass this As a reference
    to the `PlaylistWizardDescriptor`, which you want to use as data model. Finally,
    carry out a few configuration tasks.


