    `}`


    ### 小结


    Java Persistence API (JPA) 是用于对象关系桥接（如 Hibernate）的统一接口。JPA 实现了持久化系统之间的透明使用和轻松兼容。在本章中，你使用了
    Hibernate 的 JPA 兼容接口。


    ## 第 29 章


    ## MySQL 与 EclipseLink


    在第 26 章中，你创建了一个应用程序，将音乐专辑保存到 Java DB 数据库中。第一步，你将待保存的对象拆分为 SQL 语句，并再次从 SQL 结果中组装它们。像
