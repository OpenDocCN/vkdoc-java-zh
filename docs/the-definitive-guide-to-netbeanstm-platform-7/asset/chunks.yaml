    和 `writeExternal()` 方法。在此存储和检索必要的数据。这样做时，建议首先在超类上调用要覆盖的方法。为了让模块系统在启动时知道某个模块是否提供了模块安装程序以及在哪里找到它，请在清单文件中注册它：


