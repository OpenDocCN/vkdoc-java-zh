    #### ZIP 分发


    将应用程序打包为 ZIP 分发文件是一种非常常见的交付形式。与安装程序包一样，执行应用程序所需的所有部分都会被打包。这包括 NetBeans 平台的模块、您自己的应用程序模块、用于启动应用程序的启动器以及一些配置文件。（参见图
    35-6。）您可以通过在应用程序项目的上下文菜单中选择 *打包为…* ![Image](img/U001.jpg) *ZIP 分发* 来开始创建这个完整的包。完成后的分发文件保存在相应项目文件夹的
    *dist* 目录中。


    ![Image](img/3506.jpg)


    ***图 35-6.** ZIP 分发的组成部分*


    *   特定于平台的启动器位于 *bin* 目录中。其中还包括一个 *.exe* 文件。

    *   *etc* 目录包含启动器使用的配置文件。这包括 <*品牌标识 id>.conf* 文件，您可以在其中定义命令行参数或 JDK 的路径（参见“创建分发”部分）。

    *   *my_application* 和 *platform* 目录是集群。在 *my_application* 集群中，存放着您的应用程序模块以及您的配置文件和经过适配的平台模块。因此，NetBeans
    平台的所有模块，包括 NetBeans 运行时容器的模块（参见第 2 章），都位于 *platform* 集群中。


    #### Java Web Start 包


    使用 Java Web Start，您的应用程序可以直接从互联网启动并执行。为此，请从平台应用程序的上下文菜单中调用菜单项 *JNLP* ![Image](img/U001.jpg)
    *构建*。此调用的结果是在 *dist* 分发目录中获得一个 *.war* 文件。然后可以将此文件直接复制到 servlet 容器的部署目录中。*WEB-INF/web.xml*
    文件是部署描述符，它定义了位于 *WEB-INF/lib* 目录中的 JNLP servlet。


    #### Mac OS X 应用程序


    第四种也是最后一种分发方式，即创建 Mac OS X 应用程序，也是可用的。为此，请调用相应平台应用程序的上下文菜单 *打包为… ![Image](img/U001.jpg)
    Mac OS X 应用程序*。请注意，您无法在 Windows 平台上执行此操作，因为其中会访问 *ln* 命令，但 Windows 并未提供该命令。


    ### 总结


    ## 第 36 章


    ## 更新 NetBeans 平台应用程序


    在软件生命周期中，几乎总是会发生这样的情况：由于修复错误、增加新功能或实现新需求，您希望为应用程序提供更新。如果您只需要提供一个补丁或一个新功能，却需要重新分发整个应用程序，那将非常麻烦。这正是模块化架构的优势之一：您可以在模块层提供更新。对于用户而言，安装更新必须尽可能简单直观。为此，NetBeans
    平台结合插件管理器提供了一个自动更新服务。该模块能够在一组预定义的更新中心中自动搜索已更新或新的模块，并在运行时动态加载它们。此外，用户还可以通过插件管理器手动安装下载的更新或新模块。


    ### 自动更新服务


    更新以 NBM 文件的形式提供。这些更新包必须通过更新中心提供。在 NetBeans 平台应用程序中，可以定义更新中心，自动更新服务会在其中搜索更新。更新中心的定义可以手动进行，也可以随应用程序模块一起提供。用户可以配置应用程序，使其在特定时间自动搜索更新。当然，也可以手动启动更新。图
    36-1 展示了自动更新服务的组件。


    ![Image](img/3601.jpg)


    ***图 36-1.** 构成自动更新功能的组件及其依赖关系*


    ### NBM 文件


    您希望作为更新提供的模块以 NBM 文件的形式分发。这些文件由一个 JAR 归档文件组成，其中包含实际的模块及其配置数据以及插件管理器所需的更新信息（参见图
    36-2）。一个 NBM 文件还可能包含该模块所需的库。模块 JAR 文件及其相关配置文件的内容已在第 3 章中描述过。


    我尚未讨论的一个文件是 `info.xml` 文件。该文件包含在插件管理器中选择现有模块或要安装的模块时向用户显示的信息（参见清单 36-1）。`manifest`
    元素包含来自模块清单文件的信息。例如，定义的依赖关系非常重要。如果用户在插件管理器中选择了一个依赖于另一个模块的模块，则后者会被自动激活，以便与所选模块同时下载。不过，如果依赖关系无法满足，用户仍然可以安装该模块，但无法激活它。最后，您还可以通过
    `license` 元素添加许可证信息，该信息会在模块安装开始前显示给用户。这会强制用户确认已满足许可要求，以便安装该模块。


    ![Image](img/3602.jpg)


    ***图 36-2.** NBM 文件的组成部分*


    ***清单 36-1.** NBM 文件的信息文件*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<!DOCTYPE module PUBLIC    "-//NetBeans//DTD Autoupdate Module Info 2.5//EN"`

    `   "http://www.netbeans.org/dtds/autoupdate-info-2_5.dtd">`

    `<module` **`codenamebase`**`="com.galileo.netbeans.module"`

    **`distribution`**`="./com-galileo-netbeans-module.nbm"`

    **`downloadsize`**`="7123"`

    **`homepage`**`="http://heikoboeck.de"`

    **`license`**`="AD9FBBC9"`

    **`moduleauthor`**`="Heiko Boeck"`

    **`needsrestart`**`="false"`

    **`releasedate`**`="2007/10/16">`

    `   <`**`manifest`** `AutoUpdate-Show-In-Client="true"`

    `             OpenIDE-Module="com.galileo.netbeans.module"`

    `             OpenIDE-Module-Name="My Module"`

    `             OpenIDE-Module-Implementation-Version="071016"`

    `             ...              OpenIDE-Module-Specification-Version="1.0"/>`

    `   <`**`license`** `name="AD9FBBC9">Place your license information here</`**`license`**`>`

    `</module>`


    NBM 文件由 NetBeans IDE 自动创建，只需在所需模块的上下文菜单中选择 *创建 NBM* 即可。当您选择 *创建 NBM* 时，IDE 会尝试对
    NBM 文件进行签名。为此，必须准备并生成一个所谓的密钥库（参见图 36-3）。使用 NetBeans IDE 的 *密钥库管理器*，该管理器仅在安装 *Mobility*
    插件后才可用。此 mobility 插件是完整 NetBeans IDE 安装包的一部分。不过，您也可以稍后通过插件管理器（*工具 ![Image](img/U001.jpg)
    插件 ![Image](img/U001.jpg) 可用插件*）安装此插件。通过 *工具 ![Image](img/U001.jpg) 密钥库* 打开密钥库管理器。接下来，通过
    *添加密钥库...* 创建一个密钥库文件，包括文件名和密钥库将存放的目录。推荐的位置是您模块的 *nbproject* 文件夹。在输入至少六个字符的密码后，单击“确定”以创建密钥库。


    ![Image](img/3603.jpg)


    ***图 36-3.** 创建密钥库*

