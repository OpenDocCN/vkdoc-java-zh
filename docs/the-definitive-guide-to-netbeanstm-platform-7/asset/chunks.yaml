    ## RESTful Web Services


    This chapter is about providing and consuming server-side data by RESTful web
    services. Similar to web services over SOAP, it is possible to access a Java EE
    server application by a NetBeans Platform application. This chapter will show
    you which steps are necessary to create and integrate a RESTful web service client.
    You will create a simple product database with a persistent entity class and a
    RESTful web service class that gives access to the data. The server picks the
    data directly over the entity manager. But it is also possible to access Enterprise
    Java Beans (EJBs) which provide the needed data.


