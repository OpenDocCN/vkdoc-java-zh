- fmt: "### Behavior\n\nA top component's behavior can be adapted by a series of features,\
    \ shown in Table 10-1. You edit the settings of these features with the NetBeans\
    \ window wizard. Otherwise, you can also adapt these features which are set in\
    \ the constructor of a top component later.\n\n![Image](images/t1001.jpg)\n\n\
    These features can be prepended by `PROP_` with the following method within a\
    \ top component:\n\n```\nputClientProperty(\n    TopComponent.PROP_CLOSING_DISABLED,\n\
    \    Boolean.TRUE);\n```\n\n### States\n\nA top component can have several states,\
    \ listed in [Table 10-2](#Chapter10.html#tab_10_2).\n\n![Image](images/t1002.jpg)\n\
    \n![Image](images/t1002a.jpg)\n\nEntering a specific state is announced via a\
    \ call to one of the methods shown in [Table 10-3](#Chapter10.html#tab_10_3).\
    \ If a window has to perform an action in a specific state, simply override the\
    \ corresponding method.\n\n![Image](images/t1003.jpg)\n\n[Chapter 9](#Chapter09.html#ch9)\
    \ showed how to create toolbar configurations and how to use them to display application-specific\
    \ toolbars. Use two previously described methods that inform us about the state\
    \ of the top component to display the currently active top component, as shown\
    \ in [Listing 10-5](#Chapter10.html#list_10_5).\n\n***Listing 10-5.** Displaying\
    \ and Hiding Toolbars Based on Context*\n\n```\npublic class MyTopComponent extends\
    \ TopComponent {\n   private String origConfig = \"Standard\";\n   private String\
    \ myConfig   = \"MyToolbarConfig\";\n\nprotected void componentActivated() {\n\
    \      origConfig = ToolbarPool.getDefault().getConfiguration();\n      ToolbarPool.getDefault().setConfiguration(myConfig);\n\
    \   }\n\nprotected void componentDeactivated() {\n      ToolbarPool.getDefault().setConfiguration(origConfig);\n\
    \   } }\n```\n\nIf the top component is focused, the method `componentActivated()`\
    \ is called. The current configuration is stored for later reactivation. Then,\
    \ you set your own toolbar configuration `MyToolbarConfig` (created in [Chapter\
    \ 9](#Chapter09.html#ch9)). If another top component is selected, this top component\
    \ loses focus and the method `componentDeactivated()` is called. The stored configuration\
    \ is set in this method to restore previous toolbars.\n\n### Context Menu\n\n\
    When right-clicking the title bar of a top component, a context menu is displayed,\
    \ with actions such as *Undock Window* or *Close Window*. These actions are obtained\
    \ from the `TopComponent` class via its `getActions()` method. To add your own\
    \ actions to this context menu, you can override this method (see [Listing 10-6](#Chapter10.html#list_10_6)).\
    \ When doing so, it is useful to add the actions declaratively. In [Chapter 3](#Chapter03.html#ch3),\
    \ I mentioned that it is possible to add your own folders and extension points\
    \ to the layer file. That is exactly what you want to use here. The actions are\
    \ declared in the layer file and read it on demand in the `getActions()` method.\n\
    \n***Listing 10-6.** Reading Actions for a Context Menu from the Layer File*\n\
    \n```\npublic class MyTopComponent extends TopComponent {\n   private List<Action>\
    \ ca = null;\n\n   @Override\npublic Action[] getActions() {\n      if (ca ==\
    \ null) {\n         ca = new ArrayList<Action>(Arrays.asList(super.getActions()));\n\
    \         ca.add(null); /* add separator */\nLookup lkp = Lookups.forPath(\"ContextActions/MyTC\"\
    );\n         ca.addAll(lkp.lookupAll(Action.class));\n      }\n\n      return\
    \ ca.toArray(new Action[ca.size()]);\n   } }\n```\n\nFirst, the superclass's `getActions()`\
    \ method is called in order to obtain default actions. With the help of the method\
    \ `Lookups.forPath()` you can easily create a Lookup for the declared folder `ContextActions/MyTC`.\
    \ The method `lookupAll()` then obtains all registered actions that implement\
    \ the `Action` interface. When creating the menu, a `null` value is automatically\
    \ replaced by a separator by the Platform. The assembled list of actions is returned\
    \ as an array. Finally, you just have to create references on the actual action\
    \ definitions (usually in the standard folder `Actions`). You can realize the\
    \ references either elegantly via annotation in the respective action class itself\
    \ or by a direct entry in the layer file. The necessary annotation would look\
    \ like the following:\n\n```\n@ActionReference(path = \"ContextActions/MyTC\"\
    )\n```\n\nThe corresponding entry in the layer file in the self-defined folder\
    \ could look like [Listing 10-7](#Chapter10.html#list_10_7), for example.\n\n\
    ***Listing 10-7.** Defining Context Menu Actions in the Layer File*\n\n```\n<folder\
    \ name=\"ContextActions\">\n  <folder name=\"MyTC\">\n    <file name=\"MyAction1.shadow\"\
    >\n      <attr name=\"originalFile\"\n            stringvalue=\"Actions/Edit/com-galileo-netbeans-module-MyAction1.instance\"\
    />\n    </file>\n    <file name=\"MyAction2.shadow\">\n      <attr name=\"originalFile\"\
    \n            stringvalue=\"Actions/Edit/com-galileo-netbeans-module-MyAction2.instance\"\
    />\n    </file>\n  </folder>\n</folder>\n```\n\nYou have now created an extension\
    \ point. Other modules can easily add actions to the context menu of your top\
    \ component by defining this action in their layer file in the folder `ContextActions/MyTC`.\
    \ Thus, the context menu can be flexibly extended by any other module without\
    \ any dependency.\n\n### Persistence\n\nThe window system is capable of storing\
    \ opened top components upon exiting the application and restoring them upon restart.\
    \ However, there are use cases where storing the top component is not desirable.\
    \ Determining whether a top component will be stored or not is done via the value\
    \ that is delivered by the method `getPersistenceType()`. You can determine this\
    \ value with the `persistenceType` attribute of the `TopComponent.Description`\
    \ annotation. If you do not use annotations, though, the named method should always\
    \ be overridden. The constants listed in Table 10-4 are available as return values.\n\
    \n![Image](images/t1004.jpg)\n\nThe window system calls the methods `writeProperties()`\
    \ and `readProperties()` upon storing or restoring a top component. The window\
    \ system then calls the methods when saving and loading a top component. You can\
    \ use these methods in order to save or load your top component-specific data.\
    \ For this purpose you always get a `Properties` object as parameter. The data\
    \ that is saved there is saved by the NetBeans Platform in the user directory\
    \ as an XML file. From there it is loaded, too.\n\n### Registry\n\nAll top components\
    \ of the NetBeans window system are centrally managed in a registry. The interface\
    \ of this registry is specified by the `TopComponent.Registry` interface. An instance\
    \ of this registry is obtained either directly via the `TopComponent` class by\
    \ calling\n\n```\nTopComponent.Registry registry = TopComponent.getRegistry();\n\
    ```\n\nor via the `WindowManager`:\n\n```\nTopComponent.Registry registry = WindowManager.getDefault().getRegistry();\n\
    ```\n\nThis registry will return, for example the currently activated top components\
    \ via `getActivated()` or all opened top components via `getOpened()`. Furthermore,\
    \ a `PropertyChangeListener` can be registered on the registry in order to globally\
    \ react to state changes of the top component, for example (see [Table 10-5](#Chapter10.html#tab_10_5)).\n\
    \n![Image](images/t1005.jpg)\n\nIn the following example, a listener is added\
    \ to the registry. This listener reacts when a top component is opened (see [Listing\
    \ 10-8](#Chapter10.html#list_10_8)).\n\n***Listing 10-8.** Track Changes of Top\
    \ Component States Globally*\n\n```\npublic class MyTopComponent extends TopComponent\
    \ implements PropertyChangeListener {\n\n   public MyTopComponent() {\n  TopComponent.Registry\
