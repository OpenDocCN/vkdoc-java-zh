    ### 关闭数据库


    当建立与数据库的连接时，数据库会自动启动。关闭则不同。数据库系统无法识别应用程序何时结束（因此会突然关闭），所以你应该在应用程序结束时显式地关闭数据库系统；这样才能保证数据的一致性。关闭系统意味着所有活动的数据库都会被隐式关闭。当然，你也可以选择单独关闭某个数据库。


    完成此任务的最佳方式是通过模块安装程序或生命周期管理器实现（参见第 8 章）。在模块安装程序中，使用 `close()` 方法，如清单 26-1 所示。


    ***清单 26-1.** 关闭数据库系统以结束应用程序*


    `import java.sql.DriverManager;`

    `import java.sql.SQLException;`

    `import org.openide.modules.ModuleInstall;`


    `public class Installer extends` **`ModuleInstall`** `{`

    `   @Override`

    `public void` **`close`**`() {`

    `      try {`

    `        DriverManager.getConnection("jdbc:derby:;`**`shutdown=true`**`");`

    `      } catch (SQLException ex) {}`

    `   }`

    `}`


    这样，整个 Java DB 系统就会在应用程序结束时关闭。如果你想关闭单个数据库，只需在相应的数据库名称后面加上 `jdbc:derby:`。例如，如果你想关闭数据库
    `MyDB`，调用方式如下：


    `DriverManager.getConnection("jdbc:derby:MyDB;`**`shutdown=true`**`");`


    请记住，关闭操作（即参数 `shutdown=true`）总会触发一个异常，该异常会提供关于关闭过程的报告。


    ### 使用 NetBeans IDE 开发数据库


    为了简化数据库支持应用程序的开发，NetBeans IDE 中集成了 Java DB 支持。通过 IDE，你可以启动和停止数据库系统、创建数据库以及建立与数据库的连接。用于创建和配置表的图形支持尤其简化了开发过程。这使你能够以非常简单的方式定义和修改各个表列及其数据类型。


    #### 安装和启动 Java DB 系统


    要使用此支持，首先需要定义 Java DB 的安装路径。通过 *窗口* ![Image](img/U001.jpg) *服务* 打开 *服务* 窗口，然后从
    *Java DB* 节点的上下文菜单中选择 *属性*。该路径应已指向 Java 平台安装目录中的 Java DB 目录。如果你自己下载了 Java DB，或者有单独的安装，当然也可以在此设置路径。你还需要设置另一个路径，用于创建和存放数据库。


    完成这些设置后，你可以通过上下文菜单中的 *启动服务器* 来启动数据库服务器。这是必要的，因为现在数据库系统不再集成在应用程序中，而是作为独立的服务器运行。服务器通常会在端口
    1527 上接受连接，该端口信息会显示在输出窗口中。


    #### 将 Java DB 服务器驱动程序集成到应用程序中


    由于 Java DB 数据库系统并未集成在其应用程序中，而是作为服务器运行，因此有必要为你的应用程序添加另一个驱动程序。这个用于建立与 Java DB 服务器连接的驱动程序位于文件
    *derbyclient.jar* 中（在“集成 Java DB”一节中介绍过）。通过库包装器模块将其添加到你的应用程序中，并在你的模块中定义一个数据库连接，使其依赖于该模块。


    #### 创建和配置数据库


    现在，你的应用程序已准备好访问已启动的 Java DB 服务器。你可以在 NetBeans IDE 中，通过 *服务* 窗口中 *数据库* ![Image](img/U001.jpg)
    *Java DB* 节点的上下文菜单中的 *创建数据库...* 来创建一个新数据库，如图 26-2 所示。在此过程中，你需要为数据库输入名称、用户名和密码。输入这些数据后，数据库即被创建，并建立连接。你可以通过相应连接的上下文菜单项
    *连接...* 来建立连接。如果连接成功建立，将显示数据库的表、索引和外键。使用上下文菜单，你可以为每个项目创建新条目。


    例如，你可以通过 *表* 的上下文菜单中的 *创建表...* 来创建新表，通过 *查看数据...* 来查看表的内容，或者通过 *执行命令* 来执行 SQL
    命令。


    ![Image](img/2602.jpg)


    ***图 26-2.** 你可以在服务窗口中访问 Java DB 数据库，并在此进行配置。*


    #### 从应用程序访问数据库


    现在，你将处理需要使用数据库的应用程序。在使用 Java DB 系统的集成应用程序时需要定义的 `derby.system.home` 特性，现在已不再需要。为了成功地从你的应用程序建立与
    Java DB 服务器的连接，你需要调整连接 URL，因为你需要指定数据库服务器接受连接的名称（或 IP 地址）和端口：


    `Connection connection = DriverManager.`**`getConnection`**`(`

    `     "jdbc:derby:`**`//localhost:1527/`**`MyDB;", "user", "password");`


    由于在这种情况下数据库服务器与应用程序位于同一台计算机上，请使用 `localhost` 或 IP 地址 `127.0.0.1`，并将端口定义为 `1527`。你也可以从
    NetBeans IDE 服务窗口中已建立的连接中获取此 URL。


    #### 检索和导入表结构


    接下来，我将向你展示服务窗口中数据库浏览器的一个非常有用的功能。可以显示创建表所用的 SQL 源代码，以便将其原样复制到你的应用程序中，用于数据库表的初始创建，或复制到
    SQL 脚本文件中。调用所需表的上下文菜单，你会找到 *抓取结构...* 选项；调用它可以将结构保存到文件中。然后，只需在上下文菜单中选择 *重新创建表...*，并选择刚刚创建的文件。创建表所需的
    SQL 源代码将显示在一个窗口中。你也可以将此功能用于其原始目的，从而将外部数据库中的表导入到你的数据库中。


    ### 示例应用程序


    我想用一个非常简单的例子来结束本章，以解释 Java DB 在创建表结构方面的一些特性，并向你展示如何巧妙地将 Java DB 集成到应用程序的生命周期中。在这个例子中，你将管理可以分配到特定流派的音乐专辑。

