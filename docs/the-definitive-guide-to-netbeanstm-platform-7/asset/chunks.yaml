    with errors only. Furthermore, you have the option to repeat the test either for
    all or only for the failed tests.


    ![Image](images/4203.jpg)


    ***Figure 42-3.** Overview of the results of the test*


    So far, no special support by the NB JUnit module is necessary for general tests.
    Using the JUnit annotations makes the implementation especially easy and clear.
    Although you will test NetBeans Platform–specific implementations next, you use
    the advantages of the NB JUnit module. But before you can use it, you have to
    activate it. To do this, open the context menu of the *Properties* window of your
    NetBeans Platform application project. Activate the module *NB JUnit* in the category
    *Libraries* in the cluster *harness*. It is then possible to automatically add
    modules needed by this module with the eventually displayed *Resolve* button.
    After that, you can add the *NB JUnit* module over the context menu of the *Unit
    Test Libraries* node of your module project with *Add Unit Test Dependency*. Call
    the newly added module *Edit* out of the context menu and activate the *Include
    Dependencies Recursively* option to get the provided dependencies of these modules
    when testing (see [Figure 42-4](#Chapter42.html#fig_42_4).).


    ![Image](images/4204.jpg)


    ***Figure 42-4.** The dependencies of the NB JUnit module have to be included
    recursively.*


    #### Testing in the NetBeans Runtime Container Environment


    The NB JUnit module enables you to run your tests in the NetBeans Runtime Container
    environment. Functionalities such as the global Lookup are provided during the
    test, too, although this requires that you run the tests for the whole NetBeans
    Platform application project (*Test All*).


    Use the class `NbModuleSuite` for this. You can create a wrapper test which you
    deliver with the static method `suite()`, based on a `NbModuleSuite.Configuration`
    object.


    You see in [Listing 42-5](#Chapter42.html#list_42_5) that the test class derives
    from the class `NbTestCase`. This is necessary to be able to add it to the `Configuration`
    object. You do not need the annotations anymore, which are no longer taken into
    account. Instead, all tests must have the prefix `test`.


    ***Listing 42-5.** Run Tests in the NetBeans Runtime Container Environment.*


    `import junit.framework.Test;`

    `import org.netbeans.junit.NbTestCase;`

    `import org.netbeans.junit.NbModuleSuite;`


    `public class MathTest extends NbTestCase {`


    `   public MathTest() {`

    `      super("MathTest");`

    `   }`


    `   public static Test suite() {`

    `      NbModuleSuite.Configuration config = NbModuleSuite.createConfiguration(MathTest.class);`

    `      return NbModuleSuite.create(config);`

    `   }`


    `   public void testAdd() {`

    `      ...`

    `   }`

    `}`


    Take care in case you have addtional test classes that contain annotations and
    which you did not add to the `suite()` method in the wrapper test object. These
    tests are executed too, but they cannot actually be executed successfully, because
    they are cancelled by the NetBeans Runtime Container shutdown. Thus, it is recommended
    to add all tests to run to the wrapper to ensure that all tests are run in the
    same environment. You can easily mark tests that will not be run with the annotation
    `@Ignore`.


    You can add any number of test classes or just single tests through the `Configuration`
    object with `addTest()`. Furthermore, you can define which modules (`enableModules()`)
    or which clusters (`clusters()`) will be active. The *platform* cluster is active
    by default, though. Usually it makes sense for module tests to avoid starting
    the user interface (this would only waste time) with `gui(false)` when running
    a test. Calling these methods, make sure that you call the next method on the
    return value of the preceding method since the methods of the `NbModuleSuite.Configuration`
    class each return a copy of the instance with referringly changed values. So a
    call would look like this, for example:


    `NbModuleSuite.Configuration config = NbModuleSuite`

    `   .createConfiguration(CalculatorTest.class)`

    `   .addTest(MathTest.class)`

    `   .enableModules(".*")`

    `   .clusters(".*");`'
