    Now you will create a service client class for the web services. To do so, you
    first create an application module which you name *OrderModule*. Call *File ![Image](images/U001.jpg)*
    *New File… ![Image](images/U001.jpg)* *Web Services ![Image](images/U001.jpg)*
    *RESTful Java Client* on this new module. Call the service class *OrderServiceClient*,
    add it to the package `com.galileo.netbeans.order.module`, and then choose the
    web service for which a client class will be created with the option *From Project*
    over the *Browse…* button. (See [Figure 32-3](#Chapter32.html#fig_32_3).)


    ![Image](images/3203.jpg)


    ***Figure 32-3.** Creating a service client for a RESTful web service*


    Now let''s take a look at the created class. All methods provided by the service
    are implemented with the JAX-RS implementation; signatures that allow a completely
    transparent calling-in of the service are used. (See [Listing 32-3](#Chapter32.html#list_32_3).)


    ***Listing 32-3.** RESTful Web Service Client with the Completely Transparent
    Object Which Can Be Transferred to and from the Java EE Server*


    `import com.sun.jersey.api.client.Client;`

    `import com.sun.jersey.api.client.UniformInterfaceException;`

    `import com.sun.jersey.api.client.WebResource;`

    `…`

    `public class` **`OrderServiceClient`** `{`

    `   private WebResource webResource;`

    `   private Client client;`

    `   private static final String BASE_URI = "http://localhost:8080/OrderSystem/resources";`


    `public` **`OrderServiceClient`**`() {`

    `      ClientConfig config = new DefaultClientConfig();`

    `      client = Client.create(config);`

    `      webResource = client.resource(BASE_URI).`

    `         path("com.galileo.netbeans.order.entities.product");`

    `   }`


    `public void` **`create`**`(Object requestEntity) throws UniformInterfaceException
    {`

    `      webResource.type(MediaType.APPLICATION_XML).post(requestEntity);`

    `   }`


    `public` **`<T> T findAll(Class<T> responseType)`** `throws UniformInterfaceException
    {`

    `      WebResource resource = webResource;`

    `      return resource.accept(MediaType.APPLICATION_XML).get(responseType);`

    `   }`

    `   …`

    `}`


    If you look at the created class in [Listing 32-3](#Chapter32.html#list_32_3),
    you see that the type of data a method returns is defined by the type of the passed
    class object. To get the raw data in XML format you could just use the type `String`.
    However, you want to create an entity class (similar to the server-side class)
    for the data. Out of the XML data the desired entity class instance is automatically
    created by JAXB along with the referring annotations. If the getter and setter
    methods match the names of the referring XML elements (and so the attributes of
    the server-side class), you do not need to do anything beyond annotating the class
    with `@XmlRootElement`. (See [Listing 32-4](#Chapter32.html#list_32_4).)


    ***Listing 32-4.** Entity Class Which Is Created Automatically by the JAXB Framework
    and Which Staffs the Attributes with the XML Data*


    `import javax.xml.bind.annotation.XmlRootElement;`


    `@XmlRootElement`

    `public class Product {`

    `   private Long   id;`

    `   private String orderId;`

    `   private String name;`

    `   private Double price;`

    `   …`

    `}`


    Now, you can use this class in all cases in which you transfer objects or get
    a single object. In case a list of objects  is delivered to you by a service method
    (see the method in [Listing 32-3](#Chapter32.html#list_32_3)), you have to create
    a helper class. A list of objects is embraced in XML by an additional tag (`<Products>`).
    So that this tag and the subordinate objects can be created correctly, the helper
    class shown in [Listing 32-5](#Chapter32.html#list_32_5) is necessary.


    ***Listing 32-5.** Helper Class for Automatically Creating a Product List*


    `import java.util.ArrayList;`

    `import java.util.List;`

    `import javax.xml.bind.annotation.XmlRootElement;`


    **`@XmlRootElement`**

    `public class` **`Products`** `{`

    `   private List<Product> product = new ArrayList<Product>();`


    `public List<Product>` **`getProduct`**`() {`

    `      return product;`

    `   }`


    `public void` **`setProduct`**`(List<Product> product) {`

    `      this.product = product;`

    `   }`

    `}`


    The usage of the web service client is really simple. As a test, you can add several
    products to the database and then query certain or all objects and deliver their
    data, as shown in [Listing 32-6](#Chapter32.html#list_32_6).


    ***Listing 32-6.** Testing the Service Client of the RESTful Web Service*


    `public final class` **`TestRESTAction`** `implements ActionListener {`


    `   @Override`

    `   public void actionPerformed(ActionEvent e) {`

    **`OrderServiceClient`** `client =` **`new OrderServiceClient`**`();`


    **`Product`** `p = new Product();`

    `      p.setName("Test Product");`

    `      p.setOrderId("P1");`

    `      p.setPrice(3.99);`

    **`client.create`**`(p);`


    `Product p1 =` **`client.find`**`(Product.class, "1");`

    `      System.out.println("P1: " + p1);`


    **`Products`** `pro =`**`client.findAll`**`(Products.class);`

    `      System.out.println("Products: " + pro.getProduct().size());`

    `   }`

    `}`


    ### Summary


    RESTful web services provide a very simple possibility to access server-side resources
    out of a NetBeans Platform application. In this chapter, you learned how to create
    a RESTful web service and the corresponding client module. You used the client
    module to access a simple product database from a NetBeans Platform application.


    ## C H A P T E R  33


    ## Authentication and Multi-User Login


    To begin this discussion of authentication and logging in multiple users, let''s
    go back to the login dialog you created in [Chapter 13](#Chapter13.html#ch13).
    With this dialog you can retrieve the user''s login data. Here we will check this
    data on the server side. There are numerous possibilities for checking login data.
    In this context, two Java built-in functions are focused on doing so. As soon
    as a user registered successfully, it is important to adapt the application referring
    to his or her rights or group membership.'
