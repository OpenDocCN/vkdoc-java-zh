- fmt: '### Summary


    The IntelliJ IDEA Java development environment of JetBrains is now available freely
    as a community edition. In this chapter you learned how to use this IDE for developing
    NetBeans Platform applications.


    ## C H A P T E R 41


    ## NetBeans Swing GUI Builder


    Probably the most obvious feature of a rich client application is the user interface,
    which determines the quality of an application based on an intuitive and user-friendly
    structure of functions and data. It can be a challenge to create a user interface
    with only a source code editor, however. Not only do you constantly have to imagine
    the structure of the components, but the result often looks completely different
    than expected.


    In this respect the NetBeans IDE, which contains a powerful Swing GUI Builder,
    proves to be very innovative. You can create a whole user interface with drag-and-drop
    and a choice of given parameters. In other words, you do not need to write even
    a single line of code.


    For example, the GUI Builder is automatically used for creating a top component,
    an options panel, or a wizard for a NetBeans Platform application; you can also
    create completely generic components. Add them to the palette and you can use
    them in any other components again. This chapter will first explain a few details
    about the structure of the GUI Builder; later we will take a more detailed look
    at the most important features.


    ### Structure of the GUI Builder


    When editing GUI components, the GUI Builder supports you with a lot of information
    and functions in different windows. The next section will give you an overview
    of those windows and their use.


    #### Editor


    The *Editor* (*Window* ![Image](images/U001.jpg) *Editor*) is a central part of
    the GUI Builder. It provides two different views. You can alternate between the
    *Design* view and the *Source* view. In the Design view, the actual creation of
    GUI components takes place. You can drag components from the Palette into your
    Design view on your component where you can individually edit it. In the Source
    view, you can implement the action of buttons, for example. (See [Figure 41-1](#Chapter41.html#fig_41_1).)


    ![Image](images/4101.jpg)


    ***Figure 41-1.** Editor of the GUI Builder with Design and Source view*


    Changing to the Source view you will see areas with code that is automatically
    produced by the GUI Builder. These so-called *Guarded Blocks* are marked grey
    and cannot be edited; changes can only be made on the user interface of the GUI
    Builder. At some places it is possible to insert custom code.


    #### Palette


    As soon as you are in the Design view implementing a GUI component in the Editor,
    the *Palette* window (*Window* ![Image](images/U001.jpg) *Palette*) provides all
    available Swing and AWT components structured in categories (see [Figure 41-2](#Chapter41.html#fig_41_2)).
    You can drag-and-drop it into the editor on your own component.


    ![Image](images/4102.jpg)


    ***Figure 41-2.** Palette window with all Swing and AWT components*


    ![Image](images/square.jpg) **Note** With the Palette you can not only use the
    components that are available by default, but you can add your own components
    and drag-and-drop them in your own application. Right-clicking in the Palette
    window calls the *Palette Manager*, in which you can import new components from
    JAR files, registered libraries, or a project. You can also create new categories,
    structure them differently, or delete categories with the Palette Manager. That
    way you always keep track.


    #### Inspector


    All visible and even invisible components are shown in the *Inspector* window
    (*Window* ![Image](images/U001.jpg) *Navigating* ![Image](images/U001.jpg) *Inspector*)
    in a hierarchic tree structure (see [Figure 41-3](#Chapter41.html#fig_41_3)).
    When choosing an entry, the referring component in the Editor is selected as well.
    The Inspector helps you keep track even in complex GUI components. The Inspector
    is especially helpful when editing a `JPanel` component which is used as an invisible
    container.


    ![Image](images/4103.jpg)


    ***Figure 41-3.** Inspector window for navigating and accessing single components*


    #### Properties


    Each and every Swing or AWT component offers a multiplicity of possible settings
    which are all displayed in the *Properties* window (*Window* ![Image](images/U001.jpg)
    *Properties*). A great advantage of this is that for a lot of features with set
    values, the desired value can be chosen from a list. Special editors are provided
    for a lot more features, such as the configuration of the border of a container.
    Furthermore, the Properties window provides additional views about bindings of
    features (*Binding*), their actions (*Events*), and user-specific code (*Code*).
    You do not just get an extensive overview, but a very easy edit functionality
    at the same time. (See [Figure 41-4](#Chapter41.html#fig_41_4).) We will come
    back to the separate views later.


    ![Image](images/4104.jpg)


    ***Figure 41-4.** Overview of the features of a selected AWT or Swing component
    with a lot of possibilities for editing*


    ### Components and Layout


    This section will describe how a GUI Builder component is structured and how you
    can place and structure additional components on it.


    #### Forms


    Components created with the GUI Builder are called Forms. There are certain wizards
    provided for creating a Form under *File* ![Image](images/U001.jpg) *New File*
    ![Image](images/U001.jpg) *Swing GUI Forms* and *AWT GUI Forms*. Surely, for you
    as a NetBeans Platform application developer, the *JPanel Form* wizard is the
    most common for implementing sub-components. For developing top-level components,
    a special Form wizard is provided under *File* ![Image](images/U001.jpg) *New
    File* ![Image](images/U001.jpg) *Module Development* ![Image](images/U001.jpg)
    *Window* (see [Chapter 10](#Chapter10.html#ch10)).


    A Form is marked by a `.form` file besides a `.java` file with reserved code blocks.
    It has the same name and the same directory as the `.java` file. The GUI Builder
    saves all information about layout and components used and the Java source code
    that is generated out of it or changes in this XML file.


    #### Design Strategy


    The GUI Builder follows a so-called *Free Design* strategy. Whereas you are used
    to placing the components in a certain set area of a layout manager, in the Design
    view of the NetBeans GUI Builder you can place your components anywhere. Then
    it automatically detects the necessary layout attributes and automatically creates
    the code. The `GroupLayout` manager is the basis for that. You can arrange your
    components as they will be displayed in the application. Furthermore, you have
    the ability to preview them with the *Preview Design* button in the toolbar of
    the Design view. This way you can test how your component reacts to a change of
    size.


    After a short time working with the enormously intuitive Free Design of the GUI
    Builder you will hardly miss other layout managers, although you can set alternative
    layout managers for special purposes. You can choose from the following popular
    layout managers with a right-click in the Form on *Set Layout*:


    - Free Design

    - Absolute Layout

    - Border Layout

    - Box Layout

    - Card Layout

    - Flow Layout

    - Grid Bag Layout

    - Grid Layout

    - Null Layout'
