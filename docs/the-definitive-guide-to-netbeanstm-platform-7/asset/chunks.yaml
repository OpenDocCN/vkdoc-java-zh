    In the standard folder `Loaders` subfolders are created according to the defined
    MIME type (in this example `audio/mpeg`). Under them is the standard folder `Factories`
    in which our special data object factory is registered with the name `Mp3DataLoader.instance`.
    An icon for this file type is specified by the attribute `SystemFileSystem.icon`.
    With the attributes `mimeType` and `dataObjectClass` you determine for which type
    of data which data object type shall be produced by the factory. This means, here,
    that only the MIME  type, not the file ending is determined. This determination
    is also made in the layer file in the standard folder `Services/MIMEResolver`.
    Finally, the now-registered special factory for your `Mp3DataObject` class is
    created by the method `DataLoaderPool.factory()`.


    When you created the MP3 file type at the beginning of this chapter, the file
