    ## 第 32 章


    ## RESTful Web 服务


    本章介绍如何通过 RESTful Web 服务提供和使用服务器端数据。与基于 SOAP 的 Web 服务类似，可以通过 NetBeans 平台应用程序访问
    Java EE 服务器应用程序。本章将向您展示创建和集成 RESTful Web 服务客户端所需的步骤。您将创建一个简单的产品数据库，其中包含一个持久化实体类和一个提供数据访问的
    RESTful Web 服务类。服务器通过实体管理器直接获取数据。但也可以访问提供所需数据的企业 Java Bean（EJB）。


    ### 创建 Web 应用程序


    虽然可以在 EJB 模块中提供基于 SOAP 的 Web 服务，但 RESTful Web 服务需要一个 *Web 应用程序* 项目（WAR 文件）。然后，此应用程序将在
