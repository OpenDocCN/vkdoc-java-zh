    *OrderSystem*，并将其分配给一个 Java EE 服务器。最后，点击*完成*完成向导。（请参见图 32-1。）


    ![Image](img/3201.jpg)


    ***图 32-1.** 创建 Web 应用程序项目并将其分配给服务器*

