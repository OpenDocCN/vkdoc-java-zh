    ### Summary


    In this chapter, we created a bigger example which enabled you to apply a lot
    of the concepts you learned about in previous chapters. First, you defined a modular
    application structure based on NetBeans modules. You created a module, enabling
    your example application to play MP3 files. The module contains the JMF classes,
    as well as the MP3 plugin.


    To handle MP3 files within the NetBeans Platform, you created an MP3 file type,
    as explained in [Chapter 7](#Chapter07.html#ch7). Next, you included an ID3 library
    in your NetBeans Platform Application, implementing an MP3 player service module.
    In this module, you also implemented a small GUI for the player.


    Next, you created playlist functionality. To that end, you created your own node
    view and node container. To implement drag-and-drop functionality from the Media
    Library window, you extended your `Node` class.


    Finally, this chapter demonstrated how easy it is to incrementally build a modular
    NetBeans Platform application and highlighted the extensibility of such an application.


    ## Appendix


    This Appendix includes a list of important extension points in the NetBeans Platform
    followed by a list of Document Type Definitions (DTDs) for some important configuration
    files such as mode, toolbar, or top component group configurations.


    ### Important NetBeans Platform Extension Points


    [Table A-1](#Appendix.html#tab_app_1) lists the most important NetBeans Platform
    extension points. These are folders in the layer file, where you register your
    extensions. The chapters in which you can find more information about each extension
    point''s usage are included.


