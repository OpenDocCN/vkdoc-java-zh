- fmt: "### Integrating the Hibernate Libraries\n\nAt first, you should download the\
    \ current *Hibernate* distribution (here version 3.6.1) from [`http://hibernate.org.`](http://hibernate.org.)\
    \ This distribution brings along all the necessary third-party libraries, examples,\
    \ and comprehensive documentation in addition to the Hibernate library itself.\
    \ You want to encapsulate these libraries as a separate module again, as you did\
    \ with the Java DB; this will provide Hibernate functionality to the application.\
    \ To do so, call in *File ![Image](images/U001.jpg) New Project..*. and then *NetBeans\
    \ Modules ![Image](images/U001.jpg) Library Wrapper Module*. Add the following\
    \ libraries to the distribution:\n\n*   `hibernate3.jar`\n*   `lib/jpa/hibernate-jpa-2.0-api-1.0.0.Final.jar`\n\
    *   `lib/required/antlr-2.7.6.jar`\n*   `lib/required/commons-collections-3.1.jar`\n\
    *   `lib/required/dom4j-1.6.1.jar`\n*   `lib/required/javassist-3.12.0.GA.jar`\n\
    *   `lib/required/jta-1.1.jar`\n*   `lib/required/slf4j-api-1.6.1.jar`\n\nHibernate\
    \ uses the Simple Logging Facade for Java (SLF4J) API to create the log output.\
    \ As the name suggests, this API provides a façade for different logging frameworks,\
    \ including Log4J or the Java Platform Logging Framework. A framework does not\
    \ need to be “compulsively” present for the façade; it does make sense, however,\
    \ to provide such a framework, especially for the development of an application,\
    \ because Hibernate gives out numerous helpful reports. SLF4J provides its own\
    \ simple logging implementation, too. This implementation is part of the SLF4J\
    \ package, which you can download at [`http://slf4j.org`](http://slf4j.org). So,\
    \ now add this JAR file to the Hibernate module, too:\n\n`slf4j-simple-1.6.1.jar`\n\
    \nIf problems occur using libraries within the NetBeans platform, they will most\
    \ likely be classloader problems. Hibernate itself uses the system classloader\
    \ and can thus access the entities without explicitly defined dependencies. The\
    \ Proxy Factory of the Javassist library—which is responsible for the proxy production\
    \ of objects to the runtime (necessary for the lazy loading)—uses a different\
    \ classloader and consequently does not find classes out of the Hibernate libraries\
    \ or classes out of your application modules. Advantageously, you can provide\
    \ your own classloader provider implementation to the class `javassist.util.proxy.ProxyFactory`\
    \ by the `ProxyFactory.ClassLoaderProvider` interface and create a module installer\
    \ for the Hibernate module. Use the `restored()` method to provide the system\
    \ classloader to the application of the `ProxyFactory` at the start (see [Listing\
    \ 27-1](#Chapter27.html#list_27_1)).\n\n***Listing 27-1.** Providing a Classloader\
    \ Provider Implementation*\n\n```\nimport javassist.util.proxy.ProxyFactory;\n\
    import org.openide.modules.ModuleInstall;\n\npublic class Installer extends ModuleInstall\
    \ {\n   @Override\n   public void restored() {\n      ProxyFactory.classLoaderProvider\
    \ = new ProxyFactory.ClassLoaderProvider() {\n         @Override\n         public\
    \ ClassLoader get(ProxyFactory pf) {\n            return Thread.currentThread().getContextClassLoader();\n\
    \         }\n      };\n   }\n}\n```\n\nUsually, the context classloader of the\
    \ current thread is the system classloader (if no other was used). Transfer this\
    \ to the `ProxyFactory` object via the `get()` method.\n\n### Structure of the\
    \ Exemplified Application\n\nNow I will show you how to use Hibernate with the\
    \ albums example from [Chapter 26](#Chapter26.html#ch26), so you can appreciate\
    \ the advantages of an object relational bridge. In addition, you can use the\
    \ already integrated database system Java DB again now. Add the library wrapper\
    \ module with the Hibernate libraries to the already created Platform application.\
    \ Each module that wants to use the Hibernate functionality is able to define\
    \ a dependency to the application. In this example, it is only the application\
    \ module (*My Module*). Open the *Properties* window over the context menu and\
    \ add the *Hibernate* module under *Libraries*. You have to add a dependency on\
    \ the *Java DB* module to the *Hibernate* module in the same way so Hibernate\
    \ can access the Java DB database driver.\n\nSo far you have managed the classes\
    \ for your entities, `genre` and `album`, in the application module. Since Hibernate\
    \ needs access to these classes, you should define another dependency from Hibernate\
    \ to the application module. That would lead to a cyclic dependency; the module\
    \ system of the NetBeans Platform would quickly report an error and the application\
    \ would not even start. This is why you outsource your entity classes in a separate\
    \ module, so the cyclic dependency is solved. This constellation with the additional\
    \ module is graphically illustrated in [Figure 27-1](#Chapter27.html#fig_27_1).\n\
    \n![Image](images/2701.jpg)\n\n***Figure 27-1.** The application components and\
    \ their dependencies*\n\n![Image](images/square.jpg) **Tip** When developing your\
    \ application, using the embedded version of the Java DB (in this case, the module\
    \ *Java DB Embedded*) is not recommended; instead, use the server variant that\
    \ is already integrated in the NetBeans IDE. Integrate the Java DB driver as module\
    \ in your application as described in [Chapter 27](#Chapter27.html#ch27), adjust\
    \ it in the `hibernate.cfg.xml` file to the connection URL, and start the database\
    \ server in the NetBeans IDE with *Start Server* in the context menu of the node\
    \ *Databases ![Image](images/U001.jpg) Java DB* in the service window. This way\
    \ it is possible to look at the database schema produced by Hibernate.\n\n###\
    \ Configuring Hibernate\n\nAfter integrating Hibernate you now have to provide\
    \ some configuration information. You define this information by an XML file which\
    \ is called `hibernate.cfg.xml` by default. You definitively need to specify the\
    \ database driver, the URL to connect with the database, the necessary authentication\
    \ data, and the SQL dialect which should be used. This configuration file then\
    \ looks as follows in [Listing 27-2](#Chapter27.html#list_27_2).\n\n***Listing\
    \ 27-2.** Hibernate Configuration File*\n\n```\n<?xml version=\"1.0\" encoding=\"\
    utf-8\"?>\n<!DOCTYPE hibernate-configuration PUBLIC\n   \"-//Hibernate/Hibernate\
    \ Configuration DTD 3.0//EN\"\n   \"http://hibernate.sourceforge.net/hibernate-configuration-3.0.dtd\"\
    >\n<hibernate-configuration>\n   <session-factory>\n      <property name=\"connection.driver_class\"\
    >org.apache.derby.jdbc.EmbeddedDriver</property>\n      <property name=\"connection.url\"\
    >jdbc:derby:hibernate-db;create=true</property>\n      <property name=\"connection.username\"\
    >user</property>\n      <property name=\"connection.password\">password</property>\n\
    \      <property name=\"dialect\">org.hibernate.dialect.DerbyDialect</property>\n\
    \   </session-factory>\n</hibernate-configuration>\n```\n\nFirst, you define the\
    \ database class, which in this case is `org.apache.derby.jdbc.EmbeddedDriver`\
    \ for the Java DB database system. Add the URL so Hibernate can establish a connection\
    \ to your database; you already know that this is composed for the Java DB. Along\
    \ with the username and the password, which will eventually be necessary, you\
    \ have to define the SQL dialect. Hibernate provides corresponding classes for\
    \ all major database systems in the package `org.hibernate.dialect`. You can find\
    \ more information about additional configuration options from the Hibernate reference\
    \ documentation.\n\nAll this begs the question, where to put this file. Because\
    \ the data is in a separate file, you have the option of using several Hibernate\
    \ modules with different configurations. You can then either save the file in\
    \ the `src` directory of an application module or directly save it in the Hibernate\
    \ module. It is important that it is on the referring class path, because this\
    \ is where it is searched for. Optionally, as you will see later, you can define\
    \ an alternative URL to the configuration file when producing a `Configuration`\
    \ object."
