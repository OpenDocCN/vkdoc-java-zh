    `      <path orientation="horizontal" number="0" weight="1.0"/>`

    `   </constraints>`

    `   <`**`empty-behavior`** `permanent="true"/>`

    `</mode>`


    First, with the `module` attribute you define the module to which the mode belongs.
    The most important element is the `name` element. The value of the name element
    must be a unique identifier and also has to match the file name (uppercase and
    lowercase, too). Additionally, by the `kind` element you can define the way the
    mode displays its components. There are three mode types: `editor`, `view`, and
    `sliding`. [Figure 10-5](#Chapter10.html#fig_10_5) displays the appearance of
    each of the three via the NetBeans IDE.


    ![Image](images/1005.jpg)


    ***Figure 10-5.** Different types of modes*


    A mode of the type `editor` is for the most part centrally arranged in an application,
    like the `Editor` `Mode` which is specified by the Core Windows module by a *wsmode*
    file (as the name of the mode already reveals). The top components, arranged surrounding
    this editor mode, are typically displayed in modes of the type `view`.


    These windows are often also called helper windows, because they offer features
    to, for example, edit documents. Aside from differently displaying the tabs in
    the modes, the `editor` and `view` modes differ in so far as the `editor` type
    has control elements in the top-right corner for easier navigation between documents
    and the top components. Furthermore, there is also the mode of the type `sliding`.
    The window system gives you the possibility of moving or minimizing top components
    to the right, left, or bottom border of the application window. This is often
    useful when working with windows that are seldom or sporadically used. When hovering
    with the mouse above the button of the minimized top component, it opens above
    the opened windows and hides automatically again when exiting the control element.
    These windows are in a mode of the type `sliding`.


    A mode of the type `sliding` can also define the element `slidingSide`. It selects
    borders (left, right, bottom) upon which the mode will be located. Concerning
    this, the following values are allowed:


    `<slidingSide side="`**`left`**`"/>`

    `<slidingSide side="`**`right`**`"/>`

    `<slidingSide side="`**`bottom`**`"/>`


    The element `state` defines whether the mode is docked in the application window
    or undocked in a separate window. The admissible values are `joined` for the docked
    mode and `separated` for the undocked representation. For example, when a top
    component is undocked, its mode changes to `separated`.


    The `constraints` element allows the definition of dimension and position in relation
    to other modes. The preceding example would display the mode on the top border
    of the application window, for example. If it is on the bottom border, a bigger
    number (e.g., 30) is put into the attribute `number`. Since this number controls
    the position of all modes, it is helpful to take a look at the configuration files
    of the predefined modes for the NetBeans Platform. Some of them are in the module
    *Core-UI*.


    We now add this configuration file to the Platform via the module''s layer file.
    For this purpose, we refer the *.wsmode* file in the folder `Windows2/Modes` (see
    [Listing 10-10](#Chapter10.html#list_10_10)).


    ***Listing 10-10.** Adding a New Mode to the Layer File*


    `<folder name="`**`Windows2`**`">`

    `   <folder name="`**`Modes`**`">`

    `      <file name="`**`MyMode`**`.wsmode" url="MyMode.wsmode"/>`

    `      <folder name="`**`MyMode`**`">`

    `         <file name="MyTopComponent.wstcref" url="MyTopComponentWstcref.xml"/>`

    `      </folder>`

    `   </folder>`

    `</folder>`


    The top component is added to the new mode via the top component reference file
    which the wizard created. This allows for flexible declarative changes in the
    arrangement of top components. As you can see, you can flexibly change the arrangement
    of your components because of the declarative assignment.


    A top component can be maximized by double-clicking the title bar in the application
    window. By default, all other components are changed to a sliding mode. If a component
    must stay in place and not move to the border, an attribute can be added to the
    corresponding top component reference file (*.wstcref*), as follows:


    `<docking-status` maximized-mode`="docked">`


    #### Direct Docking


    It is also possible to directly dock a top component into a certain mode, as shown
    in [Listing 10-11](#Chapter10.html#list_10_11).


    ***Listing 10-11.** Programmatically Adding a Top Component to a Certain Mode*


    `TopComponent tc = new MyTopComponent();`

    **`Mode`** `m = WindowManager.getDefault().findMode("explorer");`

    `if(m != null)`

    `   m.`**`dockInto`**`(tc);`

    `tc.`**`open()`**`;`

    `tc.`**`requestActive()`**`;`


    For this purpose use the `findMode()` method of the `WindowManager` class. The
    mode is returned because of the unique name, in case it exists. With the `dockInto()`
    method you can then dock your instance to a top component directly in the mode.


    #### Modifying a Mode


    At runtime, the user retains the ability to move the top components to other modes
    or change the dimension of a mode. These changes of data are stored in the user
    directory and restored upon restarting the application. Configurations are read
    from the layer file and the module''s configuration files only if no data was
    stored in the user directory. This is why it is often helpful to clean and build
    the project (*Clean & Build Project*) when changing configuration files during
    development.


    ### Groups of Windows: Top Component Group


    Frequently, multiple windows are required at once for certain tasks. One such
    case is creating a GUI within the NetBeans IDE. The Inspector, Palette, and Properties
    windows are displayed in this case. Upon leaving the Form Editor mode, these windows
    are hidden. For this purpose, the NetBeans Platform provides the ability to assemble
    top components into a group that enables toggling the visibility of them all.
    The Window System API provides the interface `TopComponentGroup` for this purpose.
    However, a group does not change the layout of the windows, meaning the assembly
    or dimension of modes, but it is responsible for opening and closing the groups''
    windows.'
  trans: '

    ### 停靠容器：模式（Mode）


    NetBeans 平台的整个窗口系统由多个区域组成，多个组件可以以选项卡形式停靠在这些区域中。这些区域就是前面提到的编辑区和视图区。这样的一个区域被称为一个模式（mode）。然而，模式本身并不是一个显示的组件，而是作为其中所显示组件的控制器和容器。这些组件的类型是
    `TopComponent`，正如上一节所述。模式由窗口系统 API 中的 `Mode` 接口定义。


    #### 创建模式


    模式并非固定区域，而是可以通过 XML 文件单独定义。一些重要的区域（例如中央编辑区或 NetBeans IDE 通常打开项目视图的区域）已在 NetBeans
    平台模块中定义。你也可以定义并添加自己的模式。模式的配置文件结构如清单 10-9 所示。


    ***清单 10-9.** 模式配置文件：MyMode.wsmode*


    `<!DOCTYPE mode PUBLIC`

    ` "-//NetBeans//DTD Mode Properties 2.3//EN"`

    ` "http://www.netbeans.org/dtds/mode-properties2_3.dtd">`

    `<mode version="2.3">`

    `   <`**`module`** `name="com.galileo.netbeans.module" spec="1.0"/>`

    `   <`**`name`**`   unique="`**`MyMode`**`"/>`

    `   <`**`kind`**`   type="view"/>`

    `   <`**`state`**`  type="joined"/>`

    `   <`**`constraints`**`>`

    `      <path orientation="vertical" number="0" weight="0.2"/>`

    `      <path orientation="horizontal" number="0" weight="1.0"/>`

    `   </constraints>`

    `   <`**`empty-behavior`** `permanent="true"/>`

    `</mode>`


    首先，使用 `module` 属性定义该模式所属的模块。最重要的元素是 `name` 元素。`name` 元素的值必须是唯一的标识符，并且必须与文件名匹配（包括大小写）。此外，通过
    `kind` 元素可以定义模式显示其组件的方式。共有三种模式类型：`editor`、`view` 和 `sliding`。图 10-5 展示了这三种类型在
    NetBeans IDE 中的外观。


    ![Image](img/1005.jpg)


    ***图 10-5.** 不同类型的模式*


    `editor` 类型的模式通常位于应用程序的中央区域，例如由核心窗口模块通过 *wsmode* 文件（正如模式名称所示）指定的 `Editor` `Mode`。围绕此编辑器模式排列的顶层组件通常显示在
    `view` 类型的模式中。


    这些窗口通常也被称为辅助窗口，因为它们提供诸如编辑文档等功能。除了在模式中选项卡显示方式不同之外，`editor` 和 `view` 模式的区别还在于：`editor`
    类型在右上角具有控制元素，便于在文档和顶层组件之间导航。此外，还有 `sliding` 类型的模式。窗口系统允许你将顶层组件移动或最小化到应用程序窗口的右侧、左侧或底部边框。这在处理不常用或偶尔使用的窗口时通常很有用。当鼠标悬停在最小化顶层组件的按钮上时，它会打开并覆盖在其他打开的窗口之上，当鼠标离开控制元素时又会自动隐藏。这些窗口位于
    `sliding` 类型的模式中。


    `sliding` 类型的模式还可以定义 `slidingSide` 元素。它选择模式将位于的边框（左侧、右侧、底部）。关于这一点，允许使用以下值：


    `<slidingSide side="`**`left`**`"/>`

    `<slidingSide side="`**`right`**`"/>`

    `<slidingSide side="`**`bottom`**`"/>`


    `state` 元素定义模式是停靠在应用程序窗口中，还是取消停靠在一个单独的窗口中。允许的值为 `joined`（表示停靠模式）和 `separated`（表示取消停靠的表示形式）。例如，当一个顶层组件被取消停靠时，其模式会变为
    `separated`。


    `constraints` 元素允许定义相对于其他模式的尺寸和位置。例如，前面的示例会将模式显示在应用程序窗口的顶部边框上。如果它位于底部边框，则会在 `number`
    属性中放入一个更大的数字（例如 30）。由于此数字控制所有模式的位置，因此查看 NetBeans 平台预定义模式的配置文件会很有帮助。其中一些位于 *Core-UI*
    模块中。


    现在，我们通过模块的层文件将此配置文件添加到平台中。为此，我们在文件夹 `Windows2/Modes` 中引用 *.wsmode* 文件（参见清单 10-10）。


    ***清单 10-10.** 向层文件添加新模式*


    `<folder name="`**`Windows2`**`">`

    `   <folder name="`**`Modes`**`">`

    `      <file name="`**`MyMode`**`.wsmode" url="MyMode.wsmode"/>`

    `      <folder name="`**`MyMode`**`">`

    `         <file name="MyTopComponent.wstcref" url="MyTopComponentWstcref.xml"/>`

    `      </folder>`

    `   </folder>`

    `</folder>`


    通过向导创建的顶层组件引用文件，将顶层组件添加到新模式中。这允许对顶层组件的排列进行灵活的声明式更改。如你所见，由于声明式分配，你可以灵活地更改组件的排列。


    在应用程序窗口中双击标题栏可以最大化顶层组件。默认情况下，所有其他组件都会切换到滑动模式。如果某个组件必须保持原位而不移动到边框，则可以向相应的顶层组件引用文件（*.wstcref*）添加一个属性，如下所示：


    `<docking-status` maximized-mode`="docked">`


    #### 直接停靠


    也可以直接将顶层组件停靠到某个特定模式中，如清单 10-11 所示。


    ***清单 10-11.** 以编程方式将顶层组件添加到特定模式*


    `TopComponent tc = new MyTopComponent();`

    **`Mode`** `m = WindowManager.getDefault().findMode("explorer");`

    `if(m != null)`

    `   m.`**`dockInto`**`(tc);`

    `tc.`**`open()`**`;`

    `tc.`**`requestActive()`**`;`


    为此，请使用 `WindowManager` 类的 `findMode()` 方法。如果存在，该方法会根据唯一名称返回模式。然后，你可以使用 `dockInto()`
    方法将你的实例直接停靠到该模式中的顶层组件。


    #### 修改模式


    在运行时，用户保留将顶层组件移动到其他模式或更改模式尺寸的能力。这些数据更改存储在用户目录中，并在重新启动应用程序时恢复。仅当用户目录中没有存储数据时，才会从层文件和模块的配置文件中读取配置。这就是为什么在开发过程中更改配置文件时，清理并构建项目（*Clean
    & Build Project*）通常很有帮助。


    ### 窗口组：顶层组件组（Top Component Group）


    通常，某些任务需要同时使用多个窗口。在 NetBeans IDE 中创建 GUI 就是这样一个例子。在这种情况下，会显示检查器、面板和属性窗口。当离开表单编辑器模式时，这些窗口会被隐藏。为此，NetBeans
    平台提供了将顶层组件组合成一个组的功能，该组可以切换所有这些组件的可见性。窗口系统 API 为此提供了 `TopComponentGroup` 接口。然而，组不会更改窗口的布局（即模式的组合或尺寸），而是负责打开和关闭组内的窗口。

