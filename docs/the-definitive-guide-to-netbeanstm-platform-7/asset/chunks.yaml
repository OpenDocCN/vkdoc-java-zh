    ### Media Library


    In the previous section, you made use of the Favorites module provided by the
    NetBeans Platform. This module is also very good for the usage within your application,
    as a *Media Library*. The reason for this is that the user can add each file separately
    or the whole directory in a very simple manner to the Favorites module. That feature
    is not restricted to MP3 files only, but can be used to manage any file type.
    Thus, by adding the Image module from the idle cluster, for example, you can also
    manage and display covers of tracks in JPG format. Since you can bind actions
    to a particular MIME type via the layer file, you are able to work with MP3 files
    directly in the *Favorites* window. That means, for example, you can directly
    play files by merely double-clicking, or using the drag-and-drop feature to drag
    files to a separate window (e.g., a playlist). Bear in mind that the Favorites
    module or window is activated (meaning available) in your NetBeans Platform, in
    order to be able to use it. Open the *Properties* of the MP3 manager via the context
    menu and ensure that the *Favorites* module is activated in the *Libraries* category
    under the *platform* cluster.


    Now you can also change the name and the menus of the Favorites module using a
    branding module. The branding module is automatically created by the NetBeans
    IDE. You just have to adapt the desired text in the branding dialog, which you
    can open via *Branding…* in the context menu of the Platform application. You
    can search for the texts to be substituted in the *Resource Bundles* register.
