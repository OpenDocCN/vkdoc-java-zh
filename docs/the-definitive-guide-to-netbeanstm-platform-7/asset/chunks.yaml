    \ If you do not want this information you can of course create an instance yourself\
    \ via the standard constructor of `Sheet`. So, you already learned that the properties\
    \ shown can be organized in areas that can be hidden or displayed by the user\
    \ depending on their needs. The properties of such an area are managed by the\
    \ `Sheet.Set` class. You create two `Sheet.Set` objects via the factory method\
    \ `createPropertiesSet()`, in order to apply the two areas *ID3v1* and *ID3v2*.\
    \ It is important that you give a `Sheet.Set` a unique name (used for internal\
    \ management) via the `setName()` method, otherwise only the last added `Sheet.Set`\
    \ will be displayed. With the `setDisplayName()` method you determine the name\
    \ which will be used for the area as title.\n\n***Listing 19-1.** Via the Method\
    \ `createSheet()` You Can Create a `Sheet` Instance Containing the Desired Properties,\
    \ Which Will Be Displayed in the Properties Window.*\n\n```\npublic class Mp3DataNode\
    \ extends DataNode {\n   protected Sheet createSheet() {\n         Sheet s = super.createSheet();\n\
    \         Sheet.Set id3v1 = Sheet.createPropertiesSet();\n         Sheet.Set id3v2\
    \ = Sheet.createPropertiesSet();\n         id3v1.setName(\"ID3v1\");\n       \
    \  id3v1.setDisplayName(\"ID3v1\");\n         id3v2.setName(\"ID3v2\");\n    \
    \     id3v2.setDisplayName(\"ID3v2\");\n         Mp3DataObject mp3 = getLookup().lookup(Mp3DataObject.class);\n\
    \n         try {\n            Property artistProp =\n                  new PropertySupport.Reflection<String>(mp3,\
    \ String.class, \"artist\");\n            Property titleProp  =\n            \
    \      new PropertySupport.Reflection<String>(mp3, String.class, \"title\");\n\
    \            PropertySupport.Reflection<String> genreProp  =\n               \
    \   new PropertySupport.Reflection<String>(mp3, String.class, \"genre\");\n  \
    \          Property trackProp =\n                  new PropertySupport.Reflection<Integer>(mp3,\
    \ Integer.class, \"getTrack\", null);\n\n            artistProp.setName(\"Artist\"\
    );\n            titleProp.setName(\"Title\");\n            genreProp.setName(\"\
    Genre\");\n            trackProp.setName(\"Track\");\n            id3v1.put(artistProp);\n\
    \            id3v1.put(titleProp);\n            id3v1.put(genreProp);\n      \
    \      id3v2.put(trackProp);\n         } catch (NoSuchMethodException ex) {\n\
    \            ex.printStackTrace();\n         }\n         s.put(id3v1);\n     \
    \    s.put(id3v2);\n         return s;\n      }\n}\n```\n\nYou gain access to\
    \ the data object, meaning the MP3 file, which provides the features, via the\
    \ `Lookup`. Then you create an object for each property, making sure to distinguish\
    \ between properties that can be changed by the user and read-only properties.\
    \ For the features that the user will be able to change in the *Properties* window,\
    \ you create a `PropertySupport.Reflection` instance with the corresponding type,\
    \ in this case `String`. As first parameter you pass the data object; as second\
    \ parameter, pass the data type of the property; and as third parameter, you pass\
