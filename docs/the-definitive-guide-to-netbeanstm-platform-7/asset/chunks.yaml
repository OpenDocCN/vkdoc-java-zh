    ### Asynchronous Initialization of Graphical Components


    When developing graphical user interfaces, it is important to achieve a fast response
    time. This is especially true for the initialization phase of components, which
    need to be initialized in a dialog with the user. A good example of this is wizards,
    discussed in [Chapter 13](#Chapter13.html#ch13). If the user starts a wizard,
    the wizard should open and be available immediately. But often data for components
    (such as a combo box) needs to load from a relatively slow data source or must
    be calculated and composed from dependent data. In this case, initialize your
    components in a separate thread asynchronously to the remaining initialization
    of the user interface. When doing so, take care not to access GUI components from
    outside the event dispatch thread (EDT).


    The NetBeans *Utilities API* provides an easy way to meet this requirement with
    the service provider interface `AsyncGUIJob`. This interface specifies two methods
    to help initialize components asynchronously. The `construct()` method is executed
    automatically in a separate thread, so the EDT is not blocked. This lets you load
    data or perform other long-running initializations without performance being affected.
    Do not access GUI components in the `construct()` method, however. As soon as
    the `construct()` method has returned, the `finished()` method is called. As it
    is called from the Event Dispatch Thread you can add data previously loaded in
    the `construct()` method to the GUI components. In the example in [Listing 15-3](#Chapter15.html#list_15_3),
    data is added (loaded in `construct()`) to a `DefaultComboBoxModel`. After loading,
    you add the created data model to the `JComboBox` within the `finished()` method.
    This asynchronous process is started and connected to the component using the
    method `Utilities.attachInitJob()`. This way, independent jobs can be defined
    and started for various components.


    ***Listing 15-3.** Asynchronously Initializing Graphical Components Using the
    AsyncGUIJob Interface*


    `public final class AsynchTopComponent extends TopComponent {`

    `   private JComboBox items = new JComboBox(new String[] { "Loading..." });`

    `   private DefaultComboBoxModel m = new DefaultComboBoxModel();`


    `   private AsynchTopComponent() {`

    `      initComponents();`

    **`Utilities.attachInitJob`**`(items,` **`new AsyncGUIJob`**`(){`

    `public void` **`construct`**`() {`

    `            // long lasting loading of data`

    `            for(int i = 0; i < 20; i++) {`

    `               Thread.sleep(200);`

    `               m.addElement("Item " + i);`

    `            }`

    `         }`


    `public void` **`finished`**`() {`

    `            items.setModel(m);`

    `         }`

    `      });`

    `   }`

    `}`


    Another possibility for asynchronously initializing GUI components is the `SwingWorker`
    class of the Java Platform. It is an abstract class, initializing components in
    almost the same way as via the `AsyncGUIJob` interface. Using the `SwingWorker`
    class, the previous example with `AsyncGUIJob` looks like [Listing 15-4](#Chapter15.html#list_15_4).


    ***Listing 15-4.** Asynchronously Initializing Graphic Components Using the SwingWorker
    Class*


    **`SwingWorker`**`<DefaultComboBoxModel, String> worker =`

    `new` **`SwingWorker`**`<DefaultComboBoxModel, String>() {`


    `   @Override`

    `protected DefaultComboBoxModel` **`doInBackground()`** `throws Exception {`

    `      // long lasting loading of data`

    `      for(int i = 0; i < 20; i++) {`

    `         Thread.sleep(200);`

    `         m.addElement(new String("Item " + i));`

    `      }`

    **`return m;`**

    `   }`


    `   @Override`

    `protected void` **`done()`** `{`

    `      try {`

    `         items.setModel(`**`get()`**`);`

    `      } catch (Exception ignore) {}`

    `   }`

    `};`


    `worker.`**`execute()`**`;`'
