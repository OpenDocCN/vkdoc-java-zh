    在清单 42-16 所示的测试类 `MyTopComponentTest` 中，你使用 `NbModuleSuite.allModules()` 方法创建了一个包装测试实例。系统会自动使用一个配置，在该配置中，应用程序的所有集群和模块都处于活动状态。此外，你通过
    `testSetValue()` 和 `testGetValue()` 实现了两个测试（所有以 `test` 前缀开头的方法都会作为测试执行）。通过 `allModules()`
    方法，你指定了这两个测试用例，以确保它们的执行顺序。


    通过 Jelly Tools Platform 模块中 `TopComponentOperator` 类型的实例，你可以按名称访问 `TopComponent`（另请参见清单
    42-16）。你创建一个 `JTextFieldOperator` 实例，以便能够向文本字段中输入内容。你将 `TopComponentOperator`
    作为容器传递。你可以设置一个测试值，并通过 *OK* 按钮保存设置。这些设置可以通过 `JButtonOperator` 类完成。最后，你通过 `close()`
    方法关闭窗口。


    在第二个测试中，你首先需要在应用程序的主菜单中打开窗口。你可以使用 `MainWindowOperator` 来访问它。`MainWindowOperator`
    能够通过指定的路径调用菜单项。请记住，与之前的测试类似，你需要访问文本字段。这次，你读取文本并将其与之前设置的值进行比较。


    表 42-1 列出了 Jelly Tools Platform 模块中可用的操作符类选择。Jemmy 库为所有标准的 Swing 和 AWT 组件提供了操作符类。在开发独立的功能测试用例时，查看相应的
    API 文档无疑会有所帮助。


    ![Image](img/t4201.jpg)


    ![Image](img/t4201a.jpg)


    #### 检查测试覆盖率


    即使对于功能测试，也可以通过 Cobertura 创建关于测试覆盖率的报告（另请参见*检查测试覆盖率*一节）。为此，请使用 Ant 目标 *coverage-report-qa-functional*。执行测试并创建报告后，你可以从目录
    *build\test\qa-functional\cobertura-report* 调用该 Ant 目标。


    ### Maven 项目中的配置


    为基于 Maven 的 NetBeans Platform 应用程序实现测试的方式与*单元测试*和*功能 GUI 测试*两节中描述的方式相同，唯一的区别在于配置，我们接下来将对此进行探讨。


    #### 模块测试


    运行软件测试是 Maven 构建生命周期中不可或缺的一部分。因此，构建阶段 *test* 在 *compile* 之后、*package* 创建实际构件之前执行。这些测试由
    *Maven Surefire Plugin* 运行。该插件会自动运行位于 *src/test/java* 下的测试用例。通过依赖项条目，可以定义使用的 JUnit
    版本。因此，在应用基于 Maven 的 NetBeans Platform 应用程序项目时，父 POM 文件中已经添加了（如清单 42-17 所示的）条目。


    ***清单 42-17.** 指定 JUnit 版本*


    `<dependencies>`

    `   <`**`dependency`**`>`

    `      <groupId>`**`junit`**`</groupId>`

    `      <artifactId>junit</artifactId>`

    `      <version>4.8.2</version>`

    `      <scope>`**`test`**`</scope>`

    `   </`**`dependency`**`>`

    `</dependencies>`


    将此条目写入父 POM 文件后，它将自动提供给所有模块。这意味着无需进一步配置。


    模块测试可以通过 NetBeans IDE 中的向导创建，如*常规测试*一节所述。如果你想使用 JUnit 扩展来实现测试用例，请将清单 42-18 所示的条目添加到相应模块的
    POM 文件中，如果其余模块也使用此模块，则添加到父 POM 文件中。


    ***清单 42-18**. 向 NB JUnit 模块添加依赖项*


    `<dependency>`

    `   <groupId>org.netbeans.api</groupId>`

    `   <artifactId>org-netbeans-modules-nbjunit</artifactId>`

    `   <version>${netbeans.version}</version>`

    `   <scope>test</scope>`

    `</dependency>`


    #### 功能测试


    功能 GUI 测试也可以在基于 Maven 的 NetBeans Platform 应用程序中与 Jelly Tools Platform 模块结合实现和运行。为此，请向应用程序模块（具有
    *nbm-application* 打包类型的模块；请参见第 37 章）添加对 Jelly Tools Platform 模块的依赖项，如清单 42-19
    所示。添加对 NB JUnit 模块的依赖项。这两个模块所需的模块（即传递性依赖项）将由 Maven 自动添加到类路径中。


    ***清单 42-19.** 为功能测试添加依赖项*


    `<dependencies>`

    `   <dependency>`

    `      <groupId>org.netbeans.api</groupId>`

    `      <artifactId>org-netbeans-modules-nbjunit</artifactId>`

    `      <version>${netbeans.version}</version>`

    `      <scope>test</scope>`

    `   </dependency>`

    `   <dependency>`

    `      <groupId>org.netbeans.api</groupId>`

    `      <artifactId>org-netbeans-modules-jellytools-platform</artifactId>`

    `      <version>${netbeans.version}</version>`

    `      <scope>test</scope>`

    `   </dependency>`

    `</dependencies>`


    此外，你必须通过属性 `cluster.path.final` 配置 Maven Surefire 插件。这样，你就可以定义自己的集群和 NetBeans
    Platform 集群。你也在应用程序项目的 POM 文件中执行此操作，如清单 42-20 所示。


    ***清单 42-20.** 为运行功能测试配置 Surefire 插件*


    `<`**`build`**`>`

    `   <`**`plugins`**`>`

    `      <`**`plugin`**`>`

    `         <groupId>org.apache.maven.plugins</groupId>`

    `         <artifactId>`**`maven-surefire-plugin`**`</artifactId>`

    `         <version>2.7.1</version>`

    `         <configuration>`

    `            <systemProperties>`

    `               <property>`

    `                  <name>`**`cluster.path.final`**`</name>`

    `                  <value>${project.build.directory}/`

    `                     ${brandingToken}/${brandingToken}:`

    `                     ${project.build.directory}/`

    `                     ${brandingToken}/platform</value>`

    `               </property>`

    `            </systemProperties>`

    `         </configuration>`

    `      </plugin>`

    `   </plugins>`

    `</build>`


    因此，你现在甚至可以在基于 Maven 的项目中实现功能 GUI 测试，正如*实现测试用例*一节中已经描述的那样。只需将其存储在模块测试目录 *src/test/java*
    下即可。

