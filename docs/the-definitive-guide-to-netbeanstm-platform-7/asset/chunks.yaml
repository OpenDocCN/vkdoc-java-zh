- fmt: "# Creating NetBeans Platform Modules\n\nAfter creating a Maven-based NetBeans\
    \ Platform application project with the command line without any development environment\
    \ in the section *Creating a NetBeans Platform Application*, you now want to add\
    \ an application module to it. An archetype is provided for creating a module;\
    \ the good thing about this is that the relationship is made automatically. That\
    \ means the module is automatically added to the NetBeans Platform application\
    \ project when creating it in its basic directory (see [Listing 37-7](#Chapter37.html#list_37_7)).\n\
    \n***Listing 37-7.** Maven Parameter for Creating a NetBeans Platform Module Project\
    \ with the Command Line*\n\n```\n> mvn\n-DarchetypeArtifactId=nbm-archetype\n\
    -DarchetypeGroupId=org.codehaus.mojo.archetypes\n-DarchetypeVersion=1.7-DartifactId=MyModule\n\
    -DgroupId=com.galileo.netbeans\n-Dversion=1.0-SNAPSHOT\n-DnetbeansVersion=RELEASE70\n\
    -Dpackage=com.galileo.netbeans.mymodule\n--batch-mode\narchetype:generate\n```\n\
    \nIn contrast to creating a Platform application project, in this case you use\
    \ the `nbm` archetype. The parameters match the parameters already described in\
    \ [Listing 37-5](#Chapter37.html#list_37_5). Just indicate the artifact ID, the\
    \ group ID, and the version for the module to create. You can optionally define\
    \ the NetBeans version to use and the package to be set as base for this module.\n\
    \nNow let's take a look at the POM file that was produced for this module. At\
    \ the beginning, the link to the parent POM file is established by the `parent`\
    \ element. Consequently, this file inherits the settings of the parent POM file,\
    \ so it is no longer necessary to define the NetBeans Maven repository or a special\
    \ Java version, for example. Thus, the configuration file remains small and is\
    \ easy to maintain. `nbm` is used as `packaging` type, so when the module is created,\
    \ a NetBeans module is created. In this module POM file, the JAR plugin is furthermore\
    \ instructed by the `useDefaultManifestFile` element to use the already existing\
    \ manifest.\n\n```\n<project ... >\n   <modelVersion>4.0.0</modelVersion>\n  \
    \ <parent>\n      <artifactId>MyApplication</artifactId>\n      <groupId>com.galileo.netbeans</groupId>\n\
    \      <version>1.0-SNAPSHOT</version>\n   </parent>\n   <groupId>com.galileo.netbeans</groupId>\n\
    \   <artifactId>MyModule</artifactId>\n   <version>1.0-SNAPSHOT</version>\n  \
    \ <packaging>nbm</packaging>\n   <name>MyModule NetBeans Module</name>\n   <properties>\
    \ ... </properties>\n   <dependencies>\n      <dependency>\n         <groupId>org.netbeans.api</groupId>\n\
    \         <artifactId>org-netbeans-api-annotations-common</artifactId>\n     \
    \    <version>${netbeans.version}</version>\n      </dependency>\n   </dependencies>\n\
    \   <build>\n      <plugins>\n         <plugin>\n            <groupId>org.apache.maven.plugins</groupId>\n\
    \            <artifactId>maven-jar-plugin</artifactId>\n            <version>2.3.1</version>\n\
    \            <configuration>\n               <useDefaultManifestFile>true</useDefaultManifestFile>\n\
    \            </configuration>\n         </plugin>\n         ...\n      </plugins>\n\
    \   </build>\n</project>\n```\n\nThe module was automatically added to the parent\
    \ POM file, so the module belongs to the whole NetBeans Platform application project.\
    \ For this purpose, the parent POM file was adapted as follows:\n\n```\n<modules>\n\
    \   <module>branding</module>\n   <module>application</module>\n   <module>MyModule</module>\n\
    </modules>\n```\n\n## Make Packages Public\n\nAs already mentioned, a NetBeans\
    \ module must explicitly define packages as public whose classes are to be made\
    \ available to other modules. You have to configure the NetBeans Maven Plugin\
    \ to make packages of a Maven-based NetBeans module public. For this purpose the\
    \ plugin provides the element `publicPackages`.\n\nIn [Listing 37-8](#Chapter37.html#list_37_8)\
    \ the package `com.galileo.netbeans.api` is made public for other modules. Consequently,\
    \ another module can now define a dependency and use classes out of this public\
    \ package. Further packages can be defined with any number of `publicPackage`\
    \ elements.\n\n***Listing 37-8.** Definining the Public Packages of a NetBeans\
    \ Module*\n\n```\n<plugin>\n   <groupId>org.codehaus.mojo</groupId>\n   <artifactId>nbm-maven-plugin</artifactId>\n\
    \   <version>3.5</version>\n   <extensions>true</extensions>\n   <configuration>\n\
    \      <publicPackages>\n         <publicPackage>com.galileo.netbeans.api</publicPackage>\n\
    \      </publicPackages>\n   </configuration>\n</plugin>\n```\n\n## Adding Dependencies\n\
    \nDependencies between different modules are defined in Maven in the POM file\
    \ under `dependencies`. If you want to define a dependency on a certain version\
    \ of a module, define the artifact ID, the group ID, and a version (optionally).\
    \ If no version is indicated, the most recently used version is found by meta\
    \ data in the Maven repository. To add a dependency on the module *MyModule2*\
    \ to the NetBeans module *MyModule* extend the entry shown in [Listing 37-9](#Chapter37.html#list_37_9)\
    \ in the POM file.\n\n***Listing 37-9.** Definition of a Dependency Between MyModule\
    \ and MyModule2*\n\n```\n<dependencies>\n   <dependency>\n      <groupId>com.galileo.netbeans</groupId>\n\
    \      <artifactId>MyModule2</artifactId>\n      <version>2.0</version>\n   </dependency>\n\
    </dependencies>\n```\n\n## Creating and Executing the Application\n\nFinally,\
    \ the question remains how to create the application as a whole and how to execute\
    \ it as a NetBeans Platform application. For creating the whole application, use\
    \ the standard Maven build phase *install*. All sources are compiled, tests are\
    \ executed (if existing), the modules are packed and, finally, the whole application\
    \ is copied in the local repository. Execute this build phase on the parent POM\
    \ file:\n\n```\nD:\\NetBeans\\Maven\\MyApplication>mvn install\n```\n\nThe goals\
    \ of the NetBeans Maven plugin, which are listed in Table 37-1, are automatically\
    \ connected by this build phase (or with the build phase *package*). To this end,\
    \ a look on the web site of the plugin will be very helpful: [`http://mojo.codehaus.org/nbm-maven-plugin/plugin-info.html`](http://mojo.codehaus.org/nbm-maven-plugin/plugin-info.html).\
    \ There, you find the parameters of the separate goals that are provided. This\
    \ way you can adapt the build process to your special needs.\n\n![Image](images/t3701.jpg)\n\
    \nAfter creating the application with `mvn install` you can now start the application\
    \ with `mvn nbm:run-platform`. Please note that this goal can only be used on\
    \ POM files with the packaging type *nbm-application*. That means you have to\
    \ change into the directory of the standard application modules to execute the\
    \ application:\n\n```\nD:\\NetBeans\\Maven\\MyApplication\\application>mvn nbm:run-platform\n\
    ```\n\nAdditionally, the goals listed in [Table 37-2](#Chapter37.html#tab_37_1)\
    \ are provided. They can be called in explicitly.\n\n![Image](images/t3702.jpg)\n\
    \n![Image](images/t3702a.jpg)\n\nWith all this you have now installed, created,\
    \ and executed a NetBeans Platform application without the NetBeans IDE. This\
    \ mainly shows that the NetBeans IDE is not necessary for developing a NetBeans\
    \ Platform-based application. Using alternative development environments is enormously\
    \ simplified by Maven. Chapters 38 and 40 will look at developing a NetBeans Platform\
    \ application within the Eclipse and IntellJ IDEA IDE.\n\n## Summary\n\nMaven\
    \ is now an integral part of the NetBeans Platform. So besides Ant, not only an\
    \ alternative build system is provided, but also a perfect opportunity to work\
    \ independently of the NetBeans IDE. In this chapter you learned how to work with\
    \ Maven projects within the NetBeans IDE. You also learned how you can you use\
    \ Maven to create and build NetBeans Platform applications from the command line\
    \ without the NetBeans IDE.\n\n# C H A P T E R  38"
  raw: '#### Creating NetBeans Platform Modules


    After creating a Maven-based NetBeans Platform application project with the command
    line without any development environment in the section *Creating a NetBeans Platform
    Application*, you now want to add an application module to it. An archetype is
    provided for creating a module; the good thing about this is that the relationship
    is made automatically. That means the module is automatically added to the NetBeans
    Platform application project when creating it in its basic directory (see [Listing
    37-7](#Chapter37.html#list_37_7)).


    ***Listing 37-7.** Maven Parameter for Creating a NetBeans Platform Module Project
    with the Command Line*


    `>`**`mvn`**

    `-DarchetypeArtifactId=`**`nbm-archetype`**

    `-DarchetypeGroupId=org.codehaus.mojo.archetypes`

    `-DarchetypeVersion=1.7-DartifactId=MyModule`

    `-DgroupId=com.galileo.netbeans`

    `-Dversion=1.0-SNAPSHOT`

    `-DnetbeansVersion=RELEASE70`

    `-Dpackage=com.galileo.netbeans.mymodule`

    `--batch-mode`

    **`archetype:generate`**


    In contrast to creating a Platform application project, in this case you use the
    `nbm` archetype. The parameters match the parameters already described in [Listing
    37-5](#Chapter37.html#list_37_5). Just indicate the artifact ID, the group ID,
    and the version for the module to create. You can optionally define the NetBeans
    version to use and the package to be set as base for this module.


    Now let''s take a look at the POM file that was produced for this module. At the
    beginning, the link to the parent POM file is established by the parent element.
    Consequently, this file inherits the settings of the parent POM file, so it is
    no longer necessary to define the NetBeans Maven repository or a special Java
    version, for example. Thus, the configuration file remains small and is easy to
    maintain. *nbm* is used as `packaging` type, so when the module is created, a
    NetBeans module is created. In this module POM file, the JAR plugin is furthermore
    instructed by the `useDefaultManifestFile` element to use the already existing
    manifest.


    `<project ... >`

    `   <modelVersion>4.0.0</modelVersion>`

    `   <`**`parent`**`>`

    `      <artifactId>MyApplication</artifactId>`

    `      <groupId>com.galileo.netbeans</groupId>`

    `      <version>1.0-SNAPSHOT</version>`

    `   </`**`parent`**`>`

    `   <groupId>com.galileo.netbeans</groupId>`

    `   <artifactId>MyModule</artifactId>`

    `   <version>1.0-SNAPSHOT</version>`

    `   <packaging>`**`nbm`**`</packaging>`

    `   <name>MyModule NetBeans Module</name>`

    `   <properties> ... </properties>`

    `   <`**`dependencies`**`>`

    `      <dependency>`

    `         <groupId>org.netbeans.api</groupId>`

    `         <artifactId>org-netbeans-api-annotations-common</artifactId>`

    `         <version>${netbeans.version}</version>`

    `      </dependency>`

    `   </`**`dependencies`**`>`

    `   <build>`

    `      <plugins>`

    `         <plugin>`

    `            <groupId>org.apache.maven.plugins</groupId>`

    `            <artifactId>maven-jar-plugin</artifactId>`

    `            <version>2.3.1</version>`

    `            <configuration>`

    `               <`**`useDefaultManifestFile`**`>true</`**`useDefaultManifestFile`**`>`

    `            </configuration>`

    `         </plugin>`

    `         ...`

    `      </plugins>`

    `   </build>`

    `</project>`


    The module was automatically added to the parent POM file, so the module belongs
    to the whole NetBeans Platform application project. For this purpose, the parent
    POM file was adapted as follows:


    `<modules>`

    `   <module>branding</module>`

    `   <module>application</module>`

    **`   <module>MyModule</module>`**

    `</modules>`


    #### Make Packages Public


    As already mentioned, a NetBeans module must explicitly define packages as public
    whose classes are to be made available to other modules. You have to configure
    the NetBeans Maven Plugin to make packages of a Maven-based NetBeans module public.
    For this purpose the plugin provides the element `publicPackages`.


    In [Listing 37-8](#Chapter37.html#list_37_8) the package `com.galileo.netbeans.api`
    is made public for other modules. Consequently, another module can now define
    a dependency and use classes out of this public package. Further packages can
    be defined with any number of `publicPackage` elements.


    ***Listing 37-8.** Definining the Public Packages of a NetBeans Module*


    `<plugin>`

    `   <groupId>org.codehaus.mojo</groupId>`

    `   <artifactId>nbm-maven-plugin</artifactId>`

    `   <version>3.5</version>`

    `   <extensions>true</extensions>`

    `   <configuration>`

    `      <`**`publicPackages`**`>`

    `         <`**`publicPackage`**`>com.galileo.netbeans.api</`**`publicPackage`**`>`

    `      </`**`publicPackages`**`>`

    `   </configuration>`

    `</plugin>`


    #### Adding Dependencies


    Dependencies between different modules are defined in Maven in the POM file under
    `dependencies`. If you want to define a dependency on a certain version of a module,
    define the artifact ID, the group ID, and a version (optionally). If no version
    is indicated, the most recently used version is found by meta data in the Maven
    repository. To add a dependency on the module *MyModule2* to the NetBeans module
    *MyModule* extend the entry shown in [Listing 37-9](#Chapter37.html#list_37_9)
    in the POM file.


    ***Listing 37-9.** Definition of a Dependency Between MyModule and MyModule2*


    `<dependencies>`

    `   <`**`dependency`**`>`

    `      <groupId>com.galileo.netbeans</groupId>`

    `      <artifactId>MyModule2</artifactId>`

    `      <version>2.0</version>`

    `   </`**`dependency`**`>`

    `</dependencies>`


    #### Creating and Executing the Application


    Finally, the question remains how to create the application as a whole and how
    to execute it as a NetBeans Platform application. For creating the whole application,
    use the standard Maven build phase *install*. All sources are compiled, tests
    are executed (if existing), the modules are packed and, finally, the whole application
    is copied in the local repository. Execute this build phase on the parent POM
    file:


    `D:\NetBeans\Maven\MyApplication>`**`mvn install`**


    The goals of the NetBeans Maven plugin, which are listed in Table 37-1, are automatically
    connected by this build phase (or with the build phase *package*). To this end,
    a look on the web site of the plugin will be very helpful: [`http://mojo.codehaus.org/nbm-maven-plugin/plugin-info.html`](http://mojo.codehaus.org/nbm-maven-plugin/plugin-info.html).
    There, you find the parameters of the separate goals that are provided. This way
    you can adapt the build process to your special needs.


    ![Image](images/t3701.jpg)


    After creating the application with `mvn install` you can now start the application
    with `mvn nbm:run-platform`. Please note that this goal can only be used on POM
    files with the packaging type *nbm-application*. That means you have to change
    into the directory of the standard application modules to execute the application:


    `D:\NetBeans\Maven\MyApplication\application>`**`mvn nbm:run-platform`**


    Additionally, the goals listed in [Table 37-2](#Chapter37.html#tab_37_1) are provided.
    They can be called in explicitly.


    ![Image](images/t3702.jpg)


    ![Image](images/t3702a.jpg)


    With all this you have now installed, created, and executed a NetBeans Platform
    application without the NetBeans IDE. This mainly shows that the NetBeans IDE
    is not necessary for developing a NetBeans Platform-based application. Using alternative
    development environments is enormously simplified by Maven. Chapters 38 and 40
    will look at developing a NetBeans Platform application within the Eclipse and
    IntellJ IDEA IDE.


    ### Summary


    Maven is now an integral part of the NetBeans Platform. So besides Ant, not only
    an alternative build system is provided, but also a perfect opportunity to work
    independently of the NetBeans IDE. In this chapter you learned how to work with
    Maven projects within the NetBeans IDE. You also learned how you can you use Maven
    to create and build NetBeans Platform applications from the command line without
    the NetBeans IDE.


    ## C H A P T E R  38'
  trans: '

    #### 创建 NetBeans 平台模块


    在*创建 NetBeans 平台应用程序*一节中，通过命令行且不借助任何开发环境创建了一个基于 Maven 的 NetBeans 平台应用程序项目后，现在您希望为其添加一个应用程序模块。系统提供了一个用于创建模块的原型；这样做的好处是，模块与项目的关系会自动建立。这意味着，当在其基本目录中创建模块时，该模块会自动添加到
    NetBeans 平台应用程序项目中（参见清单 37-7）。


    ***清单 37-7.** 使用命令行创建 NetBeans 平台模块项目的 Maven 参数*


    `>`**`mvn`**

    `-DarchetypeArtifactId=`**`nbm-archetype`**

    `-DarchetypeGroupId=org.codehaus.mojo.archetypes`

    `-DarchetypeVersion=1.7-DartifactId=MyModule`

    `-DgroupId=com.galileo.netbeans`

    `-Dversion=1.0-SNAPSHOT`

    `-DnetbeansVersion=RELEASE70`

    `-Dpackage=com.galileo.netbeans.mymodule`

    `--batch-mode`

    **`archetype:generate`**


    与创建平台应用程序项目不同，此处您使用的是 `nbm` 原型。这些参数与清单 37-5 中已描述的参数一致。只需指定要创建的模块的 artifact ID、group
    ID 和版本。您还可以选择性地定义要使用的 NetBeans 版本以及作为此模块基础的包。


    现在，让我们看一下为此模块生成的 POM 文件。首先，通过 `parent` 元素建立了与父 POM 文件的链接。因此，该文件继承了父 POM 文件的设置，从而无需再定义
    NetBeans Maven 仓库或特定的 Java 版本等。这样，配置文件保持小巧且易于维护。`nbm` 被用作 `packaging` 类型，因此在创建模块时，会生成一个
    NetBeans 模块。在此模块的 POM 文件中，还通过 `useDefaultManifestFile` 元素指示 JAR 插件使用已有的清单文件。


    `<project ... >`

    `   <modelVersion>4.0.0</modelVersion>`

    `   <`**`parent`**`>`

    `      <artifactId>MyApplication</artifactId>`

    `      <groupId>com.galileo.netbeans</groupId>`

    `      <version>1.0-SNAPSHOT</version>`

    `   </`**`parent`**`>`

    `   <groupId>com.galileo.netbeans</groupId>`

    `   <artifactId>MyModule</artifactId>`

    `   <version>1.0-SNAPSHOT</version>`

    `   <packaging>`**`nbm`**`</packaging>`

    `   <name>MyModule NetBeans 模块</name>`

    `   <properties> ... </properties>`

    `   <`**`dependencies`**`>`

    `      <dependency>`

    `         <groupId>org.netbeans.api</groupId>`

    `         <artifactId>org-netbeans-api-annotations-common</artifactId>`

    `         <version>${netbeans.version}</version>`

    `      </dependency>`

    `   </`**`dependencies`**`>`

    `   <build>`

    `      <plugins>`

    `         <plugin>`

    `            <groupId>org.apache.maven.plugins</groupId>`

    `            <artifactId>maven-jar-plugin</artifactId>`

    `            <version>2.3.1</version>`

    `            <configuration>`

    `               <`**`useDefaultManifestFile`**`>true</`**`useDefaultManifestFile`**`>`

    `            </configuration>`

    `         </plugin>`

    `         ...`

    `      </plugins>`

    `   </build>`

    `</project>`


    该模块已自动添加到父 POM 文件中，因此该模块属于整个 NetBeans 平台应用程序项目。为此，父 POM 文件进行了如下调整：


    `<modules>`

    `   <module>branding</module>`

    `   <module>application</module>`

    **`   <module>MyModule</module>`**

    `</modules>`


    #### 公开包


    如前所述，NetBeans 模块必须明确地将那些类需要提供给其他模块使用的包声明为公开。您需要配置 NetBeans Maven 插件，以使基于 Maven
    的 NetBeans 模块的包变为公开。为此，该插件提供了 `publicPackages` 元素。


    在清单 37-8 中，包 `com.galileo.netbeans.api` 被设置为对其他模块公开。因此，另一个模块现在可以定义一个依赖关系，并使用这个公开包中的类。可以使用任意数量的
    `publicPackage` 元素来定义更多的包。


    ***清单 37-8.** 定义 NetBeans 模块的公开包*


    `<plugin>`

    `   <groupId>org.codehaus.mojo</groupId>`

    `   <artifactId>nbm-maven-plugin</artifactId>`

    `   <version>3.5</version>`

    `   <extensions>true</extensions>`

    `   <configuration>`

    `      <`**`publicPackages`**`>`

    `         <`**`publicPackage`**`>com.galileo.netbeans.api</`**`publicPackage`**`>`

    `      </`**`publicPackages`**`>`

    `   </configuration>`

    `</plugin>`


    #### 添加依赖关系


    不同模块之间的依赖关系在 Maven 的 POM 文件中通过 `dependencies` 元素定义。如果您想定义对某个特定版本模块的依赖，请指定 artifact
    ID、group ID 和版本（可选）。如果未指定版本，Maven 仓库中的元数据将用于查找最近使用的版本。要向 NetBeans 模块 *MyModule*
    添加对模块 *MyModule2* 的依赖，请在 POM 文件中扩展清单 37-9 所示的条目。


    ***清单 37-9.** MyModule 与 MyModule2 之间依赖关系的定义*


    `<dependencies>`

    `   <`**`dependency`**`>`

    `      <groupId>com.galileo.netbeans</groupId>`

    `      <artifactId>MyModule2</artifactId>`

    `      <version>2.0</version>`

    `   </`**`dependency`**`>`

    `</dependencies>`


    #### 创建并执行应用程序


    最后，问题仍然是如何整体创建应用程序以及如何将其作为 NetBeans 平台应用程序来执行。要创建整个应用程序，请使用标准的 Maven 构建阶段 *install*。所有源代码将被编译，测试将被执行（如果存在），模块将被打包，最后整个应用程序将被复制到本地仓库中。在父
    POM 文件上执行此构建阶段：


    `D:\NetBeans\Maven\MyApplication>`**`mvn install`**


    表 37-1 中列出的 NetBeans Maven 插件的目标会自动与此构建阶段（或与构建阶段 *package*）关联。为此，查看插件的网站会非常有帮助：[`http://mojo.codehaus.org/nbm-maven-plugin/plugin-info.html`](http://mojo.codehaus.org/nbm-maven-plugin/plugin-info.html)。在那里，您可以找到所提供的各个目标的参数。这样，您就可以根据特殊需求调整构建过程。


    ![图片](img/t3701.jpg)


    使用 `mvn install` 创建应用程序后，您现在可以使用 `mvn nbm:run-platform` 启动应用程序。请注意，此目标只能在打包类型为
    *nbm-application* 的 POM 文件上使用。这意味着您需要切换到标准应用程序模块的目录来执行应用程序：


    `D:\NetBeans\Maven\MyApplication\application>`**`mvn nbm:run-platform`**


    此外，还提供了表 37-2 中列出的目标。它们可以被显式调用。


    ![图片](img/t3702.jpg)


    ![图片](img/t3702a.jpg)


    至此，您已经无需 NetBeans IDE 即可安装、创建并执行一个 NetBeans 平台应用程序。这主要表明，开发基于 NetBeans 平台的应用程序并不一定需要
    NetBeans IDE。使用 Maven 极大地简化了使用替代开发环境的过程。第 38 章和第 40 章将介绍在 Eclipse 和 IntelliJ IDEA
    IDE 中开发 NetBeans 平台应用程序。


    ### 总结


    Maven 现在已成为 NetBeans 平台不可或缺的一部分。因此，除了 Ant 之外，不仅提供了另一种构建系统，还提供了一个独立于 NetBeans IDE
    进行工作的绝佳机会。在本章中，您学习了如何在 NetBeans IDE 中使用 Maven 项目。您还学习了如何在不使用 NetBeans IDE 的情况下，通过命令行使用
    Maven 创建和构建 NetBeans 平台应用程序。


