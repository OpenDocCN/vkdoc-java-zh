    ### System Tray Integration


    The Java Platform includes enhanced desktop integration and provides access to
    the system tray of the underlying operating system. You can add one or more icons
    which can be equipped with a context menu as well as with a double-click action.
    A good way to do this for a NetBeans Platform application is with the `restored()`
    method of the module installer. First, check whether the operating system has
    a system tray. If so, you get access to it with the `getSystemTray()` method.
    To add a context menu, create a `PopupMenu` whose actions are defined via an extension
    point in the layer file (thus, you are able to add actions to the tray icon from
    different modules). Call this extension point `TrayMenu` and read out its content
    by a `Lookup`. The actions only need to implement the `Action` corresponding to
    the `ActionListener` interface and are registered in the usual way. For example,
    an action might look like [Listing 15-1](#Chapter15.html#list_15_1).


