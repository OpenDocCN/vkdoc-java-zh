    ### Summary


    The palette module of the NetBeans IDE is concerned with the management and graphic
    display of components, in order to facilitate quick access. In this chapter you
    learned how to define palette entries in the layer file. Additionally you implemented
    an example to create a specific node class that represents palette items. In this
    example you also saw how easy it is to implement drag-and-drop support for your
    own palette items.


    ## PART 4


    ## Use & Extend: Advanced APIs of the NetBeans Platform & ID


    ## C H A P T E R  22


    ## Palette API


    In [Chapter 21](#Chapter21.html#ch21), you created a palette. From this palette
    you could drag music albums on the top component (which you implemented yourself)
    via drag-and-drop. As indicated, it is also possible to register a palette for
    a certain file type. This means that when a file of this type is opened in the
    NetBeans editor, the palette registered for this type is automatically opened.
    The following example will show how this actually works.


    Let''s assume you want to provide a palette for manifest files (*.mf*) (see [Figure
    22-1](#Chapter22.html#fig_22_1)). First you define the items, which will be provided
    on the palette, each with an XML file and a class. Then you register this item
    in the layer file. Afterwards, you implement a class that creates a palette for
    the already defined and registered items. Finally, you register this class in
    the layer file for the manifest file type.


