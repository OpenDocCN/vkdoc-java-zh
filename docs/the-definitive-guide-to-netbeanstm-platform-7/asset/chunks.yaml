    #### 创建面板


    向导的骨架是在 NetBeans IDE 中创建的。转到 *文件 ![Image](img/U001.jpg) 新建文件…*，然后在 *模块开发* 类别中选择
    *向导* 文件类型。在下一步中，选择 *自定义* 作为注册类型，并将向导步骤序列设置为 *静态*。输入 *2* 作为要创建的面板数量。在最后一步中，为所创建的类名称提供一个前缀。在此示例中，使用
    `Playlist` 作为前缀。最后，单击 *完成*。IDE 随后会创建两个面板的骨架，每个面板都包含一个可视化面板和一个向导面板。不过，你需要调整一些预定义方法的内容。


    首先，在 NetBeans 表单编辑器中创建第一个面板的用户界面——即 `PlaylistVisualPanel1` 类。添加几个字段，用户可以通过这些字段描述播放列表。用户必须能够为播放列表指定名称，同时选择流派并提供描述和图片。完成后的面板应如图
    13-6 所示，其中面板已显示为集成在向导中。该面板是一个普通的 Swing 组件，继承自 `JPanel`；但你需要牢记以下实现细节：


    *   对于向用户请求的每项数据，都定义一个公共属性常量。这些常量用于播放列表的名称、流派、描述和图片。特别是，这些常量稍后用于将数据保存到数据模型以及从数据模型加载数据。

    *   在构造函数中，为每个需要监控的字段添加一个监听器。在此示例中，你需要确保名称至少包含三个字符，所选图片的最大尺寸为 128 × 128 像素，并且当未选择图片时显示警告消息。为此，你需要为两个文本字段
    `playlistName` 和 `imagePath` 注册一个 `DocumentListener`。

    *   重写 `getName()` 方法非常重要。通过这种方式，你可以提供向导步骤标题中显示的面板名称。

    *   为每个字段添加一个 getter 方法，向导面板使用该方法访问用户输入的数据。

    *   在 `DocumentListener` 的方法 `changedUpdate()`、`insertUpdate()` 和 `removeUpdate()`
    中，使用 `firePropertyChange()` 方法通知所有已注册的 `PropertyChangeListener`。向导三个层之间的交互将在下一节详细讨论。


    清单 13-2 展示了可视化面板 `PlaylistWizardPanel1` 的一部分。请注意，该面板完全不含任何向导逻辑。该类的完整源代码以及完整的示例项目可以从
    Apress 网站上本书的源代码/下载区域下载。


    ***清单 13-2.** 第一个向导步骤的可视化面板*


    `public final class` **`PlaylistVisualPanel1`** `extends` **`JPanel`**

    `implements` **`DocumentListener`** `{`

    `public static final String` **`PROP_PLAYLIST_NAME`** `= "playlist";`

    `public static final String` **`PROP_GENRE`**`         = "genre";`

    `public static final String` **`PROP_DESCRIPTION`**`   = "description";`

    `public static final String` **`PROP_IMAGE_PATH`**`    = "imagePath";`

    `   public PlaylistVisualPanel1() {`

    `      initComponents();`

    `      playlistName.getDocument().`**`addDocumentListener`**`(this);`

    `      imagePath.getDocument().`**`addDocumentListener`**`(this);`

    `   }`

    `public String` **`getName`**`() {`

    `      return NbBundle.getMessage(PlaylistWizardPanel1.class, "Panel1.Name");`

    `   }`

    `   public String getPlaylistName() {`

    `      return playlistName.getText();`

    `   }`

    `   public String getGenre() {`

    `      return (String)genre.getSelectedItem();`

    `   }`

    `   public String getDescription() {`

    `      return description.getText();`

    `   }`

    `   public String getImagePath() {`

    `      return imagePath.getText();`

    `   }`

    `public void` **`changedUpdate`**`( DocumentEvent e ) {`

    `      if (playlistName.getDocument() == e.getDocument()) {`

    **`firePropertyChange`**`(PROP_PLAYLIST_NAME, 0, 1);`

    `      } else if(imagePath.getDocument() == e.getDocument()) {`

    **`firePropertyChange`**`(PROP_IMAGE_PATH, 0, 1);`

    `      }`

    `   } }`


    查看相关向导面板的内容，它为可视化面板提供了控制器。该类实现了 `WizardDescriptor.Panel<Data>` 接口，该接口定义了向导面板的接口。作为模板，你可以定义一个将用作数据模型的类。由于你不需要特殊的自定义数据模型，通常使用
    `WizardDescriptor` 类来定义向导面板。此外，实现一个 `PropertyChangeListener`，以便能够对可视化面板中的更改做出反应。


    向导面板具有一个状态：有效或无效。有效性取决于你的具体需求。在此例中，只有当名称至少包含三个字符时，面板才有效。该状态通过私有数据元素 `isValid`
    保存。


    `import java.beans.PropertyChangeEvent;`

    `import java.beans.PropertyChangeListener;`

    `import javax.swing.event.ChangeEvent;`

    `import javax.swing.event.ChangeListener;`

    `import javax.swing.event.EventListenerList;`

    `import org.openide.WizardDescriptor;`

    `...`

    `public class` **`PlaylistWizardPanel1`** `implements`

    **`  WizardDescriptor.Panel<WizardDescriptor>, PropertyChangeListener`** `{`

    `   private PlaylistVisualPanel1 view  = null;`

    `   private WizardDescriptor     model = null;`

    `private boolean` **`isValid`** `= false;`

    `   private ResourceBundle bundle = NbBundle.getBundle(PlaylistWizardPanel1.class);`


    `getComponent()` 方法是一个工厂方法，用于按需创建可视化面板。当面板在向导中首次创建时，`WizardDescriptor` 会调用该方法。当向导中应首次显示该面板时，`WizardDescriptor`
    会调用该方法。因此，并非所有面板都需要在向导启动时立即创建。这将显著提升提供许多不同步骤的向导的性能。因此，在使用 `getComponent()` 方法时要非常小心。例如，不要在
    `getName()` 方法中调用它，因为 `getName()` 方法是在创建向导时调用的。创建可视化面板后，你可以设置一些属性，这些属性会影响组件在向导中的显示方式。

    '
- fmt: "*   使用`PROP_CONTENT_SELECTED_INDEX`提供面板编号（显示在向导左侧的目录中），使用户能够看到当前步骤的编号。\n*\
    \   将属性`PROP_AUTO_WIZARD_STYLE`设置为`true`，这会创建包含典型组件（如内容区域和标题）的向导。当向导只有一个步骤时，将其设置为`false`是合理的，这样只显示面板和按钮。\n\
    *   通过属性`PROP_CONTENT_DISPLAYED`和`PROP_CONTENT_NUMBERED`，指定向导步骤的名称和编号显示在向导左侧。\n\
    \n```\npublic PlaylistVisualPanel1 getComponent() {\n      if (view == null) {\n\
    view = new PlaylistVisualPanel1();\n         view.putClientProperty(WizardDescriptor.PROP_CONTENT_SELECTED_INDEX,\
    \ new Integer(0));\n         view.putClientProperty(WizardDescriptor.PROP_AUTO_WIZARD_STYLE,\
    \ Boolean.TRUE);\n         view.putClientProperty(WizardDescriptor.PROP_CONTENT_DISPLAYED,\
    \ Boolean.TRUE);\n         view.putClientProperty(WizardDescriptor.PROP_CONTENT_NUMBERED,\
    \ Boolean.TRUE);\n      }\nreturn view;\n   }\n```\n\n通过`getName()`方法，您可以提供要在向导标题中显示的名称。通过`getHelp()`方法，您首先返回`HelpCtx.DEFAULT_HELP`。这意味着向导中的*帮助*按钮被禁用。如果您想为面板提供帮助，请返回一个`HelpCtx`对象。（关于`HelpCtx`类和NetBeans帮助系统的更多信息，请参见[第16章](#Chapter16.html#ch16)。）面板的状态（前面在定义向导步骤是否有效一节中讨论过）通过`isValid()`方法提供。当面板被调用或通过从`ChangeListener`接收的通知时，`WizardDescriptor`会调用此方法。仅当该方法返回值`true`时，向导的*下一步*或*完成*按钮才会被激活。`setMessage()`方法是一个辅助方法，用于向用户显示通知。向导的通知行默认提供，并显示在向导窗口的面板下方。该行由`NotificationLineSupport`类表示。您可以通过`WizardDescriptor`的`getNotificationLineSupport()`方法访问它。\n\
    \n然后，通过`setErrorMessage()`方法设置文本。如果以这种方式设置了文本，并且`isValid()`方法返回`false`，则会显示一个错误符号。但是，如果`isValid()`方法返回`true`，则仅显示一个警告标志。如果您希望持续显示警告标志或信息标志，可以使用`setWarningMessage()`或`setInformationMessage()`方法。\n\
    \n```\npublic String getName() {\n      return bundle.getString(\"Panel1.Name\"\
    );\n   }\npublic HelpCtx getHelp() {\n      return HelpCtx.DEFAULT_HELP;\n   }\n\
    public boolean isValid() {\n      return isValid;\n   }\nprivate void setMessage(String\
    \ message) {\n      model.getNotificationLineSupport().setInformationMessage(message);\n\
    \   }\n```\n\n数据模型通过`readSettings()`和`storeSettings()`方法访问。数据模型的类型取决于模板，该模板通过类签名中的`WizardDescriptor.Panel`接口指定。在这种情况下，涉及的类是`WizardDescriptor`。当面板打开时，会调用`readSettings()`方法。例如，可以在此处读取来自上一个面板的值。在可视面板上注册一个`PropertyChangeListener`，以通知您面板中的用户活动。在此处注册它以确保`WizardDescriptor`可用。当退出面板时，会调用`storeSettings()`方法。通过可视面板中定义的属性名称，将用户输入的值保存在`WizardDescriptor`中。这样，这些值会立即从一个面板传递到下一个面板，直到在向导完成后可以从`WizardDescriptor`中读取它们。\n\
    \n```\npublic void readSettings(WizardDescriptor model) {\n      this.model =\
    \ model;\n      getComponent().addPropertyChangeListener(this);\n   }\npublic\
    \ void storeSettings(WizardDescriptor model) {\n      model.putProperty(PlaylistVisualPanel1.PROP_PLAYLIST_NAME,\n\
