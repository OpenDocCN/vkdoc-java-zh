    `public` **`PlaylistView`**`() {`

    `      setRootVisible(false);`

    `   }`


    `public void` **`setDefaultActionProcessor`**`(final ActionListener action) {`

    **`setDefaultActionAllowed`**`(false);`

    `      tree.addMouseListener(new MouseAdapter() {`

    `         @Override`

    `public void` **`mouseClicked`**`(MouseEvent me) {`

    `            if (me.getClickCount() == 2) {`

    `               action.`**`actionPerformed`**`(null);`

    `            }`

    `         }`

    `      });`

    `      treeTable.`**`registerKeyboardAction`**`(action,`

    `             KeyStroke.getKeyStroke(KeyEvent.`**`VK_ENTER`**`, 0, false),`

    `             JComponent.WHEN_FOCUSED);`

    `   }`

    `}`


    #### Node Container


    All nodes represented in the `PlaylistView` are managed by a container. A container
    is based on the class `Children`. There are different variants of this class,
    which should be chosen depending on the purpose. You will use the class `Index.ArrayChildren`
    as superclass for your node container (see [Listing 44-18](#Chapter44.html#list_44_18)).
    The nodes to be added to a playlist are stored in an object of the type `ArrayList`.
    You provide this list with the method `initCollection()`. The list will initially
    be empty, because the nodes are inserted via drag-and-drop from the Media Library.
    Using the `getRemaining()` method, you return a list of remaining MP3 files, which
    can be directly passed to the player to play back the playlist.


