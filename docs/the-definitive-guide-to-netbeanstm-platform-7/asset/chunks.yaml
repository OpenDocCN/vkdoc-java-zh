    \ Result*对象。\n\n![Image](images/4109.jpg)\n\n***Figure 41-9.** 添加和配置数据源*\n\n请保持给定的顺序（添加后可通过上下文菜单更改），因为这些对象是相互依赖的。因此，必须按此顺序创建这些对象。这些对象仍需在Properties窗口中进行配置。然后，在Inspector窗口中选择相应的对象，以便调整以下特性：\n\
    \n*   您必须为`EntityManager`对象的`persistenceUnit`定义值。持久化单元的名称之前已由向导在`persistence.xml`文件中确定（参见[Listing\
    \ 41-5](#Chapter41.html#list_41_5)）。请使用此名称。\n*   您需要为`Query`对象的`query`参数定义JPA查询，该查询用于从数据库中检索数据。在本例中，查询为`SELECT\
    \ p FROM Product p`。为`entityManager`参数选择已创建的实体管理器的名称`entityManager1`。\n*   对于List对象（Query\
    \ Result），为`query`参数选择之前创建的`query1`对象。然后在Properties窗口中切换到*Code*视图；您可以通过指定*Type\
    \ Parameters*来参数化列表`<Product>`。\n\n现在，您可以从Palette向Form添加一个表格、三个标签、文本字段以及一个按钮，如图[Figure\
    \ 41-8](#Chapter41.html#fig_41_8)所示。接下来是Beans Binding Framework完成的部分：填充表格（通常，您需要先实现一个数据模型）以及在表格和文本字段之间同步更改数据。\n\
    \n调用表格的上下文菜单，选择*Bind ![Image](images/U001.jpg) elements*。选择之前创建并参数化的列表对象`list1`作为*Binding\
    \ Source*。由于您希望显示所有属性，可以直接点击*OK*完成对话框（保持默认设置）。这样，系统会自动为表格创建一个数据模型，您可以根据需要进行调整。为此，请在上下文菜单中调用*Table\
    \ Contents*。在此对话框中，您可以在*Columns*下单独设置许多项。其中，您可以更改标题或各个列的顺序。（参见[Figure 41-10](#Chapter41.html#fig_41_10)。）\n\
    \n![Image](images/4110.jpg)\n\n***Figure 41-10.** 调整自动创建的表格数据模型*\n\n这样，数据源和将要创建数据的表格就连接起来了。您现在就可以启动应用程序，您会看到相关表中的所有条目都已列出。而且，您无需自己编写一行代码。Beans\
    \ Binding Framework为您完成了大量工作，包括常规的实现任务。\n\n#### 将详细视图绑定到表格\n\n您希望保持表格和文本字段之间的数据同步。如果在表格中选中某个条目，其数据将显示在文本字段中。如果您现在编辑文本字段中的值，该值也应在表格和数据模型中更改。反之，如果表格发生更改，也应在文本字段中显示。\n\
    \n从详细视图的单个字段开始，将表格中选中条目的相应值绑定过来。为此，调用第一个文本字段（将包含产品标题）的上下文菜单，选择*Bind ![Image](images/U001.jpg)\
    \ text*。现在，使用示例中命名为`jTable1`的表格作为*Binding Source*。在*selectedElement*文件夹中选择所需的属性作为*Binding\
    \ Expression*。（参见[Figure 41-11](#Chapter41.html#fig_41_11)。）\n\n![Image](images/4111.jpg)\n\
    \n***Figure 41-11.** 将文本字段绑定到数据源*\n\n您可以在*Advanced*选项卡中定义更新特性。这意味着，通过*Always sync*，您可以确定更改是双向接受的。您还可以确定更新将在哪个事件（例如输入文本）发生时进行。\n\
    \n现在，您可以类似地为所有剩余的文本字段重复此绑定步骤。然后，您可以启动应用程序。同时，您可以选择表格条目并在详细视图中进行编辑。查看数据库或重新启动应用程序后，您会很快发现更改并未持久化；您需要确定何时将更改保存到数据库中。现在，您将为应用程序添加第一行代码。\n\
    \n您需要一个事务来将更改提交到数据库。您可以直接在构造函数中使用实体管理器创建这样一个事务。为此，请切换到Source视图，并将[Listing 41-6](#Chapter41.html#list_41_6)中的行添加到构造函数中：\n\
    \n***Listing 41-6.** 启动一个事务*\n\n```\npublic MyTopComponent() {\n   ...\n   entityManager1.getTransaction().begin();\n\
    }\n```\n\n最后，您希望使用已添加的按钮*Save*将更改保存到数据库中。这意味着您需要关闭当前事务，然后为即将到来的更改启动一个新事务。通过双击按钮，可以直接为`actionPerformed`事件注册一个操作方法。因此，您现在只需要实现[Listing\
    \ 41-7](#Chapter41.html#list_41_7)中所示的两行代码作为该方法的主体。\n\n***Listing 41-7.** 将更改保存到数据库*\n\
    \n```\nprivate void jButton1ActionPerformed(ActionEvent evt) {\n   entityManager1.getTransaction().commit();\n\
    \   entityManager1.getTransaction().begin();\n}  \n```\n\n#### 绑定监听器\n\n您可以注册一个监听器来响应绑定源或绑定目标的更改。您使用GUI\
    \ Builder应用的所有绑定都会被添加到一个`BindingGroup`中。此绑定组作为顶层组件中的一个字段被应用，因此您可以在此`BindingGroup`实例上注册一个监听器。然后，触发更改的`Binding`将作为参数传递。（参见[Listing\
    \ 41-8](#Chapter41.html#list_41_8)。）\n\n***Listing 41-8.** 注册绑定更改的监听器*\n\n```\n\
    private org.jdesktop.beansbinding.BindingGroup bindingGroup;\n...\nbindingGroup.addBindingListener(new\
    \ AbstractBindingListener() {\n\n   @Override\npublic void targetChanged(Binding\
    \ b, PropertyStateEvent evt) {\n      binding.getName();\n   }\n\n   @Override\n\
    public void sourceChanged(Binding b, PropertyStateEvent evt) {\n   }\n});\n```\n\
    \n为了能够区分不同的绑定，您可以在绑定对话框（参见[Figure 41-11](#Chapter41.html#fig_41_11)）的*Advanced*选项卡中为绑定指定一个名称。"
  raw: 'So far, you have installed the application so you can now add a top component
    to the module *My Module* with *File ![Image](images/U001.jpg) New File ![Image](images/U001.jpg)
    Module Development ![Image](images/U001.jpg) Window*. This top component should
    finally look like [Figure 41-8](#Chapter41.html#fig_41_8). However, before adding
    the table and the text fields, you need a data source to which you can later bind
    the table.


    To do this, open the context menu of the node *Other Components* in the Inspector
    window and then select *Add From Palette ![Image](images/U001.jpg) Java Persistence
    ![Image](images/U001.jpg) Entity Manager*. Then add a *Query* and a *Query Result*
    object out of the same category.


    ![Image](images/4109.jpg)


    ***Figure 41-9.** Adding and configuring data sources*


    Please keep the given order (it can be changed after adding over the context menu),
    because these objects are based on each other. Consequently, the objects have
    to be created in this order. These objects still have to be configured in the
    Properties window. Then select the referring object in the Inspector window to
    be able to adapt the following features:


    *   You have to define the value for the *persistenceUnit* for the *EntityManager*
    object. The name of the persistence unit had been determined by the wizard in
    the *persistence.xml* file before (see [Listing 41-5](#Chapter41.html#list_41_5)).
    Use this name.

    *   You define the JPA query for the parameter *query* for the *Query* object
    with which the data is detected out of the database. For this example it is `SELECT
    p FROM Product p`. Select the name of the already created entity manager, `entityManager1,`
    for the parameter *entityManager*.

    *   For the List object (Query Result) select for the parameter *query* the `query1`
    object which had been created before. Then in the Properties window change to
    the *Code* view; you can parameterize the list `<Product>` by indicating the *Type
    Parameters*.


    Now, you can add a table, three labels, and text fields, as well as a button to
    the Form from the Palette as shown in [Figure 41-8](#Chapter41.html#fig_41_8).
    You now come to the part accomplished by the Beans Binding Framework: filling
    the table (usually, you had to implement a data model first) and synchronously
    changing data between tables and text fields.


    Call the context menu of the table and select *Bind ![Image](images/U001.jpg)
    elements*. Choose the list object `list1` which had been created and parameterized
    before as *Binding Source*. Since you want to display all attributes you can finish
    the dialog (unchanged) with *OK*. This way, a data model for the table is automatically
    created, which you can adapt to your needs. To do so, call *Table Contents* in
    the context menu. In this dialog you can set numerous things individually under
    *Columns*. Among others, you can change the title or the order of separate columns.
    (See [Figure 41-10](#Chapter41.html#fig_41_10).)


    ![Image](images/4110.jpg)


    ***Figure 41-10.** Adapting the automatically created data model for a table*


    Thus, the data source and the table which will create the data are connected.
    You can already start the application now and you will see that all the entries
    from the referring table are listed. Plus, you did not have to write a single
    line of code yourself. The Beans Binding Framework does a lot of work for you,
    including routine implementation tasks.


    #### Bind Detail View to Table


    You want to keep the data between the table and the text fields synchronous. If
    the entry is selected in the table, its data will be displayed in the text fields.
    If you now edit a value in the text fields, the value should also change in the
    table and in the data model. The other way around, if the table is changed, it
    should be shown in the text fields, too.


    Starting from the single fields of the detail view you bind the referring value
    of the selected entry out of the table. To do this, call the context menu of the
    first text field, which will contain the title of the product, and choose *Bind
    ![Image](images/U001.jpg) text*. You now use the table which is named in the example
    as `jTable1` as *Binding Source*. Choose the desired attribute in the folder *selectedElement*
    as *Binding Expression*. (See [Figure 41-11](#Chapter41.html#fig_41_11).)


    ![Image](images/4111.jpg)


    ***Figure 41-11.** Binding text field to source*


    You can define the update features in the tab *Advanced*. This means with *Always
    sync* you can determine that the changes are accepted in both directions. You
    can also determine at which event (such as typing in text) the updating will take
    place.


    You can now analogously repeat this step of binding text fields to a data source
    for all remaining text fields. Then you can start the application. At the same
    time you can select table entries and edit them in the detail view. Looking into
    the database or restarting the application, you will quickly recognize that the
    changes have not been made persistent; you have to determine when the changes
    will be restored in the database. You now add the first line of code to the application.


    You need a transaction to put the changes into the database. You directly create
    such a transaction in the constructor with the entity manager. To do this, change
    to the Source view and add the line in [Listing 41-6](#Chapter41.html#list_41_6)
    to the constructor:


    ***Listing 41-6.** Starting a Transaction*


    `public MyTopComponent() {`

    `   ...`

    `   entityManager1.`**`getTransaction`**`().`**`begin`**`();`

    `}`


    Finally, you want to restore the changes in the database with the already added
    button, *Save*. This means you close the transaction and then start a new transaction
    for the upcoming changes. An action method for the *actionPerformed* event is
    directly registered by double-clicking the button. So now you only need to implement
    the two lines shown in [Listing 41-7](#Chapter41.html#list_41_7) as the body of
    the method.


    ***Listing 41-7.** Saving the Changes in the Database*


    `private void jButton1ActionPerformed(ActionEvent evt) {`

    `   entityManager1.getTransaction().`**`commit`**`();`

    `   entityManager1.getTransaction().`**`begin`**`();`

    `}  `


    #### Binding Listener


    You can register a listener on it to react on changes of the source or of the
    target of a binding. All bindings that you applied with the GUI Builder are added
    to a `BindingGroup`. This binding group is applied as a field in the top component,
    so you can register a listener on this `BindingGroup` instance. Then the `Binding`
    that triggered the change as argument will be delivered. (See [Listing 41-8](#Chapter41.html#list_41_8).)


    ***Listing 41-8.** Registering a Listener for Changes of Bindings*


    `private org.jdesktop.beansbinding.`**`BindingGroup`** `bindingGroup;`

    `...`

    `bindingGroup.`**`addBindingListener`**`(new AbstractBindingListener() {`


    `   @Override`

    `public void` **`targetChanged`**`(Binding b, PropertyStateEvent evt) {`

    `      binding.getName();`

    `   }`


    `   @Override`

    `public void` **`sourceChanged`**`(Binding b, PropertyStateEvent evt) {`

    `   }`

    `});`


    To be able to differentiate between different bindings you can give a name to
    a binding in the bind dialog (see [Figure 41-11](#Chapter41.html#fig_41_11)) in
    the tab *Advanced*.'
