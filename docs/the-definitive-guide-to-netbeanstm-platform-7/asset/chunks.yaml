  trans: '

    #### 创建 NetBeans 平台应用程序


    首先，你可以通过 *文件 ![Image](img/U001.jpg) 新建项目… ![Image](img/U001.jpg) Maven ![Image](img/U001.jpg)
    NetBeans 应用程序* 来创建一个 NetBeans 平台应用程序。请注意，项目名称不能包含空格，因为它会被用作 POM 文件中的 `artifactId`。由于仓库中定位的构件不允许包含空格，因此
    artifactId 中不能有空格，但你可以在 `<name>` 中指定一个替代的显示名称。此外，你需要指定一个 `groupId`（采用类似 Java 包的反向
    DNS 格式）和一个 `version`。向导的最后一步是选择你的应用程序所基于的 NetBeans 版本。POM 文件中会自动设置对相关集群的依赖，从而包含平台模块。此外，还可以设置是否将
    OSGi 包添加为依赖项，以及是否在创建平台应用程序时直接创建一个初始模块项目。完成以下向导后，你将得到如图 37-2 所示的应用程序结构。


    ![Image](img/3702.jpg)


    ***图 37-2.** NetBeans IDE 项目视图中基于 Maven 的 NetBeans 平台应用程序项目*


    一眼看去，引人注意的是实际的 NetBeans 平台应用程序项目并非仅由一个部分组成，而是由三个（如果选择添加示例模块，则为四个）部分组成。它们分别命名为
    *NB App、NB App Branding* 和 *NB App Parent*。这些部分具有以下任务：


    *   *NB App*：此项目决定了哪些组件属于该应用程序，即在 *pom.xml* 文件中定义了与 NetBeans 平台集群、品牌模块以及应用程序模块
    *MyModule* 的依赖关系。通过此项目的上下文菜单中的 *运行* 来启动你的应用程序。

    *   *NB App Branding*：通过项目的这一部分，品牌资源（即经过调整的文本和图标）被管理并创建为品牌模块。你可以通过此项目的上下文菜单打开品牌对话框。

    *   *NB App Parent*：这是整个应用程序的实际容器项目。也就是说，此项目的 POM 文件既是前面描述的两个模块的父 POM 文件，也是所有后续应用程序模块的父
    POM 文件。所有模块的聚合正是通过 `modules` 属性在此处完成的。通过此项目的上下文菜单调用 *构建* 来创建整个应用程序。这样，所有附属模块都会被创建。


    #### 创建 NetBeans 平台模块


    你可以通过 *文件 ![Image](img/U001.jpg) 新建项目… ![Image](img/U001.jpg) Maven ![Image](img/U001.jpg)
    NetBeans 模块* 来类似地创建一个新的 Maven 应用程序模块。要从现有的平台应用程序中添加一个新模块，只需选择要创建模块的目标应用程序的基本目录。这是父
    POM 文件所在的层级。该模块会自动添加到父 POM 文件中。同时，一个相应的 `parent` 条目也会被添加到模块的 POM 文件中。这样，它也会继承平台应用程序的配置。


    #### 添加依赖项


    最后，我将向你展示如何向模块添加依赖项。为此，请在 *依赖项* 节点的上下文菜单中调用 *添加依赖项* 条目。你可以在相应的对话框中直接通过定义构件 ID、组
    ID 和版本号来添加依赖项，或者通过选择一个打开的项目来添加（参见 图 37-3）。搜索功能包含了已定义的 Maven 仓库。这样，你就可以添加对 NetBeans
    平台某个模块的依赖项，例如。然而，这也意味着你只能搜索那些已经安装在仓库中的模块。因此，如果你想定义一个对属于你的应用程序但尚未创建的模块的依赖项，你必须通过
    *打开的项目* 这种方式。


    ![Image](img/3703.jpg)


    ***图 37-3.** 向基于 Maven 的 NetBeans 平台模块添加依赖项*


    通过 Maven 仓库浏览器查找模块甚至更加容易（参见 图 37-4）。通过 *窗口 ![Image](img/U001.jpg) 其他 ![Image](img/U001.jpg)
    Maven 仓库浏览器* 打开它。在这里你可以添加仓库。在这些仓库中，你可以搜索和浏览。你可以通过模块上下文菜单中的 *添加为依赖项* 将一个模块（以特定版本）添加为依赖项。


    ![Image](img/3704.jpg)


    ***图 37-4**. Maven 仓库浏览器*


    ### 不使用 NetBeans IDE 的 Maven 项目


    在上一节中，你使用了 NetBeans IDE 来创建 NetBeans 平台 Maven 项目。由于 NetBeans IDE 实际上只是将 GUI 的参数传递给
    Maven，因此你也可以直接使用 Maven。接下来，我将详细向你展示如何使用 NetBeans Maven 插件来创建一个 NetBeans 平台应用程序。


    在开始设置第一个 Maven 项目之前，需要满足一些前提条件：


    1.  如果你尚未安装 Maven，可以从 *[`maven.apache.org`](http://maven.apache.org)* 下载最新版本。你只需解压下载的包并将其存放在合适的目录中即可。

    2.  然后创建环境变量 M2_HOME，该变量应指向 Maven 发行版的基本目录（例如，*C:\Program Files\apache-maven-3.0.3*）。

    3.  此外，应设置环境变量 JAVA_HOME，该变量指向 JRE 目录（例如，*C:\Program Files\Java\jdk1.6.0_24*）。

    4.  最后，将该目录添加到 path 变量中。这样，就可以在命令行中直接调用 Maven，而无需指定路径。


    现在，你已经准备好开始并创建一个基于 Maven 的 NetBeans 平台应用程序，具体操作如下所述。

    '
- fmt: "### Creating a NetBeans Platform Application\n\nThe NetBeans Maven plugin\
    \ is complemented by the archetype `netbeans-platform-app`. This archetype creates\
    \ the complete structure of a NetBeans Platform application project. To find the\
    \ archetype you need the artifact ID, group ID, and a referring version.\n\nNext,\
    \ you define the data for the project to create by `groupId`, `artifactId`, and\
    \ `version`. Use `netbeansVersion` to define which NetBeans Platform version you\
    \ want to use. You can see all available versions in the NetBeans Maven repository\
    \ at [`http://bits.netbeans.org/maven2/org/netbeans/cluster/platform/maven-metadata.xml`](http://bits.netbeans.org/maven2/org/netbeans/cluster/platform/maven-metadata.xml).\n\
    \nYou can define the package used for the branding module optionally by the parameter\
    \ `package`. If you do not define the parameter, the group ID is used as valid\
    \ value. To make Maven go into the non-interactive mode use the parameter `--batch-mode`.\
    \ So, Maven creates the project without manual intervention. You trigger the creation\
    \ of the project structure with the `archetype:generate` as goal (see [Listing\
    \ 37-5](#Chapter37.html#list_37_5)).\n\n**Listing 37-5.** Maven Parameters for\
    \ Creating a NetBeans Platform Application Project with the Command Line\n\n```\n\
    mvn -DarchetypeArtifactId=netbeans-platform-app-archetype -DarchetypeGroupId=org.codehaus.mojo.archetypes\
    \ -DarchetypeVersion=1.10 -DgroupId=com.galileo.netbeans -DartifactId=MyApplication\
    \ -Dversion=1.0-SNAPSHOT -DnetbeansVersion=RELEASE70 -Dpackage=com.galileo.netbeans.myapplication\
    \ --batch-mode archetype:generate\n```\n\nIf you execute the command-line call\
    \ shown in [Listing 37-5](#Chapter37.html#list_37_5) in the desired directory\
    \ in which the project will be created you will get the structure depicted in\
    \ [Figure 37-5](#Chapter37.html#fig_37_5).\n\n![Image](images/3705.jpg)\n\n**Figure\
    \ 37-5.** Structure of a Maven-based NetBeans Platform application project\n\n\
    The meaning of the parts of the project described in [Figure 37-5](#Chapter37.html#fig_37_5)\
    \ is explained in the section *Maven Projects in the NetBeans IDE*. At this point\
    \ you want to look behind the scenes of the configuration again. To get an overview\
    \ of the created POM files and the structure of the project, first look at the\
    \ parent POM file, meaning the `pom.xml` file on the top level (see [Listing 37-6](#Chapter37.html#list_37_6)).\n\
    \n**Listing 37-6.** Parent POM File of a NetBeans Platform Application Project\n\
    \n```xml\n<project ... >\n   <modelVersion>4.0.0</modelVersion>\n   <groupId>com.galileo.netbeans</groupId>\n\
    \   <artifactId>MyApplication</artifactId>\n   <version>1.0-SNAPSHOT</version>\n\
    \   <packaging>pom</packaging>\n   <name>MyApplication - NB App Parent</name>\n\
    \   <repositories>\n      <repository>\n         <id>netbeans</id>\n         <name>NetBeans</name>\n\
    \         <url>http://bits.netbeans.org/maven2/</url>\n      </repository>\n \
    \  </repositories>\n   <dependencies>\n      <dependency>\n         <groupId>junit</groupId>\n\
    \         <artifactId>junit</artifactId>\n         <version>4.8.2</version>\n\
    \         <scope>test</scope>\n      </dependency>\n   </dependencies>\n   <build>\n\
    \      <pluginManagement>\n         <plugins>\n            <plugin>\n        \
    \       <groupId>org.codehaus.mojo</groupId>\n               <artifactId>nbm-maven-plugin</artifactId>\n\
    \               <version>3.5</version>\n               <extensions>true</extensions>\n\
    \               <configuration>\n                  <brandingToken>${brandingToken}</brandingToken>\n\
    \                  <cluster>${brandingToken}</cluster>\n               </configuration>\n\
    \            </plugin>\n            <plugin>\n               <groupId>org.apache.maven.plugins</groupId>\n\
    \               <artifactId>maven-compiler-plugin</artifactId>\n             \
    \  <version>2.3.2</version>\n               <configuration>\n                \
    \  <source>1.6</source>\n                  <target>1.6</target>\n            \
    \   </configuration>\n            </plugin>\n         </plugins>\n      </pluginManagement>\n\
    \   </build>\n   <modules>\n      <module>branding</module>\n      <module>application</module>\n\
    \   </modules>\n   <properties>\n      <netbeans.version>RELEASE70</netbeans.version>\n\
    \      <brandingToken>myapplication</brandingToken>\n   </properties>\n</project>\n\
    ```\n\nNext the repository is defined. The NetBeans Platform or the NetBeans IDE\
    \ modules can be loaded from this repository, so it is provided globally to the\
    \ project. The dependencies defined in this file under `dependencies` are provided\
    \ to all modules (which inherit from the parent POM file). Consequently, you do\
    \ not have to add dependencies on JUnit any more. Maven plugins, which are later\
    \ used for the build process, can be preconfigured below the element `pluginManagement`.\
    \ So at this point, you define the cluster to use and the branding token for the\
    \ NetBeans Maven plugin, for example. Furthermore, you can give the information\
    \ to the compiler plugin that the project is created on a Java base. At the beginning,\
    \ only the two modules of the project (the branding and the application module)\
    \ are added below the `modules` element. All modules you create that will belong\
    \ to this application will be executed there by your artifact ID. Finally, the\
    \ properties, which will be provided globally and centrally, are defined. You\
    \ can access their values with `${...}`.\n\nBoth POM files of the branding and\
    \ the application module have the structure of a normal NetBeans Platform module\
    \ POM file. Let's take a closer look at this next."
