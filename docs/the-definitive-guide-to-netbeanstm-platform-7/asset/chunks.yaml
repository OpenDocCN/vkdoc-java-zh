  raw: '### MultiViews


    Use the *MultiViewAPI* to internally divide a top component across multiple containers
    or components. Typically, as the name suggests, this approach is used to provide
    more than one view for a single data object. The most common example of this is
    the NetBeans Form Editor, in which the user can switch between the Source view
    and the Design view. Both views have as their basis the same *.java* and *.form*
    file. However, a relationship between the views is not mandatory. That means you
    can integrate any components into the container that are completely independent
    of each other, displaying different data. The MultiView SPI can, as a result,
    be used as a generic framework.


    The button bar provided by a multiview top component allows the user to switch
    between the different views. Optionally, one of the views, consisting of any kind
    of `JComponent`, provides a toolbar displayed next to the drop-down list (see
    [Figure 10-7](#Chapter10.html#fig_10_7)).


    ![Image](images/1007.jpg)


    ***Figure 10-7.** Multiview top component with three views/components*


    Each view consists of an independent component, which must be a subclass of `JComponent`.
    Typically, the base class `JPanel` is used. However, nothing prevents you from
    using the class `TopComponent`, allowing integration of one or more windows into
    a multiview. To allow a component to be a view in a multiview top component, implement
    the `MultiViewElement` interface. The meaning of the methods, specified by this
    interface, can best be illustrated via a simple example, as follows:


    `public class MultiViewPanel1 extends` **`JPanel`** `implements`**`MultiViewElement`**
    `{`

    `   private JToolBar toolbar = new JToolBar();`

    `private` **`MultiViewElementCallback`** `callback = null;`


    `   public MultiViewPanel1() {`

    `      initComponents();`

    `      toolbar.add(new Panel1ToolbarAction1());`

    `      toolbar.add(new Panel1ToolbarAction2());`

    `   }`


    The view initially receives a `MultiViewElementCallback` via the `setMultiViewElementCallback()
    method` in order to access the top component (that it is embedded in). For example,
    via this object you obtain the multiview top component or—as you will see—you
    can adapt the name of the multiview top component. To use this callback object
    in your class, save the data as a private element. The instance of the view is
    obtained via the `getVisualRepresentation()` method. This method is called whenever
    the view is activated, meaning that creating the component in this method should
    be avoided. Normally, use `this` to deliver the current component. The toolbar
    of the current view is obtained via the `getToolbarRepresentation()` method. It
    is also repeatedly called. For this purpose, you should also provide an already
    created toolbar. Actions in the context menu of the multiview top component are
    obtained from the currently active view, via the `getActions()` method. First,
    use this method to access the standard actions of a top component via the `MultiViewElementCallback`
    object. Next, you can add your own actions to the set of standard actions. Use
    `getLookup()` to provide a Lookup which gets part of the multiview top component''s
    Lookup and thus is also part of the global context.


    `public void` **`setMultiViewCallback`**`(MultiViewElementCallback c) {`

    `      callback = c;`

    `   }`


    `public JComponent` **`getVisualRepresentation`**`() {`

    `      return this;`

    `   }`


    `public JComponent` **`getToolbarRepresentation`**`() {`

    `      return toolbar;`

    `   }`


    `public Action[]` **`getActions`**`() {`

    `      if(callback != null) {`

    `         return callback.createDefaultActions();`

    `      } else {`

    `         return new Action[]{};`

    `      }`

    `   }`


    `public Lookup` **`getLookup`**`() {`

    `      return Lookups.singleton(this);`

    `   }`


    The next methods should be familiar, since they were covered in discussions concerning
    the `TopComponent` class. Via these methods you are informed about the various
    states of the view and the multiview top component. In this example you want to
    name the title of the top component dynamically (like the name of the view), whenever
    the view is opened or activated. The title can be changed via the `MultiViewElementCallback`
    object, using the `updateTitle()` method.


    `public void` **`componentOpened`**`() {`

    `      callback.updateTitle("View 1");`

    `   }`


    `public void` **`componentClosed`**`() {}`

    `public void` **`componentShowing`**`() {}`

    `public void` **`componentHidden`**`() {}`


    `public void` **`componentActivated`**`() {`

    `      callback.updateTitle("View 1");`

    `   }`


    `public void` **`componentDeactivated`**`() {}`


    Each view offers its own undo/redo functionality, via the `getUndoRedo()` method.
    (How to implement undo/redo via the NetBeans API is discussed in [Chapter 15](#Chapter15.html#ch15).)
    If this support is unwanted, provide `UndoRedo.NONE`, as shown in the following:


    `public UndoRedo` **`getUndoRedo`**`() {`

    `      return UndoRedo.NONE;`

    `   }`


    Finally, implement the `canCloseElement()` method. This method is called on each
    of the views when the multiview top component closes. Only if all the views have
    provided `CloseOperationState.STATE_OK` is the top component closed. If your view
    is not immediately closed because (for example) changed data has not yet been
    saved, provide a `CloseOperationState` object, created via the `MultiViewFactory.createUnsafeCloseState()`
    method. However, this makes sense only when `CloseOperationHandler` has been implemented,
    which is passed when the multiview top component is created, since this handler
    is responsible for resolving the `CloseOperationState` objects of all views. For
    example, within this handler, a dialog can then be shown to the user.


    `public CloseOperationState` **`canCloseElement`**`() {`

    `      return CloseOperationState.STATE_OK;`

    `   } }`


    For creating and describing each view component you need one `MultiViewDescription`.
    The main point of this class is the instantiation of graphic view components,
    which are just created on demand by the `createElement()` method. The method is
    called only once, when the user opens the view for the first time. The method
    `getPersistenceType()` is used to specify how the top component is saved. Use
    the constants of the `TopComponent` class (discussed in the “Persistence” section).
    See [Listing 10-16](#Chapter10.html#list_10_16).


    ***Listing 10-16.** Description and Factory of a View*


    `public class MultiViewPanel1Description implements` **`MultiViewDescription`**`,
    Serializable {`


    `public MultiViewElement` **`createElement`**`() {`

    `return` **`new MultiViewPanel1()`**`);`

    `   }`


    `   public String preferredID() {`

    `      return "PANEL_1";`

    `   }`


    `public int` **`getPersistenceType`**`() {`

    `return` **`TopComponent.PERSISTENCE_NEVER`**`;`

    `   }`


    `   public String getDisplayName() {`

    `      return "View 1";`

    `   }`


    `   public Image getIcon() {`

    `      return null;`

    `   }`


    `   public HelpCtx getHelpCtx() {`

    `      return HelpCtx.DEFAULT_HELP;`

    `   } }`


    Finally, there remains the creation of a multiview top component from independently
    created views. To that end, the *MultiView SPI* provides a factory: the `MultiViewFactory`
    class. This class contains methods permitting the creation of a `TopComponent`
    or of a `CloneableTopComponent`, depending on need.


    `MultiViewDescription dsc[] = {`

    `   new MultiViewPanel1Description(),`

    `   new MultiViewPanel2Description(),`

    `   new MultiViewPanel3Description()};`

    `TopComponent tc =`**`MultiViewFactory.createMultiView`**`(dsc, dsc[0]);`

    `tc.open();`'
