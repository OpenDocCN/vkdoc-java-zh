    #### 模块间通信


    除了由 NetBeans 平台提供的、允许访问所有已注册服务的全局 Lookup 之外，还可以为自己的组件配备一个本地 Lookup。Lookup API
    提供了一个用于创建 Lookup 的工厂，以及一个监听 Lookup 变化的机会。使用 `ProxyLookup` 类，用户可以创建一个代理，将多个 Lookup
    合并为一个。利用 Lookup API 和 SPI 的这一特性，您可以在不同模块的组件之间实现通信，而无需使它们相互依赖。


    松散耦合模块通信的一个典型用例是显示所选对象的详细信息。对象的选择和信息的可视化分别在不同的模块中完成。例如，想象一个显示 MP3 文件搜索结果的列表。在列表中选择一个条目会通过
    Lookup 提供该选中条目，这样应用程序的其他部分就可以访问该条目并显示所需的详细信息。这种模式类似于观察者模式。提供对象的模块（在此例中是搜索列表）是主题，而信息显示模块是观察者。这允许多个模块以各种方式显示数据或详细信息。同样，其优点是模块之间的松散耦合：它们完全相互独立。它们唯一的共同点是所提供的对象（或者更准确地说，是其接口），该对象是待处理信息的来源。这种松散耦合是通过使用代理对象实现的，该代理对象在观察者的注册过程中充当主题的替身。因此，观察者注册在代理组件（在此例中是
    Lookup）上，而不是主题上。


    图 5-3 展示了以下段落中实现的示例。两个窗口位于独立的模块中，彼此独立（两者都可以被替换，或者可以任意添加新的窗口）。


    ![图片](img/0503.jpg)


    ***图 5-3.** 两个模块之间数据交换的典型应用示例，无需相互依赖*


