- fmt: "### Registering Quick Search Provider\n\nA search provider implementation\
    \ has to be made public to the Quick Search module with an entry in the layer\
    \ file; the extension point `QuickSearch` is provided there. The entry is automatically\
    \ created when you create the provider with the NetBeans IDE wizard. Search providers\
    \ are assigned to a category. This way, the search results can be shown categorized\
    \ in the list of results (see [Figure 24-1](#Chapter24.html#fig_24_1)). You decide\
    \ the position of the category in the list of results with the `position` attribute.\
    \ With the `command` attribute, you can indicate a prefix with which a search\
    \ can be limited on this category. In this example, that means the search can\
    \ be limited on the shown search provider by the entry `MP3 <search string>`.\n\
    \nIt is possible to add multiple search provider implementations to one category.\
    \ The name of a search provider is specified by the `displayName` attribute. (See\
    \ [Listing 24-2](#Chapter24.html#list_24_2).)\n\n***Listing 24-2.** Registration\
    \ of a Search Provider*\n\n```\n<folder name=\"QuickSearch\">\n   <folder name=\"\
    Music\">\n      <attr name=\"command\" stringvalue=\"MP3\"/>\n      <attr name=\"\
    position\" intvalue=\"100\"/>\n      <file name=\"com-galileo-netbeans-module-MyMusicQSProvider.instance\"\
    >\n         <attr name=\"displayName\"\n            bundlevalue=\"com.galileo.netbeans.module.Bundle#MyMusicQSProvider.instance\"\
    />\n      </file>\n   </folder>\n</folder>\n```\n\n### Integrating Quick Search\
    \ UI\n\nThe Quick Search search box is not provided in your application by default.\
    \ It can be added to a toolbar by the dialog *Customize Toolbars*. By a layer\
    \ entry you can also permanently assign the Quick Search UI to a toolbar. This\
    \ way you ensure that it already exists when starting the application. You can\
    \ determine the name of the Quick Search action with the layer tree and then create\
    \ a link. As shown in [Listing 24-3](#Chapter24.html#list_24_3) you add the action\
    \ to the newly created toolbar `QuickSearch`.\n\n***Listing 24-3.** Adding the\
    \ Quick Search UI*\n\n```\n<folder name=\"Toolbars\">\n   <folder name=\"QuickSearch\"\
    >\n      <file name=\"org-netbeans-modules-quicksearch-QuickSearchAction.shadow\"\
    >\n         <attr name=\"originalFile\" stringvalue=\"\nActions/Edit/org-netbeans-modules-quicksearch-QuickSearchAction.instance\"\
    />\n         <attr name=\"position\" intvalue=\"400\"/>\n      </file>\n   </folder>\n\
    </folder>\n```\n\n### Hiding Existing Search Provider Categories\n\nSearch providers\
    \ for actions and operations, among others, belong to the NetBeans Platform, by\
    \ default. These are each assigned to a category. You can hide categories by means\
    \ of the standard System Filesystem functionality (i.e., in the same way as you\
    \ hide menu entries). You can exclude the referring search providers from the\
    \ search. To do so you only need to add the suffix `_hidden` to the category's\
    \ name. Add the following entry in [Listing 24-4](#Chapter24.html#list_24_4) to\
    \ the layer file, for example, in order to delete both first stated search provider\
    \ categories:\n\n***Listing 24-4.** Deleting Search Provider Categories*\n\n```\n\
    <folder name=\"QuickSearch\">\n   <folder name=\"Actions_hidden\"/>\n   <folder\
    \ name=\"Options_hidden\"/>\n</folder>\n```\n\n### Summary\n\nIt is possible to\
    \ add providers to the Quick Search function of the NetBeans Platform by means\
    \ of the Quick Search API. These providers search for any data and objects at\
    \ any place. In this chapter you learned how to implement and register Quick Search\
    \ providers. You also looked at how to integrate the Quick Search UI and how to\
    \ hide existing search provider categories.\n\n## C H A P T E R 25\n\n## Auto\
    \ Update Services API\n\nWith its plugin manager the NetBeans Platform provides\
    \ a useful tool to the user. With this tool, individual parts of applications\
    \ (single modules or several related modules) can be installed, uninstalled, activated,\
    \ deactivated, or updated. It is possible to directly access these functionalities\
    \ by means of the Auto Update Services API and create really different applications.\n\
    \nIt is possible to access all existing modules because of the class `UpdateManager`.\
    \ One module (unit) is represented by the class `UpdateUnit`; this class is a\
    \ kind of wrapper for different elements. Such elements could be\n\n*   The installed\
    \ module itself\n*   The module which had been installed for the current locale\
    \ setting\n*   The predecessor of an installed update (backup)\n*   A list of\
    \ available updates (in update centers)\n*   A list of available localizations\
    \ (in update centers)\n\nThe named elements are each represented by the class\
    \ `UpdateElement`. This class provides the name, the category, the author, or\
    \ the icon of the module, among other things. Actions such as installing or uninstalling\
    \ are managed by an `OperationContainer` instance. To create such an instance\
    \ a factory method is provided for each action.\n\nThe following sections demonstrate\
    \ the usage of the Auto Update Services API by means of typical applications.\n\
    \n### Automatic Update in the Background\n\nBusiness applications often require\
    \ that updates are automatically installed on the clients without user interaction.\
    \ This ensures that all users work with the same and the latest version of the\
    \ application."
  raw: '### Registering Quick Search Provider


    A search provider implementation has to be made public to the Quick Search module
    with an entry in the layer file; the extension point `QuickSearch` is provided
    there. The entry is automatically created when you create the provider with the
    NetBeans IDE wizard. Search providers are assigned to a category. This way, the
    search results can be shown categorized in the list of results (see [Figure 24-1](#Chapter24.html#fig_24_1)).
    You decide the position of the category in the list of results with the `position`
    attribute. With the `command` attribute, you can indicate a prefix with which
    a search can be limited on this category. In this example, that means the search
    can be limited on the shown search provider by the entry *MP3 <search string>*.


    It is possible to add multiple search provider implementations to one category.
    The name of a search provider is specified by the `displayName` attribute. (See
    [Listing 24-2](#Chapter24.html#list_24_2).)


    ***Listing 24-2.** Registration of a Search Provider*


    `<folder name="`**`QuickSearch`**`">`

    `   <folder name="Music">`

    `      <attr name="`**`command`**`" stringvalue="MP3"/>`

    `      <attr name="`**`position`**`" intvalue="100"/>`

    `      <file name="com-galileo-netbeans-module-`**`MyMusicQSProvider`**`.instance">`

    `         <attr name="`**`displayName`**`"`

    `            bundlevalue="com.galileo.netbeans.module.Bundle#MyMusicQSProvider.instance"/>`

    `      </file>`

    `   </folder>`

    `</folder>`


    ### Integrating Quick Search UI


    The Quick Search search box is not provided in your application by default. It
    can be added to a toolbar by the dialog *Customize Toolbars*. By a layer entry
    you can also permanently assign the Quick Search UI to a toolbar. This way you
    ensure that it already exists when starting the application. You can determine
    the name of the Quick Search action with the layer tree and then create a link.
    As shown in [Listing 24-3](#Chapter24.html#list_24_3) you add the action to the
    newly created toolbar QuickSearch.


    ***Listing 24-3.** Adding the Quick Search UI*


    `<folder name="`**`Toolbars`**`">`

    `   <folder name="`**`QuickSearch`**`">`

    `      <file name="org-netbeans-modules-quicksearch-QuickSearchAction.shadow">`

    `         <attr name="originalFile" stringvalue="`

    **`Actions/Edit/org-netbeans-modules-quicksearch-QuickSearchAction.instance`**`"/>`

    `         <attr name="position" intvalue="400"/>`

    `      </file>`

    `   </folder>`

    `</folder>`


    ### Hiding Existing Search Provider Categories


    Search providers for actions and operations, among others, belong to the NetBeans
    Platform, by default. These are each assigned to a category. You can hide categories
    by means of the standard System Filesystem functionality (i.e., in the same way
    as you hide menu entries). You can exclude the referring search providers from
    the search. To do so you only need to add the suffix `_hidden` to the category''s
    name. Add the following entry in [Listing 24-4](#Chapter24.html#list_24_4) to
    the layer file, for example, in order to delete both first stated search provider
    categories:


    ***Listing 24-4.** Deleting Search Provider Categories*


    `<folder name="QuickSearch">`

    `   <folder name="Actions`**`_hidden`**`"/>`

    `   <folder name="Options`**`_hidden`**`"/>`

    `</folder>`


    ### Summary


    It is possible to add providers to the Quick Search function of the NetBeans Platform
    by means of the Quick Search API. These providers search for any data and objects
    at any place. In this chapter you learned how to implement and register Quick
    Search providers. You also looked at how to integrate the Quick Search UI and
    how to hide existing search provider categories.


    ## C H A P T E R  25


    ## Auto Update Services API


    With its plugin manager the NetBeans Platform provides a useful tool to the user.
    With this tool, individual parts of applications (single modules or several related
    modules) can be installed, uninstalled, activated, deactivated, or updated. It
    is possible to directly access these functionalities by means of the Auto Update
    Services A PIand create really different applications.


    It is possible to access all existing modules because of the class `UpdateManager`.
    One module (unit) is represented by the class `UpdateUnit`; this class is a kind
    of wrapper for different elements. Such elements could be


    *   The installed module itself

    *   The module which had been installed for the current locale setting

    *   The predecessor of an installed update (backup)

    *   A list of available updates (in update centers)

    *   A list of available localizations (in update centers)


    The named elements are each represented by the class `UpdateElement`. This class
    provides the name, the category, the author, or the icon of the module, among
    other things. Actions such as installing or uninstalling are managed by an `OperationContainer`
    instance. To create such an instance a factory method is provided for each action.


    The following sections demonstrate the usage of the Auto Update Services API by
    means of typical applications.


    ### Automatic Update in the Background


    Business applications often require that updates are automatically installed on
    the clients without user interaction. This ensures that all users work with the
    same and the latest version of the application.'
  trans: '

    ### 注册快速搜索提供程序


    搜索提供程序的实现必须通过在层文件中添加条目，向快速搜索模块公开；其中提供了扩展点 `QuickSearch`。当你使用 NetBeans IDE 向导创建提供程序时，该条目会自动创建。搜索提供程序被分配到某个类别。这样，搜索结果就可以在结果列表中按类别显示（参见图
    24-1）。你可以使用 `position` 属性决定该类别在结果列表中的位置。使用 `command` 属性，你可以指定一个前缀，将搜索范围限制在该类别内。在此示例中，这意味着可以通过输入
    *MP3 <搜索字符串>* 将搜索范围限制在显示的搜索提供程序上。


    可以将多个搜索提供程序实现添加到一个类别中。搜索提供程序的名称由 `displayName` 属性指定。（参见清单 24-2。）


    ***清单 24-2.** 搜索提供程序的注册*


    `<folder name="`**`QuickSearch`**`">`

    `   <folder name="Music">`

    `      <attr name="`**`command`**`" stringvalue="MP3"/>`

    `      <attr name="`**`position`**`" intvalue="100"/>`

    `      <file name="com-galileo-netbeans-module-`**`MyMusicQSProvider`**`.instance">`

    `         <attr name="`**`displayName`**`"`

    `            bundlevalue="com.galileo.netbeans.module.Bundle#MyMusicQSProvider.instance"/>`

    `      </file>`

    `   </folder>`

    `</folder>`


    ### 集成快速搜索用户界面


    默认情况下，你的应用程序中不提供快速搜索框。可以通过*自定义工具栏*对话框将其添加到工具栏。通过层条目，你也可以将快速搜索用户界面永久分配给某个工具栏。这样，你可以确保它在启动应用程序时就已经存在。你可以通过层树确定快速搜索操作的名称，然后创建一个链接。如清单
    24-3 所示，你将此操作添加到新创建的工具栏 QuickSearch 中。


    ***清单 24-3.** 添加快速搜索用户界面*


    `<folder name="`**`Toolbars`**`">`

    `   <folder name="`**`QuickSearch`**`">`

    `      <file name="org-netbeans-modules-quicksearch-QuickSearchAction.shadow">`

    `         <attr name="originalFile" stringvalue="`

    **`Actions/Edit/org-netbeans-modules-quicksearch-QuickSearchAction.instance`**`"/>`

    `         <attr name="position" intvalue="400"/>`

    `      </file>`

    `   </folder>`

    `</folder>`


    ### 隐藏现有的搜索提供程序类别


    默认情况下，用于操作和其他功能的搜索提供程序属于 NetBeans 平台。这些提供程序各自被分配到一个类别。你可以通过标准的系统文件系统功能（即，与隐藏菜单项相同的方式）来隐藏类别。你可以将相关的搜索提供程序从搜索中排除。为此，你只需在类别名称后添加后缀
    `_hidden`。例如，在层文件中添加清单 24-4 中的以下条目，以删除前两个声明的搜索提供程序类别：


    ***清单 24-4.** 删除搜索提供程序类别*


    `<folder name="QuickSearch">`

    `   <folder name="Actions`**`_hidden`**`"/>`

    `   <folder name="Options`**`_hidden`**`"/>`

    `</folder>`


    ### 总结


    可以通过快速搜索 API 向 NetBeans 平台的快速搜索功能添加提供程序。这些提供程序可以在任何位置搜索任何数据和对象。在本章中，你学习了如何实现和注册快速搜索提供程序。你还了解了如何集成快速搜索用户界面以及如何隐藏现有的搜索提供程序类别。


    ## 第 25 章


    ## 自动更新服务 API


    NetBeans 平台通过其插件管理器为用户提供了一个有用的工具。使用此工具，可以安装、卸载、激活、停用或更新应用程序的各个部分（单个模块或几个相关模块）。可以通过自动更新服务
    API 直接访问这些功能，并创建真正不同的应用程序。


    由于 `UpdateManager` 类的存在，可以访问所有现有的模块。一个模块（单元）由 `UpdateUnit` 类表示；该类是不同元素的一种包装器。这些元素可能包括：


    *   已安装的模块本身

    *   为当前区域设置安装的模块

    *   已安装更新的前一个版本（备份）

    *   可用更新列表（在更新中心）

    *   可用本地化版本列表（在更新中心）


    上述元素分别由 `UpdateElement` 类表示。该类提供模块的名称、类别、作者或图标等信息。安装或卸载等操作由 `OperationContainer`
    实例管理。为了创建此类实例，每个操作都提供了一个工厂方法。


    以下各节通过典型应用演示了自动更新服务 API 的使用。


    ### 后台自动更新


    业务应用程序通常要求在不与用户交互的情况下，在客户端自动安装更新。这确保了所有用户都使用相同且最新版本的应用程序。

