- fmt: "### Data Systems API\n\nThe Data Systems API provides a logical layer which\
    \ is based on the File Systems API. While a `FileObject` manages its data regardless\
    \ of the type, a `DataObject` is a wrapper for a `FileObject` of a really specific\
    \ type. A `DataObject` expands a `FileObject` with type-specific features and\
    \ functionalities. These functionalities are specified by interfaces or abstract\
    \ classes, the so-called context interfaces. Implementations of the functionalities\
    \ are provided by the `DataObject` via the local Lookup. Due to this mechanism,\
    \ the abilities of a `DataObject` can be adapted dynamically and flexibly and\
    \ they can be called from outside. Since a `DataObject` knows the type of its\
    \ managed data, it is able to represent the data accordingly. That means, a `DataObject`\
    \ is responsible itself for creating a `Node` which accordingly represents the\
    \ data on the user interface. A `DataObject` is created by a special `DataObject.Factory`\
    \ which is exactly responsible for one type of data.\n\nThe coherence of this\
    \ system is easily demonstrated. In the following example it becomes quite clear\
    \ how the APIs of the three layers work together and build upon each other. In\
    \ this regard, the NetBeans IDE does quite a lot of work and provides a wizard.\n\
    \nNow you want to use this wizard to add a data file for MP3 files to a module.\n\
    \n1. To do so, select File ![Image](images/U001.jpg) New File… and File Type in\
    \ the category Module Development.\n2. For the moment, you can determine the MIME\
    \ type; type in `audio/mpeg`, for this example. The file type is recognized on\
    \ the basis of the ending; it is also possible with XML files that the type of\
    \ the content is recognized by means of the root element. Here, you want the files\
    \ to be recognized by the ending `mp3`. Accordingly, you fill this in (see [Figure\
    \ 7-3](#Chapter07.html#fig_7_3)). Optionally, you can define multiple file endings,\
    \ each separated by a comma. So for video files, `mpg` or `mpeg` would make sense.\n\
    \n   ![Image](images/0703.jpg)\n\n   ***Figure 7-3.** Creating a new file type\
    \ for MP3 files with the NetBeans wizard*\n\n3. To get to the last page, press\
    \ Next. Type in `Mp3` as class name prefix and choose any icon sized 16 × 16 pixels,\
    \ too.\n4. Then press the Finish button so the wizard creates the data object\
    \ class.\n\n### The Data Object\n\nIn principle, a data object is specified by\
    \ the abstract class `DataObject`. Usually, the subclass `MultiDataObject` is\
    \ used as base class. On the one hand, it already implements most abstract methods\
    \ of `DataObject`; this is why your own data object class remains very small.\
    \ On the other hand, a multidata object can contain one or more file object. A\
    \ data object always has a file object which is called a primary file. Furthermore,\
    \ a multidata object can optionally contain one or more files, which are called\
    \ secondary files. Secondary files typically occur with related data—as, for example,\
    \ with the form editor. In the editor, the files `myform.java`, `myform.form`,\
    \ `myform.class` are represented by a data object. In this example, the file `myform.java`\
    \ is the primary file and the files `myform.class` and `myform.form` are the secondary\
    \ files. A file object within a data object is managed by the class `MultiDataObject.Entry`.\
    \ Here the subclass `FileEntry` is mostly used. The standard file operations,\
    \ such as removing or deleting, are executed via this class. Look at the class\
    \ `Mp3DataObject` which was created by the wizard, shown in [Listing 7-3](#Chapter07.html#list_7_3).\n\
    \n***Listing 7-3.** Data Object Class for a File Object Type Mp3. This Class Provides\
    \ the Logic for the MP3 Files.*\n\n```\nimport java.io.IOException;\nimport org.openide.filesystems.FileObject;\n\
    import org.openide.loaders.DataNode;\nimport org.openide.loaders.DataObjectExistsException;\n\
    import org.openide.loaders.MultiDataObject;\nimport org.openide.loaders.MultiFileLoader;\n\
    import org.openide.nodes.Node;\nimport org.openide.nodes.Children;\nimport org.openide.util.Lookup;\n\
    \npublic class Mp3DataObject extends MultiDataObject {\n   public Mp3DataObject(FileObject\
    \ pf, MultiFileLoader loader)\n         throws DataObjectExistsException, IOException\
    \ {\n         super(pf, loader);\n   }\n   protected Node createNodeDelegate()\
    \ {\n      return new DataNode(this, Children.LEAF, getLookup());\n   }\n   public\
    \ Lookup getLookup() {\n      return getCookieSet().getLookup();\n   }\n}\n```\n\
    \nAs you already know, a data object is normally created by a data object factory.\
    \ This factory is responsible for the creation of a certain data object type.\
    \ The constructor of the `Mp3DataObject` class contains two parameters. First,\
    \ the primary file, which contains or represents the actual MP3 files. Second,\
    \ it contains the factory instance in form of a `MultiFileLoader` object, which\
    \ is responsible for the data object. You just hand these parameters over to the\
    \ base class constructor which does the management. A data object cares about\
    \ the creation of according nodes, because the object knows the type of its data.\
    \ The nodes are used to represent data objects on the user interface. You do this\
    \ with the method `createNodeDelegate()` which creates an instance of the node\
    \ class `DataNode` and returns. This is the interface with the Nodes API which\
    \ is located on the presentation layer (see [Figure 7-1](#Chapter07.html#fig_7_1)).\
    \ You will learn more about this in [Chapter 12](#Chapter12.html#ch12).\n\nThe\
    \ main difference between a file object and a data object is that a data object\
    \ knows which data it contains. This means that a data object is characterized\
    \ by being able to provide features and functionalities for this type of data—in\
    \ this case an MP3 file. The functionalities, which provide a data object for\
    \ its files, are described by interfaces or by abstract classes. These are the\
    \ context interfaces. Instances of these interfaces are managed by the data object\
    \ in a local Lookup. Because the interfaces are not necessarily implemented by\
    \ `DataObject` itself, but are managed by the Lookup, a data object is able to\
    \ provide its capabilities dynamically. This means it can offer a playing MP3\
    \ file during the runtime, for example. This is provided as long as the MP3 file\
    \ is playing. Furthermore, it is possible to flexibly expand a data object with\
    \ further functionalities. The Lookup offers type-safe access on these interfaces\
    \ per se.\n\nNow, the basic structure of your `Mp3DataObject` is finished. The\
    \ constructor gets the file object to manage from the lower abstraction layer\
    \ by the corresponding factory. The abstraction layer delivers a representative\
    \ for the upper presentation layer and finally abandons its functionalities to\
    \ the environment by a Lookup. The base classes `DataObject` and `MultiDataObject`\
    \ provide numerous methods for using a data object. Here a look at the API documentation\
    \ can be very helpful."
