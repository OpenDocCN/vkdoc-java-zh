  raw: '#### Service Interface


    Inside the services module, you create a new package named `player` with an abstract
    class named `Mp3Player`. Of course, a player must be able to play back, pause,
    and stop MP3 files. Additionally, a user should be able to mute the playback,
    control the volume, and see the current playback position and total duration.
    It should also be possible to influence the current playback position of the file.
    You specify all these desired functionalities which the player will provide via
    the abstract method in this class. (See [Listing 44-6](#Chapter44.html#list_44_6)).


    ***Listing 44-6.** Defining the Player''s Interfaces and Providing an Implementation
    Using the getDefault() Method*


    `package com.hboeck.mp3manager.services.`**`player`**`;`

    `import com.hboeck.mp3manager.filetype.`**`Mp3DataObject`**`;`

    `import java.util.ListIterator;`

    `import org.openide.util.`**`Lookup`**`;`

    `...`

    `public` **`abstract`** `class` **`Mp3Player`** `{`


    `public static Mp3Player` **`getDefault`**`() {`

    **`Mp3Player`** `p = Lookup.getDefault().`**`lookup`**`(`**`Mp3Player`**`.class);`

    `      if (p == null) {`

    `p = new` **`DefaultMp3Player`**`();`

    `      }`

    `      return p;`

    `   }`


    `public` **`abstract`** `void` **`play`**`(Mp3DataObject mp3);`

    `public` **`abstract`** `void` **`play`**`(ListIterator<Mp3DataObject> mp3s);`

    `public` **`abstract`** `void` **`pause`**`();`

    `public` **`abstract`** `void` **`stop`**`();`

    `public` **`abstract`** `void` **`previous`**`();`

    `public` **`abstract`** `void` **`next`**`();`

    `public` **`abstract`** `void` **`setMute`**`(boolean mute);`

    `public` **`abstract`** `void` **`setVolume`**`(int volume);`

    `public` **`abstract`** `int` **`getDuration`**`();`

    `public` **`abstract`** `int` **`getMediaTime`**`();`

    `public` **`abstract`** `void` **`setMediaTime`**`(int seconds);`

    `}`


    The most important part for the service requesters—meaning the modules that want
    to use the player—is the `getDefault()` method. This method actually searches
    for a registered `Mp3Player` implementation via the Lookup. If an implementation
    is found, the Lookup returns an instance of it. If no implementation is found,
    you nonetheless want to ensure that a requester never obtains a `null` reference,
    but always an instance of the `Mp3Player` class. Therefore, you provide a default
    implementation inside the abstract `Mp3Player` class, which is named `DefaultMp3Player`
    and will do—in the simplest case—nothing except tell the user it will do nothing.
    Another easy and smart solution would be to forward the MP3 file to an external
    application. (See [Listing 44-7](#Chapter44.html#list_44_7)).


    ***Listing 44-7.** Providing a Default Implementation Inside the Abstract Class*


    `public abstract class` **`Mp3Player`** `{`

    `   ...`

    `private static class` **`DefaultMp3Player`** `extends` **`Mp3Player`** `{`

    `public void` **`play`**`(Mp3DataObject mp3) {`

    `         Logger.getLogger(Mp3Player.class.getName()).info("not supported”);`

    `      }`

    `public void` **`stop`**`() { }`

    `      ...`

    `   }`

    `}`


    If we imagine a module using the player, we will quickly notice that a module
    needs to be notified about the events that may occur in the player in order to
    react. Thus, a user interface, for example, needs to be informed about the end
    of the playback of an MP3 file. For this purpose, we specify a listener interface
    named `Mp3PlayerEventListener` interface, which might look like this in a simple
    version:


    `package com.hboeck.mp3manager.services.`**`player`**`;`

    `import com.hboeck.mp3manager.filetype.Mp3DataObject;`

    `import java.util.EventListener;`


    `public interface` **`Mp3PlayerEventListener`** `extends` **`EventListener`**`{`

    `public void` **`playing`**`(Mp3DataObject mp3);`

    `public void` **`stopped`**`();`

    `}`


    The functionality to add and remove `Mp3PlayerEventListener` to the player is
    implemented directly in the abstract class; the concrete implementation does not
    need to worry about this anymore. Additionally, you provide two fire methods equivalent
    to the listener interface with which the concrete classes are able to notify listeners
    about events, as shown in [Listing 44-8](#Chapter44.html#list_44_8).


    ***Listing 44-8.** Methods to Manage Listeners Interested in Events*


    `import com.hboeck.mp3manager.filetype.Mp3DataObject;`

    `import java.util.ListIterator;`

    `import javax.swing.event.EventListenerList;`

    `import org.openide.util.Lookup;`


    `public abstract class` **`Mp3Player`** `{`

    `   ...`

    `   private final EventListenerList listeners = new EventListenerList();`


    `public void` **`addEventListener`**`(Mp3PlayerEventListener l) {`

    `      listeners.add(Mp3PlayerEventListener.class, l);`

    `   }`


    `public void` **`removeEventListener`**`(Mp3PlayerEventListener l) {`

    `      listeners.remove(Mp3PlayerEventListener.class, l);`

    `   }`


    `protected final void` **`firePlayEvent`**`(Mp3DataObject mp3) {`

    `      for(Mp3PlayerEventListener listener :`

    `         listeners.getListeners(Mp3PlayerEventListener.class)) {`

    `         listener.playing(mp3);`

    `      }`

    `   }`


    `protected final void` **`fireStopEvent`**`() {`

    `      for(Mp3PlayerEventListener listener :`

    `         listeners.getListeners(Mp3PlayerEventListener.class)) {`

    `         listener.stopped();`

    `      }`

    `   }`

    `}`'
