    ## 关于译者


    ![Image](img/anne_bock.jpg) ![Image](img/square.jpg) 安妮·伯克（Anne Böck）在蒂宾根大学攻读英语专业，可以说多年来每天都在与英语打交道。她曾在印第安纳大学（美国）交换学习一学期，之后又在加拿大生活和工作了六个月。如今，她在德国一所学校教授英语，同时也担任专业翻译。


    ## 关于技术审校


    ![Image](img/jesse_glick.jpg) ![Image](img/square.jpg) 杰西·格利克（Jesse Glick）自 1999
    年起参与 NetBeans 项目，见证了它被 Sun Microsystems 收购、开源，并最终纳入 Oracle 工具组合的过程。他致力于 IDE 的基础组件开发，例如项目系统、Ant
    和 Maven 集成，以及 Hudson 集成。


    杰西还为 NetBeans 平台及其 IDE 内工具做出了贡献，合著了一本关于该主题的 O''Reilly 书籍，并在多个相关会议上发表演讲。


    ![Image](img/david_konecny.jpg) ![Image](img/square.jpg) 大卫·科内茨尼（David Konecny）是
    Oracle 技术团队的核心成员。他是 NetBeans IDE 中 Java EE 支持的技术负责人，多年来致力于 IDE 的多个不同领域。在为 Sun
    和 Oracle 工作之前，他曾在各种工程岗位上工作了十年。他对自己的工作以及生活中的一切充满热情。他出生于捷克斯洛伐克，目前居住在新西兰，并居家办公。


    ## 引言


    当您手持这本著作时，您便拥有了关于基于 Swing 的富客户端平台——*NetBeans Platform 7*——最新、最全面的指南。这个主题丰富的富客户端平台极具现实意义。除了
    NetBeans 平台，Eclipse RCP 也是该类平台的主要代表。这两个平台的发展主要得益于 NetBeans 和 Eclipse 集成开发环境（IDE）的推动。这两款
    IDE 均基于各自的平台构建，并且它们本身也是富客户端应用程序。NetBeans 平台完全基于包含 AWT 和 Swing 的 Java API，并整合了
    Java 标准版（JSE）的概念；而 Eclipse RCP 则使用 SWT 和 JFace，越来越多地依赖于自身的方法和概念。


    富客户端平台非常灵活，主要用于满足应用程序及其架构不断增长的需求。一个关键方面在于，它们能提高生产力和灵活性，以便根据产品的预期用途进行配置，并使其适应市场需求。这对于专业应用程序尤其重要。


    在我看来，即使应用程序非常小或非常大，NetBeans 平台也始终值得使用，这得益于 NetBeans IDE 提供的全面支持。仅凭其执行环境就已值得采用，更不用说其众多
    API 为客户端应用程序开发中常见的问题和挑战提供了实用的解决方案。这些解决方案非常贴近实践和应用，极大地提高了生产力。


    然而，这一假设基于一个基本条件：对富客户端平台工作原理的专业知识和运用。应用程序开发者至少应了解其主要原则；只有这样，才能在实践真正实现提高生产力和提升软件质量的优势。


    许多开发者曾认为该平台过于复杂，这也是富客户端平台尚未成为客户端应用程序开发准标准的主要原因之一。起初，开发者可能会觉得需要掌握大量的 API 和概念。然而，一旦开始深入学习，就会发现其中蕴含着巨大的协同效应和简化可能性，足以弥补初始学习阶段的挑战。


    NetBeans IDE 通过提供全面、有用且直观的向导，简化了日常使用并降低了开发者的学习曲线。同样重要的是，所有 NetBeans API 和概念都建立在
    Java 标准版（JSE）的 API 和概念之上。这一事实简化了日常使用体验，也促进了现有组件的重用。


    ### NetBeans 平台的新特性


    NetBeans Platform 7 包含众多创新。其中一项关键创新是引入了*注解*。例如，操作不再需要从特定的类派生。因此，操作可以通过注解进行注册，同时，操作也可以添加到菜单或工具栏中。以前，您需要为顶层组件分配两个独立的配置文件。现在，顶层组件通过注解进行注册，并向
    NetBeans 平台公开。由于使用了注解，声明性信息现在可以直接且分散地提供。注解有完善的文档，并由编辑器或编译器进行检查；信息以更简单的方式提供，避免了
    XML 中可能出现的错误条目。此外，信息恰好位于其引用的位置，因此无需管理额外的文件。这也简化了重构，并促进了 NetBeans 平台对 NetBeans
    IDE 的独立性。请记住，必要的配置文件或配置条目是在编译时根据注解生成的。这意味着使用注解并非强制要求；您也可以像以前一样手动创建必要的配置。


    是否使用注解最终是一个理念问题，也取决于项目的规模和您的特殊需求。当然，您也可以看到注解的缺点。例如，元信息分散在源文件中。而一个集中的文件可能更易于调整或概览。


    对*OSGi* 捆绑包的支持也是一项关键创新。现在，OSGi 捆绑包可以在 NetBeans Platform 7 中与 NetBeans 模块并行运行。为此，OSGi
    框架（Felix 或 Equinox）可选地集成到 NetBeans 平台中。也可以将 NetBeans 平台模块转换为 OSGi 捆绑包。这一创新使得大量现有的
    OSGi 捆绑包得以使用。


    对 Maven 的开箱即用支持也可称为一项创新。现在，NetBeans 平台应用程序可以完全通过 Maven 进行开发。借助 NetBeans Maven
    插件以及公共 Maven 仓库中所有 NetBeans 平台模块的可用性，在 NetBeans IDE 之外使用 NetBeans 平台已毫无障碍。

    '
- fmt: '# How This Book Is Structured


    This book is aimed at Java developers who want to develop client applications
    based on the NetBeans Platform. No previous knowledge of rich client platforms
    is required. The main goal of this book is to provide the basic ideas and functionalities
    of the NetBeans Platform close to actual practice and to explain the very good
    support the NetBeans IDE provides for the development phase of your application
    as well as the interfaces and advantages of the NetBeans Platform. In this way
    I hope to motivate you to further use the NetBeans Platform—and to ask yourself
    why you have not been developing your applications on the basis of a rich client
    platform already, especially once you recognize the numerous advantages you could
    have benefited from in the past.


    The separate chapters of the book are mostly independent of each other, in order
    to give you a way to get directly into individual chapters, and to provide you
    an optimal manual for developing rich client applications based on the NetBeans
    Platform. To keep the chapters clear and to facilitate direct access, the explanations
    within this book are supported by small examples without referring to an overall
    application. At the end of the book, I will show how to create a complete rich
    client application, from the draft phase over creating the basic structure to
    implementing the application logic. I will explain this in a tutorial-like format
    with the example of an MP3 manager. In this application you will integrate the
    Java Media Framework (JMF) as well as the Java DB database system, among others.


    [Part 1](#Part01.html#p1) deals with the basic features and concepts of the NetBeans
    Platform. At first, you will learn how a rich client is defined, which features
    a rich client platform generally contains, and which special advantages the Netbeans
    Platform provides. Additionally, because the module-based nature is crucial, I
    will cover both the NetBeans module system and the OSGi framework in the [Part
    1](#Part01.html#p1). The central topics of Lookup, actions, and data management
    complete the first part with one chapter each.


    [Part 2](#Part02.html#p2) is completely devoted to developing user interfaces.
    This part mainly deals with the Window System as well as the menu bar, toolbar,
    status bar, and progress bar. Due to the support of the Window System, you can
    implement and easily manage your own windows. Connected to the data management,
    which is explained in the first part, you will learn about the flexible node concept
    together with the Explorer API in a separate chapter. This part also covers developing
    dialogs and wizards as well as using the powerful Visual Library API.


    In [Part 3](#Part03.html#p3) we will take a closer look at the standard modules
    of the NetBeans Platform which can be used directly without great effort. This
    includes the help system, the output window, the navigator, the properties window,
    the options dialog, and the palette module. I will explain how to use each of
    them in a separate chapter.


    [Part 4](#Part04.html#p4) is about using the very helpful APIs of the NetBeans
    Platform and the NetBeans IDE. Actually, you are not limited to the modules of
    the NetBeans Platform. One chapter explains how to use the Palette API and another
    how to use the Task List API. Additionally, we will take a closer look at the
    Quick Search and the Auto Update Services API by means of examples that are close
    to actual practice.


    With [Part 5](#Part05.html#p5) I put the NetBeans Platform in the context of databases
    and Java EE applications. First, you will use the Java DB as a client-side database
    solution within a NetBeans Platform application. Using Hibernate to facilitate
    accessing databases is covered in a following chapter. However, applying Hibernate
    does not need to be dependent on a special object-relational mapping (ORM) framework.
    In a later chapter, I will explain how to integrate the Java Persistence API (JPA)
    for this purpose. As an alternative to Java DB and Hibernate, I will also go deeper
    into the MySQL database solution in connection with EclipseLink. We will look
    at the topic of web services from both sides in this part: on the one hand, it
    is about using any available web services using SOAP. On the other hand, it is
    about connecting server-side Java EE applications using SOAP and REST-based web
    services. A final chapter will answer questions concerning authentication of users
    and specific adaptation of the application.


    In [Part 6](#Part06.html#p6) you will learn which possibilities the NetBeans Platform
    provides concerning internationalization and localization. Furthermore, this part
    covers the branding of the NetBeans Platform as well as packing the whole application
    as a deliverable unit. In another chapter you will learn about the update mechanism
    of the NetBeans Platform with which you can update your application in a simple
    and transparent manner after delivering.


    [Part 7](#Part07.html#p7) of this book is about the different development and
    test tools of the NetBeans Platform or, respectively, of the NetBeans IDE. First,
    it is about implementing NetBeans Platform applications using the Maven build
    system. In another chapter you learn about how to develop NetBeans Platform applications
    even within the Eclipse IDE using Maven. Additionally, one chapter will simplify
    changing from the Eclipse IDE to the NetBeans IDE to develop NetBeans Platform
    applications. In addition to the NetBeans and the Eclipse IDE, the IntelliJ IDEA
    can also be used to develop NetBeans Platform applications. The NetBeans IDE provides
    a powerful GUI builder for the efficient development of user interfaces. You will
    learn how to use it and how to debug and test your application in separate chapters.


    [Part 8](#Part08.html#p8) completes this guide with a fully functional example.
    In the course of this part, you develop an MP3 manager application step by step.
    The previously described concepts and technologies come together here and can
    be understood as in actual practice.


    ## Downloading the Code


    All examples and explanations in this book are based on Java 6 and NetBeans 7.
    You can download the Java Development Kit (JDK 6) at [`http://java.oracle.com`](http://java.oracle.com)
    and NetBeans 7 at [`http://netbeans.org`](http://netbeans.org).


    Each of the source code examples in this book can be downloaded from the Source
    Code/Download area for this book on the Apress web site as a complete runnable
    NetBeans IDE project.


    # PART 1


    # Basics & Concepts: Basics of the NetBeans Platform


    ## C H A P T E R 1


    ## Introduction


    This chapter introduces you to rich client development. In the process, you will
    learn what a rich client is and how a rich client platform can help you. This
    chapter will also briefly touch on the main advantages and characteristics of
    the NetBeans Platform.'
