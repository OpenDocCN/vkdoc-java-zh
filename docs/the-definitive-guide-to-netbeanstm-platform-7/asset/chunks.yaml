    \ must be installed in the *Plugin Manager*, which you can open via *Tools ![Image](images/U001.jpg)\
    \ Plugins*. Your rich client application is then able to get new or updated modules\
    \ from an update center. In the *Settings* tab you can install any update center\
    \ (see [Figure 36-5](#Chapter36.html#fig_36_5)). The URL of an update center must\
