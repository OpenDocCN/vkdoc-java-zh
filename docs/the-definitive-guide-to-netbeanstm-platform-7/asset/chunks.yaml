    ### Summary


    The Visual Library is a powerful framework for creating graph-oriented user interfaces.
    This chapter discussed the basic structure of the Visual Library API. You looked
    at all widget classes in detail. You learned all about events and actions as well
    as the Scene class, which is the root element. Another important part of this
    chapter covered the model-view relation. Finally, you saw how you can use the
    preexisting classes from the Visual Mobile Designer.


