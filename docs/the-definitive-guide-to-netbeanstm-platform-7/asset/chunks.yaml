    ### 播放列表


    本节的目标是创建一个播放列表。用户应该能够同时管理多个播放列表。当然，你还希望用户能够通过拖放操作将媒体库中的 MP3 文件添加到播放列表中。所有这些功能都在一个单独的模块中提供。因此，通过
    *文件 ![Image](img/U001.jpg) 新建项目... ![Image](img/U001.jpg) NetBeans 模块 ![Image](img/U001.jpg)
    模块* 创建一个新模块，将其命名为 *`Playlist`*，并将代码名称基础设置为 `com.hboeck.mp3manager.playlist`。添加对
    *`File Type`* 和 *`Services`* 模块的依赖。


    对于播放列表，使用了另一个 `top component`，其中包含一个来自 Explorer API 的 `TreeTableView`。使用这种视图，可以借助
    `Mp3DataNode` 类轻松管理 MP3 文件。


    #### 节点视图


    让我们从节点的视图开始。你使用一个 `TreeTableView` 并创建子类 `PlaylistView`。此类用于隐藏配置并拥有一个更便捷的类。唯一需要配置的是默认动作处理器，因为默认情况下，在此视图中双击会执行节点的默认动作（即
    `Mp3DataNode` 的默认动作），也就是你在“MP3 文件播放”部分创建的 `PlayAction`。但此动作仅播放单个文件，而播放列表的期望行为是自动播放整个列表。因此，你需要实现
    `setDefaultActionProcessor()` 方法（参见清单 44-17），该方法接收一个 `ActionListener` 实例。当节点被双击或按下*回车*键时，将执行此监听器的
    `actionPerformed()` 方法（而不是节点的默认动作）。


    ***清单 44-17.** 此视图用于在列表视图中表示 MP3 文件。*


