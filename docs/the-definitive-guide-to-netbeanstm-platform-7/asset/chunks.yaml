    对于每个操作，我们都使用一个当前（或可能新建的）`Session`，并用它创建一个事务。然后你可以在 `Session` 上保存、更新和执行所需操作，并通过
    `commit()` 成功关闭事务。如前所述，无需显式关闭 `Session`，因为它会在事务结束时自动关闭。


    这个示例自然处理的是非常简单的应用场景。因此，在会话期间，每个操作都有一个生命周期相同的事务。（你可以从 Hibernate 文档中获取关于应使用的会话和事务粒度的信息。）至此，你已经完全迁移了我们的示例，该示例最初通过
    JDBC 接口使用 SQL 在应用程序和数据库之间进行“粗略草稿”式的数据传输。因此，应用程序完全抽象于底层持久化系统运行，你可以方便且透明地保存和查询对象。


    ### 小结


    Hibernate 是一个对象关系桥接器。它允许你在应用程序和数据库之间创建一个透明的接口。在本章中，你学习了如何在 NetBeans Platform 应用程序中集成
    Hibernate。你了解了如何配置 Hibernate，以及对象与关系之间的映射是如何完成的。本章还涉及了会话和会话工厂，以及对象的保存与加载。


    ## 第 28 章


    ## Java 持久化 API


    Java 持久化 API（JPA）的目标是定义一个标准化、易于使用的持久化模型，该模型可用于 Java SE 和 Java EE。其最佳特性和思想主要来源于
    Hibernate、TopLink 和 JDO。因此，使用 JPA 接口的应用程序完全独立于像 Hibernate 这样的特定框架。其应用程序保持了与之前使用
    Java 数据库连接（JDBC）接口时相同的独立性。


    JPA 的主要特点是其轻量性和简洁性。JPA 的主要特性之一是通过 Java 注解直接在持久化对象中指定对象关系映射。不再需要像第 27 章中 Hibernate
    使用的单独映射文件（需要说明的是，不需要对对象结构进行显式的关系映射）。不过，可以通过注解来影响标准映射策略。这使得实体的规范变得更加容易。此外，JPA 还规定了与
    SQL 相关的查询语言 *Java 持久化查询语言*（JPQL），用于静态和动态查询，这使其独立于像 HQL 这样的专有查询语言。持久化层可以分为三个领域：`javax.persistence`
    包中的 API 本身、查询语言 JPQL 以及用于定义映射信息的注解。


    与此同时，一系列项目和框架提供了 JPA 实现，其中包括 Hibernate、EclipseLink 和 OpenJPA。我们现在来看一下 JPA 接口，因为你已经了解了
    Hibernate 的原生接口。顺便提一下，Hibernate 的 JPA 接口与原生接口看起来并没有太大不同。你会清楚地看到，在制定 JPA 规范时，Hibernate
    是一个模型。


    ### Hibernate 与 Java 持久化 API


    从 Hibernate 3.5 开始，Hibernate 对 JPA 的实现是一个内置功能，位于 *hibernate3.jar* 中。与所使用的库和 JPA
    本身一起，你可以创建一个名为 Hibernate 的模块，具体操作如第 27 章所述。请注意关于类加载器和日志记录的提示。

