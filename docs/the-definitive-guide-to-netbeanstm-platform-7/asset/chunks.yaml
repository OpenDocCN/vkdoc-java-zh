    首先，在异步执行的 `doInBackground()` 方法中确定亚马逊 Web 服务的端口。您希望执行 *ItemLookup* 操作，该操作通过 `ItemLookup`
    和 `ItemLookupRequest` 对象进行配置。通过请求对象，您确定要使用 *ASIN* 来搜索产品。您将作为参数传递给 `ImageLookupByASIN`
    对象的 ASIN 添加到项目 ID 列表中。您可以通过 *响应组* 确定并缩小 Web 服务返回的信息范围。由于您只对图片的 URL 感兴趣，而其他产品信息并不重要，因此您使用
    *Images* 组类型。


    要使用亚马逊 Web 服务 (AWS)，您需要一个所谓的 *AWS 访问密钥* 和一个 *AWS 秘密密钥*。两者都可以通过免费登录 *[`aws.amazon.com`](http://aws.amazon.com)*
    获得。对亚马逊 Web 服务的查询必须进行签名。签名由 `AWSHandlerResolver` 类的秘密密钥生成并确定。（您可以在本书的源代码/下载页面提供的示例项目中找到此类，网址为
    [www.apress.com](http://www.apress.com)）。您通过 `setAWSAccessKeyId()` 方法将访问密钥传递给
    `ItemLookup` 对象。您还添加了 `ItemLookupRequest` 对象。通过这种方式，您组成了查询所需的参数。现在，您可以在之前确定的 Web
    服务端口上执行 `itemLookup()` 操作。您将查询结果保存在一个 `ItemLookupResponse` 对象中，该对象包含一个以 `Item`
    对象形式呈现的已找到产品列表。由于一个 ASIN 只对应一个产品，您可以直接从列表中取出第一个项目。一个项目包含一个 `ImageSet`，您从中提取并返回预览图。


    现在整个查询已完成，`SwingWorker` 类调用 `done()` 方法。在此方法中，您可以通过 `get()` 方法获取 URL。最后，您可以直接从中创建一个
    `ImageIcon` 对象，以便后续显示（参见图 30-3）。


    ### 总结


    本章讨论了 Web 服务这一主题。您从相应的 WSDL 文件为 AWS 创建了一个 Web 服务 API（一个 Web 服务客户端）。为此，您使用了 NetBeans
    IDE 的相关工具支持。接下来，您学习了如何将 Web 服务客户端集成到您自己的 NetBeans Platform 应用程序中。总而言之，这个示例展示了在您自己的应用程序中使用
    Web 服务是多么容易。


    ## 第 31 章


    ## Java 企业版与 NetBeans 平台


    Java 企业版 (Java EE) 为开发由模块化组件构成的分布式多层业务应用程序提供了基础。特别是在业务应用程序中，NetBeans Platform
    常与大量数据结合使用，这些数据通常需要以复杂的方式进行编辑。如何有效地融合这两个世界——Java 企业版和 NetBeans 平台——自然成为了一个问题。


    在 Java EE 中，默认会提供一个应用程序客户端，用于 Java EE 应用程序的客户端使用。该应用程序客户端在应用程序客户端容器 (ACC) 中执行。不幸的是，这样的容器并不适合集成到
    NetBeans Platform 应用程序中。另一种可能性是放弃 ACC 的优势，直接访问 Java EE 应用程序——具体来说，就是企业 Java Bean
    (EJB)。但是，ACC 会在运行时自动创建包装类。这些包装类，加上特殊的类加载策略，禁止了与 NetBeans Platform 的集成；数量难以管理的库是另一个问题。这个问题的根源在于组件之间通过
    RMI-IIOP（基于互联网 Inter-Orb 协议的 Java 远程方法调用）等方式进行的通信。


    现在，一个 Java EE 应用程序除了企业 Java Bean 之外，还可以包含 Web 服务。这些 Web 服务甚至被视为 EJB。通信通过简单的 SOAP
    协议在 HTTP 协议之上进行（参见图 31-1）。您已经在第 30 章中了解到，从 NetBeans Platform 应用程序中调用 Web 服务是多么容易。原因在于该协议所需的实现工作量很小；由此可知，只需要少量的库。此外，仅有的两个必要
    API——JAX-WS 和 JAXB——自 Java 6 起就已经是 Java 平台的一部分。不需要外部库。


    从这个角度来看，我建议您将 Web 服务用作企业 Java Bean 的一种外观或中间件。这样，就可以轻松地从 NetBeans Platform 应用程序中调用
    EJB。已有的 EJB 结构可以保持不变，因为 Web 服务层可以说是仅置于其前端。此外，这样的外观有助于不同 Bean 的聚合和编排。


    ![图片](img/3101.jpg)


    ***图 31-1.** 以 Web 服务作为与 EJB 通信接口的 Java EE 应用程序架构*


    以下各节将通过一个简单的示例来说明这种架构的实现。在该示例中，NetBeans Platform 的用户应该能够从服务器查询产品，并将多个产品放入一个由服务器端管理的购物车中。

