    \   displayName = \"#CTL_FirstTrayAction\")\n@ActionReferences({\n   @ActionReference(path\
    \ = \"TrayMenu\", position = 100)\n})\npublic final class FirstTrayAction implements\
    \ ActionListener {\n   @Override\n   public void actionPerformed(ActionEvent e)\
    \ {\n      System.out.println(\"My First Tray Action\");\n   }\n}\n```\n\n您从由`Lookup`提供的已注册操作中构建上下文菜单。创建上下文菜单后，创建一个`TrayIcon`对象，将菜单、图标和工具提示传递给该对象，并将其添加到系统托盘，如[清单15-2](#Chapter15.html#list_15_2)所示。\n\
    \n***清单15-2.** 添加系统托盘图标，其内容由层文件中的数据构建*\n\n```\nimport org.openide.modules.ModuleInstall;\n\
    import org.openide.util.ImageUtilities;\nimport org.openide.util.lookup.Lookups;\n\
