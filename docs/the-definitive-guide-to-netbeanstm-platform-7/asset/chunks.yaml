    ## C H A P T E R  31


    ## Java Enterprise Edition and the NetBeans Platform


    Java Enterprise Edition (Java EE) provides the basis for developing distributed
    multilayered business applications out of modular components. Particularly with
    business applications, the NetBeans Platform is used in connection with large
    quantities of data which often must be edited in a complex way. The question of
    how to usefully merge these two worlds, Java Enterprise Edition and the NetBeans
    Platform, naturally arises.


    By default in Java EE, an application client is provided for the client-side usage
    of Java EE applications. This application client is executed in an Application
    Client Container (ACC). Unfortunately, such a container is not qualified for integration
    in a NetBeans Platform application. Another possibility is to forego the advantages
    of an ACC and directly address Java EE applications—specifically, Enterprise Java
    Beans (EJBs). But the ACC creates wrapper classes automatically at runtime. These
    wrapper classes, together with a special classloading strategy, forbid integration
    into the NetBeans Platform; an unmanageable number of libraries is another problem.
    The origin of this problem is the communication of the components spread through
    RMI-IIOP (Java Remote Method Invocation over the Internet Inter-Orb Protocol),
    among others.


    Now, a Java EE application can contain web services besides Enterprise Java Beans.
    These web services are even treated as EJBs. The communication works with the
    simple SOAP protocol over the HTTP protocol (see [Figure 31-1](#Chapter31.html#fig_31_1)).
    You already learned in [Chapter 30](#Chapter30.html#ch30) how easy it is to call
    web services out of a NetBeans Platform application. The reason for this is that
    the protocol needs little implementation effort; from this it follows that there
    is only a small number of libraries needed. Besides, just two necessary APIs—JAX-WS
    and JAXB— have been part of the Java Platform since Java 6\. No external libraries
    are necessary.


    From this point of view, I suggest you use web services as a sort of façade or
    rather as middleware for Enterprise Java Beans. This way, it is possible to easily
    call EJBs from a NetBeans Platform application. An already existing structure
    of EJBs can remain unchanged because the web service layer is only put in front
    of it, so to speak. Moreover, such a façade facilitates aggregation and orchestration
    of different beans.


    ![Image](images/3101.jpg)


    ***Figure 31-1.** Architecture of a Java EE application with web services as communication
    interface with EJBs*


    The following sections will illustrate the implementation of such an architecture
    by means of a simple example. In that example, the user of the NetBeans Platform
    should be able to query products from the server and put several products in a
    shopping cart which is managed on server side.'
