    ## C H A P T E R  6


    ## Actions


    The treatment of actions of the NetBeans Platform is based on the *Swing Action
    Framework*. Consequently, each action is based on the Swing interface `ActionListener`
    or `Action`. The benefit of the NetBeans Platform is that it provides an infrastructure
    for different recurring types of actions. Previously actions had to be derived
    from a special class depending on the type of action; since NetBeans Platform7
    all actions have the same form and just need to implement the `ActionListener`
    interface. In addition to the fact that actions are now easier to use, the implementation
    of actions has become more transparent for you as a developer. Now the NetBeans
    Platform does the hard work for you in the background.


    **ENORMOUSLY EASIER: ACTIONS IN THE NETBEANS PLATFORM 7**


    Just implement your action logic via an `ActionListener` interface. Meta information,
    such as ID, name, or the icon of the action, is simply added with annotations.
    The NetBeans Platform does the rest for you.


    Not only is it possible to create rudimentary action classes which execute their
    logic encapsulated (`AlwaysEnabled`), but actions can be created which dynamically
    transfer available actions (`Callback`) or actions which are able to include their
    logic in a certain context (`ContextAware`). [Figure 6-1](#Chapter06.html#fig_6_1)
    gives an overview of these three main types of actions again with their most important
    features.


    ![Image](images/0601.jpg)


    ***Figure 6-1.** Different types of actions within the NetBeans Platform*


    The registration of actions is centrally done in the layer file of your standard
    folder `Actions`. This central registration can then be referred to from other
    places. This has one great advantage: actions can be used at different places
    at once, for example in the menu bar, in the toolbar, and in an application module
    itself connected with a control element. So just one instance of the action class
    is created by the platform. A further reason for the central declaration of the
    actions is the possibility of adapting the toolbar user specifically. Like this,
    all available actions can be shown to the user and can be assigned to any toolbar.
    If the user removes an entry from the toolbar, the action is not lost because
    only the reference is deleted and not the action itself.


    To simplify the registration and the assignment of actions the NetBeans Platform
    7 has something new, too. Now, annotations are used instead of the manual registration
    and assignment in the layer file. With this information the referring layer entries
    are automatically generated creating the application. You are not forced to use
    annotations, though. You can still create the layer entries directly in the layer
    file.


    In the following sections I will explain how to simply create actions, how to
    build them, and how to register them via annotations or by a manual layer entry.
    To create action classes you use the wizard that is provided by the NetBeans IDE.
    You will learn that action classes are so simple that you do not even need the
    wizard.'
