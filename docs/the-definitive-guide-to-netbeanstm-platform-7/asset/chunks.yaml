    \n## Chapter 18: Navigator\n\nYou can display context-dependent panels with the\
    \ `Navigator` window and the `Navigator API`. Typically, these panels are used\
    \ by the NetBeans IDE editor for navigation in a document, for example. Here,\
    \ the constructors, methods, and additional elements of a Java class are displayed\
