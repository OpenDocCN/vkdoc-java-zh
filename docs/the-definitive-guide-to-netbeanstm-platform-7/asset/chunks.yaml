  trans: '

    ## Eclipse IDE 与 NetBeans 平台


    在第 37 章中，你已经了解到，即使不使用 NetBeans IDE，也能轻松创建基于 NetBeans 平台的应用程序。现在之所以能够实现这一点，是因为
    NetBeans 平台应用程序可以使用 Maven（配合 NetBeans Maven 插件）进行开发。一个包含所有 NetBeans 模块（作为 Maven
    模块）的 Maven 仓库位于 [`http://bits.netbeans.org/maven2`](http://bits.netbeans.org/maven2)，因此，对
    NetBeans 平台模块的依赖关系可以轻松地通过一个 XML 条目来定义。


    除了 Maven，大量的注解也有助于摆脱对特定 IDE 的依赖，因为到目前为止，许多声明式配置条目已经通过相应的向导创建完成。但手动编译这些条目既复杂又容易出错。相应的配置条目和配置文件会自动生成。


    由于 Eclipse IDE 支持 Maven，因此为使用 NetBeans 平台扫清了道路。


    ### 安装 Eclipse IDE


    本章假设你已经安装了当前版本的 Eclipse。你可以从 [`http://www.eclipse.org/downloads`](http://www.eclipse.org/downloads)
    获取发行版，不过该版本尚未包含对 Maven 项目的支持。你可以通过 *M2Eclipse* 功能来安装对 Maven 项目的支持。


    获取 M2Eclipse 功能最简单的方式是通过 *Eclipse Marketplace*。为此，只需激活 *Help ![Image](img/U001.jpg)
    Eclipse Marketplace*。选择 *Eclipse Marketplace* 目录。所有可用的功能将显示在接下来的页面上。之后，你可以点击 *Install*
    按钮安装 *Maven Integration for Eclipse*。确定必要的插件后（参见图 38-1），点击 *Finish* 关闭向导。


    ![Image](img/3801.jpg)


    ***图 38-1.** 安装 M2Eclipse 功能*


    安装完 Maven 功能后，下一步需要确保 Eclipse IDE 使用 JDK 的虚拟机启动，因为 Maven 插件会用到 JDK 中的库。你可以修改位于
    Eclipse 发行版根目录下的 *eclipse.ini* 文件。在该文件中，你可以使用 `vm` 参数指定要使用的虚拟机，如下所示：


    `-vm`

    `C:\Program Files\Java\jdk1.6.0_23\bin\javaw.exe`


    此参数必须指定在 `vmargs` 参数之前。


    ### 创建 NetBeans 平台应用程序


    现在你的 Eclipse IDE 可以处理 Maven 项目了，你可以在 Eclipse 中创建基于 NetBeans 平台的应用程序。为此，请调用 *File
    ![Image](img/U001.jpg) New ![Image](img/U001.jpg) Other...*，然后在 *Maven Project*
    向导类别中选择 *Maven*。保持 *Create a simple project* 选项为未选中状态，因为你希望在后续页面中选择一个特定的 Maven
    原型。该原型将为 NetBeans 平台应用程序创建基本结构。你可以通过在 *Nexus Indexer* 目录中过滤 `platform` 来找到所需的
    *netbeans-platform-app* 原型，如图 38-2 所示。


    ![Image](img/3802.jpg)


    ***图 38-2.** 选择 NetBeans 平台应用程序原型*


    选择此原型。在后续页面上，你需要为要创建的应用程序选择组 ID、工件 ID 和版本。这个包仅用于品牌模块。最后，你通过 `netbeansVersion`
    特性来确定要使用的 NetBeans 平台版本。你可以在 [`http://bits.netbeans.org/maven2/org/netbeans/cluster/platform`](http://bits.netbeans.org/maven2/org/netbeans/cluster/platform)
    查看标准仓库中可用的版本。点击 *Finish* 创建 NetBeans 平台 Maven 项目。（参见图 38-3。）


    ![Image](img/3803.jpg)


    ***图 38-3.** 定义 NetBeans 平台应用程序项目的参数*


    如第 37 章所述，Maven 将创建三个项目。一个项目（在此示例中名为 *MyApplication*）代表父 POM 文件。此外，还会创建两个引用父项目的
    Maven 模块项目。一个代表包含其模块的 NetBeans 平台（*application*），另一个代表品牌模块（*branding*）。


    ### 创建 NetBeans 平台模块


    现在，你可以为上面创建的 NetBeans 平台应用程序基础添加第一个应用程序模块。为此，你可以再次使用向导。在包资源管理器中调用父项目的上下文菜单（例如，*MyApplication*），然后选择
    *Maven ![Image](img/U001.jpg) New Maven Module Project*（注意：如果你使用菜单而不是上下文菜单，父 POM
    文件可能会被覆盖）。


    在第一页上，你为要创建的模块定义一个名称。它应该自动引用父项目。保持 *Create a simple project* 选项为未选中状态，因为你希望在接下来的向导页面上选择一个特定的
    NetBeans 模块原型。


    你可以在 *Nexus Indexer* 目录中找到 *nbm-archetype*——你可以过滤列表中的 *nbm* 条目。现在选择 *nbm-archetype*（参见图
    38-4）。


    ![Image](img/3804.jpg)


    ***图 38-4.** 选择 nbm-archetype 来创建 NetBeans 模块*


    在最后一个向导页面上，组 ID 应该已经被父项目的值预先填充。请定义当前有效模块的版本以及使用的基础包。此项目类型没有列出属性，但你必须定义 `netbeansVersion`
    属性。通过这种方式，你可以指定一个现有的 NetBeans 版本（参见图 38-5）。


    ![Image](img/3805.jpg)


    ***图 38-5.** 定义 NetBeans 平台模块项目的参数*


    最后，应用程序模块被创建，并在你点击 *Finish* 按钮时自动添加到父 POM 文件中。这样，整个应用程序稍后可以作为一个单元自动创建。父 POM 文件引用模块
    POM 文件；父 POM 文件继承模块 POM 文件的设置和特性。


    ### 添加依赖关系


    为了能够访问其他模块的类，你必须在 POM 文件中定义一个依赖关系。这也适用于使用 NetBeans 平台模块的类。如果你指定了组 ID、工件 ID 和版本，就可以手动在
    POM 文件中定义依赖关系。或者，你可以从相关模块的上下文菜单中点击 *Maven ![Image](img/U001.jpg) Add Dependency*。在那里你可以搜索模块，并通过点击
    *OK* 来添加选定的依赖关系。（参见图 38-6。）


    ![Image](img/3806.jpg)


    ***图 38-6.** 添加依赖关系*

