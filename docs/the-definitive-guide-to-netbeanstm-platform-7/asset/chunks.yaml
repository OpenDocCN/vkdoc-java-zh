- fmt: "# General Tests\n\nLet's assume the class `Math`, shown in [Listing 42-1](#Chapter42.html#list_42_1),\
    \ is the first simple JUnit test class. You want to check its methods for correctness\
    \ by a unit test. You create this in a module of a NetBeans Platform application.\n\
    \n**Listing 42-1.** Simple Class with Methods to Be Checked by a Unit Test\n\n\
    ```\npublic class Math {\n    public int add(int a, int b) {\n        return a\
    \ + b;\n    }\n    public int subtract(int a, int b) {\n        return a - b;\n\
    \    }\n}\n```\n\nThe NetBeans IDE provides various wizards for creating the basic\
    \ structure of a unit test. In addition to creating an empty test class, you can\
    \ create a test for assigned classes, so tests can be created for all methods.\
    \ This saves a lot of time and work. You create a test class for the class to\
    \ check `Math` the same way. Call *File ![Image](images/U001.jpg) New File ![Image](images/U001.jpg)\
    \ JUnit ![Image](images/U001.jpg) Test for Existing Class*. Select the desired\
    \ class with *Browse*. (See [Figure 42-1](#Chapter42.html#fig_42_1).)\n\n![Image](images/4201.jpg)\n\
    \n**Figure 42-1.** Creating test cases for an existing class automatically\n\n\
    As depicted in [Figure 42-1](#Chapter42.html#fig_42_1) you can choose the methods\
    \ for which a test will be created. There is a distinction between *Public, Protected,*\
    \ and *Package Private* methods. You can also determine whether a *Test Initializer*\
    \ and/or a *Finalizer* method will be created. By the option *Default Method Bodies*,\
    \ the tests are already implemented based on the signature of the method. You\
    \ barely need to adapt these implementations, depending on the complexity of the\
    \ methods which are tested. So this option can save a lot of work. After, press\
    \ *Finish* to create the test class `MathTest`, which will be created in a new\
    \ directory `test/unit/src`. Furthermore, a dependency on the JUnit library is\
    \ added to the application under *Unit Test Libraries*. Thus you get the project\
    \ structure shown in [Figure 42-2](#Chapter42.html#fig_42_2).\n\n![Image](images/4202.jpg)\n\
    \n**Figure 42-2.** Project structure with separate folders for test cases and\
    \ with the necessary libraries\n\n**![Image](images/square.jpg) Note** If you\
    \ want to add additional methods with the NetBeans wizard to your class after\
    \ creating the test class, you can create tests for those methods automatically.\
    \ To do so, just execute the wizard of the referring class again. Then the existing\
    \ test class is extended with the test cases for the new methods.\n\nNow let's\
    \ take a look at the created test class `MathTest`. You see at the beginning that\
    \ in this simple case no support by the *NB JUnit* module is necessary; only JUnit\
    \ classes are used. Furthermore, you recognize that since JUnit 4 the test class\
    \ no longer has to derive from a special base class. Despite this, the test cases\
    \ (and some helper methods) are now marked with annotations. Using annotations\
    \ you are free to give names to the methods. (See [Listing 42-2](#Chapter42.html#list_42_2).)\n\
    \n**Listing 42-2.** Test Class `MathTest` for Checking the Methods of the Class\
    \ `Math`\n\n```\nimport org.junit.After;\nimport org.junit.AfterClass;\nimport\
    \ org.junit.Before;\nimport org.junit.BeforeClass;\nimport org.junit.Test;\nimport\
    \ static org.junit.Assert.*;\n\npublic class MathTest {\n    public MathTest()\
    \ {\n    }\n\n    @BeforeClass\n    public static void setUpClass() throws Exception\
    \ {\n    }\n\n    @AfterClass\n    public static void tearDownClass() throws Exception\
    \ {\n    }\n\n    @Before\n    public void setUp() {\n    }\n\n    @After\n  \
    \  public void tearDown() {\n    }\n\n    @Test\n    public void testAdd() {\n\
    \        System.out.println(\"add\");\n        int a = 0;\n        int b = 0;\n\
    \        Math instance = new Math();\n        int expResult = 0;\n        int\
    \ result = instance.add(a, b);\n        assertEquals(expResult, result);\n   \
    \     // TODO review the generated test code.\n        fail(\"The test case is\
    \ a prototype.\");\n    }\n\n    @Test\n    public void testSubtract() {\n   \
    \     System.out.println(\"subtract\");\n        int a = 0;\n        int b = 0;\n\
    \        Math instance = new Math();\n        int expResult = 0;\n        int\
    \ result = instance.subtract(a, b);\n        assertEquals(expResult, result);\n\
    \        // TODO review the generated test code.\n        fail(\"The test case\
    \ is a prototype.\");\n    }\n}\n```\n\nBoth methods marked with the annotations\
    \ `@Before` and `@After` are automatically executed before running each test of\
    \ this class. So certain preconditions and resources can be determined and allocated\
    \ before running the tests. Afterward, they can eventually be released again.\
    \ A new instance of the class is created for running each single test of a class.\
    \ This means the constructor is suitable to allocate resources which are for all\
    \ test cases of a class.\n\nIf you need a connection to a database for multiple\
    \ tests, for example, it makes sense (for performance reasons) to create the connection\
    \ only once and then close it after finishing all referring tests. For this purpose\
    \ you can mark two methods with the annotations `@BeforeClass` and `@AfterClass`,\
    \ with which you can do the necessary preparatory work and rework. These methods\
    \ have to be declared as `static`, because they are called in before creating\
    \ the class. Furthermore, this enforces the fact that the resources (such as database\
    \ connections) that are globally provided by those methods are `static` as well.\
    \ This way they are provided to all instances. An example is shown in [Listing\
    \ 42-3](#Chapter42.html#list_42_3).\n\n**Listing 42-3.** Providing and Opening\
    \ Resources Before or After Doing All Tests\n\n```\npublic class DatabaseTest\
    \ {\n    private static Connection conn;\n\n    @BeforeClass\n    public static\
    \ void setUpClass() throws Exception {\n        conn = DriverManager.getConnection(\"\
    url\");\n    }\n\n    @AfterClass\n    public static void tearDownClass() throws\
