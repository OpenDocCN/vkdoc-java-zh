    ### 总结


    在本章中，我们创建了一个更大的示例，使您能够应用在前几章中学到的许多概念。首先，您定义了一个基于 NetBeans 模块的模块化应用程序结构。您创建了一个模块，使示例应用程序能够播放
    MP3 文件。该模块包含 JMF 类以及 MP3 插件。


    为了在 NetBeans 平台中处理 MP3 文件，您创建了一个 MP3 文件类型，如第 7 章所述。接着，您在 NetBeans 平台应用程序中包含了一个
    ID3 库，实现了一个 MP3 播放器服务模块。在此模块中，您还为播放器实现了一个小型 GUI。


    接下来，您创建了播放列表功能。为此，您创建了自己的节点视图和节点容器。为了实现从媒体库窗口拖放的功能，您扩展了 `Node` 类。


    最后，本章演示了如何轻松地逐步构建一个模块化的 NetBeans 平台应用程序，并强调了此类应用程序的可扩展性。


