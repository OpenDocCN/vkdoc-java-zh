- fmt: "#### Drag and Drop\n\nFirst, you extend the `Mp3DataNode` class. The super\
    \ class, `AbstractNode`, already implements the `drag()` method, which is invoked\
    \ if a drag event occurs. For example, a drag event will be fired when you drag\
    \ files from the Media Library to the playlist. This method must deliver a `Transferable`\
    \ instance. So you will implement the `Transferable` interface and its methods\
    \ in the `Mp3DataNode` class. You overwrite the `drag()` method and thus, a reference\
    \ is returned to its own reference. To access the data, and for identification\
    \ purposes, during a drag-and-drop operation you create a `DataFlavor` object\
    \ that can be accessed from outside. (See [Listing 44-20](#Chapter44.html#list_44_20).)\n\
    \n***Listing 44-20.** Extension to the Mp3DataNode Class to Enable Drag and Drop*\n\
    \n```\npackage com.hboeck.mp3manager.filetype;\nimport java.awt.datatransfer.DataFlavor;\n\
    import java.awt.datatransfer.Transferable;\nimport java.awt.datatransfer.UnsupportedFlavorException;\n\
    ...\npublic class Mp3DataNode extends DataNode implements Transferable {\n   public\
    \ static final DataFlavor DATA_FLAVOR =\n         new DataFlavor(Mp3DataNode.class,\
    \ \"Mp3DataNode\");\n   ...\n   @Override\n   public Transferable drag() {\n \
    \     return this;\n   }\n\n   @Override\n   public DataFlavor[] getTransferDataFlavors()\
    \ {\n      return new DataFlavor[]{DATA_FLAVOR};\n   }\n\n   @Override\n   public\
    \ boolean isDataFlavorSupported(DataFlavor flavor) {\n      return flavor == DATA_FLAVOR;\n\
    \   }\n\n   @Override\n   public Object getTransferData(DataFlavor flavor) throws\
    \ UnsupportedFlavorException {\n      if(flavor == DATA_FLAVOR) {\n         return\
    \ this;\n      } else {\n         throw new UnsupportedFlavorException(flavor);\n\
    \      }\n   }\n}\n```\n\nHowever an `Mp3DataNode` can now be transferred, your\
    \ playlist is still not able to accept it. Now, you must add a `DropTarget` to\
    \ the `PlaylistView`. You create a `DropTarget` object and pass a `DropTargetAdapter`\
    \ to it. Via this `DropTargetAdapter` you are then notified regarding both drag-and-drop\
    \ events. You only implement the methods `dragEnter()` and `drop()`. The `dragEnter()`\
    \ method is called as soon as a file is dragged to your playlist. As you only\
    \ want to allow drops of MP3 files, check the type of data using the data flavor.\
    \ In case it is not an `Mp3DataNode`, you call the `rejectDrag()` method to prevent\
    \ a drop. The `drop()` method is invoked during the real drop event. So, you extract\
    \ the `Mp3DataNode` from the parameter and add the node to the `ExplorerManager`,\
    \ or rather the container responsible for the view. (See [Listing 44-21](#Chapter44.html#list_44_21).)\n\
    \n***Listing 44-21.** To Enable the Addition of MP3 Files via Drag and Drop, a\
    \ DropTarget Is Required for the PlaylistView.*\n\n```\npackage com.hboeck.mp3manager.playlist;\n\
    import java.awt.dnd.DropTarget;\nimport java.awt.dnd.DropTargetAdapter;\nimport\
    \ java.awt.dnd.DropTargetDragEvent;\nimport java.awt.dnd.DropTargetDropEvent;\n\
    ...\npublic class PlaylistView extends TreeTableView {\n   public PlaylistView()\
    \ {\n      setRootVisible(false);\n      setDropTarget();\n   }\n\n   private\
    \ void setDropTarget() {\n      DropTarget dt = new DropTarget(this, new DropTargetAdapter()\
    \ {\n         @Override\n         public void dragEnter(DropTargetDragEvent dtde)\
    \ {\n            if(!dtde.isDataFlavorSupported(Mp3DataNode.DATA_FLAVOR)) {\n\
    \               dtde.rejectDrag();\n            }\n         }\n\n         @Override\n\
    \         public void drop(DropTargetDropEvent dtde) {\n            try {\n  \
    \             Mp3DataNode n = (Mp3DataNode)dtde.getTransferable().\n         \
    \         getTransferData(Mp3DataNode.DATA_FLAVOR);\n               ExplorerManager.find(getParent()).\n\
    \                  getRootContext().getChildren().add(new Node[]{n});\n      \
    \      } catch(Exception e) {\n               Exceptions.printStackTrace(e);\n\
    \               dtde.rejectDrop();\n            }\n         }\n      });\n   \
    \   setDropTarget(dt);\n   }\n}\n```\n\nThus, you are now able to drag MP3 files\
    \ from the Media Library or other sources directly into a playlist."
