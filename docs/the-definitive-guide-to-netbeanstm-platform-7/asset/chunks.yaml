    现在进入关键部分，即为清单文件类型注册此控制器。首先，您需要确定清单文件已注册的 MIME 类型。您可以通过 *项目* 视图下 *重要文件* ![Image](img/U001.jpg)
    XML 层 ![Image](img/U001.jpg) <此层在上下文中> 的层树轻松找到此类型。在那里，您可以在 `Editors` 下找到 MIME
    类型 `text/x-mainfest`。因此，您需要在层文件的 `Editors/text/x-manifest` 文件夹中注册控制器，如下所示：


    `<folder name="`**`Editors`**`">`

    `   <folder name="`**`text`**`">`

    `      <folder name="`**`x-manifest`**`">`

    `         <file name="`**`ManifestPalette`**`.instance">`

    `            <attr name="instanceOf" stringvalue="org.netbeans.spi.palette.`**`paletteController`**`"/>`

    `            <attr name="instanceCreate"`

    `               methodvalue="com.galileo.netbeans.module.`**`ManifestPalette`**`.`**`createPalette`**`"/>`

