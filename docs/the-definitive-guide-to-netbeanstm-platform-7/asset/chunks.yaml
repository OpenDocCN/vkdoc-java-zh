  raw: '#### Plugin Lifecycle and Events


    An Eclipse plugin may contain an *activator*. This class extends the abstract
    class `Plugin` or `AbstractUIPlugin`, depending on whether the plugin contains
    graphic elements or not. This optional class serves as the conceptual representation
    of the plugin. Containing no application logic, it mainly reacts to distinguished
    events; for instance, the methods `start()` and `stop()` specified by the interface
    `BundleActivator` and implemented by the classes `Plugin` and `AbstractUIPlugin`.
    The methods are called by the Eclipse Platform when the plugin is loaded or closed.
    By overwriting these methods, special platform-specific tasks can be executed
    at these times. An `Activator` in its simplest form looks like that shown in [Listing
    39-1](#Chapter39.html#list_39_1).


    ***Listing 39-1.** Activator Class of an Eclipse Plugin*


    `import org.eclipse.core.runtime.Plugin;`

    `import org.osgi.framework.BundleContext;`


    `public class` **`Activator`** `extends` **`Plugin`** `{`

    `   private static Activator plugin;`


    `public void` **`start`**`(BundleContext context) throws Exception {`

    **`super.start`**`(context);`

    `      plugin = this;`

    `   }`


    `public void` **`stop`** `(BundleContext context) throws Exception {       plugin
    = null;`

    **`super.stop`**`(context);`

    `   }`


    `public static Activator` **`getDefault`**`() {`

    `      return plugin;`

    `   }`

    `}`


    The counterpart to the Eclipse plugin activator is the module installer of a NetBeans
    module. This module installer is optional. The NetBeans platform instantiates
    an installer during module startup. The installer extends the class `ModuleInstall`
    (see [Listing 39-2](#Chapter39.html#list_39_2)).


    This class specifies the methods `restored()` and `close()`, which are equivalent
    to methods in the `BundleActivator` interface. Also available are `validate()`,
    for the examination of the starting conditions; `closing()`, for the examination
    of stop conditions; and `uninstalled()`, for uninstallation of the module. As
    with an activator, these methods can be overwritten and used as required.


    ***Listing 39-2.** The Counterpart to the Activator Is a NetBeans Module Installer.*


    `import org.openide.modules.ModuleInstall;`


    `public class` **`Installer`** `extends` **`ModuleInstall`**`{`


    `   @Override`

    `public void` **`restored`**`() {`

    `      // module started`

    `   }`


    `   @Override`

    `public void` **`close`**`() {`

    `      // module stopped`

    `   }`


    `public static Installer` **`getDefault`** `() {`

    `return` **`findObject`**`(Installer.class, true);`

    `   }`

    `}`


    While the activator of an Eclipse plugin is automatically created by a new plugin
    project, the installer can be created anytime with the Module Installer wizard,
    found under *File ![Image](images/U001.jpg) New File... ![Image](images/U001.jpg)
    Module Development ![Image](images/U001.jpg) Installer / Activator*. Thus, the
    installer is also registered in the manifest file. You can find more detailed
    information on this in [Chapter 3](#Chapter03.html#ch3).


    #### Plugin Information


    In addition to to starting and stopping plugins, the activator class has other
    functionalities. It can, for example, provide plugin and manifest information
    via a `Bundle` object. Information on NetBeans modules is offered by the NetBeans
    Platform with a `ModuleInfo` object. Instances for all modules within the application
    are available on the Lookup. Out of this set you can retrieve the `ModuleInfo`
    instance of your own module. You can provide this instance to the module users
    over the installer class with the help of the `getModule()` method, as shown in
    [Listing 39-3](#Chapter39.html#list_39_3).


    ***Listing 39-3.** Providing the ModuleInfo Instance, Which Contains Information
    on the Module*


    `import org.openide.modules.`**`ModuleInfo`**`;`

    `import org.openide.modules.ModuleInstall;`

    `import org.openide.util.Lookup;`


    `public class` **`Installer`** `extends ModuleInstall {`

    `public static final String` **`MODULE_ID`** `= "`**`com.galileo.netbeans.module`**`";`

    `private` **`ModuleInfo`** `info = null;`

    `   ...`

    `public ModuleInfo` **`getModuleInfo`**`() {`

    `      if (info == null) {`

    `Collection<? extends` **`ModuleInfo`**`> all =`

    `            Lookup.getDefault().`**`lookupAll`** `(`**`ModuleInfo`**`.class);`

    `         for (ModuleInfo mi : all) {`

    `            if (mi.`**`getCodeNameBase`**`().equals(`**`MODULE_ID`**`)) {`

    `               info = mi; break;`

    `            }`

    `         }`

    `      }`

    `return` **`info`**`;`

    `   }`

    `}`


    Alternatively, you can use the Auto Update Services API (see [Chapter 25](#Chapter25.html#ch25)),
    which has access to all installed modules and their properties.


    The class `UpdateElement` provides all module information such as name, version,
    category, or author. (See [Listing 39-4](#Chapter39.html#list_39_4).)


    ***Listing 39-4,** Determine Module Information via the Update Manager.*


    `import org.netbeans.api.autoupdate.`**`UpdateElement`**`;`

    `import org.netbeans.api.autoupdate.UpdateManager;`

    `import org.netbeans.api.autoupdate.UpdateUnit;`

    `...`

    `public class` **`Installer`** `extends ModuleInstall {`

    `   public static final String MODULE_ID = "com.galileo.netbeans.module";`

    `   private static UpdateElement moduleInfo;`

    `   ...`

    `public static` **`UpdateElement getModuleInfo`** `() {`

    `      if (moduleInfo == null) {`

    `for (UpdateUnit unit :` **`UpdateManager`**`.getDefault().`**`getUpdateUnits`**`(`

    `            UpdateManager.TYPE.MODULE)) {`

    `            if (unit.`**`getInstalled`**`() != null`

    `               && unit.getInstalled().getCodeName().equals(MODULE_ID)) {`

    `               moduleInfo = unit.getInstalled();`

    `               break;`

    `            }`

    `         }`

    `      }`

    `      return moduleInfo;`

    `   }`

    `}`


    #### Images


    Pictures and icons used within an application are not loaded over the installer,
    but over a central `ImageUtilities` class in the NetBeans Platform. This class
    provides the methods `loadImage()` and `loadImageIcon()` which should (preferably)
    be used. Behind them is an icon manager which manages the loaded images and icons
    and prevents a repeated loading of resources. Use it to load icons from all available
    modules. It is also possible to load localized resources, as in the following
    example. If the second parameter is set to `true` and there is an icon named *icon_de_DE.png*
    available, then it is loaded (if the locale setting of application is `de_DE`):


    `Image img = ImageUtilities.`**`loadImage`**`("resources/icon.png",` **`true`**`);`'
