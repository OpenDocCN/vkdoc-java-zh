  trans: '

    #### 绑定表与数据源


    第一步是创建（或使用已有的）Java DB 数据库。在“服务”窗口中，你可以通过 *数据库 ![Image](img/U001.jpg) Java DB*
    节点的上下文菜单中的“创建数据库”轻松创建一个新数据库。在本示例中，该数据库被命名为 *ProductDatabase*。你需要向数据库中添加一个结构如清单
    41-3 所示的表，然后创建两个测试数据集——之后你可以随时添加任意数量的条目。


    ***清单 41-3.** 表结构与测试数据集*


    `CREATE TABLE` **`product`** `(`

    `   id INT NOT NULL PRIMARY KEY GENERATED ALWAYS AS IDENTITY,`

    `   title   VARCHAR(50) NOT NULL,`

    `   orderId VARCHAR(10) NOT NULL,`

    `   price   DOUBLE      NOT NULL`

    `);`


    `INSERT INTO product (title, orderId, price) VALUES (''Product 1'', ''P1'', 1.49);`

    `INSERT INTO product (title, orderId, price) VALUES (''Product 2'', ''P2'', 5.99);`


    现在你需要为这个表创建一个实体类。不过，你无需自己实现这个实体类，而是可以通过 NetBeans IDE 的向导自动生成。但在此之前，需要一个 Java 类库项目。通过
    *文件 ![Image](img/U001.jpg) 新建项目... ![Image](img/U001.jpg) Java ![Image](img/U001.jpg)
    Java 类库* 来创建它。然后，你可以在此项目中使用向导（路径：*文件 ![Image](img/U001.jpg) 新建文件... ![Image](img/U001.jpg)
    持久化 ![Image](img/U001.jpg) 来自数据库的实体类*）来实现所需的实体类。第一步，选择数据库连接，然后选择表 *PRODUCT*。在下一步中，取消创建命名查询和
    JAXB 注释的选项。但是，应该创建一个持久化单元。在向导的最后一页，选择 `java.util.List` 作为*集合类型*，并取消选中*用于重新生成表的属性*选项，因为你是在已有的表基础上进行操作。然后，点击*完成*创建
    `Product` 类。该类除了具有 JPA 注释的属性外，还包含 getter 和 setter 方法。稍后，需要实现一个监听器逻辑，用于将 `Product`
    实例的更改传播到表中。所有 set 方法都必须使用 `firePropertyChange()` 方法来通知监听器。（参见清单 41-4。）


    ***清单 41-4.** 带有更改监听器逻辑的 PRODUCT 表实体类，该逻辑可直接显示表中的更改*


    `import java.beans.PropertyChangeListener;`

    `import java.beans.PropertyChangeSupport;`

    `import javax.persistence.Basic;`

    `import javax.persistence.Column;`

    `...`

    **`@Entity`**

    `@Table(name = "PRODUCT")`

    `public class` **`Product`** `implements Serializable {`

    `   private static final long serialVersionUID = 1L;`


    `   @Id`

    `   @GeneratedValue(strategy = GenerationType.IDENTITY)`

    `   @Basic(optional = false)`

    `   @Column(name = "ID")`

    `private Integer` **`id`**`;`


    `   @Basic(optional = false)`

    `   @Column(name = "TITLE")`

    `private String` **`title`**`;`


    `   @Basic(optional = false)`

    `   @Column(name = "ORDERID")`

    `private String` **`orderid`**`;`


    `   @Basic(optional = false)`

    `   @Column(name = "PRICE")`

    `private double` **`price`**`;`


    `   private transient PropertyChangeSupport changeSupport = new PropertyChangeSupport(this);`


    `   public Product() {`

    `   }`


    `   public Product(Integer id) {`

    `      this.id = id;`

    `   }`


    `   public Product(`

    `      Integer id, String title, String orderid, double price) {`

    `      this.id = id;`

    `      this.title = title;`

    `      this.orderid = orderid;`

    `      this.price = price;`

    `   }`


    `   public Integer getId() {`

    `      return id;`

    `   }`


    `   public void setId(Integer id) {`

    `      Integer oldId = this.id;`

    `      this.id = id;`

    `      changeSupport.`**`firePropertyChange`**`("id", oldId, id);`

    `   }`


    `   public String getTitle() {`

    `      return title;`

    `   }`


    `   public void setTitle(String title) {`

    `      String oldTitle = this.title;`

    `      this.title = title;`

    `      changeSupport.`**`firePropertyChange`**`("title", oldTitle, title);`

    `   }`


    `   public String getOrderid() {`

    `      return orderid;`

    `   }`


    `   public void setOrderid(String orderid) {`

    `      String oldOrderid = this.orderid;`

    `      this.orderid = orderid;`

    `      changeSupport.`**`firePropertyChange`**`("orderid", oldOrderid, orderid);`

    `   }`


    `   public double getPrice() {`

    `      return price;`

    `   }`


    `   public void setPrice(double price) {`

    `      double oldPrice = this.price;`

    `      this.price = price;`

    `      changeSupport.`**`firePropertyChange`**`("price", oldPrice, price);`

    `   }    `


    `public void` **`addPropertyChangeListener`**`(PropertyChangeListener listener)
    {`

    `      changeSupport.addPropertyChangeListener(listener);`

    `   }`


    `public void` **`removePropertyChangeListener`**`(`

    `      PropertyChangeListener listener) {`

    `      changeSupport.removePropertyChangeListener(listener);`

    `   }`

    `}`


    文件 *persistence.xml* 与实体类一同生成。持久化单元由此文件配置。因此，你可以在此处根据需要编辑数据库的连接参数。持久化单元的名称很重要；稍后你将需要它来访问数据。（参见清单
    41-5。）


    ***清单 41-5.** persistence.xml 中持久化单元的配置*


    `<`**`persistence`** `...>`

    `  <persistence-unit name="`**`MyEntitiesLibraryPU`**`" transaction-type="RESOURCE_LOCAL">`

    `    <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>`

    `    <class>com.galileo.netbeans.myentities.Product</class>`

    `    <properties>`

    `      <property name="javax.persistence.jdbc.url"`

    `         value="jdbc:derby://localhost:1527/ProductDatabase"/>`

    `      <property name="javax.persistence.jdbc.password"`

    `         value="password"/>`

    `      <property name="javax.persistence.jdbc.driver"`

    `         value="org.apache.derby.jdbc.ClientDriver"/>`

    `      <property name="javax.persistence.jdbc.user"`

    `         value="admin"/>`

    `    </properties>`

    `  </persistence-unit>`

    `</`**`persistence`**`>`


    你可以通过*构建*来创建库项目。然后回到 NetBeans 平台。通过*文件 ![Image](img/U001.jpg) 新建项目 ![Image](img/U001.jpg)
    NetBeans 模块 ![Image](img/U001.jpg) NetBeans 平台应用程序* 创建一个应用程序。对于这个平台应用程序，你需要包含两个额外的模块。为此，在*属性
    ![Image](img/U001.jpg) 库*中打开 *java* 集群，并添加 *Beans Binding 集成* 和 *TopLink Essentials*
    这两个模块。之后，你可以添加一个库包装器模块，其中包含之前创建的实体类的 JAR 文件。此模块将被称为 *My Entities*。


    你还需要两个额外的库包装器模块，一个用于连接数据库，另一个用于保存对象。为数据库驱动程序添加一个模块；这是文件 *derbyclient.jar*，你可以在
    Java DB 安装目录中找到它。将此模块命名为 *Java DB Driver*。你需要另一个用于 *EclipseLink* 的库包装器模块作为持久化提供程序。将
    NetBeans IDE 安装目录下 *java/modules/ext/eclipselink* 中的 *eclipselink-2.2.0.jar* 和
    *eclipselink-javax.persistence-2.0.jar* 这两个文件添加到该模块。


    现在，只缺少一个模块了：实际的应用程序模块。将其命名为 *My Module*。你首先需要定义以下依赖关系，以便这些不同模块之间的交互能够正常工作：


    *   *My Entities* 模块包含对 *EclipseLink* 和 *Java DB Driver* 模块的依赖。

    *   *My Module* 模块包含对 *EclipseLink*、*My Entities* 和 *Beans Binding 集成* 模块的依赖。

