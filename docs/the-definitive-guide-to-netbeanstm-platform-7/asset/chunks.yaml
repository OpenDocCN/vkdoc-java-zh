- fmt: "# Creating Options Panels\n\nThe NetBeans IDE provides a wizard for creating\
    \ an options panel (for all three kinds), shown in [Figure 20-2.](#Chapter20.html#fig_20_2)\
    \ This wizard can be found under *File ![Image](images/U001.jpg) New File…* in\
    \ the category *Module Development ![Image](images/U001.jpg) Options Panel*. Depending\
    \ on your purpose, choose either a *Primary* *Panel* (with or without secondary\
    \ panels) or a *Secondary* *Panel* and indicate the data the wizard needs. Finally,\
    \ the wizard creates the panel and registers it via an annotation.\n\n![Image](images/2002.jpg)\n\
    \n***Figure 20-2.** NetBeans wizard for creating options panels*\n\nA panel consists\
    \ of a view and a controller. The view is responsible for providing the GUI and\
    \ for loading and saving the data. The controller creates the view and at the\
    \ same time is a broker between the options dialog and the view. The panel, meaning\
    \ the view, is derived from the `JPanel` class. You can arbitrarily place your\
    \ components, with which the options are displayed and set, on this panel. [Listing\
    \ 20-1](#Chapter20.html#list_20_1) uses two text fields. You save and load the\
    \ value of these fields via the Preferences API (see the “Managing Settings” section)\
    \ in the methods `store()` and `load()`, which are called by the controller when\
    \ opening and closing the panel.\n\nThe options dialog can only be closed by the\
    \ user when the appropriate settings haven been selected. Therefore, a panel must\
    \ inform the option dialog about its state, either valid or invalid. Implement\
    \ validation via the `valid()` method. In this example, for example, you want\
    \ to make sure the user enters a value in the first field, so you add a `DocumentListener`\
    \ to the `option1` text field. Now, each time the user makes an entry in the first\
    \ text field, the controller is informed via `Controller.changed()`, which in\
    \ turn calls the `valid()` method, only returning `true` when at least one character\
    \ is entered into the text field.\n\n***Listing 20-1.** View of the Options Panel,\
    \ Only Deriving from JPanel*\n\n```\npublic final class ModuleOptions1Panel extends\
    \ JPanel implements DocumentListener {\n   private JTextField option1;\n   private\
    \ JTextField option2;\n   private final ModuleOptions1PanelController controller;\n\
    \n   public ModuleOptionsPanel(ModuleOptions1PanelController ctl) {\n      this.controller\
    \ = ctl;\n      initComponents();\n      option1.getDocument().addDocumentListener(this);\n\
    \   }\n\n   public void insertUpdate(DocumentEvent event) {\n      controller.changed();\n\
    \   }\n\n   public void removeUpdate(DocumentEvent event) {\n      controller.changed();\n\
    \   }\n\n   public void changedUpdate(DocumentEvent event) {\n      controller.changed();\n\
    \   }\n\n   public void load() {\n      option1.setText(\n         NbPreferences.forModule(ModuleOptions1Panel.class).\n\
    \         get(\"option1\", \"default\"));\n   }\n\n   public void store() {\n\
    \      NbPreferences.forModule(ModuleOptions1Panel.class).\n         put(\"option1\"\
    , option1.getText());\n   }\n\n   public boolean valid() {\n      if(option1.getText().length()\
    \ == 0) {\n         return false;\n      } else {\n         return true;\n   \
    \   }\n   }\n}\n```\n\nNow let us look at the responsibilities of the controller.\
    \ Since the controller needs to interact with the options dialog, its interfaces\
    \ are determined by the abstract class `OptionsPanelController`. The controller's\
    \ most important task is the creation of the view, using `getPanel()`, which you\
    \ provide via the method `getComponent()`. As you can see, the method `getComponent()`\
    \ receives a Lookup. This is a proxy Lookup, containing the Lookups of all controllers\
    \ available in the options dialog. The controller uses the `getLookup()` method\
    \ to make a Lookup available, which is already implemented by the abstract class\
    \ `OptionsPanelController`. However, this default implementation just provides\
    \ an empty Lookup. So, in order to provide certain objects in the Lookup, you\
    \ have to overwrite the `getLookup()` method. Consequently, you can communicate\
    \ with other option panels via this so-called master Lookup, which you get via\
    \ `getComponent()`. You already learned in [Chapter 5](#Chapter05.html#ch5) how\
    \ communication can be realized using local Lookups and a global proxy Lookup\
    \ (in this case, the master Lookup).\n\nThe `update()` method is called when the\
    \ panel is loaded the first time. Here, you call the `load()` method of the panel\
    \ in order to load the data, so to initialize the fields. If the user clicks the\
    \ *OK* button, the `applyChanges()` method of the options dialog is called. So\
    \ here you save the data via the `store()` method. However, if the user cancels\
    \ the dialog, the `cancel()` method is called, in which you obviously do not save\
    \ the data. Should the situation arise, you can roll back the changes you already\
    \ made. Using the `isValid()` method, you inform the options dialog whether the\
    \ data of the panels is okay. If this is not the case, the *OK* button is automatically\
    \ deactivated. Moreover, you must inform the options dialog whether the data has\
    \ changed. You do this using the `isChanged()` method. With `getHelpCtx()`, you\
    \ can provide a `HelpCtx` object that contains a reference to a help page, which\
    \ will be displayed when the user clicks the options dialog's *Help* button.\n\
    \nTo inform the options dialog about changes in data, you must give it the possibility\
    \ of registering (see [Listing 20-2](#Chapter20.html#list_20_2)). You achieve\
    \ this via the methods `addPropertyChangeListener()` and `removePropertyChangeListener()`.\
    \ You already know the `changed()` method from the view class `ModuleOptions1Panel`.\
    \ This method is called by the view when data is changed, and thus informs the\
    \ options dialog about the changes. The options dialog is registered as a listener.\
    \ As a result, the options dialog in turn checks whether the data is valid.\n\n\
    ***Listing 20-2.** Options Panel Controller*\n\n```\nimport org.netbeans.spi.options.OptionsPanelController;\n\
    ...\n@OptionsPanelController.SubRegistration(\n   location = \"Advanced\",\n \
    \  displayName = \"#AdvancedOption_DisplayName_ModuleOptions1\",\n   keywords\
    \ = \"#AdvancedOption_Keywords_ModuleOptions1\",\n   keywordsCategory = \"Advanced/ModuleOptions1\"\
    )\npublic final class ModuleOptions1PanelController extends OptionsPanelController\
    \ {\n\n   private ModuleOptions1Panel panel;\n   private final PropertyChangeSupport\
    \ pcs = new PropertyChangeSupport(this);\n   private boolean changed;\n\n   public\
    \ JComponent getComponent(Lookup masterLookup) {\n      return getPanel();\n \
    \  }\n\n   private ModuleOptionsPanel getPanel() {\n      if (panel == null) {\n\
    \         panel = new ModuleOptions1Panel(this);\n      }\n      return panel;\n\
    \   }\n\n   public void update() {\n      getPanel().load();\n      changed =\
    \ false;\n   }\n\n   public void applyChanges() {\n      getPanel().store();\n\
    \      changed = false;\n   }\n\n   public void cancel() {\n   }\n\n   public\
    \ boolean isValid() {\n      return getPanel().valid();\n   }\n\n   public boolean\
    \ isChanged() {\n      return changed;\n   }\n\n   public HelpCtx getHelpCtx()\
    \ {\n      return null;\n   }\n}\n```"
