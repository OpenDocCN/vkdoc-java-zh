    #### 保存播放列表


    你可能已经注意到，重启应用程序时播放列表的内容会丢失。这是因为窗口系统虽然能存储播放列表本身，但无法存储其中包含的数据。换句话说，你需要为应用程序扩展加载和存储功能。一个很好的方法是将列表存储在嵌入式数据库中（例如，Java
    DB 在这方面就表现非常出色）。这种客户端数据库系统已在第 26 章的“Java DB”部分中使用过。你可以通过一个模块将其集成到应用程序中，从而将数据库用于其他目的（除了播放列表的使用之外）。


    该模块是一个库包装器模块，其创建方式与其他模块相同——通过 *文件 ![Image](img/U001.jpg) 新建项目... ![Image](img/U001.jpg)
    NetBeans 模块 ![Image](img/U001.jpg) 库包装器模块*。你需要从 Java DB 发行版中添加文件 *lib/derby.jar*
    和 *lib/derbyLocale_de_DE.jar*。（关于如何集成和使用 Java DB，以及如何获取发行版的更多信息，请参见第 26 章。）将模块命名为
    *Java DB*，并使用 `org.apache.derby` 作为代码名称基础。创建模块后，添加一个模块安装程序，用于初始化集中式访问。此类安装程序可以通过
    *文件 ![Image](img/U001.jpg) 新建文件... ![Image](img/U001.jpg) 模块开发 ![Image](img/U001.jpg)
    安装程序/激活器* 创建。之后，通过 *重构 ![Image](img/U001.jpg) 重命名...* 将其重命名为 *Database*。


    在模块启动时调用的 `restored()` 方法中，你需要设置 Java DB 的系统目录并执行 `initTables()` 方法。该方法将首先通过执行
    SELECT 查询来检查 `playlist` 表是否存在。如果表尚不存在，则会抛出 `SQLException`，你需要捕获该异常以便创建表。使用 `getConnection()`
    方法，你可以获得与数据库的连接。`close()` 方法允许在应用程序结束后正确关闭数据库系统。（参见清单 44-22。）


