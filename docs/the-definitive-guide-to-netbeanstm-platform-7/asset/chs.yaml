  **`Bundle-Version`**`: 1.0`\n**`Bundle-Name`**`: My Bundle`\n**`Bundle-Localization`**`:\
  \ com/galileo/osgi/bundle/Bundle`\n**`Bundle-Activator`**`: com.galileo.osgi.bundle.Installer`\n\
  **`Export-Package`**`: com.galileo.osgi.bundle.api`\n**`Require-Bundle`**`: com.galileo.netbeans.library;bundle-version=\"\
  1.0,100)\"`\n**`Bundle-RequiredExecutionEnvironment`**`: JavaSE-1.6`\n\n使用属性 `OpenIDE-Module-Localizing-Bundle`\
  \ 或 `Bundle-Localization` 定义本地化包时，请记住在 OSGi 包中不提供文件扩展名。通过属性 `Require-Bundle` 定义对另一个模块或包的依赖关系时，使用\
  \ `bundle-version` 指示所需的版本。要定义对运行时环境的最低要求，您可以使用属性 `Bundle-RequiredExecutionEnvironment`\
  \ 指定一个标签列表。如果期望 Java 6，请使用 `JavaSE-1.6`。其他标签示例包括 `J2SE-1.5` 或 `OSGi/Minimum-1.1`。\n\
  \n### 创建新的 OSGi 包\n\n在 NetBeans IDE 中创建新的 OSGi 包很容易。为此，请使用创建新 NetBeans 模块的向导，并指示它应成为一个符合\
  \ OSGi 规范的包，如[图 4-2 所示。\n\n![Image](img/0402.jpg)\n\n***图 4-2.** 使用 NetBeans 向导创建\
  \ OSGi 包*\n\n在 *NetBeans 模块* 类别中，选择 *文件* ![Image](img/U001.jpg) *新建项目…* 下的模块类型。然后在\
  \ *基本模块配置* 下激活 *生成 OSGi 包* 选项（参见图 4-2）。之后，模块或包的进一步使用是完全透明的，这意味着您可以像往常一样使用 NetBeans\
  \ 向导定义依赖关系或向包添加功能。特别有趣的是，您还可以向 OSGi 包添加层文件。该层文件也会集成到系统文件系统中 NetBeans 模块的层文件中。\n\n\
  在 NetBeans 平台应用程序中，请记住 OSGi 包实际上是由 OSGi 容器（默认是 Apache Felix OSGi 实现）执行的，而不是由 NetBeans\
  \ 模块系统执行的。与此相关，还请记住以下模块已被激活，因此已包含在您的平台应用程序中：\n\n*   OSGi 规范\n*   Apache 的 Felix\
  \ OSGi 实现\n*   NetBeans OSGi 集成\n\n### 包生命周期\n\n类似于第 3 章中介绍的 NetBeans 模块的模块安装器，OSGi\
  \ 框架为 OSGi 包提供了一种可能性，使您可以引用包生命周期中的某些事件。实现 `BundleActivator` 接口的此类类称为激活器（参见清单 4-3）。它提供了\
  \ `start()` 和 `stop()` 方法。\n\n***清单 4-3.** OSGi 包的激活器类*\n\n`import org.osgi.framework.BundleActivator;`\n\
  `import org.osgi.framework.BundleContext;`\n\n`public class Activator implements`\
  \ **`BundleActivator`**`{`\n`public void` **`start`**`(BundleContext c) throws Exception\
  \ {`\n`   }`\n`public void` **`stop`**`(BundleContext c) throws Exception {`\n`   }\
  \ }`\n\n也可以使用与创建模块安装器相同的 NetBeans 向导来创建此类。如果您通过 *文件* ![Image](img/U001.jpg) *新建文件*\
  \ ![Image](img/U001.jpg) *模块开发* ![Image](img/U001.jpg) *安装器 / 激活器* 为 OSGi 包调用此向导，则会自动创建一个激活器类。\n\
  \n### 集成现有的 OSGi 包\n\nNetBeans 平台支持 OSGi 包的一个重要优势无疑是能够重用已存在的、以 OSGi 包形式存在的组件。\n\n\
  向平台应用程序添加一个完整的包文件夹（称为*集群*）非常容易。为此，只需在相关项目的*属性*对话框中激活*库*类别。您可以通过*添加集群…*按钮添加包，该按钮也可以选择\
  \ NetBeans 平台提供的模块。（参见图 4-3。）在接下来的对话框中选择相关目录。如果所选目录不是集群，向导会指出这一点。如果您单击*下一步*，向导将列出所有\
  \ JAR 文件（包和模块）。然后您可以选择所需的包，并通过*完成*按钮完成向导。\n\n![Image](img/0403.jpg)\n\n***图 4-3.**\
  \ 创建和导入包集群*\n\n现在，您可以在模块中定义对之前添加的包的依赖关系。\n\n\n\n### OSGi 运行时容器中的 NetBeans 平台\n\n\
  前面几节讨论了在 NetBeans 平台内部（更准确地说，是与 NetBeans 平台并行）执行 OSGi 模块；NetBeans 平台模块仍由 NetBeans\
  \ 平台系统执行。现在，如果你想开发一个完全基于 OSGi 的应用程序，可以将整个 NetBeans 平台视为 OSGi 模块。\n\n为此，请在 NetBeans\
  \ 平台应用程序的上下文菜单中点击 *OSGi* ![Image](img/U001.jpg) *构建模块*。整个应用程序，即所有必要的 NetBeans 平台模块加上你自行创建的模块，会在\
  \ *build/osgi* 目录下以符合 OSGi 规范的模块形式创建。此外，你的应用程序可以直接在 NetBeans IDE 中的 OSGi 运行时容器 Felix\
  \ 中执行。为此，请在上下文菜单中点击 *OSGi* ![Image](img/U001.jpg) *在 Felix 中运行*；模块会自动创建并与 Felix\
  \ 一起启动。\n\n### 总结\n\n在本章中，你学习了 OSGi 框架的一些基础知识。你了解了 OSGi 模块的结构，并比较了 NetBeans 模块与\
  \ OSGi 模块的清单文件属性。你还学习了如何使用 NetBeans IDE 创建兼容 OSGi 的模块。本章的最后部分解释了模块的生命周期，以及如何将现有模块集成到\
  \ NetBeans 平台应用程序中。\n\n## 第 5 章\n\n## 查找概念\n\n查找概念既重要又简单。它在 NetBeans 平台应用程序的许多地方被使用，允许模块之间相互通信。本章展示了典型的用例以及查找概念的工作原理。\n\
  \n### 功能\n\n*查找*是 NetBeans 平台中用于管理对象实例的核心组件和常用概念。简化来说，查找是一个 `Map`，以 `Class` 对象作为键，以这些\
  \ `Class` 对象的实例作为值。\n\n查找背后的主要思想是解耦组件。它让模块之间能够相互通信，这在基于组件的系统（例如基于 NetBeans 平台的应用程序）中扮演着重要角色。一方面，模块可以提供对象；另一方面，模块可以通过查找来搜索和使用对象。\n\
  \n**![Image](img/square.jpg) 注意** 查找概念在查找 API 模块中实现。它提供了一个非常简单且清晰的接口。查找 API 模块在\
  \ NetBeans 平台中经常被使用（通常也是间接使用）；它是 NetBeans 平台模块化概念的基石。顺便提一下，查找 API 模块完全独立运行，不依赖于任何其他模块。也就是说，你可以在任何\
  \ Java 应用程序中使用查找 API 模块，即使该应用程序并非基于 NetBeans 平台开发。\n\n查找的优势在于其类型安全性，这是通过使用 `Class`\
  \ 对象而非字符串作为键来实现的。这样，键就定义了检索实例的类型。因此，不可能请求一个在模块中类型未知的实例。这种模式使得应用程序更加健壮，因为像 `ClassCastException`\
  \ 这样的错误不会发生。查找也用于检索和管理一个键（即一种类型）的多个实例。这种对特定实例的集中管理用于不同的目的。查找用于发现服务提供者，支持声明式添加和实例的延迟加载。除此之外，你可以通过查找将实例从一个模块传递到另一个模块，而无需模块之间相互了解。通过这种方式，建立了一种模块间的通信。甚至上下文相关的操作也是使用查找组件实现的。\n\
  \n为了澄清一个常见的误解，在单个应用程序中可以有多个查找。最常用的查找是全局查找，由 NetBeans 平台默认提供。此外，还有一些组件（例如 TopComponent）拥有自己的查找。这些是局部查找。如“模块间通信”部分所述，你可以创建自己的查找，并为你的组件配备一个查找。\n\
  \n查找概念简单、高效且方便。一旦你熟悉了这种模式，你会发现它适用于许多不同的领域。在接下来的部分中，将展示查找在其主要用例中的用法。\n\n### 服务与扩展点\n\
  \n查找的一个主要应用是发现和提供服务。在这种场景下，查找扮演着动态服务定位器的角色，允许将服务接口与服务提供者分离。一个模块使用功能而无需了解任何实现细节。通过这种方式，实现了模块之间的松散耦合。\n\
  \n使用查找和服务接口，可以轻松为图形组件定义扩展点。一个很好的例子是 NetBeans 状态栏，它定义了接口 `StatusLineElementProvider`。通过这个接口和服务提供者注册，状态栏可以用用户定义的组件进行扩展（第\
  \ 5 章的“状态栏”部分描述了一个示例），而状态栏无需了解这些组件或依赖于它们。\n\n为了实现动态、灵活的服务提供和交换，这些服务是以声明方式添加到查找中的，而不是在源代码中编程实现。这可以通过两种方法之一实现：使用\
  \ *META-INF/services* 目录中的服务提供者配置文件添加服务的实现，或者使用模块的层文件。这两种方法都将在本章后面的“注册服务提供者”部分展示。\n\
  \nNetBeans 平台提供了一个全局查找，可以通过静态方法 `Lookup.getDefault()` 获取。这个全局查找用于发现通过可用的声明式注册之一添加的服务。使用这种方法可以为单个服务注册多个实现。声明式注册允许在首次请求时实例化实现。这种模式被称为延迟加载。\n\
  \n为了更好地理解这种提供和请求服务的模式，并获得更实际的视角，本章将演示如何为 MP3 文件创建搜索列表。\n\n#### 定义服务接口\n\n模块 A 是一个提供用户界面的模块，允许用户通过特定的搜索条件搜索\
  \ MP3 文件。搜索结果会显示在一个列表中。为了保持独立于搜索算法，并确保能够动态使用多种搜索变体（这些变体可能在运行时切换），你在模块 A 中指定了服务接口\
  \ `Mp3Finder`。该服务定义了 MP3 文件的搜索接口。实际的搜索算法在另一个模块（模块 B）中实现，并通过声明式注册提供。\n\n\n\n####\
  \ 松散服务提供\n\n模块 B 是用于实现接口 `Mp3Finder` 的服务提供者。在此示例中，假设该模块正在数据库中搜索 MP3 文件。这允许注册服务提供者的多个实现。所有实现可以位于一个或多个独立的模块中。要创建模块\
  \ A 中接口 `Mp3Finder` 的 `Mp3DatabaseFinder` 实现，模块 B 必须定义对模块 A 的依赖关系。然而，作为搜索列表用户界面的模块\
  \ A 不需要依赖模块 B。这是因为 Lookup 基于接口（同样位于模块 A 中）而非实现（位于模块 B 中）提供服务。因此，模块 A 完全独立于服务的实现（参见图\
  \ 5-1），并且可以透明地使用它。\n\n![Image](img/0501.jpg)\n\n***图 5-1.** 服务查找模式*\n\n在模块 A 中，指定了服务接口\
  \ `Mp3Finder`，并实现了一个用于搜索和显示 MP3 文件的用户界面（参见清单 5-1）。通过将接口 `Mp3Finder` 的 `Class` 对象传递给\
  \ Lookup，返回一个与请求类型匹配的实例，从而获取服务提供者。接口 `Mp3Finder` 也被称为模块 A 的扩展点。任何模块都可以为其注册实现。\n\n\
  ***清单 5-1.** 模块 A：MP3 搜索器*\n\n`public interface` **`Mp3Finder`** `{`\n`public List<Mp3FileObject>`\
  \ **`find`**`(String search);`\n`}`\n`public class Mp3SearchList {`\n`   public\
  \ void doSearch(String search) {`\n**`Mp3Finder`** `finder =`\n`         Lookup.getDefault().Lookup(`**`Mp3Finder`**`.class);`\n\
  `      List<Mp3FileObject> list = finder.`**`find`**`(search);`\n`   }`\n`}`\n\n\
  模块 B 提供了一个服务提供者，允许在数据库中搜索 MP3 文件。这是通过实现模块 A 指定的接口 `Mp3Finder` 来完成的（参见清单 5-2）。因此，模块\
  \ B 是模块 A 在扩展点 `Mp3Finder` 上的一个扩展。\n\n新创建的服务提供者必须被注册，以便可以通过 Lookup 发现它。为此，你需要使用\
  \ `ServiceProvider` 注解。\n\n***清单 5-2.** 模块 B：MP3 查找器*\n\n`import org.openide.util.Lookup.ServiceProvider;`\n\
  `...`\n**`@ServiceProvider`**`(service = Mp3Finder.class)`\n`public class` **`Mp3DatabaseFinder`**\
  \ `implements` **`Mp3Finder`** `{`\n`public List<Mp3FileObject>` **`find`**`(String\
  \ search) {`\n`      // 在数据库中搜索 mp3 文件`\n`   }`\n`}`\n\n#### 提供多个服务实现\n\n能够注册多个\
  \ MP3 搜索实现是很有用的。这很容易实现。只需创建接口 `Mp3Finder` 的更多实现即可。同样，这些实现必须通过注解进行注册。例如，这样的实现可以如下所示：\n\
  \n`import org.openide.util.Lookup.ServiceProvider;`\n`...`\n**`@ServiceProvider`**`(service\
  \ = Mp3Finder.class)`\n`public class` **`Mp3FilesystemFinder`** `implements` **`Mp3Finder`**\
  \ `{`\n`public List<Mp3FileObject>` **`find`**`(String search) {`\n`      // 在本地文件系统中搜索\
  \ mp3 文件`\n`   }`\n`}`\n\n要使用某个服务的所有已注册实现，必须采用使用 Lookup 发现服务的方式。不要使用 `Lookup()`\
  \ 方法来获取单个实现，而应使用 `LookupAll()` 来检索该服务的所有已注册实现。按如下方式调用所有已发现服务的 `find()` 方法：\n\n`public\
  \ class Mp3SearchList {`\n`   public void doSearch(String search) {`\n`Collection<?\
  \ extends` **`Mp3Finder`**`> finder =`\n`         Lookup.getDefault().`**`LookupAll(Mp3Finder`**`.class);`\n\
  `      List<Mp3FileObject> list = new ArrayList<Mp3FileObject>();`\n`      for(Mp3Finder\
  \ f : finder) {`\n`         list.addAll(f.`**`find`**`(search));`\n`      }`\n`   }`\n\
  `}`\n\n#### 确保服务可用性\n\n如果没有可用的搜索服务允许搜索 MP3 文件，那么搜索模块对用户来说就没有用处。为了启用模块 A，并确保至少有一个服务实现可用，NetBeans\
  \ 模块系统提供了两个属性：`OpenIDE-Module-Provides` 和 `OpenIDE-Module-Requires`，它们允许在模块的清单文件中定义是否提供或需要特定的服务实现。这些以及清单文件的其他属性将在第\
  \ 3 章的“模块清单”部分中更详细地描述。\n\n在模块 A 的清单文件中，需要存在至少一个 `Mp3Finder` 服务的提供者，使用以下条目：\n\n**`OpenIDE-Module-Requires`**`:\
  \ com.galileo.netbeans.modulea.Mp3Finder`\n\n为了在加载模块时通知模块系统模块 B 提供了 `Mp3Finder`\
  \ 服务，请将以下条目添加到模块 B 的清单文件中：\n\n**`OpenIDE-Module-Provides`**`: com.galileo.netbeans.modulea.Mp3Finder`\n\
  \n如果没有模块在其清单文件中声明这样的条目（即没有可用的服务提供者），模块系统会报告错误并且不会加载模块 A。\n\n\n\n### 全局服务\n\n全局服务——即能被多个模块使用且仅由一个模块提供的服务——通常通过抽象（单例）类来实现。采用这种模式，服务自行管理其实现，并在系统中未注册其他实现时，提供一个额外的简单实现（作为内部类）。这样做的好处是，用户总能获得一个有效的服务引用，而永远不会得到\
  \ `null` 值。\n\n一个例子是 MP3 播放器服务（参见代码清单 5-3），它被不同的模块使用，例如搜索列表或播放列表。播放器的实现应该是可替换的。\n\
  \n***代码清单 5-3.** 作为 MP3 服务模块中全局服务的 MP3 播放器*\n\n`public` **`abstract`** `class Mp3Player\
  \ {`\n`   public abstract void play(Mp3FileObject mp3);`\n`   public abstract void\
  \ stop();`\n`public` **`static Mp3Player getDefault`**`() {`\n`      Mp3Player player\
  \ =`\n`         Lookup.getDefault().Lookup(Mp3Player.class);`\n`      if(player\
  \ == null) {`\n`         player = new DefaultMp3Player();`\n`      }`\n`      return\
  \ player;`\n`   }`\n`private static class` **`DefaultMp3Player`** `extends Mp3Player\
  \ {`\n`      public void play(Mp3FileObject mp3) {`\n`         // 将文件发送到外部播放器，或`\n\
  `         // 提供自己的播放器实现，或`\n`         // 显示没有可用播放器的消息`\n`      }`\n`      public\
  \ void stop() {}`\n`   }`\n`}`\n\n这个服务以抽象类的形式实现，通过抽象方法定义其接口，同时通过静态方法 `getDefault()`\
  \ 提供对服务的访问。这种模式的优势在于，服务的用户无需了解任何关于 Lookup API 的知识。这使得应用程序逻辑保持简洁，并且独立于 Lookup API。\n\
  \n抽象类通常应属于某个模块，而该模块又是应用程序标准发行版的一部分（在示例中，即 MP3 服务模块）。服务提供者（即包含播放 MP3 文件实际代码的类）可以封装在单独的模块中（参见代码清单\
  \ 5-4）。在示例中，这就是 `MyMp3Player` 类，随后你需要为其创建一个骨架，并将其添加到模块 C。\n\n***代码清单 5-4.** MP3\
  \ 播放器模块中的 MP3 播放器服务提供者*\n\n`public class MyMp3Player extends` **`Mp3Player`** `{`\n\
  `   public void play(Mp3FileObject mp3) {`\n`      // 播放文件`\n`   }`\n`   public\
  \ void stop() {`\n`      // 停止播放器`\n`   }`\n`}`\n\n现在，必须注册 `MyMp3Player` 服务提供者。为此，你可以使用\
  \ `ServiceProvider` 注解，如下所示：\n\n`@ServiceProvider (service = Mp3Player.class)`\n\
  `public class MyMp3Player extends` **`Mp3Player`** `{ ...`\n\n模块之间的关系和依赖关系如图 5-2\
  \ 所示。\n\n![图片](img/0502.jpg)\n\n***图 5-2.** 全局服务、服务提供者和应用程序模块的依赖关系与关联*\n\nNetBeans\
  \ 平台中全局服务的典型示例是 `StatusDisplayer` 和 `IOProvider`。`IOProvider` 类提供对输出窗口的访问。实际将数据写入输出窗口的服务提供者是一个单独的类\
  \ `NbIOProvider`，位于一个单独的模块中。如果该模块可用且服务提供者已注册，则通过静态方法 `IOProvider.getDefault()` 获取其实现。如果该模块不可用，则提供默认实现，该实现将输出数据写入默认输出（`System.out`\
  \ 和 `System.err`）。\n\n### 注册服务提供者\n\n为了实现服务提供者的动态和灵活注册（即使在交付应用程序之后），并确保仅在需要时才加载它们，注册是通过使用配置文件以声明方式完成的。\n\
  \n在基于 NetBeans 平台的应用程序中，可通过 Lookup 获取的服务可以通过多种方式进行注册并向系统公开。以下各节将描述这些不同的可能性。\n\n\
  #### 注解\n\nLookup API 提供了 `ServiceProvider` 注解用于注册服务提供者。这是让你的提供者类为 Lookup 所知的最简单、最透明的方式。因此，在创建应用程序时，会自动应用一个服务提供者配置文件，你将在*服务提供者配置文件*一节中看到这一点。因此，如果你不想使用注解，可以直接跳到该节。在代码清单\
  \ 5-5 所示的示例中，你可以看到此注解的属性。\n\n***代码清单 5-5.** 使用 @ServiceProvider 注解注册服务提供者*\n\n`import\
  \ com.galileo.netbeans.mp3object.Mp3FileObject;`\n`import java.util.List;`\n`import\
  \ org.openide.util.Lookup.ServiceProvider;`\n\n**`@ServiceProvider`**`(`\n**`service`**\
  \ `= Mp3Finder.class,`\n**`path`** `= \"Mp3FinderServices\",`\n**`position`** `=\
  \ 10,`\n**`supersedes`**`={\"com.galileo.netbeans.module.DefaultMp3Finder\"})`\n\
  `public class Mp3DatabaseFinder implements Mp3Finder {`\n`    @Override`\n`    public\
  \ List<Mp3FileObject> find(String what){`\n`        ...`\n`    }`\n`}`\n\n在代码清单\
  \ 5-5 中，类 `Mp3DatabaseFinder` 通过 `ServiceProvider` 注解注册为服务 `Mp3Finder` 的实现。唯一必需的属性是\
  \ `service` 属性，通过它你可以确定要提供哪个服务。你可以通过 `position` 属性影响 Lookup 交付多个服务提供者的顺序。使用 `supersedes`\
  \ 可以指定一个已注册服务提供者的列表，这些提供者将被本次注册所替代。这样，例如，你可以删除某个已注册的服务标准实现。最后，还有 `path` 属性。通过它，你可以指定一个名称或完整路径（例如，*MyServices/Mp3Services*），服务提供者配置文件将在此路径下应用。不过，在这种情况下，使用的是\
  \ *META-INF/namedservices* 目录，而不是 *META-INF/services*。因此，在代码清单 5-5 的示例中，配置文件将存储在\
  \ *META-INF/namedservices/Mp3FinderServices* 目录中。这样，就可以通过使用 `Lookups.forPath()`\
  \ 创建的 Lookup 来访问该实现。\n\n\n\n#### 服务提供者配置文件\n\n服务提供者也可以通过*服务提供者配置文件*进行注册。此类文件实际上是在后台使用\
  \ `ServiceProvider` 注解创建的。\n\n这种方法属于 Java JAR 文件规范的一部分。文件以其服务命名，并在其内容中列出所有服务提供者。该文件必须放置在\
  \ *META-INF/services* 目录中，该目录是模块 *src/* 目录的一部分，或者换句话说，它必须是模块类路径的一部分。\n\n`src/META-INF/services/com.galileo.netbeans.module.Mp3Finder`\n\
  **`com.galileo.netbeans.module.Mp3DatabaseFinder`**\n**`com.galileo.netbeans.module.Mp3FilesystemFinder`**\n\
  \n在此示例中，为该服务（即接口或抽象类 `Mp3Finder`）注册了两个服务提供者。全局查找（即标准查找 `Lookup.getDefault()`）会发现在\
  \ *`META INF/services`* 目录中的服务，并实例化这些提供者。成功的服务实例化要求每个服务提供者都有一个默认构造函数，以便能够通过 Lookup\
  \ 创建。\n\n如前所述，你可以让你的服务实现以特定名称公开；这样，它可以被更快地访问。为此，请在 *META-INF/namedservices* 目录中创建配置文件。该目录的一个子文件夹表示名称，例如\
  \ *META-INF/namedservices/Mp3FinderServices*。你可以通过使用 `Lookups.forPath(\"Mp3FinderServices\"\
  )` 创建的 Lookup 来获取在那里注册的服务。\n\n基于服务提供者配置文件的原始规范，NetBeans 平台提供了两个扩展，允许移除现有的服务提供者以及更改已注册提供者的顺序。为了使这些补充符合原始的\
  \ Java 规范，这些附加项以注释符号 # 作为前缀。因此，JDK 实现会忽略这些行。\n\n##### 移除服务提供者\n\n可以移除由另一个模块注册的服务提供者。此功能可用于用你自己的实现替换\
  \ NetBeans 平台服务的标准实现。\n\n通过在你的服务提供者配置文件中添加以下条目来移除服务提供者。同时，你可以提供你自己的实现。\n\n`# 移除其他实现（通过在行前添加\
  \ #- 前缀）`\n`#-org.netbeans.core.ServiceImpl`\n`# 提供我自己的实现`\n`com.galileo.netbeans.module.MyServiceImpl`\n\
  \n##### 服务提供者的顺序\n\nLookup 返回服务提供者的顺序是通过为每个提供者条目设置一个 `position` 属性来控制的。例如，这对于控制状态栏中附加条目的顺序（参见第\
  \ 11 章）或确保你自己的实现在 NetBeans 平台实现之前被调用是必要的。此外，允许为 position 属性指定负值。NetBeans 平台按 position\
  \ 升序对实例进行排序，因此编号较小的实例会在编号较大的实例之前返回。为此，需要在服务提供者配置文件中添加以下条目：\n\n`com.galileo.netbeans.module.MyServiceImpl`\n\
  `#position=20`\n`com.galileo.netbeans.module.MyImportantServiceImpl`\n`#position=10`\n\
  \n建议以较大的间隔分配 position 值，如示例所示。这简化了后续添加更多实现的操作。\n\n##### 服务文件夹\n\n提供服务实现的另一种方式是使用模块层文件中的\
  \ `Services` 文件夹进行注册，如清单 5-6 所示。\n\n***清单 5-6.** 在层文件中注册服务提供者*\n\n`<folder name=\"\
  `**`Services`**`\">`\n`   <folder name=\"Mp3Services\">`\n`      <file name=\"com-galileo-netbeans-module-Mp3DatabaseFinder.instance\"\
  >`\n`         <attr name=\"`**`instanceOf`**`\" stringvalue=\"com.galileo.netbeans.module.Mp3Finder\"\
  />`\n`      </file>`\n`   </folder>`\n`</folder>`\n\n如果使用默认 Lookup 请求服务，则通过搜索 `Services`\
  \ 文件夹及其子目录中的实例来发现实现，这些实例可以分配给所请求的服务接口。因此，可以使用任意文件夹对服务进行分组，如我们示例中的 `Mp3Services`\
  \ 文件夹所示。\n\n与使用服务提供者配置文件注册相比，如果在层文件中注册，服务提供者无需提供默认构造函数。使用层文件，可以在 `instanceCreate`\
  \ 属性中指定一个静态方法，用于创建服务提供者的实例。假设已经创建的提供者 `Mp3DatabaseFinder` 有一个返回实例的静态方法 `getDefault()`。可以通过添加以下属性来更改声明：\n\
  \n`<attr name=\"`**`instanceCreate`**`\"`\n`   methodvalue=\"com.galileo.netbeans.module.Mp3DatabaseFinder.`**`getDefault`**`\"\
  />`\n\n通过此属性声明，服务提供者实例不是使用默认构造函数创建的，而是通过调用静态方法 `getDefault()` 创建的（有关此属性和相应的 *.instance*\
  \ 文件的更详细信息，请参见第 3 章）。\n\n此外，通过 `Services` 文件夹进行注册也允许移除现有的服务提供者并控制提供者的顺序。这两种机制都是通过使用层文件的默认功能实现的。可以通过在其名称后添加后缀\
  \ `_hidden` 来移除服务提供者，就像对菜单条目所做的那样（参见第 9 章）。\n\n`<file name=\"com-galileo-netbeans-module-ServImp.instance`**`_hidden`**`\"\
  >`\n\n返回服务提供者的顺序是通过 `position` 属性控制的，这与层文件中其他条目使用的策略相同（参见第 3 章）。\n\n`<folder name=\"\
  Services\">`\n`   <file name=\"com-galileo-netbeans-module-ServImp.instance\">`\n\
  `      <attr name=\"position\" intvalue=\"10\"/>`\n`   </file>`\n`   <file name=\"\
  com-galileo-netbeans-module-ServImp2.instance\">`\n`      <attr name=\"position\"\
  \ intvalue=\"20\"/>`\n`   </file>`\n`</folder>`\n\n在此示例中，`position` 属性确保服务提供者 `ServImp`\
  \ 会在 `ServImp2` 之前返回。\n\n\n\n#### 模块间通信\n\n除了由 NetBeans 平台提供的、允许访问所有已注册服务的全局 Lookup\
  \ 之外，还可以为自己的组件配备一个本地 Lookup。Lookup API 提供了一个用于创建 Lookup 的工厂，以及一个监听 Lookup 变化的机会。使用\
  \ `ProxyLookup` 类，用户可以创建一个代理，将多个 Lookup 合并为一个。利用 Lookup API 和 SPI 的这一特性，您可以在不同模块的组件之间实现通信，而无需使它们相互依赖。\n\
  \n松散耦合模块通信的一个典型用例是显示所选对象的详细信息。对象的选择和信息的可视化分别在不同的模块中完成。例如，想象一个显示 MP3 文件搜索结果的列表。在列表中选择一个条目会通过\
  \ Lookup 提供该选中条目，这样应用程序的其他部分就可以访问该条目并显示所需的详细信息。这种模式类似于观察者模式。提供对象的模块（在此例中是搜索列表）是主题，而信息显示模块是观察者。这允许多个模块以各种方式显示数据或详细信息。同样，其优点是模块之间的松散耦合：它们完全相互独立。它们唯一的共同点是所提供的对象（或者更准确地说，是其接口），该对象是待处理信息的来源。这种松散耦合是通过使用代理对象实现的，该代理对象在观察者的注册过程中充当主题的替身。因此，观察者注册在代理组件（在此例中是\
  \ Lookup）上，而不是主题上。\n\n图 5-3 展示了以下段落中实现的示例。两个窗口位于独立的模块中，彼此独立（两者都可以被替换，或者可以任意添加新的窗口）。\n\
  \n![图片](img/0503.jpg)\n\n***图 5-3.** 两个模块之间数据交换的典型应用示例，无需相互依赖*\n\n此概念的结构如图 5-4 所示。模块\
  \ A 中的 `Mp3SearchList` 类代表一个搜索结果列表。搜索结果条目由 `Mp3FileObject` 类表示，该类位于一个独立的模块中，因为此类是所有模块的最大公约数。如果在列表中选择了一个条目，`Mp3FileObject`\
  \ 实例就会被添加到本地 Lookup 中。需要一个代理（即一个表示为 `ContextGlobalProvider` 接口的代理组件）来解耦模块 A 和 B。此代理组件将模块\
  \ A 的本地 Lookup（其中包含当前选中的实例）提供给模块 B。为了使集中式代理组件能够访问 `Mp3SearchList` 类的本地 Lookup，Lookup\
  \ API 提供了 `Lookup.Provider` 接口。`Mp3SearchList` 类必须实现此接口。\n\n通过 `getLookup()` 方法，可以提供本地\
  \ Lookup。`Lookup.Provider` 接口已由 `TopComponent` 类实现，该类是所有可见的 NetBeans 窗口系统组件以及 `Mp3SearchList`\
  \ 的父类。NetBeans 窗口系统已经提供了一个中央代理组件的实例，即 `GlobalActionContextImpl` 类。该类提供了一个代理 Lookup，它可以访问当前聚焦的\
  \ `TopComponent` 的本地 Lookup。通过调用静态工具方法 `Utilities.actionsGlobalContext()` 可以轻松获取此\
  \ Lookup。因此，无需关心 `ContextGlobalProvider` 实例，您就已经可以访问全局代理 Lookup。如果您对更多细节感兴趣，并想进一步了解此概念，那么研究一下所提及的类和方法源代码可能会很有价值。\n\
  \n![图片](img/0504.jpg)\n\n***图 5-4.** 使用本地 Lookup 通过代理组件解耦主题和观察者的模块间通信概念结构*\n\n`Mp3DetailsView`\
  \ 类通过调用 `Utilities.actionsGlobalContext()` 来获取对 `Mp3SearchList` 的本地 Lookup 的访问权限。基于全局代理\
  \ Lookup，您为 `Mp3FileObject` 类创建一个 `Lookup.Result`。`Lookup.Result` 类的实例为特定类型的类提供\
  \ Lookup 的一个子集。其主要优点是用户可以通过使用 `LookupListener` 来监听此子集中的变化。因此，一旦在 `Mp3SearchList`\
  \ 中选择了另一个 `Mp3FileObject`，或者显示 `Mp3SearchList` 的窗口失去焦点，该组件就会收到通知。例如，将不会显示详细的 MP3\
  \ 信息。\n\n接下来，您将找到此示例应用程序的类。仅显示了类的重要部分。\n\n首先，是 `Mp3SearchList` 类，它代表一个窗口，因此继承自基类\
  \ `TopComponent`。为了能够监听结果列表中的选择变化，您还需要实现 `ListSelectionListener` 接口。作为一个私有成员，您有一个管理表格中数据的数据模型。出于演示目的，选择了一个简单的数据模型，在构造函数中创建了\
  \ `Mp3FileObject` 类的三个示例对象，并将它们添加到模型中。这些数据通常由搜索算法提供。第二个私有成员对象是 `InstanceContent`\
  \ 的一个实例。这使您能够动态更改 Lookup 的内容。在 `Mp3SearchList` 的构造函数中，您现在可以使用 `AbstractLookup` 类创建一个本地\
  \ Lookup，并将 `InstanceContent` 对象传递到其构造函数中。使用 `associateLookup()` 方法，您的本地 Lookup\
  \ 被设置为 `TopComponent` 的 Lookup，以便它可以从 `getLookup()` 方法返回。\n\n在 `valueChanged()`\
  \ 方法中（当在表格中选择一个数据集时调用），您从数据模型中获取数据集，将其包装到一个集合中，并传递给 `InstanceContent` 实例（见清单 5-7），该实例是\
  \ Lookup 的数据存储。因此，选中的元素始终是本地 Lookup 的一部分。\n\n***清单 5-7.** Mp3SearchList 在表格中显示搜索结果，并将实际选中的数据集添加到本地\
  \ Lookup。*\n\n`public class` **`Mp3SearchList`** `extends` **`TopComponent`**\n\
  `implements` **`ListSelectionListener`** `{`\n`   private Mp3SearchListModel model\
  \ = new Mp3SearchListModel();`\n`private` **`InstanceContent content`** `= new InstanceContent();`\n\
  `   public Mp3SearchList() {`\n`      initComponents();`\n`      searchResults.setModel(model);`\n\
  `      searchResults.getSelectionModel().`\n`         addListSelectionListener(this);`\n\
  **`associateLookup`**`(new AbstractLookup(`**`content`**`));`\n`   }`\n`public void`\
  \ **`valueChanged`**`(ListSelectionEvent event) {`\n`      if(!event.getValueIsAdjusting())\
  \ {`\n`         Mp3FileObject mp3 =`\n`            model.getRow(searchResults.getSelectedRow());`\n\
  **`content.set(Collections.singleton(mp3), null);`**\n`      }`\n`   }`\n`}`\n\n\
  这里，带有搜索结果的表格的数据模型 `Mp3SearchListModel` 只是一个示例，并且保持得非常简单（见清单 5-8）。在构造函数中直接创建了三个 `Mp3FileObject`\
  \ 类型的对象。\n\n***清单 5-8.** 简化的数据模型，用于管理和提供结果列表的数据*\n\n`import javax.swing.table.AbstractTableModel;`\n\
  `...`\n`public class` **`Mp3SearchListModel`** `extends AbstractTableModel {`\n\
  `   private String[] columns = {\"Interpret\", \"Titel\", \"Jahr\"};`\n`   private\
  \ List<Mp3FileObject> data = new ArrayList<Mp3FileObject>();`\n\n\n\n`   public\
