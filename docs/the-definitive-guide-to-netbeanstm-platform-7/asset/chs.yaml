  \n`getComponent()` 方法是一个工厂方法，用于按需创建可视化面板。当面板在向导中首次创建时，`WizardDescriptor` 会调用该方法。当向导中应首次显示该面板时，`WizardDescriptor`\
  \ 会调用该方法。因此，并非所有面板都需要在向导启动时立即创建。这将显著提升提供许多不同步骤的向导的性能。因此，在使用 `getComponent()` 方法时要非常小心。例如，不要在\
  \ `getName()` 方法中调用它，因为 `getName()` 方法是在创建向导时调用的。创建可视化面板后，你可以设置一些属性，这些属性会影响组件在向导中的显示方式。\n\
  \n\n\n*   使用 `PROP_CONTENT_SELECTED_INDEX` 提供面板的编号（显示在向导左侧的目录中），使用户能够看到当前步骤的编号。\n\
  *   将属性 `PROP_AUTO_WIZARD_STYLE` 设置为 `true`，这将创建包含典型组件（如内容区域和标题）的向导。当向导只有一个步骤时，将其设置为\
  \ `false` 是合理的，这样只会显示面板和按钮。\n*   通过属性 `PROP_CONTENT_DISPLAYED` 和 `PROP_CONTENT_NUMBERED`，指定向导步骤的名称和编号显示在向导的左侧。\n\
  \n`public PlaylistVisualPanel1` **`getComponent`**`() {`\n`      if (view == null)\
  \ {`\n`view = new` **`PlaylistVisualPanel1`**`();`\n`         view.putClientProperty(WizardDescriptor.PROP_CONTENT_SELECTED_INDEX,\
  \ new Integer(0));`\n`         view.putClientProperty(WizardDescriptor.PROP_AUTO_WIZARD_STYLE,\
  \ Boolean.TRUE);`\n`         view.putClientProperty(WizardDescriptor.PROP_CONTENT_DISPLAYED,\
  \ Boolean.TRUE);`\n`         view.putClientProperty(WizardDescriptor.PROP_CONTENT_NUMBERED,\
  \ Boolean.TRUE);`\n`      }`\n`return` **`view`**`;`\n`   }`\n\n通过 `getName()` 方法，您可以提供要在向导标题中显示的名称。通过\
  \ `getHelp()` 方法，您首先返回 `HelpCtx.DEFAULT_HELP`。这意味着向导中的*帮助*按钮将被禁用。如果您想为面板提供帮助，请返回一个\
  \ `HelpCtx` 对象。（关于 `HelpCtx` 类和 NetBeans 帮助系统的更多信息，请参见第 16 章。）面板的状态（前面在定义向导步骤是否有效的小节中讨论过）通过\
  \ `isValid()` 方法提供。当面板被调用时，或者通过从 `ChangeListener` 接收到的通知，`WizardDescriptor` 会调用此方法。仅当该方法返回值\
  \ `true` 时，向导的*下一步*或*完成*按钮才会被激活。`setMessage()` 是一个辅助方法，用于向用户显示通知。向导的通知行默认提供，并显示在向导窗口的面板下方。该行由类\
  \ `NotificationLineSupport` 表示。您可以通过 `WizardDescriptor` 的 `getNotificationLineSupport()`\
  \ 方法访问它。\n\n然后，通过 `setErrorMessage()` 方法设置文本。如果以这种方式设置了文本，并且 `isValid()` 方法返回 `false`，则会显示一个错误符号。但是，如果\
  \ `isValid()` 方法返回 `true`，则只会显示一个警告标志。如果您希望持续显示警告标志或信息标志，可以使用 `setWarningMessage()`\
  \ 或 `setInformationMessage()` 方法。\n\n`public String` **`getName`**`() {`\n`      return\
  \ bundle.getString(\"Panel1.Name\");`\n`   }`\n`public HelpCtx` **`getHelp`**`()\
  \ {`\n`      return HelpCtx.DEFAULT_HELP;`\n`   }`\n`public boolean` **`isValid`**`()\
  \ {`\n`      return isValid;`\n`   }`\n`private void` **`setMessage`**`(String message)\
