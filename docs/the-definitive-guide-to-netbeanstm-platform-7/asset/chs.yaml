  `   }`\n\n数据模型通过 `readSettings()` 和 `storeSettings()` 方法进行访问。数据模型的类型取决于模板，该模板通过类签名中的\
  \ `WizardDescriptor.Panel` 接口指定。在这种情况下，涉及的类是 `WizardDescriptor`。当面板打开时，会调用 `readSettings()`\
  \ 方法。例如，可以在此处读取来自上一个面板的值。在可视面板上注册一个 `PropertyChangeListener`，以通知您面板中的用户活动。在此处注册它，以确保\
  \ `WizardDescriptor` 可用。当退出面板时，会调用 `storeSettings()` 方法。通过可视面板中定义的属性名称，将用户输入的值保存在\
  \ `WizardDescriptor` 中。这样，这些值会立即从一个面板传递到下一个面板，直到在向导完成后可以从 `WizardDescriptor` 中读取它们。\n\
  \n`public void` **`readSettings`**`(WizardDescriptor model) {`\n`      this.model\
  \ = model;`\n`      getComponent().`**`addPropertyChangeListener`**`(this);`\n`   }`\n\
  `public void` **`storeSettings`**`(WizardDescriptor model) {`\n`      model.putProperty(PlaylistVisualPanel1.`**`PROP_PLAYLIST_NAME`**`,`\n\
  `                        getComponent().`**`getPlaylistName`**`());`\n`      model.putProperty(PlaylistVisualPanel1.`**`PROP_GENRE`**`,`\n\
  `                        getComponent().`**`getGenre`**`());`\n`      model.putProperty(PlaylistVisualPanel1.`**`PROP_DESCRIPTION`**`,`\n\
  `                        getComponent().`**`getDescription`**`());`\n`      model.putProperty(PlaylistVisualPanel1.`**`PROP_IMAGE_PATH`**`,`\n\
  `                        getComponent().`**`getImagePath`**`());`\n`   }`\n\n在讨论可视面板时，我已经说过必须验证用户输入的值。更具体地说，您需要确保用户输入的名称至少包含三个字符，并且所选图像的宽度和高度不超过\
  \ 128 像素。为了获知可视面板的更改——即当用户输入名称或选择图像时——您在 `readSettings()` 方法中为可视面板注册了一个 `PropertyChangeListener`。您需要实现\
  \ `propertyChange()` 方法。在那里，可以通过 `checkValidity()` 方法验证向导中输入的值，该方法检查相关条件，可能显示一条消息，并返回相应的返回值。我们现在需要将更改通知给父级\
  \ `WizardDescriptor`，以便可以激活或停用相关按钮。只有当输入的数据通过验证并且 `WizardDescriptor` 收到该事实的通知时，用户才能继续执行下一步。通过\
  \ `fireChangeEvent()` 方法实现这一点。\n\n`public void` **`propertyChange`**`(PropertyChangeEvent\
  \ event) {`\n`      boolean oldState = isValid;`\n`isValid =` **`checkValidity`**`();`\n\
  **`fireChangeEvent`**`(this, oldState, isValid);`\n`   }`\n`private boolean` **`checkValidity`**`()\
  \ {`\n`      if(`**`getComponent().getPlaylistName().trim().length() < 3`**`) {`\n\
  `         setMessage(bundle.getString(\"Panel1.Error1\"));`\n`return` **`false`**`;`\n\
  `      } else if(getComponent().getImagePath().length() != 0) {`\n`         ImageIcon\
  \ img = new ImageIcon(getComponent().getImagePath());`\n`         if(`**`img.getIconHeight()>128\
  \ || img.getIconWidth()>128`**`) {`\n`            setMessage(bundle.getString(\"\
  Panel1.Error2\"));`\n`return` **`false`**`;`\n`         }`\n`      } else if(`**`getComponent().getImagePath().length()\
  \ == 0`**`) {`\n`         setMessage(bundle.getString(\"Panel1.Warning1\"));`\n\
  `return` **`true`**`;`\n`      }`\n`      setMessage(null);`\n`return` **`true`**`;`\n\
  `   }`\n\n为了向向导面板注册一个 `WizardDescriptor`，`WizardDescriptor.Panel` 接口指定了 `addChangeListener()`\
  \ 和 `removeChangeListener()` 方法。在类中实现这些方法。使用 `fireChangeEvent()` 方法通知所有已注册的监听器。出于性能考虑，首先验证面板的状态是否已更改，以便仅在发生更改时通知\
  \ `WizardDescriptor`。如果 `isValid()` 方法返回 `true`，表明面板处于有效状态，则可以使用空方法体来实现这些方法。在这种情况下，甚至可以完全省略\
  \ `fireChangeEvent()` 方法。此场景适用于示例的第二个面板，该面板始终返回 `true`。\n\n\n\n`private final EventListenerList`\
  \ **`listeners`** `=`\n`      new EventListenerList();`\n`public void` **`addChangeListener`**`(ChangeListener\
  \ l) {`\n`      listeners.add(ChangeListener.class, l);`\n`   }`\n`public void`\
  \ **`removeChangeListener`**`(ChangeListener l) {`\n`      listeners.remove(ChangeListener.class,\
  \ l);`\n`   }`\n`protected final void` **`fireChangeEvent`**`(`\n`      Object source,\
  \ boolean oldState, boolean newState) {`\n**`if(oldState != newState)`** `{`\n`         ChangeEvent\
  \ ev = new ChangeEvent(source);`\n`         for (ChangeListener listener : listeners.getListeners(ChangeListener.class))\
  \ {`\n`            listener.`**`stateChanged`**`(ev);`\n`         }`\n`      }`\n\
  `   } }`\n\n**在多个向导步骤之间共享基础面板**\n\n如果向导由多个面板组成，建议创建一个基础类来处理监听器逻辑，并提供辅助方法（如 `setMessage()`\
  \ 方法）。该基础类实现了 `WizardDescriptor.Panel<Data>` 接口，因此特定面板只需从该基础类派生即可。此方法在图 13-7 中也有考虑。\n\
  \n#### 从面板创建向导\n\n到目前为止，您已经了解了如何构建代表向导中一个步骤的面板。您看到了视图和控制器的任务是如何分配，并且最重要的是，如何清晰分离的。在完成整个向导之前，只剩下一个小步骤。向导由\
  \ `WizardDescriptor` 类表示，该类管理各个面板。现在的一个选项是实例化您自己的面板，并将它们传递给 `WizardDescriptor`。使用\
  \ IDE 创建面板时自动创建的动作类就是按这种方式工作的。出于封装、更清晰的结构化和可重用性的考虑，创建一个扩展 `WizardDescriptor` 类的独立向导描述符是一个好主意。因此，这个类甚至可以负责面板的创建及其属性。动作类在启动向导时，只需创建向导描述符的一个实例。这个实例可以直接传递给\
  \ `DialogDisplayer`。通过这种方式，您的向导可以被完全透明地调用。\n\n因此，对于此示例，创建 `PlaylistWizardDescriptor`\
  \ 类，扩展 `WizardDescriptor` 类（参见清单 13-3）。使用 `setPanelsAndSettings()` 方法传入两个面板，它们被声明为私有字段。面板必须通过迭代器实例传入；这样的迭代器类负责面板的顺序。使用默认的\
  \ `ArrayIterator`。`setPanelsAndSettings()` 的第二个参数是一个数据模型，它通过 `readSettings()` 和\
  \ `storeSettings()` 方法传递给面板。向导收集的数据存储在此数据模型中。将其作为引用传递给 `PlaylistWizardDescriptor`，您希望将其用作数据模型。最后，执行一些配置任务。\n\
  \n***清单 13-3.** 向导描述符，将面板组装成一个向导*\n\n`public class` **`PlaylistWizardDescriptor`**\
  \ `extends` **`WizardDescriptor`** `{`\n\n`private PlaylistWizardPanel1 p1 =` **`new\
  \ PlaylistWizardPanel1();`**\n`private PlaylistWizardPanel2 p2 =` **`new PlaylistWizardPanel2();`**\n\
  \n`public` **`PlaylistWizardDescriptor`**`() {`\n`List<Panel<WizardDescriptor>>`\
  \ **`panels`** `= new ArrayList<Panel<WizardDescriptor>>();`\n`      panels.add(p1);`\n\
  `      panels.add(p2);`\n`      this.`**`setPanelsAndSettings`**`(new ArrayIterator<WizardDescriptor>(`**`panels`**`),`\
  \ **`this`**`);`\n`      this.setTitleFormat(new MessageFormat(\"{0}\"));`\n`      this.setTitle(NbBundle.getMessage(PlaylistWizardDescriptor.class,\
  \ \"Wizard.Name\"));`\n\n`      putProperty(WizardDescriptor.PROP_CONTENT_DATA,`\n\
  `         new String[]{panel1.getName(), panel2.getName()});`\n`      putProperty(WizardDescriptor.PROP_AUTO_WIZARD_STYLE,`\n\
  `         Boolean.TRUE);`\n`      putProperty(WizardDescriptor.PROP_CONTENT_DISPLAYED,`\n\
  `         Boolean.TRUE);`\n`      putProperty(WizardDescriptor.PROP_CONTENT_NUMBERED,`\n\
  `         Boolean.TRUE);`\n`   } }`\n\n比 `WizardDescriptor` 本身更简单的是启动向导的动作类。创建一个\
  \ `PlaylistWizardDescriptor` 类的简单实例，并立即将其传递给 `createDialog()` 方法，如本章前面“自定义对话框”部分所示。这将创建一个\
  \ `Dialog` 对象，其中包含一个向导，通常通过 `setVisible()` 方法显示（参见清单 13-4）。完成向导后，您可以使用 `getValue()`\
  \ 方法确定用户按下了哪个按钮。这里最重要的一点是如何分析数据。由于 `WizardDescriptor` 本身就是您的数据模型，您可以直接从中读取数据。最好的方法是使用\
  \ `getProperties()` 方法，提供一个包含所有已保存属性的 `Map`。\n\n***清单 13-4.** 创建并调用向导的动作类*\n\n`@ActionID(`\n\
  `   category = \"Tools\",`\n`   id = \"com.galileo.netbeans.module.PlaylistWizardAction\"\
  )`\n`@ActionRegistration(`\n`   displayName = \"#CTL_PlaylistWizardAction\",`\n\
  `   iconBase = \"com/galileo/netbeans/module/wizard.png\")`\n`@ActionReference(path\
  \ = \"Menu/Tools\", position = 1200)`\n`public final class` **`PlaylistWizardAction`**\
  \ `implements ActionListener {`\n`   @Override`\n`   public void actionPerformed(ActionEvent\
  \ e) {`\n**`PlaylistWizardDescriptor descriptor = new PlaylistWizardDescriptor();`**\n\
  `      Dialog dialog = DialogDisplayer.getDefault().`**`createDialog(descriptor)`**`;`\n\
  `      dialog.setVisible(true);`\n`      dialog.toFront();`\n`      if(`**`descriptor.getValue()`**`==WizardDescriptor.FINISH_OPTION)\
  \ {`\n`Map<String, Object> props =` **`descriptor.getProperties()`**`;`\n`         //使用存储在\
  \ props 中的数据创建播放列表`\n`      }`\n`   }`\n`}`\n\n#### 事件处理\n\n在本节中，我将再次概述三个层（向导描述符、向导面板和可视面板）之间的交互概念，以及如何接收和处理事件与通知。在图\
  \ 13-8 的时序图中，显示了两种场景：向导的初始化，以及用户输入数据时向导各部分之间的交互。\n\n![图片](img/1308.jpg)\n\n***图\
  \ 13-8.** 向导描述符、向导面板和可视面板之间的交互。*\n\n在启动向导的动作类的 `actionPerformed()` 方法中，创建了一个 `PlaylistWizardDescriptor`\
  \ 实例。此描述符生成其面板，并为每个面板注册一个 `ChangeListener`，以便在面板状态发生变化时得到通知。然后通过向导面板的 `getComponent()`\
  \ 方法获取可视面板。此方法按需创建可视面板，并注册一个 `PropertyChangeListener`，以获知用户所做的更改。向导描述符通过 `ChangeListener`\
  \ 观察其面板的状态，而该 `ChangeListener` 又通过 `PropertyChangeListener` 观察可视面板的状态。\n\n当用户在由视图通过监听器监控的字段中输入数据时，会触发一个\
  \ `PropertyChangeEvent`，通知向导面板数据已更改。向导面板通过 getter 方法检索数据，然后验证接收到的数据。根据验证结果，设置面板的状态。\n\
  \n如果状态发生变化，会触发一个 `ChangeEvent`，通知向导描述符，该描述符通过调用 `isValid()` 方法验证面板状态。根据 `isValid()`\
  \ 方法的值，向导描述符会激活或停用向导中的按钮。\n\n\n\n#### 提前结束向导\n\n根据具体用例，允许用户提前结束向导可能很有用。通常，*完成*按钮仅在最后一个面板中激活。为了允许用户在更早的面板中结束向导，请在相应面板上实现\
  \ `WizardDescriptor.FinishablePanel` 接口。该接口指定了 `isFinishPanel()` 方法，如果向导可以完成，你可以通过该方法返回\
  \ `true` 值。在示例中，可以设想在第一个面板中实现此接口，允许用户在输入数据后立即结束向导，而无需将曲目添加到播放列表。\n\n#### 数据的额外验证\n\
  \n面板通过 `isValid()` 方法向向导描述符声明其数据的有效性。该方法在打开面板时以及通过 `ChangeListener` 通知时被调用。如果希望在用户点击*下一步*或结束向导时执行额外的验证，请实现\
  \ `WizardDescriptor.ValidatingPanel` 接口。该接口指定了 `validate()` 方法，可以在其中执行详细的验证。通过此方式识别出的错误将通过\
  \ `WizardValidationException` 进行通知。此异常类的构造函数接收一个 `JComponent`，该组件将获得焦点，以便向用户显示错误位置。此外，可以添加一条失败消息，该消息随后会显示在向导中。\n\
  \n与其使用 `WizardDescriptor.ValidatingPanel` 接口的 `validate()` 方法（该方法在事件分发线程（EDT）中异步执行，而\
  \ EDT 中不应执行长时间运行的任务，否则会阻塞整个用户界面），不如使用 `WizardDescriptor.AsynchronousValidatingPanel`\
  \ 接口来异步处理验证。使用此接口时，`validate()` 方法会在一个单独的线程中自动执行。因此，用户界面仍然可供用户使用，从而可以使用*取消*按钮来结束进程。由于异步方法不在\
  \ EDT 中执行，因此你不应访问 GUI 组件来从中读取数据。为此，该接口指定了 `prepareValidation()` 方法，该方法在 EDT 中调用，允许访问\
  \ GUI 组件中的数据，同时禁止进一步更改。使用 `validate()` 方法对这些数据执行检查。\n\n#### 迭代器\n\n在向导描述符中，面板由一个迭代器管理。该迭代器负责面板的顺序。此类迭代器的接口由\
  \ `WizardDescriptor.Iterator` 类描述。该接口的一个标准实现是 `WizardDescriptor.ArrayIterator` 类，它按顺序提供面板。当将面板作为数组传递给\
  \ `WizardDescriptor` 类时，也会使用此类。但是，当希望根据用户选择或输入的数据，允许用户跳过某个或多个面板时，请为 `WizardDescriptor`\
  \ 分配你自己的迭代器实现，以处理面板的动态顺序。此类迭代器的框架也可以通过 NetBeans IDE 中的向导创建。回到*向导*向导的第一步，你将*向导步骤序列*设置为*静态*。但是，如果你在此处设置为*动态*，IDE\
  \ 将创建一个迭代器类。\n\n基于 `WizardDescriptor.Iterator` 接口，有一些扩展。使用 `WizardDescriptor.InstantiatingIterator`\
  \ 接口及其 `instantiate()` 方法来创建一个 `Set` 对象。一个扩展是 `WizardDescriptor.AsynchronousInstantiatingIterator`，其\
  \ `instantiate()` 方法在用户点击*完成*按钮时，在 EDT 之外异步执行。最后，使用 `WizardDescriptor.ProgressInstantiatingIterator`\
  \ 接口，在向导结束时，当 `instantiate()` 方法正在处理时，向用户显示一个进度条。在这种情况下，`instantiate()` 方法在一个单独的线程中被调用，并接收一个\
  \ `ProgressHandle`。状态通过此类显示，就像使用标准进度条一样（参见第 11 章）。\n\n### 总结\n\nNetBeans 平台提供了一个专业的\
  \ API 用于创建对话框和向导。在本章中，你学习了如何快速创建简单的标准对话框，以及如何创建适应你特殊需求的复杂对话框。此外，你还学习了如何通过 Dialogs\
  \ API 实现结构清晰的向导，以引导用户穿越复杂的事实世界。\n\n## 第 14 章\n\n## 可视化库\n\nNetBeans *可视化库 API* 是一个用于可视化各种不同结构的通用库。它特别适合面向图形的表示。可视化库\
  \ API 是标准 NetBeans 平台的一部分，并被 NetBeans IDE 本身在众多模块和领域中使用，例如在 Java Micro Edition (JME)\
  \ 应用程序中对 midlet 进行可视化建模，如图 14-1 所示。要使用可视化库 API，你只需定义对相应模块的依赖关系（在模块*属性*的*库*下），正如之前对其他模块所述的那样。\n\
  \n### 可视化库 API 的结构\n\n可视化库 API 的组件，如同 Swing 一样，以树形结构进行组织和管理。所有图形组件的超类是 `Widget`\
  \ 类。如果你查看图 14-1，那么三个组件（*移动设备*、*表单*和 *loginScreen*），以及连接到这些组件的边，都是 widget。一个 widget\
  \ 也可以是更多 widget 的容器。每个 widget 都有一个相对于其父 widget 确定的位置。`Widget` 超类除了管理颜色和透明度等属性外，还负责呈现\
  \ widget 的边框和背景。像 Swing 容器一样，widget 具有特定的布局，负责定位其子 widget。Widget 之间也可以相互依赖，以便在发生更改时得到通知。一个\
  \ widget 允许链接一系列动作（这些动作在特定用户事件发生时执行）。\n\n![图片](img/1401.jpg)\n\n***图 14-1.** 使用可视化库\
  \ API 的图导向结构的可视化模型*\n\n### Widget 类\n\n可视化库 API 的所有图形组件都是 `Widget` 类的子类，该类管理并提供基本特性和功能，如布局、背景和字体。因此，`Widget`\
  \ 是一个图形原语，相当于 Swing 中的 `JComponent` 类。从 `Widget` 派生出了许多类，它们为各自的目的提供了 `Widget` 实现。这个继承层次结构如图\
  \ 14-2 所示，这些不同 widget 类的含义列在表 14-1 中。这些类中最重要的几个将在以下各节中更详细地讨论。关于这些类的更详尽描述，请参阅可视化库\
  \ API 文档，该文档位于可视化库的 JavaDoc 页面中。\n\n![图片](img/1402.jpg)\n\n***图 14-2.** 可视化库 API\
  \ 的 Widget 继承层次结构*\n\n表 14-1 提供了各种 widget 实现的特性和功能概览。\n\n![图片](img/t1401.jpg)\n\n\
  ![图片](img/t1401a.jpg)\n\n\n\n#### 依赖关系\n\n可以在各个控件之间定义依赖关系。这样，您就能对其他控件的位置或大小变化做出响应。这种依赖关系通过注册在控件上的监听器来实现。为此，`Widget`\
  \ 类提供了两个方法：`addDependency()` 和 `removeDependency()`。通过这两个方法，可以添加或移除监听器。监听器由接口 `Widget.Dependency`\
  \ 指定。实现该接口时，监听器必须实现 `revalidateDependency()` 方法，当其他控件的位置或大小发生变化时，相应控件会调用此方法。在此方法中，您应调用自己控件的\
  \ `revalidate()` 方法，即依赖于其他控件的那个控件。\n\n#### 边框\n\n每个控件都有一个边框。默认情况下，这是一个空边框，由 `EmptyBorder`\
  \ 类表示。您可以使用 `setBorder()` 方法指定其他边框。边框由接口 `Border` 定义，该接口由众多边框类实现。除了 `EmptyBorder`\
  \ 类，这些类还包括 `LineBorder`、`BevelBorder`、`DashedBorder`、`ImageBorder`、`ResizeBorder`、`RoundedBorder`\
  \ 和 `SwingBorder`。`ResizeBorder` 会在控件的边缘添加八个点，用于改变其大小。通过 `SwingBorder` 类，您可以使用任何\
  \ Swing 的 `javax.swing.border.Border` 实现。最后，还提供了 `CompositeBorder` 类，您可以向它传递任意数量的上述\
  \ `Border` 实例，以组合多个不同的边框。\n\n然而，边框并非直接创建，而是通过工厂创建。这个工厂是 `BorderFactory` 类，它提供了众多方法，您可以用它们创建各种边框类型。您也可以将工厂生成的实例同时用于多个控件。因此，如果您希望多个控件使用相同的边框，只需创建该边框的一个实例即可。\n\
  \n#### 布局\n\n一个控件（类似于 Swing 容器）具有特定的布局，由布局管理器管理和确定。布局由接口 `Layout` 定义，负责子控件的排列。共有四种不同的布局变体可用。您可以通过\
  \ `LayoutFactory` 类创建它们，并使用 `setLayout()` 方法将其添加到控件中。\n\n*   *AbsoluteLayout*：使用\
  \ `AbsoluteLayout` 时，子控件根据 `getPreferredLocation()` 提供的坐标进行排列。子控件的大小对应于 `getPreferredBounds()`\
  \ 提供的尺寸。如果这两个方法都返回 `null`，则位置变为 `(0, 0)`，或使用尺寸 `(0, 0, 0, 0)`。默认情况下，控件使用此布局。此布局通过\
  \ `Layout al = LayoutFactory.`**`createAbsoluteLayout`**`();` 生成。\n\n*   *FlowLayout*：`FlowLayout`\
  \ 按顺序在水平或垂直方向上排列其控件。这样做时，可以选择四种不同的对齐方式：左上、居中、右下和两端对齐。此外，还可以确定各个控件之间的间距。控件的大小对应于\
  \ `getPreferredBounds()` 返回的值。创建此布局可使用以下方法；或者，将对齐方式作为 `LayoutFactory.SerialAlignment`\
  \ 类型与间距一起提供：`Layout hfl = LayoutFactory.`**`createHorizontalFlowLayout`**`();`\n\
  \    `Layout vfl = LayoutFactory.`**`createVerticalFlowLayout`**`();`\n*   *CardLayout*：`CardLayout`\
  \ 仅显示当前活动的控件，该控件由 `setActiveCard()` 方法确定。活动控件的大小由 `getPreferredBounds()` 决定。所有其他控件都以尺寸\
  \ `(0, 0, 0, 0)` 表示，因此实际上不可见。通过 `getActiveCard()` 方法确定当前活动的控件。您可以通过以下方式创建布局：`Layout\
  \ cl = LayoutFactory.`**`createCardLayout`**`();`\n\n*   并通过以下调用指定活动控件：\n\n`LayoutFactory.`**`setActiveCard`**`(Widget\
  \ parent, Widget` **`act`**`);`\n\n您可以使用 `SwitchCardAction` 类切换到另一个控件。\n\n*   *OverlayLayout*：`OverlayLayout`\
  \ 确定包含所有子控件的最小区域。包含此布局的控件及其所有子控件都将被设置为该确定区域的大小，并彼此堆叠排列。最后一个子控件显示在最上层。您可以通过以下方式创建此布局：`Layout\
  \ ol = LayoutFactory.`**`createOverlayLayout`**`();`\n\n控件知道自己的位置、大小和内容，但不会获取有关其行为的信息。控件的行为受任意添加到控件上的动作影响。这些动作由接口\
  \ `WidgetAction` 定义，该接口定义了许多事件方法。这些方法由相应的事件调用，例如在分配了动作的控件上点击鼠标按钮。然后，动作类的实现会执行所需的行为，例如通过拖放移动控件。\n\
  \n与边框和布局一样，动作也是由工厂创建的。这个工厂是 `ActionFactory` 类。这些动作在控件内部由 `WidgetAction.Chain` 类管理。此类接收用户事件，并将其转发给由该类管理的相应动作。每个控件都有此类的一个实例，可通过\
  \ `getAction()` 方法获取。使用 `WidgetAction.Chain` 类的 `addAction()` 和 `removeAction()`\
  \ 方法，您可以向控件添加或移除动作。\n\n\n\n`ActionFactory` 类的某些工厂方法需要一个提供者作为参数。提供者实现了动作的特定行为。在某些情况下（例如\
  \ `EditAction`），必须指定一个提供者实现（在双击相应控件时执行）。对于其他动作，例如 `MoveAction`，如果你希望行为偏离默认设置，可以选择性地指定一个提供者。这些提供者各自通过一个特殊的接口来指定，例如\
  \ `EditProvider` 或 `HoverProvider`。\n\n分组功能是在 `WidgetAction.Chain` 类中管理控件动作的真正优势或目的。在某些应用中，你可能只允许对\
  \ `Scene` 执行某些动作。例如，可能只允许移动控件，而不允许编辑它们。你可以使用 `Scene` 类中的 `setActiveTool()` 方法来确定\
  \ `Scene` 的当前状态。现在，`Widget` 类可以根据不同的状态管理一个独立的 `WidgetAction.Chain` 实例。以前，是通过 `getAction()`\
  \ 方法来获取动作的。该方法提供默认的 `WidgetAction.Chain` 实例，如果没有设置状态（`setActiveTool(null)`），也会使用该实例。现在，你可以使用\
  \ `getActions(String` `tool)` 方法的一个变体（向其提供工具名称，并获取相关的 `WidgetAction.Chain` 实例），以便为特定状态获取一个实例。\n\
  \n**AcceptAction**\n\n此动作用于处理拖放操作。因此，在创建动作时必须提供一个 `AcceptProvider` 实现。`AcceptProvider`\
  \ 接口指定了 `isAcceptable()` 方法，该方法允许指定是否允许在此控件上进行放置操作，以及 `accept()` 方法，通过该方法完成放置操作。\n\
  \n`ActionFactory.`**`createAcceptAction`**`(`**`AcceptProvider`**` p);`\n\n**ActionMapAction**\n\
  \n此动作创建一个上下文菜单，通过右键单击控件来显示。与此相关，可以使用不带参数的默认方法创建动作，此时菜单的动作是从场景视图的 `ActionMap` 中推断出来的。此外，还有一个选项可以向该方法提供一个用于创建菜单的\
  \ `InputMap` 和 `ActionMap`。\n\n`ActionFactory.`**`createActionMapAction`**`();`\n\
  `ActionFactory.`**`createActionMapAction`**`(`**`InputMap`**` i,` **`ActionMap`**`\
  \ a);`\n\n**AddRemoveControlPointAction**\n\n此动作只能由 `FreeConnectionWidget` 控件使用。你可以通过双击控制点来添加或删除它们。你也可以选择性地指定所使用的灵敏度。\n\
  \n`ActionFactory.`**`createAddRemoveControlPointAction`**`();`\n`ActionFactory.`**`createAddRemoveControlPointAction`**`(`\n\
  **`double`** `createSensitivity,`\n**`double`** `deleteSensitivity);`\n\n**MoveAction/AlignWithMoveAction**\n\
  \n使用 `MoveAction`，可以通过拖放来移动控件。请注意，此动作仅在父控件具有 `AbsoluteLayout` 时才有效。`AlignWithMoveAction`\
  \ 的行为与 `MoveAction` 类似。但与 `MoveAction` 不同的是，`AlignWithMoveAction` 还会与其他控件进行额外的“吸附”对齐。你可以通过一个包含\
  \ `AlignWithWidgetCollector` 实例的列表，或者通过一个 `LayerWidget` 来检查哪些控件将被对齐或分别进行检查。在第二种情况下，会检查每个图层内所有子控件的对齐情况。\n\
