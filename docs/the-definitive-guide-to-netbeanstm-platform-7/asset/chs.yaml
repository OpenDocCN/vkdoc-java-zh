  \ DataShadow) {`\n`            DataShadow obj = (DataShadow) data;`\n`            for\
  \ (final FileObject child : obj.getOriginal().getPrimaryFile().getChildren()) {`\n\
  `               if (child.getName().toLowerCase().contains(req.getText().toLowerCase())`\n\
  `                 && child.getExt().toLowerCase().equals(\"mp3\")) {`\n`                  if(!resp.addResult(new\
  \ AddToPlaylist(child),child.getName())) {`\n`                     return;`\n`                  }`\n\
  `               }`\n`            }`\n`         }`\n`      }`\n`   }`\n\n`   private\
  \ static final class AddToPlaylist implements Runnable {`\n`      private FileObject\
  \ fo;`\n\n`      public AddToPlaylist(FileObject fo) {`\n`         this.fo = fo;`\n\
  `      }`\n\n`      @Override`\n`      public void run() {`\n`         try {`\n\
  `            PlaylistTopComponent.addFile(DataObject.find(fo).getNodeDelegate());`\n\
  `         } catch (DataObjectNotFoundException ex) {`\n`            Exceptions.printStackTrace(ex);`\n\
  `         }`\n`      }`\n`   }`\n`}`\n\n首先，你需要获取对收藏夹窗口中显示的文件夹的访问权限。你可以在搜索提供程序的构造函数中执行此操作。你需要重写的唯一方法是\
  \ `evaluate()` 方法。该方法会接收在快速搜索搜索框中输入的文本，并以 `SearchRequest` 对象的形式传递。让我们查看所有已添加到收藏夹窗口的文件夹，并检测那些文件名包含搜索字符串的\
  \ MP3 文件。通过 `addResult()` 方法将搜索结果添加到 `SearchResponse` 对象中。这样做时，你需要传递一个 `Runnable`\
  \ 实例以及要在搜索结果列表中显示的名称（可以使用 HTML 格式化）。当单击结果列表中的相关条目时，将执行此实例。在此示例中，你实现了 `AddToPlaylist`\
  \ 类。你将构造函数传递给找到的文件。在 `run()` 方法（在单击事件时执行）中，你确定一个代表该文件的 `Node` 实例。然后将其添加到播放列表中。\n\
  \n\n\n### 注册快速搜索提供程序\n\n搜索提供程序的实现必须通过在层文件中添加条目，向快速搜索模块公开；其中提供了扩展点 `QuickSearch`。当你使用\
  \ NetBeans IDE 向导创建提供程序时，该条目会自动创建。搜索提供程序被分配到某个类别。这样，搜索结果就可以在结果列表中按类别显示（参见图 24-1）。你可以使用\
  \ `position` 属性决定该类别在结果列表中的位置。使用 `command` 属性，你可以指定一个前缀，将搜索范围限制在该类别内。在此示例中，这意味着可以通过输入\
  \ *MP3 <搜索字符串>* 将搜索范围限制在显示的搜索提供程序上。\n\n可以将多个搜索提供程序实现添加到一个类别中。搜索提供程序的名称由 `displayName`\
  \ 属性指定。（参见清单 24-2。）\n\n***清单 24-2.** 搜索提供程序的注册*\n\n`<folder name=\"`**`QuickSearch`**`\"\
  >`\n`   <folder name=\"Music\">`\n`      <attr name=\"`**`command`**`\" stringvalue=\"\
  MP3\"/>`\n`      <attr name=\"`**`position`**`\" intvalue=\"100\"/>`\n`      <file\
  \ name=\"com-galileo-netbeans-module-`**`MyMusicQSProvider`**`.instance\">`\n`         <attr\
  \ name=\"`**`displayName`**`\"`\n`            bundlevalue=\"com.galileo.netbeans.module.Bundle#MyMusicQSProvider.instance\"\
  />`\n`      </file>`\n`   </folder>`\n`</folder>`\n\n### 集成快速搜索用户界面\n\n默认情况下，你的应用程序中不提供快速搜索框。可以通过*自定义工具栏*对话框将其添加到工具栏。通过层条目，你也可以将快速搜索用户界面永久分配给某个工具栏。这样，你可以确保它在启动应用程序时就已经存在。你可以通过层树确定快速搜索操作的名称，然后创建一个链接。如清单\
  \ 24-3 所示，你将此操作添加到新创建的工具栏 QuickSearch 中。\n\n***清单 24-3.** 添加快速搜索用户界面*\n\n`<folder\
  \ name=\"`**`Toolbars`**`\">`\n`   <folder name=\"`**`QuickSearch`**`\">`\n`      <file\
  \ name=\"org-netbeans-modules-quicksearch-QuickSearchAction.shadow\">`\n`         <attr\
