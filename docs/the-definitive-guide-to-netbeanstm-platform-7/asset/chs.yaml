  `</`**`persistence`**`>`\n\n你可以通过*构建*来创建库项目。然后回到 NetBeans 平台。通过*文件 ![Image](img/U001.jpg)\
  \ 新建项目 ![Image](img/U001.jpg) NetBeans 模块 ![Image](img/U001.jpg) NetBeans 平台应用程序*\
  \ 创建一个应用程序。对于这个平台应用程序，你需要包含两个额外的模块。为此，在*属性 ![Image](img/U001.jpg) 库*中打开 *java* 集群，并添加\
  \ *Beans Binding 集成* 和 *TopLink Essentials* 这两个模块。之后，你可以添加一个库包装器模块，其中包含之前创建的实体类的\
  \ JAR 文件。此模块将被称为 *My Entities*。\n\n你还需要两个额外的库包装器模块，一个用于连接数据库，另一个用于保存对象。为数据库驱动程序添加一个模块；这是文件\
  \ *derbyclient.jar*，你可以在 Java DB 安装目录中找到它。将此模块命名为 *Java DB Driver*。你需要另一个用于 *EclipseLink*\
  \ 的库包装器模块作为持久化提供程序。将 NetBeans IDE 安装目录下 *java/modules/ext/eclipselink* 中的 *eclipselink-2.2.0.jar*\
  \ 和 *eclipselink-javax.persistence-2.0.jar* 这两个文件添加到该模块。\n\n现在，只缺少一个模块了：实际的应用程序模块。将其命名为\
  \ *My Module*。你首先需要定义以下依赖关系，以便这些不同模块之间的交互能够正常工作：\n\n*   *My Entities* 模块包含对 *EclipseLink*\
  \ 和 *Java DB Driver* 模块的依赖。\n*   *My Module* 模块包含对 *EclipseLink*、*My Entities* 和\
  \ *Beans Binding 集成* 模块的依赖。\n\n\n\n到目前为止，您已安装该应用程序，现在可以通过 *文件 ![Image](img/U001.jpg)\
  \ 新建文件 ![Image](img/U001.jpg) 模块开发 ![Image](img/U001.jpg) 窗口* 为模块 *My Module* 添加一个顶层组件。该顶层组件最终应如图\
  \ 图 41-8 所示。但在添加表格和文本字段之前，您需要一个数据源，以便稍后可以将表格绑定到该数据源。\n\n为此，请在检查器窗口中打开节点 *Other Components*\
  \ 的上下文菜单，然后选择 *从面板添加 ![Image](img/U001.jpg) Java Persistence ![Image](img/U001.jpg)\
  \ Entity Manager*。接着，从同一类别中添加一个 *Query* 对象和一个 *Query Result* 对象。\n\n![Image](img/4109.jpg)\n\
  \n***图 41-9.** 添加和配置数据源*\n\n请保持给定的顺序（添加后可通过上下文菜单更改），因为这些对象相互依赖。因此，必须按此顺序创建这些对象。这些对象仍需在属性窗口中进行配置。然后在检查器窗口中选择相应的对象，以便调整以下特性：\n\
  \n*   您必须为 *EntityManager* 对象定义 *persistenceUnit* 的值。持久化单元的名称之前已由向导在 *persistence.xml*\
  \ 文件中确定（参见 清单 41-5）。请使用此名称。\n*   您需要为 *Query* 对象的参数 *query* 定义 JPA 查询，该查询用于从数据库中检索数据。对于此示例，查询为\
  \ `SELECT p FROM Product p`。为参数 *entityManager* 选择已创建的实体管理器名称 `entityManager1`。\n\
  *   对于 List 对象（Query Result），为参数 *query* 选择之前创建的 `query1` 对象。然后在属性窗口中切换到 *代码* 视图；您可以通过指定\
  \ *类型参数* 来参数化列表 `<Product>`。\n\n现在，您可以像 图 41-8 所示，从面板向表单添加一个表格、三个标签、文本字段以及一个按钮。接下来，您将进入由\
  \ Beans Binding 框架完成的部分：填充表格（通常，您需要先实现一个数据模型）以及在表格和文本字段之间同步更改数据。\n\n调用表格的上下文菜单，选择\
  \ *绑定 ![Image](img/U001.jpg) 元素*。选择之前创建并参数化的列表对象 `list1` 作为 *绑定源*。由于您希望显示所有属性，可以直接点击\
  \ *确定* 完成对话框（无需更改）。这样，系统会自动为表格创建一个数据模型，您可以根据需要对其进行调整。为此，请在上下文菜单中调用 *表格内容*。在此对话框中，您可以在\
  \ *列* 下单独设置众多项目。其中包括更改标题或调整各列的顺序。（参见 图 41-10。）\n\n![Image](img/4110.jpg)\n\n***图\
  \ 41-10.** 调整自动创建的表格数据模型*\n\n这样，数据源和将要创建数据的表格就连接起来了。您现在就可以启动应用程序，您会看到相关表中的所有条目都已列出。而且，您无需自己编写一行代码。Beans\
  \ Binding 框架为您完成了大量工作，包括例行的实现任务。\n\n#### 将详细视图绑定到表格\n\n您希望保持表格和文本字段之间的数据同步。如果在表格中选中某个条目，其数据将显示在文本字段中。如果您现在编辑文本字段中的值，该值也应在表格和数据模型中更改。反过来，如果表格发生更改，也应在文本字段中显示。\n\
  \n从详细视图的单个字段开始，您将绑定表格中选中条目的相应值。为此，请调用第一个文本字段（将包含产品标题）的上下文菜单，并选择 *绑定 ![Image](img/U001.jpg)\
  \ 文本*。现在，您将示例中命名为 `jTable1` 的表格用作 *绑定源*。在文件夹 *selectedElement* 中选择所需的属性作为 *绑定表达式*。（参见\
  \ 图 41-11。）\n\n![Image](img/4111.jpg)\n\n***图 41-11.** 将文本字段绑定到源*\n\n您可以在 *高级* 选项卡中定义更新特性。这意味着通过\
  \ *始终同步*，您可以确定更改在双向都被接受。您还可以确定更新将在哪个事件（例如输入文本）发生时进行。\n\n现在，您可以类似地为所有剩余的文本字段重复此绑定文本字段到数据源的步骤。然后启动应用程序。同时，您可以选择表格条目并在详细视图中编辑它们。查看数据库或重新启动应用程序后，您会很快发现更改并未持久化；您需要确定何时将更改保存到数据库中。现在，您将为应用程序添加第一行代码。\n\
  \n您需要一个事务来将更改写入数据库。您可以直接在构造函数中使用实体管理器创建这样一个事务。为此，请切换到源代码视图，并将 清单 41-6 中的行添加到构造函数中：\n\
  \n***清单 41-6.** 启动事务*\n\n`public MyTopComponent() {`\n`   ...`\n`   entityManager1.`**`getTransaction`**`().`**`begin`**`();`\n\
  `}`\n\n最后，您希望使用已添加的按钮 *保存* 将更改保存到数据库中。这意味着您需要关闭当前事务，然后为即将到来的更改启动一个新事务。通过双击按钮，可以直接注册一个用于\
  \ *actionPerformed* 事件的动作方法。因此，您现在只需实现 清单 41-7 中所示的两行代码作为方法体。\n\n***清单 41-7.** 将更改保存到数据库*\n\
