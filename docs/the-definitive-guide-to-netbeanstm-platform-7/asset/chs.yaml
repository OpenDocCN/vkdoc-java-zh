  \ toPopulate) {`\n`      toPopulate.addAll(Arrays.asList(folder.getChildren()));`\n\
  `      return true;`\n`   }`\n\n`   @Override`\n`protected Node` **`createNodeForKey`**`(FileObject\
  \ key) {`\n`      return new ExplorerFolderNode(key,`\n**`Children.create`**`(new\
  \ ExplorerChildFactory(key), false));`\n`   }`\n`}`\n\n你将父节点的`FileObject`传递给工厂类的构造函数（如清单\
  \ 12-3 所示）。你需要加载并管理该节点下的所有条目。当父节点被打开时，`createKeys()`方法会被自动调用。这意味着子节点仅在需要时才被创建。你从中读取所有下级文件夹，并将它们添加到`toPopulate`列表中。这个列表由`ChildFactory`类管理。对于在此方法中添加的每个键，都会调用`createNodeForKey()`方法。因此，你需要在此处创建`ExplorerFolderNode`对象。相应地，这样的对象将包含该动作。因此，你需要将一个`ExplorerChildFactory`实例传递给该对象。清单\
  \ 12-4 展示了在`ExplorerLeafNode`类上下文中该对象的实现。\n\n***清单 12-4.** 用于表示动作的节点类*\n\n`import\
  \ org.openide.awt.Actions;`\n`import org.openide.nodes.AbstractNode;`\n`import org.openide.nodes.Children;`\n\
  \n`public class ExplorerLeafNode extends AbstractNode {`\n`   private Action action\
  \ = null;`\n\n`   public ExplorerLeafNode(`**`Action`** `action) {`\n`      super(`**`Children.LEAF`**`);`\n\
  `      this.action = action;`\n`      setDisplayName(Actions.cutAmpersand((String)action.getValue(Action.NAME)));`\n\
  `   }`\n\n`   @Override`\n`public Action` **`getPreferredAction`**`() {`\n`    \
  \  return action;`\n`   }`\n\n`   @Override`\n`   public Image getIcon(int type)\
  \ {`\n`      ImageIcon img = (ImageIcon) action.getValue(Action.SMALL_ICON);`\n\
  `      if(img != null) {`\n`         return img.getImage();`\n`      } else {`\n\
  `         return null;`\n`      }`\n`   }`\n`}`\n\n你从`AbstractNode`派生节点类（如清单 12-4\
  \ 所示），每个类将表示一个动作。构造函数从子工厂接收实际的`Action`对象。当然，这些节点不应再有子节点，因此你通过`Children.LEAF`传递一个空容器。此外，还要设置节点的名称和图标。你重写`getPreferredAction()`方法，以便传递该节点背后的动作。当你双击此节点时，相应的动作就会被执行。\n\
  \n清单 12-5 展示了`ExplorerChildFactory`类如何创建这些类型的节点。\n\n***清单 12-5.** ExplorerLeafNode\
  \ 类型元素的子工厂*\n\n`import org.openide.filesystems.FileObject;`\n`import org.openide.nodes.ChildFactory;`\n\
  `import org.openide.nodes.Node;`\n`import org.openide.util.lookup.Lookups;`\n\n\
  `public class` **`ExplorerChildFactory`** `extends` **`ChildFactory<Action>`** `{`\n\
  `   private FileObject folder = null;`\n\n`   public ExplorerChildFactory(FileObject\
  \ folder) {`\n`      this.folder = folder;`\n`   }`\n\n`   @Override`\n`protected\
  \ boolean` **`createKeys`**`(List<Action> toPopulate) {`\n`      for(Action action\
  \ : Lookups.forPath(folder.getPath()).lookupAll(Action.class)) {`\n`         toPopulate.add(action);`\n\
  `      }`\n`      return true;`\n`   }`\n\n`   @Override`\n`protected Node` **`createNodeForKey`**`(Action\
  \ key) {`\n`      return new ExplorerLeafNode(key);`\n`   }`\n`}`\n\n`ExplorerLeafNode`类型的子元素将通过一个`Action`实例创建，因此你需要继承`ChildFactory<Action>`。以`FileObject`实例的形式将相应的父元素传递给构造函数。在`createKeys()`方法中，你现在可以访问父元素，并为该父元素创建一个`Lookup`。这提供了一种非常优雅的方式来获取所有在此注册的动作。最后，通过`createNodeForKey()`方法为这些动作创建节点对象。\n\
  \n到目前为止，你已经学习了如何实现自己的节点类以及如何创建它们的实例。利用这些类，你能够完全描绘层文件中定义的结构。但你仍然需要另一个视图来在窗口中用树形结构描绘这些节点。Explorer\
  \ API 负责实现节点的表示。为了说明这一点，以下章节将对 Explorer API 进行简要介绍，之后我们将完成已开始的示例。\n\n\n\n### Explorer\
  \ API\n\n通过 Explorer API，您可以在不同变体中直观地显示和管理节点。为此，该 API 提供了一组资源管理器视图，您可以使用这些视图在典型结构中显示节点。这些视图的类层次结构如图\
  \ 12-5 所示。例如，`ChoiceView` 类在组合框中呈现其节点，而 `MenuView` 则在任意深度的菜单结构中呈现节点。最常用且可能最受欢迎的视图是\
  \ `BeanTreeView`，它以树形结构呈现节点。除了表示节点和处理操作（例如剪切、插入、删除或拖放节点）之外，这些视图还负责显示节点的上下文菜单。视图通过节点的\
  \ `getActions()` 方法获取节点的操作。\n\n![Image](img/1205.jpg)\n\n***图 12-5.** 不同资源管理器视图的类层次结构*\n\
  \n管理资源管理器视图始终由 `ExplorerManager` 类完成。包含资源管理器视图的组件必须提供该管理器的一个实例。在大多数情况下，这是其顶层组件。\n\
  \n关于这一点值得注意的是，管理器不必连接到视图，因为视图会自动在组件层次结构中（即在父组件中）搜索管理器。父组件必须实现 `ExplorerManager.Provider`\
  \ 接口，这样才能找到该管理器。该接口指定了 `getExplorerManager()` 方法，视图通过该方法确定管理器。在此过程中，多个不同的视图可以使用同一个管理器。\n\
  \n资源管理器管理器的主要任务之一是监视视图中节点的选择。管理器始终提供选定的节点及其 Lookup。您按如下步骤操作，以便其他顶层组件甚至来自外部的其他模块（来自操作类）可以访问当前上下文。使用辅助类\
  \ `ExplorerUtils`，您可以通过 `createLookup()` 方法创建一个始终代表选定节点（或由资源管理器管理器提供的多个节点）的 Lookup。使用\
  \ `associateLookup()` 方法，您将（以这种方式创建的）Lookup 定义为顶层组件的本地 Lookup。因此，可以通过全局代理 Lookup（在调用\
  \ `Utilities.actionsGlobalContext()` 时获得）从外部访问该 Lookup。\n\n在上一节中，您为资源管理器示例创建了必要的节点类和子工厂类。目前还缺少的是一个带有可以显示节点的资源管理器视图的窗口。通过这仍然缺失的一步，我将解释视图和管理器的用法。首先，您通过\
  \ NetBeans IDE 的窗口向导创建顶层组件 `ExplorerTopComponent`。然后，您为其提供一个资源管理器管理器。为此，您必须实现 `ExplorerManager.Provider`\
  \ 接口，并将 `ExplorerManager` 的一个实例作为私有数据元素应用。通过 `getExplorerManager()` 方法返回此管理器。下一步，您向顶层组件添加一个\
  \ `BeanTreeView`；最简单的方法是使用表单编辑器将一个滚动面板拖到窗口上，然后在属性中 *Code* 类别下的 *Custom Creation\
  \ Code* 处输入 `new BeanTreeView()`。然后，您的 `initComponents()` 方法应该看起来像示例那样。如前所述，视图会自行找到资源管理器管理器，因此您无需采取进一步步骤来连接视图和管理器。每个视图，或者说每个管理器，都基于一个根元素，所有其他节点都源自该根元素。您使用\
  \ `setRootContext()` 在 `initTree()` 方法中设置此根元素。您还将节点类 `ExplorerFolderNode` 的一个实例传递给刚刚提到的方法。从该节点开始，所有其他节点的创建被启动。当然，仅当系统文件系统中存在文件夹\
  \ `Explorer` 时（即，如果有任何模块在其层文件中向文件夹 `Explorer` 添加了条目），您才创建此节点。请参见清单 12-6。\n\n***清单\
  \ 12-6.** 通过 BeanTreeView 显示节点的资源管理器窗口。节点由资源管理器管理器管理。*\n\n`public final class` **`ExplorerTopComponent`**\
  \ `extends TopComponent`\n`implements` **`ExplorerManager.Provider`** `{`\n\n`private\
  \ static final String` **`ROOT_NODE`** `= \"Explorer\";`\n`   private final ExplorerManager\
  \ manager = new ExplorerManager();`\n\n`   public ExplorerTopComponent() {`\n`      initComponents();`\n\
  `      initTree();`\n`      initActions();`\n`      associateLookup(`**`ExplorerUtils.createLookup(manager,\
  \ getActionMap()));`**\n`   }`\n\n`   private JScrollPane jScrollPane1;`\n\n`   private\
  \ void initComponents() {`\n`jScrollPane1 = new` **`BeanTreeView`**`();`\n`      setLayout(new\
  \ BorderLayout());`\n`      add(jScrollPane1, BorderLayout.CENTER);`\n`      ...`\n\
  `   }`\n\n`   private void initTree() {`\n`      FileObject root = FileUtil.getConfigFile(`**`ROOT_NODE`**`);`\n\
  `      if(root != null) { /* 找到文件夹 */`\n`         manager.setRootContext(`\n**`new\
  \ ExplorerFolderNode`**`(root,` **`Children.create`**`(`\n**`new ExplorerFolderFactory`**`(root),\
  \ false)));`\n`      }`\n`   }`\n\n`   private void initActions() {`\n`      CutAction\
  \ cut = SystemAction.get(CutAction.class);`\n`getActionMap().put(cut.getActionMapKey(),`\
  \ **`ExplorerUtils.actionCut(manager));`**\n`      CopyAction copy = SystemAction.get(CopyAction.class);`\n\
  `getActionMap().put(copy.getActionMapKey(),` **`ExplorerUtils.actionCopy(manager));`**\n\
  `      PasteAction paste = SystemAction.get(PasteAction.class);`\n`getActionMap().put(paste.getActionMapKey(),`\
  \ **`ExplorerUtils.actionPaste(manager));`**\n`      DeleteAction delete = SystemAction.get(DeleteAction.class);`\n\
  `getActionMap().put(delete.getActionMapKey(),` **`ExplorerUtils.actionDelete(manager,\
  \ true));`**\n`   }`\n\n`public ExplorerManager` **`getExplorerManager`**`() {`\n\
  `      return manager;`\n`   }`\n\n`   protected void componentActivated() {`\n\
  `      ExplorerUtils.`**`activateActions`**`(manager, true);`\n`   }`\n\n`   protected\
  \ void componentDeactivated() {`\n`      ExplorerUtils.`**`activateActions`**`(manager,\
  \ false);`\n`   }`\n`}`\n\n下一步，您在 `initActions()` 方法中将平台提供的标准操作（剪切、复制、粘贴和删除）与资源管理器管理器的操作连接起来。资源管理器管理器的操作由\
  \ `ExplorerUtils` 类提供，您通过操作映射键将其注册到顶层组件的操作映射中。您通过 `ExplorerUtils.createLookup` 方法创建一个代理\
  \ Lookup（提供各自选定的节点及其 Lookup），以便可以通过顶层组件的 Lookup 访问视图的各自选定节点。您通过 `associateLookup()`\
  \ 方法将此代理 Lookup 定义为顶层组件的本地 Lookup。操作映射也必须位于顶层组件的 Lookup 中，以便先前注册的操作（在操作映射中注册的）实际处于活动状态。实际上，您可以直接将操作映射传递给\
  \ `createLookup()` 方法，这使得操作映射可以通过代理 Lookup 使用。\n\n为了节省资源，您可以在 `componentActivated()`\
  \ 和 `componentDeactivated()` 方法中打开或关闭资源管理器管理器操作的监听器（您之前将其连接到系统操作），这些方法在激活和停用窗口时被调用。这样，例如，如果窗口甚至未激活，它们就不会收到剪贴板事件的通知。\n\
  \n至此，我应该提一下 NetBeans 网站上 `http://netbeans.org/kb/trails/platform.html` 提供的许多有趣的示例和教程。这些教程易于理解，并且关于\
  \ Nodes、Explorer 和 Property Sheet API 的示例特别有用。\n\n\n\n### 摘要\n\n借助节点和资源管理器 API，NetBeans\
  \ 平台提供了一个用于显示各种不同数据的通用框架。在本章中，您学习了不同节点类的基础知识以及节点容器的功能。通过一个示例，您创建了自己的节点类和容器，并使用资源管理器\
  \ API 显示了 XML 文件中定义的一些数据。\n\n## 第 13 章\n\n## 对话框与向导\n\n*对话框 API* 可帮助您创建和显示对话框与向导。这些对话框基于\
  \ Java 的 `Dialog` 类。使用对话框 API，您可以显示标准对话框，以及针对特定业务需求定制的自定义对话框。此外，该 API 与 NetBeans\
  \ 窗口系统以及 NetBeans 帮助系统都能很好地集成。向导可被视为一种特殊的对话框，因此也是对话框 API 的一部分。\n\n### 标准对话框\n\n\
  使用 `NotifyDescriptor` 类来定义标准对话框的属性。提供一个以 `String`、`Icon` 或 `Component` 形式呈现的消息，该消息将与对话框一起显示。或者，也可以使用数组在不同情况下显示多条消息。可以指定不同类型的消息，从而控制所显示的图标。通过\
  \ `NotifyDescriptor` 中预定义的常量来定义类型，如表 13-1 所列。\n\n![图片](img/t1301.jpg)\n\n选项类型定义了对话框中显示哪些按钮，为此提供了表\
  \ 13-2 中所示的常量。\n\n![图片](img/t1302.jpg)\n\n此外，您可以使用构造函数或 `setAdditionalOptions()`\
  \ 方法传入一个 `Object` 数组，其组件会以 `JButton` 对象的形式添加到对话框的按钮中。通常，这里传入的是 `String` 对象，但您也可以使用\
  \ `Component` 或 `Icon` 对象。然而，如果您想省略默认按钮，则只能通过 `setOptions()` 方法或在构造函数中传入它们来提供自定义按钮。同样，这里也使用\
  \ `String`、`Component` 和 `Icon` 类：\n\n**`NotifyDescriptor`** `d = new` **`NotifyDescriptor`**`(`\n\
  `   \"文本\",  // 对话框消息`\n`   \"标题\", // 对话框标题`\n`   NotifyDescriptor.OK_CANCEL_OPTION,    //\
  \ 按钮`\n`   NotifyDescriptor.INFORMATION_MESSAGE, // 符号`\n`   null,    // 自定义按钮，类型为\
  \ Object[]`\n`   null);   // 附加按钮，类型为 Object[]`\n\n像前面定义的对话框描述，会被传入 `DialogDisplayer`\
  \ 类的 `notify()` 方法中，该类负责对话框的创建和显示，并在对话框关闭时给出返回值。`DialogDisplayer` 被设计为一个全局服务，其提供者通过\
  \ Lookup 由 `getDefault()` 方法提供。\n\n`Object retval = DialogDisplayer.getDefault().notify(d);`\n\
  \n您可以通过与表 13-3 中列出的常量进行比较，来识别用户点击的按钮。\n\n![图片](img/t1303.jpg)\n\n![图片](img/t1303a.jpg)\n\
  \n对于最常见的对话框类型，对话框 API 提供了 `NotifyDescriptor` 类的三个子类，因此您只需定义少数几个参数。在接下来的章节中，我们将通过示例更详细地了解这些类。\n\
  \n#### 信息对话框\n\n通过 `NotifyDescriptor.Message` 类创建信息对话框。将要显示的文本以及可选的**消息类型**传递给构造函数。默认情况下，对话框会显示信息符号，如图\
  \ 13-1 所示。\n\n`NotifyDescriptor nd = new` **`NotifyDescriptor.Message`**`(\"信息\"\
  );` ![图片](img/1301.jpg)\n\n***图 13-1.** 信息对话框*\n\n#### 问题对话框\n\n如果希望用户能够回答对话框中提出的问题（参见图\
  \ 13-2），请使用 `NotifyDescriptor.Confirmation` 类。为此，提供了一系列构造函数，用于传入消息、标题、消息类型和附加选项类型。\n\
  \n`NotifyDescriptor d = new` **`NotifyDescriptor.Confirmation`**`(`\n`   \"您可以在此处放置任何字符串或组件\"\
  ,`\n`   \"这是一个问题\");` ![图片](img/1302.jpg)\n\n***图 13-2.** 问题对话框*\n\n#### 输入对话框\n\
  \n通过 `NotifyDescriptor.InputLine` 类可以轻松创建输入对话框。定义要在对话框输入区域显示的文本和标题（参见图 13-3）。或者，传入选项类型和消息类型，以便显示所需的按钮和符号。\n\
  \n`NotifyDescriptor d = new` **`NotifyDescriptor.InputLine`**`(`\n`   \"名和姓：\",`\n\
  `   \"请输入您的姓名\");` ![图片](img/1303.jpg)\n\n***图 13-3.** 输入对话框*\n\n通过 `getInputText()`\
  \ 方法访问用户输入的文本。或者，通过 `setInputText()` 方法在字段中输入文本。\n\n### 自定义对话框\n\n自定义对话框通过 `DialogDescriptor`\
  \ 类创建。此类是 `NotifyDescriptor` 类的扩展。传入一个要显示的 `Component` 对象，同时定义对话框的模态性以及一个相关的 `ActionListener`，该监听器在点击按钮时做出响应。或者，传入一个\
  \ `HelpCtx` 对象，提供帮助主题的 ID，以便在对话框上自动显示“帮助”按钮。对于 `DialogDescriptor`，通过 `DialogDisplayer`\
  \ 的 `createDialog()` 方法创建一个 `Dialog` 对象。或者，通过 `notify()` 或 `notifyLater()` 方法直接显示对话框。\n\
  \n#### 显示通知\n\n在创建自己的对话框时，例如为了向用户查询某些数据，您可以向用户显示通知（参见*向导*一节），其效果等同于向导。通知行由对话框 API\
  \ 自动集成，如果需要，可以通过 `NotifyDescriptor` 实例的 `createNotificationLineSupport()` 方法创建。因此，通知行以\
  \ `NotificationLineSupport` 实例的形式创建在对话框底部（参见图 13-4）。您可以使用以下方法在该行中显示信息：\n\n`setInformationMessage(String\
  \ msg)`\n`setWarningMessage(String msg)`\n`setErrorMessage(String msg)`\n\n这些方法中的每一个还会在显示的通知前面设置一个相应的图标。您可以通过相应的\
  \ `get` 方法读取当前显示的通知。使用 `clearMessages()` 方法可以再次删除已显示的通知。\n\n![图片](img/1304.jpg)\n\
  \n***图 13-4.** 带有集成通知行的对话框*\n\n\n\n#### 示例\n\n以下示例演示了如何通过 `DialogDescriptor` 类创建登录对话框。关键在于对话框要在适当的时机显示：即应用程序启动时。应用程序应被阻塞，直到用户正确输入登录信息。支持两种方法，如下文所述。\n\
  \n如前所述，可以将一个 `Component` 对象传递给 `DialogDescriptor`，使其显示在对话框中。在图 13-5 所示的示例中，这种方法被用来将两个文本字段集成到对话框中，以便用户输入用户名和密码。该面板通过其\
  \ `getUsername()` 和 `getPassword()` 方法提供用户名和密码。要在应用程序启动时显示对话框，需要一个模块安装程序（参见第 3 章）。在模块安装程序的\
  \ `restored()` 方法中，创建 `DialogDescriptor` 来显示登录对话框。\n\n![Image](img/1305.jpg)\n\n\
  ***图 13-5.** 通过 DialogDescriptor 和附加面板创建的登录对话框*\n\n由于需要异步执行对话框——否则对话框会在初始化阶段显示——因此有必要注册一个\
  \ `ActionListener` 来响应用户的按钮点击。实际的登录过程在 `actionPerformed()` 方法中执行。如果输入的值不正确，则通过 `LifecycleManager`\
  \ 类退出应用程序（参见第 8 章）。\n\n为了允许在用户点击关闭按钮（位于对话框右上角）时做出反应，需要注册一个 `PropertyChangeListener`，在其中关闭应用程序。为了在初始化阶段之后立即显示对话框——即启动画面之后直接显示——请使用\
  \ `notifyLater()` 方法，如清单 13-1 所示。\n\n***清单 13-1.** 应用程序启动时显示的登录对话框，阻塞应用程序直到成功输入用户名和密码*\n\
  \n`public class Installer extends ModuleInstall`\n`implements` **`ActionListener`**\
  \ `{`\n`private` **`LoginPanel`** `panel = new LoginPanel();`\n`private` **`DialogDescriptor`**\
  \ `d = null;`\n`   @Override`\n`public void` **`restored`**`() {`\n`d = new` **`DialogDescriptor`**`(panel,\
  \ \"Login\", true, this);`\n`d.` **`setClosingOptions`**`(new Object[]{});`\n`d.addPropertyChangeListener(new`\
  \ **`PropertyChangeListener`**`() {`\n`         public void propertyChange(PropertyChangeEvent\
  \ e) {`\n`            if(e.getPropertyName().equals(DialogDescriptor.PROP_VALUE)`\n\
  `            && e.getNewValue()==DialogDescriptor.CLOSED_OPTION) {`\n**`LifecycleManager.getDefault().exit();`**\n\
  `            }`\n`         }`\n`      });`\n`      DialogDisplayer.getDefault().`**`notifyLater`**`(d);`\n\
  `   }`\n`public void` **`actionPerformed`**`(ActionEvent event) {`\n`      if(event.getSource()\
  \ == DialogDescriptor.CANCEL_OPTION) {`\n**`LifecycleManager.getDefault().exit();`**\n\
  `      } else {`\n`         if(!SecurityManager.`**`login`**`(panel.getUsername(),\
  \ panel.getPassword())) {`\n`            panel.setInfo(\"Wrong user name or password\"\
  );`\n`         } else {`\n`            d.`**`setClosingOptions`**`(null);`\n`         }`\n\
  `      }`\n`   }`\n`}`\n\n另一种显示对话框的方法是使用 `notify()` 方法，该方法在应用程序可用时立即在单独的线程中执行。通过\
  \ `WindowManager` 类提供的 `invokeWhenUIReady()` 方法来实现。这种方法与 `notifyLater()` 的区别在于，对话框仅在应用程序窗口完全加载后才显示。\n\
  \n`WindowManager.getDefault().`**`invokeWhenUIReady`**`(new Runnable(){`\n`   public\
  \ void run() {`\n`      DialogDisplayer.getDefault().`**`notify`**`(d);`\n`   }`\n\
  `});`\n\n最后，可以通过扩展 `JDialog` 从头开始构建一个完整的对话框。为此，可以使用相关的 NetBeans IDE 向导，路径为 *文件 ![Image](img/U001.jpg)\
  \ 新建文件… ![Image](img/U001.jpg) Java GUI 窗体 ![Image](img/U001.jpg) JDialog 窗体*。如果你需要将主应用程序窗口作为对话框的父窗口，可以通过窗口管理器获取，如下所示：\n\
  \n`Frame f = WindowManager.getDefault().`**`getMainWindow`**`();`\n\n### 向导\n\n\
  除了对对话框的支持外，对话框 API 还包含一个向导框架，用于创建分步流程，帮助用户完成特定操作。这类向导在 NetBeans IDE 本身中很常见，例如用于创建新窗口或操作的向导。对于每一步，都需要提供一个与该步骤所需数据输入相对应的面板。步骤之间的协调由向导框架处理。我们将在以下示例中使用此向导，通过该示例，我将特别向您展示设计向导及其架构的可能性。在此示例中，您将创建一个用于创建播放列表的向导。该向导提供两个步骤。第一步允许用户描述播放列表，如图\
  \ 13-6 所示，第二步允许选择音乐曲目并将其添加到播放列表。\n\n![Image](img/1306.jpg)\n\n***图 13-6.** 用于创建播放列表的示例向导中的第一步*\n\
  \n#### 向导架构\n\n`WizardDescriptor` 类原则上描述和配置一个向导。该类是上一节中解释的 `DialogDescriptor` 类的子类。而\
  \ `DialogDescriptor` 类又是 `NotifyDescriptor` 的子类。`WizardDescriptor` 包含并管理向导中的所有面板，并负责核心任务，例如控制操作按钮和显示目录。换句话说，`WizardDescriptor`\
  \ 是整个向导的控制器。通常，`WizardDescriptor` 还提供数据模型，从各个步骤收集的数据作为属性保存在该模型中。但您也可以提供自己的数据模型。\n\
  \n对于向导中的每一步，都必须提供一个面板。通常，一个面板由两个独立的类构建而成。第一个类实现图形用户界面。这个类被称为*可视化面板*，通常扩展 `JPanel`。第二个类负责面板的管理和验证，被称为*向导面板*。该类扩展了\
  \ `WizardDescriptor.Panel<Data>` 类。它按需创建可视化面板，并将其提供给向导。就 MVC（模型-视图-控制器）范式而言，可视化面板是视图，向导面板是控制器。可视化面板仅包含用户界面实现，并通过\
  \ `get` 和 `set` 方法提供用户输入的数据。可视化面板不应包含业务逻辑，尤其不应处理任何特定于向导的类或调用。因此，该面板是完全可重用的，也可以在向导之外使用。通过这种方式，面板是可重用的——例如，在用于稍后编辑播放列表的对话框中。`WizardDescriptor`、`WizardPanel`\
  \ 和 `VisualPanel` 之间的关系再次在图 13-7 中说明。\n\n![Image](img/1307.jpg)\n\n***图 13-7.**\
  \ 向导的架构*\n\n\n\n#### 创建面板\n\n向导的骨架是在 NetBeans IDE 中创建的。转到 *文件 ![Image](img/U001.jpg)\
  \ 新建文件…*，然后在 *模块开发* 类别中选择 *向导* 文件类型。在下一步中，选择 *自定义* 作为注册类型，并将向导步骤序列设置为 *静态*。输入 *2*\
  \ 作为要创建的面板数量。在最后一步中，为所创建的类名称提供一个前缀。在此示例中，使用 `Playlist` 作为前缀。最后，单击 *完成*。IDE 随后会创建两个面板的骨架，每个面板都包含一个可视化面板和一个向导面板。不过，你需要调整一些预定义方法的内容。\n\
  \n首先，在 NetBeans 表单编辑器中创建第一个面板的用户界面——即 `PlaylistVisualPanel1` 类。添加几个字段，用户可以通过这些字段描述播放列表。用户必须能够为播放列表指定名称，同时选择流派并提供描述和图片。完成后的面板应如图\
  \ 13-6 所示，其中面板已显示为集成在向导中。该面板是一个普通的 Swing 组件，继承自 `JPanel`；但你需要牢记以下实现细节：\n\n*   对于向用户请求的每项数据，都定义一个公共属性常量。这些常量用于播放列表的名称、流派、描述和图片。特别是，这些常量稍后用于将数据保存到数据模型以及从数据模型加载数据。\n\
  *   在构造函数中，为每个需要监控的字段添加一个监听器。在此示例中，你需要确保名称至少包含三个字符，所选图片的最大尺寸为 128 × 128 像素，并且当未选择图片时显示警告消息。为此，你需要为两个文本字段\
  \ `playlistName` 和 `imagePath` 注册一个 `DocumentListener`。\n*   重写 `getName()` 方法非常重要。通过这种方式，你可以提供向导步骤标题中显示的面板名称。\n\
  *   为每个字段添加一个 getter 方法，向导面板使用该方法访问用户输入的数据。\n*   在 `DocumentListener` 的方法 `changedUpdate()`、`insertUpdate()`\
  \ 和 `removeUpdate()` 中，使用 `firePropertyChange()` 方法通知所有已注册的 `PropertyChangeListener`。向导三个层之间的交互将在下一节详细讨论。\n\
  \n清单 13-2 展示了可视化面板 `PlaylistWizardPanel1` 的一部分。请注意，该面板完全不含任何向导逻辑。该类的完整源代码以及完整的示例项目可以从\
  \ Apress 网站上本书的源代码/下载区域下载。\n\n***清单 13-2.** 第一个向导步骤的可视化面板*\n\n`public final class`\
  \ **`PlaylistVisualPanel1`** `extends` **`JPanel`**\n`implements` **`DocumentListener`**\
