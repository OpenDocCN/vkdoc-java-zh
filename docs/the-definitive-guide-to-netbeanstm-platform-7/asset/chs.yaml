  \n##### Java 包依赖关系\n\nNetBeans 允许您设置对特定 Java 包的模块依赖关系。这种依赖关系在清单文件中设置：\n\n**`OpenIDE-Module-Package-Dependencies`**`:\
  \ javax.sound.midi.spi > 1.4`\n\n##### Java 版本依赖关系\n\n如果您的模块依赖于特定的 Java 版本，例如 Java\
  \ 6，您也可以在模块属性的 *属性 ![Image](img/U001.jpg) 源代码* 下，使用 *源代码级别* 设置来指定。除此之外，您还可以要求特定版本的\
  \ Java 虚拟机：\n\n**`OpenIDE-Module-Java-Dependencies`**`: Java > 1.6 VM > 1.0`\n\n\
  您可以使用等号要求一个精确的版本，或者要求一个大于指定版本的版本。\n\n### 生命周期\n\n您可以实现一个所谓的*模块安装程序*来影响模块的生命周期，从而对某些事件做出反应。模块系统\
  \ API 提供了 `ModuleInstall` 类，我们从中派生自己的模块安装程序类。这样做时，可以覆盖所需事件的以下方法。可用的方法或事件如下：\n\n\
  *   *`validate()`*：此方法在安装或加载模块之前调用。如有必要，在此设置某些加载序列，例如验证模块许可证。如果序列不成功且模块未加载，则可以抛出\
  \ `IllegalStateException`。此异常会阻止加载或安装模块。\n*   *`restored()`*：此方法在加载已安装的模块时始终被调用。在此，可以初始化启动模块的操作。\n\
  *   *`uninstalled()`*：此方法在从应用程序中移除模块时调用。\n*   *`closing()`*：在模块结束之前，会调用此方法。在此，您还可以测试模块是否准备好被移除，或者是否仍有要执行的活动。如果返回值为\
  \ `false`，则模块和整个应用程序不会结束，因为此方法总是在结束模块之前调用。只有当所有模块都设置为 `true` 时，应用程序才会结束。例如，您可以向用户显示一个对话框，以确认是否真的应该关闭应用程序。\n\
  *   *`close()`*：如果所有模块都准备好结束，则调用此方法。在此，您可以在关闭模块之前调用操作。\n\n![Image](img/square.jpg)\
  \ **注意** 使用这些方法时，请考虑您调用的操作是否可以通过声明方式设置。但是，始终检查所需操作是否可以采用声明方式。特别是在 `validate()` 和\
  \ `restored()` 方法的情况下，请考虑这些方法会影响整个应用程序的启动时间。例如，当注册服务时，您可以使用层文件中的条目或 Java 扩展机制（参见第\
  \ 5 章）。这样，它们会在首次使用时才被加载，并且不会延长整个应用程序的启动时间。\n\n清单 3-6 展示了一个模块安装程序类的结构。\n\n***清单 3-6.**\
  \ 模块安装程序类的结构*\n\n`public class Installer extends` **`ModuleInstall`** `{`\n`public\
  \ void` **`validate`**`() throws IllegalStateException {`\n`      // 例如，检查许可证密钥，如果无效则抛出`\n\
  `      // IllegalStateException。`\n`   }`\n`public void` **`restored`**`() {`\n\
  `      // 在加载模块时调用。`\n`   }`\n`public void` **`uninstalled`**`() {`\n`      // 在卸载模块时调用。`\n\
  `   }`\n`public boolean` **`closing`**`() {`\n`      // 调用以检查模块是否可以关闭。`\n`   }`\n\
  `public void` **`close`**`() {`\n`      // 在模块关闭之前调用。`\n`   }`\n`}`\n\n为了记录模块安装程序类在不同会话中的状态，请覆盖\
  \ `ModuleInstall` 类实现的 `Externalizable` 接口中的 `readExternal()` 和 `writeExternal()`\
  \ 方法。在此存储和检索必要的数据。这样做时，建议首先在超类上调用要覆盖的方法。为了让模块系统在启动时知道某个模块是否提供了模块安装程序以及在哪里找到它，请在清单文件中注册它：\n\
  \n**`OpenIDE-Module-Install`**`: com/galileo/netbeans/module/Installer.class`\n\n\
  现在，您要创建您的第一个模块安装程序。NetBeans IDE 提供了一个向导来创建此文件（参见图 3-10）。转到 *文件* ![Image](img/U001.jpg)\
  \ *新建文件…*，然后在 *模块开发* 类别中选择文件类型 *安装程序 / 激活器*。\n\n![Image](img/0310.jpg)\n\n***图 3-10.**\
