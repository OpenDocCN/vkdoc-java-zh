  />`\n`         <attr name=\"position\" intvalue=\"400\"/>`\n`      </file>`\n`   </folder>`\n\
  `</folder>`\n\n### 隐藏现有的搜索提供程序类别\n\n默认情况下，用于操作和其他功能的搜索提供程序属于 NetBeans 平台。这些提供程序各自被分配到一个类别。你可以通过标准的系统文件系统功能（即，与隐藏菜单项相同的方式）来隐藏类别。你可以将相关的搜索提供程序从搜索中排除。为此，你只需在类别名称后添加后缀\
  \ `_hidden`。例如，在层文件中添加清单 24-4 中的以下条目，以删除前两个声明的搜索提供程序类别：\n\n***清单 24-4.** 删除搜索提供程序类别*\n\
  \n`<folder name=\"QuickSearch\">`\n`   <folder name=\"Actions`**`_hidden`**`\"/>`\n\
  `   <folder name=\"Options`**`_hidden`**`\"/>`\n`</folder>`\n\n### 总结\n\n可以通过快速搜索\
  \ API 向 NetBeans 平台的快速搜索功能添加提供程序。这些提供程序可以在任何位置搜索任何数据和对象。在本章中，你学习了如何实现和注册快速搜索提供程序。你还了解了如何集成快速搜索用户界面以及如何隐藏现有的搜索提供程序类别。\n\
  \n## 第 25 章\n\n## 自动更新服务 API\n\nNetBeans 平台通过其插件管理器为用户提供了一个有用的工具。使用此工具，可以安装、卸载、激活、停用或更新应用程序的各个部分（单个模块或几个相关模块）。可以通过自动更新服务\
  \ API 直接访问这些功能，并创建真正不同的应用程序。\n\n由于 `UpdateManager` 类的存在，可以访问所有现有的模块。一个模块（单元）由 `UpdateUnit`\
  \ 类表示；该类是不同元素的一种包装器。这些元素可能包括：\n\n*   已安装的模块本身\n*   为当前区域设置安装的模块\n*   已安装更新的前一个版本（备份）\n\
  *   可用更新列表（在更新中心）\n*   可用本地化版本列表（在更新中心）\n\n上述元素分别由 `UpdateElement` 类表示。该类提供模块的名称、类别、作者或图标等信息。安装或卸载等操作由\
  \ `OperationContainer` 实例管理。为了创建此类实例，每个操作都提供了一个工厂方法。\n\n以下各节通过典型应用演示了自动更新服务 API\
  \ 的使用。\n\n### 后台自动更新\n\n业务应用程序通常要求在不与用户交互的情况下，在客户端自动安装更新。这确保了所有用户都使用相同且最新版本的应用程序。\n\
  \n\n\n#### 搜索更新\n\n第一步是搜索必须安装的模块。搜索会在所有已注册的更新中心中进行。这意味着在应用程序的首次交付中，至少应注册一个更新中心。新的模块应通过此更新中心纳入。你可以通过\
  \ NetBeans IDE 非常轻松地注册一个更新中心。为此，只需调用 *文件 ![Image](img/U001.jpg) 新建文件 ![Image](img/U001.jpg)\
  \ 模块开发 ![Image](img/U001.jpg) 更新中心*。你可以在第 36 章中找到更多相关信息。\n\n使用清单 25-1 所示的方法搜索最新的模块和已更新的模块。让所需的（或所有）更新提供者从更新中心加载关于所提供模块的信息非常重要。在此示例中，你通过\
  \ `UpdateUnitProviderFactory` 确定所有提供者，并执行其 `refresh()` 方法。之后，你通过 `UpdateManager`\
  \ 确定所有可以更新或重新安装的已提供模块，该管理器也会考虑所有提供者。为此，使用 `!unit.getAvailableUpdates().isEmpty()`\
  \ 过滤掉所有已安装且未更新的模块。现在，你只需使用 `getInstalled()` 方法来区分新模块和已更新的模块。如果它返回 `null`，则表示该模块的版本尚未安装；也就是说，它是一个新模块。根据此查询，你将模块添加到相应的列表中。\n\
  \n***清单 25-1.** 搜索新模块和已更新模块*\n\n`private List<UpdateElement> install = new ArrayList<UpdateElement>();`\n\
  `private List<UpdateElement> update = new ArrayList<UpdateElement>();`\n\n`public\
  \ void` **`searchNewAndUpdatedModules`**`() {`\n`   for (UpdateUnitProvider provider\
  \ : UpdateUnitProviderFactory.`\n`           getDefault().getUpdateUnitProviders(false))\
  \ {`\n`      try {`\n`         provider.`**`refresh`**`(null, true);`\n`      }\
  \ catch (IOException ex) {`\n`         LOG.severe(ex.getMessage());`\n`      }`\n\
  `   }`\n`for (UpdateUnit unit :` **`UpdateManager`**`.getDefault().`**`getUpdateUnits`**`())\
  \ {`\n`      if (!unit.`**`getAvailableUpdates`**`().isEmpty()) {`\n`         if\
  \ (unit.`**`getInstalled`**`() == null) {`\n`            install.`**`add`**`(unit.getAvailableUpdates().get(0));`\n\
  `         } else {`\n`            update.`**`add`**`(unit.getAvailableUpdates().get(0));`\n\
  `         }`\n`      }`\n`   }`\n`}`\n\n在清单 25-1 所示的方法中，所有更新中心都由 `UpdateManager`\
  \ 查询。你也可以将搜索限制在单独的提供者上，以确保模块自动从专用更新中心安装，如清单 25-2 所示。你通过 `UpdateUnitProviderFactory`\
  \ 根据名称（根据层文件中的定义）确定所需的更新提供者。与之前的方法不同，你随后不是搜索更新管理器，而是直接在提供者上确定它。\n\n***清单 25-2.**\
  \ 在特殊更新中心中搜索模块*\n\n`private static final String` **`UC_NAME`** `= \"com_galileo_netbeans_module_update_center\"\
  ;`\n\n`public void` **`searchNewAndUpdatedModulesInDedicatedUC`**`() {`\n`   for\
  \ (UpdateUnitProvider provider : UpdateUnitProviderFactory.`\n`           getDefault().`**`getUpdateUnitProviders`**`(false))\
  \ {`\n`      try {`\n`         if (`**`provider.getName()`**`.equals(UC_NAME)) {`\n\
  `            provider.refresh(null, true);`\n`for (UpdateUnit u :` **`provider.getUpdateUnits()`**`)\
  \ {`\n`               if (!u.getAvailableUpdates().isEmpty()) {`\n`                  if\
  \ (u.getInstalled() == null) {`\n`                     install.add(u.getAvailableUpdates().get(0));`\n\
  `                  } else {`\n`                     update.add(u.getAvailableUpdates().get(0));`\n\
  `                  }`\n`               }`\n`            }`\n`         }`\n`      }\
  \ catch (IOException ex) {`\n`         LOG.severe(ex.getMessage());`\n`      }`\n\
  `   }`\n`}`\n\n#### 安装和重启更新\n\n对模块的操作通过 `OperationContainer` 执行。可以向此容器添加任意数量的 `UpdateElement`\
  \ 实例。请注意，每个操作容器负责一个特定的操作。这意味着在这种情况下需要两个不同的容器。它们通过相应的工厂方法 `OperationContainer.createForInstall()`\
  \ 和 `OperationContainer.createForUpdate()` 创建。添加元素不依赖于类型。因此，你为你的目的创建一个辅助方法。（参见清单\
  \ 25-3。）\n\n***清单 25-3.** 将更新元素添加到操作容器*\n\n`public OperationContainer<InstallSupport>`\
  \ **`addToContainer`**`(`\n`        OperationContainer<InstallSupport> c,`\n`        List<UpdateElement>\
  \ modules) {`\n`   for (UpdateElement e : modules) {`\n`      if (container.`**`canBeAdded`**`(e.getUpdateUnit\
  \ (), e)) {`\n**`OperationInfo`**`<InstallSupport> operationInfo = c.`**`add`**`(e);`\n\
  `         if (operationInfo != null) {`\n`            c.add(operationInfo.`**`getRequiredElements`**`());`\n\
  `         }`\n`      }`\n`   }`\n`   return container;`\n`}`\n\n清单 25-3 中显示的辅助方法首先检查模块是否与容器兼容。对于每个模块，这通过\
  \ `canBeAdded()` 方法进行检查。在这种情况下，你添加该模块；当该模块尚未在容器中找到时，会返回一个 `OperationInfo` 实例。此实例有助于通过\
  \ `getRequiredElements()` 方法添加当前模块所需的依赖项。在此示例中，可以跳过此调用，因为无论如何都会添加所有可用的模块。但是，使用 `getBrokenDependencies()`\
  \ 方法，你可以检查是否有依赖项无法满足。\n\n除了用元素填充容器之外，下载和安装模块的工作方式相同；一个辅助方法对此步骤很有用。一个 `OperationContainer`\
  \ 被传递给此方法。通过此操作容器，然后可以安装模块。之后，你通过 `InstallSupport` 实例的 `doDownload()`、`doValidate()`\
  \ 和 `doInstall()` 方法下载、检查并最终安装模块。如果 `doInstall()` 方法返回一个 `OperationSupport.Restarter`，则需要重新启动才能完成安装。但是，你此时不希望重新启动，而是将何时重新启动的决定权留给用户，因此使用\
  \ `doRestartLater()` 方法。（参见清单 25-4。）\n\n***清单 25-4.** 下载并安装模块，然后通知用户*\n\n`public\
  \ void` **`installModules`**`(OperationContainer<InstallSupport> container) {`\n\
  `   try {`\n`      InstallSupport support = container.getSupport();`\n\n`      if\
  \ (support != null) {`\n`         Validator vali = support.`**`doDownload`** `(null,\
  \ true);`\n`         Installer inst = support.`**`doValidate`**`(vali, null);`\n\
  **`Restarter`** `restarter = support.`**`doInstall`**`(inst, null);`\n\n`         if\
  \ (restarter != null) {`\n`            support.`**`doRestartLater`**`(restarter);`\n\
  `            if (!isRestartRequested) {`\n**`NotificationDisplayer`**`.getDefault().notify(`\n\
  `                  \"应用程序已更新\",`\n`                  ImageUtilities.loadImageIcon(\"\
  com/galileo/netbeans/module/rs.png\", false),`\n`                  \"点击此处重新启动\"\
  ,`\n`new` **`RestartAction`**`(support, restarter));`\n`               isRestartRequested\
  \ = true;`\n`            }`\n`         }`\n`      }`\n`   } catch (OperationException\
  \ ex) {`\n`      LOG.severe(ex.getMessage());`\n`   }`\n`}`\n\n\n\n用户仍需被告知需要重启应用程序；为此，集成在\
  \ NetBeans 平台状态栏中的通知显示器可以很好地完成此任务。提示会以气泡形式显示给用户。这样做的一个实际好处是，你可以添加一个显示为链接的操作。这样用户就可以直接重启。你需要\
  \ `InstallSupport` 和 `Restarter` 实例来执行重启。将两者都提供给 `RestartAction`，然后由它执行重启（如清单 25-5\
  \ 所示）。\n\n***清单 25-5.** 执行重启的操作类*\n\n`private static final class` **`RestartAction`**\
  \ `implements ActionListener {`\n`private` **`InstallSupport`** `support;`\n`private`\
  \ **`OperationSupport.Restarter`** `restarter;`\n\n`   public RestartAction(`\n\
  `           InstallSupport support,`\n`           OperationSupport.Restarter restarter)\
  \ {`\n`      this.support = support;`\n`      this.restarter = restarter;`\n`   }`\n\
  \n`   @Override`\n`public void` **`actionPerformed`**`(ActionEvent e) {`\n`      try\
  \ {`\n`         support.`**`doRestart`**`(restarter, null);`\n`      } catch (OperationException\
  \ ex) {`\n`         LOG.severe(ex.getMessage());`\n`      }`\n`   }`\n`}`\n\n####\
  \ 自动启动安装\n\n最后，你必须在后台启动流程的自动执行。一种方法是在启动应用程序时安装更新。你可以通过一个预热任务以简单的方式完成此操作。这看起来就像那些整体实现的方法，如清单\
  \ 25-6 所示。\n\n***清单 25-6.** 通过预热任务执行自动更新安装*\n\n`import org.netbeans.api.autoupdate.InstallSupport;`\n\
