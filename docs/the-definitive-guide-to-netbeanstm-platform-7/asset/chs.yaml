  `return` **`album`**`;`\n`      } else {`\n`         return null;`\n`      }`\n\
  `   }`\n`}`\n\n至此，您已经创建了访问数据库以及管理和表示数据所需的所有类。这就是 Java DB 示例应用程序的结尾。\n\n### 总结\n\n\
  数据库通常位于服务器上。然而，Java DB 提供了一种客户端数据库解决方案。在本章中，我们探讨了如何将这样的数据库集成到您的 NetBeans Platform\
  \ 应用程序中。\n\n## 第 27 章\n\n## Hibernate\n\n在第 26 章中，您学习了如何在富客户端应用程序中使用客户端数据库解决方案 Java\
  \ DB。您必须分解文件以将其保存到关系数据库系统中，并且还必须通过 JDBC 接口以传统方式通过 SQL 提取数据库中的数据。然后，您必须组装您的对象——在本例中是\
  \ `Album` 和 `Genre`。您将此功能封装在 `DataModel` 类中——您可能已经注意到，这可能会变得相当复杂且容易出错。这也是数据库创建者投入如此多精力来开发和标准化面向对象数据库的原因之一，尽管它们目前还无法与关系型系统相抗衡并得到广泛应用。这主要是因为\
  \ RDBMS 的广泛使用：新的应用程序必须访问以关系形式保存的数据。\n\n因此，所谓的对象关系桥接技术应运而生；它们负责将对象数据保存到关系数据库以及从关系数据库加载对象数据，从而为底层数据库系统形成一个抽象层。此类桥接技术中最流行且使用最广泛的实现可能是\
  \ Hibernate。Hibernate 负责将对象数据映射到关系上，这种映射应尽可能透明。理想情况下，这意味着您无需担心数据的存储位置和方式。\n\n本章将展示如何将\
  \ Hibernate 有效地集成到基于 NetBeans Platform 的富客户端应用程序中。不过，这里仅介绍使用 Hibernate 的基本概念；本章不会讨论\
  \ Hibernate 广泛功能的所有细节。\n\n\n\n### 集成 Hibernate 库\n\n首先，你需要从 [`http://hibernate.org.`](http://hibernate.org.)\
  \ 下载当前版本的 *Hibernate* 发行版（此处为 3.6.1 版本）。该发行版除了包含 Hibernate 库本身之外，还附带了所有必要的第三方库、示例和全面的文档。你需要像处理\
  \ Java DB 一样，将这些库封装成一个独立的模块；这将为应用程序提供 Hibernate 功能。为此，请调用 *文件 ![Image](img/U001.jpg)\
  \ 新建项目...*，然后选择 *NetBeans 模块 ![Image](img/U001.jpg) 库包装器模块*。将以下库添加到发行版中：\n\n*  \
  \ hibernate3.jar\n*   lib/jpa/hibernate-jpa-2.0-api-1.0.0.Final.jar\n*   lib/required/antlr-2.7.6.jar\n\
  *   lib/required/commons-collections-3.1.jar\n*   lib/required/dom4j-1.6.1.jar\n\
  *   lib/required/javassist-3.12.0.GA.jar\n*   lib/required/jta-1.1.jar\n*   lib/required/slf4j-api-1.6.1.jar\n\
  \nHibernate 使用 Java 简单日志门面（SLF4J）API 来生成日志输出。顾名思义，该 API 为不同的日志框架（包括 Log4J 或 Java\
  \ 平台日志框架）提供了一个门面。对于门面而言，并不“强制”要求某个框架必须存在；然而，提供一个这样的框架确实很有意义，尤其是在应用程序开发过程中，因为 Hibernate\
  \ 会输出大量有用的报告。SLF4J 也提供了自己的简单日志实现。该实现是 SLF4J 包的一部分，你可以从 [`http://slf4j.org`](http://slf4j.org)\
  \ 下载。因此，现在也将这个 JAR 文件添加到 Hibernate 模块中：\n\n`slf4j-simple-1.6.1.jar`\n\n如果在 NetBeans\
  \ 平台中使用库时出现问题，很可能是类加载器问题。Hibernate 本身使用系统类加载器，因此可以在没有显式定义依赖关系的情况下访问实体。Javassist\
  \ 库的代理工厂——负责在运行时为对象生成代理（延迟加载所需）——使用了不同的类加载器，因此无法找到 Hibernate 库中的类或应用程序模块中的类。有利的是，你可以通过\
  \ `ProxyFactory.ClassLoaderProvider` 接口向 `javassist.util.proxy.ProxyFactory` 类提供你自己的类加载器提供程序实现，并为\
  \ Hibernate 模块创建一个模块安装程序。使用 `restored()` 方法在启动时为 `ProxyFactory` 的应用程序提供系统类加载器（参见清单\
  \ 27-1）。\n\n***清单 27-1.** 提供类加载器提供程序实现*\n\n`import javassist.util.proxy.ProxyFactory;`\n\
  `import org.openide.modules.ModuleInstall;`\n\n`public class Installer extends ModuleInstall\
  \ {`\n`   @Override`\n`   public void restored() {`\n`ProxyFactory.classLoaderProvider\
  \ = new` **`ProxyFactory.ClassLoaderProvider`**`() {`\n`        @Override`\n`        public\
  \ ClassLoader get(ProxyFactory pf) {`\n`return` **`Thread.currentThread().getContextClassLoader`**`();`\n\
  `        }`\n`     };`\n`   }`\n`}`\n\n通常，当前线程的上下文类加载器就是系统类加载器（如果没有使用其他类加载器）。通过\
  \ `get()` 方法将其传递给 `ProxyFactory` 对象。\n\n### 示例应用程序的结构\n\n现在，我将向你展示如何将 Hibernate\
  \ 与第 26 章中的专辑示例结合使用，以便你能够体会到对象关系桥接的优势。此外，你现在还可以再次使用已经集成的数据库系统 Java DB。将包含 Hibernate\
  \ 库的库包装器模块添加到已创建的 Platform 应用程序中。每个想要使用 Hibernate 功能的模块都可以定义对该应用程序的依赖关系。在此示例中，只有应用程序模块（*我的模块*）需要这样做。通过上下文菜单打开*属性*窗口，并在*库*下添加*Hibernate*模块。你需要以相同的方式向*Hibernate*模块添加对*Java\
  \ DB*模块的依赖关系，以便 Hibernate 能够访问 Java DB 数据库驱动程序。\n\n到目前为止，你已经在应用程序模块中管理了实体类 `genre`\
  \ 和 `album`。由于 Hibernate 需要访问这些类，你应该定义另一个从 Hibernate 到应用程序模块的依赖关系。这将导致循环依赖；NetBeans\
  \ 平台的模块系统会迅速报告错误，应用程序甚至无法启动。这就是为什么你要将实体类外包到一个单独的模块中，从而解决循环依赖问题。这种包含额外模块的配置在图 27-1\
  \ 中以图形方式进行了说明。\n\n![Image](img/2701.jpg)\n\n***图 27-1.** 应用程序组件及其依赖关系*\n\n![Image](img/square.jpg)\
  \ **提示** 在开发应用程序时，不建议使用 Java DB 的嵌入式版本（在本例中为 *Java DB Embedded* 模块）；相反，应使用已集成在 NetBeans\
  \ IDE 中的服务器变体。按照第 27 章所述，将 Java DB 驱动程序作为模块集成到你的应用程序中，在 *hibernate.cfg.xml* 文件中将其调整为连接\
  \ URL，然后在 NetBeans IDE 中通过服务窗口中 *数据库 ![Image](img/U001.jpg) Java DB* 节点的上下文菜单中的*启动服务器*来启动数据库服务器。这样，你就可以查看\
  \ Hibernate 生成的数据库模式了。\n\n### 配置 Hibernate\n\n集成 Hibernate 后，你现在需要提供一些配置信息。你可以通过一个默认名为\
  \ *hibernate.cfg.xml* 的 XML 文件来定义这些信息。你绝对需要指定数据库驱动程序、连接数据库的 URL、必要的身份验证数据以及应使用的\
  \ SQL 方言。该配置文件的内容如以下清单 27-2 所示。\n\n***清单 27-2.** Hibernate 配置文件*\n\n`<?xml version=\"\
  1.0\" encoding=\"utf-8\"?>`\n`<!DOCTYPE hibernate-configuration PUBLIC`\n`   \"\
  -//Hibernate/Hibernate Configuration DTD 3.0//EN\"`\n`   \"http://hibernate.sourceforge.net/hibernate-configuration-3.0.dtd\"\
  >`\n`<`**`hibernate-configuration`**`>`\n`   <session-factory>`\n`      <property\
  \ name=\"connection.driver_class\">`**`org.apache.derby.jdbc.EmbeddedDriver`**`</property>`\n\
  `      <property name=\"connection.url\">`**`jdbc:derby:hibernate-db;create=true`**`</property>`\n\
  `      <property name=\"connection.username\">`**`user`**`</property>`\n`      <property\
  \ name=\"connection.password\">`**`password`**`</property>`\n`      <property name=\"\
  dialect\">`**`org.hibernate.dialect.DerbyDialect`**`</property>`\n`   </session-factory>`\n\
  `</`**`hibernate-configuration`**`>`\n\n首先，你定义了数据库类，在本例中，对于 Java DB 数据库系统，它是 `org.apache.derby.jdbc.EmbeddedDriver`。添加\
  \ URL 以便 Hibernate 能够建立与数据库的连接；你已经知道这是为 Java DB 组合而成的。除了最终可能需要的用户名和密码之外，你还必须定义 SQL\
  \ 方言。Hibernate 在 `org.hibernate.dialect` 包中为所有主流数据库系统提供了相应的类。你可以从 Hibernate 参考文档中找到有关其他配置选项的更多信息。\n\
  \n所有这些都引出了一个问题：这个文件应该放在哪里。由于数据位于单独的文件中，你可以选择使用多个具有不同配置的 Hibernate 模块。然后，你可以将该文件保存在应用程序模块的\
  \ *src* 目录中，或者直接保存在 Hibernate 模块中。重要的是它必须位于相关的类路径上，因为这是搜索它的位置。或者，正如你稍后将看到的，在创建 `Configuration`\
  \ 对象时，你可以为配置文件定义替代的 URL。\n\n\n\n#### 关系上的对象映射\n\n现在 Hibernate 已经准备就绪，问题在于 Hibernate\
  \ 如何将你的对象保存到数据库中。引用对象结构是如何映射到关系上的？你需要为每个对象创建一个所谓的*映射文件*，该文件精确地保存了这种映射信息。这其中包括对象属性在关系中以何种名称和类型保存的信息，但更重要的是，如何处理不同对象之间的关联。根据对象结构的复杂性和应用程序的目的，可能需要大量详细信息。在此背景下无法深入细节，因此将应用限制在示例类所需的映射信息上。\n\
  \n首先，让我们为示例类 `Genre` 查看这样一个映射。你记得，在其中你管理了一个作为唯一 ID 的数字和一个用于流派名称本身的字符串。（参见清单 27-3。）\n\
  \n***清单 27-3.** 类 Genre 的对象关系映射：Genre.hbm.xml*\n\n`<!DOCTYPE hibernate-mapping PUBLIC`\n\
  `   \"-//Hibernate/Hibernate Mapping DTD 3.0//EN\"`\n`   \"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\"\
  >`\n`<`**`hibernate-mapping`** `package=\"`**`com.galileo.netbeans.myentities`**`\"\
  >`\n`   <`**`class`** `name=\"`**`Genre`**`\" table=\"`**`Genre`**`\" lazy=\"true\"\
  >`\n`      <`**`id`** `name=\"`**`id`**`\">`\n`         <`**`generator`** `class=\"\
  increment\"/>`\n`      </`**`id`**`>`\n`      <`**`property`** `name=\"`**`genre`**`\"\
  `\n`                not-null=\"true\"`\n`                length=\"30\"`\n`                column=\"\
  genre\"/>`\n`   </class>`\n`</`**`hibernate-mapping`**`>`\n\n通过 `class` 元素，你定义了类名以及保存\
  \ `Genre` 类型对象文件的表名。使用 `id` 元素，你将同名的对象属性定义为表的主键，该主键将按升序分配。最后，你只需要使用 `property` 元素定义第二个也是最后一个属性\
  \ `genre`。如果你查看类 `Album` 的映射片段，事情会变得更有趣一些，因为一个流派可以分配给一个专辑；然而，同一流派可以有多个专辑。因此，你有一个\
  \ `many-to-one`（多对一）关系。你使用同名的元素来定义它，并将其 `lazy` 属性设置为 `false`，如清单 27-4 所示。这样，`Genre`\
  \ 对象会与 `Album` 一起加载，而不是仅在需要时才加载。通过设置 `fetch=\"join\"`，你指示 Hibernate 在查询专辑数据时通过 JOIN\
  \ 查询同时获取流派。这是一种查询优化：只需一次查询而不是两次，即可将类完全从数据库中加载出来。\n\n***清单 27-4.** 使用多对一在 Genre 上定义关联*\n\
  \n`<!DOCTYPE hibernate-mapping PUBLIC`\n`   \"-//Hibernate/Hibernate Mapping DTD\
  \ 3.0//EN\"`\n`   \"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\"\
  >`\n`<`**`hibernate-mapping`** `package=\"`**`com.galileo.netbeans.myentities`**`\"\
  >`\n`   <`**`class`** `name=\"`**`Album`**`\" table=\"`**`Album`**`\" lazy=\"true\"\
  >`\n`      <`**`id`** `name=\"id\">`\n`         <`**`generator`** `class=\"increment\"\
  />`\n`      </`**`id`**`>`\n`      <`**`many-to-one`** `name=\"`**`genre`**`\" lazy=\"\
  `**`false`**`\" fetch=\"`**`join`**`\"/>`\n`      <`**`property`** `name=\"title\"\
  `\n`                not-null=\"true\"`\n`                length=\"30\"`\n`                column=\"\
  title\"/>`\n\n现在，你需要让 Hibernate 知道这些通常以 *hbm.xml* 结尾且与类位于同一包中的映射。这可以通过在配置文件 *hibernate.cfg.xml*\
  \ 中添加一个条目来完成，你之前已经在该文件中进行了数据库设置。你通过 `mapping` 元素列出所有文件。此外，你定义了值为 `update` 的特性 `hbm2ddl`。因此，如果数据库模式尚不存在，Hibernate\
  \ 会在应用程序启动时根据映射文件中的信息自动为我们创建它，如清单 27-5 所示。\n\n***清单 27-5.** 在配置文件中公开映射文件*\n\n`<hibernate-configuration>`\n\
  `   <session-factory>`\n`      ...`\n`      <property name=\"`**`hbm2ddl.auto`**`\"\
  >`**`update`**`</property>`\n`      <`**`mapping`** `resource=\"com/galileo/netbeans/myentities/`**`Genre.hbm.xml`**`\"\
  />`\n`      <`**`mapping`** `resource=\"com/galileo/netbeans/myentities/`**`Album.hbm.xml`**`\"\
  />`\n`   </session-factory>`\n`</hibernate-configuration>`\n\n#### SessionFactory\
  \ 和会话\n\n现在配置工作已完成，你可以首次接触 Hibernate 了。为此，首先创建一个 `Configuration` 类的对象，该类管理你之前在 *hibernate.cfg.xml*\
  \ 文件中创建的配置。默认情况下，此类希望从 *hibernate.properties* 文件中获取其信息。但是，你将信息组织在 XML 文档中，因此你需要指示\
  \ `Configuration` 实例使用 `configure()` 方法搜索此文件。此方法也有几个参数化的变体，你可以向其传递一个 `File` 或 `URL`\
  \ 形式的配置文件。我们使用无参数版本，它直接在类路径上查找名为 *hibernate.cfg.xml* 的配置。通常，这样的 `Configuration`\
  \ 只创建一次。基于此配置，我们使用 `buildSessionFactory()` 方法创建一个 `SessionFactory`。`SessionFactory`\
  \ 也会在应用程序的整个运行期间保持。\n\n换句话说，你在模块的中心位置管理 `Configuration` 和 `SessionFactory` 实例。模块安装程序类很适合这个目的；你可以在其中创建一个\
  \ `SessionFactory` 的静态实例（参见清单 27-6）。\n\n***清单 27-6.** 集中管理并提供 SessionFactory*\n\n\
  `import org.hibernate.`**`Session`**`;`\n`import org.hibernate.`**`SessionFactory`**`;`\n\
  `import org.hibernate.cfg.`**`Configuration`**`;`\n`import org.openide.modules.ModuleInstall;`\n\
  \n`public class` **`Installer`** `extends ModuleInstall {`\n`private static final`\
  \ **`SessionFactory`** `sessionFactory;`\n`   static {`\n`      try {`\n`sessionFactory\
  \ = new` **`Configuration`**`().`**`configure`**`().`**`buildSessionFactory`**`();`\n\
  `      } catch (Throwable ex) {`\n`         throw new ExceptionInInitializerError(ex);`\n\
  `      }`\n`   }`\n`public static Session` **`createSession`**`() {`\n`      return\
  \ sessionFactory.`**`openSession`**`();`\n`   }`\n`public static Session` **`currentSession`**`()\
  \ {`\n`      return sessionFactory.`**`getCurrentSession`**`();`\n`   }`\n`   @Override`\n\
  `public void` **`close`**`() {`\n`      sessionFactory.`**`close`**`();`\n`   }`\n\
  `}`\n\n通过会话访问数据库。`Session` 是一个生命周期相对较短的对象，负责应用程序和数据库之间的交互。因此，`Session` 背后隐藏着一个 JDBC\
  \ 连接。会话还负责创建事务并包含一个缓存。你使用 `openSession()` 方法创建每个新的 `Session`。使用 `getCurrentSession()`\
  \ 方法可以获取一个更当前的会话。如果没有，则会创建一个新的会话并将其绑定到当前线程。如果由该 `Session` 创建的事务完成（通过 `commit()`\
  \ 或 `rollback()`），它会自动关闭。这种使用会话的方式最简单、最方便，因此是首选。\n\n\n\n#### 保存与加载对象\n\n通过 `Installer`\
  \ 类，你创建了一个用于轻松保存和加载对象的辅助工具。你想直接使用它。还记得我们创建的 `DataModel` 类吗？这个类负责与数据库交互，因此它是 SQL\
  \ 与对象之间的映射器。现在 Hibernate 为我们完成了所有这些任务。然而，你仍然想使用这个类，因为这样你就不必修改应用程序的其余部分，同时还能封装 Hibernate\
  \ 的交互。这可能是本章最有趣的部分，因为这里实现了最大的简化（参见清单 27-7）。\n\n***清单 27-7.** DataModel 类通过 Hibernate\
  \ 与数据库交互*\n\n`import com.galileo.netbeans.myentities.Genre;`\n`import com.galileo.netbeans.myentities.Album;`\n\
  `import java.util.List;`\n`import org.hibernate.`**`Session`**`;`\n`import org.hibernate.`**`Transaction`**`;`\n\
  \n`public class` **`DataModel`** `{`\n`public static List<Album>` **`getAlbums`**`()\
  \ {`\n**`  Session`** `s = Installer.`**`currentSession`**`();`\n`      Transaction\
  \ t = s.`**`beginTransaction`**`();`\n`      List<Album> list = (List<Album>)s.`**`createCriteria`**`(`**`Album.class`**`).list();`\n\
  `      t.`**`commit`**`();`\n`      return list;`\n`   }`\n`public static List<Genre>`\
  \ **`getGenres`**`() {`\n**`  Session`** `s = Installer.`**`currentSession`**`();`\n\
  `      Transaction t = s.`**`beginTransaction`**`();`\n`      List<Genre> list =\
  \ (List<Genre>)s.`**`createCriteria`**`(`**`Genre.class`**`).list();`\n`      t.`**`commit`**`();`\n\
  `      return list;`\n`   }`\n`public static void` **`updateAlbum`**`(Album album)\
  \ {`\n**`  Session`** `s = Installer.`**`currentSession`**`();`\n`      Transaction\
  \ t = s.`**`beginTransaction`**`();`\n`      s.`**`update`**`(album);`\n`      t.`**`commit`**`();`\n\
  `   }`\n`public static void` **`insertAlbum`**`(Album album) {`\n**`  Session`**\
  \ `s = Installer.`**`currentSession`**`();`\n`      Transaction t = s.`**`beginTransaction`**`();`\n\
  `      s.`**`save`**`(album);`\n`      t.`**`commit`**`();`\n`   }`\n`public static\
  \ void` **`deleteAlbum`**`(Album album) {`\n`      Session s = Installer.`**`currentSession`**`();`\n\
  `      Transaction t = s.`**`beginTransaction`**`();`\n`      s.`**`delete`**`(album);`\n\
  `      t.`**`commit`**`();`\n`   }`\n`}`\n\n对于每个操作，我们都使用一个当前（或可能新建的）`Session`，并用它创建一个事务。然后你可以在\
  \ `Session` 上保存、更新和执行所需操作，并通过 `commit()` 成功关闭事务。如前所述，无需显式关闭 `Session`，因为它会在事务结束时自动关闭。\n\
  \n这个示例自然处理的是非常简单的应用场景。因此，在会话期间，每个操作都有一个生命周期相同的事务。（你可以从 Hibernate 文档中获取关于应使用的会话和事务粒度的信息。）至此，你已经完全迁移了我们的示例，该示例最初通过\
  \ JDBC 接口使用 SQL 在应用程序和数据库之间进行“粗略草稿”式的数据传输。因此，应用程序完全抽象于底层持久化系统运行，你可以方便且透明地保存和查询对象。\n\
  \n### 小结\n\nHibernate 是一个对象关系桥接器。它允许你在应用程序和数据库之间创建一个透明的接口。在本章中，你学习了如何在 NetBeans\
  \ Platform 应用程序中集成 Hibernate。你了解了如何配置 Hibernate，以及对象与关系之间的映射是如何完成的。本章还涉及了会话和会话工厂，以及对象的保存与加载。\n\
  \n## 第 28 章\n\n## Java 持久化 API\n\nJava 持久化 API（JPA）的目标是定义一个标准化、易于使用的持久化模型，该模型可用于\
  \ Java SE 和 Java EE。其最佳特性和思想主要来源于 Hibernate、TopLink 和 JDO。因此，使用 JPA 接口的应用程序完全独立于像\
  \ Hibernate 这样的特定框架。其应用程序保持了与之前使用 Java 数据库连接（JDBC）接口时相同的独立性。\n\nJPA 的主要特点是其轻量性和简洁性。JPA\
  \ 的主要特性之一是通过 Java 注解直接在持久化对象中指定对象关系映射。不再需要像第 27 章中 Hibernate 使用的单独映射文件（需要说明的是，不需要对对象结构进行显式的关系映射）。不过，可以通过注解来影响标准映射策略。这使得实体的规范变得更加容易。此外，JPA\
  \ 还规定了与 SQL 相关的查询语言 *Java 持久化查询语言*（JPQL），用于静态和动态查询，这使其独立于像 HQL 这样的专有查询语言。持久化层可以分为三个领域：`javax.persistence`\
  \ 包中的 API 本身、查询语言 JPQL 以及用于定义映射信息的注解。\n\n与此同时，一系列项目和框架提供了 JPA 实现，其中包括 Hibernate、EclipseLink\
  \ 和 OpenJPA。我们现在来看一下 JPA 接口，因为你已经了解了 Hibernate 的原生接口。顺便提一下，Hibernate 的 JPA 接口与原生接口看起来并没有太大不同。你会清楚地看到，在制定\
  \ JPA 规范时，Hibernate 是一个模型。\n\n### Hibernate 与 Java 持久化 API\n\n从 Hibernate 3.5 开始，Hibernate\
  \ 对 JPA 的实现是一个内置功能，位于 *hibernate3.jar* 中。与所使用的库和 JPA 本身一起，你可以创建一个名为 Hibernate 的模块，具体操作如第\
  \ 27 章所述。请注意关于类加载器和日志记录的提示。\n\n\n\n### Java 持久化配置\n\n持久化层的配置方式与原生 Hibernate 接口非常相似（参见清单\
  \ 28-1）。配置信息位于 *META-INF* 目录下的 *persistence.xml* 文件中。这些文件被打包在 *持久化单元* 中。\n\n***清单\
  \ 28-1.** 持久化层配置：META INF/persistence.xml*\n\n`<`**`persistence`**\n\n`   version=\"\
  1.0\">`\n`   <`**`persistence-unit`** `name=\"`**`HibernateJPA`**`\" transaction-type=\"\
  RESOURCE_LOCAL\">`\n`      <provider>org.hibernate.ejb.HibernatePersistence</provider>`\n\
  `      <class>`**`com.galileo.netbeans.myentities.Genre`**`</class>`\n`      <class>`**`com.galileo.netbeans.myentities.Album`**`</class>`\n\
  `      <`**`properties`**`>`\n`         <property name=\"`**`hibernate.connection.driver_class`**`\"\
  `\n`            value=\"org.apache.derby.jdbc.EmbeddedDriver\"/>`\n`         <property\
  \ name=\"`**`hibernate.connection.url`**`\"`\n`            value=\"jdbc:derby:hibernatejpa-db;create=true\"\
  />`\n`         <property name=\"`**`hibernate.connection.username`**`\"`\n`            value=\"\
  user\"/>`\n`         <property name=\"`**`hibernate.connection.password`**`\"`\n\
  `            value=\"password\"/>`\n`         <property name=\"`**`hibernate.dialect`**`\"\
  `\n`            value=\"org.hibernate.dialect.DerbyDialect\"/>`\n`         <property\
  \ name=\"`**`hibernate.hbm2ddl.auto`**`\"`\n`            value=\"update\"/>`\n`      </`**`properties`**`>`\n\
  `   </`**`persistence-unit`**`>`\n`</`**`persistence`**`>`\n\n我们打开一个名为 `HibernateJPA`\
  \ 的 `persistence-unit`，稍后你将用它来生成 `EntityManagerFactory`。在此单元中，你需要列出所有应由该工厂的 `EntityManager`\
  \ 管理的类。你必须再次定义与 *hibernate.cfg.xml* 中相同的特性，只不过这些特性需要加上前缀 `hibernate`。你将创建的 *persistence.xml*\
  \ 文件放置在 *My Entities* 模块的 *src/META-INF* 目录下。\n\n在 JPA 中实现实体的优势在于，由于属性访问器方法（并非针对每个属性），对于需要保持持久化的属性，必须提供访问方法（即\
  \ get 和 set 方法），或者将属性设为公开，因为 JPA 也可以读写私有属性。此外，无需实现特定的接口或继承自某个给定的类。由 JPA 进行持久化管理的实体就是普通的\
  \ Java 对象。类中只需要少量注解即可。这些注解主要包括：使用 `@Entity` 注解将类标识为实体，使用 `@Id` 定义标识符，以及声明属性。因此，类的表达能力不会受到任何限制。默认情况下，JPA\
  \ 会像在关系中一样管理对象层次结构。可以通过注解调整这种映射策略，例如，使新实现的对象适应现有的数据库模式。（参见清单 28-2。）\n\n考虑到实体的定义，让我们再次审视\
  \ `Genre` 和 `Album` 这两个类。你只需要在类定义前插入 `@Entity` 注解。此外，通过 `@Id` 注解将类属性 `id` 设置为类的标识符。同时，指示持久化层（此处为\
  \ Hibernate）为此属性生成一个值。属性 `genre` 是一个普通属性，因此无需单独标记。只要它未被标记为 `transient`，就会被自动包含在内。可选地，可以使用\
  \ `@Basic` 注解标记普通属性。请记住，为你的属性提供 get 和 set 方法并非强制要求。例如，在 `Genre` 类中，如果你不需要 `getId()`\
  \ 和 `setId()` 方法，可以省略它们。\n\n***清单 28-2.** 只需少量注解，即可将你的类定义为可在关系数据库系统中保存的实体。之前的映射文件可以完全弃用。*\n\
  \n`import javax.persistence.`**`Entity`**`;`\n`import javax.persistence.`**`GeneratedValue`**`;`\n\
  `import javax.persistence.`**`Id`**`;`\n**`@Entity`**\n`public class` **`Genre`**\
  \ `{`\n**`@Id`**\n**`@GeneratedValue`**\n`   private Integer id;`\n`   private String\
  \ genre;`\n`   public Genre() {`\n`   }`\n`   ...`\n`}`\n\n在 `Album` 类中还需要做一件事。你需要为属性\
  \ `year` 显式定义一个列名，因为默认情况下列名与属性名相同。然而，对于 `year` 来说，这会在首次查询时导致错误，因为 `year` 是 SQL 的一部分。因此，你需要使用\
  \ `@Column` 注解定义一个用户指定的名称。最后，你只需将 `Genre` 类的关联定义为 `@ManyToOne`，你的两个实体就准备好了。（参见清单\
  \ 28-3。）\n\n***清单 28-3.** 实体 Albums 的定义，包含对 Genre 类的关联*\n\n`import javax.persistence.`**`Column`**`;`\n\
  `import javax.persistence.`**`Entity`**`;`\n`import javax.persistence.`**`GeneratedValue`**`;`\n\
  `import javax.persistence.`**`Id`**`;`\n`import javax.persistence.`**`ManyToOne`**`;`\n\
  \n**`@Entity`**\n`public class` **`Album`** `{`\n\n**`@Id`**\n**`@GeneratedValue`**\n\
  `   private Integer id;`\n`   private String title;`\n`   private String tracks;`\n\
  `   private String cds;`\n**`   @Column(name = \"years\")`**\n`   private String\
  \ year;`\n**`   @ManyToOne`**\n`   private Genre genre;`\n\n`   public Album() {`\n\
  `   }`\n`   ...`\n`}`\n\n为了让你的实体能够访问这些注解，你需要为 *My Entities* 模块添加对 *Hibernate* 模块的依赖。Hibernate\
  \ 的 `EntityManager` 使用系统类加载器，因此你无需为你的实体添加对 Hibernate 模块的依赖，否则会导致循环依赖。如果出现那种情况，你就必须将注解打包到一个单独的模块中，从而导致更复杂的配置结构。按照当前方式，你最终会得到如图\
  \ 28-1 所示的布局和依赖关系。\n\n![Image](img/2801.jpg)\n\n***图 28-1.** 使用 Hibernate 的 JPA\
  \ 接口时各模块之间的依赖关系*\n\n\n\n### EntityManagerFactory 与 EntityManager\n\n与原生 Hibernate\
  \ 接口中的 `SessionFactory` 类似，Java Persistence API 提供了 `EntityManagerFactory`。该工厂为特定的持久化单元创建。因此，由该工厂生成的\
  \ `EntityManager` 能够保存和管理在相应持久化单元所定义的数据库中的对象。通常，`EntityManagerFactory` 只创建一次，并在整个应用程序运行期间保持，就像\
  \ `SessionFactory` 一样。你可以通过调用引导类 `Persistence` 的以下方法来获取此类工厂的实例：\n\n**`EntityManagerFactory`**\
  \ `emf = Persistence.`**`createEntityManagerFactory`**`(\"HibernateJPA\");`\n\n\
  传递的参数 `HibernateJPA` 定义了文件 *persistence.xml* 中定义的一个持久化单元的名称。该工厂是为该持久化单元创建的。\n\n\
  会话（在某种程度上代表 JDBC 链接的封装）的等价物在 JPA 中由 `EntityManager` 类提供。通过此管理器，你可以访问数据库，并在其中保存、删除、查找和查询对象。通常，一个\
  \ `EntityManager` 用于某个特定流程。然而，如果为每个查询或操作都创建一个新的 `EntityManager`，则是一种不良实践。因此，根据应用程序上下文选择合适的\
  \ `EntityManager` 运行时非常重要。由于本例中只有少量简单的数据库操作，为简单起见，我们只在整个运行时使用一个 `EntityManager`。在实践中，为每个操作都使用一个\
  \ `EntityManager` 是没有意义的。\n\n与 `SessionFactory` 一样，将 `EntityManagerFactory` 管理在一个模块安装程序类中是合理的（参见清单\
  \ 28-4）。这样，你也可以轻松且正确地完成工厂关闭应用程序的操作。\n\n***清单 28-4.** Entity Manager Factory 的集中管理与提供*\n\
  \n`import javax.persistence.`**`EntityManager`**`;`\n`import javax.persistence.`**`EntityManagerFactory`**`;`\n\
  `import javax.persistence.`**`Persistence`**`;`\n`public class` **`Installer`**\
  \ `extends ModuleInstall {`\n`public static final` **`EntityManagerFactory`** `EMF;`\n\
  `public static final` **`EntityManager`**`        EM;`\n`   static {       try {`\n\
  `         EMF = Persistence.`**`createEntityManagerFactory`**`(\"`**`HibernateJPA`**`\"\
  );`\n`         EM = EMF.`**`createEntityManager`**`();`\n`      } catch (Throwable\
  \ ex) {`\n`         throw new ExceptionInInitializerError(ex);`\n`      }`\n`   }`\n\
  `   @Override`\n`public void` **`close`**`() {`\n`      EM.`**`close`**`();`\n`      EMF.`**`close`**`();`\n\
  `   }`\n`}`\n\n### 保存与加载对象\n\n最后，还需要澄清如何通过 `EntityManager` 访问你的对象。再次以 `DataModel`\
  \ 类为例，你在其中实现了与原生 Hibernate 接口的交互。现在你想用 JPA 替换它。让我们看看 `getAlbums()` 和 `getGenres()`\
  \ 方法。像往常一样，你首先创建一个事务，在其中执行查询或操作。通过 `getTransaction()` 方法，你可以从 `EntityManager` 获取一个\
  \ `EntityTransaction` 实例。使用 `begin()` 启动事务，然后为 *JPQL* 查询 `SELECT a FROM Album a`\
  \ 创建一个 `Query` 实例。此查询提供 `Album` 表中的所有对象。你可以通过 `getResultList()` 方法以 `List` 形式获取此结果。使用\
  \ `commit()` 成功完成事务。（参见清单 28-5。）\n\n***清单 28-5.** 使用 EntityManager 与数据库交互*\n\n`import\
  \ javax.persistence.`**`Query`**`;`\n\n`public class` **`DataModel`** `{`\n\n`public\
  \ static List<Album>` **`getAlbums`**`() {`\n`     Installer.EM.`**`getTransaction`**`().`**`begin`**`();`\n\
  `     Query q = Installer.EM.`**`createQuery`**`(\"SELECT a FROM Album a\");`\n\
  `     List<Album> list = q.`**`getResultList`**`();`\n`     Installer.EM.`**`getTransaction`**`().`**`commit`**`();`\n\
  `     return list;`\n`   }`\n\n`public static List<Genre>` **`getGenres`**`() {`\n\
  `     Installer.EM.`**`getTransaction`**`().`**`begin`**`();`\n`     Query q = Installer.EM.`**`createQuery`**`(\"\
  SELECT g FROM Genre g\");`\n`     List<Genre> list = q.`**`getResultList`**`();`\n\
  `     Installer.EM.`**`getTransaction`**`().`**`commit`**`();`\n`     return list;`\n\
  `   }`\n\n`public static void` **`updateAlbum`**`(Album album) {`\n`      Installer.EM.`**`getTransaction`**`().`**`begin`**`();`\n\
  `      Installer.EM.`**`persist`**`(album);`\n`      Installer.EM.`**`getTransaction`**`().`**`commit`**`();`\n\
  `   }`\n\n`public static void` **`insertAlbum`**`(Album album) {`\n`      updateAlbum(album);`\n\
  `   }`\n\n`public static void` **`deleteAlbum`**`(Album album) {`\n`      Installer.EM.`**`getTransaction`**`().`**`begin`**`();`\n\
  `      Installer.EM.`**`remove`**`(album);`\n`      Installer.EM.`**`getTransaction`**`().`**`commit`**`();`\n\
  `   }`\n`}`\n\n### 小结\n\nJava Persistence API (JPA) 是用于对象关系桥接（如 Hibernate）的统一接口。JPA\
  \ 实现了持久化系统之间的透明使用和轻松兼容。在本章中，你使用了 Hibernate 的 JPA 兼容接口。\n\n## 第 29 章\n\n## MySQL\
  \ 与 EclipseLink\n\n在第 26 章中，你创建了一个应用程序，将音乐专辑保存到 Java DB 数据库中。第一步，你将待保存的对象拆分为 SQL\
  \ 语句，并再次从 SQL 结果中组装它们。像 Hibernate 这样的对象关系映射 (ORM) 框架会为你完成这项工作。第 27 章 讨论了如何将 Hibernate\
  \ 集成到 NetBeans Platform 应用程序中，以及如何使用 Hibernate 的原生接口。在第 28 章中，你了解了定义 ORM 框架接口的 Java\
  \ Persistence API (JPA)。使用 JPA，你可以使应用程序独立于特定的实现，在本例中即 Hibernate。\n\n在接下来的章节中，将用\
  \ EclipseLink 替换 Hibernate，并使用 MySQL 服务器代替 Java DB 数据库系统（参见图 29-1）。除了集成这两个组件之外，你还将学习如何使用\
  \ NetBeans IDE 从关系创建实体。位于 *My Module* 中的应用程序逻辑保持不变。\n\n![Image](img/2901.jpg)\n\n\
  ***图 29-1.** 集成 EclipseLink 和 MySQL 的应用程序结构*\n\n\n\n### 安装 MySQL 数据库\n\n首先，创建一个\
  \ MySQL 数据库。本章假设您已经安装了 MySQL 服务器或可以访问一台服务器。您可以在 [`http://dev.mysql.com/downloads`](http://dev.mysql.com/downloads)\
  \ 下载免费使用的社区版。然后，在 NetBeans IDE 中打开 *服务* 窗口。您会在其中找到 *数据库* 节点。在其上下文菜单中选择 *注册 MySQL\
  \ 服务器...*（参见 图 29-2）。\n\n![图片](img/2902.jpg)\n\n***图 29-2.** 在 NetBeans IDE 中注册\
  \ MySQL 服务器*\n\n在出现的对话框中输入服务器名称、端口、用户名和密码（本例中为 *localhost*）。您将获得一个 *MySQL 服务器* 节点，如\
  \ 图 29-3 所示。现在，您可以通过该节点的上下文菜单中的 *创建数据库...* 来创建一个数据库。将其命名为 *eclipselink-db*。\n\n\
  ![图片](img/2903.jpg)\n\n***图 29-3.** 在服务窗口中安装和管理 MySQL 服务器*\n\n本章的方法与之前章节不同：实体类是根据数据库的关系创建的。因此，下一步您需要创建必要的表。*album*\
  \ 和 *genre* 这两个表的结构应如 清单 29-1 所示。在服务窗口中打开您之前创建的连接，并在 *eclipselink-db ![图片](img/U001.jpg)\
  \ 表* 节点的上下文菜单中选择 *执行命令...* 操作来创建表（参见 图 29-3）。您可以直接以 SQL 语句的形式输入模式（参见 清单 29-1）。或者，您也可以选择\
  \ *创建表...* 操作并手动创建这两个表。\n\n***清单 29-1.** album 和 genre 两个表的模式*\n\n`CREATE TABLE\
  \ genre (`\n`   id INT NOT NULL,`\n`   genre VARCHAR(30) NOT NULL,`\n`   PRIMARY\
  \ KEY(id)`\n`)`\n`CREATE TABLE album (`\n`   id INT NOT NULL AUTO_INCREMENT,`\n\
  `   title VARCHAR(30) NOT NULL,`\n`   tracks VARCHAR(30) NOT NULL,`\n`   cds VARCHAR(30)\
  \ NOT NULL,`\n`   year VARCHAR(30) NOT NULL,`\n`   genre INT NOT NULL,`\n`   PRIMARY\
  \ KEY(id),`\n`   FOREIGN KEY(genre) REFERENCES genre(id)`\n`)`\n\n最后，在 NetBeans\
  \ IDE 中注册 MySQL 服务器。至此，您已经创建了一个数据库和必要的表。\n\n#### 集成 MySQL 驱动程序\n\n集成 MySQL JDBC\
  \ 驱动程序（Connector/J），以便 NetBeans Platform 应用程序能够连接到 MySQL 服务器，并且 NetBeans Platform\
  \ 能够访问数据库。通过 *文件 ![图片](img/U001.jpg) 新建项目… ![图片](img/U001.jpg) NetBeans 模块 ![图片](img/U001.jpg)\
  \ 库包装器模块* 创建一个新的库包装器模块来完成此操作。您可以直接从 [`http://dev.mysql.com/downloads`](http://dev.mysql.com/downloads)\
  \ 下载驱动程序，或者从 NetBeans IDE 的 *ide/modules/ext* 目录中获取。\n\n此处将模块命名为 *MySQL Connector*，并将其添加到\
  \ NetBeans Platform 应用程序中（参见 图 29-4）。\n\n![图片](img/2904.jpg)\n\n***图 29-4.** 在您的应用程序中集成\
  \ MySQL JDBC 驱动程序。*\n\n#### 集成 EclipseLink\n\n您不希望直接通过 JDBC 接口访问数据库，而是通过 ORM 框架\
  \ EclipseLink（JPA 2.0）进行访问。因此，您必须确保必要的库可用。创建一个库包装器模块，并添加 Java Persistence API 以及作为\
  \ JPA 特殊实现的 EclipseLink 库。您可以从 NetBeans IDE 的 *java/modules/ext/eclipselink* 目录中获取这两个库：\n\
  \n> eclipselink-2.2.0.jar\n> \n> eclipselink-javax.persistence-2.0.jar\n\n将此包装器模块命名为\
  \ *EclipseLink*，并将其添加到您的 NetBeans Platform 应用程序中。\n\n### 从数据库模式创建实体\n\n在前面的章节中，您自己创建了实体类。ORM\
  \ 框架会根据其结构自动创建表。现在，您想要逆转这个过程。在本章开始时，您已经为应用程序创建了必要的表。NetBeans IDE 现在可以自动创建相应的实体类。当您需要在现有数据库上实现应用程序时，这个过程就变得很有意义。\n\
  \n不幸的是，NetBeans IDE 中基于表创建实体类的向导仅适用于 Java 项目，不适用于模块项目。因此，您需要稍微绕一下路。首先，通过 *文件 ![图片](img/U001.jpg)\
  \ 新建项目… ![图片](img/U001.jpg) Java ![图片](img/U001.jpg) Java 类库* 创建一个 Java 项目。然后，您可以通过\
  \ *文件 ![图片](img/U001.jpg) 新建文件… ![图片](img/U001.jpg) 持久性 ![图片](img/U001.jpg) 来自数据库的实体类*\
  \ 启动实际的向导。首先选择相应的数据库连接（*eclipselink db*），然后通过 *添加 >* 添加 *album* 和 *genre* 表。在后续页面上，会列出要创建的类。定义包（*com.galileo.netbeans.myentities*）并选择\
  \ *创建持久化单元* 选项。同时，会创建必要的 JPA 配置（*persistence.xml*），如 图 29-5 所示（另请参见 第 28 章）。\n\n\
  ![图片](img/2905.jpg)\n\n***图 29-5.** 基于现有数据库表创建实体类*\n\n在向导的最后一页，使用 *java.util.List*\
  \ 作为 *集合类型*，并取消所有选项的勾选。实体类创建完成后，您可以创建一个库。为此，请从项目的上下文菜单中选择 *构建*。下一步，将 JAR 文件添加到 NetBeans\
  \ Platform 应用程序的库包装器模块中。将其命名为 *My Entities*，并使用 *com.galileo.netbeans.myentities*\
  \ 作为代码名称基础。\n\n### 构建并测试应用程序\n\n现在，您已经为 MySQL 驱动程序和 Java Persistence API 的 EclipseLink\
  \ 实现创建了模块。您没有自己创建实体类 `Album` 和 `Genre`，而是让 NetBeans IDE 创建并注解它们。基于此，您创建了一个 NetBeans\
  \ 模块。您可以按原样使用应用程序模块“我的模块”，因为使用 JPA 的好处是您可以更改底层的 ORM 框架。您只需在 `Installer` 类中创建实体管理器工厂时指定新的持久化单元名称即可。如果您按照\
  \ 图 29-1 定义依赖关系，就可以启动并测试应用程序。\n\n### 总结\n\n在本章中，您使用了广泛使用的 MySQL 数据库，通过 JPA 实现 EclipseLink\
  \ 来存储您的对象。您学习了如何从关系创建类，并且当您更改持久化提供程序而不影响应用程序代码和逻辑时，您也看到了使用 Java Persistence API\
  \ 的巨大优势。\n\n## 第 30 章\n\n## Web 服务\n\n*Amazon Product Advertising API* 允许您搜索产品或关于多个产品的信息，甚至可以在购物车中执行操作。本章将向您展示如何使用\
  \ NetBeans IDE 创建必要的类，以及如何在 NetBeans Platform 应用程序中使用这些类。\n\n\n\n### 创建 Web 服务客户端\n\
  \n第一步，不要打开 NetBeans 模块，而是打开一个可通过向导创建的 Java 类库。选择 *文件 ![Image](img/U001.jpg) 新建项目*，在\
  \ *Java* 类别中选择项目类型 *Java 类库*。将项目命名为 *Amazon Web Services*，然后点击 *完成* 关闭向导。接着选择 *文件\
