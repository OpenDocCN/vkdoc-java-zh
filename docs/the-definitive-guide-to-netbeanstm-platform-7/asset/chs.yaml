  \ Swing 容器中。将其添加到 `JScrollPane` 中，这样场景或视图就不会被限制在特定大小。现在，在创建了一个类似于 `JGlassPane` 的\
  \ `LayerWidget` 之后，你可以按层次结构向场景添加 widget，然后向该 `LayerWidget` 添加两个 `ImageWidget`。为了说明\
  \ widget 的分组和对齐，你创建了另一个 `LayerWidget` 实例并添加了一个额外的 `ImageWidget`。因此，你将每个 `ImageWidget`\
  \ 添加到一个 `LayerWidget`，而这些 `LayerWidget` 又都归属于场景。我们将其添加到一个 `MoveAction` 实例，以便这些 widget\
  \ 可以在场景内移动。移动操作实例是通过 `ActionFactory` 创建的，并且可以重复使用。此示例显示在图 14-3 中。\n\n#### 卫星视图\n\
  \n为了保持概览并能够在较大场景中快速导航，场景以交互式 `JComponent` 的形式提供概览。这是使用 `createSatelliteView()` 方法创建的*卫星视图*。如果你的场景视图嵌入在\
  \ `JScrollPane` 中，并且场景同时大于显示区域，则可以通过移动概览中存在的灰色框来更新视图，从而导航场景（参见图 14-3）。\n\n![Image](img/1403.jpg)\n\
  \n***图 14-3.** 可以创建场景的概览，同时可用于导航。*\n\n\n\n#### 导出场景\n\n只需几个步骤，并借助一些 Java 工具，您就可以将使用\
  \ Visual Library API 生成的场景导出为 PNG 文件中的图像。为此，您首先需要创建一个 `BufferedImage` 对象，以便将图形数据写入其中。使用相应场景视图的当前大小来指定此\
  \ `Image` 实例的尺寸，以确保存储完整的内容。从此对象中，您可以获取 `Graphics2D` 上下文，用于将数据馈送到 `BufferedImage`\
  \ 对象的缓冲区中。接下来，您必须将此上下文提供给场景的 `paint()` 方法。然后，场景会将其内容写入 `BufferedImage` 实例的缓冲区，而不是屏幕（请参见清单\
  \ 14-2）。之后，释放该上下文以便释放资源。使用 `JFileChooser`，您请求一个文件名，并在必要时附加适当的后缀。完成后，您利用 `ImageIO`\
  \ 类查找 PNG 文件的 `ImageWriter`，并使用 `ImageWriter` 将 `BufferedImage` 对象的数据写入所选文件。\n\n\
  ***清单 14-2.** 将场景导出为 PNG 文件*\n\n`private` **`Scene` **`sc = new`** `Scene`**`();`\n\
