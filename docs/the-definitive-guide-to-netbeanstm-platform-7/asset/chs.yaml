  `}`\n\n类 `Mp3DetailsView` 是一个窗口，用于显示 `Mp3SearchList` 中选中条目的详细信息。为了在 Lookup 发生变化时（例如，当选择发生变化时）获得通知，实现了\
  \ `LookupListener` 接口。一个 `Lookup.Result` 作为私有成员使用，它使我们能够对特定类型（本例中为 `Mp3FileObject`）的变化做出反应。打开窗口会触发\
  \ `componentOpened()` 方法。使用此回调，通过 `Utilities.actionsGlobalContext()` 方法获取代理组件的 Lookup，该方法返回一个始终委托给活动\
  \ `TopComponent` 的本地 Lookup 的 Lookup。基于此代理 Lookup，现在为 `Mp3FileObject` 类型创建一个 `Lookup.Result`，并注册一个\
  \ `LookupListener` 来监听此结果的变化。如果某个 `TopComponent` 获得焦点，并且其本地 Lookup 中包含一个或多个此类型的实例，则会调用\
  \ `resultChanged()` 方法。这样，您只需检索这些实例并相应地显示信息，如清单 5-9 所示。\n\n***清单 5-9.** 窗口 Mp3DetailsView\
  \ 显示在 Mp3SearchList 中选中的 Mp3FileObject 的信息。*\n\n`public class` **`Mp3DetailsView`**\
  \ `extends` **`TopComponent`** `implements` **`LookupListener`** `{`\n`private`\
  \ **`Lookup.Result<Mp3FileObject> result`** `= null;`\n\n`   public Mp3DetailsView()\
  \ {`\n`      initComponents();`\n`   }`\n`   public void componentOpened() {`\n\
  **`result = Utilities.actionsGlobalContext().LookupResult(Mp3FileObject.class);`**\n\
  **`result.addLookupListener(this);`**\n`   }`\n`public void` **`resultChanged`**`(LookupEvent\
  \ event) {`\n`Collection<? extends Mp3FileObject> mp3s =` **`result.allInstances();`**\n\
  `      if(!mp3s.isEmpty()) {`\n`         Mp3FileObject mp3 = mp3s.iterator().next();`\n\
  **`         artist.setText(mp3.getArtist());`**\n**`         title.setText(mp3.getTitle());`**\n\
  **`         year.setText(mp3.getYear());`**\n`      }`\n`   }`\n`}`\n\n通过 `Mp3SearchList`\
  \ 提供并使用 `Mp3DetailsView` 显示的信息是 `Mp3FileObject` 类的一部分（参见清单 5-10）。此类应在一个单独的模块中实现，以实现最佳的封装和重用；在本例中，它是模块\
  \ C。为了授予模块 A 和 B 对此类的访问权限，它们必须声明对模块 C 的依赖。如果 `Mp3FileObject` 类仅通过模块 A 提供，则可以将该类移至模块\
  \ A。\n\n***清单 5-10.** Mp3FileObject 提供数据*\n\n`public class` **`Mp3FileObject`**\
  \ `{`\n`   private String artist;`\n`   private String title;`\n`   private String\
  \ year;`\n\n`public` **`Mp3FileObject`**`(String artist, String title, String year)\
  \ {`\n`      this.artist = artist;`\n`      this.title  = title;`\n`      this.year\
  \   = year;`\n`   }`\n`public String` **`getArtist`**`() {`\n`      return this.artist;`\n\
  `   }`\n`public String` **`getTitle`**`() {`\n`      return this.title;`\n`   }`\n\
  `public String` **`getYear`**`() {`\n`      return this.year;`\n`   }`\n`}`\n\n\
  作为代理组件，此示例使用了 NetBeans 平台提供的全局代理 Lookup，该 Lookup 委托给活动 `TopComponent` 的本地 Lookup。在图\
  \ 5-4 中，这通过接口 `ContextGlobalProvider` 进行了描述。这个全局代理 Lookup 也可以很容易地被您自己的实现所替代。该实现只需将包含主题的组件的本地\
  \ Lookup 提供给观察者。\n\n### 动态 Lookup\n\n我们已经在*注册服务提供者*一节中处理了 Lookup 的一个典型用例。在那里，您学习了如何通过\
  \ `InstanceContent` 对象将您自己类的实例添加到 Lookup 中。在本段中，我将向您展示如何通过一个小的辅助类，将 Lookup API 的优势用于一般的应用程序目的。为此，您需要创建一个基于\
  \ `AbstractLookup` 类的 Lookup 类。这个类将被集中提供，因此通过单例模式实现。（参见清单 5-11。）\n\n***清单 5-11.**\
  \ 可以添加或删除中心对象的动态 Lookup*\n\n`import org.openide.util.Lookup.AbstractLookup;`\n`import\
  \ org.openide.util.Lookup.InstanceContent;`\n\n`public class DynamicLookup extends`\
  \ **`AbstractLookup`** `{`\n`   private static DynamicLookup Lookup = new DynamicLookup();`\n\
  `private` **`InstanceContent`** `content = new InstanceContent();`\n\n`   private\
  \ DynamicLookup() {`\n`   }`\n`public void` **`add`**`(Object instance) {`\n`  \
  \    content.add(instance);`\n`   }`\n`public void` **`remove`**`(Object instance)\
  \ {`\n`      content.remove(instance);`\n`   }`\n`public static DynamicLookup` **`getDefault`**`(){`\n\
  `      return Lookup;`\n`   }`\n`}`\n\n这个简单的 Lookup 类包含了您在*注册服务提供者*一节中已经使用过的 `InstanceContent`\
  \ 对象；它管理您想要添加的对象。通过 `getDefault()` 方法，您提供动态 Lookup 的中心实例。通过另外两个方法 `add()` 和 `remove()`，您可以从任何位置添加和访问对象；从而轻松实现多向通信。\n\
  \n当然，这个 Lookup 也可以注册一个监听器（`LookupListener`）（参见*注册服务提供者*一节），例如，以此来对某个特定对象的存在做出反应。\n\
  \n\n\n### Java 服务加载器\n\n自 Java 6 起，提供了一个与 Lookup 类似的 API：`ServiceLoader`。该类用于加载服务提供者，这些提供者通过\
  \ *`META-INF/services`* 目录进行注册。借助此功能，`ServiceLoader` 类等同于可通过 `Lookup.getDefault()`\
  \ 获取的 NetBeans 标准 Lookup。`ServiceLoader` 是针对特定类型创建的，创建时需使用服务接口或抽象服务类的 `Class` 对象。通过静态工厂方法创建\
  \ `ServiceLoader` 实例。根据用于加载服务提供者的类加载器不同，有三种创建服务加载器的方法。\n\n默认情况下，服务提供者使用当前线程的上下文类加载器进行加载。在\
  \ NetBeans 平台内部，这指的是系统类加载器（有关 NetBeans 类加载器系统的更多详细信息，请参见第 2 章）。这使得用户可以从所有模块加载服务提供者。通过以下调用创建此类服务加载器：\n\
  \n`ServiceLoader<Mp3Finder> s = ServiceLoader.`**`load`**`(Mp3Finder.class);`\n\n\
  你可能希望使用特定的类加载器来加载服务提供者，例如使用模块类加载器将服务提供者的加载限制在自身模块的类中。要获取这样的 `ServiceLoader`，需要将使用的类加载器传递给工厂方法：\n\
  \n`ServiceLoader<Mp3Finder> s = ServiceLoader.`**`load`**`(`\n`   Mp3Finder.class,\
  \ this.getClass().getClassLoader());`\n\n除此之外，还可以创建一个仅返回已安装服务提供者的服务加载器——例如，位于 *`lib/ext`*\
  \ 目录或平台特定扩展目录中的 JAR 归档文件中的服务提供者。类路径上找到的其他服务提供者将被忽略。此服务加载器使用 `loadInstalled()` 方法创建：\n\
  \n`ServiceLoader<Mp3Finder> s = ServiceLoader.`**`loadInstalled`**`(Mp3Finder.class);`\n\
  \n服务提供者可以通过迭代器获取。迭代器会在首次访问时触发提供者的动态加载。已加载的提供者会存储在本地缓存中。迭代器在加载剩余未加载的提供者之前，会先返回已缓存的提供者。如有必要，可以使用\
  \ `reload()` 方法清除内部缓存。这确保了所有提供者都会被重新加载。\n\n`Iterator<Mp3Finder> i = s.`**`iterator`**`();`\n\
  `if(i.hasNext()) {`\n`   Mp3Finder finder = i.next();`\n`}`\n\n如果提供者无法实例化、与指定类型不匹配或配置文件不正确，则会触发\
  \ `ServiceConfigurationError`。\n\n### 总结\n\n在本章中，你学习了 NetBeans 平台最有趣且最重要的概念之一：Lookup。本章探讨了\
  \ Lookup 的功能，并让你熟悉了服务接口和服务提供者。你学习了如何创建服务接口并在服务提供者中使用它们，以及如何以松散耦合的方式发现服务提供者。为此，你开始使用各种注册机制。\n\
  \n然而，Lookup 的功能远不止发现服务。实际上，它们还用于实现模块间通信。本章向你展示了一个示例，其中窗口之间无需相互了解即可共享信息。最后，通过将其与\
  \ JDK 6 的 `ServiceLoader` 类相关联，拓宽了对该主题的探讨。\n\n## 第 6 章\n\n## 操作\n\nNetBeans 平台对操作的处理基于\
  \ *Swing 操作框架*。因此，每个操作都基于 Swing 接口 `ActionListener` 或 `Action`。NetBeans 平台的优点在于它为不同类型的常见操作提供了基础设施。以前，操作必须根据操作类型从特定的类派生；自\
  \ NetBeans 平台 7 起，所有操作都具有相同的形式，只需实现 `ActionListener` 接口即可。除了操作现在更易于使用之外，操作的实现对你作为开发者来说也变得更加透明。现在，NetBeans\
  \ 平台在后台为你完成了繁重的工作。\n\n**极大简化：NetBeans 平台 7 中的操作**\n\n只需通过 `ActionListener` 接口实现你的操作逻辑。元信息，如操作的\
  \ ID、名称或图标，只需通过注解添加即可。其余工作由 NetBeans 平台为你完成。\n\n不仅可以创建执行其封装逻辑的基本操作类（`AlwaysEnabled`），还可以创建动态传递可用操作（`Callback`）的操作，或者能够将其逻辑包含在特定上下文中的操作（`ContextAware`）。图\
  \ 6-1 再次概述了这三种主要操作类型及其最重要的特性。\n\n![图片](img/0601.jpg)\n\n***图 6-1.** NetBeans 平台中不同类型的操作*\n\
  \n操作的注册集中在你标准文件夹 `Actions` 的层文件中完成。然后可以从其他位置引用此集中注册。这有一个很大的优点：操作可以同时在多个地方使用，例如在菜单栏、工具栏以及应用程序模块本身中与控制元素关联。因此，平台只会创建操作类的一个实例。集中声明操作的另一个原因是能够针对特定用户自定义工具栏。这样，所有可用的操作都可以显示给用户，并可以分配到任何工具栏。如果用户从工具栏中移除一个条目，该操作不会丢失，因为删除的只是引用，而不是操作本身。\n\
  \n为了简化操作的注册和分配，NetBeans 平台 7 也引入了新特性。现在，使用注解代替了在层文件中手动注册和分配。借助这些信息，在创建应用程序时会自动生成相应的层条目。不过，你并非必须使用注解。你仍然可以直接在层文件中创建层条目。\n\
  \n在接下来的章节中，我将解释如何简单地创建操作、如何构建它们，以及如何通过注解或手动层条目进行注册。你可以使用 NetBeans IDE 提供的向导来创建操作类。你将了解到操作类非常简单，甚至不需要使用向导。\n\
  \n\n\n### 始终启用的操作\n\n选择*文件* ![Image](img/U001.jpg) *新建文件…* ![Image](img/U001.jpg)\
  \ *模块开发* ![Image](img/U001.jpg) *操作* 以调用创建新操作类的向导。在第一步中，你可以选择操作的类型。这样，你可以在*始终启用*的操作和*条件启用*的操作之间进行选择。你想要创建一个始终提供的操作，因此应选择*始终启用*。在下一步中，你可以将操作类集成到菜单栏和工具栏中，还可以定义快捷键（参见图\
  \ 6-2）。现在你关注的是操作本身，因此请取消这些选项，并将要创建的操作分配到现有类别或新类别中。\n\n![Image](img/0602.jpg)\n\n\
  ***图 6-2.** 使用 NetBeans 向导创建操作类*\n\n点击*下一步*按钮进入最后一步。你可以在此处定义操作类的名称，该名称将显示在菜单中。此外，你可以或必须为操作选择一个图标。此图标通常应为\
  \ 16 × 16 像素。你还应提供相同图标的 24 × 24 像素版本。这样，用户便可以在两种不同大小的工具栏之间进行选择。你无需特意选择它，只需将其放在同一文件夹中，并以附加了*24*\
  \ 的相同名称命名即可。如果 16 × 16 像素的图标名为 *icon.gif*，则 24 × 24 像素的图标必须命名为 *icon24.gif*。此外，你还可以为相应状态提供图标\
  \ *icon_pressed.gif*、*icon_disabled.gif*、*icon_rollover.gif*。然后点击*完成*按钮关闭向导并生成操作类。现在，让我们看看清单\
  \ 6-1 中显示的操作类。\n\n***清单 6-1.** 操作类示例——尽管分配和提供是通过注解的元信息完成的*\n\n`import java.awt.event.ActionEvent;`\n\
  `import java.awt.event.ActionListener;`\n`import org.openide.awt.ActionID;`\n`import\
  \ org.openide.awt.ActionRegistration;`\n`import org.openide.awt.ActionReferences;`\n\
  \n**`@ActionID`**`(`\n`    id = \"com.galileo.netbeans.MyFirstAction\",`\n`    category\
  \ = \"File\")`\n**`@ActionRegistration`**`(`\n`    displayName = \"#CTL_MyFirstAction\"\
  ,`\n`    iconBase = \"com/galileo/netbeans/icon.gif\")`\n`@ActionReferences({})`\n\
  `public final class MyFirstAction implements` **`ActionListener`** `{`\n`public\
  \ void` **`actionPerformed`**`(ActionEvent e) {`\n`        // TODO implement action\
  \ body`\n`    }`\n`}`\n\n首先，你应该通过 `ActionID` 注解为每个操作分配一个唯一标识符。为此，需要使用 `id` 参数指定一个唯一字符串。我建议使用类名及其代码名称基址的组合。这样，ID\
  \ 就是真正唯一的。此外，操作必须分配到一个类别；该类别可以是已存在的类别，也可以是一个新类别。\n\n操作通过 `ActionRegistration` 注解进行注册。该操作在由\
  \ `ActionID` 分配的标识符处注册。显示名称通过从 *Bundle.properties* 文件中读取键 `#CTL_MyFirstAction` 的赋值来获取。这样做的好处是名称可以轻松本地化（名称可以调整为另一种语言）。此外，还通过\
  \ `iconBase` 参数指定了一个图标。\n\n![Image](img/square.jpg) **注意** 目前我将忽略由向导自动创建的 `ActionReferences`\
  \ 注解。通过这种方式，操作被分配到菜单或工具栏。我将在第 9 章中讨论这一点。\n\n操作类本身非常简单。只需要实现 `ActionListener` 接口的\
  \ `actionPerformed()` 方法。你打算执行的操作将由该方法执行。\n\n正如本章开头所述，通过注解注册操作是常规方法。但是，你并非必须使用它。通过在层文件中引用条目来将你的操作引入\
  \ NetBeans Platform 同样可行，因为使用注解在原理上并无本质区别。唯一的区别在于，当你根据注解信息自动构建应用程序时，这些条目会被创建。要注册一个不带注解的始终启用操作类，请在\
  \ `Actions` 文件夹中创建以下 `.instance` 元素，如清单 6-2 所示。\n\n***清单 6-2.** 通过在层文件中直接条目注册始终启用的操作*\n\
  \n`<file name=\"com-galileo-netbeans-MyFirstAction.instance\">`\n`  <attr name=\"\
  `**`displayName`**`\" bundlevalue=`\n`    \"com.galileo.netbeans.Bundle#CTL_MyFirstAction\"\
  />`\n`  <attr name=\"`**`iconBase`**`\"`\n`    stringvalue=\"com/galileo/netbeans/icon.gif\"\
  />`\n`  <attr name=\"`**`instanceCreate`**`\"`\n`    methodvalue=\"org.openide.awt.Actions.alwaysEnabled\"\
  />`\n`  <attr name=\"`**`delegate`**`\"`\n`    newvalue=\"com.galileo.netbeans.MyFirstAction\"\
  />`\n`</file>`\n\n名称与注解参数相对应的属性，其含义与之相同。这些及其他必要属性及其值在表 6-1 中进行了说明。\n\n![Image](img/t0601.jpg)\n\
  \n除了这些属性之外，还提供了两个可选属性。这些属性在表 6-2 中列出。\n\n![Image](img/t0602.jpg)\n\n\n\n### 回调动作\n\
  \n回调动作与始终启用动作不同，因为回调动作能够委托给另一个通常依赖于上下文的动作。通常，回调动作不包含动作逻辑，而是进一步委托给所谓的*动作执行器*。如果不存在动作执行器，你可以在回调动作中添加所谓的回退实现。回调动作主要用于全局动作，即那些根据上下文遵循不同逻辑的动作。这些动作包括搜索、复制或粘贴等。NetBeans\
  \ 平台的 Actions API 也提供了多个这样的全局动作。动作执行器由 Java 的 `ActionMap` 提供。在此过程中，动作执行器和回调动作的键会注册到这个映射中。所有继承自\
  \ `JComponent` 的类默认都有一个 `ActionMap`。NetBeans 平台基类也默认有一个 `TopComponent`。它用于在 NetBeans\
  \ 平台应用程序中显示的窗口（更多信息请参见第 10 章）。这个 `ActionMap` 通过 Lookup 提供。回调动作类的任务是检查全局代理 Lookup\
  \ 中是否存在 `ActionMap`。如果存在，则检查是否为你自己的动作注册了动作执行器。在这种情况下，菜单和工具栏条目等动作表示器会被自动激活。如果没有提供动作执行器和回退实现，动作表示器将被停用。\n\
  \nNetBeans IDE 没有提供专门的向导来创建回调动作。如果你想创建一个带有回退实现的回调动作，只需使用“始终启用动作”一节中描述的向导来创建一个始终启用的动作类。然后，你只需在\
  \ `ActionRegistration` 注解中添加另一个参数。如果你不需要回退实现，那就更简单了。只需将 `ActionID` 和 `ActionRegistration`\
  \ 注解添加到键上即可。在这种情况下，甚至不再需要类。\n\n在清单 6-3 中，将创建一个带有回退实现的动作，以实现刷新功能。它将根据当前哪个窗口拥有焦点来执行不同的动作。使用始终启用动作的向导创建一个名为\
  \ `RefreshAction` 的动作类，并将其添加到菜单或工具栏中。已经用 `key` 参数扩展的类应如清单 6-3 所示。\n\n***清单 6-3.**\
  \ 带有回退实现的回调动作*\n\n`import java.awt.event.ActionEvent;`\n`import java.awt.event.ActionListener;`\n\
  `import org.openide.awt.ActionRegistration;`\n`import org.openide.awt.ActionReference;`\n\
  `import org.openide.awt.ActionReferences;`\n`import org.openide.awt.ActionID;`\n\
  \n`@ActionID(     category = \"File\",`\n`    id = \"com.galileo.netbeans.RefreshAction\"\
  )`\n`@ActionRegistration(`\n`    iconBase = \"com/galileo/netbeans/icon.gif\",`\n\
  `    displayName = \"#CTL_RefreshAction\"`\n**`key = \"RefreshAction\"`**`)`\n`@ActionReferences({`\n\
  `    @ActionReference(path = \"Menu/File\", position = 900),`\n`    @ActionReference(path\
  \ = \"Toolbars/File\", position = 300)`\n`})`\n`public final class` **`RefreshAction`**\
  \ `implements ActionListener {`\n`    public void actionPerformed(ActionEvent e)\
  \ {`\n`        // TODO 回退实现`\n`    }`\n`}`\n\n与始终启用动作的唯一区别在于，回调动作使用了额外的参数 `key`。这样，你可以分配一个随机标识符，动作执行器通过该标识符进行关联。\n\
  \n`RefreshAction` 类本身充当回退实现。如果你不需要这样的类，只需像清单 6-4 所示那样注解一个键即可。\n\n***清单 6-4.** 不带回退实现的回调动作*\n\
  \n`@ActionID(     category = \"File\",`\n`    id = \"com.galileo.netbeans.RefreshAction\"\
  )`\n`@ActionRegistration(`\n`    iconBase = \"com/galileo/netbeans/icon.gif\",`\n\
  `    displayName = \"#CTL_RefreshAction\")`\n`public static final String` **`REFRESH_ACTION\
  \ = \"RefreshAction\"`**`;`\n\n现在，如果你启动应用程序，并且既没有提供回退实现也没有提供动作执行器，该动作在菜单和工具栏中都将被停用。清单\
  \ 6-5 常规性地解释了如何提供动作执行器，因为它假设一个派生自 `TopComponent` 类的窗口。你将在第 10 章 中创建这样一个窗口。一旦创建完成，你也可以实际测试这个动作类。\n\
  \n***清单 6-5.** 为回调动作注册动作执行器*\n\n`public final class MyTopComponent extends TopComponent\
  \ {`\n`   public MyTopComponent() {       ...`\n**`getActionMap()`**`.put(`**`\"\
  RefreshAction\"`**`,`\n`                         new AbstractAction() {`\n`         public\
  \ void actionPerformed(ActionEvent event) {`\n`           // 刷新顶层组件的内容`\n`         }`\n\
  `      });`\n`   }`\n`}`\n\n通过 `JComponent` 类定义的 `getActionMap()` 方法获取顶层组件的动作映射。然后，添加一个与\
  \ `RefreshAction` 的键关联的动作实现实例。现在，由 `AbstractAction` 类创建的动作位于 `MyTopComponent` 的上下文中。你可以将任何实现了\
  \ `Action` 接口的动作类添加到动作映射中。\n\n一旦 `MyTopComponent` 窗口获得焦点，`RefreshAction` 就会被激活。确认该动作后，将执行由\
  \ `MyTopComponent` 提供的 `actionPerformed()` 方法。为了全面理解，了解回调类如何获取动作执行器是有意义的，因为仅仅将动作执行器添加到动作映射中并不会将其提供给\
  \ `RefreshAction` 类。这两部分之间的连接仍然缺失。Lookup 概念负责这个连接。在这种情况下，Lookup 概念指的是顶层组件的本地 Lookup\
  \ 和一个全局代理 Lookup，后者便于回调动作访问本地 Lookup。顶层组件必须确保其动作映射位于其 Lookup 中。然后，回调动作才能找到动作执行器。默认情况下，动作映射已经在顶层组件的本地\
  \ Lookup 中；你无需再担心它，除非你使用 `associateLookup()` 方法设置另一个本地 Lookup 或重写 `getLookup()`\
  \ 方法。只需知道你需要再次添加动作映射。关于 Lookup 概念就介绍这么多；你可以在第 5 章 中找到更多信息。\n\n现在，你可以向回调动作添加任意数量的动作执行器，这些执行器会根据当前上下文自动执行。你可能会问自己如何使用\
  \ NetBeans Actions API 提供的动作，例如 `CopyAction`、`CutAction` 或 `DeleteAction` 类，这些类至少已经集成在菜单中，因此可以使用。这些类都是回调动作，只需像之前通过\
  \ `RefreshAction` 类解释的那样提供一个动作执行器即可使用。\n\n如果你不想为回调动作使用注解，你也可以通过清单 6-6 中所示的条目在 `Actions`\
  \ 文件夹中注册它们。\n\n***清单 6-6.** 通过层文件中的条目注册回调动作*\n\n\n\n`<file name=\"com-galileo-netbeans-RefreshAction.instance\"\
  >`\n`  <attr name=\"displayName\"`\n`    bundlevalue=\"com.galileo.netbeans.Bundle#CTL_RefreshAction\"\
  />`\n`  <attr name=\"iconBase\"`\n`    stringvalue=\"com/galileo/netbeans/icon.gif\"\
  />`\n`  <attr name=\"`**`instanceCreate`**`\"`\n`    methodvalue=\"org.openide.awt.Actions.callback\"\
  />`\n`  <attr name=\"`**`fallback`**`\"`\n`    methodvalue=\"org.openide.awt.Actions.alwaysEnabled\"\
  \ />`\n`  <attr name=\"`**`delegate`**`\"`\n`    newvalue=\"com.galileo.netbeans.RefreshAction\"\
  />`\n`  <attr name=\"`**`key`**`\" stringvalue=\"RefreshAction\"/>`\n`</file>`\n\
  \n属性 `displayName` 和 `iconBase` 对应于“始终启用操作”一节中解释的始终启用操作的属性。回调操作的专用属性在表 6-3 中列出并说明。\n\
  \n始终启用操作的可选属性（参见表 6-2）也可以通过回调操作提供。\n\n![图片](img/t0603.jpg)\n\n### 上下文感知操作\n\n此类操作在特定上下文中工作——例如，一个文件。此类操作的特殊之处在于，只有当应用程序中引用的上下文也处于活动状态时，这些操作才会被激活。在示例中，文件在应用程序中被打开。上下文由\
  \ NetBeans 平台自动传递给操作，因此操作可以在该上下文上执行引用的操作，例如编辑文件。通常，上下文和操作通过所谓的*上下文接口*（也称为*Cookie*）连接，该接口由上下文实现。\n\
  \n在以下示例中，我们希望使用节点类作为上下文。节点是特定数据的表示。在实践中，节点可以是一个文件，例如在树形结构中描绘或在编辑器中打开的文件。你将在第 7 章和第\
  \ 12 章中了解更多关于这个在 NetBeans 平台中频繁使用的概念。\n\n要创建上下文感知操作，你可以再次使用操作向导（*文件* ![图片](img/U001.jpg)\
  \ *新建文件*… ![图片](img/U001.jpg) *模块开发* ![图片](img/U001.jpg) *操作*）。但在这种情况下，你应该选择类型*条件启用*。然后指定上下文接口，并选择当存在多个上下文接口实例时操作是否仍应处于活动状态。在此示例中，我们使用上下文接口\
  \ `Editable`，并指定该操作仅在一个上下文实例上工作。在向导的下一页，你可以将操作集成到菜单栏和工具栏中（参见“始终启用操作”一节）。完成向导后，你的操作类应大致如清单\
  \ 6-7 所示。\n\n***清单 6-7.** 上下文感知类型的操作类，当存在上下文接口 Editable 的实例时变为活动状态*\n\n`import java.awt.event.ActionListener;`\n\
  `import java.awt.event.ActionEvent;`\n`import org.netbeans.api.actions.Editable;`\n\
  `import org.openide.awt.ActionID;`\n`import org.openide.awt.ActionRegistration;`\n\
  `import org.openide.awt.ActionReferences;`\n\n`@ActionID(`\n`    category = \"Edit\"\
  ,`\n`    id = \"com.galileo.netbeans.MyContextAction\")`\n`@ActionRegistration(`\n\
  `    iconBase = \"com/galileo/netbeans/icon.gif\",`\n`    displayName = \"#CTL_MyContextAction\"\
  )`\n`@ActionReferences({})`\n`public final class MyContextAction implements ActionListener\
  \ {`\n`private final` **`Editable context`**`;`\n`    public MyContextAction(`**`Editable\
  \ context`**`) {`\n`        this.context = context;`\n`    }`\n`public void` **`actionPerformed`**`(ActionEvent\
  \ ev) {`\n`        // 对上下文执行操作`\n**`context.edit()`**`;`\n`    } }`\n\n现在查看创建的操作类，你会很快发现它与始终启用操作几乎没有区别。上下文感知操作以相同的方式使用\
  \ `ActionID` 和 `ActionRegistration` 注解进行注册。\n\n与始终启用操作不同，上下文感知操作有一个构造函数。构造函数将所需的上下文作为参数。在\
  \ `actionPerformed()` 方法中，你可以访问此上下文。如果你定义当大多数上下文实例处于活动状态时操作也应处于活动状态，则在创建操作（或之后）时，会将上下文实例列表传递给构造函数。注册时无需定义其他参数。只有以下部分发生变化：\n\
  \n`private final` **`List<Editable> context`**`;`\n`public MyContextAction(`**`List<Editable>\
  \ context`**`) {`\n`    this.context = context;`\n`}`\n\n\n\n我们现在还需要一个节点，用于激活该操作。作为示例，我创建了类\
  \ `MyNode`，它继承自 `Node` 的子类 `AbstractNode`。在实际应用中，这样的节点类可以代表某种类型的文件。本例中的类仅用于阐明上下文感知操作与特定上下文的关联。在操作类中，你已定义节点必须实现接口\
  \ `Editable`。因此，现在需要完成这一步骤。该上下文接口指定了方法 `edit()`，你刚刚通过一个空实现创建了它。该方法稍后由操作类调用；它代表了上下文相关的操作逻辑。Actions\
  \ API 提供了一系列常用的上下文接口，例如 `Openable` 或 `Closable`。不过，由于你不需要特定的超接口，你可以将任何接口用作上下文接口。（参见清单\
  \ 6-8。）\n\n***清单 6-8.** 实现上下文接口 Editable 并因此代表操作上下文的节点*\n\n`import org.netbeans.api.actions.Editable;`\n\
  `import org.openide.nodes.AbstractNode;`\n`import org.openide.nodes.Children;`\n\
  \n`public class MyNode extends AbstractNode` **`implements Editable`** `{`\n`   public\
  \ MyNode() {`\n`     super(Children.LEAF);`\n`   }`\n`public void` **`edit`**`()\
  \ {`\n`      // 根据此节点代表的数据编辑某些内容`\n`   }`\n`}`\n\n现在，你只需在你的顶层组件中设置活动节点，该组件可以是一个文件编辑器，例如，其中打开了由该节点代表的文件。为此，你只需将该节点添加到顶层组件的本地\
  \ Lookup 中。（参见清单 6-9。）\n\n***清单 6-9.** 设置活动节点。通过这样做，当实现此节点的相关上下文接口时，该操作变为活动状态。*\n\
  \n`public final class MyTopComponent extends TopComponent {`\n`   public MyTopComponent()\
  \ {`\n`      MyNode node = new MyNode();`\n`      ...`\n`      associateLookup(Lookups.fixed(`**`node`**`,\
  \ getActionMap()));`\n`   }`\n`}`\n\n如果你的应用程序中的焦点在此顶层组件上，NetBeans 平台会确保将本地 Lookup（其中现在有一个\
  \ `MyNode` 实例）作为全局上下文提供给该操作。在这种情况下，菜单栏和/或工具栏中的操作也会由 NetBeans 平台自动激活。\n\n最后，关于上下文感知操作，清单\
  \ 6-10 展示了如何通过直接在层文件中注册来注册此类操作类，而无需使用注解。\n\n***清单 6-10.** 通过直接在层文件中注册上下文感知操作。*\n\
  \n`<file name=\"com-galileo-netbeans-MyContextAction.instance\">`\n`  <attr name=\"\
  displayName\" bundlevalue=`\n`    \"com.galileo.netbeans.Bundle#CTL_MyContextAction\"\
  />`\n`  <attr name=\"iconBase\"`\n`    stringvalue=\"com/galileo/netbeans/icon.gif\"\
  />`\n`  <attr name=\"`**`instanceCreate`**`\"`\n`    methodvalue=\"org.openide.awt.Actions.context\"\
  />`\n`  <attr name=\"`**`delegate`**`\"`\n`    methodvalue=\"org.openide.awt.Actions.inject\"\
  />`\n`  <attr name=\"`**`injectable`**`\"`\n`    stringvalue=\"com.galileo.netbeans.MyContextAction\"\
  />`\n`  <attr name=\"`**`type`**`\"`\n`    stringvalue=\"org.netbeans.api.actions.Editable\"\
  />`\n`  <attr name=\"`**`selectionType`**`\" stringvalue=\"EXACTLY_ONE\"/>`\n`</file>`\n\
  \n属性 `displayName` 和 `iconBase` 指的是“始终启用的操作”一节中描述的始终启用操作的属性。在表 6-4 中，列出并解释了上下文感知操作的特殊属性。表\
  \ 6-2 中始终启用操作的可选属性也适用于上下文感知操作。\n\n![Image](img/t0604.jpg)\n\n### 总结\n\n本章讨论了操作。你学习了如何通过\
  \ NetBeans IDE 中的向导快速高效地创建操作。你还了解了可用的各种操作类型，并学习了如何有效使用它们。例如，某些操作始终可用，而其他操作仅在特定上下文中可用。你学习了使用注解注册和分配操作是多么容易。\n\
  \n## 第 7 章\n\n## 数据和文件\n\nNetBeans 平台为创建、管理、操作和呈现数据提供了一个非常强大的概念。这个概念主要包含文件系统 API\
  \ 和数据系统 API。此外，还有节点 API 和资源管理器 API。这些 API 中的每一个都位于其自身的抽象级别上。该系统可以划分为四个级别，以及 NetBeans\
  \ 平台应用程序外部的具体数据，如图 7-1 所示。\n\n![Image](img/0701.jpg)\n\n***图 7-1.** NetBeans 平台内管理数据和文件的架构*\n\
  \n数据系统最初使用 `FileSystem` 类进行抽象。这样，位于其下的物理数据可以以任何形式存在。`FileSystem` 类允许用户以相同的方式处理来自不同来源的物理数据——例如，本地文件系统、XML\
  \ 文件形式的文件系统（类似于系统文件系统的构建方式）或 JAR 文件。只需以所需形式提供抽象类 `FileSystem` 的一个实现即可。这样，文件系统 API\
  \ 就从具体数据中抽象出来，并在应用程序内以虚拟文件系统的形式提供。因此，可以独立于数据来源进行访问。抽象层上以 `FileObject` 类形式存在的抽象数据，尚未包含关于要管理何种数据类型的信息。因此，该层不包含数据特定的逻辑。在此基础之上，逻辑层有数据系统\
  \ API。这里有代表特定类型数据的对象。这些对象基于 `DataObject` 类构建。对于每种所需的数据类型，都存在一个 `DataObject.Factory`，负责创建对象。节点\
  \ API 是该概念中的顶层（它位于表示层）。因此，节点负责数据的类型特定表示。在这方面，`Node` 代表一个 `DataObject`，而 `DataObject`\
  \ 本身负责创建节点。在第 12 章中，我将详细解释如何通过节点和资源管理器来表示你的数据。\n\n### 文件系统 API\n\nNetBeans 平台通过文件系统\
  \ API 提供对文件和文件夹的透明访问。在此过程中，访问非常抽象；无论数据是以虚拟 XML 文件系统（例如系统文件系统）的形式存在，还是位于 JAR 存档或普通目录中，其工作方式都是相同的。文件系统的一般接口在抽象类\
  \ `FileSystem` 中描述。抽象类 `AbstractFileSystem` 实现了文件系统的一些任务。因此，它作为特殊文件系统实现的基类很有用。具体的实现\
  \ `LocalFileSystem`、`JarFileSystem` 和 `XMLFileSystem` 都派生自该类。类 `MultiFileSystem`\
  \ 代表多个文件系统的代理；它主要用作基类。文件系统的类层次结构如图 7-2 所示。\n\n![Image](img/0702.jpg)\n\n***图 7-2.**\
  \ 文件系统的类层次结构*\n\n### 文件对象\n\n文件系统中的文件——目录和文件——由类 `FileObject` 表示。这是 Java 平台 `File`\
  \ 类的一个抽象包装类。`FileObject` 的实现由具体的文件系统提供。除了标准的文件操作外，类 `FileObject` 还提供了监督文件或目录更改的可能性。以下部分将描述类\
  \ `FileObject` 的操作。\n\n\n\n#### 创建\n\n若要在本地文件系统中为现有文件创建 `FileObject`，可通过辅助类 `FileUtil`\
  \ 实现：\n\n`FileObject obj = FileUtil.`**`toFileObject`**`(new File(\"C:/file.txt\"\
  ));`\n\n若要根据具体的 `FileSystem` 对象创建 `FileObject`，可使用 `findResource()` 方法指定完整路径：\n\n\
  `FileSystem fs = …`\n`FileObject obj = fs.`**`findResource`**`(\"folder/file\");`\n\
  \n以下演示如何基于 `File` 对象创建新文件或目录：\n\n`File file   = new File(\"E:/newfolder/newfile.txt\"\
  );`\n`File folder = new File(\"E:/newfolder2\");`\n`FileObject fo1 = FileUtil.`**`createData`**`(file);`\n\
  `FileObject fo2 = FileUtil.`**`createFolder`**`(folder);`\n\n若已拥有一个 `FileObject`\
  \ 形式的目录，可在其文件系统中创建文件或目录，操作如下：\n\n`FileObject folder    = …`\n`FileObject file  \
  \    = folder.`**`createData`**`(\"newfile.txt\");`\n`FileObject subfolder = folder.`**`createFolder`**`(\"\
  newfolder\");`\n\n#### 重命名\n\n若要重命名文件或目录，首先需确保 `FileObject` 不会被随意编辑。这可通过 `FileLock`\
  \ 对象实现。重命名后，需在 `finally` 块中释放该 `FileLock`。\n\n`FileObject myfile = …`\n**`FileLock`**\
  \ `lock = null;`\n`try {`\n`   lock = myfile.`**`lock`**`();`\n`} catch (FileAlreadyLockedException\
  \ e) {`\n`   return;`\n`}`\n`try {`\n`   myfile.`**`rename`**`(lock, \"newfilename\"\
  , myfile.getExt());`\n`} finally {`\n`   lock.`**`releaseLock`**`();`\n`}`\n\n####\
  \ 删除\n\n删除文件或目录非常简单，因为 `delete()` 方法会自动处理 `FileLock` 的预留和打开。因此，删除只需以下一行代码：\n\n`FileObject\
  \ myfile = …`\n`myfile.`**`delete`**`();`\n\n此外，该方法还提供了一个变体，允许像重命名 `FileObject`\
  \ 那样传入自定义的 `FileLock`。\n\n#### 移动\n\n`FileObject` 不能像 `File` 那样通过重命名来移动。`FileUtil`\
  \ 类提供了 `moveFile()` 方法用于移动 `FileObject`。该方法将文件或目录复制到目标目录，删除源文件，并在此过程中自动预留所需的 `FileLock`\
  \ 对象，随后再释放它们。\n\n`FileObject fileToMove = …`\n`FileObject destFolder = …`\n`FileUtil.`**`moveFile`**`(fileToMove,\
  \ destFolder, fileToMove.getName());`\n\n#### 读写数据\n\n与 Java 类似，`FileObject` 的读写通过流来实现。为此，`FileObject`\
  \ 类提供了 `InputStream` 和 `OutputStream`。你可以将它们封装在 `BufferedReader` 中以实现简单高效的读取，以及封装在\
  \ `PrintWriter` 中用于写入，如清单 7-1 所示。\n\n***清单 7-1.** 读写 FileObject*\n\n`FileObject\
  \ myFile = …`\n**`BufferedReader`** `input = new BufferedReader(new InputStreamReader(myFile.`**`getInputStream`**`()));`\n\
  `try {`\n`   String line = null;`\n`   while((line = input.readLine()) != null)\
  \ {`\n`      // 处理该行`\n`} finally {`\n`   input.close();`\n`}`\n**`PrintWriter`**\
  \ `output = new PrintWriter(`\n`   myFile.`**`getOutputStream`**`());`\n`try {`\n\
  `   output.println(\"myfile 的新内容\");`\n`} finally {`\n`   output.close();`\n`}`\n\
  \n你也可以选择将自定义的 `FileLock` 传递给 `getOutputStream()` 方法。\n\n`FileObject` 类本身提供了两个简便方法，用于轻松读取基于文本的\
  \ `FileObject`。一方面，可以使用 `asText()` 方法一次性获取文件的完整内容。另一方面，可以使用 `asLines()` 方法获取包含所有独立行的列表。这两个方法都可以选择将特定的编码（如\
  \ UTF-8）作为参数传入。\n\n`FileObject myFile = …`\n`for (String line : fo.`**`asLines`**`())\
  \ {`\n`   // 处理该行`\n`}`\n\n#### 监控变更\n\n`FileObject` 类使你能够对文件系统中的文件变更做出响应，因为你可以为此注册一个\
  \ `FileChangeListener`，如清单 7-2 所示。\n\n***清单 7-2.** 响应数据对象的变更*\n\n`File file = new\
  \ File(\"E:/NetBeans 7/file.txt\");`\n**`FileObject`** `fo = FileUtil.toFileObject(file);`\n\
  `fo.addFileChangeListener(new` **`FileChangeListener`**`(){`\n`public void` **`fileFolderCreated`**`(FileEvent\
  \ fe) {`\n`   }`\n`public void` **`fileDataCreated``**`(FileEvent fe) {`\n`   }`\n\
  `public void` **`fileChanged`**`(FileEvent fe) {`\n`   }`\n`public void` **`fileDeleted`**`(FileEvent\
  \ fe) {`\n`   }`\n`public void` **`fileRenamed`**`(FileRenameEvent fre) {`\n`  \
  \ }`\n`public void` **`fileAttributeChanged`**`(FileAttributeEvent fae) {`\n`  \
  \ } });`\n\n`fileFolderCreated()` 和 `fileDataCreated()` 方法在创建目录或调用文件时被调用。这些方法仅在所监控的\
  \ `FileObject` 是一个目录时才有意义。当文件发生变更时，事件总是会针对文件本身及其父目录触发。这意味着，即使监控的是父目录，这些方法也会收到数据变更的通知。如果你对\
  \ `FileChangeListener` 接口的所有事件不感兴趣，可以改用适配器类 `FileChangeAdapter`。\n\n![Image](img/square.jpg)\
  \ **注意** 请记住，你只能收到应用程序内对具体 `FileObject` 执行的事件通知。例如，当在应用程序外部（如 Windows 资源管理器）重命名文件时，你将无法收到通知。\n\
  \n`FileSystem`、`FileObject` 和 `FileUtil` 类提供了大量非常有用的方法。因此，仔细查阅文件系统 API 的文档是完全值得的。\n\
  \n\n\n### 数据系统 API\n\n数据系统 API 提供了一个基于文件系统 API 的逻辑层。`FileObject` 管理其数据时不关心数据类型，而\
  \ `DataObject` 则是针对特定类型的 `FileObject` 的包装器。`DataObject` 通过类型特定的特性和功能扩展了 `FileObject`。这些功能由接口或抽象类（即所谓的上下文接口）来指定。功能的实现由\
  \ `DataObject` 通过本地 Lookup 提供。由于这种机制，`DataObject` 的能力可以动态且灵活地调整，并且可以从外部调用。由于 `DataObject`\
  \ 知道其所管理数据的类型，因此它能够相应地表示数据。这意味着，`DataObject` 负责自行创建一个 `Node`，以便在用户界面上相应地表示数据。`DataObject`\
  \ 由专门的 `DataObject.Factory` 创建，该工厂恰好负责一种数据类型。\n\n该系统的连贯性很容易展示。在下面的示例中，三层 API 如何协同工作并相互构建将变得非常清晰。在这方面，NetBeans\
  \ IDE 完成了大量工作并提供了一个向导。\n\n现在，您希望使用此向导向模块中添加一个用于 MP3 文件的数据文件。\n\n1.  为此，请选择“文件”![Image](img/U001.jpg)\
  \ “新建文件…”，然后在“模块开发”类别中选择“文件类型”。\n2.  目前，您可以确定 MIME 类型；在此示例中，输入 `audio/mpeg`。文件类型根据扩展名进行识别；对于\
  \ XML 文件，也可以通过根元素来识别内容的类型。在这里，您希望文件通过扩展名 `mp3` 来识别。因此，您填写此项（参见图 7-3）。您可以选择定义多个文件扩展名，每个扩展名之间用逗号分隔。因此，对于视频文件，`mpg`\
  \ 或 `mpeg` 会是有意义的。\n\n    ![Image](img/0703.jpg)\n\n    ***图 7-3.** 使用 NetBeans\
  \ 向导为 MP3 文件创建新的文件类型*\n\n3.  要进入最后一页，请按“下一步”。输入 `Mp3` 作为类名前缀，并选择一个 16 × 16 像素的图标。\n\
  4.  然后按“完成”按钮，向导将创建数据对象类。\n\n### 数据对象\n\n原则上，数据对象由抽象类 `DataObject` 定义。通常，子类 `MultiDataObject`\
  \ 被用作基类。一方面，它已经实现了 `DataObject` 的大部分抽象方法；这就是为什么您自己的数据对象类保持得非常小巧。另一方面，多数据对象可以包含一个或多个文件对象。一个数据对象总是有一个称为主文件的文件对象。此外，多数据对象可以选择性地包含一个或多个文件，这些文件称为辅助文件。辅助文件通常出现在相关数据中——例如，在表单编辑器中。在编辑器中，文件\
  \ *myform.java、myform.form、myform.class* 由一个数据对象表示。在此示例中，文件 *myform.java* 是主文件，而文件\
  \ *myform.class* 和 *myform.form* 是辅助文件。数据对象内的文件对象由类 `MultiDataObject.Entry` 管理。这里主要使用子类\
  \ `FileEntry`。标准的文件操作（例如移除或删除）通过此类执行。查看由向导创建的类 `Mp3DataObject`，如清单 7-3 所示。\n\n***清单\
  \ 7-3.** 用于文件对象类型 Mp3 的数据对象类。此类为 MP3 文件提供逻辑。*\n\n`import java.io.IOException;`\n\
  `import org.openide.filesystems.FileObject;`\n`import org.openide.loaders.DataNode;`\n\
  `import org.openide.loaders.DataObjectExistsException;`\n`import org.openide.loaders.MultiDataObject;`\n\
  `import org.openide.loaders.MultiFileLoader;`\n`import org.openide.nodes.Node;`\n\
  `import org.openide.nodes.Children;`\n`import org.openide.util.Lookup;`\n\n`public\
  \ class Mp3DataObject extends` **`MultiDataObject`** `{`\n`public` **`Mp3DataObject(FileObject\
  \ pf, MultiFileLoader loader)`**\n`      throws DataObjectExistsException, IOException\
  \ {`\n`      super(pf, loader);`\n`   }`\n`   protected Node createNodeDelegate()\
  \ {`\n`      return new DataNode(this, Children.LEAF, getLookup());`\n`   }`\n`public\
  \ Lookup` **`getLookup`**`() {`\n`      return getCookieSet().getLookup();`\n`   }`\n\
  `}`\n\n正如您已经知道的，数据对象通常由数据对象工厂创建。该工厂负责创建特定的数据对象类型。`Mp3DataObject` 类的构造函数包含两个参数。首先，是主文件，它包含或代表实际的\
  \ MP3 文件。其次，它包含以 `MultiFileLoader` 对象形式存在的工厂实例，该工厂负责该数据对象。您只需将这些参数传递给基类构造函数，由它进行管理。数据对象负责创建相应的节点，因为该对象知道其数据的类型。节点用于在用户界面上表示数据对象。您通过方法\
  \ `createNodeDelegate()` 来实现这一点，该方法创建节点类 `DataNode` 的一个实例并返回。这是与位于表示层的节点 API 的接口（参见图\
  \ 7-1）。您将在第 12 章中了解更多相关信息。\n\n文件对象和数据对象之间的主要区别在于，数据对象知道它包含哪些数据。这意味着数据对象的特征在于能够为此类型的数据（在本例中为\
  \ MP3 文件）提供特性和功能。数据对象为其文件提供的功能由接口或抽象类描述。这些就是上下文接口。这些接口的实例由数据对象在本地 Lookup 中管理。由于这些接口不一定由\
  \ `DataObject` 本身实现，而是由 Lookup 管理，因此数据对象能够动态地提供其能力。这意味着，例如，它可以在运行时提供一个正在播放的 MP3\
  \ 文件。只要 MP3 文件正在播放，就会提供此功能。此外，还可以灵活地用更多功能扩展数据对象。Lookup 本身提供了对这些接口的类型安全访问。\n\n现在，您的\
  \ `Mp3DataObject` 的基本结构已经完成。构造函数通过相应的工厂从较低抽象层获取要管理的文件对象。抽象层为上层表示层提供一个代表，并最终通过 Lookup\
  \ 将其功能提供给环境。基类 `DataObject` 和 `MultiDataObject` 提供了许多用于使用数据对象的方法。在此，查阅 API 文档会非常有帮助。\n\
  \n\n\n#### 实现上下文接口\n\n首先，你需要通过一个接口来指定将接收你的 `Mp3DataObject` 的功能。现在，你应该将其命名为 `PlayInterface`，并指定一个\
  \ `play()` 方法，通过该方法可以播放对应的 `Mp3DataObject`：\n\n`public interface` **`PlayInterface`**\
  \ `{`\n`public void` **`play`**`();`\n`}`\n\n当然，接下来你需要实现通过上下文接口指定的所需功能。你可能会想象直接通过\
  \ `Mp3DataObject` 类来实现该接口；然而，更好的做法是通过一个单独的类，即*支持*类来实现。这样，该功能可以灵活地添加到 `Mp3DataObject`\
  \ 中，也可以再次删除。此外，多个上下文接口可以在语义上分组，并且 `Mp3DataObject` 类可以保持非常小巧。\n\n`public class` **`PlaySupport`**\
  \ `implements` **`PlayInterface`** `{`\n`   private Mp3DataObject mp3 = null;`\n\
  `   public PlaySupport(Mp3DataObject mp3) {`\n`      this.mp3 = mp3;`\n`   }`\n\
  `public void` **`play`**`() {`\n`      System.out.println(\"Play: \" + mp3.getPrimaryFile().getName());`\n\
  `   }`\n`}`\n\n此外，只需将这个支持类的一个实例添加到 `Mp3DataObject` 类的查找（Lookup）中。你可以通过 `getCookieSet().assign()`\
  \ 方法来实现，并在此过程中指明其类型为 `PlayInterface`。当然，你也可以指明 `PlaySupport.class`，但这样做可以使你独立于具体实现。\n\
  \n`public class Mp3DataObject extends` **`MultiDataObject`** `{`\n`public` **`Mp3DataObject(FileObject\
  \ pf, MultiFileLoader loader)`**\n`      throws DataObjectExistsException, IOException\
  \ {`\n`      super(pf, loader);`\n**`getCookieSet().assign(PlayInterface.class,\
  \ new PlaySupport(this));`**\n`   }`\n`}`\n\n最终，你分三步为你的 `Mp3DataObject` 扩展了一个功能。这个功能可以从外部通过\
  \ `getLookup()` 获取的本地查找（Lookup）来使用。\n\n#### 使用上下文接口\n\n最后，问题仍然是如何访问数据对象的功能。我想通过一个上下文感知的动作类来回答这个问题。为此，你需要通过向导创建一个新类，路径为\
  \ *文件* ![Image](img/U001.jpg) *新建文件*… ![Image](img/U001.jpg) *模块开发* ![Image](img/U001.jpg)\
  \ *动作*。现在，你使用 `Mp3DataObject` 作为上下文。这样，只有当选中了一个 `Mp3DataObject`（即其节点）时，该动作才会变为可用。正如你从第\
  \ 6 章已经了解到的，上下文会被传递到上下文感知类的构造函数中：\n\n`public final class MyContextAction implements\
  \ ActionListener {`\n`private final` **`Mp3DataObject context`**`;`\n`    public\
  \ MyContextAction(`**`Mp3DataObject context`**`) {`\n`        this.context = context;`\n\
  `    }`\n`public void` **`actionPerformed`**`(ActionEvent ev) {`\n`        // 对上下文执行某些操作`\n\
  `PlayInterface p =` **`context.getLookup().Lookup(PlayInterface.class);`**\n`        p.play();`\n\
  `    }`\n`}`\n\n现在，如果在你的应用程序中选中了一个 `Mp3DataObject`，该上下文感知动作就会通过 NetBeans 平台自动变为可用。然后，你可以在\
  \ `actionPerformed()` 方法中访问上下文，即 `Mp3DataObject` 实例。正如你已经知道的，数据对象的特性是在一个查找（Lookup）中管理的。因此，你获取这个查找，并通过\
  \ `Lookup()` 方法提供 `PlayInterface` 的实现。现在，你可以访问 `PlaySupport` 类的实现，并执行其方法。\n\n你可以通过\
  \ *收藏夹* 模块来测试所有内容。\n\n1.  为此，请确保在你的 NetBeans 平台应用程序中，在 *属性* ![Image](img/U001.jpg)\
  \ *库* 下的平台集群中激活了“收藏夹”模块。\n2.  接下来，启动你的应用程序，并通过 *窗口* ![Image](img/U001.jpg) *收藏夹*\
  \ 打开“收藏夹”窗口。\n3.  右键单击该窗口，然后选择 *添加到收藏夹*。\n4.  然后，在选择对话框中选择一个 MP3 文件或一个包含 MP3 文件的目录，然后按\
  \ *添加* 将选中的条目添加到“收藏夹”窗口中。显示的 MP3 文件由一个数据节点实例表示，该实例是由 `Mp3DataObject` 本身创建的。当你将 MP3\
  \ 文件添加到“收藏夹”窗口时，该对象由一个数据加载器创建。\n\n如果你选中了一个 MP3 文件，然后执行该动作——查看 `play()` 方法的输出——你会看到，你可以通过该动作的上下文类直接访问选中的数据。\n\
  \n\n\n#### 动态提供上下文接口\n\n在下面的示例（清单 7-4）中，我将向你展示如何在应用程序运行期间更改 `Mp3DataObject` 提供的功能。通过这种方式，你还可以隐式控制用户可用的操作。你已经为播放\
  \ MP3 文件创建了一个上下文接口和一个支持类。现在，你希望将同样的方法应用于停止 MP3 文件。此外，支持类和 `playing()` 方法现在会设置 `Mp3DataObject`\
  \ 的当前播放状态。\n\n***清单 7-4.** 用于播放 Mp3DataObject 的上下文接口和支持类*\n\n`public interface`\
  \ **`PlayInterface`** `{`\n`   public void play();`\n`}`\n`public class` **`PlaySupport`**\
  \ `implements` **`PlayInterface`** `{`\n`   private Mp3DataObject mp3 = null;`\n\
  `   public PlaySupport(Mp3DataObject mp3) {`\n`      this.mp3 = mp3;`\n`   }`\n\
  `public void` **`play`**`() {`\n`       System.out.println(\"play\");`\n`       mp3.playing(true);`\n\
  `    }`\n`}`\n`public interface` **`StopInterface`** `{`\n`   public void stop();`\n\
  `}`\n`public class` **`StopSupport`** `implements` **`StopInterface`** `{`\n`   private\
  \ Mp3DataObject mp3 = null;`\n`   public StopSupport(Mp3DataObject mp3) {`\n`      this.mp3\
  \ = mp3;`\n`   }`\n`public void` **`stop`**`() {`\n`      System.out.println(\"\
  stop\");`\n`      mp3.playing(false);`\n`  }`\n`}`\n\n你在构造函数中创建这两个支持类。首先，你可以假设 MP3\
  \ 文件未被播放，因此你使用 `assign()` 方法将 `PlaySupport` 添加到 Lookup 中。你更改了上下文接口中的内容。你在 `playing()`\
  \ 方法中执行此操作，该方法由支持类通过相应的参数调用。如果文件正在播放，则仅通过将类型 `PlayInterface` 而不传递任何实例传递给 `assign()`\
  \ 方法来删除该类型的所有实例，并添加一个 `StopInterface` 的实例（参见清单 7-5）。如果文件停止，则反之亦然。\n\n***清单 7-5.**\
  \ 动态添加和删除上下文接口的实例*\n\n`public class` **`Mp3DataObject`** `extends MultiDataObject\
  \ {`\n**`private PlaySupport playSupport = null;`**\n**`private StopSupport stopSupport\
  \ = null;`**\n`   public Mp3DataObject(FileObject pf, MultiFileLoader loader)`\n\
  `      throws DataObjectExistsException, IOException {`\n`      super(pf, loader);`\n\
  **`playSupport = new PlaySupport(this);`**\n**`stopSupport = new StopSupport(this);`**\n\
  `      getCookieSet().assign(PlayInterface.class, playSupport);`\n`   }`\n`public\
  \ synchronized void` **`playing`**`(boolean value) {`\n`      if(value) {`\n**`getCookieSet().assign(PlayInterface.class);`**\n\
  **`getCookieSet().assign(StopInterface.class, stopSupport);`**\n`      } else {`\n\
  **`getCookieSet().assign(StopInterface.class);`**\n**`getCookieSet().assign(PlayInterface.class,\
  \ playSupport);`**\n`      }`\n`   }`\n`}`\n\n为了完善这个示例，你还需要另外两个操作类，用于启动和停止 MP3 文件。这两个类应该是\
  \ `ContextAware` 类，它们使用 `PlayInterface` 和 `StopInterface` 作为上下文。然后，菜单或工具栏条目会根据所选\
  \ MP3 文件提供的上下文接口或支持类自动激活或停用（参见清单 7-6）。\n\n***清单 7-6.** 上下文敏感操作，当所选 Mp3DataObject\
  \ 提供相应上下文接口的实例时激活*\n\n`public final class` **`PlayAction`** `implements ActionListener\
  \ {`\n`   private final PlayInterface context;`\n`   public PlayAction(`**`PlayInterface\
  \ context`**`) {`\n`      this.context = context;`\n`   }`\n`   @Override`\n`   public\
  \ void actionPerformed(ActionEvent ev) {`\n**`context.play();`**\n`   }`\n`}`\n\
  `public final class` **`StopAction`** `implements ActionListener {`\n`   private\
  \ final StopInterface context;`\n`   public StopAction(`**`StopInterface context`**`)\
  \ {`\n`      this.context = context;`\n`   }`\n`   @Override`\n`   public void actionPerformed(ActionEvent\
  \ ev) {`\n**`context.stop();`**\n`   }`\n`}`\n\n#### 数据对象工厂\n\n数据对象由数据对象工厂创建。一个工厂只负责一种类型。工厂可以通过文件后缀或\
  \ XML 根元素来识别文件类型。工厂在层中注册，并由 NetBeans 平台自动创建，该平台管理所有现有的工厂，并能为相应的文件类型找到对应的文件。工厂由接口\
  \ `DataObject.Factory` 指定。类 `MultiFileLoader` 代表了一个默认使用的实现（参见清单 7-6）。\n\n负责创建 `Mp3DataObject`\
  \ 类型数据对象的工厂也已由 NetBeans 向导在层文件中注册。查看层文件（清单 7-7）可以了解此类工厂注册是如何构建的。\n\n***清单 7-7.**\
  \ 在层文件中注册数据对象工厂*\n\n`<folder name=\"`**`Loaders`**`\">`\n`   <folder name=\"audio\"\
  >`\n`      <folder name=\"mpeg\">`\n`         <folder name=\"`**`Factories`**`\"\
  >`\n`            <file name=\"`**`Mp3DataLoader`**`.instance\">`\n`               <attr\
  \ name=\"`**`SystemFileSystem.icon`**`\" urlvalue=`\n`                \"nbresloc:/com/galileo/netbeans/module/mp3.png\"\
  />`\n`               <attr name=\"`**`dataObjectClass`**`\" stringvalue=`\n`                \"\
  com.galileo.netbeans.module.`**`Mp3DataObject`**`\"/>`\n`               <attr name=\"\
  `**`instanceCreate`**`\" methodvalue=`\n`                \"org.openide.loaders.DataLoaderPool.factory\"\
  />`\n`               <attr name=\"`**`mimeType`**`\" stringvalue=\"`**`audio/mpeg`**`\"\
  />`\n`            </file>`\n`         </folder>`\n`      </folder>`\n`   </folder>`\n\
  `</folder>`\n\n在标准文件夹 `Loaders` 下，根据定义的 MIME 类型（本例中为 `audio/mpeg`）创建子文件夹。在这些子文件夹下是标准文件夹\
  \ `Factories`，我们的特殊数据对象工厂以名称 `Mp3DataLoader.instance` 在其中注册。通过属性 `SystemFileSystem.icon`\
  \ 指定了此文件类型的图标。通过属性 `mimeType` 和 `dataObjectClass`，你可以确定工厂应为哪种数据类型生成哪种数据对象类型。这意味着，这里只确定了\
  \ MIME 类型，而不是文件后缀。此确定也在层文件的标准文件夹 `Services/MIMEResolver` 中进行。最后，通过方法 `DataLoaderPool.factory()`\
  \ 创建了现已注册的、用于你的 `Mp3DataObject` 类的特殊工厂。\n\n当你在本章开头创建 MP3 文件类型时，NetBeans 向导除了创建 `Mp3DataObject`\
  \ 类之外，还创建了文件 *Mp3Resolver.xml*。此文件确定文件扩展名 *.mp3* 被分配给 MIME 类型 `audio/mpeg`（参见清单\
  \ 7-8）。\n\n***清单 7-8.** MIME 解析器文件*\n\n`<!DOCTYPE MIME-resolver PUBLIC`\n`   \"\
  -//NetBeans//DTD MIME Resolver 1.0//EN\"`\n`   \"http://www.netbeans.org/dtds/mime-resolver-1_0.dtd\"\
  >`\n`<MIME-resolver>`\n`   <file>`\n`      <ext name=\"mp3\"/>`\n`      <resolver\
  \ mime=\"audio/mpeg\"/>`\n`   </file>`\n`</MIME-resolver>`\n\n此文件也在层文件中注册。为此，使用了前面提到的标准文件夹\
  \ `Services/MIMEResolver`，如清单 7-9 所示。\n\n***清单 7-9.** MIME 类型的注册*\n\n`<folder name=\"\
  `**`Services`**`\">`\n`   <folder name=\"`**`MIMEResolver`**`\">`\n`      <file\
  \ name=\"`**`Mp3Resolver.xml`**`\" url=\"Mp3Resolver.xml\">`\n`         <attr name=\"\
  displayName\" bundlevalue=`\n`               \"com.galileo.netbeans.module.Bundle#Services/MIMEResolver/Mp3Resolver.xml\"\
  />`\n`      </file>`\n`   </folder>`\n`</folder>`\n\n\n\n#### 手动创建数据对象\n\n通常，数据对象无需显式创建，而是由工厂按需生成。不过，你也可以通过\
  \ `DataObject` 类的静态 `find()` 方法，为给定的 `FileObject` 创建一个 `DataObject`：\n\n`FileObject\
  \ myFile = …`\n`try {`\n`   DataObject obj = DataObject.`**`find`**`(myFile);`\n\
  `} catch(DataObjectNotFoundException ex) {`\n`   // 没有适用于此文件类型的加载器`\n`}`\n\n在此过程中，会传入\
  \ `FileObject`。系统会为其文件类型查找工厂。如果找到，工厂会创建一个 `DataObject` 并返回。否则，若没有为该文件类型注册工厂，则会抛出\
  \ `DataObjectNotFoundException`。\n\n### 总结\n\n在本章中，你了解了 NetBeans 四大 API 中的两个及其依赖关系。我们通过一个\
  \ MP3 文件的示例来学习这些内容。在这四个 API 中，文件系统 API 位于最底层，作为任何类型数据的通用抽象层。在此基础上，数据系统 API 处理与文件系统\
  \ API 抽象出的数据相关的逻辑；例如，你可以使用数据系统 API 将 MP3 文件与播放它的功能连接起来。\n\n## 第 8 章\n\n## 技巧与窍门\n\
  \n本章将涵盖两个具有普遍重要性的主题。第一部分将向你介绍如何在特定的 NetBeans 平台生命周期事件上执行任务。第二部分将探讨在 NetBeans 平台应用程序中通常如何进行日志记录。\n\
  \n### NetBeans 平台的生命周期\n\nNetBeans 平台提供了多种机会来响应生命周期的某些事件，并自行触发这些事件。\n\n#### 平台启动时的任务\n\
  \nNetBeans 平台提供了一个名为 `WarmUp` 的扩展点，用于在启动应用程序时执行异步任务：\n\n`<folder name=\"`**`WarmUp`**`\"\
  >`\n`   <file name=\"com-galileo-netbeans-module-MyWarmUpTask.instance\"/>`\n`</folder>`\n\
  \n你可以在层文件中将任何实例（实现 `Runnable` 接口）添加到此扩展点：\n\n`public class MyWarmUpTask implements`\
  \ **`Runnable`**`{`\n`public void` **`run`**`() {`\n`      // 在应用程序启动时执行某些操作`\n\
  `   }`\n`}`\n\n关键任务——例如，作为模块启动条件所必需的任务——绝不能在此处启动。这些任务在应用程序启动时异步执行，这意味着无法保证任务何时开始或结束。在这种情况下，应使用模块安装程序（参见第\
  \ 3 章）。\n\n#### 平台结束时的任务\n\n当 NetBeans 平台应用程序关闭时，所有用户特定的设置（例如关于打开的 `top component`\
  \ 的信息、应用程序窗口大小和工具栏）都会保存到应用程序用户目录。此外，所有实现了模块安装程序的模块（参见第 3 章）都会被询问是否允许关闭应用程序。因此，应用程序不仅仅是关闭，而是被妥善地关闭。通常，应用程序是通过菜单或标题栏中的关闭按钮来关闭的。在某些情况下，你可能需要通过编程方式关闭应用程序。例如，如果在登录对话框中输入了错误数据，并且应用程序应该被关闭，这可能是一个选项。在这种情况下，你不能也不应该——像\
  \ Java 应用程序通常所做的那样——使用 `System.exit()` 来关闭应用程序。关闭应用程序的过程由 Utilities API 中的全局服务 `LifecycleManager`\
  \ 指定。NetBeans `Core` 模块为此提供了一个服务提供者，负责执行前面提到的任务。可以通过调用 `getDefault()` 方法来获取 `LifecycleManager`\
  \ 的这个标准实现。通过调用以下代码行来关闭应用程序：\n\n`LifecycleManager.getDefault().exit();`\n\n由于此 `LifecycleManager`\
  \ 是作为服务实现的，你可以提供此抽象类的自定义实现。这并不意味着 NetBeans 平台的标准实现不再可用——你只需调用它即可。这样，就可以在应用程序关闭时执行自定义任务。清单\
  \ 8-1 演示了如何在执行自定义任务后调用标准实现并妥善关闭应用程序。\n\n***清单 8-1.** 一个自定义的 LifecycleManager 实现，它调用了标准实现*\n\
  \n`import org.openide.LifecycleManager;`\n\n`public class MyLifecycleManager extends`\
  \ **`LifecycleManager`** `{`\n`   @Override`\n`public void` **`saveAll`**`() {`\n\
  `      for(LifecycleManager manager :`\n`         Lookup.getDefault().lookupAll(LifecycleManager.class))\
  \ {`\n`         if(manager != this) { /* 跳过我们自己的实例 */`\n**`  manager.saveAll();`**\n\
  `         }`\n`      }`\n`   }`\n`   @Override`\n`   public void` exit`() {`\n`      //\
  \ 执行应用程序特定的关闭任务`\n`      for(LifecycleManager manager :`\n`         Lookup.getDefault().lookupAll(LifecycleManager.class))\
  \ {`\n`         if(manager != this) { /* 跳过我们自己的实例 */`\n**`manager.exit();`**\n\
  `         }`\n`      }`\n`   }`\n`}`\n\n此实现必须注册为服务提供者。需要注意的是，必须声明一个位置，以确保自定义实现首先被\
  \ Lookup 传递和调用。如果不这样做，则只会调用标准的 `LifecycleManager`。我们使用以下注解注册该类：\n\n`@ServiceProvider(service=LifecycleManager.class,\
  \ position=1)`\n\n#### 平台重启\n\n你不仅可以通过 NetBeans 平台的生命周期管理器结束应用程序，还可以重启它。为此，`LifecycleManager`\
  \ 类提供了 `markForRestart()` 方法。如果在结束之前调用此方法，则会实现重启：\n\n`LifecycleManager.getDefault().`\
  \ **`markForRestart`**`();`\n`LifecycleManager.getDefault().exit();`\n\n### 日志记录\n\
  \n日志记录是一个非常重要且有用（但经常被忽视）的主题。日志记录是记录状态、警告和错误消息的做法。NetBeans 平台中的日志记录基于 Java 日志记录 API。\n\
  \n#### 日志记录器\n\n日志输出由日志记录 API 使用 `Logger` 对象记录。通常，不同的 `Logger` 实例用于特定的组件。你可以通过工厂方法\
  \ `getLogger()` 获取 `Logger` 的实例。你也可以使用全局日志记录器，但应尽可能使用命名的、特定于组件的日志记录器。这样，不同的日志记录器可以单独打开或关闭，这在查找错误时非常有用。通过以下调用获取命名的日志记录器：\n\
  \n`Logger log = Logger.`**`getLogger`**`(MyClass.class.`**`getName`**`());`\n\n\
  通常，创建日志输出的类的完整名称被用作日志记录器的名称。此名称通过 `Class` 方法 `getName()` 获取。如果已存在此名称的日志记录器，则返回该日志记录器。可以使用名称\
  \ `Logger.GLOBAL_LOGGER_NAME` 获取全局日志记录器。\n\n使用 `Logger` 类中的 `log()` 方法记录（指定 `Level`\
  \ 的）日志输出。`Level` 类中提供了以下日志级别：\n\n*   `FINEST`\n*   `FINER`\n*   `FINE`\n*   `CONFIG`\n\
  *   `INFO`\n*   `WARNING`\n*   `SEVERE`\n\n为方便起见，还提供了 `finest()`、`finer()`、`fine()`、`config()`、`info()`、`warning()`\
  \ 和 `severe()` 方法；这些方法在声明的级别记录给定的消息。\n\n\n\n#### 日志管理器\n\nJava 日志记录 API 指定了一个中央\
  \ `LogManager`。该管理器控制着一个包含所有已命名日志记录器的分层命名空间。因此，使用类的完整名称（包含分层包结构）作为日志记录器名称是合理的。要访问此管理器，请使用以下代码：\n\
  \n**`LogManager`** `manager = LogManager.`**`getDefault`**`();`\n\n`LogManager`\
  \ 提供了所有日志记录器的名称。因此，你可以检测到 NetBeans 平台日志记录器的名称，例如，其级别可能因调试目的而更改。所有日志记录器的列表可以通过以下方式检索：\n\
  \n**`LogManager`** `manager = LogManager.`**`getLogManager`**`();`\n`for(String\
  \ name : Collections.list(manager.`**`getLoggerNames`**`())) {`\n`   System.out.println(name);`\n\
  `}`\n\n#### 配置\n\n除了日志记录器，管理器还管理配置文件，这些文件最初是从 Java 平台目录中的 `lib/logging.properties`\
  \ 文件加载的。你可以通过将特定配置文件的文件名设置为系统属性 `java.util.logging.config.file`，从该文件加载特殊配置文件。配置数据也可以从数据库加载，例如。为此，需要实现一个从数据库提取数据的类。然后，使用系统属性\
  \ `java.util.logging.config.class` 注册此类。注册后，该类会被自动实例化。在此类中，你通过 `InputStream` 为 `LogManager`\
  \ 提供配置数据，用于 `LogManager` 方法的 `readConfiguration(InputStream)`。\n\n在配置文件中注册 `Handler`\
  \ 实现，以便它们将日志数据输出到控制台（`ConsoleHandler`）或文件（`FileHandler`）。你可以注册自己的实现，例如 NetBeans\
  \ 平台中用于以图形方式显示日志消息的处理程序。日志记录系统自带一个根日志记录器。所有其他日志记录器将其日志转发给此根日志记录器。为根日志记录器注册一个处理程序，使用以下属性：\n\
  \n**`handlers`** `= java.util.logging.ConsoleHandler`\n\n可以使用逗号列出多个处理程序。要禁用向根日志记录器转发日志，请使用以下方式：\n\
  \n`<logger name>.`**`useParentHandlers`** `= false`\n\n在这种情况下，你可以或必须为此日志记录器专门定义一个处理程序，以便获取日志输出：\n\
  \n`<logger name>.`**`handlers`** `= java.util.logging.FileHandler`\n\n最后，在配置中设置日志级别很重要。日志级别定义了记录哪种类型的日志。这样，你可以在查找错误时隐藏简单的状态消息，仅显示警告和错误消息。一方面，你可以使用以下功能全局定义日志级别：\n\
  \n`.level = WARNING`\n\n另一方面，你可以通过使用日志记录器的名称作为前缀来覆盖单个日志记录器的日志级别：\n\n`<logger name>.level\
  \ = INFO`\n\n配置数据不仅可以在配置文件中设置，还可以作为系统属性设置。在运行时使用 `System.setProperty()` 方法进行设置。这样做时，请确保调用\
  \ `LogManager` 的 `readConfiguration()` 方法以应用新的配置数据。或者，在应用程序启动时使用命令行参数确定配置。在 NetBeans\
  \ 中开发时，在 *Project Properties* 文件（位于 *Important Files* 下）中使用属性 `run.args.extra` 设置模块套件的启动参数。例如，使用以下内容：\n\
  \n**`run.args.extra`** `= -J-Dcom.galileo.netbeans.myclass.level=INFO`\n\n为了分发你的应用程序，请使用\
  \ *etc/<application>.conf* 文件中的属性 `default_options` 设置命令行参数。\n\n##### 错误报告\n\nNetBeans\
  \ 平台实现并注册了一个特殊的日志处理程序，该程序在对话框中向用户显示记录的错误消息。因此，请使用 `SEVERE` 或 `WARNING` 日志级别，并将 `Exception`\
  \ 直接传递给 `log()` 方法。\n\n`Logger` **`logger`** `= Logger.getLogger(MyClass.class.getName());`\n\
  `try {`\n`   ...`\n`} catch(Exception e) {`\n`   logger.`**`log`**`(Level.`**`SEVERE`**`,\
  \ null, e);`\n`   // 或者`\n`   logger.`**`log`**`(Level.`**`WARNING`**`, null, e);`\n\
  `}`\n\n### 总结\n\n在本章中，你学习了如何在 NetBeans 平台应用程序启动和完成时执行任务。你可以将任何 `Runnable` 实例注册为任务。你还可以使用生命周期管理器重新启动应用程序。本章的第二部分涉及日志记录这一重要主题，包括不同类型的日志输出以及如何配置它们。\n\
  \n## 第二部分\n\n## 外观与体验：开发用户界面\n\n## 第 9 章\n\n## 菜单栏和工具栏\n\n除了管理自己的窗口、状态栏和进度条之外，NetBeans\
  \ 平台应用程序的应用程序窗口默认还管理菜单栏和工具栏。以下部分将介绍如何使用菜单栏和工具栏。\n\n![Image](img/square.jpg) **提示**\
  \ 使用 NetBeans 平台 7，菜单、菜单项和工具栏操作的创建和注册已大大简化。结合第 6 章中描述的操作注解，可以轻松创建菜单项和工具栏操作。\n\n\
  ### 菜单栏\n\n基于 NetBeans 平台的应用程序的菜单栏由平台本身通过系统文件系统构建。每个菜单（以及菜单项）都在模块层文件中定义。这允许每个模块以声明方式将其菜单项添加到菜单栏。使用\
  \ NetBeans 平台 7，这甚至更加简单。只需实现选择菜单项时执行的操作；这样，该操作会附带一个注解，相应的层条目会自动从这些注解中创建。\n\n在第 6\
  \ 章中，你学习了如何创建和注解操作类。在本节中，你将学习如何将操作集成到菜单栏中。\n\n\n\n#### 创建菜单位置与菜单项\n\n使用 NetBeans\
  \ IDE 的操作向导创建操作时（参见第 6 章），你可以通过向导图形界面轻松将其分配到菜单并定位到所需位置。为了让你了解后台实际发生的过程——以便日后修改或脱离\
  \ NetBeans IDE 支持也能独立操作——我将详细解释为自定义操作创建菜单项的方法。\n\n例如，假设你想在*编辑*菜单中添加一个菜单项。为此，请使用第\
  \ 6 章中“始终启用的操作”一节提到的简单操作类。你尚未将该操作分配到菜单或工具栏——到目前为止，我们忽略了由操作向导自动创建的 `ActionReferences`\
  \ 注解。现在，你需要使用这个注解将操作分配到菜单（参见清单 9-1）。\n\n***清单 9-1.** 使用注解将操作分配到菜单*\n\n`@ActionID(`\n\
  `    category = \"Edit\",`\n`    id = \"com.galileo.netbeans.module.MyFirstAction\"\
  )`\n`@ActionRegistration(`\n`    iconBase = \"com/galileo/netbeans/module/icon.png\"\
  ,`\n`    displayName = \"#CTL_MyFirstAction\")`\n**`@ActionReferences`**`({`\n**`@ActionReference`**`(`\n\
  `        path = \"Menu/Edit\",`\n`        position = 1200)`\n`})`\n`public final\
  \ class MyFirstAction implements ActionListener {`\n`    public void actionPerformed(ActionEvent\
  \ e) {`\n`        // TODO implement action body`\n`    }`\n`}`\n\n在清单 9-1 中，你可以看到\
  \ `ActionReferences` 注解是一个分配列表。每次分配通过 `ActionReference` 注解完成。使用 `path` 属性指定操作显示的位置。`Menu`\
  \ 是系统文件系统中的一个标准文件夹，用于管理应用程序的完整菜单栏。菜单由 `Menu/` 后面的名称决定。在此示例中，操作显示在 `Edit` 菜单中。菜单项的名称由操作本身决定，即\
  \ `displayName` 确定的值。此外，使用 `position` 属性定义操作在菜单中的位置。\n\n清单 9-2 展示了此注解的效果：在创建软件时，会在层文件中生成一个对应的条目。如果你不想使用注解，也可以自行创建此条目，从而将操作分配到菜单。\n\
  \n***清单 9-2.** 通过直接层条目将操作分配到菜单*\n\n`<filesystem>`\n`  <folder name=\"`**`Menu`**`\"\
  >`\n`    <folder name=\"`**`Edit`**`\">`\n`      <file name=\"`**`MyFirstAction.shadow`**`\"\
  >`\n`        <attr name=\"originalFile\"`\n`         stringvalue=\"Actions/Edit/com-galileo-netbeans-module-`**`MyFirstAction.instance`**`\"\
  />`\n`        <attr name=\"position\" intvalue=\"1200\"/>`\n`      </file>`\n`    </folder>`\n\
  `  </folder>`\n`</filesystem>`\n\n你使用标准文件夹 `Menu` 中的 `folder` 元素分配了 `Edit` 菜单。菜单项通过\
  \ `file` 元素添加。接着，通过 `originalFile` 属性引用操作类，该类必须在标准文件夹 `Actions` 中定义。由于模块系统会合并所有层文件，因此所有在\
  \ `Edit` 文件夹下设置的模块菜单项都会显示在*编辑*菜单中。因此，菜单仅通过 `folder` 元素的定义创建。至此，你已经创建了第一个菜单项。到目前为止，我们假设\
  \ *Edit* 菜单已经存在。但情况并非必须如此。由于菜单无需显式应用，它们由 NetBeans 平台自动创建。这样，你可以轻松创建任意组合的菜单。例如，要将上述操作移动到\
  \ *Edit* 的子菜单中，只需修改 `ActionReference` 注解的 `path` 属性：\n\n`@ActionReference(`\n`    path\
  \ = \"Menu/Edit/`**`My Submenu`**`\",`\n`    position = 1200)`\n\n这会在层文件中生成另一个文件夹\
  \ `My Submenu`，用于表示子菜单的内容，如清单 9-3 和图 9-1 所示。\n\n***清单 9-3.** 创建子菜单*\n\n`<folder\
  \ name=\"`**`Menu`**`\">`\n`  <folder name=\"`**`Edit`**`\">`\n`    <folder name=\"\
  `**`My Submenu`**`\">`\n`      <file name=\"MyFirstAction.shadow\">`\n`        <attr\
  \ name=\"originalFile\"`\n`         stringvalue=\"Actions/Edit/com-galileo-netbeans-module-MyFirstAction.instance\"\
  />`\n`        <attr name=\"position\" intvalue=\"1200\"/>`\n`      </file>`\n`    </folder>`\n\
  `  </folder>`\n`</folder>` ![Image](img/0901.jpg)\n\n***图 9-1.** 菜单 ![Image](img/U001.jpg)\
  \ 子菜单 ![Image](img/U001.jpg) 菜单项*\n\n你可以在运行应用程序之前，在层树中查看菜单或菜单项的顺序（参见第 3 章）。在前面的示例中，你学习了如何通过\
  \ `position` 属性（使用 `ActionReference` 注解或直接在层文件中）确定菜单项的位置。由于菜单和子菜单在创建菜单项时会隐式应用，因此无法通过注解确定顺序。因此，当分配一个需要精确定位的新菜单或子菜单时，你必须在层文件中使用该菜单之前先进行分配。在那里，你可以像清单\
  \ 9-4 所示那样确定位置。更多信息请参见第 3 章。\n\n***清单 9-4.** 确定菜单或子菜单的位置*\n\n`<folder name=\"`**`Menu`**`\"\
  >`\n`  <folder name=\"`**`Edit`**`\">`\n`    <folder name=\"`**`My Submenu`**`\"\
  >`\n`      <attr name=\"position\" intvalue=\"800\"/>`\n`    </folder>`\n`  </folder>`\n\
  `</folder>`\n\n#### 插入分隔符\n\n在使用 `ActionReference` 注解定义菜单项时，你可以确定显示在菜单项之间的分隔符。为此，提供了\
  \ `separatorBefore` 和 `separatorAfter` 属性。这需要你输入它们的绝对位置。要在清单 9-1 的示例菜单项前添加分隔符，请按清单\
  \ 9-5 所示扩展操作的注解。\n\n***清单 9-5.** 通过注解属性添加分隔符*\n\n`@ActionReference(`\n`    path\
  \ = \"Menu/Edit\",`\n`    position = 1200,`\n**`separatorBefore = 1190`**`)`\n\n\
  此外，还可以直接在层文件中定义分隔符。与上一个示例类似，层条目将如清单 9-6 所示。\n\n***清单 9-6.** 通过层条目添加分隔符*\n\n`<folder\
  \ name=\"Menu\">`\n`  <folder name=\"Edit\">`\n`    <folder name=\"My Submenu\"\
  >`\n`      <file name=\"MyFirstAction.shadow\"> ... </file>`\n**`<file name=\"MyFirstAction-separatorBefore.instance\"\
  >`**\n**`<attr name=\"instanceCreate\" newvalue=\"javax.swing.JSeparator\"/>`**\n\
  **`<attr name=\"position\" intvalue=\"1190\"/>`**\n**`</file>`**\n`    </folder>`\n\
  `  </folder>`\n`</folder>`\n\n\n\n#### 隐藏现有菜单项\n\n您也可以隐藏现有的菜单或菜单项，这些菜单项可能来自平台模块，也可能由其他应用程序模块添加。由于层级树的存在，这非常容易实现。为此，请在您的模块中打开文件夹\
  \ *重要文件 ![Image](img/U001.jpg) XML 层级 ![Image](img/U001.jpg) <上下文中的此层级>*。您定义的条目以及来自应用程序其他模块或平台模块的条目都会显示在此处。在\
  \ *菜单栏* 文件夹下方，您可以看到所有菜单和菜单项。在此处选择所需的条目，并通过上下文菜单将其删除。它们实际上并不会被删除，而只是在您的层级文件中被设置为不可见，假设您删除了\
  \ *视图* 菜单和菜单项 *编辑* ![Image](img/U001.jpg) *查找*…。在这种情况下，清单 9-7 中的条目会被添加到您的层级文件中。\n\
  \n***清单 9-7.** 隐藏菜单项*\n\n`<folder name=\"Menu\">`\n`  <folder name=\"View`**`_hidden`**`\"\
  />`\n`  <folder name=\"Edit\">`\n`    <file name=\"org-openide-actions-FindAction.shadow`**`_hidden`**`\"\
  />`\n`  </folder>`\n`</folder>`\n\n因此，后缀 `_hidden` 被添加到相应的条目中。如果您现在想重新添加一个已删除（即已隐藏）的条目，只需从您的层级文件中移除该后缀即可。\n\
  \n#### 快捷键和助记符\n\n快捷键在层级文件中集中定义和管理。这就是标准文件夹 `Shortcuts` 存在的原因。快捷键由 `file` 元素定义，并在中央\
  \ `Actions` 文件夹中作为属性引用到某个操作类。因此，快捷键不是为菜单项创建的，而是为操作创建的。一个快捷键由一个或多个修饰键和一个标识符组成，它们之间用减号分隔：\n\
  \n`modifier-identifier`\n\n以下键可用作修饰键，在层级文件中由一个字母（代码）表示：\n\n*   C – (Ctrl)\n*   A\
  \ – (Alt)\n*   S – (Shift)\n*   M – (Cmd)/(Meta)\n\n此外，还有两个通配符代码，用于确保快捷键与操作系统无关；应使用这些代码：\n\
  \n*   D – (Ctrl) 或 (Cmd)/(Meta) (在 Mac OS 上)\n*   O – (Alt) 或 (Ctrl) (在 Mac OS 上)\n\
  \n所有由 Java 类 `KeyEvent` 定义的常量都可用作标识符。例如，对于 `KeyEvent.VK_M`，只需省略前缀 `VK_`，因此标识符就是\
  \ `M`。\n\n如本节开头所述，快捷键在层级文件中进行管理，尽管您可以通过 `ActionReference` 注解以简单的方式创建它们。这意味着，创建快捷键类似于创建菜单项。例如，要为操作\
  \ `MyFirstAction` 使用快捷键 (Ctrl) + (M)，您可以添加 清单 9-8 中所示的注解。\n\n***清单 9-8.** 使用注解定义快捷键*\n\
  \n`@ActionID(`\n`   category = \"Edit\",`\n`   id = \"com.galileo.netbeans.module.MyFirstAction\"\
  )`\n`@ActionRegistration(`\n`   iconBase = \"com/galileo/netbeans/module/icon.png\"\
  ,`\n`   displayName = \"#CTL_MyFirstAction\")`\n`@ActionReferences({`\n`    @ActionReference(path\
  \ = \"Menu/Edit\", position = 100),`\n**`@ActionReference(path = \"Shortcuts\",\
  \ name = \"D-M\")`**\n`})`\n`public final class MyFirstAction implements ActionListener\
  \ {`\n`   ... }`\n\n此注解会生成如 清单 9-9 所示的层级条目。这意味着，在定义快捷键时，如果您不想使用代表首选方式的注解，可以选择直接使用层级条目（参见\
  \ 清单 9-9）。\n\n***清单 9-9.** 在层级文件中定义快捷键*\n\n`<folder name=\"`**`Shortcuts`**`\">`\n\
  `   <file name=\"`**`D-M`**`.shadow\">`\n`      <attr name=\"originalFile\"`\n`            stringvalue=\"\
  Actions/Edit/com-galileo-netbeans-module-MyFirstAction.instance\"/>`\n`    </file>`\n\
  `</folder>`\n\n在此上下文中，查看 `Utilities.keyToString()` 和 `Utilities.stringToKey()` 函数的\
  \ Javadoc 可能会有所帮助，这些函数用于编码快捷键。表 9-1 中列出了一些可能的组合作为示例。如果您不确定某个特定键的拼写，也可以使用操作向导（参见第\
  \ 6 章）。\n\n![Image](img/t0901.jpg)\n\n助记符是通过在操作名称中相应字符前设置一个 & 符号 (&) 直接插入的。这也可以在操作类或属性文件中进行：\n\
  \n`CTL_OpenMyWindow=Open MyWind`**`&`**`ow`\n\n请记住，助记符仅在按住 (Alt) 键时才会显示。\n\n####\
  \ 创建您自己的菜单栏\n\n如果您想创建自己的菜单栏以在模块中使用，可以轻松地使用 NetBeans API 的功能。数据系统 API 实际上提供了一个 `JMenubar`\
  \ 类的子类，即 `MenuBar` 类。这个类可以根据其内容创建一个 `DataFolder` 对象，因此您可以像在模块的层级文件中定义标准菜单一样定义自己的菜单。\n\
  \n现在，只需要再创建一个 `DataFolder` 对象。为此，您需要通过方法 `FileUtil.getConfigFile()` 获取对菜单根文件夹的访问权限。在此示例中，它被称为\
  \ `MyModuleMenu`。对于此模块，您创建一个 `DataFolder` 对象，并使用静态方法 `findFolder()` 将其直接传递给 `MenuBar`\
  \ 构造函数，如 清单 9-10 所示。\n\n***清单 9-10.** 创建您自己的菜单栏，该菜单栏从系统文件系统中读取其内容*\n\n`FileObject\
  \ menu = FileUtil.getConfigFile(\"`**`MyModuleMenu`**`\");`\n`MenuBar    bar  =\
  \ new MenuBar(DataFolder.`**`findFolder`**`(menu));`\n\n### 工具栏\n\n#### 创建工具栏和工具栏操作\n\
  \n您可以像向菜单栏添加操作一样，向工具栏添加操作。您可以使用现有的工具栏，也可以创建任意数量的自定义工具栏来对您的工具栏按钮进行分组。工具栏在层级文件的标准文件夹\
  \ `Toolbars` 中定义。如“菜单栏”部分所述，使用 `ActionReference` 注解将操作添加到工具栏。您希望将操作类添加到 `MyFirstAction`\
  \ 工具栏，如 清单 9-11 所示。\n\n***清单 9-11.** 使用注解向工具栏添加操作*\n\n`@ActionID(`\n`    category\
  \ = \"Edit\",`\n`    id = \"com.galileo.netbeans.module.MyFirstAction\")`\n`@ActionRegistration(`\n\
  `    iconBase = \"com/galileo/netbeans/module/icon.png\",`\n`    displayName = \"\
  #CTL_MyFirstAction\")`\n`@ActionReferences({`\n**`@ActionReference`**`(`\n`        path\
  \ = \"`**`Toolbars`**`/`**`MyToolbars`**`\",`\n`        position = 100)`\n`})`\n\
  `public final class MyFirstAction implements ActionListener {`\n`    public void\
  \ actionPerformed(ActionEvent e) {`\n`        // TODO implement action body`\n`    }`\n\
  `}`\n\n如您在 清单 9-11 中所见，工具栏与菜单项的区别仅在于相应的路径规范。菜单项通过 `ActionReference` 注解引用标准文件夹 `Menu`\
  \ 中的操作，而对于工具栏操作，则使用标准文件夹 `Toolbars`。请记住，对于工具栏操作，操作类通过 `iconBase` 属性提供了一个相应的图标。\n\
  \n与菜单栏类似，这样的注解会导致自动创建一个层级条目。如果您不想使用注解，也可以通过直接在层级文件中为工具栏添加条目来添加您的工具栏操作。与 清单 9-9 匹配的条目将如\
  \ 清单 9-12 所示。\n\n***清单 9-12.** 通过直接层级条目向工具栏添加操作*\n\n`<folder name=\"`**`Toolbars`**`\"\
  >`\n`  <folder name=\"`**`MyToolbar`**`\">`\n`    <file name=\"MyFirstAction.shadow\"\
  >`\n`      <attr name=\"originalFile\"`\n`            stringvalue=\"Actions/Edit/com-galileo-netbeans-module-MyFirstAction.instance\"\
  />`\n`    </file>`\n`  </folder>`\n`</folder>`\n\n\n\n#### 工具栏配置\n\n哪些工具栏以何种顺序显示，会保存在一个\
  \ XML 格式的工具栏配置中。（请在附录中找到对应的 DTD。）NetBeans 平台默认自带的工具栏由 Core-UI 模块中的配置 *Standard.xml*\
  \ 定义。该配置如清单 9-13 所示。\n\n***清单 9-13.** 标准平台工具栏配置：Standard.xml*\n\n`<Configuration>`\n\
  `   <Row>`\n`      <Toolbar name=\"`**`File`**`\"/>`\n`      <Toolbar name=\"`**`Clipboard`**`\"\
  />`\n`      <Toolbar name=\"`**`UndoRedo`**`\"/>`\n`      <Toolbar name=\"`**`Memory`**`\"\
  />`\n`   </Row>`\n`</Configuration>`\n\n你可以选择创建自己的配置，并在运行时动态设置它们，从而根据上下文显示或隐藏工具栏。现在，你创建自己的配置，其中希望显示已创建的名为\
  \ `MyToolbar` 的工具栏以及标准工具栏 `Edit`，同时隐藏 `File` 工具栏。该配置可能如清单 9-14 所示。\n\n***清单 9-14.**\
  \ 自定义工具栏配置*\n\n`<!DOCTYPE Configuration PUBLIC`\n`  \"-//NetBeans IDE//DTD toolbar//EN\"\
  `\n`  \"http://www.netbeans.org/dtds/toolbar.dtd\">`\n`<Configuration>`\n`   <Row>`\n\
  `      <Toolbar name=\"`**`UndoRedo`**`\"/>`\n`      <Toolbar name=\"`**`MyToolbar`**`\"\
  />`\n`   </Row>`\n`   <Row>`\n`      <Toolbar name=\"`**`File`**`\" visible=\"`**`false`**`\"\
  />`\n`   </Row>`\n`</Configuration>`\n\n你可以用任意名称保存这个新创建的配置。然后将其添加到层文件中，使该配置在平台中公开。为此，需要使用\
  \ `url` 属性定义配置相对于层文件的位置，如清单 9-15 所示。\n\n***清单 9-15.** 注册工具栏配置*\n\n`<folder name=\"\
  Toolbars\">`\n`   <file name=\"`**`MyToolbarConfig.xml`**`\" url=\"toolbars/MyToolbarConfig.xml\"\
  />`\n`</folder>`\n\n要显示所需的工具栏并激活该配置，只需在源代码中所需位置添加一行代码。为此，UI 工具模块提供了一个有用的 API：\n\n\
  `ToolbarPool.getDefault().setConfiguration(\"`**`MyToolbarConfig`**`\");`\n\n例如，此调用可以在激活窗口时发生，以便向用户显示与上下文无关的工具栏。在本章中，你希望在创建第一个窗口时立即进行此设置。\n\
  \n`ToolbarPool` 类负责管理在系统文件系统中注册的工具栏。`getDefault()` 方法返回由系统生成的 `ToolbarPool` 对象，该对象负责管理在标准文件夹\
  \ `Toolbars` 中定义的工具栏。你也可以选择创建自己的 `ToolbarPool` 对象，用于管理在自定义文件夹中定义的工具栏。为此，只需将一个 `DataFolder`\
  \ 对象传递给构造函数即可。我将在“创建自己的工具栏”一节中向你展示其工作原理。\n\n`ToolbarPool` 类提供了一些有用的功能，如表 9-2 所示。\n\
  \n![Image](img/t0902.jpg)\n\n![Image](img/t0902a.jpg)\n\n#### 用户自定义\n\n按下鼠标右键时，应用程序的工具栏上会显示一个上下文菜单。用户可以使用它来显示或隐藏单独的工具栏。用户还可以在运行时通过*自定义...*\
  \ 来配置工具栏。通过拖放添加或删除单个操作，如图 9-2 所示。\n\n![Image](img/0902.jpg)\n\n***图 9-2.** 用户特定的工具栏设置*\n\
  \n#### 创建自己的工具栏\n\n与菜单栏一样，你可以创建自己的工具栏或工具栏池。然后，例如，你可以在顶层组件中使用这些工具栏。为此，`ToolbarPool`\
  \ 类和 `Menubar` 类提供了一个构造函数，你可以向其传递一个 `DataFolder` 对象，该对象代表系统文件系统中的一个工具栏文件夹，如清单 9-16\
  \ 所示。你可以像定义标准工具栏一样定义自己的工具栏。\n\n***清单 9-16.** 创建从系统文件系统读取内容的自己的工具栏*\n\n`FileObject  tbs  =\
  \ FileUtil.getConfigFile(\"`**`MyToolbars`**`\");`\n`ToolbarPool pool = new ToolbarPool(DataFolder.`**`findFolder`**`(tbs));`\n\
  \n关于可以通过系统文件系统向工具栏添加哪些组件的更多信息，请参阅 `ToolbarPool` 类的 API 文档。\n\n#### 使用自定义控件\n\n默认情况下，你的操作在工具栏中显示为图标。除此之外，你还可以为工具栏操作配备特定的控件元素，例如组合框。你不需要为此使用特殊的操作类。你可以使用前面章节中使用的标准操作。该类必须继承\
  \ `AbstractAction`，而不是实现 `ActionListener` 接口。我们实现 `Presenter.Toolbar` 接口，以便该操作始终可以提供其特殊的控件元素。此外，为控件元素的初始化实现一个标准构造函数也是合理的。\n\
  \n##### 工具栏中的组合框\n\n作为示例，我想向你展示一个操作类，它有一个组合框作为控件元素，你可以用它来编辑缩放比例等。\n\n***清单 9-17.**\
  \ 工具栏操作用户特定的控件元素*\n\n`@ActionID(`\n`    category = \"View\",`\n`    id = \"com.galileo.netbeans.module.MyComboboxAction\"\
  )`\n`@ActionRegistration(displayName = \"#CTL_MyComboboxAction\")`\n`@ActionReferences({`\n\
  `    @ActionReference(path=\"Toolbars/MyToolbar\") })`\n`public final class MyComboboxAction\
  \ extends` **`AbstractAction`** `implements` **`Presenter.Toolbar`** `{`\n`JComboBox\
  \ box =` **`new JComboBox`**`(new String[]{\"100%\", \"200%\"});`\n\n`    public\
  \ MyComboboxAction() {`\n`        box.setMaximumSize(box.getPreferredSize());`\n\
  `        box.setAction(this);`\n`    }`\n\n`    @Override`\n`    public void actionPerformed(ActionEvent\
  \ e) {`\n`        System.out.print(\"Adjust zoom to: \");`\n`        System.out.println(box.getSelectedItem());`\n\
  `    }`\n\n`    @Override`\n`public Component` **`getToolbarPresenter()`** `{`\n\
  `        return box;`\n`    } }`\n\n操作类通常通过注解注册，并因此分配给一个工具栏。你将自定义控件元素添加为私有字段。你希望避免组合框占据整个宽度，因此在构造函数中将组合框的最大宽度设置为首选宽度。控件元素与操作的连接非常重要。你可以通过组合框的\
  \ `setAction()` 方法实现这一点，该方法通过 `this` 运算符将对自身类的引用传递给它。现在，如果操作组合框，则会执行此操作。最后，你只需实现\
  \ `getToolbarPresenter()` 方法并返回组合框即可。你创建的组合框将显示，而不是标准按钮。\n\n\n\n##### 工具栏中的下拉菜单\n\
  \nNetBeans 平台提供了一个特殊的工厂类，用于创建带有弹出菜单的下拉按钮（参见图 9-3）。你可以像之前展示的组合框一样，将此类按钮集成到工具栏中。因此，首先你需要创建一个动作类，并为其添加一个工具栏。它必须继承自\
  \ `AbstractAction` 类，以便能够实现 `Toolbar.Presenter` 接口。在 `getToolbarPresenter()` 方法中，你随后生成一个弹出菜单，并用层文件中的动作填充它。然后，通过\
  \ `DropDownButtonFactory.createDropDownButton()` 方法生成相应的按钮并返回，如清单 9-18 所示。\n\n***清单\
  \ 9-18.** 创建下拉按钮*\n\n`@ActionID(`\n`    category = \"File\",`\n`    id = \"com.galileo.netbeans.module.MyDropDownButton\"\
  )`\n`@ActionRegistration(`\n`    iconBase = \"com/galileo/netbeans/module/icon.png\"\
  ,`\n`    displayName = \"#CTL_MyDropDownButton\")`\n`@ActionReferences({`\n`    @ActionReference(path\
  \ = \"`**`Toolbars`**`/File\", position = 300)`\n`})`\n`public final class MyDropDownButton\
  \ extends` **`AbstractAction`** `implements` **`Presenter.Toolbar`** `{`\n`final\
  \ String` **`EXTENSION_POINT`** `= \"MyDropDownActions\";`\n`    JPopupMenu popup\
  \ = new JPopupMenu();`\n\n`    @Override`\n`    public void actionPerformed(ActionEvent\
  \ e) { }`\n\n`    @Override`\n`public Component` **`getToolbarPresenter`**`() {`\n\
  `for (Action a: Utilities.` **`actionsForPath`**`(`**`EXTENSION_POINT`**`))`\n`            popup.add(a);`\n\
  `return` **`DropDownButtonFactory.createDropDownButton`**`(`\n`               ImageUtilities.loadImageIcon(\"\
  com/galileo/netbeans/module/icon.png\", false),`\n`               popup);`\n`    }\
  \ }`\n\n如果你查看清单 9-17 中的源代码，你会发现只需几行代码就能创建一个灵活可扩展的、带有弹出菜单的下拉按钮。除了创建按钮的工厂方法外，`Utilities`\
  \ 类的 `actionsForPath()` 方法也很重要。它提供了注册在特定文件夹中的所有动作的列表。你可以通过 `ActionReference` 注解将它们注册到那里，默认情况下，就像这样：\n\
  \n`@ActionReference(path = \"MyDropDownActions\", position = 100)`\n`public final\
  \ class MyDropDownAction1 implements ActionListener`\n\n因此，动作 `MyDropDownAction1`\
  \ 被注册在系统文件系统的 `MyDropDownActions` 文件夹中。其工作方式与向菜单栏或工具栏添加动作相同。你看，系统文件系统不仅对标准组件（如菜单栏或工具栏）有帮助，你还可以利用它来创建自己的组件。\n\
  \n![Image](img/0903.jpg)\n\n***图 9-3.** 工具栏中带有弹出菜单的下拉按钮*\n\n### 总结\n\n本章涵盖了 NetBeans\
  \ 平台应用程序的菜单栏和工具栏。你学习了菜单的结构、如何设置自己的工具栏，以及最重要的是，如何简单地将你的动作添加到工具栏或菜单中。\n\n## 第 10 章\n\
  \n## 窗口系统\n\n*窗口系统*是 NetBeans 平台提供的一个框架。它负责所有应用程序窗口的管理和显示，并允许用户自定义用户界面的布局。\n\n![Image](img/square.jpg)**提示**\
  \ 窗口的注册现在通过注解进行，这不仅使 NetBeans 平台应用程序的开发更加容易，而且使其更加独立于 NetBeans IDE。\n\n可视化窗口系统的基本结构是基于文档的。这意味着中心部分——即编辑器部分——主要用于在选项卡中显示多个文件。不同的窗口可以放置在编辑器区域周围的各个区域，即视图区域（参见图\
  \ 10-1）。通常，这些是提供文档编辑功能的辅助窗口。以 NetBeans IDE 为例，这些窗口提供了项目结构、属性对话框和输出窗口。这三个窗口位于编辑器区域周围。\n\
  \n默认情况下，所有窗口都显示在 NetBeans 主应用程序窗口中。此外，还可以通过使用上下文菜单或将窗口从应用程序窗口中拖出，来取消停靠窗口（*停靠/取消停靠*）。图\
  \ 10-2 展示了其效果，其中项目窗口已被取消停靠。停靠和取消停靠允许灵活地定位窗口。所谓的*浮动窗口*功能在使用多个显示器时尤其有用。\n\n![Image](img/1001.jpg)\n\
  \n***图 10-1.** NetBeans 平台应用程序窗口的结构*\n\n窗口系统由模式组成。*模式*是一个容器，窗口可以在其中像选项卡一样显示。窗口必须是\
  \ `TopComponent` 的子类。所有显示的窗口都由 `WindowManager` 管理。也可以对窗口进行分组。窗口系统的组装在层文件中以声明方式描述。这种组装包括对可用模式、在这些模式中显示的窗口以及定义哪个窗口属于哪个窗口组的描述。这些信息也通过系统文件系统提供给窗口系统。在接下来的章节中，将详细描述窗口系统的各个部分；我还将向你展示如何在你的模块中使用它们。\n\
  \n![Image](img/1002.jpg)\n\n***图 10-2.** 带有浮动窗口的 NetBeans 窗口系统*\n\n### 配置\n\n模块在层文件中配置其窗口、模式和组，位于标准文件夹\
  \ `Windows2` 下的 `Components`、`Modes` 和 `Groups` 文件夹中。这样，模块可以定义其可用的窗口，将它们与模式关联，并对它们进行分组。\n\
  \n此配置是模块定义的默认配置。窗口系统在首次启动时使用此默认配置。退出应用程序时，对应用程序布局所做的任何更改（例如，将窗口移动到另一个模式或关闭窗口组）都会存储在用户目录的\
  \ `config/Windows2Local` 文件夹中，其层次结构与层文件相同。重新启动时，会首先读取应用程序设置。仅当用户目录中不存在配置文件时（例如，首次启动应用程序时），才会从层文件中读取设置。\n\
  \n### 窗口：顶层组件\n\n窗口系统 API 提供了 `TopComponent` 类，用于创建集成到 NetBeans 平台中的窗口。它是 Java 类\
  \ `JComponent` 的子类，并为窗口与窗口系统的交互提供可选支持。一个 `TopComponent` 始终存在于一个模式内部，因此它是可停靠的，由 `WindowManager`\
  \ 自动管理，并接收生命周期事件。\n\n\n\n#### 创建顶层组件\n\nNetBeans IDE 提供了一个有用的向导来创建 `TopComponent`。该向导会创建完整的基本骨架。通过调用\
  \ *文件* ![Image](img/U001.jpg) *新建文件…*，然后选择类别 *模块开发* 和文件类型 *窗口* 来启动它。在接下来的页面 *基本设置*\
  \ 中，你可以为你的顶层组件编辑一系列设置，如 图 10-3 所示。\n\n![Image](img/1003.jpg)\n\n***图 10-3.** 创建顶层组件：基本设置*\n\
  \n首先，定义 *窗口位置*，即你的顶层组件应该显示的模式。目前，你只能选择 NetBeans 平台提供的模块。但是，稍后你可以将其替换为自定义模式。此外，你可以在此向导页面上定义要创建的顶层组件的行为。我将在后面的“行为”部分解释此选项的含义。\n\
  \n点击 *下一步* 进入向导的最后一页。在那里，你可以确定类名的前缀和顶层组件的图标，如 图 10-4 所示。\n\n![Image](img/1004.jpg)\n\
  \n***图 10-4.** 创建顶层组件：名称、图标和位置*\n\n点击 *完成* 按钮结束向导并创建顶层组件。该向导已经为你完成了所有必要的工作。现在，你可以使用表单编辑器编辑顶层组件并为其配备所需的功能。你可以通过\
  \ *运行* ![Image](img/U001.jpg) *运行主项目* 来测试所有内容。\n\n现在让我们看一下向导创建的类。这个类现在被一系列注解标记，其含义在\
  \ 清单 10-1 中解释。\n\n***清单 10-1.** 带有注解的顶层组件的基本结构*\n\n`import org.openide.util.NbBundle;`\n\
  `import org.openide.windows.TopComponent;`\n`import org.netbeans.api.settings.ConvertAsProperties;`\n\
  `import org.openide.awt.ActionID;`\n`import org.openide.awt.ActionReference;`\n\n\
  `@ConvertAsProperties(`\n`    dtd = \"-//com.galileo.netbeans.module//My//EN\",`\n\
  `    autostore = false)`\n**`@TopComponent.Description`**`(`\n`    preferredID =\
  \ \"MyTopComponent\",`\n`    iconBase = \"com/galileo/netbeans/module/icon.png\"\
  ,`\n`    persistenceType = TopComponent.PERSISTENCE_ALWAYS)`\n**`@TopComponent.Registration`**`(`\n\
  `    mode = \"editor\",`\n`    openAtStartup = true)`\n`@ActionID(`\n`    category\
  \ = \"Window\",`\n`    id = \"com.galileo.netbeans.module.MyTopComponent\")`\n`@ActionReference(`\n\
  `    path = \"Menu/Window\" /*, position = 333 */)`\n**`@TopComponent.OpenActionRegistration`**`(`\n\
  `    displayName = \"#CTL_MyAction\",`\n`    preferredID = \"MyTopComponent\")`\n\
  `public final class` **`MyTopComponent`** `extends TopComponent {`\n`public` **`MyTopComponent`**`()\
  \ {`\n`        initComponents();`\n`        setName(NbBundle.getMessage(MyTopComponent.class,\
  \ \"CTL_MyTopComponent\"));`\n`        setToolTipText(NbBundle.getMessage(MyTopComponent.class,\
  \ \"HINT_MyTopComponent\"));`\n`    }`\n`    ...`\n`}`\n\n顶层组件通过注解 `TopComponent.Description`\
  \ 标记了基本信息。一个唯一标识符（`preferredID`）、图标的路径（`iconBase`）以及确定顶层组件是否会被保存（`persistenceType`）都属于这些基本信息。这些可能性将在下一节“持久性”中描述。\n\
  \n你通过 `TopComponent.Registration` 注解将顶层组件添加到一个模式中。由属性 `mode` 确定的模式必须已经存在。你可以选择 NetBeans\
  \ 平台已定义的模式，也可以自己创建一个。在“创建模式”一节中，你将学习如何做到这一点。通过 `openAtStartup` 属性，你可以确定你的顶层组件是否会在应用程序启动时自动打开。最后，提供了可选属性\
  \ `position` 用于确定一个模式内多个顶层组件的顺序。\n\nNetBeans 平台在后台通过注解 `TopComponent.OpenActionRegistration`\
  \ 做了大量工作。此注解会导致在层文件中注册一个用于打开被注解的顶层组件的操作。在这方面，有趣的是不仅发生了注册，而且操作也会自动提供。这意味着，你的模块中不再存在相应的操作类。操作类是通过工厂方法\
  \ `TopComponent.openAction()` 使用传递的参数在后台创建的。你通过 `displayName` 属性定义操作的名称。使用 # 你可以为属性包中的文本常量确定一个键（参见第\
  \ 6 章）。通过 `preferredID` 属性，你可以轻松确定你的顶层组件是只能生成一个实例还是多个实例。为此，请使用已定义的顶层组件标识符。这样，只会创建一个单例实例。省略该属性，则在执行操作时会打开顶层组件的一个新实例。\n\
  \n`ActionID` 和 `ActionReference` 这两个属性与 `TopComponent.OpenActionRegistration` 注解相关联。如第\
  \ 6 章所述，通过 `ActionID`，为打开操作添加了一个带有类别的唯一标识符。通过 `ActionReference` 注解，你可以确定操作将在哪里以及哪个菜单中显示（参见第\
  \ 9 章）。虽然像描述的那样使用注解比注册顶层组件要简单得多，但我将解释（参见清单 10-2）——然而，它的使用并非强制性的。你也可以选择直接在层文件中指定必要的信息。首先，在层文件的标准文件夹\
  \ `Windows2/Components` 中定义顶层组件。分配到模式的操作发生在标准文件夹 `Windows2/Modes` 中。\n\n***清单 10-2.**\
  \ 在层文件中定义和分配顶层组件*\n\n`<folder name=\"`**`Windows2`**`\">`\n`   <folder name=\"`**`Components`**`\"\
  >`\n`      <file name=\"MyTopComponent.settings\" url=\"MyTopComponentSettings.xml\"\
  />`\n`   </folder>`\n`   <folder name=\"`**`Modes`**`\">`\n`      <folder name=\"\
  editor\">`\n`         <file name=\"MyTopComponent.wstcref\" url=\"MyTopComponentWstcref.xml\"\
  />`\n`      </folder>`\n`   </folder>`\n`</folder>`\n\n在文件夹 `Windows2/Components`\
  \ 中定义顶层组件需要一个 *Settings* 文件。该文件中命名了顶层组件的完整类名。这样，窗口系统就能够创建顶层组件的实例。（参见清单 10-3。）\n\n\
  ***清单 10-3.** 用于声明式添加顶层组件的设置文件*\n\n`<!DOCTYPE settings PUBLIC`\n` \"-//NetBeans//DTD\
  \ Session settings 1.0//EN\"`\n` \"http://www.netbeans.org/dtds/sessionsettings-1_0.dtd\"\
  >`\n`<settings version=\"1.0\">`\n`   <instance class=\"com.galileo.netbeans.module.MyTopComponent\"\
  />`\n`</settings>`\n\n将顶层组件映射到模式是通过一个 *顶层组件引用* 文件完成的，如清单 10-4 所示。在此文件中定义了顶层组件的唯一标识符。此外，通过\
  \ `state` 元素的 `opened` 属性，定义了窗口是否在应用程序启动时打开。\n\n***清单 10-4.** 将顶层组件映射到模式的顶层组件引用文件*\n\
  \n`<!DOCTYPE tc-ref PUBLIC`\n` \"-//NetBeans//DTD Top Component in Mode Properties\
  \ 2.0//EN\"`\n` \"http://www.netbeans.org/dtds/tc-ref2_0.dtd\">`\n`<tc-ref version=\"\
  2.0\" >`\n`   <tc-id id=\"`**`MyTopComponent`**`\"/>`\n`   <state opened=\"`**`true`**`\"\
  />`\n`</tc-ref>`\n\n如果你选择了声明式方式而不是注解，那么你最终应该覆盖顶层组件类的 `preferredID()` 和 `getPersistenceType()`\
  \ 这两个方法，从而提供相应的值。\n\n\n\n#### 行为\n\n顶层组件的行为可通过一系列特性进行调整，如表 10-1 所示。您可以使用 NetBeans\
  \ 窗口向导编辑这些特性的设置。或者，您也可以稍后调整这些在顶层组件构造函数中设置的特性。\n\n![图片](img/t1001.jpg)\n\n这些特性可以在顶层组件内通过以下方法以`PROP_`为前缀进行设置：\n\
  \n**`putClientProperty`**`(`\n`    TopComponent.PROP_CLOSING_DISABLED,`\n`    Boolean.TRUE);`\n\
  \n#### 状态\n\n顶层组件可以具有多种状态，如表 10-2 所列。\n\n![图片](img/t1002.jpg)\n\n![图片](img/t1002a.jpg)\n\
  \n进入特定状态是通过调用表 10-3 所示的方法之一来宣告的。如果窗口需要在特定状态下执行操作，只需重写相应的方法即可。\n\n![图片](img/t1003.jpg)\n\
  \n第 9 章展示了如何创建工具栏配置以及如何使用它们来显示应用程序特定的工具栏。使用前面介绍的两种告知我们顶层组件状态的方法来显示当前活动的顶层组件，如清单\
  \ 10-5 所示。\n\n***清单 10-5.** 根据上下文显示和隐藏工具栏*\n\n`public class MyTopComponent extends\
  \ TopComponent {`\n`   private String origConfig = \"Standard\";`\n`   private String\
  \ myConfig   = \"`**`MyToolbarConfig`**`\";`\n\n`protected void` **`componentActivated()`**\
  \ `{`\n`      origConfig = ToolbarPool.getDefault().`**`getConfiguration`**`();`\n\
  `      ToolbarPool.getDefault().setConfiguration(myConfig);`\n`   }`\n\n`protected\
  \ void` **`componentDeactivated()`** `{`\n`      ToolbarPool.getDefault().`**`setConfiguration`**`(origConfig);`\n\
  `   } }`\n\n如果顶层组件获得焦点，则会调用`componentActivated()`方法。当前配置会被存储起来以便后续重新激活。然后，您设置自己的工具栏配置`MyToolbarConfig`（在第\
  \ 9 章中创建）。如果选择了另一个顶层组件，此顶层组件将失去焦点，并调用`componentDeactivated()`方法。在此方法中设置存储的配置以恢复之前的工具栏。\n\
  \n#### 上下文菜单\n\n右键单击顶层组件的标题栏时，会显示一个上下文菜单，其中包含*取消停靠窗口*或*关闭窗口*等操作。这些操作通过`TopComponent`类的`getActions()`方法获得。要在此上下文菜单中添加您自己的操作，可以重写此方法（参见清单\
  \ 10-6）。这样做时，以声明方式添加操作会很有用。在第 3 章中，我提到过可以向层文件添加您自己的文件夹和扩展点。这正是您在这里要使用的。操作在层文件中声明，并在`getActions()`方法中按需读取。\n\
  \n***清单 10-6.** 从层文件读取上下文菜单的操作*\n\n`public class` **`MyTopComponent`** `extends\
  \ TopComponent {`\n`   private List<Action> ca = null;`\n\n`   @Override`\n`public\
  \ Action[]` **`getActions`**`() {`\n`      if (ca == null) {`\n`         ca = new\
  \ ArrayList<Action>(Arrays.asList(`**`super.getActions()`**`));`\n`         ca.add(null);\
  \ /* 添加分隔符 */`\n`Lookup lkp =` **`Lookups.forPath`**`(\"ContextActions/MyTC\");`\n\
  `         ca.addAll(lkp.`**`lookupAll`**`(Action.class));`\n`      }`\n\n`      return\
  \ ca.toArray(new Action[ca.size()]);`\n`   } }`\n\n首先，调用超类的`getActions()`方法以获取默认操作。借助`Lookups.forPath()`方法，您可以轻松地为声明的文件夹`ContextActions/MyTC`创建一个查找对象。然后，`lookupAll()`方法获取所有实现了`Action`接口的已注册操作。创建菜单时，平台会自动将`null`值替换为分隔符。组装好的操作列表以数组形式返回。最后，您只需创建对实际操作定义（通常位于标准文件夹`Actions`中）的引用。您可以通过在相应的操作类本身中使用注解优雅地实现引用，或者通过在层文件中直接添加条目来实现。必要的注解如下所示：\n\
  \n`@ActionReference(path = \"ContextActions/MyTC\")`\n\n例如，自定义文件夹中层文件中相应的条目可能如清单\
  \ 10-7 所示。\n\n***清单 10-7.** 在层文件中定义上下文菜单操作*\n\n`<folder name=\"`**`ContextActions`**`\"\
  >`\n`  <folder name=\"`**`MyTC`**`\">`\n`    <file name=\"MyAction1.shadow\">`\n\
  `      <attr name=\"originalFile\"`\n`            stringvalue=\"Actions/Edit/com-galileo-netbeans-module-MyAction1.instance\"\
  />`\n`    </file>`\n`    <file name=\"MyAction2.shadow\">`\n`      <attr name=\"\
  originalFile\"`\n`            stringvalue=\"Actions/Edit/com-galileo-netbeans-module-MyAction2.instance\"\
  />`\n`    </file>`\n`  </folder>`\n`</folder>`\n\n现在您已经创建了一个扩展点。其他模块可以通过在其层文件的`ContextActions/MyTC`文件夹中定义操作，轻松地将操作添加到您的顶层组件的上下文菜单中。因此，任何其他模块都可以灵活地扩展上下文菜单，而无需任何依赖关系。\n\
  \n#### 持久化\n\n窗口系统能够在退出应用程序时存储已打开的顶层组件，并在重新启动时恢复它们。但是，在某些用例中，不希望存储顶层组件。确定是否存储顶层组件是通过`getPersistenceType()`方法返回的值来完成的。您可以使用`TopComponent.Description`注解的`persistenceType`属性来确定此值。但是，如果您不使用注解，则应始终重写命名的方法。表\
  \ 10-4 中列出的常量可用作返回值。\n\n![图片](img/t1004.jpg)\n\n窗口系统在存储或恢复顶层组件时会调用`writeProperties()`和`readProperties()`方法。然后，窗口系统在保存和加载顶层组件时调用这些方法。您可以使用这些方法来保存或加载顶层组件特定的数据。为此，您始终会获得一个`Properties`对象作为参数。保存的数据由\
  \ NetBeans 平台以 XML 文件形式保存在用户目录中。数据也是从那里加载的。\n\n#### 注册表\n\nNetBeans 窗口系统的所有顶层组件都在一个注册表中集中管理。此注册表的接口由`TopComponent.Registry`接口指定。此注册表的实例可以直接通过`TopComponent`类调用以下方法获得：\n\
  \n`TopComponent.Registry registry = TopComponent.getRegistry();`\n\n或者通过`WindowManager`获得：\n\
  \n`TopComponent.Registry registry = WindowManager.getDefault().getRegistry();`\n\
  \n例如，此注册表将通过`getActivated()`返回当前激活的顶层组件，或通过`getOpened()`返回所有打开的顶层组件。此外，可以在注册表上注册一个`PropertyChangeListener`，以便全局响应顶层组件的状态变化（例如，参见表\
  \ 10-5）。\n\n![图片](img/t1005.jpg)\n\n在以下示例中，向注册表添加了一个监听器。此监听器在顶层组件打开时做出响应（参见清单 10-8）。\n\
  \n***清单 10-8.** 全局跟踪顶层组件状态变化*\n\n`public class MyTopComponent extends TopComponent\
  \ implements` **`PropertyChangeListener`** `{`\n\n`   public MyTopComponent() {`\n\
  **`  TopComponent.Registry`** `reg = TopComponent.`**`getRegistry()`**`;`\n`      reg.addPropertyChangeListener(WeakListeners.propertyChange(this,\
  \ reg));`\n`   }`\n\n`public void` **`propertyChange`**`(PropertyChangeEvent evt)\
  \ {`\n`      if(evt.getPropertyName().equals(TopComponent.Registry.`**`PROP_OPENED`**`))`\n\
  `         // 顶层组件已打开`\n`   } }`\n\n\n\n### 停靠容器：模式（Mode）\n\nNetBeans 平台的整个窗口系统由多个区域组成，多个组件可以以选项卡形式停靠在这些区域中。这些区域就是前面提到的编辑区和视图区。这样的一个区域被称为一个模式（mode）。然而，模式本身并不是一个显示的组件，而是作为其中所显示组件的控制器和容器。这些组件的类型是\
  \ `TopComponent`，正如上一节所述。模式由窗口系统 API 中的 `Mode` 接口定义。\n\n#### 创建模式\n\n模式并非固定区域，而是可以通过\
  \ XML 文件单独定义。一些重要的区域（例如中央编辑区或 NetBeans IDE 通常打开项目视图的区域）已在 NetBeans 平台模块中定义。你也可以定义并添加自己的模式。模式的配置文件结构如清单\
  \ 10-9 所示。\n\n***清单 10-9.** 模式配置文件：MyMode.wsmode*\n\n`<!DOCTYPE mode PUBLIC`\n` \"\
  -//NetBeans//DTD Mode Properties 2.3//EN\"`\n` \"http://www.netbeans.org/dtds/mode-properties2_3.dtd\"\
  >`\n`<mode version=\"2.3\">`\n`   <`**`module`** `name=\"com.galileo.netbeans.module\"\
  \ spec=\"1.0\"/>`\n`   <`**`name`**`   unique=\"`**`MyMode`**`\"/>`\n`   <`**`kind`**`   type=\"\
  view\"/>`\n`   <`**`state`**`  type=\"joined\"/>`\n`   <`**`constraints`**`>`\n\
  `      <path orientation=\"vertical\" number=\"0\" weight=\"0.2\"/>`\n`      <path\
  \ orientation=\"horizontal\" number=\"0\" weight=\"1.0\"/>`\n`   </constraints>`\n\
  `   <`**`empty-behavior`** `permanent=\"true\"/>`\n`</mode>`\n\n首先，使用 `module` 属性定义该模式所属的模块。最重要的元素是\
  \ `name` 元素。`name` 元素的值必须是唯一的标识符，并且必须与文件名匹配（包括大小写）。此外，通过 `kind` 元素可以定义模式显示其组件的方式。共有三种模式类型：`editor`、`view`\
  \ 和 `sliding`。图 10-5 展示了这三种类型在 NetBeans IDE 中的外观。\n\n![Image](img/1005.jpg)\n\n\
  ***图 10-5.** 不同类型的模式*\n\n`editor` 类型的模式通常位于应用程序的中央区域，例如由核心窗口模块通过 *wsmode* 文件（正如模式名称所示）指定的\
  \ `Editor` `Mode`。围绕此编辑器模式排列的顶层组件通常显示在 `view` 类型的模式中。\n\n这些窗口通常也被称为辅助窗口，因为它们提供诸如编辑文档等功能。除了在模式中选项卡显示方式不同之外，`editor`\
  \ 和 `view` 模式的区别还在于：`editor` 类型在右上角具有控制元素，便于在文档和顶层组件之间导航。此外，还有 `sliding` 类型的模式。窗口系统允许你将顶层组件移动或最小化到应用程序窗口的右侧、左侧或底部边框。这在处理不常用或偶尔使用的窗口时通常很有用。当鼠标悬停在最小化顶层组件的按钮上时，它会打开并覆盖在其他打开的窗口之上，当鼠标离开控制元素时又会自动隐藏。这些窗口位于\
  \ `sliding` 类型的模式中。\n\n`sliding` 类型的模式还可以定义 `slidingSide` 元素。它选择模式将位于的边框（左侧、右侧、底部）。关于这一点，允许使用以下值：\n\
  \n`<slidingSide side=\"`**`left`**`\"/>`\n`<slidingSide side=\"`**`right`**`\"/>`\n\
  `<slidingSide side=\"`**`bottom`**`\"/>`\n\n`state` 元素定义模式是停靠在应用程序窗口中，还是取消停靠在一个单独的窗口中。允许的值为\
  \ `joined`（表示停靠模式）和 `separated`（表示取消停靠的表示形式）。例如，当一个顶层组件被取消停靠时，其模式会变为 `separated`。\n\
  \n`constraints` 元素允许定义相对于其他模式的尺寸和位置。例如，前面的示例会将模式显示在应用程序窗口的顶部边框上。如果它位于底部边框，则会在 `number`\
  \ 属性中放入一个更大的数字（例如 30）。由于此数字控制所有模式的位置，因此查看 NetBeans 平台预定义模式的配置文件会很有帮助。其中一些位于 *Core-UI*\
  \ 模块中。\n\n现在，我们通过模块的层文件将此配置文件添加到平台中。为此，我们在文件夹 `Windows2/Modes` 中引用 *.wsmode* 文件（参见清单\
  \ 10-10）。\n\n***清单 10-10.** 向层文件添加新模式*\n\n`<folder name=\"`**`Windows2`**`\">`\n\
  `   <folder name=\"`**`Modes`**`\">`\n`      <file name=\"`**`MyMode`**`.wsmode\"\
  \ url=\"MyMode.wsmode\"/>`\n`      <folder name=\"`**`MyMode`**`\">`\n`         <file\
  \ name=\"MyTopComponent.wstcref\" url=\"MyTopComponentWstcref.xml\"/>`\n`      </folder>`\n\
  `   </folder>`\n`</folder>`\n\n通过向导创建的顶层组件引用文件，将顶层组件添加到新模式中。这允许对顶层组件的排列进行灵活的声明式更改。如你所见，由于声明式分配，你可以灵活地更改组件的排列。\n\
  \n在应用程序窗口中双击标题栏可以最大化顶层组件。默认情况下，所有其他组件都会切换到滑动模式。如果某个组件必须保持原位而不移动到边框，则可以向相应的顶层组件引用文件（*.wstcref*）添加一个属性，如下所示：\n\
  \n`<docking-status` maximized-mode`=\"docked\">`\n\n#### 直接停靠\n\n也可以直接将顶层组件停靠到某个特定模式中，如清单\
  \ 10-11 所示。\n\n***清单 10-11.** 以编程方式将顶层组件添加到特定模式*\n\n`TopComponent tc = new MyTopComponent();`\n\
  **`Mode`** `m = WindowManager.getDefault().findMode(\"explorer\");`\n`if(m != null)`\n\
  `   m.`**`dockInto`**`(tc);`\n`tc.`**`open()`**`;`\n`tc.`**`requestActive()`**`;`\n\
  \n为此，请使用 `WindowManager` 类的 `findMode()` 方法。如果存在，该方法会根据唯一名称返回模式。然后，你可以使用 `dockInto()`\
  \ 方法将你的实例直接停靠到该模式中的顶层组件。\n\n#### 修改模式\n\n在运行时，用户保留将顶层组件移动到其他模式或更改模式尺寸的能力。这些数据更改存储在用户目录中，并在重新启动应用程序时恢复。仅当用户目录中没有存储数据时，才会从层文件和模块的配置文件中读取配置。这就是为什么在开发过程中更改配置文件时，清理并构建项目（*Clean\
  \ & Build Project*）通常很有帮助。\n\n### 窗口组：顶层组件组（Top Component Group）\n\n通常，某些任务需要同时使用多个窗口。在\
  \ NetBeans IDE 中创建 GUI 就是这样一个例子。在这种情况下，会显示检查器、面板和属性窗口。当离开表单编辑器模式时，这些窗口会被隐藏。为此，NetBeans\
  \ 平台提供了将顶层组件组合成一个组的功能，该组可以切换所有这些组件的可见性。窗口系统 API 为此提供了 `TopComponentGroup` 接口。然而，组不会更改窗口的布局（即模式的组合或尺寸），而是负责打开和关闭组内的窗口。\n\
  \n\n\n#### 顶级组件组的行为\n\n组根据用户设置管理其窗口，允许以下情况：\n\n*   当打开一个组时，如果 `open` 属性设置为 `true`（且尚未打开任何窗口），则所有尚未打开的窗口都将被打开。\n\
  *   关闭组时，所有在打开该组之前未打开的窗口都将被关闭，并且它们的 `close` 属性将被设置为 `true`。这意味着用户在打开该组之前已打开的窗口将保持打开状态。\n\
  *   关闭组时（如果其中一个窗口在打开组之前已经打开），仅关闭那些 `close` 属性为 `true` 且在打开组之前其属性尚未被打开的窗口。这意味着用户在打开组本身之前打开的窗口将保持打开状态。\n\
  *   如果用户关闭了组中的某个窗口，则在关闭该组时，`open` 属性会被设置为 `false`。因此，当组重新打开时，该窗口将不会被打开。\n*   如果在组处于打开状态期间，用户打开了组中之前已关闭的窗口，则\
  \ `open` 属性会被设置为 `true`，从而在组重新打开时打开该窗口。\n\n因此，用户能够影响组的内容。即使您觉得前面案例的描述有些令人困惑，深入了解这些逻辑组的最佳方式就是直接去探索它们。\n\
  \n#### 创建顶级组件组\n\n组通过*组配置文件*来定义，并在位于 *Windows2/Groups* 文件夹中的层文件中声明，以此向平台宣告其存在。该文件的结构如清单\
  \ 10-12 所示。\n\n***清单 10-12.** 组配置文件：MyGroup.wsgrp*\n\n`<!DOCTYPE group PUBLIC \"\
  -//NetBeans//DTD Group Properties 2.0//EN\" \"http://www.netbeans.org/dtds/group-properties2_0.dtd\"\
  >`\n`<group version=\"2.0\">`\n`   <`**`module`** `name=\"com.galileo.netbeans.module\"\
  \ spec=\"1.0\"/>`\n`   <`**`name`** `unique=\"MyGroup\"/>`\n`   <`**`state`** `opened=\"\
  false\"/>`\n`</group>`\n\n通过可选的 `module` 属性，您可以声明此组所属的模块名称。`name` 属性定义了必须与文件名对应的唯一标识符。组当前是否显示由\
  \ `state` 属性设置。现在，您在层文件中创建该组，并将其引用到*组配置文件*（参见清单 10-13）。\n\n***清单 10-13.** 向层文件添加组*\n\
  \n`<folder name=\"`**`Windows2`**`\">`\n`   <folder name=\"`**`Groups`**`\">`\n\
  `      <file name=\"`**`MyGroup`**`.wsgrp\" url=\"MyGroup.wsgrp\"/>`\n`      <folder\
  \ name=\"`**`MyGroup`**`\">`\n`         <file name=\"MyTopComponent.wstcgrp\" url=\"\
  MyTopComponent.wstcgrp\"/>`\n`      </folder>`\n`   </folder>`\n`</folder>`\n\n\
  如您所见，我已经将您的第一个顶级组件添加到了新创建的组中。这是通过声明一个*组引用配置文件*（*.wstcgrp*）来完成的，该文件声明了顶级组件在组内的行为（如清单\
  \ 10-14 所示）。\n\n***清单 10-14.** 组引用配置：MyTopComponent.wstcgrp*\n\n`<!DOCTYPE tc-group\
  \ PUBLIC`\n` -//NetBeans//DTD Top Component in Group Properties 2.0//EN\"`\n` \"\
  http://www.netbeans.org/dtds/tc-group2_0.dtd\">`\n`<tc-group version=\"2.0\">`\n\
  `   <`**`module`** `name=\"com.galileo.netbeans.module\" spec=\"1.0\"/>`\n`   <`**`tc-id`**\
  \ `id=\"MyTopComponent\"/>`\n`   <`**`open-close-behavior`** `open=\"true\" close=\"\
  true\"/>`\n`</tc-group>`\n\n此文件通过其唯一标识符引用一个顶级组件。`TopComponent` 必须在层文件的 `Windows2/Components`\
  \ 文件夹中使用一个 *.settings* 文件进行声明（当使用向导创建顶级组件时会自动发生，请参见“创建顶级组件”一节）。此外，还定义了窗口在打开和关闭时的行为。（这些属性已在上一节中讨论过。）\n\
  \n对于您想要添加到组中的每个窗口，请创建这样一个文件，并在层文件中您的组文件夹下添加一个条目。您可以通过窗口管理器轻松使用该组。窗口管理器还提供了一种查找组的方法，如清单\
  \ 10-15 所示。\n\n***清单 10-15.** 打开和关闭顶级组件组*\n\n`TopComponentGroup group = WindowManager.getDefault().`**`findTopComponentGroup(\"\
  MyGroup\")`**`;`\n`if(group != null) { /* 找到组 */`\n`   group.`**`open()`**`;`\n\
  `}`\n\n### 管理：窗口管理器\n\n窗口管理器是窗口系统的核心组件。它管理模式、窗口和组，并提供一个 API 来访问其管理的组件。为此，用于定位组件的方法（见表\
  \ 10-6）非常有用。\n\n![图片](img/t1006.jpg)\n\n可以向窗口管理器添加一个 `PropertyChangeListener`，例如，以便在某个模式被激活时得到通知。此外，可以通过调用\
  \ `getModes()` 获取窗口系统中所有可用模式的集合。主应用程序窗口通过以下调用进行访问：\n\n`Frame main = WindowManager.getDefault().`**`getMainWindow()`**`;`\n\
  \n窗口系统类的架构总结在图 10-6 中。\n\n![图片](img/1006.jpg)\n\n***图 10-6.** NetBeans 窗口系统架构*\n\
  \n\n\n### 多视图\n\n使用 *MultiViewAPI* 可以在内部将一个顶层组件分割到多个容器或组件中。通常，顾名思义，这种方法用于为单个数据对象提供多个视图。最常见的例子是\
  \ NetBeans 表单编辑器，用户可以在“源代码”视图和“设计”视图之间切换。这两个视图都基于相同的 *.java* 和 *.form* 文件。但是，视图之间的关系并非强制性的。这意味着你可以将任何完全相互独立、显示不同数据的组件集成到容器中。因此，MultiView\
  \ SPI 可以用作一个通用框架。\n\n多视图顶层组件提供的按钮栏允许用户在不同视图之间切换。可选地，其中一个由任意类型的 `JComponent` 组成的视图，会提供一个显示在下拉列表旁边的工具栏（参见图\
  \ 10-7）。\n\n![图片](img/1007.jpg)\n\n***图 10-7.** 包含三个视图/组件的多视图顶层组件*\n\n每个视图由一个独立的组件组成，该组件必须是\
  \ `JComponent` 的子类。通常使用基类 `JPanel`。但是，这并不妨碍你使用 `TopComponent` 类，从而允许将一个或多个窗口集成到多视图中。要使一个组件成为多视图顶层组件中的一个视图，需要实现\
  \ `MultiViewElement` 接口。该接口定义的方法的含义，最好通过一个简单的例子来说明，如下所示：\n\n`public class MultiViewPanel1\
  \ extends` **`JPanel`** `implements`**`MultiViewElement`** `{`\n`   private JToolBar\
  \ toolbar = new JToolBar();`\n`private` **`MultiViewElementCallback`** `callback\
  \ = null;`\n\n`   public MultiViewPanel1() {`\n`      initComponents();`\n`      toolbar.add(new\
  \ Panel1ToolbarAction1());`\n`      toolbar.add(new Panel1ToolbarAction2());`\n\
  `   }`\n\n视图最初通过 `setMultiViewElementCallback()` 方法接收一个 `MultiViewElementCallback`，以便访问（其嵌入的）顶层组件。例如，通过此对象你可以获取多视图顶层组件，或者——正如你将看到的——你可以调整多视图顶层组件的名称。要在你的类中使用这个回调对象，请将数据保存为一个私有元素。视图的实例通过\
  \ `getVisualRepresentation()` 方法获取。每当视图被激活时都会调用此方法，这意味着应避免在此方法中创建组件。通常，使用 `this`\
  \ 来传递当前组件。当前视图的工具栏通过 `getToolbarRepresentation()` 方法获取。它也会被重复调用。为此，你也应该提供一个已创建的工具栏。多视图顶层组件上下文菜单中的操作，通过\
  \ `getActions()` 方法从当前活动视图中获取。首先，使用此方法通过 `MultiViewElementCallback` 对象访问顶层组件的标准操作。接下来，你可以将自己的操作添加到标准操作集中。使用\
  \ `getLookup()` 来提供一个 Lookup，该 Lookup 成为多视图顶层组件 Lookup 的一部分，因此也是全局上下文的一部分。\n\n`public\
  \ void` **`setMultiViewCallback`**`(MultiViewElementCallback c) {`\n`      callback\
  \ = c;`\n`   }`\n\n`public JComponent` **`getVisualRepresentation`**`() {`\n`      return\
  \ this;`\n`   }`\n\n`public JComponent` **`getToolbarRepresentation`**`() {`\n`      return\
  \ toolbar;`\n`   }`\n\n`public Action[]` **`getActions`**`() {`\n`      if(callback\
  \ != null) {`\n`         return callback.createDefaultActions();`\n`      } else\
  \ {`\n`         return new Action[]{};`\n`      }`\n`   }`\n\n`public Lookup` **`getLookup`**`()\
  \ {`\n`      return Lookups.singleton(this);`\n`   }`\n\n接下来的方法应该很熟悉，因为它们在讨论 `TopComponent`\
  \ 类时已经介绍过。通过这些方法，你可以了解视图和多视图顶层组件的各种状态。在这个例子中，你希望在视图被打开或激活时，动态地命名顶层组件的标题（例如视图的名称）。标题可以通过\
  \ `MultiViewElementCallback` 对象，使用 `updateTitle()` 方法来更改。\n\n`public void` **`componentOpened`**`()\
  \ {`\n`      callback.updateTitle(\"视图 1\");`\n`   }`\n\n`public void` **`componentClosed``**`()\
  \ {}`\n`public void` **`componentShowing`**`() {}`\n`public void` **`componentHidden`**`()\
  \ {}`\n\n`public void` **`componentActivated`**`() {`\n`      callback.updateTitle(\"\
  视图 1\");`\n`   }`\n\n`public void` **`componentDeactivated`**`() {}`\n\n每个视图通过 `getUndoRedo()`\
  \ 方法提供自己的撤销/重做功能。（如何通过 NetBeans API 实现撤销/重做将在第 15 章中讨论。）如果不需要此支持，请提供 `UndoRedo.NONE`，如下所示：\n\
  \n`public UndoRedo` **`getUndoRedo`**`() {`\n`      return UndoRedo.NONE;`\n`   }`\n\
  \n最后，实现 `canCloseElement()` 方法。当多视图顶层组件关闭时，会在每个视图上调用此方法。只有当所有视图都提供了 `CloseOperationState.STATE_OK`\
  \ 时，顶层组件才会被关闭。如果你的视图不能立即关闭，例如因为更改的数据尚未保存，请提供一个通过 `MultiViewFactory.createUnsafeCloseState()`\
  \ 方法创建的 `CloseOperationState` 对象。然而，这仅在实现了 `CloseOperationHandler` 时才有意义，该处理器在创建多视图顶层组件时传入，因为它负责解析所有视图的\
  \ `CloseOperationState` 对象。例如，在此处理器内，可以向用户显示一个对话框。\n\n`public CloseOperationState`\
  \ **`canCloseElement`**`() {`\n`      return CloseOperationState.STATE_OK;`\n`   }\
  \ }`\n\n为了创建和描述每个视图组件，你需要一个 `MultiViewDescription`。该类的主要作用是实例化图形视图组件，这些组件仅由 `createElement()`\
  \ 方法按需创建。该方法仅在用户首次打开视图时调用一次。`getPersistenceType()` 方法用于指定顶层组件的保存方式。使用 `TopComponent`\
  \ 类的常量（在“持久性”部分讨论）。参见清单 10-16。\n\n***清单 10-16.** 视图的描述与工厂*\n\n`public class MultiViewPanel1Description\
  \ implements` **`MultiViewDescription`**`, Serializable {`\n\n`public MultiViewElement`\
  \ **`createElement`**`() {`\n`return` **`new MultiViewPanel1()`**`);`\n`   }`\n\n\
  `   public String preferredID() {`\n`      return \"PANEL_1\";`\n`   }`\n\n`public\
  \ int` **`getPersistenceType`**`() {`\n`return` **`TopComponent.PERSISTENCE_NEVER`**`;`\n\
  `   }`\n\n`   public String getDisplayName() {`\n`      return \"视图 1\";`\n`   }`\n\
  \n`   public Image getIcon() {`\n`      return null;`\n`   }`\n\n`   public HelpCtx\
  \ getHelpCtx() {`\n`      return HelpCtx.DEFAULT_HELP;`\n`   } }`\n\n最后，剩下的就是从独立创建的视图中创建一个多视图顶层组件。为此，*MultiView\
  \ SPI* 提供了一个工厂：`MultiViewFactory` 类。此类包含允许根据需要创建 `TopComponent` 或 `CloneableTopComponent`\
  \ 的方法。\n\n`MultiViewDescription dsc[] = {`\n`   new MultiViewPanel1Description(),`\n\
  `   new MultiViewPanel2Description(),`\n`   new MultiViewPanel3Description()};`\n\
  `TopComponent tc =`**`MultiViewFactory.createMultiView`**`(dsc, dsc[0]);`\n`tc.open();`\n\
  \n\n\n首先，创建一个包含视图的 `MultiViewDescription` 类实例的数组。然后，将此数组传递给 `createMultiView()`\
  \ 方法。第二个参数用于确定初始活动视图。可选地，你可以将 `CloseOperationHandler` 的实现作为第三个参数传入。该处理器负责处理在关闭多视图顶级组件时，通过视图的\
  \ `canCloseElement()` 方法创建的 `CloseOperationState` 对象。这样，多视图顶级组件就被创建了，你只需通过 `open()`\
  \ 方法打开并显示该组件即可。为了从外部也能访问这些视图，你可以使用静态方法 `MultiViews.findMultiViewHandler()` 来为视图顶级组件创建一个\
  \ `MultiViewHandler`。通过此处理器，你可以获取当前选中的视图或一次性获取所有可用视图。\n\n### 总结\n\nNetBeans 平台窗口系统无疑是图形用户界面的核心部分，你可以通过它在独立窗口中实现和管理用户特定的\
  \ GUI。在本章中，你学习了窗口系统的基本结构。你了解了顶级组件、模式和组群的操作与特性。最后，你还学习了如何使用 MultiView API 来组合多个顶级组件。\n\
  \n## 第 11 章\n\n## 状态栏与进度条\n\n状态栏使你能够直接向应用程序的用户提供信息。同时，你还可以用自己的组件扩展状态栏。除了状态栏之外，应用程序中还集成了一个能够同时管理和显示多个任务的进度条。在接下来的章节中，你将学习如何使用这两个组件。\n\
  \n### 状态栏\n\nNetBeans 平台的应用程序窗口中已经集成了一个状态栏。你可以通过抽象类 `StatusDisplayer` 访问此状态栏。通过\
  \ `getDefault()` 方法，你可以获取状态栏的标准实现（如果没有提供其他实现，这就是标准的 NetBeans 平台状态栏）。你也可以提供自己的状态栏实现。（第\
  \ 5 章描述了如何为服务（例如状态栏）创建自己的实现。）\n\n#### 使用状态栏\n\n你可以通过 `setStatusText()` 方法在状态栏上输出文本：\n\
  \n`StatusDisplayer.getDefault().setStatusText(\"我的第一条状态\");`\n\n该方法有一个变体。通过这个变体，你可以通过一个额外的参数来确定所显示文本的重要性。这意味着状态消息会一直显示，直到设置了新的消息（具有相同或更高的重要性）。此外，你还可以选择自行删除该消息。为此，`setStatusText()`\
  \ 方法会返回一个句柄：\n\n`StatusDisplayer.Message setStatusText(String t, int importance)`\n\
  \n你可以在一个可参数化的毫秒数后删除相应的消息。你可以通过一个 `StatusDisplayer.Message` 实例形式的句柄，使用 `clear(int\
  \ timeInMillis)` 方法来实现。\n\n你可以通过 `addChangeListener()` 方法注册一个 `ChangeListener`，以响应状态栏的这些变化（文本的变化）。如果你想使用状态栏，必须确保你的模块定义了依赖于\
  \ UI 工具*包*模块。\n\n#### 扩展状态栏\n\n你可以非常简单地扩展状态栏（如果有足够的空间）。UI 工具 API 提供了服务接口 `StatusLineElementProvider`。该接口指定了\
  \ `getStatusLineElement()` 方法，该方法返回将被添加到状态栏的组件。\n\n你可以通过 `ServiceProvider` 注解添加你的实现。关于服务提供者如何提供其实现以及如何确定组件在状态栏中位置的更多信息，请参阅第\
  \ 5 章。作为示例，清单 11-1 展示了如何向状态栏添加一个时钟（参见图 11-1）。\n\n***清单 11-1.** 用时钟扩展状态栏*\n\n`import\
  \ org.openide.awt.StatusLineElementProvider;`\n\n`public class MyStatusLineClock\
  \ implements` **`StatusLineElementProvider`** `{`\n`   private static final DateFormat\
  \ format = DateFormat.getTimeInstance(DateFormat.MEDIUM);`\n`   private static JLabel\
  \ time = new JLabel(\" \" + format.format(new Date()) + \" \");`\n`   private JPanel\
  \ panel = new JPanel(new BorderLayout());`\n\n`   public MyStatusLineClock() {`\n\
  `      Timer t = new Timer(1000, new ActionListener() {`\n`         public void\
  \ actionPerformed(ActionEvent event) {`\n`            time.setText(\" \" + format.format(new\
  \ Date()) + \" \");`\n`         }`\n`      });`\n`      t.start();`\n`      panel.add(new\
  \ JSeparator(SwingConstants.VERTICAL), BorderLayout.WEST);`\n`      panel.add(time,\
  \ BorderLayout.CENTER);`\n`   }`\n\n`public Component` **`getStatusLineElement()`**\
  \ `{`\n`      return panel;`\n`   } }`\n\n现在，必须发布该实现，以便状态栏能够找到它。为此，请在类中添加以下注解：\n\
  \n`import org.openide.util.lookup.ServiceProvider`\n`@ServiceProvider(service =\
  \ StatusLineElementProvider.class)`\n`public class MyStatusLineClock implements\
  \ StatusLineElementProvider { … }`\n\n这样，你的时钟就被声明式地添加到了 Lookup 中。因此，状态栏可以找到它，并将其组件添加进去。\n\
  \n![图片](img/1101.jpg)\n\n***图 11-1.** 用你自己的组件扩展状态栏*\n\n#### 通知\n\n除了在状态栏左侧显示静态文本外，你还可以在右侧以气泡形式显示通知（参见图\
  \ 11-2）。这样不仅可以更醒目地向用户显示消息，用户还可以通过点击消息触发一个操作。例如，插件管理器就使用了这种通知，你可以从中下载或安装新模块。这样用户只需点击一下即可直接启动该过程。\n\
  \n![图片](img/1102.jpg)\n\n***图 11-2.** 在 NetBeans 平台内以气泡形式显示通知*\n\n显示的气泡会在几秒钟后自动隐藏。但是，图标会保留在状态栏中，以便用户仍然可以选择稍后调用该通知（参见清单\
  \ 11-2）。\n\n***清单 11-2.** 在状态栏中显示通知*\n\n**`Notification`** `noti =`**`NotificationDisplayer`**`.getDefault().`**`notify`**`(`\n\
  `    \"我的第一条通知...\",`\n`    ImageUtilities.loadImageIcon(\"com/galileo/netbeans/module/info16.png\"\
  , true),`\n`    \"... 几秒钟后消失\",`\n`    Lookups.forPath(\"NotificationActions\").lookup(ActionListener.class));`\n\
  \n如清单 11-2 所示，向 `notify()` 方法传递一个标题、一个图标、一个详细描述和一个操作（在示例中，通过系统文件系统的 Lookup 使用了一个操作）。或者，如果不提供操作，你也可以直接传递\
  \ `null`。可选地，你可以使用 `NotificationDisplayer.Priority` 来确定消息的优先级。提供了 `HIGH`、`LOW`、`NORMAL`\
  \ 和 `SILENT` 这些值；但是，`SILENT` 意味着状态栏中只显示图标。点击此图标时，气泡才会出现。如果消息由多个字符串组成，你也可以使用 `JComponent`\
  \ 实例，既作为气泡中的详细描述，也用于在通知列表中显示。你可以使用 `notify()` 方法的一个变体来实现。\n\n该消息会一直保留在状态栏的通知列表中，直到用户将其关闭。你也可以通过\
  \ `clear()` 方法，使用 `notify()` 方法返回的句柄 `Notification` 来关闭通知。\n\n\n\n### 进度条\n\n默认情况下，NetBeans\
  \ 状态栏集成了一个进度条。它通过 Progress API 来使用。有一些类可用于可视化简单任务的进度，也可用于监控多个任务（这些任务的进度会合并显示为一个）。同时，也可以监控各个独立任务的进度。\n\
  \n#### 显示独立任务的进度\n\n根据对进行中任务的了解程度，你可以设置三种不同的显示变体，如图 11-3 所示：\n\n*   如果已知所需步骤数，则显示完成前的百分比进度。\n\
  *   如果已知所需步骤数及其总耗时，则显示完成前的剩余秒数。\n*   如果既不知道所需步骤数，也不知道总耗时，则显示无限进度。\n\n![Image](img/1103.jpg)\n\
  \n***图 11-3.** 不同类型的进度显示*\n\n最基本的用例涉及使用 `ProgressHandleFactory`，为特定任务创建一个 `ProgressHandle`\
  \ 实例（见清单 11-3）。`ProgressHandle` 提供了对进度显示的控制。\n\n***清单 11-3.** 为独立任务使用进度条*\n\n`Runnable\
  \ run = new Runnable() {`\n`   public void run() {`\n**`ProgressHandle`** `p =`\
  \ **`ProgressHandleFactory`**`.createHandle(\"我的任务\");`\n`      p.start(100);`\n\
  `         // 执行一些工作`\n`      p.progress(\"步骤 1\", 10);`\n`         // 执行下一步工作`\n\
  `      p.progress(100);`\n`      p.finish();`\n`   } };`\n\n`Thread t = new Thread(run);`\n\
  `t.start(); // 启动任务和进度可视化`\n\n表 11-1 列出了用于启动不同显示类型的方法。\n\n![Image](img/t1101.jpg)\n\
  \n表 11-2 中显示的方法允许在运行时在有限和无限进度条之间切换，包括显示百分比或秒数。\n\n![Image](img/t1102.jpg)\n\n![Image](img/square.jpg)\
  \ **注意** 使用进度条时的一个常见错误与在负责更新 GUI 的事件分发线程中执行的实际任务有关。在该线程中执行任务会阻塞该线程，进而阻塞进度条的显示，因为当事件分发线程再次介入更新\
  \ GUI 时，这一步已经完成了。为了单独执行任务，可以使用 Java API 中的 `SwingWorker` 类。其用法在第 15 章中通过异步初始化进行了展示。在此上下文中，`ProgressUtils`\
  \ 类也提供了有用的功能。\n\n有几种方法可以通过 `ProgressHandleFactory` 创建 `ProgressHandle`。其中一种方法允许传递\
  \ `Cancellable` 服务接口，使用户能够通过进度条旁边显示的一个按钮来中止任务（见图 11-3）。\n\n`createHandle(String\
  \ displayName,` **`Cancellable`** `allowToCancel)`\n\n使用 `suspend(String message)`\
  \ 方法可以暂停进度条并显示相应的消息。\n\n#### 显示多个相关任务的进度\n\n此外，Progress API 还提供了一种扩展方法来监控进度。可以通过\
  \ `AggregateProgressFactory` 创建一个 `AggregateProgressHandle`。借助这个句柄，你可以将多个任务的进度组合起来，并在一个进度条中显示。为此，还需要\
  \ `ProgressContributor` 类。每个任务都需要一个该类的实例来向 `AggregateProgressHandle` 通报当前进度。\n\n\
  以下示例展示了这种进度显示类型的使用。为此，我们要创建一些执行时间不同的任务，然后在进度条中显示它们的进度。\n\n为此，我们首先创建抽象类 `AbstractTask`，它继承自\
  \ `Thread` 类。这允许列表中的任务并行执行。也可以不从 `Thread` 派生，而是顺序启动任务。这个抽象类负责创建和管理 `ProgressContributor`\
  \ 类，并负责通报当前进度。\n\n`public abstract class AbstractTask extends Thread {`\n`protected`\
  \ **`ProgressContributor`** `p = null;`\n\n`   public AbstractTask(String id) {`\n\
  `p =` **`AggregateProgressFactory.createProgressContributor`**`(id);`\n`   }`\n\n\
  `public` **`ProgressContributor`** `getProgressContributor() {`\n`      return p;`\n\
  `   } }`\n\n现在，你通过 `MyTask` 类创建一个需要十步才能完成的示例任务。你只需实现 `run()` 方法，在该方法中执行任务并通报进度。\n\
  \n`public class MyTask extends AbstractTask {`\n`   public MyTask(String id) {`\n\
  `      super(id);`\n`   }`\n\n`   public void run() {`\n`      p.`**`start`**`(10);`\n\
  `      //执行一些工作`\n`      p.`**`progress`**`(5);`\n`      //执行一些工作`\n`      p.`**`progress`**`(10);`\n\
  `      p.`**`finish`**`();`\n`   }`\n`}`\n\n`MyTask2` 类是另一个示例任务，它比 `MyTask1` 类需要更多步骤才能完成。\n\
  \n`public class MyTask2 extends AbstractTask {`\n`   public MyTask2(String id) {`\n\
  `      super(id);`\n`   }`\n\n`   public void run() {`\n`      p.`**`start`**`(30);`\n\
  `      //执行另一项工作`\n`      p.`**`progress`**`(2);`\n`      //执行另一项工作`\n`      p.`**`progress`**`(15);`\n\
  `      p.`**`finish`**`();`\n`   }`\n`}`\n\n在 `MyProgram` 类中，有一个任务列表和用于执行任务的 `processTaskList()`\
  \ 方法。作为示例，你在构造函数中存储三个任务并将它们添加到任务列表中。通过调用 `processTaskList()` 方法（例如，可以通过按钮调用），会为\
  \ `ProgressContributor` 创建一个数组，并将每个任务的 `ProgressContributor` 添加到该数组中。然后，你通过 `createHandle()`\
  \ 方法将此数组传递给 `AggregateProgressFactory`（它会创建一个 `AggregateProgressHandle`）（见清单 11-4）。启动此句柄时，进度条会显示出来，并准备好接收来自任务的进度通知。剩下的就是启动任务。当最后一个任务完成时，进度条会自动终止。\n\
  \n***清单 11-4.** 执行任务列表*\n\n`public class` **`MyProgram`** `{`\n`private List<AbstractTask>`\
  \ **`tasks`** `= new ArrayList<AbstractTask>();`\n\n`public` **`MyProgram`**`()\
  \ {`\n`tasks.add(new` **`MyTask`**`(\"任务 1\"));`\n`tasks.add(new` **`MyTask2`**`(\"\
  任务 2\"));`\n`tasks.add(new` **`MyTask2`**`(\"任务 3\"));`\n`   }`\n\n`   public void\
  \ processTaskList() {`\n**`ProgressContributor`** `cps[] = new` **`ProgressContributor`**`[tasks.size()];`\n\
  `      int i = 0;`\n`      for(AbstractTask task : tasks) {`\n`         cps[i] =\
  \ task.getProgressContributor();`\n`         i++;`\n`      }`\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n**`AggregateProgressHandle`** `aph =` **`AggregateProgressFactory.createHandle`**`(`\n\
  `            \"MyTasks”, // 显示名称`\n`            cps,       // 进度贡献者`\n`            null,      //\
  \ 不可取消`\n`            null);     // 无输出`\n`      aph.`**`start`**`();`\n`      for(AbstractTask\
  \ task : tasks) {`\n`         task.start();`\n`      }`\n`   }`\n`}`\n\n如果您希望了解所有任务的单独事件，可以将一个监视器传递给\
  \ `AggregateProgressHandle` 实例。为此，您只需在所需位置实现 `ProgressMonitor` 接口，并将其一个实例传递给 `AggregateProgressHandle`（参见清单\
  \ 11-5）。\n\n***清单 11-5.** 通过监视器监管单独任务的事件*\n\n`public class MyProgressMonitor implements`\
  \ **`ProgressMonitor`** `{`\n`public void` **`started`**`(ProgressContributor pc)\
  \ {`\n`      System.out.println(pc.getTrackingId() + \" 已开始\");`\n`   }`\n\n`public\
  \ void` **`progressed`**`(ProgressContributor pc) {`\n`      System.out.println(pc.getTrackingId()\
  \ + \" 已推进\");`\n`   }`\n\n`public void` **`finished`** `(ProgressContributor pc)\
  \ {`\n`      System.out.println(pc.getTrackingId() + \" 已完成\");`\n`   }`\n`}`\n\n\
  `AggregateProgressHandle aph = AggregateProgressFactory.create...`\n`aph.`**`setMonitor`**`(new\
  \ MyProgressMonitor());`\n\n#### 将进度条集成到您的组件中\n\n为了将进度条集成到组件中，`ProgressHandleFactory`\
  \ 和 `AggregateProgressFactory` 都提供了三种方法，用于获取带有名称的标签、带有详细信息的标签以及特定 `ProgressHandle`\
  \ 或 `AggregateProgressHandle` 的进度条：\n\n`JLabel` **`createMainLabelComponent`**`(ProgressHandle\
  \ ph)`\n`JLabel     `**`createDetailLabelComponent`**`(ProgressHandle ph)`\n`JComponent`\
  \ **`createProgressComponent`**`(ProgressHandle ph)`\n\n### 总结\n\n除了菜单栏、工具栏和窗口系统之外，状态栏和进度条也被集成到了\
  \ NetBeans 平台的应用程序窗口中。在本章中，您已经了解了它们。在第一部分中，您看到了如何使用和扩展状态栏。您还了解了以气泡形式显示通知的支持。在第二部分中，您学习了用于显示或多或少正在进行的任务进度的各种方法。\n\
  \n## 第 12 章\n\n## 节点和资源管理器\n\n在第 7 章中，您了解到 NetBeans 平台为创建、管理、编辑和呈现数据提供了一个非常重要的概念。然后您学习了文件系统\
  \ API 和数据系统 API。本章将介绍以节点形式呈现数据。节点可以附带操作，并显示在资源管理器视图中。因此，节点负责数据的特定于类型的表示。在此上下文中，一个\
  \ `Node` 代表一个 `DataObject`，而 `DataObject` 本身负责创建节点（参见第 7 章）。\n\n### 节点 API\n\n*节点\
  \ API* 是 NetBeans 资源管理系统中的第三层，也是最高层。在此上下文中，节点 API 的作用是数据的可视化表示。与此 API 紧密相关的是*资源管理器\
  \ API*，它用于显示和管理节点。节点用于将数据呈现给应用程序的用户界面，并为用户提供用于与底层数据交互的操作、功能和属性。然而，节点不仅仅用于呈现数据，还可以用于许多其他事情。例如，当双击节点时，可以调用隐藏在节点下的操作。此外，节点通常不关心业务逻辑，而是专注于提供表示层，将用户交互委托给操作类，并在适用的情况下委托给其相关的数据对象。\n\
  \n#### 节点类\n\n通用接口和特性由抽象基类 `Node` 描述（参见图 12-1）。所有 `Node` 的子类都可以在资源管理器视图中进行管理和显示，其可能性将在“资源管理器\
  \ API”部分中介绍。\n\n![Image](img/1201.jpg)\n\n***图 12-1.** 节点基类的层次结构*\n\n`AbstractNode`\
  \ 和 `FilterNode` 这两个类派生自 `Node`。`AbstractNode` 类通过为标准实现提供基类的抽象方法，代表了节点最简单的形式。因此，从这个类开始，您可以直接创建一个实例。代理节点可以通过\
  \ `FilterNode` 类实现，它将方法调用委托给原始节点。当数据集需要在多个位置可视化时，通常使用这种节点。`BeanNode` 类用于表示 JavaBean。节点的子元素可以通过\
  \ `IndexedNode` 类使用 `Index` 进行分类。最后，还有最常用的子类 `DataNode`；使用这种节点可以表示数据对象。在最简单的情况下，直接使用这个类；在第\
  \ 7 章中，MP3 文件类型就是这种情况。这个类由 `Mp3DataObject` 的 `createNodeDelegate()` 方法实例化。该对象负责提供相应的节点本身。\n\
  \n除了对数据对象的引用之外，`Mp3DataObject` 的 Lookup 也会传递给构造函数。通过这个 Lookup，数据对象可以在某种程度上将其操作提供给用户，或者将其操作带到表面。例如，在节点上执行的操作通过\
  \ `getLookup()` 方法获取节点的特性，从而获取底层数据对象的 Lookup。因此，节点只是转发 Lookup。然而，节点本身——以及数据对象——可以拥有并以上下文接口的形式提供功能。这些功能——与数据对象完全相同——由节点通过\
  \ `getCookieSet().assign()` 关联，并通过 `getLookup()` 方法从外部调用。在这种情况下，不必将 Lookup 传递给节点构造函数，因为构造函数使用其自身的\
  \ Lookup。\n\n如果一个节点不显示数据对象，而是显示一些特殊内容——例如，根节点——您可以创建自己的节点类，直接从 `AbstractNode` 派生。使用这个基类，您还可以在后续示例中实现文件夹节点。\n\
  \n#### 节点容器\n\n每个节点都有自己的 `Children` 对象，它代表一个子节点容器，这些子节点是该节点的下级节点。在此上下文中，容器负责添加、删除和结构化子节点。位于此容器中的每个节点都将该节点（容器的所有者）作为父节点。对于那些没有子节点的节点——例如，`Mp3DataObject`\
  \ 的 `DataNode`——可以通过 `Children.LEAF` 传递一个空容器。抽象基类 `Children` 有多个变体。通常，您不应该从这个基类派生。最常见的类是\
  \ `Children.Keys<T>` 类，其中键和节点之间通常是一对一的关系。在图 12-2 所示的示例中，节点的键是一个文件对象。但是，您不直接使用该类，而是从\
  \ `ChildFactory` 类派生，并通过工厂方法 `Children.create()` 创建一个 `Children` 对象。这使您能够在后台轻松创建子节点（例如，如果直接创建会长时间阻塞\
  \ GUI）。\n\n![Image](img/1202.jpg)\n\n***图 12-2.** 不同子容器类的层次结构*\n\n\n\n#### 节点图标\n\
  \n您可以使用 `setIconBaseWithExtension()` 方法，根据节点的当前状态，设置一组图标（为节点显示）的路径。通过此方法，您可以定义四种不同图标的基础名称。例如，如果您指定了\
  \ *com/galileo/netbeans/module/icon.png*，则会自动找到以下图标（这些图标应已提供）：\n\n*   com/galileo/netbeans/module/icon.png\n\
  *   com/galileo/netbeans/module/iconOpen.png\n*   com/galileo/netbeans/module/icon32.png\n\
  *   com/galileo/netbeans/module/iconOpen32.png\n\n#### 节点上下文菜单\n\n节点为用户提供一个上下文菜单，通过该菜单可以提供与上下文无关的操作。`DataNode`\
  \ 通过节点所管理的数据对象的工厂，获取其上下文菜单的条目或相应操作。反过来，节点类通过 `getActions()` 方法提供这些操作。正如您在第 7 章中所学，在这方面，可以将操作注册在\
  \ MIME 类型特定文件夹下的标准文件夹 `Loaders` 中。例如，如果 MIME 类型是 `audio/mpeg`，如第 7 章所示，操作将注册在 `Loaders/audio/mpeg/Actions`\
  \ 中。当然，您可以为此使用 Actions API 的机制（在第 6 章中描述）。这些操作会被自动读取并添加到节点的上下文菜单中。为了说明这一点，我将继续使用第\
  \ 7 章中的 MP3 数据对象示例。只需添加以下注解，即可将 `PlayAction` 操作添加到 `Mp3DataObject` 的节点上下文菜单中。\n\n\
  `@ActionReferences({`\n`   ...`\n**`@ActionReference`**`(`\n`      path = \"`**`Loaders/audio/mpeg/Actions`**`\"\
  ,`\n`      position = 50, separatorAfter=60)`\n`})`\n`public final class PlayAction\
  \ implements ActionListener { ...`\n\n因此，播放功能也会出现在 MP3 文件的上下文菜单中（参见图 12-3）。当然，这还结合了第\
  \ 7 章中实现的上下文敏感性（另请参见第 6 章）。这意味着如果文件正在播放，播放操作在上下文菜单中也会被禁用。\n\n![Image](img/1203.jpg)\n\
  \n***图 12-3.** 向节点上下文菜单添加操作*\n\n节点通过 `getPreferredAction()` 方法提供双击时执行的操作。如果未重写此方法，则使用\
  \ `getActions()` 返回数组中的第一个操作。\n\n#### 事件处理\n\n为了响应节点的事件，您可以安装 `PropertyChangeListener`\
  \ 以及 `NodeListener`。您可以使用 `PropertyChangeListener` 来监视节点通过 `getPropertySet()` 方法提供的属性。通过\
  \ `NodeListener`，您可以获知节点的内部变化，例如名称、父节点以及子节点等。为此，节点类提供了一系列公共属性键，例如 `PROP_NAME` 或\
  \ `PROP_LEAF`。`NodeListener` 提供了表 12-1 中所示的方法。\n\n![Image](img/t1201.jpg)\n\n如果您不想了解或实现所有事件，可以使用适配器类\
  \ `NodeAdapter` 来代替 `NodeListener` 接口。\n\n#### 示例\n\n接下来，我将向您展示一个示例，说明如何使用 Nodes\
  \ API 创建自己的节点类并构建子容器。这样做时，您还会看到节点背后不仅可以有文件。在此示例中，节点将用于在树形结构中表示操作，同时您希望通过层文件定义内容。这样，内容可以灵活调整，并为其他模块提供一个扩展点。要在树形结构中显示节点，请使用\
  \ Explorer API（将在下一节讨论）。完整的示例将生成一个资源管理器窗口，如图 12-4 所示。\n\n![Image](img/1204.jpg)\n\
  \n***图 12-4.** 使用节点和资源管理器视图的示例*\n\n您在层文件中的一个单独文件夹中确定资源管理器窗口的上下文。我们将此文件夹称为 `Explorer`；它分别代表窗口或模块的扩展点。操作（由资源管理器窗口树形结构中的节点表示）可以注册在该文件夹的任何子文件夹中（参见清单\
  \ 12-1）。层文件的内容如图 12-4 所示的示例。\n\n***清单 12-1.** 层文件中的扩展点；资源管理器文件夹中的所有条目都显示在资源管理器窗口中。*\n\
  \n`<`**`folder`** `name=\"`**`Explorer`**`\">`\n`  <attr name=\"icon\" stringvalue=\"\
  com/galileo/netbeans/module/explorer.png\"/>`\n`  <`**`folder`** `name=\"`**`MP3\
  \ Player`**`\">`\n`    <attr name=\"icon\" stringvalue=\"com/galileo/netbeans/module/player.png\"\
  />`\n`    <`**`file`** `name=\"`**`PlaylistAction.shadow`**`\">`\n`      <attr name=\"\
  originalFile\"`\n`            stringvalue=\"Actions/Edit/com-galileo-netbeans-module-PlaylistAction.instance\"\
  />`\n`    </file>`\n`  </folder>`\n`  <`**`folder`** `name=\"`**`Views`**`\">`\n\
  `    <attr name=\"icon\" stringvalue=\"com/galileo/netbeans/module/views.png\"/>`\n\
  `    <`**`file`** `name=\"`**`OutputAction.shadow`**`\">`\n`      <attr name=\"\
  originalFile\"`\n`            stringvalue=\"Actions/Window/org-netbeans-core-io-ui-IOWindowAction.instance\"\
  />`\n`    </file>`\n`  </folder>`\n`  <`**`folder`** `name=\"`**`Favorites`**`\"\
  >`\n`    <attr name=\"icon\" stringvalue=\"com/galileo/netbeans/module/favorites.png\"\
  />`\n`    <`**`file`** `name=\"`**`FavoritesAction.shadow`**`\">`\n`      <attr\
  \ name=\"originalFile\"`\n`            stringvalue=\"Actions/Window/org-netbeans-modules-favorites-View.instance\"\
  />`\n`    </file>`\n`  </folder>`\n`</folder>`\n\n您可以看到，这些操作——在此处通过 `shadow` 文件注册——引用了已注册的操作。此外，您希望能够通过自定义属性\
  \ `icon` 为文件夹分配图标。当然，这些引用也可以通过相应的注解来创建（参见第 6 章）。要使用节点显示此结构，您需要一个节点类和一个用于每个操作的子工厂类。从表示文件夹内容的节点类开始。将其命名为\
  \ `ExplorerFolderNode`，并从节点标准实现 `AbstractNode` 派生。因此，目前您只需要一个构造函数。您将 `FileObject`\
  \ 传递给此节点的构造函数。`FileObject` 表示层文件的一个文件夹条目，以及一个负责创建子元素的 `Children` 对象。您将此对象传递给基类构造函数。然后，您通过层文件的值设置节点的名称和图标基础路径。（参见清单\
  \ 12-2。）\n\n***清单 12-2.** 用于表示文件夹的节点类*\n\n`import org.openide.filesystems.FileObject;`\n\
  `import org.openide.nodes.AbstractNode;`\n`import org.openide.nodes.Children;`\n\
  \n`public class` **`ExplorerFolderNode`** `extends` **`AbstractNode`** `{`\n\n\n\
  \n`   public ExplorerFolderNode(FileObject node, Children ch) {`\n`      super(ch);`\n\
  **`setDisplayName`**`(node.getName());`\n`      String iconBase = (String) node.getAttribute(\"\
  icon\");`\n`      if(iconBase != null) {`\n**`setIconBaseWithExtension`**`(iconBase);`\n\
