  \n使用此操作，你可以将键盘事件转发给其他 widget。\n\n`ActionFactory.`**`createForwardKeyEventsAction`**`(`\n\
  **`   Widget`** `forwardToWidget,`\n**`   String`** `forwardToTool);`\n\n**HoverAction**\n\
  \n使用 `HoverAction`，你可以在鼠标指针移动到 widget 上方时做出响应。widget 的行为由 `HoverProvider` 或 `TwoStateHoverProvider`\
  \ 指定。\n\n`ActionFactory.`**`createHoverAction`**`(`**`HoverProvider`** `p);`\n`ActionFactory.`**`createHoverAction`**`(`**`TwoStateHoverProvider`**\
  \ `p);`\n\n**MoveControlPointAction/FreeMoveControlPointAction/OrthogonalMoveControlPointAction**\n\
  \n这些操作用于移动 `ConnectionWidget` 连接线的控制点。当 `ConnectionWidget` 具有 `OrthogonalSearchRouter`\
  \ 时，使用 `OrthogonalMoveControlPointAction`。`FreeMoveControlPointAction` 对点的定位没有任何限制。\n\
