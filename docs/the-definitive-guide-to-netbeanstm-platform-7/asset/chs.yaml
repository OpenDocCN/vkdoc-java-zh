  **CycleFocusAction/CycleObjectSceneFocusAction**\n\n使用 `CycleFocusAction` 和 `CycleObjectSceneFocusAction`，你可以通过\
  \ *Tab* 键在场景的控件之间向前或向后切换焦点。使用 `CycleFocusAction` 时，你可以通过 `CycleFocusProvider` 指定行为，即设置焦点的前一个或后一个控件。对于可以应用于\
