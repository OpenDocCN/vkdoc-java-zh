  \n使用之前通过注解定义的标识符（`id` 属性）。\n\n### 管理设置\n\nNetBeans Platform 应用程序中的设置和配置数据最好通过 Java\
  \ Preferences API 进行保存和加载。Java 平台通过 `Preferences` 类指定了一个接口。使用此接口，可以独立于其物理位置保存和加载设置和配置数据。可以提供不同的实现，以便将数据保存在文件、系统注册表甚至数据库中。数据以键值对的形式按层次结构保存。`Preferences`\
  \ 类的一个实例代表此层次结构中的一个节点。你可以将节点想象成文件系统中的一个目录，数据可以保存在其下。\n\n通过 `NbPreferences` 类，Utilities\
  \ API 为 NetBeans Platform 提供了 Java Preferences 规范的一个实现。此实现确保设置存储在应用程序的中央配置目录中，该目录位于用户目录中。设置以普通的\
  \ *.properties* 文件形式存储。因此，你通过 Preferences 保存的设置，就像 NetBeans Platform 应用程序中的所有其他设置一样，是按用户管理的。`NbPreferences`\
  \ 类提供了两个静态方法。使用 `forModule()` 方法，会返回一个 `Preferences` 节点，其数据为每个模块保存在 *config/Preferences*\
  \ 目录下的一个单独的 *.properties* 文件中（参见图 20-3）。使用 `root()` 方法，会返回一个应用程序全局的 `Preferences`\
  \ 节点，该节点在 *config/Preferences.properties* 文件中管理其数据。\n\n![Image](img/2003.jpg)\n\n\
  ***图 20-3.** 使用 NetBeans Preferences 实现，设置可以按模块保存在 Preferences 目录中，也可以按应用程序全局保存在\
  \ Preferences.properties 文件中*\n\n然后，你可以使用 `Preferences` 类指定的方法轻松保存和读取设置。例如，如果你想保存服务器的名称和端口，我们使用清单\
  \ 20-9 中所示的调用。\n\n***清单 20-9.** 通过 Preferences API 保存和加载设置*\n\n`Preferences node\
  \ =` **`NbPreferences.forModule(this.getClass());`**\n`String name = node.`**`get`**`(\"\
  server.name\", \"localhost\");`\n`int    port = node.`**`getInt`**`(\"server.port\"\
  , 8080);`\n`node.`**`put`**`(\"server.name\", name);`\n`node.`**`putInt`**`(\"server.port\"\
  , port);`\n\n除了此处显示的用于访问数据的方法外，还有更多方法可用，例如，你也可以轻松保存数组或布尔值。此外，通过 *Java* *Preferences*\
  \ *API*，你可以在一个 `Preferences` 实例（即一个节点）上注册 `NodeChangeListener` 和 `PropertyChangeListener`，以便对子节点的添加和删除以及数据的变化做出反应。\n\
  \n### 总结\n\n通过 Options Dialog API 和 SPI，NetBeans Platform 提供了一个预制的选项对话框。在此选项对话框中，你可以快速轻松地集成你自己的（私有）面板。你已经学习了如何由用户集中且统一地管理设置。你还学习了\
  \ NetBeans Preferences API 如何简化保存设置的过程。\n\n## 第 21 章\n\n## 面板\n\n窗体编辑器是使用面板模块的一个非常好的例子。窗体编辑器将其\
  \ AWT 和 Swing 组件放置在面板上（参见图 21-1）。然后可以通过拖放移动这些组件。你也可以在运行时向面板添加组件。面板窗口的内容由 `PaletteController`\
  \ 管理和提供。这样的 `PaletteController` 可以通过 Lookup 由顶层组件提供。这意味着，一旦某个 Lookup 中包含 `PaletteController`\
  \ 实例的顶层组件变为活动状态，面板窗口就会打开并显示其内容。`PaletteController` 是通过 `PaletteFactory` 类创建的。有两种方式提供组件。你可以通过层文件中的\
  \ XML 文件注册将在面板上显示的组件，或者你可以使用两级或三级节点层次结构。我们将在此处探讨这两种方法。\n\n请注意，你不仅限于为自己的顶层组件提供面板，还可以在层文件中为特定文件类型注册一个面板，该面板仅在\
  \ NetBeans 编辑器中打开此类文件时显示。如果你想扩展 NetBeans IDE 的功能，这尤其有用。此主题将在第 22 章 中探讨。\n\n![Image](img/2101.jpg)\n\
  \n***图 21-1.** NetBeans GUI 编辑器的面板*\n\n\n\n### 通过图层文件定义面板条目\n\n将放置在面板上的组件通过 清单 21-1\
  \ 所示的 XML 文件进行定义。\n\n***清单 21-1.** 定义面板条目的 XML 文件*\n\n`<!DOCTYPE` **`editor_palette_item`**\
  \ `PUBLIC`\n`   \"-//NetBeans//Editor Palette Item 1.1//EN\"`\n`   \"http://www.netbeans.org/dtds/editor-palette-item-1_1.dtd\"\
  >`\n`<`**`editor_palette_item`** `version=\"1.1\">`\n`   <body></body>`\n`   <`**`icon16`**\
  \ `urlvalue=\"file:/E:/icon16.jpg\"/>`\n`   <`**`icon32`** `urlvalue=\"file:/E:/icon32.jpg\"\
  />`\n`   <`**`inline-description`**`>`\n`      <`**`display-name`**`>My Palette\
  \ Item</`**`display-name`**`>`\n`      <`**`tooltip`**`>My Palette Item</`**`tooltip`**`>`\n\
  `   </`**`inline-description`**`>`\n`</`**`editor_palette_item`**`>`\n\n通过 `icon16`\
  \ 和 `icon32` 元素，你可以根据用户设置分别为该条目定义要显示的图标。通常，它们的尺寸为 16 像素和 32 像素，但也可以更大。不过，即使对于 `icon16`\
  \ 属性，分配一个 16 像素大小的图标也是有意义的，因为该属性也用于在面板管理器中显示（可通过“面板”窗口的上下文菜单调用），而该管理器只能显示 16 像素的图标。有趣的是，你还可以使用绝对路径，如本节示例所示。因此，不仅可以使用模块中的图标，还可以使用用户自定义目录中的图标。如果你希望用户在运行时能够向面板添加条目，这一点尤其有用。\n\
  \n通过 `inline-description` 元素及其两个子元素 `display-name` 和 `tooltip`，你可以确定条目在面板中显示的文本。或者，你也可以使用\
  \ `description` 元素代替 `inline-description`。通过其属性 `localizing-bundle`，你可以指定一个资源包，该资源包提供\
  \ `display-name` 和 `tooltip` 的值。通过属性 `display-name-key` 和 `tooltip-key`，你可以指定这些值的键。这样，你还可以实现面板条目的国际化；查看此\
  \ XML 文件的 DTD（DTD 可在附录中找到）会非常有帮助。\n\n现在你可以定义任意数量的组件。这些组件必须注册到模块的图层文件中，以便将其添加到面板中。为此，你可以定义一个任意文件夹。在此文件夹下，为每个将在面板上显示的类别创建一个子文件夹。然后，将\
  \ XML 文件放入此子文件夹中。结果如下所示，例如：\n\n`<folder name=\"`**`MyPaletteItems`**`\">`\n`   <folder\
  \ name=\"`**`My Category`**`\">`\n`      <file name=\"myitem1.xml\" url=\"`**`myitem1.xml`**`\"\
  />`\n`      <file name=\"myitem2.xml\" url=\"`**`myitem2.xml`**`\"/>`\n`   </folder>`\n\
  `</folder>`\n\n现在，只缺少一个 `PaletteController` 实例，你需要将其添加到将显示面板条目的顶层组件中（参见清单 21-2）。正如本章开头所述，为此你需要使用\
  \ `PaletteFactory` 类。该类提供了一个工厂方法，即 `createPalette()`。你只需将你在图层文件中定义的 `MyPaletteItems`\
  \ 文件夹传递给此方法。然后，`PaletteFactory` 和 `PaletteController` 类会处理其余工作。你必须提供一个 `PaletteActions`\
  \ 类的实现作为第二个参数。该类为某些事件提供操作。在最简单的情况下，你可以创建此抽象类的空实现，并在方法中返回空数组 `null`。\n\n***清单 21-2.**\
  \ 创建面板实例并将其与顶层组件连接*\n\n`public MyTopComponent() {`\n`   ...`\n`   try {`\n`      associateLookup(Lookups.fixed(`\n\
  **`PaletteFactory.createPalette(\"MyPaletteItems\", new MyActions())`**`));`\n`   }\
  \ catch(IOException e) {`\n`      // 找不到 MyPaletteItems`\n`   }`\n`}`\n\n### 通过自定义节点创建面板\n\
  \n面板的条目由一个节点表示。在上一节中，你通过 XML 文件定义了每个条目。对于每个这样的条目，都会自动提供一个标准节点。你也可以通过自己的节点实现（而非 XML\
  \ 定义）来提供面板组件。这些节点必须存在于一个三级层次结构中。顶层只是一个根节点，你可以将其传递给 `createPalette()` 方法以创建元素。第二层上的节点（即根节点的所有子节点）代表一个类别。反过来，它们的子节点则用作面板条目。例如，假设你想创建一个用于管理音乐专辑的面板，这些专辑可以通过拖放添加到播放列表中（如图\
  \ 21-2 所示）。\n\n![Image](img/2102.jpg)\n\n***图 21-2.** 使用面板管理音乐专辑，这些专辑可以通过拖放添加到播放列表中*\n\
  \n\n\n#### 节点类\n\n正如你在第 12 章中所学，子节点由`ChildFactory`类创建。你需要创建一个这样的类来管理类别，这些类别将显示在组件面板上，在本例中为流派。为此，你需要继承`ChildFactory<String>`类。节点由`createNodesForKey()`方法创建。对于本例（参见清单\
  \ 21-3），你只需直接创建三个`GenreNode`实例。\n\n可以想象，你将从数据库中读取流派，然后为其创建`GenreNode`对象。（在涉及嵌入和使用\
  \ Java DB 的第 26 章中，我们将使用并扩展此示例。）`GenreNode`类本身非常简单。流派作为参数传递给其构造函数，该参数直接传递给`AlbumNodeFactory`类。这样，你就处于节点层次结构的第二级（或第三级）（参见清单\
  \ 21-4）。\n\n***清单 21-3.** 所有将显示在组件面板上的流派，均由 GenreNodeFactory 创建。*\n\n`import org.openide.nodes.ChildFactory;`\n\
  `import org.openide.nodes.Node;`\n`...`\n`public class` **`GenreNodeFactory`** `extends\
  \ ChildFactory<String> {`\n\n`   @Override`\n`protected boolean` **`createKeys`**`(List<String>\
  \ toPopulate) {`\n`      toPopulate.add(\"root\");`\n`      return true;`\n`   }`\n\
  \n`@Override    protected Node[]` **`createNodesForKey`**`(String key) {`\n`      return\
  \ new Node[]{`\n`         new GenreNode(\"Techno, Trance and Dance\"),`\n`         new\
  \ GenreNode(\"Rock and Pop\"),`\n`         new GenreNode(\"Country and Classic\"\
  )};`\n`   }`\n`}`\n\n***清单 21-4.** 由 GenreNode 类表示的流派*\n\n`import org.openide.nodes.AbstractNode;`\n\
  `import org.openide.nodes.Children;`\n\n`public class` **`GenreNode`** `extends\
  \ AbstractNode {`\n`   public GenreNode(String genre) {`\n`super(Children.create(new`\
  \ **`AlbumNodeFactory`**`(genre), false));`\n`      this.`**`setDisplayName`**`(genre);`\n\
  `   }`\n`}`\n\n负责为特定流派创建专辑的`AlbumNodeFactory`类，其构建方式与`GenreNodeFactory`类基本相同。首先，在`createNodesForKey()`方法中直接创建三个`AlbumNode`类型的节点实例，并将流派传递给该方法。利用此参数，例如，你可以在数据库中搜索属于该流派的专辑。专辑的数据由`Album`类管理（参见清单\
  \ 21-5）。\n\n***清单 21-5.** AlbumNodeFactory 类为特定流派创建专辑节点。*\n\n`import org.openide.nodes.ChildFactory;`\n\
  `import org.openide.nodes.Node;`\n`...`\n`public class` **`AlbumNodeFactory`** `extends\
  \ ChildFactory<String> {`\n`   private String genre;`\n\n`   public AlbumNodeFactory(String\
  \ genre) {`\n`      this.genre = genre;`\n`   }`\n\n`   @Override`\n`protected boolean`\
  \ **`createKeys`**`(List<String> toPopulate) {`\n`      toPopulate.add(genre);`\n\
  `      return true;`\n`   }`\n\n`   @Override`\n`protected Node[]` **`createNodesForKey`**`(String\
  \ key) {`\n`      return new Node[] {`\n**`new AlbumNode`**`(`\n**`new Album`**`(\"\
  Tunnel Trance Force 39\", \"42\", \"2\",\"2007\",`\n`                  \"com/galileo/netbeans/module/cover_small.jpg\"\
  ,`\n`                  \"com/galileo/netbeans/module/cover_big.jpg\")),`\n**`new\
  \ AlbumNode`**`(`\n**`new Album`**`(\"Dream Dance 43\", \"39\", \"3\", \"2007\"\
  ,`\n`                  \"com/galileo/netbeans/module/cover2_small.jpg\",`\n`                  \"\
  com/galileo/netbeans/module/cover2_big.jpg\")),`\n**`new AlbumNode`**`(`\n**`new\
  \ Album`**`(\"DJ Networx 31\", \"45\", \"2\", \"2006\",`\n`                  \"\
  com/galileo/netbeans/module/cover3_small.jpg\",`\n`                  \"com/galileo/netbeans/module/cover3_big.jpg\"\
  ))       };`\n`   }`\n`}`\n\n最后，`AlbumNode`类负责在组件面板上显示专辑（如图 21-2 所示）。由于`AlbumNode`没有额外的子节点，你需要通过`Children.LEAF`将一个空容器传递给基类的构造函数。你通过`setDisplayName()`确定名称，该名称将显示在组件面板上。你可以在此处使用\
  \ HTML 来实现吸引人的展示效果（参见清单 21-6）。为此，我创建了`getLabel()`方法，该方法组合一个 HTML 字符串，以表格形式显示专辑数据。`getHtmlDisplayName()`的值在面板管理器中使用，你可以通过组件面板的上下文菜单打开该管理器。你通过`getIcon()`方法提供相应条目的图标。在此示例中，图标是专辑的封面。因此，用户可以在大图标和小图标之间进行选择。所以，你应该根据`type`参数提供一个小图标（通常为\
  \ 16 像素）和一个大图标。\n\n***清单 21-6.** AlbumNode 类负责显示组件面板条目。*\n\n`import org.openide.nodes.AbstractNode;`\n\
  `import org.openide.nodes.Children;`\n`...`\n`public class` **`AlbumNode`** `extends\
  \ AbstractNode {`\n`private` **`Album`** `album = null;`\n\n`   public AlbumNode(`**`Album`**\
  \ `album) {`\n`      super(`**`Children.LEAF`**`);`\n`      this.album = album;`\n\
  `      this.setDisplayName(getLabel());`\n`   }`\n\n`public String` **`getHtmlDisplayName`**`()\
  \ {`\n`      return \"<b>\" + album.getTitle() + \"</b> (\" + album.getTracks()\
  \ + \" Tracks)\";`\n`   }`\n\n`public Image` **`getIcon`**`(int type) {`\n`      return\
  \ album.getIcon(type);`\n`   }`\n\n`private String` **`getLabel`**`() {`\n`      String\
  \ label = \"<html>\" +`\n`         \"<table cellspacing=\\\"0\\\" cellpadding=\\\
  \"1\\\">\" +`\n`            \"<tr>\" +`\n`               \"<td><b>Title </b></td>\"\
  \ +`\n`               \"<td>\" + album.getTitle() + \"</td>\" +`\n`             ...`\n\
  `   }`\n`}`\n\n#### 创建并添加组件面板\n\n创建完这个为组件面板提供数据的节点层次结构后，你现在可以创建一个组件面板并将其添加到播放列表顶层组件的\
  \ Lookup 中。这样，只要播放列表处于活动状态，组件面板就会显示出来。因此，首先在`PlaylistTopComponent`类的构造函数中创建一个根节点。你的组件面板数据来自这个根节点。你向此根节点传递一个子容器，该容器由工厂方法`Children.create()`创建。这个子容器负责管理数据。同时，你传递一个负责创建数据的`GenreNodeFactory`实例。然后，你只需要一个`PaletteActions`实例，目前它没有更多意义。稍后，你可以通过`createPalette()`从中创建一个`PaletteController`实例。你可以将此实例打包到一个\
  \ Lookup 中，并通过`associateLookup()`将其定义为顶层组件的本地 Lookup。\n\n`import org.netbeans.spi.palette.PaletteActions;`\n\
  `import org.netbeans.spi.palette.PaletteController;`\n`import org.netbeans.spi.palette.PaletteFactory;`\n\
  `...`\n`public` **`PlaylistTopComponent`**`() {`\n`   ...`\n`   Node root = new\
  \ AbstractNode(`**`Children.create(new GenreNodeFactory(), false)`**`);`\n`   PaletteActions    a\
  \ = new MyPaletteActions();`\n`   PaletteController p = PaletteFactory.`**`createPalette`**`(root,\
  \ a);`\n**`associateLookup`**`(Lookups.fixed(p));`\n`}`\n\n\n\n#### 拖放功能\n\n目前仍缺少将专辑从面板拖放到播放列表窗口的功能。为此，需要补充两个部分：一个用于`Album`和`AlbumNode`类，另一个用于将接收`Album`类实例的顶层组件或表格。\n\
  \n你要传递的数据位于`Album`类中。你在`Album`类上实现`Transferable`接口，以便能够通过拖放直接将它们传递给播放列表顶层组件（参见清单\
  \ 21-7）。需要一个`DataFlavor`（你在`Album`中将其创建为静态实例）来标识数据。通过`getTransferDataFlavors()`方法返回你特定的`DataFlavor`。`getTransferData()`方法由播放列表窗口调用。如果请求的`DataFlavor`是`DATA_FLAVOR`类型，则通过`this`将专辑实例返回给此方法。如果请求了其他`DataFlavor`，则触发异常。\n\
  \n***清单 21-7.** Album 类包含数据并实现 Transferable 接口，因此可以通过拖放传递。*\n\n`import java.awt.datatransfer.DataFlavor;`\n\
  `import java.awt.datatransfer.Transferable;`\n`import java.awt.datatransfer.UnsupportedFlavorException;`\n\
  `...`\n`public class` **`Album`** `implements` **`Transferable`** `{`\n`public static\
  \ final DataFlavor` **`DATA_FLAVOR`** `= new DataFlavor(`**`Album.class`**`, \"\
  album\");`\n`   ...`\n\n`public DataFlavor[]` **`getTransferDataFlavors`**`() {`\n\
  `      return new DataFlavor[] {DATA_FLAVOR};`\n`   }`\n\n`public boolean` **`isDataFlavorSupported`**`(DataFlavor\
  \ flavor) {`\n`      return flavor == DATA_FLAVOR;`\n`   }`\n\n`public Object` **`getTransferData`**`(DataFlavor\
  \ flavor) throws UnsupportedFlavorException {`\n`      if(flavor == DATA_FLAVOR)\
  \ {`\n**`return this;`**\n`      } else {`\n`         throw new UnsupportedFlavorException(flavor);`\n\
  `      }`\n`   }`\n`}`\n\n实际上，用户移动的不是`Album`对象本身，而是`AlbumNode`实例。这意味着拖放事件是在节点上触发的。因此，你重写了`Node`类已指定的`drag()`方法。此方法返回一个`Transferable`实例——在本例中，是由`AlbumNode`表示的专辑实例（参见清单\
  \ 21-8）。\n\n***清单 21-8.** 使 AlbumNode 支持拖放*\n\n`import java.awt.datatransfer.Transferable;`\n\
  `...`\n`public class` **`AlbumNode`** `extends AbstractNode {`\n`private` **`Album`**\
  \ `album = null;`\n`   ...`\n`public Transferable` **`Drag`**`() throws IOException\
  \ {`\n`return` **`Album`**`;`\n`   }`\n`}`\n\n最后，你还需要扩展`PlaylistTopComponent`，使其能够接收面板条目。为此，你需要一个`TransferHandler`，并将其注册到对象上。该对象将能够接收数据；在这里，它是`albums`表格及其滚动区域`scrollPane`。你实现一个名为`AlbumTransferHandler`的特定传输处理器，以确定要接受哪些数据并处理这些数据。为此，你只需重写两个方法。首先是`canImport()`方法，当对象被拖到组件上或组件上方时，始终会调用此方法。在此组件中，你决定是否接受该对象。此检查通过之前在`Album`中确定的`DataFlavor`完成。如果此方法返回`true`，用户会收到一个（鼠标符号）信号，表明组件能够接收该对象。另一个需要重写的方法是`importData()`方法。当触发放置事件时，会调用此方法。通过传递的`TransferSupport`对象，你恰好可以接收到由之前实现的`drag()`方法传递给`AlbumNode`类的`Transferable`实例。然后，使用`getTransferData()`方法和你的`DataFlavor`对象，你就能确定相应的`Album`对象。最后，你将对象的数据添加到表格中。（参见清单\
  \ 21-9。）\n\n***清单 21-9.** 接收通过拖放传递的 Album 对象*\n\n`import javax.swing.TransferHandler;`\n\
  `import javax.swing.TransferHandler.TransferSupport;`\n`...`\n`public final class`\
  \ **`PlaylistTopComponent`** `extends TopComponent {`\n\n`private TransferHandler\
  \ th = new` **`AlbumTransferHandler`**`();`\n\n`   public PlaylistTopComponent()\
  \ {`\n`      ...`\n`      albums.`**`setTransferHandler`**`(th);`\n`      scrollPane.`**`setTransferHandler`**`(th);`\n\
  `   }`\n\n`private final class` **`AlbumTransferHandler`** `extends` **`TransferHandler`**\
  \ `{`\n\n`public boolean` **`canImport`**`(TransferSupport support) {`\n`         return\
  \ support.`**`isDataFlavorSupported`**`(`**`Album.DATA_FLAVOR`**`);`\n`      }`\n\
  \n`public boolean` **`importData`**`(TransferSupport support) {`\n`         try\
  \ {`\n`            Album a = (Album)support.getTransferable().`**`getTransferData`**`(`**`Album.DATA_FLAVOR`**`);`\n\
  `            DefaultTableModel model = (DefaultTableModel)albums.getModel();`\n\
  `            model.`**`addRow`**`(new Object[]{a.getTitle(),`\n`                                      a.getTracks(),`\n\
  `                                      a.getCDs(),`\n`                                      a.getYear()});`\n\
  `            return true;`\n`         } catch(Exception e) {`\n`            Exceptions.printStackTrace(e);`\n\
  `            return false;`\n`         }`\n`      }`\n`   }`\n`}`\n\n### 总结\n\n\
  NetBeans IDE 的面板模块负责组件的管理和图形显示，以便快速访问。在本章中，你学习了如何在层文件中定义面板条目。此外，你还实现了一个示例，创建了一个表示面板项的具体节点类。在这个示例中，你还看到了为自己的面板项实现拖放支持是多么容易。\n\
  \n## 第四部分\n\n## 使用与扩展：NetBeans 平台与 IDE 的高级 API\n\n## 第 22 章\n\n## 面板 API\n\n在第 21\
  \ 章中，你创建了一个面板。你可以通过拖放将音乐专辑从该面板拖放到顶层组件（你自己实现的）上。如前所述，也可以为特定文件类型注册一个面板。这意味着，当在 NetBeans\
  \ 编辑器中打开这种类型的文件时，为此类型注册的面板会自动打开。下面的示例将展示这实际上是如何工作的。\n\n假设你想为清单文件（*.mf*）提供一个面板（参见图\
  \ 22-1）。首先，你定义将在面板上提供的项，每个项都有一个 XML 文件和一个类。然后，你在层文件中注册此项。接着，你实现一个类，为已定义和注册的项创建一个面板。最后，你在层文件中为清单文件类型注册这个类。\n\
  \n![Image](img/2201.jpg)\n\n***图 22-1.** 清单文件的面板*\n\n\n\n### 定义与注册调色板项\n\n单个调色板项由类型为\
  \ *editor-palette-item* 的 XML 文件定义（参见附录中的 DTD）。在此类文件中，您可以指定通过拖放操作调用的类，该类负责插入操作。您需要定义两个不同尺寸的图标，并为这些项分配文本和工具提示。最终，调色板项\
  \ *Module Name* 的外观如清单 22-1 所示。\n\n***清单 22-1.** 通过 XML 文件定义调色板项*\n\n`<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>`\n`<!DOCTYPE` **`editor_palette_item`** `PUBLIC`\n`   \"\
  -//NetBeans//Editor Palette Item 1.1//EN\"`\n`   \"http://www.netbeans.org/dtds/editor-palette-item-1_1.dtd\"\
  >`\n`<`**`editor_palette_item`** `version=\"1.1\">`\n`  <`**`class`** `name=\"com.galileo.netbeans.module.items.`**`ModuleName`**`\"\
  />`\n`  <`**`icon16`** `urlvalue=\"com/galileo/netbeans/ModuleName16.png\"/>`\n\
  `  <`**`icon32`** `urlvalue=\"com/galileo/netbeans/ModuleName32.png\"/>`\n`  <`**`inline-description`**`>`\n\
  `     <`**`display-name`**`>Module Name</`**`display-name`**`>`\n`     <`**`tooltip`**`>Module\
  \ Name</`**`tooltip`**`>`\n`  </`**`inline-description`**`>`\n`</`**`editor_palette_item`**`>`\n\
  \n![Image](img/square.jpg) **注意** 您也可以将两个文本元素 `display-name` 和 `tooltip` 的值外包到资源包中，以实现调色板项的国际化和本地化。为此，需要用\
  \ `description` 元素替换 `inline-description` 元素。然后，不再直接提供这两个值，而是指定它们在资源包中对应的键。此外，当然还需要指定要使用的资源包：\n\
  \n**`<description`**\n**`localizing-bundle`**`=\"com.galileo.netbeans.module.Bundle\"\
  `\n**`display-name-key`**`=\"DISPLAY\"`\n**`tooltip-key`**`=\"TOOLTIP\"/>`\n\n您通过\
  \ `class` 元素定义了 `ModuleName` 类。当您将条目从调色板拖入清单文件时，会调用此类。为此，该类需要实现 `ActiveEditorDrop`\
  \ 接口。该接口是文本 API 的一部分，您必须为其定义一个依赖项。`ActiveEditorDrop` 接口的 `handleTransfer()` 方法会在拖放事件发生时自动调用。该方法会传递一个\
  \ `JTextComponent` 作为参数。通过此组件，您可以访问当前文档，即您想要插入调色板条目的清单文件。由于在此场景中，每个调色板条目的处理过程都是重复的，仅根据要插入的文本有所不同，因此您实现了一个抽象的\
  \ `ManifestItem` 类。该类负责在清单文档中插入条目。相应的文本由 `getItem()` 方法提供。子类必须实现此方法。（参见清单 22-2。）\n\
  \n***清单 22-2.** 负责插入清单文件的抽象类*\n\n`import org.openide.text.`**`activeEditorDrop`**`;`\n\
  `...`\n`public abstract class` **`ManifestItem`** `implements` **`ActiveEditorDrop`**\
  \ `{`\n`public` **`Abstract`** `String` **`getItem`**`();`\n\n`public boolean` **`handleTransfer`**`(JTextComponent\
  \ editor) {`\n`      try {`\n`         Document doc = editor.`**`getDocument`**`();`\n\
  `         int pos = editor.`**`getCaretPosition`**`();`\n`         doc.`**`insertString`**`(pos,`\
  \ **`getItem`**`() + \"\\n\", null);`\n`      } catch (BadLocationException ex)\
  \ {`\n`         Logger.getLogger(ManifestItem.class.getName()).log(Level.SEVERE,\
  \ null, ex);`\n`      }`\n`      return(true);`\n`   }`\n`}`\n\n具体调色板项类的结构非常简单。\n\
  \n`public class` **`ModuleName`** `extends` **`ManifestItem`** `{`\n`public String`\
  \ **`getItem`**`() {`\n`      return(\"OpenIDE-Module-Name: My Module\");`\n`   }`\n\
  `}`\n\n对于另一个条目：\n\n`public class` **`ModuleSpecVersion`** `extends` **`ManifestItem`**\
  \ `{`\n`public String` **`getItem`**`() {`\n`      return(\"OpenIDE-Module-Specification-Version:\
  \ 1.0\");`\n`   }`\n`}`\n\n当然，您还可以扩展这些类，以便向用户显示一个对话框。在此对话框中，用户可以直接指定具体的值，例如模块的名称或版本。为了完成定义各个项的第一步，您只需将其注册到层文件中的一个文件夹（由您创建）中。在这种情况下，将文件夹命名为\
  \ `ManifestPalette` 是合理的。在此文件夹下，您可以创建更多子文件夹。每个子文件夹随后代表调色板中的一个类别，条目可以按类别分组。（参见清单\
  \ 22-3。）\n\n***清单 22-3.** 在您自己的文件夹中注册调色板条目*\n\n`<folder name=\"`**`ManifestPalette`**`\"\
  >`\n`   <folder name=\"`**`Basic`**`\">`\n`      <file name=\"ModuleName.xml\" url=\"\
  items/`**`ModuleName.xml`**`\"/>`\n`   </folder>`\n`   <folder name=\"`**`Versioning`**`\"\
  >`\n`      <file name=\"ModuleSpecVersion.xml\" url=\"items/`**`ModuleSpecVersion.xml`**`\"\
  />`\n`      <file name=\"ModuleImplVersion.xml\" url=\"items/`**`ModuleImplVersion.xml`**`\"\
  />`\n`   </folder>`\n`</folder>`\n\n### 创建与注册调色板控制器\n\n您已经在层文件的 `ManifestPalette`\
  \ 文件夹中实现并注册了调色板的各项。现在，您的任务是为该文件夹创建一个 `PaletteController` 实例，用于管理这些条目。为此，请创建一个名为\
  \ `ManifestPalette` 的类。向该类添加 `createPalette()` 方法。该方法借助调色板 API 的 `PaletteFactory`\
  \ 类创建一个 `PaletteController` 实例，如清单 22-4 所示。\n\n***清单 22-4.** 负责管理您条目的调色板控制器类*\n\n\
  `import org.netbeans.spi.palette.PaletteActions;`\n`import org.netbeans.spi.palette.`**`paletteController`**`;`\n\
  `import org.netbeans.spi.palette.`**`paletteFactory`**`;`\n`...`\n`public class`\
  \ **`ManifestPalette`** `{`\n`private static` **`PaletteController`** `palette;`\n\
  \n`public static PaletteController` **`createPalette`**`() {`\n`      try {`\n`         if\
  \ (palette == null) {`\n`palette =` **`PaletteFactory`**`.`**`createPalette`**`(\"\
  `**`ManifestPalette`**`\", new MyPaletteActions());`\n`         }`\n`         return(`**`palette`**`);`\n\
  `      } catch (Exception ex) {`\n`         Logger.getLogger(ManifestPalette.class.getName()).log(Level.SEVERE,\
  \ null, ex);`\n`      }`\n`      return null;`\n`   }`\n\n`   private static final\
  \ class MyPaletteActions`\n`      extends PaletteActions {`\n`      ...`\n`   }`\n\
  `}`\n\n现在进入关键部分，即为清单文件类型注册此控制器。首先，您需要确定清单文件已注册的 MIME 类型。您可以通过 *项目* 视图下 *重要文件* ![Image](img/U001.jpg)\
  \ XML 层 ![Image](img/U001.jpg) <此层在上下文中> 的层树轻松找到此类型。在那里，您可以在 `Editors` 下找到 MIME\
  \ 类型 `text/x-mainfest`。因此，您需要在层文件的 `Editors/text/x-manifest` 文件夹中注册控制器，如下所示：\n\n\
  `<folder name=\"`**`Editors`**`\">`\n`   <folder name=\"`**`text`**`\">`\n`      <folder\
  \ name=\"`**`x-manifest`**`\">`\n`         <file name=\"`**`ManifestPalette`**`.instance\"\
  >`\n`            <attr name=\"instanceOf\" stringvalue=\"org.netbeans.spi.palette.`**`paletteController`**`\"\
  />`\n`            <attr name=\"instanceCreate\"`\n`               methodvalue=\"\
  com.galileo.netbeans.module.`**`ManifestPalette`**`.`**`createPalette`**`\"/>`\n\
  `         </file>`\n`      </folder>`\n`   </folder>`\n`</folder>`\n\n因此，当在编辑器中打开清单文件时，会通过\
  \ `createPalette()` 方法自动为您清单调色板项的控制器。此控制器通过 Lookup 提供给调色板模块。然后，调色板模块可以显示相应的条目，如图\
  \ 22-1 所示。\n\n\n\n### 扩展现有面板\n\n除了为尚无面板的文件类型创建自己的面板外，您还可以向现有面板添加条目。为此，您只需知道图层文件中文件夹的名称即可。您可以轻松地在图层树（*重要文件\
  \ ![Image](img/U001.jpg) XML 图层*）中搜索现有的面板文件夹。例如，HTML 文件的文件夹名为 `HTMLPalette`。您也可以像处理自己的\
  \ `ManifestPalette` 文件夹一样，将条目添加到现有的 `HTMLPalette` 文件夹中。例如，结果可能如清单 22-5 所示。\n\n***清单\
  \ 22-5.** 添加现有面板的条目*\n\n`<folder name=\"`**`HTMLPalette`**`\">`\n`   <folder name=\"\
  `**`我的 HTML 项`**`\">`\n`      <file name=\"item1.xml\" url=\"items/item1.xml\"/>`\n\
  `      <file name=\"item2.xml\" url=\"items/item2.xml\"/>`\n`   </folder>`\n`</folder>`\n\
  \n### 总结\n\n使用面板 API，您不仅可以扩展 NetBeans Platform 应用程序，还可以扩展 NetBeans IDE。您可以创建特定于文件的面板，或扩展现有面板。在本章中，您学习了如何创建和注册面板项以及面板控制器。在本章的最后部分，我们探讨了如何扩展现有面板。\n\
  \n## 第 23 章\n\n## 任务列表 API\n\nNetBeans IDE 的“任务列表”模块使您能够显示任务、通知或错误消息，如图 23-1 所示。任务列表中的条目可以按组排列，使用户获得更好的概览；用户还可以决定显示哪些部分的条目。默认情况下，任务列表模块中定义了三个部分，称为作用域。一个作用域对应于当前打开的文件，另一个作用域对应于主项目及其打开的依赖项目，第三个作用域对应于所有打开的项目。这些条目由在固定作用域内工作的扫描器提供。\n\
  \n![Image](img/2301.jpg)\n\n***图 23-1.** NetBeans IDE 的任务列表模块*\n\n对于任务列表模块，存在*任务列表\
  \ API*，您可以使用它灵活地扩展模块的操作范围。其核心在于提供额外的扫描器。这些扩展通过图层文件中的扩展点进行集成。通过一个示例最能说明其工作原理。假设您想要实现一个扫描器，用于显示所有直接使用信息输出的位置，例如使用\
  \ `System.out.println()`。例如，在交付产品之前，您可以确保所有重要位置都已替换为日志输出或已删除。\n\n### 实现扫描器\n\n您需要从抽象的\
  \ `FileTaskScanner` 类派生自己的扫描器实现。扫描器具有名称和对其功能的描述。您可以选择将扫描器连接到选项面板。通过此选项面板，用户可以单独配置扫描器。例如，您可以使用\
  \ NetBeans IDE 的 ToDo 扫描器来配置令牌，这些令牌将在文件中被识别为 ToDo 任务。为简单起见，您可以直接在扫描器中定义这些令牌。然后，将名称、描述和选项面板路径（如果不使用选项面板则为\
  \ `null`）这三个参数传递给基类构造函数。由于扫描器稍后将在图层文件中声明式注册，然后由任务列表框架初始化，因此您需要提供工厂方法 `create()`。通过此方法，可以创建\
  \ `LoggingTaskScanner` 实例。\n\n您可能已经猜到，扫描器最重要的部分是 `scan()` 方法。通过此方法，您将获得要搜索的文件。您使用\
  \ `Pattern`（用于识别令牌）和 `Matcher` 遍历此文件。为每个找到的位置创建一个 `Task` 实例。然后，将此实例添加到返回的列表中。清单\
  \ 23-1 中的实现使用了 `TodoTaskScanner` 类作为模板。通过静态方法 `Task.create()` 创建 `Task` 实例。您需要向此方法传递搜索到的文件、条目应添加到的组、描述（通常是找到令牌的行）以及行号。\n\
  \n***清单 23-1.** 扫描器实现*\n\n`import org.netbeans.spi.tasklist.FileTaskScanner;`\n\
  `import org.netbeans.spi.tasklist.Task;`\n`import org.openide.filesystems.FileObject;`\n\
  `...`\n`public class` **`LoggingTaskScanner`** `extends` **`FileTaskScanner`** `{`\n\
  \n`private static final String` **`GROUP_NAME`** `= \"logging-tasklist\";`\n`private\
  \ static final String[]` **`TOKENS`** `= {       \"System.out.println\",`\n`      \"\
  System.err.println\",`\n`      \"printStackTrace\"};`\n`   private Pattern  regexp   =\
  \ null;`\n`   private Callback callback = null;`\n\n`public` **`LoggingTaskScanner`**`(String\
  \ name, String desc){`\n`      super(name, desc, null);`\n`   }`\n\n`public` **`static`**\
  \ `LoggingTaskScanner` **`create`**`() {`\n`      String name = NbBundle.getBundle(LoggingTaskScanner.class).\
  \                              getString(\"LBL_loggingtask\");`\n`      String desc\
  \ = NbBundle.getBundle(LoggingTaskScanner.class).`\n`                             getString(\"\
  HINT_loggingtask\");`\n`return new` **`LoggingTaskScanner`**`(name, desc);`\n`   }`\n\
  \n`public List<? extends` **`Task`**`>` **`scan`**`(FileObject file) {`\n`      List<Task>\
  \ tasks = new LinkedList<Task>();`\n`      int lineno = 0;`\n`      try {`\n`         for\
  \ (String line : file.asLines()) {`\n`            lineno++;`\n`            Matcher\
  \ matcher = getScanRegexp().matcher(line);`\n`            if (matcher.find()) {`\n\
  `               String description =`\n`                  line.subSequence(matcher.start()+1,\
  \ line.length()).toString();`\n`               Task task = Task.create(file, GROUP_NAME,\
  \ description, lineno );`\n`               tasks.add(task);`\n`            }`\n\
  `         }`\n`      } catch (IOException ex) {`\n`         Exceptions.printStackTrace(ex);`\n\
  `      }`\n`return` **`tasks`**`;`\n`   }`\n\n`private Pattern` **`getScanRegexp`**`()\
  \ {`\n`      if (regexp == null) {`\n`         // 为令牌创建 Pattern`\n`      }`\n`      return\
  \ regexp;`\n`   }`\n\n`public void` **`attach`**`(Callback callback) {`\n`      if(callback\
  \ == null && this.callback != null) {`\n`         regexp = null;`\n`      }`\n`      this.callback\
  \ = callback;`\n`   }`\n\n`   @Override`\n`public void` **`notifyPrepare`**`() {`\n\
  `      getScanRegexp();`\n`   }`\n\n`   @Override`\n`public void` **`notifyFinish`**`()\
  \ {`\n`      regexp = null;`\n`   }`\n`}`\n\n用户可以通过任务列表窗口的上下文菜单激活或停用扫描器。您可以通过 `attach()`\
  \ 方法获知扫描器是处于活动状态还是非活动状态。如果 `callback` 参数的值为 `null`，则表示扫描器已被停用。您可以通过 `Callback` 实例访问任务列表框架。最后，还有两个方法\
  \ `notifyPrepare()` 和 `notifyFinish()`。`notifyPrepare()` 方法在任务列表框架启动扫描之前被调用，您可以在其中为后续的\
  \ `scan()` 方法调用做准备。最后，会调用 `notifyFinish()` 方法。\n\n\n\n### 注册扫描器与分组\n\n任务列表框架在层文件中定义了三个扩展点，通过这些扩展点可以注册扩展。这三个扩展点分别是：\n\
  \n> `TaskList/Groups`\n> `TaskList/Scanners`\n> `TaskList/ScanningScopes`\n\n首先，你需要创建一个新的分组，用于将日志任务归组。你已经在扫描器中通过\
  \ `logging-tasklist` 确定了一个 ID。通过这个 ID，可以将扫描器中创建的任务分配到该分组。通过 `Task` 类的 `createGroup()`\
  \ 方法可以轻松创建分组；你只需指定一些用于配置分组的其他属性。除了 ID 之外，你还需要为资源包中对应的值确定键。在注册扫描器时，你需要指定基类，并指定用于创建扫描器的工厂方法（参见清单\
  \ 23-2）。\n\n***清单 23-2.** 创建任务分组并通过任务列表框架的扩展点注册扫描器*\n\n`<filesystem>`\n`  <folder\
  \ name=\"`**`TaskList`**`\">`\n`    <folder name=\"`**`Groups`**`\">`\n`      <file\
  \ name=\"`**`LoggingTaskGroup`**`.instance\">`\n`        <attr name=\"`**`instanceCreate`**`\"\
  \ methodvalue=\"org.netbeans.spi.tasklist.`**`Task.createGroup`**`\"/>`\n`        <attr\
  \ name=\"`**`localizingBundle`**`\" stringvalue=\"com.galileo.netbeans.module.Bundle\"\
  />`\n`        <attr name=\"`**`groupName`**`\" stringvalue=\"`**`logging-tasklist`**`\"\
  />`\n`        <attr name=\"`**`diplayNameKey`**`\" stringvalue=\"`**`LBL_loggroup`**`\"\
  />`\n`        <attr name=\"`**`descriptionKey`**`\" stringvalue=\"`**`HINT_loggroup`**`\"\
  />`\n`        <attr name=\"`**`iconKey`**`\" stringvalue=\"`**`ICON_logging`**`\"\
  />`\n`        <attr name=\"`**`position`**`\" intvalue=\"`**`400`**`\"/>`\n`      </file>`\n\
  `    </folder>`\n`    <folder name=\"`**`Scanners`**`\">`\n`      <file name=\"\
  `**`LoggingTaskScanner`**`.instance\">`\n`        <attr name=\"`**`instanceOf`**`\"\
  \ stringvalue=\"org.netbeans.spi.tasklist.`**`FileTaskScanner`**`\"/>`\n`        <attr\
  \ name=\"`**`instanceCreate`**`\" methodvalue=            \"com.galileo.netbeans.module.`**`LoggingTaskScanner.create`**`\"\
  />`\n`      </file>`\n`    </folder>`\n`  </folder>`\n`</filesystem>`\n\n### 小结\n\
  \n任务列表 API 是 NetBeans IDE 的一部分，你可以使用它以任何方式扩展标准任务列表模块。在本章中，你学习了如何创建自己的扫描器实现。你还了解了如何注册任务列表扫描器和分组。\n\
  \n## 第 24 章\n\n## 快速搜索 API\n\nNetBeans 平台的快速搜索功能是一种用于轻松搜索不同来源中各种文件的基础设施（如图 24-1\
  \ 所示）。快速搜索模块提供了一个简单的 API，用于提供所谓的搜索提供程序实现。\n\n![图片](img/2401.jpg)\n\n***图 24-1.**\
  \ 快速搜索功能*\n\n快速搜索模块的搜索框可以添加到工具栏或菜单栏中。然后用户可以在其中输入所需术语。在输入时，已注册的搜索提供程序会异步查询相应的结果。通过单击结果可以触发一个操作。清单\
  \ 24-1 展示了如何实现一个与收藏夹模块结合的搜索提供程序。你可以在其文件夹中搜索 MP3 文件。单击找到的文件应将其添加到播放列表中。\n\n### 实现快速搜索提供程序\n\
  \nNetBeans IDE 提供了一个向导，用于创建搜索提供程序的基本结构和注册。通过 *文件 ![图片](img/U001.jpg) 新建文件 ![图片](img/U001.jpg)\
  \ 模块开发 ![图片](img/U001.jpg) 快速搜索提供程序* 来调用此向导。首先，我们命名提供程序类并定义该类将要创建的包。此外，我们定义类别，搜索结果将在快速搜索弹出窗口中按此类别分组（参见图\
  \ 24-1）。你也可以影响这些类别的顺序。较小的数字表示相关类别会列在顶部。最后，你必须选择一个*命令前缀*。如果此前缀与搜索词之间用空格分隔，则仅会在相关类别中进行搜索。\n\
  \n***清单 24-1.** 快速搜索提供程序实现*\n\n`import org.netbeans.spi.quicksearch.`**`SearchProvider`**`;`\n\
  `import org.netbeans.spi.quicksearch.`**`SearchRequest`**`;`\n`import org.netbeans.spi.quicksearch.`**`SearchResponse`**`;`\n\
  `...`\n`public class MyMusicQSProvider implements` **`SearchProvider`** `{`\n`   private\
  \ DataFolder f;`\n\n`   public MyMusicQSProvider() {`\n`      FileObject fo = FileUtil.getConfigFile(\"\
  Favorites\");`\n`      f = DataFolder.findFolder(fo);`\n`   }`\n\n`   @Override`\n\
  `public void` **`evaluate`**`(`**`SearchRequest`** `req,` **`SearchResponse`** `resp)\
