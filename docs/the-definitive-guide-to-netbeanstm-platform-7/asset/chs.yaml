  \ Web 服务客户端*。直接通过 URL *[`webservices.amazon.com/AWSECommerceService/DE/AWSECommerceService.wsdl`](http://webservices.amazon.com/AWSECommerceService)*\
  \ 指定要使用的文件（这仅在联网时有效）。如果想离线工作，可以下载 WSDL 文件并在向导中将其指定为本地文件（参见图 30-1）。将生成 Web 服务类的包命名为\
  \ `com.amazon.advertising.api`。\n\n![Image](img/3001.jpg)\n\n***图 30-1.** 为 Amazon\
  \ Product Advertising API 创建 Web 服务客户端*\n\n保持客户端样式为 *JAX-WS 样式*。点击 *完成*，以便根据 WSDL\
  \ 文件中的描述创建使用 Web 服务所需的所有类。为了更有序地使用 Web 服务操作（稍后你会看到），请取消默认设置的 *包装器样式*。在项目视图中打开新添加的\
  \ *Web 服务引用* 文件夹，其中应有一个 *AWSECommerceService* 条目。打开该条目的上下文菜单，选择 *编辑 Web 服务属性*。在\
  \ WSDL 自定义选项卡上展开 *端口类型* 下的 *AWSECommerceServicePortType* 节点，并取消选中 *启用包装器样式* 选项（参见图\
  \ 30-2）。此设置将应用于该端口类型的所有操作。\n\n![Image](img/3002.jpg)\n\n***图 30-2.** 为 Amazon Web\
  \ 服务停用包装器样式*\n\n如果通过 *确定* 应用设置，Web 服务客户端类应会更新。现在可以执行 *构建*，并在项目文件夹中获取 Web 服务客户端的\
  \ JAR 文件 *dist/Amazon_Web_Services.jar*。下一步，你可以在 NetBeans 模块中将其用作 *Amazon Web Services\
  \ API*。\n\n### 使用 Web 服务\n\n上一节中，已创建了一个用于使用 Amazon Web 服务的 Java 接口。你可以用完全相同的方式处理其他\
  \ Web 服务。要从 NetBeans Platform 应用程序中调用 Web 服务，首先通过 *文件 ![Image](img/U001.jpg) 新建项目…\
  \ ![Image](img/U001.jpg) NetBeans 模块 ![Image](img/U001.jpg) NetBeans Platform 应用程序*\
  \ 创建一个 NetBeans Platform 应用程序。你可以为应用程序指定任意名称。下一步，将 Web 服务客户端添加到应用程序中。为此，通过 *文件 ![Image](img/U001.jpg)\
  \ 新建项目… ![Image](img/U001.jpg) NetBeans 模块 ![Image](img/U001.jpg) 库包装器模块* 创建一个库包装器模块。将\
  \ JAR 文件 *Amazon_Web_Services.jar* 添加到库包装器模块中，并将其也命名为 *Amazon Web Services*。\n\n\
  现在，Web 服务客户端已在你的 NetBeans Platform 应用程序中可用。接下来，你可以创建一个应用程序模块来使用该 Web 服务。通过 *文件 ![Image](img/U001.jpg)\
  \ 新建项目… ![Image](img/U001.jpg) NetBeans 模块 ![Image](img/U001.jpg) 模块* 向 Platform\
  \ 应用程序添加另一个模块。添加对 Amazon Web 服务模块的依赖关系，以便该模块也能使用 Web 服务客户端。为了演示 Web 服务操作的调用，创建一个顶层组件。通过该组件，你希望使用\
  \ *ASIN*（亚马逊标准识别号）搜索产品的可用图片。考虑到 MP3 管理器（在第 44 章中开发），可以设想以下用途：将 ASIN 保存在 MP3 文件的\
  \ ID3 标签中，然后可以显示当前播放 MP3 文件的可用封面——或者可以搜索并显示当前播放艺术家的专辑。\n\n在示例应用程序中，如图 30-3 所示，你希望通过输入的\
  \ ASIN 搜索产品，并显示其在亚马逊网站上使用的预览图。为此，请仔细研究调用 Amazon Web 服务所需的查询。此查询应异步执行，以避免阻塞整个应用程序。请记住，访问\
  \ GUI 组件只能在事件调度线程中进行。一旦查询执行完毕，你需要得到通知，以便显示图片。实现这一点的最简单方法是使用 `SwingWorker` 类。创建你自己的类，派生自\
  \ `SwingWorker<String, Object>`。\n\n![Image](img/3003.jpg)\n\n***图 30-3.** 通过 Amazon\
