  \ `provider);`\n`ActionFactory.`**`createFreeMoveControlPointAction`**`();`\n`ActionFactory.`**`createOrthogonalMoveControlPointAction`**`();`\n\
  \n**PanAction**\n\n如果场景的视图包含在 `JScrollPane` 中，则 `PanAction` 允许在按下鼠标中键并移动鼠标时滚动场景视图。因此，此操作被添加到场景中：\n\
  \n`ActionFactory.`**`createPanAction`**`();`\n\n**PopupMenuAction**\n\n使用 `PopupMenuAction`\
  \ 为 widget 提供上下文菜单。这需要实现一个 `PopupMenuProvider`，通过它来提供一个 `JPopupMenu` 实例。\n\n`ActionFactory.`**`createPopupMenuAction`**`(`**`PopupMenuProvider`**\
  \ `provider);`\n\n**SelectAction/RectangularSelectAction**\n\n`SelectAction` 类似于\
  \ `EditAction`，但此事件仅由单击触发。单击事件的逻辑实现由 `SelectProvider` 提供。通过此 provider，你还可以确定某个 widget\
  \ 是否可以被选中。通常，`RectangularSelectAction` 被添加到 `ObjectScene` 或 `LayerWidget` 中，通过在其周围绘制矩形来选择\
  \ widget。\n\n`ActionFactory.`**`createSelectAction`**`(`**`SelectProvider`** `provider);`\n\
  `ActionFactory.`**`createRectangularSelectAction`**`(`\n**`   ObjectScene`**`                scene,`\n\
  **`   LayerWidget`**`                interactionLayer);`\n`ActionFactory.`**`createRectangularSelectAction`**`(`\n\
  **`   RectangularSelectDecorator`**`  decorator,`\n**`   LayerWidget`**`                interactionLayer,`\n\
  **`   RectangularSelectProvider`**`  provider);`\n\n**SwitchCardAction**\n\n此操作用于在\
  \ `CardLayout` 中的 widget 之间切换：\n\n`ActionFactory.`**`createSwitchCardAction`**`(`**`Widget`**\
  \ `cardLayoutWidget);`\n\n### 场景：根元素\n\n如你所知，Visual Library API 的组件（即 widget）以层次树结构进行排列和管理。这反过来意味着\
  \ widget 可以包含其他 widget。`Scene` 类本身也是一个 widget，它代表后续元素的容器，因此是树层次结构的根元素（参见图 14-2）。从图形上看，场景由一个视图表示，该视图是一个简单的\
  \ `JComponent` 实例。然后，它通常被添加到 `JScrollPane` 中。你总是从创建一个场景开始，然后根据应用程序的目的，以层次结构向其中添加更多\
  \ widget。清单 14-1 对此进行了说明。\n\n***清单 14-1.** 创建场景并添加 Widget*\n\n`import org.netbeans.api.visual.action.ActionFactory;`\n\
  `import org.netbeans.api.visual.action.WidgetAction;`\n`import org.netbeans.api.visual.widget.ImageWidget;`\n\
  `import org.netbeans.api.visual.widget.LayerWidget;`\n`import org.netbeans.api.visual.widget.Scene;`\n\
  `...`\n`public final class` **`SceneTopComponent`** `extends TopComponent {`\n`private`\
