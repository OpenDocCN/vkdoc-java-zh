  `      try {`\n`         /* ID3v1 属性 */`\n**`  Property`** `title1 =`\n`            new\
  \ PropertySupport.Reflection<String>(id3v1, String.class, \"`**`title`**`\");`\n\
  `         ...`\n`         title1.setName(\"标题\");`\n`         set1.`**`put`**`(title1);`\n\
  `         /* ID3v2 属性 */`\n**`Property`** `album2 =`\n`            new PropertySupport.Reflection<String>(id3v2,\
  \ String.class, \"`**`getAlbum`**`\", null);`\n`         ...`\n`         album2.setName(\"\
  专辑\");`\n`         set2.`**`put`**`(album2);`\n`      } catch (Exception e) { }`\n\
  \n`      sheet.`**`put`**`(set1);`\n`      sheet.`**`put`**`(set2);`\n`return` **`sheet`**`;`\n\
  `   }`\n`}`\n\n\n\n`Node` 的查找功能会返回该节点所代表的 `Mp3DataObject` 实例。利用之前创建的 `getID3v1Tag()`\
  \ 和 `getID3v2Tag()` 方法，你可以访问 MP3 文件的 ID3 信息。接着，为每个属性创建一个 `PropertySupport.Reflection<T>`\
  \ 类的实例。使用模板指定属性的类型（本例中为 `String`）。对于可读写的属性，你需指定方法名称（通过这些方法可读写属性），但要去掉 `get` 和 `set`\
  \ 前缀。将 `title` 传递给构造函数即可设置标题（例如，使用 `getTitle()` 和 `setTitle()` 方法）。只读属性则传递给一个特殊的构造函数版本，该版本分别接收\
  \ get 和 set 方法的名称。将 `null` 作为 set 方法传递可防止属性被修改。每个创建的属性都通过 `setName()` 方法命名。此名称会显示在\
  \ *属性* 窗口中。最后，使用 `put() 方法` 将每个实例添加到 `Sheet` 对象中，并返回该 sheet。\n\n启动应用程序，并通过 *窗口*\
  \ 菜单打开收藏夹和属性窗口后，如果你在属性窗口中选中一个 MP3 文件，将会看到如 图 44-3 所示的窗口。\n\n![Image](img/4403.jpg)\n\
  \n***图 44-3.** 使用属性窗口作为 ID3 编辑器*\n\n在第 19 章中，你将学习如何为属性提供特殊的编辑器（例如用于选择值的组合框），比如流派这种可以有一系列预定义值的属性。\n\
  \n### 媒体库\n\n在上一节中，你使用了 NetBeans 平台提供的收藏夹模块。该模块也非常适合在你的应用程序中用作 *媒体库*。原因在于，用户可以非常简便地将单个文件或整个目录添加到收藏夹模块中。该功能不仅限于\
  \ MP3 文件，还可用于管理任何文件类型。因此，例如通过添加空闲集群中的图像模块，你还可以管理和显示 JPG 格式的曲目封面。由于你可以通过层文件将操作绑定到特定的\
  \ MIME 类型，因此可以直接在 *收藏夹* 窗口中处理 MP3 文件。这意味着，例如，你可以通过双击直接播放文件，或使用拖放功能将文件拖到单独的窗口（例如播放列表）。请记住，要使用收藏夹模块或窗口，它必须在你的\
  \ NetBeans 平台中处于激活状态（即可用状态）。通过上下文菜单打开 MP3 管理器的 *属性*，并确保在 *平台* 集群下的 *库* 类别中已激活 *收藏夹*\
  \ 模块。\n\n现在，你还可以使用品牌模块更改收藏夹模块的名称和菜单。品牌模块由 NetBeans IDE 自动创建。你只需在品牌对话框中调整所需的文本即可，该对话框可通过平台应用程序上下文菜单中的\
  \ *品牌…* 打开。你可以在 *资源包* 注册表中搜索要替换的文本。你需要调整窗口名称和不同的菜单项，如 图 44-4 所示。\n\n![Image](img/4404.jpg)\n\
  \n***图 44-4.** 将收藏夹模块品牌化为媒体库*\n\n### 服务\n\n接下来，你将实现应用程序的主要功能。它分为两部分：*服务接口* 和 *服务提供者*。结合服务提供者的注册机制和查找功能，你可以实现完全解耦且独立于特定模块的功能。因此，你需要创建一个新模块来捆绑服务接口，以便集中提供（参见图\
  \ 44-1）。从这个角度来看，该模块可以看作是不同应用程序模块之间的链接。像往常一样，使用 *文件 ![Image](img/U001.jpg) 新建项目...*\
  \ 来创建一个新模块。为方便起见，将其命名为 *Services*，并将代码名称基础设置为 `com.hboeck.mp3manager.services`。即使对于这个模块，你也必须记住要为包启用公共访问权限，这需要在\
  \ *属性 ![Image](img/U001.jpg) API 版本控制* 下进行，因为只有这样，你才能定义对 Services 模块的依赖关系，并使用其类。\n\
  \n### MP3 播放器\n\n在上一节中，你通过将服务模块分为两部分（服务接口和服务提供者）为播放器设计奠定了基础。现在，你需要考虑播放器应向应用程序的其他组件提供的接口和功能。然后，你将在抽象类中描述这些接口。你应该选择抽象类，而不是接口，因为播放器将是一个核心的全局服务。换句话说，请求模块通常只对一个播放器实例感兴趣。正如你将在后续章节中注意到的，使用抽象类可以更容易地确保这种行为。\n\
  \n\n\n#### 服务接口\n\n在服务模块内部，你创建了一个名为 `player` 的新包，其中包含一个名为 `Mp3Player` 的抽象类。当然，播放器必须能够播放、暂停和停止\
  \ MP3 文件。此外，用户应该能够静音、控制音量，并查看当前播放位置和总时长。还应该能够影响文件的当前播放位置。你通过该类中的抽象方法指定了播放器将提供的所有这些所需功能。（参见清单\
  \ 44-6）。\n\n***清单 44-6.** 定义播放器接口并使用 `getDefault()` 方法提供实现*\n\n`package com.hboeck.mp3manager.services.`**`player`**`;`\n\
  `import com.hboeck.mp3manager.filetype.`**`Mp3DataObject`**`;`\n`import java.util.ListIterator;`\n\
  `import org.openide.util.`**`Lookup`**`;`\n`...`\n`public` **`abstract`** `class`\
  \ **`Mp3Player`** `{`\n\n`public static Mp3Player` **`getDefault`**`() {`\n**`Mp3Player`**\
  \ `p = Lookup.getDefault().`**`lookup`**`(`**`Mp3Player`**`.class);`\n`      if\
  \ (p == null) {`\n`p = new` **`DefaultMp3Player`**`();`\n`      }`\n`      return\
  \ p;`\n`   }`\n\n`public` **`abstract`** `void` **`play`**`(Mp3DataObject mp3);`\n\
  `public` **`abstract`** `void` **`play`**`(ListIterator<Mp3DataObject> mp3s);`\n\
  `public` **`abstract`** `void` **`pause`**`();`\n`public` **`abstract`** `void`\
  \ **`stop`**`();`\n`public` **`abstract`** `void` **`previous`**`();`\n`public`\
  \ **`abstract`** `void` **`next`**`();`\n`public` **`abstract`** `void` **`setMute`**`(boolean\
  \ mute);`\n`public` **`abstract`** `void` **`setVolume`**`(int volume);`\n`public`\
  \ **`abstract`** `int` **`getDuration`**`();`\n`public` **`abstract`** `int` **`getMediaTime`**`();`\n\
  `public` **`abstract`** `void` **`setMediaTime`**`(int seconds);`\n`}`\n\n对于服务请求者——即想要使用播放器的模块——最重要的部分是\
  \ `getDefault()` 方法。此方法实际上通过 Lookup 搜索已注册的 `Mp3Player` 实现。如果找到实现，Lookup 会返回其实例。如果未找到实现，你仍然希望确保请求者永远不会获得\
  \ `null` 引用，而是始终获得 `Mp3Player` 类的实例。因此，你在抽象类 `Mp3Player` 内部提供了一个默认实现，名为 `DefaultMp3Player`，在最简单的情况下，它除了告诉用户它什么也不做之外，什么也不做。另一个简单而巧妙的解决方案是将\
  \ MP3 文件转发给外部应用程序。（参见清单 44-7）。\n\n***清单 44-7.** 在抽象类内部提供默认实现*\n\n`public abstract\
  \ class` **`Mp3Player`** `{`\n`   ...`\n`private static class` **`DefaultMp3Player`**\
  \ `extends` **`Mp3Player`** `{`\n`public void` **`play`**`(Mp3DataObject mp3) {`\n\
  `         Logger.getLogger(Mp3Player.class.getName()).info(\"not supported”);`\n\
  `      }`\n`public void` **`stop`**`() { }`\n`      ...`\n`   }`\n`}`\n\n如果我们想象一个使用播放器的模块，我们会很快注意到，模块需要被告知播放器中可能发生的事件，以便做出反应。例如，用户界面需要被告知\
  \ MP3 文件播放结束。为此，我们指定了一个名为 `Mp3PlayerEventListener` 的监听器接口，其简单版本可能如下所示：\n\n`package\
  \ com.hboeck.mp3manager.services.`**`player`**`;`\n`import com.hboeck.mp3manager.filetype.Mp3DataObject;`\n\
  `import java.util.EventListener;`\n\n`public interface` **`Mp3PlayerEventListener`**\
  \ `extends` **`EventListener`**`{`\n`public void` **`playing`**`(Mp3DataObject mp3);`\n\
  `public void` **`stopped`**`();`\n`}`\n\n向播放器添加和移除 `Mp3PlayerEventListener` 的功能直接在抽象类中实现；具体实现无需再为此操心。此外，你提供了两个与监听器接口对应的\
  \ fire 方法，具体类可以使用这些方法向监听器通知事件，如清单 44-8 所示。\n\n***清单 44-8.** 管理对事件感兴趣的监听器的方法*\n\n\
  `import com.hboeck.mp3manager.filetype.Mp3DataObject;`\n`import java.util.ListIterator;`\n\
  `import javax.swing.event.EventListenerList;`\n`import org.openide.util.Lookup;`\n\
  \n`public abstract class` **`Mp3Player`** `{`\n`   ...`\n`   private final EventListenerList\
  \ listeners = new EventListenerList();`\n\n`public void` **`addEventListener`**`(Mp3PlayerEventListener\
  \ l) {`\n`      listeners.add(Mp3PlayerEventListener.class, l);`\n`   }`\n\n`public\
  \ void` **`removeEventListener`**`(Mp3PlayerEventListener l) {`\n`      listeners.remove(Mp3PlayerEventListener.class,\
  \ l);`\n`   }`\n\n`protected final void` **`firePlayEvent`**`(Mp3DataObject mp3)\
  \ {`\n`      for(Mp3PlayerEventListener listener :`\n`         listeners.getListeners(Mp3PlayerEventListener.class))\
  \ {`\n`         listener.playing(mp3);`\n`      }`\n`   }`\n\n`protected final void`\
  \ **`fireStopEvent`**`() {`\n`      for(Mp3PlayerEventListener listener :`\n`         listeners.getListeners(Mp3PlayerEventListener.class))\
  \ {`\n`         listener.stopped();`\n`      }`\n`   }`\n`}`\n\n\n\n#### 服务提供者\n\
  \n你的第一个服务已经定义完毕，现在可以开始实现服务提供者了。这意味着你将使用 JMF 模块及其功能来播放 MP3 文件。这又回到了你对 MP3 文件类型的使用上。正如之前在图\
  \ 44-1 中所指出的，MP3 播放器被实现在一个单独的模块中。因此，你需要再次创建一个新模块，将其命名为 `Player`，并为其传递代码名称基址 `com.hboeck.mp3manager.player`。使用\
  \ *属性 ![Image](img/U001.jpg) 库*，定义相应的依赖关系，以便此模块能够访问文件类型、JMF 插件以及服务接口。\n\n首先，创建一个\
  \ `Mp3PlayerImpl` 类，它继承自之前创建的服务接口 `Mp3Player`。在这里，你通过 Java Media Framework 实现了服务接口\
  \ `MP3Player` 的抽象方法。从 `play()` 方法开始，该方法接收一个作为 `Mp3DataObject` 传入的 MP3 文件。JMF 的核心类是\
  \ `Manager` 类，它用于获取系统相关的资源。这个管理器会为作为 URL 传入的 MP3 文件创建一个 `Player` 实例。在使用 `start()`\
  \ 方法启动该 `Player` 之前，你需要为其注册一个 `ControllerListener`，以便能够获知 `Player` 的不同状态。（参见清单 44-9）。\n\
