  `            \"`**`jdbc:derby:MyDB;create=true`**`\", \"user\", \"password\");`\n\
  `      }`\n`      return conn;`\n`   }`\n`   @Override`\n`public void` **`close`**`()\
  \ {`\n`      try {`\n`        conn.`**`close`**`();`\n`        DriverManager.getConnection(\"\
  jdbc:derby:;`**`shutdown=true`**`\");`\n`      } catch (SQLException ex) {}`\n`   }`\n\
  `}`\n\n\n\n#### 数据模型与数据访问模块\n\n正如你在创建表时已经看到的，你需要管理两个不同类别的数据：专辑（其信息在 `albums` 表中管理）和流派（位于\
