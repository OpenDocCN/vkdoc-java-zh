  \ {`\n`return` **`true`**`;`\n`      }`**`else`** `{`\n`return` **`false`**`;`\n\
  `      }`\n`   }`\n`}`\n\n请注意，此模块需要依赖 Dialogs API 才能使用 NetBeans 对话框支持。依赖关系的定义已在*版本控制与依赖关系*一节中描述，而关于\
  \ Dialogs API 的信息可在第 13 章中找到。\n\n要尝试此新功能，请调用*运行 ![Image](img/U001.jpg) 运行主项目 (F6)*。当应用程序关闭时，将显示该对话框，你可以确认是否真的应该关闭应用程序。\n\
  \n### 模块注册表\n\n模块通常不需要关心其他模块，也不需要知道其他模块是否存在。然而，有时可能需要创建所有可用模块的列表。模块系统为每个模块提供了一个`ModuleInfo`类，其中存储了关于模块的所有信息。`ModuleInfo`对象可通过\
  \ Lookup 集中获取，获取方式如下：\n\n`Collection<? extends` **`ModuleInfo`**`> modules = Lookup.getDefault().lookupAll(`**`ModuleInfo`**`.class);`\n\
  \n该类提供的信息包括模块名称、版本、依赖关系、当前状态（已激活或已停用）以及当前模块的服务实现是否存在。使用`getAttribute()`方法可从清单文件中获取此信息。要获知变更，请注册一个`PropertyChangeListener`，它会通知你系统中模块的激活和停用情况（`ModuleInfo`对象）。你还可以注册一个`LookupListener`，它会通知你模块的安装和卸载。例如，可以像代码清单\
  \ 3-8 所示定义一个监听器。\n\n***代码清单 3-8.** 响应模块系统的变更*\n\n`Lookup.Result<ModuleInfo>`**`result`**\
  \ `= Lookup.getDefault().lookupResult(`**`ModuleInfo`**`.class);`\n**`result`**`.addLookupListener(new\
  \ LookupListener() {`\n`   public void resultChanged(LookupEvent lookupEvent) {`\n\
  `Collection<? extends` **`ModuleInfo`**`> c = result.allInstances();`\n`      System.out.println(\"\
  Available modules: \" + c.size());`\n`   }`\n`});`\n`result.allItems(); // 初始化监听器`\n\
  \n### 使用库\n\n在开发富客户端应用程序时，你很可能需要将外部库以 JAR 归档文件的形式包含在应用程序中。由于整个应用程序基于模块，因此最好将外部 JAR\
  \ 文件以模块的形式集成进来。这样做的好处是可以设置对该模块的依赖关系，从而增强整个应用程序的一致性。你还可以将多个 JAR 文件打包到一个模块中，之后就不再需要像通常开发应用程序时那样，将物理\
  \ JAR 文件放在应用程序类路径上。\n\n#### 库包装器模块\n\n要实现上述场景，请创建一个*库包装器模块*。NetBeans IDE 为此提供了一个项目类型和向导。\n\
  \n1.  要创建新的库包装器项目，请转到*文件 ![Image](img/U001.jpg) 新建项目*…，然后使用图 3-11 所示的对话框，选择类别*NetBeans\
  \ 模块*，接着选择项目类型*库包装器模块*。\n\n![Image](img/0311.jpg)\n\n***图 3-11.** 创建库包装器模块*\n\n\
  2.  点击*下一步*以选择所需的 JAR 文件。你可以在此处选择一个或多个 JAR 文件（按住 Ctrl 键可选择多个 JAR 文件）。你还可以为你正在包装为模块的\
  \ JAR 添加许可证文件。\n3.  在下一步中，提供项目名称以及存储新模块的位置。指定该库包装器模块所属的模块套件或平台应用程序。\n4.  再次点击*下一步*以填写*基本模块配置*对话框，如图\
  \ 3-12 所示。\n\n![Image](img/0312.jpg)\n\n***图 3-12.** 库包装器模块配置*\n\n5.  在此处你可以定义代码名称基。通常此字段会预填入选中的\
  \ JAR 归档文件的读取代码名称基的名称。此外，你可以为模块提供名称和本地化包，以本地化模块清单信息。点击*完成*按钮，即可创建新项目。\n\n当你在*项目*窗口中查看新创建的库包装器模块，并额外打开*源包*文件夹时，你会看到清单文件的*Bundle.properties*文件位于此处。被模块封装的库已被复制到项目文件夹的*release/modules/ext*目录中。\n\
  \n要理解库包装器模块的工作原理，请查看位于项目结构中*重要文件*文件夹内的相关清单文件。请注意，代码清单 3-9 中描述的清单信息可能不会直接出现在清单文件中。某些信息（如公共包）仅在构建模块时（调用*构建项目*时）才会写入。要查看完整的清单文件，请创建模块，然后打开创建的模块\
  \ JAR 归档文件（位于 NetBeans 平台应用程序的*build/cluster/modules*目录中）内的清单文件。你可以在库包装器模块属性的*API\
  \ 版本控制*下查看哪些包是公开的。在那里，你可以稍后从*公共包*列表中删除包。\n\n***代码清单 3-9.** 库包装器模块的清单文件*\n\n`Manifest-Version:\
  \ 1.0`\n`Ant-Version: Apache Ant 1.7.0`\n`Created-By: 1.6.0-b105 (Sun Microsystems\
  \ Inc.)`\n`OpenIDE-Module: com.hboeck.mp3`\n**`OpenIDE-Module-Public-Packages:`**\n\
  **`com.hboeck.mp3.*,`**\n**`com.hboeck.mp3.id3.*,`**\n**`...`**\n`OpenIDE-Module-Java-Dependencies:\
  \ Java > 1.4`\n`OpenIDE-Module-Specification-Version: 1.0`\n`OpenIDE-Module-Implementation-Version:\
  \ 101211`\n`OpenIDE-Module-Localizing-Bundle:`\n`   com/hboeck/mp3/Bundle.properties`\n\
  `OpenIDE-Module-Requires: org.openide.modules.ModuleFormat1`\n**`Class-Path: ext/com-hboeck-mp3.jar`**\n\
  \n向导完成了两件非常重要的事情。一方面，它使用**OpenIDE-Module-Public-Packages**属性标记了库的所有包，使所有这些包可公开访问。这很有用，因为库也应该被其他模块使用。另一方面，向导使用**Class-Path**属性标记了库（位于分发版的*ext/*目录中），将其置于模块类路径上。这样，库的类就可以被模块类加载器加载。*自动加载*类型被自动分配给库包装器模块（参见*配置文件*一节）。这样，它只在需要时被加载。\n\
  \n\n\n#### 向模块添加库\n\n如前一节所述，在将库集成到应用程序时，建议始终使用库包装模块。以这种方式为第三方库创建新模块，可以提升应用程序的整体价值和可维护性，因为你可以通过包装该库的模块来设置对它的依赖关系。在某些情况下，你可能希望将库直接添加到现有模块（即你自己的应用程序模块）中。这很简单，操作方式与创建库包装模块类似。\n\
  \n要添加库，请在上下文菜单中通过*属性*打开目标模块的功能。在定义对其他模块依赖关系的*库*类别中，你会在右侧找到*包装的 JAR* 选项卡。在那里，你可以通过*添加\
  \ JAR* 按钮添加所需的库。\n\n这样做会为每个库在*项目元数据*文件中添加一个 `class-path-extension` 条目。由 `runtime-relative-path`\
  \ 属性定义的路径是库在发行版中的位置（即在创建模块时自动复制到的位置）。库原始文件的位置由 `binary-origin` 属性指定。如你所见，这与库包装模块的目录相同。（参见清单\
  \ 3-11。）\n\n***清单 3-11.** 包含类路径扩展的项目元数据文件*\n\n**`<class-path-extension>`**\n**`<runtime-relative-path>`**`ext/com-hboeck-mp3.jar`**`</runtime-relative-path>`**\n\
  **`<binary-origin>`**`release/modules/ext/com-hboeck-mp3.jar`**`</binary-origin>`**\n\
  **`</class-path-extension>`**\n\n通过将此条目添加到项目元数据文件中，该库会被复制到 *ext/* 目录，并在创建模块时通过 `Class-Path:\
  \ ext/com-hboeck-mp3.jar` 条目添加到模块的清单中。与库包装模块不同，该库的包不会被暴露。因此，它们只能被该模块使用。（在大多数情况下，这正是直接添加库的原因：不希望将其公开）。也可以将库的包定义为公开的，这在库包装模块中是自动实现的。\n\
  \n**何时使用哪种方法？**\n\n请记住，出于模块化和可维护性的考虑，应尽可能创建库的包装模块，而不是直接添加库。通常，只有当库仅被该模块使用，并且将库与使用它的模块一起分发不成问题时，才应直接将库添加到模块中。此外，请注意，你不能通过\
  \ `Class-Path` 从两个不同的模块加载同一个库。这可能导致不可预见的问题。同时，不要尝试使用 `Class-Path` 属性来引用模块 JAR 归档文件或位于\
  \ NetBeans *lib/* 目录中的库。\n\n### 复用模块\n\n通常，对于规模不大的应用程序，你会创建一个 NetBeans 平台应用程序项目，然后将应用程序的全部逻辑以模块的形式添加到该项目中。如果你随后想要在团队中实现一个大型企业级应用程序，将应用程序分解为多个部分，每个部分包含一定数量的模块，可能会很有用。为此，NetBeans\
  \ IDE 提供了将单个模块或整个集群（包含 NetBeans 模块的文件夹）添加为依赖项的功能。因此，例如，如果你开发了一系列基础模块，并希望其功能在多个应用程序中使用，那么最好使用模块套件。\n\
  \n你可以通过*文件 ![Image](img/U001.jpg) 新建项目… ![Image](img/U001.jpg) NetBeans 模块*来创建一个模块套件。在这个模块套件中，你可以开发和测试与特定应用程序模块隔离的基础模块。启动模块的构建过程时，所有模块都会存储在一个集群中。然后，你可以按如下方式将此集群添加到另一个\
  \ NetBeans 平台项目中：在目标应用程序中调用*属性 ![Image](img/U001.jpg) 库*。在那里，你会找到*添加集群…* 按钮（参见图\
  \ 3-13），通过它可以选择模块套件的集群。\n\n![Image](img/0313.jpg)\n\n***图 3-13.** 添加整个集群以复用外部模块。*\n\
  \n如果你没有选择真正的集群，NetBeans IDE 会要求你选择文件夹中所需的模块，然后创建一个相应的集群。这意味着 NetBeans IDE 会自动从一个包含模块的文件夹中创建集群。\n\
  \n现在，你可以按照上述方式，从不同的 NetBeans 平台应用程序中访问更多的 NetBeans 模块，从而实现模块的复用。这样，你就可以集中实现通用模块，使其独立于特定的应用程序。\n\
  \n**模块套件 vs. NetBeans 平台应用程序**\n\n本书主要讨论基于 NetBeans 平台开发独立应用程序。因此，在后续章节中，将一直使用*NetBeans\
  \ 平台应用程序*项目类型来创建应用程序。对于此项目类型，默认只提供 NetBeans 平台模块，因为它将成为一个独立的应用程序，而不是 NetBeans IDE\
  \ 的扩展。但是，你仍然可以访问 NetBeans IDE 的任何模块。为此，请在 NetBeans 平台应用程序项目中调用*属性 ![Image](img/U001.jpg)\
  \ 库*。在那里，你可以激活所需的模块。你自己的模块只能定义对已激活模块的依赖关系。你可以在*属性 ![Image](img/U001.jpg) 库*下随时在\
  \ NetBeans 平台应用程序和模块套件之间切换。品牌支持以及创建安装程序的功能，逻辑上仅在 NetBeans 平台应用程序中提供。\n\n### 总结\n\
  \n在本章中，你学习了 NetBeans 平台应用程序底层模块系统的结构及其工作原理。模块系统是运行时容器的一部分。首先，我们了解了 NetBeans 模块的结构。你学习了清单文件中定义的众多配置选项。除了清单文件，模块还可以选择性地提供一个层文件。你学习了如何通过模块层文件中的注册条目为整个应用程序做出贡献。\n\
  \n你创建了第一个模块，学习了模块如何使用其他模块的代码，并探讨了模块的生命周期以及如何通过库包装模块将第三方库集成到模块中。最后，你了解了这类模块的工作原理，并获得了实践经验。\n\
  \n## 第 4 章\n\n## OSGi 框架\n\nOSGi 框架提供了一个模块化的运行时环境。基于 OSGi 框架构建的应用程序是以模块化方式开发的——以*捆绑包*的形式——因此\
  \ OSGi 框架与 NetBeans 平台的模块系统具有可比性。一个 OSGi 捆绑包符合 NetBeans 模块的原则。OSGi 框架因其由一个公司联盟进行标准化而得到广泛采用。如今，它已通过\
  \ Java 社区流程被接受为 Java 的官方动态组件模型，即 JSR 291。\n\n然而，本章不会过于详细地讨论 OSGi 框架（已有大量专门针对 OSGi\
  \ 的信息可供参考）。相反，它将展示 OSGi 与 NetBeans 平台结合使用的可能性。\n\n\n\n### OSGi 与 NetBeans 平台\n\n\
  鉴于 OSGi 的重要性——尤其对企业而言——NetBeans 平台已得到扩展，使得 OSGi 包现在可以在 NetBeans 平台应用程序中执行。为此，包不应由\
  \ NetBeans 模块系统执行，而应由集成的 OSGi 运行时容器（Felix 或 Equinox）执行。这意味着您可以开发混合应用程序，其中 NetBeans\
  \ 模块和 OSGi 包可以并行运行。必须通过一个特殊的适配器层在两个模块系统之间建立连接；因此，NetBeans 模块能够定义对 OSGi 包的依赖关系并引用其\
  \ API。反之亦然：OSGi 包也可以定义对 NetBeans 模块的依赖关系并引用它们。\n\n此外，还可以在 OSGi 运行时容器中执行整个 NetBeans\
  \ 平台应用程序。为此，在创建应用程序时，所有 NetBeans 平台模块都会被转换为 OSGi 包。NetBeans IDE 自然支持此功能以及包的开发。由于这两个模块系统非常相似，两个系统可以交互，并且可以将\
  \ NetBeans 模块转换为 OSGi 包。\n\n### OSGi 包格式\n\n在第 3 章中，您了解了 NetBeans 模块的基本结构以及清单文件在该结构中的特殊重要性。在清单文件中，您定义了模块的特性和接口。OSGi\
  \ 包也通过清单文件来描述；大多数属性与 NetBeans 模块系统的属性相对应。OSGi 包的基本结构如图 4-1 所示。\n\n![Image](img/0401.jpg)\n\
  \n***图 4-1.** OSGi 包的组件*\n\n表 4-1 列出了最重要的 NetBeans 模块属性以及相应的 OSGi 包属性。\n\n![Image](img/t0401.jpg)\n\
  \n以下每个清单（清单 4-1 和清单 4-2）分别显示了一个简单 NetBeans 模块和一个结构相同的 OSGi 包的清单文件。如您所见，这两个文件之间的差异微乎其微。\n\
