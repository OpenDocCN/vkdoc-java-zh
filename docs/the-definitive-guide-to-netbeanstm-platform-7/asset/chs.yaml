  \" +` **`port.getAmountOfCart`**`());`\n`      }`\n`   }`\n\n`   private void reloadProductsActionPerformed(ActionEvent\
  \ evt) {`\n`      tableModel.getList().clear();`\n`      tableModel.getList().addAll(`**`port.getProducts`**`());`\n\
  `      tableModel.fireTableDataChanged();`\n`   }`\n`}`\n\n至此，已经创建了一个应用程序示例，通过该示例，可以在\
  \ NetBeans 平台应用程序的上下文之外访问 EJB。在这种方法中，没有使用典型的应用程序客户端（使用 RMI-IIOP），而是使用了更简单的 Web 服务接口（通过\
  \ HTTP 使用 SOAP）。虽然有意识地放弃了应用程序容器的一两项功能，但在“简单集成”和灵活性方面获得了巨大优势。\n\n### 总结\n\nNetBeans\
  \ 平台通常与 Java 企业版一起使用。到目前为止，尚未考虑这两个“世界”之间的交互。在本章中，您学习了如何轻松地从 NetBeans 平台应用程序中访问 EJB。为了演示这一点，您创建了一个简单的服务器端购物系统，将其部署到\
  \ GlassFish 应用程序服务器，并从基于 NetBeans 平台的应用程序访问此 Java EE 应用程序。\n\n## 第 32 章\n\n## RESTful\
  \ Web 服务\n\n本章介绍如何通过 RESTful Web 服务提供和使用服务器端数据。与基于 SOAP 的 Web 服务类似，可以通过 NetBeans\
  \ 平台应用程序访问 Java EE 服务器应用程序。本章将向您展示创建和集成 RESTful Web 服务客户端所需的步骤。您将创建一个简单的产品数据库，其中包含一个持久化实体类和一个提供数据访问的\
  \ RESTful Web 服务类。服务器通过实体管理器直接获取数据。但也可以访问提供所需数据的企业 Java Bean（EJB）。\n\n### 创建 Web\
  \ 应用程序\n\n虽然可以在 EJB 模块中提供基于 SOAP 的 Web 服务，但 RESTful Web 服务需要一个 *Web 应用程序* 项目（WAR\
  \ 文件）。然后，此应用程序将在 Java EE 服务器的 Web 容器中执行。使用 NetBeans IDE 向导，通过 *文件* ![Image](img/U001.jpg)\
  \ *新建项目…* ![Image](img/U001.jpg) *Java Web* ![Image](img/U001.jpg) *Web 应用程序* 创建一个\
  \ Web 应用程序项目。将项目命名为 *OrderSystem*，并将其分配给一个 Java EE 服务器。最后，点击*完成*完成向导。（请参见图 32-1。）\n\
  \n![Image](img/3201.jpg)\n\n***图 32-1.** 创建 Web 应用程序项目并将其分配给服务器*\n\n\n\n### 创建持久化实体\n\
  \n首先，你需要创建一个持久化实体类，它将代表要管理的数据。通过这种方式，你可以在数据库中读取、更改、保存和删除产品。NetBeans IDE 也提供了一个向导。你也可以直接创建一个持久化单元；但是，你需要预先配置一个数据库。你可以使用集成的\
  \ Java DB，它可以在*服务*窗口的*数据库*下，通过上下文菜单进行配置（参见第 26 章）。\n\n依次选择*文件 ![Image](img/U001.jpg)\
  \ 新建文件… ![Image](img/U001.jpg) 持久化 ![Image](img/U001.jpg) 实体类*来创建一个持久化实体类。将其命名为\
  \ *Product*，并分配到包 `com.galileo.netbeans.order.entities.` 中。激活*创建持久化单元*选项，让向导创建它（你需要在接下来的向导页面中输入更多信息）。将持久化单元命名为\
  \ *OrderSystemPU*，并选择 *EclipseLink* 作为持久化提供程序。要使用之前创建的数据库，请使用 *jdbc/ProductDatabase*\
  \ 作为数据源。选择*创建*作为表生成策略，这样当添加第一个产品时，数据库中必要的表就会自动生成。（参见图 32-2。）\n\n![Image](img/3202.jpg)\n\
  \n***图 32-2.** 创建持久化实体类和持久化单元*\n\n该类创建时带有属性 `id`，它唯一标识数据库中的一条记录。此 ID 的值由数据库自动赋予。作为示例，你可以添加更多属性（`orderId,\
  \ name, price`）以及相应的 getter 和 setter 方法。（参见清单 32-1。）\n\n***清单 32-1.** 带有 JPA 注解的持久化实体类\
  \ Product，用于将对象保存到数据库*\n\n`import java.io.Serializable;`\n`import javax.persistence.Entity;`\n\
  `import javax.persistence.GeneratedValue;`\n`import javax.persistence.GenerationType;`\n\
  `import javax.persistence.Id;`\n**`@Entity`**\n`public class` **`Product`** `implements\
  \ Serializable {`\n`   @Id`\n`   @GeneratedValue(strategy = GenerationType.AUTO)`\n\
  `   private Long   id;`\n`   private String orderId;`\n`   private String name;`\n\
  `   private Double price;`\n\n`public Long` **`getId`**`() {`\n`      return id;`\n\
  `   }`\n`public void` **`setId`**`(Long id) {`\n`      this.id = id;`\n`   }`\n\
  `public String` **`getName`**`() {`\n`      return name;`\n`   }`\n`public void`\
  \ **`setName`**`(String name) {`\n`      this.name = name;`\n`   }`\n`   …`\n`}`\n\
  \n### 创建 RESTful Web 服务\n\n有几个向导可用于创建 RESTful Web 服务。除了创建简单的服务，你也可以直接为你的用例创建 Web\
  \ 服务。同时，用于操作和查询数据的相关方法会自动创建。依次选择*文件 ![Image](img/U001.jpg) 新建文件… ![Image](img/U001.jpg)\
  \ Web 服务 ![Image](img/U001.jpg) 来自实体类的 RESTful Web 服务*，并添加你之前创建的类 `Product`。将服务类添加到包\
  \ `com.galileo.netbeans.order.service` 中。\n\n创建的服务被拆分为两个类：`AbstractFacade` 和 `ProductFacadeREST`。`AbstractFacade`\
  \ 类是对通过实体管理器访问数据库的方法的抽象实现。那些应作为服务提供的方法在 `ProductFacadeREST` 中实现；实体管理器在此类中进行管理。（参见清单\
  \ 32-2。）\n\n***清单 32-2.** 用于操作和获取 Product 类型数据的 RESTful Web 服务类*\n\n`import com.galileo.netbeans.order.entities.Product;`\n\
  `import javax.ws.rs.Consumes;`\n`import javax.ws.rs.DELETE;`\n`import javax.ws.rs.GET;`\n\
  `import javax.ws.rs.POST;`\n`import javax.ws.rs.PUT;`\n`import javax.ws.rs.Path;`\n\
  `import javax.ws.rs.PathParam;`\n`import javax.ws.rs.Produces;`\n\n`@Stateless`\n\
  `@Path(\"com.galileo.netbeans.order.entities.product\")`\n`public class` **`ProductFacadeREST`**\
  \ `extends AbstractFacade<Product> {`\n\n**`@PersistenceContext`**`(unitName = \"\
  OrderServicePU\")`\n`   private EntityManager em;`\n\n`   public ProductFacadeREST()\
  \ {`\n`      super(Product.class);`\n`   }`\n\n`   @POST`\n`   @Override`\n`   @Consumes({\"\
  application/xml\"})`\n`public void` **`create`**`(Product entity) {`\n`      super.create(entity);`\n\
  `   }`\n\n`   @PUT`\n`   @Override`\n`   @Consumes({\"application/xml\"})`\n`   public\
  \ void` edit`(Product entity) {`\n`      super.edit(entity);`\n`   }`\n\n`   @DELETE`\n\
  `   @Path(\"{id}\")`\n`public void` **`remove`** `(@PathParam(\"id\") Long id) {`\n\
  `      super.remove(super.find(id));`\n`   }`\n\n`   @Override`\n`protected EntityManager`\
  \ **`getEntityManager`**`() {`\n`      return em;`\n`   }`\n`   …`\n`}`\n\n这些方法带有注解，用于标识使用了哪些\
  \ HTTP 操作。此外，数据传输的格式通过 `@Consumes` 和 `@Produces` 定义。除了 `application/xml` 类型，你还可以选择\
  \ `application/json`。\n\n这样，你就创建了一个简单的 RESTful Web 服务，现在可以通过*部署*将其提供到服务器上。该服务的接口由一个\
  \ WADL 文件定义，该文件也由 Java EE 服务器发布。你可以通过 Web 界面测试该服务：在应用程序项目的上下文菜单中选择*测试 RESTful Web\
  \ 服务*。\n\n### 安装 NetBeans 平台应用程序\n\n创建 Web 服务后，现在回到 NetBeans 平台。首先，创建一个 NetBeans\
  \ 平台应用程序项目，将其命名为 *OrderApplication*。在创建应用程序模块之前，你需要将扩展 NetBeans IDE 中的附属模块添加到应用程序中。为此，请进入项目*属性*的*库*类别。在那里添加以下模块：\n\
  \n*   enterprise/RESTful Web 服务库\n*   ide/JAXB 2.2 库\n*   ide/JAXB API\n\n*Jersey*\
  \ 库（它是 Java RESTful Web 服务 API (JAX-RS) 的参考实现）隐藏在 RESTful Web 服务库模块之后。\n\n\n\n###\
  \ RESTful Web 服务客户端\n\n现在，您将为 Web 服务创建一个服务客户端类。为此，首先创建一个名为 *OrderModule* 的应用程序模块。在此新模块上，依次选择\
  \ *文件 ![Image](img/U001.jpg)* *新建文件… ![Image](img/U001.jpg)* *Web 服务 ![Image](img/U001.jpg)*\
  \ *RESTful Java 客户端*。将服务类命名为 *OrderServiceClient*，将其添加到包 `com.galileo.netbeans.order.module`\
  \ 中，然后通过 *浏览…* 按钮选择 *来自项目* 选项，选择将为其创建客户端类的 Web 服务。（参见图 32-3。）\n\n![Image](img/3203.jpg)\n\
  \n***图 32-3.** 为 RESTful Web 服务创建服务客户端*\n\n现在，让我们看一下创建的类。服务提供的所有方法均通过 JAX-RS 实现；使用了允许完全透明调用服务的签名。（参见清单\
  \ 32-3。）\n\n***清单 32-3.** 具有完全透明对象的 RESTful Web 服务客户端，该对象可在 Java EE 服务器之间传输*\n\n\
  `import com.sun.jersey.api.client.Client;`\n`import com.sun.jersey.api.client.UniformInterfaceException;`\n\
  `import com.sun.jersey.api.client.WebResource;`\n`…`\n`public class` **`OrderServiceClient`**\
  \ `{`\n`   private WebResource webResource;`\n`   private Client client;`\n`   private\
  \ static final String BASE_URI = \"http://localhost:8080/OrderSystem/resources\"\
  ;`\n\n`public` **`OrderServiceClient`**`() {`\n`      ClientConfig config = new\
  \ DefaultClientConfig();`\n`      client = Client.create(config);`\n`      webResource\
  \ = client.resource(BASE_URI).`\n`         path(\"com.galileo.netbeans.order.entities.product\"\
  );`\n`   }`\n\n`public void` **`create`**`(Object requestEntity) throws UniformInterfaceException\
  \ {`\n`      webResource.type(MediaType.APPLICATION_XML).post(requestEntity);`\n\
  `   }`\n\n`public` **`<T> T findAll(Class<T> responseType)`** `throws UniformInterfaceException\
  \ {`\n`      WebResource resource = webResource;`\n`      return resource.accept(MediaType.APPLICATION_XML).get(responseType);`\n\
  `   }`\n`   …`\n`}`\n\n查看清单 32-3 中创建的类，您会发现方法返回的数据类型由传入的类对象类型定义。要获取 XML 格式的原始数据，您可以直接使用\
  \ `String` 类型。但是，您希望为数据创建一个实体类（类似于服务器端类）。JAXB 会根据 XML 数据以及相关的注解自动创建所需的实体类实例。如果 getter\
  \ 和 setter 方法与相关 XML 元素的名称（以及服务器端类的属性）匹配，则除了使用 `@XmlRootElement` 注解该类之外，您无需执行任何其他操作。（参见清单\
  \ 32-4。）\n\n***清单 32-4.** 由 JAXB 框架自动创建并用 XML 数据填充属性的实体类*\n\n`import javax.xml.bind.annotation.XmlRootElement;`\n\
  \n`@XmlRootElement`\n`public class Product {`\n`   private Long   id;`\n`   private\
  \ String orderId;`\n`   private String name;`\n`   private Double price;`\n`   …`\n\
  `}`\n\n现在，您可以在所有传输对象或获取单个对象的情况下使用此类。如果服务方法向您传递了一个对象列表（参见清单 32-3 中的方法），则必须创建一个辅助类。在\
  \ XML 中，对象列表由额外的标签（`<Products>`）包裹。为了能够正确创建此标签及其下属对象，需要使用清单 32-5 中所示的辅助类。\n\n***清单\
  \ 32-5.** 用于自动创建产品列表的辅助类*\n\n`import java.util.ArrayList;`\n`import java.util.List;`\n\
  `import javax.xml.bind.annotation.XmlRootElement;`\n\n**`@XmlRootElement`**\n`public\
  \ class` **`Products`** `{`\n`   private List<Product> product = new ArrayList<Product>();`\n\
  \n`public List<Product>` **`getProduct`**`() {`\n`      return product;`\n`   }`\n\
  \n`public void` **`setProduct`**`(List<Product> product) {`\n`      this.product\
  \ = product;`\n`   }`\n`}`\n\nWeb 服务客户端的使用非常简单。作为测试，您可以向数据库添加多个产品，然后查询特定对象或所有对象并传递其数据，如清单\
  \ 32-6 所示。\n\n***清单 32-6.** 测试 RESTful Web 服务的服务客户端*\n\n`public final class` **`TestRESTAction`**\
  \ `implements ActionListener {`\n\n`   @Override`\n`   public void actionPerformed(ActionEvent\
  \ e) {`\n**`OrderServiceClient`** `client =` **`new OrderServiceClient`**`();`\n\
  \n**`Product`** `p = new Product();`\n`      p.setName(\"Test Product\");`\n`      p.setOrderId(\"\
  P1\");`\n`      p.setPrice(3.99);`\n**`client.create`**`(p);`\n\n`Product p1 =`\
  \ **`client.find`**`(Product.class, \"1\");`\n`      System.out.println(\"P1: \"\
  \ + p1);`\n\n**`Products`** `pro =`**`client.findAll`**`(Products.class);`\n`      System.out.println(\"\
  Products: \" + pro.getProduct().size());`\n`   }`\n`}`\n\n### 总结\n\nRESTful Web\
  \ 服务提供了一种非常简单的方式，可以从 NetBeans 平台应用程序中访问服务器端资源。在本章中，您学习了如何创建 RESTful Web 服务及相应的客户端模块。您使用客户端模块从\
  \ NetBeans 平台应用程序访问了一个简单的产品数据库。\n\n## 第 33 章\n\n## 身份验证与多用户登录\n\n在开始讨论身份验证和多用户登录之前，让我们回顾一下您在第\
  \ 13 章中创建的登录对话框。通过此对话框，您可以获取用户的登录数据。这里，我们将在服务器端检查这些数据。检查登录数据有多种可能性。在此背景下，我们将重点介绍两种\
  \ Java 内置函数。一旦用户成功注册，根据其权限或组成员身份调整应用程序就显得尤为重要。\n\n\n\n### 登录对话框\n\n在第 13 章中，我们创建了一个特定于应用程序的对话框，即登录对话框。当时的重点在于\
  \ UI 组件，而非登录流程。您直接在安装程序中实现了处理程序的逻辑，用于在应用程序启动前显示对话框的起始状态。现在，由于需要添加身份验证流程及后续的适配工作，您希望将逻辑外部化到单独的`LoginHandler`类中。（参见代码清单\
  \ 33-1。）\n\n***代码清单 33-1.** 用于管理登录对话框的登录处理程序（第一部分）*\n\n`import org.openide.DialogDescriptor;`\n\
  `import org.openide.DialogDisplayer;`\n`import org.openide.LifecycleManager;`\n\
  `…`\n`public class` **`LoginHandler`** `implements ActionListener {`\n`   private\
  \ static final LoginHandler instance = new LoginHandler();`\n`   private LoginPanel\
  \ panel = new LoginPanel();`\n`   private DialogDescriptor dialog = null;`\n\n`   private\
  \ LoginHandler() {`\n`   }`\n\n`public static LoginHandler` **`getDefault`**`()\
  \ {`\n`      return instance;`\n`   }`\n\n`public void` **`showLoginDialog`**`()\
  \ {`\n`      panel.reset();`\n`      dialog = new DialogDescriptor(panel, \"Login\"\
  , true, this);`\n`      dialog.setClosingOptions(new Object[]{});`\n`      dialog.addPropertyChangeListener(new\
  \ PropertyChangeListener() {`\n`         @Override`\n`         public void`**`propertyChange`**`(PropertyChangeEvent\
  \ evt) {`\n`            if(evt.getPropertyName().equals(DialogDescriptor.PROP_VALUE)`\n\
  `               && evt.getNewValue().equals(DialogDescriptor.CLOSED_OPTION)) {`\n\
  `               LifecycleManager.getDefault().`**`exit`**`();`\n`            }`\n\
  `         }`\n`      });`\n\n`      DialogDisplayer.getDefault().`**`notifyLater`**`(dialog);`\n\
  `   }`\n\n`   @Override`\n`public void` **`actionPerformed`**`(ActionEvent evt)\
  \ {`\n`      if(evt.getSource() == DialogDescriptor.CANCEL_OPTION) {`\n`         LifecycleManager.getDefault().`**`exit`**`();`\n\
  `      } else {`\n**`login`**`();`\n`      }`\n`   }`\n\n`   private void login()\
  \ { … }`\n`}`\n\n将负责创建和显示对话框的类实现为单例类是合理的。首先，`showLoginDialog()`方法创建了一个`DialogDescriptor`实例，该实例同时接收\
  \ UI 面板（包含文本字段）和对`LoginHandler`实例的引用。您通过`LoginHandler`类实现了`ActionListener`接口及其`actionPerformed()`方法。当按下按钮时，该方法会被激活。我们在此处理两种情况：如果用户按下*取消*或*Esc*键，或关闭对话框，则应用程序结束。如果用户按下*确定*，则使用输入数据启动登录流程。此外，您还需要安装一个`PropertyChangeListener`，以便在按下右上角的集成关闭按钮时能够做出响应。\n\
  \n现在，您可以在安装程序的`restored()`方法中使用此`LoginHandler`类来显示对话框（参见代码清单 33-2）。您可能还希望在菜单中注册一个操作来实现用户切换，如代码清单\
  \ 33-3 所示。\n\n***代码清单 33-2.** 在应用程序启动时执行登录处理程序*\n\n`import org.openide.modules.ModuleInstall;`\n\
  `public class` **`Installer`** `extends ModuleInstall {`\n`   @Override`\n`public\
  \ void` **`restored`**`() {`\n`      LoginHandler.getDefault().`**`showLoginDialog`**`();`\n\
  `   }`\n`}`\n\n***代码清单 33-3.** 通过可分配给菜单的操作执行登录处理程序*\n\n`public final class` **`SwitchUser`**\
  \ `implements ActionListener {`\n`   @Override`\n`   public void`**`actionPerformed`**`(ActionEvent\
  \ e) {`\n`      LoginHandler.getDefault().`**`showLoginDialog`**`();`\n`   }`\n\
  `}`\n\n### 目录服务器\n\n用户身份验证所需的数据通常由目录服务器管理。借助目录服务器，您可以通过轻量级目录访问协议（LDAP）交换必要的信息。为了实施示例并进行演示，您需要安装一个本地目录服务器。您可以创建并修改所需的数据结构以供其使用。\n\
  \n#### 安装测试环境\n\n*Apache Directory*项目将用作服务器。其一部分是*ApacheDS*，这是一个用 Java 编写的、符合 LDAP\
  \ 标准的目录服务器。该项目的另一部分是*Apache Directory Studio*，这是一个工具平台，您将用作目录服务器 ApacheDS 的图形用户界面。您只需下载并安装嵌入了\
  \ ApacheDS 的目录工作室。安装软件后，您可以启动工作室并安装服务器。但在安装服务器之前，您必须先添加它。通过*文件 ![Image](img/U001.jpg)\
  \ 新建…*打开向导，并在*Apache DS*类别中选择*Apache DS 服务器*条目。在后续页面中，您只需为其命名，然后点击*完成*结束向导。之后，您就可以配置服务器了。（参见图\
  \ 33-1。）\n\n![Image](img/3301.jpg)\n\n***图 33-1.** 安装 Apache Directory 服务器实例*\n\n\
  创建的实例将以默认设置添加到*服务器*窗口中。在此窗口中，首先启动服务器。之后，您可以通过上下文菜单中的*LDAP 浏览器 ![Image](img/U001.jpg)\
  \ 创建连接*来创建连接。此连接将添加到*连接*窗口中。切换到该窗口，并通过上下文菜单中的*打开连接*建立与服务器的连接。连接建立后，*LDAP 浏览器*窗口中将显示一个目录信息树（DIT）。（参见图\
  \ 33-2。）接下来，您将向 LDAP 浏览器窗口添加必要的用户数据。\n\n![Image](img/3302.jpg)\n\n***图 33-2.** Apache\
  \ Directory Studio*\n\n\n\n#### 设置用户数据\n\n启动目录服务器后，既然你已获得访问权限，接下来需要设置用户数据，以便后续能够使用这些数据登录。在图\
  \ 33-2 中，你已经看到 DIT 中 *system* 条目下的 *users* 条目。现在，请向该条目添加两个用户条目。为此，请从该条目的上下文菜单中选择\
  \ *New ![Image](img/U001.jpg) New Entry*。你需要从头开始设置该条目。在接下来的页面中，添加对象类 *inetOrgPerson*。与此关联，会添加更多元素。点击\
  \ *Next*，在下一页使用 `uid=<username>`（其中 *username* 是你的用户名）设置相对可分辨名称 (RDN)。下一步是设置通用名称\
  \ (cn) 和姓氏 (sn)。（参见图 33-3。）你可以在此处使用任意值。\n\n![Image](img/3303.jpg)\n\n***图 33-3.**\
  \ 完成新用户条目的属性设置*\n\n现在，你可以通过 *Finish* 完成新用户的设置。缺少的是一个密码，你可以通过一个额外的属性来添加。为此，请在目录工作室的属性列表的上下文菜单中激活\
  \ *New Attribute…*。属性类型为 *userPassword*。直接点击 *Finish* 关闭向导。结果，密码编辑器将自动显示。你可以在此定义实际密码并选择哈希算法。\n\
  \n现在，你已经可以对应用程序用户进行身份验证。然而，在本章中，我们希望更进一步，根据用户所属的特定用户组，在 NetBeans 平台应用程序中激活或停用某些功能。这种组成员关系在目录中的显示方式取决于具体用例（用户属于一个还是多个组）。在此示例中，直接将组成员关系添加到用户条目中。使用多值属性可以将一个用户分配到多个组。此操作的主要过程与添加密码相同。使用\
  \ *employeeType* 作为属性类型。完成向导后，直接在属性列表中定义值（例如，*User*）。要将用户分配到多个组，只需添加多个 *employeeType*\
  \ 属性。\n\n以同样的方式继续，分配第二个用户，你将把他分配到 *Admin* 组。在接下来的章节中，将为这两个用户组实现不同的应用程序配置。\n\n###\
  \ 身份验证\n\n在前面的段落中，你迈出了第一步，即在启动应用程序时查询用户的登录数据，并让服务器执行这些数据检查。目前还缺少的是应用程序（客户端）和目录（服务器）之间的连接。正如本章开头所述，你希望为此使用\
  \ LDAP 协议。Java 平台甚至提供了多种开箱即用的方式来实现简单的 LDAP 通信。显然，最好使用 Java 命名和目录接口 (JNDI)；不过，Java\
  \ 身份验证和授权服务 (JAAS) 也非常有用。在此示例中，你将使用 JNDI，因为它提供了更大的灵活性。\n\n#### Java 命名和目录接口 (JNDI)\n\
  \n你经常会在 Java EE 中看到 JNDI。JNDI 之所以灵活，是因为其工厂可以以不同方式进行配置。目录服务器和 LDAP 协议也都有对应的工厂，因此它们也可以灵活使用。登录过程，即\
  \ JNDI 的使用，被分离在 `SecurityManager` 类中。在这个单例类中，你管理当前已登录用户的用户组。现在，请将注意力转向 `login()`\
  \ 方法。首先，你需要在 `Properties` 实例中组合以下特性：\n\n*   INITIAL_CONTEXT_FACTORY：此特性定义了你应该使用的工厂。对于此应用程序，请使用\
  \ `com.sun.jndi.ldap.LdapCtxFactory`。\n*   *PROVIDER_URL*：定义目录服务器的 URL。你需要在服务器名称、端口和\
  \ DN 之前定义 ldap 协议，例如 `ldap://localhost:10389/ou=system`。\n*   *SECURITY_AUTHENTICATION*：指示简单身份验证和安全层\
  \ (SASL) 框架的身份验证机制。提供了 SIMPLE、DIGEST-MD5、GSSAPI、NTLM、GSS-SPNEGO 和 CRAM-MD5。\n* \
  \  *SECURITY_PRINCIPAL*：将用户名指示为目录中的完整路径。该路径已给出。你从登录对话框中动态插入用户名。\n*   *SECURITY_CREDENTIALS*：传输属于已验证用户的密码。\n\
  \n将使用这些特性创建的 `Properties` 对象传递给 `InitialDirContext` 类，该类会尝试使用给定的详细信息建立连接。如果此尝试因输入错误密码等原因而失败，则会抛出\
  \ `NamingException`。你也可以使用子类 `InitialLdapContext` 代替 `InitialDirContext` 来处理 LDAP\
  \ 查询以实现高级控制。（参见清单 33-4。）\n\n***清单 33-4.** 使用 JNDI 访问目录服务器的实现*\n\n`import javax.naming.NamingException;`\n\
  `import javax.naming.directory.Attribute;`\n`import javax.naming.directory.Attributes;`\n\
  `import javax.naming.directory.DirContext;`\n`import javax.naming.directory.InitialDirContext;`\n\
  `…`\n`public class` **`SecurityManager`** `{`\n`   private static final SecurityManager\
  \ inst = new SecurityManager();`\n`   private String user;`\n`   private List<UserGroup>\
  \ groups = new ArrayList<UserGroup>();`\n\n`   private SecurityManager() {`\n`   }`\n\
  \n`public static SecurityManager` **`getDefault`**`() {`\n`      return inst;`\n\
  `   }`\n\n`public boolean` **`login`**`(String user, String password) {`\n`      this.user\
  \ = \"\";`\n`      this.groups.clear();`\n`      Properties props = new Properties();`\n\
  \n`      props.put(DirContext.`**`INITIAL_CONTEXT_FACTORY`**`, \"com.sun.jndi.ldap.LdapCtxFactory\"\
  );`\n`      props.put(DirContext`**`.PROVIDER_URL`**`, \"ldap://localhost:10389/ou=system\"\
  );`\n`      props.put(DirContext`**`.SECURITY_AUTHENTICATION`**`, \"simple\");`\n\
  `      props.put(DirContext`**`.SECURITY_PRINCIPAL`**`, \"uid=\" + user + \", ou=users,\
  \ ou=system\");`\n`      props.put(DirContext`**`.SECURITY_CREDENTIALS`**`, password);`\n\
  \n`      try {`\n`InitialDirContext ctx = new` **`InitialDirContext`**`(props);`\n\
  `         this.user = user;`\n`Attributes attr = ctx` **`.getAttributes`**`(\"uid=\"\
  \ + user + \", ou=users\");`\n`         Attribute a = attr.get(\"employeeType\"\
  );`\n\n`         if (a != null) {`\n`            for (String groupName : Collections.list((Enumeration<String>)\
  \ a.getAll())) {`\n`UserGroup group =` **`UserGroup`**`.get(groupName);`\n`               if\
  \ (group != null) {`\n`                  groups.add(group);`\n`               }`\n\
  `            }`\n`         }`\n`         return true;`\n`      } catch (NamingException\
  \ ex) {`\n`         return false;`\n`      }`\n`   }`\n\n`public List<UserGroup>`\
  \ **`getUserGroups`**`() {`\n`      return this.groups;`\n`   }`\n`}`\n\n如果连接成功建立，则不会抛出异常。你可以通过这种方式查询\
  \ `InitialDirContext` 实例的用户属性。获取属性 *employeeType*，该属性将用户分配到组。由于这是一个多值属性，你可以使用 `getAll()`\
  \ 方法获取该属性的所有值。为每个属性值创建一个对象。（请参阅本章后面的*适配应用程序*。）将所有识别出的组添加到一个列表中，并通过 `getUserGroups()`\
  \ 方法提供该列表。\n\n\n\n#### Java 认证与授权 (JAAS)\n\nJava 认证与授权 (JAAS) API 是 JNDI 的一种替代方案。正如其名，它侧重于认证而非查询目录中的属性。因此，创建清单\
  \ 33-4 中的示例并不那么容易。不过，本节将向您展示如何在 NetBeans Platform 应用程序中使用和集成 JAAS API 及其配置。\n\n\
  与 JNDI 概念类似，您首先需要一个配置文件。JAAS 在特定的文件结构中提供了这样的配置。该文件通常通过命令行参数定义。在 NetBeans Platform\
  \ 应用程序中，将此文件打包到模块中是合理的。使用 `LoginContext` 构造函数的变体，可以向其传递一个 `ConfigFile` 实例；配置文件被传递给该实例。您可以通过\
  \ `getResource()` 方法获取该 `URI` 或 `URL`。\n\nJAAS API 为不同的认证机制提供了不同的登录模块，就像它为 LDAP\
  \ 协议（您可以通过该协议与目录服务器通信）所做的那样。在清单 33-5 所示的配置文件中，指定了在哪个配置中使用哪个登录模块。\n\n***清单 33-5.**\
  \ JAAS 配置文件*\n\n**`LoginJaas`** `{`\n`   com.sun.security.auth.module`**`.LdapLoginModule`**\
  \ `REQUIRED`\n`   userProvider=\"ldap://localhost:10389\"`\n`   authIdentity=\"\
  uid={USERNAME},ou=users,ou=system\"`\n`   useSSL=false`\n`   debug=true;`\n`};`\n\
  \n可以在一个文件中管理不同的配置。每个配置都有一个名称。与 JNDI 一样，您需要指定目录服务器的 URL，并指定用户条目的路径。用户名和密码是分开查询或设置的，如清单\
  \ 33-6 所示。\n\n***清单 33-6.** 使用 JAAS API 进行认证*\n\n`import com.sun.security.auth.login.ConfigFile;`\n\
  `import java.security.Principal;`\n`import javax.security.auth.callback.Callback;`\n\
  `import javax.security.auth.callback.CallbackHandler;`\n`import javax.security.auth.callback.NameCallback;`\n\
  `import javax.security.auth.callback.PasswordCallback;`\n`import javax.security.auth.callback.UnsupportedCallbackException;`\n\
  `import javax.security.auth.login.LoginContext;`\n`…`\n`public class` **`SecurityManager`**\
  \ `implements CallbackHandler {`\n`   private static SecurityManager inst = new\
  \ SecurityManager();`\n`   private String user;`\n`   private String password;`\n\
  \n`   private SecurityManager() {`\n`   }`\n\n`public static SecurityManager` **`getDefault`**`()\
  \ {       return inst;`\n`   }`\n\n`public boolean` **`login`**`(String user, String\
  \ password) {`\n`      this.user = user;`\n`      this.password = password;`\n`      LoginContext\
  \ loginContext = null;`\n`      try {`\n`         URL url = SecurityManager.class.\
  \ getResource(\"`**`config.jaas`**`\");`\n`loginContext = new` **`LoginContext`**`(\"\
  LoginJaas\",`\n`                 null, this, new ConfigFile(url.toURI()));`\n`         loginContext`**`.login`**`();`\n\
  `         for (`**`Principal`** `p : loginContext.getSubject().getPrincipals())\
  \ {`\n`             System.out.println(\"Principal: <\" + p.getClass() + \"> \"\
  \ + p.getName());`\n`         }`\n`         return true;`\n`      } catch (LoginException\
  \ e) {`\n`         return false;`\n`      }`\n`   }`\n\n`   @Override`\n`public\
  \ void` **`handle`**`(Callback[] callbacks) throws IOException, UnsupportedCallbackException\
  \ {`\n`      for (`**`Callback`** `cb : callbacks) {`\n`         if (cb instanceof\
  \ NameCallback) {`\n**`NameCallback`** `nc = (NameCallback) cb;`\n`            nc.`**`setName`**`(this.user);`\n\
  `         } else if (cb instanceof PasswordCallback) {`\n**`PasswordCallback`**\
  \ `pc = (PasswordCallback) cb;`\n`            pc.`**`setPassword`**`(this.password.toCharArray());`\n\
  `         }`\n`      }`\n`   }`\n`}`\n\n将一个 `CallbackHandler` 对象传递给 `LoginContext`\
  \ 构造函数。直接在 `SecurityManager` 类中实现 `CallbackHandler` 接口。`handle()` 方法接收一个包含 `Callback`\
  \ 实例的数组。检查实例的类型并执行相应操作。这主要是设置用户名和密码，这些信息可以在登录过程中由 `login()` 方法查询。如果认证完全完成，您可以通过不同的\
  \ `Principal` 实例查询用户的特征。\n\n### 适配应用程序\n\n本节将介绍 NetBeans Platform 用于将应用程序适配到特定用户的功能。一方面，涉及如何动态适配包含菜单配置的系统文件系统。另一方面，涉及如何在模块层开启或关闭某些功能。\n\
  \n您需要使用本章开头 `LoginHandler` 类的 `login()` 方法，该方法之前被保留未讲。此方法将用户输入的数据传递给安全管理器（参见上一节*认证*）。安全管理器负责服务器上的认证。如果用户成功登录，则使用\
  \ `getUserGroups()` 方法获取相关的用户组。如果列表为空，则表示用户未分配到任何组，因此用户没有权限。否则，将列表传递给 `UserGroupFileSystem`\
  \ 类（将在下一节*系统文件系统*中讨论），某些模块将被激活或停用。在 `UserGroupModuleSystem` 类中实现此功能（将在本章后面的*模块系统*一节中讨论）。请参见清单\
  \ 33-7。\n\n***清单 33-7.** 成功登录后的应用程序适配*\n\n`public class` **`LoginHandler`** `implements\
  \ ActionListener {`\n`   …`\n`private void` **`login`**`() {`\n`      if(!SecurityManager.getDefault().`**`login`**`(panel.getUsername(),\
