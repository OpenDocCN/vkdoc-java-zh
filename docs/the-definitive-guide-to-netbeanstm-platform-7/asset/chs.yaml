  , \"The rain\", \"2006\"));`\n`data.add(new` **`Mp3FileObject`**`(\"Marquess\",\
  \ \"El temperamento\", \"2006\"));`\n`data.add(new` **`Mp3FileObject`**`(\"Floorfilla\"\
  , \"Cyberdream\", \"2006\"));`\n`   }`\n`   public Mp3FileObject getRow(int row)\
  \ {`\n`      return data.get(row);`\n`   }`\n`   @Override`\n`   public Object getValueAt(int\
  \ row, int col) {`\n`      Mp3FileObject mp3 = data.get(row);`\n`      switch(col)\
  \ {`\n`         case 0: return mp3.getArtist();`\n`         case 1: return mp3.getTitle();`\n\
