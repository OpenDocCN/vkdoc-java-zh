  \n### VMD：可视化移动设计器\n\n使用 VMD 类实现图甚至更简单。在这方面，VMD 代表 *Visual Mobile Designer*，并标记了\
  \ VMD 使用的类。这些类提供了一个 `GraphPinScene` 实现，如上一节所示。除了场景之外，还有用于节点、边和引脚的特殊类，它们提供了一致的设计。因此，你无需关心任何实现细节，例如小部件的创建、布局或路由器的设置；你只需添加必要的元素。一个\
  \ `VMDGraphScene` 已经具有四个图层和操作，例如缩放、平移和选择。让我们再次以三个节点（上文）的简单示例为例，并使用 `VMDGraphScene`\
  \ 来实现它（参见清单 14-5）。\n\n***清单 14-5.** 使用 VMD 类创建图*\n\n`import org.netbeans.api.visual.vmd.VMDGraphScene;`\n\
  `import org.netbeans.api.visual.vmd.VMDNodeWidget;`\n`import org.netbeans.api.visual.vmd.VMDPinWidget;`\n\
  `...`\n`public final class VMDTopComponent extends TopComponent {`\n`   private\
  \ VMDGraphScene scene = new VMDGraphScene();`\n`public` **`VMDTopComponent`**`()\
  \ {`\n\n**`      VMDGraphScene`** `scene = new` **`VMDGraphScene`**`();`\n`      scenePane.setViewportView(scene.`**`createView`**`());`\n\
  \n**`      VMDNodeWidget`** `n1 = (VMDNodeWidget)scene.`**`addNode`**`(\"Node 1\"\
  );`\n`      n1.`**`setNodeName`**`(\"Node 1\");`\n\n**`      VMDNodeWidget`** `n2\
  \ = (VMDNodeWidget)scene.`**`addNode`**`(\"Node 2\");`\n`      n2.`**`setNodeName`**`(\"\
  Node 2\");`\n\n**`      VMDNodeWidget`** `n3 = (VMDNodeWidget)scene.`**`addNode`**`(\"\
  Node 3\");`\n`      n3.`**`setNodeName`**`(\"Node 3\");`\n**`VMDPinWidget`** `p1\
  \ = (VMDPinWidget)scene.`**`addPin`**`(\"Node 1\",\"Pin 1\");`\n`      p1.`**`setPinName`**`(\"\
  Pin 1\");`\n**`VMDPinWidget`** `p2 = (VMDPinWidget)scene.`**`addPin`**`(\"Node 2\"\
  ,\"Pin 2\");`\n`      p2.`**`setPinName`**`(\"Pin 2\");`\n\n**`      VMDPinWidget`**\
  \ `p3 = (VMDPinWidget)scene.`**`addPin`**`(\"Node 2\",\"Pin 3\");`\n`      p3.`**`setPinName`**`(\"\
  Pin 3\");`\n**`VMDPinWidget`** `p4 = (VMDPinWidget)scene.`**`addPin`**`(\"Node 3\"\
  ,\"Pin 4\");`\n`      pin4.`**`setPinName`**`(\"Pin 4\");`\n`      scene.`**`addEdge`**`(\"\
  Edge 1\");`\n`      scene.`**`setEdgeSource`**`(\"Edge 1\", \"Pin 1\");`\n`      scene.`**`setEdgeTarget`**`(\"\
  Edge 1\", \"Pin 2\");`\n`      scene.`**`addEdge`**`(\"Edge 2\");`\n`      scene.`**`setEdgeSource`**`(\"\
  Edge 2\", \"Pin 3\");`\n`      scene.`**`setEdgeTarget`**`(\"Edge 2\", \"Pin 4\"\
  );`\n`   }`\n`}`\n\n`VMDGraphScene` 对节点、边和引脚的数据模型使用 `String` 类型。正如你从上一节已经知道的，元素通过\
  \ `addNode()`、`addPin()` 和 `addEdge()` 方法添加。在这个例子中，你只需给节点和引脚命名。使用 `setProperties()`\
  \ 方法和额外的 set 方法，你可以设置其他属性，例如节点或引脚的图标。\n\n![Image](img/1405.jpg)\n\n***图 14-5.**\
  \ VMD 图类提供了额外的功能，例如隐藏引脚或添加图标。*\n\n### 总结\n\nVisual Library 是一个用于创建面向图形的用户界面的强大框架。本章讨论了\
  \ Visual Library API 的基本结构。我们详细查看了所有小部件类。你学习了关于事件和操作以及作为根元素的 Scene 类的所有内容。本章另一个重要部分涵盖了模型-视图关系。最后，你了解了如何使用来自\
  \ Visual Mobile Designer 的预定义类。\n\n## 第 15 章\n\n## 技巧与窍门\n\n在本章中，你将学习一些关于 NetBeans\
  \ 平台用户界面的有用特性。本章涉及桌面集成、GUI 组件的异步初始化以及撤销和重做功能的实现。\n\n\n\n### 桌面功能\n\nJava 平台的 `Desktop`\
  \ 类允许执行标准应用程序，例如互联网浏览器或电子邮件客户端。将 `File` 或 `URI` 对象传递给 `Desktop` 类提供的方法。基于这些对象，可以启动关联的标准应用程序。例如，如果执行\
  \ `Desktop.open(new File(\"myfile.pdf\"))`，则会启动 Acrobat Reader（如果这是 `.pdf` 文件的标准应用程序）。表\
  \ 15-1 显示了 `Desktop` 类的所有方法。\n\n![图片](img/t1501.jpg)\n\n![图片](img/t1501a.jpg)\n\n\
  ### 系统托盘集成\n\nJava 平台增强了桌面集成功能，并提供了对底层操作系统系统托盘的访问。您可以添加一个或多个图标，这些图标可以配备上下文菜单以及双击操作。对于\
  \ NetBeans 平台应用程序，一种好的方法是使用模块安装器的 `restored()` 方法。首先，检查操作系统是否有系统托盘。如果有，则使用 `getSystemTray()`\
  \ 方法获取对其的访问权限。要添加上下文菜单，请创建一个 `PopupMenu`，其操作通过层文件中的扩展点定义（这样，您就可以从不同模块向托盘图标添加操作）。将此扩展点命名为\
