  \ `extends` **`Index.ArrayChildren`** `{`\n`   ...`\n`public void` **`load`**`(String\
  \ id) {`\n`      try {`\n`         String sql=\"`**`SELECT filename FROM playlist\
  \ WHERE id = ?`**`\";`\n`PreparedStatement stmt =` **`Database.getConnection()`**`.prepareStatement(sql);`\n\
  `         stmt.setString(1, id);`\n`         ResultSet rs = stmt.`**`executeQuery`**`();`\n\
  `         while (rs.next()) {`\n`            try {`\n`               add(Mp3DataObject.`**`find`**`(rs.getString(1)).`**`getNodeDelegate`**`());`\n\
  `            } catch(Exception e) {}`\n`         }`\n`         rs.close();`\n`         stmt.close();`\n\
  `      } catch(SQLException e) {`\n`         LOG.severe(e.toString());`\n`      }`\n\
  `   }`\n\n要存储播放列表，请使用 `update()` 方法。首先，删除此特定播放列表的所有条目，以避免出现孤立条目。然后使用 `getNodes()`\
  \ 方法获取此容器的所有节点，并为每个节点存储相关 MP3 文件的路径。（参见清单 44-24。）\n\n***清单 44-24.** update() 方法将容器的条目存储在数据库中。*\n\
  \n`public void` **`update`** `(String id) {`\n`      try {`\n`String sql =` **`\"\
  DELETE FROM playlist WHERE id = ?`**`\";`\n`PreparedStatement stmt =` **`Database.getConnection()`**`.prepareStatement(sql);`\n\
  `         stmt.setString(1, id);`\n`         stmt.execute();`\n`         stmt.close();`\n\
  `         sql=\"`**`INSERT INTO playlist (id, filename) VALUES (?, ?)`**`\";`\n\
  `stmt =` **`Database.getConnection()`**`.prepareStatement(sql);`\n`         for(Node\
  \ n : getNodes()) {`\n`            stmt.setString(1, id);`\n`            stmt.setString(2,\
  \ n.getLookup().`**`lookup`**`(Mp3DataObject.class).`\n`               getPrimaryFile().`**`getPath`**`());`\n\
  `            stmt.execute();`\n`         }`\n`         stmt.close();`\n`      }\
  \ catch(Exception e) {`\n`         LOG.severe(e.toString());`\n`      }`\n`   }`\n\
  `}`\n\n你可能会问是谁在调用这些方法。如果你打开 `Playlist` 类，就能找到答案，因为基类 `TopComponent` 定义了 `componentOpened()`\
  \ 方法，该方法在打开窗口时被调用。在这里，你首先确定顶层组件的唯一 ID，然后在后续步骤中使用此 ID 调用容器的 `load()` 方法。超类的 `writeExternal()`\
  \ 方法用于在应用程序关闭时存储数据。因此，你将重写此方法，并使用你存储为私有变量的 ID 来调用 `update()` 方法。（参见清单 44-25。）\n\n\
  ***清单 44-25.** Playlist 类负责加载和存储容器的内容。*\n\n\n\n`public class` **`PlaylistTopComponent`**\
  \ `extends` **`TopComponent`**\n`   implements ExplorerManager.Provider {`\n`private\
  \ String` **`id`** `=`**`\"\"`**`;`\n`   ...`\n`   @Override`\n`public void` **`componentOpened`**`()\
  \ {`\n`      id = WindowManager.getDefault().`**`findTopComponentID`**`(this);`\n\
  `      LOG.log(Level.INFO, \"Load playlist with ID: {0}\", id);`\n`      container.`**`load`**`(id);`\n\
  `   }`\n\n`void` **`writeProperties`**`(Properties p) {`\n`      p.setProperty(\"\
  version\", \"1.0\");`\n`      LOG.log(Level.INFO, \"Save playlist with ID: {0}\"\
  , id);`\n`      container.update(id);`\n`   }`\n`}`\n\n### 总结\n\n在本章中，我们创建了一个更大的示例，使您能够应用在前几章中学到的许多概念。首先，您定义了一个基于\
  \ NetBeans 模块的模块化应用程序结构。您创建了一个模块，使示例应用程序能够播放 MP3 文件。该模块包含 JMF 类以及 MP3 插件。\n\n为了在\
  \ NetBeans 平台中处理 MP3 文件，您创建了一个 MP3 文件类型，如第 7 章所述。接着，您在 NetBeans 平台应用程序中包含了一个 ID3\
  \ 库，实现了一个 MP3 播放器服务模块。在此模块中，您还为播放器实现了一个小型 GUI。\n\n接下来，您创建了播放列表功能。为此，您创建了自己的节点视图和节点容器。为了实现从媒体库窗口拖放的功能，您扩展了\
  \ `Node` 类。\n\n最后，本章演示了如何轻松地逐步构建一个模块化的 NetBeans 平台应用程序，并强调了此类应用程序的可扩展性。\n\n## 附录\n\
