  `port =` **`service.getOrderServicePort`**`();`\n`   }`\n\n`   private void addToCartActionPerformed(ActionEvent\
  \ evt) {`\n`      if (tableView.getSelectedRowCount() > 0) {`\n`         port.`**`addProductToCart`**`(tableModel.getRow(tableView.getSelectedRow()));`\n\
