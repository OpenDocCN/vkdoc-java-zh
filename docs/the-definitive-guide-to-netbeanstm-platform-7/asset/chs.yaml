  \ 实例上注册一个监听器。然后，触发更改的 `Binding` 将作为参数传递。（参见 清单 41-8。）\n\n***清单 41-8.** 注册绑定更改的监听器*\n\
  \n`private org.jdesktop.beansbinding.`**`BindingGroup`** `bindingGroup;`\n`...`\n\
  `bindingGroup.`**`addBindingListener`**`(new AbstractBindingListener() {`\n\n`   @Override`\n\
  `public void` **`targetChanged`**`(Binding b, PropertyStateEvent evt) {`\n`      binding.getName();`\n\
  `   }`\n\n`   @Override`\n`public void` **`sourceChanged`**`(Binding b, PropertyStateEvent\
  \ evt) {`\n`   }`\n`});`\n\n为了能够区分不同的绑定，您可以在绑定对话框（参见 图 41-11）的 *高级* 选项卡中为绑定指定一个名称。\n\
  \n\n\n#### 验证器\n\n验证器可用于检查用户输入的数据。例如，可以检查某个值的期望限制范围。你可以为之前创建的示例应用程序创建一个验证器类。然后，你可以将订单\
  \ ID 限制为 10 个字符。将类命名为`OrderIDValidator`，并使其继承自`Validator`类。使用`String`作为类型参数。接着，你需要实现`validate()`方法，以便之后检查值的期望范围。如果值无效，则创建一个`Result`实例，通过该实例可以传递错误消息。如果值有效，则直接返回`null`。（参见清单\
  \ 41-9。）\n\n***清单 41-9.** 确保有效值的验证器类实现*\n\n`import org.jdesktop.beansbinding.Validator;`\n\
  `import org.jdesktop.beansbinding.Validator.Result;`\n\n`public class` **`OrderIDValidator`**\
  \ `extends` **`Validator`**`<String> {`\n`   @Override`\n`public Result` **`validate`**`(String\
  \ value) {`\n`      if (value.length() > 10) {`\n`return new` **`Result`**`(null,\
  \ \"订单 ID 的最大长度为 10\");`\n`      }`\n`      return null;`\n`   }`\n`}`\n\n现在，将这些验证器类分配给绑定。为此，你首先需要编译该类。最简单的方法是在项目视图中，通过该类的上下文菜单中的*编译*选项进行编译。之后，在检查器窗口中（编辑器必须处于设计视图），打开*其他组件*节点的上下文菜单，并调用*从面板添加\
  \ ![Image](img/U001.jpg) Beans ![Image](img/U001.jpg) 选择 Bean*。在弹出的对话框中，输入完整的类名，包括代码名称基。在此示例中，使用`com.galileo.netbeans.module.OrderIDValidator`。这样，验证器就以所需的形式提供，你可以将其分配给绑定。为此，通过*绑定\
  \ ![Image](img/U001.jpg) 文本*打开相应文本字段的绑定对话框。切换到*高级*选项卡。在那里，你可以选择添加的实例（`orderIDValidator1`）。\n\
  \n然而，我们尚未考虑如果输入的值无效会发生什么。Beans Binding 框架会确保无效值不被应用。但是，通常你希望向用户反馈此信息。你已经在验证器类中生成了相应的消息。为了忽略无效输入并返回消息，你需要注册一个`BindingListener`并实现`syncFailed()`方法（参见*绑定监听器*一节）。检查是否遇到了验证器错误，并返回相应的消息。（参见清单\
  \ 41-10。）\n\n***清单 41-10.** 对无效值变更的响应*\n\n`bindingGroup.addBindingListener(new AbstractBindingListener()\
  \ {`\n`   @Override    public void syncFailed(Binding binding, SyncFailure fail)\
  \ {`\n`      if ((fail != null) && (fail.getType() == Binding.SyncFailureType.VALIDATION_FAILED))\
  \ {`\n`         statusLabel.setText(fail.getValidationResult().getDescription());`\n\
  `      }`\n`   }`\n`});`\n\n#### 转换器\n\n可以使用转换器类在数据类型之间进行转换。例如，可以在 GUI 中将值显示为文本，而在数据库中将其保存为数字。这种转换是双向的。转换器类继承自`Converter`类，并通过类型参数决定数据的源类型和目标类型。在清单\
  \ 41-11 中，你希望在数字和字符串之间进行转换。\n\n***清单 41-11.** 用于更改不同数据类型的转换器类*\n\n`import org.jdesktop.beansbinding.Converter;`\n\
  \n`public class` **`ProductCategoryConverter`** `extends` **`Converter`**`<Integer,\
  \ String> {`\n\n`   @Override`\n`public String` **`convertForward`**`(Integer arg)\
  \ {`\n`      String value = null;`\n`      switch (arg) {`\n`         case 1:`\n\
  `            value = \"类别 1\";`\n`            break;`\n`         case 2:`\n`            value\
  \ = \"类别 2\";`\n`            break;`\n`      }`\n`      return value;`\n`   }`\n\
  \n`   @Override`\n`public Integer` **`convertReverse`**`(String arg) {`\n`      int\
  \ value = 0;`\n`      if (\"类别 1\".equals(arg)) {`\n`         value = 1;`\n`      }\
  \ else if (\"类别 2\".equals(arg)) {`\n`         value = 2;`\n`      }`\n`      return\
  \ value;`\n`   }`\n`}`\n\n将转换器添加到绑定的方式与验证器相同（参见*验证器*一节）。\n\n### 总结\n\nNetBeans IDE\
  \ 通过 Swing GUI 构建器为用户提供了一个实现用户界面的强大工具。在开发 NetBeans 平台应用程序时，你也可以利用 Swing GUI 构建器。在本章中，你学习了\
  \ GUI 构建器的基本功能、其组件以及布局管理器。此外，你还使用了 Beans Binding 框架，并了解了 GUI 构建器提供的支持。\n\n## 第 42\
  \ 章\n\n## 测试 NetBeans 平台应用程序\n\n对于使用 NetBeans 平台应用程序实现和运行测试，可以识别出两种不同类型的测试：单元测试和功能测试。本章将讨论这两种测试以及\
  \ NetBeans 为它们提供的支持。\n\n### 单元测试\n\nNetBeans 平台应用程序的*单元测试*是基于流行的测试框架 *JUnit* 实现的。NetBeans\
  \ 通过库 *NB JUnit* 提供了 JUnit 的扩展。该库提供了许多辅助类，使得在 NetBeans 平台内测试类和方法变得更加容易。\n\n**注意**\
  \ JUnit 不再是 NetBeans IDE 的一部分。现在，在安装时，系统会询问你是否要安装 JUnit。以下描述假定你已同意安装。JUnit 模块在首次启动\
  \ IDE 时安装。注意：此安装需要写入权限，而 Windows 7 的标准程序目录通常不具备此权限。对于 Cobertura 模块也是如此，你将在*检查测试覆盖率*一节中使用它。你可以通过将\
  \ IDE 安装到另一个（具有写入权限的）目录来解决此问题。\n\n首先，我将通过一个简单的类描述创建和运行测试的一般过程。后续章节将介绍如何成功测试 NetBeans\
  \ 平台应用程序的特殊资源，例如来自 Lookup 的服务或来自系统文件系统的文件。\n\n\n\n#### 通用测试\n\n假设 清单 42-1 中所示的 `Math`\
  \ 类是第一个简单的 JUnit 测试类。您希望通过单元测试来检查其方法的正确性。您可以在 NetBeans Platform 应用程序的模块中创建此测试。\n\
  \n***清单 42-1.** 待通过单元测试检查的简单类及其方法*\n\n`public class` **`Math`** `{`\n`public int`\
  \ **`add`**`(int a, int b) {`\n`      return a + b;`\n`   }`\n`public int` **`subtract`**`(int\
  \ a, int b) {`\n`      return a - b;`\n`   }`\n`}`\n\nNetBeans IDE 提供了多种向导来创建单元测试的基本结构。除了创建空的测试类之外，您还可以为指定的类创建测试，从而可以为所有方法创建测试。这节省了大量时间和工作。您以相同的方式为要检查的\
  \ `Math` 类创建一个测试类。依次选择 *文件 ![Image](img/U001.jpg) 新建文件 ![Image](img/U001.jpg) JUnit\
  \ ![Image](img/U001.jpg) 现有类的测试*。通过 *浏览* 选择所需的类。（参见 图 42-1。）\n\n![Image](img/4201.jpg)\n\
  \n***图 42-1.** 自动为现有类创建测试用例*\n\n如 图 42-1 所示，您可以选择要为其创建测试的方法。这里有 *公共*、*受保护* 和 *包私有*\
  \ 方法之分。您还可以决定是否创建 *测试初始化器* 和/或 *终结器* 方法。通过 *默认方法体* 选项，测试将根据方法的签名自动实现。根据被测试方法的复杂程度，您几乎不需要调整这些实现。因此，此选项可以节省大量工作。之后，点击\
  \ *完成* 创建测试类 `MathTest`，该类将创建在一个新的目录 *test/unit/src* 中。此外，在应用程序的 *单元测试库* 下会添加对 JUnit\
  \ 库的依赖。这样您就得到了如 图 42-2 所示的项目结构。\n\n![Image](img/4202.jpg)\n\n***图 42-2.** 项目结构，包含用于测试用例的独立文件夹以及必要的库*\n\
  \n**![Image](img/square.jpg) 注意** 如果在创建测试类后，您想通过 NetBeans 向导向您的类添加其他方法，您可以自动为这些方法创建测试。为此，只需再次执行相关类的向导即可。然后，现有的测试类将扩展包含新方法的测试用例。\n\
  \n现在让我们看一下已创建的测试类 `MathTest`。您会看到，在这个简单示例的开头，不需要 *NB JUnit* 模块的支持；仅使用了 JUnit 类。此外，您会注意到，自\
