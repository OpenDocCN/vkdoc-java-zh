  `ActionFactory.`**`createCycleObjectSceneFocusAction`**`();`\n\n**EditAction/InplaceEditorAction**\n\
  \n若要通过双击编辑某个 widget，请为其添加一个 `EditAction`。你可以通过 `EditProvider` 来实现双击所触发的行为。此外，你还可以提供一个双击时显示的就地编辑器。为此，请使用\
  \ `InplaceEditorAction`，该编辑器可以是任何 `JComponent` 子类。例如，对于 `IconNodeWidget` 或 `LabelWidget`，通常使用\
  \ `JTextField`。\n\n`ActionFactory.`**`createEditAction`**`(`\n**`EditProvider`**`           provider);`\n\
  `ActionFactory.`**`createInplaceEditorAction`**`(`\n**`   InplaceEditorProvider`**`  provider);`\n\
