  \ 对象形式呈现的已找到产品列表。由于一个 ASIN 只对应一个产品，您可以直接从列表中取出第一个项目。一个项目包含一个 `ImageSet`，您从中提取并返回预览图。\n\
  \n现在整个查询已完成，`SwingWorker` 类调用 `done()` 方法。在此方法中，您可以通过 `get()` 方法获取 URL。最后，您可以直接从中创建一个\
  \ `ImageIcon` 对象，以便后续显示（参见图 30-3）。\n\n### 总结\n\n本章讨论了 Web 服务这一主题。您从相应的 WSDL 文件为\
  \ AWS 创建了一个 Web 服务 API（一个 Web 服务客户端）。为此，您使用了 NetBeans IDE 的相关工具支持。接下来，您学习了如何将 Web\
  \ 服务客户端集成到您自己的 NetBeans Platform 应用程序中。总而言之，这个示例展示了在您自己的应用程序中使用 Web 服务是多么容易。\n\n\
  ## 第 31 章\n\n## Java 企业版与 NetBeans 平台\n\nJava 企业版 (Java EE) 为开发由模块化组件构成的分布式多层业务应用程序提供了基础。特别是在业务应用程序中，NetBeans\
  \ Platform 常与大量数据结合使用，这些数据通常需要以复杂的方式进行编辑。如何有效地融合这两个世界——Java 企业版和 NetBeans 平台——自然成为了一个问题。\n\
  \n在 Java EE 中，默认会提供一个应用程序客户端，用于 Java EE 应用程序的客户端使用。该应用程序客户端在应用程序客户端容器 (ACC) 中执行。不幸的是，这样的容器并不适合集成到\
  \ NetBeans Platform 应用程序中。另一种可能性是放弃 ACC 的优势，直接访问 Java EE 应用程序——具体来说，就是企业 Java Bean\
  \ (EJB)。但是，ACC 会在运行时自动创建包装类。这些包装类，加上特殊的类加载策略，禁止了与 NetBeans Platform 的集成；数量难以管理的库是另一个问题。这个问题的根源在于组件之间通过\
  \ RMI-IIOP（基于互联网 Inter-Orb 协议的 Java 远程方法调用）等方式进行的通信。\n\n现在，一个 Java EE 应用程序除了企业 Java\
  \ Bean 之外，还可以包含 Web 服务。这些 Web 服务甚至被视为 EJB。通信通过简单的 SOAP 协议在 HTTP 协议之上进行（参见图 31-1）。您已经在第\
  \ 30 章中了解到，从 NetBeans Platform 应用程序中调用 Web 服务是多么容易。原因在于该协议所需的实现工作量很小；由此可知，只需要少量的库。此外，仅有的两个必要\
  \ API——JAX-WS 和 JAXB——自 Java 6 起就已经是 Java 平台的一部分。不需要外部库。\n\n从这个角度来看，我建议您将 Web 服务用作企业\
  \ Java Bean 的一种外观或中间件。这样，就可以轻松地从 NetBeans Platform 应用程序中调用 EJB。已有的 EJB 结构可以保持不变，因为\
  \ Web 服务层可以说是仅置于其前端。此外，这样的外观有助于不同 Bean 的聚合和编排。\n\n![图片](img/3101.jpg)\n\n***图 31-1.**\
  \ 以 Web 服务作为与 EJB 通信接口的 Java EE 应用程序架构*\n\n以下各节将通过一个简单的示例来说明这种架构的实现。在该示例中，NetBeans\
  \ Platform 的用户应该能够从服务器查询产品，并将多个产品放入一个由服务器端管理的购物车中。\n\n\n\n### 持久化实体\n\n第一步是实现一个代表产品的持久化实体类。由于你将此类实现为持久化实体，因此能够通过实体管理器直接管理数据库中的产品；实例可以轻松地存入或从数据库中移除。你必须在\
  \ EJB 模块中实现持久化实体，以及后续的 EJB 和 Web 服务接口。为简单起见，本示例仅使用一个模块。在 NetBeans IDE 中，通过 *文件 ![Image](img/U001.jpg)\
  \ 新建项目… ![Image](img/U001.jpg) Java EE ![Image](img/U001.jpg) EJB 模块* 创建此项目，并将其命名为\
  \ *OrderSystem*。请使用 *GlassFish Server 3.1* 和 *Java EE 6*。\n\n在开始实现之前，建议先创建一个数据库；然后可以为其创建一个持久化单元。最简单的情况下，使用集成的\
  \ Java DB 作为数据库。在 *服务* 窗口的 *数据库* 下可以找到此数据库。在上下文菜单中点击 *创建数据库…*，即可创建一个新数据库。将其命名为 *ProductDatabase*。（参见图\
  \ 31-2。）\n\n接下来，你可以通过 *文件 ![Image](img/U001.jpg) 新建文件… ![Image](img/U001.jpg) 持久化\
  \ ![Image](img/U001.jpg) 实体类* 向 EJB 模块项目添加一个新的持久化实体类。将其命名为 *Product*，并添加到包 `com.galileo.netbeans.entities`\
  \ 中。主键使用数据类型 `Long`。如果尚未创建持久化单元，可以在最后创建一个。将持久化单元命名为 *OrderSystemPU*。使用预设的 JPA 2.0\
  \ 的 *EclipseLink* 实现作为持久化提供程序。通过 *数据源* 为刚创建的数据库定义 JNDI 名称 `jdbc/ProductDatabase`。在\
  \ *表生成策略* 中选择 *创建*。如果持久化实体所需的表尚不存在，则会自动创建。\n\n![Image](img/3102.jpg)\n\n***图 31-2.**\
  \ 选择持久化提供程序和数据库*\n\n创建实体类后，可以添加所需的属性。如果在编辑器的上下文菜单中选择 *插入代码…* 或使用组合键 *Alt+Insert*，在\
  \ NetBeans IDE 中操作非常方便。在打开的上下文菜单中，可以选择 *添加属性* 选项。通过这种方式，会自动为相应的特性创建 getter 和 setter\
  \ 方法。将清单 31-1 中概述的特性添加到 `Product` 类中。\n\n***清单 31-1.** 用于产品管理的持久化实体*\n\n`import\
  \ javax.persistence.Entity;`\n`import javax.persistence.GeneratedValue;`\n`import\
  \ javax.persistence.GenerationType;`\n`import javax.persistence.Id;`\n\n**`@Entity`**\n\
  `public class` **`Product`** `implements Serializable {`\n`   @Id`\n`   @GeneratedValue(strategy\
  \ = GenerationType.AUTO)`\n`private Long` **`id`**`;`\n`protected String` **`orderId`**`;`\n\
  `protected String` **`name`**`;`\n`protected Double` **`price`**`;`\n\n`   public\
  \ Long getId() {`\n`      return id;`\n`   }`\n\n`   public void setId(Long id)\
  \ {`\n`      this.id = id;`\n`   }`\n`   …`\n`}`\n\n### 企业 Java Bean\n\n为了管理可用产品和购物车中的产品，分别实现一个\
  \ EJB。你可以通过点击 *文件 ![Image](img/U001.jpg) 新建文件… ![Image](img/U001.jpg) Enterprise\
  \ JavaBeans ![Image](img/U001.jpg) 会话 Bean* 向已创建的项目添加一个 Bean 类。将用于产品管理的 EJB 类命名为\
  \ *ProductBean*，并添加到包 `com.galileo.netbeans.beans` 中。会话类型应为 *无状态*。（参见图 31-3。）你必须在本地使用此类（Web\
  \ 服务将位于同一模块中，因此可以本地访问）；自 EJB 3.1 起，不再需要指定接口。\n\n![Image](img/3103.jpg)\n\n***图 31-3.**\
  \ 创建 ProductBean 类以管理产品*\n\n现在，为 Bean 类 `ProductBean` 配备两个方法：一个用于添加产品，另一个用于获取所有已保存产品的完整列表。你可以通过\
  \ Java 持久化 API (JPA) 的实体管理器访问数据库中的产品。为此，可以再次使用 NetBeans IDE 的代码向导。在你的类中按下 *Alt+Insert*，并在上下文菜单中选择\
  \ *使用实体管理器…* 选项。实体管理器将作为私有数据元素创建。使用注解 `@PersistenceContext` 注解实体管理器，并为其定义持久化单元的名称（根据\
  \ *persistence.xml* 文件中的配置）。实体管理器的实例由 EJB 容器在运行时注入。（参见清单 31-2。）\n\n***清单 31-2.**\
  \ 用于管理产品的无状态会话 Bean*\n\n`@Stateless`\n`@LocalBean`\n`public class` **`ProductBean`**\
  \ `{`\n\n`   @`**`PersistenceContext`**`(unitName = \"OrderSystemPU\")`\n`private`\
  \ **`EntityManager`** `em;`\n\n`public void` **`addProduct`**`(Product product)\
  \ {`\n`      em.persist(product);`\n`   }`\n`public List<Product>` **`getProducts`**`()\
  \ {`\n`      return em.createQuery(`\n`         em.getCriteriaBuilder().createQuery(Product.class)).getResultList();`\n\
  `   }`\n`}`\n\n接下来，你需要一个用于实现购物车的 Bean 类。为此，再次选择 *文件 ![Image](img/U001.jpg) 新建文件…\
  \ ![Image](img/U001.jpg) Enterprise JavaBeans ![Image](img/U001.jpg) 会话 Bean*，并使用向导创建一个名为\
  \ `CartBean` 的 EJB。将该 EJB 添加到包 `com.galileo.netbeans.beans` 中。会话类型应为 *有状态*，并且在这种情况下同样不需要接口，因为它只能由\
  \ Web 服务本地访问。（参见清单 31-3。）\n\n***清单 31-3.** 用于管理购物车的 CartBean 类*\n\n`import com.galileo.netbeans.entities.Product;`\n\
  `import java.util.ArrayList;`\n`import java.util.List;`\n`import javax.ejb.LocalBean;`\n\
  `import javax.ejb.Stateful;`\n\n`@`**`Stateful`**\n`@`**`LocalBean`**\n`public class`\
  \ **`CartBean`** `{`\n`   private List<Product> products = new ArrayList<Product>();`\n\
  \n`public void` **`addProduct`**`(Product product) {`\n`      products.add(product);`\n\
  `   }`\n\n`public List<Product>` **`getProducts`**`() {`\n`      return products;`\n\
  `   }`\n\n`public Double` **`getSum`**`() {`\n`      Double sum = 0.0;`\n`      for\
  \ (Product p : products) {`\n`         sum += p.getPrice();`\n`      }`\n`      return\
  \ sum;`\n`   }`\n\n`public Integer` **`getAmount`**`() {`\n`      return products.size();`\n\
  `   }`\n`}`\n\n现在，你已经实现了两个简单的会话 Bean 和一个持久化实体。当然，应用程序可以通过更多 Java EE 特性进行扩展，但本章主要介绍如何通过\
  \ Web 服务接口调用 EJB。\n\n\n\n### Web 服务\n\n本节将介绍如何创建一个 Web 服务接口，该接口在一定程度上充当通信层来调用 EJB。创建\
  \ Web 服务有两种方式。它可以实现在 EJB 模块中，从而作为一个会话 Bean；或者，如果实现在 Web 应用程序中，你可以将 Web 服务实现为带有 Web\
  \ 服务接口的会话 Bean，或者实现为一个普通的 Web 服务。\n\n在本示例中，Web 服务将被集成到已有的 EJB 模块中。当然，你也可以为此目的创建一个新的\
  \ EJB 模块。不过，在这种情况下，需要为 `ProductBean` 和 `CartBean` 都创建一个本地接口。这样，Web 服务才能引用这些 EJB。通过\
  \ *文件 ![Image](img/U001.jpg) 新建文件… ![Image](img/U001.jpg) Web 服务 ![Image](img/U001.jpg)\
  \ Web 服务* 向 EJB 模块添加一个 Web 服务。将其命名为 *OrderService*，并添加到包 `com.galileo.netbeans.service`\
  \ 中。如你所见，在此类容器中，Web 服务必须创建为一个无状态会话 Bean，这只是在实现中添加一个额外的注解。（参见图 31-4。）\n\n![Image](img/3104.jpg)\n\
  \n***图 31-4.** 将 Web 服务类创建为无状态会话 Bean*\n\n现在，将两个 Bean 的引用添加到 Web 服务的基本结构中。由于*依赖注入*，这非常简单，但你也可以利用代码向导的优势。因此，按下\
  \ *Alt+Insert* 并选择 *调用企业 Bean*。然后在选择对话框中选择所需的 EJB。通过这种方式，你可以创建对 `ProductBean` 和\
  \ `CartBean` 对象的引用，如清单 31-4 所示。同样简单的方式是，使用代码向导（通过 *添加 Web 服务操作…*）添加所需的 Web 服务方法，这些方法最终将在你的\
  \ NetBeans Platform 应用程序中可用。（参见图 31-5。）\n\n![Image](img/3105.jpg)\n\n***图 31-5.**\
  \ 使用代码向导添加 Web 服务方法*\n\n向 Web 服务添加注解 `@WebService` 并为其命名。两个 EJB 引用将在运行时由 EJB 容器自动初始化。\n\
  \n***清单 31-4.** 将 Web 服务实现为 EJB 的门面*\n\n`import com.galileo.netbeans.beans.CartBean;`\n\
  `import com.galileo.netbeans.beans.ProductBean;`\n`import com.galileo.netbeans.entities.Product;`\n\
  `import java.util.List;`\n`import javax.ejb.EJB;`\n`import javax.jws.Oneway;`\n\
  `import javax.jws.WebService;`\n`import javax.jws.WebMethod;`\n`import javax.jws.WebParam;`\n\
  `import javax.ejb.Stateless;`\n\n`@`**`WebService`**`(serviceName = \"`**`OrderService`**`\"\
  ) @Stateless`\n`public class` **`OrderService`** `{`\n`   @`**`EJB`**\n`private`\
  \ **`ProductBean`** `productBean;`\n`   @`**`EJB`**\n`private` **`CartBean`** `cartBean;`\n\
  \n`   @WebMethod(operationName = \"addProductToCart\")`\n`   @Oneway`\n`public void`\
  \ **`addProductToCart`**`(`\n`      @WebParam(name = \"product\") Product product)\
  \ {`\n`      cartBean.addProduct(product);`\n`   }`\n\n`   @WebMethod(operationName\
  \ = \"getSumOfCart\")`\n`public Double` **`getSumOfCart`**`() {`\n`      return\
  \ cartBean.getSum();`\n`   }`\n\n`   @WebMethod(operationName = \"getAmountOfCart\"\
  )`\n`public Integer` **`getAmountOfCart`**`() {`\n`      return cartBean.getAmount();`\n\
  `   }`\n\n`   @WebMethod(operationName = \"getProducts\")`\n`public List<Product>`\
  \ **`getProducts`**`() {`\n`      return productBean.getProducts();`\n`   }`\n\n\
  `   @WebMethod(operationName = \"addProduct\")`\n`   @Oneway`\n`public void` **`addProduct`**`(`\n\
  `      @WebParam(name = \"product\") Product product) {`\n`      productBean.addProduct(product);`\n\
  `   }`\n`}`\n\n现在，你已经为两个企业 Bean 配备了 Web 服务接口。Web 服务由 WSDL 文件描述，并且基于 WSDL 文件创建 Web\
  \ 服务客户端。不过，你无需创建 WSDL 文件，因为 GlassFish 服务器会按需生成它。因此，你只需将包含 Web 服务的 EJB 模块部署到服务器上。在相关项目的上下文菜单中选择\
  \ *部署*。确保数据库服务器与 GlassFish 服务器一起启动，以便 Web 服务调用能够成功执行。\n\n### Web 服务客户端\n\n如果你想在\
  \ NetBeans Platform 应用程序中使用 Web 服务客户端，而不是 Java EE 应用程序客户端，则无法直接在其中创建它。这需要一个普通的 Java\
  \ 项目。最简单的情况下，只需通过 *文件 ![Image](img/U001.jpg) 新建项目… ![Image](img/U001.jpg) Java ![Image](img/U001.jpg)\
  \ Java 类库* 创建一个 Java 类库项目。然后通过 *文件 ![Image](img/U001.jpg) 新建文件… ![Image](img/U001.jpg)\
  \ Web 服务 ![Image](img/U001.jpg) Web 服务客户端* 向其添加一个 Web 服务客户端，如图 31-6 所示。\n\n![Image](img/3106.jpg)\n\
  \n***图 31-6.** 创建 Web 服务客户端*\n\n将 WSDL 文件的 URL 传递给向导（参见图 31-6）。你可以通过在 Web 服务项目菜单中简单地选择\
  \ *浏览…* 来完成此操作。指定一个包名并完成向导，这样 Web 服务客户端类就会根据 WSDL 文件中的信息自动创建。使用 *构建* 从此客户端创建一个 JAR\
  \ 文件。在下一节中，你将看到该 JAR 文件将被集成到 NetBeans Platform 应用程序中。\n\n\n\n### NetBeans 平台应用程序\n\
  \n假设您已创建了一个 NetBeans 平台应用程序，请添加一个库包装器模块，并将已创建的包含 Web 服务客户端的 JAR 文件添加到该模块中。此外，创建一个应用程序模块，该模块依赖于集成的\
  \ Web 服务客户端模块。首先，向应用程序模块添加一个操作，该操作用于将产品作为测试数据添加到数据库中（请参见清单 31-5）。\n\n***清单 31-5.**\
  \ 添加测试产品*\n\n`import com.galileo.netbeans.client.OrderService;`\n`import com.galileo.netbeans.client.OrderService_Service;`\n\
  `import com.galileo.netbeans.client.Product;`\n`…`\n`public final class CreateProducts\
  \ implements ActionListener {`\n`   @Override`\n`   public void actionPerformed(ActionEvent\
  \ e) {`\n`OrderService_Service service =` **`new OrderService_Service`**`();`\n\
  **`OrderService`** `port = service.` **`getOrderServicePort`**`();`\n`      Product\
