  `}`\n\n### ObjectScene – 模型-视图关系\n\nVisual Library API 仅提供视图的组成组件。这意味着小部件仅包含关于呈现方式或数据流的信息。小部件所不具备的是数据模型。这就是\
  \ `ObjectScene` 类发挥作用的地方，它代表了 `Scene` 类的扩展。此类的功能（或扩展）是管理视图（即小部件）与关联数据模型（可以是任何对象）之间的映射。`ObjectScene`\
  \ 类提供了允许分配数据模型或多个小部件的方法。此外，还可以确定注册到小部件的数据模型，反之亦然。除了表示数据模型和小部件之外，`ObjectScene` 类还提供关于小部件或数据模型当前状态（由\
  \ `ObjectState` 类表示）的信息。\n\n数据模型在内部存储在一个 `Map` 中。为了识别和比较，使用了数据模型的 `equals()` 方法。请确保您的数据模型包含此方法的有用实现，并另外注意每个唯一的数据模型只能添加一次（因为唯一标识）。因此，如果数据模型\
  \ `d1` 已存在于 `ObjectScene` 中，并且您添加了第二个数据模型 `d2`，且满足 `d1.equals(d2) == true`，则会引发异常。\n\
  \n表 14-2 总结了 `ObjectScene` 类最重要的方法及其功能。\n\n![图片](img/t1402.jpg)\n\n### 图形\n\n为了简化图形的创建——即创建节点和关联的边——基于\
  \ `ObjectScene` 类（在上一节中介绍）的 API 提供了 `GraphScene` 和 `GraphPinScene` 类。清单 14-3 再次说明了\
  \ `ObjectScene` 类对这些类的实际意义。\n\n`GraphScene` 和 `GraphPinScene` 都是抽象类，其唯一任务是管理数据模型和小部件。小部件的创建由子类完成，这些子类根据数据模型创建小部件。这是通过抽象\
  \ attach 方法实现的，子类必须重写这些方法。数据模型的类型由模板定义，并且可以在节点、边和引脚的情况下各不相同。在最简单的情况下，如本例所示，您使用 `String`\
  \ 类型。对于节点和边，您必须为每个提供一个单独的 `LayerWidget`，并将它们添加到场景中。\n\n***清单 14-3.** GraphPinScene\
  \ 类的实现*\n\n`public class` **`MyGraphPinScene`** `extends` **`GraphPinScene<String,\
  \ String, String>`** `{`\n`private` **`LayerWidget`** `mainLayer;`\n`private` **`LayerWidget`**\
  \ `connectionLayer;`\n\n`public` **`MyGraphPinScene`**`() {`\n`      mainLayer =\
  \ new LayerWidget(this);`\n`      addChild(mainLayer);`\n`      connectionLayer\
  \ = new LayerWidget(this);`\n`      addChild(connectionLayer);`\n`   }`\n\n`attachNodeWidget()`\
  \ 方法负责创建节点。为此，本例使用了 `IconNodeWidget` 类。（也可以使用 `ImageWidget` 类。）实际上，您也可以使用 `IconNodeWidget`\
  \ 类来管理附带的引脚。这是通过使用 `LabelWidget` 来完成的，可以通过 `getLabelWidget()` 方法访问它。为此小部件定义了一个 `FlowLayout`，以便可以正确排列和呈现引脚。要移动节点，请添加一个\
  \ `MoveAction` 实例。最后，将节点添加到 `mainLayer` 并返回它。\n\n`protected Widget` **`attachNodeWidget`**`(String\
  \ node) {`\n**`IconNodeWidget`** `widget = new IconNodeWidget(this);`\n`      widget.`**`setImage`**`(ImageUtilities.loadImage(\"\
  com/galileo/netbeans/module/node.gif\"));`\n`      widget.getLabelWidget().`**`setLayout`**`(`\n\
  `         LayoutFactory.createHorizontalFlowLayout(LayoutFactory.SerialAlignment.JUSTIFY,\
  \ 5));`\n`      widget.getActions().`**`addAction`**`(ActionFactory.`**`createMoveAction`**`());`\n\
  `      mainLayer.`**`addChild`**`(widget);`\n`      return(widget);`\n`   }`\n\n\
  `attachEdgeWidget()` 方法负责创建边。为此，您希望使用 `ConnectionWidget` 类。使用路由器，这样您就不会只在节点之间以直线绘制边（最终与其他节点或边相交）。您可以将一系列\
  \ `LayerWidget` 传递给路由器。这样做，`LayerWidget` 的小部件不会被交叉。因此，路由器会为边确定一条路径，以便不会发生交叉。您可以使用\
  \ `RouterFactory` 创建这样的路由器。然后，我们将配置好的边添加到 `ConnectionLayer` 并返回它们。\n\n`protected\
  \ Widget` **`attachEdgeWidget`**`(String edge) {`\n**`ConnectionWidget`** `widget\
  \ = new ConnectionWidget(this);`\n`      widget.setTargetAnchorShape(AnchorShape.TRIANGLE_FILLED);`\n\
  `      widget.`**`setRouter`**`(RouterFactory.createOrthogonalSearchRouter(mainLayer,connectionLayer));`\n\
  `      connectionLayer.`**`addChild`**`(widget);`\n`      return widget;`\n`   }`\n\
  \n引脚使用 `attachPinWidget()` 方法创建。引脚是节点的输入或输出，可以连接到边（图 14-4 中的红点代表引脚）。因此，引脚被分配给一个节点；该节点可能拥有多个引脚。您会收到引脚的数据模型以及引脚将添加到的节点的数据模型。通过\
  \ `findWidget()` 方法，您可以确定节点的小部件。之后，您可以将创建的引脚添加到此小部件中。\n\n\n\n`protected Widget`\
  \ **`attachPinWidget`**`(String node, String pin) {`\n**`ImageWidget`** `widget\
  \ = new ImageWidget(this,`\n`         ImageUtilities.loadImage(\"com/galileo/netbeans/module/pin.gif\"\
  ));`\n`IconNodeWidget n = (IconNodeWidget)` **`findWidget`**`(node);`\n`      n.getLabelWidget().`**`addChild`**`(widget);`\n\
  `      return widget;`\n`   }`\n\n最后，你必须重写 `attachEdgeSourceAnchor()` 和 `attachEdgeTargetAnchor()`\
  \ 方法。通过这些方法，可以指定边的起点和终点。在这方面，你首先通过 `findWidget()` 方法确定边要连接的引脚。然后，通过 `AnchorFactory`\
  \ 为该引脚创建一个锚点。之后，将该引脚添加到你已经通过 `findWidget()` 追踪到的边上。\n\n`protected void` **`attachEdgeSourceAnchor`**`(String\
  \ edge, String oldPin, String pin) {`\n`ConnectionWidget c = (ConnectionWidget)`\
  \ **`findWidget`**`(edge);`\n`Widget widget =` **`findWidget`**`(pin);`\n`      Anchor\
  \ a = AnchorFactory.createRectangularAnchor(widget);`\n`      c.`**`setSourceAnchor`**`(a);`\n\
  `   }`\n\n`protected void` **`attachEdgeTargetAnchor`**`(String edge, String oldPin,\
  \ String pin) {`\n`ConnectionWidget c = (ConnectionWidget)` **`findWidget`**`(edge);`\n\
  `Widget widget =` **`findWidget`**`(pin);`\n`      Anchor a = AnchorFactory.createRectangularAnchor(widget);`\n\
  `      c.`**`setTargetAnchor`**`(a);`\n`   }`\n`}`\n\n类似地，你也可以为没有引脚的 `GraphScene`\
  \ 类创建一个实现。在那里，边直接连接到节点，而不是引脚。刚刚创建的实现的优势现在在使用时变得显而易见（参见清单 14-4）。与普通场景一样，你创建一个实例并将其视图添加到\
  \ `JScrollPane` 中。现在，你不需要创建单独的小部件。你只需将数据模型（本例中是一个字符串）提供给 `addNode()`、`addPin()`\
  \ 或 `addEdge()` 方法。然后，这些方法会在内部调用你为实现创建小部件而实现的 attach 方法——此外，它们还会在传递的数据模型上创建小部件的映射。\n\
  \n***清单 14-4.** 使用 GraphPinScene*\n\n`import org.netbeans.api.visual.graph.layout.GridGraphLayout;`\n\
