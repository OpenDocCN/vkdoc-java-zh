  P1\");`\n`      p1.setPrice(2.99);`\n`      Product p2 = new Product();`\n`      p2.setName(\"\
  Product 2\");`\n`      p2.setOrderId(\"P2\");`\n`      p2.setPrice(3.99);`\n`      …`\n\
  `      port`**`.addProduct`**`(p1);`\n`      port.`**`addProduct`**`(p2);`\n`    }`\n\
