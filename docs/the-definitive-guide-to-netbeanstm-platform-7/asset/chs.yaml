  \ IDE 的多个不同领域。在为 Sun 和 Oracle 工作之前，他曾在各种工程岗位上工作了十年。他对自己的工作以及生活中的一切充满热情。他出生于捷克斯洛伐克，目前居住在新西兰，并居家办公。\n\
  \n## 引言\n\n当您手持这本著作时，您便拥有了关于基于 Swing 的富客户端平台——*NetBeans Platform 7*——最新、最全面的指南。这个主题丰富的富客户端平台极具现实意义。除了\
  \ NetBeans 平台，Eclipse RCP 也是该类平台的主要代表。这两个平台的发展主要得益于 NetBeans 和 Eclipse 集成开发环境（IDE）的推动。这两款\
  \ IDE 均基于各自的平台构建，并且它们本身也是富客户端应用程序。NetBeans 平台完全基于包含 AWT 和 Swing 的 Java API，并整合了\
  \ Java 标准版（JSE）的概念；而 Eclipse RCP 则使用 SWT 和 JFace，越来越多地依赖于自身的方法和概念。\n\n富客户端平台非常灵活，主要用于满足应用程序及其架构不断增长的需求。一个关键方面在于，它们能提高生产力和灵活性，以便根据产品的预期用途进行配置，并使其适应市场需求。这对于专业应用程序尤其重要。\n\
  \n在我看来，即使应用程序非常小或非常大，NetBeans 平台也始终值得使用，这得益于 NetBeans IDE 提供的全面支持。仅凭其执行环境就已值得采用，更不用说其众多\
  \ API 为客户端应用程序开发中常见的问题和挑战提供了实用的解决方案。这些解决方案非常贴近实践和应用，极大地提高了生产力。\n\n然而，这一假设基于一个基本条件：对富客户端平台工作原理的专业知识和运用。应用程序开发者至少应了解其主要原则；只有这样，才能在实践真正实现提高生产力和提升软件质量的优势。\n\
  \n许多开发者曾认为该平台过于复杂，这也是富客户端平台尚未成为客户端应用程序开发准标准的主要原因之一。起初，开发者可能会觉得需要掌握大量的 API 和概念。然而，一旦开始深入学习，就会发现其中蕴含着巨大的协同效应和简化可能性，足以弥补初始学习阶段的挑战。\n\
  \nNetBeans IDE 通过提供全面、有用且直观的向导，简化了日常使用并降低了开发者的学习曲线。同样重要的是，所有 NetBeans API 和概念都建立在\
  \ Java 标准版（JSE）的 API 和概念之上。这一事实简化了日常使用体验，也促进了现有组件的重用。\n\n### NetBeans 平台的新特性\n\n\
  NetBeans Platform 7 包含众多创新。其中一项关键创新是引入了*注解*。例如，操作不再需要从特定的类派生。因此，操作可以通过注解进行注册，同时，操作也可以添加到菜单或工具栏中。以前，您需要为顶层组件分配两个独立的配置文件。现在，顶层组件通过注解进行注册，并向\
  \ NetBeans 平台公开。由于使用了注解，声明性信息现在可以直接且分散地提供。注解有完善的文档，并由编辑器或编译器进行检查；信息以更简单的方式提供，避免了\
  \ XML 中可能出现的错误条目。此外，信息恰好位于其引用的位置，因此无需管理额外的文件。这也简化了重构，并促进了 NetBeans 平台对 NetBeans\
  \ IDE 的独立性。请记住，必要的配置文件或配置条目是在编译时根据注解生成的。这意味着使用注解并非强制要求；您也可以像以前一样手动创建必要的配置。\n\n是否使用注解最终是一个理念问题，也取决于项目的规模和您的特殊需求。当然，您也可以看到注解的缺点。例如，元信息分散在源文件中。而一个集中的文件可能更易于调整或概览。\n\
  \n对*OSGi* 捆绑包的支持也是一项关键创新。现在，OSGi 捆绑包可以在 NetBeans Platform 7 中与 NetBeans 模块并行运行。为此，OSGi\
  \ 框架（Felix 或 Equinox）可选地集成到 NetBeans 平台中。也可以将 NetBeans 平台模块转换为 OSGi 捆绑包。这一创新使得大量现有的\
  \ OSGi 捆绑包得以使用。\n\n对 Maven 的开箱即用支持也可称为一项创新。现在，NetBeans 平台应用程序可以完全通过 Maven 进行开发。借助\
  \ NetBeans Maven 插件以及公共 Maven 仓库中所有 NetBeans 平台模块的可用性，在 NetBeans IDE 之外使用 NetBeans\
  \ 平台已毫无障碍。\n\n\n\n### 本书结构\n\n本书面向希望基于 NetBeans 平台开发客户端应用的 Java 开发者。读者无需具备富客户端平台的相关知识。本书的主要目标是贴近实际实践，介绍\
  \ NetBeans 平台的基本理念与功能，并阐释 NetBeans IDE 在应用开发阶段提供的出色支持，以及 NetBeans 平台的接口与优势。通过这种方式，我希望能够激励您进一步使用\
  \ NetBeans 平台——并扪心自问，为何您此前没有基于富客户端平台来开发应用，尤其是在您认识到过去本可以从中获益的众多优势之后。\n\n本书各章节大多相互独立，以便您能直接切入感兴趣的章节，并为您提供一份基于\
  \ NetBeans 平台开发富客户端应用的实用手册。为使各章节清晰易懂并便于直接查阅，本书中的讲解均辅以小型示例，而不依赖于某个整体应用。在本书末尾，我将展示如何创建一个完整的富客户端应用，涵盖从草案阶段、创建基本结构到实现应用逻辑的全过程。我将以\
  \ MP3 管理器为例，采用类似教程的格式进行讲解。在该应用中，您将集成 Java Media Framework (JMF) 以及 Java DB 数据库系统等。\n\
  \n第 1 部分 介绍 NetBeans 平台的基本特性与概念。首先，您将了解富客户端的定义、富客户端平台通常包含哪些特性，以及 NetBeans 平台提供的特殊优势。此外，由于基于模块的特性至关重要，我将在第\
  \ 1 部分 中同时介绍 NetBeans 模块系统和 OSGi 框架。查找、操作和数据管理这三个核心主题将分别用一章的篇幅来阐述，从而完成第一部分的内容。\n\
  \n第 2 部分 完全专注于用户界面的开发。这部分主要涉及窗口系统以及菜单栏、工具栏、状态栏和进度条。借助窗口系统的支持，您可以轻松实现并管理自己的窗口。结合第一部分中讲解的数据管理，您将在单独的一章中学习灵活的节点概念以及\
  \ Explorer API。本部分还涵盖了对话框和向导的开发，以及强大的 Visual Library API 的使用。\n\n在第 3 部分 中，我们将深入探讨\
  \ NetBeans 平台的标准模块，这些模块无需太多额外工作即可直接使用。这包括帮助系统、输出窗口、导航器、属性窗口、选项对话框和面板模块。我将用单独的章节解释如何使用它们中的每一个。\n\
  \n第 4 部分 介绍如何使用 NetBeans 平台和 NetBeans IDE 中非常有用的 API。实际上，您并不局限于 NetBeans 平台的模块。其中一章解释了如何使用\
  \ Palette API，另一章则介绍了如何使用 Task List API。此外，我们还将通过贴近实际实践的示例，深入了解 Quick Search 和 Auto\
  \ Update Services API。\n\n在第 5 部分 中，我将 NetBeans 平台置于数据库和 Java EE 应用的背景下。首先，您将在 NetBeans\
  \ 平台应用中使用 Java DB 作为客户端数据库解决方案。后续章节将介绍如何使用 Hibernate 来简化数据库访问。然而，应用 Hibernate 并不需要依赖于特定的对象关系映射（ORM）框架。在稍后的章节中，我将解释如何为此目的集成\
  \ Java Persistence API (JPA)。作为 Java DB 和 Hibernate 的替代方案，我还将深入探讨结合 EclipseLink\
  \ 的 MySQL 数据库解决方案。在本部分中，我们将从两个方面探讨 Web 服务：一方面，是关于使用基于 SOAP 的任何可用 Web 服务；另一方面，是关于连接使用\
  \ SOAP 和基于 REST 的 Web 服务的服务器端 Java EE 应用。最后一章将回答关于用户身份验证和应用特定定制的问题。\n\n在第 6 部分 中，您将了解\
  \ NetBeans 平台在国际化和本地化方面提供的可能性。此外，本部分还涵盖了 NetBeans 平台的品牌化以及将整个应用打包为可交付单元。在另一章中，您将了解\
  \ NetBeans 平台的更新机制，借助该机制，您可以在交付后以简单透明的方式更新您的应用。\n\n本书的第 7 部分 介绍 NetBeans 平台或 NetBeans\
  \ IDE 的各种开发和测试工具。首先，是关于使用 Maven 构建系统实现 NetBeans 平台应用。在另一章中，您将学习如何甚至在 Eclipse IDE\
  \ 内使用 Maven 开发 NetBeans 平台应用。此外，有一章将简化从 Eclipse IDE 切换到 NetBeans IDE 以开发 NetBeans\
  \ 平台应用的过程。除了 NetBeans 和 Eclipse IDE，IntelliJ IDEA 也可用于开发 NetBeans 平台应用。NetBeans\
  \ IDE 提供了一个强大的 GUI 构建器，用于高效开发用户界面。您将在单独的章节中学习如何使用它，以及如何调试和测试您的应用。\n\n第 8 部分 以一个完整可用的示例来结束本指南。在本部分中，您将逐步开发一个\
  \ MP3 管理器应用。前面描述的概念和技术将在此汇聚，并能让您如同在实际实践中一样理解它们。\n\n### 下载代码\n\n本书中的所有示例和讲解均基于 Java\
  \ 6 和 NetBeans 7。您可以在 [`http://java.oracle.com`](http://java.oracle.com) 下载 Java\
  \ 开发工具包 (JDK 6)，并在 [`http://netbeans.org`](http://netbeans.org) 下载 NetBeans 7。\n\
  \n本书中的每个源代码示例都可以从 Apress 网站上本书的“源代码/下载”区域下载，作为完整的可运行 NetBeans IDE 项目。\n\n## 第 1\
  \ 部分\n\n## 基础与概念：NetBeans 平台基础\n\n## 第 1 章\n\n## 引言\n\n本章将向您介绍富客户端开发。在此过程中，您将了解什么是富客户端，以及富客户端平台如何为您提供帮助。本章还将简要介绍\
  \ NetBeans 平台的主要优势和特性。\n\n\n\n### 什么是富客户端？\n\n在客户端-服务器架构中，术语*富客户端*用于指代数据处理主要发生在客户端一侧的客户端。客户端还提供图形用户界面（GUI）。富客户端通常是可通过插件和模块进行扩展的应用程序。通过这种方式，富客户端能够解决不止一个问题。\n\
  \n富客户端通常基于某个框架进行开发。框架提供了一个基本起点，用户可以在其上组装应用程序中逻辑相关的部分，这些部分被称为模块。理想情况下，不相关的解决方案（例如由不同提供商提供的解决方案）可以协同工作，使得所有模块看起来像是作为一个整体创建的。\n\
  \n除此之外，富客户端还具有易于分发和更新的优势，例如通过客户端内部的自动在线更新功能，或通过一种使富客户端能够通过互联网启动的机制（例如，通过 Java Web\
  \ Start）。\n\n以下是富客户端特性的概述：\n\n*   灵活且模块化的应用程序架构\n*   平台无关性\n*   对最终用户的可适应性\n*  \
  \ 支持在线和离线工作\n*   简化向最终用户的分发\n*   简化客户端的更新\n\n### 什么是富客户端平台？\n\n富客户端平台是一个应用程序生命周期环境，是桌面应用程序的基础。大多数桌面应用程序都具有相似的功能，例如菜单、工具栏、状态栏、进度可视化、数据显示、自定义设置、用户特定数据和配置的保存与加载、启动画面、关于对话框、国际化、帮助系统等等。针对这些及其他典型的客户端应用程序功能，富客户端平台提供了一个框架，可以快速、简单地组合这些功能。\n\
  \n应用程序的可配置性和可扩展性在此类框架中占据核心地位。因此，例如，你可以在文本文件中声明式地提供应用程序的菜单项，然后菜单将由框架自动加载。这意味着源代码变得更加集中和易于管理，开发者能够专注于应用程序的实际业务需求，同时菜单具有最大的可配置性。\n\
  \n富客户端平台最重要的方面是其架构。基于富客户端平台的应用程序以模块的形式编写，应用程序中逻辑连贯的部分被隔离在模块内。模块被声明式地描述并由平台自动加载。因此，源代码与应用程序之间无需显式绑定。通过这种方式，在独立运行的模块之间建立了一种相对松散的耦合关系，这极大地简化了应用程序的动态可扩展性及其组成部分的替换能力。这样，从单个模块组装面向用户或特定领域的应用程序也变得非常容易。\n\
  \n富客户端平台还使开发者无需关注与应用程序业务逻辑关系不大的任务。在开发周期结束时，你将获得一个当之无愧的现代化应用程序架构。\n\n### 富客户端平台的优势\n\
  \n除了富客户端架构提供的模块化（这同时意味着高度的健壮性和最终用户价值）之外，还应强调其提供的广泛开发支持。基于富客户端平台开发的这些及其他优势在此简要介绍。\n\
  \n#### 减少开发时间\n\n富客户端平台为桌面应用程序开发提供了大量的应用程序编程接口（API）。例如，开发者可以使用这些 API 来管理窗口和菜单，或支持自定义选项的显示。通过重用许多预定义的组件，开发者能够非常专注于所讨论应用程序的业务逻辑。\n\
  \n#### 用户界面一致性\n\n应用程序的可用性始终至关重要，特别是当应用程序旨在供特定领域的专业人士使用时。富客户端平台提供了一个用于显示用户界面（UI）的框架，重点强调一致性、可访问性和可用性。\n\
  \n#### 更新应用程序\n\n使用富客户端平台，可以快速高效地向最终用户分发新的或更新的模块。因此，无需开发者通知应用程序的所有客户端切换到新版本。更新可以以模块的形式分发和安装，因此不同的功能可以由独立的开发团队开发和交付。应用程序的模块化架构确保已完成的模块可以分发，而无需等待其他模块完成。\n\
  \n#### 平台无关性\n\n富客户端平台基于国际标准和可重用组件。因此，基于富客户端平台的 Java 应用程序可以自动部署到多个系统，例如 Windows\
  \ 或 Linux，只要存在 Java 运行时环境的实现即可。由于应用程序的功能集和适用性不断变化，以可扩展且可部署到不同目标系统的方式进行开发非常重要。所有这些都由富客户端平台提供，从而节省了时间和金钱。基于富客户端平台的应用程序除了\
  \ Java 运行时环境外，不需要其他库或组件。\n\n#### 可重用性和可靠性\n\n富客户端平台提供了一系列特性和模块，可用于开发者自己的应用程序。如果模块不完全符合应用程序的要求，完全可以将其作为起点，同时根据需要进行扩展或更改。由于大多数平台也提供其源代码，因此在某些情况下，考虑更改或扩展平台本身也是值得的。这些因素意味着高度的可靠性和自由度。\n\
  \n### NetBeans 平台的特点\n\n除了富客户端平台的通用优势外，NetBeans 平台还提供了众多框架和若干额外功能，这些功能对你的应用程序可能特别有用。此处概述了构成\
  \ NetBeans 平台主要特点的重要功能。\n\n#### 用户界面框架\n\n窗口、菜单、工具栏和其他组件由平台提供。因此，你可以专注于特定的操作，这能精简你的代码，使其更好且不易出错。NetBeans\
  \ 平台提供的完整用户界面完全基于 AWT/Swing，并且可以使用你自己的组件进行扩展。\n\n#### 数据编辑器\n\nNetBeans 集成开发环境（IDE）中强大的\
  \ NetBeans 编辑器可以被你自己的应用程序使用。该编辑器的工具和功能可以快速轻松地扩展和调整，以适应应用程序的目的。\n\n#### 自定义显示\n\n\
  每个应用程序都需要显示用户和应用程序特定的设置。NetBeans 平台提供了一个框架，使得集成你自己的选项对话框变得极其简单，让用户能够以赏心悦目的方式保存和恢复设置。\n\
  \n#### 向导框架\n\nNetBeans 平台提供了简单的工具来创建可扩展且用户友好的向导，引导用户完成应用程序中的复杂步骤。\n\n\n\n#### 数据系统\n\
  \n在 NetBeans 平台中，数据可以是本地的，也可以通过 FTP、CVS、数据库或 XML 文件获取。通过抽象化，一个模块对数据的访问对所有其他模块是透明的。因此，实际的数据访问本身并非关注点，因为它由\
  \ NetBeans 平台的 API 处理。\n\n#### 数据管理与表示框架\n\n基于文件和已保存数据的抽象化（如前一段所述），NetBeans 平台提供了一个框架，通过该框架可以为数据分配特定的操作或功能。该框架还负责管理和表示数据及其在用户界面上的操作。\n\
  \n#### 中央服务管理\n\nNetBeans 平台通过查找概念提供了中央服务管理。这使你能够独立地提供和使用应用程序内提供的特定服务。这个概念很重要，因为它能够实现应用程序各部分之间的松散耦合。这是\
  \ NetBeans 平台应用所追求的重要目标之一。\n\n#### 国际化\n\nNetBeans 平台提供了支持 JavaHelp 和其他资源国际化的类和方法。你可以轻松地将文本常量存储在属性文件中。NetBeans\
  \ 平台还会加载适用于当前国家和语言设置的文本常量和图标。\n\n#### 帮助系统\n\n通过标准的 JavaHelp 系统，NetBeans 平台提供了一个中央系统，用于向最终用户集成和显示帮助主题。此外，各个模块可以向应用程序的帮助系统贡献自己的主题。最重要的是，NetBeans\
  \ 平台还允许你提供上下文相关的帮助。\n\n### 总结\n\n在本章中，你了解了富客户端所能带来的不同，以及富客户端所具备的优势，包括其模块化架构，这种架构得益于富客户端平台独有的模块系统。然而，富客户端平台还提供了许多其他优势和特性，包括对一致用户界面的支持，以及在运行时用新功能更新应用程序的能力。最后，本章介绍了\
  \ NetBeans 平台最重要的特性。\n\n## 第 2 章\n\n## NetBeans 平台的结构\n\n为了让你了解富客户端应用程序的结构，并展示你正在创建的应用程序与\
  \ NetBeans 平台之间的关系，本章将讨论 NetBeans 平台的架构。本章还将介绍 NetBeans 平台的独立构建模块，以及 NetBeans 运行时容器为你处理的责任。最后，本章将解释\
  \ NetBeans 类加载器系统的结构，以及它在基于 NetBeans 平台构建的应用程序中所扮演的角色。\n\n### NetBeans 平台架构\n\n\
  现代应用程序的规模和复杂性正在稳步增长。同时，专业应用程序首先需要具备灵活性，以便能够快速、轻松地扩展。这使得有必要将应用程序划分为不同的部分。因此，每个不同的部分都是一个构建模块，共同构成模块化架构。这些不同的部分必须相互独立，提供定义良好的接口供同一应用程序的其他部分使用，并具备其他部分可以使用的特性。\n\
  \n将应用程序划分为模块（即逻辑上相互依赖的部分）极大地增强了应用程序的设计。与单体应用程序（其中每个类都可以使用任何其他类的代码）相比，这种架构更加灵活，更重要的是，更易于维护。虽然在\
  \ Java 中可以保护类免受外部世界的访问，但这种类级别的保护粒度太细，对大多数应用程序来说用处不大。NetBeans 平台正是解决了现代客户端应用程序的这一核心问题。其概念和结构支持灵活且模块化应用程序的开发与概念化。\n\
  \nNetBeans 平台的基本构建模块是模块。一个模块是一组功能相关的类，以及该模块暴露的接口描述，以及其运行所需的其他模块的描述。完整的 NetBeans\
  \ 平台，以及在其之上构建的应用程序，都被划分为模块。这些模块由 NetBeans 平台的核心加载，该核心被称为 *NetBeans 运行时容器*。NetBeans\
  \ 运行时容器动态且自动地加载应用程序的模块，之后还负责运行该应用程序。\n\nNetBeans IDE 是一个模块化富客户端应用程序的绝佳示例。IDE 的功能和特性，例如其\
  \ Java 语言支持或代码编辑器，都是以模块的形式在 NetBeans 平台之上创建的，如图 2-1 所示。这带来了巨大的优势，因为应用程序可以通过添加更多模块进行扩展，并适应特定的用户需求，从而允许停用或卸载未使用的特定模块。\n\
  \n![图片](img/0201.jpg)\n\n***图 2-1.** NetBeans IDE 的概念结构*\n\n为了使你的应用程序能够达到这种模块化水平，NetBeans\
  \ 平台一方面提供了使模块能够被其他模块扩展的机制和概念，另一方面也使它们能够在不相互依赖的情况下进行通信。换句话说，NetBeans 平台支持应用程序内模块的松散耦合。\n\
  \n为了优化模块内代码的封装（这在模块化系统中是必需的），NetBeans 平台提供了自己的*类加载器系统*。每个模块由其类加载器加载，并在此过程中形成一个独立的代码单元。因此，一个模块可以显式地使其包可用，从而将特定功能暴露给其他模块。为了使用其他模块的功能，一个模块可以声明对其他模块的依赖。这些依赖关系在模块的清单文件中声明，并由\
  \ NetBeans 运行时容器解析，确保应用程序始终以一致的状态启动。最重要的是，这种松散耦合在 NetBeans 平台的声明式概念中发挥了作用。我的意思是，尽可能多地在描述文件和配置文件中进行定义，以避免这些概念与\
  \ Java 源代码的硬连接。\n\n\n\n模块由其清单文件的数据以及相关 XML 文件中指定的数据共同描述，因此无需显式添加到 NetBeans 平台。通过使用\
  \ XML 文件，NetBeans 平台能够了解其可用的模块、它们的位置以及允许加载这些模块所需满足的契约。这些依赖关系在模块的清单文件中声明，并由 NetBeans\
  \ 运行时容器解析，从而确保应用程序始终以一致的状态启动。NetBeans 平台本身由一组核心模块（参见图 2-2）构成，这些模块是启动应用程序和定义其用户界面所必需的。为此，NetBeans\
  \ 平台提供了许多 API 模块和服务提供者接口（SPI）模块，极大地简化了开发过程。这组模块（如图 2-2 所示）包括，例如，提供常用操作类的 Actions\
  \ API；功能强大的 Nodes API；以及帮助您轻松地将自己的选项对话框集成到应用程序中的 Options SPI。除此之外，NetBeans 平台中还有完整的可重用组件，例如输出窗口和收藏夹模块。\n\
  \n![Image](img/0202.jpg)\n\n***图 2-2.** NetBeans 平台架构*\n\n### NetBeans 平台发行版\n\n\
  通常您不需要单独下载 NetBeans 平台的发行版，因为 NetBeans 平台已经是 NetBeans IDE 的基本组成部分，而 NetBeans IDE\
  \ 本身就是一个富客户端应用程序。在 NetBeans IDE 中开发应用程序时，平台会从 NetBeans IDE 中提取出来。但是，也可以将多个 NetBeans\
  \ 平台添加到 NetBeans IDE 中。为此，您可以从官方网站 [`http://netbeans.org/features/platform`](http://netbeans.org/features/platform)\
  \ 下载 NetBeans 平台的独立发行版。\n\n现在让我们仔细看看 NetBeans 平台发行版中的重要部分：\n\n*   模块 `org.netbeans.bootstrap`、`org.netbeans.core.startup`、`org-openide-filesystems`、`org-openide-modules`、`org-openide-util`\
  \ 和 `org-openide-util-lookup` 构成了 NetBeans 运行时容器，它是平台的核心，负责所有其他模块的开发。\n*   NetBeans\
  \ 平台也支持 OSGi 技术。为此所需的模块是 `org.netbeans.libs.felix`、`org.netbeans.core.osgi`、`org.netbeans.core.netigso`\
  \ 和 `org.netbeans.libs.osgi`。\n*   模块 `org-netbeans-core`、`org-netbeans-core-execution`、`org-netbeans-core-ui`\
  \ 和 `org-netbeans-core-windows` 为 API 模块提供基本功能。\n*   `org-netbeans-core-output2`\
  \ 是一个完整的应用程序模块，可用作中央输出窗口。\n*   模块 `org-netbeans-core-multiview` 是一个用于多视图窗口（例如，表单编辑器窗口）的框架，并为其提供了一个\
  \ API。\n*   模块 `org-openide-windows` 包含窗口系统 API，这可能是最常用的 API。它包含用于开发窗口和窗口管理器等的基本类。通过窗口管理器，您可以访问有关所有现有窗口的信息。\n\
  *   应用程序的更新功能由模块 `org-netbeans-modules-autoupdate-services` 实现。该模块提供了查找、下载和安装模块的完整功能。模块\
  \ `org-netbeans-modules-autoupdate-ui` 提供了插件管理器，使用户能够管理和控制模块及更新。\n*   使用 `org-netbeans-modules-favorites`\
  \ 模块，您可以显示随机数据和目录结构，并通过数据系统 API 影响其操作。\n*   `org-openide-actions` 模块提供了一组常用的操作，例如复制、剪切和打印。这些操作的功能可以以上下文相关的方式实现。\n\
  *   一个非常强大的模块是 `org-openide-loaders`，它包含数据系统 API。这可用于创建数据加载器，这些加载器可以与特定类型的文件关联，然后为其创建数据对象。可以通过简单的方式为这些数据对象添加特殊行为。\n\
  *   `org-openide-nodes` 模块的 Nodes API 是 NetBeans 平台的一个非常核心的特性。例如，节点可以在资源管理器视图中显示；通过这种方式，节点可以为数据对象提供操作和属性表。\n\
  *   `org-openide-explorer` 模块提供了一个框架来开发资源管理器视图，例如在 NetBeans IDE 的项目或文件视图中使用的视图。\n\
  *   `org-netbeans-modules-editor-mimelookup` 模块提供了一个 API 来查找特定 MIME 类型的设置、服务和其他对象，以及一个\
  \ SPI 来实现您自己的特定 MIME 类型数据提供者。`org-netbeans-modules-editor-mimelookup-impl` 模块是该\
  \ SPI 的一个特殊实现，负责在系统文件系统的目录结构中查找对象。\n*   `org-netbeans-modules-javahelp` 包含 JavaHelp\
  \ 运行时库，并为模块 API 提供了一个实现，使应用程序模块能够通过 JavaHelp 技术集成自己的帮助集。\n*   用于实现和提供您自己的提供者的 QuickSearch\
  \ SPI 位于模块 `org.netbeans.spi.quicksearch` 中。\n*   主文件系统模块 `org-netbeans-modules-masterfs`\
  \ 提供了一个重要的包装器文件系统。\n*   模块 `org-netbeans-modules-options-api` 提供了一个选项对话框和一个 SPI，使得添加您自己的选项面板变得容易。\n\
  *   长时间运行的任务可以由模块 `org-netbeans-api-progress` 集中管理。模块 `org-netbeans-modules-progress-ui`\
  \ 提供了此功能的可视化，可以停止单独的任务。\n*   `org-netbeans-modules-queries` 提供了一个通用的查询 API，模块可以使用它来查询有关文件的信息。还提供了一个\
  \ SPI 来提供您自己的查询实现。\n*   `org-netbeans-modules-sendopts`，该模块提供了一个*命令行解析 API* 和一个\
  \ SPI，您自己的处理程序可以通过它注册到命令行。\n*   `org-netbeans-modules-settings` 模块提供了一个 API，用于以用户定义的格式保存特定于模块的设置。它还提供了几种有用的设置格式。\n\
  *   `org-openide-awt` 模块包含*UI 工具 API*，通过该 API 提供了用于创建用户界面的不同帮助类。\n*   在 `org-openide-dialogs`\
  \ 模块中，提供了一个用于显示标准对话框和特定于应用程序的对话框的 API。向导框架位于此模块中。\n*   `org-openide-execution` 提供了一个用于执行长时间运行的异步任务的\
  \ API。\n*   `org-openide-io` 为文件的输入和输出提供了一个 API 和一个 SPI。该模块还提供了一个标准实现，您可以使用它在输出窗口模块上进行写入。\n\
  *   `org-openide-text` 模块中的 Text API 提供了 `javax.swing.text` API 的扩展。\n*   模块 `org-netbeans-swing-plaf`\
  \ 和 `org-netbeans-swing-tabcontrol` 负责外观和感觉的适配以及标签的显示。模块 `org-jdesktop-layout` 是\
  \ Swing 布局扩展库的包装模块。\n*   可视化库 API 由模块 `org-netbeans-api-visual` 提供。\n\n此外，还可以将 IDE\
  \ 发行版中的模块添加到列出的模块中。\n\n\n\n### NetBeans 运行时容器\n\nNetBeans 平台及其模块化架构的基础被称为 *NetBeans\
  \ 运行时容器*。它由以下五个模块组成：\n\n*   *Bootstrap*：该模块首先执行。它执行所有已注册的命令行处理器，创建一个用于加载启动模块的引导类加载器，然后执行该模块。\n\
  *   *Startup*：该模块通过初始化模块系统和文件系统来部署应用程序。\n*   *模块系统 API*：此 API 负责管理模块及其设置和依赖关系。\n\
  *   *文件系统 API*：此 API 提供了一个虚拟文件系统，用于提供平台无关的访问。它主要用于加载模块的资源。\n*   *Lookup 与 Utilities\
  \ API*：该组件提供了一个重要的基础组件，用于模块间的相互通信。Lookup API 位于一个独立的模块中，因此它可以独立于 NetBeans 平台使用。\n\
  \n图 2-3 中的箭头显示了这五个基本模块之间的依赖关系。\n\n![Image](img/0203.jpg)\n\n***图 2-3.** NetBeans\
  \ 运行时容器*\n\n运行时容器是富客户端应用程序的最小形式，并且可以无需其他模块直接运行。如果没有任务需要执行，运行时容器将在启动后直接关闭。值得注意的是，NetBeans\
  \ 平台一方面可以创建具有丰富用户界面的应用程序，另一方面也可以使用此运行时容器来构建模块化的命令行应用程序。启动运行时容器时，它会查找所有可用的模块，并从中创建一个内部注册表。通常，一个模块仅在需要时才被加载。首先，它会被注册为“已存在”。然而，模块也有可能在启动时立即执行任务。这是通过模块安装程序（Module\
  \ Installer）完成的，相关内容将在第 3 章中讨论。运行时容器还支持在运行时动态加载、卸载、安装和卸载模块。当用户更新应用程序（使用自动更新功能）时，此功能尤其必要。在应用程序中停用不需要的模块时，也需要此功能。\n\
  \n为了完整理解富客户端应用程序的启动过程，还需要说明的是，Bootstrap 模块（第一个执行的模块）是由一个特定于平台的启动器启动的。该启动器还负责识别 Java\
  \ 运行时环境。启动器是 NetBeans 平台的一部分，并且是特定于操作系统（或 OS）的，例如，在 Windows 系统上它是一个 `.exe` 文件。\n\
  \n### NetBeans 类加载器系统\n\nNetBeans 类加载器系统是 NetBeans 运行时容器的一部分，也是封装模块和构建模块化架构结构的前提条件。该系统由三种不同类型的类加载器组成。它们是\
  \ *模块类加载器*、*系统类加载器* 和 *原始类加载器*。\n\n*   大多数类由模块类加载器加载。\n*   系统类加载器仅在特定情况下使用，例如，当必须访问模块外部的资源时。\n\
  *   原始类加载器从应用程序启动器的类路径中加载资源。\n\n模块类加载器和系统类加载器是多父级类加载器；它们可以拥有任意数量的父级，而不仅仅像通常那样只有一个父级类加载器。图\
  \ 2-4 显示了各种类加载器类型之间的连接关系。\n\n![Image](img/0204.jpg)\n\n***图 2-4.** NetBeans 类加载器系统*\n\
  \n#### 模块类加载器\n\n对于在模块系统中注册的每个模块，都会创建一个模块类加载器的实例，每个模块通过该实例获得自己的命名空间。此类加载器主要从模块的\
  \ JAR 归档文件中加载类，但也可能从多个归档文件中加载，这在库包装模块中经常发生。您将在第 3 章中了解更多相关信息。\n\n原始类加载器隐式地是每个模块类加载器的父级类加载器，并且位于父级列表的首位。其他父级是那些设置了依赖关系的相关模块的类加载器。如何设置依赖关系将在第\
  \ 3 章中描述。\n\n这种多父级模块类加载器使得能够从其他模块加载类，同时避免命名空间冲突。类的加载被委托给父级类加载器，而不是模块本身。除了模块 JAR\
  \ 归档文件中的类之外，此类加载器还负责从 `locale` 子目录加载区域设置扩展归档文件（参见第 34 章），以及从 `patches` 子目录加载补丁归档文件（如果存在）。\n\
  \n#### 系统类加载器\n\n默认情况下，系统类加载器是一个多父级类加载器。它拥有所有已实例化的模块类加载器作为其父级。因此，理论上可以使用此类加载器加载模块提供的所有内容。可以通过两种不同的方式访问系统类加载器：通过\
  \ Lookup（稍后您将了解更多相关内容），以及通过当前线程的上下文类加载器。默认情况下（只要您没有显式设置其他上下文类加载器），这就是系统类加载器。\n\n\
  `ClassLoader cl = (ClassLoader) Lookup.getDefault().lookup(ClassLoader.class);`\n\
  \n或\n\n`ClassLoader cl = Thread.currentThread().getContextClassLoader();`\n\n####\
  \ 原始类加载器\n\n原始（应用程序）类加载器由应用程序的启动器创建。它从原始的 `CLASSPATH` 以及 `lib` 目录及其 `ext` 子目录中加载类和其他资源。如果某个\
  \ JAR 归档文件未被识别为模块（即清单条目无效），则不会将其传递给模块系统。此类资源总是被优先找到：如果在此处找到与模块 JAR 归档文件中相同的资源，则模块中的资源将被忽略。这种安排对于模块的品牌化（例如）以及准备特定模块的多语言发行版是必要的。与之前一样，此类加载器不用于加载所有相关资源。它更可能用于应用程序早期启动阶段所需的资源，例如设置外观和感觉所需的类。\n\
  \n### 总结\n\n本章从 NetBeans 平台的架构入手，考察了其结构，其核心由运行时容器提供。运行时容器为基于 NetBeans 平台构建的应用程序提供了执行环境，并为模块化应用程序提供了基础设施。本章介绍并解释了确保模块封装的\
  \ NetBeans 类加载器系统。除了运行时容器之外，许多模块构成了 NetBeans 平台的一部分，本章简要介绍了其中的每一个，最后指出 NetBeans\
  \ IDE 本身就是一个富客户端应用程序，由可在您自己的应用程序中重用的模块组成。\n\n## 第 3 章\n\n\n\n## NetBeans 模块系统\n\n\
  *NetBeans 模块系统*负责管理所有模块。这意味着它负责诸如创建类加载器、加载模块、激活或停用模块等任务。NetBeans 模块系统在设计时尽可能使用了标准\
  \ Java 技术。模块格式的基本思想源于 Java 扩展机制。包版本规范的基本概念被用于描述和管理应用程序模块与系统模块之间的依赖关系。\n\n模块的基本属性，例如模块的描述以及与其他模块的依赖关系，都在清单文件中进行描述。该文件使用标准的清单格式，并附加了\
  \ NetBeans 特有的属性。Java 激活框架和 Java 开发工具包（JDK）的内部功能（例如对可执行 JAR 归档的支持）是模块规范的模型。大多数模块除了清单文件中的属性外，不需要特殊的安装代码，这意味着它们是以声明方式添加到平台中的。一个\
  \ XML 文件，即 *layer.xml* 文件，提供了用户特定的信息，并定义了模块如何集成到平台中。在该文件中，指定了模块想要添加到平台的所有内容，从操作到菜单项再到服务等等。\n\
  \n### 模块的结构\n\n一个模块是一个简单的 JAR 归档文件，通常由以下部分组成：\n\n*   清单文件（*manifest.mf*）\n*   层文件（*layer.xml*）\n\
  *   类文件\n*   资源，如图标、属性包、帮助集等\n\n只有清单文件是必需的，因为它标识了一个模块。所有其他内容取决于其模块的任务。例如，如果模块仅代表一个库，则不需要层文件。模块的结构如图\
  \ 3-1 所示。\n\n![图片](img/0301.jpg)\n\n***图 3-1.** NetBeans 模块*\n\n此外，每个模块都包含一个位于 JAR\
  \ 归档文件外部的 XML 配置文件（`com-galileo-netbeans-module.xml`）。这是模块系统读取的第一个文件；也就是说，它向平台宣告该模块的存在。\n\
  \n### 配置文件\n\n每个模块通过一个 XML 配置文件在模块系统中声明，该文件位于模块外部，即集群的 *config/Modules* 目录中。当应用程序启动时，模块系统会读取此目录。模块根据这些信息被加载。在此配置文件中，定义了模块的名称、版本和位置，并定义了是否以及如何加载模块。该文件的结构如下，如清单\
  \ 3-1 所示。\n\n***清单 3-1.** 模块配置文件：com-galileo-netbeans-module.xml*\n\n`<`**`module`**\
  \ `name=\"com.galileo.netbeans.module\">`\n`   <param name=\"autoload\">false</param>`\n\
  `   <param name=\"eager\">false</param>`\n`   <param name=\"enabled\">true</param>`\n\
  `   <param name=\"jar\">`**`modules/com-galileo-netbeans-module.jar`**`</param>`\n\
  `   <param name=\"reloadable\">false</param>`\n`   <param name=\"specversion\">1.0</param>`\n\
  `</`**`module`**`>`\n\n`enabled` 属性定义了模块是否被加载，从而决定它是否提供给应用程序。有三种方式可以确定模块应在何时加载：\n\
  \n*   *常规***：** 大多数应用程序模块属于此类型。它们在启动应用程序时被加载。应用程序的加载时间会因模块初始化时间而延长。因此，建议保持模块初始化非常简短。通常，在模块加载期间无需运行任何操作，因为许多任务可以声明式地定义。\n\
  *   *自动加载***：** 这些模块仅在其他模块需要它们时才被加载。自动加载模块符合*懒加载*原则。此模式通常用于那些充当库的模块。\n*   *急切加载***：**\
  \ 急切加载模块仅在满足所有依赖关系时才被加载。这是另一种最小化启动时间的方法。例如，如果模块 X 依赖于实际上甚至不可用的模块 A 和 B，那么加载模块 X\
  \ 是没有意义的。\n\n如果 `autoload` 和 `eager` 两个属性的值都为 `false`，则模块类型为常规。如果其中一个值为 `true`，则模块类型为自动加载或急切加载。模块类型在模块属性的\
  \ API 版本部分中定义（参见图 3-7）。默认情况下使用常规模式。\n\n### 清单文件\n\n在 NetBeans 平台中运行的每个模块都有一个清单文件。该文件是对模块及其环境的文本描述。加载模块时，清单文件是模块系统读取的第一个文件。如果清单文件包含\
  \ `OpenIDE-Module` 属性，则识别为 NetBeans 模块。这是唯一必需的属性。其值可以是任何标识符（通常代码名称是所用模块的基础——例如，`com.galileo.netbeans.module`）。因此，即使由不同的开发者创建，模块之间也不会发生冲突。此标识符用于清晰地区分一个无歧义的模块，这对于升级或依赖关系定义等是必需的。\n\
  \n\n\n#### 属性\n\n以下列出常用的清单属性。一个模块可以通过这些清单属性进行文本描述。此外，这些属性决定了模块如何集成到平台中。\n\n*   *`OpenIDE-Module`*：此属性为模块定义一个唯一名称，供模块系统将其识别为一个模块。定义此属性是强制性的。\n\
  \    **`OpenIDE-Module`**`: com.galileo.netbeans.module`\n*   *`OpenIDE-Module-Name`*：定义模块的显示名称，该名称也会显示在插件管理器中。\n\
  \    **`OpenIDE-Module-Name:`** `My First Module`\n*   *`OpenIDE-Module-Short-Description`*：模块功能的简短描述。\n\
  \    **`OpenIDE-Module-Short-Description`**`:`\n    `   This is a short description\
  \ of my first module`\n*   *`OpenIDE-Module-Long-Description`*：使用此属性可以更好地描述模块的功能。此文本也会显示在插件管理器中。因此，始终使用此属性来告知用户模块的特性是很有意义的。\n\
  \    **`OpenIDE-Module-Long-Description`**`:`\n    `   Here you can put a longer\
  \ description with more than one`\n    `   sentence. You can explain the capability\
  \ of your module.`\n*   *`OpenIDE-Module-Display-Category`*：通过此属性，可以将模块分组到一个虚拟组中，从而作为一个功能单元呈现给用户。\n\
  \    **`OpenIDE-Module-Display-Category`**`: My Modules`\n*   *`OpenIDE-Module-Install`****:***\
  \ 可以使用此属性注册一个模块安装器类（参见生命周期一节），以便在模块生命周期的特定时间点执行操作。\n    **`OpenIDE-Module-Install`**`:\
  \ com/galileo/netbeans/module/Installer.class`\n*   *`OpenIDE-Module-Layer`*：这是最重要的属性之一。它指定了层文件的路径（参见*层文件*一节）。模块到平台的集成由层文件描述。\n\
  \    **`OpenIDE-Module-Layer`**`: com/galileo/netbeans/module/layer.xml`\n*   *`OpenIDE-Module-Public-Packages`*：为了支持封装，默认情况下禁止访问其他模块中的类。使用此属性，可以将包显式声明为公共包，以便其他模块可以访问它。这对于库尤其重要。\n\
  \    **`OpenIDE-Module-Public-Packages`**`:`\n    `   com.galileo.netbeans.module.actions.*,`\n\
  \    `   com.galileo.netbeans.module.util.*`\n*   *`OpenIDE-Module-Friends`*：如果只有特定模块可以访问通过\
  \ `OpenIDE-Module-Public-Packages` 属性声明为公共的包，则可以在此处指定这些模块。\n    **`OpenIDE-Module-Friends`**`:`\n\
  \    `   com.galileo.netbeans.module2,`\n    `   com.galileo.netbeans.module3`\n\
  *   *`OpenIDE-Module-Localizing-Bundle`*：此处可以定义一个用作本地化包的属性文件（参见第 8 章）。\n    **`OpenIDE-Module-Localizing-Bundle`**`:`\n\
  \    `   com/galileo/netbeans/module/Bundle.properties`\n\n##### 版本与依赖关系\n\n可以使用以下属性定义不同的版本和依赖关系。在*版本控制与依赖关系*一节中，您可以找到这些属性的应用及其全部功能的详细描述。\n\
  \n*   *`OpenIDE-Module-Module-Dependencies`*：使用此属性定义模块之间的依赖关系，并且还可以指定所需的最低模块版本。\n\
  \    **`OpenIDE-Module-Module-Dependencies`**`:`\n    `   org.openide.util > 6.8.1,`\n\
  \    `   org.openide.windows > 6.5.1`\n*   *`OpenIDE-Module-Package-Dependencies`*：一个模块也可能依赖于特定的包。此类依赖关系通过此属性定义。\n\
  \    **`OpenIDE-Module-Package-Dependencies`**`: com.galileo.netbeans.module2.gui\
  \ > 1.2`\n*   *`OpenIDE-Module-Java-Dependencies`*：如果模块需要特定的 Java 版本，可以通过此属性设置。\n\
  \    **`OpenIDE-Module-Java-Dependencies`**`: Java > 1.5`\n*   *`OpenIDE-Module-Specification-Version`*：此属性指示模块的规范版本。通常采用杜威十进制格式编写。\n\
  \    **`OpenIDE-Module-Specification-Version`**`: 1.2.1`\n*   *`OpenIDE-Module-Implementation-Version`*：此属性设置模块的实现版本，通常使用时间戳。每当模块发生更改时，此数字都应随之更改。\n\
  \    **`OpenIDE-Module-Implementation-Version`**`: 200701190920`\n*   *`OpenIDE-Module-Build-Version:`*\
  \ 此属性仅具有可选性质，模块系统会忽略它。通常提供一个时间戳。\n    **`OpenIDE-Module-Build-Version`**`: 20070305`\n\
  *   *`OpenIDE-Module-Module-Dependency-Message`*：此处可以设置一段文本。当模块依赖关系无法解析时，会显示此文本。在某些情况下，存在未解析的依赖关系可能是很正常的。此时，最好向用户显示一条有用的消息，告知他们可以在哪里找到所需的模块，或者为什么不需要它们。\n\
  \    **`OpenIDE-Module-Module-Dependency-Message`**`:`\n    `   The module dependency\
  \ is broken. Please go to the`\n    `   following URL and download the module.`\n\
  *   *`OpenIDE-Module-Package-Dependency-Message`*：当对某个包的必要引用失败时，会显示由此属性定义的消息。\n\
  \    **`OpenIDE-Module-Package-Dependency-Message`**`:`\n    `   The package dependency\
  \ is broken. The reason could be…`\n*   *`OpenIDE-Module-Deprecated`*：使用此属性标记一个不再受支持的旧模块。如果用户尝试将该模块加载到平台中，则会显示一条警告。\n\
  \    **`OpenIDE-Module-Deprecated`**`: true`\n*   *`OpenIDE-Module-Deprecation-Message`*：使用此属性添加可选信息。该信息和弃用警告都会显示在应用程序日志中，例如，您可以告知用户应该改用哪个模块。请注意，仅当\
  \ `OpenIDE-Module-Deprecated` 属性设置为 `true` 时，才会显示此消息。\n    **`OpenIDE-Module-Deprecation-Message`**`:`\n\
  \    `   Module 1 is deprecated, use Module 3 instead.`\n\n\n\n##### 服务接口与服务实现\n\
  \n以下属性用于定义特定的服务提供者接口及其实现。关于此主题的更多信息，请参阅第 5 章。\n\n*   *`OpenIDE-Module-Provides`*：使用此属性声明一个服务接口，该模块为此接口提供服务提供者。\n\
  \    **`OpenIDE-Module-Provides`**`: com.galileo.netbeans.spi.ServiceInterface`\n\
  *   *`OpenIDE-Module-Requires`*：在此处可以声明一个服务接口，该模块需要该接口的服务提供者。由哪个模块提供接口的实现并不重要。\n\
  \    **`OpenIDE-Module-Requires`**`: org.openide.windows.IOProvider`\n*   *`OpenIDE-Module-Needs`*：此属性是\
  \ require 属性的低调版本，不需要模块具有任何特定的顺序。这对于需要特定实现的 API 模块可能很有用。\n    **`OpenIDE-Module-Needs`**`:\
  \ org.openide.windows.IOProvider`\n*   *`OpenIDE-Module-Recommends`*：使用此属性，可以实现一个可选依赖项。例如，如果有一个模块提供了\
  \ `java.sql.Driver` 实现，则该模块会被激活并授予访问权限。然而，如果没有可用的此令牌提供者，则由可选依赖项定义的模块仍然可以执行。\n  \
  \  **`OpenIDE-Module-Recommends`**`: java.sql.Driver`\n*   *`OpenIDE-Module-Requires-Message`*：与前两个属性类似，可以使用此属性定义一个消息。如果未找到所需的令牌，则会显示此消息。\n\
  \    **`OpenIDE-Module-Requires-Message`**`:`\n    `   所需的服务提供者不可用。有关更多信息，请访问以下网站。`\n\
  \n**操作系统相关模块**\n\n清单属性 `OpenIDE-Module-Requires` 允许您定义倾向于在特定操作系统上使用的模块。此属性用于检查特定令牌是否存在。可用的令牌如下：\n\
  \n`org.openide.modules.os.Windows`\n`org.openide.modules.os.Linux`\n`org.openide.modules.os.Unix`\n\
  `org.openide.modules.os.PlainUnix`\n`org.openide.modules.os.MacOSX`\n`org.openide.modules.os.OS2`\n\
  `org.openide.modules.os.Solaris`\n\n模块系统确保这些令牌仅在相应的操作系统上可用。例如，一个在 Windows 系统上由模块系统自动激活的模块，会在所有其他系统上自动停用。要提供一个在\
  \ Windows 系统上自动加载但在其他操作系统上自动停用的模块，请将模块类型设置为 `eager`，并将以下条目添加到清单文件中：\n\n**`OpenIDE-Module-Requires`**`:\
  \ org.openide.modules.os.Windows`\n\n##### 可见性\n\n通过以下属性，可以控制模块在插件管理器中的可见性。这样，可以隐藏那些对应用程序最终用户不重要的模块。\n\
  \n*   *`AutoUpdate-Show-In-Client`*：此属性决定模块是否在插件管理器中显示。可以设置为 `true` 或 `false`。\n\
  \    **`AutoUpdate-Show-In-Client`**`: true`\n*   *`AutoUpdate-Essential-Module`*：使用此属性，您可以标记属于应用程序一部分的模块。被这样标记的模块，用户无法在插件管理器中停用或卸载。可以设置为\
  \ `true` 或 `false`。\n    **`AutoUpdate-Show-In-Client`**`: true`\n\n结合这两个属性，NetBeans\
  \ 平台引入了所谓的*套件*模块。每个可见模块（`AutoUpdate-Show-In-Client: true`）在插件管理器中都被视为一个套件模块。套件模块定义依赖关系的所有模块都以相同方式处理，除非这些模块也属于其他套件模块且被设为不可见。这意味着，如果一个套件模块被停用，所有依赖它的模块也将被停用。\n\
  \n通过这种方式，您可以为多个逻辑相关的模块构建包装模块。然后，您可以将它们作为一个整体展示给最终用户。您可以创建一个空模块，在其中将 `AutoUpdate-Show-In-Client`\
  \ 属性设置为 `true`，同时定义对所有属于此套件模块的模块的依赖关系。然后，在依赖模块中将 `AutoUpdate-Show-In-Client` 属性设置为\
  \ `false`，这样它们就不会被单独显示。\n\n#### 示例\n\n清单 3-2 展示了一个包含一些典型属性的清单文件。\n\n***清单 3-2.**\
  \ 清单文件示例*\n\n**`OpenIDE-Module:`** `com.galileo.netbeans.module`\n**`OpenIDE-Module-Public-Packages:`**`-`\n\
  **`OpenIDE-Module-Module-Dependencies:`**\n`   com.galileo.netbeans.module2 > 1.0,`\n\
  `   org.jdesktop.layout/1 > 1.4,`\n`   org.netbeans.core/2 = 200610171010,`\n`   org.openide.actions\
  \ > 6.5.1,`\n`   org.openide.awt > 6.9.0,`\n**`OpenIDE-Module-Java-Dependencies:`**\
  \ `Java > 1.6`\n**`OpenIDE-Module-Implementation-Version:`** `200701100122`\n**`OpenIDE-Module-Specification-Version:`**\
  \ `1.3`\n**`OpenIDE-Module-Install:`** `com/galileo/netbeans/module/Install.class`\n\
  **`OpenIDE-Module-Layer:`** `com/galileo/netbeans/module/layer.xml`\n**`OpenIDE-Module-Localizing-Bundle:`**\
  \ `com/galileo/netbeans/module/Bundle.properties`\n**`OpenIDE-Module-Requires:`**\n\
  `   org.openide.windows.IOProvider,`\n`   org.openide.modules.ModuleFormat1`\n\n\
  \n\n### 层文件\n\n除了用于描述模块接口和环境的模块清单文件外，还存在一个*层*文件。这是核心配置文件，几乎定义了模块向平台添加的所有内容。因此，层文件是模块与\
  \ NetBeans 平台之间的接口，以声明方式描述模块如何集成到平台中。首先，属性 `OpenIDE-Module-Layer` 会在清单文件中公开层文件是否存在。在此过程中，会定义文件的路径，通常使用\
  \ `layer.xml` 作为文件名。\n\n**`OpenIDE-Module-Layer:`** `com/galileo/netbeans/module/layer.xml`\n\
  \n该文件格式是一个包含文件夹、文件和属性的分层文件系统。启动应用程序时，所有现有的层文件会被合并成一个虚拟文件系统。这就是所谓的*系统文件系统*，它是 NetBeans\
  \ 平台的运行时配置。\n\n![图片](img/0302.jpg)\n\n***图 3-2.** 系统文件系统*\n\n该层文件包含某些默认文件夹。它们由作为扩展点的不同模块定义。例如，存在默认文件夹\
  \ `Menu`，如清单 3-3 所示。\n\n***清单 3-3.** 层文件的默认文件夹*\n\n`<`**`folder`** `name=\"`**`Menu`**`\"\
  >`\n`   <`**`folder`** `name=\"Edit\">`\n`      <`**`file`** `name=\"MyAction.shadow\"\
  >`\n`         <`**`attr`** `name=\"originalFile\"`\n`               stringvalue=\"\
  Actions/Edit/com-galileo-netbeans-module-MyAction.instance\"/>`\n`      </`**`file`**`>`\n\
  `   </`**`folder`**`>`\n`</`**`folder`**`>`\n\n在此示例中，操作类 `MyAction` 被添加到“编辑”菜单中。此时不必担心确切的语法；它将在后续章节中结合相应的标准文件夹进行解释。首先，我们详细阐述层文件的基本结构。此外，NetBeans\
  \ 平台提供了处理层文件的实用功能，如后续章节中创建第一个模块时所示。您还可以在本书附录中找到包含最重要扩展点的索引。\n\n每个模块都能够添加新的菜单项或创建新的工具栏。由于每个模块的层文件都会被合并到系统文件系统中，因此整个菜单栏的内容得以组装。负责生成菜单栏的窗口系统现在必须读取\
  \ `Menu` 文件夹，以获取整个菜单栏的内容。\n\n这个系统文件系统也极大地促进了模块可以在运行时添加或移除这一特性。可以在该系统文件系统上注册监听器。例如，窗口系统也会执行此操作。如果由于添加模块而发生任何更改，窗口系统或菜单栏本身可以更新其内容。\n\
  \n#### 文件夹和文件的顺序\n\n从层文件中读取条目的顺序（以及它们在菜单栏中显示的顺序）可以通过位置属性来确定，如清单 3-4 所示。\n\n***清单\
  \ 3-4.** 定义层文件中条目的顺序*\n\n`<filesystem>`\n`  <folder name=\"Menu\">`\n`    <folder\
  \ name=\"Edit\">`\n`      <file name=\"`**`CopyAction.shadow`**`\">`\n`        <attr\
  \ name=\"originalFile\"`\n`              stringvalue=\"Actions/Edit/org-openide-actions-CopyAction.instance\"\
  />`\n`        <`**`attr`** `name=\"`**`position\" intvalue`**`=\"10\"/>`\n`      </file>`\n\
  `      <file name=\"`**`CutAction.shadow`**`\">`\n`        <attr name=\"originalFile\"\
  `\n`              stringvalue=\"Actions/Edit/org-openide-actions-CutAction.instance\"\
  />`\n`        <`**`attr`** `name=\"`**`position\" intvalue`**`=\"20\"/>`\n`      </file>`\n\
  `    </folder>`\n`  </folder>`\n`</filesystem>`\n\n因此，复制操作会显示在剪切操作之前。如有必要，您也可以使用此属性来定义\
  \ `folder` 元素的顺序。在实践中，位置值会设置得间隔较大。这简化了后续插入其他条目。如果两次分配了相同的位置，则在运行应用程序时会记录一条警告消息。\n\
  \n为了轻松定位层内容，NetBeans IDE 在项目窗口中提供了一个层树，其中显示了层文件的所有条目。在那里，可以通过拖放来定义它们的顺序。层文件中的相应条目随后由\
  \ IDE 处理。在创建第一个模块后，*创建模块*部分已经解释了具体在哪里可以找到这些层树。您可以使用 NetBeans IDE 的向导来确定操作的顺序（请参见第\
  \ 6 章）。相应的属性随后由向导创建。\n\n如果层树中条目的位置需要更改，则会将一些条目添加到层文件中。这些条目会覆盖受更改影响的条目的默认位置。条目（也包括\
  \ NetBeans 平台模块的条目）的位置按如下方式覆盖：\n\n`<`**`attr`** `name=\"`**`Menu/Edit/CopyAction.shadow/position\"\
  \ intvalue`**`=\"15\"/>`\n\n在属性名称 `position` 之前使用受影响条目的完整文件路径。\n\n#### 文件类型\n\n\
  系统文件系统中提供了不同的文件类型。在开发应用程序时，您会在某些时候再次遇到它们。例如，在层文件中注册操作和菜单项。我将在以下部分中解释两种常用的文件类型。\n\
  \n\n\n##### 实例文件\n\n系统文件系统中类型为 *.instance* 的文件描述了可创建实例的对象。文件名通常描述了一个 Java 对象的完整类名（例如\
  \ `com-galileo-netbeans-module-MyClass.instance`），这使得默认构造函数或静态方法能够创建实例。\n\n`<filesystem>`\n\
  `   <file name=\"com-galileo-netbeans-module-MyClass.instance\"/>`\n`</filesystem>`\n\
  \n通过使用文件系统和数据系统 API 创建实例，如下所示：\n\n`FileObject o = FileUtil.getConfigFile(name);`\n\
  `DataObject d = DataObject.find(o);`\n`InstanceCookie c = d.getLookup.lookup(InstanceCookie.class);`\n\
  `c.instanceCreate();`\n\n如果你希望为实例使用更便捷的名称，可以通过 `instanceClass` 属性来定义完整的类名。这使得可以使用更短的名称：\n\
  \n`<file name=\"MyClass.instance\">`\n`   <attr name=\"`**`instanceClass`**`\" stringvalue=\"\
  com.galileo.netbeans.module.MyClass\"/>`\n`</file>`\n\n对于没有无参默认构造函数的类，可以通过 `instanceCreate`\
  \ 属性定义的静态方法来创建实例。\n\n`<file name=\"MyClass.instance\">`\n`   <attr name=\"`**`instanceCreate\"\
  \ methodvalue`**`=\"com.galileo.netbeans.module.MyClass.`**`getDefault`**`\"/>`\n\
  `</file>`\n\n这样做时，如果工厂方法签名中声明了，条目的 `FileObject` 会被传递给 `getDefault()` 方法。利用这个 `FileObject`，你可以读取自定义属性，例如。假设你想在层文件中将图标路径或任何其他资源定义为属性：\n\
  \n`<file name=\"MyClass.instance\">`\n`   <attr name=\"instanceCreate\" methodvalue=\"\
  com.galileo.netbeans.module.MyClass.getDefault\"/>`\n**`<attr name=\"icon\" urlvalue=\"\
  nbres:/com/galileo/icon.gif\"/>`**\n`</file>`\n\n用于创建 `MyClass` 类实例的 `getDefault()`\
  \ 方法可能如下所示：\n\n`public static MyClass` **`getDefault`**`(FileObject obj) {`\n`   URL\
  \ url = (URL) obj.`**`getAttribute`**`(\"icon\");`\n`   ...`\n`   return new MyClass(...);`\n\
  `}`\n\n正如你所见，我使用 `urlvalue` 属性类型指定了路径。因此，会直接提供一个 URL 实例。除了已知的属性类型 `stringvalue`、`methodvalue`\
  \ 和 `urlvalue` 之外，还有其他几种类型。我们将在 *层文件* 一节中更详细地介绍它们。\n\n特定类型的一个或多个实例也可以通过 Lookup 生成，而不是像之前展示的那样通过\
  \ `InstanceCookie` 生成。与之前展示的不同，你可以轻松地生成特定类型的多个实例，并为系统文件系统的特定文件夹创建 Lookup。使用 `lookup()`\
  \ 或 `lookupAll()` 方法，可以提供一个或多个实例（如果定义了多个）。\n\n**`Lookup`** `lkp =` **`Lookups.forPath(\"\
  MyFolder\")`**`;`\n`Collection<? extends MyClass> c = lkp.`**`lookupAll(MyClass.class)`**`;`\n\
  \n这种 `Lookup` 在第 10 章中被用于扩展顶层组件的内容菜单，添加在层文件中定义的自定义操作。基本类或接口可以通过层文件中的 `instanceOf`\
  \ 属性由用户定义。这使得 `Lookup` 的工作更高效，避免了 `Lookup` 为了确定类继承自哪个基类或实现了哪个接口而必须实例化每个对象。这样，`Lookup`\
  \ 可以直接只创建所需类型的对象实例。\n\n如果前面条目中的 `MyClass` 类实现了，例如，`MyInterface` 接口，我们可以按如下方式完成条目：\n\
  \n`<file name=\"com-galileo-netbeans-module-MyAction.instance\">`\n`   <attr name=\"\
  `**`instanceOf`**`\" stringvalue=\"`**`com.galileo.netbeans.module.MyInterface`**`\"\
  />`\n`</file>`\n\n##### 影子文件\n\n*.shadow* 文件是一种指向 *.instance* 文件的引用链接。它们主要用于使用对象的单例实例时，例如操作。这些实例由\
  \ `Actions` 文件夹中的 .instance 文件定义。然后，`Menu` 或 `Toolbars` 文件夹中的条目通过使用 .shadow 文件来引用该操作。.shadow\
  \ 文件既可以引用系统文件系统中的文件，也可以引用磁盘上的文件。收藏夹模块就是通过这种方式存储其条目的。指向 .instance 文件的路径由 `originalFile`\
  \ 属性指定（参见清单 3-5）。\n\n***清单 3-5**，连接 .shadow 文件与 .instance 文件*\n\n`<folder name=\"\
  Actions\">`\n`  <folder name=\"Window\">`\n`    <file name=\"com-galileo-netbeans-module-MyAction.`**`instance`**`\"\
  />`\n`  </folder>`\n`</folder>`\n`<folder name=\"Menu\">`\n`  <folder name=\"Window\"\
  >`\n`    <file name=\"MyAction.`**`shadow`**`\">`\n`      <attr name=\"originalFile\"\
  `\n`            stringvalue=\"Actions/Window/com-galileo-netbeans-module-MyAction.`**`instance`**`\"\
  />`\n`    </file>`\n`  </folder>`\n`</folder>`\n\n#### 属性值\n\n大多数情况下，系统文件系统中的文件条目会通过属性进行扩展。不过，这些属性可能具有完全不同的含义。例如，注册操作的名称由属性定义。在其他地方，可以通过属性定义类名或工厂方法。系统文件系统提供了一系列类型，通过这些类型，属性值变得可用；利用这些属性，可以读取不同的属性值。表\
  \ 3-1 展示了最常见的类型及其含义。所有类型都列在文件系统 DTD 中（参见附录）。\n\n![图片](img/t0301.jpg)\n\n由 `methodvalue`\
  \ 类型指示的工厂方法具有不同的签名：\n\n`static MyClass factoryMethod();`\n`static MyClass factoryMethod(FileObject\
  \ fo);`\n`static MyClass factoryMethod(FileObject fo, String attrName);`\n`static\
  \ MyClass factoryMethod(Map attrs);`\n`static MyClass factoryMethod(Map attrs, String\
  \ attrName);`\n\n通过 `FileObject` 参数，你可以以一种简单的方式访问系统文件系统中的相应条目。利用这个对象，你可以访问相关的属性（比较\
  \ *文件类型* 一节）。当使用 `Map` 作为工厂方法的参数时，你可以直接获取这些属性。\n\n#### 访问系统文件系统\n\n当然，你自己的模块文件夹、文件和属性也可以从层文件中使用，以便为其他人提供模块扩展点。你可以通过以下调用来访问系统文件系统以读取条目：\n\
  \n`FileUtil.`**`getConfigRoot`**`();`\n\n此调用将系统文件系统的根目录作为 `FileObject` 提供。从那里，你可以访问整个内容。如果你想访问系统文件系统中的特定路径，也可以使用以下方法：\n\
  \n`FileUtil.`**`getConfigFile`**`(String path);`\n\n在第 10 章中，我将向你展示一个示例，说明如何在层文件中定义自己的条目，读取它们，从而为其他模块提供一个扩展点。\n\
  \n\n\n### 创建模块\n\n现在是时候创建你的第一个模块了。NetBeans IDE 中集成的示例应用程序也提供了很好的模块开发入门介绍。为简单起见，你只需在此设计一个单独的模块。\n\
  \n首先，创建一个 NetBeans 平台应用程序或模块套件。这样，你将能够更轻松地执行和测试模块，并且可以定义对你自己的模块和库的依赖关系（请参阅“定义依赖关系”部分）。之后，你甚至可以创建一个独立的富客户端发行版（请参阅第\
  \ 35 章）。\n\nNetBeans IDE 提供了一个向导来帮助你应用 NetBeans 平台应用程序项目。\n\n1.  启动 NetBeans IDE，然后在菜单中选择\
  \ *文件* ![Image](img/U001.jpg) *新建项目*…。在左侧出现的对话框中会显示不同的项目类别。在此选择 *NetBeans 模块*。然后在右侧选择项目类型\
  \ *NetBeans 平台应用程序*（请参阅图 3-3）。\n\n![Image](img/0303.jpg)\n\n***图 3-3.** 创建一个新的 NetBeans\
  \ 平台应用程序项目*\n\n2.  在下一页，为应用程序命名（例如，My Application），并选择项目保存的位置。其余字段可以留空。\n3.  点击\
  \ *完成* 按钮以创建 NetBeans 平台应用程序项目。\n4.  现在可以创建第一个模块了；此任务有另一个向导可用。打开 *文件* ![Image](img/U001.jpg)*新建项目*\
  \ … 菜单。选择类别 *NetBeans 模块*，然后在右侧选择项目类型 *模块*。\n5.  点击 *下一步* 按钮进入下一页，为项目命名。在此输入，例如，My\
  \ Module，然后选择选项 *添加到模块套件*，并从列表中选择先前创建的 NetBeans 平台应用程序或模块套件。\n6.  在最后一页，定义代码名称基址和模块显示名称。本地化包的默认值可以保留。为了完整起见，激活选项\
  \ *生成 XML 层* 以创建一个层文件。如果不需要，可以稍后将其删除，同时删除清单文件中的相关条目。\n7.  点击 *完成* 按钮，让向导生成模块，如图\
  \ 3-4 所示。\n\n![Image](img/0304.jpg)\n\n***图 3-4.** 新模块的配置*\n\n在“项目”窗口中查看该模块，你会看到\
  \ *源包* 文件夹。目前，此文件夹仅包含 *Bundle.properties* 和 *layer.xml* 文件。*Bundle.properties* 文件仅为清单文件中注册的信息提供一个本地化包。*layer.xml*\
  \ 文件提供了所谓的 *层树*，这是一种特殊视图，你可以在 *重要文件* 文件夹中找到它。它提供两种不同的视图。一方面，有 *<此层>* 文件夹，其中仅显示你的层文件的内容。另一方面，有\
  \ *<上下文中的此层>* 文件夹，其中显示了属于你的 NetBeans 平台应用程序的模块的层文件条目。此视图也表示为系统文件系统，就像运行时提供给平台的那样。\n\
  \n在此视图中，模块的条目（你正在查看其文件夹的模块）以粗体显示。这让你可以概览最重要的默认文件夹，并且你可以直接移动、删除或添加条目。此外，你可以在 *重要文件*\
  \ 文件夹中找到同样由向导创建的清单文件（请参阅图 3-5）。\n\n![Image](img/0305.jpg)\n\n***图 3-5.** 项目窗口中的模块*\n\
  \n你现在可以启动已创建的模块作为富客户端应用程序。为此，请在菜单中选择 *运行 ![Image](img/U001.jpg) 运行主项目 (F6)* 或在你\
  \ NetBeans 平台应用程序项目的上下文菜单中选择 *运行*。（请参阅图 3-6）。\n\n![Image](img/0306.jpg)\n\n***图\
  \ 3-6.** 你的 NetBeans 平台应用程序的基本结构*\n\n我们仅用几个步骤就应用了 NetBeans 平台应用程序的基本结构。在接下来的章节中，我们将逐步为我们的模块配备功能，例如窗口和菜单项。通过这种方式，我们将丰富富客户端应用程序。\n\
  \n### 版本控制与依赖关系\n\n为了确保模块化系统保持一致性和可维护性，系统内的模块规定它们需要使用的模块至关重要。为此，NetBeans 平台允许定义对其他模块的依赖关系。只有定义了依赖关系，一个模块才能访问另一个模块的代码。依赖关系在模块的清单文件中设置。当模块被加载时，模块系统会读取该信息。\n\
  \n#### 版本控制\n\n为了保证依赖关系之间的兼容性，你必须定义版本；例如，*主发行版本*、*规范版本* 和 *实现版本*。这些版本基于 Java 包版本控制规范，并反映了依赖关系的基本概念。你可以在模块的“属性”对话框中定义和编辑依赖关系，该对话框可以通过\
  \ *属性 ![Image](img/U001.jpg) API 版本控制* 访问（请参阅图 3-7）。\n\n首先，在此窗口中定义 *主发行版本*。此版本用于通知用户与模块先前版本相比存在不兼容的更改。在此，斜杠用于在清单文件中将代码名称基址与版本分开：\n\
  \n**`OpenIDE-Module`**`: com.galileo.netbeans.module`**`/1`** ![Image](img/0307.jpg)\n\
  \n***图 3-7.** 设置模块版本*\n\n最重要的版本是 *规范版本*。使用杜威十进制格式来定义此版本：\n\n**`OpenIDE-Module-Specification-Version`**`:\
  \ 1.0.4`\n\n*实现版本* 是自由定义的文本。通常，使用一个时间戳，提供日期和时间。通过这种方式，你可以确定其唯一性。如果在模块的“属性”对话框中未显式设置，IDE\
  \ 会在创建模块时使用当前时间戳添加实现版本，设置在清单文件中：\n\n**`OpenIDE-Module-Implementation-Version`**`:\
  \ 200701231820`\n\n另一方面，如果你在“属性”对话框中定义了自己的实现版本，IDE 会添加带有当前时间戳的 `OpenIDE-Module-Build-Version`\
  \ 属性。\n\n在公共包列表中，列出了你模块中的所有包。要将一个包暴露给其他模块，请勾选你想要暴露的包旁边的复选框。这样做，你就定义了模块的 API。暴露的包在清单文件中如下列出：\n\
  \n**`OpenIDE-Module-Public-Packages:`**\n`   com.galileo.netbeans.module.*,`\n`   com.galileo.netbeans.module.model.*`\n\
  \n要限制对公共包的访问（例如，只允许你自己的模块访问公共包），你可以定义模块的 *好友*。你可以在“属性”对话框的“API 版本控制”部分的公共包列表下方定义它们。然后，这些好友在清单文件中如下列出：\n\
  \n**`OpenIDE-Module-Friends`**`:`\n`   com.galileo.netbeans.module2,`\n`   com.galileo.netbeans.module3`\n\
  \n#### 定义依赖关系\n\n基于这些不同的版本，定义你明确的依赖关系。为此，有三种不同类型的依赖关系可用：模块依赖于模块、包或 Java 版本。\n\n\
  **无依赖关系则无法访问**\n\n要使用来自另一个模块（包括 NetBeans 平台自身的模块）的类，你必须首先按照以下章节所述定义一个依赖关系。这意味着，如果你在模块中使用了一个\
  \ NetBeans 平台类，而代码编辑器找不到所需的类，通常只需设置对提供该类的模块的依赖关系即可解决问题。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n##### 模块依赖关系\n\n您可以通过 *属性 ![Image](img/U001.jpg) 库* 来定义和编辑模块依赖关系，如图 3-8 所示。\n\
