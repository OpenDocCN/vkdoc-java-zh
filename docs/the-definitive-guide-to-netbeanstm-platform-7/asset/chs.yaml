  \ panel;`\n`   }`\n\n`public void` **`update`**`() {`\n`      getPanel().load();`\n\
  `      changed = false;`\n`   }`\n\n`public void` **`applyChanges`**`() {`\n`      getPanel().store();`\n\
  `      changed = false;`\n`   }`\n\n`public void` **`cancel`**`() {`\n`   }`\n\n\
  `public boolean` **`isValid`**`() {`\n`      return getPanel().valid();`\n`   }`\n\
  \n`public boolean` **`isChanged`**`() {`\n`      return changed;`\n`   }`\n\n`public\
  \ HelpCtx` **`getHelpCtx`**`() {`\n`      return null;`\n`   }`\n\n\n\n`   public\
  \ void addPropertyChangeListener(`\n`      PropertyChangeListener l) {`\n`     \
  \ pcs.addPropertyChangeListener(l);`\n`   }`\n\n`   public void removePropertyChangeListener(`\n\
  `      PropertyChangeListener l) {`\n`      pcs.removePropertyChangeListener(l);`\n\
  `   }`\n\n`public void` **`changed`**`() {`\n`      if (!changed) {`\n`        \
  \ changed = true;`\n`         pcs.firePropertyChange(OptionsPanelController.PROP_CHANGED,\
  \ false, true);`\n`      }`\n`      pcs.firePropertyChange(OptionsPanelController.PROP_VALID,\
  \ null, null);`\n`   }`\n`}`\n\n选项面板通过注解注册，从而被添加到选项对话框中。不包含次级面板的主面板使用 `@OptionsPanelController.TopLevelRegistration`\
  \ 注解。作为次级面板容器的主面板使用 `@OptionsPanelController.ContainerRegistration` 注解。次级面板通过 `@OptionsPanelController.SubRegistration`\
  \ 注解注册。该注解被添加到控制器上，而控制器本身负责创建对应的面板。\n\n#### 主面板\n\n使用注解注册主面板时，必须通过 `categoryName`\
  \ 属性指定名称，并通过 `iconBase` 属性指定图标（参见清单 20-3）。图标和名称位于选项对话框的顶部栏中（参见图 20-1）。可选地，你可以添加\
  \ `keywords` 和 `keywordsCategory` 属性并赋予适当的值，以便通过快速搜索找到该选项面板。此外，你还可以通过 `id` 属性分配一个标识符。使用此标识符，可以通过\
  \ `OptionsDisplayer.open()` 方法直接打开面板。理想情况下，你应为此使用控制器类中的一个常量字符串。你可以通过 `position`\
  \ 属性影响选项对话框中面板的显示顺序。请注意，你还可以通过 `#` 符号从 *Bundle.properties* 文件中读取与当前显示注解相关的值。\n\n\
