  **`  LayerWidget`** `layer1 = new LayerWidget(sc);`\n`      sc.`**`addChild`**`(layer1);`\n\
  **`  ImageWidget`** `w1 = new ImageWidget(sc,`\n`         ImageUtilities.loadImage(\"\
