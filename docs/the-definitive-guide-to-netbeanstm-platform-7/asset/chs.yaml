  ***图 31-7.** 用于演示通过 Web 服务访问 EJB 的 NetBeans 平台应用程序*\n\n您无需自己创建 `OrderService` 对象。相反，已创建的\
  \ `OrderService_Service` 类会通过 `getOrderServicePort()` 方法为您提供一个实例（请参见清单 31-6）。然后，您可以在此实例上完全透明地执行服务器端实现的方法。通过单击*重新加载*按钮，所有产品将被选中并添加到表格中。通过*添加到购物车*，所有选中的产品将被传输到\
