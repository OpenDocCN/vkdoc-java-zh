  \n### 图形组件的异步初始化\n\n在开发图形用户界面时，实现快速响应时间非常重要。对于组件的初始化阶段尤其如此，这些组件需要在与用户的对话框中初始化。一个很好的例子是向导，这在第\
  \ 13 章中讨论过。如果用户启动一个向导，该向导应立即打开并可用。但通常，组件（如下拉框）的数据需要从相对较慢的数据源加载，或者必须根据依赖数据进行计算和组合。在这种情况下，请在单独的线程中异步初始化您的组件，与用户界面的其余初始化分开。这样做时，请注意不要从事件分发线程（EDT）外部访问\
  \ GUI 组件。\n\nNetBeans *Utilities API* 通过服务提供者接口 `AsyncGUIJob` 提供了一种满足此要求的简单方法。该接口指定了两种方法来帮助异步初始化组件。`construct()`\
  \ 方法会在单独的线程中自动执行，因此 EDT 不会被阻塞。这使您可以加载数据或执行其他长时间运行的初始化，而不会影响性能。但是，不要在 `construct()`\
  \ 方法中访问 GUI 组件。一旦 `construct()` 方法返回，就会调用 `finished()` 方法。由于它是从事件分发线程调用的，因此您可以将之前在\
  \ `construct()` 方法中加载的数据添加到 GUI 组件中。在清单 15-3 的示例中，数据（在 `construct()` 中加载）被添加到一个\
  \ `DefaultComboBoxModel` 中。加载后，您在 `finished()` 方法中将创建的数据模型添加到 `JComboBox`。此异步过程通过\
  \ `Utilities.attachInitJob()` 方法启动并连接到组件。这样，就可以为各种组件定义和启动独立的作业。\n\n***清单 15-3.**\
  \ 使用 AsyncGUIJob 接口异步初始化图形组件*\n\n`public final class AsynchTopComponent extends\
  \ TopComponent {`\n`   private JComboBox items = new JComboBox(new String[] { \"\
  加载中...\" });`\n`   private DefaultComboBoxModel m = new DefaultComboBoxModel();`\n\
  \n`   private AsynchTopComponent() {`\n`      initComponents();`\n**`Utilities.attachInitJob`**`(items,`\
  \ **`new AsyncGUIJob`**`(){`\n`public void` **`construct`**`() {`\n`            //\
  \ 长时间的数据加载`\n`            for(int i = 0; i < 20; i++) {`\n`               Thread.sleep(200);`\n\
  `               m.addElement(\"项目 \" + i);`\n`            }`\n`         }`\n\n`public\
  \ void` **`finished`**`() {`\n`            items.setModel(m);`\n`         }`\n`      });`\n\
  `   }`\n`}`\n\n另一种异步初始化 GUI 组件的可能性是 Java 平台的 `SwingWorker` 类。它是一个抽象类，其初始化组件的方式与通过\
  \ `AsyncGUIJob` 接口几乎相同。使用 `SwingWorker` 类，前面使用 `AsyncGUIJob` 的示例如清单 15-4 所示。\n\n\
  ***清单 15-4.** 使用 SwingWorker 类异步初始化图形组件*\n\n**`SwingWorker`**`<DefaultComboBoxModel,\
  \ String> worker =`\n`new` **`SwingWorker`**`<DefaultComboBoxModel, String>() {`\n\
  \n`   @Override`\n`protected DefaultComboBoxModel` **`doInBackground()`** `throws\
  \ Exception {`\n`      // 长时间的数据加载`\n`      for(int i = 0; i < 20; i++) {`\n`         Thread.sleep(200);`\n\
  `         m.addElement(new String(\"项目 \" + i));`\n`      }`\n**`return m;`**\n\
  `   }`\n\n`   @Override`\n`protected void` **`done()`** `{`\n`      try {`\n`         items.setModel(`**`get()`**`);`\n\
  `      } catch (Exception ignore) {}`\n`   }`\n`};`\n\n`worker.`**`execute()`**`;`\n\
  \n\n\n与`construct()`方法类似，数据在`doInBackground()`方法中被创建（或加载）。与`construct()`方法不同的是，我们将创建的数据作为函数的返回值传递（参见清单\
  \ 15-5）。返回类型由`SwingWorker`类的第一个模板参数定义——在本例中为`DefaultComboBoxModel`。此方法也在 EDT 之外执行。`done()`方法是`finished()`方法的对应方法，一旦`doInBackground()`方法执行完毕，就会在\
  \ EDT 内部调用它。通过使用`get()`方法，你可以接收由`doInBackground()`准备的数据。\n\n`SwingWorker`类的其他非常有用的特性是`publish()`和`process()`方法。通过使用`publish()`，数据可以从异步执行的`doInBackground()`方法发送到\
  \ EDT，并通过调用`process()`进行处理。\n\n***清单 15-5.** 使用 SwingWorker 类在初始化阶段直接添加数据*\n\n`items.setModel(m);`\n\
  **`SwingWorker`**`<DefaultComboBoxModel,` **`String`**`> worker =`\n`new` **`SwingWorker`**`<DefaultComboBoxModel,`\
  \ **`String`**`>() {`\n\n`   @Override`\n`protected DefaultComboBoxModel` **`doInBackground`**`()\
  \ throws Exception {`\n`      for(int i = 0; i < 20; i++) {`\n`         Thread.sleep(200);`\n\
  **`publish`**`(\"Item \" + i);`\n`      }`\n`      return m;`\n`   }`\n\n`   @Override`\n\
  `protected void` **`process`**`(List<String> chunks) {`\n`      m.addElement(chunks.iterator().next());`\n\
  `   }`\n`};`\n\n`worker.execute();`\n\n与其在`done()`方法中设置数据模型，不如立即添加元素。在`doInBackground()`方法中，单个条目会立即使用`publish()`发送到\
  \ EDT。这些条目通过`process()`方法接收并插入到组合框中，因此它们会立即显示出来。`publish()`和`process()`的参数类型由`SwingWorker`类的第二个模板参数定义。\n\
  \n### 撤销/重做\n\n你可以使用上下文接口`UndoRedo.Provider`为任何组件（并为用户）提供撤销/重做支持。如果某个组件位于全局代理查找（实现了`UndoRedo.Provider`接口）中，则默认情况下，撤销/重做按钮（在工具栏和*编辑*菜单中）会自动激活。\n\
  \n撤销和重做功能由`UndoRedo`接口定义。该接口由`UndoRedo.Manager`类实现。此管理器派生自 Java 平台的`UndoManager`类。该类负责管理可以撤销或重建的更改。此管理器的一个实例通过`UndoRedo.Provider`接口指定的`getUndoRedo()`方法返回给你的组件。\n\
  \n将要添加到管理器的事件高度依赖于上下文。这些事件的接口由`UndoableEdit`指定。Java 已经为此接口提供了一些抽象实现，例如`AbstractUndoableEdit`类。该类为所有方法提供了标准实现。因此，你只需覆盖你需要的方法。`StateEdit`类和相应的`StateEditable`接口也非常有用。`StateEditable`接口必须由那些其数据可能被用户更改的对象实现。例如，一个代表\
  \ MP3 文件的`DataObject`类，其 ID3 信息可以由用户更改。\n\n清单 15-6 基于一个非常简单的类演示了这一原理，该类只有一个可以通过文本字段由用户更改的特性。你将撤销/重做管理器（可以通过`getUndoRedo()`方法提供）作为私有数据元素保存。`TopComponent`有两个按钮：一个用于读取数据对象的属性，另一个用于保存文本字段中所做的更改。如果进行了更改，首先创建一个实现`UndoableEdit`接口的`StateEdit`对象。你必须将一个`StateEditable`实例传递给此对象。当然，这就是你的数据对象。然后，将通过这种方式创建的`UndoableEdit`实例，通过`undoableEditHappened()`方法传递给管理器（它会通知所有监听器）。这样，所有平台的撤销和重做操作按钮都会自动激活或停用。现在，你可以在数据对象中进行所有更改，然后通过`end()`方法结束事件。\n\
  \n***清单 15-6.** 提供撤销/重做管理器并在用户更改数据时添加元素*\n\n`import javax.swing.event.UndoableEditEvent;`\n\
  `import javax.swing.undo.StateEdit;`\n`import org.openide.awt.UndoRedo;`\n`...`\n\
  `public class MyTopComponent extends TopComponent implements UndoRedo.Provider {`\n\
  `private` **`UndoRedo.Manager`** `manager = new` **`UndoRedo.Manager`**`();`\n`   private\
  \ MyObject obj = new MyObject();`\n\n`   @Override`\n`public UndoRedo` **`getUndoRedo`**`()\
  \ {`\n`      return manager;`\n`   }`\n\n`   private void loadActionPerformed(ActionEvent\
  \ evt) {`\n`      textField.setText(obj.getProp());`\n`   }`\n\n`   private void\
  \ saveActionPerformed(ActionEvent evt) {`\n**`StateEdit edit = new StateEdit(obj);`**\n\
  `      manager.`**`undoableEditHappened`**`(new` **`UndoableEditEvent`**`(obj, edit));`\n\
  `      obj.setProp(textField.getText());`\n**`edit.end();`**\n`   }`\n`}`\n\n数据对象（其更改将被撤销或恢复）必须实现`StateEditable`接口。该接口指定了`storeState()`和`restoreState()`两个方法。`StateEdit`类的原理基于将数据对象的特性存储在一个`Hashtable`中。然后，这个`Hashtable`由`StateEdit`对象管理；在创建`StateEdit`对象时调用`storeState()`方法。在应用更改之前，特性被存储到哈希表（即被传递）中。如果用户想要再次撤销某些更改，`StateEdit`对象会调用`restoreState()`方法。此方法传递一个包含原始值的`Hashtable`。你只需读取这些值并应用它们即可。（参见清单\
  \ 15-7。）\n\n***清单 15-7.** 需要恢复已更改特性的数据对象*\n\n`public class MyObject implements`\
  \ **`StateEditable`** `{`\n`   private String prop = new String(\"init value\");`\n\
  \n`public void` **`storeState`**`(Hashtable<Object, Object> props) {`\n`      props.put(\"\
  prop\", prop); // 保存原始状态`\n`   }`\n\n`public void` **`restoreState`**`(Hashtable<?,\
  \ ?> props) {`\n`      prop = (String)props.get(\"prop\"); // 读取原始状态`\n`   }`\n\n\
  `   public void setProp(String value) {`\n`      prop = value;`\n`   }`\n\n`   public\
  \ String getProp() {`\n`      return prop;`\n`   }`\n`}`\n\n最后，我将说明向文本组件添加撤销/重做功能是多么容易；此功能对文本尤其有用。`JTextComponent`的所有子类——默认情况下包括`JEditorPane`、`JTextArea`和`JTextField`——都拥有一个`Document`作为数据模型。你可以通过`addUndoableEditListener()`方法向`Document`实例添加一个`UndoableEditListener`。NetBeans\
  \ 的`UndoRedo.Manager`也实现了此监听器接口。你可以将此管理器（之前存储在`TopComponent`中并由`getUndoRedo()`方法返回）作为监听器添加到`Document`实例。这意味着，通过添加一行代码，你就可以为文本组件添加撤销/重做功能：\n\
  \n`textField.getDocument().`**`addUndoableEditListener`**`(manager);`\n\n现在，文本组件本身能够将其事件报告给管理器，而撤销和重做按钮则会相应地自动激活或停用。当然，通过这种方式，你可以为文本组件以及任何其数据模型实现了`Document`接口或使用了`Document`实现的组件（例如`HTMLDocument`和`PlainDocument`类）添加撤销支持。\n\
  \n\n\n### 摘要\n\n在本章中，你了解了 NetBeans 平台中与图形用户界面开发相关的一些实用接口、类和概念。你学习了 Java 平台的桌面集成功能，以及如何异步初始化\
  \ GUI 组件。最后，你还学习了如何实现撤销和重做功能。\n\n## 第三部分\n\n## 准备就绪：使用 NetBeans 平台标准模块\n\n## 第 16\
  \ 章\n\n## 帮助系统\n\nNetBeans 平台的帮助系统基于 *JavaHelp*。NetBeans 平台提供了一个包含 JavaHelp 库的模块，并提供了一个用于访问帮助系统的类（参见图\
  \ 16-1）。要使用帮助系统，你必须在你的模块中通过 *属性* ![Image](img/U001.jpg) *库* 设置对 *`JavaHelp 集成`*\
  \ 模块的依赖；应用程序中将自动提供菜单项 *帮助* ![Image](img/U001.jpg) *帮助内容*。用户可以通过此菜单项打开帮助窗口。\n\n![Image](img/1601.jpg)\n\
  \n***图 16-1.** 集成帮助系统的窗口*\n\n### 创建和集成帮助集\n\nNetBeans IDE 提供了一个用于设置帮助集的向导。这使得原本棘手的过程变得轻而易举。为此，请调用菜单项\
  \ *文件* ![Image](img/U001.jpg) *新建文件…*，在 *模块开发* 类别中选择文件类型 *JavaHelp 帮助集*，然后单击 *下一步*。在下一个（也是最后一个）页面上，你将看到由向导创建或更改的文件列表。单击\
  \ *完成* 以构成帮助集。\n\n帮助集通过 `HelpSetRegistration` 注解添加到模块中。创建的帮助集文件由向导存储在单独的 `docs`\
  \ 包中。由于帮助集没有 Java 文件，因此会创建一个 Java 文件（*package-info.java*）并添加注解，如清单 16-1 所示。\n\n\
  ***清单 16-1.** 通过注解注册帮助集*\n\n**`@HelpSetRegistration(helpSet`** `= \"module-hs.xml\"\
  , position = 3672)`\n`package com.galileo.netbeans.module.docs;`\n`import org.netbeans.api.javahelp.HelpSetRegistration;`\n\
  \n带有 `helpSet` 属性的 `HelpSetRegistration` 注解引用了实际的帮助集 XML 文件 *module-hs.xml*。此注解会在标准文件夹\
  \ `Services/JavaHelp` 中的层文件中生成一个条目。这也意味着，如果你有意避免使用注解，可以通过在层文件中添加如下条目来手动注册你的帮助集，如清单\
  \ 16-2 所示。\n\n***清单 16-2.** 在层文件中直接注册帮助集*\n\n`<folder name=\"`**`Services`**`\"\
  >`\n`   <folder name=\"`**`JavaHelp`**`\">`\n`      <file name=\"module-helpset.xml\"\
  \ url=\"module-helpset.xml\"/>`\n`   </folder>`\n`</folder>`\n\n因此，你在层文件中注册了 *module-helpset.xml*\
  \ 文件，该文件包含对帮助集的引用。层文件随后看起来像清单 16-3 所示。\n\n***清单 16-3.** 用于通过层文件注册的帮助集引用文件*\n\n`<?xml\
  \ version=\"1.0\" encoding=\"UTF-8\"?>`\n`<!DOCTYPE` **`helpsetref`** `PUBLIC`\n\
  `   \"-//NetBeans//DTD JavaHelp Help Set Reference 1.0//EN\"`\n`   \"http://www.netbeans.org/dtds/helpsetref-1_0.dtd\"\
  >`\n**`<helpsetref`** `url=\"`**`nbdocs:`**`/com/galileo/netbeans/module/docs/`**`module-hs.xml\"\
  /`**`>`\n\n在第一步中，你学习了如何使用 NetBeans 向导创建帮助集，以及如何通过单独的注解或通过层条目和额外的 XML 文件来注册帮助集。在接下来的章节中，我们将更详细地研究各个文件。\n\
  \n#### module-hs.xml\n\n这是描述和配置帮助集的核心文件。使用 `title` 元素为帮助集命名。在 `map` 元素中，你引用映射文件。在这些映射文件中包含了带有\
  \ ID 的 HTML 帮助页面；帮助集的内容由这些映射文件定义。通过 `view` 元素，你将帮助集的内容添加到目录和索引中（参见清单 16-4）。此外，你还定义了要使用的搜索引擎。\n\
  \n***清单 16-4.** 帮助集描述*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<!DOCTYPE`\
  \ **`helpset`** `PUBLIC`\n`   \"-//Sun Microsys Inc.//DTD JavaHelp HelpSet Version\
  \ 2.0//EN\"`\n`   \"http://java.sun.com/products/javahelp/helpset_2_0.dtd\">`\n\
  **`<helpset`** `version=\"2.0\">`\n`   <title>我的模块帮助</title>`\n`   <maps>`\n`      <homeID>com.galileo.netbeans.module.about</homeID>`\n\
  `      <mapref location=\"`**`module-map.xml\"/>`**\n**`</maps>`**\n**`<view`**\
  \ `mergetype=\"javax.help.AppendMerge\">`\n`      <name>TOC</name>`\n`      <label>目录</label>`\n\
  `      <type>javax.help.TOCView</type>`\n`      <data>`**`module-toc.xml`**`</data>`\n\
  **`</view>`**\n**`<view`** `mergetype=\"javax.help.AppendMerge\">`\n`      <name>Index</name>`\n\
  `      <label>索引</label>`\n`      <type>javax.help.IndexView</type>`\n`      <data>`**`module-idx.xml`**`</data>`\n\
  **`</view>`**\n**`<view`**`>`\n`      <name>Search</name>`\n`      <label>搜索</label>`\n\
  `      <type>javax.help.SearchView</type>`\n`      <data engine=\"com.sun.java.help.search.DefaultSearchEngine\"\
  >JavaHelpSearch</data>`\n**`</view>`**\n**`</helpset>`**\n\n#### module-map.xml\n\
  \n实际的 HTML 帮助页面在映射文件中注册，并通过 `target` 属性赋予一个唯一 ID。该唯一 ID 随后用于目录和索引。此外，这些确切的 ID 也用于\
  \ `HelpCtx` 对象，即用于实现上下文相关的帮助。（参见清单 16-5。）\n\n***清单 16-5.** 将帮助主题 ID 映射到 HTML 页面*\n\
  \n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<!DOCTYPE` **`map`** `PUBLIC`\n\
  `   \"-//Sun Microsystems Inc.//DTD JavaHelp Map Version 2.0//EN\"`\n`   \"http://java.sun.com/products/javahelp/map_2_0.dtd\"\
  >`\n**`<map`** `version=\"2.0\">`\n`   <mapID target=\"`**`com.galileo.netbeans.module.about\"\
  `** `url=`**`\"module-about.html\"/>`**\n**`</map>`**\n\n#### module-toc.xml\n\n\
  使用此文件，你可以确定目录的内容。在这里，你通过 `tocitem` 元素注册要添加到目录中的相应帮助页面的 ID。这样，`tocitem` 元素可以任意嵌套，以便对帮助页面进行分组。（参见清单\
  \ 16-6。）\n\n***清单 16-6.** 帮助集的目录*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n\
  `<!DOCTYPE` **`toc`** `PUBLIC`\n`   \"-//Sun Microsystems Inc.//DTD JavaHelp TOC\
  \ Version 2.0//EN\"`\n`   \"http://java.sun.com/products/javahelp/toc_2_0.dtd\"\
  >`\n`<`**`toc`** `version=\"2.0\">`\n`   <tocitem text=\"我的模块\">`\n**`<tocitem`**\
  \ `text=\"关于我的模块\" target=`**`\"com.galileo.netbeans.module.about\"/>`**\n`   </tocitem>`\n\
  **`</toc>`**\n\n#### module-idx.xml\n\n在此文件中，你使用 `indexitem` 元素列出要包含在索引中的帮助页面的 ID。（参见清单\
  \ 16-7。）\n\n***清单 16-7.** 帮助集的索引*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n\
  `<!DOCTYPE` **`index`** `PUBLIC`\n`   \"-//Sun Microsystems Inc.//DTD JavaHelp Index\
  \ Version 2.0//EN\"`\n`   \"http://java.sun.com/products/javahelp/index_2_0.dtd\"\
  >`\n`<`**`index`** `version=\"2.0\">`\n`   <`**`indexitem`** `text=\"关于我的模块\" target=`**`\"\
  com.galileo.netbeans.module.about\"/>`**\n**`</index>`**\n\n\n\n#### 帮助页面\n\n前面介绍的\
  \ XML 文件仅用于配置帮助集和帮助系统。你可以将帮助页面本身创建为标准 HTML 页面。向导在创建帮助集时已经创建了第一个示例页面，即 *module-about.html*\
  \ 文件。该文件也已通过 *module-map.xml* 文件附加到帮助集中。因此，你可以用完全相同的方式添加自己的帮助页面。\n\n### 在帮助页面中插入链接\n\
  \n在帮助页面内，你可以定义指向外部站点和其他帮助页面的链接，即使它们属于另一个模块。\n\n#### 指向外部网站的链接\n\n通常，外部网站会在外部浏览器中调用，因为帮助窗口不适合此目的。因此，负责此功能的是\
  \ `BrowserDisplayer` 类，你可以通过 `object` HTML 元素引用它。你通过 `content` 参数定义链接本身（参见清单 16-8）。\n\
  \n***清单 16-8.** 嵌入在帮助页面中的链接*\n\n**`<object`**\n`   classid=\"java:org.netbeans.modules.javahelp`**`.BrowserDisplayer\"\
  >`**\n`   <param name=`**`\"content\"`** `value=\"`**`http://www.netbeans.org\"\
  >`**\n`   <param name=\"text\" value=\"http://www.netbeans.org\">`\n`   <param name=\"\
  textFontSize\" value=\"medium\">`\n`   <param name=\"textColor\" value=\"blue\"\
  >`\n**`</object>`**\n\n`BrowserDisplayer` 类将链接传递给 `URLDisplayer` 服务。不过，NetBeans\
  \ 平台提供的该服务的默认实现会在 NetBeans 平台的内部 Web 浏览器中打开链接。由于此浏览器通常无法充分显示网站，因此对我们来说，最好的方式是调用操作系统的标准浏览器。由于\
  \ `URLDisplayer` 类被设计为服务，并且 Java 平台提供了一种调用标准浏览器的方法（通过 `Desktop` 类），你可以通过特定的服务提供者来实现这一点。为此，你需要创建\
  \ `ExternalURLDisplayer` 类，该类派生自服务类 `HtmlBrowser.URLDisplayer`。此接口位于 *UI Utilities*\
  \ 模块中，因此你必须在 *属性 ![Image](img/U001.jpg) 库* 下定义对该模块的依赖关系。此接口指定了 `showURL()` 方法，该方法获取要打开的链接作为\
  \ `URL` 对象。然后，你只需将此链接以 `URI` 对象的形式传递给 Java `Desktop` 类的 `browse()` 方法。接着，Java `Desktop`\
  \ 类会在其标准浏览器中打开相应的网站。（参见清单 16-9。）\n\n***清单 16-9.** 用于在外部打开帮助页面链接的服务提供者*\n\n**`@ServiceProvider`**\
  \ `(service = HtmlBrowser.URLDisplayer.class, position = 0)`\n`public class ExternalURLDisplayer\
  \ extends` **`HtmlBrowser.URLDisplayer{`**\n`public void` **`showURL`**`(URL link)\
  \ {`\n`      try {`\n**`Desktop.getDesktop().browse(link.toURI());`**\n`      }\
  \ catch(Exception ex) {`\n`         Logger.getLogger(\"global\").log(Level.SEVERE,\
  \ null, ex);`\n`         // 向用户显示消息对话框`\n`      }`\n`   }`\n`}`\n\n此服务提供者通过 `ServiceProvider`\
  \ 注解进行注册并发布（参见第 5 章）。\n\n#### 指向其他帮助页面的链接\n\n你可以通过 `href` 元素使用 `nbdocs` 协议轻松添加指向其他模块帮助页面的链接，如清单\
  \ 16-10 所示。\n\n***清单 16-10.** 指向其他模块帮助页面的链接*\n\n`<a` **`href=\"nbdocs:`**`//org.netbeans.modules.usersguide/org/netbeans/`\n\
  `   modules/usersguide/configure/configure_options.html\">使用选项对话框</a>`\n\n重要的是，你首先需要指明模块的代码名称基。在此示例中，它是\
  \ `org.netbeans.modules.usersguide`。随后，你定义帮助页面的路径。如果模块和帮助页面不可用，由于指定了代码名称基，帮助系统能够向用户显示相关信息。你以相同的方式链接到自己的模块内部帮助页面。\n\
  \n### 上下文相关帮助\n\n上下文相关帮助使用户能够直接访问与当前上下文相关的帮助和相应主题，用户实际上就处于该上下文中。因此，用户无需搜索所需主题，而是直接显示相应的页面。上下文相关帮助是通过将各个组件与相应帮助页面的\
  \ ID 连接来实现的。NetBeans 平台定义了 `HelpCtx.Provider` 接口，因此组件可以以简单的方式向帮助系统通告帮助 ID。此接口指定了\
  \ `getHelpCtx()` 方法，该方法必须由相应的组件实现，并返回一个包含 ID 的 `HelpCtx` 对象。\n\nNetBeans 平台 API\
  \ 的许多常用类已经实现了 `HelpCtx.Provider` 接口。例如，其中包括 `Node`、`DataObject`、`TopComponent`、`SystemAction`、`WizardDescriptor.Panel`\
  \ 和 `DialogDescriptor` 等类。然后，你只需在其子类中重写 `getHelpCtx()` 方法。通常，用户通过按 (*F1*) 来调用上下文帮助。在对话框或向导上会显示一个用于调用帮助的附加键，该键通过\
  \ `getHelpCtx()` 方法提供一个 ID。\n\n必须存在快捷键定义，以便可以通过 (*F1*) 调用帮助。如果 NetBeans 平台尚未定义（即你无法通过\
  \ (*F1*) 打开帮助窗口），你可以在层文件中使用以下条目自行定义此快捷键，如清单 16-11 所示。\n\n***清单 16-11.** 使帮助系统可通过\
  \ F1 访问。*\n\n`<folder name=`**`\"Shortcuts`**`\">`\n`   <file name=\"`**`F1`**`.shadow\"\
  >`\n`      <attr name=\"originalFile\"`\n`            stringvalue=\"Actions/Help/org-netbeans-modules-javahelp-`**`HelpAction.`**`instance\"\
  />`\n`   </file>`\n`</folder>`\n\n如果用户按下 (*F1*)，则会执行 `HelpAction`。`HelpAction` 会自动搜索当前获得焦点的组件。如果获得焦点的组件实现了\
  \ `HelpCtx.Provider` 接口，则通过 `getHelpCtx()` 方法确定帮助页面的 ID。此外，你还可以使用 **setHelpIDString()**\
  \ 方法为 `JComponent` 子类提供帮助 ID：\n\n`JComponent c = ...`\n`HelpCtx`**`.setHelpIDString`**`(c,\
  \ \"com.galileo.netbeans.module.about\");`\n\n请记住，你的组件必须是可聚焦的，以便 `HelpAction` 能够找到它。默认情况下，`TopComponent`\
  \ 类是不可聚焦的（你可以通过 `isFocusable()` 方法发现这一点）。你可以通过简单地调用 `setFocusable()` 来实现这一点。因此，一个通过\
  \ `getHelpCtx()` 提供其帮助 ID 的 `TopComponent` 子类将如清单 16-12 所示。\n\n***清单 16-12.** 组件的上下文相关帮助*\n\
  \n`public final class MyTopComponent extends TopComponent {`\n`   public MyTopComponent()\
  \ {`\n**`setFocusable`**`(true);`\n`   }`\n`public HelpCtx` **`getHelpCtx`**`()\
  \ {`\n`return new` **`HelpCtx`**`(\"com.galileo.netbeans.module.about\");`\n`   }`\n\
  `}`\n\n如果 `MyTopComponent` 获得焦点并且用户按下 (*F1*)，则会调用帮助系统和帮助页面。该帮助页面的 ID 为 `com.galileo.netbeans.module.about`。你可以在帮助集的映射文件中将此\
  \ ID 与所需页面关联起来（参见“创建和集成帮助集”一节）。如果你只想调用帮助窗口而不显示特定页面，可以返回 `HelpCtx.DEFAULT_HELP`。除此之外，你还可以将\
  \ `Class` 对象传递给 `HelpCtx` 构造函数，而不是以 `String` 形式传递 ID。然后，`HelpCtx` 对象会通过完整的类名来识别\
  \ ID。因此，如果你在 `MyTopComponent` 示例中使用了 `new` `HelpCtx(getClass())`，则帮助 ID 将为 `com.galileo.netbeans.module.MyTopComponent`。\n\
  \n\n\n### 打开帮助系统\n\n如果你想自行调用帮助系统，可以通过 Lookup 进行访问。其中注册了一个 `Help` 类的实现（参见清单 16-13）。\n\
  \n***清单 16-13.** 调用关于特定主题的帮助系统*\n\n**`Help`** `h = Lookup.getDefault().lookup(`**`Help.`**`class);`\n\
  `if(h != null)`\n`   h`**`.showHelp`**`(new HelpCtx(\"`**`com.galileo.netbeans.module.about`**`\"\
  ));`\n`   // h.showHelp(HelpCtx.DEFAULT_HELP);`\n\n你将一个代表帮助页面的 `HelpCtx` 实例传递给 `showHelp()`\
  \ 方法。将你在映射文件中确定的所需帮助页面的 ID 传递给构造函数。如果你想打开显示默认帮助页面的帮助窗口，可以使用 `HelpCtx.DEFAULT_HELP`。\n\
  \n### 总结\n\n在本章中，你学习了如何使用基于标准 JavaHelp 框架的 NetBeans 平台帮助系统。我们探讨了如何创建自己的帮助集以及如何在帮助页面中插入链接。本章你学到的一个重要内容是，如何创建上下文相关的帮助。\n\
  \n## 第 17 章\n\n## 输出窗口\n\nNetBeans 平台提供了*输出窗口*模块，作为一个舒适且实用的显示区域，用于向用户显示消息。多个不同的输出可以在不同的标签页中并行输出。输出窗口与\
  \ NetBeans 平台的 I/O API 紧密相连。因此，标准的 I/O 提供程序实现会将其输出重定向到输出窗口。（参见图 17-1。）\n\n![图片](img/1701.jpg)\n\
  \n***图 17-1.** 输出窗口*\n\n### 生成输出\n\n首先，在 NetBeans 平台应用程序的属性中，在 *属性 ![图片](img/U001.jpg)\
  \ 库* 下，确保 *输出窗口* 和 *I/O API* 这两个模块在 *平台* 集群中被激活，这样该模块才可供你使用，因为你只能在此处激活模块后才能定义对它们的依赖关系。现在，你必须在想要使用输出窗口的模块中定义对\
  \ I/O API 模块的依赖关系。为此，打开你的模块的 *属性*，并在 *库* 下通过 *添加依赖项…* 按钮添加 I/O API 模块作为依赖项。然后，你的输出可能如清单\
  \ 17-1 所示。\n\n***清单 17-1.** 使用输出窗口模块*\n\n`InputOutput io =` **`IOProvider.getDefault().getIO`**`(\"\
  Task\", true);`\n`io.`**`getOut`**`().println(\"信息消息\");`\n`io.`**`getErr`**`().println(\"\
  错误消息\");`\n`io.getOut().close();`\n`io.getErr().close();`\n\n你通过 Lookup 上的 `IOProvider.getDefault()`\
  \ 方法获取位于输出窗口中的 `IOProvider` 服务的服务提供者。如果输出窗口模块（以及服务提供者）不存在，`getDefault()` 方法将提供一个标准实现，该实现会将输出写入标准输出。因此，输出窗口是作为全局服务实现的。（更多信息请参见第\
  \ 5 章。）因此，输出窗口可以很容易地被你自己的窗口替代，而无需修改源代码。`getIO()` 方法返回一个 `InputOutput` 对象，你可以通过它访问窗口。你可以定义一个显示在标签页或标题中的名称。通过\
  \ `boolean` 参数，你可以决定是创建一个新标签页，还是重用已存在的同名标签页。通过 `getOut()` 和 `getErr()` 方法，你可以获得一个\
  \ `OutputWriter` 类的对象。该类是 Java `PrintWriter` 类的子类。因此，你可以像往常一样使用 `println()` 输出消息。通过\
  \ `getErr()` 输出的文本在输出窗口中显示为红色。重要的是，当你完成所有输出后，必须使用 `close()` 方法再次关闭流。这样，原本以粗体显示的标签页名称会恢复正常显示，向用户表明任务已完成。如果显示了多个任务，你可以通过\
  \ `InputOutput.select()` 方法确保相应的任务处于活动状态。\n\n你可以通过菜单项 *窗口 ![图片](img/U001.jpg) 输出\
  \ ![图片](img/U001.jpg) 输出* 在你的应用程序中打开输出窗口。此菜单项由输出窗口模块添加。输出窗口提供了一个上下文菜单，例如，你可以使用它在输出中搜索，或删除某个标签页中的输出。\n\
  \n### 添加操作\n\n输出窗口包含一个工具栏，你可以在上面放置自己的操作。例如，在图 17-1 中有四个 Ant 特定的操作。为此，`getIO()` 方法有一个变体，它接受一个类型为\
  \ `Action` 的数组作为第二个参数。因此，可以传递非常简单的操作类，这些类只需实现 Java `Action` 接口即可。重要的是，你的操作类需要通过属性\
  \ `Action.SMALL_ICON` 定义一个可以在工具栏中显示的图标。接下来，你将看到一个此类操作的示例类，它派生自已经实现了 `Action` 接口的\
  \ `AbstractAction` 类。你在构造函数中创建一个 `ImageIcon`，并将其设置为 `SMALL_ICON` 属性。\n\n`public\
  \ class StopTask extends` **`AbstractAction`** `{`\n`   public StopTask() {`\n`      putValue(`**`SMALL_ICON`**`,\
  \ ImageUtilities.loadImageIcon(\"icon.gif\", true));`\n`   }`\n`   public void actionPerformed(ActionEvent\
  \ evt) {`\n`      // 停止任务`\n`   }`\n`}`\n\n现在，你将一个包含 `StopTask` 类实例的数组作为第二个参数传递给\
  \ `getIO()` 方法。\n\n`InputOutput io = IOProvider.getDefault().`**`getIO`**`(\"Task\"\
  ,` **`new Action[]{new StopTask()}`**`);`\n\n### 插入/显示超链接\n\n你可以通过前面描述的 `getOut()`\
  \ 和 `getErr()` 方法访问输出窗口。为此，这些方法返回一个 `OutputWriter` 实例。该类代表了 Java 平台 `PrintWriter`\
  \ 类的一个扩展。它指定了两个额外的 `println()` 方法，用于在输出窗口中显示超链接。为此，需要将文本作为 `String` 对象和一个 `OutputListener`\
  \ 实例传入。该监听器负责执行点击链接时要执行的操作。\n\n在清单 17-2 中，你通过 `getOut()` 方法访问相应的 `OutputWriter`\
  \ 实例。如前所述，`println()` 方法获取链接的名称和一个监听器。\n\n***清单 17-2.** 在输出窗口中创建超链接*\n\n`InputOutput\
  \ io = IOProvider.getDefault().getIO(\"Task\", true);`\n**`OutputWriter`** `ow =`\
  \ **`Io.getOut()`**`;`\n`try {`\n`   ow.`**`println`**`(\"我的链接\", new MyHyperlinkListener());`\n\
  `} catch (IOException ex) {`\n`   Exceptions.printStackTrace(ex);`\n`}`\n\n你可以使用\
  \ `OutputListener` 接口实现一个相应的监听器，如清单 17-3 所示。\n\n***清单 17-3.** 用于响应输出窗口中超链接的监听器*\n\
  \n`import org.openide.windows.OutputEvent;`\n`import org.openide.windows.OutputListener;`\n\
  \n`public class MyHyperlinkListener implements` **`OutputListener`** `{`\n\n`   @Override`\n\
  `   public void outputLineSelected(OutputEvent ev) {`\n`      // 选择链接/行时的操作`\n`   }`\n\
  \n`   @Override`\n`public void` **`outputLineAction`**`(OutputEvent ev) {`\n`      //\
  \ 点击链接时的操作`\n`   }`\n\n`   @Override`\n`   public void outputLineCleared(OutputEvent\
  \ ev) {`\n`      // 删除链接/行时的操作`\n`   }`\n`}`\n\n如你在清单 17-3 中所见，你必须实现三个方法。你不仅需要响应点击操作，还必须响应选择和删除链接的操作。如果你需要在监听器内访问某个特定对象，只需创建一个相应的构造函数，并在添加链接或监听器时将要访问的对象传递给它即可。\n\
  \n\n\n### 摘要\n\n你可以将输出窗口用于自己的目的。因此，在开发时，你可以通过简单的方式创建输出，或者稍后向用户显示有用的信息。在本章中，你学习了如何访问输出窗口、如何添加自己的操作，以及如何插入和显示超链接。\n\
  \n## 第 18 章\n\n## 导航器\n\n你可以通过*导航器*窗口和*导航器 API* 显示上下文相关的面板。通常，NetBeans IDE 编辑器使用这些面板在文档中进行导航，例如，显示\
  \ Java 类的构造函数、方法和其他元素（参见图 18-1）。因此，用户可以在文档内导航。然而，这只是一个应用场景；导航器中显示的面板可用于任何目的。\n\n\
  ![图片](img/1801.jpg)\n\n***图 18-1.** 一个 .java 文件的导航器面板*\n\n导航器 API 通过接口 `NavigatorPanel`\
  \ 指定了可在导航器中显示的面板的接口。面板通过模块的层文件以声明方式添加。这样，面板就与特定的 MIME 类型关联。如果打开了具有相应 MIME 类型的文件，则会显示相应注册的面板。如果没有提供具有特定\
  \ MIME 类型的 `FileObject`、`DataObject` 或 `Node`（通过它们可以找到相应的导航器面板），则显示上下文的组件可以实现 `NavigatorLookupHint`\
  \ 接口。然后，该接口可以通过本地 Lookup 提供。此接口仅指定了一个可以返回 MIME 类型的方法。因此，如果不存在具有 MIME 类型的文件，导航器模块也能够找到面板。\n\
  \n### 创建面板\n\n我将继续使用第 5 章中的示例（通过添加一个额外的模块来扩展它），以向你展示导航器 API 的用法。该示例涉及一个能够显示 `Mp3FileObject`\
  \ 类型条目的搜索列表。当前选中的元素通过本地 Lookup 提供。该元素提供有关音乐标题的信息。你希望在新模块中使用此元素，并在导航器面板中显示当前艺术家的所有可用专辑。此过程在以下步骤和图\
  \ 18-2 中进行了说明。这个示例更清楚地说明了扩展基于 NetBeans 平台的应用程序并添加额外模块和组件是多么简单和灵活。\n\n![图片](img/1802.jpg)\n\
  \n***图 18-2.** 上下文相关的导航器面板*\n\n首先，你必须在 NetBeans 平台应用程序的 *属性 ![图片](img/U001.jpg)\
  \ 库*下激活*导航器 API* 模块（位于 *ide* 集群中），因为导航器 API 不属于平台的标准发行版，而是属于 IDE 发行版。然后，你创建一个名为\
  \ *MP3 Navigator* 的新模块，并将其添加到你的应用程序项目中。在 *属性 ![图片](img/U001.jpg) 库*下，添加对模块 *MP3\
  \ Object*、*Navigator API* 和 *Utilities API* 的依赖。清单 18-1 显示了这些模块中的类。之后，你通过向导创建一个新的\
  \ *JPanel 表单*。然后，在新创建的类中，将基类从 `JPanel` 更改为 `JComponent`，并实现 `NavigatorPanel` 和 `LookupListener`\
  \ 这两个接口。然后，你可以使用表单编辑器任意创建面板的内容。在此示例中，我只向面板添加了两个标签和一个列表来显示专辑。随后，展示了该类最重要的部分。完整且可运行的示例可以从本书的\
  \ Apress 网站源代码/下载区域 [`www.apress.com`](http://www.apress.com) 下载。\n\n***清单 18-1.**\
  \ 导航器面板实现的最重要部分*\n\n`public class` **`Mp3AlbumNavigatorPanel`** `extends` **`JComponent`**\n\
  `implements` **`NavigatorPanel`**`,` **`LookupListener`** `{`\n`   private Lookup.Result<Mp3FileObject>\
  \ result = null;`\n\n`   public Mp3AlbumNavigatorPanel() {`\n`      initComponents();`\n\
  `   }`\n\n`   @Override`\n`public JComponent` **`getComponent`**`() {`\n`return`\
  \ **`this`**`;`\n`   }`\n\n`   @Override`\n`public void` **`panelActivated`**`(Lookup\
  \ context) {`\n`      result = Utilities.actionsGlobalContext().lookupResult(Mp3FileObject.class);`\n\
  `      result.`**`addLookupListener`**`(this);`\n`   }`\n\n`   @Override`\n`public\
  \ void` **`panelDeactivated`**`() {`\n`      result.removeLookupListener(this);`\n\
  `      result = null;`\n`   }`\n\n`   @Override`\n`public void` **`resultChanged`**`(LookupEvent\
  \ event) {`\n`      Collection<? extends Mp3FileObject> mp3s = result.allInstances();`\n\
  `      if(!mp3s.isEmpty()) {`\n`         Mp3FileObject mp3 = mp3s.iterator().next();`\n\
  `         //search for albums of selected artist and display it`\n`         albumsOf.setText(mp3.getArtist());`\n\
  `         DefaultListModel model = new DefaultListModel();`\n`         model.addElement(\"\
  Album 1 of \" + mp3.getArtist());`\n`         model.addElement(\"Album 2 of \" +\
  \ mp3.getArtist());`\n`         albums.setModel(model);`\n`      }`\n`   }`\n`}`\n\
  \n导航器模块通过 `getComponent()` 方法获取要显示的面板，该方法指定了 `NavigatorPanel` 接口。当面板显示或隐藏时，会分别调用\
  \ `panelActivated()` 和 `panelDeactivated()` 方法。激活面板时，你通过全局代理 Lookup 为类类型 `Mp3FileObject`\
  \ 创建一个 `Lookup.Result`。全局代理 Lookup 提供搜索列表的本地 Lookup，其中包含已激活的 `Mp3FileObject`。你为\
  \ `Lookup.Result` 注册一个 `LookupListener`，以便能够在搜索列表中选择另一个条目时做出反应。当发生更改时，会调用 `resultChanged()`\
  \ 方法。在此方法中，你可以在导航器面板上显示所需的内容。为简单起见，此示例仅呈现两个条目。通常，你会在此位置在数据库中搜索该艺术家的专辑。\n\n\n\n###\
  \ 注册面板\n\n你必须在模块的图层文件中注册面板，以便导航器模块能够找到并创建该面板。为此，导航器模块定义了 `Navigator/Panels` 文件夹。在此文件夹下，将你的面板分配到一个\
  \ MIME 类型，该面板将针对此类型显示。此处选择 `audio/mpeg`。（参见清单 18-2。）不过，其他任何类型也是可行的。\n\n***清单 18-2.**\
  \ 在图层文件中注册导航器面板*\n\n`<folder name=\"`**`Navigator`**`\">`\n`   <folder name=\"`**`Panels`**`\"\
  >`\n`      <folder name=\"audio\">`\n`         <folder name=\"mpeg\">`\n`            <file\
  \ name=\"com-galileo-netbeans-module-mp3navigator-                         `**`Mp3AlbumNavigatorPanel`**`.instance\"\
  />`\n`         </folder>`\n`      </folder>`\n`   </folder>`\n`</folder>`\n\n现在，你应该思考导航器模块如何知道何时显示哪个面板。通常，导航器模块会读取当前活动节点的\
  \ MIME 类型。如果不存在节点（如本例所示），Navigator API 提供了 `NavigatorLookupHint` 接口。该接口指定了 `getContentType()`\
  \ 方法，上下文组件（本例中为 `Mp3SearchList` 类）通过该方法提供 MIME 类型，导航器面板将据此显示。你在 `Mp3SearchList`\
  \ 类中实现此接口，并返回 MIME 类型 `audio/mpeg`，与你之前在图层文件中注册面板时完全一致；参见清单 18-3。\n\n***清单 18-3.**\
  \ 实现 NavigatorLookupHint 接口，该接口决定要显示的面板*\n\n`import org.netbeans.spi.navigator.NavigatorLookupHint;`\n\
  `...`\n`public final class` **`Mp3SearchList`** `extends TopComponent implements\
  \ ListSelectionListener {`\n\n`   public Mp3SearchList() {`\n`      ...`\n`      associateLookup(new\
  \ ProxyLookup(new AbstractLookup(content),`\n`Lookups.singleton(new` **`Mp3AlbumNavigatorLookupHint`**`())));`\n\
  `   }`\n\n`private static final class Mp3AlbumNavigatorLookupHint implements` **`NavigatorLookupHint`**\
  \ `{`\n`public String` **`getContentType`**`() {`\n`         return \"`**`audio/mpeg`**`\"\
  ;`\n`      }`\n`   }`\n`}`\n\n你创建了内部类 `Mp3AlbumNavigatorLookupHint`，它实现了 `NavigatorLookupHint`\
  \ 接口。现在必须将此类的实例添加到你的本地 Lookup 中。由于你已经确定了一个 `AbstractLookup` 作为本地 Lookup，它包含了搜索列表中当前选中的条目，因此你不能直接添加此实例。所以，你必须创建一个\
  \ `ProxyLookup`，你可以将 `AbstractLookup` 和一个 Lookup（通过工厂 `Lookups` 创建）传递给它。然后，通过 `associateLookup()`\
  \ 方法将此代理 Lookup 定义为本地 Lookup。一旦顶层组件 `Mp3SearchList` 获得焦点，全局 Lookup 就会通知导航器模块存在一个\
  \ `NavigatorLookupHint` 实例。结果，导航器可以调用 `getContentType()` 方法，并根据返回值打开相应的导航器面板。\n\n\
  当然，当存在多个不同的面板时，导航器组件就变得有趣了。你可以创建任意数量的导航器面板，并在 `Navigator/Panels` 文件夹中分配相应的 MIME\
  \ 类型。然后，导航器模块会根据当前哪个组件处于活动状态，自动切换面板。最后，Navigator API 还提供了 `NavigatorHandler` 类。该类包含静态方法\
  \ `activatePanel()`，你可以向其传递一个 `NavigatorPanel` 实例。这样，你也可以通过编程方式打开面板。\n\n### 总结\n\
  \n导航器模块是一个用于显示上下文相关数据结构的通用组件。本章讨论了如何创建可由导航器模块显示的面板。你还学习了导航器模块定位面板的两种方法。\n\n## 第\
  \ 19 章\n\n## 属性\n\n通过**属性**窗口，你可以以简单的方式显示节点的属性。这意味着你可以显示由该节点表示的数据或操作的属性（更多信息请参见第\
  \ 12 章）。因此，你为用户提供了修改它的可能性。一组属性由 Nodes API 的 `Sheet` 类管理。`AbstractNode` 类（通常是节点的基类）通过\
  \ `getSheet()` 方法提供这样一个 `Sheet`。要提供这样一个 `Sheet`，你只需重写 `createSheet()` 方法。然后，你可以将你的特定属性添加到此\
  \ `Sheet` 中。我将提供一个示例来演示其工作原理。你想要显示刚刚选中或激活的 MP3 文件的 ID3 信息。不过，为简单起见，你并不读取 ID3 信息，而是仅使用固定的示例值；一个条件是，你至少拥有自己的节点类，该类派生自\
  \ `AbstractNode`。在第 7 章中创建 MP3 文件类型时，你看到默认使用的是 `DataNode` 类。那么，让我们再次查看 MP3 文件类型示例（你也可以直接使用\
  \ NetBeans 向导创建一个 MP3 文件类型）并实现你自己的节点类。属性窗口中显示的属性将类似于图 19-1 所示。\n\n![图片](img/1901.jpg)\n\
  \n***图 19-1.** 属性窗口中显示刚刚选中的节点的属性*\n\n\n\n### 提供属性\n\n如前所述，你必须在相应的节点类中重写 `createSheet()`\
  \ 方法；在本示例中，即新创建的 `Mp3DataNode` 类，它代表 *.mp3* 类型的文件。首先，你需要一个 `Sheet` 实例，你可以通过基类的方法轻松创建它，该方法已经为实例添加了一组基本属性（这是图\
  \ 19-1 中名为 *属性* 的第一个区域）。如果你不需要这些信息，当然也可以通过 `Sheet` 的标准构造函数自行创建实例。因此，你已经了解到，显示的属性可以按区域组织，用户可以根据需要隐藏或显示这些区域。此类区域的属性由\
  \ `Sheet.Set` 类管理。你通过工厂方法 `createPropertiesSet()` 创建两个 `Sheet.Set` 对象，以便应用 *ID3v1*\
  \ 和 *ID3v2* 这两个区域。重要的是，你需要通过 `setName()` 方法为 `Sheet.Set` 指定一个唯一的名称（用于内部管理），否则只会显示最后添加的\
  \ `Sheet.Set`。通过 `setDisplayName()` 方法，你可以确定该区域用作标题的名称。\n\n***清单 19-1.** 通过 createSheet()\
  \ 方法，你可以创建一个包含所需属性的 Sheet 实例，该实例将显示在属性窗口中。*\n\n`public class` **`Mp3DataNode`**\
  \ `extends DataNode {`\n`protected Sheet` **`createSheet`**`() {`\n`      Sheet\
  \ s = super.`**`createSheet`**`();`\n`      Sheet.Set id3v1 = Sheet.`**`createPropertiesSet`**`();`\n\
  `      Sheet.Set id3v2 = Sheet.`**`createPropertiesSet`**`();`\n`      id3v1.`**`setName`**`(\"\
  ID3v1\");`\n`      id3v1.setDisplayName(\"ID3v1\");`\n`      id3v2.`**`setName`**`(\"\
  ID3v2\");`\n`      id3v2.setDisplayName(\"ID3v2\");`\n`      Mp3DataObject mp3 =getLookup().`**`lookup`**`(Mp3DataObject.class);`\n\
  \n`      try {`\n**`Property`** `artistProp =`\n`            new PropertySupport.Reflection<String>(mp3,\
  \ String.class, \"`**`artist`**`\");`\n**`Property`** `titleProp  =`\n`            new\
  \ PropertySupport.Reflection<String>(mp3, String.class, \"`**`title`**`\");`\n**`PropertySupport.Reflection`**`<String>\
  \ genreProp  =`\n`            new PropertySupport.Reflection<String>(mp3, String.class,\
  \ \"`**`genre`**`\");`\n**`Property`** `trackProp =`\n`            new PropertySupport.Reflection<Integer>(mp3,\
  \ Integer.class, \"`**`getTrack`**`\",` **`null`**`);`\n\n`         artistProp.setName(\"\
  Artist\");`\n`         titleProp.setName(\"Title\");`\n`         genreProp.setName(\"\
  Genre\");`\n`         trackProp.setName(\"Track\");`\n`         id3v1.`**`put`**`(artistProp);`\n\
  `         id3v1.`**`put`**`(titleProp);`\n`         id3v1.`**`put`**`(genreProp);`\n\
  `         id3v2.`**`put`**`(trackProp);`\n`      } catch (NoSuchMethodException\
  \ ex) {`\n`         ex.printStackTrace();`\n`      }`\n**`s.put(id3v1);`**\n**`s.put(id3v2);`**\n\
  `      return s;`\n`   }`\n`}`\n\n你可以通过 Lookup 访问数据对象，即提供这些特性的 MP3 文件。然后，你为每个属性创建一个对象，确保区分用户可更改的属性与只读属性。对于用户能够在*属性*窗口中更改的特性，你创建一个带有相应类型（此处为\
  \ `String`）的 `PropertySupport.Reflection` 实例。第一个参数传入数据对象；第二个参数传入属性的数据类型；第三个参数传入相应属性的\
  \ get 和 set 方法的名称。例如，对于第一个属性，你传入 `artist`。这意味着 `Mp3DataObject` 类必须同时提供 `setArtist()`\
  \ 和 `getArtist()` 方法。否则，将发生 `NoSuchMethodException`。对于用户不得或不会更改的属性，请使用构造函数的另一种变体。实际上，你可以将\
  \ get 和 set 方法分别传递给构造函数。你只需将 `null` 作为 set 方法传入，这样属性就无法更改。清单 19-3 展示了 `Mp3DataObject`\
  \ 类的部分内容。\n\n***清单 19-2.** 数据对象必须通过 get 方法提供其属性。如果这些属性也可更改，你还需要相应的 set 方法。*\n\n\
  `public class Mp3DataObject extends MultiDataObject {`\n`public String` **`getArtist`**`()\
  \ {`\n`      return this.artist;`\n`   }`\n`public void` **`setArtist`**`(String\
  \ artist) {`\n`      this.artist = artist;`\n`   }`\n`   ...`\n`public int` **`getTrack`**`()\
  \ {`\n`      return this.track;`\n`   }`\n`}`\n\n我们通过 `setName()` 方法为创建的实例（代表各个属性）指定名称，然后通过\
  \ `put()` 方法将实例添加到所需的 `Sheet.Set` 中。接着，你通过 `put()` 方法将 put 方法添加到 `Sheet` 中，然后返回该\
  \ `Sheet`。\n\n\n\n### 用户自定义属性编辑器\n\n您可以使用自定义编辑器来处理属性值，以支持用户输入、修改属性、检查（日期）或限制（固定值选择）。在图\
  \ 19-1 中，您可能已经注意到流派可以通过组合框进行选择。您可以通过以下调用为每个单独属性进行设置：\n\n`genreProp.`**`setPropertyEditorClass`**`(GenrePropertyEditor.class);`\n\
  \n其中 `GenrePropertyEditor` 是一个带有组合框的用户自定义编辑器。接下来，我们将探讨如何构建这样一个编辑器，并介绍相关的类和方法。请在本书的网页上找到该示例的完整代码，该代码位于\
  \ Apress 网站 `www.apress.com` 的源代码/下载区域。\n\n首先，您需要从 Java 类 `PropertyEditorSupport`\
  \ 派生出 `GenrePropertyEditor` 类。这是 `PropertyEditor` 接口的基础实现，所有用户自定义编辑器都必须实现该接口。此外，您还需要同时实现\
  \ `ExPropertyEditor` 和 `InplaceEditor.Factory` 这两个接口。通过 `ExPropertyEditor` 的 `attachEnv()`\
  \ 方法，我们可以获取一个 `PropertyEnv` 对象，从而以某种方式与属性窗口进行交互。您需要在该对象上注册一个 `InplaceEditor.Factory`\
  \ 实例（即您自己的类），该实例负责创建编辑器。实际上，`getInplaceEditor()` 方法正是执行此操作。该方法仅在请求时创建并交付编辑器。您将图形编辑器组件的实现作为私有内部类提供，该类派生自\
  \ `InplaceEditor`，正如您可能从 `getInplaceEditor()` 的返回值中猜到的那样。由于您希望使用组合框作为编辑器，因此将其定义为私有数据元素，并使用所需的值进行初始化。（参见清单\
  \ 19-3。）然后，必须在 `getComponent()` 方法之前交付此组件。`InplaceEditor` 的其他重要方法包括 `setValue()`\
  \ 和 `getValue()`。通过这些方法，可以基于属性设置组合框的值，反之亦然。此外，还有 `reset()` 方法，用于撤销更改（通常在按下 *Esc*\
  \ 键时）。\n\n***清单 19-3.** 用户自定义编辑器，可通过组合框选择流派属性*\n\n`public class` **`GenrePropertyEditor`**\
  \ `extends` **`PropertyEditorSupport`**\n`implements` **`ExPropertyEditor`**`,`\
