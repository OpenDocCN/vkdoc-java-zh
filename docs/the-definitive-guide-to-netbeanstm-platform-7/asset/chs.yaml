  \n预热任务在启动应用程序时异步执行。只需实现 `Runnable` 接口即可。还可以通过 `RequestProcessor` 类将启动延迟一段时间。预热任务只需按如下方式在层文件中注册：\n\
  \n`<folder name=\"`**`WarmUp`**`\">`\n`   <file name=\"com-galileo-netbeans-module-AutoInstaller.instance\"\
  />`\n`</folder>`\n\n### 自动停用模块\n\n在上一节展示如何自动更新应用程序的示例中，你了解了用于查找、下载、安装和更新模块的自动更新服务\
  \ API。此外，该 API 还可以激活或停用某些模块。这有一些非常有趣的应用。例如，你可以为某些用户组（通过登录信息）关闭某些模块或功能。该方法与上一节描述的方法非常相似。首先，通过\
  \ `UpdateManager` 确定所有可用的模块（包括已安装的模块）。通过附加过滤器 `UpdateManager.TYPE.MODULE`，确保只交付应用程序模块，而不交付本地化模块。通过\
  \ `getInstalled()` 方法检查你是否正在处理一个已安装的模块。这样就能过滤出新模块。在剩余已激活的模块中搜索要停用的模块。停用通过唯一的代码名称基础进行。（参见清单\
  \ 25-7。）\n\n***清单 25-7.** 搜索特定的活动应用程序模块*\n\n`List<String> modules = Collections.singletonList(\"\
  com.galileo.netbeans.module3\");`\n`OperationContainer<OperationSupport> cont =\
  \ OperationContainer.createForDirectDisable();`\n`for (UpdateUnit unit : UpdateManager.getDefault().getUpdateUnits(UpdateManager.TYPE.MODULE))\
  \ {`\n`   if (unit.getInstalled() != null) {`\n`      UpdateElement elem = unit.getInstalled();`\n\
  `      if (elem.isEnabled()) {`\n`         if (modules.contains(elem.getCodeName()))\
  \ {`\n`            if (cont.canBeAdded(unit, elem)) {`\n`               OperationInfo<OperationSupport>\
  \ operationInfo = cont.add(elem);`\n`               if (operationInfo != null) {`\n\
  `                  cont.add(operationInfo.getRequiredElements());`\n`               }`\n\
  `            }`\n`         }`\n`      }`\n`   }`\n`}`\n\n要停用模块，你需要使用工厂方法 `OperationContainer.createForDirectDisable()`\
  \ 创建一个引用容器。将所需模块添加到其中。在此之前，请再次检查模块是否与容器兼容。如果模块成功添加，你可以通过 `OperationInfo` 实例添加所有依赖于要停用模块的模块。最后，确保容器不为空。然后通过\
  \ `doOperation()` 方法停用模块（参见清单 25-8。）\n\n***清单 25-8.** 停用应用程序模块*\n\n`if (!cont.listAll().isEmpty())\
  \ {`\n`   try {`\n`      Restarter restarter = cont.getSupport().doOperation(null);`\n\
  `   } catch (OperationException ex) {`\n`      LOG.severe(ex.getMessage());`\n`   }`\n\
  `}`\n\n### 总结\n\n你可以使用自动更新服务 API 访问插件管理器提供的所有功能，这使得实现非常有趣的应用程序成为可能。在本章中，你学习了如何在后台执行特定于应用程序的自动更新，以及如何以编程方式禁用模块。\n\
  \n## 第 5 部分\n\n## 服务器与数据库：企业应用程序与 NetBeans 平台\n\n## 第 26 章\n\n\n\n## Java DB\n\n\
  *Apache Derby* 是一个隐藏在 Java DB 背后的关系型数据库管理系统（RDBMS）。该数据库系统完全用 Java 实现，因此可以作为跨平台系统使用。对于一个完整的数据库管理系统而言，Java\
  \ DB 非常小巧；它可以直接随应用程序一起交付，因为无需特殊安装，也无需为操作数据库而执行额外操作。因此，Java DB 非常适合在富客户端应用程序中使用。自\
  \ Java 平台 6 起，Oracle 默认提供客户端数据库 Java DB；NetBeans IDE 自然也在管理和服务器操作方面支持 Java DB。\n\
  \n### 集成 Java DB\n\n你可以通过 Java 平台安装获取 Java DB，也可以在 [`http://www.oracle.com/technetwork/java/javadb`](http://www.oracle.com/technetwork/java/javadb)\
  \ 下载最新版本。在 *lib* 子目录中，你会找到文件 *derby.jar*，它既是实际的数据库系统，也提供了驱动程序。此外还有文件 *derbyclient.jar*，当\
  \ Java DB 在服务器上运行，并且你不想将数据库系统随应用程序一起交付时，会用到此文件。不过，本讨论主要涉及客户端使用，因此重点是将 Java DB 嵌入到其应用程序中。使用\
  \ NetBeans 平台应用程序的术语，你需要将 Java DB 作为一个独立且分离的模块添加到应用程序中；也就是说，你需要创建一个库包装模块。首先，调用 *文件\
  \ ![Image](img/U001.jpg) 新建项目...* 并选择 *NetBeans 模块 ![Image](img/U001.jpg) 库包装模块*。下一步是选择文件\
  \ *derby.jar* 以及附加文件 *derbyLocale_de_DE.jar*，后者包含数据库系统所有报告的德语版本。当然，你也可以选择添加其他语言包或附加包。在此示例中，使用\
  \ `org.apache.derby` 作为代码名称基础，使用 `Java` `DB` `Embedded` 作为名称。现在，你只需在想要访问数据库的应用程序模块中，定义对此刚创建的模块的依赖关系即可。当\
  \ JDBC 驱动程序首次被调用时，数据库系统将自动启动。\n\n### 注册驱动程序\n\n如果你已经使用过 JDBC API，那么你可能或多或少熟悉 `Class.forName()`\
  \ 调用。它会间接加载你所使用的数据库系统对应的数据库驱动程序，从而使驱动程序管理器能够建立到其数据库的连接。`DriverManager` 类已通过 JDBC\
  \ API 4.0（Java 平台 6 的一部分）进行了扩展，因此它可以加载通过 *META-INF/services* 目录注册的数据库驱动程序。理想情况下，你或驱动程序本身可以声明式地注册\
  \ `java.sql.Driver` 接口的实现。这样做的好处是，可以完全省略 `Class.forName()` 调用，并且驱动程序仅在首次需要时才被加载。Java\
  \ DB 也通过这种方式注册其所需的驱动程序。对我们来说，这意味着我们可以直接通过 `DriverManager` 建立连接，而无需担心驱动程序的问题。\n\n\
  ### 创建和使用数据库\n\n在将 Java DB 打包成包装模块并添加到 NetBeans 平台应用程序，并且定义了与 NetBeans 平台应用程序的依赖关系之后，你就可以直接访问数据库系统并创建你的第一个数据库了。每个数据库都由\
  \ Java DB 在一个单独的目录中管理，该目录的名称与数据库名称相同，如 图 26-1 所示。这些目录创建在你必须首先定义的系统目录中。一个理想的位置是用户目录，例如，NetBeans\
  \ 平台及其特定于应用程序的设置也保存在该目录中。你可以通过系统属性获取路径，这样就不需要考虑跨平台的路径问题了。\n\n这个基础目录通过名称 `derby.system.home`\
  \ 进行注册。\n\n`System.setProperty(\"`**`derby.system.home`**`\",`\n`        System.getProperty(\"\
  `**`netbeans.user`**`\",`\n`        System.getProperty(\"`**`user.home`**`\")) +\
  \ \"/databases\");`\n\n你可以通过 `netbeans.user` 特性获取特定于应用程序的目录路径。如果未设置此特性，则使用用户目录的默认值，该值可通过\
  \ `user.home` 获取。在检测到的目录中，数据库应位于 *databases* 目录下。如果你未设置 `derby.system.home` 特性，Java\
  \ DB 将使用应用程序的当前目录。\n\n![Image](img/2601.jpg)\n\n***图 26-1.** 将 Java DB 作为库包装模块集成到你自己的应用程序中。数据库的物理位置由\
  \ derby.system.home 特性设置。*\n\nJava DB 的一个非常实用的特性是，数据库系统无需显式启动。每个数据库在首次访问时都会单独启动；你无需担心管理本地数据库的运行，你可以像使用服务器数据库一样使用和调用它。\n\
  \n按照上述方法设置系统目录后，你可以通过驱动程序管理器建立到数据库的连接：\n\n`Connection connection = DriverManager.`**`getConnection`**`(`\n\
  `        \"`**`jdbc:derby:MyDB`**`;create=true\", \"user\", \"password\");`\n\n\
  那么，如何创建数据库呢？这是通过定义添加到连接 URL 中的属性 `create=true` 来实现的。如果数据库 `MyDB` 不存在，则会先创建它，随后建立到该数据库的连接。如果数据库已存在，则仅建立连接。这个属性非常重要，尤其是在\
  \ Java DB 的嵌入式本地使用中，因为应用程序的数据库会在首次安装或启动时自动创建。不过，Java DB 还定义了许多其他属性，这些属性目前并不重要。你可以在\
  \ Java DB 参考手册中找到这些属性的信息，该手册位于 Java DB 发行版的目录中，并附有其他文档。除了将属性附加到 URL 之外，你还可以将它们保存在\
  \ `Properties` 对象中，并将其作为第二个参数传递给 `getConnection()` 方法：\n\n**`Properties`** `props\
  \ = new Properties();`\n`props.put(\"`**`user`**`\", \"user\");`\n`props.put(\"\
  `**`password`**`\", \"password\");`\n`props.put(\"`**`create`**`\", \"true\");`\n\
  `Connection connection = DriverManager.`**`getConnection`**`(\"`**`jdbc:derby:MyDB`**`\"\
  , props);`\n\n\n\n### 关闭数据库\n\n当建立与数据库的连接时，数据库会自动启动。关闭则不同。数据库系统无法识别应用程序何时结束（因此会突然关闭），所以你应该在应用程序结束时显式地关闭数据库系统；这样才能保证数据的一致性。关闭系统意味着所有活动的数据库都会被隐式关闭。当然，你也可以选择单独关闭某个数据库。\n\
  \n完成此任务的最佳方式是通过模块安装程序或生命周期管理器实现（参见第 8 章）。在模块安装程序中，使用 `close()` 方法，如清单 26-1 所示。\n\
  \n***清单 26-1.** 关闭数据库系统以结束应用程序*\n\n`import java.sql.DriverManager;`\n`import java.sql.SQLException;`\n\
  `import org.openide.modules.ModuleInstall;`\n\n`public class Installer extends`\
  \ **`ModuleInstall`** `{`\n`   @Override`\n`public void` **`close`**`() {`\n`      try\
  \ {`\n`        DriverManager.getConnection(\"jdbc:derby:;`**`shutdown=true`**`\"\
  );`\n`      } catch (SQLException ex) {}`\n`   }`\n`}`\n\n这样，整个 Java DB 系统就会在应用程序结束时关闭。如果你想关闭单个数据库，只需在相应的数据库名称后面加上\
  \ `jdbc:derby:`。例如，如果你想关闭数据库 `MyDB`，调用方式如下：\n\n`DriverManager.getConnection(\"jdbc:derby:MyDB;`**`shutdown=true`**`\"\
  );`\n\n请记住，关闭操作（即参数 `shutdown=true`）总会触发一个异常，该异常会提供关于关闭过程的报告。\n\n### 使用 NetBeans\
  \ IDE 开发数据库\n\n为了简化数据库支持应用程序的开发，NetBeans IDE 中集成了 Java DB 支持。通过 IDE，你可以启动和停止数据库系统、创建数据库以及建立与数据库的连接。用于创建和配置表的图形支持尤其简化了开发过程。这使你能够以非常简单的方式定义和修改各个表列及其数据类型。\n\
  \n#### 安装和启动 Java DB 系统\n\n要使用此支持，首先需要定义 Java DB 的安装路径。通过 *窗口* ![Image](img/U001.jpg)\
  \ *服务* 打开 *服务* 窗口，然后从 *Java DB* 节点的上下文菜单中选择 *属性*。该路径应已指向 Java 平台安装目录中的 Java DB 目录。如果你自己下载了\
  \ Java DB，或者有单独的安装，当然也可以在此设置路径。你还需要设置另一个路径，用于创建和存放数据库。\n\n完成这些设置后，你可以通过上下文菜单中的 *启动服务器*\
  \ 来启动数据库服务器。这是必要的，因为现在数据库系统不再集成在应用程序中，而是作为独立的服务器运行。服务器通常会在端口 1527 上接受连接，该端口信息会显示在输出窗口中。\n\
  \n#### 将 Java DB 服务器驱动程序集成到应用程序中\n\n由于 Java DB 数据库系统并未集成在其应用程序中，而是作为服务器运行，因此有必要为你的应用程序添加另一个驱动程序。这个用于建立与\
  \ Java DB 服务器连接的驱动程序位于文件 *derbyclient.jar* 中（在“集成 Java DB”一节中介绍过）。通过库包装器模块将其添加到你的应用程序中，并在你的模块中定义一个数据库连接，使其依赖于该模块。\n\
  \n#### 创建和配置数据库\n\n现在，你的应用程序已准备好访问已启动的 Java DB 服务器。你可以在 NetBeans IDE 中，通过 *服务* 窗口中\
  \ *数据库* ![Image](img/U001.jpg) *Java DB* 节点的上下文菜单中的 *创建数据库...* 来创建一个新数据库，如图 26-2\
  \ 所示。在此过程中，你需要为数据库输入名称、用户名和密码。输入这些数据后，数据库即被创建，并建立连接。你可以通过相应连接的上下文菜单项 *连接...* 来建立连接。如果连接成功建立，将显示数据库的表、索引和外键。使用上下文菜单，你可以为每个项目创建新条目。\n\
  \n例如，你可以通过 *表* 的上下文菜单中的 *创建表...* 来创建新表，通过 *查看数据...* 来查看表的内容，或者通过 *执行命令* 来执行 SQL\
  \ 命令。\n\n![Image](img/2602.jpg)\n\n***图 26-2.** 你可以在服务窗口中访问 Java DB 数据库，并在此进行配置。*\n\
  \n#### 从应用程序访问数据库\n\n现在，你将处理需要使用数据库的应用程序。在使用 Java DB 系统的集成应用程序时需要定义的 `derby.system.home`\
  \ 特性，现在已不再需要。为了成功地从你的应用程序建立与 Java DB 服务器的连接，你需要调整连接 URL，因为你需要指定数据库服务器接受连接的名称（或 IP\
  \ 地址）和端口：\n\n`Connection connection = DriverManager.`**`getConnection`**`(`\n`     \"\
  jdbc:derby:`**`//localhost:1527/`**`MyDB;\", \"user\", \"password\");`\n\n由于在这种情况下数据库服务器与应用程序位于同一台计算机上，请使用\
  \ `localhost` 或 IP 地址 `127.0.0.1`，并将端口定义为 `1527`。你也可以从 NetBeans IDE 服务窗口中已建立的连接中获取此\
  \ URL。\n\n#### 检索和导入表结构\n\n接下来，我将向你展示服务窗口中数据库浏览器的一个非常有用的功能。可以显示创建表所用的 SQL 源代码，以便将其原样复制到你的应用程序中，用于数据库表的初始创建，或复制到\
  \ SQL 脚本文件中。调用所需表的上下文菜单，你会找到 *抓取结构...* 选项；调用它可以将结构保存到文件中。然后，只需在上下文菜单中选择 *重新创建表...*，并选择刚刚创建的文件。创建表所需的\
  \ SQL 源代码将显示在一个窗口中。你也可以将此功能用于其原始目的，从而将外部数据库中的表导入到你的数据库中。\n\n### 示例应用程序\n\n我想用一个非常简单的例子来结束本章，以解释\
  \ Java DB 在创建表结构方面的一些特性，并向你展示如何巧妙地将 Java DB 集成到应用程序的生命周期中。在这个例子中，你将管理可以分配到特定流派的音乐专辑。\n\
  \n\n\n#### 配置、访问与关闭\n\n你需要配置 Java DB 数据库系统，集中管理对其的访问，并在时机成熟时通过模块安装程序关闭该系统。首先，在 `restored()`\
  \ 方法中设置数据库的存储路径，该方法在启动应用程序或调用具有 `derby.system.home` 特性的模块时被调用（参见清单 26-2）。数据库将创建在用户特定用户目录下的\
  \ *databases* 子目录中。此外，你还需要调用 `initTables()` 方法，在该方法中，你首先希望通过 `SELECT` 查询来检查所需的表是否已创建。如果应用程序是首次启动（表尚不存在），则会触发一个\
  \ `SQLException`，我们捕获该异常，然后创建 `albums` 和 `genres` 这两个表。\n\n先创建 `genres` 表，因为 `albums`\
  \ 表将依赖于它。表中的每个条目都会获得一个唯一的 ID，该 ID 由数据库按升序分配。你可以通过为 `id` 列指定 `GENERATED ALWAYS AS\
  \ IDENTITY` 来实现这一点。因此，即使你在向表中添加条目时为 `id` 列定义了值，也会使用自动生成的值。或者，你也可以使用 `BY DEFAULT`\
  \ 代替 `ALWAYS`；这样，只有在你没有显式分配 ID 时，才会生成一个值。最后，使用 `PRIMARY KEY` 将 `id` 列定义为主键，通过该主键将建立与\
  \ `albums` 表中条目的连接。紧接着创建 `albums` 表，并以相同的方式定义其主键列 `id`。其他列包括 `title`、`tracks`、`cds`、`years`\
  \ 和 `genre`。但是，你并不直接将流派写入 `genre` 列，而是写入 `genre` 表中某个流派条目的 ID。因此，`albums` 表中的 `genre`\
  \ 列是一个外键。你通过 `FOREIGN KEY (genre)` 来定义它，并通过 `REFERENCES genres (id)` 来定义与 `genres`\
  \ 表中 `id` 列的关联。在 `genres` 表中添加三个示例条目，以便在创建专辑时可以选择一个流派。\n\n***清单 26-2.** 启动时安装数据库系统与数据库*\n\
  \n`import java.sql.Statement;`\n`import java.sql.Connection;`\n`import java.sql.DriverManager;`\n\
  `import java.sql.SQLException;`\n`import org.openide.modules.ModuleInstall;`\n`import\
  \ org.openide.util.Exceptions;`\n\n`public class` **`Installer`** `extends ModuleInstall\
  \ {`\n`private static` **`Connection`** `conn = null;`\n`@Override    public void`\
  \ **`restored`**`() {`\n`      System.setProperty(\"`**`derby.system.home`**`\"\
  ,`\n`         System.getProperty(\"netbeans.user\",`\n`         System.getProperty(\"\
  user.home\")) + \"/databases\");`\n`      initTables();`\n`   }`\n`private void`\
  \ **`initTables`**`() {`\n`      try {`\n`         Statement stmt = getConnection().createStatement();`\n\
  `         stmt.`**`executeQuery`**`(\"SELECT id FROM genres\");`\n`         stmt.close();`\n\
  `      } catch(SQLException e) {`\n`         try {`\n`            Statement stmt\
  \ = getConnection().createStatement();`\n`            stmt.execute(\"`**`CREATE\
  \ TABLE`** `genres (\" +`\n`\"id` **`INTEGER GENERATED ALWAYS AS IDENTITY`**`, \"\
  \ +`\n`\"genre` **`VARCHAR`**`(100), \" +`\n`               \"`**`PRIMARY KEY`**`(id))\"\
  );`\n`            stmt.execute(\"`**`CREATE TABLE`** `albums (\" +`\n`\"id` **`INTEGER\
  \ GENERATED ALWAYS AS IDENTITY`**`, \" +`\n`               \"title`**`  VARCHAR`**`(100),\
  \ \" +`\n`\"tracks` **`VARCHAR`**`(10), \" +`\n`               \"cds  `**`  VARCHAR`**`(10),\
  \ \" +`\n`               \"years`**`  VARCHAR`**`(10), \" +`\n**`\"genre`**`  INTEGER,\
  \ \" +`\n`               \"`**`PRIMARY KEY`**`(id), \" +`\n`               \"`**`FOREIGN\
  \ KEY`**`(genre)` **`REFERENCES`** `genres (id))\");`\n`            stmt.execute(\"\
  `**`INSERT INTO`** `genres (genre) \" +`\n`               \"`**`VALUES`**`('Techno,\
  \ Trance & Dance')\");`\n`            stmt.execute(\"`**`INSERT INTO`** `genres\
  \ (genre) \" +`\n`               \"`**`VALUES`**`('Rock & Pop')\");`\n`            stmt.execute(\"\
  `**`INSERT INTO`** `genres (genre) \" +`\n`               \"`**`VALUES`**`('Country\
  \ & Classic')\");`\n`            stmt.close();`\n`         } catch(SQLException\
  \ ex) {`\n`            Exceptions.printStackTrace(ex);`\n`         }`\n`      }`\n\
  `   }`\n\n你通过静态方法 `getConnection()` 提供对数据库的集中访问。这样，用户尤其不必担心连接 URL。此外，`Connection`\
  \ 对象（即与数据库的连接）被集中持有，无需每次都重新建立和关闭。`getConnection()` 方法也是一个工厂方法，如果连接尚未建立，它会建立一个连接；如果连接已建立，则返回该\
  \ `Connection` 对象。应用程序结束时，你会通过 `close()` 方法得到通知。正是在这里，你最终关闭仍与数据库保持的连接，然后通过 `jdbc:derby:;shutdown=true`\
  \ 关闭整个 Java DB 系统（以及你的数据库 `MyDB`）。（参见清单 26-3。）\n\n***清单 26-3.** 集中提供连接与关闭数据库*\n\n\
