  );`\n`      } else {`\n`         List<UserGroup> groups = SecurityManager.getDefault()`**`.getUserGroups`**`();`\n\
  `         if (groups.isEmpty()) {`\n`            panel.setInfo(\"You have no access\
  \ rights\");`\n`         } else {`\n`            try {`\n**`UserGroupFileSystem`**`.getDefault().setUserGroups(groups);`\n\
  **`UserGroupModuleSystem`**`.handleModules(MOD2DISABLE, false);`\n**`UserGroupModuleSystem`**`.handleModules(MOD2ENABLE,\
  \ true);`\n`               dialog.setClosingOptions(null);`\n`            } catch\
  \ (Exception ex) {`\n`               Exceptions.printStackTrace(ex);`\n`            }`\n\
  `         }`\n`      }`\n`   }`\n`}`\n\n以下各节将解释 `UserGroupFileSystem` 和 `UserGroupModuleSystem`\
  \ 类是如何实现的，以及适配所需的配置。\n\n\n\n#### 系统文件系统\n\n系统文件系统在本书的几乎每一章中都或多或少地扮演着重要角色。它在某些用户组的动态适配中至关重要，作为例如操作、菜单项、窗口或选项面板等内容的中央注册表。无论如何，系统文件系统是使动态适配成为可能的核心概念。有两个特性值得利用。一个是通过添加后缀\
  \ `_hidden` 来隐藏特定条目。另一个是在运行时添加额外配置的可能性。\n\n你将实现 `UserGroupFileSystem` 类。不过，首先你需要思考如何管理一个用户组（参见清单\
  \ 33-8）。枚举类型 `UserGroup` 将对此有所帮助。\n\n***清单 33-8.** 用户组信息的管理*\n\n`public enum` **`UserGroup`**\
  \ `{`\n**`ADMIN`**`(\"Admin\", \"configs/admin.xml\"),`\n**`USER`**`(\"User\", \"\
  configs/user.xml\");`\n`   private String groupName;`\n`   private String configPath;`\n\
  \n**`UserGroup`**`(String groupName, String configPath) {`\n`      this.groupName\
  \ = groupName;`\n`      this.configPath = configPath;`\n`   }`\n\n`public URL` **`getConfig`**`()\
  \ {`\n`      return UserGroup.class.getResource(configPath);`\n`   }`\n\n`public\
  \ String` **`getGroup`**`() {`\n`      return this.groupName;`\n`   }`\n\n`   public\
  \ boolean equals(String groupName) {`\n`      return this.groupName.equals(groupName);`\n\
  `   }`\n\n`   @Override`\n`   public String toString() {`\n`      return this.groupName;`\n\
  `   }`\n\n`public static UserGroup` **`get`** `(String groupName) {`\n`      for\
  \ (UserGroup group : UserGroup.values()) {`\n`         if (group.groupName.equals(groupName))\
  \ {`\n`            return group;`\n`         }`\n`      }`\n`      return null;`\n\
  `   }`\n`}`\n\n在此枚举类型中，通过元素 `USER` 和 `ADMIN` 定义组的名称以及相应配置文件的路径。这样，`getConfig()`\
  \ 方法就能直接返回指向 XML 文件的 URL。\n\n之前，你定义了 Admin 和 User 两个用户组。现在，你需要为每个组创建一个小的测试配置，以便可以显示或隐藏某些菜单。因此，将为用户组\
  \ User 提供一个菜单，该菜单不提供给 Admin 组，反之亦然。（参见清单 33-9）。\n\n***清单 33-9.** 用户组 User 的配置*\n\
  \n`<filesystem>`\n`   <folder name=\"Menu\">`\n`      <folder name=\"Tools_hidden\"\
  />`\n`      <folder name=\"Admin_hidden\"/>`\n`   </folder>`\n`</filesystem>`\n\n\
  使用清单 33-9 所示的配置，User 组用户的 *Tools* 和 *Admin* 菜单将被隐藏。\n\n***清单 33-10.** 用户组 Admin\
  \ 的配置*\n\n`<filesystem>`\n`   <folder name=\"Menu\">`\n`      <folder name=\"Edit_hidden\"\
  />`\n`      <folder name=\"User_hidden\"/>`\n`   </folder>`\n`</filesystem>`\n\n\
  与清单 33-10 所示的配置相反，对于 Admin 组成员，*Edit* 和 *User* 菜单被隐藏。\n\n一个或多个以 XML 文件形式存在的此类配置，可以由一个\
  \ `XMLFileSystem` 在一个充当代理的 `MultiFileSystem` 中共同管理。`MultiFileSystem` 实现可以作为服务提供者注册，并在启动期间添加到系统文件系统中。由于系统文件系统能够对更改做出反应，因此可以在后续阶段（即登录之后）设置实际配置。为此，创建一个继承自\
  \ `MultiFileSystem` 的 `UserGroupFileSystem` 类（参见清单 33-11）。使用 `@ServiceProvider`\
  \ 注解注册该类，以便系统能够找到并加载它。\n\n***清单 33-11.** 可设置动态配置的 MultiFileSystem 实现*\n\n`import\
  \ org.openide.filesystems.FileSystem;`\n`import org.openide.filesystems.MultiFileSystem;`\n\
  `import org.openide.filesystems.XMLFileSystem;`\n`import org.openide.util.Lookup;`\n\
  `import org.openide.util.lookup.ServiceProvider;`\n\n`@ServiceProvider(service =\
  \ FileSystem.class) @ServiceProvider(service = UserGroupFileSystem.class) public\
  \ class` **`UserGroupFileSystem`** `extends` **`MultiFileSystem`** `{`\n\n`public`\
  \ **`UserGroupFileSystem`**`() {`\n`      setPropagateMasks(true);`\n`   }`\n\n\
  `public static UserGroupFileSystem` **`getDefault`**`() {`\n`      return Lookup.getDefault().lookup(UserGroupFileSystem.class);`\n\
  `   }`\n\n`public void` **`setUserGroups`**`(List<UserGroup>` **`groups`**`) throws\
  \ Exception {`\n`      FileSystem[] fileSystems = new FileSystem[groups.size()];`\n\
  `      for (int idx = 0; idx < fileSystems.length; idx++) {`\n`fileSystems[idx]\
  \ = new` **`XMLFileSystem`**`(groups.get(idx)`**`.getConfig`**`());`\n`      }`\n\
  **`setDelegates`**`(fileSystems);`\n`   }`\n`}`\n\n注册的类会在启动期间自动初始化。但是，到目前为止还没有设置任何配置，因此它实际上是一个空文件系统。有必要在构造函数中调用\
  \ `setPropagateMasks(true)` 方法，这样带有 `_hidden` 后缀的条目才能生效。全局查找（global lookup）提供了已经添加到系统文件系统中的实例。因此，这个实例使你能够在之后向系统文件系统中注入动态条目。\n\
  \n`setUserGroups()` 方法（你将从登录处理器中传递一个包含 `UserGroup` 对象的列表给它）最终会设置配置。为此，为每个组的 XML\
  \ 文件创建一个 `XMLFileSystem` 实例，并从中创建一个数组。然后，将此数组传递给 `setDelegates()` 方法，以便传播这些更改。\n\
  \n\n\n#### 模块系统\n\n首先，你需要以声明式的方式定义，对于哪个用户组，哪些模块应被显式激活或停用。为此，只需扩展两个已有的 XML 文件即可。在新定义的文件夹中，可以列出任意数量的模块，但仅限于那些带有\
  \ `codeNameBase` 属性的模块。通过这种方式，你可以指定模块的唯一标识（参见清单 33-12）。\n\n***清单 33-12.** 用户组 User\
  \ 的模块配置*\n\n`<filesystem>`\n`   <folder name=\"`**`Modules2Disable`**`\">`\n`      <file\
  \ name=\"AdminModule\">`\n`         <attr name=\"`**`codeNameBase`**`\" stringvalue=\"\
  `**`com.galileo.netbeans.module.admin`**`\"/>`\n`      </file>`\n`   </folder>`\n\
  `   <folder name=\"`**`Modules2Enable`**`\">`\n`      <file name=\"UserModule\"\
  >`\n`         <attr name=\"`**`codeNameBase`**`\" stringvalue=\"`**`com.galileo.netbeans.module.user`**`\"\
  />`\n`      </file>`\n`   </folder>`\n`</filesystem>`\n\n对于 *User* 组的用户，模块 `AdminModule`\
  \ 应被停用，而模块 `UserModule` 应被激活。对于 *Admin* 用户组，则设置相反，如清单 33-13 所示。\n\n***清单 33-13.**\
  \ 用户组 Admin 的模块配置*\n\n`<filesystem>`\n`   <folder name=\"`**`Modules2Disable`**`\"\
  >`\n`      <file name=\"UserModule\">`\n`         <attr name=\"`**`codeNameBase`**`\"\
  \ stringvalue=\"`**`com.galileo.netbeans.module.user`**`\"/>`\n`      </file>`\n\
  `   </folder>`\n`   <folder name=\"`**`Modules2Enable`**`\">`\n`      <file name=\"\
  AdminModule\">`\n`         <attr name=\"`**`codeNameBase`**`\" stringvalue=\"`**`com.galileo.netbeans.module.admin`**`\"\
  />`\n`      </file>`\n`   </folder>`\n`</filesystem>`\n\n这些配置将由 `UserGroupModuleSystem`\
  \ 类读取和解释。实现参数化的 `handleModules()` 方法。这样，该方法既可以用于激活，也可以用于停用。你可以将配置文件中的文件夹传递给该方法。在此文件夹中，你搜索所有文件元素并读取其属性\
  \ `codeNameBase`，以便将模块的唯一标识添加到列表中。使用更新管理器（它可以访问所有模块）查找此列表中所有模块的模块实例。然后将这些实例添加到相应的操作容器中。最后，通过此容器可以执行激活或停用操作（参见清单\
  \ 33-14）。\n\n***清单 33-14.** 根据提供的配置激活和停用模块*\n\n`import org.netbeans.api.autoupdate.OperationContainer;`\n\
  `import org.netbeans.api.autoupdate.OperationSupport;`\n`import org.netbeans.api.autoupdate.UpdateManager;`\n\
  `import org.netbeans.api.autoupdate.UpdateUnit;`\n`import org.openide.filesystems.FileObject;`\n\
  `import org.openide.filesystems.FileUtil;`\n`import org.openide.util.Exceptions;`\n\
  \n`public class` **`UserGroupModuleSystem`** `{`\n\n`public static void` **`handleModules`**`(String\
  \ folder, boolean en) {`\n`      FileObject fo = FileUtil`**`.getConfigFile`**`(folder);`\n\
  `      List<String> modules = new ArrayList<String>();`\n`      for (FileObject\
  \ fi : fo.getChildren()) {`\n`         modules.add((String)fi`**`.getAttribute`**`(\"\
  codeNameBase\"));`\n`      }`\n`      try {`\n`         OperationContainer<OperationSupport>\
  \ cont;`\n`         if (en) {`\n`            cont = OperationContainer`**`.createForEnable`**`();`\n\
  `         } else {`\n`            cont = OperationContainer`**`.createForDirectDisable`**`();`\n\
  `         }`\n`         for (UpdateUnit uu : UpdateManager.getDefault()`**`.getUpdateUnits`**`())\
  \ {`\n`            if (uu.getInstalled() != null`\n`               && modules.contains(uu.getInstalled().getCodeName())`\n\
  `               && uu.getInstalled().isEnabled() == !en) {`\n`               cont.add(uu`**`.getInstalled`**`());`\n\
  `            }          }`\n`         if (!cont.listAll().isEmpty()) {`\n`            cont.getSupport()`**`.doOperation`**`(null);`\n\
  `         }`\n`      } catch (Exception ex) {`\n`         Exceptions.printStackTrace(ex);`\n\
  `      }`\n`   }`\n`}`\n\n模块的激活或停用再次清晰地体现了基于模块的 NetBeans 平台的优势。停用一个模块时，所有组件（如菜单项或窗口）都会在运行时自动删除。激活该模块时，所有组件又会简单地重新添加。\n\
  \n### 总结\n\n企业应用程序通常必须动态地适应不同的用户组。本章展示了 NetBeans 平台提供的可能性。你将 JNDI 和 JAAS 与 Apache\
  \ 目录服务器结合使用来管理用户数据。你学习了如何为特定用户组调整用户界面，以及如何加载和停用预定义的模块。\n\n## 第六部分\n\n## 打包与交付：适配、交付和实现应用程序\n\
  \n## 第 34 章\n\n## 国际化与本地化\n\n专业的应用程序——尤其是灵活的应用程序——应设计为能够尽可能轻松地适应其他国家/地区和语言。因此，Java\
  \ 和 NetBeans 平台以及 NetBeans IDE 为国际化提供了大量支持，使你的应用程序易于国际化和本地化。即使是规模很小的应用程序，以及最初仅为单一语言设计的应用程序，也值得为本地化做好准备。\n\
  \n\n\n### 源代码中的字符串字面量\n\n源代码中的字符串字面量被外包到 `*.properties` 文件中。因此，与语言相关的字面量可以被分离出来，并轻松地更改为其他语言。即使在应用程序发布后，这也是可行的。这些常量以键值对的形式保存在一个简单的\
  \ `*.properties` 文件中：\n\n`CTL_MyTopComponent = My Window`\n`HINT_MyTopComponent\
  \ = This is My Window`\n\n此类资源文件由 Java 类 `ResourceBundle` 管理。一个 `ResourceBundle`\
  \ 负责特定 `Locale`（区域设置）的资源，该设置同时指定了国家和语言。为了便于处理 `*.properties` 文件以及访问 `ResourceBundle`\
  \ 实例，NetBeans 平台提供了 `NbBundle` 类。资源文件必须命名为 *Bundle.properties*；不过，通常每个包都会创建这样一个文件。创建\
  \ `ResourceBundle` 对象最简单的方法是使用以下调用：\n\n`ResourceBundle bundle = NbBundle`**`.getBundle`**`(MyTopComponent.class);`\n\
  \n因此，`NbBundle` 类会为 `MyTopComponent` 类所在包中提供的 *Bundle.properties* 文件创建一个 `ResourceBundle`\
  \ 对象。所需的字符串字面量可以通过 `ResourceBundle` 的 `getString()` 方法轻松读取：\n\n`String msg = bundle`**`.getString`**`(\"\
  CTL_MyTopComponent\");`\n\n如果你只想在类中读取少量字面量，可以使用 `getMessage()` 方法直接读取字面量，而无需事先创建\
  \ `ResourceBundle` 实例，如下所示：\n\n`String msg = NbBundle`**`.getMessage`**`(MyTopComponent.class,\
  \ \"CTL_MyTopComponent\");`\n\n此外，还可以向字符串字面量中添加占位符。这在需要插入数字或文件名/路径时最为常见。使用一对大括号作为占位符，其中包含参数的编号：\n\
  \n`Result = {0} MP3-Files found for {1}`\n\n你可以直接将这些参数传递给 `getMessage()` 方法，该方法会用参数替换占位符。或者，你可以传递最多三个参数，或一个包含无限数量参数的数组：\n\
  \n`String label = NbBundle.getMessage(MyTopComponent.class, \"Result\",`\n**`new\
  \ Integer(results.size()), search.getText()`**`);`\n\n在 `*.properties` 文件中，字面量仅以一种语言保存。要为应用程序添加另一种语言，请在同一个文件夹中提供一个名为\
  \ `Bundle_<语言>_<国家>.properties` 的文件，其中包含具有相同键的字面量。`NbBundle` 类使用 `getBundle()` 方法返回此文件的\
  \ `ResourceBundle`。此文件等同于返回 `Locale.getDefault()` 的 `Locale` 设置。不包含语言和国家标识符的 *Bundle.properties*\
  \ 文件是默认的资源包。如果 `Locale` 设置没有可用的特定资源包，则始终使用此默认资源包。也可以通过将 `Locale` 对象传递给 `getBundle()`\
  \ 方法来请求特定的资源包。要了解资源包的搜索顺序，方法 `NbBundle.getLocalizingSuffixes()` 会按使用顺序列出所有后缀。\n\n\
  默认情况下，方法 `Locale.getDefault()` 返回虚拟机的 `Locale` 设置。要使用特定的 `Locale` 设置运行和执行整个应用程序，请设置命令行参数\
  \ `locale`。使用此参数，你可以将语言和国家标识符传递给应用程序。你可以在第 35 章中找到更多相关信息。\n\nNetBeans IDE 提供了一个向导，用于对源文件中的字符串字面量进行国际化。使用此向导，你可以扫描文件中的字符串，然后将其移动到\
  \ `*.properties` 文件中。你可以编辑键、值以及将替换字面量的代码。你可以在菜单中的 *工具 ![Image](img/U001.jpg) 国际化\
  \ ![Image](img/U001.jpg) 国际化向导* 下找到该向导，如图 34-1 所示。\n\n![Image](img/3401.jpg)\n\n\
  ***图 34-1.** 你可以使用国际化向导自动将字符串字面量移动到资源包，并粘贴必要的源代码。*\n\n### 清单文件中的字符串字面量\n\n除了源文件的字符串字面量之外，你还可以对清单文件的文本信息进行国际化。有两种方法可以做到这一点。第一种方法是将语言标识符附加到清单属性上，从而多次使用相同的属性：\n\
  \n`Manifest-Version: 1.0`\n`OpenIDE-Module: com.galileo.netbeans.module`\n`OpenIDE-Module-Name:\
  \ My Module`\n`OpenIDE-Module-Name`**`_de`**`: Mein Modul`\n\n第二种（也是首选）方法是将你打算国际化的属性外包到一个\
  \ `*.properties` 文件中。然后，属性名称将用作键，并在每种语言的资源包中提供。使用 `OpenIDE-Module-Localizing-Bundle`\
  \ 属性定义资源包，如清单 34-1 所示（另请参见第 3 章），这样属性就会从资源包中读取（参见清单 34-2 和 34-3）。\n\n***清单 34-1.**\
  \ Manifest.mf*\n\n`Manifest-Version: 1.0`\n`OpenIDE-Module: com.galileo.netbeans.module`\n\
  **`OpenIDE-Module-Localizing-Bundle`**`: com/galileo/netbeans/module/Bundle.properties`\n\
  \n***清单 34-2.** Bundle.Properties*\n\n`OpenIDE-Module-Name = My Module`\n\n***清单\
  \ 34-3.** Bundle_de.Properties*\n\n`OpenIDE-Module-Name = Mein Modul`\n\n### 帮助页面的国际化\n\
  \n通常，帮助页面（包括帮助集配置文件）的国际化方式与 `*.properties` 文件类似，即通过附加国家和/或语言标识符。由于一个帮助集通常包含大量文件，这会导致结构非常混乱。因此，也可以将打算国际化的文件存储在一个子文件夹中，如图\
  \ 34-2 所示。不再需要语言和国家标识，因为该信息已由子文件夹表示。\n\n![Image](img/3402.jpg)\n\n***图 34-2.** 特定语言的帮助集存储在单独的目录中。*\n\
  \n只有帮助集文件 `module-hs.xml` 保留在根目录中，并且没有附加标识符。在此文件中，你委托到相应的文件夹。当当前的 `Locale` 设置与现有文件不匹配时，始终使用不带标识符的帮助集文件。该帮助集文件指向帮助页面的英文版本（参见清单\
  \ 34-4）。\n\n***清单 34-4.** 引用特定语言包的帮助集文件*\n\n`<maps>`\n`   <homeID>com.galileo.netbeans.module.about</homeID>`\n\
  `   <mapref location=\"`**`en/`**`module-map.xml\"/>`\n`</maps>`\n`<view mergetype=\"\
  javax.help.AppendMerge\">`\n`   <name>TOC</name>`\n`   <label>Contents</label>`\n\
  `   <type>javax.help.TOCView</type>`\n`   <data>`**`en/`**`module-toc.xml</data>`\n\
  `</view>`\n`<view mergetype=\"javax.help.AppendMerge\">`\n`   <name>Index</name>`\n\
  `   <label>Index</label>`\n`   <type>javax.help.IndexView</type>`\n`   <data>`**`en/`**`module-idx.xml</data>`\n\
  `</view>`\n\n你还应该考虑到，帮助集的注册仅通过 *package-info.java* 文件中的 `HelpSetRegistration` 注解为\
  \ `module-hs.xml` 文件进行一次。然后，包含国家/语言标识的帮助集会被自动找到。\n\n### 国际化其他资源\n\n除了已经描述的国际化领域之外，NetBeans\
  \ 平台还提供了对其他应用程序组件进行国际化的额外可能性。\n\n\n\n#### 图形\n\n不仅文本可以根据语言和国家进行适配；图形（如图标）也可以进行适配。`ImageUtilities`\
  \ 类提供了 `loadImage()` 方法的一个变体，该方法通常用于加载图形，以简化此过程。你可以设置一个 `boolean` 参数，决定是否根据当前的 `Locale`\
  \ 设置加载可用的语言/国家特定版本的图形。方法 `NbBundle.getLocalizingSuffixes()` 列出了会被搜索的可能标识。\n\n`Image\
  \ img = ImageUtilities`**`.loadImage`**`(\"resources/icon.gif\",`**`true`**`);`\n\
  \n例如，如果当前的 `Locale` 设置为 *de_DE*，则会首先搜索 *icon_de_DE.gif* 和 *icon_de.gif*。\n\n####\
  \ 任意文件\n\nNetBeans 平台定义了一种特殊协议，用于加载其他任意国际化资源。这就是 *nbresloc* 协议，它是 *nbres* 协议的扩展，通过它你可以从所有可用的模块中加载资源。你可以轻松地为通过此协议寻址的资源创建一个\
  \ `URL` 对象：\n\n`URL u = new URL(\"`**`nbresloc`**`:/com/galileo/netbeans/icon.png\"\
  );`\n`ImageIcon icon = new ImageIcon(u);`\n\n如果 `Locale` 设置为 `de_DE`，并且存在名为 `icon_de_DE.png`\
  \ 或 `icon_de.png` 的文件，则会加载此图标而不是 `icon.png`。\n\n#### 层文件中的文件夹、文件和属性\n\n系统文件系统提供了两个特殊属性，用于国际化文件夹和文件的名称和图标。这对于例如菜单（其名称仅在层文件中声明，因此无法通过\
  \ `NbBundle` 类读取，就像操作那样）非常有用。这两个属性是 `SystemFileSystem.localizingBundle` 和 `SystemFileSystem.icon`。使用第一个属性，你可以引用你的资源包，省略\
  \ *.properties* 扩展名。在此资源包中，会自动搜索一个键，该键与包含 `SystemFileSystem.localizingBundle` 属性的文件夹或文件的完整路径匹配。对于此示例，该路径是\
  \ `Menu/MyMenu` 和 `Menu/MyMenu/MySubMenu`。使用 `SystemFileSystem.icon` 属性，你还可以为文件夹或文件设置图标。使用\
  \ `nbresloc` 协议，以便它也可以作为国际化版本加载。（参见清单 34-5、34-6 和 34-7。）\n\n***清单 34-5.** Layer.xml*\n\
  \n`<folder name=\"`**`Menu`**`\">`\n`   <folder name=\"`**`MyMenu`**`\">`\n`      <attr\
  \ name=\"SystemFileSystem.localizingBundle\"`\n`            stringvalue=\"com.galileo.netbeans.module.Bundle\"\
  />`\n`      <folder name=\"`**`MySubMenu`**`\">`\n`         <attr name=\"`**`SystemFileSystem.localizingBundle`**`\"\
  `\n`               stringvalue=\"com.galileo.netbeans.module.Bundle\"/>`\n`         <attr\
  \ name=\"`**`SystemFileSystem.icon`**`\"`\n`               urlvalue=\"`**`nbresloc`**`:/com/galileo/netbeans/module/icon.png\"\
  />`\n`      </folder>`\n`   </folder>`\n`</folder>`\n\n***清单 34-6.** Bundle.properties*\n\
  \n**`Menu/MyMenu`**`=Extras`\n**`Menu/MyMenu/MySubMenu`**`=My Tools`\n\n***清单 34-7.**\
  \ Bundle_de.properties*\n\n**`Menu/MyMenu`**`=Extras`\n**`Menu/MyMenu/MySubMenu`**`=Meine\
  \ Tools`\n\n系统文件系统提供了 `bundlevalue` 属性类型，用于国际化层文件中的属性。因此，你可以将例如由层文件中的属性确定的操作名称外包到属性包中。\n\
  \n`<file name=\"com-galileo-netbeans-MyFirstAction.instance\">`\n`   <attr name=\"\
  `**`displayName`**`\" bundlevalue=\"com.galileo.netbeans.module.Bundle#CTL_MyAction\"\
  />`\n`</file>`\n\n因此，操作的名称由 `CTL_MyAction` 键确定。为此，请指明包和包的名称。最终使用哪个包取决于区域设置，并且是自动确定的。\n\
  \n### 本地化资源的管理和准备\n\n到目前为止，本讨论假设本地化资源已存储在模块所在的同一文件夹中，无论是 *Bundle.properties* 文件还是图形。但是，如何确保每种语言的资源被单独管理，以及如何稍后为已提供的模块添加额外的翻译？为此，NetBeans\
  \ 平台可以将要本地化的资源与模块的其余部分（主要是类）分离。图 34-3 显示了 *locale* 目录，该目录位于存储模块的目录之下。此文件夹中 JAR 归档文件中的某种语言的资源会附加一个语言/国家标识符。该归档文件与模块\
  \ JAR 归档文件同名。在此*区域设置扩展归档文件*中，管理所有语言/国家特定的资源。它们具有与模块相同的包结构。这样，资源就被分离了，并且可以单独更新。例如，NetBeans\
  \ 平台模块的翻译就是以相同方式提供的。\n\n![Image](img/3403.jpg)\n\n***图 34-3.** 在目录 locale 的单独 JAR\
  \ 归档文件中准备特定语言的资源*\n\n请注意，各个本地化资源仍然需要语言/国家标识符。*区域设置扩展归档文件*不需要清单文件，因为该归档文件完全由本地化包的名称标识，并被添加到模块类加载器的类路径中。\n\
  \n在此示例中，德语的资源作为区域设置扩展归档文件位于 *locale* 文件夹中。没有标识符的英语资源是默认资源，位于模块的 JAR 归档文件中。现在，有趣的是，你可以将默认资源放入区域设置扩展归档文件中，因为它没有标识符，并且可以在\
  \ *locale* 目录中提供；你计划本地化的资源与模块本身完全分离。当添加另一种语言是由第三方完成时，尤其如此，因为很明显哪些资源必须本地化。\n\n###\
  \ 总结\n\n本章展示了如何国际化应用程序，使其适应多种语言。你学习了国际化源代码和清单文件的细节，以及适配帮助页面和其他资源（如图形）的方法。\n\n##\
  \ 第 35 章\n\n## 应用程序的品牌化与打包\n\n如第 3 章所述，NetBeans 平台使用两种不同类型的容器：*模块套件*和*NetBeans 平台应用程序*。模块套件代表纯相关模块的集合，而\
  \ NetBeans 平台应用程序则为独立应用程序提供了基本结构。这意味着你可以根据用户需求定制 NetBeans 平台应用程序，然后从中创建可安装的包。以下部分将解释其工作原理。\n\
  \n### 品牌化\n\n平台应用程序提供了一个单独的对话框，用于所谓的品牌化，即应用程序的产品特定适配。此对话框中有许多设置，包括名称和不同图标的适配，以及确定启动画面和窗口系统的行为。有趣的是，你可以任意更改平台定义的所有文本，例如某些窗口的名称。在以下部分中，我们将对此进行更详细的探讨；首先，在你的平台应用程序的上下文菜单中单击*品牌化...*。NetBeans\
  \ 平台应用程序中的品牌化示例如图 35-1 所示。\n\n\n\n#### 名称、图标与启动画面\n\n在品牌设置对话框的第一个选项卡（*基本设置*）中，您可以指定应用程序的名称，并为\
  \ 16 × 16、32 × 32 和 48 × 48 三种尺寸分配图标。这些图标用于不同用途。例如，16 × 16 的图标用于应用程序的标题栏，32 × 32\
  \ 的图标用于任务栏。不过，您也可以为每种用途指定不同的图标。\n\n![图片](img/3501.jpg)\n\n***图 35-1.** NetBeans\
  \ Platform 应用程序的品牌设置*\n\n在*启动画面*选项卡中，您可以选择一个启动画面，该画面会在应用程序启动时显示。此启动画面也用于“关于”对话框。此外，您还可以在启动画面上显示一个进度条。您可以显示或隐藏进度条，并决定其颜色。通过拖放操作，您可以轻松确定进度条在启动画面上的位置。同样，您还可以在此处确定文本字段的位置，该字段用于显示加载应用程序时的状态信息。您也可以自行设定文本的颜色。\n\
  \n#### 窗口系统行为\n\n在第 10 章中，您已经学习了如何在 NetBeans 窗口系统中单独指定窗口的行为。在*窗口系统*选项卡中，您可以将这些设置全局应用于整个窗口系统，即应用于所有窗口。（参见图\
  \ 35-2。）\n\n![图片](img/3502.jpg)\n\n***图 35-2.** 配置窗口系统的行为*\n\n除了已知的参数外，您还可以决定窗口系统内的窗口大小是否可更改。此外，您还可以决定在编辑器模式（文档）或视图模式（非文档）下，窗口是否可以关闭。\n\
  \n#### 资源包\n\n您可以在*资源包*选项卡中更改 NetBeans Platform 的所有文本常量，并轻松地将其调整为您所需的内容（参见图 35-3）。右上角提供了一个搜索字段，用于按键和值过滤文本常量。这样，您就能轻松管理这些数量众多的资源包。\n\
  \n![图片](img/3503.jpg)\n\n***图 35-3.** 调整 NetBeans Platform 的文本常量*\n\n例如，如果您想删除版本号（默认显示在应用程序标题后面），首先搜索\
  \ `application` 以获取一系列键值对。这样，您就能找到键为 `CTL_MainWindow` 的文本常量，它决定了应用程序的名称。双击此条目，您可以更改其值。删除标题后面的\
  \ `{0}` 部分。这样，版本号就不再显示了。所有更改过的文本都会以粗体显示，以便您总览所有修改。\n\n如果您更改了文本常量，原始文件并不会被修改。相反，NetBeans\
  \ IDE 会在您的 Platform 应用程序的 *branding* 目录中，按照相应模块的原始文件夹层次结构，创建包含更改后文本的新 *.properties*\
  \ 文件。（参见图 35-4。）在创建应用程序时，会创建一个所谓的品牌模块，其名称中包含 *Branding Name* 作为后缀。在 Platform 应用程序的\
  \ *Properties* 下的 *Application* 中定义品牌名称。这样，您可以同时交付具有不同品牌设置的应用程序。您可以通过命令行参数指定启动应用程序时选择哪个品牌；这将在“命令行参数”部分中介绍。\n\
  \n![图片](img/3504.jpg)\n\n***图 35-4.** 在品牌模块中管理已更改的文本常量*\n\n您可以随时切换回原始值，因为更改后的文本常量是单独管理的。在开发过程中，如果您想重置单个或多个更改后的值，请打开*文件*视图。在*文件*视图中，您可以在\
  \ Platform 应用程序的目录中找到 *branding* 文件夹。在此文件夹中，您可以找到相应的属性文件（参见图 35-4）。在那里，您可以删除单独的条目或整个文件。\n\
  \n### 命令行参数\n\n通过 NetBeans Platform 提供的特定于操作系统的启动器来启动您完成的应用程序。例如，对于 Windows 操作系统，此启动器是一个\
  \ *.exe* 文件。您可以通过一系列参数来影响此启动器，从而影响应用程序的启动和执行。请注意，所有路径要么使用双反斜杠，要么使用单斜杠。命令行参数列于表 35-1\
  \ 中。\n\n#### 参数概览\n\n![图片](img/t3501.jpg)\n\n您可以直接将这些参数传递给启动器，或者通过位于应用程序分发目录中的 *etc/<品牌名称>.conf*\
  \ 文件来定义和传递。在该文件中，您可以通过 `default_options` 属性指定任何选项。此外，您还可以在此文件中单独指定 Java 平台、用户目录以及其他集群的路径。\n\
  \n#### 开发时确定参数\n\n使用 `run.args.extra` 属性，您可以在 Platform 应用程序或模块的 *project.properties*\
  \ 文件中指定参数（如果该模块不属于其他应用程序）。您可以使用此属性在 NetBeans IDE 内开发应用程序时定义命令行参数。例如，如果您要测试另一个区域设置并希望打开日志记录器的输出，请在\
  \ *project.properties* 文件中输入以下内容：\n\n`run.args.extra = --locale fr:FR \\`\n`                 -J-Dcom.galileo.netbeans.module.level=100`\n\
  \n### 创建分发版本\n\nNetBeans IDE 提供了多种类型来创建应用程序的分发版本。对于最终用户而言，安装程序包是最有趣的分发形式，因为用户只需单击安装程序即可自动安装完整的软件。\n\
  \n#### 安装程序包\n\nNetBeans IDE 能够从您的应用程序创建特定于操作系统的安装程序包，如图 35-5 所示。为此，只需在 Platform\
  \ 应用程序的 *Properties* 下的 *Installer* 中定义您要创建的包类型。您还可以选择添加软件许可证，并选择是否压缩安装程序包。\n\n\
  ![图片](img/3505.jpg)\n\n***图 35-5.** 创建特定于平台的安装程序包*\n\n您可以为 Windows、Linux、Mac OS\
  \ X 和 Solaris 创建安装程序包。现在，如果您从应用程序上下文菜单中选择 *Package as…* ![图片](img/U001.jpg) *Installers*，NetBeans\
  \ IDE 将在 *dist* 目录中创建所需的安装程序包。\n\n\n\n#### ZIP 分发\n\n将应用程序打包为 ZIP 分发文件是一种非常常见的交付形式。与安装程序包一样，执行应用程序所需的所有部分都会被打包。这包括\
  \ NetBeans 平台的模块、您自己的应用程序模块、用于启动应用程序的启动器以及一些配置文件。（参见图 35-6。）您可以通过在应用程序项目的上下文菜单中选择\
  \ *打包为…* ![Image](img/U001.jpg) *ZIP 分发* 来开始创建这个完整的包。完成后的分发文件保存在相应项目文件夹的 *dist*\
  \ 目录中。\n\n![Image](img/3506.jpg)\n\n***图 35-6.** ZIP 分发的组成部分*\n\n*   特定于平台的启动器位于\
  \ *bin* 目录中。其中还包括一个 *.exe* 文件。\n*   *etc* 目录包含启动器使用的配置文件。这包括 <*品牌标识 id>.conf* 文件，您可以在其中定义命令行参数或\
  \ JDK 的路径（参见“创建分发”部分）。\n*   *my_application* 和 *platform* 目录是集群。在 *my_application*\
  \ 集群中，存放着您的应用程序模块以及您的配置文件和经过适配的平台模块。因此，NetBeans 平台的所有模块，包括 NetBeans 运行时容器的模块（参见第\
  \ 2 章），都位于 *platform* 集群中。\n\n#### Java Web Start 包\n\n使用 Java Web Start，您的应用程序可以直接从互联网启动并执行。为此，请从平台应用程序的上下文菜单中调用菜单项\
  \ *JNLP* ![Image](img/U001.jpg) *构建*。此调用的结果是在 *dist* 分发目录中获得一个 *.war* 文件。然后可以将此文件直接复制到\
  \ servlet 容器的部署目录中。*WEB-INF/web.xml* 文件是部署描述符，它定义了位于 *WEB-INF/lib* 目录中的 JNLP servlet。\n\
  \n#### Mac OS X 应用程序\n\n第四种也是最后一种分发方式，即创建 Mac OS X 应用程序，也是可用的。为此，请调用相应平台应用程序的上下文菜单\
  \ *打包为… ![Image](img/U001.jpg) Mac OS X 应用程序*。请注意，您无法在 Windows 平台上执行此操作，因为其中会访问\
  \ *ln* 命令，但 Windows 并未提供该命令。\n\n### 总结\n\n## 第 36 章\n\n## 更新 NetBeans 平台应用程序\n\n\
  在软件生命周期中，几乎总是会发生这样的情况：由于修复错误、增加新功能或实现新需求，您希望为应用程序提供更新。如果您只需要提供一个补丁或一个新功能，却需要重新分发整个应用程序，那将非常麻烦。这正是模块化架构的优势之一：您可以在模块层提供更新。对于用户而言，安装更新必须尽可能简单直观。为此，NetBeans\
  \ 平台结合插件管理器提供了一个自动更新服务。该模块能够在一组预定义的更新中心中自动搜索已更新或新的模块，并在运行时动态加载它们。此外，用户还可以通过插件管理器手动安装下载的更新或新模块。\n\
  \n### 自动更新服务\n\n更新以 NBM 文件的形式提供。这些更新包必须通过更新中心提供。在 NetBeans 平台应用程序中，可以定义更新中心，自动更新服务会在其中搜索更新。更新中心的定义可以手动进行，也可以随应用程序模块一起提供。用户可以配置应用程序，使其在特定时间自动搜索更新。当然，也可以手动启动更新。图\
  \ 36-1 展示了自动更新服务的组件。\n\n![Image](img/3601.jpg)\n\n***图 36-1.** 构成自动更新功能的组件及其依赖关系*\n\
  \n### NBM 文件\n\n您希望作为更新提供的模块以 NBM 文件的形式分发。这些文件由一个 JAR 归档文件组成，其中包含实际的模块及其配置数据以及插件管理器所需的更新信息（参见图\
  \ 36-2）。一个 NBM 文件还可能包含该模块所需的库。模块 JAR 文件及其相关配置文件的内容已在第 3 章中描述过。\n\n我尚未讨论的一个文件是 `info.xml`\
  \ 文件。该文件包含在插件管理器中选择现有模块或要安装的模块时向用户显示的信息（参见清单 36-1）。`manifest` 元素包含来自模块清单文件的信息。例如，定义的依赖关系非常重要。如果用户在插件管理器中选择了一个依赖于另一个模块的模块，则后者会被自动激活，以便与所选模块同时下载。不过，如果依赖关系无法满足，用户仍然可以安装该模块，但无法激活它。最后，您还可以通过\
  \ `license` 元素添加许可证信息，该信息会在模块安装开始前显示给用户。这会强制用户确认已满足许可要求，以便安装该模块。\n\n![Image](img/3602.jpg)\n\
  \n***图 36-2.** NBM 文件的组成部分*\n\n***清单 36-1.** NBM 文件的信息文件*\n\n`<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\"?>`\n`<!DOCTYPE module PUBLIC    \"-//NetBeans//DTD Autoupdate\
  \ Module Info 2.5//EN\"`\n`   \"http://www.netbeans.org/dtds/autoupdate-info-2_5.dtd\"\
  >`\n`<module` **`codenamebase`**`=\"com.galileo.netbeans.module\"`\n**`distribution`**`=\"\
  ./com-galileo-netbeans-module.nbm\"`\n**`downloadsize`**`=\"7123\"`\n**`homepage`**`=\"\
  http://heikoboeck.de\"`\n**`license`**`=\"AD9FBBC9\"`\n**`moduleauthor`**`=\"Heiko\
  \ Boeck\"`\n**`needsrestart`**`=\"false\"`\n**`releasedate`**`=\"2007/10/16\">`\n\
  `   <`**`manifest`** `AutoUpdate-Show-In-Client=\"true\"`\n`             OpenIDE-Module=\"\
  com.galileo.netbeans.module\"`\n`             OpenIDE-Module-Name=\"My Module\"\
  `\n`             OpenIDE-Module-Implementation-Version=\"071016\"`\n`             ...\
  \              OpenIDE-Module-Specification-Version=\"1.0\"/>`\n`   <`**`license`**\
  \ `name=\"AD9FBBC9\">Place your license information here</`**`license`**`>`\n`</module>`\n\
  \nNBM 文件由 NetBeans IDE 自动创建，只需在所需模块的上下文菜单中选择 *创建 NBM* 即可。当您选择 *创建 NBM* 时，IDE 会尝试对\
  \ NBM 文件进行签名。为此，必须准备并生成一个所谓的密钥库（参见图 36-3）。使用 NetBeans IDE 的 *密钥库管理器*，该管理器仅在安装 *Mobility*\
  \ 插件后才可用。此 mobility 插件是完整 NetBeans IDE 安装包的一部分。不过，您也可以稍后通过插件管理器（*工具 ![Image](img/U001.jpg)\
  \ 插件 ![Image](img/U001.jpg) 可用插件*）安装此插件。通过 *工具 ![Image](img/U001.jpg) 密钥库* 打开密钥库管理器。接下来，通过\
  \ *添加密钥库...* 创建一个密钥库文件，包括文件名和密钥库将存放的目录。推荐的位置是您模块的 *nbproject* 文件夹。在输入至少六个字符的密码后，单击“确定”以创建密钥库。\n\
  \n![Image](img/3603.jpg)\n\n***图 36-3.** 创建密钥库*\n\n\n\n现在，需要添加一个密钥对。使用此密钥对可以对 NBM\
  \ 文件进行签名。为此，请在密钥库管理器中选择密钥库（左侧），然后单击*新建...*按钮（右侧）。在接下来的对话框中（如图 36-4 所示），您必须指定一个别名并提供个人信息。请确保提供与创建密钥库时相同的密码。接下来，单击*确定*关闭对话框并在密钥库中创建密钥对。\n\
  \n![Image](img/3604.jpg)\n\n***图 36-4.** 创建密钥对*\n\n或者，您也可以在不使用 NetBeans IDE 的情况下创建密钥库和密钥对。您可以使用\
  \ JDK 自带的 *keytool* 工具。调用方式如下：\n\n`<JDK 路径>/bin/keytool –genkey`\n`   –storepass\
  \ mypassword`\n`   –alias mymodule`\n`   –keystore <模块路径>/nbproject/keystore.ks`\n\
  \n为了让 IDE 能够找到密钥库和密钥对，请在 `nbproject/project.properties` 文件中定义以下两个属性（该文件位于*项目*窗口下的*重要文件\
  \ ![Image](img/U001.jpg) 项目属性*中）。如果该文件不存在，您可以自行创建。使用 `keystore` 定义密钥库相对于模块项目文件夹的路径。使用\
  \ `nbm_alias` 键设置要使用的密钥对的别名，因为一个密钥库可能包含多个密钥对。\n\n**`keystore`**`=nbproject/keystore.ks`\n\
  **`nbm_alias`**`=mymodule`\n\n现在再次调用*创建 NBM* 命令，让 IDE 对 NBM 文件进行签名。此时会弹出一个对话框，要求输入分配给密钥库的密码。输入正确的密码以成功完成签名。如果您不想每次都输入此密码，可以将\
  \ `storepass` 属性添加到属性文件中：\n\n**`storepass`**`=mypassword`\n\n然后，在插件管理器中，用户在下载所选模块完成后、最终安装过程开始之前，可以看到模块证书。请注意，系统会显示一条警告，提示该模块不可信。要避免此情况，请提供来自官方证书供应商（如\
  \ VeriSign）的证书。\n\n### 更新中心\n\nNBM 文件（即分布式应用程序的更新）被放入更新中心，用户可以从那里下载。这样的更新中心无非是一个存放模块的存储位置，通常位于可通过互联网访问的服务器上。使用\
  \ XML 文件形式的*更新中心描述符*来描述模块位置和其他详细信息（参见清单 36-2）。这样，自动更新服务就能找到模块，同时判断模块是已更新还是新模块。更新中心描述符列出了更新中心中每个\
  \ NBM 文件的 `info.xml` 文件内容（在上一节中已解释）。因此，应用程序的自动更新服务能够确定提供了哪些更新或新模块及其版本，而无需打开或下载 NBM\
  \ 文件。`license` 元素仅在 `module` 元素外部定义，而非内部。因此，您可以同时为多个模块使用同一个许可证。这样，只会向用户显示一个许可证。也可以多次使用\
  \ `license` 元素，以便为每个模块提供单独的许可证。\n\n***清单 36-2.** 更新中心描述符：updates.xml*\n\n`<?xml\
  \ version=\"1.0\" encoding=\"UTF-8\" ?>`\n`<!DOCTYPE module_updates PUBLIC    \"\
  -//NetBeans//DTD Autoupdate Catalog 2.5//EN\"`\n`   \"http://www.netbeans.org/dtds/autoupdate-catalog-2_5.dtd\"\
  >`\n`<module_updates timestamp=\"08/54/21/17/04/2007\">`\n`<module` **`codenamebase`**`=\"\
  com.galileo.netbeans.module\"`\n**`distribution`**`=\"./com-galileo-netbeans-module.nbm\"\
  `\n`           ...`\n`   </module>`\n`<module` **`codenamebase`**`=\"com.galileo.netbeans.module2\"\
  `\n**`distribution`**`=\"./com-galileo-netbeans-module2.nbm\"`\n`           ...`\n\
  `   </module>`\n`   <`**`license`**`name=\"AD9FBBC9\">在此处放置您的许可证信息</`**`license`**`>`\n\
  `</module_updates>`\n\n更新中心描述符的根元素是 `module_updates` 元素。`module_updates` 元素仅包含 `timestamp`\
  \ 属性，自动更新服务会将该时间戳与先前的时间戳进行比较。这意味着自动更新服务仅在 `timestamp` 日期晚于上次连接的日期时才会读取更新中心。可选地，可以通过\
  \ `module_group` 元素在更新中心描述符中对模块进行分组。这允许模块在插件管理器中以组的形式显示（按语义或上下文导向）；您可以以任何方式封装该元素。在\
  \ `module` 元素中，`distribution` 属性非常重要，因为它定义了模块的下载位置。除了本例中所示的相对路径，还可以提供指向模块位置的绝对 URL。\n\
  \n此类更新中心描述符的地址在更新中心配置中用作服务器 URL。不过，您不必自己创建更新中心描述符。如果您右键单击 NetBeans 平台应用程序的上下文菜单，会找到菜单项*打包为\
  \ ![Image](img/U001.jpg) NBM*。单击它，就会创建文件名为 *updates.xml* 的更新中心描述符，以及属于此平台应用程序的所有模块的独立\
  \ NBM 文件。您可以在 *build/updates* 目录中找到这些文件。\n\n### 提供语言包\n\n在第 34 章中，您已经学习了如何以另一种语言提供模块的语言特定内容。您了解了两种变体：一种是将本地化资源直接放置在模块中；另一种是通过\
  \ *locale* 目录中的独立 JAR 文件提供。到目前为止，本示例假设您可以访问模块或应用程序。但是，如何为您已提供的应用程序的用户提供额外的语言包呢？\n\
  \n您可以像通过更新中心提供更新或新模块一样，轻松地为已交付的模块提供额外的语言包。唯一的区别在于，更新描述符（*info.xml*）和更新中心描述符（*updates.xml*）中的\
  \ `manifest` 元素被替换为 `l10n` 元素。其结构如下：\n\n`<`**`l10n langcode`**`=\"de\"`\n`      module_major_version=\"\
  1\"`\n`      module_spec_version=\"1.0\"`\n`      OpenIDE-Module-Name=\"Mein Modul\"\
  `\n`      OpenIDE-Module-Long-Description=\"My Module 的德语本地化版本。\"`\n`/>`\n\n首先，使用\
  \ `langcode` 属性指明此包包含的语言。通过版本属性，您可以确定此语言包适用于哪个版本。仅当此语言包与已安装模块的版本匹配时，它才会被激活。\n\n\n\
  好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n### 在客户端配置和安装\n\n所需的更新中心必须通过*插件管理器*安装，您可以通过*工具\
  \ ![Image](img/U001.jpg) 插件*打开它。然后，您的富客户端应用程序就能够从更新中心获取新的或更新的模块。在*设置*选项卡中，您可以安装任何更新中心（参见图\
  \ 36-5）。更新中心的 URL 必须指向更新中心描述符（请参阅“更新中心”部分）。在此视图中，您还可以停用某些更新中心，从而将它们从更新过程中排除。\n\n\
  ![Image](img/3605.jpg)\n\n***图 36-5.** 配置要搜索新模块的更新中心*\n\n切换到*更新*选项卡时，使用*重新加载目录*按钮，让自动更新服务在已定义的更新中心中查找更新。系统会搜索应用程序中已安装模块的更新版本。要搜索新模块，请在*可用插件*选项卡中使用相同的方法。找到的模块会立即显示在列表中，您可以从中选择所需的模块。使用*更新*或*安装*按钮将选定的模块添加到应用程序中。本地可用的模块（即个人下载的模块）也可以安装。为此，请切换到*已下载*选项卡，然后单击*添加插件...*\
  \ 以添加所需的 NBM 文件。最后，单击*安装*以安装选定的插件。\n\n最后一个要讨论的选项卡是*已安装*选项卡（参见图 36-6）。所有当前已安装的模块都按类别列在其中。您可以在此视图中停用模块，也可以完全卸载它们。\n\
  \n![Image](img/3606.jpg)\n\n***图 36-6.** “已安装”选项卡列出了所有已安装的模块。在这里，您可以停用和卸载模块。*\n\n\
  #### 新建更新中心\n\n如前所述，您应用程序的用户可以在插件管理器中注册额外的更新中心。但是，您也可以将更新中心信息添加到您的某个模块中。一旦该模块在应用程序中被加载，注册的更新中心也会自动提供。因此，您可以为已交付的应用程序添加额外的更新中心。要将此类更新中心信息添加到您的模块，可以在*文件\
  \ ![Image](img/U001.jpg) 新建文件... ![Image](img/U001.jpg) 模块开发 ![Image](img/U001.jpg)\
  \ 更新中心*下找到一个向导。该向导会注册输入的更新中心信息，包括名称和 URL，这些信息存储在层文件中标准文件夹 `Services/AutoupdateType`\
  \ 内。这样的条目看起来如清单 36-3 所示。\n\n***清单 36-3.** 层文件中的更新中心定义*\n\n`<folder name=\"`**`Services`**`\"\
  >`\n`   <folder name=\"`**`AutoupdateType`**`\">`\n`      <file name=\"`**`my_module_update_center.instance`**`\"\
  >`\n`         <attr name=\"`**`displayName`**`\"`\n`               bundlevalue=\"\
  com.galileo.netbeans.module.Bundle                #Services/AutoupdateType/my_module_update_center.instance\"\
  />`\n`         <attr name=\"`**`enabled`**`\" boolvalue=\"`**`true`**`\"/>`\n`         <attr\
  \ name=\"instanceCreate\" methodvalue=`\n`               \"org.netbeans.modules.autoupdate.updateprovider.`\n\
  `               AutoupdateCatalogFactory.createUpdateProvider\"/>`\n`         <attr\
  \ name=\"instanceOf\" stringvalue=\"org.netbeans.spi.autoupdate.UpdateProvider\"\
  />`\n`         <attr name=\"`**`url`**`\" bundlevalue=`\n`               \"com.galileo.netbeans.module.Bundle#`**`my_module_update_center`**`\"\
  />`\n`      </file>`\n`   </folder>`\n`</folder>`\n\n实际文件已外包到资源包中：\n\n`my_module_update_center=`**`http://heikoboeck.de/updates.xml`**\n\
  `Services/AutoupdateType/my_module_update_center.instance=`**`My Update Center`**\n\
  \n此示例假设更新中心可通过 *http* 的互联网地址公开访问。但是，您也可以使用 *file* 协议来安装更新中心，例如，在公司内部服务器上。\n\n`file:/D:/NetBeans/MyUpdateCenter/updates/updates.xml`\n\
  \n#### 自动安装更新\n\nNBM 文件也可以在无需用户交互的情况下安装。为此，只需将 NBM 文件放入集群的 *`update/download`* 目录中。然后，当应用程序下次启动时，更新将自动安装。之后，NBM\
  \ 文件会被移除，应用程序会重新启动。已更新模块原始版本的备份位于 *`update/backup/netbeans`* 目录中。请记住，更新始终安装在存储该更新的集群中，即使要更新的模块安装在不同的集群中也是如此。\n\
  \n*自动更新服务 API* 为模块的管理、自动安装、卸载或停用提供了更多可能性。第 25 章 将介绍自动更新服务 API 的功能。\n\n### 总结\n\n\
  本章向您介绍了 NetBeans 平台的更新功能。首先，您了解了自动更新服务的工作原理。NBM 文件是一个更新包，可以通过 NetBeans IDE 从您的模块创建。接下来，您学习了如何提供和配置更新中心。您还了解了如何配置模块以提供现有模块的本地化版本。最后，本章讨论了客户端更新中心的配置以及如何自动安装更新。\n\
  \n## 第七部分\n\n## 测试与工具：开发和测试 NetBeans 平台应用程序\n\n## 第 37 章\n\n## Maven 与 NetBeans\
  \ 平台\n\nNetBeans 平台默认使用构建工具 Ant。作为 Ant 的替代方案，Maven 迄今为止仅作为附加插件提供，且 IDE 对其支持有限。但这种情况已经改变；Maven\
  \ 现在已成为 NetBeans IDE 的一个组成部分。NetBeans IDE 包含了 Maven 发行版和用于创建不同项目类型的众多向导。本章将重点介绍在开发\
  \ NetBeans 平台应用程序时的 Maven 支持。\n\nMaven 项目的配置是分层且模块化的，因此它非常适合作为 NetBeans 平台应用程序的构建系统。在\
  \ Maven 项目中，完整的构建过程由 Maven 执行，这意味着即使没有 NetBeans IDE 也能轻松工作。Maven 本身的功能被组织成独立的插件；由于\
  \ Maven 的广泛使用，针对众多任务都有可用的插件。必要的配置文件保持小巧且组织清晰。\n\n### Maven 项目的基础和结构\n\n在 Maven 中，软件项目的所有必要信息都在所谓的\
  \ *POM*（项目对象模型）文件中定义。每个模块（例如 JAR 文件）都包含自己的文件。一个项目可以由多个模块组成。可以创建一个聚合这些模块的父 POM 文件，以便可以共同创建这些模块。同时，下级模块可以继承父\
  \ POM 文件的特性。这样就形成了一个分层结构，并且这个结构可以进一步向下扩展。（参见图 37-1。）\n\n![Image](img/3701.jpg)\n\
  \n***图 37-1.** 具有父 POM 文件的多模块项目的文件结构，用于继承特性和聚合多个模块*\n\n\n\n#### 父 POM 文件\n\nMaven\
  \ 最重要的特性之一就是支持继承。这意味着父 POM 可以被 POM 文件引用。在父 POM 中定义的元素可以被继承或覆盖。同时，还可以聚合模块。所有属于该项目的模块都在父\
  \ POM 文件中定义。这样，一个由多个模块组成的软件项目就可以作为一个整体来创建。\n\n父 POM 文件的基本结构如清单 37-1 所示。在该文件中，或者说该项目，主要通过\
  \ `groupId`、`artifactId` 和 `version` 元素来标识。由于它不是模块（例如 JAR 文件），而是一个父 POM 文件，因此使用了\
  \ *pom* 类型的 `packaging`。在 `dependencies` 元素下，你可以定义对其他模块的依赖关系。这对于使用其他模块中类的单个模块尤其重要。你可以在父\
  \ POM 文件中预先定义依赖项的版本，以确保所有定义了该依赖关系的模块都使用相同的版本。你还可以使用 `build` 元素预先配置构建过程中使用的插件。多个相关模块的实际聚合是通过\
  \ `modules` 元素实现的。因此，如果使用此父 POM 文件启动构建过程，则会构建 *Module1* 和 *Module2* 模块。如果构建过程在某个模块上失败，则整个构建过程将被取消。\n\
  \n***清单 37-1.** 用于聚合多个模块的父 POM 文件示例*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"\
  ?>`\n`<project    xsi:schemaLocation=\"http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
  >`\n`   <modelVersion>4.0.0</modelVersion>`\n`   <`**`groupId`**`>com.galileo.netbeans</`**`groupId`**`>`\n\
  `   <`**`artifactId`**`>MyApplication</`**`artifactId`**`>`\n`   <version>1.0-SNAPSHOT</version>`\n\
  `   <`**`packaging`**`>pom</`**`packaging`**`>`\n`   <name>MyApplication</name>`\n\
  `   <repositories>...</repositories>`\n`   <build>...</build>`\n`   <`**`modules`**`>`\n\
  `      <module>`**`Module1`**`</module>`\n`      <module>Module2</module>`\n`   </`**`modules`**`>`\n\
  `   <properties>...</properties>`\n`</project>`\n\n#### 模块 POM 文件\n\n模块的 POM 文件具有完全相同的基本结构。显然，此处使用\
  \ `parent` 元素代替了 `modules` 元素。这样，你就可以引用要使用的 POM 文件，其设置将被继承。由 `artifactId` 指定的名称必须与父\
  \ POM 文件中 `modules` 下指定的名称相同。现在，你定义了你正在处理的是一个模块。这是通过 `packaging` 元素完成的；例如，对于 NetBeans\
  \ Platform 模块，它可以是 *jar* 或 *nbm*。（参见清单 37-2。）\n\n***清单 37-2.** 继承自父 POM 文件的模块 POM\
  \ 文件示例*\n\n`<?xml version=\"1.0\" encoding=\"UTF-8\"?>`\n`<project xsi:schemaLocation=\"\
  http://maven.apache.org/xsd/maven-4.0.0.xsd\">`\n`   <modelVersion>4.0.0</modelVersion>`\n\
  `   <`**`parent`**`>`\n`      <artifactId>MyApplication</artifactId>`\n`      <groupId>com.galileo.netbeans</groupId>`\n\
  `      <version>1.0-SNAPSHOT</version>`\n`   </`**`parent`**`>`\n`   <artifactId>`**`Module1`**`</artifactId>`\n\
  `   <`**`packaging`**`>nbm</`**`packaging`**`>`\n`   <name>MyModule</name>`\n`   <properties>...</properties>`\n\
  `   <dependencies>`\n`      <`**`dependency`**`>`\n`         <groupId>com.galileo.netbeans</groupId>`\n\
  `         <artifactId>Module5</artifactId>`\n`         <version>1.3</version>`\n\
  `      </`**`dependency`**`>`\n`   </dependencies>`\n`   <build>...</build>`\n`</project>`\n\
  \nMaven 最重要的特性之一是依赖管理，尤其是与 Ant 相比。在 Maven 中，对其他模块（JAR 文件）或项目的依赖关系是在每个项目或模块的相应 POM\
  \ 文件中声明的。然而，实际的主要优势在于 Maven 能够解析传递性依赖，因为 Maven 甚至能够解析并集成依赖项的依赖项。因此，你无需关心整个类路径，这确保了构建在任何时候都能轻松重现。\n\
  \n#### Maven 仓库\n\n嵌入和管理仓库是 Maven 不可或缺的一部分。在此上下文中，仓库是工件（主要是 JAR 文件）的存放位置。除了实际的工件之外，POM\
  \ 文件也位于此处。因此，POM 文件允许解析传递性依赖。存储结构遵循特定的约定。例如，如果另一个项目需要，组 ID 为 `com.galileo.netbeans`、工件\
  \ ID 为 `MyModule`、版本为 `1.0` 的模块将位于 `<Repository>/com/galileo/netbeans/MyModule/1.0/MyModule-1.0.jar`。\n\
  \n除了默认集成的中央 Maven 仓库（[`http://repo1.maven.org/maven2`](http://repo1.maven.org/maven2)）之外，你可以为项目定义任意数量的其他特定仓库。将清单\
  \ 37-3 中的条目添加到你的 POM 文件中，以便能够使用来自包含 NetBeans 模块的仓库中的工件。\n\n***清单 37-3.** Maven 仓库的定义*\n\
  \n`<repositories>`\n`   <`**`repository`**`>`\n`      <id>netbeans</id>`\n`      <name>NetBeans</name>`\n\
  `      <url>http://bits.netbeans.org/maven2/</url>`\n`   </`**`repository`**`>`\n\
  `</repositories>`\n\n当然，这个定义可以添加到父 POM 文件中，这样就不必单独配置每个相应的模块了。\n\nMaven 管理一个本地仓库；你不必为每次构建都从在线仓库下载必要的工件。所有下载的工件都位于此本地仓库中，构建过程会首先搜索该仓库以加速构建。然后，该过程也可以离线执行。你可以在\
  \ *settings.xml* 文件中定义本地仓库的位置，该文件通常位于用户目录下的 *<user directory>/.m2/settings.xml*。定义如清单\
  \ 37-4 所示。\n\n***清单 37-4.** 本地 Maven 仓库的定义*\n\n`<settings>`\n`   <`**`localRepository`**`>D:\\\
  MyLocalRepository</`**`localRepository`**`>`\n`   ...`\n`</settings>`\n\n### NetBeans\
  \ IDE 中的 Maven 项目\n\nNetBeans IDE 默认提供了用于创建 NetBeans Platform 应用程序及其 Maven 和 Ant\
  \ 模块的不同向导。此外，还提供了有用的功能，例如 Maven 仓库浏览器。\n\n\n\n#### 创建 NetBeans 平台应用程序\n\n首先，你可以通过\
  \ *文件 ![Image](img/U001.jpg) 新建项目… ![Image](img/U001.jpg) Maven ![Image](img/U001.jpg)\
  \ NetBeans 应用程序* 来创建一个 NetBeans 平台应用程序。请注意，项目名称不能包含空格，因为它会被用作 POM 文件中的 `artifactId`。由于仓库中定位的构件不允许包含空格，因此\
  \ artifactId 中不能有空格，但你可以在 `<name>` 中指定一个替代的显示名称。此外，你需要指定一个 `groupId`（采用类似 Java 包的反向\
  \ DNS 格式）和一个 `version`。向导的最后一步是选择你的应用程序所基于的 NetBeans 版本。POM 文件中会自动设置对相关集群的依赖，从而包含平台模块。此外，还可以设置是否将\
  \ OSGi 包添加为依赖项，以及是否在创建平台应用程序时直接创建一个初始模块项目。完成以下向导后，你将得到如图 37-2 所示的应用程序结构。\n\n![Image](img/3702.jpg)\n\
  \n***图 37-2.** NetBeans IDE 项目视图中基于 Maven 的 NetBeans 平台应用程序项目*\n\n一眼看去，引人注意的是实际的\
  \ NetBeans 平台应用程序项目并非仅由一个部分组成，而是由三个（如果选择添加示例模块，则为四个）部分组成。它们分别命名为 *NB App、NB App\
  \ Branding* 和 *NB App Parent*。这些部分具有以下任务：\n\n*   *NB App*：此项目决定了哪些组件属于该应用程序，即在 *pom.xml*\
  \ 文件中定义了与 NetBeans 平台集群、品牌模块以及应用程序模块 *MyModule* 的依赖关系。通过此项目的上下文菜单中的 *运行* 来启动你的应用程序。\n\
  *   *NB App Branding*：通过项目的这一部分，品牌资源（即经过调整的文本和图标）被管理并创建为品牌模块。你可以通过此项目的上下文菜单打开品牌对话框。\n\
  *   *NB App Parent*：这是整个应用程序的实际容器项目。也就是说，此项目的 POM 文件既是前面描述的两个模块的父 POM 文件，也是所有后续应用程序模块的父\
  \ POM 文件。所有模块的聚合正是通过 `modules` 属性在此处完成的。通过此项目的上下文菜单调用 *构建* 来创建整个应用程序。这样，所有附属模块都会被创建。\n\
  \n#### 创建 NetBeans 平台模块\n\n你可以通过 *文件 ![Image](img/U001.jpg) 新建项目… ![Image](img/U001.jpg)\
  \ Maven ![Image](img/U001.jpg) NetBeans 模块* 来类似地创建一个新的 Maven 应用程序模块。要从现有的平台应用程序中添加一个新模块，只需选择要创建模块的目标应用程序的基本目录。这是父\
  \ POM 文件所在的层级。该模块会自动添加到父 POM 文件中。同时，一个相应的 `parent` 条目也会被添加到模块的 POM 文件中。这样，它也会继承平台应用程序的配置。\n\
  \n#### 添加依赖项\n\n最后，我将向你展示如何向模块添加依赖项。为此，请在 *依赖项* 节点的上下文菜单中调用 *添加依赖项* 条目。你可以在相应的对话框中直接通过定义构件\
  \ ID、组 ID 和版本号来添加依赖项，或者通过选择一个打开的项目来添加（参见 图 37-3）。搜索功能包含了已定义的 Maven 仓库。这样，你就可以添加对\
  \ NetBeans 平台某个模块的依赖项，例如。然而，这也意味着你只能搜索那些已经安装在仓库中的模块。因此，如果你想定义一个对属于你的应用程序但尚未创建的模块的依赖项，你必须通过\
  \ *打开的项目* 这种方式。\n\n![Image](img/3703.jpg)\n\n***图 37-3.** 向基于 Maven 的 NetBeans 平台模块添加依赖项*\n\
  \n通过 Maven 仓库浏览器查找模块甚至更加容易（参见 图 37-4）。通过 *窗口 ![Image](img/U001.jpg) 其他 ![Image](img/U001.jpg)\
  \ Maven 仓库浏览器* 打开它。在这里你可以添加仓库。在这些仓库中，你可以搜索和浏览。你可以通过模块上下文菜单中的 *添加为依赖项* 将一个模块（以特定版本）添加为依赖项。\n\
  \n![Image](img/3704.jpg)\n\n***图 37-4**. Maven 仓库浏览器*\n\n### 不使用 NetBeans IDE 的\
  \ Maven 项目\n\n在上一节中，你使用了 NetBeans IDE 来创建 NetBeans 平台 Maven 项目。由于 NetBeans IDE 实际上只是将\
  \ GUI 的参数传递给 Maven，因此你也可以直接使用 Maven。接下来，我将详细向你展示如何使用 NetBeans Maven 插件来创建一个 NetBeans\
  \ 平台应用程序。\n\n在开始设置第一个 Maven 项目之前，需要满足一些前提条件：\n\n1.  如果你尚未安装 Maven，可以从 *[`maven.apache.org`](http://maven.apache.org)*\
  \ 下载最新版本。你只需解压下载的包并将其存放在合适的目录中即可。\n2.  然后创建环境变量 M2_HOME，该变量应指向 Maven 发行版的基本目录（例如，*C:\\\
  Program Files\\apache-maven-3.0.3*）。\n3.  此外，应设置环境变量 JAVA_HOME，该变量指向 JRE 目录（例如，*C:\\\
  Program Files\\Java\\jdk1.6.0_24*）。\n4.  最后，将该目录添加到 path 变量中。这样，就可以在命令行中直接调用 Maven，而无需指定路径。\n\
  \n现在，你已经准备好开始并创建一个基于 Maven 的 NetBeans 平台应用程序，具体操作如下所述。\n\n\n\n#### 创建 NetBeans 平台应用程序\n\
  \nNetBeans Maven 插件由原型 `netbeans-platform-app` 补充。该原型创建了 NetBeans 平台应用程序项目的完整结构。要找到该原型，你需要构件\
  \ ID、组 ID 和引用版本。\n\n接下来，你通过 `groupId`、`artifactId` 和 `version` 定义要创建的项目数据。使用 `netbeansVersion`\
  \ 定义你想要使用的 NetBeans 平台版本。你可以在 NetBeans Maven 仓库中查看所有可用版本，地址为 [`http://bits.netbeans.org/maven2/org/netbeans/cluster/platform/maven-metadata.xml`](http://bits.netbeans.org/maven2/org/netbeans/cluster/platform/maven-metadata.xml)。\n\
  \n你可以通过参数 `package` 可选地定义用于品牌模块的包。如果你未定义该参数，则组 ID 将作为有效值使用。要让 Maven 进入非交互模式，请使用参数\
  \ `--batch-mode`。这样，Maven 无需人工干预即可创建项目。你通过目标 `archetype:generate` 触发项目结构的创建（参见清单\
  \ 37-5）。\n\n***清单 37-5.** 使用命令行创建 NetBeans 平台应用程序项目的 Maven 参数*\n\n`>`**`mvn`**\n\
  `-DarchetypeArtifactId=`**`netbeans-platform-app-archetype`**\n`-DarchetypeGroupId=org.codehaus.mojo.archetypes`\n\
  `-DarchetypeVersion=1.10`\n`-DgroupId=com.galileo.netbeans`\n`-DartifactId=MyApplication`\n\
  `-Dversion=1.0-SNAPSHOT`\n`-DnetbeansVersion=RELEASE70`\n`-Dpackage=com.galileo.netbeans.myapplication`\n\
  `--batch-mode`\n**`archetype:generate`**\n\n如果你在项目将要创建的所需目录中执行清单 37-5 中显示的命令行调用，你将获得图\
  \ 37-5 中描述的结构。\n\n![Image](img/3705.jpg)\n\n***图 37-5.** 基于 Maven 的 NetBeans 平台应用程序项目的结构*\n\
  \n图 37-5 中描述的项目各部分的含义将在 *NetBeans IDE 中的 Maven 项目*一节中解释。此时，你希望再次深入了解配置的幕后情况。为了概览所创建的\
  \ POM 文件和项目结构，首先查看父 POM 文件，即顶层 *pom.xml* 文件（参见清单 37-6）。\n\n***清单 37-6.** NetBeans\
  \ 平台应用程序项目的父 POM 文件*\n\n`<project ... >`\n`   <modelVersion>4.0.0</modelVersion>`\n\
  `   <groupId>com.galileo.netbeans</groupId>`\n`   <artifactId>MyApplication</artifactId>`\n\
  `   <version>1.0-SNAPSHOT</version>`\n`   <packaging>pom</packaging>`\n`   <name>MyApplication\
  \ - NB App Parent</name>`\n`   <repositories>`\n`      <`**`repository`**`>`\n`         <id>netbeans</id>`\n\
  `         <name>NetBeans</name>`\n`         <url>`**`http://bits.netbeans.org/maven2/`**`</url>`\n\
  `      </`**`repository`**`>`\n`   </repositories>`\n`   <dependencies>`\n`      <dependency>`\n\
  `         <groupId>junit</groupId>`\n`         <artifactId>junit</artifactId>`\n\
  `         <version>4.8.2</version>`\n`         <scope>test</scope>`\n`      </dependency>`\n\
  `   </dependencies>`\n`   <build>`\n`      <`**`pluginManagement`**`>`\n`         <plugins>`\n\
  `            <plugin>`\n`               <groupId>org.codehaus.mojo</groupId>`\n\
  `               <artifactId>nbm-maven-plugin</artifactId>`\n`               <version>3.5</version>`\n\
  `               <extensions>true</extensions>`\n`               <configuration>                `\n\
  `                  <`**`brandingToken`**`>${brandingToken}</`**`brandingToken`**`>`\n\
  `                  <`**`cluster`**`>${brandingToken}</`**`cluster`**`>`\n`               </configuration>`\n\
  `            </plugin>`\n`            <plugin>`\n`               <groupId>org.apache.maven.plugins</groupId>`\n\
  `               <artifactId>maven-compiler-plugin</artifactId>`\n`               <version>2.3.2</version>`\n\
  `               <configuration>`\n`                  <source>1.6</source>`\n`                  <target>1.6</target>`\n\
  `               </configuration>`\n`            </plugin>`\n`         </plugins>`\n\
  `      </`**`pluginManagement`**`>`\n`   </build>`\n`   <`**`modules`**`>`\n`      <module>branding</module>`\n\
  `      <module>application</module>`\n`   </`**`modules`**`>`\n`   <properties>`\n\
  `      <`**`netbeans.version`**`>RELEASE70</`**`netbeans.version`**`>`\n`      <`**`brandingToken`**`>myapplication</`**`brandingToken`**`>`\n\
  `   </properties>`\n`</project>`\n\n接下来定义仓库。NetBeans 平台或 NetBeans IDE 模块可以从该仓库加载，因此它被全局提供给项目。在此文件的\
  \ `dependencies` 下定义的依赖项将提供给所有模块（这些模块继承自父 POM 文件）。因此，你不再需要添加对 JUnit 的依赖。稍后用于构建过程的\
  \ Maven 插件可以在 `pluginManagement` 元素下进行预配置。因此，在此处，例如，你可以定义要使用的集群和 NetBeans Maven\
  \ 插件的品牌令牌。此外，你可以向编译器插件提供信息，表明项目是基于 Java 创建的。最初，只有项目的两个模块（品牌模块和应用程序模块）被添加到 `modules`\
  \ 元素下。你创建的所有属于此应用程序的模块都将通过其构件 ID 在此处执行。最后，定义将全局和集中提供的属性。你可以使用 ${...} 访问它们的值。\n\n\
  品牌模块和应用程序模块的 POM 文件都具有普通 NetBeans 平台模块 POM 文件的结构。接下来让我们更仔细地看看这一点。\n\n\n\n#### 创建\
  \ NetBeans 平台模块\n\n在*创建 NetBeans 平台应用程序*一节中，通过命令行且不借助任何开发环境创建了一个基于 Maven 的 NetBeans\
  \ 平台应用程序项目后，现在您希望为其添加一个应用程序模块。系统提供了一个用于创建模块的原型；这样做的好处是，模块与项目的关系会自动建立。这意味着，当在其基本目录中创建模块时，该模块会自动添加到\
  \ NetBeans 平台应用程序项目中（参见清单 37-7）。\n\n***清单 37-7.** 使用命令行创建 NetBeans 平台模块项目的 Maven\
  \ 参数*\n\n`>`**`mvn`**\n`-DarchetypeArtifactId=`**`nbm-archetype`**\n`-DarchetypeGroupId=org.codehaus.mojo.archetypes`\n\
  `-DarchetypeVersion=1.7-DartifactId=MyModule`\n`-DgroupId=com.galileo.netbeans`\n\
  `-Dversion=1.0-SNAPSHOT`\n`-DnetbeansVersion=RELEASE70`\n`-Dpackage=com.galileo.netbeans.mymodule`\n\
  `--batch-mode`\n**`archetype:generate`**\n\n与创建平台应用程序项目不同，此处您使用的是 `nbm` 原型。这些参数与清单\
  \ 37-5 中已描述的参数一致。只需指定要创建的模块的 artifact ID、group ID 和版本。您还可以选择性地定义要使用的 NetBeans 版本以及作为此模块基础的包。\n\
  \n现在，让我们看一下为此模块生成的 POM 文件。首先，通过 `parent` 元素建立了与父 POM 文件的链接。因此，该文件继承了父 POM 文件的设置，从而无需再定义\
  \ NetBeans Maven 仓库或特定的 Java 版本等。这样，配置文件保持小巧且易于维护。`nbm` 被用作 `packaging` 类型，因此在创建模块时，会生成一个\
  \ NetBeans 模块。在此模块的 POM 文件中，还通过 `useDefaultManifestFile` 元素指示 JAR 插件使用已有的清单文件。\n\
  \n`<project ... >`\n`   <modelVersion>4.0.0</modelVersion>`\n`   <`**`parent`**`>`\n\
  `      <artifactId>MyApplication</artifactId>`\n`      <groupId>com.galileo.netbeans</groupId>`\n\
  `      <version>1.0-SNAPSHOT</version>`\n`   </`**`parent`**`>`\n`   <groupId>com.galileo.netbeans</groupId>`\n\
  `   <artifactId>MyModule</artifactId>`\n`   <version>1.0-SNAPSHOT</version>`\n`   <packaging>`**`nbm`**`</packaging>`\n\
  `   <name>MyModule NetBeans 模块</name>`\n`   <properties> ... </properties>`\n`   <`**`dependencies`**`>`\n\
  `      <dependency>`\n`         <groupId>org.netbeans.api</groupId>`\n`         <artifactId>org-netbeans-api-annotations-common</artifactId>`\n\
  `         <version>${netbeans.version}</version>`\n`      </dependency>`\n`   </`**`dependencies`**`>`\n\
  `   <build>`\n`      <plugins>`\n`         <plugin>`\n`            <groupId>org.apache.maven.plugins</groupId>`\n\
  `            <artifactId>maven-jar-plugin</artifactId>`\n`            <version>2.3.1</version>`\n\
  `            <configuration>`\n`               <`**`useDefaultManifestFile`**`>true</`**`useDefaultManifestFile`**`>`\n\
  `            </configuration>`\n`         </plugin>`\n`         ...`\n`      </plugins>`\n\
  `   </build>`\n`</project>`\n\n该模块已自动添加到父 POM 文件中，因此该模块属于整个 NetBeans 平台应用程序项目。为此，父\
  \ POM 文件进行了如下调整：\n\n`<modules>`\n`   <module>branding</module>`\n`   <module>application</module>`\n\
  **`   <module>MyModule</module>`**\n`</modules>`\n\n#### 公开包\n\n如前所述，NetBeans 模块必须明确地将那些类需要提供给其他模块使用的包声明为公开。您需要配置\
  \ NetBeans Maven 插件，以使基于 Maven 的 NetBeans 模块的包变为公开。为此，该插件提供了 `publicPackages` 元素。\n\
  \n在清单 37-8 中，包 `com.galileo.netbeans.api` 被设置为对其他模块公开。因此，另一个模块现在可以定义一个依赖关系，并使用这个公开包中的类。可以使用任意数量的\
  \ `publicPackage` 元素来定义更多的包。\n\n***清单 37-8.** 定义 NetBeans 模块的公开包*\n\n`<plugin>`\n\
  `   <groupId>org.codehaus.mojo</groupId>`\n`   <artifactId>nbm-maven-plugin</artifactId>`\n\
  `   <version>3.5</version>`\n`   <extensions>true</extensions>`\n`   <configuration>`\n\
  `      <`**`publicPackages`**`>`\n`         <`**`publicPackage`**`>com.galileo.netbeans.api</`**`publicPackage`**`>`\n\
  `      </`**`publicPackages`**`>`\n`   </configuration>`\n`</plugin>`\n\n#### 添加依赖关系\n\
  \n不同模块之间的依赖关系在 Maven 的 POM 文件中通过 `dependencies` 元素定义。如果您想定义对某个特定版本模块的依赖，请指定 artifact\
  \ ID、group ID 和版本（可选）。如果未指定版本，Maven 仓库中的元数据将用于查找最近使用的版本。要向 NetBeans 模块 *MyModule*\
  \ 添加对模块 *MyModule2* 的依赖，请在 POM 文件中扩展清单 37-9 所示的条目。\n\n***清单 37-9.** MyModule 与 MyModule2\
  \ 之间依赖关系的定义*\n\n`<dependencies>`\n`   <`**`dependency`**`>`\n`      <groupId>com.galileo.netbeans</groupId>`\n\
  `      <artifactId>MyModule2</artifactId>`\n`      <version>2.0</version>`\n`   </`**`dependency`**`>`\n\
  `</dependencies>`\n\n#### 创建并执行应用程序\n\n最后，问题仍然是如何整体创建应用程序以及如何将其作为 NetBeans 平台应用程序来执行。要创建整个应用程序，请使用标准的\
  \ Maven 构建阶段 *install*。所有源代码将被编译，测试将被执行（如果存在），模块将被打包，最后整个应用程序将被复制到本地仓库中。在父 POM 文件上执行此构建阶段：\n\
  \n`D:\\NetBeans\\Maven\\MyApplication>`**`mvn install`**\n\n表 37-1 中列出的 NetBeans\
  \ Maven 插件的目标会自动与此构建阶段（或与构建阶段 *package*）关联。为此，查看插件的网站会非常有帮助：[`http://mojo.codehaus.org/nbm-maven-plugin/plugin-info.html`](http://mojo.codehaus.org/nbm-maven-plugin/plugin-info.html)。在那里，您可以找到所提供的各个目标的参数。这样，您就可以根据特殊需求调整构建过程。\n\
  \n![图片](img/t3701.jpg)\n\n使用 `mvn install` 创建应用程序后，您现在可以使用 `mvn nbm:run-platform`\
  \ 启动应用程序。请注意，此目标只能在打包类型为 *nbm-application* 的 POM 文件上使用。这意味着您需要切换到标准应用程序模块的目录来执行应用程序：\n\
  \n`D:\\NetBeans\\Maven\\MyApplication\\application>`**`mvn nbm:run-platform`**\n\
  \n此外，还提供了表 37-2 中列出的目标。它们可以被显式调用。\n\n![图片](img/t3702.jpg)\n\n![图片](img/t3702a.jpg)\n\
  \n至此，您已经无需 NetBeans IDE 即可安装、创建并执行一个 NetBeans 平台应用程序。这主要表明，开发基于 NetBeans 平台的应用程序并不一定需要\
  \ NetBeans IDE。使用 Maven 极大地简化了使用替代开发环境的过程。第 38 章和第 40 章将介绍在 Eclipse 和 IntelliJ IDEA\
  \ IDE 中开发 NetBeans 平台应用程序。\n\n### 总结\n\nMaven 现在已成为 NetBeans 平台不可或缺的一部分。因此，除了 Ant\
  \ 之外，不仅提供了另一种构建系统，还提供了一个独立于 NetBeans IDE 进行工作的绝佳机会。在本章中，您学习了如何在 NetBeans IDE 中使用\
  \ Maven 项目。您还学习了如何在不使用 NetBeans IDE 的情况下，通过命令行使用 Maven 创建和构建 NetBeans 平台应用程序。\n\n\
  ## 第 38 章\n\n\n\n## Eclipse IDE 与 NetBeans 平台\n\n在第 37 章中，你已经了解到，即使不使用 NetBeans\
  \ IDE，也能轻松创建基于 NetBeans 平台的应用程序。现在之所以能够实现这一点，是因为 NetBeans 平台应用程序可以使用 Maven（配合 NetBeans\
  \ Maven 插件）进行开发。一个包含所有 NetBeans 模块（作为 Maven 模块）的 Maven 仓库位于 [`http://bits.netbeans.org/maven2`](http://bits.netbeans.org/maven2)，因此，对\
  \ NetBeans 平台模块的依赖关系可以轻松地通过一个 XML 条目来定义。\n\n除了 Maven，大量的注解也有助于摆脱对特定 IDE 的依赖，因为到目前为止，许多声明式配置条目已经通过相应的向导创建完成。但手动编译这些条目既复杂又容易出错。相应的配置条目和配置文件会自动生成。\n\
  \n由于 Eclipse IDE 支持 Maven，因此为使用 NetBeans 平台扫清了道路。\n\n### 安装 Eclipse IDE\n\n本章假设你已经安装了当前版本的\
  \ Eclipse。你可以从 [`http://www.eclipse.org/downloads`](http://www.eclipse.org/downloads)\
  \ 获取发行版，不过该版本尚未包含对 Maven 项目的支持。你可以通过 *M2Eclipse* 功能来安装对 Maven 项目的支持。\n\n获取 M2Eclipse\
  \ 功能最简单的方式是通过 *Eclipse Marketplace*。为此，只需激活 *Help ![Image](img/U001.jpg) Eclipse\
  \ Marketplace*。选择 *Eclipse Marketplace* 目录。所有可用的功能将显示在接下来的页面上。之后，你可以点击 *Install*\
  \ 按钮安装 *Maven Integration for Eclipse*。确定必要的插件后（参见图 38-1），点击 *Finish* 关闭向导。\n\n\
  ![Image](img/3801.jpg)\n\n***图 38-1.** 安装 M2Eclipse 功能*\n\n安装完 Maven 功能后，下一步需要确保\
  \ Eclipse IDE 使用 JDK 的虚拟机启动，因为 Maven 插件会用到 JDK 中的库。你可以修改位于 Eclipse 发行版根目录下的 *eclipse.ini*\
  \ 文件。在该文件中，你可以使用 `vm` 参数指定要使用的虚拟机，如下所示：\n\n`-vm`\n`C:\\Program Files\\Java\\jdk1.6.0_23\\\
  bin\\javaw.exe`\n\n此参数必须指定在 `vmargs` 参数之前。\n\n### 创建 NetBeans 平台应用程序\n\n现在你的 Eclipse\
  \ IDE 可以处理 Maven 项目了，你可以在 Eclipse 中创建基于 NetBeans 平台的应用程序。为此，请调用 *File ![Image](img/U001.jpg)\
  \ New ![Image](img/U001.jpg) Other...*，然后在 *Maven Project* 向导类别中选择 *Maven*。保持 *Create\
  \ a simple project* 选项为未选中状态，因为你希望在后续页面中选择一个特定的 Maven 原型。该原型将为 NetBeans 平台应用程序创建基本结构。你可以通过在\
  \ *Nexus Indexer* 目录中过滤 `platform` 来找到所需的 *netbeans-platform-app* 原型，如图 38-2 所示。\n\
  \n![Image](img/3802.jpg)\n\n***图 38-2.** 选择 NetBeans 平台应用程序原型*\n\n选择此原型。在后续页面上，你需要为要创建的应用程序选择组\
  \ ID、工件 ID 和版本。这个包仅用于品牌模块。最后，你通过 `netbeansVersion` 特性来确定要使用的 NetBeans 平台版本。你可以在\
  \ [`http://bits.netbeans.org/maven2/org/netbeans/cluster/platform`](http://bits.netbeans.org/maven2/org/netbeans/cluster/platform)\
  \ 查看标准仓库中可用的版本。点击 *Finish* 创建 NetBeans 平台 Maven 项目。（参见图 38-3。）\n\n![Image](img/3803.jpg)\n\
  \n***图 38-3.** 定义 NetBeans 平台应用程序项目的参数*\n\n如第 37 章所述，Maven 将创建三个项目。一个项目（在此示例中名为\
  \ *MyApplication*）代表父 POM 文件。此外，还会创建两个引用父项目的 Maven 模块项目。一个代表包含其模块的 NetBeans 平台（*application*），另一个代表品牌模块（*branding*）。\n\
  \n### 创建 NetBeans 平台模块\n\n现在，你可以为上面创建的 NetBeans 平台应用程序基础添加第一个应用程序模块。为此，你可以再次使用向导。在包资源管理器中调用父项目的上下文菜单（例如，*MyApplication*），然后选择\
  \ *Maven ![Image](img/U001.jpg) New Maven Module Project*（注意：如果你使用菜单而不是上下文菜单，父 POM\
  \ 文件可能会被覆盖）。\n\n在第一页上，你为要创建的模块定义一个名称。它应该自动引用父项目。保持 *Create a simple project* 选项为未选中状态，因为你希望在接下来的向导页面上选择一个特定的\
  \ NetBeans 模块原型。\n\n你可以在 *Nexus Indexer* 目录中找到 *nbm-archetype*——你可以过滤列表中的 *nbm*\
  \ 条目。现在选择 *nbm-archetype*（参见图 38-4）。\n\n![Image](img/3804.jpg)\n\n***图 38-4.** 选择\
  \ nbm-archetype 来创建 NetBeans 模块*\n\n在最后一个向导页面上，组 ID 应该已经被父项目的值预先填充。请定义当前有效模块的版本以及使用的基础包。此项目类型没有列出属性，但你必须定义\
  \ `netbeansVersion` 属性。通过这种方式，你可以指定一个现有的 NetBeans 版本（参见图 38-5）。\n\n![Image](img/3805.jpg)\n\
  \n***图 38-5.** 定义 NetBeans 平台模块项目的参数*\n\n最后，应用程序模块被创建，并在你点击 *Finish* 按钮时自动添加到父 POM\
  \ 文件中。这样，整个应用程序稍后可以作为一个单元自动创建。父 POM 文件引用模块 POM 文件；父 POM 文件继承模块 POM 文件的设置和特性。\n\n\
  ### 添加依赖关系\n\n为了能够访问其他模块的类，你必须在 POM 文件中定义一个依赖关系。这也适用于使用 NetBeans 平台模块的类。如果你指定了组\
  \ ID、工件 ID 和版本，就可以手动在 POM 文件中定义依赖关系。或者，你可以从相关模块的上下文菜单中点击 *Maven ![Image](img/U001.jpg)\
  \ Add Dependency*。在那里你可以搜索模块，并通过点击 *OK* 来添加选定的依赖关系。（参见图 38-6。）\n\n![Image](img/3806.jpg)\n\
  \n***图 38-6.** 添加依赖关系*\n\n\n\n### 启动与运行应用程序\n\n接下来我将展示如何整体创建并启动应用程序。您可以使用标准的 Maven\
  \ 构建阶段 *install* 来创建应用程序。要运行它，请在父项目上选择 *Run As ![Image](img/U001.jpg) Maven install*。\n\
  \n若要从 Eclipse IDE 启动应用程序，可以使用 NetBeans Maven 插件的目标 *nbm:run-platform*。通过按下 *Run\
  \ ![Image](img/U001.jpg) Run Configurations* 来建立*运行配置*。双击 *Maven Build* 将创建一个新配置。为其命名（例如\
  \ *Start Platform*）并定义根目录。根目录是自动创建的 *application* 项目，它代表 NetBeans 平台本身。您可以通过按下 *Browse\
  \ Workspace...* 按钮来选择项目。在 *Goals* 处输入 *nbm:run-platform*，通过 *Apply* 确认设置。点击 *Run*\
  \ 启动应用程序。（参见图 38-7）\n\n![Image](img/3807.jpg)\n\n***图 38-7.** 创建运行配置以启动 NetBeans\
  \ 平台应用程序*\n\nNetBeans Maven 插件还实现了许多其他目标。其中包括创建 ZIP 发行版。在第 37 章的*创建与运行应用程序*一节中，您可以了解提供了哪些目标。与这些目标类似，您可以安装一个运行配置，以便在\
  \ Eclipse IDE 中方便地使用。\n\n### 总结\n\n开发 NetBeans 平台应用程序不再只是 NetBeans IDE 用户的专利。Maven\
  \ 支持使得在 Eclipse IDE 中使用 NetBeans 平台变得非常简单。在本章中，您了解了如何设置 Eclipse IDE 来创建、开发和启动基于\
  \ Maven 的 NetBeans 平台应用程序。\n\n## 第 39 章\n\n## 从 Eclipse 到 NetBeans\n\n本章介绍 NetBeans\
  \ IDE 的基本属性和功能。本章旨在帮助简化从 Eclipse IDE 到 NetBeans IDE 的迁移过程，并使您更容易上手使用 NetBeans 平台。\n\
  \n### NetBeans IDE\n\n本节介绍 NetBeans IDE 的技术、基本特性和功能。它有助于平滑地从 Eclipse IDE 过渡到 NetBeans\
  \ IDE，并提供对 NetBeans 平台的介绍。\n\n#### 在哪里可以找到什么？\n\n表 39-1 提供了在 NetBeans IDE 中可以找到您熟悉的\
  \ Eclipse IDE 窗口和功能的基本概览。\n\n![Image](img/t3901.jpg)\n\n![Image](img/t3901a.jpg)\n\
  \n#### 处理项目\n\n在 NetBeans IDE 中，将键盘快捷键映射到提供的功能是通过*键映射*完成的。此键映射可在 *Tools ![Image](img/U001.jpg)\
  \ Options ![Image](img/U001.jpg) Keymap* 下查看和编辑。这意味着您可以根据自己的需求调整操作。更好的是，可以同时管理多个键映射。NetBeans\
  \ IDE 开箱即用地提供了一个 Eclipse 键映射，使得可以切换到 Eclipse 配置文件（同样在 *Tools* ![Image](img/U001.jpg)\
  \ *Options* ![Image](img/U001.jpg) *Keymap* 下）并继续使用熟悉的快捷键。这无疑使操作变得更加容易，尤其对于高级 Eclipse\
  \ 用户而言。\n\nEclipse 用户在 NetBeans IDE 中经常怀念的功能是*透视图*特性。不过，在 *http://plugins.netbeans.org*\
  \ 上提供了一个提供透视图功能的模块。因此，您可以在 NetBeans IDE 中使用透视图。该模块可以通过*插件管理器*（*Tools* ![Image](img/U001.jpg)\
  \ *Plugins*）下载并安装。\n\n### 从 Eclipse 插件到 NetBeans 模块\n\nEclipse 世界中的插件概念等同于 NetBeans\
  \ 模块。与 Eclipse IDE 一样，NetBeans IDE 提供了一个向导，只需点击几下即可为模块提供基本结构。通过 *File ![Image](img/U001.jpg)\
  \ New Project… ![Image](img/U001.jpg) NetBeans Modules ![Image](img/U001.jpg) Module*\
  \ 执行此操作。\n\n在使用 Eclipse IDE 创建插件时，必须从一开始就声明多个参数。其中包括激活器、GUI，以及是否要使用新插件创建富客户端应用程序。NetBeans\
  \ IDE 模块向导采用了一种更通用的方法。在前面指定的所有三点中，都可以在以后决定是否需要该功能。激活器——称为 NetBeans 模块安装程序（稍后会详细介绍）——可以随时通过单独的向导添加。此向导位于\
  \ *File ![Image](img/U001.jpg) New File... ![Image](img/U001.jpg) Module Development\
  \ ![Image](img/U001.jpg) Installer / Activator* 下。此外，无需担心模块是否带有图形界面。在这一点上，有单独的向导可用，您可以根据需要稍后使用它们。最重要的向导之一是*窗口*向导，用于构建窗口，这些窗口将在\
  \ NetBeans 窗口系统中停靠和管理。通过 *File ![Image](img/U001.jpg) New File... ![Image](img/U001.jpg)\
  \ Module Development ![Image](img/U001.jpg) Window* 启动此向导。您可以决定是提供一个该模块将成为其一部分的富客户端应用程序，还是该模块将成为现有应用程序的扩展。尽管模块向导会询问是需要独立模块还是应用程序模块，但这很容易在模块的*属性*对话框中更改，或者只需在\
  \ NetBeans 平台应用程序中添加和删除模块即可。\n\n为了使模块成为自包含的富客户端应用程序，需要一个 NetBeans 平台应用程序项目。该项目是您模块的容器，并负责为您的应用程序进行品牌化。要创建\
  \ NetBeans 平台应用程序，也提供了一个向导。在 *File ![Image](img/U001.jpg) New Project... ![Image](img/U001.jpg)\
  \ NetBeans Modules ![Image](img/U001.jpg) NetBeans Platform Application* 下找到它。新的和现有的模块都可以添加到新应用程序中。您的应用程序（以及您的模块）所使用的\
  \ NetBeans 模块范围，在 *Properties ![Image](img/U001.jpg) Libraries* 下确定。您的应用程序（或您的模块）绝不限于\
  \ NetBeans 平台模块。任意 NetBeans IDE 模块都可以添加到您的应用程序中。\n\n\n\n#### 插件生命周期与事件\n\n一个 Eclipse\
  \ 插件可能包含一个*激活器*。该类继承自抽象类 `Plugin` 或 `AbstractUIPlugin`，具体取决于插件是否包含图形元素。这个可选的类作为插件的概念性表示。它不包含任何应用逻辑，主要对特定事件做出响应；例如，由接口\
  \ `BundleActivator` 指定并由类 `Plugin` 和 `AbstractUIPlugin` 实现的方法 `start()` 和 `stop()`。当插件被加载或关闭时，Eclipse\
  \ 平台会调用这些方法。通过重写这些方法，可以在这些时刻执行特定的平台相关任务。一个最简单的 `Activator` 形式如清单 39-1 所示。\n\n***清单\
  \ 39-1.** Eclipse 插件的 Activator 类*\n\n`import org.eclipse.core.runtime.Plugin;`\n\
  `import org.osgi.framework.BundleContext;`\n\n`public class` **`Activator`** `extends`\
  \ **`Plugin`** `{`\n`   private static Activator plugin;`\n\n`public void` **`start`**`(BundleContext\
  \ context) throws Exception {`\n**`super.start`**`(context);`\n`      plugin = this;`\n\
  `   }`\n\n`public void` **`stop`** `(BundleContext context) throws Exception {       plugin\
  \ = null;`\n**`super.stop`**`(context);`\n`   }`\n\n`public static Activator` **`getDefault`**`()\
  \ {`\n`      return plugin;`\n`   }`\n`}`\n\n与 Eclipse 插件激活器相对应的是 NetBeans 模块的模块安装器。这个模块安装器是可选的。NetBeans\
  \ 平台在模块启动期间实例化一个安装器。该安装器继承自类 `ModuleInstall`（参见清单 39-2）。\n\n该类指定了方法 `restored()`\
  \ 和 `close()`，它们与 `BundleActivator` 接口中的方法等效。此外还有用于检查启动条件的 `validate()`、用于检查停止条件的\
  \ `closing()` 以及用于卸载模块的 `uninstalled()`。与激活器一样，这些方法可以被重写并根据需要加以利用。\n\n***清单 39-2.**\
  \ 与 Activator 对应的是 NetBeans 模块安装器。*\n\n`import org.openide.modules.ModuleInstall;`\n\
  \n`public class` **`Installer`** `extends` **`ModuleInstall`**`{`\n\n`   @Override`\n\
  `public void` **`restored`**`() {`\n`      // module started`\n`   }`\n\n`   @Override`\n\
  `public void` **`close`**`() {`\n`      // module stopped`\n`   }`\n\n`public static\
  \ Installer` **`getDefault`** `() {`\n`return` **`findObject`**`(Installer.class,\
  \ true);`\n`   }`\n`}`\n\nEclipse 插件的激活器由新的插件项目自动创建，而安装器则可以随时通过模块安装器向导创建，该向导位于 *文件\
  \ ![Image](img/U001.jpg) 新建文件... ![Image](img/U001.jpg) 模块开发 ![Image](img/U001.jpg)\
  \ 安装器 / 激活器*。因此，安装器也会在清单文件中注册。关于此内容的更详细信息，请参见第 3 章。\n\n#### 插件信息\n\n除了启动和停止插件之外，激活器类还具有其他功能。例如，它可以通过\
  \ `Bundle` 对象提供插件和清单信息。NetBeans 平台通过 `ModuleInfo` 对象提供 NetBeans 模块的信息。应用程序中所有模块的实例都可以在\
  \ Lookup 中找到。从这个集合中，你可以检索到自己模块的 `ModuleInfo` 实例。你可以通过安装器类，借助 `getModule()` 方法将此实例提供给模块用户，如清单\
  \ 39-3 所示。\n\n***清单 39-3.** 提供包含模块信息的 ModuleInfo 实例*\n\n`import org.openide.modules.`**`ModuleInfo`**`;`\n\
  `import org.openide.modules.ModuleInstall;`\n`import org.openide.util.Lookup;`\n\
  \n`public class` **`Installer`** `extends ModuleInstall {`\n`public static final\
  \ String` **`MODULE_ID`** `= \"`**`com.galileo.netbeans.module`**`\";`\n`private`\
  \ **`ModuleInfo`** `info = null;`\n`   ...`\n`public ModuleInfo` **`getModuleInfo`**`()\
  \ {`\n`      if (info == null) {`\n`Collection<? extends` **`ModuleInfo`**`> all\
  \ =`\n`            Lookup.getDefault().`**`lookupAll`** `(`**`ModuleInfo`**`.class);`\n\
  `         for (ModuleInfo mi : all) {`\n`            if (mi.`**`getCodeNameBase`**`().equals(`**`MODULE_ID`**`))\
  \ {`\n`               info = mi; break;`\n`            }`\n`         }`\n`      }`\n\
  `return` **`info`**`;`\n`   }`\n`}`\n\n或者，你可以使用自动更新服务 API（参见第 25 章），它可以访问所有已安装的模块及其属性。\n\
  \n`UpdateElement` 类提供所有模块信息，例如名称、版本、类别或作者。（参见清单 39-4。）\n\n***清单 39-4.** 通过更新管理器确定模块信息。*\n\
  \n`import org.netbeans.api.autoupdate.`**`UpdateElement`**`;`\n`import org.netbeans.api.autoupdate.UpdateManager;`\n\
  `import org.netbeans.api.autoupdate.UpdateUnit;`\n`...`\n`public class` **`Installer`**\
  \ `extends ModuleInstall {`\n`   public static final String MODULE_ID = \"com.galileo.netbeans.module\"\
  ;`\n`   private static UpdateElement moduleInfo;`\n`   ...`\n`public static` **`UpdateElement\
  \ getModuleInfo`** `() {`\n`      if (moduleInfo == null) {`\n`for (UpdateUnit unit\
  \ :` **`UpdateManager`**`.getDefault().`**`getUpdateUnits`**`(`\n`            UpdateManager.TYPE.MODULE))\
  \ {`\n`            if (unit.`**`getInstalled`**`() != null`\n`               &&\
  \ unit.getInstalled().getCodeName().equals(MODULE_ID)) {`\n`               moduleInfo\
  \ = unit.getInstalled();`\n`               break;`\n`            }`\n`         }`\n\
  `      }`\n`      return moduleInfo;`\n`   }`\n`}`\n\n#### 图像\n\n应用程序中使用的图片和图标不是通过安装器加载的，而是通过\
  \ NetBeans 平台中的一个中心类 `ImageUtilities` 加载的。该类提供了 `loadImage()` 和 `loadImageIcon()`\
  \ 方法，应（最好）使用这些方法。它们背后是一个图标管理器，负责管理已加载的图像和图标，并防止重复加载资源。使用它可以从所有可用的模块中加载图标。也可以加载本地化资源，如下例所示。如果第二个参数设置为\
  \ `true`，并且存在一个名为 *icon_de_DE.png* 的图标，那么它将被加载（如果应用程序的区域设置是 `de_DE`）：\n\n`Image\
  \ img = ImageUtilities.`**`loadImage`**`(\"resources/icon.png\",` **`true`**`);`\n\
  \n\n\n#### 资源\n\n任何插件资源都可以通过 Eclipse 中的 `FileLocator` 类进行访问。要从 NetBeans 模块中简单加载资源，你可以通过\
  \ `getModuleResource()` 方法扩展 `Installer` 类（参见清单 39-5）。使用可以访问所有模块资源的模块类加载器。该方法返回一个\
  \ URL，通过 `URLMapper` 类，该 URL 会映射到 `FileObject` 实例。\n\n***清单 39-5.** getModuleResource()\
  \ 方法有助于加载任意模块资源。*\n\n`import java.net.URL;`\n`import org.openide.filesystems.FileObject;`\n\
  `import org.openide.filesystems.URLMapper;`\n`import org.openide.modules.ModuleInstall;`\n\
  \n`public class` **`Installer`**`extends ModuleInstall {`\n`   ...`\n`public FileObject`\
  \ **`getModuleResource`**`(String path) {`\n`      URL url = getClass().getClassLoader().`**`getResource`**`(path);`\n\
  **`FileObject`** `resource =` **`URLMapper`**`.`**`findFileObject`**`(url);`\n`return`\
  \ **`resource`**`;`\n`   }`\n`}`\n\n`FileObject` 类提供了丰富的方法来处理资源。以下示例通过将模块 *resources*\
  \ 目录下的 *myprops.properties* 文件内容加载到 `Properties` 对象中，演示了这一点。\n\n`public final class`\
  \ **`TestAction`** `implements ActionListener {`\n`public void` **`actionPerformed`**`(ActionEvent\
  \ e) {`\n**`FileObject`** `res = Installer.getDefault().`**`getModuleResource`**`(`\n\
  `                                \"`**`resources/myprops.properties`**`\");`\n`      Properties\
  \ props = new Properties();`\n`      try {`\n`         props.load(`**`res.getInputStream()`**`);`\n\
  `         System.out.println(\"Value:\" + props.getProperty(\"key\"));`\n`      }\
  \ catch(Exception ex) {}`\n`   }`\n`}`\n\n#### 设置\n\n插件特定的设置，供内部和用户使用，在 Eclipse\
  \ RCP 中通过 `Preferences` 对象或 `IPreferenceStore` 对象进行管理，这些对象由 Activator 类提供。NetBeans\
  \ 平台采用了一种略有不同的方法。为了管理设置，它包含了 Java Preferences API 的一个实现。通过 `NbPreferences` 类可以获取\
  \ `Preferences` 实例。此实现的一个优点是数据存储在 NetBeans 平台用户目录中。模块特定数据和应用程序特定数据之间是有区别的。`root()`\
  \ 方法提供对存储在 *config/Preferences.properties* 文件中的设置的访问。另一方面，`forModule()` 方法处理对模块特定属性文件中数据的访问。例如，如果代码名称基是\
  \ `com.galileo.netbeans.module`，设置将存储在 *config/Preferences/com/galileo/netbeans/module.properties*\
  \ 文件中。\n\n`   NbPreferences.`**`forModule`**`(MyClass.class).put(\"key\", \"value\"\
  );`\n`   NbPreferences.`**`root`**`().put(\"key\", \"value\");`\n\n你可以在第 20 章中找到关于此主题的更详细信息。\n\
  \n#### 应用程序生命周期\n\nEclipse RCP 应用程序的生命周期由 `IApplication` 实例处理。它实现了 `start()` 和 `stop()`\
  \ 方法。前者负责启动应用程序，通常用于创建和打开主窗口。`stop()` 方法处理应用程序的关闭，此时工作台被关闭，并执行其他特定于应用程序的任务。不幸的是，NetBeans\
  \ 平台应用程序没有如此便捷的生命周期管理——不过，从另一方面看，这大大简化了开发。例如，主窗口会自动打开和关闭，无需编码。与应用程序生命周期相关的大多数方面都在各个模块内部处理，并通过模块安装程序进行管理。另一种可能性是对整个应用程序的关闭做出反应，而不是对单个模块的关闭做出反应；这是通过抽象类\
  \ `LifecycleManager` 完成的。NetBeans 平台提供的 `LifecycleManager` 类的默认实现负责应用程序的正常关闭。你可以在默认实现之前插入你自己的此类的实现，以便在应用程序关闭时处理特定于应用程序的任务。重要的是不要忘记从你自己的实现中调用默认实现。此类的外观以及如何使用\
  \ `LifecycleManager` 显式关闭应用程序，在第 8 章中进行了描述。\n\n#### 视图和编辑器\n\nEclipse 工作台显示和停靠两种类型的窗口——*视图*和*编辑器*——而\
  \ NetBeans 平台则用一种窗口类型处理这些类型。在 NetBeans 窗口系统中显示的窗口是一个*顶层组件*；窗口的实现派生自 `TopComponent`\
  \ 类。这个超类将自身作为窗口集成到 NetBeans 窗口系统中，并提供大量信息，允许访问其当前状态及其生命周期。类似于 Eclipse 应用程序中的视图和编辑器通过相关扩展点进行组织的方式，顶层组件通过层文件在\
  \ `Mode` 文件夹内以声明方式提供。模式是顶层组件的容器。这里，让我们回到视图和编辑器的区别，因为模式可以是这些类型之一。顶层组件在这些模式之一中创建（参见图\
  \ 9-5）。模式的大小、位置和类型在 XML 文件中描述。这样，你也有机会在层文件中使用相应的扩展点注册你自己的模式（更多信息请参见第 10 章）。但是，顶层组件不需要在模式内注册，它们会在默认模式下显示。与\
  \ Eclipse 工作台一样，用户在应用程序运行时可以将顶层组件放置在不同的位置。\n\n为了轻松创建和注册顶层组件，NetBeans IDE 再次提供了一个非常有用的向导。选择\
  \ *文件 ![Image](img/U001.jpg) 新建文件... ![Image](img/U001.jpg) 模块开发 ![Image](img/U001.jpg)\
  \ 窗口* 并开始使用它。该向导为你提供了配置顶层组件并将其分配给某个模式的可能性。关于此主题以及与用户界面设计相关的其他主题的详细信息，请参见第 2 部分。\n\
  \n### 总结\n\n本章假设你是 Eclipse 用户，并向你介绍了 NetBeans IDE 作为工具，以及 NetBeans 平台作为桌面框架。本章首先查看了\
  \ Eclipse 中最常用的功能和窗口，并展示了它们在 NetBeans IDE 中的对应位置。你学习了如何将键映射调整为 Eclipse 设置。接着，我们比较了\
  \ Eclipse 插件和 NetBeans 模块，并比较了两个平台的术语，描述了它们之间的主要相似点和差异。\n\n## 第 40 章\n\n## IntelliJ\
  \ IDEA 与 NetBeans 平台\n\nJetBrains 的 Java 开发环境 IntelliJ IDEA ([`http://jetbrains.com/idea`](http://jetbrains.com/idea))\
  \ 现在通过社区版免费提供。由于集成了 Maven 项目支持，它为开发 NetBeans 平台应用程序提供了另一种选择。在本章中，我将为初学者和专业人士提供一些使用\
  \ IntelliJ IDEA 成功搭建基于 NetBeans 平台的应用程序的技巧。\n\n\n\n### 预设配置\n\nMaven 并非 IntelliJ\
  \ IDEA 的内置组件。因此，在创建 Maven 项目之前，您需要先提供一个 Maven 发行版。您可以从 [`http://maven.apache.org`](http://maven.apache.org)\
  \ 下载当前版本的 zip 文件，并将其解压到您想要的位置。这个包含 Maven 发行版的目录必须让 IntelliJ IDEA 能够访问到。您可以通过 IDE\
  \ 设置中的 *Settings ![Image](img/U001.jpg) Maven* 直接进行配置，或者通过通常位于 Maven 中的环境变量 *M2_HOME*\
  \ 来设置。默认情况下，IntelliJ IDEA 会使用该变量定义的路径。Maven 的设置文件（*settings.xml*）通常位于用户目录下的 *.m2/settings.xml*。此外，用户目录下的\
  \ *.m2/repository* 被用作本地仓库。\n\n### 创建 NetBeans 平台应用程序\n\n如果 Maven 已安装，并且 IntelliJ\
  \ IDEA 已知晓其安装位置，您就可以直接开始创建并设置一个 NetBeans 平台应用程序项目。为此，请调用 *File ![Image](img/U001.jpg)\
  \ New Project...*，然后选择 *Create project from scratch* 选项。在接下来的页面中，您可以为要创建的项目命名，并定义存储位置。激活\
  \ *Create module* 选项，并选择 *Maven Module* 类型。（参见图 40-1。）\n\n![Image](img/4001.jpg)\n\
  \n***图 40-1.** 创建 Maven 项目*\n\n点击 *Next* 进入下一页。在此页面，您可以为新项目分配 group ID、artifact\
  \ ID 和版本。由于您不只是想创建一个空的标准 Maven 项目，而是要创建一个 NetBeans 平台应用程序项目，请激活 *Create from archetype*\
  \ 选项。从列表中选择属于 *org.codehaus.mojo.archetypes* 组的 *netbeans-platform-app-archetype*\
  \ 原型的最新版本。（参见图 40-2。）如果列表中没有，您可以使用 *Add archetype ...* 按钮手动添加该原型，并指定其 artifact 和\
  \ group ID。您可以在官方 Maven 仓库 [`http://search.maven.org/#search|ga|1|netbeans-platform-app-archetype`](http://search.maven.org/#search%7Cga%7C1%7Cnetbeans-platform-app-archetype)\
  \ 查看可用的版本。\n\n![Image](img/4002.jpg)\n\n***图 40-2.** 为 NetBeans 平台应用程序项目选择 Maven\
  \ 原型*\n\n点击 *Finish* 完成向导，Maven 将创建 NetBeans 平台应用程序的基本结构。最初，这可能需要一些时间，因为需要将多个 Maven\
  \ 插件下载到本地仓库。正如第 37 章中提到的，实践中会创建三个 Maven 项目：一个用于打包整个 NetBeans 平台应用程序的上级父项目、一个用于 NetBeans\
  \ 平台模块的项目，以及另一个用于品牌模块的项目。这些项目都隶属于父项目，因此继承了 POM 文件的特性。由此产生的项目结构如图 40-3 所示。\n\n![Image](img/4003.jpg)\n\
  \n***图 40-3.** Maven NetBeans 平台应用程序的项目结构*\n\n接下来，您可以向此 Maven 项目添加一个或多个 Maven NetBeans\
  \ 模块。通过菜单中的 *File ![Image](img/U001.jpg) New Module...*，或者从已创建的 NetBeans 平台应用程序项目的上下文菜单中选择\
  \ *New ![Image](img/U001.jpg) Module* 来完成此操作。选择 *Create project from scratch* 选项，并在下一页中选择\
  \ *Maven Module* 类型。为模块命名，并确保该模块创建在父项目的目录中。在下一步中，您将看到该模块已添加到父项目中，并且模块本身继承了父项目的属性。您还会看到\
  \ group ID 和版本已从父 POM 文件中获取。您也可以选择定义其他值；为此，请取消激活 *Inherit* 选项。还有一个专门用于创建 NetBeans\
  \ 模块的 Maven 原型，即来自 *org.codehaus.mojo.archetypes* 组的 *nbm-archetype* 原型。从列表中选择它，或使用\
  \ *Add archetype* 手动添加。（参见图 40-4。）\n\n![Image](img/4004.jpg)\n\n***图 40-4.** 为 NetBeans\
  \ 模块项目选择 Maven 原型*\n\n点击 *Finish* 完成向导。Maven 会自动创建该模块，并将其作为模块添加到 NetBeans 平台项目中。在此模块及其他模块中，您可以实现应用程序逻辑。本书描述了多个可用的类和\
  \ API；您只需将相关的 NetBeans 平台模块作为依赖项添加到您的应用程序模块中即可。在下一节中，您将学习如何轻松搜索平台模块并将其添加为依赖项。\n\n\
  ### 定义依赖项\n\n正如您从前面的章节中已经了解到的，只有在设置了相关模块的依赖关系后，才能使用 NetBeans 模块中的类。对于 Maven 项目，可以通过向\
  \ POM 文件添加 Maven 依赖项来实现。IntelliJ IDEA 提供了一个搜索助手来添加依赖项条目。要打开它，请打开相关的 POM 文件，然后调用\
  \ *Code ![Image](img/U001.jpg) Generate*。接着从弹出菜单中选择 *Dependency* 以打开助手。例如，您可以搜索\
  \ `netbeans`，选择一个特定的 NetBeans 模块，并将其添加为依赖项。（参见图 40-5。）\n\n![Image](img/4005.jpg)\n\
  \n***图 40-5.** 搜索 NetBeans 模块并将其添加为依赖项*\n\n您可以直接在 POM 文件中添加依赖项条目。此外，您也可以在编辑器中实现类时添加依赖项。当您使用一个尚未定义依赖关系的模块中的类时，编辑器中会显示错误。然后，使用\
  \ *Alt+Enter* 从弹出菜单中选择，并通过 artifact 搜索助手添加必要的依赖项。\n\n### 构建与运行应用程序\n\n现在您已经了解了如何创建\
  \ NetBeans 平台应用程序的基本结构、如何向其添加应用程序模块，以及如何添加依赖项以使用 NetBeans 平台模块的 API，接下来您只需要能够构建、运行\
  \ NetBeans 平台应用程序并创建发行版即可。\n\n*Maven Projects* 资源管理器（*Window ![Image](img/U001.jpg)\
  \ Tool Windows ![Image](img/U001.jpg) Maven Projects*）在此处非常有用。首先，需要使用 Maven 构建阶段\
  \ *install* 来安装整个应用程序并将其复制到本地仓库。为此，请打开父项目的 *Lifecycle* 文件夹（在示例中为 *MyApplication\
  \ - NB App Parent*），然后通过上下文菜单或双击启动该过程。\n\nNetBeans 平台应用程序通过 Maven 插件 *nbm-maven-plugin*\
  \ 来运行。为此，该插件提供了目标 *nbm:run-platform*。请注意，您不能通过父项目启动应用程序；必须通过自动创建的 *NB App* 模块（它代表\
  \ NetBeans 平台本身）来启动。您可以在 *Maven Projects* 资源管理器中找到该插件提供的所有目标（参见图 40-6）。您还会找到目标 *nbm:standalone-zip*，通过它，您最终可以将应用程序创建为\
  \ ZIP 发行版。\n\n![Image](img/4006.jpg)\n\n***图 40-6.** 通过 Maven 项目资源管理器创建和运行应用程序*\n\
  \n或者，您可以通过 *Run ![Image](img/U001.jpg) Edit Configurations* 设置一个运行配置，然后直接从工具栏启动构建。通过运行配置，您还可以在目标\
  \ *nbm:run-platform* 之前自动执行构建阶段 *install*。这样，您只需一个按钮即可创建并运行您的应用程序。\n\n\n\n### 摘要\n\
  \nJetBrains 出品的 IntelliJ IDEA Java 开发环境现已免费提供社区版。在本章中，你学习了如何使用此 IDE 开发 NetBeans\
  \ 平台应用程序。\n\n## 第 41 章\n\n## NetBeans Swing GUI 构建器\n\n富客户端应用程序最显著的特性可能就是用户界面，它通过直观且用户友好的功能与数据结构决定了应用程序的质量。然而，仅使用源代码编辑器来创建用户界面可能是一项挑战。你不仅需要不断想象组件的结构，而且最终结果往往与预期大相径庭。\n\
  \n在这方面，包含强大 Swing GUI 构建器的 NetBeans IDE 被证明极具创新性。你可以通过拖放和选择给定参数来创建整个用户界面。换句话说，你甚至不需要编写一行代码。\n\
  \n例如，GUI 构建器会自动用于创建顶层组件、选项面板或 NetBeans 平台应用程序的向导；你也可以创建完全通用的组件。将它们添加到面板中，你就可以在任何其他组件中再次使用它们。本章将首先解释一些关于\
  \ GUI 构建器结构的细节；稍后我们将更详细地介绍其最重要的功能。\n\n### GUI 构建器的结构\n\n在编辑 GUI 组件时，GUI 构建器会在不同的窗口中为你提供大量信息和功能支持。下一节将概述这些窗口及其用途。\n\
  \n#### 编辑器\n\n*编辑器*（*窗口* ![Image](img/U001.jpg) *编辑器*）是 GUI 构建器的核心部分。它提供两种不同的视图。你可以在*设计*视图和*源代码*视图之间切换。在设计视图中，可以进行\
  \ GUI 组件的实际创建。你可以将组件从面板拖放到组件上的设计视图中，并在那里单独编辑它。在源代码视图中，你可以实现按钮的操作等。（参见图 41-1。）\n\n\
  ![Image](img/4101.jpg)\n\n***图 41-1.** 具有设计视图和源代码视图的 GUI 构建器编辑器*\n\n切换到源代码视图，你会看到由\
  \ GUI 构建器自动生成的代码区域。这些所谓的*保护块*以灰色标记且不可编辑；只能通过 GUI 构建器的用户界面进行更改。在某些地方可以插入自定义代码。\n\n\
  #### 面板\n\n当你在编辑器中实现 GUI 组件并处于设计视图时，*面板*窗口（*窗口* ![Image](img/U001.jpg) *面板*）会提供所有可用的\
  \ Swing 和 AWT 组件，并按类别进行组织（参见图 41-2）。你可以将其拖放到编辑器中你自己的组件上。\n\n![Image](img/4102.jpg)\n\
  \n***图 41-2.** 包含所有 Swing 和 AWT 组件的面板窗口*\n\n![Image](img/square.jpg) **注意** 使用面板，你不仅可以使用默认提供的组件，还可以添加自己的组件并将其拖放到你自己的应用程序中。在面板窗口中右键单击可调用*面板管理器*，你可以从中从\
  \ JAR 文件、已注册的库或项目中导入新组件。你还可以创建新类别、以不同方式组织它们，或使用面板管理器删除类别。这样你就能始终保持清晰。\n\n#### 检查器\n\
  \n所有可见甚至不可见的组件都会在*检查器*窗口（*窗口* ![Image](img/U001.jpg) *导航* ![Image](img/U001.jpg)\
  \ *检查器*）中以层次树结构显示（参见图 41-3）。选择某个条目时，编辑器中相应的组件也会被选中。检查器帮助你在复杂的 GUI 组件中也能保持清晰。当编辑用作不可见容器的\
  \ `JPanel` 组件时，检查器尤其有用。\n\n![Image](img/4103.jpg)\n\n***图 41-3.** 用于导航和访问单个组件的检查器窗口*\n\
  \n#### 属性\n\n每个 Swing 或 AWT 组件都提供多种可能的设置，这些设置都显示在*属性*窗口（*窗口* ![Image](img/U001.jpg)\
  \ *属性*）中。这样做的一个巨大优势是，对于许多具有设定值的特性，可以从列表中选择所需的值。对于更多特性，例如容器边框的配置，还提供了专门的编辑器。此外，属性窗口还提供了关于特性绑定（*绑定*）、其操作（*事件*）和用户特定代码（*代码*）的附加视图。你不仅能获得全面的概览，同时还能获得非常简便的编辑功能。（参见图\
  \ 41-4。）我们稍后将回到各个视图进行讨论。\n\n![Image](img/4104.jpg)\n\n***图 41-4.** 所选 AWT 或 Swing\
  \ 组件的特性概览，具有多种编辑可能性*\n\n### 组件与布局\n\n本节将描述 GUI 构建器组件是如何构成的，以及如何在其上放置和组织其他组件。\n\n\
  #### 表单\n\n使用 GUI 构建器创建的组件称为表单。在*文件* ![Image](img/U001.jpg) *新建文件* ![Image](img/U001.jpg)\
  \ *Swing GUI 表单*和*AWT GUI 表单*下提供了用于创建表单的特定向导。当然，作为 NetBeans 平台应用程序开发者，*JPanel 表单*向导是实现子组件最常用的。对于开发顶层组件，在*文件*\
  \ ![Image](img/U001.jpg) *新建文件* ![Image](img/U001.jpg) *模块开发* ![Image](img/U001.jpg)\
  \ *窗口*下提供了一个特殊的表单向导（参见第 10 章）。\n\n表单由一个 `.form` 文件以及一个包含保留代码块的 `.java` 文件来标识。它与\
  \ `.java` 文件具有相同的名称和目录。GUI 构建器将所有关于布局和所用组件的信息，以及由此生成或更改的 Java 源代码，都保存在这个 XML 文件中。\n\
  \n#### 设计策略\n\nGUI 构建器遵循所谓的*自由设计*策略。虽然你习惯于将组件放置在布局管理器的某个特定区域内，但在 NetBeans GUI 构建器的设计视图中，你可以将组件放置在任何位置。然后它会自动检测必要的布局属性并自动生成代码。`GroupLayout`\
  \ 管理器是其基础。你可以按照组件在应用程序中显示的方式来排列它们。此外，你还可以通过设计视图工具栏中的*预览设计*按钮来预览它们。这样你就可以测试组件对大小变化的反应。\n\
  \n在使用 GUI 构建器极其直观的自由设计一段时间后，你几乎不会想念其他布局管理器，尽管你可以为特殊目的设置替代布局管理器。你可以通过在表单上右键单击并选择*设置布局*，从以下流行的布局管理器中进行选择：\n\
  \n*   自由设计\n*   绝对布局\n*   边框布局\n*   盒式布局\n*   卡片布局\n*   流式布局\n*   网格包布局\n*   网格布局\n\
  *   空布局\n\n\n\n#### 对齐与锚定\n\nGUI 构建器的一大优势在于支持组件放置。系统会显示参考线（取决于已添加到窗体中的组件），以便排列新组件。当组件靠近参考线时，会自动根据参考线进行排列；您可以快速创建排列精确、结构清晰的用户界面。（参见图\
  \ 41-5。）\n\n![Image](img/4105.jpg)\n\n***图 41-5.** 组件的自动对齐与锚定*\n\n所谓的*锚定点*用于定义更改窗口大小时布局管理器的行为。组件要么锚定到其相邻组件，要么锚定到窗体的边距。在图\
  \ 41-5 中，您可以看到按钮 *jButton1* 如何锚定到窗体的边距以及文本字段 *jTextField1*。文本字段本身锚定到窗体的上边距；也就是说，窗体的大小在下方更改，因此按钮的位置不会改变。如果窗体在右侧变大，按钮会“粘”在右侧边框上。GUI\
  \ 构建器会根据位置建议锚定点（以半圆形标记可见）。不过，您可以通过上下文菜单中的 *Anchor* 来更改它们。\n\n### 适配组件\n\n您已经学习了如何在窗体中放置和更改不同组件的位置。现在，您还需要适配这些组件。\n\
  \n#### 文本与变量名\n\n从组件面板拖到其窗体的组件会获得一个引用类型名称的默认标题。变量的命名方式相同。您可以通过 *F2* 或上下文菜单中的 *Edit\
  \ Text* 来适配标题。您也可以在上下文菜单中通过 *Change Variable Name* 来适配变量名。\n\n#### 特定于应用程序的代码\n\n\
  在*组件面板*部分，我提到最初无法编辑 GUI 构建器生成的代码。然而，如图 41-6 所示的*代码定制器*使这成为可能。您可以通过上下文菜单中的 *Customize\
  \ Code* 为每个组件调用代码定制器。这样做，您可以在初始化和声明代码的不同位置添加用户特定的代码。此外，还可以让组件在本地创建或作为字段创建。在后一种情况下，您可以定义与访问或存储相关的附加属性。\n\
  \n![Image](img/4106.jpg)\n\n***图 41-6.** 用于适配组件初始化和声明的代码定制器*\n\n之前我提到过，属性窗口提供了一个特殊的代码视图（*Code*）。除了图\
  \ 41-6 中显示的选项之外，这还提供了额外的干预机会。这样做，您不仅可以轻松编辑代码，同时还能全面了解所有用户特定的代码扩展。\n\n### 操作\n\n\
  操作是用户界面的基本组成部分。操作应作为对用户触发事件的响应来执行。例如，此类事件可以是鼠标单击或按键。您可以为组件的每个事件定义单独的操作。GUI 构建器会为您连接事件和操作。您可以从上下文菜单（*Events*）中选择所有可用的事件。单击某个特定事件，系统会自动为其注册一个监听器。此监听器会调用该方法。然后，您可以在源代码视图中实现其方法体。\n\
  \n下面通过一个示例来说明。将为图 41-5 中显示的按钮的 *actionPerformed* 事件（即单击按钮）实现一个操作。因此，您需要从按钮 *jButton1*\
  \ 的上下文菜单中调用以下条目：*Events ![Image](img/U001.jpg) Action ![Image](img/U001.jpg) actionPerformed*。编辑器会自动切换到源代码视图，并跳转到与此事件调用的相关方法。在清单\
  \ 41-1 中，它是方法 `jButton1ActionPerformed()`。\n\n***清单 41-1.** 操作的实现。只有方法体可以编辑。*\n\n\
  `private void` **`jButton1ActionPerformed`**`(java.awt.event.ActionEvent evt) {`\n\
  `   jTextField1.setText(\"Hello World\");`\n`}`\n\n如果您查看源代码视图中自动生成的代码块，您会发现一个监听器的注册（如清单\
  \ 41-2 所示），该监听器会调用包含实际操作的方法。\n\n***清单 41-2.** GUI 构建器自动注册事件监听器*\n\n`jButton1.addActionListener(new\
  \ java.awt.event.ActionListener() {`\n`   public void actionPerformed(java.awt.event.ActionEvent\
  \ evt) {`\n**`jButton1ActionPerformed`**`(evt);`\n`   }`\n`});`\n\n您可以轻松了解哪些事件已注册以及提供了哪些其他事件。在属性窗口的事件视图（*Events*）中获取此概览。此外，您还可以注册、删除或重命名多个*处理程序*，或跳转到它们在源代码中的位置。（参见图\
  \ 41-7。）\n\n![Image](img/4107.jpg)\n\n***图 41-7.** 用于管理特定组件操作处理程序的事件视图*\n\n### Beans\
  \ 绑定\n\n一方面，您可以使用 Beans 绑定框架（JSR 295）将 GUI 组件绑定到数据源。另一方面，您可以使不同 GUI 组件的特性彼此保持同步。这些是几乎每个富客户端应用程序都必须实现的任务。Beans\
  \ 绑定框架与 NetBeans IDE 或 GUI 构建器一起，确保您只需编写少量代码。\n\n我将通过一个典型示例（如图 41-8 所示）来演示 Beans\
  \ 绑定框架以及 GUI 构建器支持的优势。在该示例中，您获取一个已有的数据库，并为其表创建实体类。然后，您将数据库中的数据绑定到 NetBeans 平台应用程序中的表格。此外，您还将一个详细视图绑定到该表格。这样，表格和详细视图中的某些更改都应该是可行的。\n\
  \n![Image](img/4108.jpg)\n\n***图 41-8.** Beans 绑定示例应用程序*\n\n\n\n#### 绑定表与数据源\n\n\
  第一步是创建（或使用已有的）Java DB 数据库。在“服务”窗口中，你可以通过 *数据库 ![Image](img/U001.jpg) Java DB* 节点的上下文菜单中的“创建数据库”轻松创建一个新数据库。在本示例中，该数据库被命名为\
  \ *ProductDatabase*。你需要向数据库中添加一个结构如清单 41-3 所示的表，然后创建两个测试数据集——之后你可以随时添加任意数量的条目。\n\
  \n***清单 41-3.** 表结构与测试数据集*\n\n`CREATE TABLE` **`product`** `(`\n`   id INT NOT NULL\
  \ PRIMARY KEY GENERATED ALWAYS AS IDENTITY,`\n`   title   VARCHAR(50) NOT NULL,`\n\
  `   orderId VARCHAR(10) NOT NULL,`\n`   price   DOUBLE      NOT NULL`\n`);`\n\n\
  `INSERT INTO product (title, orderId, price) VALUES ('Product 1', 'P1', 1.49);`\n\
  `INSERT INTO product (title, orderId, price) VALUES ('Product 2', 'P2', 5.99);`\n\
  \n现在你需要为这个表创建一个实体类。不过，你无需自己实现这个实体类，而是可以通过 NetBeans IDE 的向导自动生成。但在此之前，需要一个 Java 类库项目。通过\
  \ *文件 ![Image](img/U001.jpg) 新建项目... ![Image](img/U001.jpg) Java ![Image](img/U001.jpg)\
  \ Java 类库* 来创建它。然后，你可以在此项目中使用向导（路径：*文件 ![Image](img/U001.jpg) 新建文件... ![Image](img/U001.jpg)\
  \ 持久化 ![Image](img/U001.jpg) 来自数据库的实体类*）来实现所需的实体类。第一步，选择数据库连接，然后选择表 *PRODUCT*。在下一步中，取消创建命名查询和\
  \ JAXB 注释的选项。但是，应该创建一个持久化单元。在向导的最后一页，选择 `java.util.List` 作为*集合类型*，并取消选中*用于重新生成表的属性*选项，因为你是在已有的表基础上进行操作。然后，点击*完成*创建\
  \ `Product` 类。该类除了具有 JPA 注释的属性外，还包含 getter 和 setter 方法。稍后，需要实现一个监听器逻辑，用于将 `Product`\
  \ 实例的更改传播到表中。所有 set 方法都必须使用 `firePropertyChange()` 方法来通知监听器。（参见清单 41-4。）\n\n***清单\
