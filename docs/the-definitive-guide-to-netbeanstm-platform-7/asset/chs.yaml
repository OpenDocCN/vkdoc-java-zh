  `   }`\n\n`public InplaceEditor` **`getInplaceEditor`**`() {`\n`      if(ed == null)`\n\
  `         ed = new Inplace();`\n`      return ed;`\n`   }`\n\n`private static class`\
  \ **`Inplace`** `implements` **`InplaceEditor`** `{`\n`      private PropertyEditor\
  \ editor = null;`\n`      private PropertyModel  model  = null;`\n**`private JComboBox\
  \ genres = new JComboBox(`**\n**`new String[] {\"Techno\", \"Trance\", \"Rock\"\
  , \"Pop\"});`**\n\n`      public JComponent getComponent() {`\n`         return\
  \ this.genres;`\n`      }`\n\n`public Object` **`getValue`**`() {`\n`         return\
  \ this.genres.getSelectedItem();`\n`      }`\n\n`public void` **`setValue`**`(Object\
  \ object) {`\n`         this.genres.setSelectedItem(object);`\n`      }`\n\n`public\
  \ void` **`reset`**`() {`\n`         String genre = (String) editor.getValue();`\n\
  `         if(genre != null)`\n`            this.genres.setSelectedItem(genre);`\n\
  `      }`\n`   }`\n`}`\n\n### 总结\n\n属性窗口是一种简单且常见的方式，用于显示和修改任意对象的属性。在本章中，您学习了如何提供要在属性窗口中显示的属性。您还学习了如何实现用户特定的属性编辑器。\n\
  \n## 第 20 章\n\n## 选项与设置\n\n借助*选项对话框 API 和 SPI*，您可以轻松创建选项面板，用户可以通过这些面板方便地管理应用程序的设置和选项。该模块提供了选项对话框的基本结构，您可以将自己的面板集成到其中，如图\
  \ 20-1 所示。面板有两种或三种可能的变体。有主面板和次面板。次面板是主面板的子类别，以选项卡形式呈现。主面板有两种类型：一种是自己管理选项的主面板，另一种是仅作为容器并包含次面板的主面板。设置通常使用\
  \ Preferences API 进行保存和加载。NetBeans 平台提供了一个特定的实现，将在“管理设置”部分进行更详细的说明。\n\n![Image](img/2001.jpg)\n\
  \n***图 20-1.** 标准选项对话框，您可以在其中集成自己的面板*\n\n\n\n### 创建选项面板\n\nNetBeans IDE 提供了一个用于创建选项面板（适用于所有三种类型）的向导，如图\
  \ 20-2 所示。该向导位于 *文件 ![Image](img/U001.jpg) 新建文件…* 下的 *模块开发 ![Image](img/U001.jpg)\
  \ 选项面板* 类别中。根据您的目的，选择*主面板*（带或不带辅助面板）或*辅助面板*，并指示向导所需的数据。最后，向导会创建面板并通过注解进行注册。\n\n\
  ![Image](img/2002.jpg)\n\n***图 20-2.** 用于创建选项面板的 NetBeans 向导*\n\n一个面板由视图和控制器组成。视图负责提供图形用户界面（GUI）以及加载和保存数据。控制器创建视图，同时充当选项对话框和视图之间的中介。面板（即视图）派生自\
  \ `JPanel` 类。您可以在此面板上任意放置用于显示和设置选项的组件。清单 20-1 使用了两个文本字段。您可以通过 Preferences API（请参阅“管理设置”部分）在\
  \ `store()` 和 `load()` 方法中保存和加载这些字段的值，控制器在打开和关闭面板时会调用这些方法。\n\n只有当用户选择了适当的设置后，选项对话框才能被关闭。因此，面板必须将其状态（有效或无效）告知选项对话框。通过\
  \ `valid()` 方法实现验证。例如，在本例中，您需要确保用户在第一个字段中输入一个值，因此您向 `option1` 文本字段添加了一个 `DocumentListener`。现在，每当用户在第一个文本字段中进行输入时，控制器都会通过\
  \ `Controller.changed()` 收到通知，该方法进而调用 `valid()` 方法，仅当文本字段中至少输入了一个字符时才返回 `true`。\n\
  \n***清单 20-1.** 选项面板的视图，仅派生自 JPanel*\n\n`public final class` **`ModuleOptions1Panel`**\
  \ `extends` **`JPanel`** `implements DocumentListener {`\n`   private JTextField\
  \ option1;`\n`   private JTextField option2;`\n`private final` **`ModuleOptions1PanelController`**\
  \ `controller;`\n\n`   public ModuleOptionsPanel(ModuleOptions1PanelController ctl)\
  \ {`\n`      this.controller = ctl;`\n`      initComponents();`\n`      option1.getDocument().addDocumentListener(this);`\n\
  `   }`\n\n`   public void insertUpdate(DocumentEvent event) {`\n**`controller.changed();`**\n\
  `   }`\n\n`   public void removeUpdate(DocumentEvent event) {`\n**`controller.changed();`**\n\
  `   }`\n\n`   public void changedUpdate(DocumentEvent event) {`\n**`controller.changed();`**\n\
  `   }`\n\n`public void` **`load`**`() {`\n`      option1.setText(`\n`         NbPreferences.forModule(ModuleOptions1Panel.class).`\n\
  `         get(\"option1\", \"default\"));`\n`   }`\n\n`public void` **`store`**`()\
  \ {`\n`      NbPreferences.forModule(ModuleOptions1Panel.class).`\n`         put(\"\
  option1\", option1.getText());`\n`   }`\n\n`public boolean` **`valid`**`() {`\n\
  `      if(option1.getText().length() == 0) {`\n`         return false;`\n`      }\
  \ else {`\n`         return true;`\n`      }`\n`   }`\n`}`\n\n现在让我们看看控制器的职责。由于控制器需要与选项对话框交互，其接口由抽象类\
  \ `OptionsPanelController` 确定。控制器最重要的任务是使用 `getPanel()` 创建视图，您通过 `getComponent()`\
  \ 方法提供该视图。如您所见，`getComponent()` 方法接收一个 Lookup。这是一个代理 Lookup，包含选项对话框中所有可用控制器的 Lookup。控制器使用\
  \ `getLookup()` 方法提供一个 Lookup，该方法已由抽象类 `OptionsPanelController` 实现。然而，这个默认实现仅提供一个空的\
  \ Lookup。因此，为了在 Lookup 中提供某些对象，您必须重写 `getLookup()` 方法。这样，您就可以通过这个所谓的“主 Lookup”（通过\
  \ `getComponent()` 获取）与其他选项面板进行通信。您已经在第 5 章中学习了如何使用本地 Lookup 和全局代理 Lookup（在本例中即主\
  \ Lookup）实现通信。\n\n`update()` 方法在面板首次加载时被调用。在这里，您调用面板的 `load()` 方法来加载数据，从而初始化字段。如果用户单击*确定*按钮，则会调用选项对话框的\
  \ `applyChanges()` 方法。因此，您在此通过 `store()` 方法保存数据。但是，如果用户取消对话框，则会调用 `cancel()` 方法，显然您不应在此保存数据。如果出现这种情况，您可以回滚已做的更改。使用\
  \ `isValid()` 方法，您可以告知选项对话框面板的数据是否正常。如果数据不正常，*确定*按钮会自动禁用。此外，您必须告知选项对话框数据是否已更改。您可以使用\
  \ `isChanged()` 方法来实现这一点。通过 `getHelpCtx()`，您可以提供一个 `HelpCtx` 对象，该对象包含对帮助页面的引用，当用户单击选项对话框的*帮助*按钮时会显示该页面。\n\
  \n为了将数据更改告知选项对话框，您必须使其能够进行注册（请参阅清单 20-2）。您可以通过 `addPropertyChangeListener()` 和 `removePropertyChangeListener()`\
  \ 方法实现这一点。您已经从视图类 `ModuleOptions1Panel` 中了解了 `changed()` 方法。当数据更改时，视图会调用此方法，从而将更改告知选项对话框。选项对话框被注册为监听器。因此，选项对话框反过来会检查数据是否有效。\n\
  \n***清单 20-2.** 选项面板控制器*\n\n`import org.netbeans.spi.options.OptionsPanelController;`\n\
  `...`\n**`@OptionsPanelController.SubRegistration`**`(`\n`   location = \"Advanced\"\
  ,`\n`   displayName = \"#AdvancedOption_DisplayName_ModuleOptions1\",`\n`   keywords\
