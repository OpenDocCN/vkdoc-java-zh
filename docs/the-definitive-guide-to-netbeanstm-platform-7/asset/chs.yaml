  \ result = instance.subtract(a, b);`\n**`assertEquals`**`(expResult, result);`\n\
  `      // TODO review the generated test code.`\n`      fail(\"The test case is\
  \ a prototype.\");`\n`   }`\n`}`\n\n使用 `@Before` 和 `@After` 注解标记的两个方法会在运行该类的每个测试之前自动执行。因此，可以在运行测试之前确定和分配某些前提条件和资源。之后，它们最终可以被释放。为了运行一个类的每个单独测试，都会创建该类的一个新实例。这意味着构造函数适用于分配那些对该类的所有测试用例都通用的资源。\n\
  \n例如，如果多个测试都需要数据库连接，那么（出于性能考虑）只创建一次连接，然后在完成所有相关测试后关闭它是合理的。为此，您可以使用 `@BeforeClass`\
  \ 和 `@AfterClass` 注解标记两个方法，通过这些方法您可以进行必要的准备工作和收尾工作。这些方法必须声明为 `static`，因为它们是在创建类之前被调用的。此外，这强制要求由这些方法全局提供的资源（例如数据库连接）也必须是\
  \ `static` 的。这样它们就可以提供给所有实例。清单 42-3 中显示了一个示例。\n\n***清单 42-3.** 在所有测试之前或之后提供和释放资源*\n\
  \n`public class DatabaseTest {`\n`   private static Connection conn;`\n\n`   @BeforeClass`\n\
  `   public static void setUpClass() throws Exception {`\n`      conn = DriverManager.getConnection(\"\
  url\");`\n`   }`\n\n`   @AfterClass`\n`   public static void tearDownClass() throws\
  \ Exception {`\n`      conn.close();`\n`   }`\n\n`   @Test`\n`   public void testAdd()\
  \ throws Exception {`\n`      Statement stmt = conn.createStatement();`\n`      //...`\n\
  `   }`\n\n`   @Test`\n`   public void testRemove() throws Exception {`\n`      Statement\
  \ stmt = conn.createStatement();`\n`      //...`\n`   }`\n`}`\n\n让我们回到测试类 `MathTest`。现在您想要完成并执行这两个目前还只是自动创建的基本结构的测试。首先，您可以删除\
  \ setUp 和 tearDown 方法，因为在这种情况下您不需要它们。之后，您为这两个测试定义有用的参数以及相应的预期返回值。该类看起来与 清单 42-4\
  \ 中的类似。\n\n***清单 42-4.** 包含测试值和预期结果值的 MathTest*\n\n`import org.junit.Test;`\n`import\
  \ static junit.framework.Assert.*;`\n`public class` **`MathTest`** `{`\n\n`   @Test`\n\
  `public void` **`testAdd`**`() {`\n`      System.out.println(\"testAdd\");`\n`      int\
  \ a = 3;`\n`      int b = 4;`\n`      Math instance = new Math();`\n`      int expResult\
  \ = 7;`\n`      int result = instance.add(a, b);`\n**`assertEquals`**`(expResult,\
  \ result);`\n`   }`\n\n`   @Test`\n`public void` **`testSubtract`**`() {`\n`      System.out.println(\"\
  testSubtract\");`\n`      int a = 5;`\n`      int b = 3;`\n`      Math instance\
  \ = new Math();`\n`      int expResult = 2;`\n`      int result = instance.subtract(a,\
  \ b);`\n**`assertEquals`**`(expResult, result);`\n`   }`\n`}`\n\n在用合理的值填充两个测试后，您现在可以执行它们了。从\
  \ Platform 应用程序项目的上下文菜单中选择 *测试全部*，或者从所需模块的上下文菜单中选择 *测试* 来执行所有模块的测试。或者，您也可以按 *Alt+F6*\
  \ 或调用 *运行 ![Image](img/U001.jpg) 测试项目*。然后，将执行在项目视图中选中的项目的测试。\n\n\n\nNetBeans IDE\
  \ 提供了一个专门的*测试结果*窗口（*窗口 ![图片](img/U001.jpg) 输出 ![图片](img/U001.jpg) 测试结果*）来清晰展示结果（参见图\
  \ 42-3）。运行测试时会自动打开该窗口。测试过程中在标准输出上产生的输出会显示在窗口右侧。您可以使用左侧工具栏设置不同的筛选器。例如，您可以仅显示存在错误的测试。此外，您还可以选择对所有测试或仅对失败的测试重复运行。\n\
  \n![图片](img/4203.jpg)\n\n***图 42-3.** 测试结果概览*\n\n到目前为止，对于常规测试，NB JUnit 模块并不需要特殊的支持。使用\
  \ JUnit 注解使得实现特别简单明了。尽管接下来您将测试 NetBeans 平台特定的实现，但您会用到 NB JUnit 模块的优势。不过，在使用它之前，您需要先激活它。为此，请打开\
  \ NetBeans 平台应用程序项目的*属性*窗口的上下文菜单。在 *harness* 集群的 *Libraries* 类别中激活 *NB JUnit* 模块。然后，可以通过随后显示的\
  \ *Resolve* 按钮自动添加此模块所需的模块。之后，您可以通过模块项目的*单元测试库*节点的上下文菜单，选择*添加单元测试依赖项*来添加 *NB JUnit*\
  \ 模块。从上下文菜单中调用新添加的模块 *Edit*，并激活*递归包含依赖项*选项，以便在测试时获取这些模块提供的依赖项（参见图 42-4）。\n\n![图片](img/4204.jpg)\n\
  \n***图 42-4.** 必须递归包含 NB JUnit 模块的依赖项。*\n\n#### 在 NetBeans 运行时容器环境中进行测试\n\nNB JUnit\
  \ 模块使您能够在 NetBeans 运行时容器环境中运行测试。在测试期间，也会提供诸如全局 Lookup 等功能，但这要求您为整个 NetBeans 平台应用程序项目运行测试（*全部测试*）。\n\
  \n为此，请使用 `NbModuleSuite` 类。您可以创建一个包装测试，并通过静态方法 `suite()` 基于 `NbModuleSuite.Configuration`\
  \ 对象来交付它。\n\n您在清单 42-5 中看到，测试类派生自 `NbTestCase` 类。这是为了能够将其添加到 `Configuration` 对象中所必需的。您不再需要那些不再被考虑的注解。相反，所有测试都必须以\
  \ `test` 为前缀。\n\n***清单 42-5.** 在 NetBeans 运行时容器环境中运行测试。*\n\n`import junit.framework.Test;`\n\
  `import org.netbeans.junit.NbTestCase;`\n`import org.netbeans.junit.NbModuleSuite;`\n\
  \n`public class MathTest extends NbTestCase {`\n\n`   public MathTest() {`\n`      super(\"\
  MathTest\");`\n`   }`\n\n`   public static Test suite() {`\n`      NbModuleSuite.Configuration\
  \ config = NbModuleSuite.createConfiguration(MathTest.class);`\n`      return NbModuleSuite.create(config);`\n\
  `   }`\n\n`   public void testAdd() {`\n`      ...`\n`   }`\n`}`\n\n请注意，如果您有其他包含注解但未添加到包装测试对象中\
  \ `suite()` 方法的测试类，这些测试也会被执行，但它们实际上无法成功运行，因为它们会被 NetBeans 运行时容器关闭所取消。因此，建议将所有要运行的测试都添加到包装器中，以确保所有测试都在相同的环境中运行。您可以使用\
  \ `@Ignore` 注解轻松标记那些不会运行的测试。\n\n您可以通过 `Configuration` 对象的 `addTest()` 方法添加任意数量的测试类或仅添加单个测试。此外，您还可以定义哪些模块（`enableModules()`）或哪些集群（`clusters()`）将处于活动状态。不过，*platform*\
  \ 集群默认是激活的。通常，对于模块测试来说，在运行测试时避免启动用户界面（这只会浪费时间）是有意义的，可以通过 `gui(false)` 实现。调用这些方法时，请确保在先前方法的返回值上调用下一个方法，因为\
  \ `NbModuleSuite.Configuration` 类的方法每次都会返回一个包含相应更改值的实例副本。因此，调用方式如下所示：\n\n`NbModuleSuite.Configuration\
  \ config = NbModuleSuite`\n`   .createConfiguration(CalculatorTest.class)`\n`   .addTest(MathTest.class)`\n\
  `   .enableModules(\".*\")`\n`   .clusters(\".*\");`\n\n\n\n#### 查找与服务测试\n\n基本上，你可以按照上一段所述，为那些通过全局查找（Lookup）查询服务的模块实现测试。然而，这样一来你就必须运行整个应用程序的测试。如果你想测试单个模块，可以实现所谓的*模拟*对象（占位对象）来成功运行模块测试。如果在开发或测试时没有提供松散耦合的服务提供者，你也可以采用同样的方法。模拟对象的类作为测试类的一部分实现，然后可以添加到全局查找中。为此，你有两种选择，将在下面的场景中进行探讨（参见清单\
  \ 42-6、清单 42-7 和清单 42-8）。\n\n以下假设你有一个名为 *My Module* 的模块，它使用了 `CalculatorService`\
  \ 服务（也在本例中定义）。\n\n***清单 42-6.** 使用全局服务的待检查类*\n\n`import org.openide.util.Lookup;`\n\
  `public class` **`Calculator`** `{`\n`public int` **`add`**`(int a, int b) {`\n\
  **`CalculatorService`** `calc = Lookup.getDefault().`**`lookup`**`(CalculatorService.class);`\n\
  `      return calc.add(a, b);`\n`   }`\n`}`\n\n***清单 42-7.** 服务接口*\n\n`public interface`\
  \ **`CalculatorService`** `{`\n`   public int add(int a, int b);`\n`}`\n\n模块 *My\
  \ Module 2* 为 `CalculatorService` 提供了一个服务提供者。\n\n***清单 42-8.** 独立模块中的服务提供者*\n\n\
  `import com.galileo.netbeans.module.CalculatorService;`\n`import org.openide.util.lookup.ServiceProvider;`\n\
  \n`@`**`ServiceProvider`**`(service=`**`CalculatorService`**`.class)`\n`public class`\
  \ **`CalculatorImpl`** `implements` **`CalculatorService`** `{`\n`   @Override`\n\
  `public int` **`add`**`(int a, int b) {`\n`      return a + b;`\n`   }`\n`}`\n\n\
  现在，你为 `Calculator` 类创建测试类 `CalculatorTest`。如果你在模块或整个应用程序上运行测试，稍后将会收到一个 `NullPointerException`，因为\
  \ `lookup()` 调用无法提供服务实现。为了解决这个问题，你可以直接在测试类中提供一个模拟服务。你可以通过 NB JUnit 模块中的 `MockServices`\
  \ 类将其添加到全局查找中。在运行测试之前，在一个标有 `@BeforeClass` 注解的方法中执行此操作。在清单 42-9 的示例中，这个方法就是 `setUpClass()`。\n\
  \n***清单 42-9.** 包含模拟服务实现的测试类*\n\n`import org.junit.BeforeClass;`\n`import org.junit.Test;`\n\
  `import static org.junit.Assert.*;`\n\n`public class` **`CalculatorTest`** `{`\n\
  \n**`@BeforeClass`**\n`public static void` **`setUpClass`**`() throws Exception\
  \ {`\n**`MockServices`**`.`**`setServices`**`(CalculatorMockInt.class);`\n`   }`\n\
  \n**`@Test`**\n`public void` **`testAdd`**`() {`\n`      System.out.println(\"add\"\
  );`\n`      Calculator calc = new Calculator();`\n`      assertEquals(calc.add(3,\
  \ 5), 8);`\n`   }`\n\n`public static final class` **`CalculatorMockInt`** `implements`\
  \ **`CalculatorService`** `{`\n`      @Override`\n`public int` **`add`**`(int a,\
  \ int b) {`\n`         return a + b;`\n`      }`\n`   }`\n`}`\n\n你实现了一个模拟类（必须是 `public`\
  \ 的），可以通过 `MockServices.setServices()` 将其发布到全局查找中。你使用内部类 `CalculatorMockInt` 来实现它。这样，你现在就可以独立于其他模块进行测试了。\n\
  \n使用 `MockServices` 类的另一种方法是在单元测试包中的一个独立类或文件中实现模拟类。然后，你可以像往常一样使用 `@ServiceProvider`\
  \ 注解发布它。在测试执行之前，会在目录 *build/test/unit/classes/META-INF/services* 中应用一个相关的条目。（参见清单\
  \ 42-10）。\n\n***清单 42-10.** 在独立文件中实现和注册模拟系统*\n\n`import org.openide.util.lookup.ServiceProvider;`\n\
  \n**`@ServiceProvider`**`(service = CalculatorService.class)`\n`public class` **`CalculatorMockExt`**\
  \ `implements` **`CalculatorService`** `{`\n`   @Override`\n`public int` **`add`**`(int\
  \ a, int b) {`\n`      return a + b;`\n`   }`\n`}`\n\n![图片](img/square.jpg) **注意**\
  \ 当删除模拟类或其 `@ServiceProvider` 注解时，注册信息仍然存在于 *META-INF/services* 目录中。在运行新测试之前，请执行一次“清理”（clean）。\n\
  \n\n\n#### 系统文件系统测试\n\n运行测试时，模块可以直接通过系统文件系统访问层文件的内容（无需进一步配置测试）。但是，无法访问其他模块的内容。无论如何，在运行单元测试时，相关组件最好与其环境隔离进行测试。现在问题来了：如何在不修改\
  \ *layer.xml* 文件本身的情况下，为系统文件系统中的软件模块提供所需内容？\n\n这个问题的答案是，你可以在运行时将自己的文件系统添加到系统文件系统中。因此，你可以在一个\
  \ XML 文件中创建配置（这是软件模块测试所必需的）。将其与测试类保存在一起。在那里实现一个派生自 `MultiFileSystem` 的文件系统实现。在构造函数中，你可以为每个\
  \ XML 文件创建一个 `XMLFileSystem` 实例。然后，你可以将其传递给充当所有 `XMLFileSystem` 实例代理的 `MultiFileSystem`。然后，通过全局\
  \ Lookup 中的 `@ServiceProvider` 注解将此文件系统实现公开。这样，此文件系统的内容就会被添加到系统文件系统中。\n\n清单 42-11\
  \ 通过一个简单的示例演示了上述方法。你为已知的 `Math` 类扩展一个 `multiply()` 方法。该方法从系统文件系统中读取其值。\n\n***清单\
  \ 42-11.** 从系统文件系统读取值的待测试方法*\n\n`import org.openide.filesystems.FileObject;`\n`import\
  \ org.openide.filesystems.FileUtil;`\n\n`public class` **`Math`** `{`\n`public int`\
  \ **`multiply`**`(String aName, String bName) {`\n`      FileObject file = FileUtil.`**`getConfigFile`**`(\"\
  MyFolder/MyFile\");`\n\n`      int aVal = (int)file.`**`getAttribute`**`(aName);`\n\
  `      int bVal = (int)file.`**`getAttribute`**`(bName);`\n`      return aVal *\
  \ bVal;`\n`   }`\n`}`\n\n你在一个 XML 文件（位于单元测试目录中）中创建此测试所需的配置。（参见清单 42-12）。该文件在此处命名为\
  \ *test.xml*。\n\n***清单 42-12.** 将在系统文件系统中可用的配置*\n\n`<filesystem>`\n`   <folder name=\"\
  MyFolder\">`\n`      <file name=\"MyFile\">`\n`         <attr name=\"a\" intvalue=\"\
  2\"/>`\n`         <attr name=\"b\" intvalue=\"3\"/>`\n`      </file>`\n`   </folder>`\n\
  `</filesystem>`\n\n根据你的需要，可以提供多个 XML 文件。你必须为每个文件创建一个 `XMLFileSystem` 实例，并通过 `setDelegates()`\
  \ 方法将它们全部添加到一个 `MultiFileSystem` 实例中。为此，你在单元测试目录中创建 `TestFileSystem` 类（参见清单 42-13）。\n\
  \n***清单 42-13.** 将不同 XML 配置添加到系统文件系统的文件系统实现*\n\n`import org.openide.filesystems.FileSystem;`\n\
  `import org.openide.filesystems.MultiFileSystem;`\n`import org.openide.filesystems.XMLFileSystem;`\n\
  `import org.openide.util.Exceptions;`\n`import org.openide.util.lookup.ServiceProvider;`\n\
  \n**`@ServiceProvider`**`(service=`**`FileSystem`**`.class)`\n`public class` **`TestFileSystem`**\
  \ `extends` **`MultiFileSystem`** `{`\n`   public TestFileSystem() throws Exception\
  \ {`\n**`setDelegates`**`(new` **`XMLFileSystem`**`(TestFileSystem.class.getResource(\"\
  `**`test.xml`**`\")));`\n\n`   }`\n`}`\n\n通过 `@ServiceProvider` 注解，你确保 `TestFileSystem`\
  \ 类在启动时被实例化并添加到系统文件系统中。因此，你现在可以通过清单 42-14 中所示的测试成功检查 `Math.multiply()` 方法的正确性。\n\
  \n***清单 42-14.** 测试从系统文件系统获取数据的 multiply() 方法*\n\n`public class MathTest {`\n`   @Test`\n\
  `   public void testMultiply() {`\n`      System.out.println(\"testMultiply\");`\n\
  `      Math instance = new Math();`\n`      int expResult = 6;`\n`      int result\
  \ = instance.multiply(\"a\", \"b\");`\n`      assertEquals(expResult, result);`\n\
  `   }`\n`}`\n\n现在，你可以单独测试那些在运行时通过系统文件系统从其他模块读取数据的软件模块了。\n\n#### 检查测试覆盖率\n\n对于软件质量而言，重要的是（最好）每一行代码都能在测试中被执行到。这被称为测试覆盖率。为了检查测试覆盖率，你可以使用\
  \ *Cobertura* 项目。Cobertura 可以检测覆盖率，并在运行测试时生成清晰的报告。在这些报告中，你可以在每个类的源代码上下文中查看结果。首先，你需要通过插件管理器安装\
  \ *Cobertura Module Test Coverage* 插件。\n\n通过集成到模块构建脚本中的 Ant 目标，可以轻松创建此报告。在项目视图中打开\
  \ *Important Files* 文件夹，然后扩展 *Build Script* 文件，以便显示所有可用的 Ant 目标。要创建报告，请在 *coverage-report*\
  \ 目标的上下文菜单中调用 *Run Target*。\n\n创建的报告可以通过 Ant 目标 *display-coverage-report* 在你的浏览器中显示，或者你可以直接在目录\
  \ *build\\test\\unit\\cobertura-report* 中打开该报告。（参见图 42-5）。\n\n![Image](img/4205.jpg)\n\
  \n***图 42-5.** 模块测试的测试覆盖率报告*\n\n### 功能 GUI 测试\n\n为了创建功能测试，NetBeans 除了前面提到的 NB JUnit\
  \ 模块外，还提供了 Jelly Tools Platform 模块（基于 Jemmy）。Jemmy 本身是一个库，可以用它来创建 GUI 应用程序的自动化测试。它包含一些方法，能够自动化用户通过\
  \ Swing 或 AWT 组件（例如输入文本或按下按钮）可以执行的操作。Jemmy 提供了大量的操作符类，通过这些类可以访问所有 Swing 组件。在此基础上，Jelly\
  \ Tools Platform 模块实现了用于访问特定 NetBeans 平台 GUI 组件（如主应用程序窗口、收藏夹、输出窗口或不同的选项面板）的操作符类。\n\
  \n\n\n#### 安装测试环境\n\n在创建第一个测试类之前，你需要通过几个简单步骤安装测试环境。以下操作假设你已在 NetBeans IDE 中创建并打开了一个包含至少一个模块的\
  \ NetBeans Platform 应用程序项目。\n\n首先，创建一个用于存放测试类的文件夹。最简便的方法是在“文件”窗口（*Window ![Image](img/U001.jpg)\
  \ Files*）中操作。只需在相应模块目录下通过 *File ![Image](img/U001.jpg) New File ![Image](img/U001.jpg)\
  \ Other ![Image](img/U001.jpg) Folder* 创建 *test/qa-functional/src* 目录即可。（参见图 42-6。）\n\
  \n![Image](img/4206.jpg)\n\n***图 42-6.** 功能测试类目录结构*\n\n因此，在项目视图中（重启 IDE 后）会显示两个新文件夹：*Functional\
  \ Test Packages* 和 *Functional Test Libraries*。在将实现和执行功能测试所需的库添加到 *Functional Test\
  \ Libraries* 文件夹之前，你需要先将这些库添加到应用程序本身。因此，在 Platform 应用程序项目中，通过 *Properties ![Image](img/U001.jpg)\
  \ Libraries* 激活整个集群 *harness*。缺失的模块可以通过 *Resolve* 按钮自动添加。\n\n然后，你可以从 *Functional\
  \ Test Libraries* 文件夹的上下文菜单中，通过 *Add Functional Test Depedency* 添加以下库：\n\n*   JUnit\n\
  *   Jelly Tools Platform\n*   Jemmy\n*   NB JUnit\n\n你只需确保 NB JUnit 模块的依赖项被递归包含即可。可以通过上下文菜单中的\
  \ *Edit...* 激活此选项（参见图 42-4）。至此，你已经创建了必要的先决条件，可以在下一节中实现第一个测试用例。\n\n#### 实现测试用例\n\n\
  本节将通过一个简单示例说明实现功能 GUI 测试的基本方法。某个功能将通过按下按钮持久化保存在窗口中。打开应用程序或窗口时，该值将自动加载到相应的文本字段中。（参见图\
  \ 42-7。）\n\n![Image](img/4207.jpg)\n\n***图 42-7.** 将测试 TopComponent MyWindow 的功能。*\n\
  \n因此，以顶层组件类形式实现的窗口可能如清单 42-15 所示。\n\n***清单 42-15.** 待测试的 GUI 组件，用于保存或加载功能*\n\n`import\
  \ org.openide.windows.TopComponent;`\n`import org.openide.awt.ActionID;`\n`import\
  \ org.openide.awt.ActionReference;`\n`import org.openide.util.NbBundle;`\n`import\
  \ org.openide.util.NbBundle.Messages;`\n`import org.openide.util.NbPreferences;`\n\
  \n`@TopComponent.Description( preferredID = \"MyTopComponent\",`\n`   persistenceType\
  \ = TopComponent.PERSISTENCE_ALWAYS)`\n`@TopComponent.Registration( mode = \"editor\"\
  ,`\n`   openAtStartup = true)`\n`@ActionID( category = \"Window\",`\n`   id = \"\
  com.galileo.netbeans.module.MyTopComponent\")`\n`@ActionReference(path = \"Menu/Window\"\
  )`\n`@TopComponent.OpenActionRegistration(`\n`   displayName = \"#CTL_MyAction\"\
  ,`\n`   preferredID = \"MyTopComponent\")`\n`@Messages( {\"CTL_MyTopComponent=`**`MyWindow`**`\"\
  ,`\n`   \"CTL_MyAction=`**`MyWindow`**`\"})`\n`public final class` **`MyTopComponent`**\
  \ `extends TopComponent {`\n\n`   private javax.swing.JButton okButton;`\n`   private\
  \ javax.swing.JTextField propValue;`\n\n`   public MyTopComponent() {`\n`      initComponents();`\n\
  `      setName(Bundle.CTL_MyTopComponent());`\n`   }`\n\n`   ...`\n\n`private void`\
  \ **`okButtonActionPerformed`**`(ActionEvent evt) {`\n`      NbPreferences.forModule(MyTopComponent.class).`**`put`**`(\"\
  propKey\", propValue.getText());`\n`   }`\n\n`   @Override`\n`public void` **`componentOpened`**`()\
  \ {`\n`      propValue.setText(NbPreferences.forModule(`\n`         MyTopComponent.class).`**`get`**`(\"\
  propKey\", \"default\"));`\n`   }`\n`}`\n\n现在，你需要为此功能创建一个测试用例。在 *Functional Test\
  \ Packages* 下通过 *File ![Image](img/U001.jpg) New File ![Image](img/U001.jpg) Java\
  \ ![Image](img/U001.jpg) Java Class* 创建 `MyTopComponentTest` 类。功能测试派生自 `JellyTestCase`\
  \ 类。与 *在 NetBeans 运行时容器环境中测试* 一节类似，你需要提供一个包装测试实例，确保所有测试都在 NetBeans 运行时容器环境中运行。通过\
  \ `suite()` 方法提供该实例，以便确定哪些集群和模块将处于活动状态。你可以通过 `Configuration` 对象进行设置，还可以影响哪些测试会被运行。（参见清单\
  \ 42-16。）\n\n***清单 42-16.** 测试 MyTopComponent 功能的测试类*\n\n`import junit.framework.Test;`\n\
  `import org.netbeans.jellytools.JellyTestCase;`\n`import org.netbeans.jellytools.MainWindowOperator;`\n\
  `import org.netbeans.jellytools.TopComponentOperator;`\n`import org.netbeans.jemmy.operators.JButtonOperator;`\n\
  `import org.netbeans.jemmy.operators.JTextFieldOperator;`\n`import org.netbeans.junit.NbModuleSuite;`\n\
  \n`public class` **`MyTopComponentTest`** `extends` **`JellyTestCase`** `{`\n\n\
  `   private static final String EXPECTED_RESULT = \"testValue\";`\n\n`   public\
  \ MyTopComponentTest(String name) {`\n`      super(name);`\n`   }`\n\n`public static`\
  \ **`Test`****`suite`**`() {`\n`      return NbModuleSuite.allModules(MyTopComponentTest.class,`\n\
  `         \"testSetValue\", \"testGetValue\");`\n`   }`\n\n`public void` **`testSetValue`**`()\
  \ {`\n`TopComponentOperator op = new` **`TopComponentOperator`**`(\"MyWindow\");`\n\
  `JTextFieldOperator text = new` **`JTextFieldOperator`**`(op, 0);`\n`      text.`**`setText`**`(EXPECTED_RESULT);`\n\
  `JButtonOperator button = new` **`JButtonOperator`**`(op, \"OK\");`\n`      button.`**`press`**`();`\n\
  `      op.close();`\n`   }`\n\n\n\n`public void` **`testGetValue`**`() {`\n`MainWindowOperator\
  \ main =` **`MainWindowOperator`**`.getDefault();`\n`      main.menuBar().`**`pushMenu`**`(\"\
  Window|MyWindow\");`\n`TopComponentOperator op = new` **`TopComponentOperator`**`(\"\
  MyWindow\");`\n`JTextFieldOperator text = new` **`JTextFieldOperator`**`(op, 0);`\n\
  `      String result = text.`**`getText`**`();`\n**`assertEquals`**`(EXPECTED_RESULT,\
  \ result);`\n`   }`\n`}`\n\n在清单 42-16 所示的测试类 `MyTopComponentTest` 中，你使用 `NbModuleSuite.allModules()`\
  \ 方法创建了一个包装测试实例。系统会自动使用一个配置，在该配置中，应用程序的所有集群和模块都处于活动状态。此外，你通过 `testSetValue()` 和\
  \ `testGetValue()` 实现了两个测试（所有以 `test` 前缀开头的方法都会作为测试执行）。通过 `allModules()` 方法，你指定了这两个测试用例，以确保它们的执行顺序。\n\
  \n通过 Jelly Tools Platform 模块中 `TopComponentOperator` 类型的实例，你可以按名称访问 `TopComponent`（另请参见清单\
  \ 42-16）。你创建一个 `JTextFieldOperator` 实例，以便能够向文本字段中输入内容。你将 `TopComponentOperator`\
  \ 作为容器传递。你可以设置一个测试值，并通过 *OK* 按钮保存设置。这些设置可以通过 `JButtonOperator` 类完成。最后，你通过 `close()`\
  \ 方法关闭窗口。\n\n在第二个测试中，你首先需要在应用程序的主菜单中打开窗口。你可以使用 `MainWindowOperator` 来访问它。`MainWindowOperator`\
  \ 能够通过指定的路径调用菜单项。请记住，与之前的测试类似，你需要访问文本字段。这次，你读取文本并将其与之前设置的值进行比较。\n\n表 42-1 列出了 Jelly\
  \ Tools Platform 模块中可用的操作符类选择。Jemmy 库为所有标准的 Swing 和 AWT 组件提供了操作符类。在开发独立的功能测试用例时，查看相应的\
  \ API 文档无疑会有所帮助。\n\n![Image](img/t4201.jpg)\n\n![Image](img/t4201a.jpg)\n\n####\
  \ 检查测试覆盖率\n\n即使对于功能测试，也可以通过 Cobertura 创建关于测试覆盖率的报告（另请参见*检查测试覆盖率*一节）。为此，请使用 Ant 目标\
  \ *coverage-report-qa-functional*。执行测试并创建报告后，你可以从目录 *build\\test\\qa-functional\\\
  cobertura-report* 调用该 Ant 目标。\n\n### Maven 项目中的配置\n\n为基于 Maven 的 NetBeans Platform\
  \ 应用程序实现测试的方式与*单元测试*和*功能 GUI 测试*两节中描述的方式相同，唯一的区别在于配置，我们接下来将对此进行探讨。\n\n#### 模块测试\n\
  \n运行软件测试是 Maven 构建生命周期中不可或缺的一部分。因此，构建阶段 *test* 在 *compile* 之后、*package* 创建实际构件之前执行。这些测试由\
  \ *Maven Surefire Plugin* 运行。该插件会自动运行位于 *src/test/java* 下的测试用例。通过依赖项条目，可以定义使用的 JUnit\
  \ 版本。因此，在应用基于 Maven 的 NetBeans Platform 应用程序项目时，父 POM 文件中已经添加了（如清单 42-17 所示的）条目。\n\
  \n***清单 42-17.** 指定 JUnit 版本*\n\n`<dependencies>`\n`   <`**`dependency`**`>`\n`      <groupId>`**`junit`**`</groupId>`\n\
  `      <artifactId>junit</artifactId>`\n`      <version>4.8.2</version>`\n`      <scope>`**`test`**`</scope>`\n\
  `   </`**`dependency`**`>`\n`</dependencies>`\n\n将此条目写入父 POM 文件后，它将自动提供给所有模块。这意味着无需进一步配置。\n\
  \n模块测试可以通过 NetBeans IDE 中的向导创建，如*常规测试*一节所述。如果你想使用 JUnit 扩展来实现测试用例，请将清单 42-18 所示的条目添加到相应模块的\
  \ POM 文件中，如果其余模块也使用此模块，则添加到父 POM 文件中。\n\n***清单 42-18**. 向 NB JUnit 模块添加依赖项*\n\n\
  `<dependency>`\n`   <groupId>org.netbeans.api</groupId>`\n`   <artifactId>org-netbeans-modules-nbjunit</artifactId>`\n\
  `   <version>${netbeans.version}</version>`\n`   <scope>test</scope>`\n`</dependency>`\n\
  \n#### 功能测试\n\n功能 GUI 测试也可以在基于 Maven 的 NetBeans Platform 应用程序中与 Jelly Tools Platform\
  \ 模块结合实现和运行。为此，请向应用程序模块（具有 *nbm-application* 打包类型的模块；请参见第 37 章）添加对 Jelly Tools Platform\
  \ 模块的依赖项，如清单 42-19 所示。添加对 NB JUnit 模块的依赖项。这两个模块所需的模块（即传递性依赖项）将由 Maven 自动添加到类路径中。\n\
  \n***清单 42-19.** 为功能测试添加依赖项*\n\n`<dependencies>`\n`   <dependency>`\n`      <groupId>org.netbeans.api</groupId>`\n\
  `      <artifactId>org-netbeans-modules-nbjunit</artifactId>`\n`      <version>${netbeans.version}</version>`\n\
  `      <scope>test</scope>`\n`   </dependency>`\n`   <dependency>`\n`      <groupId>org.netbeans.api</groupId>`\n\
  `      <artifactId>org-netbeans-modules-jellytools-platform</artifactId>`\n`      <version>${netbeans.version}</version>`\n\
  `      <scope>test</scope>`\n`   </dependency>`\n`</dependencies>`\n\n此外，你必须通过属性\
  \ `cluster.path.final` 配置 Maven Surefire 插件。这样，你就可以定义自己的集群和 NetBeans Platform 集群。你也在应用程序项目的\
  \ POM 文件中执行此操作，如清单 42-20 所示。\n\n***清单 42-20.** 为运行功能测试配置 Surefire 插件*\n\n`<`**`build`**`>`\n\
  `   <`**`plugins`**`>`\n`      <`**`plugin`**`>`\n`         <groupId>org.apache.maven.plugins</groupId>`\n\
  `         <artifactId>`**`maven-surefire-plugin`**`</artifactId>`\n`         <version>2.7.1</version>`\n\
  `         <configuration>`\n`            <systemProperties>`\n`               <property>`\n\
  `                  <name>`**`cluster.path.final`**`</name>`\n`                  <value>${project.build.directory}/`\n\
  `                     ${brandingToken}/${brandingToken}:`\n`                     ${project.build.directory}/`\n\
  `                     ${brandingToken}/platform</value>`\n`               </property>`\n\
  `            </systemProperties>`\n`         </configuration>`\n`      </plugin>`\n\
  `   </plugins>`\n`</build>`\n\n因此，你现在甚至可以在基于 Maven 的项目中实现功能 GUI 测试，正如*实现测试用例*一节中已经描述的那样。只需将其存储在模块测试目录\
  \ *src/test/java* 下即可。\n\n\n\n#### 测试覆盖率\n\nCobertura 还会为基于 Maven 的 NetBeans 平台项目生成一份关于测试覆盖率的报告。在\
  \ POM 文件中添加以下条目，即可使用 *Maven Cobertura 插件*，如清单 42-21 所示。\n\n***清单 42-21.** 将 Cobertura\
  \ 插件添加到 POM 文件*\n\n`<reporting>`\n`   <plugins>`\n`      <plugin>`\n`         <groupId>org.codehaus.mojo</groupId>`\n\
  `         <artifactId>cobertura-maven-plugin</artifactId>`\n`         <version>2.4</version>`\n\
  `      </plugin>`\n`   </plugins>`\n`</reporting>`\n\n你可以通过以下命令从命令行（或其他 IDE）启动报告生成：\n\
  \n`mvn cobertura:cobertura`\n\n然后，报告会以 HTML 格式存储在 *target\\site\\cobertura* 目录中。此外，NetBeans\
  \ IDE 还提供了一个有用的插件。你可以通过插件管理器安装 *Maven 测试覆盖率* 插件，这样，就可以通过模块的上下文菜单，选择 *代码覆盖率 ![Image](img/U001.jpg)\
  \ 显示报告* 来显示报告。（参见图 42-8）。\n\n![Image](img/4208.jpg)\n\n***图 42-8.** NetBeans IDE\
  \ 中集成的测试覆盖率报告*\n\n你可以运行测试，并通过 *运行所有测试* 来执行以下报告生成。你可以直接查看相应类的哪些行通过了测试，哪些没有，并在概览中打开单个文件（如图\
  \ 42-9 所示）。\n\n![Image](img/4209.jpg)\n\n***图 42-9.** 测试覆盖率分析的详细结果*\n\n### 总结\n\n\
  进行软件测试是软件开发模型中不可或缺的一部分。在本章中，你学习了更多关于如何轻松高效地测试 NetBeans 平台应用程序的知识。在本章的第一部分，我们在 JUnit\
  \ 的支持下进行了模块测试。在第二部分，你学习了如何测试 NetBeans 平台应用程序的 GUI。这是在 Jelly Tools 平台的支持下完成的。\n\n\
  ## 第 43 章\n\n## 使用 NetBeans IDE 进行调试\n\n本章介绍 NetBeans 调试环境的功能。在此环境中，你可以使用大量有用的信息窗口和其他实用功能来调试你的\
  \ NetBeans 平台应用程序。\n\n### 调试窗口\n\nNetBeans 调试器使用一系列有用的窗口，使调试尽可能高效和透明。在以下部分中，你将详细了解这些窗口。*调试*\
  \ 窗口本身是不同功能的组合。每个功能都有专门的窗口。因此，你可以概览所有线程，并且在到达断点时，也可以概览完整的调用堆栈。一个符号（在右侧）会显示哪些线程当前已暂停。你可以通过此符号停止或恢复某些线程。你也可以通过上下文菜单同时影响所有线程。通过双击调用堆栈中的条目，你可以直接跳转到源文件中相应方法的位置。（参见图\
  \ 43-1）。\n\n![Image](img/4301.jpg)\n\n***图 43-1.** 显示所有当前线程和当前调用层次结构的调试窗口*\n\n###\
  \ 断点\n\n所谓的*断点*是调试应用程序的基础。通过这些断点，你可以在源代码中定义应用程序执行应停止的特定位置。IDE 的支持提供了某些可能性。例如，你可以仔细查看变量的当前值，或者在应用程序停止的位置更详细地查看方法的返回值。通过这种方式，你可以获取有关软件异常行为的信息。\n\
  \n根据在源代码中的位置或事件，可以区分不同类型的断点。NetBeans IDE 中提供的断点类型列于表 43-1 中。\n\n![Image](img/t4301.jpg)\n\
  \n应用断点可以通过单击行号（源代码编辑器的左侧边距）、通过菜单 *调试 ![Image](img/U001.jpg) 新建断点* 或通过断点窗口工具栏中的按钮\
  \ ![Image](img/U4301.jpg) 来完成（参见图 43-2）。\n\n![Image](img/4302.jpg)\n\n***图 43-2.**\
  \ 断点窗口中所有断点的概览*\n\n所有设置的断点都会显示在*断点*窗口中。为了清晰起见，你还可以将它们分组排列。你可以将断点分类为用户特定的（*自定义组*），或者使用按钮\
  \ ![Image](img/U4302.jpg)（断点窗口的左侧边距）按默认方式分组。可用的标准组如下：\n\n*   编程语言：*语言*\n*   断点类型：*类型*\n\
  *   项目：*项目*\n*   文件：*文件*\n*   调试会话：*调试会话*\n*   子组：*嵌套*\n\n调用断点的上下文菜单以分配用户特定的组，或将断点分配给现有组。使用*移入组...*，你可以直接将断点分配给一个组，或者使用*新建*创建一个新组。如图\
  \ 43-2 所示，你可以专门激活或停用单独的断点或断点组。额外显示的绿色箭头会显示你的应用程序当前暂停在哪个断点处。断点也可以配置为仅在特定条件下暂停应用程序。因此，对于所有类型的断点，你都可以确定应用程序仅在运行一定次数后才暂停。例如，你可以让应用程序在某个变量上的断点被第十次命中时暂停。\n\
  \n![Image](img/4303.jpg)\n\n***图 43-3.** 单独配置断点*\n\n此外，你可以为*类*和*异常*断点类型定义应排除哪些类。对于其余类型，你可以通过布尔表达式定义断点生效的任何条件。默认情况下，当到达断点时，当前正在执行的线程会暂停。但是，你也可以配置断点，使其暂停所有线程或不暂停任何线程。在后一种情况下，应用程序会直接继续执行。\n\
  \n### 变量\n\nNetBeans IDE 提供了不同的窗口和工具，以便在到达断点时检查变量。在变量窗口（*窗口 ![Image](img/U001.jpg)\
  \ 调试 ![Image](img/U001.jpg) 变量*）中，会显示当前上下文中的所有变量（参见图 43-4）。这样，你可以观察实例变量、局部变量以及最终传递的参数的值。你也可以通过将鼠标指向变量，直接在编辑器中查看各个变量的值。\n\
  \n![Image](img/4304.jpg)\n\n***图 43-4.** 变量概览*\n\n通过所谓的*监视*，你还可以观察当前断点上下文之外的变量。你可以通过变量窗口左侧的工具栏添加新的监视条目。此外，你可以直接在源代码编辑器中选择变量，然后通过拖放添加它们，以便具体而清晰地跟踪某些变量的值。作为在变量窗口中表示监视的替代方案，你可以使用单独的监视窗口，该窗口位于*窗口\
  \ ![Image](img/U001.jpg) 调试 ![Image](img/U001.jpg) 监视* 下。\n\n\n\n### 远程调试\n\n最简单的方式是直接从\
  \ NetBeans IDE 中以调试模式启动应用程序。不过，NetBeans IDE 也支持调试在 NetBeans IDE 外部启动的应用程序。为此，你需要以调试模式启动应用程序。同时，必须指定一些参数，以便\
  \ NetBeans IDE 能够通过 *Java 调试连线协议* (JDWP) 成功连接到应用程序。远程调试参数列于表 43-2。\n\n![Image](img/t4302.jpg)\n\
  \n![Image](img/t4302a.jpg)\n\n例如，通过以下参数启动你的应用程序，以便利用 NetBeans IDE 进行调试：\n\n`-Xdebug\
  \ -Xrunjdwp: transport=dt_socket,server=y,address=65535,suspend=n`\n\n要调试一个外部启动的应用程序，请调用\
  \ *调试 ![Image](img/U001.jpg) 附加调试器*。选择 *Java 调试器* *(JPDA)*，并使用 *SocketAttach* 作为连接器。此外，你还需要指定应用程序运行的主机名、应用程序接受请求的端口号以及超时时间。\n\
  \n按照图 43-5 所示完成设置后，按 *确定* 以直接建立连接。\n\n![Image](img/4305.jpg)\n\n***图 43-5.** 将远程调试器与应用程序连接*\n\
  \n### 控制调试\n\nNetBeans IDE 提供了多种操作，你可以利用它们快速定位代码中的关键点，从而最高效地进行调试。以下列表对这些操作进行了很好的概述：\n\
  \n*   ![Image](img/U4303.jpg) *调试主项目* (*Ctrl + F5*)：启动当前在 IDE 中打开的主项目（以调试模式）。只有启动调试后，以下操作才可用。\n\
  *   ![Image](img/U4304.jpg) *单步跳过* (*F8*)：执行当前完整的代码行，而不会进入其中可能存在的调用。\n*   ![Image](img/U4305.jpg)\
  \ *单步跳过表达式* (*Shift + F8*)：使用此命令，你可以详细评估由多个方法调用组成的表达式。在“变量”窗口中，每个单独方法调用传递的值和返回值会作为历史记录显示（参见图\
  \ 43-4）。如果表达式不包含进一步的方法调用，则该操作的行为与 *单步跳过* 相同。\n*   ![Image](img/U4306.jpg) *单步进入*\
  \ (*F7*)：使用此命令执行一行代码。如果该代码行包含存在源代码的方法调用，你可以通过此操作进入这些单独的调用。如果存在多个调用，你可以通过一次点击直接进入相应的方法调用。\n\
  *   ![Image](img/U4307.jpg) *单步进入下一个方法* (*Shift + F7*)：类似于 *单步进入* 操作。但使用此操作会直接进入当前行的下一个方法。\n\
  *   ![Image](img/U4308.jpg) *单步跳出* (*Ctrl + F7*)：执行一行代码。如果它是某个方法的一部分，则会执行所有剩余的行，并且调试器会跳转到调用位置。\n\
  *   ![Image](img/U4309.jpg) *运行到光标处* (*F4*)：执行从当前位置到光标所在行的所有行。\n*   ![Image](img/U4310.jpg)\
  \ *继续* (*F5*)：使用此操作，你可以通过断点恢复暂停的线程。应用程序会一直执行到可能存在的下一个断点。\n*   ![Image](img/U4311.jpg)\
  \ *暂停：* 使用此操作，你可以立即暂停所有线程。\n*   ![Image](img/U4312.jpg) *结束调试器会话* (*Shift + F5*)：此操作结束当前的调试器会话，如果应用程序是从\
  \ IDE 中启动的，也会随之结束。\n\n### 调用堆栈\n\n如果你的应用程序在断点处停止，你可以通过 *调用堆栈* 窗口（*窗口 ![Image](img/U001.jpg)\
  \ 调试 ![Image](img/U001.jpg) 调用堆栈*）查看直到当前行的完整调用层次结构，如图 43-6 所示。双击某个条目，它会直接跳转到编辑器中对应的调用位置。这样你就可以检查与被调用方法相关的变量。\n\
  \n![Image](img/4306.jpg)\n\n***图 43-6.** 用于跟踪调用层次结构的“调用堆栈”窗口*\n\n要跳转到 Java 和 NetBeans\
  \ 平台的方法中，必须存在源代码。你可以在 *源* 窗口（*窗口 ![Image](img/U001.jpg) 调试 ![Image](img/U001.jpg)\
  \ 源*）中查看调试器可用的源目录，如图 43-7 所示。你也可以在此处通过上下文菜单的 *添加源根目录* 来添加更多目录。在下载页面 [`http://netbeans.org`](http://www.netbeans.org)\
  \ 上，你可以获取 NetBeans 平台的源代码，它是一个单独的 ZIP 文件。\n\n![Image](img/4307.jpg)\n\n***图 43-7.**\
  \ “源”窗口，显示调试时可用的所有源目录*\n\n### 堆遍历\n\n借助堆遍历功能，NetBeans IDE 提供了一个用于跟踪内存泄漏的重要工具。可以在“已加载类”窗口中显示应用程序所有当前实例的概览，如图\
  \ 43-8 所示。要从众多实例中找到所需的实例，你可以按名称或子类进行过滤。如果需要，你还可以使用正则表达式过滤实例。\n\n![Image](img/4308.jpg)\n\
  \n***图 43-8.** “已加载类”窗口，用于显示按类分组的所有当前实例的数量*\n\n你可以通过某个条目的上下文菜单中的 *在实例视图中显示*（参见图\
  \ 43-9）来单独查看特定类的实例。这样，你就可以查看所选实例的各个值。你可以在左侧选择一个实例。相应的引用也会显示出来。\n\n![Image](img/4309.jpg)\n\
  \n***图 43-9.** “实例”窗口，用于显示特定类的所有当前实例*\n\n### 总结\n\n借助一个高效设计的调试环境，可以快速追踪应用程序中的错误和潜在问题。你手头就有这样一个环境：NetBeans\
  \ IDE。在本章中，你了解了 NetBeans 的调试功能，以及如何将它们用于 NetBeans 平台应用程序的调试。\n\n## 第 8 部分\n\n##\
  \ 实践与拓展：开发一个 MP3 管理器——NetBeans 平台应用程序示例\n\n## 第 44 章\n\n## 示例项目：MP3 管理器\n\n本章旨在演示一个完全可执行的、在\
  \ NetBeans 平台上播放 MP3 文件的应用程序的设计与实现。当然，这个应用程序将尽可能灵活和模块化。因此，它将重用许多之前实现和讨论过的 NetBeans\
  \ 平台的优势和特性。\n\n即使你没有阅读前面所有的章节，或者你正试图直接深入 NetBeans 平台的世界，本章也很有用。在需要更详细知识的地方，我会引导你参考更深入讨论该主题的章节。接下来的页面将只涵盖实现中最重要的部分。与本书中的所有其他示例一样，你可以从\
  \ Apress 网站（[`www.apress.com`](http://www.apress.com)）上本书的源代码/下载区域下载此示例，它是一个完整的\
  \ NetBeans 项目。\n\n\n\n### 设计\n\n本质上，你的应用程序应能够播放 MP3 文件，在播放列表中管理这些文件，并显示相关的 ID3 信息。此外，你还希望支持通过应用程序对\
  \ ID3 信息进行简单的编辑和添加。使用 NetBeans 平台的“收藏夹”模块作为 MP3 库。例如，借助“面板”模块，你可以管理整个 MP3 专辑。你还可以使用“输出”模块在处理\
  \ ID3 任务时向用户提供反馈。该应用程序的一大优势在于其易于扩展，这得益于 NetBeans 平台基于模块的架构。然而，同样需要精心设计的架构和应用程序结构，因此你必须考虑要提供的功能以及粒度，也就是说，你必须提前考虑需要多少个模块来完成这项工作。为了提供合适的接口和扩展点，你还必须考虑应用程序在哪些方面以及如何需要最大的可扩展性。然后，你使用相应的接口和扩展点来创建必要的接口。\n\
  \n在图 44-1 中，你可以看到应用程序的结构，其中包含 NetBeans 平台以及底层的 Java 平台。实际的应用程序部分，在图 44-1 中用 *MP3\
  \ 管理器* 标记，大致可以分为三层：\n\n*   最底层包含将成为应用程序组成部分的模块，包括图形用户界面，例如导航器列表、用于 MP3 文件的 Java\
  \ Sound SPI 实现，以及数据库系统 Java DB。你希望在应用程序内部将 Java DB 用于不同目的。\n*   在中间层，你封装服务接口。这一层有助于解耦应用程序组件，因为这些组件不再直接依赖于彼此的实现，在大多数情况下仅依赖于所提供的接口。\n\
  *   第三层基于第二层，实现应用程序的组件，使用独立模块提供实际功能。\n\n所有模块及其各自的职责如下所列（稍后，你将逐步创建并实现其中一些模块）：\n\n\
  *   *核心*：在此模块中，可以提供应用程序重要且不可或缺的组件（使用应用程序所必需的组件）。\n*   *核心 UI*：你在此模块中封装额外的用户界面。\n\
  *   *JMF 插件*：在此模块中，你封装 Java Media Framework 和 MP3 实现的 Java Sound SPI，后者由 Sun 以 JAR\
  \ 存档形式提供。播放 MP3 编码的音频数据需要 Java Sound SPI。\n*   *Java DB*：通过此模块，你集成数据库系统 Java DB。\n\
  *   *服务*：你在此模块中定义服务接口，以便应用程序提供的服务可以动态扩展。\n*   *播放器*：此模块提供一个带有图形用户界面的 MP3 播放器。\n\
  *   *播放列表*：通过此模块，MP3 文件可以在不同的列表中进行管理，从而提供给播放器。\n*   *ID3 API*：包含用于读取和写入 MP3 文件 ID3\
  \ 信息的 API。\n*   *收藏夹品牌化*：调整“收藏夹”模块的菜单项。\n*   *属性品牌化*：调整“属性”模块的菜单项。\n*   *数据库搜索器*：这是一个服务提供者，你可以用它来在数据库中搜索\
  \ MP3 文件。\n*   *文件系统搜索器*：这是一个服务提供者，你可以用它来在硬盘驱动器上搜索 MP3 文件。\n*   *搜索器 UI*：此模块为使用搜索\
  \ MP3 的服务提供者提供用户界面。\n*   *索引器*：此模块自动指示位于硬盘驱动器上的 MP3 文件。借助它，可以使用不同标准快速找到 MP3 文件。\n\
  \n![图片](img/4401.jpg)\n\n***图 44-1.** 将应用程序组件划分为模块*\n\n### 创建 NetBeans 平台应用程序\n\n\
  每个 NetBeans 富客户端应用程序的基础是一个 *NetBeans 平台应用程序项目*。该项目代表整个应用程序，并包含各个模块。应用程序品牌化（即应用程序命名、启动画面等）也通过\
  \ NetBeans 平台应用程序项目进行。NetBeans IDE 提供了一个用于创建此类项目的向导。你可以通过 *文件 ![图片](img/U001.jpg)\
  \ 新建项目* 调用此向导。然后，在 *NetBeans 模块* 下选择项目类型 *NetBeans 平台应用程序*。按 *下一步* 进入下一页，你可以在其中输入项目名称。这次你选择\
  \ *MP3 管理器*。通过单击 *完成*，平台应用程序即创建完成。你可以在品牌化对话框中专门调整应用程序的外观以适应产品，该对话框可以通过平台应用程序上下文菜单中的\
  \ *品牌化…* 调用。在那里，你还可以调整标题、不同的图标和启动画面等。\n\n现在你已经为应用程序创建了基础，可以继续处理各个模块，即应用程序的组件。\n\n\
  ### 对 MP3 的支持\n\n为了在你的播放器模块中支持播放 MP3 文件，请使用 *Java Media Frameworks* (JMF) 和一个 MP3\
  \ 插件。*MP3 插件* 是用于 MP3 文件的 Java Sound API（它是 Java 平台的一部分）的一个实现。基本上，这个插件足以播放 MP3，但借助\
  \ JMF 实现会容易得多。你为这两个组件（JMF 和 MP3 插件）创建一个 *库包装器模块*，以便将这两个库集成到你的应用程序中。\n\n#### 创建 JMF\
  \ 模块\n\n从 [`http://www.oracle.com/technetwork/java/javase/tech`](http://www.oracle.com/technetwork/java/javase/tech)\
  \ 下载跨平台版本的 JMF 以及 MP3 插件。（你也可以在 Apress 网站 [`www.apress.com`](http://www.apress.com)\
  \ 上本书的源代码/下载区域找到这两个组件。）将 JMF 发行版中的 JAR 存档 *lib/jmf.jar* 和 MP3 插件发行版中的 *lib/ext/mp3plugin.jar*\
  \ 复制到一个目录中。之后你可以将两者添加到一个模块中。调用 *文件 ![图片](img/U001.jpg) 新建项目... ![图片](img/U001.jpg)\
  \ NetBeans 模块 ![图片](img/U001.jpg) 库包装器模块*。通过 *浏览* 添加你复制到目录中的两个 JAR 存档（按住 *Ctrl*\
  \ 键以选择两个存档）。在向导的下一页输入 *JMF 插件* 作为项目名称，并选择已创建的 NetBeans 平台应用程序。在下一页通过 `javax.media`\
  \ 确定模块的 *代码名称基*。最后，按 *完成*，包装器模块即创建完成并添加到 MP3 管理器中。\n\n\n\n#### 注册 MP3 插件\n\n请注意，MP3\
  \ 插件不会自动提供给 JMF；你必须在 JMF 的 `PlugInManager` 中注册此插件，才能使用它。将任务交给一个 *模块* *安装程序*（你可以在第\
  \ 3 章中找到更多相关信息），以确保该插件始终被注册。模块安装程序会在加载 JMF 插件时执行。通过 *文件 ![Image](img/U001.jpg) 新建文件\
  \ ![Image](img/U001.jpg) 模块开发 ![Image](img/U001.jpg) 安装程序/激活器* 来创建模块安装程序。在出现的对话框中点击\
  \ *完成* 按钮以创建安装程序。你需要在 `restored()` 方法中实现对 `PlugInManager` 的必要注册。你必须指明插件的类、输入和输出格式以及插件的类型。当然，在这种情况下它是一个编解码器插件。接下来，插入如下所示的代码行，如清单\
  \ 44-1 所示。\n\n***清单 44-1.** 启动时在 JMF 插件管理器中注册 MP3 插件*\n\n`package` **`javax.media`**`;`\n\
  `import javax.media.format.`**`AudioFormat`**`;`\n`import org.openide.modules.`**`ModuleInstall`**`;`\n\
  \n`public class` **`Installer`** `extends ModuleInstall {`\n`public void` **`restored`**`()\
  \ {`\n`      Format input1 = new AudioFormat(`**`AudioFormat.MPEGLAYER3`**`);`\n\
  `      Format input2 = new AudioFormat(`**`AudioFormat.MPEG`**`);`\n`      Format\
  \ output = new AudioFormat(`**`AudioFormat.LINEAR`**`);`\n**`PlugInManager`**`.addPlugIn(`\n\
  `              \"`**`com.sun.media.codec.audio.mp3.JavaDecoder`**`\",`\n`              new\
  \ Format[]{input1, input2},`\n`              new Format[]{output},`\n**`PlugInManager.CODEC`**`);`\n\
  `   }`\n`}`\n\n#### MP3 文件类型\n\n在你的应用程序中实现易用且专业的 MP3 文件管理的另一个重要基础是所谓的 MP3 文件类型。*文件类型*\
  \ 是 NetBeans 平台的一个概念，用于管理特定类型的文件。它由三个主要部分组成。首先，有一个 `FileObject`，它基本上是对 `File` 的封装。因此，它代表了具体的物理\
  \ MP3 文件。在此基础上，有一个 `DataObject`，它以灵活的方式通过属性和功能扩展了 `FileObject`。第三个组件是 `Node` 对象，用于在用户界面上以图形方式表示\
  \ `DataObject`，并且包含接受操作的能力。更多相关信息可以在第 7 章和第 12 章中找到。\n\n通常，MP3 文件类型属于 MP3 管理器的核心功能，这意味着你可以在核心模块中管理\
  \ MP3 文件类型。然而，为了获得更大的灵活性并避免循环依赖，你应该为 MP3 文件类型创建一个单独的模块。为此，请调用 *文件 ![Image](img/U001.jpg)\
  \ 新建项目... ![Image](img/U001.jpg) NetBeans 模块 ![Image](img/U001.jpg) 模块*。将名称指定为 *File\
  \ Type*，并将代码名称基础指定为 `com.hboeck.mp3manager.filetype`。其余值可以保留。点击 *完成* 按钮将关闭向导并创建该模块。\n\
  \n文件类型的组件完全由文件类型向导创建，而该向导又由 IDE 提供。通过 *文件 ![Image](img/U001.jpg) 新建文件 ![Image](img/U001.jpg)\
  \ 模块开发 ![Image](img/U001.jpg) 文件类型* 调用此向导。你使用 `audio/mpeg` 作为 MP3 的 MIME 类型，当然，将扩展名指定为\
  \ `mp3`。在下一页中，输入 `Mp3` 作为要创建的类的前缀，并且你可以为此文件类型选择一个图标。现在所有必需的信息都已收集完毕，点击 *完成* 即可创建\
  \ MP3 文件类型。\n\n该向导为 MP3 MIME 类型注册了一个数据对象工厂，该工厂负责加载 `Mp3DataObject`。（参见清单 44-2。）\n\
  \n***清单 44-2.** 每个数据对象工厂负责特定的文件类型，并由 NetBeans 平台提供服务。这就是它必须被注册的原因。*\n\n`<folder\
  \ name=\"Loaders\">`\n`  <folder name=\"`**`audio`**`\">`\n`    <folder name=\"\
  `**`mpeg`**`\">`\n`      <folder name=\"Factories\">`\n`        <file name=\"`**`Mp3DataLoader.instance`**`\"\
  >`\n`          <attr name=\"SystemFileSystem.icon\"`\n`                urlvalue=\"\
  nbresloc:/com/hboeck/mp3manager/filetype/mp3.png\"/>`\n`          <attr name=\"\
  `**`dataObjectClass`**`\"`\n`                stringvalue=\"com.hboeck.mp3manager.filetype.`**`Mp3DataObject`**`\"\
  />`\n`          <attr name=\"instanceCreate\"`\n`                methodvalue=\"\
  org.openide.loaders.DataLoaderPool.factory\"/>`\n`          <attr name=\"mimeType\"\
  \ stringvalue=\"audio/mpeg\"/>`\n`        </file>`\n`      </folder>`\n`    </folder>`\n\
  `  </folder>`\n`</folder>`\n\n此工厂为每个 MP3 `FileObject` 创建一个 `Mp3DataObject`，其基本结构如清单\
  \ 44-3 所示。\n\n***清单 44-3.** 通过 Mp3DataObject 类实现 MP3 文件的逻辑。*\n\n`import java.io.IOException;`\n\
  `import org.openide.filesystems.FileObject;`\n`import org.openide.loaders.DataNode;`\n\
  `import org.openide.loaders.DataObjectExistsException;`\n`import org.openide.loaders.MultiDataObject;`\n\
  `import org.openide.loaders.MultiFileLoader;`\n`import org.openide.nodes.Node;`\n\
  `import org.openide.nodes.Children;`\n`import org.openide.util.Lookup;`\n\n`public\
  \ class` **`Mp3DataObject`** `extends` **`MultiDataObject`** `{`\n`public` **`Mp3DataObject`**`(FileObject\
  \ pf, MultiFileLoader loader)`\n`      throws DataObjectExistsException, IOException\
  \ {`\n`      super(pf, loader);`\n`   }`\n\n`   @Override`\n`protected Node` **`createNodeDelegate`**`()\
  \ {`\n`      return new DataNode(this, Children.LEAF, getLookup());`\n`   }`\n\n\
  `   @Override`\n`public Lookup` **`getLookup`**`() {`\n`      return getCookieSet().getLookup();`\n\
  `   }`\n`}`\n\n这个类的任务是为一个普通的 `FileObject` 赋予逻辑。此外，`Mp3DataObject` 会为你提供一个节点。通过这个节点，MP3\
  \ 文件可以简单方便地在不同视图中显示，例如收藏夹模块，或者例如在播放列表中。你将在本章后面实现这样一个播放列表。默认情况下，只使用 `DataNode` 类。在下一节中，你将为该节点配备特殊功能，然后创建一个继承自\
  \ `DataNode` 的特殊节点类。\n\n![Image](img/square.jpg) **注意** 当实现第一个使用 MP3 文件类型（因此必须定义对该文件类型的依赖）的模块时，你会发现这是不可能的。原因是默认情况下，一个模块的所有包都不是公开的。这意味着，你必须明确指定哪些包可以从外部访问。你可以在模块的\
  \ *属性* 中的 *API 版本控制* 下进行定义。只有当至少有一个包被定义为公开，并且包含其他模块所依赖的模块时，该模块才会在列表中显示。\n\n### ID3\
  \ 支持\n\n在 MP3 文件内部，关于文件的信息可以保存在 *ID3 标签* 中，其中你必须区分两个不同的版本。ID3v1 标签由固定数量的字段（如编号、艺术家和标题）组成，每个字段都有固定的大小。至少，最重要的信息可以通过该标签存储在文件中。ID3v2\
  \ 标签引入了一个更加灵活的概念。它定义了数量多得多的标准化字段，此外，还可以添加多个自定义字段（字段也称为帧）。尽管如此，该标签也可以被那些不了解或无法解释此字段的应用程序读取。ID3v2\
  \ 标签的帧长度可能不同。此外，一个帧只有在需要时才会存在于文件中，这意味着不存在空帧。\n\n\n\n#### ID3 API\n\n当然，您会在应用程序中重用以此方式存储的信息。因此，您需要一个能够根据规范充分支持\
  \ ID3 数据检索和存储的 API。在互联网上，您可以免费找到一系列此类 ID3 API。其中大多数都相当实用。不过，为了便于处理和简单集成，我开始实现自己的\
  \ ID3 API。这样做时，我有意避免使用 NetBeans API 的帮助，以便也能在其他应用程序中使用它。尽管这个库仍在开发中（目前只能编辑 ID3v1\
  \ 标签），但对于这个仅用于演示 NetBeans 平台优势和强项的示例来说已经足够了。当然，您也可以自由使用其他库。但如果这样做，您必须将生成的源代码位置调整到所选\
  \ API。与 JMF 库一样，您可以使用库包装器模块来集成 ID3 库。您可以通过点击 *文件 ![Image](img/U001.jpg) 新建项目...*\
  \ 和 *NetBeans 模块 ![Image](img/U001.jpg) 库包装器模块* 来创建这样一个模块。在向导的第一页，选择名为 `com-hboeck-mp3manager-id3.jar`\
  \ 的库（该库也可以从 Apress 网站上本书的源代码/下载区域下载）。将模块命名为 *ID3 API*，并将其添加到 MP3 管理器中。所有其他字段可以保留默认值。\n\
  \n您必须定义一个对 ID3 模块的依赖关系，以便向文件类型模块提供 ID3 API。您可以在文件类型模块的 *属性* 中的 *库* 类别下执行此操作（参见图\
  \ 44-2）。按下 *添加依赖项...* 按钮，然后选择 *ID3 API* 模块即可。\n\n![Image](img/4402.jpg)\n\n***图\
  \ 44-2.** 定义对 ID3 API 的依赖关系*\n\n如前所述，`Mp3DataObject` 类负责特定于 MP3 的信息和方法。因此，您扩展了这个类，以便于访问\
  \ ID3v1 标签和 ID3v2 标签（参见清单 44-4）。非常重要的是，您只在访问文件本身时才创建标签，原因如下。例如，如果您在“收藏夹”窗口中打开一个包含许多\
  \ MP3 文件的文件夹，则会为每个文件创建一个 `Mp3DataObject`。如果您读取每个文件的 ID3 标签，最终会遇到显著的延迟——这是一种需要避免的行为。\n\
  \n***清单 44-4.** 扩展 MP3 DataObject 类以支持 ID3*\n\n`import com.hboeck.mp3manager.id3.v1.`**`ID3v1Tag`**`;`\n\
  `import com.hboeck.mp3manager.id3.v2.`**`ID3v2Tag`**`;`\n`...`\n`public class` **`Mp3DataObject`**\
  \ `extends MultiDataObject {`\n`private` **`ID3v1Tag`** `id3v1 = null;`\n`private`\
  \ **`ID3v2Tag`** `id3v2 = null;`\n`public` **`Mp3DataObject`**`(FileObject pf, MultiFileLoader\
  \ loader)`\n`           throws DataObjectExistsException, IOException {`\n`      super(pf,\
  \ loader);`\n`   }`\n`   ...`\n\n`public ID3v1Tag` **`getID3v1Tag`**`() {`\n`      if(id3v1\
  \ == null) {`\n`id3v1 = new` **`ID3v1Tag`**`(FileUtil.toFile(`**`getPrimaryFile()`**`));`\n\
  `      }`\n`return` **`id3v1`**`;`\n`   }`\n\n`public ID3v2Tag` **`getID3v2Tag`**`()\
  \ {`\n`      if(id3v2 == null) {`\n`id3v2 = new` **`ID3v2Tag`**`(FileUtil.toFile(`**`getPrimaryFile()`**`));`\n\
  `      }`\n`return` **`id3v2`**`;`\n`   }`\n`}`\n\n使用 `DataObject` 方法 `getPrimaryFile()`，您可以获取由\
  \ `Mp3DataObject` 实例管理的 MP3 文件的 `FileObject`（这是数据加载器传递给构造函数的对象）。您必须将一个 `FileObject`\
  \ 传递给 ID3 标签构造函数。这个文件是通过使用 `FileUtil.toFile()` 方法获得的，该方法确定由 `FileObject` 封装的文件。\n\
  \n另一种获取 `ID3v1Tag` 和 `ID3v2Tag` 类实例的方法是通过 `Mp3DataObject` 的 Lookup 来提供它们。这使得您能够从简单的\
  \ `Node` 或 `DataObject` 实例中检索这些实例，而无需特殊的类型安全性：\n\n`Node n = ...`\n`ID3v1Tag id3v1\
  \ = n.`**`getLookup`**`().`**`lookup`**`(ID3v1Tag.class);`\n\n#### ID3 编辑器\n\n现在您只需要一种显示和编辑\
  \ ID3 数据的方法。您可以通过 NetBeans 平台的 *属性* 模块连接到您的 MP3 文件类型来实现这一点。节点的工作是提供要在用户界面中显示的属性。因此，您现在创建\
  \ `Mp3DataNode` 类。与此类关联，您必须更改 `Mp3DataObject` 类的 `createNodeDelegate()` 方法。然后会创建一个\
  \ `Mp3DataNode` 实例。\n\n在新创建的 `Mp3DataNode` 类中，您重写 `createSheet()` 方法。该方法使用 `Sheet`\
  \ 实例提供节点的属性；可以出现只能读取或写入的特性。在此示例中，ID3v1 数据既可读也可写，而 ID3v2 数据只能读取。\n\n首先，您调用 `DataNode`\
  \ 超类的 `createSheet()` 方法，该方法已经创建了一个 `Sheet` 并向其中添加了一些基本属性，例如文件名、大小或修改日期。如果您不希望显示这些数据，也可以直接使用\
  \ `Sheet.createDefault()` 创建自己的 sheet。在 `Sheet` 对象内部，属性使用 `Set` 对象进行分组。这些组可以在“属性”窗口中有意地隐藏或显示。使用静态的\
  \ `createPropertiesSet()` 方法创建 `Set`。\n\n您创建两个这样的 `Set`，以便分别管理 ID3v1 和 ID3v2 数据。重要的是，每个\
  \ `Set` 都必须使用 `setName()` 方法赋予一个唯一的名称；否则，这些集合将在 sheet 内部被覆盖。（参见清单 44-5）。\n\n***清单\
  \ 44-5.** 在属性 Sheet 中提供 ID3 信息以供显示和编辑*\n\n`import org.openide.nodes.`**`PropertySupport`**`;`\n\
  `import org.openide.nodes.`**`Sheet`**`;`\n\n`public class` **`Mp3DataNode`** `extends\
  \ DataNode {`\n`   ...`\n`   @Override`\n`protected Sheet` **`createSheet`**`()\
  \ {`\n`      Sheet sheet = super.createSheet();`\n`      Sheet.Set set1 = Sheet.`**`createPropertiesSet`**`();`\n\
  `      Sheet.Set set2 = Sheet.`**`createPropertiesSet`**`();`\n`      set1.`**`setName(\"\
  id3v1\")`**`;`\n`      set1.setDisplayName(\"ID3 V1\");`\n`      set2.`**`setName(\"\
  id3v2\")`**`;`\n`      set2.setDisplayName(\"ID3 V2\");`\n\n**`Mp3DataObject`**\
