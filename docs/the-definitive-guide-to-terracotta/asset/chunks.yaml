    C H A P T E R 6 n HIBERNATE WITH TERRACOTTA


    **Verifying Ehcache Configuration Clustering**


    You can identify if your Ehcache is clustered in one of three ways:


    • Use the Terracotta administration console to inspect the data in the Ehcache
    store.


    In the console, open the roots tab from the panel on the left, and look for a
    root named net.sf.ehcache.CacheManager.singleton. This automatic root is created
    by the Terracotta Ehcache TIM for the Ehcache singleton, and it holds all Ehcache
    CacheManager instances. If you see this entry, your Terracotta configuration is
    configured correctly to cluster Ehcache.


    • Enable the Hibernate SQL debug property in your hibernate.xml, to ensure that
    cache hits do not output SQL:


    <!-- Echo all executed SQL to stdout -->


    <property name="show_sql">true</property>


    • Use the Statistics object in Hibernate to query, at run time, the hit and miss
    counts of your second-level cache:


    Statistics stats = HibernateUtil.getSessionFactory().getStatistics(); stats.setStatisticsEnabled(true);


    QueryStatistics queryStats = stats.getQueryStatistics("from Event"); queryStats.getCacheHitCount();


    **Tuning the Second-Level Cache**


    In general, the tuning strategies you use should be the same as those outlined
    in Section 19.2


    of the Hibernate documentation. When used with Terracotta, you should entertain
    a few special considerations.


    You should make sure that your cache entries are configured with an appropriate
    TTL to prevent your cache from growing too large over time. With Terracotta Network
    Attached Memory, your application can use significantly more virtual space than
    can be allocated in the local JVM. This can often be an advantageous and desired
    benefit, but you want to make sure that you don’t abuse this feature and store
    more data than you intend in the second-level cache. Ehcache can specify TTL settings
    when the CacheManager is constructed or can be controlled using the Ehcache configuration
    file. Refer to the Ehcache documentation for more details on the maximum idle
    time to live and maximum idle time settings.


    All caches perform best when there is high locality of reference. For now, we
    will quickly remind you of the motherboard analogy. The locality of reference
    is the state where the data needed for a particular set of CPU instructions is
    available in that CPU’s data cache: no disk or network I/O is required in order
    to access data. For more information on locality of reference as it pertains to
    Terracotta and JVM-level clustering, see Chapter 12\. If your application has
    low locality of reference or is performing primarily writes instead of reads (i.e.,
    is write heavy), you should consider whether using a cache is helping the performance
    of your application or if that cache is just wasting memory and CPU in unneeded
    garbage collection.


    986-1 CH06.qxd 5/27/08 7:35 PM Page 145


    C H A P T E R 6 n HIBERNATE WITH TERRACOTTA


    **145**


    **Tuning Detached Instances**


    Since detached instances are just POJOs, tuning these is no different than tuning
    POJO or distributed cache instances with Terracotta. For more information, see
    Chapter 12 for general tuning information or Chapter 5 for specific information
    about tuning distributed cache performance.


    **Summary**


    This chapter has shown the challenges we face when moving a Hibernate application
    from a single node to a clustered environment. Terracotta is able to not only
    alleviate these challenges but to boost overall application performance across
    the cluster.


    Two main strategies exist for integrating Terracotta with a Hibernate enabled
    application:


    • Using a clustered Ehcache implementation as a second-level cache


    • Clustering Hibernate created POJOs outside of the session, also known as detached
    instances


    In Chapter 5, you learned about distributed caching, and now you have a better
    understanding of how caching paradigms and Terracotta can help Hibernate applications
    to detach from the database. In Chapter 7, we will explore clustering for web
    applications using Terracotta. We will learn how HTTP session information can
    be shared in a transparent, highly available fashion. For Hibernate-based applications,
    the HTTP session proves to be one location where we can store detached POJOs.
    Furthermore, HTTP session clustering that is scalable and highly available can
    help us keep certain data around web conversations out of the database altogether.


    Clustered the HTTP sessions provide us another way to share state without resorting
    to the database. Across these various integration points, we can start to see
    Terracotta providing us much more than a distributed caching library—Terracotta
    provides us a general-purpose solution that we can use when battling any and all
    challenges our existing applications present in the process of scaling out across
    Java processes.


