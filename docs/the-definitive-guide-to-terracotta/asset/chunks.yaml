    ## Running the Example


    Once the configuration is complete, running the application in a cluster can be
    done from the command line or from the Eclipse plug-in. If you are not using Eclipse,
    you must compile the project first, like so (assuming your current working directory
    is the top-level project directory):


    ```

    %> javac -d classes src/example/*.java

    ```


    Once the project is compiled, start the Terracotta server. To start the server
    from the command line, use the `start-tc-server` script. You can specify the configuration
    file explicitly using the `-f` flag. If you don’t specify the location of the
    configuration file, the server will look for a file called `tc-config.xml` in
    the current working directory.


    The command line to start the server with an explicit path to the Terracotta configuration
    file looks something like this:


    ```

    %> /usr/local/terracotta/bin/start-tc-server.sh –f /path/to/tc-config.xml

    ```


    To start the server with an implicit path to the Terracotta configuration file,
    change directories to the top-level directory of the example project. The top-level
    project directory contains the `tc-config.xml` file. You may then execute the
    following command:


    ```

    %> /usr/local/terracotta/bin/start-tc-server.sh

    ```


    In Eclipse, the server can be started from the Terracotta menu, using the `Start
    Terracotta Server` command. Once the server is started, the instances of your
    application can be started.


    For this example, we must run the `Main` class in two JVMs, so you will need to
    invoke Java twice. Depending on your operating system and Terracotta installation
    directory, your command line will look something like this (again, assuming that
    you run the command from the top-level project directory):


    ```

    %> java -Xbootclasspath/p:/usr/local/terracotta/bin/../lib/dso-boot/dso-boot-hotspot_osx_150_13.jar
    -Dtc.install-root=/usr/local/terracotta/bin/.. -Dtc.config=./tc-config.xml -cp
    classes example.Main

    ```


    To determine the Terracotta-specific JVM arguments, you can use the output of
    the `dso-env` script. Alternatively, you can invoke Java using the `dso-java`
    script instead of the `java` command. The `dso-java` script will supply the proper
    JVM arguments and invoke the `java` command for you:


    ```

    %> /usr/local/terracotta/bin/dso-java.sh -cp classes example.Main

    ```


    In Eclipse, you can start the `Main` program as a Terracotta-enabled application
    as shown in Figure 4-1.


    **Figure 4-1.** *Running a Terracotta-enabled application in Eclipse*


    When the first application instance is started, you should see something like
    this in the output console:


    ```

    2007-01-18 15:49:42,204 INFO - Terracotta, version 2.6 as of 20080415-071248.

    2007-01-18 15:49:42,811 INFO - Configuration loaded from the file at

    ''/Users/orion/Documents/workspace/TerracottaExample/tc-config.xml''.

    2007-01-18 15:49:42,837 INFO - Log file:

    ''/Users/orion/Documents/workspace/TerracottaExample/terracotta/client-logs/terracotta-client.log''.

    Waiting for everyone to arrive. I''m expecting 1 other thread(s)...

    ```


    This indicates that the main thread in the first instance is blocking at `barrier.await()`.
    The `barrier` field is an instance of `java.util.concurrent.CyclicBarrier`. It
    is designed to coordinate the arrival of a specified number of threads at a certain
    point such that no thread is allowed to proceed until all expected threads have
    arrived. Every thread that calls the method `java.util.concurrent.CyclicBarrier.await()`
    will block until the specified number of threads has arrived at the barrier point.
    Once the expected number of threads has called `await()`, all the threads blocking
    on `await()` will be allowed to proceed through the `await()` method. After the
    expected number of threads passes through the `await()` barrier, the barrier is
    reset so that subsequent calls to `await()` will be blocked until the expected
    number of threads calls `await()` again. This is why it’s called a cyclic barrier:
    once the barrier is released, it recycles back to its initial state.


    > **Note** An in-depth discussion of inter-JVM thread coordination techniques
    using both basic concurrency primitives and the `java.util.concurrent` library
    follows in Chapter 10.


    Since the `barrier` is a shared object, the main thread will be blocked until
    another thread in either this JVM or another JVM in this Terracotta cluster calls
    `barrier.await()`. Then, both threads will be allowed to proceed. This will happen
    if we start up another application instance. Once the second application instance
    is started, you should see something like the following output in the consoles
    (you might see slightly different output depending on the order in which the threads
    reach the various barrier points):


