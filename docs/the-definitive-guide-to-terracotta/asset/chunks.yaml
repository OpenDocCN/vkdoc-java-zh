    **Distributed Caching**


    Distributed caching addresses the question of what we do when we run our application
    and share data across many nodes in a cluster. Further, suppose that we are not
    just storing these User objects but occasionally modifying them. In this scenario,
    when a particular User object is modified, the modified object needs to be replicated
    across the cluster. Depending on the nature of the data, it may be very important
    that the same User object is not modified at the same time in a different node.


    There are a number of approaches taken to address these issues of replication
    and coherency. Often, replication is performed by notifying other nodes in the
    cluster that data in the cache has changed. This notification can happen over
    TCP, multicast, RMI, JMS, or other means. Each local cache must then listen for
    and apply remote changes by invalidating the local cache and/or reloading the
    value. A fully coherent cache is typically built using transactions and commit
    protocols.


    Looking at our code example and considering these issues, it should be clear that
    no simple modification will allow us to turn our Map into a distributed Map. The
    changes required would be extensive, invasive, and substantially more complex
    than the existing code.


