    该应用程序最初旨在说明集群环境中的贫血领域模型。贫血领域模型是指工具和框架限制了 Java 语言表达自由的那些模型。这种限制通常体现在 POJO 在集群、消息传递或数据库基础设施之间的编组过程中。Terracotta
    用户不会遭受贫血领域模型的陷阱，因为该服务是透明的。


    库存应用程序通过以一种非常适合支持两种不同用例的方式表示商店内的数据，来说明建模的自由。库存应用程序数据的第一个用途是向消费者销售产品。库存系统必须跟踪商店销售的每种商品的现有数量。数据的第二个用途是以某种方式关联的商品进行营销。领域模型如图
    12-3 所示。


    **图 12-3.** *库存应用程序模式*


    该领域模型使应用程序能够通过 ID（在零售术语中称为库存量单位 (SKU) 编号）高效地更新商品。例如，当零售商购买更多篮球时，仓库必须根据 SKU 接收货物。在此领域模型中，仓库工作人员需要输入篮球的
    SKU，然后系统可以将该 SKU 作为库存 Map 中的键进行查找。然后，工作人员可以要求系统更新可销售数量，以反映仓库收到的新库存。将


    986-1 CH12.qxd 5/28/08 10:06 PM 第 297 页


