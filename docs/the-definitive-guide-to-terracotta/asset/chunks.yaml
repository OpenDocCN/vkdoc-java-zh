    Let’s look briefly at the ehcache.xml configuration file. This file contains two
    blocks. The first defines the configuration for a cache named userCache (the one
    we used in our code).


    The second block contains a default configuration for unnamed caches created dynamically
    from the CacheManager. The defaultCache definition is required in the ehcache.xml
    file.


    Let’s examine the attributes set on the named userCache in detail:


    • maxElementsInMemory: This property sets the maximum size of the cache in memory.


    • memoryStoreEvictionPolicy: Setting this property to LFU indicates a least frequently
    used eviction policy when the memory store is too large.


    • eternal: This property can be set to indicate that elements should live forever
    in the cache, in which case, the later expiration settings have no effect.


    • timeToIdleSeconds: This property sets the maximum time an item can live in the
    cache without being used before it expires.


    • timeToLiveSeconds: This property sets the maximum total time an item can live
    in the cache regardless of use.


    • overflowToDisk: This property determines whether caches larger than the in-memory
    maximum should overflow to disk.


    • diskExpiryThreadIntervalSeconds: This property sets the number of seconds between
    runs of the background disk expiry thread, which will clean up expired elements
    on disk.'
