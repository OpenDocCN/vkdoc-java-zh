- fmt: "# Terracotta POJO Clustering\n\n## Portability Checks\n\nWhen a field of an\
    \ object that is already shared changes, the object being newly assigned to that\
    \ field is checked for portability. If that object is not portable, Terracotta\
    \ throws a portability exception.\n\nIf the newly referenced object is itself\
    \ portable, its object graph is traversed. If any object reachable by the newly\
    \ referenced object is not portable, Terracotta throws a portability exception.\n\
    \n## Logical Action\n\nMethods called on logically managed objects that change\
    \ the state of that object are termed logical actions. When such a method is called,\
    \ the arguments to that method are checked for portability. If any of those objects\
    \ are not portable, Terracotta throws a portability exception.\n\nIf the argument\
    \ objects themselves are portable, their object graphs are traversed. If any object\
    \ reachable by the argument objects is not portable, Terracotta throws a portability\
    \ exception.\n\n## Object Graph Traversal\n\nWhen an object becomes shared via\
    \ any of the mechanisms just discussed, including joining the graph of another\
    \ shared object through field assignment or by becoming the argument to a logically\
    \ shared action, Terracotta traverses all of the objects reachable in that object's\
    \ graph.\n\nDuring that traversal, if any nonportable object is encountered, Terracotta\
    \ throws a portability exception.\n\n## Transient Fields and On-Load Behavior\n\
    \nIf the field of an object that you want to cluster is not portable, you have\
    \ two options:\n\n- Refactor the code so as to remove the nonportable field.\n\
    - Declare the field transient.\n\nA transient field in Terracotta is similar to\
    \ a transient field in Java: it is ignored during object graph traversal when\
    \ an object graph is being shared. You can declare a field as transient in the\
    \ Terracotta configuration like so:\n\n```xml\n<transient-fields>\n    <field-name>com.mycompany.pkga.MyClassOne.fieldA</field-name>\n\
    \    <field-name>com.mycompany.pkgb.subpkg2.fieldB</field-name>\n</transient-fields>\n\
    ```\n\nYou can also declare a field transient by setting the `<honor-transient>`\
    \ option in the class instrumentation section of the Terracotta configuration.\
    \ Any classes that match an `<include>` stanza where `<honor-transient>` is specified\
    \ will be inspected for the `transient` keyword in the Java language. Any field\
    \ marked as `transient` in source code will be honored as transient by Terracotta.\n\
    \n```xml\n<instrumented-classes>\n    <include>\n        <honor-transient>true</honor-transient>\n\
    \        <class-expression>com.mycompany.pkga.*</class-expression>\n    </include>\n\
    \    ...\n</instrumented-classes>\n```\n\n### Initializing Transient Fields on\
    \ Load\n\nSince transient fields are ignored by Terracotta, you must take care\
    \ to initialize them after they have been instantiated on other JVMs. When an\
    \ object is materialized on a JVM by Terracotta, any transient reference fields\
    \ will be `null`, and transient primitive fields will be their default values.\n\
    \nTerracotta offers two facilities to initialize those fields to their proper\
    \ values. In the Terracotta configuration, you can specify a method to be called\
    \ when an object is materialized on the heap of a JVM. That method should contain\
    \ the proper initialization code. Alternatively, you can write BeanShell script\
    \ directly into the configuration file that will be executed when the object is\
    \ loaded.\n\nThe following configuration snippet declares an initialization method.\
    \ It instructs Terracotta to invoke `com.mycompany.pkga.MyClass.myMethod()` whenever\
    \ a clustered instance of `com.mycompany.pkga.MyClass` is loaded in a JVM.\n\n\
    ```xml\n<instrumented-classes>\n    <include>\n        <class-expression>com.mycompany.pkga.MyClass</class-expression>\n\
    \        <on-load>\n            <method>myMethod</method>\n        </on-load>\n\
    \    </include>\n    ...\n</instrumented-classes>\n```\n\nThe following configuration\
    \ snippet declares some BeanShell script to be invoked whenever a clustered instance\
    \ of `com.mycompany.pkga.MyClass` is loaded in a JVM:\n\n```xml\n<instrumented-classes>\n\
    \    <include>\n        <class-expression>com.mycompany.pkga.MyClass</class-expression>\n\
    \        <on-load>\n            <execute><![CDATA[self.myTransientField = new\
    \ ArrayList();]]></execute>\n        </on-load>\n    </include>\n    ...\n</instrumented-classes>\n\
    ```\n\nMore information on BeanShell scripting may be found at [http://www.beanshell.org/](http://www.beanshell.org).\n\
    \n## Clustered POJOs Step by Step\n\nNow that you've been introduced to some of\
    \ the major concepts of Terracotta, we are ready to discuss POJO clustering in\
    \ depth and what it means for your application. The definition of a POJO is quite\
    \ contentious. Rebecca Parsons originally defined POJO. Later, on the definition,\
    \ Fowler wrote:\n\n> \"I've come to the conclusion that people forget about regular\
    \ Java objects because they haven't got a fancy name—so while preparing for a\
    \ talk Rebecca Parsons, Josh Mackenzie, and I gave them one: POJO (Plain Old Java\
    \ Object). A POJO domain model is easier to put together, quick to build, can\
    \ run and test outside of an EJB container, and isn't dependent on EJB (maybe\
    \ that's why EJB vendors don't encourage you to use them).\"\n>\n> —Martin Fowler\
    \ ([http://www.martinfowler.com/isa/domainModel.html](http://www.martinfowler.com/isa/domainModel.html))\n\
    \nPOJO is essentially a feeling more than a specification. What is certain is\
    \ that a developer knows when he is writing POJOs and when he is not.\n\nTerracotta\
    \ enables a POJO programming model when running applications in a cluster. The\
    \ model is represented by the ability to honor the Java Memory Model as well as\
    \ the language semantics. Specifically, POJO clustering implies that object identity\
    \ is preserved across JVMs. Clustered POJOs are, in a fundamental way, the *same*\
    \ object in different JVMs, not merely copies or clones that have the same data.\
    \ A POJO should be able to simultaneously reside in two separate object graphs\
    \ without ending up cloned into one of them.\n\nA Java developer should be able\
    \ to synchronize access to a POJO using the `synchronized` keyword. POJO clustering\
    \ is the basis of Terracotta's ability to cluster many frameworks. Community members\
    \ have built prototypes for Scala, JRuby, Quercus, and Groovy clustering. These\
    \ technologies were not implemented with clustering in mind, but as long as the\
    \ clustering honors the language specification and developer contract (preserving\
    \ threading semantics and object identity), these technologies needn't think about\
    \ clustering.\n\nIn Chapters 5 and on, you will see a number of use cases that\
    \ demonstrate Terracotta adapted for a particular technology. But, under the covers,\
    \ Terracotta is a generic technology that can be applied to any distributed computing\
    \ task. The core Terracotta technology makes POJOs available across JVM instances\
    \ as if they all shared a massive distributed heap. In the rest of this chapter,\
    \ we will address how POJO clustering works and can be used under many use cases.\
    \ With this knowledge, you can better understand subsequent chapters, and you\
    \ can build your own prototypes or production applications using frameworks Terracotta\
    \ has yet to support.\n\n### What Do We Mean by POJO?\n\nTo understand what POJO\
    \ clustering is, let's first describe exactly what we mean by POJO. We use the\
    \ term \"POJO\" to mean a plain Java object that lives on the heap of your JVM\
    \ and doesn't need any extra framework or component trussing to enable the functionality\
    \ it is intended to provide."
